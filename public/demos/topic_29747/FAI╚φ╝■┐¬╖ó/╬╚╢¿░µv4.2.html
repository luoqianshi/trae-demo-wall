  onMarkDown:function(e){
    var target = e.target;
    var g = target.closest('.mark-g');
    if(!g || A.ocrBusy) return;
    e.preventDefault(); e.stopPropagation();
    var id = parseFloat(g.dataset.markId);
    var mark = A.marks.find(function(m){ return m.id === id; });
    if(!mark) return;
    A.selMarkId = id;
    document.querySelectorAll('.mark-g .mark-handle').forEach(function(h){ h.classList.remove('show'); });
    document.querySelectorAll('.mark-g .mark-rotate').forEach(function(h){ h.classList.remove('show'); });
    g.querySelectorAll('.mark-handle').forEach(function(h){ h.classList.add('show'); });
    g.querySelectorAll('.mark-rotate').forEach(function(h){ h.classList.add('show'); });
    var pt = A.svgPt(e);
    var sc = A.scale;
    if(target.classList.contains('mark-handle')){
      A.markDragSt = {type:'resize', id:id, corner:target.dataset.corner, ox:pt.x, oy:pt.y, oX:mark.x, oY:mark.y, oW:mark.w, oH:mark.h};
    } else if(target.classList.contains('mark-rotate')){
      var cx = (mark.x + mark.w/2) * sc;
      var cy = (mark.y + mark.h/2) * sc;
      A.markDragSt = {type:'rotate', id:id, ox:pt.x, oy:pt.y, oAng:mark.angle||0, cx:cx, cy:cy};
    } else if(target.classList.contains('mark-rect')){
      A.markDragSt = {type:'move', id:id, ox:pt.x, oy:pt.y, oX:mark.x, oY:mark.y};
    }
  },
  onMarkMove:function(e){
    if(!A.markDragSt) return;
    var pt = A.svgPt(e);
    var mark = A.marks.find(function(m){ return m.id === A.markDragSt.id; });
    if(!mark) return;
    var s = A.scale;
    if(A.markDragSt.type === 'move'){
      var dx = (pt.x - A.markDragSt.ox) / s;
      var dy = (pt.y - A.markDragSt.oy) / s;
      mark.x = A.markDragSt.oX + dx;
      mark.y = A.markDragSt.oY + dy;
    } else if(A.markDragSt.type === 'resize'){
      var dx2 = (pt.x - A.markDragSt.ox) / s;
      var dy2 = (pt.y - A.markDragSt.oy) / s;
      var ds = A.markDragSt;
      var nx = ds.oX, ny = ds.oY, nw = ds.oW, nh = ds.oH;
      var c = ds.corner;
      if(c.indexOf('w') >= 0){ nx = ds.oX + dx2; nw = ds.oW - dx2; }
      if(c.indexOf('e') >= 0){ nw = ds.oW + dx2; }
      if(c.indexOf('n') >= 0){ ny = ds.oY + dy2; nh = ds.oH - dy2; }
      if(c.indexOf('s') >= 0){ nh = ds.oH + dy2; }
      var minSz = 3 / s;
      if(nw < minSz){ if(c.indexOf('w') >= 0) nx = ds.oX + ds.oW - minSz; nw = minSz; }
      if(nh < minSz){ if(c.indexOf('n') >= 0) ny = ds.oY + ds.oH - minSz; nh = minSz; }
      mark.x = nx; mark.y = ny; mark.w = nw; mark.h = nh;
    } else if(A.markDragSt.type === 'rotate'){
      var cx2 = A.markDragSt.cx;
      var cy2 = A.markDragSt.cy;
      var ang = Math.atan2(pt.y - cy2, pt.x - cx2) * 180 / Math.PI;
      ang = Math.round(ang);
      if(ang < 0) ang += 360;
      mark.angle = ang;
    }
    A.renderMarks();
  },
  onMarkUp:function(){
    A.markDragSt = null;
  },
  deselMark:function(){

  onMarkDblClick:function(g){
    if(A.ocrBusy) return;
    var id = parseFloat(g.dataset.markId);
    var mark = A.marks.find(function(m){ return m.id === id; });
    if(!mark) return;
    A.ocrBusy = true;
    A.setStatus('y', 'OCR...');
    var s = A.scale, psm = E('sPSM').value, lang = E('sLang').value;
    var baseAngle = mark.angle || 0;
    var isVertical = mark.w < mark.h;
    var tryAngles = isVertical ? [baseAngle, (baseAngle+90)%360] : [baseAngle];
    var tryIdx = 0;
    var self = A;
    var tryOcr = function(){
      if(tryIdx >= tryAngles.length){
        A.ocrBusy = false;
        A.setStatus('g', '未识别到');
        A.toast('双击识别无结果');
        return;
      }
      var ang = tryAngles[tryIdx++];
      self.selS = {x:mark.x*s, y:mark.y*s};
      self.selE = {x:(mark.x+mark.w)*s, y:(mark.y+mark.h)*s};
      var proc = self.cropAndProc(ang, undefined, 'global');
      self.ocrPass(proc, psm, lang).then(function(r){
        var d = self.correctDigits(proc, self.extractDigits(r.text));
        var parsed = self.parseDim(r.text);
        if(!parsed.nom || !/\d/.test(parsed.nom)){ tryOcr(); return; }
        if(self.dims.some(function(dd){ return dd.nominal === parsed.nom && dd.pg === self.pg; })){ tryOcr(); return; }
        var num = self.getNextNum();
        var dim = {
          id:Date.now()+Math.random(), num:num, nominal:parsed.nom,
          upperTol:parsed.up, lowerTol:parsed.lo, tolValue:0, tolDisplay:'', tolGrade:'',
          type:parsed.type, gdt:'', measured:'', result:'', notes:'',
          equipment:getEquip(parsed.type, parsed.nom),
          ocrRaw:r.text, ocrAngle:ang, pg:self.pg, saved:false,
          selX:mark.x, selY:mark.y, selW:mark.w, selH:mark.h,
          bubX:mark.x + mark.w + 1, bubY:mark.y
        };
        self.autoTol(dim);
        self.insertDimSorted(dim);
        self.addBubSVG(dim);
        self.renderTable();
        self.log('双击识别 #' + num + ' ' + nomDisplay(dim) + ' @' + ang + '\u00B0', 'ok');
        self.toast('#' + num + ' ' + nomDisplay(dim));
        A.marks = A.marks.filter(function(m){ return m.id !== mark.id; });
        A.renderMarks();
        A.ocrBusy = false;
        A.setStatus('g', '完成');
      }).catch(function(){ tryOcr(); });
    };
    tryOcr();
  },
  delMark:function(){

    A.selMarkId = null;

  onBubMove:function(e){
    if(!this.dragSt) return;
    var pt = this.svgPt(e);
    var dim = this.dims.find(function(d){ return d.id === A.dragSt.id; });
    if(!dim) return;
    var s = this.scale;
    if(this.dragSt.type === 'bubble'){
      this.updBubblePos(this.dragSt.id, (pt.x-this.dragSt.ox)/s, (pt.y-this.dragSt.oy)/s);
    } else if(this.dragSt.type === 'rect'){
      var dx = (pt.x - this.dragSt.ox) / s;
      var dy = (pt.y - this.dragSt.oy) / s;
      dim.selX = this.dragSt.oSX + dx;
      dim.selY = this.dragSt.oSY + dy;
      this.refreshBubbleSVG(dim);
    } else if(this.dragSt.type === 'resize'){
      var dx2 = (pt.x - this.dragSt.ox) / s;
      var dy2 = (pt.y - this.dragSt.oy) / s;
      var ds = this.dragSt;
      var nx = ds.oSX, ny = ds.oSY, nw = ds.oSW, nh = ds.oSH;
      var c = ds.corner;
      if(c.indexOf('w') >= 0){ nx = ds.oSX + dx2; nw = ds.oSW - dx2; }
      if(c.indexOf('e') >= 0){ nw = ds.oSW + dx2; }
      if(c.indexOf('n') >= 0){ ny = ds.oSY + dy2; nh = ds.oSH - dy2; }
      if(c.indexOf('s') >= 0){ nh = ds.oSH + dy2; }
      var minSz = 2 / s;
      if(nw < minSz){ if(c.indexOf('w') >= 0) nx = ds.oSX + ds.oSW - minSz; nw = minSz; }
      if(nh < minSz){ if(c.indexOf('n') >= 0) ny = ds.oSY + ds.oSH - minSz; nh = minSz; }
      dim.selX = nx; dim.selY = ny; dim.selW = nw; dim.selH = nh;
      this.refreshBubbleSVG(dim);
    }
  },
  onBubUp:function(){
    if(this.dragSt){
      this.justDraggedBub = true;
      var self = this;
      setTimeout(function(){ self.justDraggedBub = false; }, 350);
    }
    this.dragSt = null;
  },
  svgPt:function(e){
    var pt = document.getElementById('bubbleSvg').createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    return pt.matrixTransform(document.getElementById('bubbleSvg').getScreenCTM().inverse());
  },

  selBub:function(id){
    this.selId = id;
    var dim = this.dims.find(function(d){ return d.id === id; });
    if(!dim) return;
    E('bpPanel').style.display = '';
    E('bpN').value = dim.num;
    E('bpV').value = dim.nominal;
    E('bpU').value = dim.upperTol;
    E('bpL').value = dim.lowerTol;
    E('bpT').value = dim.type;
    E('bpG').value = dim.gdt || '';
    E('bpNo').value = dim.notes || '';
    E('bpTol').value = dim.tolGrade || '';
    E('bpEquip').value = dim.equipment || '';
    var grade = dim.tolGrade || '';
    var isCustom = (grade === 'custom');
    E('bpU').readOnly = !isCustom && (grade!=='');
    E('bpL').readOnly = !isCustom && (grade!=='');
    if(isCustom){
      E('bpU').classList.add('custom-tol');
      E('bpL').classList.add('custom-tol');
    } else {
      E('bpU').classList.remove('custom-tol');
      E('bpL').classList.remove('custom-tol');
    }
    document.querySelectorAll('#dtB tr').forEach(function(t){ t.classList.remove('sel'); });
    var tr = document.querySelector('#dtB tr[data-id="'+id+'"]');
    if(tr) tr.classList.add('sel');
    document.querySelectorAll('.sf-handle').forEach(function(h){ h.classList.remove('show'); });
    var g = document.querySelector('[data-id="'+id+'"]');
    if(g) g.querySelectorAll('.sf-handle').forEach(function(h){ h.classList.add('show'); });
  },
  deselBub:function(){
    this.selId = null;
    E('bpPanel').style.display = 'none';
    document.querySelectorAll('#dtB tr').forEach(function(t){ t.classList.remove('sel'); });
    document.querySelectorAll('.sf-handle').forEach(function(h){ h.classList.remove('show'); });
  },
  saveBubble:function(){
    if(this.selId === null) return;
    var dim = this.dims.find(function(d){ return d.id === A.selId; });
    if(!dim) return;
    var oldType = dim.type, oldNom = dim.nominal;
    dim.num = parseInt(E('bpN').value) || dim.num;
    dim.nominal = E('bpV').value;
    dim.type = E('bpT').value;
    dim.gdt = E('bpG').value;
    dim.notes = E('bpNo').value;
    dim.equipment = E('bpEquip').value;
    var grade = E('bpTol').value;
    if(grade === 'custom'){
      dim.tolGrade = 'custom';
      dim.upperTol = E('bpU').value;
      dim.lowerTol = E('bpL').value;
      var uNum = parseFloat(dim.upperTol) || 0;
      var lNum = parseFloat(dim.lowerTol) || 0;
      dim.tolValue = Math.max(Math.abs(uNum), Math.abs(lNum));
      dim.tolDisplay = dim.upperTol + '/' + dim.lowerTol;
    } else if(grade === 'diam'){
      dim.tolGrade = 'diam';
      var nDiam = parseFloat(dim.nominal);
      if(!isNaN(nDiam)){
        if(nDiam >= 10){
          dim.tolValue = .5; dim.tolDisplay = '+0.5/0';
          dim.upperTol = '+0.5'; dim.lowerTol = '0';
        } else {
          dim.tolValue = .1; dim.tolDisplay = '\u00B10.1';
          dim.upperTol = '+0.1'; dim.lowerTol = '-0.1';
        }
        E('bpU').value = dim.upperTol;
        E('bpL').value = dim.lowerTol;
      }
    } else if(grade === 'cham'){
      dim.tolGrade = 'cham';
      var nCham = parseFloat(dim.nominal);
      if(!isNaN(nCham)){
        if(nCham >= .5 && nCham <= 3){
          dim.tolValue = .2; dim.tolDisplay = '\u00B10.2';
          dim.upperTol = '+0.2'; dim.lowerTol = '-0.2';
        } else if(nCham > 3 && nCham <= 6){
          dim.tolValue = .5; dim.tolDisplay = '\u00B10.5';
          dim.upperTol = '+0.5'; dim.lowerTol = '-0.5';
        } else if(nCham > 6 && nCham <= 30){
          dim.tolValue = 1; dim.tolDisplay = '\u00B11';
          dim.upperTol = '+1'; dim.lowerTol = '-1';
        } else if(nCham > 30){
          dim.tolValue = 2; dim.tolDisplay = '\u00B12';
          dim.upperTol = '+2'; dim.lowerTol = '-2';
        }
        E('bpU').value = dim.upperTol;
        E('bpL').value = dim.lowerTol;
      }
    } else if(grade){
      dim.tolGrade = grade;
      var isR = (dim.type === 'radius' || dim.type === 'chamfer');
      var tol = lookupGB(parseFloat(dim.nominal), grade, isR);
      if(tol){
        dim.tolValue = tol; dim.tolDisplay = '\u00B1' + tol;
        dim.upperTol = '+' + tol; dim.lowerTol = '-' + tol;
        E('bpU').value = dim.upperTol;
        E('bpL').value = dim.lowerTol;
      }
    } else if(dim.type !== oldType || dim.nominal !== oldNom){
      dim.tolGrade = '';
      this.autoTol(dim);
    } else {
      dim.upperTol = E('bpU').value;
      dim.lowerTol = E('bpL').value;
    }
    dim.saved = true;
    var g = document.querySelector('[data-id="'+dim.id+'"]');
    if(g) g.querySelector('text').textContent = dim.num;
    this.renderTable();
    this.selBub(dim.id);
    this.toast('已保存 #' + dim.num);
  },
  delSel:function(){
    if(this.selId === null) return;
    var dim = this.dims.find(function(d){ return d.id === A.selId; });
    if(dim) this.recycleNum(dim.num);
    this.dims = this.dims.filter(function(d){ return d.id !== A.selId; });
    var g = document.querySelector('[data-id="'+this.selId+'"]');
    if(g) g.remove();
    this.deselBub();
    this.renderTable();
    this.toast('已删除');
    this.updStatus();
  },

  simValue:function(dim){
    if(!dim.nominal) return '';
    var nom = parseFloat(dim.nominal);
    if(isNaN(nom)) return '';
    var u = parseFloat(dim.upperTol) || 0;
    var l = parseFloat(dim.lowerTol) || 0;
    if(u === 0 && l === 0) return nom.toString();
    var lo = nom + l;
    var hi = nom + u;
    var range = hi - lo;
    if(range <= 0) return nom.toString();
    var val = lo + Math.random() * range;
    var equip = dim.equipment || '';
    var dec;
    if(equip === '卷尺') dec = 1;
    else if(equip === '角度尺') dec = 1;
    else dec = 2;
    var result = parseFloat(val.toFixed(dec));
    if(dim.type === 'angle') return result + '\u00B0';
    return result.toString();
  },
  simAll:function(){
    var self = this;
    this.dims.forEach(function(d){
      d.measured = self.simValue(d);
    });
    this.renderTable();
    this.toast('全部模拟完成');
    this.log('全部模拟实测值已生成', 'ok');
  },
  delSim:function(){
    var self = this;
    var cnt = 0;
    this.dims.forEach(function(d){
      if(d.measured || d.result){
        d.measured = '';
        d.result = '';
        cnt++;
      }
    });
    this.renderTable();
    if(cnt > 0){
      this.toast('已删除 ' + cnt + ' 个模拟数据');
      this.log('已删除全部模拟数值和判定', 'ok');
    } else {
      this.toast('无模拟数据');
    }
  },

  renderTable:function(){
    var tb = E('dtB'), em = E('dtE'), self = this;
    E('dtC').textContent = this.dims.length;
    E('stD').textContent = '尺寸:' + this.dims.length;
    if(!this.dims.length){ tb.innerHTML = ''; em.style.display = ''; return; }
    em.style.display = 'none';
    var tl = {linear:'线性', diameter:'直径', radius:'R半径', chamfer:'C倒角', angle:'角度', gdt:'GD&T'};
    tb.innerHTML = this.dims.map(function(d){
      var pass = d.measured ? (self.chkPass(d) ? '<span style="color:var(--ok)">OK</span>' : '<span style="color:var(--ac)">NG</span>') : '-';
      var tolLabel = d.tolGrade ? (d.tolGrade + ' ' + d.tolDisplay) : (d.tolDisplay || '');
      var uDisp = fmtLim(d.nominal, d.upperTol);
      var lDisp = fmtLim(d.nominal, d.lowerTol);
      var nomCls = d.saved ? 'class="dv locked"' : 'class="dv"';
      return '<tr data-id="'+d.id+'" onclick="A.selBub('+d.id+')" draggable="true" data-num="'+d.num+'">' +
        '<td class="dn">'+d.num+'</td>' +
        '<td '+nomCls+'>'+nomDisplay(d)+'</td>' +
        '<td style="color:var(--info);font-size:10px">'+tolLabel+'</td>' +
        '<td class="dt2">'+uDisp+'</td>' +
        '<td class="dt2">'+lDisp+'</td>' +
        '<td style="color:var(--t2);font-size:10px">'+(tl[d.type]||d.type)+'</td>' +
        '<td contenteditable data-f="measured" style="color:var(--t1)">'+(d.measured||'')+'</td>' +
        '<td>'+pass+'</td>' +
        '<td contenteditable data-f="notes" style="color:var(--t2)">'+(d.notes||'')+'</td>' +
        '<td style="color:var(--t2);font-size:10px">'+(d.equipment||'')+'</td>' +
        '<td><button class="b bs bd" style="padding:1px 4px;font-size:9px" onclick="event.stopPropagation();A.delDim('+d.id+')">x</button></td>' +
        '</tr>';
    }).join('');
    tb.querySelectorAll('td[contenteditable]').forEach(function(td){
      td.addEventListener('blur', function(){
        var tr = td.closest('tr');
        var id = parseFloat(tr.dataset.id);
        var f = td.dataset.f;
        var dim = self.dims.find(function(d){ return d.id === id; });
        if(dim && f){
          var old = dim[f];
          dim[f] = td.textContent.trim();
          if(f === 'nominal' && dim.ocrRaw && dim[f] !== old && dim.ocrRaw !== dim[f]){
            self.saveLearn(dim.ocrRaw, dim[f], dim.ocrAngle || 0);
          }
          if(f === 'nominal'){
            dim.equipment = getEquip(dim.type, dim.nominal);
            self.autoTol(dim);
          }
          self.renderTable();
        }
      });
      td.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){ e.preventDefault(); td.blur(); }
      });
    });
    var dragSrcId = null;
    tb.querySelectorAll('tr[draggable]').forEach(function(tr){
      tr.addEventListener('dragstart', function(e){
        dragSrcId = parseFloat(tr.dataset.id);
        tr.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', dragSrcId);
      });
      tr.addEventListener('dragend', function(e){
        tr.classList.remove('dragging');
        tb.querySelectorAll('tr').forEach(function(r){ r.classList.remove('drag-over'); });
        dragSrcId = null;
      });
      tr.addEventListener('dragover', function(e){
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if(parseFloat(tr.dataset.id) !== dragSrcId) tr.classList.add('drag-over');
      });
      tr.addEventListener('dragleave', function(e){
        tr.classList.remove('drag-over');
      });
      tr.addEventListener('drop', function(e){
        e.preventDefault();
        tr.classList.remove('drag-over');
        var srcId = parseFloat(e.dataTransfer.getData('text/plain'));
        var dstId = parseFloat(tr.dataset.id);
        if(srcId && dstId && srcId !== dstId){
          self.moveDim(srcId, dstId);
        }
        dragSrcId = null;
      });
    });
  },
  moveDim:function(srcId, dstId){
    var si = this.dims.findIndex(function(d){ return d.id === srcId; });
    var di = this.dims.findIndex(function(d){ return d.id === dstId; });
    if(si < 0 || di < 0) return;
    var dim = this.dims.splice(si, 1)[0];
    if(si < di) di--;
    this.dims.splice(di, 0, dim);
    this.renderTable();
    this.toast('已移动');
  },
  insertDimSorted:function(dim){
    var idx = 0;
    while(idx < this.dims.length && this.dims[idx].num < dim.num) idx++;
    this.dims.splice(idx, 0, dim);
  },
  chkPass:function(d){
    if(!d.measured || !d.nominal) return false;
    var nom = parseFloat(d.nominal);
    var meas = parseFloat(String(d.measured).replace(/[^\d.\-]/g, ''));
    if(isNaN(nom) || isNaN(meas)) return false;
    var u = parseFloat(d.upperTol) || 0;
    var l = parseFloat(d.lowerTol) || 0;
    var lo = nom + l;
    var hi = nom + u;
    return meas >= lo && meas <= hi;
  },
  addEmpty:function(){
    var num = this.getNextNum();
    var dim = {
      id:Date.now()+Math.random(), num:num, nominal:'', upperTol:'', lowerTol:'',
      tolValue:0, tolDisplay:'', tolGrade:'', type:'linear', gdt:'', measured:'', result:'', notes:'',
      equipment:'', ocrRaw:'', ocrAngle:0, pg:this.pg, saved:false,
      selX:2, selY:2, selW:3, selH:1, bubX:6, bubY:1
    };
    this.insertDimSorted(dim);
    this.addBubSVG(dim);
    this.renderTable();
    this.selBub(dim.id);
  },
  delDim:function(id){
    var dim = this.dims.find(function(d){ return d.id === id; });
    if(dim) this.recycleNum(dim.num);
    this.dims = this.dims.filter(function(d){ return d.id !== id; });
    var g = document.querySelector('[data-id="'+id+'"]');
    if(g) g.remove();
    if(this.selId === id) this.deselBub();
    this.renderTable();
    this.updStatus();
  },

  getExportName:function(){
    var prod = E('iProdName').value.trim().replace(/\s+/g, '');
    var dw = E('iDW').value.trim();
    var rv = E('iRV').value.trim();
    var parts = [];
    if(prod) parts.push(prod);
    if(dw) parts.push(dw);
    var name = parts.join('-');
    if(rv) name += '-(' + rv + ')';
    return name || 'FAI_report';
  },
  dl:function(content, name, type){
    var b = new Blob([content], {type:type});
    var u = URL.createObjectURL(b);
    var a = document.createElement('a');
    a.href = u; a.download = name; a.click();
    URL.revokeObjectURL(u);
  },
  buildExportCanvas:function(){
    var dpr = window.devicePixelRatio || 1;
    var cw = this.cv.width, ch = this.cv.height;
    var ec = document.createElement('canvas');
    ec.width = cw; ec.height = ch;
    var ex = ec.getContext('2d');
    ex.drawImage(this.cv, 0, 0);
    var s = this.scale * dpr;
    this.dims.filter(function(d){ return d.pg === A.pg; }).forEach(function(d){
      var bx = d.bubX*s, by = d.bubY*s;
      var sx = d.selX*s, sy = d.selY*s, sw = d.selW*s, sh = d.selH*s;
      var corners = [{x:sx,y:sy},{x:sx+sw,y:sy},{x:sx,y:sy+sh},{x:sx+sw,y:sy+sh}];
      var nc = corners[0], minD = 1e9;
      corners.forEach(function(c){ var dist = Math.hypot(bx-c.x, by-c.y); if(dist < minD){ minD = dist; nc = c; } });
      ex.strokeStyle = '#ff3c3c'; ex.lineWidth = 1.5*dpr;
      ex.setLineDash([5*dpr, 3*dpr]); ex.strokeRect(sx, sy, sw, sh); ex.setLineDash([]);
      ex.beginPath(); ex.moveTo(bx, by); ex.lineTo(nc.x, nc.y);
      ex.strokeStyle = '#ff3c3c'; ex.lineWidth = 1.2*dpr; ex.stroke();
      ex.beginPath(); ex.arc(nc.x, nc.y, 3*dpr, 0, Math.PI*2); ex.fillStyle = '#ff3c3c'; ex.fill();
      ex.beginPath(); ex.arc(bx, by, 14*dpr, 0, Math.PI*2);
      ex.fillStyle = 'rgba(255,255,255,0.95)'; ex.fill();
      ex.strokeStyle = '#ff3c3c'; ex.lineWidth = 2*dpr; ex.stroke();
      ex.fillStyle = '#ff3c3c';
      ex.font = '700 ' + (11*dpr) + 'px JetBrains Mono,monospace';
      ex.textAlign = 'center'; ex.textBaseline = 'middle';
      ex.fillText(d.num.toString(), bx, by + dpr);
    });
    return ec;
  },
  expCSV:function(){
    if(!this.dims.length){ this.toast('暂无数据'); return; }
    var csv = '\uFEFF编号,标准尺寸,标准公差,上差,下差,类型,实测值,判定,备注,检测设备\n';

      var p = d.measured ? (A.chkPass(d) ? 'PASS' : 'FAIL') : '';
      csv += d.num + ',' + nomDisplay(d) + ',' + (d.tolDisplay||'') + ',' + fmtLim(d.nominal,d.upperTol) + ',' + fmtLim(d.nominal,d.lowerTol) + ',' + d.type + ',' + d.measured + ',' + p + ',' + d.notes + ',' + (d.equipment||'') + '\n';
    });

    this.toast('CSV已导出');
  },

  expPDF:function(){

  },

      E('iSupplier').value = info.supplier || '';

      E('iTolStd').value = info.tolStd || 'GB/T 1804-m';
      E('iImportance').value = info.importance || 'B';
      self.dims = (d.dims || []).map(function(dim){
        if(!dim.equipment) dim.equipment = getEquip(dim.type, dim.nominal);
        if(dim.saved === undefined) dim.saved = true;
        return dim;
      });
      self.regions = d.regions || [];
      self.marks = (d.marks || []).map(function(m){
        if(m.angle === undefined) m.angle = 0;
        return m;
      });
      self.nextN = d.nextN || (self.dims.length + 1);
      self.recycled = d.recycled || [];
      if(self.pdf || self.isImg){
        self.renderRegions();
        self.renderMarks();
        self.renderBubbles();
        self.renderRegionList();
      }
      self.renderTable();
      self.toast('项目已加载');
      self.log('加载 ' + self.dims.length + ' 个尺寸', 'ok');
    }).catch(function(){ self.toast('加载失败'); });
  },

  log:function(m, t){
    var el = E('logA'), d = document.createElement('div');
    d.style.color = t==='ok' ? 'var(--ok)' : t==='err' ? 'var(--ac)' : t==='warn' ? 'var(--warn)' : t==='info' ? 'var(--info)' : 'var(--t3)';
    d.textContent = '[' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) + '] ' + m;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
  },
  setStatus:function(c, t){
    E('sDot').className = 'sd ' + c;
    E('sTxt').textContent = t;
  },
  updStatus:function(){
    E('stP').textContent = '第' + this.pg + '/' + this.total + '页';
    E('stZ').textContent = Math.round(this.scale * 100) + '%';
    E('stB').textContent = '气泡:' + this.dims.filter(function(d){ return d.pg === A.pg; }).length;
  },
  toast:function(m){
    var el = E('toast');
    el.textContent = m;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.classList.remove('show'); }, 2000);
  }
};

document.addEventListener('DOMContentLoaded', function(){ A.init(); });
</script>
</body>
</html>
