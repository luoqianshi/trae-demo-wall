<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGIT FAI v4.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root{--bg:#0b0d13;--s1:#12151e;--s2:#191d2a;--s3:#1f2436;--bd:#282e42;--ac:#ff3c3c;--ac2:#ff5555;--acd:#8b1a1a;--acg:rgba(255,60,60,.08);--ok:#4af0c0;--okd:#1e6b52;--okg:rgba(74,240,192,.08);--warn:#f0a04a;--info:#5b9aff;--t1:#e2e5ed;--t2:#a0a6b8;--t3:#5c6380}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;user-select:none;font-size:13px}
.app{display:grid;grid-template-rows:44px 1fr 0px 24px;grid-template-columns:188px 1fr 272px;height:100vh}
.app.open{grid-template-rows:44px 1fr 170px 24px}
.hdr{grid-column:1/-1;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:6px;z-index:50}
.brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;color:var(--bg);background:var(--ac);padding:2px 7px;border-radius:3px}
.bsub{font-size:11px;color:var(--t3);margin-left:2px}
.tbar{display:flex;gap:3px;align-items:center;flex:1;margin-left:10px}
.sep{width:1px;height:20px;background:var(--bd);margin:0 3px}
.b{font-family:'Noto Sans SC',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border:1px solid var(--bd);border-radius:4px;background:var(--s2);color:var(--t1);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.b:hover{border-color:var(--acd);background:var(--acg)}.b:active{transform:scale(.97)}.b:disabled{opacity:.3;pointer-events:none}
.ba{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}.ba:hover{background:var(--ac2)}
.bs{padding:3px 7px;font-size:10px}.bd{border-color:var(--ac);color:var(--ac)}.bd:hover{background:var(--acg)}
.bok{background:var(--ok);color:var(--bg);border-color:var(--ok);font-weight:600}
#fileInput,#projectInput{display:none}
.lp{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.lps{padding:8px 10px;border-bottom:1px solid var(--bd)}
.lpt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:6px}
.lpsc{flex:1;overflow-y:auto;padding:8px 10px}
.pg-item{padding:4px 7px;border:1px solid transparent;border-radius:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--t2);transition:all .12s}
.pg-item:hover{border-color:var(--bd);color:var(--t1)}.pg-item.on{border-color:var(--acd);background:var(--acg);color:var(--ac)}
.pg-n{font-family:'JetBrains Mono',monospace;font-size:9px;min-width:16px}
.tl-item{padding:5px 7px;border:1px solid transparent;border-radius:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--t2);transition:all .12s}
.tl-item:hover{border-color:var(--bd);color:var(--t1)}.tl-item.on{border-color:var(--acd);background:var(--acg);color:var(--ac)}
.tl-i{font-size:14px;width:18px;text-align:center}
.region-item{display:flex;align-items:center;justify-content:space-between;padding:3px 6px;background:var(--bg);border:1px solid var(--bd);border-radius:3px;margin-bottom:3px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--info)}
.region-item .rdel{cursor:pointer;color:var(--t3);font-size:12px;background:none;border:none;padding:0 2px}.rdel:hover{color:var(--ac)}
.va{position:relative;overflow:hidden;background:var(--bg)}
.vs{width:100%;height:100%;overflow:auto;position:relative}
.vw{position:relative;display:inline-block;box-shadow:0 2px 30px rgba(0,0,0,.5);flex-shrink:0;margin:20px}
#pdfCanvas{display:block}
#bubbleSvg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
#bubbleSvg .bg{pointer-events:none}
#bubbleSvg .sf{pointer-events:all;cursor:move;transition:stroke-width .1s}
#bubbleSvg .sf:hover{stroke-width:2.5;fill:rgba(255,60,60,.1)}
#bubbleSvg .sf-handle{pointer-events:all;opacity:0;transition:opacity .15s}
#bubbleSvg .sf-handle.show{opacity:1}
#bubbleSvg .sf-handle:hover{fill:#ff5555}
#bubbleSvg .ll,#bubbleSvg .cd{pointer-events:none}
#bubbleSvg .bc{pointer-events:all;cursor:move}
#bubbleSvg .bc:hover{stroke-width:2.5}
#bubbleSvg .region-rect{pointer-events:none}
#bubbleSvg .mark-rect{pointer-events:all;cursor:move;transition:stroke-width .1s}
#bubbleSvg .mark-rect:hover{stroke-width:2.5}
#bubbleSvg .mark-handle{pointer-events:all;cursor:move;opacity:0;transition:opacity .15s}
#bubbleSvg .mark-handle.show{opacity:1}
#bubbleSvg .mark-handle:hover{fill:#ff5555}
#bubbleSvg .mark-rotate{pointer-events:all;cursor:grab;opacity:0;transition:opacity .15s}
#bubbleSvg .mark-rotate.show{opacity:1}
#bubbleSvg .mark-rotate:hover{fill:#ff8c00}
#bubbleSvg .mark-dbl-hint{pointer-events:none;font-family:'JetBrains Mono',monospace;font-size:8px;fill:var(--ok);opacity:0;transition:opacity .15s}
#bubbleSvg .mark-dbl-hint.show{opacity:1}
.sel-rect{position:absolute;border:1.5px solid var(--ac);background:rgba(255,60,60,.06);pointer-events:none;display:none;z-index:10}
.sel-rect.on{display:block}
.sel-rect .sh{position:absolute;width:6px;height:6px;background:var(--ac);border:1px solid var(--bg);border-radius:1px}
.sel-rect .sh.tl{top:-3px;left:-3px}.sel-rect .sh.tr{top:-3px;right:-3px}.sel-rect .sh.bl{bottom:-3px;left:-3px}.sel-rect .sh.br{bottom:-3px;right:-3px}
.zb{position:absolute;bottom:10px;left:10px;display:none;gap:2px;background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:2px;z-index:20}
.zb.show{display:flex}
.zb button{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--t1);cursor:pointer;border-radius:3px;font-size:13px;font-family:'JetBrains Mono',monospace}
.zb button:hover{background:var(--s2)}
.zb span{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);padding:0 5px;display:flex;align-items:center;min-width:36px;justify-content:center}
.drop-ov{position:absolute;inset:0;background:rgba(255,60,60,.04);border:2px dashed var(--ac);display:none;align-items:center;justify-content:center;z-index:100}
.drop-ov.on{display:flex}.drop-ov span{font-size:14px;color:var(--ac);font-weight:500}
.emp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);text-align:center;z-index:5}
.emp.hid{display:none}
.emp .ei{width:50px;height:50px;border:2px dashed var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;opacity:.4}
.emp h2{font-size:14px;font-weight:500;margin-bottom:6px;color:var(--t1)}.emp p{font-size:11px;line-height:1.6}
.rp{background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.rps{padding:8px 10px;border-bottom:1px solid var(--bd);max-height:220px;overflow-y:auto}
.rpt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:6px}
.pr{display:flex;align-items:center;justify-content:space-between;padding:2px 0;gap:3px}
.pr label{font-size:10px;color:var(--t3);flex-shrink:0;min-width:48px}
.pr input,.pr select{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);border:1px solid var(--bd);color:var(--t1);padding:2px 5px;border-radius:3px;outline:none}
.pr input.custom-tol{width:60px;border-color:var(--acd)}
.pr input:focus,.pr select:focus{border-color:var(--acd)}
.pr .ocr-btn{width:22px;height:22px;padding:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd);border-radius:3px;background:var(--s2);color:var(--t3);cursor:pointer;font-size:11px;flex-shrink:0}
.pr .ocr-btn:hover{border-color:var(--ok);color:var(--ok);background:var(--okg)}
.pr .ocr-btn.active{border-color:var(--ac);color:var(--ac);background:var(--acg)}
.opv{width:100%;min-height:50px;max-height:120px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.opv img{max-width:100%;max-height:120px;object-fit:contain;display:block}
.opv .ph{font-size:10px;color:var(--t3);opacity:.5}
.ocr-val{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--ok);min-height:22px;font-weight:700;margin-top:4px}
.ocr-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:2px}
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:5px}
.rb{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 0;border:1px solid var(--bd);border-radius:3px;background:var(--bg);color:var(--t3);cursor:pointer;text-align:center;transition:all .12s;line-height:1.2}
.rb:hover{border-color:var(--acd);color:var(--t1)}.rb.on{border-color:var(--ok);background:var(--okg);color:var(--ok)}
.rb .ri{display:block;font-size:12px;margin-bottom:1px}
.bt{grid-column:1/-1;background:var(--s1);border-top:1px solid var(--bd);overflow:hidden;display:flex;flex-direction:column}
.dth{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.dth .dtt{font-size:10px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:6px}
.dtc{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ok);background:var(--okg);border:1px solid var(--okd);padding:1px 5px;border-radius:2px}
.dta{display:flex;gap:3px}.dts{flex:1;overflow:auto}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{position:sticky;top:0;background:var(--s2);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);padding:4px 6px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;z-index:2}
table.dt td{padding:3px 6px;border-bottom:1px solid var(--bd);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap;cursor:pointer}
table.dt tr:hover td{background:var(--acg)}table.dt tr.sel td{background:rgba(255,60,60,.08)}
table.dt td[contenteditable]{outline:none}table.dt td[contenteditable]:focus{background:var(--s3);box-shadow:inset 0 0 0 1px var(--acd)}
.dn{color:var(--ac);font-weight:700;text-align:center;min-width:24px}.dv{color:var(--t1);font-weight:600}.dt2{color:var(--warn)}
.dte{text-align:center;padding:20px;color:var(--t3);font-size:11px}
table.dt td.locked{color:var(--t2);cursor:default;opacity:.85}
table.dt tr.drag-over td{background:rgba(91,154,255,.15)}table.dt tr.dragging{opacity:.4}
.sbar{grid-column:1/-1;background:var(--s2);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:12px;font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.sd{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.sd.g{background:var(--ok)}.sd.y{background:var(--warn);animation:bl 1s infinite}.sd.r{background:var(--ac)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s2);border:1px solid var(--okd);color:var(--ok);font-size:11px;padding:6px 16px;border-radius:5px;z-index:300;opacity:0;transition:all .2s;pointer-events:none;font-family:'JetBrains Mono',monospace}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:18px;min-width:340px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.modal h3{font-size:13px;font-weight:600;margin-bottom:12px}
.modal .mr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;gap:8px}
.modal .mr label{font-size:12px;color:var(--t2)}
.modal .mr select{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--bd);color:var(--t1);padding:4px 8px;border-radius:3px;width:160px}
.modal .ma{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}
.corr-bar{display:flex;gap:4px;margin-top:4px;align-items:center}
.corr-bar input{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg);border:1px solid var(--bd);color:var(--ok);padding:3px 6px;border-radius:3px;width:80px;outline:none}
.corr-bar .b{padding:3px 8px;font-size:10px}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="hdr">
    <span class="brand">DIGIT FAI</span><span class="bsub">v4.2</span>
    <div class="tbar">
      <button class="b" id="btnOpen"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> 打开</button>
      <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp"/>
      <div class="sep"></div>
      <button class="b ba" id="btnAuto" disabled>&#9889; 自动气泡</button>
      <div class="sep"></div>
      <button class="b" id="btnTable" disabled>&#128202; 尺寸表</button>
      <button class="b" id="btnExport" disabled>&#8595; 导出</button>
      <div class="sep"></div>
      <button class="b" id="btnSave">&#128190;</button>
      <button class="b" id="btnLoad">&#128194;</button>
      <input type="file" id="projectInput" accept=".json"/>
    </div>
  </header>
  <aside class="lp">
    <div class="lps"><div class="lpt">页面</div><div id="pgList"><div style="color:var(--t3);font-size:10px;padding:4px 0">未加载</div></div></div>
    <div class="lpsc">
      <div class="lpt">工具</div>
      <div id="tlList">
        <div class="tl-item on" data-t="select"><span class="tl-i">&#8598;</span>选择/移动</div>
        <div class="tl-item" data-t="ocr"><span class="tl-i">&#128269;</span>框选识别+气泡</div>
        <div class="tl-item" data-t="region"><span class="tl-i">&#9645;</span>识别区域</div>
        <div class="tl-item" data-t="manual"><span class="tl-i">&#9998;</span>手动添加气泡</div>
      </div>
      <div style="margin-top:10px"><div class="lpt">识别区域</div><div id="regionList"><div style="color:var(--t3);font-size:10px">使用「识别区域」工具框选</div></div></div>
      <div style="margin-top:10px">
        <div class="lpt">OCR 预览</div>
        <div class="opv" id="ocrPrev"><span class="ph">框选后显示</span></div>
        <div class="ocr-val" id="ocrVal"></div>
        <div class="ocr-meta" id="ocrMeta"></div>
        <div class="corr-bar" id="corrBar" style="display:none">
          <span style="font-size:10px;color:var(--t3)">修正:</span>
          <input id="corrInput" placeholder="正确值"/>
          <button class="b bs ba" onclick="A.applyCorrection()">确认</button>
        </div>
      </div>
      <div style="margin-top:10px">
        <div class="lpt">OCR 设置 <span style="color:var(--ok);cursor:pointer;margin-left:4px" id="btnResetSet">&#8635;</span></div>
        <div class="pr"><label>分段</label><select id="sPSM"><option value="7">单行</option><option value="8">单词</option><option value="13" selected>原始行</option></select></div>
        <div class="pr"><label>放大</label><select id="sScale"><option value="1">1x</option><option value="2" selected>2x</option><option value="3">3x</option><option value="4">4x</option></select></div>
        <div class="pr"><label>二值化</label><input type="number" id="sThresh" value="200" min="0" max="255" step="5" style="width:50px"/></div>
        <div class="pr"><label>反色</label><select id="sInvert"><option value="0" selected>关</option><option value="1">开</option></select></div>
        <div class="pr"><label>多通道</label><select id="sMulti"><option value="1" selected>开</option><option value="0">关</option></select></div>
        <div class="pr"><label>自适应</label><select id="sAdapt"><option value="1" selected>开</option><option value="0">关</option></select></div>
        <div class="pr"><label>混淆</label><select id="sConfuse"><option value="1" selected>开</option><option value="0">关</option></select></div>
        <div style="margin-top:4px"><div class="lpt">自动模式</div></div>
        <div class="pr"><label>扫描</label><select id="sAutoMode"><option value="quick" selected>快捷0+90</option><option value="pro">专业0~270</option></select></div>
        <div style="margin-top:4px"><div class="lpt">方向</div></div>
        <div class="rg" id="rotG">
          <div class="rb on" data-r="auto"><span class="ri">&#9678;</span>自动</div>
          <div class="rb" data-r="0"><span class="ri">&#8594;</span>0</div>
          <div class="rb" data-r="90"><span class="ri">&#8593;</span>90</div>
          <div class="rb" data-r="180"><span class="ri">&#8592;</span>180</div>
          <div class="rb" data-r="270"><span class="ri">&#8595;</span>270</div>
          <div class="rb" data-r="custom"><span class="ri">&#8635;</span>自定义</div>
        </div>
        <div style="margin-top:4px"><div class="lpt">语言</div></div>
        <div class="pr"><label>语言</label><select id="sLang"><option value="eng" selected>English</option><option value="chi_sim">中文</option><option value="jpn">日本語</option><option value="deu">Deutsch</option></select></div>
      </div>
    </div>
  </aside>
  <div class="va" id="dropZone">
    <div class="drop-ov" id="dropOv"><span>释放文件</span></div>
    <div class="emp" id="empSt"><div class="ei">&#128208;</div><h2>打开工程图纸</h2><p>拖放 PDF / 图片到此处</p></div>
    <div class="vs" id="vs" style="display:none">
      <div class="vw" id="vw">
        <canvas id="pdfCanvas"></canvas>
        <svg id="bubbleSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="sel-rect" id="selRect"><div class="sh tl"></div><div class="sh tr"></div><div class="sh bl"></div><div class="sh br"></div></div>
      </div>
    </div>
    <div class="zb" id="zBar"><button onclick="A.zoomBy(-.15)">-</button><span id="zLv">100%</span><button onclick="A.zoomBy(.15)">+</button><button onclick="A.zoomFit()">[ ]</button></div>
  </div>
  <aside class="rp">
    <div class="rps">
      <div class="rpt">零件信息</div>
      <div class="pr"><label>供方</label><input id="iSupplier" list="supplierList" value="青岛海立泰新型复合材料有限公司" style="width:130px;font-size:9px"/><datalist id="supplierList"><option value="青岛海立泰新型复合材料有限公司"/></datalist></div>
      <div class="pr"><label>产品名</label><input id="iProdName" style="width:90px"/><button class="ocr-btn" onclick="A.startTextOCR('iProdName')" title="框选识别中文">&#128269;</button></div>
      <div class="pr"><label>图号</label><input id="iDW" style="width:90px"/><button class="ocr-btn" onclick="A.startTextOCR('iDW')" title="框选识别文字">&#128269;</button></div>
      <div class="pr"><label>版本</label><input id="iRV" style="width:50px"/></div>
      <div class="pr"><label>未注公差</label><input id="iTolStd" value="GB/T 1804-m" style="width:110px;font-size:9px"/></div>
      <div class="pr"><label>重要度</label><select id="iImportance" style="width:110px"><option value="A">A级(重要)</option><option value="B" selected>B级(一般)</option><option value="C">C级(次要)</option></select></div>
    </div>
    <div class="rps" id="bpPanel" style="display:none"><div class="rpt">气泡属性</div>
      <div class="pr"><label>编号</label><input id="bpN" type="number" style="width:46px"/></div>

</div>
<div class="modal-bg" id="expM"><div class="modal"><h3>导出</h3><div class="mr"><label>图片格式</label><select id="eFmt"><option value="png">PNG</option><option value="jpeg">JPEG</option></select></div><div class="ma"><button class="b" onclick="E('expM').classList.remove('show')">取消</button><button class="b" onclick="A.expCSV()">CSV</button><button class="b" onclick="A.expXLS()">Excel</button><button class="b ba" onclick="A.expPDF()">PDF</button><button class="b" onclick="A.expImg()">图片</button></div></div></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
var E = function(id){ return document.getElementById(id); };
var NS = 'http://www.w3.org/2000/svg';
function svgEl(t,a,txt){
  var e = document.createElementNS(NS, t);
  if(a) Object.keys(a).forEach(function(k){ e.setAttribute(k, a[k]); });
  if(txt !== undefined) e.textContent = txt;
  return e;
}

var TOL_GB = {
  linear:{
    f:[[.5,3,.05],[3,6,.05],[6,30,.1],[30,120,.15],[120,400,.2],[400,1e3,.3],[1e3,2e3,.5]],
    m:[[.5,3,.1],[3,6,.1],[6,30,.2],[30,120,.3],[120,400,.5],[400,1e3,.8],[1e3,2e3,1.2],[2e3,4e3,2]],
    c:[[.5,3,.2],[3,6,.3],[6,30,.5],[30,120,.8],[120,400,1.2],[400,1e3,2],[1e3,2e3,3],[2e3,4e3,4]],
    v:[[3,6,.5],[6,30,1],[30,120,1.5],[120,400,2.5],[400,1e3,4],[1e3,2e3,6],[2e3,4e3,8]]
  },
  radius:{
    f:[[.5,3,.2],[3,6,.5],[6,30,1],[30,1e4,2]],
    m:[[.5,3,.4],[3,6,1],[6,30,2],[30,1e4,4]]
  }
};

function lookupGB(nom, grade, isR){
  var n = parseFloat(nom);
  if(isNaN(n) || n <= 0) return null;
  var tbl = isR ? TOL_GB.radius[grade] : TOL_GB.linear[grade];
  if(!tbl) return null;
  for(var i = 0; i < tbl.length; i++){
    if(n > tbl[i][0] && n <= tbl[i][1]) return tbl[i][2];
  }
  return null;
}

function parseStdGrade(){
  var m = E('iTolStd').value.match(/1804[-\s]*([fmvc])/i);
  return m ? m[1].toLowerCase() : 'm';
}

function fmtLim(nomS, tolS){
  if(!tolS || tolS === '0') return nomS;
  var n = parseFloat(nomS), t = parseFloat(tolS);
  if(isNaN(n) || isNaN(t)) return tolS;
  return parseFloat((n + t).toFixed(4)).toString();
}

function getEquip(type, nom){
  var n = parseFloat(nom);
  if(type === 'angle') return '角度尺';
  if(type === 'radius' || type === 'chamfer') return 'R规';
  if((type === 'linear' || type === 'diameter') && !isNaN(n) && n > 30) return '卷尺';
  return '游标卡尺';
}

function nomDisplay(dim){
  var pre = '';
  if(dim.type === 'diameter') pre = '\u2300';
  else if(dim.type === 'radius') pre = 'R';
  else if(dim.type === 'chamfer') pre = 'C';
  var suf = dim.type === 'angle' ? '\u00B0' : '';
  var g = dim.gdt ? ' ' + dim.gdt : '';
  return pre + (dim.nominal||'') + suf + g;
}

var A = {
  pdf:null, isImg:false, imgEl:null, pg:1, total:0, scale:1.0,
  tool:'select', rot:'auto', autoMode:'quick',
  ocrBusy:false, selecting:false, selS:null, selE:null,
  regions:[], dims:[], selId:null, nextN:1, recycled:[],
  textItems:[], lastOCR:null, lastDimId:null,
  panSt:null, cv:null, cx:null, sr:null, textOcrTarget:null, dragSt:null, justDraggedBub:false,
  marks:[], selMarkId:null, markDragSt:null, selAngle:0,

  init:function(){
    this.cv = E('pdfCanvas');
    this.cx = this.cv.getContext('2d', {willReadFrequently:true});
    this.sr = E('selRect');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    this.loadSets();
    this.bindEvts();
    this.log('v4.2 就绪', 'ok');
  },

  loadSets:function(){
    var s = {};
    try{ s = JSON.parse(localStorage.getItem('digiFAI_v42') || '{}'); }catch(e){}
    var v = function(k){ return s[k] !== undefined ? s[k] : ''; };
    if(v('psm')) E('sPSM').value = v('psm');
    if(v('scale')) E('sScale').value = v('scale');
    if(v('thresh')) E('sThresh').value = v('thresh');
    if(v('invert')) E('sInvert').value = v('invert');
    if(v('multi')) E('sMulti').value = v('multi');
    if(v('adapt')) E('sAdapt').value = v('adapt');
    if(v('confuse')) E('sConfuse').value = v('confuse');
    if(v('lang')) E('sLang').value = v('lang');
    if(v('autoMode')) E('sAutoMode').value = v('autoMode');
    this.rot = v('rot') || 'auto';
    this.autoMode = v('autoMode') || 'quick';
    E('rotG').querySelectorAll('.rb').forEach(function(b){
      b.classList.toggle('on', b.dataset.r === A.rot);
    });
    if(v('supplier')) E('iSupplier').value = v('supplier');
    if(v('tolStd')) E('iTolStd').value = v('tolStd');
  },

  saveSets:function(){
    var s = {
      psm:E('sPSM').value, scale:E('sScale').value, thresh:E('sThresh').value,
      invert:E('sInvert').value, multi:E('sMulti').value, adapt:E('sAdapt').value,
      confuse:E('sConfuse').value, lang:E('sLang').value, rot:this.rot,
      autoMode:this.autoMode,
      supplier:E('iSupplier').value, tolStd:E('iTolStd').value
    };
    localStorage.setItem('digiFAI_v42', JSON.stringify(s));
  },

  bindEvts:function(){
    var self = this;
    E('btnOpen').onclick = function(){ E('fileInput').click(); };
    E('fileInput').addEventListener('change', function(e){
      if(e.target.files[0]) self.loadFile(e.target.files[0]);
    });
    E('btnAuto').onclick = function(){ self.autoBubble(); };
    E('btnTable').onclick = function(){ E('app').classList.toggle('open'); };
    E('btnExport').onclick = function(){ E('expM').classList.add('show'); };
    E('btnSave').onclick = function(){ self.saveProj(); };
    E('btnLoad').onclick = function(){ E('projectInput').click(); };
    E('projectInput').addEventListener('change', function(e){
      if(e.target.files[0]) self.loadProj(e.target.files[0]);
    });
    E('btnResetSet').onclick = function(){
      localStorage.removeItem('digiFAI_v42');
      self.loadSets();
      self.toast('已恢复默认');
    };
    var sids = ['sPSM','sScale','sThresh','sInvert','sMulti','sAdapt','sConfuse','sLang','sAutoMode'];
    sids.forEach(function(id){
      E(id).addEventListener('change', function(){
        if(id === 'sAutoMode') self.autoMode = E('sAutoMode').value;
        self.saveSets();
      });
    });
    E('iSupplier').addEventListener('change', function(){ self.saveSets(); });
    E('iTolStd').addEventListener('change', function(){ self.saveSets(); });
    E('bpTol').addEventListener('change', function(){
      var grade = E('bpTol').value;
      var isCustom = (grade === 'custom');
      var isLocked = (grade !== '' && grade !== 'custom');
      E('bpU').readOnly = isLocked;
      E('bpL').readOnly = isLocked;
      if(isCustom){
        E('bpU').classList.add('custom-tol');
        E('bpL').classList.add('custom-tol');
      } else {
        E('bpU').classList.remove('custom-tol');
        E('bpL').classList.remove('custom-tol');
      }
      if(grade === 'diam' || grade === 'cham'){
        self.saveBubble();
      }
    });
    var dz = E('dropZone'), dc = 0;
    dz.addEventListener('dragenter', function(e){ e.preventDefault(); dc++; E('dropOv').classList.add('on'); });
    dz.addEventListener('dragleave', function(e){ e.preventDefault(); dc--; if(dc<=0){dc=0; E('dropOv').classList.remove('on');} });
    dz.addEventListener('dragover', function(e){ e.preventDefault(); });
    dz.addEventListener('drop', function(e){
      e.preventDefault(); dc=0; E('dropOv').classList.remove('on');
      if(e.dataTransfer.files[0]) self.loadFile(e.dataTransfer.files[0]);
    });
    E('tlList').addEventListener('click', function(e){
      var el = e.target.closest('.tl-item');
      if(el) self.setTool(el.dataset.t);
    });
    E('rotG').addEventListener('click', function(e){
      var b = e.target.closest('.rb');
      if(!b) return;
      E('rotG').querySelectorAll('.rb').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
      self.rot = b.dataset.r;
      self.saveSets();
    });
    this.cv.addEventListener('mousedown', function(e){ self.onCvDown(e); });
    this.cv.addEventListener('mousemove', function(e){ self.onCvMove(e); });
    this.cv.addEventListener('mouseup', function(e){ self.onCvUp(e); });
    this.cv.addEventListener('contextmenu', function(e){ e.preventDefault(); self.cancelSel(); });
    document.getElementById('bubbleSvg').addEventListener('mousedown', function(e){
      var t = e.target;
      if(t.closest('.mark-g')){ self.onMarkDown(e); return; }
      self.onBubDown(e);
    });
    document.getElementById('bubbleSvg').addEventListener('dblclick', function(e){
      var t = e.target;
      var g = t.closest('.mark-g');
      if(g){ self.onMarkDblClick(g); }
    });
    document.addEventListener('mousemove', function(e){
      if(A.markDragSt){ A.onMarkMove(e); return; }
      A.onBubMove(e);
    });
    document.addEventListener('mouseup', function(e){
      if(A.markDragSt){ A.onMarkUp(); return; }
      A.onBubUp(e);
    });
    var vs = E('vs');
    vs.addEventListener('wheel', function(e){
      e.preventDefault();
      if(!self.pdf && !self.isImg) return;
      var o = self.scale;
      self.scale = Math.max(.15, Math.min(8, self.scale + (e.deltaY > 0 ? -.12 : .12)));
      var r = self.scale / o, rt = vs.getBoundingClientRect();
      var mx = e.clientX - rt.left + vs.scrollLeft;
      var my = e.clientY - rt.top + vs.scrollTop;
      self.renderPage().then(function(){
        vs.scrollLeft = mx * r - (e.clientX - rt.left);
        vs.scrollTop = my * r - (e.clientY - rt.top);
      });
    }, {passive:false});
    vs.addEventListener('mousedown', function(e){
      if(e.button === 1 || (e.button === 0 && e.altKey)){
        e.preventDefault();
        self.panSt = {x:e.clientX, y:e.clientY, sl:vs.scrollLeft, st:vs.scrollTop};
        vs.style.cursor = 'grabbing';
      }
    });
    document.addEventListener('mousemove', function(e){
      if(!self.panSt) return;
      vs.scrollLeft = self.panSt.sl - (e.clientX - self.panSt.x);
      vs.scrollTop = self.panSt.st - (e.clientY - self.panSt.y);
    });
    document.addEventListener('mouseup', function(){
      if(self.panSt){ self.panSt = null; E('vs').style.cursor = ''; }
    });
    document.addEventListener('keydown', function(e){
      if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.isContentEditable) return;
      if(e.key === 'Escape'){ self.cancelSel(); self.deselBub(); self.cancelTextOCR(); self.deselMark(); }
      if((e.key === 'Backspace' || e.key === 'Delete') && self.selId !== null){ e.preventDefault(); self.delSel(); }
      if((e.key === 'Backspace' || e.key === 'Delete') && self.selMarkId !== null){ e.preventDefault(); self.delMark(); }
      if(e.key === '+' || e.key === '='){ e.preventDefault(); self.zoomBy(.15); }
      if(e.key === '-'){ e.preventDefault(); self.zoomBy(-.15); }
    });
    document.addEventListener('dragover', function(e){ e.preventDefault(); });
    document.addEventListener('drop', function(e){ e.preventDefault(); });
  },

  startTextOCR:function(fieldId){
    this.textOcrTarget = fieldId;
    this.setTool('textocr');
    this.toast('在图纸上框选文字');
    document.querySelectorAll('.ocr-btn').forEach(function(b){ b.classList.remove('active'); });
    var btn = E(fieldId).parentElement.querySelector('.ocr-btn');
    if(btn) btn.classList.add('active');
  },
  cancelTextOCR:function(){
    this.textOcrTarget = null;
    document.querySelectorAll('.ocr-btn').forEach(function(b){ b.classList.remove('active'); });
  },
  performTextOCR:function(){
    if(!this.textOcrTarget || this.ocrBusy) return;
    var self = this, target = self.textOcrTarget;
    self.ocrBusy = true;
    self.setStatus('y', '文字识别...');
    var proc = self.cropAndProc(0, undefined, 'global');
    var isCN = (target === 'iProdName');
    var opts = {tessedit_pageseg_mode: isCN ? '6' : '7'};
    if(!isCN) opts.tessedit_char_whitelist = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_. /()\u00B1\u00D8\u00F8\u2300\u03A6\u03C6Rrc半直径';
    Tesseract.recognize(proc, isCN ? 'chi_sim+eng' : 'eng', opts).then(function(res){
      var text = (res.data.text || '').trim().replace(/[\n\r]+/g, ' ');
      text = text.replace(/([\u4e00-\u9fff])\s+([\u4e00-\u9fff])/g, '$1$2');
      text = text.replace(/([\u4e00-\u9fff])\s+([\u4e00-\u9fff])/g, '$1$2');
      E(target).value = text;
      self.log('文字: "' + text + '"', 'ok');
      self.toast('已识别: ' + text);
      self.setStatus('g', '完成');
      self.ocrBusy = false;
      self.cancelSel(); self.cancelTextOCR(); self.setTool('select');
    }).catch(function(){
      self.ocrBusy = false;
      self.setStatus('r', '错误');
      self.cancelTextOCR();
    });
  },

  loadFile:function(f){
    var n = f.name.toLowerCase();
    if(n.endsWith('.pdf')) this.loadPDF(f);
    else if(/\.(png|jpe?g|tif{1,2}|bmp)$/.test(n)) this.loadImg(f);
    else this.toast('不支持的格式');
  },
  loadPDF:function(f){
    var self = this;
    self.setStatus('y', '加载中...');
    f.arrayBuffer().then(function(b){
      return pdfjsLib.getDocument({data:b}).promise;
    }).then(function(p){
      self.pdf = p; self.total = p.numPages; self.pg = 1; self.isImg = false;
      self.showView(); self.renderPgList();
      return self.renderPage();
    }).then(function(){
      self.log(self.total + '页加载完成', 'ok');
      self.setStatus('g', '就绪');
      self.enableBtns();
    }).catch(function(){
      self.log('加载失败', 'err');
      self.setStatus('r', '错误');
    });
  },
  loadImg:function(f){
    var self = this;
    var img = new Image(), url = URL.createObjectURL(f);
    img.onload = function(){
      self.pdf = null; self.isImg = true; self.imgEl = img;
      self.total = 1; self.pg = 1;
      self.showView(); self.renderPgList();
      self.renderPage().then(function(){
        self.setStatus('g', '就绪');
        self.enableBtns();
        URL.revokeObjectURL(url);
      });
    };
    img.src = url;
  },
  showView:function(){
    E('empSt').classList.add('hid');
    E('vs').style.display = '';
    E('zBar').classList.add('show');
    E('app').classList.add('open');
  },
  enableBtns:function(){
    E('btnAuto').disabled = false;
    E('btnTable').disabled = false;
    E('btnExport').disabled = false;
  },

  renderPage:function(){
    var self = this;
    if(self.isImg) return self.renderImgPage();
    if(!self.pdf) return Promise.resolve();
    return self.pdf.getPage(self.pg).then(function(page){
      var vp = page.getViewport({scale: self.scale});
      var dpr = window.devicePixelRatio || 1;
      self.cv.width = vp.width * dpr;
      self.cv.height = vp.height * dpr;
      self.cv.style.width = vp.width + 'px';
      self.cv.style.height = vp.height + 'px';
      self.cx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return page.render({canvasContext:self.cx, viewport:vp}).promise.then(function(){
        self.cx.setTransform(1, 0, 0, 1, 0, 0);
        self.updOverlay(vp.width, vp.height);
        return self.extractText();
      });
    });
  },
  renderImgPage:function(){
    var self = this, img = self.imgEl;
    var w = img.width * self.scale, h = img.height * self.scale;
    var dpr = window.devicePixelRatio || 1;
    self.cv.width = w * dpr; self.cv.height = h * dpr;
    self.cv.style.width = w + 'px'; self.cv.style.height = h + 'px';
    self.cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    self.cx.imageSmoothingEnabled = true;
    self.cx.imageSmoothingQuality = 'high';
    self.cx.drawImage(img, 0, 0, w, h);
    self.cx.setTransform(1, 0, 0, 1, 0, 0);
    self.updOverlay(w, h);
    self.textItems = [];
    return Promise.resolve();
  },
  updOverlay:function(w, h){
    var svg = document.getElementById('bubbleSvg');
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);
    svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
    this.deselBub();
    this.renderRegions();
    this.renderMarks();
    this.renderBubbles();
    this.cancelSel();
    E('zLv').textContent = Math.round(this.scale * 100) + '%';
    this.updStatus();
  },
  renderPgList:function(){
    var el = E('pgList'), self = this;
    el.innerHTML = '';
    for(var i = 1; i <= self.total; i++){
      (function(p){
        var d = document.createElement('div');
        d.className = 'pg-item' + (p === self.pg ? ' on' : '');
        d.innerHTML = '<span class="pg-n">' + p + '</span>第' + p + '页';
        d.onclick = function(){ self.pg = p; self.renderPage(); self.renderPgList(); };
        el.appendChild(d);
      })(i);
    }
  },
  extractText:function(){
    var self = this;
    self.textItems = [];
    if(!self.pdf) return Promise.resolve();
    return self.pdf.getPage(self.pg).then(function(page){
      return page.getTextContent().then(function(tc){
        var s = self.scale, vp = page.getViewport({scale:1});
        self.textItems = tc.items.filter(function(i){ return i.str.trim(); }).map(function(item){
          return {
            text: item.str.trim(),
            x: item.transform[4] * s,
            y: (vp.height - item.transform[5]) * s,
            w: item.width * s,
            h: (item.height || Math.abs(item.transform[3])) * s
          };
        });
      });
    }).catch(function(){});
  },
  zoomBy:function(d){
    this.scale = Math.max(.15, Math.min(8, this.scale + d));
    this.renderPage();
  },
  zoomFit:function(){
    var self = this, vs = E('vs');

  getPos:function(e){

  onCvDown:function(e){
    if((!this.pdf && !this.isImg) || this.ocrBusy || this.panSt || e.button !== 0 || this.justDraggedBub) return;
    var p = this.getPos(e);
    this.deselMark();
    if(this.tool === 'region' || this.tool === 'ocr' || this.tool === 'textocr' || this.tool === 'manual'){
      this.selecting = true;

  onCvUp:function(){
    if(!this.selecting) return;

    var w = Math.abs(this.selE.x - this.selS.x);
    var h = Math.abs(this.selE.y - this.selS.y);
    if(w < 4 || h < 4){ this.cancelSel(); return; }
    if(this.tool === 'region'){
      this.addRegion(Math.min(this.selS.x, this.selE.x), Math.min(this.selS.y, this.selE.y), w, h);

        var sy = Math.min(this.selS.y, this.selE.y) / this.scale;

        this.cancelSel();

  cropAndProc:function(angle, thresh, mode){
    var dpr = window.devicePixelRatio || 1;
    var sc = parseInt(E('sScale').value);
    if(thresh === undefined) thresh = parseInt(E('sThresh').value);
    var inv = E('sInvert').value === '1';
    var useAdapt = E('sAdapt').value === '1';
    var sx = Math.min(this.selS.x, this.selE.x) * dpr;
    var sy = Math.min(this.selS.y, this.selE.y) * dpr;
    var sw = Math.abs(this.selE.x - this.selS.x) * dpr;
    var sh = Math.abs(this.selE.y - this.selS.y) * dpr;
    var swap = (angle === 90 || angle === 270);
    var outW = Math.round((swap ? sh : sw) * sc);
    var outH = Math.round((swap ? sw : sh) * sc);
    var off = document.createElement('canvas');
    off.width = outW; off.height = outH;
    var oc = off.getContext('2d', {willReadFrequently:true});
    oc.fillStyle = '#fff'; oc.fillRect(0, 0, outW, outH);
    oc.save();
    oc.imageSmoothingEnabled = true; oc.imageSmoothingQuality = 'high';
    if(angle === 0) oc.drawImage(this.cv, sx, sy, sw, sh, 0, 0, outW, outH);
    else if(angle === 90){ oc.translate(outW, 0); oc.rotate(Math.PI/2); oc.drawImage(this.cv, sx, sy, sw, sh, 0, 0, outH, outW); }
    else if(angle === 180){ oc.translate(outW, outH); oc.rotate(Math.PI); oc.drawImage(this.cv, sx, sy, sw, sh, 0, 0, outW, outH); }
    else if(angle === 270){ oc.translate(0, outH); oc.rotate(-Math.PI/2); oc.drawImage(this.cv, sx, sy, sw, sh, 0, 0, outH, outW); }
    oc.restore();
    if(mode === 'sharpen') this.sharpenCanvas(off);
    if(useAdapt && mode !== 'global'){
      var bs = Math.max(15, Math.round(Math.min(outW, outH) / 8) | 1);
      var C = mode === 'aggressive' ? 15 : 8;
      oc.putImageData(this.adaptiveThresh(off, bs | 1, C), 0, 0);
    } else {
      var imgData = oc.getImageData(0, 0, outW, outH), d = imgData.data;
      for(var i = 0; i < d.length; i += 4){
        var g = d[i] * .299 + d[i+1] * .587 + d[i+2] * .114;
        if(inv) g = 255 - g;
        var v = g < thresh ? 0 : 255;
        d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
      }
      oc.putImageData(imgData, 0, 0);
    }
    return off;
  },
  adaptiveThresh:function(cv, bs, C){
    var w = cv.width, h = cv.height;
    var src = cv.getContext('2d', {willReadFrequently:true}).getImageData(0, 0, w, h);
    var dst = new ImageData(w, h);
    var gray = new Uint8Array(w * h);
    for(var i = 0; i < w * h; i++) gray[i] = Math.round(src.data[i*4]*.299 + src.data[i*4+1]*.587 + src.data[i*4+2]*.114);
    var integ = new Float64Array(w * h);
    for(var y = 0; y < h; y++){
      var rs = 0;
      for(var x = 0; x < w; x++){
        rs += gray[y*w+x];
        integ[y*w+x] = rs + (y > 0 ? integ[(y-1)*w+x] : 0);
      }
    }
    var half = Math.floor(bs/2);
    for(var y = 0; y < h; y++){
      for(var x = 0; x < w; x++){
        var x1 = Math.max(0, x-half), y1 = Math.max(0, y-half);
        var x2 = Math.min(w-1, x+half), y2 = Math.min(h-1, y+half);
        var cnt = (x2-x1+1)*(y2-y1+1);
        var sum = integ[y2*w+x2];
        if(x1>0) sum -= integ[y2*w+(x1-1)];
        if(y1>0) sum -= integ[(y1-1)*w+x2];
        if(x1>0 && y1>0) sum += integ[(y1-1)*w+(x1-1)];
        var idx = (y*w+x)*4;
        var v = gray[y*w+x] > sum/cnt - C ? 255 : 0;
        dst.data[idx] = dst.data[idx+1] = dst.data[idx+2] = v;
        dst.data[idx+3] = 255;
      }
    }
    return dst;
  },
  sharpenCanvas:function(cv){
    var w = cv.width, h = cv.height;
    var cx = cv.getContext('2d', {willReadFrequently:true});
    var src = cx.getImageData(0, 0, w, h);
    var dst = cx.createImageData(w, h);
    for(var y = 1; y < h-1; y++){
      for(var x = 1; x < w-1; x++){
        for(var c = 0; c < 3; c++){
          var i = (y*w+x)*4+c;
          var v = 5*src.data[i] - src.data[((y-1)*w+x)*4+c] - src.data[((y+1)*w+x)*4+c] - src.data[(y*w+(x-1))*4+c] - src.data[(y*w+(x+1))*4+c];
          dst.data[i] = Math.max(0, Math.min(255, v));
        }
      }
    }
    for(var y = 0; y < h; y++) for(var x = 0; x < w; x++) dst.data[(y*w+x)*4+3] = 255;
    cx.putImageData(dst, 0, 0);
    return cv;
  },
  otsuThresh:function(cv){
    var cx = cv.getContext('2d', {willReadFrequently:true});
    var id = cx.getImageData(0, 0, cv.width, cv.height), d = id.data;
    var hist = new Array(256).fill(0);
    for(var i = 0; i < d.length; i += 4) hist[Math.round(d[i]*.299+d[i+1]*.587+d[i+2]*.114)]++;
    var total = d.length/4, sum = 0;
    for(var i = 0; i < 256; i++) sum += i * hist[i];
    var sB = 0, wB = 0, mxV = 0, th = 0;
    for(var i = 0; i < 256; i++){
      wB += hist[i]; if(!wB) continue;
      var wF = total - wB; if(!wF) break;
      sB += i * hist[i];
      var mB = sB/wB, mF = (sum-sB)/wF;
      var vb = wB*wF*(mB-mF)*(mB-mF);
      if(vb > mxV){ mxV = vb; th = i; }
    }
    return th;
  },
  autoCrop:function(cv){
    var cx = cv.getContext('2d', {willReadFrequently:true});
    var id = cx.getImageData(0, 0, cv.width, cv.height), d = id.data;
    var x1 = cv.width, y1 = cv.height, x2 = 0, y2 = 0;
    for(var y = 0; y < cv.height; y++) for(var x = 0; x < cv.width; x++){
      var i = (y*cv.width+x)*4;
      if(d[i] < 250){ x1=Math.min(x1,x); y1=Math.min(y1,y); x2=Math.max(x2,x); y2=Math.max(y2,y); }
    }
    if(x1 > x2) return cv;
    var p = 6;
    var cx0 = Math.max(0,x1-p), cy0 = Math.max(0,y1-p);
    var cw = Math.min(cv.width-cx0, x2-x1+2*p), ch = Math.min(cv.height-cy0, y2-y1+2*p);
    var out = document.createElement('canvas'); out.width = cw; out.height = ch;
    out.getContext('2d').drawImage(cv, cx0, cy0, cw, ch, 0, 0, cw, ch);
    return out;
  },
  getContentBounds:function(cv){
    var cx = cv.getContext('2d', {willReadFrequently:true});
    var id = cx.getImageData(0, 0, cv.width, cv.height), d = id.data;
    var x1 = cv.width, y1 = cv.height, x2 = 0, y2 = 0;
    for(var y = 0; y < cv.height; y++) for(var x = 0; x < cv.width; x++){
      var i = (y*cv.width+x)*4;
      if(d[i] < 250){ x1=Math.min(x1,x); y1=Math.min(y1,y); x2=Math.max(x2,x); y2=Math.max(y2,y); }
    }
    if(x1 > x2) return null;
    return {x:x1, y:y1, w:x2-x1+1, h:y2-y1+1};
  },
  analyzeShape:function(cv){
    var ctx = cv.getContext('2d'), w = cv.width, h = cv.height;
    var data = ctx.getImageData(0, 0, w, h).data;
    var minX=w, minY=h, maxX=0, maxY=0;
    for(var y = 0; y < h; y++) for(var x = 0; x < w; x++){
      if(data[(y*w+x)*4] < 128){ minX=Math.min(minX,x); minY=Math.min(minY,y); maxX=Math.max(maxX,x); maxY=Math.max(maxY,y); }
    }
    var dw = maxX-minX+1, dh = maxY-minY+1;
    if(dw < 3 || dh < 8) return null;
    var whRatio = dw/dh;
    var topEnd = minY + Math.floor(dh*.28), maxTopRun = 0;
    for(var y = minY; y <= topEnd; y++){
      var run = 0;
      for(var x = minX; x <= maxX; x++){
        if(data[(y*w+x)*4] < 128){ run++; maxTopRun = Math.max(maxTopRun, run); } else { run = 0; }
      }
    }
    var tlEnd = minY + Math.floor(dh*.35), tlMid = minX + Math.floor(dw*.45);
    var tlD = 0, tlT = 0;
    for(var y = minY; y <= tlEnd; y++) for(var x = minX; x <= tlMid; x++){ tlT++; if(data[(y*w+x)*4] < 128) tlD++; }
    var blStart = minY + Math.floor(dh*.65), blMid = minX + Math.floor(dw*.45);
    var blD = 0, blT = 0;
    for(var y = blStart; y <= maxY; y++) for(var x = minX; x <= blMid; x++){ blT++; if(data[(y*w+x)*4] < 128) blD++; }
    var midY = minY + Math.floor(dh*.5), midD = 0, midT = 0;
    for(var y = midY-1; y <= midY+1; y++) for(var x = minX; x <= maxX; x++){ midT++; if(data[(y*w+x)*4] < 128) midD++; }
    var rightEnd = minX + Math.floor(dw*.65), rightD = 0, rightT = 0;
    for(var y = minY; y <= maxY; y++) for(var x = rightEnd; x <= maxX; x++){ rightT++; if(data[(y*w+x)*4] < 128) rightD++; }
    var holePresent = midD / (midT||1) < .15;
    return {whRatio:whRatio, topHorizRatio:maxTopRun/dw, tlDensity:tlD/(tlT||1), blDensity:blD/(blT||1), midDensity:midD/(midT||1), rightDensity:rightD/(rightT||1), holePresent:holePresent};
  },
  correctDigits:function(cv, text){
    if(!text || E('sConfuse').value !== '1') return text;
    var shape = this.analyzeShape(cv);
    if(!shape) return text;
    var r = text;
    if(text.length === 1){
      var ratio = shape.whRatio;
      var top = shape.topHorizRatio;
      var tl = shape.tlDensity;
      var bl = shape.blDensity;
      var mid = shape.midDensity;
      var hole = shape.holePresent;
      if(ratio < .30 && top < .30){ r = '1'; }
      else if(ratio < .32 && top < .35){ if(r === '7' || r === '1') r = '1'; }
      else if(ratio > .45 || top > .48){ if(r === '1' || r === '7') r = '7'; }
      var diff = tl - bl;
      if(diff > .18){ if(r === '2') r = '5'; else if(r === '5') r = '2'; }
      else if(diff < -.18){ if(r === '5') r = '2'; else if(r === '2') r = '5'; }
      if(ratio > .60 && ratio < .80 && mid > .20){ if(r === '8') r = '0'; else if(r === '0') r = '8'; }
      if(ratio > .55 && hole && mid < .25){ if(r === '6' || r === '8') r = '8'; }
      if(ratio > .50 && !hole && mid < .15){ if(r === '0' || r === '6') r = '6'; }
      if(ratio > .70 && tl > .30 && bl > .25 && mid < .20){ if(r === '3') r = '8'; else if(r === '8') r = '3'; }
      if(shape.rightDensity > .40 && ratio < .55){ if(r === '4') r = '1'; }
      if(ratio > .80 && top < .20 && bl > .30){ if(r === '2') r = '3'; }
      if(ratio < .45 && top > .50){ if(r === '4') r = '7'; }
      if(ratio > .65 && ratio < .85 && tl > .20 && bl < .15){ if(r === '2') r = '7'; }
    }
    if(r !== text) this.log('混淆纠正: "' + text + '" -> "' + r + '"', 'ok');
    return r;
  },

  loadLearn:function(){ try{ return JSON.parse(localStorage.getItem('digiFAI_learn_v42') || '{}'); }catch(e){ return {}; } },
  saveLearn:function(raw, corrected, angle){
    var L = this.loadLearn(), k = raw + '@' + angle;
    if(!L[k]) L[k] = {n:0, v:{}};
    L[k].n++;
    L[k].v[corrected] = (L[k].v[corrected] || 0) + 1;
    if(Object.keys(L).length > 500){
      var keys = Object.keys(L);
      for(var i = 0; i < 100; i++) delete L[keys[i]];
    }
    localStorage.setItem('digiFAI_learn_v42', JSON.stringify(L));
  },
  getLearn:function(raw, angle){
    var L = this.loadLearn(), k = raw + '@' + angle, e = L[k];
    if(!e || e.n < 1) return null;
    var best = '', bc = 0;
    Object.keys(e.v).forEach(function(v){ if(e.v[v] > bc){ bc = e.v[v]; best = v; } });
    return best || null;
  },
  applyCorrection:function(){
    var val = E('corrInput').value.trim();
    if(!val || !this.lastOCR) return;
    this.saveLearn(this.lastOCR.value, val, this.lastOCR.angle);
    this.log('学习: "' + this.lastOCR.value + '" -> "' + val + '"', 'ok');
    var dim = this.dims.find(function(d){ return d.id === A.lastDimId; });
    if(dim){
      var parsed = this.parseDim(val);
      dim.nominal = parsed.nom;
      dim.type = parsed.type;
      dim.upperTol = parsed.up;
      dim.lowerTol = parsed.lo;
      dim.tolGrade = '';
      dim.tolValue = 0;
      dim.tolDisplay = '';
      dim.equipment = getEquip(parsed.type, parsed.nom);
      this.autoTol(dim);
      E('ocrVal').textContent = val;
      if(this.selId === dim.id){
        E('bpV').value = dim.nominal;
        E('bpU').value = dim.upperTol;
        E('bpL').value = dim.lowerTol;
        E('bpT').value = dim.type;
        E('bpTol').value = dim.tolGrade || '';
        E('bpEquip').value = dim.equipment || '';
      }
      this.renderTable();
      this.toast('已修正: ' + val);
    }
    E('corrBar').style.display = 'none';
  },

  ocrPass:function(cv, psm, lang){
    var whitelist = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz.-+/\u00B1\u00D8\u00F8\u2300\u03A6\u03C6RrcCDIA径直径半';
    return Tesseract.recognize(cv, lang || 'eng', {
      tessedit_pageseg_mode: psm,
      tessedit_char_whitelist: whitelist
    }).then(function(res){
      return {
        text: (res.data.text || '').trim(),
        confidence: res.data.confidence,
        words: res.data.words || []
      };
    });
  },
  extractDigits:function(raw){
    var t = raw.trim();
    t = t.replace(/\b([RrPp])\s*([l1Ii|])(\d)/g, function(m,p,c,d){ return p + '1' + d; });
    t = t.replace(/\b([RrPp])([l1Ii|])\b/g, function(m,p,c){ return p + '1'; });
    var rc = t.match(/[Rr]\s*(\d+\.?\d*)/);
    if(rc) return 'R' + rc[1].replace(/1/g,'l');
    var cc = t.match(/[Cc]\s*(\d+\.?\d*)/);
    if(cc) return 'C' + cc[1];
    var diamChars = /[\u03A6\u03C6\u03D5\u00F8\u00D8\u2300]/;
    if(diamChars.test(t)){
      var dm = t.match(/[\u03A6\u03C6\u03D5\u00F8\u00D8\u2300]\s*(\d+\.?\d*)/);
      if(dm) return '\u2300' + dm[1];
      var dm2 = t.match(/(\d+\.?\d*)\s*[\u03A6\u03C6\u03D5\u00F8\u00D8\u2300]/);
      if(dm2) return '\u2300' + dm2[1];
    }
    var diaWords = /(?:DIA|Diam|直径|径|Phi|PHI)\s*[.:]?\s*(\d+\.?\d*)/i;
    var dm3 = t.match(diaWords);
    if(dm3) return '\u2300' + dm3[1];
    var od = t.match(/^[oO0Q]\s*(\d+\.?\d*)/);
    if(od) return '\u2300' + od[1];
    var sym = t.match(/^(\S)\s*(\d+\.?\d*)/);
    if(sym){
      var c = sym[1];
      if(/[oO0Q\u00D8\u00F8]/i.test(c)) return '\u2300' + sym[2];
    }
    var am = t.match(/(\d+\.?\d*)\s*[\u00B0]/);
    if(am) return am[1] + '\u00B0';
    var d = t.replace(/[^0-9.\-+\u00B1]/g, ' ').trim();
    var m = d.match(/-?\d+\.?\d*/g);
    if(m && m.length > 0) return m[0];
    return '';
  },
  multiPassOCR:function(angle){
    var self = this;
    var psm = E('sPSM').value, lang = E('sLang').value;
    var useMulti = E('sMulti').value === '1';
    var baseThresh = parseInt(E('sThresh').value);
    var p1 = self.cropAndProc(angle, baseThresh, 'global');
    return self.ocrPass(p1, psm, lang).then(function(r1){
      var d1 = self.correctDigits(p1, self.extractDigits(r1.text));
      if(!useMulti) return {text:d1, confidence:r1.confidence, preview:self.autoCrop(p1), words:r1.words};
      if(d1 && r1.confidence >= 80) return {text:d1, confidence:r1.confidence, preview:self.autoCrop(p1), words:r1.words};
      var p2 = self.cropAndProc(angle, baseThresh, 'adaptive');
      return self.ocrPass(p2, psm, lang).then(function(r2){
        var d2 = self.correctDigits(p2, self.extractDigits(r2.text));
        if(d1 && d1 === d2 && r2.confidence >= 70) return {text:d1, confidence:(r1.confidence+r2.confidence)/2, preview:self.autoCrop(p2), words:r1.words};
        var otsu = self.otsuThresh(self.cropAndProc(angle, 0, 'global'));
        var p3 = self.cropAndProc(angle, otsu, 'global');
        return self.ocrPass(p3, psm, lang).then(function(r3){
          var d3 = self.correctDigits(p3, self.extractDigits(r3.text));
          var p4 = self.cropAndProc(angle, baseThresh, 'sharpen');
          return self.ocrPass(p4, psm, lang).then(function(r4){
            var d4 = self.correctDigits(p4, self.extractDigits(r4.text));
            var origI = E('sInvert').value;
            E('sInvert').value = origI === '0' ? '1' : '0';
            var p5 = self.cropAndProc(angle, baseThresh, 'global');
            E('sInvert').value = origI;
            return self.ocrPass(p5, psm, lang).then(function(r5){
              var d5 = self.correctDigits(p5, self.extractDigits(r5.text));
              var all = [
                {t:d1,c:r1.confidence,p:p1,w:r1.words},
                {t:d2,c:r2.confidence,p:p2,w:r2.words},
                {t:d3,c:r3.confidence,p:p3,w:r3.words},
                {t:d4,c:r4.confidence,p:p4,w:r4.words},
                {t:d5,c:r5.confidence,p:p5,w:r5.words}
              ];
              var votes = {};
              all.forEach(function(r){
                if(!r.t) return;
                if(!votes[r.t]) votes[r.t] = {n:0, tc:0, procs:[], words:[]};
                votes[r.t].n++;
                votes[r.t].tc += r.c;
                votes[r.t].procs.push(r.p);
                if(r.w.length) votes[r.t].words = r.w;
              });
              var best = '', bestS = -1, bP = p1, bW = [];
              Object.keys(votes).forEach(function(t){
                var v = votes[t], sc = v.n*1000 + v.tc + t.length*50;
                if(sc > bestS){ bestS = sc; best = t; bP = v.procs[0]; bW = v.words; }
              });
              if(!best){
                var valid = all.filter(function(r){ return r.t; }).sort(function(a,b){ return b.c-a.c; });
                if(valid.length) return {text:valid[0].t, confidence:valid[0].c, preview:self.autoCrop(valid[0].p), words:valid[0].w};
                return {text:'', confidence:0, preview:self.autoCrop(p1), words:[]};
              }
              var conf = votes[best].tc / votes[best].n;
              return {text:best, confidence:conf, preview:self.autoCrop(bP), words:bW};
            });
          });
        });
      });
    });
  },
  performOCR:function(){
    if(this.ocrBusy) return;
    var self = this;
    self.ocrBusy = true;
    var t0 = performance.now();
    self.setStatus('y', '识别中...');
    E('corrBar').style.display = 'none';
    if(self.rot === 'auto'){
      var psm = E('sPSM').value, lang = E('sLang').value;
      var angles;
      if(self.autoMode === 'quick'){
        angles = [0, 90];
      } else {
        angles = [];
        for(var a = 0; a < 360; a += 10) angles.push(a);
      }
      var best = {text:'', confidence:0, angle:0}, preview = null, bWords = [], idx = 0;
      var highConfDone = false;
      var scanNext = function(){
        if(idx >= angles.length || highConfDone){ finish(); return; }
        var ang = angles[idx++];
        self.setStatus('y', '扫描' + ang + '\u00B0...');
        var proc = self.cropAndProc(ang, undefined, 'global');
        self.ocrPass(proc, psm, lang).then(function(r){
          var d = self.correctDigits(proc, self.extractDigits(r.text));
          var lr = self.getLearn(d || r.text, ang);
          if(lr && lr !== d){ d = lr; }
          var score = d ? (r.confidence + d.length*50) : 0;
          var bS = best.text ? (best.confidence + best.text.length*50) : 0;
          if(score > bS){ best = {text:d, confidence:r.confidence, angle:ang}; preview = self.autoCrop(proc); bWords = r.words; }
          if(d && r.confidence >= 85){ self.log('  ' + ang + '\u00B0 -> "' + d + '" (' + r.confidence.toFixed(1) + '%) \u2713'); highConfDone = true; finish(); }
          else { self.log('  ' + ang + '\u00B0 -> "' + d + '" (' + r.confidence.toFixed(1) + '%)'); scanNext(); }
        }).catch(function(){ scanNext(); });
      };
      var finish = function(){
        if(best.text && best.confidence < 70){
          self.setStatus('y', '深度识别...');
          self.multiPassOCR(best.angle).then(function(r){
            if(r.text){ best = {text:r.text, confidence:r.confidence, angle:best.angle}; preview = r.preview; bWords = r.words; }
            finalShow();
          }).catch(function(){ finalShow(); });
        } else { finalShow(); }
      };
      var finalShow = function(){
        var el = ((performance.now() - t0) / 1000).toFixed(2);
        showRes(best, preview, el, bWords);
      };
      scanNext();
    } else {
      self.multiPassOCR(self.rot).then(function(r){
        var el = ((performance.now() - t0) / 1000).toFixed(2);
        showRes({text:r.text, confidence:r.confidence, angle:self.rot}, r.preview, el, r.words);
      }).catch(function(){
        self.setStatus('r', '错误');
        self.ocrBusy = false;
      });
    }
    var showRes = function(best, preview, el, words){
      if(preview){
        var pv = E('ocrPrev');
        var img = new Image();
        img.src = preview.toDataURL('image/png');
        pv.innerHTML = '';
        pv.appendChild(img);
      }
      E('ocrVal').textContent = best.text || '-';
      E('ocrMeta').textContent = best.text ? best.confidence.toFixed(1) + '% ' + best.angle + '\u00B0 ' + el + 's' : '未识别到数字';
      if(best.text){
        self.lastOCR = {
          value:best.text, angle:best.angle, confidence:best.confidence,
          selX:Math.min(self.selS.x, self.selE.x)/self.scale,
          selY:Math.min(self.selS.y, self.selE.y)/self.scale,
          selW:Math.abs(self.selE.x - self.selS.x)/self.scale,
          selH:Math.abs(self.selE.y - self.selS.y)/self.scale
        };
        self.addFromOCR();
        E('corrBar').style.display = '';
        E('corrInput').value = best.text;
        self.log('识别: "' + best.text + '" @' + best.angle + '\u00B0 (' + best.confidence.toFixed(1) + '%, ' + el + 's)', 'ok');
      } else {
        self.log('未识别到数字', 'warn');
      }
      self.setStatus('g', '完成 ' + el + 's');
      self.ocrBusy = false;
    };
  },

  autoTol:function(dim){
    if(dim.type === 'angle'){
      dim.tolValue = 1; dim.tolDisplay = '\u00B11\u00B0'; dim.tolGrade = '';
      dim.upperTol = '+1'; dim.lowerTol = '-1';
      return;
    }
    if(dim.type === 'diameter'){
      var n = parseFloat(dim.nominal);
      if(!isNaN(n)){
        if(n < 10){
          dim.tolValue = .1; dim.tolDisplay = '\u00B10.1';
          dim.upperTol = '+0.1'; dim.lowerTol = '-0.1';
        } else {
          dim.tolValue = .5; dim.tolDisplay = '+0.5/0';
          dim.upperTol = '+0.5'; dim.lowerTol = '0';
        }
        dim.tolGrade = '';
        return;
      }
    }
    var grade = parseStdGrade();
    if(!grade) return;
    var isR = (dim.type === 'radius' || dim.type === 'chamfer');
    var tol = lookupGB(parseFloat(dim.nominal), grade, isR);
    if(!tol) return;
    dim.tolValue = tol; dim.tolDisplay = '\u00B1' + tol; dim.tolGrade = grade;
    dim.upperTol = '+' + tol; dim.lowerTol = '-' + tol;
  },
  findBubblePos:function(selX, selY, selW, selH){
    var s = this.scale, R = 14/s, OFF = R*2.8;
    var pd = this.dims.filter(function(d){ return d.pg === A.pg; });
    var cands = [
      {x:selX+selW+OFF, y:selY-OFF}, {x:selX-OFF, y:selY-OFF},
      {x:selX+selW+OFF, y:selY+selH+OFF}, {x:selX-OFF, y:selY+selH+OFF},
      {x:selX+selW+OFF*2, y:selY-OFF}, {x:selX-OFF*2, y:selY-OFF},
      {x:selX+selW+OFF*2, y:selY+selH+OFF}, {x:selX-OFF*2, y:selY+selH+OFF}
    ];
    var MD = R*3.5, best = cands[0], bestS = 1e9;
    cands.forEach(function(c){
      var score = 0;
      pd.forEach(function(d){
        var dist = Math.hypot(c.x-d.bubX, c.y-d.bubY);
        if(dist < MD) score += (MD - dist) * 100;
      });
      if(score < bestS){ bestS = score; best = c; }
    });
    return {x:best.x, y:best.y};
  },
  addFromOCR:function(){
    if(!this.lastOCR) return;
    var r = this.lastOCR;
    var parsed = this.parseDim(r.value);
    var num = this.getNextNum();
    var pos = this.findBubblePos(r.selX, r.selY, r.selW, r.selH);
    var dim = {
      id:Date.now()+Math.random(), num:num, nominal:parsed.nom,
      upperTol:parsed.up, lowerTol:parsed.lo, tolValue:0, tolDisplay:'', tolGrade:'',
      type:parsed.type, gdt:'', measured:'', result:'', notes:'',
      equipment:getEquip(parsed.type, parsed.nom),
      ocrRaw:r.value, ocrAngle:r.angle, pg:this.pg, saved:false,
      selX:r.selX, selY:r.selY, selW:r.selW, selH:r.selH,
      bubX:pos.x, bubY:pos.y
    };
    this.autoTol(dim);
    this.insertDimSorted(dim);
    this.lastDimId = dim.id;
    this.addBubSVG(dim);
    this.renderTable();
    this.toast('#' + num + ' ' + nomDisplay(dim));
  },

  mapBoundsToDoc:function(bounds, angle, cell, cellW, cellH, sc, dpr){
    var f = dpr * sc;
    var s = this.scale;
    var pad = 4;
    var pcx = bounds.x + bounds.w / 2;
    var pcy = bounds.y + bounds.h / 2;
    if(angle === 0){
      var cx = (cell.x + pcx / f) / s;
      var cy = (cell.y + pcy / f) / s;
      var bw = Math.max((bounds.w + pad) / f / s, 2);
      var bh = Math.max((bounds.h + pad) / f / s, 2);
      return { x: cx - bw / 2, y: cy - bh / 2, w: bw, h: bh };
    } else if(angle === 90){
      var cx = (cell.x + pcy / f) / s;
      var cy = (cell.y + cellH - pcx / f) / s;
      var bw = Math.max((bounds.h + pad) / f / s, 2);
      var bh = Math.max((bounds.w + pad) / f / s, 2);
      return { x: cx - bw / 2, y: cy - bh / 2, w: bw, h: bh };
    } else if(angle === 180){
      var cx = (cell.x + cellW - pcx / f) / s;
      var cy = (cell.y + cellH - pcy / f) / s;
      var bw = Math.max((bounds.w + pad) / f / s, 2);
      var bh = Math.max((bounds.h + pad) / f / s, 2);
      return { x: cx - bw / 2, y: cy - bh / 2, w: bw, h: bh };
    } else if(angle === 270){
      var cx = (cell.x + cellW - pcy / f) / s;
      var cy = (cell.y + pcx / f) / s;
      var bw = Math.max((bounds.h + pad) / f / s, 2);
      var bh = Math.max((bounds.w + pad) / f / s, 2);
      return { x: cx - bw / 2, y: cy - bh / 2, w: bw, h: bh };
    }
    return { x: (cell.x + pcx / f) / s, y: (cell.y + pcy / f) / s, w: 2, h: 2 };
  },

  parseDim:function(text){
    text = text.trim();
    var type = 'linear';
    var cm = text.match(/^[Cc]\s*(\d+\.?\d*)/);
    if(cm) return {nom:cm[1], up:'', lo:'', type:'chamfer'};
    var rm = text.match(/^[Rr]\s*(\d+\.?\d*)/);
    if(rm) return {nom:rm[1], up:'', lo:'', type:'radius'};
    if(/[\u03A6\u03C6\u03D5\u00F8\u00D8\u2300]/.test(text)) type = 'diameter';
    if(/^[oO0Q]\s*\d/.test(text)) type = 'diameter';
    if(/[\u00B0]/.test(text)) type = 'angle';
    var c = text.replace(/[\u03A6\u03C6\u03D5\u00F8\u00D8\u2300\u00B0]/g, '').trim();
    c = c.replace(/^[oO0Q]\s*/, '');
    var m = c.match(/(\d+\.?\d*)\s*[+]\s*(\d+\.?\d*)\s*[-]\s*(\d+\.?\d*)/);
    if(m) return {nom:m[1], up:'+'+m[2], lo:'-'+m[3], type:type};
    m = c.match(/(\d+\.?\d*)\s*[\u00B1]\s*(\d+\.?\d*)/);
    if(m) return {nom:m[1], up:'+'+m[2], lo:'-'+m[2], type:type};
    m = c.match(/(\d+\.?\d*)/);
    if(m) return {nom:m[1], up:'', lo:'', type:type};
    return {nom:text, up:'', lo:'', type:type};
  },
  getNextNum:function(){
    if(this.recycled.length > 0) return this.recycled.shift();
    return this.nextN++;
  },
  recycleNum:function(n){
    var ins = false;
    for(var i = 0; i < this.recycled.length; i++){
      if(n < this.recycled[i]){ this.recycled.splice(i, 0, n); ins = true; break; }
    }
    if(!ins) this.recycled.push(n);
  },

  autoBubble:function(){
    if(!this.pdf && !this.isImg) return;
    var self = this;
    var pgMarks = this.marks.filter(function(m){ return m.pg === self.pg; });
    if(!pgMarks.length){
      var pgR = this.regions.filter(function(r){ return r.pg === self.pg; });
      if(!pgR.length){ self.toast('请先使用「识别区域」工具框选区域'); return; }
      self.setStatus('y', '自动识别中...');
      self.log('开始自动识别...', 'info');
      var t0 = performance.now(), added = 0, ri = 0;
      var processRegion = function(){
        if(ri >= pgR.length){ done(); return; }
        var region = pgR[ri++];
        var found = [];
        if(self.textItems.length) found = self.autoFromText(region);
        if(found.length){ addFound(found); processRegion(); return; }
        self.autoFromOCR(region).then(function(f){ addFound(f); processRegion(); }).catch(function(){ processRegion(); });
      };
      var addFound = function(list){
        list.sort(function(a, b){
          var dy = a.y - b.y;
          if(Math.abs(dy) > .3) return dy;
          return a.x - b.x;
        });
        list.forEach(function(f){
          if(self.dims.some(function(d){ return d.nominal === f.nom && d.pg === self.pg; })) return;
          var num = self.getNextNum();
          var pos = self.findBubblePos(f.x, f.y, f.w || 2, f.h || 1);
          var dim = {
            id:Date.now()+Math.random()+added, num:num, nominal:f.nom,
            upperTol:'', lowerTol:'', tolValue:0, tolDisplay:'', tolGrade:'',
            type:f.type || 'linear', gdt:'', measured:'', result:'', notes:'',
            equipment:getEquip(f.type || 'linear', f.nom),
            ocrRaw:f.nom, ocrAngle:0, pg:self.pg, saved:false,
            selX:f.x, selY:f.y, selW:f.w || 2, selH:f.h || 1,
            bubX:pos.x, bubY:pos.y
          };
          self.autoTol(dim);
          self.insertDimSorted(dim);
          self.addBubSVG(dim);
          added++;
        });
      };
      var done = function(){
        var el = ((performance.now() - t0) / 1000).toFixed(2);
        self.renderTable();
        self.log('完成 +' + added + ' (' + el + 's)', 'ok');
        self.toast('+' + added + ' 个尺寸');
        self.setStatus('g', '完成 +' + added);
      };
      processRegion();
      return;
    }
    self.setStatus('y', '批量识别中...');
    self.log('开始批量识别 ' + pgMarks.length + ' 个标记...', 'info');
    var t0 = performance.now(), added = 0, idx = 0;
    var psm = E('sPSM').value, lang = E('sLang').value;
    var processMark = function(){
      if(idx >= pgMarks.length){ done(); return; }
      var mark = pgMarks[idx++];
      var s = self.scale;
      var isVertical = mark.w < mark.h;
      var baseAngle = mark.angle || 0;
      var tryAngles = isVertical ? [baseAngle, (baseAngle+90)%360] : [baseAngle];
      var tIdx = 0;
      var tryNextAngle = function(){
        if(tIdx >= tryAngles.length){ processMark(); return; }
        var ang = tryAngles[tIdx++];
        self.selS = {x:mark.x*s, y:mark.y*s};
        self.selE = {x:(mark.x+mark.w)*s, y:(mark.y+mark.h)*s};
        var proc = self.cropAndProc(ang, undefined, 'global');
        self.ocrPass(proc, psm, lang).then(function(r){
          var d = self.correctDigits(proc, self.extractDigits(r.text));
          var parsed = self.parseDim(r.text);
          if(parsed.nom && /\d/.test(parsed.nom) && !self.dims.some(function(dd){ return dd.nominal === parsed.nom && dd.pg === self.pg; })){
            var num = self.getNextNum();
            var dim = {
              id:Date.now()+Math.random()+added, num:num, nominal:parsed.nom,
              upperTol:parsed.up, lowerTol:parsed.lo, tolValue:0, tolDisplay:'', tolGrade:'',
              type:parsed.type, gdt:'', measured:'', result:'', notes:'',
              equipment:getEquip(parsed.type, parsed.nom),
              ocrRaw:r.text, ocrAngle:ang, pg:self.pg, saved:false,
              selX:mark.x, selY:mark.y, selW:mark.w, selH:mark.h,
              bubX:mark.x + mark.w + 1, bubY:mark.y
            };
            self.autoTol(dim);
            self.insertDimSorted(dim);
            self.addBubSVG(dim);
            added++;
            processMark();
          } else {
            tryNextAngle();
          }
        }).catch(function(){ tryNextAngle(); });
      };
      tryNextAngle();
    };
    var done = function(){
      var el = ((performance.now() - t0) / 1000).toFixed(2);
      self.hideMarks();
      self.renderTable();
      self.log('完成 +' + added + ' (' + el + 's)', 'ok');
      self.toast('+' + added + ' 个尺寸');
      self.setStatus('g', '完成 +' + added);
      self.selAngle = 0;
    };
    processMark();
  },
  autoFromText:function(region){
    var s = this.scale, self = this;
    var items = this.textItems.filter(function(i){
      return i.x/s >= region.x && i.x/s <= region.x+region.w && i.y/s >= region.y && i.y/s <= region.y+region.h;
    });
    var nums = items.filter(function(i){ return /\d/.test(i.text); });
    var results = [], used = new Set();
    nums.forEach(function(item){
      if(used.has(item)) return;
      if(/^[(\[]?\s*[-−]/.test(item.text)) return;
      var group = [item]; used.add(item);
      items.forEach(function(other){
        if(used.has(other)) return;
        if(/^[(\[]?\s*[-−]/.test(other.text)) return;
        if(Math.abs(other.y-item.y)/s < 2 && Math.abs(other.x-item.x)/s < 6){ group.push(other); used.add(other); }
      });
      group.sort(function(a, b){ return a.x-b.x || a.y-b.y; });
      var combined = group.map(function(g){ return g.text; }).join(' ');
      var parsed = self.parseDim(combined);
      var tolMatch = combined.match(/[([]\s*([+-]?\d+\.?\d*)\s*,\s*([+-]?\d+\.?\d*)\s*[)]]/);
      if(tolMatch && !parsed.up && !parsed.lo){
        parsed.up = tolMatch[1].startsWith('+') ? tolMatch[1] : (tolMatch[1] > 0 ? '+' + tolMatch[1] : tolMatch[1]);
        parsed.lo = tolMatch[2].startsWith('+') ? tolMatch[2] : (tolMatch[2] > 0 ? '+' + tolMatch[2] : tolMatch[2]);
      }
      if(parsed.nom && /\d/.test(parsed.nom)){
        var boxW = (item.w||40)/s, boxH = (item.h||18)/s;
        var cx = item.x/s + boxW/2, cy = item.y/s + boxH/2;
        results.push({nom:parsed.nom, up:parsed.up, lo:parsed.lo, type:parsed.type, x:cx-boxW/2, y:cy-boxH/2, w:boxW, h:boxH});
      }
    });
    return results;
  },
  autoFromOCR:function(region){
    var self = this, s = this.scale;
    var dpr = window.devicePixelRatio || 1;
    var sc = parseInt(E('sScale').value);
    var f = dpr * sc;
    var rx = region.x*s, ry = region.y*s, rw = region.w*s, rh = region.h*s;
    var isVertical = region.w < region.h;
    var cellW = 100, cellH = 36;
    var stepX = Math.max(cellW - 15, 20);
    var stepY = Math.max(cellH - 16, 10);
    var results = [], origSS = this.selS, origSE = this.selE;
    var psm = E('sPSM').value, lang = E('sLang').value;
    var cells = [];
    for(var cy = ry; cy < ry+rh-cellH; cy += stepY){
      for(var cx = rx; cx < rx+rw-cellW; cx += stepX){
        cells.push({x:cx, y:cy});
      }
    }
    var processAngle = function(angle){
      var promises = [];
      cells.forEach(function(cell){
        self.selS = {x:cell.x, y:cell.y};
        self.selE = {x:cell.x+cellW, y:cell.y+cellH};
        var proc = self.cropAndProc(angle, undefined, 'global');
        promises.push(
          self.ocrPass(proc, psm, lang).then(function(r){
            var d = self.extractDigits(r.text);
            if(!d || r.confidence <= 40) return;
            var parsed = self.parseDim(r.text);
            if(!parsed.nom || !/\d/.test(parsed.nom)) return;
            var bounds = null;
            if(r.words && r.words.length > 0){
              for(var wi = 0; wi < r.words.length; wi++){
                var word = r.words[wi];
                if(word.text && word.bbox){
                  var wd = self.extractDigits(word.text);
                  if(wd && (d.indexOf(wd) >= 0 || wd.indexOf(d) >= 0 || wd === d)){
                    bounds = { x: word.bbox.x0, y: word.bbox.y0, w: word.bbox.x1 - word.bbox.x0, h: word.bbox.y1 - word.bbox.y0 };
                    break;
                  }
                }
              }
              if(!bounds){
                var minX = 1e9, minY = 1e9, maxX = 0, maxY = 0;
                r.words.forEach(function(w){
                  if(w.bbox){
                    minX = Math.min(minX, w.bbox.x0);
                    minY = Math.min(minY, w.bbox.y0);
                    maxX = Math.max(maxX, w.bbox.x1);
                    maxY = Math.max(maxY, w.bbox.y1);
                  }
                });
                if(minX < 1e9) bounds = {x:minX, y:minY, w:maxX-minX, h:maxY-minY};
              }
            }
            if(!bounds) bounds = self.getContentBounds(proc);
            if(!bounds) return;
            var mapped = self.mapBoundsToDoc(bounds, angle, cell, cellW, cellH, sc, dpr);
            results.push({ nom:parsed.nom, up:parsed.up, lo:parsed.lo, type:parsed.type, x:mapped.x, y:mapped.y, w:mapped.w, h:mapped.h, conf:r.confidence });
          }).catch(function(){})
        );
      });
      return Promise.all(promises);
    };
    var anglesToTry = isVertical ? [90, 0] : [0, 90];
    return processAngle(anglesToTry[0]).then(function(){
      return processAngle(anglesToTry[1]).then(function(){
        self.selS = origSS;
        self.selE = origSE;
        results.sort(function(a, b){ return b.conf - a.conf; });
        var deduped = [];
        results.forEach(function(r){
          var dup = deduped.some(function(d){
            var distX = Math.abs((d.x+d.w/2) - (r.x+r.w/2));
            var distY = Math.abs((d.y+d.h/2) - (r.y+r.h/2));
            var overlapX = Math.max(0, Math.min(d.x+d.w, r.x+r.w) - Math.max(d.x, r.x));
            var overlapY = Math.max(0, Math.min(d.y+d.h, r.y+r.h) - Math.max(d.y, r.y));
            var overlapArea = overlapX * overlapY;
            var minArea = Math.min(d.w*d.h, r.w*r.h);
            return (d.nom === r.nom && distX < Math.max(d.w,r.w) && distY < Math.max(d.h,r.h)) || (minArea > 0 && overlapArea > minArea * 0.4);
          });
          if(!dup) deduped.push(r);
        });
        return deduped;
      });
    });
  },

  scanRegionDigits:function(region){
    var self = this;
    var s = this.scale;
    var padding = 3;
    var rx = region.x, ry = region.y, rw = region.w, rh = region.h;
    var isVertical = rw < rh;
    if(self.textItems.length){
      var items = self.textItems.filter(function(i){
        return i.x/s >= rx && i.x/s <= rx+rw && i.y/s >= ry && i.y/s <= ry+rh;
      });
      var digitItems = items.filter(function(i){ return /\d/.test(i.text); });
      var grouped = [], used = new Set();
      digitItems.forEach(function(item){
        if(used.has(item)) return;
        var group = [item]; used.add(item);
        items.forEach(function(other){
          if(used.has(other)) return;
          var xDist = Math.abs(other.x-item.x)/s;
          var yDist = Math.abs(other.y-item.y)/s;
          if(isVertical ? (xDist < 12 && yDist < 3) : (yDist < 3 && xDist < 12)){
            group.push(other); used.add(other);
          }
        });
        group.sort(function(a,b){ return isVertical ? (a.y-b.y) : (a.x-b.x); });
        var combined = group.map(function(g){ return g.text; }).join(' ');
        var parsed = self.parseDim(combined);
        if(parsed.nom && /\d/.test(parsed.nom)){
          var cx = item.x/s + (item.w||40)/s/2;
          var cy = item.y/s + (item.h||18)/s/2;
          var w = Math.max((item.w||40)/s + padding*2, 8);
          var h = Math.max((item.h||18)/s + padding*2, 6);
          grouped.push({x:cx-w/2, y:cy-h/2, w:w, h:h, nom:parsed.nom, parsed:parsed});
        }
      });
      var deduped = [];
      grouped.forEach(function(g){
        var dup = deduped.some(function(d){
          return Math.abs(d.x-g.x) < d.w && Math.abs(d.y-g.y) < d.h && d.nom === g.nom;
        });
        if(!dup) deduped.push(g);
      });
      deduped.forEach(function(g){
        if(isVertical) g.parsed.angle = 90;
        self.addMark(g.x, g.y, g.w, g.h, g.nom, g.parsed);
      });
      self.log('扫描到 ' + deduped.length + ' 个数字段' + (isVertical ? ' (纵向)' : ''), 'ok');
    } else {
      self.log('无文本层，请使用自动气泡', 'warn');
    }
  },
  addMark:function(x, y, w, h, nom, parsed){
    var id = Date.now() + Math.random();
    var ag = parsed.angle || 0;
    var mark = {id:id, x:x, y:y, w:w, h:h, nom:nom, type:parsed.type, up:parsed.up||'', lo:parsed.lo||'', angle:ag, pg:this.pg};
    this.marks.push(mark);
    this.renderMarks();
  },
  renderMarks:function(){
    var svg = document.getElementById('bubbleSvg'), self = this;
    svg.querySelectorAll('.mark-g').forEach(function(e){ e.remove(); });
    var s = this.scale;
    var pgMarks = this.marks.filter(function(m){ return m.pg === self.pg; });
    pgMarks.forEach(function(m){
      var g = svgEl('g', {class:'mark-g', 'data-mark-id':m.id});
      var cxM = (m.x + m.w/2) * s;
      var cyM = (m.y + m.h/2) * s;
      var outerG = g;
      if(m.angle){
        var rotG = svgEl('g', {transform:'rotate('+m.angle+' '+cxM+' '+cyM+')'});
        outerG = rotG;
        g.appendChild(rotG);
      }
      var rect = svgEl('rect', {
        class:'mark-rect', x:m.x*s, y:m.y*s, width:m.w*s, height:m.h*s,
        fill:'rgba(255,60,60,.03)', stroke:'#ff3c3c', 'stroke-width':'1.5', 'stroke-dasharray':'5,3', rx:'1'
      });
      outerG.appendChild(rect);
      var hs = 7;
      var hPos = [
        {cn:'nw', x:m.x*s-hs/2, y:m.y*s-hs/2, cur:'nw-resize'},
        {cn:'ne', x:m.x*s+m.w*s-hs/2, y:m.y*s-hs/2, cur:'ne-resize'},
        {cn:'sw', x:m.x*s-hs/2, y:m.y*s+m.h*s-hs/2, cur:'sw-resize'},
        {cn:'se', x:m.x*s+m.w*s-hs/2, y:m.y*s+m.h*s-hs/2, cur:'se-resize'}
      ];
      hPos.forEach(function(h){
        outerG.appendChild(svgEl('rect', {class:'mark-handle', 'data-corner':h.cn, x:h.x, y:h.y, width:hs, height:hs, fill:'#ff3c3c', stroke:'#0b0d13', 'stroke-width':'1', rx:'1', style:'cursor:'+h.cur}));
      });
      var rtY = m.y*s-16;
      var rtX = cxM-6;
      var rtH = svgEl('rect', {class:'mark-rotate', x:rtX, y:rtY, width:12, height:12, fill:'#ff8c00', stroke:'#0b0d13', 'stroke-width':'1', rx:'2', style:'cursor:grab'});
      g.appendChild(rtH);
      svg.appendChild(g);
    });
    this.updStatus();
  },
  hideMarks:function(){
