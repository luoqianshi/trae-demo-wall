<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGIT FAI — 首件检验报告软件</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root{
  --bg:#0b0d13;--s1:#12151e;--s2:#191d2a;--s3:#1f2436;
  --bd:#282e42;--bdl:#343b54;
  --ac:#ff3c3c;--ac2:#ff5555;--acd:#8b1a1a;--acg:rgba(255,60,60,.08);
  --ok:#4af0c0;--okd:#1e6b52;--okg:rgba(74,240,192,.08);
  --warn:#f0a04a;--info:#5b9aff;
  --t1:#e2e5ed;--t2:#a0a6b8;--t3:#5c6380;
  --r:5px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;user-select:none;font-size:13px}

.app{display:grid;grid-template-rows:44px 1fr 0px 24px;grid-template-columns:188px 1fr 272px;height:100vh}
.app.open{grid-template-rows:44px 1fr 210px 24px}

.hdr{grid-column:1/-1;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:6px;z-index:50}
.brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;color:var(--bg);background:var(--ac);padding:2px 7px;border-radius:3px}
.bsub{font-size:11px;color:var(--t3);margin-left:2px}
.tbar{display:flex;gap:3px;align-items:center;flex:1;margin-left:10px}
.sep{width:1px;height:20px;background:var(--bd);margin:0 3px}

.b{font-family:'Noto Sans SC',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border:1px solid var(--bd);border-radius:4px;background:var(--s2);color:var(--t1);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.b:hover{border-color:var(--acd);background:var(--acg)}
.b:active{transform:scale(.97)}
.b:disabled{opacity:.3;pointer-events:none}
.ba{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}.ba:hover{background:var(--ac2);border-color:var(--ac2)}
.bs{padding:3px 7px;font-size:10px}
.bi{width:26px;height:26px;padding:0;justify-content:center;font-size:13px}
.bd{border-color:var(--ac);color:var(--ac)}.bd:hover{background:var(--acg)}
.bok{background:var(--ok);color:var(--bg);border-color:var(--ok);font-weight:600}.bok:hover{background:#5cffd4}
#fileInput,#projectInput{display:none}

.lp{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.lps{padding:8px 10px;border-bottom:1px solid var(--bd)}
.lpt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:6px}
.lpsc{flex:1;overflow-y:auto;padding:8px 10px}
.pg-item{padding:4px 7px;border:1px solid transparent;border-radius:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--t2);transition:all .12s}
.pg-item:hover{border-color:var(--bd);color:var(--t1)}
.pg-item.on{border-color:var(--acd);background:var(--acg);color:var(--ac)}
.pg-n{font-family:'JetBrains Mono',monospace;font-size:9px;min-width:16px}
.tl-item{padding:5px 7px;border:1px solid transparent;border-radius:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--t2);transition:all .12s}
.tl-item:hover{border-color:var(--bd);color:var(--t1)}
.tl-item.on{border-color:var(--acd);background:var(--acg);color:var(--ac)}
.tl-i{font-size:14px;width:18px;text-align:center}
.region-item{display:flex;align-items:center;justify-content:space-between;padding:3px 6px;background:var(--bg);border:1px solid var(--bd);border-radius:3px;margin-bottom:3px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--info)}
.region-item .rdel{cursor:pointer;color:var(--t3);font-size:12px;background:none;border:none;padding:0 2px}.rdel:hover{color:var(--ac)}

.va{position:relative;overflow:hidden;background:var(--bg)}
.vs{width:100%;height:100%;overflow:auto;position:relative}
.vw{position:relative;display:inline-block;box-shadow:0 2px 30px rgba(0,0,0,.5);flex-shrink:0;margin:20px}
#pdfCanvas{display:block}
#bubbleSvg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
#bubbleSvg .bg{pointer-events:all;cursor:move}
#bubbleSvg .bg:hover .bc{stroke-width:2.5;filter:drop-shadow(0 0 4px rgba(255,60,60,.4))}
#bubbleSvg .sf{pointer-events:none}
#bubbleSvg .ll{pointer-events:none}
#bubbleSvg .cd{pointer-events:none}
#bubbleSvg .region-rect{pointer-events:none}

.sel-rect{position:absolute;border:1.5px solid var(--ac);background:rgba(255,60,60,.06);pointer-events:none;display:none;z-index:10}
.sel-rect.on{display:block}
.sel-rect .sh{position:absolute;width:6px;height:6px;background:var(--ac);border:1px solid var(--bg);border-radius:1px}
.sel-rect .sh.tl{top:-3px;left:-3px}.sel-rect .sh.tr{top:-3px;right:-3px}
.sel-rect .sh.bl{bottom:-3px;left:-3px}.sel-rect .sh.br{bottom:-3px;right:-3px}

.zb{position:absolute;bottom:10px;left:10px;display:none;gap:2px;background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:2px;z-index:20}
.zb.show{display:flex}
.zb button{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--t1);cursor:pointer;border-radius:3px;font-size:13px;font-family:'JetBrains Mono',monospace}
.zb button:hover{background:var(--s2)}
.zb span{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);padding:0 5px;display:flex;align-items:center;min-width:36px;justify-content:center}

.drop-ov{position:absolute;inset:0;background:rgba(255,60,60,.04);border:2px dashed var(--ac);display:none;align-items:center;justify-content:center;z-index:100}
.drop-ov.on{display:flex}
.drop-ov span{font-size:14px;color:var(--ac);font-weight:500}
.emp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);text-align:center;z-index:5}
.emp.hid{display:none}
.emp .ei{width:50px;height:50px;border:2px dashed var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;opacity:.4}
.emp h2{font-size:14px;font-weight:500;margin-bottom:6px;color:var(--t1)}
.emp p{font-size:11px;line-height:1.6}

.rp{background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.rps{padding:8px 10px;border-bottom:1px solid var(--bd)}
.rpt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:6px}
.pr{display:flex;align-items:center;justify-content:space-between;padding:3px 0;gap:4px}
.pr label{font-size:11px;color:var(--t3);flex-shrink:0}
.pr input,.pr select{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--bd);color:var(--t1);padding:3px 6px;border-radius:3px;width:100px;outline:none}
.pr input:focus,.pr select:focus{border-color:var(--acd)}
.opv{width:100%;min-height:50px;max-height:120px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.opv img{max-width:100%;max-height:120px;object-fit:contain;display:block}
.opv .ph{font-size:10px;color:var(--t3);opacity:.5}
.ocr-val{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--ok);min-height:22px;font-weight:700;margin-top:4px}
.ocr-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:2px}

.bt{grid-column:1/-1;background:var(--s1);border-top:1px solid var(--bd);overflow:hidden;display:flex;flex-direction:column}
.dth{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.dth .dtt{font-size:10px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:6px}
.dtc{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ok);background:var(--okg);border:1px solid var(--okd);padding:1px 5px;border-radius:2px}
.dta{display:flex;gap:3px}
.dts{flex:1;overflow:auto}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{position:sticky;top:0;background:var(--s2);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);padding:4px 6px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;z-index:2}
table.dt td{padding:3px 6px;border-bottom:1px solid var(--bd);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap;cursor:pointer}
table.dt tr:hover td{background:var(--acg)}
table.dt tr.sel td{background:rgba(255,60,60,.08)}
table.dt td[contenteditable]{outline:none}
table.dt td[contenteditable]:focus{background:var(--s3);box-shadow:inset 0 0 0 1px var(--acd)}
.dn{color:var(--ac);font-weight:700;text-align:center;min-width:24px}
.dv{color:var(--t1);font-weight:600}
.dt2{color:var(--warn)}
.dte{text-align:center;padding:20px;color:var(--t3);font-size:11px}

.sbar{grid-column:1/-1;background:var(--s2);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:12px;font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.sd{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.sd.g{background:var(--ok)}.sd.y{background:var(--warn);animation:bl 1s infinite}.sd.r{background:var(--ac)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s2);border:1px solid var(--okd);color:var(--ok);font-size:11px;padding:6px 16px;border-radius:5px;z-index:300;opacity:0;transition:all .2s;pointer-events:none;font-family:'JetBrains Mono',monospace}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:18px;min-width:340px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.modal h3{font-size:13px;font-weight:600;margin-bottom:12px}
.modal .mr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;gap:8px}
.modal .mr label{font-size:12px;color:var(--t2)}
.modal .mr select{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--bd);color:var(--t1);padding:4px 8px;border-radius:3px;width:160px}
.modal .ma{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="hdr">
    <span class="brand">DIGIT FAI</span><span class="bsub">首件检验报告</span>
    <div class="tbar">
      <button class="b" id="btnOpen"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> 打开</button>
      <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp"/>
      <div class="sep"></div>
      <button class="b ba" id="btnAuto" disabled>⚡ 自动气泡</button>
      <div class="sep"></div>
      <button class="b" id="btnTable" disabled>📊 尺寸表</button>
      <button class="b" id="btnExport" disabled>↓ 导出</button>
      <div class="sep"></div>
      <button class="b" id="btnSave">💾 保存</button>
      <button class="b" id="btnLoad">📂 载入</button>
      <input type="file" id="projectInput" accept=".json"/>
    </div>
  </header>

  <aside class="lp">
    <div class="lps"><div class="lpt">页面</div><div id="pgList"><div style="color:var(--t3);font-size:10px;padding:4px 0">未加载</div></div></div>
    <div class="lpsc">
      <div class="lpt">工具</div>
      <div id="tlList">
        <div class="tl-item on" data-t="select"><span class="tl-i">↖</span>选择/移动</div>
        <div class="tl-item" data-t="ocr"><span class="tl-i">🔍</span>框选识别+气泡</div>
        <div class="tl-item" data-t="region"><span class="tl-i">▭</span>识别区域</div>
      </div>
      <div style="margin-top:10px"><div class="lpt">识别区域</div><div id="regionList"><div style="color:var(--t3);font-size:10px">使用「识别区域」工具框选</div></div></div>
      <div style="margin-top:10px">
        <div class="lpt">OCR 预览</div>
        <div class="opv" id="ocrPrev"><span class="ph">框选后显示</span></div>
        <div class="ocr-val" id="ocrVal"></div>
        <div class="ocr-meta" id="ocrMeta"></div>
      </div>
      <div style="margin-top:10px">
        <div class="lpt">OCR 设置 <span style="color:var(--ok);cursor:pointer;margin-left:4px" id="btnResetSet" title="恢复默认">↻</span></div>
        <div class="pr"><label>分段模式</label><select id="sPSM"><option value="7">单行</option><option value="8">单词</option><option value="13" selected>原始行</option></select></div>
        <div class="pr"><label>放大倍数</label><select id="sScale"><option value="1">1x</option><option value="2" selected>2x</option><option value="3">3x</option><option value="4">4x</option></select></div>
        <div class="pr"><label>二值化</label><input type="number" id="sThresh" value="200" min="0" max="255" step="5" style="width:55px"/></div>
        <div class="pr"><label>反色</label><select id="sInvert"><option value="0" selected>关闭</option><option value="1">开启</option></select></div>
        <div class="pr"><label>多通道投票</label><select id="sMulti"><option value="1" selected>开启</option><option value="0">关闭</option></select></div>
        <div class="pr"><label>自适应阈值</label><select id="sAdapt"><option value="1" selected>开启</option><option value="0">关闭</option></select></div>
        <div style="margin-top:6px"><div class="lpt">文字方向</div></div>
        <div class="rg" id="rotG">
          <div class="rb on" data-r="auto"><span class="ri">◎</span>自动</div>
          <div class="rb" data-r="0"><span class="ri">→</span>0°</div>
          <div class="rb" data-r="90"><span class="ri">↑</span>90°</div>
          <div class="rb" data-r="180"><span class="ri">←</span>180°</div>
          <div class="rb" data-r="270"><span class="ri">↓</span>270°</div>
        </div>
        <div style="margin-top:6px"><div class="lpt">OCR 语言</div></div>
        <div class="pr"><label>语言包</label><select id="sLang"><option value="eng" selected>English</option><option value="chi_sim">中文简体</option><option value="jpn">日本語</option><option value="deu">Deutsch</option><option value="kor">한국어</option><option value="ara">العربية</option></select></div>
      </div>
    </div>
  </aside>

  <div class="va" id="dropZone">
    <div class="drop-ov" id="dropOv"><span>释放文件</span></div>
    <div class="emp" id="empSt"><div class="ei">📐</div><h2>打开工程图纸</h2><p>拖放 PDF / 图片到此处</p></div>
    <div class="vs" id="vs" style="display:none">
      <div class="vw" id="vw">
        <canvas id="pdfCanvas"></canvas>
        <svg id="bubbleSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="sel-rect" id="selRect"><div class="sh tl"></div><div class="sh tr"></div><div class="sh bl"></div><div class="sh br"></div></div>
      </div>
    </div>
    <div class="zb" id="zBar"><button onclick="A.zoomBy(-.15)">−</button><span id="zLv">100%</span><button onclick="A.zoomBy(.15)">+</button><button onclick="A.zoomFit()">⊡</button></div>
  </div>

  <aside class="rp">
    <div class="rps">
      <div class="rpt">零件信息</div>
      <div class="pr"><label>零件号</label><input id="iPN" placeholder="Part No." style="width:115px"/></div>
      <div class="pr"><label>图号</label><input id="iDW" placeholder="DWG No." style="width:115px"/></div>
      <div class="pr"><label>版本</label><input id="iRV" placeholder="Rev" style="width:46px"/></div>
    </div>
    <div class="rps" id="bpPanel" style="display:none">
      <div class="rpt">气泡属性</div>
      <div class="pr"><label>编号</label><input id="bpN" type="number" style="width:46px" onchange="A.updBubble()"/></div>
      <div class="pr"><label>数值</label><input id="bpV" placeholder="125.4" onchange="A.updBubble()"/></div>
      <div class="pr"><label>上偏差</label><input id="bpU" placeholder="+0.2" onchange="A.updBubble()"/></div>
      <div class="pr"><label>下偏差</label><input id="bpL" placeholder="-0.1" onchange="A.updBubble()"/></div>
      <div class="pr"><label>类型</label><select id="bpT" onchange="A.updBubble()"><option value="linear">线性</option><option value="diameter">直径⌀</option><option value="radius">半径R</option><option value="angle">角度∠</option><option value="gdt">GD&T</option></select></div>
      <div class="pr"><label>GD&T</label>
        <select id="bpG" onchange="A.updBubble()">
          <option value="">— 无 —</option>
          <option value="⌀">⌀ 直径</option><option value="⊕">⊕ 位置度</option><option value="⊥">⊥ 垂直度</option>
          <option value="∥">∥ 平行度</option><option value="∠">∠ 角度</option><option value="○">○ 圆度</option>
          <option value="◎">◎ 同轴度</option><option value="⌒">⌒ 面轮廓</option><option value="⌓">⌓ 对称度</option>
          <option value="↗">↗ 圆跳动</option><option value="⏤">⏤ 直线度</option><option value="⏥">⏥ 平面度</option>
          <option value="⌭">⌭ 圆柱度</option><option value="꒰">꒰ 线轮廓</option><option value="↻">↻ 全跳动</option>
        </select>
      </div>
      <div class="pr"><label>备注</label><input id="bpNo" placeholder="Notes" style="width:115px" onchange="A.updBubble()"/></div>
      <div style="margin-top:6px;display:flex;gap:4px"><button class="b bs bd" style="flex:1;justify-content:center" onclick="A.delSel()">删除 (Backspace)</button></div>
    </div>
    <div class="rps" style="flex:1;overflow-y:auto">
      <div class="rpt">运行日志</div>
      <div id="logA" style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);line-height:1.7"></div>
    </div>
  </aside>

  <div class="bt" id="btPanel">
    <div class="dth">
      <div class="dtt">尺寸列表 <span class="dtc" id="dtC">0</span></div>
      <div class="dta">
        <button class="b bs" onclick="A.addEmpty()">+ 添加</button>
        <button class="b bs" onclick="A.expCSV()">CSV</button>
        <button class="b bs bok" onclick="A.expXLS()">Excel</button>
        <button class="b bs ba" onclick="A.expPDF()">PDF</button>
        <button class="b bs" onclick="A.expImg()">气泡图</button>
      </div>
    </div>
    <div class="dts"><table class="dt"><thead><tr><th style="width:30px">#</th><th>名义值</th><th>上偏差</th><th>下偏差</th><th>类型</th><th>GD&T</th><th>实测值</th><th>判定</th><th>备注</th><th style="width:26px"></th></tr></thead><tbody id="dtB"></tbody></table><div class="dte" id="dtE">框选识别或自动气泡添加尺寸</div></div>
  </div>

  <footer class="sbar">
    <span><span class="sd g" id="sDot"></span><span id="sTxt">就绪</span></span>
    <span id="stP">—</span><span id="stZ">—</span><span id="stD">尺寸:0</span><span id="stB">气泡:0</span>
    <span style="margin-left:auto">Tesseract.js v5 · jsPDF</span>
  </footer>
</div>

<div class="modal-bg" id="expM">
  <div class="modal">
    <h3>导出选项</h3>
    <div class="mr"><label>图片格式</label><select id="eFmt"><option value="png">PNG</option><option value="jpeg">JPEG</option></select></div>
    <div class="mr"><label>缩放倍数</label><select id="eSc"><option value="1">1x</option><option value="2" selected>2x</option><option value="3">3x</option></select></div>
    <div class="ma">
      <button class="b" onclick="E('expM').classList.remove('show')">取消</button>
      <button class="b" onclick="A.expCSV()">CSV</button>
      <button class="b" onclick="A.expXLS()">Excel</button>
      <button class="b ba" onclick="A.expPDF()">PDF</button>
      <button class="b" onclick="A.expImg()">图片</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';
const E=id=>document.getElementById(id);
const NS='http://www.w3.org/2000/svg';
function svgEl(t,a,txt){const e=document.createElementNS(NS,t);if(a)Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));if(txt!==undefined)e.textContent=txt;return e;}

const DEF={psm:'13',scale:'2',thresh:200,invert:'0',multi:'1',adapt:'1',lang:'eng',rot:'auto'};

const A={
  pdf:null,isImg:false,imgEl:null,pg:1,total:0,
  scale:1.0,tool:'select',rot:'auto',ocrBusy:false,
  selecting:false,selS:null,selE:null,
  regions:[],dims:[],selId:null,nextN:1,recycled:[],
  textItems:[],lastOCR:null,panSt:null,
  cv:null,cx:null,svg:null,sr:null,

  /* ===== INIT ===== */
  init(){
    this.cv=E('pdfCanvas');this.cx=this.cv.getContext('2d',{willReadFrequently:true});
    this.svg=E('bubbleSvg');this.sr=E('selRect');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    this.loadSets();this.bindEvts();this.log('应用就绪');
  },

  /* ===== SETTINGS PERSISTENCE ===== */
  loadSets(){
    let s;try{s=JSON.parse(localStorage.getItem('digiFAI_sets'))||{}}catch(e){s={}}
    const v=k=>s[k]!==undefined?s[k]:DEF[k];
    E('sPSM').value=v('psm');E('sScale').value=v('scale');
    E('sThresh').value=v('thresh');E('sInvert').value=v('invert');
    E('sMulti').value=v('multi');E('sAdapt').value=v('adapt');E('sLang').value=v('lang');
    this.rot=v('rot');
    E('rotG').querySelectorAll('.rb').forEach(b=>{b.classList.toggle('on',b.dataset.r===this.rot)});
  },
  saveSets(){
    const s={psm:E('sPSM').value,scale:E('sScale').value,thresh:+E('sThresh').value,
      invert:E('sInvert').value,multi:E('sMulti').value,adapt:E('sAdapt').value,lang:E('sLang').value,rot:this.rot};
    localStorage.setItem('digiFAI_sets',JSON.stringify(s));
  },

  /* ===== EVENTS ===== */
  bindEvts(){
    const self=this;
    E('btnOpen').onclick=()=>E('fileInput').click();
    E('fileInput').addEventListener('change',e=>{if(e.target.files[0])self.loadFile(e.target.files[0])});
    E('btnAuto').onclick=()=>self.autoBubble();
    E('btnTable').onclick=()=>E('app').classList.toggle('open');
    E('btnExport').onclick=()=>E('expM').classList.add('show');
    E('btnSave').onclick=()=>self.saveProj();
    E('btnLoad').onclick=()=>E('projectInput').click();
    E('projectInput').addEventListener('change',e=>{if(e.target.files[0])self.loadProj(e.target.files[0])});
    E('btnResetSet').onclick=()=>{localStorage.removeItem('digiFAI_sets');self.loadSets();self.toast('已恢复默认')};
    ['sPSM','sScale','sThresh','sInvert','sMulti','sAdapt','sLang'].forEach(id=>E(id).addEventListener('change',()=>self.saveSets()));

    const dz=E('dropZone');let dc=0;
    dz.addEventListener('dragenter',e=>{e.preventDefault();dc++;E('dropOv').classList.add('on')});
    dz.addEventListener('dragleave',e=>{e.preventDefault();dc--;if(dc<=0){dc=0;E('dropOv').classList.remove('on')}});
    dz.addEventListener('dragover',e=>e.preventDefault());
    dz.addEventListener('drop',e=>{e.preventDefault();dc=0;E('dropOv').classList.remove('on');if(e.dataTransfer.files[0])self.loadFile(e.dataTransfer.files[0])});

    E('tlList').addEventListener('click',e=>{const el=e.target.closest('.tl-item');if(el)self.setTool(el.dataset.t)});
    E('rotG').addEventListener('click',e=>{const b=e.target.closest('.rb');if(!b)return;E('rotG').querySelectorAll('.rb').forEach(x=>x.classList.remove('on'));b.classList.add('on');self.rot=b.dataset.r;self.saveSets()});

    this.cv.addEventListener('mousedown',e=>self.onCvDown(e));
    this.cv.addEventListener('mousemove',e=>self.onCvMove(e));
    this.cv.addEventListener('mouseup',e=>self.onCvUp(e));
    this.cv.addEventListener('contextmenu',e=>{e.preventDefault();self.cancelSel()});
    this.svg.addEventListener('mousedown',e=>self.onBubDown(e));
    document.addEventListener('mousemove',e=>self.onBubMove(e));
    document.addEventListener('mouseup',e=>self.onBubUp(e));

    const vs=E('vs');
    vs.addEventListener('wheel',e=>{
      e.preventDefault();if(!self.pdf&&!self.isImg)return;
      const oldS=self.scale;self.scale=Math.max(.15,Math.min(8,self.scale+(e.deltaY>0?-.12:.12)));
      const r=self.scale/oldS,rect=vs.getBoundingClientRect();
      const mx=e.clientX-rect.left+vs.scrollLeft,my=e.clientY-rect.top+vs.scrollTop;
      self.renderPage().then(()=>{vs.scrollLeft=mx*r-(e.clientX-rect.left);vs.scrollTop=my*r-(e.clientY-rect.top)});
    },{passive:false});

    vs.addEventListener('mousedown',e=>{
      if(e.button===1||(e.button===0&&e.altKey)){e.preventDefault();self.panSt={x:e.clientX,y:e.clientY,sl:vs.scrollLeft,st:vs.scrollTop};vs.style.cursor='grabbing'}
    });
    document.addEventListener('mousemove',e=>{if(!self.panSt)return;vs.scrollLeft=self.panSt.sl-(e.clientX-self.panSt.x);vs.scrollTop=self.panSt.st-(e.clientY-self.panSt.y)});
    document.addEventListener('mouseup',e=>{if(self.panSt){self.panSt=null;E('vs').style.cursor=''}});

    document.addEventListener('keydown',e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.isContentEditable)return;
      if(e.key==='Escape'){self.cancelSel();self.deselBub()}
      if(e.key==='Backspace'||e.key==='Delete'){if(self.selId!==null){e.preventDefault();self.delSel()}}
      if(e.key==='+'||e.key==='='){e.preventDefault();self.zoomBy(.15)}
      if(e.key==='-'){e.preventDefault();self.zoomBy(-.15)}
    });
    document.addEventListener('dragover',e=>e.preventDefault());
    document.addEventListener('drop',e=>e.preventDefault());
  },

  /* ===== FILE LOADING ===== */
  async loadFile(f){const n=f.name.toLowerCase();if(n.endsWith('.pdf'))await this.loadPDF(f);else if(/\.(png|jpe?g|tif{1,2}|bmp)$/.test(n))await this.loadImg(f);else this.toast('不支持的格式')},
  async loadPDF(f){
    this.log('加载: '+f.name);this.setStatus('y','加载中...');
    try{const buf=await f.arrayBuffer();this.pdf=await pdfjsLib.getDocument({data:buf}).promise;this.total=this.pdf.numPages;this.pg=1;this.isImg=false;this.showView();this.renderPgList();await this.renderPage();this.log(`加载成功 ${this.total}页`,'ok');this.setStatus('g','就绪');this.enableBtns()}
    catch(e){this.log('失败: '+e.message,'err');this.setStatus('r','错误')}
  },
  loadImg(f){
    this.log('加载图片: '+f.name);this.setStatus('y','加载中...');
    const img=new Image();const url=URL.createObjectURL(f);
    img.onload=async()=>{this.pdf=null;this.isImg=true;this.imgEl=img;this.total=1;this.pg=1;this.showView();this.renderPgList();await this.renderPage();this.log('图片加载成功','ok');this.setStatus('g','就绪');this.enableBtns();URL.revokeObjectURL(url)};img.src=url;
  },
  showView(){E('empSt').classList.add('hid');E('vs').style.display='';E('zBar').classList.add('show');E('app').classList.add('open')},
  enableBtns(){E('btnAuto').disabled=false;E('btnTable').disabled=false;E('btnExport').disabled=false},

  /* ===== RENDERING ===== */
  async renderPage(){
    if(this.isImg)return this.renderImgPage();if(!this.pdf)return;
    const page=await this.pdf.getPage(this.pg);
    const vp=page.getViewport({scale:this.scale});const dpr=window.devicePixelRatio||1;
    this.cv.width=vp.width*dpr;this.cv.height=vp.height*dpr;
    this.cv.style.width=vp.width+'px';this.cv.style.height=vp.height+'px';
    this.cx.scale(dpr,dpr);await page.render({canvasContext:this.cx,viewport:vp}).promise;
    this.cx.setTransform(1,0,0,1,0,0);
    this.updOverlay(vp.width,vp.height);await this.extractText();
  },
  renderImgPage(){
    const img=this.imgEl;const w=img.width*this.scale,h=img.height*this.scale;const dpr=window.devicePixelRatio||1;
    this.cv.width=w*dpr;this.cv.height=h*dpr;this.cv.style.width=w+'px';this.cv.style.height=h+'px';
    this.cx.scale(dpr,dpr);this.cx.imageSmoothingEnabled=true;this.cx.imageSmoothingQuality='high';
    this.cx.drawImage(img,0,0,w,h);this.cx.setTransform(1,0,0,1,0,0);
    this.updOverlay(w,h);this.textItems=[];
  },
  updOverlay(w,h){
    this.svg.setAttribute('width',w);this.svg.setAttribute('height',h);this.svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
    this.renderRegions();this.renderBubbles();this.cancelSel();
    E('zLv').textContent=Math.round(this.scale*100)+'%';this.updStatus();
  },
  renderPgList(){const el=E('pgList');el.innerHTML='';for(let i=1;i<=this.total;i++){const d=document.createElement('div');d.className='pg-item'+(i===this.pg?' on':'');d.innerHTML=`<span class="pg-n">${i}</span>第${i}页`;d.onclick=()=>{this.pg=i;this.renderPage();this.renderPgList()};el.appendChild(d)}},
  async extractText(){
    this.textItems=[];if(!this.pdf)return;
    try{const page=await this.pdf.getPage(this.pg);const tc=await page.getTextContent();const s=this.scale;
    this.textItems=tc.items.filter(i=>i.str.trim()).map(item=>({text:item.str.trim(),x:item.transform[4]*s,y:(page.getViewport({scale:1}).height-item.transform[5])*s,w:item.width*s,h:(item.height||Math.abs(item.transform[3]))*s}));
    if(this.textItems.length)this.log(`提取 ${this.textItems.length} 文本项`,'ok')}catch(e){}
  },

  /* ===== ZOOM ===== */
  zoomBy(d){this.scale=Math.max(.15,Math.min(8,this.scale+d));this.renderPage()},
  zoomFit(){if(!this.pdf&&!this.isImg)return;const vs=E('vs');if(this.isImg){const s=Math.min((vs.clientWidth-40)/this.imgEl.width,(vs.clientHeight-40)/this.imgEl.height,4);this.scale=s;this.renderPage()}else{this.pdf.getPage(this.pg).then(p=>{const vp=p.getViewport({scale:1});const s=Math.min((vs.clientWidth-40)/vp.width,(vs.clientHeight-40)/vp.height,4);this.scale=s;this.renderPage()})}},

  /* ===== TOOLS ===== */
  setTool(t){this.tool=t;E('tlList').querySelectorAll('.tl-item').forEach(el=>el.classList.toggle('on',el.dataset.t===t));this.cv.style.cursor=(t==='select')?'default':'crosshair'},

  /* ===== REGIONS ===== */
  addRegion(x,y,w,h){const r={id:Date.now()+Math.random(),x:x/this.scale,y:y/this.scale,w:w/this.scale,h:h/this.scale,pg:this.pg};this.regions.push(r);this.renderRegions();this.renderRegionList();this.log(`区域 #${this.regions.length} 已创建`,'ok')},
  delRegion(id){this.regions=this.regions.filter(r=>r.id!==id);this.renderRegions();this.renderRegionList()},
  renderRegions(){this.svg.querySelectorAll('.region-rect').forEach(e=>e.remove());const s=this.scale;this.regions.filter(r=>r.pg===this.pg).forEach(r=>{const rect=svgEl('rect',{class:'region-rect',x:r.x*s,y:r.y*s,width:r.w*s,height:r.h*s,fill:'rgba(91,154,255,.06)',stroke:'#5b9aff','stroke-width':'1.5','stroke-dasharray':'6,3',rx:'2'});this.svg.insertBefore(rect,this.svg.firstChild)})},
  renderRegionList(){const el=E('regionList');const pgR=this.regions.filter(r=>r.pg===this.pg);if(!pgR.length){el.innerHTML='<div style="color:var(--t3);font-size:10px">使用「识别区域」工具框选</div>';return}el.innerHTML=pgR.map((r,i)=>`<div class="region-item"><span>区域${i+1}: ${Math.round(r.w)}×${Math.round(r.h)}</span><button class="rdel" onclick="A.delRegion(${r.id})">×</button></div>`).join('')},

  /* ===== CANVAS EVENTS ===== */
  getPos(e){const r=this.cv.getBoundingClientRect();return{x:Math.max(0,Math.min(r.width,e.clientX-r.left)),y:Math.max(0,Math.min(r.height,e.clientY-r.top))}},
  onCvDown(e){if(!this.pdf&&!this.isImg||this.ocrBusy||this.panSt||e.button!==0)return;const p=this.getPos(e);if(this.tool==='region'||this.tool==='ocr'){this.selecting=true;this.selS=p;this.selE={...p};this.sr.classList.add('on');this.updSelUI()}},
  onCvMove(e){if(!this.selecting)return;this.selE=this.getPos(e);this.updSelUI()},
  onCvUp(){if(!this.selecting)return;this.selecting=false;const w=Math.abs(this.selE.x-this.selS.x),h=Math.abs(this.selE.y-this.selS.y);if(w<4||h<4){this.cancelSel();return}if(this.tool==='region'){this.addRegion(Math.min(this.selS.x,this.selE.x),Math.min(this.selS.y,this.selE.y),w,h);this.cancelSel()}else if(this.tool==='ocr'){this.performOCR()}},
  updSelUI(){const x=Math.min(this.selS.x,this.selE.x),y=Math.min(this.selS.y,this.selE.y);this.sr.style.left=x+'px';this.sr.style.top=y+'px';this.sr.style.width=Math.abs(this.selE.x-this.selS.x)+'px';this.sr.style.height=Math.abs(this.selE.y-this.selS.y)+'px'},
  cancelSel(){this.sr.classList.remove('on');this.selS=this.selE=null},

  /* ===== OCR ENGINE (ENHANCED) ===== */

  /* Adaptive threshold using integral image */
  adaptiveThresh(cv, blockSize, C){
    const w=cv.width,h=cv.height;
    const src=cv.getContext('2d',{willReadFrequently:true}).getImageData(0,0,w,h);
    const dst=new ImageData(w,h);const gray=new Uint8Array(w*h);
    for(let i=0;i<w*h;i++)gray[i]=Math.round(src.data[i*4]*0.299+src.data[i*4+1]*0.587+src.data[i*4+2]*0.114);
    const integ=new Float64Array(w*h);
    for(let y=0;y<h;y++){let rs=0;for(let x=0;x<w;x++){rs+=gray[y*w+x];integ[y*w+x]=rs+(y>0?integ[(y-1)*w+x]:0)}}
    const half=Math.floor(blockSize/2);
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const x1=Math.max(0,x-half),y1=Math.max(0,y-half),x2=Math.min(w-1,x+half),y2=Math.min(h-1,y+half);
      const cnt=(x2-x1+1)*(y2-y1+1);
      let sum=integ[y2*w+x2];if(x1>0)sum-=integ[y2*w+(x1-1)];if(y1>0)sum-=integ[(y1-1)*w+x2];if(x1>0&&y1>0)sum+=integ[(y1-1)*w+(x1-1)];
      const mean=sum/cnt;const idx=(y*w+x)*4;
      const v=gray[y*w+x]>mean-C?255:0;dst.data[idx]=dst.data[idx+1]=dst.data[idx+2]=v;dst.data[idx+3]=255;
    }
    return dst;
  },

  /* Sharpening filter (Laplacian) */
  sharpenCanvas(cv){
    const w=cv.width,h=cv.height;const cx=cv.getContext('2d',{willReadFrequently:true});
    const src=cx.getImageData(0,0,w,h);const dst=cx.createImageData(w,h);
    for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++)for(let c=0;c<3;c++){
      const i=(y*w+x)*4+c;
      const v=5*src.data[i]-src.data[((y-1)*w+x)*4+c]-src.data[((y+1)*w+x)*4+c]-src.data[(y*w+(x-1))*4+c]-src.data[(y*w+(x+1))*4+c];
      dst.data[i]=Math.max(0,Math.min(255,v));
    }
    for(let y=0;y<h;y++)for(let x=0;x<w;x++)dst.data[(y*w+x)*4+3]=255;
    cx.putImageData(dst,0,0);return cv;
  },

  /* Otsu threshold */
  otsuThresh(cv){
    const cx=cv.getContext('2d',{willReadFrequently:true});const id=cx.getImageData(0,0,cv.width,cv.height);const d=id.data;
    const hist=new Array(256).fill(0);for(let i=0;i<d.length;i+=4)hist[Math.round(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114)]++;
    const total=d.length/4;let sum=0;for(let i=0;i<256;i++)sum+=i*hist[i];
    let sB=0,wB=0,mxV=0,th=0;for(let i=0;i<256;i++){wB+=hist[i];if(!wB)continue;const wF=total-wB;if(!wF)break;sB+=i*hist[i];const mB=sB/wB,mF=(sum-sB)/wF;const vb=wB*wF*(mB-mF)*(mB-mF);if(vb>mxV){mxV=vb;th=i}}return th;
  },

  /* Auto-crop whitespace */
  autoCrop(cv){
    const cx=cv.getContext('2d',{willReadFrequently:true});const id=cx.getImageData(0,0,cv.width,cv.height);const d=id.data;
    let x1=cv.width,y1=cv.height,x2=0,y2=0;
    for(let y=0;y<cv.height;y++)for(let x=0;x<cv.width;x++){const i=(y*cv.width+x)*4;if(d[i]<250){x1=Math.min(x1,x);y1=Math.min(y1,y);x2=Math.max(x2,x);y2=Math.max(y2,y)}}
    if(x1>x2)return cv;const pad=6,cx0=Math.max(0,x1-pad),cy0=Math.max(0,y1-pad);
    const cw=Math.min(cv.width-cx0,x2-x1+2*pad),ch=Math.min(cv.height-cy0,y2-y1+2*pad);
    const out=document.createElement('canvas');out.width=cw;out.height=ch;out.getContext('2d').drawImage(cv,cx0,cy0,cw,ch,0,0,cw,ch);return out;
  },

  /* Crop, rotate, preprocess with multiple modes */
  cropAndProc(angle, thresh, mode){
    const dpr=window.devicePixelRatio||1;const sc=parseInt(E('sScale').value);
    thresh=thresh!==undefined?thresh:parseInt(E('sThresh').value);
    const inv=E('sInvert').value==='1';const useAdapt=E('sAdapt').value==='1';
    const sx=Math.min(this.selS.x,this.selE.x)*dpr,sy=Math.min(this.selS.y,this.selE.y)*dpr;
    const sw=Math.abs(this.selE.x-this.selS.x)*dpr,sh=Math.abs(this.selE.y-this.selS.y)*dpr;
    const swap=(angle===90||angle===270);
    const outW=Math.round((swap?sh:sw)*sc),outH=Math.round((swap?sw:sh)*sc);
    const off=document.createElement('canvas');off.width=outW;off.height=outH;
    const oc=off.getContext('2d',{willReadFrequently:true});
    oc.fillStyle='#fff';oc.fillRect(0,0,outW,outH);oc.save();
    oc.imageSmoothingEnabled=true;oc.imageSmoothingQuality='high';
    if(angle===0)oc.drawImage(this.cv,sx,sy,sw,sh,0,0,outW,outH);
    else if(angle===90){oc.translate(outW,0);oc.rotate(Math.PI/2);oc.drawImage(this.cv,sx,sy,sw,sh,0,0,sh*sc,sw*sc)}
    else if(angle===180){oc.translate(outW,outH);oc.rotate(Math.PI);oc.drawImage(this.cv,sx,sy,sw,sh,0,0,outW,outH)}
    else if(angle===270){oc.translate(0,outH);oc.rotate(-Math.PI/2);oc.drawImage(this.cv,sx,sy,sw,sh,0,0,sh*sc,sw*sc)}
    oc.restore();

    if(mode==='sharpen'){this.sharpenCanvas(off)}

    if(useAdapt&&mode!=='global'){
      const bs=Math.max(15,Math.round(Math.min(outW,outH)/8)|1);const C=mode==='aggressive'?15:8;
      const ad=this.adaptiveThresh(off,bs|1,C);
      oc.putImageData(ad,0,0);
    }else{
      const imgData=oc.getImageData(0,0,outW,outH);const d=imgData.data;
      for(let i=0;i<d.length;i+=4){let g=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;if(inv)g=255-g;const v=g<thresh?0:255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255}
      oc.putImageData(imgData,0,0);
    }
    return off;
  },

  async ocrPass(cv,psm,lang){
    const res=await Tesseract.recognize(cv,lang||'eng',{tessedit_char_whitelist:'0123456789.',tessedit_pageseg_mode:psm});
    return{text:(res.data.text||'').trim(),confidence:res.data.confidence};
  },

  /* Enhanced digit extraction with confusion corrections */
  extractDigits(raw){
    let t=raw.replace(/[^0-9.]/g,'').replace(/^\.+|\.+$/g,'');
    const m=t.match(/\d+\.?\d*/);return m?m[0]:'';
  },

  /* Multi-pass OCR with voting (ENHANCED for 4-digit) */
  async multiPassOCR(angle){
    const psm=E('sPSM').value,lang=E('sLang').value;
    const useMulti=E('sMulti').value==='1';
    const baseThresh=parseInt(E('sThresh').value);

    /* Pass 1: user settings */
    const p1=this.cropAndProc(angle,baseThresh,'global');
    const r1=await this.ocrPass(p1,psm,lang);
    const d1=this.extractDigits(r1.text);

    if(!useMulti&&d1)return{text:d1,confidence:r1.confidence,preview:this.autoCrop(p1)};

    /* Pass 2: adaptive threshold */
    const p2=this.cropAndProc(angle,baseThresh,'adaptive');
    const r2=await this.ocrPass(p2,psm,lang);
    const d2=this.extractDigits(r2.text);

    /* Pass 3: Otsu auto-threshold */
    const otsuTh=this.otsuThresh(this.cropAndProc(angle,0,'global'));
    const p3=this.cropAndProc(angle,otsuTh,'global');
    const r3=await this.ocrPass(p3,psm,lang);
    const d3=this.extractDigits(r3.text);

    /* Pass 4: sharpened */
    const p4=this.cropAndProc(angle,baseThresh,'sharpen');
    const r4=await this.ocrPass(p4,psm,lang);
    const d4=this.extractDigits(r4.text);

    /* Pass 5: aggressive adaptive */
    const p5=this.cropAndProc(angle,baseThresh,'aggressive');
    const r5=await this.ocrPass(p5,psm,lang);
    const d5=this.extractDigits(r5.text);

    /* Pass 6: inverted */
    const origInv=E('sInvert').value;E('sInvert').value=origInv==='0'?'1':'0';
    const p6=this.cropAndProc(angle,baseThresh,'global');
    E('sInvert').value=origInv;
    const r6=await this.ocrPass(p6,psm,lang);
    const d6=this.extractDigits(r6.text);

    /* Voting */
    const all=[{t:d1,c:r1.confidence,p:p1},{t:d2,c:r2.confidence,p:p2},{t:d3,c:r3.confidence,p:p3},{t:d4,c:r4.confidence,p:p4},{t:d5,c:r5.confidence,p:p5},{t:d6,c:r6.confidence,p:p6}];
    const votes={};
    all.forEach(r=>{if(!r.t)return;if(!votes[r.t])votes[r.t]={n:0,tc:0,procs:[]};votes[r.t].n++;votes[r.t].tc+=r.c;votes[r.t].procs.push(r.p)});

    let best='',bestScore=-1,bestProc=p1;
    for(const[t,v]of Object.entries(votes)){const score=v.n*1000+v.tc;if(score>bestScore){bestScore=score;best=t;bestProc=v.procs[0]}}

    if(!best){const valid=all.filter(r=>r.t).sort((a,b)=>b.c-a.c);if(valid.length)return{text:valid[0].t,confidence:valid[0].c,preview:this.autoCrop(valid[0].p)};return{text:'',confidence:0,preview:this.autoCrop(p1)}}

    const conf=votes[best].tc/votes[best].n;
    this.log(`  投票: "${best}" (${votes[best].n}/6票, ${conf.toFixed(1)}%)`,'ok');
    return{text:best,confidence:conf,preview:this.autoCrop(bestProc)};
  },

  /* Main OCR entry */
  async performOCR(){
    if(this.ocrBusy)return;this.ocrBusy=true;
    const t0=performance.now();this.setStatus('y','识别中...');
    try{
      let best={text:'',confidence:0,angle:0},preview=null;
      if(this.rot==='auto'){
        this.log('自动检测方向...','info');
        for(const ang of[0,90,180,270]){this.setStatus('y',`检测 ${ang}°...`);const r=await this.multiPassOCR(ang);this.log(`  ${ang}°→"${r.text}"(${r.confidence.toFixed(1)}%)`);const score=r.text?r.confidence+1000:r.confidence;const bestS=best.text?best.confidence+1000:best.confidence;if(score>bestS){best={text:r.text,confidence:r.confidence,angle:ang};preview=r.preview}}
      }else{const r=await this.multiPassOCR(this.rot);best={text:r.text,confidence:r.confidence,angle:this.rot};preview=r.preview}
      const el=((performance.now()-t0)/1000).toFixed(2);
      if(preview){const pv=E('ocrPrev');const img=new Image();img.src=preview.toDataURL('image/png');pv.innerHTML='';pv.appendChild(img)}
      E('ocrVal').textContent=best.text||'—';E('ocrMeta').textContent=best.text?`${best.confidence.toFixed(1)}% · ${best.angle}° · ${el}s`:'未识别';
      if(best.text){
        this.lastOCR={value:best.text,angle:best.angle,confidence:best.confidence,
          selX:Math.min(this.selS.x,this.selE.x)/this.scale,selY:Math.min(this.selS.y,this.selE.y)/this.scale,
          selW:Math.abs(this.selE.x-this.selS.x)/this.scale,selH:Math.abs(this.selE.y-this.selS.y)/this.scale};
        this.addFromOCR();this.log(`识别: "${best.text}" @${best.angle}° (${best.confidence.toFixed(1)}%, ${el}s)`,'ok');
      }else{this.log('未识别到数字','warn')}
      this.setStatus('g',`完成 ${el}s`);
    }catch(e){this.log('OCR错误: '+e.message,'err');this.setStatus('r','错误')}
    this.ocrBusy=false;
  },

  /* ===== BUBBLE POSITIONING (FIX #1 & #2) ===== */

  /* Find best bubble position: corner-based + collision avoidance */
  findBubblePos(selX,selY,selW,selH){
    const s=this.scale;
    const R=14/s; /* bubble display radius 14px → page coords */
    const OFFSET=R*2.8;
    const pageDims=this.dims.filter(d=>d.pg===this.pg);

    /* Four corners with outward extension */
    const candidates=[
      {x:selX+selW+OFFSET,y:selY-OFFSET},
      {x:selX-OFFSET,y:selY-OFFSET},
      {x:selX+selW+OFFSET,y:selY+selH+OFFSET},
      {x:selX-OFFSET,y:selY+selH+OFFSET},
      /* Extended positions */
      {x:selX+selW+OFFSET*2,y:selY-OFFSET},
      {x:selX-OFFSET*2,y:selY-OFFSET},
      {x:selX+selW+OFFSET*2,y:selY+selH+OFFSET},
      {x:selX-OFFSET*2,y:selY+selH+OFFSET},
      {x:selX+selW+OFFSET,y:selY-OFFSET*2},
      {x:selX-OFFSET,y:selY-OFFSET*2},
      {x:selX+selW+OFFSET,y:selY+selH+OFFSET*2},
      {x:selX-OFFSET,y:selY+selH+OFFSET*2},
      /* Far extensions */
      {x:selX+selW+OFFSET*3,y:selY-OFFSET},
      {x:selX-OFFSET*3,y:selY-OFFSET},
      {x:selX+selW+OFFSET*3,y:selY+selH+OFFSET},
      {x:selX-OFFSET*3,y:selY+selH+OFFSET},
    ];

    const MIN_DIST=R*3.5;
    let best=candidates[0],bestScore=Infinity;
    for(const c of candidates){
      let score=0;
      for(const d of pageDims){
        const dx=c.x-d.bubX,dy=c.y-d.bubY,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<MIN_DIST)score+=(MIN_DIST-dist)*100;
      }
      /* Slight preference for top-right corner (conventional) */
      if(c.x>selX+selW/2&&c.y<selY+selH/2)score-=0.5;
      if(score<bestScore){bestScore=score;best=c}
    }
    return{x:best.x,y:best.y};
  },

  /* Find nearest corner of selection rectangle to bubble */
  findNearestCorner(dim){
    const s=this.scale;
    const bx=dim.bubX*s,by=dim.bubY*s;
    const sx=dim.selX*s,sy=dim.selY*s,sw=dim.selW*s,sh=dim.selH*s;
    const corners=[{x:sx,y:sy},{x:sx+sw,y:sy},{x:sx,y:sy+sh},{x:sx+sw,y:sy+sh}];
    let nearest=corners[0],minD=Infinity;
    for(const c of corners){const d=Math.hypot(bx-c.x,by-c.y);if(d<minD){minD=d;nearest=c}}
    return nearest;
  },

  addFromOCR(){
    if(!this.lastOCR)return;const r=this.lastOCR;
    const parsed=this.parseDim(r.value);const num=this.getNextNum();
    const pos=this.findBubblePos(r.selX,r.selY,r.selW,r.selH);
    const dim={id:Date.now()+Math.random(),num,nominal:parsed.nom,upperTol:parsed.up,lowerTol:parsed.lo,
      type:parsed.type,gdt:'',measured:'',result:'',notes:'',pg:this.pg,
      selX:r.selX,selY:r.selY,selW:r.selW,selH:r.selH,bubX:pos.x,bubY:pos.y};
    this.dims.push(dim);this.addBubSVG(dim);this.renderTable();this.toast(`#${dim.num} ${dim.nominal}`);
  },

  parseDim(text){
    text=text.replace(/[oO]/g,'0').replace(/[lI](?=\d)/g,'1').trim();
    let type='linear',nom='',up='',lo='';
    if(/[øØϕΦ]/.test(text))type='diameter';else if(/^[rR]\s*\d/.test(text))type='radius';else if(/[°]/.test(text))type='angle';
    let c=text.replace(/[øØϕΦrR°]/g,'').trim();
    let m=c.match(/(\d+\.?\d*)\s*[+＋]\s*(\d+\.?\d*)\s*[-–—]\s*(\d+\.?\d*)/);
    if(m)return{nom:m[1],up:'+'+m[2],lo:'-'+m[3],type};
    m=c.match(/(\d+\.?\d*)\s*[±]\s*(\d+\.?\d*)/);
    if(m)return{nom:m[1],up:'+'+m[2],lo:'-'+m[2],type};
    m=c.match(/(\d+\.?\d*)/);
    if(m)return{nom:m[1],up:'',lo:'',type};
    return{nom:text,up:'',lo:'',type};
  },

  /* ===== NUMBER MANAGEMENT ===== */
  getNextNum(){if(this.recycled.length>0)return this.recycled.shift();return this.nextN++},
  recycleNum(n){let ins=false;for(let i=0;i<this.recycled.length;i++){if(n<this.recycled[i]){this.recycled.splice(i,0,n);ins=true;break}}if(!ins)this.recycled.push(n)},

  /* ===== AUTO BUBBLE ===== */
  async autoBubble(){
    if(!this.pdf&&!this.isImg)return;
    const pgR=this.regions.filter(r=>r.pg===this.pg);
    if(!pgR.length){this.toast('请先使用「识别区域」工具框选识别范围');return}
    this.setStatus('y','自动识别...');this.log('自动气泡开始...','info');
    const t0=performance.now();let added=0;
    try{
      for(const region of pgR){
        let found=[];
        if(this.textItems.length)found=this.autoFromText(region);
        if(!found.length)found=await this.autoFromOCR(region);
        for(const f of found){
          if(this.dims.some(d=>d.nominal===f.nom&&d.pg===this.pg))continue;
          const parsed={nom:f.nom,up:f.up||'',lo:f.lo||'',type:f.type||'linear'};
          const num=this.getNextNum();
          const pos=this.findBubblePos(f.x,f.y,f.w||2,f.h||1);
          const dim={id:Date.now()+Math.random()+added,num,...parsed,gdt:'',measured:'',result:'',notes:'',
            pg:this.pg,selX:f.x,selY:f.y,selW:f.w||2,selH:f.h||1,bubX:pos.x,bubY:pos.y};
          this.dims.push(dim);this.addBubSVG(dim);added++;
        }
      }
      const el=((performance.now()-t0)/1000).toFixed(2);this.renderTable();
      this.log(`自动完成: +${added} (${el}s)`,'ok');this.toast(`已添加 ${added} 个气泡`);this.setStatus('g',`完成 +${added}`);
    }catch(e){this.log('错误: '+e.message,'err');this.setStatus('r','错误')}
  },

  autoFromText(region){
    const s=this.scale;const rx=region.x,ry=region.y,rw=region.w,rh=region.h;
    const items=this.textItems.filter(i=>i.x/s>=rx&&i.x/s<=rx+rw&&i.y/s>=ry&&i.y/s<=ry+rh);
    const nums=items.filter(i=>/\d/.test(i.text));const results=[];const used=new Set();
    for(const item of nums){if(used.has(item))continue;const group=[item];used.add(item);
      for(const other of items){if(used.has(other))continue;if(Math.abs(other.x-item.x)/s<3&&Math.abs(other.y-item.y)/s<1.5){group.push(other);used.add(other)}}
      group.sort((a,b)=>a.x-b.x||a.y-b.y);const combined=group.map(g=>g.text).join(' ');
      const parsed=this.parseDim(combined);if(parsed.nom&&/\d/.test(parsed.nom))results.push({nom:parsed.nom,up:parsed.up,lo:parsed.lo,type:parsed.type,x:item.x/s,y:item.y/s,w:(item.w||40)/s,h:(item.h||15)/s})}
    return results;
  },

  async autoFromOCR(region){
    const s=this.scale;const rx=region.x*s,ry=region.y*s,rw=region.w*s,rh=region.h*s;
    const cellW=Math.min(120,rw),cellH=40,stepX=cellW-20,stepY=25;
    const results=[];const origSel={s:this.selS,e:this.selE};
    const psm=E('sPSM').value,lang=E('sLang').value;
    for(let y=ry;y<ry+rh-cellH;y+=stepY){for(let x=rx;x<rx+rw-cellW;x+=stepX){
      this.selS={x,y};this.selE={x:x+cellW,y:y+cellH};
      const proc=this.cropAndProc(0,undefined,'global');
      try{const r=await this.ocrPass(proc,psm,lang);const d=this.extractDigits(r.text);
        if(d&&r.confidence>50){const parsed=this.parseDim(r.text);if(parsed.nom)results.push({nom:parsed.nom,up:parsed.up,lo:parsed.lo,type:parsed.type,x:x/s,y:y/s,w:cellW/s,h:cellH/s})}}catch(e){}}
      this.setStatus('y',`扫描 ${Math.round((y-ry)/rh*100)}%...`)}
    this.selS=origSel.s;this.selE=origSel.e;return results;
  },

  /* ===== BUBBLE SVG (FIX #1: corner leader line) ===== */
  addBubSVG(dim){
    const s=this.scale;
    const bx=dim.bubX*s,by=dim.bubY*s;
    const sx=dim.selX*s,sy=dim.selY*s,sw=dim.selW*s,sh=dim.selH*s;
    /* Find nearest corner for leader line endpoint */
    const corners=[{x:sx,y:sy},{x:sx+sw,y:sy},{x:sx,y:sy+sh},{x:sx+sw,y:sy+sh}];
    let nc=corners[0],minD=Infinity;for(const c of corners){const d=Math.hypot(bx-c.x,by-c.y);if(d<minD){minD=d;nc=c}}

    const g=svgEl('g',{class:'bg','data-id':dim.id,transform:`translate(${bx},${by})`});
    /* Selection frame (preserved) */
    g.appendChild(svgEl('rect',{class:'sf',x:sx-bx,y:sy-by,width:sw,height:sh,fill:'rgba(255,60,60,.05)',stroke:'#ff3c3c','stroke-width':'1.5','stroke-dasharray':'5,3',rx:'1'}));
    /* Leader line to nearest corner */
    g.appendChild(svgEl('line',{class:'ll',x1:0,y1:0,x2:nc.x-bx,y2:nc.y-by,stroke:'#ff3c3c','stroke-width':'1.2'}));
    /* Connection dot at corner */
    g.appendChild(svgEl('circle',{class:'cd',cx:nc.x-bx,cy:nc.y-by,r:3,fill:'#ff3c3c'}));
    /* Bubble circle */
    g.appendChild(svgEl('circle',{class:'bc',cx:0,cy:0,r:14,fill:'rgba(16,18,28,.94)',stroke:'#ff3c3c','stroke-width':'2'}));
    /* Number text */
    g.appendChild(svgEl('text',{x:0,y:1,'text-anchor':'middle','dominant-baseline':'central',fill:'#ff3c3c','font-family':"'JetBrains Mono',monospace",'font-size':'11','font-weight':'700'},dim.num.toString()));
    this.svg.appendChild(g);this.updStatus();
  },

  renderBubbles(){this.svg.querySelectorAll('.bg').forEach(e=>e.remove());this.dims.filter(d=>d.pg===this.pg).forEach(d=>this.addBubSVG(d))},

  updBubblePos(id,nbx,nby){
    const dim=this.dims.find(d=>d.id===id);if(!dim)return;
    dim.bubX=nbx;dim.bubY=nby;const s=this.scale;const bx=nbx*s,by=nby*s;
    const sx=dim.selX*s,sy=dim.selY*s,sw=dim.selW*s,sh=dim.selH*s;
    const corners=[{x:sx,y:sy},{x:sx+sw,y:sy},{x:sx,y:sy+sh},{x:sx+sw,y:sy+sh}];
    let nc=corners[0],minD=Infinity;for(const c of corners){const d=Math.hypot(bx-c.x,by-c.y);if(d<minD){minD=d;nc=c}}
    const g=this.svg.querySelector(`[data-id="${id}"]`);if(!g)return;
    g.setAttribute('transform',`translate(${bx},${by})`);
    g.querySelector('.sf').setAttribute('x',sx-bx);g.querySelector('.sf').setAttribute('y',sy-by);
    g.querySelector('.ll').setAttribute('x2',nc.x-bx);g.querySelector('.ll').setAttribute('y2',nc.y-by);
    g.querySelector('.cd').setAttribute('cx',nc.x-bx);g.querySelector('.cd').setAttribute('cy',nc.y-by);
  },

  /* ===== BUBBLE INTERACTION ===== */
  dragSt:null,
  onBubDown(e){const g=e.target.closest('.bg');if(!g)return;e.preventDefault();e.stopPropagation();const id=parseFloat(g.dataset.id);this.selBub(id);const dim=this.dims.find(d=>d.id===id);if(!dim)return;const pt=this.svgPt(e);this.dragSt={id,ox:pt.x-dim.bubX*this.scale,oy:pt.y-dim.bubY*this.scale}},
  onBubMove(e){if(!this.dragSt)return;const pt=this.svgPt(e);this.updBubblePos(this.dragSt.id,(pt.x-this.dragSt.ox)/this.scale,(pt.y-this.dragSt.oy)/this.scale)},
  onBubUp(){this.dragSt=null},
  svgPt(e){const pt=this.svg.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;return pt.matrixTransform(this.svg.getScreenCTM().inverse())},

  selBub(id){this.selId=id;const dim=this.dims.find(d=>d.id===id);if(!dim)return;E('bpPanel').style.display='';E('bpN').value=dim.num;E('bpV').value=dim.nominal;E('bpU').value=dim.upperTol;E('bpL').value=dim.lowerTol;E('bpT').value=dim.type;E('bpG').value=dim.gdt||'';E('bpNo').value=dim.notes||'';document.querySelectorAll('#dtB tr').forEach(t=>t.classList.remove('sel'));const tr=document.querySelector(`#dtB tr[data-id="${id}"]`);if(tr)tr.classList.add('sel')},

  updBubble(){if(this.selId===null)return;const dim=this.dims.find(d=>d.id===this.selId);if(!dim)return;dim.num=parseInt(E('bpN').value)||dim.num;dim.nominal=E('bpV').value;dim.upperTol=E('bpU').value;dim.lowerTol=E('bpL').value;dim.type=E('bpT').value;dim.gdt=E('bpG').value;dim.notes=E('bpNo').value;const g=this.svg.querySelector(`[data-id="${dim.id}"]`);if(g)g.querySelector('text').textContent=dim.num;this.renderTable()},
  delSel(){if(this.selId===null)return;const dim=this.dims.find(d=>d.id===this.selId);if(dim)this.recycleNum(dim.num);this.dims=this.dims.filter(d=>d.id!==this.selId);const g=this.svg.querySelector(`[data-id="${this.selId}"]`);if(g)g.remove();this.deselBub();this.renderTable();this.toast('已删除');this.updStatus()},

  /* ===== TABLE ===== */
  renderTable(){
    const tb=E('dtB'),em=E('dtE');E('dtC').textContent=this.dims.length;E('stD').textContent='尺寸:'+this.dims.length;
    if(!this.dims.length){tb.innerHTML='';em.style.display='';return}em.style.display='none';
    tb.innerHTML=this.dims.map(d=>{const tl={linear:'线性',diameter:'⌀直径',radius:'R半径',angle:'∠角度',gdt:'GD&T'};const pass=d.measured?(this.chkPass(d)?'<span style="color:var(--ok)">✓</span>':'<span style="color:var(--ac)">✗</span>'):'—';
    return`<tr data-id="${d.id}" onclick="A.selBub(${d.id})"><td class="dn">${d.num}</td><td class="dv" contenteditable data-f="nominal">${d.nominal}</td><td class="dt2" contenteditable data-f="upperTol">${d.upperTol||''}</td><td class="dt2" contenteditable data-f="lowerTol">${d.lowerTol||''}</td><td style="color:var(--t2);font-size:10px">${tl[d.type]||d.type}</td><td style="color:var(--info);font-size:13px">${d.gdt||''}</td><td contenteditable data-f="measured" style="color:var(--t1)">${d.measured||''}</td><td>${pass}</td><td contenteditable data-f="notes" style="color:var(--t2)">${d.notes||''}</td><td><button class="b bs bd" style="padding:1px 4px;font-size:9px" onclick="event.stopPropagation();A.delDim(${d.id})">×</button></td></tr>`}).join('');

  },
  chkPass(d){if(!d.measured||!d.nominal)return false;const nom=parseFloat(d.nominal),meas=parseFloat(d.measured);if(isNaN(nom)||isNaN(meas))return false;let u=0,l=0;if(d.upperTol)u=parseFloat(d.upperTol.replace('+',''));if(d.lowerTol)l=parseFloat(d.lowerTol.replace('-',''));return meas>=nom+l&&meas<=nom+u},
  addEmpty(){const num=this.getNextNum();const dim={id:Date.now()+Math.random(),num,nominal:'',upperTol:'',lowerTol:'',type:'linear',gdt:'',measured:'',result:'',notes:'',pg:this.pg,selX:2,selY:2,selW:3,selH:1,bubX:6,bubY:1};this.dims.push(dim);this.addBubSVG(dim);this.renderTable();this.selBub(dim.id)},
  delDim(id){const dim=this.dims.find(d=>d.id===id);if(dim)this.recycleNum(dim.num);this.dims=this.dims.filter(d=>d.id!==id);const g=this.svg.querySelector(`[data-id="${id}"]`);if(g)g.remove();if(this.selId===id)this.deselBub();this.renderTable();this.updStatus()},

  /* ===== EXPORT ===== */
  dl(content,name,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)},

  /* Build high-res bubble canvas for export */
  buildExportCanvas(){
    const dpr=window.devicePixelRatio||1;
    const cw=this.cv.width,ch=this.cv.height;
    const ec=document.createElement('canvas');ec.width=cw;ec.height=ch;
    const ex=ec.getContext('2d');ex.drawImage(this.cv,0,0);
    const s=this.scale*dpr;
    this.dims.filter(d=>d.pg===this.pg).forEach(d=>{
      const bx=d.bubX*s,by=d.bubY*s;
      const sx=d.selX*s,sy=d.selY*s,sw=d.selW*s,sh=d.selH*s;
      /* Nearest corner */
      const corners=[{x:sx,y:sy},{x:sx+sw,y:sy},{x:sx,y:sy+sh},{x:sx+sw,y:sy+sh}];
      let nc=corners[0],minD=Infinity;for(const c of corners){const dist=Math.hypot(bx-c.x,by-c.y);if(dist<minD){minD=dist;nc=c}}
      /* Selection frame */
      ex.strokeStyle='#ff3c3c';ex.lineWidth=1.5*dpr;ex.setLineDash([5*dpr,3*dpr]);ex.strokeRect(sx,sy,sw,sh);ex.setLineDash([]);
      /* Leader line */
      ex.beginPath();ex.moveTo(bx,by);ex.lineTo(nc.x,nc.y);ex.strokeStyle='#ff3c3c';ex.lineWidth=1.2*dpr;ex.stroke();
      /* Connection dot */
      ex.beginPath();ex.arc(nc.x,nc.y,3*dpr,0,Math.PI*2);ex.fillStyle='#ff3c3c';ex.fill();
      /* Bubble circle */
      ex.beginPath();ex.arc(bx,by,14*dpr,0,Math.PI*2);ex.fillStyle='rgba(16,18,28,.94)';ex.fill();ex.strokeStyle='#ff3c3c';ex.lineWidth=2*dpr;ex.stroke();
      /* Number */
      ex.fillStyle='#ff3c3c';ex.font=`700 ${11*dpr}px 'JetBrains Mono',monospace`;ex.textAlign='center';ex.textBaseline='middle';ex.fillText(d.num.toString(),bx,by+dpr);
    });
    return ec;
  },

  expCSV(){if(!this.dims.length){this.toast('无数据');return}let csv='\uFEFFFAI 首件检验报告\n';csv+=`零件号,${E('iPN').value}\n图号,${E('iDW').value}\n版本,${E('iRV').value}\n\n`;csv+='序号,名义值,上偏差,下偏差,类型,GD&T,实测值,判定,备注\n';this.dims.forEach(d=>{const p=d.measured?(this.chkPass(d)?'PASS':'FAIL'):'';csv+=`${d.num},${d.nominal},${d.upperTol},${d.lowerTol},${d.type},${d.gdt},${d.measured},${p},${d.notes}\n`});this.dl(csv,`FAI_${E('iDW').value||'report'}.csv`,'text/csv;charset=utf-8');this.toast('CSV 已导出');this.log('导出CSV','ok')},

  expXLS(){if(!this.dims.length){this.toast('无数据');return}const wb=XLSX.utils.book_new();const hd=[['FAI 首件检验报告 / First Article Inspection Report'],[],['零件号 Part No.',E('iPN').value,'','图号 DWG No.',E('iDW').value],['版本 Rev.',E('iRV').value,'','日期',new Date().toLocaleDateString('zh-CN')],[],['序号\nBalloon','名义值\nNominal','上偏差\nUpper','下偏差\nLower','类型\nType','GD&T','实测值\nMeasured','判定\nResult','备注\nNotes']];this.dims.forEach(d=>{const p=d.measured?(this.chkPass(d)?'PASS':'FAIL'):'';hd.push([d.num,d.nominal,d.upperTol,d.lowerTol,d.type,d.gdt,d.measured,p,d.notes])});const ws=XLSX.utils.aoa_to_sheet(hd);ws['!cols']=[{wch:8},{wch:12},{wch:10},{wch:10},{wch:10},{wch:8},{wch:12},{wch:8},{wch:15}];ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}}];XLSX.utils.book_append_sheet(wb,ws,'FAI');XLSX.writeFile(wb,`FAI_${E('iDW').value||'report'}.xlsx`);this.toast('Excel 已导出');this.log('导出Excel','ok')},

  /* PDF Export (FIX #3) */
  expPDF(){
    if(!this.pdf&&!this.isImg){this.toast('请先加载图纸');return}
    const ec=this.buildExportCanvas();
    const imgData=ec.toDataURL('image/jpeg',0.95);
    const cw=parseFloat(this.cv.style.width),ch=parseFloat(this.cv.style.height);
    const {jsPDF}=window.jspdf;
    const pdfWmm=cw*0.264583,pdfHmm=ch*0.264583;
    const orient=pdfWmm>pdfHmm?'landscape':'portrait';
    const pdf=new jsPDF({orientation:orient,unit:'mm',format:[pdfWmm,pdfHmm]});
    pdf.addImage(imgData,'JPEG',0,0,pdfWmm,pdfHmm);
    pdf.save(`bubble_${E('iDW').value||'diagram'}.pdf`);
    this.toast('PDF 已导出');this.log('导出PDF','ok');
  },

  expImg(){
    if(!this.pdf&&!this.isImg){this.toast('请先加载图纸');return}
    const fmt=E('eFmt').value;const ec=this.buildExportCanvas();
    ec.toBlob(blob=>{const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=`bubble_${E('iDW').value||'diagram'}.${fmt}`;a.click();URL.revokeObjectURL(u)},fmt==='jpeg'?'image/jpeg':'image/png',.95);
    this.toast('气泡图已导出');this.log(`导出气泡图(${fmt})`,'ok');
  },

  /* ===== PROJECT ===== */
  saveProj(){const data={v:'3.0',date:new Date().toISOString(),info:{pn:E('iPN').value,dw:E('iDW').value,rv:E('iRV').value},dims:this.dims,regions:this.regions,nextN:this.nextN,recycled:this.recycled};this.dl(JSON.stringify(data,null,2),`FAI_${data.info.dw||'project'}.json`,'application/json');this.toast('项目已保存');this.log('保存项目','ok')},
  async loadProj(f){try{const d=JSON.parse(await f.text());E('iPN').value=d.info?.pn||'';E('iDW').value=d.info?.dw||'';E('iRV').value=d.info?.rv||'';this.dims=d.dims||[];this.regions=d.regions||[];this.nextN=d.nextN||(this.dims.length+1);this.recycled=d.recycled||[];if(this.pdf||this.isImg){this.renderRegions();this.renderBubbles();this.renderRegionList()}this.renderTable();this.toast('项目已载入');this.log(`载入: ${this.dims.length}尺寸`,'ok')}catch(e){this.toast('载入失败');this.log('载入失败: '+e.message,'err')}},

  /* ===== UI ===== */
  log(m,t=''){const el=E('logA');const d=document.createElement('div');d.style.color=t==='ok'?'var(--ok)':t==='err'?'var(--ac)':t==='warn'?'var(--warn)':t==='info'?'var(--info)':'var(--t3)';const ts=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});d.textContent=`[${ts}] ${m}`;el.appendChild(d);el.scrollTop=el.scrollHeight},
  setStatus(c,t){E('sDot').className='sd '+c;E('sTxt').textContent=t},
  updStatus(){E('stP').textContent=`页${this.pg}/${this.total}`;E('stZ').textContent=`${Math.round(this.scale*100)}%`;E('stB').textContent='气泡:'+this.dims.filter(d=>d.pg===this.pg).length},
  toast(m){const el=E('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2000)}
};

document.addEventListener('DOMContentLoaded',()=>A.init());
</script>
