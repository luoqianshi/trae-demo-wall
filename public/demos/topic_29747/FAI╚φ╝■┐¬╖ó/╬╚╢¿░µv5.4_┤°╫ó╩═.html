  /* ================================================================
     【编号管理：getNextNum / recycleNum】
     这两个函数管理气泡编号的分配和回收，就像办公室管理门牌号：
     - 有回收的号码先用回收的（避免编号跳来跳去）
     - 没回收的就发新号码（nextN不断递增）
     ================================================================ */
  // getNextNum：获取下一个可用的气泡编号
  getNextNum:function(){
    // 如果回收数组里有编号（之前删除的），优先复用。shift取出第一个
    if(this.recycled.length>0)return this.recycled.shift();

  // recycleNum：回收一个编号，下次优先使用

    var ins=false;
    // 遍历回收数组，按从小到大顺序插入（保持有序）
    for(var i=0;i<this.recycled.length;i++){
      // 如果回收的号比当前项小，插在当前位置前面。改<为>会变成降序
      if(n<this.recycled[i]){

        this.recycled.splice(i,0,n);

        break;
      }

    if(!ins)this.recycled.push(n);
  },
  /* ================================================================
     【simValue / simAll / delSim：模拟测量值】
     这三兄弟用于"假装测量"，在正式检验前生成随机但合理的实测值，
     方便测试判定逻辑和导出功能。
     ================================================================ */
  // simValue：给一个尺寸生成随机模拟测量值
  // dim=尺寸对象；返回字符串形式的模拟值
  simValue:function(dim){
    // 如果没有标称值，返回空字符串。改''为'0'会默认模拟为0
    if(!dim.nominal)return'';
    // nom：把标称值字符串转成数字
    var nom=parseFloat(dim.nominal);
    // 如果转失败返回空
    if(isNaN(nom))return'';
    // u/l：上差和下差的数值。||0表示如果解析失败默认0
    var u=parseFloat(dim.upperTol)||0,l=parseFloat(dim.lowerTol)||0;
    // 如果上下差都是0（没有公差），直接返回标称值。改toString()可换格式
    if(u===0&&l===0)return nom.toString();
    // lo/hi：允许的最小和最大极限尺寸。l可能是负数（如-0.1）
    var lo=nom+l,hi=nom+u;

    var dec=1;

    if(equip==='角度尺')dec=1;

    // 有数据时隐藏空提示
    em.style.display='none';
    // tl：类型翻译字典。增删键值可添加更多类型显示
    var tl={linear:'线性',diameter:'直径',radius:'R半径',chamfer:'C倒角',angle:'角度',gdt:'GD&T'};
    // 用map遍历所有尺寸生成HTML行，最后用join('')拼接。改join('\n')可换行
    tb.innerHTML=this.dims.map(function(d){
      // pass：判定结果。有实测值时调用chkPass判定OK/NG，否则显示'-'
      var pass=d.measured?(self.chkPass(d)?'<span style="color:var(--ok)">OK</span>':'<span style="color:var(--ac)">NG</span>'):'-';
      // tolLabel：公差显示文字。有等级时显示"等级 ±值"，否则只显示±值
      var tolLabel=d.tolGrade?(d.tolGrade+' '+d.tolDisplay):(d.tolDisplay||'');
      // uDisp/lDisp：上下极限尺寸显示值。fmtLim把标称+公差算成极限值
      var uDisp=fmtLim(d.nominal,d.upperTol),lDisp=fmtLim(d.nominal,d.lowerTol);
      // nomCls：CSS类名。saved=true时加locked类让文字变灰提示已保存
      var nomCls=d.saved?'class="dv locked"':'class="dv"';
      // 返回一行的HTML字符串。改样式值可调整表格外观
      return'<tr data-id="'+d.id+'" onclick="A.selBub('+d.id+')" draggable="true" data-num="'+d.num+'">'+
        // dn类控制编号列样式。改class可换列样式
        '<td class="dn">'+d.num+'</td><td '+nomCls+'>'+nomDisplay(d)+'</td>'+
        // 公差列用info颜色、10px小字。改font-size可调整字号
        '<td style="color:var(--info);font-size:10px">'+tolLabel+'</td><td class="dt2">'+uDisp+'</td><td class="dt2">'+lDisp+'</td>'+
        // 类型列用t2颜色。tl[d.type]把英文类型翻译成中文
        '<td style="color:var(--t2);font-size:10px">'+(tl[d.type]||d.type)+'</td>'+
        // contenteditable让单元格可编辑。data-f标记字段名用于保存
        '<td contenteditable data-f="measured" style="color:var(--t1)">'+(d.measured||'')+'</td><td>'+pass+'</td>'+
        '<td contenteditable data-f="notes" style="color:var(--t2)">'+(d.notes||'')+'</td>'+
        '<td style="color:var(--t2);font-size:10px">'+(d.equipment||'')+'</td>'+
        // 删除按钮。stopPropagation防止点击行也被触发
        '<td><button class="b bs bd" style="padding:1px 4px;font-size:9px" onclick="event.stopPropagation();A.delDim('+d.id+')">x</button></td></tr>';
    }).join('');
    // 给所有可编辑单元格绑定blur和keydown事件
    tb.querySelectorAll('td[contenteditable]').forEach(function(td){
      // blur：失去焦点时保存编辑内容
      td.addEventListener('blur',function(){
        // tr：找到当前单元格所在的行；id：尺寸ID；f：字段名(measured/notes)
        var tr=td.closest('tr');var id=parseFloat(tr.dataset.id);var f=td.dataset.f;
        // 在dims数组里找到对应的尺寸对象
        var dim=self.dims.find(function(d){return d.id===id;});
        if(dim&&f){
          // old：记录旧值用于比较；trim去掉首尾空格防止误保存
          var old=dim[f];dim[f]=td.textContent.trim();
          // 如果修改的是标称值且OCR原始值不同，触发学习机制记住修正
          if(f==='nominal'&&dim.ocrRaw&&dim[f]!==old&&dim.ocrRaw!==dim[f])self.saveLearn(dim.ocrRaw,dim[f],dim.ocrAngle||0);
          // 修改标称值后重新推荐设备和自动公差
          if(f==='nominal'){dim.equipment=getEquip(dim.type,dim.nominal);self.autoTol(dim);}
          // 重新渲染表格以更新显示（如公差、设备等）
          self.renderTable();
        }
      });
      // keydown：按下Enter时阻止默认换行并触发blur保存
      td.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();td.blur();}});
    });
    // 拖拽排序功能：给每行绑定drag事件
    var dragSrcId=null;
    tb.querySelectorAll('tr[draggable]').forEach(function(tr){
      // dragstart：开始拖拽时记录源ID并加dragging样式
      tr.addEventListener('dragstart',function(e){dragSrcId=parseFloat(tr.dataset.id);tr.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragSrcId);});
      // dragend：拖拽结束时清理样式
      tr.addEventListener('dragend',function(e){tr.classList.remove('dragging');tb.querySelectorAll('tr').forEach(function(r){r.classList.remove('drag-over');});dragSrcId=null;});
      // dragover：鼠标经过其他行时高亮显示可放置
      tr.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';if(parseFloat(tr.dataset.id)!==dragSrcId)tr.classList.add('drag-over');});
      // dragleave：离开高亮区域时移除样式
      tr.addEventListener('dragleave',function(e){tr.classList.remove('drag-over');});
      // drop：放置时调用moveDim交换位置
      tr.addEventListener('drop',function(e){e.preventDefault();tr.classList.remove('drag-over');var srcId=parseFloat(e.dataTransfer.getData('text/plain'));var dstId=parseFloat(tr.dataset.id);if(srcId&&dstId&&srcId!==dstId)self.moveDim(srcId,dstId);dragSrcId=null;});
    });
  },
  // moveDim：拖拽排序，把源尺寸移动到目标尺寸的位置
  // srcId=源尺寸ID；dstId=目标尺寸ID
  moveDim:function(srcId,dstId){
    // si/di：源和目标在dims数组中的索引。findIndex找第一个匹配的
    var si=this.dims.findIndex(function(d){return d.id===srcId;}),
        di=this.dims.findIndex(function(d){return d.id===dstId;});
    // 如果找不到源或目标，直接return。改这里可换找不到时的行为
    if(si<0||di<0)return;
    // splice(si,1)从si位置删除1个元素并返回被删的数组。 [0]取出被删的元素
    var dim=this.dims.splice(si,1)[0];
    // 如果源在目标前面，删除后目标索引会-1，需要修正
    if(si<di)di--;
    // 在目标位置插入源元素。改0为1会变成替换而不是插入
    this.dims.splice(di,0,dim);
    // 刷新表格显示新顺序
    this.renderTable();
    this.toast('已移动');
  },
  // insertDimSorted：按编号顺序把尺寸插入dims数组
  // dim=要插入的尺寸对象；数组始终保持按num升序
  insertDimSorted:function(dim){
    // idx：从0开始遍历，找到第一个num>=dim.num的位置
    var idx=0;
    while(idx<this.dims.length&&this.dims[idx].num<dim.num)idx++;
    // 在idx位置插入dim，不删除元素。改0为1会删掉原位置的元素
    this.dims.splice(idx,0,dim);
  },
  // chkPass：判定实测值是否在公差范围内（OK/NG）
  // d=尺寸对象；返回true=合格，false=不合格或无法判定
  chkPass:function(d){
    // 没有实测值或标称值时无法判定，返回false
    if(!d.measured||!d.nominal)return false;
    // nom：标称值转数字；meas：实测值清洗后转数字。replace去掉非数字字符
    var nom=parseFloat(d.nominal),meas=parseFloat(String(d.measured).replace(/[^\d.\-]/g,''));
    // 如果任一转换失败返回false。改false为true会让无法判定的默认合格
    if(isNaN(nom)||isNaN(meas))return false;
    // u/l：上差下差转数字，默认0。||0确保NaN时按0处理
    var u=parseFloat(d.upperTol)||0,l=parseFloat(d.lowerTol)||0;
    // 判定公式：实测值必须在[标称+下差, 标称+上差]范围内。改>=为>会变成不包含边界
    return meas>=nom+l&&meas<=nom+u;
  },
  // addEmpty：添加一个空白尺寸（手动添加模式）
  addEmpty:function(){
    // num：获取下一个可用编号
    var num=this.getNextNum();
    // dim：空白尺寸对象。所有属性设默认值。改selX/selW等可调整默认选框位置
    var dim={id:Date.now()+Math.random(),num:num,nominal:'',upperTol:'',lowerTol:'',tolValue:0,tolDisplay:'',tolGrade:'',type:'linear',gdt:'',measured:'',result:'',notes:'',equipment:'',ocrRaw:'',ocrAngle:0,pg:this.pg,saved:false,selX:2,selY:2,selW:3,selH:1,bubX:6,bubY:1};
    // 按编号顺序插入数组
    this.insertDimSorted(dim);
    // 在图纸上画气泡
    this.addBubSVG(dim);
    // 刷新表格
    this.renderTable();
    // 自动选中这个新尺寸，方便用户立即编辑
    this.selBub(dim.id);
  },
  // delDim：删除指定ID的尺寸
  // id=要删除的尺寸ID
  delDim:function(id){
    // 先找到尺寸对象，如果存在则回收其编号
    var dim=this.dims.find(function(d){return d.id===id;});
    if(dim)this.recycleNum(dim.num);
    // filter过滤掉该ID，生成新数组。改!==为===会只保留它（反向删除）
    this.dims=this.dims.filter(function(d){return d.id!==id;});
    // 从SVG中删除对应的气泡元素
    var g=document.querySelector('[data-id="'+id+'"]');
    if(g)g.remove();
    // 如果删除的是当前选中的，取消选中状态
    if(this.selId===id)this.deselBub();
    // 刷新表格和状态栏
    this.renderTable();this.updStatus();
  },
  // getExportName：生成导出文件名。格式：产品名-图号-(版本)
  getExportName:function(){
    // prod：产品名，trim去空格，replace去掉所有空白字符。改/\s+/g为/ /g只去空格
    var prod=E('iProdName').value.trim().replace(/\s+/g,''),
        dw=E('iDW').value.trim(),
        rv=E('iRV').value.trim();
    // parts：文件名组成部分数组
    var parts=[];
    // 有产品名就加入。改push顺序可调整文件名结构
    if(prod)parts.push(prod);
    // 有图号就加入
    if(dw)parts.push(dw);
    // 用'-'连接各部分。改'-'为'_'会用下划线连接
    var name=parts.join('-');
    // 有版本号就追加。改'-('+rv+')'为'_v'+rv可换版本格式
    if(rv)name+='-('+rv+')';
    // 如果啥都没有，默认'FAI_report'。改默认值可换默认文件名
    return name||'FAI_report';
  },
  // dl：下载辅助函数。把内容打包成文件并触发浏览器下载
  // content=文件内容；name=文件名；type=MIME类型
  dl:function(content,name,type){
    // Blob是浏览器提供的二进制大对象。type决定文件类型
    var b=new Blob([content],{type:type});
    // 创建临时URL指向Blob。用完要revoke释放内存
    var u=URL.createObjectURL(b);
    // 创建隐藏的<a>元素触发下载
    var a=document.createElement('a');
    a.href=u;a.download=name;a.click();
    // 释放临时URL，防止内存泄漏。不改会导致多次导出后内存上涨
    URL.revokeObjectURL(u);
  },
  // buildExportCanvas：构建用于导出的画布，在原始图纸上叠加气泡和选框
  buildExportCanvas:function(){
    // dpr：设备像素比；cw/ch：画布原始宽高（像素）
    var dpr=window.devicePixelRatio||1,cw=this.cv.width,ch=this.cv.height;
    // ec：新建离屏画布，尺寸和原画布一样。改尺寸会裁剪或留白
    var ec=document.createElement('canvas');ec.width=cw;ec.height=ch;
    // ex：导出画布的2D上下文
    var ex=ec.getContext('2d');
    // 先把原始图纸画上去。drawImage从(0,0)开始完整复制
    ex.drawImage(this.cv,0,0);
    // s：缩放比例乘像素比，把文档坐标转成画布像素坐标
    var s=this.scale*dpr;
    // 只导出当前页的尺寸。filter过滤pg===当前页
    this.dims.filter(function(d){return d.pg===A.pg;}).forEach(function(d){
      // bx/by：气泡中心像素坐标；sx/sy/sw/sh：选框像素坐标
      var bx=d.bubX*s,by=d.bubY*s,sx=d.selX*s,sy=d.selY*s,sw=d.selW*s,sh=d.selH*s;
      // corners：选框的四个角坐标。用于找离气泡最近的角
      var corners=[{x:sx,y:sy},{x:sx+sw,y:sy},{x:sx,y:sy+sh},{x:sx+sw,y:sy+sh}];
      // nc：最近角；minD：最短距离初始设极大值1e9
      var nc=corners[0],minD=1e9;
      // 遍历四个角找离气泡最近的
      corners.forEach(function(c){
        var dist=Math.hypot(bx-c.x,by-c.y);
        if(dist<minD){minD=dist;nc=c;}
      });
      // 画选框虚线矩形。strokeStyle改颜色可换框颜色
      ex.strokeStyle='#ff3c3c';ex.lineWidth=1.5*dpr;
      // setLineDash画虚线，[5,3]表示5px实线3px空白。改数组可换虚线样式
      ex.setLineDash([5*dpr,3*dpr]);ex.strokeRect(sx,sy,sw,sh);ex.setLineDash([]);
      // 画引线：从气泡中心到最近角
      ex.beginPath();ex.moveTo(bx,by);ex.lineTo(nc.x,nc.y);
      ex.strokeStyle='#ff3c3c';ex.lineWidth=1.2*dpr;ex.stroke();
      // 画引线端点小红圆，半径3*dpr。改3为5可变大
      ex.beginPath();ex.arc(nc.x,nc.y,3*dpr,0,Math.PI*2);
      ex.fillStyle='#ff3c3c';ex.fill();
      // 画气泡白底圆，半径14*dpr。改14可调整气泡大小
      ex.beginPath();ex.arc(bx,by,14*dpr,0,Math.PI*2);
      ex.fillStyle='rgba(255,255,255,0.95)';ex.fill();
      // 气泡红色边框，线宽2*dpr。改2为3加粗边框
      ex.strokeStyle='#ff3c3c';ex.lineWidth=2*dpr;ex.stroke();
      // 写编号文字。font改字号可调整文字大小；fillStyle改颜色可换字色
      ex.fillStyle='#ff3c3c';
      ex.font='700 '+(11*dpr)+'px JetBrains Mono,monospace';
      ex.textAlign='center';ex.textBaseline='middle';
      // by+dpr：稍微下移让文字居中。改dpr为0文字会上偏
      ex.fillText(d.num.toString(),bx,by+dpr);
    });
    // 返回画好的画布，供PDF/图片导出使用
    return ec;
  },
  /* ================================================================
     【导出四人组：expCSV / expXLS / expPDF / expImg】
     这四个函数负责把数据/图纸"打包带走"。
     
     - expCSV：导出纯文本表格，用逗号分隔，任何软件都能打开
     - expXLS：导出Excel文件，带表头、合并单元格，最正式
     - expPDF：把带气泡的图纸导出成PDF（像打印一样）
     - expImg：把带气泡的图纸导出成PNG/JPG图片
     
     文件名规则：图号_产品名_日期，例如 ABC123_支架_20250616
     ================================================================ */
  // expCSV：导出逗号分隔文本文件。任何表格软件都能打开
  expCSV:function(){
    // 没有数据时提示并返回。改提示文字可换无数据时的显示
    if(!this.dims.length){this.toast('暂无数据');return;}
    // csv：文件内容字符串。BOM头(﻿)让Excel正确识别UTF-8中文
    var csv='﻿编号,标准尺寸,标准公差,上差,下差,类型,实测值,判定,备注,检测设备\n';
    // 遍历每个尺寸拼接一行。改分隔符','为';'可导出分号分隔格式
    this.dims.forEach(function(d){
      // p：判定结果文字。有实测值时PASS/FAIL，否则空。改PASS为合格可换文字
      var p=d.measured?(A.chkPass(d)?'PASS':'FAIL'):'';
      // 用逗号连接各字段。改顺序可调整CSV列顺序
      csv+=d.num+','+nomDisplay(d)+','+(d.tolDisplay||'')+','+fmtLim(d.nominal,d.upperTol)+','+fmtLim(d.nominal,d.lowerTol)+','+d.type+','+d.measured+','+p+','+d.notes+','+(d.equipment||'')+'\n';
    });
    // 调用dl触发下载。MIME类型text/csv;charset=utf-8确保中文不乱码
    this.dl(csv,this.getExportName()+'.csv','text/csv;charset=utf-8');
    this.toast('CSV已导出');
  },
  // expXLS：导出Excel文件，带表头和合并单元格
  expXLS:function(){
    if(!this.dims.length){this.toast('暂无数据');return;}
    // wb：新建Excel工作簿。XLSX是SheetJS库提供的全局对象
    var wb=XLSX.utils.book_new();
    // hd：表头数据，二维数组。每行是一个数组，空数组表示空行
    var hd=[['FAI 首件检验报告'],[],['供方名称',E('iSupplier').value,'','产品名称',E('iProdName').value],['图号',E('iDW').value,'','版本',E('iRV').value],['未注公差标准',E('iTolStd').value,'','重要度',E('iImportance').value],['检验日期',new Date().toLocaleDateString('zh-CN')],[],['编号','标准尺寸','标准公差','上差','下差','实测值','判定','备注','检测设备']];
    var self=this;
    // 把每个尺寸追加到hd数组作为一行
    this.dims.forEach(function(d){
      hd.push([d.num,nomDisplay(d),d.tolDisplay||'',fmtLim(d.nominal,d.upperTol),fmtLim(d.nominal,d.lowerTol),d.measured,d.measured?(self.chkPass(d)?'PASS':'FAIL'):'',d.notes,d.equipment||'']);
    });
    // ws：把二维数组转成工作表
    var ws=XLSX.utils.aoa_to_sheet(hd);
    // !cols：列宽设置。wch是字符宽度。改数值可调整导出后的列宽
    ws['!cols']=[{wch:8},{wch:14},{wch:10},{wch:10},{wch:10},{wch:12},{wch:8},{wch:15},{wch:10}];
    // !merges：合并单元格。这里把第0行0列到第0行8列合并为标题行
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}}];
    // 把工作表加到工作簿，表名叫'FAI'
    XLSX.utils.book_append_sheet(wb,ws,'FAI');
    // writeFile直接触发下载。改.xlsx为.xls可换旧版格式
    XLSX.writeFile(wb,this.getExportName()+'.xlsx');
    this.toast('Excel已导出');
  },
  // expPDF：把带气泡标记的图纸导出成PDF文件
  expPDF:function(){
    // 必须先加载图纸才能导出。改提示文字可换错误提示
    if(!this.pdf&&!this.isImg){this.toast('请先加载图纸');return;}
    // ec：带气泡叠加的导出画布
    var ec=this.buildExportCanvas();
    // imgData：把画布转成JPEG的base64数据。.95是质量系数(0~1)。改.95为1.0质量更高但文件更大
    var imgData=ec.toDataURL('image/jpeg',.95);
    // cw/ch：画布的CSS显示宽高（像素）。style.width是显示尺寸不是像素尺寸
    var cw=parseFloat(this.cv.style.width),ch=parseFloat(this.cv.style.height);
    // pwmm/phmm：把像素转成毫米。1px≈0.264583mm（96dpi标准）。改系数可换DPI
    var pwmm=cw*.264583,phmm=ch*.264583;
    // orient：根据宽高判断横屏还是竖屏。改判断条件可固定某种方向
    var orient=pwmm>phmm?'landscape':'portrait';
    // 新建PDF，单位毫米，尺寸按图纸实际大小。format自定义防止留白
    var pdf=new jspdf.jsPDF({orientation:orient,unit:'mm',format:[pwmm,phmm]});
    // 把图片塞进PDF，从(0,0)开始铺满。改0,0可调整偏移
    pdf.addImage(imgData,'JPEG',0,0,pwmm,phmm);
    // 触发下载。文件名由getExportName生成
    pdf.save(this.getExportName()+'.pdf');
    this.toast('PDF已导出');
  },
  // expImg：把带气泡的图纸导出成PNG/JPG图片
  expImg:function(){
    if(!this.pdf&&!this.isImg){this.toast('请先加载图纸');return;}
    // fmt：导出格式，从下拉框获取（png/jpeg）。改默认可固定某种格式
    var fmt=E('eFmt').value;
    var ec=this.buildExportCanvas();
    var name=this.getExportName();
    // toBlob把画布转成二进制Blob，比toDataURL省内存
    ec.toBlob(function(blob){
      // 创建临时URL并触发下载
      var u=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=u;a.download=name+'.'+fmt;a.click();
      URL.revokeObjectURL(u);
      // MIME类型根据fmt选择。改.95质量系数可调整画质/大小平衡
    },fmt==='jpeg'?'image/jpeg':'image/png',.95);
    this.toast('图片已导出');
  },
  /* ================================================================
     【saveProj / loadProj：项目的"存档"和"读档"】
     就像游戏存档一样，可以把当前所有工作（尺寸、气泡、选框、设置）
     保存成一个 .json 文件，下次打开时再加载回来。
     
     saveProj 保存的内容：
     - 零件信息（供方、产品名、图号、版本...）
     - dims[]：所有尺寸和气泡数据
     - regions[]：识别区域
     - marks[]：临时标记
     - nextN / recycled：编号管理
     
     loadProj 加载时会自动：
     - 恢复零件信息到输入框
     - 恢复所有尺寸和气泡
     - 如果有图纸打开，立即重绘气泡和选框
     ================================================================ */
  // saveProj：把当前项目保存为JSON文件
  saveProj:function(){
    // data：要保存的项目数据对象。v是文件格式版本号，改'5.2'可用于版本兼容判断
    var data={
      v:'5.2',
      // date：保存时间戳。toISOString返回UTC时间字符串，如2026-06-16T12:34:56.789Z
      date:new Date().toISOString(),
      // info：头部零件信息。改字段可保存更多信息（如操作员、批次号）
      info:{
        supplier:E('iSupplier').value,
        prodName:E('iProdName').value,
        dw:E('iDW').value,
        rv:E('iRV').value,
        tolStd:E('iTolStd').value,
        importance:E('iImportance').value
      },
      // dims：核心尺寸数据数组。这是最重要的部分
      dims:this.dims,
      // regions：识别区域数组
      regions:this.regions,
      // marks：临时标记数组
      marks:this.marks,
      // nextN：下一个新编号。保存它避免重新打开后编号重复
      nextN:this.nextN,
      // recycled：回收的编号数组
      recycled:this.recycled
    };
    // JSON.stringify(data,null,2)：把对象转成带缩进的JSON字符串。null,2表示2空格缩进
    this.dl(JSON.stringify(data,null,2),this.getExportName()+'.json','application/json');
    this.toast('项目已保存');
  },
  // loadProj：从JSON文件加载项目
  // f=用户选择的File对象
  loadProj:function(f){
    var self=this;
    // f.text()读取文件内容为文本（Promise）。.then处理成功，.catch处理失败
    f.text().then(function(t){
      // d：解析后的项目对象。JSON.parse把JSON字符串转回对象
      var d=JSON.parse(t);
      // info：项目头部信息。||{}防止旧文件没有info字段
      var info=d.info||{};
      // 恢复零件信息到输入框。||''或||'默认值'提供缺省值
      E('iSupplier').value=info.supplier||'';
      E('iProdName').value=info.prodName||'';
      E('iDW').value=info.dw||'';
      E('iRV').value=info.rv||'';
      // 未注公差默认GB/T 1804-m。改默认值可换加载时的默认标准
      E('iTolStd').value=info.tolStd||'GB/T 1804-m';
      // 重要度默认B。改'B'为'A'可调整默认等级
      E('iImportance').value=info.importance||'B';
      // 恢复尺寸数组，同时做兼容性处理（老文件可能缺equipment/saved字段）
      self.dims=(d.dims||[]).map(function(dim){
        // 如果老文件没保存equipment，根据类型和标称值自动推荐
        if(!dim.equipment)dim.equipment=getEquip(dim.type,dim.nominal);
        // 如果老文件没保存saved，默认设为true（已保存）
        if(dim.saved===undefined)dim.saved=true;
        return dim;
      });
      // 恢复识别区域。||[]防止字段缺失
      self.regions=d.regions||[];
      // 恢复临时标记，老文件可能没有angle字段，补0
      self.marks=(d.marks||[]).map(function(m){
        if(m.angle===undefined)m.angle=0;
        return m;
      });
      // 恢复下一个编号。如果没有保存，按当前尺寸数+1估算
      self.nextN=d.nextN||(self.dims.length+1);
      // 恢复回收编号数组
      self.recycled=d.recycled||[];
      // 如果当前有图纸打开，立即重绘区域、标记、气泡和区域列表
      if(self.pdf||self.isImg){
        self.renderRegions();self.renderMarks();self.renderBubbles();self.renderRegionList();
      }
      // 刷新表格显示
      self.renderTable();
      self.toast('项目已加载');
      self.log('加载 '+self.dims.length+' 个尺寸','ok');
    }).catch(function(){
      // 解析失败或读取失败时提示。改文字可换错误提示
      self.toast('加载失败');
    });
  },
  // log：在右下角日志区输出一条消息
  // m=消息内容；t=类型(ok/err/warn/info)，决定颜色
  log:function(m,t){
    // el：日志容器；d：新创建的日志条目div
    var el=E('logA'),d=document.createElement('div');
    // 根据类型设置不同CSS颜色变量。改var(--ok)可换成功消息颜色
    d.style.color=t==='ok'?'var(--ok)':t==='err'?'var(--ac)':t==='warn'?'var(--warn)':t==='info'?'var(--info)':'var(--t3)';
    // textContent设置日志文字，带时间戳。hour12:false确保24小时制
    d.textContent='['+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'] '+m;
    // 追加到日志容器末尾
    el.appendChild(d);
    // 自动滚动到最底部，显示最新日志。scrollHeight是内容总高度
    el.scrollTop=el.scrollHeight;
  },
  // setStatus：设置顶部状态指示灯和文字
  // c=颜色类名(y/r/g等)；t=状态文字
  setStatus:function(c,t){
    // sDot：状态圆点，设置className为'sd '+颜色类
    E('sDot').className='sd '+c;
    // sTxt：状态文字
    E('sTxt').textContent=t;
  },
  // updStatus：更新底部状态栏信息（页码/缩放/气泡数）
  updStatus:function(){
    // stP：页码显示。改'第'和'/'可换格式
    E('stP').textContent='第'+this.pg+'/'+this.total+'页';
    // stZ：缩放比例显示。scale*100转成百分比，Math.round取整
    E('stZ').textContent=Math.round(this.scale*100)+'%';
    // stB：当前页气泡数量。filter过滤pg===当前页
    E('stB').textContent='气泡:'+this.dims.filter(function(d){return d.pg===A.pg;}).length;
  },
  // toast：顶部弹出提示，2秒后自动消失
  // m=提示文字
  toast:function(m){
    // el：toast元素
    var el=E('toast');
    // 设置提示文字
    el.textContent=m;
    // 加show类让toast显示（CSS控制动画）。改classList.toggle为add更安全
    el.classList.add('show');
    // 清除之前的定时器，防止快速连续点击时提前消失
    clearTimeout(el._t);
    // _t：私有定时器，2秒后移除show类隐藏。改2000为4000可延长显示时间
    el._t=setTimeout(function(){el.classList.remove('show');},2000);
  }
};

document.addEventListener('DOMContentLoaded',function(){A.init();});
</script>
