<!-- ================================================================
  【小白导语】这是一个FAI(首件检验)工具的网页文件。
  
  作用就像"电子放大镜 + 自动记账本"：
  1. 把工程图纸(PDF/图片)拖进来
  2. 软件自动识别图纸上的尺寸数字
  3. 给每个尺寸标上带编号的气泡(小红圈)
  4. 导出成Excel表格，方便检验员填写实测值
  
  文件三大块：
  - <style>：定义页面的"衣服"（颜色、大小、位置）
  - HTML：搭好页面的"骨架"（按钮、面板、画布）
  - <script>：页面的"大脑"（识别图纸、拖动气泡、导出表格）
  ================================================================ -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGIT FAI v5.4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ================================================================
   【CSS样式区 - 小白指南】
   这一大段代码就像"服装设计图"，定义了页面长什么样。
   不需要读懂每一行，只要知道：
   - :root{...} 是"调色盘"，定义了整页用到的颜色
   - .app{...} 是"整体布局"，把页面分成上/左/中/右/下几块
   - .b{...} 是"按钮样式"，让所有按钮长得一样
   - .dt{...} 是"表格样式"，让下面的尺寸表整齐好看
   ================================================================ */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
/* ---- 调色盘：整页颜色都从这里取，改一处全局变 ---- */
:root{
  /* --bg: 页面最底层背景色。改浅(如#ffffff)会变白底，改#000000会变纯黑 */
  --bg:#0b0d13;
  /* --s1: 一级面板背景(顶部栏/左右侧边栏)。改亮会让面板变灰白 */
  --s1:#12151e;
  /* --s2: 二级面板背景(按钮/输入框默认态)。改亮会让按钮变灰 */
  --s2:#191d2a;
  /* --s3: 三级面板背景(悬浮/选中态)。改亮会改变悬停底色 */
  --s3:#1f2436;
  /* --bd: 边框和分割线颜色。改亮(如#888)会让边框更明显 */
  --bd:#282e42;
  /* --ac: 主题强调色(红色)，用于气泡/选中/主要按钮。改#00ff00会变成绿色主题 */
  --ac:#ff3c3c;
  /* --ac2: 强调色悬停态，比ac稍亮。改大差值会让悬停更明显 */
  --ac2:#ff5555;
  /* --acd: 暗红色，用于边框和点缀。改深会让红色边框更暗 */
  --acd:#8b1a1a;
  /* --acg: 半透明红色背景，用于选中项底色。改透明度(如.2)会让选中底色更浓 */
  --acg:rgba(255,60,60,.08);
  /* --ok: 合格/通过色(青绿色)。改#00ff00会变亮绿，改#008000会变深绿 */
  --ok:#4af0c0;
  /* --okd: 深绿色，用于OK状态边框。改亮会让OK标识更醒目 */
  --okd:#1e6b52;
  /* --okg: 半透明绿色背景。改透明度会让OK底色浓淡变化 */
  --okg:rgba(74,240,192,.08);
  /* --warn: 警告色(橙色)。改#ff0000会变红色警告 */
  --warn:#f0a04a;
  /* --info: 信息提示色(蓝色)。改#00ffff会变青色提示 */
  --info:#5b9aff;
  /* --t1: 主文字颜色(近白)。改黑(如#000)会导致黑字黑底看不清 */
  --t1:#e2e5ed;
  /* --t2: 次要文字颜色(灰)。改亮会让次要文字更醒目 */
  --t2:#a0a6b8;
  /* --t3: 三级文字/禁用态颜色(深灰)。改亮会让提示文字更明显 */
  --t3:#5c6380;
}
/* 全局重置：让所有元素默认无外边距、无内边距；box-sizing让宽高计算包含边框 */
*{margin:0;padding:0;box-sizing:border-box}
/* body: 页面根节点样式。font-family改其他字体(如'微软雅黑')会改变全局字体；font-size改大(如16px)会让全局字变大；overflow:hidden禁止滚动条出现 */
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;user-select:none;font-size:13px}
/* .app: 整体网格布局容器。grid-template-rows第1项44px是顶部标题栏高度，改大(如60px)会让标题栏变高；第3项0px是底部表格收起高度，改大(如200px)会让默认展开表格；grid-template-columns第1项188px是左侧面板宽，改大(如250px)让左栏更宽；第3项272px是右侧面板宽 */
.app{display:grid;grid-template-rows:44px 1fr 0px 24px;grid-template-columns:188px 1fr 272px;height:100vh}
/* .app.open: 展开底部表格时的布局。grid-template-rows第3项170px是表格展开高度，改大(如250px)会让表格区域更高；改小(如100px)会让表格更矮 */
.app.open{grid-template-rows:44px 1fr 170px 24px}
/* .hdr: 顶部标题栏。grid-column:1/-1让它横跨整行；padding改大(如0 20px)会让左右留白更多；gap改大(如10px)会让按钮间距更大；z-index:50确保标题栏浮在最上层 */
.hdr{grid-column:1/-1;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:6px;z-index:50}
/* .brand: Logo文字样式。font-size改大(如14px)会让Logo更大；padding改大(如4px 10px)会让红色背景块更大；border-radius改大(如6px)会让圆角更明显 */
.brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;color:var(--bg);background:var(--ac);padding:2px 7px;border-radius:3px}
/* .bsub: Logo右侧小字(如版本号)。font-size改大(如13px)会变大；margin-left改大(如6px)会离Logo更远 */
.bsub{font-size:11px;color:var(--t3);margin-left:2px}
/* .tbar: 顶部按钮工具栏容器。gap改大(如6px)会让按钮间距变大；margin-left改大(如20px)会让工具栏离Logo更远 */
.tbar{display:flex;gap:3px;align-items:center;flex:1;margin-left:10px}
/* .sep: 按钮组之间的竖分割线。height改大(如30px)会让线更长；margin改大(如0 6px)会让左右间距更大 */
.sep{width:1px;height:20px;background:var(--bd);margin:0 3px}
/* .b: 通用按钮基础样式。font-size改大(如13px)字变大；padding改大(如6px 14px)按钮变肥；border-radius改大(如6px)更圆；gap改大(如6px)图标和文字间距变大；transition时间改长(如.3s)悬停动画更慢 */
.b{font-family:'Noto Sans SC',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border:1px solid var(--bd);border-radius:4px;background:var(--s2);color:var(--t1);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
/* .b:hover: 鼠标悬停时按钮样式。border-color改亮会让边框更红；background改深会让悬停底色更浓 */
.b:hover{border-color:var(--acd);background:var(--acg)}
/* .b:active: 鼠标按下时按钮缩小到97%。scale改小(如.9)按下时缩小更明显；改大(如1.0)则无缩小效果 */
.b:active{transform:scale(.97)}
/* .b:disabled: 禁用态按钮。opacity改大(如.6)会让禁用按钮更不明显；pointer-events:none确保点不到 */
.b:disabled{opacity:.3;pointer-events:none}
/* .ba: 主操作按钮(红色实心)。background用var(--ac)红色；color:#fff白色文字；font-weight:600半粗体 */
.ba{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}
/* .ba:hover: 主按钮悬停时用更亮的ac2红色 */
.ba:hover{background:var(--ac2)}
/* .bs: 小尺寸按钮。padding改小(如2px 5px)会更迷你；font-size改大(如11px)字变大 */
.bs{padding:3px 7px;font-size:10px}
/* .bd: 危险/删除按钮(红色边框)。border-color用var(--ac)红色边框；color用var(--ac)红色文字 */
.bd{border-color:var(--ac);color:var(--ac)}
/* .bd:hover: 危险按钮悬停时加半透明红色背景 */
.bd:hover{background:var(--acg)}
/* .bok: 通过/确认按钮(绿色实心)。background用var(--ok)绿色；color用var(--bg)深色文字确保对比度 */
.bok{background:var(--ok);color:var(--bg);border-color:var(--ok);font-weight:600}
/* #fileInput,#projectInput: 隐藏原生文件选择框。display:none让它不可见；改block会露出丑丑的系统文件框 */
#fileInput,#projectInput{display:none}
/* .lp: 左侧面板容器。background用s1暗色背景；border-right右侧边框分隔左右；flex-direction:column让内容垂直排列 */
.lp{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
/* .lps: 左侧面板的一个区块(如页面列表/工具区)。padding改大(如12px 14px)会让内边距更大；border-bottom底边框分隔各个区块 */
.lps{padding:8px 10px;border-bottom:1px solid var(--bd)}
/* .lpt: 区块小标题(如"PAGES""TOOLS")。font-size改大(如11px)字变大；letter-spacing改大(如.2em)字母间距更宽；color用t3灰色 */
.lpt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:6px}
/* .lpsc: 区块内容区(可滚动)。flex:1占满剩余高度；overflow-y:auto超出时显示滚动条；padding控制内边距 */
.lpsc{flex:1;overflow-y:auto;padding:8px 10px}
/* .pg-item: 页面列表项。padding改大(如6px 10px)会让每项更高；border-radius改大(如5px)圆角更大；gap改大(如8px)图标和文字间距更大；transition时间改长(如.3s)悬停动画更慢 */
.pg-item{padding:4px 7px;border:1px solid transparent;border-radius:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--t2);transition:all .12s}
/* .pg-item:hover: 页面项悬停态。border-color改亮会让悬停边框更明显；color改亮文字变白 */
.pg-item:hover{border-color:var(--bd);color:var(--t1)}
/* .pg-item.on: 当前选中的页面项。border-color用acd暗红边框；background用acg半透明红底；color用ac红色文字 */
.pg-item.on{border-color:var(--acd);background:var(--acg);color:var(--ac)}
/* .pg-n: 页面编号数字。font-family用等宽字体；font-size改大(如11px)字变大；min-width改大(如20px)编号框更宽 */
.pg-n{font-family:'JetBrains Mono',monospace;font-size:9px;min-width:16px}
/* .tl-item: 工具列表项(如选择/框选)。参数同pg-item，gap稍大(6px)因为工具图标更大 */
.tl-item{padding:5px 7px;border:1px solid transparent;border-radius:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--t2);transition:all .12s}
/* .tl-item:hover: 工具项悬停态 */
.tl-item:hover{border-color:var(--bd);color:var(--t1)}
/* .tl-item.on: 当前选中的工具项 */
.tl-item.on{border-color:var(--acd);background:var(--acg);color:var(--ac)}
/* .tl-i: 工具图标。font-size改大(如16px)图标更大；width改大(如22px)图标区更宽 */
.tl-i{font-size:14px;width:18px;text-align:center}
/* .region-item: 识别区域列表项。padding改大(如5px 8px)更高；margin-bottom改大(如5px)间距更大；font-size改大(如11px)字更大 */
.region-item{display:flex;align-items:center;justify-content:space-between;padding:3px 6px;background:var(--bg);border:1px solid var(--bd);border-radius:3px;margin-bottom:3px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--info)}
/* .region-item .rdel: 区域删除按钮。font-size改大(如14px)叉号更大；padding改大(如0 4px)点击区域更大 */
.region-item .rdel{cursor:pointer;color:var(--t3);font-size:12px;background:none;border:none;padding:0 2px}
/* .rdel:hover: 删除按钮悬停变红色 */
.rdel:hover{color:var(--ac)}
/* .va: 中间视图区(画布容器)。position:relative为内部绝对定位做参考；overflow:hidden隐藏溢出；background用bg背景色 */
.va{position:relative;overflow:hidden;background:var(--bg)}
/* .vs: 滚动视图容器。width/height100%填满父容器；overflow:auto允许滚动查看大图 */
.vs{width:100%;height:100%;overflow:auto;position:relative}
/* .vw: 图纸包装器(画布+气泡的外框)。box-shadow改大(如0 4px 50px...)阴影更深更扩散；margin改大(如30px)图纸离边缘更远 */
.vw{position:relative;display:inline-block;box-shadow:0 2px 30px rgba(0,0,0,.5);flex-shrink:0;margin:20px}
/* #pdfCanvas: PDF渲染画布。display:block消除图片底部空隙 */
#pdfCanvas{display:block}
/* #bubbleSvg: 气泡SVG图层。position:absolute覆盖在画布上方；pointer-events:none默认不拦截鼠标(子元素可单独开启) */
#bubbleSvg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
/* #bubbleSvg .bg: 单个气泡组。pointer-events:none让鼠标穿透到下方画布 */
#bubbleSvg .bg{pointer-events:none}
/* #bubbleSvg .sf: 选框矩形(红色虚线框)。pointer-events:all开启鼠标交互；cursor:move显示移动光标；transition时间改长(如.3s)悬停动画更慢 */
#bubbleSvg .sf{pointer-events:all;cursor:move;transition:stroke-width .1s}
/* #bubbleSvg .sf:hover: 选框悬停态。stroke-width改大(如4)悬停时边框更粗；fill透明度改大(如.2)悬停底色更浓 */
#bubbleSvg .sf:hover{stroke-width:2.5;fill:rgba(255,60,60,.1)}
/* #bubbleSvg .sf-handle: 选框四角调整手柄。opacity:0默认隐藏；transition时间改长(如.3s)显隐动画更慢 */
#bubbleSvg .sf-handle{pointer-events:all;opacity:0;transition:opacity .15s}
/* #bubbleSvg .sf-handle.show: 选中气泡时显示手柄。opacity:1完全显示 */
#bubbleSvg .sf-handle.show{opacity:1}
/* #bubbleSvg .sf-handle:hover: 手柄悬停变亮红。fill改其他色(如#ff0000)会变纯红 */
#bubbleSvg .sf-handle:hover{fill:#ff5555}
/* #bubbleSvg .ll,#bubbleSvg .cd: 连线和角点。pointer-events:none不拦截鼠标 */
#bubbleSvg .ll,#bubbleSvg .cd{pointer-events:none}
/* #bubbleSvg .bc: 气泡圆圈。pointer-events:all可拖动；cursor:move显示移动光标 */
#bubbleSvg .bc{pointer-events:all;cursor:move}
/* #bubbleSvg .bc:hover: 气泡悬停时边框加粗。stroke-width改大(如4)更粗 */
#bubbleSvg .bc:hover{stroke-width:2.5}
/* #bubbleSvg .region-rect: 识别区域框。pointer-events:none不拦截鼠标 */
#bubbleSvg .region-rect{pointer-events:none}
/* #bubbleSvg .mark-rect: 标记框矩形。同sf，可拖动 */
#bubbleSvg .mark-rect{pointer-events:all;cursor:move;transition:stroke-width .1s}
/* #bubbleSvg .mark-rect:hover: 标记框悬停加粗 */
#bubbleSvg .mark-rect:hover{stroke-width:2.5}
/* #bubbleSvg .mark-handle: 标记框手柄。默认隐藏 */
#bubbleSvg .mark-handle{pointer-events:all;cursor:move;opacity:0;transition:opacity .15s}
/* #bubbleSvg .mark-handle.show: 显示手柄 */
#bubbleSvg .mark-handle.show{opacity:1}
/* #bubbleSvg .mark-handle:hover: 手柄悬停变亮红 */
#bubbleSvg .mark-handle:hover{fill:#ff5555}
/* #bubbleSvg .mark-rotate: 标记旋转按钮。cursor:grab显示抓取手势 */
#bubbleSvg .mark-rotate{pointer-events:all;cursor:grab;opacity:0;transition:opacity .15s}
/* #bubbleSvg .mark-rotate.show: 显示旋转按钮 */
#bubbleSvg .mark-rotate.show{opacity:1}
/* #bubbleSvg .mark-rotate:hover: 旋转按钮悬停变橙色。fill改其他色(如#ff0000)会变红 */
#bubbleSvg .mark-rotate:hover{fill:#ff8c00}
/* .sel-rect: 鼠标框选时的动态矩形。border改粗(如3px)框线更粗；background透明度改大(如.15)底色更浓；z-index:10确保浮在画布之上 */
.sel-rect{position:absolute;border:1.5px solid var(--ac);background:rgba(255,60,60,.06);pointer-events:none;display:none;z-index:10}
/* .sel-rect.on: 显示框选矩形。display:block可见 */
.sel-rect.on{display:block}
/* .sel-rect .sh: 框选矩形四角的小方块手柄。width/height改大(如8px)手柄更大；border-radius改大(如2px)更圆 */
.sel-rect .sh{position:absolute;width:6px;height:6px;background:var(--ac);border:1px solid var(--bg);border-radius:1px}
/* .sel-rect .sh.tl: 左上角手柄。top/left负值让它居中在角上 */
.sel-rect .sh.tl{top:-3px;left:-3px}
/* .sel-rect .sh.tr: 右上角手柄 */
.sel-rect .sh.tr{top:-3px;right:-3px}
/* .sel-rect .sh.bl: 左下角手柄 */
.sel-rect .sh.bl{bottom:-3px;left:-3px}
/* .sel-rect .sh.br: 右下角手柄 */
.sel-rect .sh.br{bottom:-3px;right:-3px}
/* .zb: 缩放控制条(画布左下角)。bottom/left改大(如20px)离边缘更远；border-radius改大(如8px)更圆；padding改大(如4px)内边距更大 */
.zb{position:absolute;bottom:10px;left:10px;display:none;gap:2px;background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:2px;z-index:20}
/* .zb.show: 显示缩放条。display:flex水平排列 */
.zb.show{display:flex}
/* .zb button: 缩放条里的加减按钮。width/height改大(如32px)按钮更大；font-size改大(如15px)符号更大；border-radius改大(如5px)更圆 */
.zb button{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--t1);cursor:pointer;border-radius:3px;font-size:13px;font-family:'JetBrains Mono',monospace}
/* .zb button:hover: 缩放按钮悬停变色底 */
.zb button:hover{background:var(--s2)}
/* .zb span: 缩放比例显示文字(如"100%")。font-size改大(如12px)字更大；min-width改大(如50px)显示区更宽 */
.zb span{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);padding:0 5px;display:flex;align-items:center;min-width:36px;justify-content:center}
/* .drop-ov: 拖放文件时的遮罩层。background透明度改大(如.1)遮罩更深；border改粗(如3px)虚线边框更粗；z-index:100确保在最上层 */
.drop-ov{position:absolute;inset:0;background:rgba(255,60,60,.04);border:2px dashed var(--ac);display:none;align-items:center;justify-content:center;z-index:100}
/* .drop-ov.on: 显示拖放遮罩。display:flex居中显示提示文字 */
.drop-ov.on{display:flex}
/* .drop-ov span: 拖放提示文字。font-size改大(如18px)字更大；font-weight改小(如400)变细 */
.drop-ov span{font-size:14px;color:var(--ac);font-weight:500}
/* .emp: 空白状态提示(未加载图纸时)。inset:0填满整个视图区；z-index:5在画布之下 */
.emp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);text-align:center;z-index:5}
/* .emp.hid: 隐藏空白提示。display:none不可见 */
.emp.hid{display:none}
/* .emp .ei: 空白状态的虚线框图标。width/height改大(如70px)图标更大；border改粗(如3px)边框更粗；opacity改大(如.8)更明显 */
.emp .ei{width:50px;height:50px;border:2px dashed var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;opacity:.4}
/* .emp h2: 空白状态主标题。font-size改大(如16px)更大；margin-bottom改大(如10px)离副标题更远 */
.emp h2{font-size:14px;font-weight:500;margin-bottom:6px;color:var(--t1)}
/* .emp p: 空白状态说明文字。font-size改大(如13px)更大；line-height改大(如2)行间距更宽 */
.emp p{font-size:11px;line-height:1.6}
/* .rp: 右侧面板容器。同lp但border-left左侧边框分隔 */
.rp{background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
/* .rps: 右侧信息区块。max-height改大(如300px)显示更多内容；overflow-y:auto超出可滚动 */
.rps{padding:8px 10px;border-bottom:1px solid var(--bd);max-height:220px;overflow-y:auto}
/* .rpt: 右侧区块小标题。同lpt */
.rpt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:6px}
/* .pr: 右侧属性行(如零件名称输入框)。padding改大(如4px 0)行间距更大；gap改大(如6px)标签和输入框间距更大 */
.pr{display:flex;align-items:center;justify-content:space-between;padding:2px 0;gap:3px}
/* .pr label: 属性标签。font-size改大(如11px)字更大；min-width改大(如60px)标签区更宽 */
.pr label{font-size:10px;color:var(--t3);flex-shrink:0;min-width:48px}
/* .pr input,.pr select: 输入框和下拉框。font-size改大(如11px)字更大；padding改大(如4px 8px)内边距更大；border-radius改大(如5px)更圆 */
.pr input,.pr select{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);border:1px solid var(--bd);color:var(--t1);padding:2px 5px;border-radius:3px;outline:none}
/* .pr input.custom-tol: 自定义公差输入框。width改大(如80px)输入框更宽；border-color用acd暗红边框提示特殊 */
.pr input.custom-tol{width:60px;border-color:var(--acd)}
/* .pr input:focus,.pr select:focus: 输入框聚焦态。border-color改其他色(如var(--info))会变蓝边框 */
.pr input:focus,.pr select:focus{border-color:var(--acd)}
/* .pr .ocr-btn: OCR设置小按钮(如方向/语言)。width/height改大(如26px)按钮更大；font-size改大(如13px)图标更大 */
.pr .ocr-btn{width:22px;height:22px;padding:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd);border-radius:3px;background:var(--s2);color:var(--t3);cursor:pointer;font-size:11px;flex-shrink:0}
/* .pr .ocr-btn:hover: OCR按钮悬停变绿色。border-color改其他色会变其他颜色 */
.pr .ocr-btn:hover{border-color:var(--ok);color:var(--ok);background:var(--okg)}
/* .pr .ocr-btn.active: OCR按钮激活态(当前选中)。border-color用ac红色；color用ac红色文字；background用acg红底 */
.pr .ocr-btn.active{border-color:var(--ac);color:var(--ac);background:var(--acg)}
/* .opv: OCR预览图容器。min-height改大(如80px)最小高度更大；max-height改大(如180px)预览图更大；border-radius改大(如6px)更圆 */
.opv{width:100%;min-height:50px;max-height:120px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
/* .opv img: 预览图本身。max-height改大(如180px)限制更大；object-fit:cover会让图填满裁剪，contain保持比例 */
.opv img{max-width:100%;max-height:120px;object-fit:contain;display:block}
/* .opv .ph: OCR预览区的占位文字(如"No Preview")。font-size改大(如12px)更大；opacity改大(如.8)更明显 */
.opv .ph{font-size:10px;color:var(--t3);opacity:.5}
/* .ocr-val: OCR识别结果大数字显示。font-size改大(如24px)数字更大；color改var(--info)会变蓝色；min-height改大(如28px)行高更大 */
.ocr-val{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--ok);min-height:22px;font-weight:700;margin-top:4px}
/* .ocr-meta: OCR元信息(如置信度)。font-size改大(如11px)更大；color改亮会更容易看清 */
.ocr-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:2px}
/* .rg: 正则表达式选择按钮网格。grid-template-columns:repeat(3,1fr)表示3列等宽；gap改大(如6px)按钮间距更大；margin-top改大(如8px)离上方更远 */
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:5px}
/* .rb: 正则选择按钮。font-size改大(如11px)字更大；padding改大(如5px 0)按钮更高；border-radius改大(如5px)更圆；transition时间改长(如.3s)动画更慢 */
.rb{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 0;border:1px solid var(--bd);border-radius:3px;background:var(--bg);color:var(--t3);cursor:pointer;text-align:center;transition:all .12s;line-height:1.2}
/* .rb:hover: 正则按钮悬停态。border-color改亮边框更明显；color改亮文字变白 */
.rb:hover{border-color:var(--acd);color:var(--t1)}
/* .rb.on: 当前选中的正则按钮。border-color用ok绿色；background用okg绿底；color用ok绿色文字 */
.rb.on{border-color:var(--ok);background:var(--okg);color:var(--ok)}
/* .rb .ri: 正则按钮内的图标。font-size改大(如14px)图标更大；margin-bottom改大(如3px)图标和文字间距更大 */
.rb .ri{display:block;font-size:12px;margin-bottom:1px}
/* .bt: 底部尺寸表格容器。grid-column:1/-1横跨整行；border-top顶边框分隔上方内容 */
.bt{grid-column:1/-1;background:var(--s1);border-top:1px solid var(--bd);overflow:hidden;display:flex;flex-direction:column}
/* .dth: 表格头部栏。padding改大(如8px 14px)头部更高；flex-shrink:0防止头部被压缩 */
.dth{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
/* .dth .dtt: 表格标题文字(如"DIMENSIONS")。font-size改大(如12px)更大；gap改大(如10px)图标和文字间距更大 */
.dth .dtt{font-size:10px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:6px}
/* .dtc: 表格内的计数标签(如"12 OK")。font-size改大(如11px)更大；padding改大(如3px 8px)标签更宽 */
.dtc{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ok);background:var(--okg);border:1px solid var(--okd);padding:1px 5px;border-radius:2px}
/* .dta: 表格操作按钮组(如导出CSV)。gap改大(如6px)按钮间距更大 */
.dta{display:flex;gap:3px}
/* .dts: 表格滚动区。flex:1占满剩余高度；overflow:auto超出可滚动 */
.dts{flex:1;overflow:auto}
/* table.dt: 尺寸数据表格。width:100%填满容器；border-collapse:collapse合并边框；font-size改大(如13px)字更大 */
table.dt{width:100%;border-collapse:collapse;font-size:11px}
/* table.dt th: 表头单元格。position:sticky+top:0让表头滚动时固定；font-size改大(如11px)更大；padding改大(如6px 10px)更宽；z-index:2确保表头浮在数据之上 */
table.dt th{position:sticky;top:0;background:var(--s2);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);padding:4px 6px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;z-index:2}
/* table.dt td: 数据单元格。padding改大(如5px 10px)更宽；font-size改大(如13px)更大；white-space:nowrap防止文字换行 */
table.dt td{padding:3px 6px;border-bottom:1px solid var(--bd);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap;cursor:pointer}
/* table.dt tr:hover td: 数据行悬停态。background改其他色(如var(--okg))会变绿底 */
table.dt tr:hover td{background:var(--acg)}
/* table.dt tr.sel td: 当前选中行。background透明度改大(如.15)底色更浓 */
table.dt tr.sel td{background:rgba(255,60,60,.08)}
/* table.dt td[contenteditable]: 可编辑单元格。outline:none去掉聚焦时的蓝色轮廓 */
table.dt td[contenteditable]{outline:none}
/* table.dt td[contenteditable]:focus: 编辑单元格聚焦态。box-shadow改大(如inset 0 0 0 2px...)边框更粗 */
table.dt td[contenteditable]:focus{background:var(--s3);box-shadow:inset 0 0 0 1px var(--acd)}
/* .dn: 序号列样式。color用ac红色；font-weight:700粗体；min-width改大(如30px)更宽 */
.dn{color:var(--ac);font-weight:700;text-align:center;min-width:24px}
/* .dv: 数值列样式。color用t1主白色；font-weight:600半粗体 */
.dv{color:var(--t1);font-weight:600}
/* .dt2: 公差列样式。color用warn橙色 */
.dt2{color:var(--warn)}
/* .dte: 表格空状态。padding改大(如30px)空白更大；font-size改大(如13px)更大 */
.dte{text-align:center;padding:20px;color:var(--t3);font-size:11px}
/* table.dt td.locked: 锁定单元格。cursor:default去掉手型；opacity改大(如1)完全不透明 */
table.dt td.locked{color:var(--t2);cursor:default;opacity:.85}
/* table.dt tr.drag-over td: 行拖拽悬停态。background透明度改大(如.3)蓝底更浓 */
table.dt tr.drag-over td{background:rgba(91,154,255,.15)}
/* table.dt tr.dragging: 正在拖拽的行。opacity改大(如.7)更明显 */
table.dt tr.dragging{opacity:.4}
/* .sbar: 底部状态栏。grid-column:1/-1横跨整行；gap改大(如20px)状态项间距更大；font-size改大(如11px)更大 */
.sbar{grid-column:1/-1;background:var(--s2);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:12px;font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
/* .sd: 状态指示灯小圆点。width/height改大(如8px)灯更大；border-radius:50%让它变圆形 */
.sd{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
/* .sd.g: 绿色指示灯(正常)。background用ok绿色 */
.sd.g{background:var(--ok)}
/* .sd.y: 黄色指示灯(处理中)。background用warn橙色；animation:bl 1s infinite让灯闪烁，改2s会让闪烁更慢 */
.sd.y{background:var(--warn);animation:bl 1s infinite}
/* .sd.r: 红色指示灯(错误)。background用ac红色 */
.sd.r{background:var(--ac)}
/* @keyframes bl: 闪烁动画。0%和100% opacity:1全亮；50% opacity:.3变暗。改.1会更暗 */
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
/* ::-webkit-scrollbar: 自定义滚动条。width/height改大(如8px)滚动条更粗 */
::-webkit-scrollbar{width:5px;height:5px}
/* ::-webkit-scrollbar-track: 滚动条轨道背景。改#333会变深灰轨道 */
::-webkit-scrollbar-track{background:transparent}
/* ::-webkit-scrollbar-thumb: 滚动条滑块。background改亮(如#666)滑块更明显；border-radius改大(如5px)更圆 */
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
/* .toast: 顶部提示条(如"识别完成")。top改大(如80px)离顶部更远；font-size改大(如13px)更大；padding改大(如8px 20px)更宽；z-index:300确保浮在大部分内容之上；transition时间改长(如.4s)动画更慢 */
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s2);border:1px solid var(--okd);color:var(--ok);font-size:11px;padding:6px 16px;border-radius:5px;z-index:300;opacity:0;transition:all .2s;pointer-events:none;font-family:'JetBrains Mono',monospace}
/* .toast.show: 显示提示条。opacity:1完全可见；translateY(0)从上方滑入到原位 */
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* .modal-bg: 弹窗遮罩层。background透明度改大(如.8)遮罩更深；z-index:500确保在最上层 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center}
/* .modal-bg.show: 显示弹窗遮罩。display:flex居中弹窗 */
.modal-bg.show{display:flex}
/* .modal: 弹窗本体。border-radius改大(如12px)更圆；padding改大(如24px)内边距更大；min-width改大(如400px)弹窗更宽；box-shadow改大(如0 12px 60px...)阴影更深 */
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:18px;min-width:340px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5)}
/* .modal h3: 弹窗标题。font-size改大(如15px)更大；margin-bottom改大(如16px)离内容更远 */
.modal h3{font-size:13px;font-weight:600;margin-bottom:12px}
/* .modal .mr: 弹窗内一行设置。padding改大(如8px 0)行间距更大；gap改大(如12px)标签和选择框间距更大 */
.modal .mr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;gap:8px}
/* .modal .mr label: 弹窗标签。font-size改大(如13px)更大 */
.modal .mr label{font-size:12px;color:var(--t2)}
/* .modal .mr select: 弹窗下拉框。font-size改大(如13px)更大；padding改大(如6px 10px)更宽；width改大(如200px)更宽 */
.modal .mr select{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--bd);color:var(--t1);padding:4px 8px;border-radius:3px;width:160px}
/* .modal .ma: 弹窗底部按钮区。gap改大(如10px)按钮间距更大；margin-top改大(如20px)离内容更远 */
.modal .ma{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}
/* .corr-bar: 修正输入条。gap改大(如8px)间距更大；margin-top改大(如8px)离上方更远 */
.corr-bar{display:flex;gap:4px;margin-top:4px;align-items:center}
/* .corr-bar input: 修正值输入框。font-size改大(如14px)更大；width改大(如100px)更宽；color改var(--warn)会变橙色文字 */
.corr-bar input{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg);border:1px solid var(--bd);color:var(--ok);padding:3px 6px;border-radius:3px;width:80px;outline:none}
/* .corr-bar .b: 修正条内的按钮。padding改大(如5px 12px)更宽；font-size改大(如11px)更大 */
.corr-bar .b{padding:3px 8px;font-size:10px}
</style>
</head>
<!-- ================================================================
  【HTML骨架区 - 小白指南】
  下面的代码像"乐高积木说明书"，一块块搭出页面结构：
  - header(顶部)：放logo、打开文件按钮、自动识别按钮
  - aside.lp(左侧面板)：放页面列表、工具选择、OCR设置
  - div.va(中间画布)：显示图纸，可以框选、拖放
  - aside.rp(右侧面板)：放零件信息、气泡属性、日志
  - div.bt(底部表格)：显示所有识别到的尺寸列表
  - footer(底部状态栏)：显示当前页码、缩放比例、尺寸数量
  ================================================================ -->
<body>
<!-- .app: 最外层应用容器。id="app"让JS可以通过document.getElementById找到它；class="app"对应CSS网格布局 -->
<div class="app" id="app">
  <!-- header.hdr: 顶部标题栏。class="hdr"对应CSS顶部栏样式；里面是logo和操作按钮 -->
  <header class="hdr">
    <!-- span.brand: Logo文字。class="brand"让它有红色背景和等宽字体；文字内容"DIGIT FAI"可改成你的品牌名 -->
    <span class="brand">DIGIT FAI</span>
    <!-- span.bsub: 版本号。class="bsub"让它变灰色小字；改成"v6.0"会显示新版本号 -->
    <span class="bsub">v5.4</span>
    <!-- .tbar: 顶部按钮工具栏容器。class="tbar"让它水平排列按钮 -->
    <div class="tbar">
      <!-- button#btnOpen: 打开文件按钮。id="btnOpen"让JS能找到它；class="b"是普通按钮样式；disabled去掉后按钮默认可点击 -->
      <button class="b" id="btnOpen">
        <!-- svg: 按钮左侧的文件图标。width/height改大(如16)图标更大；stroke-width改大(如2.5)线条更粗 -->
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> 打开
      </button>
      <!-- input#fileInput: 隐藏的文件选择框。type="file"表示选文件；accept限定可选.pdf/.png等格式；加.gif可让选动图 -->
      <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp"/>
      <!-- .sep: 按钮组之间的竖分割线 -->
      <div class="sep"></div>
      <!-- button#btnAuto: 自动气泡按钮。class="b ba"是红色主按钮样式；disabled表示初始禁用，有图纸后JS会启用 -->
      <button class="b ba" id="btnAuto" disabled>&#9889; 自动气泡</button>
      <!-- button#btnFixBox: 矫正选框按钮。disabled初始禁用 -->
      <button class="b" id="btnFixBox" disabled>&#128207; 矫正选框</button>
      <!-- .sep: 分割线 -->
      <div class="sep"></div>
      <!-- button#btnTable: 尺寸表按钮。控制底部表格显隐 -->
      <button class="b" id="btnTable" disabled>&#128202; 尺寸表</button>
      <!-- button#btnExport: 导出按钮。disabled初始禁用 -->
      <button class="b" id="btnExport" disabled>&#8595; 导出</button>
      <!-- .sep: 分割线 -->
      <div class="sep"></div>
      <!-- button#btnSave: 保存项目按钮。&#128190;是软盘图标 -->
      <button class="b" id="btnSave">&#128190;</button>
      <!-- button#btnLoad: 加载项目按钮。&#128194;是文件夹图标 -->
      <button class="b" id="btnLoad">&#128194;</button>
      <!-- input#projectInput: 隐藏的项目文件选择框。accept=".json"只让选JSON格式的项目文件 -->
      <input type="file" id="projectInput" accept=".json"/>
    </div>
  </header>
  <!-- aside.lp: 左侧面板。class="lp"对应CSS左侧面板样式 -->
  <aside class="lp">
    <!-- .lps: 左侧面板第一个区块(页面列表) -->
    <div class="lps">
      <!-- .lpt: 区块标题"页面" -->
      <div class="lpt">页面</div>
      <!-- #pgList: 页面列表容器。JS会把加载的PDF页码动态插入这里 -->
      <div id="pgList">
        <!-- 默认显示"未加载"。改文字内容可换成"请先打开文件"等提示 -->
        <div style="color:var(--t3);font-size:10px;padding:4px 0">未加载</div>
      </div>
    </div>
    <!-- .lpsc: 左侧面板可滚动内容区 -->
    <div class="lpsc">
      <!-- .lpt: 区块标题"工具" -->
      <div class="lpt">工具</div>
      <!-- #tlList: 工具列表容器 -->
      <div id="tlList">
        <!-- .tl-item.on: 当前默认选中的"选择/移动"工具。data-t="select"是JS识别的工具类型；去掉class="on"会让它默认不选中 -->
        <div class="tl-item on" data-t="select"><span class="tl-i">&#8598;</span>选择/移动</div>
        <!-- .tl-item: "框选识别+气泡"工具。data-t="ocr"让JS知道点击后切换到OCR模式 -->
        <div class="tl-item" data-t="ocr"><span class="tl-i">&#128269;</span>框选识别+气泡</div>
        <!-- .tl-item: "识别区域"工具。data-t="region"用于框选大面积识别区 -->
        <div class="tl-item" data-t="region"><span class="tl-i">&#9645;</span>识别区域</div>
        <!-- .tl-item: "手动添加气泡"工具。data-t="manual"用于不识别直接放气泡 -->
        <div class="tl-item" data-t="manual"><span class="tl-i">&#9998;</span>手动添加气泡</div>
      </div>
      <!-- margin-top:10px让识别区域区块与上方工具列表有间距 -->
      <div style="margin-top:10px">
        <!-- .lpt: 区块标题"识别区域" -->
        <div class="lpt">识别区域</div>
        <!-- #regionList: 识别区域列表容器。JS会在这里插入框选的区域 -->
        <div id="regionList">
          <!-- 默认提示文字。改内容可换成其他语言提示 -->
          <div style="color:var(--t3);font-size:10px">使用「识别区域」工具框选</div>
        </div>
      </div>
      <!-- margin-top:10px让OCR预览区与上方有间距 -->
      <div style="margin-top:10px">
        <!-- .lpt: 区块标题"OCR 预览" -->
        <div class="lpt">OCR 预览</div>
        <!-- #ocrPrev: OCR预览图容器。class="opv"对应预览区样式 -->
        <div class="opv" id="ocrPrev">
          <!-- .ph: 默认占位文字。改成"请框选尺寸"可换提示语 -->
          <span class="ph">框选后显示</span>
        </div>
        <!-- #ocrVal: OCR识别出的数值大字体显示区。JS会把识别到的数字填到这里 -->
        <div class="ocr-val" id="ocrVal"></div>
        <!-- #ocrMeta: OCR元信息显示区。如置信度、耗时等 -->
        <div class="ocr-meta" id="ocrMeta"></div>
        <!-- #corrBar: 修正输入条。style="display:none"默认隐藏，识别结果不理想时JS显示它 -->
        <div class="corr-bar" id="corrBar" style="display:none">
          <!-- 修正标签文字 -->
          <span style="font-size:10px;color:var(--t3)">修正:</span>
          <!-- #corrInput: 修正值输入框。placeholder改文字可换提示语 -->
          <input id="corrInput" placeholder="正确值"/>
          <!-- 确认修正按钮。onclick="A.applyCorrection()"点击时调用JS的applyCorrection函数 -->
          <button class="b bs ba" onclick="A.applyCorrection()">确认</button>
        </div>
      </div>
      <!-- margin-top:10px让OCR设置区与上方有间距 -->
      <div style="margin-top:10px">
        <!-- .lpt: 区块标题"OCR 设置"；里面span是重置按钮，点击后恢复默认设置 -->
        <div class="lpt">OCR 设置 <span style="color:var(--ok);cursor:pointer;margin-left:4px" id="btnResetSet">&#8635;</span></div>
        <!-- .pr: PSM分段模式设置行 -->
        <div class="pr">
          <!-- label: 左侧标签文字。改文字可换成"PSM"等其他名称 -->
          <label>分段</label>
          <!-- #sPSM: PSM下拉框。value="13"默认原始行；改value="7"默认单行模式 -->
          <select id="sPSM"><option value="7">单行</option><option value="8">单词</option><option value="13" selected>原始行</option></select>
        </div>
        <!-- .pr: 放大倍数设置行 -->
        <div class="pr">
          <label>放大</label>
          <!-- #sScale: 放大下拉框。value="2"默认2倍放大；改value="4"会默认4倍放大提高识别率但变慢 -->
          <select id="sScale"><option value="1">1x</option><option value="2" selected>2x</option><option value="3">3x</option><option value="4">4x</option></select>
        </div>
        <!-- .pr: 二值化阈值设置行 -->
        <div class="pr">
          <label>二值化</label>
          <!-- #sThresh: 阈值数字输入。value="200"默认阈值200；改value="180"会让更多灰度像素变黑；min/max限定范围0-255 -->
          <input type="number" id="sThresh" value="200" min="0" max="255" step="5" style="width:50px"/>
        </div>
        <!-- .pr: 反色设置行 -->
        <div class="pr">
          <label>反色</label>
          <!-- #sInvert: 反色下拉框。value="0"默认关闭；改selected到value="1"会默认开启反色(白底黑字变黑底白字) -->
          <select id="sInvert"><option value="0" selected>关</option><option value="1">开</option></select>
        </div>
        <!-- .pr: 多通道设置行 -->
        <div class="pr">
          <label>多通道</label>
          <!-- #sMulti: 多通道下拉框。value="1"默认开启，同时尝试多种预处理方式提高识别率 -->
          <select id="sMulti"><option value="1" selected>开</option><option value="0">关</option></select>
        </div>
        <!-- .pr: 自适应阈值设置行 -->
        <div class="pr">
          <label>自适应</label>
          <!-- #sAdapt: 自适应阈值下拉框。value="1"默认开启，根据局部亮度自动调整阈值 -->
          <select id="sAdapt"><option value="1" selected>开</option><option value="0">关</option></select>
        </div>
        <!-- .pr: 混淆处理设置行 -->
        <div class="pr">
          <label>混淆</label>
          <!-- #sConfuse: 混淆下拉框。value="1"默认开启，处理手写体或模糊文字 -->
          <select id="sConfuse"><option value="1" selected>开</option><option value="0">关</option></select>
        </div>
        <!-- .pr: 缓存设置行 -->
        <div class="pr">
          <label>缓存</label>
          <!-- #sCache: 缓存下拉框。value="1"默认开启，加速重复识别；value="0"每次重新识别 -->
          <select id="sCache"><option value="1" selected>开</option><option value="0">关</option></select>
          <!-- 缓存清除按钮。onclick直接调用A.ocrCache.invalidate()清空缓存并提示 -->
          <span style="font-size:8px;color:var(--t3);cursor:pointer;margin-left:3px" onclick="A.ocrCache.invalidate();A.toast('缓存已清')">&#8635;</span>
        </div>
        <!-- margin-top:4px让自动模式标题与上方有间距 -->
        <div style="margin-top:4px"><div class="lpt">自动模式</div></div>
        <!-- .pr: 自动扫描模式设置行 -->
        <div class="pr">
          <label>扫描</label>
          <!-- #sAutoMode: 扫描模式下拉框。value="quick"默认快捷模式(只扫0和90度)；改value="pro"默认专业模式(0-270度全扫) -->
          <select id="sAutoMode"><option value="quick" selected>快捷0+90</option><option value="pro">专业0~270</option></select>
        </div>
        <!-- margin-top:4px让方向标题与上方有间距 -->
        <div style="margin-top:4px"><div class="lpt">方向</div></div>
        <!-- #rotG: 方向选择按钮网格。class="rg"对应3列网格布局 -->
        <div class="rg" id="rotG">
          <!-- .rb.on: 默认选中的"自动"方向。data-r="auto"让JS知道自动检测旋转角度 -->
          <div class="rb on" data-r="auto"><span class="ri">&#9678;</span>自动</div>
          <!-- .rb: 0度方向(横向)。data-r="0"固定不旋转 -->
          <div class="rb" data-r="0"><span class="ri">&#8594;</span>0</div>
          <!-- .rb: 90度方向(竖向向上)。data-r="90"顺时针旋转90度 -->
          <div class="rb" data-r="90"><span class="ri">&#8593;</span>90</div>
          <!-- .rb: 180度方向(横向倒置)。data-r="180"旋转180度 -->
          <div class="rb" data-r="180"><span class="ri">&#8592;</span>180</div>
          <!-- .rb: 270度方向(竖向向下)。data-r="270"顺时针旋转270度 -->
          <div class="rb" data-r="270"><span class="ri">&#8595;</span>270</div>
          <!-- .rb: 自定义角度。data-r="custom"让JS弹出输入框让用户填角度 -->
          <div class="rb" data-r="custom"><span class="ri">&#8635;</span>自定义</div>
        </div>
        <!-- margin-top:4px让语言标题与上方有间距 -->
        <div style="margin-top:4px"><div class="lpt">语言</div></div>
        <!-- .pr: OCR语言设置行 -->
        <div class="pr">
          <label>语言</label>
          <!-- #sLang: 语言下拉框。value="eng"默认英文；改selected到chi_sim会默认中文，但需下载对应语言包 -->
          <select id="sLang"><option value="eng" selected>English</option><option value="chi_sim">中文</option><option value="jpn">日本語</option><option value="deu">Deutsch</option></select>
        </div>
      </div>
    </div>
  </aside>
  <!-- #dropZone: 中间视图区(拖放区域)。class="va"对应画布容器样式；id让JS能找到它监听拖放事件 -->
  <div class="va" id="dropZone">
    <!-- #dropOv: 拖放文件时的红色虚线遮罩。class="drop-ov"对应遮罩样式；默认隐藏，拖文件时JS显示它 -->
    <div class="drop-ov" id="dropOv"><span>释放文件</span></div>
    <!-- #empSt: 空白状态提示(未加载图纸时显示)。class="emp"对应居中提示样式 -->
    <div class="emp" id="empSt">
      <!-- .ei: 虚线框图标。&#128208;是图纸emoji；改其他emoji(如&#128200;)可换图标 -->
      <div class="ei">&#128208;</div>
      <!-- h2: 主标题文字。改内容可换成"请拖入图纸"等 -->
      <h2>打开工程图纸</h2>
      <!-- p: 副标题说明。改内容可添加支持格式说明 -->
      <p>拖放 PDF / 图片到此处</p>
    </div>
    <!-- #vs: 图纸滚动视图区。class="vs"对应滚动容器；style="display:none"默认隐藏，有图纸后JS显示 -->
    <div class="vs" id="vs" style="display:none">
      <!-- #vw: 图纸包装器。class="vw"对应画布+气泡的外框；包含canvas和svg -->
      <div class="vw" id="vw">
        <!-- #pdfCanvas: PDF/图片渲染画布。JS会把图纸画在这个canvas上；id让JS能找到它 -->
        <canvas id="pdfCanvas"></canvas>
        <!-- #bubbleSvg: 气泡SVG图层。xmlns声明SVG命名空间；JS会动态添加气泡图形到这里 -->
        <svg id="bubbleSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        <!-- #selRect: 鼠标框选时的动态矩形。class="sel-rect"对应红色虚线框样式；默认隐藏 -->
        <div class="sel-rect" id="selRect">
          <!-- 四个角的小方块手柄。class sh+tl/tr/bl/br对应四个角的位置 -->
          <div class="sh tl"></div><div class="sh tr"></div><div class="sh bl"></div><div class="sh br"></div>
        </div>
      </div>
    </div>
    <!-- #zBar: 缩放控制条。class="zb"对应左下角缩放条样式；默认隐藏，有图纸后显示 -->
    <div class="zb" id="zBar">
      <!-- 缩小按钮。onclick="A.zoomBy(-.15)"点击时调用zoomBy缩小15%；-.15改-.25会每次缩小更多 -->
      <button onclick="A.zoomBy(-.15)">-</button>
      <!-- #zLv: 缩放比例显示(如"100%")。JS会实时更新这里的文字 -->
      <span id="zLv">100%</span>
      <!-- 放大按钮。onclick="A.zoomBy(.15)"点击时放大15%；.15改.25会每次放大更多 -->
      <button onclick="A.zoomBy(.15)">+</button>
      <!-- 自适应按钮。onclick="A.zoomFit()"点击时让图纸刚好填满视图区 -->
      <button onclick="A.zoomFit()">[ ]</button>
    </div>
  </div>
  <!-- aside.rp: 右侧面板。class="rp"对应CSS右侧面板样式 -->
  <aside class="rp">
    <!-- .rps: 右侧第一个区块(零件信息) -->
    <div class="rps">
      <!-- .rpt: 区块标题"零件信息" -->
      <div class="rpt">零件信息</div>
      <!-- .pr: 供方输入行 -->
      <div class="pr">
        <label>供方</label>
        <!-- #iSupplier: 供方输入框。list="supplierList"关联下拉建议列表；value改文字可换默认供方名 -->
        <input id="iSupplier" list="supplierList" value="青岛海立泰新型复合材料有限公司" style="width:130px;font-size:9px"/>
        <!-- #supplierList: 供方建议列表。datalist提供输入时的自动补全选项 -->
        <datalist id="supplierList"><option value="青岛海立泰新型复合材料有限公司"/></datalist>
      </div>
      <!-- .pr: 产品名输入行 -->
      <div class="pr">
        <label>产品名</label>
        <!-- #iProdName: 产品名输入框。style="width:90px"限定宽度；改大(如120px)输入框更宽 -->
        <input id="iProdName" style="width:90px"/>
        <!-- OCR识别按钮。onclick="A.startTextOCR('iProdName')"点击后进入框选模式，识别到的文字填入产品名 -->
        <button class="ocr-btn" onclick="A.startTextOCR('iProdName')" title="框选识别中文">&#128269;</button>
      </div>
      <!-- .pr: 图号输入行 -->
      <div class="pr">
        <label>图号</label>
        <input id="iDW" style="width:90px"/>
        <!-- OCR识别按钮。onclick="A.startTextOCR('iDW')"识别到的文字填入图号 -->
        <button class="ocr-btn" onclick="A.startTextOCR('iDW')" title="框选识别文字">&#128269;</button>
      </div>
      <!-- .pr: 版本输入行 -->
      <div class="pr">
        <label>版本</label>
        <!-- #iRV: 版本输入框。width改大(如80px)更宽 -->
        <input id="iRV" style="width:50px"/>
      </div>
      <!-- .pr: 未注公差输入行 -->
      <div class="pr">
        <label>未注公差</label>
        <!-- #iTolStd: 未注公差输入框。value="GB/T 1804-m"是默认值；改其他标准(如"ISO 2768-m")可换默认公差 -->
        <input id="iTolStd" value="GB/T 1804-m" style="width:110px;font-size:9px"/>
      </div>
      <!-- .pr: 重要度选择行 -->
      <div class="pr">
        <label>重要度</label>
        <!-- #iImportance: 重要度下拉框。value="B"默认B级一般；改selected到A会默认A级重要 -->
        <select id="iImportance" style="width:110px"><option value="A">A级(重要)</option><option value="B" selected>B级(一般)</option><option value="C">C级(次要)</option></select>
      </div>
    </div>
    <!-- #bpPanel: 气泡属性面板。class="rps"对应右侧区块；style="display:none"默认隐藏，选中气泡后显示 -->
    <div class="rps" id="bpPanel" style="display:none">
      <!-- .rpt: 区块标题"气泡属性" -->
      <div class="rpt">气泡属性</div>
      <!-- .pr: 编号输入行 -->
      <div class="pr"><label>编号</label><input id="bpN" type="number" style="width:46px"/></div>
      <!-- .pr: 标准尺寸输入行 -->
      <div class="pr"><label>标准尺寸</label><input id="bpV" style="width:90px"/></div>
      <!-- .pr: 公差选择行 -->
      <div class="pr">
        <label>公差</label>
        <!-- #bpTol: 公差等级下拉框。value=""默认无公差；选m会按中等精度自动计算上下差 -->
        <select id="bpTol" style="width:90px"><option value="">无</option><option value="f">f精密</option><option value="m">m中等</option><option value="c">c粗糙</option><option value="v">v最粗</option><option value="diam">直径公差</option><option value="cham">倒角公差</option><option value="custom">自定义</option></select>
      </div>
      <!-- #bpURow: 上差输入行。id让JS能单独控制显隐(选"无公差"时隐藏) -->
      <div class="pr" id="bpURow"><label>上差</label><input id="bpU" style="width:60px"/></div>
      <!-- #bpLRow: 下差输入行。id让JS能单独控制显隐 -->

      <div class="pr">

        <select id="bpT" style="width:90px"><option value="linear">线性</option><option value="diameter">直径</option><option value="radius">半径R</option><option value="chamfer">倒角C</option><option value="angle">角度</option><option value="gdt">GD&T</option></select>
      </div>

        <select id="bpG" style="width:90px"><option value="">-</option><option value="&#8960;">直径</option><option value="&#8853;">位置度</option><option value="&#8869;">垂直度</option><option value="&#8741;">平行度</option><option value="&#8736;">角度</option><option value="&#9675;">圆度</option><option value="&#9678;">同轴度</option></select>
      </div>

        <select id="bpEquip" style="width:90px"><option value="">-</option><option value="游标卡尺">游标卡尺</option><option value="卷尺">卷尺</option><option value="角度尺">角度尺</option><option value="R规">R规</option><option value="千分尺">千分尺</option><option value="其他">其他</option></select>

      <!-- 保存和删除按钮行。margin-top:6px让按钮离上方输入框有间距；gap:4px控制按钮间距 -->
      <div style="margin-top:6px;display:flex;gap:4px">

        <button class="b bs bok" style="flex:1;justify-content:center" onclick="A.saveBubble()">保存</button>

      <div id="logA" style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);line-height:1.7"></div>

  <!-- #btPanel: 底部尺寸表格容器。class="bt"对应底部表格区样式；id让JS能控制显隐 -->
  <div class="bt" id="btPanel">

    <div class="dth">
      <!-- .dtt: 表格标题。里面#dtC是尺寸计数标签，JS会更新数字 -->
      <div class="dtt">尺寸列表 <span class="dtc" id="dtC">0</span></div>

      <div class="dta">
        <!-- +按钮。onclick="A.addEmpty()"添加一行空尺寸 -->
        <button class="b bs" onclick="A.addEmpty()">+</button>
        <!-- 全部模拟按钮。onclick="A.simAll()"给所有尺寸生成随机模拟实测值 -->
        <button class="b bs" onclick="A.simAll()">全部模拟</button>
        <!-- 删除模拟按钮。class="b bs bd"红色边框；onclick="A.delSim()"删除所有模拟数据 -->
        <button class="b bs bd" onclick="A.delSim()">删除模拟</button>

<!-- #toast: 顶部提示条。class="toast"对应提示条样式；默认隐藏，JS显示时加show类 -->
<div class="toast" id="toast"></div>
<script>
/* ================================================================
   【JavaScript大脑区 - 小白指南】
   从这里开始是程序的真正"大脑"。前面的HTML只是搭了个空架子，
   下面的代码才让页面"活"起来，能识别图纸、能拖动气泡、能导出表格。
   
   阅读小贴士：
   - var 是"定义一个变量/盒子"，用来装数据
   - function 是"定义一个功能/动作"，告诉电脑遇到什么情况该做什么
   - A.xxx 表示"A这个对象里的xxx功能"，A是整个程序的总管家
   - E('xxx') 是偷懒写法，等于 document.getElementById('xxx')，
     用来快速找到页面上 id=xxx 的元素
   ================================================================ */
'use strict';
/* ---- E()：偷懒小工具，用 E('abc') 代替 document.getElementById('abc') ---- */
// E函数：传入id字符串，返回对应的DOM元素。改document.querySelector可实现CSS选择器查找
var E=function(id){return document.getElementById(id);};
// NS：SVG命名空间常量。必须是这个固定值，不能改，否则SVG元素创建会失效
var NS='http://www.w3.org/2000/svg';
/* svgEl()：创建SVG元素的工厂函数
   t=标签名(如'circle')；a=属性对象(如{r:10})；txt=文字内容 */
function svgEl(t,a,txt){
  // 用SVG命名空间创建元素。不用createElement而要用createElementNS，否则SVG不认
  var e=document.createElementNS(NS,t);
  // 如果传了属性对象，遍历每个属性并设置。Object.keys获取对象的所有键名
  if(a) Object.keys(a).forEach(function(k){e.setAttribute(k,a[k]);});
  // 如果传了文字内容，设置textContent。undefined判断确保空字符串也能正常设置
  if(txt!==undefined) e.textContent=txt;
  // 返回创建好的SVG元素，方便链式调用或插入DOM
  return e;
}

/* ================================================================
   【公差表 TOL_GB】
   这是机械制图里的"国家标准公差表"(GB/T 1804)。
   就像查字典一样，输入一个尺寸和精度等级(f/m/c/v)，
   就能查到允许的误差范围。
   
   精度等级含义：
   - f = 精密级（要求很高，误差很小）
   - m = 中等级（一般零件用这级）
   - c = 粗糙级（要求不高）
   - v = 最粗级（差不多就行）
   ================================================================ */
// TOL_GB：国标GB/T 1804公差表。linear是线性尺寸公差，radius是圆角公差
// 每个精度等级(f/m/c/v)是一个数组，每项[最小尺寸,最大尺寸,公差值]
// 改这里的数值会改变自动计算上下差的结果；增删数组项可扩展尺寸范围
var TOL_GB={
  linear:{
    // f精密级：尺寸0.5-3mm公差0.05，3-6mm公差0.05...改.05为.02会让精密级更严格
    f:[[.5,3,.05],[3,6,.05],[6,30,.1],[30,120,.15],[120,400,.2],[400,1e3,.3],[1e3,2e3,.5]],
    // m中等级：最常用的精度。改1.2为1.5会让中等精度更宽松
    m:[[.5,3,.1],[3,6,.1],[6,30,.2],[30,120,.3],[120,400,.5],[400,1e3,.8],[1e3,2e3,1.2],[2e3,4e3,2]],
    // c粗糙级：要求不高的零件。改4为5会让大尺寸的粗糙公差更大
    c:[[.5,3,.2],[3,6,.3],[6,30,.5],[30,120,.8],[120,400,1.2],[400,1e3,2],[1e3,2e3,3],[2e3,4e3,4]],
    // v最粗级：差不多就行。改8为10会让最粗级公差更大
    v:[[3,6,.5],[6,30,1],[30,120,1.5],[120,400,2.5],[400,1e3,4],[1e3,2e3,6],[2e3,4e3,8]]
  },
  radius:{
    // f精密圆角：0.5-3mm公差0.2。改0.2为0.1会让圆角更精确
    f:[[.5,3,.2],[3,6,.5],[6,30,1],[30,1e4,2]],
    // m中等圆角：改4为5会让大圆角公差更宽松
    m:[[.5,3,.4],[3,6,1],[6,30,2],[30,1e4,4]]
  }
};
/* lookupGB()：根据标称尺寸和精度等级查公差表
   nom=标称尺寸字符串；grade=精度(f/m/c/v)；isR=是否圆角 */
function lookupGB(nom,grade,isR){
  // parseFloat把字符串转成数字。如果转失败或<=0返回null表示查不到
  var n=parseFloat(nom);if(isNaN(n)||n<=0)return null;
  // 根据isR选择圆角表或线性表，再根据grade选对应精度数组
  var tbl=isR?TOL_GB.radius[grade]:TOL_GB.linear[grade];
  // 如果精度等级不存在(如传了'x')返回null
  if(!tbl)return null;
  // 遍历公差表的每个区间，找到尺寸落在哪个范围(>min且<=max)
  for(var i=0;i<tbl.length;i++)if(n>tbl[i][0]&&n<=tbl[i][1])return tbl[i][2];
  // 没找到对应区间返回null
  return null;
}
/* parseStdGrade()：从"未注公差"输入框解析出精度等级
   如输入"GB/T 1804-m"返回'm'；匹配不到默认返回'm' */
function parseStdGrade(){
  // E('iTolStd').value获取输入框文字；match用正则匹配1804后面的f/m/v/c字母
  var m=E('iTolStd').value.match(/1804[-\s]*([fmvc])/i);
  // 如果匹配到返回小写字母，否则默认'm'中等精度。改'm'为'f'会让默认更精密
  return m?m[1].toLowerCase():'m';
}
/* fmtLim()：计算极限尺寸(标称+公差)
   nomS=标称尺寸；tolS=公差值。返回字符串 */
function fmtLim(nomS,tolS){
  // 如果没公差或公差为0，直接返回标称值
  if(!tolS||tolS==='0')return nomS;
  // 把标称和公差都转成浮点数
  var n=parseFloat(nomS),t=parseFloat(tolS);
  // 如果转失败返回原始公差字符串
  if(isNaN(n)||isNaN(t))return tolS;
  // 计算和并保留4位小数，再去掉末尾多余的0。toFixed(4)改(6)保留更多小数位
  return parseFloat((n+t).toFixed(4)).toString();
}
/* getEquip()：根据尺寸类型和大小推荐检测设备
   type=类型(linear/diameter等)；nom=标称尺寸 */
function getEquip(type,nom){
  // 把标称尺寸转浮点数
  var n=parseFloat(nom);
  // 角度类推荐角度尺。改'角度尺'为'万能角度尺'可换推荐
  if(type==='angle')return '角度尺';
  // 圆角和倒角推荐R规
  if(type==='radius'||type==='chamfer')return 'R规';
  // 线性和直径大于30mm推荐卷尺。改30为50会让更大尺寸才推荐卷尺
  if((type==='linear'||type==='diameter')&&!isNaN(n)&&n>30)return '卷尺';
  // 默认推荐游标卡尺
  return '游标卡尺';
}
/* nomDisplay()：生成尺寸显示字符串(如"⌀20""R5""C1")
   dim=尺寸对象，含type/nominal/gdt等属性 */
function nomDisplay(dim){
  // pre是前缀：直径加⌀，半径加R，倒角加C。改'⌀'为'Φ'会换符号
  var pre='';if(dim.type==='diameter')pre='⌀';else if(dim.type==='radius')pre='R';else if(dim.type==='chamfer')pre='C';
  // suf是后缀：角度加°
  var suf=dim.type==='angle'?'°':'';
  // gdt是GD&T符号，有的话前面加空格
  var g=dim.gdt?' '+dim.gdt:'';
  // 拼接前缀+标称值+后缀+GD&T符号。改拼接顺序可调整显示格式
  return pre+(dim.nominal||'')+suf+g;
}
// DIM_SYMBOLS：直径符号正则(匹配单个)。用于检测文字里是否含直径符号
var DIM_SYMBOLS=/[ΦφϕøØ⌀]/;
// DIM_SYMBOLS_GLOBAL：直径符号正则(匹配全部，带g全局标志)。用于replace替换所有
var DIM_SYMBOLS_GLOBAL=/[ΦφϕøØ⌀]/g;
/* normalizeDimText()：标准化尺寸文字，把各种直径写法统一成⌀
   t=原始OCR识别出的文字字符串 */
function normalizeDimText(t){
  // 把各种直径符号(ØøΦφϕ)统一替换成⌀。增删replace可处理更多变体
  t=t.replace(/Ø/g,'⌀').replace(/ø/g,'⌀').replace(/Φ/g,'⌀').replace(/φ/g,'⌀').replace(/ϕ/g,'⌀');
  // 把o/O后面紧跟数字的情况也替换成⌀(如o20→⌀20)。[oO]改[oO0]会把0也当成直径符号
  t=t.replace(/[oO]\s*(?=\d)/g,function(){return'⌀';});
  // 把英文直径缩写(DIA/Diam/Phi/PHI)替换成⌀。增删缩写可处理更多写法
  t=t.replace(/\bDIA\b/gi,'⌀').replace(/\bDiam\.?\b/gi,'⌀').replace(/\bPhi\b/gi,'⌀').replace(/\bPHI\b/g,'⌀');
  // 把中文"直径"替换成⌀；把多个空格合并成一个；去掉首尾空格
  t=t.replace(/直径/g,'⌀').replace(/\bSR\b/gi,'SR').replace(/\s+/g,' ').trim();
  // 返回清洗后的文字
  return t;
}

/* ================================================================
   【程序总管家 A】
   这是一个超级大的"对象"（可以理解为一个大工具箱），
   里面装着程序运行需要的所有数据和功能。
   
   重要数据字段（小白版）：
   - pdf / isImg / imgEl：记录当前打开的是PDF还是图片
   - pg / total：当前第几页 / 总共几页
   - scale：缩放比例（1.0 = 100%，2.0 = 200%）
   - tool：当前选中的工具（select选择/ocr框选识别/region识别区域/manual手动）
   - regions[]：用户框选的"识别区域"列表
   - dims[]：识别出来的所有尺寸列表（这是核心数据！）
   - marks[]：图纸上的临时标记框列表
   - ocrBusy：OCR是否正在忙（防止重复点击）
   
   坐标系统小贴士：
   程序内部用"文档坐标"(scale=1时的原始大小)，
   显示时再乘以 scale 变成屏幕上的像素。
   这样无论放大缩小，数据本身不会乱。
   ================================================================ */
/*==================================================================
 v5.4 修复列表(基于v5.3的问题分析):
  P0-1: autoFromOCR deduped排序: 升序 -> 降序(大块先入集, 碎片被吞并)
  P0-2: correctAllBoxes 3x 过滤 -> 0.3x 单向过滤(可放大,禁止过度缩小)
  P0-3: autoBubble 取消 text layer 短路(并行运行, 结果合并去重)
  P1-4: correctAllBoxes 扩展 2x -> 3x + 最小值(40/15 CSS px)
  P1-5: mapBoundsToDoc pad 固定2 -> 按字号15%自适应
  P1-6: 新增 groupRowsByLine + 行级 OCR(避免"2540"被切成4块)
  P2-7: parseDim 增加公差括号解析 (0,-1) (+0.1,-0.2) (0~-1)
  P2-8: correctAllBoxes 增加 OCR 验证(二次确认)
  P2-9: autoMode=pro UI 已在 v5.2 存在, v5.4 加强其作用
  保留v5.2全部改进(连通域检测/智能气泡/多维投票)
==================================================================*/
// A：程序总管家对象，包含所有状态数据和功能方法
var A={
  // pdf: PDF文档对象。null表示还没加载；有值后存pdfjs的PDFDocumentProxy
  pdf:null,
  // isImg: 当前是否是图片模式(非PDF)。false表示默认PDF模式；true表示打开的是图片
  isImg:false,
  // imgEl: 图片DOM元素。图片模式下存<img>元素，PDF模式下为null
  imgEl:null,
  // pg: 当前页码。默认1表示第一页；改默认值为2会打开时显示第二页
  pg:1,
  // total: 总页数。0表示未加载；加载PDF后JS会更新为实际页数
  total:0,
  // scale: 缩放比例。1.0=100%；改默认1.5会让打开时默认放大150%
  scale:1.0,
  // tool: 当前工具。'select'选择工具；改默认'ocr'会让打开时默认是框选识别模式
  tool:'select',
  // rot: OCR旋转方向。'auto'自动检测；改'0'会让默认不旋转，只识别横向文字
  rot:'auto',
  // autoMode: 自动扫描模式。'quick'快捷(0+90度)；改'pro'默认专业模式(0-270全扫)
  autoMode:'quick',
  // ocrBusy: OCR是否正在工作中。true时会禁用相关按钮防止重复点击
  ocrBusy:false,
  // selecting: 是否正在鼠标框选。true表示鼠标按下未释放，正在画选框
  selecting:false,
  // selS: 框选起点坐标对象{x,y}。记录鼠标按下时的位置
  selS:null,
  // selE: 框选终点坐标对象{x,y}。记录鼠标移动时的实时位置
  selE:null,
  // debugCoords: 调试坐标模式。true会在控制台输出详细坐标信息用于排错
  debugCoords:false,
  // regions: 识别区域数组。每个元素是一个区域对象{x,y,w,h}；空数组表示没有识别区
  regions:[],
  // dims: 尺寸数据数组。这是核心数据！每个元素是一个尺寸对象含编号/标称值/公差等
  dims:[],
  // selId: 当前选中的尺寸ID。null表示没选中；有值时右侧面板显示对应属性
  selId:null,
  // nextN: 下一个自动编号。默认1；改100会让新气泡从100开始编号
  nextN:1,
  // recycled: 回收的编号数组。删除气泡后编号回收到这里，下次优先复用
  recycled:[],
  // textItems: PDF文字元素数组。存PDF.js解析出的文字块用于辅助识别
  textItems:[],
  // lastOCR: 最后一次OCR结果。用于修正功能记住上次识别内容
  lastOCR:null,
  // lastDimId: 最后一次操作的尺寸ID。用于修正功能定位要修改的尺寸
  lastDimId:null,
  // panSt: 拖拽平移状态对象。记录中键/空格拖拽时的起始位置和滚动位置
  panSt:null,
  // cv: 画布元素。init时赋值指向#pdfCanvas
  cv:null,
  // cx: 画布2D上下文。init时赋值；willReadFrequently:true优化频繁读取像素性能
  cx:null,
  // sr: 框选矩形元素。init时赋值指向#selRect
  sr:null,
  // textOcrTarget: 文字识别目标输入框ID。startTextOCR时设置，识别后填入该框
  textOcrTarget:null,
  // dragSt: 气泡拖拽状态对象。记录拖拽气泡时的起始位置和气泡原始位置
  dragSt:null,
  // justDraggedBub: 刚刚拖拽过气泡。防止拖拽结束后误触发点击事件
  justDraggedBub:false,
  // marks: 临时标记框数组。用于显示识别区域或临时高亮；不含持久数据
  marks:[],
  // selMarkId: 当前选中的标记框ID。null表示没选中
  selMarkId:null,
  // markDragSt: 标记框拖拽状态对象。类似dragSt但用于标记框
  markDragSt:null,
  // selAngle: 当前选中项的角度。默认0表示不旋转；用于标记框旋转功能
  selAngle:0,

  init:function(){

    if(v('psm'))E('sPSM').value=v('psm');

    if(v('thresh'))E('sThresh').value=v('thresh');
    if(v('invert'))E('sInvert').value=v('invert');

    if(v('adapt'))E('sAdapt').value=v('adapt');
    if(v('confuse'))E('sConfuse').value=v('confuse');

    if(v('cache')!==undefined)E('sCache').value=v('cache');

    if(v('autoMode'))E('sAutoMode').value=v('autoMode');

    this.rot=v('rot')||'auto';this.autoMode=v('autoMode')||'quick';

  /* ================================================================
     【bindEvts：给所有按钮和画布"装上开关"】
     这个函数就像"电工接线"，把页面上的每个按钮、每个操作区域
     都连接到对应的处理函数上。如果没有这个函数，按钮点了也没反应。
     
     主要接线内容：
     - 打开文件按钮 -> 弹出文件选择框
     - 画布鼠标操作 -> 框选/拖动/缩放
     - 键盘快捷键 -> Delete删除、+/-缩放、Esc取消
     - 拖放文件 -> 直接加载图纸
     ================================================================ */
  // bindEvts：给所有按钮和交互元素绑定事件处理函数
  bindEvts:function(){
    // self保存A对象的引用，因为事件回调里的this会指向其他对象
    var self=this;
    // 打开按钮：点击时触发隐藏的文件选择框

    E('fileInput').addEventListener('change',function(e){if(e.target.files[0])self.loadFile(e.target.files[0]);});
    // 自动气泡按钮：点击调用autoBubble开始自动识别
    E('btnAuto').onclick=function(){self.autoBubble();};
    // 矫正选框按钮：点击调用correctAllBoxes矫正所有气泡位置
    E('btnFixBox').onclick=function(){self.correctAllBoxes();};
    // 尺寸表按钮：点击切换.app的open类，展开/收起底部表格
    E('btnTable').onclick=function(){E('app').classList.toggle('open');};
    // 导出按钮：点击显示导出弹窗(加show类)
    E('btnExport').onclick=function(){E('expM').classList.add('show');};
    // 保存按钮：点击调用saveProj保存项目为JSON文件
    E('btnSave').onclick=function(){self.saveProj();};
    // 加载按钮：点击触发隐藏的项目文件选择框
    E('btnLoad').onclick=function(){E('projectInput').click();};
    // 项目文件选择框：选文件后调用loadProj加载项目
    E('projectInput').addEventListener('change',function(e){if(e.target.files[0])self.loadProj(e.target.files[0]);});
    // 重置设置按钮：清除localStorage里的设置，重新加载默认值
    E('btnResetSet').onclick=function(){localStorage.removeItem('digiFAI_v54');self.loadSets();self.toast('已恢复默认');};
    // sids：所有需要自动保存的设置控件ID数组。增删ID可让更多设置自动记忆
    var sids=['sPSM','sScale','sThresh','sInvert','sMulti','sAdapt','sConfuse','sCache','sLang','sAutoMode'];
    // 遍历每个设置控件，绑定change事件：值改变时自动保存到localStorage
    sids.forEach(function(id){
      E(id).addEventListener('change',function(){if(id==='sAutoMode')self.autoMode=E('sAutoMode').value;self.saveSets();});
    });
    // 供方输入框：值改变时自动保存设置
    E('iSupplier').addEventListener('change',function(){self.saveSets();});
    // 未注公差输入框：值改变时自动保存设置
    E('iTolStd').addEventListener('change',function(){self.saveSets();});
    // 公差等级下拉框：值改变时控制上下差输入框的读写状态
    E('bpTol').addEventListener('change',function(){
      // 获取当前选中的公差等级值
      var grade=E('bpTol').value;
      // 只有自定义或无公差时，上下差输入框才可编辑；否则只读
      E('bpU').readOnly=!(grade==='custom'||grade==='');
      E('bpL').readOnly=!(grade==='custom'||grade==='');
      // 自定义时加custom-tol类让边框变红色提示；否则移除
      if(grade==='custom'){E('bpU').classList.add('custom-tol');E('bpL').classList.add('custom-tol');}
      else{E('bpU').classList.remove('custom-tol');E('bpL').classList.remove('custom-tol');}
      // 直径公差或倒角公差时自动保存气泡(因为会触发自动计算)
      if(grade==='diam'||grade==='cham')self.saveBubble();
    });
    // dz是拖放区域；dc是dragenter计数器(防止子元素触发dragleave导致闪烁)
    var dz=E('dropZone'),dc=0;
    // dragenter：鼠标拖文件进入区域时。preventDefault阻止浏览器默认行为(如打开文件)
    dz.addEventListener('dragenter',function(e){e.preventDefault();dc++;E('dropOv').classList.add('on');});
    // dragleave：鼠标拖文件离开区域时。dc减到0才隐藏遮罩，防止子元素闪烁
    dz.addEventListener('dragleave',function(e){e.preventDefault();dc--;if(dc<=0){dc=0;E('dropOv').classList.remove('on');}});
    // dragover：鼠标在区域上方移动时。必须preventDefault否则drop事件不触发
    dz.addEventListener('dragover',function(e){e.preventDefault();});
    // drop：释放文件时。隐藏遮罩并调用loadFile加载第一个文件
    dz.addEventListener('drop',function(e){e.preventDefault();dc=0;E('dropOv').classList.remove('on');if(e.dataTransfer.files[0])self.loadFile(e.dataTransfer.files[0]);});
    // 工具列表点击事件：点击某个工具项时切换到对应工具
    E('tlList').addEventListener('click',function(e){var el=e.target.closest('.tl-item');if(el)self.setTool(el.dataset.t);});
    // 方向按钮组点击事件：点击某个方向按钮时更新旋转设置
    E('rotG').addEventListener('click',function(e){
      // closest('.rb')找到被点击的方向按钮；如果点的是空白处直接返回
      var b=e.target.closest('.rb');if(!b)return;
      // 移除所有按钮的on类，再给当前按钮加上
      E('rotG').querySelectorAll('.rb').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');self.rot=b.dataset.r;self.saveSets();
    });
    // 画布鼠标按下：进入框选或拖拽逻辑
    this.cv.addEventListener('mousedown',function(e){self.onCvDown(e);});
    // 画布鼠标移动：更新框选矩形或拖拽位置
    this.cv.addEventListener('mousemove',function(e){self.onCvMove(e);});
    // 画布鼠标释放：结束框选或拖拽
    this.cv.addEventListener('mouseup',function(e){self.onCvUp(e);});
    // 画布右键菜单：阻止默认菜单，调用cancelSel取消当前选中
    this.cv.addEventListener('contextmenu',function(e){e.preventDefault();self.cancelSel();});
    // 气泡SVG图层鼠标按下：判断是点击标记框还是气泡
    document.getElementById('bubbleSvg').addEventListener('mousedown',function(e){
      // 如果点击的是标记框(mark-g)内部，走标记框拖拽逻辑；否则走气泡拖拽逻辑
      var t=e.target;if(t.closest('.mark-g')){self.onMarkDown(e);return;}self.onBubDown(e);
    });
    // SVG图层双击事件：双击标记框时调用onMarkDblClick编辑标记
    document.getElementById('bubbleSvg').addEventListener('dblclick',function(e){var t=e.target;var g=t.closest('.mark-g');if(g)self.onMarkDblClick(g);});
    // 全局鼠标移动：优先处理标记框拖拽，其次处理气泡拖拽
    document.addEventListener('mousemove',function(e){if(A.markDragSt){A.onMarkMove(e);return;}A.onBubMove(e);});
    // 全局鼠标释放：优先结束标记框拖拽，其次结束气泡拖拽
    document.addEventListener('mouseup',function(e){if(A.markDragSt){A.onMarkUp();return;}A.onBubUp(e);});
    // vs是可视区域容器，绑定滚轮缩放
    var vs=E('vs');
    vs.addEventListener('wheel',function(e){
      // preventDefault阻止页面滚动；如果没加载文件直接返回
      e.preventDefault();if(!self.pdf&&!self.isImg)return;
      // o记录缩放前的比例；根据滚轮方向(deltaY)增减0.12
      var o=self.scale;
      // Math.max(.15,Math.min(8,...))限制缩放范围15%-800%。改.15和8可调整最小/最大缩放
      self.scale=Math.max(.15,Math.min(8,self.scale+(e.deltaY>0?-.12:.12)));
      // r是缩放比例；rt是可视区相对于视口的位置
      var r=self.scale/o,rt=vs.getBoundingClientRect();
      // mx/my是鼠标在画布内容中的坐标(考虑滚动偏移)
      var mx=e.clientX-rt.left+vs.scrollLeft,my=e.clientY-rt.top+vs.scrollTop;
      // 渲染新比例后，调整滚动位置让鼠标指向的图纸位置保持不变(实现以鼠标为中心缩放)
      self.renderPage().then(function(){
        vs.scrollLeft=mx*r-(e.clientX-rt.left);vs.scrollTop=my*r-(e.clientY-rt.top);
      });
    // passive:false必须设置，否则preventDefault在部分浏览器无效
    },{passive:false});
    // 可视区鼠标按下：中键(button===1)或左键+Alt键时进入平移模式
    vs.addEventListener('mousedown',function(e){
      if(e.button===1||(e.button===0&&e.altKey)){
        // 阻止默认行为；panSt记录起始鼠标位置和当前滚动位置
        e.preventDefault();self.panSt={x:e.clientX,y:e.clientY,sl:vs.scrollLeft,st:vs.scrollTop};vs.style.cursor='grabbing';
      }
    });
    // 全局鼠标移动：如果处于平移模式，根据鼠标移动量更新滚动位置
    document.addEventListener('mousemove',function(e){if(!self.panSt)return;vs.scrollLeft=self.panSt.sl-(e.clientX-self.panSt.x);vs.scrollTop=self.panSt.st-(e.clientY-self.panSt.y);});
    // 全局鼠标释放：退出平移模式，恢复鼠标样式
    document.addEventListener('mouseup',function(){if(self.panSt){self.panSt=null;E('vs').style.cursor='';}});
    // 全局键盘快捷键
    document.addEventListener('keydown',function(e){
      // 如果在输入框/下拉框/可编辑元素内，不拦截快捷键(让用户正常打字)
      if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.isContentEditable)return;
      // Escape键：取消所有选中状态(框选/气泡/文字识别/标记框)
      if(e.key==='Escape'){self.cancelSel();self.deselBub();self.cancelTextOCR();self.deselMark();}
      // Delete/Backspace键：如果有选中的尺寸气泡，删除它
      if((e.key==='Backspace'||e.key==='Delete')&&self.selId!==null){e.preventDefault();self.delSel();}
      // Delete/Backspace键：如果有选中的标记框，删除它
      if((e.key==='Backspace'||e.key==='Delete')&&self.selMarkId!==null){e.preventDefault();self.delMark();}
      // +/-键：放大/缩小。改.15为.2会让每次缩放幅度更大
      if(e.key==='+'||e.key==='='){e.preventDefault();self.zoomBy(.15);}
      if(e.key==='-'){e.preventDefault();self.zoomBy(-.15);}
    });
    // 全局dragover/drop：阻止默认拖放行为(防止浏览器打开拖放的文件)
    document.addEventListener('dragover',function(e){e.preventDefault();});
    document.addEventListener('drop',function(e){e.preventDefault();});
  },
  // startTextOCR：启动文字识别模式，让用户在图纸上框选文字
  startTextOCR:function(fieldId){
    // textOcrTarget记录识别结果要填入哪个输入框；切换工具为textocr
    this.textOcrTarget=fieldId;this.setTool('textocr');this.toast('在图纸上框选文字');
    // 移除所有OCR按钮的active高亮
    document.querySelectorAll('.ocr-btn').forEach(function(b){b.classList.remove('active');});
    // 找到对应输入框旁边的OCR按钮并高亮，提示用户当前在给哪个字段识别
    var btn=E(fieldId).parentElement.querySelector('.ocr-btn');if(btn)btn.classList.add('active');
  },
  // cancelTextOCR：取消文字识别模式，清除目标字段和高亮
  cancelTextOCR:function(){this.textOcrTarget=null;document.querySelectorAll('.ocr-btn').forEach(function(b){b.classList.remove('active');});},
  // performTextOCR：执行文字OCR识别，把框选区域的文字识别到目标输入框
  performTextOCR:function(){
    // 如果没目标或OCR正忙直接返回，防止重复执行
    if(!this.textOcrTarget||this.ocrBusy)return;
    // self保留引用；target是目标输入框ID；设置状态为忙碌
    var self=this,target=self.textOcrTarget;self.ocrBusy=true;self.setStatus('y','文字识别...');
    // cropAndProc裁剪并预处理画布区域；'global'表示用全局OCR配置
    var proc=self.cropAndProc(0,undefined,'global');
    // 判断是否是中文字段(产品名称用中文识别，其他用英文)
    var isCN=(target==='iProdName');
    // opts传给Tesseract的配置：pageseg_mode 6=统一文本块，7=单行文本
    var opts={tessedit_pageseg_mode:isCN?'6':'7'};
    // 非中文时限制字符白名单，提高识别准确率。增删字符可调整允许识别的字符集
    if(!isCN)opts.tessedit_char_whitelist='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_. /()°±⌀Rrc半直径';
    // Tesseract.recognize进行OCR；语言包：中文用chi_sim+eng，其他用eng
    Tesseract.recognize(proc,isCN?'chi_sim+eng':'eng',opts).then(function(res){
      // 获取识别结果，trim去首尾空格，把换行符替换成空格
      var text=(res.data.text||'').trim().replace(/[\n\r]+/g,' ');
      // 正则去掉中文字符之间的多余空格(如"中 国"->"中国")，执行两次确保干净
      text=text.replace(/([一-鿿])\s+([一-鿿])/g,'$1$2');
      text=text.replace(/([一-鿿])\s+([一-鿿])/g,'$1$2');
      // 把识别结果填入目标输入框；记录日志并提示用户
      E(target).value=text;self.log('文字: "'+text+'"','ok');self.toast('已识别: '+text);
      // 设置完成状态；解除忙碌；取消选中并切回选择工具
      self.setStatus('g','完成');self.ocrBusy=false;
      self.cancelSel();self.cancelTextOCR();self.setTool('select');
    // 识别出错时：解除忙碌；显示错误状态；取消文字识别模式
    }).catch(function(){self.ocrBusy=false;self.setStatus('r','错误');self.cancelTextOCR();});
  },

  /* ================================================================
     【文件加载三人组：loadFile / loadPDF / loadImg】
     这三个函数负责"开门迎客"——把用户的图纸请进页面。
     
     - loadFile：看门大爷，先判断文件类型，再交给对应专员
     - loadPDF：PDF专员，用 pdf.js 库把PDF逐页转成画布上的图
     - loadImg：图片专员，用浏览器自带的 Image 对象加载图片
     ================================================================ */
  // loadFile：根据文件扩展名判断类型，交给对应加载函数
  loadFile:function(f){
    // 转小写确保判断不区分大小写(PDF/pdf都能识别)
    var n=f.name.toLowerCase();
    // 以.pdf结尾的调用loadPDF。改endsWith('.pdf')可支持其他PDF扩展名
    if(n.endsWith('.pdf'))this.loadPDF(f);
    // 匹配.png/.jpg/.jpeg/.tif/.tiff/.bmp的图片调用loadImg。增删扩展名可支持更多格式
    else if(/\.(png|jpe?g|tif{1,2}|bmp)$/.test(n))this.loadImg(f);
    // 不支持的格式提示用户
    else this.toast('不支持的格式');
  },
  // loadPDF：加载PDF文件，用pdf.js解析并显示第一页
  loadPDF:function(f){
    var self=this;self.setStatus('y','加载中...');
    // arrayBuffer()读取文件二进制数据；pdfjsLib.getDocument创建PDF文档对象
    f.arrayBuffer().then(function(b){return pdfjsLib.getDocument({data:b}).promise;}).then(function(p){
      // p是PDF文档对象；numPages获取总页数；初始化当前页为1；标记非图片模式
      self.pdf=p;self.total=p.numPages;self.pg=1;self.isImg=false;self.showView();self.renderPgList();
      // 渲染第一页
      return self.renderPage();
    // 加载完成后记录日志、更新状态、启用按钮
    }).then(function(){self.log(self.total+'页加载完成','ok');self.setStatus('g','就绪');self.enableBtns();}).catch(function(){self.log('加载失败','err');self.setStatus('r','错误');});
  },
  // loadImg：加载图片文件，用Image对象显示
  loadImg:function(f){

    img.onload=function(){self.pdf=null;self.isImg=true;self.imgEl=img;self.total=1;self.pg=1;self.showView();self.renderPgList();self.renderPage().then(function(){self.setStatus('g','就绪');self.enableBtns();URL.revokeObjectURL(url);});};

  // showView：隐藏空状态，显示画布、缩放条、底部表格
  showView:function(){

    E('empSt').classList.add('hid');E('vs').style.display='';E('zBar').classList.add('show');E('app').classList.add('open');
  },
  // enableBtns：启用需要文件加载后才能用的按钮
  enableBtns:function(){

  },

  /* ================================================================
     【渲染二人组：renderPage / renderImgPage】
     这两个函数负责"画画"——把PDF或图片画到中间的画布上。
     
     renderPage 的工作流程：
     1. 向PDF库要当前页的数据
     2. 按当前缩放比例(scale)计算画布该多大
     3. 调用PDF库的 render 方法把内容画上去
     4. 画完后更新覆盖层（气泡、选框等）
     
     小贴士：dpr 是设备像素比，高清屏(如Retina)上dpr=2，
     这样画出来的文字和线条才不会模糊。
     ================================================================ */
  // renderPage：渲染当前页(PDF或图片)到画布
  renderPage:function(){
    var self=this;
    // 如果是图片模式，调用renderImgPage；如果PDF未加载，返回空Promise
    if(self.isImg)return self.renderImgPage();if(!self.pdf)return Promise.resolve();
    // getPage获取当前页对象；then异步处理
    return self.pdf.getPage(self.pg).then(function(page){
      // getViewport计算当前缩放比例下的视口大小
      var vp=page.getViewport({scale:self.scale});
      // dpr设备像素比，Retina屏为2，让画布用更多物理像素保持清晰
      var dpr=window.devicePixelRatio||1;
      // 画布实际像素=视口大小*dpr；style宽高=视口CSS像素
      self.cv.width=vp.width*dpr;self.cv.height=vp.height*dpr;
      self.cv.style.width=vp.width+'px';self.cv.style.height=vp.height+'px';
      // setTransform设置缩放矩阵(dpr,0,0,dpr,0,0)，让PDF渲染在高清屏上不模糊
      self.cx.setTransform(dpr,0,0,dpr,0,0);
      // page.render把PDF内容画到画布；完成后重置变换矩阵并更新覆盖层
      return page.render({canvasContext:self.cx,viewport:vp}).promise.then(function(){
        self.cx.setTransform(1,0,0,1,0,0);self.updOverlay(vp.width,vp.height);return self.extractText();
      });
    });
  },
  // renderImgPage：渲染图片到画布(图片模式专用)
  renderImgPage:function(){
    var self=this,img=self.imgEl;
    // w/h是图片在当前缩放比例下的显示尺寸
    var w=img.width*self.scale,h=img.height*self.scale;
    // dpr设备像素比，高清屏需要更多像素保持清晰
    var dpr=window.devicePixelRatio||1;
    // 设置画布实际像素和CSS显示尺寸
    self.cv.width=w*dpr;self.cv.height=h*dpr;
    self.cv.style.width=w+'px';self.cv.style.height=h+'px';
    // 设置缩放矩阵适配高清屏
    self.cx.setTransform(dpr,0,0,dpr,0,0);
    // 开启图像平滑和高质量缩放。改'high'为'medium'会降低质量但可能更快
    self.cx.imageSmoothingEnabled=true;self.cx.imageSmoothingQuality='high';
    // drawImage把图片画到画布(0,0起点，w/h目标尺寸)
    self.cx.drawImage(img,0,0,w,h);self.cx.setTransform(1,0,0,1,0,0);
    // 更新覆盖层；清空PDF文字项(图片模式没有PDF文字)；返回空Promise保持接口一致
    self.updOverlay(w,h);self.textItems=[];return Promise.resolve();
  },
  // updOverlay：更新SVG覆盖层尺寸并重绘所有叠加元素
  updOverlay:function(w,h){
    // 获取气泡SVG元素并设置宽高和viewBox
    var svg=document.getElementById('bubbleSvg');
    svg.setAttribute('width',w);svg.setAttribute('height',h);
    svg.setAttribute('viewBox','0 0 '+w+' '+h);
    // 取消选中气泡；重绘识别区域、标记框、气泡。顺序很重要：先区域再气泡
    this.deselBub();this.renderRegions();this.renderMarks();this.renderBubbles();
    this.cancelSel();E('zLv').textContent=Math.round(this.scale*100)+'%';this.updStatus();
  },
  // renderPgList：渲染左侧页码列表
  renderPgList:function(){
    var el=E('pgList'),self=this;el.innerHTML='';
    // 遍历1到总页数，为每页创建一个列表项
    for(var i=1;i<=self.total;i++)(function(p){
      // 创建div元素；on类给当前页加高亮背景
      var d=document.createElement('div');
      d.className='pg-item'+(p===self.pg?' on':'');
      // 内HTML：页码数字+"第X页"文字
      d.innerHTML='<span class="pg-n">'+p+'</span>第'+p+'页';
      // 点击切换当前页并重新渲染
      d.onclick=function(){self.pg=p;self.renderPage();self.renderPgList();};el.appendChild(d);
    })(i);
  },
  // extractText：提取当前PDF页的文字内容，用于辅助识别
  extractText:function(){
    var self=this;self.textItems=[];if(!self.pdf)return Promise.resolve();
    return self.pdf.getPage(self.pg).then(function(page){
      return page.getTextContent().then(function(tc){
        // s是当前缩放比例；vp是scale=1时的视口(用于计算Y坐标翻转)
        var s=self.scale,vp=page.getViewport({scale:1});
        // filter过滤掉空字符串；map把PDF文字项转成简化对象{text,x,y,w,h}
        self.textItems=tc.items.filter(function(i){return i.str.trim();}).map(function(item){
          // transform[4]是X坐标；transform[5]是Y坐标(PDF坐标原点在左下，需翻转)
          return{text:item.str.trim(),x:item.transform[4]*s,y:(vp.height-item.transform[5])*s,w:item.width*s,h:(item.height||Math.abs(item.transform[3]))*s};
        });
      });
    // 出错时静默处理(文字提取失败不影响主功能)
    }).catch(function(){});
  },
  // zoomBy：按增量缩放。参数d>0放大，d<0缩小
  zoomBy:function(d){this.scale=Math.max(.15,Math.min(8,this.scale+d));this.renderPage();},
  // zoomFit：自适应缩放，让图纸刚好填满可视区(留40px边距)
  zoomFit:function(){
    var self=this,vs=E('vs');
    // 没加载文件直接返回
    if(!self.pdf&&!self.isImg)return;
    // 图片模式：取宽/高两个方向缩放比例的较小值，最大不超过4倍
    if(self.isImg){var s=Math.min((vs.clientWidth-40)/self.imgEl.width,(vs.clientHeight-40)/self.imgEl.height,4);self.scale=s;self.renderPage();}
    // PDF模式：先获取页面原始尺寸，再计算自适应缩放
    else{self.pdf.getPage(self.pg).then(function(p){var vp=p.getViewport({scale:1});var s=Math.min((vs.clientWidth-40)/vp.width,(vs.clientHeight-40)/vp.height,4);self.scale=s;self.renderPage();});}
  },
  // setTool：切换当前工具
  setTool:function(t){
    // 更新tool状态；给对应工具项加on高亮；选择工具用默认光标，其他用十字准星
    this.tool=t;
    E('tlList').querySelectorAll('.tl-item').forEach(function(el){el.classList.toggle('on',el.dataset.t===t);});
    this.cv.style.cursor=(t==='select')?'default':'crosshair';
  },

  /*----- 区域管理 -----*/
  // addRegion：添加识别区域
  addRegion:function(x,y,w,h){
    // id用时间戳+随机数确保唯一；x/y/w/h转成图纸坐标(除以scale)
    var r={id:Date.now()+Math.random(),x:x/this.scale,y:y/this.scale,w:w/this.scale,h:h/this.scale,pg:this.pg};
    // 加入区域数组；重绘区域图形和列表；扫描区域内的数字
    this.regions.push(r);this.renderRegions();this.renderRegionList();this.scanRegionDigits(r);
    this.log('区域#'+this.regions.length,'ok');
  },
  // delRegion：删除指定ID的区域
  delRegion:function(id){
    // filter过滤掉要删除的区域；重绘区域图形和列表
    this.regions=this.regions.filter(function(r){return r.id!==id;});
    this.renderRegions();this.renderRegionList();this.toast('区域已删除');
    // 同时删除当前页的所有标记框(区域和标记联动)
    this.marks=this.marks.filter(function(m){return m.pg!==A.pg;});this.renderMarks();
  },
  // renderRegions：重绘所有识别区域矩形
  renderRegions:function(){
    var svg=document.getElementById('bubbleSvg');
    // 先清除旧的区域矩形，避免重复绘制
    svg.querySelectorAll('.region-rect').forEach(function(e){e.remove();});
    var s=this.scale,self=this;
    this.regions.filter(function(r){return r.pg===self.pg;}).forEach(function(r){
      svg.insertBefore(svgEl('rect',{class:'region-rect',x:r.x*s,y:r.y*s,width:r.w*s,height:r.h*s,fill:'rgba(91,154,255,.06)',stroke:'#5b9aff','stroke-width':'1.5','stroke-dasharray':'6,3',rx:'2'}),svg.firstChild);
    });
  },
  // renderRegionList：渲染左侧区域列表
  renderRegionList:function(){
    var el=E('regionList'),self=this;
    // 过滤出当前页的区域
    var pgR=this.regions.filter(function(r){return r.pg===self.pg;});
    // 如果没有区域，显示提示文字
    if(!pgR.length){el.innerHTML='<div style="color:var(--t3);font-size:10px">使用「识别区域」工具框选</div>';return;}
    // map生成每个区域的HTML：显示区域序号和尺寸，带删除按钮。改10px可调整提示文字大小
    el.innerHTML=pgR.map(function(r,i){return'<div class="region-item"><span>区域'+(i+1)+': '+Math.round(r.w)+'x'+Math.round(r.h)+'</span><button class="rdel" onclick="A.delRegion('+r.id+')">x</button></div>';}).join('');
  },

  /*----- 选择交互 -----*/
  // getPos：获取鼠标在画布上的坐标，限制在画布范围内
  getPos:function(e){var r=this.cv.getBoundingClientRect();return{x:Math.max(0,Math.min(r.width,e.clientX-r.left)),y:Math.max(0,Math.min(r.height,e.clientY-r.top))};},
  // onCvDown：画布鼠标按下事件
  onCvDown:function(e){
    // 如果没文件/OCR忙/平移中/不是左键/刚拖完气泡，都不处理
    if((!this.pdf&&!this.isImg)||this.ocrBusy||this.panSt||e.button!==0||this.justDraggedBub)return;
    // 获取鼠标位置；取消标记框选中
    var p=this.getPos(e);this.deselMark();
    // 如果是区域/OCR/文字识别/手动工具，开始框选
    if(this.tool==='region'||this.tool==='ocr'||this.tool==='textocr'||this.tool==='manual'){
      this.selecting=true;this.selS=p;this.selE={x:p.x,y:p.y};this.sr.classList.add('on');this.updSelUI();
    }
  },
  // onCvMove：画布鼠标移动事件，更新框选矩形
  onCvMove:function(e){if(!this.selecting)return;this.selE=this.getPos(e);this.updSelUI();},
  // onCvUp：画布鼠标释放事件，根据当前工具执行对应操作
  onCvUp:function(){
    if(!this.selecting)return;this.selecting=false;
    // 计算框选宽高；如果太小(<4px)视为误触，取消
    var w=Math.abs(this.selE.x-this.selS.x),h=Math.abs(this.selE.y-this.selS.y);
    if(w<4||h<4){this.cancelSel();return;}
    // 区域工具：添加识别区域
    if(this.tool==='region'){this.addRegion(Math.min(this.selS.x,this.selE.x),Math.min(this.selS.y,this.selE.y),w,h);this.cancelSel();}
    // OCR工具：自定义旋转时添加标记框；否则直接识别
    else if(this.tool==='ocr'){
      if(this.rot==='custom'){
        // 把屏幕坐标转成图纸坐标
        var sx=Math.min(this.selS.x,this.selE.x)/this.scale,sy=Math.min(this.selS.y,this.selE.y)/this.scale,sw=w/this.scale,sh=h/this.scale;
        // 添加空白标记框，让用户调整后再识别
        this.addMark(sx,sy,sw,sh,'',{nom:'',type:'linear',up:'',lo:''});this.cancelSel();this.toast('调整选框后双击选框识别');
      }else{this.performOCR();}
    // 文字识别工具：执行文字OCR
    }else if(this.tool==='textocr'){this.performTextOCR();}
    // 手动工具：弹出输入框让用户手动输入尺寸
    else if(this.tool==='manual'){this.addManualBubble();}
  },
  // updSelUI：更新框选矩形DOM的位置和尺寸
  updSelUI:function(){
    var x=Math.min(this.selS.x,this.selE.x),y=Math.min(this.selS.y,this.selE.y);
    this.sr.style.left=x+'px';this.sr.style.top=y+'px';
    this.sr.style.width=Math.abs(this.selE.x-this.selS.x)+'px';this.sr.style.height=Math.abs(this.selE.y-this.selS.y)+'px';
  },
  // cancelSel：取消框选状态，隐藏选框矩形
  cancelSel:function(){this.sr.classList.remove('on');this.selS=this.selE=null;},

  // addManualBubble：手动添加气泡（用户输入尺寸值）
  addManualBubble:function(){
    // prompt弹出输入框让用户输入尺寸。改提示文字可引导用户输入其他格式
    var val=prompt('输入尺寸值 (如: 20, 10.6, R1, 90, ⌀10):');if(!val){this.cancelSel();return;}
    // 计算框选区域在图纸坐标系中的位置和尺寸
    var sx=Math.min(this.selS.x,this.selE.x)/this.scale,sy=Math.min(this.selS.y,this.selE.y)/this.scale;
    var sw=Math.abs(this.selE.x-this.selS.x)/this.scale,sh=Math.abs(this.selE.y-this.selS.y)/this.scale;
    // parseDim解析用户输入的尺寸字符串；getNextNum获取下一个编号；findBubblePos找气泡位置
    var parsed=this.parseDim(val);var num=this.getNextNum();var pos=this.findBubblePos(sx,sy,sw,sh);
    // 创建尺寸数据对象，包含所有属性。增删字段可扩展数据结构
    var dim={id:Date.now()+Math.random(),num:num,nominal:parsed.nom,upperTol:parsed.up,lowerTol:parsed.lo,tolValue:0,tolDisplay:'',tolGrade:'',type:parsed.type,gdt:'',measured:'',result:'',notes:'',equipment:getEquip(parsed.type,parsed.nom),ocrRaw:val,ocrAngle:0,pg:this.pg,saved:false,selX:sx,selY:sy,selW:sw,selH:sh,bubX:pos.x,bubY:pos.y};
    // 自动计算公差；按位置排序插入；添加SVG气泡；刷新表格；提示用户；取消框选
    this.autoTol(dim);this.insertDimSorted(dim);this.addBubSVG(dim);this.renderTable();this.toast('#'+num+' '+nomDisplay(dim));this.cancelSel();
  },

  /* ================================================================
     【findTextRegions：像"扫雷"一样找出图上的文字区域】
     这是v5.2最厉害的改进之一。以前靠OCR库自己找文字，
     现在程序先自己"看"一遍图，把可能是文字的地方圈出来，
     再交给OCR逐个识别，准确率大幅提高。
     
     工作流程（六步走）：
     1. Otsu自动算阈值：把图纸变成黑白两色
     2. 形态学闭运算：把断开的笔画连起来（比如"口"字缺了一笔也能连上）
     3. 连通域标记：像涂色游戏，把连在一起的黑色像素涂成同一个颜色
     4. 过滤候选：去掉太大（整张图）或太小（噪点）的斑块
     5. 邻近合并：把同一行/同一列的小斑块合并成一块
     6. 坐标转换：把在"放大图"上找到的位置，换算回原始图纸坐标
     
     参数：
     - canvas：放大的图纸图像（OCR专用画布）
     - regionRect：用户框选的区域信息
     - isVertical：是否竖排文字（true=竖排，false=横排）
     ================================================================ */
  // findTextRegions：图像处理函数，自动找出图纸上的文字区域
  findTextRegions:function(canvas,regionRect,isVertical){
    // 获取画布2D上下文；willReadFrequently优化频繁读取像素
    var ctx=canvas.getContext('2d',{willReadFrequently:true});
    // w/h是整个放大后画布的宽高
    var w=canvas.width,h=canvas.height;
    // lx/ly是区域左上角在放大画布上的偏移；lw/lh是区域宽高。没regionRect则用全图
    var lx=regionRect?regionRect.lx:0,ly=regionRect?regionRect.ly:0;
    var lw=regionRect?regionRect.lw:w,lh=regionRect?regionRect.lh:h;
    // getImageData获取区域像素数据；d是Uint8ClampedArray，每4字节代表一个像素的RGBA
    var id=ctx.getImageData(lx,ly,lw,lh);var d=id.data;
    // s是当前缩放比例；osc是OCR放大倍数(来自设置)
    var s=this.scale,osc=parseInt(E('sScale').value)||2;
    // dpr设备像素比，用于坐标换算
    var dpr=window.devicePixelRatio||1;
    // 区域原点在文档坐标系中的位置(用于最后把找到的位置转回文档坐标)
    var docOrgX=regionRect&&regionRect.docX!==undefined?regionRect.docX:0;
    var docOrgY=regionRect&&regionRect.docY!==undefined?regionRect.docY:0;
    /* ---- 1. Otsu自动阈值：计算最佳黑白分界值 ----
       Otsu算法自动找出一个阈值，让黑色(文字)和白色(背景)分得最开 */
    // hist是灰度直方图，256个桶，统计每个灰度级有多少像素
    var hist=new Array(256).fill(0);
    // 遍历所有像素，每4字节一个像素，取RGB按人眼敏感度加权算灰度(.299R+.587G+.114B)
    for(var i=0;i<d.length;i+=4)hist[Math.round(d[i]*.299+d[i+1]*.587+d[i+2]*.114)]++;
    // total总像素数；sum是所有像素的灰度总和
    var total=d.length/4,sum=0;for(var i=0;i<256;i++)sum+=i*hist[i];
    // sB累计灰度和；wB累计像素数；mxV最大类间方差；th最终阈值
    var sB=0,wB=0,mxV=0,th=0;
    // Otsu核心算法：遍历每个可能的阈值，计算类间方差，找最大的
    for(var i=0;i<256;i++){wB+=hist[i];if(!wB)continue;var wF=total-wB;if(!wF)break;sB+=i*hist[i];var mB=sB/wB,mF=(sum-sB)/wF,vb=wB*wF*(mB-mF)*(mB-mF);if(vb>mxV){mxV=vb;th=i;}}
    // 工程图纸淡色笔划多，阈值乘0.9保留浅色文字；同时不低于80防止过黑
    th=Math.max(80,Math.round(th*0.9));
    /* ---- 2. 二值化 + 形态学闭运算 ----
       闭运算=先膨胀后腐蚀，能把断开的笔画连起来 */
    // bin存二值化结果(0或1)；morph是形态学运算临时数组
    var bin=new Uint8Array(lw*lh);var morph=new Uint8Array(lw*lh);
    // 结构元素大小，取区域短边的1/100，至少2像素。改100为50会让结构元素更大

  /* ================================================================

     这是v5.2核心改进。直接把原图送给OCR，效果往往不好，
     因为图纸线条细、背景灰。这个函数就像"修图师"，

     2. 放大：按设置里的倍数放大（默认2倍，让细线条变粗）

  /*================================================================

  },

  /* ================================================================
     【autoTol：自动给尺寸配"公差"】
     就像老师批改作业，不同的题目有不同的扣分标准。
     这个函数根据尺寸类型和大小，自动填写合适的公差值。

     规则：
     - 角度：默认 ±1°（因为角度一般要求没那么严）
     - 直径<10mm：±0.1；直径≥10mm：+0.5/0（单边公差）
     - 其他：查 GB/T 1804 公差表
     ================================================================ */
  // autoTol：根据尺寸类型自动计算并填写公差
  // dim=尺寸对象，会被直接修改（加tolValue/tolDisplay等属性）
  autoTol:function(dim){
    // 如果是角度类型。改1为2会让角度默认公差变宽松
    if(dim.type==='angle'){
      // tolValue：公差的数值大小。改1为0.5会让角度更严格
      dim.tolValue=1;
      // tolDisplay：给人看的公差文字。改'±1°'为'±0.5°'同步显示
      dim.tolDisplay='±1°';
      // tolGrade：精度等级(f/m/c/v)。空字符串表示不是国标等级
      dim.tolGrade='';
      // upperTol：上差（最大允许值）。改'+1'为'+2'允许更大正偏差
      dim.upperTol='+1';
      // lowerTol：下差（最小允许值）。改'-1'为'-2'允许更大负偏差
      dim.lowerTol='-1';
      // 角度处理完直接return，不走后面的国标查表
      return;
    }
    // 如果是直径类型。直径有自己特殊的默认公差规则
    if(dim.type==='diameter'){
      // n：把标称值字符串转成数字。parseFloat失败返回NaN
      var n=parseFloat(dim.nominal);
      // 如果转换成功（不是NaN）

        if(n<10){
          // tolValue=0.1：±0.1mm。改0.1为0.05会让小直径更精密
          dim.tolValue=.1;
          // tolDisplay显示±0.1。改文字要同步改tolValue
          dim.tolDisplay='±0.1';
          // upperTol=+0.1：最大允许比标称大0.1mm
          dim.upperTol='+0.1';
          // lowerTol=-0.1：最小允许比标称小0.1mm
          dim.lowerTol='-0.1';
        }else{
          // 大直径用单边公差+0.5/0（只允许大，不允许小）
          // tolValue=0.5：公差带大小是0.5。改0.5为1.0会让大直径更宽松
          dim.tolValue=.5;
          // tolDisplay='+0.5/0'：表示上差+0.5，下差0
          dim.tolDisplay='+0.5/0';
          // upperTol=+0.5：最大比标称大0.5
          dim.upperTol='+0.5';
          // lowerTol='0'：最小就是标称值，不能小。改'0'为'-0.1'允许小一点
          dim.lowerTol='0';
        }
        // 直径的默认公差不是国标等级，所以tolGrade设为空
        dim.tolGrade='';
        // 处理完直接return
        return;
      }
    }
    // grade：从"未注公差"输入框解析精度等级(如'm')
    var grade=parseStdGrade();
    // 如果解析不到等级（如输入框为空），直接return不填公差

    // isR：是否是圆角或倒角类型。这两种类型查圆角公差表

    // tol：查国标公差表得到的数值。parseFloat把nominal转数字
    var tol=lookupGB(parseFloat(dim.nominal),grade,isR);
    // 如果查不到对应公差（尺寸超出表范围），直接return
    if(!tol)return;
    // tolValue：写入查到的公差数值。改这里会影响后续判定计算
    dim.tolValue=tol;
    // tolDisplay：显示为"±数值"。改拼接方式可换显示格式
    dim.tolDisplay='±'+tol;
    // tolGrade：记录使用的精度等级。显示在表格里
    dim.tolGrade=grade;
    // upperTol：上差写为+数值。改'+'为其他符号会改变显示
    dim.upperTol='+'+tol;
    // lowerTol：下差写为-数值
    dim.lowerTol='-'+tol;
  },
