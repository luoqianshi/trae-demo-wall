<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGIT OCR — 工程图纸数字识别</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;500;700&display=swap');

        :root {
            --bg: #0c0e14;
            --surface: #14171f;
            --surface-raised: #1c2030;
            --border: #2a2f40;
            --accent: #4af0c0;
            --accent-dim: #2a9070;
            --accent-glow: rgba(74, 240, 192, 0.12);
            --danger: #ff6b6b;
            --warn: #f0a04a;
            --text: #e8eaf0;
            --text-muted: #6b7394;
            --selection: rgba(74, 240, 192, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* ===== Layout ===== */
        .app {
            display: grid;
            grid-template-rows: 52px 1fr;
            grid-template-columns: 1fr 320px;
            height: 100vh;
        }

        /* ===== Header ===== */
        .header {
            grid-column: 1 / -1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 50;
        }

        .brand {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand .logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 13px;
            color: var(--bg);
            background: var(--accent);
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.04em;
        }

        .brand .sep {
            width: 1px;
            height: 20px;
            background: var(--border);
        }

        .brand .subtitle {
            color: var(--text-muted);
            font-size: 13px;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .page-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            padding-left: 12px;
            border-left: 1px solid var(--border);
        }

        .page-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            min-width: 56px;
            text-align: center;
        }

        /* ===== Buttons ===== */
        .btn {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 12px;
            font-weight: 500;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--surface-raised);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .btn:hover { border-color: var(--accent-dim); background: var(--accent-glow); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
        }

        .btn-accent {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            font-weight: 600;
        }

        .btn-accent:hover {
            background: #5cffd4;
            border-color: #5cffd4;
        }

        .btn-icon {
            width: 30px;
            height: 30px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        #fileInput { display: none; }

        /* ===== Canvas Area ===== */
        .canvas-area {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 25% 35%, rgba(74, 240, 192, 0.02) 0%, transparent 50%),
                var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .canvas-scroll {
            width: 100%;
            height: 100%;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
            box-shadow: 0 2px 40px rgba(0,0,0,0.5);
            flex-shrink: 0;
            margin: 24px;
        }

        #pdfCanvas {
            display: block;
            cursor: crosshair;
        }

        /* Selection */
        .sel-rect {
            position: absolute;
            border: 1.5px solid var(--accent);
            background: var(--selection);
            pointer-events: none;
            display: none;
            z-index: 10;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
        }

        .sel-rect.active { display: block; }

        .sel-rect .handle {
            position: absolute;
            width: 7px;
            height: 7px;
            background: var(--accent);
            border: 1px solid var(--bg);
            border-radius: 1px;
        }

        .sel-rect .handle.tl { top: -3px; left: -3px; }
        .sel-rect .handle.tr { top: -3px; right: -3px; }
        .sel-rect .handle.bl { bottom: -3px; left: -3px; }
        .sel-rect .handle.br { bottom: -3px; right: -3px; }

        .sel-size-tip {
            position: absolute;
            bottom: -22px;
            right: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--accent);
            background: var(--surface);
            padding: 1px 5px;
            border-radius: 2px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        /* Drop overlay */
        .drop-overlay {
            position: absolute;
            inset: 0;
            background: rgba(74, 240, 192, 0.06);
            border: 2px dashed var(--accent);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .drop-overlay.active { display: flex; }

        .drop-overlay span {
            font-size: 15px;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* Empty state */
        .empty-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
            z-index: 5;
        }

        .empty-state.hidden { display: none; }

        .empty-icon {
            width: 56px;
            height: 56px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 24px;
            opacity: 0.4;
        }

        .empty-state h2 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }

        .empty-state p {
            font-size: 12px;
            line-height: 1.7;
            max-width: 260px;
        }

        .empty-state .shortcut {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 16px;
            color: var(--text-muted);
        }

        /* Zoom bar */
        .zoom-bar {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: none;
            gap: 2px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px;
            z-index: 20;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .zoom-bar.visible { display: flex; }

        .zoom-bar .zbtn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        .zoom-bar .zbtn:hover { background: var(--surface-raised); }

        .zoom-bar .zlevel {
            display: flex;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 6px;
            min-width: 40px;
            justify-content: center;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel {
            padding: 16px 16px 14px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* Result card */
        .result-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }

        .result-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }

        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 600;
            color: var(--accent);
            word-break: break-all;
            line-height: 1.2;
            min-height: 40px;
            transition: color 0.2s;
        }

        .result-value.empty {
            color: var(--text-muted);
            font-size: 20px;
            font-weight: 400;
        }

        .result-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
        }

        .confidence-bar {
            display: inline-block;
            width: 50px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            vertical-align: middle;
        }

        .confidence-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .result-actions {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }

        .result-actions .btn { flex: 1; justify-content: center; }

        /* Preview */
        .preview-box {
            width: 100%;
            aspect-ratio: 2 / 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .preview-placeholder {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Settings */
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
        }

        .setting-row label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .setting-row select,
        .setting-row input[type="number"] {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 8px;
            border-radius: 4px;
            width: 90px;
            outline: none;
        }

        .setting-row select:focus,
        .setting-row input:focus {
            border-color: var(--accent-dim);
        }

        /* History */
        .history-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            transition: border-color 0.15s;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .history-item:hover { border-color: var(--accent-dim); }

        .history-item .h-index {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-muted);
            min-width: 18px;
        }

        .history-item .h-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item .h-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-muted);
        }

        .history-item .h-copy {
            font-size: 9px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 5px;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: transparent;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.15s;
        }

        .history-item .h-copy:hover {
            color: var(--accent);
            border-color: var(--accent-dim);
        }

        .history-empty {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            padding: 20px 0;
            opacity: 0.5;
        }

        /* Log */
        .log-scroll {
            max-height: 120px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding: 8px 16px;
        }

        .log-scroll .panel-title {
            margin-bottom: 6px;
        }

        .log-entry {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            line-height: 1.8;
            padding: 0;
        }

        .log-entry.ok { color: var(--accent); }
        .log-entry.err { color: var(--danger); }
        .log-entry.warn { color: var(--warn); }

        /* Status bar */
        .status-bar {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .status-dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        .status-dot.green { background: var(--accent); }
        .status-dot.yellow { background: var(--warn); animation: blink 1s infinite; }
        .status-dot.red { background: var(--danger); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Toast */
        .toast {
            position: fixed;
            top: 64px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: var(--surface-raised);
            border: 1px solid var(--accent-dim);
            color: var(--accent);
            font-size: 12px;
            padding: 8px 20px;
            border-radius: 6px;
            z-index: 200;
            opacity: 0;
            transition: all 0.25s ease;
            pointer-events: none;
            font-family: 'JetBrains Mono', monospace;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <span class="logo">DIGIT</span>
                <span class="sep"></span>
                <span class="subtitle">工程图纸数字识别</span>
            </div>
            <div class="toolbar">
                <button class="btn" id="btnOpen">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    打开 PDF
                </button>
                <input type="file" id="fileInput" accept=".pdf" />
                <div class="page-nav" id="pageNav" style="display:none;">
                    <button class="btn btn-icon btn-sm" id="btnPrev" title="上一页 (←)">‹</button>
                    <span class="page-info" id="pageInfo">1 / 1</span>
                    <button class="btn btn-icon btn-sm" id="btnNext" title="下一页 (→)">›</button>
                </div>
            </div>
        </header>

        <!-- Canvas -->
        <div class="canvas-area" id="dropZone">
            <div class="drop-overlay" id="dropOverlay"><span>释放文件以打开 PDF</span></div>

            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📐</div>
                <h2>打开工程图纸</h2>
                <p>将 PDF 文件拖放到此处<br>或点击上方「打开 PDF」按钮</p>
                <div class="shortcut">加载后框选数字区域即可识别</div>
            </div>

            <div class="canvas-scroll" id="canvasScroll" style="display:none;">
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="pdfCanvas"></canvas>
                    <div class="sel-rect" id="selRect">
                        <div class="handle tl"></div>
                        <div class="handle tr"></div>
                        <div class="handle bl"></div>
                        <div class="handle br"></div>
                        <div class="sel-size-tip" id="selTip"></div>
                    </div>
                </div>
            </div>

            <div class="zoom-bar" id="zoomBar">
                <button class="zbtn" id="zoomOut" title="缩小 (-)">−</button>
                <span class="zlevel" id="zoomLevel">100%</span>
                <button class="zbtn" id="zoomIn" title="放大 (+)">+</button>
                <button class="zbtn" id="zoomFit" title="适应窗口">⊡</button>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="panel">
                <div class="panel-title">识别结果</div>
                <div class="result-card">
                    <div class="result-label">数值</div>
                    <div class="result-value empty" id="resultValue">框选区域开始识别</div>
                    <div class="result-meta" id="resultMeta"></div>
                </div>
                <div class="result-actions">
                    <button class="btn btn-accent" id="btnCopy" disabled>复制结果</button>
                    <button class="btn" id="btnClear" disabled>清除</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">选区预览</div>
                <div class="preview-box" id="previewBox">
                    <span class="preview-placeholder">框选后显示预览</span>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">识别参数</div>
                <div class="setting-row">
                    <label>分段模式</label>
                    <select id="optPSM">
                        <option value="7">单行文本</option>
                        <option value="8">单词</option>
                        <option value="13" selected>原始行</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>放大倍数</label>
                    <select id="optScale">
                        <option value="1">1x</option>
                        <option value="2" selected>2x</option>
                        <option value="3">3x</option>
                        <option value="4">4x</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>二值化阈值</label>
                    <input type="number" id="optThresh" value="140" min="0" max="255" step="5" />
                </div>
                <div class="setting-row">
                    <label>反色处理</label>
                    <select id="optInvert">
                        <option value="0">关闭</option>
                        <option value="1">开启</option>
                    </select>
                </div>
            </div>

            <div class="history-scroll">
                <div class="panel-title">识别历史</div>
                <div id="historyList">
                    <div class="history-empty">暂无记录</div>
                </div>
            </div>

            <div class="log-scroll">
                <div class="panel-title">运行日志</div>
                <div id="logArea"></div>
            </div>

            <div class="status-bar">
                <span><span class="status-dot green" id="statusDot"></span><span id="statusText">就绪</span></span>
                <span style="font-family:'JetBrains Mono',monospace; font-size:9px;">Tesseract.js v5</span>
            </div>
        </aside>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function() {
        'use strict';

        // ===================== State =====================
        const state = {
            pdf: null,
            page: 1,
            total: 0,
            scale: 2.0,
            selecting: false,
            selStart: null,
            selEnd: null,
            history: [],
            ocrBusy: false
        };

        // ===================== DOM Refs =====================
        const $ = (s) => document.querySelector(s);
        const canvas = $('#pdfCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const selRect = $('#selRect');
        const selTip = $('#selTip');

        // ===================== PDF.js Init =====================
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // ===================== File Loading =====================
        $('#btnOpen').addEventListener('click', () => $('#fileInput').click());
        $('#fileInput').addEventListener('change', (e) => {
            if (e.target.files[0]) loadPDF(e.target.files[0]);
        });

        // Drag & drop
        const dropZone = $('#dropZone');
        let dragCounter = 0;

        dropZone.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            $('#dropOverlay').classList.add('active');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter <= 0) {
                dragCounter = 0;
                $('#dropOverlay').classList.remove('active');
            }
        });

        dropZone.addEventListener('dragover', (e) => e.preventDefault());

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            $('#dropOverlay').classList.remove('active');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                loadPDF(file);
            } else {
                toast('请拖放 PDF 文件');
            }
        });

        async function loadPDF(file) {
            log('加载: ' + file.name);
            setStatus('yellow', '加载中...');
            try {
                const buf = await file.arrayBuffer();
                state.pdf = await pdfjsLib.getDocument({ data: buf }).promise;
                state.total = state.pdf.numPages;
                state.page = 1;

                $('#emptyState').classList.add('hidden');
                $('#canvasScroll').style.display = '';
                $('#pageNav').style.display = '';
                $('#zoomBar').classList.add('visible');

                updatePageInfo();
                await renderPage();
                log(`加载成功，共 ${state.total} 页`, 'ok');
                setStatus('green', '就绪 — 框选数字区域');
            } catch (err) {
                log('加载失败: ' + err.message, 'err');
                setStatus('red', '加载失败');
                toast('PDF 加载失败');
            }
        }

        // ===================== Page Rendering =====================
        async function renderPage() {
            if (!state.pdf) return;
            const page = await state.pdf.getPage(state.page);
            const dpr = window.devicePixelRatio || 1;
            const viewport = page.getViewport({ scale: state.scale * dpr });

            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = (viewport.width / dpr) + 'px';
            canvas.style.height = (viewport.height / dpr) + 'px';

            await page.render({ canvasContext: ctx, viewport }).promise;
            updatePageInfo();
            hideSelection();
        }

        function updatePageInfo() {
            $('#pageInfo').textContent = `${state.page} / ${state.total}`;
            $('#zoomLevel').textContent = Math.round(state.scale * 100) + '%';
            $('#btnPrev').disabled = state.page <= 1;
            $('#btnNext').disabled = state.page >= state.total;
        }

        $('#btnPrev').addEventListener('click', () => {
            if (state.page > 1) { state.page--; renderPage(); }
        });

        $('#btnNext').addEventListener('click', () => {
            if (state.page < state.total) { state.page++; renderPage(); }
        });

        // ===================== Zoom =====================
        function setZoom(val) {
            state.scale = Math.max(0.3, Math.min(6, val));
            renderPage();
        }

        $('#zoomIn').addEventListener('click', () => setZoom(state.scale + 0.2));
        $('#zoomOut').addEventListener('click', () => setZoom(state.scale - 0.2));
        $('#zoomFit').addEventListener('click', () => {
            if (!state.pdf) return;
            state.pdf.getPage(state.page).then(page => {
                const vp = page.getViewport({ scale: 1 });
                const area = $('#canvasScroll');
                const fitScale = Math.min(
                    (area.clientWidth - 48) / vp.width,
                    (area.clientHeight - 48) / vp.height,
                    4
                );
                setZoom(fitScale);
            });
        });

        // ===================== Selection =====================
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: Math.max(0, Math.min(rect.width, e.clientX - rect.left)),
                y: Math.max(0, Math.min(rect.height, e.clientY - rect.top))
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!state.pdf || state.ocrBusy) return;
            e.preventDefault();
            state.selecting = true;
            state.selStart = getCanvasPos(e);
            state.selEnd = { ...state.selStart };
            selRect.classList.add('active');
            updateSelUI();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!state.selecting) return;
            state.selEnd = getCanvasPos(e);
            updateSelUI();
        });

        canvas.addEventListener('mouseup', () => {
            if (!state.selecting) return;
            state.selecting = false;
            const w = Math.abs(state.selEnd.x - state.selStart.x);
            const h = Math.abs(state.selEnd.y - state.selStart.y);
            if (w < 4 || h < 4) {
                hideSelection();
                return;
            }
            performOCR();
        });

        // Right-click to cancel selection
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            hideSelection();
        });

        function updateSelUI() {
            const x = Math.min(state.selStart.x, state.selEnd.x);
            const y = Math.min(state.selStart.y, state.selEnd.y);
            const w = Math.abs(state.selEnd.x - state.selStart.x);
            const h = Math.abs(state.selEnd.y - state.selStart.y);

            selRect.style.left = x + 'px';
            selRect.style.top = y + 'px';
            selRect.style.width = w + 'px';
            selRect.style.height = h + 'px';
            selTip.textContent = `${Math.round(w)}×${Math.round(h)}`;
        }

        function hideSelection() {
            selRect.classList.remove('active');
            state.selStart = null;
            state.selEnd = null;
        }

        // ===================== Image Preprocessing =====================
        function cropAndPreprocess() {
            const dpr = window.devicePixelRatio || 1;
            const scale = parseInt($('#optScale').value);
            const threshold = parseInt($('#optThresh').value);
            const invert = $('#optInvert').value === '1';

            const sx = Math.min(state.selStart.x, state.selEnd.x) * dpr;
            const sy = Math.min(state.selStart.y, state.selEnd.y) * dpr;
            const sw = Math.abs(state.selEnd.x - state.selStart.x) * dpr;
            const sh = Math.abs(state.selEnd.y - state.selStart.y) * dpr;

            const outW = Math.round(sw * scale);
            const outH = Math.round(sh * scale);

            // Crop & scale
            const off = document.createElement('canvas');
            off.width = outW;
            off.height = outH;
            const oc = off.getContext('2d', { willReadFrequently: true });

            // White background
            oc.fillStyle = '#fff';
            oc.fillRect(0, 0, outW, outH);

            // Smooth upscaling with imageSmoothingEnabled
            oc.imageSmoothingEnabled = true;
            oc.imageSmoothingQuality = 'high';
            oc.drawImage(canvas, sx, sy, sw, sh, 0, 0, outW, outH);

            // Binarize
            const imgData = oc.getImageData(0, 0, outW, outH);
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
                if (invert) gray = 255 - gray;
                const v = gray < threshold ? 0 : 255;
                d[i] = d[i+1] = d[i+2] = v;
                d[i+3] = 255;
            }
            oc.putImageData(imgData, 0, 0);

            // Update preview
            const preview = $('#previewBox');
            const img = new Image();
            img.src = off.toDataURL('image/png');
            preview.innerHTML = '';
            preview.appendChild(img);

            return off;
        }

        // ===================== OCR =====================
        async function performOCR() {
            if (state.ocrBusy) return;
            state.ocrBusy = true;

            const processed = cropAndPreprocess();
            const psm = $('#optPSM').value;

            setStatus('yellow', '识别中...');
            log(`OCR 开始 (PSM=${psm}, 缩放=${$('#optScale').value}x, 阈值=${$('#optThresh').value})`);
            const t0 = performance.now();

            try {
                const result = await Tesseract.recognize(processed, 'eng', {
                    tessedit_char_whitelist: '0123456789.',
                    tessedit_pageseg_mode: psm,
                    logger: (m) => {
                        if (m.status === 'recognizing text') {
                            setStatus('yellow', `识别中 ${Math.round(m.progress * 100)}%`);
                        }
                    }
                });

                const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
                let text = (result.data.text || '').trim();
                const conf = result.data.confidence;

                // Post-process: keep only digits and single dot
                text = text.replace(/[^0-9.]/g, '');
                text = text.replace(/^\.+|\.+$/g, '');
                // Keep only first valid number
                const match = text.match(/\d+\.?\d*/);
                text = match ? match[0] : '';

                // Update UI
                const valEl = $('#resultValue');
                if (text) {
                    valEl.textContent = text;
                    valEl.classList.remove('empty');
                    $('#resultMeta').innerHTML =
                        `置信度 ${conf.toFixed(1)}% <span class="confidence-bar"><span class="confidence-fill" style="width:${conf}%"></span></span> &nbsp;${elapsed}s`;
                    addHistory(text);
                    log(`识别成功: "${text}" (${conf.toFixed(1)}%, ${elapsed}s)`, 'ok');
                } else {
                    valEl.textContent = '未识别到数字';
                    valEl.classList.add('empty');
                    $('#resultMeta').innerHTML = `<span style="color:var(--warn)">${elapsed}s — 尝试调整参数</span>`;
                    log('未识别到数字，尝试调整阈值或缩放', 'warn');
                }

                $('#btnCopy').disabled = !text;
                $('#btnClear').disabled = false;
                setStatus('green', `完成 — ${elapsed}s`);

            } catch (err) {
                log('OCR 错误: ' + err.message, 'err');
                setStatus('red', '识别失败');
                toast('识别出错');
            }

            state.ocrBusy = false;
        }

        // ===================== Copy & Clear =====================
        $('#btnCopy').addEventListener('click', () => {
            const text = $('#resultValue').textContent;
            if (!text || text === '—' || text.includes('未识别')) return;
            navigator.clipboard.writeText(text).then(() => {
                toast('已复制: ' + text);
                log('复制: ' + text, 'ok');
            });
        });

        $('#btnClear').addEventListener('click', () => {
            $('#resultValue').textContent = '框选区域开始识别';
            $('#resultValue').classList.add('empty');
            $('#resultMeta').innerHTML = '';
            $('#previewBox').innerHTML = '<span class="preview-placeholder">框选后显示预览</span>';
            $('#btnCopy').disabled = true;
            $('#btnClear').disabled = true;
        });

        // ===================== History =====================
        function addHistory(value) {
            state.history.unshift({
                value,
                time: new Date()
            });
            if (state.history.length > 50) state.history.pop();
            renderHistory();
        }

        function renderHistory() {
            const el = $('#historyList');
            if (state.history.length === 0) {
                el.innerHTML = '<div class="history-empty">暂无记录</div>';
                return;
            }
            el.innerHTML = state.history.map((item, i) => `
                <div class="history-item">
                    <span class="h-index">${state.history.length - i}</span>
                    <span class="h-value" title="${item.value}">${item.value}</span>
                    <span class="h-time">${item.time.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
                    <button class="h-copy" data-val="${item.value}">复制</button>
                </div>
            `).join('');

            el.querySelectorAll('.h-copy').forEach(btn => {
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(btn.dataset.val).then(() => {
                        toast('已复制: ' + btn.dataset.val);
                    });
                });
            });
        }

        // ===================== Logging =====================
        function log(msg, type = '') {
            const el = $('#logArea');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            const ts = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
            entry.textContent = `[${ts}] ${msg}`;
            el.appendChild(entry);
            el.scrollTop = el.scrollHeight;
        }

        function setStatus(color, text) {
            $('#statusDot').className = 'status-dot ' + color;
            $('#statusText').textContent = text;
        }

        function toast(msg) {
            const el = $('#toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove('show'), 2000);
        }

        // ===================== Keyboard =====================
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

            if (e.key === 'ArrowLeft' && state.page > 1) {
                state.page--; renderPage();
            }
            if (e.key === 'ArrowRight' && state.page < state.total) {
                state.page++; renderPage();
            }
            if (e.key === '=' || e.key === '+') { e.preventDefault(); setZoom(state.scale + 0.2); }
            if (e.key === '-') { e.preventDefault(); setZoom(state.scale - 0.2); }
            if (e.key === '0') { e.preventDefault(); setZoom(2); }
            if (e.key === 'Escape') hideSelection();
        });

        // Prevent browser default drag behavior
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => e.preventDefault());

        // Init log
        log('应用已启动，等待加载 PDF 文件');

    })();
    </script>
</body>
</html>
