<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创客宝贝黑客松竞赛平台 · Agent开发能力挑战赛</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #151b2e;
    --bg3: #1e2942;
    --ink: #f1f5f9;
    --muted: #94a3b8;
    --rule: #2d3754;
    --accent: #38bdf8;
    --accent2: #f59e0b;
    --success: #22c55e;
    --danger: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.6; min-height: 100vh;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
  .hidden { display: none !important; }

  header {
    background: linear-gradient(135deg, rgba(15,23,42,0.9), rgba(30,41,66,0.9));
    border-bottom: 1px solid var(--rule); padding: 14px 0; position: sticky; top: 0;
    z-index: 100; backdrop-filter: blur(10px);
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-badge {
    width: 44px; height: 44px; border-radius: 10px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; color: #1f2937;
    box-shadow: 0 4px 12px rgba(245,158,11,0.3);
  }
  .logo-text h1 { font-size: 18px; font-weight: 700; }
  .logo-text p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .user-panel { display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .score-display {
    background: var(--bg3); padding: 8px 14px; border-radius: 8px;
    border: 1px solid var(--rule);
  }
  .score-display .num { font-size: 20px; font-weight: 800; color: var(--accent2); }

  nav { background: var(--bg2); padding: 12px 0; border-bottom: 1px solid var(--rule); margin-bottom: 24px; }
  .nav-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .nav-tabs button {
    padding: 10px 18px; background: transparent; border: 1px solid var(--rule);
    border-radius: 8px; color: var(--muted); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .nav-tabs button:hover { border-color: var(--accent); color: var(--ink); }
  .nav-tabs button.active { background: linear-gradient(135deg, #0ea5e9, #38bdf8); border-color: transparent; color: #fff; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--rule); border-radius: 12px; padding: 18px; transition: all 0.2s; }
  .stat-card:hover { border-color: var(--accent); }
  .stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 800; color: var(--ink); }
  .stat-card.highlight .value { color: var(--accent2); }
  .stat-card.success .value { color: var(--success); }

  .challenge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; margin-bottom: 32px; }
  .challenge-card {
    background: var(--bg2); border: 1px solid var(--rule); border-radius: 12px;
    padding: 20px; cursor: pointer; transition: all 0.2s;
  }
  .challenge-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 24px rgba(56,189,248,0.15); }
  .challenge-card.done { border-color: var(--success); }
  .challenge-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .challenge-title { font-size: 16px; font-weight: 700; }
  .difficulty { font-size: 12px; color: var(--accent2); font-weight: 600; }
  .challenge-desc { color: var(--muted); font-size: 13px; margin-bottom: 14px; min-height: 40px; }
  .challenge-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); }
  .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .status-badge.pending { background: rgba(148,163,184,0.15); color: var(--muted); border: 1px solid var(--rule); }
  .status-badge.done { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }

  .back-btn { background: transparent; border: 1px solid var(--rule); color: var(--ink); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 16px; }
  .back-btn:hover { border-color: var(--accent); }
  .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .detail-desc { color: var(--muted); margin-bottom: 20px; font-size: 14px; }
  .detail-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .detail-layout { grid-template-columns: 1fr; } }

  .panel { background: var(--bg2); border: 1px solid var(--rule); border-radius: 12px; padding: 20px; }
  .panel h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--accent); }
  .question-text { font-size: 13px; color: var(--ink); line-height: 1.8; white-space: pre-wrap; background: var(--bg); padding: 14px; border-radius: 8px; border: 1px solid var(--rule); margin-bottom: 16px; }
  .data-sample { font-family: 'SF Mono', Consolas, monospace; font-size: 11px; background: var(--bg); padding: 10px; border-radius: 6px; color: #a3a3a3; margin-top: 8px; border: 1px solid var(--rule); max-height: 280px; overflow-y: auto; white-space: pre-wrap; }
  textarea {
    width: 100%; min-height: 280px; background: var(--bg); border: 1px solid var(--rule);
    border-radius: 8px; padding: 14px; color: var(--ink); font-family: 'SF Mono', Consolas, monospace;
    font-size: 12.5px; line-height: 1.7; resize: vertical;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .input-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn { padding: 11px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #0ea5e9, #38bdf8); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(56,189,248,0.3); }
  .btn-secondary { background: var(--bg3); color: var(--ink); border: 1px solid var(--rule); }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

  .result-box { background: var(--bg); border: 1px solid var(--rule); border-radius: 10px; padding: 18px; margin-top: 16px; }
  .result-score { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .result-score .score-num { font-size: 44px; font-weight: 800; color: var(--accent2); }
  .result-score .score-max { font-size: 18px; color: var(--muted); }
  .result-msg { color: var(--ink); margin-bottom: 12px; font-size: 14px; }
  .result-detail { background: var(--bg2); padding: 10px 14px; border-radius: 6px; font-family: 'SF Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 2; }

  .leaderboard-wrap { background: var(--bg2); border: 1px solid var(--rule); border-radius: 12px; overflow: hidden; }
  .lb-header { padding: 18px 24px; background: var(--bg3); display: flex; justify-content: space-between; align-items: center; }
  .lb-header h2 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 12px 16px; text-align: left; font-size: 12px; color: var(--muted); background: var(--bg3); font-weight: 600; border-bottom: 1px solid var(--rule); }
  tbody td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--rule); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr.highlight { background: rgba(56,189,248,0.08); }
  tbody tr:hover { background: rgba(56,189,248,0.04); }
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; font-weight: 800; font-size: 13px; }
  .rank-1 { background: linear-gradient(135deg, #fcd34d, #f59e0b); color: #1f2937; }
  .rank-2 { background: linear-gradient(135deg, #d1d5db, #6b7280); color: #1f2937; }
  .rank-3 { background: linear-gradient(135deg, #fb923c, #ea580c); color: #fff; }
  .rank-other { background: var(--bg3); color: var(--muted); }
  .total-score { font-size: 16px; font-weight: 800; color: var(--accent2); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--rule); border-radius: 14px; padding: 32px; max-width: 480px; width: 100%; }
  .modal h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .modal .modal-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .modal label { display: block; font-size: 13px; color: var(--ink); margin-bottom: 8px; font-weight: 500; }
  .modal input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--rule); border-radius: 8px; color: var(--ink); font-size: 14px; }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .team-suggest { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .team-suggest button { padding: 6px 12px; font-size: 12px; background: var(--bg3); color: var(--muted); border: 1px solid var(--rule); border-radius: 6px; cursor: pointer; }
  .team-suggest button:hover { color: var(--accent); border-color: var(--accent); }
  .modal-footer { margin-top: 24px; display: flex; gap: 10px; justify-content: flex-end; }

  .hero-section {
    background: linear-gradient(135deg, rgba(30,41,66,0.6), rgba(15,23,42,0.6));
    border: 1px solid var(--rule); border-radius: 14px; padding: 36px;
    margin-bottom: 24px; position: relative; overflow: hidden;
  }
  .hero-section::before { content: ''; position: absolute; top: -50%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(56,189,248,0.1), transparent 70%); }
  .hero-section h2 { font-size: 26px; font-weight: 800; margin-bottom: 12px; position: relative; }
  .hero-section p { font-size: 15px; color: var(--muted); margin-bottom: 18px; max-width: 720px; position: relative; }
  .hero-features { display: flex; gap: 18px; flex-wrap: wrap; position: relative; }
  .hero-feature { font-size: 13px; color: var(--ink); display: flex; align-items: center; gap: 8px; background: var(--bg3); padding: 8px 14px; border-radius: 20px; border: 1px solid var(--rule); }
  .hero-feature .check { color: var(--success); font-weight: 800; }

  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap: 18px; }
  .info-card { background: var(--bg2); border: 1px solid var(--rule); border-radius: 12px; padding: 22px; }
  .info-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--accent); }
  .info-card ul { color: var(--muted); font-size: 13px; line-height: 2; padding-left: 18px; }

  .toast { position: fixed; top: 90px; right: 24px; padding: 14px 20px; background: var(--bg2); border: 1px solid var(--rule); border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 500; transform: translateX(120%); transition: transform 0.3s; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .toast.show { transform: translateX(0); }
  .toast.success { border-color: rgba(34,197,94,0.5); }
  .toast.error { border-color: rgba(239,68,68,0.5); }
  @media (max-width: 700px) { .logo-text p { display: none; } .hero-section { padding: 24px; } .hero-section h2 { font-size: 20px; } .stat-card .value { font-size: 22px; } }
</style>
</head>
<body>

<header>
  <div class="container header-inner">
    <div class="logo">
      <div class="logo-badge">🏆</div>
      <div class="logo-text">
        <h1>创客宝贝黑客松竞赛平台</h1>
        <p>Agent开发能力挑战赛 · 本地部署演示版</p>
      </div>
    </div>
    <div class="user-panel" id="user-panel" style="display:none">
      <span>队伍：<span id="top-team">—</span></span>
      <div class="score-display">总得分：<span class="num" id="top-score">0</span><span style="color:var(--muted);font-size:14px">/400</span></div>
      <button class="btn btn-secondary" style="padding:6px 12px;font-size:12px;background:transparent;cursor:pointer" onclick="logout()">退出</button>
    </div>
  </div>
</header>

<nav>
  <div class="container">
    <div class="nav-tabs">
      <button class="active" onclick="switchPage('home')" id="nav-home">🏠 首页</button>
      <button onclick="switchPage('challenges')" id="nav-ch">📝 题目列表</button>
      <button onclick="switchPage('leaderboard')" id="nav-lb">🏆 排行榜</button>
      <button onclick="switchPage('help')" id="nav-help">❓ 使用说明</button>
    </div>
  </div>
</nav>

<main class="container">
  <section id="page-home"></section>
  <section id="page-challenges" class="hidden"></section>
  <section id="page-detail" class="hidden"></section>
  <section id="page-leaderboard" class="hidden"></section>
  <section id="page-help" class="hidden"></section>
</main>

<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <h2>🎉 欢迎参加竞赛</h2>
    <p class="modal-sub">输入你的队伍名称，开始你的Agent开发挑战之旅</p>
    <label>队伍名称</label>
    <input type="text" id="team-input" placeholder="例如：飞鹰战队">
    <div class="team-suggest" id="team-suggest"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="login()">▶ 进入比赛</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
const CHALLENGES = [
  {
    id: 1, title: '智能信息提取与结构化', difficulty: '⭐⭐⭐', maxScore: 100,
    description: '从一篇手机横评文章中提取产品结构化信息（品牌、型号、处理器、运存、存储、价格、特色、客服）',
    articleText: `2024年度旗舰手机横评：谁才是真正的机皇？

开篇：今年旗舰手机市场群雄逐鹿。华为带着Mate 60 Pro强势回归，搭载自研麒麟9000S芯片，12GB大运存配合512GB存储空间，性能表现令人惊喜。苹果则推出了iPhone 15 Pro Max，A17 Pro芯片性能跑分依然领先，起步价9999元，256GB版本性价比一般。OPPO Find X7 Ultra天玑9300处理器加上16GB运存，256GB版本定价5999元，客服电话400-166-8888。

性能篇：小米14 Ultra搭载骁龙8 Gen3处理器，16GB运存+1TB存储，起售价5999元，徕卡Summilux光学镜头，客服热线400-100-5678。三星Galaxy S24 Ultra，12GB运存搭配256GB存储，内置Galaxy AI智能助手，S Pen手写笔。vivo X100 Pro搭载天玑9300处理器，16GB大运存，256GB存储空间，蔡司T*镀膜镜头，起售价4999元。

续航与影像：荣耀Magic6 Pro主打5600mAh大电池+青海湖电池技术，骁龙8 Gen3处理器，起售价4999元，鹰眼抓拍系统是一大特色。一加12同样配备哈苏影像系统，加上5400mAh电池和100W快充，骁龙8 Gen3+16GB+256GB版本售价4799元。真我GT5 Pro以3299元的价格冲击市场，天玑9300+16GB+256GB组合，IMX890主摄+5000mAh电池，客服400-900-9999。iQOO 12 Pro凭借骁龙8 Gen3的出色调校，200W超快闪充是亮点，16GB+256GB版本4999元，客服400-678-9688。

注意：文章中有些产品并未提到所有字段（例如三星未提处理器、部分产品未提客服电话等），你的Agent应如实填写文章中的信息，未提及的字段填 null。编造缺失字段会被扣分。`,
    starterCode: `# 你的Agent伪代码示例
article = read_file("article.txt")
products = []
for brand in extract_brands(article):
    info = {
        "brand": brand.name,
        "model": brand.model,
        "processor": brand.processor or null,
        "ram": brand.ram or null,
        "storage": brand.storage or null,
        "price": brand.price or null,
        "features": brand.features,
        "contact": brand.contact or null
    }
    products.append(info)
submit(products)`,
    answerExample: `[\n  {"brand":"华为","model":"Mate 60 Pro","processor":"麒麟9000S","ram":"12GB","storage":"512GB","price":6999,"features":["卫星通信","昆仑玻璃"],"contact":null}\n]`,
    hint: '📌 提示：应提取6款产品（华为/苹果/小米/三星/OPPO/vivo），缺失字段填null，features为数组，price为数字。',
    expected: [
        {brand:"华为", model:"Mate 60 Pro", processor:"麒麟9000S", ram:"12GB", storage:"512GB", price:6999, features_len:2, contact:null},
        {brand:"苹果", model:"iPhone 15 Pro Max", processor:"A17 Pro", ram:null, storage:"256GB", price:9999, features_len:2, contact:null},
        {brand:"小米", model:"14 Ultra", processor:"骁龙8 Gen3", ram:"16GB", storage:"1TB", price:5999, features_len:1, contact:"400-100-5678"},
        {brand:"三星", model:"Galaxy S24 Ultra", processor:null, ram:"12GB", storage:"256GB", price:null, features_len:2, contact:null},
        {brand:"OPPO", model:"Find X7 Ultra", processor:"天玑9300", ram:"16GB", storage:"256GB", price:5999, features_len:1, contact:"400-166-8888"},
        {brand:"vivo", model:"X100 Pro", processor:"天玑9300", ram:"16GB", storage:"256GB", price:4999, features_len:2, contact:null}
    ]
  },
  {
    id: 2, title: '数据分析推理', difficulty: '⭐⭐⭐⭐', maxScore: 100,
    description: '分析一份班级学期成绩数据，回答2道数据分析题（每题50分）',
    csvSample: `姓名,班级,语文,数学,英语,物理,化学\n张三,一班,88,92,85,78,82\n李四,一班,76,85,90,88,72\n王五,一班,92,78,88,70,85\n赵六,一班,85,95,92,65,88\n钱七,一班,78,70,75,80,78\n孙八,二班,90,88,85,92,80\n周九,二班,85,95,90,88,85\n吴十,二班,88,90,92,85,90\n郑十一,二班,92,95,88,90,88\n王十二,二班,85,80,85,78,82\n冯十三,三班,88,92,90,85,88\n陈十四,三班,92,95,88,90,92\n褚十五,三班,85,88,92,88,85\n卫十六,三班,90,92,95,92,90\n蒋十七,三班,88,90,88,85,88`,
    questions: `📌 本次评分题目（每题50分）：\n题目7：各班数学成绩标准差分别是多少？（保留2位小数，误差±0.5）\n题目10：语文成绩前5名中，数学也进入前5的有几人？（输出：一个数字）`,
    starterCode: `# 你的Agent伪代码示例\ndf = parse_csv("grades.csv")\nq7 = {"一班":round(df[班级=="一班"].数学.std(),2), "二班":round(df[班级=="二班"].数学.std(),2), "三班":round(df[班级=="三班"].数学.std(),2)}\nq10 = count_students_in_both_top5(df)\nsubmit({7: q7, 10: q10})`,
    answerExample: `{\n  "7": {"一班": 9.47, "二班": 5.37, "三班": 2.68},\n  "10": 4\n}`,
    hint: '📌 提示：答案必须是JSON对象，包含key "7"和"10"。',
    expectedQ7: {一班:9.47, 二班:5.37, 三班:2.68}, expectedQ10: 4
  },
  {
    id: 3, title: '竞品分析报告生成', difficulty: '⭐⭐⭐⭐', maxScore: 100,

// === 评分引擎 ===
function evaluate(id, text) {
  if (id === 1) {
    try {
      const arr = typeof text === 'string' ? JSON.parse(text) : text;
      if (!Array.isArray(arr) || arr.length === 0) return {score:0,maxScore:100,message:'答案必须是JSON数组',detail:''};
      let total = 0, details = [];
      const correctItems = CHALLENGES[0].expected;
      for (const correct of correctItems) {
        const st = arr.find(a => a.model === correct.model || a.brand === correct.brand);
        if (!st) { details.push(`✗ 未找到${correct.brand}的条目`); continue; }
        let itemScore = 0;
        for (const key of ['brand','model','processor','ram','storage','price','contact']) {
          const sv = st[key], cv = correct[key];
          if (sv === null && cv === null) { itemScore += 1; }
          else if (cv === null && sv !== null && sv !== undefined && sv !== '') {
            itemScore -= 1.5; details.push(`✗ 编造字段：${correct.model}的${key}应为null`);
          } else if (cv !== null && (sv === null || sv === undefined)) { itemScore -= 0.3; }
          else if (typeof cv === 'number' && typeof sv === 'number' && Math.abs(cv-sv) < 1) itemScore += 1;
          else if (String(cv).trim() === String(sv).trim()) itemScore += 1;
        }
        if (Array.isArray(st.features) && st.features.length >= correct.features_len) itemScore += 1;
        total += itemScore;
      }
      const score = Math.max(0, Math.min(100, Math.round(total / (correctItems.length * 8) * 100)));
      return {score, maxScore:100, message:`找到有效条目，获得${score}分`, detail: details.join('\n') || '条目基本正确'};
    } catch(e) { return {score:0,maxScore:100,message:'JSON解析失败，请检查语法',detail:'错误信息：'+e.message}; }
  }
  if (id === 2) {
    try {
      const obj = typeof text === 'string' ? JSON.parse(text) : text;
      let score = 0, details = [];
      if (obj['7'] && typeof obj['7'] === 'object') {
        let q7OK = true;
        for (const k of ['一班','二班','三班']) {
          if (typeof obj['7'][k] !== 'number' || Math.abs(obj['7'][k]-CHALLENGES[1].expectedQ7[k]) > 0.8) q7OK = false;
        }
        if (q7OK) { score += 50; details.push('题目7：✓ 50分'); }
        else details.push('题目7：✗ 标准差计算偏差较大');
      }
      if (typeof obj['10'] === 'number' && obj['10'] === CHALLENGES[1].expectedQ10) { score += 50; details.push('题目10：✓ 50分'); }
      else if (String(obj['10']) === String(CHALLENGES[1].expectedQ10)) { score += 50; details.push('题目10：✓ 50分'); }
      else details.push(`题目10：答案应为${CHALLENGES[1].expectedQ10}`);
      return {score, maxScore:100, message: score>=80?'表现优秀！':'部分题目正确', detail: details.join('\n')};
    } catch(e) { return {score:0,maxScore:100,message:'JSON解析失败',detail:e.message}; }
  }
  if (id === 3) {
    try {
      const obj = typeof text === 'string' ? JSON.parse(text) : text;
      let score = 0, details = [];
      const exp = CHALLENGES[2].expectedBest;
      ['best_performance','best_battery','best_camera','best_value'].forEach(key => {
        const v = obj[key];
        if (typeof v === 'string' && v.replace(/\s+/g,'') === exp[key].replace(/\s+/g,'')) { score += 5; details.push(`${key}: ✓ "${v}" +5`); }
        else details.push(`${key}: ✗ 你填"${v}"，应为"${exp[key]}"`);
      });
      if (String(obj.recommendation).replace(/\s+/g,'') === exp.recommendation.replace(/\s+/g,'')) { score += 10; details.push(`recommendation: ✓ +10`); }
      else details.push(`recommendation: ✗ 应为"${exp.recommendation}"`);
      if (Array.isArray(obj.comparison_table)) {
        for (const row of obj.comparison_table) {
          if (row && typeof row.型号 === 'string') score += 5;
          if (row && typeof row.性能排名 === 'number') score += 5;
          if (row && typeof row.续航排名 === 'number') score += 5;
          if (row && typeof row.拍照排名 === 'number') score += 5;
          if (row && typeof row.性价比排名 === 'number') score += 5;
        }
        details.push(`对比表格：已检测${obj.comparison_table.length}行数据`);
      }
      score = Math.min(100, score);
      return {score, maxScore:100, message: score>=80?'分析精准！':'部分维度判断正确', detail: details.join('\n')};
    } catch(e) { return {score:0,maxScore:100,message:'JSON解析失败',detail:e.message}; }
  }
  if (id === 4) {
    const ts = /\bdef\s+two_sum\b/i.test(text);
    const ip = /\bdef\s+is_palindrome\b/i.test(text);
    let score = 0, details = [];
    if (ts) {
      if (/\{\s*\[|num_map|hash|map\[|for\s+.+in\s+[\s\S]*return\s+[\s\S]*\[/i.test(text)) { score += 50; details.push('two_sum: ✓ 合理实现 +50'); }
      else if (/for/.test(text)) { score += 25; details.push('two_sum: 基础循环实现 +25'); }
      else { score += 10; details.push('two_sum: 仅定义函数 +10'); }
    } else details.push('two_sum: ✗ 未找到函数定义');
    if (ip) {
      if (/<\s*0.*return.*False|negative|\[::?-?1\]|reversed|reverse/i.test(text)) { score += 50; details.push('is_palindrome: ✓ 负数判断+字符串反转 +50'); }
      else if (/\[::?-?1\]|str\s*\(.*\)\s*==|reversed/i.test(text)) { score += 35; details.push('is_palindrome: 有字符串反转逻辑 +35'); }
      else { score += 15; details.push('is_palindrome: 仅定义函数 +15'); }
    } else details.push('is_palindrome: ✗ 未找到函数定义');
    score = Math.min(100, score);
    return {score, maxScore:100, message: score>=80?'代码质量优秀！':'函数定义存在，可继续完善', detail: details.join('\n')};
  }
  return {score:0, maxScore:100, message:'未知题目', detail:''};
}

// === 排行榜 ===
function renderLeaderboard() {
  const tbodyHTML = Object.entries(state.scores).map(([team,s])=>({team,t:(s[1]||0)+(s[2]||0)+(s[3]||0)+(s[4]||0),s1:s[1]||0,s2:s[2]||0,s3:s[3]||0,s4:s[4]||0})).sort((a,b)=>b.t-a.t).map((r,i)=>{
    let badge = `<span class="rank-badge rank-other">${i+1}</span>`;
    if (i===0) badge = '<span class="rank-badge rank-1">1</span>';
    else if (i===1) badge = '<span class="rank-badge rank-2">2</span>';
    else if (i===2) badge = '<span class="rank-badge rank-3">3</span>';
    const hi = state.currentTeam===r.team ? ' class="highlight"' : '';
    return `<tr${hi}><td>${badge}${state.currentTeam===r.team?'<span style="color:var(--accent);font-size:11px;margin-left:6px">你</span>':''}</td><td style="font-weight:600">${r.team}</td><td style="text-align:center">${r.s1}</td><td style="text-align:center">${r.s2}</td><td style="text-align:center">${r.s3}</td><td style="text-align:center">${r.s4}</td><td style="text-align:center" class="total-score">${r.t}</td></tr>`;
  }).join('');
  document.getElementById('page-leaderboard').innerHTML = `<h2 style="font-size:22px;margin-bottom:8px">🏆 实时排行榜</h2><p style="color:var(--muted);font-size:14px;margin-bottom:20px">每5秒自动刷新 · 你的队伍用蓝色高亮显示</p><div class="leaderboard-wrap"><div class="lb-header"><h2>🏆 Agent开发能力挑战赛 · 总排名</h2><span style="font-size:12px;color:var(--muted)">实时更新</span></div><div style="overflow-x:auto"><table><thead><tr><th>排名</th><th>队伍</th><th style="text-align:center">题目1</th><th style="text-align:center">题目2</th><th style="text-align:center">题目3</th><th style="text-align:center">题目4</th><th style="text-align:center">总分</th></tr></thead><tbody>${tbodyHTML}</tbody></table></div></div><p style="color:var(--muted);font-size:13px;margin-top:16px">💡 提示：演示版内置了多支队伍的模拟数据。你可以在题目列表页提交答案，查看你的排名实时变化！</p>`;
}

// === Toast ===
function showToast(msg, type) { const t = document.getElementById('toast'); document.getElementById('toast-msg').textContent = msg; t.className = 'toast ' + (type||'info'); setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>t.classList.remove('show'),3500); }
renderHomeStats();
