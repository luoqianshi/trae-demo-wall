<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Prompt</h1>
      <div class="header-actions">
        <a id="githubLink" href="https://github.com/hetaoist/ai-prompt-manager" target="_blank" class="btn btn-icon github-link" title="GitHub">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
        <button id="configBtn" class="btn btn-icon" title="导入导出">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </button>
        <button id="aiGenerateBtn" class="btn btn-icon" title="AI 生成提示词">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </button>
        <button id="settingsBtn" class="btn btn-icon" title="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="addPromptBtn" class="btn btn-primary" title="添加新提示词">+</button>
      </div>
    </header>

    <!-- Search and Filter -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索..." class="search-input">
      <select id="categoryFilter" class="category-select">
        <option value="">全部分类</option>
      </select>
    </div>

    <!-- Prompt List -->
    <div id="promptList" class="prompt-list">
      <!-- Prompts will be dynamically loaded here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <p>暂无提示词</p>
      <p>点击 + 按钮添加，或使用 AI 生成</p>
    </div>

    <!-- Add/Edit Modal -->
    <div id="promptModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">添加提示词</h2>
          <button id="closeModal" class="close-btn">&times;</button>
        </div>
        <form id="promptForm">
          <div class="form-group">
            <label for="promptTitle">标题</label>
            <input type="text" id="promptTitle" required placeholder="输入标题">
          </div>
          <div class="form-group">
            <label for="promptCategory">分类</label>
            <div class="category-input-group">
              <select id="promptCategory">
                <option value="">选择分类</option>
              </select>
              <input type="text" id="newCategory" placeholder="新分类" style="display: none;">
              <button type="button" id="toggleCategoryBtn" class="btn btn-small">新建</button>
            </div>
          </div>
          <div class="form-group">
            <label for="promptContent">提示词</label>
            <textarea id="promptContent" class="auto-resize" required placeholder="输入提示词内容..."></textarea>
          </div>
          <div class="form-actions">
            <button type="button" id="cancelBtn" class="btn btn-secondary">取消</button>
            <button type="submit" class="btn btn-save">保存</button>
          </div>
        </form>
      </div>
    </div>

    <!-- AI Generate Modal -->
    <div id="aiGenerateModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2>AI 生成提示词 <span id="aiConfigStatus" class="ai-config-status" style="display: none;"></span></h2>
          <button id="closeAiGenerate" class="close-btn">&times;</button>
        </div>
        <div class="ai-generate-content">
          <div class="ai-config-section" id="aiConfigSection">
            <div class="ai-config-header">
              <span class="ai-config-title">AI 配置</span>
              <button id="toggleAiConfig" class="btn btn-small">展开</button>
            </div>
            <div class="ai-config-body" id="aiConfigBody" style="display: none;">
              <div class="form-group">
                <label>API 提供商</label>
                <select id="aiProvider" class="ai-select">
                  <option value="openai">OpenAI</option>
                  <option value="anthropic">Anthropic (Claude)</option>
                  <option value="deepseek">DeepSeek</option>
                  <option value="qwen">通义千问 (Qwen)</option>
                  <option value="doubao">豆包 (Doubao)</option>
                  <option value="zhipu">智谱 (GLM)</option>
                  <option value="moonshot">Moonshot (Kimi)</option>
                  <option value="yi">零一万物 (Yi)</option>
                  <option value="baichuan">百川 (Baichuan)</option>
                  <option value="stepfun">阶跃星辰 (Step)</option>
                  <option value="minimax">MiniMax</option>
                  <option value="custom">自定义</option>
                </select>
              </div>
              <div class="form-group">
                <label>模型</label>
                <div class="model-input-group">
                  <select id="aiModel" class="ai-select">
                    <!-- Options loaded dynamically -->
                  </select>
                  <input type="text" id="customModelInput" placeholder="输入自定义模型ID" style="display: none;">
                  <button type="button" id="toggleModelInput" class="btn btn-small">自定义</button>
                </div>
                <p class="form-hint" id="modelHint">选择预设模型或输入自定义模型ID</p>
              </div>
              <div class="form-group">
                <label>Base URL</label>
                <input type="text" id="customBaseUrl" placeholder="选择提供商后自动填充">
              </div>
              <div class="form-group">
                <label>API Key</label>
                <input type="password" id="aiApiKey" placeholder="输入你的 API Key">
                <p class="form-hint">API Key 仅存储在本地，不会上传到任何服务器</p>
              </div>
              <button id="saveAiConfig" class="btn btn-save">保存配置</button>
            </div>
          </div>
          
          <div class="ai-generate-section">
            <div class="form-group">
              <label>描述你的需求</label>
              <textarea id="aiGenerateInput" class="auto-resize" placeholder="例如：帮我写一个用于代码审查的提示词，要求指出潜在问题并提供优化建议..."></textarea>
            </div>
            <button id="generatePromptBtn" class="btn btn-save btn-full btn-generate">
              <span class="generate-text">生成提示词</span>
              <span class="generating-text" style="display: none;">生成中...</span>
            </button>
          </div>

          <div class="ai-result-section" id="aiResultSection" style="display: none;">
            <div class="form-group">
              <label>生成结果</label>
              <textarea id="aiGenerateResult" class="auto-resize" readonly></textarea>
            </div>
            <div class="ai-result-actions">
              <button id="regenerateBtn" class="btn btn-secondary">重新生成</button>
              <button id="usePromptBtn" class="btn btn-save">使用此提示词</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2>设置</h2>
          <button id="closeSettings" class="close-btn">&times;</button>
        </div>
        <div class="settings-content">
          <div class="settings-section">
            <h3>分类管理</h3>
            <p class="settings-hint">拖拽调整顺序，删除不需要的分类</p>
            <div id="categoryList" class="category-list">
              <!-- Categories will be loaded here -->
            </div>
            <div class="add-site-form">
              <input type="text" id="newCategoryInput" placeholder="输入新分类名称">
              <button id="addCategoryBtn" class="btn btn-small">添加</button>
            </div>
          </div>
          <div class="settings-divider"></div>
          <div class="settings-section">
            <h3>悬浮图标显示网站</h3>
            <p class="settings-hint">在以下网站的页面上显示悬浮图标</p>
            <div id="siteList" class="site-list">
              <!-- Sites will be loaded here -->
            </div>
            <div class="add-site-form">
              <input type="text" id="newSiteInput" placeholder="输入网站域名，如: claude.ai">
              <button id="addSiteBtn" class="btn btn-small">添加</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Config Import/Export Modal -->
    <div id="configModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2>导入导出配置</h2>
          <button id="closeConfig" class="close-btn">&times;</button>
        </div>
        <div class="config-content">
          <div class="config-section">
            <h3>导出配置</h3>
            <p class="settings-hint">将所有提示词、分类、网站设置和AI配置导出为备份文件</p>
            <button id="exportConfigBtn" class="btn btn-save btn-full">导出配置文件</button>
          </div>
          <div class="config-divider"></div>
          <div class="config-section">
            <h3>导入配置</h3>
            <p class="settings-hint">从备份文件导入配置，<strong>这将覆盖当前所有数据</strong></p>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
            <button id="importConfigBtn" class="btn btn-secondary btn-full">选择配置文件</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast" style="display: none;"></div>
  </div>

  <!-- Tooltip container (outside .container to avoid overflow clipping) -->
  <div id="promptTooltip" class="prompt-tooltip" style="display: none;"></div>

  <script src="popup.js"></script>
</body>
</html>
