<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃什么选择器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        /* 转盘容器 */
        .wheel-container {
            position: relative;
            width: 360px;
            height: 360px;
            margin: 20px auto;
        }

        /* 转盘 */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #333;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .wheel.spinning {
            transition: transform 6s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* 转盘SVG文字样式 */
        .wheel text {
            font-size: 11px;
            font-weight: bold;
            fill: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }

        /* 转盘中心按钮 */
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 50%;
            border: 4px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.5);
            transition: transform 0.2s;
        }

        .wheel-center:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .wheel-center:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .wheel-center::before {
            content: '';
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
        }

        /* 指针 */
        .pointer {
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff6b6b;
            z-index: 5;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .pointer::after {
            content: '';
            position: absolute;
            top: -28px;
            left: -18px;
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 30px solid rgba(0,0,0,0.2);
        }

        /* 结果显示 */
        .result-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #food-result {
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .category-selector {
            margin-bottom: 20px;
        }

        .category-selector label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: bold;
        }

        .category-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .category-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .hint-text {
            color: #999;
            font-size: 14px;
            margin-top: 15px;
        }

        .history-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .history-section h3 {
            color: #555;
            margin-bottom: 15px;
        }

        #history-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        #history-list li {
            background: #f5f5f5;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 吃什么选择器</h1>
        <p class="subtitle">解决当代人不知道吃什么的终极难题</p>

        <div class="category-selector">
            <label for="category">选择分类（可选）：</label>
            <select id="category">
                <option value="all">全部美食</option>
                <option value="中式快餐">中式快餐</option>
                <option value="西式快餐">西式快餐</option>
                <option value="日韩料理">日韩料理</option>
                <option value="东南亚料理">东南亚料理</option>
                <option value="特色小吃">特色小吃</option>
                <option value="饮品甜点">饮品甜点</option>
                <option value="健康轻食">健康轻食</option>
                <option value="狒狒">狒狒</option>
            </select>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <svg class="wheel" id="wheel" viewBox="0 0 360 360"></svg>
            <div class="wheel-center" id="spin-btn"></div>
        </div>4

        <div class="result-display" id="result-display">
            <div id="food-result">点击转盘开始选择</div>
        </div>
        <p class="hint-text">点击按钮开始选择</p>

        <div class="history-section">
            <h3>🕐 历史选择</h3>
            <ul id="history-list"></ul>
        </div>
    </div>

    <script>
        const foodCategories = {
            "中式快餐": ["黄焖鸡米饭", "沙县小吃", "兰州拉面", "桂林米粉", "酸辣粉", "麻辣烫", "麻辣香锅", "冒菜", "火锅", "串串香", "炒饭", "炒面", "水饺", "馄饨", "包子", "煎饼果子", "手抓饼", "肉夹馍", "凉皮", "豆腐脑"],
            "西式快餐": ["汉堡", "炸鸡", "披萨", "牛排", "意大利面", "沙拉", "三明治", "薯条", "蛋挞", "冰淇淋"],
            "日韩料理": ["寿司", "刺身", "拉面", "乌冬面", "天妇罗", "石锅拌饭", "炸鸡", "部队火锅", "冷面", "紫菜包饭"],
            "东南亚料理": ["咖喱饭", "冬阴功汤", "越南河粉", "海南鸡饭", "肉骨茶"],
            "特色小吃": ["烧烤", "小龙虾", "臭豆腐", "螺蛳粉", "烤冷面", "章鱼小丸子", "关东煮", "烤串", "锅贴"],
            "饮品甜点": ["奶茶", "咖啡", "果汁", "蛋糕", "甜品"],
            "健康轻食": ["轻食沙拉", "健身餐", "减脂餐", "鸡胸肉套餐", "杂粮饭"],
            "狒狒": ["鸡柳大人","千层","三元鲜培","果切","肯德基","麦当劳","萨莉亚","牛爷烧","猪脚饭","螺蛳粉","罗森","牛奶"]
        };

        const wheelColors = [
            '#ff6b6b', '#ee5a5a', '#fd79a8', '#a29bfe',
            '#6c5ce7', '#0984e3', '#00cec9', '#00b894',
            '#fdcb6e', '#e17055', '#fd79a8', '#6c5ce7'
        ];

        const allFoods = [].concat(...Object.values(foodCategories));
        let currentFoods = allFoods;
        let history = [];
        let isSpinning = false;
        let currentRotation = 0; // 记录当前累计旋转角度

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spin-btn');
        const foodResult = document.getElementById('food-result');
        const categorySelect = document.getElementById('category');

        function initWheel(foods) {
            wheel.innerHTML = '';

            const segmentCount = Math.min(foods.length, 12);
            const angle = 360 / segmentCount;
            const radius = 172;
            const centerX = 180;
            const centerY = 180;

            for (let i = 0; i < segmentCount; i++) {
                const startAngle = (i * angle - 90) * Math.PI / 180;
                const endAngle = ((i + 1) * angle - 90) * Math.PI / 180;

                const x1 = centerX + radius * Math.cos(startAngle);
                const y1 = centerY + radius * Math.sin(startAngle);
                const x2 = centerX + radius * Math.cos(endAngle);
                const y2 = centerY + radius * Math.sin(endAngle);

                const largeArcFlag = angle > 180 ? 1 : 0;
                const pathD = `M ${centerX} ${centerY} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;

                // 创建扇形路径
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathD);
                path.setAttribute('fill', wheelColors[i % wheelColors.length]);
                wheel.appendChild(path);

                // 创建SVG文字元素（固定在扇形上）
                const midAngle = (startAngle + endAngle) / 2;
                const textRadius = radius * 0.65;
                const textX = centerX + textRadius * Math.cos(midAngle);
                const textY = centerY + textRadius * Math.sin(midAngle);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', textX);
                text.setAttribute('y', textY);
                text.setAttribute('fill', 'white');
                text.setAttribute('font-size', '11');
                text.setAttribute('font-weight', 'bold');
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.textContent = foods[i];

                wheel.appendChild(text);
            }
        }

        spinBtn.addEventListener('click', function() {
            if (isSpinning) return;

            isSpinning = true;
            foodResult.textContent = '转盘中...';

            const minRotation = 1080;
            const randomRotation = Math.random() * 1080;
            const addRotation = minRotation + randomRotation;
            currentRotation += addRotation;

            wheel.classList.add('spinning');
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(function() {
                wheel.classList.remove('spinning');

                const rotation = currentRotation % 360;
                const segmentCount = Math.min(currentFoods.length, 12);
                const segmentAngle = 360 / segmentCount;

                // 计算指针指向的扇形索引
                const pointerAngle = (360 - rotation + segmentAngle / 2) % 360;
                let selectedIndex = Math.floor(pointerAngle / segmentAngle) % segmentCount;

                const selectedFood = currentFoods[selectedIndex];
                foodResult.textContent = `🎉 ${selectedFood}`;

                history.unshift(selectedFood);
                if (history.length > 5) history.pop();
                updateHistory();

                isSpinning = false;
            }, 6000);
        });

        categorySelect.addEventListener('change', function() {
            currentFoods = this.value === 'all' ? allFoods : (foodCategories[this.value] || allFoods);
            initWheel(currentFoods);
            foodResult.textContent = '点击转盘开始选择';
        });

        function updateHistory() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = history.map(food => `<li>${food}</li>`).join('');
        }

        initWheel(currentFoods);
    </script>
</body>
</html>
