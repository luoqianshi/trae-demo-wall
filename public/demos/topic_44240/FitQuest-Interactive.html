<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitQuest 健身勇者 - 游戏化健身打卡</title>
<style>
  :root {
    --primary: #667eea;
    --primary-dark: #764ba2;
    --accent: #f5576c;
    --accent-light: #f093fb;
    --success: #43e97b;
    --warning: #ffd166;
    --bg: #0f0f23;
    --card-bg: rgba(255,255,255,0.07);
    --card-border: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --text-dim: #a0a0b8;
    --glass: rgba(20, 20, 40, 0.75);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Animated background particles */
  .bg-particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .particle {
    position: absolute; width: 4px; height: 4px; background: rgba(102,126,234,0.4);
    border-radius: 50%; animation: float 15s infinite ease-in-out;
  }
  @keyframes float {
    0%,100% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  .app-container {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto; padding: 20px;
    min-height: 100vh;
  }

  /* Header */
  .app-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 24px; margin-bottom: 20px;
    background: var(--glass); backdrop-filter: blur(20px);
    border: 1px solid var(--card-border); border-radius: 16px;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--accent-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-icon { font-size: 28px; -webkit-text-fill-color: initial; }
  .header-actions { display: flex; gap: 10px; }

  /* Buttons */
  .btn {
    padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer;
    font-size: 14px; font-weight: 600; transition: all 0.3s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; box-shadow: 0 4px 15px rgba(102,126,234,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
  .btn-accent {
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    color: white; box-shadow: 0 4px 15px rgba(245,87,108,0.4);
  }
  .btn-accent:hover { transform: translateY(-2px); }
  .btn-ghost {
    background: rgba(255,255,255,0.08); color: var(--text-dim);
    border: 1px solid var(--card-border);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.15); color: var(--text); }
  .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 8px; }

  /* Main grid */
  .main-grid {
    display: grid; grid-template-columns: 320px 1fr; gap: 20px;
  }
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Cards */
  .card {
    background: var(--glass); backdrop-filter: blur(20px);
    border: 1px solid var(--card-border); border-radius: 16px;
    padding: 24px; margin-bottom: 20px;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .card-title {
    font-size: 18px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .card-title .icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }

  /* Hero Card */
  .hero-card { text-align: center; padding: 28px; }
  .hero-avatar {
    width: 90px; height: 90px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; margin: 0 auto 16px;
    box-shadow: 0 8px 30px rgba(102,126,234,0.4);
    border: 3px solid rgba(255,255,255,0.2);
    position: relative;
  }
  .hero-avatar .level-badge {
    position: absolute; bottom: -4px; right: -4px;
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    color: white; font-size: 12px; font-weight: 700;
    padding: 2px 10px; border-radius: 12px; border: 2px solid var(--bg);
  }
  .hero-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .hero-class {
    font-size: 13px; color: var(--text-dim); margin-bottom: 16px;
    display: inline-block; padding: 4px 14px;
    background: rgba(102,126,234,0.15); border-radius: 20px;
  }

  /* Progress Bars */
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .progress-bar {
    height: 10px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 5px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    position: relative; overflow: hidden;
  }
  .progress-fill::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .exp-fill { background: linear-gradient(90deg, var(--accent-light), var(--accent)); }
  .stamina-fill { background: linear-gradient(90deg, var(--success), #38f9d7); }

  /* Stats Grid */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .stat-box {
    background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; text-align: center;
    border: 1px solid var(--card-border);
  }
  .stat-box .num { font-size: 22px; font-weight: 800; color: var(--primary); }
  .stat-box .lbl { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .stat-box.gold .num { color: var(--warning); }
  .stat-box.streak .num { color: var(--accent); }

  /* Task List */
  .task-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px; margin-bottom: 12px;
    background: rgba(255,255,255,0.04); border-radius: 14px;
    border: 1px solid var(--card-border); transition: all 0.3s;
  }
  .task-item:hover { background: rgba(255,255,255,0.07); border-color: rgba(102,126,234,0.3); }
  .task-item.completed { opacity: 0.6; }
  .task-item.completed .task-name { text-decoration: line-through; color: var(--text-dim); }
  .task-check {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--text-dim);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all 0.3s; flex-shrink: 0; font-size: 14px; color: transparent;
  }
  .task-check:hover { border-color: var(--primary); }
  .task-check.checked {
    background: var(--success); border-color: var(--success); color: white;
  }
  .task-info { flex: 1; }
  .task-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .task-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-dim); }
  .task-reward { display: flex; gap: 10px; }
  .reward-tag {
    font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600;
    background: rgba(245,87,108,0.15); color: var(--accent-light);
  }
  .reward-tag.gold-tag { background: rgba(255,209,102,0.15); color: var(--warning); }

  /* Shop */
  .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .shop-item {
    background: rgba(255,255,255,0.04); border-radius: 12px; padding: 16px 12px;
    text-align: center; border: 1px solid var(--card-border); transition: all 0.3s; cursor: pointer;
  }
  .shop-item:hover { transform: translateY(-3px); border-color: var(--primary); }
  .shop-item .item-icon { font-size: 32px; margin-bottom: 8px; }
  .shop-item .item-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .shop-item .item-price { font-size: 12px; color: var(--warning); font-weight: 700; }
  .shop-item.owned { opacity: 0.5; cursor: not-allowed; }
  .shop-item.owned::after {
    content: '已拥有'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5); border-radius: 12px; font-size: 14px; font-weight: 700;
  }
  .shop-item { position: relative; }

  /* Inventory */
  .inv-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .inv-item {
    width: 56px; height: 56px; border-radius: 12px;
    background: rgba(255,255,255,0.06); border: 2px solid var(--card-border);
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    cursor: pointer; transition: all 0.3s; position: relative;
  }
  .inv-item:hover { border-color: var(--primary); transform: scale(1.1); }
  .inv-item.equipped { border-color: var(--success); box-shadow: 0 0 12px rgba(67,233,123,0.3); }
  .inv-item .equip-mark {
    position: absolute; bottom: -4px; right: -4px;
    background: var(--success); color: white; font-size: 10px;
    padding: 1px 5px; border-radius: 6px;
  }

  /* Achievements */
  .ach-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px; margin-bottom: 10px;
    background: rgba(255,255,255,0.03); border-radius: 12px;
    border: 1px solid var(--card-border); opacity: 0.5;
  }
  .ach-item.unlocked { opacity: 1; border-color: rgba(255,209,102,0.3); background: rgba(255,209,102,0.05); }
  .ach-icon { font-size: 28px; }
  .ach-info { flex: 1; }
  .ach-name { font-weight: 600; font-size: 14px; }
  .ach-desc { font-size: 12px; color: var(--text-dim); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal {
    background: linear-gradient(135deg, #1e1e3f, #16213e);
    border: 1px solid var(--card-border); border-radius: 20px;
    padding: 32px; max-width: 420px; width: 90%; text-align: center;
    transform: scale(0.9); transition: transform 0.3s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-overlay.active .modal { transform: scale(1); }
  .modal h2 { font-size: 24px; margin-bottom: 16px; }
  .modal p { color: var(--text-dim); margin-bottom: 24px; }
  .modal-input {
    width: 100%; padding: 14px 18px; border-radius: 12px;
    border: 1px solid var(--card-border); background: rgba(255,255,255,0.05);
    color: var(--text); font-size: 16px; margin-bottom: 16px;
  }
  .modal-input:focus { outline: none; border-color: var(--primary); }
  .class-select { display: flex; gap: 10px; margin-bottom: 20px; }
  .class-option {
    flex: 1; padding: 14px; border-radius: 12px; border: 2px solid var(--card-border);
    background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.3s;
    text-align: center;
  }
  .class-option:hover { border-color: var(--primary); }
  .class-option.selected {
    border-color: var(--primary); background: rgba(102,126,234,0.15);
  }
  .class-option .cls-icon { font-size: 28px; margin-bottom: 6px; }
  .class-option .cls-name { font-size: 13px; font-weight: 600; }

  /* Toast notifications */
  .toast-container {
    position: fixed; top: 20px; right: 20px; z-index: 200;
    display: flex; flex-direction: column; gap: 10px;
  }
  .toast {
    padding: 14px 22px; border-radius: 12px; font-size: 14px; font-weight: 600;
    color: white; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); max-width: 320px;
  }
  .toast.show { transform: translateX(0); }
  .toast-success { background: linear-gradient(135deg, var(--success), #38f9d7); }
  .toast-levelup {
    background: linear-gradient(135deg, var(--warning), #ff9e44);
    color: #1a1a2e;
  }
  .toast-reward { background: linear-gradient(135deg, var(--accent-light), var(--accent)); }

  /* Level up animation */
  @keyframes levelUpPop {
    0% { transform: scale(0.5); opacity: 0; }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .levelup-anim { animation: levelUpPop 0.6s ease-out; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab {
    padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--card-border); background: rgba(255,255,255,0.03);
    color: var(--text-dim); transition: all 0.3s;
  }
  .tab.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-color: transparent; }
  .tab:hover:not(.active) { color: var(--text); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Daily refresh banner */
  .refresh-banner {
    background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
    border: 1px solid rgba(102,126,234,0.3); border-radius: 12px;
    padding: 12px 18px; margin-bottom: 16px; display: flex;
    align-items: center; justify-content: space-between; font-size: 13px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  /* Hide app until loaded */
  #app { display: none; }
  #app.loaded { display: block; }
</style>
</head>
<body>

<!-- Background Particles -->
<div class="bg-particles" id="particles"></div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- ===================== SETUP MODAL ===================== -->
<div class="modal-overlay active" id="setupModal">
  <div class="modal">
    <div style="font-size: 48px; margin-bottom: 12px;">⚔️</div>
    <h2>创建你的勇者</h2>
    <p>欢迎来到 FitQuest！请先创建你的健身勇者角色。</p>
    <input type="text" class="modal-input" id="heroNameInput" placeholder="输入勇者名称..." maxlength="12">
    <div style="text-align: left; font-size: 13px; color: var(--text-dim); margin-bottom: 8px;">选择职业：</div>
    <div class="class-select">
      <div class="class-option selected" data-class="strength" onclick="selectClass(this)">
        <div class="cls-icon">💪</div>
        <div class="cls-name">力量型</div>
      </div>
      <div class="class-option" data-class="agility" onclick="selectClass(this)">
        <div class="cls-icon">⚡</div>
        <div class="cls-name">敏捷型</div>
      </div>
      <div class="class-option" data-class="endurance" onclick="selectClass(this)">
        <div class="cls-icon">🔥</div>
        <div class="cls-name">耐力型</div>
      </div>
    </div>
    <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="createHero()">开始冒险</button>
  </div>
</div>

<!-- ===================== LEVEL UP MODAL ===================== -->
<div class="modal-overlay" id="levelUpModal">
  <div class="modal">
    <div style="font-size: 56px; margin-bottom: 8px;" class="levelup-anim">🎉</div>
    <h2 style="color: var(--warning);">等级提升！</h2>
    <p id="levelUpText">恭喜你升到了 Lv.2！</p>
    <div style="font-size: 14px; color: var(--text-dim); margin-bottom: 20px;">
      <div>生命值上限 +10</div>
      <div>每日任务 +1</div>
    </div>
    <button class="btn btn-primary" onclick="closeModal('levelUpModal')">继续冒险</button>
  </div>
</div>

<!-- ===================== MAIN APP ===================== -->
<div id="app">
  <div class="app-container">
    <!-- Header -->
    <div class="app-header">
      <div class="logo"><span class="logo-icon">⚔️</span> FitQuest 健身勇者</div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="resetData()">🔄 重置数据</button>
        <button class="btn btn-accent btn-sm" onclick="refreshDailyTasks()">📋 刷新任务</button>
      </div>
    </div>

    <div class="main-grid">
      <!-- LEFT COLUMN -->
      <div class="left-col">
        <!-- Hero Card -->
        <div class="card hero-card">
          <div class="hero-avatar" id="heroAvatar">
            🦸
            <div class="level-badge" id="heroLevelBadge">Lv.1</div>
          </div>
          <div class="hero-name" id="heroNameDisplay">勇者</div>
          <div class="hero-class" id="heroClassDisplay">力量型勇者</div>

          <div style="margin-bottom: 14px;">
            <div class="progress-label">
              <span>经验值</span>
              <span id="expText">0 / 100</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill exp-fill" id="expBar" style="width: 0%"></div>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-box gold">
              <div class="num" id="goldDisplay">0</div>
              <div class="lbl">💰 金币</div>
            </div>
            <div class="stat-box streak">
              <div class="num" id="streakDisplay">0</div>
              <div class="lbl">🔥 连续打卡</div>
            </div>
            <div class="stat-box">
              <div class="num" id="completedDisplay">0</div>
              <div class="lbl">✅ 已完成</div>
            </div>
            <div class="stat-box">
              <div class="num" id="totalExpDisplay">0</div>
              <div class="lbl">⭐ 总经验</div>
            </div>
          </div>
        </div>

        <!-- Inventory Card -->
        <div class="card">
          <div class="card-title">
            <div class="icon" style="background: linear-gradient(135deg, #f093fb, #f5576c);">🎒</div>
            装备背包
          </div>
          <div class="inv-grid" id="inventoryGrid">
            <!-- Dynamic -->
          </div>
        </div>

        <!-- Achievements Card -->
        <div class="card">
          <div class="card-title">
            <div class="icon" style="background: linear-gradient(135deg, #ffd166, #ff9e44);">🏆</div>
            成就
          </div>
          <div id="achievementsList">
            <!-- Dynamic -->
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="right-col">
        <!-- Daily Tasks -->
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <div class="card-title" style="margin-bottom: 0;">
              <div class="icon" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">📋</div>
              每日任务
            </div>
            <div style="font-size: 13px; color: var(--text-dim);" id="taskDate"></div>
          </div>

          <div class="refresh-banner">
            <span>🎯 完成所有任务可开启额外宝箱奖励！</span>
            <span id="progressText">进度: 0/0</span>
          </div>

          <div id="taskList">
            <!-- Dynamic tasks -->
          </div>
        </div>

        <!-- Shop & More -->
        <div class="card">
          <div class="tabs">
            <div class="tab active" onclick="switchTab('shop')">🏪 装备商店</div>
            <div class="tab" onclick="switchTab('stats')">📊 数据统计</div>
          </div>

          <div class="tab-content active" id="tab-shop">
            <div class="shop-grid" id="shopGrid">
              <!-- Dynamic -->
            </div>
          </div>

          <div class="tab-content" id="tab-stats">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
              <div class="stat-box">
                <div class="num" id="statTotalTasks">0</div>
                <div class="lbl">累计任务</div>
              </div>
              <div class="stat-box">
                <div class="num" id="statTotalGold">0</div>
                <div class="lbl">累计金币</div>
              </div>
              <div class="stat-box">
                <div class="num" id="statMaxStreak">0</div>
                <div class="lbl">最高连击</div>
              </div>
              <div class="stat-box">
                <div class="num" id="statDays">0</div>
                <div class="lbl">冒险天数</div>
              </div>
            </div>
            <div style="background: rgba(255,255,255,0.03); border-radius: 12px; padding: 16px; font-size: 13px; color: var(--text-dim);">
              <div style="margin-bottom: 8px; font-weight: 600; color: var(--text);">📈 本周活跃度</div>
              <div style="display: flex; gap: 6px; align-items: flex-end; height: 60px;" id="weekChart">
                <!-- Dynamic bars -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===================== GAME DATA =====================
const CLASSES = {
  strength: { name: '力量型', icon: '💪', bonus: '力量训练 EXP +20%' },
  agility:  { name: '敏捷型', icon: '⚡', bonus: '有氧运动 EXP +20%' },
  endurance:{ name: '耐力型', icon: '🔥', bonus: '耐力训练 EXP +20%' }
};

const TASK_TEMPLATES = [
  { id: 'run', name: '晨跑 30 分钟', icon: '🏃', type: 'cardio', baseExp: 50, baseGold: 10 },
  { id: 'strength', name: '力量训练', icon: '💪', type: 'strength', baseExp: 60, baseGold: 12 },
  { id: 'yoga', name: '瑜伽拉伸', icon: '🧘', type: 'flexibility', baseExp: 30, baseGold: 5 },
  { id: 'diet', name: '健康饮食打卡', icon: '🥗', type: 'diet', baseExp: 20, baseGold: 3 },
  { id: 'water', name: '饮水 2000ml', icon: '💧', type: 'diet', baseExp: 15, baseGold: 2 },
  { id: 'walk', name: '步行 8000 步', icon: '🚶', type: 'cardio', baseExp: 35, baseGold: 6 },
  { id: 'abs', name: '腹肌训练', icon: '🎯', type: 'strength', baseExp: 40, baseGold: 8 },
  { id: 'sleep', name: '早睡打卡 (23:00前)', icon: '😴', type: 'recovery', baseExp: 25, baseGold: 4 },
  { id: 'plank', name: '平板支撑 3 组', icon: '📐', type: 'strength', baseExp: 45, baseGold: 9 },
  { id: 'swim', name: '游泳 30 分钟', icon: '🏊', type: 'cardio', baseExp: 55, baseGold: 11 },
];

const SHOP_ITEMS = [
  { id: 'sword', name: '勇者之剑', icon: '⚔️', price: 100, desc: '攻击力+5' },
  { id: 'shield', name: '守护盾牌', icon: '🛡️', price: 80, desc: '防御力+5' },
  { id: 'crown', name: '荣耀王冠', icon: '👑', price: 200, desc: '魅力+10' },
  { id: 'cape', name: '英雄披风', icon: '🦸', price: 150, desc: '速度+5' },
  { id: 'potion', name: '恢复药水', icon: '🧪', price: 50, desc: '体力+20' },
  { id: 'ring', name: '力量戒指', icon: '💍', price: 300, desc: '全属性+3' },
  { id: 'boots', name: '疾风靴', icon: '👢', price: 120, desc: '敏捷+8' },
  { id: 'gem', name: '稀有宝石', icon: '💎', price: 500, desc: '幸运+10' },
];

const ACHIEVEMENTS = [
  { id: 'first', name: '初次打卡', desc: '完成第一个任务', icon: '🌟', condition: (s) => s.completedTasks >= 1 },
  { id: 'five', name: '初露锋芒', desc: '累计完成5个任务', icon: '⚡', condition: (s) => s.completedTasks >= 5 },
  { id: 'twenty', name: '健身达人', desc: '累计完成20个任务', icon: '💪', condition: (s) => s.completedTasks >= 20 },
  { id: 'streak3', name: '坚持不懈', desc: '连续打卡3天', icon: '🔥', condition: (s) => s.maxStreak >= 3 },
  { id: 'streak7', name: '一周战士', desc: '连续打卡7天', icon: '📅', condition: (s) => s.maxStreak >= 7 },
  { id: 'rich', name: '小富翁', desc: '拥有100金币', icon: '💰', condition: (s) => s.gold >= 100 },
  { id: 'level5', name: '中级勇者', desc: '达到等级5', icon: '🏅', condition: (s) => s.level >= 5 },
  { id: 'level10', name: '高级勇者', desc: '达到等级10', icon: '🎖️', condition: (s) => s.level >= 10 },
  { id: 'all', name: '完美一天', desc: '完成当日所有任务', icon: '✨', condition: (s) => s.hasAllDone },
  { id: 'collector', name: '收藏家', desc: '拥有3件装备', icon: '🎒', condition: (s) => s.inventory.length >= 3 },
];

// ===================== STATE =====================
let state = {
  name: '', classType: 'strength',
  level: 1, exp: 0, maxExp: 100,
  gold: 0, streak: 0, maxStreak: 0,
  completedTasks: 0, totalTasksEver: 0, totalGoldEarned: 0,
  inventory: [], equipped: [],
  achievements: [],
  tasks: [],
  lastLoginDate: null,
  joinDate: null,
  weeklyActivity: [0,0,0,0,0,0,0],
  hasAllDone: false
};

const STORAGE_KEY = 'fitquest_save_v1';

// ===================== INIT =====================
function init() {
  createParticles();
  loadGame();
  if (state.name) {
    showApp();
  }
  document.getElementById('taskDate').textContent = new Date().toLocaleDateString('zh-CN');
}

function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 15 + 's';
    p.style.animationDuration = (10 + Math.random() * 10) + 's';
    container.appendChild(p);
  }
}

// ===================== SAVE / LOAD =====================
function saveGame() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadGame() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const saved = JSON.parse(raw);
      // Merge carefully
      Object.assign(state, saved);
      // Ensure arrays exist
      if (!state.inventory) state.inventory = [];
      if (!state.equipped) state.equipped = [];
      if (!state.achievements) state.achievements = [];
      if (!state.tasks) state.tasks = [];
      if (!state.weeklyActivity) state.weeklyActivity = [0,0,0,0,0,0,0];
    } catch (e) { console.error('Save corrupt', e); }
  }
}

function resetData() {
  if (!confirm('确定要重置所有数据吗？此操作不可恢复！')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ===================== SETUP =====================
function selectClass(el) {
  document.querySelectorAll('.class-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function createHero() {
  const name = document.getElementById('heroNameInput').value.trim();
  if (!name) { showToast('请输入勇者名称！', 'toast-reward'); return; }
  const selected = document.querySelector('.class-option.selected');
  const classType = selected.dataset.class;

  state.name = name;
  state.classType = classType;
  state.joinDate = new Date().toISOString();
  state.lastLoginDate = new Date().toISOString();
  generateDailyTasks();
  saveGame();
  closeModal('setupModal');
  showApp();
  showToast(`欢迎来到 FitQuest，${name}！`, 'toast-success');
}

function showApp() {
  document.getElementById('app').classList.add('loaded');
  checkDailyReset();
  renderAll();
}

// ===================== DAILY RESET =====================
function checkDailyReset() {
  const today = new Date().toDateString();
  const last = state.lastLoginDate ? new Date(state.lastLoginDate).toDateString() : null;

  if (last !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    if (last === yesterday.toDateString()) {
      // Consecutive day
      const allDone = state.tasks.length > 0 && state.tasks.every(t => t.completed);
      if (allDone) {
        state.streak++;
        if (state.streak > state.maxStreak) state.maxStreak = state.streak;
        showToast(`🔥 连续打卡 ${state.streak} 天！`, 'toast-success');
      } else {
        state.streak = 0;
        showToast('昨日任务未完成，连击中断...', 'toast-reward');
      }
    } else if (last !== null) {
      state.streak = 0;
      showToast('欢迎回来！新的一天开始啦！', 'toast-success');
    }

    state.lastLoginDate = new Date().toISOString();
    generateDailyTasks();
    saveGame();
  }
}

function generateDailyTasks() {
  const count = 4 + Math.floor(state.level / 3); // More tasks as level up
  const shuffled = [...TASK_TEMPLATES].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, count);

  state.tasks = selected.map(t => ({
    ...t,
    uid: Math.random().toString(36).substr(2, 9),
    expReward: calcExpReward(t),
    goldReward: t.baseGold,
    completed: false
  }));

  state.hasAllDone = false;
}

function calcExpReward(task) {
  let exp = task.baseExp;
  const cls = CLASSES[state.classType];
  if (state.classType === 'strength' && task.type === 'strength') exp = Math.floor(exp * 1.2);
  if (state.classType === 'agility' && task.type === 'cardio') exp = Math.floor(exp * 1.2);
  if (state.classType === 'endurance' && (task.type === 'flexibility' || task.type === 'recovery')) exp = Math.floor(exp * 1.2);
  return exp;
}

function refreshDailyTasks() {
  if (!confirm('确定要刷新今日任务吗？进度将重置。')) return;
  generateDailyTasks();
  saveGame();
  renderAll();
  showToast('任务已刷新！', 'toast-success');
}

// ===================== TASK LOGIC =====================
function toggleTask(uid) {
  const task = state.tasks.find(t => t.uid === uid);
  if (!task) return;
  task.completed = !task.completed;

  if (task.completed) {
    state.exp += task.expReward;
    state.gold += task.goldReward;
    state.completedTasks++;
    state.totalTasksEver++;
    state.totalGoldEarned += task.goldReward;

    // Weekly activity
    const dayIdx = new Date().getDay();
    state.weeklyActivity[dayIdx]++;

    showToast(`+${task.expReward} EXP  +${task.goldReward} 金币`, 'toast-success');

    checkLevelUp();
    checkAllDone();
  } else {
    state.exp = Math.max(0, state.exp - task.expReward);
    state.gold = Math.max(0, state.gold - task.goldReward);
    state.completedTasks = Math.max(0, state.completedTasks - 1);
    state.totalTasksEver = Math.max(0, state.totalTasksEver - 1);
    state.totalGoldEarned = Math.max(0, state.totalGoldEarned - task.goldReward);
  }

  checkAchievements();
  saveGame();
  renderAll();
}

function checkAllDone() {
  const allDone = state.tasks.length > 0 && state.tasks.every(t => t.completed);
  if (allDone && !state.hasAllDone) {
    state.hasAllDone = true;
    const bonusExp = 50 + state.level * 10;
    const bonusGold = 20 + state.level * 5;
    state.exp += bonusExp;
    state.gold += bonusGold;
    state.totalGoldEarned += bonusGold;
    showToast(`🎁 全部完成！额外奖励 +${bonusExp} EXP +${bonusGold} 金币`, 'toast-levelup');
    checkLevelUp();
  }
}

function checkLevelUp() {
  while (state.exp >= state.maxExp) {
    state.exp -= state.maxExp;
    state.level++;
    state.maxExp = Math.floor(100 * Math.pow(1.15, state.level - 1));
    showLevelUpModal(state.level);
  }
}

// ===================== SHOP =====================
function buyItem(itemId) {
  const item = SHOP_ITEMS.find(i => i.id === itemId);
  if (!item) return;
  if (state.inventory.includes(itemId)) { showToast('你已经拥有这件装备了！', 'toast-reward'); return; }
  if (state.gold < item.price) { showToast('金币不足！', 'toast-reward'); return; }

  state.gold -= item.price;
  state.inventory.push(itemId);
  saveGame();
  renderAll();
  showToast(`获得装备：${item.name}！`, 'toast-success');
  checkAchievements();
}

function toggleEquip(itemId) {
  if (!state.inventory.includes(itemId)) return;
  if (state.equipped.includes(itemId)) {
    state.equipped = state.equipped.filter(id => id !== itemId);
    showToast('装备已卸下', 'toast-reward');
  } else {
    state.equipped.push(itemId);
    showToast('装备已穿戴', 'toast-success');
  }
  saveGame();
  renderAll();
}

// ===================== ACHIEVEMENTS =====================
function checkAchievements() {
  let newUnlock = false;
  ACHIEVEMENTS.forEach(ach => {
    if (!state.achievements.includes(ach.id) && ach.condition(state)) {
      state.achievements.push(ach.id);
      newUnlock = true;
      showToast(`🏆 解锁成就：${ach.name}！`, 'toast-levelup');
    }
  });
  if (newUnlock) saveGame();
}

// ===================== UI RENDER =====================
function renderAll() {
  renderHero();
  renderTasks();
  renderShop();
  renderInventory();
  renderAchievements();
  renderStats();
}

function renderHero() {
  document.getElementById('heroNameDisplay').textContent = state.name || '勇者';
  document.getElementById('heroLevelBadge').textContent = 'Lv.' + state.level;
  const cls = CLASSES[state.classType];
  document.getElementById('heroClassDisplay').textContent = cls ? `${cls.icon} ${cls.name}勇者` : '勇者';

  document.getElementById('expText').textContent = `${state.exp} / ${state.maxExp}`;
  document.getElementById('expBar').style.width = (state.exp / state.maxExp * 100) + '%';

  document.getElementById('goldDisplay').textContent = state.gold;
  document.getElementById('streakDisplay').textContent = state.streak;
  document.getElementById('completedDisplay').textContent = state.completedTasks;
  document.getElementById('totalExpDisplay').textContent = state.totalTasksEver * 40;
}

function renderTasks() {
  const container = document.getElementById('taskList');
  const completed = state.tasks.filter(t => t.completed).length;
  document.getElementById('progressText').textContent = `进度: ${completed}/${state.tasks.length}`;

  container.innerHTML = state.tasks.map(task => `
    <div class="task-item ${task.completed ? 'completed' : ''}">
      <div class="task-check ${task.completed ? 'checked' : ''}" onclick="toggleTask('${task.uid}')">
        ${task.completed ? '✓' : ''}
      </div>
      <div class="task-info">
        <div class="task-name">${task.icon} ${task.name}</div>
        <div class="task-meta">
          <span>类型: ${getTypeLabel(task.type)}</span>
          <span>职业加成: ${getBonusText(task)}</span>
        </div>
      </div>
      <div class="task-reward">
        <div class="reward-tag">+${task.expReward} EXP</div>
        <div class="reward-tag gold-tag">+${task.goldReward} 💰</div>
      </div>
    </div>
  `).join('');
}

function getTypeLabel(type) {
  const map = { cardio: '有氧', strength: '力量', flexibility: '柔韧', diet: '饮食', recovery: '恢复' };
  return map[type] || type;
}

function getBonusText(task) {
  if (state.classType === 'strength' && task.type === 'strength') return '+20%';
  if (state.classType === 'agility' && task.type === 'cardio') return '+20%';
  if (state.classType === 'endurance' && (task.type === 'flexibility' || task.type === 'recovery')) return '+20%';
  return '无';
}

function renderShop() {
  const container = document.getElementById('shopGrid');
  container.innerHTML = SHOP_ITEMS.map(item => {
    const owned = state.inventory.includes(item.id);
    return `
      <div class="shop-item ${owned ? 'owned' : ''}" onclick="${owned ? '' : `buyItem('${item.id}')`}">
        <div class="item-icon">${item.icon}</div>
        <div class="item-name">${item.name}</div>
        <div class="item-price">${owned ? '已拥有' : item.price + ' 💰'}</div>
      </div>
    `;
  }).join('');
}

function renderInventory() {
  const container = document.getElementById('inventoryGrid');
  if (state.inventory.length === 0) {
    container.innerHTML = '<div style="color: var(--text-dim); font-size: 13px; width: 100%;">背包空空如也...</div>';
    return;
  }
  container.innerHTML = state.inventory.map(id => {
    const item = SHOP_ITEMS.find(i => i.id === id);
    const isEquipped = state.equipped.includes(id);
    return `
      <div class="inv-item ${isEquipped ? 'equipped' : ''}" onclick="toggleEquip('${id}')" title="${item.name}">
        ${item.icon}
        ${isEquipped ? '<div class="equip-mark">装备中</div>' : ''}
      </div>
    `;
  }).join('');
}

function renderAchievements() {
  const container = document.getElementById('achievementsList');
  container.innerHTML = ACHIEVEMENTS.map(ach => {
    const unlocked = state.achievements.includes(ach.id);
    return `
      <div class="ach-item ${unlocked ? 'unlocked' : ''}">
        <div class="ach-icon">${ach.icon}</div>
        <div class="ach-info">
          <div class="ach-name">${ach.name}</div>
          <div class="ach-desc">${ach.desc}</div>
        </div>
        ${unlocked ? '<div style="font-size: 20px;">✅</div>' : '<div style="font-size: 20px; opacity: 0.3;">🔒</div>'}
      </div>
    `;
  }).join('');
}

function renderStats() {
  document.getElementById('statTotalTasks').textContent = state.totalTasksEver;
  document.getElementById('statTotalGold').textContent = state.totalGoldEarned;
  document.getElementById('statMaxStreak').textContent = state.maxStreak;
  const days = state.joinDate ? Math.floor((Date.now() - new Date(state.joinDate).getTime()) / 86400000) + 1 : 0;
  document.getElementById('statDays').textContent = days;

  // Week chart
  const chart = document.getElementById('weekChart');
  const maxVal = Math.max(1, ...state.weeklyActivity);
  const dayLabels = ['日','一','二','三','四','五','六'];
  chart.innerHTML = state.weeklyActivity.map((val, idx) => `
    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
      <div style="width: 100%; background: rgba(102,126,234,0.3); border-radius: 4px; height: ${(val / maxVal * 50)}px; transition: height 0.5s;"></div>
      <div style="font-size: 11px; color: var(--text-dim);">${dayLabels[idx]}</div>
    </div>
  `).join('');
}

// ===================== TABS & MODALS =====================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function showLevelUpModal(level) {
  document.getElementById('levelUpText').textContent = `恭喜你升到了 Lv.${level}！`;
  document.getElementById('levelUpModal').classList.add('active');
}

function showToast(message, type = 'toast-success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 400);
  }, 3000);
}

// ===================== BOOT =====================
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
