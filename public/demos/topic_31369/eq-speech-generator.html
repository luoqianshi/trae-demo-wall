                    "老板，我最近发现我的银行卡余额和我的工作量不太成正比，您看...？",
                    "我算了一下，以我的工作量，应该可以申请'最佳性价比员工奖'——或者换成奖金也行。",
                    "我知道谈钱伤感情，但不谈钱伤积极性。您选一个？"
                ]
            },
            'break-ice': {
                gentle: [
                    "那天的事我想了很久，有些话我说重了，对不起。",
                    "我不想因为一次争执就失去你，咱们好好聊聊好吗？",
                    "冷静之后我理解了你的立场，是我太固执了。"
                ],
                sincere: [
                    "比起谁对谁错，我更在乎我们的关系。能和好吗？",
                    "我想了很多，确实是我没有站在你的角度考虑，真的很抱歉。",
                    "没有你的日子挺不习惯的，咱们别冷战了，好不好？"
                ],
                humorous: [
                    "我反思了三天三夜，结论是——咱俩都有错，但我先认错，我格局大。",
                    "根据《吵架和解条例》第3条，先开口的人赢。好吧，我认输。",
                    "我带了'求和奶茶'前来投降，请问阁下接受这份贡品吗？"
                ]
            },
            'festival': {
                gentle: [
                    "{festival}快乐！愿你{wish}，{wish2}。",
                    "{greeting}，感谢你一直以来的{quality}，祝你{festival}{wish}！",
                    "在这个{desc}的日子里，送上最真挚的祝福：{wish}！"
                ],
                sincere: [
                    "{festival}到了，想起我们一起{memory}的时光，真的很{feeling}。祝你{wish}！",
                    "不管多远，祝福不减。愿你{festival}{wish}，{wish2}。",
                    "{greeting}，你的{quality}一直感染着我，愿你也被世界温柔以待。"
                ],
                humorous: [
                    "{festival}祝福虽迟但到！毕竟好祝福不怕晚，就像好酒不怕陈。",
                    "祝你{festival}：钱包鼓鼓，烦恼少少，头发多多，体重稳稳！",
                    "{greeting}！在这个普天同庆的日子，我正式宣布：你是我最重要的'祝福对象'之一！"
                ]
            }
        };

        // 动态填充词库
        const fillWords = {
            adjective: ["有想法", "温暖", "真诚", "有趣", "踏实"],
            topic: ["生活", "工作", "旅行", "电影", "美食"],
            time: ["一年", "两年", "这段时间", "入职以来"],
            achievement: ["几个重要项目", "业绩目标", "团队建设"],
            festival: ["春节", "中秋", "生日", "新年", "端午"],
            wish: ["平安喜乐", "万事顺遂", "心想事成", "幸福安康", "前程似锦"],
            wish2: ["身体健康", "工作顺利", "家庭美满", "天天开心"],
            greeting: ["节日快乐", "恭喜发财", "岁岁平安","福星高照"],
            quality: ["陪伴", "支持", "理解", "鼓励"],
            memory: ["奋斗", "欢笑", "克服困难"],
            feeling: ["珍惜", "感动", "庆幸"],
            desc: ["特别", "温馨", "美好"]
        };

        // ===== 状态 =====
        let currentScene = 'work-report';
        let currentResults = [];

        // ===== 初始化 =====
        function init() {
            refreshQuote();
            setupSceneTags();
            setupInput();
        }

        // ===== 每日金句 =====
        function refreshQuote() {
            const idx = Math.floor(Math.random() * quotes.length);
            const el = document.getElementById('quoteText');
            el.style.opacity = 0;
            setTimeout(() => {
                el.textContent = quotes[idx];
                el.style.opacity = 1;
            }, 200);
        }

        // ===== 场景标签 =====
        function setupSceneTags() {
            const scrollContainer = document.getElementById('sceneScroll');
            const tags = document.querySelectorAll('.scene-tag');

            // 鼠标拖拽滑动
            let isDown = false;
            let startX;
            let scrollLeft;

            scrollContainer.addEventListener('mousedown', (e) => {
                isDown = true;
                scrollContainer.classList.add('active');
                startX = e.pageX - scrollContainer.offsetLeft;
                scrollLeft = scrollContainer.scrollLeft;
            });

            scrollContainer.addEventListener('mouseleave', () => {
                isDown = false;
                scrollContainer.classList.remove('active');
            });

            scrollContainer.addEventListener('mouseup', () => {
                isDown = false;
                scrollContainer.classList.remove('active');
            });

            scrollContainer.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - scrollContainer.offsetLeft;
                const walk = (x - startX) * 1.5;
                scrollContainer.scrollLeft = scrollLeft - walk;
            });

            tags.forEach(tag => {
                tag.addEventListener('click', () => {
                    tags.forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentScene = tag.dataset.scene;
                });
            });
        }

        // ===== 输入框 =====
        function setupInput() {
            const input = document.getElementById('situationInput');
            const count = document.getElementById('charCount');
            const placeholderExample = '想拒绝同事让我帮他周末加班';

            input.addEventListener('input', () => {
                const len = input.value.length;
                count.textContent = `${len} / 100 字`;
                if (len > 100) {
                    count.style.color = '#e74c3c';
                } else {
                    count.style.color = '';
                }
            });

            // Tab 键快速填入示例
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    input.value = placeholderExample;
                    input.dispatchEvent(new Event('input'));
                }
            });
        }

        // ===== 生成话术 =====
        function generateSpeech() {
            const input = document.getElementById('situationInput').value.trim();
            if (input.length < 10) {
                showToast('请至少输入10个字描述情境');
                return;
            }

            // 显示加载
            document.getElementById('loadingArea').classList.add('active');
            document.getElementById('resultsArea').classList.remove('active');
            document.getElementById('refreshSection').classList.remove('active');

            // 模拟AI思考
            setTimeout(() => {
                const results = generateResults(input);
                renderResults(results);
                document.getElementById('loadingArea').classList.remove('active');
                document.getElementById('resultsArea').classList.add('active');
                document.getElementById('refreshSection').classList.add('active');
            }, 2000);
        }

        // ===== 生成结果（随机组合模板） =====
        function generateResults(input) {
            const scene = speechTemplates[currentScene];
            const styles = ['gentle', 'sincere', 'humorous'];
            const styleNames = { gentle: '委婉版', sincere: '真诚版', humorous: '幽默版' };
            const styleColors = { gentle: 'gentle', sincere: 'sincere', humorous: 'humorous' };

            return styles.map(style => {
                const templates = scene[style];
                let text = templates[Math.floor(Math.random() * templates.length)];
                
                // 填充动态词
                Object.keys(fillWords).forEach(key => {
                    const regex = new RegExp(`{${key}}`, 'g');
                    const words = fillWords[key];
                    text = text.replace(regex, () => words[Math.floor(Math.random() * words.length)]);
                });

                // 结合用户输入做个性化
                if (input.length > 0 && !text.includes(input)) {
                    text = `关于"${input}"，你可以这样说：\n\n${text}`;
                }

                return {
                    style: styleNames[style],
                    styleClass: styleColors[style],
                    text: text
                };
            });
        }

        // ===== 渲染结果卡片 =====
        function renderResults(results) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';

            results.forEach((result, index) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="card-header ${result.styleClass}">
                        <span class="style-tag ${result.styleClass}">${result.style}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-text">${result.text.replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="card-footer">
                        <button class="copy-btn" onclick="copyText(${index})">
                            <span>&#x1F4CB;</span>
                            <span>复制</span>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

            currentResults = results;
        }

        // ===== 复制功能 =====
        function copyText(index) {
            let text = currentResults[index].text;
            // 去掉前缀，只复制话术本身
            text = text.replace(/^关于".*?"，你可以这样说：\n\n/, '');
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板');
            });
        }

        // ===== Toast 提示 =====
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // ===== 启动 =====
        init();
    </script>
</body>
</html>
