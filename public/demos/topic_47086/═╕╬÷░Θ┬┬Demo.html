<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>透析伴侣 - 初赛演示版</title>
<style>
/* ============ 设计系统变量 ============ */
:root {
  /* 主色 */
  --primary: #2EC4B6;
  --primary-dark: #20A69A;
  --primary-light: #E6F7F5;
  /* 功能色 */
  --success: #52C41A;
  --success-light: #F0FFF0;
  --warning: #FAAD14;
  --warning-light: #FFFBE6;
  --danger: #F5222D;
  --danger-light: #FFF1F0;
  /* 中性色 */
  --text-1: #1F1F1F;
  --text-2: #595959;
  --text-3: #8C8C8C;
  --text-disabled: #BFBFBF;
  --border: #E8E8E8;
  --bg: #F5F7FA;
  --card: #FFFFFF;
  /* 透析专属 */
  --dialysis: #722ED1;
  --dialysis-light: #F9F0FF;
  /* 字号 */
  --h1: 20px;
  --h2: 17px;
  --h3: 15px;
  --body: 14px;
  --caption: 12px;
  --num-l: 24px;
  --num-m: 18px;
  /* 间距 */
  --sp-page: 16px;
  --sp-card: 12px;
  --sp-block: 12px;
  --sp-l: 8px;
  --sp-m: 6px;
  --sp-s: 4px;
  /* 圆角 */
  --r-l: 12px;
  --r-m: 8px;
  --r-s: 4px;
  --r-pill: 999px;
  /* 阴影 */
  --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-float: 0 4px 16px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #e8eaed; color: var(--text-1); font-size: var(--body); line-height: 1.5; }

/* ============ 手机外壳 ============ */
.phone-frame {
  width: 375px;
  min-height: 100vh;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 24px rgba(0,0,0,0.08);
}
@media (min-width: 768px) {
  body { padding: 20px 0; }
  .phone-frame { min-height: calc(100vh - 40px); border-radius: 24px; overflow: hidden; }
}

/* 状态栏 */
.status-bar {
  height: 24px;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  font-size: 12px;
  font-weight: 500;
  flex-shrink: 0;
}

/* 顶部导航 */
.nav-bar {
  height: 44px;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 16px;
  position: relative;
  flex-shrink: 0;
}
.nav-bar .nav-title { font-size: var(--h2); font-weight: 600; flex: 1; text-align: center; }
.nav-bar .nav-left, .nav-bar .nav-right { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
.nav-bar .nav-right { text-align: right; }

/* 内容区 */
.content { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 80px; }
.content::-webkit-scrollbar { width: 0; }

/* ============ TabBar ============ */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 375px;
  height: 60px;
  background: #fff;
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--text-3);
  cursor: pointer;
  transition: color 0.2s;
  font-size: 10px;
}
.tab-item.active { color: var(--primary); }
.tab-item .tab-icon { font-size: 20px; line-height: 1; }

/* ============ 通用组件 ============ */
.card {
  background: var(--card);
  border-radius: var(--r-l);
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}
.card-title {
  font-size: var(--h3);
  font-weight: 600;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title .more { font-size: var(--caption); color: var(--text-3); font-weight: 400; cursor: pointer; }

.btn {
  height: 44px;
  border-radius: var(--r-pill);
  border: none;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  transition: opacity 0.2s;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-secondary { background: var(--primary-light); color: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-2); }
.btn-block { width: 100%; }
.btn-sm { height: 32px; font-size: 13px; padding: 0 14px; }

.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--r-s);
  font-size: 11px;
  font-weight: 500;
}
.tag-primary { background: var(--primary-light); color: var(--primary-dark); }
.tag-success { background: var(--success-light); color: var(--success); }
.tag-warning { background: var(--warning-light); color: var(--warning); }
.tag-danger { background: var(--danger-light); color: var(--danger); }
.tag-dialysis { background: var(--dialysis-light); color: var(--dialysis); }

.empty { text-align: center; padding: 40px 0; color: var(--text-3); font-size: 13px; }
.empty-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.4; }

/* ============ 页面切换 ============ */
.page { display: none; }
.page.active { display: block; }

/* ============ 首页 ============ */
.hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: #fff;
  padding: 16px;
  border-radius: var(--r-l);
  margin-bottom: 12px;
}
.hero .greeting { font-size: 13px; opacity: 0.9; margin-bottom: 4px; }
.hero .user-name { font-size: var(--h1); font-weight: 600; margin-bottom: 12px; }
.hero .stats-row { display: flex; gap: 12px; }
.hero .stat { flex: 1; }
.hero .stat .num { font-size: var(--num-l); font-weight: 600; line-height: 1; }
.hero .stat .label { font-size: 11px; opacity: 0.85; margin-top: 4px; }

.overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.overview-card {
  background: #fff;
  border-radius: var(--r-l);
  padding: 12px;
  box-shadow: var(--shadow-card);
  cursor: pointer;
}
.overview-card .oc-icon { font-size: 22px; margin-bottom: 6px; }
.overview-card .oc-title { font-size: 12px; color: var(--text-3); margin-bottom: 2px; }
.overview-card .oc-value { font-size: 18px; font-weight: 600; color: var(--text-1); }
.overview-card .oc-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }

.alert-bar {
  background: var(--warning-light);
  border-left: 3px solid var(--warning);
  padding: 10px 12px;
  border-radius: var(--r-m);
  margin-bottom: 12px;
  font-size: 13px;
  color: #8a6d3b;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.alert-bar.danger { background: var(--danger-light); border-color: var(--danger); color: #a82020; }

/* ============ 打卡页 ============ */
.checkin-progress {
  background: #fff;
  border-radius: var(--r-l);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
  text-align: center;
}
.checkin-progress .ring {
  width: 120px;
  height: 120px;
  margin: 0 auto 8px;
  border-radius: 50%;
  background: conic-gradient(var(--primary) 0%, var(--primary-light) 0%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.checkin-progress .ring::before {
  content: '';
  position: absolute;
  width: 96px;
  height: 96px;
  background: #fff;
  border-radius: 50%;
}
.checkin-progress .ring .ring-text {
  position: relative;
  z-index: 1;
}
.checkin-progress .ring .ring-num { font-size: 24px; font-weight: 600; color: var(--primary); }
.checkin-progress .ring .ring-label { font-size: 11px; color: var(--text-3); }
.checkin-progress .progress-text { font-size: 13px; color: var(--text-2); }

.checkin-item {
  background: #fff;
  border-radius: var(--r-l);
  padding: 12px 14px;
  margin-bottom: 8px;
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}
.checkin-item .ci-icon { font-size: 24px; width: 40px; text-align: center; }
.checkin-item .ci-content { flex: 1; }
.checkin-item .ci-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.checkin-item .ci-sub { font-size: 11px; color: var(--text-3); }
.checkin-item .ci-action { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-3); font-size: 14px; }
.checkin-item.done .ci-action { background: var(--success); border-color: var(--success); color: #fff; }
.checkin-item.done .ci-title { color: var(--text-3); text-decoration: line-through; }

/* ============ 菜谱/社区 列表 ============ */
.list-item {
  background: #fff;
  border-radius: var(--r-l);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
  cursor: pointer;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
}
.list-item .li-image {
  width: 100%;
  height: 140px;
  background: linear-gradient(135deg, var(--primary-light), #fff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}
.list-item .li-body { padding: 12px 14px; flex: 1; min-width: 0; }
.list-item .li-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.list-item .li-desc { font-size: 12px; color: var(--text-3); margin-bottom: 8px; line-height: 1.5; }
.list-item .li-meta { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-3); flex-wrap: wrap; }
.list-item .li-meta span { display: flex; align-items: center; gap: 3px; }

/* 列表项右侧操作按钮区（透析中心管理用） */
.list-item .li-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px 14px;
  flex-shrink: 0;
  justify-content: center;
}
.li-action-btn {
  font-size: 11px;
  padding: 5px 10px;
  min-width: 60px;
  height: auto;
  line-height: 1.2;
  white-space: nowrap;
}
.li-action-primary { color: var(--primary); border-color: var(--primary); }
.li-action-danger { color: var(--danger); border-color: var(--danger); }

/* 列表项底部操作按钮区（菜谱卡片用，避免挤压主体） */
.list-item .li-actions-bottom {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 0 14px 12px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
  padding-top: 10px;
}

.list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.list-grid .list-item { margin-bottom: 0; }
.list-grid .list-item .li-image { height: 90px; font-size: 36px; }

/* ============ 我的页 ============ */
.profile-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: #fff;
  padding: 20px 16px;
  border-radius: var(--r-l);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.profile-header .avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.profile-header .ph-info { flex: 1; }
.profile-header .ph-name { font-size: var(--h2); font-weight: 600; margin-bottom: 2px; }
.profile-header .ph-sub { font-size: 12px; opacity: 0.85; }

.menu-list { background: #fff; border-radius: var(--r-l); overflow: hidden; box-shadow: var(--shadow-card); margin-bottom: 12px; }
.menu-item { display: flex; align-items: center; padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
.menu-item:last-child { border-bottom: none; }
.menu-item .mi-icon { width: 28px; height: 28px; border-radius: var(--r-s); background: var(--primary-light); color: var(--primary-dark); display: flex; align-items: center; justify-content: center; font-size: 16px; margin-right: 12px; }
.menu-item .mi-title { flex: 1; font-size: 14px; }
.menu-item .mi-arrow { color: var(--text-3); font-size: 12px; }

/* ============ 详情页 ============ */
.detail-image {
  width: 100%;
  height: 200px;
  background: linear-gradient(135deg, var(--primary-light), #fff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  border-radius: var(--r-l);
  margin-bottom: 12px;
}
.detail-section { background: #fff; border-radius: var(--r-l); padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow-card); }
.detail-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.detail-section p { font-size: 13px; color: var(--text-2); line-height: 1.7; margin-bottom: 8px; }

/* ============ 弹窗 ============ */
.modal-mask {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-mask.active { display: flex; }
.modal {
  background: #fff;
  border-radius: var(--r-l);
  padding: 20px;
  width: 100%;
  max-width: 335px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-title { font-size: var(--h2); font-weight: 600; margin-bottom: 14px; text-align: center; }
.modal-actions { display: flex; gap: 10px; margin-top: 14px; }

/* ============ 表单 ============ */
.form-group { margin-bottom: 12px; }
.form-label { font-size: 13px; color: var(--text-2); margin-bottom: 6px; display: block; }
.form-input, .form-textarea, .form-select {
  width: 100%;
  height: 44px;
  border: 1px solid var(--border);
  border-radius: var(--r-m);
  padding: 0 12px;
  font-size: 14px;
  background: #fff;
  color: var(--text-1);
  font-family: inherit;
}
.form-textarea { height: auto; padding: 10px 12px; min-height: 80px; resize: none; }
.form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--primary); }

/* ============ 角色选择 ============ */
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.role-card {
  background: #fff;
  border: 2px solid var(--border);
  border-radius: var(--r-l);
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.role-card.active { border-color: var(--primary); background: var(--primary-light); }
.role-card .rc-icon { font-size: 36px; margin-bottom: 8px; }
.role-card .rc-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.role-card .rc-desc { font-size: 11px; color: var(--text-3); }

/* ============ AI识图 ============ */
.camera-area {
  background: #fff;
  border-radius: var(--r-l);
  padding: 30px 20px;
  text-align: center;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}
.camera-area .ca-icon { font-size: 56px; color: var(--primary); margin-bottom: 12px; }
.camera-area .ca-text { font-size: 14px; color: var(--text-2); margin-bottom: 16px; }

.ai-result {
  background: #fff;
  border-radius: var(--r-l);
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}
.ai-result .ar-food { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.nutrition-bars { display: flex; flex-direction: column; gap: 8px; }
.nbar { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.nbar .nb-label { width: 40px; color: var(--text-2); }
.nbar .nb-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.nbar .nb-fill { height: 100%; border-radius: 3px; }
.nbar .nb-value { width: 60px; text-align: right; color: var(--text-2); }

/* ============ 日历 ============ */
.calendar { background: #fff; border-radius: var(--r-l); padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow-card); }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-header .cal-title { font-size: 15px; font-weight: 600; }
.cal-header .cal-nav { color: var(--primary); cursor: pointer; font-size: 18px; padding: 0 8px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-week { text-align: center; font-size: 11px; color: var(--text-3); padding: 4px 0; }
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
}
.cal-day.other { color: var(--text-disabled); }
.cal-day.today { background: var(--primary); color: #fff; }
.cal-day.dialysis { background: var(--dialysis-light); color: var(--dialysis); font-weight: 600; }
.cal-day.dialysis::after { content: ''; position: absolute; bottom: 2px; width: 4px; height: 4px; background: var(--dialysis); border-radius: 50%; }
.cal-day.dialysis.today { background: var(--dialysis); color: #fff; }

/* ============ 报告 ============ */
.report-table { width: 100%; font-size: 12px; }
.report-table th { text-align: left; padding: 8px 6px; background: var(--bg); color: var(--text-2); font-weight: 500; }
.report-table td { padding: 10px 6px; border-bottom: 1px solid var(--border); }
.report-table .status-normal { color: var(--success); }
.report-table .status-high { color: var(--danger); }
.report-table .status-low { color: var(--warning); }

/* ============ 消息/通知 ============ */
.msg-item { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.msg-item:last-child { border-bottom: none; }
.msg-item .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary-light); color: var(--primary-dark); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.msg-item .msg-content { flex: 1; }
.msg-item .msg-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.msg-item .msg-desc { font-size: 12px; color: var(--text-3); }
.msg-item .msg-time { font-size: 11px; color: var(--text-3); }

/* ============ 浮动按钮 ============ */
.fab {
  position: fixed;
  right: calc(50% - 175px + 16px);
  bottom: 80px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: var(--shadow-float);
  cursor: pointer;
  z-index: 90;
  border: none;
}

/* ============ 滚动加载提示 ============ */
.load-more { text-align: center; padding: 12px; color: var(--text-3); font-size: 12px; }

/* ============ 统计图表占位 ============ */
.chart-placeholder {
  height: 160px;
  background: linear-gradient(180deg, var(--primary-light) 0%, #fff 100%);
  border-radius: var(--r-m);
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  padding: 12px;
  gap: 6px;
}
.chart-bar { flex: 1; background: var(--primary); border-radius: 3px 3px 0 0; min-height: 8px; opacity: 0.8; }

/* 角色徽章 */
.role-badge { display: inline-block; padding: 2px 8px; border-radius: var(--r-s); font-size: 10px; font-weight: 500; margin-left: 6px; }
.role-badge.patient { background: var(--primary-light); color: var(--primary-dark); }
.role-badge.family { background: var(--warning-light); color: var(--warning); }
.role-badge.doctor { background: var(--dialysis-light); color: var(--dialysis); }
.role-badge.center { background: var(--danger-light); color: var(--danger); }

/* ============ 紧凑数据卡片（首页今日/累计）============ */
.nutrition-section {
  background: #fff;
  border-radius: var(--r-l);
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-card);
}
.ns-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.ns-title { font-size: 13px; font-weight: 600; color: var(--text-1); }
.ns-sub { font-size: 10px; color: var(--text-3); }
.ns-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.ns-item {
  background: var(--bg);
  border-radius: var(--r-m);
  padding: 6px 4px;
  text-align: center;
}
.ns-item .nsi-icon { font-size: 12px; }
.ns-item .nsi-label { font-size: 10px; color: var(--text-3); margin: 1px 0; }
.ns-item .nsi-value { font-size: 12px; font-weight: 600; color: var(--text-1); }
.ns-item .nsi-progress {

    // 今日运营数据概览
    html += `<div class="compact-overview">
      <div class="co-card" onclick="goSubPage('centerPatients')">
        <div class="coc-icon">👥</div>
        <div class="coc-label">总患者</div>
        <div class="coc-value">${totalPatients}</div>
      </div>
      <div class="co-card" onclick="goSubPage('centerDoctors')">

    html += `<div class="card">
      <div class="card-title">本月运营数据</div>
      <div class="overview-grid">
        <div class="overview-card"><div class="oc-icon">📈</div><div class="oc-title">新增患者</div><div class="oc-value">8</div><div class="oc-sub">较上月 +2</div></div>
        <div class="overview-card"><div class="oc-icon">🏥</div><div class="oc-title">透析次数</div><div class="oc-value">1,536</div><div class="oc-sub">完成率 98%</div></div>
        <div class="overview-card"><div class="oc-icon">📊</div><div class="oc-title">饮水达标</div><div class="oc-value">82%</div><div class="oc-sub">本月</div></div>
        <div class="overview-card"><div class="oc-icon">💊</div><div class="oc-title">用药依从</div><div class="oc-value">91%</div><div class="oc-sub">本月</div></div>

    </div>`;

    // 医生管理
    html += `<div class="card">

      <div class="overview-grid">

function renderPatientList(list) {
  return list.map(p => `
    <div class="msg-item" onclick="goSubPage('patientDetail', '${p.id}')">
      <div class="msg-avatar">${p.avatar}</div>
      <div class="msg-content">
        <div class="msg-title">${p.name} · ${p.age}岁 · ${p.gender}</div>
        <div class="msg-desc">${p.dialysisType} · 透析${p.years}年 · 最后打卡：${p.lastCheckin}</div>
      </div>
      <span class="tag ${p.alert === 'normal' ? 'tag-success' : p.alert === 'warning' ? 'tag-warning' : 'tag-danger'}">${p.alert === 'normal' ? '正常' : p.alert === 'warning' ? '关注' : '异常'}</span>
    </div>
  `).join('');
}

/* ============ 打卡页（角色路由）============ */
function renderCheckin() {
  const page = document.getElementById('page-checkin');
  const role = state.currentRole;
  let html = '';

  if (role === 'patient') {
    // 患者打卡
    const c = state.checkin;
    const u = state.user;
    const honor = getCheckinHonor(u.totalCheckinDays, u.totalPoints);
    const doneCount = [c.water.done, c.weight.done, c.breakfast.done, c.lunch.done, c.dinner.done, c.medication.done === c.medication.total, c.fistula.done].filter(x => x).length;
    const total = 7;
    const percent = Math.round(doneCount / total * 100);
    const nextHonor = checkinHonorLevels.find(l => l.lv === honor.lv + 1);

    // 打卡进度
    html += `
      <div class="checkin-progress">
        <div class="ring" style="background: conic-gradient(var(--primary) ${percent}%, var(--primary-light) ${percent}%);">
          <div class="ring-text">
            <div class="ring-num">${doneCount}/${total}</div>
            <div class="ring-label">今日打卡</div>
          </div>
        </div>
        <div class="progress-text">完成度 ${percent}% · 连续 ${u.continuousDays} 天 · 累计 ${u.totalCheckinDays} 天</div>
      </div>
    `;

    // 打卡荣誉等级条（点击查看说明）
    html += `<div class="honor-bar" onclick="showModal('checkinHonor')">
      <div class="hb-icon">${honor.icon}</div>
      <div class="hb-info">
        <div class="hb-title">Lv.${honor.lv} ${honor.name} · 累计积分 ${u.totalPoints}</div>
        <div class="hb-sub">${nextHonor ? `还需 ${Math.max(0, nextHonor.minDays - u.totalCheckinDays)} 天 / ${Math.max(0, nextHonor.minPoints - u.totalPoints)} 积分升至 Lv.${nextHonor.lv} ${nextHonor.name}` : '已达最高等级'}</div>
      </div>
      <div class="hb-arrow">等级说明 ›</div>
    </div>`;

    // 今日待办（每一项都跳转详情页，不只打勾）
    html += `<div class="card">
      <div class="card-title">今日待办 <span class="more" style="color:var(--text-3);">点击进入详情</span></div>

      <div class="checkin-item ${c.breakfast.done ? 'done' : ''}" onclick="goSubPage('meal', 'breakfast')">
        <div class="ci-icon">🍳</div>
        <div class="ci-content">
          <div class="ci-title">早餐记录</div>
          <div class="ci-sub">${c.breakfast.done ? `已记录 ${c.breakfast.items.length} 项：${c.breakfast.items.map(i => i.name).join('、')}` : '点击记录今日早餐（食物、份量）'}</div>
        </div>
        <div class="ci-action">${c.breakfast.done ? '✓' : ''}</div>
      </div>

      <div class="checkin-item ${c.lunch.done ? 'done' : ''}" onclick="goSubPage('meal', 'lunch')">
        <div class="ci-icon">🍚</div>
        <div class="ci-content">
          <div class="ci-title">午餐记录</div>
          <div class="ci-sub">${c.lunch.done ? `已记录 ${c.lunch.items.length} 项：${c.lunch.items.map(i => i.name).join('、')}` : '点击记录今日午餐'}</div>
        </div>
        <div class="ci-action">${c.lunch.done ? '✓' : ''}</div>
      </div>

      <div class="checkin-item ${c.dinner.done ? 'done' : ''}" onclick="goSubPage('meal', 'dinner')">
        <div class="ci-icon">🍜</div>
        <div class="ci-content">
          <div class="ci-title">晚餐记录</div>
          <div class="ci-sub">${c.dinner.done ? `已记录 ${c.dinner.items.length} 项：${c.dinner.items.map(i => i.name).join('、')}` : '点击记录今日晚餐'}</div>
        </div>
        <div class="ci-action">${c.dinner.done ? '✓' : ''}</div>
      </div>

      <div class="checkin-item ${c.water.done ? 'done' : ''}" onclick="goSubPage('water')">
        <div class="ci-icon">💧</div>
        <div class="ci-content">
          <div class="ci-title">饮水打卡</div>
          <div class="ci-sub">${c.water.current}/${c.water.target}ml · 剩余 ${c.water.target - c.water.current}ml · 点击记录每次饮水</div>
        </div>
        <div class="ci-action">${c.water.done ? '✓' : ''}</div>
      </div>

      <div class="checkin-item ${c.weight.done ? 'done' : ''}" onclick="goSubPage('weight')">
        <div class="ci-icon">⚖</div>
        <div class="ci-content">
          <div class="ci-title">体重记录</div>
          <div class="ci-sub">${c.weight.done ? `已记录 ${c.weight.value}kg · 较干体重 ${(c.weight.value - u.patientInfo.dryWeight).toFixed(1)}kg` : '点击记录今日晨起空腹体重'}</div>
        </div>
        <div class="ci-action">${c.weight.done ? '✓' : ''}</div>
      </div>

      <div class="checkin-item ${c.medication.done === c.medication.total ? 'done' : ''}" onclick="goSubPage('medication')">
        <div class="ci-icon">💊</div>
        <div class="ci-content">
          <div class="ci-title">用药打卡</div>
          <div class="ci-sub">已服 ${c.medication.done}/${c.medication.total} · 剩余 ${c.medication.total - c.medication.done} 项 · 点击逐项确认</div>
        </div>
        <div class="ci-action">${c.medication.done === c.medication.total ? '✓' : ''}</div>
      </div>

      <div class="checkin-item ${c.fistula.done ? 'done' : ''}" onclick="goSubPage('fistula')">
        <div class="ci-icon">💉</div>
        <div class="ci-content">
          <div class="ci-title">内瘘检查</div>
          <div class="ci-sub">${c.fistula.done ? `已检查 ${c.fistula.items.length} 项` : '点击完成震颤/温度/皮肤/杂音检查'}</div>
        </div>
        <div class="ci-action">${c.fistula.done ? '✓' : ''}</div>
      </div>
    </div>`;

    // 快捷饮水打卡
    html += `<div class="card">
      <div class="card-title">快捷饮水</div>
      <div class="overview-grid">
        <button class="btn btn-secondary" onclick="quickAddWater(50)">+50ml</button>
        <button class="btn btn-secondary" onclick="quickAddWater(100)">+100ml</button>
        <button class="btn btn-secondary" onclick="quickAddWater(150)">+150ml</button>
        <button class="btn btn-secondary" onclick="quickAddWater(250)">+250ml</button>
      </div>
      <button class="btn btn-outline btn-block" style="margin-top:8px;" onclick="showModal('customWater')">自定义水量</button>
    </div>`;

    // 完成打卡按钮
    html += `<button class="btn btn-primary btn-block" onclick="showToast('打卡完成！+10积分')">完成今日打卡</button>`;
  } else if (role === 'family') {
    // 家属查看患者打卡
    html += `
      <div class="card">
        <div class="card-title">患者今日打卡情况</div>
        <div class="checkin-progress">
          <div class="ring" style="background: conic-gradient(var(--primary) 43%, var(--primary-light) 43%);">
            <div class="ring-text"><div class="ring-num">3/7</div><div class="ring-label">完成度</div></div>
          </div>
        </div>
        <div class="checkin-item done"><div class="ci-icon">🍳</div><div class="ci-content"><div class="ci-title">早餐记录</div><div class="ci-sub">已完成 · 鸡蛋+馒头+小米粥</div></div><div class="ci-action">✓</div></div>
        <div class="checkin-item"><div class="ci-icon">🍚</div><div class="ci-content"><div class="ci-title">午餐记录</div><div class="ci-sub">尚未记录</div></div><div class="ci-action"></div></div>
        <div class="checkin-item"><div class="ci-icon">💧</div><div class="ci-content"><div class="ci-title">饮水打卡</div><div class="ci-sub">650/1000ml</div></div><div class="ci-action"></div></div>
      </div>
      <div class="card">
        <div class="card-title">关怀操作</div>
        <button class="btn btn-secondary btn-block" style="margin-bottom:8px;" onclick="showModal('sendCare')">发送提醒</button>
        <button class="btn btn-outline btn-block" onclick="goSubPage('patientDetail')">查看健康档案</button>
      </div>
    `;
  } else {
    // 医生/中心汇总
    html += `
      <div class="card">
        <div class="card-title">本中心患者打卡汇总</div>
        <div class="overview-grid">
          <div class="overview-card"><div class="oc-icon">✓</div><div class="oc-title">今日已打卡</div><div class="oc-value">98/128</div><div class="oc-sub">完成率 76.6%</div></div>
          <div class="overview-card"><div class="oc-icon">⚠</div><div class="oc-title">异常人数</div><div class="oc-value">3</div><div class="oc-sub">需关注</div></div>
          <div class="overview-card"><div class="oc-icon">💧</div><div class="oc-title">饮水达标</div><div class="oc-value">82%</div><div class="oc-sub">今日</div></div>
          <div class="overview-card"><div class="oc-icon">💊</div><div class="oc-title">用药依从</div><div class="oc-value">91%</div><div class="oc-sub">今日</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">异常患者列表</div>
        ${mockData.centerPatients.filter(p => p.alert !== 'normal').map(p => `
          <div class="msg-item" onclick="goSubPage('patientDetail', '${p.id}')">
            <div class="msg-avatar">${p.avatar}</div>
            <div class="msg-content"><div class="msg-title">${p.name} · ${p.alert === 'danger' ? '体重超标' : '饮水偏多'}</div><div class="msg-desc">干体重${p.dryWeight}kg 今日${p.todayWeight}kg</div></div>
            <span class="tag ${p.alert === 'danger' ? 'tag-danger' : 'tag-warning'}">${p.alert === 'danger' ? '危险' : '警告'}</span>
          </div>
        `).join('')}
      </div>
      <div class="card">
        <div class="card-title">全部患者</div>
        ${renderPatientList(mockData.centerPatients)}
      </div>

  }

  page.innerHTML = html;

function toggleCheckin(type) {
  const c = state.checkin;
  if (type === 'breakfast') c.breakfast.done = !c.breakfast.done;
  else if (type === 'lunch') c.lunch.done = !c.lunch.done;
  else if (type === 'dinner') c.dinner.done = !c.dinner.done;
  else if (type === 'fistula') { c.fistula.done = !c.fistula.done; showToast(c.fistula.done ? '内瘘检查已记录' : '已取消'); }
  renderCheckin();
  renderHome();
}

function quickAddWater(amount) {
  state.checkin.water.current = Math.min(state.checkin.water.target, state.checkin.water.current + amount);
  if (state.checkin.water.current >= state.checkin.water.target) state.checkin.water.done = true;
  showToast(`已记录 +${amount}ml 饮水`);
  renderCheckin();
  renderHome();
}

/* ============ 子页面路由 ============ */
function goSubPage(page, param) {
  state.pageStack.push({ tab: state.currentTab, subPage: state.currentSubPage });
  state.currentSubPage = page;
  renderSubPage(page, param);
  // 隐藏TabBar对应高亮，显示返回
  document.getElementById('navLeft').textContent = '‹';
  document.getElementById('navLeft').style.cursor = 'pointer';
  // 显示子页面
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-sub').classList.add('active');
  // 隐藏底部Tab高亮（保留显示）
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  // 显示FAB（部分页面）
  const showFab = ['aiCamera'].includes(page) || (page === 'recipes' && state.currentRole !== 'center');
  document.getElementById('fab').classList.toggle('hidden', !showFab);
}

function goBack() {
  if (state.pageStack.length > 0) {
    const prev = state.pageStack.pop();
    state.currentSubPage = prev.subPage;
    state.currentTab = prev.tab;
    // 恢复TabBar高亮
    document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === state.currentTab));
    if (prev.subPage) {
      // 上一级仍是子页面，保持 sub-page active 并重新渲染
      document.getElementById('page-sub').classList.add('active');
      renderSubPage(prev.subPage);
    } else {
      // 上一级是 tab 页面，隐藏 sub-page，显示对应 tab
      document.getElementById('page-sub').classList.remove('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + state.currentTab).classList.add('active');
    }
    updateNavBar();
    // 滚动到顶
    document.getElementById('content').scrollTop = 0;
  }
}

function renderWaterPage() {
  const c = state.checkin.water;
  const percent = Math.min(100, Math.round(c.current / c.target * 100));
  const exceeded = c.current > c.target;
  const overflow = exceeded ? c.current - c.target : 0;
  const remain = exceeded ? 0 : c.target - c.current;
  const days = ['6天前', '5天前', '4天前', '3天前', '2天前', '昨天', '今日'];
  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
        <div style="font-size:14px;color:var(--text-2);">今日饮水</div>
        <div style="font-size:12px;color:var(--text-3);">额度 ${c.target}ml</div>
      </div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:14px;">
        <span style="font-size:36px;font-weight:600;color:${exceeded ? 'var(--danger)' : 'var(--primary)'};line-height:1;">${c.current}</span>
        <span style="font-size:14px;color:var(--text-3);">/ ${c.target}ml</span>
        ${exceeded ? `<span class="tag tag-danger" style="margin-left:6px;">已超标 ${overflow}ml</span>` : ''}
      </div>
      <div style="position:relative;height:14px;background:var(--bg);border-radius:7px;overflow:hidden;">
        <div style="height:100%;width:${percent}%;background:${exceeded ? 'var(--danger)' : 'var(--primary)'};border-radius:7px;transition:width 0.3s;"></div>
        <div style="position:absolute;top:-2px;left:100%;width:2px;height:18px;background:var(--text-3);opacity:0.5;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-top:6px;">
        <span>${exceeded ? `⚠ 已超额度 ${overflow}ml` : `剩余 ${remain}ml 可饮用`}</span>
        <span>${percent}%</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">快速记录</div>
      <div class="overview-grid">
        <button class="btn btn-secondary" onclick="quickAddWater(50)">50ml</button>
        <button class="btn btn-secondary" onclick="quickAddWater(100)">100ml</button>
        <button class="btn btn-secondary" onclick="quickAddWater(150)">150ml</button>
        <button class="btn btn-secondary" onclick="quickAddWater(200)">200ml</button>
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:10px;" onclick="showModal('customWater')">自定义水量</button>
    </div>
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>近7日饮水趋势</span>
        <span style="font-size:11px;color:var(--text-3);font-weight:normal;">红线为限额 ${c.target}ml</span>
      </div>
      <div class="chart-placeholder" style="flex-direction:column;align-items:stretch;padding:12px 8px 8px;height:auto;background:#fff;border:1px solid var(--border);">
        ${mockData.waterTrend.map((v, i) => {
          const over = v > c.target;
          const h = Math.max(8, v / 1100 * 110);
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
            <span style="width:40px;font-size:11px;color:var(--text-3);">${days[i]}</span>
            <div style="flex:1;height:18px;background:var(--bg);border-radius:4px;position:relative;overflow:hidden;">
              <div style="height:100%;width:${Math.min(100, v / 1100 * 100)}%;background:${over ? 'var(--danger)' : 'var(--primary)'};border-radius:4px;opacity:0.85;"></div>
              <div style="position:absolute;top:0;left:${c.target / 1100 * 100}%;width:1px;height:100%;background:var(--danger);opacity:0.6;"></div>
            </div>
            <span style="width:48px;text-align:right;font-size:11px;font-weight:600;color:${over ? 'var(--danger)' : 'var(--text-1)'};">${v}ml${over ? ' ⚠' : ''}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderMedicationPage() {
  const meds = state.user.patientInfo.medications;
  const todayMeds = meds.filter(m => m.enabled && m.time !== '透析日');
  const takenCount = state.checkin.medication.done;
  return `
    <div class="card">
      <div class="card-title">今日用药 (${takenCount}/${state.checkin.medication.total})</div>
      ${todayMeds.map((m, i) => {
        const taken = i < takenCount;
        return `
        <div class="checkin-item ${taken ? 'done' : ''}" onclick="toggleMedication(${i})">
          <div class="ci-icon">💊</div>
          <div class="ci-content">
            <div class="ci-title">${m.name} <span class="tag tag-primary" style="margin-left:4px;">${m.category}</span></div>
            <div class="ci-sub">${m.brand} · ${m.dosage} · ${m.time} · ${m.timing}</div>
          </div>
          <div class="ci-action">${taken ? '✓' : ''}</div>
        </div>
      `}).join('')}
    </div>
    <div class="card">
      <div class="card-title">透析日用药</div>
      ${meds.filter(m => m.time === '透析日').map(m => `
        <div class="checkin-item">
          <div class="ci-icon">💉</div>
          <div class="ci-content">
            <div class="ci-title">${m.name} <span class="tag tag-dialysis">${m.category}</span></div>
            <div class="ci-sub">${m.brand} · ${m.dosage} · ${m.timing}</div>
          </div>
          <span class="tag tag-dialysis">透析日</span>
        </div>
      `).join('')}
    </div>
    <div class="card">
      <div class="card-title">用药管理</div>
      <p style="font-size:12px;color:var(--text-3);margin-bottom:8px;">添加、编辑或停用药物方案</p>
      <button class="btn btn-secondary btn-block" onclick="goSubPage('medicationManage')">进入用药管理</button>
    </div>
  `;
}

function toggleMedication(index) {
  const c = state.checkin;
  if (index < c.medication.done) {
    c.medication.done = index;
  } else if (index === c.medication.done) {
    c.medication.done = index + 1;
    showToast('已记录服药');
  } else {
    showToast('请按顺序服药');
    return;
  }
  renderCheckin();
  renderSubPage('medication');
  renderHome();
}

function renderMealPage(type) {
  const meal = state.checkin[type];
  const mealName = type === 'breakfast' ? '早餐' : type === 'lunch' ? '午餐' : '晚餐';
  return `
    <div class="card">
      <div class="card-title">${mealName}记录 <span class="more">${meal.done ? '已完成' : '待记录'}</span></div>
      ${meal.items.length === 0 ? '<div class="empty"><div class="empty-icon">🍽</div>暂未记录食物</div>' : `
        ${meal.items.map((item, i) => `
          <div class="checkin-item done">
            <div class="ci-icon">🍴</div>
            <div class="ci-content"><div class="ci-title">${item.name}</div><div class="ci-sub">${item.amount}</div></div>
            <div class="ci-action">✓</div>
          </div>
        `).join('')}
      `}
    </div>
    <div class="card">
      <div class="card-title">添加食物</div>
      <div class="form-group"><label class="form-label">食物名称</label><input class="form-input" id="foodName" placeholder="如：鸡蛋、馒头"></div>
      <div class="form-group"><label class="form-label">份量</label><input class="form-input" id="foodAmount" placeholder="如：1个、100g、1碗"></div>
      <div class="form-group"><label class="form-label">快速选择</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${['鸡蛋','馒头','粥','米饭','青菜','鱼肉','豆腐','苹果','牛奶'].map(f => `<span class="tag tag-primary" style="cursor:pointer;" onclick="document.getElementById('foodName').value='${f}'">${f}</span>`).join('')}
        </div>
      </div>
      <button class="btn btn-primary btn-block" onclick="addMealItem('${type}')">添加食物</button>
      <button class="btn btn-outline btn-block" style="margin-top:8px;" onclick="goSubPage('aiCamera')">📸 拍照识别</button>
    </div>
    ${meal.items.length > 0 ? `
      <button class="btn btn-primary btn-block" onclick="finishMeal('${type}')">完成${mealName}记录</button>
    ` : ''}
  `;
}

function addMealItem(type) {
  const name = document.getElementById('foodName').value.trim();
  const amount = document.getElementById('foodAmount').value.trim() || '适量';
  if (!name) { showToast('请输入食物名称'); return; }
  state.checkin[type].items.push({ name, amount });
  showToast('已添加 ' + name);
  renderSubPage('meal', type);
}

function finishMeal(type) {
  state.checkin[type].done = true;
  showToast('已完成记录');
  goBack();
  renderCheckin();
  renderHome();
}

function renderFistulaPage() {
  const checks = [
    { id: 'thrill', name: '震颤', desc: '触摸内瘘处有猫喘样震颤感', icon: '✋' },
    { id: 'temperature', name: '温度', desc: '内瘘侧皮温与对侧相近', icon: '🌡' },
    { id: 'skin', name: '皮肤', desc: '皮肤完整，无红肿、破溃', icon: '👀' },
    { id: 'bruit', name: '杂音', desc: '听诊有连续性吹风样杂音', icon: '👂' }
  ];
  const doneItems = state.checkin.fistula.items;
  return `
    <div class="card">
      <div class="card-title">内瘘检查 ${state.checkin.fistula.done ? '<span class="tag tag-success">已完成</span>' : '<span class="tag tag-warning">待完成</span>'}</div>
      <p style="font-size:12px;color:var(--text-3);margin-bottom:10px;">每日检查内瘘通畅情况，发现异常请立即就医</p>
      ${checks.map(c => {
        const done = doneItems.includes(c.id);
        return `
        <div class="checkin-item ${done ? 'done' : ''}" onclick="toggleFistula('${c.id}')">
          <div class="ci-icon">${c.icon}</div>
          <div class="ci-content">
            <div class="ci-title">${c.name}</div>
            <div class="ci-sub">${c.desc}</div>
          </div>
          <div class="ci-action">${done ? '✓' : ''}</div>
        </div>
      `}).join('')}
    </div>
    <div class="card">
      <div class="card-title">异常记录</div>
      <div class="form-group"><label class="form-label">如有异常请描述</label><textarea class="form-textarea" placeholder="如：震颤减弱、皮肤发红..."></textarea></div>
      <div style="font-size:11px;color:var(--danger);margin-bottom:8px;">⚠ 发现异常请立即联系医生</div>
      <button class="btn btn-outline btn-block" onclick="showToast('已记录异常，建议立即就医')">记录异常</button>
    </div>
    ${doneItems.length === 4 ? `<button class="btn btn-primary btn-block" onclick="finishFistula()">完成检查</button>` : ''}
  `;
}

function toggleFistula(id) {
  const items = state.checkin.fistula.items;
  const idx = items.indexOf(id);
  if (idx >= 0) items.splice(idx, 1);
  else items.push(id);
  renderSubPage('fistula');
}

function finishFistula() {
  state.checkin.fistula.done = true;
  showToast('内瘘检查已完成');
  goBack();
  renderCheckin();
  renderHome();
}

/* ============ 菜谱智能推荐算法 ============ */
// 输入：菜谱列表，返回 [{ recipe, score, reasons[], preview{} }]
// 算法维度：剩余额度 + 累计趋势 + 透析临近 + 口味偏好
function getRecipeRecommendations(recipes) {
  const u = state.user;
  const pi = u.patientInfo;
  const tn = state.todayNutrition;
  const cn = state.cumulativeNutrition;
  const tp = u.tastePrefs || { cuisines: [], avoidIngredients: [], preferCategories: [], spiceLevel: '不辣' };

  // 距下次透析判断（简化：cn.nextDialysisDate 字符串）
  const nextDialysisTomorrow = (cn.nextDialysisDate || '').indexOf('明') >= 0;
  const daysFromLast = cn.daysFromLastDialysis || 0;

  // 每项限额
  const limits = {
    potassium: pi.potassiumLimit,
    phosphorus: pi.phosphorusLimit,
    sodium: pi.sodiumLimit,
    protein: pi.proteinLimit,
    calories: pi.caloriesLimit,
    water: pi.waterLimit
  };

  // 今日剩余额度（吃完这道菜之前）
  const remain = {
    potassium: limits.potassium - tn.potassium,
    phosphorus: limits.phosphorus - tn.phosphorus,
    sodium: limits.sodium - tn.sodium,
    protein: limits.protein - tn.protein,
    calories: limits.calories - tn.calories,
    water: limits.water - tn.water
  };

  // 累计已摄入占累计天数均额的比例（>1 表示偏高）
  const dailyAvg = {
    potassium: cn.potassium / Math.max(1, daysFromLast),
    phosphorus: cn.phosphorus / Math.max(1, daysFromLast),
    sodium: cn.sodium / Math.max(1, daysFromLast)
  };
  const cumulativeRatio = {
    potassium: dailyAvg.potassium / limits.potassium,
    phosphorus: dailyAvg.phosphorus / limits.phosphorus,
    sodium: dailyAvg.sodium / limits.sodium
  };

  // 透析临近时钾/磷权重加强
  const dialysisFactor = nextDialysisTomorrow ? 1.5 : 1.0;

  const results = recipes.map(r => {
    // 菜谱元素含量（统一字段名，菜谱可能缺失 water/protein 字段，用估算）
    const nutr = r.nutrition || {};
    const rk = nutr.k || 0;
    const rp = nutr.p || 0;
    const rs = nutr.s || 0;
    const rcal = nutr.calories || 0;
    // 菜谱未含 water/protein，按经验估算：蛋白按热量×6%（g），水忽略
    const rprot = nutr.protein !== undefined ? nutr.protein : Math.round(rcal * 0.06);
    const rwater = 0;

    // 1. 营养契合度评分（0-60 分基准）
    let nutritionScore = 60;
    const reasons = [];
    const preview = {
      potassium: { before: tn.potassium, after: tn.potassium + rk, limit: limits.potassium },
      phosphorus: { before: tn.phosphorus, after: tn.phosphorus + rp, limit: limits.phosphorus },
      sodium: { before: tn.sodium, after: tn.sodium + rs, limit: limits.sodium },
      protein: { before: tn.protein, after: tn.protein + rprot, limit: limits.protein },
      calories: { before: tn.calories, after: tn.calories + rcal, limit: limits.calories }
    };
    const overflows = [];

    // 钾
    const afterK = remain.potassium - rk;
    if (afterK < 0) {
      nutritionScore -= Math.min(30, Math.abs(afterK) / 100 * 5 * dialysisFactor);
      overflows.push('钾');
    } else if (afterK < limits.potassium * 0.2) {
      // 剩余较少但未超
      nutritionScore -= 3;
    } else if (rk <= limits.potassium * 0.1) {
      // 菜谱本身钾含量很低
      reasons.push(`钾仅 ${rk}mg，占额度 ${Math.round(rk / limits.potassium * 100)}%`);
      nutritionScore += 5;
    }

    // 磷
    const afterP = remain.phosphorus - rp;
    if (afterP < 0) {
      nutritionScore -= Math.min(30, Math.abs(afterP) / 50 * 5 * dialysisFactor);
      overflows.push('磷');
    } else if (rp <= limits.phosphorus * 0.15) {
      reasons.push(`磷仅 ${rp}mg，安全无忧`);
      nutritionScore += 4;
    }

    // 钠
    const afterS = remain.sodium - rs;
    if (afterS < 0) {
      nutritionScore -= Math.min(25, Math.abs(afterS) / 100 * 4);
      overflows.push('钠');
    } else if (rs <= limits.sodium * 0.15) {
      nutritionScore += 3;
    }

    // 蛋白（透析患者需要补蛋白，但也不能过量）
    const afterProt = remain.protein - rprot;
    if (afterProt < 0) {
      nutritionScore -= Math.min(15, Math.abs(afterProt) * 2);
      overflows.push('蛋白');
    } else if (rprot >= 15 && afterProt > 0) {
      // 优质蛋白菜谱加分
      reasons.push(`蛋白 ${rprot}g，补蛋白优选`);
      nutritionScore += 6;
    }

    // 热量
    const afterCal = remain.calories - rcal;
    if (afterCal < 0) {
      nutritionScore -= Math.min(10, Math.abs(afterCal) / 50);
      overflows.push('热量');
    }

    // 累计趋势扣分
    if (cumulativeRatio.potassium > 0.9) {
      nutritionScore -= rk > 200 ? 8 : 3;
      if (rk > 200) reasons.push(`⚠ 近${daysFromLast}日钾摄入偏高，建议选低钾`);
    }
    if (cumulativeRatio.phosphorus > 0.9) {
      nutritionScore -= rp > 100 ? 8 : 3;
    }

    // 超额度警告
    if (overflows.length > 0) {
      reasons.unshift(`⚠ 食后将超出${overflows.join('、')}额度`);
    }

    nutritionScore = Math.max(0, Math.min(60, nutritionScore));

    // 2. 口味偏好评分（0-30 分）
    let tasteScore = 15;
    // 偏好分类
    if (tp.preferCategories && tp.preferCategories.includes(r.category)) {
      tasteScore += 8;
      reasons.push(`符合偏好分类"${r.category}"`);
    }
    // 偏好菜系（菜谱分类或描述中含关键词）
    const text = r.name + r.desc + r.category;
    if (tp.cuisines && tp.cuisines.length > 0) {
      const matched = tp.cuisines.filter(c => text.indexOf(c) >= 0);
      if (matched.length > 0) {
        tasteScore += 5;
      }
    }
    // 辣度匹配
    const spicy = r.desc && (r.desc.indexOf('辣') >= 0);
    if (tp.spiceLevel === '不辣' && !spicy) {
      tasteScore += 2;
    } else if (tp.spiceLevel !== '不辣' && spicy) {
      tasteScore += 2;
    } else if (tp.spiceLevel === '不辣' && spicy) {
      tasteScore -= 5;
      reasons.push(`⚠ 含辣，不符合"不辣"偏好`);
    }
    // 忌口食材扣分
    if (tp.avoidIngredients && tp.avoidIngredients.length > 0) {
      const hitAvoid = tp.avoidIngredients.filter(ing => text.indexOf(ing) >= 0);
      if (hitAvoid.length > 0) {
        tasteScore -= 15;
        reasons.unshift(`❌ 含忌口食材：${hitAvoid.join('、')}`);
      }
    }
    tasteScore = Math.max(0, Math.min(30, tasteScore));

    // 3. 热度加分（0-10）
    const heatScore = Math.min(10, r.likes / 50);

    const totalScore = Math.round(nutritionScore + tasteScore + heatScore);

    // 默认推荐理由：若没生成，补一句
    if (reasons.length === 0) {
      reasons.push('营养均衡，可放心食用');
    }

    return {
      recipe: r,
      score: Math.max(0, Math.min(100, totalScore)),
      reasons: reasons.slice(0, 3),
      preview,
      proteinEstimate: rprot
    };
  });

  // 按分数倒序
  results.sort((a, b) => b.score - a.score);
  return results;
}

function recordRecipeToToday(recipeId) {
  const r = mockData.recipes.find(x => x.id === recipeId);
  if (!r) return;
  const tn = state.todayNutrition;
  const nutr = r.nutrition || {};
  tn.potassium += (nutr.k || 0);

  tn.sodium += (nutr.s || 0);
  tn.calories += (nutr.calories || 0);
  tn.protein += (nutr.protein !== undefined ? nutr.protein : Math.round((nutr.calories || 0) * 0.06));
  showToast(`已记录"${r.name}"到今日饮食`);

}

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const dialysisDays = [3, 5, 10, 12, 17, 19, 24, 26]; // 模拟透析日

  const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
  let html = `<div class="calendar"><div class="cal-header"><div class="cal-nav">‹</div><div class="cal-title">${year}年${month + 1}月</div><div class="cal-nav">›</div></div><div class="cal-grid">`;
  weekDays.forEach(w => html += `<div class="cal-week">${w}</div>`);
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day other"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    let cls = 'cal-day';
    if (dialysisDays.includes(d)) cls += ' dialysis';
    if (d === day) cls += ' today';
    html += `<div class="${cls}" onclick="showToast('${year}-${month+1}-${d} ${dialysisDays.includes(d) ? '是透析日' : ''}')">${d}</div>`;
  }
  html += `</div></div>`;

  html += `
    <div class="card">
      <div class="card-title">本月统计</div>
      <div class="overview-grid">
        <div class="overview-card"><div class="oc-icon">💉</div><div class="oc-title">透析次数</div><div class="oc-value">8</div><div class="oc-sub">已完成</div></div>

// 医生/中心：录入新检验报告
function addLabReport() {
  const today = new Date().toISOString().slice(0, 10);
  const items = [];
  const defs = [
    { id: 'lab_k', name: '血钾 K+', ref: [3.5, 5.5], unit: 'mmol/L' },
    { id: 'lab_p', name: '血磷 P', ref: [0.8, 1.6], unit: 'mmol/L' },
    { id: 'lab_na', name: '血钠 Na+', ref: [135, 145], unit: 'mmol/L' },
    { id: 'lab_hb', name: '血红蛋白 Hb', ref: [110, 160], unit: 'g/L' },
    { id: 'lab_bun', name: '尿素氮 BUN', ref: [2.9, 7.5], unit: 'mmol/L' },
    { id: 'lab_cr', name: '肌酐 Cr', ref: [40, 110], unit: 'μmol/L' }
  ];
  defs.forEach(d => {
    const v = document.getElementById(d.id).value.trim();
    if (v === '') return;
    const num = parseFloat(v);
    let status = 'normal';
    if (num < d.ref[0]) status = 'low';
    else if (num > d.ref[1]) status = 'high';
    items.push({ name: d.name, value: v, ref: d.ref[0] + '-' + d.ref[1], unit: d.unit, status });
  });
  if (items.length === 0) { showToast('请至少填写一项检验数据'); return; }
  mockData.labReports.unshift({ date: today, items });
  showToast('已录入检验报告');
  closeModal();
  if (state.currentSubPage) renderSubPage(state.currentSubPage);
}

/* ============ Tab 切换 ============ */
function switchTab(tab) {
  state.currentTab = tab;
  state.currentSubPage = null;
  state.pageStack = [];
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('fab').classList.add('hidden');
  updateNavBar();
  // 滚动到顶
  document.getElementById('content').scrollTop = 0;
}

function updateNavBar() {
  const titles = { home: '透析伴侣', checkin: '打卡', recipe: '菜谱', community: '社区', profile: '我的' };
  document.getElementById('navTitle').textContent = titles[state.currentTab] || '透析伴侣';
  document.getElementById('navLeft').textContent = '';
  document.getElementById('navLeft').style.cursor = 'default';
  document.getElementById('navRight').innerHTML = '';
}

function handleAlert(action) {
  if (action === 'setEmergency') goSubPage('emergencyContact');
  else if (action === 'switchCheckin') switchTab('checkin');
}

  } else if (type === 'confirmDeleteTopic') {
    const t = mockData.topics.find(x => x.id === param1);
    html = `<div class="modal-title">删除话题</div>
      <div style="font-size:13px;line-height:1.8;margin-bottom:12px;">
        确定要删除话题 <strong>${t ? t.title : ''}</strong> 吗？
        <div style="color:var(--text-3);font-size:12px;margin-top:6px;">删除后不可恢复，相关评论和数据将一并清除。</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" style="flex:1;background:var(--danger);" onclick="deleteTopic('${param1}')">确认删除</button>
      </div>`;
  } else if (type === 'newDoctorOrder') {
    const today = new Date().toISOString().slice(0, 10);
    const currentPatient = mockData.centerPatients.find(p => p.id === (state.medicalDataPatient || 'p1')) || {};
    html = `<div class="modal-title">下达新医嘱</div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:8px;">患者：<strong>${currentPatient.name || ''}</strong> · 下达日期：${today}</div>
      <div class="form-group"><label class="form-label">医嘱类型 *</label>
        <select class="form-select" id="newOrderType">
          <option>治疗方案</option>
          <option>饮食建议</option>
          <option>用药调整</option>
          <option>检查要求</option>
          <option>其他</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">医嘱内容 *</label><textarea class="form-textarea" id="newOrderContent" rows="5" placeholder="请输入详细医嘱内容..."></textarea></div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:10px;">提交后患者端"医嘱记录"将立即同步显示</div>
      <div class="modal-actions">
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" style="flex:1;" onclick="addDoctorOrder()">下达医嘱</button>
      </div>`;
  } else if (type === 'newLabReport') {
    const today = new Date().toISOString().slice(0, 10);
    html = `<div class="modal-title">录入检验报告</div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:8px;">患者：<strong>${(mockData.centerPatients.find(p => p.id === (state.medicalDataPatient || 'p1')) || {}).name || ''}</strong> · 检验日期：${today}</div>
      <div class="form-group"><label class="form-label">血钾 K+</label><input class="form-input" id="lab_k" placeholder="如 5.2"></div>
      <div class="form-group"><label class="form-label">血磷 P</label><input class="form-input" id="lab_p" placeholder="如 2.1"></div>
      <div class="form-group"><label class="form-label">血钠 Na+</label><input class="form-input" id="lab_na" placeholder="如 138"></div>
      <div class="form-group"><label class="form-label">血红蛋白 Hb</label><input class="form-input" id="lab_hb" placeholder="如 105"></div>
      <div class="form-group"><label class="form-label">尿素氮 BUN</label><input class="form-input" id="lab_bun" placeholder="如 18.5"></div>
      <div class="form-group"><label class="form-label">肌酐 Cr</label><input class="form-input" id="lab_cr" placeholder="如 720"></div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:10px;">空白项将自动跳过；状态按参考值自动判定</div>
      <div class="modal-actions">
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" style="flex:1;" onclick="addLabReport()">录入</button>
      </div>`;
  } else if (type === 'newDialysisRecord') {
    const today = new Date().toISOString().slice(0, 10);
    html = `<div class="modal-title">添加透析记录</div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:8px;">患者：<strong>${(mockData.centerPatients.find(p => p.id === (state.medicalDataPatient || 'p1')) || {}).name || ''}</strong> · 透析日期：${today}</div>
      <div class="form-group"><label class="form-label">透析类型</label>
        <select class="form-select" id="dial_type"><option>血液透析</option><option>血液滤过</option><option>血液透析滤过</option></select>
      </div>
      <div class="form-group"><label class="form-label">时长（小时）</label><input class="form-input" id="dial_duration" value="4"></div>
      <div class="form-group"><label class="form-label">透前体重 (kg)</label><input class="form-input" id="dial_pre" value="68.5"></div>
      <div class="form-group"><label class="form-label">透后体重 (kg)</label><input class="form-input" id="dial_post" value="65.8"></div>
      <div class="form-group"><label class="form-label">血流量 (ml/min)</label><input class="form-input" id="dial_bf" value="250"></div>
      <div class="form-group"><label class="form-label">透析液流量 (ml/min)</label><input class="form-input" id="dial_df" value="500"></div>
      <div class="form-group"><label class="form-label">抗凝剂</label><input class="form-input" id="dial_anti" value="低分子肝素"></div>
      <div class="form-group"><label class="form-label">并发症</label><input class="form-input" id="dial_comp" value="无"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" style="flex:1;" onclick="addDialysisRecord()">添加</button>
      </div>`;
  } else if (type === 'editTreatmentPlan') {
    const p = mockData.treatmentPlans[0];
    html = `<div class="modal-title">调整治疗方案</div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:8px;">患者：<strong>${(mockData.centerPatients.find(p => p.id === (state.medicalDataPatient || 'p1')) || {}).name || ''}</strong> · 现行方案：${p.name}</div>
      <div class="form-group"><label class="form-label">透析频次</label><input class="form-input" id="tp_freq" value="${p.frequency}"></div>
      <div class="form-group"><label class="form-label">单次时长</label><input class="form-input" id="tp_dur" value="${p.duration}"></div>
      <div class="form-group"><label class="form-label">透析日</label><input class="form-input" id="tp_sched" value="${p.schedule}"></div>
      <div class="form-group"><label class="form-label">干体重 (kg)</label><input class="form-input" id="tp_dry" type="number" step="0.1" value="${p.dryWeight}"></div>
      <div class="form-group"><label class="form-label">抗凝剂</label><input class="form-input" id="tp_anti" value="${p.anticoagulant}"></div>
      <div class="form-group"><label class="form-label">透析器</label><input class="form-input" id="tp_dialyzer" value="${p.dialyzer}"></div>
      <div class="form-group"><label class="form-label">血流量</label><input class="form-input" id="tp_bf" value="${p.bloodFlow}"></div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:10px;">调整后将自动记录到方案调整历史</div>
      <div class="modal-actions">
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" style="flex:1;" onclick="updateTreatmentPlan()">保存调整</button>
      </div>`;
  }

  modal.innerHTML = html;
  mask.classList.add('active');
}

function closeModal() {
  document.getElementById('modalMask').classList.remove('active');
}

function switchRole(role) {
  state.currentRole = role;
  closeModal();
  switchTab('home');
  render(); // 切换角色后重新渲染所有页面
}

function submitCustomWater() {
  const val = parseInt(document.getElementById('customWaterInput').value) || 0;
  if (val > 0) quickAddWater(val);
  closeModal();
}

function approveDoctor(id, approved) {
  const d = mockData.pendingDoctors.find(x => x.id === id);
  if (d) {
    if (approved) {
      d.certStatus = 'approved';
      const cd = mockData.centerDoctors.find(x => x.id === id);
      if (cd) cd.certStatus = 'approved';
      mockData.centerDoctors.find(x => x.id === id).patientCount = 0;
      showToast(`${d.name} 的认证已通过`);
    } else {
      showToast(`${d.name} 的认证已驳回`);
    }
    mockData.pendingDoctors = mockData.pendingDoctors.filter(x => x.id !== id);
  }
  closeModal();
  render();
  // 重新渲染当前页
  if (state.currentSubPage) renderSubPage(state.currentSubPage);
}

function approveContent(id, type, approved) {
  const list = type === 'recipe' ? mockData.recipes : mockData.topics;
  const item = list.find(x => x.id === id);
  if (item) {
    item.status = approved ? 'approved' : 'rejected';
    showToast(`${type === 'recipe' ? '菜谱' : '话题'}${approved ? '已通过' : '已驳回'}`);
    mockData.pendingContents = mockData.pendingContents.filter(x => x.id !== id);
  }
  closeModal();
  render();
  if (state.currentSubPage) renderSubPage(state.currentSubPage);
}

// 透析中心：审核通过菜谱/话题（从详情页直接审核）
function approveRecipe(id) {
  const r = mockData.recipes.find(x => x.id === id);
  if (r) {
    r.status = 'approved';
    mockData.pendingContents = mockData.pendingContents.filter(x => x.id !== id);
    showToast(`菜谱"${r.name}"已通过审核`);
  }
  render();
  if (state.currentSubPage) renderSubPage(state.currentSubPage);
}

function approveTopic(id) {
  const t = mockData.topics.find(x => x.id === id);
  if (t) {
    t.status = 'approved';
    mockData.pendingContents = mockData.pendingContents.filter(x => x.id !== id);
    showToast(`话题"${t.title}"已通过审核`);
  }
  render();
  if (state.currentSubPage) renderSubPage(state.currentSubPage);
}

// 透析中心：置顶/取消置顶话题
function togglePinTopic(id) {
  const t = mockData.topics.find(x => x.id === id);
  if (!t) return;
  // 同一时间只允许一个置顶帖：若本次为置顶操作，先取消其它帖子的置顶
  if (t.pinned !== true) {
    mockData.topics.forEach(x => { if (x.pinned === true) x.pinned = false; });
    t.pinned = true;
    showToast(`话题"${t.title}"已置顶`);
  } else {
    t.pinned = false;
    showToast(`话题"${t.title}"已取消置顶`);
  }
  render();
  if (state.currentSubPage) renderSubPage(state.currentSubPage);
}

// 透析中心：删除菜谱/话题
function deleteRecipe(id) {
  const r = mockData.recipes.find(x => x.id === id);
  const name = r ? r.name : '';
  mockData.recipes = mockData.recipes.filter(x => x.id !== id);
  mockData.pendingContents = mockData.pendingContents.filter(x => x.id !== id);
  showToast(`菜谱"${name}"已删除`);
  closeModal();
  // 如果当前在详情页，返回上一页
  if (state.currentSubPage && state.currentSubPage.type === 'recipeDetail') {
    goBack();
  } else {
    render();
    if (state.currentSubPage) renderSubPage(state.currentSubPage);
  }
}

function deleteTopic(id) {
  const t = mockData.topics.find(x => x.id === id);
  const title = t ? t.title : '';
  mockData.topics = mockData.topics.filter(x => x.id !== id);
  mockData.pendingContents = mockData.pendingContents.filter(x => x.id !== id);
  showToast(`话题"${title}"已删除`);
  closeModal();
  // 如果当前在详情页，返回上一页
  if (state.currentSubPage && state.currentSubPage.type === 'topicDetail') {
    goBack();
  } else {
    render();
    if (state.currentSubPage) renderSubPage(state.currentSubPage);
  }
}

/* ============ Toast 提示 ============ */
let toastTimer = null;
function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;max-width:280px;text-align:center;transition:opacity 0.3s;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  toast.style.display = 'block';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 1800);
}

/* ============ FAB 浮动按钮 ============ */
function onFabClick() {
  if (state.currentSubPage === 'recipes') {
    showModal('addRecipe');
  } else {
    showModal('addTopic');
  }
}

/* ============ 初始化 ============ */
render();
</script>
</body>
</html>
