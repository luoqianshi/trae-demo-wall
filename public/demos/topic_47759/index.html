<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Inspection Agent - Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
      50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-bounce { animation: bounce 1s infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    .animate-slide-up { animation: slideUp 0.5s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.3); border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans">
  <div class="max-w-4xl mx-auto px-4 py-12 sm:px-6">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white shadow-xl shadow-blue-600/20 mb-6">
        <i data-lucide="server" class="w-8 h-8"></i>
      </div>
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-slate-900 mb-4">Server Inspection Agent</h1>
      <p class="text-lg text-slate-600 max-w-2xl mx-auto">AI-powered server health diagnostic tool with natural language reporting</p>
    </div>

    <!-- API Key Input -->
    <div class="max-w-md mx-auto mb-8">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <i data-lucide="key" class="w-5 h-5 text-slate-400"></i>
        </div>
        <input type="password" id="apiKey" placeholder="输入 DeepSeek API Key（可选）" 
          class="w-full pl-10 pr-12 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm">
        <button onclick="toggleApiKey()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 transition-colors">
          <i data-lucide="eye" id="eyeIcon" class="w-5 h-5"></i>
        </button>
      </div>
      <p id="apiKeyHint" class="text-xs text-emerald-600 mt-2 text-center hidden">✓ API Key 已配置</p>
    </div>

    <!-- Action Area -->
    <div class="flex flex-col items-center justify-center mb-8">
      <button id="startBtn" onclick="startInspection()" 
        class="group relative inline-flex items-center justify-center gap-3 px-8 py-4 bg-slate-900 text-white rounded-full font-medium text-lg overflow-hidden transition-all hover:bg-slate-800 hover:shadow-2xl hover:shadow-slate-900/20 hover:-translate-y-0.5 active:translate-y-0">
        <i data-lucide="activity" class="w-5 h-5 text-emerald-400"></i>
        <span>Start Inspection</span>
        <i data-lucide="arrow-right" class="w-5 h-5 opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
      </button>
      <div id="statusBar" class="hidden inline-flex items-center gap-3 px-6 py-3 bg-white border border-slate-200 rounded-full shadow-sm text-slate-700 font-medium mt-4">
        <div id="statusIcon" class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <span id="statusText">Inspection Complete</span>
        <button onclick="resetInspection()" class="ml-4 px-3 py-1 text-sm bg-slate-100 hover:bg-slate-200 rounded-full transition-colors" title="重新开始">
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <!-- Terminal Output -->
    <div id="terminalSection" class="hidden animate-fade-in">
      <div class="bg-slate-950 rounded-xl border border-slate-800 p-4 font-mono text-sm text-slate-300 h-96 overflow-y-auto shadow-2xl relative scrollbar-thin">
        <div class="flex items-center gap-2 mb-4 text-slate-500 text-xs border-b border-slate-800 pb-2">
          <div class="flex gap-1.5">
            <div class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/50"></div>
            <div class="w-3 h-3 rounded-full bg-amber-500/20 border border-amber-500/50"></div>
            <div class="w-3 h-3 rounded-full bg-emerald-500/20 border border-emerald-500/50"></div>
          </div>
          <span class="ml-2 uppercase tracking-widest">Server Terminal</span>
        </div>
        <div id="terminalContent" class="space-y-3"></div>
        <div id="loadingIndicator" class="hidden flex items-center gap-2 text-slate-500 mt-4">
          <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
          <span>Processing...</span>
        </div>
      </div>
    </div>

    <!-- Report -->
    <div id="reportSection" class="hidden animate-slide-up mt-8">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-slate-50 border-b border-slate-200 p-4 sm:p-6 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
              <i data-lucide="shield-check" class="w-5 h-5"></i>
            </div>
            <div>
              <h2 class="text-lg font-semibold text-slate-900">AI Inspection Report</h2>
              <p class="text-sm text-slate-500">Generated by DeepSeek</p>
            </div>
          </div>
        </div>
        <div class="p-6 sm:p-8 prose prose-slate prose-blue max-w-none prose-headings:font-medium prose-h2:text-xl prose-h3:text-lg">
          <div id="reportContent"></div>
        </div>
      </div>
    </div>

    <!-- Chat Interface -->
    <div id="chatSection" class="hidden animate-slide-up mt-8">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-slate-50 border-b border-slate-200 p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
            <i data-lucide="bot" class="w-5 h-5"></i>
          </div>
          <div>
            <h3 class="font-semibold text-slate-900">交互式助手</h3>
            <p class="text-sm text-slate-500">基于巡检数据回答问题并提供修复建议</p>
          </div>
        </div>
        <div id="chatMessages" class="h-96 overflow-y-auto p-4 space-y-4 scrollbar-thin"></div>
        <form onsubmit="sendMessage(event)" class="border-t border-slate-200 p-4">
          <div class="flex gap-2">
            <textarea id="chatInput" placeholder="输入你的问题..." 
              class="flex-1 resize-none rounded-xl border border-slate-200 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500" rows="1"></textarea>
            <button type="submit" id="sendBtn" 
              class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
              <i data-lucide="send" class="w-5 h-5"></i>
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script>
    lucide.createIcons();

    const mockCommands = [
      { cmd: 'systeminfo | findstr "OS"', label: '系统信息', output: 'OS Name:                   Microsoft Windows 10 Pro\nOS Version:                10.0.19045 N/A Build 19045\nOS Manufacturer:           Microsoft Corporation\nOS Configuration:          Standalone Workstation\nOS Build Type:             Multiprocessor Free' },
      { cmd: 'Get-CimInstance Win32_PhysicalMemory', label: '内存信息', output: 'CapacityGB : 16.00\nManufacturer : Samsung\nDeviceLocator : DIMM1\n\nCapacityGB : 16.00\nManufacturer : Samsung\nDeviceLocator : DIMM2' },
      { cmd: 'Get-CimInstance Win32_LogicalDisk', label: '磁盘信息', output: 'DeviceID : C:\nSizeGB    : 476.94\nFreeGB    : 156.32\n\nDeviceID : D:\nSizeGB    : 931.51\nFreeGB    : 423.87' },
      { cmd: 'Get-Process | Select-Object -First 10', label: '运行进程', output: 'ProcessName       Id MemMB\n-----------       -- -----\nYunShu Plugin   4520  456\nWXWork          7832  384\nmysqld          1248  256\nmsedge          8920  245\nToDesk          6540  198\nexplorer        1024   98' },
      { cmd: 'Get-EventLog -LogName System', label: '系统日志', output: 'TimeGenerated         EntryType Source                Message\n-------------         --------- ------                -------\n2026-06-27 14:30:00  Error     Service Control Mgr   The MySQL service failed to start.\n2026-06-27 14:15:00  Warning   FilterManager         File system filter "BzProtect" could not load.\n2026-06-27 13:00:00  Information Service Control Mgr   Server Inspection Agent started successfully.' }
    ];

    const mockReport = `## 服务器状态概览

**操作系统**: Microsoft Windows 10 Pro (10.0.19045)

**运行状态**: ✅ 正常运行

## 资源使用情况

### 内存使用
- **总内存**: 32 GB
- **已使用**: 约 1.6 GB (5%)
- **状态**: ✅ 健康

### 磁盘使用
| 驱动器 | 总容量 | 可用空间 | 使用率 |
|--------|--------|----------|--------|
| C: | 477 GB | 156 GB | 67% |
| D: | 932 GB | 424 GB | 54% |

**状态**: ⚠️ C盘使用率偏高，建议清理

### 进程状态
以下是占用内存最多的进程：
1. YunShu Plugin - 456 MB
2. WXWork - 384 MB
3. mysqld - 256 MB

## 异常或日志要点

### ⚠️ 需要关注的事件
1. **MySQL 服务启动失败** - 2026-06-27 14:30:00
   - 可能原因：端口冲突或配置错误
   - 建议：检查 MySQL 配置文件和端口占用

2. **文件系统过滤器加载失败** - 2026-06-27 14:15:00
   - BzProtect 过滤器无法加载
   - 建议：检查相关驱动程序

## 总体健康评估与建议

### 健康评分: **75/100**

### 建议措施
1. **清理 C 盘空间** - 使用率已达 67%
2. **修复 MySQL 服务** - 确保数据库正常运行
3. **优化高内存进程** - YunShu Plugin 占用较多内存
4. **检查驱动程序** - BzProtect 过滤器需要关注

### 总结
服务器整体运行状态良好，但存在一些需要处理的问题。建议优先修复 MySQL 服务和清理磁盘空间。`;

    const mockChatReplies = {
      '内存': '根据巡检数据，服务器总内存为 32GB，当前使用率约 5%，状态健康。占用内存最多的进程是 YunShu Plugin (456MB)、WXWork (384MB) 和 mysqld (256MB)。如果需要释放内存，可以考虑关闭一些不必要的应用程序。',
      '磁盘': 'C盘使用率已达 67%，建议清理不需要的文件或转移大文件到 D盘。D盘还有 424GB 可用空间。',
      'mysql': 'MySQL 服务启动失败，可能原因包括端口冲突或配置错误。建议检查 MySQL 配置文件和端口占用情况。',
      '进程': '当前有多个进程占用较多内存，主要是 YunShu Plugin、WXWork 和 mysqld。建议检查是否所有进程都是必需的。',
      '默认': '根据巡检数据，服务器整体状态良好，健康评分 75/100。主要问题包括 C盘空间使用率偏高和 MySQL 服务启动失败。'
    };

    let currentStep = 0;
    let isInspecting = false;

    function toggleApiKey() {
      const input = document.getElementById('apiKey');
      const icon = document.getElementById('eyeIcon');
      const hint = document.getElementById('apiKeyHint');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
      
      if (input.value) {
        hint.classList.remove('hidden');
      }
    }

    async function startInspection() {
      if (isInspecting) return;
      isInspecting = true;
      
      const startBtn = document.getElementById('startBtn');
      const statusBar = document.getElementById('statusBar');
      const terminalSection = document.getElementById('terminalSection');
      const terminalContent = document.getElementById('terminalContent');
      const loadingIndicator = document.getElementById('loadingIndicator');
      const apiKeyInput = document.getElementById('apiKey');
      const apiKeyHint = document.getElementById('apiKeyHint');
      
      startBtn.classList.add('hidden');
      statusBar.classList.remove('hidden');
      terminalSection.classList.remove('hidden');
      terminalContent.innerHTML = '';
      
      if (apiKeyInput.value) {
        apiKeyHint.classList.remove('hidden');
      }
      
      updateStatus('running', 'Executing Commands...');
      loadingIndicator.classList.remove('hidden');
      
      addLog('info', 'Starting server inspection protocol...');
      
      for (const item of mockCommands) {
        addLog('cmd_start', '', item.cmd);
        await sleep(800);
        addLog('cmd_result', item.output);
        await sleep(600);
      }
      
      loadingIndicator.classList.add('hidden');
      updateStatus('analyzing', 'AI is Analyzing Data...');
      addLog('info', 'Aggregating data and handing over to Trae for analysis...');
      
      await sleep(2000);
      
      showReport();
      updateStatus('done', 'Inspection Complete');
      isInspecting = false;
      
      await sleep(500);
      showChat();
    }

    function addLog(type, content, cmd = '') {
      const terminalContent = document.getElementById('terminalContent');
      const div = document.createElement('div');
      div.className = 'animate-fade-in whitespace-pre-wrap';
      
      if (type === 'cmd_start') {
        div.innerHTML = `<div class="text-emerald-400 font-semibold"><span class="text-emerald-500/50 mr-2">root@server:~#</span>${cmd}<span class="ml-2 inline-block animate-pulse">_</span></div>`;
      } else if (type === 'cmd_result') {
        div.innerHTML = `<div class="text-slate-400 pl-4 border-l-2 border-slate-800/50 mt-1">${content}</div>`;
      } else if (type === 'info') {
        div.innerHTML = `<div class="text-blue-400 italic">// ${content}</div>`;
      }
      
      terminalContent.appendChild(div);
      terminalContent.scrollTop = terminalContent.scrollHeight;
    }

    function updateStatus(status, text) {
      const statusIcon = document.getElementById('statusIcon');
      const statusText = document.getElementById('statusText');
      
      statusIcon.className = 'w-2 h-2 rounded-full';
      
      if (status === 'running') {
        statusIcon.classList.add('bg-emerald-500', 'animate-pulse');
      } else if (status === 'analyzing') {
        statusIcon.classList.add('bg-blue-500', 'animate-bounce');
      } else {
        statusIcon.classList.add('bg-blue-500');
      }
      
      statusText.textContent = text;
    }

    async function showReport() {
      const reportSection = document.getElementById('reportSection');
      const reportContent = document.getElementById('reportContent');
      
      reportSection.classList.remove('hidden');
      
      reportContent.innerHTML = '';
      let index = 0;
      const markdown = mockReport;
      
      const interval = setInterval(() => {
        if (index >= markdown.length) {
          clearInterval(interval);
          return;
        }
        
        const chunk = markdown.substring(0, index + 5);
        reportContent.innerHTML = parseMarkdown(chunk);
        index += 5;
      }, 30);
    }

    function parseMarkdown(text) {
      return text
        .replace(/^### (.*$)/gim, '<h3 class="text-lg font-semibold text-slate-900">$1</h3>')
        .replace(/^## (.*$)/gim, '<h2 class="text-xl font-semibold text-slate-900 mb-2">$1</h2>')
        .replace(/\*\*(.*)\*\*/g, '<strong class="font-semibold">$1</strong>')
        .replace(/\*(.*)\*/g, '<em class="italic">$1</em>')
        .replace(/\n/g, '<br>');
    }

    function showChat() {
      const chatSection = document.getElementById('chatSection');
      const chatMessages = document.getElementById('chatMessages');
      
      chatSection.classList.remove('hidden');
      chatMessages.innerHTML = `
        <div class="text-center py-8 text-slate-500">
          <i data-lucide="bot" class="w-12 h-12 mx-auto mb-3 opacity-30"></i>
          <p>巡检完成！可以问我任何关于服务器状态的问题。</p>
          <p class="text-sm mt-2">例如："内存使用情况如何？"</p>
        </div>
      `;
      lucide.createIcons();
    }

    async function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;
      
      input.value = '';
      addChatMessage('user', message);
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      
      await sleep(1500);
      
      let reply = mockChatReplies['默认'];
      if (message.includes('内存')) reply = mockChatReplies['内存'];
      else if (message.includes('磁盘')) reply = mockChatReplies['磁盘'];
      else if (message.includes('mysql') || message.includes('MySQL')) reply = mockChatReplies['mysql'];
      else if (message.includes('进程')) reply = mockChatReplies['进程'];
      
      addChatMessage('assistant', reply);
      sendBtn.disabled = false;
    }

    function addChatMessage(role, content) {
      const chatMessages = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = `flex gap-3 animate-fade-in ${role === 'user' ? 'flex-row-reverse' : ''}`;
      
      const icon = role === 'user' ? 'user' : 'bot';
      const bgClass = role === 'user' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-800';
      const iconBg = role === 'user' ? 'bg-slate-200 text-slate-600' : 'bg-blue-100 text-blue-600';
      
      div.innerHTML = `
        <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${iconBg}">
          <i data-lucide="${icon}" class="w-4 h-4"></i>
        </div>
        <div class="max-w-[80%] rounded-2xl px-4 py-2 ${bgClass}">
          <p class="whitespace-pre-wrap">${content}</p>
        </div>
      `;
      
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      lucide.createIcons();
    }

    function resetInspection() {
      currentStep = 0;
      isInspecting = false;
      
      document.getElementById('startBtn').classList.remove('hidden');
      document.getElementById('statusBar').classList.add('hidden');
      document.getElementById('terminalSection').classList.add('hidden');
      document.getElementById('reportSection').classList.add('hidden');
      document.getElementById('chatSection').classList.add('hidden');
      document.getElementById('terminalContent').innerHTML = '';
      document.getElementById('reportContent').innerHTML = '';
      document.getElementById('chatMessages').innerHTML = '';
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
