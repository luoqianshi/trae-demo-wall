<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夸夸社区 - 点击这里查看</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: #F7F7F7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .entry-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 36px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            max-width: 340px;
            width: 100%;
        }
        .app-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #D85B66, #FFD5DC);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .app-name {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        .app-desc {
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .entry-btn {
            display: inline-block;
            padding: 14px 40px;
            background: #D85B66;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            border-radius: 28px;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .entry-btn:hover {
            background: #c44d58;
            transform: translateY(-1px);
        }
        .entry-btn:active {
            transform: translateY(0);
        }
        .hint {
            margin-top: 24px;
            font-size: 12px;
            color: #C0C0C0;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="entry-card">
        <div class="app-logo">💬</div>
        <div class="app-name">夸夸社区</div>
        <div class="app-desc">情感互助温暖社区<br>记录心情，分享温暖</div>
        <button class="entry-btn" onclick="enterApp()">点击这里查看</button>
        <div class="hint">点击按钮进入 App 预览<br>建议在浏览器中打开以获得最佳体验</div>
    </div>

    <script>
        function enterApp() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
