<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>写夸夸</title>
    <style>
        /* @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap'); */ /* font loaded locally */

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F7F7F7; color: #333; width: 100%; min-height: 100vh; overflow-x: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .phone-wrapper {
            width: 375px; height: 812px; position: relative;
            transform-origin: top center; margin: 0 auto;
        }

        .app-container {
            width: 100%; height: 100%; background: #F7F7F7;
            position: relative; display: flex; flex-direction: column;
        }

        /* 状态栏 */
        .status-bar {
            height: 44px; background: #F7F7F7; display: flex; align-items: center; justify-content: space-between;
            padding: 0 21px; font-size: 15px; font-weight: 600; color: #000;
            flex-shrink: 0;
        }
        .status-bar-time { font-weight: 600; font-size: 15px; letter-spacing: -0.3px; }
        .status-bar-icons { display: flex; align-items: center; gap: 5px; }
        .signal-icon { display: flex; gap: 1.5px; align-items: flex-end; }
        .signal-bar { width: 3px; background: #000; border-radius: 1px; }
        .signal-bar:nth-child(1) { height: 4px; }
        .signal-bar:nth-child(2) { height: 6px; }
        .signal-bar:nth-child(3) { height: 8px; }
        .signal-bar:nth-child(4) { height: 10px; }
        .wifi-icon { width: 16px; height: 12px; }
        .battery-icon { width: 25px; height: 12px; border: 1px solid #000; border-radius: 3px; position: relative; display: flex; align-items: center; padding: 1px; }
        .battery-icon::after { content: ''; position: absolute; right: -3px; top: 50%; transform: translateY(-50%); width: 2px; height: 5px; background: #000; border-radius: 0 1px 1px 0; }
        .battery-fill { width: 60%; height: 100%; background: #000; border-radius: 1px; }

        /* 顶部导航 */
        .nav-header {
            background: #F7F7F7; display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; height: 48px; flex-shrink: 0;
        }
        .cancel-btn { font-size: 15px; color: #79786C; cursor: pointer; font-weight: 500; }
        .nav-title { font-size: 17px; font-weight: 600; color: #333; position: absolute; left: 50%; transform: translateX(-50%); }
        .send-btn {
            font-size: 15px; color: #D85B66; font-weight: 600; cursor: pointer;
            background: none; border: none; font-family: inherit;
        }
        .send-btn:disabled { color: #D85B66; opacity: 0.4; cursor: default; }

        /* 输入区域 */
        .input-area {
            flex: 1; padding: 16px; display: flex; flex-direction: column;
        }
        .comment-textarea {
            width: 100%; flex: 1; border: none; outline: none; resize: none;
            font-size: 16px; line-height: 1.7; color: #333; background: transparent;
            font-family: inherit;
        }
        .comment-textarea::placeholder { color: #C0C0C0; }

        /* 快捷emoji区域 */
        .emoji-bar {
            background: #fff; border-top: 0.5px solid #eee; padding: 12px 16px 20px;
            flex-shrink: 0;
        }
        .emoji-label { font-size: 12px; color: #999; margin-bottom: 10px; }
        .emoji-list {
            display: flex; align-items: center; gap: 12px;
        }
        .emoji-item {
            width: 44px; height: 44px; border-radius: 50%; background: #F5F5F5;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; transition: all 0.15s;
            border: none; font-family: inherit; user-select: none;
        }
        .emoji-item:active { transform: scale(0.92); background: #E8E8E8; }

        ::-webkit-scrollbar { display: none; }

        @media (min-width: 376px) {
            body { background: #e5e5e5; }
            .app-container { box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        }
    </style>
</head>
<body>
    <div class="phone-wrapper">
        <div class="app-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <span class="status-bar-time">15:05</span>
            <div class="status-bar-icons">
                <div class="signal-icon"><div class="signal-bar"></div><div class="signal-bar"></div><div class="signal-bar"></div><div class="signal-bar"></div></div>
                <svg class="wifi-icon" viewBox="0 0 16 12" fill="none"><path d="M8 1.5C5.5 1.5 3.2 2.5 1.5 4.2L2.9 5.6C4.2 4.3 6 3.5 8 3.5C10 3.5 11.8 4.3 13.1 5.6L14.5 4.2C12.8 2.5 10.5 1.5 8 1.5Z" fill="#000"/><path d="M8 4.5C6.4 4.5 4.9 5.1 3.8 6.2L5.2 7.6C5.9 6.9 6.9 6.5 8 6.5C9.1 6.5 10.1 6.9 10.8 7.6L12.2 6.2C11.1 5.1 9.6 4.5 8 4.5Z" fill="#000"/><path d="M8 7.5C7.2 7.5 6.5 7.8 5.9 8.3L8 10.5L10.1 8.3C9.5 7.8 8.8 7.5 8 7.5Z" fill="#000"/></svg>
                <div class="battery-icon"><div class="battery-fill"></div></div>
            </div>
        </div>

        <!-- 顶部导航 -->
        <div class="nav-header">
            <div class="cancel-btn" onclick="history.back()">取消</div>
            <div class="nav-title">写夸夸</div>
            <button class="send-btn" id="sendBtn" onclick="sendComment()" disabled>发送</button>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <textarea class="comment-textarea" id="commentInput" placeholder="说点什么夸夸TA...TA..." oninput="checkInput()"></textarea>
        </div>

        <!-- 快捷emoji -->
        <div class="emoji-bar">
            <div class="emoji-label">快捷表情</div>
            <div class="emoji-list">
                <button class="emoji-item" onclick="insertEmoji('❤️')">❤️</button>
                <button class="emoji-item" onclick="insertEmoji('👍')">👍</button>
                <button class="emoji-item" onclick="insertEmoji('👏')">👏</button>
                <button class="emoji-item" onclick="insertEmoji('✊')">✊</button>
                <button class="emoji-item" onclick="insertEmoji('🌹')">🌹</button>
                <button class="emoji-item" onclick="insertEmoji('☀️')">☀️</button>
            </div>
        </div>
        </div>
    </div>

    <script>
        var input = document.getElementById('commentInput');
        var sendBtn = document.getElementById('sendBtn');

        function checkInput() {
            sendBtn.disabled = input.value.trim().length === 0;
        }

        function insertEmoji(emoji) {
            input.value += emoji;
            checkInput();
            input.focus();
        }

        function sendComment() {
            var text = input.value.trim();
            if (!text) return;
            alert('夸夸已发送：' + text);
            history.back();
        }

        // 自动聚焦
        setTimeout(function() {
            input.focus();
        }, 300);

        function setScale() {
            var scale = Math.min((window.innerHeight - 20) / 812, (window.innerWidth - 20) / 375);
            document.querySelector('.phone-wrapper').style.transform = 'scale(' + scale + ')';
        }
        window.addEventListener('resize', setScale);
        setScale();
    </script>
</body>
</html>
