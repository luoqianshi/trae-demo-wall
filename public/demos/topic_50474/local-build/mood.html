<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>心情</title>
    <style>
        /* @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap'); */ /* font loaded locally */

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F7F7F7; color: #333; width: 100%; min-height: 100vh;
            overflow-x: hidden; display: flex; align-items: center; justify-content: center;
        }

        .phone-wrapper {
            width: 375px; height: 812px; position: relative; transform-origin: top center; margin: 0 auto;
            overflow: hidden;
        }

        .app-container {
            width: 100%; height: 100%; background: #F7F7F7; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 状态栏 */
        .status-bar {
            height: 44px; background: #F7F7F7; display: flex; align-items: center; justify-content: space-between;
            padding: 0 21px; font-size: 15px; font-weight: 600; color: #000; flex-shrink: 0;
        }
        .status-bar-time { font-weight: 600; font-size: 15px; letter-spacing: -0.3px; }
        .status-bar-icons { display: flex; align-items: center; gap: 5px; }
        .signal-icon { display: flex; gap: 1.5px; align-items: flex-end; }
        .signal-bar { width: 3px; background: #000; border-radius: 1px; }
        .signal-bar:nth-child(1) { height: 4px; }
        .signal-bar:nth-child(2) { height: 6px; }
        .signal-bar:nth-child(3) { height: 8px; }
        .signal-bar:nth-child(4) { height: 10px; }
        .wifi-icon { width: 16px; height: 12px; }
        .battery-icon { width: 25px; height: 12px; border: 1px solid #000; border-radius: 3px; position: relative; display: flex; align-items: center; padding: 1px; }
        .battery-icon::after { content: ''; position: absolute; right: -3px; top: 50%; transform: translateY(-50%); width: 2px; height: 5px; background: #000; border-radius: 0 1px 1px 0; }
        .battery-fill { width: 60%; height: 100%; background: #000; border-radius: 1px; }

        /* 顶部导航 */
        .nav-header {
            background: #F7F7F7; display: flex; align-items: center; justify-content: center;
            padding: 10px 16px; height: 48px; flex-shrink: 0;
            border-bottom: 0.5px solid #F0F0F0;
        }
        .nav-title { font-size: 17px; font-weight: 600; color: #333; }

        /* 内容区域 */
        .content-area {
            flex: 1; overflow-y: auto; padding: 16px 12px 80px;
        }

        /* 入口卡片 */
        .entry-card {
            display: flex; align-items: center; gap: 14px;
            background: #fff; border-radius: 16px; padding: 18px 16px;
            margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none; color: inherit;
        }
        .entry-card:active {
            transform: scale(0.98);
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }
        .entry-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; flex-shrink: 0;
        }
        .entry-icon.daily { background: linear-gradient(135deg, #FFE8E0, #FFF0EF); }
        .entry-icon.calendar { background: linear-gradient(135deg, #E0F0FF, #E8F4FF); }
        .entry-icon.blindbox { background: linear-gradient(135deg, #FFF0E0, #FFF8E8); }
        .entry-info { flex: 1; min-width: 0; }
        .entry-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .entry-desc { font-size: 13px; color: #999; line-height: 1.5; }
        .entry-arrow {
            width: 20px; height: 20px; flex-shrink: 0; color: #C0C0C0;
        }

        /* 底部导航 */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: #fff;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .nav-items { display: flex; align-items: center; justify-content: space-around; height: 50px; }
        .nav-item { display: flex; align-items: center; justify-content: center; cursor: pointer; flex: 1; height: 100%; text-decoration: none; }
        .nav-item span { font-size: 17px; line-height: 28px; color: #79786C; font-weight: 500; }
        .nav-item.active span { color: #D85B66; font-weight: 600; }

        .home-indicator { width: 100%; height: 34px; display: flex; align-items: center; justify-content: center; background: #fff; }
        .home-bar { width: 134px; height: 5px; background: #000; border-radius: 3px; }

        ::-webkit-scrollbar { display: none; }

        @media (min-width: 376px) {
            body { background: #e5e5e5; }
            .phone-wrapper { box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        }
    </style>
</head>
<body>
    <div class="phone-wrapper">
        <div class="app-container">
            <!-- 状态栏 -->
            <div class="status-bar">
                <span class="status-bar-time">15:05</span>
                <div class="status-bar-icons">
                    <div class="signal-icon"><div class="signal-bar"></div><div class="signal-bar"></div><div class="signal-bar"></div><div class="signal-bar"></div></div>
                    <svg class="wifi-icon" viewBox="0 0 16 12" fill="none"><path d="M8 1.5C5.5 1.5 3.2 2.5 1.5 4.2L2.9 5.6C4.2 4.3 6 3.5 8 3.5C10 3.5 11.8 4.3 13.1 5.6L14.5 4.2C12.8 2.5 10.5 1.5 8 1.5Z" fill="#000"/><path d="M8 4.5C6.4 4.5 4.9 5.1 3.8 6.2L5.2 7.6C5.9 6.9 6.9 6.5 8 6.5C9.1 6.5 10.1 6.9 10.8 7.6L12.2 6.2C11.1 5.1 9.6 4.5 8 4.5Z" fill="#000"/><path d="M8 7.5C7.2 7.5 6.5 7.8 5.9 8.3L8 10.5L10.1 8.3C9.5 7.8 8.8 7.5 8 7.5Z" fill="#000"/></svg>
                    <div class="battery-icon"><div class="battery-fill"></div></div>
                </div>
            </div>

            <!-- 顶部导航 -->
            <div class="nav-header">
                <div class="nav-title">心情</div>
            </div>

            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 每日一语 -->
                <a href="mood-daily.html" class="entry-card">
                    <div class="entry-icon daily">☀️</div>
                    <div class="entry-info">
                        <div class="entry-title">每日一语</div>
                        <div class="entry-desc">每天一句温暖的话，陪你度过每一天</div>
                    </div>
                    <svg class="entry-arrow" viewBox="0 0 20 20" fill="none"><path d="M7.5 15L12.5 10L7.5 5" stroke="#C0C0C0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>

                <!-- 心情日历 -->
                <a href="mood-calendar.html" class="entry-card">
                    <div class="entry-icon calendar">📅</div>
                    <div class="entry-info">
                        <div class="entry-title">心情日历</div>
                        <div class="entry-desc">记录每天的心情变化，看见情绪轨迹</div>
                    </div>
                    <svg class="entry-arrow" viewBox="0 0 20 20" fill="none"><path d="M7.5 15L12.5 10L7.5 5" stroke="#C0C0C0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>

                <!-- 心情盲盒 -->
                <a href="mood-blindbox.html" class="entry-card">
                    <div class="entry-icon blindbox">🎁</div>
                    <div class="entry-info">
                        <div class="entry-title">心情盲盒</div>
                        <div class="entry-desc">拆开一个盲盒，收获一份惊喜与温暖</div>
                    </div>
                    <svg class="entry-arrow" viewBox="0 0 20 20" fill="none"><path d="M7.5 15L12.5 10L7.5 5" stroke="#C0C0C0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
            </div>

            <!-- 底部导航 -->
            <div class="bottom-nav">
                <div class="nav-items">
                    <a href="index.html" class="nav-item"><span>首页</span></a>
                    <a href="search.html" class="nav-item"><span>搜索</span></a>
                    <a href="mood.html" class="nav-item active"><span>心情</span></a>
                    <a href="profile.html" class="nav-item"><span>我的</span></a>
                </div>
                <div class="home-indicator"><div class="home-bar"></div></div>
            </div>
        </div>
    </div>

    <script>
        function setScale() {
            var scale = Math.min((window.innerHeight - 20) / 812, (window.innerWidth - 20) / 375);
            document.querySelector('.phone-wrapper').style.transform = 'scale(' + scale + ')';
        }
        window.addEventListener('resize', setScale);
        setScale();
    </script>
</body>
</html>
