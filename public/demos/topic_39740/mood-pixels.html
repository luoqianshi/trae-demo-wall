<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>此刻心情像素 · MoodPixels</title>
<style>
  :root{
    --bg:#0b0c16;
    --bg2:#11132440;
    --card:rgba(255,255,255,.05);
    --card-border:rgba(255,255,255,.10);
    --text:#eef0ff;
    --muted:#9aa0c4;
    --accent:#7c83ff;
    --radius:20px;
    --shadow:0 24px 60px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:#0b0c16;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    position:relative;
    overflow-x:hidden;
  }
  /* animated aurora background */
  body::before,body::after{
    content:"";position:fixed;z-index:-2;border-radius:50%;filter:blur(70px);opacity:.55;pointer-events:none;
  }
  body::before{
    width:60vmax;height:60vmax;left:-15vmax;top:-20vmax;
    background:radial-gradient(circle at 30% 30%,#6a4bff,transparent 65%),radial-gradient(circle at 70% 70%,#ff5d8f,transparent 60%);
    animation:drift1 22s ease-in-out infinite alternate;
  }
  body::after{
    width:55vmax;height:55vmax;right:-15vmax;top:-10vmax;
    background:radial-gradient(circle at 40% 40%,#1c79d4,transparent 60%),radial-gradient(circle at 70% 60%,#46d39a,transparent 60%);
    animation:drift2 26s ease-in-out infinite alternate;
  }
  .bg-grain{position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:linear-gradient(180deg,rgba(11,12,22,.2),rgba(11,12,22,.85));}
  @keyframes drift1{0%{transform:translate(0,0) scale(1);}50%{transform:translate(8vmax,6vmax) scale(1.15);}100%{transform:translate(-4vmax,10vmax) scale(1.05);}}
  @keyframes drift2{0%{transform:translate(0,0) scale(1);}50%{transform:translate(-8vmax,5vmax) scale(1.12);}100%{transform:translate(5vmax,-4vmax) scale(1);}}

  .wrap{max-width:880px;margin:0 auto;padding:28px 18px 80px;}

  /* entrance animations */
  @keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  header.app,.cards,#capture,.toolbar,.panel{animation:rise .6s cubic-bezier(.2,.7,.2,1) both;}
  .cards{animation-delay:.06s;}
  #capture{animation-delay:.12s;}
  .toolbar{animation-delay:.18s;}

  header.app{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:14px;}
  .logo{
    width:50px;height:50px;border-radius:15px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:2px;padding:5px;background:rgba(255,255,255,.06);border:1px solid var(--card-border);
    box-shadow:0 8px 26px rgba(124,131,255,.35);animation:logoFloat 5s ease-in-out infinite;
  }
  @keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-4px) rotate(2deg);}}
  .logo i{border-radius:4px;display:block;animation:twinkle 3s ease-in-out infinite;}
  .logo i:nth-child(2n){animation-delay:.6s;}
  .logo i:nth-child(3n){animation-delay:1.1s;}
  @keyframes twinkle{0%,100%{opacity:.85;}50%{opacity:1;filter:brightness(1.3);}}
  .brand h1{
    font-size:22px;margin:0;letter-spacing:.5px;font-weight:800;
    background:linear-gradient(100deg,#fff 10%,#b9bdff 45%,#ff9ec7 90%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .brand p{margin:3px 0 0;font-size:12px;color:var(--muted);}
  .year-switch{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--card-border);border-radius:999px;padding:5px 8px;backdrop-filter:blur(12px);box-shadow:0 6px 20px rgba(0,0,0,.25);}
  .year-switch button{background:none;border:none;color:var(--text);font-size:18px;width:30px;height:30px;border-radius:50%;cursor:pointer;transition:.15s;}
  .year-switch button:hover{background:rgba(124,131,255,.25);transform:scale(1.1);}
  .year-switch span{min-width:54px;text-align:center;font-weight:700;}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
  .stat{
    position:relative;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);
    padding:16px 14px 13px;backdrop-filter:blur(12px);overflow:hidden;
    transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .stat::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;
    background:linear-gradient(90deg,#7c83ff,#ff5d8f,#46d39a);opacity:.9;}
  .stat:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(0,0,0,.4);border-color:rgba(124,131,255,.4);}
  .stat .num{font-size:25px;font-weight:800;line-height:1;}
  .stat .lab{font-size:12px;color:var(--muted);margin-top:8px;}
  .stat .num small{font-size:13px;color:var(--muted);font-weight:600;margin-left:2px;}

  .panel{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:18px;backdrop-filter:blur(14px);}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .panel-head h2{font-size:15px;margin:0;font-weight:700;}
  .panel-head .hint{font-size:12px;color:var(--muted);}

  /* pixel grid */
  .grid-scroll{overflow-x:auto;padding-bottom:6px;}
  #grid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:4px;width:max-content;}
  .cell{width:14px;height:14px;border-radius:4px;background:rgba(255,255,255,.05);cursor:pointer;transition:transform .1s ease, box-shadow .15s ease, filter .15s ease;}
  .cell:hover{transform:scale(1.45);box-shadow:0 0 0 2px rgba(255,255,255,.35),0 4px 14px rgba(0,0,0,.5);filter:brightness(1.15);z-index:2;}
  .cell.today{box-shadow:0 0 0 2px var(--accent),0 0 14px rgba(124,131,255,.7);animation:pulseToday 2s ease-in-out infinite;}
  @keyframes pulseToday{0%,100%{box-shadow:0 0 0 2px var(--accent),0 0 8px rgba(124,131,255,.5);}50%{box-shadow:0 0 0 2px var(--accent),0 0 18px rgba(124,131,255,.95);}}
  .cell.future{opacity:.22;cursor:not-allowed;}
  .cell.future:hover{transform:none;box-shadow:none;filter:none;}

  .legend{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .legend .item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);padding:3px 8px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);}
  .legend .swatch{width:13px;height:13px;border-radius:4px;box-shadow:0 0 8px currentColor;}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
  .btn{position:relative;border:1px solid var(--card-border);background:rgba(255,255,255,.06);color:var(--text);padding:11px 18px;border-radius:14px;font-size:14px;cursor:pointer;font-weight:700;transition:transform .15s ease, box-shadow .2s ease, background .15s ease;backdrop-filter:blur(8px);overflow:hidden;}
  .btn:hover{background:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.35);}
  .btn:active{transform:translateY(0);}
  .btn.primary{background:linear-gradient(135deg,#8a7bff,#5a4bff);border:none;box-shadow:0 10px 26px rgba(90,75,255,.5);}
  .btn.primary:hover{filter:brightness(1.1);box-shadow:0 14px 32px rgba(90,75,255,.65);}

  /* mood distribution bars */
  .dist{display:flex;flex-direction:column;gap:9px;}
  .dist .row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .dist .emoji{width:22px;text-align:center;font-size:16px;}
  .dist .bar{flex:1;height:10px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;}
  .dist .bar i{display:block;height:100%;border-radius:999px;box-shadow:0 0 10px currentColor;animation:growBar .8s cubic-bezier(.2,.7,.2,1) both;}
  @keyframes growBar{from{width:0 !important;}}
  .dist .pc{width:42px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;}

  footer.app{text-align:center;color:var(--muted);font-size:12px;margin-top:24px;line-height:1.7;}

  /* modal */
  .mask{position:fixed;inset:0;background:rgba(6,6,14,.55);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .mask.show{display:flex;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .sheet{width:100%;max-width:560px;background:linear-gradient(180deg,#22243f,#191b30);border:1px solid var(--card-border);border-radius:24px 24px 0 0;padding:14px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px rgba(0,0,0,.55);animation:up .3s cubic-bezier(.2,.7,.2,1);}
  .sheet::before{content:"";display:block;width:42px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);margin:0 auto 14px;}
  @keyframes up{from{transform:translateY(60px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
  .sheet h3{margin:0 0 2px;font-size:18px;font-weight:800;}
  .sheet .date{color:var(--muted);font-size:13px;margin-bottom:16px;}
  .moods{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
  .mood{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;border-radius:16px;border:1px solid var(--card-border);background:rgba(255,255,255,.03);cursor:pointer;transition:transform .12s ease, background .12s ease, border-color .12s ease;}
  .mood:hover{background:rgba(255,255,255,.08);transform:translateY(-3px);}
  .mood.sel{border-color:#fff;background:rgba(124,131,255,.22);box-shadow:0 0 0 2px rgba(124,131,255,.4),0 8px 20px rgba(90,75,255,.3);transform:translateY(-3px);}
  .mood .e{font-size:27px;transition:transform .12s ease;}
  .mood:hover .e,.mood.sel .e{transform:scale(1.15);}
  .mood .n{font-size:11px;color:var(--muted);}
  textarea{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--card-border);border-radius:12px;color:var(--text);padding:11px 12px;font-size:14px;resize:none;font-family:inherit;margin-bottom:14px;transition:border-color .15s ease;}
  textarea:focus{outline:none;border-color:rgba(124,131,255,.6);box-shadow:0 0 0 3px rgba(124,131,255,.18);}
  .sheet-actions{display:flex;gap:10px;}
  .sheet-actions .btn{flex:1;text-align:center;}
  .btn.ghost-danger{color:#ff8a8a;}

  /* toast */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:rgba(42,45,74,.92);border:1px solid var(--card-border);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:80;box-shadow:var(--shadow);backdrop-filter:blur(10px);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(prefers-reduced-motion:reduce){
    *{animation:none !important;}
  }
  @media(max-width:560px){
    .cards{grid-template-columns:repeat(2,1fr);}
    .cell{width:13px;height:13px;}
    .brand h1{font-size:18px;}
  }
</style>
</head>
<body>
<div class="bg-grain"></div>
<div class="wrap">
  <header class="app">
    <div class="brand">
      <div class="logo" id="logo"></div>
      <div>
        <h1>此刻心情像素</h1>
        <p>MoodPixels · 一年一格，记录每一天的颜色</p>
      </div>
    </div>
    <div class="year-switch">
      <button id="prevYear" aria-label="上一年">‹</button>
      <span id="yearLabel">2026</span>
      <button id="nextYear" aria-label="下一年">›</button>
    </div>
  </header>

  <section class="cards" id="stats"></section>

  <section class="panel" id="capture">
    <div class="panel-head">
      <h2>🎨 年度情绪图谱</h2>
      <span class="hint">点击格子记录今天 · 共 <span id="dayCount">365</span> 天</span>
    </div>
    <div class="grid-scroll">
      <div id="grid"></div>
    </div>
    <div class="legend" id="legend"></div>
  </section>

  <div class="toolbar">
    <button class="btn primary" id="todayBtn">✍️ 记录今天</button>
    <button class="btn" id="exportBtn">📤 导出分享图</button>
    <button class="btn" id="randomBtn">🎲 填充示例</button>
  </div>

  <section class="panel" style="margin-top:18px;">
    <div class="panel-head">
      <h2>📊 心情分布</h2>
      <span class="hint" id="distHint"></span>
    </div>
    <div class="dist" id="dist"></div>
  </section>

  <footer class="app">
    数据仅保存在你的浏览器本地，不会上传。<br/>
    由 TRAE 创作 · TRAE AI 创造力大赛 · 生活娱乐赛道
  </footer>
</div>

<!-- edit sheet -->
<div class="mask" id="mask">
  <div class="sheet" id="sheet">
    <h3 id="sheetTitle">今天的心情是？</h3>
    <div class="date" id="sheetDate"></div>
    <div class="moods" id="moodPicker"></div>
    <textarea id="note" rows="2" maxlength="60" placeholder="想记点什么？（选填，最多60字）"></textarea>
    <div class="sheet-actions">
      <button class="btn ghost-danger" id="clearBtn">清除</button>
      <button class="btn primary" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ---- mood definitions ----
  var MOODS = [
    {key:"awesome", emoji:"🤩", name:"超棒", color:"#ff5d8f"},
    {key:"happy",   emoji:"😊", name:"开心", color:"#ffb347"},
    {key:"calm",    emoji:"😌", name:"平静", color:"#46d39a"},
    {key:"meh",     emoji:"😐", name:"一般", color:"#6f7bdc"},
    {key:"tired",   emoji:"😪", name:"疲惫", color:"#8a7bb8"},
    {key:"sad",     emoji:"😢", name:"难过", color:"#4a90d9"},
    {key:"angry",   emoji:"😡", name:"生气", color:"#e85d4e"},
    {key:"anxious", emoji:"😰", name:"焦虑", color:"#c77dde"},
    {key:"love",    emoji:"🥰", name:"被爱", color:"#ff6fae"},
    {key:"sick",    emoji:"🤒", name:"难受", color:"#7d9aa8"}
  ];
  var MOOD_MAP = {};
  MOODS.forEach(function(m){MOOD_MAP[m.key]=m;});

  var STORE_KEY = "moodpixels.v1";
  var EMPTY = "rgba(255,255,255,.05)";

  var state = {
    year: new Date().getFullYear(),
    data: load(),         // { "2026-03-08": {mood:"happy", note:"..."} }
    selectedDate: null,
    pickMood: null
  };

  // ---- storage ----
  function load(){
    try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function save(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state.data)); }catch(e){}
  }

  // ---- date helpers ----
  function pad(n){return n<10?"0"+n:""+n;}
  function ymd(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
  function todayStr(){return ymd(new Date());}
  function daysInYear(y){return ((y%4===0&&y%100!==0)||y%400===0)?366:365;}
  function dateFromYearIndex(y,i){var d=new Date(y,0,1);d.setDate(d.getDate()+i);return d;}
  function cnDate(str){
    var p=str.split("-");
    var d=new Date(+p[0],+p[1]-1,+p[2]);
    var wk=["周日","周一","周二","周三","周四","周五","周六"][d.getDay()];
    return p[0]+"年"+(+p[1])+"月"+(+p[2])+"日 "+wk;
  }

  // ---- toast ----
  var toastEl=document.getElementById("toast"), toastTimer=null;
  function toast(msg){
    toastEl.textContent=msg;toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){toastEl.classList.remove("show");},1800);
  }

  // ---- build logo mini grid ----
  (function(){
    var logo=document.getElementById("logo");
    var pal=["#ff5d8f","#ffb347","#46d39a","#6f7bdc","#ff6fae","#4a90d9","#c77dde","#e85d4e","#46d39a"];
    for(var i=0;i<9;i++){var s=document.createElement("i");s.style.background=pal[i];logo.appendChild(s);}
  })();

  // ---- legend ----
  (function(){
    var lg=document.getElementById("legend");
    MOODS.forEach(function(m){
      var it=document.createElement("div");it.className="item";
      it.innerHTML='<span class="swatch" style="background:'+m.color+'"></span>'+m.emoji+m.name;
      lg.appendChild(it);
    });
  })();

  // ---- render pixel grid ----
  var gridEl=document.getElementById("grid");
  var gridScroll=gridEl.parentElement;
  var cellMap={}; // date -> cell element, for fast single-cell repaint

  function cellLabel(key,rec){
    if(rec&&MOOD_MAP[rec.mood]){
      var m=MOOD_MAP[rec.mood];
      return cnDate(key)+" · "+m.emoji+m.name+(rec.note?(" · "+rec.note):"");
    }
    return cnDate(key)+" · 未记录";
  }
  function paintCell(key){
    var cell=cellMap[key];
    if(!cell)return;
    var rec=state.data[key];
    cell.style.background=(rec&&MOOD_MAP[rec.mood])?MOOD_MAP[rec.mood].color:EMPTY;
    cell.title=cellLabel(key,rec);
  }
  function renderGrid(){
    var y=state.year, n=daysInYear(y), today=todayStr();
    document.getElementById("dayCount").textContent=n;
    cellMap={};
    var frag=document.createDocumentFragment();
    // leading blanks so weekday rows align (Sun-top style uses getDay)
    var firstDow=new Date(y,0,1).getDay(); // 0 Sun..6 Sat
    for(var b=0;b<firstDow;b++){
      var blank=document.createElement("div");
      blank.className="cell";blank.style.visibility="hidden";frag.appendChild(blank);
    }
    for(var i=0;i<n;i++){
      var key=ymd(dateFromYearIndex(y,i));
      var cell=document.createElement("div");
      cell.className="cell";
      cell.dataset.date=key;
      var rec=state.data[key];
      cell.style.background=(rec&&MOOD_MAP[rec.mood])?MOOD_MAP[rec.mood].color:EMPTY;
      if(key===today)cell.classList.add("today");
      if(key>today)cell.classList.add("future");
      cell.title=cellLabel(key,rec);
      cellMap[key]=cell;
      frag.appendChild(cell);
    }
    gridEl.innerHTML="";
    gridEl.appendChild(frag);
    scrollToToday();
  }
  function scrollToToday(){
    var todayCell=cellMap[todayStr()];
    if(todayCell){
      gridScroll.scrollLeft=todayCell.offsetLeft-gridScroll.clientWidth/2;
    }else{
      // past year -> show the end (December); future year -> show the start (January)
      gridScroll.scrollLeft=(state.year<new Date().getFullYear())?gridScroll.scrollWidth:0;
    }
  }

  gridEl.addEventListener("click",function(e){
    var c=e.target.closest(".cell");
    if(!c||!c.dataset.date)return;
    if(c.classList.contains("future")){toast("还没到这一天哦");return;}
    openSheet(c.dataset.date);
  });

  // ---- stats ----
  function recordsOfYear(){
    var y=state.year+"-", out=[];
    for(var k in state.data){if(k.indexOf(y)===0)out.push(k);}
    return out;
  }
  function renderStats(){
    var keys=recordsOfYear();
    var total=keys.length;
    var n=daysInYear(state.year);
    // completion is measured against days elapsed so far (full year if it's a past year)
    var elapsed=elapsedDaysInYear(state.year,n);
    var pct=elapsed?Math.round(total/elapsed*100):0;
    if(pct>100)pct=100;
    // most frequent mood
    var cnt={},best=null,bestN=0;
    keys.forEach(function(k){var m=state.data[k].mood;cnt[m]=(cnt[m]||0)+1;if(cnt[m]>bestN){bestN=cnt[m];best=m;}});
    var bestTxt=(best&&MOOD_MAP[best])?(MOOD_MAP[best].emoji+MOOD_MAP[best].name):"—";
    // streak ending today (or yesterday)
    var streak=computeStreak();
    var html="";
    html+=card(total,"已记录天数","");
    html+=card(pct,"年度完成度","%");
    html+=card(bestTxt,"最常出现","");
    html+=card(streak,"连续打卡","天");
    document.getElementById("stats").innerHTML=html;
  }
  function elapsedDaysInYear(y,n){
    var now=new Date();
    if(y<now.getFullYear())return n;       // past year: whole year elapsed
    if(y>now.getFullYear())return 0;        // future year: nothing elapsed yet
    return Math.floor((now-new Date(y,0,1))/86400000)+1; // days from Jan 1 through today
  }
  function card(num,lab,unit){
    return '<div class="stat"><div class="num">'+num+(unit?'<small>'+unit+'</small>':'')+'</div><div class="lab">'+lab+'</div></div>';
  }
  function computeStreak(){
    var s=0;var d=new Date();
    if(!state.data[ymd(d)]){d.setDate(d.getDate()-1);} // allow today not yet logged
    while(state.data[ymd(d)]){s++;d.setDate(d.getDate()-1);}
    return s;
  }

  // ---- distribution ----
  function renderDist(){
    var keys=recordsOfYear();
    var total=keys.length;
    var cnt={};
    keys.forEach(function(k){var m=state.data[k].mood;cnt[m]=(cnt[m]||0)+1;});
    document.getElementById("distHint").textContent= total? ("共 "+total+" 条记录") : "还没有记录";
    var rows=MOODS.map(function(m){return {m:m,c:cnt[m.key]||0};})
                  .filter(function(r){return r.c>0;})
                  .sort(function(a,b){return b.c-a.c;});
    var box=document.getElementById("dist");
    if(rows.length===0){box.innerHTML='<div class="lab" style="color:var(--muted);font-size:13px;">点击上方格子，开始记录第一天的心情吧 ✨</div>';return;}
    box.innerHTML=rows.map(function(r){
      var pc=Math.round(r.c/total*100);
      return '<div class="row"><span class="emoji">'+r.m.emoji+'</span>'+
             '<span style="width:34px;color:var(--muted)">'+r.m.name+'</span>'+
             '<span class="bar"><i style="width:'+pc+'%;background:'+r.m.color+'"></i></span>'+
             '<span class="pc">'+r.c+'天</span></div>';
    }).join("");
  }

  // ---- sheet ----
  var mask=document.getElementById("mask");
  var moodPicker=document.getElementById("moodPicker");
  (function(){
    MOODS.forEach(function(m){
      var el=document.createElement("div");el.className="mood";el.dataset.key=m.key;
      el.innerHTML='<span class="e">'+m.emoji+'</span><span class="n">'+m.name+'</span>';
      el.addEventListener("click",function(){
        state.pickMood=m.key;
        Array.prototype.forEach.call(moodPicker.children,function(c){c.classList.toggle("sel",c.dataset.key===m.key);});
      });
      moodPicker.appendChild(el);
    });
  })();

  function openSheet(dateKey){
    state.selectedDate=dateKey;
    var rec=state.data[dateKey];
    state.pickMood=rec?rec.mood:null;
    document.getElementById("sheetTitle").textContent = (dateKey===todayStr())?"今天的心情是？":"这天的心情是？";
    document.getElementById("sheetDate").textContent=cnDate(dateKey);
    document.getElementById("note").value=rec?(rec.note||""):"";
    Array.prototype.forEach.call(moodPicker.children,function(c){c.classList.toggle("sel",rec&&c.dataset.key===rec.mood);});
    document.getElementById("clearBtn").style.display=rec?"block":"none";
    mask.classList.add("show");
  }
  function closeSheet(){mask.classList.remove("show");}

  mask.addEventListener("click",function(e){if(e.target===mask)closeSheet();});
  document.getElementById("saveBtn").addEventListener("click",function(){
    if(!state.pickMood){toast("先选一个心情吧");return;}
    var key=state.selectedDate;
    state.data[key]={mood:state.pickMood,note:document.getElementById("note").value.trim()};
    save();closeSheet();updateAfterEdit(key);toast("已记录 "+MOOD_MAP[state.pickMood].emoji);
  });
  document.getElementById("clearBtn").addEventListener("click",function(){
    var key=state.selectedDate;
    delete state.data[key];save();closeSheet();updateAfterEdit(key);toast("已清除");
  });
  // repaint only the edited cell so the horizontal scroll position is preserved
  function updateAfterEdit(key){paintCell(key);renderStats();renderDist();}

  // ---- toolbar ----
  document.getElementById("todayBtn").addEventListener("click",function(){openSheet(todayStr());});
  document.getElementById("randomBtn").addEventListener("click",function(){
    if(!confirm("将用随机心情填充今年到今天为止的空白格子（仅用于演示），继续？"))return;
    var y=state.year,today=todayStr(),n=daysInYear(y);
    for(var i=0;i<n;i++){
      var key=ymd(dateFromYearIndex(y,i));
      if(key>today)break;
      if(!state.data[key]&&Math.random()<0.7){
        var m=MOODS[Math.floor(Math.random()*MOODS.length)];
        state.data[key]={mood:m.key,note:""};
      }
    }
    save();refresh();toast("已填充示例数据 🎲");
  });

  // ---- year switch ----
  document.getElementById("prevYear").addEventListener("click",function(){state.year--;updateYear();});
  document.getElementById("nextYear").addEventListener("click",function(){state.year++;updateYear();});
  function updateYear(){document.getElementById("yearLabel").textContent=state.year;refresh();}

  // ---- export share image ----
  document.getElementById("exportBtn").addEventListener("click",exportImage);
  function exportImage(){
    var keys=recordsOfYear();
    var scale=(window.devicePixelRatio||1)*2;
    var W=800,H=1000;
    var cv=document.createElement("canvas");
    cv.width=W*scale;cv.height=H*scale;
    var ctx=cv.getContext("2d");ctx.scale(scale,scale);
    // bg
    var g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,"#16182c");g.addColorStop(1,"#0d0e18");
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.fillStyle="rgba(124,131,255,.18)";ctx.beginPath();ctx.arc(120,80,160,0,7);ctx.fill();
    ctx.fillStyle="rgba(70,211,154,.12)";ctx.beginPath();ctx.arc(720,160,180,0,7);ctx.fill();
    // title
    ctx.textBaseline="top";
    ctx.fillStyle="#ffffff";ctx.font="700 40px -apple-system,'PingFang SC',sans-serif";
    ctx.fillText(state.year+" 我的情绪图谱",60,70);
    ctx.fillStyle="#9aa0c4";ctx.font="400 18px -apple-system,'PingFang SC',sans-serif";
    ctx.fillText("MoodPixels · 一年一格，记录每一天的颜色",60,128);

    // grid
    var y=state.year,n=daysInYear(y),today=todayStr();
    var firstDow=new Date(y,0,1).getDay();
    var cols=Math.ceil((n+firstDow)/7);
    var gap=4, gx=60, gy=190;
    var cw=Math.min(13,Math.floor((W-120-(cols-1)*gap)/cols));
    var ch=cw;
    for(var i=0;i<n;i++){
      var idx=i+firstDow;
      var col=Math.floor(idx/7), row=idx%7;
      var key=ymd(dateFromYearIndex(y,i));
      var rec=state.data[key];
      ctx.fillStyle=rec&&MOOD_MAP[rec.mood]?MOOD_MAP[rec.mood].color:"rgba(255,255,255,.06)";
      roundRect(ctx,gx+col*(cw+gap),gy+row*(ch+gap),cw,ch,2.5);ctx.fill();
    }
    var gridBottom=gy+7*(ch+gap)+24;

    // stats line
    var total=keys.length;
    var elapsed=elapsedDaysInYear(y,n);
    var pct=elapsed?Math.min(100,Math.round(total/elapsed*100)):0;
    var cnt={},best=null,bestN=0;
    keys.forEach(function(k){var m=state.data[k].mood;cnt[m]=(cnt[m]||0)+1;if(cnt[m]>bestN){bestN=cnt[m];best=m;}});
    ctx.fillStyle="#ffffff";ctx.font="700 26px -apple-system,'PingFang SC',sans-serif";
    ctx.fillText("已记录 "+total+" 天  ·  完成度 "+pct+"%"+((best&&MOOD_MAP[best])?("  ·  最常 "+MOOD_MAP[best].emoji+MOOD_MAP[best].name):""),60,gridBottom);

    // distribution bars
    var rows=MOODS.map(function(m){return{m:m,c:cnt[m.key]||0};}).filter(function(r){return r.c>0;}).sort(function(a,b){return b.c-a.c;}).slice(0,6);
    var by=gridBottom+56;
    ctx.font="400 20px -apple-system,'PingFang SC',sans-serif";
    rows.forEach(function(r,i){
      var yy=by+i*46;
      ctx.fillStyle="#eef0ff";ctx.fillText(r.m.emoji+" "+r.m.name,60,yy);
      var bx=220,bw=420,bh=14,byy=yy+5;
      ctx.fillStyle="rgba(255,255,255,.08)";roundRect(ctx,bx,byy,bw,bh,7);ctx.fill();
      ctx.fillStyle=r.m.color;roundRect(ctx,bx,byy,Math.max(8,bw*(r.c/(total||1))),bh,7);ctx.fill();
      ctx.fillStyle="#9aa0c4";ctx.fillText(r.c+"天",bx+bw+16,yy);
    });

    // footer
    ctx.fillStyle="#6c7196";ctx.font="400 16px -apple-system,'PingFang SC',sans-serif";
    ctx.fillText("由 TRAE 创作 · #vibecoding大赏 #TRAEAI创造力大赛",60,H-50);

    cv.toBlob(function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url;a.download="MoodPixels_"+state.year+".png";
      document.body.appendChild(a);a.click();a.remove();
      setTimeout(function(){URL.revokeObjectURL(url);},1000);
      toast("分享图已导出 📤");
    },"image/png");
  }
  function roundRect(ctx,x,y,w,h,r){
    if(w<2*r)r=w/2;if(h<2*r)r=h/2;
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // ---- refresh all ----
  function refresh(){renderGrid();renderStats();renderDist();}

  // init
  document.getElementById("yearLabel").textContent=state.year;
  refresh();

})();
</script>
</body>
</html>
