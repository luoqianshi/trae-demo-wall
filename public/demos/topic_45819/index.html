<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Holiday Today</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #000000;
    --bg-card: rgba(255,255,255,0.03);
    --text-primary: #f0ece4;
    --text-secondary: rgba(240,236,228,0.45);
    --accent: #e8c547;
    --accent-glow: rgba(232,197,71,0.12);
    --red: #d4534a;
    --border: rgba(255,255,255,0.06);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 40px;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200vw; height: 200vh;
    background:
      radial-gradient(ellipse 600px 300px at 20% 30%, rgba(100,50,200,0.35) 0%, transparent 100%),
      radial-gradient(ellipse 400px 200px at 70% 20%, rgba(30,80,180,0.25) 0%, transparent 100%),
      radial-gradient(ellipse 500px 250px at 50% 60%, rgba(80,20,140,0.2) 0%, transparent 100%),
      radial-gradient(ellipse 300px 150px at 85% 75%, rgba(0,150,200,0.15) 0%, transparent 100%);
    pointer-events: none;
    animation: driftGalaxy 30s ease-in-out infinite;
    filter: blur(40px);
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 70% 35%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 35% 90%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 60% 5%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 5% 50%, rgba(200,180,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 50% 40%, rgba(180,200,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 80% 85%, rgba(200,180,255,0.3), transparent),
      radial-gradient(2px 2px at 30% 25%, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 75% 60%, rgba(200,220,255,0.45), transparent),
      radial-gradient(2px 2px at 45% 80%, rgba(255,255,255,0.4), transparent);
    pointer-events: none;
    animation: twinkleBg 8s ease-in-out infinite alternate;
  }
  @keyframes driftGalaxy {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(3%, -2%) rotate(0.5deg); }
    50% { transform: translate(-2%, 3%) rotate(-0.3deg); }
    75% { transform: translate(2%, 1%) rotate(0.2deg); }
  }
  @keyframes twinkleBg {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.7; }
  }
  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--d, 4s) ease-in-out infinite var(--t, 0s);
  }
  .stars span.bright {
    width: 3px;
    height: 3px;
    box-shadow: 0 0 8px 2px rgba(180,200,255,0.4);
  }
  .stars span.blue {
    background: rgba(150,180,255,0.9);
    box-shadow: 0 0 4px 1px rgba(100,150,255,0.3);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--o, 0.6); }
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 24px;
  }
  .app-title {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeSlideDown 0.8s ease-out;
  }
  .app-title h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 8px;
    color: var(--text-secondary);
    text-transform: uppercase;
  }
  .app-title .divider {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 12px auto 0;
    opacity: 0.6;
  }
  .main-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 40px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
    animation: fadeSlideUp 0.8s ease-out 0.2s both;
    perspective: 1000px;
  }
  .date-flip {
    transition: transform 0.4s ease, opacity 0.4s ease;
    transform-style: preserve-3d;
  }
  .date-flip.flip-left {
    animation: flipUp 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .date-flip.flip-right {
    animation: flipDown 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  @keyframes flipUp {
    0% {
      transform: perspective(600px) rotateX(0deg);
      opacity: 1;
      transform-origin: bottom center;
      filter: brightness(1);
    }
    10% {
      transform: perspective(600px) rotateX(-3deg);
      opacity: 1;
      transform-origin: bottom center;
      filter: brightness(1.02);
    }
    30% {
      transform: perspective(600px) rotateX(-30deg) scaleY(0.97);
      opacity: 0.85;
      transform-origin: bottom center;
      filter: brightness(1.06) drop-shadow(0 -4px 6px rgba(0,0,0,0.15));
    }
    45% {
      transform: perspective(600px) rotateX(-70deg) scaleY(0.92);
      opacity: 0.4;
      transform-origin: bottom center;
      filter: brightness(1.1) drop-shadow(0 -10px 16px rgba(0,0,0,0.25));
    }
    50% {
      transform: perspective(600px) rotateX(-88deg) scaleY(0.88);
      opacity: 0;
      transform-origin: bottom center;
      filter: brightness(1.12) drop-shadow(0 -14px 22px rgba(0,0,0,0.35));
    }
    53% {
      transform: perspective(600px) rotateX(88deg) scaleY(0.88);
      opacity: 0;
      transform-origin: top center;
      filter: brightness(0.88);
    }
    68% {
      transform: perspective(600px) rotateX(18deg) scaleY(0.96);
      opacity: 0.6;
      transform-origin: top center;
      filter: brightness(0.94) drop-shadow(0 3px 6px rgba(0,0,0,0.12));
    }
    82% {
      transform: perspective(600px) rotateX(6deg) scaleY(0.99);
      opacity: 0.95;
      transform-origin: top center;
      filter: brightness(0.98);
    }
    92% {
      transform: perspective(600px) rotateX(-2deg) scaleY(1.003);
      opacity: 1;
      transform-origin: top center;
      filter: brightness(1.01);
    }
    100% {
      transform: perspective(600px) rotateX(0deg);
      opacity: 1;
      transform-origin: top center;
      filter: brightness(1);
    }
  }
  @keyframes flipDown {
    0% {
      transform: perspective(600px) rotateX(0deg);
      opacity: 1;
      transform-origin: top center;
      filter: brightness(1);
    }
    10% {
      transform: perspective(600px) rotateX(3deg);
      opacity: 1;
      transform-origin: top center;
      filter: brightness(1.02);
    }
    30% {
      transform: perspective(600px) rotateX(30deg) scaleY(0.97);
      opacity: 0.85;
      transform-origin: top center;
      filter: brightness(1.06) drop-shadow(0 4px 6px rgba(0,0,0,0.15));
    }
    45% {
      transform: perspective(600px) rotateX(70deg) scaleY(0.92);
      opacity: 0.4;
      transform-origin: top center;
      filter: brightness(1.1) drop-shadow(0 10px 16px rgba(0,0,0,0.25));
    }
    50% {
      transform: perspective(600px) rotateX(88deg) scaleY(0.88);
      opacity: 0;
      transform-origin: top center;
      filter: brightness(1.12) drop-shadow(0 14px 22px rgba(0,0,0,0.35));
    }
    53% {
      transform: perspective(600px) rotateX(-88deg) scaleY(0.88);
      opacity: 0;
      transform-origin: bottom center;
      filter: brightness(0.88);
    }
    68% {
      transform: perspective(600px) rotateX(-18deg) scaleY(0.96);
      opacity: 0.6;
      transform-origin: bottom center;
      filter: brightness(0.94) drop-shadow(0 -3px 6px rgba(0,0,0,0.12));
    }
    82% {
      transform: perspective(600px) rotateX(-6deg) scaleY(0.99);
      opacity: 0.95;
      transform-origin: bottom center;
      filter: brightness(0.98);
    }
    92% {
      transform: perspective(600px) rotateX(2deg) scaleY(1.003);
      opacity: 1;
      transform-origin: bottom center;
      filter: brightness(1.01);
    }
    100% {
      transform: perspective(600px) rotateX(0deg);
      opacity: 1;
      transform-origin: bottom center;
      filter: brightness(1);
    }
  }
  .main-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.3;
  }
  .year {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 16px;
    font-weight: 300;
    line-height: 1;
    text-align: center;
    letter-spacing: 6px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .date-line {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
    touch-action: pan-y;
    user-select: none;
    cursor: grab;
  }
  .date-line:active { cursor: grabbing; }
  .date-line .date-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 64px;
    font-weight: 900;
    color: var(--text-primary);
    letter-spacing: 4px;
    line-height: 1.1;
  }
  .date-line .swipe-hint {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 8px;
    opacity: 0.5;
    letter-spacing: 2px;
  }
  .date-picker-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 32px;
  }
  .dp-trigger {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dp-trigger:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .dp-trigger svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .dp-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .dp-overlay.active {
    display: flex;
  }
  .dp-panel {
    width: 100%;
    max-width: 420px;
    background: #0a0a0f;
    border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 20px 0 30px;
    animation: dpSlideUp 0.3s ease;
  }
  @keyframes dpSlideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .dp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px 16px;
    border-bottom: 1px solid var(--border);
  }
  .dp-header-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .dp-cancel {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
  }
  .dp-cancel:hover { color: var(--text-primary); }
  .dp-columns {
    display: flex;
    height: 220px;
    position: relative;
    margin-top: 12px;
  }
  .dp-column {
    flex: 1;
    height: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    position: relative;
  }
  .dp-column::-webkit-scrollbar { display: none; }
  .dp-column-unit {
    flex: 0 0 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-secondary);
    opacity: 0.4;
  }
  .dp-item {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--text-secondary);
    scroll-snap-align: center;
    transition: color 0.2s, transform 0.2s;
    cursor: pointer;
    user-select: none;
  }
  .dp-item.selected {
    color: var(--accent);
    font-weight: 600;
    transform: scale(1.08);
  }
  .dp-highlight {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 44px;
    border-top: 1px solid rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(232,197,71,0.04);
    pointer-events: none;
    z-index: 1;
  }
  .dp-fade-top, .dp-fade-bottom {
    position: absolute;
    left: 0;
    right: 0;
    height: 60px;
    pointer-events: none;
    z-index: 2;
  }
  .dp-fade-top {
    top: 0;
    background: linear-gradient(to bottom, #0a0a0f 0%, transparent 100%);
  }
  .dp-fade-bottom {
    bottom: 0;
    background: linear-gradient(to top, #0a0a0f 0%, transparent 100%);
  }
  .dp-confirm-row {
    display: flex;
    justify-content: center;
    padding-top: 16px;
  }
  .dp-confirm {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #000;
    background: var(--accent);
    border: none;
    border-radius: 100px;
    padding: 10px 48px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .dp-confirm:hover {
    box-shadow: 0 0 20px rgba(232,197,71,0.3);
  }
  .date-line .swipe-arrows {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 100%;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    padding: 0 4px;
  }
  .date-line .swipe-arrows span {
    font-size: 18px;
    color: var(--text-secondary);
    opacity: 0.25;
    transition: opacity 0.3s;
  }
  .date-line:hover .swipe-arrows span { opacity: 0.5; }
  .date-line .weekday {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .section-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 0 0 32px;
    position: relative;
  }
  .section-divider::after {
    content: '\2726';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg-primary);
    padding: 0 12px;
    color: var(--accent);
    font-size: 10px;
    opacity: 0.6;
  }
  .holiday-section {
    animation: fadeSlideUp 0.8s ease-out 0.4s both;
  }
  .holiday-item {
    margin-bottom: 28px;
    animation: fadeSlideUp 0.6s ease-out both;
    text-align: center;
  }
  .holiday-item:last-child { margin-bottom: 0; }
  .holiday-item + .holiday-item {
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .holiday-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--accent);
    cursor: pointer;
    display: inline-block;
    position: relative;
    transition: all 0.3s ease;
    line-height: 1.4;
  }
  .holiday-name:hover {
    text-shadow: 0 0 30px var(--accent-glow);
    transform: translateY(-1px);
  }
  .holiday-name::after {
    content: '\203A';
    display: inline-block;
    margin-left: 8px;
    font-size: 20px;
    opacity: 0;
    transition: all 0.3s ease;
    color: var(--text-secondary);
  }
  .holiday-name:hover::after {
    opacity: 1;
    transform: translateX(4px);
  }
  .holiday-countries {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .country-tag {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 4px 14px;
    border-radius: 100px;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .country-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }
  .country-tag.cn {
    border-color: rgba(212,83,74,0.3);
    color: var(--red);
    background: rgba(212,83,74,0.08);
  }
  .no-holiday {
    text-align: center;
    padding: 20px 0;
  }
  .no-holiday .emoji {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
  }
  .no-holiday .text {
    font-size: 16px;
    color: var(--text-secondary);
    font-weight: 300;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-width: 520px;
    width: 100%;
    padding: 40px;
    position: relative;
    transform: translateY(20px) scale(0.95);
    transition: transform 0.3s ease;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-overlay.active .modal {
    transform: translateY(0) scale(1);
  }
  .modal h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    padding-right: 40px;
  }
  .modal .modal-countries {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .modal .modal-body {
    font-size: 15px;
    line-height: 1.8;
    color: rgba(240,236,228,0.8);
    font-weight: 300;
  }
  .footer {
    text-align: center;
    margin-top: 32px;
    animation: fadeSlideUp 0.8s ease-out 0.6s both;
  }
  .footer p {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 2px;
    opacity: 0.5;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 480px) {
    .main-card { padding: 28px 20px; }
    .year { font-size: 14px; letter-spacing: 4px; }
    .date-line .date-text { font-size: 42px; letter-spacing: 2px; }
    .date-line .weekday { font-size: 13px; }
    .date-line .swipe-hint { font-size: 10px; }
    .holiday-name { font-size: 24px; }
    .country-tag { font-size: 12px; padding: 3px 10px; }
    .modal { padding: 28px; }
  }
</style>
</head>
<body>

<div class="noise"></div>
<div class="stars" id="stars"></div>

<div class="container">
  <div class="app-title">
    <h1>The Holiday Today</h1>
    <div class="divider"></div>
  </div>

  <div class="main-card">
    <div class="date-flip" id="dateFlip">
    <div class="year" id="year"></div>
    <div class="date-line" id="dateLine">
      <div class="swipe-arrows"><span>&#8249;</span><span>&#8250;</span></div>
      <div class="date-text" id="dateText"></div>
      <div class="weekday" id="weekday"></div>
      <div class="swipe-hint" id="swipeHint"></div>

  var d = date || new Date();

  // To get UTC calendar time: local + offset, then add 8h for CST
  var utcMs = d.getTime() + d.getTimezoneOffset() * 60000;

  return {
    year: cst.getFullYear(),

  };
}

  var day = offset + 1;

// ==================== 日期工具 ====================
var WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
var LUNAR_MONTH_CN = ['','正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
var LUNAR_DAY_CN = ['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

function getLunarCn() {
  var cst = getDateInCST(currentDate);
  var lunar = solar2lunar(cst.year, cst.month, cst.day);
  return LUNAR_MONTH_CN[lunar.lMonth] + LUNAR_DAY_CN[lunar.lDay];
}

// ==================== 状态 ====================
var currentDate = new Date();
var todayDate = new Date();

function getTodayKey() {
  var cst = getDateInCST(currentDate);
  var m = String(cst.month).padStart(2, '0');
  var d = String(cst.day).padStart(2, '0');
  return m + '-' + d;
}

function formatDate() {
  var cst = getDateInCST(currentDate);
  return {
    year: cst.year,
    month: cst.month,
    day: cst.day,
    weekday: WEEKDAYS[currentDate.getDay()]
  };
}

function getLunarKey() {
  var cst = getDateInCST(currentDate);
  var lunar = solar2lunar(cst.year, cst.month, cst.day);
  var m = String(lunar.lMonth).padStart(2, '0');
  var d = String(lunar.lDay).padStart(2, '0');
  return m + '-' + d;
}

function isToday() {
  var c1 = getDateInCST(currentDate);
  var c2 = getDateInCST(todayDate);
  return c1.year === c2.year && c1.month === c2.month && c1.day === c2.day;
}

// ==================== 渲染 ====================
function render() {
  var info = formatDate();
  var solarKey = getTodayKey();
  var lunarKey = getLunarKey();

  document.getElementById('year').textContent = info.year;
  document.getElementById('dateText').textContent = info.month + ' \u6708 ' + info.day + ' \u65E5';
  document.getElementById('weekday').textContent = info.weekday + '  \u00B7  ' + getLunarCn();

  // 滑动提示
  var hint = document.getElementById('swipeHint');
  if (isToday()) {
    hint.textContent = '\u2190 \u6ED1\u52A8\u67E5\u770B\u5176\u4ED6\u65E5\u671F \u2192';
  } else {
    hint.textContent = '\u2190 \u7EE7\u7EED\u6ED1\u52A8 \u00B7 \u53CC\u51FB\u56DE\u5230\u4ECA\u5929 \u2192';
  }

  var section = document.getElementById('holidaySection');
  var allHolidays = [];

  // 收集公历节日
  var solarHolidays = SOLAR[solarKey];
  if (solarHolidays) {
    for (var i = 0; i < solarHolidays.length; i++) {
      allHolidays.push(solarHolidays[i]);
    }
  }

  // 收集农历节日
  var lunarHolidays = LUNAR[lunarKey];
  if (lunarHolidays) {
    for (var i = 0; i < lunarHolidays.length; i++) {
      allHolidays.push(lunarHolidays[i]);
    }
  }

  // 排序：中国节日优先
  allHolidays.sort(function(a, b) {
    if (a.cn && !b.cn) return -1;
    if (!a.cn && b.cn) return 1;
    return 0;
  });

  if (allHolidays.length === 0) {
    section.innerHTML = '<div class="no-holiday"><span class="emoji">\uD83C\uDF0D</span><p class="text">今天全球没有法定假日</p><p class="text" style="margin-top:8px;font-size:13px;opacity:0.5;">平凡的一天，也值得好好度过</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < allHolidays.length; i++) {
    var h = allHolidays[i];
    var delay = i * 0.15;
    html += '<div class="holiday-item" style="animation-delay:' + delay + 's">';
    html += '<div class="holiday-name" onclick="showModal(' + i + ')">' + h.name + '</div>';
    html += '<div class="holiday-countries">';
    for (var j = 0; j < h.countries.length; j++) {
      var cnClass = isChineseCountry(h.countries[j]) ? ' cn' : '';
      html += '<span class="country-tag' + cnClass + '" onclick="showCountry(\'' + h.countries[j].replace(/'/g, "\\'") + '\')">' + h.countries[j] + '</span>';
    }
    html += '</div></div>';
  }

  section.innerHTML = html;

  // 存储到全局供弹窗使用
  window._holidays = allHolidays;
}

function isChineseCountry(name) {
  return name === '中国' || name === '中国台湾' || name === '中国香港' || name === '中国澳门';
}

  "法国": "位于西欧，首都巴黎。世界第六大经济体，以时尚、美食、葡萄酒、艺术和哲学闻名。1789年法国大革命对世界民主运动产生深远影响。联合国安理会常任理事国。",
  "德国": "位于中欧，首都柏林。欧洲最大经济体，以精密工程、汽车制造和工业技术闻名。1990年东西德统一。是欧盟核心成员国和欧洲最大的出口国。",
  "意大利": "位于南欧，首都罗马。拥有世界上最多的联合国教科文组织世界遗产。是文艺复兴的发源地，在艺术、建筑、时尚和美食方面享有盛誉。",
  "俄罗斯": "横跨欧亚两洲，首都莫斯科。世界面积最大的国家，拥有丰富的自然资源。1991年苏联解体后独立。联合国安理会常任理事国，军事力量世界领先。",
  "印度": "位于南亚次大陆，首都新德里。世界人口最多的国家。拥有悠久的文明史，是印度教、佛教、锡克教和耆那教的发源地。IT产业和航天技术发展迅速。",
  "巴西": "位于南美洲，首都巴西利亚。南美洲面积最大、人口最多的国家。以足球、桑巴舞、亚马逊雨林和里约狂欢节闻名。是金砖国家之一。",
  "澳大利亚": "位于南半球，首都堪培拉。既是国家也是大陆，是世界第六大国。以独特的野生动物（袋鼠、考拉）、大堡礁和广袤的内陆荒野闻名。",
  "墨西哥": "位于北美洲南部，首都墨西哥城。拥有灿烂的古代玛雅和阿兹特克文明遗产。以美食、音乐和色彩斑斓的文化闻名。是西班牙语人口最多的国家。",
  "阿根廷": "位于南美洲南部，首都布宜诺斯艾利斯。以探戈、牛肉、足球和巴塔哥尼亚高原闻名。20世纪初曾是世界上最富裕的国家之一。",
  "土耳其": "横跨欧亚两洲，首都安卡拉。历史可追溯至奥斯曼帝国。以伊斯坦布尔的博斯普鲁斯海峡、蓝色清真寺和丰富的历史文化闻名。",
  "沙特阿拉伯": "位于阿拉伯半岛，首都利雅得。世界最大的石油出口国，伊斯兰教两大圣地麦加和麦地那所在地。是中东地区经济和军事强国。",
  "南非": "位于非洲大陆最南端，首都比勒陀利亚。以种族隔离制度的终结和纳尔逊-曼德拉的和解精神闻名。拥有丰富的矿产资源和多元的文化。",
  "埃及": "位于非洲东北部，首都开罗。拥有世界上最古老的文明之一，金字塔和狮身人面像是人类文明的标志性建筑。苏伊士运河是全球最重要的航运通道之一。",
  "泰国": "位于东南亚，首都曼谷。以佛教文化、热带海滩、美食和友善的人民闻名。是世界上最大的大米出口国之一，旅游业是经济支柱。",
  "越南": "位于东南亚，首都河内。拥有悠久的历史和丰富的文化遗产。以下龙湾、越南美食（河粉、春卷）和快速发展的经济闻名。",
  "新加坡": "位于东南亚，是一个城市国家。面积仅约730平方公里，却是亚洲最重要的金融中心和贸易港口之一。以高效的治理、清洁的城市和多元文化著称。",
  "马来西亚": "位于东南亚，首都吉隆坡。由马来半岛南部和加里曼丹岛北部两部分组成。以多元种族文化、美食和双子塔闻名。",
  "印度尼西亚": "位于东南亚，首都雅加达。由超过17000个岛屿组成，是世界最大的群岛国家。人口约2.7亿，是世界第四人口大国。以巴厘岛和丰富的火山地貌闻名。",
  "菲律宾": "位于东南亚，首都马尼拉。由超过7000个岛屿组成。以美丽的海滩、热情的人民和丰富的西班牙殖民时期遗产闻名。",
  "波兰": "位于中欧，首都华沙。历史上曾被多次瓜分和重建。1989年团结工会运动推动了东欧民主化浪潮。以肖邦音乐和丰富的历史遗产闻名。",
  "瑞典": "位于北欧斯堪的纳维亚半岛，首都斯德哥尔摩。以高福利社会、宜家家具、沃尔沃汽车和诺贝尔奖闻名。是创新科技和音乐产业的强国。",
  "挪威": "位于北欧斯堪的纳维亚半岛西部，首都奥斯陆。以壮丽的峡湾景观、高生活水平和丰富的石油资源闻名。是全球最富裕的国家之一。",
  "丹麦": "位于北欧，首都哥本哈根。以安徒生童话、乐高积木、高品质设计和幸福指数闻名。是最古老的君主制国家之一。",
  "芬兰": "位于北欧，首都赫尔辛基。以教育体系、桑拿文化、诺基亚和圣诞老人村闻名。是全球教育质量最高的国家之一。",
  "冰岛": "位于北大西洋，首都雷克雅未克。以火山、冰川、温泉和北极光闻名。是世界上人口密度最低的国家之一。",
  "瑞士": "位于中欧内陆，首都伯尔尼。以永久中立国地位、银行业、精密手表、巧克力和阿尔卑斯山脉闻名。是世界人均GDP最高的国家之一。",
  "奥地利": "位于中欧，首都维也纳。以古典音乐（莫扎特、贝多芬）、阿尔卑斯山脉和高质量生活闻名。维也纳多次被评为全球最宜居城市。",
  "西班牙": "位于伊比利亚半岛，首都马德里。以弗拉明戈舞、斗牛、高迪建筑和丰富的美食文化闻名。拥有众多世界遗产。",
  "葡萄牙": "位于伊比利亚半岛西部，首都里斯本。以大航海时代的探险历史、法多音乐和蛋挞闻名。15-16世纪曾建立庞大的殖民帝国。",
  "希腊": "位于东南欧，首都雅典。是西方文明的摇篮，民主制度、哲学、奥林匹克运动会的发源地。以爱琴海的美丽岛屿和古代遗迹闻名。",
  "乌克兰": "位于东欧，首都基辅。1991年苏联解体后独立。拥有肥沃的黑土地，是重要的粮食出口国。2022年起抵抗俄罗斯入侵。",
  "以色列": "位于中东地中海东岸，首都耶路撒冷。1948年建国，是世界上唯一以犹太人为主体的国家。是三大一神教的圣地，科技产业高度发达。",
  "新西兰": "位于太平洋西南部，首都惠灵顿。以纯净的自然环境、毛利文化和《指环王》拍摄地闻名。是世界上第一个赋予妇女选举权的国家。",
  "爱尔兰": "位于欧洲西北部，首都都柏林。以翡翠般的绿色乡村、威士忌、圣帕特里克节和凯尔特文化闻名。是欧盟成员国。",
  "荷兰": "位于西欧，首都阿姆斯特丹。以风车、郁金香、运河和宽容的社会政策闻名。是世界第二大农产品出口国。",
  "比利时": "位于西欧，首都布鲁塞尔。是欧盟和北约总部所在地。以巧克力、啤酒和华夫饼闻名。拥有丰富的中世纪城市遗产。",
  "哥伦比亚": "位于南美洲西北部，首都波哥大。以咖啡、祖母绿宝石和丰富的生物多样性闻名。拥有从安第斯山脉到亚马逊雨林的多样地貌。",
  "秘鲁": "位于南美洲西部，首都利马。是印加帝国的发源地，马丘比丘是世界新七大奇迹之一。以安第斯文化、美食和丰富的考古遗址闻名。",
  "智利": "位于南美洲西部，南北绵延超过4300公里，是世界上最狭长的国家。以阿塔卡马沙漠、巴塔哥尼亚冰川和优质葡萄酒闻名。",
  "委内瑞拉": "位于南美洲北部，首都加拉加斯。拥有世界最大的已探明石油储量。以安赫尔瀑布（世界最高瀑布）和加勒比海海岸线闻名。",
  "古巴": "位于加勒比海，首都哈瓦那。以复古汽车、雪茄、朗姆酒和萨尔萨音乐闻名。1959年卡斯特罗革命后建立了西半球第一个社会主义国家。",
  "巴基斯坦": "位于南亚，首都伊斯兰堡。1947年从英属印度分离独立。是世界第六人口大国，拥有核武器。以伊斯兰文化和喀喇昆仑山脉闻名。",
  "孟加拉国": "位于南亚，首都达卡。1971年从巴基斯坦独立。是世界上人口密度最高的国家之一，以恒河三角洲的肥沃平原和纺织业闻名。",
  "尼日利亚": "位于西非，首都阿布贾。非洲人口最多的国家和最大经济体。以诺莱坞电影产业、丰富的石油资源和多元的民族文化闻名。",
  "肯尼亚": "位于东非，首都内罗毕。以野生动物大迁徙、马赛马拉保护区和长跑运动员闻名。是东非最大的经济体。",
  "坦桑尼亚": "位于东非，首都多多马（达累斯萨拉姆为商业中心）。以非洲最高峰乞力马扎罗山、塞伦盖蒂草原和桑给巴尔岛闻名。1964年由坦噶尼喀和桑给巴尔合并而成。",
  "摩洛哥": "位于非洲西北部，首都拉巴特。以撒哈拉沙漠、马拉喀什古城和丰富的摩尔式建筑闻名。是非洲最受欢迎的旅游目的地之一。",
  "埃塞俄比亚": "位于东非，首都亚的斯亚贝巴。是非洲唯一未被殖民的国家。拥有自己独特的文字和历法。以咖啡的发源地和拉利贝拉的岩石教堂闻名。",
  "蒙古": "位于东亚内陆，首都乌兰巴托。是世界上面积最大的内陆国。以广袤的草原、游牧文化和成吉思汗的历史遗产闻名。",
  "缅甸": "位于东南亚，首都内比都。以佛教寺庙（如仰光大金塔）、丰富的自然资源和多元的民族文化闻名。",
  "柬埔寨": "位于东南亚，首都金边。以吴哥窟（世界最大的宗教建筑群）和高棉帝国的辉煌历史闻名。",
  "老挝": "位于东南亚内陆，首都万象。是东南亚唯一的内陆国家。以佛教文化、湄公河和法式殖民建筑闻名。",
  "文莱": "位于加里曼丹岛北部，首都斯里巴加湾市。以丰富的石油和天然气资源闻名，是世界上人均GDP最高的国家之一。",
  "马尔代夫": "位于印度洋，首都马累。由约1200个珊瑚岛屿组成，是世界地势最低的国家。以水上别墅、潜水天堂和绝美的海岛风光闻名。",
  "东帝汶": "位于东南亚帝汶岛东部，首都帝力。2002年独立，是21世纪第一个新生国家。以丰富的海洋资源和独特的葡萄牙-东南亚混合文化闻名。",
  "土库曼斯坦": "位于中亚，首都阿什哈巴德。以丰富的天然气资源闻名，拥有世界上第五大天然气储量。1991年苏联解体后独立。",
  "也门": "位于阿拉伯半岛南端，首都萨那。拥有悠久的历史，是古代香料贸易的重要中转站。以古城萨那和索科特拉岛的独特生物闻名。",
  "叙利亚": "位于中东，首都大马士革。是世界上最古老的持续有人居住的城市之一。拥有丰富的历史遗产，包括帕尔米拉古城和大马士革老城。",
  "约旦": "位于中东，首都安曼。以佩特拉古城（世界新七大奇迹之一）、死海和丰富的历史遗迹闻名。是中东地区相对稳定的君主立宪制国家。",
  "巴勒斯坦": "位于中东，包括约旦河西岸和加沙地带。历史可以追溯到古迦南时期。以耶路撒冷的宗教圣地和丰富的文化传统闻名。",
  "黎巴嫩": "位于地中海东岸，首都贝鲁特。以黎巴嫩雪松、美食和曾经被称为「中东巴黎」的繁荣文化闻名。是中东地区宗教最多元的国家之一。",
  "伊拉克": "位于中东，首都巴格达。是古代美索不达米亚文明的发源地，拥有巴比伦空中花园等世界奇迹的遗址。以丰富的石油资源闻名。",
  "伊朗": "位于中东，首都德黑兰。拥有超过2500年的波斯帝国历史。以波斯波利斯古城、精美的地毯和诗歌文化闻名。是中东地区的重要大国。",
  "阿富汗": "位于中亚和南亚交界处，首都喀布尔。是古代丝绸之路的重要节点，以兴都库什山脉和丰富的历史文化遗产闻名。",
  "哈萨克斯坦": "位于中亚，首都阿斯塔纳。是世界上最大的内陆国，拥有丰富的石油、天然气和矿产资源。1991年苏联解体后独立。",
  "乌兹别克斯坦": "位于中亚，首都塔什干。是古丝绸之路上的重要国家，以撒马尔罕的雷吉斯坦广场和布哈拉古城闻名。1991年苏联解体后独立。",
  "格鲁吉亚": "位于高加索地区，首都第比利斯。以高加索山脉的壮丽风光、葡萄酒文化和独特的字母系统闻名。1991年苏联解体后独立。",
  "亚美尼亚": "位于高加索地区，首都埃里温。是世界上第一个将基督教定为国教的国家（公元301年）。以亚拉拉特山和古老的修道院闻名。",
  "阿塞拜疆": "位于高加索地区，首都巴库。以里海沿岸的石油资源和巴库的现代建筑闻名。被称为「高加索的火之国」。",
  "罗马尼亚": "位于东南欧，首都布加勒斯特。以喀尔巴阡山脉、特兰西瓦尼亚的吸血鬼传说和黑海海岸线闻名。是东欧较大的经济体。",
  "保加利亚": "位于东南欧巴尔干半岛，首都索非亚。以玫瑰精油、酸奶和黑海度假胜地闻名。是欧盟成员国。",
  "匈牙利": "位于中欧，首都布达佩斯。以多瑙河畔的壮丽城市景观、温泉浴场和丰富的音乐传统（李斯特）闻名。",
  "捷克": "位于中欧，首都布拉格。以布拉格老城、查理大桥和啤酒文化闻名。1993年捷克斯洛伐克和平分裂为捷克和斯洛伐克。",
  "斯洛伐克": "位于中欧，首都布拉迪斯拉发。1993年与捷克和平分裂。以喀尔巴阡山脉的城堡和自然风光闻名。",
  "塞尔维亚": "位于东南欧巴尔干半岛，首都贝尔格莱德。以强大的网球传统（德约科维奇）和丰富的东正教文化闻名。",
  "克罗地亚": "位于东南欧亚得里亚海沿岸，首都萨格勒布。以杜布罗夫尼克古城（权力的取景地）和美丽海岸线闻名。2013年加入欧盟。",
  "斯洛文尼亚": "位于中欧南部，首都卢布尔雅那。以布莱德湖、喀斯特地貌和高质量的葡萄酒闻名。是前南斯拉夫国家中最富裕的。",
  "波黑": "位于东南欧巴尔干半岛，首都萨拉热窝。以莫斯塔尔古桥和多元的宗教文化遗产闻名。1992-1995年经历了残酷的波黑战争。",
  "北马其顿": "位于东南欧巴尔干半岛，首都斯科普里。以奥赫里德湖和亚历山大大帝的故乡闻名。1991年从前南斯拉夫独立。",
  "黑山": "位于东南欧亚得里亚海沿岸，首都波德戈里察。以壮丽的科托尔湾和杜米托尔国家公园闻名。2006年从塞尔维亚独立。",
  "阿尔巴尼亚": "位于东南欧巴尔干半岛，首都地拉那。以独特的碉堡建筑和 pristine 的海滩闻名。曾长期处于封闭状态，近年来旅游业快速发展。",
  "立陶宛": "位于波罗的海沿岸，首都维尔纽斯。是欧盟成员国，以巴洛克风格的维尔纽斯老城和篮球运动闻名。1990年第一个宣布脱离苏联独立。",
  "拉脱维亚": "位于波罗的海沿岸，首都里加。以里加老城的新艺术风格建筑和广阔的森林闻名。是欧盟成员国。",
  "爱沙尼亚": "位于波罗的海沿岸，首都塔林。以数字政府（电子居民计划）和高科技产业闻名。是欧盟成员国，被称为「波罗的海之虎」。",
  "塞浦路斯": "位于地中海东部，首都尼科西亚。是欧盟成员国，以古希腊神话中爱神阿佛洛狄忒的诞生地和优美的海滩闻名。",
  "马耳他": "位于地中海中部，首都瓦莱塔。是世界上面积最小的欧盟成员国。以圣约翰骑士团的历史遗产和地中海风格建筑闻名。",

// ==================== 弹窗 ====================
function showModal(index) {
  var h = window._holidays[index];
  if (!h) return;
  document.getElementById('modalTitle').textContent = h.name;
  document.getElementById('modalCountries').textContent = h.countries.join('\u3001');
  document.getElementById('modalBody').textContent = h.origin;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function showCountry(name) {
  var info = COUNTRIES[name] || name + '\u662F\u4E00\u4E2A\u62E5\u6709\u4E30\u5BCC\u5386\u53F2\u548C\u6587\u5316\u7684\u56FD\u5BB6\u3002';
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalCountries').textContent = '';
  document.getElementById('modalBody').textContent = info;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ==================== 滑动手势 ====================
(function() {
  var dateLine = document.getElementById('dateLine');
  var startX = 0, startY = 0, deltaX = 0, swiping = false;

  dateLine.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    deltaX = 0;
    swiping = true;
  }, { passive: true });

  dateLine.addEventListener('touchmove', function(e) {
    if (!swiping) return;
    deltaX = e.touches[0].clientX - startX;
  }, { passive: true });

  dateLine.addEventListener('touchend', function() {
    if (!swiping) return;
    swiping = false;
    if (Math.abs(deltaX) > 50) {
      if (deltaX < 0) {
        // 向左滑 → 后一天
        currentDate.setDate(currentDate.getDate() + 1);
        renderWithAnimation('next');
      } else {
        // 向右滑 → 前一天
        currentDate.setDate(currentDate.getDate() - 1);
        renderWithAnimation('prev');
      }
    }
    deltaX = 0;
  });

  // 鼠标拖拽支持
  var mouseDown = false;
  dateLine.addEventListener('mousedown', function(e) {
    mouseDown = true;
    startX = e.clientX;
    deltaX = 0;
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!mouseDown) return;
    deltaX = e.clientX - startX;
  });
  document.addEventListener('mouseup', function() {
    if (!mouseDown) return;
    mouseDown = false;
    if (Math.abs(deltaX) > 50) {
      if (deltaX < 0) {
        currentDate.setDate(currentDate.getDate() + 1);
        renderWithAnimation('next');
      } else {
        currentDate.setDate(currentDate.getDate() - 1);
        renderWithAnimation('prev');
      }
    }
    deltaX = 0;
  });

  // 双击回到今天
  dateLine.addEventListener('dblclick', function() {
    currentDate = new Date();
    renderWithAnimation();
  });
})();

function renderWithAnimation(dir) {
  // 日期部分：翻日历效果
  var dateFlip = document.getElementById('dateFlip');
  var cls = dir === 'next' ? 'flip-right' : dir === 'prev' ? 'flip-left' : 'flip-right';
  dateFlip.classList.remove('flip-left', 'flip-right');
  void dateFlip.offsetWidth;
  dateFlip.classList.add(cls);
  setTimeout(function() {
    dateFlip.classList.remove('flip-left', 'flip-right');
  }, 750);

  // 节日部分：淡入淡出
  var section = document.getElementById('holidaySection');
  section.style.opacity = '0';
  section.style.transform = 'translateY(10px)';
  setTimeout(function() {
    render();
    section.style.transition = 'all 0.3s ease';
    section.style.opacity = '1';
    section.style.transform = 'translateY(0)';
  }, 350);
}

// ==================== 星空生成 ====================
(function() {
  var starsEl = document.getElementById('stars');
  var count = 120;
  var html = '';
  for (var i = 0; i < count; i++) {
    var x = (Math.random() * 100).toFixed(1);
    var y = (Math.random() * 100).toFixed(1);
    var d = (2 + Math.random() * 6).toFixed(1);
    var t = (Math.random() * 6).toFixed(1);
    var o = (0.2 + Math.random() * 0.6).toFixed(2);
    var r = Math.random();
    var cls = '';
    if (r > 0.9) cls = ' bright';
    else if (r > 0.75) cls = ' blue';
    html += '<span class="' + cls + '" style="left:' + x + '%;top:' + y + '%;--d:' + d + 's;--t:' + t + 's;--o:' + o + '"></span>';
  }
  starsEl.innerHTML = html;
})();

// ==================== 自定义日期选择器 ====================
(function() {
  var overlay = document.getElementById('dpOverlay');
  var trigger = document.getElementById('dpTrigger');
  var triggerText = document.getElementById('dpTriggerText');
  var cancelBtn = document.getElementById('dpCancel');
  var confirmBtn = document.getElementById('dpConfirm');
  var columnsEl = document.getElementById('dpColumns');
  var todayBtn = document.getElementById('todayBtn');

  var ITEM_H = 44;
  var PAD = 88; // 上下各2个item的padding
  var CENTER = 110; // 容器高度220/2 = 110
  var selected = { year: 0, month: 0, day: 0 };
  var cols = [];

  function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

  function makeCol(items) {
    var col = document.createElement('div');
    col.className = 'dp-column';
    var html = '';
    for (var p = 0; p < 2; p++) html += '<div class="dp-item" style="visibility:hidden">&nbsp;</div>';
    for (var i = 0; i < items.length; i++) {
      html += '<div class="dp-item" data-v="' + items[i] + '">' + items[i] + '</div>';
    }
    for (var p = 0; p < 2; p++) html += '<div class="dp-item" style="visibility:hidden">&nbsp;</div>';
    col.innerHTML = html;
    columnsEl.appendChild(col);
    return col;
  }

  function makeUnit(label) {
    var u = document.createElement('div');
    u.className = 'dp-column-unit';
    u.textContent = label;
    columnsEl.appendChild(u);
  }

  function scrollTo(col, idx, animate) {
    var top = idx * ITEM_H + PAD - CENTER + ITEM_H / 2;
    col.scrollTop = top;
  }

  function getIdx(col) {
    var s = col.scrollTop - PAD + CENTER - ITEM_H / 2;
    return Math.max(0, Math.round(s / ITEM_H));
  }

  function highlight(col) {
    var items = col.querySelectorAll('.dp-item[data-v]');
    var idx = getIdx(col);
    for (var i = 0; i < items.length; i++) {
      items[i].classList.toggle('selected', i === idx);
    }
    return items[idx] ? parseInt(items[idx].dataset.v) : 0;
  }

  function syncDayCol() {
    var max = daysInMonth(selected.year, selected.month);
    if (selected.day > max) selected.day = max;
    var dayCol = cols[2];
    var items = dayCol.querySelectorAll('.dp-item[data-v]');
    // rebuild if needed
    if (items.length !== max) {
      var html = '';
      for (var p = 0; p < 2; p++) html += '<div class="dp-item" style="visibility:hidden">&nbsp;</div>';
      for (var i = 1; i <= max; i++) html += '<div class="dp-item" data-v="' + i + '">' + i + '</div>';
      for (var p = 0; p < 2; p++) html += '<div class="dp-item" style="visibility:hidden">&nbsp;</div>';
      dayCol.innerHTML = html;
    }
    scrollTo(dayCol, selected.day - 1, false);
    highlight(dayCol);
  }

  function readCols() {
    selected.year = highlight(cols[0]);
    var newM = highlight(cols[1]);
    if (newM !== selected.month) {
      selected.month = newM;
      syncDayCol();
    }
    selected.day = highlight(cols[2]);
    var max = daysInMonth(selected.year, selected.month);
    if (selected.day < 1) selected.day = 1;
    if (selected.day > max) selected.day = max;
  }

  function open() {
    var cst = getDateInCST(currentDate);
    selected.year = cst.year;
    selected.month = cst.month;
    selected.day = cst.day;

    var old = columnsEl.querySelectorAll('.dp-column, .dp-column-unit');
    for (var i = 0; i < old.length; i++) old[i].remove();
    cols = [];

    // Year column
    var years = [];
    for (var y = 1900; y <= 2100; y++) years.push(y);
    cols.push(makeCol(years));
    makeUnit('年');

    // Month column
    var months = [];
    for (var m = 1; m <= 12; m++) months.push(m);
    cols.push(makeCol(months));
    makeUnit('月');

    // Day column
    var maxDay = daysInMonth(selected.year, selected.month);
    var days = [];
    for (var d = 1; d <= maxDay; d++) days.push(d);
    cols.push(makeCol(days));
    makeUnit('日');

    // Scroll to current (delay to ensure DOM is rendered)
    overlay.classList.add('active');
    setTimeout(function() {
      scrollTo(cols[0], selected.year - 1900, false);
      scrollTo(cols[1], selected.month - 1, false);
      scrollTo(cols[2], selected.day - 1, false);
      highlight(cols[0]);
      highlight(cols[1]);
      highlight(cols[2]);
    }, 50);
  }

  function close() { overlay.classList.remove('active'); }

  trigger.addEventListener('click', open);
  cancelBtn.addEventListener('click', close);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });

  confirmBtn.addEventListener('click', function() {
    var max = daysInMonth(selected.year, selected.month);
    if (selected.day < 1) selected.day = 1;
    if (selected.day > max) selected.day = max;
    currentDate = new Date(selected.year, selected.month - 1, selected.day);
    close();
    renderWithAnimation();
  });

  todayBtn.addEventListener('click', function() {
    currentDate = new Date();
    close();
    renderWithAnimation();
  });

  var scrollTimer = null;
  columnsEl.addEventListener('scroll', function() {
    if (scrollTimer) clearTimeout(scrollTimer);
    scrollTimer = setTimeout(readCols, 80);
  }, true);

  var origRender = render;
  render = function() {
    origRender();
  };
})();

// ==================== 自动跟进当前日期 ====================
var _lastDay = getDateInCST(currentDate).day;
setInterval(function() {
  var nowCST = getDateInCST(new Date());
  if (nowCST.day !== _lastDay) {
    _lastDay = nowCST.day;
    currentDate = new Date();
    todayDate = new Date();
    render();
  }
}, 10000); // 每10秒检查一次

// ==================== 启动 ====================
render();
</script>
