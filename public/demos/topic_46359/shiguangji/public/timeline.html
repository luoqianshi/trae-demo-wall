<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食光机 - 美食时光轴</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/timeline.css">
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav id="mainNav"></nav>

  <div class="page-wrapper">
    <!-- ===== 页面头部 ===== -->
    <section class="page-section timeline-page-header">
      <div class="section-inner">
        <div class="section-header">
          <span class="section-tag">Timeline</span>
          <h2>你的美食时光轴</h2>
          <p>每一道菜都是一段独特的记忆，串联成属于你的味道故事</p>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索菜品名称或笔记...">
          </div>
          <select class="filter-select" id="mealTypeFilter">
            <option value="">全部餐次</option>
            <option value="breakfast">🌅 早餐</option>
            <option value="lunch">☀️ 午餐</option>
            <option value="dinner">🌙 晚餐</option>
            <option value="snack">🍪 加餐</option>
          </select>
          <button class="btn btn-primary btn-sm" id="addRecordBtn">+ 添加记录</button>
        </div>

        <!-- 标签筛选 -->
        <div class="tag-filter-bar" id="tagFilterBar"></div>

        <!-- 时光轴容器 -->
        <div class="timeline-container" id="timelineContainer"></div>
      </div>
    </section>
  </div>

  <!-- ===== 添加/编辑记录模态框 ===== -->
  <div class="modal" id="recordModal">
    <div class="modal-overlay" onclick="closeAllModals()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">记录新美食</h2>
        <button class="modal-close" onclick="closeAllModals()">✕</button>
      </div>
      <div class="modal-body">
        <form id="recordForm" onsubmit="return false;">

          <!-- 图片上传 -->
          <div class="form-group">
            <label>美食照片</label>
            <div class="upload-area" id="uploadArea">
              <div class="upload-icon">📸</div>
              <div class="upload-text">点击或拖拽上传图片</div>
              <div class="upload-hint">支持 JPG / PNG，最大 5MB</div>
            </div>
            <input type="file" id="imageInput" accept="image/*" style="display:none;">
            <div class="image-preview" id="imagePreview"></div>
            <button type="button" class="recognize-btn" id="recognizeBtn">🤖 AI 识别菜品</button>
            <div class="recognize-progress" id="recognizeProgress">
              <div class="progress-spinner"></div>
              <div class="progress-text">正在分析图像特征...</div>
            </div>
          </div>

          <!-- AI 营养分析面板 -->
          <div id="nutritionPanel" class="nutrition-panel" style="display:none;">
            <h4>🥗 AI 营养分析</h4>
            <div class="nutrition-grid">
              <!-- 健康评分 -->
              <div class="nutrition-score">
                <div class="score-label">健康评分</div>
                <div class="score-value" id="healthScore">-</div>
                <div class="score-bar"><div class="score-fill" id="healthScoreBar"></div></div>
              </div>
              <!-- 营养成分 -->
              <div class="nutrition-details">
                <div class="nutrition-item"><span>蛋白质</span><span id="nutritionProtein">- g</span></div>
                <div class="nutrition-item"><span>碳水化合物</span><span id="nutritionCarbs">- g</span></div>
                <div class="nutrition-item"><span>脂肪</span><span id="nutritionFat">- g</span></div>
                <div class="nutrition-item"><span>膳食纤维</span><span id="nutritionFiber">- g</span></div>
                <div class="nutrition-item"><span>钠</span><span id="nutritionSodium">- mg</span></div>
              </div>
            </div>
            <!-- 食材列表 -->
            <div class="ingredients-list" id="ingredientsList"></div>
            <!-- 健康标签 -->
            <div class="health-tags" id="healthTags"></div>
            <!-- 烹饪小贴士 -->
            <div class="cooking-tips" id="cookingTips"></div>
          </div>

          <!-- 菜品名称 -->
          <div class="form-group">
            <label>菜品名称 *</label>
            <input type="text" class="form-input" id="dishNameInput" placeholder="例如：番茄炒蛋">
          </div>

          <!-- 日期和餐次 -->
          <div class="form-row">
            <div class="form-group">
              <label>日期</label>
              <input type="date" class="form-input" id="dateInput">
            </div>
            <div class="form-group">
              <label>餐次</label>
              <select class="form-select" id="mealTypeInput">
                <option value="breakfast">🌅 早餐</option>
                <option value="lunch">☀️ 午餐</option>
                <option value="dinner" selected>🌙 晚餐</option>
                <option value="snack">🍪 加餐</option>
              </select>
            </div>
          </div>

          <!-- 难度、烹饪时间 -->
          <div class="form-row">
            <div class="form-group">
              <label>难度</label>
              <select class="form-select" id="difficultyInput">
                <option value="easy">简单</option>
                <option value="medium">中等</option>
                <option value="hard">进阶</option>
              </select>
            </div>
            <div class="form-group">
              <label>烹饪时间（分钟）</label>
              <input type="number" class="form-input" id="cookTimeInput" placeholder="15" min="0">
            </div>
          </div>

          <!-- 卡路里 -->
          <div class="form-group">
            <label>卡路里（千卡）</label>
            <input type="number" class="form-input" id="caloriesInput" placeholder="200" min="0">
          </div>

          <!-- 标签 -->
          <div class="form-group">
            <label>标签</label>
            <div class="tag-input-wrapper">
              <input type="text" class="form-input" id="tagInput" placeholder="输入标签后按回车">
              <button type="button" class="tag-add-btn" id="addTagBtn">添加</button>
            </div>
            <div class="tag-list" id="tagList"></div>
          </div>

          <!-- 评分 -->
          <div class="form-group">
            <label>评分</label>
            <div class="star-rating" id="starRating">
              <span class="star" data-value="1">★</span>
              <span class="star" data-value="2">★</span>
              <span class="star" data-value="3">★</span>
              <span class="star" data-value="4">★</span>
              <span class="star" data-value="5">★</span>
            </div>
            <input type="hidden" id="ratingInput" value="0">
          </div>

          <!-- 笔记 -->
          <div class="form-group">
            <label>烹饪笔记</label>
            <textarea class="form-textarea" id="notesInput" placeholder="记录这道菜的心得、改进方向或背后的故事..."></textarea>
          </div>

          <!-- 保存按钮 -->
          <button type="button" class="btn btn-primary btn-block" id="saveRecordBtn" style="margin-top:0.5rem;">保存记录</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== 详情模态框 ===== -->
  <div class="modal" id="detailModal">
    <div class="modal-overlay" onclick="closeAllModals()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeAllModals()" style="position:absolute;top:1rem;right:1rem;z-index:2;background:rgba(255,255,255,0.9);">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- ===== Footer ===== -->
  <footer>
    <div class="footer-logo">🍳 食光机</div>
    <p>AI 智能食谱时光相册 · 让烹饪更有仪式感</p>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="timeline.html">时光轴</a>
      <a href="gallery.html">美食相册</a>
      <a href="recommend.html">AI推荐</a>
      <a href="stats.html">数据统计</a>
    </div>
    <p style="font-size:0.75rem;color:rgba(255,255,255,0.3);">食光机 Shiguangji &copy; 2026. All rights reserved.</p>
  </footer>

  <!-- ===== 脚本引用 ===== -->
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/timeline.js"></script>
</body>
</html>
