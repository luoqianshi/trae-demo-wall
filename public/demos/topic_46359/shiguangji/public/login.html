<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食光机 - 登录</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav id="mainNav"></nav>

  <!-- ===== 登录/注册区域 ===== -->
  <div class="page-wrapper">
    <div class="auth-container">
      <div class="auth-card">
        <!-- 品牌区 -->
        <div class="auth-brand">
          <div class="auth-logo">🍳</div>
          <h1>食光机</h1>
          <p>AI 智能食谱时光相册</p>
        </div>

        <!-- 标签切换 -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-mode="login">登录</button>
          <button class="auth-tab" data-mode="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="auth-form" onsubmit="return false;">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
            <div class="form-error" id="loginUsernameError"></div>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
            <div class="form-error" id="loginPasswordError"></div>
          </div>
          <button type="button" class="btn btn-primary btn-block auth-submit-btn" id="loginBtn">登录</button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="auth-form" style="display:none;" onsubmit="return false;">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" class="form-input" id="registerUsername" placeholder="3-20位字符" autocomplete="username">
            <div class="form-error" id="registerUsernameError"></div>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-input" id="registerPassword" placeholder="至少6位字符" autocomplete="new-password">
            <div class="form-error" id="registerPasswordError"></div>
          </div>
          <div class="form-group">
            <label>确认密码</label>
            <input type="password" class="form-input" id="registerConfirm" placeholder="再次输入密码" autocomplete="new-password">
            <div class="form-error" id="registerConfirmError"></div>
          </div>
          <button type="button" class="btn btn-primary btn-block auth-submit-btn" id="registerBtn">注册</button>
        </form>

        <!-- 返回首页 -->
        <div class="auth-footer">
          <a href="index.html">← 返回首页</a>
        </div>
      </div>

      <!-- 装饰图片 -->
      <div class="auth-visual">
        <img src="assets/food_flatlay_1152x864.jpg" alt="美食">
        <div class="auth-visual-overlay">
          <h2>记录每一道美味时光</h2>
          <p>让每一餐都成为值得收藏的回忆</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 脚本引用 ===== -->
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
