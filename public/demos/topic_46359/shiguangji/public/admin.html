<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食光机 - 管理后台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav id="mainNav"></nav>

  <div class="page-wrapper">
    <!-- ===== 页面头部 ===== -->
    <section class="page-section">
      <div class="section-inner">
        <div class="section-header">
          <span class="section-tag">Admin Dashboard</span>
          <h2>管理后台</h2>
          <p>系统数据总览与用户管理</p>
        </div>

        <!-- 统计概览 -->
        <div class="admin-stats" id="adminStats">
          <div class="admin-stat-card">
            <div class="admin-stat-icon">👥</div>
            <div class="admin-stat-info">
              <div class="admin-stat-num" id="adminUserCount">-</div>
              <div class="admin-stat-label">注册用户</div>
            </div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-icon">📝</div>
            <div class="admin-stat-info">
              <div class="admin-stat-num" id="adminRecordCount">-</div>
              <div class="admin-stat-label">总记录数</div>
            </div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-icon">🏷️</div>
            <div class="admin-stat-info">
              <div class="admin-stat-num" id="adminTagCount">-</div>
              <div class="admin-stat-label">标签种类</div>
            </div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-icon">⭐</div>
            <div class="admin-stat-info">
              <div class="admin-stat-num" id="adminAvgRating">-</div>
              <div class="admin-stat-label">平均评分</div>
            </div>
          </div>
        </div>

        <!-- 标签页切换 -->
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="users">用户管理</button>
          <button class="admin-tab" data-tab="records">所有记录</button>
        </div>

        <!-- 用户管理 -->
        <div class="admin-panel" id="panelUsers">
          <div class="admin-panel-header">
            <h3>用户列表</h3>
            <button class="btn btn-secondary btn-sm" id="refreshUsersBtn">🔄 刷新</button>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table" id="usersTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>用户名</th>
                  <th>角色</th>
                  <th>注册时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="usersTableBody"></tbody>
            </table>
          </div>
        </div>

        <!-- 所有记录 -->
        <div class="admin-panel" id="panelRecords" style="display:none;">
          <div class="admin-panel-header">
            <h3>所有记录</h3>
            <div class="admin-search-box">
              <input type="text" id="adminRecordSearch" placeholder="搜索菜品名称或用户..." class="form-input">
            </div>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table" id="recordsTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>菜品</th>
                  <th>用户ID</th>
                  <th>日期</th>
                  <th>餐次</th>
                  <th>难度</th>
                  <th>评分</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="recordsTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- ===== 记录详情模态框 ===== -->
  <div class="modal" id="detailModal">
    <div class="modal-overlay" onclick="closeAllModals()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeAllModals()" style="position:absolute;top:1rem;right:1rem;z-index:2;background:rgba(255,255,255,0.9);">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- ===== Footer ===== -->
  <footer>
    <div class="footer-logo">🍳 食光机</div>
    <p>AI 智能食谱时光相册 · 让烹饪更有仪式感</p>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="timeline.html">时光轴</a>
      <a href="gallery.html">美食相册</a>
      <a href="recommend.html">AI推荐</a>
      <a href="stats.html">数据统计</a>
    </div>
    <p style="font-size:0.75rem;color:rgba(255,255,255,0.3);">食光机 Shiguangji &copy; 2026. All rights reserved.</p>
  </footer>

  <!-- ===== 脚本引用 ===== -->
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
