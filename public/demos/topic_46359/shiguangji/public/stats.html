<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食光机 - 数据统计</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/stats.css">
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav id="mainNav"></nav>

  <div class="page-wrapper">
    <!-- ===== 页面头部 ===== -->
    <section class="page-section">
      <div class="section-inner">
        <div class="section-header">
          <span class="section-tag">Statistics</span>
          <h2>烹饪数据洞察</h2>
          <p>用数据可视化你的美食旅程</p>
        </div>

        <!-- 统计概览卡片 -->
        <div class="stats-overview" id="statsOverview">
          <div class="stat-overview-card">
            <div class="stat-overview-icon">📊</div>
            <div class="stat-overview-num" id="overviewTotal">-</div>
            <div class="stat-overview-label">总记录数</div>
          </div>
          <div class="stat-overview-card">
            <div class="stat-overview-icon">🏷️</div>
            <div class="stat-overview-num" id="overviewTags">-</div>
            <div class="stat-overview-label">标签种类</div>
          </div>
          <div class="stat-overview-card">
            <div class="stat-overview-icon">⭐</div>
            <div class="stat-overview-num" id="overviewRating">-</div>
            <div class="stat-overview-label">平均评分</div>
          </div>
          <div class="stat-overview-card">
            <div class="stat-overview-icon">📅</div>
            <div class="stat-overview-num" id="overviewMonth">-</div>
            <div class="stat-overview-label">本月烹饪</div>
          </div>
        </div>

        <!-- 图表网格 -->
        <div class="charts-grid">
          <div class="chart-card full-width">
            <h3>📈 烹饪趋势</h3>
            <div class="chart-container" id="chartTrend"></div>
          </div>
          <div class="chart-card">
            <h3>🏷️ 标签分布</h3>
            <div class="chart-container" id="chartTags"></div>
          </div>
          <div class="chart-card">
            <h3>🍽️ 餐次分布</h3>
            <div class="chart-container" id="chartMeals"></div>
          </div>
          <div class="chart-card full-width">
            <h3>📊 难度分布</h3>
            <div class="chart-container" id="chartDifficulty"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- ===== Footer ===== -->
  <footer>
    <div class="footer-logo">🍳 食光机</div>
    <p>AI 智能食谱时光相册 · 让烹饪更有仪式感</p>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="timeline.html">时光轴</a>
      <a href="gallery.html">美食相册</a>
      <a href="recommend.html">AI推荐</a>
      <a href="stats.html">数据统计</a>
    </div>
    <p style="font-size:0.75rem;color:rgba(255,255,255,0.3);">食光机 Shiguangji &copy; 2026. All rights reserved.</p>
  </footer>

  <!-- ===== 脚本引用 ===== -->
  <script src="_shared/js/echarts.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/stats.js"></script>
</body>
</html>
