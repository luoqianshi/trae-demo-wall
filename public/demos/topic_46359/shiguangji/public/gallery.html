<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食光机 - 美食相册</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/gallery.css">
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav id="mainNav"></nav>

  <div class="page-wrapper">
    <!-- ===== 页面头部 ===== -->
    <section class="page-section">
      <div class="section-inner">
        <div class="section-header">
          <span class="section-tag">Gallery</span>
          <h2>美食相册</h2>
          <p>用照片定格每一道用心烹饪的佳肴</p>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
          <div class="search-box">
            <input type="text" id="gallerySearch" placeholder="搜索菜品名称...">
          </div>
          <select class="filter-select" id="galleryMealFilter">
            <option value="">全部餐次</option>
            <option value="breakfast">🌅 早餐</option>
            <option value="lunch">☀️ 午餐</option>
            <option value="dinner">🌙 晚餐</option>
            <option value="snack">🍪 加餐</option>
          </select>
        </div>

        <!-- 相册网格 -->
        <div class="gallery-grid" id="galleryGrid"></div>
      </div>
    </section>
  </div>

  <!-- ===== 详情模态框 ===== -->
  <div class="modal" id="detailModal">
    <div class="modal-overlay" onclick="closeAllModals()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeAllModals()" style="position:absolute;top:1rem;right:1rem;z-index:2;background:rgba(255,255,255,0.9);">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- ===== Footer ===== -->
  <footer>
    <div class="footer-logo">🍳 食光机</div>
    <p>AI 智能食谱时光相册 · 让烹饪更有仪式感</p>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="timeline.html">时光轴</a>
      <a href="gallery.html">美食相册</a>
      <a href="recommend.html">AI推荐</a>
      <a href="stats.html">数据统计</a>
    </div>
    <p style="font-size:0.75rem;color:rgba(255,255,255,0.3);">食光机 Shiguangji &copy; 2026. All rights reserved.</p>
  </footer>

  <!-- ===== 脚本引用 ===== -->
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
