<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食光机 - 美食社区</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/community.css">
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav id="mainNav"></nav>

  <div class="page-wrapper">
    <!-- ===== 页面标题区 ===== -->
    <section class="page-section community-header-section">
      <div class="section-inner">
        <div class="section-header">
          <span class="section-tag">Community</span>
          <h2>美食社区</h2>
          <p>分享你的美食故事，发现更多美味</p>
        </div>

        <!-- 发帖区 -->
        <div class="post-composer">
          <div class="composer-header">
            <div class="composer-avatar" id="composerAvatar">👤</div>
            <span class="composer-hint">分享你的美食故事...</span>
          </div>
          <div class="composer-body">
            <input type="text" class="form-input" id="postTitleInput" placeholder="标题（一句话概括你的分享）" maxlength="100">
            <textarea class="form-textarea" id="postContentInput" placeholder="写下你的美食故事、烹饪心得或探店体验..." rows="3" maxlength="2000"></textarea>

            <div class="composer-extras">
              <!-- 图片上传 -->
              <div class="composer-upload">
                <input type="file" id="postImageInput" accept="image/*" style="display:none;">
                <button type="button" class="composer-tool-btn" id="postImageBtn">📷 添加图片</button>
                <div class="composer-image-preview" id="composerImagePreview" style="display:none;">
                  <img id="composerImageImg" alt="预览">
                  <button type="button" class="preview-remove" id="composerImageRemove">✕</button>
                </div>
              </div>

              <!-- 关联记录选择 -->
              <div class="composer-record">
                <select class="form-select" id="postRecordSelect">
                  <option value="">🔗 关联美食记录（可选）</option>
                </select>
              </div>
            </div>

            <div class="composer-footer">
              <span class="composer-tip" id="composerTip">支持上传图片和关联你的美食记录</span>
              <button type="button" class="btn btn-primary btn-sm" id="publishPostBtn">✍️ 发布</button>
            </div>
          </div>
        </div>

        <!-- 标签切换 -->
        <div class="community-tabs">
          <button class="community-tab active" data-tab="feed">📰 全部动态</button>
          <button class="community-tab" data-tab="hot">🔥 热门帖子</button>
          <button class="community-tab" data-tab="mine">📝 我的帖子</button>
        </div>

        <!-- 帖子列表 -->
        <div class="posts-container" id="postsContainer">
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <div class="loading-text">加载中...</div>
          </div>
        </div>

        <!-- 加载更多 -->
        <div class="load-more-wrapper" id="loadMoreWrapper" style="display:none;">
          <button class="btn btn-secondary btn-sm" id="loadMoreBtn">加载更多</button>
        </div>
      </div>
    </section>
  </div>

  <!-- ===== 帖子详情模态框 ===== -->
  <div class="modal" id="postDetailModal">
    <div class="modal-overlay" onclick="closeAllModals()"></div>
    <div class="modal-content post-detail-modal">
      <div class="modal-header">
        <h2>帖子详情</h2>
        <button class="modal-close" onclick="closeAllModals()">✕</button>
      </div>
      <div class="modal-body" id="postDetailBody">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <div class="loading-text">加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Footer ===== -->
  <footer>
    <div class="footer-logo">🍳 食光机</div>
    <p>AI 智能食谱时光相册 · 让烹饪更有仪式感</p>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="timeline.html">时光轴</a>
      <a href="gallery.html">美食相册</a>
      <a href="recommend.html">AI推荐</a>
      <a href="community.html">社区</a>
      <a href="stats.html">数据统计</a>
    </div>
    <p style="font-size:0.75rem;color:rgba(255,255,255,0.3);">食光机 Shiguangji &copy; 2026. All rights reserved.</p>
  </footer>

  <!-- ===== 脚本引用 ===== -->
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/community.js"></script>
</body>
</html>
