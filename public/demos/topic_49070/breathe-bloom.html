<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>一呼一吸 · Breathe & Bloom</title>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #141a2e;
  --surface-hover: #1a2138;
  --border: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --muted: #64748b;
  --primary: #5eead4;
  --secondary: #c4b5fd;
  --accent: #f9a8d4;
  --radius: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); }

/* ===== Screens ===== */
.screen {
  position: fixed; inset: 0;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.5s ease;
}
.screen.active { display: flex; opacity: 1; }

/* ===== Home ===== */
#home-screen { padding: 40px 20px; justify-content: flex-start; overflow-y: auto; }
.app-logo { margin-top: 40px; text-align: center; }
.app-title {
  font-size: 2.6rem; font-weight: 200; letter-spacing: 0.2em;
  background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.app-subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 6px; letter-spacing: 0.05em; }

/* Home ambient bg */
.home-bg { position: absolute; inset: 0; z-index: -1; overflow: hidden; }
.home-bg::before {
  content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(94,234,212,0.06), transparent 70%);
  top: -200px; left: -100px; animation: drift 20s ease-in-out infinite;
}
.home-bg::after {
  content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(196,181,253,0.05), transparent 70%);
  bottom: -150px; right: -100px; animation: drift 25s ease-in-out infinite reverse;
}
@keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px,30px); } }

/* Stats */
.stats-row { display: flex; gap: 36px; margin: 36px 0 32px; }
.stat-item { text-align: center; }
.stat-value { font-size: 1.9rem; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }

/* Pattern cards */
.pattern-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px; max-width: 760px; width: 100%; margin-bottom: 28px;
}
.pattern-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 26px 20px; cursor: pointer; transition: all 0.3s ease; text-align: center; position: relative; overflow: hidden;
}
.pattern-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.pattern-card:hover { background: var(--surface-hover); border-color: rgba(94,234,212,0.3); transform: translateY(-4px); }
.pattern-card:hover::before { opacity: 1; }
.pattern-icon { font-size: 2.2rem; margin-bottom: 10px; }
.pattern-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
.pattern-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; }
.pattern-meta { font-size: 0.72rem; color: var(--primary); }

.gallery-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text);
  padding: 10px 28px; border-radius: 999px; cursor: pointer; font-size: 0.88rem;
  transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px;
}
.gallery-btn:hover { border-color: var(--primary); color: var(--primary); }
.gallery-count {
  background: rgba(94,234,212,0.15); color: var(--primary); font-size: 0.7rem;
  padding: 2px 8px; border-radius: 999px;
}

/* ===== Breathing ===== */
#breathing-screen { background: var(--bg); }
#breathing-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.breathing-overlay {
  position: relative; z-index: 2; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none;
}
.phase-text {
  position: absolute; top: 22%; left: 50%; transform: translateX(-50%);
  font-size: 2rem; font-weight: 200; letter-spacing: 0.35em; color: var(--text);
  opacity: 0; transition: opacity 0.6s ease; text-indent: 0.35em; white-space: nowrap;
}
.phase-text.visible { opacity: 0.85; }
.cycle-counter {
  position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
  font-size: 0.8rem; color: var(--muted); letter-spacing: 0.15em;
}
.exit-btn {
  position: absolute; top: 20px; right: 20px; z-index: 3;
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  width: 38px; height: 38px; border-radius: 50%; cursor: pointer; pointer-events: auto;
  font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.3s;
}
.exit-btn:hover { color: var(--text); border-color: var(--text); }

/* Ready overlay */
.ready-overlay {
  position: absolute; inset: 0; z-index: 4; background: rgba(10,14,26,0.85);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); pointer-events: auto; transition: opacity 0.5s;
}
.ready-overlay.hidden { opacity: 0; pointer-events: none; }
.ready-title { font-size: 1.6rem; font-weight: 200; letter-spacing: 0.15em; margin-bottom: 8px; }
.ready-pattern { color: var(--primary); font-size: 1rem; margin-bottom: 6px; }
.ready-desc { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; text-align: center; max-width: 300px; line-height: 1.6; }
.start-btn {
  background: linear-gradient(135deg, var(--primary), #38bdf8); color: var(--bg);
  border: none; padding: 14px 40px; border-radius: 999px; cursor: pointer;
  font-size: 1rem; font-weight: 600; letter-spacing: 0.1em; transition: all 0.3s;
  box-shadow: 0 4px 24px rgba(94,234,212,0.25);
}
.start-btn:hover { transform: scale(1.05); box-shadow: 0 6px 32px rgba(94,234,212,0.35); }

/* Count down */
.countdown {
  position: absolute; z-index: 4; font-size: 5rem; font-weight: 200; color: var(--primary);
  opacity: 0; pointer-events: none;
}

/* ===== Mood ===== */
#mood-screen { padding: 40px 20px; }
.screen-title { font-size: 1.3rem; font-weight: 300; margin-bottom: 36px; color: var(--text); letter-spacing: 0.05em; }
.mood-grid { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
.mood-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 18px; cursor: pointer; transition: all 0.3s; text-align: center; min-width: 90px;
}
.mood-btn:hover { border-color: var(--primary); transform: translateY(-4px); background: var(--surface-hover); }
.mood-emoji { font-size: 2rem; }
.mood-label { font-size: 0.78rem; color: var(--muted); margin-top: 8px; }

/* ===== Complete ===== */
#complete-screen { padding: 40px 20px; overflow-y: auto; }
.bloom-wrap { position: relative; margin-bottom: 20px; animation: bloomFloat 4s ease-in-out infinite; }
@keyframes bloomFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
#bloom-canvas {
  border-radius: 50%; width: 300px; height: 300px; max-width: 80vw; max-height: 80vw;
  box-shadow: 0 0 80px rgba(94,234,212,0.12), 0 0 40px rgba(196,181,253,0.08);
}
.session-info { color: var(--muted); font-size: 0.82rem; margin-bottom: 24px; text-align: center; line-height: 1.6; }
.bloom-actions { display: flex; gap: 12px; }
.btn-primary {
  background: linear-gradient(135deg, var(--primary), #38bdf8); color: var(--bg);
  border: none; padding: 12px 28px; border-radius: 999px; cursor: pointer;
  font-size: 0.88rem; font-weight: 600; transition: all 0.3s;
}
.btn-primary:hover { transform: scale(1.05); }
.btn-secondary {
  background: transparent; color: var(--muted); border: 1px solid var(--border);
  padding: 12px 28px; border-radius: 999px; cursor: pointer; font-size: 0.88rem; transition: all 0.3s;
}
.btn-secondary:hover { color: var(--text); border-color: var(--text); }

/* ===== Gallery ===== */
#gallery-screen { padding: 40px 20px; justify-content: flex-start; overflow-y: auto; }
.back-btn {
  position: absolute; top: 20px; left: 20px; z-index: 3;
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  padding: 8px 18px; border-radius: 999px; cursor: pointer; font-size: 0.82rem; transition: all 0.3s;
}
.back-btn:hover { color: var(--text); border-color: var(--text); }
.gallery-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px; max-width: 760px; width: 100%; margin-top: 60px; margin-bottom: 30px;
}
.gallery-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; cursor: pointer; transition: all 0.3s;
}
.gallery-item:hover { border-color: rgba(94,234,212,0.3); transform: scale(1.03); }
.gallery-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.gallery-item-info { padding: 8px 10px; font-size: 0.72rem; color: var(--muted); }
.empty-state { text-align: center; color: var(--muted); padding: 80px 20px; font-size: 0.9rem; line-height: 2; }

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .app-title { font-size: 2rem; }
  .pattern-grid { grid-template-columns: 1fr; }
  .stats-row { gap: 24px; }
  .stat-value { font-size: 1.5rem; }
  .phase-text { font-size: 1.6rem; }
}
</style>
</head>
<body>

<!-- ===== Home ===== -->
<div id="home-screen" class="screen active">
  <div class="home-bg"></div>
  <div class="app-logo">
    <h1 class="app-title">一呼一吸</h1>
    <p class="app-subtitle">每一次呼吸，绽放一朵独一无二的花</p>
  </div>
  <div class="stats-row">
    <div class="stat-item"><div class="stat-value" id="stat-sessions">0</div><div class="stat-label">已完成</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-minutes">0</div><div class="stat-label">总时长(分)</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-streak">0</div><div class="stat-label">连续天数</div></div>
  </div>
  <div class="pattern-grid" id="pattern-grid"></div>
  <button class="gallery-btn" onclick="showScreen('gallery')">
    <span>🌸 我的花园</span>
    <span class="gallery-count" id="gallery-count">0</span>
  </button>
</div>

<!-- ===== Breathing ===== -->
<div id="breathing-screen" class="screen">
  <canvas id="breathing-canvas"></canvas>
  <div class="breathing-overlay">
    <div class="phase-text" id="phase-text">准备中</div>
    <div class="cycle-counter" id="cycle-counter"></div>
  </div>
  <button class="exit-btn" onclick="exitBreathing()">✕</button>
  <div class="ready-overlay" id="ready-overlay">
    <div class="ready-title">准备好了吗</div>
    <div class="ready-pattern" id="ready-pattern"></div>
    <div class="ready-desc" id="ready-desc"></div>
    <button class="start-btn" onclick="beginBreathing()">开始呼吸</button>
  </div>
  <div class="countdown" id="countdown"></div>
</div>

<!-- ===== Mood ===== -->
<div id="mood-screen" class="screen">
  <h2 class="screen-title">此刻感觉如何？</h2>
  <div class="mood-grid" id="mood-grid"></div>
</div>

<!-- ===== Complete ===== -->
<div id="complete-screen" class="screen">
  <div class="bloom-wrap"><canvas id="bloom-canvas" width="400" height="400"></canvas></div>
  <div class="session-info" id="session-info"></div>
  <div class="bloom-actions">
    <button class="btn-secondary" onclick="discardBloom()">再来一次</button>
    <button class="btn-primary" onclick="saveBloom()">收入花园 🌸</button>
  </div>
</div>

<!-- ===== Gallery ===== -->
<div id="gallery-screen" class="screen">
  <button class="back-btn" onclick="showScreen('home')">← 返回</button>
  <h2 class="screen-title" style="margin-top:20px;">我的花园</h2>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<script>
// ============ Data ============
const PATTERNS = {
  relax: {
    name: '4-7-8 放松法', desc: '助眠解压 · 深度放松', icon: '🌙',
    phases: [
      { label: '吸气', duration: 4 },
      { label: '屏息', duration: 7 },
      { label: '呼气', duration: 8 },
    ], cycles: 4,
    intro: '吸气4秒 → 屏息7秒 → 呼气8秒，循环4轮。适合睡前或紧张时使用，帮助快速放松神经系统。',
  },
  box: {
    name: '方块呼吸法', desc: '专注平复 · 均衡节奏', icon: '⬛',
    phases: [
      { label: '吸气', duration: 4 },
      { label: '屏息', duration: 4 },
      { label: '呼气', duration: 4 },
      { label: '屏息', duration: 4 },
    ], cycles: 5,
    intro: '四个等长阶段，各4秒，循环5轮。被称为海豹突击队减压法，适合专注和情绪平复。',
  },
  calm: {
    name: '舒缓呼吸法', desc: '快速静心 · 日常调节', icon: '🌊',
    phases: [
      { label: '吸气', duration: 4 },
      { label: '呼气', duration: 6 },
    ], cycles: 6,
    intro: '吸气4秒 → 呼气6秒，循环6轮。最简单温和的呼吸法，适合任何时候快速回归平静。',
  },
};

const MOODS = [
  { key: 'calm', emoji: '😌', label: '平静', palette: ['#5eead4', '#38bdf8', '#818cf8'] },
  { key: 'happy', emoji: '😊', label: '愉悦', palette: ['#fbbf24', '#f9a8d4', '#c4b5fd'] },
  { key: 'energized', emoji: '✨', label: '焕新', palette: ['#34d399', '#5eead4', '#38bdf8'] },
  { key: 'neutral', emoji: '😐', label: '平淡', palette: ['#94a3b8', '#c4b5fd', '#818cf8'] },
  { key: 'tired', emoji: '😴', label: '困倦', palette: ['#818cf8', '#a78bfa', '#f9a8d4'] },
];

const STORAGE_KEY = 'breatheBloom_v1';

let state = { blooms: [], currentPattern: null, sessionData: null };
let breathingState = { active: false, pattern: null, phaseIndex: 0, cycle: 0, phaseStartTime: 0, currentScale: 0.55, particles: [], phaseColors: {} };

const canvas = document.getElementById('breathing-canvas');
const ctx = canvas.getContext('2d');

// ============ Init ============
function init() {
  loadBlooms();
  renderHome();
  renderMoodOptions();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}
function loadBlooms() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) state.blooms = JSON.parse(raw) || []; } catch(e) { state.blooms = []; }
}
function saveBloomsToStorage() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.blooms)); } catch(e) {} }

// ============ Screen Management ============
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'gallery') renderGallery();
}

// ============ Home ============
function renderHome() {
  const grid = document.getElementById('pattern-grid');
  grid.innerHTML = Object.entries(PATTERNS).map(([key, p]) => {
    const totalSecs = p.phases.reduce((s, ph) => s + ph.duration, 0) * p.cycles;
    const mins = Math.floor(totalSecs / 60), secs = totalSecs % 60;
    return `<div class="pattern-card" onclick="prepareBreathing('${key}')">
      <div class="pattern-icon">${p.icon}</div>
      <div class="pattern-name">${p.name}</div>
      <div class="pattern-desc">${p.desc}</div>
      <div class="pattern-meta">${p.cycles} 轮 · 约 ${mins}分${secs}秒</div>
    </div>`;
  }).join('');
  const totalSessions = state.blooms.length;
  const totalMinutes = Math.round(state.blooms.reduce((s, b) => s + b.duration, 0) / 60);
  document.getElementById('stat-sessions').textContent = totalSessions;
  document.getElementById('stat-minutes').textContent = totalMinutes;
  document.getElementById('stat-streak').textContent = calculateStreak();
  document.getElementById('gallery-count').textContent = totalSessions;
}
function calculateStreak() {
  if (state.blooms.length === 0) return 0;
  const dates = [...new Set(state.blooms.map(b => b.date.split('T')[0]))].sort().reverse();
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (dates[0] !== today && dates[0] !== yesterday) return 0;
  let streak = 0, check = new Date(dates[0]);
  for (const ds of dates) {
    if (ds === fmtDate(check)) { streak++; check.setDate(check.getDate() - 1); } else break;
  }
  return streak;
}
function fmtDate(d) { return d.toISOString().split('T')[0]; }

// ============ Breathing ============
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function prepareBreathing(patternKey) {
  state.currentPattern = patternKey;
  const p = PATTERNS[patternKey];
  document.getElementById('ready-pattern').textContent = p.icon + ' ' + p.name;
  document.getElementById('ready-desc').textContent = p.intro;
  document.getElementById('ready-overlay').classList.remove('hidden');
  document.getElementById('phase-text').classList.remove('visible');
  showScreen('breathing');
}

function beginBreathing() {
  document.getElementById('ready-overlay').classList.add('hidden');
  // Countdown 3-2-1
  const cd = document.getElementById('countdown');
  let n = 3;
  cd.style.opacity = '1';
  cd.textContent = n;
  const cdTimer = setInterval(() => {
    n--;
    if (n > 0) { cd.textContent = n; cd.style.animation = 'none'; void cd.offsetWidth; cd.style.animation = ''; }
    else { clearInterval(cdTimer); cd.style.opacity = '0'; startBreathingAnimation(); }
  }, 1000);
}

function startBreathingAnimation() {
  const p = PATTERNS[state.currentPattern];
  breathingState.active = true;
  breathingState.pattern = p;
  breathingState.phaseIndex = 0;
  breathingState.cycle = 0;
  breathingState.phaseStartTime = Date.now();
  breathingState.currentScale = 0.55;

  // Init particles
  breathingState.particles = [];
  for (let i = 0; i < 60; i++) {
    breathingState.particles.push({
      angle: (Math.PI * 2 * i) / 60 + Math.random() * 0.3,
      baseRadius: 70 + Math.random() * 140,
      speed: (0.0002 + Math.random() * 0.0006) * (Math.random() > 0.5 ? 1 : -1),
      size: 0.8 + Math.random() * 2.5,
      opacity: 0.15 + Math.random() * 0.45,
      drift: Math.random() * Math.PI * 2,
    });
  }
  updatePhaseText();
  animateBreathing();
}

function updatePhaseText() {
  const phase = breathingState.pattern.phases[breathingState.phaseIndex];
  const text = document.getElementById('phase-text');
  text.classList.remove('visible');
  setTimeout(() => { text.textContent = phase.label; text.classList.add('visible'); }, 200);
  document.getElementById('cycle-counter').textContent = `第 ${breathingState.cycle + 1} / ${breathingState.pattern.cycles} 轮`;
}

function animateBreathing() {
  if (!breathingState.active) return;
  const w = canvas.width, h = canvas.height, cx = w / 2, cy = h / 2;

  // Trail effect
  ctx.fillStyle = 'rgba(10, 14, 26, 0.12)';
  ctx.fillRect(0, 0, w, h);

  const phase = breathingState.pattern.phases[breathingState.phaseIndex];
  const elapsed = (Date.now() - breathingState.phaseStartTime) / 1000;
  const progress = Math.min(elapsed / phase.duration, 1);
  const eased = easeInOut(progress);

  // Determine scale
  let fromScale, toScale;
  if (phase.label === '吸气') { fromScale = 0.55; toScale = 1.0; }
  else if (phase.label === '呼气') { fromScale = 1.0; toScale = 0.55; }
  else { fromScale = phase.label === '屏息' && breathingState.phaseIndex > 0 ? (breathingState.pattern.phases[breathingState.phaseIndex - 1].label === '吸气' ? 1.0 : 0.55) : 0.55; toScale = fromScale; }
  const currentScale = fromScale + (toScale - fromScale) * eased;
  breathingState.currentScale = currentScale;

  const phaseColors = { '吸气': ['#5eead4', '#38bdf8'], '屏息': ['#818cf8', '#c4b5fd'], '呼气': ['#c4b5fd', '#f9a8d4'] };
  const colors = phaseColors[phase.label] || ['#5eead4', '#38bdf8'];

  // Background glow
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.55);
  bgGrad.addColorStop(0, hexRgba(colors[0], 0.06 + currentScale * 0.04));
  bgGrad.addColorStop(0.5, hexRgba(colors[1], 0.025));
  bgGrad.addColorStop(1, 'rgba(10,14,26,0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);

  // Orb
  const baseR = Math.min(w, h) * 0.11;
  const orbR = Math.max(20, baseR * (0.55 + currentScale * 0.8));
  const glowR = orbR * 2.2;

  // Outer glow
  const glowGrad = ctx.createRadialGradient(cx, cy, orbR * 0.5, cx, cy, glowR);
  glowGrad.addColorStop(0, hexRgba(colors[0], 0.25));
  glowGrad.addColorStop(0.4, hexRgba(colors[1], 0.1));
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(cx, cy, glowR, 0, Math.PI * 2); ctx.fill();

  // Orb body
  const orbGrad = ctx.createRadialGradient(cx - orbR * 0.2, cy - orbR * 0.2, 0, cx, cy, orbR);
  orbGrad.addColorStop(0, hexRgba(colors[0], 0.5));
  orbGrad.addColorStop(0.5, hexRgba(colors[1], 0.25));
  orbGrad.addColorStop(1, hexRgba(colors[0], 0.05));
  ctx.fillStyle = orbGrad;
  ctx.beginPath(); ctx.arc(cx, cy, orbR, 0, Math.PI * 2); ctx.fill();

  // Orb ring
  ctx.strokeStyle = hexRgba(colors[0], 0.35);
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, orbR, 0, Math.PI * 2); ctx.stroke();

  // Progress ring
  const ringR = orbR + 24;
  ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
  ctx.strokeStyle = hexRgba(colors[0], 0.08); ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, ringR, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * progress);
  ctx.strokeStyle = hexRgba(colors[0], 0.5); ctx.lineWidth = 2; ctx.stroke();

  // Particles
  const pScale = 0.4 + currentScale * 0.8;
  const time = Date.now() * 0.001;
  breathingState.particles.forEach(p => {
    p.angle += p.speed * 16;
    const wobble = Math.sin(time + p.drift) * 8;
    const pr = (p.baseRadius + wobble) * pScale + orbR * 0.3;
    const px = cx + Math.cos(p.angle) * pr;
    const py = cy + Math.sin(p.angle) * pr;
    const ci = (Math.sin(p.angle) > 0) ? 0 : 1;
    // Particle glow
    ctx.fillStyle = hexRgba(colors[ci], p.opacity * (0.4 + currentScale * 0.6));
    ctx.beginPath(); ctx.arc(px, py, p.size, 0, Math.PI * 2); ctx.fill();
    // Soft halo
    ctx.fillStyle = hexRgba(colors[ci], p.opacity * 0.1);
    ctx.beginPath(); ctx.arc(px, py, p.size * 2.5, 0, Math.PI * 2); ctx.fill();
  });

  // Phase complete check
  if (elapsed >= phase.duration) {
    breathingState.phaseIndex++;
    if (breathingState.phaseIndex >= breathingState.pattern.phases.length) {
      breathingState.phaseIndex = 0;
      breathingState.cycle++;
    }
    if (breathingState.cycle >= breathingState.pattern.cycles) { completeBreathing(); return; }
    breathingState.phaseStartTime = Date.now();
    updatePhaseText();
  }
  requestAnimationFrame(animateBreathing);
}

function completeBreathing() {
  breathingState.active = false;
  const totalSecs = breathingState.pattern.phases.reduce((s, ph) => s + ph.duration, 0) * breathingState.pattern.cycles;
  state.sessionData = {
    pattern: state.currentPattern, patternName: breathingState.pattern.name,
    duration: totalSecs, cycles: breathingState.pattern.cycles, timestamp: Date.now(),
  };
  showScreen('mood');
}

function exitBreathing() {
  breathingState.active = false;
  document.getElementById('ready-overlay').classList.remove('hidden');
  showScreen('home');
}

// ============ Mood ============
function renderMoodOptions() {
  document.getElementById('mood-grid').innerHTML = MOODS.map(m =>
    `<div class="mood-btn" onclick="selectMood('${m.key}')"><div class="mood-emoji">${m.emoji}</div><div class="mood-label">${m.label}</div></div>`
  ).join('');
}

function selectMood(moodKey) {
  const mood = MOODS.find(m => m.key === moodKey);
  state.sessionData.mood = moodKey;
  state.sessionData.moodLabel = mood.label;
  state.sessionData.palette = mood.palette;
  generateBloom();
  showScreen('complete');
  const mins = Math.floor(state.sessionData.duration / 60);
  const secs = state.sessionData.duration % 60;
  document.getElementById('session-info').innerHTML =
    `${state.sessionData.patternName}<br>${state.sessionData.cycles} 轮 · ${mins}分${secs}秒 · ${mood.label}`;
}

// ============ Bloom Generation ============
function generateBloom() {
  const bc = document.getElementById('bloom-canvas');
  const bctx = bc.getContext('2d');
  const size = 400, cx = size / 2, cy = size / 2;

  // Clear
  bctx.fillStyle = '#0a0e1a';
  bctx.fillRect(0, 0, size, size);

  // Seeded random
  let s = state.sessionData.timestamp;
  const rng = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const palette = state.sessionData.palette;
  const maxR = size * 0.43;

  // Background glow
  const bgGrad = bctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.5);
  bgGrad.addColorStop(0, hexRgba(palette[0], 0.18));
  bgGrad.addColorStop(0.5, hexRgba(palette[1], 0.08));
  bgGrad.addColorStop(1, '#0a0e1a');
  bctx.fillStyle = bgGrad;
  bctx.fillRect(0, 0, size, size);

  // Petal layers
  const layers = 3;
  for (let l = 0; l < layers; l++) {
    const layerR = maxR * (0.4 + l * 0.3);
    const petals = Math.max(4, 8 - l * 2 + Math.floor(rng() * 3));
    const rot = (l * Math.PI) / petals + rng() * 0.5;
    for (let i = 0; i < petals; i++) {
      const angle = (Math.PI * 2 * i) / petals + rot;
      const pLen = layerR * (0.65 + rng() * 0.35);
      const pWid = layerR * (0.12 + rng() * 0.16);
      const color = palette[(i + l) % palette.length];
      const opacity = 0.12 + l * 0.08 + rng() * 0.08;
      drawPetal(bctx, cx, cy, angle, pLen, pWid, color, opacity);
    }
  }

  // Center glow
  const cGrad = bctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.22);
  cGrad.addColorStop(0, hexRgba(palette[0], 0.7));
  cGrad.addColorStop(0.4, hexRgba(palette[1], 0.35));
  cGrad.addColorStop(1, hexRgba(palette[0], 0));
  bctx.fillStyle = cGrad;
  bctx.beginPath(); bctx.arc(cx, cy, maxR * 0.22, 0, Math.PI * 2); bctx.fill();

  // Center dots
  const dots = 10 + Math.floor(rng() * 8);
  for (let i = 0; i < dots; i++) {
    const a = rng() * Math.PI * 2, d = rng() * maxR * 0.14;
    bctx.fillStyle = hexRgba(palette[i % palette.length], 0.3 + rng() * 0.5);
    bctx.beginPath(); bctx.arc(cx + Math.cos(a)*d, cy + Math.sin(a)*d, 1 + rng()*2.5, 0, Math.PI*2); bctx.fill();
  }

  // Outer accent particles
  const accents = 25 + Math.floor(rng() * 20);
  for (let i = 0; i < accents; i++) {
    const a = rng() * Math.PI * 2, d = maxR * (0.88 + rng() * 0.15);
    bctx.fillStyle = hexRgba(palette[i % palette.length], 0.15 + rng() * 0.3);
    bctx.beginPath(); bctx.arc(cx+Math.cos(a)*d, cy+Math.sin(a)*d, 0.5 + rng()*1.5, 0, Math.PI*2); bctx.fill();
  }

  // Connecting lines (subtle)
  const lines = 5 + Math.floor(rng() * 4);
  for (let i = 0; i < lines; i++) {
    const a1 = rng() * Math.PI * 2, a2 = rng() * Math.PI * 2;
    const r1 = maxR * (0.3 + rng() * 0.3), r2 = maxR * (0.6 + rng() * 0.3);
    bctx.strokeStyle = hexRgba(palette[i % palette.length], 0.06);
    bctx.lineWidth = 0.5;
    bctx.beginPath();
    bctx.moveTo(cx+Math.cos(a1)*r1, cy+Math.sin(a1)*r1);
    bctx.lineTo(cx+Math.cos(a2)*r2, cy+Math.sin(a2)*r2);
    bctx.stroke();
  }

  state.sessionData.bloomImage = bc.toDataURL('image/png');
}

function drawPetal(ctx, cx, cy, angle, length, width, color, opacity) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  const grad = ctx.createLinearGradient(0, 0, 0, length);
  grad.addColorStop(0, hexRgba(color, 0));
  grad.addColorStop(0.3, hexRgba(color, opacity * 0.4));
  grad.addColorStop(0.7, hexRgba(color, opacity));
  grad.addColorStop(1, hexRgba(color, 0));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(width, length * 0.4, width * 0.3, length);
  ctx.quadraticCurveTo(0, length * 1.05, -width * 0.3, length);
  ctx.quadraticCurveTo(-width, length * 0.4, 0, 0);
  ctx.fill();
  ctx.restore();
}

// ============ Save / Discard ============
function saveBloom() {
  state.blooms.unshift({
    id: 'b' + Date.now(), date: new Date().toISOString(),
    pattern: state.sessionData.pattern, patternName: state.sessionData.patternName,
    duration: state.sessionData.duration, cycles: state.sessionData.cycles,
    mood: state.sessionData.mood, moodLabel: state.sessionData.moodLabel,
    image: state.sessionData.bloomImage,
  });
  saveBloomsToStorage();
  showScreen('home');
}
function discardBloom() { showScreen('home'); }

// ============ Gallery ============
function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  if (state.blooms.length === 0) {
    grid.innerHTML = '<div class="empty-state">🌱 花园还是空的<br>完成一次呼吸练习<br>种下第一朵花吧</div>';
    return;
  }
  grid.innerHTML = state.blooms.map(b => {
    const d = new Date(b.date);
    return `<div class="gallery-item">
      <img src="${b.image}" alt="bloom">
      <div class="gallery-item-info">${d.getMonth()+1}月${d.getDate()}日 · ${b.moodLabel}</div>
    </div>`;
  }).join('');
}

// ============ Utils ============
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
function hexRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

init();
</script>
