<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SerialWatch · 串口数据监测平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="noise"></div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <span class="dot"></span>
          <span class="pulse-ring"></span>
        </div>
        <div class="brand-text">
          <h1>SERIAL<span>WATCH</span></h1>
          <p>串口数据实时监测平台</p>
        </div>
      </div>
      <div class="status-cluster">
        <div class="status-chip" id="portStatus">
          <span class="led led-off"></span>
          <span class="chip-label">未连接</span>
        </div>
        <div class="status-chip" id="refreshChip">
          <span class="icon-svg">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-3-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M3 12a9 9 0 003 6.7L21 16"/></svg>
          </span>
          <span class="chip-label">下一次刷新</span>
          <span class="chip-value" id="countdown">10s</span>
        </div>
        <div class="status-chip">
          <span class="icon-svg">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
          </span>
          <span class="chip-label">已接收</span>
          <span class="chip-value" id="rxCount">0</span>
        </div>
      </div>
    </header>

    <section class="control-panel">
      <div class="control-block">
        <label class="block-label">
          <span class="label-index">01</span>
          端口选择
        </label>
        <div class="port-row">
          <select id="portSelect" class="port-select">
            <option value="">-- 点击右侧按钮扫描可用端口 --</option>
          </select>
          <button id="scanBtn" class="btn btn-ghost">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            扫描
          </button>
          <button id="connectBtn" class="btn btn-primary" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/><path d="M21 14v7h-7"/></svg>
            连接
          </button>
          <button id="disconnectBtn" class="btn btn-danger" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
            断开
          </button>
        </div>
      </div>

      <div class="control-block">
        <label class="block-label">
          <span class="label-index">02</span>
          波特率
        </label>
        <div class="baud-row">
          <select id="baudSelect" class="port-select baud">
            <option value="9600">9600</option>
            <option value="19200">19200</option>
            <option value="38400">38400</option>
            <option value="57600">57600</option>
            <option value="115200" selected>115200</option>
            <option value="230400">230400</option>
          </select>
          <span class="unit">bps</span>
        </div>
      </div>

      <div class="control-block">
        <label class="block-label">
          <span class="label-index">03</span>
          自动刷新
        </label>
        <div class="refresh-row">
          <label class="switch">
            <input type="checkbox" id="autoRefresh" checked />
            <span class="slider"></span>
          </label>
          <span class="switch-hint">每 <b>10</b> 秒自动抓取最新数据</span>
          <button id="manualRefresh" class="btn btn-outline">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
            立即刷新
          </button>
        </div>
      </div>
    </section>

    <main class="workspace">
      <section class="panel raw-panel">
        <div class="panel-head">
          <div class="panel-title">
            <span class="panel-bar"></span>
            <h2>原始数据流</h2>
            <span class="panel-sub">RAW STREAM</span>
          </div>
          <div class="panel-actions">
            <button class="mini-btn" id="clearRaw">清空</button>
          </div>
        </div>
        <div class="panel-body">
          <pre id="rawLog" class="raw-log"><span class="empty">等待串口数据...</span></pre>
        </div>
      </section>

      <section class="panel table-panel">
        <div class="panel-head">
          <div class="panel-title">
            <span class="panel-bar accent"></span>
            <h2>JSON 数据表格</h2>
            <span class="panel-sub">PARSED TELEMETRY</span>
          </div>
          <div class="panel-actions">
            <span class="record-count" id="recordCount">0 条记录</span>
            <button class="mini-btn" id="mockBtn">模拟数据</button>
            <button class="mini-btn" id="clearTable">清空</button>
            <button class="mini-btn primary" id="exportBtn">导出 JSON</button>
          </div>
        </div>
        <div class="panel-body table-body">
          <div class="table-wrap">
            <table class="data-table" id="dataTable">
              <thead>
                <tr id="tableHead"></tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
            <div class="empty-state" id="emptyState">
              <div class="empty-ico">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
              </div>
              <p>暂无数据,请连接串口并发送 JSON 数据</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>

    <footer class="footer">
      <span>基于 Web Serial API · 推荐使用 Chrome / Edge 浏览器</span>
      <span class="copyright">© SerialWatch</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
