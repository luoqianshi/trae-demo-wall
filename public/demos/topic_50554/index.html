<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>季度攒钱日历账本</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --card: rgba(255, 255, 255, 0.86);
      --card-strong: #fffaf0;
      --text: #1f2933;
      --muted: #708090;
      --line: rgba(31, 41, 51, 0.1);
      --green: #0f9f6e;
      --green-bg: #e8fff4;
      --red: #d93c3c;
      --red-bg: #fff0f0;
      --gold: #f2a900;
      --blue: #367cff;
      --shadow: 0 16px 45px rgba(73, 60, 30, 0.14);
      --radius: 22px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 212, 88, 0.34), transparent 28%),
        radial-gradient(circle at 85% 3%, rgba(80, 180, 255, 0.22), transparent 26%),
        linear-gradient(180deg, #fff8e8 0%, var(--bg) 48%, #f1f7ff 100%);
    }

    button, input, select { font: inherit; }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 820px);
      margin: 0 auto;
      padding: 18px 14px calc(34px + var(--safe-bottom));
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 10px 4px 18px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 4px;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 8vw, 38px);
      line-height: 1.08;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      color: var(--text);
      font-size: 20px;
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .month-card {
      padding: 16px;
      margin-bottom: 14px;
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      touch-action: pan-y;
    }

    .month-title {
      text-align: center;
      font-weight: 850;
      font-size: 22px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-item {
      padding: 13px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .summary-value {
      font-weight: 900;
      font-size: 20px;
    }

    .quarter-card {
      padding: 14px;
      margin-bottom: 14px;
      overflow: hidden;
    }

    .quarter-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .quarter-title {
      font-weight: 900;
      font-size: 16px;
    }

    .quarter-number {
      font-weight: 900;
      color: var(--blue);
    }

    .progress-shell {
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffe5e5 0 50%, #e9eef8 50% 100%);
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(31, 41, 51, 0.08);
    }

    .progress-zero {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(31, 41, 51, 0.28);
      z-index: 2;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #19c57e, #ffe36b);
      box-shadow: 0 0 18px rgba(15, 159, 110, 0.4);
      transition: left .25s ease, width .25s ease;
    }

    .progress-fill.negative {
      background: linear-gradient(90deg, #ff8b8b, #d93c3c);
      box-shadow: 0 0 18px rgba(217, 60, 60, 0.28);
    }

    .quarter-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.45;
    }

    .banner {
      display: none;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 18px;
      background: #fff6d8;
      border: 1px solid #f5d66f;
      color: #765600;
      font-size: 13px;
      line-height: 1.45;
    }

    .banner.show { display: block; }

    .banner button {
      margin-top: 8px;
      padding: 8px 11px;
      border-radius: 12px;
      background: #1f2933;
      color: white;
      font-weight: 750;
    }

    .weekdays, .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 7px;
    }

    .weekday {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      padding: 4px 0 8px;
    }

    .day {
      min-height: 94px;
      border-radius: 17px;
      padding: 7px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(31, 41, 51, 0.08);
      text-align: left;
      color: var(--text);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: transform .15s ease, border .15s ease, background .15s ease;
    }

    .day:active { transform: scale(0.97); }
    .day.outside { opacity: .28; }

    .day.has-record {
      background: linear-gradient(180deg, #ffffff 0%, #fff8df 100%);
      border: 2px solid rgba(242, 169, 0, 0.72);
    }

    .day.today {
      box-shadow: inset 0 0 0 2px rgba(54, 124, 255, 0.52);
    }

    .day.warn {
      background: linear-gradient(180deg, #fff5ef 0%, #fff 100%);
      border-color: rgba(217, 60, 60, 0.8);
    }

    .day-num {
      font-weight: 900;
      font-size: 15px;
    }

    .warn-dot {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--red);
      color: white;
      font-size: 12px;
      font-weight: 900;
      animation: pulse 1.25s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: .78; }
    }

    .mini {
      font-size: 10.5px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #536171;
    }

    .mini strong {
      color: var(--text);
      font-weight: 850;
    }

    .mini.positive {
      color: var(--green);
      font-weight: 850;
      background: var(--green-bg);
      padding: 2px 5px;
      border-radius: 999px;
      margin-top: auto;
    }

    .mini.negative {
      color: var(--red);
      font-weight: 850;
      background: var(--red-bg);
      padding: 2px 5px;
      border-radius: 999px;
      margin-top: auto;
    }

    .fab {
      position: fixed;
      right: max(16px, calc((100vw - 820px) / 2 + 18px));
      bottom: calc(18px + var(--safe-bottom));
      width: 58px;
      height: 58px;
      border-radius: 22px;
      color: white;
      background: linear-gradient(135deg, #1f2933, #367cff);
      box-shadow: 0 20px 42px rgba(54, 124, 255, .36);
      font-size: 24px;
      font-weight: 900;
      z-index: 8;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(20, 28, 37, 0.45);
      z-index: 20;
      padding: 12px;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(100%, 620px);
      max-height: 92vh;
      overflow: auto;
      padding: 18px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .28);
      animation: rise .18s ease;
    }

    @keyframes rise {
      from { transform: translateY(24px); opacity: .2; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.55;
      margin: 0 0 14px;
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #4f5d6b;
      font-weight: 750;
    }

    input, select {
      width: 100%;
      border: 1px solid rgba(31, 41, 51, 0.14);
      border-radius: 16px;
      padding: 13px 12px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(54, 124, 255, .72);
      box-shadow: 0 0 0 4px rgba(54, 124, 255, .12);
    }

    .readonly {
      padding: 13px 12px;
      border-radius: 16px;
      background: #f2f5f8;
      font-weight: 900;
    }

    .big-feedback {
      border-radius: 22px;
      padding: 15px;
      font-weight: 950;
      font-size: 22px;
      text-align: center;
      margin: 4px 0;
      border: 1px solid transparent;
    }

    .big-feedback.positive {
      background: linear-gradient(135deg, #e7fff4, #fff7c4);
      color: var(--green);
      border-color: rgba(15, 159, 110, .18);
    }

    .big-feedback.negative {
      background: var(--red-bg);
      color: var(--red);
      border-color: rgba(217, 60, 60, .18);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .actions.three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .primary, .secondary, .danger {
      padding: 13px 12px;
      border-radius: 16px;
      font-weight: 850;
    }

    .primary {
      background: #1f2933;
      color: white;
    }

    .secondary {
      background: #edf2f7;
      color: #1f2933;
    }

    .danger {
      background: var(--red-bg);
      color: var(--red);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(92px + var(--safe-bottom));
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      max-width: min(92vw, 520px);
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(31, 41, 51, 0.94);
      color: white;
      box-shadow: var(--shadow);
      transition: .2s ease;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .settings-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 4px;
    }

    .pill {
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef4ff;
      color: #2558b8;
      font-size: 12px;
      font-weight: 800;
    }

    .empty-state {
      padding: 22px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(31, 41, 51, .18);
      border-radius: 20px;
      margin-top: 10px;
      line-height: 1.6;
    }

    @media (min-width: 680px) {
      .app { padding-top: 30px; }
      .day { min-height: 116px; padding: 9px; }
      .mini { font-size: 12px; }
      .modal-backdrop { align-items: center; }
      .form-grid.two { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 390px) {
      .app { padding-left: 9px; padding-right: 9px; }
      .calendar, .weekdays { gap: 5px; }
      .day { min-height: 86px; border-radius: 14px; padding: 6px 4px; }
      .mini { font-size: 9.5px; }
      .summary-value { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">本地保存 · 保守追踪 · 不自动改旧账</p>
        <h1>季度攒钱日历账本</h1>
      </div>
      <button class="icon-btn" id="settingsBtn" aria-label="打开设置">⚙</button>
    </header>

    <section class="quarter-card panel" id="quarterPanel"></section>

    <section class="month-card panel" id="monthSwipeArea">
      <div class="month-nav">
        <button class="icon-btn" id="prevMonth" aria-label="上个月">‹</button>
        <div class="month-title" id="monthTitle"></div>
        <button class="icon-btn" id="nextMonth" aria-label="下个月">›</button>
      </div>

      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-label">本月累计收入</div>
          <div class="summary-value" id="monthIncome">¥0</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">本月累计支出</div>
          <div class="summary-value" id="monthExpense">¥0</div>
        </div>
      </div>

      <div class="banner" id="monthDataBanner"></div>
      <div class="weekdays" id="weekdays"></div>
      <div class="calendar" id="calendar"></div>
      <div class="empty-state" id="emptyHint" style="display:none;">点击某一天开始记账。每日未花完的可支配资金会自动滚动累积到下一天。</div>
    </section>
  </main>

  <button class="fab" id="todayBtn" aria-label="回到今天">今</button>

  <div class="modal-backdrop" id="setupModal">
    <section class="modal">
      <h2>首次设置</h2>
      <p>设置账户初始余额和账目起点。该日期会成为第 1 天，并作为下一天的前一日余额。</p>
      <div class="form-grid">
        <label>账户初始余额
          <input id="setupBalance" type="number" inputmode="decimal" step="0.01" placeholder="例如 12000" />
        </label>
        <label>初始余额日期
          <input id="setupDate" type="date" />
        </label>
        <button class="primary" id="saveSetup">开始使用</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="entryModal">
    <section class="modal">
      <h2 id="entryTitle">每日记账</h2>
      <p id="entryHelp"></p>
      <div class="form-grid">
        <label>今日收入
          <input id="entryIncome" type="number" inputmode="decimal" step="0.01" min="0" placeholder="可为 0" />
        </label>
        <label>今日账户最终余额
          <input id="entryBalance" type="number" inputmode="decimal" step="0.01" placeholder="今日结束时账户余额" />
        </label>
        <label>今日支出（自动计算，只读）
          <div class="readonly" id="entryExpense">¥0</div>
        </label>
        <label>今日剩余可支出
          <div class="big-feedback" id="entryDisposable">¥0</div>
        </label>
      </div>
      <div class="actions three">
        <button class="secondary" id="closeEntry">取消</button>
        <button class="danger" id="deleteEntry">删除</button>
        <button class="primary" id="saveEntry">保存</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="settingsModal">
    <section class="modal">
      <h2>目标与预算设置</h2>
      <p>攒钱进度只统计已经实现的月度净结余；预估月均收入只作为可支配预算基准，不会被当成已存下的钱。</p>
      <div class="form-grid two">
        <label>季度攒钱目标
          <input id="settingGoal" type="number" inputmode="decimal" step="0.01" placeholder="例如 9000" />
        </label>
        <label>预估月均总收入
          <input id="settingAvgIncome" type="number" inputmode="decimal" step="0.01" placeholder="例如 15000" />
        </label>
        <label>季度年份
          <input id="settingQuarterYear" type="number" inputmode="numeric" min="2000" max="2100" />
        </label>
        <label>季度
          <select id="settingQuarter">
            <option value="1">Q1（1-3月）</option>
            <option value="2">Q2（4-6月）</option>
            <option value="3">Q3（7-9月）</option>
            <option value="4">Q4（10-12月）</option>
          </select>
        </label>
        <label>当前月份固定支出
          <input id="settingFixed" type="number" inputmode="decimal" step="0.01" />
        </label>
        <label>本月手动起始余额（可选）
          <input id="settingMonthStart" type="number" inputmode="decimal" step="0.01" placeholder="仅当前月首日缺少上月余额时使用" />
        </label>
      </div>
      <div class="pill-row" id="settingsPills"></div>
      <div class="actions">
        <button class="secondary" id="closeSettings">取消</button>
        <button class="primary" id="saveSettings">保存设置</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="fixedModal">
    <section class="modal">
      <h2 id="fixedTitle">确认本月固定支出</h2>
      <p id="fixedHelp"></p>
      <label>本月固定支出
        <input id="fixedInput" type="number" inputmode="decimal" step="0.01" />
      </label>
      <div class="actions">
        <button class="secondary" id="skipFixed">稍后</button>
        <button class="primary" id="saveFixed">确认</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "quarter-finance-calendar-v1";
    const money = new Intl.NumberFormat("zh-CN", { style: "currency", currency: "CNY", maximumFractionDigits: 2 });
    const weekdays = ["一", "二", "三", "四", "五", "六", "日"];

    const defaultState = () => {
      const now = new Date();
      return {
        setupDone: false,
        initialDate: "",
        settings: {
          quarterlyGoal: 9000,
          quarterYear: now.getFullYear(),
          quarter: Math.floor(now.getMonth() / 3) + 1,
          avgMonthlyIncome: 0
        },
        records: {},
        warnings: {},
        monthlyFixed: {},
        fixedConfirmed: {},
        monthStartBalances: {}
      };
    };

    let state = loadState();
    let viewDate = startOfMonth(new Date());
    let selectedDate = "";
    let touchStartX = 0;
    let touchStartY = 0;

    const $ = (id) => document.getElementById(id);

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        return { ...defaultState(), ...JSON.parse(raw) };
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function pad(n) { return String(n).padStart(2, "0"); }
    function ymd(date) { return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`; }
    function ym(date) { return `${date.getFullYear()}-${pad(date.getMonth() + 1)}`; }
    function parseDate(str) {
      const [y, m, d] = str.split("-").map(Number);
      return new Date(y, m - 1, d);
    }
    function addDays(date, days) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + days);
      return copy;
    }
    function addMonths(date, months) {
      return new Date(date.getFullYear(), date.getMonth() + months, 1);
    }
    function startOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }
    function daysInMonth(date) {
      return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
    }
    function toNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }
    function sameDate(a, b) { return ymd(a) === ymd(b); }
    function monthName(date) { return `${date.getFullYear()}年${date.getMonth() + 1}月`; }
    function quarterMonths(year, q) {
      const start = (Number(q) - 1) * 3;
      return [0, 1, 2].map(i => `${year}-${pad(start + i + 1)}`);
    }

    function getRecord(dateStr) {
      return state.records[dateStr] || null;
    }

    function getPrevDateStr(dateStr) {
      return ymd(addDays(parseDate(dateStr), -1));
    }

    function getNextDateStr(dateStr) {
      return ymd(addDays(parseDate(dateStr), 1));
    }

    function getPreviousBalance(dateStr) {
      if (dateStr === state.initialDate && state.records[dateStr]) return state.records[dateStr].balance;
      const prevStr = getPrevDateStr(dateStr);
      const prevRecord = getRecord(prevStr);
      if (prevRecord) return prevRecord.balance;
      const d = parseDate(dateStr);
      if (d.getDate() === 1) {
        const manual = state.monthStartBalances[ym(d)];
        if (manual !== undefined && manual !== "") return toNumber(manual);
      }
      return null;
    }

    function getMonthlyFixed(monthKey) {
      if (state.monthlyFixed[monthKey] !== undefined) return toNumber(state.monthlyFixed[monthKey]);
      const prevKey = ym(addMonths(parseDate(`${monthKey}-01`), -1));
      if (state.monthlyFixed[prevKey] !== undefined) return toNumber(state.monthlyFixed[prevKey]);
      return 0;
    }

    function monthlyBudget(monthKey) {
      return toNumber(state.settings.avgMonthlyIncome) - getMonthlyFixed(monthKey) - toNumber(state.settings.quarterlyGoal) / 3;
    }

    function getMonthRecords(monthKey) {
      return Object.values(state.records).filter(r => r.date.startsWith(monthKey));
    }

    function sumMonth(monthKey) {
      return getMonthRecords(monthKey).reduce((acc, r) => {
        acc.income += toNumber(r.income);
        acc.expense += toNumber(r.expense);
        return acc;
      }, { income: 0, expense: 0 });
    }

    function cumulativeExpenseThrough(dateStr) {
      const monthKey = dateStr.slice(0, 7);
      return Object.values(state.records)
        .filter(r => r.date.startsWith(monthKey) && r.date <= dateStr)
        .reduce((sum, r) => sum + toNumber(r.expense), 0);
    }

    function disposableAfterDate(dateStr, overrideExpense = null) {
      const monthKey = dateStr.slice(0, 7);
      const existingThrough = Object.values(state.records)
        .filter(r => r.date.startsWith(monthKey) && r.date <= dateStr && r.date !== dateStr)
        .reduce((sum, r) => sum + toNumber(r.expense), 0);
      const todayExpense = overrideExpense === null ? toNumber(state.records[dateStr]?.expense || 0) : overrideExpense;
      return monthlyBudget(monthKey) - existingThrough - todayExpense;
    }

    function quarterProgress() {
      const { quarterYear, quarter, quarterlyGoal } = state.settings;
      const months = quarterMonths(quarterYear, quarter);
      const progress = months.reduce((sum, monthKey) => {
        const totals = sumMonth(monthKey);
        return sum + totals.income - totals.expense - getMonthlyFixed(monthKey);
      }, 0);
      const goal = toNumber(quarterlyGoal);
      const percent = goal ? (progress / goal) * 100 : 0;
      return { progress, goal, percent };
    }

    function render() {
      renderQuarter();
      renderMonth();
      renderBanner();
      maybeShowInitialSetup();
    }

    function renderQuarter() {
      const { progress, goal, percent } = quarterProgress();
      const clamped = Math.max(-100, Math.min(100, percent));
      const isNegative = clamped < 0;
      const width = Math.abs(clamped) / 2;
      const left = isNegative ? 50 - width : 50;
      $("quarterPanel").innerHTML = `
        <div class="quarter-top">
          <div class="quarter-title">${state.settings.quarterYear}年第${state.settings.quarter}季度攒钱进度</div>
          <div class="quarter-number">${percent.toFixed(1)}%</div>
        </div>
        <div class="progress-shell">
          <div class="progress-zero"></div>
          <div class="progress-fill ${isNegative ? "negative" : ""}" style="left:${left}%;width:${width}%"></div>
        </div>
        <div class="quarter-note">
          当前进度 ${money.format(progress)} / 目标 ${money.format(goal)}。进度仅统计已记录月份的实际净储蓄：收入 - 支出 - 当月固定支出；若超支，进度会后退。
        </div>
      `;
    }

    function renderMonth() {
      const monthKey = ym(viewDate);
      const totals = sumMonth(monthKey);
      $("monthTitle").textContent = monthName(viewDate);
      $("monthIncome").textContent = money.format(totals.income);
      $("monthExpense").textContent = money.format(totals.expense);
      $("weekdays").innerHTML = weekdays.map(d => `<div class="weekday">${d}</div>`).join("");

      const first = startOfMonth(viewDate);
      const startOffset = (first.getDay() + 6) % 7;
      const totalDays = daysInMonth(viewDate);
      const prevMonthDays = daysInMonth(addMonths(viewDate, -1));
      const cells = [];
      for (let i = 0; i < 42; i++) {
        let cellDate;
        let outside = false;
        if (i < startOffset) {
          cellDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, prevMonthDays - startOffset + i + 1);
          outside = true;
        } else if (i >= startOffset + totalDays) {
          cellDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, i - startOffset - totalDays + 1);
          outside = true;
        } else {
          cellDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), i - startOffset + 1);
        }
        cells.push(renderDayCell(cellDate, outside));
      }
      $("calendar").innerHTML = cells.join("");
      $("emptyHint").style.display = getMonthRecords(monthKey).length ? "none" : "block";
      document.querySelectorAll(".day").forEach(el => {
        el.addEventListener("click", () => openEntry(el.dataset.date));
      });
      ensureFixedPromptForMonth(monthKey);
    }

    function renderDayCell(date, outside) {
      const dateStr = ymd(date);
      const record = getRecord(dateStr);
      const warning = state.warnings[dateStr];
      const today = sameDate(date, new Date());
      const disposable = record ? disposableAfterDate(dateStr) : null;
      const classes = ["day", outside ? "outside" : "", record ? "has-record" : "", warning ? "warn" : "", today ? "today" : ""].join(" ");
      return `
        <button class="${classes}" data-date="${dateStr}" aria-label="${dateStr}">
          <span class="day-num">${date.getDate()}</span>
          ${warning ? `<span class="warn-dot">!</span>` : ""}
          ${record ? `
            <span class="mini">余额 <strong>${compactMoney(record.balance)}</strong></span>
            <span class="mini">入 ${compactMoney(record.income)}</span>
            <span class="mini">出 ${compactMoney(record.expense)}</span>
            <span class="mini ${disposable >= 0 ? "positive" : "negative"}">${disposable >= 0 ? "🪙 +" : "⚠ "}${compactMoney(disposable)}</span>
          ` : ""}
        </button>
      `;
    }

    function compactMoney(n) {
      const value = toNumber(n);
      if (Math.abs(value) >= 10000) return `¥${(value / 10000).toFixed(1)}万`;
      return `¥${Math.round(value)}`;
    }

    function renderBanner() {
      const banner = $("monthDataBanner");
      const prevMonth = addMonths(viewDate, -1);
      const prevKey = ym(prevMonth);
      const currentKey = ym(viewDate);
      const currentMonthStart = `${currentKey}-01`;
      const hasPrevMonthData = getMonthRecords(prevKey).length > 0;
      const hasManualStart = state.monthStartBalances[currentKey] !== undefined && state.monthStartBalances[currentKey] !== "";
      const afterInitial = !state.initialDate || currentMonthStart > state.initialDate.slice(0, 7) + "-01";
      if (state.setupDone && afterInitial && !hasPrevMonthData && !hasManualStart) {
        banner.classList.add("show");
        banner.innerHTML = `未找到上月数据，请先完成${prevMonth.getMonth() + 1}月的记录以确保余额准确。必要时可为本月手动设定起始余额。<br><button id="setMonthStart">设定本月起始余额</button>`;
        $("setMonthStart").addEventListener("click", () => openSettings(true));
      } else {
        banner.classList.remove("show");
        banner.innerHTML = "";
      }
    }

    function maybeShowInitialSetup() {
      if (!state.setupDone) {
        $("setupDate").value = ymd(new Date());
        $("setupModal").classList.add("show");
      }
    }

    function ensureFixedPromptForMonth(monthKey) {
      if (!state.setupDone) return;
      if (state.fixedConfirmed[monthKey]) return;
      const prevKey = ym(addMonths(parseDate(`${monthKey}-01`), -1));
      const prevValue = state.monthlyFixed[prevKey] !== undefined ? toNumber(state.monthlyFixed[prevKey]) : getMonthlyFixed(monthKey);
      $("fixedTitle").textContent = `确认${Number(monthKey.slice(5, 7))}月固定支出`;
      $("fixedHelp").textContent = `${Number(monthKey.slice(5, 7))}月固定支出：${money.format(prevValue)}。如需调整请修改；不改动则默认沿用上月数值。`;
      $("fixedInput").value = prevValue;
      $("fixedModal").dataset.month = monthKey;
      setTimeout(() => $("fixedModal").classList.add("show"), 100);
    }

    function openEntry(dateStr) {
      if (!state.setupDone) return maybeShowInitialSetup();
      selectedDate = dateStr;
      const record = getRecord(dateStr);
      const prevBalance = getPreviousBalance(dateStr);
      const warning = state.warnings[dateStr];
      $("entryTitle").textContent = `${dateStr} 记账`;
      $("entryIncome").value = record ? record.income : 0;
      $("entryBalance").value = record ? record.balance : "";
      $("deleteEntry").style.visibility = record ? "visible" : "hidden";
      $("entryHelp").textContent = prevBalance === null
        ? "缺少前一日余额，保存前请先补全上一天记录；若这是本月第一天，也可以在设置中手动设定本月起始余额。"
        : `前一日余额：${money.format(prevBalance)}。支出会按“前一日余额 + 今日收入 - 今日余额”自动计算。`;
      if (warning) {
        showToast("前一日余额已发生变更，今日记录的支出可能不准确，请复核并重新保存。");
      }
      updateEntryComputed();
      $("entryModal").classList.add("show");
    }

    function updateEntryComputed() {
      if (!selectedDate) return;
      const prevBalance = getPreviousBalance(selectedDate);
      const income = toNumber($("entryIncome").value);
      const balance = toNumber($("entryBalance").value);
      const expense = prevBalance === null ? 0 : prevBalance + income - balance;
      $("entryExpense").textContent = prevBalance === null ? "无法计算" : money.format(expense);
      const disposable = disposableAfterDate(selectedDate, expense);
      const box = $("entryDisposable");
      box.textContent = prevBalance === null ? "无法计算" : `${disposable >= 0 ? "🪙 +" : "⚠ "}${money.format(disposable)}`;
      box.className = `big-feedback ${disposable >= 0 ? "positive" : "negative"}`;
    }

    function saveEntry() {
      const dateStr = selectedDate;
      const prevBalance = getPreviousBalance(dateStr);
      if (prevBalance === null) {
        showToast("所需的前一日记录缺失，请先补全缺失日期，或为本月首日设定起始余额。");
        return;
      }
      const income = toNumber($("entryIncome").value);
      const balance = toNumber($("entryBalance").value);
      if ($("entryBalance").value === "") {
        showToast("请填写今日账户最终余额。");
        return;
      }
      const expense = prevBalance + income - balance;
      state.records[dateStr] = {
        date: dateStr,
        income,
        expense,
        balance,
        prevBalanceAtSave: prevBalance,
        reviewedAt: new Date().toISOString()
      };
      delete state.warnings[dateStr];
      flagNextIfStale(dateStr);
      saveState();
      $("entryModal").classList.remove("show");
      showToast("已保存。若后续日期受影响，只会标记提醒，不会自动改账。");
      render();
    }

    function deleteEntry() {
      if (!selectedDate || !state.records[selectedDate]) return;
      if (!confirm("确认删除这一天的记录？后续日期不会被自动修改，只会在需要时标记提醒。")) return;
      delete state.records[selectedDate];
      const next = getNextDateStr(selectedDate);
      if (state.records[next]) {
        state.warnings[next] = {
          reason: "前一日记录已删除或余额已变化",
          createdAt: new Date().toISOString()
        };
      }
      saveState();
      $("entryModal").classList.remove("show");
      showToast("已删除。后续日期如受影响已标记为可能不准确。");
      render();
    }

    function flagNextIfStale(dateStr) {
      const next = getNextDateStr(dateStr);
      const nextRecord = state.records[next];
      const current = state.records[dateStr];
      if (!nextRecord || !current) return;
      if (Math.abs(toNumber(nextRecord.prevBalanceAtSave) - toNumber(current.balance)) > 0.005) {
        state.warnings[next] = {
          reason: "前一日余额已发生变更",
          createdAt: new Date().toISOString()
        };
      }
    }

    function openSettings(focusMonthStart = false) {
      const monthKey = ym(viewDate);
      $("settingGoal").value = state.settings.quarterlyGoal;
      $("settingAvgIncome").value = state.settings.avgMonthlyIncome;
      $("settingQuarterYear").value = state.settings.quarterYear;
      $("settingQuarter").value = state.settings.quarter;
      $("settingFixed").value = getMonthlyFixed(monthKey);
      $("settingMonthStart").value = state.monthStartBalances[monthKey] ?? "";
      $("settingsPills").innerHTML = `
        <span class="pill">当前月：${monthName(viewDate)}</span>
        <span class="pill">月度可支配预算：${money.format(monthlyBudget(monthKey))}</span>
      `;
      $("settingsModal").classList.add("show");
      if (focusMonthStart) setTimeout(() => $("settingMonthStart").focus(), 80);
    }

    function saveSettings() {
      const monthKey = ym(viewDate);
      state.settings.quarterlyGoal = toNumber($("settingGoal").value);
      state.settings.avgMonthlyIncome = toNumber($("settingAvgIncome").value);
      state.settings.quarterYear = Number($("settingQuarterYear").value) || new Date().getFullYear();
      state.settings.quarter = Number($("settingQuarter").value) || 1;
      state.monthlyFixed[monthKey] = toNumber($("settingFixed").value);
      state.fixedConfirmed[monthKey] = true;
      const monthStart = $("settingMonthStart").value;
      if (monthStart === "") delete state.monthStartBalances[monthKey];
      else state.monthStartBalances[monthKey] = toNumber(monthStart);
      saveState();
      $("settingsModal").classList.remove("show");
      showToast("设置已保存。历史记录不会被自动改写。");
      render();
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 3200);
    }

    function initEvents() {
      $("saveSetup").addEventListener("click", () => {
        const balance = toNumber($("setupBalance").value);
        const date = $("setupDate").value;
        if (!date || $("setupBalance").value === "") return showToast("请填写初始余额和日期。");
        state.setupDone = true;
        state.initialDate = date;
        state.records[date] = {
          date,
          income: 0,
          expense: 0,
          balance,
          prevBalanceAtSave: balance,
          reviewedAt: new Date().toISOString(),
          initial: true
        };
        viewDate = startOfMonth(parseDate(date));
        const monthKey = ym(viewDate);
        if (state.monthlyFixed[monthKey] === undefined) state.monthlyFixed[monthKey] = 0;
        saveState();
        $("setupModal").classList.remove("show");
        showToast("初始余额已记录为第 1 天。");
        render();
      });

      $("prevMonth").addEventListener("click", () => { viewDate = addMonths(viewDate, -1); render(); });
      $("nextMonth").addEventListener("click", () => { viewDate = addMonths(viewDate, 1); render(); });
      $("todayBtn").addEventListener("click", () => { viewDate = startOfMonth(new Date()); render(); });
      $("settingsBtn").addEventListener("click", () => openSettings(false));
      $("closeSettings").addEventListener("click", () => $("settingsModal").classList.remove("show"));
      $("saveSettings").addEventListener("click", saveSettings);
      $("closeEntry").addEventListener("click", () => $("entryModal").classList.remove("show"));
      $("saveEntry").addEventListener("click", saveEntry);
      $("deleteEntry").addEventListener("click", deleteEntry);
      $("entryIncome").addEventListener("input", updateEntryComputed);
      $("entryBalance").addEventListener("input", updateEntryComputed);

      $("saveFixed").addEventListener("click", () => {
        const monthKey = $("fixedModal").dataset.month;
        state.monthlyFixed[monthKey] = toNumber($("fixedInput").value);
        state.fixedConfirmed[monthKey] = true;
        saveState();
        $("fixedModal").classList.remove("show");
        showToast(`${Number(monthKey.slice(5, 7))}月固定支出已确认。`);
        render();
      });

      $("skipFixed").addEventListener("click", () => {
        const monthKey = $("fixedModal").dataset.month;
        state.fixedConfirmed[monthKey] = true;
        if (state.monthlyFixed[monthKey] === undefined) state.monthlyFixed[monthKey] = getMonthlyFixed(monthKey);
        saveState();
        $("fixedModal").classList.remove("show");
        render();
      });

      const swipeArea = $("monthSwipeArea");
      swipeArea.addEventListener("touchstart", e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      swipeArea.addEventListener("touchend", e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.4) {
          viewDate = addMonths(viewDate, dx < 0 ? 1 : -1);
          render();
        }
      }, { passive: true });

      document.querySelectorAll(".modal-backdrop").forEach(backdrop => {
        backdrop.addEventListener("click", e => {
          if (e.target === backdrop && backdrop.id !== "setupModal" && backdrop.id !== "fixedModal") {
            backdrop.classList.remove("show");
          }
        });
      });
    }

    initEvents();
    render();
  </script>
</body>
</html>
