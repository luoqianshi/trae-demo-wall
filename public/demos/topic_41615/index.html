        }
        if (objectURLRef.current) {
          try {
            URL.revokeObjectURL(objectURLRef.current);
          } catch {}
          objectURLRef.current = null;
        }
        if (analysisRef.current) {
          cancelAnimationFrame(analysisRef.current);
          analysisRef.current = null;
        }
        if (sourceRef.current) {
          try {
            sourceRef.current.disconnect();
          } catch {}
          sourceRef.current = null;
        }
        
        setStage('uploading');
        
        try {
          const sampleRate = 44100;
          const duration = 60;
          const offlineCtx = new OfflineAudioContext(2, sampleRate * duration, sampleRate);

          const segments = [
            { start: 0, end: 10, mood: 'low', energy: 0.08, bpm: 60 },
            { start: 10, end: 20, mood: 'calm', energy: 0.2, bpm: 75 },
            { start: 20, end: 32, mood: 'warm', energy: 0.4, bpm: 90 },
            { start: 32, end: 45, mood: 'dreamy', energy: 0.55, bpm: 100 },
            { start: 45, end: 55, mood: 'energetic', energy: 0.75, bpm: 120 },
            { start: 55, end: 60, mood: 'low', energy: 0.1, bpm: 55 },
          ];

          const notes = {
            low: [55, 65.41, 82.41],
            calm: [130.81, 164.81, 196, 220],
            warm: [261.63, 293.66, 329.63, 392],
            dreamy: [293.66, 349.23, 440, 523.25],
            energetic: [261.63, 329.63, 392, 523.25, 659.25],
            lonely: [196, 220, 261.63],
          };

          segments.forEach((seg) => {
            const segNotes = notes[seg.mood] || notes.calm;
            for (let noteIdx = 0; noteIdx < segNotes.length; noteIdx++) {
              const osc = offlineCtx.createOscillator();
              const gainNode = offlineCtx.createGain();
              osc.type = noteIdx === 0 ? 'sine' : noteIdx === 1 ? 'triangle' : 'sine';
              osc.frequency.setValueAtTime(segNotes[noteIdx], seg.start);
              const noteOffset = noteIdx * 0.7;
              const noteGain = 0.25 / (noteIdx + 1) * (0.3 + seg.energy);
              gainNode.gain.setValueAtTime(0, seg.start + noteOffset);
              gainNode.gain.linearRampToValueAtTime(noteGain, seg.start + noteOffset + 0.3);
              gainNode.gain.setValueAtTime(noteGain, seg.end - 0.8);
              gainNode.gain.linearRampToValueAtTime(0, seg.end);
              osc.connect(gainNode).connect(offlineCtx.destination);
              osc.start(seg.start + noteOffset);
              osc.stop(seg.end + 0.1);
            }

            if (seg.mood === 'energetic' || seg.mood === 'warm') {
              const bassOsc = offlineCtx.createOscillator();
              const bassGain = offlineCtx.createGain();
              bassOsc.type = 'sine';
              bassOsc.frequency.setValueAtTime(60, seg.start);
              bassGain.gain.setValueAtTime(0, seg.start);
              const beatInterval = 60 / seg.bpm;
              for (let beat = 0; beat < (seg.end - seg.start) / beatInterval; beat++) {
                const t = seg.start + beat * beatInterval;
                bassGain.gain.setValueAtTime(0, t);
                bassGain.gain.linearRampToValueAtTime(0.35, t + 0.05);
                bassGain.gain.linearRampToValueAtTime(0, t + 0.35);
              }
              bassOsc.connect(bassGain).connect(offlineCtx.destination);
              bassOsc.start(seg.start);
              bassOsc.stop(seg.end);
            }
          });

          const renderedBuffer = await offlineCtx.startRendering();
          const wavBuffer = audioBufferToWav(renderedBuffer);
          const blob = new Blob([wavBuffer], { type: 'audio/wav' });
          const file = new File([blob], 'demo-song-emotional-segments.wav', { type: 'audio/wav' });
          
          setMusicFile(file);
          setPlaylist([file]);
          setCurrentIndex(0);

          setStage('decoding');
          await new Promise(resolve => setTimeout(resolve, 400));

          const moodColors = {
            dreamy: { primary: '#8b5cf6', secondary: '#06b6d4', accent: '#f472b6', background: '#0f0a1e', text: '#e9d5ff' },
            lonely: { primary: '#3b82f6', secondary: '#6366f1', accent: '#e0e7ff', background: '#0a0f1a', text: '#c7d2fe' },
            warm: { primary: '#fbbf24', secondary: '#fb923c', accent: '#fda4af', background: '#1a120a', text: '#fef3c7' },
            energetic: { primary: '#ec4899', secondary: '#8b5cf6', accent: '#06b6d4', background: '#1a0a12', text: '#fbcfe8' },
            calm: { primary: '#06b6d4', secondary: '#67e8f9', accent: '#c4b5fd', background: '#0a1218', text: '#d1fae5' },
            low: { primary: '#64748b', secondary: '#475569', accent: '#94a3b8', background: '#0a0a0a', text: '#94a3b8' },
          };

          setMood('dreamy');
          setVisualStrategy({
            mood: 'dreamy',
            colorPalette: moodColors.dreamy,
            particleDensity: 0.5,
            waveSpeed: 0.5,
            animationSpeed: 0.8,
            captionStyle: 'poetic'
          });

          setStage('preparing');
          await new Promise(resolve => setTimeout(resolve, 600));

          // 清理之前的资源
          if (objectURLRef.current) {
            URL.revokeObjectURL(objectURLRef.current);
            objectURLRef.current = null;
          }
          if (audioElementRef.current) {
            audioElementRef.current.pause();
            audioElementRef.current = null;
          }
          if (analysisRef.current) {
            cancelAnimationFrame(analysisRef.current);
            analysisRef.current = null;
          }

          const objectUrl = URL.createObjectURL(file);
          objectURLRef.current = objectUrl;
          const audio = new Audio(objectUrl);
          audioElementRef.current = audio;
          audio.onloadedmetadata = () => setDuration(audio.duration);
          audio.onended = () => {
            if (!afterglowPhrase) setAfterglowPhrase(afterglowPhrases.find(p => p.mood === 'dreamy')?.text || afterglowPhrases[0].text);
            setStage('afterglow');
          };
          audio.ontimeupdate = () => { if (audio.currentTime !== currentTime) setCurrentTime(audio.currentTime); };

          audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
          analyserRef.current = audioContextRef.current.createAnalyser();
          analyserRef.current.fftSize = 512;
          analyserRef.current.smoothingTimeConstant = 0.8;
          const source = audioContextRef.current.createMediaElementSource(audio);
          source.connect(analyserRef.current);
          analyserRef.current.connect(audioContextRef.current.destination);

          setStage('awakening');
        } catch (err) {
          console.error('Failed to generate demo song', err);
          setStage('error');
        }
      }, [afterglowPhrase, currentTime]);

      const audioBufferToWav = (buffer) => {
        const numChannels = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const format = 1;
        const bitDepth = 16;
        const bytesPerSample = bitDepth / 8;
        const blockAlign = numChannels * bytesPerSample;
        const dataSize = buffer.length * blockAlign;
        const bufferSize = 44 + dataSize;
        const ab = new ArrayBuffer(bufferSize);
        const view = new DataView(ab);

        const writeString = (offset, str) => {
          for (let i = 0; i < str.length; i++) {
            view.setUint8(offset + i, str.charCodeAt(i));
          }
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + dataSize, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * blockAlign, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitDepth, true);
        writeString(36, 'data');
        view.setUint32(40, dataSize, true);

        const channels = [];
        for (let i = 0; i < numChannels; i++) {
          channels.push(buffer.getChannelData(i));
        }

        let offset = 44;
        for (let i = 0; i < buffer.length; i++) {
          for (let ch = 0; ch < numChannels; ch++) {
            const sample = Math.max(-1, Math.min(1, channels[ch][i]));
            view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
            offset += 2;
          }
        }

        return ab;
      };

      const loadAndPlayTrack = useCallback(async (file, index) => {
        // 清理之前的资源，防止blob URL冲突
        if (audioElementRef.current) {
          try {
            audioElementRef.current.pause();
            audioElementRef.current.onloadedmetadata = null;
            audioElementRef.current.onended = null;
            audioElementRef.current.ontimeupdate = null;
            audioElementRef.current.src = '';
            audioElementRef.current.load();
          } catch {}
          audioElementRef.current = null;
        }
        if (objectURLRef.current) {
          try {
            URL.revokeObjectURL(objectURLRef.current);
          } catch {}
          objectURLRef.current = null;
        }
        if (analysisRef.current) {
          cancelAnimationFrame(analysisRef.current);
          analysisRef.current = null;
        }
        // 断开旧的MediaElementSource连接
        if (sourceRef.current) {
          try {
            sourceRef.current.disconnect();
          } catch {}
          sourceRef.current = null;
        }
        
        setMusicFile(file);
        setCurrentIndex(index);
        setCaption(null);
        setAwakeningProgress(0);
        setAfterglowProgress(0);
        setStage('uploading');
        
        try {
          audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
          const reader = new FileReader();
          reader.onload = async (e) => {
            if (!e.target?.result) return;
            setStage('decoding');
            const audioBuffer = await audioContextRef.current.decodeAudioData(e.target.result);
            setStage('analyzing');
            const { averageEnergy, estimatedBpm } = await analyzeOffline(audioBuffer);
            setBpm(estimatedBpm);
            const detectedMood = determineMood(averageEnergy, file.name);
            setMood(detectedMood);

            const moodColors = {
              dreamy: { primary: '#8b5cf6', secondary: '#06b6d4', accent: '#f472b6', background: '#0f0a1e', text: '#e9d5ff' },
              lonely: { primary: '#3b82f6', secondary: '#6366f1', accent: '#e0e7ff', background: '#0a0f1a', text: '#c7d2fe' },
              warm: { primary: '#fbbf24', secondary: '#fb923c', accent: '#fda4af', background: '#1a120a', text: '#fef3c7' },
              energetic: { primary: '#ec4899', secondary: '#8b5cf6', accent: '#06b6d4', background: '#1a0a12', text: '#fbcfe8' },
              calm: { primary: '#06b6d4', secondary: '#67e8f9', accent: '#c4b5fd', background: '#0a1218', text: '#d1fae5' },
              cheerful: { primary: '#f59e0b', secondary: '#fbbf24', accent: '#34d399', background: '#1a1a0a', text: '#fef3c7' },
              low: { primary: '#64748b', secondary: '#475569', accent: '#94a3b8', background: '#0a0a0a', text: '#94a3b8' },
            };

            setVisualStrategy({
              mood: detectedMood,
              colorPalette: moodColors[detectedMood],
              particleDensity: Math.max(0.3, Math.min(1.2, averageEnergy * 1.5)),
              waveSpeed: 0.5 + averageEnergy * 0.8,
              animationSpeed: 0.8 + averageEnergy * 0.6,
              captionStyle: 'poetic'
            });

            setStage('preparing');
            await new Promise(resolve => setTimeout(resolve, 800));

            const objectUrl = URL.createObjectURL(file);
            objectURLRef.current = objectUrl;
            const audio = new Audio(objectUrl);
            audioElementRef.current = audio;
            audio.onloadedmetadata = () => setDuration(audio.duration);
            audio.onended = () => {
              // 检查是否还有下一首
              if (isAutoPlayNext && playlist.length > 0 && index < playlist.length - 1) {
                // 自动播放下一首
                loadAndPlayTrack(playlist[index + 1], index + 1);
              } else {
                // 进入余韵模式
                if (!afterglowPhrase) setAfterglowPhrase(afterglowPhrases.find(p => p.mood === mood)?.text || afterglowPhrases[0].text);
                setStage('afterglow');
              }
            };
            audio.ontimeupdate = () => { if (audio.currentTime !== currentTime) setCurrentTime(audio.currentTime); };

            analyserRef.current = audioContextRef.current.createAnalyser();
            analyserRef.current.fftSize = 512;
            analyserRef.current.smoothingTimeConstant = 0.8;
            const source = audioContextRef.current.createMediaElementSource(audio);
            source.connect(analyserRef.current);
            analyserRef.current.connect(audioContextRef.current.destination);

            setStage('awakening');
          };
          reader.readAsArrayBuffer(file);
        } catch { setStage('error'); }
      }, [playlist, isAutoPlayNext, afterglowPhrase, mood, currentTime]);

      const handlePlayPause = useCallback(() => {
        if (stage === 'playing') {
          audioElementRef.current?.pause();
          if (analysisRef.current) cancelAnimationFrame(analysisRef.current);
          setStage('paused');
        } else if (stage === 'paused') {
          if (audioContextRef.current?.state === 'suspended') audioContextRef.current.resume();
          audioElementRef.current?.play();
          startAudioAnalysis();
          setStage('playing');
        }
      }, [stage, startAudioAnalysis]);

      const handleSeek = useCallback((time) => {
        if (audioElementRef.current) audioElementRef.current.currentTime = time;
        setCurrentTime(time);
      }, []);

      // 下一首
      const handleNextTrack = useCallback(() => {
        if (playlist.length > 0 && currentIndex < playlist.length - 1) {
          loadAndPlayTrack(playlist[currentIndex + 1], currentIndex + 1);
        }
      }, [playlist, currentIndex, loadAndPlayTrack]);

      // 上一首
      const handlePrevTrack = useCallback(() => {
        if (playlist.length > 0 && currentIndex > 0) {
          loadAndPlayTrack(playlist[currentIndex - 1], currentIndex - 1);
        }
      }, [playlist, currentIndex, loadAndPlayTrack]);

      // 添加音乐到播放列表
      const handleAddToPlaylist = useCallback((files) => {
        const currentPlaylist = playlist || [];
        const startIndex = currentPlaylist.length;
        const newPlaylist = [...currentPlaylist, ...files];
        setPlaylist(newPlaylist);
        // 如果当前没有在播放任何音乐，自动开始播放新添加的第一首歌
        if (!musicFile && files.length > 0) {
          loadAndPlayTrack(files[0], startIndex);
        }
      }, [playlist, musicFile, loadAndPlayTrack]);

      // 清除播放列表
      const handleClearPlaylist = useCallback(() => {
        // 停止当前播放
        if (audioElementRef.current) {
          try {
            audioElementRef.current.pause();
            audioElementRef.current.onloadedmetadata = null;
            audioElementRef.current.onended = null;
            audioElementRef.current.ontimeupdate = null;
            audioElementRef.current.src = '';
            audioElementRef.current.load();
          } catch {}
          audioElementRef.current = null;
        }
        if (objectURLRef.current) {
          try {
            URL.revokeObjectURL(objectURLRef.current);
          } catch {}
          objectURLRef.current = null;
        }
        if (analysisRef.current) cancelAnimationFrame(analysisRef.current);
        if (audioContextRef.current) { try { audioContextRef.current.close(); } catch {} audioContextRef.current = null; }
        if (sourceRef.current) { try { sourceRef.current.disconnect(); } catch {} sourceRef.current = null; }
        // 清除状态
        setPlaylist([]);
        setCurrentIndex(0);
        setMusicFile(null);
        setAudioFeatures(EMPTY_AUDIO_FEATURES);
        setCurrentTime(0);
        setDuration(0);
        setStage('idle');
      }, []);

      // 切换自动播放下一首
      const toggleAutoPlayNext = useCallback(() => {
        setIsAutoPlayNext(prev => !prev);
      }, []);

      const handleChangeSong = useCallback(() => {
        if (audioElementRef.current) {
          try {
            audioElementRef.current.pause();
            audioElementRef.current.onloadedmetadata = null;
            audioElementRef.current.onended = null;
            audioElementRef.current.ontimeupdate = null;
            audioElementRef.current.src = '';
            audioElementRef.current.load();
          } catch {}
          audioElementRef.current = null;
        }
        if (objectURLRef.current) {
          try {
            URL.revokeObjectURL(objectURLRef.current);
          } catch {}
          objectURLRef.current = null;
        }
        if (analysisRef.current) cancelAnimationFrame(analysisRef.current);
        if (sourceRef.current) { try { sourceRef.current.disconnect(); } catch {} sourceRef.current = null; }
        if (audioContextRef.current) { try { audioContextRef.current.close(); } catch {} audioContextRef.current = null; }
        setStage('transitioningOut');
        setTimeout(() => {
          setMusicFile(null);
          setAudioFeatures(EMPTY_AUDIO_FEATURES); setCurrentTime(0); setDuration(0);
          setCaption(null); setAwakeningProgress(0); setAfterglowProgress(0);
          setStage('idle');
        }, 500);
      }, []);

      const handleReplay = useCallback(() => {
        if (audioElementRef.current) {
          audioElementRef.current.currentTime = 0;
          setAfterglowProgress(0); setCaption(null);
          setStage('awakening');
        }
      }, []);

      useEffect(() => {
        if (stage === 'awakening') {
          const startTime = Date.now();
          const duration = 1500;
          const animate = () => {
            const elapsed = Date.now() - startTime;
            const p = Math.min(elapsed / duration, 1);
            setAwakeningProgress(p);
            if (p < 1) { animationRef.current = requestAnimationFrame(animate); }
            else {
              if (audioContextRef.current?.state === 'suspended') audioContextRef.current.resume();
              audioElementRef.current?.play();
              startAudioAnalysis();
              setStage('playing');
            }
          };
          animationRef.current = requestAnimationFrame(animate);
          return () => { if (animationRef.current) cancelAnimationFrame(animationRef.current); };
        }
      }, [stage, startAudioAnalysis]);

      useEffect(() => {
        if (stage === 'afterglow') {
          if (!afterglowPhrase) setAfterglowPhrase(afterglowPhrases.find(p => p.mood === mood)?.text || afterglowPhrases[0].text);
          const startTime = Date.now();
          const duration = 10000;
          const animate = () => {
            const elapsed = Date.now() - startTime;
            const p = Math.min(elapsed / duration, 1);
            setAfterglowProgress(p);
            if (p < 1) animationRef.current = requestAnimationFrame(animate);
          };
          animationRef.current = requestAnimationFrame(animate);
          return () => { if (animationRef.current) cancelAnimationFrame(animationRef.current); };
        }
      }, [stage, mood, afterglowPhrase]);

      useEffect(() => {
        if (stage === 'afterglow' && afterglowPhrase) {
          setTimeout(() => {
            setCaption({ type: 'afterglow', text: afterglowPhrase, startTime: Date.now(), duration: 10, animationMode: 'fade' });
          }, 1500);
        }
      }, [stage, afterglowPhrase]);

      const showPlayerBar = ['playing', 'paused', 'afterglow'].includes(stage);
      const showStatusPill = stage !== 'idle';

      return React.createElement('div', { style: { width: '100%', height: '100%', overflow: 'hidden', position: 'relative' } },
        visualMode === 'classic' && React.createElement(VisualCanvas, {
          stage, audioFeatures, visualStrategy, awakeningProgress, afterglowProgress,
          currentTime
        }),
        visualMode === 'cosmic' && React.createElement(CosmicCanvas, {
          stage, audioFeatures, visualStrategy, awakeningProgress, afterglowProgress,
          currentTime, mood, bpm
        }),
        visualMode === 'nebula' && React.createElement(NebulaCanvas, {
          stage, audioFeatures, visualStrategy, awakeningProgress, afterglowProgress,
          currentTime, mood, bpm
        }),
        
        stage === 'idle' && React.createElement(UploadScreen, {
          onMusicSelect: handleMusicSelect,
          onGenerateDemo: handleGenerateDemo
        }),
        
        ['uploading', 'decoding', 'analyzing', 'preparing'].includes(stage) && React.createElement(LoadingStage, { stage }),
        
        showStatusPill && React.createElement(StatusPill, { stage, mood, energy: audioFeatures.energy }),
        
        React.createElement(VisualModeSwitcher, {
          currentMode: visualMode,
          onModeChange: setVisualMode,
          visible: true
        }),
        
        showPlayerBar && musicFile && React.createElement(PlayerBar, {
          currentTime, duration, isPlaying: stage === 'playing',
          onPlayPause: handlePlayPause, onSeek: handleSeek,
          onChangeSong: handleChangeSong, onReplay: handleReplay,
          onNextTrack: handleNextTrack, onPrevTrack: handlePrevTrack,
          onAddToPlaylist: handleAddToPlaylist,
          onClearPlaylist: handleClearPlaylist,
          onSelectTrack: (index) => {
            if (playlist[index]) {
              loadAndPlayTrack(playlist[index], index);
            }
          },
          showReplay: true,
          musicFileName: musicFile.name,
          mood, energy: audioFeatures.energy, bpm,
          playlist, currentIndex, isAutoPlayNext
        }),
        
        React.createElement(CaptionOverlay, { caption, stage, energy: audioFeatures.energy }),
        
        stage === 'error' && React.createElement('div', { style: {
          position: 'fixed', inset: 0, background: 'rgba(10,10,15,0.9)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100
        } },
          React.createElement('div', { style: { textAlign: 'center' } },
            React.createElement('p', { style: { fontFamily: "'Songti SC', 'SimSun', 'STSong', serif", fontSize: 24, color: 'rgba(255,255,255,0.8)', marginBottom: 24 } }, '这首歌暂时无法被看见，换一首试试'),
            React.createElement('button', { onClick: handleChangeSong, style: {
              padding: '12px 32px', background: 'rgba(139,92,246,0.2)',
              border: '1px solid rgba(139,92,246,0.4)', borderRadius: 24,
              color: '#fff', fontFamily: "'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif", fontSize: 14
            } }, '重新上传')
          )
        ),
        
        React.createElement('div', { style: {
          position: 'fixed', top: 24, left: 24, zIndex: 100,
          fontFamily: "'Songti SC', 'SimSun', 'STSong', serif", letterSpacing: 6
        } },
          React.createElement('h2', { style: { fontSize: 16, fontWeight: 400, color: 'rgba(255,255,255,0.6)', margin: 0 } }, '看见音乐'),
          React.createElement('p', { style: { fontSize: 10, color: 'rgba(255,255,255,0.3)', marginTop: 4, letterSpacing: 4 } }, 'AI Music Visual Cinema')
        )
      );
    }

    createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
