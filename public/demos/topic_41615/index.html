  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif; color: white; -webkit-font-smoothing: antialiased; }
    input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
    input[type="range"]::-webkit-slider-track { height: 2px; background: rgba(255,255,255,0.2); border-radius: 1px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #ec4899); margin-top: -5px; box-shadow: 0 0 10px rgba(139,92,246,0.5); }

    @keyframes ringPulse { 0%,100% { transform: scale(1); border-color: rgba(139,92,246,0.3); } 50% { transform: scale(1.05); border-color: rgba(139,92,246,0.6); } }
    @keyframes centerGlow { 0%,100% { box-shadow: 0 0 20px rgba(139,92,246,0.5); } 50% { box-shadow: 0 0 40px rgba(139,92,246,0.8), 0 0 60px rgba(6,182,212,0.4); } }
    @keyframes floatParticle { 0%,100% { opacity: 0; transform: translateY(0) scale(1); } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-50px) scale(0.5); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 0.4; box-shadow: 0 0 8px rgba(139,92,246,0.4); } 50% { opacity: 1; box-shadow: 0 0 16px rgba(139,92,246,0.8); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    // 波形家族
    const waveFamilies = ['ring', 'ribbon', 'spiral', 'neural', 'terrain'];

    function determineMood(averageEnergy, fileName) {
      const lowerName = fileName.toLowerCase();
      // 文件名关键词检测（按优先级排序）
      // 热情/动感 energetic
      if (lowerName.includes('dance') || lowerName.includes('dj') || lowerName.includes('remix') || lowerName.includes('热情') || lowerName.includes('energetic') || lowerName.includes('rock') || lowerName.includes('electro')) return 'energetic';
      // 欢快 cheerful
      if (lowerName.includes('cheerful') || lowerName.includes('joy') || lowerName.includes('欢快') || lowerName.includes('喜悦') || lowerName.includes('happy')) return 'cheerful';
      // 低沉/悲伤 low
      if (lowerName.includes('sad') || lowerName.includes('lonely') || lowerName.includes('低沉') || lowerName.includes('悲伤') || lowerName.includes('slow') || lowerName.includes('deep') || lowerName.includes('dark')) return 'low';
      // 温暖 warm
      if (lowerName.includes('warm') || lowerName.includes('love') || lowerName.includes('温柔') || lowerName.includes('romantic')) return 'warm';
      // 平静 calm
      if (lowerName.includes('calm') || lowerName.includes('peace') || lowerName.includes('平静') || lowerName.includes('relax') || lowerName.includes('ambient')) return 'calm';
      // 梦幻 dreamy
      if (lowerName.includes('dream') || lowerName.includes('star') || lowerName.includes('梦幻') || lowerName.includes('night')) return 'dreamy';
      
      // 根据音频能量判断（调整阈值）
      if (averageEnergy > 0.55) return 'energetic';
      if (averageEnergy > 0.4) return 'cheerful';
      if (averageEnergy > 0.25) return 'warm';
      if (averageEnergy > 0.12) return 'calm';
      return 'low';
    }

    // 音乐状态机
    const MusicState = {
      CALM: 'calm',
      FLOW: 'flow',
      PULSE: 'pulse',
      BURST: 'burst',
      CLIMAX: 'climax'
    };

    function determineMusicState(audioFeatures, history) {
      const { bass, mid, treble, overallEnergy, peak, beatPulse } = audioFeatures;
      
      // 计算趋势
      const recentEnergies = history.slice(-30);
      const avgRecent = recentEnergies.reduce((a, b) => a + b, 0) / recentEnergies.length || 0;
      const energyTrend = overallEnergy - avgRecent;
      
      // 检测安静段
      if (overallEnergy < 0.1 && bass < 0.1 && mid < 0.1) {
        return { state: MusicState.CALM, blend: 1 };
      }
      
      // 检测爆发
      if (peak > 0.8 || (bass > 0.8 && beatPulse > 0.9)) {
        return { state: MusicState.BURST, blend: 1 };
      }
      
      // 检测高潮
      if (overallEnergy > 0.7 && (bass > 0.6 || mid > 0.6) && energyTrend > 0.1) {
        return { state: MusicState.CLIMAX, blend: 0.8 + Math.random() * 0.2 };
      }
      
      // 检测脉冲
      if (bass > 0.4 && beatPulse > 0.5 && overallEnergy > 0.3) {
        return { state: MusicState.PULSE, blend: 0.7 + beatPulse * 0.3 };
      }
      
      // 默认流动状态
      return { state: MusicState.FLOW, blend: 0.6 + mid * 0.4 };
    }

    // 增强的音频分析
    function analyzeAudio(analyser, frequencyData, timeDomainData) {
      const bands = {
        bass: { start: 0, end: 32 },
        lowMid: { start: 32, end: 64 },
        mid: { start: 64, end: 128 },
        highMid: { start: 128, end: 192 },
        treble: { start: 192, end: 256 }
      };
      
      const results = {};
      let totalEnergy = 0;
      
      for (const [band, range] of Object.entries(bands)) {
        let sum = 0;
        const count = range.end - range.start;
        for (let i = range.start; i < Math.min(range.end, frequencyData.length); i++) {
          sum += frequencyData[i];
        }
        results[band] = Math.min(1, (sum / count) / 255);
        totalEnergy += results[band];
      }
      
      // 整体能量
      results.overallEnergy = Math.min(1, totalEnergy / Object.keys(bands).length);
      
      // 检测峰值
      const maxFreq = Math.max(...frequencyData);
      results.peak = maxFreq / 255;
      
      // 节拍脉冲检测
      const avgTimeDomain = timeDomainData.reduce((a, b) => a + Math.abs(b), 0) / timeDomainData.length;
      results.beatPulse = Math.min(1, avgTimeDomain / 128);
      
      // 安静检测
      results.silence = results.overallEnergy < 0.1 && results.bass < 0.1;
      
      return results;
    }

    function perlin2(x, y) {
      const X = Math.floor(x), Y = Math.floor(y);
      const xf = x - X, yf = y - Y;
      const u = xf * xf * xf * (xf * (xf * 6 - 15) + 10);
      const v = yf * yf * yf * (yf * (yf * 6 - 15) + 10);
      const n00 = noise2d(X, Y), n01 = noise2d(X, Y + 1);
      const n10 = noise2d(X + 1, Y), n11 = noise2d(X + 1, Y + 1);
      return lerp(lerp(n00, n10, u), lerp(n01, n11, u), v);
    }

    function noise2d(x, y) { return Math.sin(x * 12.9898 + y * 78.233 + 5000) * 43758.5453 % 1; }
    function lerp(a, b, t) { return a + t * (b - a); }
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInCubic(t) { return Math.pow(t, 3); }
    function interpolateColor(color1, color2, t) {
      const r1 = parseInt(color1.slice(1, 3), 16), g1 = parseInt(color1.slice(3, 5), 16), b1 = parseInt(color1.slice(5, 7), 16);
      const r2 = parseInt(color2.slice(1, 3), 16), g2 = parseInt(color2.slice(3, 5), 16), b2 = parseInt(color2.slice(5, 7), 16);
      const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
      return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
    }

    const EMPTY_AUDIO_FEATURES = { bass: 0, mid: 0, treble: 0, volume: 0, energy: 0, frequencyData: new Uint8Array(0), timeDomainData: new Uint8Array(0) };
    const DEFAULT_VISUAL_STRATEGY = {
      mood: 'dreamy',
      colorPalette: { primary: '#8b5cf6', secondary: '#06b6d4', accent: '#f472b6', background: '#0f0a1e', text: '#e9d5ff' },
      particleDensity: 0.5, waveSpeed: 0.5, animationSpeed: 0.8, captionStyle: 'poetic'
    };

    function UploadScreen(props) {
      const musicInputRef = useRef(null);

      const handleMusicClick = useCallback(() => musicInputRef.current?.click(), []);

      const handleMusicChange = useCallback((e) => {
        const files = e.target.files;
        if (files && files.length > 0) {
          // 检查所有文件大小
          const validFiles = [];
          for (const file of files) {
            if (file.size > 50 * 1024 * 1024) {
              alert(`文件 "${file.name}" 大小超过限制（最大50MB）`);
              continue;
            }
            validFiles.push(file);
          }
          if (validFiles.length > 0) {
            props.onMusicSelect(validFiles);
          }
        }
      }, [props.onMusicSelect]);

      const handleDemoClick = useCallback(() => {
        if (props.onGenerateDemo) {
          props.onGenerateDemo();
        }
      }, [props.onGenerateDemo]);

      return React.createElement('div', { style: {
        position: 'fixed', inset: 0, background: 'radial-gradient(ellipse at center bottom, #1a102e 0%, #0a0a0f 60%, #050508 100%)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden', zIndex: 10
      } },
        React.createElement('input', { ref: musicInputRef, type: 'file', accept: 'audio/mp3,audio/wav,audio/ogg', multiple: true, onChange: handleMusicChange, style: { display: 'none' } }),
        
        React.createElement('div', { style: { textAlign: 'center' } },
          React.createElement('div', { style: {
            width: 80, height: 80, border: '1px solid rgba(139,92,246,0.3)', borderRadius: '50%', margin: '0 auto 32px',
            position: 'relative', animation: 'ringPulse 3s ease-in-out infinite'
          } }),
          React.createElement('h1', { style: { fontFamily: "'Songti SC', 'SimSun', 'STSong', serif", fontSize: 48, fontWeight: 500, color: '#fff', marginBottom: 8, letterSpacing: 12, textShadow: '0 0 40px rgba(139,92,246,0.3)' } }, '看见音乐'),
          React.createElement('p', { style: { fontFamily: "'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif", fontSize: 14, color: 'rgba(255,255,255,0.5)', marginBottom: 32, letterSpacing: 8 } }, 'AI Music Visual Cinema'),
          React.createElement('p', { style: { fontFamily: "'Songti SC', 'SimSun', 'STSong', serif", fontSize: 24, color: '#e9d5ff', marginBottom: 12, fontWeight: 300 } }, '让 AI 把音乐画出来'),
          React.createElement('p', { style: { fontFamily: "'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif", fontSize: 14, color: 'rgba(255,255,255,0.4)', marginBottom: 48 } }, '识别节奏、情绪与能量，生成专属动态视觉舞台'),
          React.createElement('button', { onClick: handleMusicClick, style: {
            display: 'inline-flex', alignItems: 'center', gap: 12, padding: '16px 48px',
            background: 'linear-gradient(135deg, rgba(139,92,246,0.2), rgba(6,182,212,0.2))',
            border: '1px solid rgba(139,92,246,0.4)', borderRadius: 40, color: '#fff',
            fontFamily: "'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif", fontSize: 16, transition: 'all 0.3s ease',
            backdropFilter: 'blur(10px)'
          } },
            React.createElement('span', { style: { fontSize: 24, fontWeight: 300, color: '#8b5cf6' } }, '+'),
            React.createElement('span', null, '上传歌曲')
          ),
          props.onGenerateDemo && React.createElement('button', { 
            onClick: handleDemoClick, 
            style: {
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              padding: '14px 40px', marginTop: 24,
              background: 'linear-gradient(135deg, rgba(6,182,212,0.15), rgba(139,92,246,0.15))',
              border: '1px solid rgba(6,182,212,0.4)', borderRadius: 30, color: 'rgba(255,255,255,0.85)',
              fontFamily: "'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif", fontSize: 14, transition: 'all 0.3s ease',
              backdropFilter: 'blur(10px)'
            }
          },
            React.createElement('span', { style: { fontSize: 16 } }, '✨'),
            React.createElement('span', null, '一键生成演示歌曲')
          )
        ),
        
        React.createElement('div', { style: { position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' } },
          Array.from({ length: 30 }).map((_, i) => React.createElement('div', { key: i, style: {
            position: 'absolute', width: 2, height: 2, background: 'rgba(139,92,246,0.4)', borderRadius: '50%',
            left: `${Math.random() * 100}%`, top: `${Math.random() * 100}%`,
            animation: `floatParticle ${3 + Math.random() * 4}s ease-in-out infinite`,
            animationDelay: `${Math.random() * 5}s`
          } }))
        )
      );
    }

    function LoadingStage(props) {
      const messages = { uploading: '读取音乐', decoding: '解码音频', analyzing: '描绘节奏', preparing: '识别情绪' };
      const message = messages[props.stage] || '点亮舞台';

      return React.createElement('div', { style: {
        position: 'fixed', inset: 0, background: 'linear-gradient(to bottom, #050508 0%, #0f0a1e 50%, #0a0a0f 100%)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100
      } },
        React.createElement('div', { style: { textAlign: 'center' } },
          React.createElement('div', { style: { position: 'relative', width: 120, height: 120, margin: '0 auto 32px' } },
            React.createElement('div', { style: { position: 'absolute', inset: 0, border: '1px solid rgba(139,92,246,0.2)', borderRadius: '50%', animation: 'ringRotate 4s linear infinite' } }),
            React.createElement('div', { style: {
              position: 'absolute', top: '50%', left: '50%', width: 8, height: 8,
              background: 'radial-gradient(circle, #8b5cf6 0%, #06b6d4 100%)', borderRadius: '50%',
              transform: 'translate(-50%, -50%)', boxShadow: '0 0 30px rgba(139,92,246,0.6)',
              animation: 'corePulse 2s ease-in-out infinite'
            } }),
            [...Array(8)].map((_, i) => React.createElement('div', { key: i, style: {
              position: 'absolute', width: 4, height: 4, background: 'rgba(139,92,246,0.8)', borderRadius: '50%',
              top: '50%', left: '50%', animation: `particleOrbit 4s linear infinite`,
              animationDelay: `${i * 0.5}s`, transformOrigin: '0 0'
            } }))
          ),
          React.createElement('p', { style: { fontFamily: "'Songti SC', 'SimSun', 'STSong', serif", fontSize: 20, color: 'rgba(255,255,255,0.8)', margin: 0, letterSpacing: 4 } }, message)
        ),
        React.createElement('style', null, `
          @keyframes ringRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
          @keyframes corePulse { 0%,100% { box-shadow: 0 0 20px rgba(139,92,246,0.5); transform: translate(-50%,-50%) scale(1); } 50% { box-shadow: 0 0 40px rgba(139,92,246,0.8), 0 0 60px rgba(6,182,212,0.4); transform: translate(-50%,-50%) scale(1.2); } }
          @keyframes particleOrbit { from { transform: rotate(0deg) translateX(55px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } to { transform: rotate(360deg) translateX(55px); opacity: 0; } }
        `)
      );
    }

    function VisualCanvas(props) {
      const canvasRef = useRef(null);
      const animationRef = useRef(null);
      const ripplesRef = useRef([]);
      const particlesRef = useRef([]);
      const flowParticlesRef = useRef([]); // Prismatic Flow Field particles
      const flowLinesRef = useRef([]); // Prismatic light flow lines
      const oceanParticlesRef = useRef([]); // Frequency Particle Ocean particles
      const pulseStateRef = useRef({
        radius: 30,
        targetRadius: 30,
        glow: 20,
        targetGlow: 20,
        rotation: 0,
        beatIntensity: 0,
        shockwaves: [],
        bassHistory: [],
        lastBeatTime: 0,
        breathingPhase: 0
      });
      // 当前音乐状态
      const musicStateRef = useRef({ state: 'calm', blend: 1 });
      // 能量历史用于趋势计算
      const energyHistoryRef = useRef([]);
      const timeRef = useRef(0);
      const prevBassRef = useRef(0);
      const prevEnergyRef = useRef(0);

      const isIdle = props.stage === 'idle';
      const isLoading = ['uploading', 'decoding', 'analyzing', 'preparing'].includes(props.stage);
      const isAwakening = props.stage === 'awakening';
      const isPlaying = props.stage === 'playing';
      const isPaused = props.stage === 'paused';
      const isAfterglow = props.stage === 'afterglow';

      const drawBackground = useCallback((ctx, width, height, time) => {
        const { colorPalette } = props.visualStrategy;
        let bgColor = colorPalette.background;
        if (isAwakening) {
          bgColor = interpolateColor('#050508', colorPalette.background, easeOutCubic(props.awakeningProgress));
        } else if (isAfterglow) {
          bgColor = interpolateColor(colorPalette.background, '#1a1525', easeInCubic(props.afterglowProgress));
        }
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, width, height);

        const glowRadius = 200 + Math.sin(time * 0.001) * 50;
        const glowX = width * 0.5 + Math.sin(time * 0.0005) * width * 0.2;
        const glowY = height * 0.5 + Math.cos(time * 0.0003) * height * 0.2;
        const gradient = ctx.createRadialGradient(glowX, glowY, 0, glowX, glowY, glowRadius);
        gradient.addColorStop(0, `${colorPalette.primary}10`);
        gradient.addColorStop(0.5, `${colorPalette.secondary}05`);
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
      }, [props.visualStrategy, isAwakening, isAfterglow, props.awakeningProgress, props.afterglowProgress]);

      const drawParticles = useCallback((ctx, width, height, time) => {
        const { colorPalette, particleDensity } = props.visualStrategy;
        const { bass, energy } = props.audioFeatures;
        const speedMultiplier = isPaused ? 0.15 : (isAfterglow ? 0.3 : 1);
        const maxParticles = Math.floor(200 * particleDensity);

        while (particlesRef.current.length < maxParticles) {
          const layer = Math.random() < 0.5 ? 'far' : Math.random() < 0.6 ? 'mid' : 'near';
          particlesRef.current.push({
            x: Math.random() * width, y: layer === 'near' ? height + 20 : Math.random() * height,
            vx: (Math.random() - 0.5) * 0.5, vy: layer === 'far' ? -0.2 : layer === 'mid' ? -0.5 : -1,
            size: layer === 'far' ? 1 : layer === 'mid' ? 2 : 3,
            alpha: layer === 'far' ? 0.3 : layer === 'mid' ? 0.5 : 0.8,
            color: colorPalette.primary, layer, life: 0, maxLife: 500 + Math.random() * 500
          });
        }

        particlesRef.current = particlesRef.current.filter(p => {
          p.life++;
          if (p.life > p.maxLife) return false;
          const baseSpeed = p.layer === 'far' ? 0.3 : p.layer === 'mid' ? 0.6 : 1;
          p.vx += (Math.random() - 0.5) * 0.1;
          p.vy = -baseSpeed * speedMultiplier - (isPlaying ? energy * 2 : 0) * 0.1;
          if (isAfterglow) { p.vy *= 0.3; p.vy += 0.1; }
          p.x += p.vx; p.y += p.vy;
          if (p.y < -20 || p.x < -20 || p.x > width + 20) return false;
          const lifeRatio = p.life / p.maxLife;
          const alpha = p.alpha * (1 - lifeRatio) * (isPaused ? 0.5 : 1);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * (1 - lifeRatio * 0.5), 0, Math.PI * 2);
          ctx.fillStyle = `${p.color}${Math.round(alpha * 255).toString(16).padStart(2, '0')}`;
          ctx.fill();
          if (bass > 0.5 && Math.random() < bass * 0.1) {
            ctx.shadowColor = p.color; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
            ctx.fillStyle = `${p.color}${Math.round(alpha * 0.5 * 255).toString(16).padStart(2, '0')}`;
            ctx.fill(); ctx.shadowBlur = 0;
          }
          return true;
        });

          flowParticlesRef.current.push({

            vy: 0,

        flowParticlesRef.current = flowParticlesRef.current.filter(p => {

          const noiseAngle = perlin2(p.x * noiseScale, p.y * noiseScale + time * timeScale) * Math.PI * 4;

            const pushStrength = bass * 0.3;
            angle = angle * 0.7 + pushAngle * 0.3;
          }
          
          // Calculate velocity with smooth interpolation
          const targetVx = Math.cos(angle) * flowSpeed * (0.5 + p.depth * 0.5);
          const targetVy = Math.sin(angle) * flowSpeed * (0.5 + p.depth * 0.5);
          p.vx = p.vx * 0.92 + targetVx * 0.08;
          p.vy = p.vy * 0.92 + targetVy * 0.08;

            trailGradient.addColorStop(1, `${particleColor}${Math.round(baseAlpha * 255).toString(16).padStart(2, '0')}`);

          return true;

        // Draw prismatic light flow lines

          lineGradient.addColorStop(0.5, `${colors[colorMidIdx]}${Math.round(lineAlpha * 1.5 * 255).toString(16).padStart(2, '0')}`);
          lineGradient.addColorStop(1, `${colors[colorEndIdx]}${Math.round(lineAlpha * 255).toString(16).padStart(2, '0')}`);

        // Draw particle connections (data network effect)

          flowParticlesRef.current.forEach((p1, i) => {

              const dist = Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));

      const drawFrequencyParticleOcean = useCallback((ctx, width, height, time) => {

            } else {

            trailGradient.addColorStop(1, `${p.color}${Math.round(alpha * 0.3 * 255).toString(16).padStart(2, '0')}`);

        // Draw central highlight line
        if (energy > 0.3 && !isAfterglow) {
          ctx.beginPath();
          ctx.moveTo(0, baseY);
          for (let x = 0; x <= width; x += 8) {
            const freqIndex = Math.floor((x / width) * frequencyData.length);
            const amp = frequencyData.length > 0 ? frequencyData[freqIndex] / 255 : 0;
            const y = baseY + amp * 80 * energyBoost;
            ctx.lineTo(x, y);
          }
          ctx.strokeStyle = `${colorPalette.accent}60`;
          ctx.lineWidth = 1;
          ctx.shadowColor = colorPalette.accent;
          ctx.shadowBlur = 30;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
      }, [props.visualStrategy, props.audioFeatures, isPaused, isAfterglow, props.afterglowProgress]);

      const drawRipples = useCallback((ctx, width, height) => {
        const { colorPalette } = props.visualStrategy;
        ripplesRef.current = ripplesRef.current.filter(ripple => {
          ripple.life++;
          const progress = ripple.life / ripple.duration;
          ripple.radius = ripple.maxRadius * easeOutCubic(progress);
          ripple.alpha = 1 - easeInCubic(progress);
          if (ripple.alpha <= 0) return false;
          ctx.beginPath(); ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
          ctx.strokeStyle = `${ripple.color}${Math.round(ripple.alpha * 128).toString(16).padStart(2, '0')}`;
          ctx.lineWidth = 1; ctx.stroke();
          return true;
        });
      }, [props.visualStrategy]);

      const checkAudioEvents = useCallback((width, height) => {
        const { bass, energy } = props.audioFeatures;
        const bassDiff = bass - prevBassRef.current;
        const energyDiff = energy - prevEnergyRef.current;
        if (bassDiff > 0.2 && bass > 0.4) {
          ripplesRef.current.push({
            x: width * 0.5 + (Math.random() - 0.5) * 200,
            y: height * 0.5 + (Math.random() - 0.5) * 100,
            radius: 0, maxRadius: 100 + bass * 200, alpha: 1,
            color: props.visualStrategy.colorPalette.primary, life: 0, duration: 60 + bass * 40
          });
        }
        if (energyDiff > 0.3 && energy > 0.5) {
          ripplesRef.current.push({
            x: width * 0.5, y: height * 0.5, radius: 0, maxRadius: 100 + energy * 200, alpha: 1,
            color: props.visualStrategy.colorPalette.primary, life: 0, duration: 60 + energy * 40
          });
        }
        prevBassRef.current = bass; prevEnergyRef.current = energy;
      }, [props.audioFeatures, props.visualStrategy]);

      const drawAwakening = useCallback((ctx, width, height) => {
        const t = props.awakeningProgress;
        const centerX = width * 0.5; const centerY = height * 0.5;
        const glowRadius = t * Math.max(width, height) * 1.5;
        const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowRadius);
        gradient.addColorStop(0, `rgba(139,92,246,${t * 0.5})`);
        gradient.addColorStop(0.5, `rgba(6,182,212,${t * 0.3})`);
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient; ctx.fillRect(0, 0, width, height);
        const lightRingRadius = t * width * 0.8;
        ctx.beginPath(); ctx.arc(centerX, centerY, lightRingRadius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(139,92,246,${t * 0.8})`; ctx.lineWidth = 1; ctx.stroke();
      }, [props.awakeningProgress]);

      // Afterglow Wave Wash - 结束时粒子海浪冲刷动画
      const waveWashRef = useRef({ particles: [], waves: [], startTime: 0 });
      
      const drawAfterglowWaveWash = useCallback((ctx, width, height, time) => {
        if (!isAfterglow) {
          waveWashRef.current = { particles: [], waves: [], startTime: 0 };
          return;
        }
        
        const { colorPalette } = props.visualStrategy;
        const progress = props.afterglowProgress;
        
        // Initialize wave wash on first frame of afterglow
        if (waveWashRef.current.startTime === 0) {
          waveWashRef.current.startTime = time;
          
          // Create gentle settling particles that float and fade
          for (let i = 0; i < 80; i++) {
            waveWashRef.current.particles.push({
              x: Math.random() * width,
              y: height * (0.2 + Math.random() * 0.6),
              vx: (Math.random() - 0.5) * 0.3,
              vy: -0.2 - Math.random() * 0.3, // Slowly float up
              size: 1 + Math.random() * 3,
              alpha: 0.3 + Math.random() * 0.4,
              life: 0,
              maxLife: 300 + Math.random() * 200,
              color: [colorPalette.primary, colorPalette.secondary, colorPalette.accent][Math.floor(Math.random() * 3)],
              wobble: Math.random() * Math.PI * 2,
              wobbleSpeed: 0.01 + Math.random() * 0.02
            });
          }
          
          // Create soft wave lines that gently fade
          for (let i = 0; i < 3; i++) {
            waveWashRef.current.waves.push({
              y: height * (0.35 + i * 0.15),
              amplitude: 15 + i * 10,
              alpha: 0.15 - i * 0.03,
              phase: Math.random() * Math.PI * 2,
              frequency: 0.02 + i * 0.005
            });
          }
        }
        
        // Draw soft ambient glow that fades
        const glowAlpha = 0.1 * (1 - progress);
        if (glowAlpha > 0.01) {
          const glowGradient = ctx.createRadialGradient(
            width * 0.5, height * 0.4, 0,
            width * 0.5, height * 0.4, width * 0.5
          );
          glowGradient.addColorStop(0, `${colorPalette.secondary}${Math.round(glowAlpha * 255).toString(16).padStart(2, '0')}`);
          glowGradient.addColorStop(0.5, `${colorPalette.primary}${Math.round(glowAlpha * 0.5 * 255).toString(16).padStart(2, '0')}`);
          glowGradient.addColorStop(1, 'transparent');
          ctx.fillStyle = glowGradient;
          ctx.fillRect(0, 0, width, height);
        }
        
        // Update and draw settling particles
        waveWashRef.current.particles = waveWashRef.current.particles.filter(p => {
          p.life++;
          if (p.life > p.maxLife) return false;
          
          // Gentle floating motion
          p.wobble += p.wobbleSpeed;
          p.x += p.vx + Math.sin(p.wobble) * 0.5;
          p.y += p.vy * (1 - progress * 0.5); // Slow down as progress increases
          
          // Gentle fade out
          const lifeRatio = p.life / p.maxLife;
          const fadeIn = Math.min(1, p.life / 50);
          const fadeOut = 1 - Math.pow(lifeRatio, 2);
          const progressFade = 1 - progress * 0.8;
          const alpha = p.alpha * fadeIn * fadeOut * progressFade;
          
          if (alpha <= 0.01) return false;
          
          // Draw soft glowing particle
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * (1 - progress * 0.3), 0, Math.PI * 2);
          ctx.fillStyle = `${p.color}${Math.round(alpha * 255).toString(16).padStart(2, '0')}`;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 8;
          ctx.globalCompositeOperation = 'lighter';
          ctx.fill();
          ctx.globalCompositeOperation = 'source-over';
          ctx.shadowBlur = 0;
          
          return alpha > 0.01;
        });
        
        // Draw soft wave lines that gently breathe and fade
        waveWashRef.current.waves.forEach((wave, idx) => {
          const waveAlpha = wave.alpha * (1 - progress * 0.9);
          if (waveAlpha <= 0.01) return;
          
          ctx.beginPath();
          ctx.moveTo(0, wave.y);
          
          for (let x = 0; x <= width; x += 8) {
            const y = wave.y + Math.sin(x * wave.frequency + time * 0.002 + wave.phase) * wave.amplitude * (1 - progress);
            ctx.lineTo(x, y);
          }
          
          const gradient = ctx.createLinearGradient(0, wave.y - 30, width, wave.y + 30);
          gradient.addColorStop(0, `${colorPalette.primary}00`);
          gradient.addColorStop(0.3, `${colorPalette.secondary}${Math.round(waveAlpha * 255).toString(16).padStart(2, '0')}`);
          gradient.addColorStop(0.7, `${colorPalette.accent}${Math.round(waveAlpha * 0.5 * 255).toString(16).padStart(2, '0')}`);
          gradient.addColorStop(1, `${colorPalette.primary}00`);
          
          ctx.strokeStyle = gradient;
          ctx.lineWidth = 1.5;
          ctx.lineCap = 'round';
          ctx.shadowColor = colorPalette.secondary;
          ctx.shadowBlur = 10;
          ctx.globalCompositeOperation = 'lighter';
          ctx.stroke();
          ctx.globalCompositeOperation = 'source-over';
          ctx.shadowBlur = 0;
        });
        
        // Draw final gentle light dust settling
        if (progress > 0.3) {
          const dustAlpha = (progress - 0.3) * 0.15 * (1 - (progress - 0.3));
          for (let i = 0; i < 20; i++) {
            const x = width * 0.3 + Math.random() * width * 0.4;
            const y = height * 0.3 + Math.random() * height * 0.4;
            const size = 0.5 + Math.random() * 1.5;
            const color = colorPalette.secondary;
            
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fillStyle = `${color}${Math.round(dustAlpha * 255).toString(16).padStart(2, '0')}`;
            ctx.shadowColor = color;
            ctx.shadowBlur = 5;
            ctx.fill();
            ctx.shadowBlur = 0;
          }
        }
      }, [isAfterglow, props.afterglowProgress, props.visualStrategy]);

      // Audio Pulse Core - 中央音频律动核心
      const drawAudioPulseCore = useCallback((ctx, width, height, time) => {
        const { colorPalette } = props.visualStrategy;
        const { bass, mid, treble, energy, frequencyData } = props.audioFeatures;
        const centerX = width * 0.5;
        const centerY = height * 0.45;
        
        const pulseState = pulseStateRef.current;
        
        // Update bass history for beat detection
        pulseState.bassHistory.push(bass);
        if (pulseState.bassHistory.length > 30) pulseState.bassHistory.shift();
        const avgBass = pulseState.bassHistory.reduce((a, b) => a + b, 0) / pulseState.bassHistory.length;
        
        // Beat detection
        const beatThreshold = avgBass * 1.35;
        const now = Date.now();
        if (bass > beatThreshold && now - pulseState.lastBeatTime > 220 && (isPlaying || isAwakening)) {
          pulseState.lastBeatTime = now;
          pulseState.beatIntensity = 1;
          
          // Add shockwaves
          pulseState.shockwaves.push({
            radius: 0,
            maxRadius: 150 + energy * 200,
            alpha: 1,
            color: colorPalette.primary,
            speed: 3 + energy * 2,
            life: 0,
            duration: 60 + energy * 30
          });
          
          // Trigger additional visual events
          if (ripplesRef.current.length < 3) {
            ripplesRef.current.push({
              x: centerX,
              y: centerY,
              radius: 0,
              maxRadius: 100 + bass * 150,
              alpha: 1,
              color: colorPalette.accent,
              life: 0,
              duration: 40 + bass * 30
            });
          }
        }
        
        // Decay beat intensity
        pulseState.beatIntensity *= 0.9;
        
        // Calculate target radius based on audio features
        const baseRadius = isAfterglow ? 15 * (1 - props.afterglowProgress) : 40;
        const bassRadius = bass * 80;
        const midRadius = mid * 30;
        const energyRadius = energy * 40;
        const beatRadius = pulseState.beatIntensity * 30;
        pulseState.targetRadius = baseRadius + bassRadius + midRadius + energyRadius + beatRadius;
        
        // Calculate target glow
        const baseGlow = isAfterglow ? 10 * (1 - props.afterglowProgress) : 25;
        const bassGlow = bass * 40;
        const energyGlow = energy * 30;
        const beatGlow = pulseState.beatIntensity * 50;
        pulseState.targetGlow = baseGlow + bassGlow + energyGlow + beatGlow;
        
        // Smooth transitions
        pulseState.radius += (pulseState.targetRadius - pulseState.radius) * 0.15;
        pulseState.glow += (pulseState.targetGlow - pulseState.glow) * 0.1;
        
        // Update rotation
        const rotationSpeed = isAfterglow ? 0.0005 : 0.001 + energy * 0.001;
        pulseState.rotation += rotationSpeed;
        
        // Update breathing phase
        pulseState.breathingPhase += 0.02;
        
        // Update shockwaves
        pulseState.shockwaves = pulseState.shockwaves.filter(sw => {
          sw.life++;
          const progress = sw.life / sw.duration;
          sw.radius = sw.maxRadius * easeOutCubic(progress);
          sw.alpha = 1 - easeInCubic(progress);
          
          if (sw.alpha <= 0.01) return false;
          
          ctx.beginPath();
          ctx.arc(centerX, centerY, sw.radius, 0, Math.PI * 2);
          ctx.strokeStyle = `${sw.color}${Math.round(sw.alpha * 128).toString(16).padStart(2, '0')}`;
          ctx.lineWidth = 1 + sw.alpha * 2;
          ctx.shadowColor = sw.color;
          ctx.shadowBlur = 10 * sw.alpha;
          ctx.globalCompositeOperation = 'lighter';
          ctx.stroke();
          ctx.globalCompositeOperation = 'source-over';
          ctx.shadowBlur = 0;
          
          return sw.life < sw.duration;
        });
        
        // Limit shockwaves to 4
        if (pulseState.shockwaves.length > 4) {
          pulseState.shockwaves = pulseState.shockwaves.slice(-4);
        }
        
        // Draw main pulse core
        const coreRadius = pulseState.radius;
        const currentGlow = pulseState.glow;
        
        // Outer glow
        const outerGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, coreRadius * 2.5);
        outerGradient.addColorStop(0, `${colorPalette.primary}40`);
        outerGradient.addColorStop(0.4, `${colorPalette.secondary}20`);
        outerGradient.addColorStop(1, 'transparent');
        ctx.fillStyle = outerGradient;
        ctx.beginPath();
        ctx.arc(centerX, centerY, coreRadius * 2.5, 0, Math.PI * 2);
        ctx.fill();
        
        // Draw liquid-like core with noise
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(pulseState.rotation);
        
        // Create irregular shape using noise
        ctx.beginPath();
        const numPoints = 60;
        for (let i = 0; i < numPoints; i++) {
          const angle = (i / numPoints) * Math.PI * 2;
          const noiseValue = perlin2(Math.cos(angle) * 0.5, Math.sin(angle) * 0.5 + time * 0.0005) * 0.15;
          const midWobble = mid * Math.sin(angle * 4 + time * 0.003) * 0.1;
          const bassPulse = bass * Math.sin(angle * 2 + time * 0.005) * 0.15;
          const beatWobble = pulseState.beatIntensity * Math.sin(angle * 8) * 0.2;
          const r = coreRadius * (1 + noiseValue + midWobble + bassPulse + beatWobble);
          const x = Math.cos(angle) * r;
          const y = Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        
        // Core gradient
        const coreGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, coreRadius);
        coreGradient.addColorStop(0, `${colorPalette.secondary}`);
        coreGradient.addColorStop(0.4, `${colorPalette.primary}`);
        coreGradient.addColorStop(0.7, `${colorPalette.accent}cc`);
        coreGradient.addColorStop(1, `${colorPalette.accent}60`);
        
        ctx.fillStyle = coreGradient;
        ctx.shadowColor = colorPalette.primary;
        ctx.shadowBlur = currentGlow;
        ctx.globalCompositeOperation = 'lighter';
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
        
        // Draw inner core
        const innerRadius = coreRadius * 0.5;
        const innerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, innerRadius);
        innerGradient.addColorStop(0, '#ffffff');
        innerGradient.addColorStop(0.5, `${colorPalette.secondary}cc`);
        innerGradient.addColorStop(1, `${colorPalette.primary}40`);
        
        ctx.beginPath();
        ctx.arc(0, 0, innerRadius, 0, Math.PI * 2);
        ctx.fillStyle = innerGradient;
        ctx.shadowBlur = currentGlow * 0.5;
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Draw treble spikes
        if (treble > 0.3 || energy > 0.5) {
          for (let i = 0; i < 36; i++) {
            const angle = (i / 36) * Math.PI * 2;
            const spikeLength = (treble * 20 + energy * 15 + Math.random() * 10) * (isAfterglow ? 0.3 : 1);
            const spikeAlpha = 0.3 + treble * 0.5;
            const baseX = Math.cos(angle) * (coreRadius + 10);
            const baseY = Math.sin(angle) * (coreRadius + 10);
            const endX = baseX + Math.cos(angle) * spikeLength;
            const endY = baseY + Math.sin(angle) * spikeLength;
            
            ctx.beginPath();
            ctx.moveTo(baseX, baseY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = `${colorPalette.accent}${Math.round(spikeAlpha * 255).toString(16).padStart(2, '0')}`;
            ctx.lineWidth = 1;
            ctx.shadowColor = colorPalette.accent;
            ctx.shadowBlur = 5;
            ctx.globalCompositeOperation = 'lighter';
            ctx.stroke();
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;
          }
        }
        
        ctx.restore();
        
        // Draw circular frequency spectrum around core
        const spectrumRadius = coreRadius + 60;
        const numBands = Math.min(frequencyData.length, 128);
        const spectrumAlpha = isAfterglow ? 0.3 * (1 - props.afterglowProgress) : 0.6 + energy * 0.4;
        
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(pulseState.rotation * 0.3);
        
        for (let i = 0; i < numBands; i++) {
          const angle = (i / numBands) * Math.PI * 2;
          const freqIndex = Math.floor((i / numBands) * frequencyData.length);
          const bandEnergy = frequencyData.length > 0 ? frequencyData[freqIndex] / 255 : 0;
          
          // Low frequencies affect inner ring, high frequencies affect outer spikes
          let spikeLength;
          if (i < numBands * 0.3) {
            spikeLength = bandEnergy * (20 + bass * 30);
          } else if (i < numBands * 0.7) {
            spikeLength = bandEnergy * (30 + mid * 40);
          } else {
            spikeLength = bandEnergy * (40 + treble * 50);
          }
          
          // Apply energy multiplier
          spikeLength *= (1 + energy * 0.5);
          
          // Afterglow reduction
          spikeLength *= (isAfterglow ? (1 - props.afterglowProgress * 0.7) : 1);
          
          if (spikeLength < 1) continue;
          
          const baseX = Math.cos(angle) * spectrumRadius;
          const baseY = Math.sin(angle) * spectrumRadius;
          const endX = baseX + Math.cos(angle) * spikeLength;
          const endY = baseY + Math.sin(angle) * spikeLength;
          
          // Color based on frequency band
          let color;
          if (i < numBands * 0.3) {
            color = colorPalette.primary;
          } else if (i < numBands * 0.7) {
            color = colorPalette.secondary;
          } else {
            color = colorPalette.accent;
          }
          
          ctx.beginPath();
          ctx.moveTo(baseX, baseY);
          ctx.lineTo(endX, endY);
          ctx.strokeStyle = `${color}${Math.round(spectrumAlpha * 255).toString(16).padStart(2, '0')}`;
          ctx.lineWidth = i < numBands * 0.3 ? 2 : 1;
          ctx.shadowColor = color;
          ctx.shadowBlur = 8;
          ctx.globalCompositeOperation = 'lighter';
          ctx.stroke();
          ctx.globalCompositeOperation = 'source-over';
          ctx.shadowBlur = 0;
          
          // Draw small glow dots at spike ends
          if (bandEnergy > 0.5) {
            ctx.beginPath();
            ctx.arc(endX, endY, 2 + bandEnergy * 2, 0, Math.PI * 2);
            ctx.fillStyle = `${color}${Math.round(spectrumAlpha * bandEnergy * 255).toString(16).padStart(2, '0')}`;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
          }
        }
        
        ctx.restore();
        
        // Draw breathing ring
        const breathRingRadius = spectrumRadius + 20 + Math.sin(pulseState.breathingPhase) * 10 + energy * 10;
        const breathAlpha = 0.1 + energy * 0.2 + pulseState.beatIntensity * 0.3;
        
        ctx.beginPath();
        ctx.arc(centerX, centerY, breathRingRadius, 0, Math.PI * 2);
        ctx.strokeStyle = `${colorPalette.secondary}${Math.round(breathAlpha * 255).toString(16).padStart(2, '0')}`;
        ctx.lineWidth = 1;
        ctx.shadowColor = colorPalette.secondary;
        ctx.shadowBlur = 15;
        ctx.globalCompositeOperation = 'lighter';
        ctx.stroke();
        ctx.globalCompositeOperation = 'source-over';
        ctx.shadowBlur = 0;
      }, [props.visualStrategy, props.audioFeatures, isPlaying, isAwakening, isAfterglow, props.afterglowProgress]);

      // Laser Rays - 激光射线效果（贯穿全屏）
      const laserRaysRef = useRef([]);
      const drawLaserRays = useCallback((ctx, width, height, time) => {
        const { colorPalette } = props.visualStrategy;
        const { bass, mid, treble, energy } = props.audioFeatures;
        
        // 根据音频能量决定激光强度
        const intensityThreshold = 0.35;
        const currentIntensity = bass * 0.6 + mid * 0.3 + treble * 0.2 + energy * 0.4;
        
        // 能量不足时不显示新射线，但保留现有射线的消退
        if (currentIntensity < intensityThreshold) {
          // 快速衰减现有射线
          laserRaysRef.current = laserRaysRef.current.filter(ray => {
            ray.life -= 0.15;
            ray.alpha = ray.baseAlpha * Math.max(0, ray.life);
            return ray.life > 0;
          });
        } else {
          // 音乐高昂时生成新射线
          const spawnChance = (currentIntensity - intensityThreshold) * 0.4;
          if (Math.random() < spawnChance) {
            // 水平射线（从左到右或从右到左）
            if (Math.random() < 0.5) {
              const startX = Math.random() < 0.5 ? -50 : width + 50;
              const startY = Math.random() * height;
              const endX = startX < 0 ? width + 50 : -50;
              laserRaysRef.current.push({
                type: 'horizontal',
                startX, startY, endX,
                life: 1,
                baseAlpha: 0.4 + currentIntensity * 0.4,
                alpha: 0,
                speed: 3 + energy * 4 + bass * 3,
                wobbleAmp: 5 + Math.random() * 10,
                wobbleFreq: 0.01 + Math.random() * 0.02
              });
            }
            // 垂直射线（从上到下或从下到上）
            if (Math.random() < 0.5) {
              const startX = Math.random() * width;
              const startY = Math.random() < 0.5 ? -50 : height + 50;
              const endY = startY < 0 ? height + 50 : -50;
              laserRaysRef.current.push({
                type: 'vertical',
                startX, startY, endY,
                life: 1,
                baseAlpha: 0.4 + currentIntensity * 0.4,
                alpha: 0,
                speed: 3 + energy * 4 + bass * 3,
                wobbleAmp: 5 + Math.random() * 10,
                wobbleFreq: 0.01 + Math.random() * 0.02
              });
            }
          }
        }
        
        // 绘制所有射线
        laserRaysRef.current.forEach(ray => {
          if (ray.alpha <= 0) return;
          
          const wobble = Math.sin(time * ray.wobbleFreq) * ray.wobbleAmp;
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          
          if (ray.type === 'horizontal') {
            const y = ray.startY + wobble;
            const gradient = ctx.createLinearGradient(ray.startX < 0 ? 0 : width, y, ray.endX < 0 ? 0 : width, y);
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(0.2, `${colorPalette.accent}${Math.round(ray.alpha * 180).toString(16).padStart(2, '0')}`);
            gradient.addColorStop(0.5, `${colorPalette.secondary}${Math.round(ray.alpha * 255).toString(16).padStart(2, '0')}`);
            gradient.addColorStop(0.8, `${colorPalette.accent}${Math.round(ray.alpha * 180).toString(16).padStart(2, '0')}`);
            gradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.moveTo(ray.startX < 0 ? 0 : ray.startX, y);
            ctx.lineTo(ray.endX < 0 ? 0 : ray.endX, y);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 2 + currentIntensity * 3;
            ctx.lineCap = 'round';
            ctx.shadowColor = colorPalette.accent;
            ctx.shadowBlur = 20 + currentIntensity * 15;
            ctx.stroke();
          } else {
            const x = ray.startX + wobble;

        dream: { bg: '#0a0a18', bg2: '#1a1a3a', primary: '#8b5cf6', secondary: '#06b6d4', accent: '#f472b6', glow: '#c084fc', terrain: '#1e1b4b' },
        calm: { bg: '#0c0c18', bg2: '#141428', primary: '#6366f1', secondary: '#4f46e5', accent: '#94a3b8', glow: '#818cf8', terrain: '#1e1b4b' },
        warm: { bg: '#120a08', bg2: '#2a1a1a', primary: '#f97316', secondary: '#ef4444', accent: '#fbbf24', glow: '#fb923c', terrain: '#422006' },
        intense: { bg: '#0a0612', bg2: '#1a0a2a', primary: '#ec4899', secondary: '#a855f7', accent: '#f472b6', glow: '#f0abfc', terrain: '#3b0764' }
      };
      
      const getPalette = useCallback(() => {
        const { energy = 0, peak = 0, bass = 0, mid = 0, treble = 0 } = audioFeatures || {};
        const s = stateRef.current;
        if (s === 'climax' || peak > 0.8) return palettes.intense;
        if (s === 'burst' || bass > 0.6) return palettes.warm;
        if (s === 'pulse' || mid > 0.4) return palettes.dream;
        return palettes.calm;
      }, [audioFeatures]);
      
      const hexToRgb = (hex) => {
        const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return r ? `${parseInt(r[1], 16)}, ${parseInt(r[2], 16)}, ${parseInt(r[3], 16)}` : '0, 0, 0';
      };
      
      const lerp = (a, b, t) => a + (b - a) * t;
      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const isFiniteNum = (v) => typeof v === 'number' && Number.isFinite(v);
      
      const starsRef = useRef([]);
      const terrainRef = useRef([]);
      const ripplesRef = useRef([]);
      const particlesRef = useRef([]);
      const pulseRef = useRef({ r: 0, opacity: 0 });
      
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        
        const dpr = window.devicePixelRatio || 1;
        let rect = canvas.getBoundingClientRect();
        let w = rect.width;
        let h = rect.height;
        
        const resize = () => {
          rect = canvas.getBoundingClientRect();
          w = rect.width;
          h = rect.height;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.scale(dpr, dpr);
          
          const stars = [];
          for (let i = 0; i < 120; i++) {
            stars.push({
              x: Math.random() * w,
              y: Math.random() * h * 0.85,
              size: 0.4 + Math.random() * 1.2,
              speed: 0.02 + Math.random() * 0.05,
              phase: Math.random() * Math.PI * 2,
              depth: 0.3 + Math.random() * 0.7,
              opacity: 0.3 + Math.random() * 0.7
            });
          }
          starsRef.current = stars;
          
          const ridges = [];
          for (let i = 0; i < 4; i++) {
            const pts = [];
            const segs = 120;
            for (let j = 0; j <= segs; j++) {
              pts.push({ x: (j / segs) * w, y: h * (0.62 + i * 0.1) });
            }
            ridges.push({
              points: pts,
              baseY: h * (0.62 + i * 0.1),
              amp: 10 + i * 8,
              freq: 0.8 + i * 0.35,
              speed: 0.012 + i * 0.006,
              layer: i
            });
          }
          terrainRef.current = ridges;
          
          const particles = [];
          for (let i = 0; i < 80; i++) {
            particles.push({
              x: Math.random() * w,
              y: Math.random() * h,
              vy: -0.2 - Math.random() * 0.5,
              vx: (Math.random() - 0.5) * 0.15,
              size: 0.5 + Math.random() * 1.2,
              opacity: 0.2 + Math.random() * 0.5,
              phase: Math.random() * Math.PI * 2
            });
          }
          particlesRef.current = particles;
        };
        
        const ctx = canvas.getContext('2d');
        resize();
        
        const updateState = (intensity, peak, bass, mid, treble) => {
          const prev = stateRef.current;
          if (peak > 0.8) stateRef.current = 'climax';
          else if (bass > 0.6 && peak > 0.4) stateRef.current = 'burst';
          else if (bass > 0.35 || mid > 0.4) stateRef.current = 'pulse';
          else if (mid > 0.2 || treble > 0.25) stateRef.current = 'flow';
          else stateRef.current = 'calm';
          if (prev === 'climax' && intensity < 0.2) stateRef.current = 'decay';
        };
        
        const drawBg = (palette, intensity, bass, mid) => {
          const breath = 0.5 + 0.5 * Math.sin(timeRef.current * 0.0008);
          const slowBreath = 0.5 + 0.5 * Math.sin(timeRef.current * 0.0003);
          const bgIntensity = 0.3 + intensity * 0.5 + breath * 0.1;
          
          const grad = ctx.createRadialGradient(w * 0.5, h * 0.42, 0, w * 0.5, h * 0.42, Math.max(w, h) * 0.9);
          grad.addColorStop(0, `rgba(${hexToRgb(palette.bg2)}, ${bgIntensity * 0.5})`);
          grad.addColorStop(0.4, `rgba(${hexToRgb(palette.bg)}, 0.95)`);
          grad.addColorStop(1, palette.bg);
          
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);
          
          const nebula1 = ctx.createRadialGradient(w * 0.3, h * 0.28, 0, w * 0.3, h * 0.28, Math.max(w, h) * 0.55);
          nebula1.addColorStop(0, `rgba(${hexToRgb(palette.primary)}, ${0.08 + intensity * 0.06 + slowBreath * 0.03})`);
          nebula1.addColorStop(0.3, `rgba(${hexToRgb(palette.secondary)}, ${0.05 + intensity * 0.03})`);
          nebula1.addColorStop(0.6, `rgba(${hexToRgb(palette.glow)}, ${0.02 + intensity * 0.02})`);
          nebula1.addColorStop(1, 'transparent');
          ctx.fillStyle = nebula1;
          ctx.fillRect(0, 0, w, h);
          
          const nebula2 = ctx.createRadialGradient(w * 0.72, h * 0.35, 0, w * 0.72, h * 0.35, Math.max(w, h) * 0.45);
          nebula2.addColorStop(0, `rgba(${hexToRgb(palette.accent)}, ${0.06 + intensity * 0.04})`);
          nebula2.addColorStop(0.4, `rgba(${hexToRgb(palette.secondary)}, ${0.03 + intensity * 0.02})`);
          nebula2.addColorStop(1, 'transparent');
          ctx.fillStyle = nebula2;
          ctx.fillRect(0, 0, w, h);
          
          const nebula3 = ctx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.35);
          nebula3.addColorStop(0, `rgba(${hexToRgb(palette.glow)}, ${0.04 + intensity * 0.03 + breath * 0.02})`);
          nebula3.addColorStop(1, 'transparent');
          ctx.fillStyle = nebula3;
          ctx.fillRect(0, 0, w, h);
          
          starsRef.current.forEach(s => {
            const parallax = 1 - s.depth * 0.5;
            s.x -= s.speed * (1 + mid * 0.5) * parallax;
            if (s.x < -5) { s.x = w + 5; s.y = Math.random() * h * 0.82; }
            s.phase += 0.015 + s.depth * 0.01;
            const tw = 0.3 + Math.sin(s.phase) * 0.5 + Math.sin(s.phase * 2.3) * 0.2;
            const alpha = s.opacity * tw * (0.4 + intensity * 0.6);
            const sz = s.size * (0.6 + s.depth * 0.6);
            
            if (s.depth > 0.6) {
              const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sz * 3);
              glow.addColorStop(0, `rgba(255, 255, 255, ${alpha * 0.8})`);
              glow.addColorStop(0.3, `rgba(${hexToRgb(palette.glow)}, ${alpha * 0.3})`);
              glow.addColorStop(1, 'transparent');
              ctx.fillStyle = glow;
              ctx.beginPath();
              ctx.arc(s.x, s.y, sz * 3, 0, Math.PI * 2);
              ctx.fill();
            }
            
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
            ctx.fill();
          });
          
          const fogGrad = ctx.createLinearGradient(0, h * 0.45, 0, h);
          fogGrad.addColorStop(0, 'transparent');
          fogGrad.addColorStop(0.5, `rgba(${hexToRgb(palette.bg)}, ${0.4 + intensity * 0.2})`);
          fogGrad.addColorStop(1, palette.bg);
          ctx.fillStyle = fogGrad;
          ctx.fillRect(0, h * 0.45, w, h * 0.55);
          
          const topGlow = ctx.createLinearGradient(0, 0, 0, h * 0.3);
          topGlow.addColorStop(0, `rgba(${hexToRgb(palette.primary)}, ${0.03 + intensity * 0.02})`);
          topGlow.addColorStop(1, 'transparent');
          ctx.fillStyle = topGlow;
          ctx.fillRect(0, 0, w, h * 0.3);
        };
        
        const drawTerrain = (palette, intensity, bass, mid, treble, peak) => {
          const ridges = terrainRef.current;
          const colors = [palette.terrain, palette.secondary, palette.primary, palette.accent];
          
          for (let i = ridges.length - 1; i >= 0; i--) {
            const r = ridges[i];
            const pts = r.points;
            
            const bassLift = bass * (35 - i * 7);
            const midMod = mid * (1 + i * 0.25);
            const trebleMod = treble * (0.5 + i * 0.2);
            
            for (let j = 0; j < pts.length; j++) {
              const base = r.baseY - bassLift;
              const w1 = Math.sin(timeRef.current * r.speed + j * 0.025 * r.freq) * r.amp;
              const w2 = Math.sin(timeRef.current * r.speed * 1.7 + j * 0.04 * r.freq) * r.amp * 0.4;
              const midWave = Math.sin(timeRef.current * 0.002 + j * 0.06 + i) * 8 * midMod;
              const trebleDetail = Math.sin(timeRef.current * 0.008 + j * 0.15 + i * 2) * 3 * trebleMod;
              pts[j].y = base + w1 + w2 + midWave + trebleDetail;
            }
            
            const alpha = (0.12 + i * 0.1) * (0.5 + intensity * 0.7);
            const c = colors[i % colors.length];
            
            ctx.beginPath();
            ctx.moveTo(0, h);
            ctx.lineTo(pts[0].x, pts[0].y);
            for (let j = 1; j < pts.length; j++) {
              ctx.lineTo(pts[j].x, pts[j].y);
            }
            ctx.lineTo(w, h);
            ctx.closePath();
            
            const fillGrad = ctx.createLinearGradient(0, r.baseY - 80 - i * 20, 0, h);
            fillGrad.addColorStop(0, 'transparent');
            fillGrad.addColorStop(0.2 + i * 0.05, `rgba(${hexToRgb(c)}, ${alpha * 0.4})`);
            fillGrad.addColorStop(0.6, `rgba(${hexToRgb(palette.bg)}, ${alpha * 0.8})`);
            fillGrad.addColorStop(1, palette.bg);
            ctx.fillStyle = fillGrad;
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let j = 1; j < pts.length; j++) {
              ctx.lineTo(pts[j].x, pts[j].y);
            }
            ctx.strokeStyle = `rgba(${hexToRgb(palette.glow)}, ${alpha * 0.6 + i * 0.05})`;
            ctx.lineWidth = 1 + i * 0.2;
            ctx.shadowColor = palette.glow;
            ctx.shadowBlur = 4 + treble * 6 + peak * 10 + i * 2;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            if (i >= 2) {
              ctx.beginPath();
              ctx.moveTo(pts[0].x, pts[0].y + 2);
              for (let j = 1; j < pts.length; j++) {
                ctx.lineTo(pts[j].x, pts[j].y + 2);
              }
              ctx.strokeStyle = `rgba(${hexToRgb(palette.primary)}, ${alpha * 0.3})`;
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
        };
        
        const drawPulse = (palette, intensity, bass, peak, mid) => {
          const cx = w * 0.5;
          const cy = h * 0.42;
          const baseR = 45 + bass * 55;
          const breath = 0.5 + 0.5 * Math.sin(timeRef.current * 0.002);
          
          const pulse = pulseRef.current;
          pulse.r = lerp(pulse.r, baseR, 0.12);
          pulse.opacity = lerp(pulse.opacity, 0.2 + intensity * 0.25 + peak * 0.3, 0.08);
          
          if (peak > 0.5) {
            ripplesRef.current.push({
              x: cx, y: cy,
              r: pulse.r * 0.8,
              maxR: 180 + peak * 250,
              opacity: 0.5 + peak * 0.3,
              speed: 1.5 + peak * 2.5,
              width: 2 + peak * 2
            });
          }
          
          for (let i = ripplesRef.current.length - 1; i >= 0; i--) {
            const ripple = ripplesRef.current[i];
            ripple.r += ripple.speed;
            ripple.opacity *= 0.98;
            if (ripple.r > ripple.maxR || ripple.opacity < 0.015) {
              ripplesRef.current.splice(i, 1);
            }
          }
          
          ripplesRef.current.forEach(ripple => {
            const grad = ctx.createRadialGradient(ripple.x, ripple.y, ripple.r * 0.85, ripple.x, ripple.y, ripple.r);
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(0.4, `rgba(${hexToRgb(palette.glow)}, ${ripple.opacity * 0.4})`);
            grad.addColorStop(0.7, `rgba(${hexToRgb(palette.primary)}, ${ripple.opacity * 0.7})`);
            grad.addColorStop(1, `rgba(${hexToRgb(palette.accent)}, ${ripple.opacity})`);
            ctx.strokeStyle = grad;
            ctx.lineWidth = ripple.width;
            ctx.shadowColor = palette.glow;
            ctx.shadowBlur = 10 + peak * 15;
            ctx.beginPath();
            ctx.arc(ripple.x, ripple.y, ripple.r, 0, Math.PI * 2);
            ctx.stroke();
          });
          ctx.shadowBlur = 0;
          
          const outerGlow = ctx.createRadialGradient(cx, cy, pulse.r * 0.3, cx, cy, pulse.r * 1.8);
          outerGlow.addColorStop(0, `rgba(${hexToRgb(palette.glow)}, ${pulse.opacity * 0.3})`);
          outerGlow.addColorStop(0.4, `rgba(${hexToRgb(palette.primary)}, ${pulse.opacity * 0.15})`);
          outerGlow.addColorStop(1, 'transparent');
          ctx.fillStyle = outerGlow;
          ctx.beginPath();
          ctx.arc(cx, cy, pulse.r * 1.8, 0, Math.PI * 2);
          ctx.fill();
          
          for (let i = 4; i >= 0; i--) {
            const r = pulse.r * (0.5 + i * 0.28);
            const alpha = pulse.opacity * (0.9 - i * 0.15);
            const lineW = 2.5 - i * 0.4;
            
            const grad = ctx.createRadialGradient(cx, cy, r * 0.85, cx, cy, r);
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(0.5, `rgba(${hexToRgb(palette.glow)}, ${alpha * 0.5})`);
            grad.addColorStop(1, `rgba(${hexToRgb(palette.primary)}, ${alpha})`);
            
            ctx.strokeStyle = grad;
            ctx.lineWidth = lineW;
            ctx.shadowColor = palette.glow;
            ctx.shadowBlur = 12 + peak * 18;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.shadowBlur = 0;
          
          const ringCount = 3;
          for (let i = 0; i < ringCount; i++) {
            const angle = timeRef.current * (0.0008 + i * 0.0004) + i * Math.PI * 0.67;
            const orbitR = pulse.r * (0.9 + i * 0.3);
            const dotR = 2 + i * 1.5;
            const dotX = cx + Math.cos(angle) * orbitR;
            const dotY = cy + Math.sin(angle) * orbitR * 0.7;
            
            const dotGlow = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, dotR * 4);
            dotGlow.addColorStop(0, `rgba(${hexToRgb(palette.glow)}, ${pulse.opacity * 0.8})`);
            dotGlow.addColorStop(0.4, `rgba(${hexToRgb(palette.accent)}, ${pulse.opacity * 0.4})`);
            dotGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = dotGlow;
            ctx.beginPath();
            ctx.arc(dotX, dotY, dotR * 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = `rgba(255, 255, 255, ${pulse.opacity})`;
            ctx.beginPath();
            ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
            ctx.fill();
          }
          
          const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse.r * 0.6);
          coreGrad.addColorStop(0, `rgba(255, 255, 255, ${pulse.opacity * 0.9})`);
          coreGrad.addColorStop(0.15, `rgba(${hexToRgb(palette.glow)}, ${pulse.opacity * 0.8})`);
          coreGrad.addColorStop(0.4, `rgba(${hexToRgb(palette.primary)}, ${pulse.opacity * 0.5})`);
          coreGrad.addColorStop(0.7, `rgba(${hexToRgb(palette.secondary)}, ${pulse.opacity * 0.2})`);
          coreGrad.addColorStop(1, 'transparent');
          ctx.fillStyle = coreGrad;
          ctx.beginPath();
          ctx.arc(cx, cy, pulse.r * 0.6, 0, Math.PI * 2);
          ctx.fill();
          
          const innerRing = pulse.r * 0.35;
          ctx.strokeStyle = `rgba(255, 255, 255, ${pulse.opacity * 0.6 + breath * 0.2})`;
          ctx.lineWidth = 1;
          ctx.shadowColor = palette.glow;
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(cx, cy, innerRing, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowBlur = 0;
        };
        
        const drawParticles = (palette, intensity, bass, mid, treble, peak) => {
          const state = stateRef.current;
          const cx = w * 0.5;
          const cy = h * 0.42;
          
          particlesRef.current.forEach((p, i) => {
            if (state === 'calm') {
              p.vy = lerp(p.vy, -0.12 - Math.random() * 0.15, 0.04);
              p.vx = lerp(p.vx, (Math.random() - 0.5) * 0.08, 0.04);
            } else if (state === 'flow') {
              p.vy = lerp(p.vy, -0.35 - Math.random() * 0.25, 0.04);
              p.vx = lerp(p.vx, Math.sin(timeRef.current * 0.001 + i * 0.08) * 0.25, 0.04);
            } else if (state === 'pulse') {
              const dx = p.x - cx;
              const dy = p.y - cy;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist > 50) {
                p.vx += (dx / dist) * bass * 0.25;
                p.vy += (dy / dist) * bass * 0.15;
              }
              p.vx *= 0.97;
              p.vy *= 0.97;
            } else if (state === 'burst' || state === 'climax') {
              p.vx += (Math.random() - 0.5) * peak * 0.7;
              p.vy += (Math.random() - 0.5) * peak * 0.4;
              p.vy -= treble * 0.4;
            } else if (state === 'decay') {
              p.vy = lerp(p.vy, -0.08, 0.03);
              p.vx *= 0.985;
            }
            
            p.x += p.vx;
            p.y += p.vy;
            p.phase += 0.025;
            
            if (p.y < -15) {
              p.y = h + 15;
              p.x = Math.random() * w;
            }
            if (p.x < -15) p.x = w + 15;
            if (p.x > w + 15) p.x = -15;
            
            const flicker = 0.5 + Math.sin(p.phase) * 0.35 + Math.sin(p.phase * 1.7) * 0.15;
            const alpha = p.opacity * flicker * (0.4 + intensity * 0.6);
            const size = p.size * (0.8 + intensity * 0.4);
            
            if (size > 1) {
              const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size * 3);
              glow.addColorStop(0, `rgba(255, 255, 255, ${alpha * 0.7})`);
              glow.addColorStop(0.3, `rgba(${hexToRgb(palette.glow)}, ${alpha * 0.4})`);
              glow.addColorStop(1, 'transparent');
              ctx.fillStyle = glow;
              ctx.beginPath();
              ctx.arc(p.x, p.y, size * 3, 0, Math.PI * 2);
              ctx.fill();
            }
            
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size * 1.5);
            grad.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
            grad.addColorStop(0.5, `rgba(${hexToRgb(palette.glow)}, ${alpha * 0.6})`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
            ctx.fill();
          });
          
          if (peak > 0.6 && particlesRef.current.length < 160) {
            for (let i = 0; i < 2; i++) {
              const a = Math.random() * Math.PI * 2;
              particlesRef.current.push({
                x: cx + Math.cos(a) * 50,
                y: cy + Math.sin(a) * 35,
                vx: Math.cos(a) * (0.8 + peak * 1.8),
                vy: Math.sin(a) * (0.8 + peak * 1.5) - 0.8,
                size: 0.7 + Math.random() * 1.1,
                opacity: 0.5 + Math.random() * 0.5,
                phase: Math.random() * Math.PI * 2
              });
            }
          }
          
          while (particlesRef.current.length > 200) {
            particlesRef.current.shift();
          }
        };
        
        const animate = () => {
          timeRef.current += 16;
          
          if (w <= 0 || h <= 0) {
            animationRef.current = requestAnimationFrame(animate);
            return;
          }
          
          const { bass = 0, mid = 0, treble = 0, energy = 0, peak = 0 } = audioFeatures || {};
          const b = isFiniteNum(bass) ? bass : 0;
          const m = isFiniteNum(mid) ? mid : 0;
          const t = isFiniteNum(treble) ? treble : 0;
          const e = isFiniteNum(energy) ? energy : 0;
          const pk = isFiniteNum(peak) ? peak : 0;
          
          updateState(e, pk, b, m, t);
          
          const palette = getPalette();
          
          ctx.clearRect(0, 0, w, h);
          
          drawBg(palette, e, b, m);
          drawTerrain(palette, e, b, m, t, pk);
          drawPulse(palette, e, b, pk, m);
          drawParticles(palette, e, b, m, t, pk);
          
          if (isAwakening) {
            ctx.fillStyle = `rgba(5, 5, 10, ${1 - awakeningProgress})`;
            ctx.fillRect(0, 0, w, h);
          }
          if (isAfterglow) {
            ctx.fillStyle = `rgba(5, 5, 10, ${afterglowProgress * 0.5})`;
            ctx.fillRect(0, 0, w, h);
          }
          
          animationRef.current = requestAnimationFrame(animate);
        };
        
        animate();
        
        window.addEventListener('resize', resize);
        
        return () => {
          window.removeEventListener('resize', resize);
          if (animationRef.current) cancelAnimationFrame(animationRef.current);
        };
      }, [stage, audioFeatures, awakeningProgress, afterglowProgress, isAwakening, isAfterglow, getPalette]);
      
      return React.createElement('canvas', { ref: canvasRef, className: 'visual-canvas' });
    }

    function StatusPill(props) {
      const [isVisible, setIsVisible] = useState(true);
      const hideTimerRef = useRef(null);

    function CaptionOverlay(props) {
      const [displayText, setDisplayText] = useState('');
      const [progress, setProgress] = useState(0);
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        if (!props.caption) { setIsVisible(false); return; }
        setDisplayText(props.caption.text);
        setIsVisible(true); setProgress(0);
        const startTime = performance.now();
        const duration = props.caption.duration * 1000;
        const animate = (currentTime) => {
          const elapsed = currentTime - startTime;
          const p = Math.min(elapsed / duration, 1);
          setProgress(p);
          if (p < 1) requestAnimationFrame(animate);
          else setIsVisible(false);
        };
        requestAnimationFrame(animate);
        return () => setIsVisible(false);
      }, [props.caption]);

      if (!isVisible || !props.caption) return null;

      const fadeInDuration = 0.15;
      const fadeOutDuration = 0.2;
      let opacity = 1, blur = 0;

      if (progress < fadeInDuration) {
        const t = progress / fadeInDuration;
        opacity = easeOutCubic(t); blur = 16 * (1 - t);
      } else if (progress > 1 - fadeOutDuration) {
        const t = (progress - (1 - fadeOutDuration)) / fadeOutDuration;
        opacity = 1 - easeInCubic(t); blur = 18 * t;
      }

      if (props.stage === 'paused') opacity *= 0.7;
      if (props.stage === 'afterglow') opacity *= 0.9;

      const textSize = props.energy > 0.6 ? '28px' : props.energy > 0.3 ? '24px' : '20px';

      return React.createElement('div', { style: { position: 'fixed', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none', zIndex: 50 } },
        React.createElement('div', { style: {

          textAlign: 'center', maxWidth: '80%', lineHeight: 1.8, fontWeight: 300,
          fontSize: textSize, letterSpacing: props.caption.type === 'afterglow' ? 4 : 2,
          filter: `blur(${blur}px)`, opacity,
          textShadow: props.caption.type === 'afterglow'
            ? '0 0 60px rgba(139,92,246,0.6), 0 0 120px rgba(251,191,36,0.3)'
            : '0 0 40px rgba(139,92,246,0.5), 0 0 80px rgba(6,182,212,0.3)'
        } }, displayText)
      );
    }

    function App() {
      const [stage, setStage] = useState('idle');
      const [musicFile, setMusicFile] = useState(null);
      const [audioFeatures, setAudioFeatures] = useState(EMPTY_AUDIO_FEATURES);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [mood, setMood] = useState('dreamy');
      const [bpm, setBpm] = useState(120);
      const [visualStrategy, setVisualStrategy] = useState(DEFAULT_VISUAL_STRATEGY);
      const [caption, setCaption] = useState(null);
      const [awakeningProgress, setAwakeningProgress] = useState(0);
      const [afterglowProgress, setAfterglowProgress] = useState(0);
      const [afterglowPhrase, setAfterglowPhrase] = useState('');
      const [visualMode, setVisualMode] = useState('classic');
      
      // 播放列表状态
      const [playlist, setPlaylist] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isAutoPlayNext, setIsAutoPlayNext] = useState(true);

      const audioElementRef = useRef(null);
      const audioContextRef = useRef(null);
      const analyserRef = useRef(null);
      const animationRef = useRef(null);
      const analysisRef = useRef(null);
      const objectURLRef = useRef(null);
      const sourceRef = useRef(null);

      const analyzeOffline = async (audioBuffer) => {
        const rawData = audioBuffer.getChannelData(0);
        const samples = 1000;
        const blockSize = Math.floor(rawData.length / samples);
        let sum = 0;
        for (let i = 0; i < samples; i++) {
          let blockSum = 0;
          for (let j = 0; j < blockSize; j++) blockSum += Math.abs(rawData[i * blockSize + j]);
          sum += blockSum / blockSize;
        }
        const averageEnergy = Math.min(sum / samples, 1);

        let estimatedBpm = 120;
        const peakIntervals = [];
        let lastPeak = 0;
        for (let i = 100; i < rawData.length - 100; i += 50) {
          const current = Math.abs(rawData[i]);
          const prev = Math.abs(rawData[i - 50]);
          const next = Math.abs(rawData[i + 50]);
          if (current > prev && current > next && current > 0.1) {
            if (lastPeak > 0) peakIntervals.push((i - lastPeak) / audioBuffer.sampleRate);
            lastPeak = i;
          }
        }
        if (peakIntervals.length > 10) {
          const avgInterval = peakIntervals.reduce((a, b) => a + b, 0) / peakIntervals.length;
          estimatedBpm = Math.round(60 / avgInterval);
        }
        return { averageEnergy, estimatedBpm: Math.max(60, Math.min(200, estimatedBpm)) };
      };

      const startAudioAnalysis = useCallback(() => {
        if (!audioContextRef.current || !analyserRef.current) return;
        const analyser = analyserRef.current;
        const frequencyData = new Uint8Array(analyser.frequencyBinCount);
        const timeDomainData = new Uint8Array(analyser.frequencyBinCount);

        const analyze = () => {
          if (!analyserRef.current) return;
          analyser.getByteFrequencyData(frequencyData);
          analyser.getByteTimeDomainData(timeDomainData);

          const totalBins = frequencyData.length;
          const bassBins = Math.floor(totalBins * 0.15);
          const midBins = Math.floor(totalBins * 0.5);
          const trebleBins = totalBins - bassBins - midBins;

          let bassSum = 0, midSum = 0, trebleSum = 0, volumeSum = 0;
          for (let i = 0; i < bassBins; i++) bassSum += frequencyData[i];
          for (let i = bassBins; i < bassBins + midBins; i++) midSum += frequencyData[i];
          for (let i = bassBins + midBins; i < totalBins; i++) trebleSum += frequencyData[i];
          for (let i = 0; i < timeDomainData.length; i++) volumeSum += Math.abs(timeDomainData[i] - 128);

          const prev = audioFeatures;
          const smoothFactor = 0.15;
          const bass = prev.bass * (1 - smoothFactor) + (bassSum / bassBins / 255) * smoothFactor;
          const mid = prev.mid * (1 - smoothFactor) + (midSum / midBins / 255) * smoothFactor;
          const treble = prev.treble * (1 - smoothFactor) + (trebleSum / trebleBins / 255) * smoothFactor;
          const volume = prev.volume * (1 - smoothFactor) + (volumeSum / timeDomainData.length / 128) * smoothFactor;
          const energy = prev.energy * (1 - smoothFactor) + ((bass + mid + treble) / 3) * smoothFactor;

          setAudioFeatures({ bass, mid, treble, volume, energy, frequencyData: new Uint8Array(frequencyData), timeDomainData: new Uint8Array(timeDomainData) });
          analysisRef.current = requestAnimationFrame(analyze);
        };
        analyze();
      }, [audioFeatures]);

      const handleMusicSelect = useCallback(async (files) => {
        // 支持单文件或多文件
        const fileArray = Array.isArray(files) ? files : [files];
        if (fileArray.length === 0) return;

        setPlaylist(fileArray);
        setCurrentIndex(0);
        
        // 加载第一个文件
        await loadAndPlayTrack(fileArray[0], 0);
      }, []);

      const handleGenerateDemo = useCallback(async () => {
        // 清理之前的资源
        if (audioElementRef.current) {
          try {
            audioElementRef.current.pause();
            audioElementRef.current.onloadedmetadata = null;
            audioElementRef.current.onended = null;
            audioElementRef.current.ontimeupdate = null;
            audioElementRef.current.src = '';
