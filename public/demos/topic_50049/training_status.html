<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRA 训练进度监控</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 页面独有样式：容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 页面独有样式：主内容卡片 */
        .main-card {
            background: #FFFFFF;
            border: 1px solid #E4E9F2;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            padding: 40px;
        }
        /* 页面独有样式：大emoji图标 */
        .emoji { font-size: 48px; margin-bottom: 8px; }
        /* 页面独有样式：状态徽章 */
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 12px;
        }
        .status-running { background: #EDFFF5; color: #009E60; }
        .status-done { background: #EDFFF5; color: #009E60; }
        .status-stopped { background: #FFF2F2; color: #DB2C66; }
        /* 页面独有样式：进度区域 */
        .progress-section { margin-bottom: 28px; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #8F9BB3;
            font-weight: 500;
        }
        /* 页面独有样式：统计网格（2列） */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #FFFFFF;
            border: 1px solid #E4E9F2;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #3366FF;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 12px;
            color: #8F9BB3;
        }
        /* 页面独有样式：日志区域 */
        .log-section {
            border-radius: 12px;
        }
        /* 页面独有样式：最后一条日志绿色高亮 */
        .log-line:last-child { opacity: 1; color: #009E60; }
        /* 页面独有样式：刷新提示 */
        .refresh-hint {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #8F9BB3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">

        <div class="header">
            <div class="emoji">🏋️</div>
            <h1>LoRA 训练进度</h1>
            <p>bert-base-chinese · 131,693 条数据 · 2 epochs</p>
            <span id="statusBadge" class="status-badge status-running">训练中...</span>
        </div>

        <div class="progress-section">
            <div class="progress-label">
                <span>训练进度</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div id="currentStep" class="stat-value">-</div>
                <div class="stat-label">当前步数</div>
            </div>
            <div class="stat-card">
                <div id="totalSteps" class="stat-value">26,340</div>
                <div class="stat-label">总步数</div>
            </div>
            <div class="stat-card">
                <div id="speedVal" class="stat-value">-</div>
                <div class="stat-label">速度 (it/s)</div>
            </div>
            <div class="stat-card">
                <div id="remainVal" class="stat-value">-</div>
                <div class="stat-label">预计剩余</div>
            </div>
        </div>

        <div class="log-section" id="logBox">
            <div class="log-line">等待训练数据...</div>
        </div>

        <div class="refresh-hint">每 3 秒自动刷新</div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const r = await fetch('train_status.json', {cache: 'no-cache'});
                if (!r.ok) throw new Error('no status');
                return await r.json();
            } catch(e) {
                return null;
            }
        }

        function formatTime(timeStr) {
            if (!timeStr) return '-';
            const parts = timeStr.split(':');
            if (parts.length === 3) {
                return `${parts[0]}小时${parts[1]}分`;
            } else if (parts.length === 2) {
                return `${parts[0]}分${parts[1]}秒`;
            }
            return timeStr;
        }

        async function updateUI() {
            const data = await fetchStatus();
            const logBox = document.getElementById('logBox');

            if (!data || !data.running) {
                document.getElementById('statusBadge').textContent = '等待中...';
                document.getElementById('statusBadge').className = 'status-badge status-stopped';
                logBox.innerHTML = '<div class="log-line">等待训练开始...</div>';
                return;
            }

            const pct = data.percent || 0;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = pct + '%';
            document.getElementById('currentStep').textContent = data.current_step?.toLocaleString() || '-';
            document.getElementById('speedVal').textContent = data.speed?.toFixed(2) || '-';
            document.getElementById('remainVal').textContent = formatTime(data.remaining);

            if (pct >= 100) {
                document.getElementById('statusBadge').textContent = '训练完成！';
                document.getElementById('statusBadge').className = 'status-badge status-done';
            } else {
                document.getElementById('statusBadge').textContent = '训练中...';
                document.getElementById('statusBadge').className = 'status-badge status-running';
            }

            const lines = [
                `Step: ${data.current_step}/${data.total_steps}`,
                `进度: ${pct}%`,
                `速度: ${data.speed?.toFixed(2)} it/s`,
                `已用: ${data.elapsed} | 剩余: ${data.remaining}`,
                `更新时间: ${data.timestamp?.split('T')[1]?.split('.')[0] || '-'}`,
            ];
            logBox.innerHTML = lines.map(l => `<div class="log-line">${l}</div>`).join('');
        }

        updateUI();
        setInterval(updateUI, 3000);
    </script>
</div>
</body>
</html>
