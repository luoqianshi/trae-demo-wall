<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmoMind - 智能情绪分析系统</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg, #F7F9FC);
        }
        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .top-nav {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            height: 44px;
            flex-wrap: nowrap;
            background: #fff;
            border-bottom: 1px solid var(--card-border, #E4E9F2);
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            padding: 0 20px;
            flex-shrink: 0;
            z-index: 100;
        }
        .top-nav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            line-height: 36px;
            padding: 0 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary, #8F9BB3);
            background: transparent;
            transition: all 0.2s;
            border: 1px solid transparent;
            white-space: nowrap;
            cursor: pointer;
        }
        .top-nav a:hover {
            color: var(--primary, #3366FF);
            background: var(--primary-100, #E6F0FF);
        }
        .top-nav a.active {
            background: var(--primary, #3366FF);
            color: #fff;
            border-color: var(--primary, #3366FF);
        }
        .content-frame {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
            background: var(--bg, #F7F9FC);
        }
        @media(max-width: 600px) {
            .top-nav { height: 40px; padding: 0 8px; gap: 4px; }
            .top-nav a { height: 32px; line-height: 32px; padding: 0 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="top-nav">
            <a href="#" data-page="emotion-mind-intro.html">💡 项目简介</a>
            <a href="#" data-page="emotion_classifier.html" class="active">🏠 情绪分类</a>
            <a href="#" data-page="knowledge_base.html">📚 知识库</a>
            <a href="#" data-page="training_status.html">🏋️ 训练进度</a>
        </div>
        <iframe id="contentFrame" class="content-frame" src="emotion_classifier.html"></iframe>
    </div>
    <script>
        const frame = document.getElementById('contentFrame');
        const links = document.querySelectorAll('.top-nav a');
        links.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = link.dataset.page;
                if (page) {
                    frame.src = page;
                    links.forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                }
            });
        });
        // 监听 iframe 内页面跳转（如从子页面点击链接）
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'navigate') {
                const target = e.data.page;
                frame.src = target;
                links.forEach(l => {
                    l.classList.toggle('active', l.dataset.page === target);
                });
            }
        });
    </script>
</body>
</html>
