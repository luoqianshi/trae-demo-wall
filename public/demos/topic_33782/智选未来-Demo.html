<head>
<meta charset="UTF-8">

<style>
:root {
  --primary: #2563eb; --primary-light: #dbeafe; --primary-dark: #1e40af;
  --accent: #f59e0b; --accent-light: #fef3c7;
  --success: #10b981; --success-light: #d1fae5;
  --warning: #f97316; --warning-light: #fff7ed;
  --danger: #ef4444; --danger-light: #fee2e2;
  --bg: #f1f5f9; --card: #fff; --text: #1e293b; --text-2: #64748b;
  --border: #e2e8f0; --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.08);
  --radius: 14px; --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  display: flex; justify-content: center; align-items: flex-start; min-height: 100vh;
}

/* App Container */
.app {
  width: 100%; max-width: 480px; min-height: 100vh;
  background: #fff; display: flex; flex-direction: column;
  box-shadow: 0 0 40px rgba(0,0,0,.08); position: relative; overflow: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 60%, #3b82f6 100%);
  color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.header .logo { width: 36px; height: 36px; background: rgba(255,255,255,.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.header .title { font-size: 16px; font-weight: 700; }
.header .sub { font-size: 11px; opacity: .75; }
.header .badge { margin-left: auto; background: #10b981; font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; }

/* Chat Area */
.chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; padding-bottom: 100px; }

/* Welcome Card */
.welcome { background: linear-gradient(135deg, #eff6ff, #f0f9ff); border-radius: var(--radius); padding: 24px; text-align: center; border: 1px solid #bfdbfe; }
.welcome .w-icon { font-size: 48px; margin-bottom: 12px; }
.welcome h2 { font-size: 20px; color: var(--primary-dark); margin-bottom: 6px; }
.welcome p { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 16px; }
.welcome .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.welcome .quick-btn {
  background: #fff; border: 1px solid #bfdbfe; padding: 10px 16px;
  border-radius: 20px; font-size: 13px; cursor: pointer; color: var(--primary-dark);
  transition: all .2s; white-space: nowrap;
}
.welcome .quick-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Bot Message */
.msg { display: flex; gap: 10px; animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg .avatar {
  width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.msg .avatar.bot { background: var(--primary-light); }
.msg .avatar.user { background: #e0e7ff; }
.msg .bubble {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px 16px; max-width: 85%; font-size: 14px; line-height: 1.7;
  box-shadow: var(--shadow);
}
.msg .bubble p { margin-bottom: 8px; }
.msg .bubble p:last-child { margin-bottom: 0; }

/* User Message */
.msg.user { flex-direction: row-reverse; }
.msg.user .bubble { background: var(--primary); color: #fff; border: none; }

/* Typing */
.typing { display: flex; gap: 6px; padding: 4px 0; }
.typing span { width: 7px; height: 7px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

/* Form Card */
.form-card { background: #f8fafc; border-radius: var(--radius-sm); padding: 18px; border: 1px dashed var(--border); }
.form-card h4 { font-size: 14px; margin-bottom: 12px; color: var(--primary-dark); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-row.single { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 12px; color: var(--text-2); font-weight: 600; }
.form-group input, .form-group select {
  padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; font-family: inherit; outline: none; transition: border .2s;
  background: #fff;
}
.form-group input:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.form-card .submit-btn {
  width: 100%; padding: 12px; background: var(--primary); color: #fff;
  border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all .2s; margin-top: 6px;
}
.form-card .submit-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
.form-card .submit-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

/* Result Cards */
.result-card {
  background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border);
  padding: 16px; box-shadow: var(--shadow);
}
.result-card .tier-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.tier-badge {
  font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 14px; white-space: nowrap;
}
.tier-badge.charge { background: #fee2e2; color: #dc2626; }
.tier-badge.stable { background: #fef3c7; color: #d97706; }
.tier-badge.safe { background: #d1fae5; color: #059669; }
.tier-name { font-size: 15px; font-weight: 700; }
.tier-count { margin-left: auto; font-size: 12px; color: var(--text-2); }

.school-item {
  display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f1f5f9; cursor: pointer;
  transition: background .2s; border-radius: 8px; padding: 12px;
}
.school-item:hover { background: #f8fafc; }
.school-item:last-child { border-bottom: none; }
.school-item .rank {
  width: 32px; height: 32px; border-radius: 50%; background: #f1f5f9;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  font-weight: 700; flex-shrink: 0; color: var(--text-2);
}
.school-item .info { flex: 1; min-width: 0; }
.school-item .info .sname { font-size: 14px; font-weight: 600; color: var(--text); }
.school-item .info .smajor { font-size: 12px; color: var(--primary); margin-top: 2px; }
.school-item .info .sdetail { font-size: 11px; color: var(--text-2); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 8px; }
.school-item .prob {
  text-align: right; flex-shrink: 0;
}
.school-item .prob .pct { font-size: 20px; font-weight: 700; }
.school-item .prob .pct.high { color: #059669; }
.school-item .prob .pct.mid { color: #d97706; }
.school-item .prob .pct.low { color: #dc2626; }
.school-item .prob .plabel { font-size: 11px; color: var(--text-2); }
.prob-bar { width: 60px; height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 4px; overflow: hidden; }
.prob-bar .fill { height: 100%; border-radius: 2px; transition: width .8s ease; }
.prob-bar .fill.high { background: #10b981; }
.prob-bar .fill.mid { background: #f59e0b; }
.prob-bar .fill.low { background: #ef4444; }

/* Risk Panel */
.risk-panel { background: linear-gradient(135deg, #fff7ed, #fffbeb); border-radius: var(--radius-sm); padding: 18px; border: 1px solid #fed7aa; }
.risk-panel h4 { font-size: 14px; color: #c2410c; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.risk-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #fed7aa; font-size: 13px; }
.risk-item:last-child { border-bottom: none; }
.risk-item .status { font-weight: 600; font-size: 12px; padding: 2px 8px; border-radius: 10px; }
.risk-item .status.ok { background: #d1fae5; color: #059669; }
.risk-item .status.warn { background: #fef3c7; color: #d97706; }
.risk-item .status.danger { background: #fee2e2; color: #dc2626; }

/* Analysis Card */
.analysis-card { background: #f0f9ff; border-radius: var(--radius-sm); padding: 16px; border: 1px solid #bae6fd; }
.analysis-card h4 { font-size: 14px; color: #0369a1; margin-bottom: 8px; }
.analysis-card p { font-size: 13px; color: #0c4a6e; line-height: 1.7; }

/* Detail Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 200; justify-content: center; align-items: flex-end; }
.modal-overlay.active { display: flex; }
.modal {
  background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
  max-height: 70vh; overflow-y: auto; padding: 24px 20px; animation: slideUp .3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal .close { float: right; background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; }
.modal h3 { font-size: 18px; margin-bottom: 4px; }
.modal .m-sub { font-size: 13px; color: var(--primary); margin-bottom: 16px; }
.modal .m-section { margin-bottom: 16px; }
.modal .m-section h5 { font-size: 13px; color: var(--text-2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.modal .m-section p, .modal .m-section li { font-size: 13px; color: var(--text); line-height: 1.7; }
.modal .m-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.modal .m-tags span { background: #f1f5f9; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: var(--text-2); }

/* Input Area */
.input-area {
  position: sticky; bottom: 0; background: #fff; padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; z-index: 100;
}
.input-area input {
  flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 24px;
  font-size: 14px; outline: none; font-family: inherit;
}
.input-area input:focus { border-color: var(--primary); }
.input-area button {
  width: 44px; height: 44px; border-radius: 50%; background: var(--primary);
  border: none; color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0;
  transition: all .2s;
}
.input-area button:hover { background: var(--primary-dark); }
.input-area button:disabled { background: #94a3b8; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 300;
  background: #1e293b; color: #fff; padding: 10px 24px; border-radius: 20px;
  font-size: 13px; animation: toastIn .3s ease; pointer-events: none;

@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* Scrollbar */
.chat::-webkit-scrollbar { width: 4px; }
.chat::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

/* Responsive */
@media (min-width: 768px) {
  .app { max-width: 520px; margin: 20px auto; border-radius: 20px; min-height: calc(100vh - 40px); box-shadow: 0 20px 60px rgba(0,0,0,.12); }
}
</style>

// ============ HELPERS ============
function getData(province, subject) {
  if (schoolDB[province] && schoolDB[province][subject]) return schoolDB[province][subject];
  return defaultData;
}

function updateProvinceSelect() {
  const sel = document.getElementById('province');
  const provinces = Object.keys(schoolDB);
  // Keep existing options that are in schoolDB
  for (let opt of sel.options) {
    if (opt.value && !provinces.includes(opt.value)) {
      opt.style.display = 'none';
    } else {
      opt.style.display = '';
    }
  }
}

function addBotMsg(html) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<div class="avatar bot">🤖</div><div class="bubble">${html}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMsg(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar user">👤</div><div class="bubble">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg';
  div.id = 'typingMsg';
  div.innerHTML = `<div class="avatar bot">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function probClass(p) {
  if (p >= 80) return 'high';
  if (p >= 40) return 'mid';
  return 'low';
}

function probText(p) {
  if (p >= 90) return '极高';
  if (p >= 70) return '较高';
  if (p >= 40) return '中等';
  return '较低';
}

// ============ SUBMIT ============
function submitForm() {
  const province = document.getElementById('province').value;
  const subject = document.getElementById('subject').value;
  const score = document.getElementById('score').value;
  const rank = document.getElementById('rank').value;
  const interests = document.getElementById('interests').selectedOptions;
  const interestsArr = Array.from(interests).map(o => o.value);

  if (!province || !subject || !score || !rank) {
    showToast('请填写完整的省份、选科、分数和排位信息');
    return;
  }

  userData = { province, subject, score: parseInt(score), rank: parseInt(rank), interests: interestsArr };

  // Hide form
  document.getElementById('formCard').style.display = 'none';

  // User message
  let userMsg = `我是${province}${subject}考生，高考${score}分，全省排位${rank}名`;
  if (interestsArr.length > 0) userMsg += `，对${interestsArr.join('、')}感兴趣`;
  userMsg += '，请帮我推荐志愿方案！';
  addUserMsg(userMsg);

  // Typing
  addTyping();

  // Simulate AI response
  setTimeout(() => {
    removeTyping();
    showResults(userData);
  }, 2000);
}

function sendMsg() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addUserMsg(text);

  // Check if it's a detail query
  if (text.includes('详情') || text.includes('更多') || text.includes('介绍')) {
    showToast('请点击院校卡片查看详细信息');
  } else if (userData) {
    addTyping();
    setTimeout(() => {
      removeTyping();
      showResults(userData);
    }, 1500);
  } else {
    addTyping();
    setTimeout(() => {
      removeTyping();
      addBotMsg('<p>请先在上方填写你的高考信息（省份、选科、分数、排位），然后点击"开始智能分析"按钮，我会为你生成个性化的志愿方案！</p>');
    }, 1000);
  }
}

// ============ SHOW RESULTS ============
function showResults(data) {
  const chat = document.getElementById('chat');
  const d = getData(data.province, data.subject);

  // Analysis
  let rankPercent = '';
  if (data.rank <= 10000) rankPercent = '前1%';
  else if (data.rank <= 30000) rankPercent = '前3%';
  else if (data.rank <= 80000) rankPercent = '前8%';
  else rankPercent = '中上水平';

  let html = '';

  // Analysis card
  html += `<div class="analysis-card">`;
  html += `<h4>📊 位次分析</h4>`;
  html += `<p>你是 <strong>${data.province}${data.subject}</strong> 考生，全省排位 <strong>${data.rank.toLocaleString()} 名</strong>，处于全省 <strong>${rankPercent}</strong>，竞争力`;
  if (data.rank <= 10000) html += `非常强！可以大胆冲刺985/211名校。</p>`;
  else if (data.rank <= 30000) html += `很强，有较大机会冲击985/211院校。</p>`;
  else if (data.rank <= 80000) html += `不错，可以冲击部分211院校和优质省重点。</p>`;
  else html += `良好，建议重点考虑省重点院校和特色专业。</p>`;

  if (data.interests.length > 0) {
    html += `<p>结合你对 <strong>${data.interests.join('、')}</strong> 的兴趣偏好，我为你推荐以下方案：</p>`;
  }
  html += `</div>`;

  // Charge tier
  html += buildTier('charge', d.charge, data.rank);
  // Stable tier
  html += buildTier('stable', d.stable, data.rank);
  // Safe tier
  html += buildTier('safe', d.safe, data.rank);

  // Risk panel
  html += buildRiskPanel(data, d);

  // Final advice
  html += `<div class="analysis-card" style="margin-top:0;">`;
  html += `<h4>💡 智选建议</h4>`;
  html += `<p>1. <strong>冲刺档</strong>建议选择 2-3 所最心仪的院校，大胆填报不要怕，万一捡漏了呢！</p>`;
  html += `<p>2. <strong>稳妥档</strong>是主战场，建议填报 5-6 所，覆盖不同城市和层次，确保有学上、上好学。</p>`;
  html += `<p>3. <strong>保底档</strong>填报 2-3 所即可，确保万无一失。注意保底院校也应该是你能接受的，不要随便填。</p>`;
  html += `<p>4. 点击每所院校卡片可查看 <strong>详细信息</strong>（专业介绍、就业前景、薪资水平等）。</p>`;
  html += `</div>`;

  addBotMsg(html);
}

function buildTier(tier, schools, userRank) {
  const labels = { charge: ['🚀 冲刺档', 'charge', '录取概率较低，需要一定运气'], stable: ['✅ 稳妥档', 'stable', '录取概率较高，是主战场'], safe: ['🛡️ 保底档', 'safe', '录取概率极高，确保有学上'] };
  const [title, cls, desc] = labels[tier];

  let html = `<div class="result-card">`;
  html += `<div class="tier-header"><span class="tier-badge ${cls}">${title.split(' ')[0]} ${title.split(' ')[1]}</span><span class="tier-name">${title.split(' ').slice(1).join(' ')}</span><span class="tier-count">${schools.length} 所推荐</span></div>`;
  html += `<p style="font-size:12px;color:var(--text-2);margin-bottom:10px;">${desc}</p>`;

  schools.forEach((s, i) => {
    // Adjust prob based on user rank difference
    let prob = s.prob;
    const rankDiff = (s.rank - userRank) / s.rank;
    if (userRank < s.rank) prob = Math.min(99, prob + Math.round(Math.abs(rankDiff) * 30));
    else prob = Math.max(5, prob - Math.round(Math.abs(rankDiff) * 25));

    const pc = probClass(prob);
    html += `<div class="school-item" onclick="showDetail('${s.name.replace(/'/g,"\\'")}','${s.major.replace(/'/g,"\\'")}','${s.location.replace(/'/g,"\\'")}','${s.type.replace(/'/g,"\\'")}','${s.employ.replace(/'/g,"\\'")}','${s.salary.replace(/'/g,"\\'")}','${(s.desc||'').replace(/'/g,"\\'")}')">`;
    html += `<div class="rank">${i+1}</div>`;
    html += `<div class="info"><div class="sname">${s.name}</div><div class="smajor">${s.major}</div><div class="sdetail"><span>📍${s.location}</span><span>🏷️${s.type}</span></div></div>`;
    html += `<div class="prob"><div class="pct ${pc}">${prob}%</div><div class="plabel">录取概率</div><div class="prob-bar"><div class="fill ${pc}" style="width:${prob}%"></div></div></div>`;
    html += `</div>`;
  });

  html += `</div>`;
  return html;
}

function buildRiskPanel(data, d) {
  let html = `<div class="risk-panel">`;
  html += `<h4>⚠️ 志愿方案风险评估</h4>`;

  const allSchools = [...d.charge, ...d.stable, ...d.safe];
  const minRank = Math.min(...allSchools.map(s => s.rank));
  const maxRank = Math.max(...allSchools.map(s => s.rank));
  const gradient = (maxRank - minRank) / minRank;

  // Risk items
  const risks = [
    { label: '梯度合理性', value: gradient > 2 ? '合理' : '偏窄', status: gradient > 2 ? 'ok' : 'warn' },
    { label: '冲刺档数量', value: d.charge.length >= 3 ? '充足' : '偏少', status: d.charge.length >= 3 ? 'ok' : 'warn' },
    { label: '稳妥档覆盖', value: d.stable.length >= 4 ? '充分' : '一般', status: d.stable.length >= 4 ? 'ok' : 'warn' },
    { label: '保底档安全', value: d.safe.length >= 2 ? '安全' : '不足', status: d.safe.length >= 2 ? 'ok' : 'danger' },
    { label: '退档风险评估', value: '低风险', status: 'ok' },
    { label: '批次遗漏检测', value: '未检测到遗漏', status: 'ok' },
  ];

  risks.forEach(r => {
    html += `<div class="risk-item"><span>${r.label}</span><span class="status ${r.status}">${r.value}</span></div>`;
  });

  html += `<p style="font-size:12px;color:#c2410c;margin-top:10px;">💡 提示：建议在正式填报前，再次核对目标院校的招生章程，确认是否有单科成绩、体检等特殊要求。</p>`;
  html += `</div>`;
  return html;
}
