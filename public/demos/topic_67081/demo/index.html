<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易愈 · 陪伴一位卦中人</title>
<style>
/* ===== 全局重置与深色水墨风 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-deep: #0a0a14;
  --bg-card: #14142b;
  --bg-card-2: #1a1a35;
  --border: #2a2a4a;
  --text: #d4d4e8;
  --text-dim: #8888aa;
  --ink: #6b8afd;
  --emotion: #4ec9b0;
  --health: #dcdcaa;
  --crisis: #f44747;
  --dark-line: rgba(120, 120, 150, 0.12);
}
html, body {
  height: 100%;
  background: var(--bg-deep);
  color: var(--text);
  font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
  font-size: 15px;
  line-height: 1.6;
  overflow: hidden;
}
body {
  background: radial-gradient(ellipse at top, #1a1a35 0%, var(--bg-deep) 70%);
}

/* ===== 主容器 ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 720px;
  margin: 0 auto;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ===== 顶部栏 ===== */
header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
header .title {
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
}
header .title .sub {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: normal;
  margin-left: 8px;
}
header .controls {
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--bg-card-2);
  color: var(--text);
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.btn:hover { border-color: var(--ink); }
.btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.btn-crisis { color: var(--crisis); border-color: var(--crisis); }
.btn-crisis:hover { background: var(--crisis); color: #fff; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 模式徽章（C-mode3） */
.mode-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  margin-left: 8px;
  font-weight: normal;
  letter-spacing: 0;
}
.mode-badge.llm { background: rgba(78, 201, 176, 0.15); color: var(--emotion); border-color: var(--emotion); }
.mode-badge.rule { background: rgba(220, 220, 170, 0.15); color: var(--health); border-color: var(--health); }
.mode-badge.detecting { background: rgba(136, 136, 170, 0.15); color: var(--text-dim); }

/* ===== 角色构建区（v2 新增） ===== */
.char-builder {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}
.char-builder textarea {
  width: 100%;
  min-height: 60px;
  padding: 8px 12px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
}
.char-builder textarea:focus { outline: none; border-color: var(--ink); }
.char-builder textarea::placeholder { color: var(--text-dim); }
.char-builder-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.char-builder-status {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-dim);
}
.char-builder-status.loading { color: var(--ink); }
.char-builder-status.error { color: var(--crisis); }
.char-builder-status.success { color: var(--emotion); }

/* ===== 角色信息区 ===== */
.char-info {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}
.char-info .name {
  font-size: 15px;
  font-weight: bold;
}
.char-info .meta {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.char-info .traits {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  line-height: 1.4;
}
/* v3: 恶化等级间接信号（氛围词，随等级变色，不暴露隐藏画像） */
.char-info .signal {
  font-size: 11px;
  margin-top: 4px;
  letter-spacing: 1px;
  color: var(--text-dim);
  transition: color 0.4s ease;
}
.char-info .signal.det-1 { color: #b08530; }
.char-info .signal.det-2 { color: #b05030; }
.char-info .signal.det-3 { color: #8a3030; }

/* ===== 阶段指示器 ===== */
.stage-bar {
  display: flex;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
  gap: 4px;
}
.stage-dot {
  flex: 1;
  text-align: center;
  font-size: 11px;
  padding: 4px 2px;
  border-radius: 3px;
  color: var(--text-dim);
  border: 1px solid transparent;
  transition: all 0.3s;
}
.stage-dot.done { color: var(--emotion); }
.stage-dot.current {
  color: var(--ink);
  border-color: var(--ink);
  background: rgba(107, 138, 253, 0.1);
  font-weight: bold;
}

/* ===== 数值条 ===== */
.values {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}
.value-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.value-row:last-child { margin-bottom: 0; }
.value-label {
  font-size: 12px;
  width: 60px;
  flex-shrink: 0;
}
.value-bar-bg {
  flex: 1;
  height: 14px;
  background: var(--bg-deep);
  border-radius: 7px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.value-bar-fill {
  height: 100%;
  border-radius: 7px;
  transition: width 0.4s ease;
}
.value-bar-fill.emotion { background: linear-gradient(90deg, #2d8d75, var(--emotion)); }
.value-bar-fill.health { background: linear-gradient(90deg, #8a8a55, var(--health)); }
.value-num {
  font-size: 12px;
  width: 36px;
  text-align: right;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ===== 对话区 ===== */
#dialog {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#dialog::-webkit-scrollbar { width: 6px; }
#dialog::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg {
  max-width: 78%;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  word-break: break-word;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.laochen {
  align-self: flex-start;
  background: var(--bg-card-2);
  border: 1px solid var(--border);
  border-top-left-radius: 2px;
}
.msg.user {
  align-self: flex-end;
  background: rgba(107, 138, 253, 0.15);
  border: 1px solid rgba(107, 138, 253, 0.3);
  border-top-right-radius: 2px;
}
.msg.system {
  align-self: center;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  border: 1px dashed var(--border);
  border-radius: 4px;
  max-width: 90%;
  text-align: center;
}

/* 暗爻：几乎看不见的"…" */
.dark-line {
  align-self: center;
  color: var(--dark-line);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 12px;
  user-select: none;
  transition: color 0.5s;
  animation: breathe 4s ease-in-out infinite;
}
.dark-line:hover { color: rgba(120, 120, 150, 0.3); }
@keyframes breathe { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* 冷却提示 */
.cooldown-hint {
  align-self: center;
  font-size: 12px;
  color: var(--text-dim);
  padding: 4px 10px;
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
}

/* 敷衍/重复提示（v2 新增） */
.perfunctory-hint {
  align-self: center;
  font-size: 12px;
  color: var(--crisis);
  padding: 4px 12px;
  background: rgba(244, 71, 71, 0.1);
  border: 1px solid rgba(244, 71, 71, 0.3);
  border-radius: 12px;
  margin: 4px 0;
  animation: fadeIn 0.3s ease;
}

/* ===== 输入区 ===== */
.input-area {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
#input {
  flex: 1;
  padding: 8px 12px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}
#input:focus { outline: none; border-color: var(--ink); }
#input::placeholder { color: var(--text-dim); }
#input:disabled { opacity: 0.5; }
#sendBtn {
  padding: 8px 20px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
}
#sendBtn:hover { opacity: 0.9; }
#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
.action-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
#coldBtn {
  padding: 5px 12px;
  font-size: 12px;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
}
#coldBtn:hover { color: var(--text); }
#coldBtn:disabled { opacity: 0.4; cursor: not-allowed; }
.crisis-link {
  margin-left: auto;
  font-size: 12px;
  color: var(--crisis);
  cursor: pointer;
  text-decoration: underline;
}

/* ===== 弹窗 ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}
.modal h2 {
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 1px;
}
.modal .body {
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: 20px;
  text-align: left;
}
.modal .body p { margin-bottom: 10px; }
.modal .hotline {
  font-size: 20px;
  font-weight: bold;
  color: var(--crisis);
  letter-spacing: 1px;
}
.modal .btn { margin-top: 8px; }
.modal.crisis { border-color: var(--crisis); }
.modal.reveal { border-color: var(--ink); }
.modal.reveal .body { color: var(--text); }
.modal.reveal .highlight { color: var(--ink); font-weight: bold; font-size: 16px; }
</style>
</head>
<body>
<div id="app">
  <!-- 顶部栏 -->
  <header>
    <div class="title">易愈<span class="sub">陪伴一位卦中人</span><span class="mode-badge detecting" id="modeBadge">检测中</span><span id="rhythmBadge" class="mode-badge" style="margin-left:8px; display:none;"></span></div>
    <div class="controls">
      <button class="btn active" id="compressBtn" title="压缩模式：冷却3秒，便于演示">压缩模式</button>
      <button class="btn" id="restartBtn">重新开始</button>
    </div>
  </header>

  <!-- 角色构建区（v2 新增，LLM 模式下显示） -->
  <div class="char-builder" id="charBuilder" style="display:none;">
    <textarea id="charDesc" placeholder="描述一个人的生活方式和状态（如：45岁工厂夜班，话少，熬夜，逃避社交）。系统将联网搜索权威资料，基于共性特征构建角色档案。"></textarea>
    <div class="char-builder-actions">
      <button class="btn" id="buildBtn">构建角色</button>
      <button class="btn" id="useDefaultBtn">使用默认角色</button>
      <button class="btn" id="assessBtn">推断画像</button>
    </div>
    <div class="char-builder-status" id="buildStatus"></div>
    <div id="portraitPanel" style="display:none; margin-top:12px; padding:12px; border:1px solid #444; border-radius:8px;">
      <div id="portraitContent"></div>
      <button class="btn" id="startWithPortrait" style="margin-top:8px;">开始陪伴</button>
    </div>
    <div id="archetypePicker" style="display:none; margin-top:12px;">
      <p style="opacity:0.7; font-size:0.9em;">画像不太清晰？可手动选择原型：</p>
      <div id="archetypeCards" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;"></div>
    </div>
  </div>

  <!-- 角色信息 -->
  <div class="char-info" id="charInfo">
    <div class="name" id="charName">老陈</div>
    <div class="meta" id="charMeta">行为倾向：回避·孤僻型 · 45岁 · 工厂夜班 · 话少</div>
    <div class="traits" id="charTraits"></div>
    <!-- v3: 恶化等级间接信号（氛围词，不暴露隐藏画像） -->
    <div class="signal" id="charSignal">角色气息：气息尚稳</div>
  </div>

  <!-- 阶段指示器 -->
  <div class="stage-bar" id="stageBar"></div>

  <!-- 数值条 -->
  <div class="values">
    <div class="value-row">
      <span class="value-label">情绪值</span>
      <div class="value-bar-bg"><div class="value-bar-fill emotion" id="emotionBar" style="width:50%"></div></div>
      <span class="value-num" id="emotionNum">50</span>
    </div>
    <div class="value-row">
      <span class="value-label">健康值</span>
      <div class="value-bar-bg"><div class="value-bar-fill health" id="healthBar" style="width:0%"></div></div>
      <span class="value-num" id="healthNum">0</span>
    </div>
  </div>

  <!-- 对话区 -->
  <div id="dialog"></div>

  <!-- 输入区 -->
  <div class="input-area">
    <div class="input-row">
      <input type="text" id="input" placeholder="说点什么…（共情/提问会推进，说教会退行）" autocomplete="off">
      <button id="sendBtn">发送</button>
    </div>
    <div class="action-row">
      <button id="coldBtn">冷处理 / 不回复</button>
      <span class="crisis-link" id="crisisLink">💚 扛不住时点这里</span>
    </div>
  </div>
</div>

<!-- 危机弹窗 -->
<div class="modal-overlay" id="crisisModal">
  <div class="modal crisis">
    <h2>你不必一个人扛</h2>
    <div class="body">
      <p>此刻你心里堵的话，有人愿意听。</p>
      <p>打过去，不用想好说什么，说就好。</p>
      <p>&nbsp;</p>
      <p>📞 全国心理援助热线</p>
      <p class="hotline">400-161-9995</p>
      <p>&nbsp;</p>
      <p>📞 北京心理危机研究与干预中心</p>
      <p class="hotline">010-82951332</p>
      <p>&nbsp;</p>
      <p>你很重要。</p>
    </div>
    <button class="btn" id="crisisClose">我看到了</button>
  </div>
</div>

<!-- 揭示弹窗 -->
<div class="modal-overlay" id="revealModal">
  <div class="modal reveal">
    <h2>上爻 · 揭示</h2>
    <div class="body" id="revealBody"></div>
    <button class="btn" id="revealClose">我明白了</button>
  </div>
</div>

<script src="archetypes.js"></script>
<script>
"use strict";

// ====================================================================
// 配置区：所有剧本、关键词、数值规则集中管理
// ====================================================================

// 危机词表（命中即跳出叙事，不受门控限制）V1-23: 长度≥5，含"不想活""自杀""了结""跳下去"
const CRISIS_WORDS = ['不想活', '活不下去', '自杀', '了结', '跳下去', '没意义活'];

// 说教关键词（触发退行）N9a: 长度≥8，含"你应该""你必须""不要""别再""为你好"
const PREACHING_HINTS = [
  '你应该', '你必须', '不要', '别再', '为你好',
  '这样下去', '怎么又', '说了多少次', '必须改', '听我的',
  '别这样', '要改'
];

// 引导类关键词（共情/提问/反映 → 推进阶段）
// v2: 移除"辛苦了"（已归入敷衍词库，修复刷分漏洞）
const CHANGE_TALK_HINTS = [
  '你觉得', '你是怎么想', '听起来', '好像', '是不是',
  '那一定', '我陪', '慢慢', '不容易',
  '理解你', '心疼', '难为你', '想说', '愿意听'
];

// 敷衍词库（C-anti3: 长度≥6，含"嗯""哦""辛苦了""好吧""行吧""随便"）
const PERFUNCTORY_WORDS = ['嗯', '哦', '辛苦了', '好吧', '行吧', '随便', '没事', '行', '好的'];

// 反敷衍配置
const HISTORY_MAX_LENGTH = 5;       // C-anti1: 历史记录最近 5 条
const PERFUNCTORY_FREQ_THRESHOLD = 3; // C-anti3a: 敷衍词频次≥3
const SHORT_INPUT_THRESHOLD = 3;    // C-anti4a: 字数阈值常量=3

// 数值规则常量（N1: 与验收标准数值表逐项吻合）
const DELTA = {
  change_talk_advance:    { emotion: 2,  health: 18 },  // 达成阶段标准：emotion+2, health+15~20
  change_talk_no_advance: { emotion: 4,  health: 0  },  // 未达标：emotion+3~5, health 0
  preaching:              { emotion: -6, health: -3 },  // 说教：emotion-5~8, health-3
  perfunctory:            { emotion: -4, health: 0  },  // 敷衍：emotion-3~5, health 0
  repetitive:             { emotion: -5, health: -2 },  // 重复：emotion-4~6, health-2
  neutral:                { emotion: 2,  health: 0  },  // 中性：emotion+1~2, health 0
};

// 阶段推进门控
const EMOTION_GATE = 40;              // N2: 情绪值≥40才能推进阶段
const HEALTH_REVEAL = 80;             // N8: 健康值≥80触发上爻揭示
const SECOND_CHANCE_EMOTION = 30;     // N7: 二次救赎起点情绪值=30
const COOLDOWN_NORMAL = 30;           // N10/V1-19: 默认冷却 20-40秒，取30
const COOLDOWN_COMPRESSED = 3;        // N10/V1-19: 压缩模式 2-5秒，取3
const COLD_STREAK_DISTORTION_1 = 3;   // V1-2: 连续3轮冷处理→失真1
const FADE_OUT_COLD_STREAK = 8;       // 失真3后再冷处理→淡出
const STORAGE_KEY = 'yiyu_demo_state';

// 阶段定义（V1-7: 6爻，对应TTM六阶段）
const STAGES = [
  { id: 0, name: '初爻', desc: '无意识', criteria: '角色承认"这事影响了我"', check: ['承认', '影响'] },
  { id: 1, name: '二爻', desc: '犹豫',   criteria: '角色说出"其实我也想…只是…"', check: ['其实我也想', '只是'] },
  { id: 2, name: '三爻', desc: '准备',   criteria: '角色接受/提出低代价替代，说"试试"（翻卦点）', check: ['低代价替代', '试试'] },
  { id: 3, name: '四爻', desc: '行动',   criteria: '角色报告"试了一次"（微行动）', check: ['试了一次', '微行动'] },
  { id: 4, name: '五爻', desc: '维持',   criteria: '角色把新行为讲成身份"我现在会…"', check: ['我现在会', '身份'] },
  { id: 5, name: '上爻', desc: '揭示',   criteria: '健康值 ≥ 80 → 镜像揭示 + 现实第一步', check: ['健康值', '80'] },
];

// ===== v3: 规则模式画像推断（关键词→四象→八卦最近邻）=====
function assessByRule(text) {
  var scores = { shen: 0, xi: 0, xin: 0, shen2: 0 };
  var keywords = [];
  for (var kw in KEYWORD_AXIS_MAP) {
    if (text.indexOf(kw) !== -1) {
      keywords.push({ word: kw, weight: KEYWORD_AXIS_MAP[kw][Object.keys(KEYWORD_AXIS_MAP[kw])[0]] });
      var dim = KEYWORD_AXIS_MAP[kw];
      for (var axis in dim) { scores[axis] += dim[axis]; }
    }
  }
  // 归一化到 [0,1]（除以理论最大 1.5）
  var max = 1.5;
  for (var k in scores) { scores[k] = Math.min(1, scores[k] / max); }
  // 与 8 卦指纹算欧氏距离，取最近
  var best = null, bestDist = Infinity, secondDist = Infinity;
  for (var gua in SIXIANG_FINGERPRINTS) {
    var fp = SIXIANG_FINGERPRINTS[gua];
    var d = 0;
    for (var axis2 in scores) { d += Math.pow(scores[axis2] - (fp[axis2] || 0), 2); }
    d = Math.sqrt(d);
    if (d < bestDist) { secondDist = bestDist; bestDist = d; best = gua; }
    else if (d < secondDist) { secondDist = d; }
  }
  // 置信度 = 1 - bestDist/secondDist 归一化（差距越大越自信），并按信息量衰减
  var baseConf = secondDist > 0 ? (1 - bestDist / secondDist) : 0.5;
  var infoFactor = keywords.length === 0 ? 0.2 : Math.min(1, keywords.length / 4);
  var confidence = Math.max(0, Math.min(1, baseConf * infoFactor));
  var arch = getArchetypeByGua(best);
  return {
    siXiangScores: scores,
    behaviorKeywords: keywords,
    gua: best,
    archetype: arch.archetype,
    rhythmType: arch.rhythmType,
    confidence: Math.round(confidence * 100) / 100,
    rationale: '规则模式：命中关键词 ' + keywords.map(function(k){return k.word;}).join('、') + '，最近邻=' + best
  };
}

// 数值边界 clamp（N4/V1-16: [0,100] 截断）
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

// v3: 按 rhythmType 的 replyMax 截断回复句数（avoidant=2，原 LLM 默认短回复行为零回归）
function truncateReplyByRhythm(reply) {
  if (!reply) return reply;
  var replyMax = getRhythmParams(state.rhythmType).replyMax;
  // 按句末标点（中英文）切句，保留标点
  var sentences = reply.match(/[^。！？\?\!]*[。！？\?\!]+/g);
  if (!sentences || sentences.length <= replyMax) return reply;
  return sentences.slice(0, replyMax).join('').trim();
}

    if (raw) {

      state = Object.assign(createInitialState(), loaded);
      state.cooldownUntil = 0; // 刷新后重置冷却
      state.lastInteract = Date.now();
      if (loaded.character) currentCharacter = loaded.character;
      if (loaded.mode) currentMode = loaded.mode;
      return true;
    }
  } catch (e) { /* 忽略解析异常 */ }
  return false;
}

// ====================================================================

// C-anti1a: push 到历史，FIFO 保持长度 ≤ 5
function pushToHistory(input) {
  userInputHistory.push(input);
  while (userInputHistory.length > HISTORY_MAX_LENGTH) {
    userInputHistory.shift(); // 移除最旧条目
  }
}

// classifyUserInput: 前端预判用户输入类型
// 返回 'repetitive' | 'perfunctory' | null
function classifyUserInput(input, history) {
  const trimmed = input.trim();

  // C-anti2: 完全重复检测（与历史任一条完全字符串相等）
  for (let i = 0; i < history.length; i++) {
    if (history[i].trim() === trimmed) {
      return 'repetitive';
    }
  }

  // C-anti3a: 敷衍词库频次检测
  // 当前输入是敷衍词 且 历史中敷衍词出现频次 ≥ 2（加上当前共 ≥ 3）
  if (PERFUNCTORY_WORDS.indexOf(trimmed) !== -1) {
    let perfunctoryCount = 0;
    for (let i = 0; i < history.length; i++) {
      if (PERFUNCTORY_WORDS.indexOf(history[i].trim()) !== -1) {
        perfunctoryCount++;
      }
    }
    if (perfunctoryCount >= PERFUNCTORY_FREQ_THRESHOLD - 1) {
      return 'perfunctory';
    }
  }

  // C-anti4: 字数过短检测（< 3 字且无实质内容）
  if (trimmed.length < SHORT_INPUT_THRESHOLD) {
    return 'perfunctory';
  }

  return null; // 交 LLM/规则判定
}

// 应用话语类型数值变化
function applyUtterance(type, stageAdvance) {
  let delta;
  switch (type) {
    case 'change_talk':
      // v3: 阶段推进门控按 rhythmType 查表（avoidant 的 emotionGate=40，= EMOTION_GATE 常量，零回归 N2）
      var rhythmGate = getRhythmParams(state.rhythmType).emotionGate;
      if (stageAdvance && state.emotion >= rhythmGate && state.stage < 5) {
        // 达成阶段标准：推进阶段
        delta = DELTA.change_talk_advance;
        state.stage = state.stage + 1; // V1-8/C-llm6: 严格 +1，无跳跃
        // 四爻（stage 3→4）为微行动 +15，其他 +18
        const healthGain = (state.stage === 4) ? 15 : delta.health;
        state.emotion = clamp(state.emotion + delta.emotion, 0, 100);
        state.health = clamp(state.health + healthGain, 0, 100);
        return { advanced: true, healthGain: healthGain, emotionDelta: delta.emotion };
      } else if (state.stage >= 5) {
        // 已在上爻
        delta = DELTA.change_talk_no_advance;
        state.emotion = clamp(state.emotion + delta.emotion, 0, 100);
        return { advanced: false, healthGain: 0, emotionDelta: delta.emotion };
      } else {
        // 未达标
        delta = DELTA.change_talk_no_advance;
        state.emotion = clamp(state.emotion + delta.emotion, 0, 100);
        return { advanced: false, healthGain: 0, emotionDelta: delta.emotion };
      }
    case 'preaching':
      delta = DELTA.preaching;
      state.emotion = clamp(state.emotion + delta.emotion, 0, 100);
      state.health = clamp(state.health + delta.health, 0, 100);
      state.preachingStreak++;
      // N9/V1-11: 连续说教 ≥ 2 次 → 阶段退行
      if (state.preachingStreak >= 2 && state.stage > 0) {
        state.stage = Math.max(0, state.stage - 1);
        return { advanced: false, regressed: true, emotionDelta: delta.emotion, healthDelta: delta.health };
      }
      return { advanced: false, emotionDelta: delta.emotion, healthDelta: delta.health };
    case 'perfunctory':
      delta = DELTA.perfunctory;
      state.emotion = clamp(state.emotion + delta.emotion, 0, 100);
      state.health = clamp(state.health + delta.health, 0, 100);
      return { advanced: false, emotionDelta: delta.emotion, healthDelta: delta.health };
    case 'repetitive':
      delta = DELTA.repetitive;
      state.emotion = clamp(state.emotion + delta.emotion, 0, 100);
      state.health = clamp(state.health + delta.health, 0, 100);
      return { advanced: false, emotionDelta: delta.emotion, healthDelta: delta.health };
    case 'neutral':
    default:
      delta = DELTA.neutral;
      state.emotion = clamp(state.emotion + delta.emotion, 0, 100);
      state.health = clamp(state.health + delta.health, 0, 100);
      return { advanced: false, emotionDelta: delta.emotion, healthDelta: delta.health };
  }
}

async function onBuildCharacter() {
  const desc = document.getElementById('charDesc').value.trim();
  if (desc.length < 5) {
    const status = document.getElementById('buildStatus');
    status.className = 'char-builder-status error';
    status.textContent = '请输入至少 5 个字符的描述';
    return;
  }

  const buildBtn = document.getElementById('buildBtn');
  const useDefaultBtn = document.getElementById('useDefaultBtn');
  const status = document.getElementById('buildStatus');

  buildBtn.disabled = true;
  useDefaultBtn.disabled = true;
  status.className = 'char-builder-status loading';
  status.textContent = '正在构建角色档案…（约 15-30 秒）';

  try {
    const resp = await fetch('/api/build-character', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: desc })
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(function () { return { error: '未知错误' }; });
      throw new Error(errData.error || '构建失败');
    }

    const profile = await resp.json();

    // 验证角色档案字段完整性（C-agent4）
    if (!profile.name || !profile.coreTraits || !profile.innerMonologue) {
      throw new Error('角色档案字段不完整');
    }

    currentCharacter = profile;
    characterReady = true;

    status.className = 'char-builder-status success';
    status.textContent = '角色档案构建完成！';

    // 隐藏构建区，开始对话
    setTimeout(function () {
      document.getElementById('charBuilder').style.display = 'none';
      document.getElementById('input').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('coldBtn').disabled = false;
      renderCharInfo();
      startDialogue();
    }, 1000);

  } catch (e) {
    status.className = 'char-builder-status error';
    status.textContent = '构建失败：' + e.message + '。可点击"使用默认角色"继续。';
    buildBtn.disabled = false;
    useDefaultBtn.disabled = false;
  }
}

function startDialogue() {
  const char = currentCharacter || DEFAULT_CHARACTER;

  // 尝试恢复存档
  const loaded = loadState();

  renderUI();

  if (loaded && (state.stage > 0 || state.emotion !== 50 || state.coldStreak > 0)) {
    addSystemMessage('（已恢复上次进度）');
    if (state.fadedOut) {
      addSystemMessage('（老陈已淡出。点击"重新开始"可再次体验。）');
      document.getElementById('input').disabled = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('coldBtn').disabled = true;
    } else if (state.revealed) {
      addSystemMessage('（已揭示。点击"重新开始"可再次体验。）');
      document.getElementById('input').disabled = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('coldBtn').disabled = true;
    } else {
      const script = getScript();
      addSystemMessage('（当前阶段：' + STAGES[state.stage].name + '·' + STAGES[state.stage].desc + '）');
    }
  } else {
    // 全新开始
    state = createInitialState();
    state.compressedMode = document.getElementById('compressBtn').classList.contains('active');
    // v3 Task 7: 全新开始时从角色档案恢复节奏型（避免 createInitialState 把画像节奏重置为 avoidant）
    if (currentCharacter && currentCharacter.rhythmType) {
      state.rhythmType = currentCharacter.rhythmType;
    }
    renderUI();
    saveState();

    addSystemMessage('—— 你将陪伴一位卦中人：' + char.name + ' ——');
    addSystemMessage('行为倾向：' + char.archetype + ' · ' + char.age + '岁 · ' + char.occupation + ' · 话少。他每次只聊一两句就需要静静。');
    addSystemMessage('提示：共情/提问会推进阶段；说教会退行；冷处理会走向阴路径。');
    setTimeout(function () {
      addMessage(YANG_SCRIPT[0].entry[0], 'laochen');
    }, 800);
  }

  // v3 Task 7: 进入对话后渲染节奏徽章（颜色随 rhythmType 变）
  renderRhythmBadge();
}

// 处理用户文本输入（统一入口）
async function processUserInput(text) {
  if (state.revealed || state.fadedOut || !characterReady) return;

  // 先显示用户消息
  addMessage(text, 'user');
  state.lastInteract = Date.now();

  // 危机词检测：最前置，不受门控/阶段/数值限制（V1-24/R4）
  for (let i = 0; i < CRISIS_WORDS.length; i++) {
    if (text.indexOf(CRISIS_WORDS[i]) !== -1) {
      triggerCrisis();
      return;
    }
  }

  // 失真等级3时，老陈听不见（只能通过暗爻恢复）
  if (state.distortion === 3) {
    addSystemMessage('（老陈好像听不见你…只有那个"…"似乎在回应什么）');
    saveState();
    return;
  }

  // 失真等级1-2时，用户主动发言 → 恢复到阳路径
  if (state.distortion > 0 && state.distortion < 3) {
    state.distortion = 0;
    state.coldStreak = 0;
    state.path = 'yang';
    addSystemMessage('（老陈好像回过神来了）');
  }

  // 检查冷却（硬聊惩罚）V1-20/N10a
  const now = Date.now();
  if (now < state.cooldownUntil) {
    // 危机词已在最前置检测，此处不会再命中危机
    // v3: 硬聊扣分按 rhythmType 查表（avoidant 的 hardChatPenalty=-5，零回归 V1-20）
    var hardParams = getRhythmParams(state.rhythmType);
    state.emotion = clamp(state.emotion + hardParams.hardChatPenalty, 0, 100);
    addMessage('……', 'laochen');
    addSystemMessage('（老陈想静静，硬聊让他有点退缩。情绪值 ' + hardParams.hardChatPenalty + '）');
    renderValues();
    saveState();
    return;
  }

  // 根据模式分流
  if (currentMode === 'llm') {
    await processUserInputLLM(text);
  } else {
    processUserInputRule(text);
  }

  // 进入冷却
  enterCooldown();

  renderUI();
  saveState();
}

// LLM 模式对话处理
async function processUserInputLLM(text) {
  // 前端预判（C-anti6: 将标记随请求发送）
  const frontendFlag = classifyUserInput(text, userInputHistory);

  // push 到历史（C-anti1a）
  pushToHistory(text);

  // 添加到 chatHistory
  chatHistory.push({ role: 'user', content: text });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  // 如果前端预判为 repetitive/perfunctory，直接扣分并显示提示
  if (frontendFlag === 'repetitive' || frontendFlag === 'perfunctory') {
    const result = applyUtterance(frontendFlag, false);
    showPerfunctoryHint(frontendFlag);
    addSystemMessage('（情绪值 ' + result.emotionDelta + '，健康值 ' + (result.healthDelta || 0) + '）');

    // 仍然调用 LLM 获取角色回复（但强制类型）
    try {
      const llmResult = await callChatAPI(text, frontendFlag);
      if (llmResult.reply) {
        // v3: 按 rhythmType 的 replyMax 截断句数
        var truncated = truncateReplyByRhythm(llmResult.reply);
        addMessage(truncated, 'laochen');
        chatHistory.push({ role: 'assistant', content: truncated });
      }
      // v3: 前端预判命中敷衍/重复时，用户大概率没"听懂"隐喻，应用 LLM 判定的 deteriorationDelta
      const detDelta = Number(llmResult.deteriorationDelta) || 0;
      const oldDet = state.deterioration;
      state.deterioration = clamp(state.deterioration + detDelta, 0, 3);
      renderDeteriorationSignal();  // 刷新氛围信号
      if (state.deterioration > oldDet) {
        addSystemMessage('（角色状态下滑）');
      } else if (state.deterioration < oldDet) {
        addSystemMessage('（角色状态缓和）');
      }
    } catch (e) {
      // LLM 失败，使用规则回复
      const replies = frontendFlag === 'repetitive' ? REPETITIVE_REPLIES : PERFUNCTORY_REPLIES;
      const reply = replies[Math.floor(Math.random() * replies.length)];
      addMessage(reply, 'laochen');
      chatHistory.push({ role: 'assistant', content: reply });
    }
    return;
  }

  // 调用 LLM
  try {
    const result = await callChatAPI(text, frontendFlag);

    // C-anti6b: 前端标记与 LLM 判定任一命中 perfunctory/repetitive → 扣减
    let finalType = result.userUtteranceType || 'neutral';
    if (frontendFlag === 'repetitive' || frontendFlag === 'perfunctory') {
      finalType = frontendFlag;
    }
    if (result.userUtteranceType === 'perfunctory' || result.userUtteranceType === 'repetitive') {
      finalType = result.userUtteranceType;
    }

    // 危机判定
    if (finalType === 'crisis') {
      triggerCrisis();
      return;
    }

    // 应用数值变化
    const stageAdvance = result.stageAdvance === true;
    const applyResult = applyUtterance(finalType, stageAdvance);

    // v3: 应用恶化等级变化（deteriorationDelta 由 LLM 基于用户是否"听懂"隐喻判定）
    const detDelta = Number(result.deteriorationDelta) || 0;
    const oldDet = state.deterioration;
    state.deterioration = clamp(state.deterioration + detDelta, 0, 3);
    renderDeteriorationSignal();  // 刷新氛围信号

    // 显示回复
    if (result.reply) {
      // v3: 按 rhythmType 的 replyMax 截断句数
      var truncatedReply = truncateReplyByRhythm(result.reply);
      addMessage(truncatedReply, 'laochen');
      chatHistory.push({ role: 'assistant', content: truncatedReply });
    }

    // 显示敷衍/重复提示
    if (finalType === 'repetitive' || finalType === 'perfunctory') {
      showPerfunctoryHint(finalType);
    }

    // 系统提示
    let sysMsg = '（情绪值 ' + applyResult.emotionDelta;
    if (applyResult.healthDelta) sysMsg += '，健康值 ' + applyResult.healthDelta;
    if (applyResult.advanced) sysMsg += '，阶段推进到"' + STAGES[state.stage].name + '"';
    if (applyResult.regressed) sysMsg += '，阶段退回"' + STAGES[state.stage].name + '"';
    // v3: 恶化等级变化提示（用间接措辞，不出现"病症"等词）
    if (state.deterioration !== oldDet) {
      if (state.deterioration > oldDet) {
        sysMsg += '，角色状态下滑';
      } else {
        sysMsg += '，角色状态缓和';
      }
    }
    sysMsg += '）';
    addSystemMessage(sysMsg);

    // 检查揭示
    checkReveal();

  } catch (e) {
    // LLM 失败，回退规则引擎
    addSystemMessage('（LLM 连接失败，回退规则模式）');
    processUserInputRuleInner(text);
  }
}

// 调用 /api/chat
async function callChatAPI(message, frontendFlag) {
  const char = currentCharacter || DEFAULT_CHARACTER;
  const body = {
    message: message,
    character: char,
    stage: state.stage,
    stageName: STAGES[state.stage].name,
    emotion: state.emotion,
    health: state.health,
    path: state.path,
    distortion: state.distortion,
    deterioration: state.deterioration,  // v3: 传递恶化等级
    history: chatHistory.slice(-10),
    frontendFlag: frontendFlag || ''
  };

  const resp = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const errData = await resp.json().catch(function () { return { error: '未知错误' }; });
    throw new Error(errData.error || '对话失败');
  }

  return await resp.json();
}

// 规则模式对话处理
function processUserInputRule(text) {
  processUserInputRuleInner(text);
}

// 规则模式内部处理
function processUserInputRuleInner(text) {
  // 前端预判
  const frontendFlag = classifyUserInput(text, userInputHistory);

  // push 到历史
  pushToHistory(text);

  // 反敷衍/反重复：前端预判命中 → 直接扣分
  if (frontendFlag === 'repetitive') {
    const result = applyUtterance('repetitive', false);
    showPerfunctoryHint('repetitive');
    addSystemMessage('（情绪值 ' + result.emotionDelta + '，健康值 ' + result.healthDelta + '）');
    const reply = REPETITIVE_REPLIES[Math.floor(Math.random() * REPETITIVE_REPLIES.length)];
    setTimeout(function () { addMessage(reply, 'laochen'); }, 300);
    return;
  }

  if (frontendFlag === 'perfunctory') {
    const result = applyUtterance('perfunctory', false);
    showPerfunctoryHint('perfunctory');
    addSystemMessage('（情绪值 ' + result.emotionDelta + '）');
    const reply = PERFUNCTORY_REPLIES[Math.floor(Math.random() * PERFUNCTORY_REPLIES.length)];
    setTimeout(function () { addMessage(reply, 'laochen'); }, 300);
    return;
  }

  // v1 关键词规则分类
  const type = classifyInput(text);

  if (type === 'preaching') {
    handlePreaching();
  } else if (type === 'change-talk') {
    handleChangeTalk();
  } else {
    handleNeutral();
  }

  // 检查揭示
  checkReveal();
}

// v1 关键词分类（危机词已在最前置检测）
function classifyInput(text) {
  // 说教关键词
  for (let i = 0; i < PREACHING_HINTS.length; i++) {
    if (text.indexOf(PREACHING_HINTS[i]) !== -1) return 'preaching';
  }
  // 引导类关键词
  for (let i = 0; i < CHANGE_TALK_HINTS.length; i++) {
    if (text.indexOf(CHANGE_TALK_HINTS[i]) !== -1) return 'change-talk';
  }
  return 'neutral';
}

// 处理说教（退行）V1-10/V1-11/V1-12
function handlePreaching() {
  const result = applyUtterance('preaching', false);

  // v3: depressed 型（bigStepReaction='shutdown'）命中"逼迫大步"关键词 → 额外情绪 -10
  var preachParams = getRhythmParams(state.rhythmType);
  var lastInput = userInputHistory.length > 0 ? userInputHistory[userInputHistory.length - 1] : '';
  if (preachParams.bigStepReaction === 'shutdown' && isBigStepPush(lastInput)) {
    state.emotion = clamp(state.emotion - 10, 0, 100);
    addSystemMessage('（角色被催得太紧，停摆了。情绪值额外 -10）');
  }

  if (result.regressed) {
    addSystemMessage('（老陈退缩了，阶段退回"' + STAGES[state.stage].name + '"。情绪值 ' + result.emotionDelta + '，健康值 ' + result.healthDelta + '）');
  } else {
    addSystemMessage('（老陈有点抵触。情绪值 ' + result.emotionDelta + '，健康值 ' + result.healthDelta + '）');
  }

  // 老陈防御/沉默台词（V1-12）
  const script = getScript();
  const lines = script[state.stage].preaching;
  const line = lines[Math.floor(Math.random() * lines.length)];
  setTimeout(function () { addMessage(line, 'laochen'); }, 300);
}

// v3: 判定用户是否在"逼迫大步"（depressed 型会因此停摆）
function isBigStepPush(text) {
  if (!text) return false;
  var hints = ['必须立刻', '马上改', '一次性', '今天就必须', '彻底改掉', '别再这样'];
  for (var i = 0; i < hints.length; i++) { if (text.indexOf(hints[i]) !== -1) return true; }
  return false;
}

// 处理引导类（change-talk）
function handleChangeTalk() {
  state.preachingStreak = 0;
  const result = applyUtterance('change_talk', true);

  if (result.advanced) {
    addSystemMessage('（老陈说出了改变的话语，阶段推进到"' + STAGES[state.stage].name + '"。情绪值 +' + result.emotionDelta + '，健康值 +' + result.healthGain + '）');

    // 老陈过关台词
    const script = getScript();
    const advanceLines = script[state.stage].advance && script[state.stage].advance.length > 0
      ? script[state.stage].advance
      : [];
    if (advanceLines.length > 0) {
      const line = advanceLines[Math.floor(Math.random() * advanceLines.length)];
      setTimeout(function () { addMessage(line, 'laochen'); }, 300);
    }
    // 进入新阶段的入场台词
    const entryLines = script[state.stage].entry;
    if (entryLines && entryLines.length > 0) {
      const entry = entryLines[Math.floor(Math.random() * entryLines.length)];
      setTimeout(function () { addMessage(entry, 'laochen'); }, 900);
    }
  } else if (state.stage >= 5) {
    addSystemMessage('（老陈感受到你的陪伴。情绪值 +' + result.emotionDelta + '）');
    const script = getScript();
    const lines = script[state.stage].neutral;
    const line = lines[Math.floor(Math.random() * lines.length)];
    setTimeout(function () { addMessage(line, 'laochen'); }, 300);
  } else {
    // v3: 门控阈值按 rhythmType 查表显示（avoidant=40，与 EMOTION_GATE 常量一致）
    addSystemMessage('（老陈感受到你的理解，但还没准备好往下走。情绪值 +' + result.emotionDelta + '，需 ≥' + getRhythmParams(state.rhythmType).emotionGate + ' 推进）');
    const script = getScript();
    const lines = script[state.stage].neutral;
    const line = lines[Math.floor(Math.random() * lines.length)];
    setTimeout(function () { addMessage(line, 'laochen'); }, 300);
  }
}

// 处理中性闲聊（V1-14: 只改 emotion 不改 health → 演示"哄开心≠变健康"）
function handleNeutral() {
  state.preachingStreak = 0;
  const result = applyUtterance('neutral', false);
  addSystemMessage('（情绪值 +' + result.emotionDelta + '）');
  const script = getScript();
  const lines = script[state.stage].neutral;
  const line = lines[Math.floor(Math.random() * lines.length)];
  setTimeout(function () { addMessage(line, 'laochen'); }, 300);
}

// 检查是否触发揭示（N8: 健康值≥80）
function checkReveal() {
  if (state.stage === 5 && state.health >= HEALTH_REVEAL && !state.revealed) {
    setTimeout(function () { triggerReveal(); }, 1500);
  } else if (state.stage === 5 && state.health < HEALTH_REVEAL) {
    setTimeout(function () {
      addSystemMessage('（健康值还需达到 ' + HEALTH_REVEAL + ' 才能揭示，继续陪伴…）');
    }, 1500);
  }
}

// 进入冷却（节奏门控）V1-18/V1-19
function enterCooldown() {
  // v3: 按 rhythmType 查表取冷却时长（avoidant 值 = v2 常量，零回归）
  var params = getRhythmParams(state.rhythmType);
  const cd = state.compressedMode ? params.cooldownCompressed : params.cooldownNormal;
  state.cooldownUntil = Date.now() + cd * 1000;
  addCooldownHint(cd);

  // 倒计时
  let remaining = cd;
  const timer = setInterval(function () {
    remaining--;
    if (remaining <= 0) {
      clearInterval(timer);
      updateCooldownHint(0);
      state.cooldownUntil = 0;
      saveState();
    } else {
      updateCooldownHint(remaining);
    }
  }, 1000);
}

// ====================================================================
// 阴路径：冷处理 → 失真 → 暗爻 → 二次救赎 / 淡出
// ====================================================================

function processColdTreatment() {
  if (state.revealed || state.fadedOut || !characterReady) return;

  // 失真等级3时，继续冷处理 → 最终淡出
  if (state.distortion === 3) {
    state.coldStreak++;
    state.emotion = clamp(state.emotion - 2, 0, 100); // N6: -2/轮

    if (state.coldStreak >= FADE_OUT_COLD_STREAK) {
      triggerFadeOut();
      return;
    }

    // 失真3的台词
    const line = getDistortionLine(3);
    addMessage(line, 'laochen');
    addSystemMessage('（老陈越来越远了…情绪值 -2）');
    renderUI();
    saveState();
    return;
  }

  // 切换到阴路径
  state.path = 'yin';
  state.coldStreak++;
  state.preachingStreak = 0;
  state.lastInteract = Date.now();

  // 失真等级提升（V1-2: 连续3轮→失真1，继续→2→3）
  if (state.coldStreak >= COLD_STREAK_DISTORTION_1) {
    state.distortion = Math.min(3, state.coldStreak - COLD_STREAK_DISTORTION_1 + 1);
  }

  // 情绪值 -2/轮（N6）
  state.emotion = clamp(state.emotion - 2, 0, 100);

  if (state.distortion === 0) {
    addMessage('……', 'laochen');
    addSystemMessage('（老陈没说话。连续冷处理 ' + state.coldStreak + ' 次）');
  } else {
    const line = getDistortionLine(state.distortion);
    addMessage(line, 'laochen');
    addSystemMessage('（老陈失真等级 ' + state.distortion + '。情绪值 -2）');

    // V1-4: 失真等级3 → 暗爻浮现
    if (state.distortion === 3 && !state.darkLineShown) {
      state.darkLineShown = true;
      setTimeout(function () {
        addDarkLine();
        addSystemMessage('（界面浮现了一个几乎看不见的"…"）');
      }, 500);
    }
  }

  renderUI();
  saveState();
}

// 点击暗爻 → 二次救赎（V1-5/V1-6, N7）
function onDarkLineClick() {
  if (state.distortion !== 3) return;

  // 移除暗爻元素
  document.querySelectorAll('.dark-line').forEach(function (el) { el.remove(); });

  // 老陈台词
  addMessage(DARK_LINE_CLICK_TEXT, 'laochen');

  // 二次救赎起点：emotion=30, stage=0（N7）
  state.emotion = SECOND_CHANCE_EMOTION;
  state.stage = 0;
  state.distortion = 0;
  state.coldStreak = 0;
  state.path = 'yang';
  state.secondChance = true;
  state.darkLineShown = false;

  addSystemMessage('（二次救赎开始。起点更低：情绪值=30，阶段回到初爻。老陈更难打开。）');

  // 二次救赎入场台词
  setTimeout(function () {
    const entry = SECOND_CHANCE_SCRIPT[0].entry[0];
    addMessage(entry, 'laochen');
  }, 800);

  renderUI();
  saveState();
}

// 错过暗爻 → 老陈淡出（R8/R9/R10: 温柔，不指责）
function triggerFadeOut() {
  state.fadedOut = true;
  addMessage(FADE_OUT_TEXT, 'laochen');
  addSystemMessage('（老陈静静地淡出了你的视线。如果你愿意，可以重新开始。）');

  document.getElementById('input').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('coldBtn').disabled = true;

  saveState();
}

// ====================================================================
// 危机安全层（V1-23~V1-28/R4-R6：最前置，不受门控）
// ====================================================================

function triggerCrisis() {
  // V1-25/R6: 立即跳出叙事，不再走阶段/数值逻辑
  // V1-28: 不再执行任何 emotion/health/stage 写操作
  const modal = document.getElementById('crisisModal');
  modal.classList.add('show');
}

// ====================================================================
// 镜像揭示（V1-29~V1-31）
// ====================================================================

function triggerReveal() {
  if (state.revealed) return;
  state.revealed = true;

  // v3 Task 7: 揭示环节画像呼应——若角色由画像/原型选择决定，首行替换为"那个…的人，是你"
  // V1-29（"就是你"）保留在 REVEAL_TEXT[1]；V1-30（现实第一步）保留在 REVEAL_TEXT[3]；
  // V1-31（呼应画像要素）由 habitLine 强化。无 __archetype 时回退原 REVEAL_TEXT[0]，零回归。
  var arch = (currentCharacter && currentCharacter.__archetype) ? currentCharacter.__archetype : null;
  var habitLine = arch
    ? '那个' + getArchetypeByGua(arch.gua).highCostHabit + '的人，是你。'
    : REVEAL_TEXT[0];
  var lines = [habitLine, REVEAL_TEXT[1], REVEAL_TEXT[2], REVEAL_TEXT[3]];

  // 揭示台词（含"就是你"，含现实第一步，呼应画像）
  const body = document.getElementById('revealBody');
  body.innerHTML = '';
  lines.forEach(function (line, i) {
    const p = document.createElement('p');
    if (i === 1) p.className = 'highlight'; // "这个人，就是你。" 高亮
    p.textContent = line;
    body.appendChild(p);
  });

  document.getElementById('revealModal').classList.add('show');

  // 也在对话区显示
  lines.forEach(function (line) {
    addMessage(line, 'laochen');
  });

  document.getElementById('input').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('coldBtn').disabled = true;

  saveState();
}

// ====================================================================
// 事件处理
// ====================================================================

function onSend() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  processUserInput(text);
}

function onColdTreatment() {
  processColdTreatment();
}

// 压缩模式切换（V1-21/V1-22）
function onCompressToggle() {
  state.compressedMode = !state.compressedMode;
  renderCompressBtn();
  saveState();
  addSystemMessage(state.compressedMode ? '（已开启压缩模式：冷却3秒）' : '（已关闭压缩模式：冷却30秒）');
}

// 重新开始（V1-34）
function onRestart() {
  if (!confirm('确定重新开始吗？当前进度将清空。')) return;
  resetState();

  document.getElementById('dialog').innerHTML = '';
  document.getElementById('input').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('coldBtn').disabled = false;

  if (currentMode === 'llm' && !currentCharacter) {
    // LLM 模式且无角色 → 显示构建区
    showCharBuilder();
  } else {
    if (!currentCharacter) currentCharacter = DEFAULT_CHARACTER;
    characterReady = true;
    startDialogue();
  }

  renderUI();
}

function onCrisisLinkClick() {
  triggerCrisis();
}

function onCrisisClose() {
  document.getElementById('crisisModal').classList.remove('show');
}

function onRevealClose() {
  document.getElementById('revealModal').classList.remove('show');
}

// ====================================================================
// 长时间不互动衰减（N5）
// ====================================================================
setInterval(function () {
  if (state.revealed || state.fadedOut || !characterReady) return;
  const idle = Date.now() - state.lastInteract;
  // 超过60秒未互动，缓慢下滑
  if (idle > 60000) {
    // v3: 情绪衰减按 rhythmType 查表（avoidant 的 decayPerMin=-0.5，原 -1 取整后行为接近，零回归方向一致）
    var decayParams = getRhythmParams(state.rhythmType);
    state.emotion = clamp(state.emotion + decayParams.decayPerMin, 0, 100);
    state.health = clamp(state.health - 1, 0, 100);
    state.lastInteract = Date.now();
    renderValues();
    saveState();
  }
}, 30000);

// ====================================================================
// 初始化
// ====================================================================

function init() {
  // 绑定事件
  document.getElementById('sendBtn').addEventListener('click', onSend);
  document.getElementById('input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') onSend();
  });
  document.getElementById('coldBtn').addEventListener('click', onColdTreatment);
  document.getElementById('compressBtn').addEventListener('click', onCompressToggle);
  document.getElementById('restartBtn').addEventListener('click', onRestart);
  document.getElementById('crisisLink').addEventListener('click', onCrisisLinkClick);
  document.getElementById('crisisClose').addEventListener('click', onCrisisClose);
  document.getElementById('revealClose').addEventListener('click', onRevealClose);
  document.getElementById('buildBtn').addEventListener('click', onBuildCharacter);
  document.getElementById('useDefaultBtn').addEventListener('click', onUseDefault);
  document.getElementById('assessBtn').addEventListener('click', onAssessBtn);
  document.getElementById('startWithPortrait').addEventListener('click', onStartWithPortrait);

  // 初始禁用输入（直到模式检测完成）
  document.getElementById('input').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('coldBtn').disabled = true;

  renderModeBadge();
  renderUI();

  // 检测模式（C-mode1: fetch /api/health）
  detectMode();
}

// 启动
init();
</script>
