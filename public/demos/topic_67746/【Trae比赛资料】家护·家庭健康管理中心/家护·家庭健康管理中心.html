<style>
  /* ============================================================
     Liquid Glass 设计系统 —— 对应「Z0-Z3 四层」总纲
     命门：边缘 specular highlight（inset 顶部高光），不是模糊本身
     ============================================================ */
  :root{
    /* 颜色（继承自家护原色板） */
    --primary:#0EA5E9; --primary-dark:#0284C7; --primary-light:#7DD3FC;
    --accent:#10B981; --accent-dark:#059669; --accent-light:#6EE7B7;
    --warning:#F59E0B; --danger:#EF4444;
    --text-primary:#0F172A; --text-secondary:#475569; --text-tertiary:#94A3B8;
    --tag-bg:rgba(148,163,184,0.15);
    --chart-grid:rgba(148,163,184,0.12);

    /* Z1 内容层：卡片/列表容器 —— 退，不抢戏 */
    --glass-z1-bg:rgba(255,255,255,0.55);
    --glass-z1-blur:20px; --glass-z1-saturate:160%;
    --glass-z1-border:rgba(255,255,255,0.7);
    --glass-z1-hi:rgba(255,255,255,0.5);  /* 0.5px 弱高光 */

    /* Z2 悬浮层：待办区/吸底CTA/工具条 —— 浮出来一档 */
    --glass-z2-bg:rgba(255,255,255,0.7);
    --glass-z2-blur:28px; --glass-z2-saturate:190%;
    --glass-z2-border:rgba(255,255,255,0.8);
    --glass-z2-hi:rgba(255,255,255,0.8);  /* 1px 强高光 */

    /* Z3 模态层：弹窗 —— 实体玻璃厚度感 */
    --glass-z3-bg:rgba(255,255,255,0.82);
    --glass-z3-blur:40px; --glass-z3-saturate:200%;
    --glass-z3-border:rgba(255,255,255,0.9);
    --glass-z3-hi:rgba(255,255,255,0.9);

    /* 弹簧曲线 3 档（对应 UX 章节 3.1） */
    --spring-tap:cubic-bezier(0.34,1.56,0.64,1);     /* 轻触 180ms */
    --spring-expand:cubic-bezier(0.22,1,0.36,1);      /* 展开 320ms */
    --spring-snap:cubic-bezier(0.16,1,0.3,1);         /* 吸附 240ms */

    --bg-gradient:linear-gradient(135deg,#E0F2FE 0%,#F0F5FA 30%,#ECFDF5 60%,#F0FDFA 100%);
    --orb1:rgba(14,165,233,0.18); --orb2:rgba(16,185,129,0.14);
    --solid-surface:#FFFFFF;       /* 禁忌区不透明底板 */
    --solid-surface-2:#F8FAFC;
  }
  [data-theme="dark"]{
    --text-primary:#F1F5F9; --text-secondary:#CBD5E1; --text-tertiary:#64748B;
    --glass-z1-bg:rgba(30,41,59,0.6); --glass-z1-border:rgba(148,163,184,0.15); --glass-z1-hi:rgba(148,163,184,0.12);
    --glass-z2-bg:rgba(30,41,59,0.75); --glass-z2-border:rgba(148,163,184,0.2); --glass-z2-hi:rgba(148,163,184,0.18);
    --glass-z3-bg:rgba(30,41,59,0.85); --glass-z3-border:rgba(148,163,184,0.25); --glass-z3-hi:rgba(148,163,184,0.2);
    --bg-gradient:linear-gradient(135deg,#0C1A2E 0%,#0F1B2D 30%,#0A2A22 60%,#0C1F29 100%);
    --orb1:rgba(56,189,248,0.10); --orb2:rgba(52,211,153,0.07);
    --solid-surface:#1E293B; --solid-surface-2:#0F172A;
    --chart-grid:rgba(148,163,184,0.08);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Figtree','Noto Sans SC',system-ui,sans-serif;background:var(--bg-gradient);color:var(--text-primary);-webkit-font-smoothing:antialiased;min-height:100vh;position:relative;overflow-x:hidden}
  /* Z0 底层：渐变球 —— 永远不加 backdrop-filter，壁纸性质 */
  body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(40px)}
  body::before{width:600px;height:600px;background:radial-gradient(circle,var(--orb1) 0%,transparent 70%);top:-200px;right:-100px}
  body::after{width:520px;height:520px;background:radial-gradient(circle,var(--orb2) 0%,transparent 70%);bottom:-180px;left:-120px}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

  /* 可访问性：skip link / focus ring */
  .skip-link{position:absolute;top:-100%;left:16px;padding:10px 20px;background:var(--primary);color:#fff;border-radius:12px;z-index:9999}
  .skip-link:focus{top:16px}
  *:focus-visible{outline:3px solid var(--primary);outline-offset:2px;border-radius:6px}

  /* ============================================================
     三层 Liquid Glass 类 —— 靠边缘高光区分层级，不靠颜色
     ============================================================ */
  .glass-z1{
    background:var(--glass-z1-bg);
    backdrop-filter:blur(var(--glass-z1-blur)) saturate(var(--glass-z1-saturate));
    -webkit-backdrop-filter:blur(var(--glass-z1-blur)) saturate(var(--glass-z1-saturate));
    border:1px solid var(--glass-z1-border);
    box-shadow:inset 0 0.5px 0 var(--glass-z1-hi), 0 8px 32px rgba(31,38,135,0.10);
    border-radius:20px;
  }
  .glass-z2{
    background:var(--glass-z2-bg);
    backdrop-filter:blur(var(--glass-z2-blur)) saturate(var(--glass-z2-saturate));
    -webkit-backdrop-filter:blur(var(--glass-z2-blur)) saturate(var(--glass-z2-saturate));
    border:1px solid var(--glass-z2-border);
    /* Z2 命门：顶部1px强高光 + 左侧0.4高光 —— 悬浮感的来源 */
    box-shadow:inset 0 1px 0 var(--glass-z2-hi), inset 1px 0 0 rgba(255,255,255,0.35), inset 0 -1px 0 rgba(0,0,0,0.04), 0 12px 40px rgba(31,38,135,0.12);
    border-radius:24px;
  }
  .glass-z3{
    background:var(--glass-z3-bg);
    backdrop-filter:blur(var(--glass-z3-blur)) saturate(var(--glass-z3-saturate));
    -webkit-backdrop-filter:blur(var(--glass-z3-blur)) saturate(var(--glass-z3-saturate));
    border:1px solid var(--glass-z3-border);
    /* Z3 实体玻璃：三层 inset 制造厚度 */
    box-shadow:inset 0 1px 0 var(--glass-z3-hi), inset 0 -1px 0 rgba(0,0,0,0.05), inset 1px 0 0 rgba(255,255,255,0.3), 0 24px 64px rgba(0,0,0,0.2);
    border-radius:28px;
  }
  /* Expanded 态：玻璃「变厚」—— blur↑ saturate↑ 透明度↑ 边缘高光锐化（对应 2.1） */
  .glass-z2.is-expanded{
    backdrop-filter:blur(36px) saturate(210%);
    -webkit-backdrop-filter:blur(36px) saturate(210%);
    background:rgba(255,255,255,0.82);
    box-shadow:inset 0 2px 0 rgba(255,255,255,0.95), inset 1px 0 0 rgba(255,255,255,0.5), 0 20px 50px rgba(31,38,135,0.16);
  }
  [data-theme="dark"] .glass-z2.is-expanded{background:rgba(30,41,59,0.88)}

  /* 禁忌区不透明底板（对应第4章）：文本/图表/表单内部强制实底 */
  .solid-surface{background:var(--solid-surface)}
  .solid-surface-2{background:var(--solid-surface-2)}
  [data-theme="dark"] .solid-surface{background:var(--solid-surface);box-shadow:inset 0 0.5px 0 rgba(148,163,184,0.1)}

  /* 按钮折射反馈（对应 3.2）：active 时外光变内阴影 */
  .btn-press{transition:transform 180ms var(--spring-tap), box-shadow 180ms var(--spring-tap)}
  .btn-press:active{transform:scale(0.96)}

  /* tabular-nums：所有数字强制等宽 */
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  /* 滚动条 */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.3);border-radius:10px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,0.5)}

  /* 紧急色块禁玻璃（对应 4.4） */
  .urgent-block{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25)}
  .warn-block{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25)}

  /* 趋势图表区禁玻璃（对应 4.1） */
  .chart-surface{background:var(--solid-surface);border-radius:16px}

  /* 待办项左侧色条 */
  .todo-stripe{position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px}

  /* 拖拽态：只改边缘高光 + 主色染边，不动 blur（对应 4.5） */
  .drop-active{border-color:var(--primary)!important;box-shadow:inset 0 0 0 2px rgba(14,165,233,0.35), inset 0 1px 0 rgba(255,255,255,0.8)!important}

  .skeleton{background:linear-gradient(90deg,rgba(148,163,184,0.1) 25%,rgba(148,163,184,0.25) 37%,rgba(148,163,184,0.1) 63%);background-size:400% 100%;animation:sk 1.4s ease infinite}
  @keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}

  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
</style>

const APIKEY_OBF_XOR = 'jiahu_v2_k';
const APIKEY_OBF_PREFIX = 'jh1::';

function obfuscateKey(s){ if(!s) return s; let out=''; for(let i=0;i<s.length;i++) out += String.fromCharCode(s.charCodeAt(i) ^ APIKEY_OBF_XOR.charCodeAt(i % APIKEY_OBF_XOR.length)); try { return APIKEY_OBF_PREFIX + btoa(unescape(encodeURIComponent(out))); } catch(e){ return s; } }
function deobfuscateKey(s){ if(!s || !s.startsWith(APIKEY_OBF_PREFIX)) return s; try { const raw = decodeURIComponent(escape(atob(s.slice(APIKEY_OBF_PREFIX.length)))); let out=''; for(let i=0;i<raw.length;i++) out += String.fromCharCode(raw.charCodeAt(i) ^ APIKEY_OBF_XOR.charCodeAt(i % APIKEY_OBF_XOR.length)); return out; } catch(e){ return ''; } }

function getLlmConfig() {
  try {
    const raw = localStorage.getItem('jiahu_llm_v2');
    if (!raw) return null;
    const c = JSON.parse(raw);
    return { ...c, apiKey: deobfuscateKey(c.apiKey) };
  } catch(e){ return null; }
}
function saveLlmConfig(c) {
  const stored = { ...c, apiKey: obfuscateKey(c.apiKey) };
  localStorage.setItem('jiahu_llm_v2', JSON.stringify(stored));
}
function isLlmConfigured() {
  const c = getLlmConfig();
  return !!(c && c.apiKey && c.baseUrl && c.model);
}

function buildAnalysisPrompt(member, report, hasImage) {
  // 强化 prompt：extractedMetrics 必须从报告实际数值提取，字段名固定驼峰，数值必须是 number 不是字符串
  const sys = `你是资深体检报告解读专家。请用通俗语言分析体检报告，输出严格JSON，不要输出任何额外文字。
{
  "summary": "总体结论",
  "riskLevel": "low|medium|high",
  "examDate": "YYYY-MM-DD",
  "abnormalItems": [{"name":"指标名","value":"数值","unit":"单位","ref":"参考范围","severity":"low|medium|high","advice":"建议"}],
  "normalItems": [{"name":"指标名","value":"数值","unit":"单位","ref":"参考范围"}],
  "recommendations": ["建议1"],
  "extractedMetrics": {
    "bloodPressure": [[收缩压, 舒张压]],
    "bloodSugar": [数值],

    "weight": [数值]
  }
}
关键要求：
1. extractedMetrics 必须从报告里提取真实数值，不能为空对象。若报告无某项则省略该字段，不要写 null。
2. 字段名严格使用 bloodPressure / bloodSugar / cholesterol / weight（驼峰，不要下划线）。
3. bloodPressure 必须是二维数组 [[收缩压, 舒张压]]，两个数都是 number，例如 [[148, 92]]。
4. bloodSugar / cholesterol / weight 必须是数字数组，例如 [5.4]，不要写字符串。
5. value 字段可以写字符串，但 extractedMetrics 里的数值必须是 number。
6. examDate 必须从报告里提取检查日期，格式 YYYY-MM-DD（如 2024-03-15）。若无法识别则省略此字段。`;
  return [
    { role: 'system', content: sys },
    { role: 'user', content: hasImage
      ? `请分析这份体检报告图片。被检查人：${member.name}，${member.age}岁，${member.gender}。请识别报告上的检查日期填入 examDate，识别所有指标数值填入 extractedMetrics，异常指标填入 abnormalItems 并给出建议。`

}

function parseLlmResponse(raw) {
  if (!raw) return null;
  try {
    const m = raw.match(/\{[\s\S]*\}/);
    if (!m) return null;
    return JSON.parse(m[0]);
  } catch(e){ return null; }
}

// 规范化 LLM 返回的 extractedMetrics：兼容字段名别名 + 数值字符串 + bloodPressure 多种脏格式
// 解决痛点：LLM 经常返回 blood_pressure / bloodsugar / 字符串数值 / [148,92] 一维数组等乱七八糟格式
function normalizeExtractedMetrics(em) {
  if (!em || typeof em !== 'object') return {};
  const out = {};
  // 字段名别名映射：把 LLM 可能吐的各种命名统一成驼峰
  const aliases = {
    blood_pressure: 'bloodPressure', bloodpressure: 'bloodPressure', bp: 'bloodPressure', systolic: 'bloodPressure', diastolic: 'bloodPressure',
    blood_sugar: 'bloodSugar', bloodsugar: 'bloodSugar', glucose: 'bloodSugar', fasting_glucose: 'bloodSugar', fastingbloodsugar: 'bloodSugar',
    cholesterol: 'cholesterol', total_cholesterol: 'cholesterol', tc: 'cholesterol', totalcholesterol: 'cholesterol',
    weight: 'weight', body_weight: 'weight', bodyweight: 'weight',
  };
  const allowed = ['bloodPressure', 'bloodSugar', 'cholesterol', 'weight'];
  Object.keys(em).forEach(k => {
    const key = aliases[k.toLowerCase()] || k;
    if (!allowed.includes(key)) return;
    const val = em[k];
    if (key === 'bloodPressure') {
      // 兼容 [[148,92]] / [148,92] / "148/92" / "148,92" 四种脏格式
      let arr = [];
      if (typeof val === 'string') {
        const parts = val.split(/[/，,]/).map(s => Number(s.trim())).filter(n => !isNaN(n));
        if (parts.length === 2) arr = [parts];
      } else if (Array.isArray(val)) {
        if (val.length === 2 && typeof val[0] === 'number') arr = [val];
        else if (Array.isArray(val[0]) && val[0].length === 2) arr = val;
      }
      if (arr.length && !isNaN(arr[0][0]) && !isNaN(arr[0][1])) out.bloodPressure = arr;
    } else {
      // 数值型字段：兼容 [5.4] / 5.4 / "5.4"
      let n;
      if (typeof val === 'number') n = val;
      else if (Array.isArray(val)) n = Number(val[0]);
      else if (typeof val === 'string') n = Number(val);
      if (!isNaN(n) && n > 0) out[key] = [n];
    }
  });
  return out;
}

// 兜底：从 abnormalItems / normalItems 里按指标名匹配数值提取
// 解决痛点：LLM 没返回 extractedMetrics 时，至少能从异常/正常指标列表里抢救出数值
function extractMetricsFromItems(analysis) {
  const out = {};
  if (!analysis) return out;
  const all = [...(analysis.abnormalItems || []), ...(analysis.normalItems || [])];
  let bpSys = null, bpDia = null;
  all.forEach(item => {
    const name = (item.name || '').toLowerCase();
    const raw = String(item.value || '');
    // 血压特殊：value 可能是 "148/92" 或 "148,92"
    if ((name.includes('血压') || name.includes('bp')) && !name.includes('收缩') && !name.includes('舒张') && !name.includes('高压') && !name.includes('低压')) {
      const m = raw.match(/(\d+)\s*[/，,]\s*(\d+)/);
      if (m) { out.bloodPressure = [[Number(m[1]), Number(m[2])]]; return; }
    }
    const val = parseFloat(raw);
    if (isNaN(val)) return;
    if (name.includes('收缩') || name.includes('高压') || name.includes('systol')) bpSys = val;
    else if (name.includes('舒张') || name.includes('低压') || name.includes('diastol')) bpDia = val;
    else if (name.includes('血糖') || name.includes('葡萄糖') || name.includes('glucose')) out.bloodSugar = [val];
    else if (name.includes('胆固醇') || name.includes('cholesterol')) out.cholesterol = [val];
    else if (name.includes('体重') || name.includes('weight') || name.includes('kg')) out.weight = [val];
  });
  // 收缩压/舒张压 分两条记录时合并
  if (bpSys != null && bpDia != null) out.bloodPressure = [[bpSys, bpDia]];
  return out;
}

async function callLlmApi(messages, imageData, onRetry) {
  const cfg = getLlmConfig();
  if (!cfg) throw new Error('LLM 未配置');
  const body = {
    model: cfg.model,
    messages: imageData
      ? [{ role: 'user', content: [ { type: 'text', text: messages[1].content }, { type: 'image_url', image_url: { url: imageData } } ] }]
      : messages,
    temperature: 0.3,
  };
  const maxRetry = 3;
  for (let i = 0; i < maxRetry; i++) {
    try {
      const res = await fetch(`${cfg.baseUrl.replace(/\/$/,'')}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.apiKey}` },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return data.choices?.[0]?.message?.content || '';
    } catch(e) {
      if (i < maxRetry - 1) {
        const delay = (i + 1) * 1500;
        onRetry && onRetry(i + 1, maxRetry, e, delay);
        await new Promise(r => setTimeout(r, delay));
      } else throw e;
    }
  }
}

// 测试连接：单次请求不重试，10s 超时，返回 { ok, msg, status }
// 不复用 callLlmApi：1) 不要 3 次重试拖时间 2) 错误要透传给用户看 3) 要快
async function testLlmConnection(cfg) {
  if (!cfg || !cfg.baseUrl || !cfg.apiKey || !cfg.model) {
    return { ok: false, status: 'config', msg: '请先填写 Base URL / API Key / 模型名' };
  }
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 30000);
  try {
    const res = await fetch(`${cfg.baseUrl.replace(/\/$/,'')}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.apiKey}` },
      body: JSON.stringify({ model: cfg.model, messages: [{ role: 'user', content: 'ping' }], max_tokens: 5 }),
      signal: controller.signal,
    });
    if (!res.ok) {
      let detail = `HTTP ${res.status}`;
      if (res.status === 401 || res.status === 403) detail = '认证失败：API Key 无效或无权限';
      else if (res.status === 404) detail = '接口路径错误：请检查 Base URL 是否包含 /v1';
      else if (res.status === 429) detail = '触发限流：请稍后重试';
      else if (res.status >= 500) detail = `服务端错误：${res.status}`;
      try { const err = await res.json(); if (err?.error?.message) detail += `（${err.error.message}）`; } catch(_) {}
      return { ok: false, status: 'http', msg: detail };
    }
    const data = await res.json();
    const content = data.choices?.[0]?.message?.content;
    if (typeof content !== 'string') return { ok: false, status: 'parse', msg: '响应格式异常：未返回有效 content' };
    return { ok: true, status: 'ok', msg: `连接成功，模型回复：${content.slice(0, 20)}` };
  } catch(e) {
    if (e.name === 'AbortError') return { ok: false, status: 'timeout', msg: '请求超时（30s），请检查网络或 Base URL' };
    return { ok: false, status: 'network', msg: `网络错误：${e.message || e}` };
  } finally {
    clearTimeout(timer);
  }
}

/* ============================================================
   4. PDF 模块（懒加载：首屏不拉 pdf.js，调用时才动态注入）
   ============================================================ */
let _pdfjsPromise = null;
function loadPdfjs() {
  if (_pdfjsPromise) return _pdfjsPromise;
  _pdfjsPromise = new Promise((resolve) => {
    if (typeof window.pdfjsLib !== 'undefined') { resolve(window.pdfjsLib); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.js';
    s.onload = () => resolve(window.pdfjsLib);
    s.onerror = () => { _pdfjsPromise = null; resolve(null); };
    document.head.appendChild(s);
  });
  return _pdfjsPromise;
}

async function pdfBase64ToImages(base64Data, maxPages = 3, onProgress) {
  try {
    const pdfjsLib = await loadPdfjs();
    if (!pdfjsLib) return null;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.js';
    const raw = atob(base64Data.split(',')[1] || base64Data);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const pages = Math.min(pdf.numPages, maxPages);
    const images = [];
    for (let i = 1; i <= pages; i++) {
      onProgress && onProgress(i, pages);
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale: 2 });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      images.push(canvas.toDataURL('image/jpeg', 0.85));
      canvas.width = 0; canvas.height = 0;
    }
    return images;
  } catch(e){ console.warn('PDF 转图失败:', e); return null; }
}

function readFileAsDataURL(file) {
  return new Promise((res) => {
    if (file.size > MAX_BASE64_SIZE) { res(null); return; }
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => res(null);
    r.readAsDataURL(file);
  });
}

}

            key={it.id}

/* ============================================================
   11. P2 仪表盘 —— 待办枢纽（动线起搏器）
   ============================================================ */
function TodoHub({ data, onNavigate, onAnalyze, onSetReminder, onOpenReport }) {
  // 聚合三池：待分析报告 + 到期/紧急提醒 + 异常成员
  const todos = useMemo(() => {
    const list = [];
    // 1. 待分析报告
    data.reports.filter(r => !r.analyzed).forEach(r => {
      const m = data.familyMembers.find(x => x.id === r.memberId);
      list.push({
        kind: 'analyze', id: `a-${r.id}`, priority: 2,
        title: `${m ? m.name : '未知'} · 报告待AI分析`,
        desc: r.name, action: () => onAnalyze(r.id),
        actionLabel: '去分析', icon: 'ph-fill ph-sparkle', color: 'primary',
      });
    });
    // 2. 提醒（紧急 + 7天内到期）
    data.reminders.filter(r => !r.completed).forEach(r => {
      const m = data.familyMembers.find(x => x.id === r.memberId);
      const days = daysBetween(today(), r.date);
      if (r.priority === 'urgent' || days <= 7) {
        list.push({
          kind: 'reminder', id: `r-${r.id}`, priority: r.priority === 'urgent' ? 3 : (days < 0 ? 3 : 2),
          title: `${m ? m.name : '未知'} · ${r.title}`,
          desc: days < 0 ? `已逾期 ${-days} 天` : (days === 0 ? '今天到期' : `${days} 天后到期`),
          overdue: days < 0, action: () => onNavigate('reminders'),
          actionLabel: '去处理', icon: days < 0 ? 'ph-fill ph-bell-ringing' : 'ph-fill ph-bell', color: days < 0 || r.priority === 'urgent' ? 'danger' : 'warning',
        });
      }
    });
    // 3. 异常成员（有 high risk 分析）
    data.familyMembers.forEach(m => {
      if (m.status === 'warning') {
        const rep = data.reports.find(r => r.memberId === m.id && r.analyzed && r.analysis);
        if (rep && rep.analysis.riskLevel === 'high') {
          list.push({
            kind: 'attention', id: `m-${m.id}`, priority: 1,
            title: `${m.name} · 检出高风险指标`,
            desc: '建议尽快复查', action: () => onOpenReport(rep.id),
            actionLabel: '查看报告', icon: 'ph-fill ph-warning-circle', color: 'danger',
          });
        }
      }
    });
    return list.sort((a, b) => b.priority - a.priority);
  }, [data]);

  if (todos.length === 0) {
    return (
      <GlassCard z={2} className="p-5 mb-6 flex items-center gap-4">
        <div className="w-11 h-11 rounded-xl bg-[rgba(16,185,129,0.12)] flex items-center justify-center"><Icon name="ph-fill ph-check-circle" size={22} className="text-accent" /></div>
        <div>
          <div className="font-semibold text-sm">今日无待办</div>
          <div className="text-xs text-[var(--text-secondary)]">家人健康状态良好，继续保持。</div>
        </div>
      </GlassCard>
    );
  }

  const colorMap = { danger: 'bg-danger', warning: 'bg-warning', primary: 'bg-primary' };

  return (
    <GlassCard z={2} className="p-5 mb-6">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <span className="relative flex h-2.5 w-2.5">
            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-danger opacity-60"></span>
            <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-danger"></span>
          </span>
          <h3 className="font-semibold text-sm">今日待办</h3>
          <span className="text-xs text-[var(--text-tertiary)] tnum">{todos.length} 项</span>
        </div>
      </div>
      <div className="flex flex-col gap-2">
        <AnimatePresence initial={false}>
          {todos.map(t => (
            <motion.div
              key={t.id}
              layout
              initial={{ opacity: 0, x: -10 }}
              animate={{ opacity: 1, x: 0 }}
              exit={{ opacity: 0, x: 10 }}
              transition={{ type: 'spring', stiffness: 400, damping: 32, duration: 0.24 }}
              className={`relative solid-surface rounded-xl p-3 pl-4 flex items-center gap-3 ${t.overdue ? 'urgent-block' : ''}`}
            >
              {/* 左侧色条 —— 紧急=红 警示=黄 普通=蓝 */}
              <span className={`todo-stripe ${colorMap[t.color]}`} />
              <div className={`w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 ${
                t.color === 'danger' ? 'bg-[rgba(239,68,68,0.12)] text-danger' :
                t.color === 'warning' ? 'bg-[rgba(245,158,11,0.12)] text-warning' :
                'bg-[rgba(14,165,233,0.12)] text-primary'
              }`}>
                <Icon name={t.icon} size={18} />
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-[var(--text-primary)] truncate">{t.title}</div>
                <div className="text-xs text-[var(--text-secondary)] truncate">{t.desc}</div>
              </div>
              <GButton size="sm" variant={t.color === 'danger' ? 'primary' : 'ghost'} onClick={t.action}>{t.actionLabel}</GButton>
            </motion.div>
          ))}
        </AnimatePresence>
      </div>
    </GlassCard>
  );
}

    if (!selectedMember) return data;
    return {
      ...data,
      reports: data.reports.filter(r => r.memberId === selectedMember),
      reminders: data.reminders.filter(r => r.memberId === selectedMember),
    };
  }, [data, selectedMember]);

  const stats = [
    { label: '家庭成员', value: data.familyMembers.length, icon: 'ph-fill ph-users-three', color: 'blue', trend: '+1 本月', onClick: () => onNavigate('members') },
    { label: '体检报告', value: filtered.reports.length, icon: 'ph-fill ph-file-text', color: 'green', trend: '本月+3', onClick: () => onNavigate('upload') },
    { label: '需关注指标', value: filtered.reports.filter(r => r.analysis?.abnormalItems?.length).reduce((s, r) => s + (r.analysis.abnormalItems?.length || 0), 0), icon: 'ph-fill ph-warning-circle', color: 'orange', trend: '改善中', onClick: () => onNavigate('trends') },
    { label: '待处理提醒', value: filtered.reminders.filter(r => !r.completed).length, icon: 'ph-fill ph-bell-ringing', color: 'red', trend: `${filtered.reminders.filter(r => r.priority === 'urgent' && !r.completed).length}项紧急`, onClick: () => onNavigate('reminders') },

  const recent = [...data.reports].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 4);

  return (
    <div>
      {/* P2 待办枢纽 —— 置顶，动线起搏器 */}
      <TodoHub data={filtered} onNavigate={onNavigate} onAnalyze={onAnalyze} onSetReminder={onSetReminder} onOpenReport={onOpenReport} />

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        {stats.map((s, i) => (
          <motion.div
            key={s.label}
            initial={{ opacity: 0, y: 16 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ delay: i * 0.05, type: 'spring', stiffness: 300, damping: 28, duration: 0.4 }}
          >
            <GlassCard z={1} className="p-5 cursor-pointer hover:-translate-y-1.5 transition-transform" onClick={s.onClick}>
              <div className="flex justify-between items-start mb-3">
                <div className={`w-11 h-11 rounded-xl flex items-center justify-center ${bgMap[s.color]}`}>
                  <Icon name={s.icon} size={20} className={colorMap[s.color]} />
                </div>
                <span className="text-xs font-semibold text-[var(--text-tertiary)]">{s.trend}</span>
              </div>
              <div className="text-3xl font-bold tnum text-[var(--text-primary)]">{s.value}</div>
              <div className="text-xs text-[var(--text-secondary)] mt-1">{s.label}</div>
            </GlassCard>
          </motion.div>
        ))}
      </div>

      {/* 最近活动 */}
      <GlassCard z={1} className="p-6">
        <div className="flex justify-between items-center mb-4">
          <h3 className="font-semibold text-base">最近活动</h3>
          <button onClick={() => onNavigate('upload')} className="text-xs text-primary font-medium">查看全部 →</button>
        </div>
        {recent.length === 0 ? (
          <div className="text-center py-8 text-[var(--text-tertiary)] text-sm">暂无活动记录</div>
        ) : (
          <div className="flex flex-col gap-2">
            {recent.map(r => {
              const m = data.familyMembers.find(x => x.id === r.memberId);
              return (
                <div key={r.id} className="solid-surface rounded-xl p-3 flex items-center gap-3">
                  <div className="w-9 h-9 rounded-lg bg-[rgba(16,185,129,0.12)] flex items-center justify-center"><Icon name="ph-fill ph-activity" size={16} className="text-accent" /></div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium truncate">{m ? m.name : '未知'} 上传了《{r.name}》</div>
                    <div className="text-xs text-[var(--text-tertiary)]">{r.date}</div>
                  </div>
                  <span className={`text-xs px-2 py-1 rounded-md ${r.analyzed ? 'bg-[rgba(16,185,129,0.12)] text-accent' : 'bg-[rgba(245,158,11,0.12)] text-warning'}`}>
                    {r.analyzed ? '已分析' : '待分析'}

                </div>
              );
            })}
          </div>
        )}
      </GlassCard>
    </div>
  );
}

/* ============================================================
   14. 上传模块 —— P0 双轨动线统一（模板模式也自动分析）
   ============================================================ */
function UploadSection({ data, selectedMember, onFiles, onAnalyze, onOpenReport, onDeleteReport }) {
  const fileRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);
  const [search, setSearch] = useState('');
  const ownerId = selectedMember || (data.familyMembers[0] && data.familyMembers[0].id);
  const reports = data.reports.filter(r => !selectedMember || r.memberId === selectedMember).filter(r => r.name.toLowerCase().includes(search.toLowerCase()));
  const unanalyzed = reports.filter(r => !r.analyzed);

  const handleFiles = (files) => {
    if (!files || !files.length) return;
    if (!data.familyMembers.length) { alert('请先添加家庭成员'); return; }
    const valid = [];
    for (const f of files) {
      const ext = getExt(f.name);
      if (!ALLOWED_EXT.includes(ext)) { continue; }
      if (f.size > MAX_FILE_SIZE) { continue; }
      valid.push(f);
    }
    if (valid.length) onFiles(valid, ownerId);
  };

  return (
    <div>
      <div className="mb-4 flex items-center gap-2 text-xs text-[var(--text-tertiary)]">
        <Icon name="ph ph-info" size={14} className="text-primary" />
        <span>{data._mode === 'template' ? '模板模式：上传后自动生成模板分析（评委体验路径）' : '真实模式：上传后自动调用 AI 分析（需配置模型）'}</span>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        {/* 上传区 Z1 + 拖拽只改边缘高光（禁忌 4.5） */}
        <GlassCard z={1} className={`p-8 text-center cursor-pointer transition-all ${dragOver ? 'drop-active' : 'hover:-translate-y-1'}`}
          onClick={() => fileRef.current?.click()}
          onDragEnter={(e) => { e.preventDefault(); setDragOver(true); }}
          onDragOver={(e) => e.preventDefault()}
          onDragLeave={(e) => { e.preventDefault(); setDragOver(false); }}
          onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
        >
          <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-[rgba(14,165,233,0.1)] flex items-center justify-center"><Icon name="ph-fill ph-upload-simple" size={32} className="text-primary" /></div>
          <div className="text-lg font-semibold mb-1">上传体检报告</div>
          <div className="text-sm text-[var(--text-secondary)] mb-4">点击或拖拽文件到此处</div>
          <div className="text-left mb-4">
            <label className="text-xs font-medium text-[var(--text-secondary)] block mb-1.5">归属成员</label>
            <select id="uploadOwnerSelect" defaultValue={ownerId} className="w-full max-w-[280px] solid-surface rounded-xl px-3 py-2.5 text-sm border border-[var(--tag-bg)]" onClick={(e) => e.stopPropagation()} onChange={(e) => {}}>
              {data.familyMembers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
            </select>
          </div>
          <GButton variant="primary" onClick={(e) => { e.stopPropagation(); fileRef.current?.click(); }}><Icon name="ph-fill ph-upload-simple" size={14} /> 选择文件</GButton>
          <div className="flex justify-center gap-2 mt-4">
            {['PDF', 'JPG', 'PNG', '最大10MB'].map(f => <span key={f} className="text-xs px-3 py-1 rounded-md bg-[var(--tag-bg)] text-[var(--text-secondary)]">{f}</span>)}
          </div>
          <input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg,.png" multiple className="hidden" onChange={(e) => { handleFiles(e.target.files); e.target.value = ''; }} />
        </GlassCard>

        {/* 报告列表 Z1 */}
        <GlassCard z={1} className="p-5">
          <div className="flex justify-between items-center mb-3">
            <h3 className="font-semibold text-sm">已上传报告</h3>
            <span className="text-xs text-[var(--text-tertiary)] tnum">共 {reports.length} 份</span>
          </div>
          {unanalyzed.length > 1 && (
            <GButton size="sm" variant="success" className="mb-2" onClick={() => unanalyzed.forEach(r => onAnalyze(r.id))}>
              <Icon name="ph ph-sparkle" size={14} /> 批量分析（{unanalyzed.length}份）
            </GButton>
          )}
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="搜索报告..." className="w-full solid-surface rounded-lg px-3 py-2 text-xs mb-3 border border-[var(--tag-bg)]" />
          {reports.length === 0 ? (
            <div className="text-center py-8 text-[var(--text-tertiary)] text-sm">还没有上传任何报告</div>
          ) : (
            <div className="flex flex-col gap-2 max-h-[400px] overflow-y-auto">
              {reports.map(r => {
                const m = data.familyMembers.find(x => x.id === r.memberId);
                return (
                  <div key={r.id} className="solid-surface rounded-xl p-3 flex items-center gap-3">
                    <div className="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 relative bg-[rgba(14,165,233,0.1)]">
                      <Icon name={fileIcon(r.fileName || r.name)} size={18} className="text-primary" />
                      {r.analyzed && <span className="absolute -top-1 -right-1 w-3.5 h-3.5 rounded-full bg-accent flex items-center justify-center"><Icon name="ph-fill ph-check" size={8} className="text-white" /></span>}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium truncate">{r.name}</div>
                      <div className="text-xs text-[var(--text-tertiary)] flex gap-2 items-center">
                        <span>{r.date}</span>
                        <span className="px-1.5 py-0.5 rounded bg-[rgba(14,165,233,0.1)] text-primary text-[10px]">{m ? m.name : '未知'}</span>
                      </div>
                    </div>
                    <div className="flex gap-1">
                      <GButton size="sm" variant="ghost" onClick={() => onOpenReport(r.id)}>查看</GButton>
                      {r.analyzed ? <GButton size="sm" variant="ghost" onClick={() => onAnalyze(r.id)}><Icon name="ph ph-arrow-clockwise" size={12} /></GButton> : <GButton size="sm" variant="primary" onClick={() => onAnalyze(r.id)}><Icon name="ph ph-sparkle" size={12} /> 分析</GButton>}
                      <GButton size="sm" variant="danger" onClick={() => onDeleteReport(r.id)}><Icon name="ph ph-trash" size={12} /></GButton>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </GlassCard>
      </div>
    </div>
  );
}

/* ============================================================
   15. AI 分析模块 —— 列表（健康洞察视角）+ 详情双视图
   不再是"随机一份报告"，而是列表全景 + 点击进详情

// 分析详情子组件：复用原单份报告展示逻辑，加返回按钮
function AnalysisDetail({ report, data, onReanalyze, onSetReminder, onBack }) {
  const member = data.familyMembers.find(m => m.id === report.memberId);
  const a = report.analysis;
  const riskColor = { low: 'text-accent', medium: 'text-warning', high: 'text-danger' }[a.riskLevel] || 'text-[var(--text-secondary)]';
  const riskBg = { low: 'bg-[rgba(16,185,129,0.12)]', medium: 'bg-[rgba(245,158,11,0.12)]', high: 'bg-[rgba(239,68,68,0.12)]' }[a.riskLevel] || 'bg-[var(--tag-bg)]';
  const riskLabel = { low: '低风险', medium: '中风险', high: '高风险' }[a.riskLevel] || '未知';
  const sourceLabel = a._source === 'llm' ? 'AI 实时分析' : '模板分析';
  return (
    <div className="relative pb-28">
      {/* 返回按钮 + 面包屑：明确告诉用户"这是某份报告的详情" */}
      <div className="flex items-center gap-2 mb-4 text-sm">
        <button onClick={onBack} className="flex items-center gap-1 text-[var(--text-secondary)] hover:text-primary transition">
          <Icon name="ph ph-arrow-left" size={14} /> 返回分析列表
        </button>
      </div>
      <GlassCard z={1} className="p-6">
        <div className="flex items-center gap-3 mb-5">
          <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary to-[#06B6D4] flex items-center justify-center"><Icon name="ph-fill ph-sparkle" size={22} className="text-white" /></div>
          <div className="flex-1">
            <h3 className="font-semibold text-base flex items-center gap-2">{report.name}
              <span className={`text-xs px-2 py-0.5 rounded-md ${a._source === 'llm' ? 'bg-[rgba(16,185,129,0.12)] text-accent' : 'bg-[rgba(14,165,233,0.12)] text-primary'}`}>{sourceLabel}</span>
            </h3>
            <div className="text-xs text-[var(--text-tertiary)]">分析对象：{member ? member.name : '未知'} · 检查日期 {a.examDate || report.date}</div>
          </div>
          <GButton size="sm" variant="ghost" onClick={() => onReanalyze(report.id)}><Icon name="ph ph-arrow-clockwise" size={12} /> 重新分析</GButton>
        </div>
        <div className="solid-surface rounded-2xl p-5 mb-4">
          <div className="flex items-center justify-between mb-3">
            <div className="text-sm font-semibold">总体结论</div>
            <span className={`text-xs px-2.5 py-1 rounded-md font-medium ${riskBg} ${riskColor}`}>{riskLabel}</span>
          </div>
          <p className="text-sm text-[var(--text-primary)] leading-relaxed">{a.summary}</p>
        </div>
        {a.abnormalItems && a.abnormalItems.length > 0 && (
          <div className="solid-surface rounded-2xl p-5 mb-4">
            <div className="text-sm font-semibold mb-3 flex items-center gap-2"><Icon name="ph-fill ph-warning-circle" size={16} className="text-danger" /> 异常指标 ({a.abnormalItems.length})</div>
            <div className="flex flex-col gap-2">
              {a.abnormalItems.map((it, i) => {
                const sev = { low: 'warn-block text-warning', medium: 'urgent-block text-danger', high: 'urgent-block text-danger' }[it.severity] || 'bg-[var(--tag-bg)]';
                return (
                  <div key={i} className={`rounded-xl p-3 ${sev.split(' ')[0]}`}>
                    <div className="flex justify-between items-start mb-1">
                      <div className="font-medium text-sm">{it.name}</div>
                      <div className="tnum font-bold text-sm">{it.value} <span className="text-xs font-normal text-[var(--text-tertiary)]">{it.unit}</span></div>
                    </div>
                    <div className="text-xs text-[var(--text-tertiary)] mb-1.5">参考范围：{it.ref}</div>
                    <div className="text-xs text-[var(--text-secondary)]">{it.advice}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {a.normalItems && a.normalItems.length > 0 && (
          <div className="solid-surface rounded-2xl p-5 mb-4">
            <div className="text-sm font-semibold mb-3 flex items-center gap-2"><Icon name="ph-fill ph-check-circle" size={16} className="text-accent" /> 正常指标</div>
            <div className="grid grid-cols-2 gap-2">
              {a.normalItems.map((it, i) => (
                <div key={i} className="rounded-lg p-2.5 bg-[var(--solid-surface-2)]">
                  <div className="text-xs text-[var(--text-secondary)]">{it.name}</div>
                  <div className="text-sm font-medium tnum">{it.value} {it.unit}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div className="solid-surface rounded-2xl p-5">
          <div className="text-sm font-semibold mb-3">健康建议</div>
          <ul className="flex flex-col gap-1.5">
            {a.recommendations.map((r, i) => (
              <li key={i} className="text-sm text-[var(--text-primary)] flex gap-2"><span className="text-primary font-bold">{i+1}.</span> {r}</li>
            ))}
          </ul>
        </div>
      </GlassCard>
      {a.abnormalItems && a.abnormalItems.length > 0 && (
        <motion.div
          initial={{ y: 80, opacity: 0 }}
          animate={{ y: 0, opacity: 1 }}
          transition={{ type: 'spring', stiffness: 300, damping: 30, duration: 0.4 }}
          className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[min(680px,calc(100vw-32px))] glass-z2 is-expanded p-4 z-50 flex items-center gap-3"
        >
          <div className="w-10 h-10 rounded-xl bg-[rgba(245,158,11,0.15)] flex items-center justify-center flex-shrink-0"><Icon name="ph-fill ph-bell-ringing" size={20} className="text-warning" /></div>
          <div className="flex-1 min-w-0">
            <div className="text-sm font-semibold">检出 {a.abnormalItems.length} 项异常指标</div>
            <div className="text-xs text-[var(--text-secondary)]">建议 3 个月后复查，系统代你记住</div>
          </div>
          <GButton variant="primary" onClick={() => onSetReminder(member, a.abnormalItems, report)}>
            <Icon name="ph ph-bell" size={14} /> 设置复查提醒
          </GButton>
        </motion.div>
      )}
    </div>
  );
}

function AnalysisSection({ data, analyzing, analysisReportId, onReanalyze, onSetReminder, onNavigate, onViewReport, viewMode, onBackToList }) {
  // analyzing 状态优先：正在分析时显示 loading，覆盖一切
  if (analyzing) {
    return (
      <GlassCard z={1} className="p-10 text-center">
        <motion.div animate={{ rotate: 360 }} transition={{ repeat: Infinity, duration: 1.2, ease: 'linear' }} className="w-12 h-12 mx-auto mb-4 rounded-full border-4 border-[var(--tag-bg)] border-t-primary" />
        <p className="text-sm text-[var(--text-secondary)]">AI 正在分析报告，请稍候…</p>
      </GlassCard>
    );
  }

  // 详情视图：viewMode === 'detail' 或有指定 analysisReportId
  if (viewMode === 'detail' && analysisReportId) {
    const report = data.reports.find(r => r.id === analysisReportId);
    if (report && report.analyzed && report.analysis) {
      return <AnalysisDetail report={report} data={data} onReanalyze={onReanalyze} onSetReminder={onSetReminder} onBack={onBackToList} />;
    }
  }

  // 列表视图：健康洞察视角，只显示已分析的，按风险优先级排序
  const analyzedReports = data.reports
    .filter(r => r.analyzed && r.analysis)
    .sort((a, b) => {
      const order = { high: 0, medium: 1, low: 2 };
      return (order[a.analysis.riskLevel] ?? 3) - (order[b.analysis.riskLevel] ?? 3);
    });

  if (analyzedReports.length === 0) {
    return (
      <GlassCard z={1} className="p-10 text-center">
        <div className="text-5xl opacity-40 mb-3"><Icon name="ph-fill ph-magnifying-glass" size={64} /></div>
        <p className="text-sm text-[var(--text-secondary)] mb-4">还没有 AI 分析结果，先上传报告吧</p>
        <GButton variant="primary" onClick={() => onNavigate('upload')}><Icon name="ph ph-upload-simple" size={14} /> 上传报告</GButton>
      </GlassCard>
    );
  }

  // 列表卡片：风险色块 + 异常数大数字 + AI 摘要，跟上传统计页的文件列表完全不同
  return (
    <div>
      <div className="mb-4 flex items-center justify-between">
        <div>
          <h3 className="font-semibold text-base">AI 分析结果</h3>
          <div className="text-xs text-[var(--text-tertiary)] mt-0.5">共 {analyzedReports.length} 份已分析报告，按风险优先级排序</div>
        </div>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {analyzedReports.map(r => {
          const m = data.familyMembers.find(x => x.id === r.memberId);
          const a = r.analysis;
          const riskColor = { low: 'text-accent', medium: 'text-warning', high: 'text-danger' }[a.riskLevel] || 'text-[var(--text-secondary)]';
          const riskBg = { low: 'bg-[rgba(16,185,129,0.12)]', medium: 'bg-[rgba(245,158,11,0.12)]', high: 'bg-[rgba(239,68,68,0.12)]' }[a.riskLevel] || 'bg-[var(--tag-bg)]';
          const riskLabel = { low: '低风险', medium: '中风险', high: '高风险' }[a.riskLevel] || '未知';
          const riskStripe = { low: 'bg-accent', medium: 'bg-warning', high: 'bg-danger' }[a.riskLevel] || 'bg-[var(--text-tertiary)]';
          const abnormalCount = (a.abnormalItems || []).length;
          return (
            <motion.div key={r.id} whileHover={{ y: -2 }} transition={{ type: 'spring', stiffness: 400, damping: 25 }} onClick={() => onViewReport(r.id)} className="cursor-pointer">
              <GlassCard z={1} className="p-5 hover:shadow-glass-z2 transition-shadow">
                {/* 左侧风险色条 —— 风险等级一眼可见 */}
                <div className="flex items-start gap-4">
                  <div className={`w-1 self-stretch rounded-full ${riskStripe} flex-shrink-0`} style={{ minHeight: 80 }} />
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between mb-2">
                      <div className="text-sm font-semibold truncate">{m ? m.name : '未知'} · {a.examDate || r.date}</div>
                      <span className={`text-xs px-2 py-0.5 rounded-md font-medium ${riskBg} ${riskColor} flex-shrink-0 ml-2`}>{riskLabel}</span>
                    </div>
                    <div className="text-xs text-[var(--text-tertiary)] mb-3 truncate">{r.name}</div>
                    {/* 异常数大数字 —— 健康洞察视角的核心 */}
                    <div className="flex items-end gap-3 mb-2">
                      <div className={`${riskColor} tnum font-bold text-3xl leading-none`}>{abnormalCount}</div>
                      <div className="text-xs text-[var(--text-secondary)] pb-0.5">项异常指标</div>
                    </div>
                    <p className="text-xs text-[var(--text-secondary)] line-clamp-2 leading-relaxed">{a.summary}</p>
                  </div>
                </div>
              </GlassCard>
            </motion.div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   16. 趋势模块（图表禁玻璃 4.1）
   ============================================================ */
function TrendsSection({ data, selectedMember, onAddRecord, onAddMetric }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const [metric, setMetric] = useState('bloodPressure');
  const [memberId, setMemberId] = useState(selectedMember || (data.familyMembers[0] && data.familyMembers[0].id));
  // 预设指标 + 自定义指标合并 —— 用户可在「管理指标」里新增任意指标
  const presetMetrics = [
    { id: 'bloodPressure', name: '血压', unit: 'mmHg', type: 'dual', labels: ['收缩压', '舒张压'] },
    { id: 'bloodSugar', name: '血糖', unit: 'mmol/L', type: 'single' },
    { id: 'cholesterol', name: '胆固醇', unit: 'mmol/L', type: 'single' },
    { id: 'weight', name: '体重', unit: 'kg', type: 'single' },
  ];
  const allMetrics = [...presetMetrics, ...(data.customMetrics || [])];
  const metrics = allMetrics.map(m => ({ id: m.id, label: m.name }));

  const chartData = data.chartData[memberId];
  const availableMetrics = metrics.filter(m => chartData && chartData[m.id]);

  useEffect(() => {
    if (!chartData || !chartData[metric] || !canvasRef.current) return;
    const cfg = chartData[metric];
    let cancelled = false;
    // 懒加载 Chart.js：加载完才画图，避免首屏拉取 Chart.js
    loadChartjs().then((Chart) => {
      if (cancelled || !Chart || !canvasRef.current) return;
      if (chartRef.current) chartRef.current.destroy();
      const ctx = canvasRef.current.getContext('2d');
      const colors = ['#0EA5E9', '#10B981', '#F59E0B', '#EF4444'];
      const datasets = cfg.datasets.map((ds, i) => ({
        label: ds.name, data: ds.data, borderColor: colors[i], backgroundColor: colors[i] + '20', tension: 0.35, fill: true, pointRadius: 4, pointHoverRadius: 6, borderWidth: 2.5,
      }));
      chartRef.current = new Chart(ctx, {
        type: 'line',
        data: { labels: cfg.labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { font: { family: 'Figtree', size: 12 }, color: '#475569' } },
            tooltip: { backgroundColor: 'rgba(15,23,42,0.92)', padding: 12, cornerRadius: 10, titleFont: { family: 'Figtree' }, bodyFont: { family: 'Figtree' } },
          },
          scales: {
            x: { grid: { color: 'rgba(148,163,184,0.1)' }, ticks: { color: '#94A3B8', font: { family: 'Figtree', size: 11 } } },
            y: { grid: { color: 'rgba(148,163,184,0.1)' }, ticks: { color: '#94A3B8', font: { family: 'Figtree', size: 11 } } },
          },
        },
      });
    });
    return () => { cancelled = true; if (chartRef.current) chartRef.current.destroy(); };
  }, [chartData, metric, memberId]);

  return (
    <GlassCard z={1} className="p-6">
      <div className="flex justify-between items-center flex-wrap gap-3 mb-4">
        <h3 className="font-semibold text-base">健康指标趋势</h3>
        <div className="flex gap-2 items-center">
          <select value={memberId} onChange={(e) => setMemberId(+e.target.value)} className="solid-surface rounded-lg px-3 py-2 text-xs border border-[var(--tag-bg)]">
            {data.familyMembers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
          </select>
          <GButton size="sm" variant="primary" onClick={onAddRecord}><Icon name="ph ph-plus" size={14} /> 录入数据</GButton>
          <GButton size="sm" variant="ghost" onClick={onAddMetric}><Icon name="ph ph-gear" size={14} /> 自定义指标</GButton>
        </div>
      </div>
      {/* 图表区禁玻璃：实底 chart-surface */}
      <div className="flex gap-2 mb-4 flex-wrap">
        {availableMetrics.map(m => (
          <button key={m.id} onClick={() => setMetric(m.id)} className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${metric === m.id ? 'bg-primary text-white' : 'bg-[var(--tag-bg)] text-[var(--text-secondary)]'}`}>{m.label}</button>
        ))}
        {availableMetrics.length === 0 && <span className="text-xs text-[var(--text-tertiary)]">该成员暂无趋势数据</span>}
      </div>
      <div className="chart-surface p-4" style={{ height: 360 }}>
        <canvas ref={canvasRef} />
      </div>
    </GlassCard>
  );
}

/* ============================================================
   17. 提醒模块 —— 状态机：待办/逾期/已完成
   ============================================================ */
function RemindersSection({ data, selectedMember, onAdd, onToggle, onDelete }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  let list = data.reminders.filter(r => !selectedMember || r.memberId === selectedMember);
  if (filter === 'pending') list = list.filter(r => !r.completed);
  if (filter === 'urgent') list = list.filter(r => r.priority === 'urgent' && !r.completed);
  if (filter === 'overdue') list = list.filter(r => !r.completed && daysBetween(today(), r.date) < 0);
  if (filter === 'completed') list = list.filter(r => r.completed);
  if (search) list = list.filter(r => r.title.toLowerCase().includes(search.toLowerCase()));

  const filters = [
    { id: 'all', label: '全部' }, { id: 'pending', label: '待办' }, { id: 'urgent', label: '紧急' }, { id: 'overdue', label: '已过期' }, { id: 'completed', label: '已完成' },
  ];

  return (
    <GlassCard z={1} className="p-6">
      <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
        <h3 className="font-semibold text-base">健康提醒</h3>
        <div className="flex items-center gap-2">
          <span className="text-xs text-[var(--text-tertiary)] tnum">共 {list.length} 条</span>
          <GButton size="sm" variant="primary" onClick={onAdd}><Icon name="ph ph-plus" size={14} /> 添加提醒</GButton>
        </div>
      </div>
      <div className="flex gap-1.5 mb-3 flex-wrap">
        {filters.map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)} className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${filter === f.id ? 'bg-primary text-white' : 'bg-[var(--tag-bg)] text-[var(--text-secondary)]'}`}>{f.label}</button>
        ))}
        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="搜索提醒..." className="flex-1 min-w-[120px] solid-surface rounded-lg px-3 py-1.5 text-xs border border-[var(--tag-bg)]" />
      </div>
      {list.length === 0 ? (
        <div className="text-center py-8 text-[var(--text-tertiary)] text-sm">暂无提醒</div>
      ) : (
        <div className="flex flex-col gap-2">
          {list.map(r => {
            const m = data.familyMembers.find(x => x.id === r.memberId);
            const days = daysBetween(today(), r.date);
            const overdue = !r.completed && days < 0;
            const urgent = r.priority === 'urgent' && !r.completed;
            return (
              <motion.div key={r.id} layout initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }} className={`solid-surface rounded-xl p-3 flex items-center gap-3 ${overdue ? 'urgent-block' : urgent ? 'warn-block' : ''}`}>
                <div className={`w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 ${r.completed ? 'bg-[var(--tag-bg)]' : overdue ? 'bg-[rgba(239,68,68,0.12)] text-danger' : urgent ? 'bg-[rgba(245,158,11,0.12)] text-warning' : 'bg-[rgba(14,165,233,0.12)] text-primary'}`}>
                  <Icon name={r.completed ? 'ph-fill ph-check-circle' : overdue ? 'ph-fill ph-bell-ringing' : 'ph-fill ph-bell'} size={16} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className={`text-sm font-medium truncate ${r.completed ? 'line-through text-[var(--text-tertiary)]' : ''}`}>{r.title}</div>
                  <div className="text-xs text-[var(--text-tertiary)] flex gap-2 items-center">
                    <span>{m ? m.name : '未知'}</span>
                    <span>·</span>
                    <span>{r.date}</span>
                    {!r.completed && days >= 0 && days <= 7 && <span className="px-1.5 py-0.5 rounded bg-[rgba(245,158,11,0.12)] text-warning text-[10px]">{days === 0 ? '今天' : `${days}天后`}</span>}
                    {overdue && <span className="px-1.5 py-0.5 rounded bg-[rgba(239,68,68,0.12)] text-danger text-[10px]">逾期{-days}天</span>}
                  </div>
                </div>
                <div className="flex gap-1">
                  <GButton size="sm" variant="ghost" onClick={() => onToggle(r.id)}>{r.completed ? '恢复' : '完成'}</GButton>
                  <GButton size="sm" variant="danger" onClick={() => onDelete(r.id)}><Icon name="ph ph-trash" size={12} /></GButton>
                </div>
              </motion.div>
            );
          })}
        </div>
      )}
    </GlassCard>
  );
}

/* ============================================================
   18. Modals：添加成员 / 添加提醒 / LLM设置 / 数据管理
   ============================================================ */
function AddMemberModal({ open, onClose, onAdd }) {
  const [name, setName] = useState('');
  const [age, setAge] = useState('');
  const [gender, setGender] = useState('男');
  const [relation, setRelation] = useState('本人');
  const submit = () => { if (!name) return; onAdd({ name, age: +age || 0, gender, relation, avatarColor: ['blue','pink','green','teal'][Math.floor(Math.random()*4)] }); setName(''); setAge(''); onClose(); };
  return (
    <Modal open={open} title="添加家庭成员" onClose={onClose} footer={<><GButton variant="ghost" onClick={onClose}>取消</GButton><GButton variant="primary" onClick={submit}>添加</GButton></>}>
      <div className="flex flex-col gap-3">
        <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">姓名</label><input value={name} onChange={(e) => setName(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" placeholder="请输入姓名" /></div>
        <div className="grid grid-cols-2 gap-3">
          <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">年龄</label><input type="number" value={age} onChange={(e) => setAge(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" placeholder="年龄" /></div>
          <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">性别</label><select value={gender} onChange={(e) => setGender(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]"><option>男</option><option>女</option></select></div>
        </div>
        <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">关系</label><select value={relation} onChange={(e) => setRelation(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]"><option>本人</option><option>父亲</option><option>母亲</option><option>伴侣</option><option>子女</option><option>其他</option></select></div>
      </div>
    </Modal>
  );
}

function AddReminderModal({ open, onClose, onAdd, prefill, members }) {
  const [memberId, setMemberId] = useState(prefill?.memberId || (members[0] && members[0].id));
  const [title, setTitle] = useState(prefill?.title || '');
  const [desc, setDesc] = useState(prefill?.desc || '');
  const [date, setDate] = useState(prefill?.date || addDays(today(), 90));
  const [priority, setPriority] = useState(prefill?.priority || 'normal');
  useEffect(() => {
    if (open && prefill) { setMemberId(prefill.memberId); setTitle(prefill.title || ''); setDesc(prefill.desc || ''); setDate(prefill.date || addDays(today(), 90)); setPriority(prefill.priority || 'normal'); }
  }, [open, prefill]);
  const submit = () => { if (!title) return; onAdd({ memberId: +memberId, title, desc, date, priority, repeat: 'none', completed: false, category: '复查' }); onClose(); };
  return (
    <Modal open={open} title="添加健康提醒" onClose={onClose} footer={<><GButton variant="ghost" onClick={onClose}>取消</GButton><GButton variant="primary" onClick={submit}>添加</GButton></>}>
      <div className="flex flex-col gap-3">
        <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">归属成员</label><select value={memberId} onChange={(e) => setMemberId(+e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]">{members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
        <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">标题</label><input value={title} onChange={(e) => setTitle(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" placeholder="如：血压复查" /></div>
        <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">描述</label><input value={desc} onChange={(e) => setDesc(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" placeholder="详细说明" /></div>
        <div className="grid grid-cols-2 gap-3">
          <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">日期</label><input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" /></div>

// 手动录入健康指标弹窗 —— 兜底手段：AI 没识别出来时用户自己录，保证趋势图有数据
function AddRecordModal({ open, onClose, onAdd, members, defaultMemberId, allMetrics }) {
  const [memberId, setMemberId] = useState(defaultMemberId || (members[0] && members[0].id));
  const [metricId, setMetricId] = useState('bloodPressure');
  const [systolic, setSystolic] = useState('');
  const [diastolic, setDiastolic] = useState('');
  const [value, setValue] = useState('');
  const [date, setDate] = useState(today());
  useEffect(() => { if (open && defaultMemberId) setMemberId(defaultMemberId); }, [open, defaultMemberId]);
  // 从 props 拿全部指标（预设+自定义），不再写死
  const metricOptions = allMetrics || [
    { id: 'bloodPressure', name: '血压', unit: 'mmHg', type: 'dual', labels: ['收缩压', '舒张压'] },
    { id: 'bloodSugar', name: '血糖', unit: 'mmol/L', type: 'single' },
    { id: 'cholesterol', name: '胆固醇', unit: 'mmol/L', type: 'single' },
    { id: 'weight', name: '体重', unit: 'kg', type: 'single' },
  ];
  const cur = metricOptions.find(m => m.id === metricId) || metricOptions[0];
  const isDual = cur && cur.type === 'dual';
  const submit = () => {
    if (isDual) {
      const s = Number(systolic), d = Number(diastolic);
      if (!s || !d) return;
      onAdd({ memberId: +memberId, metric: metricId, value: [s, d], date });
    } else {
      const v = Number(value);
      if (!v) return;
      onAdd({ memberId: +memberId, metric: metricId, value: v, date });
    }
    setSystolic(''); setDiastolic(''); setValue('');
    onClose();
  };
  return (
    <Modal open={open} title="录入健康指标" onClose={onClose} footer={<><GButton variant="ghost" onClick={onClose}>取消</GButton><GButton variant="primary" onClick={submit}>保存</GButton></>}>
      <div className="flex flex-col gap-3">
        <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">归属成员</label><select value={memberId} onChange={(e) => setMemberId(+e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]">{members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
        <div>
          <label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">指标类型</label>
          <div className="flex gap-2 flex-wrap">{metricOptions.map(m => <button key={m.id} onClick={() => setMetricId(m.id)} className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${metricId === m.id ? 'bg-primary text-white' : 'bg-[var(--tag-bg)] text-[var(--text-secondary)]'}`}>{m.name}</button>)}</div>
        </div>
        {isDual ? (
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">{(cur.labels && cur.labels[0]) || '主值'} ({cur.unit || '-'})</label><input type="number" value={systolic} onChange={(e) => setSystolic(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" placeholder="如 120" /></div>
            <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">{(cur.labels && cur.labels[1]) || '副值'} ({cur.unit || '-'})</label><input type="number" value={diastolic} onChange={(e) => setDiastolic(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" placeholder="如 80" /></div>
          </div>
        ) : (
          <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">{cur.name} ({cur.unit || '-'})</label><input type="number" step="0.1" value={value} onChange={(e) => setValue(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" placeholder="如 5.4" /></div>
        )}
        <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">测量日期</label><input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" /></div>
      </div>
    </Modal>
  );
}

// 自定义指标弹窗 —— 用户可新增任意指标（尿酸/心率/体温...），支持单值/双值类型
function AddMetricModal({ open, onClose, onAdd, existingMetrics }) {
  const [name, setName] = useState('');
  const [unit, setUnit] = useState('');

  const [label1, setLabel1] = useState('');  // dual 类型的主标签（如收缩压）
  const [label2, setLabel2] = useState('');  // dual 类型的副标签（如舒张压）
  const submit = () => {
    if (!name.trim()) return;
    // 防重名：同名牌子直接拒绝
    if (existingMetrics.some(m => m.name === name.trim())) { return; }
    const metric = {
      id: 'custom_' + Date.now(),
      name: name.trim(),
      unit: unit.trim() || '',
      type,
      labels: type === 'dual' ? [label1.trim() || '主', label2.trim() || '副'] : null,
      isCustom: true,
    };
    onAdd(metric);
    setName(''); setUnit(''); setLabel1(''); setLabel2(''); setType('single');
    onClose();

  return (
    <Modal open={open} title="自定义指标" onClose={onClose} footer={<><GButton variant="ghost" onClick={onClose}>取消</GButton><GButton variant="primary" onClick={submit}>添加</GButton></>}>

            <div><label className="text-xs font-medium text-[var(--text-secondary)] block mb-1">副值标签</label><input value={label2} onChange={(e) => setLabel2(e.target.value)} className="w-full solid-surface rounded-lg px-3 py-2.5 text-sm border border-[var(--tag-bg)]" placeholder="如 舒张压" /></div>
