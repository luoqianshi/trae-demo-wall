/* ============================================================
   19. App 主组件
   ============================================================ */
function App() {
  const [mode, setMode] = useState(() => localStorage.getItem(MODE_KEY) || 'template');
  const [data, setData] = useState(() => {
    const key = localStorage.getItem(MODE_KEY) === 'real' ? STORAGE_REAL : STORAGE_TEMPLATE;
    try {
      const p = JSON.parse(localStorage.getItem(key));
      if (p && p.familyMembers && p.familyMembers.length) return { ...p, customMetrics: p.customMetrics || [], _mode: localStorage.getItem(MODE_KEY) || 'template' };
    } catch(e){}
    const d = buildDefaultData(); d._mode = 'template'; return d;
  });
  const [section, setSection] = useState('dashboard');
  const [selectedMember, setSelectedMember] = useState(null);
  const [theme, setTheme] = useState(() => localStorage.getItem(STORAGE_THEME) || 'light');
  const [toasts, setToasts] = useState([]);
  const [analyzing, setAnalyzing] = useState(false);
  const [analysisReportId, setAnalysisReportId] = useState(null);
  const [analysisViewMode, setAnalysisViewMode] = useState('list');
  const [reminderPrefill, setReminderPrefill] = useState(null);
  const [recordDefaultMemberId, setRecordDefaultMemberId] = useState(null);

  // Modals
  const [modals, setModals] = useState({ addMember: false, addReminder: false, addRecord: false, addMetric: false, llm: false, data: false });

  // dataRef：解决 analyzeReport 在 setTimeout 中拿到 stale data 的闭包陷阱
  const dataRef = useRef(data);
  useEffect(() => { dataRef.current = data; }, [data]);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(STORAGE_THEME, theme);
  }, [theme]);

  // Toast（前置定义，避免 save 引用未初始化的 toast）
  const toast = useCallback((msg, type = 'info', action = null) => {
    const id = genId();
    setToasts(t => [...t, { id, msg, type, action }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), action ? 6000 : 3000);
  }, []);
  const dismissToast = (id) => setToasts(t => t.filter(x => x.id !== id));

  // 持久化
  const save = useCallback((d) => {
    const key = mode === 'real' ? STORAGE_REAL : STORAGE_TEMPLATE;
    try { localStorage.setItem(key, JSON.stringify({ familyMembers: d.familyMembers, reports: d.reports, reminders: d.reminders, chartData: d.chartData, customMetrics: d.customMetrics || [] })); }
    catch(e){ if (e.name === 'QuotaExceededError') { d.reports.forEach(r => { r.fileData = null; r.fileDataOmitted = true; }); try { localStorage.setItem(key, JSON.stringify({ familyMembers: d.familyMembers, reports: d.reports, reminders: d.reminders, chartData: d.chartData, customMetrics: d.customMetrics || [] })); toast('存储不足，已清理报告原文', 'warning'); } catch(e2){ toast('存储严重不足，请导出后清理', 'error'); } } }
  }, [mode, toast]);

  useEffect(() => { save(data); }, [data, save]);

  // 模式切换
  const switchMode = (m) => {
    setMode(m);
    localStorage.setItem(MODE_KEY, m);
    const key = m === 'real' ? STORAGE_REAL : STORAGE_TEMPLATE;
    try {
      const p = JSON.parse(localStorage.getItem(key));
      if (p && p.familyMembers && p.familyMembers.length) { setData({ ...p, customMetrics: p.customMetrics || [], _mode: m }); toast(`已切换到${m === 'template' ? '模板示例' : '真实报告'}模式`, 'success'); return; }
    } catch(e){}
    if (m === 'template') { const d = buildDefaultData(); d._mode = m; setData(d); toast('已加载模板示例数据', 'success'); }
    else { setData({ familyMembers: [], reports: [], reminders: [], chartData: {}, customMetrics: [], _mode: m }); toast('已切换到真实报告模式（空白）', 'success'); }
  };

  // 导航
  const navigate = (id) => { setSection(id); window.scrollTo({ top: 0, behavior: 'smooth' }); };

  // P0：上传后自动分析（模板模式也自动触发，统一双轨动线）
  const handleFiles = async (files, ownerId) => {
    const td = today();
    const newReports = [];
    for (const f of files) {
      const name = f.name.replace(/\.[^/.]+$/, '');
      const fileData = await readFileAsDataURL(f);
      const rep = { id: genId(), name, fileName: f.name, date: td, type: '体检报告', memberId: ownerId, fileType: isImg(f.name) ? 'img' : 'pdf', fileSize: f.size, analyzed: false };
      if (fileData) rep.fileData = fileData; else rep.fileDataOmitted = true;
      newReports.push(rep);
    }
    setData(d => ({ ...d, reports: [...d.reports, ...newReports] }));
    toast(`已上传 ${files.length} 份报告，正在自动分析…`, 'success');
    // 关键：无论模板还是真实模式都自动触发分析，统一双轨动线
    setTimeout(() => newReports.forEach(r => analyzeReport(r.id)), 400);
    navigate('analysis');
  };

  // 分析报告 —— 用 dataRef.current 读取最新数据，避免 stale closure
  const analyzeReport = useCallback(async (id, silent = false) => {
    const cur = dataRef.current;
    const report = cur.reports.find(x => x.id === id);
    if (!report) { if (!silent) toast('未找到该报告', 'error'); return; }
    const m = cur.familyMembers.find(x => x.id === report.memberId);
    setAnalyzing(true);
    setAnalysisReportId(id);
    navigate('analysis');

    let analysis = null;
    const isTemplateMode = mode === 'template';
    if (!isTemplateMode && isLlmConfigured() && m) {
      try {
        let imageData = null;
        if (report.fileData && report.fileType === 'img') imageData = report.fileData;
        else if (report.fileData && report.fileType === 'pdf') { const imgs = await pdfBase64ToImages(report.fileData, 3); if (imgs && imgs.length) imageData = imgs[0]; }
        const prompt = buildAnalysisPrompt(m, report, !!imageData);
        const raw = await callLlmApi(prompt, imageData, (i, mx, e, delay) => {});
        if (raw) { analysis = parseLlmResponse(raw); if (analysis) analysis._source = 'llm'; }
      } catch(e) { console.warn('LLM 失败，回退模板:', e); toast('AI 调用失败，使用模板分析', 'warning'); }
    }
    if (!analysis) {
      await new Promise(res => setTimeout(res, 800)); // 模板模式 800ms 心理过渡
      // 模板 key 现在带年份：从 report.name 提取 4 位年份，拼接 `${memberName}_${year}` 匹配
      const yearMatch = report.name.match(/(\d{4})/);
      const templateKey = yearMatch && m ? `${m.name}_${yearMatch[1]}` : null;
      analysis = templateKey && ANALYSIS_TEMPLATES[templateKey] ? JSON.parse(JSON.stringify(ANALYSIS_TEMPLATES[templateKey])) : getAnalysisFallback(m, report);
      analysis._source = 'template';
    }
    // 写入分析结果 + 更新趋势数据
    setData(d => {
      const newReports = d.reports.map(x => x.id === id ? { ...x, analyzed: true, analysis, analysisTime: new Date().toISOString() } : x);
      const newChartData = { ...d.chartData };
      if (m) {
        // 三级兜底：1) normalize extractedMetrics → 2) 从 abnormalItems/normalItems 提取 → 3) 空
        // 解决痛点：LLM 不返回/返回脏格式/走 fallback 时，趋势数据照样能写入
        let metrics = normalizeExtractedMetrics(analysis.extractedMetrics);
        if (Object.keys(metrics).length === 0) metrics = extractMetricsFromItems(analysis);
        if (Object.keys(metrics).length > 0) {
          const mc = newChartData[m.id] || {};
          const labelMap = { bloodSugar: '空腹血糖', cholesterol: '总胆固醇', weight: '体重' };
          // 趋势图 X 轴用检查日期（examDate），兜底报告上传日期
          const labelDate = analysis.examDate || report.date;
          Object.keys(metrics).forEach(k => {
            if (!mc[k]) mc[k] = { labels: [], datasets: [] };
            const val = metrics[k];
            mc[k].labels = [...(mc[k].labels || []), labelDate];
            if (k === 'bloodPressure') {
              mc[k].datasets = [
                { name: '收缩压', data: [...(mc[k].datasets[0]?.data || []), val[0][0]] },
                { name: '舒张压', data: [...(mc[k].datasets[1]?.data || []), val[0][1]] },
              ];
            } else {
              mc[k].datasets = [{ name: labelMap[k] || k, data: [...(mc[k].datasets[0]?.data || []), val[0]] }];
            }
          });
          newChartData[m.id] = mc;
        }
      }
      const newMembers = m && analysis.riskLevel === 'high' ? d.familyMembers.map(x => x.id === m.id ? { ...x, status: 'warning' } : x) : d.familyMembers;
      return { ...d, reports: newReports, chartData: newChartData, familyMembers: newMembers };
    });
    setAnalyzing(false);
    if (!silent) toast('AI 分析完成', 'success');
  }, [mode, toast]);

  const getAnalysisFallback = (m, r) => ({
    summary: '已收到报告，AI 暂未识别出明显异常。建议结合医生意见综合判断。',
    riskLevel: 'low', abnormalItems: [], normalItems: [{ name: '整体评估', value: '待确认', unit: '', ref: '-' }],
    recommendations: ['保持健康生活方式', '3-6个月后复查'], extractedMetrics: {},
  });

  // P1：从分析结果设提醒（预填成员+指标+90天）
  const setReminderFromAnalysis = (member, abnormalItems, report) => {
    setReminderPrefill({
      memberId: member.id,
      title: `${member.name} · ${abnormalItems.slice(0, 2).map(i => i.name).join('、')}复查`,
      desc: `基于《${report.name}》AI 分析，建议复查以下指标：${abnormalItems.map(i => i.name).join('、')}`,
      date: addDays(today(), 90),
      priority: abnormalItems.some(i => i.severity === 'high') ? 'urgent' : 'normal',
    });
    setModals(m => ({ ...m, addReminder: true }));
    toast('已为你预填复查提醒，确认即可加入待办', 'success');
  };

  // CRUD
  const addMember = (m) => { setData(d => ({ ...d, familyMembers: [...d.familyMembers, { ...m, id: genId(), status: 'normal' }] })); toast('成员已添加', 'success'); };
  const deleteMember = (id) => { if (!confirm('删除该成员及其所有数据？')) return; setData(d => ({ ...d, familyMembers: d.familyMembers.filter(m => m.id !== id), reports: d.reports.filter(r => r.memberId !== id), reminders: d.reminders.filter(r => r.memberId !== id) })); toast('成员已删除', 'info'); };
  const toggleMemberStatus = (id) => { setData(d => ({ ...d, familyMembers: d.familyMembers.map(m => m.id === id ? { ...m, status: m.status === 'warning' ? 'normal' : 'warning' } : m) })); };
  const viewMember = (id) => { setSelectedMember(id); navigate('dashboard'); };

  const deleteReport = (id) => { setData(d => ({ ...d, reports: d.reports.filter(r => r.id !== id) })); toast('报告已删除', 'info'); };
  const openReport = (id) => { setAnalysisReportId(id); setAnalysisViewMode('detail'); navigate('analysis'); };

  const addReminder = (r) => { setData(d => ({ ...d, reminders: [...d.reminders, { ...r, id: genId() }] })); toast('提醒已添加', 'success'); };
  // 手动录入健康指标 —— 写入 chartData，与 AI 分析写入逻辑同构
  const addManualRecord = ({ memberId, metric, value, date }) => {
    setData(d => {
      const newChartData = { ...d.chartData };
      const mc = { ...(newChartData[memberId] || {}) };
      if (!mc[metric]) mc[metric] = { labels: [], datasets: [] };
      mc[metric].labels = [...(mc[metric].labels || []), date];
      // 从预设 + customMetrics 查 metric 的 type 和 labels，决定 dataset 写法
      const presetMetrics = [
        { id: 'bloodPressure', name: '血压', unit: 'mmHg', type: 'dual', labels: ['收缩压', '舒张压'] },
        { id: 'bloodSugar', name: '血糖', unit: 'mmol/L', type: 'single' },
        { id: 'cholesterol', name: '胆固醇', unit: 'mmol/L', type: 'single' },
        { id: 'weight', name: '体重', unit: 'kg', type: 'single' },
      ];
      const allMetrics = [...presetMetrics, ...(d.customMetrics || [])];
      const meta = allMetrics.find(m => m.id === metric);
      if (meta && meta.type === 'dual') {
        const labels = meta.labels || ['主', '副'];
        mc[metric].datasets = [
          { name: labels[0], data: [...(mc[metric].datasets[0]?.data || []), value[0]] },
          { name: labels[1], data: [...(mc[metric].datasets[1]?.data || []), value[1]] },
        ];
      } else {
        const name = meta ? meta.name : metric;
        mc[metric].datasets = [{ name, data: [...(mc[metric].datasets[0]?.data || []), value] }];
      }
      newChartData[memberId] = mc;
      return { ...d, chartData: newChartData };
    });
    toast('指标数据已录入', 'success');
  };
  // 新增自定义指标 —— 写入 data.customMetrics 持久化
  const addCustomMetric = (metric) => {
    setData(d => ({ ...d, customMetrics: [...(d.customMetrics || []), metric] }));
    toast(`已新增自定义指标：${metric.name}`, 'success');
  };
  const toggleReminder = (id) => { setData(d => ({ ...d, reminders: d.reminders.map(r => r.id === id ? { ...r, completed: !r.completed } : r) })); };
  const deleteReminder = (id) => { setData(d => ({ ...d, reminders: d.reminders.filter(r => r.id !== id) })); toast('提醒已删除', 'info'); };

  const exportData = () => { const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `jiahu_${mode}_${today()}.json`; a.click(); toast('已导出', 'success'); };
  const importData = (file) => { const r = new FileReader(); r.onload = () => { try { const p = JSON.parse(r.result); setData({ ...p, _mode: mode }); toast('导入成功', 'success'); } catch(e){ toast('导入失败：JSON 格式错误', 'error'); } }; r.readAsText(file); };
  const resetData = () => { if (!confirm('清空当前模式所有数据？')) return; setData({ familyMembers: [], reports: [], reminders: [], chartData: {}, customMetrics: [], _mode: mode }); toast('已清空', 'info'); };
  const loadSample = () => { const d = buildDefaultData(); d._mode = mode; setData(d); toast('示例数据已加载', 'success'); };

  // 提醒后台检查（逾期提醒）
  useEffect(() => {
    const iv = setInterval(() => {
      setData(d => {
        let changed = false;
        const newRems = d.reminders.map(r => {
          if (!r.completed && r.priority !== 'urgent' && daysBetween(today(), r.date) < 0 && !r._overdueNotified) { changed = true; return { ...r, priority: 'urgent', _overdueNotified: true }; }
          return r;
        });
        return changed ? { ...d, reminders: newRems } : d;
      });
    }, 60000);
    return () => clearInterval(iv);
  }, []);

  const ctx = { data, mode, selectedMember, setSelectedMember, theme, toggleTheme: () => setTheme(t => t === 'dark' ? 'light' : 'dark'), toast };

  return (
    <AppCtx.Provider value={ctx}>
      <div className="relative z-10 max-w-[1440px] mx-auto p-4 md:p-8">
        <Header
          mode={mode} onSwitchMode={switchMode}
          selectedMember={selectedMember} members={data.familyMembers} onPickMember={setSelectedMember}
          theme={theme} onToggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
        />
        <NavBar
          current={section} onNavigate={navigate}
          extra={<>
            <button onClick={() => setModals(m => ({ ...m, llm: true }))} className="px-3 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 text-[var(--text-secondary)] hover:bg-[rgba(255,255,255,0.4)] whitespace-nowrap"><Icon name="ph ph-gear-six" size={16} /> 模型设置</button>
            <button onClick={() => setModals(m => ({ ...m, data: true }))} className="px-3 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 text-[var(--text-secondary)] hover:bg-[rgba(255,255,255,0.4)] whitespace-nowrap"><Icon name="ph ph-database" size={16} /> 数据</button>
          </>}
        />
        <main id="main" className="flex flex-col gap-6">
          <AnimatePresence mode="wait">
            <motion.div
              key={section}
              initial={{ opacity: 0, y: 12 }}
              animate={{ opacity: 1, y: 0 }}
              exit={{ opacity: 0, y: -8 }}
              transition={{ duration: 0.28, ease: [0.22, 1, 0.36, 1] }}
            >
              {section === 'dashboard' && <Dashboard data={data} onNavigate={navigate} onAnalyze={analyzeReport} onSetReminder={setReminderFromAnalysis} onOpenReport={openReport} selectedMember={selectedMember} />}
              {section === 'members' && <MembersSection data={data} onAdd={() => setModals(m => ({ ...m, addMember: true }))} onView={viewMember} onDelete={deleteMember} onToggleStatus={toggleMemberStatus} />}
              {section === 'upload' && <UploadSection data={data} selectedMember={selectedMember} onFiles={handleFiles} onAnalyze={analyzeReport} onOpenReport={openReport} onDeleteReport={deleteReport} />}
              {section === 'analysis' && <AnalysisSection data={data} analyzing={analyzing} analysisReportId={analysisReportId} onReanalyze={analyzeReport} onSetReminder={setReminderFromAnalysis} onNavigate={navigate} onViewReport={openReport} viewMode={analysisViewMode} onBackToList={() => setAnalysisViewMode('list')} />}
              {section === 'trends' && <TrendsSection data={data} selectedMember={selectedMember} onAddRecord={() => { setRecordDefaultMemberId(selectedMember); setModals(m => ({ ...m, addRecord: true })); }} onAddMetric={() => setModals(m => ({ ...m, addMetric: true }))} />}
              {section === 'reminders' && <RemindersSection data={data} selectedMember={selectedMember} onAdd={() => { setReminderPrefill(null); setModals(m => ({ ...m, addReminder: true })); }} onToggle={toggleReminder} onDelete={deleteReminder} />}
            </motion.div>
          </AnimatePresence>
        </main>
      </div>

      <ToastHost toasts={toasts} onDismiss={dismissToast} />
      <AddMemberModal open={modals.addMember} onClose={() => setModals(m => ({ ...m, addMember: false }))} onAdd={addMember} />
      <AddReminderModal open={modals.addReminder} onClose={() => setModals(m => ({ ...m, addReminder: false }))} onAdd={addReminder} prefill={reminderPrefill} members={data.familyMembers} />
      <AddRecordModal open={modals.addRecord} onClose={() => setModals(m => ({ ...m, addRecord: false }))} onAdd={addManualRecord} members={data.familyMembers} defaultMemberId={recordDefaultMemberId} allMetrics={[...[{ id: 'bloodPressure', name: '血压', unit: 'mmHg', type: 'dual', labels: ['收缩压', '舒张压'] },{ id: 'bloodSugar', name: '血糖', unit: 'mmol/L', type: 'single' },{ id: 'cholesterol', name: '胆固醇', unit: 'mmol/L', type: 'single' },{ id: 'weight', name: '体重', unit: 'kg', type: 'single' }], ...(data.customMetrics || [])]} />
      <AddMetricModal open={modals.addMetric} onClose={() => setModals(m => ({ ...m, addMetric: false }))} onAdd={addCustomMetric} existingMetrics={[...[{ id: 'bloodPressure', name: '血压' },{ id: 'bloodSugar', name: '血糖' },{ id: 'cholesterol', name: '胆固醇' },{ id: 'weight', name: '体重' }], ...(data.customMetrics || []).map(m => ({ id: m.id, name: m.name }))]} />
      <LlmSettingsModal open={modals.llm} onClose={() => setModals(m => ({ ...m, llm: false }))} />
      <DataManagementModal open={modals.data} onClose={() => setModals(m => ({ ...m, data: false }))} onExport={exportData} onImport={importData} onReset={resetData} onLoadSample={loadSample} />
    </AppCtx.Provider>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
