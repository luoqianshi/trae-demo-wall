<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气预警</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 20px;
        }

        /* ========== 背景动画粒子 ========== */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* ========== 主容器 ========== */
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ========== 头部 ========== */
        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 8px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 6px;
        }

        /* ========== 搜索框 ========== */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input::placeholder {
            color: #64748b;
        }

        .search-box input:focus {
            background: rgba(255, 255, 255, 0.14);
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.4);
        }

        .search-box button {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .search-box button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .search-box button:active {
            transform: scale(0.97);
        }

        .search-box button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ========== 快捷城市 ========== */
        .quick-cities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .quick-city {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .quick-city:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
            color: #fff;
        }

        .quick-city.active {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
            color: #fff;
        }

        /* ========== 加载状态 ========== */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #94a3b8;
            font-size: 14px;
        }

        /* ========== 错误提示 ========== */
        .error-msg {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            color: #fca5a5;
            margin-bottom: 20px;
        }

        .error-msg.show {
            display: block;
        }

        /* ========== 天气卡片 ========== */
        .weather-card {
            display: none;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.5s ease;
        }

        .weather-card.show {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .weather-icon {
            font-size: 72px;
            line-height: 1;
        }

        .weather-temp {
            font-size: 64px;
            font-weight: 300;
            line-height: 1;
            color: #f1f5f9;
        }

        .weather-temp .unit {
            font-size: 24px;
            color: #94a3b8;
            vertical-align: super;
        }

        .weather-desc {
            font-size: 18px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .weather-location {
            font-size: 22px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 4px;
        }

        .weather-time {
            font-size: 13px;
            color: #64748b;
        }

        /* ========== 天气详情网格 ========== */
        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .detail-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .detail-value {
            font-size: 20px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .detail-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }

        /* ========== 预警卡片 ========== */
        .alert-section {
            display: none;
        }

        .alert-section.show {
            display: block;
        }

        .alert-section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e2e8f0;
        }

        .alert-card {
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            border: 1px solid;
            animation: fadeInUp 0.4s ease;
        }

        /* 蓝色预警 */
        .alert-card.level-blue {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .alert-card.level-blue .alert-level {
            color: #60a5fa;
        }

        /* 黄色预警 */
        .alert-card.level-yellow {
            background: rgba(250, 204, 21, 0.1);
            border-color: rgba(250, 204, 21, 0.3);
        }

        .alert-card.level-yellow .alert-level {
            color: #facc15;
        }

        /* 橙色预警 */
        .alert-card.level-orange {
            background: rgba(249, 115, 22, 0.1);
            border-color: rgba(249, 115, 22, 0.3);
        }

        .alert-card.level-orange .alert-level {
            color: #fb923c;
        }

        /* 红色预警 */
        .alert-card.level-red {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.3);
            animation: pulseAlert 2s ease-in-out infinite;
        }

        .alert-card.level-red .alert-level {
            color: #f87171;
        }

        @keyframes pulseAlert {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 20px 4px rgba(239, 68, 68, 0.2); }
        }

        .alert-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .alert-level {
            font-size: 14px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
        }

        .alert-title {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .alert-desc {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .alert-advice {
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .alert-advice::before {
            content: "💡 建议：";
            font-weight: 600;
            color: #fbbf24;
        }

        /* 无预警 */
        .no-alert {
            text-align: center;
            padding: 30px;
            color: #64748b;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .no-alert .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }

        /* ========== 底部信息 ========== */
        .footer {
            text-align: center;
            padding: 20px;
            color: #475569;
            font-size: 12px;
        }

        /* ========== 底部统计信息 ========== */
        .footer-stats {
            margin-top: 8px;
            font-size: 11px;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .footer-divider {
            color: #475569;
        }

        #autoRefreshStatus {
            color: #22c55e;
            font-weight: 600;
        }

        #autoRefreshStatus.off {
            color: #f97316;
        }

        #requestCount {
            color: #60a5fa;
            font-weight: 600;
        }

        /* ========== 默认城市设置 ========== */
        .footer-settings {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footer-settings label {
            font-size: 12px;
            color: #94a3b8;
        }

        .footer-settings input {
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            font-size: 12px;
            width: 140px;
            outline: none;
        }

        .footer-settings input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .footer-settings input::placeholder {
            color: #475569;
        }

        .footer-settings button {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .footer-settings button:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 600px) {
            .weather-temp {
                font-size: 48px;
            }
            .weather-icon {
                font-size: 56px;
            }
            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }
            .search-box {
                flex-direction: column;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- 背景粒子 -->
    <div class="bg-particles" id="particles"></div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-icon">🌤️</div>
            <h1>天气预警</h1>
            <p class="subtitle">实时天气 · 智能预警</p>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="输入城市名称，如：北京、上海、广州..."
                autocomplete="off"
            />
            <button id="searchBtn" onclick="searchWeather()">🔍 查询天气</button>
        </div>

        <!-- 快捷城市 -->
        <div class="quick-cities" id="quickCities">
            <span class="quick-city" onclick="quickSearch('北京')">北京</span>
            <span class="quick-city" onclick="quickSearch('上海')">上海</span>
            <span class="quick-city" onclick="quickSearch('广州')">广州</span>
            <span class="quick-city" onclick="quickSearch('深圳')">深圳</span>
            <span class="quick-city" onclick="quickSearch('成都')">成都</span>
            <span class="quick-city" onclick="quickSearch('杭州')">杭州</span>
            <span class="quick-city" onclick="quickSearch('武汉')">武汉</span>
            <span class="quick-city" onclick="quickSearch('西安')">西安</span>
        </div>

        <!-- 加载中 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="loading-text">正在获取天气数据...</p>
        </div>

        <!-- 错误提示 -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- 天气卡片 -->
        <div class="weather-card" id="weatherCard">
            <div class="weather-main">
                <div class="weather-icon" id="weatherIcon">☀️</div>
                <div>
                    <div class="weather-location" id="weatherLocation">--</div>
                    <div class="weather-temp">
                        <span id="weatherTemp">--</span><span class="unit">°C</span>
                    </div>
                    <div class="weather-desc" id="weatherDesc">--</div>
                    <div class="weather-time" id="weatherTime">--</div>
                </div>
            </div>
            <div class="weather-details">
                <div class="detail-item">
                    <div class="detail-icon">🌡️</div>
                    <div class="detail-value" id="detailFeels">--°C</div>
                    <div class="detail-label">体感温度</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">💧</div>
                    <div class="detail-value" id="detailHumidity">--%</div>
                    <div class="detail-label">湿度</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">💨</div>
                    <div class="detail-value" id="detailWind">-- km/h</div>
                    <div class="detail-label">风速</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">👁️</div>
                    <div class="detail-value" id="detailVis">-- km</div>
                    <div class="detail-label">能见度</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">☁️</div>
                    <div class="detail-value" id="detailCloud">--%</div>
                    <div class="detail-label">云量</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">☀️</div>
                    <div class="detail-value" id="detailUV">--</div>
                    <div class="detail-label">紫外线指数</div>
                </div>
            </div>
        </div>

        <!-- 预警信息 -->
        <div class="alert-section" id="alertSection">
            <div class="alert-section-title">⚠️ 天气预警</div>
            <div id="alertList"></div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            <div class="footer-settings">
                <label>默认城市：</label>
                <input type="text" id="defaultCityInput" placeholder="设置默认城市，如：上海" />
                <button onclick="saveDefaultCity()">💾 保存</button>
            </div>
            <div>数据来源：wttr.in（免费开放天气API）</div>
            <div class="footer-stats">
                <span>🔄 自动刷新：<span id="autoRefreshStatus">已开启</span></span>
                <span class="footer-divider">|</span>
                <span>⏱️ 下次刷新：<span id="countdown">10</span>秒</span>
                <span class="footer-divider">|</span>
                <span>📊 累计查询：<span id="requestCount">0</span> 次</span>
            </div>
        </div>
    </div>

    <script>
        // ==================== 背景粒子效果 ====================
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 15 + 10 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        })();

        // ==================== 天气图标映射 ====================
        function getWeatherEmoji(code) {
            const map = {
                113: '☀️', 116: '⛅', 119: '☁️', 122: '☁️',
                143: '🌫️', 176: '🌦️', 179: '🌨️', 182: '🌨️',
                185: '🌧️', 200: '⛈️', 227: '🌬️', 230: '🌨️',
                248: '🌫️', 260: '🌫️', 263: '🌦️', 266: '🌧️',
                281: '🌧️', 284: '🌧️', 293: '🌦️', 296: '🌧️',
                299: '🌧️', 302: '🌧️', 305: '🌧️', 308: '🌧️',
                311: '🌧️', 314: '🌧️', 317: '🌨️', 320: '🌨️',
                323: '🌨️', 326: '❄️', 329: '❄️', 332: '❄️',
                335: '🌨️', 338: '🌨️', 350: '🌨️', 353: '🌦️',
                356: '🌧️', 359: '🌧️', 362: '🌨️', 365: '🌨️',
                368: '🌨️', 371: '🌨️', 374: '🌨️', 377: '🌨️',
                386: '⛈️', 389: '⛈️', 392: '⛈️', 395: '⛈️'
            };
            return map[code] || '🌤️';
        }

        // ==================== 天气预警分析 ====================
        function analyzeAlerts(data) {
            const alerts = [];
            const temp = parseFloat(data.temp_C);
            const wind = parseFloat(data.windspeedKmph);
            const vis = parseFloat(data.visibility);
            const humidity = parseFloat(data.humidity);
            const uv = parseFloat(data.uvIndex);
            const code = parseInt(data.weatherCode);

            // 高温预警
            if (temp >= 40) {
                alerts.push({
                    level: 'red',
                    levelText: '红色预警',
                    title: '极端高温预警',
                    desc: '当前气温已达 ' + temp + '°C，属于极端高温天气。长时间暴露在户外可能引发中暑、热射病等严重健康问题。',
                    advice: '尽量避免在 10:00-16:00 期间外出；必须外出时做好防晒措施，携带充足饮水；关注老人、儿童等易感人群健康状态。'
                });
            } else if (temp >= 37) {
                alerts.push({
                    level: 'orange',
                    levelText: '橙色预警',
                    title: '高温预警',
                    desc: '当前气温已达 ' + temp + '°C，属于高温天气。持续高温可能对人体健康造成不利影响。',
                    advice: '减少户外活动时间；注意补充水分和电解质；穿着透气、浅色的衣物。'
                });
            } else if (temp >= 35) {
                alerts.push({
                    level: 'yellow',
                    levelText: '黄色预警',
                    title: '高温提醒',
                    desc: '当前气温 ' + temp + '°C，体感较热。长时间户外活动需注意防暑。',
                    advice: '适当减少剧烈运动；多喝水，避免含酒精或高糖饮料；注意室内通风降温。'
                });
            }

            // 低温预警
            if (temp <= -20) {
                alerts.push({
                    level: 'red',
                    levelText: '红色预警',
                    title: '极端低温预警',
                    desc: '当前气温仅 ' + temp + '°C，属于极端低温天气。极易引发冻伤、失温等危险情况。',
                    advice: '非必要不外出；必须外出时穿戴足够的保暖衣物，特别注意头部、手部保暖；检查供暖设备是否正常运行。'
                });
            } else if (temp <= -10) {
                alerts.push({
                    level: 'orange',
                    levelText: '橙色预警',
                    title: '严寒预警',
                    desc: '当前气温 ' + temp + '°C，天气严寒。需注意防寒保暖。',
                    advice: '尽量减少外出；外出时穿戴厚实保暖衣物；注意预防感冒和呼吸道疾病。'
                });
            } else if (temp <= 0) {
                alerts.push({
                    level: 'blue',
                    levelText: '蓝色预警',
                    title: '低温提醒',
                    desc: '当前气温 ' + temp + '°C，天气寒冷。需注意保暖防寒。',
                    advice: '外出时穿戴保暖衣物；注意道路结冰情况，小心出行。'
                });
            }

            // 大风预警
            if (wind >= 88) {
                alerts.push({
                    level: 'red',
                    levelText: '红色预警',
                    title: '狂风预警',
                    desc: '当前风速 ' + wind + ' km/h，已达到狂风级别，可能造成严重破坏。',
                    advice: '立即停止户外活动，寻找坚固建筑物躲避；远离广告牌、临时搭建物等危险区域；固定好门窗和室外物品。'
                });
            } else if (wind >= 63) {
                alerts.push({
                    level: 'orange',
                    levelText: '橙色预警',
                    title: '大风预警',
                    desc: '当前风速 ' + wind + ' km/h，风力强劲，可能对出行造成影响。',
                    advice: '避免在高楼、树木附近停留；加固室外易被风吹动的物品；驾驶时注意横风影响。'
                });
            } else if (wind >= 40) {
                alerts.push({
                    level: 'yellow',
                    levelText: '黄色预警',
                    title: '强风提醒',
                    desc: '当前风速 ' + wind + ' km/h，风力较大，出行需注意安全。',
                    advice: '注意高空坠物风险；收起阳台上的花盆等易掉落物品；骑自行车或电动车时注意安全。'
                });
            }

            // 暴雨/暴雪预警
            const heavyRainCodes = [305, 308, 314, 359, 389, 395];
            const heavySnowCodes = [230, 326, 329, 332, 371];
            const thunderCodes = [200, 386, 389, 392, 395];

            if (heavyRainCodes.includes(code)) {
                alerts.push({
                    level: 'red',
                    levelText: '红色预警',
                    title: '暴雨预警',
                    desc: '当前正在下暴雨，可能引发城市内涝、山洪等灾害。',
                    advice: '尽量避免外出；远离河道、低洼地带；驾驶时注意积水路段，切勿强行通过；如遇洪水迅速向高处转移。'
                });
            } else if ([293, 296, 299, 302, 353, 356].includes(code)) {
                alerts.push({
                    level: 'orange',
                    levelText: '橙色预警',
                    title: '大雨预警',
                    desc: '当前正在下大雨，道路湿滑，需注意出行安全。',
                    advice: '出行携带雨具；驾驶时减速慢行，保持安全车距；注意防范道路积水。'
                });
            } else if ([176, 263, 266].includes(code)) {
                alerts.push({
                    level: 'blue',
                    levelText: '蓝色预警',
                    title: '降雨提醒',
                    desc: '当前有降雨，出行请携带雨具。',
                    advice: '出门携带雨伞或雨衣；路面湿滑，注意脚下安全。'
                });
            }

            if (heavySnowCodes.includes(code)) {
                alerts.push({
                    level: 'red',
                    levelText: '红色预警',
                    title: '暴雪预警',
                    desc: '当前正在下暴雪，可能严重影响交通和日常生活。',
                    advice: '非必要不外出；如需出行尽量使用公共交通工具；注意保暖防寒；清理屋顶和道路积雪，防止坍塌。'
                });
            } else if ([179, 182, 317, 320, 323, 326, 335, 338, 368].includes(code)) {
                alerts.push({
                    level: 'yellow',
                    levelText: '黄色预警',
                    title: '降雪提醒',
                    desc: '当前有降雪，道路可能结冰湿滑。',
                    advice: '出行注意防滑，穿戴防滑鞋；驾驶时减速慢行，必要时安装防滑链。'
                });
            }

            if (thunderCodes.includes(code)) {
                alerts.push({
                    level: 'orange',
                    levelText: '橙色预警',
                    title: '雷电预警',
                    desc: '当前有雷电天气，存在雷击风险。',
                    advice: '避免在空旷地带、大树下、山顶停留；关闭电器设备，拔掉电源插头；不要使用手机等电子设备。'
                });
            }

            // 低能见度预警
            if (vis <= 0.5) {
                alerts.push({
                    level: 'red',
                    levelText: '红色预警',
                    title: '特强浓雾预警',
                    desc: '能见度仅 ' + vis + ' 公里，严重影响交通出行。',
                    advice: '尽量避免驾车出行；必须出行时开启雾灯、示廓灯，保持极低车速；行人穿着醒目衣物，注意来往车辆。'
                });
            } else if (vis <= 1) {
                alerts.push({
                    level: 'orange',
                    levelText: '橙色预警',
                    title: '大雾预警',
                    desc: '能见度仅 ' + vis + ' 公里，对交通出行有较大影响。',
                    advice: '驾驶时开启雾灯，保持安全车速和车距；高速公路可能封闭，请提前查询路况。'
                });
            } else if (vis <= 2) {
                alerts.push({
                    level: 'yellow',
                    levelText: '黄色预警',
                    title: '雾天提醒',
                    desc: '能见度 ' + vis + ' 公里，出行需注意交通安全。',
                    advice: '驾驶时注意观察路况，适当降低车速；行人过马路时注意观察车辆。'
                });
            }

            // 高湿度预警
            if (humidity >= 95) {
                alerts.push({
                    level: 'blue',
                    levelText: '蓝色预警',
                    title: '高湿提醒',
                    desc: '当前湿度 ' + humidity + '%，空气湿度极高，体感闷热不适。',
                    advice: '注意室内通风除湿；可使用除湿机或空调除湿功能；衣物和被褥注意防潮。'
                });
            }

            // 紫外线预警
            if (uv >= 11) {
                alerts.push({
                    level: 'red',
                    levelText: '红色预警',
                    title: '紫外线极强预警',
                    desc: '紫外线指数 ' + uv + '，属于极高级别。短时间内即可对皮肤和眼睛造成伤害。',
                    advice: '尽量避免外出；必须外出时涂抹SPF50+防晒霜，佩戴太阳镜、遮阳帽，穿着防晒衣物。'
                });
            } else if (uv >= 8) {
                alerts.push({
                    level: 'orange',
                    levelText: '橙色预警',
                    title: '紫外线强烈预警',
                    desc: '紫外线指数 ' + uv + '，属于很高级别。需做好全面防护。',
                    advice: '减少户外活动时间；出门前30分钟涂抹防晒霜，每隔2-3小时补涂一次；佩戴太阳镜和遮阳帽。'
                });
            } else if (uv >= 6) {
                alerts.push({
                    level: 'yellow',
                    levelText: '黄色预警',
                    title: '紫外线较强提醒',
                    desc: '紫外线指数 ' + uv + '，属于中高等级别。',
                    advice: '户外活动时注意防晒；涂抹SPF30+防晒霜；尽量避开正午时段直晒。'
                });
            }

            return alerts;
        }

        // ==================== 渲染预警列表 ====================
        function renderAlerts(alerts) {
            const section = document.getElementById('alertSection');
            const list = document.getElementById('alertList');

            if (alerts.length === 0) {
                section.classList.add('show');
                list.innerHTML = '<div class="no-alert"><span class="icon">✅</span>当前天气状况良好，暂无预警信息</div>';
                return;
            }

            section.classList.add('show');
            let html = '';
            alerts.forEach(function(alert) {
                html += `
                    <div class="alert-card level-${alert.level}">
                        <div class="alert-header">
                            <span class="alert-level">${alert.levelText}</span>
                            <span class="alert-title">${alert.title}</span>
                        </div>
                        <div class="alert-desc">${alert.desc}</div>
                        <div class="alert-advice">${alert.advice}</div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        // ==================== 快捷搜索 ====================
        function quickSearch(city) {
            document.getElementById('cityInput').value = city;
            highlightQuickCity(city);
            searchWeather();
        }

        function highlightQuickCity(city) {
            const buttons = document.querySelectorAll('.quick-city');
            buttons.forEach(function(btn) {
                if (btn.textContent === city) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // ==================== 错误提示 ====================
        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.classList.add('show');
            setTimeout(function() {
                errorEl.classList.remove('show');
            }, 5000);
        }

        // ==================== 键盘事件：回车搜索 ====================
        document.getElementById('cityInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // ==================== 全局变量 ====================
        let requestCount = 0;
        let refreshInterval = null;
        let countdownInterval = null;
        let isInitialSearchDone = false;
        const REFRESH_INTERVAL_MS = 10000;
        const STORAGE_KEY = 'weather_default_city';

        // ==================== 获取默认城市 ====================
        function getDefaultCity() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved || '北京';
        }

        // ==================== 保存默认城市 ====================
        function saveDefaultCity() {
            const input = document.getElementById('defaultCityInput');
            const city = input.value.trim();
            if (!city) {
                alert('请输入城市名称');
                return;
            }
            localStorage.setItem(STORAGE_KEY, city);
            document.getElementById('cityInput').value = city;
            highlightQuickCity(city);
            searchWeather();
            input.value = '';
            input.placeholder = '已保存为：' + city;
            setTimeout(function() {
                input.placeholder = '设置默认城市，如：上海';
            }, 2000);
        }

        // ==================== 更新请求计数 ====================
        function updateRequestCount() {
            requestCount++;
            document.getElementById('requestCount').textContent = requestCount;
        }

        // ==================== 根据经纬度获取城市名 ====================
        async function getCityFromLocation(latitude, longitude) {
            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&addressdetails=1&accept-language=zh-CN`
                );
                const data = await response.json();
                if (data.address) {
                    if (data.address.city) {
                        return data.address.city;
                    } else if (data.address.town) {
                        return data.address.town;
                    } else if (data.address.village) {
                        return data.address.village;
                    } else if (data.address.state) {
                        return data.address.state;
                    }
                }
                return null;
            } catch (err) {
                console.error('获取城市失败:', err);
                return null;
            }
        }

        // ==================== 获取当前位置并查询天气 ====================
        function getCurrentLocationAndSearch() {
            if (!navigator.geolocation) {
                console.log('浏览器不支持地理定位，使用默认城市');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async function(position) {
                    const city = await getCityFromLocation(
                        position.coords.latitude,
                        position.coords.longitude
                    );
                    if (city && city !== document.getElementById('cityInput').value) {
                        document.getElementById('cityInput').value = city;
                        highlightQuickCity(city);
                        if (isInitialSearchDone) {
                            searchWeather();
                        }
                    }
                },
                function(error) {
                    console.log('获取位置失败:', error.message);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // ==================== 启动定时刷新 ====================
        function startAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                clearInterval(countdownInterval);
            }
            
            let secondsLeft = REFRESH_INTERVAL_MS / 1000;
            document.getElementById('countdown').textContent = secondsLeft;
            
            countdownInterval = setInterval(function() {
                secondsLeft--;
                if (secondsLeft < 0) {
                    secondsLeft = REFRESH_INTERVAL_MS / 1000;
                }
                document.getElementById('countdown').textContent = secondsLeft;
            }, 1000);
            
            refreshInterval = setInterval(function() {
                if (isInitialSearchDone) {
                    const city = document.getElementById('cityInput').value.trim();
                    if (city) {
                        searchWeather();
                    }
                }
            }, REFRESH_INTERVAL_MS);
        }

        // ==================== 停止定时刷新 ====================
        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                clearInterval(countdownInterval);
                refreshInterval = null;
                countdownInterval = null;
                document.getElementById('autoRefreshStatus').textContent = '已关闭';
                document.getElementById('autoRefreshStatus').classList.add('off');
            }
        }

        // ==================== 切换定时刷新状态 ====================
        function toggleAutoRefresh() {
            const statusEl = document.getElementById('autoRefreshStatus');
            if (refreshInterval) {
                stopAutoRefresh();
            } else {
                startAutoRefresh();
                statusEl.textContent = '已开启';
                statusEl.classList.remove('off');
            }
        }

        // ==================== 修改搜索天气函数（增加计数）====================
        async function searchWeather() {
            const cityInput = document.getElementById('cityInput');
            let city = cityInput.value.trim();

            if (!city) {
                showError('请输入城市名称');
                return;
            }

            document.getElementById('loading').classList.add('show');
            document.getElementById('weatherCard').classList.remove('show');
            document.getElementById('alertSection').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('searchBtn').disabled = true;

            highlightQuickCity(city);

            try {
                const url = 'https://wttr.in/' + encodeURIComponent(city) + '?format=j1';
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error('城市未找到或网络异常');
                }

                const data = await response.json();
                const current = data.current_condition[0];

                document.getElementById('weatherIcon').textContent = getWeatherEmoji(parseInt(current.weatherCode));
                document.getElementById('weatherLocation').textContent = city;
                document.getElementById('weatherTemp').textContent = current.temp_C;
                document.getElementById('weatherDesc').textContent = current.weatherDesc[0].value;
                document.getElementById('weatherTime').textContent = '观测时间：' + current.observation_time;

                document.getElementById('detailFeels').textContent = current.FeelsLikeC + '°C';
                document.getElementById('detailHumidity').textContent = current.humidity + '%';
                document.getElementById('detailWind').textContent = current.windspeedKmph + ' km/h';
                document.getElementById('detailVis').textContent = current.visibility + ' km';
                document.getElementById('detailCloud').textContent = current.cloudcover + '%';
                document.getElementById('detailUV').textContent = current.uvIndex;

                document.getElementById('weatherCard').classList.add('show');

                const alerts = analyzeAlerts(current);
                renderAlerts(alerts);

                updateRequestCount();
                isInitialSearchDone = true;

            } catch (err) {
                showError('查询失败：' + err.message + '。请检查城市名称是否正确（如：北京、上海、广州），或稍后重试。');
                isInitialSearchDone = true;
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('searchBtn').disabled = false;
            }
        }

        // ==================== 页面加载时自动获取位置并查询 ====================
        window.addEventListener('DOMContentLoaded', function() {
            const defaultCity = getDefaultCity();
            document.getElementById('cityInput').value = defaultCity;
            highlightQuickCity(defaultCity);
            searchWeather();
            startAutoRefresh();
            getCurrentLocationAndSearch();
        });

        // ==================== 页面关闭时清理定时器 ====================
        window.addEventListener('beforeunload', function() {
            stopAutoRefresh();
        });
    </script>
</body>
</html>
