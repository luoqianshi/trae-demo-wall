<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 趣配音 — 智能语音配音生成器</title>
<style>
:root {
  --bg: #1a1025;
  --card: #241535;
  --accent: #ff6b9d;
  --accent2: #c44dff;
  --gold: #ffd93d;
  --text: #f0e6ff;
  --sub: #a89bb8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}
.hero {
  text-align: center; padding: 44px 20px 20px;
  background: linear-gradient(135deg, #1a1025 0%, #2a1050 50%, #1a1025 100%);
}
.hero h1 { font-size: 2.5em; font-weight: 800; }
.hero h1 span {
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p { color: var(--sub); margin-top: 8px; }

.container { max-width: 900px; margin: 0 auto; padding: 0 20px 50px; }

/* 文本输入 */
.input-zone {
  background: var(--card); border-radius: 20px; padding: 24px;
  margin: 20px 0; border: 1px solid rgba(255,255,255,.06);
}
.input-zone label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--accent2); }
.input-zone textarea {
  width: 100%; height: 90px; background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.12); border-radius: 14px;
  color: #fff; padding: 14px; font-size: .95em; resize: vertical;
  font-family: inherit; line-height: 1.6; outline: none;
}
.input-zone textarea:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(196,77,255,.15); }

/* 风格选择 */
.style-label { display: block; font-size:.9em; color:var(--sub); margin: 16px 0 8px; }
.style-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.style-card {
  padding: 14px 12px; border-radius: 14px; cursor: pointer;
  background: var(--card); border: 2px solid rgba(255,255,255,.06);
  text-align: center; transition: all .3s;
}
.style-card:hover { border-color: rgba(196,77,255,.3); transform: translateY(-2px); }
.style-card.active { border-color: var(--accent2); background: rgba(196,77,255,.12); box-shadow: 0 0 16px rgba(196,77,255,.15); }
.style-card .emoji { font-size: 1.8em; display: block; margin-bottom: 4px; }
.style-card .name { font-weight: 600; font-size: .9em; }
.style-card .desc { font-size: .7em; color: var(--sub); margin-top: 2px; }

/* 参数调节 */
.params-row {
  display: flex; gap: 16px; margin: 12px 0; flex-wrap: wrap;
}
.param-item {
  flex: 1; min-width: 100px;
}
.param-item label {
  display: flex; justify-content: space-between; font-size: .78em;
  color: var(--sub); margin-bottom: 4px;
}
.param-item input[type="range"] {
  width: 100%; accent-color: var(--accent2);
}

/* 按钮区 */
.btn-row { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
.btn {
  padding: 12px 24px; border-radius: 14px; border: none; font-weight: 700;
  cursor: pointer; transition: all .3s; font-size: .95em; font-family: inherit;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; flex: 1; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(196,77,255,.3); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-play { background: var(--gold); color: #1a1025; }
.btn-play:hover { transform: scale(1.03); }
.btn-pause { background: #ff6b6b; color: #fff; }
.btn-pause:hover { transform: scale(1.03); }
.btn-speak { background: var(--accent2); color: #fff; }
.btn-speak:hover { transform: scale(1.03); background: #a020f0; }

/* 播放状态指示器 */
.status-bar {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  border-radius: 12px; background: rgba(255,255,255,.03); margin: 10px 0;
  font-size: .85em; color: var(--sub);
}
.status-dot {
  width: 10px; height: 10px; border-radius: 50%; background: #555;
  transition: all .3s;
}
.status-dot.playing { background: var(--accent); animation: pulse-dot .6s ease-in-out infinite; }
.status-dot.paused { background: var(--gold); }
@keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.6);opacity:1} }

/* 语音可视化波形 */
.visualizer-wrap {
  background: var(--card); border-radius: 20px; padding: 24px;
  margin: 16px 0; border: 1px solid rgba(255,255,255,.06); display: none;
}
.visualizer-wrap.show { display: block; }
.visualizer-wrap h3 { color: var(--gold); margin-bottom: 12px; }
.voice-wave {
  display: flex; align-items: flex-end; gap: 2px; height: 80px;
  justify-content: center; margin: 12px 0;
}
.wave-bar {
  width: 7px; border-radius: 3px;
  background: linear-gradient(to top, var(--accent), var(--accent2), var(--gold));
  transition: height .15s;
}
.voice-wave.animating .wave-bar:nth-child(1)  { animation: waveAnim 1.1s ease-in-out infinite; animation-delay: 0s; }
.voice-wave.animating .wave-bar:nth-child(2)  { animation: waveAnim .95s ease-in-out infinite; animation-delay: .08s; }
.voice-wave.animating .wave-bar:nth-child(3)  { animation: waveAnim 1.05s ease-in-out infinite; animation-delay: .16s; }
.voice-wave.animating .wave-bar:nth-child(4)  { animation: waveAnim .85s ease-in-out infinite; animation-delay: .24s; }
.voice-wave.animating .wave-bar:nth-child(5)  { animation: waveAnim 1.15s ease-in-out infinite; animation-delay: .32s; }
.voice-wave.animating .wave-bar:nth-child(6)  { animation: waveAnim .9s ease-in-out infinite; animation-delay: .40s; }
.voice-wave.animating .wave-bar:nth-child(7)  { animation: waveAnim 1.0s ease-in-out infinite; animation-delay: .48s; }
.voice-wave.animating .wave-bar:nth-child(8)  { animation: waveAnim .88s ease-in-out infinite; animation-delay: .56s; }
.voice-wave.animating .wave-bar:nth-child(9)  { animation: waveAnim 1.08s ease-in-out infinite; animation-delay: .64s; }
.voice-wave.animating .wave-bar:nth-child(10) { animation: waveAnim .92s ease-in-out infinite; animation-delay: .72s; }
.voice-wave.animating .wave-bar:nth-child(11) { animation: waveAnim 1.02s ease-in-out infinite; animation-delay: .80s; }
.voice-wave.animating .wave-bar:nth-child(12) { animation: waveAnim .87s ease-in-out infinite; animation-delay: .88s; }
.voice-wave.animating .wave-bar:nth-child(13) { animation: waveAnim 1.12s ease-in-out infinite; animation-delay: .96s; }
.voice-wave.animating .wave-bar:nth-child(14) { animation: waveAnim .93s ease-in-out infinite; animation-delay: 1.04s; }
.voice-wave.animating .wave-bar:nth-child(15) { animation: waveAnim 1.06s ease-in-out infinite; animation-delay: 1.12s; }
@keyframes waveAnim { 0%,100%{transform:scaleY(.25)} 50%{transform:scaleY(1)} }

.result-text {
  background: rgba(0,0,0,.3); border-radius: 14px; padding: 18px;
  margin: 12px 0; line-height: 1.8; border-left: 4px solid var(--accent2);
}
.result-text .highlight { color: var(--gold); font-weight: 600; }
.result-text .emotion { color: var(--accent); font-weight: 600; }

.tags { display: flex; gap: 8px; flex-wrap: wrap; }
.tag { padding: 5px 14px; border-radius: 20px; font-size: .78em; background: rgba(196,77,255,.15); color: var(--accent2); }

/* 历史记录 */
.history { margin-top: 20px; }
.history h3 { color: var(--sub); margin-bottom: 10px; font-size: .85em; }
.history-item {
  padding: 10px 14px; background: rgba(255,255,255,.03); border-radius: 12px;
  margin-bottom: 6px; font-size: .82em; display: flex; justify-content: space-between;
  align-items: center; transition: all .2s;
}
.history-item:hover { background: rgba(255,255,255,.06); }
.history-item .hi-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-item .hi-style { color: var(--accent); margin: 0 10px; white-space: nowrap; }
.history-item .hi-del { cursor: pointer; opacity: .4; font-size: 1.2em; }
.history-item .hi-del:hover { opacity: 1; color: var(--accent); }
.history-item .hi-replay { cursor: pointer; margin: 0 8px; color: var(--accent2); font-size: .9em; }

/* 提示信息 */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 12px; background: var(--accent2);
  color: #fff; font-weight: 600; z-index: 999; animation: slideUp .4s; font-size: .9em;
}
@keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* 响应式 */
@media (max-width: 600px) {
  .style-grid { grid-template-columns: repeat(3, 1fr); }
  .hero h1 { font-size: 2em; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>🎙️ AI <span>趣配音</span></h1>
  <p>输入文字，选个风格，AI 真的读给你听！</p>
</div>

<div class="container">
  <!-- 文本输入 -->
  <div class="input-zone">
    <label>📝 输入你要配音的文字</label>
    <textarea id="textInput" placeholder="比如：欢迎收听今天的节目！我是你们的AI主播，今天给大家带来一段有趣的配音……"></textarea>
  </div>

  <!-- 风格选择 -->
  <span class="style-label">🎭 选择配音风格（不同风格=不同声音+语速+语调）</span>
  <div class="style-grid" id="styleGrid">
    <div class="style-card active" data-style="搞笑">
      <span class="emoji">🤪</span><span class="name">搞笑逗比</span><span class="desc">语速快 · 音调跳跃</span>
    </div>
    <div class="style-card" data-style="深情">
      <span class="emoji">😍</span><span class="name">深情主播</span><span class="desc">语速慢 · 低沉温柔</span>
    </div>
    <div class="style-card" data-style="霸气">
      <span class="emoji">😎</span><span class="name">霸气总裁</span><span class="desc">中速 · 低沉有力</span>
    </div>
    <div class="style-card" data-style="方言">
      <span class="emoji">🗣️</span><span class="name">方言大咖</span><span class="desc">方言词库 · 特有腔调</span>
    </div>
    <div class="style-card" data-style="古风">
      <span class="emoji">🏯</span><span class="name">古风说书</span><span class="desc">慢速 · 抑扬顿挫</span>
    </div>
    <div class="style-card" data-style="卡通">
      <span class="emoji">🐱</span><span class="name">卡通萌音</span><span class="desc">高音 · 快速活泼</span>
    </div>
  </div>

  <!-- 参数调节 -->
  <span class="style-label">🎛️ 微调参数</span>
  <div class="params-row">
    <div class="param-item">
      <label>语速 <span id="rateVal">1.0x</span></label>
      <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="1.0">
    </div>
    <div class="param-item">
      <label>音调 <span id="pitchVal">1.0</span></label>
      <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">
    </div>
    <div class="param-item">
      <label>音量 <span id="volVal">100%</span></label>
      <input type="range" id="volSlider" min="10" max="100" step="5" value="100">
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="btn-row">
    <button class="btn btn-primary" id="btnGenerate">✨ AI 润色 + 配音</button>
    <button class="btn btn-speak" id="btnSpeak">🔊 直接朗读</button>
  </div>

  <!-- 播放控制条 -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">就绪 · 等待配音</span>
    <span style="margin-left:auto;display:flex;gap:8px;">
      <button class="btn btn-play" id="btnReplay" style="padding:6px 14px;font-size:.85em;" disabled>▶ 重播</button>
      <button class="btn btn-pause" id="btnStop" style="padding:6px 14px;font-size:.85em;" disabled>⏹ 停止</button>
    </span>
  </div>

  <!-- 结果展示 -->
  <div class="visualizer-wrap" id="resultZone">
    <h3>🎬 配音播放中</h3>
    <div class="voice-wave" id="voiceWave">
      <div class="wave-bar" style="height:24px"></div><div class="wave-bar" style="height:40px"></div>
      <div class="wave-bar" style="height:56px"></div><div class="wave-bar" style="height:32px"></div>
      <div class="wave-bar" style="height:48px"></div><div class="wave-bar" style="height:28px"></div>
      <div class="wave-bar" style="height:44px"></div><div class="wave-bar" style="height:36px"></div>
      <div class="wave-bar" style="height:52px"></div><div class="wave-bar" style="height:30px"></div>
      <div class="wave-bar" style="height:46px"></div><div class="wave-bar" style="height:34px"></div>
      <div class="wave-bar" style="height:50px"></div><div class="wave-bar" style="height:38px"></div>
      <div class="wave-bar" style="height:42px"></div>
    </div>
    <div class="result-text" id="resultText"></div>
    <div class="tags" id="resultTags"></div>
  </div>

  <!-- 历史 -->
  <div class="history" id="historyContainer">
    <h3>📜 配音历史（点击重播）</h3>
    <div id="historyList"></div>
  </div>
</div>

<script>
// ===== 语音合成核心 =====
const synth = window.speechSynthesis;

// 风格参数预设: { rate, pitch, voiceHint }
const stylePresets = {
  '搞笑': { rate: 1.3, pitch: 1.4, voiceHint: 'zh-CN' },
  '深情': { rate: 0.85, pitch: 0.85, voiceHint: 'zh-CN' },
  '霸气': { rate: 0.9, pitch: 0.7, voiceHint: 'zh-CN' },
  '方言': { rate: 1.0, pitch: 0.95, voiceHint: 'zh-CN' },
  '古风': { rate: 0.75, pitch: 0.9, voiceHint: 'zh-TW' },
  '卡通': { rate: 1.4, pitch: 1.8, voiceHint: 'zh-CN' },
};

// 风格化词库（文本改写层）
const styleLib = {
  '搞笑': {
    modifiers: ['哈哈哈笑不活了', '这也太搞笑了吧', '笑死我了', '绷不住了家人们', '噗哈哈哈哈'],
    patterns: [
      '来，各位老铁听好了：{text}——哈哈哈，{extra}，你就说有没有道理吧！',
      '震惊！{text}——神仙操作啊！{extra}，笑不活了~',
      '我跟你讲，{text}，品，你细品！{extra}',
    ]
  },
  '深情': {
    modifiers: ['你知道吗', '在我的世界里', '如果可以', '这一生'],
    patterns: [
      '你知道吗……{text}。这大概就是最美的样子吧。{extra}。',
      '微风轻拂的傍晚，我想起你说的话：{text}。{extra}，这便是我的心声。',
      '在时光的长河里，{text}。{extra}，我愿用一生去守护。',
    ]
  },
  '霸气': {
    modifiers: ['听好了', '我要的就是', '没有商量', '我只说一次'],
    patterns: [
      '听好了——{text}！这就是我的态度！{extra}，不接受反驳。',
      '{text}！没有商量的余地！{extra}，就这么定了。',
      '{text}。我只说一次：{extra}，明白了吗？',
    ]
  },
  '方言': {
    modifiers: ['哎呀妈呀真带劲', '巴适得板', '猴赛雷啊', '整挺好的', '得劲儿'],
    patterns: [
      '哎呀妈呀！{text}——搁这儿闹呢嘛，{extra}，你说是不？',
      '来来来听我摆：{text}，巴适得板！{extra}！',
      '{text}——猴赛雷啊老铁！{extra}，就这么任性！',
    ]
  },
  '古风': {
    modifiers: ['正所谓', '曾记否', '江湖路远', '世事如棋'],
    patterns: [
      '曾记否，{text}。江湖路远，{extra}，吾辈当砥砺前行。',
      '世事如棋局局新，{text}。{extra}，此乃天意也。',
      '山高水长，{text}。{extra}，愿与诸君共勉。',
    ]
  },
  '卡通': {
    modifiers: ['喵喵喵~', '啾咪！', '嗷呜~', '嘻嘻嘻~'],
    patterns: [
      '喵喵喵~ {text}，嘻嘻嘻~ {extra} 啾咪！超可爱的呀~',
      '嗷呜~！{text}！{extra}，啦啦啦~ 好开心呀！',
      '啾咪啾咪！{text}~ {extra} 喵~ 比心比心！',
    ]
  }
};

let currentStyle = '搞笑';
let currentUtterance = null;
let currentFullText = '';
let currentOriginalText = '';
let history = [];

// ===== 语音引擎 =====
function getBestVoice(langHint) {
  const voices = synth.getVoices();
  // 优先中文女声
  let best = voices.find(v => v.lang.startsWith(langHint) && v.name.includes('Female'));
  if (!best) best = voices.find(v => v.lang.startsWith(langHint));
  if (!best) best = voices.find(v => v.lang.startsWith('zh'));
  if (!best) best = voices[0];
  return best;
}

function speak(text, style, onStart, onEnd) {
  synth.cancel(); // 先停掉当前

  const preset = stylePresets[style] || stylePresets['搞笑'];
  const voice = getBestVoice(preset.voiceHint);
  const rate = preset.rate * parseFloat(document.getElementById('rateSlider').value) / 1.0;
  const pitch = preset.pitch * parseFloat(document.getElementById('pitchSlider').value) / 1.0;
  const volume = parseInt(document.getElementById('volSlider').value) / 100;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.voice = voice;
  utterance.rate = rate;
  utterance.pitch = pitch;
  utterance.volume = volume;
  utterance.lang = preset.voiceHint;

  utterance.onstart = () => {
    if (onStart) onStart();
    setPlayState('playing');
  };
  utterance.onend = () => {
    if (onEnd) onEnd();
    setPlayState('idle');
    currentUtterance = null;
  };
  utterance.onerror = (e) => {
    if (e.error !== 'canceled' && e.error !== 'interrupted') {
      console.warn('语音错误:', e.error);
    }
    setPlayState('idle');
    currentUtterance = null;
  };

  // 可视化同步
  utterance.onboundary = () => {
    const wave = document.getElementById('voiceWave');
    if (!wave.classList.contains('animating')) wave.classList.add('animating');
  };

  currentUtterance = utterance;
  synth.speak(utterance);
  return utterance;
}

function setPlayState(state) {
  const dot = document.getElementById('statusDot');
  const stext = document.getElementById('statusText');
  const wave = document.getElementById('voiceWave');
  dot.classList.remove('playing', 'paused');
  wave.classList.remove('animating');

  if (state === 'playing') {
    dot.classList.add('playing');
    stext.textContent = '🔊 正在朗读配音……';
    document.getElementById('btnStop').disabled = false;
    document.getElementById('resultZone').classList.add('show');
    wave.classList.add('animating');
  } else if (state === 'paused') {
    dot.classList.add('paused');
    stext.textContent = '⏸ 已暂停';
    wave.classList.remove('animating');
  } else {
    stext.textContent = '就绪 · 等待配音';
    document.getElementById('btnStop').disabled = true;
    wave.classList.remove('animating');
  }
}

// ===== 风格选择 =====
document.getElementById('styleGrid').addEventListener('click', function(e) {
  const card = e.target.closest('.style-card');
  if (!card) return;
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  currentStyle = card.dataset.style;

  // 自动调节滑块到该风格默认值
  const preset = stylePresets[currentStyle];
  if (preset) {
    document.getElementById('rateSlider').value = preset.rate;
    document.getElementById('pitchSlider').value = preset.pitch;
    updateSliderLabels();
  }
});

// ===== AI 润色 + 配音 =====
document.getElementById('btnGenerate').addEventListener('click', function() {
  const text = document.getElementById('textInput').value.trim();
  if (!text) { showToast('⚠️ 请输入要配音的文字哦~'); return; }
  if (!synth) { showToast('⚠️ 你的浏览器不支持语音合成'); return; }

  currentOriginalText = text;
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.textContent = '⏳ AI 润色中……';

  // 模拟 AI 处理
  setTimeout(() => {
    const lib = styleLib[currentStyle];
    const pattern = lib.patterns[Math.floor(Math.random() * lib.patterns.length)];
    const extra = lib.modifiers[Math.floor(Math.random() * lib.modifiers.length)];
    const fullText = pattern.replace('{text}', text).replace('{extra}', extra);
    currentFullText = fullText;

    // 显示结果
    document.getElementById('resultText').innerHTML = fullText
      .replace(text, `<span class="highlight">${text}</span>`)
      .replace(extra, `<span class="emotion">${extra}</span>`);
    document.getElementById('resultTags').innerHTML = `
      <span class="tag">🎭 ${currentStyle}风格</span>
      <span class="tag">📝 原文${text.length}字 → 配音${fullText.length}字</span>
      <span class="tag">🎙️ 语速 ${document.getElementById('rateSlider').value}x</span>
    `;
    document.getElementById('resultZone').classList.add('show');
    document.getElementById('resultZone').scrollIntoView({ behavior: 'smooth' });

    btn.disabled = false;
    btn.textContent = '✨ AI 润色 + 配音';

    // 开始朗读
    speak(fullText, currentStyle, () => {
      // onstart
    }, () => {
      // onend — 加入历史
      addHistory(text, currentStyle);
    });

  }, 800);
});

// ===== 直接朗读 =====
document.getElementById('btnSpeak').addEventListener('click', function() {
  const text = document.getElementById('textInput').value.trim();
  if (!text) { showToast('⚠️ 请输入要朗读的文字'); return; }
  if (!synth) { showToast('⚠️ 浏览器不支持语音合成'); return; }

  currentOriginalText = text;
  currentFullText = text;

  document.getElementById('resultText').innerHTML = `<span class="highlight">${text}</span>（原文直读，未润色）`;
  document.getElementById('resultTags').innerHTML = `<span class="tag">🎭 ${currentStyle}风格</span><span class="tag">📢 直接朗读</span>`;
  document.getElementById('resultZone').classList.add('show');

  speak(text, currentStyle, null, () => {
    addHistory(text, currentStyle);
  });
});

// ===== 停止/重播 =====
document.getElementById('btnStop').addEventListener('click', function() {
  synth.cancel();
  setPlayState('idle');
  currentUtterance = null;
});

document.getElementById('btnReplay').addEventListener('click', function() {
  if (!currentFullText) { showToast('⚠️ 还没有生成过配音'); return; }
  document.getElementById('resultZone').classList.add('show');
  speak(currentFullText, currentStyle);
});

// ===== 参数滑块 =====
function updateSliderLabels() {
  document.getElementById('rateVal').textContent = parseFloat(document.getElementById('rateSlider').value).toFixed(1) + 'x';
  document.getElementById('pitchVal').textContent = parseFloat(document.getElementById('pitchSlider').value).toFixed(1);
  document.getElementById('volVal').textContent = document.getElementById('volSlider').value + '%';
}

['rateSlider','pitchSlider','volSlider'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateSliderLabels);
});

// ===== 历史记录 =====
function addHistory(text, style) {
  history.unshift({ text, style, fullText: currentFullText, time: new Date().toLocaleTimeString() });
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  document.getElementById('historyList').innerHTML = history.map((h, i) => `
    <div class="history-item">
      <span class="hi-text" title="${h.text}">${h.text.substring(0, 25)}${h.text.length > 25 ? '…' : ''}</span>
      <span class="hi-style">${h.style}</span>
      <span style="color:var(--sub);font-size:.72em;">${h.time}</span>
      <span class="hi-replay" onclick="event.stopPropagation(); replayHistory(${i})" title="重播">🔊</span>
      <span class="hi-del" onclick="event.stopPropagation(); delHistory(${i})">×</span>
    </div>
  `).join('') || '<div style="color:var(--sub);font-size:.8em;padding:10px;">还没有配音记录，快来试试吧~</div>';
}

function delHistory(i) { history.splice(i, 1); renderHistory(); }

function replayHistory(i) {
  const h = history[i];
  if (!h) return;
  currentStyle = h.style;
  currentFullText = h.fullText || h.text;
  currentOriginalText = h.text;

  // 同步风格选择
  document.querySelectorAll('.style-card').forEach(c => {
    c.classList.toggle('active', c.dataset.style === h.style);
  });
  const preset = stylePresets[h.style];
  if (preset) {
    document.getElementById('rateSlider').value = preset.rate;
    document.getElementById('pitchSlider').value = preset.pitch;
    updateSliderLabels();
  }

  document.getElementById('resultText').innerHTML = `<span class="highlight">${h.fullText || h.text}</span>`;
  document.getElementById('resultTags').innerHTML = `<span class="tag">🎭 ${h.style}风格</span><span class="tag">🔄 历史重播</span>`;
  document.getElementById('resultZone').classList.add('show');
  document.getElementById('resultZone').scrollIntoView({ behavior: 'smooth' });
  speak(h.fullText || h.text, h.style);
}

// ===== 工具函数 =====
function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2200);
}

// ===== 初始化 =====
// 预加载语音
if (synth) {
  synth.getVoices();
  synth.onvoiceschanged = () => synth.getVoices();
}

// 初始渲染历史
renderHistory();

// 确保停止按钮初始状态
document.getElementById('btnStop').addEventListener('click', () => { synth.cancel(); setPlayState('idle'); });
</script>
</body>
</html>
