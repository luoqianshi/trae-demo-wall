<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畅配音 - CV工作台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --primary-light: rgba(102, 126, 234, 0.1);
            --secondary: #f093fb;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --info: #60a5fa;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-subtle: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Header */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
            padding: 20px 24px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-logo svg {
            width: 28px;
            height: 28px;
            color: #667eea;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-left: 8px;
            padding-left: 16px;
            border-left: 1px solid var(--border-subtle);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: var(--bg-white);
            color: var(--text-primary);
            border: 1.5px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: rgba(74, 222, 128, 0.1);
            color: #22c55e;
        }

        .btn-success:hover {
            background: #22c55e;
            color: white;
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
        }

        .btn-danger:hover {
            background: #f87171;
            color: white;
        }

        .btn-info {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
        }

        .btn-info:hover {
            background: #60a5fa;
            color: white;
        }

        .btn-warning {
            background: rgba(251, 191, 36, 0.1);
            color: #f59e0b;
        }

        .btn-warning:hover {
            background: #f59e0b;
            color: white;
        }

        /* Tab Container */
        .tab-container { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px;
            background: var(--bg-white);
            padding: 8px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .tab { 
            padding: 10px 24px; 
            border: none; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .tab.active { 
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .tab.inactive { 
            background: transparent;
            color: var(--text-secondary);
        }

        .tab.inactive:hover {
            background: var(--bg-light);
        }

        /* Card */
        .card { 
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 24px; 
            margin-bottom: 24px; 
            box-shadow: var(--shadow-sm);
        }

        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
        }

        .card-title { 
            font-size: 18px; 
            font-weight: 600;
            color: var(--text-primary);
        }

        .badge { 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600;
        }

        .badge-pending { 
            background: rgba(251, 191, 36, 0.1);
            color: #f59e0b;
        }

        .badge-claimed { 
            background: var(--primary-light);
            color: var(--primary);
        }

        .badge-done { 
            background: rgba(74, 222, 128, 0.1);
            color: #22c55e;
        }

        .badge-warning { 
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
        }

        /* Character List */
        .character-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 16px;
        }

        .character-card { 
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px; 
            background: var(--bg-white);
            transition: all 0.2s ease;
        }

        .character-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .character-name { 
            font-weight: 600; 
            color: var(--primary);
            margin-bottom: 8px; 
            font-size: 16px;
        }

        .character-desc { 
            font-size: 14px; 
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .demo-text { 
            font-size: 13px; 
            background: var(--bg-light);
            padding: 10px 12px; 
            border-radius: var(--radius-sm);
            margin-bottom: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Alert */
        .alert-warning { 
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.2);
            padding: 16px 20px; 
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Task Item */
        .task-item { 
            padding: 16px 0; 
            border-bottom: 1px solid var(--border-light);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .task-item:last-child { 
            border-bottom: none; 
        }

        .task-info { 
            flex: 1; 
        }

        .task-title { 
            font-weight: 600; 
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .task-meta { 
            font-size: 13px; 
            color: var(--text-secondary);
        }

        /* Stats */
        .stats-row { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-bottom: 24px;
        }

        .stat-card { 
            text-align: center; 
            padding: 24px; 
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .stat-number { 
            font-size: 36px; 
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label { 
            font-size: 14px; 
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18V5l12-2v13"/>
                    <circle cx="6" cy="18" r="3"/>
                    <circle cx="18" cy="16" r="3"/>
                </svg>
                畅配音
            </div>
            <div class="header-title">CV工作台</div>
        </div>
        <div>
            <button class="btn btn-secondary" onclick="window.location.href='/projects'">返回项目管理</button>
            <button class="btn btn-outline" onclick="window.location.href='/logout'">退出登录</button>
        </div>
    </div>
    <div class="container">

    <div class="alert-warning" id="alertWarning" style="display: none;">
        <strong>⚠️ 重要提醒：</strong>您有 <span id="pendingCount">0</span> 项任务需要处理，请尽快完成！
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-number" id="totalClaimed">0</div>
            <div class="stat-label">已认领角色</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="pendingTasks">0</div>
            <div class="stat-label">待处理任务</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completedTasks">0</div>
            <div class="stat-label">已完成任务</div>
        </div>
    </div>

    <div class="tab-container">
        <button class="tab active" onclick="switchTab('claim')">📋 角色认领</button>
        <button class="tab inactive" onclick="switchTab('tasks')">✅ 我的任务</button>
    </div>

    <div id="claimSection">
        <div class="card">
            <div class="card-header">
                <span class="card-title">待认领角色</span>
                <span class="badge badge-pending">等待认领</span>
            </div>
            <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px; padding: 8px 12px; background: var(--bg-light); border-radius: var(--radius-sm);">
                💡 提示：已自动过滤所有已认领的角色（包括您和其他配音员认领的），只显示新出现的角色
            </div>
            <div class="character-list" id="unclaimedList"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">我的角色</span>
                <span class="badge badge-claimed">已认领</span>
            </div>
            <div class="character-list" id="myCharacters"></div>
        </div>
    </div>

    <div id="tasksSection" style="display: none;">
        <div class="card">
            <div class="card-header">
                <span class="card-title">需要修改的台词</span>
                <span class="badge badge-warning">待处理</span>
            </div>
            <div id="pendingTasksList"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">已完成任务</span>
                <span class="badge badge-done">已修复</span>
            </div>
            <div id="completedTasksList"></div>
        </div>
    </div>
    </div>

    <script>
        let currentTab = 'claim';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active', 'inactive'));
            document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => {
                if (!t.classList.contains('active')) t.classList.add('inactive');
            });
            
            document.getElementById('claimSection').style.display = tab === 'claim' ? 'block' : 'none';
            document.getElementById('tasksSection').style.display = tab === 'tasks' ? 'block' : 'none';
            
            if (tab === 'claim') loadUnclaimedCharacters();
            else loadMyTasks();
        }

        async function loadUnclaimedCharacters() {
            try {
                const resp = await fetch('/api/unclaimed_characters');
                const data = await resp.json();
                
                const unclaimedList = document.getElementById('unclaimedList');
                unclaimedList.innerHTML = data.characters.map(char => `
                    <div class="character-card">
                        <div class="character-name">${escapeHtml(char.character_name)}</div>
                        <div class="character-desc">${escapeHtml(char.character_desc || '暂无描述')}</div>
                        <div class="demo-text">试音台词：${escapeHtml(char.demo_text || '暂无')}</div>
                        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">
                            项目：${escapeHtml(char.project_name)} | 章节：${escapeHtml(char.chapter_name)}
                        </div>
                        <button class="btn btn-success" onclick="claimCharacter(${char.id})">认领角色</button>
                    </div>
                `).join('');
                
                loadMyCharacters();
            } catch (err) {
                console.error('加载角色失败:', err);
            }
        }

        async function loadMyCharacters() {
            try {
                const resp = await fetch('/api/my_characters');
                const data = await resp.json();
                
                const myCharacters = document.getElementById('myCharacters');
                myCharacters.innerHTML = data.characters.map(char => {
                    const hasDemo = char.demo_file;
                    return `
                    <div class="character-card">
                        <div class="character-name">${escapeHtml(char.character_name)}</div>
                        <div class="character-desc">${escapeHtml(char.character_desc || '暂无描述')}</div>
                        <div class="demo-text">试音台词：${escapeHtml(char.demo_text || '暂无')}</div>
                        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">
                            项目：${escapeHtml(char.project_name)} | 章节：${escapeHtml(char.chapter_name)}
                        </div>
                        ${hasDemo ? `<div style="color: #22c55e; font-size: 12px; margin-bottom: 12px; font-weight: 600;">✓ Demo已上传</div>` : ''}
                        <input type="file" accept="audio/*" id="demoFile_${char.id}" style="display: none;" onchange="uploadDemo(${char.id}, this)">
                        <button class="btn btn-primary" onclick="document.getElementById('demoFile_${char.id}').click()">${hasDemo ? '重新上传Demo' : '上传Demo'}</button>
                    </div>
                `;
                }).join('');
            } catch (err) {
                console.error('加载我的角色失败:', err);
            }
        }

        async function uploadDemo(charId, input) {
            const file = input.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('character_id', charId);
            formData.append('demo_file', file);
            
            try {
                const resp = await fetch('/api/upload_demo', {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();
                if (data.success) {
                    alert(data.message || 'Demo上传成功，等待管理员审核');
                    loadMyCharacters();
                } else {
                    alert('上传失败：' + data.error);
                }
            } catch (err) {
                alert('上传失败：' + err.message);
            }
            input.value = '';
        }

        async function claimCharacter(charId) {
            try {
                const resp = await fetch('/api/claim_character', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character_id: charId })
                });
                const data = await resp.json();
                if (data.success) {
                    loadUnclaimedCharacters();
                    alert('角色认领成功！');
                } else {
                    alert('认领失败：' + data.error);
                }
            } catch (err) {
                alert('认领失败：' + err.message);
            }
        }

        function goToChapter(taskId) {
            window.location.href = `/editor/${taskId}`;
        }

        async function loadMyTasks() {
            try {
                const resp = await fetch('/api/my_pending_tasks');
                const data = await resp.json();
                
                document.getElementById('pendingCount').textContent = data.pending_count;
                document.getElementById('totalClaimed').textContent = data.total_claimed;
                document.getElementById('pendingTasks').textContent = data.pending_count;
                document.getElementById('completedTasks').textContent = data.completed_count;
                
                if (data.pending_count > 0) {
                    document.getElementById('alertWarning').style.display = 'block';
                }
                
                const pendingList = document.getElementById('pendingTasksList');
                pendingList.innerHTML = data.pending.length > 0 ? data.pending.map(task => `
                    <div class="task-item">
                        <div class="task-info">
                            <div class="task-title">${escapeHtml(task.project_name)} - ${escapeHtml(task.chapter_name)}</div>
                            <div class="task-meta">角色：${escapeHtml(task.character_name)} | ${task.fix_count} 处需要修改</div>
                        </div>
                        <button class="btn btn-info" onclick="goToChapter('${task.task_id}')">去修改</button>
                    </div>
                `).join('') : '<div style="text-align: center; padding: 24px; color: var(--text-muted);">暂无待处理任务</div>';
                
                const completedList = document.getElementById('completedTasksList');
                completedList.innerHTML = data.completed.length > 0 ? data.completed.map(task => `
                    <div class="task-item">
                        <div class="task-info">
                            <div class="task-title">${escapeHtml(task.project_name)} - ${escapeHtml(task.chapter_name)}</div>
                            <div class="task-meta">角色：${escapeHtml(task.character_name)} | 已完成修复</div>
                        </div>
                        <button class="btn btn-info" onclick="goToChapter('${task.task_id}')">查看</button>
                    </div>
                `).join('') : '<div style="text-align: center; padding: 24px; color: var(--text-muted);">暂无已完成任务</div>';
            } catch (err) {
                console.error('加载任务失败:', err);
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        window.onload = () => {
            loadUnclaimedCharacters();
            loadMyTasks();
        };
    </script>
</body>
</html>
