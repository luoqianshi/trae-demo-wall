<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畅配音 - 剧本编辑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-subtle: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            
            --role-narrator: #667eea;
            --role-male: #3b82f6;
            --role-female: #ec4899;
            --role-other: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: var(--bg-light);
            color: var(--primary);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: var(--bg-white);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            background: var(--bg-light);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #22c55e;
        }

        .container {
            display: flex;
            height: calc(100vh - 65px);
        }

        .sidebar {
            width: 320px;
            background: var(--bg-white);
            border-right: 1px solid var(--border-subtle);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-info-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 16px;
        }

        .project-info-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .project-info-card .value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .character-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .character-tag {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-light);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .character-tag:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .character-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .character-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
        }

        .character-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-white);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .toolbar-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-item label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toolbar-item select {
            padding: 6px 12px;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: var(--bg-white);
        }

        .script-editor {
            flex: 1;
            background: var(--bg-white);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .script-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .script-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .script-word-count {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .script-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            outline: none;
            min-height: 500px;
            line-height: 2;
            font-size: 18px;
            color: var(--text-primary);
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
        }

        .script-content:empty:before {
            content: attr(data-placeholder);
            color: #9ca3af;
        }

        .script-line {
            display: flex;
            gap: 16px;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .script-line:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .script-line.editing {
            background: rgba(251, 191, 36, 0.1);
            border-left: 3px solid var(--warning);
        }

        .role-name {
            font-weight: 600;
            min-width: 80px;
            max-width: 120px;
            flex-shrink: 0;
            padding: 4px 10px;
            border-radius: 6px;
            text-align: center;
        }

        .role-narrator {
            background: rgba(102, 126, 234, 0.1);
            color: var(--role-narrator);
        }

        .role-male {
            background: rgba(59, 130, 246, 0.1);
            color: var(--role-male);
        }

        .role-female {
            background: rgba(236, 72, 153, 0.1);
            color: var(--role-female);
        }

        .role-other {
            background: rgba(139, 92, 246, 0.1);
            color: var(--role-other);
        }

        .line-text {
            flex: 1;
            word-break: break-word;
            padding: 4px 0;
        }

        .line-text-input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            background: var(--bg-white);
            outline: none;
        }

        .line-text-input:focus {
            border-color: var(--primary);
        }

        .line-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .script-line:hover .line-actions {
            opacity: 1;
        }

        .line-action-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .line-action-btn.edit {
            background: rgba(251, 191, 36, 0.2);
            color: #d97706;
        }

        .line-action-btn.edit:hover {
            background: #fbbf24;
            color: white;
        }

        .line-action-btn.delete {
            background: rgba(248, 113, 113, 0.2);
            color: #dc2626;
        }

        .line-action-btn.delete:hover {
            background: #f87171;
            color: white;
        }

        .add-line-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            margin-top: 12px;
            border: 2px dashed var(--border-subtle);
            border-radius: var(--radius-md);
            background: transparent;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .add-line-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(102, 126, 234, 0.02);
        }

        .status-bar {
            padding: 12px 20px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-message {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-message.success {
            color: var(--success);
        }

        .status-message.error {
            color: var(--danger);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 90%;
            max-width: 480px;
        }

        .modal h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            background: var(--bg-white);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M19 12H5"/>
                    <path d="M12 19l-7-7 7-7"/>
                </svg>
                返回
            </button>
            <div class="header-title">📝 剧本编辑</div>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="previewScript()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                    <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                预览
            </button>
            <button class="btn btn-success" onclick="saveDraft()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M19 12H5"/>
                    <path d="M12 19l-7-7 7-7"/>
                </svg>
                保存修改
            </button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="project-info-card">
                    <div class="label">项目名称</div>
                    <div class="value" id="projectName">{{ project_name }}</div>
                </div>
                <div class="project-info-card">
                    <div class="label">章节名称</div>
                    <div class="value" id="chapterName">{{ chapter_name }}</div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    角色列表
                </h3>
                <div class="character-list" id="characterList"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="script-editor">
                <div class="script-header">
                    <span class="script-title">剧本内容</span>
                    <span class="script-word-count" id="wordCount">0 字</span>
                </div>

                <div class="script-content" id="scriptContent" contenteditable="true" data-placeholder="在此输入剧本内容..."></div>

                <div class="status-bar">
                    <span class="status-message" id="statusMsg">已自动保存</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const draftId = "{{ draft_id }}";
        const projectName = "{{ project_name }}";
        const chapterName = "{{ chapter_name }}";
        let scriptContent = '';
        let characters = [];

        try {
            characters = JSON.parse('{{ characters | safe }}');
        } catch (e) {
            characters = [];
        }

        function renderCharacterList() {
            const container = document.getElementById('characterList');
            container.innerHTML = characters.map((char, index) => {
                const colors = ['#667eea', '#3b82f6', '#ec4899', '#8b5cf6', '#06b6d4', '#10b981', '#f59e0b', '#ef4444'];
                const color = colors[index % colors.length];
                return `
                    <div class="character-tag">
                        <div class="character-color" style="background: ${color}"></div>
                        <div>
                            <div class="character-name">${escapeHtml(char.name)}</div>
                            <div class="character-desc">${escapeHtml(char.personality || char.gender || '')}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadDraft() {
            try {
                const resp = await fetch(`/api/get_draft/${draftId}`);
                const data = await resp.json();
                
                if (data.script) {
                    scriptContent = data.script;
                    document.getElementById('scriptContent').innerText = scriptContent;
                }
                
                document.getElementById('wordCount').textContent = `${data.script?.length || 0} 字`;
            } catch (err) {
                console.error('加载草稿失败:', err);
            }
        }

        async function saveDraft() {
            const script = document.getElementById('scriptContent').innerText;
            
            try {
                const resp = await fetch('/api/save_draft', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'credentials': 'include'
                    },
                    body: JSON.stringify({
                        draft_id: draftId,
                        script: script,
                        project_name: projectName,
                        chapter_name: chapterName
                    })
                });

                const data = await resp.json();
                const statusMsg = document.getElementById('statusMsg');
                
                if (data.success) {
                    statusMsg.textContent = '✓ 保存成功';
                    statusMsg.className = 'status-message success';
                    document.getElementById('wordCount').textContent = `${script.length} 字`;
                } else {
                    statusMsg.textContent = '保存失败: ' + data.message;
                    statusMsg.className = 'status-message error';
                }

                setTimeout(() => {
                    statusMsg.textContent = '已自动保存';
                    statusMsg.className = 'status-message';
                }, 3000);
            } catch (err) {
                console.error('保存失败:', err);
            }
        }

        function previewScript() {
            window.open(`/preview?draft_id=${draftId}`, '_blank');
        }

        function goBack() {
            window.location.href = '/projects';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.getElementById('scriptContent').addEventListener('input', function() {
            const text = this.innerText;
            document.getElementById('wordCount').textContent = `${text.length} 字`;
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderCharacterList();
            loadDraft();
        });
    </script>
</body>
</html>
