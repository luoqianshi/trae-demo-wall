<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畅配音 - 有声书精修编辑器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --primary-light: rgba(102, 126, 234, 0.1);
            --secondary: #f093fb;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --info: #60a5fa;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-subtle: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-logo svg {
            width: 26px;
            height: 26px;
            color: #667eea;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-left: 8px;
            padding-left: 12px;
            border-left: 1px solid var(--border-subtle);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-light);
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary);
        }

        .back-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Container */
        .container {
            display: flex;
            gap: 24px;
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .left-panel {
            flex: 0 0 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: calc(100vh - 140px);
        }

        /* Card */
        .card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon.primary {
            background: rgba(102, 126, 234, 0.1);
        }

        .card-icon.primary svg {
            color: #667eea;
        }

        .card-icon.success {
            background: rgba(74, 222, 128, 0.1);
        }

        .card-icon.success svg {
            color: #4ade80;
        }

        .card-icon.warning {
            background: rgba(251, 191, 36, 0.1);
        }

        .card-icon.warning svg {
            color: #fbbf24;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Audio Player */
        .audio-player {
            width: 100%;
            margin-bottom: 16px;
        }

        .audio-player audio {
            width: 100%;
            border-radius: var(--radius-md);
            background: var(--bg-light);
        }

        /* Manual Panel */
        .manual-panel {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            border: 2px solid rgba(102, 126, 234, 0.2);
        }

        .manual-panel .card-header {
            border-bottom-color: rgba(102, 126, 234, 0.1);
        }

        .manual-steps {
            list-style: none;
            padding: 0;
            margin: 0 0 16px 0;
        }

        .manual-steps li {
            padding: 8px 0;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .manual-steps li::before {
            content: '';
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .manual-steps li:nth-child(1)::before { content: '1'; }
        .manual-steps li:nth-child(2)::before { content: '2'; }
        .manual-steps li:nth-child(3)::before { content: '✓'; font-size: 12px; }

        .marker-display {
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-light);
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .marker-display strong {
            color: var(--text-primary);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .btn svg {
            width: 14px;
            height: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: var(--bg-white);
            color: var(--text-primary);
            border: 1.5px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-success {
            background: #22c55e;
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-group .btn {
            flex: 1;
            min-width: calc(50% - 4px);
        }

        /* File Input */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-top: 8px;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-wrapper .btn {
            width: 100%;
            justify-content: center;
            background: var(--bg-light);
            color: var(--text-secondary);
            border: 1px dashed var(--border-subtle);
        }

        .file-input-wrapper .btn:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .file-name {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            padding-left: 4px;
        }

        /* Edit Mode Bar */
        .edit-mode-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border: 1px solid #fde68a;
            border-radius: var(--radius-md);
        }

        .edit-mode-bar span {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #92400e;
            font-weight: 500;
        }

        .edit-mode-bar span svg {
            width: 16px;
            height: 16px;
        }

        /* Script List */
        .script-list {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            overflow: hidden;
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }

        .script-list-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .script-list-header svg {
            width: 16px;
            height: 16px;
            color: var(--primary);
        }

        .script-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-light);
            transition: background 0.2s ease;
        }

        .script-item:hover {
            background: var(--bg-light);
        }

        .script-item:last-child {
            border-bottom: none;
        }

        .script-role {
            flex: 0 0 80px;
            font-weight: 600;
            color: var(--primary);
            font-size: 13px;
            padding: 6px 12px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            text-align: center;
        }

        .script-text {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
            word-break: break-word;
            padding-top: 6px;
            cursor: pointer;
            position: relative;
        }

        .script-text:hover {
            color: var(--primary);
        }

        .script-text.edited {
            color: #dc2626;
        }

        .script-text-input {
            width: 100%;
            min-height: 80px;
            padding: 10px 12px;
            border: 1.5px solid var(--primary);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            background: var(--bg-light);
        }

        .script-text-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Checkboxes */
        .checkboxes {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }

        .checkbox-label.need-fix {
            color: #dc2626;
        }

        .checkbox-label.need-fix:hover {
            background: rgba(220, 38, 38, 0.1);
        }

        .checkbox-label.fixed {
            color: #22c55e;
        }

        .checkbox-label.fixed:hover {
            background: rgba(34, 197, 94, 0.1);
        }

        .checkbox-label input[type="checkbox"] {
            width: 15px;
            height: 15px;
            border-radius: 4px;
            accent-color: currentColor;
        }

        .status-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .status-tag.need-fix {
            background: rgba(220, 38, 38, 0.1);
            color: #dc2626;
        }

        .status-tag.fixed {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        /* Edit Buttons */
        .edit-btn-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .edit-btn {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .edit-btn.save {
            background: #22c55e;
            color: white;
        }

        .edit-btn.save:hover {
            background: #16a34a;
        }

        .edit-btn.cancel {
            background: var(--bg-light);
            color: var(--text-secondary);
        }

        .edit-btn.cancel:hover {
            background: var(--border-subtle);
        }

        /* Status Message */
        .status {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .status.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .left-panel {
                flex: none;
                width: 100%;
            }

            .btn-group .btn {
                min-width: calc(33.33% - 6px);
            }
        }

        @media (max-width: 640px) {
            .header {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 12px;
            }

            .header-left {
                width: 100%;
            }

            .container {
                padding: 16px;
            }

            .script-item {
                flex-direction: column;
                gap: 10px;
            }

            .script-role {
                align-self: flex-start;
            }

            .checkboxes {
                flex-wrap: wrap;
            }

            .btn-group .btn {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="/projects" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                返回
            </a>
            <a href="/" class="header-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a9 9 0 0 0-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7a9 9 0 0 0-9-9z"/>
                </svg>
                畅配音
            </a>
            <span class="header-title">有声书精修编辑器</span>
        </div>
    </div>

    <div class="container">
        <div class="left-panel">
            <div class="card">
                <div class="audio-player">
                    <audio id="audioPlayer" controls src="{{ audio_url }}">
                </div>
            </div>

            <div class="card manual-panel">
                <div class="card-header">
                    <div class="card-icon primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                    </div>
                    <span class="card-title">手动替换模式</span>
                </div>
                <ul class="manual-steps">
                    <li>播放音频，标记起点/终点；</li>
                    <li>选择新音频文件，点击替换；</li>
                    <li>替换成功后建议刷新页面。</li>
                </ul>
                <div class="marker-display">
                    <strong>当前标记：</strong> 
                    起点 <span id="manualStartDisplay">未设置</span> 
                    | 终点 <span id="manualEndDisplay">未设置</span>
                </div>
                <div class="btn-group">
                    <button id="setStartBtn" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        标记起点
                    </button>
                    <button id="setEndBtn" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="7" height="7"/>
                        </svg>
                        标记终点
                    </button>
                    <button id="clearMarkersBtn" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                        清除标记
                    </button>
                </div>
                <div class="file-input-wrapper">
                    <button class="btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        选择音频文件
                    </button>
                    <input type="file" id="manualAudioFile" accept="audio/*">
                </div>
                <div class="file-name" id="fileNameDisplay">未选择文件</div>
                <button id="manualReplaceBtn" class="btn btn-primary" style="width: 100%; margin-top: 12px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    上传并替换此区间
                </button>
            </div>

            <button id="exportBtn" class="btn btn-success" style="width: 100%;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                导出最终音频
            </button>
        </div>

        <div class="right-panel">
            <div class="edit-mode-bar">
                <span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 20h9"/>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                    双击台词文本可直接编辑
                </span>
                <button id="saveScriptBtn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                    </svg>
                    保存剧本修改
                </button>
            </div>

            <div class="script-list">
                <div class="script-list-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    原始剧本 (勾选需要修改的句子)
                </div>
                <div id="scriptList"></div>
            </div>
        </div>
    </div>

    <div id="statusMsg" class="status"></div>

    <script>
        const audioUrl = "{{ audio_url }}";
        const taskId = "{{ task_id }}";
        const originalScript = {{ original_script | tojson }};
        let manualStart = null, manualEnd = null;
        let lineStatus = {};
        let userPermissions = {
            mark_need_fix: true,
            mark_fixed: true,
            audio_replace: true
        };

        async function loadUserPermissions() {
            try {
                const resp = await fetch('/api/current_user_permissions');
                const data = await resp.json();
                userPermissions = {
                    mark_need_fix: data.mark_need_fix || false,
                    mark_fixed: data.mark_fixed || false,
                    audio_replace: data.audio_replace || false
                };
                updateUIByPermissions();
            } catch (err) {
                console.error('加载权限失败:', err);
            }
        }

        function updateUIByPermissions() {
            const manualPanel = document.querySelector('.manual-panel');
            if (!userPermissions.audio_replace && manualPanel) {
                manualPanel.style.display = 'none';
            }
            renderScriptList();
        }

        function parseRoleAndText(line) {
            if (!line) return { role: "未知", text: "" };
            line = line.trim();
            let match = line.match(/^([^:：]+)[:：](.*)$/);
            if (match) {
                let role = match[1].trim();
                let text = match[2].trim();
                if (role.includes('旁白：') || role.includes('旁白:')) {
                    return parseRoleAndText(role + '：' + text);
                }
                return { role: role, text: text };
            } else {
                return { role: "旁白", text: line };
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        async function loadLineStatus() {
            try {
                const resp = await fetch(`/api/get_line_status/${taskId}`);
                const data = await resp.json();
                if (data.status) lineStatus = data.status;
            } catch(e) { console.error(e); }
            renderScriptList();
        }

        async function saveLineStatus(lineIndex, needFix, fixed) {
            try {
                await fetch('/api/update_line_status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId, line_index: lineIndex, need_fix: needFix, fixed: fixed })
                });
            } catch(e) { console.error(e); }
        }

        let editedLines = {};

        function renderScriptList() {
            const container = document.getElementById('scriptList');
            container.innerHTML = '';
            if (!originalScript) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">暂无剧本内容</div>';
                return;
            }
            const lines = originalScript.split('\n').filter(line => line.trim().length > 0);
            lines.forEach((line, idx) => {
                const { role, text } = parseRoleAndText(line);
                const state = lineStatus[idx] || { need_fix: false, fixed: false };
                const editedText = editedLines[idx] !== undefined ? editedLines[idx] : text;
                const isEdited = editedLines[idx] !== undefined;
                
                const div = document.createElement('div');
                div.className = 'script-item';
                
                let checkboxHtml = '';
                if (userPermissions.mark_need_fix) {
                    checkboxHtml += `<label class="checkbox-label need-fix"><input type="checkbox" class="need-fix" data-idx="${idx}" ${state.need_fix ? 'checked' : ''}> 需要修改</label>`;
                } else if (state.need_fix) {
                    checkboxHtml += `<span class="status-tag need-fix">✓ 需要修改</span>`;
                }
                
                if (userPermissions.mark_fixed) {
                    checkboxHtml += `<label class="checkbox-label fixed"><input type="checkbox" class="fixed" data-idx="${idx}" ${state.fixed ? 'checked' : ''}> 已修复</label>`;
                } else if (state.fixed) {
                    checkboxHtml += `<span class="status-tag fixed">✓ 已修复</span>`;
                }
                
                div.innerHTML = `
                    <div class="script-role">${escapeHtml(role)}</div>
                    <div class="script-text ${isEdited ? 'edited' : ''}" data-idx="${idx}" title="双击编辑">${isEdited ? escapeHtml(editedText) + ' *' : escapeHtml(text)}</div>
                    <div class="checkboxes">${checkboxHtml}</div>
                `;
                
                const textDiv = div.querySelector('.script-text');
                textDiv.addEventListener('dblclick', () => startEditLine(idx, textDiv, editedText));
                
                const needFixCb = div.querySelector('.need-fix');
                const fixedCb = div.querySelector('.fixed');
                
                if (needFixCb) {
                    needFixCb.addEventListener('change', (e) => {
                        const checked = e.target.checked;
                        saveLineStatus(idx, checked, fixedCb?.checked || false);
                        if (checked && fixedCb) fixedCb.checked = false;
                    });
                }
                
                if (fixedCb) {
                    fixedCb.addEventListener('change', (e) => {
                        const checked = e.target.checked;
                        saveLineStatus(idx, needFixCb?.checked || false, checked);
                        if (checked && needFixCb) needFixCb.checked = false;
                    });
                }
                
                container.appendChild(div);
            });
        }

        function startEditLine(idx, textDiv, currentText) {
            const textarea = document.createElement('textarea');
            textarea.className = 'script-text-input';
            textarea.value = currentText;
            textarea.style.fontSize = '14px';
            
            const btnContainer = document.createElement('div');
            btnContainer.className = 'edit-btn-group';
            
            const saveBtn = document.createElement('button');
            saveBtn.className = 'edit-btn save';
            saveBtn.textContent = '保存';
            saveBtn.onclick = () => saveEdit(idx, textarea.value, textDiv);
            
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'edit-btn cancel';
            cancelBtn.textContent = '取消';
            cancelBtn.onclick = () => renderScriptList();
            
            btnContainer.appendChild(saveBtn);
            btnContainer.appendChild(cancelBtn);
            
            textDiv.innerHTML = '';
            textDiv.appendChild(textarea);
            textDiv.appendChild(btnContainer);
            
            textarea.focus();
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    saveEdit(idx, textarea.value, textDiv);
                } else if (e.key === 'Escape') {
                    renderScriptList();
                }
            });
        }

        function saveEdit(idx, newText, textDiv) {
            newText = newText.trim();
            if (newText) {
                editedLines[idx] = newText;
            } else {
                delete editedLines[idx];
            }
            renderScriptList();
        }

        async function saveScriptChanges() {
            const lines = originalScript.split('\n').filter(line => line.trim().length > 0);
            let newScript = '';
            
            for (let i = 0; i < lines.length; i++) {
                if (editedLines[i] !== undefined) {
                    const { role } = parseRoleAndText(lines[i]);
                    newScript += `${role}：${editedLines[i]}\n`;
                } else {
                    newScript += lines[i] + '\n';
                }
            }
            
            showStatus('正在保存剧本修改...', 'info');
            
            try {
                const resp = await fetch('/update_script', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId, script: newScript.trim() })
                });
                const data = await resp.json();
                if (data.success) {
                    showStatus('剧本保存成功！', 'success');
                    editedLines = {};
                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                } else {
                    showStatus('保存失败：' + (data.error || '未知错误'), 'error');
                }
            } catch (err) {
                showStatus('保存失败：' + err.message, 'error');
            }
        }

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        const audioPlayer = document.getElementById('audioPlayer');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        
        document.getElementById('setStartBtn').onclick = () => {
            manualStart = audioPlayer.currentTime * 1000;
            document.getElementById('manualStartDisplay').innerText = (manualStart/1000).toFixed(2)+'s';
        };
        
        document.getElementById('setEndBtn').onclick = () => {
            manualEnd = audioPlayer.currentTime * 1000;
            document.getElementById('manualEndDisplay').innerText = (manualEnd/1000).toFixed(2)+'s';
        };
        
        document.getElementById('clearMarkersBtn').onclick = () => {
            manualStart = manualEnd = null;
            document.getElementById('manualStartDisplay').innerText = '未设置';
            document.getElementById('manualEndDisplay').innerText = '未设置';
        };
        
        document.getElementById('manualAudioFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.textContent = file.name;
            } else {
                fileNameDisplay.textContent = '未选择文件';
            }
        });
        
        document.getElementById('manualReplaceBtn').onclick = async () => {
            if (manualStart === null || manualEnd === null) { 
                showStatus('请先标记起点和终点', 'error');
                return; 
            }
            if (manualStart >= manualEnd) { 
                showStatus('起点必须小于终点', 'error');
                return; 
            }
            const fileInput = document.getElementById('manualAudioFile');
            if (!fileInput.files.length) { 
                showStatus('请选择音频文件', 'error');
                return; 
            }
            
            const formData = new FormData();
            formData.append('task_id', taskId);
            formData.append('start_ms', manualStart);
            formData.append('end_ms', manualEnd);
            formData.append('audio', fileInput.files[0]);
            
            showStatus('正在替换...', 'info');
            
            try {
                const resp = await fetch('/api/replace_custom', { method: 'POST', body: formData });
                const data = await resp.json();
                if (data.new_audio_url) {
                    showStatus('替换成功！建议刷新页面。', 'success');
                    if (confirm('替换成功！是否刷新页面以确保后续标记准确？')) {
                        location.reload();
                    } else {
                        audioPlayer.src = data.new_audio_url;
                        audioPlayer.load();
                        manualStart = manualEnd = null;
                        document.getElementById('manualStartDisplay').innerText = '未设置';
                        document.getElementById('manualEndDisplay').innerText = '未设置';
                    }
                } else {
                    throw new Error(data.error);
                }
            } catch(err) {
                showStatus('替换失败：' + err.message, 'error');
            }
        };
        
        document.getElementById('exportBtn').onclick = () => {
            window.location.href = `/audio/${taskId}?download=1`;
        };
        
        document.getElementById('saveScriptBtn').onclick = saveScriptChanges;

        window.onload = async () => {
            await loadUserPermissions();
            await loadLineStatus();
        };
    </script>
</body>
</html>
