<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畅配音 - 上传文稿</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --success: #4ade80;
            --danger: #f87171;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-subtle: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .project-info {
            background: var(--bg-white);
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            margin-bottom: 24px;
        }

        .project-info label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .project-info input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: inherit;
        }

        .upload-area {
            background: var(--bg-white);
            border: 2px dashed var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.02);
        }

        .upload-area svg {
            width: 64px;
            height: 64px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .upload-area h3 {
            color: var(--text-primary);
            font-size: 18px;
            margin-bottom: 8px;
        }

        .upload-area p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .upload-area small {
            color: var(--text-secondary);
            font-size: 12px;
            display: block;
            margin-top: 8px;
        }

        #fileInput {
            display: none;
        }

        .script-input {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            margin-bottom: 24px;
        }

        .script-input label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            padding: 16px 20px 8px;
        }

        .script-input textarea {
            width: 100%;
            padding: 0 20px 20px;
            border: none;
            resize: vertical;
            min-height: 200px;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.6;
            color: var(--text-primary);
            background: transparent;
        }

        .script-input textarea:focus {
            outline: none;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: var(--bg-white);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            background: var(--bg-light);
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: var(--radius-md);
            display: none;
            text-align: center;
        }

        .status.success {
            background: rgba(74, 222, 128, 0.1);
            color: #16a34a;
            display: block;
        }

        .status.error {
            background: rgba(248, 113, 113, 0.1);
            color: #dc2626;
            display: block;
        }

        .status.processing {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            display: block;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .back-btn:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/projects" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M19 12H5"/>
                <path d="M12 19l-7-7 7-7"/>
            </svg>
            返回项目列表
        </a>

        <div class="header">
            <h1>📝 上传文稿</h1>
            <p>上传小说文档或直接输入文本内容，系统将自动处理为剧本格式</p>
        </div>

        <div class="project-info">
            <label>项目名称</label>
            <input type="text" id="projectName" value="{{ project_name }}" readonly>
        </div>

        <div class="project-info">
            <label>章节名称</label>
            <input type="text" id="chapterName" value="{{ chapter_name }}" readonly>
        </div>

        <div class="upload-area" id="uploadArea">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <h3>点击或拖拽上传文档</h3>
            <p>支持 .txt、.md、.docx 格式文件</p>
            <small>也可以在下方直接输入文本内容</small>
        </div>

        <input type="file" id="fileInput" accept=".txt,.md,.docx">

        <div class="script-input">
            <label>或者直接输入文本内容</label>
            <textarea id="scriptInput" placeholder="请输入小说文本内容..."></textarea>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" onclick="goBack()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M19 12H5"/>
                    <path d="M12 19l-7-7 7-7"/>
                </svg>
                返回
            </button>
            <button class="btn btn-primary" onclick="submitScript()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                提交并处理
            </button>
            <button class="btn btn-success" onclick="nextStep()" id="nextStepBtn" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M13 5l7 7-7 7M5 12h14"/>
                </svg>
                下一步：编辑草稿
            </button>
        </div>

        <div id="statusMsg" class="status"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const projectName = document.getElementById('projectName').value;
        const chapterName = document.getElementById('chapterName').value;

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        async function handleFile(file) {
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.className = 'status processing';
            statusMsg.textContent = '正在读取文件...';

            try {
                const text = await readFile(file);
                document.getElementById('scriptInput').value = text;
                statusMsg.className = 'status success';
                statusMsg.textContent = '文件读取成功！';
            } catch (err) {
                statusMsg.className = 'status error';
                statusMsg.textContent = '文件读取失败: ' + err.message;
            }
        }

        function readFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    resolve(e.target.result);
                };
                reader.onerror = reject;
                
                if (file.name.endsWith('.txt') || file.name.endsWith('.md')) {
                    reader.readAsText(file, 'utf-8');
                } else if (file.name.endsWith('.docx')) {
                    reader.readAsArrayBuffer(file);
                } else {
                    reject(new Error('不支持的文件格式'));
                }
            }).then((result) => {
                if (typeof result === 'string') {
                    return result;
                }
                return parseDocx(result);
            });
        }

        function parseDocx(arrayBuffer) {
            const data = new Uint8Array(arrayBuffer);
            let text = '';
            for (let i = 0; i < data.length; i++) {
                if (data[i] === 0) continue;
                text += String.fromCharCode(data[i]);
            }
            const xmlMatch = text.match(/<w:t[^>]*>([^<]*)/g);
            if (xmlMatch) {
                return xmlMatch.map(m => m.replace(/<w:t[^>]*>/g, '').trim()).filter(t => t).join('\n');
            }
            return text.substring(0, 10000);
        }

        async function submitScript() {
            const script = document.getElementById('scriptInput').value.trim();
            const statusMsg = document.getElementById('statusMsg');

            if (!script) {
                statusMsg.className = 'status error';
                statusMsg.textContent = '请输入文本内容或上传文件';
                return;
            }

            statusMsg.className = 'status processing';
            statusMsg.textContent = '正在处理...（Dify正在分析文本）';

            try {
                const resp = await fetch('/api/process_novel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'credentials': 'include'
                    },
                    body: JSON.stringify({
                        project_name: projectName,
                        chapter_name: chapterName,
                        novel_text: script
                    })
                });

                const data = await resp.json();

                if (data.success) {
                    statusMsg.className = 'status success';
                    statusMsg.textContent = '处理成功！';
                    // 显示"下一步"按钮
                    document.getElementById('nextStepBtn').style.display = 'flex';
                } else {
                    statusMsg.className = 'status error';
                    statusMsg.textContent = data.message || '处理失败';
                }
            } catch (err) {
                statusMsg.className = 'status error';
                statusMsg.textContent = '处理失败: ' + err.message;
            }
        }

        function goBack() {
            window.location.href = '/projects';
        }

        function nextStep() {
            const safeProject = projectName.replace(/[\\/*?:"<>|]/g, '_');
            const safeChapter = chapterName.replace(/[\\/*?:"<>|]/g, '_');
            const draftId = `${safeProject}_${safeChapter}`;
            window.location.href = `/edit_draft?draft_id=${draftId}`;
        }
    </script>
</body>
</html>
