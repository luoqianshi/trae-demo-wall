<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畅配音 - 角色分配管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --primary-light: rgba(102, 126, 234, 0.1);
            --secondary: #f093fb;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --info: #60a5fa;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-subtle: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-left: 8px;
            padding-left: 16px;
            border-left: 1px solid var(--border-subtle);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            font-family: inherit;
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-secondary {
            background: var(--bg-white);
            color: var(--text-primary);
            border: 1.5px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
        }

        .btn-danger:hover {
            background: #f87171;
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: var(--bg-white);
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-box .number {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-box .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .stat-box.orange .number { color: #f97316; }
        .stat-box.purple .number { color: #8b5cf6; }
        .stat-box.green .number { color: #22c55e; }
        .stat-box.red .number { color: #ef4444; }

        /* Filters */
        .filters {
            background: var(--bg-white);
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
        }

        .filter-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            background: var(--bg-white);
            color: var(--text-primary);
            transition: border-color 0.2s ease;
        }

        .filter-group select:focus, .filter-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Table Container */
        .table-container {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .table-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .select-all-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .select-all-box label {
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
        }

        .select-all-box input[type="checkbox"] {
            transform: scale(1.3);
            cursor: pointer;
        }

        .selected-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-right: 12px;
        }

        .batch-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .batch-select-cv {
            padding: 8px 14px;
            border: 1.5px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            min-width: 200px;
            font-family: inherit;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
        }

        th {
            background: var(--bg-light);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            font-size: 14px;
            color: var(--text-primary);
        }

        tr:hover td {
            background: rgba(102, 126, 234, 0.03);
        }

        /* Badges */
        .badge {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-pending {
            background: rgba(251, 191, 36, 0.1);
            color: #d97706;
        }

        .badge-claimed {
            background: rgba(96, 165, 250, 0.1);
            color: #3b82f6;
        }

        .badge-done {
            background: rgba(74, 222, 128, 0.1);
            color: #22c55e;
        }

        .badge-conflict {
            background: rgba(248, 113, 113, 0.1);
            color: #ef4444;
        }

        /* Select CV */
        .select-cv {
            padding: 7px 12px;
            border: 1.5px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            font-size: 13px;
            min-width: 160px;
            font-family: inherit;
            background: var(--bg-white);
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .select-cv:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            border-radius: var(--radius-xl);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: var(--shadow-lg);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 24px;
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 700;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            justify-content: flex-end;
        }

        .character-info {
            background: var(--bg-light);
            padding: 18px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
        }

        .character-info .name {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .character-info .desc {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Conflict Warning */
        .conflict-warning {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 14px 18px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .conflict-warning .icon {
            font-size: 20px;
        }

        .conflict-warning .text {
            flex: 1;
            color: #92400e;
            font-size: 14px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            background: var(--bg-white);
            color: var(--text-primary);
            transition: border-color 0.2s ease;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Checkbox Cell */
        .checkbox-cell {
            width: 50px;
        }

        .checkbox-cell input {
            transform: scale(1.3);
            cursor: pointer;
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-subtle);
        }

        .tab-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Demo Card */
        .demo-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .demo-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .demo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .demo-info {
            flex: 1;
        }

        .demo-character {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .demo-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .demo-actions {
            display: flex;
            gap: 8px;
        }

        /* Audio Player */
        .audio-player {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-light);
            border-radius: var(--radius-md);
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .play-btn.playing {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
        }

        .audio-progress {
            flex: 1;
            height: 6px;
            background: var(--border-subtle);
            border-radius: 3px;
            cursor: pointer;
        }

        .audio-progress::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .audio-time {
            font-size: 12px;
            color: var(--text-muted);
            min-width: 60px;
            text-align: right;
        }

        /* Demo Manager Layout */
        .demo-manager-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .demo-section {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .demo-section-header {
            padding: 16px 20px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .demo-section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .demo-section-content {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .upload-area {
            border: 2px dashed var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .upload-area.dragover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .upload-area svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            color: var(--text-muted);
        }

        .upload-area p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .upload-area input {
            display: none;
        }

        .project-select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            background: var(--bg-white);
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .selected-demo-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .demo-manager-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .filter-row {
                flex-direction: column;
            }
            
            .filter-group {
                width: 100%;
                min-width: auto;
            }
            
            .table-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            
            .batch-actions {
                width: 100%;
            }
            
            .batch-select-cv {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-logo">🎭 畅配音</div>
            <div class="header-title">角色分配管理</div>
        </div>
        <div class="header-right">
            <button class="btn btn-success" onclick="showAddCharacterModal()">➕ 添加角色</button>
            <button class="btn btn-secondary" onclick="window.location.href='/users'">👥 用户管理</button>
            <button class="btn btn-secondary" onclick="window.location.href='/'">返回首页</button>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="showTab('characters')">角色分配</button>
        <button class="tab-btn" onclick="showTab('demo-manager')">Demo管理</button>
    </div>

    <div class="container" id="charactersTab">
        <div class="stats-row">
            <div class="stat-box">
                <div class="number" id="stat-total">0</div>
                <div class="label">角色总数</div>
            </div>
            <div class="stat-box orange">
                <div class="number" id="stat-pending">0</div>
                <div class="label">待分配</div>
            </div>
            <div class="stat-box purple">
                <div class="number" id="stat-claimed">0</div>
                <div class="label">已分配</div>
            </div>
            <div class="stat-box green">
                <div class="number" id="stat-demo">0</div>
                <div class="label">Demo已上传</div>
            </div>
            <div class="stat-box red">
                <div class="number" id="stat-conflict">0</div>
                <div class="label">冲突角色</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label>显示模式</label>
                    <select id="viewMode" onchange="loadCharacters()">
                        <option value="all">完整列表</option>
                        <option value="merged" selected>合并角色（按角色名去重）</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>项目</label>
                    <select id="filterProject" onchange="loadCharacters()">
                        <option value="">全部项目</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>状态</label>
                    <select id="filterStatus" onchange="loadCharacters()">
                        <option value="">全部状态</option>
                        <option value="pending">待分配</option>
                        <option value="claimed">已分配</option>
                        <option value="demo_uploaded">Demo已上传</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>配音员</label>
                    <select id="filterCv" onchange="loadCharacters()">
                        <option value="">全部配音员</option>
                    </select>
                </div>
                <div class="filter-group" style="min-width: 250px;">
                    <label>角色名搜索</label>
                    <input type="text" id="searchCharacter" placeholder="输入角色名..." onkeyup="loadCharacters()">
                </div>
            </div>
        </div>

        <div id="conflictWarning" class="conflict-warning" style="display: none;">
            <span class="icon">⚠️</span>
            <span class="text">检测到角色冲突：同一角色名在同一项目中被分配给了多个配音员</span>
            <button class="btn btn-sm btn-danger" onclick="resolveConflicts()">解决冲突</button>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="select-all-box">
                    <label><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> 全选</label>
                    <span id="selectedCount" class="selected-count" style="display: none;">已选 0 项</span>
                </div>
                <div class="batch-actions" id="batchActions" style="display: none;">
                    <select id="batchCvSelect" class="batch-select-cv">
                        <option value="">选择配音员...</option>
                    </select>
                    <button class="btn btn-primary" onclick="batchAssign()">批量分配</button>
                    <button class="btn btn-danger" onclick="batchRelease()">批量释放</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th class="checkbox-cell">
                            <input type="checkbox" id="headerCheckbox" onclick="toggleSelectAll()">
                        </th>
                        <th>角色名</th>
                        <th>描述</th>
                        <th>项目</th>
                        <th>章节</th>
                        <th>状态</th>
                        <th>当前配音员</th>
                        <th>分配</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="characterTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <div class="container" id="demoManagerTab" style="display: none;">
        <div class="demo-manager-container">
            <div class="demo-section">
                <div class="demo-section-header">
                    <span class="demo-section-title">📁 全局候选Demo</span>
                    <button class="btn btn-sm btn-primary" onclick="loadDemoCandidates()">刷新</button>
                </div>
                <div class="demo-section-content">
                    <select id="candidateProjectFilter" class="project-select" onchange="loadDemoCandidates()">
                        <option value="">全部项目</option>
                    </select>
                    <div id="candidatesList">
                        <p style="text-align: center; color: var(--text-muted); padding: 40px;">加载中...</p>
                    </div>
                </div>
            </div>

            <div class="demo-section">
                <div class="demo-section-header">
                    <span class="demo-section-title">✅ 项目标准Demo</span>
                    <button class="btn btn-sm btn-success" onclick="loadProjectDemos()">刷新</button>
                </div>
                <div class="demo-section-content">
                    <select id="projectDemoFilter" class="project-select" onchange="loadProjectDemos()">
                        <option value="">全部项目</option>
                    </select>
                    <div id="projectDemosList">
                        <p style="text-align: center; color: var(--text-muted); padding: 40px;">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="assignModal">
        <div class="modal-content">
            <h2>分配角色</h2>
            <div class="character-info" id="assignCharacterInfo"></div>
            <div class="form-group">
                <label>选择配音员</label>
                <select id="assignCvSelect" class="select-cv" style="width: 100%; padding: 12px;">
                    <option value="">请选择配音员</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideAssignModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmAssign()">确认分配</button>
            </div>
        </div>
    </div>

    <div class="modal" id="conflictModal">
        <div class="modal-content">
            <h2>⚠️ 角色冲突解决</h2>
            <p style="color: #dc3545; margin-bottom: 20px;">以下角色名在同一项目中存在重复分配情况，请选择正确的配音员：</p>
            <div id="conflictList"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideConflictModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmResolveConflicts()">确认解决</button>
            </div>
        </div>
    </div>

    <div class="modal" id="batchModal">
        <div class="modal-content">
            <h2>批量分配确认</h2>
            <p>您即将将 <span id="batchCount">0</span> 个角色分配给：</p>
            <div class="character-info">
                <div id="batchCvName" style="font-size: 18px; font-weight: 700; color: var(--primary);">-</div>
            </div>
            <p style="color: var(--text-secondary); margin-top: 15px;">此操作将覆盖所选角色现有的分配状态，确认继续？</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideBatchModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmBatchAssign()">确认分配</button>
            </div>
        </div>

    <div class="modal" id="addCharacterModal">
        <div class="modal-content">
            <h2>➕ 添加新角色</h2>
            <div class="form-group">
                <label>角色名 <span style="color: #dc3545;">*</span></label>
                <input type="text" id="addCharacterName" placeholder="输入角色名">
            </div>
            <div class="form-group">
                <label>角色描述</label>
                <textarea id="addCharacterDesc" placeholder="输入角色描述（性格、声音特点等）" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>所属项目 <span style="color: #dc3545;">*</span></label>
                <select id="addProjectSelect" onchange="loadChaptersForProject()">
                    <option value="">请选择项目</option>
                </select>
            </div>
            <div class="form-group">
                <label>所属章节 <span style="color: #dc3545;">*</span></label>
                <select id="addChapterSelect">
                    <option value="">请先选择项目</option>
                </select>
            </div>
            <div class="form-group">
                <label>配音文本（用于录制Demo）</label>
                <textarea id="addDemoText" placeholder="输入一段适合该角色的配音文本" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideAddCharacterModal()">取消</button>
                <button class="btn btn-success" onclick="confirmAddCharacter()">确认添加</button>
            </div>
        </div>
    </div>

    <script>
        let allCharacters = [];
        let allCvUsers = [];
        let currentCharacterId = null;
        let selectedCharacterIds = [];
        let conflictData = [];

        async function init() {
            await loadCvUsers();
            await loadCharacters();
        }

        async function loadCvUsers() {
            try {
                const resp = await fetch('/api/all_cv_users', { credentials: 'include' });
                const data = await resp.json();
                allCvUsers = data.users;
                
                const filterCv = document.getElementById('filterCv');
                const assignCvSelect = document.getElementById('assignCvSelect');
                const batchCvSelect = document.getElementById('batchCvSelect');
                
                filterCv.innerHTML = '<option value="">全部配音员</option>';
                assignCvSelect.innerHTML = '<option value="">请选择配音员</option>';
                batchCvSelect.innerHTML = '<option value="">选择配音员...</option>';
                
                allCvUsers.forEach(user => {
                    const displayName = user.real_name ? `${user.username} (${user.real_name})` : user.username;
                    filterCv.innerHTML += `<option value="${user.id}">${escapeHtml(displayName)}</option>`;
                    assignCvSelect.innerHTML += `<option value="${user.id}">${escapeHtml(displayName)}</option>`;
                    batchCvSelect.innerHTML += `<option value="${user.id}">${escapeHtml(displayName)}</option>`;
                });
            } catch (err) {
                console.error('加载配音员失败:', err);
            }
        }

        async function loadCharacters() {
            try {
                const resp = await fetch('/api/all_characters', { credentials: 'include' });
                const data = await resp.json();
                allCharacters = data.characters;
                
                updateStats();
                checkConflicts();
                
                const projects = [...new Set(allCharacters.map(c => c.project_name))];
                const filterProject = document.getElementById('filterProject');
                filterProject.innerHTML = '<option value="">全部项目</option>';
                projects.forEach(p => {
                    filterProject.innerHTML += `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`;
                });
                
                renderCharacters();
            } catch (err) {
                console.error('加载角色失败:', err);
            }
        }

        function updateStats() {
            const mergedMap = {};
            allCharacters.forEach(char => {
                const key = `${char.project_name}|${char.character_name}`;
                if (!mergedMap[key]) {
                    mergedMap[key] = {
                        ...char,
                        records: []
                    };
                }
                mergedMap[key].records.push(char);
            });
            
            const mergedCharacters = Object.values(mergedMap);
            
            const total = mergedCharacters.length;
            
            const pending = mergedCharacters.filter(m => {
                return m.records.every(r => r.status === 'pending');
            }).length;
            
            const claimed = mergedCharacters.filter(m => {
                return m.records.some(r => r.status === 'claimed' || r.status === 'demo_uploaded');
            }).length;
            
            const demo = mergedCharacters.filter(m => {
                return m.records.some(r => r.status === 'demo_uploaded');
            }).length;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-claimed').textContent = claimed;
            document.getElementById('stat-demo').textContent = demo;
            
            const conflicts = detectConflicts();
            document.getElementById('stat-conflict').textContent = conflicts.length;
        }

        function detectConflicts() {
            const roleMap = {};
            allCharacters.forEach(char => {
                const key = `${char.project_name}|${char.character_name}`;
                if (!roleMap[key]) roleMap[key] = [];
                if (char.user_id) roleMap[key].push(char);
            });
            
            const conflicts = [];
            for (const key in roleMap) {
                if (roleMap[key].length > 1) {
                    conflicts.push({
                        key: key,
                        project_name: key.split('|')[0],
                        character_name: key.split('|')[1],
                        assignments: roleMap[key]
                    });
                }
            }
            return conflicts;
        }

        function checkConflicts() {
            const conflicts = detectConflicts();
            const warningDiv = document.getElementById('conflictWarning');
            
            if (conflicts.length > 0) {
                warningDiv.style.display = 'flex';
            } else {
                warningDiv.style.display = 'none';
            }
        }

        function resolveConflicts() {
            const conflicts = detectConflicts();
            conflictData = conflicts;
            
            let html = '';
            conflicts.forEach((conflict, index) => {
                html += `
                    <div style="background: rgba(251, 191, 36, 0.1); padding: 18px; border-radius: var(--radius-md); margin-bottom: 18px;">
                        <h4 style="margin-bottom: 12px; color: var(--text-primary);">冲突 #${index + 1}: ${escapeHtml(conflict.character_name)} (${escapeHtml(conflict.project_name)})</h4>
                        <p style="color: var(--text-secondary); margin: 10px 0;">当前分配给多个配音员，请选择保留哪一个：</p>
                        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                            ${conflict.assignments.map((assign, i) => {
                                const cv = allCvUsers.find(u => u.id === assign.user_id);
                                const cvName = cv ? (cv.real_name ? `${cv.username} (${cv.real_name})` : cv.username) : '未知';
                                return `
                                    <label style="display: flex; align-items: center; gap: 6px; padding: 10px 14px; border: 2px solid var(--border-subtle); border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s ease;">
                                        <input type="radio" name="conflict_${index}" value="${assign.id}" checked style="transform: scale(1.2);">
                                        ${escapeHtml(cvName)}
                                    </label>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('conflictList').innerHTML = html;
            document.getElementById('conflictModal').classList.add('active');
        }

        async function confirmResolveConflicts() {
            const promises = [];
            
            conflictData.forEach((conflict, index) => {
                const selectedId = document.querySelector(`input[name="conflict_${index}"]:checked`)?.value;
                
                conflict.assignments.forEach(assign => {
                    if (assign.id != selectedId) {
                        promises.push(
                            fetch('/api/release_character', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                credentials: 'include',
                                body: JSON.stringify({ character_id: assign.id })
                            })
                        );
                    }
                });
            });
            
            try {
                await Promise.all(promises);
                hideConflictModal();
                loadCharacters();
                alert('冲突已解决！');
            } catch (err) {
                alert('解决冲突失败：' + err.message);
            }
        }

        function hideConflictModal() {
            document.getElementById('conflictModal').classList.remove('active');
            conflictData = [];
        }

        function renderCharacters() {
            const viewMode = document.getElementById('viewMode').value;
            const projectFilter = document.getElementById('filterProject').value;
            const statusFilter = document.getElementById('filterStatus').value;
            const cvFilter = document.getElementById('filterCv').value;
            const searchText = document.getElementById('searchCharacter').value.toLowerCase();
            
            let filtered = allCharacters;
            if (projectFilter) {
                filtered = filtered.filter(c => c.project_name === projectFilter);
            }
            if (statusFilter) {
                filtered = filtered.filter(c => c.status === statusFilter);
            }
            if (cvFilter) {
                filtered = filtered.filter(c => c.user_id && c.user_id == cvFilter);
            }
            if (searchText) {
                filtered = filtered.filter(c => c.character_name.toLowerCase().includes(searchText));
            }
            
            const tbody = document.getElementById('characterTableBody');
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="empty-state">暂无角色数据</td></tr>';
                return;
            }
            
            if (viewMode === 'merged') {
                const mergedMap = {};
                filtered.forEach(char => {
                    const key = `${char.project_name}|${char.character_name}`;
                    if (!mergedMap[key]) {
                        mergedMap[key] = {
                            character_name: char.character_name,
                            character_desc: char.character_desc,
                            project_name: char.project_name,
                            chapter_name: char.chapter_name,
                            records: [],
                            first_id: char.id
                        };
                    }
                    mergedMap[key].records.push(char);
                });
                
                const mergedList = Object.values(mergedMap);
                
                tbody.innerHTML = mergedList.map(merged => {
                    const hasClaim = merged.records.some(r => r.user_id);
                    const hasDemo = merged.records.some(r => r.demo_file);
                    const firstRecord = merged.records[0];
                    const assignedCvNames = [...new Set(merged.records.filter(r => r.user_id).map(r => r.user_name).filter(Boolean))];
                    const cvDisplayName = assignedCvNames.length > 0 ? assignedCvNames.join(', ') : '-';
                    const isSelected = selectedCharacterIds.includes(merged.first_id);
                    
                    let status = 'pending';
                    if (hasDemo) {
                        status = 'demo_uploaded';
                    } else if (hasClaim) {
                        status = 'claimed';
                    }
                    const statusBadge = getStatusBadge(status);
                    
                    const chapterInfo = [...new Set(merged.records.map(r => r.chapter_name))].join(', ');
                    const totalRecords = merged.records.length;
                    const pendingCount = merged.records.filter(r => r.status === 'pending').length;
                    
                    return `
                        <tr>
                            <td class="checkbox-cell">
                                <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleSelect(${merged.first_id})">
                            </td>
                            <td><strong>${escapeHtml(merged.character_name)}</strong>
                                ${totalRecords > 1 ? `<span style="font-size:11px;color:#94a3b8;margin-left:8px;">(${totalRecords}章)</span>` : ''}
                            </td>
                            <td style="max-width: 300px;">${escapeHtml(merged.character_desc || '-')}</td>
                            <td>${escapeHtml(merged.project_name)}</td>
                            <td>${escapeHtml(chapterInfo)}${pendingCount > 0 && pendingCount < totalRecords ? `<span style="font-size:11px;color:#f59e0b;margin-left:8px;">(${pendingCount}待分配)</span>` : ''}</td>
                            <td>${statusBadge}${hasDemo ? '<br><span style="font-size:11px;color:#22c55e;">✓ Demo已上传</span>' : ''}</td>
                            <td>${escapeHtml(cvDisplayName)}</td>
                            <td>
                                ${pendingCount > 0 ? `
                                    <select class="select-cv" onchange="quickAssignMerged('${merged.project_name}', '${merged.character_name}', this.value)">
                                        <option value="">分配给...</option>
                                        ${allCvUsers.map(user => {
                                            const displayName = user.real_name ? `${user.username} (${user.real_name})` : user.username;
                                            return `<option value="${user.id}">${escapeHtml(displayName)}</option>`;
                                        }).join('')}
                                    </select>
                                ` : '-'}
                            </td>
                            <td>
                                ${hasClaim ? `<button class="btn btn-danger btn-sm" onclick="releaseMerged('${merged.project_name}', '${merged.character_name}')">释放全部</button>` : ''}
                            </td>
                        </tr>
                    `;
                }).join('');
            } else {
                tbody.innerHTML = filtered.map(char => {
                    const statusBadge = getStatusBadge(char.status);
                    const hasDemo = char.demo_file;
                    const cvDisplayName = char.user_name || '-';
                    const isSelected = selectedCharacterIds.includes(char.id);
                    
                    return `
                        <tr>
                            <td class="checkbox-cell">
                                <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleSelect(${char.id})">
                            </td>
                            <td><strong>${escapeHtml(char.character_name)}</strong></td>
                            <td style="max-width: 300px;">${escapeHtml(char.character_desc || '-')}</td>
                            <td>${escapeHtml(char.project_name)}</td>
                            <td>${escapeHtml(char.chapter_name)}</td>
                            <td>${statusBadge}${hasDemo ? '<br><span style="font-size:11px;color:#22c55e;">✓ Demo已上传</span>' : ''}</td>
                            <td>${escapeHtml(cvDisplayName)}</td>
                            <td>
                                <select class="select-cv" onchange="quickAssign(${char.id}, this.value)">
                                    <option value="">分配给...</option>
                                    ${allCvUsers.map(user => {
                                        const selected = user.id === char.user_id ? 'selected' : '';
                                        const displayName = user.real_name ? `${user.username} (${user.real_name})` : user.username;
                                        return `<option value="${user.id}" ${selected}>${escapeHtml(displayName)}</option>`;
                                    }).join('')}
                                </select>
                            </td>
                            <td>
                                ${char.user_id ? `<button class="btn btn-danger btn-sm" onclick="showReleaseConfirm(${char.id})">释放</button>` : ''}
                            </td>
                        </tr>
                    `;
                }).join('');
            }
        }

        function getStatusBadge(status) {
            switch(status) {
                case 'pending':
                    return '<span class="badge badge-pending">待分配</span>';
                case 'claimed':
                    return '<span class="badge badge-claimed">已分配</span>';
                case 'demo_uploaded':
                    return '<span class="badge badge-done">Demo已上传</span>';
                default:
                    return `<span class="badge" style="background: var(--primary-light); color: var(--primary);">${escapeHtml(status || '-')}</span>`;
            }
        }

        function toggleSelect(charId) {
            const index = selectedCharacterIds.indexOf(charId);
            if (index > -1) {
                selectedCharacterIds.splice(index, 1);
            } else {
                selectedCharacterIds.push(charId);
            }
            updateSelectedCount();
        }

        function toggleSelectAll() {
            const checkbox = document.getElementById('selectAll');
            if (checkbox.checked) {
                selectedCharacterIds = allCharacters.filter(c => {
                    const projectFilter = document.getElementById('filterProject').value;
                    const statusFilter = document.getElementById('filterStatus').value;
                    const cvFilter = document.getElementById('filterCv').value;
                    const searchText = document.getElementById('searchCharacter').value.toLowerCase();
                    
                    if (projectFilter && c.project_name !== projectFilter) return false;
                    if (statusFilter && c.status !== statusFilter) return false;
                    if (cvFilter && (!c.user_id || c.user_id != cvFilter)) return false;
                    if (searchText && !c.character_name.toLowerCase().includes(searchText)) return false;
                    return true;
                }).map(c => c.id);
            } else {
                selectedCharacterIds = [];
            }
            updateSelectedCount();
            loadCharacters();
        }

        function updateSelectedCount() {
            const countSpan = document.getElementById('selectedCount');
            const batchActions = document.getElementById('batchActions');
            
            if (selectedCharacterIds.length > 0) {
                countSpan.textContent = `已选 ${selectedCharacterIds.length} 项`;
                countSpan.style.display = 'inline-block';
                batchActions.style.display = 'flex';
            } else {
                countSpan.style.display = 'none';
                batchActions.style.display = 'none';
            }
        }

        function batchAssign() {
            const userId = document.getElementById('batchCvSelect').value;
            if (!userId) {
                alert('请选择配音员');
                return;
            }
            
            const cv = allCvUsers.find(u => u.id == userId);
            const cvName = cv ? (cv.real_name ? `${cv.username} (${cv.real_name})` : cv.username) : '未知';
            
            document.getElementById('batchCount').textContent = selectedCharacterIds.length;
            document.getElementById('batchCvName').textContent = cvName;
            document.getElementById('batchModal').classList.add('active');
        }

        async function confirmBatchAssign() {
            const userId = document.getElementById('batchCvSelect').value;
            
            try {
                const promises = selectedCharacterIds.map(charId => 
                    fetch('/api/assign_character', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ character_id: charId, user_id: userId })
                    })
                );
                
                await Promise.all(promises);
                hideBatchModal();
                selectedCharacterIds = [];
                updateSelectedCount();
                loadCharacters();
                alert('批量分配成功！');
            } catch (err) {
                alert('批量分配失败：' + err.message);
            }
        }

        function hideBatchModal() {
            document.getElementById('batchModal').classList.remove('active');
        }

        function batchRelease() {
            if (!confirm(`确定要释放选中的 ${selectedCharacterIds.length} 个角色吗？`)) return;
            
            const promises = selectedCharacterIds.map(charId => 
                fetch('/api/release_character', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ character_id: charId })
                })
            );
            
            Promise.all(promises).then(() => {
                selectedCharacterIds = [];
                updateSelectedCount();
                loadCharacters();
                alert('批量释放成功！');
            }).catch(err => {
                alert('批量释放失败：' + err.message);
            });
        }

        async function quickAssign(charId, userId) {
            if (!userId) return;
            
            try {
                const resp = await fetch('/api/assign_character', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ character_id: charId, user_id: userId })
                });
                const data = await resp.json();
                if (data.success) {
                    loadCharacters();
                } else {
                    alert('分配失败：' + data.error);
                }
            } catch (err) {
                alert('分配失败：' + err.message);
            }
        }

        async function quickAssignMerged(projectName, characterName, userId) {
            if (!userId) return;
            
            try {
                const resp = await fetch('/api/assign_character_by_name', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        project_name: projectName, 
                        character_name: characterName, 
                        user_id: userId 
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    loadCharacters();
                    alert(`已将「${characterName}」在「${projectName}」中的所有待分配记录分配给选定配音员`);
                } else {
                    alert('分配失败：' + data.error);
                }
            } catch (err) {
                alert('分配失败：' + err.message);
            }
        }

        async function releaseMerged(projectName, characterName) {
            if (!confirm(`确定要释放「${characterName}」在「${projectName}」中的所有分配吗？`)) return;
            
            try {
                const resp = await fetch('/api/release_character_by_name', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        project_name: projectName, 
                        character_name: characterName 
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    loadCharacters();
                    alert(`已释放「${characterName}」在「${projectName}」中的所有分配`);
                } else {
                    alert('释放失败：' + data.error);
                }
            } catch (err) {
                alert('释放失败：' + err.message);
            }
        }

        function showReleaseConfirm(charId) {
            if (!confirm('确定要释放这个角色吗？释放后其他配音员可以认领。')) return;
            releaseCharacter(charId);
        }

        async function releaseCharacter(charId) {
            try {
                const resp = await fetch('/api/release_character', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ character_id: charId })
                });
                const data = await resp.json();
                if (data.success) {
                    loadCharacters();
                } else {
                    alert('释放失败：' + data.error);
                }
            } catch (err) {
                alert('释放失败：' + err.message);
            }
        }

        function showAssignModal(charId) {
            currentCharacterId = charId;
            const char = allCharacters.find(c => c.id === charId);
            if (!char) return;
            
            document.getElementById('assignCharacterInfo').innerHTML = `
                <div class="name">${escapeHtml(char.character_name)}</div>
                <div class="desc">${escapeHtml(char.character_desc || '暂无描述')}</div>
            `;
            
            document.getElementById('assignModal').classList.add('active');
        }

        function hideAssignModal() {
            document.getElementById('assignModal').classList.remove('active');
            currentCharacterId = null;
        }

        async function confirmAssign() {
            const userId = document.getElementById('assignCvSelect').value;
            if (!userId) {
                alert('请选择配音员');
                return;
            }
            
            try {
                const resp = await fetch('/api/assign_character', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ character_id: currentCharacterId, user_id: userId })
                });
                const data = await resp.json();
                if (data.success) {
                    hideAssignModal();
                    loadCharacters();
                } else {
                    alert('分配失败：' + data.error);
                }
            } catch (err) {
                alert('分配失败：' + err.message);
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function loadChaptersForProject() {
            const projectName = document.getElementById('addProjectSelect').value;
            const chapterSelect = document.getElementById('addChapterSelect');
            
            if (!projectName) {
                chapterSelect.innerHTML = '<option value="">请先选择项目</option>';
                return;
            }
            
            const chapters = [...new Set(allCharacters.filter(c => c.project_name === projectName).map(c => c.chapter_name))];
            chapterSelect.innerHTML = '<option value="">请选择章节</option>';
            chapters.forEach(chapter => {
                chapterSelect.innerHTML += `<option value="${escapeHtml(chapter)}">${escapeHtml(chapter)}</option>`;
            });
        }

        function showAddCharacterModal() {
            document.getElementById('addCharacterName').value = '';
            document.getElementById('addCharacterDesc').value = '';
            document.getElementById('addDemoText').value = '';
            
            const projects = [...new Set(allCharacters.map(c => c.project_name))];
            const projectSelect = document.getElementById('addProjectSelect');
            projectSelect.innerHTML = '<option value="">请选择项目</option>';
            projects.forEach(p => {
                projectSelect.innerHTML += `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`;
            });
            
            document.getElementById('addChapterSelect').innerHTML = '<option value="">请先选择项目</option>';
            document.getElementById('addCharacterModal').classList.add('active');
        }

        function hideAddCharacterModal() {
            document.getElementById('addCharacterModal').classList.remove('active');
        }

        async function confirmAddCharacter() {
            const characterName = document.getElementById('addCharacterName').value.trim();
            const characterDesc = document.getElementById('addCharacterDesc').value.trim();
            const projectName = document.getElementById('addProjectSelect').value;
            const chapterName = document.getElementById('addChapterSelect').value;
            const demoText = document.getElementById('addDemoText').value.trim();
            
            if (!characterName) {
                alert('请输入角色名');
                return;
            }
            if (!projectName) {
                alert('请选择项目');
                return;
            }
            if (!chapterName) {
                alert('请选择章节');
                return;
            }
            
            try {
                const resp = await fetch('/api/add_character', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        character_name: characterName,
                        character_desc: characterDesc,
                        project_name: projectName,
                        chapter_name: chapterName,
                        demo_text: demoText
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    hideAddCharacterModal();
                    loadCharacters();
                    alert('角色添加成功！');
                } else {
                    alert('添加失败：' + data.error);
                }
            } catch (err) {
                alert('添加失败：' + err.message);
            }
        }

        let demoCandidates = [];
        let projectDemos = [];
        let currentAudio = null;

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.container').forEach(container => container.style.display = 'none');
            
            document.querySelector(`.tab-btn[onclick="showTab('${tabName}')"]`).classList.add('active');
            
            if (tabName === 'characters') {
                document.getElementById('charactersTab').style.display = 'block';
            } else if (tabName === 'demo-manager') {
                document.getElementById('demoManagerTab').style.display = 'block';
                loadDemoCandidates();
                loadProjectDemos();
            }
        }

        async function loadDemoCandidates() {
            try {
                const projectFilter = document.getElementById('candidateProjectFilter').value;
                const resp = await fetch(`/api/demo_candidates?project=${encodeURIComponent(projectFilter || '')}`, { credentials: 'include' });
                const data = await resp.json();
                
                demoCandidates = data.candidates || [];
                
                const projects = [...new Set(demoCandidates.map(d => d.project_name))];
                const filter = document.getElementById('candidateProjectFilter');
                const currentValue = filter.value;
                filter.innerHTML = '<option value="">全部项目</option>';
                projects.forEach(p => {
                    const selected = p === currentValue ? 'selected' : '';
                    filter.innerHTML += `<option value="${escapeHtml(p)}" ${selected}>${escapeHtml(p)}</option>`;
                });
                
                renderDemoCandidates();
            } catch (err) {
                console.error('加载候选Demo失败:', err);
                document.getElementById('candidatesList').innerHTML = '<p style="text-align: center; color: #ef4444;">加载失败</p>';
            }
        }

        function renderDemoCandidates() {
            const list = document.getElementById('candidatesList');
            
            if (demoCandidates.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px;">暂无候选Demo</p>';
                return;
            }
            
            list.innerHTML = demoCandidates.map((demo, index) => `
                <div class="demo-card" style="margin-bottom: 12px;">
                    <div class="demo-header">
                        <div class="demo-info">
                            <div class="demo-character">${escapeHtml(demo.character_name)}</div>
                            <div class="demo-meta">
                                📁 ${escapeHtml(demo.project_name)} | 🎙️ ${escapeHtml(demo.cv_name || '未知CV')} | 📅 ${escapeHtml(demo.upload_time || '-')}
                            </div>
                        </div>
                        <div class="demo-actions">
                            <button class="btn btn-sm btn-primary" onclick="selectDemo('${demo.file_name}', '${demo.project_name}', '${demo.character_name}')">选为标准</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteDemoCandidate('${demo.file_name}')">删除</button>
                        </div>
                    </div>
                    <div class="audio-player">
                        <button class="play-btn" onclick="toggleAudio(this, '${demo.url}')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </button>
                        <input type="range" class="audio-progress" disabled>
                        <span class="audio-time">0:00</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadProjectDemos() {
            try {
                const projectFilter = document.getElementById('projectDemoFilter').value;
                const resp = await fetch(`/api/project_demos?project=${encodeURIComponent(projectFilter || '')}`, { credentials: 'include' });
                const data = await resp.json();
                
                projectDemos = data.demos || [];
                
                const projects = [...new Set(projectDemos.map(d => d.project_name))];
                const filter = document.getElementById('projectDemoFilter');
                const currentValue = filter.value;
                filter.innerHTML = '<option value="">全部项目</option>';
                projects.forEach(p => {
                    const selected = p === currentValue ? 'selected' : '';
                    filter.innerHTML += `<option value="${escapeHtml(p)}" ${selected}>${escapeHtml(p)}</option>`;
                });
                
                renderProjectDemos();
            } catch (err) {
                console.error('加载项目Demo失败:', err);
                document.getElementById('projectDemosList').innerHTML = '<p style="text-align: center; color: #ef4444;">加载失败</p>';
            }
        }

        function renderProjectDemos() {
            const list = document.getElementById('projectDemosList');
            
            if (projectDemos.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px;">暂无标准Demo</p>';
                return;
            }
            
            list.innerHTML = projectDemos.map((demo, index) => `
                <div class="demo-card" style="margin-bottom: 12px;">
                    <div class="demo-header">
                        <div class="demo-info">
                            <div class="demo-character">
                                ${escapeHtml(demo.character_name)}
                                <span class="selected-demo-badge">已选定</span>
                            </div>
                            <div class="demo-meta">
                                📁 ${escapeHtml(demo.project_name)} | 📅 ${escapeHtml(demo.update_time || '-')}
                            </div>
                        </div>
                        <div class="demo-actions">
                            <button class="btn btn-sm btn-danger" onclick="deleteProjectDemo('${demo.project_name}', '${demo.character_name}')">删除</button>
                        </div>
                    </div>
                    <div class="audio-player">
                        <button class="play-btn" onclick="toggleAudio(this, '${demo.url}')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </button>
                        <input type="range" class="audio-progress" disabled>
                        <span class="audio-time">0:00</span>
                    </div>
                </div>
            `).join('');
        }

        function toggleAudio(btn, url) {
            if (currentAudio && !currentAudio.paused) {
                currentAudio.pause();
                document.querySelector('.play-btn.playing')?.classList.remove('playing');
            }
            
            if (currentAudio && currentAudio.src === url && currentAudio.paused) {
                currentAudio.play();
                btn.classList.add('playing');
                return;
            }
            
            currentAudio = new Audio(url);
            currentAudio.onended = () => {
                btn.classList.remove('playing');
            };
            currentAudio.play();
            btn.classList.add('playing');
        }

        async function selectDemo(fileName, projectName, characterName) {
            if (!confirm(`确定将「${characterName}」的此Demo设为「${projectName}」项目的标准Demo吗？`)) return;
            
            try {
                const resp = await fetch('/api/select_demo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        file_name: fileName,
                        project_name: projectName,
                        character_name: characterName
                    })
                });
                const data = await resp.json();
                
                if (data.success) {
                    alert('Demo已选为标准！');
                    loadDemoCandidates();
                    loadProjectDemos();
                } else {
                    alert('操作失败：' + data.error);
                }
            } catch (err) {
                alert('操作失败：' + err.message);
            }
        }

        async function deleteDemoCandidate(fileName) {
            if (!confirm(`确定删除此候选Demo吗？`)) return;
            
            try {
                const resp = await fetch('/api/delete_demo_candidate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ file_name: fileName })
                });
                const data = await resp.json();
                
                if (data.success) {
                    alert('删除成功！');
                    loadDemoCandidates();
                } else {
                    alert('删除失败：' + data.error);
                }
            } catch (err) {
                alert('删除失败：' + err.message);
            }
        }

        async function deleteProjectDemo(projectName, characterName) {
            if (!confirm(`确定删除「${projectName}」项目中「${characterName}」的标准Demo吗？`)) return;
            
            try {
                const resp = await fetch('/api/delete_project_demo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        project_name: projectName,
                        character_name: characterName
                    })
                });
                const data = await resp.json();
                
                if (data.success) {
                    alert('删除成功！');
                    loadProjectDemos();
                } else {
                    alert('删除失败：' + data.error);
                }
            } catch (err) {
                alert('删除失败：' + err.message);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
