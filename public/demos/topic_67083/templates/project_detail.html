<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有声书项目管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --bg-light: #f5f7fa;
            --bg-white: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-subtle: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-white);
            padding: 16px 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .header-logo svg { width: 24px; height: 24px; }

        .back-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: var(--bg-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 14px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }

        .btn-secondary {
            background: var(--bg-white);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary:hover { background: var(--bg-light); }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-outline:hover { background: rgba(102, 126, 234, 0.05); }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover { background: #ef4444; }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .project-header {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .project-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .project-icon svg { width: 28px; height: 28px; }

        .project-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .project-meta {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .chapter-list {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .chapter-list-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chapter-list-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chapter-count {
            font-size: 13px;
            color: var(--text-muted);
        }

        .chapter-item {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: background 0.2s ease;
        }

        .chapter-item:hover { background: var(--bg-light); }

        .chapter-item:last-child { border-bottom: none; }

        .chapter-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chapter-icon.draft {
            background: rgba(251, 191, 36, 0.1);
            color: #d97706;
        }

        .chapter-icon.synthesized {
            background: rgba(74, 222, 128, 0.1);
            color: #16a34a;
        }

        .chapter-icon svg { width: 20px; height: 20px; }

        .chapter-info {
            flex: 1;
            min-width: 0;
        }

        .chapter-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .chapter-status {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chapter-status.draft { color: #d97706; }
        .chapter-status.synthesized { color: #16a34a; }

        .chapter-status svg { width: 14px; height: 14px; }

        .chapter-actions {
            display: flex;
            gap: 8px;
        }

        .chapter-btn {
            padding: 8px 14px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .chapter-btn.edit {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        .chapter-btn.edit:hover { background: rgba(102, 126, 234, 0.2); }

        .chapter-btn.synthesize {
            background: rgba(74, 222, 128, 0.1);
            color: #16a34a;
        }

        .chapter-btn.synthesize:hover { background: rgba(74, 222, 128, 0.2); }

        .chapter-btn.delete {
            background: rgba(248, 113, 113, 0.1);
            color: var(--danger);
        }

        .chapter-btn.delete:hover { background: rgba(248, 113, 113, 0.2); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .empty-state small {
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .header-title { font-size: 16px; }
            .main-content { padding: 16px; }
            .project-header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .project-name { font-size: 20px; }
            .chapter-item { flex-wrap: wrap; }
            .chapter-info { width: 100%; }
            .chapter-actions { margin-top: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M19 12H5"/>
                    <path d="M12 19l-7-7 7-7"/>
                </svg>
                返回
            </button>
            <div class="header-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a9 9 0 0 0-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7a9 9 0 0 0-9-9z"/>
                </svg>
                畅配音
            </div>
        </div>
        <span class="header-title">有声书项目管理</span>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="exportStats()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                导出统计
            </button>
            <button class="btn btn-primary" onclick="addChapter()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                添加章节
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="project-header">
            <div class="project-info">
                <div class="project-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </div>
                <div>
                    <div class="project-name" id="projectName">项目名称</div>
                    <div class="project-meta">
                        <span id="chapterCount">0 个章节</span>
                        <span id="projectStatus">进行中</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="chapter-list">
            <div class="chapter-list-header">
                <div>
                    <span class="chapter-list-title">章节列表</span>
                    <span class="chapter-count" id="totalChapters">(共 0 章)</span>
                </div>
            </div>
            <div id="chaptersContainer">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0
