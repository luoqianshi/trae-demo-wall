<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>亲人到家 · 用户端 Demo</title>
<style>
  /* ============ 设计 Token（暖色调，无高透明度） ============ */
  :root {
    --brand: #FF6B35;          /* 主色：暖橙 */
    --brand-soft: #FFE8DD;     /* 主色浅 */
    --brand-deep: #E55A28;     /* 主色深 */
    --gold: #FFB627;           /* 强调：金橙 */
    --bg: #FFF8F3;             /* 页面背景：暖米白 */
    --card: #FFFFFF;           /* 卡片 */
    --ink-1: #1A1A1A;          /* 主文字 */
    --ink-2: #6B6B6B;          /* 次文字 */
    --ink-3: #A8A8A8;          /* 弱文字 */
    --border: #F0E8E0;         /* 边框 */
    --success: #2BA471;
    --success-soft: #E0F5EC;
    --warning: #F5A623;
    --warning-soft: #FFF3DC;
    --error: #E54848;
    --error-soft: #FDEAEA;
    --shadow: 0 4px 16px rgba(255, 107, 53, 0.08);
    --shadow-md: 0 8px 24px rgba(255, 107, 53, 0.12);
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body {
    background: linear-gradient(135deg, #FFF1E6 0%, #FFE3D1 100%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }

  /* ============ 手机外框 ============ */
  .phone {
    width: 390px; height: 844px;
    background: var(--bg);
    border-radius: 44px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25), 0 0 0 12px #1A1A1A, 0 0 0 13px #333;
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }
  /* 状态栏 */
  .status-bar {
    height: 44px; padding: 0 24px 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 15px; font-weight: 600; color: var(--ink-1);
    background: var(--bg); flex-shrink: 0; position: relative; z-index: 10;
  }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 12px; }
  .notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 28px; background: #1A1A1A;
    border-radius: 0 0 18px 18px;
  }

  /* ============ App 容器 ============ */
  .app { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
  .app::-webkit-scrollbar { display: none; }

  .page { display: none; padding: 8px 16px 100px; animation: fade 0.25s ease; }
  .page.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* 顶部标题 */
  .page-head { display: flex; align-items: center; gap: 12px; padding: 8px 0 16px; }
  .back-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: var(--card); color: var(--ink-1);
    font-size: 16px; cursor: pointer; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
  }
  .page-title { font-size: 20px; font-weight: 700; color: var(--ink-1); flex: 1; }

  /* ============ 首页 Hero ============ */
  .hero {
    background: linear-gradient(135deg, var(--brand) 0%, var(--gold) 100%);
    border-radius: 20px; padding: 20px; color: #fff;
    margin-bottom: 16px; position: relative; overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  .hero::after {
    content: "🏠"; position: absolute; right: -10px; bottom: -10px;
    font-size: 90px; opacity: 0.25;
  }
  .hero h1 { font-size: 22px; margin-bottom: 6px; position: relative; z-index: 1; }
  .hero p { font-size: 13px; opacity: 0.95; position: relative; z-index: 1; }
  .hero-loc {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.25); padding: 4px 10px;
    border-radius: 999px; font-size: 12px; margin-top: 12px;
    position: relative; z-index: 1;
  }

  /* 服务网格 */
  .section-title {
    font-size: 16px; font-weight: 700; color: var(--ink-1);
    margin: 16px 0 12px; display: flex; align-items: center; justify-content: space-between;
  }
  .section-title .more { font-size: 12px; color: var(--ink-3); font-weight: 400; cursor: pointer; }
  .svc-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 8px;
    background: var(--card); padding: 16px 12px; border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .svc-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; transition: transform 0.15s;
  }
  .svc-item:hover { transform: translateY(-2px); }
  .svc-icon {
    width: 44px; height: 44px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; background: var(--brand-soft);
  }
  .svc-name { font-size: 12px; color: var(--ink-1); }

  /* 推荐服务者 */
  .nanny-card {
    background: var(--card); border-radius: var(--radius);
    padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
    display: flex; gap: 12px; align-items: center; cursor: pointer;
    transition: transform 0.15s;
  }
  .nanny-card:hover { transform: translateY(-1px); }
  .nanny-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brand-soft), var(--warning-soft));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .nanny-info { flex: 1; min-width: 0; }
  .nanny-name { font-size: 15px; font-weight: 600; color: var(--ink-1); margin-bottom: 4px; }
  .nanny-meta { font-size: 12px; color: var(--ink-2); display: flex; gap: 8px; }
  .nanny-rating { color: var(--gold); font-weight: 600; }
  .nanny-price { font-size: 14px; color: var(--brand); font-weight: 700; }

  /* ============ 下单表单 ============ */
  .form-card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .form-label { font-size: 13px; color: var(--ink-2); margin-bottom: 8px; }
  .form-input, .form-textarea, .form-select {
    width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px; font-size: 14px; color: var(--ink-1);
    font-family: inherit; background: var(--bg); outline: none;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--brand); background: #fff; }
  .form-textarea { resize: none; min-height: 72px; }
  .form-row { display: flex; gap: 10px; }
  .form-row > * { flex: 1; }

  .svc-pick { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .svc-pick-item {
    padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    text-align: center; font-size: 13px; cursor: pointer;
    background: var(--bg); transition: all 0.15s;
  }
  .svc-pick-item.active {
    border-color: var(--brand); background: var(--brand-soft);
    color: var(--brand-deep); font-weight: 600;
  }

  .price-est {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; background: var(--brand-soft);
    border-radius: var(--radius-sm); margin-top: 8px;
  }
  .price-est .lab { font-size: 13px; color: var(--ink-2); }
  .price-est .val { font-size: 22px; font-weight: 700; color: var(--brand); }

  /* ============ 按钮 ============ */
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--brand); color: #fff; box-shadow: var(--shadow); }
  .btn-primary:hover { background: var(--brand-deep); }
  .btn-secondary { background: var(--card); color: var(--ink-1); border: 1px solid var(--border); }
  .btn-danger { background: var(--error-soft); color: var(--error); }
  .btn-disabled { background: var(--border); color: var(--ink-3); cursor: not-allowed; }

  /* ============ 订单列表 ============ */
  .filter-tabs {
    display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    padding: 6px 14px; border-radius: 999px; font-size: 13px;
    background: var(--card); color: var(--ink-2); cursor: pointer;
    white-space: nowrap; border: 1px solid var(--border);
  }
  .filter-tab.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  .order-card {
    background: var(--card); border-radius: var(--radius);
    padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
    cursor: pointer; transition: transform 0.15s;
  }
  .order-card:hover { transform: translateY(-1px); }
  .order-card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .order-svc { font-size: 15px; font-weight: 600; color: var(--ink-1); }
  .order-time { font-size: 12px; color: var(--ink-3); margin-top: 4px; }
  .order-card-body { font-size: 13px; color: var(--ink-2); line-height: 1.6; }
  .order-card-foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  }
  .order-price { font-size: 17px; font-weight: 700; color: var(--brand); }

  /* 状态 Pill */
  .pill {
    display: inline-flex; align-items: center; padding: 3px 10px;
    border-radius: 999px; font-size: 12px; font-weight: 500;
  }
  .pill-created { background: var(--border); color: var(--ink-2); }
  .pill-dispatched, .pill-accepted { background: var(--brand-soft); color: var(--brand-deep); }
  .pill-in_service { background: var(--warning-soft); color: var(--warning); }
  .pill-completed { background: var(--success-soft); color: var(--success); }
  .pill-cancelled { background: var(--error-soft); color: var(--error); }

  /* ============ 订单详情 ============ */
  .status-banner {
    background: linear-gradient(135deg, var(--brand) 0%, var(--gold) 100%);
    color: #fff; padding: 20px; border-radius: var(--radius);
    margin-bottom: 12px; text-align: center;
  }
  .status-banner .step { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .status-banner .desc { font-size: 12px; opacity: 0.9; }

  .progress {
    display: flex; align-items: center; padding: 16px 8px;
    background: var(--card); border-radius: var(--radius); margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .progress-step {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-size: 11px; color: var(--ink-3);
  }
  .progress-step .dot {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--border); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
  }
  .progress-step.done .dot { background: var(--brand); }
  .progress-step.done { color: var(--brand); font-weight: 600; }
  .progress-line { flex: 0 0 20px; height: 2px; background: var(--border); }
  .progress-line.done { background: var(--brand); }

  .info-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row .lab { color: var(--ink-2); }
  .info-row .val { color: var(--ink-1); font-weight: 500; text-align: right; }

  /* ============ 评价 ============ */
  .stars {
    display: flex; gap: 8px; justify-content: center; padding: 16px 0;
  }
  .star {
    font-size: 36px; color: var(--border); cursor: pointer;
    transition: transform 0.1s; user-select: none;
  }
  .star.active { color: var(--gold); }
  .star:hover { transform: scale(1.1); }

  .tag-pick { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-pick-item {
    padding: 6px 14px; border-radius: 999px; font-size: 13px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--ink-2); cursor: pointer;
  }
  .tag-pick-item.active {
    background: var(--brand-soft); border-color: var(--brand);
    color: var(--brand-deep);
  }

  /* ============ 我的 ============ */
  .me-hero {
    background: linear-gradient(135deg, var(--brand) 0%, var(--gold) 100%);
    color: #fff; padding: 24px 20px; border-radius: var(--radius);
    display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    box-shadow: var(--shadow-md);
  }
  .me-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .me-name { font-size: 18px; font-weight: 700; }
  .me-phone { font-size: 13px; opacity: 0.9; margin-top: 4px; }

  .menu-list { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .menu-item {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border-bottom: 1px solid var(--border); cursor: pointer; font-size: 14px;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: var(--bg); }
  .menu-icon { font-size: 18px; }
  .menu-label { flex: 1; color: var(--ink-1); }
  .menu-arrow { color: var(--ink-3); }

  /* ============ 底部 Tab ============ */
  .tab-bar {
    height: 70px; background: var(--card);
    border-top: 1px solid var(--border);
    display: flex; padding-bottom: 8px;
    flex-shrink: 0;
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 2px; cursor: pointer;
    color: var(--ink-3); font-size: 11px;
  }
  .tab-item.active { color: var(--brand); }
  .tab-icon { font-size: 22px; line-height: 1; }

  /* ============ Toast ============ */
  .toast {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: rgba(26,26,26,0.92); color: #fff;
    padding: 10px 18px; border-radius: 999px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty {
    text-align: center; padding: 60px 20px; color: var(--ink-3); font-size: 14px;
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="notch"></div>
    <div class="icons">
      <span>●●●●</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="app">
    <!-- ============ 首页 ============ -->
    <div class="page active" id="page-home">
      <div class="hero">
        <h1>亲人到家了</h1>
        <p>让关爱触手可及 · 您身边的家庭服务管家</p>
        <div class="hero-loc">📍 北京市朝阳区望京街道</div>
      </div>

      <div class="section-title">服务类型</div>
      <div class="svc-grid" id="svc-grid"></div>

      <div class="section-title">
        推荐服务者
        <span class="more">查看更多 ›</span>
      </div>
      <div id="nanny-list"></div>
    </div>

    <!-- ============ 下单页 ============ -->
    <div class="page" id="page-publish">
      <div class="page-head">
        <button class="back-btn" onclick="go('home')">‹</button>
        <div class="page-title">发起预约</div>
      </div>

      <div class="form-card">
        <div class="form-label">选择服务类型</div>
        <div class="svc-pick" id="svc-pick"></div>
      </div>

      <div class="form-card">
        <div class="form-label">服务地址</div>
        <input class="form-input" id="f-addr" placeholder="请输入详细地址" value="望京 SOHO T1 1608" />
      </div>

      <div class="form-card">
        <div class="form-row">
          <div>
            <div class="form-label">预约日期</div>
            <input class="form-input" type="date" id="f-date" />
          </div>
          <div>
            <div class="form-label">预约时间</div>
            <input class="form-input" type="time" id="f-time" value="14:00" />
          </div>
        </div>
      </div>

      <div class="form-card">
        <div class="form-label">备注（选填）</div>
        <textarea class="form-textarea" id="f-note" placeholder="例如：家中老人需陪同去医院复查"></textarea>
      </div>

      <div class="form-card">
        <div class="price-est">
          <span class="lab">预估费用</span>
          <span class="val" id="price-est">¥ 128</span>
        </div>
      </div>

      <button class="btn btn-primary" onclick="submitOrder()">确认下单</button>
    </div>

    <!-- ============ 订单列表 ============ -->
    <div class="page" id="page-orders">
      <div class="page-head">
        <div class="page-title">我的订单</div>
      </div>
      <div class="filter-tabs" id="order-filters"></div>
      <div id="order-list"></div>
    </div>

    <!-- ============ 订单详情 ============ -->
    <div class="page" id="page-detail">
      <div class="page-head">
        <button class="back-btn" onclick="go('orders')">‹</button>
        <div class="page-title">订单详情</div>
      </div>
      <div id="detail-body"></div>
    </div>

    <!-- ============ 评价页 ============ -->
    <div class="page" id="page-review">
      <div class="page-head">
        <button class="back-btn" onclick="go('detail')">‹</button>
        <div class="page-title">服务评价</div>
      </div>
      <div class="form-card" style="text-align:center;">
        <div style="font-size:14px;color:var(--ink-2);margin-bottom:4px;">为本次服务打分</div>
        <div class="stars" id="stars"></div>
      </div>
      <div class="form-card">
        <div class="form-label">服务标签（多选）</div>
        <div class="tag-pick" id="tag-pick"></div>
      </div>
      <div class="form-card">
        <div class="form-label">文字评价（选填）</div>
        <textarea class="form-textarea" id="r-comment" placeholder="说说本次服务感受～"></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitReview()">提交评价</button>
    </div>

    <!-- ============ 我的 ============ -->
    <div class="page" id="page-me">
      <div class="page-head"><div class="page-title">我的</div></div>
      <div class="me-hero">
        <div class="me-avatar">👩</div>
        <div>
          <div class="me-name">王女士</div>
          <div class="me-phone">138****6688</div>
        </div>
      </div>
      <div class="menu-list">
        <div class="menu-item" onclick="go('orders')">
          <span class="menu-icon">📋</span><span class="menu-label">我的订单</span><span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="toast('地址簿 Demo')">
          <span class="menu-icon">📍</span><span class="menu-label">地址管理</span><span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="toast('优惠券 Demo')">
          <span class="menu-icon">🎫</span><span class="menu-label">优惠券</span><span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="toast('邀请有礼 Demo')">
          <span class="menu-icon">🎁</span><span class="menu-label">邀请有礼</span><span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="toast('客服 400-000-0000')">
          <span class="menu-icon">📞</span><span class="menu-label">联系客服</span><span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="toast('设置 Demo')">
          <span class="menu-icon">⚙️</span><span class="menu-label">设置</span><span class="menu-arrow">›</span>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item active" data-tab="home" onclick="go('home')">
      <span class="tab-icon">🏠</span><span>首页</span>
    </div>
    <div class="tab-item" data-tab="orders" onclick="go('orders')">
      <span class="tab-icon">📋</span><span>订单</span>
    </div>
    <div class="tab-item" data-tab="publish" onclick="go('publish')">
      <span class="tab-icon">➕</span><span>下单</span>
    </div>
    <div class="tab-item" data-tab="me" onclick="go('me')">
      <span class="tab-icon">👤</span><span>我的</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  // ============ Mock 数据 ============
  const SERVICES = [
    { key: 'pickup',   name: '接送孩子', icon: '🚸', price: 88 },
    { key: 'homework', name: '陪写作业', icon: '📚', price: 128 },
    { key: 'elder',    name: '老人陪诊', icon: '🧓', price: 168 },
    { key: 'hospital', name: '医院陪护', icon: '🏥', price: 198 },
    { key: 'pet',      name: '上门喂宠', icon: '🐾', price: 78 },
    { key: 'walk',     name: '陪遛老人', icon: '🚶', price: 98 },
    { key: 'cook',     name: '上门做饭', icon: '🍳', price: 138 },
    { key: 'clean',    name: '上门保洁', icon: '✨', price: 118 },
  ];

  const NANNIES = [
    { name: '李阿姨', avatar: '👩‍🦰', rating: 4.9, orders: 326, price: 128, tags: ['耐心细致', '5年经验'] },
    { name: '张阿姨', avatar: '👩‍🦱', rating: 4.8, orders: 218, price: 118, tags: ['有证护工', '好评率高'] },
    { name: '王阿姨', avatar: '👩',    rating: 5.0, orders: 512, price: 158, tags: ['金牌服务', '老用户推荐'] },
  ];

  const STATUS_FLOW = [
    { key: 'CREATED',    label: '等待派单' },
    { key: 'DISPATCHED', label: '已派单' },
    { key: 'ACCEPTED',   label: '已接单' },
    { key: 'IN_SERVICE', label: '服务中' },
    { key: 'COMPLETED',  label: '已完成' },
  ];
  const STATUS_LABEL = Object.fromEntries(STATUS_FLOW.map(s => [s.key, s.label]));
  STATUS_LABEL.CANCELLED = '已取消';

  const TAGS = ['准时到达', '服务热情', '专业细心', '沟通顺畅', '老人喜欢', '会再来', '物超所值', '值得推荐'];

  // 订单状态（内存，刷新即重置）
  let orders = [
    {
      id: 'QD20240701001', svc: 'homework', addr: '望京 SOHO T1 1608',
      scheduled: '今天 14:00', status: 'COMPLETED', price: 128,
      note: '孩子三年级，主要辅导数学', created: '2024-07-01 10:23',
      worker: { name: '李阿姨', avatar: '👩‍🦰', rating: 4.9 },
      review: { rating: 5, tags: ['准时到达', '专业细心', '会再来'], comment: '李阿姨非常耐心，孩子很喜欢她，下次还约！' }
    },
    {
      id: 'QD20240701002', svc: 'elder', addr: '朝阳门 SOHO 3 901',
      scheduled: '明天 09:00', status: 'ACCEPTED', price: 168,
      note: '陪同老人去协和医院复诊', created: '2024-06-30 16:40',
      worker: { name: '张阿姨', avatar: '👩‍🦱', rating: 4.8 }
    },
    {
      id: 'QD20240701003', svc: 'clean', addr: '望京 SOHO T1 1608',
      scheduled: '后天 10:00', status: 'CREATED', price: 118,
      note: '三居室深度保洁', created: '2024-06-30 20:11',
      worker: null
    },
  ];

  // 当前状态
  let curTab = 'home';
  let curOrderFilter = '';
  let curOrderId = null;
  let publishSvc = 'homework';
  let reviewRating = 0;
  let reviewTags = new Set();

  // ============ 渲染 ============
  function renderHome() {
    document.getElementById('svc-grid').innerHTML = SERVICES.map(s => `
      <div class="svc-item" onclick="pickSvcAndGo('${s.key}')">
        <div class="svc-icon">${s.icon}</div>
        <div class="svc-name">${s.name}</div>
      </div>
    `).join('');

    document.getElementById('nanny-list').innerHTML = NANNIES.map(n => `
      <div class="nanny-card" onclick="toast('${n.name} 详情页 Demo')">
        <div class="nanny-avatar">${n.avatar}</div>
        <div class="nanny-info">
          <div class="nanny-name">${n.name}</div>
          <div class="nanny-meta">
            <span class="nanny-rating">★ ${n.rating}</span>
            <span>${n.orders}单</span>
            <span>${n.tags.join(' · ')}</span>
          </div>
        </div>
        <div class="nanny-price">¥${n.price}</div>
      </div>
    `).join('');
  }

  function renderPublish() {
    document.getElementById('svc-pick').innerHTML = SERVICES.map(s => `
      <div class="svc-pick-item ${s.key === publishSvc ? 'active' : ''}" onclick="pickSvc('${s.key}')">
        ${s.icon} ${s.name}
      </div>
    `).join('');
    updatePrice();
    if (!document.getElementById('f-date').value) {
      const t = new Date(); t.setDate(t.getDate() + 1);
      document.getElementById('f-date').value = t.toISOString().slice(0, 10);
    }
  }

  function pickSvc(key) {
    publishSvc = key;
    renderPublish();
  }
  function pickSvcAndGo(key) {
    publishSvc = key;
    go('publish');
  }
  function updatePrice() {
    const svc = SERVICES.find(s => s.key === publishSvc);
    document.getElementById('price-est').textContent = `¥ ${svc.price}`;
  }

  function renderOrders() {
    const filters = [{ key: '', label: '全部' }, ...STATUS_FLOW.map(s => ({ key: s.key, label: s.label }))];
    document.getElementById('order-filters').innerHTML = filters.map(f => `
      <div class="filter-tab ${curOrderFilter === f.key ? 'active' : ''}" onclick="setOrderFilter('${f.key}')">${f.label}</div>
    `).join('');

    const list = orders.filter(o => !curOrderFilter || o.status === curOrderFilter);
    const html = list.length === 0
      ? `<div class="empty"><div class="empty-emoji">📭</div>暂无订单</div>`
      : list.map(o => {
          const svc = SERVICES.find(s => s.key === o.svc);
          return `
            <div class="order-card" onclick="viewOrder('${o.id}')">
              <div class="order-card-head">
                <div>
                  <div class="order-svc">${svc.icon} ${svc.name}</div>
                  <div class="order-time">${o.created}</div>
                </div>
                <span class="pill pill-${o.status.toLowerCase()}">${STATUS_LABEL[o.status]}</span>
              </div>
              <div class="order-card-body">
                📍 ${o.addr}<br/>🕒 ${o.scheduled}
              </div>
              <div class="order-card-foot">
                <span class="order-price">¥${o.price}</span>
                <span style="font-size:12px;color:var(--ink-3);">查看详情 ›</span>
              </div>
            </div>
          `;
        }).join('');
    document.getElementById('order-list').innerHTML = html;
  }

  function setOrderFilter(k) { curOrderFilter = k; renderOrders(); }

  function viewOrder(id) {
    curOrderId = id;
    renderDetail();
    go('detail');
  }

  function renderDetail() {
    const o = orders.find(x => x.id === curOrderId);
    if (!o) return;
    const svc = SERVICES.find(s => s.key === o.svc);
    const stepIdx = STATUS_FLOW.findIndex(s => s.key === o.status);
    const isCancelled = o.status === 'CANCELLED';

    let progressHtml = '';
    if (!isCancelled) {
      progressHtml = `<div class="progress">`;
      STATUS_FLOW.forEach((s, i) => {
        const done = i <= stepIdx;
        progressHtml += `
          <div class="progress-step ${done ? 'done' : ''}">
            <div class="dot">${done ? '✓' : (i + 1)}</div>
            <div>${s.label}</div>
          </div>
        `;
        if (i < STATUS_FLOW.length - 1) {
          progressHtml += `<div class="progress-line ${i < stepIdx ? 'done' : ''}"></div>`;
        }
      });
      progressHtml += `</div>`;
    }

    const bannerMap = {
      CREATED:    { step: '等待派单', desc: '系统正在为您匹配附近服务者…' },
      DISPATCHED: { step: '已派单', desc: '已通知服务者，等待接单中' },
      ACCEPTED:   { step: '服务者已接单', desc: `${o.worker?.name || ''} 已接单，请耐心等待` },
      IN_SERVICE: { step: '服务中', desc: '服务者正在提供贴心服务' },
      COMPLETED:  { step: '订单已完成', desc: '感谢您的使用，欢迎评价' },
      CANCELLED:  { step: '订单已取消', desc: '期待下次为您服务' },
    };
    const b = bannerMap[o.status];

    let actionHtml = '';
    if (o.status === 'CREATED' || o.status === 'DISPATCHED') {
      actionHtml = `<button class="btn btn-danger" onclick="cancelOrder()">取消订单</button>`;
    } else if (o.status === 'COMPLETED' && !o.review) {
      actionHtml = `<button class="btn btn-primary" onclick="go('review')">去评价</button>`;
    } else if (o.status === 'COMPLETED' && o.review) {
      actionHtml = `
        <div class="form-card" style="background:var(--brand-soft);">
          <div style="font-size:14px;font-weight:600;margin-bottom:8px;color:var(--brand-deep);">我的评价</div>
          <div style="font-size:18px;color:var(--gold);margin-bottom:8px;">${'★'.repeat(o.review.rating)}<span style="color:var(--border);">${'☆'.repeat(5 - o.review.rating)}</span></div>
          ${o.review.tags.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">${o.review.tags.map(t => `<span class="pill pill-completed" style="background:var(--brand-soft);color:var(--brand-deep);">${t}</span>`).join('')}</div>` : ''}
          ${o.review.comment ? `<div style="font-size:13px;color:var(--ink-2);line-height:1.6;">${o.review.comment}</div>` : ''}
        </div>
      `;
    }

    document.getElementById('detail-body').innerHTML = `
      <div class="status-banner">
        <div class="step">${b.step}</div>
        <div class="desc">${b.desc}</div>
      </div>
      ${progressHtml}
      <div class="form-card">
        <div class="info-row"><span class="lab">服务类型</span><span class="val">${svc.icon} ${svc.name}</span></div>
        <div class="info-row"><span class="lab">订单编号</span><span class="val" style="font-size:12px;">${o.id}</span></div>
        <div class="info-row"><span class="lab">服务地址</span><span class="val">${o.addr}</span></div>
        <div class="info-row"><span class="lab">预约时间</span><span class="val">${o.scheduled}</span></div>
        <div class="info-row"><span class="lab">订单金额</span><span class="val" style="color:var(--brand);font-weight:700;">¥${o.price}</span></div>
        ${o.note ? `<div class="info-row"><span class="lab">备注</span><span class="val">${o.note}</span></div>` : ''}
      </div>
      ${o.worker ? `
        <div class="form-card">
          <div style="font-size:14px;font-weight:600;margin-bottom:12px;">服务者信息</div>
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="nanny-avatar">${o.worker.avatar}</div>
            <div>
              <div style="font-size:15px;font-weight:600;">${o.worker.name}</div>
              <div style="font-size:12px;color:var(--ink-2);margin-top:4px;">★ ${o.worker.rating} · 认证服务者</div>
            </div>
            <button class="btn btn-secondary" style="width:auto;padding:8px 16px;margin-left:auto;" onclick="toast('电话 Demo')">📞 联系</button>
          </div>
        </div>
      ` : ''}
      ${actionHtml}
    `;
  }

  function renderReview() {
    reviewRating = 0;
    reviewTags.clear();
    document.getElementById('stars').innerHTML = [1,2,3,4,5].map(i => `
      <span class="star" data-i="${i}" onclick="setRating(${i})">★</span>
    `).join('');
    document.getElementById('tag-pick').innerHTML = TAGS.map(t => `
      <div class="tag-pick-item" data-t="${t}" onclick="toggleTag('${t}')">${t}</div>
    `).join('');
    document.getElementById('r-comment').value = '';
  }

  function setRating(i) {
    reviewRating = i;
    document.querySelectorAll('#stars .star').forEach((el, idx) => {
      el.classList.toggle('active', idx < i);
    });
  }
  function toggleTag(t) {
    if (reviewTags.has(t)) reviewTags.delete(t);
    else reviewTags.add(t);
    document.querySelectorAll('#tag-pick .tag-pick-item').forEach(el => {
      if (el.dataset.t === t) el.classList.toggle('active', reviewTags.has(t));
    });
  }

  // ============ 操作 ============
  function submitOrder() {
    const addr = document.getElementById('f-addr').value.trim();
    if (!addr) return toast('请填写地址');
    const svc = SERVICES.find(s => s.key === publishSvc);
    const date = document.getElementById('f-date').value;
    const time = document.getElementById('f-time').value;
    const note = document.getElementById('f-note').value.trim();
    const id = 'QD' + Date.now().toString().slice(-9);
    const newOrder = {
      id, svc: publishSvc, addr,
      scheduled: `${date} ${time}`, status: 'CREATED', price: svc.price,
      note, created: new Date().toLocaleString('zh-CN', { hour12: false }).replace(/\//g, '-'),
      worker: null, review: null
    };
    orders.unshift(newOrder);
    toast('下单成功，正在为您派单…');
    setTimeout(() => {
      // 模拟派单 + 接单
      newOrder.status = 'ACCEPTED';
      newOrder.worker = NANNIES[Math.floor(Math.random() * NANNIES.length)];
      if (curOrderId === id) renderDetail();
      toast(`${newOrder.worker.name} 已接单`);
    }, 2200);
    viewOrder(id);
  }

  function cancelOrder() {
    const o = orders.find(x => x.id === curOrderId);
    if (!o) return;
    o.status = 'CANCELLED';
    renderDetail();
    toast('订单已取消');
  }

  function submitReview() {
    if (reviewRating === 0) return toast('请先打分');
    const o = orders.find(x => x.id === curOrderId);
    if (!o) return;
    o.review = {
      rating: reviewRating,
      tags: [...reviewTags],
      comment: document.getElementById('r-comment').value.trim()
    };
    toast('评价提交成功，感谢您的反馈！');
    renderDetail();
    go('detail');
  }

  // ============ 路由 ============
  function go(tab) {
    curTab = tab;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');

    document.querySelectorAll('.tab-item').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });

    if (tab === 'home') renderHome();
    if (tab === 'publish') renderPublish();
    if (tab === 'orders') renderOrders();
    if (tab === 'detail') renderDetail();
    if (tab === 'review') renderReview();

    document.querySelector('.app').scrollTop = 0;
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2000);
  }

  // 初始化
  renderHome();
</script>
</body>
</html>
