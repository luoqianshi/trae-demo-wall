<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>亲人到家 · 接单端 Demo</title>
<style>
  /* ============ 设计 Token（与用户端一致的暖色调） ============ */
  :root {
    --brand: #FF6B35;
    --brand-soft: #FFE8DD;
    --brand-deep: #E55A28;
    --gold: #FFB627;
    --bg: #FFF8F3;
    --card: #FFFFFF;
    --ink-1: #1A1A1A;
    --ink-2: #6B6B6B;
    --ink-3: #A8A8A8;
    --border: #F0E8E0;
    --success: #2BA471;
    --success-soft: #E0F5EC;
    --warning: #F5A623;
    --warning-soft: #FFF3DC;
    --error: #E54848;
    --error-soft: #FDEAEA;
    --shadow: 0 4px 16px rgba(255, 107, 53, 0.08);
    --shadow-md: 0 8px 24px rgba(255, 107, 53, 0.12);
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body {
    background: linear-gradient(135deg, #FFF1E6 0%, #FFE3D1 100%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }

  /* ============ 手机外框 ============ */
  .phone {
    width: 390px; height: 844px;
    background: var(--bg);
    border-radius: 44px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25), 0 0 0 12px #1A1A1A, 0 0 0 13px #333;
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }
  .status-bar {
    height: 44px; padding: 0 24px 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 15px; font-weight: 600; color: var(--ink-1);
    background: var(--bg); flex-shrink: 0; position: relative; z-index: 10;
  }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 12px; }
  .notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 28px; background: #1A1A1A;
    border-radius: 0 0 18px 18px;
  }

  .app { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
  .app::-webkit-scrollbar { display: none; }

  .page { display: none; padding: 8px 16px 100px; animation: fade 0.25s ease; }
  .page.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .page-head { display: flex; align-items: center; gap: 12px; padding: 8px 0 16px; }
  .back-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: var(--card); color: var(--ink-1);
    font-size: 16px; cursor: pointer; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
  }
  .page-title { font-size: 20px; font-weight: 700; color: var(--ink-1); flex: 1; }

  /* ============ 大厅 Hero（上线状态卡） ============ */
  .hall-hero {
    background: linear-gradient(135deg, var(--brand) 0%, var(--gold) 100%);
    border-radius: 20px; padding: 18px; color: #fff;
    margin-bottom: 16px; box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 14px;
  }
  .hall-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .hall-info { flex: 1; }
  .hall-name { font-size: 16px; font-weight: 700; }
  .hall-rating { font-size: 12px; opacity: 0.95; margin-top: 3px; }
  .online-switch {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.25); padding: 6px 12px;
    border-radius: 999px; cursor: pointer; font-size: 13px;
    font-weight: 600;
  }
  .online-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #fff;
  }
  .online-dot.offline { background: rgba(255,255,255,0.5); }

  /* 今日数据 */
  .stat-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card); border-radius: var(--radius); padding: 14px 10px;
    text-align: center; box-shadow: var(--shadow);
  }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--brand); }
  .stat-lab { font-size: 11px; color: var(--ink-2); margin-top: 4px; }

  .section-title {
    font-size: 16px; font-weight: 700; color: var(--ink-1);
    margin: 8px 0 12px; display: flex; align-items: center; justify-content: space-between;
  }
  .section-title .count { font-size: 12px; color: var(--ink-3); font-weight: 400; }

  /* 订单卡片 */
  .order-card {
    background: var(--card); border-radius: var(--radius);
    padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
    cursor: pointer; transition: transform 0.15s;
  }
  .order-card:hover { transform: translateY(-1px); }
  .order-card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .order-svc { font-size: 15px; font-weight: 600; color: var(--ink-1); }
  .order-time { font-size: 12px; color: var(--ink-3); margin-top: 4px; }
  .order-card-body { font-size: 13px; color: var(--ink-2); line-height: 1.6; }
  .order-card-foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  }
  .order-price { font-size: 17px; font-weight: 700; color: var(--brand); }
  .order-dist { font-size: 12px; color: var(--success); display: flex; align-items: center; gap: 4px; }

  .pill {
    display: inline-flex; align-items: center; padding: 3px 10px;
    border-radius: 999px; font-size: 12px; font-weight: 500;
  }
  .pill-created { background: var(--border); color: var(--ink-2); }
  .pill-dispatched, .pill-accepted { background: var(--brand-soft); color: var(--brand-deep); }
  .pill-in_service { background: var(--warning-soft); color: var(--warning); }
  .pill-completed { background: var(--success-soft); color: var(--success); }
  .pill-cancelled { background: var(--error-soft); color: var(--error); }

  /* 筛选 tab */
  .filter-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px; }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    padding: 6px 14px; border-radius: 999px; font-size: 13px;
    background: var(--card); color: var(--ink-2); cursor: pointer;
    white-space: nowrap; border: 1px solid var(--border);
  }
  .filter-tab.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  /* ============ 详情页 ============ */
  .status-banner {
    background: linear-gradient(135deg, var(--brand) 0%, var(--gold) 100%);
    color: #fff; padding: 20px; border-radius: var(--radius);
    margin-bottom: 12px; text-align: center;
  }
  .status-banner .step { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .status-banner .desc { font-size: 12px; opacity: 0.9; }

  .progress {
    display: flex; align-items: center; padding: 16px 8px;
    background: var(--card); border-radius: var(--radius); margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .progress-step {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-size: 11px; color: var(--ink-3);
  }
  .progress-step .dot {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--border); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
  }
  .progress-step.done .dot { background: var(--brand); }
  .progress-step.done { color: var(--brand); font-weight: 600; }
  .progress-line { flex: 0 0 16px; height: 2px; background: var(--border); }
  .progress-line.done { background: var(--brand); }

  .info-card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .info-card-title { font-size: 14px; font-weight: 600; color: var(--ink-1); margin-bottom: 12px; }
  .info-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row .lab { color: var(--ink-2); }
  .info-row .val { color: var(--ink-1); font-weight: 500; text-align: right; }

  .user-block {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; background: var(--bg); border-radius: var(--radius-sm);
  }
  .user-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brand-soft), var(--warning-soft));
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }

  /* ============ 按钮 ============ */
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--brand); color: #fff; box-shadow: var(--shadow); }
  .btn-primary:hover { background: var(--brand-deep); }
  .btn-success { background: var(--success); color: #fff; box-shadow: var(--shadow); }
  .btn-secondary { background: var(--card); color: var(--ink-1); border: 1px solid var(--border); }
  .btn-warn { background: var(--warning); color: #fff; }

  /* ============ 我的 ============ */
  .me-hero {
    background: linear-gradient(135deg, var(--brand) 0%, var(--gold) 100%);
    color: #fff; padding: 24px 20px; border-radius: var(--radius);
    margin-bottom: 16px; box-shadow: var(--shadow-md);
    text-align: center;
  }
  .me-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto 10px;
  }
  .me-name { font-size: 18px; font-weight: 700; }
  .me-tags { font-size: 12px; opacity: 0.9; margin-top: 6px; }

  .rating-card {
    background: var(--card); border-radius: var(--radius);
    padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: space-around;
    text-align: center;
  }
  .rating-big {
    font-size: 36px; font-weight: 700; color: var(--gold);
    line-height: 1;
  }
  .rating-lab { font-size: 11px; color: var(--ink-2); margin-top: 4px; }
  .rating-divider { width: 1px; height: 40px; background: var(--border); }

  .review-item {
    background: var(--card); border-radius: var(--radius);
    padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
  }
  .review-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .review-stars { color: var(--gold); font-size: 14px; }
  .review-time { font-size: 12px; color: var(--ink-3); }
  .review-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .review-tag {
    background: var(--brand-soft); color: var(--brand-deep);
    padding: 2px 10px; border-radius: 999px; font-size: 12px;
  }
  .review-comment {
    font-size: 13px; color: var(--ink-2); line-height: 1.6;
  }
  .review-user { font-size: 12px; color: var(--ink-3); margin-top: 6px; }

  /* ============ Tab Bar ============ */
  .tab-bar {
    height: 70px; background: var(--card);
    border-top: 1px solid var(--border);
    display: flex; padding-bottom: 8px;
    flex-shrink: 0;
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 2px; cursor: pointer;
    color: var(--ink-3); font-size: 11px;
  }
  .tab-item.active { color: var(--brand); }
  .tab-icon { font-size: 22px; line-height: 1; }

  .toast {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: rgba(26,26,26,0.92); color: #fff;
    padding: 10px 18px; border-radius: 999px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty {
    text-align: center; padding: 60px 20px; color: var(--ink-3); font-size: 14px;
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="notch"></div>
    <div class="icons">
      <span>●●●●</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="app">
    <!-- ============ 接单大厅 ============ -->
    <div class="page active" id="page-hall">
      <div class="hall-hero">
        <div class="hall-avatar">👩‍🦰</div>
        <div class="hall-info">
          <div class="hall-name">李阿姨</div>
          <div class="hall-rating">★ 4.9 · 今日已接 2 单</div>
        </div>
        <div class="online-switch" id="online-switch" onclick="toggleOnline()">
          <span class="online-dot" id="online-dot"></span>
          <span id="online-text">已上线</span>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-val">¥486</div>
          <div class="stat-lab">今日收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">2</div>
          <div class="stat-lab">进行中</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">326</div>
          <div class="stat-lab">累计单数</div>
        </div>
      </div>

      <div class="section-title">
        附近订单
        <span class="count" id="hall-count">3 个可接</span>
      </div>
      <div id="hall-list"></div>
    </div>

    <!-- ============ 我的订单 ============ -->
    <div class="page" id="page-orders">
      <div class="page-head"><div class="page-title">我的订单</div></div>
      <div class="filter-tabs" id="my-filters"></div>
      <div id="my-list"></div>
    </div>

    <!-- ============ 订单详情 ============ -->
    <div class="page" id="page-detail">
      <div class="page-head">
        <button class="back-btn" onclick="goBack()">‹</button>
        <div class="page-title">订单详情</div>
      </div>
      <div id="detail-body"></div>
    </div>

    <!-- ============ 我的 ============ -->
    <div class="page" id="page-me">
      <div class="page-head"><div class="page-title">我的</div></div>
      <div class="me-hero">
        <div class="me-avatar">👩‍🦰</div>
        <div class="me-name">李阿姨</div>
        <div class="me-tags">认证服务者 · 5年经验 · 育婴师证</div>
      </div>

      <div class="rating-card">
        <div>
          <div class="rating-big">4.9</div>
          <div class="rating-lab">综合评分</div>
        </div>
        <div class="rating-divider"></div>
        <div>
          <div class="rating-big">326</div>
          <div class="rating-lab">完成订单</div>
        </div>
        <div class="rating-divider"></div>
        <div>
          <div class="rating-big">98%</div>
          <div class="rating-lab">好评率</div>
        </div>
      </div>

      <div class="section-title">用户评价</div>
      <div id="me-reviews"></div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item active" data-tab="hall" onclick="go('hall','')">
      <span class="tab-icon">🏠</span><span>接单大厅</span>
    </div>
    <div class="tab-item" data-tab="orders" onclick="go('orders','')">
      <span class="tab-icon">📋</span><span>我的订单</span>
    </div>
    <div class="tab-item" data-tab="me" onclick="go('me','')">
      <span class="tab-icon">👤</span><span>我的</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  // ============ Mock 数据 ============
  const SERVICES = {
    pickup:   { name: '接送孩子', icon: '🚸' },
    homework: { name: '陪写作业', icon: '📚' },
    elder:    { name: '老人陪诊', icon: '🧓' },
    hospital: { name: '医院陪护', icon: '🏥' },
    pet:      { name: '上门喂宠', icon: '🐾' },
    walk:     { name: '陪遛老人', icon: '🚶' },
    cook:     { name: '上门做饭', icon: '🍳' },
    clean:    { name: '上门保洁', icon: '✨' },
  };

  const STATUS_FLOW = [
    { key: 'ACCEPTED',   label: '已接单' },
    { key: 'IN_SERVICE', label: '服务中' },
    { key: 'COMPLETED',  label: '已完成' },
  ];
  const STATUS_LABEL = { CREATED:'待接单', DISPATCHED:'已派单', ACCEPTED:'已接单', IN_SERVICE:'服务中', COMPLETED:'已完成', CANCELLED:'已取消' };

  // 大厅可接订单（CREATED）
  let hallOrders = [
    { id: 'H20240701001', svc: 'homework', addr: '望京 SOHO T1 1608', dist: 0.8, scheduled: '今天 14:00', price: 128, note: '孩子三年级，辅导数学', user: '王女士', userAvatar: '👩' },
    { id: 'H20240701002', svc: 'elder',    addr: '望京西园 3 区 12 号楼', dist: 1.6, scheduled: '今天 16:00', price: 168, note: '陪同老人去协和医院复诊', user: '张先生', userAvatar: '👨' },
    { id: 'H20240701003', svc: 'clean',    addr: '望京 SOHO T2 901', dist: 2.3, scheduled: '明天 10:00', price: 118, note: '三居室深度保洁', user: '李女士', userAvatar: '👩‍🦱' },
  ];

  // 我的订单（已接单后流入这里）
  let myOrders = [
    {
      id: 'M20240701001', svc: 'cook', addr: '望京西园 4 区 5 号楼', dist: 1.2,
      scheduled: '今天 11:00', price: 138, note: '做两顿饭，清淡为主', status: 'IN_SERVICE',
      user: '陈奶奶', userAvatar: '🧓',
      checkinAt: '11:02', completedAt: null
    },
    {
      id: 'M20240701002', svc: 'pet', addr: '望京 SOHO T3 1802', dist: 0.6,
      scheduled: '昨天 15:00', price: 78, note: '上门喂猫，铲屎换水', status: 'COMPLETED',
      user: '周先生', userAvatar: '👨',
      checkinAt: '14:58', completedAt: '16:30'
    },
  ];

  // 收到的评价
  const myReviews = [
    { rating: 5, tags: ['准时到达', '专业细心', '会再来'], comment: '李阿姨非常耐心，孩子很喜欢她，下次还约！', user: '王女士', time: '2024-07-01 16:30' },
    { rating: 5, tags: ['服务热情', '沟通顺畅'], comment: '很贴心，老人很满意。', user: '陈奶奶家属', time: '2024-06-30 18:00' },
    { rating: 4, tags: ['物超所值'], comment: '总体不错，做饭口味偏淡一点更好。', user: '周先生', time: '2024-06-29 17:00' },
  ];

  let isOnline = true;
  let curTab = 'hall';
  let curMyFilter = '';
  let curOrderId = null;
  let lastTab = 'hall'; // 详情页返回用

  // ============ 渲染大厅 ============
  function renderHall() {
    document.getElementById('online-dot').className = 'online-dot' + (isOnline ? '' : ' offline');
    document.getElementById('online-text').textContent = isOnline ? '已上线' : '已下线';

    if (!isOnline) {
      document.getElementById('hall-count').textContent = '0 个可接';
      document.getElementById('hall-list').innerHTML = `
        <div class="empty"><div class="empty-emoji">😴</div>已下线，开启接单查看附近订单</div>
      `;
      return;
    }

    document.getElementById('hall-count').textContent = `${hallOrders.length} 个可接`;
    document.getElementById('hall-list').innerHTML = hallOrders.length === 0
      ? `<div class="empty"><div class="empty-emoji">📭</div>暂无附近订单</div>`
      : hallOrders.map(o => {
          const svc = SERVICES[o.svc];
          return `
            <div class="order-card" onclick="viewHallOrder('${o.id}')">
              <div class="order-card-head">
                <div>
                  <div class="order-svc">${svc.icon} ${svc.name}</div>
                  <div class="order-time">🕒 ${o.scheduled} · ${o.user}</div>
                </div>
                <span class="pill pill-created">待接单</span>
              </div>
              <div class="order-card-body">📍 ${o.addr}</div>
              ${o.note ? `<div class="order-card-body" style="margin-top:6px;font-size:12px;">📝 ${o.note}</div>` : ''}
              <div class="order-card-foot">
                <span class="order-dist">📍 距您 ${o.dist} km</span>
                <span class="order-price">¥${o.price}</span>
              </div>
            </div>
          `;
        }).join('');
  }

  function toggleOnline() {
    isOnline = !isOnline;
    renderHall();
    toast(isOnline ? '已上线，开始接单' : '已下线');
  }

  // ============ 渲染我的订单 ============
  function renderMyOrders() {
    const filters = [
      { key: '', label: '全部' },
      { key: 'ACCEPTED', label: '已接单' },
      { key: 'IN_SERVICE', label: '服务中' },
      { key: 'COMPLETED', label: '已完成' },
    ];
    document.getElementById('my-filters').innerHTML = filters.map(f => `
      <div class="filter-tab ${curMyFilter === f.key ? 'active' : ''}" onclick="setMyFilter('${f.key}')">${f.label}</div>
    `).join('');

    const list = myOrders.filter(o => !curMyFilter || o.status === curMyFilter);
    document.getElementById('my-list').innerHTML = list.length === 0
      ? `<div class="empty"><div class="empty-emoji">📭</div>暂无订单</div>`
      : list.map(o => {
          const svc = SERVICES[o.svc];
          return `
            <div class="order-card" onclick="viewMyOrder('${o.id}')">
              <div class="order-card-head">
                <div>
                  <div class="order-svc">${svc.icon} ${svc.name}</div>
                  <div class="order-time">🕒 ${o.scheduled} · ${o.user}</div>
                </div>
                <span class="pill pill-${o.status.toLowerCase()}">${STATUS_LABEL[o.status]}</span>
              </div>
              <div class="order-card-body">📍 ${o.addr}</div>
              <div class="order-card-foot">
                <span class="order-dist">📍 距 ${o.dist} km</span>
                <span class="order-price">¥${o.price}</span>
              </div>
            </div>
          `;
        }).join('');
  }

  function setMyFilter(k) { curMyFilter = k; renderMyOrders(); }

  // ============ 详情页 ============
  function viewHallOrder(id) {
    curOrderId = id;
    lastTab = 'hall';
    renderDetail('hall');
    go('detail');
  }
  function viewMyOrder(id) {
    curOrderId = id;
    lastTab = 'orders';
    renderDetail('my');
    go('detail');
  }

  function renderDetail(source) {
    const list = source === 'hall' ? hallOrders : myOrders;
    const o = list.find(x => x.id === curOrderId);
    if (!o) return;
    const svc = SERVICES[o.svc];
    const status = o.status || 'CREATED';

    let actionHtml = '';
    if (source === 'hall') {
      actionHtml = `<button class="btn btn-primary" onclick="acceptOrder('${o.id}')">立即接单</button>`;
    } else {
      if (status === 'ACCEPTED') {
        actionHtml = `<button class="btn btn-success" onclick="checkin('${o.id}')">到达签到</button>`;
      } else if (status === 'IN_SERVICE') {
        actionHtml = `
          <div style="display:flex;gap:10px;">
            <button class="btn btn-warn" style="flex:1;" onclick="checkout('${o.id}')">完成签退</button>
          </div>
          <p style="text-align:center;font-size:12px;color:var(--ink-3);margin-top:10px;">
            签到时间：${o.checkinAt} · 服务中…
          </p>
        `;
      } else if (status === 'COMPLETED') {
        actionHtml = `
          <div class="info-card" style="background:var(--success-soft);text-align:center;">
            <div style="font-size:14px;font-weight:600;color:var(--success);margin-bottom:4px;">✅ 订单已完成</div>
            <div style="font-size:12px;color:var(--ink-2);">签到 ${o.checkinAt} · 签退 ${o.completedAt}</div>
          </div>
        `;
      }
    }

    // 进度条（只针对我的订单）
    let progressHtml = '';
    if (source === 'my') {
      const steps = [
        { key: 'ACCEPTED',   label: '已接单' },
        { key: 'IN_SERVICE', label: '服务中' },
        { key: 'COMPLETED',  label: '已完成' },
      ];
      const stepIdx = steps.findIndex(s => s.key === status);
      progressHtml = `<div class="progress">`;
      steps.forEach((s, i) => {
        const done = i <= stepIdx;
        progressHtml += `
          <div class="progress-step ${done ? 'done' : ''}">
            <div class="dot">${done ? '✓' : (i + 1)}</div>
            <div>${s.label}</div>
          </div>
        `;
        if (i < steps.length - 1) {
          progressHtml += `<div class="progress-line ${i < stepIdx ? 'done' : ''}"></div>`;
        }
      });
      progressHtml += `</div>`;
    }

    const bannerStep = source === 'hall' ? '待接单' : STATUS_LABEL[status];
    const bannerDesc = source === 'hall'
      ? '确认接单后请联系用户确认服务细节'
      : (status === 'ACCEPTED' ? '请按时到达服务地址并签到' :
         status === 'IN_SERVICE' ? '服务进行中，完成后记得签退' :
         '订单已完成，感谢您的辛勤付出');

    document.getElementById('detail-body').innerHTML = `
      <div class="status-banner">
        <div class="step">${bannerStep}</div>
        <div class="desc">${bannerDesc}</div>
      </div>
      ${progressHtml}
      <div class="info-card">
        <div class="info-card-title">订单信息</div>
        <div class="info-row"><span class="lab">服务类型</span><span class="val">${svc.icon} ${svc.name}</span></div>
        <div class="info-row"><span class="lab">订单编号</span><span class="val" style="font-size:12px;">${o.id}</span></div>
        <div class="info-row"><span class="lab">预约时间</span><span class="val">${o.scheduled}</span></div>
        <div class="info-row"><span class="lab">服务地址</span><span class="val">${o.addr}</span></div>
        <div class="info-row"><span class="lab">订单金额</span><span class="val" style="color:var(--brand);font-weight:700;">¥${o.price}</span></div>
        ${o.note ? `<div class="info-row"><span class="lab">备注</span><span class="val">${o.note}</span></div>` : ''}
      </div>
      <div class="info-card">
        <div class="info-card-title">客户信息</div>
        <div class="user-block">
          <div class="user-avatar">${o.userAvatar}</div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:600;">${o.user}</div>
            <div style="font-size:12px;color:var(--ink-2);margin-top:4px;">📍 距您 ${o.dist} km</div>
          </div>
          <button class="btn btn-secondary" style="width:auto;padding:8px 14px;" onclick="toast('电话 Demo')">📞 联系</button>
        </div>
      </div>
      ${actionHtml}
    `;
  }

  // ============ 操作 ============
  function acceptOrder(id) {
    const idx = hallOrders.findIndex(o => o.id === id);
    if (idx < 0) return;
    const o = hallOrders.splice(idx, 1)[0];
    const newOrder = {
      ...o, status: 'ACCEPTED', checkinAt: null, completedAt: null
    };
    myOrders.unshift(newOrder);
    toast('接单成功！请按时到达');
    curOrderId = newOrder.id;
    lastTab = 'orders';
    renderDetail('my');
  }

  function checkin(id) {
    const o = myOrders.find(x => x.id === id);
    if (!o) return;
    o.status = 'IN_SERVICE';
    o.checkinAt = new Date().toLocaleTimeString('zh-CN', { hour12: false }).slice(0, 5);
    toast(`已签到 ${o.checkinAt}`);
    renderDetail('my');
  }

  function checkout(id) {
    const o = myOrders.find(x => x.id === id);
    if (!o) return;
    o.status = 'COMPLETED';
    o.completedAt = new Date().toLocaleTimeString('zh-CN', { hour12: false }).slice(0, 5);
    toast('签退成功，订单已完成');
    renderDetail('my');
  }

  // ============ 我的页 - 评价 ============
  function renderMe() {
    document.getElementById('me-reviews').innerHTML = myReviews.map(r => `
      <div class="review-item">
        <div class="review-head">
          <span class="review-stars">${'★'.repeat(r.rating)}<span style="color:var(--border);">${'☆'.repeat(5 - r.rating)}</span></span>
          <span class="review-time">${r.time}</span>
        </div>
        ${r.tags.length ? `<div class="review-tags">${r.tags.map(t => `<span class="review-tag">${t}</span>`).join('')}</div>` : ''}
        ${r.comment ? `<div class="review-comment">${r.comment}</div>` : ''}
        <div class="review-user">— ${r.user}</div>
      </div>
    `).join('');
  }

  // ============ 路由 ============
  function go(tab, filter) {
    curTab = tab;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    document.querySelectorAll('.tab-item').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    if (tab === 'hall') renderHall();
    if (tab === 'orders') renderMyOrders();
    if (tab === 'me') renderMe();
    document.querySelector('.app').scrollTop = 0;
  }

  function goBack() {
    go(lastTab);
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2000);
  }

  // 初始化
  renderHall();
</script>
</body>
</html>
