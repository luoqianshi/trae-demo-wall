<style>

.hero-stats{margin-top:3rem;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:28rem;margin-left:auto;margin-right:auto}
.hero-stat{border-radius:.75rem;background:rgba(255,255,255,.1);padding:1rem;backdrop-filter:blur(4px)}
.hero-stat-value{font-family:'Noto Serif SC',serif;font-size:1.875rem;font-weight:700}
.hero-stat-label{margin-top:.25rem;font-size:.875rem;color:#f3f7f1}
.section{padding:4rem 0}
.section-head{margin-bottom:2rem;text-align:center}
.section-title{font-family:'Noto Serif SC',serif;font-size:1.875rem;font-weight:700;color:var(--brand-800)}

.modules-grid{display:grid;gap:1.5rem;grid-template-columns:1fr}

.value-desc{margin-top:.25rem;font-size:.875rem;color:var(--brand-600)}
.page{padding:2rem 0}

.page-sub{margin-top:.25rem;font-size:.875rem;color:var(--brand-500)}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;margin-bottom:1.5rem}
.search-wrap{position:relative;flex:1;min-width:240px}
.search-wrap>svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);width:1rem;height:1rem;color:var(--brand-400);pointer-events:none}
.search-wrap .input{padding-left:2.25rem}
.select-auto{width:auto;min-width:120px}
.grid-3{display:grid;gap:1rem;grid-template-columns:1fr}
@media(min-width:640px){.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.grid-3{grid-template-columns:repeat(3,1fr)}}
.grid-4{display:grid;gap:1rem;grid-template-columns:repeat(2,1fr)}
@media(min-width:1024px){.grid-4{grid-template-columns:repeat(4,1fr)}}
.book-card{display:flex;flex-direction:column;overflow:hidden}
.book-cover{aspect-ratio:3/4;background:var(--brand-100);position:relative}
.book-cover.empty{display:flex;align-items:center;justify-content:center}
.book-cover.empty svg{width:3rem;height:3rem;color:var(--brand-400)}
.book-cover img{width:100%;height:100%;object-fit:cover}
.book-info{display:flex;flex:1;flex-direction:column;padding:1rem}

.book-author{margin-top:.25rem;font-size:.875rem;color:var(--brand-500)}

.mini-btn{background:transparent;border:none;color:var(--brand-500);cursor:pointer;font-size:.75rem;padding:.25rem .5rem;display:inline-flex;align-items:center;gap:.25rem;border-radius:.25rem}
.mini-btn:hover{background:var(--brand-50)}
.mini-btn svg{width:.75rem;height:.75rem}
.product-card{overflow:hidden}
.product-cover{aspect-ratio:1/1;background:#ffe4e6;display:flex;align-items:center;justify-content:center}
.product-cover svg{width:2.5rem;height:2.5rem;color:#fda4af}
.product-cover img{width:100%;height:100%;object-fit:cover}
.product-info{padding:.75rem}
.product-name{font-weight:500;color:var(--brand-800);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-meta-row{margin-top:.5rem;display:flex;align-items:center;justify-content:space-between}
.product-price{font-weight:700;color:var(--brand-700)}
.product-stock{margin-top:.25rem;font-size:.75rem;color:var(--brand-400)}
.kb-card{padding:1.25rem}
.kb-icon{display:inline-flex;border-radius:.5rem;background:#e0e7ff;padding:.5rem;color:var(--indigo);margin-bottom:.75rem}
.kb-icon svg{width:1.25rem;height:1.25rem}
.kb-name{font-family:'Noto Serif SC',serif;font-weight:700;color:var(--brand-800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kb-desc{margin-top:.25rem;font-size:.875rem;color:var(--brand-500);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kb-meta{margin-top:.75rem;display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--brand-500);flex-wrap:wrap}
.kb-meta svg{width:.75rem;height:.75rem}
.kb-resources{margin-top:.75rem;display:flex;flex-wrap:wrap;gap:.25rem}
.kb-res-tag{background:var(--parchment-dark);color:var(--brand-700);display:inline-flex;align-items:center;gap:.25rem;padding:.125rem .5rem;border-radius:9999px;font-size:.75rem}
.kb-res-tag svg{width:.75rem;height:.75rem}
.group-card{padding:1.25rem;cursor:pointer;transition:all .2s}
.group-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.group-head{display:flex;align-items:flex-start;justify-content:space-between}
.group-icon{display:inline-flex;border-radius:.5rem;background:#ccfbf1;padding:.5rem;color:var(--teal)}
.group-icon svg{width:1.25rem;height:1.25rem}
.group-name{margin-top:.75rem;font-family:'Noto Serif SC',serif;font-weight:700;color:var(--brand-800)}
.group-desc{margin-top:.25rem;font-size:.875rem;color:var(--brand-500);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.auth-sub{margin-top:.25rem;text-align:center;font-size:.875rem;color:var(--brand-500)}
.auth-form{margin-top:1.5rem;display:flex;flex-direction:column;gap:1rem}
.auth-foot{margin-top:1.5rem;text-align:center;font-size:.875rem;color:var(--brand-600)}
.auth-foot a{color:var(--brand-700);text-decoration:none;font-weight:500;cursor:pointer}
.auth-foot a:hover{text-decoration:underline}
.profile-grid{display:grid;gap:2rem;grid-template-columns:1fr}
@media(min-width:768px){.profile-grid{grid-template-columns:repeat(3,1fr)}}
.profile-aside{text-align:center;padding:1.5rem}

.profile-avatar svg{width:3rem;height:3rem}
.profile-main{grid-column:1/-1;display:flex;flex-direction:column;gap:1.5rem}
@media(min-width:768px){.profile-main{grid-column:span 2}}
.activity-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
@media(min-width:640px){.activity-grid{grid-template-columns:repeat(4,1fr)}}
.activity-item{display:flex;align-items:center;gap:.5rem;border-radius:.5rem;background:var(--parchment);padding:.75rem}
.activity-item svg{width:1.25rem;height:1.25rem;color:var(--brand-500);flex-shrink:0}
.activity-label{font-size:.875rem;font-weight:500;color:var(--brand-700)}
.activity-val{font-size:.875rem;color:var(--brand-500)}
.modal-mask{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);padding:1rem}
.modal-card{max-height:80vh;width:100%;max-width:42rem;overflow:auto;padding:1.5rem}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-title{font-family:'Noto Serif SC',serif;font-size:1.25rem;font-weight:700;color:var(--brand-800)}
.modal-sub{font-size:.875rem;color:var(--brand-500)}
.topic-list{list-style:none}
.topic-item{padding:.75rem 0;border-bottom:1px solid var(--brand-100)}
.topic-item:last-child{border-bottom:none}
.topic-title{display:flex;align-items:center;gap:.5rem;font-weight:500;color:var(--brand-800)}
.topic-title svg{width:.75rem;height:.75rem}
.topic-meta{margin-top:.25rem;font-size:.75rem;color:var(--brand-500)}

.toast.show{opacity:1;transform:translateY(0)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:.75rem;border:1px dashed var(--brand-200);padding:4rem 1rem;text-align:center}
.empty-state svg{width:2.5rem;height:2.5rem;color:var(--brand-300);margin-bottom:.75rem}
.empty-state .es-title{font-weight:500;color:var(--brand-700)}
.empty-state .es-hint{margin-top:.25rem;font-size:.875rem;color:var(--brand-500)}
.demo-badge{position:fixed;bottom:1rem;left:1rem;z-index:50;background:rgba(41,63,39,.92);color:#fff;padding:.5rem .875rem;border-radius:9999px;font-size:.75rem;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;gap:.375rem}
.demo-badge::before{content:'';width:8px;height:8px;border-radius:50%;background:#84cc16;box-shadow:0 0 6px #84cc16}
a{color:inherit}
</style>
</head>

    }
    for (var i = 2; i < args.length; i++) appendChild(e, args[i]);
    return e;
  }

    if (typeof c === 'string' || typeof c === 'number') parent.appendChild(document.createTextNode(String(c)));

        return true;
      });
    }
    var wrap = el('div', { class: 'container-page page' });
    wrap.appendChild(el('div', { class: 'page-head' },
      el('div', null,
        el('h1', { class: 'page-title', style: { color: 'var(--rose)' } }, spanIcon(I.shop), '实体精品商店'),
        el('p', { class: 'page-sub' }, '精装公版经典、原创作品实体书、周边文具,为平台运营提供可持续收入。')
      )
    ));
    wrap.appendChild(el('div', { class: 'toolbar' },
      el('div', { class: 'search-wrap' }, spanIcon(I.search), el('input', { class: 'input', placeholder: '搜索商品...', oninput: function (e) { q = e.target.value; } })),
      makeSelect(CAT.shop, category, function (v) { category = v; }),
      el('button', { class: 'btn btn-ghost', onclick: renderList }, '搜索')
    ));
    var listHolder = el('div', null);
    wrap.appendChild(listHolder);

    function renderList() {
      listHolder.innerHTML = '';
      var items = filtered();
      if (!items.length) { listHolder.appendChild(emptyState(I.shop, '暂无商品', '商品即将上线')); return; }
      listHolder.appendChild(el('div', { class: 'grid-4' },
        items.map(function (p) {
          return el('div', { class: 'card product-card' },
            el('div', { class: 'product-cover' }, p.img ? el('img', { src: p.img, alt: p.name }) : spanIcon(I.shop)),
            el('div', { class: 'product-info' },
              el('div', { class: 'product-name' }, p.name),
              el('div', { style: { marginTop: '.25rem' } }, el('span', { class: 'badge', style: { background: '#ffe4e6', color: 'var(--rose)' } }, CAT.shop[p.category] || '商品')),
              el('div', { class: 'product-meta-row' },
                el('span', { class: 'product-price' }, '¥' + p.price),
                p.rating > 0 ? el('span', { class: 'book-meta', style: { color: 'var(--amber)' } }, spanIcon(I.star), p.rating) : null
              ),
              el('div', { class: 'product-stock' }, '库存 ' + p.stock + ' · 已售 ' + p.sales)
            )
          );
        })
      ));
    }
    renderList();
    Layout([wrap]);
  }

  /* ============================================================
   * 讨论社区
   * ============================================================ */
  function CommunityPage() {
    var q = '', type = '', showCreate = false;
    var form = { name: '', desc: '', type: 'general', isPublic: true };
    var activeGroup = null;

    function filtered() {
      return state.groups.filter(function (g) {
        if (type && g.type !== type) return false;
        if (q && g.name.indexOf(q) < 0 && (!g.desc || g.desc.indexOf(q) < 0)) return false;
        return true;
      });
    }

    var wrap = el('div', { class: 'container-page page' });
    wrap.appendChild(el('div', { class: 'page-head' },
      el('div', null,
        el('h1', { class: 'page-title', style: { color: 'var(--teal)' } }, spanIcon(I.msg), '讨论社区'),
        el('p', { class: 'page-sub' }, '读书会、创作交流、学术讨论、AI 技术群组,构建知识交流与创作社群。')
      ),
      el('button', { class: 'btn btn-primary', onclick: function () { showCreate = !showCreate; rebuild(); } }, spanIcon(I.plus), '创建群组')
    ));
    wrap.appendChild(el('div', { class: 'toolbar' },
      el('div', { class: 'search-wrap' }, spanIcon(I.search), el('input', { class: 'input', placeholder: '搜索群组...', oninput: function (e) { q = e.target.value; } })),
      makeSelect(CAT.group, type, function (v) { type = v; }),
      el('button', { class: 'btn btn-ghost', onclick: rebuild }, '搜索')
    ));

    var createHolder = el('div', null);
    var listHolder = el('div', null);
    var modalHolder = el('div', null);
    wrap.appendChild(createHolder);
    wrap.appendChild(listHolder);
    wrap.appendChild(modalHolder);

    function renderCreate() {
      createHolder.innerHTML = '';
      if (!showCreate) return;
      if (!state.user) {
        createHolder.appendChild(el('div', { class: 'card', style: { padding: '1rem', marginBottom: '1.5rem', fontSize: '.875rem', color: 'var(--brand-600)' } }, '请先登录后创建群组。'));
        return;
      }
      createHolder.appendChild(el('form', { class: 'card form-card', style: { marginBottom: '1.5rem' }, onsubmit: function (e) { e.preventDefault(); } },
        el('h3', { class: 'serif', style: { fontSize: '1.125rem', fontWeight: '700', color: 'var(--brand-800)', marginBottom: '1rem' } }, '创建群组'),
        el('div', { class: 'form-grid' },
          el('div', null, el('label', { class: 'label' }, '群组名称 *'), el('input', { class: 'input', value: form.name, oninput: function (e) { form.name = e.target.value; } })),
          el('div', null, el('label', { class: 'label' }, '类型'), makeSelect(CAT.group, form.type, function (v) { form.type = v; }))
        ),
        el('div', { class: 'form-full', style: { marginTop: '1rem' } }, el('label', { class: 'label' }, '简介'), el('textarea', { class: 'input', rows: 2, oninput: function (e) { form.desc = e.target.value; } })),
        el('label', { style: { display: 'flex', alignItems: 'center', gap: '.5rem', fontSize: '.875rem', color: 'var(--brand-700)', marginTop: '1rem', cursor: 'pointer' } },
          el('input', { type: 'checkbox', checked: form.isPublic, onchange: function (e) { form.isPublic = e.target.checked; } }), '公开群组'),
        el('div', { style: { marginTop: '1rem' } }, el('button', {
          class: 'btn btn-primary', onclick: function () {
            if (!form.name.trim()) return toast('请输入群组名称');
            state.groups.unshift({ id: 'g' + Date.now(), name: form.name, desc: form.desc, type: form.type, members: 1, topics: 0, topicList: [] });
            showCreate = false; form = { name: '', desc: '', type: 'general', isPublic: true };
            toast('群组已创建(模拟)'); rebuild();
          }
        }, '创建'))
      ));
    }

    function renderModal() {
      modalHolder.innerHTML = '';
      if (!activeGroup) return;
      var g = activeGroup;
      modalHolder.appendChild(el('div', { class: 'modal-mask', onclick: function (e) { if (e.target === e.currentTarget) { activeGroup = null; renderModal(); } } },
        el('div', { class: 'card modal-card', onclick: function (e) { e.stopPropagation(); } },
          el('div', { class: 'modal-head' },
            el('div', null,
              el('h3', { class: 'modal-title' }, g.name),
              el('p', { class: 'modal-sub' }, g.members + ' 位成员 · ' + g.topics + ' 个主题')
            ),
            el('button', { class: 'btn btn-ghost', onclick: function () { activeGroup = null; renderModal(); } }, '关闭')
          ),
          (g.topicList && g.topicList.length)
            ? el('ul', { class: 'topic-list' }, g.topicList.map(function (t) {
                return el('li', { class: 'topic-item' },
                  el('div', { class: 'topic-title' },
                    t.pinned ? spanIcon(I.pin) : null,
                    t.locked ? spanIcon(I.lock) : null,
                    t.title
                  ),
                  el('div', { class: 'topic-meta' }, t.author + ' · ' + t.replies + ' 回复 · ' + t.views + ' 浏览')
                );
              }))
            : emptyState(I.msgCircle, '暂无主题', '成为群组成员后即可发帖')
        )
      ));
    }

    function renderList() {
      listHolder.innerHTML = '';
      var items = filtered();
      if (!items.length) { listHolder.appendChild(emptyState(I.msg, '暂无群组', '创建你的第一个群组吧')); return; }
      listHolder.appendChild(el('div', { class: 'grid-3' },
        items.map(function (g) {
          return el('div', { class: 'card group-card', onclick: function () { activeGroup = g; renderModal(); } },
            el('div', { class: 'group-head' },
              el('span', { class: 'group-icon', html: I.users }),
              el('span', { class: 'badge', style: { background: '#ccfbf1', color: 'var(--teal)' } }, CAT.group[g.type] || '综合')
            ),
            el('div', { class: 'group-name' }, g.name),
            el('div', { class: 'group-desc' }, g.desc || '暂无描述'),
            el('div', { class: 'group-foot' },
              el('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '.25rem' } }, spanIcon(I.users), g.members + ' 成员'),
              el('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '.25rem' } }, spanIcon(I.msgCircle), g.topics + ' 主题')
            ),
            el('button', { class: 'btn btn-ghost', style: { marginTop: '.75rem', width: '100%', fontSize: '.75rem' }, onclick: function (e) { e.stopPropagation(); if (!state.user) return toast('请先登录后再加入群组'); g.members++; toast('已加入群组(模拟)'); renderList(); } }, '加入群组')
          );
        })
      ));
    }

    function rebuild() { renderCreate(); renderList(); }
    rebuild();
    Layout([wrap]);
  }

  /* ============================================================
   * 登录 / 注册
   * ============================================================ */
  function LoginPage() {
    var form = { email: '', password: '' };
    var card = el('div', { class: 'auth-wrap' },
      el('div', { class: 'card auth-card' },
        el('h1', { class: 'auth-title' }, '登录开源图书馆'),
        el('p', { class: 'auth-sub' }, '传承经典 · 孵化原创'),
        el('form', { class: 'auth-form', onsubmit: function (e) { e.preventDefault(); } },
          el('div', null, el('label', { class: 'label' }, '邮箱'), el('input', { type: 'email', class: 'input', placeholder: 'you@example.com', oninput: function (e) { form.email = e.target.value; } })),
          el('div', null, el('label', { class: 'label' }, '密码'), el('input', { type: 'password', class: 'input', placeholder: '至少 6 位', oninput: function (e) { form.password = e.target.value; } })),
          el('button', { class: 'btn btn-primary', style: { width: '100%' }, onclick: function () {
            if (!form.email || form.email.indexOf('@') < 0) return toast('请输入有效邮箱');
            if (!form.password || form.password.length < 6) return toast('密码至少 6 位');
            /* 演示账户:内置管理员 */
            if (form.email === 'admin@openlibrary.dev' && form.password === 'admin12345') {
              state.user = { nickname: '平台管理员', email: form.email, role: 'admin', reputation: 1000, bio: '开源图书馆平台管理员' };
            } else {
              state.user = { nickname: form.email.split('@')[0], email: form.email, role: 'reader', reputation: 0, bio: '' };
            }
            toast('登录成功,欢迎回来!'); navigate('/');
          } }, '登录')
        ),
        el('p', { class: 'auth-foot' }, '还没有账号?', el('a', { onclick: function () { navigate('/register'); } }, '立即注册')),
        el('p', { class: 'auth-foot', style: { marginTop: '.5rem', fontSize: '.75rem', color: 'var(--brand-400)' } }, '演示账户:admin@openlibrary.dev / admin12345')
      )
    );
    Layout([card]);
  }

  function RegisterPage() {
    var form = { email: '', nickname: '', password: '', confirm: '' };
    var card = el('div', { class: 'auth-wrap' },
      el('div', { class: 'card auth-card' },
        el('h1', { class: 'auth-title' }, '注册账户'),
        el('p', { class: 'auth-sub' }, '加入开源图书馆,开启阅读与创作'),
        el('form', { class: 'auth-form', onsubmit: function (e) { e.preventDefault(); } },
          el('div', null, el('label', { class: 'label' }, '邮箱'), el('input', { type: 'email', class: 'input', oninput: function (e) { form.email = e.target.value; } })),
          el('div', null, el('label', { class: 'label' }, '昵称'), el('input', { class: 'input', oninput: function (e) { form.nickname = e.target.value; } })),
          el('div', null, el('label', { class: 'label' }, '密码'), el('input', { type: 'password', class: 'input', oninput: function (e) { form.password = e.target.value; } })),
          el('div', null, el('label', { class: 'label' }, '确认密码'), el('input', { type: 'password', class: 'input', oninput: function (e) { form.confirm = e.target.value; } })),
          el('button', { class: 'btn btn-primary', style: { width: '100%' }, onclick: function () {
            if (!form.email || form.email.indexOf('@') < 0) return toast('请输入有效邮箱');
            if (!form.nickname || form.nickname.length < 2) return toast('昵称至少 2 个字符');
            if (!form.password || form.password.length < 6) return toast('密码至少 6 位');
            if (form.password !== form.confirm) return toast('两次输入的密码不一致');
            state.user = { nickname: form.nickname, email: form.email, role: 'reader', reputation: 0, bio: '' };
            toast('注册成功,已自动登录'); navigate('/');
          } }, '注册')
        ),
        el('p', { class: 'auth-foot' }, '已有账号?', el('a', { onclick: function () { navigate('/login'); } }, '去登录'))
      )
    );
    Layout([card]);
  }

  /* ============================================================
   * 个人中心
   * ============================================================ */
  function ProfilePage() {
    if (!state.user) { toast('请先登录'); navigate('/login'); return; }
    var ROLE_LABELS = { reader: '普通读者', creator: '创作者', moderator: '版主', admin: '管理员' };
    var u = state.user;
    var form = { nickname: u.nickname, bio: u.bio || '' };

    var wrap = el('div', { class: 'container-page page' },
      el('div', { class: 'profile-grid' },
        el('aside', { class: 'card profile-aside' },
          el('div', { class: 'profile-avatar', html: I.user }),
          el('h2', { class: 'serif', style: { fontSize: '1.25rem', fontWeight: '700', color: 'var(--brand-800)', marginTop: '.75rem' } }, u.nickname),
          el('p', { style: { fontSize: '.875rem', color: 'var(--brand-500)' } }, u.email),
          el('span', { class: 'badge', style: { background: 'var(--brand-100)', color: 'var(--brand-700)', marginTop: '.5rem' } }, ROLE_LABELS[u.role] || u.role),
          el('div', { style: { marginTop: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '.25rem', color: 'var(--amber)' } },
            spanIcon(I.award), el('span', { style: { fontSize: '.875rem' } }, '声望值 ' + (u.reputation || 0))
          ),
          u.role === 'reader' ? el('button', {
            class: 'btn btn-primary', style: { marginTop: '1rem', width: '100%' },
            onclick: function () {
              u.role = 'creator'; u.reputation = (u.reputation || 0) + 10;
              toast('已升级为创作者!'); ProfilePage();
            }
          }, '升级为创作者') : null
        ),
        el('section', { class: 'profile-main' },
          el('div', { class: 'card form-card' },
            el('h3', { class: 'serif', style: { fontSize: '1.125rem', fontWeight: '700', color: 'var(--brand-800)', marginBottom: '1rem' } }, '编辑资料'),
            el('div', null,
              el('label', { class: 'label' }, '昵称'), el('input', { class: 'input', value: form.nickname, oninput: function (e) { form.nickname = e.target.value; } }),
              el('label', { class: 'label', style: { marginTop: '1rem' } }, '个人简介'), el('textarea', { class: 'input', rows: 3, maxlength: 500, oninput: function (e) { form.bio = e.target.value; } }, form.bio)
            ),
            el('div', { style: { marginTop: '1rem' } }, el('button', { class: 'btn btn-primary', onclick: function () {
              u.nickname = form.nickname || u.nickname; u.bio = form.bio;
              toast('资料已保存(模拟)');
            } }, '保存修改'))
          ),
          el('div', { class: 'card form-card' },
            el('h3', { class: 'serif', style: { fontSize: '1.125rem', fontWeight: '700', color: 'var(--brand-800)', marginBottom: '1rem' } }, '我的活动'),
            el('div', { class: 'activity-grid' },
              el('div', { class: 'activity-item' }, spanIcon(I.bookmark), el('div', null, el('div', { class: 'activity-label' }, '我的下载'), el('div', { class: 'activity-val' }, '即将开放'))),
              el('div', { class: 'activity-item' }, spanIcon(I.bookmark), el('div', null, el('div', { class: 'activity-label' }, '我的作品'), el('div', { class: 'activity-val' }, '即将开放'))),
              el('div', { class: 'activity-item' }, spanIcon(I.bot), el('div', null, el('div', { class: 'activity-label' }, '知识库'), el('div', { class: 'activity-val' }, '即将开放'))),
              el('div', { class: 'activity-item' }, spanIcon(I.users), el('div', null, el('div', { class: 'activity-label' }, '我的群组'), el('div', { class: 'activity-val' }, '即将开放')))
            )
          )
        )
      )
    );
    Layout([wrap]);
  }

  /* ============================================================
   * 404
   * ============================================================ */
  function NotFoundPage() {
    Layout([el('div', { class: 'container-page page', style: { textAlign: 'center', padding: '6rem 1rem' } },
      el('div', { class: 'serif', style: { fontSize: '4rem', fontWeight: '700', color: 'var(--brand-300)' } }, '404'),
      el('p', { style: { fontSize: '1.125rem', color: 'var(--brand-600)', marginTop: '.5rem' } }, '页面不存在'),
      el('button', { class: 'btn btn-primary', style: { marginTop: '1.5rem' }, onclick: function () { navigate('/'); } }, '返回首页')
    )]);
  }

  /* ============================================================
   * 路由分发
   * ============================================================ */
  function render() {
    var r = state.route;
    if (r === '/' || r === '') return HomePage();
    if (r === '/library') return LibraryPage();
    if (r === '/workshop') return WorkshopPage();
    if (r === '/ai') return AIKnowledgePage();
    if (r === '/shop') return ShopPage();
    if (r === '/community') return CommunityPage();
    if (r === '/login') return LoginPage();
    if (r === '/register') return RegisterPage();
    if (r === '/profile') return ProfilePage();
    return NotFoundPage();
  }

  /* 启动 */
  render();
})();
</script>
</body>
</html>
