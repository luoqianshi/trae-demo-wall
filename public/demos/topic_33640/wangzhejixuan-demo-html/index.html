<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>王者机选</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

  :root {
    --bg-deep: #0a0c14;
    --bg-primary: #111422;
    --bg-card: #1a1e30;
    --bg-card-hover: #222740;
    --bg-surface: #151828;
    --border-subtle: rgba(255,255,255,0.06);
    --border-accent: rgba(240,178,50,0.4);
    --gold: #f0b232;
    --gold-dim: #c8922a;
    --gold-glow: rgba(240,178,50,0.25);
    --orange: #e8773a;
    --red: #e84057;
    --blue: #4a9eff;
    --green: #3dd68c;
    --text-primary: #e8eaed;
    --text-secondary: #8b8fa3;
    --text-dim: #555a70;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === Animated Background === */
  .bg-atmosphere {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(240,178,50,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(232,119,58,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(74,158,255,0.03) 0%, transparent 70%);
  }

  .app-container {
    position: relative; z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* === Header === */
  .app-header {
    padding: 16px 16px 8px;
    text-align: center;
    position: relative;
  }
  .app-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .app-title {
    font-size: 1.4rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.08em;
  }
  .app-subtitle {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* === Lane Tabs === */
  .lane-tabs {
    display: flex;
    padding: 10px 12px 6px;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .lane-tabs::-webkit-scrollbar { display: none; }

  .lane-tab {
    flex: 1;
    min-width: 0;
    padding: 8px 4px;
    border-radius: var(--radius);
    border: 1px solid var(--border-subtle);
    background: var(--bg-card);
    color: var(--text-secondary);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .lane-tab::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--gold-glow), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .lane-tab:hover { border-color: rgba(240,178,50,0.2); }
  .lane-tab.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(240,178,50,0.08);
    box-shadow: 0 0 20px rgba(240,178,50,0.1);
  }
  .lane-tab.active::before { opacity: 1; }
  .lane-tab .tab-name { position: relative; z-index: 1; }
  .lane-tab .tab-count {
    display: block;
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 2px;
    position: relative; z-index: 1;
  }
  .lane-tab.active .tab-count { color: var(--gold-dim); }

  /* === Hero Grid === */
  .hero-grid-wrapper {
    flex: 1;
    padding: 8px 12px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-card) transparent;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
    gap: 6px;
    padding: 8px;
    background: var(--bg-surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-subtle);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .hero-card {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    background: var(--bg-card);
  }
  .hero-card:hover {
    border-color: rgba(255,255,255,0.15);
    transform: scale(1.03);
  }
  .hero-card.highlighted {
    border-color: var(--gold) !important;
    box-shadow: 0 0 12px var(--gold-glow);
    animation: pulse-border 0.3s ease;
  }
  .hero-card.selected {
    border-color: var(--orange);
    box-shadow: 0 0 16px rgba(232,119,58,0.3);
  }

  @keyframes pulse-border {
    0% { box-shadow: 0 0 4px var(--gold-glow); }
    50% { box-shadow: 0 0 20px var(--gold-glow); }
    100% { box-shadow: 0 0 12px var(--gold-glow); }
  }

  .hero-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero-card .hero-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 12px 3px 3px;
    font-size: 0.6rem;
    font-weight: 500;
    text-align: center;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* === Result Section === */
  .result-section {
    padding: 10px 12px 8px;
  }
  .result-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-subtle);
    padding: 14px;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
    text-align: center;
  }
  .result-label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 10px;
    letter-spacing: 0.1em;
  }
  .result-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 12px;
    min-height: 70px;
  }
  .result-avatar {
    width: 60px; height: 60px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 2px solid var(--border-subtle);
    background: var(--bg-surface);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s;
  }
  .result-avatar.revealed {
    border-color: var(--gold);
    box-shadow: 0 0 20px var(--gold-glow);
  }
  .result-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .result-avatar .placeholder {
    font-size: 1.5rem;
    color: var(--text-dim);
  }
  .result-hero-name {
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--gold);
    min-width: 80px;
    text-align: left;
  }
  .result-hero-name.empty {
    color: var(--text-dim);
    font-size: 0.9rem;
    font-weight: 400;
  }

  /* === Random Button === */
  .random-btn {
    width: 100%;
    padding: 12px;
    border-radius: 24px;
    border: none;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    font-family: inherit;
  }
  .random-btn.ready {
    background: linear-gradient(135deg, var(--gold), var(--orange));
    color: var(--bg-deep);
    box-shadow: 0 4px 20px rgba(240,178,50,0.3);
  }
  .random-btn.ready:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(240,178,50,0.4);
  }
  .random-btn.ready:active {
    transform: translateY(0);
  }
  .random-btn.running {
    background: linear-gradient(135deg, var(--bg-card), var(--bg-surface));
    color: var(--gold);
    border: 1px solid var(--gold);
    cursor: default;
    animation: btn-pulse 0.8s ease infinite;
  }
  @keyframes btn-pulse {
    0%, 100% { box-shadow: 0 0 8px var(--gold-glow); }
    50% { box-shadow: 0 0 24px var(--gold-glow); }
  }

  /* === About Button === */
  .about-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: var(--radius);
    border: 1px solid var(--border-subtle);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .about-btn:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text-secondary);
    background: var(--bg-surface);
  }

  /* === About Modal === */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background: var(--bg-primary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 24px;
    max-width: 400px;
    width: 100%;
    transform: translateY(20px) scale(0.95);
    transition: transform 0.3s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-overlay.show .modal {
    transform: translateY(0) scale(1);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
  }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border-subtle);
    background: transparent;
    color: var(--text-secondary);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover {
    background: var(--bg-card);
    border-color: rgba(255,255,255,0.15);
  }
  .modal-body {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .modal-body .section {
    margin-bottom: 14px;
  }
  .modal-body .section-title {
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
    font-size: 0.9rem;
  }
  .modal-body .version-tag {
    display: inline-block;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.75rem;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .modal-footer {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border-subtle);
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  /* === Particles === */
  .particles {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: float-particle linear infinite;
  }
  @keyframes float-particle {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1); }
  }

  /* === Confetti for result === */
  .confetti-container {
    position: fixed; inset: 0; z-index: 50; pointer-events: none;
    overflow: hidden;
  }
  .confetti {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* === Scrollbar === */
  .hero-grid-wrapper::-webkit-scrollbar { width: 4px; }
  .hero-grid-wrapper::-webkit-scrollbar-track { background: transparent; }
  .hero-grid-wrapper::-webkit-scrollbar-thumb {
    background: var(--bg-card);
    border-radius: 2px;
  }

  /* === Safe area bottom === */
  .safe-bottom { height: env(safe-area-inset-bottom, 12px); }
</style>
</head>
<body>

<div class="bg-atmosphere"></div>
<div class="particles" id="particles"></div>
<div class="confetti-container" id="confetti"></div>

<div class="app-container">
  <!-- Header -->
  <div class="app-header">
    <div class="app-title">王者机选</div>
    <div class="app-subtitle">Hero Random Selector</div>
  </div>

  <!-- Lane Tabs -->
  <div class="lane-tabs" id="laneTabs"></div>

  <!-- Hero Grid -->
  <div class="hero-grid-wrapper">
    <div class="hero-grid" id="heroGrid"></div>
  </div>

  <!-- Result Section -->
  <div class="result-section">
    <div class="result-card">
      <div class="result-label">随机结果</div>
      <div class="result-display">
        <div class="result-avatar" id="resultAvatar">
          <span class="placeholder">?</span>
        </div>
        <div class="result-hero-name empty" id="resultName">点击下方按钮开始</div>
      </div>
      <button class="random-btn ready" id="randomBtn" onclick="startRandom()">开始随机</button>
      <button class="about-btn" onclick="showAbout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        关于王者机选
      </button>
    </div>
  </div>

  <div class="safe-bottom"></div>
</div>

<!-- About Modal -->
<div class="modal-overlay" id="aboutModal" onclick="hideAbout(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">关于王者机选</div>
      <button class="modal-close" onclick="hideAbout(event, true)">&times;</button>
    </div>
    <div class="modal-body">
      <span class="version-tag">v1.0.0</span>
      <div class="section">
        <div class="section-title">软件说明</div>
        <p>本软件基于王者荣耀公开资料进行开发的娱乐工具，用于随机选择英雄，仅供娱乐使用。</p>
      </div>
      <div class="section">
        <div class="section-title">免责声明</div>
        <p>本软件基于AI进行开发，不保证功能完全无误，使用期间出现问题可联系作者或者直接卸载软件。</p>
      </div>
      <div class="section">
        <div class="section-title">联系方式</div>
        <p>195448004@qq.com</p>
      </div>
    </div>
    <div class="modal-footer">
      &copy; 2025 王者机选 版权所有
    </div>
  </div>
</div>

<script>
// === Hero Data ===
const LANES = {
  '对抗': ['东皇太一','亚瑟','亚连','元哥','元流之子','关羽','凯','刘邦','司空震','吕布','哪吒','夏侯惇','夏洛特','大司命','姬小满','嫦娥','孙策','廉颇','影','曜','曹操','李信','杨戬','梦奇','橘右京','海诺','狂铁','猪八戒','白起','盘古','程咬金','老夫子','芈月','花木兰','苏烈','蒙恬','蚩姹','貂蝉','赵怀真','达摩','钟无艳','项羽','马超'],
  '打野': ['云中君','云缨','亚瑟','元流之子','兰陵王','典韦','凯','刘备','司空震','司马懿','哪吒','夏侯惇','大司命','娜可露露','嫦娥','孙悟空','孙策','宫本武藏','影','暃','曜','曹操','李元芳','李白','杨戬','杨玉环','梦奇','橘右京','澜','猪八戒','百里玄策','盘古','芈月','苍','蚩姹','裴擒虎','诸葛亮','赵云','赵怀真','钟无艳','镜','阿古朵','阿柯','雅典娜','露娜','韩信','马超'],
  '中路': ['上官婉儿','不知火舞','元流之子','司马懿','周瑜','墨子','大乔','奕星','女娲','妲己','姜子牙','嫦娥','嬴政','安琪拉','小乔','干将莫邪','张良','扁鹊','杨玉环','武则天','沈梦溪','海月','海诺','王昭君','甄姬','米莱迪','西施','诸葛亮','貂蝉','金蝉','高渐离'],
  '发育': ['伽罗','元流之子','公孙离','后裔','孙尚香','孙权','戈娅','敖隐','李元芳','狄仁杰','百里守约','艾琳','苍','莱西奥','蒙犽','虞姬','阿古朵','马可波罗','鲁班七号','黄忠'],
  '辅助': ['东皇太一','元流之子','刘禅','刘邦','墨子','夏侯惇','多利亚','大乔','大禹','太乙真人','姜子牙','孙膑','少司缘','庄周','廉颇','张良','张飞','明世隐','杨玉环','桑启','牛魔','王昭君','瑶','盾山','空空儿','苏烈','蔡文姬','赵怀真','金蝉','钟馗','项羽','鬼谷子','鲁班大师']
};

const LANE_ICONS = {
  '对抗': '⚔️',
  '打野': '🗡️',
  '中路': '🔮',
  '发育': '🏹',
  '辅助': '🛡️'
};

let currentLane = '对抗';
let isRunning = false;
let highlightTimer = null;

// === Init ===
function init() {
  createParticles();
  renderTabs();
  renderGrid();
}

// === Particles ===
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
}

// === Tabs ===
function renderTabs() {
  const container = document.getElementById('laneTabs');
  container.innerHTML = '';
  Object.keys(LANES).forEach(lane => {
    const tab = document.createElement('div');
    tab.className = 'lane-tab' + (lane === currentLane ? ' active' : '');
    tab.innerHTML = `<span class="tab-name">${LANE_ICONS[lane]} ${lane}</span><span class="tab-count">${LANES[lane].length}人</span>`;
    tab.onclick = () => {
      if (isRunning) return;
      currentLane = lane;
      renderTabs();
      renderGrid();
      resetResult();
    };
    container.appendChild(tab);
  });
}

// === Grid ===
function renderGrid() {
  const container = document.getElementById('heroGrid');
  container.innerHTML = '';
  const heroes = LANES[currentLane];
  heroes.forEach((name, idx) => {
    const card = document.createElement('div');
    card.className = 'hero-card';
    card.id = 'hero-' + idx;
    card.innerHTML = `
      <img src="heroes/${currentLane}/${name}.jpg" onerror="this.src='heroes/${currentLane}/${name}.png'" alt="${name}" loading="lazy">
      <div class="hero-name">${name}</div>
    `;
    container.appendChild(card);
  });
}

// === Reset Result ===
function resetResult() {
  document.getElementById('resultAvatar').innerHTML = '<span class="placeholder">?</span>';
  document.getElementById('resultAvatar').classList.remove('revealed');
  const nameEl = document.getElementById('resultName');
  nameEl.textContent = '点击下方按钮开始';
  nameEl.classList.add('empty');
}

// === Random ===
function startRandom() {
  if (isRunning) return;
  isRunning = true;

  const btn = document.getElementById('randomBtn');
  btn.className = 'random-btn running';
  btn.textContent = '随机中...';

  resetResult();

  const heroes = LANES[currentLane];
  const totalSteps = 15 + Math.floor(Math.random() * 6);
  let step = 0;

  function highlightNext() {
    // Clear all highlights
    document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('highlighted'));

    const randomIdx = Math.floor(Math.random() * heroes.length);
    const card = document.getElementById('hero-' + randomIdx);
    if (card) {
      card.classList.add('highlighted');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    step++;

    if (step < totalSteps) {
      const delay = 80 + step * 25 + Math.random() * 30;
      highlightTimer = setTimeout(highlightNext, delay);
    } else {
      // Final selection
      const finalIdx = Math.floor(Math.random() * heroes.length);
      showResult(heroes[finalIdx], finalIdx);
    }
  }

  highlightNext();
}

function showResult(heroName, idx) {
  // Clear all highlights
  document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('highlighted'));

  // Highlight final card
  const card = document.getElementById('hero-' + idx);
  if (card) {
    card.classList.add('selected');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Show result
  const avatar = document.getElementById('resultAvatar');
  avatar.innerHTML = `<img src="heroes/${currentLane}/${heroName}.jpg" onerror="this.src='heroes/${currentLane}/${heroName}.png'" alt="${heroName}">`;
  avatar.classList.add('revealed');

  const nameEl = document.getElementById('resultName');
  nameEl.textContent = heroName;
  nameEl.classList.remove('empty');

  // Confetti!
  spawnConfetti();

  // Reset button
  const btn = document.getElementById('randomBtn');
  btn.className = 'random-btn ready';
  btn.textContent = '开始随机';
  isRunning = false;
}

// === Confetti ===
function spawnConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#f0b232', '#e8773a', '#e84057', '#4a9eff', '#3dd68c', '#fff'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.width = (4 + Math.random() * 8) + 'px';
    c.style.height = (4 + Math.random() * 8) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// === About Modal ===
function showAbout() {
  document.getElementById('aboutModal').classList.add('show');
}
function hideAbout(e, force) {
  if (force || e.target === document.getElementById('aboutModal')) {
    document.getElementById('aboutModal').classList.remove('show');
  }
}

// === Start ===
init();
</script>
</body>
</html>
