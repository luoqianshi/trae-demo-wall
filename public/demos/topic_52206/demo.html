<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天机盘 - 八卦算命</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold-gradient: linear-gradient(135deg, #fde047 0%, #eab308 50%, #a16207 100%);
      --ink-bg: #0c0a09;
    }

    body {
      font-family: 'ZCOOL XiaoWei', 'KaiTi', 'STKaiti', serif;
      background: radial-gradient(ellipse at center, #1c1917 0%, #0c0a09 70%, #000000 100%);
      min-height: 100vh;
      color: #fef3c7;
      overflow-x: hidden;
    }

    .paper-texture {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .bg-glow-1 {
      position: absolute;
      top: 0;
      left: 25%;
      width: 384px;
      height: 384px;
      background: rgba(245, 158, 11, 0.05);
      border-radius: 50%;
      filter: blur(64px);
      pointer-events: none;
    }

    .bg-glow-2 {
      position: absolute;
      bottom: 0;
      right: 25%;
      width: 384px;
      height: 384px;
      background: rgba(202, 138, 4, 0.05);
      border-radius: 50%;
      filter: blur(64px);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .page {
      display: none;
      width: 100%;
      max-width: 640px;
    }

    .page.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page.fade-in {
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      font-size: 4rem;
      background: linear-gradient(135deg, #fde047 0%, #eab308 50%, #ca8a04 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      font-weight: normal;
    }

    .subtitle-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #d97706;
      margin-bottom: 48px;
    }

    .subtitle-line {
      width: 64px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d97706);
    }

    .subtitle-line:last-child {
      background: linear-gradient(90deg, #d97706, transparent);
    }

    .subtitle-text {
      font-size: 0.875rem;
      letter-spacing: 0.25em;
    }

    .intro-text {
      max-width: 448px;
      margin: 0 auto 48px;
      text-align: center;
    }

    .intro-text p:first-child {
      color: rgba(254, 243, 199, 0.8);
      font-size: 1.125rem;
      line-height: 1.75;
      margin-bottom: 16px;
    }

    .intro-text p:last-child {
      color: rgba(251, 191, 36, 0.6);
      font-size: 0.875rem;
      line-height: 1.75;
    }

    .btn-start {
      position: relative;
      padding: 16px 48px;
      background: linear-gradient(90deg, #92400e, #d97706, #92400e);
      color: #fef3c7;
      font-size: 1.25rem;
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      letter-spacing: 0.2em;
      border: 2px solid rgba(245, 158, 11, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
      clip-path: polygon(10% 0%, 90% 0%, 100% 50%, 90% 100%, 10% 100%, 0% 50%);
    }

    .btn-start:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 40px rgba(245, 158, 11, 0.2);
    }

    .bagua-footer {
      margin-top: 64px;
      color: rgba(180, 83, 9, 0.4);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    h2 {
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      color: linear-gradient(135deg, #fde047 0%, #eab308 50%, #ca8a04 100%);
      font-size: 1.875rem;
      letter-spacing: 0.2em;
      margin-bottom: 32px;
      font-weight: normal;
      background: linear-gradient(135deg, #fde047 0%, #eab308 50%, #ca8a04 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .form-group {
      width: 100%;
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      color: #fcd34d;
      font-size: 0.875rem;
      margin-bottom: 8px;
      letter-spacing: 0.2em;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(28, 25, 23, 0.5);
      border: 1px solid rgba(180, 83, 9, 0.3);
      color: #fef3c7;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      border-color: rgba(234, 179, 8, 0.5);
      box-shadow: 0 0 0 1px rgba(234, 179, 8, 0.3);
    }

    .form-input::placeholder {
      color: rgba(180, 83, 9, 0.5);
    }

    .date-inputs {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .date-inputs input {
      text-align: center;
    }

    .date-inputs .year-input {
      flex: 1;
    }

    .date-inputs .month-input,
    .date-inputs .day-input {
      width: 64px;
    }

    .date-unit {
      color: #d97706;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .category-btn {
      padding: 16px;
      background: rgba(28, 25, 23, 0.3);
      border: 2px solid rgba(180, 83, 9, 0.3);
      color: rgba(251, 191, 36, 0.7);
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      font-size: 1rem;
    }

    .category-btn:hover {
      border-color: rgba(180, 83, 9, 0.5);
      transform: scale(1.02);
    }

    .category-btn.selected {
      border-color: #eab308;
      background: rgba(234, 179, 8, 0.1);
      color: #fde68a;
    }

    .category-icon {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .category-name {
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      font-size: 1.125rem;
    }

    .btn-divine {
      width: 100%;
      padding: 16px;
      margin-top: 32px;
      background: linear-gradient(90deg, #92400e, #d97706, #92400e);
      color: #fef3c7;
      font-size: 1.25rem;
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      letter-spacing: 0.3em;
      border: 2px solid rgba(245, 158, 11, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-divine:hover:not(:disabled) {
      box-shadow: 0 10px 40px rgba(245, 158, 11, 0.2);
      transform: scale(1.02);
    }

    .btn-divine:disabled {
      background: rgba(28, 25, 23, 0.5);
      color: rgba(180, 83, 9, 0.5);
      border-color: rgba(120, 53, 15, 0.3);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .back-btn {
      margin-top: 24px;
      color: rgba(180, 83, 9, 0.6);
      font-size: 0.875rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.3s ease;
    }

    .back-btn:hover {
      color: #f59e0b;
    }

    .compass-container {
      position: relative;
      width: 360px;
      height: 360px;
      margin: 32px 0;
    }

    @media (min-width: 768px) {
      .compass-container {
        width: 420px;
        height: 420px;
      }
    }

    .compass-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(120, 53, 15, 0.2), rgba(146, 64, 14, 0.2));
      filter: blur(30px);
      animation: pulse-ring 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { opacity: 0.8; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .compass-svg {
      position: relative;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(234, 179, 8, 0.3));
    }

    .compass-pointer {
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 22px solid #dc2626;
      filter: drop-shadow(0 0 8px rgba(220, 38, 38, 0.7));
    }

    .result-card {
      width: 100%;
      background: rgba(28, 25, 23, 0.6);
      border: 1px solid rgba(180, 83, 9, 0.3);
      padding: 24px;
      position: relative;
      margin-top: 32px;
    }

    @media (min-width: 768px) {
      .result-card {
        padding: 32px;
      }
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 24px;
      height: 24px;
      border-top: 2px solid rgba(245, 158, 11, 0.5);
      border-left: 2px solid rgba(245, 158, 11, 0.5);
    }

    .result-card::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 24px;
      height: 24px;
      border-top: 2px solid rgba(245, 158, 11, 0.5);
      border-right: 2px solid rgba(245, 158, 11, 0.5);
    }

    .result-card-inner::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 24px;
      height: 24px;
      border-bottom: 2px solid rgba(245, 158, 11, 0.5);
      border-left: 2px solid rgba(245, 158, 11, 0.5);
    }

    .result-card-inner::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 24px;
      height: 24px;
      border-bottom: 2px solid rgba(245, 158, 11, 0.5);
      border-right: 2px solid rgba(245, 158, 11, 0.5);
    }

    .result-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .gua-element {
      display: inline-block;
      padding: 8px 24px;
      border: 1px solid rgba(180, 83, 9, 0.3);
      background: rgba(28, 25, 23, 0.5);
      margin-bottom: 16px;
    }

    .gua-element span {
      color: #fbbf24;
      font-size: 0.875rem;
      letter-spacing: 0.2em;
    }

    .gua-name {
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      font-size: 2.25rem;
      background: linear-gradient(135deg, #fde047 0%, #eab308 50%, #ca8a04 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 16px;
    }

    .gua-category {
      color: rgba(251, 191, 36, 0.7);
      margin-top: 8px;
      font-size: 0.875rem;
    }

    .section-title {
      color: #fbbf24;
      font-size: 0.875rem;
      letter-spacing: 0.3em;
      text-align: center;
      margin-bottom: 12px;
    }

    .poem-container {
      text-align: center;
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      font-size: 1.25rem;
      color: #fef3c7;
      line-height: 2;
      letter-spacing: 0.15em;
      margin-bottom: 24px;
      min-height: 8rem;
    }

    @media (min-width: 768px) {
      .poem-container {
        font-size: 1.5rem;
      }
    }

    .explanation-text {
      font-size: 0.95rem;
      line-height: 1.75;
      color: rgba(254, 243, 199, 0.8);
      min-height: 8rem;
      text-align: justify;
    }

    @media (min-width: 768px) {
      .explanation-text {
        font-size: 1.05rem;
      }
    }

    .divider-section {
      border-top: 1px solid rgba(180, 83, 9, 0.2);
      padding-top: 24px;
      margin-top: 24px;
    }

    .brush-char {
      opacity: 0;
      transform: translateY(10px) scale(0.7);
      display: inline-block;
      animation: brushIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      text-shadow: 0 0 1px rgba(254, 243, 199, 0.1);
    }

    .brush-char.br {
      display: block;
      content: '';
      height: 0.4em;
    }

    @keyframes brushIn {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.7);
        filter: blur(2px);
      }
      55% {
        opacity: 1;
        transform: translateY(-3px) scale(1.08);
        filter: blur(0);
      }
      75% {
        transform: translateY(1px) scale(0.97);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .result-actions {
      display: flex;
      gap: 16px;
      margin-top: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-secondary {
      padding: 12px 24px;
      border: 2px solid rgba(180, 83, 9, 0.5);
      color: #fcd34d;
      background: transparent;
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      font-size: 1rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(180, 83, 9, 0.1);
      transform: scale(1.05);
    }

    .btn-primary {
      padding: 12px 24px;
      background: linear-gradient(90deg, #92400e, #d97706, #92400e);
      border: 2px solid rgba(245, 158, 11, 0.5);
      color: #fef3c7;
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      font-size: 1rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      box-shadow: 0 10px 40px rgba(245, 158, 11, 0.2);
      transform: scale(1.05);
    }

    .mute-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(28, 25, 23, 0.8);
      border: 1px solid rgba(180, 83, 9, 0.3);
      color: #fbbf24;
      cursor: pointer;
      font-size: 1.2rem;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .mute-btn:hover {
      border-color: rgba(234, 179, 8, 0.5);
      color: #eab308;
    }

    .footer-text {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(180, 83, 9, 0.3);
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .compass-ring {
      transform-origin: 150px 150px;
    }
  </style>
</head>
<body>
  <div class="paper-texture"></div>
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>

  <div class="container">
    <!-- 第一页：首页 -->
    <div class="page active fade-in" id="page1">
      <div style="text-align: center;">
        <h1>天机盘</h1>
        <div class="subtitle-row">
          <div class="subtitle-line"></div>
          <span class="subtitle-text">TIAN JI PAN</span>
          <div class="subtitle-line"></div>
        </div>
      </div>

      <div class="intro-text">
        <p>冥冥之中，自有定数</p>
        <p>天機不可泄露，緣到自有分曉<br>虔心問卜，卦不欺人</p>
      </div>

      <button class="btn-start" onclick="goToPage(2)">開 始 問 卜</button>

      <div class="bagua-footer">
        ☯ 乾坎艮震 巽離坤兌 ☯
      </div>
    </div>

    <!-- 第二页：填写信息 -->
    <div class="page" id="page2">
      <h2>填寫資訊</h2>

      <div style="width: 100%; max-width: 480px;">
        <div class="form-group">
          <label class="form-label">尊姓大名</label>
          <input type="text" class="form-input" id="nameInput" placeholder="請輸入您的姓名">
        </div>

        <div class="form-group">
          <label class="form-label">生辰八字</label>
          <div class="date-inputs">
            <input type="text" class="form-input year-input" id="yearInput" placeholder="年" maxlength="4" inputmode="numeric">
            <span class="date-unit">年</span>
            <input type="text" class="form-input month-input" id="monthInput" placeholder="月" maxlength="2" inputmode="numeric">
            <span class="date-unit">月</span>
            <input type="text" class="form-input day-input" id="dayInput" placeholder="日" maxlength="2" inputmode="numeric">
            <span class="date-unit">日</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">所問何事</label>
          <div class="category-grid" id="categoryGrid">
            <button class="category-btn" data-id="career" onclick="selectCategory(this)">
              <div class="category-icon">⚔️</div>
              <div class="category-name">前程</div>
            </button>
            <button class="category-btn" data-id="love" onclick="selectCategory(this)">
              <div class="category-icon">💕</div>
              <div class="category-name">姻缘</div>
            </button>
            <button class="category-btn" data-id="wealth" onclick="selectCategory(this)">
              <div class="category-icon">💰</div>
              <div class="category-name">财运</div>
            </button>
            <button class="category-btn" data-id="misfortune" onclick="selectCategory(this)">
              <div class="category-icon">🌀</div>
              <div class="category-name">劫难</div>
            </button>
          </div>
        </div>

        <button class="btn-divine" id="divineBtn" onclick="startDivination()" disabled>起 卦</button>

        <button class="back-btn" onclick="goToPage(1)">← 返回</button>
      </div>
    </div>

    <!-- 第三页：结果 -->
    <div class="page" id="page3">
      <div class="compass-container">
        <div class="compass-glow"></div>
        <div class="compass-pointer"></div>
        <svg class="compass-svg" viewBox="0 0 300 300" id="compassSvg">
          <defs>
            <radialGradient id="innerBg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#1c1917" />
              <stop offset="100%" stop-color="#0c0a09" />
            </radialGradient>
          </defs>

          <!-- 最外圈 - 八卦 -->
          <circle cx="150" cy="150" r="145" fill="url(#innerBg)" stroke="#b45309" stroke-width="2" />
          <circle cx="150" cy="150" r="138" fill="none" stroke="#78350f" stroke-width="1" />

          <g id="trigramRing" class="compass-ring">
            <text x="150" y="28" text-anchor="middle" fill="#fbbf24" font-size="18" style="font-family: 'Ma Shan Zheng', serif;">☰ 乾</text>
            <g transform="rotate(45 150 150)"><text x="150" y="28" text-anchor="middle" fill="#fbbf24" font-size="18" style="font-family: 'Ma Shan Zheng', serif;">☱ 兑</text></g>
            <g transform="rotate(90 150 150)"><text x="150" y="28" text-anchor="middle" fill="#fbbf24" font-size="18" style="font-family: 'Ma Shan Zheng', serif;">☲ 离</text></g>
            <g transform="rotate(135 150 150)"><text x="150" y="28" text-anchor="middle" fill="#fbbf24" font-size="18" style="font-family: 'Ma Shan Zheng', serif;">☳ 震</text></g>
            <g transform="rotate(180 150 150)"><text x="150" y="28" text-anchor="middle" fill="#fbbf24" font-size="18" style="font-family: 'Ma Shan Zheng', serif;">☴ 巽</text></g>
            <g transform="rotate(225 150 150)"><text x="150" y="28" text-anchor="middle" fill="#fbbf24" font-size="18" style="font-family: 'Ma Shan Zheng', serif;">☵ 坎</text></g>
            <g transform="rotate(270 150 150)"><text x="150" y="28" text-anchor="middle" fill="#fbbf24" font-size="18" style="font-family: 'Ma Shan Zheng', serif;">☶ 艮</text></g>
            <g transform="rotate(315 150 150)"><text x="150" y="28" text-anchor="middle" fill="#fbbf24" font-size="18" style="font-family: 'Ma Shan Zheng', serif;">☷ 坤</text></g>
          </g>

          <!-- 分隔圈 -->
          <circle cx="150" cy="150" r="115" fill="none" stroke="#92400e" stroke-width="1" />
          <circle cx="150" cy="150" r="110" fill="none" stroke="#78350f" stroke-width="1" />

          <!-- 地支圈 -->
          <g id="earthlyRing" class="compass-ring">
            <text x="150" y="55" text-anchor="middle" fill="#fb923c" font-size="16" style="font-family: 'KaiTi', serif;">子</text>
            <g transform="rotate(30 150 150)"><text x="150" y="55" text-anchor="middle" fill="#fb923c" font-size="16" style="font-family: 'KaiTi', serif;">丑</text></g>
            <g transform="rotate(60 150 150)"><text x="150" y="55" text-anchor="middle" fill="#fb923c" font-size="16" style="font-family: 'KaiTi', serif;">寅</text></g>
            <g transform="rotate(90 150 150)"><text x="150" y="55" text-anchor="middle" fill="#fb923c" font-size="16" style="font-family: 'KaiTi', serif;">卯</text></g>

        },
        wealth: {
          poem: '山中自有黄金屋，脚踏实地财源广。\n不贪不躁不冒险，稳稳当当福禄长。',
          interpretation: '艮为山，主财运稳定。阁下求财不喜冒险，适合做实业、地产等稳定投资，虽不快但稳。山积土成高，财富也是慢慢积累的。不要羡慕别人一夜暴富，脚踏实地赚来的钱，花着才安心。'
        },
        misfortune: {
          poem: '山重水复疑无路，进退两难困其中。\n忍一时风平浪静，退一步海阔天空。',
          interpretation: '艮为止，主停滞不前。阁下当前遇到瓶颈，进退维谷，不知如何是好。此劫源于一个"执"字。太执着于目标，反而看不清方向。有时候，停下来休息一下，或者退一步，反而能找到新的出路。'
        }
      },
      '坤卦': {
        career: {
          poem: '地势坤厚载万物，厚德载物是根基。\n海纳百川有容大，能屈能伸大丈夫。',
          interpretation: '坤为地，主厚德载物。阁下心地善良，待人宽厚，人缘极好。地势坤，君子以厚德载物。在职场官场，人脉就是最大的财富。阁下广结善缘，贵人运旺，遇事总有贵人相助，事业必能顺风顺水。'
        },
        love: {
          poem: '大地回春万物生，母仪天下福泽深。\n举案齐眉相敬宾，家和才能万事兴。',
          interpretation: '坤为地，主柔顺包容。阁下对待感情专一，懂得包容体谅，是难得的好伴侣。坤为母，主家庭和睦。若已成家，必能家庭美满，幸福安康。若未婚，命中之人必是稳重可靠之辈，值得托付终身。'
        },
        wealth: {
          poem: '土生金来金满堂，财源滚滚细水长。\n勤俭持家是美德，积少成多富贵长。',
          interpretation: '坤为地，土生金，主财运绵长。阁下命格带土生金，一生不缺钱财，且越积越多。所谓勤是摇钱树，俭是聚宝盆。阁下既会赚钱又会存钱，日子越过越红火。但也不要太吝啬，该花的钱还是要花。'
        },
        misfortune: {
          poem: '地动山摇根基摇，家事不宁心难安。\n家和才能万事兴，退一步海阔天空。',
          interpretation: '坤为地，主家庭根基。阁下近期恐有家庭变故，或是家人身体欠安，或是家庭不和。此劫源于家庭。家和万事兴，家不和万事衰。多陪陪家人，多沟通多包容，没有过不去的坎。一家人平平安安，比什么都重要。'
        }
      }
    }

    let currentPage = 1
    let selectedCategory = null
    let isMuted = false
    let audioCtx = null
    let currentTrigram = null

    function goToPage(n) {
      const pages = document.querySelectorAll('.page')
      pages.forEach(p => {
        p.classList.remove('active')
        p.classList.remove('fade-in')
      })
      const targetPage = document.getElementById('page' + n)
      targetPage.classList.add('active')
      setTimeout(() => targetPage.classList.add('fade-in'), 10)
      currentPage = n
      playClick()
    }

    function selectCategory(btn) {
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'))
      btn.classList.add('selected')
      selectedCategory = btn.dataset.id
      checkDivineBtn()
      playClick()
    }

    function checkDivineBtn() {
      const name = document.getElementById('nameInput').value
      const year = document.getElementById('yearInput').value
      const month = document.getElementById('monthInput').value
      const day = document.getElementById('dayInput').value
      const btn = document.getElementById('divineBtn')
      btn.disabled = !(name && year && month && day && selectedCategory)
    }

    document.getElementById('nameInput').addEventListener('input', checkDivineBtn)

    document.getElementById('yearInput').addEventListener('input', function(e) {
      const val = e.target.value.replace(/\D/g, '')
      e.target.value = val
      checkDivineBtn()
      if (val.length === 4) {
        document.getElementById('monthInput').focus()
      }
    })

    document.getElementById('monthInput').addEventListener('input', function(e) {
      const val = e.target.value.replace(/\D/g, '')
      if (val.length <= 2) {
        const num = parseInt(val, 10)
        if (val === '' || (num >= 1 && num <= 12)) {
          e.target.value = val
          checkDivineBtn()
          if (val.length >= 1) {
            document.getElementById('dayInput').focus()
          }
        }
      }
    })

    document.getElementById('dayInput').addEventListener('input', function(e) {
      const val = e.target.value.replace(/\D/g, '')
      if (val.length <= 2) {
        const num = parseInt(val, 10)
        if (val === '' || (num >= 1 && num <= 31)) {
          e.target.value = val
          checkDivineBtn()
        }
      }
    })

    document.getElementById('yearInput').addEventListener('focus', function() { this.value = '' })
    document.getElementById('monthInput').addEventListener('focus', function() { this.value = '' })
    document.getElementById('dayInput').addEventListener('focus', function() { this.value = '' })

    function calculateTrigram(name, year, month, day) {
      let hash = 0
      for (let i = 0; i < name.length; i++) {
        hash += name.charCodeAt(i)
      }
      hash += parseInt(year, 10) + parseInt(month, 10) + parseInt(day, 10)
      hash = (hash * 31 + 7) % 1000
      return hash % 8
    }

    function startDivination() {
      const name = document.getElementById('nameInput').value
      const year = document.getElementById('yearInput').value
      const month = document.getElementById('monthInput').value
      const day = document.getElementById('dayInput').value

      // 根据姓名和生辰计算哈希值，决定最终指针指向的卦象
      let hash = 0
      for (let i = 0; i < name.length; i++) {
        hash += name.charCodeAt(i)
      }
      hash += parseInt(year, 10) + parseInt(month, 10) + parseInt(day, 10)
      hash = (hash * 31 + 7) % 1000
      const targetTrigramIndex = hash % 8
      
      // 让目标卦象转到指针位置（指针在顶部0度位置）
      const targetAngle = targetTrigramIndex * 45
      const extraRotations = 5

      goToPage(3)
      playCompassSpin()

      document.getElementById('resultCard').style.display = 'none'
      document.getElementById('resultActions').style.display = 'none'
      document.getElementById('interpretationSection').style.display = 'none'
      document.getElementById('poemText').innerHTML = ''
      document.getElementById('explanationText').innerHTML = ''

      // 计算每个圈的目标角度，让它们都旋转多圈后定格
      // 八卦圈：转5圈 + 目标角度
      const trigramTarget = extraRotations * 360 + targetAngle

      // 地支圈：转15圈，让某个地支转到指针位置（45*4=30*6=180，便于同步）
      const dizhiRotations = 15
      const pointerDizhiAngle = (360 - targetAngle % 360) % 360
      const pointerDizhiIndex = Math.round(pointerDizhiAngle / 30) % 12
      const earthTarget = dizhiRotations * 360 - pointerDizhiIndex * 30

      // 天干圈：转18圈，让某个天干转到指针位置（45*4=36*5=180，便于同步）
      const tianganRotations = 18
      const pointerTianganAngle = (360 - targetAngle % 360) % 360
      const pointerTianganIndex = Math.round(pointerTianganAngle / 36) % 10
      const heavenlyTarget = tianganRotations * 360 - pointerTianganIndex * 36

      // 方位圈：转12圈，让某个方位转到指针位置
      const directionRotations = 12
      const directionTarget = directionRotations * 360 + targetAngle

      const trigramRing = document.getElementById('trigramRing')
      const earthlyRing = document.getElementById('earthlyRing')
      const heavenlyRing = document.getElementById('heavenlyRing')
      const directionRing = document.getElementById('directionRing')

      let startTime = null
      const duration = 5000

      function animate(timestamp) {
        if (!startTime) startTime = timestamp
        const elapsed = timestamp - startTime
        const progress = Math.min(elapsed / duration, 1)

        const easeOut = 1 - Math.pow(1 - progress, 3)

        const trigramAngle = trigramTarget * easeOut
        const earthlyAngle = -earthTarget * easeOut
        const heavenlyAngle = heavenlyTarget * easeOut
        const directionAngle = -directionTarget * easeOut

        trigramRing.style.transform = `rotate(${trigramAngle}deg)`
        earthlyRing.style.transform = `rotate(${earthlyAngle}deg)`
        heavenlyRing.style.transform = `rotate(${heavenlyAngle}deg)`
        directionRing.style.transform = `rotate(${directionAngle}deg)`

        if (progress < 1) {
          requestAnimationFrame(animate)
        } else {
          playDing()
          // 旋转结束后，根据指针指向的方位确定卦象
          const finalAngle = trigramTarget % 360
          const pointerAngle = (360 - finalAngle) % 360
          const finalTrigramIndex = Math.round(pointerAngle / 45) % 8
          const finalTrigram = TRIGRAMS[finalTrigramIndex]
          currentTrigram = finalTrigram
          setTimeout(() => showResult(finalTrigram), 500)
        }
      }

      requestAnimationFrame(animate)
    }

    function showResult(trigram) {
      const resultCard = document.getElementById('resultCard')
      const texts = divinationTexts[trigram.name][selectedCategory]

      document.getElementById('guaName').textContent = `${trigram.symbol} ${trigram.name}`
      document.getElementById('guaMeta').textContent = `${trigram.element} · ${trigram.direction}方`
      document.getElementById('guaCategory').textContent = `問${CATEGORIES[selectedCategory].name}`

      resultCard.style.display = 'block'

      typeText('poemText', texts.poem, 150, () => {
        setTimeout(() => {
          document.getElementById('interpretationSection').style.display = 'block'
          typeText('explanationText', texts.interpretation, 50, () => {
            document.getElementById('resultActions').style.display = 'flex'
          })
        }, 500)
      })
    }

    function typeText(elementId, text, speed, callback) {
      const element = document.getElementById(elementId)
      let html = ''
      let delay = 0

      for (let i = 0; i < text.length; i++) {
        const char = text[i]
        if (char === '\n') {
          html += '<span class="brush-char br" style="animation-delay: ' + delay + 'ms;"></span>'
        } else {
          html += '<span class="brush-char" style="animation-delay: ' + delay + 'ms;">' + char + '</span>'
          delay += speed
        }
      }

      element.innerHTML = html

      const totalTime = delay + 600
      if (callback) {
        setTimeout(callback, totalTime)
      }

      if (!isMuted && audioCtx) {
        const brushInterval = setInterval(() => {
          playBrushWrite()
        }, speed)
        setTimeout(() => clearInterval(brushInterval), delay)
      }
    }

    function reDivine() {
      playClick()
      selectedCategory = null
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'))
      document.getElementById('divineBtn').disabled = true

      document.getElementById('trigramRing').style.transform = 'rotate(0deg)'
      document.getElementById('earthlyRing').style.transform = 'rotate(0deg)'
      document.getElementById('heavenlyRing').style.transform = 'rotate(0deg)'
      document.getElementById('directionRing').style.transform = 'rotate(0deg)'

      goToPage(2)
    }

    function restart() {
      playClick()
      document.getElementById('nameInput').value = ''
      document.getElementById('yearInput').value = ''
      document.getElementById('monthInput').value = ''
      document.getElementById('dayInput').value = ''
      selectedCategory = null
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'))
      document.getElementById('divineBtn').disabled = true

      document.getElementById('trigramRing').style.transform = 'rotate(0deg)'
      document.getElementById('earthlyRing').style.transform = 'rotate(0deg)'
      document.getElementById('heavenlyRing').style.transform = 'rotate(0deg)'
      document.getElementById('directionRing').style.transform = 'rotate(0deg)'

      goToPage(1)
    }

    function initAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)()
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume()
      }
    }

    function playClick() {
      if (isMuted) return
      initAudioContext()
      const osc = audioCtx.createOscillator()
      const gain = audioCtx.createGain()
      osc.frequency.value = 800
      osc.type = 'sine'
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime)
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1)
      osc.connect(gain)
      gain.connect(audioCtx.destination)
      osc.start()
      osc.stop(audioCtx.currentTime + 0.1)
    }

    function playCompassSpin() {
      if (isMuted) return
      initAudioContext()
      const osc = audioCtx.createOscillator()
      const gain = audioCtx.createGain()
      osc.frequency.value = 100
      osc.type = 'sawtooth'
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime)
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 5)
      osc.connect(gain)
      gain.connect(audioCtx.destination)
      osc.start()
      osc.stop(audioCtx.currentTime + 5)
    }

    function playDing() {
      if (isMuted) return
      initAudioContext()
      const freqs = [523, 659, 784]
      freqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator()
        const gain = audioCtx.createGain()
        osc.frequency.value = freq
        osc.type = 'sine'
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.05)
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5 + i * 0.05)
        osc.connect(gain)
        gain.connect(audioCtx.destination)
        osc.start(audioCtx.currentTime + i * 0.05)
        osc.stop(audioCtx.currentTime + 1.5 + i * 0.05)
      })
    }

    function playBrushWrite() {
      if (isMuted || !audioCtx) return
      const bufferSize = audioCtx.sampleRate * 0.05
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate)
      const data = buffer.getChannelData(0)
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3))
      }
      const source = audioCtx.createBufferSource()
      const filter = audioCtx.createBiquadFilter()
      const gain = audioCtx.createGain()
      filter.type = 'highpass'
      filter.frequency.value = 2000
      gain.gain.value = 0.02
      source.buffer = buffer
      source.connect(filter)
      filter.connect(gain)
      gain.connect(audioCtx.destination)
      source.start()
    }

    function toggleMute() {
      isMuted = !isMuted
      document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊'
    }

    document.addEventListener('click', function initAudioOnFirstClick() {
      initAudioContext()
      document.removeEventListener('click', initAudioOnFirstClick)
    }, { once: true })
  </script>
