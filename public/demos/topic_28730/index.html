        }

            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        }

        header p {

            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 16px;
            color: #667eea;
        }

            font-size: 1.2rem;

        }

        .upload-area p {
            color: #666;
            font-size: 0.9rem;
        }

            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .quick-btn {
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fafafa;

            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.85rem;
            color: #555;

        .quick-btn:hover {
            border-color: #667eea;
            background: #f0f2ff;
            color: #667eea;
        }

            background: #f9f9f9;
            border-radius: 8px;
            padding: 16px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap;
        }

            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

            opacity: 0.6;
            cursor: not-allowed;
            transform: none;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #667eea;
            padding: 20px;
        }

            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .risk-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .risk-item {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
        }

        .risk-item.high {
            background: #fff0f0;
            border: 1px solid #ffcccc;
        }

        .risk-item.medium {
            background: #fffbf0;
            border: 1px solid #ffe5cc;
        }

        .risk-item.low {
            background: #f0fff4;
            border: 1px solid #ccffd9;
        }

            font-size: 0.85rem;
            color: #666;
        }

        .risk-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .risk-card {
            border-left: 4px solid;
            background: #fafafa;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 0 8px 8px 0;
            transition: all 0.3s ease;

        .risk-card.high { border-color: #d32f2f; }
        .risk-card.medium { border-color: #f57c00; }
        .risk-card.low { border-color: #388e3c; }

            align-items: center;
            margin-bottom: 10px;

        .risk-tag.high { background: #d32f2f; }

        .risk-tag.low { background: #388e3c; }

        .risk-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
        }

        .risk-content {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 12px;
            padding: 8px;
            background: white;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .risk-explanation {
            background: #fff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 3px solid #667eea;
        }

        .risk-explanation h4 {
            font-size: 0.85rem;
            color: #667eea;
            margin-bottom: 6px;
        }

        .risk-explanation p {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.5;
        }

        .risk-suggestion {
            background: #f0f9ff;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #0288d1;
        }

        .risk-suggestion h4 {
            font-size: 0.85rem;
            color: #0288d1;
            margin-bottom: 6px;
        }

        .risk-suggestion p {
            font-size: 0.85rem;
            color: #555;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;

        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8rem;
            }

            .risk-summary {
                grid-template-columns: 1fr;
            }
        }

                    level: 'medium',
                    title: '上牌服务费偏高',
                    content: '上牌服务费：人民币3000元整',
                    explanation: '自行上牌的费用通常在几百元左右，3000元的上牌服务费明显偏高，属于不合理收费。',
                    suggestion: '建议协商降低服务费，或选择自行办理上牌手续。'
                },
                {
                    level: 'low',
                    title: '质量异议期过短',
                    content: '如车辆存在质量问题，乙方需在发现问题后7日内书面通知甲方，否则视为认可车辆质量。',
                    explanation: '7日的异议期对于车辆质量检查来说可能不够充分，一些隐性问题可能在使用一段时间后才显现。',
                    suggestion: '建议延长至15日，并明确质量问题的范围和处理方式。'
                }
            ],
            service: [
                {
                    level: 'high',
                    title: '付款后概不退还',
                    content: '付款后概不退还任何费用。',
                    explanation: '此条款属于霸王条款，排除了消费者的主要权利。根据《消费者权益保护法》，消费者在一定条件下有权要求退费，不能一概而论地"概不退还"。',
                    suggestion: '建议修改为："乙方在开课前提出退费的，甲方扣除10%手续费后退还剩余费用；开课后根据已上课比例计算退费。"'
                },
                {
                    level: 'high',
                    title: '最终解释权条款无效',
                    content: '本合同最终解释权归甲方所有。',
                    explanation: '这是典型的霸王条款。根据《民法典》规定，格式条款的提供者不得排除对方的主要权利。',
                    suggestion: '建议删除此条款。'
                },
                {
                    level: 'high',
                    title: '知识产权约定不合理',
                    content: '乙方在学习期间创作的作品，知识产权归甲方所有。',
                    explanation: '学员在学习期间创作的作品，知识产权应归学员所有。此条款不合理地剥夺了学员的知识产权，违反了公平原则。',
                    suggestion: '建议修改为："乙方在学习期间创作的作品，知识产权归乙方所有；甲方有权在教学过程中使用这些作品作为教学案例。"'
                },
                {
                    level: 'medium',
                    title: '退费条件苛刻',
                    content: '开课7天后不予退费。',
                    explanation: '7天后不予退费的规定过于苛刻。如果甲方未能提供约定的教学服务，或因不可抗力导致课程无法继续，学员应有权要求退费。',
                    suggestion: '建议修改为："开课7天后，根据已上课比例和剩余课时计算退费金额。"'
                },
                {
                    level: 'medium',
                    title: '课程调整无需通知',
                    content: '甲方有权根据教学需要调整课程安排，无需提前通知乙方。',
                    explanation: '甲方随意调整课程安排而不通知学员，可能影响学员的学习计划和效果。',
                    suggestion: '建议修改为："甲方如需调整课程安排，应提前3日通知乙方，并与乙方协商一致。"'
                },
                {
                    level: 'low',
                    title: '缺课取消资格过于严格',
                    content: '乙方缺课超过5课时的，甲方有权取消其学习资格，已付费用不予退还。',
                    explanation: '5课时约占总课时的4%，因少量缺课就取消学习资格并不退还费用，处罚过重。',
                    suggestion: '建议修改为："乙方缺课超过总课时10%的，甲方有权要求乙方补齐课时或延长学习期限。"'
                }
            ]
        };

        let currentContract = '';
        let currentAnalysis = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const contractDisplay = document.getElementById('contractDisplay');
        const scanBtn = document.getElementById('scanBtn');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('resultArea');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if (file.type.startsWith('image/')) {
                    contractDisplay.textContent = '图片已上传，系统正在识别文字...';
                    setTimeout(() => {
                        currentContract = sampleContracts.rent;
                        contractDisplay.textContent = currentContract;
                        scanBtn.disabled = false;
                    }, 1500);
                } else {
                    currentContract = e.target.result;
                    contractDisplay.textContent = currentContract;
                    scanBtn.disabled = false;
                }
            };
            
            if (file.type.startsWith('image/')) {
                reader.readAsDataURL(file);
            } else {
                reader.readAsText(file);
            }
        }

        function loadSample(type) {
            currentContract = sampleContracts[type];
            contractDisplay.textContent = currentContract;
            scanBtn.disabled = false;
            resultArea.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <p>示例合同已加载<br>点击"AI智能扫描"开始审查</p>
                </div>
            `;
        }

        function startScan() {
            if (!currentContract) return;

            scanBtn.disabled = true;
            loading.style.display = 'flex';
            resultArea.innerHTML = '';

            setTimeout(() => {
                loading.style.display = 'none';
                displayResults();
            }, 2500);
        }

        function displayResults() {
            const type = getContractType();
            currentAnalysis = riskAnalysis[type] || riskAnalysis.rent;

            const highCount = currentAnalysis.filter(r => r.level === 'high').length;
            const mediumCount = currentAnalysis.filter(r => r.level === 'medium').length;
            const lowCount = currentAnalysis.filter(r => r.level === 'low').length;

            let html = `
                <div class="risk-summary">
                    <div class="risk-item high">
                        <div class="count">${highCount}</div>
                        <div class="label">高风险</div>
                    </div>
                    <div class="risk-item medium">
                        <div class="count">${mediumCount}</div>
                        <div class="label">中风险</div>
                    </div>
                    <div class="risk-item low">
                        <div class="count">${lowCount}</div>
                        <div class="label">低风险</div>
                    </div>
                </div>
                <div class="risk-list">
            `;

            currentAnalysis.forEach((risk, index) => {
                html += `
                    <div class="risk-card ${risk.level}">
                        <div class="risk-header">
                            <span class="risk-title">${index + 1}. ${risk.title}</span>
                            <span class="risk-tag ${risk.level}">${getLevelLabel(risk.level)}</span>
                        </div>
                        <div class="risk-content">${risk.content}</div>
                        <div class="risk-explanation">
                            <h4>💡 通俗解释</h4>
                            <p>${risk.explanation}</p>
                        </div>
                        <div class="risk-suggestion">
                            <h4>✏️ 修改建议</h4>
                            <p>${risk.suggestion}</p>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            resultArea.innerHTML = html;
        }

        function getContractType() {
            if (currentContract.includes('房屋租赁')) return 'rent';
            if (currentContract.includes('购车') || currentContract.includes('车辆')) return 'car';
            if (currentContract.includes('教育') || currentContract.includes('培训') || currentContract.includes('服务协议')) return 'service';
            return 'rent';
        }

        function getLevelLabel(level) {
            switch (level) {
                case 'high': return '高风险';
                case 'medium': return '中风险';
                case 'low': return '低风险';
                default: return '未知';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loadSample('rent');
                setTimeout(() => {
                    startScan();
                }, 500);
            }, 500);
        });
    </script>
</body>
</html>
