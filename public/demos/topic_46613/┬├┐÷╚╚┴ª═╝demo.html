            </div>

                    • 点击地图上的热力点查看详情<br>
                    • 橙色越深代表人流越密集
                </div>
            </div>

            <div id="spotList"></div>
        </div>
    </div>

            { name: "中国航空博物馆", city: "北京", province: "北京", lat: 40.1925, lng: 116.2486, level: 3, desc: "航空装备与历史", tags: ["博物馆", "科技"], people: 4000, capacity: 10000, openTime: "09:00", closeTime: "17:00" },
            { name: "北京天文馆", city: "北京", province: "北京", lat: 39.9325, lng: 116.3286, level: 3, desc: "天文科普教育", tags: ["博物馆", "科技"], people: 3000, capacity: 8000, openTime: "09:00", closeTime: "16:30" },
            { name: "上海科技馆", city: "上海", province: "上海", lat: 31.2197, lng: 121.5381, level: 4, desc: "大型科普教育基地", tags: ["博物馆", "科技"], people: 15000, capacity: 30000, openTime: "09:00", closeTime: "17:00" },
            { name: "上海自然博物馆", city: "上海", province: "上海", lat: 31.2319, lng: 121.4528, level: 4, desc: "自然科学与生物", tags: ["博物馆", "自然"], people: 12000, capacity: 20000, openTime: "09:00", closeTime: "17:15" },
            { name: "广东科学中心", city: "广州", province: "广东", lat: 23.0242, lng: 113.3386, level: 3, desc: "华南最大科普中心", tags: ["博物馆", "科技"], people: 8000, capacity: 15000, openTime: "09:30", closeTime: "16:30" },
            { name: "香港故宫文化博物馆", city: "香港", province: "香港", lat: 22.3033, lng: 114.1672, level: 4, desc: "故宫文物赴港展示", tags: ["博物馆", "文化"], people: 5000, capacity: 10000, openTime: "10:00", closeTime: "18:00" },
            { name: "台北故宫博物院", city: "台北", province: "台湾", lat: 25.1028, lng: 121.5486, level: 5, desc: "中华国宝收藏地", tags: ["博物馆", "历史"], people: 12000, capacity: 20000, openTime: "09:00", closeTime: "17:00" },
        ];
        spots.push(...museumsAndMemorials);

        // 省份中文名 → DataV adcode 映射（同时支持"北京"和"北京市"）
        const provinceAdcodeMap = {
            '北京': '110000', '北京市': '110000',
            '天津': '120000', '天津市': '120000',
            '河北': '130000', '河北省': '130000',
            '山西': '140000', '山西省': '140000',
            '内蒙古': '150000', '内蒙古自治区': '150000',
            '辽宁': '210000', '辽宁省': '210000',
            '吉林': '220000', '吉林省': '220000',
            '黑龙江': '230000', '黑龙江省': '230000',
            '上海': '310000', '上海市': '310000',
            '江苏': '320000', '江苏省': '320000',
            '浙江': '330000', '浙江省': '330000',
            '安徽': '340000', '安徽省': '340000',
            '福建': '350000', '福建省': '350000',
            '江西': '360000', '江西省': '360000',
            '山东': '370000', '山东省': '370000',
            '河南': '410000', '河南省': '410000',
            '湖北': '420000', '湖北省': '420000',
            '湖南': '430000', '湖南省': '430000',
            '广东': '440000', '广东省': '440000',
            '广西': '450000', '广西壮族自治区': '450000',
            '海南': '460000', '海南省': '460000',
            '重庆': '500000', '重庆市': '500000',
            '四川': '510000', '四川省': '510000',
            '贵州': '520000', '贵州省': '520000',
            '云南': '530000', '云南省': '530000',
            '西藏': '540000', '西藏自治区': '540000',
            '陕西': '610000', '陕西省': '610000',
            '甘肃': '620000', '甘肃省': '620000',
            '青海': '630000', '青海省': '630000',
            '宁夏': '640000', '宁夏回族自治区': '640000',
            '新疆': '650000', '新疆维吾尔自治区': '650000',
            '香港': '810000', '香港特别行政区': '810000',
            '澳门': '820000', '澳门特别行政区': '820000',
            '台湾': '710000', '台湾省': '710000'
        };

        // 从地图上得到的名称（如"四川省"）归一化成简短名（如"四川"）
        function normalizeProvinceName(name) {
            if (!name) return name;
            if (provinceAdcodeMap[name]) {
                return name.replace(/省|市|自治区|特别行政区/g, '') || name;
            }
            return name;
        }

        // 根据经纬度找到最近的省份（用景点做粗略匹配）
        function findNearestProvince(lat, lng) {
            let bestProvince = null;
            let minDistance = Infinity;
            for (const spot of spots) {
                const dLat = spot.lat - lat;
                const dLng = spot.lng - lng;
                const dist = Math.sqrt(dLat * dLat + dLng * dLng);
                if (dist < minDistance) {
                    minDistance = dist;
                    bestProvince = spot.province;
                }
            }
            // 距离超过 3°（约300公里）则认为不在中国范围
            if (minDistance > 3) return null;
            return bestProvince;
        }

        // 人流等级对应配置
        const levelConfig = {
            1: { color: '#ffcc80', size: 8, label: '舒适' },
            2: { color: '#ffb366', size: 12, label: '较少' },
            3: { color: '#ff9933', size: 16, label: '一般' },
            4: { color: '#ff6b35', size: 22, label: '较挤' },
            5: { color: '#e65100', size: 30, label: '拥挤' },
            6: { color: '#bf360c', size: 40, label: '爆满' }
        };

        let chart;
        let showHeat = true;
        let showLabels = true;
        let currentZoom = 1.2;
        let currentCenter = [104, 35]; // 中国中心
        let currentView = 'china'; // 当前视图: 'china' | 'province'
        let currentProvinceName = ''; // 当前省份名
        let loadingProvince = null; // 正在加载的省份
        const provinceMapCache = {}; // 省份 GeoJSON 缓存

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            chart = echarts.init(document.getElementById('map'));
            window.addEventListener('resize', () => chart.resize());

            // 加载全国地图
            loadChinaMap();

            // 初始化控件事件
            initEvents();
        }

        // ============================================================
        // 加载全国地图（初始）
        // ============================================================
        function loadChinaMap() {
            showLoading('正在加载全国地图...');
            fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
                .then(r => r.json())
                .then(chinaGeoJson => {
                    echarts.registerMap('china', chinaGeoJson);
                    renderMap('china', null);
                    hideLoading();
                    renderSpots();
                })
                .catch(() => {
                    hideLoading();
                    alert('地图加载失败，请检查网络连接');
                });
        }

        // ============================================================
        // 加载省份地图（按需）
        // ============================================================
        function loadProvinceMap(provinceName, provinceGeoJson) {
            // 使用唯一 map key，避免与中国地图冲突
            const mapKey = 'province_' + provinceName;
            echarts.registerMap(mapKey, provinceGeoJson);
            currentView = 'province';
            currentProvinceName = provinceName;

            // 计算省份中心经纬度
            const center = findBounds(provinceGeoJson);

            // 渲染为独立省份地图
            renderMap(mapKey, provinceName, center, 6);

            // 更新省份景点列表
            const filtered = spots.filter(s => s.province === provinceName);
            renderSpots(filtered);

            // 更新面包屑
            updateBreadcrumb(provinceName);
        }

        // ============================================================
        // 渲染地图
        // ============================================================
        function renderMap(mapName, provinceName, center, zoom) {
            // 构建散点数据
            const provinceSpots = provinceName
                ? spots.filter(s => s.province === provinceName)
                : spots;

            const scatterData = showHeat ? provinceSpots.map(spot => ({
                name: spot.name,
                value: [spot.lng, spot.lat, spot.people],
                itemStyle: {
                    color: levelConfig[spot.level].color,
                    shadowBlur: 20,
                    shadowColor: levelConfig[spot.level].color
                },
                symbolSize: levelConfig[spot.level].size,
                spot: spot
            })) : [];

            const isProvince = provinceName !== null;

            const geoConfig = {
                map: mapName,
                roam: true,
                center: center || (isProvince ? undefined : currentCenter),
                zoom: zoom || (isProvince ? undefined : currentZoom),
                itemStyle: {
                    areaColor: '#1e3a5f',
                    borderColor: '#3b5d82',
                    borderWidth: isProvince ? 1 : 0.5
                },
                emphasis: {
                    itemStyle: {
                        areaColor: '#2d5a8a',
                        borderColor: '#ff9a56',
                        borderWidth: 1.5
                    },
                    label: {
                        show: true,
                        color: '#ff9a56',
                        fontSize: isProvince ? 12 : 10,
                        fontWeight: 'bold'
                    }
                },
                label: {
                    show: showLabels,
                    color: '#a0c4e8',
                    fontSize: isProvince ? 11 : 10
                },
                scaleLimit: { min: isProvince ? 0.6 : 0.5, max: 15 },
                nameProperty: 'name'
            };

            const option = {
                backgroundColor: '#0d1b2a',
                geo: geoConfig,
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(26,26,46,0.95)',
                    borderColor: 'rgba(255,107,53,0.4)',
                    borderWidth: 1,
                    textStyle: { color: '#fff', fontSize: 13 },
                    formatter: function(params) {
                        if (params.seriesType === 'effectScatter' && params.data && params.data.spot) {
                            const s = params.data.spot;
                            const cfg = levelConfig[s.level];
                            return `
                                <div style="min-width:220px;padding:4px;">
                                    <div style="font-size:16px;font-weight:700;color:${cfg.color};margin-bottom:6px;">🔥 ${s.name}</div>
                                    <div style="color:#a0aec0;font-size:12px;margin-bottom:6px;">📍 ${s.city}</div>
                                    <div style="background:${cfg.color};padding:6px 10px;border-radius:6px;margin:8px 0;color:#fff;font-weight:600;text-align:center;">当前人流：${cfg.label}</div>
                                    <div style="color:#cbd5e0;font-size:12px;line-height:1.6;">👥 <b>${s.people.toLocaleString()}</b> / ${s.capacity.toLocaleString()} (${Math.round(s.people / s.capacity * 100)}%)</div>
                                    <div style="color:#ffcc80;font-size:12px;margin-top:6px;">🕐 开放时间：${s.openTime} ~ ${s.closeTime}</div>
                                    <div style="color:#a0aec0;font-size:12px;margin-top:6px;">${s.desc}</div>
                                    <div style="margin-top:6px;">${s.tags.map(t => `<span style="display:inline-block;background:rgba(255,107,53,0.2);color:#ffcc80;padding:2px 8px;border-radius:8px;font-size:11px;margin-right:3px;">${t}</span>`).join('')}</div>
                                </div>`;
                        }
                        if (params.name) {
                            return `<div style="color:#ff9a56;font-weight:600;font-size:13px;">📍 ${params.name}</div>`;
                        }
                        return '';
                    }
                },
                series: [
                    {
                        type: 'map',
                        map: mapName,
                        roam: true,
                        showLegend: false,
                        geoIndex: 0,
                        itemStyle: {
                            areaColor: '#1e3a5f',
                            borderColor: '#3b5d82',
                            borderWidth: isProvince ? 1 : 0.5
                        },
                        data: []
                    },
                    {
                        name: '景区人流',
                        type: 'effectScatter',
                        coordinateSystem: 'geo',
                        data: scatterData,
                        showEffectOn: 'render',
                        rippleEffect: {
                            brushType: 'stroke',
                            scale: isProvince ? 4 : 3,
                            period: 3
                        },
                        hoverAnimation: true,
                        emphasis: {
                            scale: 1.5,
                            label: {
                                show: true,
                                formatter: function(p) { return p.data.spot ? p.data.spot.name : p.name; },
                                position: 'right',
                                color: '#ff9a56',
                                fontSize: 12,
                                fontWeight: 'bold',
                                backgroundColor: 'rgba(0,0,0,0.7)',
                                padding: [3, 6],
                                borderRadius: 4,
                                distance: 10
                            }
                        },
                        zlevel: 1
                    }
                ]
            };

            chart.setOption(option, true);

            // 保存缩放/平移状态
            chart.off('georoam');
            chart.on('georoam', function(params) {
                if (params.zoom !== undefined) currentZoom = params.zoom;
            });

            // 单击 + 双击检测（用时间差实现，比 ECharts 原生 dblclick 更可靠）
            let lastClickAt = 0;
            let lastClickName = null;
            chart.off('click');
            chart.on('click', function(params) {
                // 单击散点 → 高亮右侧卡片
                if (params.seriesType === 'effectScatter' && params.data.spot) {
                    highlightCard(params.data.spot.name);
                    return;
                }
                // 单击地图区域 → 在全国视图下做双击检测（450ms 内两次点击=双击）
                // 注意：DataV 地图返回的名称可能是"四川省"，需要归一化成"四川"
                const rawName = params.name;
                const shortName = normalizeProvinceName(rawName);
                const now = Date.now();
                const isDouble = (now - lastClickAt < 450) && (lastClickName === shortName);
                if (isDouble && currentView === 'china' && shortName && provinceAdcodeMap[shortName]) {
                    lastClickAt = 0;
                    lastClickName = null;
                    navigateToProvince(shortName);
                    return;
                }
                lastClickAt = now;
                lastClickName = shortName;
            });

            // ZRender 级别兜底（避免有些浏览器原生双击缩放）
            const zr = chart.getZr();
            if (zr && zr.dom) {
                zr.dom.addEventListener('dblclick', function(e) {
                    e.preventDefault();
                }, { passive: false });
            }
        }

        // ============================================================
        // 导航到省份（带缓存）
        // ============================================================
        function navigateToProvince(provinceName) {
            if (loadingProvince === provinceName || currentProvinceName === provinceName) return;

            // 如果已有缓存，直接从缓存加载
            if (provinceMapCache[provinceName]) {
                loadProvinceMap(provinceName, provinceMapCache[provinceName]);
                return;
            }

            loadingProvince = provinceName;
            showLoading(`正在加载 ${provinceName} 地图...`);

            const adcode = provinceAdcodeMap[provinceName];
            fetch(`https://geo.datav.aliyun.com/areas_v3/bound/${adcode}_full.json`)
                .then(r => r.json())
                .then(geoJson => {
                    loadingProvince = null;
                    hideLoading();
                    provinceMapCache[provinceName] = geoJson;
                    loadProvinceMap(provinceName, geoJson);
                })
                .catch(() => {
                    loadingProvince = null;
                    hideLoading();
                    alert(`${provinceName} 地图加载失败，请检查网络`);
                });
        }

        // ============================================================
        // 返回全国视图
        // ============================================================
        function navigateToChina() {
            currentView = 'china';
            currentProvinceName = '';
            currentCenter = [104, 35];
            currentZoom = 1.2;
            renderMap('china', null);
            renderSpots();
            updateBreadcrumb('');
        }

        // ============================================================
        // 计算省份中心点
        // ============================================================
        function findBounds(geoJson) {
            try {
                const features = geoJson.features || [];
                let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
                features.forEach(f => {
                    const coords = f.geometry.coordinates;
                    function processCoords(c) {
                        c.forEach(p => {
                            if (Array.isArray(p[0])) processCoords(p);
                            else {
                                minLng = Math.min(minLng, p[0]);
                                maxLng = Math.max(maxLng, p[0]);
                                minLat = Math.min(minLat, p[1]);
                                maxLat = Math.max(maxLat, p[1]);
                            }
                        });
                    }
                    processCoords(coords);
                });
                if (minLng === Infinity) return null;
                return [(minLng + maxLng) / 2, (minLat + maxLat) / 2];
            } catch { return null; }
        }

        // ============================================================
        // 渲染景点列表
        // ============================================================
        function renderSpots(filterSpots = null) {
            const list = document.getElementById('spotList');
            const toShow = filterSpots || spots;
            const showProvinceLabel = currentView === 'province';

            list.innerHTML = toShow.map((spot, i) => `
                <div class="spot-card" data-name="${spot.name}" data-lat="${spot.lat}" data-lng="${spot.lng}">
                    <div class="spot-header">
                        <span class="spot-name">${spot.name}</span>
                        <span class="spot-level level-${spot.level}">${levelConfig[spot.level].label}</span>
                    </div>
                    ${showProvinceLabel ? `<div class="spot-info">📍 ${spot.city}</div>` : ''}
                    <div class="spot-info">👥 ${spot.people.toLocaleString()} / ${spot.capacity.toLocaleString()} 人</div>
                    <div class="spot-info">${spot.desc}</div>
                    <div>${spot.tags.map(t => `<span class="spot-tag">${t}</span>`).join('')}</div>
                </div>
            `).join('');

            document.querySelectorAll('.spot-card').forEach(card => {
                card.addEventListener('click', function() {
                    const lat = parseFloat(this.getAttribute('data-lat'));
                    const lng = parseFloat(this.getAttribute('data-lng'));
                    const name = this.getAttribute('data-name');

                    document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');

                    currentZoom = 8;
                    chart.setOption({ geo: { center: [lng, lat], zoom: currentZoom } });

                    const idx = toShow.findIndex(s => s.name === name);
                    if (idx >= 0) {
                        setTimeout(() => {
                            chart.dispatchAction({ type: 'highlight', seriesIndex: 1, dataIndex: idx });
                        }, 300);
                        setTimeout(() => {
                            chart.dispatchAction({ type: 'downplay', seriesIndex: 1, dataIndex: idx });
                        }, 3000);
                    }
                });
            });
        }

        function highlightCard(name) {
            document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('active'));
            const card = document.querySelector(`.spot-card[data-name="${name}"]`);
            if (card) {
                card.classList.add('active');
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // ============================================================
        // 面包屑导航
        // ============================================================
        function updateBreadcrumb(provinceName) {
            const el = document.getElementById('breadcrumb');
            if (!provinceName) {
                el.innerHTML = '<span class="bc-root">📍 中国全境</span>';
                return;
            }
            el.innerHTML = `<span class="bc-root" onclick="navigateToChina()" style="cursor:pointer;">📍 中国全境</span> <span class="bc-sep">›</span> <span class="bc-current">${provinceName}</span>`;
        }

        // ============================================================
        // 搜索
        // ============================================================
        function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            // 优先匹配景点
            const matched = spots.find(s =>
                s.name.includes(query) || s.city.includes(query) || s.province.includes(query)
            );

            if (matched) {
                // 如果当前不在该省份视图，先切过去
                if (currentProvinceName !== matched.province) {
                    if (provinceAdcodeMap[matched.province] && matched.province !== '中国') {
                        navigateToProvince(matched.province);
                        setTimeout(() => highlightCard(matched.name), 1500);
                    } else {
                        // 全国视图下直接高亮
                        renderSpots();
                        const filtered = spots.filter(s =>
                            s.name.includes(query) || s.city.includes(query) || s.province.includes(query)
                        );
                        renderSpots(filtered);
                        setTimeout(() => highlightCard(matched.name), 100);
                    }
                } else {
                    highlightCard(matched.name);
                }
                document.getElementById('searchInput').value = matched.name + ' - ' + matched.province;
            } else {
                alert('未找到 "' + query + '" 相关景点');
            }
        }

        // ============================================================
        // 事件绑定
        // ============================================================
        function initEvents() {
            // 定位
            document.getElementById('locationBtn').addEventListener('click', function() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const lat = pos.coords.latitude, lng = pos.coords.longitude;
                            // 根据经纬度找到最近的省份，然后直接进入该省份地图
                            const province = findNearestProvince(lat, lng);
                            if (province && provinceAdcodeMap[province]) {
                                document.getElementById('searchInput').value = `当前位置：${province} (${lat.toFixed(2)}, ${lng.toFixed(2)})`;
                                navigateToProvince(province);
                            } else {
                                // 不在中国区域内，做普通缩放
                                currentCenter = [lng, lat];
                                currentZoom = 4;
                                chart.setOption({ geo: { center: currentCenter, zoom: currentZoom } });
                                document.getElementById('searchInput').value = `当前位置 (${lat.toFixed(2)}, ${lng.toFixed(2)})`;
                            }
                        },
                        () => { alert('定位失败'); }
                    );
                } else {
                    alert('浏览器不支持定位');
                }
            });

            // 热力点开关
            document.getElementById('toggleHeatBtn').addEventListener('click', function() {
                showHeat = !showHeat;
                this.classList.toggle('active', showHeat);
                const mapKey = currentView === 'china' ? 'china' : 'province_' + currentProvinceName;
                renderMap(mapKey, currentView === 'province' ? currentProvinceName : null);
            });

            // 标签开关
            document.getElementById('toggleLabelsBtn').addEventListener('click', function() {
                showLabels = !showLabels;
                this.classList.toggle('active', showLabels);
                const mapKey = currentView === 'china' ? 'china' : 'province_' + currentProvinceName;
                renderMap(mapKey, currentView === 'province' ? currentProvinceName : null);
            });

            // 重置
            document.getElementById('resetBtn').addEventListener('click', navigateToChina);

            // 放大/缩小
            document.getElementById('zoomInBtn').addEventListener('click', function() {
                currentZoom = Math.min(10, (currentZoom || 1) * 1.3);
                chart.setOption({ geo: { zoom: currentZoom } });
            });
            document.getElementById('zoomOutBtn').addEventListener('click', function() {
                currentZoom = Math.max(0.5, (currentZoom || 1) / 1.3);
                chart.setOption({ geo: { zoom: currentZoom } });
            });

            // 搜索
            document.getElementById('searchBtn').addEventListener('click', search);
            document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') search(); });

            // 侧边栏
            const sidebar = document.getElementById('sidebar');
            document.getElementById('sidebarToggle').addEventListener('click', function() {
                sidebar.classList.toggle('open');
                this.classList.toggle('open');
            });

            // 模拟数据更新
            setInterval(simulateTraffic, 20000);
            setInterval(updateTime, 1000);
            updateTime();
        }

        // ============================================================
        // 模拟人流变化
        // ============================================================
        function simulateTraffic() {
            spots.forEach(spot => {
                const change = Math.floor((Math.random() - 0.5) * spot.people * 0.12);
                spot.people = Math.max(100, spot.people + change);
                const ratio = spot.people / spot.capacity;
                if (ratio > 0.9) spot.level = 6;
                else if (ratio > 0.75) spot.level = 5;
                else if (ratio > 0.6) spot.level = 4;
                else if (ratio > 0.4) spot.level = 3;
                else if (ratio > 0.2) spot.level = 2;
                else spot.level = 1;
            });
            // 只更新当前视图
            if (currentView === 'province') {
                const filtered = spots.filter(s => s.province === currentProvinceName);
                renderSpots(filtered);
            } else {
                renderSpots();
            }
            const mapKey = currentView === 'china' ? 'china' : 'province_' + currentProvinceName;
            renderMap(mapKey, currentView === 'province' ? currentProvinceName : null);
        }

        function updateTime() {
            document.getElementById('currentTime').textContent = new Date().toTimeString().split(' ')[0];
        }

        function showLoading(text) {
            const el = document.getElementById('loadingOverlay');
            el.querySelector('.loading-text').textContent = text;
            el.classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // ============================================================
        // 启动
        // ============================================================
        if (typeof echarts !== 'undefined') {
            init();
        } else {
            document.querySelector('.loading-text').textContent = 'ECharts 加载失败，请检查网络';
        }
    </script>
</body>
</html>
