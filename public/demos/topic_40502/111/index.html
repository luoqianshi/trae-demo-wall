<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>心声树洞 · 给情绪一个温柔的出口</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            midnight: { 50:'#f4f3ff', 100:'#e7e5ff', 200:'#c9c5ff', 300:'#9b95ff', 400:'#6d63ff', 500:'#4e42e8', 600:'#3b2cc7', 700:'#2f219f', 800:'#251876', 900:'#1a1b4b', 950:'#0f0f2e' },
            coral:   { 400:'#ff8fb1', 500:'#ff6b9d', 600:'#e84c82' },
            mint:    { 400:'#8deec0', 500:'#6ee7b7', 600:'#4ad49e' },
          },
          fontFamily: {
            sans: ['"Quicksand"', '"PingFang SC"', '"Microsoft YaHei"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 24px rgba(255,107,157,0.35)',
            soft: '0 8px 32px rgba(15,15,46,0.35)',
          },
          animation: {
            'float-slow': 'float 7s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 3s ease-in-out infinite',
            'fade-in': 'fadeIn .5s ease-out both',
            'slide-up': 'slideUp .55s cubic-bezier(.2,.8,.2,1) both',
            'twinkle': 'twinkle 4s ease-in-out infinite',
          },
          keyframes: {
            float: { '0%,100%':{ transform:'translateY(0)' }, '50%':{ transform:'translateY(-10px)' } },
            pulseSoft: { '0%,100%':{ transform:'scale(1)', opacity:'1' }, '50%':{ transform:'scale(1.04)', opacity:'.9' } },
            fadeIn: { '0%':{ opacity:'0' }, '100%':{ opacity:'1' } },
            slideUp: { '0%':{ opacity:'0', transform:'translateY(14px)' }, '100%':{ opacity:'1', transform:'translateY(0)' } },
            twinkle: { '0%,100%':{ opacity:'.2' }, '50%':{ opacity:'1' } },
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen text-white font-sans antialiased">
  <!-- 动态渐变 + 星空背景 -->
  <div id="bg-stars" aria-hidden="true"></div>
  <div id="bg-aurora" aria-hidden="true"></div>

  <div id="app" class="relative z-10"></div>

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3.4.38/dist/vue.global.prod.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="js/store.js"></script>
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
