<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平行人生 — AI人生平行线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:#e8dff5;background:#0f0e17;line-height:1.7;overflow-x:hidden}

/* Stars background */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* Hero */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 20px;background:linear-gradient(135deg,#0f0e17 0%,#1a1a2e 40%,#16213e 70%,#0f3460 100%)}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 50%,rgba(127,90,240,.15) 0%,transparent 50%),radial-gradient(ellipse at 70% 30%,rgba(255,175,120,.1) 0%,transparent 50%);animation:heroGlow 8s ease-in-out infinite alternate}
@keyframes heroGlow{0%{transform:translate(0,0)}100%{transform:translate(2%,-2%)}}
.hero-content{position:relative;z-index:1;max-width:700px}
.hero-icon{font-size:80px;margin-bottom:24px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.hero h1{font-size:clamp(2.5rem,6vw,4rem);font-weight:900;background:linear-gradient(135deg,#e8d5ff 0%,#ffaf78 50%,#e8d5ff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.hero-sub{font-size:1.2rem;color:rgba(255,255,255,.6);margin-bottom:12px}
.hero-tagline{font-size:1rem;color:rgba(255,175,120,.8);font-style:italic;margin-top:16px}
.hero-btn{display:inline-block;margin-top:32px;padding:16px 40px;background:linear-gradient(135deg,#7f5af0,#ffaf78);color:#fff;font-size:1.1rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all .3s;text-decoration:none}
.hero-btn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(127,90,240,.3)}

/* Sections */
.section{position:relative;z-index:1;padding:80px 20px;max-width:800px;margin:0 auto}
.section-header{text-align:center;margin-bottom:48px}
.section-header h2{font-size:2rem;font-weight:800;color:#fff;margin-bottom:8px}
.section-header .accent{color:#ffaf78}
.section-header p{color:rgba(255,255,255,.5)}

/* Form */
.form-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px;backdrop-filter:blur(10px)}
.form-group{margin-bottom:24px}
.form-group label{display:block;color:#b794f6;font-size:.9rem;margin-bottom:8px;font-weight:600}
.form-group input,.form-group textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;color:#fff;font-size:1rem;font-family:inherit;transition:border-color .3s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:rgba(127,90,240,.5)}
.form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,.3)}
.form-group textarea{resize:none;height:80px}
.form-group .hint{font-size:.8rem;color:rgba(255,255,255,.4);margin-top:4px}
.submit-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#7f5af0,#ffaf78);color:#fff;font-size:1.1rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all .3s;margin-top:8px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(127,90,240,.3)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Loading */
.loading{text-align:center;padding:100px 20px;display:none}
.loading.active{display:block}
.loading-icon{font-size:64px;animation:spin 2s linear infinite;display:block;margin-bottom:24px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.loading-text{color:rgba(255,255,255,.6);font-size:1.1rem}
.loading-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* Story Cards */
.stories{display:none;padding:60px 20px;max-width:800px;margin:0 auto;position:relative;z-index:1}
.stories.active{display:block}
.story-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;margin-bottom:24px;position:relative;overflow:hidden;animation:fadeInUp .6s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.story-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#7f5af0,#ffaf78)}
.story-label{font-size:.8rem;color:#b794f6;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.story-title{font-size:1.6rem;color:#fff;font-weight:800;margin-bottom:16px}
.story-body{color:rgba(255,255,255,.7);font-size:1rem;line-height:2;margin-bottom:20px}
.story-section{margin-bottom:16px}
.story-section h4{color:#ffaf78;font-size:.95rem;margin-bottom:6px}
.story-section p{color:rgba(255,255,255,.6);font-size:.95rem}
.story-monologue{border-left:3px solid rgba(255,175,120,.5);padding-left:20px;margin-top:20px;font-style:italic;color:rgba(255,175,120,.8);line-height:1.9}

/* Navigation */
.nav-btns{display:flex;justify-content:center;gap:16px;margin:32px 0}
.nav-btn{padding:12px 28px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-size:.95rem;cursor:pointer;transition:all .3s}
.nav-btn:hover{background:rgba(127,90,240,.2);border-color:rgba(127,90,240,.4)}
.nav-btn.active{background:linear-gradient(135deg,#7f5af0,#ffaf78);border-color:transparent}

/* Healing Card */
.healing{display:none;text-align:center;padding:80px 20px;max-width:700px;margin:0 auto;position:relative;z-index:1}
.healing.active{display:block}
.healing-card{background:linear-gradient(135deg,rgba(127,90,240,.1),rgba(255,175,120,.05));border:1px solid rgba(255,175,120,.2);border-radius:24px;padding:48px}
.healing-icon{font-size:64px;margin-bottom:24px;display:block}
.healing h2{font-size:1.8rem;color:#fff;margin-bottom:16px}
.healing p{color:rgba(255,255,255,.65);font-size:1.05rem;line-height:2;margin-bottom:16px}
.healing-quote{font-size:1.2rem;color:#ffaf78;font-style:italic;margin-top:24px;line-height:1.8}

/* Restart */
.restart-btn{display:inline-block;margin-top:32px;padding:14px 32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-size:1rem;cursor:pointer;transition:all .3s}
.restart-btn:hover{background:rgba(127,90,240,.2)}

/* Footer */
.footer{text-align:center;padding:40px 20px;color:rgba(255,255,255,.25);font-size:.8rem;border-top:1px solid rgba(255,255,255,.05);position:relative;z-index:1}

/* Error */
.error-msg{background:rgba(243,139,168,.1);border:1px solid rgba(243,139,168,.3);color:#f38ba8;padding:12px 20px;border-radius:12px;font-size:.9rem;margin-top:16px;display:none}
.error-msg.show{display:block}

/* Responsive */
@media(max-width:768px){
  .hero h1{font-size:2rem}
  .form-card{padding:24px}
  .story-card{padding:24px}
  .section{padding:60px 16px}
  .healing-card{padding:28px}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- Hero -->
<section class="hero" id="hero">
<div class="hero-content">
<span class="hero-icon">&#x1F52E;</span>
<h1>平行人生</h1>
<p class="hero-sub">如果当初选了另一条路，现在的你会怎样？</p>
<p class="hero-tagline">"每个选择都通向一个平行世界，而你走过的这条路，就是最好的那条。"</p>
<button class="hero-btn" onclick="scrollToForm()">开始探索</button>
</div>
</section>

<!-- Form -->
<section class="section" id="formSection">
<div class="section-header">
<h2>输入你的<span class="accent">人生选择</span></h2>
<p>告诉我们你曾经做过的一个重要决定</p>
</div>
<div class="form-card">
<div class="form-group">
<label>你的年龄</label>
<input type="number" id="age" placeholder="例如：28" min="10" max="100">
</div>
<div class="form-group">
<label>你做出的选择</label>
<input type="text" id="choice" placeholder="例如：选择留在家乡工作">
<div class="hint">你当时做了什么决定？</div>
</div>
<div class="form-group">
<label>你放弃的选项</label>
<input type="text" id="abandoned" placeholder="例如：放弃了去上海发展的机会">
<div class="hint">如果选了另一条路，会是什么？</div>
</div>
<div class="form-group">
<label>当时的感受</label>
<textarea id="feeling" placeholder="例如：有点遗憾但觉得更稳妥"></textarea>
</div>
<div class="form-group">
<label>现在的状态</label>
<textarea id="current" placeholder="例如：工作稳定但偶尔会想如果当初..."></textarea>
</div>
<input type="hidden" id="apiKey">
<button class="submit-btn" id="submitBtn" onclick="generateStories()">探索平行人生</button>
<div class="error-msg" id="errorMsg"></div>
</div>
</section>

<!-- Loading -->
<section class="loading" id="loading">
<span class="loading-icon">&#x1F30C;</span>
<p class="loading-text">正在为你推演平行人生<span class="loading-dots"></span></p>
</section>

<!-- Stories -->
<section class="stories" id="stories">
<div class="section-header">
<h2>你的<span class="accent">平行人生</span></h2>
<p>基于你的选择，AI为你推演的3种可能</p>
</div>
<div id="storyContent"></div>
<div class="nav-btns" id="navBtns"></div>
</section>

<!-- Healing -->
<section class="healing" id="healing">
<div class="healing-card">
<span class="healing-icon">&#x1F49C;</span>
<h2>现在的你，就是最好的答案</h2>
<p id="healingText"></p>
<div class="healing-quote" id="healingQuote"></div>
<button class="restart-btn" onclick="restart()">再探索一次</button>
</div>
</section>

<!-- Footer -->
<div class="footer">
<p>平行人生 — AI人生平行线 | TRAE AI 创造力大赛 · 生活娱乐赛道</p>
</div>

<script>
// ============================================
// Stars Background
// ============================================
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 100; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  const size = Math.random() * 3 + 1;
  star.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s`;
  starsContainer.appendChild(star);
}

function scrollToForm() {
  document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
}

// ============================================
// Form Handling & Validation
// ============================================
// Encoded API Key (split + reversed + base64)
const _ek = 'c1dhVklWUGtZcElmRjJKOS40NmU1NmU4MzBlODhjZDk5YTYzNDI1YjNhZTQ4ZGExNA==';
const DEFAULT_API_KEY = atob(_ek).split('').reverse().join('');

function getFormData() {
  return {
    age: document.getElementById('age').value.trim(),
    choice: document.getElementById('choice').value.trim(),
    abandoned: document.getElementById('abandoned').value.trim(),
    feeling: document.getElementById('feeling').value.trim(),
    current: document.getElementById('current').value.trim()
  };
}

function getApiKey() {
  const input = document.getElementById('apiKey').value.trim();
  return input || DEFAULT_API_KEY;
}

function validateForm(data) {
  const fields = [
    { key: 'age', label: '年龄' },
    { key: 'choice', label: '做出的选择' },
    { key: 'abandoned', label: '放弃的选项' },
    { key: 'feeling', label: '当时的感受' },
    { key: 'current', label: '现在的状态' }
  ];
  for (const f of fields) {
    if (!data[f.key]) {
      return `请填写"${f.label}"`;
    }
  }
  if (isNaN(data.age) || data.age < 10 || data.age > 100) {
    return '请输入有效的年龄（10-100）';
  }
  return null;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

// ============================================
// AI Story Generation (ZhipuAI GLM-4.7-Flash)
// ============================================
const SYSTEM_PROMPT = `你是一位温暖的人生故事讲述者。你擅长从一个人的人生选择出发，推演出平行世界的其他可能。你的文风温暖治愈，既有文学性又接地气。你会用"你"来称呼用户，让人感觉像一位老朋友在聊天。`;

function buildUserPrompt(data) {
  return `我今年${data.age}岁，当时我选择了${data.choice}，放弃了${data.abandoned}。那时候我的感受是${data.feeling}，现在我的状态是${data.current}。

请帮我推演3条平行世界的人生故事。每个故事要求：
1. 有一个诗意的标题
2. 描述如果当初选了另一条路，人生会怎样发展（200-300字）
3. 一个关键的人生转折点
4. 当前的状态（30岁时或5年后）
5. 一段内心独白（第一人称，像日记一样真实）

输出格式（严格JSON数组，不要输出任何其他内容）：
[{"title":"标题","story":"故事","turningPoint":"转折点","currentStatus":"当前状态","monologue":"独白"},{"title":"...","story":"...","turningPoint":"...","currentStatus":"...","monologue":"..."},{"title":"...","story":"...","turningPoint":"...","currentStatus":"...","monologue":"..."}]`;
}

async function callAI(apiKey, userPrompt) {
  console.log('[平行人生] 正在调用智谱AI API...');
  console.log('[平行人生] API Key:', apiKey ? apiKey.substring(0, 8) + '...' : '未设置');
  let response;
  try {
    response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method: 'POST',
      mode: 'cors',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'GLM-4.7-Flash',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: userPrompt }
        ],
        temperature: 0.8
      })
    });
  } catch (fetchErr) {
    console.error('[平行人生] 网络请求失败:', fetchErr);
    throw new Error('网络请求失败，可能是CORS限制。请用本地服务器打开（如 python -m http.server 8080）或检查网络连接');
  }
  if (!response.ok) {
    const errText = await response.text();
    console.error('[平行人生] API返回错误:', response.status, errText);
    throw new Error(`API请求失败(${response.status}):${errText}`);
  }
  const result = await response.json();
  console.log('[平行人生] API调用成功');
  const content = result.choices[0].message.content;
  return parseStories(content);
}

function parseStories(content) {
  console.log('[平行人生] AI返回内容长度:', content.length);
  // Try to extract JSON from the response
  const jsonMatch = content.match(/\[[\s\S]*\]/);
  if (!jsonMatch) {
    console.error('[平行人生] 无法从返回内容中提取JSON:', content.substring(0, 200));
    throw new Error('AI返回格式异常，无法解析');
  }
  try {
    const stories = JSON.parse(jsonMatch[0]);
    if (!Array.isArray(stories) || stories.length < 3) {
      throw new Error('AI返回的故事数量不足，收到' + (stories ? stories.length : 0) + '个');
    }
    // Validate each story has required fields
    const requiredFields = ['title', 'story', 'turningPoint', 'currentStatus', 'monologue'];
    for (let i = 0; i < 3; i++) {
      for (const field of requiredFields) {
        if (!stories[i][field]) {
          stories[i][field] = '（AI未生成此内容）';
        }
      }
    }
    return stories;
  } catch (parseErr) {
    if (parseErr.message.includes('故事数量不足') || parseErr.message.includes('AI未生成')) {
      throw parseErr;
    }
    console.error('[平行人生] JSON解析失败:', parseErr, jsonMatch[0].substring(0, 200));
    throw new Error('AI返回的JSON格式错误');
  }
}

// ============================================
// Main Flow
// ============================================
async function generateStories() {
  hideError();
  try {
    const data = getFormData();
    const validationError = validateForm(data);
    if (validationError) {
      showError(validationError);
      return;
    }

    const apiKey = getApiKey();
    console.log('[平行人生] 表单验证通过，开始生成故事...');

    // Show loading
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('loading').classList.add('active');
    document.getElementById('loading').scrollIntoView({ behavior: 'smooth' });

    // Disable submit
    document.getElementById('submitBtn').disabled = true;

    const userPrompt = buildUserPrompt(data);
    const stories = await callAI(apiKey, userPrompt);
    saveToHistory(data, stories);
    showStories(stories);
  } catch (err) {
    console.error('[平行人生] 生成失败:', err);
    document.getElementById('loading').classList.remove('active');
    document.getElementById('formSection').style.display = 'block';
    document.getElementById('submitBtn').disabled = false;
    showError('生成失败：' + err.message);
  }
}

function showStories(stories) {
  window._stories = stories;
  window._currentStory = 0;

  document.getElementById('loading').classList.remove('active');
  document.getElementById('stories').classList.add('active');
  document.getElementById('healing').classList.add('active');

  renderStory(0);
  renderNavBtns();
  renderHealing();

  document.getElementById('stories').scrollIntoView({ behavior: 'smooth' });
}

// ============================================
// Story Rendering
// ============================================
function renderStory(index) {
  const story = window._stories[index];
  const labels = ['平行世界 A', '平行世界 B', '平行世界 C'];
  const emojis = ['&#x1F30D;', '&#x1F680;', '&#x1F31F;'];

  document.getElementById('storyContent').innerHTML = `
    <div class="story-card" style="animation-delay:0s">
      <div class="story-label">${emojis[index]} ${labels[index]}</div>
      <h3 class="story-title">${escapeHtml(story.title)}</h3>
      <div class="story-body">${escapeHtml(story.story)}</div>
      <div class="story-section">
        <h4>&#x1F504; 关键转折</h4>
        <p>${escapeHtml(story.turningPoint)}</p>
      </div>
      <div class="story-section">
        <h4>&#x1F3E0; 当前状态</h4>
        <p>${escapeHtml(story.currentStatus)}</p>
      </div>
      <div class="story-monologue">"${escapeHtml(story.monologue)}"</div>
    </div>
  `;
}

function renderNavBtns() {
  const labels = ['A', 'B', 'C'];
  const container = document.getElementById('navBtns');
  container.innerHTML = labels.map((l, i) => `
    <button class="nav-btn ${i === 0 ? 'active' : ''}" onclick="switchStory(${i})">${l}</button>
  `).join('');
}

function switchStory(index) {
  window._currentStory = index;
  renderStory(index);
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================
// Healing Card
// ============================================
function renderHealing() {
  const quotes = [
    "每条路都有风景，每个选择都有意义。",
    "你走过的每一步，都算数。",
    "平行世界的你可能会羡慕现在的你。",
    "人生没有白走的路，每一步都是独一无二的风景。",
    "你选择了这条路，这条路就因你而特别。"
  ];
  const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

  document.getElementById('healingText').textContent =
    '看完这3个平行人生，也许你会发现：每条路都有它的精彩和遗憾。你选择的这条路，造就了现在的你——而现在的你，就是最好的答案。';
  document.getElementById('healingQuote').textContent = `"${randomQuote}"`;
}

// ============================================
// Restart
// ============================================
function restart() {
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('loading').classList.remove('active');
  document.getElementById('stories').classList.remove('active');
  document.getElementById('healing').classList.remove('active');
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
}

// ============================================
// History (localStorage)
// ============================================
function saveToHistory(data, stories) {
  const history = JSON.parse(localStorage.getItem('parallelLifeHistory') || '[]');
  history.unshift({
    date: new Date().toLocaleDateString('zh-CN'),
    data: data,
    stories: stories
  });
  if (history.length > 10) history.pop();
  localStorage.setItem('parallelLifeHistory', JSON.stringify(history));
}

function loadApiKey() {
  const saved = localStorage.getItem('parallelLifeApiKey');
  if (saved && saved.trim()) document.getElementById('apiKey').value = saved;
}

document.getElementById('apiKey').addEventListener('change', function () {
  if (this.value.trim()) {
    localStorage.setItem('parallelLifeApiKey', this.value);
  }
});

// Load on start
loadApiKey();
</script>

</body>
</html>
