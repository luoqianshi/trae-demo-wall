<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智链笔记 SmartLink Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="welcome-overlay" id="welcomeOverlay">
        <div class="welcome-card">
            <div class="welcome-logo">
                <i class="ph-bold ph-link"></i>
            </div>
            <h1 class="welcome-title">智链笔记</h1>
            <p class="welcome-subtitle">
                SmartLink Notes<br>
                智能记录，知识互联。让每一次学习都留下清晰的脉络。
            </p>
            <div class="scene-buttons">
                <button class="scene-btn classroom" onclick="selectScene('classroom')">
                    <i class="ph-bold ph-graduation-cap"></i>
                    <div class="scene-btn-title">模拟课堂场景</div>
                    <div class="scene-btn-desc">机器学习导论课程演示</div>
                </button>
                <button class="scene-btn meeting" onclick="selectScene('meeting')">
                    <i class="ph-bold ph-users-three"></i>
                    <div class="scene-btn-title">模拟会议场景</div>
                    <div class="scene-btn-desc">产品路线图评审会</div>
                </button>
            </div>
        </div>
    </div>
    
    <div class="app-container" id="appContainer">
        <nav class="navbar">
            <div class="navbar-left">
                <button class="icon-btn" onclick="toggleSidebar()">
                    <i class="ph-bold ph-list"></i>
                </button>
                <div class="navbar-logo">
                    <i class="ph-bold ph-link"></i>
                    <span>智链笔记</span>
                </div>
                <div class="mode-badge classroom" id="modeBadge">
                    <i class="ph-bold ph-graduation-cap"></i>
                    <span>课堂模式</span>
                </div>
            </div>
            <div class="navbar-right">
                <button class="icon-btn" onclick="exportNotes()" title="导出笔记">
                    <i class="ph-bold ph-download-simple"></i>
                </button>
                <button class="icon-btn" onclick="toggleDarkMode()" title="切换主题">
                    <i class="ph-bold ph-moon"></i>
                </button>
                <div class="avatar">李</div>
            </div>
        </nav>
        
        <div class="main-content">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">
                        <i class="ph-bold ph-clock-counter-clockwise"></i>
                        历史记录
                    </div>
                    <button class="icon-btn" onclick="toggleSidebar()">
                        <i class="ph-bold ph-x"></i>
                    </button>
                </div>
                <div class="history-list" id="historyList"></div>
            </aside>
            
            <main class="main-panel">
                <div class="tabs">
                    <div class="tab active" data-tab="transcript" onclick="switchTab('transcript')">
                        <i class="ph-bold ph-microphone"></i>
                        实时转写
                    </div>
                    <div class="tab" data-tab="summary" onclick="switchTab('summary')">
                        <i class="ph-bold ph-sparkle"></i>
                        AI摘要
                    </div>
                    <div class="tab" data-tab="notes" onclick="switchTab('notes')">
                        <i class="ph-bold ph-note-pencil"></i>
                        笔记编辑
                    </div>
                </div>
                
                <div class="content-area">
                    <div class="tab-content active" id="transcriptTab">
                        <div class="transcript-container">
                            <div class="transcript-header">
                                <div class="transcript-title" id="transcriptTitle">机器学习导论 - 第3讲：神经网络基础</div>
                                <div class="transcript-actions">
                                    <button class="btn btn-primary" id="recordBtn" onclick="toggleRecording()">
                                        <i class="ph-bold ph-play"></i>
                                        开始记录
                                    </button>
                                    <button class="btn btn-secondary" onclick="generateSummary()" id="generateBtn" disabled>
                                        <i class="ph-bold ph-sparkle"></i>
                                        生成摘要与图谱
                                    </button>
                                </div>
                            </div>
                            <div class="transcript-content" id="transcriptContent">
                                <div class="empty-state" id="emptyState">
                                    <i class="ph-bold ph-microphone-slash"></i>
                                    <div class="empty-state-title">等待开始记录</div>
                                    <div class="empty-state-desc">点击"开始记录"按钮开始模拟转写</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="tab-content" id="summaryTab">
                        <div class="summary-container">
                            <div class="summary-header">
                                <div class="summary-title">
                                    <i class="ph-bold ph-sparkle"></i>
                                    AI 智能摘要
                                </div>
                                <button class="btn btn-secondary" onclick="copySummary()">
                                    <i class="ph-bold ph-copy"></i>
                                    复制摘要
                                </button>
                            </div>
                            <div class="summary-content" id="summaryContent">
                                <div class="empty-state">
                                    <i class="ph-bold ph-text-aa"></i>
                                    <div class="empty-state-title">暂无摘要</div>
                                    <div class="empty-state-desc">完成转写后点击"生成摘要与图谱"</div>
                                </div>
                            </div>
                            <div class="keywords-section" id="keywordsSection" style="display: none;">
                                <div class="keywords-title">关键概念</div>
                                <div class="keywords-list" id="keywordsList"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="tab-content" id="notesTab">
                        <div class="notes-container">
                            <div class="notes-outline">
                                <div class="outline-title">大纲导航</div>
                                <ul class="outline-list" id="outlineList">
                                    <li class="outline-item active">课程概述</li>
                                    <li class="outline-item">神经网络结构</li>
                                    <li class="outline-item">激活函数</li>
                                    <li class="outline-item">反向传播</li>
                                    <li class="outline-item">损失函数</li>
                                </ul>
                            </div>
                            <div class="notes-editor">
                                <div class="editor-toolbar">
                                    <button class="toolbar-btn" onclick="formatText('bold')" title="加粗">
                                        <i class="ph-bold ph-text-b"></i>
                                    </button>
                                    <button class="toolbar-btn" onclick="formatText('italic')" title="斜体">
                                        <i class="ph-bold ph-text-i"></i>
                                    </button>
                                    <button class="toolbar-btn" onclick="formatText('heading')" title="标题">
                                        <i class="ph-bold ph-text-h"></i>
                                    </button>
                                    <button class="toolbar-btn" onclick="formatText('list')" title="列表">
                                        <i class="ph-bold ph-list-bullets"></i>
                                    </button>
                                    <button class="toolbar-btn" onclick="formatText('link')" title="链接">
                                        <i class="ph-bold ph-link"></i>
                                    </button>
                                </div>
                                <div class="editor-content" contenteditable="true" id="editorContent"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            
            <div class="graph-panel" id="graphPanel">
                <div class="graph-header">
                    <div class="graph-title">
                        <i class="ph-bold ph-graph"></i>
                        知识图谱
                    </div>
                    <div class="graph-controls">
                        <button class="icon-btn" onclick="resetGraph()" title="重置视图">
                            <i class="ph-bold ph-arrows-out"></i>
                        </button>
                        <button class="icon-btn" onclick="toggleGraphPanel()" title="收起">
                            <i class="ph-bold ph-x"></i>
                        </button>
                    </div>
                </div>
                <div class="graph-container" id="graphContainer">
                    <svg id="graph-svg"></svg>
                    <div class="graph-tooltip" id="graphTooltip"></div>
                    <div class="graph-legend">
                        <div class="legend-item">
                            <div class="legend-dot core"></div>
                            <span>核心概念</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot concept"></div>
                            <span>相关概念</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot detail"></div>
                            <span>细节节点</span>
                        </div>
                    </div>
                    <div class="loading-overlay" id="graphLoading">
                        <div class="loading-spinner"></div>
                        <div class="loading-text">正在生成知识图谱...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="statusbar">
            <div class="statusbar-left">
                <div class="status-item">
                    <i class="ph-bold ph-text-aa"></i>
                    <span id="wordCount">0</span> 字
                </div>
                <div class="status-item">
                    <i class="ph-bold ph-timer"></i>
                    <span id="duration">00:00:00</span>
                </div>
            </div>
            <div class="statusbar-right">
                <div class="status-item">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">就绪</span>
                </div>
                <div class="status-item">
                    <i class="ph-bold ph-wifi-high"></i>
                    网络正常
                </div>
            </div>
        </footer>
    </div>

    <script src="js/app.js"></script>
    <script src="js/graph.js"></script>
</body>
</html>
