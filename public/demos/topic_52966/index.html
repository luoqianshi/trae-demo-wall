<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间刺客 - 打工人武器库 | TRAE创造力大赛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-primary': '#0a0a0f',
                        'bg-secondary': '#12121a',
                        'bg-card': '#1a1a25',
                        'accent-green': '#00ff88',
                        'accent-green-dark': '#00cc6a',
                        'accent-red': '#ff3366',
                        'accent-yellow': '#ffcc00',
                        'accent-purple': '#a855f7',
                        'text-primary': '#ffffff',
                        'text-secondary': '#9999aa',
                        'border-color': '#2a2a3a',
                    },
                    fontFamily: {
                        'orbitron': ['Orbitron', 'sans-serif'],
                        'noto': ['Noto Sans SC', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow-green': '0 0 20px rgba(0,255,136,0.3)',
                        'glow-green-lg': '0 0 40px rgba(0,255,136,0.4)',
                        'glow-red': '0 0 20px rgba(255,51,102,0.3)',
                        'glow-red-lg': '0 0 40px rgba(255,51,102,0.4)',
                        'glow-yellow': '0 0 20px rgba(255,204,0,0.3)',
                        'card': '0 4px 24px rgba(0,0,0,0.3)',
                    },
                    animation: {
                        'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
                        'title-glow': 'title-glow 3s ease-in-out infinite',
                        'zap': 'zap 0.3s ease-in-out infinite',
                        'fade-in': 'fade-in 0.5s ease-out forwards',
                        'fade-in-up': 'fade-in-up 0.5s ease-out forwards',
                        'fade-out': 'fade-out 0.5s ease-out forwards',
                        'spin-slow': 'spin 1.5s linear infinite',
                        'bg-pulse': 'bg-pulse 8s ease-in-out infinite',
                        'slide-up': 'slide-up 0.4s ease-out forwards',
                        'pop-in': 'pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards',
                    },
                    keyframes: {
                        'pulse-glow': { '0%,100%': { opacity: '1' }, '50%': { opacity: '0.5' } },
                        'title-glow': {
                            '0%,100%': { filter: 'brightness(1) drop-shadow(0 0 20px rgba(0,255,136,0.3))' },
                            '50%': { filter: 'brightness(1.3) drop-shadow(0 0 40px rgba(0,255,136,0.6))' },
                        },
                        'zap': { '0%,100%': { opacity: '1', transform: 'scale(1)' }, '50%': { opacity: '0.6', transform: 'scale(1.3)' } },
                        'fade-in': { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        'fade-in-up': { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        'fade-out': { '0%': { opacity: '1' }, '100%': { opacity: '0' } },
                        'bg-pulse': { '0%,100%': { opacity: '1' }, '50%': { opacity: '0.8' } },
                        'slide-up': { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        'pop-in': { '0%': { transform: 'scale(0) rotate(-15deg)', opacity: '0' }, '60%': { transform: 'scale(1.15) rotate(2deg)' }, '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' } },
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glow-bg {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background:
                radial-gradient(circle at 30% 20%, rgba(0,255,136,0.04) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255,51,102,0.03) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(168,85,247,0.03) 0%, transparent 40%);
            pointer-events: none; z-index: 0;
            animation: bg-pulse 8s ease-in-out infinite;
        }

        @keyframes bg-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }

        .grid-bg {
            position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.03;
            background-image:
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .reclaim-counter {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%) scale(0);
            font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: 900;
            color: #00ff88; text-shadow: 0 0 30px rgba(0,255,136,0.8);
            z-index: 3000; pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .reclaim-counter.visible { transform: translate(-50%,-50%) scale(1); }
        .reclaim-counter.hidden { transform: translate(-50%,-50%) scale(0); }

        .particles-container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 4000;
        }
        .particle {
            position: absolute; border-radius: 50%; opacity: 0;
            animation: particle-burst 1s ease-out forwards;
        }
        @keyframes particle-burst {
            0% { opacity: 1; transform: scale(1) translate(0,0); }
            100% { opacity: 0; transform: scale(0) translate(var(--tx),var(--ty)); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #12121a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9999aa; }

        .stat-card-inner {
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .stat-card:hover .stat-card-inner {
            transform: translateY(-4px);
        }

        .record-item {
            animation: fade-in-up 0.3s ease-out forwards;
        }

        .quick-tag {
            transition: all 0.2s ease;
        }
        .quick-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,255,136,0.2);
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="grid-bg"></div>
    <div class="particles-container" id="particles"></div>
    <div class="reclaim-counter" id="reclaim-counter">+0</div>

    <!-- Onboarding -->
    <div class="fixed inset-0 bg-bg-primary flex flex-col items-center justify-center p-6 z-[5000] text-center" id="onboarding">
        <div class="animate-fade-in">
            <div class="font-orbitron text-5xl md:text-7xl font-black mb-4">
                <span class="bg-gradient-to-r from-accent-green via-white to-accent-red bg-clip-text text-transparent animate-title-glow">
                    时间刺客
                </span>
            </div>
            <div class="text-text-secondary text-xl mb-12">⚔️ 打工人武器库 | 夺回属于你的时间</div>

            <div class="flex gap-8 mb-12 flex-wrap justify-center">
                <div class="w-[160px] animate-fade-in" style="animation-delay: 0.1s">
                    <div class="text-5xl mb-3">⚡</div>
                    <div class="font-semibold text-white mb-1">一键记录</div>
                    <div class="text-sm text-text-secondary leading-relaxed">被打断时点击按钮，快速记录时间刺客</div>
                </div>
                <div class="w-[160px] animate-fade-in" style="animation-delay: 0.2s">
                    <div class="text-5xl mb-3">🎯</div>
                    <div class="font-semibold text-white mb-1">自动抢回</div>
                    <div class="text-sm text-text-secondary leading-relaxed">AI从低效时段智能挤出时间补偿你</div>
                </div>
                <div class="w-[160px] animate-fade-in" style="animation-delay: 0.3s">
                    <div class="text-5xl mb-3">📊</div>
                    <div class="font-semibold text-white mb-1">生成报告</div>
                    <div class="text-sm text-text-secondary leading-relaxed">每周生成时间刺客报告，助你准时下班</div>
                </div>
            </div>

            <button onclick="hideOnboarding()" class="animate-fade-in font-orbitron text-xl font-black px-16 py-5 bg-gradient-to-r from-accent-green to-accent-green-dark rounded-full text-bg-primary hover:scale-110 active:scale-95 transition-all duration-300 shadow-glow-green-lg tracking-wider" style="animation-delay: 0.4s">
                开始体验
            </button>
        </div>
    </div>

    <!-- Main App -->
    <div class="max-w-6xl mx-auto px-4 relative z-10 hidden" id="app-container">
        <header class="text-center py-8 animate-fade-in">
            <h1 class="font-orbitron text-4xl md:text-5xl font-black tracking-wider mb-3">
                <span class="bg-gradient-to-r from-accent-green via-white to-accent-red bg-clip-text text-transparent animate-title-glow">
                    时间刺客
                </span>
            </h1>
            <p class="text-text-secondary text-lg">⚔️ 打工人武器库 | 夺回属于你的时间</p>
        </header>

        <!-- Stats -->
        <div class="flex justify-center gap-4 md:gap-8 flex-wrap mb-10">
            <div class="stat-card bg-bg-card border border-border-color rounded-2xl p-5 md:p-7 min-w-[180px] text-center relative overflow-hidden shadow-card cursor-default" style="animation: fade-in-up 0.4s ease-out forwards; animation-delay: 0.1s">
                <div class="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-transparent via-accent-red to-transparent"></div>
                <div class="stat-card-inner">
                    <div class="text-2xl mb-2">💥</div>
                    <div class="font-orbitron text-4xl font-black text-accent-red" id="steal-count">0</div>
                    <div class="text-text-secondary mt-2 text-sm">今日被偷次数</div>
                </div>
            </div>
            <div class="stat-card bg-bg-card border border-border-color rounded-2xl p-5 md:p-7 min-w-[180px] text-center relative overflow-hidden shadow-card cursor-default" style="animation: fade-in-up 0.4s ease-out forwards; animation-delay: 0.2s">
                <div class="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-transparent via-accent-green to-transparent"></div>
                <div class="stat-card-inner">
                    <div class="text-2xl mb-2">✅</div>
                    <div class="font-orbitron text-4xl font-black text-accent-green" id="reclaim-count">0</div>
                    <div class="text-text-secondary mt-2 text-sm">已抢回分钟</div>
                </div>
            </div>
            <div class="stat-card bg-bg-card border border-border-color rounded-2xl p-5 md:p-7 min-w-[180px] text-center relative overflow-hidden shadow-card cursor-default" style="animation: fade-in-up 0.4s ease-out forwards; animation-delay: 0.3s">
                <div class="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-transparent via-accent-yellow to-transparent"></div>
                <div class="stat-card-inner">
                    <div class="text-2xl mb-2">🏆</div>
                    <div class="font-orbitron text-4xl font-black text-accent-yellow" id="achievement-count">0</div>
                    <div class="text-text-secondary mt-2 text-sm">已解锁成就</div>
                </div>
            </div>
        </div>

        <!-- Steal Button -->
        <div class="text-center mb-12" style="animation: fade-in-up 0.4s ease-out forwards; animation-delay: 0.4s">
            <button onclick="openStealModal()" id="steal-btn" class="group font-orbitron text-xl md:text-2xl font-black px-14 md:px-24 py-6 bg-gradient-to-r from-accent-red via-[#cc0044] to-[#990033] rounded-full text-white cursor-pointer transition-all duration-300 hover:scale-105 active:scale-95 shadow-glow-red-lg relative overflow-hidden uppercase tracking-wider">
                <span class="relative z-10">又被偷了</span>
                <span class="relative z-10 ml-3 animate-zap inline-block">⚡</span>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
            </button>
        </div>

        <!-- Schedule -->
        <div class="bg-bg-card border border-border-color rounded-2xl p-6 md:p-8 mb-8 relative shadow-card" style="animation: fade-in-up 0.4s ease-out forwards; animation-delay: 0.5s">
            <div class="absolute top-[72px] left-6 right-6 h-[2px] bg-bg-secondary rounded-full z-0">
                <div class="h-full bg-gradient-to-r from-accent-red via-accent-yellow to-accent-green rounded-full transition-all duration-1000" id="time-progress" style="width: 0%"></div>
            </div>
            <div class="font-orbitron text-lg text-text-secondary mb-6 pl-3 border-l-4 border-accent-green flex items-center gap-3 relative z-10">
                📅 今日日程
                <span class="font-noto font-normal text-sm text-text-secondary opacity-60">(点击标记低效时段)</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 relative z-10" id="schedule-container"></div>
        </div>

        <!-- Records -->
        <div class="bg-bg-card border border-border-color rounded-2xl p-6 md:p-8 mb-8 shadow-card" style="animation: fade-in-up 0.4s ease-out forwards; animation-delay: 0.6s">
            <div class="font-orbitron text-lg text-text-secondary mb-6 pl-3 border-l-4 border-accent-green flex items-center gap-3">
                📝 被偷记录
            </div>
            <div class="max-h-[350px] overflow-y-auto space-y-3" id="records-container"></div>
        </div>

        <!-- Report -->
        <div class="bg-bg-card border border-border-color rounded-2xl p-6 md:p-8 mb-8 shadow-card" style="animation: fade-in-up 0.4s ease-out forwards; animation-delay: 0.7s">
            <div class="font-orbitron text-lg text-text-secondary mb-6 pl-3 border-l-4 border-accent-green flex items-center gap-3">
                📊 时间刺客报告
            </div>
            <button onclick="generateReport()" id="generate-report-btn" class="font-orbitron text-lg font-black px-12 py-4 bg-gradient-to-r from-accent-green to-accent-green-dark rounded-full text-bg-primary cursor-pointer transition-all duration-300 hover:scale-105 active:scale-95 shadow-glow-green mb-6">
                生成周报
            </button>
            <div class="bg-bg-secondary rounded-xl p-10 text-center text-text-secondary" id="report-content">
                <div class="text-5xl mb-4 opacity-40">📈</div>
                <p>点击上方按钮生成你的专属时间刺客报告</p>
            </div>
        </div>

        <footer class="text-center py-10 text-text-secondary">
            <p>时间刺客 - 让每一分钟都有价值</p>
            <div class="inline-flex items-center gap-2 bg-accent-purple/10 border border-accent-purple/30 px-5 py-2 rounded-full mt-3 text-sm text-accent-purple">
                TRAE AI创造力大赛
            </div>
        </footer>
    </div>

    <!-- Steal Modal -->
    <div class="fixed inset-0 bg-black/90 flex items-center justify-center z-[1000] opacity-0 pointer-events-none transition-opacity duration-300" id="steal-modal">
        <div class="bg-bg-card border border-border-color rounded-3xl p-8 w-[90%] max-w-[480px] transform transition-all duration-300 shadow-glow-red-lg" id="steal-modal-content">
            <h3 class="font-orbitron text-2xl text-accent-red text-center mb-6">⚡ 记录被偷时间</h3>

            <div class="flex flex-wrap gap-2 mb-6 justify-center" id="quick-tags">
                <button onclick="quickFill('同事问问题', 15)" class="quick-tag bg-bg-secondary border border-border-color hover:border-accent-green text-text-secondary hover:text-accent-green text-sm px-4 py-2 rounded-full transition-all">同事问问题</button>
                <button onclick="quickFill('临时会议', 30)" class="quick-tag bg-bg-secondary border border-border-color hover:border-accent-green text-text-secondary hover:text-accent-green text-sm px-4 py-2 rounded-full transition-all">临时会议</button>
                <button onclick="quickFill('微信消息', 10)" class="quick-tag bg-bg-secondary border border-border-color hover:border-accent-green text-text-secondary hover:text-accent-green text-sm px-4 py-2 rounded-full transition-all">微信消息</button>
                <button onclick="quickFill('老板找谈话', 25)" class="quick-tag bg-bg-secondary border border-border-color hover:border-accent-green text-text-secondary hover:text-accent-green text-sm px-4 py-2 rounded-full transition-all">老板找谈话</button>
                <button onclick="quickFill('需求变更', 40)" class="quick-tag bg-bg-secondary border border-border-color hover:border-accent-green text-text-secondary hover:text-accent-green text-sm px-4 py-2 rounded-full transition-all">需求变更</button>
                <button onclick="quickFill('邮件回复', 12)" class="quick-tag bg-bg-secondary border border-border-color hover:border-accent-green text-text-secondary hover:text-accent-green text-sm px-4 py-2 rounded-full transition-all">邮件回复</button>
            </div>

            <form onsubmit="handleStealSubmit(event)" class="flex flex-col gap-5">
                <div class="flex flex-col gap-2">
                    <label class="font-semibold text-text-secondary text-sm">什么事打断了你？</label>
                    <input type="text" id="steal-title" placeholder="输入打断原因..." class="bg-bg-secondary border-2 border-border-color rounded-xl px-5 py-4 text-white text-lg focus:outline-none focus:border-accent-green transition-colors" required>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-semibold text-text-secondary text-sm">被偷走了多久？（分钟）</label>
                    <input type="number" id="steal-duration" min="1" max="480" placeholder="30" class="bg-bg-secondary border-2 border-border-color rounded-xl px-5 py-4 text-white text-lg focus:outline-none focus:border-accent-green transition-colors" required>
                </div>
                <div class="flex gap-4 mt-2">
                    <button type="button" onclick="closeStealModal()" class="flex-1 px-6 py-4 bg-bg-secondary text-text-secondary border-2 border-border-color rounded-xl font-semibold hover:border-text-secondary hover:text-white transition-all">
                        取消
                    </button>
                    <button type="submit" class="flex-1 px-6 py-4 bg-gradient-to-r from-accent-green to-accent-green-dark text-bg-primary rounded-xl font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-glow-green">
                        确认被偷
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Achievement Modal -->
    <div class="fixed inset-0 bg-black/95 flex items-center justify-center z-[2000] opacity-0 pointer-events-none transition-opacity duration-500" id="achievement-modal">
        <div class="bg-gradient-to-b from-bg-card via-bg-primary to-bg-card border-[3px] border-accent-yellow rounded-[30px] p-10 text-center max-w-[420px] w-[90%]" id="achievement-card">
            <div class="text-7xl mb-6" id="achievement-emoji">🏆</div>
            <h2 class="font-orbitron text-3xl text-accent-yellow mb-4" id="achievement-title">解锁称号</h2>
            <p class="text-text-secondary text-lg mb-8 leading-relaxed" id="achievement-desc">恭喜你获得新成就！</p>
            <button onclick="closeAchievement()" class="w-14 h-14 rounded-full bg-transparent border-2 border-border-color text-text-secondary text-2xl hover:border-white hover:text-white hover:scale-110 transition-all">×</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY_RECORDS = 'ta_v2_records';
        const STORAGE_KEY_SCHEDULE = 'ta_v2_schedule';
        const STORAGE_KEY_ACHIEVEMENTS = 'ta_v2_achievements';
        const STORAGE_KEY_RECLAIMED_TOTAL = 'ta_v2_reclaimed_total';
        const STORAGE_KEY_ONBOARDING = 'ta_v2_onboarding';
        const STORAGE_KEY_DEMO_LOADED = 'ta_v2_demo_loaded';

        const ACHIEVEMENTS = [
            { threshold: 5, title: '时间管理新手', emoji: '🌱', desc: '累计抢回5分钟，开始觉醒！' },
            { threshold: 15, title: '刺客猎手', emoji: '🎯', desc: '累计抢回15分钟，初露锋芒！' },
            { threshold: 30, title: '时间管理大师', emoji: '🏆', desc: '累计抢回30分钟，大师风范！' },
            { threshold: 60, title: '刺客终结者', emoji: '💀', desc: '累计抢回1小时，刺客闻风丧胆！' },
            { threshold: 120, title: '准时下班人', emoji: '🚪', desc: '累计抢回2小时，准时下班不是梦！' }
        ];

        const INITIAL_SCHEDULE = [
            { id: 1, time: '09:00-10:00', activity: '晨会', efficiency: 'normal', reclaimed: 0 },
            { id: 2, time: '10:00-12:00', activity: '专注工作', efficiency: 'normal', reclaimed: 0 },
            { id: 3, time: '12:00-13:30', activity: '午休', efficiency: 'low', reclaimed: 0 },
            { id: 4, time: '13:30-15:30', activity: '下午工作', efficiency: 'low', reclaimed: 0 },
            { id: 5, time: '15:30-16:00', activity: '下午茶', efficiency: 'low', reclaimed: 0 },
            { id: 6, time: '16:00-18:00', activity: '收尾工作', efficiency: 'normal', reclaimed: 0 }
        ];

        const DEMO_RECORDS = [
            { id: 1, title: '同事来问技术问题', duration: 15, timestamp: Date.now() - 6 * 86400000, reclaimed: 15 },
            { id: 2, title: '临时会议', duration: 30, timestamp: Date.now() - 5 * 86400000, reclaimed: 30 },
            { id: 3, title: '微信消息轰炸', duration: 10, timestamp: Date.now() - 4 * 86400000, reclaimed: 10 },
            { id: 4, title: '老板突然找谈话', duration: 25, timestamp: Date.now() - 3 * 86400000, reclaimed: 25 },
            { id: 5, title: '需求变更讨论', duration: 40, timestamp: Date.now() - 2 * 86400000, reclaimed: 40 },
            { id: 6, title: '邮件回复', duration: 12, timestamp: Date.now() - 1 * 86400000, reclaimed: 12 },
            { id: 7, title: '客户紧急沟通', duration: 20, timestamp: Date.now() - 5 * 3600000, reclaimed: 20 },
            { id: 8, title: '代码审查', duration: 18, timestamp: Date.now() - 2 * 3600000, reclaimed: 18 }
        ];

        function loadRecords() {
            try { const d = localStorage.getItem(STORAGE_KEY_RECORDS); return d ? JSON.parse(d) : []; } catch { return []; }
        }
        function saveRecords(r) { localStorage.setItem(STORAGE_KEY_RECORDS, JSON.stringify(r)); }
        function loadSchedule() {
            try { const d = localStorage.getItem(STORAGE_KEY_SCHEDULE); return d ? JSON.parse(d) : JSON.parse(JSON.stringify(INITIAL_SCHEDULE)); } catch { return JSON.parse(JSON.stringify(INITIAL_SCHEDULE)); }
        }
        function saveSchedule(s) { localStorage.setItem(STORAGE_KEY_SCHEDULE, JSON.stringify(s)); }
        function loadAchievements() {
            try { const d = localStorage.getItem(STORAGE_KEY_ACHIEVEMENTS); return d ? JSON.parse(d) : []; } catch { return []; }
        }
        function saveAchievements(a) { localStorage.setItem(STORAGE_KEY_ACHIEVEMENTS, JSON.stringify(a)); }
        function getReclaimedTotal() {
            try { return parseInt(localStorage.getItem(STORAGE_KEY_RECLAIMED_TOTAL)) || 0; } catch { return 0; }
        }
        function setReclaimedTotal(t) { localStorage.setItem(STORAGE_KEY_RECLAIMED_TOTAL, t.toString()); }

        function initDemoData() {
            if (localStorage.getItem(STORAGE_KEY_DEMO_LOADED)) return;
            saveRecords(JSON.parse(JSON.stringify(DEMO_RECORDS)));
            saveAchievements(['时间管理新手', '刺客猎手', '时间管理大师']);
            setReclaimedTotal(170);
            const sch = JSON.parse(JSON.stringify(INITIAL_SCHEDULE));
            sch[2].reclaimed = 30;
            sch[3].reclaimed = 60;
            sch[4].reclaimed = 25;
            saveSchedule(sch);
            localStorage.setItem(STORAGE_KEY_DEMO_LOADED, 'true');
        }

        function showOnboarding() {
            if (localStorage.getItem(STORAGE_KEY_ONBOARDING)) {
                document.getElementById('onboarding').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
            } else {
                document.getElementById('onboarding').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        }

        function hideOnboarding() {
            const el = document.getElementById('onboarding');
            el.style.opacity = '1';
            el.style.transition = 'opacity 0.5s ease-out';
            el.style.opacity = '0';
            setTimeout(() => {
                el.classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                localStorage.setItem(STORAGE_KEY_ONBOARDING, 'true');
            }, 500);
        }

        function updateStats() {
            const records = loadRecords();
            const today = new Date().toDateString();
            const todayRecords = records.filter(r => new Date(r.timestamp).toDateString() === today);
            const stealCount = todayRecords.length;
            const reclaimedCount = todayRecords.filter(r => r.reclaimed > 0).reduce((s, r) => s + r.reclaimed, 0);
            const achievements = loadAchievements();

            animateNumber('steal-count', stealCount);
            animateNumber('reclaim-count', reclaimedCount);
            animateNumber('achievement-count', achievements.length);
            updateTimeProgress();
        }

        function animateNumber(elementId, to) {
            const el = document.getElementById(elementId);
            if (!el) return;
            const from = parseInt(el.textContent) || 0;
            if (from === to) { el.textContent = to; return; }
            const duration = 600;
            const start = performance.now();
            function tick(now) {
                const p = Math.min((now - start) / duration, 1);
                const eased = 1 - Math.pow(1 - p, 3);
                el.textContent = Math.round(from + (to - from) * eased);
                if (p < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        function updateTimeProgress() {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9, 0, 0);
            const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 18, 0, 0);
            const total = (end - start) / 60000;
            const elapsed = Math.max(0, Math.min(total, (now - start) / 60000));
            const bar = document.getElementById('time-progress');
            if (bar) bar.style.width = Math.min(100, (elapsed / total) * 100) + '%';
        }

        function renderSchedule() {
            const schedule = loadSchedule();
            const container = document.getElementById('schedule-container');
            container.innerHTML = schedule.map(block => {
                let borderClass = 'border-transparent hover:border-accent-green';
                let bgClass = '';
                let extraClass = '';
                if (block.efficiency === 'low') {
                    borderClass = 'border-accent-yellow/50';
                    bgClass = 'bg-accent-yellow/5';
                    extraClass = 'hover:shadow-glow-yellow';
                }
                if (block.reclaimed > 0) {
                    borderClass = 'border-accent-green/50';
                    bgClass = 'bg-accent-green/5';
                    extraClass = 'shadow-[0_0_15px_rgba(0,255,136,0.15)]';
                }

                const tags = [];
                if (block.efficiency === 'low') tags.push('<span class="inline-block bg-accent-yellow/20 text-accent-yellow text-xs px-3 py-1 rounded-full font-semibold mt-2">⏰ 可压缩</span>');
                if (block.reclaimed > 0) tags.push('<span class="inline-block bg-accent-green/20 text-accent-green text-xs px-3 py-1 rounded-full font-semibold mt-2 ml-1">✅ 抢回 ' + block.reclaimed + '分钟</span>');

                return `
                    <div onclick="toggleEfficiency(${block.id})" class="bg-bg-secondary rounded-xl p-5 cursor-pointer transition-all duration-300 border-2 ${borderClass} ${bgClass} ${extraClass} hover:-translate-y-1">
                        <div class="font-orbitron text-lg font-bold mb-2 ${block.efficiency === 'low' ? 'text-accent-yellow' : 'text-accent-green'}">${block.time}</div>
                        <div class="text-text-secondary text-sm">${block.activity}</div>
                        ${tags.join('')}
                    </div>
                `;
            }).join('');
        }

        function toggleEfficiency(id) {
            const schedule = loadSchedule();
            const block = schedule.find(b => b.id === id);
            if (block) {
                block.efficiency = block.efficiency === 'low' ? 'normal' : 'low';
                saveSchedule(schedule);
                renderSchedule();
            }
        }

        function renderRecords() {
            const records = loadRecords();
            const container = document.getElementById('records-container');
            if (records.length === 0) {
                container.innerHTML = '<div class="text-center text-text-secondary py-10"><div class="text-6xl mb-4 opacity-30">🕐</div><p class="text-lg">暂无被偷记录，今天是幸运的一天！</p></div>';
                return;
            }
            container.innerHTML = records.slice().reverse().map((record, i) => `
                <div class="record-item bg-bg-secondary rounded-xl p-5 border-l-[4px] transition-all duration-300 hover:translate-x-2 ${record.reclaimed > 0 ? 'border-accent-green' : 'border-accent-red'}" style="animation-delay: ${i * 0.05}s">
                    <div class="flex justify-between items-center gap-4">
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-white mb-1 truncate">${escapeHtml(record.title)}</div>
                            <div class="text-text-secondary text-xs">${new Date(record.timestamp).toLocaleString('zh-CN')}</div>
                        </div>
                        <div class="flex items-center gap-3 shrink-0">
                            <span class="font-orbitron text-lg font-bold px-3 py-1.5 rounded-full whitespace-nowrap ${record.reclaimed > 0 ? 'text-accent-green bg-accent-green/10' : 'text-accent-red bg-accent-red/10'}">-${record.duration}分钟</span>
                            <button onclick="event.stopPropagation(); deleteRecord(${record.id})" class="text-text-secondary hover:text-accent-red transition-colors text-lg leading-none" title="删除">×</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function deleteRecord(id) {
            const records = loadRecords().filter(r => r.id !== id);
            saveRecords(records);
            renderRecords();
            updateStats();
        }

        function createParticles(x, y) {
            const container = document.getElementById('particles');
            if (!container) return;
            const colors = ['#00ff88', '#ffcc00', '#ff3366', '#a855f7'];
            for (let i = 0; i < 24; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const angle = (Math.PI * 2 * i) / 24;
                const dist = 80 + Math.random() * 120;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                const size = 4 + Math.random() * 8;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                container.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        function showReclaimAnimation(amount) {
            const counter = document.getElementById('reclaim-counter');
            counter.textContent = '+' + amount;
            counter.classList.remove('hidden');
            counter.classList.add('visible');
            const btn = document.getElementById('steal-btn');
            if (btn) {
                const rect = btn.getBoundingClientRect();
                createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
            }
            setTimeout(() => {
                counter.classList.remove('visible');
                counter.classList.add('hidden');
            }, 1500);
        }

        function addStealRecord(title, duration) {
            const records = loadRecords();
            const newRecord = { id: Date.now(), title, duration: parseInt(duration), timestamp: Date.now(), reclaimed: 0 };
            records.push(newRecord);
            saveRecords(records);
            const reclaimAmount = reclaimTime(newRecord.duration);
            newRecord.reclaimed = reclaimAmount;
            saveRecords(records);
            showReclaimAnimation(reclaimAmount);
            checkAchievements();
            updateStats();
            renderRecords();
            renderSchedule();
        }

        function reclaimTime(duration) {
            const schedule = loadSchedule();
            let remaining = duration;
            const updated = schedule.map(block => {
                if (remaining <= 0 || block.efficiency !== 'low') return block;
                const parts = block.time.split('-');
                const [sh, sm] = parts[0].split(':').map(Number);
                const [eh, em] = parts[1].split(':').map(Number);
                const totalMin = (eh - sh) * 60 + (em - sm);
                const available = Math.floor(totalMin * 0.4);
                const reclaimable = Math.max(0, available - block.reclaimed);
                const amount = Math.min(remaining, reclaimable);
                if (amount > 0) { remaining -= amount; return { ...block, reclaimed: block.reclaimed + amount }; }
                return block;
            });
            saveSchedule(updated);
            setReclaimedTotal(getReclaimedTotal() + (duration - remaining));
            return duration - remaining;
        }

        function checkAchievements() {
            const total = getReclaimedTotal();
            const unlocked = loadAchievements();
            for (const a of ACHIEVEMENTS) {
                if (total >= a.threshold && !unlocked.includes(a.title)) {
                    unlocked.push(a.title);
                    saveAchievements(unlocked);
                    showAchievement(a);
                    break;
                }
            }
        }

        function showAchievement(achievement) {
            document.getElementById('achievement-emoji').textContent = achievement.emoji;
            document.getElementById('achievement-title').textContent = achievement.title;
            document.getElementById('achievement-desc').textContent = achievement.desc;
            const modal = document.getElementById('achievement-modal');
            const card = document.getElementById('achievement-card');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            card.classList.add('animate-pop-in');
            setTimeout(() => card.classList.remove('animate-pop-in'), 600);
        }

        function closeAchievement() {
            const modal = document.getElementById('achievement-modal');
            const card = document.getElementById('achievement-card');
            card.style.opacity = '0';
            card.style.transform = 'scale(0.5)';
            card.style.transition = 'all 0.3s ease-in';
            setTimeout(() => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                card.style.opacity = '';
                card.style.transform = '';
                card.style.transition = '';
            }, 300);
        }

        function openStealModal() {
            const modal = document.getElementById('steal-modal');
            const content = document.getElementById('steal-modal-content');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            content.style.transform = 'scale(0.9)';
            content.style.opacity = '0';
            requestAnimationFrame(() => {
                content.style.transform = 'scale(1)';
                content.style.opacity = '1';
            });
            document.getElementById('steal-title').focus();
        }

        function closeStealModal() {
            const modal = document.getElementById('steal-modal');
            const content = document.getElementById('steal-modal-content');
            content.style.transform = 'scale(0.9)';
            content.style.opacity = '0';
            setTimeout(() => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('steal-title').value = '';
                document.getElementById('steal-duration').value = '';
            }, 300);
        }

        function quickFill(title, duration) {
            document.getElementById('steal-title').value = title;
            document.getElementById('steal-duration').value = duration;
            document.getElementById('steal-title').focus();
        }

        function handleStealSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('steal-title').value.trim();
            const duration = document.getElementById('steal-duration').value;
            if (title && duration) {
                addStealRecord(title, duration);
                closeStealModal();
            }
        }

        function extractKeywords(text) {
            const keywords = [];
            const patterns = [
                /同事|老板|客户|产品|经理|朋友|家人/g,
                /会议|开会|讨论|汇报|评审|面试/g,
                /微信|消息|通知|电话|邮件|钉钉|飞书/g,
                /需求|变更|bug|测试|上线|发布/g,
                /问题|技术|代码|审查|文档/g,
                /午休|休息|下午茶|吃饭|喝水|上厕所/g,
            ];
            for (const pattern of patterns) {
                const matches = text.match(pattern);
                if (matches) keywords.push(...matches);
            }
            if (keywords.length === 0) {
                const words = text.split(/[\s,，。、]+/).filter(w => w.length >= 2);
                keywords.push(...words);
            }
            return keywords;
        }

        function generateKeywordCloud(keywordCounts) {
            const sorted = Object.entries(keywordCounts).sort((a, b) => b[1] - a[1]);
            if (sorted.length === 0) return '<span class="text-text-secondary">暂无数据</span>';
            const maxCount = sorted[0][1];
            return sorted.map(([word, count]) => {
                const ratio = count / maxCount;
                let cls = 'bg-[#2a2a3a]/40 text-text-secondary';
                if (ratio >= 0.7) cls = 'bg-accent-red/20 text-accent-red border border-accent-red/30';
                else if (ratio >= 0.4) cls = 'bg-accent-yellow/20 text-accent-yellow';
                const size = 0.75 + ratio * 0.5;
                return '<span class="inline-block px-4 py-2 rounded-full font-semibold m-1.5 transition-all hover:scale-110 ' + cls + '" style="font-size:' + size + 'rem">' + word + ' (' + count + ')</span>';
            }).join('');
        }

        function generateChartHtml(weekData) {
            const labels = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const allVals = [];
            Object.values(weekData).forEach(d => { allVals.push(d.lost); allVals.push(d.reclaimed); });
            const maxVal = Math.max(...allVals, 1);
            return labels.map((label, i) => {
                const d = weekData[i] || { lost: 0, reclaimed: 0 };
                const lostH = Math.max(4, (d.lost / maxVal) * 100);
                const recH = Math.max(4, (d.reclaimed / maxVal) * 100);
                return `
                    <div class="flex-1 flex flex-col items-center">
                        <div class="flex gap-[3px] w-full h-[100px] items-end justify-center">
                            <div class="flex-1 max-w-[22px] rounded-t-sm bg-gradient-to-t from-[#cc0044] to-accent-red transition-all duration-700" style="height:${lostH}%"></div>
                            <div class="flex-1 max-w-[22px] rounded-t-sm bg-gradient-to-t from-accent-green-dark to-accent-green transition-all duration-700" style="height:${recH}%"></div>
                        </div>
                        <div class="text-[10px] text-text-secondary mt-2">${label}</div>
                    </div>
                `;
            }).join('');
        }

        function getAdvice(keyword) {
            const map = {
                '会议': '设定"会议静默期"，每天上午10-12点不安排会议，专注处理核心工作。',
                '微信': '开启微信免打扰模式，每小时统一回复消息，避免随时被打断思路。',
                '消息': '开启消息免打扰模式，每小时统一回复，避免随时被打断思路。',
                '同事': '设立"办公室开放时间"，固定时段解答同事问题，其他时间专注工作。',
                '老板': '每周固定时间向老板汇报，减少临时沟通频率，提前预判需求。',
                '需求': '建立需求变更管理流程，固定时间评估讨论变更，避免打断开发节奏。',
                '邮件': '每天设定2-3个固定时段处理邮件，其他时间关闭邮件通知。',
                '客户': '设立客户服务窗口时间，统一处理客户咨询，提高效率。',
                '问题': '建立常见问题知识库，减少重复技术咨询，保护你的专注时间。',
                '代码': '设定代码审查固定时段，批量处理审查请求，避免碎片化打断。',
            };
            for (const [k, v] of Object.entries(map)) {
                if (keyword.includes(k)) return v;
            }
            return '分析时间刺客规律，设定固定的处理时间窗口，保持专注状态。';
        }

        function generateReport() {
            const btn = document.getElementById('generate-report-btn');
            const content = document.getElementById('report-content');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            content.innerHTML = `
                <div class="flex flex-col items-center gap-6 py-12">
                    <div class="w-12 h-12 border-4 border-border-color border-t-accent-green rounded-full animate-spin-slow"></div>
                    <div class="font-orbitron text-accent-green tracking-wider">正在分析时间刺客...</div>
                </div>
            `;

            setTimeout(() => {
                const records = loadRecords();
                const now = Date.now();
                const weekAgo = now - 7 * 86400000;
                const weekRecords = records.filter(r => r.timestamp >= weekAgo);

                const totalSteals = weekRecords.length;
                const totalLost = weekRecords.reduce((s, r) => s + r.duration, 0);
                const totalReclaimed = weekRecords.reduce((s, r) => s + r.reclaimed, 0);

                const keywordCounts = {};
                weekRecords.forEach(r => {
                    const kws = extractKeywords(r.title);
                    kws.forEach(w => { keywordCounts[w] = (keywordCounts[w] || 0) + 1; });
                });

                const maxKeyword = Object.entries(keywordCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '未知';

                const weekData = {};
                for (let i = 0; i < 7; i++) weekData[i] = { lost: 0, reclaimed: 0 };
                weekRecords.forEach(r => {
                    const dow = new Date(r.timestamp).getDay();
                    weekData[dow].lost += r.duration;
                    weekData[dow].reclaimed += r.reclaimed;
                });

                const earlyMin = Math.min(totalReclaimed, 180);
                const eh = Math.floor(earlyMin / 60);
                const em = earlyMin % 60;
                const earlyStr = (eh > 0 ? eh + 'h' : '') + (em > 0 ? em + 'm' : '') || '0m';

                const reclaimRate = totalLost > 0 ? Math.round((totalReclaimed / totalLost) * 100) : 0;

                content.innerHTML = `
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
                        <div class="bg-bg-secondary rounded-xl p-4 text-center border border-accent-red/20">
                            <div class="font-orbitron text-2xl font-black text-accent-red mb-1">${totalSteals}</div>
                            <div class="text-text-secondary text-xs">本周被打断次数</div>
                        </div>
                        <div class="bg-bg-secondary rounded-xl p-4 text-center border border-accent-red/20">
                            <div class="font-orbitron text-2xl font-black text-accent-red mb-1">${Math.round(totalLost / 60)}h${totalLost % 60 > 0 ? totalLost % 60 + 'm' : ''}</div>
                            <div class="text-text-secondary text-xs">累计损失时间</div>
                        </div>
                        <div class="bg-bg-secondary rounded-xl p-4 text-center border border-accent-green/20">
                            <div class="font-orbitron text-2xl font-black text-accent-green mb-1">${Math.round(totalReclaimed / 60)}h${totalReclaimed % 60 > 0 ? totalReclaimed % 60 + 'm' : ''}</div>
                            <div class="text-text-secondary text-xs">AI帮你抢回时间</div>
                        </div>
                        <div class="bg-bg-secondary rounded-xl p-4 text-center border border-accent-yellow/20">
                            <div class="font-orbitron text-2xl font-black text-accent-yellow mb-1">${reclaimRate}%</div>
                            <div class="text-text-secondary text-xs">挽回率</div>
                        </div>
                    </div>

                    <div class="bg-bg-secondary rounded-xl p-5 mb-6 border border-border-color">
                        <div class="font-semibold text-text-secondary mb-4 text-sm">📊 每日时间刺客统计</div>
                        <div class="flex gap-4 mb-4 justify-center">
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-gradient-to-t from-[#cc0044] to-accent-red"></div><span class="text-xs text-text-secondary">损失时间</span></div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-gradient-to-t from-accent-green-dark to-accent-green"></div><span class="text-xs text-text-secondary">抢回时间</span></div>
                        </div>
                        <div class="flex gap-1 h-[100px]">${generateChartHtml(weekData)}</div>
                    </div>

                    <div class="bg-bg-secondary rounded-xl p-5 mb-6 border border-border-color">
                        <div class="font-semibold text-text-secondary mb-4 text-sm">🔤 最大刺客关键词</div>
                        <div class="flex flex-wrap justify-center">${generateKeywordCloud(keywordCounts)}</div>
                    </div>

                    <div class="bg-gradient-to-r from-accent-green/10 to-accent-purple/10 rounded-xl p-6 border border-accent-green/20">
                        <div class="font-bold text-accent-green mb-3 flex items-center gap-2 text-sm">💡 针对「${maxKeyword}」的建议</div>
                        <div class="text-white leading-relaxed text-sm">${getAdvice(maxKeyword)}</div>
                    </div>

                    <div class="text-center text-text-secondary text-xs mt-4">可提前下班：${earlyStr}</div>
                `;
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }, 1500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDemoData();
            showOnboarding();
            updateStats();
            renderSchedule();
            renderRecords();
            setInterval(updateTimeProgress, 60000);
        });
    </script>
</body>
