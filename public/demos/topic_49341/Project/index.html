<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>少年渡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div id="app">
    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>

    <button id="audio-toggle" class="audio-toggle">🔊</button>

    <div id="start-screen" class="screen">
      <div class="start-bg"></div>
      <div class="start-overlay"></div>
      <div class="start-content">
        <h1 class="game-title">少年渡</h1>
        <p class="game-subtitle">一个关于成长的故事</p>
        <p class="game-desc">那些说不出口的话，走不出去的夜，<br>我们一起慢慢渡过。</p>
        <button id="start-btn" class="start-btn">开 始</button>
        <p class="start-hint">点击开始，走进少年的内心世界</p>
      </div>
    </div>

    <div id="game-screen" class="screen">
      <div id="scene-bg" class="scene-bg"></div>
      <div id="scene-bg-next" class="scene-bg scene-bg-next"></div>
      <div class="scene-overlay"></div>
      
      <div id="act-header" class="act-header">
        <h2 id="act-title" class="act-title"></h2>
      </div>

      <div id="poem-container" class="poem-container">
        <div class="poem-content">
          <div id="poem-lines"></div>
        </div>
        <div id="poem-hint" class="poem-hint"></div>
        <div id="poem-page" class="poem-page"></div>
      </div>

      <div id="video-container" class="video-container">
        <div class="video-subtitle-box">
          <p id="video-subtitle" class="video-subtitle"></p>
        </div>
        <div class="video-progress-bar">
          <div id="video-progress-fill" class="video-progress-fill"></div>
        </div>
        <div class="video-dots">
          <div id="video-dots" class="video-dots-inner"></div>
        </div>
        <p id="video-hint" class="video-hint">— 点击跳过 —</p>
      </div>

      <div id="choice-container" class="choice-container">
        <div class="choice-panel">
          <p id="choice-question" class="choice-question"></p>
          <div id="choice-options" class="choice-options"></div>
        </div>
      </div>

      <div id="reflection-container" class="reflection-container">
        <div class="reflection-panel">
          <div class="reflection-header">✦ 内心回响 ✦</div>
          <p id="reflection-text" class="reflection-text"></p>
          <button id="continue-btn" class="continue-btn">继续前行</button>
        </div>
      </div>
    </div>

    <div id="end-screen" class="screen">
      <div class="end-bg"></div>
      <div class="end-overlay"></div>
      <div class="end-container">
        <h2 id="end-title" class="end-title"></h2>
        <p id="end-subtitle" class="end-subtitle"></p>
        <div class="end-divider"></div>
        <p id="end-description" class="end-description"></p>

        <div class="badges-section">
          <h3 class="badges-title">获得徽章</h3>
          <div id="badges-container" class="badges-container"></div>
        </div>

        <div class="support-card">
          <div class="support-title">💛 温馨提示</div>
          <p class="support-text">
            本结局仅为模拟推演，不定义你的人生。<br>
            人生永远有重来与选择的机会。
          </p>
          <div class="hotline">
            <span class="hotline-number">12355</span>
            <span class="hotline-desc">青少年24小时服务热线</span>
          </div>
          <p class="support-text">
            若情绪低落，可拨打12355青少年24小时服务热线，<br>永远有人愿意接住你的情绪。
          </p>
        </div>

        <button id="restart-btn" class="restart-btn">重新开始</button>
      </div>
    </div>
  </div>

  <script src="data/act_home.js?v=2"></script>
  <script src="data/act_school.js?v=2"></script>
  <script src="data/act_people.js?v=2"></script>
  <script src="data/endings.js?v=2"></script>
  <script src="data/badges.js?v=2"></script>
  <script src="storage.js?v=2"></script>
  <script src="audio.js?v=2"></script>
  <script src="image_list.js?v=2"></script>
  <script src="image_config.js?v=2"></script>
  <script src="image.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
