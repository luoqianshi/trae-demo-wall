<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能体协作模拟 - OpenClaw</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-card: #0f1422;
            --bg-hover: #1a2235;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --good: #10b981;
            --warn: #f59e0b;
            --bad: #ef4444;
            --info: #60a5fa;
            --coord: #fbbf24;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ===== Layout ===== */
        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ===== Header ===== */
        .app-header {
            height: 56px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
        }

        .back-link:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        .header-title span {
            color: var(--accent);
        }

        /* ===== Scene Selector ===== */
        .scene-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .scene-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            margin-right: 4px;
        }

        .scene-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .scene-btn:hover:not(:disabled) {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        .scene-btn.active {
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(59,130,246,0.08));
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(59,130,246,0.15);
        }

        .scene-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .speed-control {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .speed-btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .speed-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .speed-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .replay-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: 12px;
        }

        .replay-btn:hover:not(:disabled) {
            background: var(--bg-hover);
            color: var(--accent);
            border-color: var(--accent);
        }

        .replay-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== Main Body ===== */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== Visualization Area ===== */
        .viz-area {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at center, rgba(59,130,246,0.04) 0%, transparent 70%);
            overflow: hidden;
        }

        .viz-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ===== Message Log Area ===== */
        .log-area {
            width: 420px;
            min-width: 320px;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .log-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .log-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .log-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-item {
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-item.new {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(59,130,246,0.1);
        }

        .log-time {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', SFMono-Regular, Menlo, monospace;
            margin-bottom: 4px;
        }

        .log-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .log-from, .log-to {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .log-arrow {
            font-size: 11px;
            color: var(--text-muted);
        }

        .log-type {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .log-type.data { background: rgba(96,165,250,0.15); color: var(--info); }
        .log-type.risk { background: rgba(239,68,68,0.15); color: var(--bad); }
        .log-type.analysis { background: rgba(16,185,129,0.15); color: var(--good); }
        .log-type.coord { background: rgba(251,191,36,0.15); color: var(--coord); }

        .log-content {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.5;
            word-break: break-word;
        }

        /* ===== Status Bar ===== */
        .status-bar {
            height: 36px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-size: 12px;
            color: var(--text-muted);
            flex-shrink: 0;
            gap: 20px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-dot.active {
            background: var(--good);
            box-shadow: 0 0 6px var(--good);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* ===== Responsive ===== */
        @media (max-width: 900px) {
            .app-body {
                flex-direction: column;
            }
            .log-area {
                width: 100%;
                height: 35%;
                min-height: 200px;
                border-left: none;
                border-top: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <a href="index.html" class="back-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                    返回首页
                </a>
                <div class="header-title"><span>OpenClaw</span> 智能体协作模拟</div>

        <!-- Scene Selector -->
        <div class="scene-bar">

                <button class="speed-btn" data-speed="4">4x</button>

        <!-- Main Body -->

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">就绪</span>
            </div>
            <span id="sceneDesc">场景A：盘前晨会模拟 - 投资总监召集各分析师汇报市场情况</span>
        </div>
    </div>

    <script>
    (function() {
        // ===== Configuration =====
        const CANVAS = document.getElementById('vizCanvas');
        const CTX = CANVAS.getContext('2d');
        const LOG_LIST = document.getElementById('logList');
        const LOG_COUNT = document.getElementById('logCount');
        const STATUS_DOT = document.getElementById('statusDot');
        const STATUS_TEXT = document.getElementById('statusText');
        const SCENE_DESC = document.getElementById('sceneDesc');
        const REPLAY_BTN = document.getElementById('replayBtn');

        let animationId = null;
        let isPlaying = false;
        let currentScene = 'A';
        let speedMultiplier = 1;
        let messageQueue = [];
        let activeMessages = [];
        let nodeFlash = {};
        let startTime = 0;
        let logEntries = [];

        // ===== Agent Definitions =====
        const AGENTS = {
            director: { name: '投资总监', color: '#3b82f6', glow: 'rgba(59,130,246,0.5)', size: 38, role: 'center' },
            macro: { name: '宏观分析师', color: '#8b5cf6', glow: 'rgba(139,92,246,0.4)', size: 24, role: 'perception' },
            sentiment: { name: '市场情绪分析师', color: '#06b6d4', glow: 'rgba(6,182,212,0.4)', size: 24, role: 'perception' },
            capital: { name: '资金流向分析师', color: '#10b981', glow: 'rgba(16,185,129,0.4)', size: 24, role: 'perception' },
            sector: { name: '行业轮动分析师', color: '#f59e0b', glow: 'rgba(245,158,11,0.4)', size: 24, role: 'analysis' },
            trend: { name: '趋势分析师', color: '#ec4899', glow: 'rgba(236,72,153,0.4)', size: 24, role: 'analysis' },
            value: { name: '价值筛选器', color: '#14b8a6', glow: 'rgba(20,184,166,0.4)', size: 24, role: 'analysis' },
            quant: { name: '量化策略师', color: '#f97316', glow: 'rgba(249,115,22,0.4)', size: 24, role: 'execution' },
            risk: { name: '风控官', color: '#ef4444', glow: 'rgba(239,68,68,0.4)', size: 24, role: 'execution' },
            trading: { name: '交易分析师', color: '#6366f1', glow: 'rgba(99,102,241,0.4)', size: 24, role: 'execution' },
            portfolio: { name: '组合经理', color: '#a855f7', glow: 'rgba(168,85,247,0.4)', size: 24, role: 'execution' },
            heat: { name: '市场热度分析师', color: '#eab308', glow: 'rgba(234,179,8,0.4)', size: 24, role: 'perception' }
        };

        // Scene-specific agent layouts
        const SCENE_AGENTS = {
            A: ['director', 'macro', 'sentiment', 'capital', 'sector', 'trend', 'value', 'quant', 'risk'],
            B: ['director', 'heat', 'risk', 'trading', 'portfolio'],
            C: ['director', 'value', 'trend', 'capital', 'risk', 'trading']
        };

        // ===== Scene Data =====
        const SCENES = {
            A: {
                name: '盘前晨会模拟',
                desc: '场景A：盘前晨会模拟 - 投资总监召集各分析师汇报市场情况',
                messages: [
                    { time: 0, from: 'director', to: 'all', type: 'coord', content: '晨会开始，请各分析师汇报' },
                    { time: 2000, from: 'macro', to: 'director', type: 'analysis', content: '宏观环境：货币政策宽松，利好成长' },
                    { time: 4000, from: 'sentiment', to: 'director', type: 'data', content: '情绪指数 65，偏乐观' },
                    { time: 6000, from: 'capital', to: 'director', type: 'data', content: '北向净流入 25 亿，科技板块为主' },
                    { time: 8000, from: 'sector', to: 'director', type: 'analysis', content: '半导体板块进入加速期' },
                    { time: 10000, from: 'trend', to: 'director', type: 'analysis', content: '大盘趋势偏强，支撑位 3350' },
                    { time: 12000, from: 'value', to: 'director', type: 'analysis', content: '发现 3 只低估值标的' },
                    { time: 14000, from: 'quant', to: 'director', type: 'data', content: '多因子信号：动量因子走强' },
                    { time: 16000, from: 'risk', to: 'director', type: 'risk', content: '组合风险可控，VaR 2.1%' },
                    { time: 18000, from: 'director', to: 'all', type: 'coord', content: '今日策略：加仓科技，关注半导体' }
                ]
            },
            B: {
                name: '盘中风控紧急响应',
                desc: '场景B：盘中风控紧急响应 - 市场异常波动时的紧急协作',
                messages: [
                    { time: 0, from: 'heat', to: 'risk', type: 'risk', content: '市场热度骤降，从 75 跌至 35' },
                    { time: 1500, from: 'risk', to: 'director', type: 'risk', content: '警告：市场进入恐慌区域' },
                    { time: 2500, from: 'risk', to: 'trading', type: 'risk', content: '【紧急】暂停买入操作' },
                    { time: 4000, from: 'trading', to: 'risk', type: 'coord', content: '收到，已暂停买入' },
                    { time: 5000, from: 'risk', to: 'portfolio', type: 'coord', content: '建议减仓至 50%' },
                    { time: 6500, from: 'director', to: 'all', type: 'coord', content: '确认风控指令，执行减仓' },
                    { time: 8000, from: 'portfolio', to: 'trading', type: 'coord', content: '卖出清单：A 股 x3，减仓 30%' },
                    { time: 12000, from: 'trading', to: 'portfolio', type: 'data', content: '执行完成，成交 3 笔' },
                    { time: 16000, from: 'risk', to: 'director', type: 'data', content: '减仓完成，组合风险降至正常' }
                ]
            },
            C: {
                name: '个股深度分析协作',
                desc: '场景C：个股深度分析协作 - 多智能体联合分析单只股票',
                messages: [
                    { time: 0, from: 'director', to: 'value', type: 'coord', content: '请分析 000001 平安银行' },
                    { time: 2000, from: 'value', to: 'director', type: 'analysis', content: 'PE 5.2，PB 0.6，估值偏低' },
                    { time: 4000, from: 'director', to: 'trend', type: 'coord', content: '请确认技术走势' },
                    { time: 6500, from: 'trend', to: 'director', type: 'analysis', content: 'MACD 金叉，突破 60 日线' },
                    { time: 8500, from: 'trend', to: 'capital', type: 'coord', content: '请确认资金配合' },
                    { time: 10500, from: 'capital', to: 'trend', type: 'data', content: '主力资金连续 3 日净流入' },
                    { time: 13000, from: 'capital', to: 'director', type: 'analysis', content: '资金面向好，建议关注' },
                    { time: 15500, from: 'director', to: 'risk', type: 'coord', content: '请评估风险' },
                    { time: 17500, from: 'risk', to: 'director', type: 'risk', content: '风险等级 2/5，建议仓位 10%' },
                    { time: 20000, from: 'director', to: 'trading', type: 'coord', content: '000001 买入信号，仓位 10%，止损 -8%' }
                ]
            }
        };

        const TYPE_LABELS = {
            data: '数据共享',
            risk: '风控告警',
            analysis: '分析结论',
            coord: '协调指令'
        };

        const TYPE_COLORS = {
            data: '#60a5fa',
            risk: '#ef4444',
            analysis: '#10b981',
            coord: '#fbbf24'
        };

        // ===== Canvas Setup =====
        function resizeCanvas() {
            const rect = CANVAS.parentElement.getBoundingClientRect();
            CANVAS.width = rect.width * window.devicePixelRatio;
            CANVAS.height = rect.height * window.devicePixelRatio;
            CTX.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ===== Agent Position Calculation =====
        function getAgentPositions() {
            const rect = CANVAS.parentElement.getBoundingClientRect();
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            const agents = SCENE_AGENTS[currentScene];
            const radius = Math.min(rect.width, rect.height) * 0.32;
            const positions = {};

            // Director at center
            positions['director'] = { x: cx, y: cy };

            // Others in circle
            const outerAgents = agents.filter(a => a !== 'director');
            const count = outerAgents.length;
            outerAgents.forEach((key, i) => {
                const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
                positions[key] = {
                    x: cx + Math.cos(angle) * radius,
                    y: cy + Math.sin(angle) * radius
                };
            });

            return positions;
        }

        // ===== Drawing Functions =====
        function drawGlow(x, y, radius, color, intensity) {
            const gradient = CTX.createRadialGradient(x, y, 0, x, y, radius * 2.5);
            gradient.addColorStop(0, color.replace(/[\d.]+\)$/, intensity + ')'));
            gradient.addColorStop(1, 'transparent');
            CTX.fillStyle = gradient;
            CTX.beginPath();
            CTX.arc(x, y, radius * 2.5, 0, Math.PI * 2);
            CTX.fill();
        }

        function drawNode(key, pos, flashIntensity) {
            const agent = AGENTS[key];
            const flash = nodeFlash[key] || 0;
            const intensity = Math.max(flash, flashIntensity || 0);

            // Glow
            if (intensity > 0) {
                drawGlow(pos.x, pos.y, agent.size, agent.glow, intensity * 0.6);
            }

            // Outer ring
            CTX.beginPath();
            CTX.arc(pos.x, pos.y, agent.size + 3, 0, Math.PI * 2);
            CTX.strokeStyle = agent.color;
            CTX.lineWidth = 2;
            CTX.globalAlpha = 0.3 + intensity * 0.7;
            CTX.stroke();
            CTX.globalAlpha = 1;

            // Main circle
            CTX.beginPath();
            CTX.arc(pos.x, pos.y, agent.size, 0, Math.PI * 2);
            CTX.fillStyle = agent.color;
            CTX.globalAlpha = 0.15 + intensity * 0.3;
            CTX.fill();
            CTX.globalAlpha = 1;

            // Inner circle
            CTX.beginPath();
            CTX.arc(pos.x, pos.y, agent.size * 0.6, 0, Math.PI * 2);
            CTX.fillStyle = agent.color;
            CTX.globalAlpha = 0.4 + intensity * 0.6;
            CTX.fill();
            CTX.globalAlpha = 1;

            // Label
            CTX.font = `600 ${agent.role === 'center' ? 13 : 11}px "PingFang SC", "Microsoft YaHei", sans-serif`;
            CTX.textAlign = 'center';
            CTX.textBaseline = 'top';
            CTX.fillStyle = intensity > 0.3 ? '#fff' : 'var(--text-secondary)';
            CTX.fillText(agent.name, pos.x, pos.y + agent.size + 10);
        }

        function drawConnection(from, to, progress, color) {
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Draw base line
            CTX.beginPath();
            CTX.moveTo(from.x, from.y);
            CTX.lineTo(to.x, to.y);
            CTX.strokeStyle = color || 'rgba(59,130,246,0.15)';
            CTX.lineWidth = 1.5;
            CTX.stroke();

            // Draw pulse
            if (progress >= 0 && progress <= 1) {
                const px = from.x + dx * progress;
                const py = from.y + dy * progress;

                // Pulse glow
                drawGlow(px, py, 8, color || 'rgba(59,130,246,0.5)', 0.5);

                // Pulse dot
                CTX.beginPath();
                CTX.arc(px, py, 5, 0, Math.PI * 2);
                CTX.fillStyle = color || '#3b82f6';
                CTX.fill();

                // Pulse ring
                CTX.beginPath();
                CTX.arc(px, py, 10, 0, Math.PI * 2);
                CTX.strokeStyle = (color || '#3b82f6').replace(')', ', 0.3)');
                CTX.lineWidth = 2;
                CTX.stroke();
            }
        }

        function render(timestamp) {
            const rect = CANVAS.parentElement.getBoundingClientRect();
            CTX.clearRect(0, 0, rect.width, rect.height);

            const positions = getAgentPositions();
            const agents = SCENE_AGENTS[currentScene];

            // Draw connections between all agents
            for (let i = 0; i < agents.length; i++) {
                for (let j = i + 1; j < agents.length; j++) {
                    const a = agents[i];
                    const b = agents[j];
                    if (positions[a] && positions[b]) {
                        CTX.beginPath();
                        CTX.moveTo(positions[a].x, positions[a].y);
                        CTX.lineTo(positions[b].x, positions[b].y);
                        CTX.strokeStyle = 'rgba(59,130,246,0.06)';
                        CTX.lineWidth = 1;
                        CTX.stroke();
                    }
                }
            }

            // Draw active message connections
            activeMessages.forEach(msg => {
                const fromPos = positions[msg.from];
                const toPos = msg.to === 'all' ? null : positions[msg.to];
                const color = TYPE_COLORS[msg.type];

                if (fromPos) {
                    if (msg.to === 'all') {
                        // Broadcast to all other agents
                        agents.forEach(key => {
                            if (key !== msg.from && positions[key]) {
                                drawConnection(fromPos, positions[key], msg.progress, color);
                            }
                        });
                    } else if (toPos) {
                        drawConnection(fromPos, toPos, msg.progress, color);
                    }
                }
            });

            // Draw nodes
            agents.forEach(key => {
                if (positions[key]) {
                    drawNode(key, positions[key]);
                }
            });

            // Update message progress
            if (isPlaying) {
                const now = performance.now();
                activeMessages = activeMessages.filter(msg => {
                    const elapsed = now - msg.startTime;
                    const duration = 1200 / speedMultiplier;
                    msg.progress = elapsed / duration;

                    // Flash nodes
                    if (msg.progress < 0.3) {
                        nodeFlash[msg.from] = Math.max(nodeFlash[msg.from] || 0, 1 - msg.progress / 0.3);
                    }
                    if (msg.progress > 0.7) {
                        const target = msg.to === 'all' ? SCENE_AGENTS[currentScene].filter(k => k !== msg.from) : [msg.to];
                        target.forEach(k => {
                            nodeFlash[k] = Math.max(nodeFlash[k] || 0, (msg.progress - 0.7) / 0.3);
                        });
                    }

                    return msg.progress <= 1;
                });

                // Decay node flash
                Object.keys(nodeFlash).forEach(key => {
                    nodeFlash[key] *= 0.92;
                    if (nodeFlash[key] < 0.01) delete nodeFlash[key];
                });
            }

            animationId = requestAnimationFrame(render);
        }

        // ===== Message Playback =====
        function addLogEntry(msg) {
            const typeLabel = TYPE_LABELS[msg.type];
            const typeClass = msg.type;
            const fromName = AGENTS[msg.from]?.name || msg.from;
            const toName = msg.to === 'all' ? '全员' : (AGENTS[msg.to]?.name || msg.to);

            const item = document.createElement('div');
            item.className = 'log-item new';
            item.innerHTML = `
                <div class="log-time">${msg.displayTime || ''}</div>
                <div class="log-meta">
                    <span class="log-from">${fromName}</span>
                    <span class="log-arrow">→</span>
                    <span class="log-to">${toName}</span>
                    <span class="log-type ${typeClass}">${typeLabel}</span>
                </div>
                <div class="log-content">${msg.content}</div>
            `;

            LOG_LIST.appendChild(item);
            logEntries.push(msg);
            LOG_COUNT.textContent = `${logEntries.length} 条消息`;

            // Auto scroll
            LOG_LIST.scrollTop = LOG_LIST.scrollHeight;

            // Remove highlight after animation
            setTimeout(() => {
                item.classList.remove('new');
            }, 1000);
        }

        function playScene(sceneKey) {
            if (isPlaying) return;

            const scene = SCENES[sceneKey];
            if (!scene) return;

            isPlaying = true;
            currentScene = sceneKey;
            activeMessages = [];
            nodeFlash = {};
            logEntries = [];
            LOG_LIST.innerHTML = '';
            LOG_COUNT.textContent = '0 条消息';

            STATUS_DOT.classList.add('active');
            STATUS_TEXT.textContent = '播放中...';
            SCENE_DESC.textContent = scene.desc;

            // Disable controls
            document.querySelectorAll('.scene-btn').forEach(btn => {
                btn.disabled = true;
            });
            REPLAY_BTN.disabled = true;

            // Schedule messages
            scene.messages.forEach((msg, index) => {
                const delay = msg.time / speedMultiplier;
                setTimeout(() => {
                    // Add to active messages for animation
                    activeMessages.push({
                        ...msg,
                        startTime: performance.now(),
                        progress: 0
                    });

                    // Add to log
                    addLogEntry(msg);

                    // Check if last message
                    if (index === scene.messages.length - 1) {
                        setTimeout(() => {
                            isPlaying = false;
                            STATUS_DOT.classList.remove('active');
                            STATUS_TEXT.textContent = '播放完成';
                            document.querySelectorAll('.scene-btn').forEach(btn => {
                                btn.disabled = false;
                            });
                            REPLAY_BTN.disabled = false;
                        }, 2000 / speedMultiplier);
                    }
                }, delay);
            });
        }

        // ===== Event Handlers =====
        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (isPlaying) return;
                const scene = this.dataset.scene;
                document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentScene = scene;
                playScene(scene);
            });
        });

        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                speedMultiplier = parseInt(this.dataset.speed);
            });
        });

        REPLAY_BTN.addEventListener('click', function() {
            if (isPlaying) return;
            playScene(currentScene);
        });

        // ===== Initialize =====
        animationId = requestAnimationFrame(render);

        // Auto-play scene A on load
        setTimeout(() => {
            playScene('A');
        }, 500);

    })();
    </script>
</body>
</html>
