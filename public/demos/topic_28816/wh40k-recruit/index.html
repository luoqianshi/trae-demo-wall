<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="战锤40K银河征兵中心 - 在第四十二个千年，唯有战争。选择你的阵营，为银河而战。">
  <title>战锤40K银河征兵中心 | Warhammer 40K Galactic Recruitment Center</title>

  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- 样式 -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>

  <!-- 加载动画 -->
  <div id="loading-screen">
    <div class="loading-icon">⚔️</div>
    <div class="loading-text">Galactic Recruitment Center</div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
    <div class="loading-status">正在接入星语通讯...</div>
  </div>

  <!-- 扫描线效果 -->
  <div class="scanline-effect"></div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <a class="navbar-brand" data-nav="home">
      <span class="brand-icon">⚔️</span>
      <span>银河征兵中心</span>
    </a>

    <ul class="navbar-links">
      <li><a href="#" data-nav="home" class="active">首页</a></li>
      <li><a href="#" data-nav="factions">阵营</a></li>
      <li><a href="#" data-nav="compare">对比</a></li>
      <li><a href="#" data-nav="quiz">测试</a></li>
      <li><a href="#" data-nav="enlist">报名</a></li>
      <li><a href="#" data-nav="survival">战损</a></li>
      <li><a href="#" data-nav="daily">抽签</a></li>
      <li><a href="#" data-nav="rank">军衔</a></li>
      <li><a href="#" data-nav="message">留言</a></li>
    </ul>

    <button class="navbar-toggle" aria-label="菜单">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- 移动端菜单 -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="#" data-nav="home" class="active">🏠 首页</a>
    <a href="#" data-nav="factions">🏛️ 阵营总览</a>
    <a href="#" data-nav="compare">⚖️ 征兵对比</a>
    <a href="#" data-nav="quiz">🧩 适配测试</a>
    <a href="#" data-nav="enlist">📋 征兵报名</a>
    <a href="#" data-nav="survival">💀 战损计算</a>
    <a href="#" data-nav="daily">🎲 每日抽签</a>
    <a href="#" data-nav="rank">🎖️ 军衔生成</a>
    <a href="#" data-nav="message">💬 留言板</a>
  </div>

  <!-- 页面容器 -->
  <div id="app">
    <div class="page active" id="page-home"></div>
    <div class="page" id="page-factions"></div>
    <div class="page" id="page-faction-detail"></div>
    <div class="page" id="page-compare"></div>
    <div class="page" id="page-quiz"></div>
    <div class="page" id="page-enlist"></div>
    <div class="page" id="page-survival"></div>
    <div class="page" id="page-daily"></div>
    <div class="page" id="page-rank"></div>
    <div class="page" id="page-message"></div>
  </div>

  <!-- 审判庭监控 -->
  <div class="inquisition-monitor" id="inquisition-monitor">
    <span class="monitor-dot"></span>
    审判庭监控中...
  </div>

  <!-- Toast 通知容器 -->
  <div class="toast-container" id="toast-container"></div>

  <!-- 数据层 -->
  <script src="js/data.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/generator.js"></script>

  <!-- 应用逻辑 -->
  <script src="js/app.js"></script>

</body>
</html>
