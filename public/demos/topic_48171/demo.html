<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>跬步 - 目标拆解助手</title>
  <style>
    /* 主题配色变量 - 暖棕高级色调 */
    :root {
      --color-primary: #92400e;
      --color-primary-light: #b45309;
      --color-primary-dark: #78350f;
      --color-primary-soft: #fef3c7;
      --color-primary-softer: #fffbeb;
      --color-secondary: #d97706;
      --color-secondary-light: #f59e0b;
      --color-secondary-soft: #fef3c7;
      --color-success: #059669;
      --color-success-light: #10b981;
      --color-success-soft: #d1fae5;
      --color-warning: #d97706;
      --color-error: #dc2626;
      --color-error-soft: #fee2e2;
      --color-bg-page: #fffbf5;
      --color-bg-card: #ffffff;
      --color-bg-hover: #fef7ed;
      --color-bg-input: #fef7ed;
      --color-text-primary: #451a03;
      --color-text-secondary: #78350f;
      --color-text-tertiary: #a16207;
      --color-text-disabled: #d6d3d1;
      --color-text-white: #ffffff;
      --color-border: #fef3c7;
      --color-divider: #fef3c7;
      /* 间距 */
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 24px;
      /* 圆角 */
      --radius-xs: 2px;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --radius-xl: 10px;
      --radius-button: 24px;
      --radius-round: 999px;
      /* 字体大小 */
      --font-size-xs: 11px;
      --font-size-sm: 12px;
      --font-size-md: 14px;
      --font-size-lg: 16px;
      --font-size-xl: 18px;
      --font-size-xxl: 20px;
      /* 按钮高度 */
      --button-height-sm: 32px;
      --button-height-md: 40px;
      --button-height-lg: 48px;
      /* 页面边距 */
      --page-padding: 16px;
      /* 阴影 */
      --shadow-card: 0 1px 6px rgba(0, 0, 0, 0.08);
      --shadow-card-hover: 0 2px 10px rgba(0, 0, 0, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--color-bg-page);
      color: var(--color-text-primary);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      line-height: 1.5;
    }
    .page { min-height: 100vh; padding-bottom: 80px; }
    
    /* 通用按钮样式 */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      line-height: normal;
      white-space: nowrap;
      box-sizing: border-box;
      cursor: pointer;
      border: none;
    }
    .btn::after { border: none; }
    .btn-primary {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      color: var(--color-text-white);
      font-weight: 600;
      border-radius: var(--radius-button);
      box-shadow: 0 4px 12px rgba(146, 64, 14, 0.3);
    }
    .btn-primary:active { opacity: 0.9; transform: scale(0.98); }
    .btn-block { width: 100%; }
    .btn-lg { height: var(--button-height-lg); font-size: var(--font-size-lg); }
    .btn-md { height: var(--button-height-md); font-size: var(--font-size-md); }
    
    /* Tab Bar */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--color-bg-card);
      border-top: 1px solid var(--color-divider);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 20px;
      z-index: 100;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--color-text-tertiary);
      font-size: 11px;
      cursor: pointer;
      padding: 4px 16px;
    }
    .tab-item.active { color: var(--color-primary); }
    .tab-icon { font-size: 22px; }

    /* ===== HOME PAGE ===== */
    .home-page {
      min-height: 100vh;
      background: linear-gradient(180deg, #eef2ff 0%, var(--color-bg-page) 30%);
      padding-bottom: 80px;
    }
    .home-header { padding: 30px var(--page-padding) 20px; }
    .home-greeting {
      font-size: var(--font-size-xxl);
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-xs);
    }
    .home-sub-greeting {
      font-size: var(--font-size-md);
      color: var(--color-text-secondary);
    }
    .input-section { padding: 0 var(--page-padding); margin-bottom: var(--spacing-xl); }
    .input-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-xl);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-card);
    }
    .input-label {
      font-size: var(--font-size-md);
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-md);
    }
    .textarea {
      width: 100%;
      min-height: 80px;
      padding: var(--spacing-md);
      background: var(--color-bg-input);
      border-radius: var(--radius-md);
      font-size: var(--font-size-md);
      color: var(--color-text-primary);
      line-height: 1.6;
      border: none;
      outline: none;
      resize: none;
    }
    .textarea-counter {
      text-align: right;
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
      margin-top: var(--spacing-xs);
    }
    .start-button {
      width: 100%;
      height: var(--button-height-lg);
      margin-top: var(--spacing-lg);
    }
    .start-button.disabled {
      background: var(--color-text-disabled);
      box-shadow: none;
    }
    .section-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-md);
    }
    .hot-section { padding: 0 var(--page-padding); }
    .tags-container {
      display: flex;
      overflow-x: auto;
      margin: 0 calc(-1 * var(--page-padding));
      padding: 0 var(--page-padding);
      gap: var(--spacing-md);
    }
    .tag-item {
      display: flex;
      align-items: center;
      padding: var(--spacing-sm) var(--spacing-lg);
      background: var(--color-bg-card);
      border-radius: var(--radius-round);
      box-shadow: var(--shadow-card);
      white-space: nowrap;
      cursor: pointer;
    }
    .tag-item:active { transform: scale(0.95); background: var(--color-primary-soft); }
    .tag-item.selected { background: var(--color-primary-soft); }
    .tag-text {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
    }
    .tag-item.selected .tag-text { color: var(--color-primary); font-weight: 500; }
    .category-section { padding: 0 var(--page-padding); margin-top: var(--spacing-xl); }
    .category-list { display: flex; flex-wrap: wrap; gap: var(--spacing-md); }
    .category-item {
      width: calc(50% - 6px);
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-card);
      cursor: pointer;
    }
    .category-item:active { transform: scale(0.98); }
    .category-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-bottom: var(--spacing-sm);
    }
    .category-name {
      font-size: var(--font-size-md);
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 2px;
    }
    .category-desc {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
    }
    .tip-section { padding: var(--spacing-xl) var(--page-padding); text-align: center; }
    .tip-text {
      font-size: var(--font-size-sm);
      color: var(--color-text-tertiary);
      line-height: 1.6;
    }

    /* ===== BOARD PAGE ===== */
    .board-header {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      padding: 20px var(--page-padding);
      padding-top: calc(20px + env(safe-area-inset-top));
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; flex-direction: column; }
    .streak-label {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 4px;
    }
    .streak-row { display: flex; align-items: baseline; }
    .streak-number {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .streak-unit {
      font-size: 14px;
      color: rgba(255,255,255,0.9);
      margin-left: 4px;
    }
    .streak-record {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 5px;
    }
    .task-count-card {
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 60px;
    }
    .task-count-text {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 3px;
    }
    .task-count-num {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .board-tabs {
      display: flex;
      background: var(--color-bg-card);
      padding: 0 var(--page-padding);
      border-bottom: 1px solid var(--color-divider);
    }
    .tab-item-board {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 0;
      position: relative;
      cursor: pointer;
    }
    .tab-item-board.active .tab-text-board {
      color: var(--color-primary);
      font-weight: 600;
    }
    .tab-item-board.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: var(--color-primary);
      border-radius: 2px;
    }
    .tab-text-board {
      font-size: 15px;
      color: var(--color-text-secondary);
    }
    .tab-badge {
      background: var(--color-primary);
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 4px;
    }
    .tab-badge-text {
      font-size: 11px;
      color: #fff;
      font-weight: 600;
    }
    .board-task-list {
      padding: var(--spacing-md) var(--page-padding);
      min-height: calc(100vh - 300px);
    }
    .board-card {
      background: var(--color-bg-card);
      border-radius: 10px;
      padding: 12px;
      position: relative;
      overflow: hidden;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .card-content { display: flex; align-items: center; }
    .card-left { margin-right: 10px; }
    .progress-ring {
      position: relative;
      width: 44px;
      height: 44px;
    }
    .progress-inner {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 38px;
      height: 38px;
      background: var(--color-bg-page);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .progress-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--color-primary);
    }
    .progress-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      z-index: 1;
    }
    .card-right { flex: 1; display: flex; flex-direction: column; }
    .card-task-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 6px;
    }
    .card-task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .step-info {
      font-size: 12px;
      color: var(--color-text-secondary);
    }
    .days-info {
      font-size: 12px;
      color: var(--color-primary);
      font-weight: 500;
    }
    .card-task-status {
      font-size: 11px;
      color: var(--color-text-tertiary);
    }
    .card-border {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }
    .card-border.border-draft { background: #f59e0b; }
    .card-border.border-active { background: var(--color-primary); }
    .card-border.border-recording { background: #10b981; }
    .card-border.border-completed { background: var(--color-success); }
    .board-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
    }
    .board-empty-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 8px;
    }
    .board-empty-desc {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 24px;
    }
    .fab {
      position: fixed;
      right: var(--page-padding);
      bottom: 90px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      box-shadow: 0 4px 16px rgba(146, 64, 14, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      border: none;
    }
    .fab:active { transform: scale(0.9); }
    .fab-icon {
      font-size: 24px;
      color: #fff;
      font-weight: 300;
    }

    /* ===== CHAT PAGE ===== */
    .chat-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-page);
    }
    .chat-header-bar {
      background: var(--color-bg-card);
      padding: 12px var(--page-padding);
      border-bottom: 1px solid var(--color-divider);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .back-btn { font-size: 20px; cursor: pointer; padding: 4px; }
    .chat-title-text { font-size: 17px; font-weight: 500; }
    .chat-area {
      flex: 1;
      padding: var(--spacing-md) var(--page-padding);
      overflow-y: auto;
      padding-bottom: 120px;
    }
    .message-item {
      display: flex;
      margin-bottom: var(--spacing-lg);
    }
    .message-item.user { flex-direction: row-reverse; }
    .chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--color-primary-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .message-item.user .chat-avatar { background: var(--color-secondary-soft); }
    .chat-avatar-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-primary);
    }
    .message-item.user .chat-avatar-text { color: var(--color-secondary); }
    .chat-bubble {
      max-width: 70%;
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: var(--radius-lg);
      margin: 0 var(--spacing-md);
      line-height: 1.6;
      word-break: break-all;
    }
    .message-item.assistant .chat-bubble {
      background: var(--color-bg-card);
      color: var(--color-text-primary);
      border-top-left-radius: 4px;
      box-shadow: var(--shadow-card);
    }
    .message-item.user .chat-bubble {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      color: var(--color-text-white);
      border-top-right-radius: 4px;
    }
    .chat-typing { display: inline-flex; align-items: center; padding: 2px 0; }
    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-text-tertiary);
      margin: 0 2px;
      animation: typing 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    .chat-input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--color-bg-card);
      padding: var(--spacing-md) var(--page-padding);
      padding-bottom: calc(var(--spacing-md) + env(safe-area-inset-bottom));
      border-top: 1px solid var(--color-divider);
      display: flex;
      align-items: flex-end;
      gap: var(--spacing-md);
      z-index: 100;
    }
    .chat-input-wrapper {
      flex: 1;
      background: var(--color-bg-input);
      border-radius: var(--radius-lg);
      padding: var(--spacing-sm) var(--spacing-md);
      max-height: 100px;
      overflow-y: auto;
    }
    .chat-textarea {
      width: 100%;
      min-height: 28px;
      font-size: var(--font-size-md);
      color: var(--color-text-primary);
      line-height: 1.5;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
    }
    .chat-send-btn {
      height: 40px;
      min-width: 60px;
      padding: 0 var(--spacing-lg);
    }
    .chat-send-btn.disabled { background: var(--color-text-disabled); }

    /* Step Card */
    .step-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      margin: var(--spacing-md) 0 var(--spacing-lg);
      box-shadow: var(--shadow-card);
      border: 1px solid var(--color-primary-soft);
    }
    .step-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
    }
    .step-progress-bar {
      width: 100%;
      height: 8px;
      background: var(--color-bg-input);
      border-radius: var(--radius-round);
      overflow: hidden;
      margin-bottom: var(--spacing-xs);
    }
    .step-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light));
      border-radius: var(--radius-round);
      transition: width 0.3s ease;
    }
    .step-index {
      font-size: var(--font-size-xs);
      color: var(--color-primary);
      background: var(--color-primary-soft);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      margin-right: var(--spacing-md);
    }
    .step-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .step-content { margin-bottom: var(--spacing-lg); }
    .step-suggestion, .step-explanation { margin-bottom: var(--spacing-md); }
    .step-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
      margin-bottom: 4px;
      display: block;
    }
    .step-text {
      font-size: var(--font-size-md);
      color: var(--color-text-primary);
      line-height: 1.6;
    }
    .next-button {
      width: 100%;
      height: var(--button-height-lg);
    }

    /* Complete Card */
    .complete-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      margin: var(--spacing-md) 0 var(--spacing-lg);
      box-shadow: var(--shadow-card);
      text-align: center;
    }
    .complete-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto var(--spacing-lg);
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .complete-check {
      width: 30px;
      height: 15px;
      border-left: 3px solid var(--color-text-white);
      border-bottom: 3px solid var(--color-text-white);
      transform: rotate(-45deg);
      margin-top: -5px;
    }
    .complete-title {
      font-size: var(--font-size-xl);
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-md);
    }
    .complete-summary {
      font-size: var(--font-size-md);
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-bottom: var(--spacing-lg);
    }
    .complete-steps {
      background: var(--color-bg-page);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }
    .complete-step {
      display: flex;
      align-items: center;
      padding: var(--spacing-sm) 0;
      border-bottom: 1px solid var(--color-divider);
    }
    .complete-step:last-child { border-bottom: none; }
    .complete-step-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--color-primary-soft);
      color: var(--color-primary);
      font-size: var(--font-size-xs);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: var(--spacing-md);
    }
    .complete-step-title {
      font-size: var(--font-size-sm);
      color: var(--color-text-primary);
    }
    .complete-actions {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-lg);
    }
    .continue-button {
      flex: 1;
      height: var(--button-height-lg);
      background: var(--color-bg-input);
      color: var(--color-primary);
      font-size: var(--font-size-md);
      font-weight: 500;
      border-radius: var(--radius-button);
      border: 2px solid var(--color-primary-soft);
    }
    .continue-button:active { opacity: 0.9; transform: scale(0.98); }
    .confirm-button {
      flex: 1;
      height: var(--button-height-lg);

    // Router
    let currentPage = 'home';
    let currentParams = {};

    function navigate(page, params = {}) {
      currentPage = page;
      currentParams = params;
      render();
    }

    // Utils
    function getToday() { return '2026-06-27'; }
    function getDaysSince(dateStr) {
      const start = new Date(dateStr);
      const now = new Date();
      return Math.floor((now - start) / (1000 * 60 * 60 * 24));
    }
    function generateCalendarDays(checkinDates) {
      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const firstDayWeek = firstDay.getDay();
      const days = [];
      const todayStr = getToday();
      const checkinSet = new Set(checkinDates || []);
      for (let i = 0; i < firstDayWeek; i++) days.push({ empty: true });
      for (let i = 1; i <= lastDay.getDate(); i++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        days.push({ day: i, date: dateStr, checkined: checkinSet.has(dateStr), isToday: dateStr === todayStr, isFuture: dateStr > todayStr });
      }
      return days;
    }

        window.chatMessages = [];

        window.isTyping = false;

        window.totalSteps = 8;

        window.isTyping = true;

        setTimeout(() => {
          window.chatMessages.push({ role: 'assistant', content: `${goal}啊，说说看，为什么想${goal}呢？是因为想变更好看，还是为了健康？或者有什么特别的原因？` });

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      window.chatMessages.push({ role: 'user', content: text });
      window.isTyping = true;
      renderChat();

      setTimeout(() => {
        if (window.stepHistory.length === 0) {
          const step = aiStepResponses[0];
          window.chatMessages.push({ role: 'assistant', content: `如果你是想${window.goal}，但却一直拖延，那你需要问问自己是不是真的想。想象一下，如果你因为拖延而错失机会、错失爱人、丢掉健康，想一想这是多么可怕的事。而如果你现在开始，想象一下你未来的美丽、健康和自信。种一棵树最好的时间是十年前，其次是现在。抛弃幻想，准备战斗吧！` });

          window.showStep = true;
          window.stepHistory.push(step);
          window.totalSteps = step.totalSteps || 8;
        } else {
          const idx = window.stepHistory.length;
          if (idx < aiStepResponses.length) {
            const step = aiStepResponses[idx];
            window.chatMessages.push({ role: 'assistant', content: `很好！你已经迈出了${idx}步，离目标又近了一步！${window.goal}不是一蹴而就的，每一步积累起来就是巨大的进步。继续坚持，你做得很棒！` });

    function completeStep() {
      const idx = window.stepHistory.length;
      window.isTyping = true;
      renderChat();

      setTimeout(() => {
        if (idx < aiStepResponses.length) {
          const step = aiStepResponses[idx];
          window.chatMessages.push({ role: 'assistant', content: `非常好！你已经完成了第${idx}步，${window.goal}正在一步步变为现实！记住，任何伟大的成就都始于一个小小的决定。继续加油！` });
          window.currentStep = step;
          window.stepHistory.push(step);
        } else {
          window.taskComplete = { summary: '太棒了！你已经完成了所有步骤的规划！', totalSteps: window.totalSteps };
          window.showStep = true;
          window.currentStep = null;
        }
        window.isTyping = false;
        renderChat();
      }, 1000);
    }

    function continuePlan() {
      window.taskComplete = null;
      window.showStep = false;
      window.chatMessages.push({ role: 'user', content: '继续，再给我一些步骤建议' });
      window.isTyping = true;
      renderChat();

      setTimeout(() => {
        const idx = window.stepHistory.length;
        if (idx < aiStepResponses.length) {
          const step = aiStepResponses[idx];
          window.currentStep = step;
          window.showStep = true;
          window.stepHistory.push(step);
        }
        window.isTyping = false;
        renderChat();
      }, 1500);
    }

    function confirmPlan() {
      const newTask = {
        _id: 'new_' + Date.now(),
        title: window.goal,
        status: 'active',
        currentStepIndex: 0,
        totalSteps: window.totalSteps,
        createdAt: getToday(),
        description: '为你量身定制的行动方案'
      };
      store.tasks.unshift(newTask);
      store.subtasks[newTask._id] = window.stepHistory.map((s, i) => ({
        _id: 'new_s' + i,
        title: s.title,
        description: s.suggestion,
        status: i === 0 ? 'current' : 'pending',
        sortOrder: i
      }));
      store.checkins[newTask._id] = [];
      navigate('detail', { taskId: newTask._id });
    }

      const task = store.tasks.find(t => t._id === taskId);

        navigate('board');
        return;
      }

      const checkins = store.checkins[taskId] || [];
      const progress = task.totalSteps > 0 ? Math.round((task.currentStepIndex / task.totalSteps) * 100) : 0;
      const currentSubtask = subtasks.find(s => s.status === 'current');
      const todayCheckined = checkins.includes(getToday());
      const calendarDays = generateCalendarDays(checkins);
      const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
      const currentMonth = new Date().getMonth() + 1;

      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="page" style="padding-bottom: 100px;">
          <div class="chat-header-bar">
            <span class="back-btn" onclick="navigate('board')">←</span>
            <span class="chat-title-text">${task.title}</span>

                  ${!day.empty ? `<div class="day-number">${day.day}</div>` : ''}

              `).join('')}
            </div>

              `}
            </div>
          </div>
          ` : ''}
          
          <div class="detail-section">
            <div class="detail-section-title">
              <span>任务清单</span>
              <span class="detail-section-subtitle">第 ${task.currentStepIndex + 1} / ${task.totalSteps} 步</span>
            </div>
            <div class="detail-subtask-list">
              <div class="timeline-line"></div>
              ${subtasks.sort((a, b) => a.sortOrder - b.sortOrder).map(st => `
                <div class="detail-subtask-item ${st.status === 'completed' ? 'completed' : st.status === 'current' ? 'current' : 'locked'}">
                  <div class="detail-subtask-header">
                    <span class="detail-subtask-name">${st.title}</span>
                    <span class="detail-subtask-status ${st.status === 'completed' ? 'completed' : st.status === 'current' ? 'current' : 'locked'}">
                      ${st.status === 'completed' ? '已完成' : st.status === 'current' ? '进行中' : '未解锁'}
                    </span>
                  </div>

            </div>
            
            ${currentSubtask ? `
              <button class="btn detail-complete-btn" onclick="completeCurrentTask('${taskId}')">✓ 完成当前任务</button>
            ` : ''}
          </div>
        </div>
      `;
    }

    function doCheckin(taskId) {
      const today = getToday();
      if (!store.checkins[taskId]) store.checkins[taskId] = [];
      if (!store.checkins[taskId].includes(today)) {
        store.checkins[taskId].push(today);
        store.user.currentStreak++;
      }
      showCelebrate(null);
      renderDetail();
    }

    function completeCurrentTask(taskId) {
      const subtasks = store.subtasks[taskId] || [];
      const task = store.tasks.find(t => t._id === taskId);
      const currentIdx = subtasks.findIndex(s => s.status === 'current');
      
      if (currentIdx >= 0) {
        subtasks[currentIdx].status = 'completed';
        if (currentIdx + 1 < subtasks.length) {
          subtasks[currentIdx + 1].status = 'current';
        }
        if (task) {
          task.currentStepIndex++;
          if (task.currentStepIndex >= task.totalSteps) {
            task.status = 'recording';
          }
        }
      }
      
      showCelebrate(taskId);
    }

    function showCelebrate(taskId) {
      const task = taskId ? store.tasks.find(t => t._id === taskId) : null;
      const nextSubtask = taskId ? (store.subtasks[taskId] || []).find(s => s.status === 'current') : null;
      
      const app = document.getElementById('app');
      const overlay = document.createElement('div');
      overlay.className = 'celebrate-overlay';
      overlay.id = 'celebrateModal';
      overlay.onclick = closeCelebrate;
      overlay.innerHTML = `
        <div class="celebrate-card" onclick="event.stopPropagation()">

            <div class="celebrate-dot"></div>
          </div>
          <div class="celebrate-title">太棒了！</div>

          </div>
          ${nextSubtask ? `
          <div class="next-task-card">
            <span class="next-task-label">下一步任务</span>
            <span class="next-task-name">${nextSubtask.title}</span>
            ${nextSubtask.description ? `<span class="next-task-desc">${nextSubtask.description}</span>` : ''}
          </div>
          ` : `
          <div class="complete-action-card">
            <span class="complete-action-title">下一步</span>
            <span class="complete-action-desc">这个目标已经完成，你可以：</span>
            <button class="btn complete-action-btn" onclick="closeCelebrate(); navigate('home')">创建新目标</button>
          </div>
          `}
          <button class="btn btn-primary btn-block celebrate-btn" onclick="closeCelebrate()">
            ${nextSubtask ? '继续挑战' : '返回任务板'}
          </button>
        </div>
      `;
      app.appendChild(overlay);
    }

    function closeCelebrate() {
      const modal = document.getElementById('celebrateModal');
      if (modal) modal.remove();
      renderDetail();
    }

    function addNewStep(taskId) {
      const subtasks = store.subtasks[taskId] || [];
      const nextIdx = subtasks.length;
      if (nextIdx < aiStepResponses.length) {
        const step = aiStepResponses[nextIdx];
        subtasks.push({
          _id: 's_new_' + Date.now(),
          title: step.title,
          description: step.suggestion,
          status: 'current',
          sortOrder: nextIdx
        });
        const task = store.tasks.find(t => t._id === taskId);
        if (task) {
          task.totalSteps++;
        }
      }
      renderDetail();
    }

    function completeGoal(taskId) {
      const task = store.tasks.find(t => t._id === taskId);
      if (task) {
        task.status = 'completed';
      }
      navigate('board');
    }

    function abandonGoal(taskId) {
      if (confirm('确定放弃吗？放弃后这个任务将不再提醒你，但记录会保留')) {
        const task = store.tasks.find(t => t._id === taskId);
        if (task) {
          task.status = 'abandoned';
        }
        navigate('board');
      }
    }

    function shareGoal(taskId) {
      alert('分享链接已生成！\n链接有效期7天');
    }

    function renderProfile() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="page">
          <div class="profile-header">
            <div class="profile-avatar">
              <div class="profile-avatar-text">👤</div>
            </div>
            <div class="profile-user-info">
              <div class="profile-nickname">${store.user.name}</div>
              <div class="profile-user-desc">每一步都是进步</div>
            </div>
          </div>
          
          <div class="stats-section">
            <div class="stat-item">
              <div class="stat-number">${store.user.currentStreak}</div>
              <div class="stat-label">连续打卡</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">${store.user.maxStreak}</div>
              <div class="stat-label">最长连续</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">${store.tasks.length}</div>
              <div class="stat-label">目标数</div>
            </div>
          </div>
          
          <div class="menu-section">
            <div class="menu-item" onclick="navigate('board')">
              <div class="menu-text">我的目标</div>
              <div class="menu-arrow">→</div>
            </div>
            <div class="menu-item">
              <div class="menu-text">使用说明</div>
              <div class="menu-arrow">→</div>
            </div>
            <div class="menu-item">
              <div class="menu-text">反馈建议</div>
              <div class="menu-arrow">→</div>
            </div>
          </div>
          
          <div class="menu-section">
            <div class="menu-item" style="justify-content: center;">
              <div class="menu-text" style="color: var(--color-text-tertiary); font-size: var(--font-size-xs);">
                跬步 v1.0.0<br>每一步都是进步
              </div>
            </div>
          </div>
        </div>
        ${renderTabBar()}
      `;
    }

    function renderTabBar() {
      return `
        <div class="tab-bar">
          <div class="tab-item ${currentPage === 'home' ? 'active' : ''}" onclick="navigate('home')">
            <span class="tab-icon">🏠</span>
            <span>首页</span>
          </div>
          <div class="tab-item ${currentPage === 'board' ? 'active' : ''}" onclick="navigate('board')">
            <span class="tab-icon">📋</span>
            <span>任务板</span>
          </div>
          <div class="tab-item ${currentPage === 'profile' ? 'active' : ''}" onclick="navigate('profile')">
            <span class="tab-icon">👤</span>
            <span>我的</span>
          </div>
        </div>
      `;
    }

    // Main render
    function render() {
      window.chatInitialized = false;
      switch (currentPage) {
        case 'home': renderHome(); break;
        case 'chat': renderChat(); break;
        case 'board': renderBoard(); break;
        case 'detail': renderDetail(); break;
        case 'profile': renderProfile(); break;
        default: renderHome();
      }
    }

    render();
  </script>
</body>
</html>
