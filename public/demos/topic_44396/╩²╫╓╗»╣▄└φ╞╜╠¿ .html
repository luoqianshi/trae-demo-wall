<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字化管理平台 — Demo 体验</title>
  <style>
    :root {
      --bg: #f5f7fa; --card: #fff;
      --text: #1a1a2e; --text2: #555; --text3: #999;
      --blue: #1890ff; --blue-light: #e6f7ff; --blue-dark: #096dd9;
      --green: #52c41a; --red: #ff4d4f; --orange: #fa8c16;
      --border: #e8e8e8; --shadow: 0 2px 12px rgba(0,0,0,.08);
      --radius: 10px; --radius-sm: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: #e8ecf1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    
    .page-title { text-align: center; padding: 30px 0 16px; }
    .page-title h1 { font-size: 24px; font-weight: 900; color: #1a1a2e; }
    .page-title p { font-size: 13px; color: #888; margin-top: 4px; }

    .demo-container { display: flex; gap: 30px; padding: 0 24px 40px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }

    /* 手机框架 */
    .phone-wrapper { text-align: center; }
    .phone-label { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .phone-label .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-user { background: #1890ff; }
    .dot-admin { background: #722ed1; }

    .phone {
      width: 375px; height: 700px; background: #fff;
      border-radius: 32px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.15), 0 0 0 1px rgba(0,0,0,.05);
      display: flex; flex-direction: column; position: relative;
    }
    .phone-status {
      height: 36px; background: #1890ff; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; color: #fff; font-size: 11px; font-weight: 600; flex-shrink: 0;
    }
    .phone-status.admin-bar { background: #722ed1; }
    .phone-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
    .phone-body::-webkit-scrollbar { width: 0; }

    /* 通用组件 */
    .screen { display: none; padding: 16px; min-height: 100%; }
    .screen.active { display: block; }
    .screen-title { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid #1890ff; }
    .screen-title.admin-title { border-bottom-color: #722ed1; }

    .card { background: #fff; border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--border); cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 12px; }
    .card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .card:active { transform: scale(.98); }
    .card-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .card-icon.blue { background: #e6f7ff; color: #1890ff; }
    .card-icon.green { background: #f6ffed; color: #52c41a; }
    .card-icon.orange { background: #fff7e6; color: #fa8c16; }
    .card-icon.purple { background: #f9f0ff; color: #722ed1; }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .card-desc { font-size: 11px; color: #999; margin-top: 2px; }
    .card-arrow { color: #ccc; font-size: 18px; flex-shrink: 0; }

    .btn {
      display: block; width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; text-align: center;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-primary:hover { background: #096dd9; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-submit { background: #52c41a; color: #fff; margin-top: 12px; }
    .btn-submit:hover { background: #389e0d; }
    .btn-back { background: #f5f5f5; color: #555; margin-top: 8px; }
    .btn-danger { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; }

    .form-item { margin-bottom: 12px; }
    .form-label { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; transition: border .2s; }
    .form-input:focus { border-color: #1890ff; }

    .checkbox-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .checkbox-item {
      display: flex; align-items: center; gap: 6px; padding: 8px 12px;
      background: #fafafa; border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; transition: all .2s; font-size: 13px; user-select: none;
    }
    .checkbox-item:hover { border-color: #1890ff; }
    .checkbox-item.checked { background: #e6f7ff; border-color: #1890ff; color: #1890ff; }
    .checkbox-box { width: 18px; height: 18px; border: 2px solid #d9d9d9; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all .2s; flex-shrink: 0; }
    .checkbox-item.checked .checkbox-box { background: #1890ff; border-color: #1890ff; color: #fff; }

    .record-card { background: #fafafa; border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
    .record-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .record-date { font-size: 12px; font-weight: 600; color: #1890ff; }
    .record-body { font-size: 12px; color: #555; line-height: 1.8; }
    .record-tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 10px; margin-left: 4px; }
    .record-tag.ok { background: #f6ffed; color: #52c41a; }
    .record-tag.no { background: #fff1f0; color: #ff4d4f; }

    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,.75); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 999; pointer-events: none; opacity: 0; transition: opacity .3s; }
    .toast.show { opacity: 1; }

    .empty-state { text-align: center; padding: 40px 20px; color: #ccc; }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 8px; }
    .empty-state .empty-text { font-size: 13px; }

    .text-center { text-align: center; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mb-8 { margin-bottom: 8px; }

    .section-subtitle { font-size: 13px; font-weight: 600; color: #1a1a2e; margin: 14px 0 8px; padding-left: 8px; border-left: 3px solid #1890ff; }
    .section-subtitle.admin-st { border-left-color: #722ed1; }

    /* 导航面包屑 */
    .breadcrumb { font-size: 11px; color: #999; margin-bottom: 10px; }
    .breadcrumb span { color: #1890ff; cursor: pointer; }
    .breadcrumb span:hover { text-decoration: underline; }

    /* 标签 */
    .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .tag-blue { background: #e6f7ff; color: #1890ff; }
    .tag-green { background: #f6ffed; color: #52c41a; }

    /* 文件列表 */
    .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #fafafa; border-radius: var(--radius-sm); margin-bottom: 6px; border: 1px solid var(--border); }
    .file-name { font-size: 12px; color: #1a1a2e; font-weight: 500; }
    .file-actions { display: flex; gap: 6px; }
    .file-btn { padding: 4px 10px; font-size: 10px; border-radius: 4px; border: 1px solid var(--border); background: #fff; cursor: pointer; color: #1890ff; transition: all .2s; }
    .file-btn:hover { background: #e6f7ff; }

    @media (max-width: 860px) {
      .demo-container { flex-direction: column; align-items: center; }
      .phone { width: 340px; height: 620px; }
    }
  </style>
</head>
<body>

<div class="page-title">
  <h1>数字化管理平台 — 交互式 Demo</h1>
  <p>点击界面中的模块、按钮进行交互体验</p>
</div>

<div class="demo-container">

  <!-- ==================== 用户端 ==================== -->
  <div class="phone-wrapper">
    <div class="phone-label"><span class="dot dot-user"></span> 普通用户端</div>
    <div class="phone">
      <div class="phone-status" id="userStatusBar">登录</div>
      <div class="phone-body" id="userBody"></div>
    </div>
  </div>

  <!-- ==================== 管理员端 ==================== -->
  <div class="phone-wrapper">
    <div class="phone-label"><span class="dot dot-admin"></span> 管理员端</div>
    <div class="phone">
      <div class="phone-status admin-bar" id="adminStatusBar">管理控制台</div>
      <div class="phone-body" id="adminBody"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ========== 状态管理 ==========
const state = {
  user: {
    name: '张操作员',
    loggedIn: true,
    currentScreen: 'home',
    history: ['home'],
    // 仪器使用
    currentInstrument: null,
    instruments: ['机器1', '机器2', '机器3'],
    // 清洁记录
    cleaningDuty1: '张三',
    cleaningDuty2: '李四',
    // 仪器日检
    logisticsResponsible: '',
    logisticsFault: '',
    // 消毒登记
    transportResponsible: '',
    // 记录
    records: []
  },
  admin: {
    currentScreen: 'dashboard',
    history: ['dashboard'],
    currentModule: 'peizhi',
    // 文件列表
    files: [
      { name: '2026年06月-配置间.xlsx', date: '2026-06-10' },
      { name: '2026年06月-消毒登记.xlsx', date: '2026-06-10' },
      { name: '2026年06月-仪器日检.xlsx', date: '2026-06-10' },
    ],
    // 批量清理
    cleanStartDate: '2026-01-01',
    cleanEndDate: '2026-03-31',
    cleanTypes: []
  }
};

// ========== Toast ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ========== 用户端渲染 ==========
function renderUser() {
  const body = document.getElementById('userBody');
  const bar = document.getElementById('userStatusBar');
  const s = state.user;
  const screen = s.currentScreen;

  const screens = {
    'home': () => {
      bar.textContent = s.name + ' | 首页';
      return `
        <div class="screen active">
          <div style="font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:14px;">欢迎，${s.name}</div>
          ${renderCard('blue','🔧','仪器使用登记','扫码记录仪器使用时间',()=>navigateUser('instrument'))}
          ${renderCard('green','🧹','清洁记录','记录清洁检查工作',()=>navigateUser('cleaning-select'))}
          ${renderCard('orange','💊','药品借药管理','申请和管理药品借药',()=>showToast('药品借药管理模块'))}
          <button class="btn btn-back" style="margin-top:20px;" onclick="navigateUser('login')">退出登录</button>
        </div>`;
    },

    'login': () => {
      bar.textContent = '登录';
      return `
        <div class="screen active">
          <div class="screen-title">用户登录</div>
          <div class="form-item"><label class="form-label">员工账号</label><input class="form-input" value="zhangsan" placeholder="请输入员工账号"></div>
          <div class="form-item"><label class="form-label">密码</label><input class="form-input" type="password" value="123456" placeholder="请输入密码"></div>
          <button class="btn btn-primary" onclick="state.user.loggedIn=true;state.user.currentScreen='home';state.user.history=['home'];renderUser();">登录</button>
        </div>`;
    },

    'instrument': () => {
      bar.textContent = '仪器使用登记';
      const insts = s.instruments;
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateUser('home')">首页</span> &gt; 仪器使用登记</div>
          <div class="screen-title">仪器使用登记</div>
          <button class="btn btn-primary mb-8" style="background:#52c41a;margin-bottom:12px;" onclick="showToast('模拟扫码：机器1 识别成功')">🔍 扫描二维码</button>
          <div class="form-item"><label class="form-label">手动选择仪器：</label></div>
          ${insts.map((name, i) => `
            <div class="card" onclick="startInstrument('${name}')">
              <div class="card-icon blue">🔧</div>
              <div class="card-info"><div class="card-title">${name}</div><div class="card-desc">点击选择仪器</div></div>
              <div class="card-arrow">›</div>
            </div>
          `).join('')}
          <div class="section-subtitle">历史记录</div>
          <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">暂无历史记录</div></div>
          <button class="btn btn-back" onclick="navigateUser('home')">← 返回首页</button>
        </div>`;
    },

    'instrument-detail': () => {
      const inst = s.currentInstrument || '机器1';
      bar.textContent = '仪器使用中';
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateUser('instrument')">仪器使用登记</span> &gt; 使用中</div>
          <div class="card" style="background:#e6f7ff;border-color:#1890ff;cursor:default;">
            <div class="card-icon blue">🔧</div>
            <div class="card-info">
              <div class="card-title">仪器: ${inst}</div>
              <div class="card-desc"><span class="tag tag-blue">运行中</span> 开机时间: 2026-06-25 09:00</div>
            </div>
          </div>
          <button class="btn btn-primary" onclick="navigateUser('cleaning')">提交清洁记录</button>
          <button class="btn btn-back" onclick="navigateUser('instrument')">← 返回</button>
        </div>`;
    },

    'cleaning': () => {
      bar.textContent = '仪器清洁记录';
      const items = [
        { key: 'belt', label: '皮带线', checked: true },
        { key: 'body', label: '机身、物料桶', checked: true },
        { key: 'glass', label: '玻璃', checked: false },
        { key: 'printer', label: '打印机', checked: true },
      ];
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateUser('instrument-detail')">仪器使用</span> &gt; 清洁记录</div>
          <div class="screen-title">仪器清洁记录</div>
          <div class="card" style="cursor:default;">
            <div class="card-info"><div class="card-title">仪器: ${s.currentInstrument || '机器1'}</div><div class="card-desc">日期: 2026-06-25 | 使用时长: 2h30min</div></div>
          </div>
          <div class="form-item"><label class="form-label">请选择清洁项目（多选）：</label></div>
          ${items.map(it => `
            <div class="checkbox-item ${it.checked ? 'checked' : ''}" onclick="this.classList.toggle('checked')">
              <div class="checkbox-box">${it.checked ? '✓' : ''}</div>${it.label}
            </div>
          `).join('')}
          <button class="btn btn-submit" onclick="showToast('清洁记录提交成功 ✓');navigateUser('instrument');">提交记录</button>
          <button class="btn btn-back" onclick="navigateUser('instrument-detail')">← 返回</button>
        </div>`;
    },

    'cleaning-select': () => {
      bar.textContent = '清洁记录';
      const modules = [
        { icon: '🏥', cls: 'blue', title: '配置间清场清洁登记', desc: '配置间清场检查记录', screen: 'peizhi' },
        { icon: '📦', cls: 'green', title: '消毒登记', desc: '消毒检查记录', screen: 'transport' },
        { icon: '🔧', cls: 'purple', title: '仪器日检表', desc: '仪器日常检查记录', screen: 'logistics' },
      ];
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateUser('home')">首页</span> &gt; 清洁记录</div>
          <div class="screen-title">清洁记录</div>
          ${modules.map(m => renderCard(m.cls, m.icon, m.title, m.desc, ()=>navigateUser(m.screen))).join('')}
          <button class="btn btn-back" onclick="navigateUser('home')">← 返回首页</button>
        </div>`;
    },

    'peizhi': () => {
      bar.textContent = '配置间清场清洁登记';
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateUser('cleaning-select')">清洁记录</span> &gt; 配置间清场清洁登记</div>
          <div class="screen-title">配置间清场清洁登记</div>
          <div style="font-size:12px;color:#555;margin-bottom:8px;">
            <span class="tag tag-blue">今日已填 2/4 次</span>
            <span style="margin-left:8px;">日期: 2026-06-25</span>
          </div>
          <div class="form-item"><label class="form-label">值日生1</label><input class="form-input" value="${s.cleaningDuty1}" placeholder="值日生1姓名"></div>
          <div class="form-item"><label class="form-label">值日生2</label><input class="form-input" value="${s.cleaningDuty2}" placeholder="值日生2姓名"></div>
          <div class="section-subtitle">普台清洁</div>
          <div class="checkbox-list">
            ${['门框把手','操作台面','地面清洁','设备表面'].map(l => `<div class="checkbox-item checked" onclick="this.classList.toggle('checked')"><div class="checkbox-box">✓</div>${l}</div>`).join('')}
          </div>
          <div class="section-subtitle">其他清洁</div>
          <div class="checkbox-list">
            ${['传递窗门框把手','浓度检测'].map(l => `<div class="checkbox-item checked" onclick="this.classList.toggle('checked')"><div class="checkbox-box">✓</div>${l}</div>`).join('')}
          </div>
          <div class="section-subtitle">周一专项清洁</div>
          <div class="checkbox-list">
            ${['一更(1次/周)','二更(1次/周)','洁净服(1次/周)','墙壁(1次/周)','玻璃(1次/周)','地面(1次/周)','回风过滤网(1次/周)'].map(l => `<div class="checkbox-item" onclick="this.classList.toggle('checked')"><div class="checkbox-box"></div>${l}</div>`).join('')}
          </div>
          <button class="btn btn-submit" onclick="showToast('第3次记录提交成功 ✓')">提交第3次记录</button>
          <div class="section-subtitle">记录列表</div>
          ${[1,2].map(f => `
            <div class="record-card">
              <div class="record-hd"><span class="record-date">第${f}次 | 2026-06-25</span><span style="font-size:10px;color:#999;">${s.cleaningDuty1}、${s.cleaningDuty2}</span></div>
              <div class="record-body">操作人: ${s.name} <span class="record-tag ok">✓ 已提交</span></div>
            </div>
          `).join('')}
          <button class="btn btn-back" onclick="navigateUser('cleaning-select')">← 返回</button>
        </div>`;
    },

    'transport': () => {
      bar.textContent = '消毒登记';
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateUser('cleaning-select')">清洁记录</span> &gt; 消毒登记</div>
          <div class="screen-title">消毒登记</div>
          <div style="font-size:12px;color:#555;margin-bottom:8px;">日期: 2026-06-25</div>
          <div class="form-item"><label class="form-label">责任人</label><input class="form-input" value="${s.transportResponsible}" placeholder="请输入责任人姓名" oninput="state.user.transportResponsible=this.value"></div>
          <div class="form-item"><label class="form-label">消毒项目</label></div>
          <div class="checkbox-list">
            ${['转运箱外表消毒','转运箱内部消毒','消毒液浓度检查'].map(l => `<div class="checkbox-item checked" onclick="this.classList.toggle('checked')"><div class="checkbox-box">✓</div>${l}</div>`).join('')}
          </div>
          <button class="btn btn-submit" onclick="showToast('消毒登记提交成功 ✓');state.user.transportResponsible='';navigateUser('cleaning-select');">提交记录</button>
          <div class="section-subtitle">提交记录</div>
          <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">暂无提交记录</div></div>
          <button class="btn btn-back" onclick="navigateUser('cleaning-select')">← 返回</button>
        </div>`;
    },

    'logistics': () => {
      bar.textContent = '仪器日检表';
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateUser('cleaning-select')">清洁记录</span> &gt; 仪器日检表</div>
          <div class="screen-title">仪器日检表</div>
          <div style="font-size:12px;color:#555;margin-bottom:8px;">日期: 2026-06-25</div>
          <div class="form-item"><label class="form-label">责任人</label><input class="form-input" value="${s.logisticsResponsible}" placeholder="请输入责任人姓名" oninput="state.user.logisticsResponsible=this.value"></div>
          <div class="form-item"><label class="form-label">检查项目</label></div>
          <div class="checkbox-list">
            ${['（1）清洁','（2）运行'].map(l => `<div class="checkbox-item checked" onclick="this.classList.toggle('checked')"><div class="checkbox-box">✓</div>${l}</div>`).join('')}
          </div>
          <div class="form-item"><label class="form-label">（3）故障内容</label><input class="form-input" value="${s.logisticsFault}" placeholder="请输入故障内容（选填）" oninput="state.user.logisticsFault=this.value"></div>
          <button class="btn btn-submit" onclick="showToast('仪器日检提交成功 ✓');state.user.logisticsFault='';navigateUser('cleaning-select');">提交记录</button>
          <div class="section-subtitle">提交记录</div>
          <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">暂无提交记录</div></div>
          <button class="btn btn-back" onclick="navigateUser('cleaning-select')">← 返回</button>
        </div>`;
    }
  };

  const fn = screens[screen] || screens['home'];
  body.innerHTML = fn();
}

// ========== 管理员端渲染 ==========
function renderAdmin() {
  const body = document.getElementById('adminBody');
  const bar = document.getElementById('adminStatusBar');
  const s = state.admin;
  const screen = s.currentScreen;

  const screens = {
    'dashboard': () => {
      bar.textContent = '管理控制台';
      return `
        <div class="screen active">
          <div class="screen-title admin-title">管理员面板</div>
          <div style="font-size:12px;color:#999;margin-bottom:12px;">管理员: 王管理</div>
          ${renderCard('blue','📁','仪器使用记录管理','查看、编辑、下载Excel文件',()=>navigateAdmin('files'))}
          ${renderCard('green','🧹','清洁记录管理','管理清洁记录文件',()=>navigateAdmin('cleaning-select'))}
          ${renderCard('orange','💊','借药审批','审批员工借药申请',()=>showToast('借药审批模块'))}
          ${renderCard('purple','👥','用户管理','创建、编辑、删除用户',()=>showToast('用户管理模块'))}
          ${renderCard('blue','⚙','系统设置','修改管理员账户信息',()=>navigateAdmin('settings'))}
          <div class="section-subtitle admin-st">今日统计</div>
          <div style="display:flex;gap:10px;">
            <div class="card" style="flex:1;cursor:default;text-align:center;display:block;"><div style="font-size:22px;font-weight:900;color:#1890ff;">32</div><div style="font-size:11px;color:#999;">文件总数</div></div>
            <div class="card" style="flex:1;cursor:default;text-align:center;display:block;"><div style="font-size:22px;font-weight:900;color:#fa8c16;">5</div><div style="font-size:11px;color:#999;">待审批借药</div></div>
          </div>
          <button class="btn btn-back" onclick="showToast('已退出管理端')">退出登录</button>
        </div>`;
    },

    'files': () => {
      bar.textContent = '仪器使用记录管理';
      const files = s.files;
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateAdmin('dashboard')">控制台</span> &gt; 仪器使用记录管理</div>
          <div class="screen-title admin-title">仪器使用记录管理</div>
          <div style="display:flex;gap:8px;margin-bottom:12px;">
            <div class="tag tag-blue" style="cursor:pointer;padding:6px 14px;" onclick="showToast('切换到仪器使用记录')">仪器使用记录</div>
            <div class="tag" style="cursor:pointer;padding:6px 14px;background:#e6f7ff;color:#1890ff;" onclick="showToast('切换到月度汇总')">月度汇总</div>
          </div>
          <div class="section-subtitle admin-st">文件列表</div>
          ${files.map(f => `
            <div class="file-item">
              <span class="file-name">📄 ${f.name}</span>
              <div class="file-actions">
                <button class="file-btn" onclick="showToast('预览: ${f.name}')">预览</button>
                <button class="file-btn" onclick="showToast('下载: ${f.name}')">下载</button>
              </div>
            </div>
          `).join('')}
          <button class="btn btn-primary" style="margin-top:12px;" onclick="showToast('正在生成Excel文件...')">📊 手动生成Excel</button>
          <button class="btn btn-back" onclick="navigateAdmin('dashboard')">← 返回</button>
        </div>`;
    },

    'cleaning-select': () => {
      bar.textContent = '清洁记录管理';
      const modules = [
        { icon: '🏥', cls: 'blue', title: '配置间清场清洁登记管理', screen: 'cleaning-peizhi' },
        { icon: '📦', cls: 'green', title: '消毒登记管理', screen: 'cleaning-transport' },
        { icon: '🔧', cls: 'purple', title: '仪器日检表管理', screen: 'cleaning-logistics' },
      ];
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateAdmin('dashboard')">控制台</span> &gt; 清洁记录管理</div>
          <div class="screen-title admin-title">清洁记录管理</div>
          ${modules.map(m => renderCard(m.cls, m.icon, m.title, '查看与管理记录文件', ()=>navigateAdmin(m.screen))).join('')}
          <button class="btn btn-back" onclick="navigateAdmin('dashboard')">← 返回</button>
        </div>`;
    },

    'cleaning-peizhi': () => {
      s.currentModule = 'peizhi';
      bar.textContent = '配置间清场清洁登记管理';
      return renderCleaningAdmin('配置间清场清洁登记');
    },
    'cleaning-transport': () => {
      s.currentModule = 'transport';
      bar.textContent = '消毒登记管理';
      return renderCleaningAdmin('消毒登记');
    },
    'cleaning-logistics': () => {
      s.currentModule = 'logistics';
      bar.textContent = '仪器日检表管理';
      return renderCleaningAdmin('仪器日检表');
    },

    'settings': () => {
      bar.textContent = '系统设置';
      return `
        <div class="screen active">
          <div class="breadcrumb"><span onclick="navigateAdmin('dashboard')">控制台</span> &gt; 系统设置</div>
          <div class="screen-title admin-title">系统设置</div>

          <!-- 个人中心 -->
          <div class="card" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
            <div class="card-icon blue">👤</div>
            <div class="card-info"><div class="card-title">个人中心</div><div class="card-desc">管理账户信息和安全设置</div></div>
            <div class="card-arrow">›</div>
          </div>
          <div style="display:none;padding:10px;background:#fafafa;border-radius:0 0 10px 10px;margin-top:-10px;margin-bottom:10px;border:1px solid #e8e8e8;border-top:0;">
            <div class="form-item"><label class="form-label">管理员姓名</label><div style="padding:8px;background:#fff;border-radius:4px;border:1px solid #e8e8e8;">王管理</div></div>
            <div class="form-item"><label class="form-label">管理员类型</label><div style="padding:8px;background:#fff;border-radius:4px;border:1px solid #e8e8e8;">系统管理员</div></div>
            <div class="form-item"><label class="form-label">新姓名</label><input class="form-input" placeholder="请输入新姓名"></div>
            <button class="btn btn-primary" onclick="showToast('姓名修改成功')">修改姓名</button>
          </div>

          <!-- 批量清理 -->
          <div class="card" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
            <div class="card-icon purple">🗑️</div>
            <div class="card-info"><div class="card-title">批量清理</div><div class="card-desc">按业务日期清理过期数据</div></div>
            <div class="card-arrow">›</div>
          </div>
          <div style="display:none;padding:10px;background:#fafafa;border-radius:0 0 10px 10px;margin-top:-10px;margin-bottom:10px;border:1px solid #e8e8e8;border-top:0;">
            <div class="form-item"><label class="form-label">起始日期</label><input class="form-input" type="date" value="2026-01-01"></div>
            <div class="form-item"><label class="form-label">结束日期</label><input class="form-input" type="date" value="2026-03-31"></div>
            <div class="form-item"><label class="form-label">清理类型</label></div>
            ${['记录数据','文件数据','日志数据'].map(t => `<div class="checkbox-item checked" onclick="this.classList.toggle('checked')"><div class="checkbox-box">✓</div>${t}</div>`).join('')}
            <button class="btn btn-danger" style="margin-top:12px;" onclick="showToast('⚠ 批量清理完成（Demo演示）')">确认清理</button>
          </div>

          <button class="btn btn-back" onclick="navigateAdmin('dashboard')">← 返回</button>
        </div>`;
    }
  };

  const fn = screens[screen] || screens['dashboard'];
  body.innerHTML = fn();
}

// ========== 辅助函数 ==========
function renderCard(cls, icon, title, desc, onclick) {
  return `
    <div class="card" onclick="(${onclick.toString()})()">
      <div class="card-icon ${cls}">${icon}</div>
      <div class="card-info"><div class="card-title">${title}</div><div class="card-desc">${desc}</div></div>
      <div class="card-arrow">›</div>
    </div>`;
}

function renderCleaningAdmin(title) {
  const s = state.admin;
  const files = s.files;
  return `
    <div class="screen active">
      <div class="breadcrumb"><span onclick="navigateAdmin('cleaning-select')">清洁记录管理</span> &gt; ${title}管理</div>
      <div class="screen-title admin-title">${title}管理</div>
      <div class="section-subtitle admin-st">文件列表</div>
      ${files.map(f => `
        <div class="file-item">
          <span class="file-name">📄 ${f.name}</span>
          <div class="file-actions">
            <button class="file-btn" onclick="showToast('预览: ${f.name}')">预览</button>
            <button class="file-btn" onclick="showToast('下载: ${f.name}')">下载</button>
          </div>
        </div>
      `).join('')}
      <button class="btn btn-primary" style="margin-top:12px;" onclick="showToast('正在生成Excel文件...')">📊 手动生成Excel</button>
      <button class="btn btn-back" onclick="navigateAdmin('cleaning-select')">← 返回</button>
    </div>`;
}

// ========== 导航函数 ==========
function navigateUser(screen) {
  state.user.currentScreen = screen;
  state.user.history.push(screen);
  renderUser();
}

function navigateAdmin(screen) {
  state.admin.currentScreen = screen;
  state.admin.history.push(screen);
  renderAdmin();
}

function startInstrument(name) {
  state.user.currentInstrument = name;
  navigateUser('instrument-detail');
}

// ========== 初始化 ==========
renderUser();
renderAdmin();
</script>

</body>
</html>
