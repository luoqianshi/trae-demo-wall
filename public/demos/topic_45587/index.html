<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开源图书馆 APP 平台 · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--brand-50:#f3f7f1;--brand-100:#e3ece0;--brand-200:#c7d9c1;--brand-300:#9fbd96;--brand-400:#729a68;--brand-500:#4f7c46;--brand-600:#3b6235;--brand-700:#314f2d;--brand-800:#293f27;--brand-900:#223421;--parchment:#f6efe1;--parchment-dark:#e7dcc2;--amber:#f59e0b;--rose:#e11d48;--teal:#0d9488;--indigo:#6366f1}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--parchment);color:var(--brand-900);line-height:1.75;-webkit-font-smoothing:antialiased}
.serif{font-family:'Noto Serif SC',Georgia,serif}
.container-page{max-width:1152px;margin:0 auto;padding:0 1rem}
@media(min-width:640px){.container-page{padding:0 1.5rem}}
@media(min-width:1024px){.container-page{padding:0 2rem}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:.5rem;padding:.5rem 1rem;font-size:.875rem;font-weight:500;transition:all .2s;cursor:pointer;border:none;outline:none;font-family:inherit}
.btn:focus-visible{box-shadow:0 0 0 2px var(--brand-400)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--brand-600);color:#fff}
.btn-primary:hover{background:var(--brand-700)}
.btn-ghost{background:rgba(255,255,255,.6);border:1px solid var(--brand-200);color:var(--brand-700)}
.btn-ghost:hover{background:var(--brand-50)}
.card{border-radius:.75rem;border:1px solid var(--brand-100);background:rgba(255,255,255,.8);box-shadow:0 1px 2px rgba(0,0,0,.05)}
.input{width:100%;border-radius:.5rem;border:1px solid var(--brand-200);background:#fff;padding:.5rem .75rem;font-size:.875rem;font-family:inherit;color:var(--brand-900);outline:none;transition:all .2s}
.input:focus{border-color:var(--brand-500);box-shadow:0 0 0 2px var(--brand-200)}
.label{display:block;margin-bottom:.25rem;font-size:.875rem;font-weight:500;color:var(--brand-800)}
.badge{display:inline-flex;align-items:center;border-radius:9999px;padding:.125rem .5rem;font-size:.75rem;font-weight:500}
.layout{display:flex;flex-direction:column;min-height:100vh}
.header{position:sticky;top:0;z-index:30;border-bottom:1px solid var(--brand-100);background:rgba(246,239,225,.85);backdrop-filter:blur(12px)}
.header-inner{height:4rem;display:flex;align-items:center;justify-content:space-between}
.brand-link{display:flex;align-items:center;gap:.5rem;text-decoration:none;color:inherit;cursor:pointer}
.brand-icon{width:1.75rem;height:1.75rem;color:var(--brand-600);display:inline-flex}
.brand-icon svg{width:100%;height:100%}
.brand-name{font-family:'Noto Serif SC',serif;font-size:1.125rem;font-weight:700;color:var(--brand-800);line-height:1.1}
.brand-slogan{font-size:.6875rem;color:var(--brand-500)}
.nav-desktop{display:none;align-items:center;gap:.25rem}
@media(min-width:768px){.nav-desktop{display:flex}}
.nav-link{display:flex;align-items:center;gap:.375rem;border-radius:.5rem;padding:.5rem .75rem;font-size:.875rem;font-weight:500;text-decoration:none;color:var(--brand-700);transition:all .2s;cursor:pointer}
.nav-link:hover{background:var(--brand-100)}
.nav-link.active{background:var(--brand-600);color:#fff}
.nav-link svg{width:1rem;height:1rem}
.nav-mobile{display:flex;align-items:center;gap:.25rem;overflow-x:auto;padding:0 1rem .5rem;scrollbar-width:none}
.nav-mobile::-webkit-scrollbar{display:none}
@media(min-width:768px){.nav-mobile{display:none}}
.nav-mobile .nav-link{white-space:nowrap;padding:.375rem .75rem}
.auth-area{display:flex;align-items:center;gap:.5rem}
.main{flex:1}
.footer{border-top:1px solid var(--brand-100);background:rgba(243,247,241,.6);padding:1.5rem 0;text-align:center;font-size:.875rem;color:var(--brand-600)}
.hero{position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:-1;background:linear-gradient(135deg,var(--brand-700),var(--brand-600) 50%,var(--brand-800))}
.hero-bg::after{content:'';position:absolute;inset:0;opacity:.2;background:radial-gradient(circle at 20% 30%,#fff 0,transparent 40%),radial-gradient(circle at 80% 70%,#fff 0,transparent 40%)}
.hero-inner{padding:5rem 0;text-align:center;color:#fff;position:relative}
.hero-badge{display:inline-block;border-radius:9999px;background:rgba(255,255,255,.15);color:#fff;padding:.25rem .75rem;font-size:.75rem;letter-spacing:.05em}
.hero-title{font-family:'Noto Serif SC',serif;font-size:2.5rem;font-weight:700;margin-top:1rem}
@media(min-width:640px){.hero-title{font-size:3rem}}
.hero-tagline{margin:1rem auto 0;max-width:42rem;font-family:'Noto Serif SC',serif;font-size:1.125rem;color:#f3f7f1}
.hero-actions{margin-top:2rem;display:flex;flex-wrap:wrap;justify-content:center;gap:1rem}
.hero-btn-white{background:#fff;color:var(--brand-700)}
.hero-btn-white:hover{background:var(--brand-50)}
.hero-btn-outline{border:1px solid rgba(255,255,255,.4);color:#fff;background:transparent}
.hero-btn-outline:hover{background:rgba(255,255,255,.1)}
.hero-stats{margin-top:3rem;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:28rem;margin-left:auto;margin-right:auto}
.hero-stat{border-radius:.75rem;background:rgba(255,255,255,.1);padding:1rem;backdrop-filter:blur(4px)}
.hero-stat-value{font-family:'Noto Serif SC',serif;font-size:1.875rem;font-weight:700}
.hero-stat-label{margin-top:.25rem;font-size:.875rem;color:#f3f7f1}
.section{padding:4rem 0}
.section-head{margin-bottom:2rem;text-align:center}
.section-title{font-family:'Noto Serif SC',serif;font-size:1.875rem;font-weight:700;color:var(--brand-800)}
.section-sub{margin-top:.5rem;color:var(--brand-500)}
.modules-grid{display:grid;gap:1.5rem;grid-template-columns:1fr}
@media(min-width:640px){.modules-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.modules-grid{grid-template-columns:repeat(3,1fr)}}
.module-card{display:block;text-decoration:none;color:inherit;padding:1.5rem;transition:all .25s;cursor:pointer}
.module-card:hover{transform:translateY(-4px);box-shadow:0 10px 25px rgba(0,0,0,.08)}
.module-icon{display:inline-flex;border-radius:.75rem;padding:.75rem;color:#fff;margin-bottom:1rem}
.module-icon svg{width:1.5rem;height:1.5rem}
.module-title-row{display:flex;align-items:center;justify-content:space-between;font-family:'Noto Serif SC',serif;font-size:1.125rem;font-weight:700;color:var(--brand-800)}
.module-arrow{width:1rem;height:1rem;color:var(--brand-400);transition:transform .2s;display:inline-flex}
.module-arrow svg{width:100%;height:100%}
.module-card:hover .module-arrow{transform:translateX(4px)}
.module-desc{margin-top:.5rem;font-size:.875rem;color:var(--brand-600);line-height:1.625}
.bg-amber{background:linear-gradient(135deg,#f59e0b,#ea580c)}
.bg-indigo{background:linear-gradient(135deg,#6366f1,#7c3aed)}
.bg-rose{background:linear-gradient(135deg,#e11d48,#db2777)}
.bg-teal{background:linear-gradient(135deg,#0d9488,#0891b2)}
.bg-brand{background:linear-gradient(135deg,var(--brand-500),var(--brand-700))}
.values-section{background:rgba(243,247,241,.6);padding:4rem 0}
.values-grid{display:grid;gap:2rem;grid-template-columns:1fr}
@media(min-width:768px){.values-grid{grid-template-columns:repeat(3,1fr)}}
.value-card{padding:1.5rem}
.vi{width:2rem;height:2rem;display:inline-flex}
.vi svg{width:100%;height:100%}
.value-title{margin-top:.75rem;font-family:'Noto Serif SC',serif;font-size:1.125rem;font-weight:700}
.value-desc{margin-top:.25rem;font-size:.875rem;color:var(--brand-600)}
.page{padding:2rem 0}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
.page-title{display:flex;align-items:center;gap:.5rem;font-family:'Noto Serif SC',serif;font-size:1.5rem;font-weight:700;color:var(--brand-800)}
.page-title svg{width:1.5rem;height:1.5rem}
.page-sub{margin-top:.25rem;font-size:.875rem;color:var(--brand-500)}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;margin-bottom:1.5rem}
.search-wrap{position:relative;flex:1;min-width:240px}
.search-wrap>svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);width:1rem;height:1rem;color:var(--brand-400);pointer-events:none}
.search-wrap .input{padding-left:2.25rem}
.select-auto{width:auto;min-width:120px}
.grid-3{display:grid;gap:1rem;grid-template-columns:1fr}
@media(min-width:640px){.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.grid-3{grid-template-columns:repeat(3,1fr)}}
.grid-4{display:grid;gap:1rem;grid-template-columns:repeat(2,1fr)}
@media(min-width:1024px){.grid-4{grid-template-columns:repeat(4,1fr)}}
.book-card{display:flex;flex-direction:column;overflow:hidden}
.book-cover{aspect-ratio:3/4;background:var(--brand-100);position:relative}
.book-cover.empty{display:flex;align-items:center;justify-content:center}
.book-cover.empty svg{width:3rem;height:3rem;color:var(--brand-400)}
.book-cover img{width:100%;height:100%;object-fit:cover}
.book-info{display:flex;flex:1;flex-direction:column;padding:1rem}
.book-title{font-family:'Noto Serif SC',serif;font-weight:700;color:var(--brand-800);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-author{margin-top:.25rem;font-size:.875rem;color:var(--brand-500)}
.book-meta{margin-top:.5rem;display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--brand-500);flex-wrap:wrap}
.book-meta svg{width:.75rem;height:.75rem}
.book-foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:.75rem;font-size:.875rem;color:var(--brand-500)}
.mini-btn{background:transparent;border:none;color:var(--brand-500);cursor:pointer;font-size:.75rem;padding:.25rem .5rem;display:inline-flex;align-items:center;gap:.25rem;border-radius:.25rem}
.mini-btn:hover{background:var(--brand-50)}
.mini-btn svg{width:.75rem;height:.75rem}
.product-card{overflow:hidden}
.product-cover{aspect-ratio:1/1;background:#ffe4e6;display:flex;align-items:center;justify-content:center}
.product-cover svg{width:2.5rem;height:2.5rem;color:#fda4af}
.product-cover img{width:100%;height:100%;object-fit:cover}
.product-info{padding:.75rem}
.product-name{font-weight:500;color:var(--brand-800);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-meta-row{margin-top:.5rem;display:flex;align-items:center;justify-content:space-between}
.product-price{font-weight:700;color:var(--brand-700)}
.product-stock{margin-top:.25rem;font-size:.75rem;color:var(--brand-400)}
.kb-card{padding:1.25rem}
.kb-icon{display:inline-flex;border-radius:.5rem;background:#e0e7ff;padding:.5rem;color:var(--indigo);margin-bottom:.75rem}
.kb-icon svg{width:1.25rem;height:1.25rem}
.kb-name{font-family:'Noto Serif SC',serif;font-weight:700;color:var(--brand-800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kb-desc{margin-top:.25rem;font-size:.875rem;color:var(--brand-500);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kb-meta{margin-top:.75rem;display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--brand-500);flex-wrap:wrap}
.kb-meta svg{width:.75rem;height:.75rem}
.kb-resources{margin-top:.75rem;display:flex;flex-wrap:wrap;gap:.25rem}
.kb-res-tag{background:var(--parchment-dark);color:var(--brand-700);display:inline-flex;align-items:center;gap:.25rem;padding:.125rem .5rem;border-radius:9999px;font-size:.75rem}
.kb-res-tag svg{width:.75rem;height:.75rem}
.group-card{padding:1.25rem;cursor:pointer;transition:all .2s}
.group-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.group-head{display:flex;align-items:flex-start;justify-content:space-between}
.group-icon{display:inline-flex;border-radius:.5rem;background:#ccfbf1;padding:.5rem;color:var(--teal)}
.group-icon svg{width:1.25rem;height:1.25rem}
.group-name{margin-top:.75rem;font-family:'Noto Serif SC',serif;font-weight:700;color:var(--brand-800)}
.group-desc{margin-top:.25rem;font-size:.875rem;color:var(--brand-500);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.group-foot{margin-top:.75rem;display:flex;align-items:center;justify-content:space-between;font-size:.75rem;color:var(--brand-500)}
.form-card{padding:1.5rem}
.form-grid{display:grid;gap:1rem;grid-template-columns:1fr}
@media(min-width:640px){.form-grid{grid-template-columns:repeat(2,1fr)}}
.form-full{grid-column:1/-1}
.auth-wrap{padding:3rem 0}
.auth-card{max-width:28rem;margin:0 auto;padding:2rem}
.auth-title{text-align:center;font-family:'Noto Serif SC',serif;font-size:1.5rem;font-weight:700;color:var(--brand-800)}
.auth-sub{margin-top:.25rem;text-align:center;font-size:.875rem;color:var(--brand-500)}
.auth-form{margin-top:1.5rem;display:flex;flex-direction:column;gap:1rem}
.auth-foot{margin-top:1.5rem;text-align:center;font-size:.875rem;color:var(--brand-600)}
.auth-foot a{color:var(--brand-700);text-decoration:none;font-weight:500;cursor:pointer}
.auth-foot a:hover{text-decoration:underline}
.profile-grid{display:grid;gap:2rem;grid-template-columns:1fr}
@media(min-width:768px){.profile-grid{grid-template-columns:repeat(3,1fr)}}
.profile-aside{text-align:center;padding:1.5rem}
.profile-avatar{width:5rem;height:5rem;margin:0 auto;border-radius:9999px;background:var(--brand-100);color:var(--brand-600);display:flex;align-items:center;justify-content:center}
.profile-avatar svg{width:3rem;height:3rem}
.profile-main{grid-column:1/-1;display:flex;flex-direction:column;gap:1.5rem}
@media(min-width:768px){.profile-main{grid-column:span 2}}
.activity-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
@media(min-width:640px){.activity-grid{grid-template-columns:repeat(4,1fr)}}
.activity-item{display:flex;align-items:center;gap:.5rem;border-radius:.5rem;background:var(--parchment);padding:.75rem}
.activity-item svg{width:1.25rem;height:1.25rem;color:var(--brand-500);flex-shrink:0}
.activity-label{font-size:.875rem;font-weight:500;color:var(--brand-700)}
.activity-val{font-size:.875rem;color:var(--brand-500)}
.modal-mask{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);padding:1rem}
.modal-card{max-height:80vh;width:100%;max-width:42rem;overflow:auto;padding:1.5rem}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-title{font-family:'Noto Serif SC',serif;font-size:1.25rem;font-weight:700;color:var(--brand-800)}
.modal-sub{font-size:.875rem;color:var(--brand-500)}
.topic-list{list-style:none}
.topic-item{padding:.75rem 0;border-bottom:1px solid var(--brand-100)}
.topic-item:last-child{border-bottom:none}
.topic-title{display:flex;align-items:center;gap:.5rem;font-weight:500;color:var(--brand-800)}
.topic-title svg{width:.75rem;height:.75rem}
.topic-meta{margin-top:.25rem;font-size:.75rem;color:var(--brand-500)}
.toast{position:fixed;top:5rem;right:1rem;z-index:50;background:var(--brand-600);color:#fff;padding:.75rem 1rem;border-radius:.5rem;font-size:.875rem;box-shadow:0 4px 12px rgba(0,0,0,.15);opacity:0;transform:translateY(-8px);transition:all .3s;max-width:20rem;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:.75rem;border:1px dashed var(--brand-200);padding:4rem 1rem;text-align:center}
.empty-state svg{width:2.5rem;height:2.5rem;color:var(--brand-300);margin-bottom:.75rem}
.empty-state .es-title{font-weight:500;color:var(--brand-700)}
.empty-state .es-hint{margin-top:.25rem;font-size:.875rem;color:var(--brand-500)}
.demo-badge{position:fixed;bottom:1rem;left:1rem;z-index:50;background:rgba(41,63,39,.92);color:#fff;padding:.5rem .875rem;border-radius:9999px;font-size:.75rem;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;gap:.375rem}
.demo-badge::before{content:'';width:8px;height:8px;border-radius:50%;background:#84cc16;box-shadow:0 0 6px #84cc16}
a{color:inherit}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<div class="demo-badge">演示模式 · 内置模拟数据</div>
<script src="./demo.app.js"></script>
</body>
</html>
