<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>觉道录 — 水墨悟道之旅</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d4af37">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <!-- 性能优化：预连接同源 API、预加载关键资源 -->
  <link rel="preconnect" href="//150.158.10.10" crossorigin>
  <link rel="dns-prefetch" href="//150.158.10.10">
  <link rel="preload" href="css/style.css?v=20260703" as="style">
  <link rel="preload" href="css/water.css?v=20260703" as="style">
  <link rel="preload" href="js/audio.js?v=20260703" as="script">
  <link rel="preload" href="js/config.js?v=20260703" as="script">
  <link rel="preload" href="js/main.js?v=20260703" as="script">
  <link rel="stylesheet" href="css/style.css?v=20260703">
  <link rel="stylesheet" href="css/water.css?v=20260703">
  <script src="js/audio.js?v=20260703"></script>
  <script src="js/config.js?v=20260703"></script>
  <script src="js/game.js?v=20260703"></script>
  <script src="js/game-systems.js?v=20260703"></script>
  <script src="js/main.js?v=20260703"></script>
</head>
<body>
  <!-- 水流动背景 -->
  <div class="water-bg">
    <canvas id="waterCanvas" class="water-canvas"></canvas>
    <div class="water-gradient"></div>
    <div class="water-shimmer"></div>
    <div class="water-reflection"></div>
    <div class="water-ripple"></div>
    <div class="water-ripple"></div>
    <div class="water-ripple"></div>
    <div class="water-ripple"></div>
    <div class="water-ripple"></div>
  </div>
  
  <!-- 水墨封面页 -->
  <div class="cover-page" id="coverPage">
    <div class="ink-bg"></div>
    <div class="ink-mountain mountain-1"></div>
    <div class="ink-mountain mountain-2"></div>
    <div class="ink-mountain mountain-3"></div>
    <div class="ink-mist"></div>
    <div class="ink-splash splash-1"></div>
    <div class="ink-splash splash-2"></div>
    <div class="ink-splash splash-3"></div>
    
    <div class="cover-content">
      <div class="cover-title-container">
        <div class="cover-title">觉道录</div>
        <div class="cover-subtitle">—— 心若止水，道自现矣 ——</div>
        <div class="cover-desc">末法之世，寻道之旅</div>
      </div>
      
      <button type="button" class="enter-btn" id="enterBtn">
        <span class="btn-text">步入觉道</span>
        <span class="btn-stamp">悟道</span>
      </button>
      
      <button type="button" class="enter-btn v3-btn" id="enterV3Btn" style="margin-top:16px;">
        <span class="btn-text">观心篇</span>
        <span class="btn-stamp">自省</span>
      </button>
      
      <div class="cover-footer">
        <div class="cover-tip">点击进入悟道之旅</div>
      </div>
    </div>
    
    <div class="ink-reveal"></div>
  </div>

  <!-- 游戏主页面 -->
  <div class="game-page" id="gamePage">
    <!-- AI对话栏 -->
    <div class="ai-chat-bar" id="aiChatBar">
      <div class="ai-chat-input-wrap">
        <input type="text" class="ai-chat-input" id="aiChatInput" placeholder="叩心问道...">
        <button type="button" class="ai-chat-btn" id="aiChatBtn">问</button>
      </div>
      <div class="ai-chat-toggle" id="aiChatToggle">▼</div>
    </div>

    <!-- 光影世界层 -->
    <div id="shadow-birds"></div>
    <div id="shadow-fish"></div>
    <div id="shadow-clouds"></div>
    <div id="shadow-leaves"></div>
    <div id="shadow-fireflies"></div>
    <div id="shadow-figure">
      <div class="shadow-glow"></div>
      <div class="shadow-person">
        <div class="shadow-head"></div>
        <div class="shadow-body"></div>
        <div class="shadow-arm left"></div>
        <div class="shadow-arm right"></div>
        <div class="shadow-leg left"></div>
        <div class="shadow-leg right"></div>
      </div>
    </div>
    <div id="particles"></div>
    <div id="ambience-overlay"></div>

    <!-- 隐藏重启触发区域 -->
    <div class="restart-trigger" id="restart-trigger">
      <div class="restart-hint">长按重新开始</div>
    </div>

    <!-- 主内容容器 -->
    <div class="container" id="mainContainer">
      <div class="top-bar">
        <div class="top-left">
          <div class="top-title">觉道录</div>
          <div class="top-chapter" id="topChapter">序幕</div>
        </div>
        <div class="top-right">
          <button type="button" class="icon-btn" id="btnQuests" title="任务系统">📋</button>
          <button type="button" class="icon-btn" id="btnTheme" title="切换意境">🎨</button>
          <button type="button" class="icon-btn" id="btnSoundToggle">🔊</button>
          <button type="button" class="icon-btn" id="btnHelp">❓</button>
        </div>
      </div>

      <div class="attr-panel" id="attrPanel">
        <div class="attr-item">
          <span>❤️</span>
          <span class="attr-val" id="xinVal">0</span>
          <span style="font-size:12px;color:var(--text-dim)">心性</span>
          <button type="button" class="attr-btn" id="xinBtn">+</button>
        </div>
        <div class="attr-item">
          <span>🌐</span>
          <span class="attr-val" id="geVal">0</span>
          <span style="font-size:12px;color:var(--text-dim)">格局</span>
          <button type="button" class="attr-btn" id="geBtn">+</button>
        </div>
        <div class="attr-item">
          <span>🧠</span>
          <span class="attr-val" id="zhiVal">0</span>
          <span style="font-size:12px;color:var(--text-dim)">认知</span>
          <button type="button" class="attr-btn" id="zhiBtn">+</button>
        </div>
        <div class="attr-item realm-item" id="realmPanel">
          <span id="realmIcon">🌍</span>
          <span class="attr-val" id="realmVal">凡尘</span>
          <span style="font-size:12px;color:var(--text-dim)">境界</span>
        </div>

      </div>

      <div class="env-indicator">
        <span class="env-dot"></span>
        <span id="envText">静心悟道</span>
        <span id="pathIndicator" style="margin-left:8px;font-size:11px;color:var(--gold);"></span>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- 游戏场景内容 -->
      <div id="gameContent"></div>
    </div>

    <!-- 底部导航栏 -->
    <nav class="game-bottom-nav" id="gameBottomNav">
      <button type="button" class="nav-btn hidden" id="btn-notes" title="悟道笔记">
        <span class="nav-icon">📜</span>
        <span class="nav-text">笔记</span>
      </button>
      <button type="button" class="nav-btn hidden" id="btn-divine" title="卜卦">
        <span class="nav-icon">🎋</span>
        <span class="nav-text">卜卦</span>
      </button>
      <button type="button" class="nav-btn hidden" id="btn-report" title="心境分析">
        <span class="nav-icon">🔮</span>
        <span class="nav-text">心境</span>
      </button>
      <button type="button" class="nav-btn hidden" id="btn-library" title="天道图书馆">
        <span class="nav-icon">📚</span>
        <span class="nav-text">典籍</span>
      </button>
      <button type="button" class="nav-btn hidden" id="btn-achievements" title="成就殿堂">
        <span class="nav-icon">🏆</span>
        <span class="nav-text">成就</span>
      </button>
      <button type="button" class="nav-btn hidden" id="btn-map" title="天下舆图">
        <span class="nav-icon">🗺️</span>
        <span class="nav-text">舆图</span>
      </button>
      <button type="button" class="nav-btn hidden" id="btn-debate" title="双AI思辨">
        <span class="nav-icon">⚔️</span>
        <span class="nav-text">思辨</span>
      </button>
    </nav>
  </div>

  <!-- 弹窗遮罩层 -->
  <div class="overlay" id="notesOverlay" onclick="closeNotes()"></div>
  <div class="overlay" id="libraryOverlay" onclick="closeLibrary()"></div>
  <div class="overlay" id="achievementsOverlay" onclick="closeAchievements()"></div>
  <div class="overlay" id="mapOverlay" onclick="closeMap()"></div>
  <div class="overlay" id="helpOverlay" onclick="closeHelp()"></div>
  <div class="overlay" id="aiOverlay" onclick="closeAIResponse()"></div>
  <div class="overlay" id="cardOverlay" onclick="closeCardPreview()"></div>
  <div class="overlay" id="customOverlay"></div>
  
  <!-- 游戏对话弹窗 -->
  <div class="overlay" id="dOverlay" onclick="closeDialog()"></div>
  <div class="modal-box dialog-box" id="dBox">
    <div class="dialog-deco" id="dDeco">☯</div>
    <div class="dialog-title" id="dTitle"></div>
    <div class="dialog-content" id="dContent"></div>
    <div class="dialog-note" id="dNote"></div>
    <div class="dialog-stats" id="dStats"></div>
    <button type="button" class="golden-btn dialog-close-btn" onclick="closeDialog()">继续前行</button>
  </div>

  <!-- 悟道笔记弹窗 -->
  <div class="modal-box notebook-card" id="notesBox">
    <div class="nb-header">
      <div class="nb-title">📜 悟道笔记</div>
      <div class="nb-actions">
        <button type="button" class="nb-action-btn" onclick="exportSave()">导出存档</button>
        <button type="button" class="nb-action-btn" onclick="importSave()">导入存档</button>
        <input type="file" id="saveFileInput" accept=".txt" style="display:none" onchange="handleFileImport(event)">
      </div>
      <span class="nb-close" onclick="closeNotes()">✕</span>
    </div>
    <div class="nb-stats">
      <span>共 <span id="notesCount">0</span> 条记录</span>
    </div>
    <div id="notesList"></div>
    <textarea id="noteInput" class="reflection-textarea" placeholder="记录今日悟道心得..." rows="4"></textarea>
    <button type="button" class="golden-btn" style="width:100%;margin-top:10px;" onclick="addNewNote()">落笔成文</button>
  </div>

  <!-- 天道图书馆弹窗 -->
  <div class="modal-box library-card" id="libraryBox">
    <div class="nb-header">
      <div class="nb-title">📚 天道图书馆</div>
      <span class="nb-close" onclick="closeLibrary()">✕</span>
    </div>
    <div class="lib-search">
      <input type="text" id="libSearchInput" placeholder="搜索典籍...">
      <button type="button" class="lib-search-btn" onclick="searchLibrary()">搜</button>
    </div>
    <div id="libraryList"></div>
  </div>

  <!-- 成就殿堂弹窗 -->
  <div class="modal-box" id="achievementsBox">
    <div class="nb-header">
      <div class="nb-title">🏆 成就殿堂</div>
      <span class="nb-close" onclick="closeAchievements()">✕</span>
    </div>
    <div id="achievementsList"></div>
  </div>

  <!-- 天下舆图弹窗 -->
  <div class="modal-box" id="mapBox">
    <div class="nb-header">
      <div class="nb-title">🗺️ 天下舆图</div>
      <span class="nb-close" onclick="closeMap()">✕</span>
    </div>
    <div id="mapContent"></div>
  </div>

  <!-- 游戏说明弹窗 -->
  <div class="modal-box help-box" id="helpBox">
    <div class="nb-header">
      <div class="nb-title">❓ 游戏说明</div>
      <span class="nb-close" onclick="closeHelp()">✕</span>
    </div>
    <div id="helpContent"></div>
  </div>

  <!-- AI回复弹窗 -->
  <div class="modal-box" id="aiResponseBox">
    <div class="nb-header">
      <div class="nb-title">✨ 道之启示</div>
      <span class="nb-close" onclick="closeAIResponse()">✕</span>
    </div>
    <div id="aiResponseContent"></div>
    <button type="button" class="golden-btn" style="width:100%;margin-top:16px;" onclick="generateCardFromAI()">生成水墨卡片</button>
  </div>

  <!-- 水墨卡片预览弹窗 -->
  <div class="modal-box card-preview-box" id="cardPreviewBox">
    <div class="nb-header">
      <div class="nb-title">🖼️ 水墨卡片</div>
      <span class="nb-close" onclick="closeCardPreview()">✕</span>
    </div>
    <div id="cardCanvasContainer"></div>
    <button type="button" class="golden-btn" style="width:100%;margin-top:16px;" onclick="saveCardImage()">保存图片</button>
  </div>

  <!-- 自定义输入弹窗 -->
  <div class="modal-box custom-popup" id="customBox"></div>

  <!-- 导入存档弹窗 -->
  <div class="modal-box" id="importModal">
    <div class="nb-header">
      <div class="nb-title">📥 导入存档</div>
      <span class="nb-close" onclick="closeImportModal()">✕</span>
    </div>
    <textarea id="importTextarea" placeholder="粘贴存档内容..." rows="8"></textarea>
    <button type="button" class="golden-btn" style="width:100%;margin-top:16px;" onclick="processImport()">确认导入</button>
  </div>
  <div class="overlay" id="importOverlay" onclick="closeImportModal()"></div>

  <!-- 茶道仪式弹窗 -->
  <div class="overlay" id="teaOverlay" onclick="closeTeaCeremony()"></div>
  <div class="modal-box" id="teaBox"></div>

  <!-- 心灵书写弹窗 -->
  <div class="overlay" id="reflectionOverlay" onclick="closeReflection()"></div>
  <div class="modal-box" id="reflectionBox"></div>

  <!-- 掷筊问卦弹窗 -->
  <div class="overlay" id="jiaobeiOverlay" onclick="closeJiaobei()"></div>
  <div class="modal-box" id="jiaobeiBox"></div>

  <!-- 报告弹窗 -->
  <div class="overlay" id="repOverlay" onclick="closeReport()"></div>
  <div class="modal-box" id="repBox"></div>

  <!-- 意境切换弹窗 -->
  <div class="overlay" id="themeOverlay" onclick="closeThemeSwitcher()"></div>
  <div class="modal-box theme-switcher-box" id="themeSwitcherBox">
    <div class="nb-header">
      <div class="nb-title">🎨 意境切换</div>
      <span class="nb-close" onclick="closeThemeSwitcher()">✕</span>
    </div>
    <div class="theme-current" id="themeCurrent"></div>
    <div class="theme-grid" id="themeGrid"></div>
  </div>

  <!-- 任务系统弹窗 -->
  <div class="overlay" id="questOverlay" onclick="closeQuestPanel()"></div>
  <div class="modal-box quest-panel" id="questPanel">
    <div class="nb-header">
      <div class="nb-title">📋 任务系统</div>
      <span class="nb-close" onclick="closeQuestPanel()">✕</span>
    </div>
    <div class="phase-info" id="phaseInfo"></div>
    <div class="quest-tabs" id="questTabs">
      <div class="quest-tab active" data-tab="main" onclick="showQuestTab('main')">主线</div>
      <div class="quest-tab" data-tab="side" onclick="showQuestTab('side')">支线</div>
      <div class="quest-tab" data-tab="challenge" onclick="showQuestTab('challenge')">挑战</div>
    </div>
    <div class="quest-list" id="questList"></div>
  </div>

  <!-- 技能面板弹窗 -->
  <div class="overlay" id="skillOverlay" onclick="closeSkillPanel()"></div>
  <div class="modal-box skill-panel" id="skillPanel">
    <div class="nb-header">
      <div class="nb-title">⚡ 技能系统</div>
      <span class="nb-close" onclick="closeSkillPanel()">✕</span>
    </div>
    <div class="skill-grid" id="skillGrid"></div>
  </div>

  <!-- 成就提示弹窗 -->
  <div class="ach-toast" id="achToast">
    <span class="ach-icon" id="achIcon">🏆</span>
    <div class="ach-content">
      <div class="ach-title" id="achTitle">成就解锁</div>
      <div class="ach-subtitle" id="achSub">新成就</div>
    </div>
    <span class="ach-decor">✨</span>
  </div>


  <script defer src="js/ai-api.js?v=20260703"></script>
  <script defer src="js/ai-enhanced.js?v=20260703"></script>
  <script defer src="js/ai-core.js?v=20260703"></script>
  <script defer src="js/enhanced-game.js?v=20260703"></script>
  <script defer src="js/divination.js?v=20260703"></script>
  <script defer src="js/ink-splash.js?v=20260703"></script>
  <script defer src="js/html2canvas.min.js?v=20260703"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then((registration) => {
            console.log('Service Worker registered:', registration.scope);
          })
          .catch((error) => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
