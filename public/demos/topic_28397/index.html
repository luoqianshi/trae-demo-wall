    const panels = document.querySelectorAll('.panel');
    const charCards = document.querySelectorAll('.char-card');

    const fileInput = document.getElementById('fileInput');
    const previewBox = document.getElementById('previewBox');

    const resultPanel = document.getElementById('resultPanel');

    const toast = document.getElementById('toast');
    const modalOverlay = document.getElementById('modalOverlay');

    // ===== Tab Switch =====

        currentTab = t.dataset.tab;
        panels.forEach(p => p.classList.remove('active'));
        document.getElementById('panel-' + currentTab).classList.add('active');
        if (currentTab === 'mygallery') renderGallery();
      });
    });

    // ===== Character Select =====
    charCards.forEach(card => {
      card.addEventListener('click', () => {
        charCards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedChar = card.dataset.char;
      });
    });

    // ===== Upload =====
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault(); uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    });
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        uploadedImage = e.target.result;
        previewImg.src = uploadedImage;
        previewBox.style.display = 'block';
        analyzeBtn.disabled = false;
        resultPanel.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    // ===== Analyze =====
    analyzeBtn.addEventListener('click', () => {
      if (!uploadedImage) return;
      loadingOverlay.classList.add('active');
      setTimeout(() => {
        loadingOverlay.classList.remove('active');
        showResult();
      }, 2500);
    });

    function showResult() {
      const score = Math.floor(Math.random() * 25) + 68;
      const rankNum = score >= 90 ? Math.floor(Math.random() * 50) + 1 :
                      score >= 80 ? Math.floor(Math.random() * 500) + 50 :
                      Math.floor(Math.random() * 2000) + 500;

      let rankName, rankClass;
      if (score >= 90) { rankName = '七段'; rankClass = 'rank-master'; }
      else if (score >= 85) { rankName = '五段'; rankClass = 'rank-dan'; }
      else if (score >= 80) { rankName = '三段'; rankClass = 'rank-dan'; }
      else if (score >= 75) { rankName = '初段'; rankClass = 'rank-dan'; }
      else if (score >= 70) { rankName = '3级'; rankClass = 'rank-kyu'; }
      else { rankName = '5级'; rankClass = 'rank-kyu'; }

      document.getElementById('rankBadge').textContent = rankName;
      document.getElementById('rankBadge').className = 'rank-badge ' + rankClass;
      document.getElementById('nationalRank').textContent = '#' + rankNum;

      const scoreNum = document.getElementById('scoreNum');
      const circle = document.getElementById('scoreCircle');
      const maxOffset = 440;
      let current = 0;
      const interval = setInterval(() => {
        current += 2;
        if (current >= score) { current = score; clearInterval(interval); }
        scoreNum.textContent = current;
        circle.setAttribute('stroke-dashoffset', maxOffset - (current / 100) * maxOffset);
      }, 30);

      const dims = [
        { name: '眉眼还原', score: Math.min(100, score + Math.floor(Math.random()*10-5)), color: 'var(--accent)' },
        { name: '唇妆还原', score: Math.min(100, score + Math.floor(Math.random()*10-5)), color: 'var(--accent2)' },
        { name: '修容轮廓', score: Math.min(100, score + Math.floor(Math.random()*10-5)), color: 'var(--accent3)' },
        { name: '发型配饰', score: Math.min(100, score + Math.floor(Math.random()*10-5)), color: 'var(--success)' },
        { name: '整体协调', score: Math.min(100, score + Math.floor(Math.random()*10-5)), color: 'var(--warning)' },
      ];
      const dimList = document.getElementById('dimList');
      dimList.innerHTML = '';
      dims.forEach(d => {
        dimList.innerHTML += `
          <div class="dim-item">
            <div class="dim-name">${d.name}</div>
            <div class="dim-bar-wrap"><div class="dim-bar" style="width:0%; background:${d.color}"></div></div>
            <div class="dim-score">${d.score}</div>
          </div>`;
      });
      setTimeout(() => {
        document.querySelectorAll('.dim-bar').forEach((bar, i) => {
          bar.style.width = dims[i].score + '%';
        });
      }, 100);

      const suggestions = [
        { icon: '&#128065;&#65039;', title: '眼妆深化', text: '建议加深眼尾眼影层次，参考角色原设的紫色调渐变。' },
        { icon: '&#128132;', title: '唇形勾勒', text: '唇峰可以再明显一些，使用唇线笔勾勒轮廓会更接近角色。' },
        { icon: '&#10024;', title: '高光提亮', text: '鼻梁和眉骨处增加高光，提升角色特有的清冷气质。' },
      ];
      if (score >= 85) suggestions.pop();
      const suggestList = document.getElementById('suggestList');
      suggestList.innerHTML = suggestions.map(s => `
        <div class="suggest-item">
          <span class="suggest-icon">${s.icon}</span>
          <div class="suggest-text">
            <h4>${s.title}</h4>
            <p>${s.text}</p>
          </div>
        </div>
      `).join('');

      // Save to gallery
      myWorks.unshift({
        id: Date.now(),
        char: selectedChar,
        score: score,
        rankName: rankName,
        rankClass: rankClass,
        image: uploadedImage,
        dims: dims,
        date: new Date().toLocaleDateString('zh-CN'),
      });

      resultPanel.style.display = 'block';
      resultPanel.scrollIntoView({ behavior: 'smooth' });
    }

    // ===== Share =====
    document.getElementById('shareBtn').addEventListener('click', () => {
      showToast('成绩已复制到剪贴板！快去分享吧~');
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ===== Modal =====
    function openModal(html) {
      modalBody.innerHTML = html;
      modalOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      modalOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }
    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) closeModal();
    });

    // ===== My Gallery =====
    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      if (myWorks.length === 0) {

        return;

      grid.innerHTML = myWorks.map(w => `
        <div class="gallery-item" onclick="openWorkDetail(${w.id})">
          <div class="img-box">${w.image ? '<img src="'+w.image+'" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">' : '&#128247;'}</div>

            <div class="char-name">${w.char}</div>
            <div class="score-small">${w.rankName} · ${w.score}分</div>

      { rank: 5, name: '十六夜咲夜', char: '蕾姆', rankName: '六段', score: 89, color: 'var(--success)', works: 12, fans: 560 },
      { rank: 6, name: '博丽灵梦', char: '芙宁娜', rankName: '六段', score: 88, color: 'var(--success)', works: 20, fans: 890 },
      { rank: 7, name: '雾雨魔理沙', char: '绫波丽', rankName: '五段', score: 86, color: 'var(--warning)', works: 9, fans: 430 },
      { rank: 8, name: '魂魄妖梦', char: '初音未来', rankName: '五段', score: 85, color: 'var(--warning)', works: 14, fans: 670 },
      { rank: 9, name: '西行寺幽幽子', char: '雷电将军', rankName: '四段', score: 83, color: 'var(--muted)', works: 8, fans: 320 },
      { rank: 10, name: '八云紫', char: '五条悟', rankName: '四段', score: 82, color: 'var(--muted)', works: 11, fans: 480 },
    ];

    function renderLB(filter) {
      const tbody = document.getElementById('lbBody');
      const data = filter === 'all' ? lbData : lbData.filter(d => d.char === filter);
      tbody.innerHTML = data.map(d => `

    renderLB('all');

    window.openCoserProfile = function(name) {

      openModal(`
        <div style="text-align:center; margin-bottom:1rem;">

        </div>

          <h4>&#127942; 战绩统计</h4>
          <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:0.5rem; text-align:center;">
            <div style="background:var(--bg3); border-radius:8px; padding:0.8rem;">
              <div style="font-size:1.3rem; font-weight:700; color:var(--accent);">${d.score}</div>

              <div style="font-size:1.3rem; font-weight:700; color:var(--accent2);">${d.works}</div>

            <div style="background:var(--bg3); border-radius:8px; padding:0.8rem;">
              <div style="font-size:1.3rem; font-weight:700; color:var(--accent3);">${d.fans}</div>
              <div style="font-size:0.75rem; color:var(--muted);">粉丝数</div>
            </div>

        </div>
        <div class="modal-section">
          <h4>&#128248; 代表作品</h4>
          <div class="modal-gallery">
            <div class="modal-gallery-item">&#9889;</div>
            <div class="modal-gallery-item">&#128167;</div>
            <div class="modal-gallery-item">&#127908;</div>
          </div>
        </div>
        <div class="modal-section">
          <h4>&#128172; 关注 TA</h4>
          <p>关注后可第一时间查看 ${d.name} 的新作品和妆造心得分享。</p>
          <button class="btn btn-primary" style="margin-top:0.5rem;" onclick="showToast('已关注 ${d.name}！'); closeModal();">
            &#10084;&#65039; 关注
          </button>
        </div>
      `);
    };

    document.querySelectorAll('#panel-leaderboard .tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('#panel-leaderboard .tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        renderLB(t.dataset.filter);
      });
    });

    // ===== Photographer =====
    const photoData = [
      { name: '光影旅人', stars: 5, starStr: '&#9733;&#9733;&#9733;&#9733;&#9733;', city: '上海', tags: ['日系', '棚拍', '原神'], price: '&#165;399/套', avatar: '&#128248;', intro: '专注日系清新风格，擅长自然光人像，拥有专业影棚设备。从业5年，服务过500+ Coser。', works: 128, booked: 89 },
      { name: '镜花水月', stars: 5, starStr: '&#9733;&#9733;&#9733;&#9733;&#9733;', city: '上海', tags: ['古风', '外景', '崩铁'], price: '&#165;499/套', avatar: '&#127800;', intro: '古风摄影专家，擅长园林、宫殿等外景地拍摄。对服装、道具搭配有独到见解。', works: 96, booked: 72 },
      { name: '快门诗人', stars: 4, starStr: '&#9733;&#9733;&#9733;&#9733;&#9734;', city: '北京', tags: ['暗黑', '棚拍', '咒术'], price: '&#165;350/套', avatar: '&#127917;', intro: '暗黑系风格摄影师，擅长情绪表达与光影对比。影棚配备多色背景纸与专业灯光。', works: 67, booked: 45 },
      { name: '二次元之眼', stars: 5, starStr: '&#9733;&#9733;&#9733;&#9733;&#9733;', city: '北京', tags: ['萌系', '外景', 'V家'], price: '&#165;450/套', avatar: '&#128065;&#65039;', intro: '萌系摄影达人，擅长捕捉可爱瞬间。外景地资源丰富，熟悉各大动漫取景地。', works: 156, booked: 112 },
      { name: '南风知我', stars: 4, starStr: '&#9733;&#9733;&#9733;&#9733;&#9734;', city: '广州', tags: ['港风', '街拍', '原神'], price: '&#165;299/套', avatar: '&#127807;', intro: '港风街拍风格，善于利用城市街景创造独特氛围。性价比高，深受学生党喜爱。', works: 84, booked: 63 },
      { name: '漫影工坊', stars: 5, starStr: '&#9733;&#9733;&#9733;&#9733;&#9733;', city: '广州', tags: ['赛博', '棚拍', '崩铁'], price: '&#165;520/套', avatar: '&#9889;', intro: '赛博朋克风格专家，拥有霓虹灯管、烟雾机等特效设备。打造未来感视觉大片。', works: 73, booked: 58 },
      { name: '锦城映像', stars: 4, starStr: '&#9733;&#9733;&#9733;&#9733;&#9734;', city: '成都', tags: ['国风', '外景', '原神'], price: '&#165;280/套', avatar: '&#128060;', intro: '国风摄影爱好者，深耕成都周边古风取景地。提供服装租赁一站式服务。', works: 52, booked: 38 },
      { name: '蜀光摄影', stars: 5, starStr: '&#9733;&#9733;&#9733;&#9733;&#9733;', city: '成都', tags: ['日常', '棚拍', 'V家'], price: '&#165;380/套', avatar: '&#127883;', intro: '日常系摄影大师，擅长自然抓拍。棚拍环境温馨舒适，让Coser放松展现最佳状态。', works: 110, booked: 86 },
    ];

    function renderPhoto(city) {
      const grid = document.getElementById('photoGrid');
      const data = city === 'all' ? photoData : photoData.filter(d => d.city === city);
      grid.innerHTML = data.map(p => `
        <div class="photo-card" onclick="openPhotoProfile('${p.name}')">
          <div class="photo-header">
            <div class="photo-avatar">${p.avatar}</div>

              <div class="photo-name">${p.name}</div>
              <div class="photo-stars">${p.starStr}</div>

          <div class="photo-tags">${p.tags.map(t => `<span class="photo-tag">${t}</span>`).join('')}</div>

    renderPhoto('all');

      const p = photoData.find(x => x.name === name);
      if (!p) return;
      openModal(`
        <div style="text-align:center; margin-bottom:1rem;">

        <div class="modal-section">

          <h4>&#128205; 服务信息</h4>

        <div class="modal-section">
          <h4>&#128248; 作品展示</h4>
          <div class="modal-gallery">
            <div class="modal-gallery-item">&#9889;</div>
            <div class="modal-gallery-item">&#128167;</div>
            <div class="modal-gallery-item">&#127908;</div>
            <div class="modal-gallery-item">&#128153;</div>
            <div class="modal-gallery-item">&#127769;</div>
            <div class="modal-gallery-item">&#128065;&#65039;</div>
          </div>
        </div>
        <div class="modal-section">
          <h4>&#11088; 为 TA 打分</h4>
          <div class="star-rating" id="starRating">
            <span class="star" data-v="1">&#9733;</span>
            <span class="star" data-v="2">&#9733;</span>
            <span class="star" data-v="3">&#9733;</span>
            <span class="star" data-v="4">&#9733;</span>
            <span class="star" data-v="5">&#9733;</span>
          </div>
          <div class="rating-text" id="ratingText">点击星星为摄影师评分</div>
        </div>
        <div style="display:flex; gap:0.5rem; margin-top:1rem;">
          <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">关闭</button>
          <button class="btn btn-primary" style="flex:1;" onclick="showToast('预约请求已发送给 ${p.name}！'); closeModal();">
            &#128197; 立即预约
          </button>
        </div>
      `);

      // Star rating logic
      setTimeout(() => {
        const stars = document.querySelectorAll('#starRating .star');
        const ratingText = document.getElementById('ratingText');
        const texts = ['', '&#128544; 有待改进', '&#128528; 一般般', '&#128522; 还不错', '&#128516; 很满意', '&#129321; 超级棒！'];
        stars.forEach(s => {
          s.addEventListener('click', () => {
            const v = parseInt(s.dataset.v);
            stars.forEach((st, i) => {
              st.classList.toggle('active', i < v);
            });
            ratingText.innerHTML = texts[v];
          });
        });
      }, 50);
    };

    document.querySelectorAll('#panel-photographer .tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('#panel-photographer .tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        renderPhoto(t.dataset.city);
      });
    });
  </script>
</body>
