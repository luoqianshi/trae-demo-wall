/* ====== Device Frame ====== */
.device {

.fab {

.fab::after {

/* ====== Lock Screen ====== */
.lock {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(255, 218, 165, 0.55), transparent 55%),
    radial-gradient(ellipse at 85% 90%, rgba(176, 132, 204, 0.45), transparent 55%),
    radial-gradient(ellipse at 70% 30%, rgba(123, 196, 164, 0.35), transparent 55%),

  z-index: 200;

  flex-direction: column;
  align-items: center;
  padding: 72px 28px 50px;
  transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.55s;
  overflow: hidden;
}
.lock::before, .lock::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}
.lock::before {
  width: 180px; height: 180px;
  top: -60px; left: -40px;
  background: radial-gradient(circle, rgba(255, 138, 91, 0.3), transparent 70%);
  filter: blur(10px);
  animation: lockFloat 8s ease-in-out infinite;
}
.lock::after {
  width: 220px; height: 220px;
  bottom: -80px; right: -60px;
  background: radial-gradient(circle, rgba(176, 132, 204, 0.35), transparent 70%);
  filter: blur(14px);
  animation: lockFloat 9s ease-in-out infinite reverse;
}
@keyframes lockFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50%      { transform: translate(20px, -30px) scale(1.1); }
}
.lock.unlock {
  transform: translateY(-100%);
  opacity: 0;
  pointer-events: none;
}
.lock-orb {
  position: relative;
  width: 110px; height: 110px;
  margin-bottom: 22px;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
}
.lock-orb-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px solid rgba(255, 138, 91, 0.4);

}
.lock-orb-ring.r2 {

}
.lock-orb-ring.r3 {
  inset: 24px;

}
@keyframes orbRing {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50%      { transform: scale(1.06); opacity: 1; }
}
.lock-orb-core {
  width: 76px; height: 76px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF8A5B 0%, #B084CC 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  color: #fff;
  box-shadow:
    0 16px 36px rgba(255, 138, 91, 0.45),
    0 6px 16px rgba(176, 132, 204, 0.4),
    inset 0 -6px 12px rgba(176, 132, 204, 0.5),
    inset 0 6px 12px rgba(255, 230, 212, 0.5);
  animation: float 3s ease-in-out infinite;
  position: relative;
  z-index: 2;
}
.lock h2 {
  font-size: 26px;
  font-weight: 700;
  margin: 0 0 4px;
  font-family: 'BricolageGrotesque', sans-serif;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #2D2A32 0%, #6E4A8A 100%);

  -webkit-text-fill-color: transparent;
  background-clip: text;
  z-index: 1;
}
.lock .lock-sub {
  font-size: 12px;

.lock-dots {
  display: flex;

  z-index: 1;
}
.lock-dots span {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.7);
  border: 1.5px solid rgba(45, 42, 50, 0.18);

}
.lock-dots span.filled {
  background: linear-gradient(135deg, #FF8A5B, #B084CC);
  border-color: transparent;
  transform: scale(1.18);
  box-shadow: 0 4px 12px rgba(255, 138, 91, 0.5);
}
.lock-dots span.error {
  background: #FF5577;
  border-color: #FF5577;
  animation: shake 0.4s;
}
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  width: 100%;
  max-width: 290px;
  z-index: 1;
}
.key {
  position: relative;
  height: 64px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  font-family: 'Outfit', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  border: 1.5px solid rgba(255, 255, 255, 0.8);

  box-shadow:

}
.key:hover {
  background: rgba(255, 255, 255, 0.95);
  box-shadow: 0 6px 18px rgba(45, 42, 50, 0.12);
}
.key:active {
  transform: scale(0.92);
  background: linear-gradient(135deg, #FF8A5B, #B084CC);
  color: #fff;
  box-shadow: 0 2px 6px rgba(255, 138, 91, 0.4);
}
.key.del { font-size: 22px; }
.key.empty {
  background: transparent;
  box-shadow: none;
  border: none;
  pointer-events: none;
}
.lock-hint {
  margin-top: 18px;
  font-size: 12px;
  color: var(--muted);
  text-decoration: underline;

  z-index: 1;

.lock-hint:hover { color: var(--accent); text-decoration-color: var(--accent); }

/* ====== Cards (Shared) ====== */
.card {

  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
}
.card .title {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.card h3 {
  font-size: 16px;
  font-weight: 700;

  font-family: 'Bricolage', sans-serif;
}
.card .sub {
  font-size: 11px;
  color: var(--muted);
  font-family: 'RedHatMono', monospace;
  letter-spacing: 0.5px;
}

/* ====== Home Tab ====== */
.greeting {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 8px 0 20px;
}
.greeting h2 {
  font-size: 22px;
  font-weight: 700;
  margin: 0;
  font-family: 'Bricolage', sans-serif;
}
.wave {
  display: inline-block;
  font-size: 26px;
  transform-origin: 70% 70%;
  animation: wave 2.4s ease-in-out infinite;
}
@keyframes wave {
  0%, 60%, 100% { transform: rotate(0deg); }
  10%, 30% { transform: rotate(14deg); }
  20% { transform: rotate(-8deg); }
  40% { transform: rotate(-4deg); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes wiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-3deg); }
  75% { transform: rotate(3deg); }
}
@keyframes pop {
  0% { transform: scale(0.4); opacity: 0; }
  60% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); }
}

.today-card { background: linear-gradient(135deg, #FFFFFF 0%, #FFF6EB 100%); }
.today-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.today-head .badge {
  font-family: 'RedHatMono', monospace;
  font-size: 11px;
  background: var(--ink);
  color: var(--warm);
  padding: 4px 10px;
  border-radius: 8px;
  letter-spacing: 1px;
}
.mood-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.mood {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 0;
  border-radius: 14px;
  background: var(--bg2);
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.mood:hover { transform: translateY(-2px); }
.mood:active { transform: scale(0.94); }
.mood.selected {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 8px 20px rgba(255, 138, 91, 0.25);
  transform: translateY(-2px);
}
.mood.selected::after {
  content: '✓';
  position: absolute;
  top: 4px; right: 6px;
  font-size: 10px;
  color: #fff;
  background: var(--accent);
  width: 14px; height: 14px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.mood-emoji { font-size: 26px; transition: transform 0.2s; }
.mood.selected .mood-emoji { animation: pop 0.4s; }
.mood-label { font-size: 10px; color: var(--muted); font-weight: 700; }
.mood.selected .mood-label { color: var(--accent); }

.progress-wrap {
  margin-top: 14px;
  height: 6px;
  background: var(--bg2);
  border-radius: 3px;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.3s;
}
.progress-wrap.show { opacity: 1; }
.progress-bar {
  height: 100%;
  width: 0;
  background: var(--grad-1);
  border-radius: 3px;
  transition: width 0.1s linear;
}

.curve-card .mini-curve {
  width: 100%;
  height: 90px;
}

.tip-card {
  background: var(--grad-soft);
  display: flex; align-items: center; gap: 12px;
  border: 1px dashed var(--accent2);
}
.tip-card .tip-ico {
  font-size: 24px;
  animation: wiggle 1.6s ease-in-out infinite;
}
.tip-card p {
  margin: 0; font-size: 13px; line-height: 1.4;
}
.tip-card strong { color: var(--accent); }

/* ====== Release Tab ====== */
.release-tabs {
  display: flex; gap: 8px;
  background: var(--bg2);
  padding: 4px;
  border-radius: 14px;
  margin-bottom: 16px;
}
.release-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}
.release-tab.active {
  background: #fff;
  color: var(--accent);
  box-shadow: var(--shadow-sm);
}
.release-panel { display: none; }
.release-panel.active { display: block; animation: pop 0.3s; }

.canvas-tools {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.color-list { display: flex; gap: 6px; }
.color-dot {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: transform 0.15s;
}
.color-dot.active { transform: scale(1.2); box-shadow: 0 0 0 2px var(--accent); }
.brush-list { display: flex; gap: 4px; }
.brush-btn {
  width: 32px; height: 32px;
  background: var(--bg2);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.brush-btn .b { background: var(--ink); border-radius: 50%; }
.brush-btn .b-sm { width: 4px; height: 4px; }
.brush-btn .b-md { width: 8px; height: 8px; }
.brush-btn .b-lg { width: 12px; height: 12px; }
.brush-btn.active { background: var(--accent); }
.brush-btn.active .b { background: #fff; }
.clear-btn {
  margin-left: auto;
  background: var(--bg2);
  border: none;
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  font-family: inherit;
}
.clear-btn:active { transform: scale(0.94); }
.canvas-frame {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  padding: 6px;
}
#doodle {
  width: 100%;
  height: 360px;
  display: block;
  border-radius: 14px;
  background:
    radial-gradient(circle at 20% 20%, #FFF6EB, transparent 50%),
    repeating-linear-gradient(0deg, transparent 0 19px, rgba(241,220,196,0.4) 19px 20px),
    repeating-linear-gradient(90deg, transparent 0 19px, rgba(241,220,196,0.4) 19px 20px),
    #FFFDF8;
  touch-action: none;
  cursor: crosshair;
  -webkit-tap-highlight-color: transparent;
}

.bubble-stats, .squeeze-stats {
  text-align: center;
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 14px;
  font-weight: 700;
}
.bubble-stats b, .squeeze-stats b { color: var(--accent); font-size: 18px; font-family: 'Outfit', sans-serif; }
.bubble-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  padding: 18px 14px;
  background: linear-gradient(135deg, #FFF8F0 0%, #FFE9F1 100%);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}
.bubble {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: radial-gradient(circle at 32% 28%, #FFE0EC 0%, #FFB3D1 35%, #B084CC 90%);
  box-shadow:
    inset 0 -5px 10px rgba(176,132,204,0.45),
    inset 0 4px 8px rgba(255,255,255,0.6),
    0 6px 14px rgba(255, 138, 91, 0.28);
  cursor: pointer;
  position: relative;
  transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
  margin: 0 auto;
  animation: bubbleBreath 3.2s ease-in-out infinite;
  -webkit-tap-highlight-color: transparent;
}
.bubble:nth-child(3n) { animation-delay: 0.4s; }
.bubble:nth-child(3n+1) { animation-delay: 0.9s; }
@keyframes bubbleBreath {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}
.bubble::before {
  content: '';
  position: absolute;
  top: 8px; left: 12px;
  width: 14px; height: 10px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.85), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.bubble::after {
  content: '';
  position: absolute;
  bottom: 14px; right: 16px;
  width: 6px; height: 5px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  pointer-events: none;
}
.bubble.pop {
  transform: scale(0);
  opacity: 0;
  transition: transform 0.18s ease-in, opacity 0.18s ease-in;
}
.bubble.new {
  animation: pop 0.3s;
}

.squeeze-area {
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  padding: 30px 20px 24px;
  background: linear-gradient(180deg, #FFFFFF 0%, #FFF6EB 100%);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}
.squeeze-area::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(255,138,91,0.18), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.squeeze-area::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -40px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(176,132,204,0.18), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.ball-wrap {
  position: relative;
  width: 220px; height: 220px;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
}
.ball-wrap::before {
  content: '';
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,138,91,0.12) 0%, transparent 65%);
  animation: ballHalo 2.4s ease-in-out infinite;
}
@keyframes ballHalo {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.08); opacity: 0.7; }
}
.ball {
  position: relative;
  width: 200px; height: 200px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 30%, #FFEDDF 0%, #FFA177 30%, #C97AB5 75%, #8765B0 100%);
  box-shadow:
    inset 0 -25px 50px rgba(135, 101, 176, 0.55),
    inset 0 25px 50px rgba(255, 237, 223, 0.55),
    inset 10px 0 25px rgba(255, 255, 255, 0.25),
    0 22px 50px rgba(255, 138, 91, 0.35);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: 0.5px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  will-change: transform;
  transform-origin: 50% 50%;
  z-index: 2;
}
.ball::before {
  content: '';
  position: absolute;
  top: 18%; left: 22%;
  width: 36%; height: 30%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.7), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.ball::after {
  content: '';
  position: absolute;
  bottom: 22%; right: 18%;
  width: 14%; height: 10%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.3), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.ball.pop-bounce {
  animation: popBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popBounce {
  0%   { transform: scale(0.62, 0.5); }
  40%  { transform: scale(1.18, 0.92); }
  65%  { transform: scale(0.92, 1.08); }
  85%  { transform: scale(1.04, 0.97); }
  100% { transform: scale(1, 1); }
}

.confetti {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 100;
  animation: confettiFly 0.8s ease-out forwards;
}
@keyframes confettiFly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
}

/* ====== Tree Hole Tab ====== */
.chat-wrap {

.quick-topics {

.chat-input-bar {

/* ====== Curve Tab ====== */
.curve-wrap { padding: 4px 0; }

/* ====== Toast ====== */
.toast-wrap {
  position: absolute;
  bottom: 100px;
  right: 16px;
  z-index: 300;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--ink);
  color: #fff;
  padding: 10px 16px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 700;
  box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 8px;

}
@keyframes toastIn {
  0% { transform: translateX(120%); opacity: 0; }
  100% { transform: translateX(0); opacity: 1; }
}
@keyframes toastOut {
  0% { transform: translateX(0); opacity: 1; }
  100% { transform: translateX(120%); opacity: 0; }
}

/* ====== Modal ====== */
.modal-mask {
  position: absolute;
  inset: 0;
  background: rgba(45, 42, 50, 0.4);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 250;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-mask.show { opacity: 1; pointer-events: auto; }
.modal {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 280px;
  text-align: center;
  box-shadow: var(--shadow-lg);

  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.modal-mask.show .modal { transform: scale(1); }
.modal h3 { margin: 0 0 8px; font-size: 17px; }
.modal p { margin: 0 0 20px; font-size: 13px; color: var(--muted); line-height: 1.5; }
.modal-btns { display: flex; gap: 10px; }
.modal-btn {
  flex: 1; padding: 10px;

  font-family: inherit; font-weight: 700; font-size: 14px;

}
.modal-btn.cancel { background: var(--bg2); color: var(--ink); }
.modal-btn.confirm { background: var(--grad-1); color: #fff; }
.modal-btn.danger { background: #D94455; color: #fff; }

<script>
/* ============ State & Storage ============ */
const STORAGE = {
  UNLOCK: 'mood_pocket_unlocked',
  LOGS: 'mood_pocket_mood_logs',
  STATS: 'mood_pocket_stats',
  NAME: 'mood_pocket_nickname',
  PW: 'mood_pocket_password'
};
const PASSWORD = '1234';
const state = {
  unlocked: false,
  nickname: '小树',
  moodLogs: [],
  stats: { bubblePop: 0, squeeze: 0, chatCount: 0 },
  currentTab: 'home',
  releaseTab: 'doodle',
  moodInput: '',
  chatHistory: []
};
function load() {
  try {
    state.unlocked = localStorage.getItem(STORAGE.UNLOCK) === '1';
    const n = localStorage.getItem(STORAGE.NAME);
    if (n) state.nickname = n;
    const logs = localStorage.getItem(STORAGE.LOGS);
    if (logs) state.moodLogs = JSON.parse(logs);
    const st = localStorage.getItem(STORAGE.STATS);
    if (st) Object.assign(state.stats, JSON.parse(st));
  } catch (e) { console.warn(e); }
}
function save() {
  try {
    localStorage.setItem(STORAGE.UNLOCK, state.unlocked ? '1' : '0');
    localStorage.setItem(STORAGE.NAME, state.nickname);
    localStorage.setItem(STORAGE.LOGS, JSON.stringify(state.moodLogs));
    localStorage.setItem(STORAGE.STATS, JSON.stringify(state.stats));
  } catch (e) { console.warn(e); }
}

/* ============ Utils ============ */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const MOODS = [
  { key: 'happy',  emo: '😊', label: '开心', v: 5 },
  { key: 'calm',   emo: '😌', label: '平静', v: 4 },
  { key: 'low',    emo: '😔', label: '低落', v: 2 },
  { key: 'irrit',  emo: '😤', label: '烦躁', v: 2 },
  { key: 'sad',    emo: '😢', label: '难过', v: 1 }
];
const QUICK_TOPICS = ['学业压力', '和朋友吵架', '和爸妈说不通', '睡不好', '不知道为啥不开心', '想哭'];

function todayKey(d) {
  const dt = d || new Date();
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function fmtDate(d) {
  const dt = d || new Date();
  return String(dt.getMonth()+1).padStart(2,'0') + '.' + String(dt.getDate()).padStart(2,'0');
}
function getWeekKey() {
  const dt = new Date();
  const day = dt.getDay() || 7;
  dt.setDate(dt.getDate() - day + 1);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function getWeekStart() {
  const dt = new Date();
  const day = dt.getDay() || 7;
  dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() - day + 1);
  return dt;
}
function moodValOfLog(log) {
  return MOODS.find(m => m.key === log.mood)?.v || 0;
}
function moodEmoOfKey(k) {
  return MOODS.find(m => m.key === k)?.emo || '·';
}

function toast(text, icon = '✨') {
  const wrap = $('#toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<span>' + icon + '</span><span>' + text + '</span>';
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

/* ============ Lock Screen ============ */
let pin = '';
function initLock() {
  const dots = $$('#lock-dots span');
  const update = () => dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length));
  $$('#keypad .key').forEach(k => {
    k.addEventListener('click', () => {
      const n = k.dataset.num;
      if (n === 'del') {
        pin = pin.slice(0, -1);
        update();
        return;
      }
      if (pin.length >= 4) return;
      pin += n;
      update();
      if (pin.length === 4) {
        if (pin === PASSWORD) {
          state.unlocked = true;
          save();
          setTimeout(() => {
            $('#lock').classList.add('unlock');
            toast('解锁成功，欢迎回来', '🌳');
            renderAll();
          }, 200);
        } else {
          dots.forEach(d => { d.classList.add('error'); setTimeout(() => d.classList.remove('error'), 400); });
          pin = '';
          update();
          toast('密码错误，请重试', '⚠️');
        }
      }
    });
  });
  $('#forgot-btn').addEventListener('click', () => {
    toast('演示版本：默认密码 1234', '💡');
  });
}
function showLockIfNeeded() {
  if (!state.unlocked) {
    $('#lock').classList.remove('unlock');
  } else {
    $('#lock').classList.add('unlock');
  }
}

/* ============ Tab Bar ============ */
function switchTab(name) {
  if (state.currentTab === name) return;
  const old = state.currentTab;
  state.currentTab = name;
  $$('.tab').forEach(t => {
    t.classList.remove('active', 'left');
    if (t.id === 'tab-' + name) {
      t.classList.add('active');
    } else if (t.id === 'tab-' + old) {
      t.classList.add('left');
    }
  });
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  if (name === 'curve') renderCurve();
  if (name === 'profile') renderProfile();
  if (name === 'release') renderRelease();
  if (old === 'release' && name !== 'release') {
    // 离开发泄页时确保球体复位（防止 transform 残留）
    const ball = $('#ball');
    if (ball) {
      ball.style.transition = '';
      ball.style.transform = '';
      ball.classList.remove('pop-bounce');
    }
  }
  if (name === 'home') renderHome();
  if (name === 'chat') {
    setTimeout(() => { $('#chat-input').focus(); }, 300);
  }
}
function initTabs() {
  $$('.tab-btn').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });
  $('.fab').addEventListener('click', () => switchTab('chat'));
}

/* ============ Greeting ============ */
function updateGreeting() {
  const h = new Date().getHours();
  let g = '早上好';
  if (h >= 12 && h < 18) g = '下午好';
  else if (h >= 18 || h < 6) g = '晚上好';
  $('#greet-text').textContent = g + '，' + state.nickname + ' 🌳';
  $('#profile-name').textContent = state.nickname;
}

/* ============ Home Tab ============ */
function renderMoodRow() {
  const row = $('#mood-row');
  row.innerHTML = '';
  const today = todayKey();
  const todayLog = state.moodLogs.find(l => l.date === today);
  MOODS.forEach(m => {
    const el = document.createElement('div');
    el.className = 'mood' + (todayLog && todayLog.mood === m.key ? ' selected' : '');
    el.innerHTML = '<span class="mood-emoji">' + m.emo + '</span><span class="mood-label">' + m.label + '</span>';
    el.addEventListener('click', () => onMoodSelect(m, el));
    row.appendChild(el);
  });
}
function onMoodSelect(m, el) {
  const today = todayKey();
  const ts = Date.now();
  const existing = state.moodLogs.find(l => l.date === today);
  if (existing) {
    existing.mood = m.key;
    existing.ts = ts;
  } else {
    state.moodLogs.push({ date: today, mood: m.key, ts });
  }
  save();
  $$('.mood').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  const wrap = $('#mood-progress');
  const bar = $('#mood-bar');
  wrap.classList.add('show');
  bar.style.width = '0%';
  let p = 0;
  const start = Date.now();
  const dur = 10000;
  const tick = () => {
    const dt = Date.now() - start;
    p = Math.min(100, (dt / dur) * 100);
    bar.style.width = p + '%';
    if (p < 100) requestAnimationFrame(tick);
    else {
      wrap.classList.remove('show');
      toast('已记录今日心情', '✨');
      renderMiniCurve();
      renderCurve();
      renderProfile();
    }
  };
  requestAnimationFrame(tick);
}
function renderMiniCurve() {
  const svg = $('#mini-curve');
  const ws = getWeekStart();
  const logs = state.moodLogs;
  const points = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    const k = todayKey(d);
    const log = logs.find(l => l.date === k);
    const v = log ? moodValOfLog(log) : null;
    points.push({ x: i, v });
  }
  const W = 300, H = 90, pad = 12;
  const stepX = (W - pad*2) / 6;
  const yFor = v => v == null ? null : pad + (1 - v/5) * (H - pad*2);
  let d = '', fill = '';
  let started = false;
  points.forEach((p, i) => {
    if (p.v == null) return;
    const x = pad + i * stepX;
    const y = yFor(p.v);
    d += (started ? 'L' : 'M') + x + ',' + y + ' ';
    started = true;
  });
  const lastIdx = points.findLastIndex ? points.findLastIndex(p => p.v != null) : (() => { let i=points.length-1; while(i>=0 && points[i].v==null) i--; return i; })();
  if (lastIdx >= 0) {
    const xL = pad + lastIdx * stepX;
    const yL = yFor(points[lastIdx].v);
    fill = d + 'L' + xL + ',' + (H - pad) + ' L' + pad + ',' + (H - pad) + ' Z';
  }
  let dots = '';
  points.forEach((p, i) => {
    if (p.v == null) return;
    const x = pad + i * stepX;
    const y = yFor(p.v);
    dots += '<circle cx="' + x + '" cy="' + y + '" r="3" fill="#FF8A5B"/>';
  });
  svg.innerHTML = '<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF8A5B" stop-opacity="0.4"/><stop offset="100%" stop-color="#FF8A5B" stop-opacity="0"/></linearGradient></defs>'
    + (fill ? '<path d="' + fill + '" fill="url(#cg)"/>' : '')
    + (d ? '<path d="' + d + '" stroke="#FF8A5B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' : '')
    + dots
    + '<text x="' + pad + '" y="' + (H-1) + '" font-size="9" fill="#6E6877" font-family="RedHatMono">周一</text>'
    + '<text x="' + (W-pad-30) + '" y="' + (H-1) + '" font-size="9" fill="#6E6877" font-family="RedHatMono">周日</text>';
}
function renderHome() {
  $('#today-date').textContent = 'TODAY · ' + fmtDate();
  renderMoodRow();
  renderMiniCurve();
  updateGreeting();
}

/* ============ Release Tab ============ */
const DOODLE_COLORS = ['#FF8A5B', '#B084CC', '#7BC4A4', '#4A90E2', '#2D2A32', '#FFFFFF'];
let brushColor = DOODLE_COLORS[0];
let brushSize = 4;
let drawing = false;
let lastX = 0, lastY = 0;

function initDoodle() {
  const list = $('#color-list');
  DOODLE_COLORS.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (i === 0 ? ' active' : '');
    d.style.background = c;
    if (c === '#FFFFFF') d.style.border = '1px solid #ddd';
    d.addEventListener('click', () => {
      $$('.color-dot').forEach(x => x.classList.remove('active'));
      d.classList.add('active');
      brushColor = c;
    });
    list.appendChild(d);
  });
  $$('.brush-btn').forEach(b => {
    b.addEventListener('click', () => {
      $$('.brush-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      brushSize = parseInt(b.dataset.size, 10);
    });
  });
  $('#clear-doodle').addEventListener('click', () => {
    const c = $('#doodle');
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);
    toast('画布已清空', '🧽');
  });
  const c = $('#doodle');
  function resize() {
    void c.offsetWidth;
    const rect = c.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return false;
    const newW = Math.max(1, Math.floor(rect.width));
    const newH = Math.max(1, Math.floor(rect.height));
    if (c.width === newW && c.height === newH && c.dataset.inited === '1') return true;
    let saved = null;
    if (c.dataset.inited === '1') {
      try { saved = c.toDataURL(); } catch (e) {}
    }
    c.width = newW;
    c.height = newH;
    const ctx = c.getContext('2d');
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    if (saved && saved.length > 100) {
      const im = new Image();
      im.onload = () => { try { ctx.drawImage(im, 0, 0, newW, newH); } catch (e) {} };
      im.src = saved;
    }
    c.dataset.inited = '1';
    return true;
  }
  // 监听外部 refresh 事件（切到 doodle tab 时主动触发）
  c.addEventListener('refresh', () => { if (!resize()) requestAnimationFrame(resize); });
  // 首次初始化（tab 隐藏时返回 false，会自循环 RAF）
  if (!resize()) requestAnimationFrame(resize);
  window.addEventListener('resize', () => { if (state.currentTab === 'release') resize(); });
  function pos(e) {
    const rect = c.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = pos(e);
    lastX = p.x; lastY = p.y;
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const ctx = c.getContext('2d');
    const p = pos(e);
    ctx.strokeStyle = brushColor;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x; lastY = p.y;
  }
  function end() { drawing = false; }
  c.addEventListener('pointerdown', start);
  c.addEventListener('pointermove', move);
  c.addEventListener('pointerup', end);
  c.addEventListener('pointerleave', end);
  c.addEventListener('pointercancel', end);
}
function initBubble() {
  const grid = $('#bubble-grid');
  for (let i = 0; i < 20; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.addEventListener('click', e => popBubble(b, e));
    b.addEventListener('touchstart', e => { e.preventDefault(); popBubble(b, e); }, { passive: false });
    grid.appendChild(b);
  }
  $('#bubble-count').textContent = state.stats.bubblePop;
}
function popBubble(b, e) {
  if (b.classList.contains('pop')) return;
  b.classList.add('pop');
  state.stats.bubblePop++;
  save();
  $('#bubble-count').textContent = state.stats.bubblePop;
  $('#stat-bubble').textContent = state.stats.bubblePop;
  const rect = b.getBoundingClientRect();
  const screen = $('#screen').getBoundingClientRect();
  const cx = rect.left - screen.left + rect.width/2;
  const cy = rect.top - screen.top + rect.height/2;
  for (let i = 0; i < 5; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = cx + 'px';
    c.style.top = cy + 'px';
    c.style.background = ['#FF8A5B','#B084CC','#7BC4A4','#FFD9A0','#4A90E2'][i];
    const angle = (Math.PI * 2 * i) / 5 + Math.random() * 0.4;
    const dist = 30 + Math.random() * 30;
    c.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    c.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
    $('#screen').appendChild(c);
    setTimeout(() => c.remove(), 900);
  }
  setTimeout(() => {
    b.classList.remove('pop');
    b.classList.add('new');
    setTimeout(() => b.classList.remove('new'), 300);
  }, 300);
}
function initSqueeze() {
  const ball = $('#ball');
  let pressing = false;
  let pressStart = 0;
  let rafId = null;
  let lastCount = 0;

  const apply = (elapsedMs) => {
    // 0–1000ms gradually squish to (0.62, 0.5); after 1000ms hold + tiny pulse
    let sx, sy;
    if (elapsedMs < 1000) {
      const t = elapsedMs / 1000;
      const ease = 1 - Math.pow(1 - t, 3);
      sx = 1 - 0.38 * ease;     // 1 → 0.62
      sy = 1 - 0.5 * ease;      // 1 → 0.5
    } else {
      // hold + subtle pulse to show it's "alive"
      const t = (elapsedMs - 1000) / 600;
      const pulse = Math.sin(t * Math.PI * 2) * 0.03;
      sx = 0.62 + pulse;
      sy = 0.5 + pulse;
    }
    ball.style.transform = `scale(${sx.toFixed(3)}, ${sy.toFixed(3)})`;
    // 计数器：每 250ms 增加 1（仅在持续按压期间累加，end() 时再加 1 作为反馈）
    const newCount = Math.floor(elapsedMs / 250);
    if (newCount > lastCount) {
      const inc = newCount - lastCount;
      state.stats.squeeze += inc;
      lastCount = newCount;
      save();
      $('#squeeze-count').textContent = state.stats.squeeze;
      $('#stat-squeeze').textContent = state.stats.squeeze;
    }
    if (pressing) rafId = requestAnimationFrame(ts => { apply(performance.now() - pressStart); });
  };

  const start = e => {
    e.preventDefault();
    if (pressing) return;
    pressing = true;
    pressStart = performance.now();
    lastCount = 0;
    ball.style.transition = 'none';
    apply(0);  // 启动 RAF 循环（按压时长不足 250ms 时不会自增，由 end() 负责 +1）
  };
  const end = () => {
    if (!pressing) return;
    pressing = false;
    if (rafId) cancelAnimationFrame(rafId);
    ball.style.transition = '';
    ball.style.transform = '';
    // 释放时 +1（即使轻按一下也有反馈）
    state.stats.squeeze++;
    save();
    $('#squeeze-count').textContent = state.stats.squeeze;
    $('#stat-squeeze').textContent = state.stats.squeeze;
    ball.classList.add('pop-bounce');
    setTimeout(() => ball.classList.remove('pop-bounce'), 620);
  };

  ball.addEventListener('pointerdown', start);
  window.addEventListener('pointerup', end);
  window.addEventListener('pointercancel', end);
  ball.addEventListener('pointerleave', end);
  $('#squeeze-count').textContent = state.stats.squeeze;
  $('#stat-squeeze').textContent = state.stats.squeeze;
}
function initReleaseTabs() {
  $$('.release-tab').forEach(b => {
    b.addEventListener('click', () => {
      const k = b.dataset.rel;
      state.releaseTab = k;
      $$('.release-tab').forEach(x => x.classList.toggle('active', x === b));
      $$('.release-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + k));
      // 切到 doodle 子 tab 时强制 resize（doodle 此前可能因隐藏未初始化）
      if (k === 'doodle') {
        requestAnimationFrame(() => {
          const c = document.getElementById('doodle');
          if (c) {
            c.dataset.inited = '';
            // 触发一次 resize
            c.dispatchEvent(new Event('refresh'));
          }
        });
      }
    });
  });
}
function renderRelease() {
  $('#bubble-count').textContent = state.stats.bubblePop;
  $('#squeeze-count').textContent = state.stats.squeeze;
  // 切到发泄页时若 doodle 还在重试 resize，让它完成
  requestAnimationFrame(() => {
    const c = document.getElementById('doodle');
    if (c && c.dataset.inited !== '1') c.dispatchEvent(new Event('refresh'));
  });
}

/* ============ Chat (Tree Hole) ============ */
const KEYWORDS = {
  '累|疲惫|疲倦|太累|好累': [
    '听起来你今天很辛苦，要不先深呼吸三次？',
    '累的时候记得给自己一个拥抱，你已经做得很好了。',
    '辛苦了，要不要听一首歌放松一下？',

function aiReply(text) {
  for (const pat in KEYWORDS) {
    const re = new RegExp(pat);
    if (re.test(text)) {
      const arr = KEYWORDS[pat];
      return arr[Math.floor(Math.random() * arr.length)];
    }
  }
  return FALLBACK[Math.floor(Math.random() * FALLBACK.length)];
}
function renderChat() {
  const wrap = $('#chat-msgs');
  const old = wrap.innerHTML;
  wrap.innerHTML = old.replace(/<div class="welcome-card">[\s\S]*?<\/div>/, '');
  const welcome = document.createElement('div');
  welcome.className = 'welcome-card';
  welcome.innerHTML = '<span class="w-ico">🌳</span><div><div class="bold" style="font-size:14px;">嗨，我是小树洞</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">你可以说任何事，我都在。</div></div>';
  if (state.chatHistory.length === 0) {
    wrap.innerHTML = '';
    wrap.appendChild(welcome);
  }
  state.chatHistory.forEach(m => {
    const el = document.createElement('div');
    el.className = 'msg ' + m.role;
    if (m.role === 'user') {
      el.innerHTML = '<div class="avatar">🧑</div><div class="bubble-msg"></div>';
    } else {
      el.innerHTML = '<div class="avatar">🌳</div><div class="bubble-msg"></div>';
    }
    el.querySelector('.bubble-msg').textContent = m.text;
    wrap.appendChild(el);
  });
  wrap.scrollTop = wrap.scrollHeight;
}
function addChatMsg(role, text) {
  state.chatHistory.push({ role, text });
  if (state.chatHistory.length > 50) state.chatHistory = state.chatHistory.slice(-50);
  if (role === 'user') {
    state.stats.chatCount++;
    save();
    $('#stat-chat').textContent = state.stats.chatCount;
  }
  const wrap = $('#chat-msgs');
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  if (role === 'user') {
    el.innerHTML = '<div class="avatar">🧑</div><div class="bubble-msg"></div>';
  } else {
    el.innerHTML = '<div class="avatar">🌳</div><div class="bubble-msg"></div>';
  }
  el.querySelector('.bubble-msg').textContent = text;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}
function showTyping() {
  const wrap = $('#chat-msgs');
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.id = '__typing';
  el.innerHTML = '<div class="avatar">🌳</div><div class="typing"><span></span><span></span><span></span></div>';
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}
function hideTyping() {
  const t = document.getElementById('__typing');
  if (t) t.remove();
}
function sendUserMsg(text) {
  if (!text.trim()) return;
  state.chatHistory = state.chatHistory.filter(m => !(m.role === 'ai' && m.text.startsWith('嗨')));
  addChatMsg('user', text);
  showTyping();
  const delay = 800 + Math.random() * 700;
  setTimeout(() => {
    hideTyping();
    const reply = aiReply(text);
    addChatMsg('ai', reply);
  }, delay);
}
function initChat() {
  const topics = $('#quick-topics');
  QUICK_TOPICS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'quick-topic';
    b.textContent = t;
    b.addEventListener('click', () => {
      sendUserMsg(t);
    });
    topics.appendChild(b);
  });
  $('#send-btn').addEventListener('click', () => {
    const inp = $('#chat-input');
    const v = inp.value;
    inp.value = '';
    sendUserMsg(v);
  });
  $('#chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      $('#send-btn').click();
    }
  });
  renderChat();
}

/* ============ Curve Tab ============ */
function renderCurve() {
  const ws = getWeekStart();
  const points = [];
  const logs = state.moodLogs;
  let sum = 0, cnt = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    const k = todayKey(d);
    const log = logs.find(l => l.date === k);
    const v = log ? moodValOfLog(log) : 0;
    if (log) { sum += v; cnt++; }
    points.push({ d, v, log });
  }
  $('#avg-mood').textContent = cnt ? (sum / cnt).toFixed(1) : '—';
  $('#total-logs').textContent = cnt;
  const svg = $('#big-curve');
  const W = 260, H = 160, padL = 24, padR = 12, padT = 16, padB = 28;
  const stepX = (W - padL - padR) / 6;
  const yFor = v => v ? (padT + (1 - v/5) * (H - padT - padB)) : null;
  let d = '', fill = '';
  let started = false;
  points.forEach((p, i) => {
    if (!p.v) return;
    const x = padL + i * stepX;
    const y = yFor(p.v);
    d += (started ? 'L' : 'M') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
    started = true;
  });
  const lastIdx = (() => { let i=points.length-1; while(i>=0 && !points[i].v) i--; return i; })();
  if (lastIdx >= 0) {
    const xL = padL + lastIdx * stepX;
    fill = d + 'L' + xL.toFixed(1) + ',' + (H - padB).toFixed(1) + ' L' + padL + ',' + (H - padB).toFixed(1) + ' Z';
  }
  let grid = '';
  for (let g = 0; g <= 5; g++) {
    const y = padT + (1 - g/5) * (H - padT - padB);
    grid += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="#F1DCC4" stroke-width="0.5" stroke-dasharray="3,3"/>';
    grid += '<text x="2" y="' + (y+3) + '" font-size="8" fill="#6E6877" font-family="RedHatMono">' + g + '</text>';
  }
  let dots = '';
  const names = ['一','二','三','四','五','六','日'];
  points.forEach((p, i) => {
    if (!p.v) return;
    const x = padL + i * stepX;
    const y = yFor(p.v);
    dots += '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="5" fill="#fff" stroke="#FF8A5B" stroke-width="2"/>';
    dots += '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="2.5" fill="#FF8A5B"/>';
  });
  let xLabels = '';
  points.forEach((p, i) => {
    const x = padL + i * stepX;
    xLabels += '<text x="' + x.toFixed(1) + '" y="' + (H-8) + '" font-size="10" fill="#6E6877" text-anchor="middle" font-family="RedHatMono">' + names[i] + '</text>';
  });
  svg.innerHTML = '<defs><linearGradient id="biggrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF8A5B" stop-opacity="0.5"/><stop offset="100%" stop-color="#FF8A5B" stop-opacity="0"/></linearGradient></defs>'
    + grid
    + (fill ? '<path d="' + fill + '" fill="url(#biggrad)"/>' : '')
    + (d ? '<path d="' + d + '" stroke="#FF8A5B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' : '')
    + dots
    + xLabels;
  const wk = $('#week-cards');
  wk.innerHTML = '';
  const dayNames = ['一','二','三','四','五','六','日'];
  points.forEach((p, i) => {
    const dc = document.createElement('div');
    dc.className = 'day-card' + (p.log ? ' has' : '');
    if (p.log) {
      dc.innerHTML = '<div class="d-emoji">' + moodEmoOfKey(p.log.mood) + '</div><div class="d-name">周' + dayNames[i] + '</div>';
    } else {
      dc.innerHTML = '<div class="d-empty">·</div><div class="d-name">周' + dayNames[i] + '</div>';
    }
    wk.appendChild(dc);
  });
}

    $('#profile-medal').style.display = 'inline-block';

  }
  $('#profile-name').textContent = state.nickname;
}

/* ============ Modal ============ */
function showModal({ title, text, okText = '确定', cancelText = '取消', danger = false, onOk }) {
  $('#modal-title').textContent = title;
  $('#modal-text').textContent = text;
  $('#modal-ok').textContent = okText;
  $('#modal-ok').className = 'modal-btn ' + (danger ? 'danger' : 'confirm');
  $('#modal-cancel').textContent = cancelText;
  $('#modal').classList.add('show');
  const ok = $('#modal-ok');
  const cancel = $('#modal-cancel');
  const close = () => $('#modal').classList.remove('show');
  const newOk = ok.cloneNode(true);
  ok.parentNode.replaceChild(newOk, ok);
  newOk.addEventListener('click', () => {
    close();
    if (onOk) onOk();
  });
  cancel.onclick = close;
}
function initModal() {
  $('#lock-btn').addEventListener('click', () => {
    showModal({
      title: '锁定 App？',
      text: '下次打开需要重新输入密码 1234。',
      onOk: () => {
        state.unlocked = false;
        save();
        pin = '';
        $$('#lock-dots span').forEach(d => d.classList.remove('filled'));
        $('#lock').classList.remove('unlock');
        toast('已锁定', '🔒');
      }
    });
  });
  $('#clear-btn').addEventListener('click', () => {
    showModal({
      title: '清空所有数据？',
      text: '将删除所有心情记录、统计数据和聊天记录，且不可恢复。',
      okText: '清空',
      danger: true,
      onOk: () => {
        state.moodLogs = [];
        state.stats = { bubblePop: 0, squeeze: 0, chatCount: 0 };
        state.chatHistory = [];
        save();
        renderAll();
        toast('已清空所有数据', '🧹');
      }
    });
  });
}
