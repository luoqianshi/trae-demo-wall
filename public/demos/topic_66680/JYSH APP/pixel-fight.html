<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>像素格斗 Demo · Pixel Fight</title>
<style>
  /* ============== 基础重置 ============== */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:#1a1530;color:#f5e8c7;overflow:hidden;user-select:none;-webkit-user-select:none}

  /* ============== 游戏舞台 ============== */
  .stage{position:relative;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 50% 20%,#3a2a5a 0%,#1a1530 60%,#0d0a1f 100%);
  }

  /* 顶部 HUD */
  .hud{width:min(960px,96vw);display:flex;justify-content:space-between;
    align-items:center;margin-bottom:10px;padding:10px 16px;
    background:rgba(0,0,0,.35);border:2px solid #6b4fa0;border-radius:12px;
    box-shadow:0 0 20px rgba(107,79,160,.3)}
  .hp-block{flex:1;display:flex;align-items:center;gap:10px}
  .hp-block.right{flex-direction:row-reverse}
  .name{font-weight:700;color:#ffd77a;min-width:70px;text-shadow:2px 2px 0 #000}
  .hp-bar{flex:1;height:18px;background:#2a1a4a;border:2px solid #6b4fa0;
    border-radius:4px;overflow:hidden;position:relative;image-rendering:pixelated}
  .hp-fill{height:100%;transition:width .25s ease;background:linear-gradient(90deg,#ff5252 0%,#ffb142 50%,#7bed9f 100%)}
  .hp-fill.right{background:linear-gradient(270deg,#ff5252 0%,#ffb142 50%,#7bed9f 100%)}
  .hp-text{position:absolute;top:0;left:0;right:0;text-align:center;
    font-size:11px;font-weight:700;color:#fff;text-shadow:1px 1px 0 #000;line-height:18px}
  .round-tag{font-size:20px;font-weight:700;color:#ffd77a;letter-spacing:2px;
    padding:4px 12px;text-shadow:2px 2px 0 #000}

  /* 游戏画布容器 */
  .canvas-wrap{position:relative;width:min(960px,96vw);aspect-ratio:16/9;
    border:3px solid #6b4fa0;border-radius:8px;overflow:hidden;
    box-shadow:0 0 40px rgba(107,79,160,.4),inset 0 0 20px rgba(0,0,0,.5)}
  #game{width:100%;height:100%;display:block;image-rendering:pixelated;
    image-rendering:crisp-edges;background:#87ceeb}

  /* 覆盖层：开始/结束 */
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:rgba(13,10,31,.85);
    backdrop-filter:blur(4px);z-index:10;animation:fadeIn .4s ease}
  .overlay.hidden{display:none}
  .title{font-size:clamp(28px,5vw,56px);font-weight:900;color:#ffd77a;
    letter-spacing:6px;text-shadow:4px 4px 0 #8b5e3c,8px 8px 0 rgba(0,0,0,.4);
    margin-bottom:20px}
  .subtitle{font-size:clamp(14px,2vw,18px);color:#c8b8e0;margin-bottom:30px;text-align:center;line-height:1.8;padding:0 20px}
  .btn{padding:12px 32px;border:none;border-radius:8px;font-size:16px;font-weight:700;
    cursor:pointer;background:linear-gradient(135deg,#ffd77a,#f4a460);color:#3a2a1a;
    box-shadow:0 4px 0 #8b5e3c,0 6px 12px rgba(0,0,0,.3);transition:all .1s;
    letter-spacing:2px}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 #8b5e3c,0 3px 6px rgba(0,0,0,.3)}
  .winner{font-size:clamp(24px,4vw,44px);font-weight:900;color:#7bed9f;
    text-shadow:3px 3px 0 #2d5a3a;margin-bottom:20px;animation:pop .5s ease}

  /* 控制提示 */
  .controls{margin-top:14px;padding:12px 20px;background:rgba(0,0,0,.35);
    border:2px solid #6b4fa0;border-radius:10px;width:min(960px,96vw);
    display:grid;grid-template-columns:1fr 1fr;gap:20px;font-size:13px;line-height:1.9}
  .controls h4{color:#ffd77a;font-size:14px;margin-bottom:4px;letter-spacing:2px}
  .key{display:inline-block;padding:1px 8px;background:#3a2a5a;border:1px solid #6b4fa0;
    border-radius:4px;font-family:monospace;font-size:11px;color:#ffd77a;margin:0 2px}

  /* 移动端按钮 */
  .touch-panel{position:absolute;bottom:0;left:0;right:0;display:none;
    justify-content:space-between;padding:14px 20px;z-index:5;pointer-events:none}
  .dpad,.actions{display:flex;gap:8px;pointer-events:auto}
  .dpad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:4px}
  .dpad button,.actions button{width:48px;height:48px;border-radius:50%;
    border:2px solid #ffd77a;background:rgba(107,79,160,.6);color:#fff;
    font-size:12px;font-weight:700;touch-action:manipulation}
  .dpad button:active,.actions button:active{background:rgba(255,215,122,.6)}
  .actions{align-self:flex-end;gap:10px}
  .actions button{width:64px;height:64px;font-size:14px}
  .up{grid-column:2;grid-row:1}.left{grid-column:1;grid-row:2}.right{grid-column:3;grid-row:2}.down{grid-column:2;grid-row:3}

  @media (hover:none){.touch-panel{display:flex}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1)}}
</style>
</head>
<body>

<div class="stage">
  <!-- HUD -->
  <div class="hud">
    <div class="hp-block">
      <span class="name">P1 · 阿蓝</span>
      <div class="hp-bar"><div class="hp-fill" id="hp1" style="width:100%"></div>
        <div class="hp-text" id="hp1text">100 / 100</div></div>
    </div>
    <div class="round-tag" id="roundTag">ROUND 1</div>
    <div class="hp-block right">
      <span class="name">P2 · 赤焰</span>
      <div class="hp-bar"><div class="hp-fill right" id="hp2" style="width:100%"></div>
        <div class="hp-text" id="hp2text">100 / 100</div></div>
    </div>
  </div>

  <!-- 游戏画布 -->
  <div class="canvas-wrap">
    <canvas id="game" width="960" height="540"></canvas>

    <!-- 开始界面 -->
    <div class="overlay" id="startOverlay">
      <div class="title">★ 像素格斗 ★</div>
      <div class="subtitle">复古像素风 · 双人对战 Demo<br>移动 / 出拳 / 防御 · 看谁的血量先归零！</div>
      <button class="btn" id="startBtn">开始对战</button>
    </div>

    <!-- 结束界面 -->
    <div class="overlay hidden" id="endOverlay">
      <div class="winner" id="winnerText">P1 胜利！</div>
      <div class="subtitle" id="endSub">按「开始对战」再来一局</div>
      <button class="btn" id="retryBtn">再战一局</button>
    </div>

    <!-- 触屏按钮 -->
    <div class="touch-panel">
      <div class="dpad">
        <button class="up" data-key="ArrowUp">↑</button>
        <button class="left" data-key="ArrowLeft">←</button>
        <button class="right" data-key="ArrowRight">→</button>
        <button class="down" data-key="ArrowDown">↓</button>
      </div>
      <div class="actions">
        <button data-key="KeyJ">拳</button>
        <button data-key="KeyK">防</button>
      </div>
    </div>
  </div>

  <!-- 控制说明 -->
  <div class="controls">
    <div>
      <h4>玩家 1（蓝色）</h4>
      <div><span class="key">A</span><span class="key">D</span> 左右移动 &nbsp;
        <span class="key">W</span> 跳跃 &nbsp;<span class="key">S</span> 蹲防</div>
      <div><span class="key">F</span> 出拳 &nbsp;<span class="key">G</span> 防御（站立）</div>
    </div>
    <div style="text-align:right">
      <h4>玩家 2（红色）</h4>
      <div><span class="key">←</span><span class="key">→</span> 左右移动 &nbsp;
        <span class="key">↑</span> 跳跃 &nbsp;<span class="key">↓</span> 蹲防</div>
      <div><span class="key">J</span> 出拳 &nbsp;<span class="key">K</span> 防御（站立）</div>
    </div>
  </div>
</div>

<script>
/* =========================================================
 *  像素格斗 · 核心代码结构
 *  - Constants: 游戏常量（角色尺寸、速度、伤害等）
 *  - Input: 键盘 / 触屏状态管理
 *  - Fighter: 角色对象（位置、状态、动画、渲染）
 *  - Hitbox: 碰撞检测 & 伤害结算
 *  - Stage: 场景绘制（背景 + 地面 + 粒子）
 *  - Game: 主循环（update / draw / HUD更新 / 胜负判定）
 * ========================================================= */

/* ====== 模块一：游戏常量 ====== */
const CFG = {
  W: 960, H: 540,
  GROUND_Y: 440,              // 地面 y 坐标
  GRAVITY: 0.8,
  MOVE_SPEED: 3.8,
  JUMP_VY: -13,
  FIGHTER_W: 48,
  FIGHTER_H: 96,
  CROUCH_H: 64,
  PUNCH_RANGE: 70,            // 攻击判定距离
  PUNCH_DMG: 12,              // 普通伤害
  PUNCH_DMG_CROUCH: 6,        // 蹲防伤害（减半）
  BLOCK_REDUCE: 0.25,         // 防御减伤：受到 25% 伤害
  PUNCH_COOLDOWN: 22,         // 出拳冷却帧
  HITSTUN: 14,                // 被击硬直
  BLOCK_STUN: 8,              // 防御硬直
  MAX_HP: 100,
  ANIM_FRAMES: 4,             // 走路动画帧数
};

/* ====== 模块二：输入管理 ====== */
const Input = (() => {
  const keys = Object.create(null);
  const pressed = Object.create(null);   // 本帧刚按下（edge trigger）
  window.addEventListener('keydown', e => {
    if(!keys[e.code]) pressed[e.code] = true;
    keys[e.code] = true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });
  // 触屏按钮映射
  document.querySelectorAll('[data-key]').forEach(btn => {
    const k = btn.dataset.key;
    const down = e => { e.preventDefault(); if(!keys[k]) pressed[k]=true; keys[k]=true; };
    const up   = e => { e.preventDefault(); keys[k]=false; };
    btn.addEventListener('touchstart', down, {passive:false});
    btn.addEventListener('touchend', up);
    btn.addEventListener('touchcancel', up);
    btn.addEventListener('mousedown', down);
    btn.addEventListener('mouseup', up);
    btn.addEventListener('mouseleave', up);
  });
  return {
    isDown: code => !!keys[code],
    consumePress: code => { if(pressed[code]){ pressed[code]=false; return true;} return false; },
    clear: () => { for(const k in keys) keys[k]=false; for(const k in pressed) pressed[k]=false; }
  };
})();

/* ====== 模块三：角色类 ====== */
class Fighter {
  constructor({x, color, name, controls, facing=1}){
    this.name = name;
    this.color = color;        // 主色
    this.darkColor = shade(color, -35);
    this.lightColor = shade(color, 25);
    this.skinColor = '#f2c59b';
    this.controls = controls;
    this.reset(x, facing);
  }
  reset(x, facing){
    this.x = x; this.y = CFG.GROUND_Y - CFG.FIGHTER_H;
    this.vx = 0; this.vy = 0;
    this.w = CFG.FIGHTER_W; this.h = CFG.FIGHTER_H;
    this.facing = facing;      // 1 右 / -1 左
    this.onGround = true;
    this.state = 'idle';       // idle / walk / jump / punch / block / crouch / hurt
    this.hp = CFG.MAX_HP;
    this.cooldown = 0;
    this.stun = 0;
    this.animTick = 0;
    this.animFrame = 0;
    this.punchExtend = 0;      // 出拳前伸 0-1
    this.blocking = false;
    this.crouching = false;
    this.flash = 0;            // 被击闪烁
    this.shake = 0;            // 受击抖动
  }

  update(opponent){
    // 硬直 / 冷却递减
    if(this.stun > 0) this.stun--;
    if(this.cooldown > 0) this.cooldown--;
    if(this.flash > 0) this.flash--;
    if(this.shake > 0) this.shake--;
    if(this.punchExtend > 0 && this.state !== 'punch') this.punchExtend = Math.max(0, this.punchExtend - 0.15);

    // 面向对手
    if(this.x < opponent.x) this.facing = 1; else this.facing = -1;

    // 输入处理（仅当非硬直）
    const {left,right,up,down,punch,block} = this.controls;
    let action = 'idle';

    if(this.stun <= 0){
      // 防御 / 蹲防
      this.blocking = Input.isDown(block);
      this.crouching = Input.isDown(down) && this.onGround;

      // 移动
      const moving = (Input.isDown(left) || Input.isDown(right)) && !this.blocking && !this.crouching;
      if(moving){
        this.vx = Input.isDown(left) ? -CFG.MOVE_SPEED : CFG.MOVE_SPEED;
        action = 'walk';
      } else {
        this.vx *= 0.75;
        if(Math.abs(this.vx) < 0.2) this.vx = 0;
      }

      // 跳跃
      if(Input.isDown(up) && this.onGround && !this.blocking){
        this.vy = CFG.JUMP_VY;
        this.onGround = false;
        action = 'jump';
      }

      // 出拳（edge trigger）
      if(Input.consumePress(punch) && this.cooldown <= 0 && !this.blocking){
        this.state = 'punch';
        this.cooldown = CFG.PUNCH_COOLDOWN;
        this.punchExtend = 1;
        // 在下一帧统一判定碰撞（Game 模块）
        this._pendingHit = true;
      }

      if(this.blocking) action = 'block';
      else if(this.crouching) action = 'crouch';
    }

    // 状态恢复
    if(this.state === 'punch' && this.cooldown < CFG.PUNCH_COOLDOWN - 10) {
      // 出拳动画结束
      if(this.stun<=0) this.state = action;
    }
    if(this.stun > 0) this.state = 'hurt';
    else if(this.state !== 'punch') this.state = action;
    if(!this.onGround) this.state = 'jump';

    // 物理
    this.vy += CFG.GRAVITY;
    this.x += this.vx;
    this.y += this.vy;

    // 地面碰撞
    if(this.y + this.h >= CFG.GROUND_Y){
      this.y = CFG.GROUND_Y - this.h;
      this.vy = 0;
      this.onGround = true;
    }

    // 舞台边界
    this.x = Math.max(10, Math.min(CFG.W - 10 - this.w, this.x));

    // 角色间防重叠（简易推挤）
    const dx = (this.x + this.w/2) - (opponent.x + opponent.w/2);
    const minDist = (this.w + opponent.w)/2 - 4;
    if(Math.abs(dx) < minDist && Math.abs(this.y - opponent.y) < 60){
      const push = (minDist - Math.abs(dx)) / 2;
      if(dx > 0) this.x += push; else this.x -= push;
    }

    // 动画帧
    this.animTick++;
    if(this.animTick >= 8){
      this.animTick = 0;
      this.animFrame = (this.animFrame + 1) % CFG.ANIM_FRAMES;
    }
  }

  takeHit(fromFront){
    if(this.blocking){
      this.hp -= Math.ceil(CFG.PUNCH_DMG * CFG.BLOCK_REDUCE);
      this.stun = CFG.BLOCK_STUN;
      this.vx = (fromFront ? 1 : -1) * 2;
      spawnParticles(this.x + this.w/2, this.y + this.h/2, '#ffd77a', 6);
    } else if(this.crouching){
      this.hp -= CFG.PUNCH_DMG_CROUCH;
      this.stun = CFG.HITSTUN - 4;
      this.vx = (fromFront ? 1 : -1) * 2.5;
      spawnParticles(this.x + this.w/2, this.y + this.h/2, '#ffa94d', 6);
    } else {
      this.hp -= CFG.PUNCH_DMG;
      this.stun = CFG.HITSTUN;
      this.vx = (fromFront ? 1 : -1) * 5;
      this.vy = -4;
      this.onGround = false;
      spawnParticles(this.x + this.w/2, this.y + this.h/2, '#ff6b6b', 10);
    }
    this.flash = 8;
    this.shake = 6;
    if(this.hp < 0) this.hp = 0;
  }

  draw(ctx){
    ctx.save();
    // 抖动
    if(this.shake > 0){
      ctx.translate((Math.random()-.5)*this.shake, (Math.random()-.5)*this.shake);
    }
    const cx = this.x + this.w/2;
    const baseY = this.y + this.h;

    // 影子
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath();
    ctx.ellipse(cx, CFG.GROUND_Y + 4, 26, 6, 0, 0, Math.PI*2);
    ctx.fill();

    // 动画：走路时双腿与手臂摆动
    const walkBob = (this.state === 'walk' && this.onGround) ? Math.sin(this.animFrame * Math.PI/2) * 3 : 0;
    const crouch = this.crouching;
    const bodyH = crouch ? CFG.CROUCH_H : CFG.FIGHTER_H;
    const topY = baseY - bodyH;

    // 像素绘制：采用「矩形像素块」模拟像素风格
    // 颜色：主色衣料 + 深色描边 + 肤色手脚
    const main = this.color, dark = this.darkColor, skin = this.skinColor;
    // 被击闪白
    const flashOn = this.flash > 0 && Math.floor(this.flash/2)%2===0;

    // 腿（左右错开）
    const legOffset = this.state==='walk' && this.onGround ? Math.sin(this.animFrame*Math.PI/2)*6 : 0;
    const legY = baseY - (crouch? 22 : 38);
    // 左腿
    drawPix(ctx, cx-14, legY, 10, (crouch?22:38), flashOn?'#fff':dark);
    drawPix(ctx, cx-14, baseY-6, 12, 6, flashOn?'#fff':'#2a1a4a');  // 鞋
    // 右腿
    drawPix(ctx, cx+4, legY, 10, (crouch?22:38) - legOffset*0.3, flashOn?'#fff':main);
    drawPix(ctx, cx+4, baseY-6 - legOffset*0.3, 12, 6, flashOn?'#fff':'#2a1a4a');

    // 躯干
    const torsoY = topY + (crouch?28:22);
    const torsoH = bodyH - (crouch?44:62);
    drawPix(ctx, cx-16, torsoY, 32, torsoH, flashOn?'#fff':main);
    // 躯干高光
    drawPix(ctx, cx-14, torsoY+4, 6, torsoH-10, flashOn?'#fff':this.lightColor);
    // 腰带
    drawPix(ctx, cx-18, torsoY + torsoH - 6, 36, 6, flashOn?'#fff':dark);

    // 手臂（非攻击 / 防御状态）
    const armY = torsoY + 6;
    let armExt = 0;
    if(this.state === 'punch') armExt = (1 - Math.abs(this.punchExtend - 0.5)*2) * 28 + 10;
    armExt = Math.max(armExt, 0);
    // 防御手臂抬起
    if(this.blocking){
      drawPix(ctx, cx-20, torsoY-2, 14, 20, flashOn?'#fff':main);
      drawPix(ctx, cx+6, torsoY-2, 14, 20, flashOn?'#fff':main);
      // 护盾效果
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#7bd7ff';
      ctx.beginPath();
      ctx.ellipse(cx, torsoY + torsoH/2, 34, bodyH*0.55, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if(this.state === 'punch'){
      // 出拳前伸（朝向 facing 方向）
      const fx = cx + (this.facing > 0 ? 16 : -16 - armExt*0.7);
      drawPix(ctx, cx + (this.facing>0? 6 : -22), armY, 16, 10, flashOn?'#fff':main);
      drawPix(ctx, fx, armY-2, armExt*0.7+10, 10, flashOn?'#fff':main);
      // 拳头
      drawPix(ctx, fx + (this.facing>0? armExt*0.7+6 : -6), armY-6, 14, 14, flashOn?'#fff':skin);
      drawPix(ctx, fx + (this.facing>0? armExt*0.7+6 : -6)+2, armY-4, 4, 4, flashOn?'#fff':'#c79478');
      // 另一只手收回
      drawPix(ctx, cx + (this.facing>0? -20 : 14), armY+10, 10, 18, flashOn?'#fff':main);
    } else {
      drawPix(ctx, cx-22, armY + walkBob, 10, 24, flashOn?'#fff':main);
      drawPix(ctx, cx+12, armY - walkBob, 10, 24, flashOn?'#fff':main);
      // 手（肤色）
      drawPix(ctx, cx-22, armY+24 + walkBob, 10, 8, flashOn?'#fff':skin);
      drawPix(ctx, cx+12, armY+24 - walkBob, 10, 8, flashOn?'#fff':skin);
    }

    // 头部
    const headY = topY + (crouch?14:0);
    drawPix(ctx, cx-14, headY, 28, 26, flashOn?'#fff':skin);
    // 头发/帽檐
    drawPix(ctx, cx-16, headY-2, 32, 10, flashOn?'#fff':dark);
    drawPix(ctx, cx-14, headY+8, 6, 4, flashOn?'#fff':dark);
    // 眼睛（朝向方向）
    const eyeX = cx + (this.facing>0 ? 2 : -8);
    drawPix(ctx, eyeX, headY+12, 4, 4, '#fff');
    drawPix(ctx, eyeX + (this.facing>0? 1:2), headY+13, 2, 2, '#2a1a4a');
    // 嘴
    if(this.state === 'hurt'){
      drawPix(ctx, cx-3, headY+20, 6, 3, '#8b2e2e');
    } else if(this.blocking){
      drawPix(ctx, cx-4, headY+20, 8, 2, dark);
    } else {
      drawPix(ctx, cx-3, headY+20, 6, 2, dark);
    }

    ctx.restore();
  }

  // 出拳判定盒（相对角色）
  getPunchBox(){
    if(this.state !== 'punch' || !this._pendingHit) return null;
    const cx = this.x + this.w/2;
    const punchY = this.y + (this.crouching ? CFG.CROUCH_H : CFG.FIGHTER_H) * 0.4;
    const startX = this.facing > 0 ? this.x + this.w - 4 : this.x - CFG.PUNCH_RANGE + 4;
    return {x: startX, y: punchY - 10, w: CFG.PUNCH_RANGE, h: 24};
  }
  consumeHit(){ this._pendingHit = false; }

  getBodyBox(){
    const h = this.crouching ? CFG.CROUCH_H : CFG.FIGHTER_H;
    return {x: this.x, y: CFG.GROUND_Y - h, w: this.w, h};
  }
}

/* ====== 辅助：像素块绘制 ====== */
function drawPix(ctx, x, y, w, h, color){
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}
/* 颜色亮度调整 */
function shade(hex, percent){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16);
  const g = parseInt(h.substring(2,4),16);
  const b = parseInt(h.substring(4,6),16);
  const t = percent < 0 ? 0 : 255;
  const p = Math.abs(percent)/100;
  const nr = Math.round((t-r)*p)+r;
  const ng = Math.round((t-g)*p)+g;
  const nb = Math.round((t-b)*p)+b;
  return '#'+[nr,ng,nb].map(v=>v.toString(16).padStart(2,'0')).join('');
}

/* ====== 模块四：粒子（打击光效） ====== */
const particles = [];
function spawnParticles(x,y,color,n=8){
  for(let i=0;i<n;i++){
    particles.push({
      x, y,
      vx:(Math.random()-.5)*6,
      vy:(Math.random()-.7)*6,
      life: 18 + Math.random()*10,
      maxLife: 28,
      size: 3 + Math.random()*4,
      color
    });
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.35;
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(ctx){
  for(const p of particles){
    ctx.globalAlpha = Math.min(1, p.life / p.maxLife);
    drawPix(ctx, p.x-p.size/2, p.y-p.size/2, p.size, p.size, p.color);
  }
  ctx.globalAlpha = 1;
}

/* ====== 模块五：场景绘制 ====== */
const Stage = (() => {
  // 云 / 星装饰（静态位置）
  const clouds = Array.from({length:5}, (_,i)=>({x: i*220+30, y:50+Math.random()*80, w:80, h:24}));
  const mountains = [
    {x:0, y:320, w:380, h:120, c:'#5d3a82'},
    {x:280, y:300, w:360, h:140, c:'#7a4fa8'},
    {x:560, y:340, w:400, h:100, c:'#5d3a82'},
  ];
  const trees = [{x:60},{x:180},{x:780},{x:880}];

  function drawBackground(ctx, frame){
    // 天空渐变
    const g = ctx.createLinearGradient(0,0,0,CFG.GROUND_Y);
    g.addColorStop(0,'#3a2a5a'); g.addColorStop(0.5,'#6a4fa0'); g.addColorStop(1,'#c99bff');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,CFG.W,CFG.GROUND_Y);

    // 星点
    for(let i=0;i<40;i++){
      const x = (i*73 + frame*0.2) % CFG.W;
      const y = (i*41) % 180;
      drawPix(ctx, x, y, 2, 2, i%5===0? '#ffd77a':'#ffe6b0');
    }

    // 远山
    for(const m of mountains){
      ctx.fillStyle = m.c;
      ctx.beginPath();
      ctx.moveTo(m.x, CFG.GROUND_Y);
      ctx.lineTo(m.x + m.w/2, m.y);
      ctx.lineTo(m.x + m.w, CFG.GROUND_Y);
      ctx.closePath();
      ctx.fill();
      // 山顶积雪
      ctx.fillStyle = '#d8c7f0';
      ctx.beginPath();
      ctx.moveTo(m.x + m.w/2 - 20, m.y + 24);
      ctx.lineTo(m.x + m.w/2, m.y);
      ctx.lineTo(m.x + m.w/2 + 20, m.y + 24);
      ctx.closePath();
      ctx.fill();
    }

    // 云
    for(const c of clouds){
      const x = (c.x + frame*0.3) % (CFG.W + c.w) - c.w/2;
      drawPix(ctx, x, c.y, c.w, c.h, '#fff');
      drawPix(ctx, x+10, c.y-10, c.w-20, 14, '#fff');
      drawPix(ctx, x+20, c.y-4, c.w-40, 10, '#fff');
    }

    // 地面
    drawPix(ctx, 0, CFG.GROUND_Y, CFG.W, 6, '#8b5e3c');
    drawPix(ctx, 0, CFG.GROUND_Y+6, CFG.W, CFG.H - CFG.GROUND_Y, '#c99c6a');
    // 地面像素花纹
    for(let i=0;i<CFG.W;i+=24){
      drawPix(ctx, i, CFG.GROUND_Y+12, 6, 4, '#a67b4e');
      drawPix(ctx, i+14, CFG.GROUND_Y+26, 4, 6, '#8b5e3c');
    }
    // 地面线（亮）
    drawPix(ctx, 0, CFG.GROUND_Y-2, CFG.W, 2, '#ffd77a');

    // 小树（远景装饰）
    for(const t of trees){
      drawPix(ctx, t.x, CFG.GROUND_Y-32, 8, 32, '#6b4fa0');
      drawPix(ctx, t.x-8, CFG.GROUND_Y-44, 24, 16, '#2d5a3a');
      drawPix(ctx, t.x-6, CFG.GROUND_Y-42, 20, 12, '#7bed9f');
    }
  }

  return { drawBackground };
})();

/* ====== 模块六：主游戏 ====== */
const Game = (() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const p1 = new Fighter({
    x: 260, color:'#4a7bd6', name:'阿蓝',
    controls:{left:'KeyA',right:'KeyD',up:'KeyW',down:'KeyS',punch:'KeyF',block:'KeyG'},
    facing:1
  });
  const p2 = new Fighter({
    x: 650, color:'#d64a4a', name:'赤焰',
    controls:{left:'ArrowLeft',right:'ArrowRight',up:'ArrowUp',down:'ArrowDown',punch:'KeyJ',block:'KeyK'},
    facing:-1
  });

  let frame = 0;
  let running = false;
  let countdown = 0;       // 开场倒计时

  function reset(){
    p1.reset(260, 1);
    p2.reset(650, -1);
    particles.length = 0;
    countdown = 90;        // 约 1.5 秒
    setHUD();
  }

  function setHUD(){
    const r1 = p1.hp / CFG.MAX_HP * 100;
    const r2 = p2.hp / CFG.MAX_HP * 100;
    document.getElementById('hp1').style.width = r1 + '%';
    document.getElementById('hp2').style.width = r2 + '%';
    document.getElementById('hp1text').textContent = `${p1.hp} / ${CFG.MAX_HP}`;
    document.getElementById('hp2text').textContent = `${p2.hp} / ${CFG.MAX_HP}`;
  }

  function checkHit(attacker, defender){
    const box = attacker.getPunchBox();
    if(!box) return;
    const body = defender.getBodyBox();
    // AABB 碰撞
    if(box.x < body.x + body.w && box.x + box.w > body.x &&
       box.y < body.y + body.h && box.y + box.h > body.y){
      defender.takeHit(attacker.facing > 0);
      // 防御者也被击退一点
      attacker.vx = -attacker.facing * 1.5;
      attacker.consumeHit();
      // 命中闪烁
      flashHit(box.x+box.w/2, box.y+box.h/2);
    } else {
      // 未命中也消耗，避免重复判定
      attacker.consumeHit();
    }
  }

  function flashHit(x,y){
    // 白色闪光（大粒子）
    for(let i=0;i<14;i++) spawnParticles(x,y, i%2===0?'#fff':'#ffd77a', 1);
  }

  function update(){
    frame++;
    if(countdown > 0){ countdown--; return; }
    p1.update(p2);
    p2.update(p1);

    // 碰撞判定（每玩家出拳时判定一次）
    checkHit(p1, p2);
    checkHit(p2, p1);

    // 胜负
    if(p1.hp <= 0 || p2.hp <= 0){
      end();
    }

    setHUD();
    updateParticles();
  }

  function draw(){
    // 背景
    Stage.drawBackground(ctx, frame);

    // 角色（抖动效果在 draw 内部）
    p1.draw(ctx);
    p2.draw(ctx);

    // 粒子
    drawParticles(ctx);

    // 倒计时
    if(countdown > 0){
      const t = Math.ceil(countdown / 30);
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,.4)';
      ctx.fillRect(0, CFG.GROUND_Y/2 - 60, CFG.W, 120);
      ctx.fillStyle = '#ffd77a';
      ctx.font = 'bold 72px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(t>0?t:'FIGHT!', CFG.W/2, CFG.GROUND_Y/2);
      ctx.restore();
    }

    // 轻微扫描线（复古 CRT）
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#000';
    for(let y=0;y<CFG.H;y+=3) ctx.fillRect(0,y,CFG.W,1);
    ctx.restore();
  }

  function loop(){
    if(!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
  }

  function start(){
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('endOverlay').classList.add('hidden');
    reset();
    running = true;
    Input.clear();
    requestAnimationFrame(loop);
  }
  function end(){
    running = false;
    const win = p1.hp > 0 ? p1.name : p2.name;
    const which = p1.hp > 0 ? 'P1' : 'P2';
    document.getElementById('winnerText').textContent = `${which} · ${win} 胜利！`;
    document.getElementById('endOverlay').classList.remove('hidden');
    // 胜利烟花粒子
    const cx = p1.hp>0 ? p1.x+p1.w/2 : p2.x+p2.w/2;
    const cy = CFG.GROUND_Y - 80;
    for(let i=0;i<60;i++) spawnParticles(cx,cy, ['#ffd77a','#7bed9f','#ff6b6b','#7bd7ff'][i%4], 1);
  }

  // 绑定按钮
  document.getElementById('startBtn').onclick = start;
  document.getElementById('retryBtn').onclick = start;

  // 初始预览：画一帧静态场景
  Stage.drawBackground(ctx, 0);
  p1.draw(ctx);
  p2.draw(ctx);

  return { start };
})();
</script>
