<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>答案之书 - 听见内心的声音</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ==================== 全局重置与基础样式 ==================== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-deep: #1a1028;
  --bg-card: #231540;
  --gold: #c9a44a;
  --gold-light: #e8d48b;
  --gold-dark: #8b6914;
  --purple: #6c5ce7;
  --purple-light: #a29bfe;
  --purple-dark: #4a3db5;
  --text-primary: #f0e6d3;
  --text-secondary: #b8a89a;
  --text-dim: #7a6e8a;
}

html, body {
  width: 100%;
  min-height: 100vh;
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ==================== 粒子画布 ==================== */
#particleCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ==================== 视图容器 ==================== */
.view {
  display: none;
  position: relative;
  z-index: 1;
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  animation: fadeIn 0.6s ease;
}

.view.active {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ==================== 首页 Welcome ==================== */
.welcome-title {
  font-family: 'Crimson Pro', 'Noto Sans SC', serif;
  font-size: clamp(48px, 10vw, 80px);
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  letter-spacing: 8px;
  text-shadow: 0 0 40px rgba(201,164,74,0.4), 0 0 80px rgba(201,164,74,0.2);
  margin-bottom: 16px;
}

.welcome-subtitle {
  font-size: clamp(14px, 3vw, 18px);
  color: var(--text-secondary);
  text-align: center;
  font-weight: 300;
  letter-spacing: 2px;
  margin-bottom: 60px;
  max-width: 400px;
  line-height: 1.8;
}

/* ==================== 书本动画 ==================== */
.book-container {
  perspective: 800px;
  width: 200px;
  height: 260px;
  margin-bottom: 50px;
  position: relative;
}

.book {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  animation: bookOpen 2.5s ease forwards;
}

@keyframes bookOpen {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(-20deg); }
  70% { transform: rotateY(-35deg); }
  100% { transform: rotateY(-30deg); }
}

.book-cover-front, .book-cover-back, .book-spine, .book-page-left, .book-page-right {
  position: absolute;
  backface-visibility: hidden;
}

.book-cover-front {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
  border-radius: 4px 12px 12px 4px;
  transform: translateZ(8px);
  box-shadow: 2px 2px 20px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
}

.book-cover-front::after {
  content: '答';
  font-family: 'Noto Sans SC', serif;
  font-size: 60px;
  font-weight: 700;
  color: var(--bg-deep);
  text-shadow: 0 0 10px rgba(26,16,40,0.5);
}

.book-cover-back {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
  border-radius: 12px 4px 4px 12px;
  transform: rotateY(180deg) translateZ(8px);
  box-shadow: -2px 2px 20px rgba(0,0,0,0.5);
}

.book-spine {
  width: 16px;
  height: 100%;
  left: -8px;
  background: linear-gradient(90deg, var(--gold-dark), #a07830, var(--gold-dark));
  transform: rotateY(90deg);
  border-radius: 2px;
}

.book-page-left {
  width: 48%;
  height: 92%;
  top: 4%;
  left: 2%;
  background: linear-gradient(to right, #f5e6c8, #faf0dc);
  transform: rotateY(180deg) translateZ(2px);
  border-radius: 2px 4px 4px 2px;
  box-shadow: inset -3px 0 10px rgba(0,0,0,0.1);
}

.book-page-right {
  width: 48%;
  height: 92%;
  top: 4%;
  right: 2%;
  background: linear-gradient(to right, #faf0dc, #f5e6c8);
  transform: translateZ(2px);
  border-radius: 4px 2px 2px 4px;
  box-shadow: inset 3px 0 10px rgba(0,0,0,0.1);
}

/* 书页上的装饰线 */
.book-page-left::before, .book-page-right::before {
  content: '';
  position: absolute;
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  top: 30%;
  left: 20%;
}

.book-page-right::before {
  top: 40%;
}

.book-page-left::after, .book-page-right::after {
  content: '';
  position: absolute;
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  top: 55%;
  left: 20%;
}

/* 金色光晕 */
.book-glow {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,164,74,0.15) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
}

/* ==================== 按钮样式 ==================== */
.btn-primary {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 16px;
  font-weight: 500;
  padding: 16px 48px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
  color: var(--bg-deep);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(201,164,74,0.3);
  animation: btnGlow 3s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(201,164,74,0.5);
}

.btn-primary:active {
  transform: translateY(0);
}

@keyframes btnGlow {
  0%, 100% { box-shadow: 0 4px 20px rgba(201,164,74,0.3); }
  50% { box-shadow: 0 4px 35px rgba(201,164,74,0.6), 0 0 60px rgba(201,164,74,0.2); }
}

.btn-secondary {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px;
  font-weight: 400;
  padding: 12px 32px;
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
  border-radius: 50px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.3s ease;
}

.btn-secondary:hover {
  background: rgba(201,164,74,0.1);
  box-shadow: 0 0 20px rgba(201,164,74,0.2);
}

/* ==================== 底部信息 ==================== */
.footer-text {
  position: fixed;
  bottom: 20px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 1px;
  z-index: 2;
}

/* ==================== 输入问题页 Question ==================== */
.question-container {
  width: 100%;
  max-width: 520px;
  text-align: center;
}

.page-title {
  font-family: 'Crimson Pro', 'Noto Sans SC', serif;
  font-size: clamp(28px, 6vw, 40px);
  font-weight: 600;
  color: var(--gold);
  text-align: center;
  margin-bottom: 40px;
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(201,164,74,0.3);
}

.input-group {
  margin-bottom: 24px;
  text-align: left;
}

.input-group label {
  display: block;
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.input-group textarea,
.input-group input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(35,21,64,0.8);
  border: 1px solid rgba(201,164,74,0.2);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 15px;
  outline: none;
  transition: all 0.3s ease;
  resize: none;
}

.input-group textarea:focus,
.input-group input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(201,164,74,0.15);
}

.input-group textarea::placeholder,
.input-group input::placeholder {
  color: var(--text-dim);
}

.input-group textarea {
  min-height: 100px;
  line-height: 1.6;
}

.options-row {
  display: flex;
  gap: 16px;
}

.options-row .input-group {
  flex: 1;
}

.optional-hint {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* ==================== 翻书动画页 Animation ==================== */
.animation-container {
  text-align: center;
}

.flip-book-wrapper {
  perspective: 1000px;
  width: 280px;
  height: 360px;
  margin: 0 auto 40px;
  position: relative;
}

.flip-book {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

.flip-page {
  position: absolute;
  width: 100%;
  height: 100%;
  transform-origin: left center;
  backface-visibility: hidden;
  border-radius: 4px 12px 12px 4px;
  box-shadow: 2px 2px 20px rgba(0,0,0,0.4);
}

.flip-page-front {
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

.flip-page-front::after {
  content: '✦';
  font-size: 48px;
  color: var(--bg-deep);
  animation: starSpin 2s linear infinite;
}

@keyframes starSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.flip-page-back {
  background: linear-gradient(135deg, #f5e6c8, #faf0dc);
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.flip-page-back::after {
  content: '???';
  font-family: 'Crimson Pro', serif;
  font-size: 36px;
  color: var(--gold-dark);
  font-weight: 700;
}

.flip-page.flipping {
  animation: flipPage 3s ease-in-out forwards;
}

@keyframes flipPage {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(-180deg); }
}

/* 翻书时的粒子 */
.animation-particle-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
  pointer-events: none;
}

.animation-text {
  font-size: 16px;
  color: var(--text-secondary);
  letter-spacing: 3px;
  animation: textFlicker 1.5s ease-in-out infinite;
}

@keyframes textFlicker {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ==================== 结果页 Result ==================== */
.result-container {
  text-align: center;
  max-width: 520px;
  width: 100%;
}

.result-book {
  width: 320px;
  max-width: 90vw;
  height: 400px;
  max-height: 50vh;
  margin: 0 auto 30px;
  background: linear-gradient(135deg, #f5e6c8, #faf0dc);
  border-radius: 4px 16px 16px 4px;
  box-shadow: 
    0 10px 40px rgba(0,0,0,0.5),
    inset 0 0 30px rgba(201,164,74,0.1),
    -4px 0 8px rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* 书页纹路 */
.result-book::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 30px;
  height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,0.08), transparent);
  border-radius: 4px 0 0 4px;
}

.result-book::after {
  content: '';
  position: absolute;
  top: 10%;
  left: 15%;
  width: 70%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  box-shadow: 0 30px 0 0 rgba(201,164,74,0.15), 0 60px 0 0 rgba(201,164,74,0.1);
}

.result-answer {
  font-family: 'Crimson Pro', 'Noto Sans SC', serif;
  font-size: clamp(24px, 6vw, 36px);
  font-weight: 700;
  color: var(--gold-dark);
  text-align: center;
  padding: 40px;
  z-index: 1;
  animation: answerReveal 1s ease forwards;
  line-height: 1.4;
}

@keyframes answerReveal {
  0% { opacity: 0; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}

.reaction-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 30px;
}

.btn-reaction {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px;
  padding: 12px 24px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 1px solid;
  letter-spacing: 1px;
  background: transparent;
}

.btn-reaction.satisfied {
  color: #6bcb77;
  border-color: #6bcb77;
}

.btn-reaction.satisfied:hover {
  background: rgba(107,203,119,0.1);
  box-shadow: 0 0 20px rgba(107,203,119,0.2);
}

.btn-reaction.unsatisfied {
  color: #e86c6c;
  border-color: #e86c6c;
}

.btn-reaction.unsatisfied:hover {
  background: rgba(232,108,108,0.1);
  box-shadow: 0 0 20px rgba(232,108,108,0.2);
}

.btn-reaction.uncertain {
  color: var(--purple-light);
  border-color: var(--purple-light);
}

.btn-reaction.uncertain:hover {
  background: rgba(162,155,254,0.1);
  box-shadow: 0 0 20px rgba(162,155,254,0.2);
}

.btn-reaction.selected {
  transform: scale(1.05);
}

.btn-reaction.satisfied.selected {
  background: rgba(107,203,119,0.2);
  box-shadow: 0 0 25px rgba(107,203,119,0.3);
}

.btn-reaction.unsatisfied.selected {
  background: rgba(232,108,108,0.2);
  box-shadow: 0 0 25px rgba(232,108,108,0.3);
}

.btn-reaction.uncertain.selected {
  background: rgba(162,155,254,0.2);
  box-shadow: 0 0 25px rgba(162,155,254,0.3);
}

.result-hint {
  margin-top: 30px;
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* ==================== AI 对话页 Dialog ==================== */
.dialog-container {
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  height: calc(100vh - 120px);
}

.dialog-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dark) transparent;
}

.dialog-messages::-webkit-scrollbar {
  width: 4px;
}

.dialog-messages::-webkit-scrollbar-thumb {
  background: var(--gold-dark);
  border-radius: 4px;
}

.message {
  margin-bottom: 20px;
  animation: msgIn 0.4s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-avatar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.avatar.ai {
  background: linear-gradient(135deg, var(--purple), var(--gold));
}

.avatar.user {
  background: rgba(201,164,74,0.2);
  border: 1px solid var(--gold);
}

.message-name {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.message-bubble {
  padding: 16px 20px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.7;
  max-width: 85%;
}

.message.ai .message-bubble {
  background: var(--bg-card);
  border: 1px solid rgba(108,92,231,0.2);
  color: var(--text-primary);
  border-top-left-radius: 4px;
}

.message.user .message-bubble {
  background: rgba(201,164,74,0.1);
  border: 1px solid rgba(201,164,74,0.2);
  color: var(--text-primary);
  margin-left: auto;
  border-top-right-radius: 4px;
}

.dialog-input-area {
  padding-top: 16px;
  border-top: 1px solid rgba(201,164,74,0.1);
  display: flex;
  gap: 10px;
}

.dialog-input-area input {
  flex: 1;
  padding: 14px 18px;
  background: rgba(35,21,64,0.8);
  border: 1px solid rgba(201,164,74,0.2);
  border-radius: 50px;
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s;
}

.dialog-input-area input:focus {
  border-color: var(--gold);
}

.dialog-input-area input::placeholder {
  color: var(--text-dim);
}

.btn-send {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--bg-deep);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.btn-send:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(201,164,74,0.3);
}

.btn-summary {
  display: none;
  margin-top: 12px;
  width: 100%;
}

.btn-summary.visible {
  display: block;
}

/* ==================== 总结页 Summary ==================== */
.summary-container {
  max-width: 520px;
  width: 100%;
  text-align: center;
}

.summary-card {
  background: var(--bg-card);
  border: 1px solid rgba(201,164,74,0.2);
  border-radius: 20px;
  padding: 40px 32px;
  margin-bottom: 30px;
  position: relative;
  overflow: hidden;
}

/* 卡片装饰 */
.summary-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 20%, rgba(201,164,74,0.05) 0%, transparent 50%);
  pointer-events: none;
}

.summary-section {
  margin-bottom: 28px;
  text-align: left;
  position: relative;
  z-index: 1;
}

.summary-section:last-child {
  margin-bottom: 0;
}

.summary-label {
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}

.summary-value {
  font-size: 15px;
  color: var(--text-primary);
  line-height: 1.7;
}

.summary-value.question-text {
  font-family: 'Crimson Pro', 'Noto Sans SC', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--gold-light);
}

.summary-divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 24px auto;
}

.summary-emotion-tag {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 14px;
  letter-spacing: 1px;
}

.summary-emotion-tag.satisfied {
  background: rgba(107,203,119,0.15);
  color: #6bcb77;
  border: 1px solid rgba(107,203,119,0.3);
}

.summary-emotion-tag.unsatisfied {
  background: rgba(232,108,108,0.15);
  color: #e86c6c;
  border: 1px solid rgba(232,108,108,0.3);
}

.summary-emotion-tag.uncertain {
  background: rgba(162,155,254,0.15);
  color: var(--purple-light);
  border: 1px solid rgba(162,155,254,0.3);
}

.summary-actions {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

/* ==================== 响应式设计 ==================== */
@media (max-width: 480px) {
  .view {
    padding: 30px 16px;
  }

  .options-row {
    flex-direction: column;
    gap: 12px;
  }

  .flip-book-wrapper {
    width: 220px;
    height: 280px;
  }

  .result-book {
    height: 300px;
  }

  .dialog-container {
    height: calc(100vh - 80px);
  }

  .reaction-buttons {
    flex-direction: column;
    align-items: center;
  }

  .btn-reaction {
    width: 200px;
  }

  .summary-card {
    padding: 28px 20px;
  }
}

/* ==================== 通用装饰 ==================== */
/* 紫色光晕背景 */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -20%;
  width: 60%;
  height: 60%;
  background: radial-gradient(circle, rgba(108,92,231,0.08) 0%, transparent 70%);
  pointer-events: none;

<!-- ==================== JavaScript ==================== -->
<script>
/* ==================== 全局状态 ==================== */
const AppState = {
  question: '',       // 用户输入的问题
  optionA: '',        // 选项 A
  optionB: '',        // 选项 B
  answer: '',         // 随机给出的答案
  reaction: '',       // 情绪反应: satisfied | unsatisfied | uncertain
  dialogRound: 0,     // 对话轮次
  userResponses: [],  // 用户的回复记录
  maxRounds: 4        // 最大对话轮次
};

/* ==================== 粒子系统 ==================== */
(function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 60;

  // 初始化画布尺寸
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // 粒子类
  class Particle {
    constructor() {
      this.reset();
    }

    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2.5 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.speedY = (Math.random() - 0.5) * 0.3 - 0.1; // 轻微上飘
      this.opacity = Math.random() * 0.5 + 0.1;
      this.opacitySpeed = (Math.random() - 0.5) * 0.005;
      // 金色或紫色粒子
      if (Math.random() > 0.5) {
        this.color = `rgba(201, 164, 74, ${this.opacity})`;
        this.r = 201; this.g = 164; this.b = 74;
      } else {
        this.color = `rgba(108, 92, 231, ${this.opacity})`;
        this.r = 108; this.g = 92; this.b = 231;
      }
    }

    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.opacity += this.opacitySpeed;

      if (this.opacity <= 0.05 || this.opacity >= 0.6) {
        this.opacitySpeed *= -1;
      }

      // 超出边界重置
      if (this.x < -10 || this.x > canvas.width + 10 ||
          this.y < -10 || this.y > canvas.height + 10) {
        this.reset();
      }

      this.color = `rgba(${this.r}, ${this.g}, ${this.b}, ${Math.max(0, this.opacity)})`;
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();

      // 光晕效果
      if (this.size > 1.5) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.1, this.size * 3), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${Math.max(0, this.opacity * 0.1)})`;
        ctx.fill();
      }
    }
  }

  // 初始化粒子
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }

  // 动画循环
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animate);
  }
  animate();

  // 将粒子系统暴露给翻书动画页使用
  window.particleSystem = { particles, canvas, ctx, Particle };
})();

/* ==================== 翻书动画粒子效果 ==================== */
function playFlipParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let extraParticles = [];
  const FLIP_PARTICLE_COUNT = 50;

  class FlipParticle {
    constructor() {
      // 从书页中心区域出发
      this.x = canvas.width / 2 + (Math.random() - 0.5) * 100;
      this.y = canvas.height / 2 + (Math.random() - 0.5) * 80;
      this.size = Math.random() * 3 + 1;
      this.speedX = (Math.random() - 0.5) * 3;
      this.speedY = -Math.random() * 3 - 1;
      this.gravity = 0.02;
      this.opacity = Math.random() * 0.8 + 0.2;
      this.life = 1;
      this.decay = Math.random() * 0.008 + 0.005;
      this.r = 201; this.g = 164; this.b = 74;
      // 部分粒子用紫色
      if (Math.random() > 0.6) {
        this.r = 162; this.g = 155; this.b = 254;
      }
    }

    update() {
      this.x += this.speedX;
      this.speedY += this.gravity;
      this.y += this.speedY;
      this.life -= this.decay;
      this.opacity = Math.max(0, this.life * 0.8);
    }

    draw() {
      if (this.life <= 0) return;
      ctx.beginPath();
      ctx.arc(this.x, this.y, Math.max(0.1, this.size * this.life), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${this.opacity})`;
      ctx.fill();
      // 光晕
      ctx.beginPath();
      ctx.arc(this.x, this.y, Math.max(0.1, this.size * this.life * 2.5), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${Math.max(0, this.opacity * 0.15)})`;
      ctx.fill();
    }
  }

  // 生成粒子
  for (let i = 0; i < FLIP_PARTICLE_COUNT; i++) {
    extraParticles.push(new FlipParticle());
  }

  // 动画（约3秒后停止）
  const startTime = Date.now();
  function animateFlip() {
    if (Date.now() - startTime > 3500) return;
    extraParticles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animateFlip);
  }
  animateFlip();
}

/* ==================== 视图切换 ==================== */
function showView(viewName) {
  // 隐藏所有视图
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  // 显示目标视图
  const target = document.getElementById('view-' + viewName);
  if (target) {
    target.classList.add('active');
  }
}

/* ==================== 答案生成 ==================== */
// 通用答案话术（当没有填写选项时使用）
const genericAnswers = [
  '去做吧',
  '再想想',
  '勇敢迈出那一步',
  '时机未到，再等等',
  '相信你的直觉',
  '答案就在你心里',
  '去试试看，不会后悔',
  '放轻松，一切都会好的',
  '有些路只有走过才知道',
  '你已经知道答案了',
  '别犹豫了',
  '值得冒险一次',
  '静下心来，答案自然会来',
  '也许换个角度想想',
  '相信过程'
];

function generateAnswer() {
  const { optionA, optionB } = AppState;

  // 如果有选项，随机选一个
  if (optionA && optionB) {
    return Math.random() > 0.5 ? optionA : optionB;
  }

  // 如果只有一个选项
  if (optionA || optionB) {
    return optionA || optionB;
  }

  // 没有选项，随机给出通用答案
  return genericAnswers[Math.floor(Math.random() * genericAnswers.length)];
}

/* ==================== 翻书动画流程 ==================== */
function startFlipAnimation() {
  const question = document.getElementById('questionInput').value.trim();
  if (!question) {
    // 抖动输入框提示
    const textarea = document.getElementById('questionInput');
    textarea.style.borderColor = '#e86c6c';
    textarea.style.animation = 'none';
    textarea.offsetHeight; // 触发重排
    textarea.style.animation = 'shake 0.4s ease';
    setTimeout(() => {
      textarea.style.borderColor = '';
      textarea.style.animation = '';
    }, 1000);
    return;
  }

  // 保存用户输入
  AppState.question = question;
  AppState.optionA = document.getElementById('optionA').value.trim();
  AppState.optionB = document.getElementById('optionB').value.trim();

  // 生成答案
  AppState.answer = generateAnswer();

  // 切换到动画页
  showView('animation');

  // 启动翻书动画
  setTimeout(() => {
    const flipPage = document.getElementById('flipPage');
    flipPage.classList.add('flipping');
    playFlipParticles();
  }, 300);

  // 动画结束后跳到结果页
  setTimeout(() => {
    showResult();
  }, 3500);
}

/* ==================== 显示结果 ==================== */
function showResult() {
  showView('result');
  document.getElementById('resultAnswer').textContent = AppState.answer;
}

/* ==================== 情绪反应选择 ==================== */
function selectReaction(reaction) {
  AppState.reaction = reaction;

  // 高亮选中的按钮
  document.querySelectorAll('.btn-reaction').forEach(btn => {
    btn.classList.remove('selected');
  });
  event.target.classList.add('selected');

  // 禁用所有反应按钮
  setTimeout(() => {
    document.querySelectorAll('.btn-reaction').forEach(btn => {
      btn.style.opacity = '0.5';
      btn.style.pointerEvents = 'none';
    });

    // 1.5秒后跳转到对话页
    setTimeout(() => {
      startDialog();
    }, 1000);
  }, 300);
}

/* ==================== AI 引导引擎 ==================== */

// 引导话术模板库
const guidanceTemplates = {
  satisfied: {
    // 满意 → 引导探索原因
    round1: [
      '看来你找到答案了！选择让你轻松，说明这就是你想要的。你能描述一下，为什么这个选择让你感到安心吗？',
      '松了一口气的感觉，往往是最诚实的。这种感觉从何而来？试着回忆一下，是什么让你觉得"就是这样了"？'
    ],
    round2: [
      '记住这种感觉，这就是你内心真正的声音。当你想到这个答案时，脑海里浮现了什么画面？',
      '你说得很好。很多时候，答案不在逻辑里，而是在这种"心安"的感觉里。这种安心，值得被记住。'
    ],
    round3: [
      '你已经非常清楚自己想要什么了。如果明天就要做出这个选择，你觉得自己准备好了吗？',
      '这种踏实感不是偶然的。它来自你内心深处，已经积蓄了很久的力量。信任它，然后行动吧。'
    ],
    round4: '不管你最终怎么选，重要的是你开始听见了自己的声音。这份清晰和勇气，就是最好的答案。'
  },
  unsatisfied: {
    // 不满意 → 引导反思真实需求
    round1: [
      '如果答案翻转到另一个选项，你会不会松一口气？',
      '听到这个答案时，你心里第一个念头是什么？不用去评判它，只是诚实面对就好。'
    ],
    round2: [
      '这说明了什么？也许你已经知道了自己真正想要什么，只是还没敢承认。',
      '有时候，"不舒服"比"松了一口气"更能告诉我们真相。这种不舒服，是在提醒你什么？'
    ],
    round3: [
      '你刚才的回答里，其实藏着答案。你愿意再仔细听听自己说的那些话吗？',
      '问问自己：如果全世界都不会评判你的选择，你会毫不犹豫地走向哪一边？'
    ],
    round4: '不管你最终怎么选，重要的是你开始听见了自己的声音。也许答案一直都在，只是需要勇气去面对。'
  },
  uncertain: {
    // 不确定 → 引导换角度思考
    round1: [
      '犹豫本身也是一种信号。让我们换个角度问：如果没有人会评判你的选择，你会怎么选？',
      '说不清也没关系。很多时候，答案不是非黑即白的。你觉得，是什么让你举棋不定？'
    ],
    round2: [
      '听听你刚说的，也许答案已经出来了。如果把这个纠结放在一年后再看，你觉得重要吗？',
      '你的犹豫里藏着一些重要的东西。是害怕选错吗？还是在担心某些后果？'
    ],
    round3: [
      '也许你需要的不是一个"正确答案"，而是一个"敢于行动"的勇气。你觉得呢？',
      '试着想象一下：做出某个选择后，最好的结果会是什么？最坏的结果又是什么？'
    ],
    round4: '不管你最终怎么选，重要的是你开始听见了自己的声音。有时候，行动本身就是答案。'
  }
};

/**
 * 核心引导函数
 * @param {string} reaction - 情绪反应类型
 * @param {string} question - 用户的问题
 * @param {string} optionA - 选项A
 * @param {string} optionB - 选项B
 * @param {number} round - 当前轮次（1-4）
 * @returns {string} 引导文本
 */
function generateGuidance(reaction, question, optionA, optionB, round) {
  const templates = guidanceTemplates[reaction];
  if (!templates) return '让我们继续探索你内心的声音。';

  // 最后一轮使用固定话术
  if (round >= AppState.maxRounds) {
    return templates.round4;
  }

  // 获取对应轮次的模板数组
  const roundKey = 'round' + round;
  const roundTemplates = templates[roundKey];

  if (!roundTemplates) return templates.round4;

  // 如果是数组，随机选择一个
  if (Array.isArray(roundTemplates)) {
    return roundTemplates[Math.floor(Math.random() * roundTemplates.length)];
  }

  return roundTemplates;
}

/* ==================== 对话系统 ==================== */
function startDialog() {
  showView('dialog');
  AppState.dialogRound = 0;
  AppState.userResponses = [];

  // 清空对话消息
  const messagesEl = document.getElementById('dialogMessages');
  messagesEl.innerHTML = '';

  // 隐藏查看总结按钮
  document.getElementById('btnViewSummary').classList.remove('visible');

  // 发送第一条 AI 消息
  const firstGuidance = generateGuidance(
    AppState.reaction,
    AppState.question,
    AppState.optionA,
    AppState.optionB,
    1
  );

  setTimeout(() => {
    addAIMessage(firstGuidance);
    AppState.dialogRound = 1;
  }, 500);
}

function addAIMessage(text) {
  const messagesEl = document.getElementById('dialogMessages');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message ai';
  msgDiv.innerHTML = `
    <div class="message-avatar">
      <div class="avatar ai">✦</div>
      <span class="message-name">答案之书</span>
    </div>
    <div class="message-bubble">${text}</div>
  `;
  messagesEl.appendChild(msgDiv);
  scrollToBottom();
}

function addUserMessage(text) {
  const messagesEl = document.getElementById('dialogMessages');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message user';
  msgDiv.innerHTML = `
    <div class="message-avatar" style="justify-content:flex-end;">
      <span class="message-name">你</span>
      <div class="avatar user">?</div>
    </div>
    <div class="message-bubble">${text}</div>
  `;
  messagesEl.appendChild(msgDiv);
  scrollToBottom();
}

function scrollToBottom() {
  const messagesEl = document.getElementById('dialogMessages');
  setTimeout(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, 50);
}

function sendUserMessage() {
  const input = document.getElementById('dialogInput');
  const text = input.value.trim();
  if (!text) return;

  // 记录用户回复
  AppState.userResponses.push(text);
  input.value = '';

  // 显示用户消息
  addUserMessage(text);

  // 禁用输入，等待 AI 回复
  input.disabled = true;
  document.querySelector('.btn-send').disabled = true;

  // 增加轮次
  AppState.dialogRound++;

  // AI 回复延迟（模拟思考）
  setTimeout(() => {
    if (AppState.dialogRound >= AppState.maxRounds) {
      // 最后一轮，发送结束语
      const closingText = generateGuidance(
        AppState.reaction,
        AppState.question,
        AppState.optionA,
        AppState.optionB,
        AppState.maxRounds
      );
      addAIMessage(closingText);

      // 显示查看总结按钮
      setTimeout(() => {
        document.getElementById('btnViewSummary').classList.add('visible');
      }, 800);

      // 隐藏输入区域
      document.getElementById('dialogInputArea').style.display = 'none';
    } else {
      // 继续引导
      const guidance = generateGuidance(
        AppState.reaction,
        AppState.question,
        AppState.optionA,
        AppState.optionB,
        AppState.dialogRound
      );
      addAIMessage(guidance);
    }

    // 恢复输入（如果还没到最后一轮）
    if (AppState.dialogRound < AppState.maxRounds) {
      input.disabled = false;
      document.querySelector('.btn-send').disabled = false;
      input.focus();
    }
  }, 1000 + Math.random() * 500); // 1-1.5秒的随机延迟
}

/* ==================== 总结页 ==================== */
function showSummary() {
  showView('summary');

  // 填充总结内容
  document.getElementById('summaryQuestion').textContent = AppState.question;
  document.getElementById('summaryAnswer').textContent = '「' + AppState.answer + '」';

  // 情绪标签
  const emotionLabels = {
    satisfied: '倾向接受 · 内心安定',
    unsatisfied: '倾向抗拒 · 有所期待',
    uncertain: '仍在探索 · 需要时间'
  };
  const emotionText = emotionLabels[AppState.reaction] || '未知';
  document.getElementById('summaryEmotion').innerHTML =
    `<span class="summary-emotion-tag ${AppState.reaction}">${emotionText}</span>`;

  // 生成洞察
  const insights = generateInsight();
  document.getElementById('summaryInsight').textContent = insights.insight;

  // 行动建议
  document.getElementById('summaryAdvice').textContent = insights.advice;
}

function generateInsight() {
  const { reaction, question, optionA, optionB, answer, userResponses } = AppState;

  // 基于情绪反应生成不同洞察
  const insightMap = {
    satisfied: {
      insight: `当答案之书给出"${answer}"时，你的第一反应是松了一口气。这种轻松感往往意味着，你内心深处早已有了答案——只是需要一个契机来确认它。你的直觉在引导你走向这个方向。`,
      advice: `相信你的直觉。在接下来的一周里，试着朝着"${answer}"的方向迈出一小步。不需要一步到位，哪怕是了解、准备、或者只是想想看，都是前进。记住今天这份安心感。`
    },
    unsatisfied: {
      insight: `当答案之书给出"${answer}"时，你的不适感其实是一个重要的信号。它告诉你，你真正渴望的可能恰恰相反。有时候，我们的身体比大脑更早知道答案。`,
      advice: `给自己几天时间，不带评判地想想：如果做出相反的选择，你会是什么感觉？试着写下来，或者和一个信任的人聊聊。当恐惧和期待都摆在台面上，选择会变得清晰。`
    },
    uncertain: {
      insight: `你面对"${question}"时的犹豫，说明你对此非常认真。你不愿草率决定，这本身就是一种负责任的态度。但犹豫久了，也是一种消耗——你值得拥有一个清晰的答案。`,
      advice: `试试这个方法：抛一枚硬币。在硬币落地之前，你会发现自己暗暗希望它是哪一面——那就是你真正的答案。如果还是不确定，不妨先选择一个方向走一小步，看看感受如何。行动会带来清晰。`
    }
  };

  return insightMap[reaction] || insightMap.uncertain;
}

/* ==================== 重新开始 ==================== */
function restart() {
  // 重置状态
  AppState.question = '';
  AppState.optionA = '';
  AppState.optionB = '';
  AppState.answer = '';
  AppState.reaction = '';
  AppState.dialogRound = 0;
  AppState.userResponses = [];

  // 重置 UI
  document.getElementById('questionInput').value = '';
  document.getElementById('optionA').value = '';
  document.getElementById('optionB').value = '';
  document.getElementById('dialogMessages').innerHTML = '';
  document.getElementById('dialogInput').value = '';
  document.getElementById('dialogInput').disabled = false;
  document.querySelector('.btn-send').disabled = false;
  document.getElementById('dialogInputArea').style.display = 'flex';
  document.getElementById('btnViewSummary').classList.remove('visible');

  // 重置翻书动画
  const flipPage = document.getElementById('flipPage');
  flipPage.classList.remove('flipping');

  // 重置反应按钮
  document.querySelectorAll('.btn-reaction').forEach(btn => {
    btn.classList.remove('selected');
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
  });

  // 返回首页
  showView('welcome');
}

/* ==================== 输入框抖动动画 ==================== */
// 动态插入 shake 动画
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
`;
document.head.appendChild(shakeStyle);

/* ==================== 减弱动画偏好支持 ==================== */
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('*').forEach(el => {
    el.style.animationDuration = '0.01s';
    el.style.transitionDuration = '0.01s';
  });
}
