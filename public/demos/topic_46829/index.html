<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>修身记 - 个人资源管理</title>
<style>
:root {
  --primary: #5B8C85;
  --primary-light: #8DB5B0;
  --bg: #F5F0EB;
  --card-bg: #FFFFFF;
  --text: #2C3E2D;
  --text-light: #7A8B7A;
  --text-secondary: #5D6D5E;
  --divider: #E8E3DD;
  --shadow: rgba(91, 140, 133, 0.08);
  --danger: #E74C3C;
  --success: #27AE60;
  --warning: #F39C12;
  --info: #3498DB;
  --purple: #9B59B6;
  --money-color: #E74C3C;
  --time-color: #3498DB;
  --emotion-color: #9B59B6;
  --energy-color: #27AE60;
  --nav-height: 100px;
}

[data-theme="dark"] {
  --primary: #8DB5B0;
  --primary-light: #5B8C85;
  --bg: #1A1D1A;
  --card-bg: #252825;
  --text: #E0E8E0;
  --text-light: #8A9A8A;
  --text-secondary: #9AAA9A;
  --divider: #333833;
  --shadow: rgba(0,0,0,0.2);
}

[data-theme="warm"] {
  --primary: #D4A574;
  --primary-light: #E8C9A0;
  --bg: #FAF3E8;
  --card-bg: #FFFDF8;
  --text: #4A3728;
  --text-light: #8B7355;
  --text-secondary: #6B5340;
  --divider: #E8D5C0;
  --shadow: rgba(180, 140, 100, 0.1);
}

[data-theme="bamboo"] {
  --primary: #4A7C59;
  --primary-light: #7CB08A;
  --bg: #F0F5F0;
  --card-bg: #F8FBF8;
  --text: #2C3E2D;
  --text-light: #6B8A6B;
  --text-secondary: #5A7A5A;
  --divider: #D8E8D8;
  --shadow: rgba(74, 124, 89, 0.08);
}

[data-theme="ocean"] {
  --primary: #4A90B8;
  --primary-light: #7BB5D8;
  --bg: #F0F5FA;
  --card-bg: #F8FBFD;
  --text: #2C3E50;
  --text-light: #6B8A9E;
  --text-secondary: #5A7A8E;
  --divider: #D8E4ED;
  --shadow: rgba(74, 144, 184, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  transition: background 0.3s, color 0.3s;
}

.app-container {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-height) + 20px);
}

/* Header */
.app-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  padding: 40px 20px 30px;
  color: #fff;
  border-radius: 0 0 30px 30px;
  position: relative;
  overflow: hidden;
  transition: background 0.3s;
}

.app-header::after {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
}

.header-title-group {
  display: flex;
  flex-direction: column;
}

.app-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
}

.app-tagline {
  font-size: 11px;
  opacity: 0.65;
  margin-top: 4px;
  letter-spacing: 1px;
}

.header-actions {
  display: flex;
  gap: 12px;
}

.header-btn {
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  border: none;
  color: #fff;
  transition: background 0.2s;
}

.header-btn:hover { background: rgba(255,255,255,0.3); }

/* Summary Cards */
.summary-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}

.summary-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 14px 16px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
}

.summary-card:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.22);
}

.summary-card-label {
  font-size: 12px;
  opacity: 0.85;
  margin-bottom: 6px;
}

.summary-card-value {
  font-size: 22px;
  font-weight: 700;
}

.summary-card .unit {
  font-size: 12px;
  font-weight: 400;
  opacity: 0.8;
  margin-left: 4px;
}

/* Level Bar */
.level-bar {
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 12px 16px;
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.level-badge {
  width: 44px;
  height: 44px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
}

.level-info {
  flex: 1;
  min-width: 0;
}

.level-title {
  font-size: 14px;
  font-weight: 600;
}

.level-progress-outer {
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
  margin-top: 6px;
  overflow: hidden;
}

.level-progress-inner {
  height: 100%;
  background: rgba(255,255,255,0.7);
  border-radius: 3px;
  transition: width 0.5s;
}

.level-points {
  font-size: 11px;
  opacity: 0.8;
  margin-top: 4px;
}

/* Resource Tabs */
.resource-tabs {
  display: flex;
  gap: 8px;
  padding: 16px 20px;
  overflow-x: auto;
  scrollbar-width: none;
}

.resource-tabs::-webkit-scrollbar { display: none; }

.resource-tab {
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  cursor: pointer;
  border: 2px solid var(--divider);
  background: var(--card-bg);
  color: var(--text-light);
  transition: all 0.2s;
}

.resource-tab.active {
  color: #fff;
  border-color: transparent;
}

.resource-tab.money.active { background: var(--money-color); }
.resource-tab.time.active { background: var(--time-color); }
.resource-tab.emotion.active { background: var(--emotion-color); }
.resource-tab.energy.active { background: var(--energy-color); }

/* Main Content */
.main-content {
  padding: 0 20px;
}

.section-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--primary);
}

/* Quick Record */
.quick-record {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px var(--shadow);
  transition: background 0.3s, box-shadow 0.3s;
  overflow: hidden;
}

.record-type-toggle {
  display: flex;
  background: var(--bg);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 16px;
}

.record-type-btn {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-light);
  transition: all 0.2s;
}

.record-type-btn.active.income {
  background: var(--success);
  color: #fff;
}

.record-type-btn.active.expense {
  background: var(--danger);
  color: #fff;
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.category-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 4px;
  border-radius: 12px;
  cursor: pointer;
  border: 2px solid transparent;
  background: var(--bg);
  transition: all 0.2s;
}

.category-item:hover {
  border-color: var(--primary);
  transform: scale(1.05);
}

.category-item.selected {
  border-color: var(--primary);
  background: color-mix(in srgb, var(--primary) 8%, var(--bg));
}

.category-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  margin-bottom: 4px;
  color: #fff;
}

.category-name {
  font-size: 11px;
  color: var(--text-secondary);
  text-align: center;
}

.record-extra-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  min-width: 0;
}

.record-extra-input {
  flex: 1;
  min-width: 0;
  height: 42px;
  border: 2px solid var(--divider);
  border-radius: 10px;
  padding: 0 10px;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  box-sizing: border-box;
}

.record-extra-input:focus {
  border-color: var(--primary);
}

.record-extra-input[type="datetime-local"] {
  color-scheme: light;
}

[data-theme="dark"] .record-extra-input[type="datetime-local"] {
  color-scheme: dark;
}

.amount-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
  min-width: 0;
}

.amount-input {
  flex: 1;
  min-width: 0;
  height: 48px;
  border: 2px solid var(--divider);
  border-radius: 12px;
  padding: 0 10px;
  font-size: 18px;
  font-weight: 600;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  box-sizing: border-box;
}

.amount-input:focus {
  border-color: var(--primary);
}

.amount-unit {
  font-size: 13px;
  color: var(--text-light);
  white-space: nowrap;
}

.submit-btn {
  height: 48px;
  padding: 0 18px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}

.submit-btn:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

.voice-btn {
  width: 48px;
  height: 48px;
  background: var(--bg);
  border: 2px solid var(--divider);
  border-radius: 12px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
  color: var(--text);
}

.voice-btn:hover {
  border-color: var(--primary);
  background: color-mix(in srgb, var(--primary) 8%, var(--bg));
}

.voice-btn.recording {
  background: var(--danger);
  border-color: var(--danger);
  color: #fff;
  animation: pulse 1s infinite;
}

/* Recent Records */
.recent-records {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px var(--shadow);
  transition: background 0.3s, box-shadow 0.3s;
}

.record-item {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--divider);
  transition: border-color 0.3s;
}

.record-item:last-child { border-bottom: none; }

.record-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-right: 12px;
  color: #fff;
  flex-shrink: 0;
}

.record-info { flex: 1; min-width: 0; }

.record-name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}

.record-meta {
  font-size: 11px;
  color: var(--text-light);
}

.record-amount {
  font-size: 16px;
  font-weight: 700;
  text-align: right;
}

.record-amount.income { color: var(--success); }
.record-amount.expense { color: var(--danger); }

.empty-state {
  text-align: center;
  padding: 30px 0;
  color: var(--text-light);
  font-size: 14px;
}

/* Achievements */
.achievements-section {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px var(--shadow);
  transition: background 0.3s, box-shadow 0.3s;
}

.achievement-list {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  padding-right: 8px;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
}

.achievement-list::-webkit-scrollbar { display: none; }

.achievement-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 68px;
  flex-shrink: 0;
  scroll-snap-align: start;
  cursor: pointer;
  transition: transform 0.2s;
}

.achievement-badge:hover { transform: scale(1.08); }

.achievement-badge-icon {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
  transition: all 0.3s;
}

.achievement-badge-icon.locked {
  background: #ccc !important;
  color: #999 !important;
}

.achievement-badge-name {
  font-size: 11px;
  color: var(--text-secondary);
  text-align: center;
}

/* Budget Cards */
.budget-section {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px var(--shadow);
  transition: background 0.3s, box-shadow 0.3s;
}

.budget-item {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--divider);
  transition: border-color 0.3s;
}

.budget-item:last-child { border-bottom: none; }

.budget-resource-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  margin-right: 12px;
  font-size: 16px;
  flex-shrink: 0;
}

.budget-info { flex: 1; }

.budget-name {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
}

.budget-bar-outer {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
}

.budget-bar-inner {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s;
}

.budget-bar-inner.safe { background: var(--success); }
.budget-bar-inner.warning { background: var(--warning); }
.budget-bar-inner.danger { background: var(--danger); }

.budget-amount {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 4px;
}

/* Toast */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transition: all 0.3s;
}

.toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.modal-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 24px;
  width: 85%;
  max-width: 380px;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  text-align: center;
}

.theme-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.theme-option {
  padding: 16px;
  border-radius: 14px;
  cursor: pointer;
  border: 2px solid transparent;
  text-align: center;
  transition: all 0.2s;
}

.theme-option:hover { transform: scale(1.03); }
.theme-option.selected { border-color: var(--primary); }

.theme-option-preview {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin: 0 auto 8px;
}

.theme-option-name {
  font-size: 13px;
  font-weight: 600;
}

/* Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: var(--card-bg);
  border-top: 1px solid var(--divider);
  display: flex;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
  box-shadow: 0 -2px 20px var(--shadow);
  transition: background 0.3s, border-color 0.3s;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 4px 0;
  color: var(--text-light);
  transition: color 0.2s;
  border: none;
  background: none;
  font-family: inherit;
}

.nav-item.active {
  color: var(--primary);
}

.nav-item-icon {
  font-size: 22px;
}

.nav-item-label {
  font-size: 10px;
}

/* Stats Page */
.stats-card {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px var(--shadow);
  transition: background 0.3s, box-shadow 0.3s;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.stats-item {
  background: var(--bg);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
}

.stats-item-value {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
}

.stats-item-label {
  font-size: 12px;
  color: var(--text-light);
}

.chart-placeholder {
  height: 160px;
  background: var(--bg);
  border-radius: 14px;
  display: flex;
  align-items: flex-end;
  padding: 16px;
  gap: 8px;
}

.chart-bar {
  flex: 1;
  border-radius: 8px 8px 0 0;
  min-height: 4px;
  transition: height 0.5s;
  position: relative;
}

.chart-bar-label {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text-light);
  white-space: nowrap;
}

.analysis-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--divider);
  transition: border-color 0.3s;
}

.analysis-item:last-child { border-bottom: none; }

.analysis-icon {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.analysis-icon.tip { background: #E8F5E9; color: #27AE60; }
.analysis-icon.warn { background: #FFF3E0; color: #F39C12; }
.analysis-icon.good { background: #E3F2FD; color: #3498DB; }
.analysis-icon.info { background: #F3E5F5; color: #9B59B6; }

[data-theme="dark"] .analysis-icon.tip { background: #1B3D2B; }
[data-theme="dark"] .analysis-icon.warn { background: #3D2E1B; }
[data-theme="dark"] .analysis-icon.good { background: #1B2D3D; }
[data-theme="dark"] .analysis-icon.info { background: #2D1B3D; }

.analysis-text {
  flex: 1;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
}

.analysis-text strong {
  color: var(--text);
}

/* Profile Page */
.profile-card {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 24px 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px var(--shadow);
  text-align: center;
  transition: background 0.3s, box-shadow 0.3s;
}

.profile-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 32px;
  color: #fff;
}

.profile-name {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.profile-level {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 12px;
}

.profile-stats {
  display: flex;
  justify-content: space-around;
  border-top: 1px solid var(--divider);
  padding-top: 14px;
  margin-top: 4px;
}

.profile-stat {
  text-align: center;
}

.profile-stat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
}

.profile-stat-label {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 2px;
}

.budget-edit-section {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px var(--shadow);
  transition: background 0.3s, box-shadow 0.3s;
}

.budget-edit-info {
  flex: 1;
}

.budget-edit-name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}

.budget-edit-hint {
  font-size: 11px;
  color: var(--text-light);
}

.budget-edit-input {
  width: 90px;
  height: 38px;
  border: 2px solid var(--divider);
  border-radius: 10px;
  padding: 0 10px;
  font-size: 15px;
  font-weight: 600;
  text-align: right;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.budget-edit-input:focus { border-color: var(--primary); }

.budget-edit-unit {
  margin-left: 6px;
  font-size: 13px;
  color: var(--text-light);
  width: 28px;
}

.budget-save-btn {
  width: 100%;
  height: 44px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  transition: opacity 0.2s;
}

.budget-save-btn:hover { opacity: 0.9; }

.budget-toggle {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
}

.budget-toggle input { opacity: 0; width: 0; height: 0; }

.budget-toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #ccc;
  border-radius: 24px;
  transition: 0.3s;
}

.budget-toggle-slider::before {
  content: '';
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: 0.3s;
}

.budget-toggle input:checked + .budget-toggle-slider {
  background: var(--primary);
}

.budget-toggle input:checked + .budget-toggle-slider::before {
  transform: translateX(20px);
}

.budget-edit-fields {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: auto;
  transition: opacity 0.3s;
}

.budget-period-select {
  height: 48px;
  border: 2px solid var(--divider);
  border-radius: 10px;
  padding: 0 6px;
  font-size: 12px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  outline: none;
}

.budget-edit-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid var(--divider);
  transition: border-color 0.3s;
}

.budget-edit-item:last-child { border-bottom: none; }

/* Report Push Settings */
.report-push-section {
  margin-top: 16px;
}

.push-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--divider);
  transition: border-color 0.3s;
}

.push-item:last-child { border-bottom: none; }

.push-label {
  font-size: 14px;
  font-weight: 500;
}

.push-select {
  height: 36px;
  border: 2px solid var(--divider);
  border-radius: 8px;
  padding: 0 8px;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  outline: none;
}

.push-time-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.push-time-input {
  height: 36px;
  border: 2px solid var(--divider);
  border-radius: 8px;
  padding: 0 8px;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  width: 80px;
}

.report-btn {
  width: 100%;
  height: 44px;
  margin-top: 16px;
  background: linear-gradient(135deg, var(--purple), var(--info));
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.report-btn:hover { opacity: 0.9; }

.report-content {
  font-size: 14px;
  line-height: 2;
  color: var(--text-secondary);
  padding: 8px 0;
}

.report-content p {
  margin-bottom: 12px;
  text-indent: 2em;
}

.report-content .highlight {
  color: var(--primary);
  font-weight: 600;
}

.report-content .quote {
  display: block;
  padding: 12px 16px;
  margin: 12px 0;
  background: color-mix(in srgb, var(--primary) 8%, var(--bg));
  border-left: 3px solid var(--primary);
  border-radius: 0 8px 8px 0;
  font-style: italic;
  text-indent: 0;
}

.record-location {
  font-size: 11px;
  color: var(--primary);
  margin-top: 2px;
}

/* Page Visibility */
.page { display: none; }
.page.active { display: block; }

/* Responsive */
@media (min-width: 431px) {
  body {
    background: #E8E3DD;
  }
  .app-container {
    box-shadow: 0 0 40px rgba(0,0,0,0.1);
  }
}

/* Animations */
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes popIn {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

.animate-slide { animation: slideUp 0.4s ease; }
.animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

/* Achievement unlock animation */
@keyframes achievementUnlock {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); opacity: 1; }
}

.achievement-unlock {
  animation: achievementUnlock 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Pulsing dot for new notification */
.pulse-dot {
  width: 8px;
  height: 8px;
  background: var(--danger);
  border-radius: 50%;
  position: absolute;
  top: -2px;
  right: -2px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

function updateBudgetUsed() {
  const now = new Date();
  state.budgets.forEach(b => {
    let startDate;
    if (b.period === 'week') {
      // 本周一
      const day = now.getDay() || 7;
      startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day + 1);
    } else {
      // 本月1日
      startDate = new Date(now.getFullYear(), now.getMonth(), 1);
    }
    startDate.setHours(0,0,0,0);
    const total = state.records
      .filter(r => r.resourceType === b.resourceType && r.type === 'expense' && new Date(r.time) >= startDate)
      .reduce((sum, r) => sum + r.amount, 0);
    b.used = total;
  });
}

// ============ 成就检测 ============
function checkAchievements() {
  let newUnlock = false;
  const totalRecords = state.records.length;
  const usedTypes = new Set(state.records.map(r => r.resourceType));
  const moneyTotal = state.records.filter(r => r.resourceType === 'money').reduce((s,r) => s + r.amount, 0);
  const timeTotal = state.records.filter(r => r.resourceType === 'time').reduce((s,r) => s + r.amount, 0);

  // 计算连续天数
  const dates = [...new Set(state.records.map(r => {
    const d = new Date(r.time);
    return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  }))].sort().reverse();
  let continuous = 0;
  const today = new Date();
  const todayStr = today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();
  if (dates[0] === todayStr) {
    continuous = 1;
    const yesterday = new Date(today - 86400000);
    const yesterdayStr = yesterday.getFullYear()+'-'+(yesterday.getMonth()+1)+'-'+yesterday.getDate();
    for (let i = 1; i < dates.length; i++) {
      const expected = new Date(today - 86400000 * i);
      if (dates[i] === expected.getFullYear()+'-'+(expected.getMonth()+1)+'-'+expected.getDate()) {
        continuous++;
      } else break;
    }
  }

  state.achievements.forEach(a => {
    let current = 0;
    switch(a.type) {
      case 'records': current = totalRecords; break;
      case 'continuous': current = continuous; break;
      case 'allTypes': current = usedTypes.size; break;
      case 'moneyTotal': current = Math.floor(moneyTotal); break;
      case 'timeTotal': current = Math.floor(timeTotal); break;
    }
    a.current = Math.min(current, a.target);
    if (!a.unlocked && a.current >= a.target) {
      a.unlocked = true;
      state.totalPoints += a.points;
      newUnlock = true;
      setTimeout(() => showToast(`🏆 解锁成就：${a.name}！+${a.points}积分`), 400);
    }
  });
  return newUnlock;
}

function updateSummaryCards() {

    const total = state.records.filter(r => r.resourceType === type).reduce((s,r) => {
      return r.type === 'expense' ? s + r.amount : s - r.amount;
    }, 0);
    const el = document.getElementById(type + 'Total');
    const absTotal = Math.abs(Math.round(total * 100) / 100);
    if (el) {
      el.innerHTML = absTotal + '<span class="unit">' + RESOURCE_META[type].unit + '</span>';
    }
  });

function updateLevelBar() {
  const level = Math.min(8, Math.floor(state.totalPoints / 100) + 1);
  const titles = ['','修身初学','修身入门','修身进阶','修身有成','修身达人','修身大师','修身宗师','修身圣人'];
  const nextPoints = level < 8 ? level * 100 : Infinity;
  const currentLevelStart = (level - 1) * 100;
  const progress = nextPoints === Infinity ? 100 : Math.min(100, Math.round((state.totalPoints - currentLevelStart) / (nextPoints - currentLevelStart) * 100));
  
  document.getElementById('levelBadge').textContent = 'Lv.' + level;
  document.getElementById('levelTitle').textContent = titles[level] || '修身圣人';
  document.getElementById('levelProgress').style.width = progress + '%';
  document.getElementById('levelPoints').textContent = state.totalPoints + '/' + (nextPoints === Infinity ? '∞' : nextPoints) + ' 积分';

    }).length;

    const isToday = d.date === now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
    return `

function updateAnalysis() {
  const container = document.getElementById('analysisContent');
  const records = state.records;
  if (records.length === 0) {
    container.innerHTML = '<div class="analysis-item"><div class="analysis-icon info">📝</div><div class="analysis-text">暂无记录，开始记账后这里将显示智能分析。</div></div>';
    return;
  }
  
  const analysis = [];
  
  // 1. 各类资源支出占比
  const expenseByType = {};
  records.filter(r => r.type === 'expense').forEach(r => {
    if (!expenseByType[r.resourceType]) expenseByType[r.resourceType] = { total: 0, categories: {} };
    expenseByType[r.resourceType].total += r.amount;
    expenseByType[r.resourceType].categories[r.category] = (expenseByType[r.resourceType].categories[r.category] || 0) + r.amount;
  });
  
  const types = Object.keys(expenseByType);
  if (types.length > 0) {
    const maxType = types.reduce((a, b) => expenseByType[a].total > expenseByType[b].total ? a : b);
    const maxCat = Object.entries(expenseByType[maxType].categories).sort((a,b) => b[1] - a[1])[0];
    const maxTypeName = RESOURCE_META[maxType].name;
    analysis.push({
      icon: '💡', cls: 'tip',
      text: `<strong>${maxTypeName}</strong>支出最多，主要在「<strong>${maxCat[0]}</strong>」上消费了 <strong>${maxCat[1].toFixed(1)}</strong> ${RESOURCE_META[maxType].unit}。`
    });
  }
  
  // 2. 收支对比
  const incomeTotal = records.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0);
  const expenseTotal = records.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0);
  if (incomeTotal > 0 || expenseTotal > 0) {
    if (expenseTotal > incomeTotal * 1.5) {
      analysis.push({
        icon: '⚠️', cls: 'warn',
        text: `支出 <strong>${expenseTotal.toFixed(1)}</strong> 远大于收入 <strong>${incomeTotal.toFixed(1)}</strong>，建议适当控制消费节奏。`
      });
    } else if (incomeTotal > expenseTotal * 1.5) {
      analysis.push({
        icon: '👍', cls: 'good',
        text: `收入 <strong>${incomeTotal.toFixed(1)}</strong> 明显大于支出，理财状态良好，继续保持！`
      });
    }
  }
  
  // 3. 连续天数
  const continuousDays = getContinuousDays();
  if (continuousDays >= 7) {
    analysis.push({
      icon: '🔥', cls: 'good',
      text: `已连续记账 <strong>${continuousDays}</strong> 天，自律习惯正在养成，坚持就是胜利！`
    });
  } else if (continuousDays >= 3) {
    analysis.push({
      icon: '🌟', cls: 'tip',
      text: `已连续记账 <strong>${continuousDays}</strong> 天，再接再厉，争取突破7天！`
    });
  }
  
  // 4. 额度提醒
  state.budgets.forEach(b => {
    const ratio = b.limit > 0 ? b.used / b.limit : 0;
    if (ratio >= 0.8) {
      analysis.push({
        icon: '📊', cls: 'warn',
        text: `<strong>${RESOURCE_META[b.resourceType].name}</strong>额度已使用 ${Math.round(ratio*100)}%，剩余 <strong>${(b.limit - b.used).toFixed(1)}</strong> ${b.unit}，请合理规划。`
      });
    }
  });
  
  // 5. 活跃度
  const totalDays = new Set(records.map(r => {
    const d = new Date(r.time);
    return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  })).size;
  if (totalDays >= 30) {
    analysis.push({
      icon: '🏆', cls: 'info',
      text: `已累计 <strong>${totalDays}</strong> 天有记账记录，坚持这么久非常了不起！`
    });
  }
  
  if (analysis.length === 0) {
    analysis.push({
      icon: '📝', cls: 'info',
      text: '继续记录更多数据，AI 将为你提供更精准的分析建议。'
    });
  }
  
  container.innerHTML = analysis.map(a => `
    <div class="analysis-item">
      <div class="analysis-icon ${a.cls}">${a.icon}</div>
      <div class="analysis-text">${a.text}</div>
    </div>
  `).join('');
}

function switchPage(page) {
  state.currentPage = page;

  document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
  if (page === 'stats') updateStatsPage();
  if (page === 'achievements') updateAllAchievementsPage();
  if (page === 'profile') { updateProfilePage(); updateBudgetEditList(); }
}

function setRecordType(type) {
  state.recordType = type;
  state.selectedCategory = null;
  document.getElementById('btnExpense').className = 'record-type-btn ' + (type === 'expense' ? 'active expense' : 'expense');
  document.getElementById('btnIncome').className = 'record-type-btn ' + (type === 'income' ? 'active income' : 'income');

  state.selectedCategory = index;
  updateCategoryGrid();
}

function updateAmountUnit() {
  document.getElementById('amountUnit').textContent = RESOURCE_META[state.currentTab].unit;
}

function submitRecord() {
  const amountStr = document.getElementById('amountInput').value;
  if (!amountStr || parseFloat(amountStr) <= 0) {
    showToast('请输入有效的数量');
    return;
  }
  if (state.selectedCategory === null) {
    showToast('请选择一个分类');
    return;
  }
  
  const cats = CATEGORIES[state.currentTab]?.[state.recordType] || [];
  const cat = cats[state.selectedCategory];
  if (!cat) return;
  
  const amount = parseFloat(amountStr);
  const timeInput = document.getElementById('recordTime').value;
  const location = document.getElementById('recordLocation').value.trim();
  const recordTime = timeInput ? new Date(timeInput) : new Date();
  
  const record = {
    id: state.nextId++,
    resourceType: state.currentTab,
    type: state.recordType,
    category: cat.name,
    icon: cat.icon,
    color: cat.color,
    amount: amount,
    unit: RESOURCE_META[state.currentTab].unit,
    location: location,
    time: recordTime
  };
  
  state.records.unshift(record);
  updateBudgetUsed();
  const newUnlock = checkAchievements();
  updateAllUI();
  
  document.getElementById('amountInput').value = '';
  document.getElementById('recordLocation').value = '';
  setDefaultRecordTime();
  state.selectedCategory = null;
  updateCategoryGrid();
  
  showToast('✅ 记账成功！' + (newUnlock ? '' : ''));
  animateNewRecord();
}

function animateNewRecord() {
  const recordList = document.getElementById('recordList');
  if (recordList.firstElementChild) {
    recordList.firstElementChild.classList.add('animate-slide');
  }
}

let isRecording = false;
function toggleVoiceInput() {
  const btn = document.getElementById('voiceBtn');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  
  if (!SpeechRecognition) {
    showToast('您的浏览器不支持语音识别');
    return;
  }
  
  if (isRecording) {
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    showToast('语音识别已停止');
    return;
  }
  
  isRecording = true;
  btn.classList.add('recording');
  btn.textContent = '🔴';
  showToast('请说出金额数字...');
  
  const recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  
  recognition.onresult = function(event) {
    const transcript = event.results[0][0].transcript;
    // 提取中文数字和阿拉伯数字
    const numberMap = {
      '零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,
      '十':10,'百':100,'千':1000,'万':10000,
      '两':2,'俩':2,'点':'.','块':'','元':'','毛':'','角':'','分':'',
      '小时':'','小时':'','个':'','次':'','点':'','份':''
    };
    
    let numStr = '';
    // 先尝试提取数字
    const digitMatch = transcript.match(/[\d.]+/);
    if (digitMatch) {
      numStr = digitMatch[0];
    } else {
      // 尝试中文数字转换
      let temp = transcript;
      Object.keys(numberMap).forEach(k => {
        temp = temp.replace(new RegExp(k, 'g'), numberMap[k]);
      });
      numStr = temp.replace(/[^\d.]/g, '');
    }
    
    if (numStr && parseFloat(numStr) > 0) {
      document.getElementById('amountInput').value = numStr;
      showToast('✅ 识别到金额: ' + numStr);
    } else {
      showToast('未识别到数字，请重试');
    }
    
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
  };
  
  recognition.onerror = function() {
    showToast('语音识别失败，请重试');
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
  };
  
  recognition.onend = function() {
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
  };
  
  recognition.start();
}

function getContinuousDays() {
  const dates = [...new Set(state.records.map(r => {
    const d = new Date(r.time);
    return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  }))].sort().reverse();
  let continuous = 0;
  const today = new Date();
  const todayStr = today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();
  if (dates[0] === todayStr) {
    continuous = 1;
    for (let i = 1; i < dates.length; i++) {
      const expected = new Date(today - 86400000 * i);
      if (dates[i] === expected.getFullYear()+'-'+(expected.getMonth()+1)+'-'+expected.getDate()) {
        continuous++;
      } else break;
    }
  }
  return continuous;
}

function formatTime(date) {
  const d = new Date(date);
  const now = new Date();
  const diff = now - d;
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
  if (diff < 172800000) return '昨天';
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}

  updateBudgetList();
}

function updateBudgetPeriod(resourceType, period) {
  const b = state.budgets.find(b => b.resourceType === resourceType);
  if (b) b.period = period;
  updateBudgetUsed();
  updateBudgetList();
  updateBudgetEditList();
}

function saveBudgets() {
  state.budgets.forEach(b => {
    const input = document.getElementById('budget_' + b.resourceType);
    if (input && input.value) {
      b.limit = Math.max(1, parseInt(input.value) || 0);
    }
  });
  updateBudgetUsed();
  updateBudgetList();
  updateBudgetEditList();
  localStorage.setItem('xiushenji_budgets', JSON.stringify(state.budgets.map(b => ({

function setDefaultRecordTime() {
  const now = new Date();
  const offset = now.getTimezoneOffset();
  const local = new Date(now.getTime() - offset * 60000);
  document.getElementById('recordTime').value = local.toISOString().slice(0, 16);
}

// ============ 主题 ============
function setTheme(theme) {
  state.theme = theme;
  state.darkMode = theme === 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-option').forEach((el, i) => {
    const themes = ['default','warm','bamboo','dark','ocean'];
    el.classList.toggle('selected', themes[i] === theme);
  });
  localStorage.setItem('xiushenji_theme', theme);
}

function toggleDarkMode() {
  if (state.darkMode) {
    setTheme(state.theme === 'dark' ? 'default' : state.theme);
  } else {
    setTheme('dark');
  }
}

function openThemeModal() {
  document.getElementById('themeModal').classList.add('show');
  document.querySelectorAll('.theme-option').forEach((el, i) => {
    const themes = ['default','warm','bamboo','dark'];
    el.classList.toggle('selected', themes[i] === state.theme);
  });
}

function closeThemeModal() {
  document.getElementById('themeModal').classList.remove('show');
}

// ============ Toast ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ============ 初始化 ============
function init() {
  // 恢复主题
  const savedTheme = localStorage.getItem('xiushenji_theme') || 'default';
  setTheme(savedTheme);
  
  // 恢复额度设置
  const savedBudgets = localStorage.getItem('xiushenji_budgets');
  if (savedBudgets) {
    try {
      const parsed = JSON.parse(savedBudgets);
      parsed.forEach(pb => {
        const b = state.budgets.find(b => b.resourceType === pb.resourceType);
        if (b) {
          b.limit = pb.limit;
          if (pb.enabled !== undefined) b.enabled = pb.enabled;
          if (pb.period) b.period = pb.period;
        }
      });
    } catch(e) {}
  }
  
  // 初始化数据
  initDemoData();
  updateCategoryGrid();
  updateAmountUnit();
  setDefaultRecordTime();
  loadPushSettings();
  
  // 关闭弹窗点击遮罩
  document.getElementById('themeModal').addEventListener('click', function(e) {
    if (e.target === this) closeThemeModal();
  });
}

// 启动
document.addEventListener('DOMContentLoaded', init);
</script>
