<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>像素素材查看器</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: monospace; padding: 20px; }
        h2 { color: #ffcc00; }
        .tileset { display: inline-block; image-rendering: pixelated; image-rendering: crisp-edges; border: 2px solid #444; }
        .info { color: #888; font-size: 12px; margin: 5px 0; }
        canvas { border: 1px solid #333; }
    </style>
</head>
<body>
    <h2>Indoor Tileset (112x192, 16x16 瓦片)</h2>
    <div class="info">7列 x 12行 = 84个瓦片 | 来源: OpenGameArt CC-BY 3.0 (Redshrike)</div>
    <img src="../assets/tilesets/indoor_tileset.png" class="tileset" style="width: 448px; height: 768px;">

    <h2>Extra Tiles (112x64, 16x16 瓦片)</h2>
    <div class="info">7列 x 4行 = 28个瓦片</div>
    <img src="../assets/tilesets/indoor_extra.png" class="tileset" style="width: 448px; height: 256px;">

    <h2>瓦片网格标注</h2>
    <canvas id="grid-canvas" width="448" height="768"></canvas>

    <script>
        const img = new Image();
        img.src = '../assets/tilesets/indoor_tileset.png';
        img.onload = () => {
            const canvas = document.getElementById('grid-canvas');
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(img, 0, 0, 448, 768);

            // 画网格
            ctx.strokeStyle = 'rgba(255, 204, 0, 0.5)';
            ctx.lineWidth = 1;
            const tileSize = 64; // 16 * 4
            for (let x = 0; x <= 448; x += tileSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, 768);
                ctx.stroke();
            }
            for (let y = 0; y <= 768; y += tileSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(448, y);
                ctx.stroke();
            }

            // 标注瓦片编号
            ctx.fillStyle = 'rgba(255, 204, 0, 0.8)';
            ctx.font = '10px monospace';
            for (let row = 0; row < 12; row++) {
                for (let col = 0; col < 7; col++) {
                    const id = row * 7 + col;
                    ctx.fillText(`${col},${row}`, col * tileSize + 2, row * tileSize + 10);
                }
            }
        };
    </script>
</body>
</html>
