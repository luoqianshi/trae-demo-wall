<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一关 · 海上世界 → 南海意馆咖啡</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
    --nes-black:#0D0D0D; --nes-dark:#1A1A2E; --nes-gray:#4A4A6A;
    --nes-white:#F8F8F8; --nes-yellow:#FFD700; --nes-red:#E74C3C;
    --nes-green:#2ECC71; --nes-cyan:#00D2D3;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: var(--nes-black);
    font-family: 'Press Start 2P', 'Courier New', monospace;
    color: var(--nes-white);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
.top-bar {
    background: var(--nes-dark);
    border-bottom: 3px solid var(--nes-gray);
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    flex-shrink: 0;
    z-index: 50;
}
.top-bar .stage-info { color: var(--nes-yellow); }
.top-bar .progress-info { color: var(--nes-green); }

.map-section {
    flex: 3;
    position: relative;
    overflow: hidden;
    background: var(--nes-dark);
    min-height: 0;
}
#mapCanvas { display:block; width:100%; height:100%; }
.map-overlay {
    position: absolute; top:10px; right:10px;
    background: rgba(13,13,13,0.85);
    border: 2px solid var(--nes-white);
    padding: 6px 12px; font-size: 10px;
    color: var(--nes-yellow); z-index: 10;
}
.divider {
    height: 4px;
    background: repeating-linear-gradient(90deg,
        var(--nes-yellow) 0, var(--nes-yellow) 8px,
        var(--nes-black) 8px, var(--nes-black) 16px);
    flex-shrink: 0; z-index: 50;
}
.game-section {
    flex: 2;
    position: relative;
    overflow: hidden;
    background: #1a0f0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
}
#gameCanvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 3px solid #444;
    box-shadow: 0 0 20px rgba(255,204,0,0.2);
}
.scanlines {
    position: fixed; top:0; left:0;
    width:100%; height:100%;
    background: repeating-linear-gradient(0deg,
        rgba(0,0,0,0.12) 0, rgba(0,0,0,0.12) 1px,
        transparent 1px, transparent 3px);
    pointer-events: none; z-index: 999;
}
.controls {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    display: flex; gap: 10px;
}
.btn {
    background: var(--nes-red); color: var(--nes-white);
    border: 3px solid var(--nes-white);
    padding: 10px 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px; cursor: pointer;
    box-shadow: 4px 4px 0 var(--nes-black);
    transition: transform 0.1s;
}
.btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--nes-black); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn.green { background: var(--nes-green); }
.btn.yellow { background: var(--nes-yellow); color: var(--nes-black); }
.loading {
    position: fixed; top:50%; left:50%;
    transform: translate(-50%,-50%);
    color: var(--nes-yellow); font-size: 14px; z-index: 1000;
}
</style>
</head>
<body>

<div class="top-bar">
    <span class="stage-info" id="stageInfo">STAGE 1/5: 海上世界 → 南海意馆咖啡</span>
    <span class="progress-info" id="progressInfo">就绪 — 点击出发开始</span>
</div>

<div class="map-section">
    <canvas id="mapCanvas"></canvas>
    <div class="map-overlay" id="mapOverlay">📍 深圳南山 | zoom 15</div>
</div>

<div class="divider"></div>

<div class="game-section">
    <canvas id="gameCanvas" width="480" height="270"></canvas>
</div>

<div class="controls">
    <button class="btn" id="startBtn">▶ 出发</button>
</div>

<div class="scanlines"></div>
<div class="loading" id="loading">加载地图数据中...</div>

// ==========================================
// 纹理生成工具

function makeTex(w, h, drawFn) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const g = c.getContext('2d');
    g.imageSmoothingEnabled = false;
    drawFn(g);
    return c;
}

// ==========================================
// 玩家精灵（俯视 4方向 × 2帧）
// ==========================================
function drawPlayerFrame(g, dir, frame) {
    const x=0, y=0, step=frame;
    g.fillStyle='rgba(0,0,0,0.35)'; g.fillRect(x+3,y+14,10,2);
    if (dir===0) {
        g.fillStyle=PAL.hair; g.fillRect(x+4,y+1,8,3); g.fillRect(x+3,y+2,10,2);
        g.fillStyle=PAL.skin; g.fillRect(x+4,y+3,8,5);
        g.fillStyle=PAL.skinDk; g.fillRect(x+4,y+7,8,1);
        g.fillStyle=PAL.black; g.fillRect(x+6,y+5,1,2); g.fillRect(x+9,y+5,1,2);
        g.fillStyle=PAL.shirt; g.fillRect(x+3,y+8,10,5);
        g.fillStyle=PAL.shirtLt; g.fillRect(x+4,y+8,8,1);
        g.fillStyle=PAL.shirtDk; g.fillRect(x+3,y+12,10,1);
        g.fillStyle=PAL.skin; g.fillRect(x+1,y+9+(step?1:0),2,4); g.fillRect(x+13,y+9-(step?1:0),2,4);
        g.fillStyle=PAL.pants; g.fillRect(x+4,y+13,3,2+(step?0:1)); g.fillRect(x+9,y+13,3,2+(step?1:0));
        g.fillStyle=PAL.shoe; g.fillRect(x+4,y+15,3,1); g.fillRect(x+9,y+15,3,1);
    } else if (dir===1) {
        g.fillStyle=PAL.hair; g.fillRect(x+4,y+1,8,5); g.fillRect(x+3,y+2,10,3);
        g.fillStyle=PAL.skin; g.fillRect(x+4,y+6,8,2);
        g.fillStyle=PAL.shirt; g.fillRect(x+3,y+8,10,5);
        g.fillStyle=PAL.shirtLt; g.fillRect(x+4,y+8,8,1);
        g.fillStyle=PAL.shirtDk; g.fillRect(x+3,y+12,10,1);
        g.fillStyle=PAL.skin; g.fillRect(x+1,y+9+(step?1:0),2,4); g.fillRect(x+13,y+9-(step?1:0),2,4);
        g.fillStyle=PAL.pants; g.fillRect(x+4,y+13,3,2+(step?0:1)); g.fillRect(x+9,y+13,3,2+(step?1:0));
        g.fillStyle=PAL.shoe; g.fillRect(x+4,y+15,3,1); g.fillRect(x+9,y+15,3,1);
    } else {
        const flip = dir===2;
        g.save();
        if (flip) { g.translate(16,0); g.scale(-1,1); }
        g.fillStyle=PAL.hair; g.fillRect(4,1,8,3); g.fillRect(3,2,10,2);
        g.fillStyle=PAL.skin; g.fillRect(4,3,8,5);
        g.fillStyle=PAL.skinDk; g.fillRect(4,7,8,1);
        g.fillStyle=PAL.black; g.fillRect(9,5,1,2);
        g.fillStyle=PAL.shirt; g.fillRect(3,8,10,5);
        g.fillStyle=PAL.shirtLt; g.fillRect(4,8,8,1);
        g.fillStyle=PAL.shirtDk; g.fillRect(3,12,10,1);
        g.fillStyle=PAL.skin; g.fillRect(1,9+(step?1:0),2,4); g.fillRect(13,9-(step?1:0),2,4);
        g.fillStyle=PAL.pants; g.fillRect(5,13,3,2+(step?1:0)); g.fillRect(9,13,3,2+(step?0:1));
        g.fillStyle=PAL.shoe; g.fillRect(5,15+(step?1:0),3,1); g.fillRect(9,15+(step?0:1),3,1);
        g.restore();
    }
}

const playerTex = [];
for (let dir=0; dir<4; dir++) {
    playerTex[dir] = [];
    for (let f=0; f<2; f++) {
        playerTex[dir][f] = makeTex(16,16, g => drawPlayerFrame(g,dir,f));
    }
}

    g.fillStyle=PAL.white; g.fillRect(11,9,4,4);
    g.fillStyle=PAL.coffee; g.fillRect(12,10,2,1);
    g.fillStyle=PAL.skin; g.fillRect(10,10,1,3);
});

// 建筑（32x48）
function makeBuildingTex(color, winColor) {
    return makeTex(32, 48, g => {
        // 主体
        g.fillStyle = color; g.fillRect(0, 8, 32, 40);
        // 屋顶
        g.fillStyle = PAL.wallDk; g.fillRect(0, 0, 32, 8);
        g.fillStyle = PAL.wallLt; g.fillRect(0, 0, 32, 1);
        // 窗户（2行3列）
        g.fillStyle = winColor;
        for (let row=0; row<3; row++) {
            for (let col=0; col<3; col++) {
                g.fillRect(4+col*9, 14+row*10, 5, 6);
            }
        }
        // 门
        g.fillStyle = PAL.wallDk; g.fillRect(13, 38, 6, 10);
        g.fillStyle = PAL.lamp; g.fillRect(17, 42, 1, 1);
    });
}

    makeBuildingTex(PAL.bldg1, PAL.bldgWindow),
    makeBuildingTex(PAL.bldg2, PAL.bldgWindow2),
    makeBuildingTex(PAL.bldg3, PAL.bldgWindow),
];

    }

function lngLatToPixel(lng, lat) {
    const R = 6378137, ts = 256;
    const res = 2 * Math.PI * R / ts / Math.pow(2, MAP_ZOOM);
    const x = R * lng * Math.PI / 180;
    const y = R * Math.log(Math.tan(Math.PI/4 + lat*Math.PI/360));
    const cx = R * MAP_CENTER_LNG * Math.PI / 180;
    const cy = R * Math.log(Math.tan(Math.PI/4 + MAP_CENTER_LAT*Math.PI/360));
    return { x: (x-cx)/res + MAP_IMG_W/2, y: (cy-y)/res + MAP_IMG_H/2 };
}

function resizeMapCanvas() {
    const rect = mapCanvas.parentElement.getBoundingClientRect();
    mapCanvas.width = rect.width;
    mapCanvas.height = rect.height;
    drawMap();
}
window.addEventListener('resize', resizeMapCanvas);

function drawMap() {
    if (!routeData) return;
    const cw = mapCanvas.width, ch = mapCanvas.height;
    mctx.clearRect(0, 0, cw, ch);

    const route = routeData.routes[0]; // 第一关
    const points = route.points.map(p => lngLatToPixel(p.lng, p.lat));

    let minPx=Infinity, maxPx=-Infinity, minPy=Infinity, maxPy=-Infinity;
    points.forEach(p => {
        if (p.x<minPx) minPx=p.x; if (p.x>maxPx) maxPx=p.x;
        if (p.y<minPy) minPy=p.y; if (p.y>maxPy) maxPy=p.y;
    });
    const padX=(maxPx-minPx)*0.3, padY=(maxPy-minPy)*0.3;
    minPx-=padX; maxPx+=padX; minPy-=padY; maxPy+=padY;
    const routeW=maxPx-minPx, routeH=maxPy-minPy;
    const fillRatio=0.8;
    const scale=Math.min(cw/routeW*fillRatio, ch/routeH*fillRatio);
    const drawW=MAP_IMG_W*scale, drawH=MAP_IMG_H*scale;
    const rcx=(minPx+maxPx)/2, rcy=(minPy+maxPy)/2;
    const offX=cw/2-rcx*scale, offY=ch/2-rcy*scale;

    // 绘制地图底图（若图片未加载则用纯色背景）
    if (mapImgLoaded) {
        mctx.drawImage(mapImg, offX, offY, drawW, drawH);
    } else {
        // fallback: 纯色背景 + 网格
        mctx.fillStyle = '#2d3a4a';
        mctx.fillRect(0, 0, cw, ch);
        mctx.strokeStyle = '#3a4a5a';
        mctx.lineWidth = 1;
        for (let x=0; x<cw; x+=40) { mctx.beginPath(); mctx.moveTo(x,0); mctx.lineTo(x,ch); mctx.stroke(); }
        for (let y=0; y<ch; y+=40) { mctx.beginPath(); mctx.moveTo(0,y); mctx.lineTo(cw,y); mctx.stroke(); }
    }

    const canvasPoints = points.map(p => ({ x: offX+p.x*scale, y: offY+p.y*scale }));

    // 路径发光层
    mctx.strokeStyle = 'rgba(231,76,60,0.3)';
    mctx.lineWidth = 10; mctx.lineCap='round'; mctx.lineJoin='round';
    mctx.beginPath();
    canvasPoints.forEach((p,j) => j===0 ? mctx.moveTo(p.x,p.y) : mctx.lineTo(p.x,p.y));
    mctx.stroke();
    // 主路径
    mctx.strokeStyle = '#E74C3C'; mctx.lineWidth = 4;
    mctx.beginPath();
    canvasPoints.forEach((p,j) => j===0 ? mctx.moveTo(p.x,p.y) : mctx.lineTo(p.x,p.y));
    mctx.stroke();

    // 起点终点
    const sp = routeData.places[0], ep = routeData.places[1];
    const sPos = lngLatToPixel(sp.lng, sp.lat);
    const ePos = lngLatToPixel(ep.lng, ep.lat);
    const sC = { x: offX+sPos.x*scale, y: offY+sPos.y*scale };
    const eC = { x: offX+ePos.x*scale, y: offY+ePos.y*scale };
    drawMapMarker(sC.x, sC.y, '#2ECC71', 'S', sp.name);
    drawMapMarker(eC.x, eC.y, '#FFD700', 'G', ep.name);

    // 移动中标记
    if (flow.phase === 'walking') {
        const idx = Math.floor((flow.progress/100) * (canvasPoints.length-1));
        const pos = canvasPoints[idx];
        if (pos) {
            mctx.strokeStyle = 'rgba(231,76,60,0.6)'; mctx.lineWidth = 2;
            const r = 14 + Math.sin(Date.now()/200)*5;
            mctx.beginPath(); mctx.arc(pos.x, pos.y, r, 0, Math.PI*2); mctx.stroke();
            mctx.fillStyle = '#E74C3C';
            mctx.beginPath(); mctx.arc(pos.x, pos.y, 8, 0, Math.PI*2); mctx.fill();
            mctx.fillStyle = '#F8F8F8';
            mctx.beginPath(); mctx.arc(pos.x, pos.y, 4, 0, Math.PI*2); mctx.fill();
        }
    } else if (flow.phase === 'arrived' || flow.phase === 'coffee' || flow.phase === 'clear') {
        mctx.fillStyle = '#E74C3C';
        mctx.beginPath(); mctx.arc(eC.x, eC.y, 8, 0, Math.PI*2); mctx.fill();
        mctx.fillStyle = '#F8F8F8';
        mctx.beginPath(); mctx.arc(eC.x, eC.y, 4, 0, Math.PI*2); mctx.fill();
    }
}

function drawMapMarker(x, y, color, label, name) {
    const grad = mctx.createRadialGradient(x, y, 0, x, y, 18);
    grad.addColorStop(0, 'rgba(255,215,0,0.3)');
    grad.addColorStop(1, 'rgba(255,215,0,0)');
    mctx.fillStyle = grad;
    mctx.beginPath(); mctx.arc(x, y, 18, 0, Math.PI*2); mctx.fill();
    mctx.fillStyle = color;
    mctx.beginPath(); mctx.arc(x, y, 12, 0, Math.PI*2); mctx.fill();
    mctx.fillStyle = '#F8F8F8';
    mctx.beginPath(); mctx.arc(x, y, 7, 0, Math.PI*2); mctx.fill();
    mctx.fillStyle = '#0D0D0D'; mctx.font = 'bold 11px monospace';
    mctx.textAlign = 'center'; mctx.textBaseline = 'middle';
    mctx.fillText(label, x, y);
    mctx.fillStyle = 'rgba(13,13,13,0.85)';
    mctx.fillRect(x-45, y-32, 90, 18);
    mctx.fillStyle = '#FFD700'; mctx.font = '11px monospace';
    mctx.fillText(name, x, y-23);
}

// 流程状态机
// ==========================================
const flow = {
    phase: 'ready',   // ready / walking / arrived / coffee / clear / done
    progress: 0,      // 行进进度 0-100
    walkTimer: null,
};

function setProgress(text) {
    document.getElementById('progressInfo').textContent = text;
}

function startWalking() {
    if (flow.phase !== 'ready') return;
    flow.phase = 'walking';
    flow.progress = 0;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('startBtn').textContent = '行进中...';
    setProgress('行进中 0%');

    flow.walkTimer = setInterval(() => {
        flow.progress += 2;
        if (flow.progress >= 100) {
            flow.progress = 100;
            arriveAtDestination();
        }
        setProgress('行进中 ' + Math.floor(flow.progress) + '%');
    }, 50);
}

function arriveAtDestination() {
    clearInterval(flow.walkTimer);
    flow.phase = 'arrived';
    setProgress('到达南海意馆！');
    // 短暂停留后播放转场动画
    setTimeout(() => {
        flow.phase = 'transition';
        transitionAnim.t = 0;
        transitionAnim.phase = 0;
        transitionAnim.coffeeInited = false;
    }, 600);
}

// ==========================================
// 转场动画（行进 → 关底）
// ==========================================
const transitionAnim = { t: 0, phase: 0, coffeeInited: false };

function updateTransition(dt) {
    transitionAnim.t += dt;
    const a = transitionAnim;
    // phase 0: 黑条合拢遮住行进场景 (400ms)
    // phase 1: 全黑 + 显示进入文字 (900ms)，中途初始化关底场景
    // phase 2: 黑条展开露出关底场景 (400ms) → 进入 coffee
    if (a.phase === 0 && a.t > 400) {
        a.phase = 1; a.t = 0;
    } else if (a.phase === 1) {
        // 中途初始化关底场景（只执行一次）
        if (a.t > 450 && !a.coffeeInited) {
            CoffeeScene.init();
            a.coffeeInited = true;
        }
        // 到 900ms 进入展开阶段
        if (a.t > 900) {
            a.phase = 2; a.t = 0;
        }
    } else if (a.phase === 2 && a.t > 400) {
        a.phase = 3; a.t = 0;
        flow.phase = 'coffee';
        setProgress('自动前往吧台...');
    }
}

function drawTransition() {
    const a = transitionAnim;
    if (flow.phase !== 'transition') return;
    const coverH = VIEW_H / 2;
    let topBarH = 0, botBarH = 0;

    if (a.phase === 0) {
        // 合拢
        const t = a.t / 400;
        const ease = 1 - Math.pow(1 - t, 3);
        topBarH = coverH * ease;
        botBarH = coverH * ease;
    } else if (a.phase === 1) {
        // 全黑
        topBarH = coverH;
        botBarH = coverH;
    } else if (a.phase === 2) {
        // 展开
        const t = a.t / 400;
        const ease = Math.pow(t, 3);
        topBarH = coverH * (1 - ease);
        botBarH = coverH * (1 - ease);
    }

    gctx.fillStyle = PAL.black;
    gctx.fillRect(0, 0, VIEW_W, topBarH);
    gctx.fillRect(0, VIEW_H - botBarH, VIEW_W, botBarH);

    // phase 1 显示进入文字
    if (a.phase === 1) {
        const flicker = 0.7 + Math.sin(a.t / 100) * 0.3;
        gctx.fillStyle = `rgba(255,204,0,${flicker})`;
        gctx.font = '12px "Press Start 2P", monospace';
        gctx.textAlign = 'center';
        gctx.textBaseline = 'middle';
        gctx.fillText('进入南海意馆咖啡...', VIEW_W / 2, VIEW_H / 2 - 12);
        gctx.fillStyle = PAL.white;
        gctx.font = '8px "Press Start 2P", monospace';
        gctx.fillText('任务: 点一杯「孤独的星球」', VIEW_W / 2, VIEW_H / 2 + 12);
        gctx.textAlign = 'left';
        gctx.textBaseline = 'alphabetic';
    }
}

function onCoffeeComplete() {
    flow.phase = 'clear';
    clearAnim.t = 0;
    clearAnim.phase = 0;
    setProgress('STAGE CLEAR!');
}

const CoffeeScene = {
    player: null,
    phase: 'auto_move',  // auto_move / popup / ordering / done
    steamParticles: [],
    path: [],            // 自动移动路径点
    pathIdx: 0,
    popupBtn: null,      // 弹窗按钮区域
    popupHover: false,
    orderTimer: null,

    init() {
        this.player = {
            x: tx(20), y: ty(14),
            w: 12, h: 8, dir: 0, frame: 0,
            moving: false, animTimer: 0, speed: 0.9, holding: false,
        };
        this.phase = 'auto_move';
        this.steamParticles = [];
        // 自动移动路径：从入口走到柜台前
        this.path = [
            { x: tx(15), y: ty(14) },
            { x: tx(10), y: ty(14) },
            { x: tx(7),  y: ty(13) },
            { x: tx(5),  y: ty(11) }, // 柜台前（咖啡机右下）
        ];
        this.pathIdx = 0;
        this.popupBtn = { x: VIEW_W/2 - 70, y: VIEW_H/2 + 18, w: 140, h: 22 };
        this.popupHover = false;
        if (this.orderTimer) { clearTimeout(this.orderTimer); this.orderTimer = null; }
    },

    update(dt) {
        if (this.phase === 'auto_move') {
            this.updateAutoMove(dt);
        }
        this.updateSteam(dt);
    },

    updateAutoMove(dt) {
        const p = this.player;
        if (this.pathIdx >= this.path.length) {
            // 到达柜台
            this.phase = 'popup';
            p.moving = false;
            p.dir = 2; // 朝左（面对吧台/咖啡机）
            p.frame = 0;
            setProgress('到达吧台 — 请确认点单');
            return;
        }
        const target = this.path[this.pathIdx];
        const dx = target.x - p.x;
        const dy = target.y - p.y;
        const dist = Math.hypot(dx, dy);

        if (dist < p.speed) {
            p.x = target.x; p.y = target.y;
            this.pathIdx++;
        } else {
            p.moving = true;
            // 朝向（优先主轴）
            if (Math.abs(dx) > Math.abs(dy)) {
                p.dir = dx > 0 ? 3 : 2;
            } else {
                p.dir = dy > 0 ? 0 : 1;
            }
            p.x += (dx / dist) * p.speed;
            p.y += (dy / dist) * p.speed;
            // 走路动画
            p.animTimer += dt;
            if (p.animTimer > 140) { p.frame = p.frame ? 0 : 1; p.animTimer = 0; }
        }
    },

    confirmOrder() {
        if (this.phase !== 'popup') return;
        this.phase = 'ordering';
        setProgress('点单中... 正在制作「孤独的星球」');
        this.player.holding = false;
        // 蒸汽粒子
        for (let i = 0; i < 6; i++) {
            this.steamParticles.push({
                x: tx(3) + 16 + (Math.random() - 0.5) * 8,
                y: ty(6) + 8,
                vy: -0.4 - Math.random() * 0.3,
                vx: (Math.random() - 0.5) * 0.2,
                life: 1.0, delay: i * 200,
            });
        }
        this.orderTimer = setTimeout(() => {
            this.player.holding = true;
            setProgress('获得「孤独的星球」！');
            this.orderTimer = setTimeout(() => {
                this.phase = 'done';
                onCoffeeComplete();
            }, 800);
        }, 2500);
    },

    // 鼠标点击弹窗按钮
    handleClick(mx, my) {
        if (this.phase !== 'popup') return false;
        const b = this.popupBtn;
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
            this.confirmOrder();
            return true;
        }
        return false;
    },

    // 鼠标移动检测 hover
    handleMouseMove(mx, my) {
        if (this.phase !== 'popup') { this.popupHover = false; return; }
        const b = this.popupBtn;
        this.popupHover = (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h);
    },

    updateSteam(dt) {
        for (const p of this.steamParticles) {
            if (p.delay > 0) { p.delay -= dt; continue; }
            p.x += p.vx; p.y += p.vy;
            p.life -= dt / 1500;
        }
        this.steamParticles = this.steamParticles.filter(p => p.life > 0);
    },

    render() {
        gctx.fillStyle = '#1a0f0a';
        gctx.fillRect(0, 0, VIEW_W, VIEW_H);
        this.drawBackground();
        this.drawDecorations();
        if (this.phase !== 'ordering' && this.phase !== 'done') this.drawTaskPoint();
        this.drawPlayer();
        this.drawSteam();
        this.drawLighting();
        // 顶部任务提示
        gctx.fillStyle = PAL.white;
        gctx.font = '8px "Press Start 2P", monospace';
        gctx.textAlign = 'center';
        gctx.fillText('STAGE 1 · 南海意馆咖啡', VIEW_W / 2, 16);
        gctx.fillStyle = PAL.lamp;
        gctx.font = '7px "Press Start 2P", monospace';
        gctx.fillText('任务: 点一杯「孤独的星球」', VIEW_W / 2, 28);
        // 自动移动提示
        if (this.phase === 'auto_move') {
            gctx.fillStyle = '#aaa';
            gctx.font = '7px "Press Start 2P", monospace';
            gctx.fillText('自动前往吧台...', VIEW_W / 2, VIEW_H - 14);
        }
        // 弹窗
        if (this.phase === 'popup') this.drawPopup();
        gctx.textAlign = 'left';
    },

    drawBackground() {
        for (let y = 0; y < 6; y++)
            for (let x = 0; x < 30; x++) gctx.drawImage(TEX.wall, tx(x), ty(y));
        for (let y = 6; y < 8; y++)
            for (let x = 0; x < 30; x++) gctx.drawImage(TEX.wallFloor, tx(x), ty(y));
        for (let y = 8; y < 16; y++)
            for (let x = 0; x < 30; x++)
                gctx.drawImage((x + y) % 2 === 0 ? TEX.floorA : TEX.floorB, tx(x), ty(y));
    },

    drawDecorations() {
        for (const d of coffeeDecorations) {
            const t = TEX[d.type];
            if (t) gctx.drawImage(t, d.x, d.y);
        }
    },

    drawTaskPoint() {
        const bob = Math.sin(Date.now() / 300) * 3;
        gctx.drawImage(TEX.star, coffeeTaskPoint.x - 8, coffeeTaskPoint.y - 22 + bob);
    },

    drawPlayer() {
        const p = this.player;
        const tex = p.holding ? playerHoldTex : playerTex[p.dir][p.frame];
        gctx.drawImage(tex, Math.round(p.x - 8), Math.round(p.y - 16));
    },

    drawSteam() {
        for (const p of this.steamParticles) {
            if (p.delay > 0) continue;
            gctx.fillStyle = `rgba(255,255,255,${p.life * 0.6})`;
            gctx.fillRect(Math.round(p.x), Math.round(p.y), 2, 2);
            gctx.fillRect(Math.round(p.x + 2), Math.round(p.y - 2), 1, 1);
        }
    },

    drawLighting() {
        gctx.fillStyle = 'rgba(255,170,68,0.06)';
        gctx.fillRect(0, 0, VIEW_W, VIEW_H);
        const lamps = coffeeDecorations.filter(d => d.type === 'lamp');
        for (const l of lamps) {
            const cx = l.x + 8, cy = l.y + 14;
            const grad = gctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
            grad.addColorStop(0, 'rgba(255,238,136,0.25)');
            grad.addColorStop(1, 'rgba(255,238,136,0)');
            gctx.fillStyle = grad;
            gctx.fillRect(cx - 40, cy - 40, 80, 80);
        }
    },

    drawPopup() {
        // 半透明遮罩
        gctx.fillStyle = 'rgba(0,0,0,0.55)';
        gctx.fillRect(0, 0, VIEW_W, VIEW_H);
        // 弹窗框
        const bx = VIEW_W / 2 - 100, by = VIEW_H / 2 - 45, bw = 200, bh = 90;
        gctx.fillStyle = PAL.black;
        gctx.fillRect(bx, by, bw, bh);
        gctx.strokeStyle = PAL.lamp;
        gctx.lineWidth = 2;
        gctx.strokeRect(bx, by, bw, bh);
        // 标题
        gctx.fillStyle = PAL.lamp;
        gctx.font = '10px "Press Start 2P", monospace';
        gctx.textAlign = 'center';
        gctx.textBaseline = 'alphabetic';
        gctx.fillText('☕ 吧台点单', VIEW_W / 2, by + 18);
        // 任务文字
        gctx.fillStyle = PAL.white;
        gctx.font = '8px "Press Start 2P", monospace';
        gctx.fillText('点一杯「孤独的星球」', VIEW_W / 2, by + 36);
        gctx.fillStyle = '#aaa';
        gctx.font = '7px "Press Start 2P", monospace';
        gctx.fillText('¥45 · 1h · HP -20', VIEW_W / 2, by + 50);
        // 确认按钮
        const btn = this.popupBtn;
        gctx.fillStyle = this.popupHover ? PAL.shirtLt : PAL.shirt;
        gctx.fillRect(btn.x, btn.y, btn.w, btn.h);
        gctx.strokeStyle = PAL.white;
        gctx.lineWidth = 2;
        gctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
        gctx.fillStyle = PAL.white;
        gctx.font = '9px "Press Start 2P", monospace';
        gctx.textBaseline = 'middle';
        gctx.fillText('✓ 确认点单 (Space)', btn.x + btn.w / 2, btn.y + btn.h / 2);
        gctx.textBaseline = 'alphabetic';
    }
};

// ==========================================
// STAGE CLEAR 动画
// ==========================================
const clearAnim = { t: 0, phase: 0 };

function updateClearAnim(dt) {
    clearAnim.t += dt;
    const a = clearAnim;
    if (a.phase===0 && a.t>200) { a.phase=1; a.t=0; }
    else if (a.phase===1 && a.t>400) { a.phase=2; a.t=0; }
    else if (a.phase===2 && a.t>600) { a.phase=3; a.t=0; flow.phase='done'; }
}

function drawClearOverlay() {
    if (flow.phase !== 'clear' && flow.phase !== 'done') return;
    const a = clearAnim;
    // 闪白
    if (a.phase === 0) {
        gctx.fillStyle = `rgba(255,255,255,${1-a.t/200})`;
        gctx.fillRect(0, 0, VIEW_W, VIEW_H);
    }
    // 黑边
    if (a.phase >= 1) {
        const t = a.phase===1 ? a.t/400 : 1;
        const ease = 1 - Math.pow(1-t, 3);
        const barH = VIEW_H/2 * ease;
        gctx.fillStyle = PAL.black;
        gctx.fillRect(0, 0, VIEW_W, barH);
        gctx.fillRect(0, VIEW_H-barH, VIEW_W, barH);
    }
    // STAGE CLEAR 文字
    if (a.phase >= 2) {
        const t = a.phase===2 ? a.t/600 : 1;
        const scale = 1 + Math.sin(t*Math.PI)*0.3;
        gctx.save();
        gctx.translate(VIEW_W/2, VIEW_H/2 - 20);
        gctx.scale(scale, scale);
        gctx.fillStyle = PAL.lamp;
        gctx.font = 'bold 24px "Press Start 2P", monospace';
        gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
        gctx.strokeStyle = PAL.black; gctx.lineWidth = 4;
        gctx.strokeText('STAGE CLEAR', 0, 0);
        gctx.fillText('STAGE CLEAR', 0, 0);
        gctx.restore();
    }
    // 任务回顾
    if (a.phase === 3) {
        gctx.fillStyle = PAL.white;
        gctx.font = '10px "Press Start 2P", monospace';
        gctx.textAlign = 'center';
        gctx.fillText('任务: 点一杯「孤独的星球」 ✓', VIEW_W/2, VIEW_H/2+20);
        gctx.fillStyle = PAL.lampGlow;
        gctx.font = '9px "Press Start 2P", monospace';
        gctx.fillText('消耗 ¥45 · 时长 1h · HP -20', VIEW_W/2, VIEW_H/2+40);
        if (Math.floor(Date.now()/500)%2 === 0) {
            gctx.fillStyle = '#888';
            gctx.font = '8px "Press Start 2P", monospace';
            gctx.fillText('第一关完成！', VIEW_W/2, VIEW_H/2+70);
        }
    }
}

// ==========================================
// 输入处理
// ==========================================
// Space 确认点单
window.addEventListener('keydown', e => {
    if (flow.phase === 'coffee' && e.key === ' ' && CoffeeScene.phase === 'popup') {
        CoffeeScene.confirmOrder();
        e.preventDefault();
    }
});

// 鼠标点击弹窗按钮（需把屏幕坐标转换为 canvas 内部坐标）
gameCanvas.addEventListener('click', e => {
    if (flow.phase !== 'coffee') return;
    const rect = gameCanvas.getBoundingClientRect();
    const sx = (e.clientX - rect.left) / rect.width * VIEW_W;
    const sy = (e.clientY - rect.top) / rect.height * VIEW_H;
    CoffeeScene.handleClick(sx, sy);
});
gameCanvas.addEventListener('mousemove', e => {
    if (flow.phase !== 'coffee') return;
    const rect = gameCanvas.getBoundingClientRect();
    const sx = (e.clientX - rect.left) / rect.width * VIEW_W;
    const sy = (e.clientY - rect.top) / rect.height * VIEW_H;
    CoffeeScene.handleMouseMove(sx, sy);
    gameCanvas.style.cursor = CoffeeScene.popupHover ? 'pointer' : 'default';
});

document.getElementById('startBtn').addEventListener('click', startWalking);

// ==========================================
// 主循环
// ==========================================
let lastTime = 0;
function gameLoop(now) {
    const dt = Math.min(now - lastTime, 50);
    lastTime = now;

    // 更新
    if (flow.phase === 'walking' || flow.phase === 'ready') {
        WalkScene.update(dt);
    } else if (flow.phase === 'transition') {
        updateTransition(dt);
    } else if (flow.phase === 'coffee') {
        CoffeeScene.update(dt);
    } else if (flow.phase === 'clear') {
        updateClearAnim(dt);
    }

    // 渲染游戏场景
    if (flow.phase === 'ready' || flow.phase === 'walking' || flow.phase === 'arrived') {
        WalkScene.render();
    } else if (flow.phase === 'transition') {
        // 转场前半段渲染行进场景，后半段渲染关底场景
        if (transitionAnim.phase <= 1) WalkScene.render();
        else CoffeeScene.render();
        drawTransition();
    } else if (flow.phase === 'coffee') {
        CoffeeScene.render();
    } else if (flow.phase === 'clear' || flow.phase === 'done') {
        CoffeeScene.render();
        drawClearOverlay();
    }

    // 刷新地图（移动标记动画）
    if (flow.phase === 'walking' || flow.phase === 'arrived' || flow.phase === 'transition') {
        drawMap();
    }

    requestAnimationFrame(gameLoop);
}

// ==========================================
// 启动
// ==========================================
function fitGameCanvas() {
    const section = gameCanvas.parentElement;
    const rect = section.getBoundingClientRect();
    const scale = Math.min(rect.width / VIEW_W, rect.height / VIEW_H);
    gameCanvas.style.width = (VIEW_W * scale) + 'px';
    gameCanvas.style.height = (VIEW_H * scale) + 'px';
}
window.addEventListener('resize', fitGameCanvas);

resizeMapCanvas();
fitGameCanvas();
requestAnimationFrame(gameLoop);
</script>
