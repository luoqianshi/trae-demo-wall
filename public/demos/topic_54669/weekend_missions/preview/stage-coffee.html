<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关底场景 · 南海意馆咖啡 - FC 像素风</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --nes-black: #0F0F0F;
            --nes-dark: #1A1A2E;
            --nes-gray: #2D2D3F;
            --nes-white: #FCFCFC;
            --nes-yellow: #F1C40F;
            --nes-red: #E74C3C;
            --nes-green: #27AE60;
            --nes-cyan: #00D2D3;
        }
        body {
            background: #0a0a0a;
            color: var(--nes-white);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            overflow: hidden;
        }
        h1 {
            color: var(--nes-yellow);
            font-size: 14px;
            margin-bottom: 6px;
            text-shadow: 2px 2px 0 #cc6600;
            letter-spacing: 1px;
        }
        .info { color: #888; font-size: 9px; margin-bottom: 10px; }

        /* HUD 顶部状态条 */
        #hud {
            width: 1440px;
            max-width: 100%;
            background: var(--nes-dark);
            border: 4px solid;
            border-color: var(--nes-white) var(--nes-gray) var(--nes-gray) var(--nes-white);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 10px;
            flex-wrap: wrap;
        }
        .hud-label { color: var(--nes-white); }
        .bar-wrap {
            display: inline-block;
            width: 100px;
            height: 14px;
            background: var(--nes-black);
            border: 2px solid;
            border-color: var(--nes-gray) var(--nes-white) var(--nes-white) var(--nes-gray);
            vertical-align: middle;
        }
        .bar-fill { height: 100%; transition: width 0.3s step-end; }
        #hp-fill { background: var(--nes-green); }
        #coin-fill { background: var(--nes-yellow); }
        #stage-name { color: var(--nes-cyan); margin-left: auto; }

        /* 游戏画布 */
        #game-wrap {
            position: relative;
            margin-top: 10px;
            border: 4px solid #444;
            box-shadow: 0 0 24px rgba(255, 204, 0, 0.25);
        }
        #game {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #1a0f0a;
        }
        /* CRT 扫描线 */
        #game-wrap::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.18) 3px,
                rgba(0, 0, 0, 0.18) 4px
            );
            z-index: 10;
        }

        /* 底部提示 */
        #status-bar {
            margin-top: 10px;
            padding: 8px 14px;
            background: var(--nes-dark);
            border: 2px solid var(--nes-gray);
            font-size: 10px;
            color: var(--nes-cyan);
            min-height: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        #status-bar kbd {
            display: inline-block;
            padding: 2px 6px;
            background: var(--nes-gray);
            border: 1px solid var(--nes-white);
            color: var(--nes-yellow);
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            margin: 0 2px;
        }
        #status-text { flex: 1; }
        #task-hint { color: var(--nes-yellow); animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <h1>STAGE 2 · 南海意馆咖啡店</h1>
    <div class="info">FC 像素风关底场景 | 纯 Canvas 2D 绘制 | 到达终点后触发打卡任务</div>

    <div id="hud">
        <span class="hud-label">HP</span>
        <span class="bar-wrap"><span id="hp-fill" class="bar-fill" style="width:80%"></span></span>
        <span id="hp-text">80%</span>
        <span class="hud-label">💰</span>
        <span class="bar-wrap"><span id="coin-fill" class="bar-fill" style="width:22%"></span></span>
        <span id="coin-text">¥45/200</span>
        <span id="stage-name">STAGE 2 / 5</span>
    </div>

    <div id="game-wrap">
        <canvas id="game" width="480" height="270"></canvas>
    </div>

    <div id="status-bar">
        <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / 方向键 移动</span>
        <span><kbd>Space</kbd> 点单打卡</span>
        <span><kbd>Enter</kbd> 重玩</span>
        <span id="status-text">探索中 — 走向吧台点单</span>
        <span id="task-hint" style="display:none">▲ 按 Space 点单 ▲</span>
    </div>

<script>
'use strict';

// ==========================================
// 配置
// ==========================================
const VIEW_W = 480;       // 视口宽（30 瓦片 × 16）
const VIEW_H = 270;       // 视口高（约 17 瓦片）
const TILE = 16;          // 瓦片尺寸
const MAP_W = 30;         // 地图宽（瓦片数）
const MAP_H = 17;         // 地图高
const SCALE = 3;          // 显示放大倍数（CSS 控制）

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ==========================================
// NES 调色板
// ==========================================
const PAL = {
    // 地板 - 木地板
    floor:    '#8b5a2b',
    floorDk:  '#6b4423',
    floorLt:  '#ab7a4b',
    floorLine:'#4a2f1a',
    // 墙面 - 暖棕砖墙
    wall:     '#6b4423',
    wallDk:   '#4a2f1a',
    wallLt:   '#8b5a2b',
    // 吧台 - 深棕木
    bar:      '#4a2f1a',
    barDk:    '#2a180a',
    barLt:    '#6b4423',
    barTop:   '#3a2010',
    // 咖啡机
    machine:    '#2a2a2a',
    machineDk:  '#0a0a0a',
    machineLt:  '#5a5a5a',
    machineBtn: '#cc3333',
    coffee:     '#4a2810',
    // 桌椅
    table:    '#6b4423',
    tableDk:  '#3a2010',
    tableLt:  '#8b5a2b',
    chair:    '#5a3a1a',
    chairDk:  '#3a2010',
    // 吊灯
    lamp:      '#ffcc00',
    lampDk:    '#cc6600',
    lampGlow:  '#ffee88',
    // 菜单板
    boardFrame:'#2a180a',
    boardBg:   '#f5f5dc',
    boardText: '#2a180a',
    // 窗户
    windowSky:   '#6cb4e8',
    windowSkyLt: '#9ad4f0',
    windowFrame: '#4a2f1a',
    // 绿植
    plant:   '#2d5016',
    plantLt: '#4a7c3a',
    pot:     '#8b5a2b',
    potDk:   '#6b4423',
    // 玩家
    skin:    '#ffd5b5',
    skinDk:  '#e8b890',
    shirt:   '#cc3333',
    shirtDk: '#992222',
    shirtLt: '#ff5555',
    pants:   '#3333cc',
    pantsDk: '#222288',
    hair:    '#4a2810',
    shoe:    '#222222',
    // 通用
    black: '#000000',
    white: '#ffffff',
    star:  '#ffdd44',
    starLt:'#ffff88',
};

// ==========================================
// 纹理生成（离屏 Canvas）
// ==========================================
function makeTex(w, h, drawFn) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const g = c.getContext('2d');
    g.imageSmoothingEnabled = false;
    drawFn(g);
    return c;
}

const TEX = {
    // 木地板 A
    floorA: makeTex(16, 16, g => {
        g.fillStyle = PAL.floor;    g.fillRect(0, 0, 16, 16);
        g.fillStyle = PAL.floorDk;  g.fillRect(0, 5, 16, 1); g.fillRect(0, 11, 16, 1);
        g.fillStyle = PAL.floorLt;  g.fillRect(0, 0, 16, 1); g.fillRect(0, 6, 16, 1); g.fillRect(0, 12, 16, 1);
        g.fillStyle = PAL.floorDk;
        g.fillRect(7, 1, 1, 4); g.fillRect(3, 7, 1, 4); g.fillRect(11, 13, 1, 3);
    }),
    // 木地板 B（亮色变体）
    floorB: makeTex(16, 16, g => {
        g.fillStyle = PAL.floorLt;  g.fillRect(0, 0, 16, 16);
        g.fillStyle = PAL.floor;    g.fillRect(0, 5, 16, 1); g.fillRect(0, 11, 16, 1);
        g.fillStyle = PAL.floorDk;
        g.fillRect(5, 1, 1, 4); g.fillRect(9, 7, 1, 4);
        g.fillRect(0, 6, 16, 1); g.fillRect(0, 12, 16, 1);
    }),
    // 墙地交界
    wallFloor: makeTex(16, 16, g => {
        g.fillStyle = PAL.wallDk; g.fillRect(0, 0, 16, 6);
        g.fillStyle = PAL.wallLt; g.fillRect(0, 0, 16, 1);
        // 下半地板
        g.fillStyle = PAL.floor;    g.fillRect(0, 6, 16, 10);
        g.fillStyle = PAL.floorDk;  g.fillRect(0, 11, 16, 1);
        g.fillStyle = PAL.floorLt;  g.fillRect(0, 6, 16, 1); g.fillRect(0, 12, 16, 1);
    }),
    // 墙面（砖纹）
    wall: makeTex(16, 16, g => {
        g.fillStyle = PAL.wall;    g.fillRect(0, 0, 16, 16);
        g.fillStyle = PAL.wallDk;
        g.fillRect(0, 3, 16, 1); g.fillRect(0, 7, 16, 1); g.fillRect(0, 11, 16, 1); g.fillRect(0, 15, 16, 1);
        g.fillRect(7, 0, 1, 4); g.fillRect(3, 4, 1, 4); g.fillRect(11, 8, 1, 4); g.fillRect(7, 12, 1, 4);
        g.fillStyle = PAL.wallLt;  g.fillRect(0, 0, 16, 1);
    }),
    // 吧台台面（32x16）
    bar: makeTex(32, 16, g => {
        g.fillStyle = PAL.bar;    g.fillRect(0, 0, 32, 16);
        g.fillStyle = PAL.barTop; g.fillRect(0, 0, 32, 2);
        g.fillStyle = PAL.barLt;  g.fillRect(0, 2, 32, 1);
        g.fillStyle = PAL.barDk;  g.fillRect(0, 14, 32, 2);
        g.fillStyle = PAL.barDk;
        g.fillRect(5, 5, 1, 8); g.fillRect(15, 5, 1, 8); g.fillRect(25, 5, 1, 8);
    }),
    // 咖啡机（32x32）
    machine: makeTex(32, 32, g => {
        // 主体
        g.fillStyle = PAL.machine;   g.fillRect(2, 6, 28, 24);
        g.fillStyle = PAL.machineDk; g.fillRect(0, 2, 32, 6);
        g.fillStyle = PAL.machineLt;
        g.fillRect(2, 6, 1, 24); g.fillRect(29, 6, 1, 24); g.fillRect(2, 6, 28, 1);
        // 显示屏
        g.fillStyle = PAL.black;     g.fillRect(6, 10, 8, 4);
        g.fillStyle = '#44ff44';
        g.fillRect(7, 11, 1, 2); g.fillRect(9, 11, 1, 2); g.fillRect(11, 11, 1, 2);
        // 按钮
        g.fillStyle = PAL.machineBtn; g.fillRect(18, 10, 3, 3);
        g.fillStyle = PAL.lamp;       g.fillRect(23, 10, 3, 3);
        // 咖啡出口
        g.fillStyle = PAL.machineDk; g.fillRect(12, 18, 8, 6);
        g.fillStyle = PAL.machineLt; g.fillRect(12, 18, 8, 1);
        // 咖啡杯
        g.fillStyle = PAL.white;  g.fillRect(14, 24, 4, 4);
        g.fillStyle = PAL.coffee; g.fillRect(14, 24, 4, 1);
    }),
    // 圆桌（24x16）
    table: makeTex(24, 16, g => {
        g.fillStyle = PAL.table;    g.fillRect(0, 0, 24, 8);
        g.fillStyle = PAL.tableLt;  g.fillRect(0, 0, 24, 2);
        g.fillStyle = PAL.tableDk;  g.fillRect(0, 6, 24, 2);
        g.fillStyle = PAL.tableDk;  g.fillRect(4, 8, 2, 6); g.fillRect(18, 8, 2, 6);
        // 桌上咖啡杯
        g.fillStyle = PAL.white;  g.fillRect(10, 2, 4, 3);
        g.fillStyle = PAL.coffee; g.fillRect(11, 3, 2, 1);
    }),
    // 椅子（16x16）
    chair: makeTex(16, 16, g => {
        g.fillStyle = PAL.chair;    g.fillRect(0, 0, 16, 14);
        g.fillStyle = PAL.chairDk;  g.fillRect(0, 12, 16, 2);
        g.fillStyle = PAL.tableLt;  g.fillRect(0, 0, 16, 1);
        g.fillStyle = PAL.chairDk;
        g.fillRect(2, 0, 1, 4); g.fillRect(13, 0, 1, 4); g.fillRect(2, 0, 12, 1);
    }),
    // 吊灯（16x16）
    lamp: makeTex(16, 16, g => {
        g.fillStyle = '#222222';  g.fillRect(7, 0, 2, 6);
        g.fillStyle = PAL.lampDk; g.fillRect(2, 6, 12, 6);
        g.fillStyle = PAL.lamp;   g.fillRect(3, 7, 10, 4);
        g.fillStyle = PAL.lampGlow;
        g.fillRect(5, 9, 6, 1); g.fillRect(6, 10, 4, 1);
    }),
    // 菜单板（32x24）
    menu: makeTex(32, 24, g => {
        g.fillStyle = PAL.boardFrame; g.fillRect(0, 0, 32, 24);
        g.fillStyle = PAL.boardBg;    g.fillRect(2, 2, 28, 20);
        g.fillStyle = PAL.boardText;
        g.fillRect(6, 4, 2, 1); g.fillRect(9, 4, 2, 1); g.fillRect(12, 4, 2, 1);
        g.fillRect(15, 4, 2, 1); g.fillRect(18, 4, 2, 1);
        g.fillRect(4, 8, 16, 1); g.fillRect(4, 11, 12, 1); g.fillRect(4, 14, 18, 1);
        g.fillStyle = PAL.machineBtn;
        g.fillRect(22, 8, 6, 1); g.fillRect(22, 11, 6, 1); g.fillRect(22, 14, 6, 1);
    }),
    // 窗户（32x24）
    window: makeTex(32, 24, g => {
        g.fillStyle = PAL.windowFrame; g.fillRect(0, 0, 32, 24);
        g.fillStyle = PAL.windowSky;   g.fillRect(2, 2, 28, 20);
        g.fillStyle = PAL.white;
        g.fillRect(5, 5, 8, 3); g.fillRect(7, 4, 4, 1);
        g.fillRect(18, 9, 6, 2); g.fillRect(4, 14, 5, 2); g.fillRect(18, 15, 7, 3);
        g.fillStyle = PAL.windowFrame;
        g.fillRect(15, 2, 2, 20); g.fillRect(2, 11, 28, 2);
    }),
    // 绿植（16x24）
    plant: makeTex(16, 24, g => {
        g.fillStyle = PAL.pot;   g.fillRect(0, 12, 16, 12);
        g.fillStyle = PAL.potDk; g.fillRect(0, 22, 16, 2);
        g.fillStyle = PAL.tableLt; g.fillRect(0, 12, 16, 1);
        g.fillStyle = PAL.plant;
        g.fillRect(2, 6, 4, 6); g.fillRect(6, 2, 4, 10); g.fillRect(10, 6, 4, 6);
        g.fillStyle = PAL.plantLt;
        g.fillRect(3, 7, 2, 4); g.fillRect(7, 3, 2, 8); g.fillRect(11, 7, 2, 4);
    }),
    // 任务点星星（16x12）
    star: makeTex(16, 12, g => {
        g.fillStyle = PAL.star;
        g.fillRect(6, 0, 4, 2); g.fillRect(4, 2, 8, 2); g.fillRect(0, 4, 16, 4);
        g.fillRect(4, 8, 8, 2); g.fillRect(2, 10, 4, 2); g.fillRect(10, 10, 4, 2);
        g.fillStyle = PAL.starLt;
        g.fillRect(7, 1, 2, 1); g.fillRect(6, 4, 4, 2);
    }),
};

// ==========================================
// 玩家精灵（俯视 4方向 × 2帧 = 8帧）
// ==========================================
// 每帧 16x16，绘制函数：drawPlayerFrame(g, dir, frame)
// dir: 0=下 1=上 2=左 3=右
function drawPlayerFrame(g, dir, frame) {
    const x = 0, y = 0;
    const step = frame; // 0=idle, 1=step

    // 阴影
    g.fillStyle = 'rgba(0,0,0,0.35)';
    g.fillRect(x + 3, y + 14, 10, 2);

    if (dir === 0) { // 朝下
        // 头发
        g.fillStyle = PAL.hair;
        g.fillRect(x + 4, y + 1, 8, 3); g.fillRect(x + 3, y + 2, 10, 2);
        // 脸
        g.fillStyle = PAL.skin; g.fillRect(x + 4, y + 3, 8, 5);
        g.fillStyle = PAL.skinDk; g.fillRect(x + 4, y + 7, 8, 1);
        // 眼睛
        g.fillStyle = PAL.black;
        g.fillRect(x + 6, y + 5, 1, 2); g.fillRect(x + 9, y + 5, 1, 2);
        // 身体
        g.fillStyle = PAL.shirt; g.fillRect(x + 3, y + 8, 10, 5);
        g.fillStyle = PAL.shirtLt; g.fillRect(x + 4, y + 8, 8, 1);
        g.fillStyle = PAL.shirtDk; g.fillRect(x + 3, y + 12, 10, 1);
        // 手臂（step 时摆动）
        g.fillStyle = PAL.skin;
        g.fillRect(x + 1, y + 9 + (step ? 1 : 0), 2, 4);
        g.fillRect(x + 13, y + 9 - (step ? 1 : 0), 2, 4);
        // 腿（step 时错位）
        g.fillStyle = PAL.pants;
        g.fillRect(x + 4, y + 13, 3, 2 + (step ? 0 : 1));
        g.fillRect(x + 9, y + 13, 3, 2 + (step ? 1 : 0));
        // 鞋
        g.fillStyle = PAL.shoe;
        g.fillRect(x + 4, y + 15, 3, 1); g.fillRect(x + 9, y + 15, 3, 1);
    } else if (dir === 1) { // 朝上（背影）
        g.fillStyle = PAL.hair;
        g.fillRect(x + 4, y + 1, 8, 5); g.fillRect(x + 3, y + 2, 10, 3);
        g.fillStyle = PAL.skin; g.fillRect(x + 4, y + 6, 8, 2);
        g.fillStyle = PAL.shirt; g.fillRect(x + 3, y + 8, 10, 5);
        g.fillStyle = PAL.shirtLt; g.fillRect(x + 4, y + 8, 8, 1);
        g.fillStyle = PAL.shirtDk; g.fillRect(x + 3, y + 12, 10, 1);
        g.fillStyle = PAL.skin;
        g.fillRect(x + 1, y + 9 + (step ? 1 : 0), 2, 4);
        g.fillRect(x + 13, y + 9 - (step ? 1 : 0), 2, 4);
        g.fillStyle = PAL.pants;
        g.fillRect(x + 4, y + 13, 3, 2 + (step ? 0 : 1));
        g.fillRect(x + 9, y + 13, 3, 2 + (step ? 1 : 0));
        g.fillStyle = PAL.shoe;
        g.fillRect(x + 4, y + 15, 3, 1); g.fillRect(x + 9, y + 15, 3, 1);
    } else { // 朝左/右（侧视）
        const flip = dir === 2; // 左需翻转
        const sx = flip ? -1 : 1;
        g.save();
        if (flip) { g.translate(16, 0); g.scale(-1, 1); }
        // 头发
        g.fillStyle = PAL.hair;
        g.fillRect(4, 1, 8, 3); g.fillRect(3, 2, 10, 2);
        // 脸
        g.fillStyle = PAL.skin; g.fillRect(4, 3, 8, 5);
        g.fillStyle = PAL.skinDk; g.fillRect(4, 7, 8, 1);
        // 眼睛（侧视只露一只）
        g.fillStyle = PAL.black; g.fillRect(9, 5, 1, 2);
        // 身体
        g.fillStyle = PAL.shirt; g.fillRect(3, 8, 10, 5);
        g.fillStyle = PAL.shirtLt; g.fillRect(4, 8, 8, 1);
        g.fillStyle = PAL.shirtDk; g.fillRect(3, 12, 10, 1);
        // 手臂（前后摆动）
        g.fillStyle = PAL.skin;
        g.fillRect(1, 9 + (step ? 1 : 0), 2, 4);
        g.fillRect(13, 9 - (step ? 1 : 0), 2, 4);
        // 腿（前后迈步）
        g.fillStyle = PAL.pants;
        g.fillRect(5, 13, 3, 2 + (step ? 1 : 0));
        g.fillRect(9, 13, 3, 2 + (step ? 0 : 1));
        g.fillStyle = PAL.shoe;
        g.fillRect(5, 15 + (step ? 1 : 0), 3, 1);
        g.fillRect(9, 15 + (step ? 0 : 1), 3, 1);
        g.restore();
    }
}

// 生成玩家纹理：4方向 × 2帧
const playerTex = [];
for (let dir = 0; dir < 4; dir++) {
    playerTex[dir] = [];
    for (let f = 0; f < 2; f++) {
        playerTex[dir][f] = makeTex(16, 16, g => drawPlayerFrame(g, dir, f));
    }
}

// 端杯状态纹理（朝下持杯）
const playerHoldTex = makeTex(16, 16, g => {
    drawPlayerFrame(g, 0, 0);
    // 手持咖啡杯
    g.fillStyle = PAL.white;  g.fillRect(11, 9, 4, 4);
    g.fillStyle = PAL.coffee; g.fillRect(12, 10, 2, 1);
    g.fillStyle = PAL.skin;   g.fillRect(10, 10, 1, 3);
});

// ==========================================
// 场景布局
// ==========================================
// 瓦片坐标 → 像素坐标
const tx = i => i * TILE;
const ty = i => i * TILE;

// 装饰物列表（像素坐标）
const decorations = [
    // 吊灯（顶部）
    { type: 'lamp', x: tx(4),  y: ty(0) },
    { type: 'lamp', x: tx(10), y: ty(0) },
    { type: 'lamp', x: tx(16), y: ty(0) },
    { type: 'lamp', x: tx(22), y: ty(0) },
    { type: 'lamp', x: tx(27), y: ty(0) },
    // 菜单板（左墙）
    { type: 'menu', x: tx(1),  y: ty(2) },
    // 窗户（右墙）
    { type: 'window', x: tx(26), y: ty(2) },
    // 吧台 + 咖啡机（左侧）
    { type: 'bar', x: tx(2),  y: ty(8) },
    { type: 'bar', x: tx(4),  y: ty(8) },
    { type: 'machine', x: tx(3), y: ty(6) },
    // 绿植
    { type: 'plant', x: tx(7),  y: ty(7) },
    { type: 'plant', x: tx(28), y: ty(7) },
    // 圆桌 + 椅子（3 组）
    { type: 'table', x: tx(10), y: ty(10) },
    { type: 'chair', x: tx(9),  y: ty(11) },
    { type: 'chair', x: tx(13), y: ty(11) },
    { type: 'table', x: tx(16), y: ty(10) },
    { type: 'chair', x: tx(15), y: ty(11) },
    { type: 'chair', x: tx(19), y: ty(11) },
    { type: 'table', x: tx(22), y: ty(10) },
    { type: 'chair', x: tx(21), y: ty(11) },
    { type: 'chair', x: tx(25), y: ty(11) },
];

// 碰撞矩形（玩家不能穿过，像素坐标）
const colliders = [
    // 吧台
    { x: tx(2), y: ty(8), w: 64, h: 16 },
    // 咖啡机
    { x: tx(3), y: ty(6), w: 32, h: 32 },
    // 桌椅组1
    { x: tx(9), y: ty(10), w: 40, h: 24 },
    // 桌椅组2
    { x: tx(15), y: ty(10), w: 40, h: 24 },
    // 桌椅组3
    { x: tx(21), y: ty(10), w: 40, h: 24 },
    // 绿植
    { x: tx(7), y: ty(7), w: 16, h: 24 },
    { x: tx(28), y: ty(7), w: 16, h: 24 },
    // 墙体（顶部 6 行 + 底部边界）
    { x: 0, y: 0, w: MAP_W * TILE, h: ty(6) },
    { x: 0, y: ty(16), w: MAP_W * TILE, h: TILE },
];

// 任务点（吧台前）
const taskPoint = { x: tx(4) + 16, y: ty(10) };

// ==========================================
// 玩家状态
// ==========================================
const player = {
    x: tx(15),       // 像素坐标（脚底中心）
    y: ty(14),
    w: 12, h: 8,     // 碰撞盒（脚底）
    dir: 0,          // 0=下 1=上 2=左 3=右
    frame: 0,        // 0=idle 1=step
    moving: false,
    animTimer: 0,
    speed: 1.0,
    holding: false,  // 是否持杯
};

// ==========================================
// 输入
// ==========================================
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();

    if (e.key === 'Enter') restart();

    if (e.key === ' ' && gameState.phase === 'near_task' && !gameState.taskDone) {
        startOrdering();
    }
});
window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
    keys[e.code] = false;
});

// ==========================================
// 游戏状态机
// ==========================================
const gameState = {
    phase: 'explore',     // explore / near_task / ordering / clear / done
    taskDone: false,
    steamParticles: [],
    clearAnim: { t: 0, phase: 0 },
};

function setStatus(text) {
    document.getElementById('status-text').textContent = text;
}
function setTaskHint(visible) {
    document.getElementById('task-hint').style.display = visible ? 'inline' : 'none';
}

// ==========================================
// 碰撞检测
// ==========================================
function canMoveTo(nx, ny) {
    const box = { x: nx - player.w / 2, y: ny - player.h / 2, w: player.w, h: player.h };
    for (const c of colliders) {
        if (box.x < c.x + c.w && box.x + box.w > c.x &&
            box.y < c.y + c.h && box.y + box.h > c.y) {
            return false;
        }
    }
    // 地图边界
    if (box.x < 0 || box.x + box.w > MAP_W * TILE) return false;
    if (box.y < ty(6) || box.y + box.h > ty(16)) return false;
    return true;
}

// ==========================================
// 更新逻辑
// ==========================================
function update(dt) {
    if (gameState.phase === 'ordering' || gameState.phase === 'clear' || gameState.phase === 'done') {
        // 点单/通关阶段锁定移动
        if (gameState.phase === 'clear') updateClearAnim(dt);
        return;
    }

    let dx = 0, dy = 0;
    if (keys['arrowleft'] || keys['a']) { dx = -1; player.dir = 2; }
    else if (keys['arrowright'] || keys['d']) { dx = 1; player.dir = 3; }
    if (keys['arrowup'] || keys['w']) { dy = -1; player.dir = 1; }
    else if (keys['arrowdown'] || keys['s']) { dy = 1; player.dir = 0; }

    player.moving = (dx !== 0 || dy !== 0);

    if (player.moving) {
        // 归一化对角线
        if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
        const nx = player.x + dx * player.speed;
        const ny = player.y + dy * player.speed;
        // 分轴检测
        if (canMoveTo(nx, player.y)) player.x = nx;
        if (canMoveTo(player.x, ny)) player.y = ny;

        // 走路动画
        player.animTimer += dt;
        if (player.animTimer > 140) {
            player.frame = player.frame ? 0 : 1;
            player.animTimer = 0;
        }
    } else {
        player.frame = 0;
    }

    // 任务点检测
    if (!gameState.taskDone) {
        const dist = Math.hypot(player.x - taskPoint.x, player.y - taskPoint.y);
        if (dist < 24) {
            if (gameState.phase !== 'near_task') {
                gameState.phase = 'near_task';
                setStatus('到达吧台 —');
                setTaskHint(true);
            }
        } else {
            if (gameState.phase === 'near_task') {
                gameState.phase = 'explore';
                setStatus('探索中 — 走向吧台点单');
                setTaskHint(false);
            }
        }
    }
}

// ==========================================
// 点单流程
// ==========================================
function startOrdering() {
    gameState.phase = 'ordering';
    setTaskHint(false);
    setStatus('点单中... 正在制作「孤独的星球」');
    player.dir = 0;
    player.holding = false;

    // 蒸汽粒子
    for (let i = 0; i < 6; i++) {
        gameState.steamParticles.push({
            x: tx(3) + 16 + (Math.random() - 0.5) * 8,
            y: ty(6) + 8,
            vy: -0.4 - Math.random() * 0.3,
            vx: (Math.random() - 0.5) * 0.2,
            life: 1.0,
            delay: i * 200,
        });
    }

    // 2.5 秒后完成
    setTimeout(() => {
        player.holding = true;
        setStatus('获得「孤独的星球」！任务完成');
        setTimeout(() => {
            gameState.phase = 'clear';
            gameState.clearAnim = { t: 0, phase: 0 };
        }, 800);
    }, 2500);
}

function updateSteam(dt) {
    for (const p of gameState.steamParticles) {
        if (p.delay > 0) { p.delay -= dt; continue; }
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dt / 1500;
    }
    gameState.steamParticles = gameState.steamParticles.filter(p => p.life > 0);
}

// ==========================================
// STAGE CLEAR 动画
// ==========================================
function updateClearAnim(dt) {
    gameState.clearAnim.t += dt;
    const a = gameState.clearAnim;
    // phase 0: 闪白 (200ms)
    // phase 1: 上下黑边合拢 (400ms)
    // phase 2: STAGE CLEAR 文字弹出 (600ms)
    // phase 3: 任务回顾 (停留)
    if (a.phase === 0 && a.t > 200) { a.phase = 1; a.t = 0; }
    else if (a.phase === 1 && a.t > 400) { a.phase = 2; a.t = 0; }
    else if (a.phase === 2 && a.t > 600) { a.phase = 3; a.t = 0; gameState.phase = 'done'; }
}

function drawClearOverlay() {
    const a = gameState.clearAnim;
    if (gameState.phase !== 'clear' && gameState.phase !== 'done') return;

    // 闪白
    if (a.phase === 0) {
        ctx.fillStyle = `rgba(255,255,255,${1 - a.t / 200})`;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    }

    // 上下黑边
    if (a.phase >= 1) {
        const t = a.phase === 1 ? a.t / 400 : 1;
        const ease = 1 - Math.pow(1 - t, 3);
        const barH = VIEW_H / 2 * ease;
        ctx.fillStyle = PAL.black;
        ctx.fillRect(0, 0, VIEW_W, barH);
        ctx.fillRect(0, VIEW_H - barH, VIEW_W, barH);
    }

    // STAGE CLEAR 文字
    if (a.phase >= 2) {
        const t = a.phase === 2 ? a.t / 600 : 1;
        const scale = 1 + Math.sin(t * Math.PI) * 0.3;
        ctx.save();
        ctx.translate(VIEW_W / 2, VIEW_H / 2 - 20);
        ctx.scale(scale, scale);
        ctx.fillStyle = PAL.lamp;
        ctx.font = 'bold 28px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // 描边
        ctx.strokeStyle = PAL.black;
        ctx.lineWidth = 4;
        ctx.strokeText('STAGE CLEAR', 0, 0);
        ctx.fillText('STAGE CLEAR', 0, 0);
        ctx.restore();
    }

    // 任务回顾
    if (a.phase === 3) {
        ctx.fillStyle = PAL.white;
        ctx.font = '10px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('任务: 点一杯「孤独的星球」 ✓', VIEW_W / 2, VIEW_H / 2 + 20);
        ctx.fillStyle = PAL.lampGlow;
        ctx.font = '9px "Press Start 2P", monospace';
        ctx.fillText('消耗 ¥45 · 时长 1h · HP -20', VIEW_W / 2, VIEW_H / 2 + 40);

        // 闪烁提示
        if (Math.floor(Date.now() / 500) % 2 === 0) {
            ctx.fillStyle = PAL.nes_gray || '#888';
            ctx.font = '8px "Press Start 2P", monospace';
            ctx.fillText('按 [Enter] 重玩', VIEW_W / 2, VIEW_H / 2 + 70);
        }
    }
}

// ==========================================
// 渲染
// ==========================================
function render() {
    // 清屏
    ctx.fillStyle = '#1a0f0a';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    drawBackground();
    drawDecorations();
    drawTaskPoint();
    drawPlayer();
    drawSteam();
    drawLighting();
    drawClearOverlay();
}

function drawBackground() {
    // 墙面（行 0-5）
    for (let y = 0; y < 6; y++) {
        for (let x = 0; x < MAP_W; x++) {
            ctx.drawImage(TEX.wall, tx(x), ty(y));
        }
    }
    // 墙地交界（行 6-7）
    for (let y = 6; y < 8; y++) {
        for (let x = 0; x < MAP_W; x++) {
            ctx.drawImage(TEX.wallFloor, tx(x), ty(y));
        }
    }
    // 地板（行 8-15，交错纹路）
    for (let y = 8; y < 16; y++) {
        for (let x = 0; x < MAP_W; x++) {
            const tex = (x + y) % 2 === 0 ? TEX.floorA : TEX.floorB;
            ctx.drawImage(tex, tx(x), ty(y));
        }
    }
}

function drawDecorations() {
    for (const d of decorations) {
        const tex = TEX[d.type];
        if (tex) ctx.drawImage(tex, d.x, d.y);
    }
}

function drawTaskPoint() {
    if (gameState.taskDone) return;
    // 星星浮动
    const bob = Math.sin(Date.now() / 300) * 3;
    ctx.drawImage(TEX.star, taskPoint.x - 8, taskPoint.y - 22 + bob);
}

function drawPlayer() {
    let tex;
    if (player.holding) {
        tex = playerHoldTex;
    } else {
        tex = playerTex[player.dir][player.frame];
    }
    // 玩家脚底对齐 (x, y)
    ctx.drawImage(tex, Math.round(player.x - 8), Math.round(player.y - 16));
}

function drawSteam() {
    if (gameState.phase !== 'ordering' && gameState.steamParticles.length === 0) return;
    for (const p of gameState.steamParticles) {
        if (p.delay > 0) continue;
        ctx.fillStyle = `rgba(255,255,255,${p.life * 0.6})`;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), 2, 2);
        ctx.fillRect(Math.round(p.x + 2), Math.round(p.y - 2), 1, 1);
    }
}

function drawLighting() {
    // 暖色氛围光
    ctx.fillStyle = 'rgba(255,170,68,0.06)';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    // 吊灯下光圈
    const lamps = decorations.filter(d => d.type === 'lamp');
    for (const l of lamps) {
        const cx = l.x + 8, cy = l.y + 14;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
        grad.addColorStop(0, 'rgba(255,238,136,0.25)');
        grad.addColorStop(1, 'rgba(255,238,136,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(cx - 40, cy - 40, 80, 80);
    }
}

// ==========================================
// 主循环
// ==========================================
let lastTime = 0;
function gameLoop(now) {
    const dt = Math.min(now - lastTime, 50);
    lastTime = now;

    update(dt);
    updateSteam(dt);
    render();

    requestAnimationFrame(gameLoop);
}

// ==========================================
// 重启
// ==========================================
function restart() {
    player.x = tx(15);
    player.y = ty(14);
    player.dir = 0;
    player.frame = 0;
    player.holding = false;
    gameState.phase = 'explore';
    gameState.taskDone = false;
    gameState.steamParticles = [];
    gameState.clearAnim = { t: 0, phase: 0 };
    setStatus('探索中 — 走向吧台点单');
    setTaskHint(false);
}

// ==========================================
// 启动
// ==========================================
// 适配显示尺寸（3x 放大）
function fitCanvas() {
    const maxW = Math.min(window.innerWidth - 40, 1440);
    const scale = maxW / VIEW_W;
    canvas.style.width = (VIEW_W * scale) + 'px';
    canvas.style.height = (VIEW_H * scale) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

requestAnimationFrame(gameLoop);
</script>
</body>
