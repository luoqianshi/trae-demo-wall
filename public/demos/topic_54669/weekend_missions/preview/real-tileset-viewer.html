<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Indoor Tileset 真实瓦片图</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: monospace; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h2 { color: #ffcc00; margin: 20px 0 10px; }
        .row {
            display: flex;
            gap: 2px;
            background: #333;
            padding: 2px;
            margin-bottom: 2px;
        }
        .tile {
            width: 96px;
            height: 96px;
            position: relative;
            background: #2a2a2a;
            border: 1px solid #444;
        }
        .tile canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .tile .label {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0,0,0,0.7);
            color: #ffcc00;
            padding: 1px 4px;
            font-size: 10px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Indoor Tileset 真实瓦片内容</h1>
        <p>112 x 192 px = 7 列 x 12 行，每瓦片 16x16</p>
        <div id="tileset"></div>
    </div>
    <script>
        const img = new Image();
        img.src = '../assets/tilesets/indoor_tileset.png';
        img.onload = () => {
            const container = document.getElementById('tileset');
            const cols = 7;
            const rows = 12;
            for (let r = 0; r < rows; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                for (let c = 0; c < cols; c++) {
                    const idx = r * cols + c;
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    const canvas = document.createElement('canvas');
                    canvas.width = 16;
                    canvas.height = 16;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = false;
                    ctx.drawImage(img, c * 16, r * 16, 16, 16, 0, 0, 16, 16);
                    tile.appendChild(canvas);
                    const label = document.createElement('div');
                    label.className = 'label';
                    label.textContent = `[${idx}]`;
                    tile.appendChild(label);
                    rowDiv.appendChild(tile);
                }
                container.appendChild(rowDiv);
            }
        };
    </script>
</body>
</html>
