<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend Missions · 4关流程</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
    --nes-black:#0D0D0D; --nes-dark:#1A1A2E; --nes-gray:#4A4A6A;
    --nes-white:#F8F8F8; --nes-yellow:#FFD700; --nes-red:#E74C3C;
    --nes-green:#2ECC71; --nes-cyan:#00D2D3;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
    height:100%;
    background:
        radial-gradient(ellipse at 50% 0%, #2a2a40 0%, #14141f 60%, #0a0a12 100%);
    font-family:'Press Start 2P','Courier New',monospace;
    color:var(--nes-white);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* ====== FC 卡带屏外壳 ====== */
.console-shell {
    aspect-ratio: 880 / 1102;
    height:96vh;
    max-height:96vh;
    max-width:96vw;
    background:linear-gradient(160deg,#3a3a4e 0%,#23232f 100%);
    border-radius:18px;
    padding:1.6% 2%;
    box-shadow:
        0 18px 50px rgba(0,0,0,0.6),
        inset 0 2px 0 rgba(255,255,255,0.08),
        inset 0 -4px 12px rgba(0,0,0,0.5);
    position:relative;
    display:flex;
    flex-direction:column;
}
.shell-top {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 6px 8px;
    flex-shrink:0;
}
.shell-brand { font-size:clamp(7px,1.1vh,10px); color:var(--nes-yellow); letter-spacing:1px; }
.shell-led { display:flex; align-items:center; gap:6px; font-size:clamp(5px,0.8vh,7px); color:#888; }
.shell-led::before {
    content:''; width:8px; height:8px; border-radius:50%;
    background:var(--nes-red); box-shadow:0 0 8px var(--nes-red);
    animation:blink 2s infinite;
}
@keyframes blink { 0%,80%{opacity:1;} 90%{opacity:0.3;} 100%{opacity:1;} }

/* 屏幕内框（CRT） */
.screen {
    flex:1 1 auto;
    min-height:0;
    background:#000;
    border:4px solid #0a0a0a;
    border-radius:8px;
    padding:5px;
    box-shadow:inset 0 0 30px rgba(0,0,0,0.9);
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#12121c;
    padding:6px 10px;
    font-size:clamp(7px,1.1vh,9px);
    border-bottom:2px solid var(--nes-gray);
    flex-shrink:0;
}
.top-bar .stage-info { color: var(--nes-yellow); }
.top-bar .progress-info { color: var(--nes-green); }

/* 地图面板：占屏幕剩余高度的 52% */
.map-section {
    position:relative;
    width:100%;
    flex:52 1 0;
    min-height:0;
    overflow:hidden;
    background:#1a2a3a;
}
#mapCanvas { display:block; width:100%; height:100%; }

.divider {
    height:5px;
    background:repeating-linear-gradient(90deg,
        var(--nes-yellow) 0,var(--nes-yellow) 8px,
        var(--nes-black) 8px,var(--nes-black) 16px);
    flex-shrink:0;
}

/* 游戏面板：占屏幕剩余高度的 48%，画布等比铺满 */
.game-section {
    position:relative;
    width:100%;
    flex:48 1 0;
    min-height:0;
    overflow:hidden;
    background:#1a0f0a;
    display:flex;
    align-items:center;
    justify-content:center;
}
#gameCanvas {
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    display:block;
}

.scanlines {
    position:absolute; inset:0;
    background:repeating-linear-gradient(0deg,
        rgba(0,0,0,0.10) 0,rgba(0,0,0,0.10) 1px,
        transparent 1px,transparent 3px);
    pointer-events:none; z-index:50;
}
.loading {
    position:absolute; top:35%; left:50%;
    transform:translate(-50%,-50%);
    color:var(--nes-yellow); font-size:11px; z-index:60;
}
</style>
</head>
<body>

<div class="console-shell">
    <div class="shell-top">
        <span class="shell-brand">WEEKEND MISSIONS</span>
        <span class="shell-led">POWER</span>
    </div>
    <div class="screen">
        <div class="top-bar">
            <span class="stage-info" id="stageInfo">STAGE 1/4</span>
            <span class="progress-info" id="progressInfo">加载中...</span>
        </div>
        <div class="map-section">
            <canvas id="mapCanvas"></canvas>
            <div class="loading" id="loading">加载地图数据中...</div>
        </div>
        <div class="divider"></div>
        <div class="game-section">
            <canvas id="gameCanvas" width="480" height="270"></canvas>
        </div>
        <div class="scanlines"></div>
    </div>
</div>

<script src="js/core.js"></script>
<script src="js/textures.js"></script>
<script src="js/map.js"></script>
<script src="js/stages.js"></script>
<script src="js/scenes/intro.js"></script>
<script src="js/scenes/walk.js"></script>
<script src="js/scenes/transition.js"></script>
<script src="js/scenes/clear.js"></script>
<script src="js/scenes/finale.js"></script>
<script src="js/scenes/endings/base.js"></script>
<script src="js/scenes/endings/coffee.js"></script>
<script src="js/scenes/endings/bookstore.js"></script>
<script src="js/scenes/endings/mall.js"></script>
<script src="js/scenes/endings/park.js"></script>
<script src="js/flow.js"></script>
<script>
WM.start();
</script>
</body>
</html>
