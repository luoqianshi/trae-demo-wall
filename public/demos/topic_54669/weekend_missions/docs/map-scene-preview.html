<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逐关行进效果页</title>
<style>
:root {
    --nes-black: #0D0D0D;
    --nes-dark: #1A1A2E;
    --nes-gray: #4A4A6A;
    --nes-white: #F8F8F8;
    --nes-yellow: #FFD700;
    --nes-red: #E74C3C;
    --nes-green: #2ECC71;
    --nes-blue: #5B7CC4;
    --nes-orange: #FF8C00;
    --nes-purple: #9B59B6;
    --sky-1: #87CEEB;
    --sky-2: #B0E0E6;
    --ground-1: #8B7355;
    --ground-2: #6B5333;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--nes-black);
    font-family: 'Courier New', monospace;
    color: var(--nes-white);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ===== 顶部信息条 ===== */
.top-bar {
    background: var(--nes-dark);
    border-bottom: 3px solid var(--nes-gray);
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    flex-shrink: 0;
    z-index: 50;
}
.top-bar .stage-info { color: var(--nes-yellow); }
.top-bar .progress-info { color: var(--nes-green); }

/* ===== 上半部分：真实地图 ===== */
.map-section {
    flex: 3;
    position: relative;
    overflow: hidden;
    background: var(--nes-dark);
}
#mapCanvas {
    display: block;
    width: 100%;
    height: 100%;
}
.map-overlay {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(13, 13, 13, 0.85);
    border: 2px solid var(--nes-white);
    padding: 6px 12px;
    font-size: 11px;
    color: var(--nes-yellow);
    z-index: 10;
}

/* ===== 分隔线 ===== */
.divider {
    height: 4px;
    background: repeating-linear-gradient(
        90deg,
        var(--nes-yellow) 0,
        var(--nes-yellow) 8px,
        var(--nes-black) 8px,
        var(--nes-black) 16px
    );
    flex-shrink: 0;
    z-index: 50;
}

/* ===== 下半部分容器 ===== */
.bottom-section {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 200px;
}

/* ===== 行进场景 ===== */
.scene-walking {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--sky-1);
    transition: opacity 0.5s;
}
.scene-walking.hidden {
    opacity: 0;
    pointer-events: none;
}

.sky-layer {
    position: absolute;
    top: 0; left: 0;
    width: 200%;
    height: 60%;
    background: linear-gradient(180deg, var(--sky-1) 0%, var(--sky-2) 100%);
}
.cloud {
    position: absolute;
    font-size: 20px;
    opacity: 0.8;
}

.building-layer {
    position: absolute;
    top: 0; left: 0;
    width: 300%;
    height: 75%;
    display: flex;
    align-items: flex-end;
}
.building {
    display: inline-block;
    margin-right: 20px;
    flex-shrink: 0;
    position: relative;
}
.b1 { width: 40px; height: 60px; background: #B0B0B0; }
.b1::after {
    content: ''; position: absolute;
    top: 8px; left: 6px; width: 8px; height: 8px;
    background: var(--nes-yellow);
    box-shadow: 16px 0 0 var(--nes-yellow), 0 16px 0 var(--nes-yellow), 16px 16px 0 var(--nes-yellow);
}
.b2 { width: 30px; height: 80px; background: #C0C0C0; }
.b2::after {
    content: ''; position: absolute;
    top: 10px; left: 6px; width: 6px; height: 6px;
    background: var(--nes-orange);
    box-shadow: 12px 0 0 var(--nes-orange), 0 16px 0 var(--nes-orange), 12px 16px 0 var(--nes-orange), 0 32px 0 var(--nes-orange), 12px 32px 0 var(--nes-orange);
}
.b3 { width: 50px; height: 50px; background: #A0A0A0; }
.b3::after {
    content: ''; position: absolute;
    top: 8px; left: 8px; width: 8px; height: 8px;
    background: var(--nes-yellow);
    box-shadow: 20px 0 0 var(--nes-yellow), 0 16px 0 var(--nes-yellow), 20px 16px 0 var(--nes-yellow);
}
.tree {
    display: inline-block;
    width: 24px; height: 40px;
    margin-right: 15px;
    flex-shrink: 0;
    position: relative;
}
.tree::before {
    content: ''; position: absolute;
    top: 0; left: 4px; width: 16px; height: 16px;
    background: var(--nes-green);
    border-radius: 50% 50% 0 50%;
}
.tree::after {
    content: ''; position: absolute;
    bottom: 0; left: 8px; width: 8px; height: 24px;
    background: var(--ground-2);
}

.ground-layer {
    position: absolute;
    bottom: 0; left: 0;
    width: 200%; height: 25%;
    background: repeating-linear-gradient(
        90deg,
        var(--ground-1) 0, var(--ground-1) 16px,
        var(--ground-2) 16px, var(--ground-2) 32px
    );
    border-top: 4px solid var(--nes-green);
}

.character {
    position: absolute;
    bottom: 25%; left: 15%;
    width: 24px; height: 32px;
    z-index: 10;
}
.character.walk .frame1 { display: block; }
.character.walk .frame2 { display: none; }
.character.walk.step .frame1 { display: none; }
.character.walk.step .frame2 { display: block; }

.char-frame {
    position: absolute;
    top: 0; left: 0;
    width: 24px; height: 32px;
}
.frame1 .head, .frame2 .head {
    position: absolute; top: 0; left: 6px;
    width: 12px; height: 10px;
    background: #FFDBAC;
}
.frame1 .body, .frame2 .body {
    position: absolute; top: 10px; left: 4px;
    width: 16px; height: 12px;
    background: var(--nes-red);
}
.frame1 .leg-l {
    position: absolute; top: 22px; left: 6px;
    width: 5px; height: 10px;
    background: #2C3E50;
}
.frame1 .leg-r {
    position: absolute; top: 22px; left: 13px;
    width: 5px; height: 10px;
    background: #2C3E50;
}
.frame2 .leg-l {
    position: absolute; top: 22px; left: 4px;
    width: 5px; height: 8px;
    background: #2C3E50;
    transform: rotate(-15deg);
}
.frame2 .leg-r {
    position: absolute; top: 22px; left: 14px;
    width: 5px; height: 8px;
    background: #2C3E50;
    transform: rotate(15deg);
}

.finish-flag {
    position: absolute;
    bottom: 25%; right: 5%;
    font-size: 24px;
    z-index: 5;
}

.scene-progress {
    position: absolute;
    bottom: 2px; left: 0;
    width: 100%; height: 6px;
    background: rgba(0,0,0,0.5);
    z-index: 20;
}
.scene-progress-bar {
    height: 100%; width: 0%;
    background: var(--nes-yellow);
    transition: width 0.1s linear;
}

/* ===== 关底场景 ===== */
.scene-stage-end {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--nes-dark);
    display: none;
    opacity: 0;
    transition: opacity 0.5s;
}
.scene-stage-end.show {
    display: block;
    opacity: 1;
}

/* 关底场景背景 */
.stage-end-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 70%;
}

/* 咖啡店场景 */
.scene-coffee .stage-end-bg {
    background: linear-gradient(180deg, #3E2723 0%, #5D4037 100%);
}
.scene-coffee .counter {
    position: absolute;
    bottom: 30%; left: 10%;
    width: 60%; height: 40px;
    background: #6D4C41;
    border: 3px solid #4E342E;
}
.scene-coffee .counter::after {
    content: '';
    position: absolute;
    top: -20px; left: 20px;
    width: 30px; height: 20px;
    background: var(--nes-white);
    border: 2px solid #4E342E;
    border-radius: 0 0 50% 50%;
}
.scene-coffee .cup {
    position: absolute;
    bottom: 35%; left: 25%;
    width: 16px; height: 14px;
    background: var(--nes-white);
    border: 2px solid #4E342E;
    border-radius: 0 0 4px 4px;
}
.scene-coffee .cup::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 6px;
    background: #4E342E;
    border-radius: 50%;
}
.scene-coffee .lamp {
    position: absolute;
    top: 5%; left: 30%;
    width: 8px; height: 8px;
    background: var(--nes-yellow);
    border-radius: 50%;
    box-shadow: 0 0 20px var(--nes-yellow);
}
.scene-coffee .lamp2 {
    position: absolute;
    top: 5%; left: 60%;
    width: 8px; height: 8px;
    background: var(--nes-yellow);
    border-radius: 50%;
    box-shadow: 0 0 20px var(--nes-yellow);
}
.scene-coffee .plant {
    position: absolute;
    bottom: 30%; right: 15%;
    width: 20px; height: 30px;
}
.scene-coffee .plant::before {
    content: '';
    position: absolute;
    bottom: 10px; left: 4px;
    width: 12px; height: 12px;
    background: var(--nes-green);
    border-radius: 50%;
}
.scene-coffee .plant::after {
    content: '';
    position: absolute;
    bottom: 0; left: 6px;
    width: 8px; height: 10px;
    background: #6D4C41;
}

/* 书店场景 */
.scene-book .stage-end-bg {
    background: linear-gradient(180deg, #1B5E20 0%, #2E7D32 100%);
}
.scene-book .bookshelf {
    position: absolute;
    top: 10%; left: 10%;
    width: 30%; height: 60%;
    background: #4E342E;
    border: 3px solid #3E2723;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    padding: 4px;
}
.scene-book .book-item {
    width: 8px; height: 24px;
    background: var(--nes-red);
}
.scene-book .book-item:nth-child(2n) { background: var(--nes-blue); }
.scene-book .book-item:nth-child(3n) { background: var(--nes-yellow); }
.scene-book .book-item:nth-child(4n) { background: var(--nes-green); }
.scene-book .bookshelf2 {
    position: absolute;
    top: 10%; right: 10%;
    width: 30%; height: 60%;
    background: #4E342E;
    border: 3px solid #3E2723;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    padding: 4px;
}
.scene-book .lamp {
    position: absolute;
    top: 5%; left: 48%;
    width: 8px; height: 8px;
    background: var(--nes-yellow);
    border-radius: 50%;
    box-shadow: 0 0 30px var(--nes-yellow);
}

/* 商场场景 */
.scene-mall .stage-end-bg {
    background: linear-gradient(180deg, #455A64 0%, #607D8B 100%);
}
.scene-mall .entrance {
    position: absolute;
    bottom: 30%; left: 30%;
    width: 40%; height: 50%;
    background: #78909C;
    border: 3px solid #37474F;
}
.scene-mall .entrance::before {
    content: '';
    position: absolute;
    top: 20%; left: 25%;
    width: 50%; height: 60%;
    background: var(--nes-yellow);
    opacity: 0.3;
}
.scene-mall .sign {
    position: absolute;
    top: 8%; left: 35%;
    width: 30%; height: 16px;
    background: var(--nes-red);
    border: 2px solid var(--nes-white);
    font-size: 8px;
    text-align: center;
    line-height: 16px;
    color: var(--nes-white);
}

/* 公园场景 */
.scene-park .stage-end-bg {
    background: linear-gradient(180deg, #1565C0 0%, #42A5F5 60%, #66BB6A 60%, #81C784 100%);
}
.scene-park .sun {
    position: absolute;
    top: 8%; right: 15%;
    width: 24px; height: 24px;
    background: var(--nes-yellow);
    border-radius: 50%;
    box-shadow: 0 0 30px var(--nes-yellow);
}
.scene-park .bench {
    position: absolute;
    bottom: 30%; left: 20%;
    width: 50px; height: 16px;
    background: var(--ground-2);
    border: 2px solid var(--ground-1);
}
.scene-park .bench::after {
    content: '';
    position: absolute;
    bottom: -12px; left: 4px;
    width: 6px; height: 12px;
    background: var(--ground-2);
    box-shadow: 36px 0 0 var(--ground-2);
}
.scene-park .tree-park {
    position: absolute;
    bottom: 30%; right: 15%;
    width: 30px; height: 50px;
}
.scene-park .tree-park::before {
    content: '';
    position: absolute;
    top: 0; left: 5px;
    width: 20px; height: 24px;
    background: var(--nes-green);
    border-radius: 50%;
}
.scene-park .tree-park::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10px;
    width: 10px; height: 26px;
    background: var(--ground-2);
}

/* 关底地面 */
.stage-end-floor {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 30%;
    background: repeating-linear-gradient(
        90deg,
        #3E2723 0, #3E2723 16px,
        #4E342E 16px, #4E342E 32px
    );
    border-top: 3px solid var(--nes-gray);
}

/* 打卡任务面板 */
.checkin-panel {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(13, 13, 13, 0.9);
    border: 3px solid var(--nes-yellow);
    padding: 10px 20px;
    text-align: center;
    z-index: 30;
    max-width: 90%;
}
.checkin-title {
    color: var(--nes-yellow);
    font-size: 12px;
    margin-bottom: 6px;
}
.checkin-task {
    color: var(--nes-white);
    font-size: 14px;
    margin-bottom: 10px;
}
.checkin-btn {
    background: var(--nes-green);
    color: var(--nes-white);
    border: 3px solid var(--nes-white);
    padding: 6px 20px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--nes-black);
}
.checkin-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--nes-black);
}

/* ===== STAGE CLEAR 动画 ===== */
.scene-clear {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--nes-black);
    display: none;
    z-index: 40;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}
.scene-clear.show {
    display: flex;
    animation: clearFlash 0.3s ease;
}
@keyframes clearFlash {
    0% { background: var(--nes-white); }
    100% { background: var(--nes-black); }
}
.clear-title {
    font-size: 28px;
    color: var(--nes-yellow);
    text-shadow: 4px 4px 0 var(--nes-red);
    animation: clearBounce 0.5s ease;
    margin-bottom: 10px;
}
@keyframes clearBounce {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
}
.clear-subtitle {
    color: var(--nes-white);
    font-size: 12px;
    margin-bottom: 16px;
}
.clear-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
}
.clear-stat {
    text-align: center;
}
.clear-stat-label {
    font-size: 10px;
    color: var(--nes-gray);
}
.clear-stat-value {
    font-size: 16px;
    color: var(--nes-green);
}
.clear-next-btn {
    background: var(--nes-yellow);
    color: var(--nes-black);
    border: 3px solid var(--nes-white);
    padding: 8px 24px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--nes-black);
    animation: pulse 1s infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

/* ===== 控制按钮 ===== */
.controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
}
.btn {
    background: var(--nes-red);
    color: var(--nes-white);
    border: 3px solid var(--nes-white);
    padding: 10px 24px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--nes-black);
    transition: transform 0.1s;
}
.btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--nes-black); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* 扫描线 */
.scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.08) 0,
        rgba(0,0,0,0.08) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
    z-index: 999;
}

/* 加载提示 */
.loading {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--nes-yellow);
    font-size: 18px;
    z-index: 1000;
}

/* 全部通关 */
.scene-all-clear {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--nes-black);
    display: none;
    z-index: 40;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}
.scene-all-clear.show { display: flex; }
.all-clear-title {
    font-size: 24px;
    color: var(--nes-yellow);
    text-shadow: 3px 3px 0 var(--nes-red);
    margin-bottom: 10px;
}
.all-clear-sub {
    color: var(--nes-green);
    font-size: 14px;
    margin-bottom: 20px;
}
</style>
</head>
<body>

<!-- 顶部信息条 -->
<div class="top-bar">
    <span class="stage-info" id="stageInfo">STAGE 1/4: 海上世界 → 南海意馆</span>
    <span class="progress-info" id="progressInfo">就绪 - 点击出发开始</span>
</div>

<!-- 上半部分：真实地图 -->
<div class="map-section">
    <canvas id="mapCanvas"></canvas>
    <div class="map-overlay" id="mapOverlay">📍 深圳南山区 | zoom: 15</div>
</div>

<!-- 分隔线 -->
<div class="divider"></div>

<!-- 下半部分 -->
<div class="bottom-section">
    <!-- 行进场景 -->
    <div class="scene-walking" id="sceneWalking">
        <div class="sky-layer" id="skyLayer">
            <span class="cloud" style="top: 10px; left: 5%;">☁️</span>
            <span class="cloud" style="top: 20px; left: 30%;">☁️</span>
            <span class="cloud" style="top: 8px; left: 55%;">☁️</span>
            <span class="cloud" style="top: 15px; left: 80%;">☁️</span>
        </div>
        <div class="building-layer" id="buildingLayer">
            <div class="building b1"></div><div class="tree"></div>
            <div class="building b2"></div><div class="building b3"></div>
            <div class="tree"></div><div class="building b1"></div>
            <div class="building b2"></div><div class="tree"></div>
            <div class="building b3"></div><div class="building b1"></div>
            <div class="tree"></div><div class="building b2"></div>
            <div class="building b3"></div><div class="tree"></div>
            <div class="building b1"></div>
        </div>
        <div class="ground-layer" id="groundLayer"></div>
        <div class="character walk" id="character">
            <div class="char-frame frame1">
                <div class="head"></div><div class="body"></div>
                <div class="leg-l"></div><div class="leg-r"></div>
            </div>
            <div class="char-frame frame2">
                <div class="head"></div><div class="body"></div>
                <div class="leg-l"></div><div class="leg-r"></div>
            </div>
        </div>
        <div class="finish-flag">🏁</div>
        <div class="scene-progress">
            <div class="scene-progress-bar" id="sceneProgressBar"></div>
        </div>
    </div>

    <!-- 关底场景 -->
    <div class="scene-stage-end" id="sceneStageEnd">
        <div class="stage-end-bg" id="stageEndBg"></div>
        <div class="stage-end-floor"></div>
        <div class="checkin-panel" id="checkinPanel">
            <div class="checkin-title" id="checkinTitle">📍 到达目的地</div>
            <div class="checkin-task" id="checkinTask">任务: 点一杯「孤独的星球」</div>
            <button class="checkin-btn" id="checkinBtn">✓ 完成打卡</button>
        </div>
    </div>

    <!-- STAGE CLEAR -->
    <div class="scene-clear" id="sceneClear">
        <div class="clear-title">STAGE CLEAR!</div>
        <div class="clear-subtitle" id="clearSubtitle">南海意馆咖啡 - 通关</div>
        <div class="clear-stats">
            <div class="clear-stat">
                <div class="clear-stat-label">花费</div>
                <div class="clear-stat-value" id="clearCost">¥45</div>
            </div>
            <div class="clear-stat">
                <div class="clear-stat-label">时长</div>
                <div class="clear-stat-value" id="clearTime">1h</div>
            </div>
            <div class="clear-stat">
                <div class="clear-stat-label">HP</div>
                <div class="clear-stat-value" id="clearHP">-20</div>
            </div>
        </div>
        <button class="clear-next-btn" id="clearNextBtn">▶ 下一关</button>
    </div>

    <!-- 全部通关 -->
    <div class="scene-all-clear" id="sceneAllClear">
        <div class="all-clear-title">🎉 ALL STAGES CLEAR!</div>
        <div class="all-clear-sub">周末任务全部完成！</div>
        <button class="btn" id="restartBtn" style="background:var(--nes-green);">▶ 重新开始</button>
    </div>
</div>

<!-- 控制按钮 -->
<div class="controls">
    <button class="btn" id="startBtn">▶ 出发</button>
</div>

<!-- 扫描线 -->
<div class="scanlines"></div>

<!-- 加载提示 -->
<div class="loading" id="loading">加载地图数据中...</div>

<script>
// ===== 关卡数据 =====
const STAGES = [
    {
        from: '海上世界', to: '南海意馆',
        task: '点一杯「孤独的星球」',
        cost: '¥45', duration: '1h', hp: '-20',
        sceneType: 'coffee',
        routeIndex: 0
    },
    {
        from: '南海意馆', to: '南山书城',
        task: '找到一本关于旅行的书',
        cost: '¥38', duration: '2h', hp: '-15',
        sceneType: 'book',
        routeIndex: 1
    },
    {
        from: '南山书城', to: '海岸城',
        task: '在顶楼拍一张城市俯瞰照',
        cost: '¥0', duration: '1h', hp: '-10',
        sceneType: 'mall',
        routeIndex: 2
    },
    {
        from: '海岸城', to: '深圳湾公园',
        task: '在海边长椅坐10分钟',
        cost: '¥0', duration: '1h', hp: '-5',
        sceneType: 'park',
        routeIndex: 3
    }
];

const ROUTE_COLORS = ['#E74C3C', '#2ECC71', '#5B7CC4', '#FF8C00'];
const ROUTE_GLOW = ['rgba(231,76,60,0.3)', 'rgba(46,204,113,0.3)', 'rgba(91,124,196,0.3)', 'rgba(255,140,0,0.3)'];

// ===== 状态 =====
let currentStage = 0;
let phase = 'ready'; // ready, moving, arrived, checkin, clear, allclear
let progress = 0;
let isMoving = false;
let animTimer = null;
let stepToggle = false;
let routeData = null;
let mapImgLoaded = false;

// 地图参数
const MAP_CENTER_LNG = 113.945;
const MAP_CENTER_LAT = 22.501;
const MAP_ZOOM = 13;
const MAP_IMG_W = 800;
const MAP_IMG_H = 600;

// ===== 墨卡托投影 =====
function lngLatToPixel(lng, lat) {
    const earthRadius = 6378137;
    const tileSize = 256;
    const initialResolution = 2 * Math.PI * earthRadius / tileSize;
    const resolution = initialResolution / Math.pow(2, MAP_ZOOM);

    const x = earthRadius * lng * Math.PI / 180;
    const y = earthRadius * Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360));
    const centerX = earthRadius * MAP_CENTER_LNG * Math.PI / 180;
    const centerY = earthRadius * Math.log(Math.tan(Math.PI / 4 + MAP_CENTER_LAT * Math.PI / 360));

    return {
        x: (x - centerX) / resolution + MAP_IMG_W / 2,
        y: (centerY - y) / resolution + MAP_IMG_H / 2
    };
}

// ===== 加载路径数据 =====
fetch('maps/routes.json')
    .then(res => res.json())
    .then(data => {
        routeData = data;
        document.getElementById('loading').style.display = 'none';
        drawMap();
    })
    .catch(err => {
        document.getElementById('loading').textContent = '加载失败: ' + err.message;
    });

// ===== 地图Canvas =====
const mapCanvas = document.getElementById('mapCanvas');
const mapCtx = mapCanvas.getContext('2d');
const mapImg = new Image();
mapImg.crossOrigin = 'anonymous';
mapImg.src = 'maps/shenzhen_full.png';
mapImg.onload = function() {
    mapImgLoaded = true;
    resizeCanvas();
    drawMap();
};

function resizeCanvas() {
    const rect = mapCanvas.parentElement.getBoundingClientRect();
    mapCanvas.width = rect.width;
    mapCanvas.height = rect.height;
    if (mapImgLoaded && routeData) drawMap();
}

// 计算当前关卡路径的边界框
function getRouteBounds(routeIndex) {
    const route = routeData.routes[routeIndex];
    let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;

    route.points.forEach(p => {
        if (p.lng < minLng) minLng = p.lng;
        if (p.lng > maxLng) maxLng = p.lng;
        if (p.lat < minLat) minLat = p.lat;
        if (p.lat > maxLat) maxLat = p.lat;
    });

    // 加padding
    const padLng = (maxLng - minLng) * 0.3;
    const padLat = (maxLat - minLat) * 0.3;
    return {
        minLng: minLng - padLng, maxLng: maxLng + padLng,
        minLat: minLat - padLat, maxLat: maxLat + padLat,
        centerLng: (minLng + maxLng) / 2,
        centerLat: (minLat + maxLat) / 2
    };
}

function drawMap() {
    if (!mapImgLoaded || !routeData) return;
    const cw = mapCanvas.width;
    const ch = mapCanvas.height;

    mapCtx.clearRect(0, 0, cw, ch);

    // 计算当前关卡的聚焦区域
    const bounds = getRouteBounds(currentStage);

    // 将聚焦区域的经纬度范围映射到canvas
    const route = routeData.routes[currentStage];
    const points = route.points.map(p => {
        const px = lngLatToPixel(p.lng, p.lat);
        return px;
    });

    // 计算路径点在图片像素上的边界
    let minPx = Infinity, maxPx = -Infinity, minPy = Infinity, maxPy = -Infinity;
    points.forEach(p => {
        if (p.x < minPx) minPx = p.x;
        if (p.x > maxPx) maxPx = p.x;
        if (p.y < minPy) minPy = p.y;
        if (p.y > maxPy) maxPy = p.y;
    });

    // 加padding
    const padX = (maxPx - minPx) * 0.25;
    const padY = (maxPy - minPy) * 0.25;
    minPx -= padX; maxPx += padX;
    minPy -= padY; maxPy += padY;

    // 路径区域在原图上的宽高
    const routeW = maxPx - minPx;
    const routeH = maxPy - minPy;

    // 计算缩放：让路径区域填充canvas的80%
    const fillRatio = 0.8;
    const scaleX = cw / routeW * fillRatio;
    const scaleY = ch / routeH * fillRatio;
    const scale = Math.min(scaleX, scaleY);

    // 计算偏移：让路径区域居中
    const drawW = MAP_IMG_W * scale;
    const drawH = MAP_IMG_H * scale;
    const routeCenterX = (minPx + maxPx) / 2;
    const routeCenterY = (minPy + maxPy) / 2;
    const offsetX = cw / 2 - routeCenterX * scale;
    const offsetY = ch / 2 - routeCenterY * scale;

    // 绘制地图（缩放聚焦）
    mapCtx.drawImage(mapImg, offsetX, offsetY, drawW, drawH);

    // 绘制当前关卡路径
    const color = ROUTE_COLORS[currentStage];
    const glow = ROUTE_GLOW[currentStage];

    const canvasPoints = points.map(p => ({
        x: offsetX + p.x * scale,
        y: offsetY + p.y * scale
    }));

    // 发光底层
    mapCtx.strokeStyle = glow;
    mapCtx.lineWidth = 10;
    mapCtx.lineCap = 'round';
    mapCtx.lineJoin = 'round';
    mapCtx.beginPath();
    canvasPoints.forEach((p, j) => {
        if (j === 0) mapCtx.moveTo(p.x, p.y);
        else mapCtx.lineTo(p.x, p.y);
    });
    mapCtx.stroke();

    // 主路径
    mapCtx.strokeStyle = color;
    mapCtx.lineWidth = 5;
    mapCtx.beginPath();
    canvasPoints.forEach((p, j) => {
        if (j === 0) mapCtx.moveTo(p.x, p.y);
        else mapCtx.lineTo(p.x, p.y);
    });
    mapCtx.stroke();

    // 方向箭头
    if (canvasPoints.length > 4) {
        const midIdx = Math.floor(canvasPoints.length / 2);
        const p1 = canvasPoints[midIdx - 1];
        const p2 = canvasPoints[midIdx];
        const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
        const arrowSize = 10;

        mapCtx.fillStyle = color;
        mapCtx.beginPath();
        mapCtx.moveTo(p2.x, p2.y);
        mapCtx.lineTo(
            p2.x - arrowSize * Math.cos(angle - Math.PI / 6),
            p2.y - arrowSize * Math.sin(angle - Math.PI / 6)
        );
        mapCtx.lineTo(
            p2.x - arrowSize * Math.cos(angle + Math.PI / 6),
            p2.y - arrowSize * Math.sin(angle + Math.PI / 6)
        );
        mapCtx.closePath();
        mapCtx.fill();
    }

    // 绘制起点和终点标记
    const startPlace = routeData.places[currentStage];
    const endPlace = routeData.places[currentStage + 1];
    const startPos = lngLatToPixel(startPlace.lng, startPlace.lat);
    const endPos = lngLatToPixel(endPlace.lng, endPlace.lat);
    const startCanvas = { x: offsetX + startPos.x * scale, y: offsetY + startPos.y * scale };
    const endCanvas = { x: offsetX + endPos.x * scale, y: offsetY + endPos.y * scale };

    // 起点（绿色）
    drawMarker(startCanvas.x, startCanvas.y, '#2ECC71', 'S', startPlace.name);
    // 终点（黄色）
    drawMarker(endCanvas.x, endCanvas.y, '#FFD700', 'G', endPlace.name);

    // 绘制移动中的小人
    if (phase === 'moving' && progress > 0 && progress < 100) {
        const targetIdx = Math.floor((progress / 100) * (canvasPoints.length - 1));
        const pos = canvasPoints[targetIdx];
        if (pos) {
            // 脉冲圈
            mapCtx.strokeStyle = 'rgba(231, 76, 60, 0.6)';
            mapCtx.lineWidth = 2;
            const pulseR = 14 + Math.sin(Date.now() / 200) * 5;
            mapCtx.beginPath();
            mapCtx.arc(pos.x, pos.y, pulseR, 0, Math.PI * 2);
            mapCtx.stroke();

            // 小人标记
            mapCtx.fillStyle = '#E74C3C';
            mapCtx.beginPath();
            mapCtx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
            mapCtx.fill();

            mapCtx.fillStyle = '#F8F8F8';
            mapCtx.beginPath();
            mapCtx.arc(pos.x, pos.y, 4, 0, Math.PI * 2);
            mapCtx.fill();
        }
    }

    // 到达后小人在终点
    if (phase === 'arrived' || phase === 'checkin') {
        mapCtx.fillStyle = '#E74C3C';
        mapCtx.beginPath();
        mapCtx.arc(endCanvas.x, endCanvas.y, 8, 0, Math.PI * 2);
        mapCtx.fill();
        mapCtx.fillStyle = '#F8F8F8';
        mapCtx.beginPath();
        mapCtx.arc(endCanvas.x, endCanvas.y, 4, 0, Math.PI * 2);
        mapCtx.fill();
    }
}

function drawMarker(x, y, color, label, name) {
    // 光晕
    const gradient = mapCtx.createRadialGradient(x, y, 0, x, y, 18);
    gradient.addColorStop(0, 'rgba(255,215,0,0.3)');
    gradient.addColorStop(1, 'rgba(255,215,0,0)');
    mapCtx.fillStyle = gradient;
    mapCtx.beginPath();
    mapCtx.arc(x, y, 18, 0, Math.PI * 2);
    mapCtx.fill();

    // 外圈
    mapCtx.fillStyle = color;
    mapCtx.beginPath();
    mapCtx.arc(x, y, 12, 0, Math.PI * 2);
    mapCtx.fill();

    // 内圈
    mapCtx.fillStyle = '#F8F8F8';
    mapCtx.beginPath();
    mapCtx.arc(x, y, 7, 0, Math.PI * 2);
    mapCtx.fill();

    // 标签
    mapCtx.fillStyle = '#0D0D0D';
    mapCtx.font = 'bold 11px monospace';
    mapCtx.textAlign = 'center';
    mapCtx.textBaseline = 'middle';
    mapCtx.fillText(label, x, y);

    // 名称
    mapCtx.fillStyle = 'rgba(13,13,13,0.85)';
    mapCtx.fillRect(x - 45, y - 32, 90, 18);
    mapCtx.fillStyle = '#FFD700';
    mapCtx.font = '11px monospace';
    mapCtx.textAlign = 'center';
    mapCtx.fillText(name, x, y - 23);
}

// ===== 行进场景 =====
const skyLayer = document.getElementById('skyLayer');
const buildingLayer = document.getElementById('buildingLayer');
const groundLayer = document.getElementById('groundLayer');
const character = document.getElementById('character');
const sceneProgressBar = document.getElementById('sceneProgressBar');
const startBtn = document.getElementById('startBtn');
const stageInfo = document.getElementById('stageInfo');
const progressInfo = document.getElementById('progressInfo');
const mapOverlay = document.getElementById('mapOverlay');

function updateScene(p) {
    const skyOffset = -(p / 100) * 50;
    const buildingOffset = -(p / 100) * 200;
    const groundOffset = -(p / 100) * 400;

    skyLayer.style.transform = 'translateX(' + skyOffset + '%)';
    buildingLayer.style.transform = 'translateX(' + buildingOffset + 'px)';
    groundLayer.style.transform = 'translateX(' + groundOffset + 'px)';

    if (isMoving) {
        stepToggle = !stepToggle;
        if (stepToggle) character.classList.add('step');
        else character.classList.remove('step');
    }

    sceneProgressBar.style.width = p + '%';
}

// ===== 流程控制 =====
function startMoving() {
    if (phase !== 'ready') return;
    phase = 'moving';
    isMoving = true;
    progress = 0;

    startBtn.disabled = true;
    startBtn.textContent = '行进中...';
    progressInfo.textContent = '行进中... 0%';

    animTimer = setInterval(function() {
        progress += 2;
        if (progress >= 100) {
            progress = 100;
            arriveAtStage();
        }
        drawMap();
        updateScene(progress);
        progressInfo.textContent = '行进中... ' + Math.floor(progress) + '%';
    }, 50);
}

function arriveAtStage() {
    clearInterval(animTimer);
    isMoving = false;
    phase = 'arrived';
    character.classList.remove('step');

    progressInfo.textContent = '到达 ' + STAGES[currentStage].to + '！';

    // 短暂停留后切换到关底场景
    setTimeout(function() {
        showStageEnd();
    }, 800);
}

function showStageEnd() {
    phase = 'checkin';
    const stage = STAGES[currentStage];

    // 隐藏行进场景
    document.getElementById('sceneWalking').classList.add('hidden');

    // 显示关底场景
    const stageEnd = document.getElementById('sceneStageEnd');
    const bg = document.getElementById('stageEndBg');

    // 清除旧场景类
    bg.className = 'stage-end-bg';
    // 添加新场景类
    stageEnd.className = 'scene-stage-end scene-' + stage.sceneType;

    // 设置打卡任务
    document.getElementById('checkinTitle').textContent = '📍 到达 ' + stage.to;
    document.getElementById('checkinTask').textContent = '任务: ' + stage.task;

    stageEnd.classList.add('show');
    progressInfo.textContent = '完成打卡任务';
}

function completeCheckin() {
    phase = 'clear';
    document.getElementById('sceneStageEnd').classList.remove('show');

    // 显示STAGE CLEAR
    const sceneClear = document.getElementById('sceneClear');
    const stage = STAGES[currentStage];
    document.getElementById('clearSubtitle').textContent = stage.to + ' - 通关';
    document.getElementById('clearCost').textContent = stage.cost;
    document.getElementById('clearTime').textContent = stage.duration;
    document.getElementById('clearHP').textContent = stage.hp;

    // 如果是最后一关，改变按钮文字
    const nextBtn = document.getElementById('clearNextBtn');
    if (currentStage >= STAGES.length - 1) {
        nextBtn.textContent = '▶ 查看结果';
    } else {
        nextBtn.textContent = '▶ 下一关';
    }

    sceneClear.classList.add('show');
    progressInfo.textContent = 'STAGE CLEAR!';
}

function nextStage() {
    document.getElementById('sceneClear').classList.remove('show');

    if (currentStage >= STAGES.length - 1) {
        // 全部通关
        showAllClear();
        return;
    }

    currentStage++;
    phase = 'ready';
    progress = 0;

    // 恢复行进场景
    document.getElementById('sceneWalking').classList.remove('hidden');
    document.getElementById('sceneStageEnd').classList.remove('show');

    // 更新UI
    const stage = STAGES[currentStage];
    stageInfo.textContent = 'STAGE ' + (currentStage + 1) + '/' + STAGES.length + ': ' + stage.from + ' → ' + stage.to;
    progressInfo.textContent = '就绪 - 点击出发开始';
    startBtn.disabled = false;
    startBtn.textContent = '▶ 出发';

    // 重置场景
    sceneProgressBar.style.width = '0%';
    skyLayer.style.transform = 'translateX(0)';
    buildingLayer.style.transform = 'translateX(0)';
    groundLayer.style.transform = 'translateX(0)';

    // 重绘地图
    drawMap();
}

function showAllClear() {
    phase = 'allclear';
    document.getElementById('sceneAllClear').classList.add('show');
    startBtn.style.display = 'none';
    progressInfo.textContent = '全部通关！';
}

function restart() {
    currentStage = 0;
    phase = 'ready';
    progress = 0;

    document.getElementById('sceneAllClear').classList.remove('show');
    document.getElementById('sceneWalking').classList.remove('hidden');
    document.getElementById('sceneStageEnd').classList.remove('show');
    document.getElementById('sceneClear').classList.remove('show');
    startBtn.style.display = 'block';
    startBtn.disabled = false;
    startBtn.textContent = '▶ 出发';

    const stage = STAGES[0];
    stageInfo.textContent = 'STAGE 1/' + STAGES.length + ': ' + stage.from + ' → ' + stage.to;
    progressInfo.textContent = '就绪 - 点击出发开始';

    sceneProgressBar.style.width = '0%';
    drawMap();
}

// ===== 事件 =====
startBtn.addEventListener('click', startMoving);
document.getElementById('checkinBtn').addEventListener('click', completeCheckin);
document.getElementById('clearNextBtn').addEventListener('click', nextStage);
document.getElementById('restartBtn').addEventListener('click', restart);
window.addEventListener('resize', resizeCanvas);

// 持续刷新（脉冲动画）
setInterval(function() {
    if (phase === 'moving') drawMap();
}, 100);
</script>
</body>
</html>
