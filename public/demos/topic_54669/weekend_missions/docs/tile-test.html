<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>高德静态地图测试</title>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 20px; font-family: monospace; }
        .map-container { display: inline-block; border: 2px solid #fff; margin: 10px; }
        img { display: block; }
        .info { margin-top: 5px; font-size: 12px; color: #0f0; }
        h2 { color: #ff0; }
    </style>
</head>
<body>
    <h2>高德静态地图 - 3城市测试</h2>

    <div class="map-container">
        <img src="maps/shenzhen.png" width="400" height="300">
        <div class="info">深圳南山区 | 114.05, 22.55 | zoom: 13</div>
    </div>

    <div class="map-container">
        <img src="maps/hangzhou.png" width="400" height="300">
        <div class="info">杭州西湖区 | 120.15, 30.28 | zoom: 13</div>
    </div>

    <div class="map-container">
        <img src="maps/shanghai.png" width="400" height="300">
        <div class="info">上海黄浦区 | 121.47, 31.23 | zoom: 13</div>
    </div>
</body>
</html>
