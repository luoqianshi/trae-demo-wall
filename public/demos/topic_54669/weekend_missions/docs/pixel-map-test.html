<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>像素化地图测试</title>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 20px; font-family: monospace; }
        h2 { color: #ff0; }
        .compare { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .map-box { border: 2px solid #fff; padding: 5px; }
        .map-box canvas { display: block; image-rendering: pixelated; }
        .label { color: #0f0; font-size: 14px; margin-top: 8px; }
        .controls { margin-top: 20px; }
        .controls label { color: #0f0; margin: 0 10px; }
        input[type="range"] { width: 200px; vertical-align: middle; }
        #pixelSize { color: #ff0; }
    </style>
</head>
<body>
    <h2>深圳地图 - 像素化效果对比</h2>

    <div class="controls">
        <label>像素颗粒度: <input type="range" id="pixelSize" min="2" max="20" value="8" step="1"></label>
        <span id="pixelSizeVal">8</span>
    </div>

    <div class="compare">
        <div class="map-box">
            <canvas id="original" width="400" height="300"></canvas>
            <div class="label">原始地图</div>
        </div>
        <div class="map-box">
            <canvas id="pixelated" width="400" height="300"></canvas>
            <div class="label">像素化地图</div>
        </div>
    </div>

    <script>
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
            const origCanvas = document.getElementById('original');
            const origCtx = origCanvas.getContext('2d');
            origCtx.drawImage(img, 0, 0, 400, 300);

            pixelate();
        };
        img.src = 'maps/shenzhen.png';

        function pixelate() {
            const size = parseInt(document.getElementById('pixelSize').value);
            document.getElementById('pixelSizeVal').textContent = size;

            const canvas = document.getElementById('pixelated');
            const ctx = canvas.getContext('2d');

            // 创建小canvas用于缩小
            const small = document.createElement('canvas');
            const w = Math.floor(400 / size);
            const h = Math.floor(300 / size);
            small.width = w;
            small.height = h;
            const smallCtx = small.getContext('2d');

            // 缩小绘制
            smallCtx.drawImage(img, 0, 0, w, h);

            // 放大回原尺寸，关闭平滑
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(small, 0, 0, w, h, 0, 0, 400, 300);
        }

        document.getElementById('pixelSize').addEventListener('input', pixelate);
    </script>
</body>
</html>
