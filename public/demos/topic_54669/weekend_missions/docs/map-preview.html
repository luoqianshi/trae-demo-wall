<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地图效果预览 - Weekend Missions</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --nes-black: #0F0F0F;
            --nes-dark: #1A1A2E;
            --nes-gray: #4A4A6A;
            --nes-white: #FCFCFC;
            --nes-blue: #5B7CC4;
            --nes-red: #E74C3C;
            --nes-green: #2ECC71;
            --nes-yellow: #F1C40F;
            --nes-cyan: #00D2D3;
            --nes-purple: #9B59B6;
            --nes-orange: #E67E22;
            --nes-pink: #FD79A8;
            --font-pixel: 'Press Start 2P', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-pixel);
            background-color: var(--nes-black);
            color: var(--nes-white);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            z-index: 9999;
        }

        /* ===== 上半部分：像素风地图 (75%) ===== */
        .map-section {
            flex: 3;
            position: relative;
            background: var(--nes-dark);
            overflow: hidden;
        }

        /* 地图容器 */
        .map-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* 静态地图图片 - 用CSS绘制像素风地图 */
        .pixel-map {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5a8c 30%, #3a7abc 60%, #2a5a8c 100%);
            position: relative;
            overflow: hidden;
        }

        /* 地图网格 */
        .pixel-map::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 地图区块 - 模拟城市区域 */
        .map-block {
            position: absolute;
            border: 2px solid;
        }

        /* 海洋区域 */
        .map-block.water {
            background: rgba(0, 100, 200, 0.4);
            border-color: rgba(0, 150, 255, 0.3);
        }

        /* 公园区域 */
        .map-block.park {
            background: rgba(46, 204, 113, 0.3);
            border-color: rgba(46, 204, 113, 0.5);
        }

        /* 建筑区域 */
        .map-block.building {
            background: rgba(74, 74, 106, 0.5);
            border-color: rgba(100, 100, 140, 0.4);
        }

        /* 道路 */
        .map-block.road {
            background: rgba(241, 196, 15, 0.2);
            border-color: rgba(241, 196, 15, 0.3);
        }

        /* 地图标记点 */
        .map-marker {
            position: absolute;
            width: 32px;
            height: 32px;
            transform: translate(-50%, -100%);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
        }

        .map-marker:hover {
            transform: translate(-50%, -100%) scale(1.2);
        }

        .map-marker.current {
            animation: markerBounce 0.6s ease-in-out infinite alternate;
        }

        @keyframes markerBounce {
            from { transform: translate(-50%, -100%); }
            to { transform: translate(-50%, -120%); }
        }

        .marker-pin {
            width: 32px;
            height: 32px;
            background: var(--nes-red);
            border: 3px solid var(--nes-white);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .marker-pin.cleared {
            background: var(--nes-green);
        }

        .marker-pin.current {
            background: var(--nes-cyan);
        }

        .marker-pin.boss {
            background: var(--nes-yellow);
            width: 40px;
            height: 40px;
        }

        .marker-pin.hidden-stage {
            background: var(--nes-purple);
        }

        .marker-number {
            transform: rotate(45deg);
            font-size: 10px;
            color: var(--nes-white);
            font-weight: bold;
        }

        /* 标记点标签 */
        .marker-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 7px;
            color: var(--nes-white);
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border: 1px solid var(--nes-yellow);
            white-space: nowrap;
        }

        /* 路径连线 */
        .map-path {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }

        .path-line {
            stroke: var(--nes-yellow);
            stroke-width: 3;
            stroke-dasharray: 8, 4;
            fill: none;
            opacity: 0.7;
        }

        .path-line.cleared {
            stroke: var(--nes-green);
            opacity: 0.9;
        }

        /* 地图顶部信息条 */
        .map-info-bar {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid var(--nes-yellow);
            padding: 8px 12px;
            font-size: 8px;
            color: var(--nes-yellow);
            z-index: 20;
        }

        .map-info-bar .city-name {
            color: var(--nes-cyan);
        }

        /* 地图像素风覆盖层 */
        .map-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        /* 像素化滤镜效果 */
        .pixel-filter {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 3px,
                    rgba(0, 0, 0, 0.08) 3px,
                    rgba(0, 0, 0, 0.08) 4px
                );
            pointer-events: none;
            z-index: 16;
        }

        /* 地图边框 */
        .map-border {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 4px solid;
            border-color: var(--nes-yellow) var(--nes-gray) var(--nes-gray) var(--nes-yellow);
            box-shadow: inset 0 0 0 2px var(--nes-black);
            pointer-events: none;
            z-index: 17;
        }

        /* ===== 下半部分：交互信息 (25%) ===== */
        .info-section {
            flex: 1;
            background: var(--nes-dark);
            border-top: 4px solid var(--nes-yellow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--nes-black);
            border-bottom: 2px solid var(--nes-gray);
            font-size: 8px;
        }

        .info-header .stage-title {
            color: var(--nes-yellow);
        }

        .info-header .stage-status {
            color: var(--nes-cyan);
        }

        /* 交互内容区 */
        .info-content {
            flex: 1;
            display: flex;
            padding: 8px 12px;
            gap: 12px;
            overflow: hidden;
        }

        /* 左侧：关卡信息 */
        .stage-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 7px;
            color: var(--nes-white);
        }

        .stage-info-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stage-info-label {
            color: var(--nes-yellow);
            min-width: 40px;
        }

        .stage-info-value {
            color: var(--nes-cyan);
            flex: 1;
        }

        /* 状态条 */
        .mini-bars {
            display: flex;
            flex-direction: column;
            gap: 4px;
            justify-content: center;
        }

        .mini-bar-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 6px;
        }

        .mini-bar {
            width: 60px;
            height: 10px;
            background: var(--nes-black);
            border: 2px solid;
            border-color: var(--nes-gray) var(--nes-white) var(--nes-white) var(--nes-gray);
        }

        .mini-bar-fill {
            height: 100%;
            transition: width 0.5s step-end;
        }

        .mini-bar-fill.hp { background: var(--nes-green); width: 80%; }
        .mini-bar-fill.coin { background: var(--nes-yellow); width: 30%; }

        /* 右侧：操作按钮 */
        .info-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            justify-content: center;
        }

        .action-btn {
            font-size: 8px;
            padding: 8px 12px;
            border: 3px solid;
            cursor: pointer;
            font-family: var(--font-pixel);
            text-decoration: none;
            text-align: center;
            min-width: 80px;
        }

        .action-btn.nav {
            background: var(--nes-red);
            color: var(--nes-white);
            border-color: #ff8a80 #8b0000 #8b0000 #ff8a80;
        }

        .action-btn.nav:active {
            border-color: #8b0000 #ff8a80 #ff8a80 #8b0000;
        }

        .action-btn.checkin {
            background: var(--nes-green);
            color: var(--nes-black);
            border-color: #6ee7b7 #065f46 #065f46 #6ee7b7;
        }

        .action-btn.checkin:active {
            border-color: #065f46 #6ee7b7 #6ee7b7 #065f46;
        }

        /* 关卡进度条（底部） */
        .stage-progress {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--nes-black);
            border-top: 2px solid var(--nes-gray);
            font-size: 6px;
            overflow-x: auto;
        }

        .progress-node {
            width: 20px;
            height: 20px;
            border: 2px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .progress-node.cleared {
            border-color: var(--nes-green);
            background: var(--nes-green);
            color: var(--nes-black);
        }

        .progress-node.current {
            border-color: var(--nes-cyan);
            background: var(--nes-dark);
            color: var(--nes-cyan);
            animation: pulse 1s infinite;
        }

        .progress-node.locked {
            border-color: var(--nes-gray);
            background: var(--nes-dark);
            color: var(--nes-gray);
        }

        .progress-node.boss {
            border-color: var(--nes-red);
            background: var(--nes-dark);
            color: var(--nes-red);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,210,211,0.4); }
            50% { box-shadow: 0 0 0 4px rgba(0,210,211,0); }
        }

        .progress-connector {
            width: 12px;
            height: 2px;
            background: var(--nes-gray);
            flex-shrink: 0;
        }

        .progress-connector.cleared {
            background: var(--nes-green);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .map-info-bar {
                font-size: 6px;
                padding: 6px 8px;
            }
            .info-content {
                flex-direction: column;
                gap: 6px;
            }
            .info-actions {
                flex-direction: row;
            }
            .action-btn {
                font-size: 7px;
                padding: 6px 10px;
                min-width: 70px;
            }
            .stage-info {
                font-size: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <!-- ===== 上半部分：像素风地图 ===== -->
    <div class="map-section">
        <!-- 顶部信息条 -->
        <div class="map-info-bar">
            <span>📍 <span class="city-name" id="city-name">深圳市南山区</span></span>
            <span id="current-stage-name">STAGE 1: 海上世界文化艺术中心</span>
        </div>

        <!-- 像素风地图 -->
        <div class="map-container">
            <div class="pixel-map" id="pixel-map">
                <!-- 地图区块（CSS绘制） -->
                <div class="map-block water" style="top: 60%; left: 0; width: 100%; height: 40%;"></div>
                <div class="map-block park" style="top: 20%; left: 10%; width: 25%; height: 25%;"></div>
                <div class="map-block building" style="top: 15%; left: 45%; width: 30%; height: 30%;"></div>
                <div class="map-block road" style="top: 45%; left: 0; width: 100%; height: 8%;"></div>
                <div class="map-block road" style="top: 0; left: 40%; width: 8%; height: 100%;"></div>
                <div class="map-block building" style="top: 55%; left: 55%; width: 20%; height: 15%;"></div>
                <div class="map-block park" style="top: 70%; left: 75%; width: 15%; height: 20%;"></div>

                <!-- 路径连线 SVG -->
                <svg class="map-path" style="width: 100%; height: 100%;" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path class="path-line cleared" d="M 15,30 L 35,25" />
                    <path class="path-line" d="M 35,25 L 55,40" />
                    <path class="path-line" d="M 55,40 L 70,55" />
                    <path class="path-line" d="M 70,55 L 85,75" />
                    <path class="path-line" d="M 55,40 L 45,60" />
                </svg>

                <!-- 地图标记点 -->
                <div class="map-marker" style="left: 15%; top: 30%;" data-stage="0">
                    <div class="marker-label">海上世界</div>
                    <div class="marker-pin cleared"><span class="marker-number">✓</span></div>
                </div>

                <div class="map-marker current" style="left: 35%; top: 25%;" data-stage="1">
                    <div class="marker-label">南海意馆</div>
                    <div class="marker-pin current"><span class="marker-number">2</span></div>
                </div>

                <div class="map-marker" style="left: 55%; top: 40%;" data-stage="2">
                    <div class="marker-label">南山书城</div>
                    <div class="marker-pin"><span class="marker-number">3</span></div>
                </div>

                <div class="map-marker" style="left: 70%; top: 55%;" data-stage="3">
                    <div class="marker-label">海岸城</div>
                    <div class="marker-pin"><span class="marker-number">4</span></div>
                </div>

                <div class="map-marker" style="left: 85%; top: 75%;" data-stage="4">
                    <div class="marker-label">深圳湾★</div>
                    <div class="marker-pin boss"><span class="marker-number">★</span></div>
                </div>

                <div class="map-marker" style="left: 45%; top: 60%;" data-stage="hidden">
                    <div class="marker-label">???</div>
                    <div class="marker-pin hidden-stage"><span class="marker-number">?</span></div>
                </div>
            </div>
        </div>

        <!-- 像素滤镜 -->
        <div class="pixel-filter"></div>
        <div class="map-border"></div>
    </div>

    <!-- ===== 下半部分：交互信息 ===== -->
    <div class="info-section">
        <div class="info-header">
            <span class="stage-title" id="info-stage-title">STAGE 2: 南海意馆咖啡</span>
            <span class="stage-status">📍 待签到</span>
        </div>

        <div class="info-content">
            <!-- 左侧：关卡信息 -->
            <div class="stage-info">
                <div class="stage-info-row">
                    <span class="stage-info-label">地址</span>
                    <span class="stage-info-value" id="info-address">深圳市南山区工业六路4号</span>
                </div>
                <div class="stage-info-row">
                    <span class="stage-info-label">花费</span>
                    <span class="stage-info-value" id="info-cost">💰 ¥45</span>
                </div>
                <div class="stage-info-row">
                    <span class="stage-info-label">时长</span>
                    <span class="stage-info-value" id="info-duration">⏱ 1小时</span>
                </div>
                <div class="stage-info-row">
                    <span class="stage-info-label">任务</span>
                    <span class="stage-info-value" id="info-task">点一杯「孤独的星球」</span>
                </div>
            </div>

            <!-- 中间：状态条 -->
            <div class="mini-bars">
                <div class="mini-bar-row">
                    <span>🧍</span>
                    <div class="mini-bar"><div class="mini-bar-fill hp"></div></div>
                    <span>80%</span>
                </div>
                <div class="mini-bar-row">
                    <span>💰</span>
                    <div class="mini-bar"><div class="mini-bar-fill coin"></div></div>
                    <span>¥45/200</span>
                </div>
            </div>

            <!-- 右侧：操作按钮 -->
            <div class="info-actions">
                <a class="action-btn nav" id="nav-btn" href="https://uri.amap.com/navigation?to=113.918,22.497,南海意馆咖啡&mode=walk&coordinate=gaode&callnative=1" target="_blank">
                    🧭 导航
                </a>
                <button class="action-btn checkin" id="checkin-btn">
                    ✅ 签到
                </button>
            </div>
        </div>

        <!-- 底部：关卡进度条 -->
        <div class="stage-progress">
            <div class="progress-node cleared" data-stage="0">1</div>
            <div class="progress-connector cleared"></div>
            <div class="progress-node current" data-stage="1">2</div>
            <div class="progress-connector"></div>
            <div class="progress-node locked" data-stage="2">3</div>
            <div class="progress-connector"></div>
            <div class="progress-node locked" data-stage="3">4</div>
            <div class="progress-connector"></div>
            <div class="progress-node boss" data-stage="4">★</div>
        </div>
    </div>

    <script>
        // 关卡数据
        const stageData = [
            { 
                name: '海上世界文化艺术中心', 
                address: '深圳市南山区望海路1187号',
                cost: '💰 ¥0',
                duration: '⏱ 30分钟',
                task: '找到心形雕塑，合影打卡',
                lng: 113.924253, 
                lat: 22.493693,
                status: '✓ 已通关'
            },
            { 
                name: '南海意馆咖啡', 
                address: '深圳市南山区工业六路4号',
                cost: '💰 ¥45',
                duration: '⏱ 1小时',
                task: '点一杯「孤独的星球」，拍照打卡',
                lng: 113.918, 
                lat: 22.497,
                status: '📍 待签到'
            },
            { 
                name: '南山书城', 
                address: '深圳市南山区南海大道2748号',
                cost: '💰 ¥0',
                duration: '⏱ 45分钟',
                task: '在角落找到一本喜欢的书',
                lng: 113.930, 
                lat: 22.510,
                status: '🔒 未解锁'
            },
            { 
                name: '海岸城购物中心', 
                address: '深圳市南山区文心五路',
                cost: '💰 ¥50',
                duration: '⏱ 1小时',
                task: '逛逛精品店，找一个小礼物',
                lng: 113.937, 
                lat: 22.517,
                status: '🔒 未解锁'
            },
            { 
                name: '深圳湾公园', 
                address: '深圳市南山区滨海大道',
                cost: '💰 ¥0',
                duration: '⏱ 1小时',
                task: '在海边栈道散步，看日落',
                lng: 113.956, 
                lat: 22.506,
                status: '🔒 未解锁'
            },
            { 
                name: '老陈红烧肉', 
                address: '深圳市南山区某小巷',
                cost: '💰 ¥80',
                duration: '⏱ 1小时',
                task: '向老板点一份招牌红烧肉',
                lng: 113.920, 
                lat: 22.500,
                status: '🔒 未解锁'
            }
        ];

        // 点击地图标记或进度节点切换信息
        function selectStage(idx) {
            const data = stageData[idx];
            if (!data) return;

            // 更新信息区
            document.getElementById('info-stage-title').textContent = `STAGE ${idx + 1}: ${data.name}`;
            document.getElementById('info-address').textContent = data.address;
            document.getElementById('info-cost').textContent = data.cost;
            document.getElementById('info-duration').textContent = data.duration;
            document.getElementById('info-task').textContent = data.task;
            document.querySelector('.stage-status').textContent = data.status;

            // 更新顶部信息条
            document.getElementById('current-stage-name').textContent = `STAGE ${idx + 1}: ${data.name}`;

            // 更新导航按钮
            const navBtn = document.getElementById('nav-btn');
            navBtn.href = `https://uri.amap.com/navigation?to=${data.lng},${data.lat},${encodeURIComponent(data.name)}&mode=walk&coordinate=gaode&callnative=1`;

            console.log('切换到关卡:', data.name);
        }

        // 绑定地图标记点击
        document.querySelectorAll('.map-marker').forEach(marker => {
            marker.addEventListener('click', () => {
                const idx = parseInt(marker.dataset.stage === 'hidden' ? 5 : marker.dataset.stage);
                selectStage(idx);
            });
        });

        // 绑定进度节点点击
        document.querySelectorAll('.progress-node').forEach(node => {
            node.addEventListener('click', () => {
                const idx = parseInt(node.dataset.stage);
                selectStage(idx);
            });
        });

        // 签到按钮
        document.getElementById('checkin-btn').addEventListener('click', () => {
            alert('签到成功！\nHP -20\n金币 +45');
        });
    </script>
</body>
</html>
