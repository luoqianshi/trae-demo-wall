    /* ====== Header ====== */

    }
    .header-inner {

      background-clip: text;
    }
    .logo .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      box-shadow: 0 0 12px rgba(108,92,231,0.4);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }
    .logo span { -webkit-text-fill-color: var(--pink); }
    .header-actions {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }
    .btn {
      padding: 8px 20px;

    .app-main {
      max-width: var(--max);

      overflow: hidden;
    }

      content: '';

      inset: 0;

    }
    .upload-zone p {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;

    }

    /* ====== Preview Area ====== */
    .preview-area { display: none; margin-bottom: 1.5rem; }
    .preview-area.active { display: block; }
    .preview-card {
      background: rgba(255,255,255,0.7);

    /* ====== Loading ====== */
    .loading-overlay {

      background: rgba(240,242,255,0.9);

    .score-row .dim-value {
      width: 32px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ink);
      text-align: right;
    }

    #radar-chart { width: 100%; height: 340px; }

      font-size: 0.85rem;

      font-weight: 600;
      margin-bottom: 0.5rem;
      border-left: 4px solid var(--orange);

    .suggestion-tag {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-light), var(--pink-light));
      color: var(--accent);
      border: 1px solid rgba(108,92,231,0.1);
      transition: all 0.2s;
    }
    .suggestion-tag:hover {

    .history-section { display: none; margin-top: 1.5rem; }
    .history-section.active { display: block; }
    .history-list {

    }
    .history-item .h-score {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

    /* ====== Footer ====== */
    .app-footer {
      text-align: center;
      padding: 2rem;

    /* ====== Empty State ====== */

    .type-selector {

    }
    .photo-tip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      color: var(--muted);

    /* ====== Teacher Mode ====== */
    .mode-switch {
      display: flex;
      gap: 0.4rem;
      background: rgba(108,92,231,0.06);
      border-radius: 24px;
      padding: 3px;
    }
    .mode-btn {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8rem;

    .mode-btn.active {

      box-shadow: 0 2px 8px rgba(108,92,231,0.2);
    }

    /* ====== Teacher Dashboard ====== */
    .teacher-section {
      display: none;
      margin-top: 1.5rem;
    }
    .teacher-section.active { display: block; }
    .class-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    .stat-card {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(108,92,231,0.08);
      border-radius: 16px;
      padding: 1rem;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .stat-card .stat-num {

      background: linear-gradient(135deg, var(--accent), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-card .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

    }

      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(108,92,231,0.08);
      border-radius: 16px;
      padding: 1rem;

      transition: all 0.2s;

      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }

      -webkit-text-fill-color: transparent;

      overflow: hidden;

      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), var(--pink));
      transition: width 0.8s ease;
    }

    /* ====== Trend Chart ====== */
    #trend-chart { width: 100%; height: 280px; }

    /* ====== Responsive ====== */
    @media (max-width: 768px) {
      .results-grid { grid-template-columns: 1fr; }
      .upload-zone { padding: 2rem 1rem; }
      .score-summary { flex-direction: column; text-align: center; }
      .class-stats { grid-template-columns: repeat(2, 1fr); }

<body>

  <!-- ====== Header ====== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <div class="dot"></div>
        画作<span>AI</span>智能评析助手
      </div>
      <div class="header-actions">
        <div class="mode-switch">
          <button class="mode-btn active" onclick="switchMode('student')">学生端</button>
        </div>
        <button class="btn btn-outline" onclick="resetAll()">清空重来</button>
        <button class="btn btn-outline" id="btn-history" onclick="toggleHistory()">历史记录</button>
      </div>
    </div>
  </header>

  <!-- ====== Loading ====== -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">AI 正在分析你的画作...</div>
    <div class="loading-sub" id="loading-step">正在识别画作类型</div>
  </div>

  <!-- ====== Main ====== -->
  <main class="app-main">

    <!-- Upload -->
    <section class="upload-section" id="upload-section">
      <div class="upload-zone" id="upload-zone">
        <div class="upload-icon">&#128247;</div>
        <h3>点击上传或拖拽画作到此处</h3>
        <p>支持 JPG / PNG / WEBP</p>
        <div class="photo-tips">
          <span class="photo-tip"><span class="tip-icon">&#9728;</span>光线均匀</span>
          <span class="photo-tip"><span class="tip-icon">&#128247;</span>正面平拍</span>
          <span class="photo-tip"><span class="tip-icon">&#128206;</span>避免反光</span>
          <span class="photo-tip"><span class="tip-icon">&#128270;</span>画面完整</span>
        </div>
        <input type="file" id="file-input" accept="image/*">
      </div>
    </section>

    <!-- Preview -->
    <section class="preview-area" id="preview-area">
      <div class="preview-card">
        <div class="preview-header">
          <h3>已上传画作</h3>
          <span class="tag" id="art-type-tag">自动识别中...</span>
        </div>
        <div class="preview-image-wrap">
          <img id="preview-img" src="" alt="Preview">
        </div>
        <div class="preview-actions">
          <button class="btn btn-primary" id="btn-analyze" onclick="startAnalysis()">开始AI评析</button>
          <button class="btn btn-outline" onclick="resetUpload()">重新上传</button>
        </div>
      </div>
    </section>

    <!-- Results -->
    <section class="results-section" id="results-section">
      <div class="results-grid">
        <!-- Score Summary -->
        <div class="result-card">
          <div class="card-title"><span class="card-icon"></span>综合评分</div>
          <div class="score-summary">
            <div class="total-score">

          </div>

    <section class="history-section" id="history-section">

        <div class="card-title"><span class="card-icon"></span>历史评析记录</div>

  <footer class="app-footer">
    <strong>画作AI智能评析助手</strong> — AI仅供参考，最终判断以老师为准 &nbsp;|&nbsp; TRAE AI 创造力大赛
  </footer>

<script>
// ====== State ======
const history = JSON.parse(localStorage.getItem('artEvalHistory') || '[]');
let currentFile = null;
let currentResult = null;
let radarChart = null;
let trendChart = null;
let selectedType = '素描';
let currentMode = 'student';

// ====== Upload ======
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const uploadSection = document.getElementById('upload-section');
const previewArea = document.getElementById('preview-area');
const previewImg = document.getElementById('preview-img');
const resultsSection = document.getElementById('results-section');
const loadingEl = document.getElementById('loading');

uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    alert('请上传图片文件');
    return;
  }
  currentFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    previewImg.src = e.target.result;
    uploadSection.style.display = 'none';
    previewArea.classList.add('active');
    resultsSection.classList.remove('active');
    document.getElementById('art-type-tag').textContent = selectedType;
  };
  reader.readAsDataURL(file);
}

function selectType(btn, type) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = type;
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const teacherSec = document.getElementById('teacher-section');
  const uploadSec = document.getElementById('upload-section');
  const previewSec = document.getElementById('preview-area');
  const resultsSec = document.getElementById('results-section');
  const historySec = document.getElementById('history-section');

  if (mode === 'teacher') {
    uploadSec.style.display = 'none';
    previewSec.classList.remove('active');
    resultsSec.classList.remove('active');
    historySec.classList.remove('active');
    teacherSec.classList.add('active');
    renderTeacherDashboard();
  } else {
    teacherSec.classList.remove('active');
    if (currentFile) {
      previewSec.classList.add('active');
    } else {
      uploadSec.style.display = 'block';
    }
  }
}

function detectArtType(filename) {
  const n = filename.toLowerCase();
  if (n.includes('素描') || n.includes('sketch')) return '素描';
  if (n.includes('色彩') || n.includes('水粉') || n.includes('油画') || n.includes('color')) return '色彩';
  if (n.includes('速写') || n.includes('quick')) return '速写';
  if (n.includes('设计') || n.includes('design')) return '设计';
  return '素描';
}

function resetUpload() {
  currentFile = null;
  currentResult = null;
  previewImg.src = '';
  previewArea.classList.remove('active');
  resultsSection.classList.remove('active');
  uploadSection.style.display = 'block';
  fileInput.value = '';
}

function resetAll() {
  resetUpload();
  document.getElementById('history-section').classList.remove('active');
  document.getElementById('teacher-section').classList.remove('active');
  if (currentMode === 'teacher') {
    switchMode('student');
  }
  if (radarChart) { radarChart.dispose(); radarChart = null; }
  if (trendChart) { trendChart.dispose(); trendChart = null; }
}

// ====== Analysis ======
const loadingSteps = [
  '正在识别画作类型...',
  '正在分析构图与布局...',
  '正在评估色彩与色调...',
  '正在检测造型与结构...',
  '正在评判技法与笔触...',
  '正在生成评析报告...'
];

const mockResults = [
  {
    type: '素描',
    scores: { composition: 78, color: 72, form: 82, technique: 75, creativity: 68 },
    highlights: [
      '造型结构准确，人物比例关系把握较好，头颈肩衔接自然',
      '明暗关系处理得当，亮灰暗三大面层次清晰',
      '线条运用流畅，排线方向统一，质感表现力较强'
    ],
    improvements: [
      '暗部层次略显单一，建议增加反光与投影的微妙变化',
      '边缘线处理偏硬，适当柔化轮廓可使画面更具空间感',
      '背景处理较为简单，可尝试通过环境衬托主体'
    ],
    suggestions: ['加强暗部层次练习', '多临摹大师素描', '练习边缘虚实处理', '尝试不同光源角度']
  },
  {
    type: '色彩',
    scores: { composition: 80, color: 85, form: 76, technique: 79, creativity: 82 },
    highlights: [
      '色调统一协调，冷暖关系处理成熟，整体色调氛围感强',
      '色彩丰富而不杂乱，笔触运用灵活，画面生动',
      '构图饱满，主次分明，视觉引导流畅'
    ],
    improvements: [
      '部分物体造型略显松散，需注意形体结构的严谨性',
      '画面亮部可适当提纯，增强色彩对比度',
      '远处物体色彩可再偏冷一些，强化空间纵深感'
    ],
    suggestions: ['加强形体结构训练', '练习色彩纯度对比', '注意空间色彩透视', '参考印象派色彩处理']
  },
  {
    type: '速写',
    scores: { composition: 75, color: 65, form: 78, technique: 72, creativity: 70 },
    highlights: [
      '动态捕捉准确，人物姿态自然生动',
      '线条概括能力强，用线简练有力',
      '主次虚实处理得当，画面节奏感好'
    ],
    improvements: [
      '局部细节刻画不足，可选择关键部位深入描绘',
      '线条力度变化可更丰富，增强表现力',
      '场景速写中人物与环境的呼应关系可进一步加强'
    ],
    suggestions: ['多画慢写深入刻画', '练习不同线条质感', '加强场景速写训练', '学习大师速写用线']
  }
];

function startAnalysis() {
  if (!currentFile) return;
  loadingEl.classList.add('active');
  document.getElementById('btn-analyze').disabled = true;
  resultsSection.classList.remove('active');

  let step = 0;
  const stepEl = document.getElementById('loading-step');
  stepEl.textContent = loadingSteps[0];
  const interval = setInterval(() => {
    step++;
    if (step < loadingSteps.length) {
      stepEl.textContent = loadingSteps[step];
    }
  }, 600);

  // Simulate 2.5s analysis
  setTimeout(() => {
    clearInterval(interval);
    loadingEl.classList.remove('active');
    document.getElementById('btn-analyze').disabled = false;
    const artType = document.getElementById('art-type-tag').textContent;
    const result = mockResults.find(r => r.type === artType) || mockResults[0];
    currentResult = { ...result, timestamp: Date.now(), imageData: previewImg.src, type: artType };
    renderResults(currentResult);
    saveToHistory(currentResult);
    resultsSection.classList.add('active');
    renderTrendChart();
    resultsSection.scrollIntoView({ behavior: 'smooth' });
  }, 2500);
}

function renderResults(result) {
  const { scores, highlights, improvements, suggestions } = result;
  const dims = ['composition','color','form','technique','creativity'];
  const dimNames = ['构图','色彩','造型','技法','创意'];
  const dimColors = ['#6c5ce7','#00cec9','#00b894','#fdcb6e','#fd79a8'];
  const total = Math.round(Object.values(scores).reduce((a,b) => a+b, 0) / 5);

  document.getElementById('total-score').textContent = total;

  // Score bars
  const barsHtml = dims.map((d,i) => {
    const v = scores[d];
    return `<div class="score-row">
      <span class="dim-name">${dimNames[i]}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${dimColors[i]}"></div></div>
      <span class="dim-value">${v}</span>
    </div>`;
  }).join('');
  document.getElementById('score-bars').innerHTML = barsHtml;

  // Radar chart
  setTimeout(() => renderRadar(scores, dimNames, dimColors), 100);

  // Analysis
  const analysisHtml = `
    <div class="analysis-block">
      <div class="highlight">${'\u2728'} 画面亮点</div>
      ${highlights.map(h => '<p>' + h + '</p>').join('')}
    </div>
    <div class="analysis-block">
      <div class="improve">${'\uD83D\uDEE0'} 待改进项</div>
      ${improvements.map(h => '<p>' + h + '</p>').join('')}
    </div>`;
  document.getElementById('analysis-content').innerHTML = analysisHtml;

  // Suggestions
  document.getElementById('suggestion-tags').innerHTML = suggestions.map(s =>
    '<span class="suggestion-tag">' + s + '</span>'
  ).join('');
}

function renderRadar(scores, dimNames, dimColors) {
  const container = document.getElementById('radar-chart');
  if (radarChart) radarChart.dispose();
  radarChart = echarts.init(container, null, { renderer: 'svg' });
  const style = getComputedStyle(document.documentElement);
  const accent = style.getPropertyValue('--accent').trim();
  const accent2 = style.getPropertyValue('--accent2').trim();
  const muted = style.getPropertyValue('--muted').trim();
  const rule = style.getPropertyValue('--rule').trim();

  radarChart.setOption({
    animation: true,
    radar: {
      center: ['50%', '50%'],
      radius: '70%',
      indicator: dimNames.map((n,i) => ({ name: n, max: 100 })),
      axisName: { color: muted, fontSize: 12, fontWeight: 600 },
      shape: 'polygon',
      splitNumber: 4,
      axisLine: { lineStyle: { color: rule } },
      splitLine: { lineStyle: { color: rule } },
      splitArea: { areaStyle: { color: ['#fff','#f8f7ff','#f0eeff','#e8e6ff'] } }
    },
    series: [{
      type: 'radar',
      data: [{
        value: [scores.composition, scores.color, scores.form, scores.technique, scores.creativity],
        name: '本次评分',
        areaStyle: { color: accent + '33' },
        lineStyle: { color: accent, width: 2 },
        itemStyle: { color: accent },
        symbol: 'circle',
        symbolSize: 6
      }]
    }]
  });
  window.addEventListener('resize', () => radarChart && radarChart.resize());
}

// ====== History ======
function saveToHistory(result) {
  history.unshift({
    id: Date.now(),
    type: result.type,
    total: Math.round(Object.values(result.scores).reduce((a,b) => a+b, 0) / 5),
    imageData: result.imageData,
    timestamp: result.timestamp,
    result: result
  });
  if (history.length > 20) history.length = 20;
  localStorage.setItem('artEvalHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  if (history.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = history.map((h,i) => `
    <div class="history-item" onclick="viewHistory(${i})">
      <img class="thumb" src="${h.imageData}" alt="History">
      <div class="h-score">${h.total}分</div>
      <div class="h-date">${new Date(h.timestamp).toLocaleString('zh-CN')}</div>
    </div>
  `).join('');
}

function viewHistory(index) {
  const h = history[index];
  previewImg.src = h.imageData;
  document.getElementById('art-type-tag').textContent = h.type;
  currentFile = { name: 'history-' + h.id };
  currentResult = h.result;
  uploadSection.style.display = 'none';
  previewArea.classList.add('active');
  resultsSection.classList.add('active');
  renderResults(currentResult);
  renderTrendChart();
  document.getElementById('history-section').classList.remove('active');
  document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
}

function toggleHistory() {
  const sec = document.getElementById('history-section');
  sec.classList.toggle('active');
  if (sec.classList.contains('active')) {
    renderHistory();
    sec.scrollIntoView({ behavior: 'smooth' });
  }
}

// ====== Trend Chart ======
function renderTrendChart() {
  const container = document.getElementById('trend-chart');
  const emptyEl = document.getElementById('trend-empty');
  if (history.length < 2) {
    container.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }
  container.style.display = 'block';
  emptyEl.style.display = 'none';

  if (trendChart) trendChart.dispose();
  trendChart = echarts.init(container, null, { renderer: 'svg' });

  const reversed = [...history].reverse();
  const dates = reversed.map(h => {
    const d = new Date(h.timestamp);
    return (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
  });
  const totals = reversed.map(h => h.total);
  const types = reversed.map(h => h.type);

  const style = getComputedStyle(document.documentElement);
  const accent = style.getPropertyValue('--accent').trim();
  const pink = style.getPropertyValue('--pink').trim();
  const muted = style.getPropertyValue('--muted').trim();
  const rule = style.getPropertyValue('--rule').trim();

  trendChart.setOption({
    animation: true,
    grid: { top: 40, right: 20, bottom: 30, left: 50 },
    xAxis: {
      type: 'category',
      data: dates,
      axisLine: { lineStyle: { color: rule } },
      axisLabel: { color: muted, fontSize: 10, rotate: 30 },
      axisTick: { show: false }
    },
    yAxis: {
      type: 'value',
      min: 50, max: 100,
      axisLine: { show: false },
      axisLabel: { color: muted, fontSize: 11 },
      splitLine: { lineStyle: { color: rule, type: 'dashed' } }
    },
    tooltip: {
      trigger: 'axis',
      appendToBody: true,
      formatter: function(params) {
        const p = params[0];
        return '<b>' + p.name + '</b><br/>类型：' + types[p.dataIndex] + '<br/>总分：<b>' + p.value + '</b>';
      }
    },
    series: [{
      type: 'line',
      data: totals,
      smooth: true,
      symbol: 'circle',
      symbolSize: 8,
      lineStyle: { color: accent, width: 3 },
      itemStyle: { color: accent, borderWidth: 2, borderColor: '#fff' },
      areaStyle: {
        color: {
          type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
          colorStops: [
            { offset: 0, color: accent + '40' },
            { offset: 1, color: accent + '05' }
          ]
        }
      }
    }]
  });
  window.addEventListener('resize', () => trendChart && trendChart.resize());
}

// ====== Teacher Dashboard ======
const mockStudents = [
  { name: '张小明', type: '素描', score: 82 },
  { name: '李思雨', type: '色彩', score: 88 },
  { name: '王浩然', type: '速写', score: 71 },
  { name: '赵雨萱', type: '素描', score: 79 },
  { name: '刘子轩', type: '色彩', score: 85 },
  { name: '陈思琪', type: '速写', score: 73 },
  { name: '杨明辉', type: '素描', score: 68 },
  { name: '周雅婷', type: '色彩', score: 91 },
  { name: '吴天宇', type: '设计', score: 76 },
  { name: '孙晓琳', type: '素描', score: 84 },
  { name: '黄嘉豪', type: '速写', score: 69 },
  { name: '林诗涵', type: '色彩', score: 87 },
];

function renderTeacherDashboard() {
  const grid = document.getElementById('student-grid');
  grid.innerHTML = mockStudents.map(s => `
    <div class="student-card" onclick="alert('教师复核功能演示：点击查看 ${s.name} 的详细评析报告')">
      <div class="stu-name">${s.name}</div>

        <span class="stu-score">${s.score}</span>
        <span class="stu-type">${s.type}</span>
      </div>
      <div class="stu-bar"><div class="stu-bar-fill" style="width:${s.score}%"></div></div>
    </div>
  `).join('');
}

// ====== Init ======
renderHistory();
</script>

</body>
