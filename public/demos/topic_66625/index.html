<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家物记 - 交互原型</title>
<style>
  :root {
    --bg: #F5F5F7;
    --bg2: #FFFFFF;
    --ink: #1D1D1F;
    --muted: #86868B;
    --rule: #E5E5EA;
    --accent: #FF6B35;
    --accent2: #34C759;
    --danger: #FF3B30;
    --warning: #FF9500;
    --info: #007AFF;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .page-nav { display: none; }

  /* ===== Bottom TabBar ===== */
  .tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 64px; background: var(--bg2);
    border-top: 0.5px solid var(--rule);
    display: flex; align-items: center; justify-content: space-around;
    z-index: 50; padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; cursor: pointer;
    padding: 6px 0; flex: 1; transition: all 0.15s;
    background: none; border: none; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-item .tab-icon {
    width: 24px; height: 24px; display: flex;
    align-items: center; justify-content: center;
    font-size: 20px; transition: transform 0.15s;
  }
  .tab-item .tab-label {
    font-size: 10px; font-weight: 500;
    color: var(--muted); transition: color 0.15s;
  }
  .tab-item.active .tab-label { color: var(--accent); font-weight: 600; }
  .tab-item:active .tab-icon { transform: scale(0.9); }

  /* ===== Phone Frame ===== */
  .phone-container {
    display: flex; justify-content: center;
    padding: 20px 20px 40px; min-height: 100vh;
  }
  .phone-frame {
    width: 375px; min-height: 780px;
    background: var(--bg);
    border-radius: 36px;
    box-shadow: 0 0 0 8px #1D1D1F, 0 0 0 10px #333, 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden; position: relative;
  }
  .phone-notch {
    width: 150px; height: 28px; background: #1D1D1F;
    border-radius: 0 0 18px 18px;
    margin: 0 auto; position: relative; z-index: 10;
  }

  /* ===== Screens ===== */
  .screen {
    display: none; height: 716px;
    overflow-y: auto; overflow-x: hidden;
    padding-bottom: 16px;
    scrollbar-width: none;
  }
  .screen::-webkit-scrollbar { display: none; }
  .screen.active { display: block; }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 24px 0; font-size: 12px; font-weight: 600; color: var(--ink);
  }

  /* ===== Modal / Overlay ===== */
  .modal-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.45); z-index: 100;
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: var(--bg2); border-radius: 20px 20px 0 0;
    width: 100%; max-height: 90%; overflow-y: auto;
    padding: 20px; animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 36px; height: 4px; background: var(--rule);
    border-radius: 2px; margin: 0 auto 16px;
  }
  .modal-title {
    font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; font-size: 22px;
    color: var(--muted); cursor: pointer; padding: 4px;
  }

  /* ===== Search Overlay (full screen) ===== */
  .search-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 64px;
    background: var(--bg);
    z-index: 80;
    display: none;
    flex-direction: column;
    animation: fadeIn 0.2s ease;
  }
  .search-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .search-overlay-header {
    padding: 40px 20px 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .search-overlay-header .back-btn {
    background: none; border: none; font-size: 22px;
    color: var(--ink); cursor: pointer; padding: 4px; flex-shrink: 0;
  }
  .search-overlay-bar {
    flex: 1; background: var(--bg2);
    border-radius: var(--radius); padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--card-shadow); border: 1.5px solid var(--accent);
  }
  .search-overlay-bar input {
    border: none; outline: none; font-size: 15px;
    color: var(--ink); flex: 1; background: transparent; font-family: inherit;
  }
  .search-overlay-bar input::placeholder { color: var(--muted); }
  .search-overlay-bar .clear-btn {
    width: 18px; height: 18px; color: var(--muted); cursor: pointer; flex-shrink: 0;
  }
  .search-overlay-body {
    flex: 1; overflow-y: auto; padding: 0 20px 20px;
    scrollbar-width: none;
  }
  .search-overlay-body::-webkit-scrollbar { display: none; }

  /* ===== Form Elements ===== */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--muted); margin-bottom: 6px;
  }
  .form-input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--rule); border-radius: var(--radius-sm);
    font-size: 15px; color: var(--ink); background: var(--bg);
    font-family: inherit; outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  select.form-input { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%2386868B' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }
  .form-btn {
    width: 100%; padding: 14px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .form-btn:hover { opacity: 0.9; }
  .form-btn.secondary { background: var(--bg); color: var(--ink); border: 1.5px solid var(--rule); }
  .form-btn.danger { background: var(--danger); }
  .form-btn.small { padding: 8px 16px; font-size: 13px; width: auto; border-radius: 8px; }

  /* ===== Home Header ===== */
  .home-header { padding: 8px 20px 12px; }
  .home-header h1 { font-size: 28px; font-weight: 700; color: var(--ink); }
  .home-header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ===== Search Bar ===== */
  .search-bar {
    margin: 0 20px 16px; background: var(--bg2);
    border-radius: var(--radius); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--card-shadow); cursor: pointer; transition: box-shadow 0.2s;
  }
  .search-bar:hover { box-shadow: 0 2px 16px rgba(0,0,0,0.12); }
  .search-bar .search-icon { width: 20px; height: 20px; color: var(--muted); flex-shrink: 0; }
  .search-bar .search-text { font-size: 15px; color: var(--muted); flex: 1; }
  .search-bar .scan-icon { width: 22px; height: 22px; color: var(--accent); flex-shrink: 0; }

  /* ===== Section Header ===== */
  .section-header {
    display: flex; align-items: center; gap: 8px;
    padding: 0 20px; margin-bottom: 12px;
  }
  .section-header .section-icon { font-size: 18px; }
  .section-header .section-title { font-size: 16px; font-weight: 600; color: var(--ink); }
  .section-header .section-badge {
    background: var(--danger); color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 1px 7px; border-radius: 10px; margin-left: 2px;
  }

  /* ===== Recent Locations ===== */
  .recent-locations {
    padding: 0 20px; margin-bottom: 20px;
    overflow-x: auto; scrollbar-width: none;
    white-space: nowrap; display: flex; gap: 8px;
  }
  .recent-locations::-webkit-scrollbar { display: none; }
  .location-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--bg2); border: 1px solid var(--rule);
    border-radius: 20px; padding: 8px 16px;
    font-size: 13px; color: var(--ink); cursor: pointer;
    transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .location-tag:hover, .location-tag.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(255,107,53,0.05);
  }
  .location-tag .tag-icon { font-size: 14px; }

  /* ===== Room Grid ===== */
  .room-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 0 20px; margin-bottom: 20px;
  }
  .room-card {
    background: var(--bg2); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--card-shadow);
    cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
  }
  .room-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .room-card .room-icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .room-card .room-name { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .room-card .room-count { font-size: 13px; color: var(--accent); font-weight: 500; }

  /* ===== Alerts ===== */
  .alerts-section { padding: 0 20px; margin-bottom: 20px; }
  .alert-list { background: var(--bg2); border-radius: var(--radius); box-shadow: var(--card-shadow); overflow: hidden; }
  .alert-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid var(--rule);
    cursor: pointer; transition: background 0.15s;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-item:hover { background: rgba(0,0,0,0.02); }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .alert-dot.expired { background: var(--danger); }
  .alert-dot.expiring { background: var(--warning); }
  .alert-dot.low { background: var(--info); }
  .alert-info { flex: 1; }
  .alert-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .alert-desc { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .alert-tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
  .alert-tag.expired { background: rgba(255,59,48,0.1); color: var(--danger); }
  .alert-tag.expiring { background: rgba(255,149,0,0.1); color: var(--warning); }
  .alert-tag.low { background: rgba(0,122,255,0.1); color: var(--info); }

  /* ===== FAB ===== */
  .fab {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; border: none;
    border-radius: 28px; padding: 14px 28px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,107,53,0.4);
    display: flex; align-items: center; gap: 8px;
    transition: all 0.2s; z-index: 5;
  }
  .fab:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.5); }
  .fab .fab-icon { font-size: 20px; }

  /* ===== Search Results ===== */
  .search-results { padding: 0; }
  .location-group { margin-bottom: 20px; }
  .location-group-header {
    font-size: 13px; color: var(--muted); margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .location-group-header .loc-icon { font-size: 14px; }
  .product-card {
    background: var(--bg2); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--card-shadow);
    margin-bottom: 10px; display: flex; gap: 14px;
    align-items: flex-start; cursor: pointer;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .product-card .product-img {
    width: 64px; height: 64px; background: var(--bg);
    border-radius: var(--radius-sm); display: flex;
    align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
  }
  .product-card .product-details { flex: 1; min-width: 0; }
  .product-card .product-name { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .product-card .product-spec { font-size: 13px; color: var(--ink); margin-bottom: 4px; }
  .product-card .product-spec .spec-value { color: #8B6914; font-weight: 500; }
  .product-card .product-spec .spec-qty { color: var(--accent2); font-weight: 600; }
  .product-card .product-expiry {
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .product-card .expiry-warning {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 12px; font-weight: 600; color: var(--warning);
  }
  .product-card .swipe-actions {
    position: absolute; right: -120px; top: 0; bottom: 0;
    display: flex; transition: right 0.3s ease;
  }
  .product-card:hover .swipe-actions { right: 0; }
  .swipe-action-btn {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 2px; width: 60px;
    border: none; color: #fff; font-size: 11px; font-weight: 500; cursor: pointer;
  }
  .swipe-action-btn.consume { background: var(--accent2); }
  .swipe-action-btn.move { background: var(--info); }
  .swipe-action-btn .action-icon { font-size: 18px; }
  .swipe-hint {
    text-align: center; font-size: 12px; color: var(--muted);
    padding: 8px 0; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .swipe-hint .swipe-arrow { animation: swipeHint 2s ease-in-out infinite; }
  @keyframes swipeHint { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-8px)} }

  /* ===== No Results ===== */
  .no-results { text-align: center; padding: 40px 20px; color: var(--muted); }
  .no-results .no-results-icon { font-size: 48px; margin-bottom: 12px; }
  .no-results .no-results-text { font-size: 15px; }

  /* ===== Family Group ===== */
  .family-header {
    background: var(--bg2); padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--card-shadow);
  }
  .family-avatar {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #FF8F65);
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .family-info { flex: 1; }
  .family-name { font-size: 17px; font-weight: 600; color: var(--ink); }
  .family-members { font-size: 13px; color: var(--muted); }
  .family-enter-btn {
    background: none; border: 1px solid var(--accent);
    color: var(--accent); border-radius: 20px;
    padding: 6px 14px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .family-enter-btn:hover { background: var(--accent); color: #fff; }

  /* ===== Activity Feed ===== */
  .activity-section { padding: 16px 20px 0; }
  .activity-feed { background: var(--bg2); border-radius: var(--radius); box-shadow: var(--card-shadow); overflow: hidden; }
  .activity-card {
    padding: 14px 16px; border-bottom: 1px solid var(--rule);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .activity-card:last-child { border-bottom: none; }
  .activity-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; background: var(--bg);
  }
  .activity-content { flex: 1; }
  .activity-text { font-size: 14px; color: var(--ink); line-height: 1.5; }
  .activity-text .actor { font-weight: 600; }
  .activity-text .action-item { color: var(--accent); font-weight: 500; }
  .activity-text .location-tag-inline { font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 2px; }
  .activity-time { font-size: 12px; color: var(--warning); font-weight: 500; margin-top: 4px; }

  /* ===== Shopping List ===== */
  .shopping-section { padding: 16px 20px 0; }
  .shopping-list { background: var(--bg2); border-radius: var(--radius); box-shadow: var(--card-shadow); overflow: hidden; }
  .shopping-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; border-bottom: 1px solid var(--rule);
    font-size: 14px; color: var(--ink);
  }
  .shopping-item:last-of-type { border-bottom: none; }
  .shopping-item.checked .item-name { text-decoration: line-through; color: var(--muted); }
  .shopping-item .item-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--rule); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s; background: var(--bg);
  }
  .shopping-item .item-check.checked { background: var(--accent2); border-color: var(--accent2); color: #fff; font-size: 12px; }
  .shopping-item .item-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .shopping-item .item-name { flex: 1; transition: all 0.2s; }
  .shopping-item .item-author { font-size: 12px; color: var(--muted); }
  .shopping-add-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--rule); }
  .shopping-add-row input {
    flex: 1; border: 1.5px solid var(--rule); border-radius: 8px;
    padding: 8px 12px; font-size: 14px; outline: none;
    font-family: inherit; background: var(--bg); color: var(--ink);
  }
  .shopping-add-row input:focus { border-color: var(--accent); }
  .shopping-add-row button {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 8px 16px; font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .copy-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 12px; border: none; background: none;
    color: var(--info); font-size: 14px; font-weight: 500;
    cursor: pointer; width: 100%; transition: background 0.15s;
  }
  .copy-btn:hover { background: rgba(0,122,255,0.05); }

  /* ===== Manage ===== */
  .manage-section { padding: 16px 20px; }
  .manage-row {
    background: var(--bg2); border-radius: var(--radius);
    box-shadow: var(--card-shadow); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .manage-row:hover { background: rgba(0,0,0,0.02); }
  .manage-row .manage-icon { font-size: 20px; }
  .manage-row .manage-text { flex: 1; font-size: 15px; font-weight: 500; color: var(--ink); }
  .manage-row .manage-arrow { color: var(--muted); font-size: 14px; }

  /* ===== Toast ===== */
  .toast {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 20px;
    border-radius: 20px; font-size: 13px; font-weight: 500;
    z-index: 200; opacity: 0; transition: opacity 0.3s;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ===== Room Detail ===== */
  .room-detail-header {
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    background: var(--bg2); box-shadow: var(--card-shadow);
  }
  .room-detail-header .back-btn { background: none; border: none; font-size: 22px; color: var(--ink); cursor: pointer; padding: 4px; }
  .room-detail-header .room-detail-title { font-size: 18px; font-weight: 700; flex: 1; }
  .room-detail-header .room-detail-count { font-size: 13px; color: var(--muted); }
  .room-detail-items { padding: 12px 20px; }

  /* ===== Members Panel ===== */
  .member-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--rule); }
  .member-item:last-child { border-bottom: none; }
  .member-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .member-info { flex: 1; }
  .member-name { font-size: 15px; font-weight: 600; }
  .member-role { font-size: 12px; color: var(--muted); }
  .member-actions { display: flex; gap: 8px; }

  /* ===== Item Detail ===== */
  .item-detail-img { width: 100px; height: 100px; background: var(--bg); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto 16px; }
  .item-detail-name { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .item-detail-location { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 20px; }
  .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--rule); font-size: 14px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--muted); }
  .detail-value { font-weight: 600; }

  /* ===== Stats Page ===== */
  .stats-header { padding: 8px 20px 16px; }

  }

// ===========================
// UTILITY
// ===========================
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function getExpiryInfo(dateStr) {
  var exp = new Date(dateStr);
  var diff = Math.ceil((exp - today) / (1000*60*60*24));
  if (diff < 0) return { status:'expired', label:'已过期 '+Math.abs(diff)+' 天', cls:'expired' };
  if (diff <= 7)  return { status:'expiring', label:'还有'+diff+'天过期', cls:'expiring' };
  return { status:'ok', label: dateStr, cls:'ok' };
}

function getItemAlerts() {
  return items.filter(function(it){
    var e = getExpiryInfo(it.expiry);
    return e.status === 'expired' || e.status === 'expiring';
  }).concat(
    items.filter(function(it){ return it.qty <= 1 && it.expiry > '2027-01-01'; })
  ).slice(0, 10);
}

// ===========================
// PAGE SWITCH
// ===========================
function switchPage(index) {
  closeSearchOverlay();
  document.querySelectorAll('.page-nav button').forEach(function(btn,i){ btn.classList.toggle('active', i === index); });
  document.querySelectorAll('.screen').forEach(function(s,i){ s.classList.toggle('active', i === index); });
  document.querySelectorAll('.tab-item').forEach(function(tab,i){ tab.classList.toggle('active', i === index); });
  if (index === 0) renderHome();
  if (index === 1) renderStats();
  if (index === 2) renderFamily();
}

// ===========================
// SEARCH OVERLAY
// ===========================
function openSearchOverlay(keyword) {
  document.getElementById('searchOverlay').classList.add('show');
  var input = document.getElementById('searchInput');
  input.value = keyword || '';
  input.focus();
  performSearch();
}
function closeSearchOverlay() {
  document.getElementById('searchOverlay').classList.remove('show');
  document.getElementById('searchInput').value = '';
}
function performSearch() {
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  var container = document.getElementById('searchResults');
  if (!q) {
    container.innerHTML = '<div class="no-results"><div class="no-results-icon">&#128269;</div><div class="no-results-text">输入物品名称开始搜索</div></div>';
    return;
  }
  var results = items.filter(function(it){ return it.name.toLowerCase().indexOf(q) !== -1 || it.spec.toLowerCase().indexOf(q) !== -1 || it.location.toLowerCase().indexOf(q) !== -1; });
  if (results.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="no-results-icon">&#128533;</div><div class="no-results-text">没有找到「'+q+'」相关的物品</div></div>';
    return;
  }
  var groups = {};
  results.forEach(function(it){ if (!groups[it.location]) groups[it.location] = []; groups[it.location].push(it); });
  var html = '';
  Object.keys(groups).forEach(function(loc){
    html += '<div class="location-group"><div class="location-group-header"><span class="loc-icon">📍</span> 在「'+loc+'」找到</div>';
    groups[loc].forEach(function(it){
      var e = getExpiryInfo(it.expiry);
      var warn = e.status !== 'ok' ? ' <span class="expiry-warning">&#9888;&#65039; '+e.label+'</span>' : '';
      html += '<div class="product-card" onclick="openItemDetail('+it.id+')"><div class="product-img">'+it.emoji+'</div><div class="product-details"><div class="product-name">'+it.name+'</div><div class="product-spec"><span class="spec-value">'+it.spec+'</span> × <span class="spec-qty">'+it.qty+it.unit+'</span></div><div class="product-expiry">保质期: '+it.expiry+warn+'</div></div><div class="swipe-actions"><button class="swipe-action-btn consume" onclick="event.stopPropagation();consumeItem('+it.id+')"><span class="action-icon">&#9989;</span>消耗1'+it.unit+'</button><button class="swipe-action-btn move" onclick="event.stopPropagation();closeModal();openMoveModal('+it.id+')"><span class="action-icon">&#128259;</span>移动</button></div></div>';
    });
    html += '</div>';
  });
  html += '<div class="swipe-hint"><span class="swipe-arrow">&#8592;</span> 悬停物品卡片显示「消耗」「移动」操作</div>';
  container.innerHTML = html;
}
function clearSearch() { document.getElementById('searchInput').value = ''; performSearch(); }

// ===========================
// HOME
// ===========================
function renderHome() {
  var locHtml = '';
  recentLocs.forEach(function(loc){
    var icons = {'冰箱':'🧊','储物柜':'📦','玄关':'🏡','书架':'📚','阳台':'🛒'};
    locHtml += '<div class="location-tag" onclick="openSearchOverlay(\''+loc+'\')"><span class="tag-icon">'+(icons[loc]||'📍')+'</span> '+loc+'</div>';
  });
  document.getElementById('recentLocations').innerHTML = locHtml;

  rooms.forEach(function(r){ r.items = items.filter(function(it){ return it.room === r.name; }); });
  var roomHtml = '';
  rooms.forEach(function(r){
    roomHtml += '<div class="room-card" onclick="openRoomDetail(\''+r.name+'\')"><span class="room-icon">'+r.emoji+'</span><div class="room-name">'+r.name+'</div><div class="room-count">'+r.items.length+' 件物品</div></div>';
  });
  document.getElementById('roomGrid').innerHTML = roomHtml;

  var alerts = getItemAlerts();
  document.getElementById('alertBadge').textContent = alerts.length;
  var alertHtml = '';
  alerts.forEach(function(it){
    var e = getExpiryInfo(it.expiry);
    var isLow = it.qty <= 1 && e.status === 'ok';
    var dotCls = isLow ? 'low' : e.cls;
    var tagCls = isLow ? 'low' : e.cls;
    var tagText = isLow ? '库存不足' : (e.status==='expired'?'已过期':'即将过期');
    var desc = isLow ? '库存不足（剩 '+it.qty+' '+it.unit+'）' : e.label;
    alertHtml += '<div class="alert-item" onclick="openItemDetail('+it.id+')"><div class="alert-dot '+dotCls+'"></div><div class="alert-info"><div class="alert-name">'+it.name+'</div><div class="alert-desc">'+desc+'</div></div><span class="alert-tag '+tagCls+'">'+tagText+'</span></div>';
  });
  document.getElementById('alertList').innerHTML = alertHtml || '<div style="padding:20px;text-align:center;color:var(--muted);font-size:14px;">暂无提醒</div>';
}

// ===========================
// STATS
// ===========================
function renderStats() {
  var total = items.length;
  var expired = items.filter(function(it){ return getExpiryInfo(it.expiry).status === 'expired'; }).length;
  var expiring = items.filter(function(it){ return getExpiryInfo(it.expiry).status === 'expiring'; }).length;
  var totalQty = items.reduce(function(s,it){ return s + it.qty; }, 0);

  // Summary cards
  document.getElementById('statsSummary').innerHTML =
    '<div class="stat-card"><div class="stat-number accent">'+total+'</div><div class="stat-label">物品种类</div></div>' +
    '<div class="stat-card"><div class="stat-number green">'+totalQty+'</div><div class="stat-label">物品总数</div></div>' +
    '<div class="stat-card"><div class="stat-number danger">'+expired+'</div><div class="stat-label">已过期</div></div>' +
    '<div class="stat-card"><div class="stat-number warning">'+expiring+'</div><div class="stat-label">7天内过期</div></div>';

  // Room distribution bar chart
  rooms.forEach(function(r){ r.items = items.filter(function(it){ return it.room === r.name; }); });
  var maxRoom = Math.max.apply(null, rooms.map(function(r){ return r.items.length; }));
  var barColors = ['c1','c2','c3','c4'];
  var roomHtml = '';
  rooms.forEach(function(r, i){
    var pct = maxRoom > 0 ? Math.round(r.items.length / maxRoom * 100) : 0;
    roomHtml += '<div class="bar-row"><span class="bar-label">'+r.name+'</span><div class="bar-track"><div class="bar-fill '+barColors[i]+'" style="width:'+pct+'%"><span class="bar-fill-text">'+r.items.length+'</span></div></div></div>';
  });
  document.getElementById('roomChart').innerHTML = roomHtml;

  // Expiry list
  var expiryItems = items.slice().sort(function(a,b){ return new Date(a.expiry) - new Date(b.expiry); }).slice(0, 8);
  var expHtml = '';
  expiryItems.forEach(function(it){
    var e = getExpiryInfo(it.expiry);
    var statusCls = e.status === 'expired' ? 'expired' : e.status === 'expiring' ? 'expiring' : '';
    var statusText = e.status === 'expired' ? '已过期' : e.status === 'expiring' ? e.label : '正常';
    var tagStyle = e.status === 'expired' ? 'background:rgba(255,59,48,0.1);color:var(--danger);' : e.status === 'expiring' ? 'background:rgba(255,149,0,0.1);color:var(--warning);' : 'background:rgba(52,199,89,0.1);color:var(--accent2);';
    expHtml += '<div class="expiry-row" onclick="openItemDetail('+it.id+')"><span class="expiry-emoji">'+it.emoji+'</span><div class="expiry-info"><div class="expiry-item-name">'+it.name+'</div><div class="expiry-item-loc">📍 '+it.location+'</div></div><span class="expiry-item-status" style="'+tagStyle+'">'+statusText+'</span></div>';
  });
  document.getElementById('expiryList').innerHTML = expHtml;

  // Member contribution
  var memberData = {};
  members.forEach(function(m){ memberData[m.name] = { emoji:m.emoji, count:0 }; });
  items.forEach(function(it){ if (memberData[it.addedBy]) memberData[it.addedBy].count++; });
  var maxMember = Math.max.apply(null, Object.values(memberData).map(function(m){ return m.count; }));
  var mColors = ['c2','c1','c3'];
  var mHtml = '';
  var mi = 0;
  Object.keys(memberData).forEach(function(name){
    var m = memberData[name];
    var pct = maxMember > 0 ? Math.round(m.count / maxMember * 100) : 0;
    mHtml += '<div class="member-stat-row"><div class="member-stat-avatar" style="background:var(--bg);">'+m.emoji+'</div><div class="member-stat-info"><div class="member-stat-name">'+name+'</div><div class="bar-track" style="height:16px;"><div class="bar-fill '+mColors[mi%mColors.length]+'" style="width:'+pct+'%"></div></div></div><div class="member-stat-count">'+m.count+'</div></div>';
    mi++;
  });
  document.getElementById('memberChart').innerHTML = mHtml;
}

  var room = rooms.find(function(r){ return r.name === roomName; });
  if (!room) return;
  room.items = items.filter(function(it){ return it.room === roomName; });
  var html = '<div class="room-detail-header"><button class="back-btn" onclick="closeModal()">&#8592;</button><span class="room-detail-title">'+room.emoji+' '+room.name+'</span><span class="room-detail-count">'+room.items.length+' 件物品</span></div><div class="room-detail-items">';
  room.items.forEach(function(it){
    var e = getExpiryInfo(it.expiry);
    var warn = e.status !== 'ok' ? ' <span class="expiry-warning">&#9888;&#65039; '+e.label+'</span>' : '';
    html += '<div class="product-card" onclick="openItemDetail('+it.id+')"><div class="product-img">'+it.emoji+'</div><div class="product-details"><div class="product-name">'+it.name+'</div><div class="product-spec"><span class="spec-value">'+it.spec+'</span> × <span class="spec-qty">'+it.qty+it.unit+'</span></div><div class="product-expiry">位置: '+it.location+'<br>保质期: '+it.expiry+warn+'</div></div></div>';
  });
  html += '</div>';
  openModal(html);

// ===========================
function openItemDetail(id) {
  var it = items.find(function(i){ return i.id === id; });
  if (!it) return;
  var e = getExpiryInfo(it.expiry);
  var eColor = e.status === 'expired' ? 'var(--danger)' : e.status === 'expiring' ? 'var(--warning)' : 'var(--ink)';
  var html = '<div style="position:relative;"><button class="modal-close" onclick="closeModal()">&#10005;</button><div class="item-detail-img">'+it.emoji+'</div><div class="item-detail-name">'+it.name+'</div><div class="item-detail-location">📍 '+it.location+'</div><div><div class="detail-row"><span class="detail-label">规格</span><span class="detail-value">'+it.spec+'</span></div><div class="detail-row"><span class="detail-label">数量</span><span class="detail-value">'+it.qty+' '+it.unit+'</span></div><div class="detail-row"><span class="detail-label">保质期</span><span class="detail-value" style="color:'+eColor+'">'+it.expiry+' ('+e.label+')</span></div><div class="detail-row"><span class="detail-label">添加日期</span><span class="detail-value">'+it.added+'</span></div><div class="detail-row"><span class="detail-label">添加人</span><span class="detail-value">'+it.addedBy+'</span></div></div><div style="margin-top:20px;display:flex;gap:10px;"><button class="form-btn" style="flex:1;" onclick="consumeItem('+it.id+')">消耗 1 '+it.unit+'</button><button class="form-btn secondary" style="flex:1;" onclick="closeModal();openMoveModal('+it.id+')">移动位置</button></div><div style="margin-top:10px;"><button class="form-btn danger" onclick="deleteItem('+it.id+')">删除物品</button></div></div>';
  openModal(html);
}

function consumeItem(id) {
  var it = items.find(function(i){ return i.id === id; });
  if (!it) return;
  if (it.qty > 1) {
    it.qty--;
    showToast(it.name + ' 消耗了 1 '+it.unit+'，剩余 '+it.qty+it.unit);
    addActivity('我','🧑','消耗了', it.name+' ×1', it.location);
  } else {
    items = items.filter(function(i){ return i.id !== id; });
    showToast(it.name + ' 已消耗完毕并移除');
    addActivity('我','🧑','消耗完了', it.name, it.location);
  }
  closeModal(); renderHome();
}

function deleteItem(id) {
  var it = items.find(function(i){ return i.id === id; });
  if (!it) return;
  items = items.filter(function(i){ return i.id !== id; });
  showToast(it.name + ' 已删除');
  addActivity('我','🧑','删除了', it.name, it.location);
  closeModal(); renderHome();
}

function openMoveModal(id) {
  var it = items.find(function(i){ return i.id === id; });
  if (!it) return;
  var html = '<div class="modal-title">移动「'+it.name+'」</div><div class="form-group"><label class="form-label">当前位置</label><div style="padding:10px 14px;background:var(--bg);border-radius:8px;font-size:14px;color:var(--muted);">📍 '+it.location+'</div></div><div class="form-group"><label class="form-label">新位置</label><select class="form-input" id="moveLocationSelect">';
  locations.forEach(function(loc){ html += '<option value="'+loc+'"'+(loc===it.location?' selected':'')+'>'+loc+'</option>'; });
  html += '</select></div><div class="form-group"><label class="form-label">新房间</label><select class="form-input" id="moveRoomSelect">';
  rooms.forEach(function(r){ html += '<option value="'+r.name+'"'+(r.name===it.room?' selected':'')+'>'+r.emoji+' '+r.name+'</option>'; });
  html += '</select></div><button class="form-btn" onclick="confirmMove('+id+')">确认移动</button><button class="form-btn secondary" style="margin-top:8px;" onclick="closeModal()">取消</button>';
  openModal(html);
}

function confirmMove(id) {
  var it = items.find(function(i){ return i.id === id; });
  if (!it) return;
  var newLoc = document.getElementById('moveLocationSelect').value;
  var newRoom = document.getElementById('moveRoomSelect').value;
  var oldLoc = it.location;
  it.location = newLoc; it.room = newRoom;
  showToast(it.name + ' 已移动到 ' + newLoc);
  addActivity('我','🧑','移动了', it.name, oldLoc+' → '+newLoc);
  closeModal(); renderHome();
}

  var unit = document.getElementById('addItemUnit').value;

  var room = document.getElementById('addItemRoom').value;
  var expiry = document.getElementById('addItemExpiry').value || '2027-12-31';
  var emojis = { '牛奶':'🥛','酸奶':'🥛','啤酒':'🍺','鸡蛋':'🥚','酱油':'🫙','油':'🛢️','米':'🍚','水':'💧','纸':'🧻','洗衣':'🧴','洗发':'🫧','牙膏':'🪥','巧克力':'🍫','薯片':'🥔','电池':'🔋','水果':'🍎','香蕉':'🍌','咖啡':'☕','茶':'🍵','面包':'🍞','零食':'🥜','袜子':'🧦','充电':'🔌','毛巾':'🛁','香皂':'🧼','面霜':'🧴','洗面':'🫧','花露水':'🌸','坚果':'🥜','辣椒':'🌶️','鸡粉':'🍗','十三香':'🧂','按摩':'💆','床罩':'🛏️','湿巾':'🧻','卷纸':'🧻','洁厕':'🧹','矿泉水':'💧','纯净水':'💧' };
  var emoji = '📦';
  Object.keys(emojis).forEach(function(k){ if (name.indexOf(k) !== -1) emoji = emojis[k]; });
  items.push({ id: nextId++, name: name, emoji: emoji, spec: spec, qty: qty, unit: unit, location: location, room: room, expiry: expiry, added: '2026-07-01', addedBy: '我' });
  showToast(name + ' 添加成功！');
  addActivity('我','🧑','添加了', name+' ×'+qty, location);
  closeModal(); renderHome();
}

// FAMILY
// ===========================
function addActivity(actor, emoji, action, item, location) {
  activities.unshift({ actor:actor, emoji:emoji, action:action, item:item, location:location, time:Date.now() });
  if (activities.length > 20) activities.pop();
}

function renderFamily() {
  var actHtml = '';
  activities.forEach(function(a){
    var locHtml = a.location ? '<div class="location-tag-inline">📍 '+a.location+'</div>' : '';
    var timeStr = formatTime(a.time);
    actHtml += '<div class="activity-card"><div class="activity-avatar">'+a.emoji+'</div><div class="activity-content"><div class="activity-text"><span class="actor">'+a.actor+'</span> '+a.action+' <span class="action-item">'+a.item+'</span>'+locHtml+'</div><div class="activity-time">'+timeStr+'</div></div></div>';
  });
  document.getElementById('activityFeed').innerHTML = actHtml;

  var shopHtml = '';
  shoppingList.forEach(function(it){
    var nameStyle = it.checked ? ' style="text-decoration:line-through;color:var(--muted);"' : '';
    shopHtml += '<div class="shopping-item'+(it.checked?' checked':'')+'"><div class="item-check'+(it.checked?' checked':'')+'" onclick="toggleShoppingItem('+it.id+')">'+(it.checked?'✓':'')+'</div><span class="item-name"'+nameStyle+'>'+it.name+'</span><span class="item-author">'+it.addedBy+'添加</span><button class="form-btn small" style="padding:4px 10px;font-size:12px;color:var(--danger);background:none;border:none;" onclick="removeShoppingItem('+it.id+')">✕</button></div>';
  });
  shopHtml += '<div class="shopping-add-row"><input type="text" id="newShoppingItem" placeholder="添加新物品..." onkeydown="if(event.key===\'Enter\')addShoppingItem()"><button onclick="addShoppingItem()">添加</button></div>';
  shopHtml += '<button class="copy-btn" onclick="copyShoppingList()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 一键复制清单</button>';
  document.getElementById('shoppingList').innerHTML = shopHtml;
  document.getElementById('memberCount').textContent = members.length + ' 位成员';
}

function toggleShoppingItem(id) {
  var it = shoppingList.find(function(s){ return s.id === id; });
  if (it) { it.checked = !it.checked; if (it.checked) showToast(it.name + ' 已购买 ✓'); renderFamily(); }
}
function removeShoppingItem(id) {
  var it = shoppingList.find(function(s){ return s.id === id; });
  shoppingList = shoppingList.filter(function(s){ return s.id !== id; });
  if (it) showToast(it.name + ' 已从清单移除');
  renderFamily();
}
function addShoppingItem() {
  var input = document.getElementById('newShoppingItem');
  var name = input.value.trim();
  if (!name) return;
  shoppingList.push({ id: nextShoppingId++, name: name, addedBy: '我', checked: false });
  input.value = '';
  showToast(name + ' 已加入待购清单');
  addActivity('我','🧑','在待购清单添加了', name, '');
  renderFamily();
}
function copyShoppingList() {
  var text = '家庭待购清单:\n';
  shoppingList.forEach(function(it){ if (!it.checked) text += '○ ' + it.name + '\n'; });
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function(){ showToast('清单已复制到剪贴板'); }); }
  else { var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('清单已复制到剪贴板'); }
}
function toggleChat() { showToast('已进入「张家小窝」群组'); }

// ===========================
// MANAGE MEMBERS
// ===========================
function openManageMembers() {
  var html = '<div class="modal-title">管理家庭成员</div><div>';
  members.forEach(function(m, idx){
    var bgColor = m.name === '爸爸' ? 'linear-gradient(135deg,#4A90D9,#357ABD)' : m.name === '妈妈' ? 'linear-gradient(135deg,#E8785A,#D4573A)' : 'linear-gradient(135deg,#34C759,#28A745)';
    html += '<div class="member-item"><div class="member-avatar" style="background:'+bgColor+'">'+m.emoji+'</div><div class="member-info"><div class="member-name">'+m.name+'</div><div class="member-role">'+m.role+' · 加入于 '+m.joined+'</div></div><div class="member-actions">';
    if (m.role !== '管理员') html += '<button class="form-btn small" onclick="setAdmin('+idx+')">设为管理员</button>';
    if (m.name !== '我') html += '<button class="form-btn small" style="background:var(--danger);color:#fff;" onclick="removeMember('+idx+')">移除</button>';
    html += '</div></div>';
  });
  html += '</div><div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--rule);"><button class="form-btn" onclick="openInviteMember()">邀请成员</button></div><button class="form-btn secondary" style="margin-top:8px;" onclick="closeModal()">关闭</button>';
  openModal(html);
}
function setAdmin(idx) { members[idx].role = '管理员'; showToast(members[idx].name + ' 已设为管理员'); openManageMembers(); }
function removeMember(idx) { var name = members[idx].name; members.splice(idx, 1); showToast(name + ' 已移出家庭'); openManageMembers(); renderFamily(); }
function openInviteMember() {
  var html = '<div class="modal-title">邀请新成员</div><div class="form-group"><label class="form-label">成员昵称</label><input class="form-input" id="inviteName" placeholder="例如：奶奶"></div><div class="form-group"><label class="form-label">角色</label><select class="form-input" id="inviteRole"><option>成员</option><option>管理员</option></select></div><button class="form-btn" onclick="confirmInvite()">发送邀请</button><button class="form-btn secondary" style="margin-top:8px;" onclick="openManageMembers()">返回</button>';
  openModal(html);
}
function confirmInvite() {
  var name = document.getElementById('inviteName').value.trim();
  if (!name) { showToast('请输入昵称'); return; }
  var role = document.getElementById('inviteRole').value;
  var emojis = ['👶','🧓','👴','👵','👦','👧','🧑','👨','👩'];
  members.push({ name: name, emoji: emojis[Math.floor(Math.random()*emojis.length)], role: role, joined: '2026-07-01' });
  showToast('已向 ' + name + ' 发送邀请');
  addActivity('我','🧑','邀请了', name+' 加入家庭', '');
  openManageMembers(); renderFamily();
}

function formatTime(ts) {
  var diff = Date.now() - ts; var mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚'; if (mins < 60) return mins + ' 分钟前';
  var hours = Math.floor(mins / 60); if (hours < 24) return hours + ' 小时前';
  return Math.floor(hours / 24) + ' 天前';
}

function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modalOverlay').classList.add('show'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

renderHome();
</script>
