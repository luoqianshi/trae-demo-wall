<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智序 SmartFlow - AI智能任务管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255,255,255,0.98);
            padding: 18px 50px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.12);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 30px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 36px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .main-container {
            max-width: 1400px;
            margin: 35px auto;
            padding: 0 30px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        .sidebar {
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.12);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-title {
            font-size: 15px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf7 100%);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 14px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.15);
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-sub {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .ai-suggestion-box {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 16px;
            padding: 22px;
            margin-top: 10px;
        }

        .ai-suggestion-title {
            font-size: 14px;
            font-weight: 700;
            color: #8b4513;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-suggestion-text {
            font-size: 14px;
            color: #5a3d1e;
            line-height: 1.7;
        }

        .chart-container {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 16px;
        }

        .main-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.12);
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .content-title {
            font-size: 28px;
            font-weight: 800;
            color: #333;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: #667eea;
            background: #f0f3ff;
            color: #667eea;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .task-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf7 100%);
            border-radius: 18px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            transition: all 0.3s;
            border-left: 5px solid #667eea;
        }

        .task-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
        }

        .task-card.urgent {
            border-left-color: #f5576c;
            background: linear-gradient(135deg, #fff0f3 0%, #ffe4e8 100%);
        }

        .task-card.important {
            border-left-color: #667eea;
            background: linear-gradient(135deg, #f0f3ff 0%, #e4edff 100%);
        }

        .task-card.normal {
            border-left-color: #38ef7d;
            background: linear-gradient(135deg, #f0fff4 0%, #e4ffec 100%);
        }

        .task-card.completed {
            opacity: 0.6;
            border-left-color: #ccc;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .task-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .task-meta {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #888;
        }

        .task-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-priority-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
        }

        .badge-urgent {
            background: #f5576c;
            color: white;
        }

        .badge-important {
            background: #667eea;
            color: white;
        }

        .badge-normal {
            background: #38ef7d;
            color: white;
        }

        .task-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-complete {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-complete:hover {
            transform: scale(1.05);
        }

        .btn-edit {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-edit:hover {
            background: #667eea;
            color: white;
        }

        .btn-delete {
            background: white;
            border: 2px solid #f5576c;
            color: #f5576c;
        }

        .btn-delete:hover {
            background: #f5576c;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 35px;
            width: 90%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            color: #333;
        }

        .modal-close {
            font-size: 32px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .features-section {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 30px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .feature-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 50px rgba(0,0,0,0.15);
        }

        .feature-icon {
            font-size: 52px;
            margin-bottom: 16px;
        }

        .feature-card h3 {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }

        .feature-card p {
            font-size: 14px;
            color: #666;
            line-height: 1.7;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
            }
            .features-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 640px) {
            .features-grid {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .task-card {
                flex-direction: column;
            }
            .task-actions {
                flex-direction: row;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span class="logo-icon">🎯</span>
            智序 SmartFlow
        </div>
        <div class="header-right">
            <div class="user-avatar">U</div>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">📊 今日数据概览</div>
                <div class="stat-card">
                    <div class="stat-label">待完成任务</div>
                    <div class="stat-number" id="pendingTasks">7</div>
                    <div class="stat-sub">今日需完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">已完成</div>
                    <div class="stat-number" id="completedTasks">3</div>
                    <div class="stat-sub">今日完成率 30%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">本周进度</div>
                    <div class="stat-number">75%</div>
                    <div class="stat-sub">继续加油！</div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">🤖 AI智能建议</div>
                <div class="ai-suggestion-box">
                    <div class="ai-suggestion-title">💡 智能提示</div>
                    <div class="ai-suggestion-text" id="aiSuggestion">
                        根据你的历史数据，现在是处理重要不紧急任务的最佳时段。建议优先处理项目报告撰写，预计需要2小时。
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">📈 完成趋势</div>
                <div class="chart-container">
                    <canvas id="taskChart"></canvas>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="content-header">
                <h1 class="content-title">📋 AI智能排序任务列表</h1>
                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="aiReorder()">
                        🧠 AI重新排序
                    </button>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        ➕ 添加新任务
                    </button>
                </div>
            </div>

            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterTasks('all')">全部</button>
                <button class="filter-btn" onclick="filterTasks('urgent')">紧急 ⚡</button>
                <button class="filter-btn" onclick="filterTasks('important')">重要 🔴</button>
                <button class="filter-btn" onclick="filterTasks('normal')">普通 🟢</button>
                <button class="filter-btn" onclick="filterTasks('completed')">已完成 ✓</button>
            </div>

            <div class="task-list" id="taskList">
                <!-- Tasks will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <div class="features-section">
        <div class="features-grid">
            <div class="feature-card">
                <div class="feature-icon">🧠</div>
                <h3>AI智能排序</h3>
                <p>基于截止日期、重要程度、依赖关系和个人精力状态，自动生成最优任务执行顺序</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📈</div>
                <h3>数据洞察报告</h3>
                <p>可视化分析你的时间分配模式，发现效率瓶颈，持续提升管理能力</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">👥</div>
                <h3>团队协作</h3>
                <p>支持任务分配、进度追踪、实时同步，让团队协作更加高效透明</p>
            </div>
        </div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">➕ 添加新任务</h2>
                <span class="modal-close" onclick="closeAddModal()">&times;</span>
            </div>
            <div class="form-group">
                <label class="form-label">任务名称</label>
                <input type="text" class="form-input" id="taskTitle" placeholder="例如：完成项目中期报告">
            </div>
            <div class="form-group">
                <label class="form-label">任务描述</label>
                <textarea class="form-input form-textarea" id="taskDesc" placeholder="详细描述这个任务..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">截止日期</label>
                    <input type="datetime-local" class="form-input" id="taskDeadline">
                </div>
                <div class="form-group">
                    <label class="form-label">预计耗时（小时）</label>
                    <input type="number" class="form-input" id="taskDuration" placeholder="2" value="2">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">优先级</label>
                    <select class="form-input" id="taskPriority">
                        <option value="urgent">紧急 ⚡</option>
                        <option value="important" selected>重要 🔴</option>
                        <option value="normal">普通 🟢</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">标签</label>
                    <input type="text" class="form-input" id="taskTag" placeholder="工作/学习">
                </div>
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="addTask()">确认添加</button>
        </div>
    </div>

    <script>
        let tasks = [
            {
                id: 1,
                title: '完成项目中期报告',
                desc: '整理项目进展数据，撰写中期报告文档，准备汇报材料',
                deadline: '2024-06-26T18:00',
                duration: 2.5,
                priority: 'urgent',
                tag: '工作',
                completed: false,
                createdAt: new Date()
            },
            {
                id: 2,
                title: '复习《机器学习》第三章',
                desc: '完成课后习题，整理笔记，准备下周测验',
                deadline: '2024-06-27T23:59',
                duration: 1.5,
                priority: 'important',
                tag: '学习',
                completed: false,
                createdAt: new Date()
            },
            {
                id: 3,
                title: '整理本周会议纪要',
                desc: '梳理会议内容，记录待办事项，同步给团队成员',
                deadline: '2024-06-28T12:00',
                duration: 1,
                priority: 'normal',
                tag: '工作',
                completed: false,
                createdAt: new Date()
            },
            {
                id: 4,
                title: '准备团队分享会PPT',
                desc: '制作关于AI产品应用的分享演示文稿',
                deadline: '2024-06-29T16:00',
                duration: 3,
                priority: 'important',
                tag: '工作',
                completed: false,
                createdAt: new Date()
            },
            {
                id: 5,
                title: '完成数据库设计文档',
                desc: '完善ER图，编写数据字典，优化表结构',
                deadline: '2024-06-30T20:00',
                duration: 2,
                priority: 'normal',
                tag: '工作',
                completed: true,
                createdAt: new Date()
            },
            {
                id: 6,
                title: '阅读指定文献',
                desc: '阅读3篇深度学习相关论文，撰写读书笔记',
                deadline: '2024-07-01T23:59',
                duration: 4,
                priority: 'important',
                tag: '学习',
                completed: false,
                createdAt: new Date()
            }
        ];

        let currentFilter = 'all';
        let taskChart = null;

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${month}月${day}日 ${hours}:${minutes}`;
        }

        function getPriorityBadge(priority) {
            const badges = {
                urgent: { class: 'badge-urgent', text: '紧急 ⚡' },
                important: { class: 'badge-important', text: '重要 🔴' },
                normal: { class: 'badge-normal', text: '普通 🟢' }
            };
            return badges[priority];
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            let filteredTasks = [...tasks];
            
            if (currentFilter !== 'all') {
                if (currentFilter === 'completed') {
                    filteredTasks = tasks.filter(t => t.completed);
                } else {
                    filteredTasks = tasks.filter(t => t.priority === currentFilter && !t.completed);
                }
            } else {
                filteredTasks = tasks.filter(t => !t.completed);
            }

            if (filteredTasks.length === 0) {
                taskList.innerHTML = '<div style="text-align: center; padding: 50px; color: #999; font-size: 16px;">🎉 暂无任务，继续保持！</div>';
                return;
            }

            taskList.innerHTML = filteredTasks.map(task => {
                const badge = getPriorityBadge(task.priority);
                const completedClass = task.completed ? 'completed' : '';
                return `
                    <div class="task-card ${task.priority} ${completedClass}">
                        <div class="task-info">
                            <div class="task-title">${task.title}</div>
                            <div class="task-desc">${task.desc}</div>
                            <div class="task-meta">
                                <span class="task-meta-item">📅 截止：${formatDate(task.deadline)}</span>
                                <span class="task-meta-item">⏱ 预计：${task.duration}小时</span>
                                <span class="task-meta-item">🏷 ${task.tag}</span>
                            </div>
                        </div>
                        <div class="task-actions">
                            <div class="task-priority-badge ${badge.class}">${badge.text}</div>
                            ${!task.completed ? `
                                <button class="task-btn btn-complete" onclick="completeTask(${task.id})">完成 ✓</button>
                            ` : ''}
                            <button class="task-btn btn-edit" onclick="alert('编辑功能演示')">✏️ 编辑</button>
                            <button class="task-btn btn-delete" onclick="deleteTask(${task.id})">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            }).join('');

            updateStats();
        }

        function updateStats() {
            const pending = tasks.filter(t => !t.completed).length;
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('pendingTasks').textContent = pending;
            document.getElementById('completedTasks').textContent = completed;
            updateChart();
        }

        function aiReorder() {
            tasks.sort((a, b) => {
                const priorityScore = { urgent: 3, important: 2, normal: 1 };
                const scoreA = priorityScore[a.priority] * 10 + (new Date(a.deadline) - new Date()) / (1000 * 60 * 60 * 24);
                const scoreB = priorityScore[b.priority] * 10 + (new Date(b.deadline) - new Date()) / (1000 * 60 * 60 * 24);
                return scoreB - scoreA;
            });
            
            document.getElementById('aiSuggestion').textContent = 
                'AI已根据优先级和截止日期重新排序，建议优先处理排名靠前的任务！';
            
            renderTasks();
            alert('✅ AI智能排序完成！任务已按最优顺序排列');
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }

        function completeTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = true;
                renderTasks();
            }
        }

        function deleteTask(id) {
            if (confirm('确定要删除这个任务吗？')) {
                tasks = tasks.filter(t => t.id !== id);
                renderTasks();
            }
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('show');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }

        function addTask() {
            const title = document.getElementById('taskTitle').value;
            const desc = document.getElementById('taskDesc').value;
            const deadline = document.getElementById('taskDeadline').value;
            const duration = parseFloat(document.getElementById('taskDuration').value) || 2;
            const priority = document.getElementById('taskPriority').value;
            const tag = document.getElementById('taskTag').value || '工作';

            if (!title || !deadline) {
                alert('请填写任务名称和截止日期！');
                return;
            }

            tasks.unshift({
                id: Date.now(),
                title,
                desc: desc || '暂无描述',
                deadline,
                duration,
                priority,
                tag,
                completed: false,
                createdAt: new Date()
            });

            closeAddModal();
            renderTasks();
            aiReorder();
            
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskTag').value = '';
        }

        function initChart() {
            const ctx = document.getElementById('taskChart').getContext('2d');
            taskChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['已完成', '待完成'],
                    datasets: [{
                        data: [3, 7],
                        backgroundColor: ['#38ef7d', '#667eea'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: {
                                    size: 12
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateChart() {
            if (taskChart) {
                const completed = tasks.filter(t => t.completed).length;
                const pending = tasks.filter(t => !t.completed).length;
                taskChart.data.datasets[0].data = [completed, pending];
                taskChart.update();
            }
        }

        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAddModal();
            }
        });

        renderTasks();
        initChart();
    </script>
</body>
</html>
