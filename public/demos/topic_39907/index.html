<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalesCoach AI - 销售培训教练平台</title>
    <script src="https://cdn.tailwindcss.com/3.4.14"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        html, body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #f9fafb;
        }
        
        #app-container {
            height: 100%;
            width: 100%;
            display: flex;
        }
        
        #sidebar {
            flex-shrink: 0;
            width: 256px;
            height: 100%;
            background-color: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0;
        }
        
        #page-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px;
            background-color: #f9fafb;
        }
        
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-text { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text; 
        }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(102, 126, 234, 0.15); }
        .btn-primary { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            transition: all 0.3s ease; 
            border: none;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .sidebar-active { 
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%); 
            color: #667eea; 
            border-left: 3px solid #667eea; 
        }
        .progress-bar { background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); }
        .risk-high { background-color: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; }
        .risk-medium { background-color: rgba(251, 191, 36, 0.1); border-left: 4px solid #fbbf24; }
        
        .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
        
        .nav-text {
            display: block;
        }
        
        #sidebar.sidebar-collapsed {
            width: 64px;
        }
        
        #sidebar.sidebar-collapsed .nav-text {
            display: none;
        }
        
        #sidebar.sidebar-collapsed .always-show {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <aside id="sidebar">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-brain text-white"></i>
                    </div>
                    <div class="nav-text always-show">
                        <h1 class="font-bold text-gray-900">SalesCoach AI</h1>
                        <p class="text-xs text-gray-500">智能销售培训</p>
                    </div>
                </div>
                <button id="sidebar-toggle" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <i class="fa-solid fa-chevron-left text-gray-500"></i>
                </button>
            </div>
            <nav class="flex-1 p-2 overflow-y-auto scrollbar-thin">
                <a href="#home" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors" data-page="home">
                    <i class="fa-solid fa-home w-5 h-5 flex-shrink-0"></i>
                    <span class="nav-text">首页</span>
                </a>
                <a href="#industry" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors" data-page="industry">
                    <i class="fa-solid fa-industry w-5 h-5 flex-shrink-0"></i>
                    <span class="nav-text">行业选择</span>
                </a>
                <a href="#questioning" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors" data-page="questioning">
                    <i class="fa-solid fa-question-circle w-5 h-5 flex-shrink-0"></i>
                    <span class="nav-text">需求采集</span>
                </a>
                <a href="#quote" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors" data-page="quote">
                    <i class="fa-solid fa-file-invoice-dollar w-5 h-5 flex-shrink-0"></i>
                    <span class="nav-text">产品方案</span>
                </a>
                <a href="#document" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors" data-page="document">
                    <i class="fa-solid fa-file-text w-5 h-5 flex-shrink-0"></i>
                    <span class="nav-text">方案文档</span>
                </a>
                <a href="#knowledge" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors" data-page="knowledge">
                    <i class="fa-solid fa-database w-5 h-5 flex-shrink-0"></i>
                    <span class="nav-text">私有资料AI化管理</span>
                </a>
            </nav>
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full gradient-bg flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-user text-white"></i>
                    </div>
                    <div class="nav-text">
                        <p class="text-sm font-medium text-gray-900">销售顾问</p>
                        <p class="text-xs text-gray-500">初级培训</p>
                    </div>
                </div>
            </div>
        </aside>
        
        <main id="main-content">
            <header class="gradient-bg text-white py-4 px-6 shadow-lg flex-shrink-0">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 id="page-title" class="text-xl font-semibold">AI驱动的销售智能培训平台</h2>
                        <p id="page-subtitle" class="text-white/80 text-sm mt-1">帮助新销售快速掌握需求收集与报价技巧</p>
                    </div>
                    <button id="quick-demo" class="bg-white text-purple-600 px-4 py-2 rounded-lg font-medium hover:bg-gray-100 transition-colors flex items-center gap-2 shadow-md">
                        <i class="fa-solid fa-fast-forward"></i>
                        <span>快速演示</span>
                    </button>
                </div>
            </header>
            <div id="page-container" class="scrollbar-thin">
            </div>
        </main>
    </div>
    
    <div id="toast-container" class="fixed bottom-6 right-6 z-50"></div>
    <div id="modal-container"></div>
    <script src="app.js"></script>
</body>
</html>
