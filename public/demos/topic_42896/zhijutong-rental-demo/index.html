<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>智居通租房 Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
  <!-- Header -->
  <header class="app-header">
    <h1>智居通</h1>
    <span class="role-badge" id="roleBadge">租客</span>
  </header>

  <!-- Content area -->
  <main id="mainContent">

    <!-- ===== 租客标签页 ===== -->

    <!-- 租客 - 搜索 -->
    <section id="tab-rent-search" class="tab-page">
      <div class="page-head">
        <h2>搜索房源</h2>
      </div>
      <div class="filter-bar">
        <input id="searchInput" type="search" placeholder="搜索区域、标题或标签">
        <div class="filter-row">
          <select id="priceFilter">
            <option value="all">全部价格</option>
            <option value="low">3000 元以下</option>
            <option value="mid">3000-6000 元</option>
            <option value="high">6000 元以上</option>
          </select>
          <select id="vrFilter">
            <option value="all">全部房源</option>
            <option value="vr">支持 VR</option>
            <option value="self">自助看房</option>
          </select>
        </div>
      </div>
      <div class="auth-bar" id="tenantAuthBar">
        <span id="tenantStatus" class="pill warn">未认证</span>
        <span>认证后可预约实地看房</span>
        <button id="verifyTenantBtn" class="btn-sm">完成认证</button>
      </div>
      <div id="listingGrid" class="listing-grid"></div>
    </section>

    <!-- 租客 - 预约 -->
    <section id="tab-rent-appointments" class="tab-page">
      <div class="page-head">
        <h2>我的预约</h2>
      </div>
      <div id="tenantApptList" class="appt-list"></div>
    </section>

    <!-- 租客 - 我的 -->
    <section id="tab-rent-profile" class="tab-page">
      <div class="page-head">
        <h2>我的</h2>
      </div>
      <div class="profile-card">
        <div class="avatar-placeholder">租</div>
        <div class="profile-info">
          <strong>租客用户</strong>
          <span id="tenantStatusProfile" class="pill warn">未认证</span>
        </div>
      </div>
      <div class="profile-actions">
        <button id="switchToLandlordBtn" class="primary-btn block-btn">切换到出租身份</button>
        <p class="hint">切换后可使用发布房源和查看预约功能</p>
      </div>
    </section>


    <!-- ===== 房主标签页 ===== -->

    <!-- 房主 - 发布 -->
    <section id="tab-landlord-publish" class="tab-page">
      <div class="page-head">
        <h2>发布房源</h2>
        <button id="resetDemoBtn" class="btn-ghost">重置</button>
      </div>
      <div class="auth-bar" id="landlordAuthBar">
        <span id="landlordStatus" class="pill warn">未认证</span>
        <span>认证后可提交房源</span>
        <button id="verifyLandlordBtn" class="btn-sm">完成认证</button>
      </div>
      <form id="listingForm" class="publish-form">
        <input name="title" required placeholder="房源标题，如：近地铁精装一居室">
        <input name="area" required placeholder="所在区域，如：海淀·西二旗">
        <div class="two-col">
          <input name="price" required type="number" min="1" placeholder="月租价格">
          <input name="size" required type="number" min="1" placeholder="面积(㎡)">
        </div>
        <input name="tags" placeholder="标签：近地铁,采光好,可养宠物">
        <textarea name="description" rows="3" placeholder="房源描述：交通、采光、家具、周边配套等"></textarea>
        <div class="dummy-row">
          <button type="button" id="attachVideoBtn" class="btn-outline">+ 添加 demo 视频</button>
          <button type="button" id="attachVrBtn" class="btn-outline">+ 添加 demo VR</button>
        </div>
        <div class="device-row">
          <label><input name="camera" type="checkbox" checked> 平台摄像头已接入</label>
          <label><input name="lock" type="checkbox" checked> 智能门锁已接入</label>
        </div>
        <button class="primary-btn block-btn" type="submit">提交平台审核</button>
      </form>
      <div class="audit-panel" id="auditPanel">
        <h3>平台模拟审核</h3>
        <div class="audit-items">
          <span>房源真实性 <strong>模拟通过</strong></span>
          <span>视频 / VR <strong id="mediaAuditStatus">等待上传</strong></span>
          <span>摄像头 <strong>dummy 在线</strong></span>
          <span>智能门锁 <strong>dummy 可用</strong></span>
        </div>
      </div>
      <div class="page-head" style="margin-top:1.5rem">
        <h3>已发布房源</h3>
      </div>
      <div id="landlordList" class="management-list"></div>
    </section>

    <!-- 房主 - 预约 -->
    <section id="tab-landlord-appointments" class="tab-page">
      <div class="page-head">
        <h2>收到的预约</h2>
      </div>
      <div id="landlordApptList" class="appt-list"></div>
    </section>

    <!-- 房主 - 我的 -->
    <section id="tab-landlord-profile" class="tab-page">
      <div class="page-head">
        <h2>我的</h2>
      </div>
      <div class="profile-card">
        <div class="avatar-placeholder">房</div>
        <div class="profile-info">
          <strong>房主用户</strong>
          <span id="landlordStatusProfile" class="pill warn">未认证</span>
        </div>
      </div>
      <div class="profile-actions">
        <button id="switchToTenantBtn" class="primary-btn block-btn">切换到租客身份</button>
        <p class="hint">切换后可浏览房源和预约看房</p>
      </div>
    </section>

  </main>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar" id="tabBar">

    <!-- 租客标签 -->
    <button class="tab-btn" data-tab="rent-search" data-role="rent">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="7"/><line x1="15.5" y1="15.5" x2="21" y2="21"/></svg>
      <span>搜索</span>
    </button>
    <button class="tab-btn" data-tab="rent-appointments" data-role="rent">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>预约</span>
    </button>
    <button class="tab-btn" data-tab="rent-profile" data-role="rent">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>我的</span>
    </button>

    <!-- 房主标签 -->
    <button class="tab-btn" data-tab="landlord-publish" data-role="landlord">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>发布</span>
    </button>
    <button class="tab-btn" data-tab="landlord-appointments" data-role="landlord">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>预约</span>
    </button>
    <button class="tab-btn" data-tab="landlord-profile" data-role="landlord">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>我的</span>
    </button>

  </nav>

  <!-- Dialog: 房源详情 -->
  <dialog id="listingDialog">
    <div class="dialog-top">
      <h2 id="dialogTitle">房源详情</h2>
      <button id="closeDialogBtn" class="icon-btn">&times;</button>
    </div>
    <div id="dialogBody"></div>
  </dialog>

  <!-- Dialog: 聊天 -->
  <dialog id="chatDialog">
    <div class="dialog-top">
      <h2>聊天</h2>
      <button id="closeChatBtn" class="icon-btn">&times;</button>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="chat-msg left">你好，我想了解一下这套房源的详细信息。</div>
      <div class="chat-msg right">没问题，有什么想了解的可以问。</div>
      <div class="chat-msg left">房间的采光怎么样？</div>
      <div class="chat-msg right">采光很好，南向，下午阳光充足。</div>
    </div>
    <div class="chat-input-row">
      <input id="chatInput" placeholder="输入消息..." disabled>
      <button class="btn-sm" disabled>发送</button>
    </div>
    <p class="hint" style="text-align:center;margin:0.5rem 0">demo 中聊天为静态示例</p>
  </dialog>

  <!-- Template -->
  <template id="listingCardTemplate">
    <article class="listing-card">
      <div class="listing-media">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span>Demo Video</span>
      </div>
      <div class="listing-body">
        <div class="listing-title-row">
          <h3></h3>
          <span class="price"></span>
        </div>
        <p class="listing-meta"></p>
        <p class="listing-desc"></p>
        <div class="tag-row"></div>
        <div class="card-actions">
          <button class="btn-outline detail-btn">详情</button>
          <button class="btn-primary appoint-btn">预约看房</button>
        </div>
      </div>
    </article>
  </template>

  <!-- Appointment item template -->
  <template id="apptItemTemplate">
    <div class="appt-item">
      <div class="appt-head">
        <strong class="appt-title"></strong>
        <span class="appt-time"></span>
      </div>
      <p class="appt-addr"></p>
      <p class="appt-password"></p>
      <div class="appt-foot">
        <span class="pill appt-status">已预约</span>
        <button class="btn-sm chat-btn">开启聊天</button>
      </div>
    </div>
  </template>

</div>

<script src="app.js"></script>
</body>
</html>
