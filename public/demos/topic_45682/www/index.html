<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药盾 - 家庭用药安全助手</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-primary:#0D9488;--color-primary-light:#CCFBF1;--color-primary-dark:#0F766E;
  --color-warning:#F59E0B;--color-warning-bg:#FFFBEB;
  --color-danger:#DC2626;--color-danger-bg:#FEF2F2;--color-danger-border:#FCA5A5;
  --color-success:#16A34A;--color-success-bg:#F0FDF4;
  --color-bg:#F8FAFC;--color-card:#fff;--color-text:#1E293B;--color-text-muted:#64748B;
  --color-text-light:#94A3B8;--color-border:#E2E8F0;--color-border-light:#F1F5F9;
  --radius-sm:8px;--radius:12px;--radius-lg:16px;--radius-xl:24px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(0,0,0,.1);
  --font-system:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --font-size-base:16px;--touch-target:44px;
}
body{
  font-family:var(--font-system);background:var(--color-bg);color:var(--color-text);
  line-height:1.6;font-size:var(--font-size-base);min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
body.large-font{
  --font-size-base:20px;--touch-target:48px;
}

/* ===== App Shell ===== */
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--color-card);position:relative;box-shadow:0 0 40px rgba(0,0,0,.08)}

/* ===== Header ===== */
.app-header{
  background:linear-gradient(135deg,#0D9488 0%,#0F766E 50%,#115E59 100%);
  color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);
}
.app-header .logo-area{display:flex;align-items:center;gap:10px}
.app-header .logo-icon{
  width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:1.4em;
}
.app-header h1{font-size:1.3em;font-weight:800;letter-spacing:.02em}
.app-header .header-actions{display:flex;gap:8px;align-items:center}
.btn-icon{
  background:rgba(255,255,255,.18);border:none;color:#fff;padding:8px 14px;
  border-radius:var(--radius-sm);cursor:pointer;font-size:.9em;font-weight:600;
  transition:all .2s;white-space:nowrap;min-height:var(--touch-target);
  display:inline-flex;align-items:center;gap:4px;backdrop-filter:blur(4px);
}
.btn-icon:hover{background:rgba(255,255,255,.3);transform:translateY(-1px)}
.btn-icon:focus-visible{outline:2px solid #fff;outline-offset:2px}
.btn-icon.active{background:rgba(255,255,255,.4);font-weight:700;box-shadow:0 0 8px rgba(255,255,255,.3)}
.btn-icon .font-size-indicator{font-size:1.1em;line-height:1}

/* ===== Main Content ===== */
.main-content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}
.main-content.tab-transition{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== Bottom Nav ===== */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--color-card);
  border-top:1px solid var(--color-border);display:flex;z-index:100;
  box-shadow:0 -4px 16px rgba(0,0,0,.06);padding:4px 0 env(safe-area-inset-bottom,4px);
}
.bottom-nav button{
  flex:1;padding:8px 4px;border:none;background:none;cursor:pointer;
  font-size:.72em;color:var(--color-text-muted);display:flex;
  flex-direction:column;align-items:center;gap:3px;transition:all .25s ease;
  position:relative;min-height:var(--touch-target);justify-content:center;
}
.bottom-nav button:focus-visible{outline:2px solid var(--color-primary);outline-offset:-2px;border-radius:var(--radius-sm)}
.bottom-nav button .tab-icon{font-size:1.6em;transition:transform .25s ease}
.bottom-nav button.active{color:var(--color-primary);font-weight:700}
.bottom-nav button.active .tab-icon{transform:scale(1.1)}
.bottom-nav button.active::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:3px;
  background:var(--color-primary);border-radius:0 0 3px 3px;
  transition:left .25s ease,right .25s ease;
}

/* ===== Loading & States ===== */
.loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:var(--color-card);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;gap:16px;
}
.loading-spinner-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--color-text-muted);gap:12px}
.spinner{width:40px;height:40px;border:3px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-sm{width:20px;height:20px;border-width:2px}
.empty-state{text-align:center;padding:48px 24px;color:var(--color-text-light)}
.empty-state .empty-icon{font-size:3.5em;margin-bottom:16px;opacity:.7}
.empty-state .empty-title{font-weight:700;font-size:1.05em;color:var(--color-text-muted);margin-bottom:6px}
.empty-state .empty-desc{font-size:.9em;line-height:1.6;margin:4px 0}
.error-state{text-align:center;padding:48px 24px;color:var(--color-danger);background:var(--color-danger-bg);border-radius:var(--radius);margin:12px 0;border:1px solid var(--color-danger-border)}
.error-state .error-icon{font-size:3em;margin-bottom:12px}
.error-state .error-title{font-weight:700;font-size:1.1em;margin-bottom:8px}
.error-state .error-desc{font-size:.9em;color:var(--color-text-muted);margin-bottom:16px}

/* ===== Cards ===== */
.card{background:var(--color-card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);border:1px solid var(--color-border);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-title{font-weight:700;font-size:1.05em}

/* ===== Buttons ===== */
.btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-size:.9em;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px;min-height:var(--touch-target);justify-content:center}
.btn:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--color-primary);color:#fff}
.btn-primary:hover{background:var(--color-primary-dark);box-shadow:var(--shadow)}
.btn-danger{background:#EF4444;color:#fff}
.btn-danger:hover{background:var(--color-danger);box-shadow:var(--shadow)}
.btn-outline{background:transparent;border:2px solid var(--color-primary);color:var(--color-primary)}
.btn-outline:hover{background:var(--color-primary-light)}
.btn-sm{padding:6px 14px;font-size:.8em;border-radius:var(--radius-sm);min-height:36px}
.btn-warning{background:var(--color-warning);color:#fff}
.btn-warning:hover{background:#D97706}
.btn-success{background:var(--color-success);color:#fff}
.btn-success:hover{background:#15803D}
.btn-retry{background:var(--color-danger);color:#fff;padding:12px 28px;border-radius:var(--radius);font-weight:700;border:none;cursor:pointer;font-size:1em;min-height:var(--touch-target);transition:all .2s}
.btn-retry:hover{background:#B91C1C;box-shadow:var(--shadow-md)}
.btn-retry:focus-visible{outline:2px solid var(--color-danger);outline-offset:2px}

/* ===== Member Selector ===== */
.member-selector{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.member-selector label{font-weight:700;white-space:nowrap;font-size:.95em}
.member-selector select{flex:1;padding:10px 12px;border:2px solid var(--color-border);border-radius:var(--radius);font-size:1em;background:var(--color-card);min-width:0;min-height:var(--touch-target);transition:border-color .2s}
.member-selector select:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(13,148,136,.15)}

/* ===== Scan Button ===== */
.scan-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--color-primary),#14B8A6);color:#fff;border:none;border-radius:var(--radius-lg);font-size:1.1em;font-weight:700;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;min-height:var(--touch-target);box-shadow:0 2px 12px rgba(13,148,136,.25)}
.scan-btn:hover{box-shadow:0 4px 16px rgba(13,148,136,.35);transform:translateY(-1px)}
.scan-btn:active{transform:scale(.98)}
.scan-btn:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}

/* ===== Search ===== */
.search-wrap{position:relative;margin-bottom:16px}
.search-input{width:100%;padding:12px 16px;border:2px solid var(--color-border);border-radius:var(--radius);font-size:1em;transition:all .2s;min-height:var(--touch-target);background:var(--color-card)}
.search-input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.autocomplete-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--color-card);
  border:1px solid var(--color-border);border-radius:var(--radius);max-height:260px;
  overflow-y:auto;z-index:50;box-shadow:var(--shadow-lg);
  opacity:0;visibility:hidden;transform:translateY(-8px);transition:all .2s ease;
}
.autocomplete-dropdown.show{opacity:1;visibility:visible;transform:translateY(0)}
.autocomplete-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--color-border-light);display:flex;justify-content:space-between;align-items:center;transition:background .15s;min-height:var(--touch-target)}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover,.autocomplete-item:focus{background:var(--color-primary-light)}
.autocomplete-item .drug-cat{font-size:.8em;color:var(--color-text-muted);background:var(--color-border-light);padding:3px 10px;border-radius:20px;white-space:nowrap}

/* ===== Drug Detail ===== */
.drug-detail{background:var(--color-bg);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;border:1px solid var(--color-border);animation:fadeIn .25s ease}
.drug-detail h3{color:var(--color-primary);margin-bottom:4px;font-size:1.2em;font-weight:700}
.drug-detail .generic{color:var(--color-text-muted);font-size:.9em;margin-bottom:12px}
.drug-detail .section{margin-top:14px}
.drug-detail .section-label{font-weight:700;font-size:.8em;color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.drug-detail .tag-list{display:flex;flex-wrap:wrap;gap:6px}
.drug-detail .tag{padding:4px 12px;border-radius:20px;font-size:.8em;background:#E0F2FE;color:#0369A1;font-weight:500}
.drug-detail .tag.contraindication{background:var(--color-danger-bg);color:var(--color-danger)}
.drug-detail .special-pop{margin-top:8px;padding:10px 14px;border-radius:var(--radius-sm);background:var(--color-warning-bg);border:1px solid #FDE68A;font-size:.85em;line-height:1.5}

/* ===== Drug List Card ===== */
.drug-list-item{
  display:flex;align-items:center;justify-content:space-between;padding:12px;
  border:1px solid var(--color-border);border-radius:var(--radius);margin-bottom:8px;
  background:var(--color-card);transition:all .2s;box-shadow:var(--shadow-sm);
}
.drug-list-item:hover{box-shadow:var(--shadow-md);border-color:var(--color-primary-light);transform:translateY(-1px)}
.drug-list-item .drug-info{flex:1;min-width:0}
.drug-list-item .drug-name{font-weight:700;font-size:.95em}
.drug-list-item .drug-meta{font-size:.8em;color:var(--color-text-muted)}
.drug-list-item .drug-actions{display:flex;gap:6px;flex-shrink:0}
.warning-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.warning-badge{font-size:.7em;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.warning-badge.food-high{background:var(--color-danger-bg);color:var(--color-danger)}
.warning-badge.food-medium{background:var(--color-warning-bg);color:#D97706}
.warning-badge.tcm-high{background:#FDF2F8;color:#BE185D}
.warning-badge.tcm-medium{background:#FDF2F8;color:#9D174D}

/* ===== Interaction Warnings ===== */
.interaction-banner{padding:14px 16px;border-radius:var(--radius);margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:8px;line-height:1.5}
.interaction-banner.high{background:var(--color-danger-bg);color:var(--color-danger);border:2px solid var(--color-danger-border);animation:pulseWarning 2s ease-in-out infinite}
.interaction-banner.medium{background:var(--color-warning-bg);color:#D97706;border:1px solid #FDE68A}
@keyframes pulseWarning{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.interaction-item{padding:12px 14px;border-radius:var(--radius);margin-bottom:8px;border-left:4px solid;transition:box-shadow .2s}
.interaction-item:hover{box-shadow:var(--shadow)}
.interaction-item.high{background:var(--color-danger-bg);border-color:#EF4444}
.interaction-item.medium{background:var(--color-warning-bg);border-color:var(--color-warning)}
.interaction-item.low{background:var(--color-bg);border-color:var(--color-text-light)}
.interaction-item .interaction-drugs{font-weight:700;margin-bottom:4px}
.interaction-item .interaction-mechanism{font-size:.85em;color:#475569;margin-bottom:4px}
.interaction-item .interaction-advice{font-size:.85em;color:var(--color-primary);font-weight:600}

/* ===== Family Members ===== */
.member-card{
  background:var(--color-card);border-radius:var(--radius);padding:16px;margin-bottom:10px;
  box-shadow:var(--shadow-sm);border:1px solid var(--color-border);cursor:pointer;
  transition:all .2s;
}
.member-card:hover{box-shadow:var(--shadow-md);border-color:var(--color-primary-light);transform:translateY(-1px)}
.member-card .member-header{display:flex;align-items:center;justify-content:space-between}
.member-card .member-name{font-weight:700;font-size:1.1em}
.member-card .member-detail{font-size:.85em;color:var(--color-text-muted);margin-top:4px}
.member-card .member-conditions{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.member-card .condition-tag{padding:3px 10px;border-radius:12px;font-size:.75em;background:var(--color-primary-light);color:var(--color-primary);border:1px solid #99F6E4;font-weight:500}
.member-card .member-actions{display:flex;gap:6px}
.member-expand{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--color-border);animation:fadeIn .2s ease}
.member-card.expanded .member-expand{display:block}
.personal-warning{padding:10px 14px;border-radius:var(--radius-sm);background:var(--color-warning-bg);border:1px solid #FDE68A;font-size:.85em;margin-bottom:8px;color:#92400E;line-height:1.5}

/* ===== AI Chat ===== */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 280px);min-height:400px}
.chat-messages{flex:1;overflow-y:auto;padding:8px 0;margin-bottom:12px}
.chat-empty{text-align:center;padding:32px 16px;color:var(--color-text-light)}
.chat-empty .chat-empty-icon{font-size:3em;margin-bottom:12px;opacity:.7}
.chat-empty .chat-empty-title{font-weight:700;font-size:1.05em;color:var(--color-text-muted);margin-bottom:12px}
.chat-empty .chat-empty-hints{font-size:.9em;line-height:2;text-align:left;display:inline-block}
.chat-bubble{max-width:85%;padding:12px 16px;border-radius:var(--radius-lg);margin-bottom:10px;font-size:.95em;line-height:1.55;word-break:break-word;animation:fadeIn .3s ease}
.chat-bubble.ai{background:var(--color-primary-light);border:1px solid #99F6E4;margin-right:auto;border-bottom-left-radius:4px}
.chat-bubble.user{background:var(--color-primary);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.chat-bubble .bubble-label{font-size:.75em;opacity:.7;margin-bottom:4px}
.quick-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.quick-chip{
  background:var(--color-border-light);border:1px solid var(--color-border);
  padding:8px 14px;border-radius:20px;font-size:.85em;cursor:pointer;
  transition:all .2s;white-space:nowrap;min-height:var(--touch-target);
  display:inline-flex;align-items:center;
}
.quick-chip:hover{background:var(--color-primary);color:#fff;border-color:var(--color-primary);transform:translateY(-1px)}
.quick-chip:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
.chat-input-wrap{display:flex;gap:8px}
.chat-input-wrap input{flex:1;padding:12px 16px;border:2px solid var(--color-border);border-radius:var(--radius-xl);font-size:.95em;min-height:var(--touch-target);transition:border-color .2s;background:var(--color-card)}
.chat-input-wrap input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.chat-input-wrap button{padding:10px 22px;border-radius:var(--radius-xl);background:var(--color-primary);color:#fff;border:none;font-weight:600;cursor:pointer;min-height:var(--touch-target);transition:all .2s}
.chat-input-wrap button:hover{background:var(--color-primary-dark);box-shadow:var(--shadow)}
.chat-input-wrap button:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
.ai-note{text-align:center;color:var(--color-text-light);font-size:.8em;margin-top:12px}

/* ===== Report ===== */
.score-gauge{width:160px;height:160px;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(var(--color-primary) var(--score-pct),var(--color-border) var(--score-pct))}
.score-gauge::before{content:'';position:absolute;width:120px;height:120px;border-radius:50%;background:var(--color-card)}
.score-value{position:relative;z-index:1;font-size:2.5em;font-weight:800;color:var(--color-primary)}
.score-label{text-align:center;font-size:.85em;color:var(--color-text-muted);margin-top:-4px;font-weight:600}
.report-section{margin-bottom:20px}
.report-section h3{color:var(--color-primary);margin-bottom:10px;font-size:1em;font-weight:700}
.report-highlight{padding:14px 16px;background:var(--color-danger-bg);border-radius:var(--radius);border:1px solid #FECACA;margin-bottom:8px;line-height:1.5}
.report-highlight .label{font-size:.8em;color:var(--color-text-muted)}
.report-highlight .value{font-weight:700;color:var(--color-danger);font-size:1.1em}
.report-empty{text-align:center;padding:48px 24px;color:var(--color-text-light)}
.report-empty .report-empty-icon{font-size:3.5em;margin-bottom:16px;opacity:.7}
.report-empty .report-empty-title{font-weight:700;font-size:1.05em;color:var(--color-text-muted);margin-bottom:6px}
.report-empty .report-empty-desc{font-size:.9em;line-height:1.6}

/* ===== Modal ===== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal{background:var(--color-card);width:100%;max-width:480px;max-height:85vh;border-radius:20px 20px 0 0;overflow-y:auto;padding:24px 20px 32px;animation:slideUp .3s ease;position:relative}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:1.2em;margin-bottom:16px;color:var(--color-primary);text-align:center;font-weight:700}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.5em;cursor:pointer;color:var(--color-text-light);padding:8px;min-height:var(--touch-target);min-width:var(--touch-target);display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
.modal-close:hover{background:var(--color-border-light);color:var(--color-text)}
.modal-close:focus-visible{outline:2px solid var(--color-primary);outline-offset:-2px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* ===== Form Elements ===== */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-weight:700;font-size:.85em;color:#475569;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:2px solid var(--color-border);border-radius:var(--radius);font-size:.95em;transition:all .2s;min-height:var(--touch-target);background:var(--color-card);font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.condition-options{display:flex;flex-wrap:wrap;gap:6px}
.condition-option{padding:8px 16px;border-radius:20px;border:2px solid var(--color-border);cursor:pointer;font-size:.85em;transition:all .2s;user-select:none;min-height:var(--touch-target);display:inline-flex;align-items:center}
.condition-option:hover{border-color:var(--color-primary);background:var(--color-primary-light)}
.condition-option:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
.condition-option.selected{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}

/* ===== Camera Preview ===== */
.camera-preview{width:100%;border-radius:var(--radius);overflow:hidden;margin-bottom:12px;background:#000;position:relative;min-height:200px}
.camera-preview video{width:100%;display:block}
.camera-fallback{text-align:center;padding:20px;color:var(--color-text-muted)}

/* ===== Reminder ===== */
.reminder-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--color-border);border-radius:var(--radius);margin-bottom:8px;background:var(--color-card);transition:box-shadow .2s}
.reminder-item:hover{box-shadow:var(--shadow)}
.reminder-item .reminder-info{flex:1;min-width:0}
.reminder-item .reminder-drug{font-weight:700}
.reminder-item .reminder-meta{font-size:.8em;color:var(--color-text-muted)}
.reminder-toggle{width:48px;height:26px;border-radius:13px;background:#CBD5E1;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.reminder-toggle:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
.reminder-toggle.enabled{background:var(--color-primary)}
.reminder-toggle::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.reminder-toggle.enabled::after{transform:translateX(22px)}

/* ===== Disclaimer ===== */
.disclaimer{text-align:center;padding:12px 16px;font-size:.75em;color:var(--color-text-light);background:var(--color-bg);border-top:1px solid var(--color-border)}

/* ===== Toast ===== */
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px;pointer-events:none}
.toast{
  background:var(--color-success);color:#fff;padding:12px 20px;border-radius:var(--radius);
  font-weight:600;font-size:.9em;box-shadow:var(--shadow-lg);pointer-events:auto;
  animation:toastIn .3s ease,toastOut .3s ease 2.2s forwards;
  text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;
}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-20px)}}

/* ===== Utility ===== */
.hidden{display:none!important}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.text-center{text-align:center}.text-sm{font-size:.85em}.text-muted{color:var(--color-text-muted)}

/* ===== Section Title ===== */
.section-title{font-weight:700;margin:16px 0 8px;color:var(--color-primary);font-size:1em;display:flex;align-items:center;gap:6px}

/* ===== Large Font Mode ===== */
body.large-font .btn{min-height:48px;padding:12px 24px}
body.large-font .btn-sm{min-height:40px;padding:8px 16px}
body.large-font .card{padding:20px}
body.large-font .drug-list-item{padding:16px}
body.large-font .member-card{padding:20px}
body.large-font .drug-detail{padding:24px}
body.large-font .modal{padding:28px 24px 36px}
body.large-font .search-input{padding:14px 18px}
body.large-font .chat-bubble{padding:14px 18px}
body.large-font .chat-input-wrap input{padding:14px 18px}
body.large-font .autocomplete-item{padding:14px 18px}
body.large-font .form-group input,.body.large-font .form-group select,.body.large-font .form-group textarea{padding:12px 16px}
body.large-font .condition-option{padding:10px 18px}
body.large-font .reminder-item{padding:14px 16px}
body.large-font .interaction-item{padding:14px 16px}
body.large-font .quick-chip{padding:10px 18px}
body.large-font .bottom-nav button{padding:10px 4px;font-size:.8em}
body.large-font h3{font-size:1.2em}
body.large-font .drug-detail h3{font-size:1.35em}

/* ===== Responsive ===== */
@media(max-width:375px){
  .app-header{padding:12px 12px}
  .app-header h1{font-size:1.1em}
  .app-header .logo-icon{width:32px;height:32px;font-size:1.2em}
  .btn{font-size:.8em;padding:8px 14px}
  .drug-detail{padding:16px}
  .main-content{padding:12px;padding-bottom:76px}
  .modal{border-radius:16px 16px 0 0;padding:20px 16px 28px}
  .modal-overlay{align-items:flex-end}
  .empty-state{padding:36px 16px}
  .section-title{font-size:.95em}
}
@media(max-width:480px){
  .modal{max-height:92vh;border-radius:16px 16px 0 0}
}
@media(min-width:481px){
  .modal{border-radius:var(--radius-lg);margin-bottom:20px}
}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header class="app-header">
    <div class="logo-area">
      <div class="logo-icon">🛡️</div>
      <h1>药盾</h1>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="fontToggle" title="切换大字模式" aria-label="切换大字模式">
        <span class="font-size-indicator" id="fontToggleLabel">A⁺</span>
      </button>
    </div>
  </header>

  <!-- Loading -->
  <div id="loadingState" class="loading-overlay">
    <div class="spinner"></div>
    <p style="font-weight:600;color:var(--color-text-muted)">正在加载药品数据库...</p>

  <!-- Error State -->

<!-- Modals -->
<div class="modal-overlay hidden" id="scanModal" role="dialog" aria-modal="true" aria-label="扫码识药">

    <button class="modal-close" onclick="closeModal('scanModal')" aria-label="关闭">✕</button>

      <video id="cameraVideo" autoplay playsinline></video>
    </div>

    <div id="scanFallback" class="camera-fallback hidden">
      <p>摄像头不可用或浏览器不支持扫码</p>

    </div>
    <div class="modal-actions">

</div>

<div class="modal-overlay hidden" id="reminderModal" role="dialog" aria-modal="true" aria-label="设置用药提醒">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('reminderModal')" aria-label="关闭">✕</button>
    <h2>⏰ 设置用药提醒</h2>
    <div class="form-group">
      <label for="reminderDrugName">药品</label>

    <div class="form-group">

<div class="modal-overlay hidden" id="memberModal" role="dialog" aria-modal="true" aria-label="添加家人">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('memberModal')" aria-label="关闭">✕</button>
    <h2 id="memberModalTitle">👤 添加家人</h2>
    <input type="hidden" id="editMemberId">
    <div class="form-group">
      <label for="memberName">姓名</label>
      <input type="text" id="memberName" placeholder="请输入姓名">

      <label for="memberAge">年龄</label>
      <input type="number" id="memberAge" placeholder="请输入年龄" min="0" max="120">
    </div>
    <div class="form-group">
      <label>慢性病（可多选）</label>
      <div class="condition-options" id="conditionOptions" role="group" aria-label="慢性病选择">
        <span class="condition-option" data-val="高血压" tabindex="0" role="checkbox" aria-checked="false">高血压</span>
        <span class="condition-option" data-val="糖尿病" tabindex="0" role="checkbox" aria-checked="false">糖尿病</span>
        <span class="condition-option" data-val="冠心病" tabindex="0" role="checkbox" aria-checked="false">冠心病</span>
        <span class="condition-option" data-val="肾病" tabindex="0" role="checkbox" aria-checked="false">肾病</span>
        <span class="condition-option" data-val="肝病" tabindex="0" role="checkbox" aria-checked="false">肝病</span>
        <span class="condition-option" data-val="过敏体质" tabindex="0" role="checkbox" aria-checked="false">过敏体质</span>
      </div>
    </div>
    <div class="form-group">
      <label for="memberAllergies">过敏史</label>
      <input type="text" id="memberAllergies" placeholder="例如：青霉素过敏">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('memberModal')">取消</button>

<script src="config.js"></script>
<script>
// ==================== STATE ====================
let drugsDB = [];
let members = [];
let reminders = [];
let currentMemberId = null;
let currentTab = 'meds';
let largeFont = false;
let reminderInterval = null;
let currentCameraStream = null;
let pendingReminderDrug = null;

// ==================== PERSISTENCE ====================
function loadState() {
  try {
    members = JSON.parse(localStorage.getItem('ms_members') || '[]');
    reminders = JSON.parse(localStorage.getItem('ms_reminders') || '[]');
    currentMemberId = localStorage.getItem('ms_currentMember') || null;
    largeFont = localStorage.getItem('ms_largeFont') === 'true';
    currentTab = localStorage.getItem('ms_currentTab') || 'meds';
  } catch(e) {
    members = [];
    reminders = [];
    currentMemberId = null;
  }
}

function saveState() {
  localStorage.setItem('ms_members', JSON.stringify(members));
  localStorage.setItem('ms_reminders', JSON.stringify(reminders));
  localStorage.setItem('ms_currentMember', currentMemberId || '');
  localStorage.setItem('ms_largeFont', largeFont);
  localStorage.setItem('ms_currentTab', currentTab);
}

// ==================== DRUG HELPERS ====================
function findDrugById(id) {
  return drugsDB.find(d => d.id === id);
}

function findDrugByName(name) {
  const n = name.trim();
  return drugsDB.find(d =>
    d.name === n || d.generic_name === n || d.common_names.includes(n)
  );
}

function searchDrugs(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  return drugsDB.filter(d =>
    d.name.toLowerCase().includes(q) ||
    d.generic_name.toLowerCase().includes(q) ||
    d.common_names.some(cn => cn.toLowerCase().includes(q)) ||
    d.category.toLowerCase().includes(q)
  ).slice(0, 10);
}

// ==================== INTERACTIONS ====================
function detectAllInteractions(memberDrugs) {
  const pairs = [];
  const seen = new Set();
  for (const drugA of memberDrugs) {
    if (!drugA.interactions) continue;
    for (const ia of drugA.interactions) {
      const drugB = memberDrugs.find(d =>
        d.id !== drugA.id &&
        (d.name === ia.target || d.generic_name === ia.target || d.common_names.includes(ia.target))
      );
      if (drugB) {
        const key = [drugA.id, drugB.id].sort().join('-');
        if (!seen.has(key)) {
          seen.add(key);
          pairs.push({ drugA, drugB, interaction: ia });
        }
      }
    }
  }
  pairs.sort((a, b) => {
    const order = { high: 0, medium: 1, low: 2 };
    return (order[a.interaction.level] || 2) - (order[b.interaction.level] || 2);
  });
  return pairs;
}

function getMemberDrugObjects(memberId) {
  const member = members.find(m => m.id === memberId);
  if (!member || !member.drugs) return [];
  return member.drugs.map(did => findDrugById(did)).filter(Boolean);
}

// ==================== PERSONALIZED WARNINGS ====================
function getPersonalWarnings(member, drug) {
  const warnings = [];
  if (!drug.special_populations) return warnings;
  const sp = drug.special_populations;
  const age = member.age || 0;

  if (age >= 65 && sp.elderly) {
    warnings.push({ type: 'elderly', text: '👴 老年人：' + sp.elderly });
  }
  if (age < 18 && sp.children) {
    warnings.push({ type: 'children', text: '👶 儿童：' + sp.children });
  }
  if (sp.pregnant && (member.conditions || []).some(c => c.includes('孕'))) {
    warnings.push({ type: 'pregnant', text: '🤰 备孕/孕期：' + sp.pregnant });
  }
  if (sp.lactating && (member.conditions || []).some(c => c.includes('哺乳'))) {
    warnings.push({ type: 'lactating', text: '🤱 哺乳期：' + sp.lactating });
  }
  if (age >= 65 && (member.conditions || []).includes('高血压') && drug.category === '感冒药') {
    const hasNSAID = drug.name.includes('布洛芬') || drug.name.includes('双氯芬酸');
    if (hasNSAID) {
      warnings.push({ type: 'condition', text: '⚠️ 高血压患者慎用非甾体抗炎药，可能影响血压控制' });
    }
  }
  return warnings;
}

// ==================== TOAST ====================
function showToast(message, icon) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `${icon || '✅'} ${message}`;
  container.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2600);
}

// ==================== RENDER ====================
function render() {
  const main = document.getElementById('mainContent');
  main.classList.add('tab-transition');
  setTimeout(() => main.classList.remove('tab-transition'), 260);
  switch (currentTab) {
    case 'meds': renderMedsTab(main); break;
    case 'family': renderFamilyTab(main); break;
    case 'ai': renderAITab(main); break;
    case 'report': renderReportTab(main); break;
  }
}

function renderMedsTab(main) {
  // Ensure a member exists
  if (members.length === 0) {
    const defaultMember = {
      id: 'member_' + Date.now(),
      name: '我',
      age: 35,
      conditions: [],
      allergies: '',
      drugs: []
    };
    members.push(defaultMember);
    currentMemberId = defaultMember.id;
    saveState();
  }
  if (!currentMemberId || !members.find(m => m.id === currentMemberId)) {
    currentMemberId = members[0].id;
    saveState();
  }

  const currentMember = members.find(m => m.id === currentMemberId);
  const memberDrugs = getMemberDrugObjects(currentMemberId);
  const interactions = detectAllInteractions(memberDrugs);
  const highInteractions = interactions.filter(i => i.interaction.level === 'high');
  const mediumInteractions = interactions.filter(i => i.interaction.level === 'medium');

  let html = '';

  // Member selector
  html += '<div class="member-selector">';
  html += '<label for="memberSelect">当前成员：</label>';
  html += '<select id="memberSelect" onchange="switchMember(this.value)" aria-label="选择当前成员">';
  members.forEach(m => {
    html += `<option value="${m.id}" ${m.id === currentMemberId ? 'selected' : ''}>${escHtml(m.name)}</option>`;
  });
  html += '</select>';
  html += '</div>';

  // Scan button
  html += `<button class="scan-btn" onclick="openScan()" aria-label="扫码识别药品">📷 扫码识别药品</button>`;

  // Search
  html += `<div class="search-wrap">
    <input type="text" class="search-input" id="drugSearch" placeholder="🔍 搜索药品名称..." oninput="handleSearchInput(this.value)" onfocus="handleSearchInput(this.value)" autocomplete="off" aria-label="搜索药品">
    <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
  </div>`;

  // Drug detail placeholder (hidden by default)
  html += `<div id="drugDetailPlaceholder"></div>`;

  // Interaction warnings
  if (highInteractions.length > 0) {
    html += `<div class="interaction-banner high">
      ⚠️ 检测到 <strong>${highInteractions.length}</strong> 个高风险药物相互作用！请立即咨询医生！
    </div>`;
  } else if (mediumInteractions.length > 0) {
    html += `<div class="interaction-banner medium">
      ⚡ 检测到 <strong>${mediumInteractions.length}</strong> 个中等风险药物相互作用，建议关注。
    </div>`;
  }

  // Current drug list
  html += '<h3 class="section-title">💊 ' + escHtml(currentMember.name) + '的药品列表</h3>';

  if (memberDrugs.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-icon">💊</div>
      <div class="empty-title">还没有添加药品</div>
      <div class="empty-desc">扫码或搜索药品，然后添加到列表中吧</div>
    </div>`;
  } else {
    memberDrugs.forEach(drug => {
      html += `<div class="drug-list-item">
        <div class="drug-info">
          <div class="drug-name">${escHtml(drug.name)}</div>
          <div class="drug-meta">${escHtml(drug.category)} · ${escHtml(drug.type)}</div>`;
      // Food warnings
      if (drug.food_warnings && drug.food_warnings.length > 0) {
        html += '<div class="warning-badges">';
        drug.food_warnings.forEach(fw => {
          const cls = fw.risk === 'high' ? 'food-high' : 'food-medium';
          html += `<span class="warning-badge ${cls}" title="${escHtml(fw.detail)}">🍽️ ${escHtml(fw.food)}</span>`;
        });
        html += '</div>';
      }
      // TCM warnings
      if (drug.tcm_warnings && drug.tcm_warnings.length > 0) {
        html += '<div class="warning-badges">';
        drug.tcm_warnings.forEach(tw => {
          const cls = tw.level === 'high' ? 'tcm-high' : 'tcm-medium';
          html += `<span class="warning-badge ${cls}" title="${escHtml(tw.mechanism)}">🌿 ${escHtml(tw.tcm_name)}</span>`;
        });
        html += '</div>';
      }
      html += `</div>
        <div class="drug-actions">
          <button class="btn btn-sm btn-outline" onclick="openReminder('${drug.id}')">⏰</button>
          <button class="btn btn-sm btn-danger" onclick="removeDrug('${drug.id}')">✕</button>
        </div>
      </div>`;
    });
  }

  // Interaction list
  if (interactions.length > 0) {
    html += '<h3 class="section-title">⚠️ 药物相互作用</h3>';
    interactions.forEach(ip => {
      const levelIcon = ip.interaction.level === 'high' ? '🔴' : ip.interaction.level === 'medium' ? '🟡' : '🟢';
      html += `<div class="interaction-item ${ip.interaction.level}">
        <div class="interaction-drugs">${levelIcon} ${escHtml(ip.drugA.name)} ↔ ${escHtml(ip.drugB.name)} <span style="font-size:.8em">(${ip.interaction.level === 'high' ? '高风险' : ip.interaction.level === 'medium' ? '中风险' : '低风险'})</span></div>
        <div class="interaction-mechanism">${escHtml(ip.interaction.mechanism)}</div>
        <div class="interaction-advice">💡 ${escHtml(ip.interaction.advice)}</div>
      </div>`;
    });
  }

  // Reminders section
  const memberReminders = reminders.filter(r => r.memberId === currentMemberId);
  if (memberReminders.length > 0) {
    html += '<h3 class="section-title">⏰ 用药提醒</h3>';
    memberReminders.forEach(r => {
      html += `<div class="reminder-item">
        <div class="reminder-info">
          <div class="reminder-drug">${escHtml(r.drugName)}</div>
          <div class="reminder-meta">⏰ ${r.time} · 💊 ${escHtml(r.dosage)}</div>
        </div>
        <button class="reminder-toggle ${r.enabled ? 'enabled' : ''}" onclick="toggleReminder('${r.id}')" title="${r.enabled ? '已启用' : '已禁用'}"></button>
      </div>`;
    });
  }

  main.innerHTML = html;
}

function renderFamilyTab(main) {
  let html = '';
  html += `<button class="btn btn-primary mb-12" onclick="openMemberModal()" style="width:100%">➕ 添加家人</button>`;

  if (members.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-icon">👨‍👩‍👧‍👦</div>
      <div class="empty-title">还没有添加家人</div>
      <div class="empty-desc">点击上方按钮添加家人信息吧</div>
    </div>`;
  } else {
    members.forEach(member => {
      const memberDrugs = getMemberDrugObjects(member.id);
      const interactions = detectAllInteractions(memberDrugs);
      const highCount = interactions.filter(i => i.interaction.level === 'high').length;

function renderReportTab(main) {
  // Gather all interactions across all members
  let allHigh = [];
  let allMedium = [];
  let allLow = [];
  let totalDrugs = 0;
  const memberScores = [];

  members.forEach(member => {
    const memberDrugs = getMemberDrugObjects(member.id);
    totalDrugs += memberDrugs.length;
    const interactions = detectAllInteractions(memberDrugs);
    const high = interactions.filter(i => i.interaction.level === 'high');
    const medium = interactions.filter(i => i.interaction.level === 'medium');
    const low = interactions.filter(i => i.interaction.level === 'low');
    allHigh.push(...high.map(i => ({ ...i, memberName: member.name })));
    allMedium.push(...medium.map(i => ({ ...i, memberName: member.name })));
    allLow.push(...low.map(i => ({ ...i, memberName: member.name })));
    memberScores.push({ name: member.name, high: high.length, medium: medium.length });
  });

  const score = Math.max(0, 100 - allHigh.length * 15 - allMedium.length * 5);
  const scorePct = score + '%';
  const scoreColor = score >= 80 ? '#0D9488' : score >= 50 ? '#F59E0B' : '#ef4444';

  const highestMember = memberScores.sort((a, b) => b.high - a.high)[0];
  const highestPair = [...allHigh, ...allMedium].sort((a, b) => {
    const o = { high: 0, medium: 1, low: 2 };
    return (o[a.interaction.level] || 2) - (o[b.interaction.level] || 2);
  })[0];

  let html = '';

  // Score gauge
  html += `<div class="score-gauge" style="--score-pct:${scorePct}">
    <div class="score-value" style="color:${scoreColor}">${score}</div>
  </div>`;
  html += `<div class="score-label">家庭用药安全评分</div>`;
  html += `<p class="text-center text-sm text-muted mt-8">基于 ${totalDrugs} 种药品、${allHigh.length} 个高风险、${allMedium.length} 个中风险相互作用计算</p>`;

  // Highest risk member
  if (highestMember && highestMember.high > 0) {
    html += `<div class="report-section mt-16">
      <h3>🔴 最高风险成员</h3>
      <div class="report-highlight">
        <div class="label">成员</div>
        <div class="value">${escHtml(highestMember.name)}</div>
        <div class="text-sm text-muted">${highestMember.high} 个高风险 · ${highestMember.medium} 个中风险相互作用</div>
      </div>
    </div>`;
  }

  // Highest risk pair
  if (highestPair) {
    html += `<div class="report-section">
      <h3>⚠️ 最高风险药物组合</h3>
      <div class="report-highlight">
        <div class="label">药物组合</div>
        <div class="value">${escHtml(highestPair.drugA.name)} ↔ ${escHtml(highestPair.drugB.name)}</div>
        <div class="text-sm text-muted">${escHtml(highestPair.memberName)} · ${highestPair.interaction.level === 'high' ? '高风险' : '中风险'}</div>
        <div class="text-sm mt-8">${escHtml(highestPair.interaction.mechanism)}</div>
      </div>
    </div>`;
  }

  // All interactions
  const allInteractions = [...allHigh, ...allMedium, ...allLow];
  if (allInteractions.length > 0) {
    html += `<div class="report-section">
      <h3>📋 全部相互作用列表</h3>`;
    allInteractions.forEach(ip => {
      const icon = ip.interaction.level === 'high' ? '🔴' : ip.interaction.level === 'medium' ? '🟡' : '🟢';
      html += `<div class="interaction-item ${ip.interaction.level}" style="font-size:.85em">
        <div><strong>${icon} ${escHtml(ip.drugA.name)} ↔ ${escHtml(ip.drugB.name)}</strong> <span class="text-muted">(${escHtml(ip.memberName)})</span></div>
        <div class="interaction-mechanism">${escHtml(ip.interaction.mechanism)}</div>
        <div class="interaction-advice">💡 ${escHtml(ip.interaction.advice)}</div>
      </div>`;
    });
    html += `</div>`;
  } else if (totalDrugs === 0) {
    html += `<div class="report-empty">
      <div class="report-empty-icon">📊</div>
      <div class="report-empty-title">暂无用药数据</div>
      <div class="report-empty-desc">添加药品后自动生成安全评分报告</div>
    </div>`;
  } else {
    html += `<div class="text-center mt-16" style="color:#0D9488;font-weight:600">✅ 未检测到药物相互作用，用药安全！</div>`;
  }

  // Export button
  html += `<button class="btn btn-primary mt-16" style="width:100%" onclick="exportReport()">📤 导出报告</button>`;

  main.innerHTML = html;
}

function switchMember(id) {
  currentMemberId = id;
  saveState();
  render();
}

function handleSearchInput(query) {
  const dropdown = document.getElementById('autocompleteDropdown');
  if (!dropdown) return;
  if (!query || query.trim().length < 1) {
    dropdown.classList.remove('show');
    return;
  }
  const results = searchDrugs(query);
  if (results.length === 0) {
    dropdown.innerHTML = '<div class="autocomplete-item" style="color:#94a3b8;cursor:default">未找到匹配药品</div>';
    dropdown.classList.add('show');
    return;
  }
  dropdown.innerHTML = results.map(d =>
    `<div class="autocomplete-item" onclick="selectDrug('${d.id}')" tabindex="0" role="option" aria-label="${escHtml(d.name)}">
      <span>${escHtml(d.name)}</span>
      <span class="drug-cat">${escHtml(d.category)}</span>
    </div>`
  ).join('');
  dropdown.classList.add('show');
}

function selectDrug(drugId) {
  const drug = findDrugById(drugId);
  if (!drug) return;
  const dropdown = document.getElementById('autocompleteDropdown');
  if (dropdown) { dropdown.classList.remove('show'); }
  const searchInput = document.getElementById('drugSearch');
  if (searchInput) searchInput.value = '';

  showDrugDetail(drug);
}

function showDrugDetail(drug) {
  const placeholder = document.getElementById('drugDetailPlaceholder');
  if (!placeholder) return;

  let html = `<div class="drug-detail">
    <div class="flex-between">
      <div>
        <h3>${escHtml(drug.name)}</h3>
        <div class="generic">${escHtml(drug.generic_name)} · ${escHtml(drug.category)} · ${escHtml(drug.type)} · ${escHtml(drug.prescription)}药</div>
      </div>
      <button class="btn btn-sm btn-danger" onclick="closeDrugDetail()">✕</button>
    </div>`;

  if (drug.indications && drug.indications.length > 0) {
    html += `<div class="section"><div class="section-label">适应症</div><div class="tag-list">${drug.indications.map(i => `<span class="tag">${escHtml(i)}</span>`).join('')}</div></div>`;
  }
  if (drug.contraindications && drug.contraindications.length > 0) {
    html += `<div class="section"><div class="section-label">禁忌症</div><div class="tag-list">${drug.contraindications.map(c => `<span class="tag contraindication">${escHtml(c)}</span>`).join('')}</div></div>`;
  }

  // Special populations
  if (drug.special_populations) {
    html += `<div class="section"><div class="section-label">特殊人群用药</div>`;
    const sp = drug.special_populations;
    if (sp.elderly) html += `<div class="special-pop">👴 <strong>老年人：</strong>${escHtml(sp.elderly)}</div>`;
    if (sp.children) html += `<div class="special-pop">👶 <strong>儿童：</strong>${escHtml(sp.children)}</div>`;
    if (sp.pregnant) html += `<div class="special-pop">🤰 <strong>孕妇：</strong>${escHtml(sp.pregnant)}</div>`;
    if (sp.lactating) html += `<div class="special-pop">🤱 <strong>哺乳期：</strong>${escHtml(sp.lactating)}</div>`;
    html += `</div>`;
  }

  // Food warnings
  if (drug.food_warnings && drug.food_warnings.length > 0) {
    html += `<div class="section"><div class="section-label">🍽️ 饮食禁忌</div>`;
    drug.food_warnings.forEach(fw => {
      html += `<div class="special-pop" style="background:${fw.risk === 'high' ? '#fef2f2' : '#fffbeb'};border-color:${fw.risk === 'high' ? '#fca5a5' : '#fde68a'}">
        <strong>${fw.risk === 'high' ? '🔴' : '🟡'} ${escHtml(fw.food)}：</strong>${escHtml(fw.detail)}
      </div>`;
    });
    html += `</div>`;
  }

  html += `<button class="btn btn-primary mt-12" onclick="addDrugToMember('${drug.id}')" style="width:100%">➕ 添加到${escHtml(members.find(m => m.id === currentMemberId)?.name || '当前成员')}的药品列表</button>`;
  html += `</div>`;

  placeholder.innerHTML = html;
  placeholder.scrollIntoView({ behavior: 'smooth' });
}

function closeDrugDetail() {
  const placeholder = document.getElementById('drugDetailPlaceholder');
  if (placeholder) placeholder.innerHTML = '';
}

function addDrugToMember(drugId) {
  if (!currentMemberId) return;
  const member = members.find(m => m.id === currentMemberId);
  if (!member) return;
  if (!member.drugs) member.drugs = [];
  if (member.drugs.includes(drugId)) {
    showToast('该药品已在列表中', '⚠️');
    return;
  }
  member.drugs.push(drugId);
  saveState();
  closeDrugDetail();
  const drug = findDrugById(drugId);
  showToast('已添加 ' + (drug ? drug.name : '药品') + ' 到' + member.name + '的药品列表', '✅');
  render();
}

function removeDrug(drugId) {
  if (!currentMemberId) return;
  const member = members.find(m => m.id === currentMemberId);
  if (!member) return;
  member.drugs = member.drugs.filter(d => d !== drugId);
  // Also remove related reminders
  reminders = reminders.filter(r => !(r.memberId === currentMemberId && r.drugId === drugId));
  saveState();
  render();
}

function openReminder(drugId) {
  const drug = findDrugById(drugId);
  if (!drug) return;
  pendingReminderDrug = { id: drugId, name: drug.name };
  document.getElementById('reminderDrugName').value = drug.name;
  document.getElementById('reminderTime').value = '08:00';
  document.getElementById('reminderDosage').value = '1片';
  document.getElementById('saveReminderBtn').onclick = saveReminder;
  document.getElementById('reminderModal').classList.remove('hidden');
}

function saveReminder() {
  if (!pendingReminderDrug || !currentMemberId) return;
  const time = document.getElementById('reminderTime').value;
  const dosage = document.getElementById('reminderDosage').value;
  if (!time) { showToast('请设置提醒时间', '⚠️'); return; }
  reminders.push({
    id: 'rem_' + Date.now(),
    memberId: currentMemberId,
    drugId: pendingReminderDrug.id,
    drugName: pendingReminderDrug.name,
    time: time,
    dosage: dosage || '1片',
    enabled: true
  });
  saveState();
  closeModal('reminderModal');
  render();
  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function toggleReminder(reminderId) {
  const r = reminders.find(r => r.id === reminderId);
  if (r) {
    r.enabled = !r.enabled;
    saveState();
    render();
  }
}

// ==================== MEMBER MANAGEMENT ====================
function openMemberModal(memberId) {
  const modal = document.getElementById('memberModal');
  const title = document.getElementById('memberModalTitle');
  const saveBtn = document.getElementById('saveMemberBtn');
  document.getElementById('editMemberId').value = '';

  if (memberId) {
    const member = members.find(m => m.id === memberId);
    if (!member) return;
    title.textContent = '✏️ 编辑家人';
    document.getElementById('editMemberId').value = memberId;
    document.getElementById('memberName').value = member.name;
    document.getElementById('memberAge').value = member.age || '';
    document.getElementById('memberAllergies').value = member.allergies || '';
    // Reset conditions
    document.querySelectorAll('#conditionOptions .condition-option').forEach(el => {
      const isSelected = (member.conditions || []).includes(el.dataset.val);
      el.classList.toggle('selected', isSelected);
      el.setAttribute('aria-checked', isSelected);
    });
  } else {
    title.textContent = '👤 添加家人';
    document.getElementById('memberName').value = '';
    document.getElementById('memberAge').value = '';
    document.getElementById('memberAllergies').value = '';
    document.querySelectorAll('#conditionOptions .condition-option').forEach(el => {
      el.classList.remove('selected');
      el.setAttribute('aria-checked', 'false');
    });
  }

  saveBtn.onclick = saveMember;
  modal.classList.remove('hidden');
}

function saveMember() {
  const editId = document.getElementById('editMemberId').value;
  const name = document.getElementById('memberName').value.trim();
  const age = parseInt(document.getElementById('memberAge').value) || 0;
  const allergies = document.getElementById('memberAllergies').value.trim();
  const conditions = [];
  document.querySelectorAll('#conditionOptions .condition-option.selected').forEach(el => conditions.push(el.dataset.val));

  if (!name) { showToast('请输入姓名', '⚠️'); return; }

  if (editId) {
    const member = members.find(m => m.id === editId);
    if (member) {
      member.name = name;
      member.age = age;
      member.conditions = conditions;
      member.allergies = allergies;
    }
  } else {
    members.push({
      id: 'member_' + Date.now(),
      name, age, conditions, allergies,
      drugs: []
    });
  }

  saveState();
  closeModal('memberModal');
  if (!currentMemberId) { currentMemberId = members[members.length - 1].id; saveState(); }
  render();
}

function deleteMember(memberId) {
  if (!confirm('确定要删除该成员吗？相关药品记录和提醒也将被删除。')) return;
  members = members.filter(m => m.id !== memberId);
  reminders = reminders.filter(r => r.memberId !== memberId);
  if (currentMemberId === memberId) {
    currentMemberId = members.length > 0 ? members[0].id : null;
  }
  saveState();
  render();
}

function toggleMemberCard(memberId) {
  const card = document.querySelector(`[data-member-id="${memberId}"]`);
  if (card) card.classList.toggle('expanded');
}

// ==================== SCAN ====================
async function openScan() {
  const modal = document.getElementById('scanModal');
  modal.classList.remove('hidden');
  document.getElementById('scanResult').textContent = '将药品条形码对准摄像头';
  document.getElementById('scanFallback').classList.add('hidden');

  if (!('BarcodeDetector' in window)) {
    document.getElementById('scanFallback').classList.remove('hidden');
    document.getElementById('scanResult').textContent = '浏览器不支持条码检测API';
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    currentCameraStream = stream;
    const video = document.getElementById('cameraVideo');
    video.srcObject = stream;

    const barcodeDetector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'qr_code'] });

    async function scanLoop() {
      if (!currentCameraStream) return;
      try {
        const barcodes = await barcodeDetector.detect(video);
        if (barcodes.length > 0) {
          const code = barcodes[0].rawValue;
          document.getElementById('scanResult').textContent = `检测到条码：${code}`;
          const drug = drugsDB.find(d => d.barcode === code);
          if (drug) {
            document.getElementById('scanResult').innerHTML = `✅ 识别成功：<strong>${escHtml(drug.name)}</strong>`;
            stopCamera();
            setTimeout(() => {
              closeModal('scanModal');
              showDrugDetail(drug);
            }, 800);
            return;
          } else {
            document.getElementById('scanResult').textContent = `未找到匹配药品（条码：${code}）`;
          }
        }
      } catch(e) {}
      if (currentCameraStream) requestAnimationFrame(scanLoop);
    }
    scanLoop();
  } catch(e) {
    document.getElementById('scanFallback').classList.remove('hidden');
    document.getElementById('scanResult').textContent = '无法访问摄像头：' + e.message;
  }
}

function stopCamera() {
  if (currentCameraStream) {
    currentCameraStream.getTracks().forEach(t => t.stop());
    currentCameraStream = null;
  }
}

// ==================== AI ASSISTANT ====================
async function askAI(presetQuestion) {
  const input = document.getElementById('chatInput');
  const question = presetQuestion || (input ? input.value.trim() : '');
  if (!question) return;

  const messages = document.getElementById('chatMessages');
  if (!messages) return;

  // Clear empty state if present
  const emptyEl = messages.querySelector('.chat-empty');
  if (emptyEl) emptyEl.remove();

  // Add user message
  messages.innerHTML += `<div class="chat-bubble user">
    <div class="bubble-label">👤 您</div>
    ${escHtml(question)}
  </div>`;

  if (input) input.value = '';

  // Show loading indicator
  const loadingId = 'loading_' + Date.now();
  messages.innerHTML += `<div class="chat-bubble ai" id="${loadingId}">
    <div class="bubble-label">🤖 药盾AI助手</div>
    <div class="spinner spinner-sm" style="display:inline-block"></div> 正在思考...
  </div>`;
  messages.scrollTop = messages.scrollHeight;

  try {
    // 调用后端 AI API - 使用配置的API地址
    const apiUrl = (window.APP_CONFIG && window.APP_CONFIG.API_BASE_URL) 
      ? `${window.APP_CONFIG.API_BASE_URL}/api/chat`
      : '/api/chat';
    
    console.log('API URL:', apiUrl); // 调试信息
    
    const response = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: question })
    });

    if (!response.ok) {
      throw new Error('API 请求失败: ' + response.status);
    }

    const data = await response.json();

    // Remove loading indicator
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.remove();

    // 构建回复内容，区分知识库和AI生成
    let responseHTML = '';
    if (data.knowledge) {
      // 知识库内容区域 - 使用醒目的绿色背景
      responseHTML += `<div style="background:linear-gradient(135deg,#d1fae5 0%,#ecfdf5 100%);border:2px solid #10b981;border-left:6px solid #10b981;border-radius:12px;padding:18px;margin-bottom:20px;box-shadow:0 4px 6px rgba(16,185,129,0.15);">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #6ee7b7;">
          <span style="font-size:1.5em;">📚</span>
          <span style="font-weight:800;color:#065f46;font-size:1.1em;">知识库原文</span>
          <span style="margin-left:auto;font-size:0.8em;color:#059669;background:#a7f3d0;padding:4px 12px;border-radius:6px;font-weight:600;">来自数据库</span>
        </div>
        <div style="color:#064e3b;line-height:1.8;font-size:0.95em;white-space:pre-wrap;font-family:system-ui,-apple-system,sans-serif;background:rgba(255,255,255,0.6);padding:12px;border-radius:8px;">${formatAIResponse(data.knowledge)}</div>
      </div>`;
      
      // AI分析区域 - 使用蓝色背景，明显分隔
      responseHTML += `<div style="background:linear-gradient(135deg,#dbeafe 0%,#eff6ff 100%);border:2px solid #3b82f6;border-left:6px solid #3b82f6;border-radius:12px;padding:18px;box-shadow:0 4px 6px rgba(59,130,246,0.15);">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #93c5fd;">
          <span style="font-size:1.5em;">🤖</span>
          <span style="font-weight:800;color:#1e40af;font-size:1.1em;">AI 智能分析</span>
          <span style="margin-left:auto;font-size:0.8em;color:#2563eb;background:#bfdbfe;padding:4px 12px;border-radius:6px;font-weight:600;">基于知识库生成</span>
        </div>
        <div style="color:#1e3a8a;line-height:1.8;font-size:0.95em;background:rgba(255,255,255,0.6);padding:12px;border-radius:8px;">${formatAIResponse(data.reply)}</div>
      </div>`;
    } else {
      // 没有知识库内容时，只显示AI回复
      responseHTML += `<div style="background:linear-gradient(135deg,#dbeafe 0%,#eff6ff 100%);border:2px solid #3b82f6;border-left:6px solid #3b82f6;border-radius:12px;padding:18px;box-shadow:0 4px 6px rgba(59,130,246,0.15);">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #93c5fd;">
          <span style="font-size:1.5em;">🤖</span>
          <span style="font-weight:800;color:#1e40af;font-size:1.1em;">AI 回复</span>
        </div>
        <div style="color:#1e3a8a;line-height:1.8;font-size:0.95em;background:rgba(255,255,255,0.6);padding:12px;border-radius:8px;">${formatAIResponse(data.reply)}</div>
      </div>`;
    }

    // Add AI response
    messages.innerHTML += `<div class="chat-bubble ai">
      <div class="bubble-label">🤖 药盾AI助手</div>
      ${responseHTML}
    </div>`;

  } catch (error) {
    console.error('AI 调用失败:', error);
    // Remove loading indicator
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.remove();

    // Show error message
    messages.innerHTML += `<div class="chat-bubble ai" style="background:#fef2f2;border-color:#fca5a5">
      <div class="bubble-label">🤖 药盾AI助手</div>
      ⚠️ AI 服务暂时不可用，请稍后重试。<br>
      <small style="color:#64748b">错误信息: ${escHtml(error.message)}</small>
    </div>`;
  }

  messages.scrollTop = messages.scrollHeight;
}

// 格式化 AI 回复（简单处理换行）
function formatAIResponse(text) {
  if (!text) return '';
  // 将换行转换为 <br>
  return text.replace(/\n/g, '<br>');
}

// ==================== MODALS ====================
function closeModal(modalId) {
  document.getElementById(modalId).classList.add('hidden');
  if (modalId === 'scanModal') stopCamera();
}

// Close modals on overlay click
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('modal-overlay')) {
    const modalId = e.target.id;
    closeModal(modalId);
  }
});

// Close autocomplete on outside click
document.addEventListener('click', function(e) {
  const dropdown = document.getElementById('autocompleteDropdown');
  const searchInput = document.getElementById('drugSearch');
  if (dropdown && searchInput && !searchInput.contains(e.target) && !dropdown.contains(e.target)) {
    dropdown.classList.remove('show');
  }
});

// ==================== CONDITION TAGS ====================
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('condition-option')) {
    e.target.classList.toggle('selected');
    const isChecked = e.target.classList.contains('selected');
    e.target.setAttribute('aria-checked', isChecked);
  }
});

// Keyboard support for condition options
document.addEventListener('keydown', function(e) {
  if (e.target.classList.contains('condition-option') && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault();
    e.target.classList.toggle('selected');
    const isChecked = e.target.classList.contains('selected');
    e.target.setAttribute('aria-checked', isChecked);
  }
  // Keyboard support for quick chips
  if (e.target.classList.contains('quick-chip') && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault();
    askAI(e.target.textContent);
  }
});

// ==================== FONT TOGGLE ====================
document.getElementById('fontToggle').addEventListener('click', function() {
  largeFont = !largeFont;
  document.body.classList.toggle('large-font', largeFont);
  this.classList.toggle('active', largeFont);
  const label = document.getElementById('fontToggleLabel');
  if (label) {
    label.innerHTML = largeFont ? 'A<sup>⁻</sup>' : 'A<sup>+</sup>';
  }
  this.setAttribute('aria-label', largeFont ? '切换标准字体' : '切换大字模式');
  this.title = largeFont ? '切换标准字体' : '切换大字模式';
  saveState();
});

// ==================== TAB NAVIGATION ====================
document.getElementById('bottomNav').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  const tab = btn.dataset.tab;
  if (!tab) return;
  currentTab = tab;
  saveState();
  document.querySelectorAll('.bottom-nav button').forEach(b => {
    b.classList.remove('active');
    b.removeAttribute('aria-current');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-current', 'page');
  render();
});

// ==================== ESCAPE HTML ====================
function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ==================== REMINDER CHECKER ====================
function checkReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  const currentTime = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

  reminders.forEach(r => {
    if (!r.enabled) return;
    if (r.time === currentTime && now.getSeconds() < 30) {
      const member = members.find(m => m.id === r.memberId);
      const memberName = member ? member.name : '未知';
      // Check if already notified this minute
      const lastKey = 'ms_last_notify_' + r.id;
      const lastNotify = localStorage.getItem(lastKey);
      const nowStr = now.toDateString() + ' ' + currentTime;
      if (lastNotify === nowStr) return;
      localStorage.setItem(lastKey, nowStr);

      new Notification('💊 药盾用药提醒', {
        body: `${memberName}：${r.drugName} - ${r.dosage}`,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💊</text></svg>',
        tag: r.id
      });
    }
  });
}

// ==================== INIT ====================
async function init() {
  loadState();

  // Apply large font
  if (largeFont) {
    document.body.classList.add('large-font');
    document.getElementById('fontToggle').classList.add('active');
  }

  // Load drugs
  try {
    const resp = await fetch('data/drugs.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    drugsDB = await resp.json();
  } catch(e) {
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('errorState').classList.remove('hidden');
    console.error('Failed to load drugs.json:', e);
    return;
  }

  // Hide loading, show app
  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('mainContent').classList.remove('hidden');
  document.getElementById('bottomNav').classList.remove('hidden');
  document.getElementById('appDisclaimer').style.display = 'block';

  // Set active tab
  document.querySelectorAll('.bottom-nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === currentTab);
  });

  // Render current tab
  render();

  // Start reminder checker
  reminderInterval = setInterval(checkReminders, 30000);
  // Request notification permission on first interaction
  document.addEventListener('click', function requestNotif() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, { once: true });
}

init();
</script>
