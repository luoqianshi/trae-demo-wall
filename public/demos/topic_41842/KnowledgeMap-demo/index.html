<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Map - 知识地图</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='none'><circle cx='32' cy='32' r='28' stroke='%2360a5fa' stroke-width='3'/><circle cx='32' cy='20' r='4' fill='%2360a5fa'/><circle cx='20' cy='38' r='4' fill='%23a78bfa'/><circle cx='44' cy='38' r='4' fill='%23f472b6'/><line x1='32' y1='24' x2='22' y2='35' stroke='%2360a5fa' stroke-width='2'/><line x1='32' y1='24' x2='42' y2='35' stroke='%2360a5fa' stroke-width='2'/><line x1='24' y1='38' x2='40' y2='38' stroke='%23a78bfa' stroke-width='2' stroke-dasharray='4 2'/></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-container home-page">
    <div class="home-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="28" stroke="url(#grad1)" stroke-width="2" fill="none"/>
        <circle cx="32" cy="20" r="4" fill="#60a5fa"/>
        <circle cx="20" cy="38" r="4" fill="#a78bfa"/>
        <circle cx="44" cy="38" r="4" fill="#f472b6"/>
        <line x1="32" y1="24" x2="22" y2="35" stroke="#60a5fa" stroke-width="2"/>
        <line x1="32" y1="24" x2="42" y2="35" stroke="#60a5fa" stroke-width="2"/>
        <line x1="24" y1="38" x2="40" y2="38" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 2"/>
        <defs>
          <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa"/>
            <stop offset="100%" style="stop-color:#a78bfa"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <h1 class="home-title">Knowledge Map</h1>
    <p class="home-subtitle">探索知识结构，看清领域全貌。学习的门槛不在于理解，而在于知道有什么需要理解。</p>
    
    <div class="search-container">
      <div class="search-box">
        <div class="search-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索知识领域..." autocomplete="off">
        <button class="search-btn" onclick="handleSearch()">探索</button>
      </div>
      <div class="search-suggestions" id="searchSuggestions"></div>
    </div>

    <div class="hot-words">
      <div class="hot-words-title">热门领域</div>
      <div class="hot-words-list" id="hotWordsList"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    const searchInput = document.getElementById('searchInput');
    const searchSuggestions = document.getElementById('searchSuggestions');
    const hotWordsList = document.getElementById('hotWordsList');
    
    let suggestionIndex = -1;

    function init() {
      renderHotWords();
      setupEventListeners();
    }

    function renderHotWords() {
      hotWordsList.innerHTML = hotWords.map(word => 
        `<span class="hot-word" onclick="fillSearchAndSuggest('${word}')">${word}</span>`
      ).join('');
    }

    function fillSearchAndSuggest(word) {
      searchInput.value = word;
      searchInput.focus();
      showSuggestions(word);
    }

    function setupEventListeners() {
      searchInput.addEventListener('input', (e) => {
        const keyword = e.target.value.trim();
        if (keyword) {
          showSuggestions(keyword);
        } else {
          hideSuggestions();
        }
      });

      searchInput.addEventListener('keydown', (e) => {
        const items = searchSuggestions.querySelectorAll('.suggestion-item');
        
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          suggestionIndex = (suggestionIndex + 1) % items.length;
          updateSelectedSuggestion(items);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          suggestionIndex = (suggestionIndex - 1 + items.length) % items.length;
          updateSelectedSuggestion(items);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (suggestionIndex >= 0 && suggestionIndex < items.length) {
            items[suggestionIndex].click();
          } else {
            handleSearch();
          }
        } else if (e.key === 'Escape') {
          hideSuggestions();
        }
      });

      searchInput.addEventListener('blur', () => {
        setTimeout(hideSuggestions, 200);
      });

      document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !searchSuggestions.contains(e.target)) {
          hideSuggestions();
        }
      });
    }

    function showSuggestions(keyword) {
      const results = searchNodes(keyword);
      
      if (results.length === 0) {
        searchSuggestions.style.display = 'none';
        return;
      }

      let html = '';
      for (let i = 0; i < Math.min(results.length, 8); i++) {
        const item = results[i];
        html += `
          <div class="suggestion-item" onclick="navigateToTree('${item.tree.id}', '${item.node.id}')">
            <svg class="suggestion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            <div class="suggestion-text">
              <div>${item.node.name}</div>
              <div class="suggestion-tree">${item.tree.name}</div>
            </div>
          </div>
        `;
      }

      searchSuggestions.innerHTML = html;
      searchSuggestions.style.display = 'block';
      suggestionIndex = -1;
    }

    function hideSuggestions() {
      searchSuggestions.style.display = 'none';
      suggestionIndex = -1;
    }

    function updateSelectedSuggestion(items) {
      items.forEach((item, index) => {
        if (index === suggestionIndex) {
          item.classList.add('selected');
          item.scrollIntoView({ block: 'nearest' });
        } else {
          item.classList.remove('selected');
        }
      });
    }

    function handleSearch() {
      const keyword = searchInput.value.trim();
      if (!keyword) return;

      const results = searchNodes(keyword);
      
      if (results.length === 0) {
        alert(`暂未收录"${keyword}"相关内容`);
        return;
      }

      const firstResult = results[0];
      navigateToTree(firstResult.tree.id, firstResult.node.id);
    }

    function navigateToTree(treeId, nodeId) {
      window.location.href = `tree.html?tree=${treeId}&node=${nodeId}`;
    }

    init();
  </script>
</body>
</html>
