<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>省心囤 - 家用物品保质期管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            background: linear-gradient(135deg, #409EFF 0%, #66b1ff 100%);
            color: #fff;
            padding: 28px 32px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(64,158,255,0.25);
        }
        .header h1 { font-size: 26px; margin-bottom: 6px; }
        .header p { opacity: 0.92; font-size: 14px; }

        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            min-width: 160px;
            background: #fff;
            border-radius: 10px;
            padding: 18px 22px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .stat-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .stat-icon.blue { background: #ecf5ff; }
        .stat-icon.orange { background: #fff7e6; }
        .stat-icon.red { background: #fef0f0; }
        .stat-icon.green { background: #f0f9eb; }
        .stat-num { font-size: 24px; font-weight: bold; color: #303133; }
        .stat-label { font-size: 12px; color: #909399; margin-top: 2px; }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .panel-title {
            font-size: 17px;
            color: #303133;
            margin-bottom: 18px;
            padding-left: 12px;
            border-left: 4px solid #409EFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-item label {
            display: block;
            font-size: 13px;
            color: #606266;
            margin-bottom: 6px;
        }
        .form-item input, .form-item select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-item input:focus, .form-item select:focus {
            border-color: #409EFF;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #409EFF;
            color: #fff;
        }
        .btn-primary:hover { background: #66b1ff; }
        .btn-danger {
            background: #F56C6C;
            color: #fff;
            padding: 6px 14px;
            font-size: 12px;
        }
        .btn-danger:hover { background: #f78989; }
        .btn-success {
            background: #67C23A;
            color: #fff;
        }
        .btn-success:hover { background: #85ce61; }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar input[type="text"] {
            padding: 8px 14px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            width: 220px;
        }
        .filter-btn {
            padding: 7px 16px;
            border: 1px solid #dcdfe6;
            background: #fff;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: #606266;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: #409EFF;
            color: #fff;
            border-color: #409EFF;
        }
        .filter-btn:hover:not(.active) {
            border-color: #409EFF;
            color: #409EFF;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #ebeef5;
        }
        th {
            background: #f5f7fa;
            color: #606266;
            font-weight: 600;
            font-size: 13px;
        }
        tr:hover { background: #f5f7fa; }

        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .tag-medicine { background: #fef0f0; color: #F56C6C; }
        .tag-daily { background: #ecf5ff; color: #409EFF; }
        .tag-food { background: #f0f9eb; color: #67C23A; }
        .tag-other { background: #f4f4f5; color: #909399; }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-normal { background: #f0f9eb; color: #67C23A; }
        .status-warning { background: #fff7e6; color: #E6A23C; }
        .status-expired { background: #fef0f0; color: #F56C6C; }

        .days-left { font-weight: 600; }
        .days-left.warning { color: #E6A23C; }
        .days-left.expired { color: #F56C6C; }
        .days-left.normal { color: #67C23A; }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #909399;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #67C23A; }
        .toast.error { background: #F56C6C; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .stats-bar { flex-direction: column; }
            .stat-card { min-width: auto; }
            table { font-size: 12px; }
            th, td { padding: 8px 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>省心囤 - 家用物品保质期管理系统</h1>
            <p>记录采购信息 · 自动计算过期时间 · 临期智能提醒</p>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon blue">📦</div>
                <div>
                    <div class="stat-num" id="statTotal">0</div>
                    <div class="stat-label">物品总数</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">✅</div>
                <div>
                    <div class="stat-num" id="statNormal">0</div>
                    <div class="stat-label">正常</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">⚠️</div>
                <div>
                    <div class="stat-num" id="statWarning">0</div>
                    <div class="stat-label">临期 (&lt;30天)</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red">❌</div>
                <div>
                    <div class="stat-num" id="statExpired">0</div>
                    <div class="stat-label">已过期</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">添加新物品</div>
            <div class="form-grid">
                <div class="form-item">
                    <label>物品名称 *</label>
                    <input type="text" id="inputName" placeholder="如：布洛芬缓释胶囊">
                </div>
                <div class="form-item">
                    <label>品类 *</label>
                    <select id="inputCategory">
                        <option value="">请选择</option>
                        <option value="medicine">药品</option>
                        <option value="daily">日用品</option>
                        <option value="food">食品</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>购入日期 *</label>
                    <input type="date" id="inputBuyDate">
                </div>
                <div class="form-item">
                    <label>采购价格 (元)</label>
                    <input type="number" id="inputPrice" placeholder="0.00" step="0.01">
                </div>
                <div class="form-item">
                    <label>生产日期 *</label>
                    <input type="date" id="inputProduceDate">
                </div>
                <div class="form-item">
                    <label>保质期 (天) *</label>
                    <input type="number" id="inputShelfLife" placeholder="如：365" min="1">
                </div>
            </div>
            <button class="btn btn-primary" onclick="addItem()">➕ 添加物品</button>
            <button class="btn btn-success" onclick="loadDemoData()" style="margin-left:10px;">📝 载入示例数据</button>
        </div>

        <div class="panel">
            <div class="panel-title">
                <span>物品台账</span>
            </div>
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="🔍 搜索物品名称..." oninput="renderList()">
                <button class="filter-btn active" onclick="setFilter('all')" id="filter-all">全部</button>
                <button class="filter-btn" onclick="setFilter('normal')" id="filter-normal">正常</button>
                <button class="filter-btn" onclick="setFilter('warning')" id="filter-warning">临期</button>
                <button class="filter-btn" onclick="setFilter('expired')" id="filter-expired">已过期</button>
            </div>
            <div id="tableContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div>暂无物品，请添加或载入示例数据</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let items = JSON.parse(localStorage.getItem('goodsManage_items') || '[]');
        let currentFilter = 'all';

        const today = new Date();
        document.getElementById('inputBuyDate').value = formatDate(today);

        function formatDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth()+1).padStart(2,'0');
            const day = String(d.getDate()).padStart(2,'0');
            return `${y}-${m}-${day}`;
        }

        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function calcStatus(produceDateStr, shelfLifeDays) {
            const produce = new Date(produceDateStr);
            const expire = new Date(produce);
            expire.setDate(expire.getDate() + parseInt(shelfLifeDays));
            const now = new Date();
            now.setHours(0,0,0,0);
            expire.setHours(0,0,0,0);
            const diff = Math.floor((expire - now) / (1000*60*60*24));

            if (diff < 0) return { status: 'expired', statusText: '已过期', daysLeft: diff, expireDate: formatDate(expire) };
            if (diff <= 30) return { status: 'warning', statusText: `${diff}天临期`, daysLeft: diff, expireDate: formatDate(expire) };
            return { status: 'normal', statusText: '正常', daysLeft: diff, expireDate: formatDate(expire) };
        }

        function calcStoredDays(buyDateStr) {
            const buy = new Date(buyDateStr);
            const now = new Date();
            now.setHours(0,0,0,0);
            buy.setHours(0,0,0,0);
            return Math.floor((now - buy) / (1000*60*60*24));
        }

        function save() {
            localStorage.setItem('goodsManage_items', JSON.stringify(items));
        }

        function addItem() {
            const name = document.getElementById('inputName').value.trim();
            const category = document.getElementById('inputCategory').value;
            const buyDate = document.getElementById('inputBuyDate').value;
            const price = document.getElementById('inputPrice').value;
            const produceDate = document.getElementById('inputProduceDate').value;
            const shelfLife = document.getElementById('inputShelfLife').value;

            if (!name || !category || !buyDate || !produceDate || !shelfLife) {
                showToast('请填写所有必填项', 'error');
                return;
            }

            items.push({
                id: Date.now(),
                name, category, buyDate, price: price || '', produceDate,
                shelfLife: parseInt(shelfLife)
            });
            save();
            renderList();
            updateStats();
            showToast('添加成功！');

            document.getElementById('inputName').value = '';
            document.getElementById('inputCategory').value = '';
            document.getElementById('inputPrice').value = '';
            document.getElementById('inputProduceDate').value = '';
            document.getElementById('inputShelfLife').value = '';
        }

        function deleteItem(id) {
            if (!confirm('确定删除该物品吗？')) return;
            items = items.filter(i => i.id !== id);
            save();
            renderList();
            updateStats();
            showToast('已删除');
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('filter-' + filter).classList.add('active');
            renderList();
        }

        function getCategoryLabel(c) {
            const map = { medicine: '药品', daily: '日用品', food: '食品', other: '其他' };
            const cls = { medicine: 'tag-medicine', daily: 'tag-daily', food: 'tag-food', other: 'tag-other' };
            return `<span class="tag ${cls[c]||'tag-other'}">${map[c]||c}</span>`;
        }

        function renderList() {
            const container = document.getElementById('tableContainer');
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

            let list = items.map(item => {
                const s = calcStatus(item.produceDate, item.shelfLife);
                const stored = calcStoredDays(item.buyDate);
                return { ...item, ...s, stored };
            });

            if (currentFilter !== 'all') {
                list = list.filter(i => i.status === currentFilter);
            }
            if (keyword) {
                list = list.filter(i => i.name.toLowerCase().includes(keyword));
            }

            list.sort((a, b) => a.daysLeft - b.daysLeft);

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div>${items.length === 0 ? '暂无物品，请添加或载入示例数据' : '没有符合条件的物品'}</div>
                    </div>`;
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>物品名称</th>
                        <th>品类</th>
                        <th>购入日期</th>
                        <th>采购价格</th>
                        <th>生产日期</th>
                        <th>已存放</th>
                        <th>过期日期</th>
                        <th>剩余天数</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>`;

            for (const i of list) {
                const daysClass = i.status === 'expired' ? 'expired' : (i.status === 'warning' ? 'warning' : 'normal');
                html += `<tr>
                    <td><strong>${escapeHtml(i.name)}</strong></td>
                    <td>${getCategoryLabel(i.category)}</td>
                    <td>${i.buyDate}</td>
                    <td>${i.price ? '¥' + i.price : '-'}</td>
                    <td>${i.produceDate}</td>
                    <td>${i.stored}天</td>
                    <td>${i.expireDate}</td>
                    <td class="days-left ${daysClass}">${i.daysLeft}天</td>
                    <td><span class="status status-${i.status}">${i.statusText}</span></td>
                    <td><button class="btn btn-danger" onclick="deleteItem(${i.id})">删除</button></td>
                </tr>`;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function updateStats() {
            let normal = 0, warning = 0, expired = 0;
            for (const item of items) {
                const s = calcStatus(item.produceDate, item.shelfLife);
                if (s.status === 'normal') normal++;
                else if (s.status === 'warning') warning++;
                else expired++;
            }
            document.getElementById('statTotal').textContent = items.length;
            document.getElementById('statNormal').textContent = normal;
            document.getElementById('statWarning').textContent = warning;
            document.getElementById('statExpired').textContent = expired;
        }

        function loadDemoData() {
            const demo = [
                { id: 1, name: '布洛芬缓释胶囊', category: 'medicine', buyDate: '2025-11-05', price: '22.80', produceDate: '2024-10-10', shelfLife: 730 },
                { id: 2, name: '保湿面霜', category: 'daily', buyDate: '2026-01-12', price: '139.00', produceDate: '2024-08-20', shelfLife: 730 },
                { id: 3, name: '食用橄榄油', category: 'food', buyDate: '2024-06-18', price: '79.00', produceDate: '2023-05-01', shelfLife: 730 },
                { id: 4, name: '维生素C泡腾片', category: 'medicine', buyDate: '2026-03-10', price: '35.50', produceDate: '2025-06-01', shelfLife: 730 },
                { id: 5, name: '洗衣液', category: 'daily', buyDate: '2026-02-20', price: '49.90', produceDate: '2025-09-15', shelfLife: 1095 },
                { id: 6, name: '牛奶', category: 'food', buyDate: '2026-06-25', price: '58.00', produceDate: '2026-06-20', shelfLife: 15 },
            ];
            items = demo;
            save();
            renderList();
            updateStats();
            showToast('示例数据已载入');
        }

        renderList();
        updateStats();
    </script>
</body>
</html>
