<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心音树洞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ========== 全局基础样式 ========== */
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            overflow: hidden;
        }

        /* 治愈系渐变背景：暖橙 → 柔粉 → 星空紫 */
        body {
            background: linear-gradient(160deg, #FFE5B4 0%, #FFCDB2 25%, #FFB4A2 50%, #C7A8D8 80%, #6B5B95 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: stretch;
        }

        /* ========== 手机容器 420px ========== */
        .phone-shell {
            width: 420px;
            max-width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, rgba(255, 229, 180, 0.4) 0%, rgba(255, 180, 162, 0.3) 40%, rgba(199, 168, 216, 0.35) 80%, rgba(107, 91, 149, 0.45) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 60px rgba(107, 91, 149, 0.25);
            overflow: hidden;
        }

        /* 装饰性飘浮光点 */
        .floating-dot {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.5; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 0.9; }
        }

        /* ========== 顶部栏 ========== */
        .top-bar {
            padding: 18px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .app-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(107, 91, 149, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .greeting {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 4px;
            text-shadow: 0 1px 4px rgba(107, 91, 149, 0.3);
            min-height: 18px;
        }

        .gear-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .gear-btn:hover { background: rgba(255, 255, 255, 0.4); transform: rotate(45deg); }
        .gear-btn:active { transform: scale(0.92); }

        /* ========== 聊天区域 ========== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.3) transparent;
        }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: bubbleIn 0.5s ease both;
        }
        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user { flex-direction: row-reverse; }

        /* AI 太阳头像 */
        .sun-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #FFF4B8 0%, #FFD27A 40%, #FF9F5A 100%);
            box-shadow: 0 0 18px rgba(255, 200, 100, 0.7), inset 0 0 8px rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
            position: relative;
            animation: sunGlow 3s ease-in-out infinite;
            transition: transform 0.3s;
        }
        @keyframes sunGlow {
            0%, 100% { box-shadow: 0 0 18px rgba(255, 200, 100, 0.7), inset 0 0 8px rgba(255, 255, 255, 0.4); }
            50% { box-shadow: 0 0 28px rgba(255, 200, 100, 0.95), inset 0 0 10px rgba(255, 255, 255, 0.5); }
        }
        /* 朗读中：更强烈的呼吸灯 */
        .sun-avatar.speaking {
            animation: sunSpeaking 1.1s ease-in-out infinite;
        }
        @keyframes sunSpeaking {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 18px rgba(255, 200, 100, 0.7), inset 0 0 8px rgba(255, 255, 255, 0.4);
            }
            50% {
                transform: scale(1.12);
                box-shadow: 0 0 36px rgba(255, 200, 100, 1), 0 0 60px rgba(255, 160, 90, 0.6), inset 0 0 12px rgba(255, 255, 255, 0.6);
            }
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            box-shadow: 0 4px 14px rgba(107, 91, 149, 0.15);
        }

        .bubble.ai {
            background: rgba(255, 255, 255, 0.85);
            color: #5D4E6D;
            border-bottom-left-radius: 6px;
        }

        .bubble.user {
            background: linear-gradient(135deg, #FF9F5A 0%, #FF7E5F 100%);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        /* ========== 底部麦克风区 ========== */
        .bottom-bar {
            padding: 16px 20px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .mic-btn {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 35% 35%, #FFB47A 0%, #FF7E5F 55%, #E85D75 100%);
            color: #fff;
            font-size: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(232, 93, 117, 0.45), inset 0 -6px 14px rgba(0,0,0,0.1), inset 0 6px 14px rgba(255,255,255,0.3);
            transition: all 0.25s ease;
            position: relative;
            user-select: none;
        }
        .mic-btn::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: ringPulse 2.5s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.08); opacity: 0.2; }
        }

        .mic-btn.recording {
            background: radial-gradient(circle at 35% 35%, #FF6B8B 0%, #E85D75 55%, #6B5B95 100%);
            transform: scale(1.06);
            box-shadow: 0 8px 40px rgba(232, 93, 117, 0.7), inset 0 -6px 14px rgba(0,0,0,0.1), inset 0 6px 14px rgba(255,255,255,0.3);
        }

        .mic-hint {
            font-size: 15px;
            color: #fff;
            font-weight: 600;
            text-shadow: 0 1px 4px rgba(107, 91, 149, 0.4);
            letter-spacing: 1px;
        }
        .mic-subhint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
        }

        /* ========== 设置弹窗 ========== */
        .modal-mask {
            position: absolute;
            inset: 0;
            background: rgba(60, 50, 90, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s ease;
        }
        .modal-mask.show { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            width: 380px;
            max-width: 92%;
            max-height: 90vh;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 20px 60px rgba(60, 50, 90, 0.4);
            animation: modalIn 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            scrollbar-width: thin;
            scrollbar-color: rgba(150,130,180,0.4) transparent;
        }
        .modal::-webkit-scrollbar { width: 5px; }
        .modal::-webkit-scrollbar-thumb { background: rgba(150,130,180,0.4); border-radius: 4px; }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.85) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h3 {
            font-size: 18px;
            color: #5D4E6D;
            margin: 0 0 14px;
            text-align: center;
            font-weight: 700;
        }

        .modal input,
        .modal select,
        .modal textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #E8D9EF;
            border-radius: 10px;
            font-size: 13px;
            color: #5D4E6D;
            background: #FAF5FC;
            outline: none;
            transition: border-color 0.25s;
            font-family: inherit;
            box-sizing: border-box;
        }
        .modal textarea { resize: vertical; min-height: 50px; line-height: 1.5; }
        .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: #FF9F5A; }

        .field-group {
            margin-bottom: 14px;
            padding: 12px;
            background: rgba(255, 229, 180, 0.18);
            border-radius: 14px;
            border: 1px dashed rgba(199, 168, 216, 0.5);
        }
        .field-group-title {
            font-size: 12px;
            font-weight: 700;
            color: #8E6BAE;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 1px;
        }
        .field { margin-bottom: 8px; }
        .field:last-child { margin-bottom: 0; }
        .field label {
            display: block;
            font-size: 11px;
            color: #9A8AAE;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .field-hint {
            font-size: 10px;
            color: #B5A6C7;
            margin-top: 3px;
            line-height: 1.4;
        }

        .modal-desc {
            font-size: 11px;
            color: #9A8AAE;
            margin: 6px 0 14px;
            line-height: 1.5;
            text-align: center;
        }

        .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
        .btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-cancel { background: #F0E8F2; color: #7A6A8E; }
        .btn-cancel:hover { background: #E5DAE9; }
        .btn-save { background: linear-gradient(135deg, #FF9F5A 0%, #E85D75 100%); color: #fff; }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(232, 93, 117, 0.4); }

        /* 录音波纹效果 */
        .wave {
            display: none;
            gap: 3px;
            align-items: center;
            height: 30px;
            margin-top: 4px;
        }
        .wave.show { display: flex; }
        .wave span {
            width: 3px;
            background: #fff;
            border-radius: 3px;
            animation: wave 1s ease-in-out infinite;
        }
        .wave span:nth-child(1) { height: 12px; animation-delay: 0s; }
        .wave span:nth-child(2) { height: 22px; animation-delay: 0.1s; }
        .wave span:nth-child(3) { height: 16px; animation-delay: 0.2s; }
        .wave span:nth-child(4) { height: 26px; animation-delay: 0.3s; }
        .wave span:nth-child(5) { height: 14px; animation-delay: 0.4s; }
        @keyframes wave {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }

        /* ========== 抱抱动画（情绪关键词触发） ========== */
        .hug-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 40;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(255, 200, 180, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
        }
        .hug-overlay.show { display: flex; animation: fadeIn 0.3s; }
        .hug-icon {
            font-size: 120px;
            color: #FF7E5F;
            text-shadow: 0 0 30px rgba(255, 160, 90, 0.8);
            animation: hugBounce 1.4s ease-in-out;
        }
        @keyframes hugBounce {
            0%   { transform: scale(0.2) rotate(-20deg); opacity: 0; }
            30%  { transform: scale(1.3) rotate(8deg);  opacity: 1; }
            55%  { transform: scale(0.95) rotate(-4deg); }
            75%  { transform: scale(1.08); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .hug-text {
            position: absolute;
            top: 62%;
            font-size: 18px;
            color: #fff;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(107, 91, 149, 0.5);
            letter-spacing: 2px;
            opacity: 0;
            animation: hugTextIn 0.6s ease 0.5s forwards;
        }
        @keyframes hugTextIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ========== 文本输入栏（STT 不支持时降级） ========== */
        .text-bar {
            display: none;
            width: 100%;
            align-items: center;
            gap: 8px;
            padding: 0 4px;
        }
        .text-bar.show { display: flex; }
        .text-bar input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 22px;
            font-size: 15px;
            color: #5D4E6D;
            background: rgba(255, 255, 255, 0.92);
            outline: none;
            box-shadow: 0 2px 10px rgba(107, 91, 149, 0.15);
        }
        .text-bar button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #FF9F5A 0%, #E85D75 100%);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(232, 93, 117, 0.4);
            flex-shrink: 0;
        }
        .text-bar button:active { transform: scale(0.92); }
        .text-bar-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 6px;
            text-align: center;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="phone-shell">
        <!-- 装饰飘浮光点 -->
        <div class="floating-dot" style="width:8px;height:8px;top:15%;left:12%;animation-delay:0s;"></div>
        <div class="floating-dot" style="width:5px;height:5px;top:25%;right:18%;animation-delay:1.5s;"></div>
        <div class="floating-dot" style="width:6px;height:6px;top:55%;left:8%;animation-delay:3s;"></div>
        <div class="floating-dot" style="width:4px;height:4px;top:70%;right:14%;animation-delay:4.5s;"></div>

        <!-- 顶部栏 -->
        <header class="top-bar">
            <div>
                <div class="app-title">
                    <i class="fa-solid fa-heart" style="color:#FFD27A;"></i>
                    心音树洞
                </div>
                <div class="greeting" id="greeting">今天过得怎么样？我在这里陪你</div>
            </div>
            <button class="gear-btn" id="gearBtn" title="设置">
                <i class="fa-solid fa-gear"></i>
            </button>
        </header>

        <!-- 聊天区域 -->
        <main class="chat-area" id="chatArea">
            <!-- 聊天记录会从 localStorage 恢复或默认欢迎语 -->
        </main>

        <!-- 抱抱动画浮层 -->
        <div class="hug-overlay" id="hugOverlay">
            <i class="fa-solid fa-hand-holding-heart hug-icon"></i>
            <div class="hug-text">给你一个大大的抱抱</div>
        </div>

        <!-- 底部麦克风 / 文本输入 -->
        <footer class="bottom-bar">
            <!-- 语音模式 -->
            <button class="mic-btn" id="micBtn" title="按住说话">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <div class="wave" id="wave">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="mic-hint" id="micHint">按住说话</div>
            <div class="mic-subhint" id="micSubhint">松开发送</div>

            <!-- 文本模式（STT 不可用时降级） -->
            <div class="text-bar" id="textBar">
                <input type="text" id="textInput" placeholder="在这里写下你想说的话…" autocomplete="off">
                <button id="sendBtn" title="发送"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
            <div class="text-bar-hint" id="textBarHint" style="display:none;">当前浏览器不支持语音识别，请用文字交流</div>
        </footer>

        <!-- 设置弹窗 -->
        <div class="modal-mask" id="modalMask">
            <div class="modal">
                <h3><i class="fa-solid fa-sliders" style="color:#FF9F5A;"></i> 接口设置</h3>
                <div class="modal-desc">所有配置仅保存在本地浏览器，用于驱动语音对话。</div>

                <!-- 基础配置 -->
                <div class="field-group">
                    <div class="field-group-title"><i class="fa-solid fa-link"></i> 基础配置</div>
                    <div class="field">
                        <label>API Base URL（兼容 OpenAI 格式）</label>
                        <input type="text" id="cfgBaseUrl" placeholder="https://api.xiaomimimo.com 或 https://api.openai.com">
                        <div class="field-hint">只需填到根域名，会自动拼接 /v1/chat/completions；若填了 /v1 也会自动处理。</div>
                    </div>
                    <div class="field">
                        <label>API Key</label>
                        <input type="password" id="cfgApiKey" placeholder="sk-..." autocomplete="off">
                    </div>
                    <div class="field">
                        <label>鉴权头方式</label>
                        <select id="cfgAuthMode">
                            <option value="both">两者都发（最兼容，推荐）</option>
                            <option value="bearer">Authorization: Bearer</option>
                            <option value="api-key">api-key 头</option>
                        </select>
                        <div class="field-hint">OpenAI 标准用 Bearer；小米 mimo 等用 api-key 头。</div>
                    </div>
                    <div class="field">
                        <label>LLM 对话模型</label>
                        <input type="text" id="cfgLlmModel" placeholder="gpt-4o-mini / mimo-v2.5">
                    </div>
                </div>

                <!-- 语音识别 STT -->
                <div class="field-group">
                    <div class="field-group-title"><i class="fa-solid fa-microphone-lines"></i> 语音识别 STT</div>
                    <div class="field">
                        <label>STT 模型名（留空则用浏览器内置 Web Speech）</label>
                        <input type="text" id="cfgSttModel" placeholder="mimo-v2.5-asr">
                    </div>
                    <div class="field">
                        <label>识别语言</label>
                        <input type="text" id="cfgSttLang" placeholder="auto / zh-CN">
                    </div>
                    <div class="field-hint">填写 STT 模型后，按住说话时通过麦克风录音上传至该接口识别。</div>
                </div>

                <!-- 语音合成 TTS -->
                <div class="field-group">
                    <div class="field-group-title"><i class="fa-solid fa-volume-high"></i> 语音合成 TTS</div>
                    <div class="field">
                        <label>TTS 模型名（留空则用浏览器内置朗读）</label>
                        <input type="text" id="cfgTtsModel" placeholder="mimo-v2.5-tts">
                    </div>
                    <div class="field">
                        <label>音色名称</label>
                        <input type="text" id="cfgTtsVoice" placeholder="Chloe">
                    </div>
                    <div class="field">
                        <label>音频格式</label>
                        <select id="cfgTtsFormat">
                            <option value="pcm16">pcm16（原始 PCM，需 24kHz）</option>
                            <option value="mp3">mp3</option>
                            <option value="wav">wav</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>音色风格描述（prompt）</label>
                        <textarea id="cfgTtsPrompt" placeholder="温柔温暖的语气，语速适中。"></textarea>
                    </div>
                    <div class="field-hint">TTS 会以 user 消息填描述、assistant 消息填要朗读的文本。</div>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-cancel" id="cancelBtn">取消</button>
                    <button class="btn btn-save" id="saveBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 随机问候语 ==========
        const greetings = [
            "今天过得怎么样？我在这里陪你",
            "深呼吸一下，今天又是新的一天",
            "无论开心还是难过，都可以告诉我",
            "我在这里，慢慢说，不着急",
            "你来了，我等了好久呢",
            "今天的你，值得被温柔以待"
        ];
        document.getElementById('greeting').textContent = greetings[Math.floor(Math.random() * greetings.length)];

        // ========== 配置读写 ==========
        const KEYS = {
            baseUrl:   'xinyin_base_url',
            apiKey:    'xinyin_api_key',
            authMode:  'xinyin_auth_mode',
            llmModel:  'xinyin_llm_model',
            sttModel:  'xinyin_stt_model',
            sttLang:   'xinyin_stt_lang',
            ttsModel:  'xinyin_tts_model',
            ttsVoice:  'xinyin_tts_voice',
            ttsFormat: 'xinyin_tts_format',
            ttsPrompt: 'xinyin_tts_prompt'
        };
        const DEFAULTS = {
            baseUrl:   'https://api.openai.com',
            authMode:  'both',
            llmModel:  'gpt-4o-mini',
            sttLang:   'auto',
            ttsVoice:  'Chloe',
            ttsFormat: 'pcm16',
            ttsPrompt: '温柔温暖的语气，语速适中，像在轻声安慰一个朋友。'
        };

        function lsGet(k, def) {
            try { const v = localStorage.getItem(k); return (v === null || v === '') ? def : v; } catch (e) { return def; }
        }
        function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

        function getConfig() {
            let baseUrl = (lsGet(KEYS.baseUrl, DEFAULTS.baseUrl)).trim().replace(/\/+$/, '');
            // 兼容用户填写了不同形式的路径：
            //   https://api.x.com          → 保留，由调用处拼 /v1/chat/completions
            //   https://api.x.com/v1       → 去掉 /v1，避免重复
            //   https://api.x.com/v1/      → 去掉 /v1
            //   https://api.x.com/v1/chat/completions → 去掉完整路径
            baseUrl = baseUrl.replace(/\/v1\/chat\/completions\/?$/, '')
                             .replace(/\/v1\/?$/, '');
            return {
                baseUrl,
                apiKey:    (lsGet(KEYS.apiKey, '')).trim(),
                authMode:  lsGet(KEYS.authMode, DEFAULTS.authMode),
                llmModel:  (lsGet(KEYS.llmModel, DEFAULTS.llmModel)).trim() || DEFAULTS.llmModel,
                sttModel:  (lsGet(KEYS.sttModel, '')).trim(),
                sttLang:   (lsGet(KEYS.sttLang, DEFAULTS.sttLang)).trim() || DEFAULTS.sttLang,
                ttsModel:  (lsGet(KEYS.ttsModel, '')).trim(),
                ttsVoice:  (lsGet(KEYS.ttsVoice, DEFAULTS.ttsVoice)).trim() || DEFAULTS.ttsVoice,
                ttsFormat: lsGet(KEYS.ttsFormat, DEFAULTS.ttsFormat),
                ttsPrompt: lsGet(KEYS.ttsPrompt, DEFAULTS.ttsPrompt)
            };
        }

        // 构造请求头（兼容 Authorization Bearer / api-key 头）
        function buildHeaders(cfg) {
            const h = { 'Content-Type': 'application/json' };
            const mode = cfg.authMode || 'both';
            if (mode === 'bearer' || mode === 'both') h['Authorization'] = `Bearer ${cfg.apiKey}`;
            if (mode === 'api-key' || mode === 'both') h['api-key'] = cfg.apiKey;
            return h;
        }

        // ========== 设置弹窗交互 ==========
        const gearBtn = document.getElementById('gearBtn');
        const modalMask = document.getElementById('modalMask');
        const cancelBtn = document.getElementById('cancelBtn');
        const saveBtn = document.getElementById('saveBtn');
        const cfgFields = {
            baseUrl:   document.getElementById('cfgBaseUrl'),
            apiKey:    document.getElementById('cfgApiKey'),
            authMode:  document.getElementById('cfgAuthMode'),
            llmModel:  document.getElementById('cfgLlmModel'),
            sttModel:  document.getElementById('cfgSttModel'),
            sttLang:   document.getElementById('cfgSttLang'),
            ttsModel:  document.getElementById('cfgTtsModel'),
            ttsVoice:  document.getElementById('cfgTtsVoice'),
            ttsFormat: document.getElementById('cfgTtsFormat'),
            ttsPrompt: document.getElementById('cfgTtsPrompt')
        };

        function loadCfgToForm() {
            const c = getConfig();
            cfgFields.baseUrl.value   = c.baseUrl;
            cfgFields.apiKey.value    = c.apiKey;
            cfgFields.authMode.value  = c.authMode;
            cfgFields.llmModel.value  = c.llmModel;
            cfgFields.sttModel.value  = c.sttModel;
            cfgFields.sttLang.value   = c.sttLang;
            cfgFields.ttsModel.value  = c.ttsModel;
            cfgFields.ttsVoice.value  = c.ttsVoice;
            cfgFields.ttsFormat.value = c.ttsFormat;
            cfgFields.ttsPrompt.value = c.ttsPrompt;
        }
        loadCfgToForm();

        gearBtn.addEventListener('click', () => { loadCfgToForm(); modalMask.classList.add('show'); });
        cancelBtn.addEventListener('click', () => modalMask.classList.remove('show'));
        modalMask.addEventListener('click', (e) => {
            if (e.target === modalMask) modalMask.classList.remove('show');
        });
        saveBtn.addEventListener('click', () => {
            lsSet(KEYS.baseUrl,   cfgFields.baseUrl.value.trim());
            lsSet(KEYS.apiKey,    cfgFields.apiKey.value.trim());
            lsSet(KEYS.authMode,  cfgFields.authMode.value);
            lsSet(KEYS.llmModel,  cfgFields.llmModel.value.trim());
            lsSet(KEYS.sttModel,  cfgFields.sttModel.value.trim());
            lsSet(KEYS.sttLang,   cfgFields.sttLang.value.trim());
            lsSet(KEYS.ttsModel,  cfgFields.ttsModel.value.trim());
            lsSet(KEYS.ttsVoice,  cfgFields.ttsVoice.value.trim());
            lsSet(KEYS.ttsFormat, cfgFields.ttsFormat.value);
            lsSet(KEYS.ttsPrompt, cfgFields.ttsPrompt.value);
            modalMask.classList.remove('show');
        });

        // ========== 麦克风按住说话：真实 STT + LLM + TTS ==========
        const micBtn = document.getElementById('micBtn');
        const micHint = document.getElementById('micHint');
        const wave = document.getElementById('wave');
        const chatArea = document.getElementById('chatArea');
        let isRecording = false;
        let isBusy = false; // AI 正在回复时锁定麦克风

        // ---------- 历史消息（用于 LLM 上下文） ----------
        const SYSTEM_PROMPT = "你是一个极具同理心、温柔的倾听者，名叫'树洞'。用户可能是一位孤独的独居者或老人。请用口语化、简短、温暖的语言回复，多给予肯定和情感支持，不要说教，不要使用markdown格式。";
        const HISTORY_KEY = 'xinyin_chat_history';
        const WELCOME_MSG = '嗨，我是你的心音小太阳 ☀️ 无论今天发生了什么，都可以告诉我。按住下方的麦克风，对我说说话吧～';
        const MAX_CONTEXT = 10; // 传给 LLM 的最大历史条数（不含 system）

        // 加载持久化历史；没有则初始化为欢迎语
        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                if (raw) {
                    const arr = JSON.parse(raw);
                    if (Array.isArray(arr) && arr.length > 0) return arr;
                }
            } catch (e) {}
            return [
                { role: 'system', content: SYSTEM_PROMPT },
                { role: 'assistant', content: WELCOME_MSG }
            ];
        }
        function saveHistory() {
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(chatHistory)); } catch (e) {}
        }
        let chatHistory = loadHistory();

        // 从 localStorage 恢复聊天记录到页面
        function renderHistory() {
            chatArea.innerHTML = '';
            for (const m of chatHistory) {
                if (m.role === 'user') {
                    addUserBubble(m.content, false);
                } else if (m.role === 'assistant') {
                    addAIBubble(m.content, false);
                }
            }
        }
        renderHistory();
        saveHistory();

        // ---------- 浏览器内置 STT（Web Speech）初始化 ----------
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let finalText = '';
        let recStoppedByUser = false;
        let useCustomSTT = false; // 本次按下是否走自定义 STT

        if (SR) {
            recognition = new SR();
            recognition.lang = 'zh-CN';
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            recognition.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) finalText += event.results[i][0].transcript;
                }
            };
            recognition.onerror = (e) => {
                console.warn('STT error:', e.error);
                if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                    alertTone('麦克风权限被拒绝，请在浏览器设置中允许使用麦克风。');
                }
            };
            recognition.onend = () => {
                if (isRecording && !useCustomSTT && !recStoppedByUser) {
                    try { recognition.start(); } catch (e) {}
                }
            };
        }

        // ---------- 自定义 STT 录音（MediaRecorder） ----------
        let mediaRecorder = null;
        let audioChunks = [];
        let mediaStream = null;
        async function startMediaRecorder() {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            // 优先选 webm/opus，不行就用默认
            let mime = 'audio/webm';
            if (!MediaRecorder.isTypeSupported(mime)) mime = 'audio/ogg';
            if (!MediaRecorder.isTypeSupported(mime)) mime = '';
            mediaRecorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime } : undefined);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) audioChunks.push(e.data); };
            // 传 timeslice=100ms，确保按住期间持续产生数据块，避免松开过早时 audioChunks 为空
            mediaRecorder.start(100);
        }
        function stopMediaRecorderAndGetBase64() {
            return new Promise((resolve) => {
                // 状态检查：mediaRecorder 不存在或已停止，直接返回 null
                if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                    resolve(null);
                    return;
                }
                mediaRecorder.onstop = () => {
                    try { mediaStream.getTracks().forEach(t => t.stop()); } catch (e) {}
                    const chunks = audioChunks.slice();
                    if (chunks.length === 0) { resolve(null); return; }
                    const blobType = mediaRecorder.mimeType || 'audio/webm';
                    const blob = new Blob(chunks, { type: blobType });
                    if (blob.size === 0) { resolve(null); return; }
                    // 先尝试转成 WAV（mimo STT 仅接受 wav/mp3，不接受 webm）
                    convertBlobToWavBase64(blob).then(resolve).catch((err) => {
                        console.warn('convert to wav failed, fallback to raw webm:', err);
                        // 失败则回退到原始 webm（虽然 mimo 不接受，但保留兜底）
                        blobToBase64(blob, 'audio/webm', resolve);
                    });
                };
                try {
                    mediaRecorder.stop();
                } catch (e) {
                    console.warn('mediaRecorder.stop error:', e);
                    resolve(null);
                }
            });
        }

        // ---------- 音频转码：webm/ogg → wav（16kHz mono PCM16） ----------
        let convAudioCtx = null;
        function getConvAudioCtx() {
            if (!convAudioCtx) {
                const AC = window.AudioContext || window.webkitAudioContext;
                convAudioCtx = new AC();
            }
            return convAudioCtx;
        }
        async function convertBlobToWavBase64(blob) {
            const arrayBuf = await blob.arrayBuffer();
            const ctx = getConvAudioCtx();
            const audioBuf = await ctx.decodeAudioData(arrayBuf);
            // 降采样到 16kHz 单声道，足够语音识别且体积小
            const targetRate = 16000;
            const channels = 1;
            const offline = new OfflineAudioContext(channels, Math.ceil(audioBuf.duration * targetRate), targetRate);
            const srcNode = offline.createBufferSource();
            srcNode.buffer = audioBuf;
            srcNode.connect(offline.destination);
            srcNode.start();
            const rendered = await offline.startRendering();
            const wavBytes = encodeWav(rendered);
            const wavBlob = new Blob([wavBytes], { type: 'audio/wav' });
            return new Promise((resolve) => blobToBase64(wavBlob, 'audio/wav', resolve));
        }
        // 把 AudioBuffer 编码成 WAV（PCM16）字节
        function encodeWav(audioBuf) {
            const numCh = 1;
            const sampleRate = audioBuf.sampleRate;
            const numSamples = audioBuf.length;
            const bytesPerSample = 2;
            const blockAlign = numCh * bytesPerSample;
            const dataSize = numSamples * blockAlign;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);
            const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);                 // PCM
            view.setUint16(22, numCh, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, 16, true);
            writeStr(36, 'data');
            view.setUint32(40, dataSize, true);
            const channelData = audioBuf.getChannelData(0);
            let offset = 44;
            for (let i = 0; i < numSamples; i++) {
                let s = Math.max(-1, Math.min(1, channelData[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
            return buffer;
        }
        function blobToBase64(blob, mimeType, resolve) {
            const reader = new FileReader();
            reader.onloadend = () => {
                const dataUrl = String(reader.result || '');
                const commaIdx = dataUrl.indexOf(',');
                if (commaIdx < 0) { resolve(null); return; }
                const base64 = dataUrl.slice(commaIdx + 1);
                if (!base64) { resolve(null); return; }
                resolve({ mimeType, base64 });
            };
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(blob);
        }

        // ---------- 按下 / 松开 ----------
        async function startRec() {
            if (isRecording || isBusy) return;
            const cfg = getConfig();

            // 决定 STT 来源
            if (cfg.sttModel) {
                // 自定义 STT：用 MediaRecorder 录音
                try {
                    await startMediaRecorder();
                    useCustomSTT = true;
                } catch (e) {
                    console.warn(e);
                    alertTone('无法访问麦克风：' + (e.message || '请检查权限设置。'));
                    return;
                }
            } else if (SR) {
                useCustomSTT = false;
                finalText = '';
                recStoppedByUser = false;
                try { recognition.start(); } catch (e) { console.warn(e); }
            } else {
                alertTone('当前浏览器不支持语音识别，请在设置中填写 STT 模型，或换用 Chrome / Edge。');
                return;
            }

            isRecording = true;
            micBtn.classList.add('recording');
            micBtn.querySelector('i').className = 'fa-solid fa-circle-stop';
            micHint.textContent = '正在聆听…松开发送';
            wave.classList.add('show');
        }

        async function endRec() {
            if (!isRecording) return;
            isRecording = false;

            let recognizedText = '';
            if (useCustomSTT) {
                micBtn.classList.remove('recording');
                micBtn.querySelector('i').className = 'fa-solid fa-microphone';
                wave.classList.remove('show');
                micHint.textContent = '正在识别…';
                const audio = await stopMediaRecorderAndGetBase64();
                if (!audio) { alertTone('按住时间太短啦，请按住麦克风说几秒钟试试。'); micHint.textContent = '按住说话'; return; }
                try {
                    recognizedText = await callSTT(getConfig(), audio.base64, audio.mimeType);
                } catch (e) {
                    console.error(e);
                    alertTone('我没能听清呢，可以再说一次吗？');
                    micHint.textContent = '按住说话';
                    return;
                }
            } else {
                recStoppedByUser = true;
                try { recognition.stop(); } catch (e) {}
                micBtn.classList.remove('recording');
                micBtn.querySelector('i').className = 'fa-solid fa-microphone';
                wave.classList.remove('show');
                await new Promise(r => setTimeout(r, 250));
                recognizedText = finalText.trim();
            }

            micHint.textContent = '按住说话';
            if (!recognizedText) {
                addAIBubble('我没有听清呢，可以再说一次吗？', false);
                return;
            }
            await handleUserText(recognizedText);
        }

        // ---------- 情绪关键词检测（本地） ----------
        const EMOTION_KEYWORDS = ['难过', '伤心', '心痛', '想哭', '睡不着', '失眠', '孤独', '孤单', '寂寞', '走了', '离开', '去世', '失去', '想死', '崩溃', '绝望', '害怕', '没人陪', '想念', '怀念'];
        function detectEmotion(text) {
            if (!text) return false;
            return EMOTION_KEYWORDS.some(k => text.includes(k));
        }
        function showHugAnimation() {
            const overlay = document.getElementById('hugOverlay');
            overlay.classList.add('show');
            const icon = overlay.querySelector('.hug-icon');
            icon.style.animation = 'none';
            void icon.offsetWidth;
            icon.style.animation = '';
            setTimeout(() => overlay.classList.remove('show'), 1800);
        }

        async function handleUserText(text) {
            // 1. 情绪关键词检测 → 抱抱动画
            if (detectEmotion(text)) {
                showHugAnimation();
            }

            // 2. 显示用户消息 + 存历史
            addUserBubble(text);
            chatHistory.push({ role: 'user', content: text });
            saveHistory();

            const cfg = getConfig();
            if (!cfg.apiKey) {
                const tip = '请先点击右上角小齿轮，填入 API Key，我才能回应你哦。';
                addAIBubble(tip, false);
                chatHistory.push({ role: 'assistant', content: tip });
                saveHistory();
                return;
            }

            isBusy = true;
            micBtn.style.opacity = '0.6';
            micBtn.style.pointerEvents = 'none';
            micBtn.disabled = true;
            micHint.textContent = '树洞正在思考…';
            try {
                // 3. 限制上下文为最近 MAX_CONTEXT 条 + system
                const ctxMessages = buildContextMessages(chatHistory, MAX_CONTEXT);
                const reply = await callLLM(cfg, ctxMessages);
                chatHistory.push({ role: 'assistant', content: reply });
                saveHistory();
                await addAIBubble(reply, true);
            } catch (err) {
                console.error(err);
                const errMsg = '抱歉，我刚才走神了，能再说一遍吗？';
                addAIBubble(errMsg, true); // 用 TTS 语音播报错误
            } finally {
                isBusy = false;
                micBtn.style.opacity = '';
                micBtn.style.pointerEvents = '';
                micBtn.disabled = false;
                micHint.textContent = '按住说话';
            }
        }

        // 构造传给 LLM 的上下文：system + 最近 N 条对话
        function buildContextMessages(history, maxCount) {
            const systemMsgs = history.filter(m => m.role === 'system');
            const nonSystem = history.filter(m => m.role !== 'system');
            const recent = nonSystem.slice(-maxCount);
            return [...systemMsgs, ...recent];
        }

        // 鼠标 / 触摸事件
        micBtn.addEventListener('mousedown', startRec);
        micBtn.addEventListener('mouseup', endRec);
        micBtn.addEventListener('mouseleave', () => { if (isRecording) endRec(); });
        micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRec(); }, { passive: false });
        micBtn.addEventListener('touchend', (e) => { e.preventDefault(); endRec(); }, { passive: false });

        // ---------- 调用大模型 LLM（兼容 OpenAI 格式） ----------
        async function callLLM(cfg, messages) {
            const resp = await fetch(`${cfg.baseUrl}/v1/chat/completions`, {
                method: 'POST',
                headers: buildHeaders(cfg),
                body: JSON.stringify({
                    model: cfg.llmModel,
                    messages: messages,
                    temperature: 0.8,
                    max_tokens: 300
                })
            });
            if (!resp.ok) {
                const t = await resp.text().catch(() => '');
                throw new Error(`LLM HTTP ${resp.status}: ${t}`);
            }
            const data = await resp.json();
            const content = data?.choices?.[0]?.message?.content;
            if (!content) throw new Error('LLM 返回为空');
            if (Array.isArray(content)) {
                return content.map(c => typeof c === 'string' ? c : (c.text || '')).join('').trim();
            }
            return String(content).trim();
        }

        // ---------- 调用自定义 STT（OpenAI 兼容 / mimo 格式） ----------
        async function callSTT(cfg, base64Audio, mimeType) {
            const dataUrl = `data:${mimeType};base64,${base64Audio}`;
            const body = {
                model: cfg.sttModel,
                messages: [{
                    role: 'user',
                    content: [{
                        type: 'input_audio',
                        input_audio: { data: dataUrl }
                    }]
                }],
                asr_options: { language: cfg.sttLang || 'auto' },
                stream: false
            };
            const resp = await fetch(`${cfg.baseUrl}/v1/chat/completions`, {
                method: 'POST',
                headers: buildHeaders(cfg),
                body: JSON.stringify(body)
            });
            if (!resp.ok) {
                const t = await resp.text().catch(() => '');
                throw new Error(`STT HTTP ${resp.status}: ${t}`);
            }
            const data = await resp.json();
            const content = data?.choices?.[0]?.message?.content;
            if (typeof content === 'string') return content.trim();
            if (Array.isArray(content)) {
                return content.map(c => typeof c === 'string' ? c : (c.text || '')).join('').trim();
            }
            throw new Error('STT 返回为空');
        }

        // ---------- 调用自定义 TTS（OpenAI 兼容 / mimo 格式） ----------
        async function callTTS(cfg, text) {
            const body = {
                model: cfg.ttsModel,
                messages: [
                    { role: 'user',      content: cfg.ttsPrompt || '温柔温暖的语气。' },
                    { role: 'assistant', content: text }
                ],
                audio: {
                    format: cfg.ttsFormat || 'pcm16',
                    voice:  cfg.ttsVoice || 'Chloe'
                },
                stream: false
            };
            const resp = await fetch(`${cfg.baseUrl}/v1/chat/completions`, {
                method: 'POST',
                headers: buildHeaders(cfg),
                body: JSON.stringify(body)
            });
            if (!resp.ok) {
                const t = await resp.text().catch(() => '');
                throw new Error(`TTS HTTP ${resp.status}: ${t}`);
            }
            const data = await resp.json();
            // OpenAI 标准字段：choices[0].message.audio.data
            const audioData = data?.choices?.[0]?.message?.audio?.data
                           || data?.choices?.[0]?.message?.audio
                           || data?.audio?.data
                           || null;
            if (!audioData) throw new Error('TTS 返回无音频数据');
            return { base64: audioData, format: cfg.ttsFormat || 'pcm16' };
        }

        // ---------- 播放音频 base64（支持 pcm16 / mp3 / wav） ----------
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) {
                const AC = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AC();
            }
            return audioCtx;
        }
        function base64ToUint8(b64) {
            const bin = atob(b64);
            const len = bin.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
            return bytes;
        }
        function playPCM16(bytes) {
            return new Promise((resolve) => {
                const ctx = getAudioCtx();
                const sampleRate = 24000; // mimo pcm16 默认 24kHz
                const pcm = new Int16Array(bytes.buffer);
                const audioBuf = ctx.createBuffer(1, pcm.length, sampleRate);
                const channel = audioBuf.getChannelData(0);
                for (let i = 0; i < pcm.length; i++) channel[i] = pcm[i] / 32768;
                const src = ctx.createBufferSource();
                src.buffer = audioBuf;
                src.connect(ctx.destination);
                src.onended = resolve;
                src.start();
            });
        }
        async function playDecoded(bytes) {
            const ctx = getAudioCtx();
            const audioBuf = await ctx.decodeAudioData(bytes.buffer.slice(0));
            return new Promise((resolve) => {
                const src = ctx.createBufferSource();
                src.buffer = audioBuf;
                src.connect(ctx.destination);
                src.onended = resolve;
                src.start();
            });
        }
        async function playAudioBase64(base64, format) {
            const bytes = base64ToUint8(base64);
            if (format === 'pcm16') {
                await playPCM16(bytes);
            } else {
                await playDecoded(bytes); // mp3 / wav
            }
        }

        // ---------- 浏览器内置 TTS（fallback） ----------
        let zhVoice = null;
        function pickZhVoice() {
            if (!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            zhVoice = voices.find(v => /zh(-|_)?CN/i.test(v.lang) && /female|女|xiao|ting|hui/i.test(v.name))
                   || voices.find(v => /zh(-|_)?CN/i.test(v.lang))
                   || voices.find(v => /^zh/i.test(v.lang))
                   || null;
        }
        if ('speechSynthesis' in window) {
            pickZhVoice();
            window.speechSynthesis.onvoiceschanged = pickZhVoice;
        }
        function speak(text, onStart, onEnd) {
            if (!('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
            try { window.speechSynthesis.cancel(); } catch (e) {}
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN';
            if (zhVoice) u.voice = zhVoice;
            u.rate = 0.95;
            u.pitch = 1.05;
            u.volume = 1;
            if (onStart) u.onstart = onStart;
            if (onEnd) u.onend = onEnd;
            u.onerror = () => { if (onEnd) onEnd(); };
            window.speechSynthesis.speak(u);
        }

        // ---------- 气泡渲染 ----------
        function addUserBubble(text) {
            const row = document.createElement('div');
            row.className = 'msg-row user';
            row.innerHTML = `<div class="bubble user">${escapeHTML(text)}</div>`;
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        async function addAIBubble(text, withTTS) {
            const row = document.createElement('div');
            row.className = 'msg-row ai';
            const avatar = document.createElement('div');
            avatar.className = 'sun-avatar';
            avatar.innerHTML = '<i class="fa-solid fa-sun"></i>';
            const bubble = document.createElement('div');
            bubble.className = 'bubble ai';
            bubble.textContent = text;
            row.appendChild(avatar);
            row.appendChild(bubble);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;

            if (withTTS) {
                const cfg = getConfig();
                if (cfg.ttsModel && cfg.apiKey) {
                    // 自定义 TTS
                    avatar.classList.add('speaking');
                    try {
                        const { base64, format } = await callTTS(cfg, text);
                        // 解锁 AudioContext（需要用户交互后）
                        const ctx = getAudioCtx();
                        if (ctx.state === 'suspended') await ctx.resume();
                        await playAudioBase64(base64, format);
                    } catch (e) {
                        console.error('TTS failed, fallback to browser:', e);
                        // 失败降级到浏览器朗读
                        await new Promise(res => speak(text, null, res));
                    } finally {
                        avatar.classList.remove('speaking');
                    }
                } else {
                    // 浏览器内置 TTS
                    speak(
                        text,
                        () => avatar.classList.add('speaking'),
                        () => avatar.classList.remove('speaking')
                    );
                }
            }
        }

        function escapeHTML(s) {
            return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        }
        function alertTone(msg) {
            addAIBubble(msg, false);
        }

        // ========== 文本输入栏（STT 不可用时降级） ==========
        const textBar = document.getElementById('textBar');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const textBarHint = document.getElementById('textBarHint');
        const micSubhint = document.getElementById('micSubhint');

        // 判断当前是否可用语音输入（自定义 STT 模型 或 浏览器 Web Speech）
        function isVoiceInputAvailable() {
            const cfg = getConfig();
            return !!cfg.sttModel || !!SR;
        }

        // 根据可用性切换 UI：语音模式 / 文本模式
        function refreshInputMode() {
            if (isVoiceInputAvailable()) {
                micBtn.style.display = '';
                micHint.style.display = '';
                micSubhint.style.display = '';
                textBar.classList.remove('show');
                textBarHint.style.display = 'none';
            } else {
                micBtn.style.display = 'none';
                micHint.style.display = 'none';
                micSubhint.style.display = 'none';
                textBar.classList.add('show');
                textBarHint.style.display = 'block';
            }
        }
        refreshInputMode();

        // 保存设置后重新判断
        saveBtn.addEventListener('click', () => { setTimeout(refreshInputMode, 0); });

        // 发送文本
        async function sendText() {
            const text = textInput.value.trim();
            if (!text || isBusy) return;
            textInput.value = '';
            await handleUserText(text);
        }
        sendBtn.addEventListener('click', sendText);
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendText();
            }
        });

        // ========== 清空历史（在设置弹窗里加一个清空按钮） ==========
        // 通过长按齿轮 1.5 秒触发清空，避免占额外 UI
        let gearHoldTimer = null;
        gearBtn.addEventListener('mousedown', () => {
            gearHoldTimer = setTimeout(() => {
                gearHoldTimer = null;
                if (confirm('确定要清空所有聊天记录吗？')) {
                    try { localStorage.removeItem(HISTORY_KEY); } catch (e) {}
                    chatHistory = [
                        { role: 'system', content: SYSTEM_PROMPT },
                        { role: 'assistant', content: WELCOME_MSG }
                    ];
                    saveHistory();
                    renderHistory();
                }
            }, 1500);
        });
        gearBtn.addEventListener('mouseup',    () => { if (gearHoldTimer) { clearTimeout(gearHoldTimer); gearHoldTimer = null; } });
        gearBtn.addEventListener('mouseleave', () => { if (gearHoldTimer) { clearTimeout(gearHoldTimer); gearHoldTimer = null; } });
    </script>
</body>
</html>
