<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回响 · 沉默的课间</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --surface: #1c2333;
    --ink: #e6edf3;
    --muted: #7d8590;
    --accent: #e94560;
    --accent2: #4ecdc4;
    --accent3: #f9c80e;
    --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Georgia, 'Times New Roman', 'Songti SC', serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.9;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ===== SCREEN SYSTEM ===== */
  .screen { display:none; min-height:100vh; }
  .screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; }

  /* ===== COVER PAGE ===== */
  #cover { text-align:center; }
  .cover-logo {
    font-size: 3rem; margin-bottom: 8px; opacity:0.8;
  }
  .cover-title {
    font-size: 3rem; font-weight: bold; letter-spacing: 0.3em;
    margin-bottom: 12px; color: var(--ink);
  }
  .cover-episode {
    font-size: 1rem; color: var(--accent); letter-spacing: 0.2em;
    margin-bottom: 32px; font-family: 'Courier New', monospace;
  }
  .cover-desc {
    max-width: 480px; color: var(--muted); font-size: 1rem;
    line-height: 2; margin-bottom: 40px;
  }
  .cover-tags { display:flex; gap:12px; justify-content:center; margin-bottom:40px; flex-wrap:wrap; }
  .tag {
    background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.3);
    border-radius: 20px; padding: 5px 16px; font-size: 0.8rem;
    color: var(--accent2); letter-spacing: 0.05em;
  }
  .btn-start {
    background: var(--accent); color:#fff; border:none;
    padding: 14px 48px; font-size: 1.1rem; border-radius: 30px;
    cursor: pointer; letter-spacing: 0.15em; font-family: Georgia, serif;
    transition: all 0.3s; box-shadow: 0 4px 20px rgba(233,69,96,0.3);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(233,69,96,0.5); }

  /* ===== STORY PAGE ===== */
  #story { justify-content:flex-start; padding-top:60px; }
  .story-header {
    width:100%; max-width:680px; display:flex; justify-content:space-between;
    align-items:center; margin-bottom:32px; padding-bottom:16px;
    border-bottom: 1px solid var(--border);
  }
  .story-title { font-size: 0.9rem; color: var(--muted); letter-spacing:0.1em; }
  .progress-dots { display:flex; gap:8px; }
  .dot { width:8px; height:8px; border-radius:50%; background: var(--border); transition: background 0.3s; }
  .dot.done { background: var(--accent2); }
  .dot.current { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .story-content {
    width:100%; max-width:680px; min-height: 300px;
  }
  .paragraph {
    font-size: 1.05rem; line-height: 2.1; margin-bottom: 20px;
    color: var(--ink); opacity:0; transition: opacity 0.5s;
  }
  .paragraph.shown { opacity:1; }
  .paragraph.narrator { color: var(--muted); font-style: italic; }
  .paragraph.dialogue { color: var(--accent2); }
  .paragraph.thought { color: var(--accent3); font-style: italic; }

  /* Typewriter cursor */
  .cursor {
    display:inline-block; width:8px; height:1.1em; background:var(--accent2);
    margin-left:2px; vertical-align:text-bottom; animation: blink 0.8s infinite;
  }
  @keyframes blink { 0%,50% {opacity:1;} 51%,100% {opacity:0;} }

  /* Skip hint */
  .skip-hint {
    font-size: 0.75rem; color: var(--muted); text-align:right;
    margin-top:8px; cursor:pointer; opacity:0.5; transition:opacity 0.3s;
  }
  .skip-hint:hover { opacity:1; }

  /* ===== CHOICE CARDS ===== */
  .choices {
    width:100%; max-width:680px; margin-top:32px;
  }
  .choices-label {
    font-size: 0.8rem; color: var(--accent); letter-spacing:0.15em;
    margin-bottom:16px; text-transform: uppercase;
  }
  .choice-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--accent2); border-radius: 0 12px 12px 0;
    padding: 16px 20px; margin-bottom:12px; cursor:pointer;
    transition: all 0.3s; opacity:0; transform: translateX(-10px);
  }
  .choice-card.show { opacity:1; transform: translateX(0); }
  .choice-card:hover {
    border-left-color: var(--accent); background: rgba(233,69,96,0.08);
    transform: translateX(4px);
  }
  .choice-text { font-size: 1rem; color: var(--ink); }
  .choice-hint { font-size: 0.8rem; color: var(--accent); margin-top:6px; }
  .choice-card.ai-choice { border-left-color: var(--accent3); }
  .choice-card.ai-choice .choice-hint { color: var(--accent3); }

  /* ===== AI GENERATING ===== */
  .ai-generating {
    text-align:center; padding:40px;
  }
  .ai-spinner {
    width:48px; height:48px; border:3px solid var(--border);
    border-top-color: var(--accent2); border-radius:50%;
    margin:0 auto 20px; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-text { color: var(--accent2); font-size:0.9rem; letter-spacing:0.1em; }
  .ai-subtext { color: var(--muted); font-size:0.8rem; margin-top:8px; }

  /* ===== ENDING PAGE ===== */
  #ending { text-align:center; }
  .ending-icon { font-size: 3rem; margin-bottom:16px; }
  .ending-title {
    font-size: 2.2rem; font-weight:bold; margin-bottom:8px;
    letter-spacing:0.1em;
  }
  .ending-subtitle { color: var(--accent); font-size:1rem; margin-bottom:32px; letter-spacing:0.1em; }
  .ending-text {
    max-width:560px; font-size:1.05rem; line-height:2.2;
    color: var(--ink); margin-bottom:40px; text-align:left;
  }
  .ending-text .highlight { color: var(--accent3); }

  /* ===== PATH TREE ===== */
  #path-tree { width:100%; max-width:800px; }
  .tree-title { text-align:center; font-size:1.5rem; margin-bottom:8px; }
  .tree-subtitle { text-align:center; color:var(--muted); font-size:0.9rem; margin-bottom:32px; }
  .tree-svg-wrap { overflow-x:auto; padding:20px 0; }
  .tree-node-done { fill: var(--accent2); }
  .tree-node-possible { fill: var(--surface); stroke: var(--border); stroke-width:1; }
  .tree-node-current { fill: var(--accent); }
  .tree-line-done { stroke: var(--accent2); stroke-width:2; }
  .tree-line-possible { stroke: var(--border); stroke-width:1; stroke-dasharray: 4,4; }
  .tree-label { font-size:11px; fill: var(--muted); font-family: 'Courier New', monospace; }
  .tree-label-done { fill: var(--accent2); }

  /* ===== REFLECTION PAGE ===== */
  #reflection { width:100%; max-width:680px; }
  .reflect-title { font-size:1.8rem; text-align:center; margin-bottom:8px; }
  .reflect-sub { text-align:center; color:var(--muted); margin-bottom:32px; }
  .data-card {
    background: var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:28px; margin-bottom:20px;
  }
  .data-number { font-size:2.2rem; font-weight:bold; color:var(--accent); }
  .data-label { color:var(--muted); font-size:0.9rem; margin-top:4px; }
  .data-source { font-size:0.75rem; color:var(--muted); margin-top:12px; opacity:0.7; }
  .reflect-quote {
    font-size:1.1rem; line-height:2.2; color:var(--accent3);
    text-align:center; margin:32px 0; font-style:italic;
  }
  .path-summary {
    background: rgba(78,205,196,0.05); border:1px solid rgba(78,205,196,0.2);
    border-radius:14px; padding:24px; margin-bottom:32px;
  }
  .path-summary h4 { color:var(--accent2); margin-bottom:12px; font-size:0.9rem; letter-spacing:0.1em; }
  .path-step { display:flex; gap:12px; margin-bottom:10px; font-size:0.9rem; }
  .path-step .num { color:var(--accent); font-family:'Courier New',monospace; flex-shrink:0; }
  .path-step .txt { color:var(--ink); }

  .btn-replay {
    background: transparent; color:var(--accent2); border:1px solid var(--accent2);
    padding:12px 36px; font-size:0.95rem; border-radius:30px; cursor:pointer;
    letter-spacing:0.1em; transition:all 0.3s; font-family:Georgia,serif;
  }
  .btn-replay:hover { background:var(--accent2); color:var(--bg); }
  .actions { display:flex; gap:16px; justify-content:center; margin-top:32px; }

  /* ===== FADE TRANSITION ===== */
  .fade-out { animation: fadeOut 0.4s forwards; }
  .fade-in { animation: fadeIn 0.6s forwards; }
  @keyframes fadeOut { to { opacity:0; } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  /* ===== RESPONSIVE ===== */
  @media (max-width:640px) {
    .cover-title { font-size:2rem; }
    .story-content { font-size:0.95rem; }
    .paragraph { font-size:0.95rem; }
  }
</style>
</head>
<body>

<!-- ===== COVER SCREEN ===== -->
<div class="screen active" id="cover">
  <div class="cover-logo">◉</div>
  <div class="cover-title">回 响</div>
  <div class="cover-episode">第一辑 · 沉默的课间</div>
  <p class="cover-desc">
    每个选择，都有回响。<br>
    你不是旁观者——你是故事里的人。<br>
    你的每个选择，都是一次反思。
  </p>
  <div class="cover-tags">
    <span class="tag">校园欺凌</span>
    <span class="tag">互动叙事</span>
    <span class="tag">约15分钟</span>
  </div>
  <button class="btn-start" onclick="startGame()">开始体验</button>
</div>

<!-- ===== STORY SCREEN ===== -->
<div class="screen" id="story">
  <div class="story-header">
    <span class="story-title">回响 · 沉默的课间</span>
    <div class="progress-dots">
      <div class="dot" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
    </div>
  </div>
  <div class="story-content" id="storyContent"></div>
  <div class="skip-hint" id="skipHint" style="display:none;" onclick="skipTyping()">点击跳过文字 ▸</div>
  <div class="choices" id="choices"></div>
</div>

<!-- ===== AI GENERATING SCREEN ===== -->
<div class="screen" id="aiLoading">
  <div class="ai-generating">
    <div class="ai-spinner"></div>
    <div class="ai-text">AI 正在生成剧情</div>
    <div class="ai-subtext" id="aiSubtext">根据你的选择编织后续...</div>
  </div>
</div>

<!-- ===== ENDING SCREEN ===== -->
<div class="screen" id="ending">
  <div class="ending-icon" id="endingIcon"></div>
  <div class="ending-title" id="endingTitle"></div>
  <div class="ending-subtitle" id="endingSubtitle"></div>
  <div class="ending-text" id="endingText"></div>
  <div class="actions">
    <button class="btn-replay" onclick="showPathTree()">查看选择路径</button>
    <button class="btn-replay" onclick="showReflection()">议题反思</button>
  </div>
</div>

<!-- ===== PATH TREE SCREEN ===== -->
<div class="screen" id="pathTree">
  <div style="width:100%;max-width:800px;">
    <div class="tree-title">你的选择路径</div>
    <div class="tree-subtitle">绿色为已走过的路，虚线为未探索的可能</div>
    <div class="tree-svg-wrap">
      <svg id="treeSvg" width="760" height="420" viewBox="0 0 760 420"></svg>
    </div>
    <div class="actions">
      <button class="btn-replay" onclick="showReflection()">查看议题反思</button>
      <button class="btn-replay" onclick="restart()">重新体验</button>
    </div>
  </div>
</div>

<!-- ===== REFLECTION SCREEN ===== -->
<div class="screen" id="reflection">
  <div id="reflectContent" style="width:100%;max-width:680px;"></div>
</div>

<script>
// =============================================
// STORY DATA - 《沉默的课间》
// =============================================
const story = {
  // --- 开场 ---
  opening: {
    type: 'narration',
    paragraphs: [
      { text: '你是李然。', class: '' },
      { text: '初二三班，一个普通得不能再普通的学生。成绩中游，朋友不多，存在感不强。', class: 'narrator' },
      { text: '你唯一的"特点"是——你总是那个看到一切，却什么都不说的人。', class: 'thought' },
      { text: '今天是周三。第二节课下课，你去办公室交作业。', class: 'narrator' },
      { text: '走廊很长。阳光从窗户斜进来，照得地面发白。', class: 'narrator' },
      { text: '然后你听见了笑声。', class: '' },
      { text: '不是开心那种。', class: 'thought' },
    ],
    next: 'node1'
  },

  // --- 节点1：走廊 ---
  node1: {
    type: 'choice',
    nodeNum: 1,
    paragraphs: [
      { text: '走廊尽头。三个人围着一个人。', class: 'narrator' },
      { text: '是小陈。他被堵在厕所门口，书包带子断了，课本散了一地。', class: 'narrator' },
      { text: '为首的男生——你认识他，隔壁班的张浩——一把推在小陈肩上。小陈撞到墙上，发出闷响。', class: '' },
      { text: '"叫你帮写作业你不写，装什么清高？"', class: 'dialogue' },
      { text: '你抱着作业本，站在走廊中间。距离教室十步。老师办公室在走廊另一头。', class: 'narrator' },
      { text: '小陈抬起头，看见了走廊中间的你。', class: '' },
      { text: '你们的目光对上了。只有一秒。但你觉得那一秒很长。', class: 'thought' },
    ],
    choices: [
      { id: 'A', text: '大喊一声"王老师来了！"吓走他们', hint: '→ 勇敢，但可能被记恨', next: 'trans1A' },
      { id: 'B', text: '低头快步走过，假装没看见', hint: '→ 安全，但小陈看见了你的眼神', next: 'trans1B' },
      { id: 'C', text: '转身去办公室找王老师', hint: '→ 稳妥，但可能来不及', next: 'trans1C' },
      { id: 'D', text: '（输入你想做的事）', hint: '→ AI 将根据你的选择生成后续', next: 'trans1D', isAI: true }
    ]
  },

  // --- 过渡1A：喊了 ---
  trans1A: {
    type: 'transition',
    aiSubtext: '你选择了勇敢——AI正在编织后果...',
    paragraphs: [
      { text: '"王老师来了！！"', class: 'dialogue' },
      { text: '你的声音在走廊里炸开。三个人条件反射般松手后退。张浩回头扫了一眼，没看到老师，但已经散了。', class: 'narrator' },
      { text: '"算你运气好。"他踢了一脚地上的课本，带人走了。', class: 'dialogue' },
      { text: '小陈蹲在地上捡书。你想过去帮他，但他没看你。', class: 'narrator' },
      { text: '下午最后一节课。你被叫出去。"你挺能耐啊。"张浩靠在走廊栏杆上，笑着看你。', class: '' },
      { text: '放学了。你背着书包走出校门。他们在门口等你。', class: 'thought' },
    ],
    next: 'node2A'
  },

  // --- 过渡1B：沉默走过 ---
  trans1B: {
    type: 'transition',
    aiSubtext: '你选择了沉默——AI正在编织那道目光的重量...',
    paragraphs: [
      { text: '你低下头。脚步加快。书包带子勒进肩膀。', class: 'narrator' },
      { text: '经过他们的时候，你屏住了呼吸。三秒。两秒。一秒。', class: 'thought' },
      { text: '你走过去了。背后传来一声闷响。然后是笑。', class: '' },
      { text: '第二天。小陈的座位空了。', class: 'narrator' },
      { text: '第三天也是。', class: '' },
      { text: '老师说小陈转学了。大家"哦"了一声，继续上课。', class: 'narrator' },
      { text: '放学后你收拾书包，在小陈的课桌抽屉里看见一张纸条。你不知道它什么时候放进去的。', class: '' },
      { text: '上面写着六个字："谢谢，没关系。"', class: 'dialogue' },
      { text: '你觉得这六个字比什么都重。', class: 'thought' },
    ],
    next: 'node2B'
  },

  // --- 过渡1C：找老师 ---
  trans1C: {
    type: 'transition',
    aiSubtext: '你选择了求助——AI正在编织信任的代价...',
    paragraphs: [
      { text: '你转身快步走向办公室。王老师正在批作业。', class: 'narrator' },
      { text: '"老师，走廊那边有人欺负小陈——"', class: 'dialogue' },
      { text: '王老师皱眉起身，跟你走到走廊。', class: 'narrator' },
      { text: '走廊已经空了。地上还有几本散落的课本。小陈不见了。', class: '' },
      { text: '"哪个班的？你叫什么？"王老师问你。你说了。', class: 'narrator' },
      { text: '第二天，你发现课桌上被人写了三个字：告状精。', class: '' },
      { text: '粉笔字。擦了还有印记。', class: 'thought' },
    ],
    next: 'node2C'
  },

  // --- 过渡1D：AI输入 ---
  trans1D: {
    type: 'transition',
    aiSubtext: 'AI正在理解你的选择，并生成专属剧情...',
    paragraphs: [
      { text: '你做了一个只有你能决定的事。', class: 'narrator' },
      { text: '（正式版中，AI将根据你的输入实时生成后续剧情。当前Demo版本展示预设过渡。）', class: 'thought' },
      { text: '不管你做了什么——走廊里的事，在你心里留下了痕迹。', class: '' },
      { text: '几天后，你听到了一些消息。关于小陈。关于那些人。关于这所学校。', class: 'narrator' },
      { text: '你开始想：如果当时做点不一样的，会怎样？', class: 'thought' },
    ],
    next: 'node2D'
  },

  // --- 节点2A：被堵后 ---
  node2A: {
    type: 'choice',
    nodeNum: 2,
    paragraphs: [
      { text: '三个人围着你。张浩把你的书包带子扯了一下。', class: 'narrator' },
      { text: '"管得挺宽啊。以后少管闲事。"', class: 'dialogue' },
      { text: '你攥紧了拳头。心跳很快。手指是凉的。', class: 'thought' },
      { text: '你想起小陈被推到墙上的那一幕。现在轮到你了。', class: '' },
    ],
    choices: [
      { id: 'A', text: '咬牙忍了，低头走开', hint: '→ 你尝到了小陈的滋味', next: 'trans2A1' },
      { id: 'B', text: '告诉家长，让大人来处理', hint: '→ 求助不是软弱', next: 'trans2A2' },
      { id: 'C', text: '找到小陈，和他站在一起', hint: '→ 一个人是弱者，两个人就不一定了', next: 'trans2A3' }
    ]
  },

  // --- 节点2B：纸条之后 ---
  node2B: {
    type: 'choice',
    nodeNum: 2,
    paragraphs: [
      { text: '你攥着那张纸条，站在空荡荡的教室里。', class: 'narrator' },
      { text: '"谢谢，没关系。"', class: 'dialogue' },
      { text: '他说谢谢。他说没关系。', class: 'thought' },
      { text: '可你明明经过他身边的时候，他抬起头看了你。那一秒里，他是不是以为你会停下？', class: '' },
      { text: '你把纸条翻过来。背面还有一行小字：', class: 'narrator' },
      { text: '"其实我每天都在等有人停下来。"', class: 'dialogue' },
    ],
    choices: [
      { id: 'A', text: '把纸条藏起来，假装从没见过', hint: '→ 有些东西藏不住', next: 'trans2B1' },
      { id: 'B', text: '拿着纸条去找老师，说出真相', hint: '→ 迟到的勇气也是勇气', next: 'trans2B2' },
      { id: 'C', text: '找到小陈的联系方式，向他道歉', hint: '→ 道歉不改变过去，但能改变未来', next: 'trans2B3' }
    ]
  },

  // --- 节点2C：被孤立后 ---
  node2C: {
    type: 'choice',
    nodeNum: 2,
    paragraphs: [
      { text: '"告状精"三个字擦了，但全班都知道了。', class: 'narrator' },

// =============================================
// GAME ENGINE
// =============================================
let gameState = {
  currentScene: 'opening',
  choices: [],      // 记录玩家选择: [{node, choiceId, choiceText}]
  nodeProgress: 0,  // 当前节点序号
  isTyping: false,
  typeTimer: null,
  skipRequested: false
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const screen = document.getElementById(id);
  screen.classList.add('active');
  screen.classList.add('fade-in');
  setTimeout(() => screen.classList.remove('fade-in'), 600);
}

function startGame() {
  gameState = { currentScene:'opening', choices:[], nodeProgress:0, isTyping:false, typeTimer:null, skipRequested:false };
  showScreen('story');
  setTimeout(() => loadScene('opening'), 400);
}

function updateDots() {
  for (let i=1; i<=3; i++) {
    const dot = document.getElementById('dot'+i);
    dot.className = 'dot';
    if (i < gameState.nodeProgress) dot.classList.add('done');
    else if (i === gameState.nodeProgress) dot.classList.add('current');
  }
}

function loadScene(sceneId) {
  const scene = story[sceneId];
  if (!scene) return;
  gameState.currentScene = sceneId;

  if (scene.type === 'ending') {
    showEnding(scene);
    return;
  }

  if (scene.type === 'transition') {
    // Show AI loading first
    document.getElementById('aiSubtext').textContent = scene.aiSubtext || '根据你的选择编织后续...';
    showScreen('aiLoading');
    setTimeout(() => {
      showScreen('story');
      renderScene(scene);
    }, 2200);
    return;
  }

  // narration or choice
  if (scene.nodeNum) {
    gameState.nodeProgress = scene.nodeNum;
    updateDots();
  }
  showScreen('story');
  renderScene(scene);
}

function renderScene(scene) {
  const content = document.getElementById('storyContent');
  const choicesEl = document.getElementById('choices');
  const skipHint = document.getElementById('skipHint');

  content.innerHTML = '';
  choicesEl.innerHTML = '';
  skipHint.style.display = 'none';

  // Render paragraphs with typewriter effect
  const paragraphs = scene.paragraphs || [];
  let delay = 0;

  paragraphs.forEach((para, i) => {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'paragraph ' + (para.class || '');
      p.id = 'para-' + i;
      content.appendChild(p);
      typeText(p, para.text, i);
      skipHint.style.display = 'block';
    }, delay);
    delay += para.text.length * 30 + 500; // estimate reading time
  });

  // Show choices after all paragraphs (if choice scene)
  if (scene.type === 'choice' && scene.choices) {
    const totalDelay = delay + 300;
    setTimeout(() => {
      renderChoices(scene);
    }, totalDelay);
  } else if (scene.next) {
    // narration/transition: auto-advance after reading
    setTimeout(() => {
      loadScene(scene.next);
    }, delay + 800);
  }
}

function typeText(element, text, paraIndex) {
  if (gameState.skipRequested) {
    element.textContent = text;
    element.classList.add('shown');
    return;
  }

  gameState.isTyping = true;
  let i = 0;
  element.innerHTML = '<span class="cursor"></span>';

  gameState.typeTimer = setInterval(() => {
    if (i < text.length) {
      // Handle HTML tags
      if (text[i] === '<') {
        const closeIdx = text.indexOf('>', i);
        if (closeIdx !== -1) {
          const tag = text.substring(i, closeIdx + 1);
          const currentHTML = element.innerHTML.replace('<span class="cursor"></span>', '');
          element.innerHTML = currentHTML + tag + '<span class="cursor"></span>';
          i = closeIdx + 1;
        }
      } else {
        const currentHTML = element.innerHTML.replace('<span class="cursor"></span>', '');
        element.innerHTML = currentHTML + text[i] + '<span class="cursor"></span>';
        i++;
      }
    } else {
      clearInterval(gameState.typeTimer);
      element.innerHTML = text;
      element.classList.add('shown');
      gameState.isTyping = false;
    }
  }, 35);
}

function skipTyping() {
  gameState.skipRequested = true;
  if (gameState.typeTimer) clearInterval(gameState.typeTimer);

  // Show all paragraphs immediately
  const scene = story[gameState.currentScene];
  if (!scene || !scene.paragraphs) return;

  scene.paragraphs.forEach((para, i) => {
    const el = document.getElementById('para-' + i);
    if (el) {
      el.innerHTML = para.text;
      el.classList.add('shown');
    }
  });

  document.getElementById('skipHint').style.display = 'none';

  // Show choices immediately if applicable
  if (scene.type === 'choice' && scene.choices) {
    renderChoices(scene);
  }
}

function renderChoices(scene) {
  const choicesEl = document.getElementById('choices');
  const skipHint = document.getElementById('skipHint');
  skipHint.style.display = 'none';

  const label = document.createElement('div');
  label.className = 'choices-label';
  label.textContent = '你的选择';
  choicesEl.appendChild(label);

  scene.choices.forEach((choice, i) => {
    const card = document.createElement('div');
    card.className = 'choice-card' + (choice.isAI ? ' ai-choice' : '');
    card.innerHTML = `
      <div class="choice-text">${choice.text}</div>
      <div class="choice-hint">${choice.hint}</div>
    `;
    card.onclick = () => makeChoice(scene, choice);
    choicesEl.appendChild(card);

    setTimeout(() => card.classList.add('show'), i * 150 + 100);
  });
}

function makeChoice(scene, choice) {
  // Record the choice
  gameState.choices.push({
    node: scene.nodeNum || 0,
    choiceId: choice.id,
    choiceText: choice.text,
    hint: choice.hint
  });

  // Fade out and load next scene
  const storyEl = document.getElementById('story');
  storyEl.classList.add('fade-out');

  setTimeout(() => {
    storyEl.classList.remove('fade-out');
    loadScene(choice.next);
  }, 400);
}

// =============================================
// ENDING PAGE
// =============================================
function showEnding(scene) {
  showScreen('ending');
  document.getElementById('endingIcon').textContent = scene.icon;
  document.getElementById('endingTitle').textContent = scene.title;
  document.getElementById('endingSubtitle').textContent = scene.subtitle;

  const textEl = document.getElementById('endingText');
  textEl.innerHTML = '';
  scene.text.forEach((line, i) => {
    const p = document.createElement('p');
    p.style.opacity = '0';
    p.style.transition = 'opacity 0.8s';
    p.innerHTML = line;
    textEl.appendChild(p);
    setTimeout(() => { p.style.opacity = '1'; }, i * 800 + 500);
  });
}

// =============================================
// PATH TREE VISUALIZATION
// =============================================
function showPathTree() {
  showScreen('pathTree');
  const svg = document.getElementById('treeSvg');
  svg.innerHTML = '';

  const nodes = [
    // Level 0 - Root
    { x: 380, y: 30, label: '开始', id: 'start', isDone: true },
    // Level 1 - Node 1
    { x: 380, y: 100, label: '目睹欺凌', id: 'n1', isDone: true },
    // Level 2 - Choices of Node 1
    { x: 100, y: 180, label: 'A 喊"老师来了"', id: 'n1A', isDone: checkChoice(1,'A') },
    { x: 290, y: 180, label: 'B 沉默走过', id: 'n1B', isDone: checkChoice(1,'B') },
    { x: 470, y: 180, label: 'C 找老师', id: 'n1C', isDone: checkChoice(1,'C') },
    { x: 640, y: 180, label: 'D AI输入', id: 'n1D', isDone: checkChoice(1,'D') },
    // Level 3 - Node 2
    { x: 380, y: 260, label: '面对后果', id: 'n2', isDone: gameState.nodeProgress >= 2 },
    // Level 4 - Choices of Node 2
    { x: 150, y: 330, label: '隐忍/沉默', id: 'n2A', isDone: checkChoice(2,'A') },
    { x: 380, y: 330, label: '求助/道歉', id: 'n2B', isDone: checkChoice(2,'B') },
    { x: 600, y: 330, label: '站在一起', id: 'n2C', isDone: checkChoice(2,'C') },
    // Level 5 - Node 3
    { x: 380, y: 400, label: '最终选择', id: 'n3', isDone: gameState.nodeProgress >= 3 },
  ];

  // Draw lines
  const lines = [
    { from:'start', to:'n1', done:true },
    { from:'n1', to:'n1A', done:checkChoice(1,'A') },
    { from:'n1', to:'n1B', done:checkChoice(1,'B') },
    { from:'n1', to:'n1C', done:checkChoice(1,'C') },
    { from:'n1', to:'n1D', done:checkChoice(1,'D') },
    { from:'n1A', to:'n2', done:checkChoice(1,'A') },
    { from:'n1B', to:'n2', done:checkChoice(1,'B') },
    { from:'n1C', to:'n2', done:checkChoice(1,'C') },
    { from:'n1D', to:'n2', done:checkChoice(1,'D') },
    { from:'n2', to:'n2A', done:checkChoice(2,'A') },
    { from:'n2', to:'n2B', done:checkChoice(2,'B') },
    { from:'n2', to:'n2C', done:checkChoice(2,'C') },
    { from:'n2A', to:'n3', done:checkChoice(2,'A') },
    { from:'n2B', to:'n3', done:checkChoice(2,'B') },
    { from:'n2C', to:'n3', done:checkChoice(2,'C') },
  ];

  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  lines.forEach(line => {
    const from = nodeMap[line.from];
    const to = nodeMap[line.to];
    if (!from || !to) return;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    // Curved path
    const midY = (from.y + to.y) / 2;
    path.setAttribute('d', `M${from.x},${from.y} C${from.x},${midY} ${to.x},${midY} ${to.x},${to.y}`);
    path.setAttribute('class', line.done ? 'tree-line-done' : 'tree-line-possible');
    path.setAttribute('fill', 'none');
    svg.appendChild(path);
  });

  // Draw nodes
  nodes.forEach(n => {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', n.x);
    circle.setAttribute('cy', n.y);
    circle.setAttribute('r', 6);
    circle.setAttribute('class', n.isDone ? 'tree-node-done' : 'tree-node-possible');
    svg.appendChild(circle);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', n.x);
    text.setAttribute('y', n.y - 14);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('class', n.isDone ? 'tree-label tree-label-done' : 'tree-label');
    text.textContent = n.label;
    svg.appendChild(text);
  });
}

function checkChoice(nodeNum, choiceId) {
  return gameState.choices.some(c => c.node === nodeNum && c.choiceId === choiceId);
}

// =============================================
// REFLECTION PAGE
// =============================================
function showReflection() {
  showScreen('reflection');
  const el = document.getElementById('reflectContent');

  // Build path summary
  let pathHTML = '';
  gameState.choices.forEach((c, i) => {
    pathHTML += `
      <div class="path-step">
        <span class="num">选择${i+1}</span>
        <span class="txt">${c.choiceText} <span style="color:var(--accent);font-size:0.8rem;">${c.hint}</span></span>
      </div>
    `;
  });

  // Determine ending achieved
  const lastChoice = gameState.choices[gameState.choices.length - 1];
  let endingName = '';
  if (lastChoice) {
    if (lastChoice.choiceId === 'A') endingName = '《回响》——你说出了真相';
    else if (lastChoice.choiceId === 'B') endingName = '《涟漪》——你看见了施暴者的伤';
    else endingName = '《沉默的课间》——你选择改变一个人的课间';
  }

  el.innerHTML = `
    <div class="reflect-title">议题反思</div>
    <div class="reflect-sub">这不是游戏。这是每天都在发生的现实。</div>

    <div class="path-summary">
      <h4>你的故事路径</h4>
      ${pathHTML}
      <div class="path-step" style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border);">
        <span class="num">结局</span>
        <span class="txt" style="color:var(--accent3);">${endingName}</span>
      </div>
    </div>

    <div class="data-card">
      <div class="data-number">32.5%</div>
      <div class="data-label">我国中小学生曾遭受不同形式的校园欺凌</div>
      <div class="data-source">数据来源：中国教育追踪调查(CEPS)相关研究</div>
    </div>

    <div class="data-card">
      <div class="data-number">87%</div>
      <div class="data-label">校园欺凌事件中，有旁观者在场</div>
      <div class="data-source">数据来源：国外校园欺凌研究文献综述</div>
    </div>

    <div class="data-card">
      <div class="data-number">沉默</div>
      <div class="data-label">是大多数旁观者的选择，也是欺凌得以持续的土壤</div>
    </div>

    <div class="reflect-quote">
      "你不需要成为英雄。<br>
      你只需要——在那个人抬起头的时候，<br>
      没有把目光移开。"
    </div>

    <div class="data-card">
      <p style="font-size:0.95rem; line-height:2; color:var(--ink);">
        <strong style="color:var(--accent2);">如果你刚才选择了沉默——</strong><br>
        你体验了大多数人的选择。这不怪你，恐惧是真实的。但请记住故事里那句话：
        "其实我每天都在等有人停下来。"
      </p>
      <p style="font-size:0.95rem; line-height:2; color:var(--ink); margin-top:16px;">
        <strong style="color:var(--accent2);">如果你刚才选择了行动——</strong><br>
        你体验了勇气的代价。它不总是有好结果，可能被记恨、被孤立。但你的选择，会被那个被欺负的人记一辈子。
      </p>
    </div>

    <div class="reflect-quote">
      每一个旁观者的选择，都是故事的一部分。<br>
      你的选择——不管是故事里的，还是现实中的——都有回响。
    </div>

    <div class="actions">
      <button class="btn-replay" onclick="showPathTree()">查看选择路径</button>
      <button class="btn-replay" onclick="restart()">重新体验</button>
    </div>
  `;
}

function restart() {
  gameState = { currentScene:'opening', choices:[], nodeProgress:0, isTyping:false, typeTimer:null, skipRequested:false };
  showScreen('cover');
}

// Reset skip flag when loading new scene
const originalLoadScene = loadScene;
loadScene = function(sceneId) {
  gameState.skipRequested = false;
  originalLoadScene(sceneId);
};
</script>
