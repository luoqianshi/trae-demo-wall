<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智管慢病 - 基层慢病管理信息系统</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Chart.js 用于图表渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 登录页 -->
    <div id="login-page" class="login-page">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">
            <span class="logo-icon">❤</span>
          </div>
          <h1>智管慢病</h1>
          <p>基层慢病管理信息系统</p>
        </div>
        <div class="login-form">
          <div class="form-item">
            <label>用户名</label>
            <input type="text" id="login-username" placeholder="请输入用户名" />
          </div>
          <div class="form-item">
            <label>密码</label>
            <input type="password" id="login-password" placeholder="请输入密码" value="123456" />
          </div>
          <div class="role-list">
            <div class="role-list-title">选择角色登录（点击卡片自动填充）</div>
            <div class="role-cards">
              <div class="role-card" data-role="doctor">
                <div class="role-avatar doctor">医</div>
                <div class="role-info">
                  <div class="role-name">张医生</div>
                  <div class="role-desc">基层医生 · 幸福社区卫生服务中心</div>
                </div>
              </div>
              <div class="role-card" data-role="director">
                <div class="role-avatar director">主</div>
                <div class="role-info">
                  <div class="role-name">陈主任</div>
                  <div class="role-desc">主任 · 幸福社区卫生服务中心</div>
                </div>
              </div>
              <div class="role-card" data-role="admin">
                <div class="role-avatar admin">管</div>
                <div class="role-info">
                  <div class="role-name">李管理员</div>
                  <div class="role-desc">机构管理员 · 全部权限</div>
                </div>
              </div>
              <div class="role-card" data-role="patient">
                <div class="role-avatar patient">患</div>
                <div class="role-info">
                  <div class="role-name">王患者</div>
                  <div class="role-desc">患者 · p001</div>
                </div>
              </div>
            </div>
          </div>
          <button class="login-btn" id="login-btn">登 录</button>
        </div>
        <div class="login-footer">Demo 演示版本 · 数据均为模拟生成</div>
      </div>
    </div>

    <!-- 主应用 -->
    <div id="main-app" class="main-app" style="display:none;">
      <!-- 侧边栏 -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <span class="logo-icon">❤</span>
          <span class="logo-text">智管慢病</span>
        </div>
        <nav class="sidebar-menu" id="sidebar-menu"></nav>
      </aside>

      <!-- 主内容区 -->
      <div class="main-content">
        <header class="main-header">
          <div class="breadcrumb" id="breadcrumb"></div>
          <div class="header-right">
            <span class="role-switcher" id="role-switcher"></span>
            <div class="user-info">
              <span class="user-avatar" id="user-avatar"></span>
              <span class="user-name" id="user-name"></span>
            </div>
            <button class="logout-btn" id="logout-btn">退出</button>
          </div>
        </header>
        <main class="page-content" id="page-content"></main>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
