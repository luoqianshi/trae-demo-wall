<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>闲置物品专项管理网页</title>
  <style>
    @font-face {
      font-family: "Instrument Sans";
      src: url("./_shared/fonts/InstrumentSans-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "Instrument Sans";
      src: url("./_shared/fonts/InstrumentSans-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --bg: #f5f9ff;
      --bg2: #ffffff;
      --ink: #142033;
      --muted: #607089;
      --rule: #d8e5f6;
      --accent: #2563eb;
      --accent2: #0ea5e9;
      --soft: rgba(37, 99, 235, 0.1);
      --soft2: rgba(14, 165, 233, 0.12);
      --danger: #dc2626;
      --shadow: rgba(37, 99, 235, 0.08);
      --radius: 22px;
      --radius-sm: 14px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.16), transparent 34rem),
        linear-gradient(180deg, var(--bg), var(--bg2) 150%);
      color: var(--ink);
      font-family: "Instrument Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      border-bottom: 1px solid var(--rule);
      background: color-mix(in srgb, var(--bg2) 88%, transparent);
      backdrop-filter: blur(18px);
    }

    .nav {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 28px var(--shadow);
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .nav-links a {
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .nav-links a:hover {
      background: var(--bg2);
      color: var(--ink);
    }

    .hero {
      padding: 18px 0 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }

    .panel,
    .hero-card,
    .post-card,
    .form-card,
    .item-card,
    .value-card {
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      box-shadow: 0 18px 52px var(--shadow);
    }

    .hero-card {
      padding: 24px 28px;
      min-height: auto;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      right: -110px;
      bottom: -120px;
      border-radius: 999px;
      background: var(--soft2);
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent);
      font-size: 0.88rem;
      font-weight: 700;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 3.8vw, 3.7rem);
      line-height: 1.03;
      letter-spacing: -0.055em;
      max-width: 760px;
    }

    h2 {
      font-size: clamp(1.75rem, 3.2vw, 2.65rem);
      line-height: 1.08;
      letter-spacing: -0.055em;
      margin-bottom: 16px;
    }

    h3 {
      font-size: 1.04rem;
      letter-spacing: -0.025em;
      margin-bottom: 9px;
    }

    .lead {
      max-width: 900px;
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 0;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 34px;
      position: relative;
      z-index: 2;
    }

    .btn {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 18px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      background: var(--bg2);
      color: var(--ink);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .btn.primary {
      background: var(--ink);
      color: var(--bg2);
      border-color: var(--ink);
    }

    .btn.full {
      width: 100%;
    }

    .hero-side {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
      align-items: stretch;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 1fr;
      gap: 12px;
    }

    .metric {
      padding: 14px 16px;
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: var(--radius-sm);
      display: grid;
      grid-template-columns: 38px 1fr;
      grid-template-rows: auto auto;
      column-gap: 12px;
      row-gap: 4px;
      align-items: center;
    }

    .metric .metric-icon {
      grid-row: 1 / span 2;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .metric strong {
      display: block;
      margin: 0;
      color: var(--ink);
      font-size: 1.6rem;
      line-height: 1;
      letter-spacing: -0.04em;
      align-self: end;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.25;
      align-self: start;
    }

    .metric.accent {
      background: linear-gradient(135deg, var(--soft), var(--bg2));
    }

    .metric.accent strong {
      color: var(--accent);
    }

    .alert-panel {
      padding: 14px;
      overflow: hidden;
      position: relative;
    }

    .alert-panel h3 {
      margin-bottom: 4px;
    }

    .alert-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--soft), transparent 58%, var(--soft2));
      pointer-events: none;
    }

    .alert-panel > * {
      position: relative;
    }

    .alert-list {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    .alert-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 10px;
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
    }

    .alert-item span:last-child {
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }

    section {
      padding: 18px 0;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: 14px;
    }

    .section-head p {
      max-width: 620px;
      margin-bottom: 0;
      color: var(--muted);
    }

    .app-shell {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: start;
    }

    .form-card {
      padding: 18px;
      position: static;
      display: flex;
      flex-direction: column;
    }

    .form-card h3 {
      min-height: 0;
      margin-bottom: 4px;
    }

    .form-card .field {
      margin-bottom: 0;
    }

    .form-card .btn {
      margin-top: 4px;
      min-height: 40px;
    }

    .form-help {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .field {
      display: grid;
      gap: 5px;
      margin-bottom: 8px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--rule);
      border-radius: 11px;
      padding: 7px 9px;
      background: #f8fbff;
      color: var(--ink);
      outline: none;
      min-height: 36px;
    }

    .field textarea {
      min-height: 46px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      background: var(--bg2);
    }

    .inline-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .photo-drop {
      min-height: 96px;
      max-height: 130px;
      border: 1px dashed var(--rule);
      border-radius: var(--radius-sm);
      background: #f8fbff;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 6px;
      overflow: hidden;
      font-size: 0.8rem;
    }

    .photo-drop img {
      max-width: 100%;
      max-height: 118px;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }

    .workspace {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      min-height: 86px;
      padding: 18px;
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
    }

    .search {
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: #f8fbff;
      border: 1px solid var(--rule);
      border-radius: 999px;
    }

    .search span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--bg2);
      font-size: 0.86rem;
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .search input {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tab {
      padding: 8px 12px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      background: var(--bg2);
      color: var(--muted);
    }

    .tab.active {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--bg2);
    }

    .items {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .pager {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 4px 0;
    }

    .pager button {
      min-width: 82px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--bg2);
      color: var(--ink);
    }

    .pager button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .pager span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .item-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .item-card h3 {
      margin-bottom: 0;
      line-height: 1.25;
    }

    .item-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .item-top {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: start;
    }

    .thumb {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      border: 1px solid var(--rule);
      background: linear-gradient(135deg, var(--soft), var(--soft2));
      display: grid;
      place-items: center;
      color: var(--accent);
      font-weight: 700;
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tag-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      margin-top: 6px;
      overflow: hidden;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--rule);
      font-size: 0.75rem;
      line-height: 1.25;
      white-space: nowrap;
    }

    .pill.good {
      background: var(--soft);
      color: var(--accent);
      border-color: transparent;
      font-weight: 700;
    }

    .pill.warn {
      background: var(--soft2);
      color: #0369a1;
      border-color: transparent;
      font-weight: 700;
    }

    .item-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .mini-stat {
      padding: 8px;
      border: 1px solid var(--rule);
      border-radius: 13px;
      background: #f8fbff;
    }

    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.25;
    }

    .mini-stat strong {
      display: block;
      margin-top: 3px;
      line-height: 1.25;
      font-size: 0.92rem;
    }

    .note {
      color: var(--muted);
      margin: 0;
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .item-card .note {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding-top: 9px;
      border-top: 1px solid var(--rule);
      flex-wrap: nowrap;
    }

    .select-action {
      max-width: 150px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      padding: 7px 10px;
      background: var(--bg2);
      color: var(--ink);
      outline: none;
      font-size: 0.9rem;
    }

    .small-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 4px 0;
      font-size: 0.9rem;
    }

    .small-btn:hover {
      color: var(--danger);
    }

    .empty {
      display: none;
      padding: 34px;
      text-align: center;
      border: 1px dashed var(--rule);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--bg2);
    }

    footer {
      padding: 42px 0 58px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .hero-side,
      .metric-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .form-card {
        position: static;
      }

      .items {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 24px, var(--max));
      }

      .nav,
      .section-head {
        display: block;
      }

      .nav {
        padding: 14px 0;
      }

      .nav-links {
        margin-top: 12px;
        justify-content: flex-start;
      }

      .hero {
        padding-top: 44px;
      }

      .hero-card,
      .form-card {
        padding: 24px;
      }

      .metric-grid,
      .hero-side,
      .inline-fields,
      .toolbar,
      .item-stats {
        grid-template-columns: 1fr;
      }

      .item-top {
        grid-template-columns: 1fr;
      }

      .thumb {
        width: 100%;
        height: 150px;
      }
    }

    @media print {
      .topbar,
      .form-card,
      .toolbar,
      .item-actions {
        display: none;
      }

      body {
        background: var(--bg2);
      }

      .hero,
      .app-shell {
        display: block;
      }

      .panel,
      .hero-card,
      .item-card,
      .metric {
        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="nav page" aria-label="页面导航">
      <a class="brand" href="#top" aria-label="返回顶部">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>闲置物品管理</span>
      </a>
    </nav>
  </header>

  <main id="top" class="page">
    <section class="hero" aria-label="台账概览">
      <aside class="hero-side" aria-label="台账概览">
        <div class="metric-grid">
          <div class="metric accent">
            <div class="metric-icon" aria-hidden="true">★</div>
            <strong id="stat-total">0</strong>
            <span>已录入闲置物品</span>
          </div>
          <div class="metric">
            <div class="metric-icon" aria-hidden="true">¥</div>
            <strong id="stat-value">¥0</strong>
            <span>预计可回收金额</span>
          </div>
          <div class="metric">
            <div class="metric-icon" aria-hidden="true">⏱</div>
            <strong id="stat-long">0</strong>
            <span>超 180 天未处理</span>
          </div>
          <div class="metric">
            <div class="metric-icon" aria-hidden="true">✓</div>
            <strong id="stat-closed">0</strong>
            <span>已完成流转记录</span>
          </div>
        </div>

        <div class="panel alert-panel">
          <h3>长期堆积提醒</h3>
          <p class="note">优先处理闲置周期长、占空间、价值衰减快的物品。</p>
          <div class="alert-list" id="alert-list"></div>
        </div>
      </aside>
    </section>

    <section id="prototype" aria-label="个人闲置物品台账">
      <div class="app-shell">
        <form class="form-card" id="item-form">
          <h3>新增闲置物品</h3>
          <p class="form-help">录入照片、价格、配件与闲置日期，自动统计天数，并支持搜索筛选和状态管理。</p>

          <div class="field">
            <label for="photo">物品照片</label>
            <input id="photo" type="file" accept="image/*" />
            <div class="photo-drop" id="photo-preview">上传照片后将在这里预览</div>
          </div>

          <div class="field">
            <label for="name">物品名称</label>
            <input id="name" name="name" type="text" placeholder="例如：蓝牙耳机、旧相机、冬季外套" required />
          </div>

          <div class="inline-fields">
            <div class="field">
              <label for="category">分类</label>
              <select id="category" name="category">
                <option>数码</option>
                <option>衣物</option>
                <option>书籍</option>
                <option>家电</option>
                <option>运动</option>
                <option>其他</option>
              </select>
            </div>
            <div class="field">
              <label for="condition">成色</label>
              <select id="condition" name="condition">
                <option>几乎全新</option>
                <option>轻微使用</option>
                <option>正常磨损</option>
                <option>明显使用痕迹</option>
              </select>
            </div>
          </div>

          <div class="inline-fields">
            <div class="field">
              <label for="buyPrice">购入价</label>
              <input id="buyPrice" name="buyPrice" type="number" min="0" value="299" />
            </div>
            <div class="field">
              <label for="sellPrice">期望售价</label>
              <input id="sellPrice" name="sellPrice" type="number" min="0" value="99" />
            </div>
          </div>

          <div class="inline-fields">
            <div class="field">
              <label for="idleDate">闲置开始日期</label>
              <input id="idleDate" name="idleDate" type="date" required />
            </div>
            <div class="field">
              <label for="status">处理状态</label>
              <select id="status" name="status">
                <option>待处理</option>
                <option>准备转卖</option>
                <option>已转卖</option>
                <option>已赠送</option>
                <option>已丢弃</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="accessories">配件情况</label>
            <input id="accessories" name="accessories" type="text" placeholder="例如：包装盒、充电线、说明书齐全" />
          </div>

          <div class="field">
            <label for="note">备注</label>
            <textarea id="note" name="note" placeholder="记录购入渠道、瑕疵、处理计划等"></textarea>
          </div>

          <button class="btn primary full" type="submit">加入闲置台账</button>
        </form>

        <div class="workspace">
          <div class="toolbar">
            <div class="search">
              <span aria-hidden="true">检索</span>
              <input id="search" type="search" placeholder="搜索名称、分类、成色、配件或备注" />
            </div>
            <div class="tabs" aria-label="状态筛选">
              <button class="tab active" type="button" data-filter="全部">全部</button>
              <button class="tab" type="button" data-filter="待处理">待处理</button>
              <button class="tab" type="button" data-filter="准备转卖">准备转卖</button>
              <button class="tab" type="button" data-filter="已完成">已完成</button>
            </div>
          </div>

          <div class="items" id="items"></div>
          <div class="empty" id="empty">暂时没有匹配物品，可以调整筛选条件或新增一件闲置。</div>
          <div class="pager" id="pager">
            <button type="button" id="prev-page">上一页</button>
            <span id="page-info">第 1 / 1 页</span>
            <button type="button" id="next-page">下一页</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="page">
    <p>闲置物品专项管理网页 · 让每一件物品都有清晰去向</p>
  </footer>

  <script>
    const storageKey = "idle-item-manager-items";
    const completedStatuses = ["已转卖", "已赠送", "已丢弃"];
    const today = new Date();
    const dateToValue = (date) => date.toISOString().slice(0, 10);

    const seedItems = [
      {
        id: "demo-1",
        name: "备用蓝牙耳机",
        category: "数码",
        condition: "轻微使用",
        buyPrice: 399,
        sellPrice: 169,
        idleDate: dateToValue(new Date(today.getFullYear(), today.getMonth() - 8, today.getDate())),
        status: "准备转卖",
        accessories: "充电盒、数据线齐全",
        note: "音质正常，适合拍照后挂二手平台。",
        photo: ""
      },
      {
        id: "demo-2",
        name: "冬季厚外套",
        category: "衣物",
        condition: "正常磨损",
        buyPrice: 599,
        sellPrice: 120,
        idleDate: dateToValue(new Date(today.getFullYear(), today.getMonth() - 14, today.getDate())),
        status: "待处理",
        accessories: "无配件",
        note: "占衣柜空间较大，可考虑转卖或捐赠。",
        photo: ""
      },
      {
        id: "demo-3",
        name: "摄影入门书",
        category: "书籍",
        condition: "几乎全新",
        buyPrice: 88,
        sellPrice: 35,
        idleDate: dateToValue(new Date(today.getFullYear(), today.getMonth() - 3, today.getDate())),
        status: "待处理",
        accessories: "书签一枚",
        note: "已读完，可和其他书一起打包转让。",
        photo: ""
      },
      {
        id: "demo-4",
        name: "旧电饭煲",
        category: "家电",
        condition: "明显使用痕迹",
        buyPrice: 269,
        sellPrice: 0,
        idleDate: dateToValue(new Date(today.getFullYear(), today.getMonth() - 18, today.getDate())),
        status: "已丢弃",
        accessories: "电源线",
        note: "已完成处理，释放厨房空间。",
        photo: ""
      }
    ];

    const form = document.querySelector("#item-form");
    const photoInput = document.querySelector("#photo");
    const photoPreview = document.querySelector("#photo-preview");
    const idleDateInput = document.querySelector("#idleDate");
    const searchInput = document.querySelector("#search");
    const tabs = document.querySelectorAll(".tab");
    const itemsEl = document.querySelector("#items");
    const emptyEl = document.querySelector("#empty");
    const pagerEl = document.querySelector("#pager");
    const pageInfoEl = document.querySelector("#page-info");
    const prevPageBtn = document.querySelector("#prev-page");
    const nextPageBtn = document.querySelector("#next-page");
    let activeFilter = "全部";
    let currentPhoto = "";
    let items = loadItems();
    let currentPage = 1;
    const pageSize = 4;

    idleDateInput.value = dateToValue(new Date(today.getFullYear(), today.getMonth() - 2, today.getDate()));

    function loadItems() {
      try {
        const stored = localStorage.getItem(storageKey);
        return stored ? JSON.parse(stored) : seedItems;
      } catch {
        return seedItems;
      }
    }

    function saveItems() {
      localStorage.setItem(storageKey, JSON.stringify(items));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function idleDays(item) {
      const start = new Date(`${item.idleDate}T00:00:00`);
      const diff = today - start;
      return Math.max(0, Math.floor(diff / 86400000));
    }

    function suggestion(item) {
      if (completedStatuses.includes(item.status)) return "已完成";
      const days = idleDays(item);
      if (days >= 365) return "建议立即处理";
      if (days >= 180) return "建议本月处理";
      if (Number(item.sellPrice) > 0) return "可准备转卖";
      return "可继续观察";
    }

    function formatMoney(value) {
      return `¥${Number(value || 0).toLocaleString("zh-CN")}`;
    }

    function filteredItems() {
      const query = searchInput.value.trim().toLowerCase();
      return items.filter((item) => {
        let byFilter = true;
        if (activeFilter === "已完成") byFilter = completedStatuses.includes(item.status);
        if (activeFilter !== "全部" && activeFilter !== "已完成") byFilter = item.status === activeFilter;
        const haystack = `${item.name} ${item.category} ${item.condition} ${item.status} ${item.accessories} ${item.note}`.toLowerCase();
        return byFilter && (!query || haystack.includes(query));
      });
    }

    function renderStats() {
      const activeItems = items.filter((item) => !completedStatuses.includes(item.status));
      const estimated = activeItems.reduce((sum, item) => sum + Number(item.sellPrice || 0), 0);
      document.querySelector("#stat-total").textContent = items.length;
      document.querySelector("#stat-value").textContent = formatMoney(estimated);
      document.querySelector("#stat-long").textContent = activeItems.filter((item) => idleDays(item) >= 180).length;
      document.querySelector("#stat-closed").textContent = items.filter((item) => completedStatuses.includes(item.status)).length;
    }

    function renderAlerts() {
      const alerts = items
        .filter((item) => !completedStatuses.includes(item.status))
        .sort((a, b) => idleDays(b) - idleDays(a))
        .slice(0, 4);

      document.querySelector("#alert-list").innerHTML = alerts.length
        ? alerts.map((item) => `
          <div class="alert-item">
            <span>${escapeHtml(item.name)}</span>
            <span>${idleDays(item)} 天</span>
          </div>
        `).join("")
        : `<div class="alert-item"><span>暂无待处理物品</span><span>很清爽</span></div>`;
    }

    function renderItems() {
      const allData = filteredItems();
      const totalPages = Math.max(1, Math.ceil(allData.length / pageSize));
      currentPage = Math.min(currentPage, totalPages);
      const start = (currentPage - 1) * pageSize;
      const data = allData.slice(start, start + pageSize);
      itemsEl.innerHTML = data.map((item) => {
        const days = idleDays(item);
        const suggest = suggestion(item);
        const initial = escapeHtml(item.name.slice(0, 1) || "物");
        return `
          <article class="item-card">
            <div class="item-top">
              <div class="thumb">${item.photo ? `<img src="${item.photo}" alt="${escapeHtml(item.name)}照片">` : initial}</div>
              <div>
                <h3>${escapeHtml(item.name)}</h3>
                <div class="tag-row">
                  <span class="pill">${escapeHtml(item.category)}</span>
                  <span class="pill">${escapeHtml(item.condition)}</span>
                  <span class="pill ${completedStatuses.includes(item.status) ? "good" : "warn"}">${escapeHtml(item.status)}</span>
                </div>
              </div>
            </div>

            <div class="item-stats">
              <div class="mini-stat">
                <span>闲置时长</span>
                <strong>${days} 天</strong>
              </div>
              <div class="mini-stat">
                <span>购入价</span>
                <strong>${formatMoney(item.buyPrice)}</strong>
              </div>
              <div class="mini-stat">
                <span>期望售价</span>
                <strong>${formatMoney(item.sellPrice)}</strong>
              </div>
            </div>

            <p class="note">配件：${escapeHtml(item.accessories || "未记录")}</p>
            <p class="note">备注：${escapeHtml(item.note || "暂无备注")}</p>

            <div class="item-actions">
              <span class="pill ${suggest.includes("立即") || suggest.includes("本月") ? "warn" : "good"}">${suggest}</span>
              <select class="select-action" data-status="${item.id}" aria-label="修改处理状态">
                ${["待处理", "准备转卖", "已转卖", "已赠送", "已丢弃"].map((status) => `
                  <option value="${status}" ${status === item.status ? "selected" : ""}>${status}</option>
                `).join("")}
              </select>
              <button class="small-btn" type="button" data-delete="${item.id}">删除</button>
            </div>
          </article>
        `;
      }).join("");
      emptyEl.style.display = allData.length ? "none" : "block";
      pagerEl.style.display = allData.length > pageSize ? "flex" : "none";
      pageInfoEl.textContent = `第 ${currentPage} / ${totalPages} 页`;
      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;
    }

    function render() {
      renderStats();
      renderAlerts();
      renderItems();
    }

    photoInput.addEventListener("change", () => {
      const file = photoInput.files?.[0];
      if (!file) {
        currentPhoto = "";
        photoPreview.textContent = "上传照片后将在这里预览";
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        currentPhoto = reader.result;
        photoPreview.innerHTML = `<img src="${currentPhoto}" alt="物品照片预览">`;
      };
      reader.readAsDataURL(file);
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");
        activeFilter = tab.dataset.filter;
        currentPage = 1;
        renderItems();
      });
    });

    searchInput.addEventListener("input", () => {
      currentPage = 1;
      renderItems();
    });

    prevPageBtn.addEventListener("click", () => {
      currentPage = Math.max(1, currentPage - 1);
      renderItems();
    });

    nextPageBtn.addEventListener("click", () => {
      currentPage += 1;
      renderItems();
    });

    itemsEl.addEventListener("click", (event) => {
      const target = event.target.closest("[data-delete]");
      if (!target) return;
      items = items.filter((item) => item.id !== target.dataset.delete);
      saveItems();
      render();
    });

    itemsEl.addEventListener("change", (event) => {
      const target = event.target.closest("[data-status]");
      if (!target) return;
      items = items.map((item) => item.id === target.dataset.status ? { ...item, status: target.value } : item);
      saveItems();
      render();
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const data = new FormData(form);
      items.unshift({
        id: `item-${Date.now()}`,
        name: data.get("name"),
        category: data.get("category"),
        condition: data.get("condition"),
        buyPrice: Number(data.get("buyPrice") || 0),
        sellPrice: Number(data.get("sellPrice") || 0),
        idleDate: data.get("idleDate"),
        status: data.get("status"),
        accessories: data.get("accessories"),
        note: data.get("note"),
        photo: currentPhoto
      });
      saveItems();
      form.reset();
      currentPhoto = "";
      photoPreview.textContent = "上传照片后将在这里预览";
      idleDateInput.value = dateToValue(new Date(today.getFullYear(), today.getMonth() - 2, today.getDate()));
      document.querySelector("#buyPrice").value = 299;
      document.querySelector("#sellPrice").value = 99;
      currentPage = 1;
      render();
    });

    render();
  </script>
</body>
</html>
