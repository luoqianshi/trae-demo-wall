<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄机妙算 - 中医易经命理分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'SimHei', serif; background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%); color: #d4af37; min-height: 100vh; }
        .app-container { display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: rgba(0, 0, 0, 0.5); padding: 20px 40px; border-bottom: 2px solid rgba(212, 175, 55, 0.3); text-align: center; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .logo-icon { font-size: 2.5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .logo h1 { font-size: 2rem; background: linear-gradient(90deg, #d4af37, #f0e68c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 8px; }
        .header-subtitle { margin-top: 10px; font-size: 0.95rem; color: rgba(212, 175, 55, 0.7); letter-spacing: 4px; }
        .server-info { margin-top: 15px; padding: 10px 20px; background: rgba(46, 213, 115, 0.2); border: 1px solid rgba(46, 213, 115, 0.5); border-radius: 8px; color: #2ed573; font-size: 0.9rem; }
        .server-info input { background: rgba(0,0,0,0.3); border: 1px solid #2ed573; color: #2ed573; padding: 5px 10px; border-radius: 5px; width: 200px; margin-left: 10px; }
        .main-content { flex: 1; padding: 30px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .basic-info { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; padding: 25px; margin-bottom: 30px; }
        .basic-info h2 { font-size: 1.3rem; margin-bottom: 20px; color: #d4af37; }
        .info-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .info-input, .info-select { padding: 12px 15px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; color: #d4af37; font-size: 1rem; outline: none; min-width: 100px; }
        .info-input:focus, .info-select:focus { border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .capture-section { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-bottom: 30px; }
        .capture-box { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; padding: 25px; }
        .capture-box h3 { font-size: 1.2rem; margin-bottom: 20px; color: #d4af37; }
        .video-container { position: relative; width: 100%; height: 350px; background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(212, 175, 55, 0.3); border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-container video.mirrored { transform: scaleX(-1); }
        .video-container canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .video-container canvas.mirrored { transform: scaleX(-1); }
        .face-guide, .palm-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px dashed rgba(212, 175, 55, 0.5); border-radius: 50%; width: 200px; height: 200px; pointer-events: none; }
        .palm-guide { border-radius: 10px; width: 180px; height: 250px; }
        .capture-buttons { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .cam-btn, .capture-btn, .switch-btn { padding: 10px 20px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease; }
        .cam-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37; }
        .cam-btn:hover { background: rgba(212, 175, 55, 0.3); }
        .cam-btn.active { background: rgba(255, 71, 87, 0.3); border-color: #ff4757; color: #ff4757; }
        .switch-btn { background: rgba(52, 152, 219, 0.2); border: 1px solid rgba(52, 152, 219, 0.5); color: #3498db; }
        .switch-btn:hover { background: rgba(52, 152, 219, 0.3); }
        .capture-btn { background: rgba(46, 213, 115, 0.2); border: 1px solid rgba(46, 213, 115, 0.5); color: #2ed573; }
        .capture-btn:hover:not(:disabled) { background: rgba(46, 213, 115, 0.3); box-shadow: 0 0 15px rgba(46, 213, 115, 0.3); }
        .capture-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .upload-btn { padding: 10px 20px; background: rgba(155, 89, 182, 0.2); border: 1px solid rgba(155, 89, 182, 0.5); color: #9b59b6; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease; display: inline-block; }
        .upload-btn:hover { background: rgba(155, 89, 182, 0.3); }
        .preview-container { margin-top: 15px; }
        .preview-container img { max-width: 100%; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .ai-result { margin-top: 15px; padding: 15px; background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; font-size: 0.95rem; color: rgba(212, 175, 55, 0.9); }
        .analyze-section { text-align: center; margin-bottom: 30px; }
        .analyze-btn { padding: 15px 50px; background: rgba(212, 175, 55, 0.3); border: 2px solid #d4af37; color: #d4af37; font-size: 1.2rem; cursor: pointer; border-radius: 10px; transition: all 0.3s ease; }
        .analyze-btn:hover { background: rgba(212, 175, 55, 0.4); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); transform: translateY(-2px); }
        .result-section { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; padding: 30px; display: none; }
        .result-section.show { display: block; }
        .result-section h2 { font-size: 1.5rem; margin-bottom: 25px; color: #d4af37; text-align: center; }
        .category-section { margin-bottom: 25px; }
        .category-title { font-size: 1.2rem; color: #f0e68c; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
        .analysis-item { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-name { font-size: 1.1rem; color: #f0e68c; }
        .item-meaning { font-size: 0.95rem; color: rgba(212, 175, 55, 0.8); margin-bottom: 8px; }
        .item-basis { font-size: 0.85rem; color: rgba(155, 89, 182, 0.8); padding: 8px 12px; background: rgba(155, 89, 182, 0.1); border-radius: 6px; margin-bottom: 8px; }
        .item-problem { font-size: 0.85rem; color: rgba(255, 71, 87, 0.8); padding: 8px 12px; background: rgba(255, 71, 87, 0.1); border-radius: 6px; margin-bottom: 8px; }
        .item-solution { font-size: 0.85rem; color: rgba(46, 213, 115, 0.8); padding: 8px 12px; background: rgba(46, 213, 115, 0.1); border-radius: 6px; margin-bottom: 8px; }
        .health-section { margin-top: 30px; padding: 20px; background: rgba(46, 213, 115, 0.1); border: 1px solid rgba(46, 213, 115, 0.3); border-radius: 12px; }
        .health-title { font-size: 1.1rem; color: #2ed573; margin-bottom: 15px; }
        .short-term, .long-term { margin-top: 20px; padding: 15px; border-radius: 10px; }
        .short-term { background: rgba(255, 165, 0, 0.1); border: 1px solid rgba(255, 165, 0, 0.3); }
        .long-term { background: rgba(52, 152, 219, 0.1); border: 1px solid rgba(52, 152, 219, 0.3); }
        .term-title { font-size: 1rem; color: #f0e68c; margin-bottom: 10px; }
        .term-content { font-size: 0.9rem; color: rgba(212, 175, 55, 0.8); line-height: 1.8; }
        .no-analysis { padding: 20px; text-align: center; color: rgba(255, 71, 87, 0.8); background: rgba(255, 71, 87, 0.1); border-radius: 10px; margin-bottom: 20px; }
        .footer { background: rgba(0, 0, 0, 0.5); padding: 20px; text-align: center; border-top: 2px solid rgba(212, 175, 55, 0.3); }
        .footer p { font-size: 0.85rem; color: rgba(212, 175, 55, 0.6); }
        .loading { text-align: center; padding: 30px; color: #d4af37; }
        .loading::after { content: '...'; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">☯</div>
                <h1>玄机妙算</h1>
            </div>
            <p class="header-subtitle">中医易经命理分析系统</p>
            <div class="server-info">
                服务器地址：<input type="text" id="serverUrl" value="http://localhost:3000" placeholder="输入服务器地址">
                <small style="margin-left:10px;opacity:0.7;">其他设备访问时需填写服务器局域网IP</small>
            </div>
        </header>
        
        <main class="main-content">
            <section class="basic-info">
                <h2>基本信息</h2>
                <div class="info-row">
                    <input type="text" id="name" class="info-input" placeholder="姓名">
                    <select id="gender" class="info-select">
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                    <input type="number" id="year" class="info-input" placeholder="出生年" min="1900" max="2025">
                    <select id="month" class="info-select">
                        <option value="">月</option>
                        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
                        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
                        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
                        <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
                    </select>
                    <select id="day" class="info-select">
                        <option value="">日</option>
                    </select>
                    <select id="hour" class="info-select">
                        <option value="">时辰</option>
                        <option value="0">子时 (23:00-01:00)</option>
                        <option value="1">丑时 (01:00-03:00)</option>
                        <option value="2">寅时 (03:00-05:00)</option>
                        <option value="3">卯时 (05:00-07:00)</option>
                        <option value="4">辰时 (07:00-09:00)</option>
                        <option value="5">巳时 (09:00-11:00)</option>
                        <option value="6">午时 (11:00-13:00)</option>
                        <option value="7">未时 (13:00-15:00)</option>
                        <option value="8">申时 (15:00-17:00)</option>
                        <option value="9">酉时 (17:00-19:00)</option>
                        <option value="10">戌时 (19:00-21:00)</option>
                        <option value="11">亥时 (21:00-23:00)</option>
                    </select>
                </div>
            </section>
            
            <section class="capture-section">
                <div class="capture-box">
                    <h3>📸 面部拍照 <small style="color:#3498db;">(前置自拍/后置拍人)</small></h3>
                    <div class="video-container">
                        <video id="faceVideo" autoplay playsinline></video>
                        <canvas id="faceCanvas"></canvas>
                        <div class="face-guide"></div>
                    </div>
                    <div class="capture-buttons">
                        <button id="startFaceCamera" class="cam-btn">开启摄像头</button>
                        <button id="switchFaceCamera" class="switch-btn" style="display:none;">切换后置</button>
                        <button id="captureFace" class="capture-btn" disabled>拍照</button>
                        <label class="upload-btn">
                            <input type="file" id="faceUpload" accept="image/*" style="display:none;">
                            上传本地图片
                        </label>
                    </div>
                    <div class="preview-container" id="facePreview"></div>
                    <div class="ai-result" id="faceResult"></div>
                </div>
                
                <div class="capture-box">
                    <h3>🖐️ 手掌拍照 <small style="color:#3498db;">(男士左手/女士右手)</small></h3>
                    <div class="video-container">
                        <video id="palmVideo" autoplay playsinline></video>
                        <canvas id="palmCanvas"></canvas>
                        <div class="palm-guide"></div>
                    </div>
                    <div class="capture-buttons">
                        <button id="startPalmCamera" class="cam-btn">开启摄像头</button>
                        <button id="switchPalmCamera" class="switch-btn" style="display:none;">切换后置</button>
                        <button id="capturePalm" class="capture-btn" disabled>拍照</button>
                        <label class="upload-btn">
                            <input type="file" id="palmUpload" accept="image/*" style="display:none;">
                            上传本地图片
                        </label>
                    </div>
                    <div class="preview-container" id="palmPreview"></div>
                    <div class="ai-result" id="palmResult"></div>
                </div>
            </section>
            
            <section class="analyze-section">
                <button id="analyzeBtn" class="analyze-btn">开始综合分析</button>
            </section>
            
            <section class="result-section" id="resultSection">
                <h2>综合分析报告</h2>
                <div id="resultContent"></div>
            </section>
        </main>
        
        <footer class="footer">
            <p>玄机妙算 - 基于黄帝内经、易经、五行命理的综合分析系统</p>
            <p>服务端部署者：玄机妙算团队 | 使用前请确保服务端已启动</p>
        </footer>
    </div>
    
    <script>
        let faceStream = null;
        let palmStream = null;
        let faceImageData = null;
        let palmImageData = null;
        let hasActualFaceAnalysis = false;
        let hasActualPalmAnalysis = false;
        let faceCameraFacing = 'user';
        let palmCameraFacing = 'user';
        let faceMirrored = true;
        let palmMirrored = false;
        
        // 初始化日期选择
        function initDaySelect() {
            const daySelect = document.getElementById('day');
            for (let i = 1; i <= 31; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i + '日';
                daySelect.appendChild(option);
            }
        }
        initDaySelect();
        
        // 面部摄像头控制
        document.getElementById('startFaceCamera').addEventListener('click', async () => {
            const btn = document.getElementById('startFaceCamera');
            const captureBtn = document.getElementById('captureFace');
            const switchBtn = document.getElementById('switchFaceCamera');
            
            if (faceStream) {
                faceStream.getTracks().forEach(track => track.stop());
                faceStream = null;
                btn.textContent = '开启摄像头';
                btn.classList.remove('active');
                captureBtn.disabled = true;
                switchBtn.style.display = 'none';
                return;
            }
            
            try {
                faceStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: faceCameraFacing } });
                const video = document.getElementById('faceVideo');
                video.srcObject = faceStream;
                faceMirrored = faceCameraFacing === 'user';
                updateFaceMirror();
                btn.textContent = '关闭摄像头';
                btn.classList.add('active');
                captureBtn.disabled = false;
                switchBtn.style.display = 'inline-block';
                switchBtn.textContent = faceCameraFacing === 'user' ? '切换后置' : '切换前置';
            } catch (err) {
                alert('无法访问摄像头，请确保已授权摄像头权限');
            }
        });
        
        function updateFaceMirror() {
            const video = document.getElementById('faceVideo');
            const canvas = document.getElementById('faceCanvas');
            video.classList.toggle('mirrored', faceMirrored);
            canvas.classList.toggle('mirrored', faceMirrored);
        }
        
        document.getElementById('switchFaceCamera').addEventListener('click', async () => {
            if (faceStream) {
                faceStream.getTracks().forEach(track => track.stop());
                faceStream = null;
                faceCameraFacing = faceCameraFacing === 'user' ? 'environment' : 'user';
                try {
                    faceStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: faceCameraFacing } });
                    const video = document.getElementById('faceVideo');
                    video.srcObject = faceStream;
                    faceMirrored = faceCameraFacing === 'user';
                    updateFaceMirror();
                    const switchBtn = document.getElementById('switchFaceCamera');
                    switchBtn.textContent = faceCameraFacing === 'user' ? '切换后置' : '切换前置';
                } catch (err) {
                    alert('无法切换摄像头');
                }
            }
        });
        
        document.getElementById('captureFace').addEventListener('click', () => {
            const video = document.getElementById('faceVideo');
            const canvas = document.getElementById('faceCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            if (faceMirrored) {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0);
            faceImageData = canvas.toDataURL('image/jpeg');
            document.getElementById('facePreview').innerHTML = `<img src="${faceImageData}">`;
            hasActualFaceAnalysis = true;
            document.getElementById('faceResult').innerHTML = '<strong>✓ 已捕获面部图像</strong><br>可进行综合分析';
        });
        
        document.getElementById('faceUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    faceImageData = event.target.result;
                    document.getElementById('facePreview').innerHTML = `<img src="${faceImageData}">`;
                    hasActualFaceAnalysis = true;
                    document.getElementById('faceResult').innerHTML = '<strong>✓ 已上传面部图像</strong><br>可进行综合分析';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 手掌摄像头控制
        document.getElementById('startPalmCamera').addEventListener('click', async () => {
            const btn = document.getElementById('startPalmCamera');
            const captureBtn = document.getElementById('capturePalm');
            const switchBtn = document.getElementById('switchPalmCamera');
            
            if (palmStream) {
                palmStream.getTracks().forEach(track => track.stop());
                palmStream = null;
                btn.textContent = '开启摄像头';
                btn.classList.remove('active');
                captureBtn.disabled = true;
                switchBtn.style.display = 'none';
                return;
            }
            
            try {
                palmStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: palmCameraFacing } });
                const video = document.getElementById('palmVideo');
                video.srcObject = palmStream;
                palmMirrored = false;
                updatePalmMirror();
                btn.textContent = '关闭摄像头';
                btn.classList.add('active');
                captureBtn.disabled = false;
                switchBtn.style.display = 'inline-block';
                switchBtn.textContent = palmCameraFacing === 'user' ? '切换后置' : '切换前置';
            } catch (err) {
                alert('无法访问摄像头，请确保已授权摄像头权限');
            }
        });
        
        function updatePalmMirror() {
            const video = document.getElementById('palmVideo');
            const canvas = document.getElementById('palmCanvas');
            video.classList.toggle('mirrored', palmMirrored);
            canvas.classList.toggle('mirrored', palmMirrored);
        }
        
        document.getElementById('switchPalmCamera').addEventListener('click', async () => {
            if (palmStream) {
                palmStream.getTracks().forEach(track => track.stop());
                palmStream = null;
                palmCameraFacing = palmCameraFacing === 'user' ? 'environment' : 'user';
                try {
                    palmStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: palmCameraFacing } });
                    const video = document.getElementById('palmVideo');
                    video.srcObject = palmStream;
                    palmMirrored = false;
                    updatePalmMirror();
                    const switchBtn = document.getElementById('switchPalmCamera');
                    switchBtn.textContent = palmCameraFacing === 'user' ? '切换后置' : '切换前置';
                } catch (err) {
                    alert('无法切换摄像头');
                }
            }
        });
        
        document.getElementById('capturePalm').addEventListener('click', () => {
            const video = document.getElementById('palmVideo');
            const canvas = document.getElementById('palmCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            if (palmMirrored) {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0);
            palmImageData = canvas.toDataURL('image/jpeg');
            document.getElementById('palmPreview').innerHTML = `<img src="${palmImageData}">`;
            hasActualPalmAnalysis = true;
            document.getElementById('palmResult').innerHTML = '<strong>✓ 已捕获手掌图像</strong><br>可进行综合分析';
        });
        
        document.getElementById('palmUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    palmImageData = event.target.result;
                    document.getElementById('palmPreview').innerHTML = `<img src="${palmImageData}">`;
                    hasActualPalmAnalysis = true;
                    document.getElementById('palmResult').innerHTML = '<strong>✓ 已上传手掌图像</strong><br>可进行综合分析';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 综合分析
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const day = parseInt(document.getElementById('day').value);
            const hour = parseInt(document.getElementById('hour').value);
            
            if (!year || !month || !day) {
                alert('请填写完整的出生日期');
                return;
            }
            
            if (!hasActualFaceAnalysis && !hasActualPalmAnalysis) {
                const confirmResult = confirm('您尚未进行面部或手掌拍照/上传。\n\n系统将仅根据您的生辰八字进行分析，不包含面相和手相内容。\n\n是否继续？');
                if (!confirmResult) return;
            }
            
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            resultSection.classList.add('show');
            resultContent.innerHTML = '<div class="loading">正在分析中</div>';
            
            const serverUrl = document.getElementById('serverUrl').value || 'http://localhost:3000';
            
            const data = {
                basicInfo: {
                    name: document.getElementById('name').value || '用户',
                    gender: document.getElementById('gender').value,
                    hasFaceAnalysis: hasActualFaceAnalysis,
                    hasPalmAnalysis: hasActualPalmAnalysis,
                },
                face: hasActualFaceAnalysis ? { faceShape: 'oval', complexion: 'normal', eyeType: 'dragon', noseType: 'turtle', mouthType: 'bow', eyebrowType: 'crescent' } : null,
                palm: hasActualPalmAnalysis ? { palmShape: 'round', lines: {}, fingers: {} } : null,
                bazi: { year, month, day, hour }
            };
            
            try {
                const response = await fetch(`${serverUrl}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) throw new Error('服务器响应错误');
                const result = await response.json();
                displayResult(result);
            } catch (err) {
                resultContent.innerHTML = `<div class="no-analysis">
                    <strong>无法连接到分析服务器</strong><br>
                    错误：${err.message}<br><br>
                    请确保：<br>
                    1. 服务器已启动<br>
                    2. 服务器地址正确（当前：${serverUrl}）<br>
                    3. 网络连接正常
                </div>`;
            }
        });
        
        function displayResult(result) {
            const resultContent = document.getElementById('resultContent');
            let html = '';
            
            if (!hasActualFaceAnalysis && !hasActualPalmAnalysis) {
                html += '<div class="no-analysis"><strong>提示：您未进行面部或手掌拍照/上传</strong><br>以下仅为基于生辰八字的参考分析</div>';
            }
            
            if (result.sections) {
                result.sections.forEach(section => {
                    html += `<div class="category-section">
                        <div class="category-title">${section.category}</div>`;
                    section.items.forEach(item => {
                        html += `<div class="analysis-item">
                            <div class="item-name">${item.name}</div>
                            <div class="item-meaning">${item.meaning}</div>`;
                        if (item.basis) html += `<div class="item-basis"><strong>判断依据：</strong>${item.basis}</div>`;
                        if (item.problem) html += `<div class="item-problem"><strong>问题：</strong>${item.problem}</div>`;
                        if (item.solution) html += `<div class="item-solution"><strong>建议：</strong>${item.solution}</div>`;
                        html += `</div>`;
                    });
                    html += `</div>`;
                });
            }
            
            if (result.summary) {
                if (result.summary.shortTermAdvice) {
                    html += `<div class="short-term">
                        <div class="term-title">短期建议（未来3个月）</div>
                        <div class="term-content">${result.summary.shortTermAdvice}</div>
                    </div>`;
                }
                if (result.summary.longTermAdvice) {
                    html += `<div class="long-term">
                        <div class="term-title">长期规划（未来1-3年）</div>
                        <div class="term-content">${result.summary.longTermAdvice}</div>
                    </div>`;
                }
            }
            
            resultContent.innerHTML = html;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
