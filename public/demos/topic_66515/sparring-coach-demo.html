<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>话术对练 SparringCoach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#6366f1;--accent2:#8b5cf6;--accent3:#ec4899;
  --ink:#0f172a;--ink2:#334155;--muted:#64748b;--muted2:#94a3b8;
  --bg:#f8fafc;--bg2:#f1f5f9;--surface:#fff;--rule:#e2e8f0;
  --danger:#ef4444;--success:#10b981;--warning:#f59e0b;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-md:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.05);
  --shadow-lg:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.05);
  --shadow-xl:0 25px 50px -12px rgba(0,0,0,.15);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  /* Type scale */
  --fs-hero:30px;--fs-h2:22px;--fs-h3:16px;--fs-body:15px;
  --fs-caption:13px;--fs-label:12px;--fs-micro:10px;
}
html,body{
  height:100%;
  font-family:"Inter","Geist",-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  color:var(--ink);background:linear-gradient(135deg,#eef2ff 0%,#fae8ff 50%,#fdf2f8 100%);
  background-attachment:fixed;overflow:hidden;-webkit-font-smoothing:antialiased;
  font-feature-settings:"cv11","ss01","ss03";
  -moz-osx-font-smoothing:grayscale;
  letter-spacing:-.01em;
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--surface);box-shadow:var(--shadow-xl);position:relative;overflow:hidden}
@media(min-width:481px){.app{height:calc(100vh - 32px);margin-top:16px;border-radius:24px}body{padding:0 16px}}
.screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateX(20px);transition:opacity .35s cubic-bezier(.4,0,.2,1),transform .35s cubic-bezier(.4,0,.2,1)}
.screen.active{opacity:1;pointer-events:auto;transform:translateX(0)}.screen.exit-left{opacity:0;transform:translateX(-20px)}

/* Top Bar */
.topbar{display:flex;align-items:center;padding:14px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(226,232,240,.6);min-height:58px;flex-shrink:0;z-index:10}
.topbar .back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:6px 10px;border-radius:var(--radius-xs);margin-right:4px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.topbar .back:hover{background:var(--bg2);color:var(--ink)}
.topbar .title{flex:1;font-size:var(--fs-h3);font-weight:700;letter-spacing:-.01em}
.topbar .mode-badge{font-size:var(--fs-label);font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:4px 10px;border-radius:12px;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.topbar .round{font-size:var(--fs-label);color:var(--muted);margin-left:8px;font-weight:500}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;padding:20px;overflow-y:auto}
.welcome .hero{text-align:center;padding:20px 0 20px;position:relative}
.welcome .hero::before{content:'';position:absolute;top:50%;left:50%;width:200px;height:200px;background:radial-gradient(circle,rgba(99,102,241,.15) 0%,transparent 70%);transform:translate(-50%,-50%);border-radius:50%;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}}
.welcome .hero .logo{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px;box-shadow:0 12px 32px rgba(99,102,241,.35);position:relative;z-index:1;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.welcome h1{font-size:var(--fs-hero);font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;letter-spacing:-.02em;position:relative;z-index:1}
.welcome .tagline{color:var(--muted);font-size:var(--fs-caption);font-weight:500;position:relative;z-index:1;margin-bottom:4px}

/* Stats bar */
.stats-bar{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(139,92,246,.06));border:1px solid rgba(99,102,241,.12);border-radius:var(--radius-sm);padding:12px 8px;text-align:center}
.stat-card .stat-num{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;font-variant-numeric:tabular-nums}
.stat-card .stat-label{font-size:var(--fs-label);color:var(--muted);font-weight:600;margin-top:2px}

.history-entry{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(139,92,246,.06));border:1px solid rgba(99,102,241,.12);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:4px;cursor:pointer;transition:all .25s}
.history-entry:hover{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.1));border-color:rgba(99,102,241,.25);transform:translateY(-1px);box-shadow:var(--shadow)}
.history-entry .he-icon{font-size:20px}.history-entry .he-text{flex:1;font-size:var(--fs-caption);font-weight:600;color:var(--accent2)}.history-entry .he-arrow{color:var(--muted2);font-size:14px}

.welcome .section-title{font-size:var(--fs-label);font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 10px;display:flex;align-items:center;gap:6px}
.welcome .section-title::after{content:'';flex:1;height:1px;background:var(--rule)}

.mode-selector{display:flex;gap:8px;margin-bottom:8px}
.mode-btn{flex:1;padding:12px 6px;border:2px solid var(--rule);background:var(--surface);border-radius:var(--radius-sm);cursor:pointer;text-align:center;transition:all .25s;color:var(--muted);position:relative;overflow:hidden}
.mode-btn.active{border-color:transparent;background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.08));color:var(--accent2);box-shadow:0 4px 12px rgba(99,102,241,.15)}
.mode-btn:hover:not(.active){border-color:var(--accent);background:var(--bg)}
.mode-btn .mode-icon{font-size:24px;display:block;margin-bottom:4px}
.mode-btn .mode-name{display:block;font-size:13px;font-weight:700}
.mode-btn .mode-desc{display:block;font-size:var(--fs-label);font-weight:500;color:var(--muted2);margin-top:2px;line-height:1.2}
.mode-btn.active .mode-desc{color:var(--accent2);opacity:.7}

.scenario-list{display:flex;flex-direction:column;gap:8px;flex:1;padding-bottom:8px}
.scenario-item{background:var(--surface);border:2px solid var(--bg2);border-radius:var(--radius-sm);padding:14px 14px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:12px}
.scenario-item:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(99,102,241,.15);transform:translateY(-2px)}
.scenario-item:active{transform:translateY(0) scale(.98)}
.scenario-item .emoji{font-size:28px;width:50px;height:50px;background:linear-gradient(135deg,var(--bg),var(--bg2));border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .25s}
.scenario-item:hover .emoji{transform:scale(1.1) rotate(-5deg)}
.scenario-item .info{flex:1;min-width:0}.scenario-item .info .name{font-weight:700;font-size:var(--fs-h3);margin-bottom:3px}
.scenario-item .info .desc{font-size:var(--fs-caption);color:var(--muted);line-height:1.5}
.scenario-item .diff{font-size:var(--fs-label);color:var(--warning);font-weight:600;background:#fffbeb;padding:3px 8px;border-radius:6px;white-space:nowrap}

/* Prep */
.prep{flex:1;display:flex;flex-direction:column;padding:16px 20px;overflow-y:auto}
.prep .scenario-header{text-align:center;margin-bottom:16px}
.prep .scenario-header .big-emoji{font-size:48px;margin-bottom:8px;animation:bounce-in .5s cubic-bezier(.68,-.55,.27,1.55)}
@keyframes bounce-in{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.prep .scenario-header h2{font-size:var(--fs-h2);font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
.prep .scenario-header p{font-size:var(--fs-caption);color:var(--muted)}.prep .scenario-header strong{color:var(--accent2)}
.prep-card{background:var(--surface);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;border:1px solid var(--rule);box-shadow:var(--shadow-sm)}
.prep-card h3{font-size:var(--fs-h3);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.trap-list,.tip-list{list-style:none;padding:0}
.trap-list li,.tip-list li{font-size:var(--fs-caption);padding:7px 0 7px 24px;position:relative;line-height:1.6;border-bottom:1px dashed var(--bg2)}
.trap-list li:last-child,.tip-list li:last-child{border-bottom:none}
.trap-list li::before{content:"⚠️";position:absolute;left:0;font-size:13px;top:7px}.tip-list li::before{content:"💡";position:absolute;left:0;font-size:13px;top:7px}
.bad-example{background:linear-gradient(135deg,#fef2f2,#fff5f5);border-left:4px solid var(--danger);padding:12px 16px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:var(--fs-caption);color:#991b1b;margin-top:8px;font-style:italic;line-height:1.6}
.start-btn{margin-top:auto;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));background-size:200% 200%;color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(99,102,241,.4);transition:all .25s;animation:gradient-shift 4s ease infinite;letter-spacing:.02em}
@keyframes gradient-shift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(99,102,241,.45)}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.bubble{max-width:82%;padding:11px 15px;border-radius:18px;font-size:var(--fs-body);line-height:1.65;animation:bubble-in .3s cubic-bezier(.34,1.56,.64,1);position:relative;word-break:break-word}
@keyframes bubble-in{from{opacity:0;transform:translateY(10px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
.bubble.ai{background:var(--surface);color:var(--ink);border-bottom-left-radius:6px;align-self:flex-start;box-shadow:var(--shadow-sm);border:1px solid var(--rule)}
.bubble.user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:6px;align-self:flex-end;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.bubble .speaker{font-size:var(--fs-label);opacity:.6;font-weight:700;margin-bottom:3px;letter-spacing:.02em}
.subtext{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.06));border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:var(--fs-caption);color:#92400e;line-height:1.6}
.subtext .subtext-title{font-weight:700;margin-bottom:4px;color:#b45309;font-size:var(--fs-caption)}
.subtext .subtext-tag{display:inline-block;background:rgba(251,191,36,.2);color:#b45309;padding:2px 7px;border-radius:4px;font-size:var(--fs-micro);margin-right:4px;margin-bottom:2px;font-weight:600}
.feedback{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-sm);padding:12px 14px;align-self:center;width:94%;font-size:var(--fs-caption);animation:feedback-in .35s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow)}
@keyframes feedback-in{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.feedback .fb-good{color:var(--success);margin-bottom:5px;font-weight:600;display:flex;align-items:flex-start;gap:5px;font-size:var(--fs-caption);line-height:1.5}
.feedback .fb-bad{color:var(--danger);margin-bottom:5px;font-weight:600;display:flex;align-items:flex-start;gap:5px;font-size:var(--fs-caption);line-height:1.5}
.feedback .fb-tip{color:var(--accent2);font-weight:600;background:linear-gradient(135deg,rgba(99,102,241,.05),rgba(139,92,246,.05));border:1px dashed rgba(99,102,241,.2);padding:8px 12px;border-radius:8px;margin-top:8px;font-style:normal;line-height:1.6;font-size:var(--fs-caption)}
.typing{display:inline-flex;gap:6px;padding:14px 18px;background:var(--surface);border-radius:18px;border-bottom-left-radius:6px;align-self:flex-start;box-shadow:var(--shadow-sm);border:1px solid var(--rule)}
.typing span{width:8px;height:8px;background:var(--muted2);border-radius:50%;animation:bounce-dot 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce-dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.subtext-toggle{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-xs);padding:10px 14px;align-self:center;width:94%;font-size:var(--fs-label);display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:var(--accent);font-weight:600;transition:all .2s}
.subtext-toggle:hover{background:var(--bg);border-color:var(--accent)}

/* Free mode subtext visibility */
.app.free-hide-subtext .subtext-inline{display:none!important}

/* Analyzing indicator */
.analyzing{display:inline-flex;align-items:center;gap:8px;padding:11px 16px;background:var(--surface);border-radius:18px;border-bottom-left-radius:6px;align-self:flex-start;box-shadow:var(--shadow-sm);border:1px solid var(--rule);font-size:var(--fs-caption);color:var(--muted);font-weight:500}
.analyzing .an-dots{display:inline-flex;gap:3px}
.analyzing .an-dots span{width:5px;height:5px;background:var(--muted2);border-radius:50%;animation:bounce-dot 1.4s infinite}
.analyzing .an-dots span:nth-child(2){animation-delay:.2s}.analyzing .an-dots span:nth-child(3){animation-delay:.4s}

/* Input */
.input-area{padding:10px 12px 12px;background:var(--surface);border-top:1px solid var(--rule);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;border:2px solid var(--bg2);border-radius:22px;padding:10px 16px;font-size:var(--fs-body);resize:none;max-height:100px;min-height:42px;font-family:inherit;outline:none;transition:all .2s;line-height:1.5;background:var(--bg);overflow-y:hidden}
.input-row textarea:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.input-row textarea.scroll{overflow-y:auto}
.send-btn{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:scale(.9);box-shadow:none}.send-btn:not(:disabled):hover{transform:scale(1.08)}
.hint-btn{background:var(--surface);border:1.5px solid var(--rule);color:var(--muted);padding:9px 14px;border-radius:var(--radius-xs);font-size:var(--fs-label);cursor:pointer;margin-top:8px;width:100%;transition:all .2s;font-weight:600}
.hint-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--bg)}
.hint-box{background:linear-gradient(135deg,rgba(99,102,241,.05),rgba(139,92,246,.05));border:1.5px dashed rgba(99,102,241,.25);border-radius:var(--radius-xs);padding:12px 14px;margin-top:8px;font-size:var(--fs-caption);color:var(--accent2);line-height:1.6;animation:hint-slide .3s ease}
@keyframes hint-slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* Report */
.report{flex:1;overflow-y:auto;padding:20px 18px}
.report-header{text-align:center;margin-bottom:16px;animation:fade-up .5s ease}
@keyframes fade-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.report-header .trophy{font-size:52px;margin-bottom:6px;animation:trophy-bounce .6s cubic-bezier(.68,-.55,.27,1.55) .1s both}
@keyframes trophy-bounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.report-header h2{font-size:var(--fs-h2);font-weight:800;margin-bottom:6px;letter-spacing:-.02em}.report-header .sub{font-size:var(--fs-label);color:var(--muted)}
.score-total{text-align:center;margin:18px 0 22px;position:relative}
.score-total::before{content:'';position:absolute;top:50%;left:50%;width:160px;height:160px;background:radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 70%);transform:translate(-50%,-50%);border-radius:50%}
.score-total .score-num{font-size:68px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;position:relative;z-index:1;font-variant-numeric:tabular-nums;letter-spacing:-.04em}
.score-total .score-label{font-size:var(--fs-label);color:var(--muted);margin-top:4px;position:relative;z-index:1}
.score-total .rank{display:inline-block;margin-top:10px;padding:6px 20px;color:#fff;border-radius:20px;font-size:var(--fs-caption);font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.12);position:relative;z-index:1;animation:rank-pop .5s cubic-bezier(.68,-.55,.27,1.55) .4s both}
@keyframes rank-pop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
.radar-wrap{width:100%;max-width:280px;margin:0 auto 20px;padding:12px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);animation:fade-up .5s ease .2s both}
.score-breakdown{background:var(--surface);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);animation:fade-up .5s ease .3s both}
.score-breakdown h3{font-size:var(--fs-h3);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}.score-row:last-child{margin-bottom:0}
.score-row .dim{width:78px;font-weight:600;color:var(--ink2);flex-shrink:0;font-size:var(--fs-label)}
.score-bar{flex:1;height:10px;background:var(--bg2);border-radius:5px;overflow:hidden}
.score-bar .fill{height:100%;border-radius:5px;width:0;animation:fill-bar 1s cubic-bezier(.22,1,.36,1) forwards}
@keyframes fill-bar{to{width:var(--w)}}
.score-row .val{width:32px;text-align:right;font-weight:800;flex-shrink:0;font-size:var(--fs-caption)}
.advice-box{background:linear-gradient(135deg,rgba(99,102,241,.04),rgba(139,92,246,.04));border:1px solid rgba(99,102,241,.1);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;animation:fade-up .5s ease .4s both}
.advice-box h3{font-size:var(--fs-h3);font-weight:700;color:var(--accent2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.advice-box ul{list-style:none;padding:0}.advice-box li{font-size:var(--fs-caption);padding:8px 0 8px 24px;position:relative;line-height:1.6;border-bottom:1px solid rgba(99,102,241,.06)}.advice-box li:last-child{border-bottom:none}
.advice-box li::before{content:"→";position:absolute;left:2px;font-size:14px;top:8px;color:var(--accent);font-weight:700}

/* Conversation replay */
.replay-box{background:var(--surface);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);animation:fade-up .5s ease .5s both}
.replay-box h3{font-size:var(--fs-h3);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;cursor:pointer}
.replay-box h3 .toggle-arrow{font-size:11px;color:var(--muted);transition:transform .3s;margin-left:auto}
.replay-box h3.open .toggle-arrow{transform:rotate(180deg)}
.replay-content{max-height:0;overflow:hidden;transition:max-height .4s ease}.replay-content.open{max-height:2000px}
.replay-item{padding:10px 0;border-bottom:1px solid var(--bg2);font-size:var(--fs-caption);line-height:1.6}.replay-item:last-child{border-bottom:none}
.replay-item .ri-label{font-weight:700;font-size:var(--fs-label);letter-spacing:.02em;margin-bottom:3px}
.replay-item .ri-label.ai{color:var(--accent)}.replay-item .ri-label.user{color:var(--success)}.replay-item .ri-label.fb{color:var(--warning)}
.replay-item .ri-text{color:var(--ink2)}

.report-actions{display:flex;gap:10px;margin-bottom:12px;animation:fade-up .5s ease .5s both}
.report-actions button{flex:1;padding:14px 12px;border-radius:var(--radius-sm);font-size:var(--fs-caption);font-weight:700;cursor:pointer;border:none;transition:all .2s}
.report-actions .primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 6px 16px rgba(99,102,241,.35)}
.report-actions .secondary{background:var(--surface);color:var(--ink2);border:2px solid var(--rule)}
.report-actions button:hover{transform:translateY(-2px)}
.share-card{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));border-radius:var(--radius);padding:24px 18px;color:#fff;text-align:center;display:none;box-shadow:0 12px 32px rgba(99,102,241,.3);position:relative;overflow:hidden;animation:card-pop .4s cubic-bezier(.68,-.55,.27,1.55)}
@keyframes card-pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.share-card::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,transparent 60%)}
.share-card.show{display:block}
.share-card .sc{font-size:42px;margin-bottom:8px;position:relative}.share-card h3{font-size:15px;margin-bottom:4px;font-weight:600;opacity:.9;position:relative}
.share-card .s{font-size:56px;font-weight:900;margin:12px 0;position:relative;text-shadow:0 4px 12px rgba(0,0,0,.15)}
.share-card .r{background:rgba(255,255,255,.2);display:inline-block;padding:5px 16px;border-radius:18px;font-size:var(--fs-label);font-weight:700;margin-bottom:10px;position:relative;backdrop-filter:blur(4px)}
.share-card .b{font-size:var(--fs-label);opacity:.7;position:relative;font-weight:500;letter-spacing:.03em}
.share-card .close-share{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2}
.share-card .close-share:hover{background:rgba(255,255,255,.3)}

/* History */
.history{flex:1;overflow-y:auto;padding:14px}
.history-empty{text-align:center;padding:50px 20px;color:var(--muted)}
.history-empty .he-emoji{font-size:52px;margin-bottom:12px;opacity:.4;animation:float 3s ease-in-out infinite}
.history-empty .he-text{font-size:var(--fs-caption);line-height:1.7;color:var(--muted2);margin-bottom:16px}
.history-empty .he-btn{display:inline-block;padding:12px 26px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--radius-sm);font-size:var(--fs-caption);font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.history-stats{display:flex;gap:8px;margin-bottom:16px}
.history-stats .hs{flex:1;background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-xs);padding:12px 8px;text-align:center}
.history-stats .hs .hsn{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-variant-numeric:tabular-nums}
.history-stats .hs .hsl{font-size:var(--fs-micro);color:var(--muted2);font-weight:600;margin-top:2px}
.history-group{margin-bottom:18px;animation:fade-up .4s ease}
.history-group-title{font-size:var(--fs-label);color:var(--muted2);font-weight:700;letter-spacing:.02em;margin-bottom:8px;padding:0 4px}
.history-item{background:var(--surface);border-radius:var(--radius-sm);padding:14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .25s;border:2px solid transparent}
.history-item:hover{border-color:var(--accent);box-shadow:0 6px 20px rgba(99,102,241,.12);transform:translateY(-1px)}
.history-item .hi-emoji{font-size:26px;width:46px;height:46px;background:linear-gradient(135deg,var(--bg),var(--bg2));border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
.history-item:hover .hi-emoji{transform:scale(1.1)}
.history-item .hi-info{flex:1;min-width:0}.history-item .hi-name{font-weight:700;font-size:var(--fs-caption);margin-bottom:3px}
.history-item .hi-meta{font-size:var(--fs-label);color:var(--muted2);margin-bottom:3px}
.history-item .hi-rank{display:inline-block;font-size:var(--fs-micro);font-weight:600;padding:2px 7px;border-radius:4px;color:#fff}
.history-item .hi-score{text-align:right;flex-shrink:0}.history-item .hi-score-num{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;font-variant-numeric:tabular-nums}
.history-item .hi-score-label{font-size:var(--fs-micro);color:var(--muted2);font-weight:600}
.history-item .hi-delete{background:none;border:none;color:var(--muted2);font-size:15px;cursor:pointer;padding:6px;opacity:0;transition:all .2s;flex-shrink:0;border-radius:6px}
.history-item:hover .hi-delete{opacity:1}.history-item .hi-delete:hover{color:var(--danger);background:#fef2f2}

/* Custom Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:85%;max-width:320px;box-shadow:var(--shadow-xl);transform:scale(.9);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.modal-overlay.show .modal{transform:scale(1)}
.modal .modal-icon{font-size:44px;text-align:center;margin-bottom:14px}
.modal .modal-title{font-size:var(--fs-h3);font-weight:700;text-align:center;margin-bottom:8px}
.modal .modal-msg{font-size:var(--fs-caption);color:var(--muted);text-align:center;line-height:1.6;margin-bottom:22px}
.modal .modal-actions{display:flex;gap:10px}
.modal .modal-actions button{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:var(--fs-caption);font-weight:700;cursor:pointer;border:none;transition:all .2s}
.modal .modal-actions .m-cancel{background:var(--bg);color:var(--muted);border:2px solid var(--rule)}
.modal .modal-actions .m-confirm{background:linear-gradient(135deg,var(--danger),#f87171);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.3)}
.modal .modal-actions button:hover{transform:translateY(-1px)}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:12px;font-size:var(--fs-caption);font-weight:500;z-index:3000;transition:transform .35s cubic-bezier(.4,0,.2,1);pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="screen active" id="screen-welcome">
    <div class="welcome">
      <div class="hero">
        <div class="logo">💬</div>
        <h1>话术对练</h1>
        <p class="tagline">把你的嘴笨，练成本能</p>
      </div>
      <div class="stats-bar" id="stats-bar"></div>
      <div class="history-entry" onclick="goHistory()">
        <span class="he-icon">📚</span>
        <span class="he-text">历史对练记录</span>
        <span class="he-arrow">›</span>
      </div>
      <div class="section-title">选择模式</div>
      <div class="mode-selector">
        <div class="mode-btn active" data-mode="coach" onclick="selectMode('coach')"><span class="mode-icon">👨‍🏫</span><span class="mode-name">教练模式</span><span class="mode-desc">带提示学</span></div>
        <div class="mode-btn" data-mode="free" onclick="selectMode('free')"><span class="mode-icon">🔓</span><span class="mode-name">自由模式</span><span class="mode-desc">自由切换</span></div>
        <div class="mode-btn" data-mode="challenge" onclick="selectMode('challenge')"><span class="mode-icon">⚔️</span><span class="mode-name">挑战模式</span><span class="mode-desc">真实考验</span></div>
      </div>
      <div class="section-title">选择场景</div>
      <div class="scenario-list" id="scenario-list"></div>
    </div>
  </div>

  <div class="screen" id="screen-prep">
    <div class="topbar"><button class="back" onclick="goScreen('welcome')">←</button><div class="title">场景热身</div></div>
    <div class="prep" id="prep-content"></div>
  </div>

  <div class="screen" id="screen-chat">
    <div class="topbar">
      <button class="back" onclick="confirmExit()">←</button>
      <div class="title" id="chat-title">对练中</div>
      <span class="mode-badge" id="chat-mode-badge">教练模式</span>
      <span class="round" id="chat-round">第 1/5 轮</span>
    </div>
    <div class="chat" id="chat-messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="chat-input" placeholder="输入你的回应..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
      </div>
      <button class="hint-btn" id="hint-btn" onclick="toggleHint()">💡 查看话术提示</button>
      <div class="hint-box" id="hint-box" style="display:none"></div>
    </div>
  </div>

  <div class="screen" id="screen-report">
    <div class="topbar"><button class="back" id="report-back-btn" onclick="handleReportBack(false)">←</button><div class="title">对练报告</div></div>
    <div class="report" id="report-content"></div>
  </div>

  <div class="screen" id="screen-history">
    <div class="topbar">
      <button class="back" onclick="goScreen('welcome')">←</button>
      <div class="title">历史记录</div>
      <button class="back" onclick="confirmClearHistory()" style="font-size:var(--fs-label);color:var(--danger);font-weight:600;display:none" id="clear-history-btn">清空</button>
    </div>
    <div class="history" id="history-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">⚠️</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-actions">
      <button class="m-cancel" id="modal-cancel">取消</button>
      <button class="m-confirm" id="modal-confirm">确定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCENARIOS={
  boss:{name:"向上汇报（项目延期）",emoji:"👔",aiRole:"不耐烦的老板",aiName:"老板",desc:"项目延期了，向老板汇报坏消息",difficulty:"⭐⭐⭐",
    traps:["一上来就找借口甩锅","只说问题不说方案","被情绪带跑开始辩解"],

    badExample:"「那个…项目遇到了一些问题，因为产品改了好几次需求…可能要晚一点…」",
    rounds:[
      {aiText:"（头也不抬）项目进度怎么样了？周五能上线吗？",subtext:{intent:"例行询问，但已感觉不对劲",signals:["不看你=不耐烦","语气平淡"],risk:"说没问题他可能当场戳穿"},hint:"「老板，项目要延期3天，下周一上线。我来汇报原因和方案。」"},
      {aiText:"延期？？之前不是信誓旦旦说没问题吗？你怎么搞的！",subtext:{intent:"施压看你反应——慌了、找借口、还是稳住",signals:["提高音量=施压","追责试探"],risk:"辩解甩锅会更火大"},hint:"「是我的责任，前期风险评估不充分。我已经梳理了原因和补救方案。」"},
      {aiText:"（皱眉）什么原因？别跟我说需求变更，每次都是这套。",subtext:{intent:"堵死借口，要实质性回答",signals:["堵你的话","要方案不要解释"],risk:"继续解释=找借口"},hint:"「核心是支付模块兼容性问题。我已协调两人加班，周一肯定上线。」"},
      {aiText:"下周一？不行！运营活动周日就要上，怎么交代？",subtext:{intent:"最后通牒，测你底线",signals:["强硬拒绝","转移压力"],risk:"答应周日=挖坑"},hint:"「我理解。核心功能周日上线，支付模块周一凌晨热更新，不影响活动。」"},

  salary:{name:"薪资谈判",emoji:"💰",aiRole:"预算有限的HR",aiName:"HR",desc:"面试最后一关谈薪资",difficulty:"⭐⭐⭐⭐",
    traps:["先报数字就被动了","「预算有限」就降底线","被「凭什么值这个价」激怒"],
    tips:["先反问薪资范围","用价值说话不用需求","奖金期权福利都可以谈"],
    badExample:"「我期望20k…不行的话18k也可以…」",
    rounds:[
      {aiText:"你的期望薪资是多少？",subtext:{intent:"试探底线，谁先报数谁被动",signals:["直接问数字"],risk:"报低亏报高吓跑"},hint:"「想先了解一下贵司这个岗位的薪资范围？」"},
      {aiText:"预算18-22k，结合你经验可以给到19k。",subtext:{intent:"给下限试探，19k是锚点",signals:["给范围=有空间","压低你"],risk:"接受19k=没争取上限"},hint:"「19k低于预期。基于3年经验和项目成果，我期望22-25k。」"},

      {aiText:"（微笑）年终奖不写合同，惯例2-4个月。今天能签就按20k定。",subtext:{intent:"用惯例代替承诺，催你决定",signals:["微笑=放松警惕","催你签"],risk:"口头承诺无保障"},hint:"「好的。年终奖和调薪请在offer邮件注明，收到后3天内回复。」"}

      {aiText:"（脸色不好）你怎么这样？推三阻四的？不帮就算了。",subtext:{intent:"激将法贴标签",signals:["脸色变","贴标签"],risk:"怕得罪人软下来"},hint:"「别误会。你先发张经理看优先级，他觉得需要我支持我没问题。」"},

const RANKS=[{min:0,max:49,name:"沟通小白",color:"#ef4444"},{min:50,max:64,name:"初出茅庐",color:"#f59e0b"},{min:65,max:74,name:"渐入佳境",color:"#eab308"},{min:75,max:84,name:"沟通达人",color:"#10b981"},{min:85,max:100,name:"沟通大师",color:"#6366f1"}];
const STORAGE_KEY='sparringcoach_history';

function renderStats(){

  bar.innerHTML=`
    <div class="stat-card"><div class="stat-num">${list.length}</div><div class="stat-label">练习次数</div></div>

// Storage
function loadHistory(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){return[]}}
function saveHistoryItem(item){const l=loadHistory();item.id=Date.now().toString();item.timestamp=Date.now();l.unshift(item);if(l.length>50)l.length=50;localStorage.setItem(STORAGE_KEY,JSON.stringify(l));updateHistoryCount();renderStats()}
function deleteHistoryItem(id){localStorage.setItem(STORAGE_KEY,JSON.stringify(loadHistory().filter(i=>i.id!==id)));updateHistoryCount();renderStats()}
function updateHistoryCount(){const l=loadHistory();const e=document.getElementById('history-count');if(e)e.textContent=l.length;const c=document.getElementById('clear-history-btn');if(c)c.style.display=l.length?'block':'none'}
function formatDate(ts){const d=new Date(ts),n=new Date(),t=d.toDateString()===n.toDateString(),y=new Date(n-864e5).toDateString()===d.toDateString();const h=String(d.getHours()).padStart(2,'0'),m=String(d.getMinutes()).padStart(2,'0');return t?`今天 ${h}:${m}`:y?`昨天 ${h}:${m}`:`${d.getMonth()+1}/${d.getDate()} ${h}:${m}`}

// Modal
function showModal(icon,title,msg,onConfirm,confirmText){
  const ov=document.getElementById('modal-overlay');
  document.getElementById('modal-icon').textContent=icon;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-msg').textContent=msg;
  const cb=document.getElementById('modal-cancel'),cf=document.getElementById('modal-confirm');
  cf.textContent=confirmText||'确定';
  const close=()=>ov.classList.remove('show');
  cb.onclick=close;cf.onclick=()=>{close();onConfirm&&onConfirm()};
  ov.classList.add('show');
}

}

// Chat
function startChat(){
  state.round=0;state.convHistory=[];state.scores={subtext:0,clarity:0,emotion:0,strategy:0,bottomline:0,language:0};state.scoreCounts={subtext:0,clarity:0,emotion:0,strategy:0,bottomline:0,language:0};state.hintVisible=false;freeToggleAdded=false;state.waitingForAI=false;
  document.querySelector('.app').classList.remove('free-hide-subtext');
  document.getElementById('chat-messages').innerHTML='';document.getElementById('chat-input').value='';document.getElementById('send-btn').disabled=true;document.getElementById('hint-box').style.display='none';

}
function aiSpeak(){
  state.waitingForAI=true;const s=SCENARIOS[state.scenario],r=s.rounds[state.round];
  document.getElementById('chat-round').textContent=`第 ${state.round+1}/5 轮`;
  const chat=document.getElementById('chat-messages');
  const t=document.createElement('div');t.className='typing';t.innerHTML='<span></span><span></span><span></span>';chat.appendChild(t);chat.scrollTop=chat.scrollHeight;
  setTimeout(()=>{
    t.remove();const b=document.createElement('div');b.className='bubble ai';
    let h=`<div class="speaker">${s.aiName}</div>${r.aiText}`;
    // Coach mode: always show subtext inline
    // Free mode: always render subtext, control visibility via CSS class toggle
    // Challenge mode: never render subtext inline during chat
    if(state.mode==='coach'){
      h+=renderSubtext(r.subtext);
    }else if(state.mode==='free'){
      h+=renderSubtext(r.subtext);
    }
    b.innerHTML=h;chat.appendChild(b);
    state.convHistory.push({type:'ai',text:r.aiText,subtext:r.subtext});
    // Free mode: add global toggle button once
    if(state.mode==='free'&&!freeToggleAdded){
      freeToggleAdded=true;
      document.querySelector('.app').classList.toggle('free-hide-subtext',!state.showSubtext);
      const tg=document.createElement('div');tg.className='subtext-toggle';tg.id='free-toggle';
      tg.innerHTML=state.showSubtext?'<span>🙈 隐藏潜台词</span><span>→</span>':'<span>👁️ 显示潜台词</span><span>→</span>';
      tg.onclick=function(){
        state.showSubtext=!state.showSubtext;
        document.querySelector('.app').classList.toggle('free-hide-subtext',!state.showSubtext);
        this.innerHTML=state.showSubtext?'<span>🙈 隐藏潜台词</span><span>→</span>':'<span>👁️ 显示潜台词</span><span>→</span>';
      };
      chat.appendChild(tg);
    }
    // Challenge mode: no hint button text changes
    if(state.mode==='challenge'){
      document.getElementById('hint-btn').textContent='💭 方向提示';
    }else{
      document.getElementById('hint-btn').textContent='💡 查看话术提示';
    }
    document.getElementById('hint-box').innerHTML=state.mode==='challenge'?getDirectionalHint(state.scenario,state.round):r.hint;
    state.hintVisible=false;document.getElementById('hint-box').style.display='none';
    chat.scrollTop=chat.scrollHeight;state.waitingForAI=false;document.getElementById('chat-input').focus();

// Directional hints for challenge mode (vague, no specific answers)
function getDirectionalHint(scenario,round){
  const hints={
    boss:["先给出结论，不要绕弯子","承认问题，但不要过度自责","聚焦解决方案，不要解释原因","给出折中方案，不要全盘接受也不要硬顶","主动给出承诺，让对方放心"],
    salary:["先了解对方的范围，不要先报价","用你的价值说话，而不是你的需要","不要被情绪激怒，保持冷静","薪酬包不止是base，还有其他部分可以谈","口头承诺不如书面确认"],
    refuse:["温和但直接地拒绝","感谢但划清界限","不要被道德绑架","把决策权上交","提供替代方案但不接责任"],
    relative:["不要认真回答","反问回去","用幽默化解","转移话题","一笑了之"],
    crossdept:["先共情再提要求","用共同目标推动","降低对方的配合成本","明确时间节点和责任人","书面确认留痕"]
  };
  return hints[scenario]?hints[scenario][Math.min(round,4)]:"思考对方真正想要什么，再决定怎么回应";
}
function renderSubtext(sub){
  return `<div class="subtext subtext-inline"><div class="subtext-title">🔍 潜台词分析</div><div style="margin-bottom:3px"><strong>意图：</strong>${sub.intent}</div><div style="margin-bottom:3px"><strong>信号：</strong>${sub.signals.map(s=>`<span class="subtext-tag">${s}</span>`).join('')}</div><div><strong>⚠️ 风险：</strong>${sub.risk}</div></div>`;
}
function sendMessage(){
  const inp=document.getElementById('chat-input'),txt=inp.value.trim();if(!txt||state.waitingForAI)return;
  const chat=document.getElementById('chat-messages');
  const ub=document.createElement('div');ub.className='bubble user';ub.innerHTML=`<div class="speaker">你</div>${esc(txt)}`;chat.appendChild(ub);
  inp.value='';autoResize(inp);document.getElementById('send-btn').disabled=true;chat.scrollTop=chat.scrollHeight;
  state.waitingForAI=true;
  // Show analyzing indicator
  const an=document.createElement('div');an.className='analyzing';an.innerHTML='<span>🤔</span><span>分析你的回应...</span><span class="an-dots"><span></span><span></span><span></span></span>';chat.appendChild(an);chat.scrollTop=chat.scrollHeight;
  const fb=evaluateResponse(txt);
  // Delay feedback to feel natural
  setTimeout(()=>{
    an.remove();
    showFeedback(fb);
    state.convHistory.push({type:'user',text:txt});
    state.convHistory.push({type:'feedback',good:fb.good,bad:fb.bad,tip:fb.tip});
    state.round++;
    if(state.round<5){
      setTimeout(()=>aiSpeak(),800);
    }else{
      setTimeout(()=>showReport(false),1500);
    }
  },1200+Math.random()*600);
}
function evaluateResponse(text){
  const r=SCENARIOS[state.scenario].rounds[state.round],hint=r.hint;
  let sc={subtext:0,clarity:0,emotion:0,strategy:0,bottomline:0,language:0},g=[],b=[],tip="";const len=text.length;
  if(len<5){sc.clarity=3;b.push("回复过短")}else if(len>200){sc.clarity=5;b.push("太长重点不突出")}else{sc.clarity=7;g.push("表达清晰")}
  const aw=["凭什么","你怎么","凭啥","不关你事","你管得着","废话","气死","烦"],dw=["不是我","跟我没关系","不怪我"];
  const ha=aw.some(w=>text.includes(w));
  if(ha){sc.emotion=3;b.push("情绪激动被带跑")}else if(dw.some(w=>text.includes(w))&&state.scenario!=='crossdept'){sc.emotion=5}else{sc.emotion=8;g.push("情绪稳定")}
  const gp={boss:["延期","承担","责任","方案","措施","上线","补救"],salary:["范围","市场","经验","价值","年终奖","福利","书面","offer"],refuse:["责任","不了解","建议","领导","经理","帮忙看看","思路"],relative:["表弟","表妹","孩子","成绩","吃菜","转移","哈哈","笑"],crossdept:["老板","上线","接口","周三","小王","小李","邮件","确认","时间"]};
  const bp={boss:["不是我的错","产品改需求","测试bug","我不知道","没办法"],salary:["我需要","房租","好吧","也行","18k","19k"],refuse:["好吧","我帮你","我来弄","不好意思","对不起"],relative:["还没找到","不想找","你别管","工资不高","混得不好"],crossdept:["好吧我自己","那算了","等下个月","不麻烦了"]};
  const gh=(gp[state.scenario]||[]).filter(w=>text.includes(w)).length,bh=(bp[state.scenario]||[]).filter(w=>text.includes(w)).length;
  if(gh>=2){sc.strategy=8;g.push(["结论先行","主动担责","给出方案","用价值说话","温和坚定","转移话题","明确诉求","锁定责任人"][state.round%8])}else if(gh>=1){sc.strategy=6}else{sc.strategy=4;b.push("沟通策略待提升")}
  if(bh>0){sc.strategy=Math.max(2,sc.strategy-3);b.push(["被情绪带跑","过早妥协","接了不该接的","正面回应隐私","被推诿击退"][state.round%5])}
  const sk={boss:["方案","责任","措施","承诺","时间"],salary:["价值","市场","福利","书面","范围"],refuse:["责任","领导","建议","帮忙","边界"],relative:["转移","反问","幽默","不接招"],crossdept:["老板","上线","时间","确认","邮件"]};
  if((sk[state.scenario]||[]).filter(w=>text.includes(w)).length>=2){sc.subtext=9;g.push("识别了真实意图")}else if((sk[state.scenario]||[]).filter(w=>text.includes(w)).length>=1){sc.subtext=6}else{sc.subtext=4;b.push("未识别潜台词")}
  if(["好吧","也行","算了","我试试","可能","尽量"].some(w=>text.includes(w))&&(state.scenario==='salary'||state.scenario==='refuse')){sc.bottomline=4;b.push("过早妥协")}else{sc.bottomline=7;g.push("坚守立场")}
  if(len>=20&&!ha){sc.language=7;g.push("用词得体")}else{sc.language=5}
  tip=sc.strategy<6?"💡 "+(state.mode==='challenge'?getDirectionalHint(state.scenario,state.round):hint):"💡 继续保持，下一轮对方可能加大施压";
  Object.keys(sc).forEach(k=>{state.scores[k]+=sc[k];state.scoreCounts[k]++});
  return{good:g,bad:b,tip};
}
function showFeedback(fb){
  const chat=document.getElementById('chat-messages'),d=document.createElement('div');d.className='feedback';let h='';
  if(fb.good.length)h+=`<div class="fb-good">✅ ${fb.good.join('；')}</div>`;
  if(fb.bad.length)h+=`<div class="fb-bad">❌ ${fb.bad.join('；')}</div>`;

// Report

    <div class="report-header"><div class="trophy">🏆</div><h2>${fromHistory?'历史报告':'对练完成！'}</h2><div class="sub">${s.name} · ${mn[state.mode]}${fromHistory?' · '+formatDate(fromHistory):''}</div></div>
    <div class="score-total"><div class="score-num" id="score-num">0</div><div class="score-label">综合评分（满分100）</div><div class="rank" style="background:linear-gradient(135deg,${rank.color},${rank.color}cc)">${rank.name}</div></div>
    <div class="radar-wrap"><canvas id="radar-canvas" width="260" height="260"></canvas></div>
    <div class="score-breakdown"><h3>📊 六维评分</h3>${Object.keys(wt).map(k=>`<div class="score-row"><span class="dim">${dn[k]}</span><div class="score-bar"><div class="fill" style="--w:${fs[k]*10}%;background:${barColor(fs[k])}"></div></div><span class="val" style="color:${scoreColor(fs[k])}">${fs[k]}</span></div>`).join('')}</div>
    <div class="advice-box"><h3>💪 改进建议</h3><ul>${adv.map(a=>`<li>${a}</li>`).join('')}</ul></div>
    ${replayHtml}
    <div class="report-actions"><button class="secondary" onclick="handleReportBack(${fromHistory?'true':'false'})">返回</button><button class="primary" onclick="retry()">再来一次</button></div>
    <div class="share-card" id="share-card"><button class="close-share" onclick="document.getElementById('share-card').classList.remove('show')">✕</button><div class="sc">${s.emoji}</div><h3>${s.name}</h3><div class="s">${total}分</div><div class="r">${rank.name}</div><div class="b">话术对练 SparringCoach</div></div>
    <button class="hint-btn" onclick="showShare()" style="margin-top:0">📱 生成分享卡片</button>`;
  goScreen('report');
  setTimeout(()=>{animateScore(0,total,800);drawRadar(fs)},200);
}

function animateScore(from,to,dur){
  const el=document.getElementById('score-num');if(!el)return;
  const start=performance.now();
  function tick(now){const p=Math.min((now-start)/dur,1);const e=1-Math.pow(1-p,3);el.textContent=Math.round(from+(to-from)*e);if(p<1)requestAnimationFrame(tick)}
  requestAnimationFrame(tick);
}

function genAdvice(sc){const a=[];if(sc.subtext<6)a.push("多练习识别对方的真实意图");if(sc.clarity<6)a.push("尝试结论先行，第一句说核心观点");if(sc.emotion<6)a.push("对方施压时先深呼吸，别被带跑");if(sc.strategy<6)a.push("对练前先熟悉场景话术库");if(sc.bottomline<6)a.push("明确底线，不要轻易妥协");if(sc.language<6)a.push("用词更专业得体");if(!a.length)a.push("表现很棒！试试挑战模式检验真实水平");return a}

function drawRadar(scores){
  const cv=document.getElementById('radar-canvas');if(!cv)return;const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=90;
  const dims=[{l:'潜台词',v:scores.subtext},{l:'策略',v:scores.strategy},{l:'底线',v:scores.bottomline},{l:'语言',v:scores.language},{l:'情绪',v:scores.emotion},{l:'清晰',v:scores.clarity}],n=dims.length;
  ctx.clearRect(0,0,W,H);
  for(let lv=1;lv<=5;lv++){ctx.beginPath();for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2,x=cx+R*lv/5*Math.cos(a),y=cy+R*lv/5*Math.sin(a);i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();ctx.strokeStyle='#f1f5f9';ctx.lineWidth=1;ctx.stroke()}
  for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle='#f1f5f9';ctx.stroke()}
  ctx.beginPath();for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2,r=R*(dims[i].v/10),x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();
  const g=ctx.createLinearGradient(cx-R,cy,cx+R,cy);g.addColorStop(0,'rgba(99,102,241,.25)');g.addColorStop(1,'rgba(236,72,153,.25)');ctx.fillStyle=g;ctx.fill();
  const g2=ctx.createLinearGradient(cx-R,cy,cx+R,cy);g2.addColorStop(0,'#6366f1');g2.addColorStop(1,'#ec4899');ctx.strokeStyle=g2;ctx.lineWidth=2.5;ctx.stroke();
  for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2,r=R*(dims[i].v/10),x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#8b5cf6';ctx.fill();ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    const lx=cx+(R+16)*Math.cos(a),ly=cy+(R+16)*Math.sin(a);ctx.fillStyle='#64748b';ctx.font='600 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(dims[i].l,lx,ly)}
}
function retry(){startChat()}
function showShare(){document.getElementById('share-card').classList.add('show');showToast('截图保存分享卡片吧！')}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

// History
function goHistory(){renderHistoryList();goScreen('history')}
function renderHistoryList(){
  const l=loadHistory(),c=document.getElementById('history-list');updateHistoryCount();
  if(!l.length){c.innerHTML=`<div class="history-empty"><div class="he-emoji">📭</div><div class="he-text">还没有对练记录<br>完成一次对练后自动保存</div><button class="he-btn" onclick="goScreen('welcome')">开始第一次对练</button></div>`;return}
  const avg=Math.round(l.reduce((a,b)=>a+b.total,0)/l.length),best=Math.max(...l.map(x=>x.total)),scenarios=new Set(l.map(x=>x.scenario)).size;
  const g={};l.forEach(i=>{const d=new Date(i.timestamp),n=new Date(),t0=new Date(n.getFullYear(),n.getMonth(),n.getDate()).getTime();let gk=i.timestamp>=t0?'今天':i.timestamp>=t0-864e5?'昨天':`${d.getFullYear()}年${d.getMonth()+1}月`;(g[gk]=g[gk]||[]).push(i)});
  let h=`<div class="history-stats">
    <div class="hs"><div class="hsn">${l.length}</div><div class="hsl">总次数</div></div>
    <div class="hs"><div class="hsn">${avg}</div><div class="hsl">平均分</div></div>
    <div class="hs"><div class="hsn">${best}</div><div class="hsl">最高分</div></div>
    <div class="hs"><div class="hsn">${scenarios}</div><div class="hsl">场景数</div></div>
  </div>`;
  Object.entries(g).forEach(([gn,items])=>{h+=`<div class="history-group"><div class="history-group-title">${gn}</div>`;items.forEach(i=>{const rk=i.rank?.name?i.rank:RANKS.find(r=>i.total>=r.min&&i.total<=r.max)||RANKS[0];h+=`<div class="history-item" onclick="viewHistoryReport('${i.id}')"><div class="hi-emoji">${i.scenarioEmoji}</div><div class="hi-info"><div class="hi-name">${i.scenarioName}</div><div class="hi-meta">${i.modeName} · ${formatDate(i.timestamp)}</div><div><span class="hi-rank" style="background:${rk.color}">${rk.name}</span></div></div><div class="hi-score"><div class="hi-score-num">${i.total}</div><div class="hi-score-label">分</div></div><button class="hi-delete" onclick="event.stopPropagation();deleteRecord('${i.id}')">✕</button></div>`});h+='</div>'});
  c.innerHTML=h;
}
function deleteRecord(id){showModal('🗑️','删除记录？','确定删除这条对练记录吗？',()=>{deleteHistoryItem(id);renderHistoryList();showToast('已删除')},'删除')}
function confirmClearHistory(){showModal('🧹','清空所有记录？','此操作不可恢复。',()=>{localStorage.removeItem(STORAGE_KEY);renderHistoryList();renderStats();showToast('已清空')},'清空')}
function viewHistoryReport(id){
  const l=loadHistory(),i=l.find(x=>x.id===id);if(!i)return;
  state.scenario=i.scenario;state.mode=i.mode;state.scores={};state.scoreCounts={};
  Object.keys({subtext:25,clarity:20,emotion:20,strategy:20,bottomline:10,language:5}).forEach(k=>{state.scores[k]=i.finalScores[k]*5;state.scoreCounts[k]=5});
  state.viewingHistoryId=i.timestamp;showReport(i.timestamp);
}
function handleReportBack(fh){state.viewingHistoryId=null;fh?goHistory():goScreen('welcome')}

init();
</script>
