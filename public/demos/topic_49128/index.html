<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaForge · 从趋势到落地页的创意工厂</title>
  <meta name="description" content="IdeaForge 帮助独立创始人、产品经理与团队从全球技术趋势中发现机会，生成产品方向并一键产出可部署的营销落地页。" />
  <meta name="keywords" content="IdeaForge, AI 工具, SaaS, MVP, 产品创意, 趋势, 落地页, 独立开发" />

  <!-- ============================================================
       M0 · 应用外壳 · 全局样式
       ============================================================ -->
  <style>
    /* ---------- Design Tokens ---------- */
    :root {
      --bg: #f8fafc;
      --bg-soft: #ffffff;
      --fg: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-soft: #f1f5f9;
      --ring: #6366f1;
      --indigo: #6366f1;
      --fuchsia: #d946ef;
      --rose: #f43f5e;
      --emerald: #10b981;
      --amber: #f59e0b;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow: 0 4px 24px -4px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 20px 60px -20px rgba(99, 102, 241, 0.35);
      --radius: 14px;
      --radius-lg: 20px;
    }

    html.dark {
      --bg: #0b0d12;
      --bg-soft: #11131a;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --border: #1f2330;
      --border-soft: #161a24;
      --ring: #818cf8;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }
    input, textarea { font: inherit; color: inherit; }

    /* ---------- Shell: Nav ---------- */
    .shell-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in srgb, var(--bg-soft) 85%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .shell-nav__inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; }
    .brand__logo {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--indigo), var(--fuchsia));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; letter-spacing: -0.5px;
      box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
    }
    .brand__name { font-size: 15px; }
    .brand__tag { font-size: 11px; color: var(--muted); font-weight: 500; margin-left: 6px; }

    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-link {
      padding: 8px 14px; border-radius: 10px;
      font-size: 14px; color: var(--muted);
      transition: all 0.15s ease;
      background: transparent; border: none;
    }
    .nav-link:hover { color: var(--fg); background: var(--border-soft); }
    .nav-link.is-active {
      color: #fff;
      background: linear-gradient(135deg, var(--indigo), var(--fuchsia));
      box-shadow: 0 6px 16px -6px rgba(99, 102, 241, 0.55);
    }

    .shell-actions { display: flex; align-items: center; gap: 8px; }
    .theme-btn {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg-soft);
      display: flex; align-items: center; justify-content: center;
      color: var(--fg); transition: all 0.15s ease;
    }
    .theme-btn:hover { border-color: var(--ring); }

    /* ---------- Layout ---------- */
    .page { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px;
      animation: pageFadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .page__header { margin-bottom: 28px; }
    .page__eyebrow {
      display: inline-block; font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--indigo);
      padding: 4px 10px; background: color-mix(in srgb, var(--indigo) 10%, transparent);
      border-radius: 999px; margin-bottom: 10px; font-weight: 600;
    }
    .page__title { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; margin: 0; line-height: 1.15; }
    .page__subtitle { color: var(--muted); margin: 10px 0 0; font-size: 15px; max-width: 720px; }

    /* ---------- Cards & Boxes ---------- */
    .card {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .card--soft { background: transparent; border-color: var(--border-soft); }

    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
      background: var(--border-soft); color: var(--muted);
    }
    .chip--indigo { background: color-mix(in srgb, var(--indigo) 12%, transparent); color: var(--indigo); }
    .chip--fuchsia { background: color-mix(in srgb, var(--fuchsia) 12%, transparent); color: var(--fuchsia); }
    .chip--rose { background: color-mix(in srgb, var(--rose) 12%, transparent); color: var(--rose); }
    .chip--emerald { background: color-mix(in srgb, var(--emerald) 12%, transparent); color: var(--emerald); }
    .chip--amber { background: color-mix(in srgb, var(--amber) 12%, transparent); color: var(--amber); }

    /* ---------- Buttons ---------- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 18px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg-soft); color: var(--fg);
      transition: all 0.15s ease;
    }
    .btn:hover { border-color: var(--ring); transform: translateY(-1px); }
    .btn:active { transform: translateY(0) scale(0.98); }
    .btn--primary {
      background: linear-gradient(135deg, var(--indigo), var(--fuchsia));
      color: #fff; border: none;
      box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
    }
    .btn--primary:hover { box-shadow: 0 12px 28px -8px rgba(99, 102, 241, 0.6); transform: translateY(-2px); }
    .btn--primary:active { transform: translateY(0) scale(0.97); }
    .btn--sm { padding: 7px 12px; font-size: 13px; border-radius: 9px; }
    .btn--ghost { background: transparent; border: 1px solid var(--border); }

    /* ============================================================
       M1 · 趋势大脑（频道版）
       ============================================================ */
    .m1-stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px;
    }
    .m1-stat {
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .m1-stat__icon {
      width: 46px; height: 46px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .m1-stat__val { font-size: 22px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
    .m1-stat__lbl { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; }
    @media (max-width: 700px) { .m1-stats { grid-template-columns: repeat(2, 1fr); } }

    .m1-channels {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px;
    }
    .m1-channel {
      padding: 16px 14px; border-radius: 16px;
      background: var(--bg-soft); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; align-items: center; gap: 10px;
    }
    .m1-channel:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .m1-channel.is-active { border-width: 2px; }
    .m1-channel__icon {
      width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .m1-channel__body { flex: 1; min-width: 0; }
    .m1-channel__name { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .m1-channel__count { font-size: 11px; color: var(--muted); margin-top: 2px; }
    @media (max-width: 900px) { .m1-channels { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .m1-channels { grid-template-columns: 1fr; } }

    .m1-layout {
      display: grid; grid-template-columns: 1fr 360px; gap: 20px;
    }
    @media (max-width: 900px) { .m1-layout { grid-template-columns: 1fr; } }

    .m1-toolbar {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
      align-items: center; justify-content: space-between;
    }
    .m1-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
    .m1-tab {
      padding: 6px 13px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--muted); transition: all 0.15s ease;
    }
    .m1-tab:hover { color: var(--fg); border-color: var(--ring); }
    .m1-tab.is-active { color: #fff; border-color: transparent; font-weight: 600; }
    .m1-search {
      position: relative; min-width: 200px;
    }
    .m1-search input {
      width: 100%; padding: 9px 12px 9px 34px;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-soft); font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    .m1-search input:focus { border-color: var(--ring); }
    .m1-search::before {
      content: "🔍"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      font-size: 12px; opacity: 0.45;
    }

    .m1-trends { display: flex; flex-direction: column; gap: 12px; }
    .trend-card {
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px;
      transition: all 0.2s ease; cursor: pointer;
    }
    .trend-card:hover {
      border-color: var(--ring);
      transform: translateY(-2px);
      box-shadow: 0 12px 36px -8px rgba(99, 102, 241, 0.25);
    }
    .trend-card__head {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 10px; gap: 12px;
    }
    .trend-card__icon {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .trend-card__title-wrap { flex: 1; }
    .trend-card__title { font-weight: 700; font-size: 15px; line-height: 1.4; margin-bottom: 2px; }
    .trend-card__hot { font-size: 11px; color: var(--muted); }
    .trend-card__growth {
      font-size: 13px; font-weight: 800; padding: 4px 10px; border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }
    .trend-card__summary { color: var(--muted); font-size: 13px; line-height: 1.6; margin: 6px 0 14px; }
    .trend-card__footer {
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .trend-card__score { margin-left: auto; font-size: 11px; color: var(--muted); font-weight: 600; }
    .trend-card__meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }

    .m1-insight {
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 20px; padding: 22px;
      position: sticky; top: 90px;
    }
    .m1-insight__head {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .m1-insight__icon { font-size: 20px; }
    .m1-insight__title { font-size: 15px; font-weight: 700; }
    .m1-insight__subtitle { font-size: 12px; color: var(--muted); }
    .m1-insight__list { list-style: none; padding: 0; margin: 0 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .m1-insight__item {
      padding: 12px 14px; border-radius: 12px;
      background: var(--border-soft); border-left: 3px solid;
      font-size: 13px; line-height: 1.6;
    }
    .m1-insight__item strong { font-weight: 700; display: block; margin-bottom: 2px; }
    .m1-insight__item small { font-size: 11px; opacity: 0.65; }
    .m1-growth-wrap {
      background: var(--border-soft); border-radius: 14px; padding: 14px;
    }
    .m1-growth-item { margin-bottom: 12px; }
    .m1-growth-item:last-child { margin-bottom: 0; }
    .m1-growth-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 500;
    }
    .m1-growth-bar {
      height: 6px; background: var(--border); border-radius: 999px; overflow: hidden;
    }
    .m1-growth-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }
    .m1-empty {
      text-align: center; padding: 48px 20px; color: var(--muted);
      background: var(--bg-soft); border: 1px dashed var(--border);
      border-radius: 16px; font-size: 14px;
    }
    .m1-channel-detail { margin-bottom: 16px; padding: 16px; border-radius: 14px; background: var(--border-soft); border: 1px solid var(--border); }
    .m1-channel-detail__title { font-size: 15px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .m1-channel-detail__desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
    .m1-channel-detail__tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ============================================================
       M2 · 方向生成器
       ============================================================ */
    .m2-grid {
      display: grid; grid-template-columns: 340px 1fr; gap: 20px;
    }
    @media (max-width: 900px) { .m2-grid { grid-template-columns: 1fr; } }

    .m2-list { display: flex; flex-direction: column; gap: 10px; }
    .dir-item {
      text-align: left; padding: 16px; border-radius: var(--radius);
      background: var(--bg-soft); border: 1px solid var(--border);
      transition: all 0.15s ease;
    }
    .dir-item:hover { border-color: var(--ring); transform: translateX(2px); }
    .dir-item.is-active {
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--indigo) 10%, transparent),
        color-mix(in srgb, var(--fuchsia) 8%, transparent));
      border-color: var(--ring);
      box-shadow: 0 4px 16px -4px rgba(99, 102, 241, 0.25);
    }
    .dir-item__score {
      font-size: 11px; color: var(--muted); font-weight: 700;
      letter-spacing: 0.05em;
    }
    .dir-item__title { font-size: 14px; font-weight: 700; margin: 6px 0 4px; line-height: 1.35; }
    .dir-item__cat { font-size: 12px; color: var(--muted); }

    .m2-detail { position: relative; }
    .dir-detail__head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 18px;
    }
    .dir-detail__title { font-size: 22px; font-weight: 800; margin: 0; line-height: 1.25; }
    .dir-detail__overview { color: var(--muted); margin: 8px 0 0; font-size: 14px; }
    .dir-detail__actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }

    .dir-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .dir-section:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
    .dir-section__title {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); font-weight: 700; margin: 0 0 12px;
    }

    .evidence-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
    .evidence-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; background: var(--border-soft);
      border-radius: 10px; font-size: 13px;
    }
    .evidence-item::before { content: "📊"; flex-shrink: 0; }

    .evidence-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;
    }
    .evidence-card {
      padding: 14px 16px; border-radius: 12px;
      background: var(--bg-soft); border: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 12px;
      transition: all 0.2s;
    }
    .evidence-card:hover { border-color: var(--ring); transform: translateY(-2px); }
    .evidence-card__icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(217,70,239,0.15));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .evidence-card__text {
      font-size: 13px; line-height: 1.6; color: var(--fg);
    }
    .related-trend:hover {
      border-color: var(--ring) !important;
      transform: translateX(4px);
    }

    .feasibility-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .feasibility-item {
      padding: 14px 16px; border-radius: 12px;
      background: var(--bg-soft); border: 1px solid var(--border);
    }
    .feasibility-item__label {
      font-size: 12px; color: var(--muted); font-weight: 600;
      letter-spacing: 0.04em; margin-bottom: 6px;
    }
    .feasibility-item__value {
      font-size: 14px; font-weight: 700; margin-bottom: 8px;
    }
    .feasibility-item__bar {
      height: 6px; background: var(--border); border-radius: 999px; overflow: hidden;
    }
    .feasibility-item__fill {
      height: 100%; border-radius: 999px;
      transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .pain-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
    .pain-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 13px; color: var(--fg);
    }
    .pain-item::before { content: "⚠"; color: var(--rose); font-size: 12px; margin-top: 2px; flex-shrink: 0; }

    .idea-grid { display: grid; gap: 12px; }
    .idea-card {
      padding: 16px; border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--bg-soft); cursor: pointer; transition: all 0.15s ease;
      text-align: left;
    }
    .idea-card:hover { border-color: var(--ring); transform: translateY(-1px); }
    .idea-card.is-selected {
      border-color: var(--ring);
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--indigo) 10%, var(--bg-soft)),
        color-mix(in srgb, var(--fuchsia) 6%, var(--bg-soft)));
      box-shadow: 0 8px 24px -8px rgba(99, 102, 241, 0.3);
    }
    .idea-card__head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .idea-card__name { font-size: 15px; font-weight: 700; }
    .idea-card__tagline { color: var(--indigo); font-size: 12px; font-weight: 600; margin-top: 4px; }
    .idea-card__body { color: var(--muted); font-size: 13px; margin-top: 10px; line-height: 1.55; }
    .idea-card__meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }

    /* ============================================================
       M3 · PRD Studio
       ============================================================ */
    .m3-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 900px) { .m3-layout { grid-template-columns: 1fr; } }

    .m3-editor, .m3-preview {
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex; flex-direction: column;
      max-height: calc(100vh - 200px); min-height: 600px;
    }
    .m3-pane-head {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .m3-pane-title { font-weight: 700; font-size: 14px; margin: 0; }
    .m3-pane-body { flex: 1; overflow-y: auto; padding: 20px; }

    .field-group { margin-bottom: 18px; }
    .field-group:last-child { margin-bottom: 0; }
    .field-label {
      display: block; font-size: 12px; font-weight: 700;
      color: var(--muted); margin-bottom: 6px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .field-input, .field-textarea {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      font-size: 14px; outline: none; transition: border-color 0.15s;
      font-family: inherit;
    }
    .field-input:focus, .field-textarea:focus { border-color: var(--ring); }
    .field-textarea { resize: vertical; min-height: 70px; line-height: 1.6; }

    .list-editor { display: flex; flex-direction: column; gap: 8px; }
    .list-editor__item { display: flex; gap: 8px; align-items: flex-start; }
    .list-editor__item .field-input { flex: 1; }
    .list-editor__remove {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--rose); font-size: 16px; flex-shrink: 0;
      transition: all 0.15s ease;
    }
    .list-editor__remove:hover { background: color-mix(in srgb, var(--rose) 10%, transparent); border-color: var(--rose); }

    .section-editor {
      padding: 14px; border-radius: 12px; background: var(--border-soft);
      margin-bottom: 10px;
    }
    .section-editor__head {

    .h-creative {

    // S4 · 工具函数: 从 ProductDirection + Idea → PRD（M2→M3 桥接器）
    function buildPRD(direction, ideaIndex) {
      if (ideaIndex === undefined || ideaIndex === null) ideaIndex = 0;
      const idea = direction.ideas[ideaIndex] || direction.ideas[0];

      return {
        productName: idea.name,
        tagline: idea.tagline,
        hero: idea.name + " · " + idea.tagline,
        subhero: "面向 " + direction.userPersona + "，" + idea.value,
        painPoints: direction.painPoints.slice(0, 4),
        features: [
          { title: "一键生成", desc: "通过自然语言输入快速创建高可用初始版本，节省从零搭建的成本。" },
          { title: "可定制模板", desc: "内置行业模板，支持团队根据品牌与场景自定义视觉与文案。" },

    // S5 · 工具函数: 文本转义
    function escapeHTML(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

  <!-- ============================================================
       M0 · 应用外壳 · 路由 & 主题切换 & Toast

  <script>
    const M0 = (function () {
      const ROUTES = {
        home: { title: "首页", render: renderHome },
        trends: { title: "趋势", render: renderTrends },
        directions: { title: "方向", render: renderDirections },
        prd: { title: "PRD", render: renderPRD },
        deploy: { title: "发布", render: renderDeploy }

      // 当前状态（供模块间通信）
      // 从 localStorage 恢复状态（进度持久化）
      var savedState = null;
      try {
        var raw = localStorage.getItem("if-state");
        if (raw) savedState = JSON.parse(raw);
      } catch (e) {}

      const state = Object.assign({
        currentRoute: "home",
        selectedDirectionId: null,
        selectedIdeaIndex: 0,
        currentPRD: null,
        fromChannel: null,
        fromTrendId: null,
        // 进度追踪 - 用于完成度展示
        progress: {
          trendsViewed: false,
          channelSelected: false,
          directionsViewed: false,
          ideaSelected: false,
          prdEdited: false,
          landingExported: false
        },
        // 生成历史 - 展示创新性
        generationHistory: []
      }, savedState || {});

      // 保存状态到 localStorage
      function saveState() {
        try {
          var toSave = {
            selectedDirectionId: state.selectedDirectionId,
            selectedIdeaIndex: state.selectedIdeaIndex,
            fromChannel: state.fromChannel,
            progress: state.progress,
            generationHistory: state.generationHistory.slice(0, 20)
          };
          localStorage.setItem("if-state", JSON.stringify(toSave));
        } catch (e) {}
      }

      // 主题
      function initTheme() {
        const stored = localStorage.getItem("if-theme");
        if (stored) {
          document.documentElement.classList.toggle("dark", stored === "dark");
        }
        updateThemeIcon();
        const btn = document.getElementById("theme-toggle");
        if (btn) btn.addEventListener("click", toggleTheme);
      }

      function toggleTheme() {
        const isDark = document.documentElement.classList.toggle("dark");
        localStorage.setItem("if-theme", isDark ? "dark" : "light");
        updateThemeIcon();
        // 若当前有预览的 iframe，其主题为白色固定（落地页），无需更新
      }

      function updateThemeIcon() {
        const icon = document.getElementById("theme-icon");
        if (icon) {
          icon.textContent = document.documentElement.classList.contains("dark") ? "☀" : "🌙";
        }
      }

      // 导航
      function initNav() {
        document.querySelectorAll("[data-nav]").forEach(function (el) {
          el.addEventListener("click", function () {
            const target = el.getAttribute("data-nav");
            navigate(target);
          });
        });
      }

      function updateNavActive(route) {
        document.querySelectorAll(".nav-link").forEach(function (el) {
          el.classList.toggle("is-active", el.getAttribute("data-nav") === route);
        });
      }

      function navigate(route, params) {
        if (!ROUTES[route]) route = "home";
        state.currentRoute = route;
        // 支持模块间传参（如 M1→M2 传 channelId、trendId）
        if (params) {
          if (params.channelId !== undefined) {
            state.fromChannel = params.channelId;
            state.progress.channelSelected = true;
          }
          if (params.trendId !== undefined) state.fromTrendId = params.trendId;
          if (params.directionId !== undefined) state.selectedDirectionId = params.directionId;
          if (params.ideaIndex !== undefined) {
            state.selectedIdeaIndex = params.ideaIndex;
            state.progress.ideaSelected = true;
          }
          if (params.prd !== undefined) {
            state.currentPRD = params.prd;
            state.progress.directionsViewed = true;
          }
        }
        // 路由级别的进度追踪
        if (route === "trends") state.progress.trendsViewed = true;
        if (route === "directions") state.progress.directionsViewed = true;
        if (route === "prd") state.progress.prdEdited = true;
        saveState();
        updateNavActive(route);
        const app = document.getElementById("app");
        if (app) {
          app.innerHTML = "";
          ROUTES[route].render(app);
          // 首页渲染完后刷新进度条
          if (route === "home") refreshHomeProgress();
        }
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // 刷新首页进度条 + 作品集
      function refreshHomeProgress() {
        var p = state.progress;
        var steps = [
          { key: "trends", done: p.trendsViewed },
          { key: "channel", done: p.channelSelected },
          { key: "directions", done: p.directionsViewed },
          { key: "idea", done: p.ideaSelected },
          { key: "prd", done: p.prdEdited },
          { key: "export", done: p.landingExported }
        ];
        steps.forEach(function (s) {
          var el = document.querySelector('.h-step[data-step="' + s.key + '"]');
          if (el) el.classList.toggle("is-done", s.done);
        });

        // 作品集
        var portfolio = getPortfolio();
        var countEl = document.getElementById("h-creative-count");
        if (countEl) countEl.textContent = portfolio.length + " 个作品";

        var portEl = document.getElementById("h-portfolio");
        if (portEl) {
          if (portfolio.length === 0) {
            portEl.innerHTML =
              '<div class="h-portfolio__empty">' +
              '<div class="h-portfolio__empty-icon">📦</div>' +
              '<div style="font-size:14px;font-weight:600;margin-bottom:4px">还没有创意作品</div>' +
              '<div style="font-size:12px;color:var(--muted)">导出第一个落地页，它就会出现在这里</div>' +
              '</div>';
          } else {
            portEl.innerHTML =
              '<div class="h-portfolio__list">' +
              portfolio.slice(0, 6).map(function (item) {
                var ch = SHARED.CHANNELS.find(function (c) { return c.id === item.channelId; });
                var chColor = ch ? ch.color : "#8b5cf6";
                var chName = ch ? ch.name : item.channelName || "科技";
                var timeStr = formatTime(item.createdAt);
                return '<div class="portfolio-card" onclick="M0.navigate(\'directions\', {channelId: \'' + item.channelId + '\'})">' +
                  '<div class="portfolio-card__head">' +
                  '<div class="portfolio-card__badge" style="background:' + chColor + '15;color:' + chColor + '">' + chName + '</div>' +
                  '<div class="portfolio-card__time">' + timeStr + '</div>' +
                  '</div>' +
                  '<div class="portfolio-card__name">' + escapeHTML(item.productName) + '</div>' +
                  '<div class="portfolio-card__tagline">' + escapeHTML(item.tagline || "") + '</div>' +
                  '<div class="portfolio-card__cta">继续探索 →</div>' +
                  '</div>';
              }).join("") +
              '</div>';
          }
        }
      }

      function formatTime(isoStr) {
        try {
          var d = new Date(isoStr);
          var now = new Date();
          var diff = now - d;
          var min = Math.floor(diff / 60000);
          var hour = Math.floor(diff / 3600000);
          var day = Math.floor(diff / 86400000);
          if (min < 1) return "刚刚";
          if (min < 60) return min + " 分钟前";
          if (hour < 24) return hour + " 小时前";
          if (day < 7) return day + " 天前";
          return d.getMonth() + 1 + "/" + d.getDate();
        } catch (e) { return ""; }
      }

      // 创意作品集
      function getPortfolio() {
        try {
          var raw = localStorage.getItem("if-portfolio");
          return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
      }

      function saveToPortfolio(prd, channelId) {
        if (!prd || !prd.productName) return;
        var portfolio = getPortfolio();
        // 去重：同名产品更新
        var idx = portfolio.findIndex(function (p) { return p.productName === prd.productName; });
        var record = {
          id: Date.now(),
          productName: prd.productName,
          tagline: prd.tagline,
          channelId: channelId || state.fromChannel || "tech",
          channelName: function () {
            var ch = SHARED.CHANNELS.find(function (c) { return c.id === (channelId || state.fromChannel); });
            return ch ? ch.name : "科技";
          }(),
          createdAt: new Date().toISOString(),
          prdSnapshot: {
            productName: prd.productName,
            tagline: prd.tagline,
            description: prd.description,
            features: prd.features,
            targetAudience: prd.targetAudience,
            problems: prd.problems
          }
        };
        if (idx >= 0) {
          portfolio[idx] = Object.assign(portfolio[idx], record, { id: portfolio[idx].id });
        } else {
          portfolio.unshift(record);
        }
        // 最多保存 20 个
        portfolio = portfolio.slice(0, 20);
        try {
          localStorage.setItem("if-portfolio", JSON.stringify(portfolio));
        } catch (e) {}
        return portfolio;
      }

      // Toast
      function toast(message, duration) {
        console.log('[DEBUG] toast called with:', message);
        const el = document.getElementById("toast");
        console.log('[DEBUG] toast element:', el);
        if (!el) {
          alert(message); // 降级
          return;
        }
        el.textContent = message;
        el.classList.add("is-visible");
        console.log('[DEBUG] toast should be visible now');
        clearTimeout(el._timer);
        el._timer = setTimeout(function () {
          el.classList.remove("is-visible");
        }, duration || 2200);
      }

      return {
        state: state,
        init: function () {
          initTheme();
          initNav();
          navigate("home");
        },
        navigate: navigate,
        toast: toast,
        saveState: saveState,
        saveToPortfolio: saveToPortfolio,
        getPortfolio: getPortfolio,
        refreshHomeProgress: refreshHomeProgress
      };
    })();

    // ============================================================
    // M1 · 趋势大脑（频道版）
    // ============================================================
    function renderTrends(app) {
      // 核心原则：每次都用 M0.state 实时读取，不用闭包捕获
      function getCurrentChannel() {
        return M0.state.fromChannel || SHARED.CHANNELS[0].id;
      }
      function setCurrentChannel(chId) {
        M0.state.fromChannel = chId;
        M0.state.progress.channelSelected = true;
        M0.saveState();
      }
      let currentQuery = "";

      function getChannel(id) {
        return SHARED.CHANNELS.find(function (c) { return c.id === id; }) || SHARED.CHANNELS[0];
      }

      function getTrends(channelId) {
        const trends = SHARED.TRENDS_BY_CHANNEL[channelId] || [];
        if (!currentQuery) return trends;
        const q = currentQuery.toLowerCase();
        return trends.filter(function (t) {
          return !q || t.title.toLowerCase().indexOf(q) !== -1 ||
            t.summary.toLowerCase().indexOf(q) !== -1 ||
            t.tags.some(function (tag) { return tag.toLowerCase().indexOf(q) !== -1; });
        });
      }

      function getAllTrends() {
        var all = [];
        Object.keys(SHARED.TRENDS_BY_CHANNEL).forEach(function (ch) {
          all = all.concat(SHARED.TRENDS_BY_CHANNEL[ch]);
        });
        return all;
      }

      function getStats() {
        var all = getAllTrends();
        var top = all.slice().sort(function (a, b) { return b.growth - a.growth; })[0];
        return {
          total: all.length,
          channels: SHARED.CHANNELS.length,
          avgGrowth: Math.round(all.reduce(function (s, t) { return s + t.growth; }, 0) / all.length),
          topGrowth: top ? top.growth : 0
        };
      }

      function heatColor(heat, base) {
        var colors = {
          10: ["#ef4444", "#fca5a5"],
          9: ["#f97316", "#fdba74"],
          8: ["#eab308", "#fde047"],
          7: ["#22c55e", "#86efac"],
          6: ["#3b82f6", "#93c5fd"],
          5: ["#8b5cf6", "#c4b5fd"]
        };
        var c = colors[heat] || colors[5];
        return "background:linear-gradient(135deg," + c[0] + "," + c[1] + ")";
      }

      function growthColor(growth) {
        if (growth >= 120) return "color:#fff;background:#ef4444";
        if (growth >= 80) return "color:#fff;background:#f97316";
        if (growth >= 50) return "color:#fff;background:#22c55e";
        return "color:#fff;background:#3b82f6";
      }

      function renderStatCard(icon, val, label, color) {
        return '<div class="m1-stat">' +
          '<div class="m1-stat__icon" style="background:' + color + '1a;color:' + color + '">' + icon + '</div>' +
          '<div><div class="m1-stat__val">' + val + '</div><div class="m1-stat__lbl">' + label + '</div></div>' +
          '</div>';
      }

      function renderChannelTab(ch) {
        var trends = SHARED.TRENDS_BY_CHANNEL[ch.id] || [];
        var isActive = ch.id === getCurrentChannel();
        return '<div class="m1-channel ' + (isActive ? 'is-active' : '') + '" ' +
          'data-channel="' + ch.id + '" ' +
          'style="' + (isActive ? 'border-color:' + ch.color : '') + '">' +
          '<div class="m1-channel__icon" style="background:' + ch.color + '1a;color:' + ch.color + '">' + ch.icon + '</div>' +
          '<div class="m1-channel__body">' +
          '<div class="m1-channel__name" style="' + (isActive ? 'color:' + ch.color : '') + '">' + ch.name + '</div>' +
          '<div class="m1-channel__count">' + trends.length + ' 条趋势</div>' +
          '</div>' +
          '</div>';
      }

      function renderTrendCard(item, channel) {
        var gc = growthColor(item.growth);
        var hc = heatColor(item.heat, channel.color);
        return '<div class="trend-card" data-trend-id="' + item.id + '">' +
          '<div class="trend-card__head">' +
          '<div class="trend-card__icon" style="' + hc + '">' + channel.icon + '</div>' +
          '<div class="trend-card__title-wrap">' +
          '<div class="trend-card__title">' + escapeHTML(item.title) + '</div>' +
          '<div class="trend-card__hot">🔥 热度 ' + item.heat + '/10 · ' + escapeHTML(item.updatedAt) + ' 更新</div>' +
          '</div>' +
          '<div class="trend-card__growth" style="' + gc + '">+' + item.growth + '%</div>' +
          '</div>' +
          '<p class="trend-card__summary">' + escapeHTML(item.summary) + '</p>' +
          '<div class="trend-card__footer">' +
          '<div class="trend-card__meta">' +
          item.tags.map(function (tag) {
            return '<span class="chip" style="background:' + channel.color + '14;color:' + channel.color + ';border-color:' + channel.color + '30">' + escapeHTML(tag) + '</span>';
          }).join("") +
          '</div>' +
          '<button class="trend-card__cta" data-trend-nav="' + item.id + '" style="background:' + channel.color + ';color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">查看方向 →</button>' +
          '</div>' +
          '</div>';
      }

      function renderInsights(channel) {
        var trends = SHARED.TRENDS_BY_CHANNEL[channel.id] || [];
        var top = trends.slice().sort(function (a, b) { return b.score - a.score; }).slice(0, 3);
        if (!top.length) return "";

        var insights = top.map(function (t) {
          var action = "";
          if (channel.id === "tech") action = "建议关注开源模型可替换性与端侧部署方案。";
          else if (channel.id === "auto") action = "关注供应链国产化率与成本下探节奏。";
          else if (channel.id === "health") action = "关注 FDA/NMPA 审批进度与医保覆盖政策。";
          else if (channel.id === "game") action = "建议从 mod 社区切入，快速验证 AI NPC 玩法。";
          else if (channel.id === "edu") action = "可从教师工具链切入，降低 AI 落地阻力。";
          else if (channel.id === "gov") action = "关注试点城市清单与采购目录入围门槛。";
          else if (channel.id === "social") action = "关注政策风险与细分人群付费能力验证。";
          else if (channel.id === "digital") action = "建议从配件生态切入，避免与手机巨头正面竞争。";
          else action = "建议结合用户调研确认需求真伪与付费意愿。";

          return '<li class="m1-insight__item" style="border-color:' + channel.color + '">' +
            '<strong style="color:' + channel.color + '">' + escapeHTML(t.title) + '</strong>' +
            '<span>' + escapeHTML(action) + '</span>' +
            '<small> · 潜力 ' + t.score + ' | +' + t.growth + '%</small>' +
            '</li>';
        });

        return '<ul class="m1-insight__list">' + insights.join("") + '</ul>';
      }

      function renderGrowthBars(channel) {
        var trends = (SHARED.TRENDS_BY_CHANNEL[channel.id] || []).slice().sort(function (a, b) { return b.growth - a.growth; });
        var max = trends.length ? trends[0].growth : 1;
        return trends.map(function (t) {
          var pct = Math.round((t.growth / max) * 100);
          return '<div class="m1-growth-item">' +
            '<div class="m1-growth-label">' +
            '<span>' + escapeHTML(t.title.substring(0, 14)) + (t.title.length > 14 ? '…' : '') + '</span>' +
            '<span style="font-weight:700;color:' + channel.color + '">+' + t.growth + '%</span>' +
            '</div>' +
            '<div class="m1-growth-bar">' +
            '<div class="m1-growth-fill" style="width:' + pct + '%;background:linear-gradient(90deg,' + channel.color + ',' + channel.color + '88)"></div>' +
            '</div>' +
            '</div>';
        }).join("");
      }

      function refresh() {
        var chId = getCurrentChannel();
        var channel = getChannel(chId);
        var trends = getTrends(chId);
        var stats = getStats();

        // 趋势列表
        var gridEl = document.getElementById("m1-trends");
        if (gridEl) {
          if (trends.length === 0) {
            gridEl.innerHTML = '<div class="m1-empty">🔍 没有匹配的趋势，试试其他关键词。</div>';
          } else {
            gridEl.innerHTML = trends.map(function (t) { return renderTrendCard(t, channel); }).join("");
          }
        }

        // 右侧洞察面板
        var insightEl = document.getElementById("m1-insight");
        if (insightEl) {
          insightEl.innerHTML =
            '<div class="m1-insight__head">' +
            '<span class="m1-insight__icon">' + channel.icon + '</span>' +
            '<div>' +
            '<div class="m1-insight__title" style="color:' + channel.color + '">' + channel.name + ' · 智能洞察</div>' +
            '<div class="m1-insight__subtitle">基于 ' + trends.length + ' 条趋势的分析建议</div>' +
            '</div>' +
            '</div>' +
            renderInsights(channel) +
            '<div class="m1-growth-wrap">' + renderGrowthBars(channel) + '</div>' +
            '<button class="btn btn--primary" style="width:100%;margin-top:14px" onclick="M0.navigate(\'directions\', {channelId:\'' + channel.id + '\'})">💡 从 ' + channel.name + ' 生成方向 →</button>';
        }

        // 频道 tab 样式同步
        document.querySelectorAll(".m1-channel").forEach(function (el) {
          var elChId = el.getAttribute("data-channel");
          var ch = getChannel(elChId);
          var isActive = elChId === chId;
          el.classList.toggle("is-active", isActive);
          if (isActive) {
            el.style.borderColor = ch.color;
            el.querySelector(".m1-channel__name").style.color = ch.color;
          } else {
            el.style.borderColor = "";
            el.querySelector(".m1-channel__name").style.color = "";
          }
        });
      }

      // 渲染页面
      var stats = getStats();
      app.innerHTML =
        '<div class="page">' +
        '<div class="page__header">' +
        '<span class="page__eyebrow">模块 1 · M1</span>' +
        '<h1 class="page__title">趋势大脑</h1>' +
        '<p class="page__subtitle">覆盖科技、汽车、社会、健康、数码、政务、游戏、教育八大频道，实时追踪趋势信号，智能分析机会方向。</p>' +
        '</div>' +

        // 统计概览
        '<div class="m1-stats">' +
        renderStatCard("📊", stats.total, "条趋势数据", "#6366f1") +
        renderStatCard("🏷", stats.channels, "个分析频道", "#10b981") +
        renderStatChip("🔥", stats.topGrowth + "%", "最高增长率", "#f43f5e") +
        renderStatChip("📈", stats.avgGrowth + "%", "平均增速", "#f59e0b") +
        '</div>' +

        // 频道选择
        '<div class="m1-channels" id="m1-channels">' +
        SHARED.CHANNELS.map(renderChannelTab).join("") +
        '</div>' +

        // 主内容区
        '<div class="m1-layout">' +
        // 左侧趋势
        '<div class="m1-main">' +
        '<div class="m1-toolbar">' +
        '<div class="m1-search">' +
        '<input type="text" id="m1-search-input" placeholder="搜索趋势关键词…" aria-label="搜索趋势" />' +
        '</div>' +
        '<span class="text-sm muted" id="m1-count"></span>' +
        '</div>' +
        '<div class="m1-trends" id="m1-trends"></div>' +
        '</div>' +
        // 右侧洞察
        '<aside><div class="m1-insight" id="m1-insight"></div></aside>' +
        '</div>' +
        '</div>';

      // 事件委托：频道点击 + 趋势卡片操作
      app.addEventListener("click", function (e) {
        // 频道切换
        var channelEl = e.target.closest(".m1-channel");
        if (channelEl) {
          var chId = channelEl.getAttribute("data-channel");
          if (chId) {
            setCurrentChannel(chId);
            currentQuery = "";
            var si = document.getElementById("m1-search-input");
            if (si) si.value = "";
            refresh();
          }
          return;
        }
        // 查看相关方向
        var navBtn = e.target.closest('[data-trend-nav]');
        if (navBtn) {
          e.stopPropagation();
          var trendId = navBtn.getAttribute("data-trend-nav");
          var chId2 = getCurrentChannel();
          // 跳转到方向页面，带上趋势ID用于筛选
          M0.navigate("directions", { channelId: chId2, trendId: trendId });
          return;
        }
        // 趋势卡片点击 - 展开更多信息或跳转
        var trendCard = e.target.closest(".trend-card");
        if (trendCard) {
          var trendId2 = trendCard.getAttribute("data-trend-id");
          var chId3 = getCurrentChannel();
          M0.navigate("directions", { channelId: chId3, trendId: trendId2 });
          return;
        }
      });

      // 搜索
      var searchInput = document.getElementById("m1-search-input");
      if (searchInput) {
        searchInput.addEventListener("input", function () {
          currentQuery = searchInput.value.trim();
          var countEl = document.getElementById("m1-count");
          if (countEl) {
            var n = getTrends(getCurrentChannel()).length;
            countEl.textContent = n + " 条结果";
          }
          refresh();
        });
      }

      refresh();
    }

    // 辅助：统计卡
    function renderStatChip(icon, val, label, color) {
      return '<div class="m1-stat">' +
        '<div class="m1-stat__icon" style="background:' + color + '1a;color:' + color + '">' + icon + '</div>' +
        '<div><div class="m1-stat__val" style="color:' + color + '">' + val + '</div><div class="m1-stat__lbl">' + label + '</div></div>' +
        '</div>';
    }

    // ============================================================
    // M2 · 方向生成器
    // ============================================================
    function renderDirections(app) {
      // 核心原则：每次都用 M0.state 实时读取，不用闭包捕获
      function getFromChannel() {
        return M0.state.fromChannel ? (SHARED.CHANNELS.find(function (c) { return c.id === M0.state.fromChannel; }) || null) : null;
      }

      function getFromTrend() {
        var tid = M0.state.fromTrendId;
        if (!tid) return null;
        var chId = M0.state.fromChannel;
        if (!chId) return null;
        var trends = SHARED.TRENDS_BY_CHANNEL[chId] || [];
        return trends.find(function (t) { return t.id === tid; }) || null;
      }

      // 计算方向与趋势的关联度（通过标签匹配）
      function getTrendRelatedDirs(trend) {
        if (!trend) return [];
        var trendTags = (trend.tags || []).map(function (t) { return t.toLowerCase(); });
        var chId = M0.state.fromChannel;
        var dirs = chId ? SHARED.DIRECTIONS.filter(function (d) { return d.channelId === chId; }) : SHARED.DIRECTIONS;
        return dirs.map(function (dir) {
          var score = 0;
          var dirText = (dir.headline + dir.overview + dir.category + (dir.dataEvidence || []).join(" ")).toLowerCase();
          trendTags.forEach(function (tag) {
            if (dirText.indexOf(tag) !== -1) score += 2;
          });
          // 标题关键词匹配
          var titleWords = trend.title.toLowerCase().split(/\s+/);
          titleWords.forEach(function (w) {
            if (w.length > 1 && dirText.indexOf(w) !== -1) score += 1;
          });
          return { dir: dir, score: score };
        }).sort(function (a, b) { return b.score - a.score; }).filter(function (x) { return x.score > 0; }).map(function (x) { return x.dir; });
      }

      // 初始化：从 M1 跳转过来时，自动选中该频道的第一个方向
      var ch = getFromChannel();
      if (ch) {
        var matched = SHARED.DIRECTIONS.filter(function (d) { return d.channelId === ch.id; });
        if (matched.length > 0 && !M0.state.selectedDirectionId) {
          M0.state.selectedDirectionId = matched[0].id;
          M0.state.selectedIdeaIndex = 0;
        }
      }

      // 如果从趋势跳转过来，优先选最相关的方向
      var fromTrend = getFromTrend();
      if (fromTrend) {
        var related = getTrendRelatedDirs(fromTrend);
        if (related.length > 0) {
          M0.state.selectedDirectionId = related[0].id;
          M0.state.selectedIdeaIndex = 0;
        }
      }

      if (!M0.state.selectedDirectionId) {
        M0.state.selectedDirectionId = SHARED.DIRECTIONS[0].id;
        M0.state.selectedIdeaIndex = 0;
      }

      function currentDirection() {
        return SHARED.DIRECTIONS.find(function (d) { return d.id === M0.state.selectedDirectionId; }) || SHARED.DIRECTIONS[0];
      }

      // 智能生成可行性评估
      function getFeasibility(dir) {
        if (dir.feasibility) return dir.feasibility;
        var s = dir.score || 80;
        var techScore = Math.min(95, s + Math.floor(Math.random() * 10) - 5);
        var marketScore = Math.min(95, s + Math.floor(Math.random() * 10) - 2);
        var revenueScore = Math.min(90, s - 5 + Math.floor(Math.random() * 10));
        var timeScore = Math.min(90, s + Math.floor(Math.random() * 8) - 4);
        function lvl(sc) {
          if (sc >= 85) return "高";
          if (sc >= 70) return "中高";
          if (sc >= 55) return "中";
          return "低";
        }
        var suggestions = [
          "建议从 MVP 切入，用 IdeaForge 生成的落地页先收集 Waitlist 验证需求。",
          "可以先免费模式跑通 100 个种子用户，再考虑付费转化。",
          "这个方向适合 1–3 人的小团队起步，先做核心功能再逐步迭代。",
          "建议先做社区运营验证用户痛点，再投入开发。",
          "可以从垂直场景切入，避免和大厂正面竞争。"
        ];
        return {
          tech: "技术难度 · " + lvl(techScore),
          techScore: techScore,
          market: "市场机会 · " + lvl(marketScore),
          marketScore: marketScore,
          revenue: "变现潜力 · " + lvl(revenueScore),
          revenueScore: revenueScore,
          time: "验证周期 · " + (timeScore >= 75 ? "2–4 周" : "4–8 周"),
          timeScore: timeScore,
          suggestion: suggestions[Math.floor(Math.random() * suggestions.length)]
        };
      }

      function getChannelForDir(dir) {
        return SHARED.CHANNELS.find(function (c) { return c.id === dir.channelId; }) || null;
      }

      function refresh() {
        var st = M0.state;
        var fromCh = getFromChannel();
        var fromChId = fromCh ? fromCh.id : null;
        var fromTrend = getFromTrend();
        var relatedDirIds = [];
        if (fromTrend) {
          var rDirs = getTrendRelatedDirs(fromTrend);
          relatedDirIds = rDirs.map(function (d) { return d.id; });
        }
        var d = currentDirection();
        var ch = getChannelForDir(d);
        var chColor = ch ? ch.color : "#6366f1";
        var listEl = document.getElementById("m2-list");
        var detailEl = document.getElementById("m2-detail");

        if (listEl) {
          // 筛选方向
          var filteredDirs = SHARED.DIRECTIONS.filter(function (dir) {
            return !fromChId || dir.channelId === fromChId;
          });
          // 如果从趋势跳转，按关联度排序
          if (fromTrend && relatedDirIds.length > 0) {
            filteredDirs.sort(function (a, b) {
              var ai = relatedDirIds.indexOf(a.id);
              var bi = relatedDirIds.indexOf(b.id);
              if (ai === -1 && bi === -1) return b.score - a.score;
              if (ai === -1) return 1;
              if (bi === -1) return -1;
              return ai - bi;
            });
          }
          listEl.innerHTML = filteredDirs.map(function (dir) {
            var dirCh = getChannelForDir(dir);
            var isMatch = fromChId && dir.channelId === fromChId;
            var isRelated = relatedDirIds.indexOf(dir.id) !== -1;
            var isActive = dir.id === d.id;
            var extraStyle = "";
            var badge = "";
            if (isRelated && fromTrend) {
              extraStyle = 'border-left:3px solid ' + chColor + ';background:color-mix(in srgb,' + chColor + '8%,var(--bg-soft))';
              badge = '🔥 趋势关联';
            } else if (isMatch && dirCh) {
              extraStyle = 'border-left:3px solid ' + dirCh.color + ';background:color-mix(in srgb,' + dirCh.color + '6%,var(--bg-soft))';
              badge = '⭐ ' + (fromCh ? fromCh.name : '') + '推荐';
            }
            return '<button class="dir-item ' + (isActive ? 'is-active' : '') + '" ' +
              'data-dir-id="' + escapeHTML(dir.id) + '" ' +
              (extraStyle ? 'style="' + extraStyle + '"' : '') + '>' +
              '<div class="dir-item__score">' + dir.score + ' 分' +
              (badge ? ' · ' + badge : '') + '</div>' +

    // ============================================================

    function renderPRD(app) {
      if (!M0.state.currentPRD) {
        // 若用户直接进入 PRD 页，预填一个默认方向

        M0.state.selectedIdeaIndex = 0;
      }
      const prd = M0.state.currentPRD;

      function escapeAttr(v) { return escapeHTML(v); }

      function renderFeaturesEditor() {
        return prd.features.map(function (f, idx) {
          return '<div class="section-editor">' +
            '<div class="section-editor__head">' +
            '<span class="section-editor__title">功能 ' + (idx + 1) + '</span>' +
            '<button class="list-editor__remove" data-action="remove-feature" data-index="' + idx + '">✕</button>' +
            '</div>' +
            '<div class="section-editor__body">' +
            '<input class="field-input" data-field="features.' + idx + '.title" value="' + escapeAttr(f.title) + '" placeholder="标题" />' +
            '<textarea class="field-textarea" data-field="features.' + idx + '.desc" placeholder="描述…">' + escapeHTML(f.desc) + '</textarea>' +
            '</div>' +
            '</div>';
        }).join("") +
          '<button class="list-editor__add" data-action="add-feature">＋ 添加新功能</button>';
      }

      function renderScenariosEditor() {
        return prd.scenarios.map(function (s, idx) {
          return '<div class="section-editor">' +
            '<div class="section-editor__head">' +
            '<span class="section-editor__title">场景 ' + (idx + 1) + '</span>' +
            '<button class="list-editor__remove" data-action="remove-scenario" data-index="' + idx + '">✕</button>' +
            '</div>' +
            '<div class="section-editor__body">' +
            '<input class="field-input" data-field="scenarios.' + idx + '.title" value="' + escapeAttr(s.title) + '" placeholder="标题" />' +
            '<textarea class="field-textarea" data-field="scenarios.' + idx + '.desc" placeholder="描述…">' + escapeHTML(s.desc) + '</textarea>' +
            '</div>' +
            '</div>';
        }).join("") +
          '<button class="list-editor__add" data-action="add-scenario">＋ 添加新场景</button>';
      }

      function renderPainsEditor() {
        return prd.painPoints.map(function (p, idx) {
          return '<div class="list-editor__item">' +
            '<input class="field-input" data-field="painPoints.' + idx + '" value="' + escapeAttr(p) + '" placeholder="痛点描述…" />' +
            '<button class="list-editor__remove" data-action="remove-pain" data-index="' + idx + '">✕</button>' +
            '</div>';
        }).join("") +
          '<button class="list-editor__add" data-action="add-pain">＋ 添加新痛点</button>';
      }

      function renderKeywordsEditor() {
        return prd.seo.keywords.map(function (k, idx) {
          return '<div class="list-editor__item">' +
            '<input class="field-input" data-field="seo.keywords.' + idx + '" value="' + escapeAttr(k) + '" placeholder="关键词…" />' +
            '<button class="list-editor__remove" data-action="remove-keyword" data-index="' + idx + '">✕</button>' +
            '</div>';
        }).join("") +
          '<button class="list-editor__add" data-action="add-keyword">＋ 添加关键词</button>';
      }

      function refreshPreview() {
        const iframe = document.getElementById("m4-preview-frame");
        if (!iframe) return;
        const html = renderLandingHTML(prd);
        try {
          iframe.srcdoc = html;
        } catch (e) {
          // 兼容处理
          iframe.src = "data:text/html;charset=utf-8," + encodeURIComponent(html);
        }
      }

      // 字段写入器：支持 "a.b.c" 与数组索引
      function setFieldByPath(path, value) {
        const parts = path.split(".");
        let target = prd;
        for (let i = 0; i < parts.length - 1; i++) {
          const key = parts[i];
          // 处理数字索引（数组）
          if (!isNaN(parseInt(key, 10)) && Array.isArray(target)) {
            target = target[parseInt(key, 10)];
          } else {
            target = target[key];
          }
          if (target === undefined || target === null) return;
        }
        const lastKey = parts[parts.length - 1];
        if (!isNaN(parseInt(lastKey, 10)) && Array.isArray(target)) {
          target[parseInt(lastKey, 10)] = value;
        } else {
          target[lastKey] = value;
        }
      }

      function bindEditor(root) {
        // 输入字段实时更新
        root.addEventListener("input", function (e) {
          const target = e.target;
          if (!target || !target.getAttribute) return;
          const field = target.getAttribute("data-field");
          if (!field) return;
          setFieldByPath(field, target.value);
          refreshPreview();
        });

        // 添加/删除 按钮
        root.addEventListener("click", function (e) {
          const target = e.target;
          if (!target || !target.getAttribute) return;
          const action = target.getAttribute("data-action");
          if (!action) return;
          const idxAttr = target.getAttribute("data-index");
          const idx = idxAttr !== null ? parseInt(idxAttr, 10) : -1;

          if (action === "add-feature") {
            prd.features.push({ title: "新功能", desc: "简要描述该功能的价值。" });
          } else if (action === "remove-feature" && idx >= 0) {
            prd.features.splice(idx, 1);
          } else if (action === "add-scenario") {
            prd.scenarios.push({ title: "新场景", desc: "描述该场景下的使用方式。" });
          } else if (action === "remove-scenario" && idx >= 0) {
            prd.scenarios.splice(idx, 1);
          } else if (action === "add-pain") {
            prd.painPoints.push("新痛点");
          } else if (action === "remove-pain" && idx >= 0) {
            prd.painPoints.splice(idx, 1);
          } else if (action === "add-keyword") {
            prd.seo.keywords.push("新关键词");
          } else if (action === "remove-keyword" && idx >= 0) {
            prd.seo.keywords.splice(idx, 1);
          }
          // 重新渲染编辑器（保持简洁）
          renderEditorBody();
          refreshPreview();
        });

        // 顶部按钮
        const syncBtn = root.querySelector('[data-top-action="sync"]');
        if (syncBtn) syncBtn.addEventListener("click", function () { refreshPreview(); M0.toast("✓ 已同步预览"); });

        const copyBtn = root.querySelector('[data-top-action="copy"]');
        if (copyBtn) copyBtn.addEventListener("click", function () {
          var html = renderLandingHTML(prd);
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(html).then(function () {
              M0.toast("📋 已保存到作品集，HTML 已复制");
            }).catch(function () { fallbackCopy(); });
          } else {
            fallbackCopy();
          }
          function fallbackCopy() {
            var ta = document.createElement("textarea");
            ta.value = html; document.body.appendChild(ta); ta.select();
            try { document.execCommand("copy"); M0.toast("📋 已保存到作品集，HTML 已复制"); }
            catch (e) { M0.toast("❌ 复制失败，请手动下载"); }
            document.body.removeChild(ta);
          }
          M0.state.progress.landingExported = true;
          M0.saveToPortfolio(prd);
          M0.saveState();
        });

        const downloadBtn = root.querySelector('[data-top-action="download"]');
        if (downloadBtn) downloadBtn.addEventListener("click", downloadLandingHTML);

        const deployBtn = root.querySelector('[data-top-action="deploy"]');
        if (deployBtn) deployBtn.addEventListener("click", function () {
          M0.navigate("deploy");
        });
      }

      function downloadLandingHTML() {
        const html = renderLandingHTML(prd);
        const blobFinal = new Blob([html], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blobFinal);
        const a = document.createElement("a");
        a.href = url;
        const safeName = (prd.productName || "landing").toString().replace(/[\\/:*?"<>|]/g, "_");
        a.download = safeName + "-landing.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        M0.state.progress.landingExported = true;
        M0.saveToPortfolio(prd);
        M0.saveState();
        M0.toast("📥 已保存到作品集，HTML 下载完成");
      }

      function renderEditorBody() {
        const body = document.getElementById("m3-editor-body");
        if (!body) return;
        body.innerHTML =
          '<div class="field-group">' +
          '<label class="field-label">产品名称</label>' +
          '<input class="field-input" data-field="productName" value="' + escapeAttr(prd.productName) + '" />' +
          '</div>' +

          '<div class="field-group">' +
          '<label class="field-label">一句话 Tagline</label>' +
          '<input class="field-input" data-field="tagline" value="' + escapeAttr(prd.tagline) + '" />' +
          '</div>' +

          '<div class="field-group">' +
          '<label class="field-label">Hero 主标题</label>' +
          '<input class="field-input" data-field="hero" value="' + escapeAttr(prd.hero) + '" />' +
          '</div>' +

          '<div class="field-group">' +
          '<label class="field-label">副标题 / 价值主张</label>' +
          '<textarea class="field-textarea" data-field="subhero">' + escapeHTML(prd.subhero) + '</textarea>' +
          '</div>' +

          '<div class="two-col">' +
          '<div class="field-group">' +
          '<label class="field-label">🎯 目标人群</label>' +
          '<input class="field-input" data-field="targetAudience" value="' + escapeAttr(prd.targetAudience) + '" />' +
          '</div>' +
          '<div class="field-group">' +
          '<label class="field-label">💰 定价策略</label>' +
          '<input class="field-input" data-field="pricing" value="' + escapeAttr(prd.pricing) + '" />' +
          '</div>' +
          '</div>' +

          '<div class="field-group">' +
          '<label class="field-label">🚀 发布 Pitch（一句话介绍）</label>' +
          '<textarea class="field-textarea" data-field="launchPitch">' + escapeHTML(prd.launchPitch) + '</textarea>' +
          '</div>' +

          '<div class="field-group">' +
          '<label class="field-label">⚠ 核心痛点</label>' +
          '<div class="list-editor">' + renderPainsEditor() + '</div>' +
          '</div>' +

          '<div class="field-group">' +
          '<label class="field-label">✨ 核心功能</label>' +
          renderFeaturesEditor() +
          '</div>' +

          '<div class="field-group">' +
          '<label class="field-label">🎬 典型场景</label>' +
          renderScenariosEditor() +
          '</div>' +

          '<div class="field-group">' +
          '<label class="field-label">🔍 SEO 描述</label>' +
          '<textarea class="field-textarea" data-field="seo.meta">' + escapeHTML(prd.seo.meta) + '</textarea>' +
          '</div>' +

          '<div class="field-group">' +
          '<label class="field-label">🏷 SEO 关键词</label>' +
          '<div class="list-editor">' + renderKeywordsEditor() + '</div>' +
          '</div>';
      }

      app.innerHTML =
        '<div class="page">' +
        '<div class="page__header">' +
        '<span class="page__eyebrow">模块 3 + 4 · PRD → 落地页</span>' +
        '<h1 class="page__title">PRD Studio · 即编即预览</h1>' +
        '<p class="page__subtitle">左侧编辑 PRD 字段，右侧实时预览 <strong>M4 落地页工厂</strong> 的渲染效果。对文案满意后，一键下载独立 HTML 文件或进入发布助手。</p>' +
        '</div>' +

        '<div class="m3-layout">' +
        // 左：编辑器（M3）
        '<div class="m3-editor">' +
        '<div class="m3-pane-head">' +
        '<span class="m3-pane-title">📝 PRD 编辑器</span>' +
        '<div class="flex gap-2">' +
        '<button class="btn btn--sm" data-top-action="sync">⟳ 刷新预览</button>' +
        '</div>' +
        '</div>' +
        '<div class="m3-pane-body" id="m3-editor-body"></div>' +
        '</div>' +

        // 右：落地页预览（M4）
        '<div class="m3-preview">' +
        '<div class="m3-pane-head">' +
        '<span class="m3-pane-title">🌐 落地页预览（M4）</span>' +
        '<div class="flex gap-2">' +
        '<button class="btn btn--sm" data-top-action="copy" title="复制 HTML 到剪贴板">📋 复制</button>' +
        '<button class="btn btn--sm" data-top-action="download">📥 下载</button>' +
        '<button class="btn btn--sm btn--primary" data-top-action="deploy">🚀 发布</button>' +
        '</div>' +
        '</div>' +
        '<div class="m3-pane-body" style="padding:0;background:#f1f5f9">' +
        '<iframe id="m4-preview-frame" class="m4-preview-frame" style="width:100%;height:100%;border:none;background:#fff"></iframe>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>';

      renderEditorBody();
      bindEditor(app);
      // 初始渲染预览
      setTimeout(refreshPreview, 50);
    }

    // ============================================================
    // M5 · 发布助手
    // ============================================================
    function renderDeploy(app) {
      const prd = M0.state.currentPRD || { productName: "IdeaForge" };
      const productName = prd.productName || "NewProduct";
      const normalized = productName.toLowerCase().replace(/[^a-z0-9]/g, "");

      const domains = [
        normalized + ".com",
        normalized + ".app",
        normalized + ".io",
        normalized + ".ai",
        "get" + normalized + ".com",
        "try" + normalized + ".com",
        "use" + normalized + ".com",
        normalized + "hq.com",
        normalized + "lab.com",
        normalized + "app.com"
      ];

      app.innerHTML =
        '<div class="page">' +
        '<div class="page__header">' +
        '<span class="page__eyebrow">模块 5 · M5</span>' +
        '<h1 class="page__title">发布助手</h1>' +
        '<p class="page__subtitle">基于你的产品名称 <strong>「' + escapeHTML(productName) + '」</strong>，生成多组域名建议并附详细的部署指南。先去 <a href="#" onclick="M0.navigate(\'prd\');return false;" style="color:#6366f1;text-decoration:underline">PRD 页面</a> 下载落地页，再按下方指引部署。</p>' +
        '</div>' +

        '<div class="m5-grid">' +
        // 左：域名建议
        '<div class="card">' +
        '<h3 style="font-size:16px;font-weight:700;margin:0 0 4px">🌐 域名建议</h3>' +
        '<p class="muted" style="font-size:13px;margin:0 0 16px">点击复制，或在 GoDaddy / Namecheap / Cloudflare Registrar 搜索。</p>' +
        '<div class="domain-grid" id="domain-grid">' +
        domains.map(function (d) {
          return '<div class="domain-item">' +
            '<span class="domain-item__name">' + escapeHTML(d) + '</span>' +
            '<button class="domain-item__copy" data-domain="' + escapeHTML(d) + '">复制</button>' +
            '</div>';
        }).join("") +
        '</div>' +
        '</div>' +

        // 右：发布步骤
        '<div>' +
        '<div class="deploy-step">' +
        '<div class="deploy-step__num">1</div>' +
        '<div style="flex:1">' +
        '<div class="deploy-step__title">下载你的落地页</div>' +
        '<div class="deploy-step__desc">先进入 <a href="#" onclick="M0.navigate(\'prd\');return false;" style="color:#6366f1;font-weight:600">PRD 页面</a>，编辑满意后点击右上角「📥 下载 HTML」获取独立 HTML 文件（约 20KB）。</div>' +
        '</div>' +
        '</div>' +

        '<div class="deploy-step">' +
        '<div class="deploy-step__num">2</div>' +
        '<div style="flex:1">' +
        '<div class="deploy-step__title">一键部署到 Vercel</div>' +
        '<div class="deploy-step__desc">' +
        '<strong>最快方式（推荐）：</strong> <br />' +
        '① 访问 <a href="https://vercel.com" target="_blank" rel="noopener" style="color:#6366f1">vercel.com</a>，用 GitHub 登录<br />' +
        '② 点击「Add New → Project」，将 HTML 文件放入新项目根目录（命名为 index.html）<br />' +
        '③ 点击「Deploy」，60 秒内获得 ' + escapeHTML(normalized) + '.vercel.app 域名<br />' +
        '④ 在 Settings → Domains 中绑定你购买的主域名' +
        '</div>' +
        '</div>' +

        '<div class="deploy-step">' +
        '<div class="deploy-step__num">3</div>' +
        '<div style="flex:1">' +
        '<div class="deploy-step__title">备选方案</div>' +
        '<div class="deploy-step__desc">' +
        '<strong>Netlify</strong>：直接将 HTML 文件拖拽到 <a href="https://app.netlify.com/drop" target="_blank" rel="noopener" style="color:#6366f1">app.netlify.com/drop</a>，无需注册即可获得临时链接。<br />' +
        '<strong>GitHub Pages</strong>：创建公开仓库，上传 index.html，在 Settings → Pages 启用即可获得 yourname.github.io/' + escapeHTML(normalized) + ' 链接。<br />' +
        '<strong>Cloudflare Pages</strong>：与 Cloudflare CDN 集成，全球加速 + 免费 SSL。' +
        '</div>' +
        '</div>' +

        '<div class="deploy-step">' +
        '<div class="deploy-step__num">4</div>' +
        '<div style="flex:1">' +
        '<div class="deploy-step__title">上线前检查清单</div>' +
        '<div class="deploy-checklist" id="deploy-checklist">' +
        '<label class="check-item"><input type="checkbox" class="check-input" /><span>SEO title / description 已自定义</span></label>' +
        '<label class="check-item"><input type="checkbox" class="check-input" /><span>Waitlist 邮箱收集已接入</span></label>' +
        '<label class="check-item"><input type="checkbox" class="check-input" /><span>主域名已绑定并开启 HTTPS</span></label>' +
        '<label class="check-item"><input type="checkbox" class="check-input" /><span>手机端与桌面端测试通过</span></label>' +
        '<label class="check-item"><input type="checkbox" class="check-input" /><span>发布推文 / HN 文案准备好</span></label>' +
        '<label class="check-item"><input type="checkbox" class="check-input" /><span>Favicon 与 OG 图已替换</span></label>' +
        '</div>' +
        '</div>' +

        '<div class="deploy-step" style="background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(217,70,239,0.06));border-color:#6366f1">' +
        '<div class="deploy-step__num" style="background:#fff;color:#6366f1">🎉</div>' +
        '<div style="flex:1">' +
        '<div class="deploy-step__title">准备好让世界看到它了吗？</div>' +
        '<div class="deploy-step__desc">从一行代码到上线只需要几分钟。祝你好运，独立 Founder！</div>' +
        '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">' +
        '<button class="btn btn--primary" onclick="M0.navigate(\'prd\')">📥 回到 PRD 下载</button>' +
        '<button class="btn" onclick="M0.navigate(\'home\')">探索更多想法 →</button>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>' +

        '</div>' +
        '</div>';

      // 域名复制按钮
      app.querySelectorAll(".domain-item__copy").forEach(function (btn) {
        btn.addEventListener("click", function () {
          const domain = btn.getAttribute("data-domain") || "";
          try {
            if (navigator.clipboard && window.isSecureContext) {
              navigator.clipboard.writeText(domain).then(function () {
                const prev = btn.textContent;
                btn.textContent = "✓ 已复制";
                btn.style.color = "#10b981";
                btn.style.borderColor = "#10b981";
                setTimeout(function () {
                  btn.textContent = prev;
                  btn.style.color = "";
                  btn.style.borderColor = "";
                }, 1800);
              });
            } else {
              // 降级方案
              const ta = document.createElement("textarea");
              ta.value = domain;
              ta.style.position = "fixed";
              ta.style.opacity = "0";
              ta.style.left = "-9999px";
              document.body.appendChild(ta);
              ta.select();
              document.execCommand("copy");
              document.body.removeChild(ta);
              M0.toast("✓ 已复制：" + domain);
            }
          } catch (e) {
            M0.toast("⚠ 复制失败，请手动复制");
          }
        });
      });
    }

    // 启动应用
    M0.init();
  </script>
</body>
