    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    .scale-in { animation: scaleIn 0.3s ease-out; }

    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

</head>
<body class="min-h-screen bg-cream-100" onclick="app.handleGlobalClick(event)">

      { id: 'corn', name: '玉米', category: 'grains' },
      { id: 'noodles', name: '面条', category: 'grains' },
      { id: 'egg', name: '鸡蛋', category: 'eggs' },
      { id: 'duck-egg', name: '鸭蛋', category: 'eggs' },
      { id: 'tofu', name: '豆腐', category: 'tofu' },
      { id: 'soy-milk', name: '豆浆', category: 'tofu' },
      { id: 'ginger', name: '生姜', category: 'spices' },
      { id: 'garlic', name: '大蒜', category: 'spices' },
      { id: 'onion', name: '洋葱', category: 'spices' },
      { id: 'chili', name: '辣椒', category: 'spices' },
      { id: 'salt', name: '盐', category: 'spices' },
      { id: 'soy-sauce', name: '生抽', category: 'spices' },
      { id: 'dark-soy-sauce', name: '老抽', category: 'spices' },
      { id: 'white-wine', name: '白酒', category: 'spices' },
      { id: 'cooking-wine', name: '料酒', category: 'spices' },
      { id: 'vinegar', name: '醋', category: 'spices' },
      { id: 'sugar', name: '白糖', category: 'spices' },
      { id: 'honey', name: '蜂蜜', category: 'spices' },
      { id: 'sesame-oil', name: '香油', category: 'spices' },
      { id: 'oyster-sauce', name: '蚝油', category: 'spices' },

    const ingredientEmojis = {

      'green-pepper': '🫑', mushroom: '🍄', apple: '🍎', orange: '🍊', banana: '🍌', grape: '🍇',
      chicken: '🍗', pork: '🥩', beef: '🥩', lamb: '🐑', salmon: '🐟', shrimp: '🦐', fish: '🐠',
      'brown-rice': '🍚', oats: '🥣', corn: '🌽', noodles: '🍜', egg: '🥚', 'duck-egg': '🥚',
      tofu: '🧈', 'soy-milk': '🥛', ginger: '🫚', garlic: '🧄', onion: '🧅', chili: '🌶️',
      salt: '🧂', 'soy-sauce': '🫗', 'dark-soy-sauce': '🫗', 'white-wine': '🍶', 'cooking-wine': '🍶',
      vinegar: '🍶', sugar: '🍬', honey: '🍯', 'sesame-oil': '🫗', 'oyster-sauce': '🫗', pepper: '🌑',
    };

    const achievements = [
      { id: 'newbie', name: '养生新手', desc: '完成第一次菜谱合成', reward: '100积分' },
      { id: 'foodie', name: '美食达人', desc: '解锁10道不同菜谱', reward: '高级厨师徽章' },
      { id: 'collector', name: '食材收藏家', desc: '收集20种不同食材', reward: '500积分' },
      { id: 'challenger', name: '挑战王者', desc: '完成50个挑战任务', reward: '养生大师徽章' },
      { id: 'share', name: '社交达人', desc: '分享10道菜谱给好友', reward: '300积分' },
    ];

    const challenges = [
      { id: 'daily-synth', title: '每日合成', desc: '合成一道新菜谱', type: 'daily', goal: 1, reward: '50积分' },
      { id: 'daily-collect', title: '食材收集', desc: '收集3种新食材', type: 'daily', goal: 3, reward: '100积分' },
      { id: 'daily-nutrition', title: '健康饮食', desc: '查看5道菜谱营养信息', type: 'daily', goal: 5, reward: '80积分' },
      { id: 'weekly-synth', title: '每周挑战', desc: '一周内合成5道菜谱', type: 'weekly', goal: 5, reward: '周冠军' },
      { id: 'weekly-share', title: '好友分享', desc: '分享3道菜谱给好友', type: 'weekly', goal: 3, reward: '松茸' },
    ];

    const sampleRecipes = [
      { id: 'r1', name: '番茄炒蛋', desc: '经典家常菜，营养均衡，酸甜可口',
        ingredients: [{ name: '番茄', qty: '2个' }, { name: '鸡蛋', qty: '3个' }, { name: '葱花', qty: '适量' }],
        steps: ['番茄洗净切块，鸡蛋打散备用', '锅中放油，倒入蛋液炒至凝固盛出', '锅中再放油，放入番茄块翻炒出汁', '加入炒好的鸡蛋，加盐调味', '撒上葱花即可出锅'],
        nutrition: { calories: 280, protein: 18, carbs: 22, fat: 15, fiber: 3 },
        benefits: ['补充维生素C', '优质蛋白'], difficulty: 'easy', cookTime: 15 },
      { id: 'r2', name: '西兰花炒鸡胸肉', desc: '高蛋白低脂肪，健身人士首选',
        ingredients: [{ name: '西兰花', qty: '1颗' }, { name: '鸡胸肉', qty: '200g' }, { name: '蒜末', qty: '适量' }],
        steps: ['西兰花切小朵，焯水备用', '鸡胸肉切片，用料酒和盐腌制10分钟', '锅中放油，蒜末爆香', '放入鸡胸肉翻炒至变色', '加入西兰花继续翻炒', '加盐和生抽调味即可'],
        nutrition: { calories: 320, protein: 35, carbs: 15, fat: 12, fiber: 4 },
        benefits: ['高蛋白', '富含维生素'], difficulty: 'easy', cookTime: 20 },
    ];

    const state = {
      page: 'home', recipes: [], achievements: [], points: 0, selected: [],
      isSynthesizing: false, showResult: false, resultRecipe: null, isSuccess: false,
      showModal: false, selectedRecipe: null, category: null,
    };

    const recipeNames = ['养生小炒', '健康沙拉', '营养汤品', '美味炖菜', '清爽凉菜', '活力早餐', '能量午餐', '静心晚餐'];
    const recipeDescriptions = ['营养均衡，口感鲜美', '清爽可口，健康养生', '暖胃暖心，滋补身体', '简单快捷，美味不减', '色彩丰富，食欲大增'];
    const benefitsList = [['增强免疫力', '补充维生素'], ['高蛋白', '低脂肪'], ['健脾养胃', '益气补血'], ['清热解毒', '润肺止咳'], ['抗氧化', '延缓衰老']];

    function generateRecipe(sel) {
      const names = sel.map(id => ingredients.find(i => i.id === id)?.name || id);
      return {
        id: Date.now().toString(),
        name: recipeNames[Math.floor(Math.random() * recipeNames.length)],
        desc: recipeDescriptions[Math.floor(Math.random() * recipeDescriptions.length)],
        ingredients: names.map(name => ({ name, qty: '适量' })),
        steps: ['准备好所有食材', '将食材洗净切好', '锅中放油，翻炒食材', '加入调料调味', '出锅装盘，享用美食'],
        nutrition: { calories: Math.floor(Math.random() * 200) + 200, protein: Math.floor(Math.random() * 15) + 10, carbs: Math.floor(Math.random() * 20) + 10, fat: Math.floor(Math.random() * 10) + 5, fiber: Math.floor(Math.random() * 3) + 2 },
        benefits: benefitsList[Math.floor(Math.random() * benefitsList.length)],
        difficulty: Math.random() > 0.7 ? 'medium' : 'easy',
        cookTime: Math.floor(Math.random() * 20) + 15,
      };
    }

    function renderIngredientCard(ing, selected) {
      const emoji = ingredientEmojis[ing.id] || '🍽️';
      return `<div data-action="toggle-ingredient" data-id="${ing.id}" class="relative flex-shrink-0 w-20 h-24 rounded-2xl cursor-pointer transition-all duration-300 border-2 border-primary-100 ${selected ? 'ring-4 ring-primary-400 ring-offset-2 shadow-lg shadow-primary-200' : 'shadow-md hover:shadow-lg'} hover:scale-105" style="background: linear-gradient(135deg, #FFF5F0 0%, #F0FDFA 100%);"><div class="relative w-full h-16 p-2 flex items-center justify-center"><span class="text-4xl">${emoji}</span></div><div class="relative absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-sm px-2 py-1.5 border-t border-primary-100 rounded-b-2xl"><p class="text-xs font-medium text-gray-700 text-center truncate">${ing.name}</p></div></div>`;
    }

    function renderHeader() {
      const navs = [{ page: 'home', label: '首页' }, { page: 'synthesize', label: '合成' }, { page: 'challenges', label: '挑战' }, { page: 'collection', label: '图鉴' }, { page: 'achievements', label: '成就' }];
      return `<header class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md shadow-sm z-50"><div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-2xl">👨‍🍳</span><h1 class="font-display text-xl font-bold text-primary-600">养生美食冒险</h1></div><nav class="hidden md:flex items-center gap-6">${navs.map(n => `<div data-action="navigate" data-page="${n.page}" class="inline-block cursor-pointer ${state.page === n.page ? 'text-primary-600 font-bold' : 'text-gray-600 hover:text-primary-600'} transition-colors">${n.label}</div>`).join('')}</nav><div class="flex items-center gap-2 bg-primary-100 px-3 py-1 rounded-full"><span>🎯</span><span class="font-bold text-primary-600">${state.points}</span></div></div></header>`;
    }

    function renderBottomNav() {
      const navs = [{ page: 'home', label: '首页', emoji: '🏠' }, { page: 'synthesize', label: '合成', emoji: '✨' }, { page: 'challenges', label: '挑战', emoji: '🏆' }, { page: 'collection', label: '图鉴', emoji: '📖' }, { page: 'achievements', label: '成就', emoji: '⭐' }];
      return `<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 md:hidden z-50"><div class="flex justify-around py-2">${navs.map(n => `<div data-action="navigate" data-page="${n.page}" class="flex flex-col items-center gap-1 px-4 py-1 cursor-pointer ${state.page === n.page ? 'text-primary-600' : 'text-gray-500'}"><span class="text-xl">${n.emoji}</span><span class="text-xs">${n.label}</span></div>`).join('')}</div></nav>`;
    }

    function renderHome() {
      const grouped = ingredientCategories.map(cat => ({ ...cat, items: ingredients.filter(ing => ing.category === cat.id) }));

></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4">${[{ page: 'synthesize', emoji: '✨', label: '合成中心', desc: '选择食材合成新菜谱', color: 'gradient-primary' }, { page: 'challenges', emoji: '🏆', label: '挑战任务', desc: '完成任务获取奖励', color: 'gradient-accent' }, { page: 'collection', emoji: '📖', label: '菜谱图鉴', desc: '查看已解锁菜谱', color: 'gradient-secondary' }, { page: 'achievements', emoji: '⭐', label: '成就系统', desc: '解锁成就获得荣誉', color: 'bg-gradient-to-br from-pink-400 to-pink-600' }].map((action, i) => `<div data-action="navigate" data-page="${action.page}" class="${action.color} rounded-2xl p-5 text-white shadow-lg hover:shadow-xl transition-all text-left cursor-pointer" style="animation-delay: ${i * 0.1}s;"><div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center mb-3"><span class="text-xl">${action.emoji}</span></div><h4 class="font-display font-bold text-lg mb-1">${action.label}</h4><p class="text-white/80 text-xs">${action.desc}</p></div>`).join('')}</div></div><div class="grid grid-cols-3 gap-4 fade-in"><div class="bg-white rounded-2xl p-5 card-shadow"><div class="w-10 h-10 rounded-xl bg-primary-100 flex items-center justify-center mb-3"><span class="text-xl">📖</span></div><p class="text-2xl font-display font-bold text-gray-800">${state.recipes.length}</p><p class="text-sm text-gray-500">已解锁菜谱</p></div><div class="bg-white rounded-2xl p-5 card-shadow"><div class="w-10 h-10 rounded-xl bg-accent-100 flex items-center justify-center mb-3"><span class="text-xl">🏆</span></div><p class="text-2xl font-display font-bold text-gray-800">${state.achievements.length}</p><p class="text-sm text-gray-500">已解锁成就</p></div><div class="bg-white rounded-2xl p-5 card-shadow"><div class="w-10 h-10 rounded-xl bg-secondary-100 flex items-center justify-center mb-3"><span class="text-xl">🎯</span></div><p class="text-2xl font-display font-bold text-gray-800">${state.points}</p><p class="text-sm text-gray-500">获得积分</p></div></div></div></div>`;
    }

    function renderSynthesize() {
      const filtered = state.category ? ingredients.filter(ing => ing.category === state.category) : ingredients;
      const grouped = ingredientCategories.map(cat => ({ ...cat, count: ingredients.filter(ing => ing.category === cat.id).length }));
      const canSynthesize = state.selected.length >= 2 && !state.isSynthesizing;
      return `<div class="min-h-screen bg-cream-100 pt-20 pb-24"><div class="max-w-4xl mx-auto px-4"><div class="text-center mb-8 fade-in"><h1 class="font-display text-3xl font-bold text-gray-800 mb-2">菜谱合成中心</h1><p class="text-gray-500">选择2-3种食材，合成属于你的养生菜谱！</p></div><div class="bg-white rounded-3xl p-6 card-shadow mb-8 fade-in"><div class="flex items-center justify-between mb-4"><h2 class="font-display text-lg font-bold text-gray-800">选择食材</h2><span class="text-sm text-gray-500">已选择 ${state.selected.length} / 3 种食材</span></div><div class="flex gap-2 overflow-x-auto scrollbar-hide pb-3 mb-4"><div data-action="set-category" data-cat="" class="px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all cursor-pointer ${!state.category ? 'gradient-primary text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">全部</div>${grouped.map(cat => `<div data-action="set-category" data-cat="${cat.id}" class="px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all flex items-center gap-1 cursor-pointer ${state.category === cat.id ? 'gradient-primary text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}"><span>${cat.emoji}</span><span>${cat.name}</span><span class="text-xs opacity-70">(${cat.count})</span></div>`).join('')}</div><div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-3">${filtered.map(ing => renderIngredientCard(ing, state.selected.includes(ing.id))).join('')}</div></div><div class="bg-white rounded-3xl p-6 card-shadow mb-8 fade-in"><h2 class="font-display text-lg font-bold text-gray-800 mb-4">已选食材</h2>${state.selected.length > 0 ? `<div class="flex items-center justify-center gap-4 mb-6">${state.selected.map((id, i) => { const ing = ingredients.find(x => x.id === id); return `<div class="relative"><div class="w-16 h-16 rounded-xl bg-gradient-to-br from-primary-100 to-secondary-100 flex items-center justify-center"><span class="text-3xl">${ingredientEmojis[id] || '🍽️'}</span></div><p class="text-xs text-center mt-2 text-gray-600 font-medium">${ing ? ing.name : ''}</p></div>${i < state.selected.length - 1 ? '<span class="text-2xl text-primary-400">+</span>' : ''}`; }).join('')}</div>` : `<div class="text-center py-8"><span class="text-4xl text-gray-300">✨</span><p class="text-gray-500 mt-3">请从上方选择食材</p></div>`}<div data-action="synthesize" class="w-full py-4 rounded-2xl font-display font-bold text-lg transition-all flex items-center justify-center gap-2 cursor-pointer ${canSynthesize ? 'gradient-primary text-white shadow-lg shadow-primary-300 hover:shadow-xl' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}">${state.isSynthesizing ? `<div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>正在合成中...` : `<span>⚡</span>开始合成`}</div>${state.selected.length > 0 && !state.isSynthesizing ? `<div data-action="clear-selected" class="w-full mt-3 py-2 text-gray-500 hover:text-gray-700 text-sm flex items-center justify-center gap-1 transition-colors cursor-pointer"><span>🗑️</span>清空选择</div>` : ''}</div></div>${renderResultModal()}${renderRecipeDetailModal()}</div>`;
    }

    function renderResultModal() {
      if (!state.showResult) return '';
      return `<div data-action="close-result" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" style="animation: fadeIn 0.2s ease-out;"><div data-action="stop" class="bg-white rounded-3xl p-8 max-w-md w-full text-center" style="animation: scaleIn 0.3s ease-out;">${state.isSuccess ? `<div class="w-24 h-24 mx-auto mb-6 rounded-full gradient-secondary flex items-center justify-center animate-bounce"><span class="text-4xl">✅</span></div><h3 class="font-display text-2xl font-bold text-gray-800 mb-2">合成成功！</h3><p class="text-gray-500 mb-4">恭喜你获得新菜谱！</p>${state.resultRecipe ? `<div class="bg-gray-50 rounded-xl p-4 mb-6 text-left"><h4 class="font-display font-bold text-lg text-gray-800 mb-1">${state.resultRecipe.name}</h4><p class="text-sm text-gray-500 mb-3">${state.resultRecipe.desc}</p><p class="text-xs font-medium text-gray-600 mb-2">烹饪步骤:</p><ol class="text-xs text-gray-500 space-y-1">${state.resultRecipe.steps.slice(0, 3).map((step, i) => `<li class="flex gap-2"><span class="font-bold">${i + 1}.</span><span>${step}</span></li>`).join('')}</ol>${state.resultRecipe.steps.length > 3 ? '<p class="text-xs text-primary-500 mt-1">点击"查看详情"查看完整步骤</p>' : ''}</div>` : ''}<div class="flex gap-3"><div data-action="close-result" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-600 font-medium hover:bg-gray-200 transition-colors cursor-pointer">继续合成</div><div data-action="view-detail" class="flex-1 py-3 rounded-xl gradient-primary text-white font-medium hover:shadow-lg transition-all cursor-pointer">查看详情</div></div>` : `<div class="w-24 h-24 mx-auto mb-6 rounded-full bg-red-100 flex items-center justify-center"><span class="text-4xl">❌</span></div><h3 class="font-display text-2xl font-bold text-gray-800 mb-2">合成失败</h3><p class="text-gray-500 mb-6">这些食材无法合成出美味的菜谱，试试其他组合吧！</p><div data-action="close-result" class="w-full py-3 rounded-xl gradient-primary text-white font-medium hover:shadow-lg transition-all cursor-pointer">再试一次</div>`}</div></div>`;
    }

    function renderRecipeDetailModal() {
      if (!state.showModal || !state.selectedRecipe) return '';
      const r = state.selectedRecipe;
      return `<div data-action="close-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" style="animation: fadeIn 0.2s ease-out;"><div data-action="stop" class="bg-white rounded-3xl p-6 max-w-lg w-full max-h-[90vh] overflow-y-auto" style="animation: scaleIn 0.3s ease-out;"><div data-action="close-modal" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors cursor-pointer">✕</div><h3 class="font-display text-2xl font-bold text-gray-800 mb-2">${r.name}</h3><p class="text-gray-500 mb-4">${r.desc}</p><div class="flex gap-4 mb-4"><div class="flex items-center gap-1"><span>⏱️</span><span class="text-sm text-gray-600">${r.cookTime}分钟</span></div><div class="flex items-center gap-1"><span>📊</span><span class="text-sm text-gray-600">${r.difficulty === 'easy' ? '简单' : '中等'}</span></div><div class="flex items-center gap-1"><span>🔥</span><span class="text-sm text-gray-600">${r.nutrition.calories}卡</span></div></div><div class="mb-4"><h4 class="font-display font-bold text-gray-800 mb-2">食材清单</h4><ul class="bg-gray-50 rounded-xl p-3 space-y-1">${r.ingredients.map(ing => `<li class="text-sm text-gray-600 flex justify-between"><span>${ing.name}</span><span>${ing.qty}</span></li>`).join('')}</ul></div><div class="mb-4"><h4 class="font-display font-bold text-gray-800 mb-2">烹饪步骤</h4><ol class="space-y-2">${r.steps.map((step, i) => `<li class="text-sm text-gray-600 flex gap-2"><span class="w-5 h-5 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-xs font-bold flex-shrink-0">${i + 1}</span><span>${step}</span></li>`).join('')}</ol></div><div class="mb-4"><h4 class="font-display font-bold text-gray-800 mb-2">营养成分</h4><div class="grid grid-cols-2 gap-2">${Object.entries(r.nutrition).map(([k, v]) => `<div class="bg-gray-50 rounded-lg p-2 text-center"><p class="text-xs text-gray-500">${k === 'calories' ? '热量' : k === 'protein' ? '蛋白质' : k === 'carbs' ? '碳水' : k === 'fat' ? '脂肪' : '纤维'}</p><p class="font-bold text-gray-800">${v}${k === 'calories' ? '卡' : 'g'}</p></div>`).join('')}</div></div><div><h4 class="font-display font-bold text-gray-800 mb-2">养生功效</h4><div class="flex flex-wrap gap-2">${r.benefits.map(b => `<span class="px-3 py-1 bg-secondary-100 text-secondary-700 rounded-full text-sm">${b}</span>`).join('')}</div></div><div data-action="close-modal" class="w-full mt-6 py-3 rounded-xl gradient-primary text-white font-medium hover:shadow-lg transition-all cursor-pointer">关闭</div></div></div>`;
    }

    function renderChallenges() {
      const daily = challenges.filter(c => c.type === 'daily');
      const weekly = challenges.filter(c => c.type === 'weekly');
      return `<div class="min-h-screen bg-cream-100 pt-20 pb-24"><div class="max-w-4xl mx-auto px-4"><div class="text-center mb-8 fade-in"><h1 class="font-display text-3xl font-bold text-gray-800 mb-2">挑战任务</h1><p class="text-gray-500">完成挑战，获取丰厚奖励！</p></div><div class="mb-8 fade-in"><div class="flex items-center gap-2 mb-4"><span>📅</span><h2 class="font-display text-xl font-bold text-gray-800">每日挑战</h2></div><div class="space-y-4">${daily.map(c => `<div class="bg-white rounded-2xl p-4 card-shadow"><div class="flex items-center justify-between"><div><h3 class="font-display font-bold text-gray-800">${c.title}</h3><p class="text-sm text-gray-500">${c.desc}</p></div><div class="text-right"><p class="text-sm text-gray-500">奖励</p><p class="font-bold text-primary-600">${c.reward}</p></div></div><div class="mt-4 flex items-center justify-between"><div class="flex-1 mr-4"><div class="h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full gradient-primary rounded-full transition-all" style="width: 0%"></div></div><p class="text-xs text-gray-500 mt-1">0 / ${c.goal}</p></div><div class="px-4 py-2 rounded-xl bg-gray-100 text-gray-600 font-medium text-sm cursor-pointer">去完成</div></div></div>`).join('')}</div></div><div class="fade-in"><div class="flex items-center gap-2 mb-4"><span>📆</span><h2 class="font-display text-xl font-bold text-gray-800">每周挑战</h2></div><div class="space-y-4">${weekly.map(c => `<div class="bg-white rounded-2xl p-4 card-shadow"><div class="flex items-center justify-between"><div><h3 class="font-display font-bold text-gray-800">${c.title}</h3><p class="text-sm text-gray-500">${c.desc}</p></div><div class="text-right"><p class="text-sm text-gray-500">奖励</p><p class="font-bold text-accent-600">${c.reward}</p></div></div><div class="mt-4 flex items-center justify-between"><div class="flex-1 mr-4"><div class="h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full gradient-accent rounded-full transition-all" style="width: 0%"></div></div><p class="text-xs text-gray-500 mt-1">0 / ${c.goal}</p></div><div class="px-4 py-2 rounded-xl bg-gray-100 text-gray-600 font-medium text-sm cursor-pointer">去完成</div></div></div>`).join('')}</div></div></div></div>`;
    }

    function renderCollection() {
      const all = [...state.recipes, ...sampleRecipes];
      return `<div class="min-h-screen bg-cream-100 pt-20 pb-24"><div class="max-w-4xl mx-auto px-4"><div class="text-center mb-8 fade-in"><h1 class="font-display text-3xl font-bold text-gray-800 mb-2">菜谱图鉴</h1><p class="text-gray-500">查看已解锁的美味菜谱</p></div><div class="mb-6 fade-in"><div class="flex gap-2 overflow-x-auto scrollbar-hide"><div class="px-4 py-2 rounded-full text-sm font-medium gradient-primary text-white shadow-md cursor-pointer">全部</div><div class="px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 cursor-pointer">简单</div><div class="px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 cursor-pointer">中等</div><div class="px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 cursor-pointer">困难</div></div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">${all.map(r => `<div data-action="open-recipe" data-id="${r.id}" class="bg-white rounded-2xl p-4 card-shadow hover:shadow-lg transition-all cursor-pointer"><div class="flex gap-4"><div class="w-20 h-20 rounded-xl bg-gradient-to-br from-primary-100 to-secondary-100 flex items-center justify-center flex-shrink-0"><span class="text-3xl">🍳</span></div><div class="flex-1"><div class="flex items-center justify-between"><h3 class="font-display font-bold text-gray-800">${r.name}</h3><span class="text-xs px-2 py-1 rounded-full ${r.difficulty === 'easy' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${r.difficulty === 'easy' ? '简单' : '中等'}</span></div><p class="text-sm text-gray-500 mt-1 line-clamp-2">${r.desc}</p><div class="flex items-center gap-4 mt-2"><span class="text-xs text-gray-400">⏱️ ${r.cookTime}分钟</span><span class="text-xs text-gray-400">🔥 ${r.nutrition.calories}卡</span></div></div></div></div>`).join('')}</div>${renderRecipeDetailModal()}</div></div>`;
    }

    function renderAchievements() {
      return `<div class="min-h-screen bg-cream-100 pt-20 pb-24"><div class="max-w-4xl mx-auto px-4"><div class="text-center mb-8 fade-in"><h1 class="font-display text-3xl font-bold text-gray-800 mb-2">成就系统</h1><p class="text-gray-500">解锁成就，获得荣誉与奖励！</p></div><div class="bg-white rounded-2xl p-6 card-shadow mb-8 fade-in"><div class="flex items-center justify-between mb-4"><h2 class="font-display text-lg font-bold text-gray-800">成就进度</h2><span class="font-bold text-primary-600">${state.achievements.length} / ${achievements.length}</span></div><div class="h-3 bg-gray-200 rounded-full overflow-hidden"><div class="h-full gradient-primary rounded-full transition-all" style="width: ${(state.achievements.length / achievements.length) * 100}%"></div></div></div><div class="grid grid-cols-2 md:grid-cols-3 gap-4 fade-in">${achievements.map(a => { const unlocked = state.achievements.includes(a.id); return `<div class="bg-white rounded-2xl p-4 card-shadow text-center ${unlocked ? '' : 'opacity-60'}"><div class="w-16 h-16 mx-auto mb-3 rounded-full ${unlocked ? 'gradient-secondary' : 'bg-gray-200'} flex items-center justify-center"><span class="text-2xl">${unlocked ? '⭐' : '🔒'}</span></div><h3 class="font-display font-bold text-gray-800 mb-1">${a.name}</h3><p class="text-xs text-gray-500 mb-2">${a.desc}</p><p class="text-xs font-medium ${unlocked ? 'text-primary-600' : 'text-gray-400'}">${unlocked ? `奖励: ${a.reward}` : '未解锁'}</p></div>`; }).join('')}</div></div></div>`;
    }

    const app = {
      navigate(page) { state.page = page; state.selected = []; state.category = null; this.render(); },
      setCategory(cat) { state.category = cat || null; this.render(); },
      toggleIngredient(id) {
        if (state.selected.includes(id)) {
          state.selected = state.selected.filter(i => i !== id);
        } else if (state.selected.length < 3) {
          state.selected.push(id);
        }
        this.render();
      },
      clearSelected() { state.selected = []; this.render(); },
      async synthesize() {
        const canSynthesize = state.selected.length >= 2 && !state.isSynthesizing;
        if (!canSynthesize) return;
        state.isSynthesizing = true;
        this.render();
        await new Promise(r => setTimeout(r, 2000));
        const success = Math.random() > 0.2;
        if (success) {
          const recipe = generateRecipe(state.selected);
          state.resultRecipe = recipe;
          state.recipes.push(recipe);
          state.points += 50;
          if (state.recipes.length === 1) state.achievements.push('newbie');
        }
        state.isSuccess = success;
        state.isSynthesizing = false;
        state.showResult = true;
        this.render();
      },
      closeResult() { state.showResult = false; state.resultRecipe = null; state.selected = []; this.render(); },
      viewDetail() { state.selectedRecipe = state.resultRecipe; state.showModal = true; state.showResult = false; this.render(); },
      openRecipe(id) {
        const recipe = [...state.recipes, ...sampleRecipes].find(r => r.id === id);
        if (recipe) { state.selectedRecipe = recipe; state.showModal = true; this.render(); }
      },
      closeModal() { state.showModal = false; state.selectedRecipe = null; this.render(); },
      render() {
        const appEl = document.getElementById('app');
        let content = '';
        switch (state.page) {
          case 'home': content = renderHome(); break;
          case 'synthesize': content = renderSynthesize(); break;
          case 'challenges': content = renderChallenges(); break;
          case 'collection': content = renderCollection(); break;
          case 'achievements': content = renderAchievements(); break;
        }
        appEl.innerHTML = renderHeader() + content + renderBottomNav();
      },
      handleGlobalClick(e) {
        const target = e.target;
        const actionEl = target.closest('[data-action]');
        if (!actionEl) return;
        
        const action = actionEl.dataset.action;
        
        if (action === 'stop') {
          return;
        }
        
        if (action === 'navigate') {
          this.navigate(actionEl.dataset.page);
        } else if (action === 'toggle-ingredient') {
          this.toggleIngredient(actionEl.dataset.id);
        } else if (action === 'set-category') {
          this.setCategory(actionEl.dataset.cat);
        } else if (action === 'synthesize') {
          this.synthesize();
        } else if (action === 'clear-selected') {
          this.clearSelected();
        } else if (action === 'close-result') {
          this.closeResult();
        } else if (action === 'view-detail') {
          this.viewDetail();
        } else if (action === 'open-recipe') {
          this.openRecipe(actionEl.dataset.id);
        } else if (action === 'close-modal') {
          this.closeModal();
        }
      },
    };

    document.addEventListener('DOMContentLoaded', () => app.render());
  </script>
</body>
</html>
