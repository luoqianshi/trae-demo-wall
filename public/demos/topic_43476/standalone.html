<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo · 元智能体（独立版）</title>
<style>
:root {
  --bg: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-hover: #2d333b;
  --border: #30363d;
  --ink: #e6edf3;
  --ink-secondary: #8b949e;
  --ink-tertiary: #6e7681;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --accent-bg: rgba(88,166,255,0.1);
  --green: #3fb950;
  --green-bg: rgba(63,185,80,0.1);
  --orange: #d29922;
  --orange-bg: rgba(210,153,34,0.1);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.1);
  --purple: #bc8cff;
  --purple-bg: rgba(188,140,255,0.1);
  --radius: 8px;
  --radius-sm: 4px;
  --sidebar-width: 260px;
  --right-panel-width: 400px;
  --font-sans: 'InstrumentSans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrainsMono', 'SF Mono', 'Fira Code', monospace;
}

@font-face { font-family: 'InstrumentSans'; src: url('_shared/fonts/InstrumentSans-Regular.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'InstrumentSans'; src: url('_shared/fonts/InstrumentSans-Bold.ttf') format('truetype'); font-weight: 700; }
@font-face { font-family: 'JetBrainsMono'; src: url('_shared/fonts/JetBrainsMono-Regular.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'JetBrainsMono'; src: url('_shared/fonts/JetBrainsMono-Bold.ttf') format('truetype'); font-weight: 700; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== Header ===== */
header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-secondary);
  flex-shrink: 0;
  gap: 16px;
}

.logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo h1 { font-size: 18px; font-weight: 700; }
.logo .tag { font-size: 11px; color: var(--ink-secondary); padding: 2px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); }

.phase-bar { display: flex; gap: 6px; align-items: center; flex: 1; justify-content: center; }
.phase-item {
  font-size: 12px; color: var(--ink-secondary); padding: 3px 10px;
  border-radius: 20px; border: 1px solid var(--border);
  transition: all 0.3s; white-space: nowrap;
}
.phase-item.active { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
.phase-item.done { color: var(--green); border-color: var(--green); }
.phase-arrow { color: var(--ink-tertiary); font-size: 10px; }

.header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

/* Voice Toggle */
.voice-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; font-size: 12px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  color: var(--ink-secondary); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s;
  font-family: var(--font-sans);
}
.voice-toggle:hover { border-color: var(--accent); color: var(--accent); }
.voice-toggle.active { border-color: var(--green); color: var(--green); background: var(--green-bg); }
.voice-toggle .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-tertiary); }
.voice-toggle.active .dot { background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.btn-icon {
  padding: 5px 10px; font-size: 12px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  color: var(--ink-secondary); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s;
  font-family: var(--font-sans);
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

/* ===== Dynamic Island (灵动岛) ===== */
.dynamic-island {
  position: relative;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  overflow: visible;
}

.island-pill {
  position: relative;
  background: #000;
  border-radius: 28px;
  padding: 6px 16px;
  min-width: 180px;
  max-width: 420px;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  user-select: none;
}

/* Collapsed states */
.island-pill.collapsed {
  height: 36px;
  padding: 0 16px;
}

/* Expanded state */
.island-pill.expanded {
  border-radius: 20px;
  padding: 12px 20px;
  min-width: 380px;
  max-width: 480px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(88,166,255,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
}

/* Island content - collapsed */
.island-collapsed-content {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  transition: opacity 0.3s;
}
.island-pill.expanded .island-collapsed-content { display: none; }

.island-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--ink-tertiary);
  flex-shrink: 0;
  transition: all 0.3s;
}
.island-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: islandPulse 1.5s infinite; }
.island-dot.thinking { background: var(--orange); box-shadow: 0 0 8px var(--orange); animation: islandPulse 0.8s infinite; }
.island-dot.success { background: var(--green); box-shadow: 0 0 8px var(--green); }
.island-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }
.island-dot.voice { background: var(--purple); box-shadow: 0 0 8px var(--purple); animation: islandPulse 1s infinite; }

@keyframes islandPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.6; }
}

.island-label {
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500;
}

.island-phase-tag {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  padding: 1px 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  white-space: nowrap;
  flex-shrink: 0;
}

/* Island content - expanded */
.island-expanded-content {
  display: none;
  flex-direction: column;
  gap: 12px;
  width: 100%;
}
.island-pill.expanded .island-expanded-content { display: flex; }

.island-expanded-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.island-expanded-title {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}

.island-close {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.island-close:hover { background: rgba(255,255,255,0.2); color: #fff; }

/* Phase timeline in expanded view */
.island-timeline {
  display: flex;
  gap: 4px;
  align-items: center;
}
.island-timeline-item {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  transition: all 0.3s;
  position: relative;
}
.island-timeline-item.done { background: var(--green); }
.island-timeline-item.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.island-timeline-label {
  font-size: 9px;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin-top: 4px;
}
.island-timeline-label.active { color: var(--accent); }
.island-timeline-label.done { color: var(--green); }

/* Stats row in expanded view */
.island-stats {
  display: flex;
  gap: 16px;
  justify-content: space-around;
}
.island-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.island-stat-value {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  font-family: var(--font-mono);
}
.island-stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Live activity indicator */
.island-activity {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  padding: 6px 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
}
.island-activity-dots {
  display: inline-flex;
  gap: 3px;
}
.island-activity-dots span {
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  animation: islandBounce 1.4s infinite ease-in-out both;
}
.island-activity-dots span:nth-child(1) { animation-delay: -0.32s; }
.island-activity-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes islandBounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* Voice waveform in island */
.island-waveform {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 16px;
}
.island-waveform span {
  width: 3px;
  background: var(--purple);
  border-radius: 2px;
  animation: islandWave 0.8s infinite ease-in-out;
}
.island-waveform span:nth-child(1) { height: 6px; animation-delay: 0s; }
.island-waveform span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
.island-waveform span:nth-child(3) { height: 16px; animation-delay: 0.2s; }
.island-waveform span:nth-child(4) { height: 10px; animation-delay: 0.3s; }
.island-waveform span:nth-child(5) { height: 14px; animation-delay: 0.4s; }
@keyframes islandWave {
  0%, 100% { transform: scaleY(0.5); }
  50% { transform: scaleY(1); }
}

/* Notification flash animation */
.island-pill.flash {
  animation: islandFlash 0.6s ease;
}
@keyframes islandFlash {
  0% { transform: scale(1); }
  30% { transform: scale(1.05); box-shadow: 0 0 20px var(--green); }
  100% { transform: scale(1); }
}

/* ===== Main Layout ===== */
main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 12px 16px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.sidebar-header h3 {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn-new-session {
  width: 100%;
  padding: 10px 16px;
  margin: 0 16px 8px;
  width: calc(100% - 32px);
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-new-session:hover { background: var(--accent-hover); }

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px;
}

.session-item {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.session-item:hover { background: var(--bg-tertiary); }
.session-item.active { background: var(--bg-tertiary); border-left: 2px solid var(--accent); }
.session-item .title { font-size: 13px; color: var(--ink); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .time { font-size: 11px; color: var(--ink-tertiary); flex-shrink: 0; }
.session-item .delete {
  opacity: 0; width: 20px; height: 20px; border: none; background: none;
  color: var(--ink-tertiary); cursor: pointer; border-radius: 3px;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.session-item:hover .delete { opacity: 1; }
.session-item .delete:hover { color: var(--red); background: var(--red-bg); }

/* Capability Library in Sidebar */
.capability-list {
  max-height: 240px;
  overflow-y: auto;
  padding: 0 8px 8px;
}

.capability-item {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
}
.capability-item:hover { background: var(--bg-tertiary); }
.capability-item .cap-name { font-size: 13px; color: var(--purple); font-weight: 600; }
.capability-item .cap-scenario { font-size: 11px; color: var(--ink-secondary); margin-top: 2px; }
.capability-item .cap-type { font-size: 10px; color: var(--ink-tertiary); padding: 1px 6px; border: 1px solid var(--border); border-radius: 3px; display: inline-block; margin-top: 4px; }

.sidebar-empty {
  padding: 12px 16px;
  font-size: 12px;
  color: var(--ink-tertiary);
  text-align: center;
}

/* ===== Chat Area ===== */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
}
.msg.echo {
  align-self: flex-start;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
}
.msg.system {
  align-self: center;
  font-size: 12px;
  color: var(--ink-secondary);
  background: none;
  padding: 4px;
}
.msg.tool-result {
  align-self: flex-start;
  max-width: 90%;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-left: 3px solid var(--purple);
  font-size: 12px;
  color: var(--ink-secondary);
  font-family: var(--font-mono);
}

.msg.echo h1, .msg.echo h2, .msg.echo h3 { margin: 8px 0 4px; }
.msg.echo h1 { font-size: 16px; }
.msg.echo h2 { font-size: 15px; }
.msg.echo h3 { font-size: 14px; }
.msg.echo ul, .msg.echo ol { padding-left: 20px; margin: 4px 0; }
.msg.echo li { margin: 2px 0; }
.msg.echo strong { color: var(--accent-hover); }
.msg.echo code { font-family: var(--font-mono); font-size: 13px; background: rgba(110,118,129,0.2); padding: 1px 4px; border-radius: 3px; }
.msg.echo pre { background: var(--bg); padding: 8px 12px; border-radius: 4px; overflow-x: auto; margin: 8px 0; }
.msg.echo pre code { background: none; padding: 0; }
.msg.echo a { color: var(--accent); }

/* Options */
.options-container {
  padding: 0 24px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.option-card {
  padding: 12px 16px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
}
.option-card:hover { border-color: var(--accent); background: var(--accent-bg); }
.option-card h4 { font-size: 14px; margin-bottom: 4px; color: var(--accent-hover); }
.option-card p { font-size: 13px; color: var(--ink-secondary); line-height: 1.5; }
.option-card .pros { color: var(--green); font-size: 12px; }
.option-card .cons { color: var(--orange); font-size: 12px; }

/* Quick Start */
.quick-start {
  align-self: flex-start;
  max-width: 85%;
  padding: 4px 0;
}
.quick-start-label { font-size: 12px; color: var(--ink-secondary); margin-bottom: 8px; }
.quick-start-items { display: flex; flex-wrap: wrap; gap: 8px; }
.quick-btn {
  padding: 8px 14px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--ink-secondary);
  font-family: var(--font-sans);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.quick-start.hidden { display: none; }

/* Capability Reuse Badge */
.cap-reuse-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  background: rgba(88, 166, 255, 0.1);
  border: 1px solid rgba(88, 166, 255, 0.3);
  border-radius: 12px;
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 8px;
  align-self: flex-start;
}

/* Input Area */
.input-area {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

.voice-btn {
  width: 44px;
  height: 44px;
  min-width: 44px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--ink-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.voice-btn:hover { border-color: var(--accent); color: var(--accent); }
.voice-btn.voice-on { border-color: var(--green); color: var(--green); background: var(--green-bg); animation: micPulse 2s infinite; }
.voice-btn.listening { border-color: var(--red); color: var(--red); background: var(--red-bg); animation: voicePulse 1.5s infinite; }
.voice-btn:disabled { opacity: 0.4; cursor: not-allowed; }
@keyframes voicePulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(248,81,73,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(248,81,73,0); }
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.45); }
  50% { box-shadow: 0 0 0 10px rgba(63,185,80,0); }
}

.input-area textarea {
  flex: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 14px;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--accent); }

.input-area .send-btn {
  padding: 10px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.input-area .send-btn:hover { background: var(--accent-hover); }
.input-area .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Voice status indicator */
.voice-status {
  font-size: 11px;
  color: var(--ink-tertiary);
  padding: 2px 8px;
  text-align: center;
  flex-shrink: 0;
}
.voice-status.listening { color: var(--red); }
.voice-status.speaking { color: var(--green); }

/* ===== Right Panel ===== */
.right-panel {
  width: var(--right-panel-width);
  min-width: var(--right-panel-width);
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.right-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.right-tab {
  flex: 1;
  padding: 10px 12px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--ink-secondary);
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.right-tab:hover { color: var(--ink); }
.right-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.right-tab .badge {
  font-size: 10px;
  padding: 1px 6px;

<script>
/**
 * Echo Voice Module
 * Web Speech API wrapper for Speech-to-Text (STT) and Text-to-Speech (TTS)
 * Provides push-to-talk voice input and voice output for Echo's responses
 */

class EchoVoice {
  constructor() {
    this.recognition = null;
    this.synthesis = window.speechSynthesis || null;
    this.isListening = false;
    this.isSpeaking = false;
    this.currentUtterance = null;
    this.onResultCallback = null;
    this.onErrorCallback = null;
    this.onStateChange = null;
    this.voiceEnabled = false;
    this.selectedVoice = null;

    this._initRecognition();
    this._initVoices();
  }

  /**
   * Initialize SpeechRecognition
   */
  _initRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      console.warn('[EchoVoice] SpeechRecognition not supported');
      return;
    }

    this.recognition = new SpeechRecognition();
    this.recognition.lang = 'zh-CN';
    this.recognition.continuous = false;
    this.recognition.interimResults = true;
    this.recognition.maxAlternatives = 1;

    this.recognition.onresult = (event) => {
      let interimText = '';
      let finalText = '';

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalText += transcript;
        } else {
          interimText += transcript;
        }
      }

      if (finalText && this.onResultCallback) {
        this.onResultCallback(finalText.trim(), true);
      } else if (interimText && this.onResultCallback) {
        this.onResultCallback(interimText.trim(), false);
      }
    };

    this.recognition.onerror = (event) => {
      this.isListening = false;
      this._notifyStateChange();
      if (this.onErrorCallback) {
        const errorMessages = {
          'no-speech': '没有检测到语音，请重试',
          'audio-capture': '无法访问麦克风，请检查权限',
          'not-allowed': '麦克风权限被拒绝，请在浏览器设置中允许',
          'network': '语音识别需要网络连接',
          'aborted': '语音识别已取消',
        };
        this.onErrorCallback(errorMessages[event.error] || `语音识别错误: ${event.error}`);
      }
    };

    this.recognition.onend = () => {
      if (this.isListening) {
        this.isListening = false;
        this._notifyStateChange();
      }
    };
  }

  /**
   * Initialize TTS voices
   */
  _initVoices() {
    if (!this.synthesis) {
      console.warn('[EchoVoice] speechSynthesis not supported');
      return;
    }

    const loadVoices = () => {
      const voices = this.synthesis.getVoices();
      // Prefer Chinese voice
      this.selectedVoice = voices.find(v => v.lang.startsWith('zh')) ||
                           voices.find(v => v.lang.startsWith('cmn')) ||
                           voices[0] || null;
    };

    loadVoices();
    if (this.synthesis.onvoiceschanged !== undefined) {
      this.synthesis.onvoiceschanged = loadVoices;
    }
  }

  /**
   * Check if STT is supported
   */
  isSTTSupported() {
    return this.recognition !== null;
  }

  /**
   * Check if TTS is supported
   */
  isTTSSupported() {
    return this.synthesis !== null;
  }

  /**
   * Start listening for voice input
   * @param {function} onResult - callback(text, isFinal)
   * @param {function} onError - callback(errorMessage)
   */
  startListening(onResult, onError) {
    if (!this.recognition) {
      if (onError) onError('当前浏览器不支持语音识别，请使用 Chrome 或 Edge');
      return;
    }

    if (this.isListening) {
      this.stopListening();
    }

    // Stop any ongoing speech
    this.stopSpeaking();

    this.onResultCallback = onResult;
    this.onErrorCallback = onError;

    try {
      this.recognition.start();
      this.isListening = true;
      this._notifyStateChange();
    } catch (e) {
      if (onError) onError('启动语音识别失败，请重试');
    }
  }

  /**
   * Stop listening
   */
  stopListening() {
    if (this.recognition && this.isListening) {
      try {
        this.recognition.stop();
      } catch (e) {
        // ignore
      }
      this.isListening = false;
      this._notifyStateChange();
    }
  }

  /**
   * Speak text using TTS
   * @param {string} text - text to speak
   * @param {function} onEnd - callback when speech ends
   */
  speak(text, onEnd) {
    if (!this.synthesis) {
      if (onEnd) onEnd();
      return;
    }

    // Stop any ongoing speech
    this.synthesis.cancel();

    // Clean text: remove markdown and HTML
    const cleanText = text
      .replace(/```[\s\S]*?```/g, ' 代码块 ')
      .replace(/<!--[\s\S]*?-->/g, '')
      .replace(/[#*`_~]/g, '')
      .replace(/\n{2,}/g, '。')
      .trim();

    if (!cleanText) {
      if (onEnd) onEnd();
      return;
    }

    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'zh-CN';
    utterance.rate = 1.0;
    utterance.pitch = 1.0;
    utterance.volume = 0.8;

    if (this.selectedVoice) {
      utterance.voice = this.selectedVoice;
    }

    utterance.onstart = () => {
      this.isSpeaking = true;
      this.currentUtterance = utterance;
      this._notifyStateChange();
    };

    utterance.onend = () => {
      this.isSpeaking = false;
      this.currentUtterance = null;
      this._notifyStateChange();
      if (onEnd) onEnd();
    };

    utterance.onerror = () => {
      this.isSpeaking = false;
      this.currentUtterance = null;
      this._notifyStateChange();
      if (onEnd) onEnd();
    };

    this.synthesis.speak(utterance);
  }

  /**
   * Stop speaking
   */
  stopSpeaking() {
    if (this.synthesis) {
      this.synthesis.cancel();
    }
    this.isSpeaking = false;
    this.currentUtterance = null;
    this._notifyStateChange();
  }

  /**
   * Enable/disable voice mode (auto-speak Echo responses)
   */
  setVoiceEnabled(enabled) {
    this.voiceEnabled = enabled;
    if (!enabled) {
      this.stopSpeaking();
    }
  }

  /**
   * Get current voice state
   */
  getVoiceState() {
    return {
      listening: this.isListening,
      speaking: this.isSpeaking,
      voiceEnabled: this.voiceEnabled,
      sttSupported: this.isSTTSupported(),
      ttsSupported: this.isTTSSupported(),
    };
  }

  /**
   * Register state change callback
   */
  setStateChangeCallback(callback) {
    this.onStateChange = callback;
  }

  /**
   * Notify state change
   */
  _notifyStateChange() {
    if (this.onStateChange) {
      this.onStateChange(this.getVoiceState());
    }
  }
}

// Export as global
window.EchoVoice = EchoVoice;
</script>

<script>
/**
 * Echo Memory Module
 * IndexedDB wrapper for persistent storage of sessions, messages, capabilities, and tasks
 * Enables multi-session management and capability library
 */

class EchoMemory {
  constructor() {
    this.dbName = 'EchoDB';
    this.dbVersion = 1;
    this.db = null;
  }

  /**
   * Initialize the database
   */
  async init() {
    return new Promise((resolve, reject) => {
      if (!window.indexedDB) {
        reject(new Error('IndexedDB not supported'));
        return;
      }

      const request = indexedDB.open(this.dbName, this.dbVersion);

      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        this.db = request.result;
        resolve();
      };

      request.onupgradeneeded = (event) => {
        const db = event.target.result;

        // Sessions store
        if (!db.objectStoreNames.contains('sessions')) {
          const sessionStore = db.createObjectStore('sessions', { keyPath: 'id' });
          sessionStore.createIndex('createdAt', 'createdAt', { unique: false });
          sessionStore.createIndex('updatedAt', 'updatedAt', { unique: false });
        }

        // Messages store
        if (!db.objectStoreNames.contains('messages')) {
          const msgStore = db.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
          msgStore.createIndex('sessionId', 'sessionId', { unique: false });
          msgStore.createIndex('createdAt', 'createdAt', { unique: false });
        }

        // Outputs store (requirement cards, task trees, plans, etc.)
        if (!db.objectStoreNames.contains('outputs')) {
          const outStore = db.createObjectStore('outputs', { keyPath: 'id', autoIncrement: true });
          outStore.createIndex('sessionId', 'sessionId', { unique: false });
          outStore.createIndex('type', 'type', { unique: false });
        }

        // Tasks store (task board items)
        if (!db.objectStoreNames.contains('tasks')) {
          const taskStore = db.createObjectStore('tasks', { keyPath: 'id', autoIncrement: true });
          taskStore.createIndex('sessionId', 'sessionId', { unique: false });
          taskStore.createIndex('taskId', 'taskId', { unique: false });
          taskStore.createIndex('status', 'status', { unique: false });
        }

        // Capabilities store (sedimented capabilities)
        if (!db.objectStoreNames.contains('capabilities')) {
          const capStore = db.createObjectStore('capabilities', { keyPath: 'id', autoIncrement: true });
          capStore.createIndex('name', 'name', { unique: false });
          capStore.createIndex('type', 'type', { unique: false });
          capStore.createIndex('createdAt', 'createdAt', { unique: false });
        }

        // Generated files store
        if (!db.objectStoreNames.contains('files')) {
          const fileStore = db.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
          fileStore.createIndex('sessionId', 'sessionId', { unique: false });
        }
      };
    });
  }

  /**
   * Generic transaction helper
   */
  _tx(storeName, mode = 'readonly') {
    const tx = this.db.transaction(storeName, mode);
    return tx.objectStore(storeName);
  }

  /**
   * Generic request helper
   */
  _request(store, method, ...args) {
    return new Promise((resolve, reject) => {
      const req = store[method](...args);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  // ===== Session Management =====

  async createSession(title) {
    const session = {
      id: 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      title: title || '新对话',
      phase: 0,
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };
    await this._request(this._tx('sessions', 'readwrite'), 'add', session);
    return session;
  }

  async getSession(id) {
    return await this._request(this._tx('sessions'), 'get', id);
  }

  async getAllSessions() {
    return new Promise((resolve, reject) => {
      const store = this._tx('sessions');
      const index = store.index('createdAt');
      const req = index.openCursor(null, 'prev');
      const results = [];
      req.onsuccess = (event) => {
        const cursor = event.target.result;
        if (cursor) {
          results.push(cursor.value);
          cursor.continue();
        } else {
          resolve(results);
        }
      };
      req.onerror = () => reject(req.error);
    });
  }

  async updateSession(id, updates) {
    const session = await this.getSession(id);
    if (!session) return null;
    Object.assign(session, updates, { updatedAt: Date.now() });
    await this._request(this._tx('sessions', 'readwrite'), 'put', session);
    return session;
  }

  async deleteSession(id) {
    // Delete session and all related data
    const tx = this.db.transaction(['sessions', 'messages', 'outputs', 'tasks', 'files'], 'readwrite');
    
    tx.objectStore('sessions').delete(id);
    
    // Delete messages
    const msgStore = tx.objectStore('messages');
    const msgIndex = msgStore.index('sessionId');
    const msgReq = msgIndex.openCursor(IDBKeyRange.only(id));
    msgReq.onsuccess = (event) => {

    };

    // Delete outputs

    const outIndex = outStore.index('sessionId');

    outReq.onsuccess = (event) => {
      const cursor = event.target.result;
      if (cursor) { cursor.delete(); cursor.continue(); }
    };

    // Delete tasks
    const taskStore = tx.objectStore('tasks');
    const taskIndex = taskStore.index('sessionId');
    const taskReq = taskIndex.openCursor(IDBKeyRange.only(id));
    taskReq.onsuccess = (event) => {
      const cursor = event.target.result;
      if (cursor) { cursor.delete(); cursor.continue(); }
    };

    // Delete files
    const fileStore = tx.objectStore('files');
    const fileIndex = fileStore.index('sessionId');
    const fileReq = fileIndex.openCursor(IDBKeyRange.only(id));
    fileReq.onsuccess = (event) => {
      const cursor = event.target.result;
      if (cursor) { cursor.delete(); cursor.continue(); }

    return new Promise((resolve, reject) => {

      tx.onerror = () => reject(tx.error);
    });
  }

  }

  async getMessages(sessionId) {
    return new Promise((resolve, reject) => {

      const results = [];
      req.onsuccess = (event) => {
        const cursor = event.target.result;
        if (cursor) {
          results.push(cursor.value);
          cursor.continue();
        } else {
          resolve(results);
        }
      };
      req.onerror = () => reject(req.error);
    });
  }

  // ===== Outputs =====

  async saveOutput(sessionId, type, content) {
    const output = {

      createdAt: Date.now(),
    };
    const id = await this._request(this._tx('outputs', 'readwrite'), 'add', output);
    return { ...output, id };
  }

  async getOutputs(sessionId) {
    return new Promise((resolve, reject) => {

        }

  async updateTask(sessionId, taskId, updates) {

<script>
/**
 * Echo Tools Module
 * Parses tool calls from LLM replies and executes them
 * Tools: web_search, generate_file, update_task, save_capability, open_url
 */

class EchoTools {
  constructor(memory) {
    this.memory = memory;
    this.onTaskUpdate = null;
    this.onFileGenerated = null;
    this.onCapabilitySaved = null;
    this.onSearchResult = null;
  }

  /**
   * Parse tool calls from LLM reply
   * @param {string} reply - LLM reply text
   * @returns {Array} - array of { tool, params }
   */
  parseToolCalls(reply) {
    const toolCalls = [];
    const regex = /<!-- ECHO_TOOL:\s*(\w+)\s*-->([\s\S]*?)<!-- ECHO_TOOL_END -->/g;
    let match;

    while ((match = regex.exec(reply)) !== null) {
      const tool = match[1].trim();
      const rawParams = match[2].trim();

      try {
        // Try to parse as JSON
        const params = JSON.parse(rawParams);
        toolCalls.push({ tool, params });
      } catch (e) {
        // If JSON parse fails, try to extract key-value pairs
        console.warn(`[EchoTools] Failed to parse params for ${tool}:`, rawParams);
        toolCalls.push({ tool, params: { raw: rawParams } });
      }
    }

    return toolCalls;
  }

  /**
   * Execute a single tool call
   * @param {Object} toolCall - { tool, params }
   * @param {string} sessionId - current session ID
   * @returns {Object} - { success, result, message }
   */
  async executeToolCall(toolCall, sessionId) {
    const { tool, params } = toolCall;

    try {
      switch (tool) {
        case 'web_search':
          return await this.webSearch(params);
        case 'generate_file':
          return await this.generateFile(params, sessionId);
        case 'update_task':
          return await this.updateTask(params, sessionId);
        case 'save_capability':
          return await this.saveCapability(params);
        case 'open_url':
          return await this.openUrl(params);
        default:
          return { success: false, result: null, message: `未知工具: ${tool}` };
      }
    } catch (e) {
      return { success: false, result: null, message: `工具执行错误: ${e.message}` };
    }
  }

  /**
   * Execute multiple tool calls
   * @param {Array} toolCalls - array of { tool, params }
   * @param {string} sessionId - current session ID
   * @returns {Array} - array of results
   */
  async executeToolCalls(toolCalls, sessionId) {
    const results = [];
    for (const tc of toolCalls) {
      const result = await this.executeToolCall(tc, sessionId);
      results.push({ tool: tc.tool, params: tc.params, ...result });
    }
    return results;
  }

  /**
   * Web search - opens search in new tab
   */
  async webSearch(params) {
    const query = params.query || params.q || '';
    if (!query) {
      return { success: false, result: null, message: '搜索关键词为空' };
    }

    const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
    
    // Open in new tab
    window.open(searchUrl, '_blank');

    // Notify callback
    if (this.onSearchResult) {
      this.onSearchResult({ query, url: searchUrl });
    }

    return {
      success: true,
      result: { url: searchUrl, query },
      message: `已为你打开搜索: ${query}`,
    };
  }

  /**
   * Generate file - creates downloadable file and saves to memory
   */
  async generateFile(params, sessionId) {
    const { filename, language, description, content } = params;

    if (!filename || !content) {
      return { success: false, result: null, message: '文件名或内容为空' };
    }

    // Create download
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);

    // Save to memory
    if (sessionId && this.memory) {
      await this.memory.saveFile(sessionId, filename, language || 'text', description || '', content);
    }

    // Notify callback
    if (this.onFileGenerated) {
      this.onFileGenerated({ filename, language, description, content });
    }

    return {
      success: true,
      result: { filename, language, description },
      message: `已生成文件: ${filename}`,
    };
  }

  /**
   * Update task status on the task board
   */
  async updateTask(params, sessionId) {
    const { task_id, status, note } = params;

    if (!task_id || !status) {
      return { success: false, result: null, message: '任务ID或状态为空' };
    }

    const validStatuses = ['pending', 'in_progress', 'completed', 'blocked'];
    if (!validStatuses.includes(status)) {
      return { success: false, result: null, message: `无效状态: ${status}` };
    }

    // Update in memory
    if (sessionId && this.memory) {
      await this.memory.updateTask(sessionId, task_id, { status, note: note || '' });
    }

    // Notify callback for UI update
    if (this.onTaskUpdate) {
      this.onTaskUpdate({ taskId: task_id, status, note: note || '' });
    }

    const statusLabels = {
      pending: '待执行',
      in_progress: '执行中',
      completed: '已完成',
      blocked: '已阻塞',
    };

    return {
      success: true,
      result: { taskId: task_id, status, note },
      message: `任务 ${task_id} 状态更新为: ${statusLabels[status] || status}`,
    };
  }

  /**
   * Save capability to the capability library
   */
  async saveCapability(params) {
    const { name, type, scenario, steps, notes } = params;

    if (!name) {
      return { success: false, result: null, message: '能力名称为空' };
    }

    let id = null;
    if (this.memory) {
      const saved = await this.memory.saveCapability(name, type, scenario, steps, notes);
      id = saved.id;
    }

    // Notify callback
    if (this.onCapabilitySaved) {
      this.onCapabilitySaved({ name, type, scenario, steps, id });
    }

    return {
      success: true,
      result: { name, type, id },
      message: `能力 "${name}" 已保存到能力库`,
    };
  }

  /**
   * Open URL in new tab
   */
  async openUrl(params) {
    const { url, description } = params;

    if (!url) {
      return { success: false, result: null, message: 'URL 为空' };
    }

    window.open(url, '_blank');

    return {
      success: true,
      result: { url, description },
      message: `已打开链接: ${description || url}`,
    };
  }

  /**
   * Format tool results for LLM context
   * @param {Array} results - array of tool execution results
   * @returns {string} - formatted string for LLM
   */
  formatToolResults(results) {
    if (!results || results.length === 0) return '';

    const lines = ['[工具执行结果]'];
    for (const r of results) {
      lines.push(`- ${r.tool}: ${r.success ? '成功' : '失败'} - ${r.message}`);
    }
    return lines.join('\n');
  }
}

// Export as global
window.EchoTools = EchoTools;
</script>

  voice = new EchoVoice();
  memory = new EchoMemory();
  tools = new EchoTools(memory);

  // Initialize memory
  try {
    await memory.init();
    console.log('[Echo] Memory initialized');
  } catch (e) {
    console.warn('[Echo] Memory init failed:', e);
  }

  // Setup voice callbacks
  voice.setStateChangeCallback((state) => {
    updateVoiceUI(state);
  });

  // Setup tools callbacks
  tools.onTaskUpdate = ({ taskId, status, note }) => {
    updateTaskInUI(taskId, status, note);
    refreshTaskBoard();
    setIslandState('tool', `任务 ${taskId} → ${status === 'completed' ? '完成' : status === 'in_progress' ? '进行中' : status}`, `更新任务: ${taskId} = ${status}`);

    // 调度日志：记录任务派发与质量检查
    const task = currentTasks.find(t => t.taskId === taskId);
    const executor = (task && task.executor) ? task.executor : '执行Agent';
    if (status === 'in_progress') {
      currentDispatchTaskId = taskId;
      addDispatchEntry({ type: 'dispatch', taskId, executor, action: '开始执行', status: 'checking' });
      setIslandState('tool', `派给 ${executor}: ${taskId}`, `调度: ${taskId} 开始执行`);
    } else if (status === 'completed') {
      addDispatchEntry({ type: 'check', taskId, executor: 'Echo', action: '质量检查通过', status: 'success' });
      setIslandState('success', `质量检查通过: ${taskId}`, `质检: ${taskId} 通过`);
    }
  };
  tools.onFileGenerated = (fileInfo) => {
    currentFiles.push(fileInfo);
    refreshFileList();
    setIslandState('success', `文件 ${fileInfo.filename} 已生成`, `生成文件: ${fileInfo.filename}`);

    // 调度日志：generate_file 派发 + 返回结果
    const taskId = currentDispatchTaskId || 'T?';
    addDispatchEntry({ type: 'dispatch', taskId, executor: '执行Agent', action: `生成文件: ${fileInfo.filename}`, status: 'checking' });
    setIslandState('tool', `派给执行Agent: 生成 ${fileInfo.filename}`, `调度: 生成 ${fileInfo.filename}`);
    addDispatchEntry({ type: 'result', taskId, executor: '执行Agent', action: `返回: ${fileInfo.filename}`, status: 'success', detail: '文件已生成' });
  };
  tools.onCapabilitySaved = (capInfo) => {
    refreshCapabilityList();
    setIslandState('success', `能力 ${capInfo.name} 已沉淀`, `沉淀能力: ${capInfo.name}`);
  };
  tools.onSearchResult = ({ query, url }) => {
    addMessage('tool-result', `[web_search] 已打开搜索: "${query}"`);
    setIslandState('tool', `搜索: ${query}`, `正在搜索: ${query}`);
  };

  // Enable voice mode by default (voice-first interaction)
  voiceMode = true;
  voiceToggleEl.classList.add('active');
  voiceToggleLabelEl.textContent = '语音开';
  voice.setVoiceEnabled(true);
  voiceBtn.classList.add('voice-on');
  inputEl.placeholder = '说话或打字，我都在听...';

  // Load sessions and capabilities
  await refreshSessionList();
  await refreshCapabilityList();

  // Create initial session
  await createNewSession();

  // Focus input
  inputEl.focus();

  // Show settings on first load if no API key
  if (!localStorage.getItem('echo_api_key')) {
    openSettings();
  }
}

// ===== 输入框自适应高度 =====
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ===== 能力匹配 =====
async function findMatchingCapability(userInput) {
  if (!memory.db) {
    // Try to initialize if not already done
    if (memory.init) {
      try { await memory.init(); } catch (e) { return null; }
    }
    if (!memory.db) return null;
  }
  const allCaps = await memory.getAllCapabilities();
  if (!allCaps || allCaps.length === 0) return null;

  const inputLower = userInput.toLowerCase();
  let bestMatch = null;
  let bestScore = 0;

  for (const cap of allCaps) {
    let score = 0;
    const scenario = (cap.scenario || '').toLowerCase();
    const name = (cap.name || '').toLowerCase();

    // Check keyword overlap (split by spaces, commas, Chinese punctuation)
    const keywords = scenario.split(/[\s,，、]+/).filter(k => k.length > 1);
    for (const kw of keywords) {
      if (inputLower.includes(kw.toLowerCase())) score += 2;
    }

    // Check name overlap
    if (inputLower.includes(name)) score += 3;

    // Chinese text matching: extract 2-4 char substrings from scenario
    // and check if they appear in the input
    if (scenario.length > 4) {
      const extractedTerms = new Set();
      // Extract meaningful 2-char and 3-char substrings
      for (let len = 2; len <= 4; len++) {
        for (let i = 0; i <= scenario.length - len; i++) {
          const sub = scenario.substring(i, i + len);
          // Skip substrings that are pure punctuation or too generic
          if (/^[a-z0-9]+$/.test(sub) && sub.length < 3) continue;
          extractedTerms.add(sub);
        }
      }
      for (const term of extractedTerms) {
        if (inputLower.includes(term)) score += 1;
      }
    }

    if (score > bestScore) {
      bestScore = score;
      bestMatch = cap;
    }
  }

  return bestScore >= 3 ? bestMatch : null;
}

// ===== 能力复用标识 =====
function showCapReuseBadge(capName) {
  // Remove existing badge if any
  const existing = document.querySelector('.cap-reuse-badge');
  if (existing) existing.remove();

  const badge = document.createElement('div');
  badge.className = 'cap-reuse-badge';
  badge.innerHTML = `<span>⚡ 基于沉淀能力: ${escapeHtml(capName)}</span>`;
  messagesEl.insertBefore(badge, messagesEl.firstChild);
}

// ===== 发送消息 =====
async function sendMessage(autoText) {
  const text = autoText || inputEl.value.trim();
  if (!text || isWaiting) return;

  // Check API key (standalone mode)
  const apiKey = localStorage.getItem('echo_api_key');
  if (!apiKey) {
    alert('请点击右上角「设置」按钮，配置你的 DeepSeek API Key 后再开始对话。');
    openSettings();
    return;
  }

  // Hide quick start
  const qs = document.getElementById('quickStart');
  if (qs) qs.classList.add('hidden');

  // Add user message (skip if auto-continue to avoid duplicate display)
  if (!autoText) {
    addMessage('user', escapeHtml(text));
    messages.push({ role: 'user', content: text });

    // Save to memory
    if (currentSessionId && memory.db) {
      await memory.addMessage(currentSessionId, 'user', text);
    }

    // Clear input
    inputEl.value = '';
    inputEl.style.height = 'auto';
  }

  // Clear options
  optionsEl.innerHTML = '';

  // Waiting state
  isWaiting = true;
  sendBtn.disabled = true;
  voiceBtn.disabled = true;
  setIslandState('thinking', '思考中...', '正在思考...');
  const loadingMsg = addMessage('echo', '<div class="loading-dots"><span></span><span></span><span></span></div>');

  // Timeout (60s for tool-heavy responses)
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 60000);

  try {
    // Get system prompt
    const systemPrompt = await getSystemPrompt();
    const apiMessages = [{ role: 'system', content: systemPrompt }, ...messages];

    // Check for matching capability on first message
    if (messages.length <= 1) {
      const matchedCap = await findMatchingCapability(text);
      if (matchedCap) {
        const capContext = `【能力复用】检测到匹配的沉淀能力：「${matchedCap.name}」（场景：${matchedCap.scenario}）。

流程步骤：
${(matchedCap.steps || []).map((s, i) => `${i + 1}. ${s}`).join('\n')}

${matchedCap.insights ? `经验教训：\n${matchedCap.insights.map(i => `- ${i}`).join('\n')}` : ''}

请基于这个能力模板快速推进：跳过模板中已有默认答案的问题，只针对本次需求的差异部分追问。`;

        // Insert as system message after the main system prompt
        apiMessages.splice(1, 0, { role: 'system', content: capContext });

        // Show notification to user
        addMessage('system', `检测到匹配能力「${matchedCap.name}」，将基于此经验快速推进。`);

        // Show capability reuse badge
        showCapReuseBadge(matchedCap.name);
      }
    }

    // Direct API call (standalone mode - always direct)
    const response = await fetch(DIRECT_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: apiMessages,
        temperature: 0.7,
        max_tokens: 4096,
      }),
      signal: controller.signal,
    });
    const data = await response.json();

    clearTimeout(timeoutId);

    if (data.error) throw new Error(data.error);

    const reply = data.choices?.[0]?.message?.content || '（无回复）';

    // Remove loading
    loadingMsg.remove();

    // Parse reply
    const { chatText, outputs, options, phase, toolCalls } = parseReply(reply);

    // Display chat text
    if (chatText) {
      addMessage('echo', renderMarkdown(chatText));
      // Voice output
      if (voiceMode && voice.isTTSSupported()) {
        voice.speak(chatText);
      }
    }

    // Display options
    if (options.length > 0) {
      renderOptions(options);
    }

    // Update outputs
    if (outputs.length > 0) {
      renderOutputs(outputs);
      // Save outputs to memory
      if (currentSessionId && memory.db) {
        for (const out of outputs) {
          await memory.saveOutput(currentSessionId, out.type, out.content);
        }
      }
      // Auto-parse tasks from plan document or task tree and initialize task board
      const planOutput = outputs.find(o => o.type === 'PLAN_DOCUMENT');
      const taskTreeOutput = outputs.find(o => o.type === 'TASK_TREE');
      if (planOutput) {
        await initTaskBoardFromTree(planOutput.content);
      } else if (taskTreeOutput) {
        await initTaskBoardFromTree(taskTreeOutput.content);
      }
    }

    // Update phase
    if (phase !== null) {
      updatePhase(phase);
      if (currentSessionId && memory.db) {
        await memory.updateSession(currentSessionId, { phase });
      }
    }

    // Execute tool calls
    if (toolCalls.length > 0) {
      const results = await tools.executeToolCalls(toolCalls, currentSessionId);

      // Display tool results
      for (const r of results) {
        if (r.message) {
          addMessage('tool-result', `[${r.tool}] ${r.message}`);
        }
      }

      // If there were tool calls, send results back to LLM for next step
      if (results.length > 0) {
        const toolResultText = tools.formatToolResults(results);
        messages.push({ role: 'assistant', content: reply });
        messages.push({ role: 'user', content: toolResultText + '\n\n请继续推进任务。' });

        // Auto-continue after tool execution
        if (results.some(r => r.success)) {
          setTimeout(() => sendMessage(toolResultText + '\n\n请继续推进任务。'), 1500);
        }
      }
    }

    // Save to history
    if (!toolCalls.length) {
      messages.push({ role: 'assistant', content: reply });
    }

    // Save assistant message to memory
    if (currentSessionId && memory.db) {
      await memory.addMessage(currentSessionId, 'assistant', reply);
    }

    // Update session title if first message
    if (messages.length === 2 && currentSessionId && memory.db) {
      const title = text.length > 30 ? text.slice(0, 30) + '...' : text;
      await memory.updateSession(currentSessionId, { title });
      await refreshSessionList();
    }

  } catch (error) {
    loadingMsg.remove();
    let hint = '';
    if (error.name === 'AbortError') {
      hint = '请求超时（60秒），请检查网络连接后重试。';
    } else if (error.message.includes('Failed to fetch')) {
      hint = '无法连接到 DeepSeek API。请检查网络连接，并确认 API Key 有效。<br>点击右上角「设置」按钮重新配置。';
    } else {
      hint = `${escapeHtml(error.message)}<br><br>请检查网络连接或 API 配置。`;
    }
    addMessage('echo', `<strong style="color:var(--red)">出错了：</strong>${hint}`);
    setIslandState('error', '出错了');
  } finally {
    isWaiting = false;
    sendBtn.disabled = false;
    voiceBtn.disabled = false;
    inputEl.focus();
    // Set island to idle unless a tool state is active
    if (islandState !== 'tool' && islandState !== 'success' && islandState !== 'voice') {
      setIslandState('idle', 'Echo 就绪');
    }
    updateIslandStats();
  }
}

// ===== 获取系统提示词 =====
let cachedSystemPrompt = '';
async function getSystemPrompt() {
  if (cachedSystemPrompt) return cachedSystemPrompt;

  // Try to fetch external file first (works when served from echo/ root)
  try {
    const response = await fetch('../core/system-prompt.md');
    if (response.ok) {
      cachedSystemPrompt = await response.text();
      return cachedSystemPrompt;
    }
  } catch (e) {
    // Fetch failed, fall through to embedded prompt
  }

  // Fallback: use embedded FULL system prompt (not condensed)
  const embedded = document.getElementById('embedded-system-prompt');
  if (embedded && embedded.textContent.trim()) {
    cachedSystemPrompt = embedded.textContent.trim();
    return cachedSystemPrompt;
  }

  // Ultimate fallback: condensed prompt
  cachedSystemPrompt = `你是 Echo，一个元智能体（meta-agent）。你的核心能力是：精准把握用户需求 → 深度挖掘 → 拆分任务 → 写长计划 → 调度执行 → 监督 → 沉淀。你不是执行者，你是调度者。收到需求后先追问挖掘，不直接给方案。用标记区分产出物：<!-- ECHO_OUTPUT: REQUIREMENT_CARD -->等。详见完整系统提示词。`;
  return cachedSystemPrompt;
}

// ===== 解析 LLM 回复 =====
function parseReply(reply) {
  let chatText = reply;
  const outputs = [];
  const options = [];
  let phase = null;
  const toolCalls = [];

  // Parse phase
  const phaseMatch = reply.match(/<!-- ECHO_PHASE:\s*(.+?)\s*-->/);
  if (phaseMatch) {
    const phaseName = phaseMatch[1].trim();
    const phaseMap = {
      '需求挖掘': 0, '入口分流': 0,
      '任务拆分': 1, '拆分': 1,
      '计划生成': 2, '计划': 2,
      '编排调度': 3, '编排': 3,
      '能力沉淀': 4, '沉淀': 4,
    };
    for (const [key, val] of Object.entries(phaseMap)) {
      if (phaseName.includes(key)) { phase = val; break; }
    }
  }

  // Parse outputs
  const outputRegex = /<!-- ECHO_OUTPUT:\s*(\w+)\s*-->([\s\S]*?)<!-- ECHO_OUTPUT_END -->/g;
  let match;
  while ((match = outputRegex.exec(reply)) !== null) {
    outputs.push({ type: match[1], content: match[2].trim() });
  }

  // Parse options
  const optionsMatch = reply.match(/<!-- ECHO_OPTIONS_START -->([\s\S]*?)<!-- ECHO_OPTIONS_END -->/);
  if (optionsMatch) {
    const optionRegex = /###\s*选项\d*[：:]\s*(.+?)(?=###\s*选项|\Z)/gs;
    let optMatch;
    while ((optMatch = optionRegex.exec(optionsMatch[1])) !== null) {
      const fullText = optMatch[1].trim();
      const lines = fullText.split('\n');
      const name = lines[0].trim();
      let desc = '', pros = '', cons = '', fit = '';
      for (const line of lines.slice(1)) {
        const trimmed = line.trim();
        if (trimmed.startsWith('- 描述:') || trimmed.startsWith('- 描述：')) desc = trimmed.replace(/^-\s*描述[：:]\s*/, '');
        else if (trimmed.startsWith('- 利:') || trimmed.startsWith('- 利：')) pros = trimmed.replace(/^-\s*利[：:]\s*/, '');
        else if (trimmed.startsWith('- 弊:') || trimmed.startsWith('- 弊：')) cons = trimmed.replace(/^-\s*弊[：:]\s*/, '');
        else if (trimmed.startsWith('- 适合:') || trimmed.startsWith('- 适合：')) fit = trimmed.replace(/^-\s*适合[：:]\s*/, '');
      }
      options.push({ name, desc, pros, cons, fit });
    }
  }

  // Parse tool calls
  const toolCallsParsed = tools.parseToolCalls(reply);
  toolCalls.push(...toolCallsParsed);

  // Clean chat text: remove all markers
  chatText = chatText
    .replace(/<!-- ECHO_PHASE:\s*.+?\s*-->/g, '')
    .replace(/<!-- ECHO_OUTPUT:\s*\w+\s*-->[\s\S]*?<!-- ECHO_OUTPUT_END -->/g, '')
    .replace(/<!-- ECHO_OPTIONS_START -->[\s\S]*?<!-- ECHO_OPTIONS_END -->/g, '')
    .replace(/<!-- ECHO_OPTIONS_START -->[\s\S]*$/g, '')
    .replace(/<!-- ECHO_TOOL:\s*\w+\s*-->[\s\S]*?<!-- ECHO_TOOL_END -->/g, '')
    .trim();

  return { chatText, outputs, options, phase, toolCalls };
}

// ===== 渲染选项 =====
function renderOptions(options) {
  optionsEl.innerHTML = '';
  for (const opt of options) {
    const card = document.createElement('div');
    card.className = 'option-card';
    card.innerHTML = `
      <h4>${escapeHtml(opt.name)}</h4>
      ${opt.desc ? `<p>${escapeHtml(opt.desc)}</p>` : ''}
      ${opt.pros ? `<p class="pros">✓ ${escapeHtml(opt.pros)}</p>` : ''}
      ${opt.cons ? `<p class="cons">✗ ${escapeHtml(opt.cons)}</p>` : ''}
      ${opt.fit ? `<p style="color:var(--ink-secondary);font-size:12px">适合：${escapeHtml(opt.fit)}</p>` : ''}
    `;
    card.onclick = () => {
      inputEl.value = `我选「${opt.name}」`;
      inputEl.focus();
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    };
    optionsEl.appendChild(card);
  }
}

// ===== 渲染产出物 =====
function renderOutputs(outputs) {
  currentOutputs = outputs;
  outputsBadgeEl.textContent = outputs.length;

  if (currentRightTab !== 'outputs') switchRightTab('outputs');

  rightContentEl.innerHTML = '';
  outputSubTabsEl.innerHTML = '';
  outputSubTabsEl.style.display = 'none';

  const titleMap = {
    'REQUIREMENT_CARD': '需求理解卡',
    'TASK_TREE': '任务树',
    'PLAN_DOCUMENT': '执行计划',
    'ORCHESTRATION': '编排方案',
    'SEDIMENT': '能力沉淀',
  };

  if (outputs.length === 0) {
    rightContentEl.innerHTML = '<div class="right-empty"><div class="icon">◇</div><p>暂无产出物</p></div>';
    return;
  }

  if (outputs.length === 1) {
    const output = outputs[0];
    const card = document.createElement('div');
    card.className = 'output-card';
    card.innerHTML = renderMarkdown(output.content);
    rightContentEl.appendChild(card);
    addOutputActions(card, output);
    return;
  }

  // Multiple outputs: sub-tabs
  outputSubTabsEl.style.display = 'flex';
  outputs.forEach((output, i) => {
    const tab = document.createElement('button');
    tab.className = 'output-sub-tab' + (i === 0 ? ' active' : '');
    tab.textContent = titleMap[output.type] || `产出物${i+1}`;
    tab.onclick = () => switchOutputSubTab(i);
    outputSubTabsEl.appendChild(tab);
  });
  switchOutputSubTab(0);
}

function switchOutputSubTab(index) {
  const output = currentOutputs[index];
  if (!output) return;

  outputSubTabsEl.querySelectorAll('.output-sub-tab').forEach((t, i) => {
    t.classList.toggle('active', i === index);
  });

  rightContentEl.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'output-card';
  card.innerHTML = renderMarkdown(output.content);
  rightContentEl.appendChild(card);
  addOutputActions(card, output);
}

function addOutputActions(card, output) {
  const actions = document.createElement('div');
  actions.style.cssText = 'margin-top:12px;display:flex;gap:8px;';

  const downloadBtn = document.createElement('button');
  downloadBtn.textContent = '下载 .md';
  downloadBtn.style.cssText = 'font-size:12px;padding:4px 10px;background:var(--bg);border:1px solid var(--border);color:var(--ink-secondary);border-radius:4px;cursor:pointer;';
  downloadBtn.onclick = () => downloadMarkdown(output.content, `echo-${output.type.toLowerCase()}.md`);
  actions.appendChild(downloadBtn);

  card.appendChild(actions);
}

// ===== 任务看板 =====

/**
 * Parse tasks from TASK_TREE or PLAN_DOCUMENT output content
 * Handles two formats:
 * 1. Task card format: ### 任务 T1: 标题 + bullet points (from PLAN_DOCUMENT)
 * 2. Tree format: ├── T1: 标题 (from TASK_TREE)
 */
function parseTasksFromTree(content) {
  const tasks = [];

  // Try format 1: Task card format (### 任务 T1: 标题)
  const parts = content.split(/(?=^###\s+)/m);

  for (const part of parts) {
    const headerMatch = part.match(/^###\s*(?:任务\s*)?([A-Z]?\d+(?:\.\d+)*)\s*[：:]\s*(.+)/m);
    if (!headerMatch) continue;

    const taskId = headerMatch[1].trim();
    const title = headerMatch[2].trim();

    // Extract executor
    let executor = '';
    const execMatch = part.match(/\*\*建议执行者\*\*\s*[：:]\s*(.+)/);
    if (execMatch) {
      executor = execMatch[1].trim();
    } else {
      const execMatch2 = part.match(/[-*]\s*执行者\s*[：:]\s*(.+)/);
      if (execMatch2) executor = execMatch2[1].trim();
    }

    // Extract complexity
    let complexity = 'mid';
    const complexMatch = part.match(/\*\*复杂度\*\*\s*[：:]\s*(.+)/);
    if (complexMatch) {
      const c = complexMatch[1].trim();
      if (c.includes('低')) complexity = 'low';
      else if (c.includes('高')) complexity = 'high';
    }

    tasks.push({
      taskId,
      title,
      executor,
      status: 'pending',
      complexity,
      note: '',
    });
  }

  // If task cards found, return them
  if (tasks.length > 0) return tasks;

  // Try format 2: Tree format (├── T1: 标题 or └── T1: 标题)
  const treeLines = content.split('\n');
  const treeRegex = /[├└]\s*─*\s*([A-Z]?\d+(?:\.\d+)*)\s*[：:]\s*(.+)/;

  for (const line of treeLines) {
    const match = line.match(treeRegex);
    if (!match) continue;

    const taskId = match[1].trim();
    const title = match[2].trim();

    tasks.push({
      taskId,
      title,
      executor: '',
      status: 'pending',
      complexity: 'mid',
      note: '',
    });
  }

  // Also try root node: "Title (T0)" format
  if (tasks.length === 0) {
    const rootMatch = content.match(/([A-Z]?\d+(?:\.\d+)*)\s*\)/);
    if (rootMatch) {
      const rootLine = content.split('\n').find(l => l.includes(rootMatch[1]));
      if (rootLine) {
        const titleMatch = rootLine.match(/^(.+?)\s*\([A-Z]?\d+/);
        tasks.push({
          taskId: rootMatch[1],
          title: titleMatch ? titleMatch[1].trim() : '根任务',
          executor: '',
          status: 'pending',
          complexity: 'mid',
          note: '',
        });
      }
    }
  }

  return tasks;
}

/**
 * Initialize task board from parsed task tree
 * Only adds tasks that don't already exist (preserves Phase 3 status updates)
 */
async function initTaskBoardFromTree(taskTreeContent) {
  const parsedTasks = parseTasksFromTree(taskTreeContent);
  if (parsedTasks.length === 0) return;

  // Get existing tasks to avoid overwriting status updates
  let existingTasks = [];
  if (currentSessionId && memory.db) {
    existingTasks = await memory.getTasks(currentSessionId);
  }
  const existingIds = new Set(existingTasks.map(t => t.taskId));

  // Save new tasks that don't exist yet
  let newCount = 0;
  for (const task of parsedTasks) {
    if (!existingIds.has(task.taskId)) {
      if (currentSessionId && memory.db) {
        await memory.saveTask(currentSessionId, task.taskId, task.title, task.executor, 'pending', task.complexity, '');
      }
      newCount++;
    }
  }

  // Update UI if any new tasks were added
  if (newCount > 0) {
    await refreshTaskBoard();
    console.log(`[Echo] Task board initialized: ${newCount} new tasks (total: ${parsedTasks.length})`);
  }
}

  const board = document.createElement('div');

  const sorted = [...currentTasks].sort((a, b) => (statusOrder[a.status] || 1) - (statusOrder[b.status] || 1));

  for (const task of sorted) {

      pending: '待执行',

    };

    card.innerHTML = `

}

function renderDispatchLog() {
  if (dispatchLog.length === 0) {
    rightContentEl.innerHTML = '<div class="right-empty"><div class="icon">→</div><p>调度日志会记录 Echo 向执行 Agent 派发任务、接收返回结果以及质量检查的全过程。</p></div>';
    return;
  }

  const icons = { dispatch: '→', result: '✓', check: '✓' };
  const statusLabels = { checking: '检查中', success: '通过', fail: '失败' };

  const log = document.createElement('div');
  log.className = 'dispatch-log';

  for (const entry of dispatchLog) {
    const time = entry.time instanceof Date ? entry.time : new Date(entry.time);
    const hh = String(time.getHours()).padStart(2, '0');
    const mm = String(time.getMinutes()).padStart(2, '0');
    const text = buildDispatchText(entry);

    const row = document.createElement('div');
    row.className = `dispatch-entry ${entry.type}`;
    row.innerHTML = `
      <span class="dispatch-time">${hh}:${mm}</span>
      <span class="dispatch-icon">${icons[entry.type] || '·'}</span>
      <span class="dispatch-text">${escapeHtml(text)}</span>
      <span class="dispatch-status ${entry.status}">${statusLabels[entry.status] || entry.status}</span>
    `;
    log.appendChild(row);
  }

  rightContentEl.innerHTML = '';
  rightContentEl.appendChild(log);
}

function buildDispatchText(entry) {
  switch (entry.type) {
    case 'dispatch':
      return `派给${entry.executor}: ${entry.action}`;
    case 'result':
      return `${entry.executor}返回: ${entry.action.replace(/^返回: /, '')}${entry.detail ? ' (' + entry.detail + ')' : ''}`;
    case 'check':
      return `${entry.executor}: ${entry.action} [${entry.taskId}]`;
    default:
      return entry.action || '';
  }
}

let islandExpanded = false;
let islandState = 'idle'; // idle, thinking, tool, voice, success, error
let islandStateTimer = null;

function toggleIsland() {
  // In compact mode, clicking the island expands the widget back to full size
  if (document.body.classList.contains('compact-mode')) {
    toggleCompactMode(false);
    return;
  }
  islandExpanded = !islandExpanded;
  const pill = document.getElementById('islandPill');
  if (islandExpanded) {
    pill.classList.remove('collapsed');
    pill.classList.add('expanded');
    updateIslandStats();
  } else {
    pill.classList.remove('expanded');
    pill.classList.add('collapsed');
  }
}

function setIslandState(state, label, activityText) {
  islandState = state;
  const dot = document.getElementById('islandDot');
  const dotExpanded = document.getElementById('islandExpandedDot');
  const labelEl = document.getElementById('islandLabel');
  const activity = document.getElementById('islandActivity');
  const activityTextEl = document.getElementById('islandActivityText');

  // State classes
  const stateClasses = ['active', 'thinking', 'success', 'error', 'voice'];
  stateClasses.forEach(c => {
    dot.classList.remove(c);
    dotExpanded.classList.remove(c);
  });

  const stateMap = {
    'idle': [],
    'thinking': ['thinking'],
    'tool': ['active'],
    'voice': ['voice'],
    'success': ['success'],
    'error': ['error'],
  };

  (stateMap[state] || []).forEach(c => {
    dot.classList.add(c);
    dotExpanded.classList.add(c);
  });

  // Update label
  if (label) {
    labelEl.textContent = label;
  }

  // Update activity indicator in expanded view
  if (activityText && activity) {
    activity.style.display = 'flex';
    activityTextEl.textContent = activityText;
  } else if (activity) {
    activity.style.display = 'none';
  }

  // Auto-revert success/error after 3s
  if (state === 'success' || state === 'error') {
    const pill = document.getElementById('islandPill');
    pill.classList.add('flash');
    setTimeout(() => pill.classList.remove('flash'), 600);

    if (islandStateTimer) clearTimeout(islandStateTimer);
    islandStateTimer = setTimeout(() => {
      setIslandState('idle', 'Echo 就绪');
    }, 3000);
  }
}

function updatePhase(phase) {
  currentPhase = phase;
  const phaseNames = ['需求挖掘', '任务拆分', '计划生成', '编排调度', '能力沉淀'];

  // Update timeline items
  phaseItems.forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < phase) el.classList.add('done');
    else if (i === phase) el.classList.add('active');
  });

  // Update timeline labels
  phaseLabels.forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < phase) el.classList.add('done');
    else if (i === phase) el.classList.add('active');
  });

  // Update island collapsed view
  const islandPhaseTag = document.getElementById('islandPhaseTag');
  if (islandPhaseTag) {
    islandPhaseTag.textContent = phase === 0 ? '待开始' : phaseNames[phase] || `阶段${phase}`;
  }

  // Update island expanded title
  const islandExpandedTitle = document.getElementById('islandExpandedTitle');
  if (islandExpandedTitle) {
    islandExpandedTitle.textContent = phase > 0 ? `Echo · ${phaseNames[phase]}` : 'Echo · 元智能体';
  }

  updateIslandStats();
}

// ===== 简单 Markdown 渲染 =====
function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`);

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');

  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)<\/p>/g, '$1');
  html = html.replace(/<p>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<\/p>/g, '$1');
  html = html.replace(/<p>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<\/p>/g, '$1');

  return html;
}

// ===== 下载 Markdown =====
function downloadMarkdown(content, filename) {
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

async function loadSession(sessionId) {
  if (!memory.db) return;

  const session = await memory.getSession(sessionId);
  if (!session) return;

  currentSessionId = sessionId;
  messages = [];
  currentPhase = session.phase || 0;
  currentOutputs = [];
  currentTasks = [];
  currentFiles = [];
  dispatchLog = [];
  currentDispatchTaskId = null;

  // Load messages
  const msgs = await memory.getMessages(sessionId);
  messagesEl.innerHTML = '';

  for (const msg of msgs) {
    if (msg.role === 'user') {
      addMessage('user', escapeHtml(msg.content));
      messages.push({ role: 'user', content: msg.content });
    } else if (msg.role === 'assistant') {
      const { chatText } = parseReply(msg.content);
      if (chatText) {
        addMessage('echo', renderMarkdown(chatText));
      }
      messages.push({ role: 'assistant', content: msg.content });
    }
  }

  // Load outputs
  const outputs = await memory.getOutputs(sessionId);
  for (const out of outputs) {
    currentOutputs.push({ type: out.type, content: out.content });
  }

  // Load tasks
  const tasks = await memory.getTasks(sessionId);
  currentTasks = tasks;

  // If no tasks in memory but PLAN_DOCUMENT or TASK_TREE output exists, auto-parse
  if (tasks.length === 0 && currentOutputs.length > 0) {
    const planOutput = currentOutputs.find(o => o.type === 'PLAN_DOCUMENT');
    const taskTreeOutput = currentOutputs.find(o => o.type === 'TASK_TREE');
    if (planOutput) {
      await initTaskBoardFromTree(planOutput.content);
    } else if (taskTreeOutput) {
      await initTaskBoardFromTree(taskTreeOutput.content);
    }
  }

  // Load files
  const files = await memory.getFiles(sessionId);
  currentFiles = files;

  // Update UI
  updatePhase(currentPhase);
  updateBadges();
  if (currentOutputs.length > 0) renderOutputs(currentOutputs);
  else switchRightTab('outputs');

  await highlightSession(sessionId);
  inputEl.focus();
}

  if (!confirm('确定删除这个对话？')) return;

  await memory.deleteSession(sessionId);

  if (currentSessionId === sessionId) {
    await newConversation();
  }

  await refreshSessionList();
}

    sessionListEl.appendChild(item);
  }
}

  voiceToggleEl.classList.toggle('active', voiceMode);
  voiceToggleLabelEl.textContent = voiceMode ? '语音开' : '语音关';
  voice.setVoiceEnabled(voiceMode);
  voiceBtn.classList.toggle('voice-on', voiceMode);
  inputEl.placeholder = voiceMode ? '说话或打字，我都在听...' : '输入你的需求，或点击麦克风语音输入...';

  if (voiceMode) {
    voiceStatusEl.style.display = 'block';
    voiceStatusEl.textContent = '语音模式已开启，Echo 回复将自动朗读';
    if (!voice.isTTSSupported()) {
      voiceStatusEl.textContent = '当前浏览器不支持语音合成';
    }
    setTimeout(() => { voiceStatusEl.style.display = 'none'; }, 3000);
    setIslandState('voice', '语音模式已开启', '语音模式 · 自动朗读');
  } else {
    voice.stopSpeaking();
    voiceStatusEl.style.display = 'none';
    setIslandState('idle', 'Echo 就绪');
  }
}

function toggleVoiceInput() {
  if (!voice.isSTTSupported()) {
    addMessage('system', '当前浏览器不支持语音识别，请使用 Chrome 或 Edge');
    return;
  }

  if (voice.isListening) {
    voice.stopListening();
    return;
  }

  voiceBtn.classList.add('listening');
  voiceStatusEl.style.display = 'block';
  voiceStatusEl.className = 'voice-status listening';
  voiceStatusEl.textContent = '正在聆听...';

  voice.startListening(
    (text, isFinal) => {
      if (isFinal) {
        inputEl.value = text;
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        voiceBtn.classList.remove('listening');
        voiceStatusEl.style.display = 'none';
        inputEl.focus();
      } else {
        voiceStatusEl.textContent = `正在聆听... ${text}`;
      }
    },
    (error) => {
      voiceBtn.classList.remove('listening');
      voiceStatusEl.style.display = 'block';
      voiceStatusEl.className = 'voice-status';
      voiceStatusEl.textContent = error;
      setTimeout(() => { voiceStatusEl.style.display = 'none'; }, 3000);
    }
  );
}

function updateVoiceUI(state) {
  if (state.listening) {
    voiceBtn.classList.add('listening');
  } else {
    voiceBtn.classList.remove('listening');
  }

  if (state.speaking && voiceMode) {
    voiceStatusEl.style.display = 'block';
    voiceStatusEl.className = 'voice-status speaking';
    voiceStatusEl.textContent = '正在说话...';
  } else if (!state.listening) {
    voiceStatusEl.style.display = 'none';
  }
}

// ===== 设置 =====
function openSettings() {
  document.getElementById('apiKeyInput').value = localStorage.getItem('echo_api_key') || '';
  document.getElementById('apiUrlInput').value = localStorage.getItem('echo_api_url') || '';
  document.getElementById('settingsModal').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}

function saveSettings() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const apiUrl = document.getElementById('apiUrlInput').value.trim();

  if (apiKey) localStorage.setItem('echo_api_key', apiKey);
  else localStorage.removeItem('echo_api_key');

  if (apiUrl) localStorage.setItem('echo_api_url', apiUrl);
  else localStorage.removeItem('echo_api_url');

  closeSettings();
  addMessage('system', '设置已保存');
}

// ===== 紧凑模式 (Compact Mode) =====
function toggleCompactMode(forceState) {
  const enable = (typeof forceState === 'boolean') ? forceState : !document.body.classList.contains('compact-mode');
  document.body.classList.toggle('compact-mode', enable);

  if (enable) {
    // Collapse the island so the widget shows the compact pill
    const pill = document.getElementById('islandPill');
    if (pill) {
      pill.classList.remove('expanded');
      pill.classList.add('collapsed');
      islandExpanded = false;
    }
    setIslandState('idle', 'Echo · 紧凑模式');
  } else {
    setIslandState('idle', 'Echo 就绪');
  }
}

// Global keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Cmd+Shift+E (Mac) / Ctrl+Shift+E (Windows) toggles compact mode
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'E' || e.key === 'e')) {
    e.preventDefault();
    toggleCompactMode();
    return;
  }
  // Escape exits compact mode
  if (e.key === 'Escape' && document.body.classList.contains('compact-mode')) {
    toggleCompactMode(false);
  }
});

// ===== 启动 =====
init();
</script>

<script type="text/markdown" id="embedded-system-prompt">
# Echo 元智能体 · 系统提示词

你是 Echo，一个元智能体（meta-agent）。

## 身份

你是调度者，不是执行者。你收到用户需求后，不会直接动手编码。你会先追问，把需求挖掘清楚，然后拆分成可执行的任务，调度其他 Agent 或工具去执行，监督执行结果，最后沉淀经验。

你知道事情该怎么干——你熟悉 Claude Code、Cursor、Manus、Devin 等顶级 Agent 的工作方式。但你的角色是调度者，不是执行者。需要时你生成调度指令（脚本规格、文件规格），交给执行 Agent 落地。

## 对话风格（极其重要）

你的对话风格借鉴 Pi（heypi.com）——低功耗、温暖、像朋友帮你理思路。

### 铁律

1. **每轮回复不超过 3 句话**。问一个问题，等用户回答，再问下一个。不要一次性抛出多个问题。
2. **对话区不放表格、不放多层列表、不放标题**。表格和结构化内容只放在产出物标记内。对话区只有纯文本——像微信聊天一样。
3. **温暖但不谄媚**。用"明白了""好的""有道理"这种自然的回应，不要用"非常棒！""太好了！"这种夸张表达。
4. **不啰嗦**。问完该问的，不多问一个字。用户回答了就不重复确认。
5. **一次只问一个维度**。不要说"另外还想确认一下..."然后抛出第二个问题。

### 对话示例

错误（报告式）：
你的需求属于模糊需求。我先帮你挖掘清楚。
先确认第一个维度——真实意图：
这次分享的最终目的是什么？是让大家能上手写代码（技能提升），还是让团队评估是否要在项目中使用 async（技术决策），还是别的？
另外，偏好倾向：
你提到偏实战，那整个分享是纯现场写代码演示，还是准备代码示例+讲解穿插？

正确（Pi 式）：
明白了，给团队做 Rust 异步编程分享。你希望分享结束后，大家能达到什么程度？能看懂 async 代码，还是能自己写？

错误（多问题）：
好的，我再确认几个维度：
1. 你的编程经验如何？
2. 每天能投入多少时间？
3. 偏理论还是实战？

正确（一个问题）：
有道理。你目前的编程经验主要在哪些语言？

### 产出物中的结构化内容

表格、多层列表、标题这些结构化内容**只允许出现在产出物标记内**（需求理解卡、任务树、计划文档等）。对话区永远是纯文本短句。

## 核心闭环

理解 → 深度挖掘 → 拆分任务 → 调度执行 → **监督结果** → 沉淀

## 标记格式总览

你的回复中需要用特定标记区分产出物、工具调用和状态更新。

### 产出物标记

- 阶段标记：`<!-- ECHO_PHASE: 需求挖掘 -->`（放在回复开头）
- 选项标记：`<!-- ECHO_OPTIONS_START -->` 和 `<!-- ECHO_OPTIONS_END -->`
- 需求理解卡：`<!-- ECHO_OUTPUT: REQUIREMENT_CARD -->` 和 `<!-- ECHO_OUTPUT_END -->`
- 任务树：`<!-- ECHO_OUTPUT: TASK_TREE -->` 和 `<!-- ECHO_OUTPUT_END -->`
- 计划文档：`<!-- ECHO_OUTPUT: PLAN_DOCUMENT -->` 和 `<!-- ECHO_OUTPUT_END -->`
- 编排方案：`<!-- ECHO_OUTPUT: ORCHESTRATION -->` 和 `<!-- ECHO_OUTPUT_END -->`
- 沉淀产物：`<!-- ECHO_OUTPUT: SEDIMENT -->` 和 `<!-- ECHO_OUTPUT_END -->`

### 工具调用标记

- 网络搜索：`<!-- ECHO_TOOL: web_search -->` 和 `<!-- ECHO_TOOL_END -->`
- 生成文件：`<!-- ECHO_TOOL: generate_file -->` 和 `<!-- ECHO_TOOL_END -->`
- 更新任务状态：`<!-- ECHO_TOOL: update_task -->` 和 `<!-- ECHO_TOOL_END -->`
- 保存能力：`<!-- ECHO_TOOL: save_capability -->` 和 `<!-- ECHO_TOOL_END -->`
- 打开链接：`<!-- ECHO_TOOL: open_url -->` 和 `<!-- ECHO_TOOL_END -->`

标记外的内容是对话文本（短句）。产出物标记内的内容展示在右侧面板。工具调用标记内的内容是 JSON 参数。

### 工具调用格式

`<!-- ECHO_TOOL: generate_file -->`
{"filename": "demo.rs", "language": "rust", "description": "Rust async 示例代码", "content": "async fn main() { ... }"}
`<!-- ECHO_TOOL_END -->`

`<!-- ECHO_TOOL: update_task -->`
{"task_id": "T1", "status": "in_progress", "note": "正在搜索资料"}
`<!-- ECHO_TOOL_END -->`

`<!-- ECHO_TOOL: save_capability -->`
{"name": "tech-talk-prep", "type": "流程模板", "scenario": "技术分享准备", "steps": ["步骤1", "步骤2"], "insights": ["上次经验：时间分配要预留5分钟缓冲"]}
`<!-- ECHO_TOOL_END -->`

### 工具调用时机

- **Phase 1 需求挖掘**：不调用工具，专注对话。
- **Phase 2 任务拆分**：不调用工具，直接生成任务树和计划文档。
- **Phase 3 编排调度**：积极使用工具。每次调用前先在对话中说明调度意图。每次工具返回结果后，**必须检查质量**再推进。
- **Phase 4 能力沉淀**：调用 `save_capability` 保存能力，含本次执行中学到的经验教训。

### 任务状态值

- `pending` - 待执行
- `in_progress` - 执行中
- `completed` - 已完成（已通过监督检查）
- `blocked` - 被阻塞

---

## Phase 0: 入口分流

收到用户需求后，先判断属于哪条路径：

- **明确需求**：有目标 + 约束 + 成功标准 → 直接进入 Phase 1
- **模糊需求**：只有方向，缺少约束 → 先诊断，再进入 Phase 1
- **复杂任务**：涉及多领域或多执行者 → 先粗拆为子项目

大多数需求是模糊需求。判断后用一句话告知用户，然后进入 Phase 1。

---

## Phase 1: 深度需求挖掘

### 目标

挖掘到能写出完整、可执行的计划为止。不靠猜——要么用户明确回答，要么你提方案让用户选。

### 7 维度挖掘表

逐维度挖掘。**一次只问一个维度**。根据用户回答自然过渡到下一个。

| 维度 | 示例问题 | 用户说"不知道"时 |
|------|---------|-----------------|
| 真实意图 | "你做这件事的最终目的是什么？" | 提 2-3 个可能的目标方向 |
| 隐含约束 | "涉及的人/对象是什么背景？" | 列出常见背景选项 |
| 成功标准 | "做完之后你希望达到什么状态？" | 提 2-3 个成功标准方案 |
| 风险点 | "如果资源/时间不够，你会砍哪部分？" | 根据任务类型提常见风险 |
| 资源限制 | "你现有哪些素材/资源？" | 列出通常需要的资源 |
| 时间限制 | "什么时候要交付？每天能投入多少时间？" | 提 2-3 个时间规划方案 |
| 偏好倾向 | "偏理论还是偏实战？偏快速还是偏完善？" | 提 2-3 个风格选项 |

### 方案提议机制（强制）

**当用户说"不知道"/"不确定"/"你看着办"/"没想过"时，你必须给出选项。**

选项必须用 `<!-- ECHO_OPTIONS_START -->` 和 `<!-- ECHO_OPTIONS_END -->` 标记包裹。

格式示例：

好的，我给你几个方向。

`<!-- ECHO_OPTIONS_START -->`
### 选项1: [方案名称]
- 描述: [一句话说明]
- 利: [好处]
- 弊: [代价]
- 适合: [什么情况下选这个]

### 选项2: [方案名称]
- 描述: [一句话说明]
- 利: [好处]
- 弊: [代价]
- 适合: [什么情况下选这个]
`<!-- ECHO_OPTIONS_END -->`

你倾向哪个？

**禁止**：说"我推荐选项A"但不使用标记。禁止跳过标记直接替用户做决定。

### 不靠猜原则

- 每个维度必须明确确认——用户回答或从方案中选择
- 你不能自行假设用户的意图或约束
- 用户回答模糊（如"差不多吧"），追问一次
- 再次模糊，提方案让用户选

### 输出：需求理解卡

所有维度确认后，生成需求理解卡。必须用标记包裹。

`<!-- ECHO_OUTPUT: REQUIREMENT_CARD -->`
## 需求理解卡

### 需求概述
[一句话描述]

### 真实意图
[真正目标]

### 隐含约束
- [约束1]

### 成功标准
- [标准1]

### 风险点

- 可投入: [每日时间]

`<!-- ECHO_OUTPUT_END -->`

生成后问用户："以上理解准确吗？"

用户确认后进入 Phase 2。

---

## Phase 2: 任务拆分与计划生成

### WBS 分解规则

- 自顶向下，每层 3-7 个子任务
- 最多 3 层深度
- 遵循 MECE 原则
- 每个叶子任务可被单个执行者完成

### 任务卡片格式

### 任务 [id]: [标题]
- **目标**: 具体结果
- **建议执行者**: 哪个 Agent/工具/人
- **依赖任务**: 任务 id（无则写"无"）
- **验收标准**: 怎么判断做完了
- **复杂度**: 低/中/高
- **Echo 的调度建议**: 给执行者的关键提示

### 计划文档

必须用 `<!-- ECHO_OUTPUT: PLAN_DOCUMENT -->` 标记包裹。

`<!-- ECHO_OUTPUT: PLAN_DOCUMENT -->`

## 概述
[2-3 句话]

`<!-- ECHO_OUTPUT_END -->`

任务树生成后，前端会自动将任务初始化到任务看板。你不需要手动调用 update_task 初始化。

然后告知用户："计划已生成，看看右侧的任务看板，有需要调整的吗？"

用户确认后进入 Phase 3。

---

## Phase 3: 编排调度

### 调度者身份（强制，不可动摇）

你是调度者，不是执行者。

- 调用 `generate_file` = 给执行 Agent 下达文件生成指令
- 调用 `web_search` = 派搜索 Agent 去调研
- 调用 `update_task` = 更新任务看板状态
- 你不写代码，你写调度指令

**每次调用工具前，必须在对话中说明调度意图**：

正确："把 T2.1 派给执行 Agent，生成 Cargo 项目脚手架。"
然后调用 generate_file。

错误：默默调用 generate_file，不说一句话。

正确："派搜索 Agent 去查 Rust async 最新教程。"
然后调用 web_search。

错误："我来搜索一下。" 然后调用 web_search。

### 执行者映射

| 任务类型 | 执行者 | 调度方式 |
|---------|--------|---------|
| 编码实现 | 执行 Agent | 传入任务卡片 + 规格 |
| 资料调研 | 搜索 Agent | 传入关键词 + 验收标准 |
| 用户决策 | 用户本人 | 呈现选项 + 利弊 |
| 文档撰写 | 执行 Agent | 传入大纲 + 风格要求 |

### 编排方案

进入 Phase 3 后，必须用 `<!-- ECHO_OUTPUT: ORCHESTRATION -->` 标记包裹编排方案。

`<!-- ECHO_OUTPUT: ORCHESTRATION -->`
## 编排方案

### 执行顺序
1. [任务id] → [执行者] - [说明]
2. [任务id] → [执行者] - [说明]

### 并行任务
- [任务id] 和 [任务id] 可并行

### 关键路径
[标注关键路径]

### 调度建议
- [对执行者的建议]
`<!-- ECHO_OUTPUT_END -->`

### 监督结果（强制，不可省略）

**每个任务执行完成后，你必须检查结果质量，再决定是否标记完成。** 这是调度者和执行者的核心区别——执行者干活，调度者验收。

工具执行结果返回后，你的下一步回复必须包含质量检查：

正确流程：
1. 调用 generate_file 生成文件
2. 工具返回结果后，检查内容：
   - "执行 Agent 返回了 [文件名]。我检查了一下：[具体检查内容]。符合验收标准，标记完成。"
   - 或："执行 Agent 返回了 [文件名]。但 [具体问题]，不符合验收标准。我让执行 Agent 调整。"
3. 检查通过后，调用 update_task 设为 completed
4. 检查不通过，说明问题，重新调度或调整

错误流程：
1. 调用 generate_file 生成文件
2. 直接调用 update_task 设为 completed（没有检查）

### 执行节奏

按编排方案的顺序逐个推进。每个任务：
1. 对话中说明调度意图（一句话）
2. 调用工具
3. 工具返回后，检查质量（一句话）
4. 检查通过 → update_task 设为 completed
5. 检查不通过 → 说明问题，重新调度

需要用户决策时，呈现选项让用户选。

---

## Phase 4: 自我沉淀

所有任务完成且用户确认交付后，进入沉淀。

### 路径提取

回顾整个执行路径，识别可复用的步骤序列和**经验教训**：

1. 哪些步骤是通用的（换个类似需求还能用）
2. 哪些步骤是特定的
3. **哪些地方走了弯路**（这次执行中的问题，下次怎么避免）
4. **哪些决策点有默认值**（下次可以跳过的问题）

### 沉淀产物

必须用 `<!-- ECHO_OUTPUT: SEDIMENT -->` 标记包裹。

`<!-- ECHO_OUTPUT: SEDIMENT -->`
## 能力沉淀

### 沉淀名称
[流程名称]

### 沉淀类型
[流程模板 / 提示词模板]

### 适用场景
[什么类型的需求可复用]

### 流程步骤
1. [步骤1]
2. [步骤2]
...

### 关键决策点
- [决策点]: [默认选择 + 可选项]

### 经验教训
- [这次执行中学到的：什么做得好，什么可以改进]

### 可跳过的问题
- [下次遇到类似需求时，这些问题已有默认答案，不需要再问]
`<!-- ECHO_OUTPUT_END -->`

沉淀后调用 `save_capability` 工具保存（含 steps 和 insights 字段），然后告知用户："已沉淀为 [name]，下次类似需求我会基于这个经验快速推进。"

---

## 能力复用机制

当用户开启新对话、提出新需求时，Echo **首先**检查能力库中是否有匹配的沉淀能力。

### 复用流程

1. **识别匹配**：从能力库检索
2. **告知用户**（一句话）："我之前沉淀过 [能力名称]，基于这个经验快速推进。"
3. **跳过已知问题**：沉淀能力中"可跳过的问题"直接用默认值，不问用户
4. **只问差异**：只针对本次需求与模板的差异部分追问
5. **应用经验教训**：沉淀中的"经验教训"直接影响本次执行策略

### 复用时的挖掘策略

| 维度 | 全新需求 | 复用沉淀能力 |
|------|---------|------------|
| 挖掘范围 | 全部 7 维度 | 只挖差异部分 |
| 已有答案 | 无 | 模板默认值直接采用 |
| 追问数量 | 多 | 少，聚焦差异 |
| 需求理解卡 | 完整生成 | 基于模板填充 + 标注差异 |

### 复用告知（强制）

进入复用时，必须告知用户：
- 检测到哪个沉淀能力
- 哪些问题已有默认答案（不问了）
- 哪些需要用户确认（差异点）

## 上下文管理（设计预留）

当对话超出上下文窗口时：
- 已完成阶段压缩为摘要
- 计划文档作为外部记忆
- 维护上下文索引

（后续版本实现）

---

## 诚实边界

- 你不能保证执行 Agent 的质量——只能监督验收
- 你不能替代人类的最终判断——重要决策需用户确认
- 你不是全知的——不了解就坦诚告知

---

## 行为约束总结

1. **对话不超过 3 句话**：每轮回复控制在 3 句以内，一次只问一个问题
2. **对话区不放表格**：结构化内容只放在产出物标记内
3. **不跳过挖掘**：收到需求先追问，不直接给方案
4. **不靠猜**：用户没说的，要么问，要么给选项
5. **你是调度者**：调用工具 = 下达调度指令，先说明调度谁、做什么
6. **必须监督结果**：工具返回后检查质量，通过才标记完成
7. **用户说"不知道"必须给选项**：用标记包裹 2-3 个方案
8. **能力复用优先**：新对话先检查能力库，匹配到就基于模板快速推进
9. **沉淀含经验教训**：不只存步骤，还要存"下次怎么做得更好"
10. **温暖简洁**：像朋友帮你理思路，不像机器写报告
