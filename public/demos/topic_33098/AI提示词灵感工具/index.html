<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI提示词灵感工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="container">
        <header>
            <div class="header-content">
                <div class="title-section">
                    <h1>AI提示词灵感工具</h1>
                    <p class="subtitle">选场景 · 生成模板 · 一键复制</p>
                </div>
                <div class="recent-section">
                    <h3>最近使用</h3>
                    <div class="recent-tags" id="recentTags">
                        <span class="tag">暂无记录</span>
                    </div>
                </div>
            </div>
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="搜索场景..." class="search-input">
            </div>
        </header>

        <main>
            <section class="cards-grid" id="cardsGrid">
                <div class="card" data-name="写邮件" onclick="toggleCard(this)">
                    <div class="card-header">
                        <h3><span class="card-icon">📧</span>写邮件</h3>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">适用：需要写工作邮件、商务邮件时</p>
                        <div class="card-template" style="display: none;">
                            <h4>提示词模板</h4>
                            <textarea readonly class="template-textarea">请帮我写一封关于[邮件主题]的邮件，收件人是[对方身份/称呼]，邮件目的是[说明目的]，语气需要[正式/半正式/亲切]，需要包含以下要点：[列出2-3个要点]</textarea>
                            <button class="copy-btn">一键复制</button>
                        </div>
                    </div>
                </div>

                <div class="card" data-name="工作总结" onclick="toggleCard(this)">
                    <div class="card-header">
                        <h3><span class="card-icon">📊</span>工作总结</h3>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">适用：需要写工作汇报、项目总结时</p>
                        <div class="card-template" style="display: none;">
                            <h4>提示词模板</h4>
                            <textarea readonly class="template-textarea">请帮我写一份关于[项目/工作名称]的[周/月/季度]工作总结，我的主要工作内容包括：[列出主要工作]，取得的成果有：[列出成果]</textarea>
                            <button class="copy-btn">一键复制</button>
                        </div>
                    </div>
                </div>

                <div class="card" data-name="头脑风暴" onclick="toggleCard(this)">
                    <div class="card-header">
                        <h3><span class="card-icon">💡</span>头脑风暴</h3>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">适用：需要寻找创意方向时</p>
                        <div class="card-template" style="display: none;">
                            <h4>提示词模板</h4>
                            <textarea readonly class="template-textarea">请围绕'[主题]'进行头脑风暴，从至少5个不同角度提出创意方向</textarea>
                            <button class="copy-btn">一键复制</button>
                        </div>
                    </div>
                </div>

                <div class="card" data-name="学习解释" onclick="toggleCard(this)">
                    <div class="card-header">
                        <h3><span class="card-icon">📚</span>学习解释</h3>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">适用：需要理解新概念、知识点时</p>
                        <div class="card-template" style="display: none;">
                            <h4>提示词模板</h4>
                            <textarea readonly class="template-textarea">请用通俗易懂的方式解释'[概念/知识点]'，我的知识背景是[初学者/有一定基础/进阶者]</textarea>
                            <button class="copy-btn">一键复制</button>
                        </div>
                    </div>
                </div>

                <div class="card" data-name="方案策划" onclick="toggleCard(this)">
                    <div class="card-header">
                        <h3><span class="card-icon">📋</span>方案策划</h3>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">适用：需要写活动方案、项目计划时</p>
                        <div class="card-template" style="display: none;">
                            <h4>提示词模板</h4>
                            <textarea readonly class="template-textarea">请帮我策划一个关于'[方案主题]'的完整方案，包含项目背景、目标、执行步骤、时间进度表</textarea>
                            <button class="copy-btn">一键复制</button>
                        </div>
                    </div>
                </div>

                <div class="card" data-name="代码调试" onclick="toggleCard(this)">
                    <div class="card-header">
                        <h3><span class="card-icon">💻</span>代码调试</h3>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">适用：代码报错、需要优化时</p>
                        <div class="card-template" style="display: none;">
                            <h4>提示词模板</h4>
                            <textarea readonly class="template-textarea">我在使用[编程语言/框架]写代码时遇到以下问题：[描述问题]，报错信息是：[粘贴报错信息]</textarea>
                            <button class="copy-btn">一键复制</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <section class="add-template-section">
                <h3>添加自定义模板</h3>
                <div class="add-form">
                    <input type="text" id="templateName" placeholder="模板名称" class="form-input">
                    <textarea id="templateContent" placeholder="模板内容" class="form-textarea"></textarea>
                    <button id="saveBtn" class="save-btn">保存</button>
                </div>
            </section>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
