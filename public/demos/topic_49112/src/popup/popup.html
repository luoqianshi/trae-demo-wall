<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="popup_title">云集</title>
  <style>
    :root {
      --color-primary: #1a73e8;
      --color-primary-hover: #1557b0;
      --color-bg-base: #fff;
      --color-bg-muted: #f5f5f5;
      --color-text-primary: #1a1a1a;
      --color-text-tertiary: #666;
      --color-text-muted: #888;
      --color-text-inverse: #fff;
      --color-border-light: #eee;
      --color-border-dashed: #ddd;
    }
    [data-theme="dark"] {
      --color-bg-base: #1a1d24;
      --color-bg-muted: #2c313a;
      --color-text-primary: #e6e8ec;
      --color-text-tertiary: #a0a6b0;
      --color-text-muted: #8a909a;
      --color-text-inverse: #1a1d24;
      --color-border-light: #2c313a;
      --color-border-dashed: #3a3f4a;
    }
    body {
      width: 200px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg-base);
      color: var(--color-text-primary);
      transition: background 0.2s, color 0.2s;
    }
    .popup-header {
      text-align: center;
      margin-bottom: 12px;
    }
    .popup-header h1 {
      font-size: 16px;
      margin: 0 0 4px;
      color: var(--color-text-primary);
    }
    .popup-header p {
      font-size: 12px;
      color: var(--color-text-tertiary);
      margin: 0;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: var(--color-primary);
      color: white;
    }
    .btn-primary:hover {
      background: var(--color-primary-hover);
    }
    .shortcuts {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--color-border-light);
    }
    .shortcuts p {
      font-size: 11px;
      color: var(--color-text-muted);
      margin: 4px 0;
    }
    .shortcuts kbd {
      background: var(--color-bg-muted);
      color: var(--color-text-primary);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      border: 1px solid var(--color-border-dashed);
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <h1 data-i18n="popup_title">云集</h1>
    <p data-i18n="popup_subtitle">网页标记工具</p>
  </div>

  <button class="btn btn-primary" id="openSidebar" data-i18n="popup_open_sidebar">打开侧边栏</button>

  <div class="shortcuts">
    <p><span data-i18n="popup_shortcut_label">快捷键:</span> <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>M</kbd></p>
    <p data-i18n="popup_shortcut_hint">选中文本后点击标记按钮</p>
  </div>

  <script src="../utils/theme.js"></script>
  <script src="../utils/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
