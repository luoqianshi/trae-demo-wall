<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>城市线索 CityClue - AI驱动即时任务系统</title>
<style>
:root{
  --bg:#f8f9fa;--ink:#1a1a2e;--muted:#6b7280;
  --accent:#f97316;--accent2:#10b981;
  --card:#fff;--rule:#e5e7eb;
  --shadow:0 2px 12px rgba(0,0,0,.06);
  --glow:0 0 0 2px var(--accent),0 0 16px rgba(249,115,22,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg)}

/* ===== App ===== */
#app{max-width:430px;height:100vh;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ===== Top Bar ===== */
.top-bar{background:var(--card);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--rule)}
.loc{display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--muted);cursor:pointer}
.loc svg{width:14px;height:14px}
.brand{text-align:center}
.brand h1{font-size:1.05rem;font-weight:800;color:var(--ink)}
.brand h1 b{color:var(--accent)}
.brand p{font-size:.6rem;color:var(--muted);margin-top:1px}
.top-r{display:flex;align-items:center;gap:8px}
.notif{width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.notif .dot{position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:#ef4444;border:2px solid var(--card)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f97316,#ea580c);display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;font-weight:700}

/* ===== Type Tabs ===== */
.type-tabs{display:flex;gap:0;padding:8px 16px;background:var(--card);border-bottom:1px solid var(--rule);overflow-x:auto;-webkit-overflow-scrolling:touch}
.type-tabs::-webkit-scrollbar{display:none}
.type-tab{flex:1;padding:7px 0;border:none;background:none;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;text-align:center;white-space:nowrap}
.type-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.type-tab:active{opacity:.7}

/* ===== Sort Hint ===== */
.sort-row{display:flex;align-items:center;padding:6px 16px;gap:6px}
.sort-chip{padding:4px 12px;border-radius:14px;border:1px solid var(--rule);background:var(--card);font-size:.7rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.sort-chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.sort-chip:active{transform:scale(.96)}
.sort-hint{margin-left:auto;font-size:.65rem;color:var(--accent2);font-weight:600}

/* ===== Feed ===== */
.feed{flex:1;overflow-y:auto;padding:8px 16px 90px}
.feed::-webkit-scrollbar{display:none}

/* ===== Task Card ===== */
.task-card{
  background:var(--card);border-radius:16px;padding:14px;
  margin-bottom:10px;box-shadow:var(--shadow);border:1.5px solid var(--rule);
  cursor:pointer;transition:all .2s;position:relative;
}
.task-card.focused{
  border-color:var(--accent);
  box-shadow:var(--glow);
  transform:scale(1.015);
}
.task-card:active{transform:scale(.99)}

/* card top */
.tc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.tc-type{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
.tc-type.food{background:linear-gradient(135deg,#fef3c7,#fde68a)}
.tc-type.help{background:linear-gradient(135deg,#dcfce7,#bbf7d0)}
.tc-type.move{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
.tc-main{flex:1;min-width:0}
.tc-title{font-size:.95rem;font-weight:700;color:var(--ink);line-height:1.3}
.tc-price{flex-shrink:0;padding:3px 10px;border-radius:10px;font-size:.8rem;font-weight:700}
.tc-price.paid{background:#fef3c7;color:#92400e}
.tc-price.free{background:#dcfce7;color:#166534}

/* meta */
.tc-meta{display:flex;gap:12px;font-size:.72rem;color:var(--muted);margin-bottom:8px;padding-left:44px}
.tc-meta span{display:flex;align-items:center;gap:3px}

/* AI block */
.tc-ai{
  background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;
  padding:8px 10px;margin-bottom:10px;
}
.tc-ai-head{font-size:.68rem;font-weight:700;color:#166534;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.tc-ai-head .ai-b{background:var(--accent2);color:#fff;font-size:.55rem;padding:1px 5px;border-radius:4px;font-weight:700}
.tc-ai-tags{display:flex;flex-wrap:wrap;gap:6px}
.tc-ai-tag{font-size:.65rem;color:#15803d;display:flex;align-items:center;gap:3px}

/* accept btn */
.tc-btn{
  width:100%;padding:10px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--accent),#ea580c);
  color:#fff;font-size:.88rem;font-weight:700;cursor:pointer;transition:transform .12s;
}
.tc-btn:active{transform:scale(.97)}
.tc-btn.done{background:var(--rule);color:var(--muted)}

/* ===== Map Section ===== */
.map-sec{margin:0 16px 12px;background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);border:1px solid var(--rule)}
.map-sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.map-sec-title{font-size:.85rem;font-weight:700;color:var(--ink)}
.map-preview{width:100%;height:130px;border-radius:12px;overflow:hidden;position:relative;background:url('assets/map-aerial-view.jpg') center/cover no-repeat;cursor:pointer}
.map-preview-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.12))}
.map-pin{position:absolute;width:24px;height:24px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:all .3s}
.map-pin span{transform:rotate(45deg);font-size:.55rem;font-weight:700;color:#fff}
.map-pin.high{background:#ef4444}
.map-pin.mid{background:#f97316}
.map-pin.low{background:#10b981}
.map-pin.highlight{box-shadow:0 0 0 3px rgba(239,68,68,.4),0 0 16px rgba(239,68,68,.3);transform:rotate(-45deg) scale(1.2)}
.map-you{position:absolute;width:14px;height:14px;border-radius:50%;background:#3b82f6;border:2px solid #fff;box-shadow:0 0 8px rgba(59,130,246,.5)}
.map-legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.map-legend span{display:flex;align-items:center;gap:3px;font-size:.58rem;color:var(--muted)}
.map-legend .d{width:7px;height:7px;border-radius:50%}

/* ===== AR Preview ===== */
.ar-sec{margin:0 16px 12px;background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);border:1px solid var(--rule);cursor:pointer;transition:all .15s}
.ar-sec:active{transform:scale(.99)}
.ar-sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ar-sec-title{font-size:.85rem;font-weight:700;color:var(--ink)}
.ar-preview{position:relative;height:110px;border-radius:12px;overflow:hidden;background:url('assets/ar-street-scene(1).jpg') center/cover no-repeat}
.ar-preview-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.5))}
.ar-task-bar{position:absolute;left:8px;right:8px;display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:10px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);color:#fff}
.ar-dir{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0}
.ar-text{font-size:.68rem;font-weight:600;flex:1}
.ar-meta{font-size:.58rem;opacity:.7}
.ar-enter{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(16,185,129,.9);color:#fff;padding:5px 16px;border-radius:16px;font-size:.68rem;font-weight:700;border:none;cursor:pointer}

/* ===== Quick Publish ===== */
.qp-sec{margin:0 16px 16px;background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);border:1px solid var(--rule)}
.qp-title{font-size:.85rem;font-weight:700;color:var(--ink);margin-bottom:2px}
.qp-sub{font-size:.62rem;color:var(--muted);margin-bottom:10px}
.qp-grid{display:flex;gap:10px}
.qp-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:12px;background:var(--bg);cursor:pointer;transition:all .15s;border:1px solid transparent}
.qp-item:hover{border-color:var(--rule)}
.qp-item:active{transform:scale(.97)}
.qp-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem}
.qp-icon.o{background:linear-gradient(135deg,#fef3c7,#fde68a)}
.qp-icon.t{background:linear-gradient(135deg,#ccfbf1,#99f6e4)}
.qp-icon.p{background:linear-gradient(135deg,#ede9fe,#ddd6fe)}
.qp-item span{font-size:.65rem;color:var(--muted);font-weight:500}

/* ===== Bottom Nav ===== */
.bnav{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--rule);display:flex;justify-content:space-around;align-items:center;padding:5px 0 10px;z-index:100}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 10px;cursor:pointer;border:none;background:none;color:var(--muted);transition:color .15s}
.bnav-item.active{color:var(--accent)}
.bnav-item .ni{font-size:1.05rem}
.bnav-item .nl{font-size:.55rem;font-weight:600}
.bnav-pub{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#ea580c);color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:300;box-shadow:0 4px 12px rgba(249,115,22,.3);cursor:pointer;transition:transform .15s;margin-top:-14px}
.bnav-pub:active{transform:scale(.9)}

/* ===== Modals ===== */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-ov.show{display:flex}
.modal{background:var(--card);width:100%;max-width:430px;border-radius:20px 20px 0 0;padding:24px 20px;max-height:85vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px;color:var(--ink)}
.fg input,.fg textarea{width:100%;padding:12px 14px;border:1.5px solid var(--rule);border-radius:12px;font-size:.92rem;font-family:inherit;background:var(--bg)}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--accent)}
.fg textarea{min-height:70px;resize:vertical}
.btn-p{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#ea580c);color:#fff;font-size:1rem;font-weight:700;cursor:pointer}
.btn-s{width:100%;padding:12px;border-radius:12px;border:1px solid var(--rule);background:var(--card);color:var(--muted);font-size:.9rem;cursor:pointer;margin-top:8px}

/* Detail */
.ds{margin-bottom:16px}
.ds h4{font-size:.82rem;color:var(--muted);margin-bottom:6px}
.ds p{font-size:.92rem;line-height:1.6}
.dai{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #bbf7d0;border-radius:12px;padding:14px;margin-bottom:16px}
.dai h4{color:#166534;margin-bottom:8px}
.dai .ag{display:flex;flex-wrap:wrap;gap:8px}
.dai .ag span{background:#fff;border:1px solid #bbf7d0;border-radius:8px;padding:4px 10px;font-size:.78rem;color:#166534}

/* ===== Map Full ===== */
.map-full{width:100%;height:360px;border-radius:12px;overflow:hidden;margin-bottom:12px;position:relative}
.map-full-bg{position:absolute;inset:0;background:url('assets/map-aerial-view.jpg') center/cover no-repeat;filter:brightness(.7) saturate(1.1)}
.map-full-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.02) 40%,rgba(0,0,0,.02) 60%,rgba(0,0,0,.12))}
.map-full-pins{position:absolute;inset:0;z-index:5}
.mfp{position:absolute;display:flex;flex-direction:column;align-items:center;animation:mpd .5s ease backwards}
@keyframes mpd{from{opacity:0;transform:translateY(-20px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
.mfp-icon{width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);cursor:pointer;transition:transform .15s}
.mfp-icon:hover{transform:rotate(-45deg) scale(1.15)}
.mfp-icon span{transform:rotate(45deg);font-size:.7rem;font-weight:700;color:#fff}
.mfp-icon.high{background:#ef4444}
.mfp-icon.mid{background:#f97316}
.mfp-icon.low{background:#10b981}
.mfp-icon.highlight{box-shadow:0 0 0 4px rgba(239,68,68,.5),0 0 20px rgba(239,68,68,.4)}
.mfp-label{margin-top:4px;background:rgba(0,0,0,.7);color:#fff;padding:2px 8px;border-radius:8px;font-size:.6rem;font-weight:600;white-space:nowrap;backdrop-filter:blur(4px)}
.mfp-you{position:absolute;z-index:10;display:flex;flex-direction:column;align-items:center}
.mfp-you-dot{width:18px;height:18px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 16px rgba(59,130,246,.6);animation:myp 2s ease-in-out infinite}
.mfp-you-label{margin-top:3px;background:#3b82f6;color:#fff;padding:2px 8px;border-radius:8px;font-size:.6rem;font-weight:700;white-space:nowrap}
@keyframes myp{0%,100%{box-shadow:0 0 12px rgba(59,130,246,.4)}50%{box-shadow:0 0 28px rgba(59,130,246,.8)}}
.mfp-legend{position:absolute;bottom:8px;left:8px;z-index:10;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);border-radius:8px;padding:4px 10px;display:flex;gap:8px;align-items:center}
.mfp-legend span{font-size:.58rem;color:rgba(255,255,255,.7)}
.mfp-legend .d{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ===== AR Overlay ===== */
.ar-ov{position:fixed;inset:0;background:#000;z-index:400;display:none;flex-direction:column;padding:0;overflow:hidden}
.ar-ov.show{display:flex}
.ar-bg{position:absolute;inset:0;background:url('assets/ar-street-scene(1).jpg') center/cover no-repeat;filter:brightness(.55) saturate(.9)}
.ar-bg2{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.7),rgba(0,0,0,.05) 20%,rgba(0,0,0,.03) 50%,rgba(0,0,0,.05) 75%,rgba(0,0,0,.7))}
.ar-hd{position:relative;z-index:20;width:100%;padding:14px 16px 8px;display:flex;justify-content:space-between;align-items:flex-start}
.ar-close{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.ar-compass{display:flex;gap:10px;align-items:center;background:rgba(0,0,0,.4);border-radius:18px;padding:5px 12px;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.08)}
.ar-compass span{color:rgba(255,255,255,.5);font-size:.65rem;font-weight:500}
.ar-compass .n{color:#ef4444;font-weight:700}
.ar-compass .sn{color:#fff;font-weight:700;font-size:.72rem}
.ar-ct{position:relative;z-index:15;flex:1;width:100%;overflow:hidden}
.ar-pn{position:absolute;display:flex;flex-direction:column;align-items:center;animation:api .6s ease backwards}
@keyframes api{from{opacity:0;transform:translateY(10px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.ar-pd{width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 12px rgba(255,255,255,.3);position:absolute;z-index:2;animation:app 2s ease-in-out infinite}
.ar-pd::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);animation:apr 2s ease-in-out infinite}
@keyframes app{0%,100%{box-shadow:0 0 8px rgba(255,255,255,.2)}50%{box-shadow:0 0 20px rgba(255,255,255,.5)}}
@keyframes apr{0%{transform:scale(1);opacity:1}100%{transform:scale(2.5);opacity:0}}
.ar-pd.highlight{box-shadow:0 0 0 4px rgba(255,255,255,.3),0 0 24px rgba(255,255,255,.6)}
.ar-pl{position:absolute;z-index:1}
.ar-pl::before{content:'';display:block;width:100%;height:100%;background:rgba(255,255,255,.15)}
.ar-pc{background:rgba(0,0,0,.65);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px 10px;min-width:140px;max-width:170px;color:#fff}
.ar-pc .pb{font-size:.6rem;opacity:.45;margin-bottom:1px}
.ar-pc .pr{font-size:.68rem;opacity:.6;margin-bottom:3px;font-weight:500}
.ar-pc .pt{font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:5px}
.ar-pc .pp{display:inline-block;padding:1px 6px;border-radius:5px;font-size:.62rem;font-weight:700}
.ar-pc .pp.paid{background:rgba(234,88,12,.9)}
.ar-pc .pp.free{background:rgba(22,163,74,.9)}
.ar-pc .pm{font-size:.62rem;opacity:.5;margin-top:3px;display:flex;gap:6px}
.ar-pc .pa{font-size:.6rem;margin-top:3px;display:flex;align-items:center;gap:4px}
.ar-pc .pa .ad{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.ar-ym{position:absolute;z-index:10;display:flex;flex-direction:column;align-items:center}
.ar-ym .yd{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle,#3b82f6 30%,rgba(59,130,246,.5));border:3px solid #fff;box-shadow:0 0 20px rgba(59,130,246,.6);animation:ayp 2s ease-in-out infinite}
.ar-ym .yl{margin-top:4px;font-size:.6rem;color:rgba(255,255,255,.7);background:rgba(0,0,0,.35);padding:2px 8px;border-radius:10px;backdrop-filter:blur(4px);white-space:nowrap}
@keyframes ayp{0%,100%{box-shadow:0 0 16px rgba(59,130,246,.4)}50%{box-shadow:0 0 32px rgba(59,130,246,.8)}}
.ar-sl{position:absolute;z-index:10;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.35);backdrop-filter:blur(4px);border-radius:14px;border:1px solid rgba(255,255,255,.05);padding:4px 14px;color:rgba(255,255,255,.35);font-size:.6rem}

/* ===== Chat ===== */
.chat-header{background:var(--card);padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--rule);flex-shrink:0}
.chat-back{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);font-size:1.2rem;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-title{flex:1;font-size:.95rem;font-weight:700;color:var(--ink)}
.chat-status{font-size:.62rem;color:var(--accent2);font-weight:600}
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:.85rem;line-height:1.5;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-msg.them{align-self:flex-start;background:var(--card);color:var(--ink);border:1px solid var(--rule);border-bottom-left-radius:4px}
.chat-msg.system{align-self:center;background:var(--bg);color:var(--muted);font-size:.72rem;padding:6px 14px;border:1px solid var(--rule)}
.chat-input-wrap{display:flex;gap:8px;padding:12px 16px;background:var(--card);border-top:1px solid var(--rule)}
.chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--rule);border-radius:12px;font-size:.88rem;font-family:inherit;background:var(--bg)}
.chat-input:focus{outline:none;border-color:var(--accent)}
.chat-send{padding:10px 18px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:.85rem;font-weight:700;cursor:pointer}
.chat-send:active{transform:scale(.96)}
.chat-actions{display:flex;gap:10px;padding:12px 16px;background:var(--card);border-top:1px solid var(--rule)}
.chat-btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:.88rem;font-weight:700;cursor:pointer}
.chat-btn.agree{background:var(--accent2);color:#fff}
.chat-btn.reject{background:var(--rule);color:var(--muted)}

/* ===== My Task Card ===== */
.mtc{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1.5px solid var(--rule);box-shadow:var(--shadow)}
.mtc-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mtc-type{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.mtc-title{flex:1;font-size:.9rem;font-weight:700}
.mtc-status{padding:2px 8px;border-radius:8px;font-size:.6rem;font-weight:700}
.mtc-status.pending{background:#fef3c7;color:#92400e}
.mtc-status.approved{background:#dcfce7;color:#166534}
.mtc-status.done{background:var(--rule);color:var(--muted)}
.mtc-meta{font-size:.68rem;color:var(--muted);margin-bottom:8px}
.mtc-btn{width:100%;padding:10px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:.85rem;font-weight:700;cursor:pointer}
.mtc-btn.done{background:var(--rule);color:var(--muted)}

/* ===== Toast ===== */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:12px;font-size:.85rem;font-weight:600;z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .em{font-size:2.5rem;margin-bottom:10px;display:block}
.empty p{font-size:.88rem;line-height:1.6}
</style>
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="loc" onclick="showToast('切换位置')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      新光社区 <span style="font-size:.6rem">▼</span>
    </div>
    <div class="brand"><h1>城市线索 <b>CityClue</b></h1><p>AI 驱动的附近即时任务系统</p></div>
    <div class="top-r">
      <button class="notif" onclick="showToast('暂无新消息')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="dot"></span></button>
      <div class="avatar">我</div>
    </div>
  </div>

  <!-- Type Tabs -->
  <div class="type-tabs" id="typeTabs">
    <button class="type-tab active" onclick="setMode('all')">全部</button>
    <button class="type-tab" onclick="setMode('food')">🍜 蹭饭</button>
    <button class="type-tab" onclick="setMode('help')">🧹 帮忙</button>
    <button class="type-tab" onclick="setMode('move')">📦 搬运</button>
  </div>

  <!-- Sort -->
  <div class="sort-row">
    <button class="sort-chip active" onclick="setSort('ai',this)">✦ AI推荐</button>
    <button class="sort-chip" onclick="setSort('distance',this)">📏 距离</button>
    <button class="sort-chip" onclick="setSort('time',this)">🕐 最新</button>
    <span class="sort-hint" id="sortHint">✓ AI 已优化排序</span>
  </div>

  <!-- Feed -->
  <div class="feed" id="feed"></div>

  <!-- Map Section -->
  <div class="map-sec" onclick="openMap()">
    <div class="map-sec-head"><div class="map-sec-title">附近任务地图</div><div style="font-size:.85rem;color:var(--muted)">›</div></div>
    <div class="map-preview" id="mapPreview"></div>
    <div class="map-legend">
      <span><span class="d" style="background:#ef4444"></span>高推荐</span>
      <span><span class="d" style="background:#f97316"></span>中推荐</span>
      <span><span class="d" style="background:#10b981"></span>低推荐</span>
      <span><span class="d" style="background:#3b82f6"></span>我</span>
    </div>
  </div>

  <!-- AR Preview -->
  <div class="ar-sec" onclick="openAR()">
    <div class="ar-sec-head"><div class="ar-sec-title">现场模式（模拟AR）</div><div style="font-size:.85rem;color:var(--muted)">›</div></div>
    <div class="ar-preview" id="arPreview"></div>
  </div>

  <!-- Quick Publish -->
  <div class="qp-sec">
    <div class="qp-title">快速发布需求</div>
    <div class="qp-sub">大家帮你，生活更便利</div>
    <div class="qp-grid">
      <div class="qp-item" onclick="openPublish()"><div class="qp-icon o">✏️</div><span>发布任务</span></div>
      <div class="qp-item" onclick="showToast('临时求助开发中')"><div class="qp-icon t">🆘</div><span>临时求助</span></div>
      <div class="qp-item" onclick="showToast('分享资源开发中')"><div class="qp-icon p">🎁</div><span>分享资源</span></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bnav">
    <button class="bnav-item active" id="navHome" onclick="switchPage('home')"><div class="ni">🏠</div><div class="nl">首页</div></button>
    <button class="bnav-item" id="navMap" onclick="openMap()"><div class="ni">🗺️</div><div class="nl">地图</div></button>
    <button class="bnav-pub" onclick="openPublish()">+</button>
    <button class="bnav-item" id="navMsg" onclick="switchPage('messages')"><div class="ni">💬</div><div class="nl" id="navMsgLabel">消息</div></button>
    <button class="bnav-item" id="navMy" onclick="switchPage('mytasks')"><div class="ni">👤</div><div class="nl">我的</div></button>
  </div>
</div>

<!-- Publish Modal -->
<div class="modal-ov" id="pubModal">
  <div class="modal">
    <h2>发布任务</h2>
    <div class="fg"><label>任务类型</label>
      <select id="pubType" style="width:100%;padding:12px 14px;border:1.5px solid var(--rule);border-radius:12px;font-size:.92rem;font-family:inherit;background:var(--bg)">
        <option value="help">🧹 帮忙</option><option value="food">🍜 蹭饭</option><option value="move">📦 搬运</option>
      </select>
    </div>
    <div class="fg"><label>任务标题</label><input type="text" id="pubTitle" placeholder="例如：帮我倒垃圾" maxlength="30"></div>
    <div class="fg"><label>任务内容</label><textarea id="pubDesc" placeholder="描述具体需要什么帮助..." maxlength="120"></textarea></div>
    <div class="fg"><label>报酬（元）</label><input type="number" id="pubPrice" placeholder="0 表示免费" min="0" step="1"></div>
    <button class="btn-p" onclick="publishTask()">发布任务</button>
    <button class="btn-s" onclick="closePublish()">取消</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-ov" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<!-- Map Modal -->
<div class="modal-ov" id="mapModal">
  <div class="modal">
    <h2>附近任务分布</h2>
    <div class="map-full">
      <div class="map-full-bg"></div>
      <div class="map-full-ov"></div>
      <div class="map-full-pins" id="mapPins"></div>
      <div class="mfp-legend">
        <span><span class="d" style="background:#ef4444"></span>高推荐</span>
        <span><span class="d" style="background:#f97316"></span>中推荐</span>
        <span><span class="d" style="background:#10b981"></span>低推荐</span>
        <span><span class="d" style="background:#3b82f6"></span>我</span>
      </div>
    </div>
    <button class="btn-s" onclick="closeMap()">关闭</button>
  </div>
</div>

<!-- AR Overlay -->
<div class="ar-ov" id="arOverlay">
  <div class="ar-bg"></div>
  <div class="ar-bg2"></div>
  <div class="ar-hd">
    <button class="ar-close" onclick="closeAR()">×</button>
    <div class="ar-compass"><span class="n">↑ N</span><span class="sn" id="arStreet">建设路</span><span>↓ S</span></div>
  </div>
  <div class="ar-ct" id="arContainer"></div>
</div>

<!-- Chat Modal -->
<div class="modal-ov" id="chatModal">
  <div class="modal" style="max-height:90vh;display:flex;flex-direction:column;padding:0">
    <div class="chat-header" id="chatHeader">
      <button class="chat-back" onclick="closeChat()">‹</button>
      <div class="chat-title" id="chatTitle">任务交涉</div>
      <div class="chat-status" id="chatStatus">等待对方回复</div>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input-wrap" id="chatInputWrap">
      <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">发送</button>
    </div>
    <div class="chat-actions" id="chatActions" style="display:none">
      <button class="chat-btn agree" onclick="approveTask()">✓ 同意接单</button>
      <button class="chat-btn reject" onclick="rejectTask()">✕ 拒绝</button>
    </div>
  </div>
</div>

<!-- My Tasks Modal -->
<div class="modal-ov" id="myTasksModal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0">我的任务</h2>
      <button onclick="closeMyTasks()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted)">×</button>
    </div>
    <div id="myTasksContent"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const TYPE_EMOJI = { food:'🍜', help:'🧹', move:'📦' };
const TYPE_BG = { food:'linear-gradient(135deg,#fef3c7,#fde68a)', help:'linear-gradient(135deg,#dcfce7,#bbf7d0)', move:'linear-gradient(135deg,#dbeafe,#bfdbfe)' };

let state = {
  tasks: [],
  mode: 'all',
  sort: 'ai',
  focusId: null,
  nextId: 100,
  chatTaskId: null,
  myTasks: [],
  page: 'home'  // home | messages | mytasks
};

// ===== DEFAULT DATA =====
function ensureTasks() {
  if (state.tasks.length === 0) {
    state.tasks = [
      { id:1, type:'help', title:'帮我倒垃圾', desc:'楼下即可完成，3分钟任务', price:3, distance:120, time:'2分钟前', status:'open', ai_score:0.92, ai_reason:'距离120m，顺路概率82%，预计3分钟完成', location:[39.9042,116.4074] },
      { id:2, type:'food', title:'蹭饭邀请', desc:'今晚做多了饭可以来吃', price:0, distance:240, time:'6分钟前', status:'open', ai_score:0.85, ai_reason:'距离240m，顺路概率76%，预计15分钟', location:[39.9050,116.4080] },
      { id:3, type:'move', title:'代取快递', desc:'顺路即可完成', price:3, distance:360, time:'10分钟前', status:'open', ai_score:0.78, ai_reason:'距离360m，顺路概率68%，预计5分钟', location:[39.9035,116.4065] },
      { id:4, type:'food', title:'拼单外卖', desc:'一起点外卖更划算', price:0, distance:180, time:'15分钟前', status:'open', ai_score:0.88, ai_reason:'距离180m，顺路概率80%，预计10分钟', location:[39.9048,116.4070] },
      { id:5, type:'help', title:'帮忙遛狗', desc:'出门顺便帮忙遛一下', price:5, distance:300, time:'20分钟前', status:'open', ai_score:0.72, ai_reason:'距离300m，顺路概率65%，预计20分钟', location:[39.9038,116.4060] },
      { id:6, type:'move', title:'搬运纸箱', desc:'搬到楼下回收站', price:8, distance:150, time:'30分钟前', status:'open', ai_score:0.81, ai_reason:'距离150m，顺路概率78%，预计8分钟', location:[39.9045,116.4085] }
    ];
  }
}

// ===== FILTERED + SORTED =====
function getFilteredTasks() {
  ensureTasks();
  let list = state.tasks.filter(t => t.status === 'open');
  if (state.mode !== 'all') list = list.filter(t => t.type === state.mode);
  return list;
}

function sortTasks(list) {
  return list.sort((a, b) => {
    if (state.sort === 'ai') return b.ai_score - a.ai_score || a.distance - b.distance;
    if (state.sort === 'distance') return a.distance - b.distance || b.ai_score - a.ai_score;
    return 0; // time: keep insertion order as proxy
  });
}

// ===== RENDER TASK CARD (core) =====
function renderTaskCard(t) {
  const emoji = TYPE_EMOJI[t.type] || '📌';
  const bg = TYPE_BG[t.type] || TYPE_BG.help;
  const priceClass = t.price === 0 ? 'free' : 'paid';
  const priceText = t.price === 0 ? '免费' : '¥' + t.price;
  const focused = state.focusId === t.id ? ' focused' : '';
  const scorePercent = Math.round(t.ai_score * 100);
  const prob = 50 + Math.floor(t.ai_score * 40);
  const estMin = Math.floor(2 + t.distance / 80);

  return `
  <div class="task-card${focused}" onclick="setFocus(${t.id})">
    <div class="tc-top">
      <div class="tc-type ${t.type}" style="background:${bg}">${emoji}</div>
      <div class="tc-main">
        <div class="tc-title">${t.title}</div>
      </div>
      <div class="tc-price ${priceClass}">${priceText}</div>
    </div>
    <div class="tc-meta">
      <span>📍 ${t.distance}m</span>
      <span>🕐 ${t.time}</span>
      <span>🎯 匹配${scorePercent}%</span>
    </div>
    <div class="tc-ai">
      <div class="tc-ai-head"><span class="ai-b">AI</span> 推荐理由</div>
      <div class="tc-ai-tags">
        <span class="tc-ai-tag">📏 距离${t.distance}m</span>
        <span class="tc-ai-tag">🛤️ 顺路概率${prob}%</span>
        <span class="tc-ai-tag">⏱️ 预计${estMin}分钟</span>
      </div>
    </div>
    <button class="tc-btn" onclick="event.stopPropagation();acceptTask(${t.id})">接单</button>
  </div>`;
}

// ===== RENDER FEED =====
function renderFeed() {
  const feed = document.getElementById('feed');
  const sorted = sortTasks(getFilteredTasks());

  if (sorted.length === 0) {
    feed.innerHTML = `<div class="empty"><span class="em">⚡</span><p>附近暂无任务，正在生成中...</p></div>`;
    setTimeout(() => {
      if (getFilteredTasks().length === 0) {
        const types = ['food','help','move'];
        const titles = { food:'一起拼饭', help:'帮忙拿快递', move:'帮忙搬东西' };
        const descs = { food:'楼下新开的店', help:'就在快递柜', move:'搬到楼下' };
        const t = types[Math.floor(Math.random()*3)];
        state.tasks.unshift({
          id: state.nextId++, type: t,
          title: titles[t], desc: descs[t],
          price: t==='food'?0:Math.floor(3+Math.random()*10),
          distance: Math.floor(80+Math.random()*400),
          time: '刚刚', status: 'open',
          ai_score: 0.75+Math.random()*0.2,
          ai_reason: '距离较近，顺路即可完成',
          location: [39.9042+(Math.random()-.5)*.003, 116.4074+(Math.random()-.5)*.003]
        });
        refreshAll();
        showToast('附近生成新任务');
      }
    }, 300);
    return;
  }

  feed.innerHTML = sorted.map(renderTaskCard).join('');
}

// ===== RENDER MAP PREVIEW =====
function renderMapPreview() {
  const el = document.getElementById('mapPreview');
  const tasks = sortTasks(getFilteredTasks()).slice(0, 4);
  const positions = [{t:35,l:28},{t:28,l:62},{t:52,l:45},{t:42,l:20}];
  const level = s => s > 0.85 ? 'high' : s >= 0.6 ? 'mid' : 'low';
  const hl = id => state.focusId === id ? ' highlight' : '';

  el.innerHTML = '<div class="map-preview-ov"></div>' +
    tasks.map((t,i) => {
      const p = positions[i % positions.length];
      return `<div class="map-pin ${level(t.ai_score)}${hl(t.id)}" style="top:${p.t}%;left:${p.l}%"><span>${t.price>0?'¥':'🤝'}</span></div>`;
    }).join('') +
    '<div class="map-you" style="top:68%;left:52%"></div>';
}

// ===== RENDER AR PREVIEW =====
function renderARPreview() {
  const el = document.getElementById('arPreview');
  const tasks = sortTasks(getFilteredTasks()).slice(0, 3);
  const dirs = ['←','↓','→'];
  const tops = [8, 42, 76];

  el.innerHTML = '<div class="ar-preview-ov"></div>' +
    tasks.map((t,i) => `
      <div class="ar-task-bar" style="top:${tops[i]}px">
        <div class="ar-dir">${dirs[i]}</div>
        <div class="ar-text">${t.title}</div>
        <div class="ar-meta">${t.distance}m · ${Math.floor(2+t.distance/80)}分钟</div>
      </div>`).join('') +
    '<button class="ar-enter">进入现场模式</button>';
}

// ===== RENDER MAP FULL =====
function renderMap() {
  const el = document.getElementById('mapPins');
  if (!el) return;
  const tasks = sortTasks(getFilteredTasks());
  const positions = [{t:38,l:28},{t:30,l:62},{t:52,l:45},{t:42,l:20},{t:25,l:50},{t:60,l:35}];
  const level = s => s > 0.85 ? 'high' : s >= 0.6 ? 'mid' : 'low';
  const hl = id => state.focusId === id ? ' highlight' : '';

  el.innerHTML = tasks.map((t,i) => {
    const p = positions[i % positions.length];
    const priceText = t.price > 0 ? '¥'+t.price+' · '+t.distance+'m' : '免费 · '+t.distance+'m';
    return `
    <div class="mfp" style="top:${p.t}%;left:${p.l}%;animation-delay:${.15*i}s">
      <div class="mfp-icon ${level(t.ai_score)}${hl(t.id)}" onclick="setFocus(${t.id});closeMap()"><span>${t.price>0?'¥':'🤝'}</span></div>
      <div class="mfp-label">${t.title} · ${priceText}</div>
    </div>`;
  }).join('') +
  '<div class="mfp-you" style="top:65%;left:50%;transform:translateX(-50%)"><div class="mfp-you-dot"></div><div class="mfp-you-label">📍 你在这里</div></div>';
}

// ===== RENDER AR =====
function renderAR() {
  const container = document.getElementById('arContainer');
  if (!container || !document.getElementById('arOverlay').classList.contains('show')) return;
  const tasks = sortTasks(getFilteredTasks()).slice(0, 3);
  document.getElementById('arStreet').textContent = '建设路';

  if (tasks.length === 0) {
    container.innerHTML = '<div style="color:rgba(255,255,255,.4);text-align:center;padding:80px 20px;width:100%">⚡ 附近暂无任务</div>';
    return;
  }

  const pinCfgs = [
    {pinTop:27,pinLeft:48,lineDir:'left',lineLen:38,cardOffset:-30,building:'🏠 幸福公寓',room:'3F · 302室'},
    {pinTop:18,pinLeft:35,lineDir:'right',lineLen:38,cardOffset:-170,building:'🏢 商业大厦',room:'4F · 401室'},
    {pinTop:42,pinLeft:40,lineDir:'left',lineLen:38,cardOffset:-30,building:'🏘️ 便民中心',room:'1F · 香果超市'}
  ];

  function buildPin(t, i) {
    const c = pinCfgs[i];
    const pc = t.price===0?'free':'paid';
    const pt = t.price===0?'免费':'¥'+t.price;
    const cs = c.lineDir==='left' ? `right:${c.lineLen+10}px;top:${c.cardOffset}px` : `left:${c.lineLen+10}px;top:${c.cardOffset}px`;
    const ls = c.lineDir==='left' ? `right:${c.lineLen}px;top:7px;width:${c.lineLen}px` : `left:${c.lineLen}px;top:7px;width:${c.lineLen}px`;
    const hlCls = state.focusId===t.id ? ' highlight' : '';
    return `
    <div class="ar-pn" style="top:${c.pinTop}%;left:${c.pinLeft}%;animation-delay:${.2*i}s">
      <div class="ar-pd${hlCls}" style="z-index:3"></div>
      <div class="ar-pl" style="position:absolute;z-index:1;${ls}"></div>
      <div class="ar-pc" style="position:absolute;z-index:4;${cs}">
        <div class="pb">${c.building}</div>
        <div class="pr">${c.room}</div>
        <div class="pt">${t.title} <span class="pp ${pc}">${pt}</span></div>
        <div class="pm"><span>📍 ${t.distance}m</span><span>🎯 ${Math.round(t.ai_score*100)}%</span><span>🕐 ${t.time}</span></div>
        <div class="pa"><span class="ad"></span> AI 顺路概率${50+Math.floor(t.ai_score*40)}%</div>
      </div>
    </div>`;
  }

  container.innerHTML =
    (tasks[0]?buildPin(tasks[0],0):'') +
    (tasks[1]?buildPin(tasks[1],1):'') +
    (tasks[2]?buildPin(tasks[2],2):'') +
    '<div class="ar-ym" style="bottom:32%;left:50%;animation-delay:.6s"><div class="yd"></div><div class="yl">📍 你在这里 · 建设路中段</div></div>' +
    '<div class="ar-sl">↕ 建设路 · 向北 → 东城区 · 向南 → 南湖公园</div>';
}

// ===== UNIFIED ENTRY FUNCTIONS =====
function setMode(type) {
  state.mode = type;
  state.focusId = null;
  // update tabs
  document.querySelectorAll('.type-tab').forEach((el, i) => {
    el.classList.toggle('active', ['all','food','help','move'][i] === type);
  });
  refreshAll();
}

function setFocus(id) {
  state.focusId = state.focusId === id ? null : id;
  refreshAll();
  // if double-click (was already focused), open detail
  if (state.focusId === id) {
    openDetail(id);
  }
}

function setSort(type, el) {
  state.sort = type;
  document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sortHint').textContent = type==='ai' ? '✓ AI 已优化排序' : `✓ 按${type==='distance'?'距离':'时间'}排序`;
  refreshAll();
}

function refreshAll() {
  renderFeed();
  renderMapPreview();
  renderARPreview();
  renderMap();
  renderAR();
}

// ===== CHAT / NEGOTIATION FLOW =====
function acceptTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t || t.status !== 'open') return;
  // open chat instead of direct accept
  openChat(id);
}

function openChat(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  state.chatTaskId = taskId;

  document.getElementById('chatTitle').textContent = t.title;
  document.getElementById('chatStatus').textContent = '交涉中...';
  document.getElementById('chatStatus').style.color = 'var(--accent)';

  // init chat history if not exists
  if (!t._chat) {
    t._chat = [
      { who: 'system', text: '你向「' + t.title + '」发起了接单请求' },
      { who: 'them', text: '你好！感谢你的接单意愿。请问你大概什么时候能过来？' }
    ];
    t._chatStatus = 'negotiating'; // negotiating | approved | rejected
  }

  renderChat();

  // show input or action buttons based on status
  if (t._chatStatus === 'negotiating') {
    document.getElementById('chatInputWrap').style.display = 'flex';
    document.getElementById('chatActions').style.display = 'none';
  } else if (t._chatStatus === 'pending_approval') {
    document.getElementById('chatInputWrap').style.display = 'none';
    document.getElementById('chatActions').style.display = 'flex';
  } else {
    document.getElementById('chatInputWrap').style.display = 'none';
    document.getElementById('chatActions').style.display = 'none';
  }

  document.getElementById('chatModal').classList.add('show');
  scrollChatToBottom();
}

function closeChat() {
  document.getElementById('chatModal').classList.remove('show');
  state.chatTaskId = null;
}

function renderChat() {
  const t = state.tasks.find(x => x.id === state.chatTaskId);
  if (!t || !t._chat) return;
  const body = document.getElementById('chatBody');
  body.innerHTML = t._chat.map(m => {
    if (m.who === 'system') return `<div class="chat-msg system">${m.text}</div>`;
    const cls = m.who === 'me' ? 'me' : 'them';
    const name = m.who === 'me' ? '我' : '发布者';
    return `<div class="chat-msg ${cls}"><div style="font-size:.6rem;opacity:.6;margin-bottom:2px">${name}</div>${m.text}</div>`;
  }).join('');
  scrollChatToBottom();
}

function scrollChatToBottom() {
  const body = document.getElementById('chatBody');
  if (body) body.scrollTop = body.scrollHeight;
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  const t = state.tasks.find(x => x.id === state.chatTaskId);
  if (!t) return;

  t._chat.push({ who: 'me', text });
  input.value = '';
  renderChat();

  // simulate response after delay
  setTimeout(() => {
    if (!t._chat) return;
    const responses = [
      '好的，那麻烦你了！',
      '可以，大概什么时候到？',
      '没问题，我在家等你。',
      '太好了，正好需要人帮忙！',
      '好的，到了给我发消息。'
    ];
    t._chat.push({ who: 'them', text: responses[Math.floor(Math.random() * responses.length)] });

    // after some back and forth, show approval buttons (simulate as "them" asking to confirm)
    const msgCount = t._chat.filter(m => m.who !== 'system').length;
    if (msgCount >= 4 && t._chatStatus === 'negotiating') {
      t._chat.push({ who: 'system', text: '发布者请求确认接单' });
      t._chatStatus = 'pending_approval';
      document.getElementById('chatInputWrap').style.display = 'none';
      document.getElementById('chatActions').style.display = 'flex';
      document.getElementById('chatStatus').textContent = '等待你确认';
      document.getElementById('chatStatus').style.color = '#ef4444';
    }
    renderChat();
  }, 800 + Math.random() * 600);
}

function approveTask() {
  const t = state.tasks.find(x => x.id === state.chatTaskId);
  if (!t) return;

  t._chat.push({ who: 'system', text: '✓ 你已确认接单' });
  t._chatStatus = 'approved';
  t.status = 'approved'; // task moves to my tasks

  // add to myTasks
  state.myTasks.push({
    taskId: t.id,
    title: t.title,
    type: t.type,
    price: t.price,
    distance: t.distance,
    status: 'approved',
    time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
  });

  document.getElementById('chatActions').style.display = 'none';
  document.getElementById('chatStatus').textContent = '已接单';
  document.getElementById('chatStatus').style.color = 'var(--accent2)';
  renderChat();
  refreshAll();
  updateMsgBadge();
  showToast('接单成功！任务已加入「我的任务」');
}

function rejectTask() {
  const t = state.tasks.find(x => x.id === state.chatTaskId);
  if (!t) return;
  t._chat.push({ who: 'system', text: '你已拒绝该任务' });
  t._chatStatus = 'rejected';
  document.getElementById('chatActions').style.display = 'none';
  document.getElementById('chatStatus').textContent = '已拒绝';
  document.getElementById('chatStatus').style.color = 'var(--muted)';
  renderChat();
  showToast('已拒绝该任务');
}

// ===== MY TASKS =====
function openMyTasks() {
  renderMyTasks();
  document.getElementById('myTasksModal').classList.add('show');
}
function closeMyTasks() {
  document.getElementById('myTasksModal').classList.remove('show');
}

function renderMyTasks() {
  const el = document.getElementById('myTasksContent');
  if (state.myTasks.length === 0) {
    el.innerHTML = '<div class="empty"><span class="em">📋</span><p>暂无进行中的任务<br>去首页接单吧！</p></div>';
    return;
  }
  el.innerHTML = state.myTasks.map(mt => {
    const emoji = TYPE_EMOJI[mt.type] || '📌';
    const bg = TYPE_BG[mt.type] || TYPE_BG.help;
    const priceText = mt.price === 0 ? '免费' : '¥' + mt.price;
    const statusLabel = mt.status === 'approved' ? '进行中' : '已完成';
    const statusClass = mt.status === 'approved' ? 'approved' : 'done';
    const btnText = mt.status === 'approved' ? '完成任务' : '已完成';
    const btnClass = mt.status === 'approved' ? '' : 'done';
    return `
    <div class="mtc">
      <div class="mtc-top">
        <div class="mtc-type" style="background:${bg}">${emoji}</div>
        <div class="mtc-title">${mt.title}</div>
        <div class="mtc-status ${statusClass}">${statusLabel}</div>
      </div>
      <div class="mtc-meta">📍 ${mt.distance}m · ${priceText} · 接单时间 ${mt.time}</div>
      <button class="mtc-btn ${btnClass}" onclick="completeTask(${mt.taskId})" ${mt.status==='done'?'disabled':''}>${btnText}</button>
    </div>`;
  }).join('');
}

function completeTask(taskId) {
  const mt = state.myTasks.find(x => x.taskId === taskId);
  if (!mt || mt.status === 'done') return;
  mt.status = 'done';
  // also update main task
  const t = state.tasks.find(x => x.id === taskId);
  if (t) t.status = 'done';
  renderMyTasks();
  refreshAll();
  showToast('任务完成！报酬已到账');
}

// ===== PAGE SWITCHING =====
function switchPage(page) {
  state.page = page;
  // update nav
  document.querySelectorAll('.bnav-item').forEach(el => el.classList.remove('active'));
  if (page === 'home') document.getElementById('navHome').classList.add('active');
  if (page === 'messages') document.getElementById('navMsg').classList.add('active');
  if (page === 'mytasks') document.getElementById('navMy').classList.add('active');

  if (page === 'home') {
    refreshAll();
  } else if (page === 'messages') {
    openMyTasks(); // for demo, messages shows my tasks
  } else if (page === 'mytasks') {
    openMyTasks();
  }
}

function updateMsgBadge() {
  const pending = state.myTasks.filter(t => t.status === 'approved').length;
  const label = document.getElementById('navMsgLabel');
  if (label) label.textContent = pending > 0 ? `消息(${pending})` : '消息';
}

// ===== DETAIL =====
function openDetail(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  const emoji = TYPE_EMOJI[t.type] || '📌';
  const priceText = t.price === 0 ? '免费' : '¥' + t.price;
  const scorePercent = Math.round(t.ai_score * 100);
  const prob = 50 + Math.floor(t.ai_score * 40);
  const estMin = Math.floor(2 + t.distance / 80);

  document.getElementById('detailContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0">${emoji} ${t.title}</h2>
      <button onclick="closeDetail()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted)">×</button>
    </div>
    <div class="ds"><h4>任务描述</h4><p>${t.desc}</p></div>
    <div class="ds"><h4>报酬</h4><p style="font-weight:700;font-size:1.1rem">${priceText}</p></div>
    <div class="ds"><h4>位置与时间</h4><p>📍 ${t.distance}m · ${t.time}</p></div>
    <div class="dai">
      <h4>🤖 AI 推荐分析</h4>
      <p style="font-size:.9rem;color:#166534;margin-bottom:8px">${t.ai_reason}</p>
      <div class="ag">
        <span>📏 距离 ${t.distance}m</span>
        <span>🛤️ 顺路概率 ${prob}%</span>
        <span>⏱️ 预计 ${estMin} 分钟</span>
        <span>🎯 匹配度 ${scorePercent}%</span>
      </div>
    </div>
    <button class="btn-p" onclick="acceptTask(${t.id});closeDetail()">${t.status==='open'?'接单':'已接单'}</button>
    <button class="btn-s" onclick="closeDetail()">关闭</button>`;
  document.getElementById('detailModal').classList.add('show');
}
function closeDetail() { document.getElementById('detailModal').classList.remove('show'); }

// ===== PUBLISH =====
function openPublish() { document.getElementById('pubModal').classList.add('show'); }
function closePublish() {
  document.getElementById('pubModal').classList.remove('show');
  document.getElementById('pubTitle').value = '';
  document.getElementById('pubDesc').value = '';
  document.getElementById('pubPrice').value = '';
}
function publishTask() {
  const title = document.getElementById('pubTitle').value.trim();
  const desc = document.getElementById('pubDesc').value.trim();
  const price = parseInt(document.getElementById('pubPrice').value) || 0;
  const type = document.getElementById('pubType').value;
  if (!title) { showToast('请填写任务标题'); return; }
  if (!desc) { showToast('请填写任务内容'); return; }
  state.tasks.unshift({
    id: state.nextId++, type, title, desc, price,
    distance: Math.floor(80+Math.random()*400), time: '刚刚', status: 'open',
    ai_score: Math.round((.75+Math.random()*.2)*100)/100,
    ai_reason: '距离较近，顺路即可完成',
    location: [39.9042+(Math.random()-.5)*.003, 116.4074+(Math.random()-.5)*.003]
  });
  refreshAll();
  closePublish();
  showToast('任务发布成功！');
}

// ===== MAP MODAL =====
function openMap() { document.getElementById('mapModal').classList.add('show'); renderMap(); }
function closeMap() { document.getElementById('mapModal').classList.remove('show'); }

// ===== AR =====
function openAR() { document.getElementById('arOverlay').classList.add('show'); renderAR(); }
function closeAR() { document.getElementById('arOverlay').classList.remove('show'); }

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== MODAL CLOSE =====
document.getElementById('pubModal').addEventListener('click', e => { if (e.target===e.currentTarget) closePublish(); });
document.getElementById('detailModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeDetail(); });
document.getElementById('mapModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeMap(); });
document.getElementById('chatModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeChat(); });
document.getElementById('myTasksModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeMyTasks(); });

// ===== INIT =====
ensureTasks();
refreshAll();
</script>
</body>
</html>
