<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OPC 智能工单系统 - 交互式演示</title>
<style>
  :root {
    --primary: #4F6EF7;
    --primary-dark: #3D5BD9;
    --primary-light: #EEF1FE;
    --primary-50: #F5F7FF;
    --secondary: #059669;
    --secondary-dark: #047857;
    --secondary-light: #D1FAE5;
    --danger: #DC2626;
    --danger-light: #FEE2E2;
    --warning: #D97706;
    --warning-light: #FEF3C7;
    --info: #0891B2;
    --info-light: #CFFAFE;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-150: #ECEEF1;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --gray-900: #111827;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.04);
    --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.07), 0 1px 2px -1px rgb(0 0 0 / 0.04);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.04);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.04);
    --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.04);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif; background: var(--gray-50); color: var(--gray-800); overflow: hidden; -webkit-font-smoothing: antialiased; }
  #app { height: 100vh; display: flex; flex-direction: column; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

  /* Top Navigation */
  .top-bar { background: rgba(255,255,255,0.95); border-bottom: 1px solid var(--gray-200); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; flex-shrink: 0; position: relative; z-index: 100; backdrop-filter: blur(12px); }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), #6366F1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 13px; box-shadow: 0 2px 8px rgba(79,110,247,0.3); }
  .role-tabs { display: flex; gap: 4px; background: var(--gray-100); padding: 4px; border-radius: var(--radius-md); }
  .role-tab { padding: 8px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--gray-500); cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); border: none; background: transparent; white-space: nowrap; position: relative; }
  .role-tab:hover { color: var(--gray-700); background: rgba(255,255,255,0.5); }
  .role-tab.active { background: #fff; color: var(--primary); box-shadow: var(--shadow-sm); font-weight: 600; }
  .badge-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: var(--danger); border-radius: 50%; border: 2px solid var(--gray-100); }

  /* Main Content Area */
  .main-content { flex: 1; overflow-y: auto; padding: 24px; }
  .view { display: none; animation: viewEnter 0.35s cubic-bezier(0.4,0,0.2,1); }
  .view.active { display: block; }
  @keyframes viewEnter { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* Cards & Layout */
  .card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-xs); border: 1px solid var(--gray-100); padding: 20px; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: var(--shadow-sm); }
  .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .flex-row { display: flex; gap: 16px; }
  .flex-col { display: flex; flex-direction: column; gap: 16px; }
  .flex-1 { flex: 1; min-width: 0; }

  /* KPI Cards */
  .kpi-card { padding: 18px 20px; display: flex; flex-direction: column; gap: 8px; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 3px 0 0 3px; }
  .kpi-card .kpi-label { font-size: 13px; color: var(--gray-500); font-weight: 500; letter-spacing: 0.2px; }
  .kpi-card .kpi-value { font-size: 28px; font-weight: 800; color: var(--gray-900); line-height: 1; letter-spacing: -0.5px; }
  .kpi-card .kpi-change { font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; margin-top: 2px; }
  .kpi-primary::before { background: var(--primary); }
  .kpi-secondary::before { background: var(--secondary); }
  .kpi-warning::before { background: var(--warning); }
  .kpi-danger::before { background: var(--danger); }
  .kpi-info::before { background: var(--info); }
  .kpi-neutral::before { background: var(--gray-400); }
  .kpi-icon { position: absolute; right: 14px; top: 14px; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; opacity: 0.12; }
  .kpi-primary .kpi-icon { background: var(--primary); }
  .kpi-secondary .kpi-icon { background: var(--secondary); }
  .kpi-warning .kpi-icon { background: var(--warning); }
  .kpi-danger .kpi-icon { background: var(--danger); }
  .kpi-info .kpi-icon { background: var(--info); }
  .kpi-neutral .kpi-icon { background: var(--gray-400); }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 12px; font-weight: 600; line-height: 1.4; }
  .badge-primary { background: var(--primary-light); color: var(--primary); }
  .badge-secondary { background: var(--secondary-light); color: var(--secondary); }
  .badge-warning { background: var(--warning-light); color: var(--warning); }
  .badge-danger { background: var(--danger-light); color: var(--danger); }
  .badge-info { background: var(--info-light); color: var(--info); }
  .badge-gray { background: var(--gray-100); color: var(--gray-600); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); border: none; outline: none; white-space: nowrap; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,110,247,0.25); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary { background: var(--secondary); color: #fff; }
  .btn-secondary:hover { background: var(--secondary-dark); transform: translateY(-1px); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-ghost { background: transparent; color: var(--gray-600); }
  .btn-ghost:hover { background: var(--gray-100); }
  .btn-outline { background: #fff; color: var(--gray-700); border: 1px solid var(--gray-200); }
  .btn-outline:hover { border-color: var(--gray-300); background: var(--gray-50); }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-lg { padding: 12px 24px; font-size: 15px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
  .btn-shine { position: relative; overflow: hidden; }
  .btn-shine::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: rotate(25deg); animation: btnShine 3s infinite; }
  @keyframes btnShine { 0% { transform: translateX(-100%) rotate(25deg); } 100% { transform: translateX(100%) rotate(25deg); } }

  /* Tables */
  .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .data-table th { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.8px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 5; }
  .data-table th:first-child { border-radius: 8px 0 0 0; }
  .data-table th:last-child { border-radius: 0 8px 0 0; }
  .data-table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  .data-table tr { transition: background 0.15s; cursor: pointer; }
  .data-table tbody tr:hover { background: var(--primary-50); }
  .data-table tbody tr:last-child td { border-bottom: none; }
  .data-table tbody tr:last-child td:first-child { border-radius: 0 0 0 8px; }
  .data-table tbody tr:last-child td:last-child { border-radius: 0 0 8px 0; }

  /* Section Headers */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .section-title { font-size: 16px; font-weight: 700; color: var(--gray-900); letter-spacing: -0.3px; }
  .section-subtitle { font-size: 13px; color: var(--gray-500); margin-top: 2px; }

  /* Canvas Charts */
  .chart-container { position: relative; height: 260px; width: 100%; }
  .chart-container canvas { width: 100% !important; height: 100% !important; display: block; }
  .chart-legend { display: flex; gap: 16px; justify-content: center; margin-top: 8px; }
  .chart-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--gray-600); }
  .chart-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* Toast Notifications */
  .toast-container { position: fixed; top: 72px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
  .toast { background: #fff; border-radius: var(--radius-md); box-shadow: var(--shadow-xl); padding: 14px 18px; display: flex; align-items: center; gap: 12px; min-width: 300px; max-width: 420px; animation: slideInRight 0.35s cubic-bezier(0.4,0,0.2,1), fadeOut 0.3s ease 2.7s forwards; border-left: 3px solid var(--primary); pointer-events: auto; }
  .toast.success { border-left-color: var(--secondary); }
  .toast.error { border-left-color: var(--danger); }
  .toast.warning { border-left-color: var(--warning); }
  @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); pointer-events: none; } }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(17,24,39,0.45); z-index: 1500; display: none; align-items: center; justify-content: center; backdrop-filter: blur(6px); padding: 20px; }
  .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
  .modal { background: #fff; border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); max-width: 640px; width: 100%; max-height: 88vh; overflow: hidden; display: flex; flex-direction: column; animation: scaleIn 0.3s cubic-bezier(0.4,0,0.2,1); }
  @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .modal-close { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gray-400); transition: all 0.2s; border: none; background: none; font-size: 20px; }
  .modal-close:hover { background: var(--gray-100); color: var(--gray-700); }
  .modal-body { padding: 24px; overflow-y: auto; flex: 1; }

  /* Timeline */
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before { content: ''; position: absolute; left: 9px; top: 4px; bottom: 4px; width: 2px; background: var(--gray-200); }
  .timeline-item { position: relative; padding-bottom: 22px; }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-dot { position: absolute; left: -28px; top: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 2.5px solid var(--primary); z-index: 2; display: flex; align-items: center; justify-content: center; }
  .timeline-dot::after { content: ''; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
  .timeline-dot.completed { border-color: var(--secondary); }
  .timeline-dot.completed::after { background: var(--secondary); }
  .timeline-dot.pending { border-color: var(--gray-300); }
  .timeline-dot.pending::after { background: var(--gray-300); }
  .timeline-dot.active { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79,110,247,0.12); }
  .timeline-time { font-size: 12px; color: var(--gray-400); margin-bottom: 4px; font-weight: 500; }
  .timeline-content { font-size: 14px; color: var(--gray-700); font-weight: 500; }
  .timeline-desc { font-size: 13px; color: var(--gray-500); margin-top: 4px; line-height: 1.5; }

  /* CS Dispatch Layout */
  .dispatch-layout { display: grid; grid-template-columns: 340px 1fr; gap: 20px; height: calc(100vh - 130px); }
  .dispatch-sidebar { display: flex; flex-direction: column; gap: 0; overflow-y: auto; background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--gray-100); box-shadow: var(--shadow-xs); }
  .dispatch-sidebar-header { padding: 16px 18px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
  .dispatch-main { display: flex; flex-direction: column; gap: 16px; overflow-y: auto; padding-right: 4px; }
  .order-list-item { padding: 14px 18px; cursor: pointer; transition: all 0.15s; background: #fff; border-bottom: 1px solid var(--gray-100); position: relative; }
  .order-list-item:last-child { border-bottom: none; }
  .order-list-item:hover { background: var(--gray-50); }
  .order-list-item.active { background: var(--primary-50); }
  .order-list-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--primary); }
  .dispatch-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--gray-400); }

  /* AI Analysis Panel */
  .ai-panel { background: linear-gradient(145deg, #1e1b4b 0%, #312e81 60%, #4c1d95 100%); color: #fff; border-radius: var(--radius-lg); padding: 22px; position: relative; overflow: hidden; }
  .ai-panel::before { content: ''; position: absolute; top: -40%; right: -30%; width: 180%; height: 180%; background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 60%); animation: aiPulse 5s ease-in-out infinite; }
  .ai-panel::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); }
  @keyframes aiPulse { 0%, 100% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.08) translate(-3%,-3%); } }
  .ai-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; position: relative; z-index: 1; }
  .ai-icon { width: 38px; height: 38px; background: rgba(255,255,255,0.08); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,255,255,0.06); }
  .ai-title { font-size: 15px; font-weight: 700; letter-spacing: 0.2px; }
  .ai-subtitle { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .ai-content { position: relative; z-index: 1; }
  .ai-result-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); gap: 16px; }
  .ai-result-row:last-child { border-bottom: none; }
  .ai-result-label { font-size: 13px; color: rgba(255,255,255,0.5); flex-shrink: 0; }
  .ai-result-value { font-size: 14px; font-weight: 500; text-align: right; line-height: 1.5; }
  .typing-text::after { content: '|'; animation: blink 1s step-end infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .ai-confidence { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); padding: 5px 12px; border-radius: 9999px; font-size: 12px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.05); }

  /* Technician Ranking */
  .tech-rank-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius-md); background: var(--gray-50); margin-bottom: 8px; transition: all 0.2s; cursor: pointer; border: 1.5px solid transparent; position: relative; }
  .tech-rank-item:hover { background: var(--gray-100); }
  .tech-rank-item.top { border-color: var(--primary); background: var(--primary-50); }
  .tech-rank-item.top::after { content: '推荐'; position: absolute; right: 12px; top: -1px; background: var(--primary); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 0 0 6px 6px; }
  .tech-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #6366F1); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .tech-info { flex: 1; min-width: 0; }
  .tech-name { font-size: 14px; font-weight: 600; color: var(--gray-800); }
  .tech-meta { font-size: 12px; color: var(--gray-500); margin-top: 3px; }
  .tech-score { text-align: right; position: relative; z-index: 1; }
  .tech-score-value { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
  .tech-score-label { font-size: 11px; color: var(--gray-400); }
  .match-bars { display: flex; gap: 4px; margin-top: 6px; }
  .match-bar { height: 4px; border-radius: 2px; background: var(--gray-200); flex: 1; position: relative; overflow: hidden; }
  .match-bar-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--primary), #818CF8); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

  /* Mobile Frame */
  .mobile-frame { max-width: 390px; margin: 0 auto; height: calc(100vh - 110px); background: #fff; border-radius: 44px; box-shadow: var(--shadow-xl); border: 10px solid var(--gray-800); overflow: hidden; display: flex; flex-direction: column; position: relative; }
  .mobile-frame::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 140px; height: 26px; background: var(--gray-800); border-bottom-left-radius: 14px; border-bottom-right-radius: 14px; z-index: 10; }
  .mobile-content { flex: 1; overflow-y: auto; padding: 16px; background: var(--gray-50); }
  .mobile-header { padding: 14px 16px 12px; background: #fff; border-bottom: 1px solid var(--gray-100); text-align: center; font-weight: 700; font-size: 16px; position: relative; margin-top: 14px; letter-spacing: -0.3px; }
  .mobile-back { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--gray-600); cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
  .mobile-back:hover { background: var(--gray-100); }
  .mobile-tabs { display: flex; background: #fff; border-bottom: 1px solid var(--gray-100); }
  .mobile-tab { flex: 1; text-align: center; padding: 12px; font-size: 14px; font-weight: 500; color: var(--gray-500); cursor: pointer; position: relative; transition: color 0.2s; }
  .mobile-tab.active { color: var(--primary); font-weight: 600; }
  .mobile-tab.active::after { content: ''; position: absolute; bottom: 0; left: 24%; right: 24%; height: 3px; background: var(--primary); border-radius: 3px 3px 0 0; }
  .mobile-card { background: #fff; border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-xs); border: 1px solid var(--gray-100); transition: box-shadow 0.2s; }
  .mobile-card:active { box-shadow: var(--shadow-sm); }
  .mobile-bottom-bar { display: flex; background: #fff; border-top: 1px solid var(--gray-100); padding: 6px 0 22px; }
  .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: var(--gray-400); cursor: pointer; transition: color 0.2s; }
  .mobile-nav-item.active { color: var(--primary); }
  .mobile-nav-icon { font-size: 22px; line-height: 1; }

  /* Order Cards */
  .order-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .order-card-title { font-size: 15px; font-weight: 700; color: var(--gray-900); letter-spacing: -0.2px; }
  .order-card-meta { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
  .order-card-actions { display: flex; gap: 8px; margin-top: 12px; }

  /* Step Progress */
  .step-progress { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; position: relative; }
  .step-progress::before { content: ''; position: absolute; top: 14px; left: 12%; right: 12%; height: 2px; background: var(--gray-200); z-index: 0; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; z-index: 1; }
  .step-circle { width: 30px; height: 30px; border-radius: 50%; background: var(--gray-200); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--gray-500); font-weight: 700; position: relative; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); border: 2px solid transparent; }
  .step.active .step-circle { background: var(--primary); color: #fff; box-shadow: 0 0 0 4px rgba(79,110,247,0.15); }
  .step.completed .step-circle { background: var(--secondary); color: #fff; }
  .step-label { font-size: 11px; color: var(--gray-500); font-weight: 500; }
  .step.active .step-label { color: var(--primary); font-weight: 600; }
  .step.completed .step-label { color: var(--secondary); }

  /* Client Mini App */
  .miniapp-home-header { text-align: center; padding: 32px 20px 28px; background: linear-gradient(135deg, var(--primary) 0%, #6366F1 50%, #7C3AED 100%); color: #fff; border-radius: var(--radius-lg); margin-bottom: 18px; position: relative; overflow: hidden; }
  .miniapp-home-header::before { content: ''; position: absolute; top: -30%; right: -20%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 70%); }
  .miniapp-home-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
  .miniapp-home-subtitle { font-size: 13px; opacity: 0.8; font-weight: 400; }
  .quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 18px; }
  .quick-action-btn { padding: 18px 12px; border-radius: var(--radius-md); background: #fff; border: 1px solid var(--gray-200); display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s; }
  .quick-action-btn:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
  .quick-action-btn:active { transform: translateY(0); }
  .quick-action-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .quick-action-label { font-size: 14px; font-weight: 600; color: var(--gray-700); }

  /* Form Elements */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; border-radius: var(--radius-md); border: 1px solid var(--gray-200); font-size: 14px; font-family: inherit; transition: all 0.2s; background: #fff; color: var(--gray-800); appearance: none; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,0.1); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select { background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%236B7280' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }
  .photo-upload { width: 100%; height: 120px; border: 2px dashed var(--gray-300); border-radius: var(--radius-md); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--gray-500); cursor: pointer; transition: all 0.2s; }
  .photo-upload:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-50); }
  .photo-upload.has-image { border-color: var(--secondary); background: var(--secondary-light); color: var(--secondary); }

  /* Star Rating */
  .star-rating { display: flex; gap: 6px; justify-content: center; }
  .star { font-size: 32px; color: var(--gray-300); cursor: pointer; transition: color 0.15s, transform 0.15s; line-height: 1; }
  .star.active { color: #FBBF24; }
  .star:hover { color: #F59E0B; transform: scale(1.1); }

  /* Animations */
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pulse-ring { animation: pulseRing 2s ease-out infinite; }
  @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(79,110,247,0.35); } 70% { box-shadow: 0 0 0 12px rgba(79,110,247,0); } 100% { box-shadow: 0 0 0 0 rgba(79,110,247,0); } }
  .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.4,0,0.2,1); }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.4,0,0.2,1); }

  /* Skeleton Loading */
  .skeleton { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-150) 50%, var(--gray-100) 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: 4px; }
  @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Tag/Pill */
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; background: var(--gray-100); color: var(--gray-600); }

  /* Progress bar */
  .progress-bar { width: 100%; height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #818CF8); border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

  /* Notification Dot */
  .notif-dot { position: relative; }
  .notif-dot::after { content: ''; position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; border: 2px solid #fff; }

  /* Detail info rows */
  .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gray-100); font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--gray-500); }
  .info-value { font-weight: 600; color: var(--gray-800); }

  /* Divider */
  .divider { height: 1px; background: var(--gray-100); margin: 16px 0; }

  /* Status step large */
  .status-step-large { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; }
  .status-step-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .status-step-icon.done { background: var(--secondary-light); }
  .status-step-icon.current { background: var(--primary-light); color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,0.1); }

  /* Tool List */
  .tool-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tool-chip { padding: 3px 10px; background: var(--gray-100); border-radius: 6px; font-size: 12px; color: var(--gray-600); font-weight: 500; }

  /* Chat Bubble */
  .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; margin-bottom: 8px; position: relative; }
  .chat-bubble.in { background: var(--gray-100); color: var(--gray-700); border-bottom-left-radius: 4px; align-self: flex-start; }
  .chat-bubble.out { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto; }
  .chat-time { font-size: 10px; color: var(--gray-400); margin-top: 4px; }

  /* Accordion */
  .accordion-item { border-bottom: 1px solid var(--gray-100); }
  .accordion-header { padding: 14px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 600; font-size: 14px; }
  .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; font-size: 13px; color: var(--gray-600); line-height: 1.6; }
  .accordion-item.open .accordion-body { max-height: 200px; padding-bottom: 14px; }
  .accordion-icon { transition: transform 0.2s; font-size: 12px; color: var(--gray-400); }
  .accordion-item.open .accordion-icon { transform: rotate(180deg); }

  /* Activity Feed */
  .activity-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .activity-content { flex: 1; }
  .activity-text { font-size: 13px; color: var(--gray-700); line-height: 1.5; }
  .activity-time { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

  /* Stats Ring */
  .stat-ring { position: relative; width: 120px; height: 120px; margin: 0 auto; }
  .stat-ring svg { transform: rotate(-90deg); }
  .stat-ring-bg { fill: none; stroke: var(--gray-100); stroke-width: 8; }
  .stat-ring-fill { fill: none; stroke: var(--primary); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .stat-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .stat-ring-value { font-size: 24px; font-weight: 800; color: var(--gray-900); }
  .stat-ring-label { font-size: 11px; color: var(--gray-500); }

  /* Filter Chips */
  .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .filter-chip { padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--gray-200); background: #fff; color: var(--gray-600); transition: all 0.2s; }
  .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
  .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* Hover Lift */
  .hover-lift { transition: transform 0.2s, box-shadow 0.2s; }
  .hover-lift:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }

  /* Glass Panel */
  .glass-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.5); border-radius: var(--radius-lg); }

  /* Live Indicator */
  .live-dot { width: 8px; height: 8px; background: var(--secondary); border-radius: 50%; display: inline-block; position: relative; }
  .live-dot::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid var(--secondary); animation: livePulse 1.5s infinite; }
  @keyframes livePulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }

  /* Scroll snap for mobile */
  .snap-x { scroll-snap-type: x mandatory; overflow-x: auto; display: flex; gap: 12px; padding-bottom: 8px; }
  .snap-x > * { scroll-snap-align: start; flex-shrink: 0; }

  /* Loading overlay */
  .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .loading-overlay.active { display: flex; }
  .loading-box { text-align: center; }
  .loading-box .spin { width: 48px; height: 48px; border: 4px solid var(--primary-light); border-top-color: var(--primary); border-radius: 50%; margin: 0 auto 16px; }
  .loading-box div { font-size: 14px; color: var(--gray-600); font-weight: 500; }

  /* Floating action button ripple */
  .fab { position: relative; overflow: hidden; }
  .fab::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle, rgba(255,255,255,0.3) 10%, transparent 10.5%); transform: scale(0); opacity: 0; transition: transform 0.5s, opacity 0.3s; }
  .fab:active::after { transform: scale(2.5); opacity: 1; transition: 0s; }

  /* Tooltip */
  .tooltip { position: relative; }
  .tooltip::before { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%) scale(0.9); background: var(--gray-800); color: #fff; font-size: 11px; padding: 4px 8px; border-radius: 6px; white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.2s; }
  .tooltip:hover::before { opacity: 1; transform: translateX(-50%) scale(1); }

  /* Count up animation helper */
  .count-up { font-variant-numeric: tabular-nums; }

  /* Bounce */
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .bounce { animation: bounce 2s infinite; }

  /* Shake */
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
  .shake { animation: shake 0.3s ease-in-out; }

  /* Glow */
  @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(79,110,247,0.2); } 50% { box-shadow: 0 0 20px rgba(79,110,247,0.4); } }
  .glow { animation: glow 2s ease-in-out infinite; }

  /* Card enter stagger */
  .stagger-1 { animation-delay: 0.05s; }
  .stagger-2 { animation-delay: 0.1s; }
  .stagger-3 { animation-delay: 0.15s; }
  .stagger-4 { animation-delay: 0.2s; }
  .stagger-5 { animation-delay: 0.25s; }
  .stagger-6 { animation-delay: 0.3s; }

  /* Image placeholder pattern */
  .img-pattern { background-image: repeating-linear-gradient(45deg, var(--gray-100) 0, var(--gray-100) 10px, var(--gray-50) 10px, var(--gray-50) 20px); }

  /* Responsive table card view */
  @media (max-width: 640px) {
    .data-table thead { display: none; }
    .data-table, .data-table tbody, .data-table tr, .data-table td { display: block; width: 100%; }
    .data-table tr { margin-bottom: 12px; border: 1px solid var(--gray-200); border-radius: var(--radius-md); background: #fff; padding: 12px; }
    .data-table td { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--gray-100); }
    .data-table td:last-child { border-bottom: none; }
    .data-table td::before { content: attr(data-label); font-weight: 600; color: var(--gray-500); font-size: 12px; }
  }

  /* Dark section accents */
  .dark-accent { background: linear-gradient(135deg, var(--gray-800), var(--gray-900)); color: #fff; }
  .dark-accent .section-title { color: #fff; }
  .dark-accent .section-subtitle { color: var(--gray-400); }

  /* Hero number display */
  .hero-number { font-size: 56px; font-weight: 800; letter-spacing: -2px; line-height: 1; }

  /* Micro interactions */
  .micro-btn { transition: transform 0.15s, box-shadow 0.15s; }
  .micro-btn:active { transform: scale(0.96); }

  /* Swipe hint */
  @keyframes swipeHint { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(8px); } }
  .swipe-hint { animation: swipeHint 1.5s ease-in-out infinite; }

  /* Focus styles */
  .focus-ring:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(79,110,247,0.3); }

  /* Print styles */
  @media print {
    .top-bar, .mobile-bottom-bar, .toast-container, .modal-overlay { display: none !important; }
    .main-content { overflow: visible; padding: 0; }
    .card { box-shadow: none; border: 1px solid var(--gray-200); break-inside: avoid; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  /* Empty state illustrations */
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.35; }
  .empty-state-title { font-size: 16px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
  .empty-state-desc { font-size: 13px; color: var(--gray-400); }

  /* Number ticker animation container */
  .ticker { display: inline-block; overflow: hidden; height: 1.2em; line-height: 1.2em; vertical-align: bottom; }
  .ticker-inner { display: flex; flex-direction: column; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }

  /* Context menu (simulated) */
  .context-menu { background: #fff; border-radius: var(--radius-md); box-shadow: var(--shadow-xl); border: 1px solid var(--gray-100); padding: 6px 0; min-width: 160px; }
  .context-item { padding: 8px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .context-item:hover { background: var(--gray-50); }

  /* Horizontal scroll masking */
  .scroll-mask { mask-image: linear-gradient(to right, transparent, black 20px, black calc(100% - 20px), transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 20px, black calc(100% - 20px), transparent); }

  /* Code block style for data display */
  .code-block { background: var(--gray-800); color: #e5e7eb; padding: 12px 16px; border-radius: var(--radius-md); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; overflow-x: auto; }

  /* Toggle switch */
  .toggle { width: 40px; height: 22px; background: var(--gray-300); border-radius: 11px; position: relative; cursor: pointer; transition: background 0.2s; }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform 0.2s; box-shadow: var(--shadow-sm); }
  .toggle.active { background: var(--primary); }
  .toggle.active::after { transform: translateX(18px); }

  /* Selection color */
  ::selection { background: rgba(79,110,247,0.2); color: inherit; }

  /* Responsive */
  @media (max-width: 1100px) {
    .grid-6 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .dispatch-layout { grid-template-columns: 280px 1fr; }
  }
  @media (max-width: 768px) {
    .top-bar { padding: 0 12px; height: 56px; }
    .logo span { display: none; }
    .role-tabs { overflow-x: auto; max-width: 55vw; padding: 3px; }
    .role-tab { padding: 6px 12px; font-size: 13px; }
    .main-content { padding: 12px; }
    .grid-6, .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }

    .dispatch-layout { grid-template-columns: 1fr; height: auto; }
    .dispatch-sidebar { max-height: 320px; }

    .chart-container { height: 220px; }
    .modal { max-width: 95vw; }
  }
  @media (max-width: 480px) {
    .kpi-card { padding: 14px 16px; }
    .kpi-value { font-size: 24px; }
    .section-title { font-size: 15px; }
    .btn-lg { padding: 10px 18px; font-size: 14px; }
  }
</style>

<body>
<div id="app">
  <!-- Top Navigation -->
  <nav class="top-bar">
    <div class="logo">
      <div class="logo-icon">OP</div>
      <span>OPC 智能工单系统</span>
    </div>

      <button class="role-tab active" data-view="admin">管理后台</button>

  <div class="main-content">

    <div class="view active" id="view-admin">
      <div class="grid-6" id="kpiCards"></div>
      <div class="flex-row" style="margin-top:20px">
        <div class="card flex-1">
          <div class="section-header">
            <div>
              <div class="section-title">近7天工单趋势</div>
              <div class="section-subtitle">工单创建 vs 完成数量对比</div>
            </div>
            <select class="form-select" style="width:110px;font-size:12px;padding:5px 24px 5px 10px">
              <option>近7天</option>
              <option>近30天</option>
            </select>
          </div>

            <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--secondary)"></div>完成工单</div>
          </div>
        </div>
        <div class="card flex-1">
          <div class="section-header">
            <div>
              <div class="section-title">工单状态分布</div>
              <div class="section-subtitle">当前各状态工单占比统计</div>
            </div>
          </div>
          <div class="chart-container"><canvas id="statusChart"></canvas></div>
          <div class="chart-legend" id="statusLegend"></div>
        </div>
      </div>
      <div class="flex-row" style="margin-top:20px">
        <div class="card flex-1">
          <div class="section-header">
            <div>
              <div class="section-title">实时动态</div>
              <div class="section-subtitle">系统最新活动记录</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500)"><span class="live-dot"></span> 实时更新</div>
          </div>
          <div id="activityFeed"></div>
        </div>
        <div class="card flex-1">
          <div class="section-header">
            <div>
              <div class="section-title">技术员状态</div>
              <div class="section-subtitle">在线技术员当前负载</div>
            </div>
          </div>
          <div id="techStatusList"></div>
        </div>
      </div>
      <div class="card" style="margin-top:20px">
        <div class="section-header">
          <div>
            <div class="section-title">工单列表</div>
            <div class="section-subtitle">点击行查看详情</div>
          </div>

function getOrderTimeline(o) {
  const steps = [];
  steps.push({ time: o.createdAt, text: '工单创建', desc: '客户提交报修申请，系统自动录入', completed: true });
  if (o.status !== 'pending') steps.push({ time: addMinutes(o.createdAt, 30), text: '客服审核并派单', desc: 'AI分析故障，推荐最佳技术员', completed: true });
  if (o.status === 'progress' || o.status === 'completed') {
    steps.push({ time: addMinutes(o.createdAt, 60), text: '技术员接单', desc: '技术员确认接单，准备工具和材料', completed: true });
    steps.push({ time: addMinutes(o.createdAt, 90), text: '到达现场', desc: '技术员已到达故障地点', completed: true });
  }
  if (o.status === 'progress') steps.push({ time: '进行中', text: '正在施工处理', desc: '技术员正在进行维修作业', completed: false, active: true });
  if (o.status === 'completed') {
    steps.push({ time: addMinutes(o.createdAt, 120), text: '施工中', desc: '维修作业进行中', completed: true });
    steps.push({ time: addMinutes(o.createdAt, 150), text: '拍照上传', desc: '技术员上传维修过程照片', completed: true });
    steps.push({ time: o.completedAt, text: '完工验收', desc: '维修完成，客户确认验收', completed: true });
  }
  return steps.map((s) => {
    const dotClass = s.completed ? 'completed' : (s.active ? 'active' : 'pending');
    return `<div class="timeline-item">
      <div class="timeline-dot ${dotClass}"></div>
      <div class="timeline-time">${s.time}</div>
      <div class="timeline-content">${s.text}</div>
      ${s.desc ? `<div class="timeline-desc">${s.desc}</div>` : ''}
    </div>`;
  }).join('');
}

function addMinutes(timeStr, mins) {
  const [d, t] = timeStr.split(' ');
  const [h, m] = t.split(':').map(Number);
  const date = new Date(2024, 0, 15, h, m + mins);
  return d + ' ' + String(date.getHours()).padStart(2,'0') + ':' + String(date.getMinutes()).padStart(2,'0');
}

// ===================== CANVAS CHARTS =====================
function drawTrendChart() {
  const canvas = $('#trendChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pad = { t: 30, r: 20, b: 35, l: 40 };
  const days = ['1/9','1/10','1/11','1/12','1/13','1/14','1/15'];
  const created = [8, 10, 7, 12, 9, 11, 14];
  const completed = [6, 8, 9, 8, 10, 7, 5];
  const max = 16;

  ctx.clearRect(0,0,w,h);
  // Grid
  ctx.strokeStyle = '#f3f4f6'; ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = pad.t + (h - pad.t - pad.b) * (i / 5);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#9ca3af'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(max - (max * i / 5)), pad.l - 8, y + 4);
  }
  // X labels
  days.forEach((d, i) => {
    const x = pad.l + (w - pad.l - pad.r) * (i / (days.length - 1));
    ctx.fillStyle = '#6b7280'; ctx.textAlign = 'center'; ctx.font = '12px sans-serif';
    ctx.fillText(d, x, h - pad.b + 18);
  });

  function drawLine(data, color, fill) {
    const pts = data.map((v, i) => ({
      x: pad.l + (w - pad.l - pad.r) * (i / (days.length - 1)),
      y: pad.t + (h - pad.t - pad.b) * (1 - v / max)
    }));
    if (fill) {
      ctx.beginPath(); ctx.moveTo(pts[0].x, h - pad.b);
      pts.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(pts[pts.length-1].x, h - pad.b); ctx.closePath();
      ctx.fillStyle = fill; ctx.fill();
    }
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.moveTo(pts[0].x, pts[0].y);
    pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
    pts.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();
    });
  }

  drawLine(created, '#4F6EF7', 'rgba(79,110,247,0.06)');
  drawLine(completed, '#059669', 'rgba(5,150,105,0.04)');
}

function drawStatusChart() {
  const canvas = $('#statusChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const data = [
    { label: '待派单', value: orders.filter(o => o.status === 'pending').length, color: '#9CA3AF' },
    { label: '已派单', value: orders.filter(o => o.status === 'dispatched').length, color: '#0891B2' },
    { label: '进行中', value: orders.filter(o => o.status === 'progress').length, color: '#D97706' },
    { label: '已完成', value: orders.filter(o => o.status === 'completed').length, color: '#059669' },
  ];
  const max = Math.max(...data.map(d => d.value), 1);
  const barW = Math.min(56, (w - 100) / data.length - 24);
  const startX = (w - data.length * (barW + 24)) / 2 + 12;
  const legendHtml = [];

  data.forEach((d, i) => {
    const x = startX + i * (barW + 24);
    const bh = (d.value / max) * (h - 75);
    const y = h - 55 - bh;
    // Bar bg
    ctx.fillStyle = '#f3f4f6'; roundRect(ctx, x, h - 55, barW, bh + (h-55-y) - (h-55-y), 8); ctx.fill();
    // Bar
    ctx.fillStyle = d.color; ctx.globalAlpha = 0.9;
    roundRect(ctx, x, y, barW, bh, 8); ctx.fill(); ctx.globalAlpha = 1;
    // Value
    ctx.fillStyle = '#111827'; ctx.textAlign = 'center'; ctx.font = 'bold 15px sans-serif';
    ctx.fillText(d.value, x + barW/2, y - 10);
    // Label
    ctx.fillStyle = '#6b7280'; ctx.font = '12px sans-serif';
    ctx.fillText(d.label, x + barW/2, h - 32);
    legendHtml.push(`<div class="chart-legend-item"><div class="chart-legend-dot" style="background:${d.color}"></div>${d.label}</div>`);
  });
  $('#statusLegend').innerHTML = legendHtml.join('');
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

  }).sort((a, b) => b.score - a.score);

  $('#techRanking').innerHTML = ranked.map((t, i) => `
    <div class="tech-rank-item ${i === 0 ? 'top' : ''}" onclick="highlightTech(this)">
      <div style="width:22px;text-align:center;font-weight:800;color:${i===0?'var(--primary)':'var(--gray-400)'};font-size:14px">${i+1}</div>

          <div class="match-bar" title="服务评分"><div class="match-bar-fill" style="width:${t.rating*20}%"></div></div>
          <div class="match-bar" title="负载情况"><div class="match-bar-fill" style="width:${(6-t.load)*20}%"></div></div>

        </div>

        <div style="font-size:12px;color:var(--gray-500);margin-bottom:14px;display:flex;align-items:center;gap:4px">&#128205; ${o.location}</div>

          <div style="font-weight:600;margin-bottom:4px;color:var(--primary)">AI 派单建议</div>
          ${o.aiAnalysis.suggestion}
        </div>
        <div class="order-card-actions">
          <button class="btn btn-secondary flex-1" onclick="acceptOrder('${o.id}')">&#9989; 接单</button>
          <button class="btn btn-ghost flex-1" onclick="rejectOrder('${o.id}')">&#10007; 拒单</button>
        </div>
      </div>`;
    } else if (techCurrentTab === 'progress') {
      const stepIdx = o.currentStep || 3;
      const stepNames = ['创建', '派单', '接单', '签到', '施工', '拍照', '完工'];
      return `<div class="mobile-card fade-in-up" onclick="showTechOrderDetail('${o.id}')">
        <div class="order-card-header">
          <div>
            <div class="order-card-title">${o.type}</div>
            <div class="order-card-meta">${c.name}</div>
          </div>
          <span class="badge ${st.badge}">${st.label}</span>
        </div>
        <div style="font-size:13px;color:var(--gray-600);margin-bottom:10px">${o.description}</div>
        <div style="font-size:12px;color:var(--gray-500);margin-bottom:14px">&#128205; ${o.location}</div>
        <div class="step-progress">
          ${[2,3,4,5].map((si, i) => {
            const scls = si < stepIdx ? 'completed' : (si === stepIdx ? 'active' : '');
            const icon = si < stepIdx ? '&#10003;' : (si === stepIdx ? (si+1) : (si+1));
            return `<div class="step ${scls}"><div class="step-circle">${icon}</div><div class="step-label">${stepNames[si]}</div></div>`;
          }).join('')}
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="event.stopPropagation();advanceTechStep('${o.id}')">
          ${getTechActionLabel(stepIdx)}
        </button>
      </div>`;
    } else {
      return `<div class="mobile-card fade-in-up">
        <div class="order-card-header">
          <div>
            <div class="order-card-title">${o.type}</div>
            <div class="order-card-meta">${c.name}</div>
          </div>
          <span class="badge ${st.badge}">${st.label}</span>
        </div>
        <div style="font-size:13px;color:var(--gray-600);margin-bottom:8px">${o.description}</div>
        <div style="font-size:12px;color:var(--gray-500)">完成时间：${o.completedAt}</div>
        <div style="display:flex;gap:12px;margin-top:12px;font-size:12px;align-items:center">
          <span style="color:var(--secondary);display:flex;align-items:center;gap:3px">&#9733; 5.0</span>
          <span style="color:var(--gray-400)">|</span>
          <span style="color:var(--gray-500)">用时 ${getDuration(o)}</span>
        </div>
      </div>`;
    }
  }).join('');
}

function getTechActionLabel(step) {
  const labels = { 2: '接单', 3: '到达现场', 4: '开始施工', 5: '拍照上传', 6: '确认完工' };
  return labels[step] || '下一步';
}

function getDuration(o) {
  if (!o.completedAt) return '-';
  const h = Math.round((new Date('2024-01-15T'+o.completedAt.split(' ')[1]) - new Date('2024-01-15T'+o.createdAt.split(' ')[1])) / 3600000 * 10) / 10;
  return h + 'h';
}

function acceptOrder(id) {
  const o = orders.find(x => x.id === id);
  if (o) { o.status = 'progress'; o.currentStep = 3; showToast('接单成功！请尽快到达现场', 'success'); renderTech(); }
}
function rejectOrder(id) { showToast('已拒绝该工单，系统将重新分配', 'warning'); }
function showTechOrderDetail(id) { showOrderDetail(id); }

function advanceTechStep(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  const actions = {
    3: { msg: '已到达现场并签到', next: 4 },
    4: { msg: '开始施工，注意安全', next: 5 },
    5: { msg: '照片上传成功', next: 6, photo: true },
    6: { msg: '工单已完工，等待客户确认', next: 6, complete: true }
  };
  const act = actions[o.currentStep];
  if (!act) return;

  if (act.photo) {
    showToast('正在打开相机...', 'info');
    setTimeout(() => {
      o.currentStep = act.next;
      if (o.steps) o.steps.push('photo');
      showToast(act.msg, 'success');
      renderTech();
    }, 1200);
    return;
  }

  if (act.complete) {
    o.status = 'completed';
    o.completedAt = '2024-01-15 ' + String(new Date().getHours()).padStart(2,'0') + ':' + String(new Date().getMinutes()).padStart(2,'0');
    if (o.steps) o.steps.push('completed');
    showToast('工单已完工！客户评价 5.0 星', 'success');
    renderTech();
    return;
  }

  o.currentStep = act.next;
  if (o.steps && !o.steps.includes(stepLabels[act.next].replace(/[^\u4e00-\u9fa5]/g,''))) o.steps.push(stepLabels[act.next]);
  showToast(act.msg, 'success');
  renderTech();
}

// ===================== KEYBOARD SHORTCUTS =====================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '1' && e.ctrlKey) { e.preventDefault(); switchView('admin'); }
  if (e.key === '2' && e.ctrlKey) { e.preventDefault(); switchView('dispatch'); }
  if (e.key === '3' && e.ctrlKey) { e.preventDefault(); switchView('tech'); }
  if (e.key === '4' && e.ctrlKey) { e.preventDefault(); switchView('client'); }
});
function switchView(view) {
  $$('.role-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  $$('.view').forEach(v => v.classList.remove('active'));
  $(`#view-${view}`).classList.add('active');
  currentView = view;
  if (view === 'admin') renderAdmin();
  else if (view === 'dispatch') renderDispatch();
  else if (view === 'tech') renderTech();
  else if (view === 'client') renderClientHome();
}

function showLoading(msg) {
  let overlay = $('#globalLoading');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'globalLoading';
    overlay.className = 'loading-overlay';
    overlay.innerHTML = `<div class="loading-box"><div class="spin"></div><div>${msg || '处理中...'}</div></div>`;
    document.body.appendChild(overlay);
  }
  overlay.querySelector('div div:last-child').textContent = msg || '处理中...';
  overlay.classList.add('active');
}
function hideLoading() {

// ===================== SEARCH HIGHLIGHT =====================
function highlightText(node, query) {
  if (!query) return;
  const walk = document.createTreeWalker(node, NodeFilter.SHOW_TEXT, null, false);
  const textNodes = [];
  while (walk.nextNode()) textNodes.push(walk.currentNode);
  textNodes.forEach(n => {
    const idx = n.textContent.toLowerCase().indexOf(query.toLowerCase());
    if (idx >= 0 && n.parentElement.tagName !== 'SCRIPT' && n.parentElement.tagName !== 'STYLE') {
      const span = document.createElement('span');
      span.innerHTML = n.textContent.substring(0, idx) + '<mark style="background:#fde047;padding:0 2px;border-radius:2px">' + n.textContent.substring(idx, idx + query.length) + '</mark>' + n.textContent.substring(idx + query.length);
      n.parentNode.replaceChild(span, n);
    }
  });
}

function showDemoTip(text, targetSelector, position = 'bottom') {
  const target = $(targetSelector);
  if (!target) return;
  const rect = target.getBoundingClientRect();
  const tip = document.createElement('div');
  tip.className = 'demo-tip';
  tip.innerHTML = `<div style="background:var(--gray-800);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;max-width:240px;line-height:1.5;position:fixed;z-index:5000;box-shadow:var(--shadow-xl)">${text}<div style="position:absolute;width:8px;height:8px;background:var(--gray-800);transform:rotate(45deg)"></div></div>`;
  document.body.appendChild(tip);
  const tipEl = tip.firstElementChild;
  const tipRect = tipEl.getBoundingClientRect();
  let top = rect.bottom + 10;
  let left = rect.left + rect.width / 2 - tipRect.width / 2;
  if (position === 'top') top = rect.top - tipRect.height - 10;
  tipEl.style.top = top + 'px';
  tipEl.style.left = Math.max(10, Math.min(window.innerWidth - tipRect.width - 10, left)) + 'px';
  const arrow = tipEl.querySelector('div:last-child');
  arrow.style.left = (rect.left + rect.width / 2 - left - 4) + 'px';
  if (position === 'top') arrow.style.top = 'calc(100% - 4px)';
  else arrow.style.top = '-4px';
  setTimeout(() => tip.remove(), 4000);
}

// ===================== DATA UTILITIES =====================
function groupBy(array, key) {
  return array.reduce((result, item) => {
    const group = item[key];
    if (!result[group]) result[group] = [];
    result[group].push(item);
    return result;
  }, {});
}
function sortBy(array, key, desc = false) {
  return [...array].sort((a, b) => {
    const av = a[key], bv = b[key];
    if (av < bv) return desc ? 1 : -1;
    if (av > bv) return desc ? -1 : 1;
    return 0;
  });
}
function formatRelativeTime(dateStr) {
  const date = new Date(dateStr.replace(' ', 'T'));
  const diff = Date.now() - date.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + '分钟前';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + '小时前';
  return Math.floor(hours / 24) + '天前';
}
function debounce(fn, wait) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => fn.apply(this, args), wait);
  };
}
