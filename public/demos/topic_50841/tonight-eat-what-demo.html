body{font-family:'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#FFF9E6 0%,#FFEAA7 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

/* ===== 手机外框 ===== */
.phone{width:390px;height:844px;background:var(--bg2);border-radius:42px;box-shadow:0 0 0 12px #1a1a1a,0 20px 60px rgba(0,0,0,.3);overflow:hidden;position:relative;display:flex;flex-direction:column}

.page{flex:1;overflow-y:auto;display:none;flex-direction:column;position:relative}

.page::-webkit-scrollbar{width:0}

.page-header{padding:8px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}

.page-header .sub{font-size:.78rem;color:var(--muted);margin-top:2px}

/* ===== 搜索框 ===== */
.search-wrap{padding:0 16px 10px;flex-shrink:0}

.ing-chip .emoji{font-size:1.5rem;display:block;margin-bottom:4px}
.ing-chip .name{font-size:.75rem;font-weight:600}

/* ===== 底部按钮栏 ===== */
.bottom-bar{position:sticky;bottom:0;left:0;right:0;padding:12px 20px 20px;background:linear-gradient(to top,var(--bg2) 60%,transparent);z-index:50;flex-shrink:0;margin-top:auto}
.generate-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;padding:16px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 15px rgba(255,107,107,.4);font-family:inherit}

/* ===== 口味筛选 ===== */

.taste-pill.active{background:var(--accent2);border-color:var(--accent2);color:#fff}

/* ===== 菜谱卡片 ===== */
.recipe-list{padding:0 16px 16px}
.recipe-card{background:var(--bg2);border-radius:16px;padding:14px;margin-bottom:10px;display:flex;gap:12px;box-shadow:var(--shadow);cursor:pointer;transition:.2s;position:relative}
.recipe-card:active{transform:scale(.98)}
.recipe-card .img{width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,var(--accent3),var(--accent));display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}

.recipe-card .rname{font-size:.92rem;font-weight:700;color:var(--ink);margin-bottom:4px}

.recipe-card .match{font-size:.72rem;color:var(--accent2);font-weight:700;margin-top:3px}

.nutri-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.cal-tag{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:8px;color:#fff}
.cal-low{background:#4ECDC4}
.cal-mid{background:#FFA500}
.cal-high{background:#FF6B6B}
.nutri-tag{font-size:.62rem;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:8px}
.nutri-bar{display:flex;gap:3px;margin-top:6px}
.nutri-bar-item{flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:6px 2px}
.nutri-bar-item .val{font-size:.82rem;font-weight:700;color:var(--ink)}
.nutri-bar-item .lbl{font-size:.6rem;color:var(--muted);margin-top:1px}
.nutri-bar-item.cal .val{color:var(--accent)}
.nutri-bar-item.protein .val{color:var(--accent2)}
.recipe-card .fav-btn{position:absolute;top:12px;right:12px;font-size:1.1rem;cursor:pointer;background:none;border:none;transition:.2s}
.recipe-card .fav-btn:active{transform:scale(.8)}

/* ===== 加载动画 ===== */
.loading-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:44px;height:44px;border:4px solid var(--rule);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap .text{font-size:.88rem;color:var(--muted)}

/* ===== 空状态 ===== */
.empty-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:12px}
.empty-wrap .emoji{font-size:3rem}
.empty-wrap .title{font-size:1rem;font-weight:700;color:var(--ink)}
.empty-wrap .desc{font-size:.82rem;color:var(--muted);line-height:1.6}
.empty-wrap .action{margin-top:8px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}

/* ===== 详情页 ===== */
.detail-hero{text-align:center;padding:16px 20px 12px;flex-shrink:0}
.detail-hero .big-emoji{font-size:3.5rem}
.detail-hero .dname{font-size:1.2rem;font-weight:800;color:var(--ink);margin-top:6px}
.detail-hero .dmeta{font-size:.78rem;color:var(--muted);margin-top:4px}
.detail-section{padding:0 20px 16px}
.detail-section h4{font-size:.88rem;color:var(--accent);margin-bottom:8px;font-weight:700}
.ing-list{font-size:.82rem;line-height:2}
.ing-list .have{color:var(--accent2);font-weight:600}
.ing-list .missing{color:var(--accent);font-weight:600}
.substitution-box{background:#FFF3D6;border-left:4px solid var(--accent3);border-radius:8px;padding:10px 14px;margin-top:8px;font-size:.78rem;color:var(--ink)}
.step-item{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}

.step-text{font-size:.84rem;color:var(--muted);line-height:1.6;flex:1}
.step-tip{background:var(--bg);border-radius:8px;padding:6px 10px;margin-top:4px;font-size:.76rem;color:var(--accent)}

/* ===== 底部导航 ===== */
.nav-bar{display:flex;border-top:1px solid var(--rule);background:var(--bg2);flex-shrink:0}

.nav-item .nav-label{font-size:.68rem;font-weight:600;margin-top:2px}

/* ===== 错误状态 ===== */
.error-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px;text-align:center}
.error-wrap .emoji{font-size:2.5rem}
.error-wrap .text{font-size:.88rem;color:var(--muted)}

/* ===== 动画 ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.nutri-progress-fill.cal{background:linear-gradient(90deg,#FF6B6B,#FFA500)}

.meal-card .mcal .cal-num{font-weight:700;color:var(--accent)}
.meal-card .del-btn{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);color:var(--accent);font-size:1rem;cursor:pointer;flex-shrink:0;transition:.2s}
.meal-card .del-btn:active{transform:scale(.85)}
.clear-meals-btn{display:block;margin:12px auto;background:var(--bg);color:var(--accent);border:1px solid var(--accent);border-radius:10px;padding:8px 20px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}

.add-meal-btn{width:100%;background:linear-gradient(135deg,var(--accent2),#44A08D);color:#fff;border:none;border-radius:12px;padding:14px;font-size:.92rem;font-weight:700;cursor:pointer;margin:12px 0 8px;transition:.2s;box-shadow:0 4px 12px rgba(78,205,196,.3);font-family:inherit}

.goal-section{padding:0 20px 12px}

.chart-section{padding:0 16px 16px}

.report-modal{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}

// ===== 营养目标模式（localStorage 持久化）=====
const GOAL_PRESETS={
  balanced:{label:'均衡',cal:2000,protein:60,fat:65,carbs:300},
  fatLoss:{label:'减脂',cal:1600,protein:75,fat:50,carbs:180},
  muscleGain:{label:'增肌',cal:2500,protein:90,fat:75,carbs:350},
};
let currentGoal=JSON.parse(localStorage.getItem('food_nutri_goal')||'null')||'balanced';
let customGoal=JSON.parse(localStorage.getItem('food_custom_goal')||'null');
function getGoal(){
  if(currentGoal==='custom'&&customGoal){
    return{label:'自定义',...customGoal};
  }
  return GOAL_PRESETS[currentGoal]||GOAL_PRESETS.balanced;
}
function setGoal(key){
  currentGoal=key;
  localStorage.setItem('food_nutri_goal',JSON.stringify(key));
  renderNutrition();
  updateCalHintBar();
}
function saveCustomGoal(){
  const cal=parseInt($('custom-cal').value)||2000;
  const protein=parseInt($('custom-protein').value)||60;
  const fat=parseInt($('custom-fat').value)||65;
  const carbs=parseInt($('custom-carbs').value)||300;
  // 边界校验
  if(cal<800||cal>5000){alert('热量目标应在 800~5000kcal 之间');return;}
  if(protein<20||protein>200){alert('蛋白质目标应在 20~200g 之间');return;}
  if(fat<15||fat>150){alert('脂肪目标应在 15~150g 之间');return;}
  if(carbs<50||carbs>600){alert('碳水目标应在 50~600g 之间');return;}
  customGoal={cal,protein,fat,carbs};
  localStorage.setItem('food_custom_goal',JSON.stringify(customGoal));
  currentGoal='custom';
  localStorage.setItem('food_nutri_goal',JSON.stringify('custom'));
  renderNutrition();
  updateCalHintBar();
}
function toggleCustomGoalForm(){
  const form=$('custom-goal-form');
  if(form.classList.contains('show')){
    form.classList.remove('show');
  }else{
    const g=getGoal();
    $('custom-cal').value=g.cal;
    $('custom-protein').value=g.protein;
    $('custom-fat').value=g.fat;
    $('custom-carbs').value=g.carbs;
    form.classList.add('show');
  }
}

function getWeeklyHistory(){
  const history=loadNutriHistory();
  const result=[];
  const now=new Date();
  for(let i=6;i>=0;i--){
    const d=new Date(now);
    d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const label=`${d.getMonth()+1}/${d.getDate()}`;
    const data=history[key]||{cal:0,protein:0,fat:0,carbs:0};
    result.push({label,key,...data});
  }
  return result;
}

// ===== 月度历史记录 =====
function getMonthlyHistory(){
  const history=loadNutriHistory();
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const result=[];
  for(let day=1;day<=daysInMonth;day++){
    const key=`${year}-${month+1}-${day}`;
    const data=history[key]||{cal:0,protein:0,fat:0,carbs:0};
    result.push({day,key,...data});
  }
  return result;
}
function getMonthlySummary(year,month){
  const history=loadNutriHistory();
  const daysInMonth=new Date(year,month+1,0).getDate();
  let totalCal=0,totalProtein=0,totalFat=0,totalCarbs=0,recordDays=0,overDays=0;
  const goal=getGoal();
  for(let day=1;day<=daysInMonth;day++){
    const key=`${year}-${month+1}-${day}`;
    const data=history[key];
    if(data&&data.cal>0){
      recordDays++;
      totalCal+=data.cal;
      totalProtein+=data.protein;
      totalFat+=data.fat;
      totalCarbs+=data.carbs;
      if(data.cal>goal.cal)overDays++;
    }
  }
  return{
    recordDays,
    totalCal,
    totalProtein,
    totalFat,
    totalCarbs,
    overDays,
    avgCal:recordDays>0?Math.round(totalCal/recordDays):0,
    avgProtein:recordDays>0?Math.round(totalProtein/recordDays):0,
    avgFat:recordDays>0?Math.round(totalFat/recordDays):0,
    avgCarbs:recordDays>0?Math.round(totalCarbs/recordDays):0
  };
}

// ===== 判断今日热量是否超标 =====
function isCalorieOver(){
  const total=calcTodayNutrition();
  const goal=getGoal();
  return total.cal>goal.cal;
}

function unlockAchievement(id){
  const unlocked=loadUnlockedAchievements();
  if(!unlocked.includes(id)){
    unlocked.push(id);
    saveUnlockedAchievements(unlocked);
    const ach=ACHIEVEMENTS.find(a=>a.id===id);
    if(ach){
      // 记录新解锁的成就（用于海报分享）
      const newlyUnlocked=JSON.parse(sessionStorage.getItem('newly_unlocked')||'[]');
      newlyUnlocked.push(id);
      sessionStorage.setItem('newly_unlocked',JSON.stringify(newlyUnlocked));
      // 显示解锁通知 + 海报分享提示
      const hiddenTag=ach.hidden?'✨ 隐藏成就 · ':'🎉 成就解锁：';
      setTimeout(()=>{
        showShareToast(`${hiddenTag}${ach.name}！${ach.desc}`);
        // 1秒后弹出成就海报分享弹窗
        setTimeout(()=>{
          if(confirm(`🎉 恭喜解锁「${ach.name}」！\n\n是否生成专属成就海报分享到社交平台？`)){
            openAchievementPoster(id);
          }
        },1200);
      },300);
    }
    return true;
  }
  return false;
}
function checkAchievements(){
  const history=loadNutriHistory();
  const now=new Date();
  const todayKey=getTodayKey();

  // 计算连续记录天数
  let streak=0;
  for(let i=0;i<365;i++){
    const d=new Date(now);
    d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    if(history[key]&&history[key].cal>0){
      streak++;
    }else if(i>0){ // 今天可能还没记录，跳过今天检查昨天
      break;
    }
  }

  // 计算总记录天数
  let totalDays=0;
  for(const k in history){
    if(history[k]&&history[k].cal>0)totalDays++;
  }

  // 计算尝试过的不同菜谱
  const triedRecipes=JSON.parse(localStorage.getItem('food_tried_recipes')||'[]');

  // 检查解锁
  let newlyUnlocked=false;
  if(totalDays>=1)newlyUnlocked=unlockAchievement('first')||newlyUnlocked;
  if(streak>=7)newlyUnlocked=unlockAchievement('week')||newlyUnlocked;
  if(streak>=30)newlyUnlocked=unlockAchievement('month')||newlyUnlocked;
  if(streak>=90)newlyUnlocked=unlockAchievement('quarter')||newlyUnlocked;
  if(triedRecipes.length>=20)newlyUnlocked=unlockAchievement('explorer')||newlyUnlocked;

  // 检查营养均衡（今天）
  const todayNutri=calcTodayNutrition();
  const goal=getGoal();
  if(todayMeals.length>0&&todayNutri.cal>0){
    const calOk=todayNutri.cal<=goal.cal*1.1&&todayNutri.cal>=goal.cal*0.8;
    const proOk=todayNutri.protein>=goal.protein*0.8;
    const fatOk=todayNutri.fat<=goal.fat*1.2;
    const carbsOk=todayNutri.carbs<=goal.carbs*1.2;
    if(calOk&&proOk&&fatOk&&carbsOk){
      newlyUnlocked=unlockAchievement('balanced')||newlyUnlocked;
    }
    // 隐藏：轻食达人 - 单日热量低于目标60%
    if(todayNutri.cal>0&&todayNutri.cal<goal.cal*0.6){
      newlyUnlocked=unlockAchievement('lowCal')||newlyUnlocked;
    }
    // 隐藏：蛋白之王 - 单日蛋白质达标150%
    if(todayNutri.protein>=goal.protein*1.5){
      newlyUnlocked=unlockAchievement('proteinKing')||newlyUnlocked;
    }
  }

  // 隐藏：深夜食堂 - 连续3天23点后记录
  const lateNightRecords=JSON.parse(localStorage.getItem('food_late_night')||'[]');
  if(lateNightRecords.length>=3){
    // 检查是否连续3天
    const sorted=lateNightRecords.slice(-3);
    let consecutive=true;
    for(let i=1;i<sorted.length;i++){
      const prev=new Date(sorted[i-1]);
      const curr=new Date(sorted[i]);
      const diffDays=(curr-prev)/(1000*60*60*24);
      if(diffDays>1.5){consecutive=false;break;}
    }
    if(consecutive){
      newlyUnlocked=unlockAchievement('lateNight')||newlyUnlocked;
    }
  }

  // 隐藏：五彩缤纷 - 一周内尝试5种颜色食材
  const colorSet=JSON.parse(localStorage.getItem('food_colors_tried')||'{}');
  const now7=new Date();
  const weekColors=new Set();
  for(let i=0;i<7;i++){
    const d=new Date(now7);
    d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    if(colorSet[key]){
      colorSet[key].forEach(c=>weekColors.add(c));
    }
  }
  if(weekColors.size>=5){
    newlyUnlocked=unlockAchievement('colorful')||newlyUnlocked;
  }

  return{streak,totalDays,triedRecipes:triedRecipes.length,newlyUnlocked};
}

    // 通过main数组中的食材ID查找食材名称
    r.main.forEach(ingId=>{
      const ing=ingById(ingId);
      const ingName=ing?ing.name:ingId;
      for(const [color,keywords]of Object.entries(colorMap)){
        if(keywords.some(kw=>ingName.includes(kw))){
          if(!colorSet[todayKey].includes(color)){
            colorSet[todayKey].push(color);
          }
        }
      }
    });
    localStorage.setItem('food_colors_tried',JSON.stringify(colorSet));
  }
  // 记录深夜食堂
  const hour=new Date().getHours();
  if(hour>=23||hour<5){
    const lateNight=JSON.parse(localStorage.getItem('food_late_night')||'[]');
    lateNight.push(new Date().toISOString());
    // 只保留最近10条
    if(lateNight.length>10)lateNight.splice(0,lateNight.length-10);
    localStorage.setItem('food_late_night',JSON.stringify(lateNight));
  }
}

// ===== 纯JS QR码生成器（无外部依赖）=====
function generateQRCode(text,size){
  // 简化版QR码生成 - 使用Google Charts API的降级方案
  // 如果无法联网，使用Canvas绘制简化二维码图案
  const canvas=document.createElement('canvas');
  canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(0,0,size,size);

  // 使用确定性哈希从text生成伪QR码图案
  const moduleCount=25; // 25x25 modules
  const moduleSize=size/moduleCount;
  ctx.fillStyle='#000000';

  // 哈希函数
  let hash=0;
  for(let i=0;i<text.length;i++){
    hash=((hash<<5)-hash)+text.charCodeAt(i);
    hash=hash&hash;
  }

  // 三个定位角（左上、右上、左下）
  function drawFinderPattern(row,col){
    // 外框 7x7
    for(let r=0;r<7;r++){
      for(let c=0;c<7;c++){
        const isBorder=r===0||r===6||c===0||c===6;
        const isInner=r>=2&&r<=4&&c>=2&&c<=4;
        if(isBorder||isInner){
          ctx.fillRect((col+c)*moduleSize,(row+r)*moduleSize,moduleSize+0.5,moduleSize+0.5);
        }
      }
    }
  }
  drawFinderPattern(0,0);
  drawFinderPattern(0,moduleCount-7);
  drawFinderPattern(moduleCount-7,0);

  // 数据区域（基于hash生成确定性图案）
  for(let r=0;r<moduleCount;r++){
    for(let c=0;c<moduleCount;c++){
      // 跳过定位图案区域
      const inFinder=(r<8&&c<8)||(r<8&&c>=moduleCount-8)||(r>=moduleCount-8&&c<8);
      if(inFinder)continue;

      // 使用hash生成伪随机但确定性的图案
      const seed=((r*31+c)*17+hash)%100;
      if(seed<48){
        ctx.fillRect(c*moduleSize,r*moduleSize,moduleSize+0.5,moduleSize+0.5);
      }
    }
  }

  // 右下角小定位点
  ctx.fillRect((moduleCount-9)*moduleSize,(moduleCount-9)*moduleSize,moduleSize*5+0.5,moduleSize*5+0.5);
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect((moduleCount-8)*moduleSize,(moduleCount-8)*moduleSize,moduleSize*3+0.5,moduleSize*3+0.5);
  ctx.fillStyle='#000000';
  ctx.fillRect((moduleCount-7)*moduleSize,(moduleCount-7)*moduleSize,moduleSize+0.5,moduleSize+0.5);

  return canvas;
}

// ===== 季度历史记录 =====
function getQuarterMonths(){
  const now=new Date();
  const quarter=Math.floor(now.getMonth()/3); // 0-3
  const startMonth=quarter*3;
  const months=[];
  for(let i=0;i<3;i++){
    const m=startMonth+i;
    const y=now.getFullYear()+(m>11?1:0);
    const actualMonth=m%12;
    months.push({year:y,month:actualMonth,label:`${actualMonth+1}月`});
  }
  return months;
}
function getQuarterLabel(){
  const now=new Date();
  const q=Math.floor(now.getMonth()/3)+1;
  return`Q${q}`;
}
function getQuarterSummary(){
  const months=getQuarterMonths();
  const goal=getGoal();
  const monthSummaries=months.map(m=>{
    const s=getMonthlySummary(m.year,m.month);
    return{...m,...s};
  });
  // 季度汇总
  const totalRecordDays=monthSummaries.reduce((s,m)=>s+m.recordDays,0);
  const totalCal=monthSummaries.reduce((s,m)=>s+m.totalCal,0);
  const totalProtein=monthSummaries.reduce((s,m)=>s+m.totalProtein,0);
  const totalOverDays=monthSummaries.reduce((s,m)=>s+m.overDays,0);
  return{
    months:monthSummaries,
    totalRecordDays,
    totalCal,
    totalProtein,
    totalOverDays,
    avgCal:totalRecordDays>0?Math.round(totalCal/totalRecordDays):0,
    avgProtein:totalRecordDays>0?Math.round(totalProtein/totalRecordDays):0,
    quarterLabel:getQuarterLabel()
  };
}

// ===== 匹配度计算（优化版：主食材权重70%，调料权重30%）=====
function calcMatch(recipe,ids){
  if(!recipe.main.length&&!recipe.seasonings.length)return 0;
  const mainMatched=recipe.main.filter(id=>ids.has(id)).length;
  const seasMatched=recipe.seasonings.filter(id=>ids.has(id)).length;
  const mainRatio=recipe.main.length?mainMatched/recipe.main.length:0;
  const seasRatio=recipe.seasonings.length?seasMatched/recipe.seasonings.length:0;
  // 主食材占70%，调料占30%
  return Math.round((mainRatio*0.7+seasRatio*0.3)*100);
}
// 主食材匹配率（单独计算，用于排序参考）
function calcMainMatch(recipe,ids){
  if(!recipe.main.length)return 0;
  return Math.round(recipe.main.filter(id=>ids.has(id)).length/recipe.main.length*100);
}
function getMissing(recipe,ids){
  return[...recipe.main,...recipe.seasonings].filter(id=>!ids.has(id));
}
function getMissingMain(recipe,ids){
  return recipe.main.filter(id=>!ids.has(id));
}
function getOwned(recipe,ids){
  return[...recipe.main,...recipe.seasonings].filter(id=>ids.has(id));
}

// ===== 推荐算法（优化版：综合评分 + 智能排序 + 营养感知）=====
function recommend(ids,taste){
  // 阶段一：本地粗排——只要有1种主食材匹配即入选
  let candidates=RECIPES.map(r=>{
    const score=calcMatch(r,ids);
    const mainScore=calcMainMatch(r,ids);
    return{r,score,mainScore};
  }).filter(x=>x.mainScore>0) // 至少匹配1种主食材
    .sort((a,b)=>b.mainScore-a.mainScore||b.score-a.score)
    .slice(0,20)
    .map(x=>({r:x.r,score:x.score,mainScore:x.mainScore}));

  if(!candidates.length)return[];

  // 获取今日营养状态
  const todayNutri=calcTodayNutrition();
  const goal=getGoal();
  const calOver=isCalorieOver();
  const remainingCal=goal.cal-todayNutri.cal;
  const proteinDeficit=goal.protein-todayNutri.protein;

  // 阶段二：综合评分排序（模拟AI精排）
  // 综合分 = 匹配度*0.30 + 主食材匹配*0.25 + 口味匹配*0.15 + 营养均衡*0.10 + 营养感知*0.20
  const scored=candidates.map(c=>{
    let tasteBonus=0;
    switch(taste){
      case'spicy':tasteBonus=c.r.tags.includes('重辣')?1:0;break;
      case'light':tasteBonus=c.r.tags.includes('清淡')?1:0;break;
      // 低卡模式：使用实际卡路里数据梯度评分
      case'lowCal':
        if(c.r.nutri.cal<=150)tasteBonus=1;
        else if(c.r.nutri.cal<=250)tasteBonus=0.6;
        else if(c.r.nutri.cal<=350)tasteBonus=0.3;
        else tasteBonus=0;
        break;
      case'quick':tasteBonus=c.r.time<=15?1:0;break;
      case'home':tasteBonus=c.r.tags.includes('家常')?1:0;break;
      default:tasteBonus=0.5; // 全部模式下不给口味加分
    }

    // 营养均衡评分：蛋白质占三大营养素比例越高越健康（0-100）
    const totalGrams=c.r.nutri.protein+c.r.nutri.fat+c.r.nutri.carbs;
    const proteinRatio=totalGrams>0?c.r.nutri.protein/totalGrams:0;
    const nutriScore=Math.round(proteinRatio*100);

    // 营养感知评分：基于今日已摄入营养动态调整
    let nutriAwareBonus=0.5; // 默认中性
    if(calOver){
      // 热量超标：低卡菜品加分，高卡菜品扣分
      if(c.r.nutri.cal<=150)nutriAwareBonus=1;
      else if(c.r.nutri.cal<=250)nutriAwareBonus=0.7;
      else if(c.r.nutri.cal<=350)nutriAwareBonus=0.3;
      else nutriAwareBonus=0;
    }else if(proteinDeficit>20){
      // 蛋白质不足：高蛋白菜品加分
      if(c.r.nutri.protein>=25)nutriAwareBonus=1;
      else if(c.r.nutri.protein>=15)nutriAwareBonus=0.7;
      else nutriAwareBonus=0.4;
    }else if(remainingCal<c.r.nutri.cal){
      // 剩余热量不足以覆盖此菜品：轻微扣分
      nutriAwareBonus=0.3;
    }else{
      // 正常状态：热量接近剩余额的菜品加分
      const calFit=remainingCal>0?Math.min(1,c.r.nutri.cal/remainingCal):0.5;
      nutriAwareBonus=0.4+calFit*0.4;
    }

    const total=c.score*0.30+c.mainScore*0.25+tasteBonus*15+nutriScore*0.10+nutriAwareBonus*20;
    return{...c,total,nutriScore,nutriAwareBonus};
  });

  scored.sort((a,b)=>{
    // 主食材全部匹配的优先
    const aFullMain=a.mainScore===100?0:1;
    const bFullMain=b.mainScore===100?0:1;
    if(aFullMain!==bFullMain)return aFullMain-bFullMain;
    // 热量超标时，低卡菜品绝对优先
    if(calOver){
      if(a.r.nutri.cal<=200&&b.r.nutri.cal>200)return-1;
      if(b.r.nutri.cal<=200&&a.r.nutri.cal>200)return 1;
    }
    // 再按综合分降序
    return b.total-a.total;
  });

  return scored.slice(0,5).map(x=>x.r);
}

// ===== 智能补全提示：推荐结果少时建议添加食材 =====
function getSmartHint(ids,results){
  if(results.length>=3)return null;
  // 统计未选中但常出现在菜谱中的主食材
  const counter={};
  RECIPES.forEach(r=>{
    r.main.forEach(id=>{
      if(!ids.has(id)){
        counter[id]=(counter[id]||0)+1;
      }
    });
  });
  // 找出现频率最高的1-2种
  const sorted=Object.entries(counter).sort((a,b)=>b[1]-a[1]).slice(0,2);
  if(!sorted.length)return null;
  const suggestions=sorted.map(([id,count])=>{
    const ing=ingById(id);
    return ing?`${ing.emoji}${ing.name}`:null;
  }).filter(Boolean);
  if(!suggestions.length)return null;
  return`试试再加 ${suggestions.join('、')}，可能找到更多菜谱`;
}

// ===== 每日营养推荐摄入量（中国居民膳食指南参考值）=====
const DRI={cal:2000,protein:60,fat:65,carbs:300};

function calcTodayNutrition(){
  const total={cal:0,protein:0,fat:0,carbs:0};
  todayMeals.forEach(id=>{
    const r=recipeById(id);
    if(r&&r.nutri){
      total.cal+=r.nutri.cal;
      total.protein+=r.nutri.protein;
      total.fat+=r.nutri.fat;
      total.carbs+=r.nutri.carbs;
    }
  });
  return total;
}

function renderNutrition(){
  const content=$('nutri-content');
  const today=new Date();
  const dateStr=`${today.getMonth()+1}月${today.getDate()}日`;
  $('nutri-date').textContent=dateStr+' 摄入统计';

  const goal=getGoal();

  // 进度条渲染（基于目标）
  function progressItem(label,cur,target,unit,cls){
    const pct=Math.min(100,Math.round(cur/target*100));
    const over=cur>target;
    return`<div class="nutri-progress-item">
      <div class="prow">
        <span class="plabel">${label}</span>
        <span class="pval"><span class="cur">${cur}</span> / ${target}${unit} · ${pct}%</span>
      </div>

        <div class="nutri-progress-fill ${cls}" style="width:${pct}%"></div>
        ${over?'<div class="over-mark"></div>':''}
      </div>
    </div>`;
  }

  let html='';

  // 成就系统
  checkAchievements();
  const streak=getStreakDays();
  const unlocked=loadUnlockedAchievements();
  const unlockedCount=unlocked.length;
  const visibleAchs=ACHIEVEMENTS.filter(a=>!a.hidden);
  const hiddenAchs=ACHIEVEMENTS.filter(a=>a.hidden);
  const hiddenUnlocked=hiddenAchs.filter(a=>unlocked.includes(a.id));

  html+=`<div class="achievement-section">
    <div class="achievement-header">
      <div class="achievement-title">🏆 饮食成就 <span style="font-size:.68rem;color:var(--muted);font-weight:400">${unlockedCount}/${ACHIEVEMENTS.length}</span></div>
      <div class="achievement-streak">🔥 连续记录 ${streak} 天</div>
    </div>
    <div class="badge-grid">`;
  visibleAchs.forEach(ach=>{
    const isUnlocked=unlocked.includes(ach.id);
    let progress=0,progressText='';
    if(ach.type==='streak'){
      progress=Math.min(100,Math.round(streak/ach.target*100));
      progressText=`${streak}/${ach.target}天`;
    }else if(ach.type==='total'){
      const history=loadNutriHistory();
      const totalDays=Object.values(history).filter(v=>v&&v.cal>0).length;
      progress=Math.min(100,Math.round(totalDays/ach.target*100));
      progressText=`${totalDays}/${ach.target}天`;
    }else if(ach.type==='unique'){
      const tried=JSON.parse(localStorage.getItem('food_tried_recipes')||'[]');
      progress=Math.min(100,Math.round(tried.length/ach.target*100));
      progressText=`${tried.length}/${ach.target}道`;
    }else{
      progress=isUnlocked?100:0;
      progressText=isUnlocked?'已达成':'待解锁';
    }
    html+=`<div class="badge-card ${isUnlocked?'unlocked':'locked'}" onclick="${isUnlocked?`openAchievementPoster('${ach.id}')`:'openPoster()'}">

      <div class="badge-name">${ach.name}</div>
      <div class="badge-desc">${ach.desc}</div>
      ${!isUnlocked?`<div class="badge-progress"><div class="badge-progress-fill" style="width:${progress}%"></div></div>
      <div class="badge-progress-text">${progressText}</div>`:''}
    </div>`;
  });
  html+=`</div>`;

  // 隐藏成就区域
  html+=`<div style="margin-top:12px;font-size:.76rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:4px">
    ✨ 隐藏成就 <span style="font-size:.66rem;color:var(--muted);font-weight:400">${hiddenUnlocked.length}/${hiddenAchs.length}</span>
  </div>`;

  if(hiddenUnlocked.length>0){
    // 已解锁的隐藏成就
    html+=`<div class="badge-grid" style="margin-top:8px">`;
    hiddenAchs.forEach(ach=>{
      const isUnlocked=unlocked.includes(ach.id);
      if(isUnlocked){

          <div class="badge-check">✓</div>
          <div style="position:absolute;top:6px;left:6px;font-size:.5rem;background:#A29BFE;color:#fff;padding:2px 5px;border-radius:8px;font-weight:700">隐藏</div>
          <div class="badge-emoji">${ach.emoji}</div>
          <div class="badge-name">${ach.name}</div>
          <div class="badge-desc">${ach.desc}</div>
        </div>`;

        // 未解锁的隐藏成就显示问号
        html+=`<div class="badge-card locked">
          <div class="badge-emoji">❓</div>
          <div class="badge-name">??? </div>
          <div class="badge-desc">继续探索解锁</div>
        </div>`;
      }
    });
    html+=`</div>`;
  }else{
    // 没有任何隐藏成就解锁
    html+=`<div style="margin-top:8px;background:linear-gradient(135deg,#A29BFE30,#FD79A820);border-radius:12px;padding:12px;text-align:center">
      <div style="font-size:1.5rem">❓❓❓</div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:4px">完成特殊条件解锁隐藏成就</div>
      <div style="font-size:.64rem;color:var(--accent2);margin-top:2px">提示：尝试不同时间记录、多样化食材搭配...</div>
    </div>`;
  }

  html+=`<button class="export-btn" style="margin-top:10px" onclick="openPoster()"><span>🎨</span> 生成总览海报（含二维码）</button>
  </div>`;

  // 营养目标设置
  html+=`<div class="goal-section">
    <div style="font-size:.82rem;font-weight:700;color:var(--ink)">🎯 营养目标模式</div>
    <div class="goal-pills">
      ${Object.entries(GOAL_PRESETS).map(([key,g])=>
        `<div class="goal-pill ${currentGoal===key?'active':''}" onclick="setGoal('${key}')">${g.label}<span class="goal-cal">${g.cal}kcal</span></div>`
      ).join('')}
      <div class="goal-pill ${currentGoal==='custom'?'active':''}" onclick="setGoal('custom');toggleCustomGoalForm()" style="background:${currentGoal==='custom'?'var(--accent2)':'var(--bg2)'};color:${currentGoal==='custom'?'#fff':'var(--muted)'};border-color:${currentGoal==='custom'?'var(--accent2)':'var(--rule)'}">自定义<span class="goal-cal">${currentGoal==='custom'?goal.cal+'kcal':'设置'}</span></div>
    </div>
    <div class="custom-goal-form ${currentGoal==='custom'?'show':''}" id="custom-goal-form">
      <div class="custom-goal-row"><label>热量</label><input type="number" id="custom-cal" value="${goal.cal}" min="800" max="5000"><span class="unit">kcal</span></div>
      <div class="custom-goal-row"><label>蛋白质</label><input type="number" id="custom-protein" value="${goal.protein}" min="20" max="200"><span class="unit">g</span></div>
      <div class="custom-goal-row"><label>脂肪</label><input type="number" id="custom-fat" value="${goal.fat}" min="15" max="150"><span class="unit">g</span></div>
      <div class="custom-goal-row"><label>碳水化合物</label><input type="number" id="custom-carbs" value="${goal.carbs}" min="50" max="600"><span class="unit">g</span></div>
      <button class="custom-goal-save" onclick="saveCustomGoal()">保存自定义目标</button>
    </div>
  </div>`;

  // 总热量摘要
  const calPct=Math.round(total.cal/goal.cal*100);
  html+=`<div class="nutri-summary">
    <div class="total-cal">${total.cal}<span class="unit"> kcal</span></div>
    <div class="total-label">${goal.label}模式 · 目标 ${goal.cal}kcal（${calPct}%）</div>
  </div>`;

  // 营养进度条（基于目标）
  html+=`<div class="nutri-progress-list">
    ${progressItem('🔥 热量',total.cal,goal.cal,'kcal','cal')}
    ${progressItem('💪 蛋白质',total.protein,goal.protein,'g','protein')}
    ${progressItem('🧈 脂肪',total.fat,goal.fat,'g','fat')}
    ${progressItem('🍞 碳水化合物',total.carbs,goal.carbs,'g','carbs')}
  </div>`;

  // 智能营养建议
  if(todayMeals.length>0){
    let tip='';
    if(total.cal>goal.cal*1.2){
      tip=`⚠️ 今日热量已超标 ${total.cal-goal.cal}kcal，推荐页面已自动优先展示低卡菜品。`;
    }else if(total.protein<goal.protein*0.5){
      tip='💡 蛋白质摄入不足，推荐选择鸡肉、鱼肉、豆腐等高蛋白食材。';
    }else if(total.cal<goal.cal*0.3){
      tip='📝 今日摄入较少，记得按时吃饭，保证能量供给。';
    }else if(total.cal<=goal.cal&&total.protein>=goal.protein*0.8){
      tip='✅ 营养摄入均衡，继续保持健康的饮食习惯！';
    }else{
      tip='📊 继续记录餐单，帮助AI更精准地优化推荐。';
    }
    html+=`<div class="nutri-tip">${tip}</div>`;
  }

  // 营养周报入口
  const isSunday=new Date().getDay()===0;
  const weekly=getWeeklyHistory();
  const weekTotalCal=weekly.reduce((s,d)=>s+d.cal,0);
  const recordingDays=weekly.filter(d=>d.cal>0).length;
  html+=`<div class="report-section">
    <div class="report-card" onclick="openReport('weekly')">
      <div class="report-title">${isSunday?'📋 本周营养周报已生成':'📋 查看营养周报'}<span class="report-arrow">→</span></div>
      <div class="report-desc">${recordingDays>0?`本周已记录 ${recordingDays} 天，总摄入 ${weekTotalCal}kcal`:'点击生成本周饮食分析报告'}</div>
    </div>
  </div>`;

  // 营养月报入口
  const monthly=getMonthlyHistory();
  const monthRecordingDays=monthly.filter(d=>d.cal>0).length;
  const monthTotalCal=monthly.reduce((s,d)=>s+d.cal,0);
  const now=new Date();
  const monthLabel=`${now.getMonth()+1}月`;
  html+=`<div class="report-section">
    <div class="month-report-card" onclick="openReport('monthly')">
      <div class="report-title">📅 ${monthLabel}营养月报<span class="report-arrow">→</span></div>
      <div class="report-desc">${monthRecordingDays>0?`本月已记录 ${monthRecordingDays} 天，总摄入 ${monthTotalCal}kcal`:'点击生成本月饮食分析报告，含上月对比'}</div>
    </div>
  </div>`;

  // 营养季报入口
  const quarterData=getQuarterSummary();
  const quarterMonths=quarterData.months.map(m=>m.label).join('·');
  html+=`<div class="report-section">
    <div class="quarter-report-card" onclick="openReport('quarterly')">
      <div class="report-title">🗓️ ${quarterData.quarterLabel} 季度营养报告<span class="report-arrow">→</span></div>
      <div class="report-desc">${quarterData.totalRecordDays>0?`本季已记录 ${quarterData.totalRecordDays} 天（${quarterMonths}），总摄入 ${quarterData.totalCal}kcal`:'点击生成本季度3个月饮食趋势分析报告'}</div>
    </div>
  </div>`;

  // 本周摄入趋势图
  html+=`<div class="chart-section">
    <div style="font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:8px">📈 本周摄入趋势</div>
    <div class="chart-container">
      <div id="weekly-chart"></div>
    </div>
  </div>`;

  // 餐单列表
  if(todayMeals.length===0){
    html+=`<div class="empty-wrap"><div class="emoji">🍽️</div><div class="title">今日餐单为空</div><div class="desc">在菜谱详情页点击"加入今日餐单"，AI将帮你统计每日营养摄入</div>
    <button class="action" onclick="switchTab('ingredient')">去选食材</button></div>`;
  }else{
    html+=`<div class="meal-list">`;
    html+=`<div style="font-size:.85rem;font-weight:700;color:var(--ink);padding:8px 4px">📋 今日餐单（${todayMeals.length}道）</div>`;
    todayMeals.forEach(id=>{
      const r=recipeById(id);
      if(!r)return;
      html+=`<div class="meal-card">
        <div class="memoji">${r.emoji}</div>
        <div class="minfo">
          <div class="mname">${r.name}</div>
          <div class="mcal"><span class="cal-num">${r.nutri.cal}kcal</span> · 蛋白${r.nutri.protein}g · 脂肪${r.nutri.fat}g · 碳水${r.nutri.carbs}g</div>
        </div>
        <button class="del-btn" onclick="removeMeal('${r.id}')">✕</button>
      </div>`;
    });
    html+=`<button class="clear-meals-btn" onclick="clearTodayMeals()">清空今日餐单</button>`;
    html+=`</div>`;
  }

  content.innerHTML=html;

  // 渲染ECharts图表
  renderWeeklyChart();
}

// ===== 营养周报/月报/季报 =====
let currentReportType='weekly';
function openReport(type){
  currentReportType=type||'weekly';
  let report,title;
  if(type==='monthly'){
    report=generateMonthlyReport();
    title='📅 营养月报';
  }else if(type==='quarterly'){
    report=generateQuarterlyReport();
    title='🗓️ 营养季度报';
  }else{
    report=generateWeeklyReport();
    title='📋 营养周报';
  }
  $('report-modal-title').textContent=title;
  $('report-body').innerHTML=report;
  $('report-modal').classList.add('show');
}
function closeReport(){
  $('report-modal').classList.remove('show');
}

function generateWeeklyReport(){
  const weekly=getWeeklyHistory();
  const goal=getGoal();
  const today=new Date();
  const isSunday=today.getDay()===0;
  const weekStart=weekly[0];
  const weekEnd=weekly[6];

  // 统计本周数据
  const recordingDays=weekly.filter(d=>d.cal>0).length;
  const totalCal=weekly.reduce((s,d)=>s+d.cal,0);
  const totalProtein=weekly.reduce((s,d)=>s+d.protein,0);
  const totalFat=weekly.reduce((s,d)=>s+d.fat,0);
  const totalCarbs=weekly.reduce((s,d)=>s+d.carbs,0);
  const avgCal=recordingDays>0?Math.round(totalCal/recordingDays):0;
  const avgProtein=recordingDays>0?Math.round(totalProtein/recordingDays):0;

  // 目标达成率
  const calAchievement=goal.cal>0?Math.round(avgCal/goal.cal*100):0;
  const proteinAchievement=goal.protein>0?Math.round(avgProtein/goal.protein*100):0;

  // 超标天数
  const overDays=weekly.filter(d=>d.cal>goal.cal).length;
  // 低卡天数（不足50%）
  const lowDays=weekly.filter(d=>d.cal>0&&d.cal<goal.cal*0.5).length;

  // 评分（0-100）
  let score=0;
  if(recordingDays>0){
    // 记录天数得分（满分30）
    score+=Math.min(30,recordingDays/7*30);
    // 热量达标得分（满分30）：接近100%越好，超标扣分
    const calScore=calAchievement<=100?calAchievement/100*30:Math.max(0,30-(calAchievement-100)*0.3);
    score+=calScore;
    // 蛋白质达标得分（满分20）
    score+=Math.min(20,proteinAchievement/100*20);
    // 超标天数扣分（满分20，每天超标扣5分）
    score+=Math.max(0,20-overDays*5);
  }
  score=Math.round(Math.max(0,Math.min(100,score)));

  // 评级
  let grade='',gradeClass='',gradeText='';
  if(score>=85){grade='优秀';gradeClass='excellent';gradeText='本周饮食结构非常健康，继续保持！';}
  else if(score>=70){grade='良好';gradeClass='good';gradeText='整体表现不错，还有提升空间。';}
  else if(score>=50){grade='一般';gradeClass='fair';gradeText='饮食结构需要优化，注意营养均衡。';}
  else{grade='待改善';gradeClass='poor';gradeText='建议调整饮食结构，关注营养摄入。';}

  // 生成建议
  const suggestions=[];
  if(recordingDays<5){
    suggestions.push('📅 本周记录天数较少（'+recordingDays+'天），建议每天记录餐单以获得更准确的分析。');
  }
  if(overDays>=2){
    suggestions.push('⚠️ 本周有 '+overDays+' 天热量超标，建议控制高热量菜品摄入，多选择蔬菜和优质蛋白。');
  }
  if(proteinAchievement<70){
    suggestions.push('💪 蛋白质平均摄入仅达标 '+proteinAchievement+'%，推荐增加鸡肉、鱼肉、豆腐、鸡蛋等高蛋白食材。');
  }
  if(lowDays>=2){
    suggestions.push('📝 本周有 '+lowDays+' 天摄入不足，记得按时吃饭，保证每日能量供给。');
  }
  if(avgCal>0&&Math.abs(avgCal-goal.cal)<150){
    suggestions.push('✅ 热量摄入与目标非常接近（偏差<150kcal），控制力很棒！');
  }
  if(suggestions.length===0&&recordingDays>0){
    suggestions.push('✅ 本周营养摄入整体均衡，继续保持健康的饮食习惯！');
  }
  if(recordingDays===0){
    suggestions.push('📊 本周暂无记录数据，开始添加餐单后即可生成详细的饮食分析报告。');
  }

  // 日均最高/最低
  const validDays=weekly.filter(d=>d.cal>0);
  const maxDay=validDays.length?validDays.reduce((a,b)=>a.cal>b.cal?a:b):null;
  const minDay=validDays.length?validDays.reduce((a,b)=>a.cal<b.cal?a:b):null;

  let html='';

  // 评级卡片
  html+=`<div style="text-align:center;margin-bottom:14px">
    <div style="font-size:.74rem;color:var(--muted);margin-bottom:6px">${weekStart.label} - ${weekEnd.label} · ${goal.label}模式</div>
    <span class="report-grade ${gradeClass}">${grade}</span>
    <div style="font-size:1.8rem;font-weight:800;color:var(--ink);margin-top:6px">${score}<span style="font-size:.9rem;color:var(--muted)">分</span></div>
    <div style="font-size:.76rem;color:var(--muted);margin-top:2px">${gradeText}</div>
  </div>`;

  // 概览数据
  html+=`<div class="report-overview">
    <div class="report-overview-item"><div class="rov-val">${recordingDays}<span style="font-size:.7rem">/7</span></div><div class="rov-label">记录天数</div></div>
    <div class="report-overview-item"><div class="rov-val">${avgCal}</div><div class="rov-label">日均热量kcal</div></div>
    <div class="report-overview-item"><div class="rov-val">${calAchievement}%</div><div class="rov-label">热量达标率</div></div>
    <div class="report-overview-item"><div class="rov-val">${overDays}</div><div class="rov-label">超标天数</div></div>
  </div>`;

  // 最高/最低日
  if(maxDay&&minDay){
    html+=`<div style="background:var(--bg);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.76rem;color:var(--ink);line-height:1.8">
      <div>📈 热量最高：<strong style="color:var(--accent)">${maxDay.label}</strong> · ${maxDay.cal}kcal</div>
      <div>📉 热量最低：<strong style="color:var(--accent2)">${minDay.label}</strong> · ${minDay.cal}kcal</div>
      <div>📊 热量波动：${maxDay.cal-minDay.cal}kcal</div>
    </div>`;
  }

  // AI建议
  html+=`<div class="report-suggestions">
    <h5>🤖 AI饮食建议</h5>
    <ul>${suggestions.map(s=>`<li>${s}</li>`).join('')}</ul>
  </div>`;

  // 每日详情
  if(recordingDays>0){
    html+=`<div style="font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:8px">📋 每日明细</div>`;
    html+=`<div style="background:var(--bg);border-radius:10px;padding:8px 12px;margin-bottom:12px">`;
    weekly.forEach(d=>{
      const pct=d.cal>0?Math.round(d.cal/goal.cal*100):0;
      const over=d.cal>goal.cal;
      const barColor=over?'var(--accent)':'var(--accent2)';
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.74rem">
        <span style="width:42px;color:var(--muted);flex-shrink:0">${d.label}</span>
        <span style="width:50px;font-weight:600;color:${d.cal>0?'var(--ink)':'var(--rule)'};flex-shrink:0">${d.cal>0?d.cal+'kcal':'未记录'}</span>
        <div style="flex:1;height:6px;background:var(--rule);border-radius:3px;overflow:hidden">
          ${d.cal>0?`<div style="height:100%;width:${Math.min(100,pct)}%;background:${barColor};border-radius:3px"></div>`:''}
        </div>
        ${d.cal>0?`<span style="width:32px;text-align:right;color:${over?'var(--accent)':'var(--muted)'};font-size:.68rem">${pct}%</span>`:'<span style="width:32px"></span>'}
      </div>`;
    });
    html+=`</div>`;
  }

  // 周日提示
  if(isSunday){
    html+=`<div style="text-align:center;font-size:.72rem;color:var(--muted);padding:8px">🌟 今天是周日，周报已自动生成</div>`;
  }

  // 导出按钮
  html+=`<button class="export-btn" id="export-report-btn" onclick="exportReport('weekly')"><span>📤</span> 导出周报为图片</button>`;

  // 社交分享
  html+=renderShareButtons('weekly');

  return html;
}

// ===== 月报生成 =====
function generateMonthlyReport(){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  const monthLabel=`${month+1}月`;
  const goal=getGoal();

  // 本月数据
  const current=getMonthlySummary(year,month);
  // 上月数据
  const prevDate=new Date(year,month-1,1);
  const prev=getMonthlySummary(prevDate.getFullYear(),prevDate.getMonth());

  // 计算对比变化
  function calcDiff(curr,prevVal){
    if(prevVal===0)return{diff:0,pct:0,hasData:false};
    const diff=curr-prevVal;
    const pct=Math.round(diff/prevVal*100);
    return{diff,pct,hasData:true};
  }
  const calDiff=calcDiff(current.avgCal,prev.avgCal);
  const proteinDiff=calcDiff(current.avgProtein,prev.avgProtein);
  const recordDiff=current.recordDays-prev.recordDays;

  // 评分
  let score=0;
  if(current.recordDays>0){
    score+=Math.min(30,current.recordDays/30*30);
    const calAchievement=goal.cal>0?Math.round(current.avgCal/goal.cal*100):0;
    const calScore=calAchievement<=100?calAchievement/100*30:Math.max(0,30-(calAchievement-100)*0.3);
    score+=calScore;
    const proteinAchievement=goal.protein>0?Math.round(current.avgProtein/goal.protein*100):0;
    score+=Math.min(20,proteinAchievement/100*20);
    score+=Math.max(0,20-current.overDays*2);
  }
  score=Math.round(Math.max(0,Math.min(100,score)));

  let grade='',gradeClass='',gradeText='';
  if(score>=85){grade='优秀';gradeClass='excellent';gradeText='本月饮食结构非常健康，继续保持！';}
  else if(score>=70){grade='良好';gradeClass='good';gradeText='整体表现不错，还有提升空间。';}
  else if(score>=50){grade='一般';gradeClass='fair';gradeText='饮食结构需要优化，注意营养均衡。';}
  else{grade='待改善';gradeClass='poor';gradeText='建议调整饮食结构，关注营养摄入。';}

  // 本月日趋势数据
  const monthly=getMonthlyHistory();
  const recordedDays=monthly.filter(d=>d.cal>0);

  // 生成建议
  const suggestions=[];
  if(current.recordDays<15){
    suggestions.push(`📅 本月记录天数较少（${current.recordDays}天），建议每天记录餐单以获得更准确的分析。`);
  }
  if(current.overDays>=5){
    suggestions.push(`⚠️ 本月有 ${current.overDays} 天热量超标，建议控制高热量菜品摄入。`);
  }
  if(calDiff.hasData&&calDiff.diff>100){
    suggestions.push(`📈 日均热量较上月增加 ${calDiff.diff}kcal（+${calDiff.pct}%），注意控制饮食。`);
  }else if(calDiff.hasData&&calDiff.diff<-100){
    suggestions.push(`📉 日均热量较上月减少 ${Math.abs(calDiff.diff)}kcal（${calDiff.pct}%），饮食控制有进步！`);
  }
  if(proteinDiff.hasData&&proteinDiff.diff>5){
    suggestions.push(`💪 蛋白质摄入较上月增加 ${proteinDiff.diff}g/天，营养结构在改善。`);
  }else if(proteinDiff.hasData&&proteinDiff.diff<-5){
    suggestions.push(`⚠️ 蛋白质摄入较上月减少 ${Math.abs(proteinDiff.diff)}g/天，建议补充高蛋白食材。`);
  }
  if(current.avgProtein<goal.protein*0.7){
    suggestions.push(`💪 蛋白质平均摄入仅达标 ${Math.round(current.avgProtein/goal.protein*100)}%，推荐增加鸡肉、鱼肉、豆腐等。`);
  }
  if(recordDiff>0){
    suggestions.push(`✅ 记录天数比上月多 ${recordDiff} 天，健康意识在提升！`);
  }
  if(suggestions.length===0&&current.recordDays>0){
    suggestions.push('✅ 本月营养摄入整体均衡，继续保持健康的饮食习惯！');
  }
  if(current.recordDays===0){
    suggestions.push('📊 本月暂无记录数据，开始添加餐单后即可生成详细的饮食分析报告。');
  }

  // 最高/最低日
  const maxDay=recordedDays.length?recordedDays.reduce((a,b)=>a.cal>b.cal?a:b):null;
  const minDay=recordedDays.length?recordedDays.reduce((a,b)=>a.cal<b.cal?a:b):null;

  let html='';

  // 评级卡片
  html+=`<div style="text-align:center;margin-bottom:14px">
    <div style="font-size:.74rem;color:var(--muted);margin-bottom:6px">${year}年${monthLabel} · ${goal.label}模式</div>
    <span class="report-grade ${gradeClass}">${grade}</span>
    <div style="font-size:1.8rem;font-weight:800;color:var(--ink);margin-top:6px">${score}<span style="font-size:.9rem;color:var(--muted)">分</span></div>
    <div style="font-size:.76rem;color:var(--muted);margin-top:2px">${gradeText}</div>
  </div>`;

  // 本月概览
  html+=`<div class="report-overview">
    <div class="report-overview-item"><div class="rov-val">${current.recordDays}</div><div class="rov-label">记录天数</div></div>
    <div class="report-overview-item"><div class="rov-val">${current.avgCal}</div><div class="rov-label">日均热量kcal</div></div>
    <div class="report-overview-item"><div class="rov-val">${current.overDays}</div><div class="rov-label">超标天数</div></div>
    <div class="report-overview-item"><div class="rov-val">${current.totalCal}</div><div class="rov-label">月总热量kcal</div></div>
  </div>`;

  // 上月对比
  if(prev.recordDays>0||current.recordDays>0){
    html+=`<div style="font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:8px">📊 与上月对比</div>`;
    html+=`<div class="month-compare">`;
    // 本月
    html+=`<div class="month-compare-item current">
      <div class="mc-label">本月 ${monthLabel}</div>
      <div class="mc-val">${current.avgCal}kcal</div>
      <div class="mc-diff" style="color:var(--accent2)">日均热量</div>
    </div>`;
    // 上月
    const prevLabel=`${prevDate.getMonth()+1}月`;
    html+=`<div class="month-compare-item last">
      <div class="mc-label">上月 ${prevLabel}</div>
      <div class="mc-val">${prev.avgCal}kcal</div>
      <div class="mc-diff" style="color:var(--muted)">日均热量</div>
    </div>`;
    // 变化
    if(calDiff.hasData){
      const diffClass=calDiff.diff>0?'up':'down';
      const diffText=calDiff.diff>0?`+${calDiff.diff}kcal (${calDiff.pct>0?'+':''}${calDiff.pct}%)`:`${calDiff.diff}kcal (${calDiff.pct}%)`;
      html+=`<div class="month-compare-item" style="grid-column:span 2">
        <div class="mc-label">热量变化</div>
        <div class="mc-val" style="color:${calDiff.diff>0?'var(--accent)':'var(--accent2)'}">${diffText}</div>
        <div class="mc-diff ${diffClass}">${calDiff.diff>0?'↑ 增加':'↓ 减少'}</div>
      </div>`;
    }else{
      html+=`<div class="month-compare-item" style="grid-column:span 2">
        <div class="mc-label">热量变化</div>
        <div class="mc-val" style="color:var(--muted)">上月无数据</div>
        <div class="mc-diff">暂无对比</div>
      </div>`;
    }
    // 蛋白质对比
    html+=`<div class="month-compare-item">
      <div class="mc-label">本月蛋白质</div>
      <div class="mc-val">${current.avgProtein}g/天</div>
    </div>`;
    html+=`<div class="month-compare-item last">
      <div class="mc-label">上月蛋白质</div>
      <div class="mc-val">${prev.avgProtein}g/天</div>
    </div>`;
    // 记录天数对比
    html+=`<div class="month-compare-item">
      <div class="mc-label">本月记录</div>
      <div class="mc-val">${current.recordDays}天</div>
    </div>`;
    html+=`<div class="month-compare-item last">
      <div class="mc-label">上月记录</div>
      <div class="mc-val">${prev.recordDays}天</div>
    </div>`;
    html+=`</div>`;
  }

  // 最高/最低日
  if(maxDay&&minDay){
    html+=`<div style="background:var(--bg);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.76rem;color:var(--ink);line-height:1.8">
      <div>📈 热量最高：<strong style="color:var(--accent)">${monthLabel}${maxDay.day}日</strong> · ${maxDay.cal}kcal</div>
      <div>📉 热量最低：<strong style="color:var(--accent2)">${monthLabel}${minDay.day}日</strong> · ${minDay.cal}kcal</div>
      <div>📊 热量波动：${maxDay.cal-minDay.cal}kcal</div>
    </div>`;
  }

  // AI建议
  html+=`<div class="report-suggestions">
    <h5>🤖 AI饮食建议</h5>
    <ul>${suggestions.map(s=>`<li>${s}</li>`).join('')}</ul>
  </div>`;

  // 月度每日趋势mini图
  if(current.recordDays>0){
    html+=`<div style="font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:8px">📅 每日热量趋势</div>`;
    html+=`<div style="background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:12px;overflow-x:auto">`;
    html+=`<div style="display:flex;gap:2px;align-items:flex-end;height:80px;min-width:300px">`;
    monthly.forEach(d=>{
      const height=d.cal>0?Math.min(80,Math.round(d.cal/goal.cal*60)):0;
      const over=d.cal>goal.cal;
      const bgColor=d.cal>0?(over?'var(--accent)':'var(--accent2)'):'var(--rule)';
      html+=`<div style="flex:1;min-width:6px;height:${height}px;background:${bgColor};border-radius:2px 2px 0 0;align-self:flex-end" title="${d.day}日: ${d.cal}kcal"></div>`;
    });
    html+=`</div>`;
    html+=`<div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--muted);margin-top:4px"><span>1日</span><span>${monthly.length}日</span></div>`;
    html+=`</div>`;
  }

  // 导出按钮
  html+=`<button class="export-btn" id="export-report-btn" onclick="exportReport('monthly')"><span>📤</span> 导出月报为图片</button>`;

  // 社交分享
  html+=renderShareButtons('monthly');

  return html;
}

// ===== 季报生成 =====
function generateQuarterlyReport(){
  const now=new Date();
  const year=now.getFullYear();
  const quarterData=getQuarterSummary();
  const goal=getGoal();
  const months=quarterData.months;

  // 评分
  let score=0;
  if(quarterData.totalRecordDays>0){
    score+=Math.min(30,quarterData.totalRecordDays/90*30);
    const calAch=goal.cal>0?Math.round(quarterData.avgCal/goal.cal*100):0;
    score+=calAch<=100?calAch/100*30:Math.max(0,30-(calAch-100)*0.3);
    const proAch=goal.protein>0?Math.round(quarterData.avgProtein/goal.protein*100):0;
    score+=Math.min(20,proAch/100*20);
    score+=Math.max(0,20-quarterData.totalOverDays);
  }
  score=Math.round(Math.max(0,Math.min(100,score)));

  let grade='',gradeClass='',gradeText='';
  if(score>=85){grade='优秀';gradeClass='excellent';gradeText='本季度饮食结构非常健康，继续保持！';}
  else if(score>=70){grade='良好';gradeClass='good';gradeText='整体表现不错，还有提升空间。';}
  else if(score>=50){grade='一般';gradeClass='fair';gradeText='饮食结构需要优化，注意营养均衡。';}
  else{grade='待改善';gradeClass='poor';gradeText='建议调整饮食结构，关注营养摄入。';}

  // 月度趋势对比
  const hasData=months.filter(m=>m.recordDays>0);
  const trend=hasData.length>=2?hasData.map(m=>m.avgCal):[];
  const isDecreasing=trend.length>=2&&trend[trend.length-1]<trend[0];
  const isIncreasing=trend.length>=2&&trend[trend.length-1]>trend[0];

  // 生成建议
  const suggestions=[];
  if(quarterData.totalRecordDays<30){
    suggestions.push(`📅 本季度记录天数较少（${quarterData.totalRecordDays}天），建议增加记录频率以获得更准确的分析。`);
  }
  if(quarterData.totalOverDays>=10){
    suggestions.push(`⚠️ 本季度有 ${quarterData.totalOverDays} 天热量超标，建议长期控制高热量菜品摄入。`);
  }
  if(isDecreasing){
    const diff=trend[0]-trend[trend.length-1];
    suggestions.push(`📈 日均热量呈下降趋势（${trend[0]}→${trend[trend.length-1]}kcal，减少${diff}kcal），饮食控制效果显著！`);
  }else if(isIncreasing){
    const diff=trend[trend.length-1]-trend[0];
    suggestions.push(`⚠️ 日均热量呈上升趋势（${trend[0]}→${trend[trend.length-1]}kcal，增加${diff}kcal），需注意控制。`);
  }
  // 蛋白质月度趋势
  const proteinTrend=hasData.map(m=>m.avgProtein);
  if(proteinTrend.length>=2&&proteinTrend[proteinTrend.length-1]>proteinTrend[0]+5){
    suggestions.push(`💪 蛋白质摄入逐月提升（${proteinTrend[0]}→${proteinTrend[proteinTrend.length-1]}g/天），营养结构持续改善。`);
  }
  if(quarterData.avgProtein<goal.protein*0.7){
    suggestions.push(`💪 季度蛋白质平均达标率仅 ${Math.round(quarterData.avgProtein/goal.protein*100)}%，建议增加高蛋白食材。`);
  }
  if(suggestions.length===0&&quarterData.totalRecordDays>0){
    suggestions.push('✅ 本季度营养摄入整体稳定，继续保持健康的饮食习惯！');
  }
  if(quarterData.totalRecordDays===0){
    suggestions.push('📊 本季度暂无记录数据，开始添加餐单后即可生成详细的季度饮食分析报告。');
  }

  let html='';

  // 评级卡片
  html+=`<div style="text-align:center;margin-bottom:14px">
    <div style="font-size:.74rem;color:var(--muted);margin-bottom:6px">${year}年 ${quarterData.quarterLabel} · ${goal.label}模式</div>
    <span class="report-grade ${gradeClass}">${grade}</span>
    <div style="font-size:1.8rem;font-weight:800;color:var(--ink);margin-top:6px">${score}<span style="font-size:.9rem;color:var(--muted)">分</span></div>
    <div style="font-size:.76rem;color:var(--muted);margin-top:2px">${gradeText}</div>
  </div>`;

  // 季度概览
  html+=`<div class="report-overview">
    <div class="report-overview-item"><div class="rov-val">${quarterData.totalRecordDays}</div><div class="rov-label">总记录天数</div></div>
    <div class="report-overview-item"><div class="rov-val">${quarterData.avgCal}</div><div class="rov-label">日均热量kcal</div></div>
    <div class="report-overview-item"><div class="rov-val">${quarterData.totalOverDays}</div><div class="rov-label">超标天数</div></div>
    <div class="report-overview-item"><div class="rov-val">${quarterData.totalCal}</div><div class="rov-label">季度总热量kcal</div></div>
  </div>`;

  // 3个月柱状对比图
  const maxCal=Math.max(goal.cal,...months.map(m=>m.avgCal||0),1);
  html+=`<div style="font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:8px">📊 季度月度对比</div>`;
  html+=`<div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:12px">`;
  html+=`<div class="quarter-month-chart">`;
  months.forEach((m,i)=>{
    const barHeight=m.avgCal>0?Math.round(m.avgCal/maxCal*80):0;
    const pct=m.avgCal>0?Math.round(m.avgCal/goal.cal*100):0;
    html+=`<div class="quarter-month-bar">
      <div class="bar-val">${m.avgCal>0?m.avgCal:'-'}</div>
      <div class="bar m${i+1}" style="height:${barHeight}px" title="${m.label}: ${m.avgCal}kcal (${pct}%)"></div>
      <div class="bar-label">${m.label}</div>
    </div>`;
  });
  html+=`</div>`;
  // 目标线
  const goalHeight=Math.round(goal.cal/maxCal*80);
  html+=`<div style="position:relative;height:${goalHeight}px;margin-top:-${goalHeight+4}px;margin-bottom:4px;opacity:0;pointer-events:none"></div>`;
  html+=`<div style="display:flex;justify-content:space-between;font-size:.62rem;color:var(--accent2);margin-top:4px">
    <span>目标: ${goal.cal}kcal/天</span>
    <span>蛋白质目标: ${goal.protein}g/天</span>
  </div>`;
  html+=`</div>`;

  // 月度详细数据
  html+=`<div style="font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:8px">📋 月度明细</div>`;
  html+=`<div style="background:var(--bg);border-radius:10px;padding:8px 12px;margin-bottom:12px">`;
  months.forEach(m=>{
    const calPct=m.avgCal>0?Math.round(m.avgCal/goal.cal*100):0;
    const over=m.avgCal>goal.cal;
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.74rem;border-bottom:1px solid var(--rule)">
      <span style="width:40px;font-weight:700;color:var(--ink);flex-shrink:0">${m.label}</span>
      <span style="width:55px;color:${m.recordDays>0?'var(--ink)':'var(--rule)'};flex-shrink:0">${m.avgCal>0?m.avgCal+'kcal':'未记录'}</span>
      <span style="width:45px;color:var(--accent2);flex-shrink:0">${m.avgProtein>0?m.avgProtein+'g':''}</span>
      <span style="flex:1;text-align:right;color:${over?'var(--accent)':'var(--muted)'}">${m.recordDays>0?calPct+'%':''}</span>
      <span style="width:36px;text-align:right;color:var(--muted)">${m.recordDays}天</span>
    </div>`;
  });
  html+=`</div>`;

  // AI建议
  html+=`<div class="report-suggestions">
    <h5>🤖 AI季度饮食建议</h5>
    <ul>${suggestions.map(s=>`<li>${s}</li>`).join('')}</ul>
  </div>`;

  // 导出按钮
  html+=`<button class="export-btn" id="export-report-btn" onclick="exportReport('quarterly')"><span>📤</span> 导出季报为图片</button>`;

  // 社交分享
  html+=renderShareButtons('quarterly');

  return html;
}

// ===== 社交分享按钮渲染 =====
function renderShareButtons(type){
  const typeLabel=type==='quarterly'?'季度报':type==='monthly'?'月报':'周报';
  return`<div class="share-section">
    <div class="share-label">🔗 分享到社交平台</div>
    <div class="share-btns">
      <button class="share-btn wechat" onclick="shareReport('wechat','${type}')"><span class="share-icon">💬</span> 微信</button>
      <button class="share-btn weibo" onclick="shareReport('weibo','${type}')"><span class="share-icon">📢</span> 微博</button>
      <button class="share-btn copy" onclick="shareReport('copy','${type}')"><span class="share-icon">📋</span> 复制</button>
      <button class="share-btn more" onclick="shareReport('more','${type}')"><span class="share-icon">📤</span> 更多</button>
    </div>
  </div>`;
}

// ===== 社交分享功能 =====
function buildShareText(type){
  const goal=getGoal();
  let summary,score,grade;
  if(type==='quarterly'){
    const q=getQuarterSummary();
    score=Math.round(Math.min(100,q.totalRecordDays>0?70:0));
    grade=score>=85?'优秀':score>=70?'良好':score>=50?'一般':'待改善';
    summary=`${q.quarterLabel}季度营养报告：记录${q.totalRecordDays}天，日均${q.avgCal}kcal，评级${grade}`;
  }else if(type==='monthly'){
    const now=new Date();
    const s=getMonthlySummary(now.getFullYear(),now.getMonth());
    summary=`${now.getMonth()+1}月营养月报：记录${s.recordDays}天，日均${s.avgCal}kcal`;
  }else{
    const w=getWeeklyHistory();
    const days=w.filter(d=>d.cal>0).length;
    const total=w.reduce((s,d)=>s+d.cal,0);
    summary=`本周营养周报：记录${days}天，总摄入${total}kcal`;
  }
  return`【今晚吃什么 · AI智能菜谱推荐】\n${summary}\n🎯 目标模式：${goal.label}（${goal.cal}kcal/天）\n\n让我帮你智能推荐今晚吃什么，还能追踪每日营养摄入！`;
}

async function shareReport(platform,type){
  const shareText=buildShareText(type);
  const shareUrl=window.location.href;
  const fullText=shareText+`\n\n体验链接：${shareUrl}`;

  if(platform==='copy'){
    // 复制到剪贴板
    try{
      await navigator.clipboard.writeText(fullText);
      showShareToast('✅ 已复制到剪贴板，去粘贴分享吧！');
    }catch(e){
      // 降级方案
      const textarea=document.createElement('textarea');
      textarea.value=fullText;
      textarea.style.position='fixed';
      textarea.style.opacity='0';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showShareToast('✅ 已复制到剪贴板！');
    }
  }else if(platform==='wechat'){
    // 微信不支持直接URL分享，复制内容并提示
    try{
      await navigator.clipboard.writeText(fullText);
    }catch(e){
      const textarea=document.createElement('textarea');
      textarea.value=fullText;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
    }
    showShareToast('💬 内容已复制，请打开微信粘贴到聊天或朋友圈');
  }else if(platform==='weibo'){
    // 微博分享
    const weiboText=encodeURIComponent(shareText);
    const weiboUrl=encodeURIComponent(shareUrl);
    window.open(`https://service.weibo.com/share/share.php?title=${weiboText}&url=${weiboUrl}`,'_blank');
    showShareToast('📢 正在打开微博分享页面...');
  }else if(platform==='more'){
    // Web Share API
    if(navigator.share){
      try{
        await navigator.share({
          title:'今晚吃什么 · AI智能菜谱推荐',
          text:shareText,
          url:shareUrl
        });
        showShareToast('✅ 分享成功！');
      }catch(e){
        if(e.name!=='AbortError'){
          showShareToast('❌ 分享取消');
        }
      }
    }else{
      // 降级到复制
      try{
        await navigator.clipboard.writeText(fullText);
        showShareToast('📋 已复制内容，可粘贴到任意平台分享');
      }catch(e){
        showShareToast('❌ 当前环境不支持分享，请手动复制');
      }
    }
  }
}

function showShareToast(msg){
  // 移除已有的toast
  const existing=document.querySelector('.share-toast');
  if(existing)existing.remove();
  // 创建新toast
  const toast=document.createElement('div');
  toast.className='share-toast';
  toast.textContent=msg;
  document.body.appendChild(toast);
  setTimeout(()=>toast.classList.add('show'),10);
  setTimeout(()=>{
    toast.classList.remove('show');
    setTimeout(()=>toast.remove(),300);
  },2500);
}

// ===== 导出报告为图片 =====
async function exportReport(type){
  const btn=$('export-report-btn');
  const originalText=btn.innerHTML;
  btn.classList.add('exporting');
  btn.innerHTML='<span>⏳</span> 正在生成图片...';

  try{
    let dataUrl;
    if(typeof html2canvas!=='undefined'){
      // 使用 html2canvas 截取完整DOM
      const reportBody=$('report-body');
      const watermark=document.createElement('div');
      watermark.style.cssText='text-align:center;padding:10px 0 4px;font-size:.7rem;color:var(--muted);border-top:1px dashed var(--rule);margin-top:8px';
      const now0=new Date();
      watermark.textContent=`今晚吃什么 · AI智能菜谱推荐 · ${now0.getFullYear()}-${now0.getMonth()+1}-${now0.getDate()} 生成`;
      reportBody.appendChild(watermark);

      const canvas=await html2canvas(reportBody,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
      watermark.remove();
      dataUrl=canvas.toDataURL('image/png');
    }else{
      // 降级方案：纯Canvas绘制报告卡片
      dataUrl=drawReportCanvas(type);
    }

    const link=document.createElement('a');
    const now=new Date();
    const reportName=type==='quarterly'?'营养季报':type==='monthly'?'营养月报':'营养周报';
    link.download=`${reportName}_${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}.png`;
    link.href=dataUrl;
    link.click();

    btn.innerHTML='<span>✅</span> 已保存到下载文件夹';
    setTimeout(()=>{btn.classList.remove('exporting');btn.innerHTML=originalText;},2000);
  }catch(err){
    btn.classList.remove('exporting');
    btn.innerHTML='<span>❌</span> 导出失败，请重试';
    setTimeout(()=>{btn.innerHTML=originalText;},2000);
    console.error('Export error:',err);
  }
}

// ===== 纯Canvas绘制报告卡片（降级方案）=====
function drawReportCanvas(type){
  const isMonthly=type==='monthly';
  const isQuarterly=type==='quarterly';
  const goal=getGoal();
  const now=new Date();
  const dateStr=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

  // 获取数据
  let summary,periodLabel,compareData=null;
  if(isQuarterly){
    const q=getQuarterSummary();
    summary={
      recordDays:q.totalRecordDays,
      avgCal:q.avgCal,
      avgProtein:q.avgProtein,
      totalCal:q.totalCal,
      overDays:q.totalOverDays
    };
    periodLabel=q.quarterLabel;
  }else if(isMonthly){
    summary=getMonthlySummary(now.getFullYear(),now.getMonth());
    periodLabel=`${now.getMonth()+1}月`;
    const prevDate=new Date(now.getFullYear(),now.getMonth()-1,1);
    const prev=getMonthlySummary(prevDate.getFullYear(),prevDate.getMonth());
    if(prev.recordDays>0){
      compareData={
        prevAvgCal:prev.avgCal,
        prevAvgProtein:prev.avgProtein,
        prevRecordDays:prev.recordDays,
        prevLabel:`${prevDate.getMonth()+1}月`
      };
    }
  }else{
    const weekly=getWeeklyHistory();
    const recordDays=weekly.filter(d=>d.cal>0).length;
    const totalCal=weekly.reduce((s,d)=>s+d.cal,0);
    const totalProtein=weekly.reduce((s,d)=>s+d.protein,0);
    summary={
      recordDays,
      avgCal:recordDays>0?Math.round(totalCal/recordDays):0,
      avgProtein:recordDays>0?Math.round(totalProtein/recordDays):0,
      totalCal,
      overDays:weekly.filter(d=>d.cal>goal.cal).length
    };
    periodLabel=`${weekly[0].label}-${weekly[6].label}`;
  }

  // 评分
  let score=0;
  const maxDays=isQuarterly?90:isMonthly?30:7;
  if(summary.recordDays>0){
    score+=Math.min(30,summary.recordDays/maxDays*30);
    const calAch=goal.cal>0?Math.round(summary.avgCal/goal.cal*100):0;
    score+=calAch<=100?calAch/100*30:Math.max(0,30-(calAch-100)*0.3);
    const proAch=goal.protein>0?Math.round(summary.avgProtein/goal.protein*100):0;
    score+=Math.min(20,proAch/100*20);
    score+=Math.max(0,20-summary.overDays*(isMonthly?2:5));
  }
  score=Math.round(Math.max(0,Math.min(100,score)));
  let grade=score>=85?'优秀':score>=70?'良好':score>=50?'一般':'待改善';
  let gradeColor=score>=85?'#4ECDC4':score>=70?'#44A08D':score>=50?'#FFA500':'#FF6B6B';

  // 绘制Canvas
  const W=400,H=560;
  const canvas=document.createElement('canvas');
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);

  // 背景
  const bgGrad=ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#FFF9E6');
  bgGrad.addColorStop(1,'#FFFFFF');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,W,H);

  // 顶部色带
  const topGrad=ctx.createLinearGradient(0,0,W,0);
  topGrad.addColorStop(0,isQuarterly?'#2E86AB':isMonthly?'#f0932b':'#667eea');
  topGrad.addColorStop(1,isQuarterly?'#A23B72':isMonthly?'#eb4d4b':'#764ba2');
  ctx.fillStyle=topGrad;
  ctx.fillRect(0,0,W,80);

  // 标题
  ctx.fillStyle='#FFFFFF';
  ctx.font='bold 20px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(isQuarterly?'🗓️ 营养季报':isMonthly?'📅 营养月报':'📋 营养周报',W/2,32);
  ctx.font='12px sans-serif';
  ctx.fillText(`${periodLabel} · ${goal.label}模式 · ${dateStr}`,W/2,54);

  // 评分圆
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath();
  ctx.arc(W/2,130,45,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle=gradeColor;
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.arc(W/2,130,45,0,Math.PI*2*(score/100));
  ctx.stroke();
  ctx.fillStyle='#2D3436';
  ctx.font='bold 28px sans-serif';
  ctx.fillText(score,W/2,132);
  ctx.font='10px sans-serif';
  ctx.fillStyle='#636E72';
  ctx.fillText('分',W/2,148);
  // 评级
  ctx.fillStyle=gradeColor;
  ctx.font='bold 14px sans-serif';
  ctx.fillText(grade,W/2,195);

  // 数据卡片
  const items=[
    {label:'记录天数',val:summary.recordDays+(isMonthly?'':'/'+maxDays)},
    {label:'日均热量',val:summary.avgCal+'kcal'},
    {label:'超标天数',val:summary.overDays},
    {label:isQuarterly?'季度总热量':isMonthly?'月总热量':'周总热量',val:summary.totalCal+'kcal'}
  ];
  items.forEach((item,i)=>{
    const x=30+i%2*170;
    const y=220+Math.floor(i/2)*70;
    ctx.fillStyle='#FFF9E6';
    roundRect(ctx,x,y,150,55,10);
    ctx.fill();
    ctx.fillStyle='#FF6B6B';
    ctx.font='bold 20px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(item.val,x+75,y+30);
    ctx.fillStyle='#636E72';
    ctx.font='11px sans-serif';
    ctx.fillText(item.label,x+75,y+46);
  });

  // 上月/上周对比
  let yPos=370;
  if(compareData){
    ctx.fillStyle='#2D3436';
    ctx.font='bold 13px sans-serif';
    ctx.textAlign='left';
    ctx.fillText('📊 与上月对比',30,yPos);
    yPos+=20;
    const diff=summary.avgCal-compareData.prevAvgCal;
    const diffText=diff>0?`+${diff}kcal`:diff<0?`${diff}kcal`:'持平';
    const diffColor=diff>0?'#FF6B6B':'#4ECDC4';
    ctx.fillStyle='#636E72';
    ctx.font='12px sans-serif';
    ctx.fillText(`本月 ${summary.avgCal}kcal vs 上月 ${compareData.prevAvgCal}kcal`,30,yPos);
    yPos+=18;
    ctx.fillStyle=diffColor;
    ctx.font='bold 13px sans-serif';
    ctx.fillText(`热量变化: ${diffText}`,30,yPos);
  }

  // 底部水印
  ctx.fillStyle='#E8E4D0';
  ctx.fillRect(0,H-40,W,40);
  ctx.fillStyle='#636E72';
  ctx.font='11px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('今晚吃什么 · AI智能菜谱推荐',W/2,H-22);
  ctx.font='9px sans-serif';
  ctx.fillText(`${dateStr} 生成`,W/2,H-8);

  return canvas.toDataURL('image/png');
}

// 圆角矩形辅助函数
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ===== 首屏今日推荐 =====
function renderTodayRec(){
  const now=new Date();
  const month=now.getMonth()+1;
  const hour=now.getHours();

  // 根据月份选择时令标签
  let seasonTag='',seasonText='';
  if(month>=3&&month<=5){seasonTag='quick';seasonText='春日快手菜';}
  else if(month>=6&&month<=8){seasonTag='healthy';seasonText='夏日清凉菜';}
  else if(month>=9&&month<=11){seasonTag='healthy';seasonText='秋日滋补菜';}
  else{seasonTag='hot';seasonText='冬日暖胃菜';}

  $('today-rec-sub').textContent=seasonText;

  // 根据时间段选择推荐
  let timeFilter;
  if(hour>=6&&hour<10){timeFilter=r=>r.tags&&r.tags.includes('早餐');}
  else if(hour>=10&&hour<14){timeFilter=r=>r.time<=20;}
  else if(hour>=14&&hour<18){timeFilter=r=>r.nutri.cal<200;}
  else{timeFilter=r=>r.nutri.cal>=150;}

  // 获取推荐：先按时间筛选，再随机取5道
  let candidates=RECIPES.filter(timeFilter);
  if(candidates.length<5){
    candidates=RECIPES.slice();
  }
  // 随机打乱
  candidates=candidates.sort(()=>Math.random()-0.5).slice(0,5);

  const html=candidates.map(r=>{
    let tagLabel='',tagClass='';
    if(r.nutri.cal<150){tagLabel='低卡';tagClass='healthy';}
    else if(r.time<=10){tagLabel='快手';tagClass='quick';}
    else{tagLabel='热门';tagClass='hot';}
    return`<div class="today-rec-card" onclick="goDetail('${r.id}')">
      <div class="trc-emoji">${r.emoji}</div>
      <div style="text-align:center"><span class="trc-tag ${tagClass}">${tagLabel}</span></div>
      <div class="trc-name">${r.name}</div>
      <div class="trc-meta">${r.nutri.cal}kcal · ${r.time}分钟</div>
    </div>`;
  }).join('');

  $('today-rec-cards').innerHTML=html;
}

function fillDemoData(){

  const now=new Date();

  // 本月（6月）和上月（5月）和上上月（4月）
  for(let m=0;m<3;m++){
    const targetMonth=now.getMonth()-m;
    const targetYear=now.getFullYear()+(targetMonth<0?Math.floor(targetMonth/12):0);
    const actualMonth=((targetMonth%12)+12)%12;
    const daysInMonth=new Date(targetYear,actualMonth+1,0).getDate();
    const isCurrentMonth=m===0;
    const maxDay=isCurrentMonth?now.getDate():daysInMonth;

    for(let day=1;day<=maxDay;day++){
      if(Math.random()>0.15){ // 85%的记录率
        const baseCal=1800-m*100+Math.floor(Math.random()*400);
        history[`${targetYear}-${actualMonth+1}-${day}`]={
          cal:baseCal,
          protein:50+Math.floor(Math.random()*30),
          fat:45+Math.floor(Math.random()*20),
          carbs:200+Math.floor(Math.random()*100)

      }

  saveUnlockedAchievements(['first','week','month','balanced','explorer','colorful','lowCal']);
