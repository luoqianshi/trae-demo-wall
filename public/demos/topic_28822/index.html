<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>影心 - 你的情绪影视伴侣</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 启动页 -->
        <div id="splash-screen" class="splash-screen">
            <div class="splash-content">
                <div class="splash-logo">影心</div>
                <div class="splash-tagline">懂你的心情，更懂你想看什么</div>
                <div class="splash-loader">
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                </div>
            </div>
        </div>

        <!-- 主应用 -->
        <div id="main-app" class="main-app hidden">
            <!-- 顶部栏 -->
            <header class="app-header">
                <div class="header-title">影心</div>
                <div class="header-icon" id="history-btn">📓</div>
            </header>

            <!-- 页面内容区 -->
            <main class="app-content">
                <!-- 首页：情绪选择 -->
                <div id="page-home" class="page active">
                    <div class="greeting-section">
                        <h1 class="greeting-text" id="greeting-text">晚上好</h1>
                        <p class="greeting-sub">今天过得怎么样？</p>
                    </div>

                    <div class="mood-section">
                        <h2 class="section-title">你现在的心情是...</h2>
                        <div class="mood-grid" id="mood-grid">
                            <!-- 动态生成 -->
                        </div>
                    </div>

                    <div class="scene-section" id="scene-section" style="display:none;">
                        <h2 class="section-title">在什么场景？</h2>
                        <div class="scene-tags" id="scene-tags">
                            <!-- 动态生成 -->
                        </div>
                    </div>

                    <button class="primary-btn" id="recommend-btn" disabled>
                        <span>✨ 为我推荐</span>
                    </button>
                </div>

                <!-- 推荐结果页 -->
                <div id="page-results" class="page">
                    <div class="results-header">
                        <button class="back-btn" id="back-btn">← 返回</button>
                        <div class="results-title">
                            <span id="result-mood-emoji"></span>
                            <span id="result-mood-text"></span>
                        </div>
                    </div>

                    <div class="results-scene" id="results-scene"></div>

                    <div class="recommendations-list" id="recommendations-list">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 影片详情页 -->
                <div id="page-detail" class="page">
                    <div class="detail-header">
                        <button class="back-btn" id="detail-back-btn">← 返回</button>
                    </div>
                    <div class="detail-content" id="detail-content">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 观影记录页 -->
                <div id="page-history" class="page">
                    <div class="history-header">
                        <button class="back-btn" id="history-back-btn">← 返回</button>
                        <h2 class="history-title">我的观影记录</h2>
                    </div>
                    <div class="history-list" id="history-list">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </main>

            <!-- 底部导航 -->
            <nav class="bottom-nav">
                <div class="nav-item active" data-page="home">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">首页</span>
                </div>
                <div class="nav-item" data-page="history">
                    <span class="nav-icon">📓</span>
                    <span class="nav-label">记录</span>
                </div>
            </nav>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
