          </div>
        </div>

    setup() {
      const form = reactive({ firstNum: 0, secondNum: 0 });
      const sum = computed(() => (form.firstNum || 0) + (form.secondNum || 0));
      const gradients = [
        'linear-gradient(135deg, #1a3a5c 0%, #2a5a8c 50%, #409EFF 100%)',

      const icons = ['🛩️', '🚁', '🛸', '✈️'];
      const currentIndex = ref(0);
      const switchImage = () => { currentIndex.value = (currentIndex.value + 1) % gradients.length; };

      const form = reactive({ id: '', name: '', range: '', payload: '', price: '' });

        form.id = ''; form.name = ''; form.range = ''; form.payload = ''; form.price = '';
      };
      const submitForm = () => {
        let errors = [];
        if (!form.id) errors.push('无人机编号为必填项');
        if (!form.name) errors.push('无人机名称为必填项');
        if (form.range < 100 || form.range > 2000) errors.push('航程应在100到2000公里之间');
        if (form.payload < 50 || form.payload > 1000) errors.push('载弹量应在50到1000千克之间');
        if (form.price < 100 || form.price > 2000) errors.push('价格应在100万到2000万之间');

          ElMessageBox.alert('请完善表单相关信息！', '提示', { confirmButtonText: '确定', type: 'warning' });

        } else {
          ElMessageBox.alert('提交成功！', '提示', { confirmButtonText: '确定', type: 'success' });
          resetForm();
        }
      };
      return { form, submitForm, resetForm };
    }
  };

      onMounted(() => {
        nextTick(() => {
          chart = echarts.init(chartRef.value);
          chart.setOption({
            title: { text: '武器统计', left: 'center' },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: { data: ['库存量'], bottom: 10 },
            grid: { left: '3%', right: '4%', bottom: '15%', containLabel: true },

            series: [{

      const handleSelect = (key) => { router.push(key); };
      watch(() => router.currentRoute.value.path, (p) => { activeMenu.value = p; });
      onMounted(() => { activeMenu.value = router.currentRoute.value.path; });
      return { activeMenu, handleSelect };
    }
  });

  app.use(router);
  app.use(ElementPlus);
  app.mount('#app');
