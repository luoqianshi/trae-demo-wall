<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceX Launches · Missions</title>
<style>
    :root {
        --bg: #0a0a0a;
        --bg-elevated: #141414;
        --bg-card: #161616;
        --bg-hover: #1c1c1c;
        --border: #262626;
        --border-strong: #333333;
        --text-primary: #fafafa;
        --text-secondary: #a3a3a3;
        --text-tertiary: #737373;
        --text-muted: #525252;
        --accent: #f5f5f5;
        --status-go-bg: #1a2e1a;
        --status-go-fg: #86efac;
        --status-go-dot: #22c55e;
        --status-tbc-bg: #2e281a;
        --status-tbc-fg: #fcd34d;
        --status-tbc-dot: #eab308;
        --status-tbd-bg: #262626;
        --status-tbd-fg: #d4d4d4;
        --status-tbd-dot: #737373;
        --radius: 10px;
        --radius-sm: 6px;
        --radius-pill: 100px;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
        background: var(--bg);
        background-image:
            radial-gradient(circle at 20% 0%, rgba(255,255,255,0.025), transparent 50%),
            radial-gradient(circle at 80% 100%, rgba(255,255,255,0.02), transparent 50%);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        color: var(--text-primary);
        min-height: 100vh;
        padding: 48px 24px 64px;
        line-height: 1.5;
    }

    .container {
        max-width: 1320px;
        margin: 0 auto;
    }

    /* ---------- Header ---------- */
    .header {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
        gap: 24px;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .brand-mark {
        width: 38px;
        height: 38px;
        border-radius: 9px;
        background: var(--bg-elevated);
        border: 1px solid var(--border-strong);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .brand-mark svg { width: 18px; height: 18px; }

    .brand-text h1 {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text-primary);
    }

    .brand-text p {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-top: 2px;
        font-weight: 400;
    }

    .header-actions {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
    }

    .stats {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
    }

    .stats .sep {
        width: 1px;
        height: 12px;
        background: var(--border-strong);
        margin: 0 4px;
    }

    .stats .count {
        color: var(--text-primary);
        font-variant-numeric: tabular-nums;
    }

    .stats .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--status-go-dot);
        box-shadow: 0 0 0 0 rgba(34,197,94,0.6);
        animation: livePulse 2s infinite;
    }

    @keyframes livePulse {
        0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
        70% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
        100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 16px;
        background: var(--bg-elevated);
        border: 1px solid var(--border-strong);
        color: var(--text-primary);
        font-size: 12.5px;
        font-weight: 500;
        font-family: inherit;
        border-radius: var(--radius-pill);
        cursor: pointer;
        transition: all 0.15s ease;
    }

    .btn:hover {
        background: var(--bg-hover);
        border-color: #4a4a4a;
    }

    .btn:active { transform: scale(0.97); }

    .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .btn svg {
        width: 14px;
        height: 14px;
        transition: transform 0.4s ease;
    }

    .btn:hover svg.spin { transform: rotate(180deg); }

    .btn-lang {
        padding: 9px 12px;
        min-width: 70px;
        justify-content: center;
        font-variant-numeric: tabular-nums;
    }
    .btn-lang svg { width: 14px; height: 14px; }
    .btn-lang #langLabel { font-weight: 600; font-size: 12px; }

    /* ---------- Grid ---------- */
    .launch-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 18px;
    }

    /* ---------- Card ---------- */
    .launch-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        transition: all 0.2s ease;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    .launch-card:hover {
        border-color: #404040;
        background: #181818;
    }

    .launch-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        opacity: 0;
        transition: opacity 0.2s ease;
    }

    .launch-card:hover::before { opacity: 1; }

    .card-top {
        padding: 18px 20px 16px;
        border-bottom: 1px solid var(--border);
    }

    .mission-line {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
    }

    .mission-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: -0.01em;
        line-height: 1.35;
    }

    .mission-index {
        font-size: 11px;
        color: var(--text-muted);
        font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 6px;
    }

    .status-badge {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 10.5px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: var(--radius-pill);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        white-space: nowrap;
    }

    .status-badge::before {
        content: '';
        width: 5px;
        height: 5px;
        border-radius: 50%;
    }

    .status-go {
        background: var(--status-go-bg);
        color: var(--status-go-fg);
        border: 1px solid rgba(34,197,94,0.2);
    }
    .status-go::before { background: var(--status-go-dot); }

    .status-tbc {
        background: var(--status-tbc-bg);
        color: var(--status-tbc-fg);
        border: 1px solid rgba(234,179,8,0.2);
    }
    .status-tbc::before { background: var(--status-tbc-dot); }

    .status-tbd {
        background: var(--status-tbd-bg);
        color: var(--status-tbd-fg);
        border: 1px solid var(--border-strong);
    }
    .status-tbd::before { background: var(--status-tbd-dot); }

    /* 历史发射：发射结果徽章变体（复用 .status-badge 结构） */
    .status-success {
        background: var(--status-go-bg);
        color: var(--status-go-fg);
        border: 1px solid rgba(34,197,94,0.2);
    }
    .status-success::before { background: var(--status-go-dot); }

    .status-failure {
        background: #2e1a1a;
        color: #fca5a5;
        border: 1px solid rgba(239,68,68,0.2);
    }
    .status-failure::before { background: #ef4444; }

    .status-partial {
        background: #2e241a;
        color: #fcd34d;
        border: 1px solid rgba(234,179,8,0.25);
    }
    .status-partial::before { background: #eab308; }

    /* ---------- Tab bar ---------- */
    .tab-bar {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 24px;
        padding: 4px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        width: fit-content;
    }

    .tab-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 18px;
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-secondary);
        font-size: 12.5px;
        font-weight: 500;
        font-family: inherit;
        border-radius: var(--radius-pill);
        cursor: pointer;
        transition: all 0.15s ease;
    }

    .tab-btn:hover { color: var(--text-primary); background: var(--bg-hover); }

    .tab-btn.active {
        background: var(--bg-card);
        color: var(--text-primary);
        border-color: var(--border-strong);
    }

    .tab-btn .tab-count {
        font-size: 11px;
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
        background: var(--bg);
        padding: 1px 7px;
        border-radius: 8px;
        border: 1px solid var(--border);
        min-width: 18px;
        text-align: center;
    }

    .tab-btn.active .tab-count { color: var(--text-secondary); }

    @media (max-width: 640px) {
        .tab-btn { padding: 7px 12px; font-size: 12px; }
        .tab-btn .tab-count { display: none; }
    }

    /* ---------- Filter bar ---------- */
    .filter-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
        padding: 12px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius);
    }

    .filter-search {
        flex: 1 1 220px;
        min-width: 200px;
        position: relative;
        display: flex;
        align-items: center;
    }

    .filter-search svg {
        position: absolute;
        left: 12px;
        width: 14px;
        height: 14px;
        color: var(--text-muted);
        pointer-events: none;
    }

    .filter-search input {
        width: 100%;
        padding: 9px 12px 9px 34px;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        color: var(--text-primary);
        font-size: 12.5px;
        font-family: inherit;
        border-radius: var(--radius-sm);
        transition: border-color 0.15s ease;
    }

    .filter-search input::placeholder { color: var(--text-muted); }
    .filter-search input:focus {
        outline: none;
        border-color: #5a5a5a;
        background: var(--bg-hover);
    }

    .filter-select {
        position: relative;
        display: flex;
        align-items: center;
    }

    .filter-select select {
        appearance: none;
        -webkit-appearance: none;
        padding: 9px 30px 9px 12px;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        color: var(--text-primary);
        font-size: 12.5px;
        font-family: inherit;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: border-color 0.15s ease;
        max-width: 200px;
    }

    .filter-select select:focus {
        outline: none;
        border-color: #5a5a5a;
    }

    .filter-select select:hover { border-color: #4a4a4a; }

    .filter-select::after {
        content: '';
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 7px;
        height: 7px;
        border-right: 1.5px solid var(--text-tertiary);
        border-bottom: 1.5px solid var(--text-tertiary);
        transform: translateY(-70%) rotate(45deg);
        pointer-events: none;
    }

    .filter-select .filter-label {
        position: absolute;
        top: -8px;
        left: 10px;
        background: var(--bg-elevated);
        padding: 0 4px;
        font-size: 9.5px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        z-index: 1;
    }

    .btn-reset {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 14px;
        background: transparent;
        border: 1px solid var(--border-strong);
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 500;
        font-family: inherit;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.15s ease;
    }

    .btn-reset:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
        border-color: #4a4a4a;
    }

    .btn-reset:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .btn-reset svg { width: 13px; height: 13px; }

    .empty-state {
        grid-column: 1 / -1;
        padding: 56px 24px;
        text-align: center;
        background: var(--bg-card);
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius);
    }

    .empty-state .empty-icon {
        width: 40px;
        height: 40px;
        margin: 0 auto 14px;
        border-radius: 50%;
        background: var(--bg-elevated);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
    }

    .empty-state .empty-icon svg { width: 18px; height: 18px; }

    .empty-state p {
        font-size: 13px;
        color: var(--text-tertiary);
        margin-bottom: 6px;
    }

    .empty-state .empty-sub {
        font-size: 11.5px;
        color: var(--text-muted);
    }

    @media (max-width: 640px) {
        .filter-bar { gap: 8px; padding: 10px; }
        .filter-select select { max-width: 100%; font-size: 12px; padding: 8px 26px 8px 10px; }
        .filter-search input { font-size: 12px; }
    }

    /* ---------- Card: 可点击 ---------- */
    .launch-card { cursor: pointer; }
    .launch-card:focus { outline: none; border-color: #4a4a4a; }
    .launch-card:focus-visible { outline: 2px solid #5a5a5a; outline-offset: 2px; }

    /* ---------- Drawer ---------- */
    .drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        z-index: 90;
    }
    .drawer-overlay.open {
        opacity: 1;
        pointer-events: auto;
    }

    .drawer-panel {
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        width: 480px;
        max-width: 100vw;
        background: var(--bg-elevated);
        border-left: 1px solid var(--border-strong);
        box-shadow: -20px 0 60px rgba(0,0,0,0.5);
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 100;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .drawer-panel.open { transform: translateX(0); }

    /* 抽屉内容平滑替换：仅替换 body，不动 panel 自身 */
    .drawer-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 22px 18px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .drawer-header .drawer-title-block { flex: 1; min-width: 0; }
    .drawer-header .drawer-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: -0.01em;
        line-height: 1.35;
        margin-bottom: 8px;
        word-break: break-word;
    }
    .drawer-header .drawer-close {
        flex-shrink: 0;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-card);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.15s ease;
    }
    .drawer-header .drawer-close:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
        border-color: #4a4a4a;
    }
    .drawer-header .drawer-close svg { width: 14px; height: 14px; }

    .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px 22px 32px;
        transition: opacity 0.18s ease;
    }
    .drawer-body.swapping { opacity: 0; }

    /* 抽屉区块 */
    .drawer-section { margin-bottom: 22px; }
    .drawer-section:last-child { margin-bottom: 0; }
    .drawer-section-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .drawer-section-title::before {
        content: '';
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--text-muted);
    }

    .drawer-desc {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.6;
    }

    .drawer-kv {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 7px 0;
        font-size: 12.5px;
        border-bottom: 1px solid rgba(38,38,38,0.6);
        gap: 12px;
    }
    .drawer-kv:last-child { border-bottom: none; }
    .drawer-kv .k {
        color: var(--text-tertiary);
        font-size: 11.5px;
        flex-shrink: 0;
    }
    .drawer-kv .v {
        color: var(--text-primary);
        text-align: right;
        font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
        font-size: 12px;
        word-break: break-word;
    }
    .drawer-kv .v.muted { color: var(--text-tertiary); }

    .drawer-pill {
        display: inline-block;
        padding: 2px 8px;
        background: var(--bg-card);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-pill);
        font-size: 10.5px;
        font-weight: 500;
        color: var(--text-secondary);
    }

    .drawer-probability {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
    }
    .drawer-probability .prob-bar {
        flex: 1;
        height: 6px;
        background: var(--bg);
        border-radius: 3px;
        overflow: hidden;
    }
    .drawer-probability .prob-fill {
        height: 100%;
        background: var(--status-go-dot);
        border-radius: 3px;
        transition: width 0.3s ease;
    }
    .drawer-probability .prob-text {
        font-size: 12px;
        color: var(--text-primary);
        font-variant-numeric: tabular-nums;
        font-weight: 600;
    }

    .drawer-coords {
        margin-top: 10px;
        padding: 10px 12px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .drawer-coords .coords-line {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
        font-size: 12px;
        color: var(--text-primary);
    }
    .drawer-coords .coords-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        color: var(--text-tertiary);
    }
    .drawer-coords .coords-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11.5px;
        color: var(--text-secondary);
        text-decoration: none;
        padding: 5px 10px;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-pill);
        transition: all 0.15s ease;
        align-self: flex-start;
    }
    .drawer-coords .coords-link:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
        border-color: #4a4a4a;
    }
    .drawer-coords .coords-link svg { width: 12px; height: 12px; }

    .drawer-link-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .drawer-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        font-size: 12.5px;
        text-decoration: none;
        transition: all 0.15s ease;
        word-break: break-all;
    }
    .drawer-link:hover {
        background: var(--bg-hover);
        border-color: #4a4a4a;
        color: var(--text-primary);
    }
    .drawer-link svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--text-muted); }

    body.drawer-open {
        overflow: hidden;
    }

    @media (max-width: 640px) {
        .drawer-panel { width: 100vw; }
        .drawer-header { padding: 16px 16px 14px; }
        .drawer-body { padding: 16px 16px 28px; }
    }

    /* ---------- Card body ---------- */
    .card-body {
        padding: 16px 20px 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    /* Countdown */
    .countdown-block {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 14px 16px;
        margin-bottom: 16px;
    }

    .countdown-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .countdown-label::before {
        content: '';
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--text-muted);
    }

    .countdown-timer {
        font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, 'Courier New', monospace;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text-primary);
        font-variant-numeric: tabular-nums;
        line-height: 1.2;
    }

    .countdown-timer.past {
        color: var(--text-tertiary);
    }

    .local-time {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed var(--border);
        font-size: 12px;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .local-time .label {
        color: var(--text-muted);
        font-size: 11px;
    }

    /* Details */
    .details {
        display: flex;
        flex-direction: column;
    }

    .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        font-size: 13px;
        border-bottom: 1px solid rgba(38,38,38,0.6);
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-label {
        color: var(--text-tertiary);
        font-weight: 500;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .detail-value {
        color: var(--text-primary);
        text-align: right;
        font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
        font-size: 12.5px;
        font-weight: 500;
        max-width: 60%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .detail-value.muted { color: var(--text-tertiary); }

    .tag {
        display: inline-block;
        padding: 2px 8px;
        background: var(--bg-elevated);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-pill);
        font-size: 10.5px;
        font-weight: 500;
        color: var(--text-secondary);
    }

    /* Recovery + description */
    .recovery {
        margin-top: 14px;
        padding: 10px 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .recovery-icon {
        width: 28px;
        height: 28px;
        border-radius: var(--radius-sm);
        background: var(--bg-elevated);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .recovery-icon svg { width: 14px; height: 14px; color: var(--text-secondary); }

    .recovery-text {
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.4;
    }

    .recovery-text strong {
        color: var(--text-primary);
        font-weight: 600;
        display: block;
        margin-bottom: 1px;
        font-size: 12px;
    }

    .description {
        margin-top: 12px;
        font-size: 12px;
        color: var(--text-tertiary);
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* ---------- Footer ---------- */
    .footer-note {
        text-align: center;
        margin-top: 48px;
        padding-top: 28px;
        border-top: 1px solid var(--border);
        font-size: 11.5px;
        color: var(--text-muted);
        line-height: 1.6;
    }

    /* ---------- States ---------- */
    .error-message {
        grid-column: 1 / -1;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-left: 2px solid #888;
        padding: 20px 24px;
        border-radius: var(--radius);
        color: var(--text-secondary);
        font-size: 13px;
        text-align: center;
    }

    .skeleton-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        height: 440px;
        overflow: hidden;
        position: relative;
    }

    .skeleton-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
        animation: shimmer 1.6s infinite;
    }

    @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 640px) {
        body { padding: 28px 16px 48px; }
        .header { margin-bottom: 28px; }
        .launch-grid {
            grid-template-columns: 1fr;
            gap: 14px;
        }
        .countdown-timer { font-size: 19px; }
        .brand-text h1 { font-size: 15px; }
    }
</style>
