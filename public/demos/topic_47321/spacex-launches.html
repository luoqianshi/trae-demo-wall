    const LANG_KEY = 'spacex_lang_pref';
    // 默认中文
    let currentLang = (localStorage.getItem(LANG_KEY) === 'en') ? 'en' : 'zh';

    // 取词：t('card.rocket') 或带插值 t('card.reused_n', { n: 3 })
    function t(key, params) {
        const dict = I18N[currentLang] || I18N.zh;
        let s = dict[key];
        if (s === undefined) {
            // 回退到中文
            s = (I18N.zh[key] != null) ? I18N.zh[key] : key;
        }
        if (params) {
            Object.keys(params).forEach(k => {
                s = s.replace(new RegExp('\\{' + k + '\\}', 'g'), params[k]);
            });
        }
        return s;
    }

    // 把所有 [data-i18n] / [data-i18n-placeholder] 元素的文案按当前语言刷新
    function applyI18n() {
        document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-CN';
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            // 仅替换直接子文本节点，保留嵌套的 <span class="count"> 等
            const child = el.querySelector('.count');
            if (child) {
                // stats.loading 这种含 count 子节点的：先清掉非 count 子节点
                // 简单处理：把 count 节点移出，替换文本，再放回
                const countNode = child;
                el.textContent = t(key);
                el.appendChild(countNode);
            } else {
                el.textContent = t(key);
            }
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            el.setAttribute('placeholder', t(key));
        });
        // 语言切换按钮 label 显示「另一种语言」的代码
        const langLabel = document.getElementById('langLabel');
        if (langLabel) langLabel.textContent = currentLang === 'zh' ? 'EN' : '中';
    }

    // 切换语言：写入 localStorage + 刷新静态文案 + 重新渲染当前 tab + 抽屉（若开）
    function toggleLanguage() {
        currentLang = (currentLang === 'zh') ? 'en' : 'zh';
        localStorage.setItem(LANG_KEY, currentLang);
        applyI18n();
        // 重新渲染当前 tab 的下拉与卡片（动态文案也要切换）
        populateFilterDropdowns(currentTab);
        renderFilteredCards(currentTab);
        // 若抽屉打开，重渲染抽屉内容
        if (drawerOpen) {
            const panel = document.getElementById('drawerPanel');
            if (panel && panel.classList.contains('open')) {
                const openCard = document.querySelector('.launch-card[data-launch-id]');
                if (openCard) {
                    const id = openCard.getAttribute('data-launch-id');
                    if (id && launchesById[id]) {
                        renderDrawerContent(launchesById[id], currentTab);
                    }
                }
            }
        }
    }


    const API_BASE_UPCOMING = 'https://ll.thespacedevs.com/2.2.0/launch/upcoming/';
    const API_BASE_PREVIOUS = 'https://ll.thespacedevs.com/2.2.0/launch/previous/';
    const SEARCH_PARAMS = '?search=SpaceX&limit=25&mode=detailed';
    const CACHE_KEY_UPCOMING = 'spacex_launches_cache_upcoming';
    const CACHE_KEY_PREVIOUS = 'spacex_launches_cache_previous';
    const CACHE_DURATION = 10 * 60 * 1000;

    // 当前激活的 tab：'upcoming' | 'previous'
    let currentTab = 'upcoming';

    function getApiBase(tab) { return tab === 'previous' ? API_BASE_PREVIOUS : API_BASE_UPCOMING; }
    function getCacheKey(tab) { return tab === 'previous' ? CACHE_KEY_PREVIOUS : CACHE_KEY_UPCOMING; }

    // ---------- 筛选状态 ----------
    // 每个 tab 维护一份原始 launches + 当前筛选状态（切换 tab 时保留各自的筛选）
    const rawLaunchesPerTab = { upcoming: [], previous: [] };
    const filterStatePerTab = {
        upcoming: { search: '', pad: '', rocket: '', orbit: '' },
        previous: { search: '', pad: '', rocket: '', orbit: '' }
    };
    let searchDebounceTimer = null;
    const SEARCH_DEBOUNCE_MS = 200;

    // ---------- 抽屉状态 ----------
    // launchesById：当前显示的卡片对应的 launch 对象缓存（点击卡片时按 id 取出注入抽屉）
    const launchesById = {};
    let drawerOpen = false;

    // 预设的发射场关键词分组（用于把不同 pad name 归到 Cape Canaveral / Kennedy / Vandenberg / Boca Chica / Others）
    const PAD_GROUPS = [
        { key: 'cape-canaveral', label: 'Cape Canaveral', match: /cape|canaveral|slc-40|sfb/i },
        { key: 'kennedy', label: 'Kennedy', match: /kennedy|ksc|lc-39/i },
        { key: 'vandenberg', label: 'Vandenberg', match: /vandenberg|vsfb|slc-4/i },
        { key: 'boca-chica', label: 'Boca Chica', match: /boca|starbase/i }
    ];

    function getPadGroup(padName) {
        if (!padName) return 'Others';
        for (const g of PAD_GROUPS) {
            if (g.match.test(padName)) return g.label;
        }
        return 'Others';
    }

    function getRocketModel(launch) {
        const cfg = launch.rocket && launch.rocket.configuration;
        const name = (cfg && (cfg.full_name || cfg.name)) || '';
        if (/falcon 9/i.test(name)) return 'Falcon 9';
        if (/falcon heavy/i.test(name)) return 'Falcon Heavy';
        if (/starship/i.test(name)) return 'Starship';
        return name || 'Others';
    }

    function getOrbitAbbrev(launch) {
        const orbit = launch.mission && launch.mission.orbit;
        if (orbit && orbit.abbrev) return orbit.abbrev;
        return '';
    }

    // 工具：本地化时间
    function formatLocalTime(utcString) {
        if (!utcString) return 'TBD';
        try {
            const date = new Date(utcString);
            if (isNaN(date.getTime())) return utcString;
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        } catch (e) {
            return utcString;
        }
    }

    function getCountdown(targetUtc) {
        const now = new Date();
        const target = new Date(targetUtc);
        if (isNaN(target.getTime())) return { days: 0, hours: 0, minutes: 0, seconds: 0, isPast: true };
        const diffMs = target - now;
        if (diffMs <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, isPast: true };
        const totalSeconds = Math.floor(diffMs / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return { days, hours, minutes, seconds, isPast: false };
    }

    function formatCountdownText(countdown) {
        if (countdown.isPast) return 'LAUNCHED';
        const pad = (n) => String(n).padStart(2, '0');
        if (countdown.days > 0) {
            return `T-${countdown.days}d ${pad(countdown.hours)}:${pad(countdown.minutes)}:${pad(countdown.seconds)}`;
        }
        return `T-${pad(countdown.hours)}:${pad(countdown.minutes)}:${pad(countdown.seconds)}`;
    }

    function getStatusClass(statusAbbrev) {
        if (!statusAbbrev) return 'status-tbd';
        const s = statusAbbrev.toLowerCase();
        if (s === 'go') return 'status-go';
        if (s === 'tbc') return 'status-tbc';
        return 'status-tbd';
    }

    // 历史发射：发射结果徽章（Success / Partial Failure / Failure）
    // LL2 2.2.0 中 launch.status.abbrev 对历史发射为 'Success' / 'Failure' / 'Partial Failure'
    function getLaunchResultClass(launch) {
        const abbrev = ((launch.status && launch.status.abbrev) || '').toLowerCase();
        if (abbrev === 'success') return 'status-success';
        if (abbrev === 'failure') return 'status-failure';
        if (abbrev === 'partial failure') return 'status-partial';
        return 'status-tbd';
    }

    // 历史发射：着陆结果徽章（Recovered / Failed / No recovery）
    // 复用 getRecoveryInfo 已计算的 landingTypeLabel
    function getLandingBadgeInfo(recovery) {
        if (!recovery || !recovery.isAttempt) {
            return { label: 'No recovery', class: 'status-tbd' };
        }
        if (recovery.landingTypeLabel === 'Recovered') {
            return { label: 'Recovered', class: 'status-success' };
        }
        if (recovery.landingTypeLabel === 'Failed') {
            return { label: 'Failed', class: 'status-failure' };
        }
        return { label: recovery.landingTypeLabel || 'Unknown', class: 'status-tbd' };
    }

    // 更新 tab 上的小计数
    function updateTabCount(tab, count) {
        const el = document.getElementById(tab === 'upcoming' ? 'tabCountUpcoming' : 'tabCountPrevious');
        if (el) el.textContent = count;
    }

    // ---------- 筛选逻辑 ----------
    // 从指定 tab 的原始 launches 中提取下拉选项（去重 + 计数）
    function buildFilterOptions(tab) {
        const launches = rawLaunchesPerTab[tab] || [];
        const padCounts = {};
        const rocketCounts = {};
        const orbitCounts = {};

        launches.forEach(launch => {
            const padName = (launch.pad && launch.pad.name) || '';
            const padGroup = getPadGroup(padName);
            padCounts[padGroup] = (padCounts[padGroup] || 0) + 1;

            const rocket = getRocketModel(launch);
            rocketCounts[rocket] = (rocketCounts[rocket] || 0) + 1;

            const orbit = getOrbitAbbrev(launch) || '—';
            orbitCounts[orbit] = (orbitCounts[orbit] || 0) + 1;
        });

        return {
            pads: Object.keys(padCounts).sort(),
            padCounts,
            rockets: Object.keys(rocketCounts).sort(),
            rocketCounts,
            orbits: Object.keys(orbitCounts).sort(),
            orbitCounts
        };
    }

    function populateFilterDropdowns(tab) {
        const opts = buildFilterOptions(tab);
        const padSelect = document.getElementById('filterPadSelect');
        const rocketSelect = document.getElementById('filterRocketSelect');
        const orbitSelect = document.getElementById('filterOrbitSelect');
        if (!padSelect || !rocketSelect || !orbitSelect) return;

        const st = filterStatePerTab[tab];

        // Pad
        padSelect.innerHTML = `<option value="">${t('filter.all_pads')}</option>` + opts.pads.map(p =>
            `<option value="${escapeAttr(p)}">${escapeHtml(p)} (${opts.padCounts[p]})</option>`
        ).join('');
        // Rocket
        rocketSelect.innerHTML = `<option value="">${t('filter.all_rockets')}</option>` + opts.rockets.map(r =>
            `<option value="${escapeAttr(r)}">${escapeHtml(r)} (${opts.rocketCounts[r]})</option>`
        ).join('');
        // Orbit
        orbitSelect.innerHTML = `<option value="">${t('filter.all_orbits')}</option>` + opts.orbits.map(o =>
            `<option value="${escapeAttr(o)}">${escapeHtml(o)} (${opts.orbitCounts[o]})</option>`
        ).join('');

        // 同步当前筛选状态到 UI
        padSelect.value = st.pad;
        rocketSelect.value = st.rocket;
        orbitSelect.value = st.orbit;
        const searchInput = document.getElementById('filterSearchInput');
        if (searchInput) searchInput.value = st.search;
    }

    // 应用当前 tab 的筛选条件，返回过滤后的 launches 数组
    function applyFilters(tab) {
        const launches = rawLaunchesPerTab[tab] || [];
        const st = filterStatePerTab[tab];
        const searchTerm = st.search.trim().toLowerCase();

        return launches.filter(launch => {
            // 搜索：任务名 + 火箭名（模糊匹配）
            if (searchTerm) {
                const missionName = (launch.name || '').toLowerCase();
                const rocketName = ((launch.rocket && launch.rocket.configuration &&
                    (launch.rocket.configuration.full_name || launch.rocket.configuration.name)) || '').toLowerCase();
                if (!missionName.includes(searchTerm) && !rocketName.includes(searchTerm)) return false;
            }
            // 发射场分组
            if (st.pad) {
                const padName = (launch.pad && launch.pad.name) || '';
                if (getPadGroup(padName) !== st.pad) return false;
            }
            // 火箭型号
            if (st.rocket && getRocketModel(launch) !== st.rocket) return false;
            // 轨道
            if (st.orbit) {
                const orbit = getOrbitAbbrev(launch);
                const orbitKey = orbit || '—';
                if (orbitKey !== st.orbit) return false;
            }
            return true;
        });
    }

    // 渲染筛选后的卡片（不重新拉数据，仅客户端二次过滤）
    function renderFilteredCards(tab) {
        const container = document.getElementById('launchContainer');
        if (!container) return;
        const total = (rawLaunchesPerTab[tab] || []).length;
        const filtered = applyFilters(tab);

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.3-4.3"/>
                        </svg>
                    </div>
                    <p>${t('empty.no_match_title')}</p>
                    <p class="empty-sub">${t('empty.no_match_sub')}</p>
                </div>`;
            updateStats(0, total, tab, false);
            updateResetButtonState(tab);
            return;
        }

        let cardsHtml = '';
        // 渲染前清空 launchesById 中"当前 tab"的旧条目，避免内存堆积
        // （其它 tab 的条目保留，便于来回切换时立即打开抽屉——但当前 tab 数据已变，需重建）
        // 简化处理：每次渲染当前 tab 的卡片时同步刷新对应 launchesById 条目
        filtered.forEach((launch, idx) => {
            const id = String(launch.id != null ? launch.id : `idx-${tab}-${idx}`);
            launchesById[id] = launch;
            cardsHtml += renderLaunchCard(launch, idx, tab, id);
        });
        container.innerHTML = cardsHtml;

        updateStats(filtered.length, total, tab, false);
        updateResetButtonState(tab);

        // 重新启动倒计时（仅 upcoming）
        stopGlobalUpdater();
        if (tab === 'upcoming') startGlobalCountdownUpdater();
    }

    function updateResetButtonState(tab) {
        const st = filterStatePerTab[tab];
        const hasFilter = !!(st.search || st.pad || st.rocket || st.orbit);
        const btn = document.getElementById('resetFiltersBtn');
        if (btn) btn.disabled = !hasFilter;
    }

    function resetFilters(tab) {
        filterStatePerTab[tab] = { search: '', pad: '', rocket: '', orbit: '' };
        populateFilterDropdowns(tab);
        renderFilteredCards(tab);
    }

    // 读取 UI 控件当前值，写回 filterState，然后重新渲染
    function syncFilterStateFromUI(tab) {
        const st = filterStatePerTab[tab];
        const searchInput = document.getElementById('filterSearchInput');
        const padSelect = document.getElementById('filterPadSelect');
        const rocketSelect = document.getElementById('filterRocketSelect');
        const orbitSelect = document.getElementById('filterOrbitSelect');
        if (searchInput) st.search = searchInput.value;
        if (padSelect) st.pad = padSelect.value;
        if (rocketSelect) st.rocket = rocketSelect.value;
        if (orbitSelect) st.orbit = orbitSelect.value;
    }

    function handleSearchInput(tab) {
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => {
            syncFilterStateFromUI(tab);
            renderFilteredCards(tab);
        }, SEARCH_DEBOUNCE_MS);
    }

    function attachFilterListeners() {
        const searchInput = document.getElementById('filterSearchInput');
        const padSelect = document.getElementById('filterPadSelect');
        const rocketSelect = document.getElementById('filterRocketSelect');
        const orbitSelect = document.getElementById('filterOrbitSelect');
        const resetBtn = document.getElementById('resetFiltersBtn');

        if (searchInput) {
            searchInput.addEventListener('input', () => handleSearchInput(currentTab));
        }
        if (padSelect) {
            padSelect.addEventListener('change', () => {
                syncFilterStateFromUI(currentTab);
                renderFilteredCards(currentTab);
            });
        }
        if (rocketSelect) {
            rocketSelect.addEventListener('change', () => {
                syncFilterStateFromUI(currentTab);
                renderFilteredCards(currentTab);
            });
        }
        if (orbitSelect) {
            orbitSelect.addEventListener('change', () => {
                syncFilterStateFromUI(currentTab);
                renderFilteredCards(currentTab);
            });
        }
        if (resetBtn) {
            resetBtn.addEventListener('click', () => resetFilters(currentTab));
        }
    }

    // ---------- 详情抽屉 ----------
    function openDrawer(launchId, tab) {
        const launch = launchesById[launchId];
        if (!launch) return;
        const overlay = document.getElementById('drawerOverlay');
        const panel = document.getElementById('drawerPanel');
        if (!overlay || !panel) return;

        // 平滑替换：抽屉已开时仅淡入淡出 body，不重新触发 slide 动画
        const body = document.getElementById('drawerBody');
        if (drawerOpen && body) {
            body.classList.add('swapping');
            setTimeout(() => {
                renderDrawerContent(launch, tab);
                if (body) body.classList.remove('swapping');
            }, 180);
        } else {
            renderDrawerContent(launch, tab);
            overlay.classList.add('open');
            panel.classList.add('open');
            panel.setAttribute('aria-hidden', 'false');
            document.body.classList.add('drawer-open');
            drawerOpen = true;
        }
    }

    function closeDrawer() {
        const overlay = document.getElementById('drawerOverlay');
        const panel = document.getElementById('drawerPanel');
        if (overlay) overlay.classList.remove('open');
        if (panel) {
            panel.classList.remove('open');
            panel.setAttribute('aria-hidden', 'true');
        }
        document.body.classList.remove('drawer-open');
        drawerOpen = false;
    }

    // 渲染抽屉正文（顶部 header + body）
    function renderDrawerContent(launch, tab) {
        const isHistory = tab === 'previous';
        const missionName = launch.name || 'SpaceX Mission';
        const statusName = (launch.status && launch.status.name) || 'Updating';
        const statusAbbrev = (launch.status && launch.status.abbrev) || '';
        const topBadgeClass = isHistory ? getLaunchResultClass(launch) : getStatusClass(statusAbbrev);

        const titleEl = document.getElementById('drawerTitle');
        const badgeEl = document.getElementById('drawerStatusBadge');
        if (titleEl) titleEl.textContent = missionName;
        if (badgeEl) {
            badgeEl.textContent = statusName;
            badgeEl.className = 'status-badge ' + topBadgeClass;
        }

        const body = document.getElementById('drawerBody');
        if (!body) return;
        body.innerHTML = buildDrawerSectionsHtml(launch, isHistory);
        body.scrollTop = 0;
    }

    function buildDrawerSectionsHtml(launch, isHistory) {
        const sections = [];

        // 2. Mission：description 全文 + type + orbit.name
        const mission = launch.mission || {};
        const missionDesc = mission.description || t('drawer.mission_desc_fallback');
        const missionType = mission.type || (mission.type_ && mission.type_.name) || '';
        const orbitName = (mission.orbit && mission.orbit.name) || '';
        const missionPills = [];
        if (missionType) missionPills.push(missionType);
        if (orbitName) missionPills.push(orbitName);
        sections.push(`
            <section class="drawer-section">
                <div class="drawer-section-title">${t('drawer.section.mission')}</div>
                <p class="drawer-desc">${escapeHtml(missionDesc)}</p>
                ${missionPills.length ? `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">${missionPills.map(p => `<span class="drawer-pill">${escapeHtml(p)}</span>`).join('')}</div>` : ''}
            </section>
        `);

        // 3. Window：window_start ~ window_end
        const ws = formatLocalTime(launch.window_start);
        const we = formatLocalTime(launch.window_end);
        if (launch.window_start || launch.window_end) {
            sections.push(`
                <section class="drawer-section">
                    <div class="drawer-section-title">${t('drawer.section.window')}</div>
                    <div class="drawer-kv"><span class="k">${t('drawer.window.open')}</span><span class="v">${escapeHtml(ws)}</span></div>
                    <div class="drawer-kv"><span class="k">${t('drawer.window.close')}</span><span class="v">${escapeHtml(we)}</span></div>
                </section>
            `);
        }

        // 4. Probability：百分比显示，无数据隐藏
        if (typeof launch.probability === 'number' && launch.probability !== null) {
            const pct = Math.round(launch.probability * 100);
            sections.push(`
                <section class="drawer-section">
                    <div class="drawer-section-title">${t('drawer.section.probability')}</div>
                    <div class="drawer-probability">
                        <span class="prob-text">${pct}% ${t('drawer.probability.go')}</span>
                        <div class="prob-bar"><div class="prob-fill" style="width:${pct}%"></div></div>
                    </div>
                </section>
            `);
        }

        // 5. Weather：weather_concerns，无数据隐藏
        if (launch.weather_concerns) {
            sections.push(`
                <section class="drawer-section">
                    <div class="drawer-section-title">${t('drawer.section.weather')}</div>
                    <p class="drawer-desc">${escapeHtml(launch.weather_concerns)}</p>
                </section>
            `);
        }

        // 6. Rocket：full_name + family + variant + length/diameter/LEO
        const cfg = (launch.rocket && launch.rocket.configuration) || {};
        const rocketName = cfg.full_name || cfg.name || 'Falcon 9';
        const rocketKv = [];
        rocketKv.push([t('drawer.kv.full_name'), rocketName]);
        if (cfg.family) rocketKv.push([t('drawer.kv.family'), cfg.family]);
        if (cfg.variant) rocketKv.push([t('drawer.kv.variant'), cfg.variant]);
        if (cfg.length) rocketKv.push([t('drawer.kv.length'), `${cfg.length} m`]);
        if (cfg.diameter) rocketKv.push([t('drawer.kv.diameter'), `${cfg.diameter} m`]);
        if (cfg.leo_capacity) rocketKv.push([t('drawer.kv.leo_capacity'), `${cfg.leo_capacity} kg`]);
        if (cfg.gto_capacity) rocketKv.push([t('drawer.kv.gto_capacity'), `${cfg.gto_capacity} kg`]);
        if (cfg.stages) rocketKv.push([t('drawer.kv.stages'), String(cfg.stages)]);
        if (cfg.reusable !== undefined && cfg.reusable !== null) rocketKv.push([t('drawer.kv.reusable'), cfg.reusable ? t('drawer.yes') : t('drawer.no')]);
        sections.push(`
            <section class="drawer-section">
                <div class="drawer-section-title">${t('drawer.section.rocket')}</div>
                ${rocketKv.map(([k, v]) => `<div class="drawer-kv"><span class="k">${escapeHtml(k)}</span><span class="v">${escapeHtml(v)}</span></div>`).join('')}
            </section>
        `);

        // 7. Core：serial + flight_proven + flights + thisFlight
        const stage = getFirstStage(launch);
        const coreInfo = getCoreInfo(launch);
        const coreSerial = getCoreSerial(launch);
        const coreKv = [];
        coreKv.push([t('drawer.kv.serial'), coreSerial === 'TBD' ? t('card.tbd') : coreSerial]);
        if (coreInfo.flightProven !== undefined && coreInfo.flightProven !== null) coreKv.push([t('drawer.kv.flight_proven'), coreInfo.flightProven ? t('drawer.yes') : t('drawer.no')]);
        if (coreInfo.flights !== undefined && coreInfo.flights !== null) coreKv.push([t('drawer.kv.prior_flights'), String(coreInfo.flights)]);
        if (coreInfo.thisFlight) coreKv.push([t('drawer.kv.this_flight'), `#${coreInfo.thisFlight}`]);
        if (coreInfo.reused !== undefined && coreInfo.reused !== null) coreKv.push([t('drawer.kv.reused'), coreInfo.reused ? t('drawer.yes') : t('drawer.no')]);
        if (coreInfo.status) coreKv.push([t('drawer.kv.core_status'), coreInfo.status]);
        sections.push(`
            <section class="drawer-section">
                <div class="drawer-section-title">${t('drawer.section.core')}</div>
                ${coreKv.map(([k, v]) => `<div class="drawer-kv"><span class="k">${escapeHtml(k)}</span><span class="v">${escapeHtml(v)}</span></div>`).join('')}
            </section>
        `);

        // 8. Recovery：landing.type.name + landing.location.name + downrange_distance
        const recovery = getRecoveryInfo(launch);
        const landing = stage && stage.landing;
        const recKv = [];
        recKv.push([t('drawer.kv.rec_status'), recovery.landingTypeLabel]);
        if (landing && landing.type && landing.type.name) recKv.push([t('drawer.kv.rec_type'), landing.type.name]);
        if (landing && landing.location && landing.location.name) recKv.push([t('drawer.kv.rec_location'), landing.location.name]);
        if (recovery.downrange) recKv.push([t('drawer.kv.rec_downrange'), `${recovery.downrange} km`]);
        if (landing && landing.attempt !== undefined && landing.attempt !== null) recKv.push([t('drawer.kv.rec_attempt'), landing.attempt ? t('drawer.yes') : t('drawer.no')]);
        if (landing && landing.success !== undefined && landing.success !== null) recKv.push([t('drawer.kv.rec_result'), landing.success ? t('drawer.rec_success') : t('drawer.rec_failure')]);
        sections.push(`
            <section class="drawer-section">
                <div class="drawer-section-title">${t('drawer.section.recovery')}</div>
                ${recKv.map(([k, v]) => `<div class="drawer-kv"><span class="k">${escapeHtml(k)}</span><span class="v">${escapeHtml(v)}</span></div>`).join('')}
            </section>
        `);

        // 9. Pad：pad.name + pad.location.name + 文字经纬度（不嵌入 Google Maps，国内被墙）
        //    若 pad.map_url 有值，提供「查看地图」外链（用户自行选择是否打开）
        const pad = launch.pad || {};
        const padName = pad.name || 'Pad TBC';
        const padLocName = (pad.location && pad.location.name) || '';
        const padLat = pad.latitude;
        const padLng = pad.longitude;
        const padKv = [];
        padKv.push([t('drawer.kv.pad_name'), padName]);
        if (padLocName) padKv.push([t('drawer.kv.pad_location'), padLocName]);
        if (padLat !== undefined && padLat !== null && !Number.isNaN(Number(padLat))) padKv.push([t('drawer.kv.pad_lat'), String(padLat)]);
        if (padLng !== undefined && padLng !== null && !Number.isNaN(Number(padLng))) padKv.push([t('drawer.kv.pad_lng'), String(padLng)]);

        // 文字坐标展示：把十进制转为 28.5621°N / 80.5772°W 格式
        const latNum = Number(padLat);
        const lngNum = Number(padLng);
        const hasCoords = !Number.isNaN(latNum) && !Number.isNaN(lngNum);
        const coordsText = hasCoords
            ? `${Math.abs(latNum).toFixed(4)}°${latNum >= 0 ? 'N' : 'S'}, ${Math.abs(lngNum).toFixed(4)}°${lngNum >= 0 ? 'E' : 'W'}`
            : '';
        const mapUrl = pad.map_url || '';

        let padExtraHtml = '';
        if (hasCoords || mapUrl) {
            padExtraHtml = `<div class="drawer-coords">`;
            if (hasCoords) {
                padExtraHtml += `
                    <div class="coords-line">
                        <svg class="coords-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        <span>${escapeHtml(coordsText)}</span>
                    </div>`;
            }
            if (mapUrl) {
                padExtraHtml += `
                    <a class="coords-link" href="${escapeAttr(mapUrl)}" target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 20l-5.4-2.7a2 2 0 0 1-1.1-1.8V5.6a2 2 0 0 1 2.9-1.8L9 5"/>
                            <path d="M9 5v15"/>
                            <path d="M15 20l5.4-2.7a2 2 0 0 0 1.1-1.8V5.6a2 2 0 0 0-2.9-1.8L15 5"/>
                            <path d="M15 5v15"/>
                        </svg>
                        ${t('drawer.view_map')}
                    </a>`;
            }
            padExtraHtml += `</div>`;
        }
        sections.push(`
            <section class="drawer-section">
                <div class="drawer-section-title">${t('drawer.section.pad')}</div>
                ${padKv.map(([k, v]) => `<div class="drawer-kv"><span class="k">${escapeHtml(k)}</span><span class="v">${escapeHtml(v)}</span></div>`).join('')}
                ${padExtraHtml}
            </section>
        `);

        // 10. Info：launch.info_urls[] + mission.info_urls[] 合并去重（新闻/文章链接，通常国内可访问）
        //     不展示 vid_urls[]（视频链接大概率是 YouTube，国内被墙）
        const infoUrls = [];
        const seen = new Set();
        const collectInfo = (arr) => {
            if (!Array.isArray(arr)) return;
            arr.forEach(item => {
                const url = typeof item === 'string' ? item : item && item.url;
                if (url && !seen.has(url)) {
                    seen.add(url);
                    infoUrls.push(typeof item === 'string' ? { url, title: url } : { url, title: item.title || item.url });
                }
            });
        };
        collectInfo(launch.info_urls);
        collectInfo(mission.info_urls);
        if (infoUrls.length > 0) {
            sections.push(`
                <section class="drawer-section">
                    <div class="drawer-section-title">${t('drawer.section.info')}</div>
                    <div class="drawer-link-list">
                        ${infoUrls.map(l => `
                            <a class="drawer-link" href="${escapeAttr(l.url)}" target="_blank" rel="noopener noreferrer">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                                </svg>
                                <span>${escapeHtml(l.title)}</span>
                            </a>
                        `).join('')}
                    </div>
                </section>
            `);
        }

        // 11. Hashtag：无数据隐藏
        if (launch.hashtag) {
            sections.push(`
                <section class="drawer-section">
                    <div class="drawer-section-title">${t('drawer.section.hashtag')}</div>
                    <p class="drawer-desc">#${escapeHtml(launch.hashtag)}</p>
                </section>
            `);
        }

        return sections.join('');
    }

    // 抽屉事件绑定（ESC / 遮罩 / 关闭按钮 / 卡片点击委托）
    function attachDrawerListeners() {
        const overlay = document.getElementById('drawerOverlay');
        const closeBtn = document.getElementById('drawerCloseBtn');
        if (overlay) overlay.addEventListener('click', closeDrawer);
        if (closeBtn) closeBtn.addEventListener('click', closeDrawer);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && drawerOpen) {
                e.preventDefault();
                closeDrawer();
            }
        });
        // 事件委托：launchContainer 上的卡片点击 + 键盘 Enter
        const container = document.getElementById('launchContainer');
        if (container) {
            container.addEventListener('click', (e) => {
                const card = e.target.closest('.launch-card');
                if (!card) return;
                const launchId = card.getAttribute('data-launch-id');
                if (!launchId) return;
                openDrawer(launchId, currentTab);
            });
            container.addEventListener('keydown', (e) => {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                const card = e.target.closest('.launch-card');
                if (!card) return;
                e.preventDefault();
                const launchId = card.getAttribute('data-launch-id');
                if (!launchId) return;
                openDrawer(launchId, currentTab);
            });
        }
    }

    // 从第一级 (Core) 提取芯级 + 着陆信息
    // LL2 2.2.0 结构: rocket.launcher_stage[0].launcher + .landing
    function getFirstStage(launch) {
        const stages = launch.rocket && launch.rocket.launcher_stage;
        if (stages && stages.length) {
            return stages[0];
        }
        return null;
    }

    function getCoreSerial(launch) {
        const stage = getFirstStage(launch);
        if (stage && stage.launcher && stage.launcher.serial_number) {
            return stage.launcher.serial_number;
        }
        // 兼容老结构
        if (launch.rocket && launch.rocket.core_serial) return launch.rocket.core_serial;
        return 'TBD';
    }

    function getCoreInfo(launch) {
        const stage = getFirstStage(launch);
        if (!stage || !stage.launcher) return {};
        const lc = stage.launcher;
        return {
            serial: lc.serial_number,
            flightProven: lc.flight_proven,
            flights: lc.flights,                 // 历史总飞行次数
            thisFlight: stage.launcher_flight_number,  // 本次是第几次
            reused: stage.reused,
            status: lc.status
        };
    }

    function getRecoveryInfo(launch) {
        const stage = getFirstStage(launch);
        const landing = stage && stage.landing;
        if (!landing) return { landingType: 'No recovery planned', landingShip: '', landingTypeLabel: 'None', isAttempt: false, downrange: null };

        const attempt = landing.attempt;
        const success = landing.success;
        const type = landing.type && landing.type.name;     // e.g. "Autonomous Spaceport Drone Ship"
        const typeAbbrev = landing.type && landing.type.abbrev;  // e.g. "ASDS"
        const shipName = landing.location && landing.location.name;  // e.g. "Of Course I Still Love You"
        const shipAbbrev = landing.location && landing.location.abbrev;
        const downrange = landing.downrange_distance;

        if (!attempt) {
            return { landingType: 'No landing attempt', landingShip: '', landingTypeLabel: typeAbbrev || 'Expendable', isAttempt: false, downrange };
        }

        let label;
        if (success === true) label = 'Recovered';
        else if (success === false) label = 'Failed';
        else label = 'Landing attempt';   // success === null (即将进行)

        const displayType = typeAbbrev ? `${typeAbbrev}` : (type || 'Landing');
        const displayShip = shipAbbrev ? shipAbbrev : (shipName || '');

        return {
            landingType: displayType,
            landingShip: displayShip,
            landingTypeLabel: label,
            isAttempt: true,
            downrange
        };
    }

    function getRocketSpecs(launch) {
        const config = launch.rocket && launch.rocket.configuration;
        if (!config) return {};
        return {
            length: config.length ? `${config.length} m` : null,
            diameter: config.diameter ? `${config.diameter} m` : null,
            leoCapacity: config.leo_capacity ? `${config.leo_capacity} kg` : null,
            stages: config.stages,
            reusable: config.reusable
        };
    }

    function getMissionDescription(launch) {
        if (launch.mission && launch.mission.description) return launch.mission.description;
        if (launch.mission && launch.mission.name) {
            // 仅在调用方未传入 i18n 时使用英文 fallback（该函数历史返回值不直接展示给用户，
            // 调用方会用 mission.description || t('drawer.mission_desc_fallback')）
            return `${launch.mission.name} mission — details TBD.`;
        }
        return t('drawer.mission_desc_fallback');
    }

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function escapeAttr(str) {
        return escapeHtml(str).replace(/"/g, '&quot;');
    }

    // ---------- 渲染 ----------
    function renderLaunchCard(launch, idx, tab, launchId) {
        const isHistory = tab === 'previous';
        const missionName = launch.name || 'SpaceX Mission';
        const netTime = launch.net;
        const localCST = formatLocalTime(netTime);
        const statusName = (launch.status && launch.status.name) || 'Updating';
        const statusAbbrev = (launch.status && launch.status.abbrev) || '';
        const statusClass = getStatusClass(statusAbbrev);
        const launchResultClass = getLaunchResultClass(launch);
        const countdown = getCountdown(netTime);
        const countdownText = formatCountdownText(countdown);
        const provider = (launch.launch_service_provider && launch.launch_service_provider.name) || 'SpaceX';
        const padName = (launch.pad && launch.pad.name) || 'Pad TBC';
        const locationName = (launch.pad && launch.pad.location && launch.pad.location.name) || '';
        const fullPad = padName + (locationName ? ` · ${locationName}` : '');

        const coreSerial = getCoreSerial(launch);
        const coreInfo = getCoreInfo(launch);
        const recovery = getRecoveryInfo(launch);
        const landingBadge = isHistory ? getLandingBadgeInfo(recovery) : null;
        const missionDesc = getMissionDescription(launch);
        const specs = getRocketSpecs(launch);
        const rocketName = (launch.rocket && launch.rocket.configuration && (launch.rocket.configuration.full_name || launch.rocket.configuration.name)) || 'Falcon 9';

        // 飞行履历标签：复用次数 / 全新
        let flightTag = '';
        if (coreInfo.reused !== undefined) {
            if (coreInfo.reused) {
                const nth = coreInfo.thisFlight ? `#${coreInfo.thisFlight}` : '';
                flightTag = t('card.reused_n', { n: nth }).trim();
            } else {
                flightTag = t('card.brand_new');
            }
        }

        // 芯级详情行（仅在有数据时显示）
        let coreDetailLine = '';
        if (coreInfo.flights !== undefined && coreInfo.flights !== null) {
            coreDetailLine = t('card.prior_flights', { n: coreInfo.flights });
        }

        let specsLine = '';
        const specParts = [];
        if (specs.length) specParts.push(specs.length);
        if (specs.diameter) specParts.push(`Ø ${specs.diameter}`);
        if (specs.leoCapacity) specParts.push(`LEO ${specs.leoCapacity}`);
        specsLine = specParts.join(' · ');

        // 回收区文案
        let recoveryBody = '';
        if (recovery.isAttempt) {
            const parts = [];
            if (recovery.landingType) parts.push(recovery.landingType);
            if (recovery.landingShip) parts.push(recovery.landingShip);
            if (recovery.downrange) parts.push(`${recovery.downrange} km`);
            recoveryBody = parts.join(' · ') || t('card.landing_attempt');
        } else {
            recoveryBody = recovery.landingType || t('card.no_recovery_planned');
        }

        const cardId = `card-${idx}-${Date.now()}`;
        const indexLabel = String(idx + 1).padStart(2, '0');

        // 顶部徽章：upcoming 用状态徽章，history 用发射结果徽章
        const topBadgeClass = isHistory ? launchResultClass : statusClass;

        // 时间块：upcoming 显示倒计时；history 移除倒计时改为「发射时间 + 着陆结果徽章」
        let timeBlockHtml;
        if (isHistory) {
            timeBlockHtml = `
                    <div class="countdown-block">
                        <div class="countdown-label">${t('card.launch_time')}</div>
                        <div class="countdown-timer">${localCST}</div>
                        <div class="local-time">
                            <span class="label">${t('card.recovery_label')}</span>
                            <span class="status-badge ${landingBadge.class}">${escapeHtml(landingBadge.label)}</span>
                        </div>
                    </div>`;
        } else {
            timeBlockHtml = `
                    <div class="countdown-block">
                        <div class="countdown-label">${t('card.countdown')}</div>
                        <div class="countdown-timer${countdown.isPast ? ' past' : ''}" id="timer-${cardId}">${countdownText}</div>
                        <div class="local-time">
                            <span class="label">${t('card.net_label')}</span>
                            <span>${localCST} · UTC+8</span>
                        </div>
                    </div>`;
        }

        return `
            <article class="launch-card" data-net="${escapeAttr(netTime || '')}" data-launch-id="${escapeAttr(launchId || '')}" tabindex="0">
                <div class="card-top">
                    <div class="mission-index">${t('card.mission_index', { n: indexLabel })}</div>
                    <div class="mission-line">
                        <div class="mission-name">${escapeHtml(missionName)}</div>
                        <span class="status-badge ${topBadgeClass}">${escapeHtml(statusName)}</span>
                    </div>
                </div>
                <div class="card-body">
                    ${timeBlockHtml}

                    <div class="details">
                        <div class="detail-row">
                            <span class="detail-label">${t('card.rocket')}</span>
                            <span class="detail-value">${escapeHtml(rocketName)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">${t('card.core')}</span>
                            <span class="detail-value ${coreSerial === 'TBD' ? 'muted' : ''}">${escapeHtml(coreSerial === 'TBD' ? t('card.tbd') : coreSerial)}${coreDetailLine ? ` <span style="color:var(--text-muted)">· ${escapeHtml(coreDetailLine)}</span>` : ''}</span>
                        </div>
                        ${flightTag ? `
                        <div class="detail-row">
                            <span class="detail-label">${t('card.stage')}</span>
                            <span class="detail-value"><span class="tag">${escapeHtml(flightTag)}</span></span>
                        </div>` : ''}
                        <div class="detail-row">
                            <span class="detail-label">${t('card.pad')}</span>
                            <span class="detail-value" title="${escapeAttr(fullPad)}">${escapeHtml(fullPad)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">${t('card.operator')}</span>
                            <span class="detail-value">${escapeHtml(provider)}</span>
                        </div>
                        ${specsLine ? `
                        <div class="detail-row">
                            <span class="detail-label">${t('card.specs')}</span>
                            <span class="detail-value">${escapeHtml(specsLine)}</span>
                        </div>` : ''}
                    </div>

                    <div class="recovery">
                        <div class="recovery-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                                <path d="M21 3v6h-6"/>
                            </svg>
                        </div>
                        <div class="recovery-text">
                            <strong>Recovery · ${escapeHtml(recovery.landingTypeLabel)}</strong>
                            ${escapeHtml(recoveryBody)}
                        </div>
                    </div>

                    <p class="description">${escapeHtml(missionDesc)}</p>
                </div>
            </article>
        `;
    }

    function updateAllCountdowns() {
        const cards = document.querySelectorAll('.launch-card');
        cards.forEach(card => {
            const netAttr = card.getAttribute('data-net');
            if (!netAttr) return;
            const countdown = getCountdown(netAttr);
            const timerDiv = card.querySelector('.countdown-timer');
            if (timerDiv) {
                timerDiv.innerText = formatCountdownText(countdown);
                if (countdown.isPast) timerDiv.classList.add('past');
                else timerDiv.classList.remove('past');
            }
        });
    }

    let globalInterval = null;
    function startGlobalCountdownUpdater() {
        if (globalInterval) clearInterval(globalInterval);
        globalInterval = setInterval(updateAllCountdowns, 1000);
    }
    function stopGlobalUpdater() {
        if (globalInterval) { clearInterval(globalInterval); globalInterval = null; }
    }

    // ---------- 数据 ----------
    async function fetchLaunches(tab = currentTab, force = false) {
        const cacheKey = getCacheKey(tab);
        const apiBase = getApiBase(tab);
        if (!force) {
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const { timestamp, data } = JSON.parse(cached);
                    if (Date.now() - timestamp < CACHE_DURATION) return data;
                } catch (e) {}
            }
        }
        const url = `${apiBase}${SEARCH_PARAMS}`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const json = await response.json();
            const launches = json.results || [];
            localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: launches }));
            return launches;
        } catch (err) {
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const { data } = JSON.parse(cached);
                    return data;
                } catch (e) {}
            }
            throw err;
        }
    }

    function updateStats(launchCount, totalCount = null, tab = currentTab, isFromCache = false) {
        const statsDiv = document.getElementById('statsInfo');
        if (!statsDiv) return;
        const now = new Date();
        const timeStr = now.toLocaleTimeString(currentLang === 'en' ? 'en-US' : 'zh-CN', { hour12: false });
        const cacheFlag = isFromCache ? t('stats.cached') : '';
        const labelKey = tab === 'upcoming' ? 'stats.upcoming_suffix' : 'stats.history_suffix';
        const label = t(labelKey);
        // 当 totalCount 提供且与 launchCount 不同时，显示 "Showing X of Y"
        const showingPart = (totalCount !== null && totalCount !== launchCount)
            ? t('stats.showing', { x: `<span class="count">${launchCount}</span>`, y: `<span class="count">${totalCount}</span>` })
            : `<span class="count">${launchCount}</span> ${label}`;
        statsDiv.innerHTML = `
            <span class="live-dot"></span>
            <span>${showingPart}</span>
            <span class="sep"></span>
            <span style="color:var(--text-tertiary);font-variant-numeric:tabular-nums">${timeStr}${cacheFlag}</span>
        `;
    }

    async function renderLaunches(forceRefresh = false, tab = currentTab) {
        const container = document.getElementById('launchContainer');
        if (!container) return;
        container.innerHTML = '<div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>';
        try {
            let launches = await fetchLaunches(tab, forceRefresh);
            if (!launches || launches.length === 0) {
                const msg = tab === 'upcoming'
                    ? t('empty.no_upcoming')
                    : t('empty.no_history');
                container.innerHTML = `<div class="error-message">${msg}</div>`;
                updateStats(0, 0, tab, false);
                updateTabCount(tab, 0);
                rawLaunchesPerTab[tab] = [];
                populateFilterDropdowns(tab);
                return;
            }

            let displayLaunches;
            if (tab === 'upcoming') {
                const now = new Date();
                displayLaunches = launches.filter(launch => {
                    if (!launch.net) return false;
                    try { return new Date(launch.net) > now; } catch(e) { return false; }
                }).slice(0, 30);
            } else {
                // 历史发射：previous API 已按时间倒序返回，直接取前 30
                displayLaunches = launches.slice(0, 30);
            }

            // 缓存原始 launches（供客户端筛选使用）
            rawLaunchesPerTab[tab] = displayLaunches;

            // 强制刷新时重置筛选状态（需求 6：刷新数据后重置）
            if (forceRefresh) {
                filterStatePerTab[tab] = { search: '', pad: '', rocket: '', orbit: '' };
            }

            if (displayLaunches.length === 0) {
                const msg = tab === 'upcoming'
                    ? t('empty.no_imminent')
                    : t('empty.no_history_avail');
                container.innerHTML = `<div class="error-message">${msg}</div>`;
                updateStats(0, 0, tab, false);
                updateTabCount(tab, 0);
                populateFilterDropdowns(tab);
                return;
            }

            // 数据加载完成后动态构建下拉选项（去重 + 计数）
            populateFilterDropdowns(tab);

            const cacheKey = getCacheKey(tab);
            const cachedRaw = localStorage.getItem(cacheKey);
            let isCached = false;
            if (cachedRaw && !forceRefresh) {
                const { timestamp } = JSON.parse(cachedRaw);
                if (Date.now() - timestamp < CACHE_DURATION) isCached = true;
            }
            // 渲染筛选后的卡片（应用当前 tab 的筛选状态；首次加载若无筛选则全量显示）
            renderFilteredCards(tab);
            // 把缓存标记同步到 stats
            if (isCached) {
                const statsDiv = document.getElementById('statsInfo');
                if (statsDiv) {
                    const cacheSpan = statsDiv.querySelector('span[style]');
                    if (cacheSpan && !cacheSpan.textContent.includes('cached')) {
                        cacheSpan.textContent = cacheSpan.textContent + ' · cached';
                    }
                }
            }
            updateTabCount(tab, displayLaunches.length);
        } catch (err) {
            container.innerHTML = `<div class="error-message">${t('error.load_failed', { msg: escapeHtml(err.message) })}</div>`;
            updateStats(0, 0, tab, false);
        }
    }

    async function forceRefreshHandler() {
        const btn = document.getElementById('forceRefreshBtn');
        if (btn) {
            btn.disabled = true;
        }
        try {
            // forceRefresh=true 会重置当前 tab 的筛选状态
            await renderLaunches(true, currentTab);
        } finally {
            if (btn) {
                btn.disabled = false;
            }
        }
    }

    // 切换 tab：更新激活态、清空倒计时、保留各 tab 自己的筛选状态后重新渲染
    async function switchTab(tab) {
        if (tab === currentTab) return;
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            const active = btn.dataset.tab === tab;
            btn.classList.toggle('active', active);
            btn.setAttribute('aria-selected', active ? 'true' : 'false');
        });
        stopGlobalUpdater();
        // 若目标 tab 已有缓存数据，则保留筛选状态，直接复用渲染（避免触发 API）
        if (rawLaunchesPerTab[tab] && rawLaunchesPerTab[tab].length > 0) {
            populateFilterDropdowns(tab);
            renderFilteredCards(tab);
        } else {
            await renderLaunches(false, tab);
        }
    }

    function init() {
        // 应用 i18n：把所有 [data-i18n] / [data-i18n-placeholder] 静态文案按 localStorage 偏好刷新
        applyI18n();
        renderLaunches(false, 'upcoming');
        const refreshBtn = document.getElementById('forceRefreshBtn');
        if (refreshBtn) refreshBtn.addEventListener('click', forceRefreshHandler);
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        // 语言切换按钮
        const langBtn = document.getElementById('langToggleBtn');
        if (langBtn) langBtn.addEventListener('click', toggleLanguage);
        // 绑定筛选栏事件（搜索 debounce / 下拉 change / 重置）
        attachFilterListeners();
        // 绑定详情抽屉事件（ESC / 遮罩 / 关闭按钮 / 卡片点击 + 回车）
        attachDrawerListeners();
        // 后台预取两个 tab 的缓存，切换时即时可用
        setInterval(() => {
            fetchLaunches('upcoming', true).catch(e => console.warn('Upcoming prefetch failed', e));
            fetchLaunches('previous', true).catch(e => console.warn('Previous prefetch failed', e));
        }, 12 * 60 * 1000);
    }

    init();
</script>
</body>
</html>
