<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宠物乐园 · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF6EC;--bg2:#FFEDD9;--surface:#FFFFFF;--ink:#3D2E1F;--muted:#A89580;
  --rule:#F0E4D2;--accent:#FF8C42;--accent-dark:#E06D1F;--accent-soft:#FFE0C7;
  --green:#6BCB77;--green-soft:#D4F4D4;--blue:#5BBFE0;--blue-soft:#D6EEF7;
  --pink:#FF8FA3;--pink-soft:#FFE0E6;--gold:#FFB938;--purple:#A78BFA;--purple-soft:#EDE5FE;
  --shadow:0 4px 20px rgba(180,120,40,.10);--shadow-lg:0 12px 40px rgba(180,120,40,.15);
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#FFE8D0 0%,#FFF6EC 40%,#E8F5E9 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:var(--ink);overflow-x:hidden}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(60px);z-index:0;pointer-events:none}
body::before{width:300px;height:300px;background:rgba(255,140,66,.15);top:-80px;left:-80px}
body::after{width:280px;height:280px;background:rgba(107,203,119,.15);bottom:-60px;right:-60px}
h1,h2,h3,h4{font-family:'ZCOOL KuaiLe','Noto Sans SC',sans-serif;font-weight:400}

/* PHONE */
.phone{position:relative;width:390px;height:780px;background:var(--bg);border-radius:44px;box-shadow:0 0 0 10px #2D2419,0 0 0 12px #443728,var(--shadow-lg);overflow:hidden;z-index:1;display:flex;flex-direction:column}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:28px;background:#2D2419;border-radius:0 0 18px 18px;z-index:100}
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:10px 28px 4px;font-size:13px;font-weight:700;flex-shrink:0}
.statusbar .icons{display:flex;gap:5px;align-items:center}
.statusbar .icons svg{width:14px;height:14px}

/* SCREENS */
.screens{flex:1;position:relative;overflow:hidden;min-height:0}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-y}
.screen::-webkit-scrollbar{display:none}
.screen.active{display:flex;animation:slideIn .35s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.screen.back{animation:slideBack .35s ease}
@keyframes slideBack{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}

/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 10px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo .paw{font-size:22px}
.logo .name{font-family:'ZCOOL KuaiLe',sans-serif;font-size:20px}
.header-back{border:none;background:var(--bg2);width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer;font-family:inherit;color:var(--ink)}
.points-pill{display:flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;padding:5px 12px;border-radius:20px;font-size:14px;font-weight:700;box-shadow:0 2px 10px rgba(255,185,56,.3)}

/* TABBAR */
.tabbar{position:sticky;bottom:0;left:0;right:0;height:72px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid var(--rule);display:flex;padding:8px 0 16px;z-index:50;flex-shrink:0;margin-top:auto}
.tab{flex:1;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:inherit;transition:all .2s}
.tab .t-icon{font-size:22px;transition:transform .2s}
.tab .t-label{font-size:11px;font-weight:600;color:var(--muted)}
.tab.active .t-icon{transform:translateY(-2px) scale(1.1)}
.tab.active .t-label{color:var(--accent);font-weight:700}

/* CONTENT */
.content{padding:4px 16px 14px}

/* SECTIONS */
.sec-title{display:flex;align-items:center;gap:8px;margin:14px 0 10px}
.sec-title h3{font-size:17px}
.sec-title .bar{width:4px;height:18px;background:var(--accent);border-radius:3px}
.sec-title .count{margin-left:auto;font-size:12px;color:var(--muted);background:var(--bg2);padding:2px 10px;border-radius:10px}

/* CARDS */
.card{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;transition:transform .2s}
.card:active{transform:scale(.98)}
.task-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.task-icon.study{background:var(--accent-soft)}
.task-icon.chore{background:var(--green-soft)}
.task-icon.habit{background:var(--blue-soft)}
.task-info{flex:1;min-width:0}
.task-info .t-name{font-size:15px;font-weight:700}
.task-info .t-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
.task-info .t-meta .pts{color:var(--accent);font-weight:700}
.task-info .t-meta .cat{background:var(--bg2);padding:1px 7px;border-radius:6px}
.task-action{flex-shrink:0;border:none;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.task-action.checkin{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(255,140,66,.3)}
.task-action.checkin:active{transform:scale(.93)}
.task-action.confirm{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(107,203,119,.3)}
.task-action.confirm:active{transform:scale(.93)}
.task-status{flex-shrink:0;font-size:12px;font-weight:700;padding:6px 12px;border-radius:10px}
.task-status.submitted{background:var(--gold);color:#fff}
.task-status.confirmed{background:var(--green-soft);color:var(--green)}
.task-status.done{background:var(--bg2);color:var(--muted)}

/* ADD FORM */
.add-task-btn{width:100%;border:2px dashed var(--rule);background:transparent;border-radius:14px;padding:14px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:10px}
.add-task-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.add-form{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow);animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.add-form .field{margin-bottom:12px}
.add-form label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
.add-form input,.add-form select{width:100%;border:2px solid var(--rule);border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s}
.add-form input:focus,.add-form select:focus{border-color:var(--accent)}
.cat-chips{display:flex;gap:8px}
.cat-chip{flex:1;border:2px solid var(--rule);background:var(--bg);border-radius:10px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;color:var(--muted);transition:all .2s}
.cat-chip.selected{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-dark)}
.form-actions{display:flex;gap:10px;margin-top:4px}
.form-actions button{flex:1;border:none;border-radius:10px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.form-actions .cancel{background:var(--bg2);color:var(--muted)}
.form-actions .submit{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(255,140,66,.3)}

/* PET */
.pet-stage{background:linear-gradient(180deg,#E8F5FF 0%,#FFF6EC 100%);border-radius:20px;padding:20px 16px 16px;text-align:center;position:relative;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.pet-stage::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:160px;height:30px;background:radial-gradient(ellipse,rgba(0,0,0,.06),transparent 70%);border-radius:50%}
.pet-name-tag{display:inline-block;background:rgba(255,255,255,.8);padding:3px 14px;border-radius:14px;font-size:13px;font-weight:700;margin-bottom:6px}
.pet-level{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:4px}
.pet-svg-wrap{position:relative;width:160px;height:160px;margin:0 auto}
.pet-svg{width:100%;height:100%;animation:petFloat 3s ease-in-out infinite}
@keyframes petFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.pet-svg-wrap.bounce .pet-svg{animation:petBounce .5s ease}
@keyframes petBounce{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-20px) scale(1.08)}60%{transform:translateY(0) scale(.95)}}
.sparkle{position:absolute;font-size:18px;pointer-events:none;animation:sparkleFly .8s ease-out forwards}
@keyframes sparkleFly{0%{opacity:1;transform:translate(0,0) scale(.5)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.2)}}
.exp-bar-wrap{margin:10px auto 0;max-width:200px}
.exp-bar{height:8px;background:var(--bg2);border-radius:5px;overflow:hidden}
.exp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));border-radius:5px;transition:width .5s ease}
.exp-text{font-size:11px;color:var(--muted);margin-top:3px}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
.stat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.stat-head .label{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700}
.stat-head .val{font-size:13px;font-weight:700}
.stat-bar{height:8px;border-radius:5px;overflow:hidden;background:var(--bg2)}
.stat-fill{height:100%;border-radius:5px;transition:width .5s ease}
.stat-fill.hunger{background:linear-gradient(90deg,var(--accent),var(--gold))}
.stat-fill.clean{background:linear-gradient(90deg,var(--blue),#7DD3F0)}
.stat-fill.mood{background:linear-gradient(90deg,var(--pink),#FFB5C7)}

.actions-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.action-btn{border:none;background:var(--surface);border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;font-family:inherit;box-shadow:var(--shadow);transition:all .2s;position:relative;overflow:hidden}
.action-btn:active{transform:scale(.95)}
.action-btn:disabled{opacity:.45}
.action-btn .a-icon{font-size:28px;display:block;margin-bottom:4px}
.action-btn .a-name{font-size:13px;font-weight:700}
.action-btn .a-cost{font-size:11px;color:var(--muted);margin-top:2px}
.action-btn.feed:hover{background:var(--accent-soft)}
.action-btn.clean:hover{background:var(--blue-soft)}
.action-btn.play:hover{background:var(--pink-soft)}

/* TOAST */
.toast-container{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:rgba(61,46,31,.92);color:#fff;padding:10px 20px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:toastIn .3s ease,toastOut .3s ease 1.7s forwards;white-space:nowrap}
.toast.success{background:rgba(107,203,119,.95)}
.toast.warn{background:rgba(255,140,66,.95)}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-12px) scale(.9)}}

.pts-float{position:absolute;font-size:16px;font-weight:900;color:var(--gold);pointer-events:none;animation:ptsFloat 1s ease-out forwards;z-index:60}
@keyframes ptsFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}

/* ===== LOGIN SCREEN ===== */
.login-screen{justify-content:center;align-items:center;text-align:center;padding:40px 30px;background:linear-gradient(180deg,#FFE8D0 0%,#FFF6EC 50%,#E8F5E9 100%)}
.login-logo{font-size:64px;margin-bottom:8px;animation:petFloat 3s ease-in-out infinite}
.login-title{font-family:'ZCOOL KuaiLe',sans-serif;font-size:36px;color:var(--ink);margin-bottom:6px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:40px;line-height:1.6}
.wx-login-btn{width:100%;max-width:280px;border:none;background:#07C160;color:#fff;padding:14px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(7,193,96,.3);transition:transform .2s}
.wx-login-btn:active{transform:scale(.97)}
.wx-login-btn .wx-icon{font-size:20px}
.login-tip{font-size:12px;color:var(--muted);margin-top:16px}

/* ===== ROLE SELECT ===== */
.role-screen{padding:30px 24px}
.role-screen .rs-title{text-align:center;font-size:24px;margin-bottom:6px}
.role-screen .rs-sub{text-align:center;font-size:14px;color:var(--muted);margin-bottom:30px}
.role-options{display:flex;flex-direction:column;gap:16px}
.role-option{background:var(--surface);border:3px solid var(--rule);border-radius:20px;padding:24px 20px;text-align:center;cursor:pointer;transition:all .25s;font-family:inherit}
.role-option:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.role-option .ro-icon{font-size:48px;margin-bottom:10px}
.role-option .ro-name{font-size:18px;font-weight:700;margin-bottom:4px}
.role-option .ro-desc{font-size:13px;color:var(--muted);line-height:1.5}

/* ===== FAMILY BINDING ===== */
.family-screen{padding:24px}
.fs-title{text-align:center;font-size:22px;margin-bottom:6px}
.fs-sub{text-align:center;font-size:14px;color:var(--muted);margin-bottom:24px}
.invite-card{background:var(--surface);border-radius:20px;padding:24px;text-align:center;box-shadow:var(--shadow);margin-bottom:16px}
.invite-card .ic-label{font-size:13px;color:var(--muted);margin-bottom:10px}
.invite-code-box{background:var(--bg2);border:2px dashed var(--accent);border-radius:14px;padding:16px;margin-bottom:14px}
.invite-code-box .code{font-size:32px;font-weight:900;letter-spacing:8px;color:var(--accent);font-family:'ZCOOL KuaiLe',sans-serif}
.invite-code-box .hint{font-size:11px;color:var(--muted);margin-top:6px}
.copy-btn{border:none;background:var(--accent);color:#fff;padding:8px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.code-input{width:100%;border:2px solid var(--rule);border-radius:12px;padding:14px;font-size:20px;text-align:center;letter-spacing:6px;font-family:'ZCOOL KuaiLe',sans-serif;color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s}
.code-input:focus{border-color:var(--accent)}
.join-btn{width:100%;border:none;background:var(--accent);color:#fff;padding:14px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;box-shadow:0 4px 16px rgba(255,140,66,.3);transition:transform .2s}
.join-btn:active{transform:scale(.97)}
.family-info{background:var(--surface);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
.family-info .fi-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--rule)}
.family-info .fi-row:last-child{border-bottom:none}
.family-info .fi-label{font-size:13px;color:var(--muted)}
.family-info .fi-val{font-size:14px;font-weight:700}

/* ===== HOME DASHBOARD ===== */
.home-hero{background:linear-gradient(135deg,var(--accent),var(--gold));border-radius:20px;padding:20px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
.home-hero::after{content:'';position:absolute;right:-20px;bottom:-20px;width:100px;height:100px;background:rgba(255,255,255,.1);border-radius:50%}
.home-hero .hh-greeting{font-size:14px;opacity:.9;margin-bottom:4px}
.home-hero .hh-name{font-size:22px;font-weight:700;margin-bottom:12px}
.home-hero .hh-stats{display:flex;gap:16px}
.home-hero .hh-stat .num{font-size:24px;font-weight:900;font-family:'ZCOOL KuaiLe',sans-serif}
.home-hero .hh-stat .lbl{font-size:11px;opacity:.85}

.home-pet-mini{background:var(--surface);border-radius:16px;padding:14px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);margin-bottom:14px;cursor:pointer;transition:transform .2s}
.home-pet-mini:active{transform:scale(.98)}
.home-pet-mini .hpm-avatar{width:56px;height:56px;border-radius:16px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.home-pet-mini .hpm-info{flex:1}
.home-pet-mini .hpm-name{font-size:15px;font-weight:700}
.home-pet-mini .hpm-status{font-size:12px;color:var(--muted);margin-top:2px}
.home-pet-mini .hpm-bars{display:flex;gap:6px;margin-top:6px}
.home-pet-mini .hpm-bar{width:36px;height:5px;border-radius:3px;overflow:hidden;background:var(--bg2)}
.home-pet-mini .hpm-bar div{height:100%;border-radius:3px}
.home-pet-mini .hpm-arrow{font-size:18px;color:var(--muted)}

.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.quick-card{background:var(--surface);border-radius:14px;padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s;text-align:center}
.quick-card:active{transform:scale(.97)}
.quick-card .qc-icon{font-size:28px;margin-bottom:6px}
.quick-card .qc-name{font-size:13px;font-weight:700}
.quick-card .qc-sub{font-size:11px;color:var(--muted);margin-top:2px}

.task-preview{background:var(--surface);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:14px}
.task-preview .tp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.task-preview .tp-head h3{font-size:15px}
.task-preview .tp-more{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}

/* ===== PET ADOPTION ===== */
.adopt-screen{padding:20px 16px}
.adopt-title{text-align:center;font-size:22px;margin-bottom:6px}
.adopt-sub{text-align:center;font-size:14px;color:var(--muted);margin-bottom:20px}
.pet-choices{display:flex;flex-direction:column;gap:14px}
.pet-choice{background:var(--surface);border:3px solid var(--rule);border-radius:20px;padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .25s;font-family:inherit;text-align:left}
.pet-choice:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.pet-choice.selected{border-color:var(--accent);background:var(--accent-soft)}
.pet-choice .pc-avatar{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pet-choice .pc-info{flex:1}
.pet-choice .pc-name{font-size:17px;font-weight:700;margin-bottom:2px}
.pet-choice .pc-desc{font-size:12px;color:var(--muted);line-height:1.5}
.adopt-btn{width:100%;border:none;background:var(--accent);color:#fff;padding:14px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:16px;box-shadow:0 4px 16px rgba(255,140,66,.3);transition:transform .2s}
.adopt-btn:active{transform:scale(.97)}
.adopt-btn:disabled{opacity:.5}

/* ===== PROFILE ===== */
.profile-header{background:linear-gradient(135deg,var(--accent),var(--gold));border-radius:0 0 24px 24px;padding:20px;text-align:center;color:#fff;margin-bottom:14px}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 8px}
.profile-name{font-size:18px;font-weight:700}
.profile-role{font-size:12px;opacity:.85;margin-top:2px}
.profile-stats{display:flex;justify-content:center;gap:24px;margin-top:14px}
.profile-stats .ps-stat{text-align:center}
.profile-stats .ps-num{font-size:20px;font-weight:900;font-family:'ZCOOL KuaiLe',sans-serif}
.profile-stats .ps-lbl{font-size:11px;opacity:.85}

.profile-section{background:var(--surface);border-radius:16px;padding:4px 0;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.profile-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--rule);cursor:pointer;transition:background .2s}
.profile-item:last-child{border-bottom:none}
.profile-item:hover{background:var(--bg2)}
.profile-item .pi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.profile-item .pi-label{flex:1;font-size:14px;font-weight:600}
.profile-item .pi-val{font-size:13px;color:var(--muted)}
.profile-item .pi-arrow{color:var(--muted)}

.achievement-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.ach-card{background:var(--surface);border-radius:14px;padding:14px 8px;text-align:center;box-shadow:var(--shadow)}
.ach-card.locked{opacity:.4}
.ach-card .ac-icon{font-size:28px;margin-bottom:4px}
.ach-card .ac-name{font-size:11px;font-weight:600;color:var(--ink)}
.ach-card .ac-desc{font-size:10px;color:var(--muted);margin-top:2px}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .e-icon{font-size:42px;margin-bottom:10px;opacity:.5}
.empty p{font-size:14px}

/* GUIDE */
.guide-card{background:linear-gradient(135deg,var(--accent-soft),var(--green-soft));border-radius:14px;padding:12px 16px;margin-bottom:14px;font-size:12px;line-height:1.6;display:flex;gap:10px;align-items:flex-start}
.guide-card .g-icon{font-size:20px;flex-shrink:0}
.guide-card strong{color:var(--accent-dark)}

/* MODAL */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;padding:30px}
.modal-overlay.active{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:20px;padding:24px;max-width:300px;width:100%;text-align:center;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.modal .m-icon{font-size:48px;margin-bottom:10px}
.modal .m-title{font-size:18px;font-weight:700;margin-bottom:8px}
.modal .m-text{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px}
.modal .m-btn{width:100%;border:none;background:var(--accent);color:#fff;padding:12px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

@media (max-height:820px){.phone{transform:scale(.92);transform-origin:center}}
@media (max-width:430px){body{padding:0}.phone{width:100vw;height:100vh;border-radius:0;box-shadow:none}.notch{display:none}}
</style>
</head>

<script>
// ===== STATE =====
var S = {
  loggedIn: false,
  role: null,
  familyJoined: false,
  currentScreen: 'login',
  mainTab: 'home',
  points: 0,
  selectedCat: 'study',
  selectedPet: null,
  petAdopted: false,
  tasks: [
    {id:1,name:'完成数学作业',cat:'study',catLabel:'学习',icon:'📚',pts:10,status:'todo'},
    {id:2,name:'阅读30分钟',cat:'study',catLabel:'学习',icon:'📖',pts:8,status:'todo'},
    {id:3,name:'整理书桌',cat:'chore',catLabel:'家务',icon:'🧹',pts:5,status:'todo'},
    {id:4,name:'早起刷牙',cat:'habit',catLabel:'习惯',icon:'🌱',pts:3,status:'todo'},
    {id:5,name:'洗碗',cat:'chore',catLabel:'家务',icon:'🍽️',pts:6,status:'todo'},
    {id:6,name:'运动20分钟',cat:'habit',catLabel:'习惯',icon:'⚽',pts:7,status:'todo'}
  ],
  pet: {name:'橘子',type:'cat',hunger:60,clean:70,mood:65,level:1,exp:0,expMax:100},
  stats: {tasksDone:0, totalPoints:0, petCareCount:0, streak:1},
  achievements: [
    {icon:'🎯',name:'初次打卡',desc:'完成第一个任务',unlocked:false},
    {icon:'🪙',name:'积少成多',desc:'累计50积分',unlocked:false},
    {icon:'🍖',name:'爱心喂养',desc:'喂食5次',unlocked:false},
    {icon:'⭐',name:'升级达人',desc:'宠物升到3级',unlocked:false},
    {icon:'🔥',name:'坚持一周',desc:'连续打卡7天',unlocked:false},
    {icon:'👑',name:'满级宠物',desc:'宠物升到5级',unlocked:false}
  ]
};
var nextTaskId = 7;

var PET_TYPES = {
  cat: {name:'橘子猫',emoji:'🐱',color:'#FF9F43',bg:'#FFE0C7',desc:'活泼好动，喜欢被陪伴，心情值增长快'},
  dog: {name:'小金毛',emoji:'🐶',color:'#D4A052',bg:'#FFF0D0',desc:'忠诚温暖，爱吃东西，饱腹度增长快'},
  bunny: {name:'棉花兔',emoji:'🐰',color:'#FF8FA3',bg:'#FFE0E6',desc:'安静可爱，爱干净，清洁度增长快'},
  dragon: {name:'小龙宝',emoji:'🐲',color:'#6BCB77',bg:'#D4F4D4',desc:'稀有神秘，成长快，经验值获取多'}
};

// ===== CLOCK =====
function updateClock(){var d=new Date(),h=d.getHours(),m=d.getMinutes();document.getElementById('clock').textContent=h+':'+(m<10?'0'+m:m)}
updateClock();setInterval(updateClock,30000);

// ===== TOAST =====
function toast(msg,type){var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.innerHTML=msg;c.appendChild(t);setTimeout(function(){t.remove()},2100)}

// ===== MODAL =====
function showModal(icon,title,text,btnText,onClick){
  var ov=document.getElementById('modalOverlay'),box=document.getElementById('modalBox');
  box.innerHTML='<div class="m-icon">'+icon+'</div><div class="m-title">'+title+'</div><div class="m-text">'+text+'</div><button class="m-btn" id="modalBtn">'+btnText+'</button>';
  ov.classList.add('active');
  document.getElementById('modalBtn').onclick=function(){ov.classList.remove('active');if(onClick)onClick()};
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active')}

// ===== SCREEN NAV =====
function showScreen(id,back){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active','back')});
  var el=document.getElementById('screen-'+id);
  el.classList.add('active');
  if(back)el.classList.add('back');
  S.currentScreen=id;
  document.getElementById('screens').scrollTop=0;
}
function goBack(){
  if(S.currentScreen==='family-parent'||S.currentScreen==='family-child')showScreen('role');
  else if(S.currentScreen==='role')showScreen('login');
}

// ===== LOGIN =====
function login(){
  S.loggedIn=true;
  showScreen('role');
}

// ===== ROLE SELECT =====
function selectRole(role){
  S.role=role;
  if(role==='parent')showScreen('family-parent');
  else showScreen('family-child');
  // pre-fill code for demo
  setTimeout(function(){var ci=document.getElementById('codeInput');if(ci)ci.value='PET888'},100);
}

// ===== FAMILY =====
function copyCode(){
  toast('✅ 邀请码已复制！','success');
}
function joinFamily(){
  var code=document.getElementById('codeInput').value.trim().toUpperCase();
  if(code!=='PET888'){toast('⚠️ 邀请码不正确，请输入 PET888','warn');return}
  S.familyJoined=true;
  showModal('🎉','加入成功！','你已加入「快乐之家」家庭\n现在去领养你的专属宠物吧！','去领养宠物 →',function(){
    enterApp('child');
  });
}
function enterApp(role){
  S.role=role;
  S.familyJoined=true;
  // update tab labels and icons
  var tLabels={child:['任务','宠物'],parent:['布置','确认']};
  ['tabTaskLabel','tabTaskLabel2','tabTaskLabel3','tabTaskLabel4'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.textContent=tLabels[role][0];
  });
  ['tabPetLabel','tabPetLabel2','tabPetLabel3','tabPetLabel4'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.textContent=role==='parent'?'确认':'宠物';
  });
  // update third tab icon: parent=✅, child=🐾
  ['tab2Icon','tab2Icon2','tab2Icon3','tab2Icon4'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.textContent=role==='parent'?'✅':'🐾';
  });
  // update pet screen header title for parent
  var petHeader=document.querySelector('#screen-pet .logo .name');
  if(petHeader)petHeader.textContent=role==='parent'?'确认打卡':'我的宠物';
  // show/hide points pill based on role
  ['tasksPointsPill'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display=role==='child'?'flex':'none'});

  S.mainTab='home';
  showScreen('home');
  renderAll();
}

// ===== MAIN TAB =====
function switchMainTab(tab){
  S.mainTab=tab;
  // update tab active states
  var screens=['home','tasks','pet','profile'];
  screens.forEach(function(s){
    var scr=document.getElementById('screen-'+s);
    if(!scr)return;
    var tabs=scr.querySelectorAll('.tab');
    tabs.forEach(function(t){t.classList.remove('active')});
    var idx=screens.indexOf(s);
    if(tabs[tab==='home'?0:tab==='tasks'?1:tab==='pet'?2:3])tabs[tab==='home'?0:tab==='tasks'?1:tab==='pet'?2:3].classList.add('active');
  });
  showScreen(tab);
  renderAll();
}

// ===== TASKS =====
function toggleAddForm(){
  var w=document.getElementById('addFormWrap'),btn=document.getElementById('addTaskBtn');
  if(w.style.display==='none'){w.style.display='block';btn.style.display='none'}
  else{w.style.display='none';btn.style.display='block';document.getElementById('taskNameInput').value=''}
}
function selectCat(el){
  document.querySelectorAll('.cat-chip').forEach(function(c){c.classList.remove('selected')});
  el.classList.add('selected');S.selectedCat=el.dataset.cat;
}
function createTask(){
  var name=document.getElementById('taskNameInput').value.trim();
  var pts=parseInt(document.getElementById('taskPtsInput').value)||5;
  if(!name){toast('⚠️ 请输入任务名称','warn');return}
  var cm={study:{label:'学习',icon:'📚'},chore:{label:'家务',icon:'🧹'},habit:{label:'习惯',icon:'🌱'}};
  var c=cm[S.selectedCat];
  S.tasks.push({id:nextTaskId++,name:name,cat:S.selectedCat,catLabel:c.label,icon:c.icon,pts:pts,status:'todo'});
  toast('✅ 任务已发布！','success');toggleAddForm();renderAll();
}
function checkin(id){
  var t=S.tasks.find(function(x){return x.id===id});if(!t)return;
  t.status='submitted';toast('🎉 打卡成功！等家长确认～','success');renderAll();
}
function confirmTask(id){
  var t=S.tasks.find(function(x){return x.id===id});if(!t)return;
  t.status='confirmed';S.points+=t.pts;S.stats.tasksDone++;S.stats.totalPoints+=t.pts;
  checkAchievements();
  toast('✅ 已确认！孩子获得 '+t.pts+' 积分','success');
  floatPoints('+'+t.pts);renderAll();
}

function floatPoints(text){
  var pill=document.querySelector('#screen-tasks .points-pill')||document.querySelector('#screen-home .points-pill');
  if(!pill)return;
  var rect=pill.getBoundingClientRect(),pr=document.querySelector('.phone').getBoundingClientRect();
  var f=document.createElement('div');f.className='pts-float';f.textContent=text;
  f.style.left=(rect.left-pr.left+rect.width/2)+'px';f.style.top=(rect.top-pr.top+10)+'px';
  document.querySelector('.phone').appendChild(f);
  setTimeout(function(){f.remove()},1000);
}

// ===== PET ADOPTION =====
function selectPet(type){
  S.selectedPet=type;
  document.querySelectorAll('.pet-choice').forEach(function(c){c.classList.remove('selected')});
  document.querySelector('.pet-choice[data-pet="'+type+'"]').classList.add('selected');
  document.getElementById('adoptBtn').disabled=false;
}
function adoptPet(){
  if(!S.selectedPet)return;
  var pt=PET_TYPES[S.selectedPet];
  S.pet.name=pt.name;S.pet.type=S.selectedPet;S.petAdopted=true;
  showModal('🎉','领养成功！','你领养了'+pt.name+'！\n好好照顾它，让它快乐成长吧～','开始照顾 →',function(){
    switchMainTab('pet');
  });
}

// ===== PET CARE =====
function petAction(action){
  if(S.points<5){toast('⚠️ 积分不足！先完成任务赚积分吧','warn');return}
  S.points-=5;S.stats.petCareCount++;
  var p=S.pet,msg='',emoji='';
  var mult=S.selectedPet==='dragon'?1.3:1;
  if(action==='feed'){
    var inc=Math.min(100,p.hunger)-p.hunger;p.hunger=Math.min(100,p.hunger+Math.round(25*mult));p.mood=Math.min(100,p.mood+5);
    p.exp+=Math.round(15*mult);msg='🍖 好吃！饱腹度 +'+Math.round(25*mult);spawnSparkle('🍖');
  }else if(action==='clean'){
    p.clean=Math.min(100,p.clean+Math.round(30*mult));p.mood=Math.min(100,p.mood+5);
    p.exp+=Math.round(15*mult);msg='🛁 好干净！清洁度 +'+Math.round(30*mult);spawnSparkle('🫧');
  }else if(action==='play'){
    p.mood=Math.min(100,p.mood+Math.round(30*mult));p.hunger=Math.max(0,p.hunger-5);
    p.exp+=Math.round(20*mult);msg='🎾 好开心！心情值 +'+Math.round(30*mult);spawnSparkle('✨');
  }
  var w=document.getElementById('petWrap');if(w){w.classList.remove('bounce');void w.offsetWidth;w.classList.add('bounce')}
  checkLevelUp();checkAchievements();
  toast(msg,'success');updatePetExpression();renderAll();
}
function checkLevelUp(){
  var p=S.pet;
  while(p.exp>=p.expMax){p.exp-=p.expMax;p.level++;p.expMax=p.level*100;
    toast('🎉 升级了！现在是 Lv.'+p.level,'success');
    for(var i=0;i<6;i++)setTimeout(function(){spawnSparkle('⭐')},i*100);
  }
}
function spawnSparkle(emoji){
  var w=document.getElementById('petWrap');if(!w)return;
  var s=document.createElement('div');s.className='sparkle';s.textContent=emoji;
  s.style.left='50%';s.style.top='40%';
  var a=Math.random()*Math.PI*2,d=40+Math.random()*40;
  s.style.setProperty('--dx',Math.cos(a)*d+'px');s.style.setProperty('--dy',Math.sin(a)*d-20+'px');
  w.appendChild(s);setTimeout(function(){s.remove()},800);
}
function updatePetExpression(){
  var p=S.pet,m=document.getElementById('petMouth');if(!m)return;
  var avg=(p.hunger+p.clean+p.mood)/3;
  if(avg<30)m.setAttribute('d','M88 142 Q100 132 112 142');
  else if(avg>80)m.setAttribute('d','M84 134 Q100 152 116 134');
  else m.setAttribute('d','M88 138 Q100 148 112 138');
}

function checkAchievements(){
  S.achievements.forEach(function(a){
    if(a.unlocked)return;
    if(a.name==='初次打卡'&&S.stats.tasksDone>=1)a.unlocked=true;
    if(a.name==='积少成多'&&S.stats.totalPoints>=50)a.unlocked=true;
    if(a.name==='爱心喂养'&&S.stats.petCareCount>=5)a.unlocked=true;

    if(a.name==='满级宠物'&&S.pet.level>=5)a.unlocked=true;
  });
}

function getPetSVG(type){
  var colors={cat:'#FF9F43',dog:'#D4A052',bunny:'#FF8FA3',dragon:'#6BCB77'};
  var lightColors={cat:'#FFB870',dog:'#E8C887',bunny:'#FFB5C7',dragon:'#94DCA0'};
  var main=colors[type]||colors.cat,light=lightColors[type]||lightColors.cat;
  // ear shapes vary by type
  var ears='';
  if(type==='cat'){
    ears='<path d="M55 80 Q45 55 60 62 Q68 70 65 85 Z" fill="'+main+'"/><path d="M145 80 Q155 55 140 62 Q132 70 135 85 Z" fill="'+main+'"/><path d="M58 76 Q53 62 61 67 Q65 72 63 80 Z" fill="'+light+'"/><path d="M142 76 Q147 62 139 67 Q135 72 137 80 Z" fill="'+light+'"/>';
  }else if(type==='dog'){
    ears='<ellipse cx="50" cy="85" rx="16" ry="24" fill="'+main+'" transform="rotate(-20 50 85)"/><ellipse cx="150" cy="85" rx="16" ry="24" fill="'+main+'" transform="rotate(20 150 85)"/><ellipse cx="52" cy="85" rx="9" ry="16" fill="'+light+'" transform="rotate(-20 52 85)"/><ellipse cx="148" cy="85" rx="9" ry="16" fill="'+light+'" transform="rotate(20 148 85)"/>';
  }else if(type==='bunny'){
    ears='<ellipse cx="75" cy="55" rx="10" ry="30" fill="'+main+'"/><ellipse cx="125" cy="55" rx="10" ry="30" fill="'+main+'"/><ellipse cx="75" cy="58" rx="5" ry="22" fill="'+light+'"/><ellipse cx="125" cy="58" rx="5" ry="22" fill="'+light+'"/>';
  }else if(type==='dragon'){
    ears='<path d="M50 75 L40 50 L60 65 Z" fill="'+main+'"/><path d="M150 75 L160 50 L140 65 Z" fill="'+main+'"/><path d="M52 73 L44 55 L58 64 Z" fill="'+light+'"/><path d="M148 73 L156 55 L142 64 Z" fill="'+light+'"/><path d="M70 55 L80 45 L90 55 L100 45 L110 55 L120 45 L130 55" stroke="'+main+'" stroke-width="3" fill="none" stroke-linecap="round"/>';
  }
  return '<svg class="pet-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">'+
    '<ellipse cx="100" cy="120" rx="62" ry="55" fill="'+main+'"/>'+
    '<ellipse cx="100" cy="125" rx="42" ry="38" fill="'+light+'"/>'+
    ears+
    '<g id="petEyes"><ellipse cx="78" cy="108" rx="9" ry="11" fill="#3D2E1F"/><ellipse cx="122" cy="108" rx="9" ry="11" fill="#3D2E1F"/><circle cx="81" cy="104" r="3.5" fill="#fff"/><circle cx="125" cy="104" r="3.5" fill="#fff"/></g>'+
    '<path d="M96 128 Q100 124 104 128 Q100 132 96 128Z" fill="#E06D1F"/>'+
    '<path id="petMouth" d="M88 138 Q100 148 112 138" stroke="#3D2E1F" stroke-width="2.5" fill="none" stroke-linecap="round"/>'+
    '<circle cx="62" cy="128" r="8" fill="#FF8FA3" opacity="0.5"/><circle cx="138" cy="128" r="8" fill="#FF8FA3" opacity="0.5"/>'+
    '<ellipse cx="72" cy="168" rx="14" ry="10" fill="'+main+'"/><ellipse cx="128" cy="168" rx="14" ry="10" fill="'+main+'"/>'+
    '</svg>';
}

function renderProfile(){
  var c=document.getElementById('profileContent');if(!c)return;
  var role=S.role;
  var roleName=role==='parent'?'家长':'小朋友';
  var roleIcon=role==='parent'?'👨‍👩‍👧':'🧒';

  var html='';
  // header
  html+='<div class="profile-header"><div class="profile-avatar">'+roleIcon+'</div><div class="profile-name">'+(role==='parent'?'快乐之家':'小朋友')+'</div><div class="profile-role">'+roleName+' · 快乐之家</div>';
  html+='<div class="profile-stats">';
  if(role==='child'){
    html+='<div class="ps-stat"><div class="ps-num">'+S.stats.tasksDone+'</div><div class="ps-lbl">完成任务</div></div>';
    html+='<div class="ps-stat"><div class="ps-num">'+S.points+'</div><div class="ps-lbl">当前积分</div></div>';
    html+='<div class="ps-stat"><div class="ps-num">Lv.'+S.pet.level+'</div><div class="ps-lbl">宠物等级</div></div>';
  }else{
    var total=S.tasks.length,done=S.tasks.filter(function(t){return t.status==='confirmed'}).length;
    html+='<div class="ps-stat"><div class="ps-num">'+total+'</div><div class="ps-lbl">布置任务</div></div>';
    html+='<div class="ps-stat"><div class="ps-num">'+done+'</div><div class="ps-lbl">已完成</div></div>';
    html+='<div class="ps-stat"><div class="ps-num">'+S.stats.totalPoints+'</div><div class="ps-lbl">发放积分</div></div>';
  }
  html+='</div></div>';

  // family info
  html+='<div class="profile-section">';
  html+='<div class="profile-item"><div class="pi-icon" style="background:var(--accent-soft)">🏠</div><div class="pi-label">家庭名称</div><div class="pi-val">快乐之家</div><div class="pi-arrow">›</div></div>';
  html+='<div class="profile-item"><div class="pi-icon" style="background:var(--green-soft)">🔗</div><div class="pi-label">邀请码</div><div class="pi-val">PET888</div><div class="pi-arrow">›</div></div>';
  html+='<div class="profile-item"><div class="pi-icon" style="background:var(--blue-soft)">👥</div><div class="pi-label">家庭成员</div><div class="pi-val">2人</div><div class="pi-arrow">›</div></div>';
  html+='</div>';

  // achievements
  html+='<div class="sec-title"><div class="bar" style="background:var(--gold)"></div><h3>我的成就</h3><span class="count">'+S.achievements.filter(function(a){return a.unlocked}).length+'/'+S.achievements.length+'</span></div>';
  html+='<div class="achievement-grid">';
  S.achievements.forEach(function(a){
    html+='<div class="ach-card'+(a.unlocked?'':' locked')+'"><div class="ac-icon">'+a.icon+'</div><div class="ac-name">'+a.name+'</div><div class="ac-desc">'+a.desc+'</div></div>';
  });
  html+='</div>';

  // stats
  html+='<div class="sec-title"><div class="bar" style="background:var(--purple)"></div><h3>成长数据</h3></div>';
  html+='<div class="profile-section">';
  html+='<div class="profile-item"><div class="pi-icon" style="background:var(--accent-soft)">📋</div><div class="pi-label">累计完成任务</div><div class="pi-val">'+S.stats.tasksDone+' 个</div></div>';
  html+='<div class="profile-item"><div class="pi-icon" style="background:var(--green-soft)">🪙</div><div class="pi-label">累计获得积分</div><div class="pi-val">'+S.stats.totalPoints+' 分</div></div>';
  html+='<div class="profile-item"><div class="pi-icon" style="background:var(--pink-soft)">🐾</div><div class="pi-label">宠物照顾次数</div><div class="pi-val">'+S.stats.petCareCount+' 次</div></div>';
  html+='<div class="profile-item"><div class="pi-icon" style="background:var(--purple-soft)">🔥</div><div class="pi-label">连续打卡</div><div class="pi-val">'+S.stats.streak+' 天</div></div>';
  html+='</div>';

  // switch role button
  html+='<div style="padding:16px 0"><button class="join-btn" style="background:var(--bg2);color:var(--muted);box-shadow:none" onclick="switchRoleDemo()">🔄 切换身份体验（'+(role==='parent'?'孩子':'家长')+'视角）</button></div>';

  c.innerHTML=html;
}

function switchRoleDemo(){
  var newRole=S.role==='parent'?'child':'parent';
  S.role=newRole;
  var tLabels={child:['任务','宠物'],parent:['布置','确认']};
  ['tabTaskLabel','tabTaskLabel2','tabTaskLabel3','tabTaskLabel4'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=tLabels[newRole][0]});
  ['tabPetLabel','tabPetLabel2','tabPetLabel3','tabPetLabel4'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=newRole==='parent'?'确认':'宠物'});
  ['tab2Icon','tab2Icon2','tab2Icon3','tab2Icon4'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=newRole==='parent'?'✅':'🐾'});
  var petHeader=document.querySelector('#screen-pet .logo .name');
  if(petHeader)petHeader.textContent=newRole==='parent'?'确认打卡':'我的宠物';
  var pp=document.getElementById('tasksPointsPill');if(pp)pp.style.display=newRole==='child'?'flex':'none';
  toast('🔄 已切换到'+(newRole==='parent'?'家长':'孩子')+'视角','success');
  renderAll();
}

// INIT
renderAll();
</script>
</body>
</html>
