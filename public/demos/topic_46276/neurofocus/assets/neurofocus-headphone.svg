<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48484a"/>
      <stop offset="50%" stop-color="#2c2c2e"/>
      <stop offset="100%" stop-color="#1c1c1e"/>
    </linearGradient>
    <linearGradient id="cup" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="50%" stop-color="#2c2c2e"/>
      <stop offset="100%" stop-color="#1c1c1e"/>
    </linearGradient>
    <linearGradient id="pad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c2c2e"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="cupHighlight" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="bandHighlight" cx="50%" cy="0%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="10" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Headband -->
  <path d="M100 170 C100 90, 160 55, 200 53 C240 55, 300 90, 300 170"
        stroke="url(#band)" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M100 170 C100 90, 160 55, 200 53 C240 55, 300 90, 300 170"
        stroke="url(#bandHighlight)" stroke-width="20" stroke-linecap="round" fill="none"/>
  <!-- Band highlight line -->
  <path d="M105 158 C105 96, 160 65, 200 63 C240 65, 295 96, 295 158"
        stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Left arm -->
  <rect x="90" y="160" width="16" height="44" rx="6" fill="#2c2c2e"/>
  <rect x="93" y="163" width="3" height="38" rx="1.5" fill="rgba(255,255,255,0.15)"/>

  <!-- Right arm -->
  <rect x="294" y="160" width="16" height="42" rx="6" fill="#2c2c2e"/>
  <rect x="297" y="163" width="3" height="36" rx="1.5" fill="rgba(255,255,255,0.15)"/>

  <!-- Left earcup -->
  <ellipse cx="100" cy="245" rx="56" ry="62" fill="url(#cup)" filter="url(#shadow)" transform="rotate(-5 100 245)"/>
  <ellipse cx="100" cy="245" rx="56" ry="62" fill="url(#cupHighlight)" transform="rotate(-5 100 245)"/>
  <ellipse cx="100" cy="245" rx="48" ry="54" fill="none" stroke="url(#pad)" stroke-width="11" opacity="0.6" transform="rotate(-5 100 245)"/>
  <ellipse cx="100" cy="245" rx="40" ry="46" fill="#000000" transform="rotate(-5 100 245)"/>
  <ellipse cx="100" cy="245" rx="40" ry="46" fill="url(#cupHighlight)" opacity="0.2" transform="rotate(-5 100 245)"/>

  <!-- Right earcup -->
  <ellipse cx="300" cy="243" rx="52" ry="58" fill="url(#cup)" filter="url(#shadow)" transform="rotate(6 300 243)"/>
  <ellipse cx="300" cy="243" rx="52" ry="58" fill="url(#cupHighlight)" transform="rotate(6 300 243)"/>
  <ellipse cx="300" cy="243" rx="45" ry="51" fill="none" stroke="url(#pad)" stroke-width="10" opacity="0.6" transform="rotate(6 300 243)"/>
  <ellipse cx="300" cy="243" rx="38" ry="44" fill="#000000" transform="rotate(6 300 243)"/>
  <ellipse cx="300" cy="243" rx="38" ry="44" fill="url(#cupHighlight)" opacity="0.2" transform="rotate(6 300 243)"/>

  <!-- EEG sensor dots with glow -->
  <circle cx="100" cy="215" r="4" fill="#34c759" opacity="0.9"/>
  <circle cx="100" cy="215" r="7" fill="#34c759" opacity="0.25"/>
  <circle cx="100" cy="275" r="3.5" fill="#34c759" opacity="0.7"/>
  <circle cx="100" cy="275" r="6" fill="#34c759" opacity="0.15"/>
  <circle cx="300" cy="218" r="3.5" fill="#34c759" opacity="0.7"/>
  <circle cx="300" cy="268" r="3.5" fill="#34c759" opacity="0.6"/>
  <circle cx="300" cy="268" r="6" fill="#34c759" opacity="0.15"/>

  <!-- iOS blue accent lights -->
  <circle cx="132" cy="245" r="3" fill="#007AFF" opacity="0.7"/>
  <circle cx="132" cy="245" r="5" fill="#007AFF" opacity="0.2"/>
  <circle cx="268" cy="243" r="2.5" fill="#007AFF" opacity="0.6"/>
  <circle cx="268" cy="243" r="4" fill="#007AFF" opacity="0.15"/>
</svg>
