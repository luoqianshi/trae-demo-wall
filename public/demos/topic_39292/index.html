    /* Translation bubble */

      position: absolute;

      width: 36px;
      height: 36px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);

      background: white;
      border: 2px solid #E8DDD4;

      padding: 14px 16px;
    }
    .advice .label { font-size: 0.75rem; color: #8C7B72; margin-bottom: 4px; }
    .advice .text { font-size: 0.9rem; color: #2D2420; }

    /* History */
    .history {
      padding: 0 20px 24px;
    }
    .history-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #2D2420;
      margin-bottom: 10px;
      display: flex;

    .history-item {
      display: flex;

    }
    .history-item:last-child { border-bottom: none; }
    .history-item .time { color: #8C7B72; font-size: 0.75rem; }
    .history-item .content { flex: 1; }

<body>
<div class="app">
  <div class="header">
    <span class="demo-badge">DEMO</span>
    <h1>宠物对话翻译器</h1>
    <p class="sub">听懂毛孩子的"心里话"</p>
  </div>

  <div class="pet-selector">
    <button class="pet-btn active" onclick="selectPet('dog')">
      <span class="icon">🐕</span>
      <span>狗狗</span>
    </button>
    <button class="pet-btn" onclick="selectPet('cat')">
      <span class="icon">🐱</span>
      <span>猫咪</span>
    </button>
    <button class="pet-btn" onclick="selectPet('auto')">
      <span class="icon">🔍</span>
      <span>自动</span>
    </button>
  </div>

  <div class="recorder">
    <p class="recorder-hint">按住麦克风按钮，录制宠物叫声 3-5 秒</p>
    <button class="mic-btn" id="micBtn" onmousedown="startRecord()" onmouseup="stopRecord()" ontouchstart="startRecord()" ontouchend="stopRecord()">
      🎙️
    </button>
    <p class="record-status" id="recordStatus">点击并按住开始录音</p>
  </div>

  <div class="waveform" id="waveform"></div>

  <div class="result" id="result">
    <div class="result-card">
      <div class="label">识别结果</div>
      <div class="value">
        <span id="petType">🐕 狗狗</span>
        <span class="breed-tag" id="breedTag">金毛寻回犬</span>
      </div>
      <div class="confidence">
        <div class="confidence-bar">
          <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
        </div>
        <span class="confidence-text" id="confidenceText">置信度 0%</span>
      </div>
    </div>

    <div class="translation">
      <div class="pet-avatar" id="petAvatar">🐕</div>
      <div class="text" id="translationText">"主人，我饿了，快给我吃的！"</div>
      <div class="emotion-tag" id="emotionTag">😋 饥饿 · 置信度 92%</div>
    </div>

    <div class="advice">
      <div class="label">💡 建议回应</div>
      <div class="text" id="adviceText">检查食盆是否空了，按时喂食。如果刚喂过不久，可能是想要零食或 attention。</div>
    </div>
  </div>

  <div class="history" id="history" style="display:none">
    <div class="history-title">📋 翻译记录</div>
    <div id="historyList"></div>
  </div>

  <div class="footer">TRAE AI 创造力大赛 · 生活娱乐赛道 · Demo 版本</div>
</div>

<script>
let currentPet = 'dog';
let isRecording = false;
let recordTimer = null;
let historyData = [];

// Demo data
const demoData = {
  dog: [
    { breed: '金毛寻回犬', translation: '主人，我饿了，快给我吃的！', emotion: '饥饿', emoji: '😋', advice: '检查食盆是否空了，按时喂食。', confidence: 92, sound: '短促重复、音调升高' },
    { breed: '哈士奇', translation: '嗷呜——外面有好玩的东西！带我出去！', emotion: '兴奋', emoji: '🤩', advice: '它可能听到了外面的声音，带它出去散步或玩耍。', confidence: 87, sound: '狼嚎式长音、频率波动大' },
    { breed: '柯基', translation: '有人来了！有人来了！警戒！', emotion: '警觉', emoji: '🚨', advice: '查看门口或窗外，如果是熟人请安抚它。', confidence: 89, sound: '短促高频、连续重复' },
    { breed: '柴犬', translation: '呜呜...你走了好久，我好想你...', emotion: '焦虑', emoji: '😢', advice: '给它一些安抚，陪伴一会儿，考虑给它一个玩具分散注意力。', confidence: 85, sound: '颤抖、音调不稳、呜咽' },
    { breed: '法斗', translation: '呼哧...呼哧...我有点热，也有点累...', emotion: '疲倦', emoji: '😮‍💨', advice: '法斗容易过热，检查环境温度，提供充足饮水，让它休息。', confidence: 90, sound: '鼻音喘息、呼吸声重' }
  ],
  cat: [
    { breed: '英短', translation: '那个红点到底是什么？我要抓住它！', emotion: '好奇', emoji: '😼', advice: '陪它玩一会儿逗猫棒，满足它的捕猎本能。', confidence: 88, sound: '短促喵叫、音调上扬' },
    { breed: '布偶猫', translation: '喵~ 摸摸我嘛，我想被抱抱~', emotion: '寻求关注', emoji: '🥺', advice: '给它一些抚摸和陪伴，布偶猫非常亲人。', confidence: 91, sound: '轻柔、间歇性、拖长尾音' },
    { breed: '暹罗猫', translation: '喵嗷——！你怎么才回来！我生气了！', emotion: '愤怒', emoji: '😾', advice: '暹罗猫性格外向且话多，先安抚它，给它零食赔罪。', confidence: 86, sound: ' loud 且持续、音调高' },
    { breed: '美短', translation: '这个盒子是我的！不许抢！', emotion: '警觉', emoji: '🙀', advice: '如果是多猫家庭，确保每只猫都有自己的领地和安全空间。', confidence: 84, sound: '低沉哈气、伴随嘶嘶声' }
  ]
};

function selectPet(pet) {
  currentPet = pet;
  document.querySelectorAll('.pet-btn').forEach(btn => btn.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function createWaveBars() {
  const waveform = document.getElementById('waveform');
  waveform.innerHTML = '';
  for (let i = 0; i < 30; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = Math.random() * 20 + 4 + 'px';
    waveform.appendChild(bar);
  }
}

function animateWave() {
  const bars = document.querySelectorAll('.wave-bar');
  bars.forEach(bar => {
    bar.style.height = Math.random() * 50 + 8 + 'px';
  });
}

let waveInterval = null;

function startRecord() {
  if (isRecording) return;
  isRecording = true;
  const btn = document.getElementById('micBtn');
  const status = document.getElementById('recordStatus');
  const waveform = document.getElementById('waveform');

  btn.classList.add('recording');
  status.textContent = '正在录音... 3秒后自动分析';
  waveform.classList.add('active');
  createWaveBars();
  waveInterval = setInterval(animateWave, 100);

  let count = 3;
  recordTimer = setInterval(() => {
    count--;
    if (count > 0) {
      status.textContent = `正在录音... ${count}秒后自动分析`;
    } else {
      clearInterval(recordTimer);
      stopRecord();
    }
  }, 1000);
}

function stopRecord() {
  if (!isRecording) return;
  isRecording = false;
  clearInterval(recordTimer);
  clearInterval(waveInterval);

  const btn = document.getElementById('micBtn');
  const status = document.getElementById('recordStatus');
  const waveform = document.getElementById('waveform');

  btn.classList.remove('recording');
  status.textContent = '正在分析中...';

  setTimeout(() => {
    waveform.classList.remove('active');
    showResult();
    status.textContent = '点击并按住开始录音';
  }, 1500);
}

function showResult() {
  const data = currentPet === 'cat'
    ? demoData.cat[Math.floor(Math.random() * demoData.cat.length)]
    : demoData.dog[Math.floor(Math.random() * demoData.dog.length)];

  const petEmoji = currentPet === 'cat' ? '🐱' : '🐕';
  const petName = currentPet === 'cat' ? '猫咪' : '狗狗';

  document.getElementById('petType').textContent = `${petEmoji} ${petName}`;
  document.getElementById('breedTag').textContent = data.breed;
  document.getElementById('confidenceFill').style.width = '0%';
  document.getElementById('confidenceText').textContent = `置信度 ${data.confidence}%`;
  document.getElementById('petAvatar').textContent = petEmoji;
  document.getElementById('translationText').textContent = `"${data.translation}"`;
  document.getElementById('emotionTag').textContent = `${data.emoji} ${data.emotion} · 置信度 ${data.confidence}%`;
  document.getElementById('adviceText').textContent = data.advice;

  const result = document.getElementById('result');
  result.classList.add('show');

  setTimeout(() => {
    document.getElementById('confidenceFill').style.width = data.confidence + '%';
  }, 200);

  // Add to history
  addToHistory(data, petEmoji);
}

function addToHistory(data, emoji) {
  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  historyData.unshift({ time, breed: data.breed, emotion: data.emotion, emoji: data.emoji, translation: data.translation });
  if (historyData.length > 5) historyData.pop();

  const history = document.getElementById('history');
  const list = document.getElementById('historyList');
  history.style.display = 'block';

  list.innerHTML = historyData.map(item => `
    <div class="history-item">
      <span class="time">${item.time}</span>
      <span class="content">${emoji} ${item.breed} · "${item.translation.substring(0, 15)}..."</span>
      <span class="emotion">${item.emoji} ${item.emotion}</span>
    </div>
  `).join('');
}

// Initialize wave bars
createWaveBars();
</script>
</body>
</html>
