","99%可用性：年停机约87.6小时","99.9%可用性：年停机约8.76小时","99.99%可用性：年停机约52分钟"]},{id:"error-rate",title:"错误率与成功率",category:"性能指标",content:"错误率（Error Rate）是指请求失败的比例。计算公式：错误率 = 失败请求数 / 总请求数 × 100%。成功率 = 1 - 错误率。常见错误类型：4xx（客户端错误，如404）、5xx（服务端错误，如500、502、503）。生产系统一般要求错误率低于 0.1%。",examples:["公式：错误率 = 失败请求数 / 总请求数 × 100%","4xx错误：客户端问题，不影响可用性统计","5xx错误：服务端问题，计入可用性统计","生产环境目标：错误率 < 0.1%"]},{id:"layered-architecture",title:"分层架构",category:"架构模式",content:"分层架构是最常见的架构模式，将系统分为展示层、业务层、数据访问层等。每一层都有明确的职责，层与层之间通过接口通信。优点是结构清晰、易于理解和维护；缺点是扩展性有限，层与层之间可能形成紧耦合。",examples:["MVC模式就是一种分层架构","经典的三层架构：表现层、业务逻辑层、数据访问层"]},{id:"microservices",title:"微服务架构",category:"架构模式",content:"微服务架构将单体应用拆分为一组小型服务，每个服务独立部署、独立扩展。服务之间通过轻量级机制（通常是HTTP REST API或消息队列）通信。优点是独立部署、技术栈灵活、故障隔离；缺点是分布式系统的复杂性、服务间通信开销、运维成本增加。",examples:["电商平台拆分为用户服务、订单服务、商品服务等","每个微服务可以有自己的数据库"]},{id:"event-driven",title:"事件驱动架构",category:"架构模式",content:"事件驱动架构通过事件的产生和消费来实现组件间的松耦合通信。生产者发布事件到事件通道，消费者订阅感兴趣的事件。优点是高度解耦、易于扩展、响应性好；缺点是事件顺序难以保证、调试困难、最终一致性问题。",examples:["用户注册后发送欢迎邮件","订单支付成功后通知库存扣减"]},{id:"cqrs",title:"CQRS 模式",category:"架构模式",content:"CQRS（命令查询职责分离）将读操作和写操作分离，使用不同的模型处理。命令操作修改数据，查询操作读取数据。可以进一步扩展为事件溯源。优点是读写分离、性能优化、复杂查询简化；缺点是架构复杂、数据一致性处理复杂。",examples:["写操作走主库，读操作走从库","使用搜索引擎优化复杂查询"]},{id:"cache-strategy",title:"缓存策略",category:"性能优化",content:"缓存是提升系统性能的重要手段。常见的缓存策略包括：Cache-Aside（旁路缓存）、Write-Through（写穿透）、Write-Behind（写回）。需要考虑缓存穿透、缓存击穿、缓存雪崩等问题。",examples:["Redis作为数据库缓存","CDN缓存静态资源","本地缓存热点数据"]},{id:"load-balancing",title:"负载均衡",category:"高可用",content:"负载均衡将流量分发到多个服务器，提高系统的可用性和吞吐量。常见的负载均衡算法有轮询、加权轮询、随机、最少连接、IP哈希等。负载均衡可以在不同层次实现：DNS层、HTTP层、TCP层。",examples:["Nginx作为反向代理实现负载均衡","云服务的SLB/ELB","DNS轮询"]},{id:"message-queue",title:"消息队列",category:"中间件",content:"消息队列是实现异步通信和解耦的重要组件。常见的消息队列有Kafka、RabbitMQ、RocketMQ等。主要作用包括：异步处理、应用解耦、流量削峰、日志收集等。需要考虑消息可靠性、顺序性、重复消费等问题。",examples:["下单后异步发送短信通知","秒杀系统用队列削峰","日志收集和处理"]},{id:"database-sharding",title:"数据库分库分表",category:"数据库",content:"当单表数据量过大时，需要进行分库分表。分片方式包括水平分片和垂直分片。水平分片按某个字段（如用户ID）将数据分散到多个表；垂直分片按业务模块拆分不同的库表。需要考虑分片键选择、跨分片查询、分布式事务等问题。",examples:["按用户ID取模分库分表","按时间范围分表","读写分离"]}],jM=["性能指标","架构模式","性能优化","高可用","中间件","数据库"],MM={架构模式:p.jsx(jr,{size:18}),性能优化:p.jsx(Et,{size:18}),高可用:p.jsx(Kn,{size:18}),中间件:p.jsx(B3,{size:18}),数据库:p.jsx(Gn,{size:18})};function AM(){const[e,t]=S.useState("架构模式"),[n,r]=S.useState(Zu[0]||null),i=Zu.filter(s=>s.category===e);return p.jsxs("div",{className:"h-full flex",children:[p.jsxs("div",{className:"w-64 bg-bp-bg-card border-r border-bp-border flex flex-col",children:[p.jsx("div",{className:"p-4 border-b border-bp-border",children:p.jsxs("h2",{className:"text-lg font-semibold text-bp-text font-mono flex items-center gap-2",children:[p.jsx(on,{size:20,className:"text-bp-primary"}),"知识库"]})}),p.jsx("div",{className:"flex-1 overflow-y-auto p-3 space-y-1",children:jM.map(s=>p.jsxs("div",{className:"mb-4",children:[p.jsxs("button",{onClick:()=>{t(s);const o=Zu.find(a=>a.category===s);o&&r(o)},className:`w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left text-sm transition-colors ${e===s?"bg-bp-primary/10 text-bp-primary":"text-bp-text-muted hover:text-bp-text hover:bg-bp-bg"}`,children:[p.jsx("span",{className:e===s?"text-bp-primary":"text-bp-text-muted",children:MM[s]||p.jsx(on,{size:16})}),s]}),e===s&&p.jsx(ne.div,{initial:{height:0,opacity:0},animate:{height:"auto",opacity:1},className:"mt-1 ml-4 space-y-1",children:i.map(o=>p.jsxs("button",{onClick:()=>r(o),className:`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors flex items-center gap-2 ${(n==null?void 0:n.id)===o.id?"bg-bp-bg text-bp-text":"text-bp-text-muted hover:text-bp-text hover:bg-bp-bg/50"}`,children:[p.jsx($3,{size:14,className:(n==null?void 0:n.id)===o.id?"text-bp-primary":"opacity-0"}),p.jsx("span",{className:"truncate",children:o.title})]},o.id))})]},s))})]}),p.jsx("div",{className:"flex-1 overflow-y-auto",children:p.jsx(Ai,{mode:"wait",children:n?p.jsxs(ne.div,{initial:{opacity:0,y:20},animate:{opacity:1,y:0},exit:{opacity:0,y:-20},className:"max-w-3xl mx-auto p
