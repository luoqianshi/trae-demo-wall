<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小店经营助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#f0ebe4;height:100vh;overflow:hidden}
.app{width:100%;height:100vh;max-width:430px;margin:0 auto;background:#faf6f0;display:flex;flex-direction:column}
@media(min-width:431px){.app{height:90vh;margin:5vh auto;border:1px solid #e8e0d6;border-radius:0;box-shadow:0 8px 40px rgba(0,0,0,.08)}}

/* Header */
.header{background:linear-gradient(135deg,#2B7A4B,#3C9E5E);padding:12px 14px;padding-top:max(12px,env(safe-area-inset-top,12px));display:flex;align-items:center;flex-shrink:0;gap:10px}
.header .back{font-size:24px;cursor:pointer;color:rgba(255,255,255,.85);line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .15s}
.header .back:hover{background:rgba(255,255,255,.12)}
.header .info{flex:1;min-width:0}
.header .shop-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.header .shop-avatar img{width:100%;height:100%;object-fit:cover}
.header .info .name{font-size:16px;font-weight:600;color:#fff;letter-spacing:.3px}
.header .info .sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px}
.header .switch{font-size:12px;color:rgba(255,255,255,.9);cursor:pointer;white-space:nowrap;padding:5px 12px;border:1px solid rgba(255,255,255,.35);border-radius:16px;background:rgba(255,255,255,.1);transition:all .2s}
.header .switch:active{background:rgba(255,255,255,.2)}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

.msg{display:flex;gap:10px;max-width:90%;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}

.msg .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.msg.ai .av{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
.msg.user .av{background:linear-gradient(135deg,#fce4ec,#f8bbd0)}

.msg .bub{padding:10px 14px;font-size:14.5px;line-height:1.7;word-break:break-word;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.msg.ai .bub{background:#fff;border-radius:4px 16px 16px 16px;color:#333}
.msg.user .bub{background:linear-gradient(135deg,#2B7A4B,#3C9E5E);border-radius:16px 4px 16px 16px;color:#fff}

/* Insight cards */
.alert-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);animation:cardIn .4s ease;width:100%;position:relative;display:flex;flex-direction:column;gap:8px}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.alert-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:12px 0 0 12px}
.alert-card.risk::before{background:linear-gradient(180deg,#f5a623,#f7c948)}
.alert-card.dish::before{background:linear-gradient(180deg,#4a90d9,#7bb3e0)}
.alert-card.info::before{background:linear-gradient(180deg,#2B7A4B,#5cb85c)}

.alert-card .card-head{display:flex;align-items:center;gap:8px}
.alert-card .card-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.alert-card.risk .card-icon{background:#fef3e2}
.alert-card.dish .card-icon{background:#e8f0fe}
.alert-card.info .card-icon{background:#e8f5e9}
.alert-card .card-label{font-size:11px;color:#999;font-weight:500;letter-spacing:.5px}
.alert-card .card-title{font-size:15px;font-weight:600;color:#222;line-height:1.4}
.alert-card .card-desc{font-size:13px;color:#777;line-height:1.5}
.alert-card .food-img{width:100%;height:120px;object-fit:cover;border-radius:8px;margin-top:2px;display:block}
.alert-card .card-actions{display:flex;gap:8px;margin-top:2px}
.alert-card .card-actions button{padding:6px 16px;border:none;border-radius:20px;font-size:13px;cursor:pointer;transition:all .15s;font-weight:500}
.alert-card .card-actions .btn-primary{background:linear-gradient(135deg,#D3541F,#E8723A);color:#fff}
.alert-card .card-actions .btn-primary:active{transform:scale(.96);opacity:.9}
.alert-card .card-actions .btn-ghost{background:#f5f5f5;color:#666}
.alert-card .card-actions .btn-ghost:active{background:#eee}

/* System message */
.msg-sys{text-align:center;padding:6px 0;font-size:12px;color:#b0a89c;align-self:center}

/* Quick questions */
.quick-questions{display:flex;gap:8px;padding:8px 14px 6px;overflow-x:auto;flex-shrink:0;background:#faf6f0;scrollbar-width:none}
.quick-questions::-webkit-scrollbar{display:none}
.quick-questions .chip{padding:7px 16px;border:1px solid #e0d8ce;border-radius:20px;font-size:12.5px;color:#666;cursor:pointer;white-space:nowrap;background:#fff;transition:all .15s;flex-shrink:0}
.quick-questions .chip:active{background:#2B7A4B;color:#fff;border-color:#2B7A4B}

/* Input */
.input-bar{display:flex;align-items:center;padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom,8px));background:#faf6f0;border-top:1px solid #e8e0d6;gap:8px;flex-shrink:0}
.input-bar input{flex:1;padding:10px 14px;border:1px solid #e0d8ce;border-radius:24px;font-size:14px;outline:none;background:#fff;transition:border-color .2s}
.input-bar input:focus{border-color:#2B7A4B}
.input-bar .send{width:38px;height:38px;border:none;border-radius:50%;background:linear-gradient(135deg,#2B7A4B,#3C9E5E);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.input-bar .send:active{transform:scale(.92)}
.input-bar .send:disabled{background:#ccc;cursor:not-allowed}

/* Camera button */
.input-bar .cam-btn{width:38px;height:38px;border:none;border-radius:50%;background:#fff;color:#666;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;border:1px solid #e0d8ce}
.input-bar .cam-btn:active{background:#f5f0e8;transform:scale(.92)}

/* Add dish modal */
.dish-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;animation:modalIn .2s ease}
.dish-modal.show{display:flex}
.dish-modal .box{background:#fff;border-radius:16px;padding:24px;width:88%;max-width:380px;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.15);animation:modalSlide .3s ease}
.dish-modal .box h3{font-size:16px;font-weight:600;color:#222;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.dish-modal .preview{width:100%;height:180px;object-fit:cover;border-radius:10px;margin-bottom:14px;background:#f5f0e8;display:none}
.dish-modal .preview.show{display:block}
.dish-modal .placeholder{width:100%;height:180px;border-radius:10px;margin-bottom:14px;background:#f5f0e8;display:flex;align-items:center;justify-content:center;font-size:13px;color:#aaa}
.dish-modal .fields{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.dish-modal .fields .row{display:flex;gap:10px}
.dish-modal .fields .row .half{flex:1}
.dish-modal .fields label{display:block;font-size:12px;color:#888;font-weight:500;margin-bottom:3px}
.dish-modal .fields input,.dish-modal .fields select{padding:10px 12px;border:1px solid #e0d8ce;border-radius:8px;font-size:14px;outline:none;width:100%;background:#fafafa;transition:border-color .2s}
.dish-modal .fields input:focus,.dish-modal .fields select:focus{border-color:#2B7A4B;background:#fff}
.dish-modal .actions{display:flex;gap:10px}
.dish-modal .actions button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500;transition:all .15s}
.dish-modal .actions .btn-confirm{background:linear-gradient(135deg,#2B7A4B,#3C9E5E);color:#fff}
.dish-modal .actions .btn-confirm:active{transform:scale(.97)}
.dish-modal .actions .btn-cancel{background:#f2f2f2;color:#666}

/* Mode tabs */
.mode-tabs{display:flex;gap:0;margin-bottom:14px;border-radius:8px;overflow:hidden;border:1px solid #e0d8ce}
.mode-tab{flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:500;cursor:pointer;background:#f5f0e8;color:#999;transition:all .15s}
.mode-tab.active{background:#fff;color:#2B7A4B;font-weight:600}
.mode-tab:not(.active):hover{background:#efe8de}

/* Loading dots */
.typing-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#bbb;margin:0 1.5px;animation:db .9s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes db{0%,100%{opacity:.3}50%{opacity:1}}

/* Coupon modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0}to{opacity:1}}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:88%;max-width:380px;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.15);animation:modalSlide .3s ease}
@keyframes modalSlide{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-box h3{font-size:16px;font-weight:600;color:#222;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-box .field-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.modal-box .field{display:flex;flex-direction:column;gap:4px}
.modal-box .field label{font-size:12px;color:#888;font-weight:500}
.modal-box .field input,.modal-box .field select{padding:9px 10px;border:1px solid #e0d8ce;border-radius:8px;font-size:13px;outline:none;background:#fafafa;transition:border-color .2s}
.modal-box .field input:focus,.modal-box .field select:focus{border-color:#2B7A4B;background:#fff}
.modal-box .modal-actions{display:flex;gap:10px}
.modal-box .modal-actions button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500;transition:all .15s}
.modal-box .modal-actions .btn-confirm{background:linear-gradient(135deg,#2B7A4B,#3C9E5E);color:#fff}
.modal-box .modal-actions .btn-confirm:active{transform:scale(.97)}
.modal-box .modal-actions .btn-cancel{background:#f2f2f2;color:#666}
.modal-box .modal-actions .btn-cancel:active{background:#e8e8e8}
.modal-box .result-card{background:#f0faf4;border-radius:10px;padding:14px;text-align:center}
.modal-box .result-card .success-icon{font-size:32px;margin-bottom:8px}
.modal-box .result-card .result-name{font-size:15px;font-weight:600;color:#2B7A4B;margin-bottom:4px}
.modal-box .result-card .result-detail{font-size:12px;color:#666;margin-bottom:12px}
.modal-box .result-card .result-actions{display:flex;gap:8px;justify-content:center}
.modal-box .result-card .result-actions button{padding:7px 18px;border-radius:20px;font-size:13px;cursor:pointer;border:none;font-weight:500;transition:all .15s}
.modal-box .result-card .result-actions .btn-outline{border:1px solid #2B7A4B;color:#2B7A4B;background:#fff}
.modal-box .result-card .result-actions .btn-solid{background:#2B7A4B;color:#fff}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="back" onclick="goBack()">‹</span>
    <div class="shop-avatar" id="shopAvatar"><img src="../images/shop-noodle.jpg" alt="店铺" onerror="this.style.display='none'"></div>
    <div class="info">
      <div class="name" id="shopName">张记面馆</div>
      <div class="sub" id="shopSub">经营分析中</div>
    </div>
    <span class="switch" onclick="switchShop()">切换商家</span>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="quick-questions" id="quickQuestions">
    <span class="chip" onclick="quickAsk('今天生意怎么样')">📊 今天生意怎么样</span>
    <span class="chip" onclick="quickAsk('最近客人是不是少了')">👥 客人是不是少了</span>
    <span class="chip" onclick="quickAsk('菜单有什么问题')">🍜 菜单有什么问题</span>
    <span class="chip" onclick="quickAsk('优惠券效果好吗')">🎫 券效果怎么样</span>
  </div>

  <div class="input-bar">
    <input type="text" id="input" placeholder="问问经营情况..." maxlength="200" onkeydown="if(event.key==='Enter')send()">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(event)">
    <button class="cam-btn" onclick="document.getElementById('cameraInput').click()" title="拍照添加菜品">📷</button>
    <button class="send" id="sendBtn" onclick="send()">›</button>
  </div>
</div>

<!-- Coupon Modal -->
<div class="modal-overlay" id="couponModal">
  <div class="modal-box" id="modalContent">
    <h3>✉️ 发送召回券</h3>
    <div class="field-group">
      <div class="field"><label>券类型</label><select id="ct"><option value="cash">满减券</option><option value="discount">折扣券</option><option value="gift">赠品券</option></select></div>
      <div class="field"><label>面值</label><input type="number" id="cv" value="5"></div>
      <div class="field"><label>满减门槛</label><input type="number" id="cm" value="0"></div>
      <div class="field"><label>库存</label><input type="number" id="cc" value="100"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmCoupon()">确认发送</button>
    </div>
  </div>
</div>

<!-- Add Dish Modal -->
<div class="dish-modal" id="dishModal">
  <div class="box">
    <h3>📷 拍照</h3>
    <div class="mode-tabs">
      <span class="mode-tab active" data-mode="add" onclick="switchDishMode('add')">添加新菜</span>
      <span class="mode-tab" data-mode="update" onclick="switchDishMode('update')">更换图片</span>
    </div>
    <img class="preview" id="dishPreview" alt="菜品照片">
    <div class="placeholder" id="dishPlaceholder">点击上方📷按钮拍照或选择照片</div>
    <!-- 添加新菜模式 -->
    <div class="fields" id="addModeFields">
      <div class="row">
        <div class="half"><label>菜品名称</label><input type="text" id="dishName" placeholder="如：红烧牛肉面"></div>
        <div class="half"><label>价格 (¥)</label><input type="number" id="dishPrice" placeholder="如：28" step="0.5"></div>
      </div>
      <div><label>分类</label>
        <select id="dishCategory">
          <option value="招牌">招牌</option>
          <option value="主食" selected>主食</option>
          <option value="小吃">小吃</option>
          <option value="饮品">饮品</option>
          <option value="凉菜">凉菜</option>
        </select>
      </div>
    </div>
    <!-- 更换图片模式 -->
    <div class="fields" id="updateModeFields" style="display:none">
      <div><label>选择要换图的菜品</label>
        <select id="dishSelector">
          <option value="">加载中...</option>
        </select>
      </div>
      <div style="font-size:12px;color:#999;margin-top:2px">拍照后将替换选中菜品的图片</div>
    </div>
    <div class="actions">
      <button class="btn-cancel" onclick="closeDishModal()">取消</button>
      <button class="btn-confirm" id="dishConfirmBtn" onclick="confirmDishAction()">确认添加</button>
    </div>
  </div>
</div>

<script>
const shopId=parseInt(new URLSearchParams(location.search).get('shop'))||1;
const API=window.location.origin+'/store';
const SHOP={1:{n:'张记面馆',i:'🍜',img:'../images/shop-noodle.jpg'},2:{n:'李记卤味',i:'🍗',img:'../images/shop-braised.jpg'}};
document.getElementById('shopName').textContent=SHOP[shopId].i+' '+SHOP[shopId].n;
const av=document.getElementById('shopAvatar').querySelector('img');
if(av)av.src=SHOP[shopId].img;

const msgs=document.getElementById('msgs');
const input=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
let couponContext='';
let busy=false;

const MOCK_INSIGHTS={
  1:[
    {c:'risk',t:'销量异常',tt:'酸梅汤连续3天下降',d:'35→28→22单，高温天不该降。建议推半价券，预计多40元。'},
    {c:'risk',t:'流失预警',tt:'张先生23天没来了',d:'之前每周来2次，每次都点卤蛋。建议发卤蛋免费券召回。'},
    {c:'dish',t:'菜品诊断',tt:'凉拌黄瓜连续7天<5单',d:'可能口味不适合夏季，建议下架换应季凉菜。'}
  ],
  2:[
    {c:'info',t:'销量激增',tt:'冰绿豆汤销量涨3倍',d:'15→48杯，高温天建议加大备货量。'},
    {c:'risk',t:'流失预警',tt:'老顾客刘25天没来',d:'卤猪蹄常客，之前每周2次。建议发满减券召回。'},
    {c:'dish',t:'菜品建议',tt:'凉皮空位可推新品',d:'凉皮已下架，建议上架应季凉菜填补。'}
  ]
};

window.onload=async function(){
  addMsg('ai',getGreeting());
  await loadInsights();
};

function getGreeting(){
  const h=new Date().getHours();
  if(h<6)return '晚上好老板，这么晚还在忙，注意休息。';
  if(h<9)return '早上好老板！新的一天开始，帮您看看经营情况。';
  if(h<12)return '老板上午好！发现几件事想跟您说一下。';
  if(h<14)return '老板中午好，趁中午不忙，来看看今天的数据。';
  if(h<18)return '老板下午好，来看看今天的经营数据。';
  return '老板晚上好！今天辛苦了，看看今天的总结。';
}

async function loadInsights(){
  try{
    const r=await fetch(API+'/api/demo/insights',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shop_id:shopId})});
    if(r.ok){const d=await r.json();if(d.ok&&d.data&&d.data.insights){
      renderInsights(d.data.insights);return
    }}
  }catch(e){}
  const ins=MOCK_INSIGHTS[shopId]||MOCK_INSIGHTS[1];
  addSysMsg('已切换到离线模式，数据仅供参考。');
  ins.forEach((item,i)=>{setTimeout(()=>{renderAlert(item.c,item.t,item.tt,item.d)},(i+1)*600)});
}

function renderInsights(ins){
  const cards=[];

  // 经营概况 - 表格形式展示
  if(ins.business){
    const biz = ins.business;
    let h = '<div style="font-size:14px;line-height:1.6">';
    h += '<div style="font-weight:600;font-size:15px;margin-bottom:10px">📊 近7天经营概况</div>';

    // 汇总指标卡
    h += '<div style="display:flex;gap:8px;margin-bottom:12px">';
    h += '<div style="flex:1;background:#f0faf4;border-radius:8px;padding:8px;text-align:center">'+
      '<div style="font-size:11px;color:#888">总订单</div>'+
      '<div style="font-size:20px;font-weight:700;color:#2B7A4B">'+biz.total_orders+'</div></div>';
    h += '<div style="flex:1;background:#fef3e2;border-radius:8px;padding:8px;text-align:center">'+
      '<div style="font-size:11px;color:#888">总营收</div>'+
      '<div style="font-size:20px;font-weight:700;color:#D3541F">¥'+(biz.total_amount|0)+'</div></div>';
    h += '<div style="flex:1;background:#e8f0fe;border-radius:8px;padding:8px;text-align:center">'+
      '<div style="font-size:11px;color:#888">日均订单</div>'+
      '<div style="font-size:20px;font-weight:700;color:#4a90d9">'+biz.avg_daily_orders+'</div></div>';
    h += '</div>';

    // 每日趋势表格
    if(biz.daily_trend && biz.daily_trend.length>0){
      h += '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px">';
      h += '<thead><tr style="background:#f5f0e8">'+
        '<th style="padding:6px 8px;text-align:left;border-bottom:1px solid #e0d8ce">日期</th>'+
        '<th style="padding:6px 8px;text-align:right;border-bottom:1px solid #e0d8ce">订单数</th>'+
        '<th style="padding:6px 8px;text-align:right;border-bottom:1px solid #e0d8ce">营收</th></tr></thead><tbody>';
      biz.daily_trend.forEach(r=>{
        const dt = r.dt.substring(5);
        h += '<tr>'+
          '<td style="padding:5px 8px;border-bottom:1px solid #f0ebe4;color:#555">'+dt+'</td>'+
          '<td style="padding:5px 8px;text-align:right;border-bottom:1px solid #f0ebe4;font-weight:500">'+r.cnt+'</td>'+
          '<td style="padding:5px 8px;text-align:right;border-bottom:1px solid #f0ebe4;color:#D3541F;font-weight:500">¥'+(r.amt|0)+'</td></tr>';
      });
      h += '</tbody></table>';
    }

    // AI分析建议
    if(biz.ai_analysis){
      h += '<div style="background:#f9f6f0;border-radius:8px;padding:10px;font-size:13px;color:#555;line-height:1.7">';
      h += '<div style="font-weight:500;color:#333;margin-bottom:4px">💡 分析建议</div>';
      biz.ai_analysis.split('。').forEach(l=>{
        const t = l.trim();
        if(t) h += '<div style="padding:1px 0">· ' + t + '。</div>';
      });
      h += '</div>';
    }
    h += '</div>';

    // 直接创建消息元素，不走addMsg避免\n转义
    const m=document.createElement('div');m.className='msg ai';
    m.innerHTML='<div class="av">📊</div><div class="bub">'+h+'</div>';
    msgs.appendChild(m);msgs.scrollTop=msgs.scrollHeight;
  }

  if(ins.churn_risk?.customers)ins.churn_risk.customers.slice(0,3).forEach(c=>{
    cards.push({c:'risk',t:'流失预警',tt:c.name+' · '+c.days_since_last_visit+'天没来',d:'历史消费'+c.total_orders+'次 · 客均¥'+c.avg_amount,cname:c.name,btn:'发券召回'});
  });

  if(ins.dish_health?.dishes){const b=ins.dish_health.dishes.filter(d=>d.health.includes('滞销'));b.slice(0,1).forEach(d=>{cards.push({c:'dish',t:'菜品诊断',tt:d.name,d:d.suggestion,btn:'查看详情'})})}
  if(cards.length===0)cards.push({c:'info',t:'经营概况',tt:'今日数据正常',d:'一切运行良好',btn:'好的'});
  cards.forEach((item,i)=>{setTimeout(()=>{renderAlert(item.c,item.t,item.tt,item.d,item.btn,item.cname)},(i+1)*600)});
}

function renderAlert(cls,label,title,desc,btn,cname){
  const iconMap={risk:'⚠️',dish:'🍜',info:'✓'};
  const showFood = cls === 'dish' || cls === 'risk';
  const d=document.createElement('div');d.className='alert-card '+cls;
  let html='<div class="card-head"><div class="card-icon">'+(iconMap[cls]||'📌')+'</div><span class="card-label">'+label+'</span></div>'+
    '<div class="card-title">'+title+'</div>'+
    (desc?'<div class="card-desc">'+desc+'</div>':'');
  if(showFood)html+='<img class="food-img" src="../images/food-noodle.jpg" alt="菜品" loading="lazy" onerror="this.style.display=\'none\'">';
  html+='<div class="card-actions">'+(btn&&cname?'<button class="btn-primary" onclick="openCouponModal(\''+cname+'\')">'+btn+'</button>':'')+'<button class="btn-ghost" onclick="this.closest(\'.alert-card\').remove()">忽略</button></div>';
  d.innerHTML=html;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}

function openCouponModal(cname){
  couponContext=cname;
  document.getElementById('ct').value='cash';
  document.getElementById('cv').value=5;
  document.getElementById('cm').value=0;
  document.getElementById('cc').value=100;
  document.querySelector('#modalContent h3').innerHTML='✉️ 给 <strong>'+cname+'</strong> 发召回券';
  document.getElementById('couponModal').classList.add('show');
}

function closeModal(){
  document.getElementById('couponModal').classList.remove('show');
}

async function confirmCoupon(){
  const t=document.getElementById('ct')?.value||'cash';
  const v=document.getElementById('cv')?.value||5;
  const m=document.getElementById('cm')?.value||0;
  const c=document.getElementById('cc')?.value||100;
  const btn=document.querySelector('#modalContent .btn-confirm');
  btn.disabled=true;btn.textContent='发送中...';
  try{
    const r=await fetch(API+'/api/demo/send-coupon',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shop_id:shopId,customer_name:couponContext,type:t,value:v,min_amount:m,total_count:c})});
    const d=await r.json();
    if(d.ok){
      const cp=d.data;
      document.getElementById('modalContent').innerHTML=
        '<div class="result-card">'+
        '<div class="success-icon">✅</div>'+
        '<div class="result-name">'+cp.name+' 已发送</div>'+
        '<div class="result-detail">'+cp.type+' · ¥'+cp.value+' · 共'+cp.total_count+'张</div>'+
        '<div class="result-actions">'+
        '<button class="btn-outline" onclick="openEditModal('+cp.coupon_id+',\''+cp.name+'\',\''+cp.type+'\','+cp.value+','+cp.min_amount+')">调整券</button>'+
        '<button class="btn-solid" onclick="closeModal();setTimeout(function(){document.getElementById(\'modalContent\').innerHTML=\'\u2795 \u53d1\u9001\u53ec\u56de\u5238\'},300)">完成</button>'+
        '</div></div>';
    }else{alert('发送失败');btn.disabled=false;btn.textContent='确认发送'}
  }catch(e){alert('网络错误');btn.disabled=false;btn.textContent='确认发送'}
}

function openEditModal(id, name, type, val, min){
  document.getElementById('modalContent').innerHTML=
    '<h3>✏️ 调整券 · '+name+'</h3>'+
    '<div class="field-group">'+
    '<div class="field"><label>类型</label><select id="et"><option value="cash"'+(type==='cash'?' selected':'')+'>满减</option><option value="discount"'+(type==='discount'?' selected':'')+'>折扣</option><option value="gift"'+(type==='gift'?' selected':'')+'>赠品</option></select></div>'+
    '<div class="field"><label>面值</label><input type="number" id="ev" value="'+val+'"></div>'+
    '<div class="field"><label>满减门槛</label><input type="number" id="em" value="'+min+'"></div>'+
    '</div>'+
    '<div class="modal-actions">'+
    '<button class="btn-cancel" onclick="closeModal()">取消</button>'+
    '<button class="btn-confirm" onclick="updateCoupon('+id+')">保存调整</button></div>';
}

async function updateCoupon(id){
  const t=document.getElementById('et')?.value;
  const v=document.getElementById('ev')?.value;
  const m=document.getElementById('em')?.value;
  const btn=document.querySelector('#modalContent .btn-confirm');
  btn.disabled=true;btn.textContent='保存中...';
  try{
    const r=await fetch(API+'/api/demo/update-coupon',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({coupon_id:id,shop_id:shopId,type:t,value:v,min_amount:m})});
    const d=await r.json();
    if(d.ok){
      document.getElementById('modalContent').innerHTML=
        '<div class="result-card">'+
        '<div class="success-icon">✓</div>'+
        '<div class="result-name">券已更新</div>'+
        '<div class="result-actions"><button class="btn-solid" onclick="closeModal()">完成</button></div></div>';
    }else{alert('调整失败');btn.disabled=false;btn.textContent='保存调整'}
  }catch(e){alert('网络错误');btn.disabled=false;btn.textContent='保存调整'}
}

function quickAsk(text){
  input.value=text;send();
}

async function send(){
  const t=input.value.trim();if(!t||busy)return;
  input.value='';addMsg('user',t);busy=true;sendBtn.disabled=true;
  const lid=addLoading();
  try{
    const r=await fetch(API+'/api/demo/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shop_id:shopId,message:t})});
    rmLoading(lid);
    if(r.ok){const d=await r.json();const reply=d.data?.reply||d.reply;if(reply){addTypeMsg(reply);busy=false;sendBtn.disabled=false;return}}
  }catch(e){rmLoading(lid)}
  addTypeMsg('好的，数据查到了。您可以试试问"今天营业额""优惠券效果""菜单情况"等。');
  busy=false;sendBtn.disabled=false;
}

function addMsg(role,content){
  const m=document.createElement('div');m.className='msg '+role;
  const av=role==='ai'?'📊':'👤';
  m.innerHTML='<div class="av">'+av+'</div><div class="bub">'+content.replace(/\n/g,'<br>')+'</div>';
  msgs.appendChild(m);msgs.scrollTop=msgs.scrollHeight;
}

function addSysMsg(text){
  const d=document.createElement('div');d.className='msg-sys';d.textContent=text;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}

function addTypeMsg(content){
  if(!content)return;
  const m=document.createElement('div');m.className='msg ai';
  m.innerHTML='<div class="av">📊</div><div class="bub"><span class="c"></span></div>';
  msgs.appendChild(m);msgs.scrollTop=msgs.scrollHeight;
  const s=m.querySelector('.c');let i=0;
  (function t(){if(i<content.length){s.textContent+=content[i];i++;msgs.scrollTop=msgs.scrollHeight;setTimeout(t,15+Math.random()*25)}else{s.innerHTML=content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}})();
}

function addLoading(){const m=document.createElement('div');m.className='msg ai';m.id='lm';m.innerHTML='<div class="av">📊</div><div class="bub"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';msgs.appendChild(m);msgs.scrollTop=msgs.scrollHeight;return'lm'}
function rmLoading(id){const e=document.getElementById(id);if(e)e.remove()}
function goBack(){window.location.href='index.html'}
function switchShop(){const n=shopId===1?2:1;window.location.href='chat.html?shop='+n}

/* 拍照添加菜品 / 更换图片 */
let selectedPhotoBase64 = '';
let dishMode = 'add'; // 'add' | 'update'

function onPhotoSelected(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    selectedPhotoBase64 = ev.target.result;
    const prev = document.getElementById('dishPreview');
    prev.src = selectedPhotoBase64;
    prev.classList.add('show');
    document.getElementById('dishPlaceholder').style.display = 'none';
    // 重置为添加模式
    switchDishMode('add');
    document.getElementById('dishModal').classList.add('show');
    setTimeout(()=>document.getElementById('dishName').focus(), 300);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function switchDishMode(mode){
  dishMode = mode;
  // 切换tab样式
  document.querySelectorAll('.mode-tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  // 切换显示区域
  document.getElementById('addModeFields').style.display = mode === 'add' ? '' : 'none';
  document.getElementById('updateModeFields').style.display = mode === 'update' ? '' : 'none';
  // 改按钮文本
  const btn = document.getElementById('dishConfirmBtn');
  btn.textContent = mode === 'add' ? '确认添加' : '更换图片';
  // 加载菜品列表
  if(mode === 'update') loadDishList();
}

async function loadDishList(){
  const sel = document.getElementById('dishSelector');
  sel.innerHTML = '<option value="">加载中...</option>';
  try{
    const r = await fetch(API+'/api/demo/menu/'+shopId);
    const d = await r.json();
    if(d.ok && d.data && d.data.dishes){
      sel.innerHTML = '<option value="">请选择菜品</option>';
      d.data.dishes.forEach(dish=>{
        const opt = document.createElement('option');
        opt.value = dish.id;
        opt.textContent = dish.name + ' · ¥' + dish.price + ' · ' + (dish.category||'其他');
        sel.appendChild(opt);
      });
    }else{
      sel.innerHTML = '<option value="">加载失败</option>';
    }
  }catch(e){
    sel.innerHTML = '<option value="">网络错误</option>';
  }
}

function closeDishModal(){
  document.getElementById('dishModal').classList.remove('show');
}

function confirmDishAction(){
  if(dishMode === 'add'){
    confirmAddDish();
  }else{
    confirmUpdateImage();
  }
}

async function confirmAddDish(){
  const name = document.getElementById('dishName').value.trim();
  const price = document.getElementById('dishPrice').value;
  const category = document.getElementById('dishCategory').value;
  if(!name){alert('请输入菜品名称');return}
  if(!price || parseFloat(price)<=0){alert('请输入有效价格');return}

  const btn = document.getElementById('dishConfirmBtn');
  btn.disabled = true; btn.textContent = '添加中...';

  try{
    const r = await fetch(API+'/api/demo/add-dish', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({shop_id:shopId, name, price:parseFloat(price), category, image_base64: selectedPhotoBase64 || undefined})
    });
    const d = await r.json();
    if(d.ok){
      closeDishModal();
      addMsg('ai', '✅ 已添加 <strong>'+name+'</strong> · ¥'+parseFloat(price)+' · '+category);
      // 重置
      document.getElementById('dishName').value = '';
      document.getElementById('dishPrice').value = '';
      document.getElementById('dishPreview').classList.remove('show');
      document.getElementById('dishPlaceholder').style.display = 'flex';
      selectedPhotoBase64 = '';
    }else{
      alert(d.error || '添加失败');
    }
  }catch(e){
    alert('网络错误，请重试');
  }
  btn.disabled = false; btn.textContent = '确认添加';
}

async function confirmUpdateImage(){
  const dishId = document.getElementById('dishSelector').value;
  if(!dishId){alert('请选择要更换图片的菜品');return}
  if(!selectedPhotoBase64){alert('请先拍照或选择照片');return}

  const btn = document.getElementById('dishConfirmBtn');
  btn.disabled = true; btn.textContent = '更换中...';

  try{
    const r = await fetch(API+'/api/demo/update-dish-image', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({shop_id:shopId, dish_id:parseInt(dishId), image_base64: selectedPhotoBase64})
    });
    const d = await r.json();
    if(d.ok){
      closeDishModal();
      // 获取菜品名称
      const sel = document.getElementById('dishSelector');
      const name = sel.options[sel.selectedIndex]?.text?.split('·')[0]?.trim() || '菜品';
      addMsg('ai', '🖼️ 已更新 <strong>'+name+'</strong> 的图片');
      // 重置
      document.getElementById('dishPreview').classList.remove('show');
      document.getElementById('dishPlaceholder').style.display = 'flex';
      selectedPhotoBase64 = '';
    }else{
      alert(d.error || '更换失败');
    }
  }catch(e){
    alert('网络错误，请重试');
  }
  btn.disabled = false; btn.textContent = '更换图片';
}
</script>
