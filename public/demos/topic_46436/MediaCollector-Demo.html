<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Collector · 交互式 Demo</title>
<style>
  :root{
    --bg:#343434;
    --bg-2:#2a2a2a;
    --bg-3:#1f1f1f;
    --panel:rgba(0,0,0,.33);
    --panel-2:rgba(66,66,66,.5);
    --primary:#009688;
    --primary-light:#4DB6AC;
    --blue:#409EFF;
    --accent:#F59E0B;
    --pink:#EC4899;
    --green:#10B981;
    --cyan:#06B6D4;
    --purple:#A855F7;
    --ink:#fff;
    --muted:#bdbdbd;
    --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
    background:var(--bg);color:var(--ink);overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  code,pre{font-family:"JetBrains Mono",Consolas,monospace}

  /* Layout */
  .app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;height:100vh;
       grid-template-areas:"side head" "side main"}
  .sidebar{grid-area:side;background:var(--bg-3);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:14px 0;overflow-y:auto}
  .head{grid-area:head;background:var(--bg-2);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 22px;gap:16px}
  .main{grid-area:main;overflow-y:auto;padding:22px}

  /* Sidebar */
  .logo{display:flex;align-items:center;gap:10px;padding:6px 20px 18px;font-weight:700;font-size:16px}
  .logo .mk{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--cyan));display:grid;place-items:center;font-size:17px}
  .logo small{display:block;font-size:10px;color:var(--muted);font-weight:400}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;font-size:14px;color:var(--muted);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
  .nav-item:hover{background:var(--panel);color:var(--ink)}
  .nav-item.active{color:var(--primary-light);background:var(--panel);border-left-color:var(--primary)}
  .nav-item .ic{font-size:17px;width:20px;text-align:center}
  .nav-sep{height:1px;background:var(--line);margin:10px 16px}
  .nav-label{padding:8px 20px 4px;font-size:11px;color:#777;text-transform:uppercase;letter-spacing:1px}

  /* Header */
  .h-search{flex:1;max-width:420px;position:relative}
  .h-search input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px 14px 8px 36px;border-radius:8px;font-size:13px;outline:none}
  .h-search input:focus{border-color:var(--primary)}
  .h-search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
  .h-spacer{flex:1}
  .h-stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .h-stat .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .h-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;font-size:13px;font-weight:700}

  /* Views */
  .view{display:none;animation:fade .3s}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .v-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .v-title{font-size:22px;font-weight:700}
  .v-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:12px;padding:5px 13px;border-radius:999px;background:var(--panel);color:var(--muted);cursor:pointer;transition:all .2s;border:1px solid transparent}
  .chip:hover{color:var(--ink)}
  .chip.active{background:var(--primary);color:#fff}

  /* Media grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
  .card{cursor:pointer;transition:transform .25s,box-shadow .25s;border-radius:12px;overflow:hidden;background:var(--panel)}
  .card:hover{transform:translateY(-6px);box-shadow:0 16px 30px rgba(0,0,0,.5)}
  .poster{aspect-ratio:2/3;position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;overflow:hidden}
  .poster::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.85))}
  .poster .pt{position:relative;font-size:14px;font-weight:700;line-height:1.3;text-shadow:0 2px 6px rgba(0,0,0,.8)}
  .poster .py{position:relative;font-size:11px;color:var(--muted);margin-top:3px}
  .poster .pg{position:absolute;top:10px;right:10px;font-size:11px;font-weight:700;color:#1a1a1a;background:var(--accent);padding:2px 7px;border-radius:5px}
  .card-info{padding:10px 12px}
  .card-info .ct{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-info .cg{font-size:11px;color:var(--muted);margin-top:2px}

  /* genre gradients */
  .g-sci{background:linear-gradient(135deg,#1e3a8a,#06b6d4)}
  .g-act{background:linear-gradient(135deg,#7f1d1d,#f59e0b)}
  .g-com{background:linear-gradient(135deg,#14532d,#84cc16)}
  .g-dra{background:linear-gradient(135deg,#581c87,#ec4899)}
  .g-ani{background:linear-gradient(135deg,#831843,#fb7185)}
  .g-thr{background:linear-gradient(135deg,#0c4a6e,#64748b)}
  .g-mus{background:linear-gradient(135deg,#7c2d12,#fbbf24)}
  .g-fan{background:linear-gradient(135deg,#4c1d95,#22d3ee)}

  /* Detail panel */
  .detail{display:none}
  .detail.active{display:block}
  .d-back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:18px;transition:color .2s}
  .d-back:hover{color:var(--ink)}
  .d-hero{display:grid;grid-template-columns:240px 1fr;gap:28px;background:var(--panel);border-radius:16px;padding:24px;margin-bottom:22px}
  .d-poster{aspect-ratio:2/3;border-radius:12px;overflow:hidden;position:relative;display:flex;align-items:flex-end;padding:14px}
  .d-poster::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.8))}
  .d-poster .pt{position:relative;font-size:18px;font-weight:700;text-shadow:0 2px 8px #000}
  .d-info h1{font-size:28px;font-weight:800;margin-bottom:8px}
  .d-meta{display:flex;gap:14px;font-size:13px;color:var(--muted);margin-bottom:14px;flex-wrap:wrap}
  .d-meta .rating{color:var(--accent);font-weight:700}
  .d-genre{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .d-genre span{font-size:12px;padding:3px 10px;border-radius:6px;background:var(--panel-2);color:var(--primary-light)}
  .d-plot{font-size:14px;color:#ddd;line-height:1.8;margin-bottom:18px}
  .d-cast{font-size:13px;color:var(--muted);margin-bottom:22px}
  .d-cast b{color:var(--ink)}
  .d-actions{display:flex;gap:12px}
  .btn{border:none;cursor:pointer;font-size:14px;font-weight:600;padding:11px 24px;border-radius:8px;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
  .btn-play{background:var(--primary);color:#fff}
  .btn-play:hover{background:#00796b;transform:translateY(-2px)}
  .btn-ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--primary)}

  /* episodes */
  .ep-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px;margin-top:8px}
  .ep{aspect-ratio:1;background:var(--panel);border:1px solid var(--line);border-radius:8px;display:grid;place-items:center;font-size:13px;cursor:pointer;transition:all .2s}
  .ep:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
  .ep.watched{color:var(--green)}
  .season-tabs{display:flex;gap:8px;margin-bottom:14px}

  /* Player modal */
  .player-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column}
  .player-overlay.active{display:flex}
  .player-box{width:min(960px,92vw);background:#000;border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.7)}
  .player-stage{aspect-ratio:16/9;position:relative;background:#000;display:grid;place-items:center;overflow:hidden}
  .dash-info{position:absolute;top:14px;left:14px;font-size:11px;color:var(--cyan);background:rgba(0,0,0,.6);padding:6px 12px;border-radius:6px;font-family:monospace;backdrop-filter:blur(6px)}
  .play-canvas{width:100%;height:100%;display:grid;place-items:center;position:relative}
  .play-frame{position:absolute;inset:0;display:grid;place-items:center;font-size:80px;opacity:.85;transition:opacity .5s}
  .player-ctrl{background:#0a0a0a;padding:14px 18px;display:flex;align-items:center;gap:16px}
  .pc-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px}
  .pc-time{font-size:12px;color:var(--muted);font-family:monospace;min-width:90px}
  .pc-bar{flex:1;height:5px;background:rgba(255,255,255,.15);border-radius:3px;position:relative;cursor:pointer}
  .pc-bar .fill{height:100%;background:var(--primary);border-radius:3px;width:0;transition:width .3s}
  .pc-bar .buf{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.25);border-radius:3px;width:0;transition:width .3s}
  .pc-close{position:absolute;top:16px;right:18px;color:#fff;font-size:24px;cursor:pointer;background:rgba(0,0,0,.5);width:36px;height:36px;border-radius:50%;display:grid;place-items:center;border:none}
  .seg-strip{display:flex;gap:3px;padding:0 18px 12px;overflow-x:auto}
  .seg{flex-shrink:0;font-size:10px;color:var(--muted);background:rgba(255,255,255,.08);padding:3px 7px;border-radius:4px;font-family:monospace}
  .seg.done{background:var(--primary);color:#fff}
  .seg.cur{background:var(--accent);color:#000;font-weight:700}

  /* Manga reader */
  .manga-reader{background:var(--bg-3);border-radius:16px;padding:20px}
  .manga-pages{display:flex;flex-direction:column;gap:8px;align-items:center}
  .manga-page{width:min(560px,100%);aspect-ratio:3/4;border-radius:8px;position:relative;display:grid;place-items:center;font-size:14px;color:rgba(255,255,255,.6);overflow:hidden}
  .manga-page .pn{position:absolute;bottom:8px;right:10px;font-size:11px;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:4px}
  .manga-ctrl{display:flex;justify-content:center;gap:14px;margin:16px 0}

  /* Music */
  .music-layout{display:grid;grid-template-columns:1fr 320px;gap:20px}
  .album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
  .album{cursor:pointer;text-align:center;transition:transform .2s}
  .album:hover{transform:translateY(-4px)}
  .album .ac{aspect-ratio:1;border-radius:12px;margin-bottom:8px;display:grid;place-items:center;font-size:36px;overflow:hidden}
  .album .an{font-size:13px;font-weight:600}
  .album .ar{font-size:11px;color:var(--muted)}
  .now-playing{background:var(--panel);border-radius:16px;padding:20px;position:sticky;top:0}
  .np-cover{aspect-ratio:1;border-radius:12px;margin-bottom:16px;display:grid;place-items:center;font-size:56px}
  .np-title{font-size:17px;font-weight:700}
  .np-artist{font-size:13px;color:var(--muted);margin-bottom:16px}
  .np-bar{height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin-bottom:8px;cursor:pointer}
  .np-bar .fill{height:100%;background:var(--primary);border-radius:3px;width:35%}
  .np-times{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:16px}
  .np-ctrl{display:flex;justify-content:center;gap:18px;align-items:center}
  .np-ctrl .npb{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
  .np-ctrl .npb.main{width:48px;height:48px;border-radius:50%;background:var(--primary);display:grid;place-items:center;font-size:20px}

  /* Download tasks */
  .task-list{display:flex;flex-direction:column;gap:14px}
  .task{background:var(--panel);border-radius:14px;padding:18px;border:1px solid var(--line)}
  .task-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .task-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .task-state{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:600}
  .st-down{background:rgba(16,185,129,.2);color:var(--green)}
  .st-seed{background:rgba(6,182,212,.2);color:var(--cyan)}
  .st-pause{background:rgba(245,158,11,.2);color:var(--accent)}
  .task-bar{height:8px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;margin-bottom:10px}
  .task-bar .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--cyan));border-radius:5px;transition:width .5s}
  .task-meta{display:flex;gap:18px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .task-meta b{color:var(--ink)}
  .peer-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px;color:var(--muted);border-top:1px dashed var(--line);margin-top:8px}
  .peer-row .pip{width:24px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;flex-shrink:0;width:80px}
  .peer-row .pip .f{height:100%;background:var(--primary)}

  /* Tech panel */
  .tech-panel{background:var(--panel);border-radius:16px;padding:26px;margin-bottom:18px;border:1px solid var(--line)}
  .tech-panel h3{font-size:18px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
  .tech-panel .tsub{font-size:13px;color:var(--accent);margin-bottom:18px}
  .flow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:18px 0}
  .flow-step{background:var(--bg-3);border-radius:10px;padding:14px 10px;text-align:center;border:1px solid var(--line);position:relative}
  .flow-step .fn{font-size:11px;color:var(--cyan);font-weight:700;margin-bottom:4px}
  .flow-step .fd{font-size:11px;color:var(--muted)}
  .code{background:#0d1117;border:1px solid var(--line);border-radius:10px;padding:16px;font-size:12px;line-height:1.7;color:#c9d1d9;overflow-x:auto;margin-top:14px}
  .code .cm{color:#8b949e}.code .kw{color:#ff7b72}.code .st{color:#a5d6ff}.code .fn{color:#d2a8ff}

  /* toast */
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--primary);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:200;opacity:0;transition:all .3s;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  /* Header alive */
  .h-clock{font-size:12px;color:var(--muted);font-family:monospace;min-width:64px}
  .h-status{font-size:12px;color:var(--primary-light);min-width:140px;transition:opacity .3s}

  /* Library */
  .lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .lib-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;transition:all .25s;position:relative;overflow:hidden}
  .lib-card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 14px 28px rgba(0,0,0,.4)}
  .lib-card .lc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .lib-card .lc-ic{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;font-size:22px;flex-shrink:0}
  .lib-card .lc-name{font-size:15px;font-weight:700}
  .lib-card .lc-path{font-size:11px;color:var(--muted);font-family:monospace;margin-top:2px;word-break:break-all}
  .lib-card .lc-meta{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-bottom:12px}
  .lib-card .lc-meta b{color:var(--ink)}
  .lib-card .lc-bar{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-bottom:10px}
  .lib-card .lc-bar .f{height:100%;background:linear-gradient(90deg,var(--primary),var(--cyan));border-radius:3px}
  .lib-card .lc-actions{display:flex;gap:8px}
  .lib-card .lc-act{font-size:12px;padding:5px 11px;border-radius:7px;background:var(--panel-2);color:var(--muted);cursor:pointer;transition:all .2s;border:1px solid var(--line)}
  .lib-card .lc-act:hover{color:var(--ink);border-color:var(--primary)}
  .lib-card.scanning::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);animation:scan 1.8s linear infinite}
  @keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  .src-local{background:rgba(16,185,129,.15);color:var(--green)}
  .src-smb{background:rgba(99,102,241,.15);color:#818CF8}
  .src-webdav{background:rgba(6,182,212,.15);color:var(--cyan)}
  .src-ftp{background:rgba(245,158,11,.15);color:var(--accent)}
  .src-baidu{background:rgba(59,130,246,.15);color:#60A5FA}
  .src-aliyun{background:rgba(168,85,247,.15);color:var(--purple)}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal-overlay.active{display:flex}
  .modal-box{width:min(560px,92vw);background:var(--bg-2);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:pop .25s}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-size:17px}
  .modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
  .modal-body{padding:22px;max-height:60vh;overflow-y:auto}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:8px;font-size:14px;outline:none}
  .field input:focus,.field select:focus{border-color:var(--primary)}
  .src-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .src-opt{background:var(--panel);border:1.5px solid var(--line);border-radius:11px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s}
  .src-opt:hover{border-color:var(--primary)}
  .src-opt.active{border-color:var(--primary);background:rgba(0,150,136,.1)}
  .src-opt .so-ic{font-size:24px;margin-bottom:6px}
  .src-opt .so-n{font-size:12px;font-weight:600}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

  /* Family */
  .fam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .fam-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;text-align:center;transition:all .25s}
  .fam-card:hover{transform:translateY(-4px);border-color:var(--primary)}
  .fam-avatar{width:64px;height:64px;border-radius:50%;margin:0 auto 12px;display:grid;place-items:center;font-size:26px;font-weight:700;color:#fff}
  .fam-name{font-size:16px;font-weight:700}
  .fam-role{font-size:12px;padding:3px 10px;border-radius:6px;display:inline-block;margin-top:6px}
  .role-admin{background:rgba(245,158,11,.2);color:var(--accent)}
  .role-member{background:rgba(6,182,212,.2);color:var(--cyan)}
  .role-kid{background:rgba(236,72,153,.2);color:var(--pink)}
  .fam-online{font-size:11px;color:var(--muted);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:5px}
  .fam-online .od{width:7px;height:7px;border-radius:50%}
  .od-on{background:var(--green);box-shadow:0 0 6px var(--green)}
  .od-off{background:#555}
  .fam-perms{margin-top:12px;display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--muted)}
  .fam-perms .pp{display:flex;justify-content:space-between;padding:4px 0;border-top:1px dashed var(--line)}
  .fam-perms .pp .yes{color:var(--green)}
  .fam-perms .pp .no{color:#666}

  .setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
  .setting-row:last-child{border-bottom:none}
  .setting-row .sr-l{font-size:14px}

/* ============ 工具 ============ */
const $=s=>document.querySelector(s);
const main=$('#main');
let currentView='movie';
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function pad(n){return String(n).padStart(2,'0')}
function fmtTime(s){return pad(Math.floor(s/60))+':'+pad(Math.floor(s%60))}

/* ============ 路由 ============ */
document.querySelectorAll('.nav-item').forEach(el=>{

function render(){
  if(currentView==='movie')renderMovies();

/* ============ 电影 ============ */
function renderMovies(filter=''){
  const list=movies.filter(m=>!filter||m.t.includes(filter)||m.g.includes(filter));
  main.innerHTML=`
    <div class="view active">
      <div class="v-head">
        <div><div class="v-title">🎞️ 电影库</div><div class="v-sub">${list.length} 部影片 · 自动刮削 · DASH 流式播放</div></div>
        <div class="chips">
          ${['全部','科幻','动作','喜剧','剧情','动画','惊悚','爱情'].map((c,i)=>
            `<div class="chip ${i===0?'active':''}" data-f="${i===0?'':c}">${c}</div>`).join('')}
        </div>
      </div>
      <div class="grid">${list.map((m,i)=>cardHTML(m,i,'movie')).join('')}</div>
    </div>`;
  bindCards('movie');
  bindChips(filter=>renderMovies(filter));
}
function cardHTML(m,i,type){
  return `<div class="card" data-type="${type}" data-i="${i}">
    <div class="poster ${m.gr}">
      <div class="pg">${m.r}</div>
      <div class="pt">${m.t}</div>
      <div class="py">${m.y} · ${m.g}</div>
    </div>
    <div class="card-info"><div class="ct">${m.t}</div><div class="cg">${m.y} · ${m.g}</div></div>
  </div>`;
}
function bindCards(type){
  document.querySelectorAll(`.card[data-type="${type}"]`).forEach(c=>{
    c.addEventListener('click',()=>{
      const i=+c.dataset.i;
      if(type==='movie')movieDetail(i);
      else if(type==='tv')tvDetail(i);
    });
  });
}
function bindChips(cb){
  document.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('click',()=>{
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      ch.classList.add('active');
      cb(ch.dataset.f||'');
    });
  });
}
function movieDetail(i){
  const m=movies[i];
  main.innerHTML=`
    <div class="detail active">
      <div class="d-back" id="dBack">← 返回电影库</div>
      <div class="d-hero">
        <div class="d-poster ${m.gr}"><div class="pt">${m.t}</div></div>
        <div class="d-info">
          <h1>${m.t}</h1>
          <div class="d-meta">
            <span>${m.y}</span><span>${m.dur}</span>
            <span class="rating">★ ${m.r}</span>
            <span style="color:var(--cyan)">${m.codec}</span>
          </div>
          <div class="d-genre"><span>${m.g}</span><span>DASH 流式</span><span>服务端转码</span></div>
          <div class="d-plot">${m.plot}</div>
          <div class="d-cast">${m.cast}</div>
          <div class="d-actions">
            <button class="btn btn-play" id="playBtn">▶ 播放</button>
            <button class="btn btn-ghost" id="dlBtn">📥 下载</button>
            <button class="btn btn-ghost" id="favBtn">⭐ 收藏</button>
          </div>
        </div>
      </div>
    </div>`;
  $('#dBack').onclick=()=>renderMovies();
  $('#playBtn').onclick=()=>openPlayer(m);
  $('#dlBtn').onclick=()=>toast('已加入下载队列（torrent4j）');
  $('#favBtn').onclick=()=>toast('已收藏到「我的片单」');
}

/* ============ 电视剧 ============ */
function renderTV(filter=''){
  const list=tvs.filter(t=>!filter||t.t.includes(filter)||t.g.includes(filter));
  main.innerHTML=`
    <div class="view active">
      <div class="v-head">
        <div><div class="v-title">📺 电视剧库</div><div class="v-sub">${list.length} 部剧集 · 多季管理</div></div>
        <div class="chips">${['全部','科幻','西部','犯罪','奇幻'].map((c,i)=>
          `<div class="chip ${i===0?'active':''}" data-f="${i===0?'':c}">${c}</div>`).join('')}</div>
      </div>
      <div class="grid">${list.map((m,i)=>cardHTML(m,i,'tv')).join('')}</div>
    </div>`;
  bindCards('tv');bindChips(f=>renderTV(f));
}
function tvDetail(i){
  const t=tvs[i];
  let curSeason=1;
  function draw(){
    const s=t.seasons.find(x=>x.n===curSeason);
    main.innerHTML=`
      <div class="detail active">
        <div class="d-back" id="dBack">← 返回电视剧库</div>
        <div class="d-hero">
          <div class="d-poster ${t.gr}"><div class="pt">${t.t}</div></div>
          <div class="d-info">
            <h1>${t.t}</h1>
            <div class="d-meta"><span>${t.y}</span><span class="rating">★ ${t.r}</span>
              <span style="color:var(--cyan)">${t.seasons.length} 季</span></div>
            <div class="d-genre"><span>${t.g}</span><span>DASH 流式</span></div>
            <div class="d-plot">${t.plot}</div>
            <div class="d-cast">${t.cast}</div>
            <div class="season-tabs">${t.seasons.map(s=>
              `<div class="chip ${s.n===curSeason?'active':''}" data-s="${s.n}">第 ${s.n} 季</div>`).join('')}</div>
          </div>
        </div>
        <div class="v-sub" style="margin:18px 0 8px">第 ${curSeason} 季 · 共 ${s.eps} 集</div>
        <div class="ep-list">${Array.from({length:s.eps},(_,k)=>{
          const watched=k<3;
          return `<div class="ep ${watched?'watched':''}" data-ep="${k+1}">${watched?'✓ ':''}${k+1}</div>`;
        }).join('')}</div>
      </div>`;
    $('#dBack').onclick=()=>renderTV();
    document.querySelectorAll('.season-tabs .chip').forEach(c=>{
      c.onclick=()=>{curSeason=+c.dataset.s;draw()};
    });
    document.querySelectorAll('.ep').forEach(e=>{
      e.onclick=()=>{toast('播放 第'+curSeason+'季 第'+e.dataset.ep+'集');openPlayer({t:t.t+' S'+curSeason+'E'+e.dataset.ep,y:t.y,g:t.g,gr:t.gr,r:t.r,codec:'HEVC·1080P'})};
    });
  }
  draw();
}

/* ============ 漫画 ============ */
function renderManga(){
  main.innerHTML=`
    <div class="view active">
      <div class="v-head">
        <div><div class="v-title">📚 漫画库</div><div class="v-sub">${mangas.length} 部漫画 · 虚拟滚动阅读</div></div>
      </div>
      <div class="grid">${mangas.map((m,i)=>`
        <div class="card" data-mi="${i}">
          <div class="poster ${m.gr}"><div class="pt">${m.t}</div><div class="py">${m.g} · ${m.pages}页</div></div>
          <div class="card-info"><div class="ct">${m.t}</div><div class="cg">${m.g}</div></div>
        </div>`).join('')}</div>
    </div>`;
  document.querySelectorAll('.card[data-mi]').forEach(c=>{
    c.onclick=()=>mangaReader(+c.dataset.mi);
  });
}
function mangaReader(i){
  const m=mangas[i];
  const hues=[['#1e3a8a','#06b6d4'],['#7f1d1d','#f59e0b'],['#14532d','#84cc16'],['#0c4a6e','#64748b']];
  main.innerHTML=`
    <div class="view active">
      <div class="d-back" id="dBack">← 返回漫画库</div>
      <div class="v-head"><div><div class="v-title">${m.t}</div><div class="v-sub">${m.g} · ${m.pages} 页 · ${m.plot}</div></div></div>
      <div class="manga-ctrl">
        <button class="btn btn-ghost" id="mPrev">◀ 上一页</button>
        <button class="btn btn-ghost" id="mNext">下一页 ▶</button>
      </div>
      <div class="manga-reader"><div class="manga-pages" id="mangaPages"></div></div>
    </div>`;
  const pages=$('#mangaPages');
  for(let p=1;p<=m.pages;p++){
    const h=hues[i%hues.length];
    const div=document.createElement('div');
    div.className='manga-page';
    div.style.background=`linear-gradient(135deg,${h[0]},${h[1]})`;
    div.innerHTML=`<div>第 ${p} 页</div><div class="pn">${p}/${m.pages}</div>`;
    pages.appendChild(div);
  }
  $('#dBack').onclick=()=>renderManga();
  $('#mNext').onclick=()=>{main.scrollBy({top:600,behavior:'smooth'});toast('下一页')};
  $('#mPrev').onclick=()=>{main.scrollBy({top:-600,behavior:'smooth'});toast('上一页')};
}

function bindLibActions(){
  document.querySelectorAll('.lib-card .lc-act').forEach(a=>{
    a.onclick=()=>{
      const card=a.closest('.lib-card');
      const i=+card.dataset.li;
      const act=a.dataset.act;
      const l=libraries[i];
      if(act==='scan'){
        l.scanning=true;l.scan=0;
        card.classList.add('scanning');
        card.querySelector('.lc-bar .f').style.width='0%';
        $('#scanStat')&&($('#scanStat').textContent='扫描中');
        toast('开始扫描「'+l.name+'」…');
        let p=0;
        const ti=setInterval(()=>{
          p+=Math.random()*18;if(p>100)p=100;
          l.scan=Math.floor(p);
          card.querySelector('.lc-bar .f').style.width=p+'%';
          if(p>=100){
            clearInterval(ti);l.scanning=false;card.classList.remove('scanning');
            l.count+=Math.floor(Math.random()*5);
            card.querySelector('.lc-meta b:nth-child(2)').textContent=l.count.toLocaleString();
            toast('「'+l.name+'」扫描完成，新增资源已入库');
            $('#scanStat')&&($('#scanStat').textContent='就绪');
          }
        },700);
      }else if(act==='scrape'){toast('已触发「'+l.name+'」自动刮削（TMDB/豆瓣）')}
      else if(act==='open'){toast('打开 '+l.path)}
      else if(act==='del'){
        libraries.splice(i,1);renderLibrary();toast('已删除资料库「'+l.name+'」');
      }
    };
  });
}

<span class="kw">public static</span> byte[] <span class="fn">extractVideoSegment</span>(String src, <span class="kw">int</span> segNo, ...) {

  <span class="kw">return</span> <span class="fn">patchAllTfdtForSegment</span>(<span class="fn">extractAllMoofMdat</span>(data), baseTime, ...);
}</div>

/* ============ 播放器 ============ */
let playTimer=null,playPos=0,playDur=0,segCount=12,curSeg=0;
function openPlayer(m){
  playDur=120+Math.floor(Math.random()*120);
  playPos=0;curSeg=0;
  $('#playerOverlay').classList.add('active');
  $('#dashInfo').textContent='DASH · 服务端转码中… '+m.codec;
  // segments
  const strip=$('#segStrip');
  strip.innerHTML='';
  for(let s=1;s<=segCount;s++){
    const el=document.createElement('div');
    el.className='seg'+(s===1?' cur':'');
    el.textContent='seg'+s;
    strip.appendChild(el);
  }
  // canvas frames (模拟画面)
  const canvas=$('#playCanvas');
  canvas.innerHTML='';
  const frames=['🎬','🌌','🚀','🌍','⚡','🔥','💧','❄️'];
  const fDiv=document.createElement('div');
  fDiv.className='play-frame';
  fDiv.textContent=frames[0];
  fDiv.style.background='linear-gradient(135deg,#1e3a8a,#06b6d4)';
  canvas.appendChild(fDiv);
  let fi=0;
  // 模拟转码加载
  setTimeout(()=>{
    $('#dashInfo').textContent='DASH · 播放中 · '+m.codec+' · 1080P';
  },1500);
  // 进度
  clearInterval(playTimer);
  playTimer=setInterval(()=>{
    playPos+=1;
    if(playPos>=playDur){playPos=playDur;clearInterval(playTimer)}
    const pct=playPos/playDur*100;
    $('#pcFill').style.width=pct+'%';
    $('#pcBuf').style.width=Math.min(100,pct+15)+'%';
    $('#pcTime').textContent=fmtTime(playPos)+' / '+fmtTime(playDur);
    // segment 切换
    const newSeg=Math.min(segCount,Math.floor(playPos/playDur*segCount)+1);
    if(newSeg!==curSeg){
      curSeg=newSeg;
      document.querySelectorAll('.seg').forEach((el,idx)=>{
        el.classList.remove('cur','done');
        if(idx+1<curSeg)el.classList.add('done');
        if(idx+1===curSeg)el.classList.add('cur');
      });
      // 切换画面
      fi=(fi+1)%frames.length;
      fDiv.style.opacity='0';
      setTimeout(()=>{fDiv.textContent=frames[fi];fDiv.style.opacity='.85'},250);
      const grads=['linear-gradient(135deg,#1e3a8a,#06b6d4)','linear-gradient(135deg,#7f1d1d,#f59e0b)','linear-gradient(135deg,#581c87,#ec4899)','linear-gradient(135deg,#0c4a6e,#64748b)'];
      canvas.style.background=grads[fi%grads.length];
    }
  },1000);
}
$('#playerClose').onclick=()=>{
  $('#playerOverlay').classList.remove('active');
  clearInterval(playTimer);
};
$('#ppToggle').onclick=function(){
  if(this.textContent==='⏸'){this.textContent='▶';clearInterval(playTimer)}
  else{this.textContent='⏸';
    playTimer=setInterval(()=>{
      playPos+=1;
      if(playPos>=playDur){playPos=playDur;clearInterval(playTimer)}
      $('#pcFill').style.width=playPos/playDur*100+'%';
      $('#pcTime').textContent=fmtTime(playPos)+' / '+fmtTime(playDur);
    },1000);
  }
};
$('#pcBar').onclick=function(e){
  const r=this.getBoundingClientRect();
  playPos=Math.floor((e.clientX-r.left)/r.width*playDur);
  $('#pcFill').style.width=playPos/playDur*100+'%';
  $('#pcTime').textContent=fmtTime(playPos)+' / '+fmtTime(playDur);
};
