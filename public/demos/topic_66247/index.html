<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>暖爪地图 · 流浪动物暖心地图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/pages.css">
</head>
<body>

<div class="stage">
  <!-- 装饰元素 -->
  <div class="stage-decor tl">
    <div class="h">暖爪<em style="font-style:italic;">地图</em></div>
    <div class="sub">Warm Paws Map · 2026</div>
  </div>
  <div class="stage-decor br">
    <div class="h">让每一只<br>都被<em style="font-style:italic;">看见</em></div>
    <div class="sub">Stray Animal Care Network</div>
  </div>

  <div class="phone">
    <!-- 状态栏 -->
    <div class="statusbar">
      <span>9:41</span>
      <div class="notch"></div>
      <div class="right">
        <span style="font-size:11px;font-weight:700;">●●●</span>
        <svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M2 22h20V2L2 22z"/></svg>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
      </div>
    </div>

    <div class="app">
      <!-- ============ 地图首页 ============ -->
      <section class="page active" id="page-map">
        <div class="page-scroll" id="map-scroll">
          <!-- 内容由 map.js 动态渲染 -->
        </div>
      </section>

      <!-- ============ 救助对接页 ============ -->
      <section class="page" id="page-rescue">
        <div class="page-scroll" id="rescue-scroll"></div>
      </section>

      <!-- ============ 领养科普页 ============ -->
      <section class="page" id="page-adopt">
        <div class="page-scroll" id="adopt-scroll"></div>
      </section>

      <!-- ============ 社区交流页 ============ -->
      <section class="page" id="page-community">
        <div class="page-scroll" id="community-scroll"></div>
      </section>

      <!-- ============ 个人中心页 ============ -->
      <section class="page" id="page-profile">
        <div class="page-scroll" id="profile-scroll"></div>
      </section>
    </div>

    <!-- 底部 Tab 栏 -->
    <nav class="tabbar">
      <button class="tab active" data-page="map">
        <span class="ic-wrap" data-icon="mapPin"></span>
        <span class="label">地图</span>
      </button>
      <button class="tab" data-page="rescue">
        <span class="ic-wrap" data-icon="shield"></span>
        <span class="label">救助</span>
      </button>
      <button class="tab" data-page="adopt">
        <span class="ic-wrap" data-icon="heart"></span>
        <span class="label">领养</span>
      </button>
      <button class="tab" data-page="community">
        <span class="ic-wrap" data-icon="message"></span>
        <span class="label">社区</span>
      </button>
      <button class="tab" data-page="profile">
        <span class="ic-wrap" data-icon="user"></span>
        <span class="label">我的</span>
      </button>
    </nav>

    <!-- 抽屉 -->
    <div class="sheet-mask" id="sheet-mask"></div>
    <div class="sheet" id="sheet"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>
</div>

<script src="scripts/data.js"></script>
<script src="scripts/store.js"></script>
<script src="scripts/router.js"></script>
<script src="scripts/pages/map.js"></script>
<script src="scripts/pages/rescue.js"></script>
<script src="scripts/pages/adopt.js"></script>
<script src="scripts/pages/community.js"></script>
<script src="scripts/pages/profile.js"></script>
<script>
  // 渲染 Tab 栏图标（必须在 data.js 加载后执行）
  document.querySelectorAll('[data-icon]').forEach(el => {
    el.innerHTML = Icon[el.dataset.icon];
  });
</script>
</body>
</html>
