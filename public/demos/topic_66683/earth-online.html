.choice-btn.hidden-choice {

  background: linear-gradient(135deg, rgba(255,215,64,0.08), rgba(255,110,159,0.05));
  position: relative;
  animation: hiddenReveal 0.6s ease;
}
.choice-btn.hidden-choice:hover {
  border-color: var(--gold);
  background: linear-gradient(135deg, rgba(255,215,64,0.15), rgba(255,110,159,0.08));
  box-shadow: 0 0 20px rgba(255,215,64,0.2);
}
.choice-btn.hidden-choice .choice-letter {
  background: rgba(255,215,64,0.15);
  color: var(--gold);
  animation: hiddenPulse 2s ease-in-out infinite;
}
.choice-btn.hidden-choice:hover .choice-letter {
  background: var(--gold);
  color: var(--bg);
}
.choice-btn.hidden-choice .choice-hint {
  color: var(--gold);
  font-weight: 700;
}
@keyframes hiddenReveal {
  0% { opacity: 0; transform: translateY(-12px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes hiddenPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,215,64,0.3); }
  50% { box-shadow: 0 0 0 6px rgba(255,215,64,0); }
}
.hidden-unlock-banner {
  text-align: center; padding: 8px 16px; margin-bottom: 4px;
  background: linear-gradient(135deg, rgba(255,215,64,0.1), rgba(255,110,159,0.08));
  border: 1px dashed rgba(255,215,64,0.3); border-radius: 8px;
  font-size: 12px; color: var(--gold); font-weight: 600;
  animation: hiddenReveal 0.5s ease;
}

/* === Path Summary (结局页路径回顾) === */
.path-summary {
  width: 100%; max-width: 560px;
  background: var(--bg2); border: 1px solid var(--rule);
  border-radius: 12px; padding: 20px; text-align: left;
}
.path-summary h4 {
  font-size: 14px; color: var(--muted); margin-bottom: 12px;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.path-chain {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  font-size: 13px;
}
.path-node {
  padding: 4px 10px; background: var(--bg3); border-radius: 6px;
  border: 1px solid var(--rule); color: var(--ink);
}
.path-arrow { color: var(--muted); font-size: 12px; }
.path-branch-tag {
  display: inline-block; margin-left: 4px; font-size: 10px;
  padding: 1px 5px; border-radius: 3px; background: rgba(0,229,255,0.12);
  color: var(--accent);
}

/* === Ending Type Badge === */
.ending-type-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 18px; border-radius: 20px; font-size: 14px; font-weight: 700;
  margin-top: 4px;
}
.ending-type-combo { background: linear-gradient(135deg, rgba(255,215,64,0.15), rgba(255,110,159,0.1)); color: var(--gold); border: 1px solid rgba(255,215,64,0.3); }
.ending-type-path { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.25); }
.ending-type-standard { background: var(--bg3); color: var(--muted); border: 1px solid var(--rule); }

/* === Unchosen Paths Tree === */
.unchosen-box {
  width: 100%; max-width: 560px;
  background: var(--bg2); border: 1px solid var(--rule);
  border-radius: 12px; padding: 20px; text-align: left;
}
.unchosen-box h4 { font-size: 14px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
.unchosen-stage { margin-bottom: 14px; }
.unchosen-stage:last-child { margin-bottom: 0; }
.unchosen-stage-name { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.unchosen-options { display: flex; flex-direction: column; gap: 4px; padding-left: 12px; border-left: 2px solid var(--rule); }
.unchosen-opt { font-size: 12px; color: var(--muted); padding: 3px 8px; border-radius: 4px; }
.unchosen-opt.chosen { color: var(--accent); font-weight: 600; background: rgba(0,229,255,0.06); }
.unchosen-opt.locked { opacity: 0.4; font-style: italic; }
.unchosen-opt .opt-icon { margin-right: 4px; }
</style>

<script>
// ============================================================
// 地球Online — 人生抉择模拟器 (Enhanced v3.0)
// Features: 6 stages, fate events, achievements, share card,
//   typewriter, audio, radar chart, themes, touch, PWA
// ============================================================

// === Theme System (light only) ===
function loadTheme() { return 'light'; }
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', 'light');
  document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f5f5f0');
}
setTheme(loadTheme());

// === Sound System (Web Audio API) ===
var audioCtx = null;
var soundEnabled = true;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function toggleSound() {
  soundEnabled = !soundEnabled;
  var btn = document.getElementById('soundBtn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('active', soundEnabled);
  try { localStorage.setItem('earth_online_sound', soundEnabled ? '1' : '0'); } catch(e) {}
  if (soundEnabled) { initAudio(); playTone(660, 0.08, 'sine', 0.1); }
}
function loadSoundPref() {
  try { soundEnabled = localStorage.getItem('earth_online_sound') !== '0'; } catch(e) {}
  var btn = document.getElementById('soundBtn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('active', soundEnabled);
}
function playTone(freq, duration, type, volume) {
  if (!soundEnabled || !audioCtx) return;
  type = type || 'sine'; volume = volume || 0.08;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playChoiceSound() {
  initAudio();
  playTone(523, 0.06, 'sine', 0.06);
  setTimeout(function() { playTone(659, 0.08, 'sine', 0.06); }, 50);
}
function playStageSound() {
  initAudio();
  playTone(440, 0.1, 'triangle', 0.05);
  setTimeout(function() { playTone(554, 0.1, 'triangle', 0.05); }, 80);
  setTimeout(function() { playTone(659, 0.15, 'triangle', 0.05); }, 160);
}
function playFateSound(rarity) {
  initAudio();
  var freqs = { common: [400,500], uncommon: [500,600,700], rare: [600,750,900], legendary: [523,659,784,1047] };
  var notes = freqs[rarity] || freqs.common;
  for (var i = 0; i < notes.length; i++) {
    (function(f, delay) { setTimeout(function() { playTone(f, 0.12, 'sine', 0.07); }, delay); })(notes[i], i * 100);
  }
}
function playEndingSound() {
  initAudio();
  var melody = [523, 587, 659, 698, 784, 880, 988, 1047];
  for (var i = 0; i < melody.length; i++) {
    (function(f, delay) { setTimeout(function() { playTone(f, 0.2, 'triangle', 0.06); }, delay); })(melody[i], i * 150);
  }
}
function playAchievementSound() {
  initAudio();
  playTone(784, 0.1, 'sine', 0.08);
  setTimeout(function() { playTone(988, 0.1, 'sine', 0.08); }, 80);
  setTimeout(function() { playTone(1319, 0.2, 'sine', 0.08); }, 160);
}
loadSoundPref();

// === Typewriter System ===
var twTimer = null;
var twCallback = null;
function typewriter(element, html, callback) {
  if (twTimer) { clearTimeout(twTimer); twTimer = null; }
  // Parse HTML into tokens (tags + chars)
  var tokens = [];
  var i = 0;
  while (i < html.length) {
    if (html[i] === '<') {
      var end = html.indexOf('>', i);
      if (end === -1) { tokens.push(html.slice(i)); break; }
      tokens.push(html.slice(i, end + 1));
      i = end + 1;
    } else {
      tokens.push(html[i]); i++;
    }
  }
  var idx = 0;
  var displayed = '';
  element.innerHTML = '<span class="tw-cursor"></span>';
  twCallback = callback;
  function step() {
    if (idx >= tokens.length) {
      if (twTimer) { clearTimeout(twTimer); twTimer = null; }
      element.innerHTML = displayed;
      if (twCallback) { var cb = twCallback; twCallback = null; cb(); }
      return;
    }
    displayed += tokens[idx];
    element.innerHTML = displayed + '<span class="tw-cursor"></span>';
    // Scroll narrative into view if needed
    var box = element.parentElement;
    box.scrollTop = box.scrollHeight;
    var token = tokens[idx];
    idx++;
    var delay = (token.length > 1) ? 0 : 28; // tags instant, chars 28ms
    // Punctuation pause
    if (token.length === 1 && '。！？…；'.indexOf(token) !== -1) delay = 200;
    else if (token.length === 1 && '，、'.indexOf(token) !== -1) delay = 120;
    twTimer = setTimeout(step, delay);
  }
  step();
}
function skipTypewriter() {
  if (twTimer) {
    clearTimeout(twTimer); twTimer = null;
    // Force-complete: render full content and fire callback
    var narrativeHTML = getStageNarrative(currentStage);
    if (narrativeHTML) {
      document.getElementById('narrativeText').innerHTML = narrativeHTML;
    }
    if (twCallback) { var cb = twCallback; twCallback = null; cb(); }
    return true;
  }
  return false;
}

// === Radar Chart (Canvas) ===
function drawRadarChart(canvas, values) {
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var cx = W / 2, cy = H / 2;
  var R = Math.min(W, H) / 2 - 40;
  var labels = ['健康', '财富', '快乐', '知识', '社交'];
  var icons = ['❤️', '💰', '😊', '📚', '👥'];
  var colors = ['--green', '--gold', '--accent2', '--blue', '--purple'];
  var n = labels.length;
  var style = getComputedStyle(document.documentElement);

  ctx.clearRect(0, 0, W, H);

  // Grid circles
  ctx.strokeStyle = style.getPropertyValue('--rule').trim();
  ctx.lineWidth = 1;
  for (var ring = 1; ring <= 4; ring++) {
    ctx.beginPath();
    var r = R * ring / 4;
    for (var v = 0; v <= n; v++) {
      var angle = -Math.PI / 2 + v * 2 * Math.PI / n;
      var x = cx + Math.cos(angle) * r;
      var y = cy + Math.sin(angle) * r;
      if (v === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Axis lines
  for (var a = 0; a < n; a++) {
    var ang = -Math.PI / 2 + a * 2 * Math.PI / n;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(ang) * R, cy + Math.sin(ang) * R);
    ctx.stroke();
  }

  // Data polygon
  var accent = style.getPropertyValue('--accent').trim();
  var accent2 = style.getPropertyValue('--accent2').trim();
  ctx.beginPath();
  for (var d = 0; d < n; d++) {
    var dang = -Math.PI / 2 + d * 2 * Math.PI / n;
    var dr = R * (values[d] || 0) / 100;
    var dx = cx + Math.cos(dang) * dr;
    var dy = cy + Math.sin(dang) * dr;
    if (d === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
  }
  ctx.closePath();
  // Fill with gradient
  var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
  grad.addColorStop(0, accent + '40');
  grad.addColorStop(1, accent2 + '20');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Data points
  for (var p = 0; p < n; p++) {
    var pang = -Math.PI / 2 + p * 2 * Math.PI / n;
    var pr = R * (values[p] || 0) / 100;
    var px = cx + Math.cos(pang) * pr;
    var py = cy + Math.sin(pang) * pr;
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fillStyle = style.getPropertyValue(colors[p]).trim();
    ctx.fill();
    ctx.strokeStyle = style.getPropertyValue('--bg').trim();
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Labels
  ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var inkColor = style.getPropertyValue('--ink').trim();
  var mutedColor = style.getPropertyValue('--muted').trim();
  for (var l = 0; l < n; l++) {
    var lang = -Math.PI / 2 + l * 2 * Math.PI / n;
    var lr = R + 22;
    var lx = cx + Math.cos(lang) * lr;
    var ly = cy + Math.sin(lang) * lr;
    ctx.fillStyle = mutedColor;
    ctx.font = '11px "Microsoft YaHei", sans-serif';
    ctx.fillText(icons[l] + labels[l], lx, ly - 7);
    ctx.fillStyle = inkColor;
    ctx.font = 'bold 15px "Microsoft YaHei", sans-serif';
    ctx.fillText(values[l] || 0, lx, ly + 8);
  }
}

// === Vibration ===
function vibrate(pattern) {
  if (navigator.vibrate) {
    try { navigator.vibrate(pattern); } catch(e) {}
  }
}
function shakeScreen() {
  var panel = document.getElementById('gamePanel');
  if (panel) {
    panel.classList.remove('shake');
    void panel.offsetWidth;
    panel.classList.add('shake');
  }
  vibrate([30, 50, 30]);
}

// === Touch Swipe for Choices ===
var touchStartX = 0, touchStartY = 0, currentChoiceIdx = 0;
function initTouchSwipe() {
  var area = document.getElementById('choicesArea');
  if (!area) return;
  area.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  area.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
    var btns = area.querySelectorAll('.choice-btn');
    if (btns.length === 0) return;
    if (dx < 0) {
      // Swipe left: next choice
      currentChoiceIdx = Math.min(currentChoiceIdx + 1, btns.length - 1);
    } else {
      // Swipe right: prev choice
      currentChoiceIdx = Math.max(currentChoiceIdx - 1, 0);
    }
    // Highlight current
    btns.forEach(function(b, i) {
      b.style.borderColor = (i === currentChoiceIdx) ? 'var(--accent)' : '';
      b.style.background = (i === currentChoiceIdx) ? 'rgba(0,229,255,0.06)' : '';
    });
    btns[currentChoiceIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    playTone(440 + currentChoiceIdx * 100, 0.04, 'sine', 0.04);
  }, { passive: true });
}

// === PWA Service Worker (inline registration) ===
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    // Inline SW via Blob for single-file PWA
    var swCode = [
      'var C="earth-online-cache-v3";',
      'self.addEventListener("install",function(e){self.skipWaiting();});',
      'self.addEventListener("activate",function(e){e.waitUntil(self.clients.claim());});',
      'self.addEventListener("fetch",function(e){',
      'e.respondWith(caches.open(C).then(function(cache){',
      'return cache.match(e.request).then(function(r){',
      'return r||fetch(e.request).then(function(resp){cache.put(e.request,resp.clone());return resp;});',
      '}));}));});'
    ].join('');
    try {
      var blob = new Blob([swCode], { type: 'application/javascript' });
      var swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(function(){});
    } catch(e) {}
  });
}

// --- Starfield ---
(function() {
  var canvas = document.getElementById('starsCanvas');
  var ctx = canvas.getContext('2d');
  var stars = [], W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (var i = 0; i < 120; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.5, speed: Math.random()*0.3+0.1, opacity: Math.random()*0.6+0.4 });
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + starRGB + ',' + s.opacity + ')';
      ctx.fill();
      s.y += s.speed;
      if (s.y > H + 10) { s.y = -10; s.x = Math.random() * W; }
    }
    requestAnimationFrame(draw);
  }
  // Cache star color, update on theme change
  var starRGB = '180,190,210';
  function updateStarColor() {
    starRGB = getComputedStyle(document.documentElement).getPropertyValue('--star-color').trim() || '180,190,210';
  }
  updateStarColor();
  // Watch for theme changes

// --- Persistent Storage ---
function loadAchievements() {
  try {
    var saved = JSON.parse(localStorage.getItem('earth_online_ach') || '{}');
    for (var i = 0; i < achievements.length; i++) {
      if (saved[achievements[i].id]) achievements[i].unlocked = true;
    }
  } catch(e) {}
}
function saveAchievements() {
  var saved = {};
  for (var i = 0; i < achievements.length; i++) {
    if (achievements[i].unlocked) saved[achievements[i].id] = true;
  }
  try { localStorage.setItem('earth_online_ach', JSON.stringify(saved)); } catch(e) {}
}
function loadEndingHistory() {
  try { return JSON.parse(localStorage.getItem('earth_online_endings') || '[]'); }
  catch(e) { return []; }
}
function saveEndingHistory(title) {
  var history = loadEndingHistory();
  if (history.indexOf(title) === -1) {
    history.push(title);
    try { localStorage.setItem('earth_online_endings', JSON.stringify(history)); } catch(e) {}
  }
  return history.length;
}

// --- Render Achievement Gallery ---
function renderAchGallery() {
  var iconsDiv = document.getElementById('achIcons');
  var unlockedCount = 0;
  iconsDiv.innerHTML = '';
  for (var i = 0; i < achievements.length; i++) {
    var a = achievements[i];
    if (a.unlocked) unlockedCount++;
    var div = document.createElement('div');
    div.className = 'ach-icon' + (a.unlocked ? ' unlocked' : '');
    div.textContent = a.unlocked ? a.icon : '🔒';
    div.title = a.name + ' — ' + a.desc;
    iconsDiv.appendChild(div);
  }
  document.getElementById('achProgress').textContent = unlockedCount + ' / ' + achievements.length;
}

// --- Unlock Achievement ---
function unlockAchievement(id) {
  for (var i = 0; i < achievements.length; i++) {
    if (achievements[i].id === id && !achievements[i].unlocked) {
      achievements[i].unlocked = true;
      saveAchievements();
      showAchToast(achievements[i]);
      renderAchGallery();
      return true;
    }
  }
  return false;
}
function showAchToast(ach) {
  var toast = document.createElement('div');
  toast.className = 'ach-toast';
  toast.innerHTML = '<div class="ach-toast-icon">' + ach.icon + '</div>' +
    '<div class="ach-toast-text"><div class="ach-toast-title">🏅 成就解锁：' + ach.name + '</div>' +
    '<div class="ach-toast-desc">' + ach.desc + '</div></div>';
  document.body.appendChild(toast);
  playAchievementSound();
  vibrate([40, 30, 40, 30, 60]);
  setTimeout(function() { toast.remove(); }, 3500);
}

var rarityLabels = { common: '普通', uncommon: '稀有', rare: '罕见', legendary: '传奇' };
var positiveEventCount = 0;

function triggerFateEvent(stageId) {
  // 70% chance to trigger a fate event between stages
  if (Math.random() > 0.70) return null;
  // Filter events valid for current stage
  var valid = fateEvents.filter(function(e) { return e.stages.indexOf(stageId) !== -1; });
  if (valid.length === 0) return null;
  // Weighted random by rarity
  var totalWeight = 0;
  var pool = [];
  for (var i = 0; i < valid.length; i++) {
    var w = rarityWeights[valid[i].rarity] || 10;
    totalWeight += w;
    pool.push({ event: valid[i], weight: totalWeight });
  }
  var r = Math.random() * totalWeight;
  for (var j = 0; j < pool.length; j++) {
    if (r <= pool[j].weight) return pool[j].event;
  }
  return valid[0];
}

// --- Branch Logic: check if a choice is available ---
function isChoiceAvailable(choice, stageIdx) {
  // Check requires: { stageId: choiceIndex }
  if (choice.requires) {
    for (var stageId in choice.requires) {
      var neededIdx = choice.requires[stageId];
      var made = getChoiceMade(stageId);
      if (made !== neededIdx) return false;
    }
  }
  // Check requiresAny: { stageId: [choiceIndex, ...] }
  if (choice.requiresAny) {
    for (var stageId2 in choice.requiresAny) {
      var neededIdxs = choice.requiresAny[stageId2];
      var made2 = getChoiceMade(stageId2);
      if (made2 === null || neededIdxs.indexOf(made2) === -1) return false;
    }
  }
  // Check requiresStat: { stat: minValue, statMax: maxValue(optional) }
  if (choice.requiresStat) {
    for (var statKey in choice.requiresStat) {
      if (statKey.endsWith('Max')) {
        var realKey = statKey.slice(0, -3);
        if (stats[realKey] > choice.requiresStat[statKey]) return false;
      } else {
        if (stats[statKey] < choice.requiresStat[statKey]) return false;
      }
    }
  }
  return true;
}

// Get which choice index was made at a given stage (by stage id), or null
function getChoiceMade(stageId) {
  for (var i = 0; i < stageChoicesMade.length; i++) {
    if (stageChoicesMade[i].stage === stageId) return stageChoicesMade[i].choice;
  }
  return null;
}

// Get available choices for current stage (filtered by branch logic)
function getAvailableChoices(stageIdx) {
  var stage = stages[stageIdx];
  return stage.choices.filter(function(c, idx) {
    return isChoiceAvailable(c, stageIdx);
  });
}

// --- Helpers ---
function clamp(v) { return Math.max(0, Math.min(100, v)); }

function updateStat(key, delta) {
  var oldVal = stats[key];
  stats[key] = clamp(stats[key] + delta);
  var el = document.getElementById('stat' + key.charAt(0).toUpperCase() + key.slice(1));
  var bar = document.getElementById('bar' + key.charAt(0).toUpperCase() + key.slice(1));
  if (el) {
    el.textContent = stats[key];
    if (delta !== 0) {
      el.classList.remove('stat-flash-up', 'stat-flash-down');
      void el.offsetWidth;
      el.classList.add(delta > 0 ? 'stat-flash-up' : 'stat-flash-down');
    }
  }
  if (bar) bar.style.width = stats[key] + '%';
}

function showToast(msg) {
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 2500);
}

function addLog(stage, msg, effects, isEvent) {
  logEntries.push({ stage: stage, msg: msg, effects: effects });
  var logDiv = document.getElementById('logEntries');
  var div = document.createElement('div');
  div.className = 'log-entry';
  var html = '<span class="log-' + (isEvent ? 'event' : 'stage') + '">[' + stage + ']</span> ' + msg;
  if (effects) {
    for (var k in effects) {
      if (effects[k] > 0) html += ' <span class="log-up">+' + effects[k] + '</span>';
      else if (effects[k] < 0) html += ' <span class="log-down">' + effects[k] + '</span>';
    }
  }
  div.innerHTML = html;
  logDiv.appendChild(div);
  logDiv.parentElement.scrollTop = logDiv.parentElement.scrollHeight;
}

function renderFateEvent(event) {
  currentFateEvent = event;
  inFatePhase = true;
  var box = document.getElementById('fateBox');
  var stage = stages[currentStage]; // current stage (the one just completed)
  // Update stage info to show fate phase
  document.getElementById('stageBadge').textContent = '命运插曲';
  document.getElementById('stageName').textContent = '⚡ ' + stage.name + '期间 · 命运降临';
  document.getElementById('stageAge').textContent = '';

  // Hide narrative and choices
  document.getElementById('narrativeText').parentElement.classList.add('hidden');
  var ca = document.getElementById('choicesArea');
  ca.classList.remove('fading');
  ca.classList.add('hidden-during-transition');
  ca.innerHTML = '';
  var nbox = document.querySelector('.narrative-box');
  if (nbox) nbox.classList.remove('fading');

  var labels = { health:'❤️健康', wealth:'💰财富', happiness:'😊快乐', knowledge:'📚知识', social:'👥社交' };
  var rarityClass = 'rarity-' + event.rarity;

  var html = '<div class="fate-box ' + rarityClass + '">';
  html += '<div class="fate-header">';
  html += '<span class="fate-icon">' + event.icon + '</span>';
  html += '<span class="fate-title">' + event.title + '</span>';
  html += '<span class="fate-rarity-badge ' + rarityClass + '">' + rarityLabels[event.rarity] + '</span>';
  html += '</div>';
  html += '<div class="fate-body">';
  html += '<div class="fate-desc">' + event.desc + '</div>';

  if (event.interactive) {
    // Interactive event: show choices
    html += '<div class="fate-prompt">' + event.prompt + '</div>';
    html += '<div class="fate-choices">';
    var letters = ['A','B','C','D'];
    for (var i = 0; i < event.choices.length; i++) {
      html += '<button class="fate-choice-btn" onclick="resolveFateChoice(' + i + ')">';
      html += '<span class="choice-letter">' + letters[i] + '</span>';
      html += '<span>' + event.choices[i].text + '</span>';
      html += '</button>';
    }
    html += '</div>';
  } else {
    // Passive event: show effects + continue button
    if (event.effects) {
      html += '<div class="fate-effects">';
      for (var k in event.effects) {
        var cls = event.effects[k] > 0 ? 'event-effect-up' : 'event-effect-down';
        var sign = event.effects[k] > 0 ? '+' : '';
        html += '<span class="event-effect-tag ' + cls + '">' + labels[k] + ' ' + sign + event.effects[k] + '</span>';

  }
  html += '</div></div>';

  box.innerHTML = html;
  box.classList.remove('hidden');
  box.scrollIntoView({ behavior: 'smooth' });
  playFateSound(event.rarity);
  if (event.type === 'negative') { vibrate([30, 50, 30]); shakeScreen(); }
}

function resolveFateChoice(choiceIdx) {
  if (!currentFateEvent || !currentFateEvent.interactive) return;
  var choice = currentFateEvent.choices[choiceIdx];
  for (var k in choice.effects) { updateStat(k, choice.effects[k]); }
  addLog('命运', currentFateEvent.title + '：' + choice.log, choice.effects, true);
  if (currentFateEvent.type === 'positive') positiveEventCount++;
  else if (currentFateEvent.type === 'negative') negativeEventCount++;
  showToast('命运已做出回应…');
  playChoiceSound();
  vibrate(20);

  // Replace fate box content with result + continue
  var box = document.getElementById('fateBox');
  var labels = { health:'❤️健康', wealth:'💰财富', happiness:'😊快乐', knowledge:'📚知识', social:'👥社交' };
  var html = '<div class="fate-box rarity-' + currentFateEvent.rarity + '">';
  html += '<div class="fate-header">';
  html += '<span class="fate-icon">' + currentFateEvent.icon + '</span>';
  html += '<span class="fate-title">' + currentFateEvent.title + ' · 结果</span>';
  html += '</div><div class="fate-body">';
  html += '<div class="fate-desc">' + choice.log + '</div>';
  if (choice.effects) {
    html += '<div class="fate-effects">';
    for (var k2 in choice.effects) {
      var cls = choice.effects[k2] > 0 ? 'event-effect-up' : 'event-effect-down';
      var sign = choice.effects[k2] > 0 ? '+' : '';
      html += '<span class="event-effect-tag ' + cls + '">' + labels[k2] + ' ' + sign + choice.effects[k2] + '</span>';
    }
    html += '</div>';
  }
  html += '<button class="fate-continue-btn" onclick="continueFromFate()">继续人生 ▸</button>';
  html += '</div></div>';
  box.innerHTML = html;
}

function continueFromFate() {
  inFatePhase = false;
  currentFateEvent = null;
  document.getElementById('fateBox').classList.add('hidden');
  document.getElementById('fateBox').innerHTML = '';
  document.getElementById('narrativeText').parentElement.classList.remove('hidden');
  currentStage++;
  setTimeout(function() { renderStage(); }, 300);
}

// --- Render Stage ---
function renderStage() {
  if (currentStage >= stages.length) { showEnding(); return; }
  // Hide fate box, show narrative
  document.getElementById('fateBox').classList.add('hidden');
  document.getElementById('fateBox').innerHTML = '';
  document.getElementById('narrativeText').parentElement.classList.remove('hidden');
  inFatePhase = false;

  // === Reset transition states: remove fading classes, clear old content ===
  var choicesArea = document.getElementById('choicesArea');
  choicesArea.classList.remove('fading');
  choicesArea.classList.add('hidden-during-transition'); // hide until typewriter done
  choicesArea.innerHTML = '';
  var narrativeBox = document.querySelector('.narrative-box');
  if (narrativeBox) narrativeBox.classList.remove('fading');

  var stage = stages[currentStage];
  document.getElementById('stageBadge').textContent = stage.name;
  document.getElementById('stageName').textContent = stage.chapter;
  document.getElementById('stageAge').textContent = '年龄: ' + stage.age;

  // Get dynamic narrative (may change based on prior choices)
  var narrativeHTML = getStageNarrative(currentStage);

  // Typewriter narrative
  var narrativeEl = document.getElementById('narrativeText');
  narrativeEl.innerHTML = ''; // clear old narrative immediately
  // Render choices after typewriter completes
  typewriter(narrativeEl, narrativeHTML, function() {
    var ca = document.getElementById('choicesArea');
    ca.classList.remove('hidden-during-transition'); // show choices container
    ca.innerHTML = '';
    currentChoiceIdx = 0;
    // Get available choices (filtered by branch logic)
    var available = getAvailableChoices(currentStage);
    var letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
    if (available.length === 0) {
      // Fallback: show all choices if none available (shouldn't happen, but safety)
      available = stage.choices;
    }
    // Check if any hidden choices are unlocked
    var hasHiddenUnlocked = false;
    for (var hi = 0; hi < available.length; hi++) {
      if (available[hi].hidden) { hasHiddenUnlocked = true; break; }
    }
    if (hasHiddenUnlocked) {
      var banner = document.createElement('div');
      banner.className = 'hidden-unlock-banner';
      banner.textContent = '✨ 特殊机缘已解锁 —— 你的积累为你打开了隐藏的道路';
      ca.appendChild(banner);
      playTone(880, 0.15, 'sine', 0.06);
      setTimeout(function() { playTone(1109, 0.15, 'sine', 0.06); }, 100);
    }
    for (var i = 0; i < available.length; i++) {
      (function(displayIdx, choice) {
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        if (choice.hidden) {
          btn.classList.add('hidden-choice');
        }
        // Add branch indicator if this choice has requirements
        var branchIcon = '';
        if (choice.hidden) branchIcon = ' ✨';
        else if (choice.requires || choice.requiresAny) branchIcon = ' 🔀';
        else if (choice.requiresStat) branchIcon = ' 📊';
        btn.innerHTML = '<span class="choice-letter">' + letters[displayIdx] + '</span>' +
          '<span>' + choice.text + branchIcon + '</span>' +
          '<span class="choice-hint">[' + choice.hint + ']</span>';
        // Store original index in data attribute
        var originalIdx = stage.choices.indexOf(choice);
        btn.setAttribute('data-orig-idx', originalIdx);
        btn.addEventListener('click', function() { makeChoice(originalIdx); });
        ca.appendChild(btn);
      })(i, available[i]);
    }
  });

  // Play stage transition sound
  playStageSound();
  document.getElementById('gamePanel').scrollIntoView({ behavior: 'smooth' });
}

// --- Make Choice ---
function makeChoice(choiceIdx) {
  if (gameOver || inFatePhase) return;
  // Skip typewriter if still running (click on narrative area)
  if (twTimer) { skipTypewriter(); return; }

  playChoiceSound();
  vibrate(20);

  // === Immediately hide choices and fade narrative for clean transition ===
  var choicesArea = document.getElementById('choicesArea');
  choicesArea.classList.add('fading');
  var narrativeBox = document.querySelector('.narrative-box');
  if (narrativeBox) narrativeBox.classList.add('fading');

  var stage = stages[currentStage];
  var choice = stage.choices[choiceIdx];
  stageChoicesMade.push({ stage: stage.id, choice: choiceIdx });

  for (var k in choice.effects) { updateStat(k, choice.effects[k]); }
  addLog(stage.name, choice.log, choice.effects, false);
  if (choice.hidden) {
    showToast('✨ 你触发了隐藏机缘：' + choice.hint + '！');
    playAchievementSound();
    vibrate([40, 30, 60]);
  } else {
    showToast('你的选择影响了命运轨迹…');
  }

  // Check if a fate event triggers between this stage and the next
  var fateEvent = triggerFateEvent(stage.id);
  if (fateEvent) {
    // Apply passive event effects immediately, log it
    if (!fateEvent.interactive && fateEvent.effects) {
      for (var k2 in fateEvent.effects) { updateStat(k2, fateEvent.effects[k2]); }
      addLog('命运', fateEvent.title + '：' + fateEvent.log, fateEvent.effects, true);
      if (fateEvent.type === 'positive') positiveEventCount++;
      else if (fateEvent.type === 'negative') negativeEventCount++;
    }
    // Show fate event (interactive ones get effects applied on choice)
    setTimeout(function() { renderFateEvent(fateEvent); }, 500);
  } else {
    // No fate event, proceed to next stage
    currentStage++;
    setTimeout(function() { renderStage(); }, 600);
  }
}

// === Path Ending Detection (路径结局) — analyzes choice patterns ===
function detectPathEnding() {
  var riskScore = 0;       // +ve = risky, -ve = safe
  var consistencyScore = 0; // +ve = consistent, -ve = variable
  var hiddenCount = 0;
  var lastPosRatio = -1;

  for (var i = 0; i < stageChoicesMade.length; i++) {
    var entry = stageChoicesMade[i];
    var stage = null;
    for (var j = 0; j < stages.length; j++) {
      if (stages[j].id === entry.stage) { stage = stages[j]; break; }
    }
    if (!stage || entry.choice >= stage.choices.length) continue;
    var choice = stage.choices[entry.choice];

    // Hidden choice count
    if (choice.hidden) hiddenCount++;

    // Risk assessment: large negative trade-offs = risky
    var negSum = 0, posSum = 0;
    var eff = choice.effects || {};
    for (var k in eff) {
      if (eff[k] < 0) negSum += Math.abs(eff[k]);
      else posSum += eff[k];
    }
    if (negSum >= 12) riskScore += 2;
    else if (negSum >= 6) riskScore += 1;
    else if (negSum <= 2) riskScore -= 1;

    // Consistency: compare position ratio across stages
    var posRatio = entry.choice / Math.max(1, stage.choices.length - 1);
    if (lastPosRatio >= 0) {
      if (Math.abs(posRatio - lastPosRatio) <= 0.25) consistencyScore += 1;
      else consistencyScore -= 1;
    }
    lastPosRatio = posRatio;
  }

  // --- Path ending triggers (highest priority first) ---
  if (riskScore >= 7 && hiddenCount >= 2) {
    return { title: '🐉 传奇冒险家', rank: 'SSS 级人生 · 冒险传奇',
      desc: '你一生都在挑战极限，不断做出大胆的选择，甚至连隐藏的机遇都被你一一捕获。你的人生如同一部惊心动魄的冒险史诗，每一步都走在悬崖边缘，却始终化险为夷。',
      quote: '"不冒险，才是最大的冒险。你选择了最危险的路，也看见了最美的风景。"' };
  }
  if (riskScore >= 5) {
    return { title: '⚡ 冒险人生', rank: 'S 级人生 · 冒险者',
      desc: '你天生热爱挑战，总是选择那条更刺激、更不确定的路。有人说你鲁莽，但你深知：人生最大的遗憾不是失败，而是从未尝试。你的冒险精神让生命绽放出别样的光彩。',
      quote: '"宁可轰轰烈烈地燃烧，不愿平平淡淡地苟活。"' };
  }
  if (riskScore <= -3 && consistencyScore >= 5) {
    return { title: '🛡️ 稳健人生', rank: 'S 级人生 · 稳健者',
      desc: '你一生稳重踏实，每一步都深思熟虑，从不冒进。也许你错过了些刺激的风景，但你避开了无数暗礁。当他人跌宕起伏时，你始终稳步前行，最终到达了属于自己的彼岸。',
      quote: '"慢即是快，稳即是赢。人生不是百米冲刺，而是一场马拉松。"' };
  }
  if (consistencyScore <= -4) {
    return { title: '🦎 变色龙人生', rank: 'A 级人生 · 多变者',
      desc: '你的每一次选择都出人意料，从不走同一条路。有人说你善变，但你知道——人生本就该充满可能。你的多变让你体验了常人难以企及的丰富人生，每个阶段都是一个全新的自己。',
      quote: '"不要把人生过成一条直线，要让它成为一幅绚丽的万花筒。"' };
  }
  if (Math.abs(riskScore) <= 2 && Math.abs(consistencyScore) <= 2 && stageChoicesMade.length >= 8) {
    return { title: '⚖️ 中庸之道', rank: 'A 级人生 · 平衡者',
      desc: '你既不冒进也不保守，既不一成不变也不朝三暮四。你在冒险与稳健之间找到了微妙的平衡，走出了属于自己的中庸之道。这不是平庸，而是历经思考后的从容选择。',
      quote: '"中庸不是和稀泥，而是在两极之间找到最优解。"' };
  }
  return null;
}

// === Unchosen Paths Tree (你未选择的路) ===
function renderUnchosenTree() {
  var treeHtml = '';
  var stageNames = { infancy:'婴儿期', childhood:'童年', teenage:'少年', university:'大学期', young_adult:'青年', career_peak:'职场巅峰', middle_age:'中年', pre_retirement:'退休过渡', retirement:'退休生活', elder:'晚年', final_days:'暮年' };

  for (var i = 0; i < stages.length; i++) {
    var stage = stages[i];
    var chosenIdx = getChoiceMade(stage.id);
    treeHtml += '<div class="unchosen-stage">';
    treeHtml += '<div class="unchosen-stage-name">' + (stageNames[stage.id] || stage.name) + '</div>';
    treeHtml += '<div class="unchosen-options">';

    for (var c = 0; c < stage.choices.length; c++) {
      var choice = stage.choices[c];
      var available = isChoiceAvailable(choice, i);
      var isChosen = (chosenIdx === c);
      var cls = 'unchosen-opt';
      var icon, text;

      if (isChosen) {
        cls += ' chosen';
        icon = '✅';
        text = choice.hint || choice.text.substring(0, 12);
      } else if (available) {
        icon = '○';
        text = choice.hint || choice.text.substring(0, 12);
      } else {
        cls += ' locked';
        icon = '🔒';
        text = choice.hidden ? '???' : (choice.hint || choice.text.substring(0, 12));
      }
      // Mark hidden choices
      if (choice.hidden && (isChosen || available)) {
        text = '✨ ' + text;
      }
      treeHtml += '<div class="' + cls + '"><span class="opt-icon">' + icon + '</span>' + text + '</div>';
    }
    treeHtml += '</div></div>';
  }
  document.getElementById('unchosenTree').innerHTML = treeHtml;
}

var lastEndingData = null; // stores ending info for redraw/download

// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

function drawShareCard(data) {
  lastEndingData = data;
  var canvas = document.getElementById('shareCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  // === Healing pastel palette ===
  var mint = '#a8e6cf';
  var skyBlue = '#bde0fe';
  var softPink = '#ffc8dd';
  var lavender = '#cdb4db';
  var textDark = '#4a4a5e';
  var textMid = '#7a7a8e';
  var textLight = '#aaaabb';
  var white = '#ffffff';

  // Stat pastel colors
  var statColors = [
    { label: '健康', icon: '🌱', val: data.stats.health, color: '#81c784', bg: '#e8f5e9' },
    { label: '财富', icon: '🍃', val: data.stats.wealth, color: '#ffb74d', bg: '#fff3e0' },
    { label: '快乐', icon: '🌸', val: data.stats.happiness, color: '#f48fb1', bg: '#fce4ec' },
    { label: '知识', icon: '💧', val: data.stats.knowledge, color: '#64b5f6', bg: '#e3f2fd' },
    { label: '社交', icon: '🌷', val: data.stats.social, color: '#ba68c8', bg: '#f3e5f5' }
  ];

  // === Background: soft pastel gradient ===
  var bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#e0f7fa');
  bgGrad.addColorStop(0.35, '#f1f8e9');
  bgGrad.addColorStop(0.7, '#fce4ec');
  bgGrad.addColorStop(1, '#f3e5f5');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // === Decorative soft circles (bubbles) ===
  ctx.save();
  var bubbles = [
    { x: 80, y: 100, r: 40, c: mint, a: 0.15 },
    { x: 520, y: 70, r: 55, c: skyBlue, a: 0.12 },
    { x: 40, y: 550, r: 35, c: softPink, a: 0.15 },
    { x: 560, y: 500, r: 45, c: lavender, a: 0.1 },
    { x: 80, y: 920, r: 50, c: mint, a: 0.12 },
    { x: 520, y: 960, r: 38, c: skyBlue, a: 0.15 },
    { x: 300, y: 40, r: 25, c: softPink, a: 0.1 },
    { x: 500, y: 800, r: 30, c: mint, a: 0.12 },
    { x: 20, y: 400, r: 28, c: lavender, a: 0.1 }
  ];
  for (var b = 0; b < bubbles.length; b++) {
    var bu = bubbles[b];
    ctx.globalAlpha = bu.a;
    ctx.fillStyle = bu.c;
    ctx.beginPath();
    ctx.arc(bu.x, bu.y, bu.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // === Small floating dots (sparkles) ===
  ctx.save();
  for (var d = 0; d < 35; d++) {
    var dx = Math.random() * W;
    var dy = Math.random() * H;
    var dr = Math.random() * 2 + 0.5;
    ctx.globalAlpha = Math.random() * 0.3 + 0.1;
    ctx.fillStyle = white;
    ctx.beginPath();
    ctx.arc(dx, dy, dr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // === Main card area (rounded white panel) ===
  var cardX = 50, cardY = 60, cardW = W - 100, cardH = H - 120;
  var cardBottom = cardY + cardH;
  ctx.save();
  ctx.shadowColor = 'rgba(160,180,200,0.25)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 4;
  ctx.fillStyle = white;
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, 24);
  ctx.fill();
  ctx.restore();

  // === Top wreath decoration: soft arc ===
  ctx.save();
  ctx.strokeStyle = mint;
  ctx.lineWidth = 2.5;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.arc(W / 2, cardY + 70, 28, Math.PI * 0.2, Math.PI * 0.8);
  ctx.stroke();
  ctx.strokeStyle = softPink;
  ctx.beginPath();
  ctx.arc(W / 2, cardY + 70, 22, Math.PI * 0.3, Math.PI * 0.7);
  ctx.stroke();
  ctx.restore();

  // Small leaves on the arc
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🌿', W / 2 - 26, cardY + 62);
  ctx.fillText('🌿', W / 2 + 26, cardY + 62);
  ctx.restore();

  // === Header ===
  ctx.textAlign = 'center';
  ctx.font = 'bold 26px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#5b6ef5';
  ctx.fillText('🌍 地球 Online', W / 2, cardY + 125);

  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = textLight;
  ctx.fillText('～ 人生抉择模拟器 ～', W / 2, cardY + 147);

  // === Character name section ===
  var nameY = cardY + 185;
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = textLight;
  ctx.fillText('✿  角色名  ✿', W / 2, nameY);

  ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = textDark;
  ctx.fillText(data.playerName, W / 2, nameY + 28);

  // === Ending title ===
  var titleY = nameY + 68;
  ctx.font = 'bold 30px "Segoe UI", system-ui, sans-serif';
  var titleGrad = ctx.createLinearGradient(0, titleY - 25, 0, titleY + 10);
  titleGrad.addColorStop(0, '#5b6ef5');
  titleGrad.addColorStop(1, '#e85a8a');
  ctx.fillStyle = titleGrad;
  ctx.fillText(data.title, W / 2, titleY);

  // === Rank badge (pill shape) ===
  var rankY = titleY + 28;
  ctx.font = 'bold 15px "Segoe UI", system-ui, sans-serif';
  var rankText = data.rank;
  var rankW = ctx.measureText(rankText).width + 36;
  var rankX = (W - rankW) / 2;
  var badgeGrad = ctx.createLinearGradient(rankX, 0, rankX + rankW, 0);
  badgeGrad.addColorStop(0, '#e3f2fd');
  badgeGrad.addColorStop(1, '#fce4ec');
  ctx.fillStyle = badgeGrad;
  ctx.beginPath();
  ctx.roundRect(rankX, rankY, rankW, 30, 15);
  ctx.fill();
  ctx.strokeStyle = '#5b6ef5';
  ctx.globalAlpha = 0.2;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#5b6ef5';
  ctx.fillText(rankText, W / 2, rankY + 20);

  // === Ending type ===
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = textMid;
  ctx.fillText(data.typeLabel, W / 2, rankY + 48);

  // === Stat bars section ===
  var statStartY = rankY + 80;
  var statBarX = 100;
  var statBarW = W - 200;
  var statRowH = 32;

  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = textLight;
  ctx.fillText('— 人生属性 —', W / 2, statStartY);
  ctx.textAlign = 'left';

  for (var i = 0; i < statColors.length; i++) {
    var st = statColors[i];
    var sy = statStartY + 22 + i * statRowH;

    // Icon + label
    ctx.textAlign = 'left';
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = st.color;
    ctx.fillText(st.icon, statBarX, sy);
    ctx.font = '13px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = textMid;
    ctx.fillText(st.label, statBarX + 22, sy);

    // Value
    ctx.textAlign = 'right';
    ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = st.color;
    ctx.fillText(st.val, W - statBarX, sy);
    ctx.textAlign = 'left';

    // Bar background
    ctx.fillStyle = st.bg;
    ctx.beginPath();
    ctx.roundRect(statBarX, sy + 7, statBarW, 7, 3.5);
    ctx.fill();

    // Bar fill
    var fillW = statBarW * (st.val / 100);
    if (fillW > 0) {
      var fillGrad = ctx.createLinearGradient(statBarX, 0, statBarX + fillW, 0);
      fillGrad.addColorStop(0, st.color);
      fillGrad.addColorStop(1, st.color + 'cc');
      ctx.fillStyle = fillGrad;
      ctx.beginPath();
      ctx.roundRect(statBarX, sy + 7, Math.max(fillW, 4), 7, 3.5);
      ctx.fill();
    }
  }

  // === Quote section ===
  var statsEndY = statStartY + 22 + statColors.length * statRowH;
  var quoteY = statsEndY + 25;
  var quoteBoxX = 80, quoteBoxW = W - 160;
  var quoteBoxH = 105;

  ctx.save();
  ctx.shadowColor = 'rgba(200,180,220,0.15)';
  ctx.shadowBlur = 10;
  var quoteBgGrad = ctx.createLinearGradient(0, quoteY, 0, quoteY + quoteBoxH);
  quoteBgGrad.addColorStop(0, '#f8f0fc');
  quoteBgGrad.addColorStop(1, '#e8f5e9');
  ctx.fillStyle = quoteBgGrad;
  ctx.beginPath();
  ctx.roundRect(quoteBoxX, quoteY, quoteBoxW, quoteBoxH, 16);
  ctx.fill();
  ctx.restore();

  // Left border accent
  ctx.fillStyle = '#ba68c8';
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.roundRect(quoteBoxX, quoteY, 4, quoteBoxH, 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Quote text
  ctx.textAlign = 'center';
  ctx.font = 'italic 14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = textDark;
  var quoteLines = wrapText(ctx, data.quote, quoteBoxW - 60);
  var quoteLineH = 22;
  var quoteTotalH = quoteLines.length * quoteLineH;
  var quoteStartY = quoteY + (quoteBoxH - quoteTotalH) / 2 + 12;
  for (var ql = 0; ql < quoteLines.length; ql++) {
    ctx.fillText(quoteLines[ql], W / 2, quoteStartY + ql * quoteLineH);
  }

  // === Description ===
  var descY = quoteY + quoteBoxH + 22;
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = textMid;
  var descLines = wrapText(ctx, data.desc, W - 140);
  // Limit to 5 lines to prevent overflow
  var maxDescLines = 5;
  for (var dl = 0; dl < Math.min(descLines.length, maxDescLines); dl++) {
    var lineText = descLines[dl];
    if (dl === maxDescLines - 1 && descLines.length > maxDescLines) {
      lineText = lineText.substring(0, lineText.length - 2) + '…';
    }
    ctx.fillText(lineText, W / 2, descY + dl * 17);
  }

  // === Footer (positioned relative to card bottom) ===
  var footerY = cardBottom - 55;
  ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#5b6ef5';
  ctx.fillText('🌍 地球Online', W / 2, footerY);
  ctx.font = '10px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = textLight;
  ctx.fillText('～ 你的人生，由你书写 ～', W / 2, footerY + 18);

  // === Bottom decorative line ===
  ctx.strokeStyle = mint;
  ctx.globalAlpha = 0.4;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 40, footerY + 32);
  ctx.lineTo(W / 2 + 40, footerY + 32);
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.font = '10px sans-serif';
  ctx.fillText('✿', W / 2, footerY + 36);
}

// --- Word-wrap helper for Canvas text ---
function wrapText(ctx, text, maxWidth) {
  var lines = [];
  // Remove surrounding quotes for display
  var clean = text.replace(/^["""']+|["""']+$/g, '');
  // Try character-by-character wrap (for Chinese)
  var current = '';
  for (var i = 0; i < clean.length; i++) {
    var test = current + clean[i];
    if (ctx.measureText(test).width > maxWidth && current.length > 0) {
      lines.push(current);
      current = clean[i];
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

// --- Download Share Image ---
function downloadShareImage() {
  var canvas = document.getElementById('shareCanvas');
  if (!canvas || !lastEndingData) { showToast('分享图未生成'); return; }
  try {
    var dataUrl = canvas.toDataURL('image/png');
    var link = document.createElement('a');
    link.download = '地球Online_' + lastEndingData.playerName + '_结局.png';
    link.href = dataUrl;
    document.body.appendChild(link);
    link.click();
    link.remove();
    showToast('分享图已保存！快去炫耀你的人生吧~');
  } catch(e) {
    showToast('保存失败：' + e.message);
  }
}

// --- Start Game ---
function startGame() {
  var nameInput = document.getElementById('playerName');
  playerName = (nameInput.value.trim() || '冒险者').substring(0, 12);
  stats = { health: 50, wealth: 50, happiness: 50, knowledge: 50, social: 50 };
  currentStage = 0; logEntries = []; gameOver = false;
  stageChoicesMade = []; positiveEventCount = 0; negativeEventCount = 0;
  currentFateEvent = null; inFatePhase = false;
  for (var k in stats) { updateStat(k, 0); }
  document.getElementById('logEntries').innerHTML = '';
  document.getElementById('fateBox').classList.add('hidden');
  document.getElementById('fateBox').innerHTML = '';
  document.getElementById('narrativeText').parentElement.classList.remove('hidden');
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('gamePanel').classList.remove('hidden');
  document.getElementById('endingScreen').classList.add('hidden');
  showToast('欢迎，' + playerName + '！你的人生即将开始…');
  initTouchSwipe();
  // Allow click on narrative to skip typewriter
  var nbox = document.querySelector('.narrative-box');
  if (nbox && !nbox._skipBound) {
    nbox._skipBound = true;
    nbox.addEventListener('click', function() {
      if (twTimer) {
        // Force-complete typewriter: render remaining content
        var narrativeHTML = getStageNarrative(currentStage);
        if (narrativeHTML) {
          clearTimeout(twTimer); twTimer = null;
          document.getElementById('narrativeText').innerHTML = narrativeHTML;
          if (twCallback) { var cb = twCallback; twCallback = null; cb(); }
        }
      }
    });
  }
  renderStage();
}

// --- Restart ---
function restartGame() {
  document.getElementById('gamePanel').classList.add('hidden');
  document.getElementById('endingScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');
  document.getElementById('playerName').value = '';
  document.getElementById('logEntries').innerHTML = '';
  stats = { health: 50, wealth: 50, happiness: 50, knowledge: 50, social: 50 };
  currentStage = 0; logEntries = []; gameOver = false;
  positiveEventCount = 0; negativeEventCount = 0;
  currentFateEvent = null; inFatePhase = false;
  for (var k in stats) { updateStat(k, 0); }
  document.getElementById('fateBox').classList.add('hidden');
  document.getElementById('fateBox').innerHTML = '';
  document.getElementById('narrativeText').parentElement.classList.remove('hidden');
  renderAchGallery();
  document.getElementById('titleScreen').scrollIntoView({ behavior: 'smooth' });
}

// --- Init ---
loadAchievements();
renderAchGallery();
</script>
