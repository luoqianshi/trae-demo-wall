<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>插了个旗 Flagme — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fef9f4;--bg-alt:#fff5ed;--card:#fff;--text:#2d2d2d;--text-light:#6b6b6b;--text-muted:#aaa;--accent:#ff7676;--accent-dark:#e85d5d;--accent-light:#fff0ed;--yellow:#ffd966;--yellow-dark:#b8960f;--green:#51cf66;--green-dark:#2b8a3e;--green-light:#e8f8ec;--blue:#4d9de0;--blue-light:#e3f2fd;--purple:#c779e0;--purple-light:#f3e5f5;--orange:#ff9a3c;--border:#f0ebe3;--radius:16px;--radius-sm:10px;--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:#1a1a2e;color:var(--text);line-height:1.6;overflow-x:hidden}
input,button,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Full-screen Planet Background — pure CSS */
#planet-fullscreen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;background:radial-gradient(ellipse at 50% 50%,#2a2a4e 0%,#1a1a2e 70%)}

/* Stars */
.stars-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur,3s) ease-in-out infinite alternate;animation-delay:var(--delay,0s)}
@keyframes twinkle{0%{opacity:.2}100%{opacity:1}}
.shooting-star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;box-shadow:0 0 6px #fff;animation:shoot 4s linear infinite;animation-delay:var(--delay,0s);opacity:0}
@keyframes shoot{0%{opacity:0;transform:translate(0,0)}5%{opacity:1}15%{opacity:1;transform:translate(120px,80px)}20%{opacity:0;transform:translate(160px,107px)}100%{opacity:0;transform:translate(160px,107px)}}

/* Planet */
.planet-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:var(--ps,200px);height:var(--ps,200px)}
.planet-ring-back,.planet-ring-front{position:absolute;top:50%;left:50%;width:300%;height:60%;border:2px solid #ffa94d;border-radius:50%;transform:translate(-50%,-50%) rotate(-14deg) scaleY(.2)}
.planet-ring-back{clip-path:polygon(0 0,100% 0,100% 50%,0 50%)}
.planet-ring-front{clip-path:polygon(0 50%,100% 50%,100% 100%,0 100%)}
.planet-rotating{position:absolute;top:0;left:0;width:100%;height:100%;animation:planetSpin 60s linear infinite;will-change:transform}
@keyframes planetSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.planet-body{position:absolute;top:50%;left:50%;width:100%;height:100%;border-radius:50%;background:#ff7676;transform:translate(-50%,-50%);overflow:hidden;box-shadow:inset -20px -20px 50px rgba(0,0,0,.2)}
.flag-on-planet{position:absolute;width:0;height:0}
.flags-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
@keyframes flagWave{0%{transform:scaleX(1)}100%{transform:scaleX(.82)}}
.flag-pole{position:absolute;width:2px;height:28px;background:linear-gradient(to right,rgba(255,255,255,.3),rgba(255,255,255,.8),rgba(255,255,255,.3));bottom:0;left:-1px;border-radius:1px}
.flag-cloth{position:absolute;width:16px;height:12px;bottom:16px;left:1px;clip-path:polygon(0 0,100% 0,75% 50%,100% 100%,0 100%);transform-origin:left center;animation:flagWave 2.5s ease-in-out infinite alternate;border-radius:0 2px 2px 0;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* Top Nav — floating */
.topnav{position:fixed;top:0;left:0;width:100%;z-index:50;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.topnav .logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.topnav .logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:0 4px 12px rgba(255,118,118,.4)}
.nav-btns{display:flex;gap:8px;align-items:center}
.nav-btn{padding:8px 14px;border-radius:20px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);color:#fff;font-size:13px;font-weight:500;border:1px solid rgba(255,255,255,.2);cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-btn:hover{background:rgba(255,255,255,.25)}
.nav-btn.active{background:var(--accent);border-color:var(--accent)}


/* Planet Stats — floating top */
.planet-stats-bar{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:32px;padding:12px 24px;border-radius:24px;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15)}
.pstat{text-align:center}
.pstat .num{font-size:22px;font-weight:800;color:#fff}
.pstat .label{font-size:11px;color:rgba(255,255,255,.6)}

/* Bottom Nav — floating bottom */
.bottomnav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;padding:8px;border-radius:24px;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15)}

/* Slide-up Panel */
.panel-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:80}
.panel-overlay.show{display:block}
.panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;max-height:85vh;background:var(--bg);border-radius:24px 24px 0 0;z-index:90;transition:transform .3s ease;overflow-y:auto;box-shadow:0 -8px 32px rgba(0,0,0,.15)}
.panel.show{transform:translateX(-50%) translateY(0)}
.panel-header{position:sticky;top:0;background:var(--bg);padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);z-index:10}
.panel-title{font-size:20px;font-weight:700}
.panel-close{width:32px;height:32px;border-radius:50%;background:var(--bg-alt);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-light);font-size:18px}
.panel-body{padding:16px 20px 40px}

/* Todo Items */
.todo-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);margin-bottom:8px;transition:all .2s;flex-wrap:wrap}
.todo-item:hover{border-color:var(--accent)}
.todo-item.completed{background:var(--green-light);border-color:var(--green)}
.todo-main{display:flex;align-items:center;gap:12px;width:100%}
.todo-checkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.todo-checkbox:hover{border-color:var(--accent)}
.todo-item.completed .todo-checkbox{background:var(--green);border-color:var(--green)}
.todo-checkbox::after{content:'';width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) scale(0);transition:transform .2s}
.todo-item.completed .todo-checkbox::after{transform:rotate(45deg) scale(1)}
.todo-text{flex:1;font-size:14px}
.todo-item.completed .todo-text{text-decoration:line-through;color:var(--text-muted)}
.todo-tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500;white-space:nowrap}
.tag-photo{background:var(--blue-light);color:#1565c0}
.tag-quiz{background:var(--accent-light);color:var(--accent-dark)}
.tag-video{background:var(--purple-light);color:#7b1fa2}
.tag-done{background:var(--green-light);color:var(--green-dark)}
.todo-actions{display:flex;gap:6px}
.todo-btn{padding:4px 10px;border-radius:8px;font-size:12px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-verify{background:var(--accent);color:#fff}
.btn-verify:hover{background:var(--accent-dark)}
.btn-split{background:var(--blue-light);color:#1565c0}
.btn-split:hover{background:var(--blue);color:#fff}

/* Subtask Tree (inline display after split) */
.subtask-tree{width:100%;margin-top:8px;padding-left:24px;border-left:2px dashed var(--border);display:flex;flex-direction:column;gap:6px}
.subtask-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);font-size:13px;animation:slideIn .3s ease forwards;opacity:0}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.subtask-num{width:22px;height:22px;border-radius:50%;background:var(--blue-light);color:#1565c0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.subtask-text{flex:1;color:var(--text-light)}
.subtask-text.done{text-decoration:line-through;color:var(--text-muted)}
.subtask-verify-btn{padding:3px 8px;border-radius:6px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:10px;white-space:nowrap}
.subtask-verify-btn:hover{background:var(--accent-dark)}

/* Split Modal — editable subtask rows */
.split-subtask-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.split-subtask-row input{flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:var(--card);transition:border-color .2s}
.split-subtask-row input:focus{border-color:var(--accent)}
.split-subtask-row select{padding:8px;border:2px solid var(--border);border-radius:8px;font-size:12px;background:var(--card);color:var(--text-light);outline:none}
.split-remove-btn{width:28px;height:28px;border-radius:50%;background:var(--bg-alt);border:none;cursor:pointer;color:var(--text-muted);font-size:16px;flex-shrink:0;transition:all .2s}
.split-remove-btn:hover{background:var(--accent);color:#fff}
.add-subtask-btn{width:100%;padding:10px;border:2px dashed var(--border);border-radius:8px;background:transparent;color:var(--text-light);font-size:13px;cursor:pointer;transition:all .2s;margin-top:4px}
.add-subtask-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Add Todo */
.add-todo{display:flex;gap:8px;margin-bottom:16px}
.add-todo input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;transition:border-color .2s;background:var(--card)}
.add-todo input:focus{border-color:var(--accent)}
.add-todo select{padding:12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--card);color:var(--text-light);outline:none}
.add-btn{padding:12px 18px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:background .2s}
.add-btn:hover{background:var(--accent-dark)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;max-width:380px;width:90%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:16px}
.modal-close{float:right;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1}

/* Verify Methods */
.verify-methods{display:flex;gap:8px;margin-bottom:16px}
.vm-btn{flex:1;padding:12px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--card);cursor:pointer;font-size:13px;text-align:center;transition:all .2s;color:var(--text-light)}
.vm-btn:hover,.vm-btn.selected{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.vm-btn.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:28px;text-align:center;color:var(--text-muted);font-size:14px;cursor:pointer;transition:all .2s;margin-bottom:12px}
.upload-area:hover{border-color:var(--accent);color:var(--accent)}
.upload-area.uploaded{border-color:var(--green);border-style:solid;background:var(--green-light);color:var(--green-dark)}
.submit-btn{width:100%;padding:14px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:background .2s}
.submit-btn:hover{background:var(--accent-dark)}
.submit-btn:disabled{background:var(--text-muted);cursor:not-allowed}

/* AI Thinking */
.ai-thinking{display:flex;align-items:center;gap:8px;color:var(--text-light);font-size:14px;padding:16px 0}
.ai-dots{display:flex;gap:4px}
.ai-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite ease-in-out both}
.ai-dots span:nth-child(2){animation-delay:.16s}
.ai-dots span:nth-child(3){animation-delay:.32s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.ai-verdict{padding:16px;border-radius:var(--radius-sm);font-size:14px;line-height:1.6}
.ai-verdict.pass{background:var(--green-light);border:1px solid var(--green);color:var(--green-dark)}
.ai-verdict.fail{background:#fff0f0;border:1px solid var(--accent);color:var(--accent-dark)}

/* Friends */
.friend-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);margin-bottom:8px;transition:all .2s;cursor:pointer}
.friend-item:hover{border-color:var(--accent)}
.friend-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:600;flex-shrink:0}
.friend-info{flex:1}
.friend-name{font-size:14px;font-weight:600}
.friend-stat{font-size:12px;color:var(--text-muted)}
.friend-flag-btn{padding:6px 12px;border-radius:8px;background:var(--accent-light);color:var(--accent-dark);border:1px solid var(--accent);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.friend-flag-btn:hover{background:var(--accent);color:#fff}

/* Flag Sent */
.flag-sent-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.flag-sent-item:last-child{border-bottom:none}
.flag-sent-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0}
.flag-sent-text{flex:1;color:var(--text-light)}
.flag-sent-status{font-size:10px;padding:2px 8px;border-radius:6px}
.st-pending{background:#fff8e0;color:var(--yellow-dark)}
.st-done{background:var(--green-light);color:var(--green-dark)}

/* Modal Input */
.modal-input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;margin-bottom:16px;background:var(--card)}
.modal-input:focus{border-color:var(--accent)}
.modal-buttons{display:flex;gap:12px;justify-content:flex-end}
.mbtn{padding:10px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:14px;font-weight:500}
.mbtn-cancel{background:var(--bg-alt);color:var(--text-light)}
.mbtn-confirm{background:var(--accent);color:#fff}

/* Friend Planet Overlay */
.friend-planet-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;z-index:85;flex-direction:column;align-items:center;justify-content:center}
.friend-planet-overlay.show{display:flex}
.friend-planet-overlay .close-btn{position:absolute;top:20px;right:20px;color:#fff;font-size:24px;cursor:pointer;background:rgba(255,255,255,.2);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:5}
.friend-planet-overlay .fp-name{color:#fff;font-size:20px;font-weight:700;margin-top:16px}
.friend-planet-overlay .fp-stats{color:rgba(255,255,255,.6);font-size:13px;margin-top:4px}

/* Flag Burst */
.flag-burst{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;pointer-events:none;opacity:0;transition:all .5s}
.flag-burst.show{opacity:1;transform:translate(-50%,-60%) scale(1.2)}
.flag-burst .emoji{font-size:64px}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* Section label */
.sec-label{font-size:14px;font-weight:600;color:var(--text-light);margin:16px 0 8px}
</style>
</head>
<body>

<!-- Full-screen Planet — pure CSS -->
<div id="planet-fullscreen">
  <div class="stars-bg" id="stars-bg"></div>
  <div class="planet-wrap" id="main-planet-wrap">
    <div class="planet-ring-back"></div>
    <div class="planet-rotating" id="main-planet-rotating">
      <div class="planet-body"></div>
    </div>
    <div class="flags-container" id="main-flags"></div>
    <div class="planet-ring-front"></div>
  </div>
</div>

<!-- Top Nav -->
<div class="topnav">
  <div class="logo">
    <div class="logo-icon">⚑</div>
    <span>插了个旗</span>
  </div>
</div>

<!-- Planet Stats Bar -->
<div class="planet-stats-bar">
  <div class="pstat"><div class="num" id="stat-flags">0</div><div class="label">旗帜</div></div>
  <div class="pstat"><div class="num" id="stat-total">0</div><div class="label">总任务</div></div>
  <div class="pstat"><div class="num" id="stat-rate">0%</div><div class="label">完成率</div></div>
</div>

<!-- Bottom Nav -->
<div class="bottomnav">
  <div class="nav-btn" onclick="openPanel('tasks')">我的任务</div>
  <div class="nav-btn" onclick="openPanel('flags')">好友列表</div>
</div>

<!-- Panel Overlay -->
<div class="panel-overlay" id="panel-overlay" onclick="closeAllPanels()"></div>

<!-- Panel: Tasks -->
<div class="panel" id="panel-tasks">
  <div class="panel-header">
    <div class="panel-title">我的任务</div>
    <div class="panel-close" onclick="closeAllPanels()">&times;</div>
  </div>
  <div class="panel-body">
    <div class="add-todo">
      <input type="text" id="todo-input" placeholder="添加任务..." onkeypress="if(event.key==='Enter')addTodo()">
      <select id="todo-method">
        <option value="photo">拍照</option>
        <option value="quiz">答题</option>
        <option value="video">视频</option>
      </select>
      <button class="add-btn" onclick="addTodo()">添加</button>
    </div>
    <div class="sec-label">待完成</div>
    <div id="todo-pending"></div>
    <div id="completed-section" style="display:none">
      <div class="sec-label">已完成</div>
      <div id="todo-completed"></div>
    </div>
  </div>
</div>

<!-- Panel: Flags -->
<div class="panel" id="panel-flags">
  <div class="panel-header">
    <div class="panel-title">好友列表</div>
    <div class="panel-close" onclick="closeAllPanels()">&times;</div>
  </div>
  <div class="panel-body">
    <div class="sec-label">给好友的 flag</div>
    <div class="card" style="background:var(--card);border-radius:var(--radius-sm);padding:16px;border:1px solid var(--border)">
      <div id="flag-sent-list"></div>
    </div>
    <div class="sec-label" style="margin-top:20px">好友列表</div>
    <div id="friend-list"></div>
  </div>
</div>

<!-- Verify Modal -->
<div class="modal-overlay" id="verify-modal">
  <div class="modal">
    <span class="modal-close" onclick="closeVerifyModal()">&times;</span>
    <h3>AI 验证</h3>
    <div id="verify-task-name" style="font-size:15px;font-weight:600;margin-bottom:16px"></div>
    <div class="verify-methods">
      <div class="vm-btn selected" id="vm-photo" onclick="selectVerifyMethod('photo')">📷 拍照</div>
      <div class="vm-btn" id="vm-quiz" onclick="selectVerifyMethod('quiz')">🧠 答题</div>
      <div class="vm-btn" id="vm-video" onclick="selectVerifyMethod('video')">📹 视频</div>
    </div>
    <div class="upload-area" id="upload-area" onclick="simulateUpload()">📷 点击上传完成证据</div>
    <button class="submit-btn" id="verify-submit" onclick="submitVerify()" disabled>提交 AI 验证</button>
    <div id="ai-result" style="margin-top:16px"></div>
  </div>
</div>

<!-- Flag Modal -->
<div class="modal-overlay" id="flag-modal">
  <div class="modal">
    <span class="modal-close" onclick="closeFlagModal()">&times;</span>
    <h3>给 <span id="flag-friend-name"></span> 立个 flag</h3>
    <input type="text" class="modal-input" id="flag-input" placeholder="输入你想让 TA 完成的事..." onkeypress="if(event.key==='Enter')confirmFlag()">
    <div class="modal-buttons">
      <button class="mbtn mbtn-cancel" onclick="closeFlagModal()">取消</button>
      <button class="mbtn mbtn-confirm" onclick="confirmFlag()">插旗！</button>
    </div>
  </div>
</div>

<!-- Split Modal -->
<div class="modal-overlay" id="split-modal">
  <div class="modal">
    <span class="modal-close" onclick="closeSplitModal()">&times;</span>
    <h3>AI 拆解任务</h3>
    <div id="split-task-name" style="font-size:15px;font-weight:600;margin-bottom:16px"></div>
    <div id="split-subtasks"></div>
    <button class="add-subtask-btn" onclick="addSubtaskRow()">+ 添加子任务</button>
    <div class="modal-buttons" style="margin-top:16px">
      <button class="mbtn mbtn-cancel" onclick="closeSplitModal()">取消</button>
      <button class="mbtn mbtn-confirm" onclick="confirmSplit()">确认</button>
    </div>
  </div>
</div>

<!-- Friend Planet Overlay -->
<div class="friend-planet-overlay" id="friend-planet-overlay">
  <div class="close-btn" onclick="closeFriendPlanet()">&times;</div>
  <div class="stars-bg" id="fp-stars-bg"></div>
  <div class="planet-wrap" id="fp-planet-wrap" style="--ps:160px">
    <div class="planet-ring-back" id="fp-ring-back"></div>
    <div class="planet-rotating" id="fp-planet-rotating">
      <div class="planet-body" id="fp-planet-body"></div>
    </div>
    <div class="flags-container" id="fp-flags"></div>
    <div class="planet-ring-front" id="fp-ring-front"></div>
  </div>
  <div class="fp-name" id="fp-name"></div>
  <div class="fp-stats" id="fp-stats"></div>
</div>

<!-- Flag Burst -->
<div class="flag-burst" id="flag-burst"><div class="emoji">⚑</div></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== Global State ====================
let state = {
  todos: [
    {id:1, text:'晨跑 3 公里', method:'photo', status:'pending', subtasks:null},
    {id:2, text:'读书 30 分钟', method:'quiz', status:'pending', subtasks:null},
    {id:3, text:'完成毕业论文', method:'video', status:'pending', subtasks:null},
    {id:4, text:'喝 8 杯水', method:'photo', status:'completed', subtasks:null}
  ],
  friends: [
    {id:1, name:'小王', avatar:'王', color:'#ff7676', flags:8, total:11},
    {id:2, name:'阿零', avatar:'零', color:'#4d9de0', flags:15, total:16},
    {id:3, name:'大熊', avatar:'熊', color:'#51cf66', flags:3, total:7}
  ],
  flagsSent: [
    {friendId:1, friendName:'小王', friendAvatar:'王', friendColor:'#ff7676', text:'本周跑两次 5 公里', status:'pending'},
    {friendId:2, friendName:'阿零', friendAvatar:'零', friendColor:'#4d9de0', text:'读完《三体》', status:'done'},
    {friendId:3, friendName:'大熊', friendAvatar:'熊', friendColor:'#51cf66', text:'早睡早起 7 天', status:'pending'}
  ],
  nextTodoId: 5,
  currentVerifyTask: null,
  currentVerifySubtask: null,
  currentVerifyMethod: 'photo',
  uploaded: false,
  flagColors: ['#ff6b6b','#ffd93d','#6bcf7f','#4d9de0','#c779e0','#ff9a3c']
};

// ==================== Panel Management ====================
function openPanel(name) {
  closeAllPanels();
  document.getElementById('panel-overlay').classList.add('show');
  document.getElementById('panel-' + name).classList.add('show');
  if (name === 'tasks') renderTodos();
  if (name === 'flags') { renderFlagsSent(); renderFriendsInFlags(); }
}

function closeAllPanels() {
  document.getElementById('panel-overlay').classList.remove('show');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
}

// ==================== Todo Management ====================
function renderTodos() {
  const pending = state.todos.filter(t => t.status === 'pending');
  const completed = state.todos.filter(t => t.status === 'completed');
  const methodLabels = {photo:'拍照', quiz:'答题', video:'视频'};
  const methodTags = {photo:'tag-photo', quiz:'tag-quiz', video:'tag-video'};

  document.getElementById('todo-pending').innerHTML = pending.map(t => {
    const subtaskTree = t.subtasks && t.subtasks.length > 0 ? renderSubtaskTree(t.id, t.subtasks) : '';
    const hasSubtasks = t.subtasks && t.subtasks.length > 0;
    const methodTag = hasSubtasks ? '' : `<span class="todo-tag ${methodTags[t.method]}">${methodLabels[t.method]}</span>`;
    return `
    <div class="todo-item" data-id="${t.id}">
      <div class="todo-main">
        <div class="todo-checkbox" onclick="toggleTodo(${t.id})"></div>
        ${methodTag}
        <span class="todo-text">${t.text}</span>
        <div class="todo-actions">
          <button class="todo-btn btn-split" onclick="openSplitModal(${t.id})">AI 拆解</button>
          <button class="todo-btn btn-verify" onclick="startVerify(${t.id})">验证</button>
        </div>
      </div>
      ${subtaskTree}
    </div>
  `;
  }).join('');

  document.getElementById('todo-completed').innerHTML = completed.map(t => `
    <div class="todo-item completed">
      <div class="todo-main">
        <div class="todo-checkbox" onclick="toggleTodo(${t.id})"></div>
        <span class="todo-text">${t.text}</span>
        <span class="todo-tag tag-done">已完成</span>
      </div>
    </div>
  `).join('');

  document.getElementById('completed-section').style.display = completed.length > 0 ? 'block' : 'none';
  updatePlanetStats();
}

function addTodo() {
  const input = document.getElementById('todo-input');
  const method = document.getElementById('todo-method').value;
  const text = input.value.trim();
  if (!text) return;
  state.todos.push({id: state.nextTodoId++, text, method, status:'pending', subtasks:null});
  input.value = '';
  renderTodos();
  showToast('任务已添加');
}

function toggleTodo(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  if (todo.status === 'completed') {
    todo.status = 'pending';
    renderTodos();
  } else {
    showToast('需要 AI 验证才能完成');
  }
}

// ==================== AI Task Split (Modal) ====================
function renderSubtaskTree(parentId, subtasks) {
  const methodLabels = {photo:'拍照', quiz:'答题', video:'视频'};
  const methodTags = {photo:'tag-photo', quiz:'tag-quiz', video:'tag-video'};
  return `<div class="subtask-tree">
    ${subtasks.map((st, i) => {
      const tagClass = methodTags[st.method];
      const tagText = methodLabels[st.method];
      const done = st.status === 'completed';
      return `<div class="subtask-item" style="animation-delay:${i*0.08}s">
        <div class="subtask-num">${i+1}</div>
        <span class="todo-tag ${tagClass}">${tagText}</span>
        <div class="subtask-text ${done ? 'done' : ''}">${st.text}</div>
        ${done
          ? '<span class="todo-tag tag-done">已完成</span>'
          : `<button class="subtask-verify-btn" onclick="startVerifySubtask(${parentId}, ${i})">验证</button>`}
      </div>`;
    }).join('')}
  </div>`;
}

function getSubtasks(task) {
  const presets = {
    '完成毕业论文': [
      {text:'确定论文选题和大纲', method:'quiz'},
      {text:'收集和整理参考文献', method:'photo'},
      {text:'完成引言部分初稿', method:'quiz'},
      {text:'完成正文三章', method:'video'},
      {text:'导师审阅并修改', method:'quiz'},
      {text:'格式排版定稿', method:'photo'}
    ],
    '晨跑 3 公里': [
      {text:'准备跑鞋和运动装备', method:'photo'},
      {text:'热身拉伸 5 分钟', method:'video'},
      {text:'完成 3 公里跑步', method:'photo'},
      {text:'记录运动数据', method:'photo'}
    ],
    '读书 30 分钟': [
      {text:'选择要读的书和章节', method:'quiz'},
      {text:'专注阅读 30 分钟', method:'photo'},
      {text:'记录读书笔记', method:'photo'}
    ]
  };
  if (presets[task]) return presets[task];
  return [
    {text:'分析"' + task + '"的需求', method:'quiz'},
    {text:'收集相关资料', method:'photo'},
    {text:'执行核心工作', method:'video'},
    {text:'检查并完善', method:'quiz'}
  ];
}

let currentSplitTask = null;
let splitSubtaskRows = [];

function openSplitModal(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  currentSplitTask = todo;
  if (!todo.subtasks) {
    todo.subtasks = getSubtasks(todo.text);
  }
  splitSubtaskRows = todo.subtasks.map(st => ({text: st.text, method: st.method, status: st.status || 'pending'}));
  document.getElementById('split-task-name').textContent = '任务：' + todo.text;
  renderSplitSubtasks();
  document.getElementById('split-modal').classList.add('show');
}

function renderSplitSubtasks() {
  const container = document.getElementById('split-subtasks');
  container.innerHTML = splitSubtaskRows.map((row, i) => `
    <div class="split-subtask-row">
      <input type="text" value="${row.text.replace(/"/g, '&quot;')}" onchange="updateSubtaskRow(${i}, 'text', this.value)" placeholder="子任务内容...">
      <select onchange="updateSubtaskRow(${i}, 'method', this.value)">
        <option value="photo" ${row.method==='photo'?'selected':''}>拍照</option>
        <option value="quiz" ${row.method==='quiz'?'selected':''}>答题</option>
        <option value="video" ${row.method==='video'?'selected':''}>视频</option>
      </select>
      <button class="split-remove-btn" onclick="removeSubtaskRow(${i})">&times;</button>
    </div>
  `).join('');
}

function updateSubtaskRow(index, field, value) {
  splitSubtaskRows[index][field] = value;
}

function addSubtaskRow() {
  splitSubtaskRows.push({text: '', method: 'photo', status: 'pending'});
  renderSplitSubtasks();
  const inputs = document.querySelectorAll('#split-subtasks input');
  if (inputs.length > 0) inputs[inputs.length - 1].focus();
}

function removeSubtaskRow(index) {
  splitSubtaskRows.splice(index, 1);
  renderSplitSubtasks();
}

function confirmSplit() {
  const validSubtasks = splitSubtaskRows.filter(r => r.text.trim()).map(r => ({
    text: r.text.trim(),
    method: r.method,
    status: r.status || 'pending'
  }));
  if (validSubtasks.length === 0) {
    showToast('请至少添加一个子任务');
    return;
  }
  currentSplitTask.subtasks = validSubtasks;
  closeSplitModal();
  renderTodos();
  showToast('已拆解为 ' + validSubtasks.length + ' 个子任务');
}

function closeSplitModal() {
  document.getElementById('split-modal').classList.remove('show');
}

// ==================== AI Verify ====================
function startVerify(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  state.currentVerifyTask = todo;
  state.currentVerifySubtask = null;
  state.currentVerifyMethod = todo.method;
  state.uploaded = false;

  document.getElementById('verify-task-name').textContent = '验证任务：' + todo.text;
  selectVerifyMethod(todo.method);
  document.getElementById('upload-area').className = 'upload-area';
  document.getElementById('upload-area').innerHTML = getUploadText(todo.method);
  document.getElementById('verify-submit').disabled = true;
  document.getElementById('verify-submit').textContent = '提交 AI 验证';
  document.getElementById('ai-result').innerHTML = '';
  document.getElementById('verify-modal').classList.add('show');
}

function startVerifySubtask(taskId, subtaskIndex) {
  const todo = state.todos.find(t => t.id === taskId);
  if (!todo || !todo.subtasks || !todo.subtasks[subtaskIndex]) return;
  const subtask = todo.subtasks[subtaskIndex];
  state.currentVerifyTask = todo;
  state.currentVerifySubtask = subtaskIndex;
  state.currentVerifyMethod = subtask.method;
  state.uploaded = false;

  document.getElementById('verify-task-name').textContent = '验证子任务：' + subtask.text;
  selectVerifyMethod(subtask.method);
  document.getElementById('upload-area').className = 'upload-area';
  document.getElementById('upload-area').innerHTML = getUploadText(subtask.method);
  document.getElementById('verify-submit').disabled = true;
  document.getElementById('verify-submit').textContent = '提交 AI 验证';
  document.getElementById('ai-result').innerHTML = '';
  document.getElementById('verify-modal').classList.add('show');
}

function getUploadText(method) {
  const icons = {photo:'📷', quiz:'🧠', video:'📹'};
  const labels = {photo:'拍照', quiz:'答题', video:'录制视频'};
  return icons[method] + ' 点击上传完成证据（' + labels[method] + '）';
}

function selectVerifyMethod(method) {
  state.currentVerifyMethod = method;
  const methods = ['photo', 'quiz', 'video'];
  methods.forEach(m => {
    const btn = document.getElementById('vm-' + m);
    btn.classList.remove('selected', 'disabled');
    if (m === method) {
      btn.classList.add('selected');
    } else {
      btn.classList.add('disabled');
    }
  });
  state.uploaded = false;
  const ua = document.getElementById('upload-area');
  ua.className = 'upload-area';
  ua.innerHTML = getUploadText(method);
  document.getElementById('verify-submit').disabled = true;
}

function simulateUpload() {
  state.uploaded = true;
  const ua = document.getElementById('upload-area');
  ua.className = 'upload-area uploaded';
  const icons = {photo:'📷', quiz:'🧠', video:'📹'};
  ua.innerHTML = icons[state.currentVerifyMethod] + ' 证据已上传，点击"提交"让 AI 验证';
  document.getElementById('verify-submit').disabled = false;
}

function submitVerify() {
  document.getElementById('verify-submit').disabled = true;
  document.getElementById('ai-result').innerHTML = '<div class="ai-thinking"><span>AI 分析中</span><div class="ai-dots"><span></span><span></span><span></span></div></div>';

  setTimeout(() => {
    const pass = Math.random() > 0.25;
    const result = document.getElementById('ai-result');
    const task = state.currentVerifyTask;
    const isSubtask = state.currentVerifySubtask !== null;
    const verifyText = isSubtask ? task.subtasks[state.currentVerifySubtask].text : task.text;

    if (pass) {
      result.innerHTML = '<div class="ai-verdict pass">✅ <strong>AI 验证通过！</strong><br>“' + getAiComment(verifyText) + '”<br><br>' + (isSubtask ? '子任务已完成！' : '任务已完成，星球上多了一面旗帜！') + '</div>';
      if (isSubtask) {
        task.subtasks[state.currentVerifySubtask].status = 'completed';
      } else {
        task.status = 'completed';
      }
      setTimeout(() => {
        closeVerifyModal();
        renderTodos();
        triggerFlagBurst();
        showToast(isSubtask ? '子任务已完成！' : '旗帜已插入星球！');
      }, 1500);
    } else {
      result.innerHTML = '<div class="ai-verdict fail">❓ <strong>AI 认为证据不足</strong><br>“' + getAiQuestion(verifyText) + '”<br><br>请补充证据后重新提交。</div>';
      document.getElementById('verify-submit').disabled = false;
      document.getElementById('verify-submit').textContent = '重新提交';
    }
  }, 2000);
}

function getAiComment(task) {
  const comments = {
    '晨跑 3 公里': '照片中可以看到运动表和跑道，GPS 数据与任务匹配。干得漂亮！',
    '读书 30 分钟': '你正确回答了书中的关键内容，阅读时长符合要求。继续保持！',
    '完成毕业论文': '视频中可以看到论文的完整内容，逻辑清晰，表达流畅。',
    '喝 8 杯水': '打卡记录完整，8 杯水全部确认。'
  };
  return comments[task] || '证据充分，任务完成质量很高！';
}

function getAiQuestion(task) {
  const questions = {
    '晨跑 3 公里': '照片中的跑道看起来像是公园，但 GPS 数据未上传。能提供运动 App 截图吗？',
    '读书 30 分钟': '你的回答有几处与书中原文不符，是否需要重新阅读相关章节？',
    '完成毕业论文': '视频时长偏短，内容似乎未覆盖论文核心要点。能补充完整版本吗？'
  };
  return questions[task] || '证据似乎不够充分，能提供更多细节吗？';
}

function closeVerifyModal() {
  document.getElementById('verify-modal').classList.remove('show');
}

// ==================== Flags Sent ====================
function renderFlagsSent() {
  const list = document.getElementById('flag-sent-list');
  list.innerHTML = state.flagsSent.map(f => {
    const statusClass = f.status === 'done' ? 'st-done' : 'st-pending';
    const statusText = f.status === 'done' ? '已完成' : '待完成';
    return `<div class="flag-sent-item">
      <div class="flag-sent-avatar" style="background:${f.friendColor}">${f.friendAvatar}</div>
      <div class="flag-sent-text">给 ${f.friendName}：${f.text}</div>
      <span class="flag-sent-status ${statusClass}">${statusText}</span>
    </div>`;
  }).join('') || '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:12px">还没有给好友立 flag</div>';
}

function renderFriendsInFlags() {
  const list = document.getElementById('friend-list');
  list.innerHTML = state.friends.map(f => {
    const rate = Math.round(f.flags / f.total * 100);
    return `<div class="friend-item" onclick="viewFriendPlanet(${f.id})">
      <div class="friend-avatar" style="background:${f.color}">${f.avatar}</div>
      <div class="friend-info">
        <div class="friend-name">${f.name}</div>
        <div class="friend-stat">已插 ${f.flags} 面旗 · 完成率 ${rate}%</div>
      </div>
      <button class="friend-flag-btn" onclick="event.stopPropagation();openFlagModal(${f.id})">给 TA 立 flag</button>
    </div>`;
  }).join('');
}

// ==================== Flag Modal ====================
let currentFlagFriend = null;
function openFlagModal(friendId) {
  const friend = state.friends.find(f => f.id === friendId);
  if (!friend) return;
  currentFlagFriend = friend;
  document.getElementById('flag-friend-name').textContent = friend.name;
  document.getElementById('flag-input').value = '';
  document.getElementById('flag-modal').classList.add('show');
  document.getElementById('flag-input').focus();
}

function closeFlagModal() {
  document.getElementById('flag-modal').classList.remove('show');
}

function confirmFlag() {
  const text = document.getElementById('flag-input').value.trim();
  if (!text || !currentFlagFriend) return;
  state.flagsSent.unshift({
    friendId: currentFlagFriend.id,
    friendName: currentFlagFriend.name,
    friendAvatar: currentFlagFriend.avatar,
    friendColor: currentFlagFriend.color,
    text: text,
    status: 'pending'
  });
  renderFlagsSent();
  renderFriendsInFlags();
  closeFlagModal();
  showToast('已给 ' + currentFlagFriend.name + ' 立了 flag！');
}

// ==================== Stars (CSS) ====================
function generateStars(containerId, count) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 1.5 + 0.8;
    star.style.cssText = 'left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;width:' + size + 'px;height:' + size + 'px;--dur:' + (Math.random()*2+2) + 's;--delay:' + (Math.random()*3) + 's';
    container.appendChild(star);
  }
  for (let i = 0; i < 2; i++) {
    const ss = document.createElement('div');
    ss.className = 'shooting-star';
    ss.style.cssText = 'left:' + (Math.random()*60) + '%;top:' + (Math.random()*30) + '%;--delay:' + (i*7+Math.random()*3) + 's';
    container.appendChild(ss);
  }
}

// ==================== Flags on Planet (CSS) ====================
function renderFlagsOnPlanet(containerId, count, planetSize) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  const r = planetSize / 2;
  for (let i = 0; i < count; i++) {
    const angle = goldenAngle * i;
    const x = Math.cos(angle) * r;
    const y = Math.sin(angle) * r;
    const deg = angle * 180 / Math.PI + 90;
    const flag = document.createElement('div');
    flag.className = 'flag-on-planet';
    const color = state.flagColors[i % state.flagColors.length];
    flag.style.cssText = 'left:calc(50% + ' + x + 'px);top:calc(50% + ' + y + 'px);transform:rotate(' + deg + 'deg)';
    flag.innerHTML = '<div class="flag-pole"></div><div class="flag-cloth" style="background:' + color + ';animation-delay:' + (i*0.15) + 's"></div>';
    container.appendChild(flag);
  }
}

// ==================== Friend Planet (CSS) ====================
function viewFriendPlanet(friendId) {
  const friend = state.friends.find(f => f.id === friendId);
  if (!friend) return;
  closeAllPanels();
  document.getElementById('fp-name').textContent = friend.name + ' 的星球';
  const rate = Math.round(friend.flags / friend.total * 100);
  document.getElementById('fp-stats').textContent = '已插 ' + friend.flags + ' 面旗 · 完成率 ' + rate + '%';
  document.getElementById('fp-planet-body').style.background = friend.color;
  document.getElementById('fp-ring-back').style.borderColor = friend.color;
  document.getElementById('fp-ring-front').style.borderColor = friend.color;
  generateStars('fp-stars-bg', 40);
  renderFlagsOnPlanet('fp-flags', friend.flags, 160);
  document.getElementById('friend-planet-overlay').classList.add('show');
}

function closeFriendPlanet() {
  document.getElementById('friend-planet-overlay').classList.remove('show');
}

// ==================== Main Planet (CSS) ====================
function initMainPlanet() {
  generateStars('stars-bg', 120);
  updateMainPlanetFlags();
}

function updateMainPlanetFlags() {
  const completed = state.todos.filter(t => t.status === 'completed').length;
  let planetSize = Math.min(window.innerWidth, window.innerHeight) * 0.32;
  if (planetSize < 100) planetSize = 200;
  document.getElementById('main-planet-wrap').style.setProperty('--ps', planetSize + 'px');
  renderFlagsOnPlanet('main-flags', completed, planetSize);
}

function updatePlanetStats() {
  const completed = state.todos.filter(t => t.status === 'completed').length;
  const total = state.todos.length;
  const rate = total > 0 ? Math.round(completed / total * 100) : 0;
  document.getElementById('stat-flags').textContent = completed;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-rate').textContent = rate + '%';
  updateMainPlanetFlags();
}

// ==================== Animations ====================
function triggerFlagBurst() {
  const burst = document.getElementById('flag-burst');
  burst.classList.add('show');
  setTimeout(() => burst.classList.remove('show'), 800);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ==================== Init ====================
initMainPlanet();
updatePlanetStats();
window.addEventListener('resize', function() {
  updateMainPlanetFlags();
});
</script>
</body>
</html>
