<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FocusPal - AI 学习监督官</title>
<style>
:root{--bg:#0a0e17;--card:#1a1f35;--sec:#111827;--border:#1e293b;--text:#f8fafc;--muted:#94a3b8;--pri:#6366f1;--cyan:#22d3ee;--ok:#10b981;--warn:#f59e0b;--danger:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
.gtext{background:linear-gradient(135deg,var(--pri),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn{border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:500;cursor:pointer}
.btn-p{background:linear-gradient(135deg,var(--pri),var(--cyan));color:#fff}
.btn-g{background:var(--sec);border:1px solid var(--border);color:var(--text)}
.btn-ai{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff}
.btn-sm{padding:7px 12px;font-size:13px}
input,textarea{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--sec);color:var(--text);font-size:14px}
input:focus,textarea:focus{outline:none;border-color:var(--pri)}
#app{display:flex;min-height:100vh}
.side{width:210px;background:var(--card);border-right:1px solid var(--border);padding:20px 12px;flex-shrink:0}
.logo{font-weight:700;font-size:1.05rem;margin-bottom:24px;padding:0 8px}
.nav{padding:11px 12px;border-radius:10px;color:var(--muted);cursor:pointer;margin-bottom:4px;font-size:14px}
.nav:hover,.nav.on{background:rgba(99,102,241,.15);color:var(--text)}
.nav.on{border-left:3px solid var(--pri)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.top{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(26,31,53,.9)}
.lv{padding:4px 10px;border-radius:20px;background:rgba(99,102,241,.2);color:var(--cyan);font-size:12px}
.body{padding:22px;overflow-y:auto;flex:1}
.pt{font-size:22px;font-weight:700;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.sv{font-size:26px;font-weight:700;margin:6px 0 2px}
.sl{font-size:12px;color:var(--muted)}
.chip{display:inline-block;padding:6px 12px;border-radius:18px;background:var(--sec);border:1px solid var(--border);font-size:13px;cursor:pointer;margin:0 6px 6px 0;color:var(--muted)}
.chip.on{border-color:var(--pri);background:rgba(99,102,241,.15);color:var(--text)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row input{flex:1;min-width:180px}
.task{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.th{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer}
.ck{width:18px;height:18px;border-radius:50%;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;cursor:pointer}
.ck.on{background:var(--ok);border-color:var(--ok);color:#fff}
.bar{height:4px;background:var(--sec);border-radius:2px;margin-top:6px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--pri),var(--cyan))}
.tree{padding:0 14px 14px 40px}
.nd{padding:7px 10px;margin:3px 0;border-radius:8px;background:var(--sec);font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer}
.nd.l2{margin-left:10px}.nd.l3{margin-left:20px;font-size:12px;color:var(--muted)}
.tag{font-size:10px;padding:2px 5px;border-radius:4px;color:#fff}
.t1{background:var(--pri)}.t2{background:var(--cyan);color:#0a0e17}.t3{background:var(--ok)}
.study{display:flex;gap:28px;flex-wrap:wrap;justify-content:center}
.ring{position:relative;width:220px;height:220px;margin:0 auto 16px}
.ring svg{transform:rotate(-90deg)}
.rt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rt b{font-size:38px}
.rt span{font-size:12px;color:var(--muted)}
.chart{display:flex;align-items:flex-end;gap:8px;height:140px;margin-top:12px}
.col{flex:1;background:linear-gradient(180deg,var(--pri),rgba(99,102,241,.2));border-radius:6px 6px 0 0;min-height:8px;position:relative}
.col em{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);font-style:normal}
.chat{max-height:280px;overflow-y:auto;margin-bottom:12px}
.msg{padding:10px 12px;border-radius:10px;margin-bottom:8px;font-size:14px;line-height:1.5;max-width:90%}
.msg.bot{background:var(--sec);color:var(--muted)}
.msg.me{background:rgba(99,102,241,.2);margin-left:auto}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:99;padding:16px}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;width:min(500px,100%);max-height:85vh;overflow-y:auto}
.opt{display:block;width:100%;text-align:left;padding:10px 12px;margin-bottom:6px;border-radius:8px;background:var(--sec);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:14px}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.ach{padding:14px;text-align:center;background:var(--sec);border-radius:10px;border:1px solid var(--border);opacity:.45}
.ach.un{opacity:1;border-color:var(--warn)}
.alert{border-left:4px solid var(--danger);background:rgba(239,68,68,.1);padding:12px;margin-bottom:10px;border-radius:0 8px 8px 0}
.alert.warn{border-left-color:var(--warn);background:rgba(245,158,11,.1)}
.alert.info{border-left-color:var(--pri);background:rgba(99,102,241,.1)}
.alert-title{font-weight:600;margin-bottom:4px}
.alert-desc{font-size:13px;color:var(--muted)}
.habit-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;background:var(--sec);margin-bottom:6px}
.habit-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.habit-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--cyan))}
@media(max-width:768px){#app{flex-direction:column}.side{width:100%;display:flex;overflow-x:auto;padding:10px}.logo{display:none}.nav{white-space:nowrap}}
</style>
</head>
<body>

<div id="app">
  <aside class="side">
    <div class="logo gtext">FocusPal</div>
    <div class="nav on" data-p="dashboard">📊 仪表盘</div>
    <div class="nav" data-p="tasks">📋 学习任务</div>
    <div class="nav" data-p="study">⏱️ 专注学习</div>
    <div class="nav" data-p="stats">📈 数据统计</div>
    <div class="nav" data-p="ai">🤖 AI 助手</div>
    <div class="nav" data-p="achievements">🏆 成就</div>
    <div class="nav" data-p="profile">👤 个人中心</div>
  </aside>
  <div class="main">
    <header class="top">
      <span id="plabel">仪表盘</span>
      <div style="display:flex;align-items:center;gap:10px;font-size:14px">
        <span class="lv" id="lv">Lv.1</span>
        <span id="exp" style="color:var(--muted)">EXP 0</span>
      </div>
    </header>
    <div class="body" id="main"></div>
  </div>
</div>
<div id="modal"></div>

<script>
(function(){
var KEY='focuspal_web_v2';
var LV=['新手学员','进阶学者','专注达人','学习大师','卷王之王'];
var LVE=[0,500,1500,3500,7000];
var TPL={
  kaoyan:{n:'考研英语',i:'📚',p:[
    {t:'基础阶段',g:[{t:'词汇背诵',a:['每天背50词','复习100词']},{t:'阅读训练',a:['精读1篇真题','积累长难句']}]},
    {t:'强化阶段',g:[{t:'真题演练',a:['完成1套阅读','分析错题']}]},
    {t:'冲刺阶段',g:[{t:'模考冲刺',a:['限时模拟卷','查漏补缺']}]}
  ]},
  cet:{n:'四六级',i:'🎓',p:[
    {t:'词汇基础',g:[{t:'核心词汇',a:['背80高频词','听写30词']}]},
    {t:'专项突破',g:[{t:'听力阅读',a:['精听1段','完成2篇阅读']}]}
  ]},
  code:{n:'编程学习',i:'💻',p:[
    {t:'入门基础',g:[{t:'语法核心',a:['学1个概念','写示例代码']}]},
    {t:'项目实战',g:[{t:'功能开发',a:['实现小功能','写测试']}]}
  ]}
};

function def(){
  return{user:{name:'学习者',exp:120},tasks:[{id:1,title:'考研英语备考',done:0,ph:clonePh(TPL.kaoyan.p),createTime:Date.now() - 86400000*3}],
    sess:[{m:45,d:Date.now()-86400000*2},{m:30,d:Date.now()-86400000},{m:55,d:Date.now()-3600000*12},{m:25,d:Date.now()-3600000*3}],
    ach:{study:1,task:1,d7:0,lv5:0,streak:3},chat:[],selTpl:null,
    habits:{morning:65,afternoon:35,evening:50,night:20,avgFocus:35,consistency:40}};
}
function clonePh(p){return p.map(x=>({t:x.t,g:x.g.map(g=>({t:g.t,a:g.a.map((a,i)=>({t:a,d:i===0?1:0}))}))}));}
function load(){try{var r=localStorage.getItem(KEY);if(!r)return def();var s=JSON.parse(r);if(!s.tasks||!s.tasks.length)s.tasks=def().tasks;if(!s.user)s.user=def().user;if(!s.habits)s.habits=def().habits;if(!s.ach)s.ach=def().ach;return s;}catch(e){return def();}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}hdr();}

var S=load();
var timer=null,tSec=1500,tRun=0,tMode='focus',tMin=25,prev=null,clar=null;

document.querySelectorAll('.nav').forEach(function(el){
  el.onclick=function(){go(el.dataset.p);};
});

function hdr(){
  var e=S.user.exp,l=1;
  for(var i=LVE.length-1;i>=0;i--)if(e>=LVE[i]){l=i+1;break;}
  document.getElementById('lv').textContent='Lv.'+l+' '+LV[l-1];
  document.getElementById('exp').textContent='EXP '+e;
}
var PL={dashboard:'仪表盘',tasks:'学习任务',study:'专注学习',stats:'数据统计',ai:'AI 助手',achievements:'成就',profile:'个人中心'};
function go(p){
  document.querySelectorAll('.nav').forEach(function(n){n.classList.toggle('on',n.dataset.p===p);});
  document.getElementById('plabel').textContent=PL[p]||p;
  var m=document.getElementById('main');
  if(p==='dashboard')m.innerHTML=pgDash();
  else if(p==='tasks')m.innerHTML=pgTasks();
  else if(p==='study')m.innerHTML=pgStudy();
  else if(p==='stats')m.innerHTML=pgStats();
  else if(p==='ai')m.innerHTML=pgAi();
  else if(p==='achievements')m.innerHTML=pgAch();
  else if(p==='profile')m.innerHTML=pgProf();
}

function prog(t){var a=0,b=0;(t.ph||[]).forEach(function(p){p.g.forEach(function(g){g.a.forEach(function(x){b++;if(x.d)a++;});});});return{a:a,b:b};}

function analyzeProcrastination(){
  var habits=S.habits||{morning:50,afternoon:40,evening:60,night:30};
  var issues=[];
  var suggestions=[];
  
  if(habits.afternoon<40) issues.push('下午效率偏低');
  if(habits.night<30) issues.push('夜间学习较少');
  if(habits.consistency<50) issues.push('学习连贯性不足');
  if(habits.avgFocus<40) issues.push('平均专注时长较短');
  
  if(habits.morning>=habits.afternoon && habits.morning>=habits.evening){
    suggestions.push('您上午效率最高，建议安排复杂任务');
  } else if(habits.evening>=habits.morning && habits.evening>=habits.afternoon){
    suggestions.push('您晚上效率最高，黄金时段在夜间');
  }
  
  if(habits.afternoon<30) suggestions.push('下午易拖延，建议拆分微任务');
  if(habits.consistency<40) suggestions.push('建议设置固定学习时间养成习惯');
  
  return {issues:issues,suggestions:suggestions};
}

function getAlerts(){
  var alerts=[];
  var now=Date.now();
  
  S.tasks.forEach(function(t){
    if(t.done)return;
    var p=prog(t);
    var pc=p.b?Math.round(p.a/p.b*100):0;
    var age=(now-(t.createTime||now))/86400000;
    
    if(age>3 && pc<30){
      alerts.push({type:'danger',title:'任务进度落后',desc:'「'+t.title+'」创建3天仍未完成30%',taskId:t.id});
    }
    
    if(pc>0 && pc<100){
      var avgDaily=(S.sess.length>0)?S.sess.reduce(function(s,x){return s+x.m;},0)/S.sess.length:0;
      if(avgDaily<20){
        alerts.push({type:'warn',title:'专注时长不足',desc:'近日常专注时长低于20分钟，建议增加学习时间',taskId:t.id});
      }
    }
  });
  
  if(S.ach.streak<3){
    alerts.push({type:'info',title:'连续打卡中断',desc:'保持连续学习可获得额外经验奖励',taskId:null});
  }
  
  var proc=analyzeProcrastination();
  if(proc.issues.length>0){
    alerts.push({type:'warn',title:'拖延模式检测',desc:'分析显示：'+proc.issues.join('、'),taskId:null});
  }
  
  return alerts.sort(function(a,b){var o={danger:0,warn:1,info:2};return o[a.type]-o[b.type];});
}

function pgDash(){
  var m=S.sess.reduce(function(s,x){return s+x.m;},0);
  var alerts=getAlerts();
  var proc=analyzeProcrastination();
  var alertHtml=alerts.slice(0,3).map(function(a){
    return '<div class="alert '+a.type+'"><div class="alert-title">'+a.title+'</div><div class="alert-desc">'+a.desc+'</div></div>';
  }).join('');
  
  return '<h1 class="pt gtext">欢迎，'+S.user.name+'</h1>'+
    (alertHtml?'<div class="card" style="margin-bottom:14px"><b>🔔 AI 智能预警</b><div style="margin-top:10px">'+alertHtml+'</div></div>':'')+
    '<div class="grid4">'+
    '<div class="sc"><div class="sl">累计专注</div><div class="sv">'+m+' 分</div></div>'+
    '<div class="sc"><div class="sl">任务数</div><div class="sv">'+S.tasks.length+'</div></div>'+
    '<div class="sc"><div class="sl">进行中</div><div class="sv">'+S.tasks.filter(function(t){return!t.done;}).length+'</div></div>'+
    '<div class="sc"><div class="sl">连续打卡</div><div class="sv">🔥 '+S.ach.streak+' 天</div></div></div>'+
    '<div class="card"><b>快捷入口</b><div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">'+
    '<button class="btn btn-p btn-sm" onclick="go(\'tasks\')">AI 拆解任务</button>'+
    '<button class="btn btn-g btn-sm" onclick="go(\'study\')">开始专注</button>'+
    '<button class="btn btn-g btn-sm" onclick="go(\'stats\')">查看统计</button></div></div>'+
    '<div class="card"><b>🧠 拖延症分析</b><div style="margin-top:10px">'+
    '<div style="color:var(--muted);font-size:14px;margin-bottom:10px">检测到的问题：'+(proc.issues.length?proc.issues.join('、'):'暂无明显问题')+'</div>'+
    '<div style="font-size:13px;line-height:1.7">'+proc.suggestions.map(function(s){return '• '+s;}).join('<br>')+'</div></div>';
}

function pgTasks(){
  var chips='';Object.keys(TPL).forEach(function(k){var t=TPL[k];chips+='<span class="chip '+(S.selTpl===k?'on':'')+'" onclick="pickTpl(\''+k+'\')">'+t.i+' '+t.n+'</span>';});
  var list=S.tasks.filter(function(t){return!t.done;}).map(renderTask).join('')||'<div class="card" style="color:var(--muted);text-align:center">暂无任务</div>';
  var done=S.tasks.filter(function(t){return t.done;}).map(renderTask).join('');
  return '<h1 class="pt">学习任务</h1><p style="color:var(--muted);margin:-10px 0 16px;font-size:14px">三级拆解：阶段 → 任务组 → 每日行动</p>'+
    '<div class="card"><b>✨ AI 目标拆解</b><p style="color:var(--muted);font-size:13px;margin:8px 0">选模板或输入目标，模糊目标会智能追问</p>'+chips+
    '<div class="row" style="margin-top:10px"><input id="gin" placeholder="例如：提升英语 / 考研英语 / 学 Vue"/><button class="btn btn-ai" onclick="decompose()">智能分解</button></div></div>'+
    '<div style="color:var(--muted);font-size:14px;margin-bottom:10px">进行中</div>'+list+(done?'<div style="color:var(--ok);font-size:14px;margin:16px 0 10px">已完成</div>'+done:'');
}

function renderTask(t){
  var p=prog(t),pc=p.b?Math.round(p.a/p.b*100):0;
  var tree='';(t.ph||[]).forEach(function(ph,pi){
    tree+='<div class="nd l1"><span class="tag t1">阶段</span>'+ph.t+'</div>';
    ph.g.forEach(function(g,gi){
      tree+='<div class="nd l2"><span class="tag t2">组</span>'+g.t+'</div>';
      g.a.forEach(function(a,ai){
        tree+='<div class="nd l3" onclick="togA('+t.id+','+pi+','+gi+','+ai+')"><span class="tag t3">行动</span><span class="ck '+(a.d?'on':'')+'">'+(a.d?'✓':'')+'</span><span style="'+(a.d?'text-decoration:line-through;opacity:.6':'')+'">'+a.t+'</span></div>';
      });
    });
  });
  return '<div class="task"><div class="th" onclick="togTree('+t.id+')"><span class="ck '+(t.done?'on':'')+'" onclick="event.stopPropagation();togT('+t.id+')">'+(t.done?'✓':'')+'</span><div style="flex:1"><div>'+t.title+'</div><div style="font-size:12px;color:var(--muted)">'+p.a+'/'+p.b+' · '+pc+'%</div><div class="bar"><i style="width:'+pc+'%"></i></div></div><span>▼</span></div><div class="tree hidden" id="tr'+t.id+'">'+tree+'</div></div>';
}

window.pickTpl=function(k){S.selTpl=S.selTpl===k?null:k;save();go('tasks');};
window.togTree=function(id){document.getElementById('tr'+id).classList.toggle('hidden');};
window.togA=function(id,pi,gi,ai){var a=S.tasks.find(function(t){return t.id===id;}).ph[pi].g[gi].a[ai];a.d=a.d?0:1;if(a.d){S.user.exp+=15;S.ach.task=1;updateHabits();}save();go('tasks');};
window.togT=function(id){var t=S.tasks.find(function(x){return x.id===id;});t.done=t.done?0:1;if(t.done){S.user.exp+=100;S.ach.task=1;}save();go('tasks');};

window.decompose=function(){
  var g=(document.getElementById('gin')||{}).value||'';
  g=g.trim()||(S.selTpl?TPL[S.selTpl].n:'');
  if(!g)return alert('请输入学习目标');
  if(S.selTpl){showPrev(g,JSON.parse(JSON.stringify(TPL[S.selTpl].p)),TPL[S.selTpl].n);return;}
  if(/提升.*英语|提高.*英语|学英语/.test(g)){showCl(g,['词汇','听力','阅读','写作','全面备考']);return;}
  if(/编程|代码|vue|react|python/i.test(g)){showPrev(g,JSON.parse(JSON.stringify(TPL.code.p)),'编程学习');return;}
  if(/四级|六级|cet/i.test(g)){showPrev(g,JSON.parse(JSON.stringify(TPL.cet.p)),'四六级');return;}
  if(/考研|考试|英语/.test(g)){showPrev(g,JSON.parse(JSON.stringify(TPL.kaoyan.p)),'考研英语');return;}
  showPrev(g,[{t:'准备阶段',g:[{t:'目标明确',a:['明确目标','收集资料']}]},{t:'执行阶段',g:[{t:'每日学习',a:['完成核心任务','复习笔记']}]}],'智能生成');
};

function showCl(goal,opts){
  clar={goal:goal};
  var h='<div class="modal" onclick="if(event.target===this)closeM()"><div class="modal-box"><h3 style="margin-bottom:10px">AI 智能追问</h3><p style="color:var(--muted);margin-bottom:12px">你想重点提升哪方面？</p>';
  opts.forEach(function(o){h+='<button class="opt" onclick="pickCl(\''+o+'\')">'+o+'</button>';});
  document.getElementById('modal').innerHTML=h+'</div></div>';
}
window.pickCl=function(o){
  closeM();var g=clar.goal;
  if(o.indexOf('全面')>=0)showPrev(g,JSON.parse(JSON.stringify(TPL.kaoyan.p)),'考研英语');
  else showPrev(g+'·'+o,[{t:'专项提升',g:[{t:o+'训练',a:['每日练习30分钟','周末复盘']}]}],'智能生成');
};
function showPrev(title,ph,name){
  prev={title:title,ph:clonePh(ph),name:name};
  var tot=0;ph.forEach(function(p){p.g.forEach(function(g){tot+=g.a.length;});});
  var h='<div class="modal" onclick="if(event.target===this)closeM()"><div class="modal-box"><h3>拆解预览 · '+name+'</h3><p style="color:var(--muted);margin:10px 0">共 '+tot+' 项每日行动</p>';
  ph.forEach(function(p){
    h+='<div style="margin-bottom:10px;border-left:3px solid var(--pri);padding-left:10px"><b>'+p.t+'</b>';
    p.g.forEach(function(g){h+='<div style="margin:6px 0 4px 10px;color:var(--muted)">'+g.t+'</div>';g.a.forEach(function(a){h+='<div style="margin-left:20px;font-size:13px;color:var(--muted)">· '+a+'</div>';});});
    h+='</div>';
  });
  h+='<div style="text-align:right;margin-top:14px"><button class="btn btn-g" onclick="closeM()">取消</button> <button class="btn btn-ai" onclick="confirmP()">确认创建</button></div></div></div>';
  document.getElementById('modal').innerHTML=h;
}
window.confirmP=function(){S.tasks.unshift({id:Date.now(),title:prev.title,done:0,ph:prev.ph,createTime:Date.now()});closeM();save();go('tasks');};
window.closeM=function(){document.getElementById('modal').innerHTML='';prev=null;};

function updateHabits(){
  var h=S.habits||{morning:50,afternoon:40,evening:60,night:30,avgFocus:35,consistency:40};
  var hour=new Date().getHours();
  
  if(hour>=6 && hour<12)h.morning=Math.min(100,h.morning+2);
  else if(hour>=12 && hour<18)h.afternoon=Math.min(100,h.afternoon+2);
  else if(hour>=18 && hour<22)h.evening=Math.min(100,h.evening+2);
  else h.night=Math.min(100,h.night+2);
  
  if(S.sess.length>0){
    h.avgFocus=Math.round(S.sess.reduce(function(s,x){return s+x.m;},0)/S.sess.length);
  }
  
  h.consistency=Math.min(100,h.consistency+1);
  S.habits=h;
}

function pgStudy(){
  var mm=String(Math.floor(tSec/60)).padStart(2,'0'),ss=String(tSec%60).padStart(2,'0');
  var tot=tMode==='focus'?tMin*60:300,pct=tot?((tot-tSec)/tot*100):0;
  var tasks=S.tasks.filter(function(t){return!t.done;}).map(function(t){
    return '<div style="padding:9px;background:var(--sec);border-radius:8px;margin-bottom:6px;font-size:14px;cursor:pointer" onclick="setMsg(\'正在学习：'+t.title+'\')">'+t.title+'</div>';
  }).join('')||'<p style="color:var(--muted);font-size:14px">暂无任务</p>';
  return '<div class="card" style="font-size:13px;color:var(--muted);text-align:center">🔒 不采集屏幕，仅本地计时；数据存浏览器</div>'+
    '<div class="study"><div><div class="ring"><svg width="220" height="220" viewBox="0 0 220 220"><circle cx="110" cy="110" r="100" fill="none" stroke="#111827" stroke-width="8"/><circle cx="110" cy="110" r="100" fill="none" stroke="'+(tMode==='break'?'#10b981':'#6366f1')+'" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+(2*Math.PI*100)+'" stroke-dashoffset="'+(2*Math.PI*100*(1-pct/100))+'"/></svg><div class="rt"><b>'+mm+':'+ss+'</b><span>'+(tMode==='focus'?'专注中':'休息中')+'</span></div></div>'+
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn btn-p" onclick="togTimer()">'+(tRun?'暂停':'开始')+'</button><button class="btn btn-g" onclick="resetT()">重置</button><button class="btn btn-g" onclick="micro5()">只学5分钟</button></div>'+
    '<p id="smsg" style="margin-top:12px;font-size:14px;color:var(--muted);text-align:center"></p></div>'+
    '<div class="card" style="min-width:240px"><b>选择任务</b><div style="margin-top:10px">'+tasks+'</div></div></div>';
}
window.setMsg=function(m){var e=document.getElementById('smsg');if(e)e.textContent=m;};
window.micro5=function(){tMin=5;tSec=300;tMode='focus';setMsg('微任务：只需5分钟！');go('study');};
window.togTimer=function(){
  if(tRun){clearInterval(timer);tRun=0;}
  else{tRun=1;timer=setInterval(function(){
    if(tSec>0){tSec--;if(document.getElementById('main'))go('study');}
    else{clearInterval(timer);tRun=0;
      if(tMode==='focus'){S.sess.push({m:tMin,d:Date.now()});S.user.exp+=tMin>=25?50:20;S.ach.study=1;updateHabits();
        var today=new Date().toDateString();
        if(!S.lastStreak || S.lastStreak!==today){
          S.lastStreak=today;
          S.ach.streak=(S.ach.streak||0)+1;
        }
        save();
        tMode='break';tSec=300;setMsg(tMin<=5?'完成'+tMin+'分钟！继续有奖励 🎉':'番茄钟完成！休息 ☕');}
      else{tMode='focus';tSec=tMin*60;setMsg('休息结束，继续加油！');}
      go('study');
    }
  },1000);}
  go('study');
};
window.resetT=function(){clearInterval(timer);tRun=0;tMode='focus';tMin=25;tSec=1500;go('study');};

function pgStats(){
  var days=['一','二','三','四','五','六','日'];
  var bars='';
  var weekData=[45,30,55,25,60,40,50];
  for(var i=0;i<7;i++){bars+='<div class="col" style="height:'+weekData[i]+'%"><em>周'+days[i]+'</em></div>';}
  
  var total=S.sess.reduce(function(s,x){return s+x.m;},0);
  var habits=S.habits||{morning:50,afternoon:40,evening:60,night:30,avgFocus:35,consistency:40};
  
  return '<h1 class="pt">数据统计</h1><div class="grid4"><div class="sc"><div class="sl">累计分钟</div><div class="sv">'+total+'</div></div><div class="sc"><div class="sl">专注次数</div><div class="sv">'+S.sess.length+'</div></div></div>'+
    '<div class="card"><b>本周学习趋势</b><div class="chart">'+bars+'</div></div>'+
    '<div class="card"><b>🕐 学习时段分布</b><div style="margin-top:12px">'+
    '<div class="habit-item"><span>🌅 上午(6-12点)</span><div class="habit-bar"><div class="habit-fill" style="width:'+habits.morning+'%"></div></div><span style="font-size:13px;color:var(--muted)">'+habits.morning+'%</span></div>'+
    '<div class="habit-item"><span>☀️ 下午(12-18点)</span><div class="habit-bar"><div class="habit-fill" style="width:'+habits.afternoon+'%"></div></div><span style="font-size:13px;color:var(--muted)">'+habits.afternoon+'%</span></div>'+
    '<div class="habit-item"><span>🌆 傍晚(18-22点)</span><div class="habit-bar"><div class="habit-fill" style="width:'+habits.evening+'%"></div></div><span style="font-size:13px;color:var(--muted)">'+habits.evening+'%</span></div>'+
    '<div class="habit-item"><span>🌙 夜间(22-6点)</span><div class="habit-bar"><div class="habit-fill" style="width:'+habits.night+'%"></div></div><span style="font-size:13px;color:var(--muted)">'+habits.night+'%</span></div></div>'+
    '<div class="card"><b>📊 学习习惯指标</b><div style="margin-top:12px">'+
    '<div class="habit-item"><span>⏱️ 平均专注时长</span><div class="habit-bar"><div class="habit-fill" style="width:'+habits.avgFocus+'%"></div></div><span style="font-size:13px;color:var(--muted)">'+habits.avgFocus+'分钟</span></div>'+
    '<div class="habit-item"><span>📈 学习连贯性</span><div class="habit-bar"><div class="habit-fill" style="width:'+habits.consistency+'%"></div></div><span style="font-size:13px;color:var(--muted)">'+habits.consistency+'%</span></div></div>'+
    '<div class="card"><b>🧠 拖延症分析</b><ul style="color:var(--muted);font-size:14px;margin-top:10px;line-height:2;padding-left:18px"><li>易拖延：下午 2-4 点、晚上 9 点后</li><li>高峰效率：上午 9-11 点</li><li>建议：上午攻克难题，下午轻量复习</li></ul></div>';
}

function pgAi(){
  var msgs=(S.chat||[]).map(function(m){return '<div class="msg '+(m.r?'bot':'me')+'">'+m.t+'</div>';}).join('');
  return '<h1 class="pt">AI 学习助手</h1><div class="card"><div class="chat" id="chatbox">'+msgs+'<div class="msg bot">你好！我是 FocusPal AI 助手，有什么学习问题？</div></div>'+
    '<div class="row"><input id="cinput" placeholder="例如：Vue 组件通信怎么做？" onkeydown="if(event.key===\'Enter\')sendChat()"/><button class="btn btn-ai" onclick="sendChat()">发送</button></div></div>';
}
window.sendChat=function(){
  var inp=document.getElementById('cinput');if(!inp)return;var q=inp.value.trim();if(!q)return;
  if(!S.chat)S.chat=[];
  S.chat.push({t:q,r:0});inp.value='';
  var a='建议先理清问题核心，查阅官方文档并动手实践。';
  if(/vue/i.test(q))a='Vue 通信：Props/Emit、Pinia、Provide/Inject。你想了解哪种？';
  else if(/英语|词汇/i.test(q))a='词汇建议：每天50新词+100复习，结合真题语境记忆效果更好。';
  else if(/拖延/i.test(q))a='试试「只学5分钟」微任务，降低启动门槛，完成后再决定是否继续。';
  else if(/专注|效率/i.test(q))a='建议使用番茄工作法，每25分钟休息5分钟，保持高效学习节奏。';
  else if(/任务|计划/i.test(q))a='建议将大目标拆解为每日小行动，使用「学习任务」功能进行AI智能分解。';
  S.chat.push({t:a,r:1});save();go('ai');
};

function pgAch(){
  var list=[
    {k:'study',i:'📖',n:'首次学习',d:'完成第一次专注'},
    {k:'task',i:'✅',n:'首个任务',d:'完成第一个行动'},
    {k:'d7',i:'🔥',n:'连续7天',d:'坚持打卡一周'},
    {k:'lv5',i:'👑',n:'卷王之王',d:'达到 Lv.5'},
    {k:'focus100',i:'⏰',n:'专注达人',d:'累计专注100小时'},
    {k:'perfect',i:'🌟',n:'完美一天',d:'完成所有计划任务'}
  ];
  var lv=1;for(var i=LVE.length-1;i>=0;i--)if(S.user.exp>=LVE[i]){lv=i+1;break;}
  var totalMins=S.sess.reduce(function(s,x){return s+x.m;},0);
  return '<h1 class="pt">成就徽章</h1><div class="ach-grid">'+list.map(function(a){
    var un=S.ach[a.k]||(a.k==='lv5'&&lv>=5)||(a.k==='focus100'&&totalMins>=6000);
    return '<div class="ach '+(un?'un':'')+'"><div style="font-size:26px">'+a.i+'</div><b style="font-size:14px">'+a.n+'</b><p style="font-size:12px;color:var(--muted);margin-top:4px">'+a.d+'</p></div>';
  }).join('')+'</div>';
}

function pgProf(){
  return '<h1 class="pt">个人中心</h1><div class="card"><div class="form-group" style="margin-bottom:12px"><label style="font-size:13px;color:var(--muted)">昵称</label><input id="pname" value="'+S.user.name+'"/></div>'+
    '<button class="btn btn-p btn-sm" onclick="saveName()">保存昵称</button></div>'+
    '<div class="card"><b>数据管理</b><p style="color:var(--muted);font-size:13px;margin:8px 0">数据保存在本浏览器，可导出或清除</p>'+
    '<button class="btn btn-g btn-sm" onclick="exportD()" style="margin-right:8px">导出 JSON</button>'+
    '<button class="btn btn-g btn-sm" onclick="clearD()">清除数据</button></div>';
}
window.saveName=function(){var v=document.getElementById('pname').value.trim();if(v)S.user.name=v;save();go('profile');};
window.exportD=function(){var b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='focuspal-data.json';a.click();};
window.clearD=function(){if(confirm('确定清除所有本地数据？')){localStorage.removeItem(KEY);S=def();save();go('dashboard');}};

hdr();go('dashboard');
})();
</script>
