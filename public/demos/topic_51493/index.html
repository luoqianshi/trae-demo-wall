<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFF9F5">
<title>好日子 · 人生大事，选好日子</title>
<style>
/* ==================== 好日子 · 设计系统 ==================== */
/* 现代 · 干净 · 温暖 · 轻东方美学 · 生活工具 App */

:root {
  /* 主色：低饱和朱红 / 陶土红 */
  --primary: #B84A3C;
  --primary-soft: #F3DDD9;
  --primary-hover: #A03D30;

  /* 背景：米白、奶油白、浅暖灰 */
  --bg: #FFF9F5;
  --bg-warm: #F7F0E8;
  --bg-soft: #FBF7F2;
  --card: #FFFFFF;
  --card-warm: #FDF8F3;

  /* 文字色 */
  --ink: #2B2724;
  --ink-2: #5A5049;
  --ink-3: #8B8278;
  --ink-4: #BFB5AA;

  /* 边框/分割 */
  --line: #EDE4D8;
  --line-soft: #F3ECE1;

  /* 其他点缀 */
  --amber: #D98A4B;
  --ok: #6B9E7A;
  --ok-soft: #E3EFDD;
  --warn: #D9A441;
  --warn-soft: #F7EBD3;

  /* 阴影 */
  --shadow-sm: 0 2px 6px rgba(180, 130, 100, 0.06);
  --shadow-md: 0 6px 20px rgba(180, 130, 100, 0.08);
  --shadow-lg: 0 12px 40px rgba(180, 130, 100, 0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  color: var(--ink);
  background: #EDE4D8;
  height: 100%;
  overflow-x: hidden;
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; border: 0; background: transparent; color: inherit; cursor: pointer; }
input { font-family: inherit; outline: none; border: 0; background: transparent; }
svg { width: 100%; height: 100%; display: block; }

/* ============ 手机容器 ============ */
.phone {
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  position: relative;
  padding-bottom: 92px;
  overflow: visible;
  box-shadow: 0 0 0 1px var(--line);
}

/* ============ 页面切换 ============ */
.page {
  display: none;
  min-height: 100vh;
  min-height: 100dvh;
  animation: pageIn 0.32s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.page.active { display: block; }

@keyframes pageIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============ 页面头部 ============ */
.page-head {
  padding: 28px 22px 18px;
  position: sticky;
  top: 0;
  background: linear-gradient(180deg, var(--bg) 70%, rgba(255,249,245,0.85));
  z-index: 10;
  backdrop-filter: blur(12px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-icon {
  width: 44px; height: 44px;
  background: var(--primary-soft);
  color: var(--primary);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
}
.brand-text h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.brand-text p {
  font-size: 12.5px;
  color: var(--ink-3);
  margin-top: 2px;
}

/* ============ 详情页头部 ============ */
.detail-head {
  display: flex;
  align-items: center;
  padding: 16px 12px;
}
.back-btn, .more-btn {
  width: 40px; height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
  border-radius: 10px;
  padding: 10px;
}
.back-btn:active, .more-btn:active { background: var(--line-soft); }
.detail-title {
  flex: 1;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
}

/* ============ 择好日 · 入口区 ============ */
.choose-entry {
  padding: 8px 22px 30px;
}
.entry-hero {
  padding: 14px 0 24px;
}
.hero-big {
  font-size: 23px;
  font-weight: 600;
  line-height: 1.4;
  letter-spacing: 0.5px;
  color: var(--ink);
}
.hero-small {
  margin-top: 10px;
  font-size: 13.5px;
  color: var(--ink-3);
}

.entry-input {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 6px 6px 6px 18px;
  box-shadow: var(--shadow-sm);
}
.entry-input input {
  flex: 1;
  font-size: 14.5px;
  padding: 12px 0;
  color: var(--ink);
}
.entry-input input::placeholder { color: var(--ink-4); }
.input-btn {
  width: 42px; height: 42px;
  background: var(--primary);
  color: #fff;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 11px;
  flex-shrink: 0;
  transition: background 0.2s;
}
.input-btn:active { background: var(--primary-hover); }

.entry-subtitle {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 26px 0 18px;
  color: var(--ink-3);
  font-size: 12px;
}
.entry-subtitle span {
  flex: 1;
  height: 1px;
  background: var(--line);
}
.entry-subtitle em {
  font-style: normal;
  color: var(--ink-3);
  letter-spacing: 0.5px;
}

/* ============ 事项卡片网格 ============ */
.event-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.event-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px 16px 16px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}
.event-card:active {
  transform: translateY(0);
  box-shadow: var(--shadow-md);
  border-color: var(--primary-soft);
}
.event-card .ec-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--bg-warm);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  color: var(--primary);
  margin-bottom: 12px;
}
.event-card .ec-name {
  font-size: 15.5px;
  font-weight: 600;
  color: var(--ink);
}
.event-card .ec-hint {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 4px;
}

/* ============ 聊天区 ============ */
.chat-area {
  position: fixed;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  padding-bottom: 76px;
  display: flex;
  flex-direction: column;
  z-index: 15;
  background: var(--bg);
}
.chat-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 22px 14px;
  background: var(--bg);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
}
.chat-back-btn {
  width: 36px; height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-2);
  padding: 9px;
}
.chat-back-btn svg { width: 20px; height: 20px; }
.chat-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px 20px;
  -webkit-overflow-scrolling: touch;
}
.chat-close {
  position: absolute;
  top: 32px;
  right: 22px;
  width: 36px; height: 36px;
  border-radius: 10px;
  padding: 9px;
  color: var(--ink-3);
  background: var(--card);
  border: 1px solid var(--line);
}
.chat-close svg { color: var(--ink-3); }

/* 消息气泡 */
.msg {
  margin-bottom: 14px;
  animation: msgIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-bubble {
  padding: 13px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.7;
  max-width: 85%;
}
.msg-ai .msg-bubble {
  background: var(--card);
  border: 1px solid var(--line);
  color: var(--ink-2);
  border-bottom-left-radius: 6px;
}
.msg-me .msg-bubble {
  background: var(--primary);
  color: #fff;
  margin-left: auto;
  border-bottom-right-radius: 6px;
}
.msg-me .msg-meta {
  text-align: right;
  color: var(--ink-3);
  font-size: 11px;
  margin-top: 6px;
}
.msg-ai .msg-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  color: var(--primary);
  margin-bottom: 6px;
  font-weight: 500;
}
.msg-ai .msg-meta .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--primary);
}

.msg b { color: var(--ink); font-weight: 600; }

/* 选项按钮组 */
.opt-group {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.opt-btn {
  padding: 9px 15px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 20px;
  font-size: 13.5px;
  color: var(--ink-2);
  transition: all 0.2s;
}
.opt-btn:active {
  background: var(--primary-soft);
  border-color: var(--primary);
  color: var(--primary);
}
.opt-btn.disabled {
  opacity: 0.5;
  pointer-events: none;
}

/* ============ 推荐日期卡片 ============ */
.rec-header {
  font-size: 13px;
  color: var(--ink-2);
  margin-bottom: 10px;
  line-height: 1.7;
}
.rc-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
}
.rc-card .rc-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}
.rc-card .rc-date-num {
  font-size: 34px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -1px;
  min-width: 42px;
}
.rc-date-wrap { flex: 1; }
.rc-date-wrap .rc-date-text {
  font-size: 13px;
  color: var(--ink-2);
  font-weight: 500;
}
.rc-date-wrap .rc-time {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 3px;
}
.rc-tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  background: var(--primary-soft);
  color: var(--primary);
}
.rc-tag.convenient { background: var(--ok-soft); color: var(--ok); }
.rc-tag.alt { background: var(--warn-soft); color: #8B6B2B; }
.rc-tag.best { background: var(--primary-soft); color: var(--primary); }

.rc-divider {
  height: 1px;
  background: var(--line-soft);
  margin: 12px -16px;
}
.rc-row { margin-top: 10px; }
.rc-row-label {
  font-size: 11.5px;
  color: var(--ink-3);
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}
.rc-row-text {
  font-size: 13.5px;
  color: var(--ink-2);
  line-height: 1.6;
}
.rc-tags {
  margin-top: 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.rc-tags span {
  font-size: 11.5px;
  padding: 3px 9px;
  background: var(--bg-warm);
  color: var(--ink-2);
  border-radius: 8px;
}
.rc-note {
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--bg-warm);
  border-radius: 10px;
  font-size: 12.5px;
  color: var(--ink-2);
  line-height: 1.6;
}
.rc-note b { color: var(--primary); font-weight: 500; }
.rc-btn {
  margin-top: 14px;
  width: 100%;
  padding: 12px;
  background: var(--primary);
  color: #fff;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.rc-btn:active { background: var(--primary-hover); }
.rc-btn.ghost {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink-2);
}

/* 日期卡片选中状态 */
.rc-card.selected {
  border: 2px solid var(--primary);
  background: linear-gradient(135deg, #FFF8F5 0%, var(--card) 100%);
  box-shadow: 0 4px 16px rgba(184, 74, 60, 0.12);
}
.rc-card.selected .rc-btn {
  background: var(--ok);
  pointer-events: none;
}
.rc-card.dimmed {
  opacity: 0.45;
  pointer-events: none;
}
.rc-selected-mark {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 24px; height: 24px;
  background: var(--ok);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.rc-card.selected .rc-selected-mark { display: flex; }
.rc-card.selected .rc-selected-mark svg { width: 14px; height: 14px; }
.rc-card { position: relative; }

/* 计划预览卡 */
.plan-preview-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px 16px;
  box-shadow: var(--shadow-md);
}
.ppc-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ppc-title::before {
  content: "";
  width: 4px; height: 16px;
  background: var(--primary);
  border-radius: 2px;
}
.ppc-row {
  display: flex;
  font-size: 13px;
  line-height: 1.7;
  margin-bottom: 6px;
}
.ppc-label {
  min-width: 76px;
  color: var(--ink-3);
  flex-shrink: 0;
}
.ppc-value {
  color: var(--ink-2);
  flex: 1;
}
.ppc-divider {
  height: 1px;
  background: var(--line-soft);
  margin: 12px -16px;
}
.ppc-checklist-hint {
  font-size: 12.5px;
  color: var(--ink-3);
  line-height: 1.6;
}
.ppc-checklist-hint b { color: var(--ink-2); }
.ppc-btns {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ppc-btn {
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.ppc-btn.primary {
  background: var(--primary);
  color: #fff;
}
.ppc-btn.primary:active { background: var(--primary-hover); }
.ppc-btn.secondary {
  background: var(--card);
  border: 1px solid var(--line);
  color: var(--ink-2);
}
.ppc-btn.secondary:active { background: var(--bg-warm); }
.ppc-btn.ghost {
  background: transparent;
  color: var(--ink-3);
  font-size: 13px;
}
.ppc-btn:disabled {
  opacity: 0.5;
  pointer-events: none;
}

/* 推荐下方按钮 */
.rec-bottom-btns {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}
.rec-bottom-btns button {
  flex: 1;
  padding: 11px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  font-size: 13px;
  color: var(--ink-2);
}
.rec-bottom-btns button:active { background: var(--bg-warm); }

/* 计划成功卡片 */
.plan-success-card {
  background: linear-gradient(135deg, #FFF5F0 0%, #FFFFFF 100%);
  border: 1px solid var(--primary-soft);
  border-radius: 18px;
  padding: 20px 18px;
  margin-top: 8px;
  box-shadow: var(--shadow-md);
}
.psc-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
}
.psc-date {
  font-size: 13.5px;
  color: var(--primary);
  font-weight: 500;
}
.psc-status {
  display: inline-block;
  margin-top: 8px;
  padding: 3px 10px;
  background: var(--ok-soft);
  color: var(--ok);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
}
.psc-progress {
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.psc-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--line-soft);
  border-radius: 3px;
  overflow: hidden;
}
.psc-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary) 0%, #D98A6B 100%);
  border-radius: 3px;
  transition: width 0.4s;
}
.psc-progress-num {
  font-size: 12.5px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.psc-btn {
  margin-top: 18px;
  width: 100%;
  padding: 13px;
  background: var(--primary);
  color: #fff;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
}
.psc-btn:active { background: var(--primary-hover); }

/* 底部输入框 */
.chat-input {
  flex-shrink: 0;
  padding: 10px 20px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(180deg, transparent, var(--bg) 30%);
}
.chat-input .input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 4px 4px 4px 16px;
  box-shadow: var(--shadow-sm);
}
.chat-input input {
  flex: 1;
  font-size: 14px;
  padding: 10px 0;
}
.chat-input input::placeholder { color: var(--ink-4); }
.send-btn {
  width: 38px; height: 38px;
  background: var(--primary);
  color: #fff;
  border-radius: 19px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 9px;
  flex-shrink: 0;
}
.send-btn:active { background: var(--primary-hover); }

/* ============ 看好日 · 筛选 ============ */
.filter-row {
  display: flex;
  gap: 8px;
  padding: 4px 22px 16px;
  overflow-x: auto;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
  padding: 8px 16px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 20px;
  font-size: 13px;
  color: var(--ink-2);
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.filter-btn.active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.filter-btn.filter-cal {
  width: 40px;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 趋势卡片 */
.trend-card {
  margin: 4px 22px 0;
  padding: 18px;
  background: linear-gradient(135deg, #FFF5EE 0%, #FFFFFF 100%);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: var(--shadow-sm);
}
.trend-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.trend-title .trend-dot {
  width: 6px; height: 6px;
  border-radius: 3px;
  background: var(--primary);
}
.trend-item {
  display: flex;
  gap: 10px;
  margin-top: 8px;
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.6;
}
.trend-item .ti-num {
  font-size: 20px;
  font-weight: 600;
  color: var(--primary);
  min-width: 28px;
  font-variant-numeric: tabular-nums;
}
.trend-item.bad .ti-num { color: var(--amber); }
.trend-tip {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px dashed var(--line);
  font-size: 12.5px;
  color: var(--ink-3);
  line-height: 1.7;
}
.trend-tip b { color: var(--primary); font-weight: 500; }

/* 小节标题 */
.section-title {
  padding: 22px 22px 12px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.section-title span {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
}
.section-title em {
  font-style: normal;
  font-size: 11.5px;
  color: var(--ink-3);
  letter-spacing: 0.5px;
}

/* 好日子列表 */
.browse-list {
  padding: 0 22px 30px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.browse-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px;

/* 底部声明 */
.bottom-note {

/* ============ 办好事 · 计划列表 ============ */

}

}

.plan-card {

}

}
.pc-head {
  display: flex;

}
.pc-icon {

  flex-shrink: 0;
}
.pc-title-area {
  flex: 1;
  min-width: 0;
}
.pc-title {
  font-size: 15.5px;
  font-weight: 600;
  color: var(--ink);
}
.pc-date {
  font-size: 12.5px;
  color: var(--ink-3);
  margin-top: 3px;
}
.pc-status {
  font-size: 11px;
  padding: 4px 10px;

}
.pc-status.preparing { background: var(--primary-soft); color: var(--primary); }
.pc-status.waiting { background: var(--warn-soft); color: #8B6B2B; }
.pc-status.todo { background: #E5DDD0; color: var(--ink-2); }
.pc-status.done { background: var(--ok-soft); color: var(--ok); }
.pc-status.saved { background: var(--warn-soft); color: #8B6B2B; }

.pc-body {
  margin-top: 4px;
}
.pc-progress-row {

  margin-top: 12px;
}
.pc-progress-bar {

  background: var(--line-soft);
  border-radius: 3px;
  overflow: hidden;
}
.pc-progress-fill {

}
.pc-progress-num {

}
.pc-summary {

  color: var(--ink-2);

}

/* FAB 悬浮按钮 */

}

/* ============ 办好事详情页 ============ */
.plan-detail-body {
  padding: 0 22px 30px;
}
.detail-hero {
  background: linear-gradient(135deg, #FFF5EE 0%, #FFFFFF 100%);

  box-shadow: var(--shadow-sm);
}
.detail-hero .dh-title {
  font-size: 19px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
}
.detail-hero .dh-meta {
  font-size: 13px;
  color: var(--primary);
  font-weight: 500;
}
.detail-hero .dh-row {
  margin-top: 14px;
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.6;
}
.detail-hero .dh-row b { color: var(--ink); font-weight: 500; }
.detail-hero .dh-tags {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.detail-hero .dh-tags span {
  font-size: 11px;
  padding: 4px 10px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--ink-2);
}
.detail-hero .dh-progress-row {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--line-soft);
  display: flex;
  align-items: center;
  gap: 12px;
}
.dh-progress-bar {
  flex: 1;
  height: 8px;
  background: var(--line-soft);
  border-radius: 4px;
  overflow: hidden;
}
.dh-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary) 0%, var(--amber) 100%);
  border-radius: 4px;
  transition: width 0.4s;
}
.dh-progress-num {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.dh-status-badge {
  font-size: 11.5px;
  padding: 4px 10px;
  background: var(--primary-soft);
  color: var(--primary);
  border-radius: 10px;
  font-weight: 500;
}

/* 清单分组 */
.check-group {
  margin-bottom: 18px;
}
.check-group-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14.5px;
  font-weight: 600;
  color: var(--ink);
  padding: 10px 0 12px;
}
.check-group-title .cg-dot {
  width: 6px; height: 6px;
  border-radius: 3px;
  background: var(--primary);
}
.check-group-title .cg-num {
  margin-left: auto;
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 400;
}

.check-list {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.check-item {
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  border-bottom: 1px solid var(--line-soft);
  transition: background 0.15s;
}
.check-item:last-child { border-bottom: 0; }
.check-item:active { background: var(--bg-warm); }

/* checkbox */
.check-item .ci-cb {
  width: 22px; height: 22px;
  border: 1.5px solid var(--ink-3);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--card);
}
.check-item .ci-cb svg {
  width: 14px;
  height: 14px;
  color: #fff;
  opacity: 0;
  transition: opacity 0.2s;
}
.check-item.checked .ci-cb {
  background: var(--primary);
  border-color: var(--primary);
}
.check-item.checked .ci-cb svg { opacity: 1; }

.ci-body {
  flex: 1;
  min-width: 0;
}
.ci-text {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.5;
  word-break: break-word;
}
.check-item.checked .ci-text {
  color: var(--ink-4);
  text-decoration: line-through;
}
.ci-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 6px;
}
.ci-tags span {
  font-size: 10.5px;
  padding: 2px 8px;
  border-radius: 6px;
  background: var(--bg-warm);
  color: var(--ink-2);
}
.ci-tags span.key { background: var(--primary-soft); color: var(--primary); }
.ci-tags span.bank { background: #E8DCC0; color: #7A5A3A; }
.ci-tags span.warn { background: var(--warn-soft); color: #8B6B2B; }

.ci-note {
  margin-top: 8px;
  padding: 10px 12px;
  background: var(--bg-warm);
  border-radius: 10px;
  font-size: 12.5px;
  color: var(--ink-2);
  line-height: 1.6;
}
.ci-note b { color: var(--primary); font-weight: 500; font-size: 11.5px; }
.ci-note-row {
  display: flex;
  gap: 6px;
  align-items: flex-start;
}
.ci-note-icon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--ink-3);
}

.ci-action {
  width: 32px; height: 32px;
  border-radius: 8px;
  color: var(--ink-4);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 7px;
  flex-shrink: 0;
  transition: all 0.15s;
}
.ci-action:active {
  background: var(--primary-soft);
  color: var(--primary);
}
.ci-action.del:active {
  background: #F3DDD9;
  color: var(--primary);
}

/* 添加事项按钮 */
.add-item-btn {
  margin-top: 10px;
  width: 100%;
  padding: 14px;
  background: var(--card);
  border: 1px dashed var(--line);
  border-radius: 16px;
  font-size: 13.5px;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.2s;
}
.add-item-btn svg {
  width: 16px; height: 16px;
  color: var(--ink-4);
}
.add-item-btn:active {
  background: var(--bg-warm);
  color: var(--primary);
  border-color: var(--primary-soft);
}
.add-item-btn:active svg { color: var(--primary); }

/* 分类操作入口 */
.cg-actions {
  margin-left: auto;
  display: flex;
  gap: 4px;
}
.cg-act {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px; height: 26px;
  border-radius: 8px;
  color: var(--ink-4);
  cursor: pointer;
  transition: all 0.15s;
}
.cg-act:active { background: var(--bg-warm); color: var(--primary); }
.cg-act.del:active { background: #FFEEEE; color: #E5484D; }

/* 添加分类按钮 */
.add-group-btn {
  margin: 16px 0 8px;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary-soft) 0%, var(--card) 100%);
  border: 1px dashed var(--primary);
  border-radius: 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.2s;
}
.add-group-btn svg {
  width: 16px; height: 16px;
}
.add-group-btn:active {
  transform: scale(0.98);
  background: var(--primary);
  color: #fff;
}
.add-group-btn:active svg { color: #fff; }

/* ============ 底部导航 ============ */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 420px;
  margin: 0 auto;
  background: rgba(255, 249, 245, 0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--line);
  display: flex;
  height: 76px;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 20;
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 10.5px;
  color: var(--ink-3);
  font-weight: 500;
  padding: 10px 0;
  transition: color 0.2s;
}
.tab svg {
  width: 24px;
  height: 24px;
  color: var(--ink-3);
  transition: all 0.25s;
}
.tab.active {
  color: var(--primary);
}
.tab.active svg {
  color: var(--primary);
  transform: translateY(-1px);
}

/* ============ 弹层 ============ */
.modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: none;
}
.modal.show { display: block; animation: modalBg 0.3s; }
/* 顶层弹层：覆盖在 planPreviewModal 等普通弹层之上 */
.modal.modal-top { z-index: 200; }
@keyframes modalBg { from { opacity: 0; } to { opacity: 1; } }

.modal-mask {
  position: absolute;
  inset: 0;
  background: rgba(43, 39, 36, 0.45);
  animation: maskIn 0.3s;
}
@keyframes maskIn { from { opacity: 0; } to { opacity: 1; } }

.modal-sheet {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 420px;
  margin: 0 auto;
  background: var(--bg);
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
  max-height: 80vh;
  overflow-y: auto;
  animation: sheetUp 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-sheet-big { max-height: 85vh; }
.modal-sheet-small { max-height: 60vh; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

.sheet-handle {
  width: 40px; height: 4px;
  background: var(--line);
  border-radius: 2px;
  margin: 12px auto 4px;
}

/* 日详情弹层内容 */
.day-detail {
  padding: 8px 22px 30px;
}
.day-detail .dd-top {
  text-align: center;
  padding: 12px 0 18px;
}
.dd-bigdate {
  font-size: 42px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -1px;
}
.dd-sub {
  font-size: 13px;
  color: var(--ink-3);
  margin-top: 8px;
}
.dd-tags-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.dd-tags-row span {
  font-size: 11px;
  padding: 4px 10px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--ink-2);
}

.dd-section {
  margin-top: 18px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px;
  box-shadow: var(--shadow-sm);
}
.dd-section-title {
  font-size: 13px;
  color: var(--ink-3);
  margin-bottom: 10px;
  letter-spacing: 0.5px;
  font-weight: 500;
}
.dd-row {
  display: flex;
  gap: 10px;
  margin: 6px 0;
  font-size: 13.5px;
  color: var(--ink-2);
  line-height: 1.6;
}
.dd-row .dd-label {
  color: var(--ink-3);
  min-width: 70px;
  font-size: 12.5px;
}
.dd-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}
.dd-chips span {
  font-size: 12px;
  padding: 4px 10px;
  background: var(--bg-warm);
  color: var(--ink-2);
  border-radius: 8px;
}
.dd-chips span.bad { background: #F5E2DD; color: var(--primary); }
.dd-divider {
  height: 1px;
  background: var(--line-soft);
  margin: 14px -18px;
}

.dd-trad {
  font-size: 12.5px;
  color: var(--ink-2);
  line-height: 1.7;
}
.dd-trad-title {
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 8px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* 日历弹层 */
.calendar-wrap { padding: 8px 22px 30px; }
.cal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0 16px;
}
.cal-head .cal-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
}
.cal-head button {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  color: var(--ink-2);
}
.cal-head button:active { background: var(--bg-warm); }
.cal-week {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 11.5px;
  color: var(--ink-3);
  padding-bottom: 8px;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 10px;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: var(--card);
  border: 1px solid var(--line-soft);
  position: relative;
  color: var(--ink-2);
  transition: all 0.15s;
}
.cal-cell.muted { opacity: 0.35; }
.cal-cell.good { background: var(--primary-soft); border-color: var(--primary-soft); color: var(--primary); font-weight: 500; }
.cal-cell.bad { background: var(--warn-soft); border-color: var(--warn-soft); color: #8B6B2B; }
.cal-cell.today {
  border: 1.5px solid var(--primary);
  color: var(--primary);
  font-weight: 600;
}
.cal-cell:active { transform: scale(0.95); }
.cal-cell .cc-dot {
  width: 4px; height: 4px;
  border-radius: 2px;
  background: var(--primary);
  margin-top: 2px;
}
.cal-cell.muted .cc-dot { display: none; }
.cal-legend {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--line-soft);
}
.cal-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--ink-3);
}
.cal-legend-item .dot {
  width: 10px; height: 10px;
  border-radius: 4px;
}
.cal-legend-item .dot.good { background: var(--primary-soft); }
.cal-legend-item .dot.bad { background: var(--warn-soft); }
.cal-legend-item .dot.today { border: 1.5px solid var(--primary); background: transparent; }

/* 备注弹层 */
.note-modal {
  padding: 6px 22px 20px;
}
.note-modal h3 {
  text-align: center;
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  padding: 12px 0 18px;
}
.note-modal .nm-label {
  font-size: 12.5px;
  color: var(--ink-3);
  margin-bottom: 8px;
  font-weight: 500;
}
.note-modal textarea,
.note-modal input[type="text"] {
  width: 100%;
  padding: 14px 16px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  font-size: 14px;
  color: var(--ink);

.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--ink);
  color: #fff;
  padding: 14px 22px;
  border-radius: 14px;
  font-size: 14px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
  max-width: 280px;
  text-align: center;
  line-height: 1.5;
}
.toast.show { opacity: 0.95; }

/* 滚动条美化 */
.chat-scroll::-webkit-scrollbar,
.plans-list::-webkit-scrollbar,
.modal-sheet::-webkit-scrollbar { width: 0; height: 0; }

/* ===== 新结构样式：概览/计划/当天 ===== */
.ov-share-row { padding: 14px 16px 4px; }
.ov-share-btn {
  display: inline-flex; align-items: center; gap: 6px;
  width: 100%; justify-content: center;
  padding: 12px 14px; border-radius: 12px;
  border: 1px solid var(--primary, #C8451F);
  background: #fff; color: var(--primary, #C8451F);
  font-size: 14px; font-weight: 500; cursor: pointer;
}
.ov-share-btn.primary { background: var(--primary, #C8451F); color: #fff; }
.ov-share-btn:active { transform: scale(0.98); }

/* 计划页：按日期分组 */
.plan-tip { padding: 10px 16px 6px; font-size: 12.5px; color: var(--ink-3, #888); }
.plan-date-group { margin: 4px 0 12px; padding: 0 12px; }
.pdg-title {
  padding: 8px 6px; font-size: 13px; font-weight: 600;
  color: var(--ink-1, #2A2118); border-bottom: 1px solid var(--ink-6, #F0E8DC);
}
.pdg-items { padding: 4px 0; }

/* 计划事项行 */
.plan-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 8px; border-bottom: 1px solid var(--ink-6, #F5EFE5);
}
.plan-item.done .pi-text { color: var(--ink-3, #888); text-decoration: line-through; }
.pi-cb {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--ink-4, #B5A89A);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer;
}
.pi-cb svg { width: 14px; height: 14px; color: #fff; display: none; }
.plan-item.done .pi-cb { background: var(--primary, #C8451F); border-color: var(--primary, #C8451F); }
.plan-item.done .pi-cb svg { display: block; }
.pi-body { flex: 1; min-width: 0; }
.pi-time { font-size: 12px; color: var(--ink-3, #888); margin-bottom: 2px; }
.pi-text { font-size: 14px; color: var(--ink-1, #2A2118); word-break: break-word; }
.pi-owner { font-size: 12px; color: var(--ink-3, #888); margin-top: 3px; }
.pi-note { font-size: 12px; color: var(--ink-3, #888); margin-top: 2px; background: var(--ink-6, #F5EFE5); padding: 4px 6px; border-radius: 4px; }
.pi-action {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  color: var(--ink-3, #888); cursor: pointer; flex-shrink: 0;
}
.pi-action.del { color: #D89090; }
.pi-action:active { background: var(--ink-6, #F5EFE5); border-radius: 6px; }

/* 时间轴节点完成态 */
.flow-node.done .fn-name { color: var(--ink-3, #888); text-decoration: line-through; }
.flow-node.done .fn-dot { background: var(--primary, #C8451F); }

/* datetime-local 包装 */
.datetime-wrap { position: relative; }
.datetime-wrap input[type="datetime-local"] {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0; z-index: 2; cursor: pointer;
}
.datetime-mask {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border: 1px solid var(--ink-6, #E8DFD0);
  border-radius: 10px; background: #fff;
  font-size: 14px; color: var(--ink-1, #2A2118);
  min-height: 46px;
}
.dt-val { color: var(--ink-1, #2A2118); }
.datetime-mask svg { color: var(--ink-3, #888); }
.datetime-hint { margin-top: 6px; font-size: 12px; color: var(--ink-3, #888); }

/* 计划详细预览：日期分组 */
.ppm-plan-list { padding: 0 4px; }
.ppm-date-group { margin-bottom: 8px; }
.ppm-date-title {
  padding: 6px 4px; font-size: 12.5px; font-weight: 600;
  color: var(--ink-2, #5A4D3E);
}
.ppm-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 6px; border-bottom: 1px solid var(--ink-6, #F5EFE5);
}
.ppm-item-time {
  font-size: 12px; color: var(--ink-3, #888);
  min-width: 46px; flex-shrink: 0;
}
.ppm-item-text { flex: 1; font-size: 14px; color: var(--ink-1, #2A2118); }
.ppm-item-edit, .ppm-item-del {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  color: var(--ink-3, #888); cursor: pointer;
}
.ppm-item-del { color: #D89090; }
.ppm-empty { padding: 16px; text-align: center; font-size: 13px; color: var(--ink-3, #888); }
.ppm-today-timeline { padding: 4px 8px 8px; }
.ppm-tl-node {
  display: flex; gap: 10px; padding: 8px 0;
  border-left: 2px solid var(--primary, #C8451F);
  padding-left: 10px; margin-left: 6px; position: relative;
}
.ppm-tl-node::before {
  content: ""; position: absolute; left: -5px; top: 12px;
  width: 8px; height: 8px; border-radius: 50%; background: var(--primary, #C8451F);
}
.ppm-tl-time { font-size: 12px; color: var(--ink-3, #888); min-width: 40px; }
.ppm-tl-name { font-size: 14px; color: var(--ink-1, #2A2118); }

/* 分享预览：计划/当天 */
.scp-plan-list { padding: 4px 0; }
.scp-plan-date {
  padding: 8px 0 4px; font-size: 12.5px; font-weight: 600;
  color: var(--ink-2, #5A4D3E); border-bottom: 1px solid #F0E8DC;
}
.scp-plan-item {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 0; border-bottom: 1px solid #F5EFE5; font-size: 13px;
}
.scp-plan-item.done { color: var(--ink-3, #888); }
.scp-pi-time { color: var(--ink-3, #888); min-width: 44px; }
.scp-pi-name { flex: 1; color: var(--ink-1, #2A2118); }
.scp-pi-owner { font-size: 12px; color: var(--ink-3, #888); }
.scp-pi-note { font-size: 12px; color: var(--ink-3, #888); width: 100%; }
.scp-pi-state { font-size: 12px; color: var(--primary, #C8451F); }
.scp-plan-item.done .scp-pi-state { color: var(--ink-3, #888); }

.scp-timeline { padding: 4px 0; }
.scp-tl-node {
  display: flex; gap: 10px; padding: 8px 0;
  border-left: 2px solid var(--primary, #C8451F);
  padding-left: 10px; margin-left: 6px; position: relative;
}
.scp-tl-node::before {
  content: ""; position: absolute; left: -5px; top: 12px;
  width: 8px; height: 8px; border-radius: 50%; background: var(--primary, #C8451F);
}
.scp-tl-node.done::before { background: var(--ink-4, #B5A89A); }
.scp-tl-node.done .scp-tl-name { color: var(--ink-3, #888); text-decoration: line-through; }
.scp-tl-time { font-size: 13px; color: var(--ink-3, #888); min-width: 44px; }
.scp-tl-body { flex: 1; }
.scp-tl-name { font-size: 14px; color: var(--ink-1, #2A2118); }
.scp-tl-owner, .scp-tl-note { font-size: 12px; color: var(--ink-3, #888); margin-top: 2px; }
.scp-empty { padding: 14px; text-align: center; font-size: 13px; color: var(--ink-3, #888); }

/* ===== 日历日期选择器 ===== */
.cal-picker { padding: 8px 16px 16px; }
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0 10px;
}
.cal-nav {
  width: 36px; height: 36px; border-radius: 8px; border: none;
  background: var(--bg-warm, #F5EFE5); color: var(--ink-2, #5A4D3E);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.cal-nav:active { background: var(--ink-6, #E8DFD0); }
.cal-title { font-size: 15px; font-weight: 600; color: var(--ink-1, #2A2118); }
.cal-weekrow {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 4px 0; margin-bottom: 4px;
}
.cal-week {
  text-align: center; font-size: 12px; color: var(--ink-3, #888);
  font-weight: 500;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-cell {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--ink-1, #2A2118); cursor: pointer;
  border-radius: 8px; user-select: none;
}
.cal-cell.other { color: var(--ink-4, #B5A89A); }
.cal-cell.disabled { color: var(--ink-6, #E0D8C8); cursor: not-allowed; background: transparent; }
.cal-cell:not(.disabled):hover { background: var(--bg-warm, #F5EFE5); }
.cal-cell.today { border: 1px solid var(--primary, #C8451F); }
.cal-range-tip {
  margin-top: 10px; font-size: 12px; color: var(--ink-3, #888); text-align: center;
}
.cal-actions { margin-top: 8px; display: flex; justify-content: center; }
.cal-cancel {
  padding: 8px 24px; border-radius: 8px; border: 1px solid var(--ink-6, #E8DFD0);
  background: #fff; color: var(--ink-2, #5A4D3E); font-size: 14px; cursor: pointer;
}

/* ===== 时间选择器（5 分钟间隔） ===== */
.tp-picker { padding: 8px 16px 16px; }
.tp-title { font-size: 15px; font-weight: 600; color: var(--ink-1, #2A2118); text-align: center; padding: 6px 0 10px; }
.tp-cols {
  display: flex; align-items: stretch; justify-content: center; gap: 8px;
  height: 220px; position: relative;
}
.tp-col {
  flex: 1; max-width: 90px; overflow-y: auto;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  padding: 80px 0;
}
.tp-col::-webkit-scrollbar { width: 0; }
.tp-opt {
  height: 36px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--ink-2, #5A4D3E); cursor: pointer;
  scroll-snap-align: center;
}
.tp-opt.active { color: var(--primary, #C8451F); font-weight: 600; font-size: 18px; }
.tp-sep {
  display: flex; align-items: center; font-size: 20px; font-weight: 600;
  color: var(--ink-1, #2A2118);
}
.tp-actions {
  display: flex; gap: 10px; justify-content: center; padding-top: 12px;
}
.tp-cancel, .tp-ok {
  padding: 10px 28px; border-radius: 10px; font-size: 14px; cursor: pointer;
}
.tp-cancel { border: 1px solid var(--ink-6, #E8DFD0); background: #fff; color: var(--ink-2, #5A4D3E); }
.tp-ok { background: var(--primary, #C8451F); color: #fff; border: none; }
.tp-cancel:active, .tp-ok:active { transform: scale(0.97); }

/* 事项编辑器里的日期/时间输入外观（与 datetime 包装保持一致） */
.dt-field-mask {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border: 1px solid var(--ink-6, #E8DFD0);
  border-radius: 10px; background: #fff;
  font-size: 14px; color: var(--ink-1, #2A2118);
  min-height: 46px; cursor: pointer;
}
.dt-field-mask.empty .dt-val { color: var(--ink-3, #888); }
.dt-field-mask svg { color: var(--ink-3, #888); }
.dt-fields-row { display: flex; gap: 8px; }
.dt-fields-row .dt-field { flex: 1; }
.dt-fields-row .dt-field-time { max-width: 120px; }
</style>
</head>
<body>
<div class="phone">

  <!-- ============ 页面 1：择好日 ============ -->
  <section class="page active" data-page="choose">
    <header class="page-head">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 2"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>择好日</h1>
          <p>人生大事，选好日子</p>
        </div>
      </div>
    </header>

    <!-- 初始状态：输入 + 常用事项 -->
    <div class="choose-entry" id="chooseEntry">
      <div class="entry-hero">
        <div class="hero-big">你最近有什么大事要办？</div>
        <div class="hero-small">说出你的大事，AI 帮你挑个合适的日子</div>
      </div>

      <div class="entry-input">
        <input type="text" id="mainInput" placeholder="例如：我最近想提车，帮我挑个好日子">
        <button class="input-btn" onclick="submitMainInput()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14-7-4 14-3-6-7-1z"/></svg>
        </button>
      </div>

      <div class="entry-subtitle">
        <span></span><em>或从常见事项开始</em><span></span>
      </div>

      <div class="event-grid" id="eventGrid"></div>
    </div>
  </section>

  <!-- ============ 页面 2：看好日 ============ -->
  <section class="page" data-page="browse">
    <header class="page-head">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="16" rx="2.5"/>
            <path d="M3 10h18M8 3v4M16 3v4"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>看好日</h1>
          <p>提前看看，最近哪些日子适合办大事</p>
        </div>
      </div>
    </header>

    <div class="filter-row" id="browseFilter">
      <button class="filter-btn active" data-filter="week">未来7天</button>
      <button class="filter-btn" data-filter="halfmonth">未来15天</button>
      <button class="filter-btn" data-filter="month">本月内</button>
      <button class="filter-btn filter-cal" data-filter="calendar" onclick="openCalendarModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="16" rx="2.5"/>
          <path d="M3 10h18M8 3v4M16 3v4"/>
        </svg>
      </button>
    </div>

    <div class="trend-card" id="trendCard"></div>

    <div class="section-title">
      <span>为你推荐</span>
      <em>按适合度排序</em>
    </div>

    <div class="browse-list" id="browseList"></div>

    <div class="bottom-note">
      <p>本产品基于传统黄历文化和现代办事场景提供日期参考与清单提醒。</p>
      <p>结果仅供生活参考，请结合实际安排、合同约定和相关办理时间综合决定。</p>
    </div>
  </section>

  <!-- ============ 页面 3：办好事 ============ -->
  <section class="page" data-page="plans">
    <header class="page-head">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3 8-8"/>
            <path d="M20 12v6a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h8"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>办好事</h1>
          <p>我的好事计划</p>
        </div>
      </div>
    </header>

    <div class="subtitle-row">选好日子，也把事情办妥当</div>

    <div class="filter-row" id="plansFilter">
      <button class="filter-btn" data-status="all">全部</button>
      <button class="filter-btn" data-status="selected">已择日</button>
      <button class="filter-btn active" data-status="active">进行中</button>
      <button class="filter-btn" data-status="done">已完成</button>
    </div>

    <div class="plans-list" id="plansList"></div>

    <button class="fab" onclick="goToPage('choose')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      <span>新增计划</span>
    </button>
  </section>

  <!-- ============ 页面 4：办好事详情 ============ -->
  <section class="page page-detail" data-page="plan-detail">
    <header class="page-head detail-head">
      <button class="back-btn" onclick="goToPage('plans')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="detail-title" id="detailTitle">计划详情</div>
      <button class="more-btn" onclick="openConfirmModal('confirmDeletePlan')">

      </button>
    </header>

    <div class="plan-detail-body" id="planDetailBody"></div>
  </section>

  <!-- ============ 聊天状态（独立于页面，fixed定位） ============ -->
  <div class="chat-area" id="chatArea" style="display:none">
    <div class="chat-header">
      <button class="chat-back-btn" onclick="resetChoosePage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>

      <div style="width:36px"></div>

      <span>看好日</span>

    <div class="modal-sheet" id="dayModalBody"></div>
  </div>

  <!-- 日历弹层 -->

    <div class="modal-mask" onclick="closeCalendarModal()"></div>
    <div class="modal-sheet" id="calendarModalBody"></div>

    <div class="modal-sheet" id="confirmModalBody"></div>

    <div class="modal-sheet modal-sheet-small" id="calendarPickerBody"></div>

<script>
/* ==================== 好日子 · Mock 数据 ==================== */

// 6 个常见事项
const EVENTS = [
  {
    key: "car",

const WEEKDAY_NAMES = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];

// 动态生成好日子列表（从今天起未来 N 天）
function generateBrowseDays(totalDays) {
  const result = [];
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const tplLen = BROWSE_TEMPLATES.length;
  let tplIdx = 0;
  // 从明天开始，每隔 2-3 天挑一个推荐日，直到填满 totalDays 范围
  let picked = 0;
  for (let offset = 1; offset <= totalDays; offset++) {
    const d = new Date(today);
    d.setDate(today.getDate() + offset);
    const dow = d.getDay();
    // 简单规则：周末优先推荐，工作日每隔 2-3 天推荐
    const isWeekend = (dow === 0 || dow === 6);
    const shouldPick = isWeekend || (offset % 3 === 0) || (offset % 2 === 0 && picked < 10);
    if (!shouldPick && picked >= 8) continue;
    if (!shouldPick && offset % 3 !== 0) continue;

    const tpl = BROWSE_TEMPLATES[tplIdx % tplLen];
    tplIdx++;
    // 周末用"更方便"类模板
    let level = tpl.level;
    let levelText = tpl.levelText;
    if (isWeekend && level === "ok") { level = "good"; levelText = "不错的日子"; }

    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const dateStr = `${y}-${String(m).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

    result.push({
      date: dateStr,
      day: day, month: m, weekday: WEEKDAY_NAMES[dow],
      time: tpl.time,
      suitable: tpl.suitable.slice(),
      avoid: tpl.avoid.slice(),
      desc: tpl.desc,
      tradYi: tpl.tradYi.slice(),
      tradJi: tpl.tradJi.slice(),
      level: level,
      levelText: levelText
    });
    picked++;
  }
  return result;
}

// 数据兼容层：把老结构（plan.checklist + plan.flow）转换为统一的 plan.planItems
// 老结构：
//   checklist: [{ groupName, items: [{ id, text, checked, note, reminder, tags }] }]
//   flow:      [{ time, name, note, owner }]
// 新结构：
//   planItems: [{ id, title, planTime, owner, note, done, category }]
// planTime 格式：YYYY-MM-DD HH:mm（无具体时间则只保留日期或为空）
// 转换是幂等的：已经有 planItems 的不会重复转换
function ensurePlanItems(plan) {
  if (!plan) return plan;
  if (Array.isArray(plan.planItems)) return plan;

  const items = [];
  const planDate = plan.date || ""; // YYYY-MM-DD

  // 1) 从 checklist 转换
  if (Array.isArray(plan.checklist)) {
    plan.checklist.forEach(group => {
      if (!group || !Array.isArray(group.items)) return;
      group.items.forEach(it => {
        items.push({
          id: it.id || ("item_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7)),
          title: it.text || "",
          planTime: planDate || "", // 清单事项默认归到好日子当天（无具体时间）
          owner: "",
          note: it.note || it.reminder || "",
          done: !!it.checked,
          category: group.groupName || ""
        });
      });
    });
  }

  // 2) 从 flow 转换（时间优先取 flow 的 time）
  if (Array.isArray(plan.flow)) {
    plan.flow.forEach(n => {
      // 去重：如果 checklist 里已经有同名事项，就跳过
      const exists = items.some(it => it.title === (n.name || "").trim());
      if (exists) return;
      items.push({
        id: "item_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
        title: n.name || "",
        planTime: planDate && n.time ? (planDate + " " + n.time) : (planDate || ""),
        owner: n.owner || "",
        note: n.note || "",
        done: false,
        category: ""
      });
    });
  }

  plan.planItems = items;
  // 保留旧字段以便回滚兼容，但新代码只读写 planItems
  return plan;
}

// 确保所有计划都有 planItems（在 loadPlans 后调用）
function ensureAllPlanItems(plans) {
  if (!Array.isArray(plans)) return plans;
  plans.forEach(ensurePlanItems);
  return plans;
}

// 获取好日子日期（YYYY-MM-DD）
function getPlanDate(plan) {
  return plan.date || "";
}

// 判断事项是否属于好日子当天
function isItemOnPlanDate(item, planDate) {
  if (!planDate) return false;
  if (!item.planTime) return false;
  // planTime 可能是 "YYYY-MM-DD HH:mm" 或 "YYYY-MM-DD"
  return item.planTime.startsWith(planDate);
}

// 获取事项的时间部分（HH:mm），无时间返回空
function getItemTime(item) {
  if (!item.planTime) return "";
  const parts = item.planTime.split(" ");
  if (parts.length >= 2) return parts[1];
  return "";
}

// 获取事项的日期部分（YYYY-MM-DD）
function getItemDate(item) {
  if (!item.planTime) return "";
  return item.planTime.split(" ")[0] || "";
}

// 获取按日期分组的计划事项（按 planTime 升序）
function groupPlanItemsByDate(items) {
  const groups = {};
  items.forEach(it => {
    const d = getItemDate(it) || "未安排";
    if (!groups[d]) groups[d] = [];
    groups[d].push(it);
  });
  // 每组内按时间排序
  Object.keys(groups).forEach(d => {
    groups[d].sort((a, b) => (getItemTime(a) || "99:99").localeCompare(getItemTime(b) || "99:99"));
  });
  // 返回 [{date, items}]
  return Object.keys(groups)
    .sort((a, b) => {
      if (a === "未安排") return 1;
      if (b === "未安排") return -1;
      return a.localeCompare(b);
    })
    .map(d => ({ date: d, items: groups[d] }));
}

// 获取好日子当天的事项（按时间排序）
function getPlanDayItems(plan) {
  const planDate = getPlanDate(plan);
  if (!planDate) return [];
  const items = (plan.planItems || []).filter(it => isItemOnPlanDate(it, planDate));
  // 有时间的在前，按时间排序；无时间的在后
  return items.sort((a, b) => {
    const ta = getItemTime(a), tb = getItemTime(b);
    if (!ta && !tb) return 0;
    if (!ta) return 1;
    if (!tb) return -1;
    return ta.localeCompare(tb);
  });
}

function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

// 记录/恢复滚动位置（用于局部操作后避免跳到顶部）
function rememberScroll(containerSelector) {
  const el = containerSelector ? document.querySelector(containerSelector) : null;
  // 如果容器是真正的滚动容器（scrollHeight > clientHeight），用它的 scrollTop
  if (el && el.scrollHeight > el.clientHeight) return el.scrollTop;
  return window.scrollY || document.documentElement.scrollTop || 0;
}
function restoreScroll(containerSelector, value) {
  // 双重 rAF：第一帧让浏览器完成 innerHTML 布局，第二帧再恢复滚动位置
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const el = containerSelector ? document.querySelector(containerSelector) : null;
      if (el && el.scrollHeight > el.clientHeight) {
        el.scrollTop = value;
      } else {
        window.scrollTo(0, value);
      }
    });
  });
}

// 生成清单并保存
function generateChecklistAndSave(dateData, withList, draft) {
  const ev = EVENTS.find(e => e.key === STATE.currentEvent);
  const checklist = CHECKLISTS[STATE.currentEvent];

  const planTitle = (draft && draft.title) ? draft.title : (checklist ? checklist.title : ev.name + "计划");
  const planTime = (draft && draft.time) ? draft.time : dateData.time;

  // 统一使用 planItems；若 draft 已有 planItems 直接复用
  let planItems = [];
  if (draft && Array.isArray(draft.planItems) && draft.planItems.length > 0) {
    planItems = draft.planItems.map(it => ({ ...it, done: false }));
  } else {
    // 退化路径：从模板预填
    const planDate = dateData.date || "";
    if (checklist) {
      checklist.groups.forEach(g => {
        g.items.forEach(it => {
          planItems.push({
            id: "item_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
            title: it.text,
            planTime: planDate || "",
            owner: "",
            note: it.note || it.reminder || "",
            done: false,
            category: g.name || ""
          });
        });
      });
    }
    const flowTpl = FLOW_TEMPLATES[STATE.currentEvent] || [];
    flowTpl.forEach(n => {
      if (planItems.some(it => it.title === n.name)) return;
      planItems.push({
        id: "item_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
        title: n.name,
        planTime: planDate && n.time ? (planDate + " " + n.time) : (planDate || ""),
        owner: n.owner || "",
        note: n.note || "",
        done: false,
        category: "当天流程"
      });
    });
  }

  const newPlan = {
    id: "plan_" + Date.now(),
    eventKey: STATE.currentEvent,
    title: planTitle,
    date: dateData.date,
    selectedDate: dateData.date,
    createdAt: todayStr(),
    dateText: `${dateData.month}月${dateData.day}日 ${dateData.weekday}`,
    time: planTime,
    status: withList ? "preparing" : "selected",
    statusText: withList ? "准备中" : "已择日",
    summary: withList ? dateData.reason : "已选好日子，可继续补充办事计划",
    tag: dateData.tagText,
    note: (draft && draft.note) ? draft.note : "",
    planItems: planItems
  };

  STATE.plans.unshift(newPlan);
  savePlans(STATE.plans);

  // 短延迟后显示成功卡片
  setTimeout(() => {
    if (withList) {
      addAIMessage(`已加入「办好事」。<br>我帮你整理了计划事项，涵盖准备阶段与当天流程。涉及车管所、保险、银行等外部机构的事项，我也加了备注提醒，你可以后续自己修改或补充。`);
    } else {
      addAIMessage(`好的，已帮你把 <b>${dateData.month}月${dateData.day}日 ${dateData.weekday}</b> 记下来。<br>随时可以去「办好事」继续完善计划。`);
    }
    renderPlanCreatedCard(newPlan);
    STATE.chatStep = 5;
  }, 200);
}

  const todayNum = now.getDate();

  // 按筛选过滤好日子
  const activeBtn = document.querySelector("#browseFilter .filter-btn.active");
  const filter = activeBtn ? activeBtn.getAttribute("data-filter") : "week";
  let days = BROWSE_DAYS.slice();
  if (filter === "week") {
    days = days.filter(d => {
      const dDate = new Date(d.date);
      const diff = Math.floor((dDate - now) / (1000*60*60*24));
      return diff >= 0 && diff < 7;
    });
  } else if (filter === "halfmonth") {
    days = days.filter(d => {
      const dDate = new Date(d.date);
      const diff = Math.floor((dDate - now) / (1000*60*60*24));
      return diff >= 0 && diff < 15;
    });
  } else if (filter === "month") {
    // 本月内：从今天到本月月底
    const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    days = days.filter(d => d.month === now.getMonth()+1 && d.day >= todayNum && d.day <= lastDay);
  }
  // 如果过滤后为空，至少显示前 3 个
  if (days.length === 0) days = BROWSE_DAYS.slice(0, 3);

  // 趋势卡片
  const trend = `
    <div class="trend-card">
      <div class="trend-title"><div class="trend-dot"></div>近期趋势</div>
      <div class="trend-item good">
        <div class="ti-num">${days.length}</div>
        <div>天比较适合安排 <b>提车</b>、<b>签约</b>、<b>出行</b>；周末可以安排家人一起。</div>

      </div>
      <div class="trend-tip">基于当前日期（${now.getMonth()+1}月${todayNum}日），为你推荐近期可安排的日子。</div>
    </div>
  `;
  const trendEl = $("#trendCard");
  if (trendEl) trendEl.innerHTML = trend;

  // 好日子列表
  const list = $("#browseList");
  if (list) {
    list.innerHTML = days.map(d => `
      <div class="browse-card" data-date="${d.date}">
        <div class="bc-top">
          <div class="bc-date">

// ===== 看好日 · 月历弹层 =====
function openCalendarModal() {
  const modal = $("#calendarModal");
  const body = $("#calendarModalBody");
  if (!body) return;

  // 默认显示当前真实月份
  const now = new Date();
  window._calMonthIdx = 0;
  window._calBaseYear = now.getFullYear();
  window._calBaseMonth = now.getMonth(); // 0-based
  renderMonth(body, now.getFullYear(), now.getMonth());
  modal.classList.add("show");
}

function renderMonth(container, year, month) {
  // month: 0-based
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
  // 当前真实日期
  const today = new Date();
  const todayYear = today.getFullYear();
  const todayMonth = today.getMonth();
  const todayDate = today.getDate();

  let cells = "";
  // 前导空白
  for (let i = 0; i < firstDay; i++) {
    cells += `<div class="cal-cell muted"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    const mark = CALENDAR_MARKS[dateKey];
    const isToday = (year === todayYear && month === todayMonth && d === todayDate);
    let cls = "";
    if (mark === "good") cls = "good";
    if (mark === "bad") cls = "bad";
    if (isToday) cls = (cls ? cls + " " : "") + "today";
    const dotHtml = mark ? `<div class="cc-dot"></div>` : "";
    cells += `<div class="cal-cell ${cls}" onclick="handleCalCellClick('${dateKey}')">${d}${dotHtml}</div>`;
  }

  container.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="calendar-wrap">
      <div class="cal-head">
        <button onclick="prevCalMonth()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="cal-title">${year} 年 ${month + 1} 月</div>
        <button onclick="nextCalMonth()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      <div class="cal-week">${weekdays.map(w => `<div>${w}</div>`).join("")}</div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="dot good"></div>推荐办理</div>
        <div class="cal-legend-item"><div class="dot bad"></div>建议避开</div>
        <div class="cal-legend-item"><div class="dot today"></div>今日</div>
      </div>
    </div>
  `;
}

function prevCalMonth() {
  window._calMonthIdx = (window._calMonthIdx || 0) - 1;
  const baseYear = window._calBaseYear || new Date().getFullYear();
  const baseMonth = window._calBaseMonth != null ? window._calBaseMonth : new Date().getMonth();
  const total = baseMonth + window._calMonthIdx;
  let y = baseYear + Math.floor(total / 12);
  let m = ((total % 12) + 12) % 12;
  const body = $("#calendarModalBody");
  renderMonth(body, y, m);
}

function nextCalMonth() {
  window._calMonthIdx = (window._calMonthIdx || 0) + 1;
  const baseYear = window._calBaseYear || new Date().getFullYear();
  const baseMonth = window._calBaseMonth != null ? window._calBaseMonth : new Date().getMonth();
  const total = baseMonth + window._calMonthIdx;
  let y = baseYear + Math.floor(total / 12);
  let m = ((total % 12) + 12) % 12;
  const body = $("#calendarModalBody");
  renderMonth(body, y, m);
}

function switchCalMonth() {
  nextCalMonth();
}

let _calClickIdx = 0;
function handleCalCellClick(dateKey) {
  _calClickIdx++;
  // 简单处理：如果有推荐就打开日详情
  const d = BROWSE_DAYS.find(x => x.date === dateKey);
  if (d) {
    closeCalendarModal();
    setTimeout(() => openDayDetail(dateKey), 300);
  } else {
    showToast("这一天没有特别推荐的事项");
  }
}

  if (filtered.length === 0) {

    const icon = getEventIcon(p.eventKey);

    return `
      <div class="plan-card" onclick="goToPlanDetail('${p.id}')">
        <div class="pc-head">

            <div class="pc-progress-num">${done}/${total}</div>

        </div>

    `;
  }).join("");
}

function countPlanTotal(plan) {
  if (Array.isArray(plan.planItems)) return plan.planItems.length;
  if (!plan.checklist) return 0;
  return plan.checklist.reduce((sum, g) => sum + (g.items ? g.items.length : 0), 0);
}
function countPlanDone(plan) {
  if (Array.isArray(plan.planItems)) return plan.planItems.filter(i => i.done).length;
  if (!plan.checklist) return 0;
  return plan.checklist.reduce((sum, g) => sum + (g.items ? g.items.filter(i => i.checked).length : 0), 0);
}

function getEventIcon(eventKey) {
  const ev = EVENTS.find(e => e.key === eventKey);
  return ev ? ev.iconSvg : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="4" width="16" height="16" rx="3"/></svg>`;
}

  const plan = STATE.plans.find(p => p.id === STATE.currentPlanId);
  if (!plan) return;
  ensurePlanItems(plan);
  const it = (plan.planItems || []).find(i => i.id === itemId);

// 生成推荐事项：从 CHECKLISTS 模板生成 planItems
function generateRecommendedItems() {
  const plan = STATE.plans.find(p => p.id === STATE.currentPlanId);
  if (!plan) return;
  ensurePlanItems(plan);
  if (!plan.planItems) plan.planItems = [];
  const checklist = CHECKLISTS[plan.eventKey];
  if (!checklist) { showToast("暂无推荐模板"); return; }
  const planDate = getPlanDate(plan);
  const flowTpl = FLOW_TEMPLATES[plan.eventKey] || [];
  const existingTitles = new Set(plan.planItems.map(i => i.title));
  // 加入清单事项
  checklist.groups.forEach(g => {
    g.items.forEach(it => {
      if (existingTitles.has(it.text)) return;
      plan.planItems.push({
        id: "item_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
        title: it.text,
        planTime: planDate || "",
        owner: "",
        note: it.note || it.reminder || "",
        done: false,
        category: g.name || ""
      });
      existingTitles.add(it.text);
    });
  });
  // 加入当天流程事项（带具体时间）
  flowTpl.forEach(n => {
    if (existingTitles.has(n.name)) return;
    plan.planItems.push({
      id: "item_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
      title: n.name,
      planTime: planDate && n.time ? (planDate + " " + n.time) : (planDate || ""),
      owner: n.owner || "",
      note: n.note || "",
      done: false,
      category: "当天流程"
    });
    existingTitles.add(n.name);
  });
  upgradePlanStatus(plan);
  savePlans(STATE.plans);
  const sTop = rememberScroll(PLAN_DETAIL_SCROLL);
  renderPlanDetail();
  restoreScroll(PLAN_DETAIL_SCROLL, sTop);
  showToast("已生成推荐事项");
}

// datetime 格式化为中文：2026-07-08 09:00 → 7月8日 09:00
function formatDateTimeZh(s) {
  if (!s) return "";
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})$/);
  if (!m) return s;
  return `${parseInt(m[2])}月${parseInt(m[3])}日 ${m[4]}:${m[5]}`;
}

// ===== 日历式日期 + 时间选择器 =====
// 返回 YYYY-MM-DD
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
// 计算事项可选日期范围：[startDate, endDate]
// startDate = plan.createdAt 或今天；endDate = plan.selectedDate 或 plan.date
function getPlanDateRange(plan) {
  let start = plan && plan.createdAt ? plan.createdAt : todayStr();
  let end = plan && (plan.selectedDate || plan.date) ? (plan.selectedDate || plan.date) : "";
  // 容错：如果 start > end，则放宽为只限制 end
  if (end && start > end) start = end;
  return { start, end };
}
// draft 也用相同规则：draft 没有 createdAt，用今天
function getDraftDateRange(draft) {
  const planDate = draft && draft.dateData && draft.dateData.date ? draft.dateData.date : "";
  return { start: todayStr(), end: planDate };
}
// 生成日历网格数据：给定 year, month，返回 6 行 x 7 列的日期数组（含上下月填充）
function buildCalendarGrid(year, month) {
  // month: 1-12
  const first = new Date(year, month - 1, 1);
  const firstWeekday = first.getDay(); // 0=日
  const daysInMonth = new Date(year, month, 0).getDate();
  const daysInPrev = new Date(year, month - 1, 0).getDate();
  const cells = [];
  // 上月填充
  for (let i = firstWeekday - 1; i >= 0; i--) {
    cells.push({ y: month === 1 ? year - 1 : year, m: month === 1 ? 12 : month - 1, d: daysInPrev - i, other: true });
  }
  // 当月
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ y: year, m: month, d, other: false });
  }
  // 下月填充至 42 格
  let nextD = 1;
  while (cells.length < 42) {
    cells.push({ y: month === 12 ? year + 1 : year, m: month === 12 ? 1 : month + 1, d: nextD++, other: true });
  }
  return cells;
}
function cellToDateStr(c) {
  return `${c.y}-${String(c.m).padStart(2,"0")}-${String(c.d).padStart(2,"0")}`;
}
// 打开日历弹层：onPick(dateStr) 回调；range={start,end} 限制可选范围
// state 挂在 window._calPicker
function openCalendarPicker(anchorInputId, initialDate, range, onPick) {
  window._calPicker = { anchorInputId, onPick, range };
  let y, m;
  if (initialDate) {
    const parts = initialDate.split("-");
    y = parseInt(parts[0]); m = parseInt(parts[1]);
  } else if (range.end) {
    const parts = range.end.split("-");
    y = parseInt(parts[0]); m = parseInt(parts[1]);
  } else {
    const d = new Date();
    y = d.getFullYear(); m = d.getMonth() + 1;
  }
  renderCalendarPicker(y, m);
  $("#calendarPickerModal").classList.add("show");
}
function renderCalendarPicker(year, month) {
  const st = window._calPicker;
  if (!st) return;
  const cells = buildCalendarGrid(year, month);
  const { start, end } = st.range;
  const today = todayStr();
  const body = $("#calendarPickerBody");
  body.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="cal-picker">
      <div class="cal-header">
        <button class="cal-nav" onclick="renderCalendarPicker(${month === 1 ? year - 1 : year}, ${month === 1 ? 12 : month - 1})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="cal-title">${year}年${month}月</div>
        <button class="cal-nav" onclick="renderCalendarPicker(${month === 12 ? year + 1 : year}, ${month === 12 ? 1 : month + 1})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      <div class="cal-weekrow">
        ${["日","一","二","三","四","五","六"].map(w => `<div class="cal-week">${w}</div>`).join("")}
      </div>
      <div class="cal-grid">
        ${cells.map(c => {
          const ds = cellToDateStr(c);
          const inRange = (!start || ds >= start) && (!end || ds <= end);
          const isToday = ds === today;
          const disabled = !inRange;
          const cls = `cal-cell${c.other ? " other" : ""}${disabled ? " disabled" : ""}${isToday ? " today" : ""}`;
          return `<div class="${cls}" ${inRange ? `onclick="pickCalendarDate('${ds}')"` : ""}>${c.d}</div>`;
        }).join("")}
      </div>
      <div class="cal-range-tip">
        ${start && end ? `可选范围：${formatDateZh(start)} 至 ${formatDateZh(end)}` : (end ? `可选范围：不晚于 ${formatDateZh(end)}` : "请选择日期")}
      </div>
      <div class="cal-actions">
        <button class="cal-cancel" onclick="closeCalendarPicker()">取消</button>
      </div>
    </div>
  `;
}
function pickCalendarDate(dateStr) {
  const st = window._calPicker;
  if (!st) return;
  // 更新锚点显示
  const anchor = document.getElementById(st.anchorInputId);
  if (anchor) {
    anchor.value = dateStr;
    anchor.dispatchEvent(new Event("change"));
  }
  if (typeof st.onPick === "function") st.onPick(dateStr);
  closeCalendarPicker();
}
function closeCalendarPicker() {
  $("#calendarPickerModal").classList.remove("show");
  window._calPicker = null;
}
// 打开时间选择器（5 分钟间隔）
function openTimePicker(anchorInputId, initialTime, onPick) {
  window._timePicker = { anchorInputId, onPick };
  let h = 9, min = 0;
  if (initialTime) {
    const parts = initialTime.split(":");
    h = parseInt(parts[0]) || 9;
    min = parseInt(parts[1]) || 0;
  }
  renderTimePicker(h, min);
  $("#timePickerModal").classList.add("show");
}
function renderTimePicker(h, min) {
  const st = window._timePicker;
  if (!st) return;
  const hours = [];
  for (let i = 0; i < 24; i++) hours.push(String(i).padStart(2,"0"));
  const minutes = [];
  for (let i = 0; i < 60; i += 5) minutes.push(String(i).padStart(2,"0"));
  const body = $("#timePickerBody");
  body.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="tp-picker">
      <div class="tp-title">选择时间</div>
      <div class="tp-cols">
        <div class="tp-col" id="tpHourCol">
          ${hours.map(hh => `<div class="tp-opt ${parseInt(hh) === h ? "active" : ""}" onclick="tpPick('h', '${hh}')">${hh}</div>`).join("")}
        </div>
        <div class="tp-sep">:</div>
        <div class="tp-col" id="tpMinCol">
          ${minutes.map(mm => `<div class="tp-opt ${parseInt(mm) === min ? "active" : ""}" onclick="tpPick('m', '${mm}')">${mm}</div>`).join("")}
        </div>
      </div>
      <div class="tp-actions">
        <button class="tp-cancel" onclick="closeTimePicker()">取消</button>
        <button class="tp-ok" onclick="tpConfirm()">确定</button>
      </div>
    </div>
  `;
  // 滚动到激活项
  setTimeout(() => {
    const hActive = body.querySelector("#tpHourCol .tp-opt.active");
    const mActive = body.querySelector("#tpMinCol .tp-opt.active");
    if (hActive) hActive.scrollIntoView({ block: "center" });
    if (mActive) mActive.scrollIntoView({ block: "center" });
  }, 50);
  window._timePicker.h = String(h).padStart(2,"0");
  window._timePicker.m = String(min).padStart(2,"0");
}
function tpPick(type, val) {
  const body = $("#timePickerBody");
  const col = type === "h" ? body.querySelector("#tpHourCol") : body.querySelector("#tpMinCol");
  if (!col) return;
  col.querySelectorAll(".tp-opt").forEach(o => o.classList.remove("active"));
  const opts = col.querySelectorAll(".tp-opt");
  const idx = Array.from(opts).findIndex(o => o.textContent.trim() === val);
  if (idx >= 0) opts[idx].classList.add("active");
  if (type === "h") window._timePicker.h = val; else window._timePicker.m = val;
}
function tpConfirm() {
  const st = window._timePicker;
  if (!st) return;
  const time = (st.h || "09") + ":" + (st.m || "00");
  const anchor = document.getElementById(st.anchorInputId);
  if (anchor) {
    anchor.value = time;
    anchor.dispatchEvent(new Event("change"));
  }
  if (typeof st.onPick === "function") st.onPick(time);
  closeTimePicker();
}
function closeTimePicker() {
  $("#timePickerModal").classList.remove("show");
  window._timePicker = null;
}

// 获取星期
function getWeekdayZh(dateText) {
  if (!dateText) return "";
  const m = dateText.match(/(\d{4})[-\/年](\d{1,2})[-\/月](\d{1,2})/);
  if (!m) return "";
  const d = new Date(m[1], parseInt(m[2])-1, parseInt(m[3]));
  const arr = ["日","一","二","三","四","五","六"];
  return "星期" + arr[d.getDay()];
}

function generateRecommendedChecklist() {
  const plan = STATE.plans.find(p => p.id === STATE.currentPlanId);

  const checklist = CHECKLISTS[plan.eventKey];
  if (!checklist) {
    showToast("暂无推荐清单模板");

  }
  plan.checklist = checklist.groups.map(g => ({
    groupName: g.name,

      id: `${g.name}_${idx}_${Date.now()}`,
      text: it.text,

      note: it.note || "",
      reminder: it.reminder || ""

  }));
  // 同时生成初始流程图（如果还没有）
  if (!plan.flow || plan.flow.length === 0) {

  if (ev) { ev.stopPropagation(); }

  const group = plan.checklist.find(g => g.groupName === groupName);
  if (!group) return;
  const item = group.items.find(i => i.id === itemId);
  if (!item) return;
  item.checked = !item.checked;

  // 更新计划整体状态
  const total = countPlanTotal(plan);
  const done = countPlanDone(plan);
  if (total > 0 && done === total) {
    plan.status = "done";
    plan.statusText = "已完成";
  } else if (done > 0) {
    if (plan.status === "done" || plan.status === "todo" || plan.status === "waiting") {
      plan.status = "preparing";
      plan.statusText = "准备中";
    }
  }

  savePlans(STATE.plans);
  const sTop = rememberScroll(PLAN_DETAIL_SCROLL);
  renderPlanDetail();
  renderPlans();
  restoreScroll(PLAN_DETAIL_SCROLL, sTop);
}

      <textarea id="nm-note" placeholder="写点小提示，比如需要的资料、联系方式..."></textarea>
      <div class="nm-label" style="margin-top: 14px">提醒</div>
      <input type="text" id="nm-reminder" placeholder="例如：提前 1 天确认">
      <div class="nm-buttons">
        <button class="cancel" onclick="closeNoteModal()">取消</button>
        <button class="confirm" onclick="saveNewItem()">保存</button>
      </div>
    </div>
  `;
  modal.classList.add("show");

  // 标签切换
  body.querySelectorAll(".nm-tag-select button").forEach(b => {
    b.onclick = () => {
      b.classList.toggle("active");
    };
  });
}

function saveNewItem() {
  const textEl = $("#nm-text");
  const noteEl = $("#nm-note");
  const reminderEl = $("#nm-reminder");
  const text = textEl.value.trim();
  if (!text) {
    showToast("请填写事项内容");
    return;
  }
  const tags = [];
  document.querySelectorAll("#noteModalBody .nm-tag-select button.active").forEach(b => {
    tags.push({ label: b.dataset.tag, type: b.dataset.type });
  });

  const plan = STATE.plans.find(p => p.id === STATE.currentPlanId);
  if (!plan) return;
  const group = plan.checklist.find(g => g.groupName === STATE.editingItem.groupName);
  if (!group) return;
  group.items.push({
    id: "custom_" + Date.now(),
    text: text,
    checked: false,
    tags: tags,
    note: noteEl.value.trim(),
    reminder: reminderEl.value.trim()
  });
  // 已择日状态联动：手动添加事项 → 变准备中
  if (plan.status === "selected") {
    plan.status = "preparing";
    plan.statusText = "准备中";
  }
  const sTop = rememberScroll(PLAN_DETAIL_SCROLL);
  savePlans(STATE.plans);
  closeNoteModal();
  renderPlanDetail();
  renderPlans();
  restoreScroll(PLAN_DETAIL_SCROLL, sTop);
  showToast("已添加");
}

function openEditNote(groupName, itemId) {
  const plan = STATE.plans.find(p => p.id === STATE.currentPlanId);
  if (!plan) return;
  const group = plan.checklist.find(g => g.groupName === groupName);
  if (!group) return;
  const item = group.items.find(i => i.id === itemId);
  if (!item) return;

  STATE.editingItem = { groupName, itemId };

  const modal = $("#noteModal");
  const body = $("#noteModalBody");
  body.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="note-modal">
      <h3>编辑事项</h3>
      <div class="nm-label">事项内容</div>
      <input type="text" id="nm-text" value="${escapeHtml(item.text)}">
      <div class="nm-label" style="margin-top: 14px">标签</div>
      <div class="nm-tag-select">
        ${[{l:"关键",t:"key"},{l:"需确认",t:"warn"},{l:"涉及银行",t:"bank"}].map(tag => {
          const active = item.tags && item.tags.some(x => x.type === tag.t);
          return `<button class="${active ? "active" : ""}" data-tag="${tag.l}" data-type="${tag.t}">${tag.l}</button>`;
        }).join("")}
      </div>
      <div class="nm-label" style="margin-top: 14px">备注</div>
      <textarea id="nm-note" placeholder="补充一些提示信息...">${escapeHtml(item.note || "")}</textarea>
      <div class="nm-label" style="margin-top: 14px">提醒</div>
      <input type="text" id="nm-reminder" value="${escapeHtml(item.reminder || "")}" placeholder="例如：提前 1 天确认">
      <div class="nm-buttons">
        <button class="cancel" onclick="closeNoteModal()">取消</button>
        <button class="confirm" onclick="saveEditItem()">保存修改</button>
      </div>
    </div>
  `;
  modal.classList.add("show");

  body.querySelectorAll(".nm-tag-select button").forEach(b => {
    b.onclick = () => b.classList.toggle("active");
  });
}

function saveEditItem() {
  const plan = STATE.plans.find(p => p.id === STATE.currentPlanId);
  if (!plan) return;
  const group = plan.checklist.find(g => g.groupName === STATE.editingItem.groupName);
  if (!group) return;
  const item = group.items.find(i => i.id === STATE.editingItem.itemId);
  if (!item) return;

  const textEl = $("#nm-text");
  const noteEl = $("#nm-note");
  const reminderEl = $("#nm-reminder");

  item.text = textEl.value.trim() || item.text;
  item.note = noteEl.value.trim();
  item.reminder = reminderEl.value.trim();

  const tags = [];
  document.querySelectorAll("#noteModalBody .nm-tag-select button.active").forEach(b => {
    tags.push({ label: b.dataset.tag, type: b.dataset.type });
  });
  item.tags = tags;

  const sTop = rememberScroll(PLAN_DETAIL_SCROLL);
  savePlans(STATE.plans);
  closeNoteModal();
  renderPlanDetail();
  renderPlans();
  restoreScroll(PLAN_DETAIL_SCROLL, sTop);
  showToast("已保存");
}

function closeNoteModal() {
  const m = $("#noteModal");
  if (m) m.classList.remove("show");
  STATE.editingItem = null;
}

// HTML 转义
function escapeHtml(s) {
  if (!s) return "";
  return String(s).replace(/[&<>"']/g, function(c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

// 点击弹层遮罩关闭
document.addEventListener("click", function(e) {
  if (e.target.classList.contains("modal") && e.target.classList.contains("show")) {
    // 不处理，由各自的 mask 点击处理
  }
  if (e.target.classList.contains("modal-mask")) {
    e.target.parentElement.classList.remove("show");
  }
});

</script>
</body>
</html>
