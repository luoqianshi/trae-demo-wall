<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>玫瑰盛开</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050010;font-family:'Segoe UI',sans-serif}
canvas{display:block;position:absolute;top:0;left:0;z-index:1}

/* 播放器 */
#player{position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:rgba(10,5,20,0.88);backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,180,200,0.12);padding:6px 16px;
  display:flex;align-items:center;gap:10px;height:56px;user-select:none}
#player .btn{background:none;border:none;color:rgba(255,200,210,0.85);cursor:pointer;
  font-size:20px;padding:4px 8px;border-radius:4px;transition:all .15s}
#player .btn:hover{color:#fff;background:rgba(255,180,200,0.15)}
#player .btn:active{transform:scale(0.92)}
#songName{flex:1;min-width:0;color:rgba(255,200,210,0.7);font-size:14px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
#progressWrap{width:180px;height:4px;background:rgba(255,180,200,0.15);border-radius:2px;
  cursor:pointer;position:relative;flex-shrink:0}
#progressBar{height:100%;background:linear-gradient(90deg,#e24a80,#ff8ab0);border-radius:2px;width:0%;pointer-events:none}
#timeDisplay{color:rgba(255,200,210,0.5);font-size:13px;min-width:70px;text-align:center;flex-shrink:0}
#volWrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
#volIcon{font-size:16px;color:rgba(255,200,210,0.7);cursor:pointer}
#volSlider{width:70px;height:4px;-webkit-appearance:none;appearance:none;
  background:rgba(255,180,200,0.2);border-radius:2px;outline:none;cursor:pointer}
#volSlider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;
  border-radius:50%;background:#e24a80;cursor:pointer}
#listBtn{font-size:16px}

/* 播放列表面板 */
#playlist{position:fixed;bottom:56px;right:0;width:480px;max-height:500px;z-index:10;
  background:rgba(10,5,20,0.92);backdrop-filter:blur(12px);
  border:1px solid rgba(255,180,200,0.12);border-bottom:none;border-radius:8px 8px 0 0;
  display:none;overflow:hidden;flex-direction:column}
#playlist.show{display:flex}
#playlistHead{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,180,200,0.1);gap:8px}
#playlistHead span{color:rgba(255,200,210,0.7);font-size:28px}
#playlistHead .mode-btn{background:rgba(255,180,200,0.12);border:1px solid rgba(255,180,200,0.2);
  color:rgba(255,200,210,0.8);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:24px;
  white-space:nowrap;transition:all .15s}
#playlistHead .mode-btn:hover{background:rgba(255,180,200,0.25)}
#playlistHead .mode-btn.active{background:rgba(226,74,128,0.3);border-color:rgba(226,74,128,0.5);color:#e24a80}
#addBtn{background:rgba(255,180,200,0.12);border:1px solid rgba(255,180,200,0.2);
  color:rgba(255,200,210,0.8);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:26px}
#addBtn:hover{background:rgba(255,180,200,0.25)}
#songList{overflow-y:auto;flex:1;padding:6px 0}
#songList::-webkit-scrollbar{width:8px}
#songList::-webkit-scrollbar-thumb{background:rgba(255,180,200,0.2);border-radius:4px}
.song-item{padding:10px 16px;color:rgba(255,200,210,0.6);font-size:28px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .15s;
  display:flex;align-items:center;justify-content:space-between;user-select:none}
.song-item:hover{background:rgba(255,180,200,0.1);color:rgba(255,200,210,0.9)}
.song-item.active{color:#e24a80;background:rgba(226,74,128,0.1)}
.song-item.selected{color:rgba(255,200,210,0.85);background:rgba(255,180,200,0.08)}
.song-item.dragging{opacity:0.5;background:rgba(255,180,200,0.2)}
.song-item.drag-over{border-top:4px solid #e24a80}
.song-item span{overflow:hidden;text-overflow:ellipsis;flex:1}
.song-item .item-btns{display:flex;gap:4px;flex-shrink:0}
.lrc-btn,.del-btn{background:none;border:none;color:rgba(255,200,210,0.4);cursor:pointer;
  font-size:28px;padding:4px 8px;opacity:0;transition:opacity .2s}
.song-item:hover .lrc-btn,.song-item:hover .del-btn{opacity:1}
.lrc-btn:hover{color:#e24a80}
.del-btn:hover{color:#ff4444}

/* 颜色选择器面板 */
#colorPanel{position:fixed;top:450px;right:40px;z-index:10;
  background:rgba(10,5,20,0.88);backdrop-filter:blur(12px);
  border:1px solid rgba(255,180,200,0.12);border-radius:8px;padding:10px 14px;
  display:none;min-width:160px}
#colorPanel.show{display:block}
#colorPanel label{display:flex;align-items:center;gap:8px;margin:4px 0;
  color:rgba(255,200,210,0.7);font-size:14px}
#colorPanel input[type=color]{width:28px;height:22px;border:none;border-radius:4px;
  cursor:pointer;background:transparent;padding:0}
#colorToggle{position:fixed;top:450px;right:40px;z-index:11;
  background:rgba(10,5,20,0.7);border:1px solid rgba(255,180,200,0.2);
  color:rgba(255,200,210,0.8);width:32px;height:32px;border-radius:50%;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
#colorToggle:hover{background:rgba(255,180,200,0.15)}

#fileInput{display:none}

/* 歌词显示 */
#lyricsWrap{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:5;
  width:240px;max-height:60vh;overflow-y:auto;overflow-x:hidden;pointer-events:none;
  mask-image:linear-gradient(to bottom,transparent 0%,#000 15%,#000 85%,transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom,transparent 0%,#000 15%,#000 85%,transparent 100%);
  scrollbar-width:none}
#lyricsWrap::-webkit-scrollbar{display:none}
#lyricsWrap .lrc-line{padding:4px 0;color:rgba(255,200,210,0.3);font-size:15px;
  line-height:1.6;transition:all .4s ease;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#lyricsWrap .lrc-line.active{color:rgba(255,220,230,0.95);font-size:17px;font-weight:600;
  text-shadow:0 0 12px rgba(255,100,130,0.4)}
#lyricsWrap .lrc-line.near{color:rgba(255,200,210,0.55)}

/* 花盆下方大字体歌词 */
#lyricsBig{position:fixed;left:50%;transform:translateX(-50%);z-index:6;
  text-align:center;pointer-events:none;width:80%;max-width:600px}
#lyricsBig .lrc-prev,#lyricsBig .lrc-next{color:rgba(255,180,200,0.25);
  font-size:18px;line-height:1.6;transition:all .5s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#lyricsBig .lrc-cur{color:rgba(255,220,230,0.95);font-size:28px;font-weight:700;
  line-height:1.5;transition:all .5s ease;text-shadow:0 0 20px rgba(255,80,120,0.5),0 0 40px rgba(255,80,120,0.2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* 万年历tooltip - 老式日历牌风格 */
#calendarTip{position:fixed;z-index:100;pointer-events:none;display:none;
  width:260px;font-family:'SimSun','STSong','Microsoft YaHei',serif;
  background:#f5f0e8;border:3px solid #c8b89a;border-radius:2px;
  box-shadow:4px 4px 14px rgba(0,0,0,0.5),0 0 0 1px rgba(200,180,150,0.3);
  overflow:hidden}
#calendarTip .cal-header{background:linear-gradient(135deg,#cc2222,#dd3333);
  padding:8px 14px;text-align:center;color:#fff;font-size:16px;letter-spacing:2px;
  border-bottom:3px solid #aa1111}
#calendarTip .cal-body{padding:10px 14px 8px}
#calendarTip .cal-day{font-size:86px;font-weight:900;color:#cc2222;text-align:center;
  line-height:1;margin:6px 0 4px;font-family:'Arial Black','SimHei',sans-serif;
  text-shadow:2px 2px 0 rgba(180,20,20,0.2)}
#calendarTip .cal-solar-small{font-size:15px;color:#666;text-align:center;margin-bottom:6px}
#calendarTip .cal-lunar-main{font-size:20px;color:#333;text-align:center;font-weight:700;
  margin-bottom:4px}
#calendarTip .cal-gz{font-size:15px;color:#888;text-align:center;margin-bottom:4px}
#calendarTip .cal-festival{color:#cc2222;font-weight:700;font-size:18px;text-align:center;
  margin:4px 0}
#calendarTip .cal-divider{border-top:1px dashed #c8b89a;margin:7px 0}
#calendarTip .cal-time{font-size:15px;color:#555;text-align:center;margin-bottom:3px}
#calendarTip .cal-yi-ji{display:flex;margin-top:6px;gap:6px}
#calendarTip .cal-yi{flex:1;padding:6px 8px;background:rgba(220,255,220,0.5);border-radius:3px}
#calendarTip .cal-ji{flex:1;padding:6px 8px;background:rgba(255,220,220,0.5);border-radius:3px}
#calendarTip .cal-yi-title{font-size:16px;font-weight:700;color:#2a8c2a;margin-bottom:3px}
#calendarTip .cal-ji-title{font-size:16px;font-weight:700;color:#cc2222;margin-bottom:3px}
#calendarTip .cal-yi-items{font-size:14px;color:#3a6a3a;line-height:1.6}
#calendarTip .cal-ji-items{font-size:14px;color:#8a2a2a;line-height:1.6}
#calendarTip .cal-footer{background:#e8e0d0;padding:4px 14px;text-align:center;
  font-size:12px;color:#999;border-top:1px solid #d0c8b8}

/* Apple风格时间 */
#appleTime{position:fixed;top:40px;left:40px;z-index:15;pointer-events:none;
  font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;font-weight:200}
#appleTime .time-num{font-size:144px;color:rgba(255,255,255,0.9);line-height:1;
  letter-spacing:-4px;display:flex;align-items:baseline}
#appleTime .time-sec{font-size:56px;color:rgba(255,255,255,0.5);margin-left:4px;font-weight:300}
#appleTime .time-date{font-size:36px;color:rgba(255,255,255,0.5);margin-top:4px;font-weight:400}

/* 九宫格快捷位 */
#quickGrid{position:fixed;top:40px;right:40px;z-index:15;
  display:grid;grid-template-columns:repeat(3,120px);grid-template-rows:repeat(3,120px);
  gap:16px}
#quickGrid .q-cell{width:120px;height:120px;border-radius:24px;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
#quickGrid .q-cell:hover{background:rgba(255,255,255,0.16);transform:scale(1.08);
  border-color:rgba(255,200,210,0.3);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
#quickGrid .q-cell:active{transform:scale(0.94)}
#quickGrid .q-cell img{width:60px;height:60px;object-fit:contain;border-radius:8px}
#quickGrid .q-cell .q-emoji{font-size:56px;line-height:1}
#quickGrid .q-cell .q-letter{font-size:44px;color:rgba(255,255,255,0.5);font-weight:600}
#quickGrid .q-cell .q-plus{font-size:48px;color:rgba(255,255,255,0.2)}
#quickGrid .q-cell.empty{border-style:dashed}
#quickGrid .q-cell.empty:hover .q-plus{color:rgba(255,255,255,0.6)}

/* 快捷位编辑弹窗 */
#qEdit{position:fixed;z-index:200;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(20,10,35,0.95);backdrop-filter:blur(16px);
  border:1px solid rgba(255,200,210,0.2);border-radius:14px;padding:20px 24px;
  display:none;flex-direction:column;gap:10px;min-width:300px}
#qEdit.show{display:flex}
#qEdit label{color:rgba(255,200,210,0.7);font-size:14px}
#qEdit input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,200,210,0.2);
  color:#fff;padding:8px 12px;border-radius:6px;font-size:14px;outline:none}
#qEdit input:focus{border-color:rgba(255,200,210,0.5)}
#qEdit .q-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
#qEdit .q-btn{padding:8px 18px;border-radius:6px;cursor:pointer;font-size:14px;border:none}
#qEdit .q-btn-save{background:rgba(226,74,128,0.8);color:#fff}
#qEdit .q-btn-save:hover{background:rgba(226,74,128,1)}
#qEdit .q-btn-del{background:rgba(255,255,255,0.08);color:rgba(255,150,150,0.8)}
#qEdit .q-btn-del:hover{background:rgba(255,100,100,0.3)}
#qEdit .q-btn-cancel{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5)}
#qEdit .q-btn-cancel:hover{background:rgba(255,255,255,0.15)}
#qOverlay{position:fixed;z-index:199;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.4);display:none}
#qOverlay.show{display:block}

/* 背景切换箭头 */
.scene-arrow{position:fixed;top:50%;z-index:12;width:48px;height:80px;
  background:rgba(10,5,20,0.35);backdrop-filter:blur(6px);
  border:1px solid rgba(255,180,200,0.1);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:rgba(255,200,210,0.5);transition:all .25s;user-select:none}
.scene-arrow:hover{background:rgba(10,5,20,0.6);color:rgba(255,200,210,0.9);
  border-color:rgba(255,180,200,0.3);width:56px}
.scene-arrow:active{transform:scale(0.92)}
#arrowLeft{left:0;border-radius:0 12px 12px 0;border-left:none}
#arrowRight{right:0;border-radius:12px 0 0 12px;border-right:none}
.scene-arrow .arrow-icon{pointer-events:none}

/* 场景名称提示 */
#sceneName{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:12;
  color:rgba(255,200,210,0.7);font-size:14px;pointer-events:none;opacity:0;
  transition:opacity .3s;text-shadow:0 0 8px rgba(0,0,0,0.5)}
#sceneName.show{opacity:1}

/* 雨量指示 */
#rainInfo{position:fixed;top:50%;left:50%;transform:translate(-50%,-80%);z-index:8;
  color:rgba(180,200,255,0.7);font-size:16px;pointer-events:none;display:none;
  text-shadow:0 0 8px rgba(100,150,255,0.5)}
#rainInfo.show{display:block;animation:rainFade 1.5s ease forwards}
@keyframes rainFade{0%{opacity:1}100%{opacity:0}}

/* ===== 雨天场景 ===== */
#rainScene{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2;
  background:#E0E0E0;overflow:hidden;display:none}
#rainScene.show{display:block!important}

/* 半透明云彩背景图案 */
.rain-bg-clouds{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.bg-cloud{position:absolute;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,255,255,0.35) 0%,rgba(255,255,255,0.08) 50%,transparent 70%);
  animation:cloudDrift linear infinite}
.bg-cloud.c1{width:300px;height:120px;top:8%;left:5%;animation-duration:80s}
.bg-cloud.c2{width:400px;height:150px;top:15%;left:55%;animation-duration:100s;animation-delay:-30s}
.bg-cloud.c3{width:250px;height:100px;top:35%;left:20%;animation-duration:90s;animation-delay:-50s}
.bg-cloud.c4{width:350px;height:130px;top:50%;left:65%;animation-duration:110s;animation-delay:-20s}
.bg-cloud.c5{width:280px;height:110px;top:70%;left:10%;animation-duration:95s;animation-delay:-60s}
@keyframes cloudDrift{
  0%{transform:translateX(0)}
  50%{transform:translateX(60px)}
  100%{transform:translateX(0)}
}

/* 居中容器 */
.rain-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);
  display:flex;flex-direction:column;align-items:center}

/* 卡通云彩 */
.cartoon-cloud{position:relative;width:250px;height:200px}
.cloud-part{position:absolute;background:#fff;border-radius:50%;
  box-shadow:0 4px 15px rgba(0,0,0,0.08),inset 0 -3px 8px rgba(0,0,0,0.04)}
.cloud-part.main{width:160px;height:100px;bottom:0;left:50%;transform:translateX(-50%);border-radius:80px/60px}
.cloud-part.left{width:110px;height:90px;bottom:20px;left:10px;border-radius:55px/50px}
.cloud-part.right{width:120px;height:95px;bottom:15px;right:5px;border-radius:60px/52px}
.cloud-part.top{width:100px;height:80px;bottom:55px;left:50%;transform:translateX(-50%);border-radius:50px/45px}

/* 云彩表情 */
.cloud-face{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  width:80px;height:50px;pointer-events:none}
.cloud-eye{position:absolute;width:10px;height:14px;background:#555;border-radius:50%;top:8px}
.cloud-eye.left-eye{left:15px}
.cloud-eye.right-eye{right:15px}
.cloud-mouth{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);
  width:20px;height:10px;border:2.5px solid #555;border-top:none;border-radius:0 0 12px 12px}

/* 雨滴容器 */
.rain-drop-wrap{margin-top:15px;position:relative;display:flex;flex-direction:column;align-items:center}

/* 蓝色雨滴 */
.rain-drop{width:20px;height:40px;position:relative;cursor:pointer;
  background:#1E88E5;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  box-shadow:0 2px 8px rgba(30,136,229,0.4),inset 0 -4px 8px rgba(0,0,0,0.1),
  inset 2px 2px 4px rgba(255,255,255,0.3);
  animation:dropBounce 2s ease-in-out infinite}
.rain-drop::before{content:'';position:absolute;top:6px;left:5px;width:6px;height:8px;
  background:rgba(255,255,255,0.4);border-radius:50%;transform:rotate(-20deg)}
@keyframes dropBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(5px)}
}

/* 万年历组件 */
.rain-calendar{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);
  width:320px;background:rgba(255,255,255,0.95);border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.15);padding:16px;
  opacity:0;visibility:hidden;transition:opacity 0.4s ease,visibility 0.4s ease;
  pointer-events:none;z-index:10}
.rain-drop-wrap:hover .rain-calendar{opacity:1;visibility:visible;pointer-events:auto}

/* 万年历头部 */
.rcal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rcal-btn{width:32px;height:32px;border:none;border-radius:50%;
  background:rgba(30,136,229,0.1);color:#1E88E5;font-size:16px;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.rcal-btn:hover{background:rgba(30,136,229,0.25)}
.rcal-title{font-size:18px;font-weight:700;color:#333}

/* 星期标题行 */
.rcal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;
  margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #eee}
.rcal-weekdays span{font-size:13px;color:#999;font-weight:600;padding:4px 0}

/* 日期网格 */
.rcal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.rcal-days .day-cell{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:14px;color:#444;cursor:pointer;transition:all .15s;
  margin:0 auto;position:relative}
.rcal-days .day-cell:hover{background:rgba(30,136,229,0.1)}
.rcal-days .day-cell.today{background:#1E88E5;color:#fff;font-weight:700}
.rcal-days .day-cell.today:hover{background:#1565C0}
.rcal-days .day-cell.other-month{color:#ccc}
.rcal-days .day-cell.weekend{color:#E53935}
.rcal-days .day-cell.today.weekend{color:#fff}

/* 农历信息行 */
.rcal-info{margin-top:10px;padding-top:8px;border-top:1px solid #eee;
  font-size:13px;color:#888;text-align:center;line-height:1.6}
.rcal-info .lunar-day{color:#1E88E5;font-weight:600}
.rcal-info .gz-info{color:#666;font-size:12px}
.rcal-info .festival{color:#E53935;font-weight:700}


</style>
</head>
<body>
<canvas id="c"></canvas>
<input type="file" id="fileInput" multiple accept="audio/*,.lrc">

<!-- 歌词显示 -->
<div id="lyricsWrap"></div>

<!-- 花盆下方大字体歌词 -->
<div id="lyricsBig">
  <div class="lrc-prev"></div>
  <div class="lrc-cur"></div>
  <div class="lrc-next"></div>
</div>

<!-- 万年历tooltip -->
<div id="calendarTip"></div>

<!-- Apple风格时间 -->
<div id="appleTime">
  <div class="time-num"><span id="tH">12</span>:<span id="tM">00</span><span class="time-sec" id="tS">00</span></div>
  <div class="time-date" id="tDate">1月1日 周一</div>
</div>

<!-- 九宫格快捷位 -->
<div id="quickGrid"></div>

<!-- 快捷位编辑弹窗 -->
<div id="qOverlay"></div>
<div id="qEdit">
  <label>名称</label>
  <input id="qName" placeholder="输入名称">
  <label>网址</label>

<script>
var C = document.getElementById('c');
var X = C.getContext('2d');
var W, H;

function resize() {
    W = C.width = window.innerWidth;
    H = C.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

var BLOOM_MS = 6000;
var T0 = performance.now();
var VIEW_TILT = 0.45;

// ======== 音乐播放器 ========
var audio = new Audio();
audio.volume = 0.6;
var playlist = [];
var currentIdx = -1;
var musicPlaying = false;
var playMode = 'list'; // 'list' | 'single' | 'random'

// ======== LRC歌词系统 ========
var lyricsWrap = document.getElementById('lyricsWrap');
var currentLrc = [];       // [{time:ms, text:'...'}, ...]
var activeLrcIdx = -1;

function parseLrc(text){
    var lines = text.split('\n');
    var result = [];
    var offsetMs = 0;
    for(var i = 0; i < lines.length; i++){
        var line = lines[i].trim();
        if(!line) continue;
        var offMatch = line.match(/\[offset:(-?\d+)\]/i);
        if(offMatch){ offsetMs = parseInt(offMatch[1]); continue; }
        var timeTags = [];
        var remaining = line;
        var tagReg = /\[(\d{1,2}):(\d{1,2})([.:]\d{1,3})?\]/g;
        var m;
        while((m = tagReg.exec(remaining)) !== null){
            var min = parseInt(m[1]);
            var sec = parseInt(m[2]);
            var ms = m[3] ? parseInt(m[3].slice(1)) : 0;
            if(m[3] && m[3].length <= 2) ms *= 10;
            if(m[3] && m[3].length === 2) ms *= 10;
            timeTags.push(min * 60000 + sec * 1000 + ms);
        }
        var lrcText = remaining.replace(/\[\d{1,2}:\d{1,2}([.:]\d{1,3})?\]/g, '').trim();
        if(timeTags.length > 0 && lrcText){
            for(var j = 0; j < timeTags.length; j++){
                result.push({time: timeTags[j] + offsetMs, text: lrcText});
            }
        }
    }
    result.sort(function(a, b){ return a.time - b.time; });
    return result;
}

// 根据歌曲名匹配LRC文件名：检查歌曲名是否出现在LRC文件名中
function matchLrc(songName, lrcFilename){
    var s = songName.toLowerCase();
    var l = lrcFilename.replace(/\.lrc$/i, '').toLowerCase();
    // 完全匹配
    if(s === l) return true;
    // LRC文件名包含歌曲名 (如 "Édith Piaf - La Vie en Rose" 包含 "La Vie en Rose")
    if(l.indexOf(s) >= 0) return true;
    // 歌曲名包含LRC文件名
    if(s.indexOf(l) >= 0) return true;
    return false;
}

function loadLrcForSong(){
    currentLrc = [];
    activeLrcIdx = -1;
    lyricsWrap.innerHTML = '';
    var song = playlist[currentIdx];
    if(!song || !song.filename) return;

    // 1. 如果已关联lrcFile，直接加载
    if(song.lrcFile){
        fetchLrc(song.lrcFile);
        return;
    }

    // 2. 尝试同名.lrc (如 song.mp3 -> song.lrc)
    var baseLrc = song.filename.replace(/\.[^.]+$/, '.lrc');
    tryLoadLrc(baseLrc, song.name);
}

function tryLoadLrc(primaryName, songName){
    // 先尝试精确匹配
    fetchLrcWithFallback(primaryName, function(ok){
        if(!ok && songName){
            // 尝试扫描已知LRC文件列表
            var knownLrc = getKnownLrcFiles();
            for(var i = 0; i < knownLrc.length; i++){
                if(matchLrc(songName, knownLrc[i])){
                    fetchLrcWithFallback(knownLrc[i]);
                    return;
                }
            }
        }
    });
}

function fetchLrc(lrcName){
    var xhr = new XMLHttpRequest();
    xhr.open('GET', lrcName, true);
    xhr.onload = function(){
        if(xhr.status === 200 || xhr.status === 0){
            currentLrc = parseLrc(xhr.responseText);
            renderLrcLines();
        }
    };
    xhr.send();
}

function fetchLrcWithFallback(lrcName, cb){
    var xhr = new XMLHttpRequest();
    xhr.open('GET', lrcName, true);
    xhr.onload = function(){
        if(xhr.status === 200 || xhr.status === 0){
            currentLrc = parseLrc(xhr.responseText);
            renderLrcLines();
            // 记住匹配成功
            if(currentIdx >= 0 && playlist[currentIdx]){
                playlist[currentIdx].lrcFile = lrcName;
                savePlaylist();
            }
            if(cb) cb(true);
        } else {
            if(cb) cb(false);
        }
    };
    xhr.onerror = function(){ if(cb) cb(false); };
    xhr.send();
}

// 已知LRC文件列表（持久化存储）
var LRC_LIST_KEY = 'rose_lrc_files';

function saveKnownLrcFile(name){
    var list = getKnownLrcFiles();
    if(list.indexOf(name) < 0){
        list.push(name);
        try{ localStorage.setItem(LRC_LIST_KEY, JSON.stringify(list)); }catch(e){}
    }
}

function getKnownLrcFiles(){
    try{
        var raw = localStorage.getItem(LRC_LIST_KEY);
        if(raw) return JSON.parse(raw);
    }catch(e){}
    return [];
}

function loadLrcFromFile(file){
    var reader = new FileReader();
    reader.onload = function(e){
        currentLrc = parseLrc(e.target.result);
        activeLrcIdx = -1;
        renderLrcLines();
        // 记住LRC文件名关联
        if(currentIdx >= 0 && playlist[currentIdx]){
            playlist[currentIdx].lrcFile = file.name;
            savePlaylist();
        }
        saveKnownLrcFile(file.name);
    };
    reader.readAsText(file);
}

function renderLrcLines(){
    lyricsWrap.innerHTML = '';
    for(var i = 0; i < currentLrc.length; i++){
        var div = document.createElement('div');
        div.className = 'lrc-line';
        div.textContent = currentLrc[i].text;
        div.idx = i;
        lyricsWrap.appendChild(div);
    }
}

function updateLrc(){
    if(currentLrc.length === 0){
        updateBigLrc(-1);
        return;
    }
    var ct = audio.currentTime * 1000;
    var idx = -1;
    for(var i = currentLrc.length - 1; i >= 0; i--){
        if(ct >= currentLrc[i].time){
            idx = i;
            break;
        }
    }
    if(idx === activeLrcIdx) return;
    activeLrcIdx = idx;
    var lines = lyricsWrap.children;
    for(var i = 0; i < lines.length; i++){
        lines[i].className = 'lrc-line';
        if(i === idx) lines[i].className = 'lrc-line active';
        else if(Math.abs(i - idx) === 1) lines[i].className = 'lrc-line near';
    }
    if(idx >= 0 && lines[idx]){
        var wrap = lyricsWrap;
        var lineH = lines[idx].offsetHeight + 8;
        var targetScroll = idx * lineH - wrap.offsetHeight / 2 + lineH / 2;
        wrap.scrollTop = targetScroll;
    }
    // 更新花盆下方大字体歌词
    updateBigLrc(idx);
}

function updateBigLrc(idx){
    var bigEl = document.getElementById('lyricsBig');
    var prevEl = bigEl.querySelector('.lrc-prev');
    var curEl = bigEl.querySelector('.lrc-cur');
    var nextEl = bigEl.querySelector('.lrc-next');
    if(idx < 0 || currentLrc.length === 0){
        prevEl.textContent = '';
        curEl.textContent = '';
        nextEl.textContent = '';
        return;
    }
    prevEl.textContent = idx > 0 ? currentLrc[idx - 1].text : '';
    curEl.textContent = currentLrc[idx].text;
    nextEl.textContent = idx < currentLrc.length - 1 ? currentLrc[idx + 1].text : '';
}

audio.addEventListener('timeupdate', updateLrc);

var playBtn = document.getElementById('playBtn');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');
var songNameEl = document.getElementById('songName');
var progressWrap = document.getElementById('progressWrap');
var progressBar = document.getElementById('progressBar');
var timeDisplay = document.getElementById('timeDisplay');
var volSlider = document.getElementById('volSlider');
var volIcon = document.getElementById('volIcon');
var listBtn = document.getElementById('listBtn');
var playlistEl = document.getElementById('playlist');
var songListEl = document.getElementById('songList');
var addBtn = document.getElementById('addBtn');
var fileInput = document.getElementById('fileInput');

// localStorage 持久化播放列表（降级方案）
var STORAGE_KEY = 'rose_playlist';
var VOL_KEY = 'rose_volume';
var SHORTCUT_KEY = 'rose_shortcuts';

// 检测是否运行在本地服务器上
var isServerMode = window.location.protocol === 'http:' || window.location.protocol === 'https:';

// 九宫格快捷位数据
var quickSlots = new Array(9).fill(null); // [{name, url, icon}]

function savePlaylist(){
    var data = [];
    for(var i = 0; i < playlist.length; i++){
        data.push({name: playlist[i].name, filename: playlist[i].filename || '', lrcFile: playlist[i].lrcFile || ''});
    }
    var config = {playlist: data, volume: audio.volume, shortcuts: quickSlots, playMode: playMode};
    // 保存到服务器配置文件
    if(isServerMode){
        try{
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/config', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify(config));
        }catch(e){}
    }
    // 同时保存到 localStorage 作为降级
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
    try{ localStorage.setItem(SHORTCUT_KEY, JSON.stringify(quickSlots)); }catch(e){}
}

function loadPlaylist(){
    // 优先从服务器配置文件加载
    if(isServerMode){
        try{
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/config', false); // 同步加载，确保页面初始化前完成
            xhr.send();
            if(xhr.status === 200){
                var config = JSON.parse(xhr.responseText);
                var data = config.playlist || config; // 兼容旧格式
                if(Array.isArray(data)){
                    for(var i = 0; i < data.length; i++){
                        var item = data[i];
                        if(item.filename){
                            // 去重：检查是否已存在同名同文件的歌曲
                            var dup = false;
                            for(var j = 0; j < playlist.length; j++){
                                if(playlist[j].filename === item.filename){
                                    dup = true; break;
                                }
                            }
                            if(!dup){
                                playlist.push({name: item.name, filename: item.filename, url: item.filename, lrcFile: item.lrcFile || ''});
                                if(item.lrcFile) saveKnownLrcFile(item.lrcFile);
                            }
                        }
                    }
                    if(playlist.length > 0){
                        updateSongList();
                        songNameEl.textContent = playlist[0].name;
                    }
                    // 恢复音量
                    if(config.volume !== undefined){
                        audio.volume = config.volume;
                        volSlider.value = Math.round(audio.volume * 100);
                        volIcon.innerHTML = audio.volume == 0 ? '&#128263;' : audio.volume < 0.5 ? '&#128264;' : '&#128266;';
                    }
                    // 恢复快捷位
                    if(config.shortcuts && Array.isArray(config.shortcuts)){
                        quickSlots = config.shortcuts;
                        if(quickSlots.length < 9) while(quickSlots.length < 9) quickSlots.push(null);
                        renderQuickGrid();
                    }
                    // 恢复播放模式
                    if(config.playMode){
                        playMode = config.playMode;
                        setPlayMode(playMode);
                    }
                    return; // 服务器加载成功，不再走 localStorage
                }
            }
        }catch(e){}
    }
    // 降级：从 localStorage 加载
    try{
        var raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return;
        var data = JSON.parse(raw);
        if(!Array.isArray(data)) return;
        for(var i = 0; i < data.length; i++){
            var item = data[i];
            if(item.filename){
                // 去重
                var dup = false;
                for(var j = 0; j < playlist.length; j++){
                    if(playlist[j].filename === item.filename){ dup = true; break; }
                }
                if(!dup){
                    playlist.push({name: item.name, filename: item.filename, url: item.filename, lrcFile: item.lrcFile || ''});
                    if(item.lrcFile) saveKnownLrcFile(item.lrcFile);
                }
            }
        }
        if(playlist.length > 0){
            updateSongList();
            songNameEl.textContent = playlist[0].name;
        }
        // 恢复快捷位
        var rawS = localStorage.getItem(SHORTCUT_KEY);
        if(rawS){
            try{
                var savedSlots = JSON.parse(rawS);
                if(Array.isArray(savedSlots)){
                    quickSlots = savedSlots;
                    if(quickSlots.length < 9) while(quickSlots.length < 9) quickSlots.push(null);
                    renderQuickGrid();
                }
            }catch(e){}
        }
    }catch(e){}
}

function loadVolume(){
    // 音量已从配置文件加载（服务器模式），或从 localStorage 加载
    if(isServerMode) return; // 服务器模式下已在 loadPlaylist 中恢复
    try{
        var v = localStorage.getItem(VOL_KEY);
        if(v !== null){
            audio.volume = parseFloat(v);
            volSlider.value = Math.round(audio.volume * 100);
            volIcon.innerHTML = audio.volume == 0 ? '&#128263;' : audio.volume < 0.5 ? '&#128264;' : '&#128266;';
        }
    }catch(e){}
}

// 页面加载时恢复播放列表和音量
loadPlaylist();
loadVolume();

function formatTime(s){
    if(isNaN(s))return '0:00';
    var m=Math.floor(s/60);
    var sec=Math.floor(s%60);
    return m+':'+(sec<10?'0':'')+sec;
}

function loadSong(idx){
    if(idx<0||idx>=playlist.length)return;
    currentIdx=idx;
    audio.src=playlist[idx].url;
    songNameEl.textContent=playlist[idx].name;
    audio.play().then(function(){musicPlaying=true;updatePlayBtn();}).catch(function(){});
    updateSongList();
    loadLrcForSong();
}

function updatePlayBtn(){
    playBtn.innerHTML=musicPlaying?'&#9646;&#9646;':'&#9654;';
}

function togglePlay(){
    if(playlist.length===0)return;
    if(currentIdx<0){loadSong(0);return;}
    if(musicPlaying){audio.pause();musicPlaying=false;}
    else{audio.play().then(function(){musicPlaying=true;}).catch(function(){});}
    updatePlayBtn();
}

function playNext(){
    if(playlist.length===0)return;
    var idx;
    if(playMode==='single'){
        idx = currentIdx;
    } else if(playMode==='random'){
        if(playlist.length===1){idx=0;}
        else{
            do{idx=Math.floor(Math.random()*playlist.length);}while(idx===currentIdx&&playlist.length>1);
        }
    } else {
        idx=(currentIdx+1)%playlist.length;
    }
    loadSong(idx);
}

function playPrev(){
    if(playlist.length===0)return;
    var idx;
    if(playMode==='random'){
        if(playlist.length===1){idx=0;}
        else{
            do{idx=Math.floor(Math.random()*playlist.length);}while(idx===currentIdx&&playlist.length>1);
        }
    } else {
        idx=(currentIdx-1+playlist.length)%playlist.length;
    }
    loadSong(idx);
}

playBtn.onclick=togglePlay;
prevBtn.onclick=playPrev;
nextBtn.onclick=playNext;

audio.addEventListener('ended',function(){playNext();});
audio.addEventListener('play',function(){musicPlaying=true;updatePlayBtn();});
audio.addEventListener('pause',function(){musicPlaying=false;updatePlayBtn();});
audio.addEventListener('timeupdate',function(){
    if(audio.duration){
        progressBar.style.width=(audio.currentTime/audio.duration*100)+'%';
        timeDisplay.textContent=formatTime(audio.currentTime)+' / '+formatTime(audio.duration);
    }
});

progressWrap.onclick=function(e){
    if(!audio.duration)return;
    var rect=progressWrap.getBoundingClientRect();
    var p=(e.clientX-rect.left)/rect.width;
    audio.currentTime=p*audio.duration;
};

volSlider.oninput=function(){
    audio.volume=this.value/100;
    volIcon.innerHTML=this.value==0?'&#128263;':this.value<50?'&#128264;':'&#128266;';
    savePlaylist(); // 音量变化也保存到配置文件
};

listBtn.onclick=function(){playlistEl.classList.toggle('show');};

addBtn.onclick=function(){fileInput.click();};

// 播放模式按钮
var modeListBtn = document.getElementById('modeList');
var modeSingleBtn = document.getElementById('modeSingle');
var modeRandomBtn = document.getElementById('modeRandom');

function setPlayMode(mode){
    playMode = mode;
    modeListBtn.classList.toggle('active', mode==='list');
    modeSingleBtn.classList.toggle('active', mode==='single');
    modeRandomBtn.classList.toggle('active', mode==='random');
    savePlaylist();
}

modeListBtn.onclick = function(){ setPlayMode('list'); };
modeSingleBtn.onclick = function(){ setPlayMode('single'); };
modeRandomBtn.onclick = function(){ setPlayMode('random'); };

fileInput.onchange=function(){
    var files=this.files;
    var lrcFiles = [];
    var newSongIndices = [];
    for(var i=0;i<files.length;i++){
        var f=files[i];
        if(f.name.endsWith('.lrc') || f.name.endsWith('.txt')){
            lrcFiles.push(f);
            continue;
        }
        if(f.type.startsWith('audio/')){
            var fname = f.name;
            var exists = false;
            for(var j=0;j<playlist.length;j++){
                if(playlist[j].filename === fname || playlist[j].name === fname.replace(/\.[^.]+$/,'')){
                    exists = true; break;
                }
            }
            if(exists) continue;
            var idx = playlist.length;
            playlist.push({
                name: fname.replace(/\.[^.]+$/,''),
                filename: fname,
                url: URL.createObjectURL(f),
                lrcFile: ''
            });
            newSongIndices.push(idx);
        }
    }
    // 自动匹配LRC文件到歌曲
    for(var i = 0; i < lrcFiles.length; i++){
        var lrcName = lrcFiles[i].name;
        saveKnownLrcFile(lrcName);
        // 尝试匹配新添加的歌曲
        var matched = false;
        for(var j = 0; j < newSongIndices.length; j++){
            var song = playlist[newSongIndices[j]];
            if(matchLrc(song.name, lrcName)){
                song.lrcFile = lrcName;
                matched = true;
                // 如果是当前播放的歌曲，立即加载歌词
                if(newSongIndices[j] === currentIdx){
                    loadLrcFromFile(lrcFiles[i]);
                }
                break;
            }
        }
        // 如果没匹配到新歌曲，尝试匹配当前播放的歌曲
        if(!matched && currentIdx >= 0){
            var curSong = playlist[currentIdx];
            if(matchLrc(curSong.name, lrcName)){
                curSong.lrcFile = lrcName;
                loadLrcFromFile(lrcFiles[i]);
            }
        }
    }
    savePlaylist();
    updateSongList();
    if(currentIdx<0&&playlist.length>0)loadSong(0);
    songNameEl.textContent=playlist.length>0?(currentIdx>=0?playlist[currentIdx].name:'未播放'):'未添加歌曲';
};

var selectedIdx = -1;
var dragIdx = -1;

function updateSongList(){
    songListEl.innerHTML='';
    for(var i=0;i<playlist.length;i++){
        var div=document.createElement('div');
        div.className='song-item';
        if(i===currentIdx) div.className+=' active';
        if(i===selectedIdx) div.className+=' selected';
        div.draggable=true;
        div.idx=i;
        var hasLrc = playlist[i].lrcFile ? ' 🎤' : '';
        div.innerHTML='<span>'+(i+1)+'. '+playlist[i].name+hasLrc+'</span>'+
            '<div class="item-btns">'+
            '<button class="lrc-btn" title="加载歌词">🎤</button>'+
            '<button class="del-btn" title="删除">✕</button>'+
            '</div>';

        // 单击选中，双击播放
        div.addEventListener('click', function(e){
            if(e.target.classList.contains('lrc-btn')){
                e.stopPropagation();
                var songIdx = this.idx;
                currentIdx = songIdx;
                var lrcInput = document.createElement('input');
                lrcInput.type = 'file';
                lrcInput.accept = '.lrc,.txt';
                lrcInput.onchange = function(){
                    if(this.files.length > 0) loadLrcFromFile(this.files[0]);
                };
                lrcInput.click();
                return;
            }
            if(e.target.classList.contains('del-btn')){
                e.stopPropagation();
                deleteSong(this.idx);
                return;
            }
            handleSongClick(this.idx);
        });

        div.addEventListener('dblclick', function(e){
            if(e.target.classList.contains('lrc-btn')||e.target.classList.contains('del-btn')) return;
            loadSong(this.idx);
        });

        // 拖拽排序
        div.addEventListener('dragstart', function(e){
            dragIdx = this.idx;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.idx);
        });
        div.addEventListener('dragend', function(e){
            this.classList.remove('dragging');
            var items = songListEl.querySelectorAll('.song-item');
            for(var j=0;j<items.length;j++) items[j].classList.remove('drag-over');
            dragIdx = -1;
        });
        div.addEventListener('dragover', function(e){
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            var items = songListEl.querySelectorAll('.song-item');
            for(var j=0;j<items.length;j++) items[j].classList.remove('drag-over');
            if(this.idx !== dragIdx) this.classList.add('drag-over');
        });
        div.addEventListener('dragleave', function(e){
            this.classList.remove('drag-over');
        });
        div.addEventListener('drop', function(e){
            e.preventDefault();
            this.classList.remove('drag-over');
            var fromIdx = dragIdx;
            var toIdx = this.idx;
            if(fromIdx < 0 || fromIdx === toIdx) return;
            // 移动歌曲
            var item = playlist.splice(fromIdx, 1)[0];
            playlist.splice(toIdx, 0, item);
            // 更新 currentIdx
            if(currentIdx === fromIdx) currentIdx = toIdx;
            else if(currentIdx > fromIdx && currentIdx <= toIdx) currentIdx--;
            else if(currentIdx < fromIdx && currentIdx >= toIdx) currentIdx++;
            savePlaylist();
            updateSongList();
        });

        songListEl.appendChild(div);
    }
}

function handleSongClick(idx){
    selectedIdx = idx;
    updateSongList();
}

function deleteSong(idx){
    if(idx < 0 || idx >= playlist.length) return;
    var wasPlaying = (idx === currentIdx);
    playlist.splice(idx, 1);
    if(wasPlaying){
        if(playlist.length === 0){
            currentIdx = -1;
            audio.pause();
            musicPlaying = false;
            audio.src = '';
            songNameEl.textContent = '未添加歌曲';
        } else {
            if(idx >= playlist.length) idx = playlist.length - 1;
            loadSong(idx);
        }
    } else {
        if(currentIdx > idx) currentIdx--;
    }
    if(selectedIdx >= playlist.length) selectedIdx = -1;
    savePlaylist();
    updateSongList();
}

// ======== 花瓣掉落系统 ========
var hiddenPetals = {};
var fallingPetals = [];
var REGROW_DELAY = 3000;
var REGROW_DURATION = 1500;

function petalKey(li, j){ return li + '-' + j; }

function dropPetal(allP, cx, cy, S, time){
    var visible = [];
    for(var i = 0; i < allP.length; i++){
        var p = allP[i];
        var key = petalKey(p.layer, p.index);
        if(!hiddenPetals[key]) visible.push(p);
    }
    if(visible.length === 0) return;
    var idx = Math.floor(Math.random() * visible.length);
    var chosen = visible[idx];
    var key = petalKey(chosen.layer, chosen.index);
    hiddenPetals[key] = { dropTime: time, regrowStart: time + REGROW_DELAY };
    var angle = chosen.angle;
    var a = chosen.cfg.a * S;
    var tipX = cx + Math.sin(angle) * a * 0.6;
    var tipY = cy - Math.cos(angle) * a * 0.4 * Math.cos(VIEW_TILT);
    fallingPetals.push({
        x: tipX, y: tipY,
        vx: (Math.random() - 0.5) * 1.5 + Math.sin(angle) * 0.8,
        vy: 0.3 + Math.random() * 0.5,
        rot: angle, rotSpeed: (Math.random() - 0.5) * 0.03,
        color: chosen.cfg.color, size: a * 0.35,
        startTime: time, life: 4000 + Math.random() * 2000
    });
}

function updateFallingPetals(time){
    for(var i = fallingPetals.length - 1; i >= 0; i--){
        var fp = fallingPetals[i];
        var age = time - fp.startTime;
        if(age > fp.life || fp.y > H + 50){ fallingPetals.splice(i, 1); continue; }
        fp.vy += 0.012;
        fp.vx += Math.sin(time * 0.002 + i) * 0.008;
        fp.x += fp.vx; fp.y += fp.vy; fp.rot += fp.rotSpeed;
    }
}

function drawFallingPetals(time){
    for(var i = 0; i < fallingPetals.length; i++){
        var fp = fallingPetals[i];
        var age = time - fp.startTime;
        var alpha = age < fp.life * 0.7 ? 0.85 : 0.85 * (1 - (age - fp.life * 0.7) / (fp.life * 0.3));
        alpha = Math.max(0, alpha);
        X.save();
        X.translate(fp.x, fp.y); X.rotate(fp.rot); X.globalAlpha = alpha;
        var sz = fp.size;
        X.beginPath(); X.moveTo(0, 0);
        X.bezierCurveTo(sz*0.5,-sz*0.3,sz*0.45,-sz*0.8,0,-sz);
        X.bezierCurveTo(-sz*0.45,-sz*0.8,-sz*0.5,-sz*0.3,0,0);
        var bc = hexRgb(fp.color);
        var g = X.createLinearGradient(0, 0, 0, -sz);
        g.addColorStop(0, rgba(bc.r*0.6,bc.g*0.35,bc.b*0.45,1));
        g.addColorStop(0.5, rgba(bc.r*0.85,bc.g*0.5,bc.b*0.6,1));
        g.addColorStop(1, rgba(bc.r*1.1,bc.g*0.7,bc.b*0.85,1));
        X.fillStyle = g; X.fill();
        X.strokeStyle = rgba(bc.r*1.2,bc.g*0.6,bc.b*0.75,0.3);
        X.lineWidth = 0.4; X.stroke();
        X.globalAlpha = 1; X.restore();
    }
}

function getHiddenAlpha(key, time){
    var h = hiddenPetals[key];
    if(!h) return 1;
    if(time < h.regrowStart) return 0;
    var regrowP = clamp((time - h.regrowStart) / REGROW_DURATION, 0, 1);
    if(regrowP >= 1){ delete hiddenPetals[key]; return 1; }
    return easeOut3(regrowP);
}

function lYearDays(y){
    var i, sum=348;
    for(i=0x8000;i>0x8;i>>=1) sum+=(lunarInfo[y-1900]&i)?1:0;
    return sum+leapDays(y);
}
function leapMonth(y){return lunarInfo[y-1900]&0xf;}
function leapDays(y){if(leapMonth(y))return(lunarInfo[y-1900]&0x10000)?30:29;return 0;}
function monthDays(y,m){return(lunarInfo[y-1900]&(0x10000>>m))?30:29;}

function solar2lunar(yy,mm,dd){
    if(yy<1900||yy>2100) return null;
    var baseDate=new Date(1900,0,31);
    var objDate=new Date(yy,mm-1,dd);
    var offset=Math.floor((objDate-baseDate)/86400000);
    var i, temp=0;
    for(i=1900;i<2101&&offset>0;i++){temp=lYearDays(i);offset-=temp;}
    if(offset<0){offset+=temp;i--;}
    var year=i;
    var leap=leapMonth(i);
    var isLeap=false;
    for(i=1;i<13&&offset>0;i++){
        if(leap>0&&i==leap+1&&isLeap==false){--i;isLeap=true;temp=leapDays(year);}
        else{temp=monthDays(year,i);}
        if(isLeap&&i==leap+1) isLeap=false;
        offset-=temp;
    }
    if(offset==0&&leap>0&&i==leap+1){if(isLeap){isLeap=false;}else{isLeap=true;--i;}}
    if(offset<0){offset+=temp;--i;}
    var month=i;
    var day=offset+1;
    return{year:year,month:month,day:day,isLeap:isLeap};
}

    var terms=[];

    for(var i=0;i<24;i++){
        var termY=Math.floor(i/2);
        var termM=termY;
        if(i%2===0){

            jd=sTermBase.getTime()+baseOff+sTermInfo[i]*60000;

        var offMs=sTermInfo[idx]*60000;
        for(var yr=1900;yr<=yy;yr++){
            var yearOff=(yr-1900)*365.2422*86400000;
            var termDate=new Date(baseDate.getTime()+yearOff+offMs);
            if(termDate.getFullYear()===yy&&termDate.getMonth()+1===mm){
                result.push({name:stNames[j],day:termDate.getDate()});
            }
        }
    }
    return result;
}

function getCalendarInfo(){

    // 地支时刻

    // 节气
    var terms=getSolarTermsOfMonth(yy,mm);
    var termStr='';
    for(var i=0;i<terms.length;i++){
        if(terms[i].day===dd) termStr=terms[i].name;
    }
    if(!termStr){
        var nearTerms=[];
        for(var i=0;i<terms.length;i++){
            nearTerms.push(terms[i].name+mm+'月'+terms[i].day+'日');

    else if(ldf===8&&lmf===12) lunarFestival='腊八节';
    else if(ldf===23&&lmf===12) lunarFestival='小年';
    else if(ldf===30&&lmf===12) lunarFestival='除夕';
    // 初一标记月名
    if(ldf===1&&!lunarFestival) lunarFestival=lunarM+'月';

    // 公历节日
    var solarFestival='';

    // 宜忌（基于干支日简化推算）
    var yiJi=getYiJi(gzDay, now.getDay(), lunar);

        year:yy, month:mm, day:dd,

}

// 宜忌推算（基于干支日+星期简化规则）
function getYiJi(gzDay, weekDay, lunar){
    var allYi=['嫁娶','祭祀','出行','纳财','开市','动土','安床','修造','入宅','移徙',
               '栽种','纳畜','求嗣','祈福','解除','开光','破土','安葬','求财','赴任',
               '立券','交易','经络','捕捉','作灶','词讼','纳采','上梁','竖柱','盖屋'];
    var allJi=['嫁娶','祭祀','出行','纳财','开市','动土','安床','修造','入宅','移徙',
               '栽种','纳畜','求嗣','祈福','安葬','破土','开光','词讼','赴任','求财',
               '立券','交易','纳采','上梁','竖柱','盖屋','作灶','经络','捕捉','解除'];

    // 用干支日的天干地支索引做种子，生成伪随机但稳定的宜忌
    var tIdx=-1, dIdx=-1;
    for(var i=0;i<10;i++) if(gzDay[0]===Gan[i]){tIdx=i;break;}
    for(var i=0;i<12;i++) if(gzDay[1]===Zhi[i]){dIdx=i;break;}
    var seed=tIdx*13+dIdx*7+lunar.month*3+lunar.day*11;
    // 简单哈希
    seed=((seed*1103515245+12345)&0x7fffffff);

    var yiCount=3+seed%4; // 3-6个宜
    var jiCount=2+((seed>>4)%4); // 2-5个忌
    var yi=[],ji=[];

    // 选宜
    var pool=allYi.slice();
    for(var i=0;i<yiCount&&pool.length>0;i++){
        var idx=(seed*(i+1)*37+19)%pool.length;
        yi.push(pool[idx]);
        pool.splice(idx,1);
    }
    // 选忌（排除已宜的）
    pool=allJi.filter(function(x){return yi.indexOf(x)<0;});
    for(var i=0;i<jiCount&&pool.length>0;i++){
        var idx=(seed*(i+1)*53+23)%pool.length;
        ji.push(pool[idx]);
        pool.splice(idx,1);
    }
    return{yi:yi, ji:ji};
}

var celestialPos={sunX:0,sunY:0,sunR:0,moonX:0,moonY:0,moonR:0,isDay:true};
function drawCelestial(t){
    var now = new Date();

    var isDay = hour >= 6 && hour < 18;
    celestialPos.isDay = isDay;

        X.beginPath(); X.arc(cx, cy, radius, 0, 6.2832);

        X.fillStyle = glow;
        X.fillRect(cx - radius * 5, cy - radius * 5, radius * 10, radius * 10);

        // 月亮本体
        var moonGrad = X.createRadialGradient(cx - 3, cy - 3, 0, cx, cy, radius);
        moonGrad.addColorStop(0, '#f0f0ff');
        moonGrad.addColorStop(0.5, '#d8d8f0');
        moonGrad.addColorStop(1, '#b0b0d0');
        X.beginPath(); X.arc(cx, cy, radius, 0, 6.2832);
        X.fillStyle = moonGrad; X.fill();

        // 月球环形山
        X.beginPath(); X.arc(cx - 9, cy - 7, 7, 0, 6.2832);
        X.fillStyle = 'rgba(160,160,190,0.3)'; X.fill();
        X.beginPath(); X.arc(cx + 10, cy + 5, 5, 0, 6.2832);

        X.beginPath(); X.arc(cx + radius * phase, cy, radius * 0.85, 0, 6.2832);
        X.fillStyle = 'rgba(10,5,20,0.5)'; X.fill();
    }
}

function lerpColor(a, b, t){
    return [Math.round(lerp(a[0],b[0],t)), Math.round(lerp(a[1],b[1],t)), Math.round(lerp(a[2],b[2],t))];
}

// ======== 改良玫瑰线极坐标公式 ========
function roseR(theta,a,k,p,elong,wave,freq,phi){
    var ck=Math.cos(k*theta);
    var base=a*Math.pow(Math.abs(ck),p);
    var el=1+elong*ck*ck;
    var wv=1+wave*Math.sin(freq*theta+phi);
    return base*el*wv;
}

function petalOutline(a,k,p,elong,wave,freq,phi,steps){
    var pts=[];
    var span=Math.PI/k;
    for(var i=0;i<=steps;i++){
        var theta=-span/2+span*i/steps;
        var r=roseR(theta,a,k,p,elong,wave,freq,phi);
        pts.push({lx:r*Math.sin(theta),ly:-r*Math.cos(theta),theta:theta,r:r});
    }
    return pts;
}

function drawPetal(cx,cy,angle,cfg,openness,scale,time,alpha){
    if(openness<0.01)return;
    if(alpha===undefined)alpha=1;
    if(alpha<0.01)return;
    var S=scale;
    var a=cfg.a*S;
    var pts=petalOutline(a,cfg.k,cfg.p,cfg.elong,cfg.wave,cfg.freq,cfg.phi,32);
    var tiltA=(1-openness)*1.25+cfg.curl*openness*0.25;
    var cosTilt=Math.cos(tiltA),sinTilt=Math.sin(tiltA);
    var cupF=(1-openness*0.55)*0.28;
    var cosA=Math.cos(angle),sinA=Math.sin(angle);
    var vCos=Math.cos(VIEW_TILT),vSin=Math.sin(VIEW_TILT);
    var proj=[];
    for(var i=0;i<pts.length;i++){
        var pt=pts[i];
        var cupZ=cupF*pt.lx*pt.lx/(a*a+1)*S*0.5;
        var ry=pt.ly*cosTilt-cupZ*sinTilt;
        var rz=pt.ly*sinTilt+cupZ*cosTilt;
        var wx=pt.lx*cosA-ry*sinA;
        var wy=pt.lx*sinA+ry*cosA;
        var sy=wy*vCos-rz*vSin;
        proj.push({x:cx+wx,y:cy-sy,z:rz});
    }
    X.save(); X.globalAlpha=alpha;
    X.beginPath(); X.moveTo(proj[0].x,proj[0].y);
    for(var i=1;i<proj.length;i++) X.lineTo(proj[i].x,proj[i].y);
    X.closePath();
    var bc=hexRgb(cfg.color);
    var lf=0.5+openness*0.5;
    var minY=1e9,maxY=-1e9;
    for(var i=0;i<proj.length;i++){if(proj[i].y<minY)minY=proj[i].y;if(proj[i].y>maxY)maxY=proj[i].y;}
    var grad=X.createLinearGradient(cx,minY,cx,maxY);
    grad.addColorStop(0,rgba(bc.r*lf*0.45,bc.g*lf*0.25,bc.b*lf*0.35,1));
    grad.addColorStop(0.25,rgba(bc.r*lf*0.7,bc.g*lf*0.4,bc.b*lf*0.5,1));
    grad.addColorStop(0.55,rgba(bc.r*lf*0.9,bc.g*lf*0.55,bc.b*lf*0.65,1));
    grad.addColorStop(0.85,rgba(bc.r*lf*1.1,bc.g*lf*0.7,bc.b*lf*0.8,1));
    grad.addColorStop(1,rgba(bc.r*lf*1.25,bc.g*lf*0.85,bc.b*lf*0.95,1));
    X.fillStyle=grad; X.fill();
    X.strokeStyle=rgba(Math.min(255,bc.r*lf*1.3),Math.min(255,bc.g*lf*0.7),Math.min(255,bc.b*lf*0.85),0.22*openness);
    X.lineWidth=0.6; X.stroke();
    if(openness>0.25){
        var midIdx=Math.floor(proj.length*0.35);
        var sp=proj[midIdx]; var specR=a*0.3*openness;
        var sg=X.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,specR);
        sg.addColorStop(0,rgba(255,210,225,0.2*openness));
        sg.addColorStop(0.5,rgba(255,170,195,0.06*openness));
        sg.addColorStop(1,rgba(255,140,170,0));
        X.beginPath(); X.arc(sp.x,sp.y,specR,0,6.2832);
        X.fillStyle=sg; X.fill();
    }
    X.globalAlpha=1; X.restore();
}

function drawSepals(cx,cy,progress){
    if(progress<0.03)return;
    var sp=clamp(progress/0.45,0,1);
    for(var i=0;i<5;i++){
        var angle=(6.2832/5)*i-1.5708;
        var len=42*sp, wid=14*sp;
        var cosA=Math.cos(angle),sinA=Math.sin(angle);
        var tiltA=VIEW_TILT*(1-sp*0.4);
        var cosT=Math.cos(tiltA),sinT=Math.sin(tiltA);
        var tipX=cx+sinA*len*cosT, tipY=cy-cosA*len*cosT;
        X.save(); X.beginPath(); X.moveTo(cx,cy);
        X.quadraticCurveTo(cx+sinA*wid+(tipX-cx)*0.4,cy-cosA*wid*0.5+(tipY-cy)*0.4,tipX,tipY);
        X.quadraticCurveTo(cx-sinA*wid+(tipX-cx)*0.4,cy+cosA*wid*0.5+(tipY-cy)*0.4,cx,cy);
        var g=X.createLinearGradient(cx,cy,tipX,tipY);
        g.addColorStop(0,'#2d6a1e'); g.addColorStop(0.5,'#3a8a22'); g.addColorStop(1,'#4a9a32');
        X.fillStyle=g; X.fill();
        X.strokeStyle='#1e4a12'; X.lineWidth=0.4; X.stroke(); X.restore();
    }
}

    if(s<1)return;
    X.save(); X.translate(x,y); X.scale(dir,1);
    X.beginPath(); X.moveTo(0,0);
    X.bezierCurveTo(s*0.25,-s*0.55,s*0.7,-s*0.4,s,0);
    X.bezierCurveTo(s*0.7,s*0.4,s*0.25,s*0.55,0,0);
    var g=X.createRadialGradient(s*0.35,0,0,s*0.35,0,s);
    g.addColorStop(0,'#5aaa3a'); g.addColorStop(0.5,'#3a8a22'); g.addColorStop(1,'#2d6a1e');
    X.fillStyle=g; X.fill();
    X.beginPath(); X.moveTo(0,0); X.lineTo(s*0.93,0);
    X.strokeStyle='#2d5a1e'; X.lineWidth=1; X.stroke();
    for(var i=1;i<=5;i++){
        var lx=s*i*0.17;
        X.beginPath(); X.moveTo(lx,0); X.lineTo(lx+s*0.1,-s*0.14);
        X.moveTo(lx,0); X.lineTo(lx+s*0.1,s*0.14);
        X.strokeStyle='rgba(45,90,30,0.3)'; X.lineWidth=0.5; X.stroke();
    }
    X.restore();
}

// ======== 花盆 ========
function drawPot(cx, botY, progress, time){
    if(progress<0.05)return;
    var pp=clamp(progress/0.3,0,1);
    var pw=POT_W*pp, ph=POT_H*pp, rimH=POT_RIM_H*pp, baseW=POT_BASE_W*pp, rimW=pw+10*pp;
    var potTop=botY, potBot=botY+ph;
    potRect.x=cx-rimW; potRect.y=potTop-rimH; potRect.w=rimW*2; potRect.h=ph+rimH;

    X.save();
    // 阴影
    X.beginPath(); X.ellipse(cx,potBot+4*pp,baseW*0.6,5*pp,0,0,6.2832);
    X.fillStyle='rgba(0,0,0,0.25)'; X.fill();
    // 主体
    X.beginPath(); X.moveTo(cx-pw/2,potTop); X.lineTo(cx-baseW/2,potBot);
    X.lineTo(cx+baseW/2,potBot); X.lineTo(cx+pw/2,potTop); X.closePath();
    var bodyGrad=X.createLinearGradient(cx-pw/2,potTop,cx+pw/2,potTop);
    bodyGrad.addColorStop(0,'#8b4513'); bodyGrad.addColorStop(0.3,'#cd853f');
    bodyGrad.addColorStop(0.5,'#d2944a'); bodyGrad.addColorStop(0.7,'#cd853f');
    bodyGrad.addColorStop(1,'#7a3c10');
    X.fillStyle=bodyGrad; X.fill();
    // 纹理
    for(var i=0;i<5;i++){
        var tx=cx-pw*0.35+i*pw*0.175, bx=cx-baseW*0.35+i*baseW*0.175;
        X.beginPath(); X.moveTo(tx,potTop); X.lineTo(bx,potBot);
        X.strokeStyle='rgba(90,40,10,0.15)'; X.lineWidth=1; X.stroke();
    }
    // 底座
    X.beginPath(); X.moveTo(cx-baseW/2-3*pp,potBot); X.lineTo(cx-baseW/2-3*pp,potBot+5*pp);
    X.lineTo(cx+baseW/2+3*pp,potBot+5*pp); X.lineTo(cx+baseW/2+3*pp,potBot); X.closePath();
    var baseGrad=X.createLinearGradient(cx,potBot,cx,potBot+5*pp);
    baseGrad.addColorStop(0,'#7a3c10'); baseGrad.addColorStop(1,'#5a2a08');
    X.fillStyle=baseGrad; X.fill();
    // 盆沿
    X.beginPath(); X.moveTo(cx-rimW/2,potTop-rimH); X.lineTo(cx-rimW/2,potTop);
    X.lineTo(cx+rimW/2,potTop); X.lineTo(cx+rimW/2,potTop-rimH); X.closePath();
    var rimGrad=X.createLinearGradient(cx-rimW/2,potTop-rimH,cx+rimW/2,potTop-rimH);
    rimGrad.addColorStop(0,'#9e5a28'); rimGrad.addColorStop(0.3,'#daa06d');
    rimGrad.addColorStop(0.5,'#e0aa78'); rimGrad.addColorStop(0.7,'#daa06d');
    rimGrad.addColorStop(1,'#8b4e20');
    X.fillStyle=rimGrad; X.fill();
    // 盆沿高光
    X.beginPath(); X.moveTo(cx-rimW/2+2,potTop-rimH+2); X.lineTo(cx+rimW/2-2,potTop-rimH+2);
    X.strokeStyle='rgba(255,220,180,0.3)'; X.lineWidth=1; X.stroke();
    // 泥土
    X.beginPath(); X.ellipse(cx,potTop,pw/2-1,6*pp,0,0,6.2832);
    var soilGrad=X.createRadialGradient(cx,potTop,0,cx,potTop,pw/2);
    soilGrad.addColorStop(0,'#3a2510'); soilGrad.addColorStop(0.6,'#2a1a0a'); soilGrad.addColorStop(1,'#4a3018');
    X.fillStyle=soilGrad; X.fill();
    // 播放/暂停按钮
    drawPlayButton(cx, potTop+ph*0.45, pp, time);
    X.restore();
}

function drawPlayButton(cx,cy,scale,time){
    var sz=12*scale;
    if(sz<2)return;
    X.beginPath(); X.arc(cx,cy,sz+5,0,6.2832);
    X.fillStyle='rgba(0,0,0,0.3)'; X.fill();
    X.beginPath(); X.arc(cx,cy,sz+4,0,6.2832);
    var btnGrad=X.createRadialGradient(cx-2,cy-2,0,cx,cy,sz+4);
    btnGrad.addColorStop(0,'rgba(255,200,200,0.25)'); btnGrad.addColorStop(1,'rgba(180,100,100,0.15)');
    X.fillStyle=btnGrad; X.fill();
    X.strokeStyle='rgba(255,200,200,0.35)'; X.lineWidth=0.8; X.stroke();
    if(musicPlaying){
        var bw=sz*0.22, bh=sz*0.7, gap=sz*0.18;
        X.fillStyle='rgba(255,220,220,0.85)';
        X.fillRect(cx-gap-bw,cy-bh/2,bw,bh); X.fillRect(cx+gap,cy-bh/2,bw,bh);
    } else {
        X.beginPath(); X.moveTo(cx-sz*0.3,cy-sz*0.5);
        X.lineTo(cx-sz*0.3,cy+sz*0.5); X.lineTo(cx+sz*0.5,cy); X.closePath();
        X.fillStyle='rgba(255,220,220,0.85)'; X.fill();
    }
    if(musicPlaying){
        var t=time*0.003;
        for(var i=0;i<3;i++){
            var waveR=sz+8+i*5+Math.sin(t+i*1.2)*3;
            var waveA=0.12-i*0.035;
            X.beginPath(); X.arc(cx,cy,waveR,0,6.2832);
            X.strokeStyle='rgba(255,180,200,'+waveA+')'; X.lineWidth=0.8; X.stroke();
        }
    }
}

function drawRose(cx,cy,bloomP,breathS,time){
    var S=Math.min(W,H)*0.14*breathS;
    var allP=[];
    var vCos=Math.cos(VIEW_TILT);
    for(var li=0;li<LAYERS.length;li++){
        var L=LAYERS[li];
        var lo=clamp((bloomP-L.bloomS)/(L.bloomE-L.bloomS),0,1);
        var eo=easeOut3(lo);
        if(eo<=0)continue;
        for(var j=0;j<L.cnt;j++){
            var angle=(6.2832/L.cnt)*j+L.angleOff;
            var wobble=Math.sin(time*0.0008+j*1.7+li*0.9)*0.014*eo;
            var depth=Math.sin(angle+wobble)*vCos+li*0.015;
            allP.push({layer:li,index:j,angle:angle+wobble,openness:eo,cfg:L,depth:depth});
        }
    }
    lastAllP=allP;
    allP.sort(function(a,b){return a.depth-b.depth});
    for(var i=0;i<allP.length;i++){
        var p=allP[i];
        var key=petalKey(p.layer,p.index);
        var alpha=getHiddenAlpha(key,time);
        if(alpha<0.01)continue;
        drawPetal(cx,cy,p.angle,p.cfg,p.openness,S,time,alpha);
    }
    if(bloomP>0.3){
        var cp=clamp((bloomP-0.3)/0.4,0,1);
        var cs=S*0.045*cp;
        var cg=X.createRadialGradient(cx,cy,0,cx,cy,cs);
        cg.addColorStop(0,'#ffee88'); cg.addColorStop(0.35,'#ffaa44'); cg.addColorStop(1,'#cc2244');
        X.beginPath(); X.arc(cx,cy,cs,0,6.2832); X.fillStyle=cg; X.fill();
        for(var i=0;i<6;i++){
            var a=(6.2832/6)*i+time*0.0004; var r=cs*0.55;
            X.beginPath(); X.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,cs*0.14,0,6.2832);
            X.fillStyle='rgba(255,210,90,0.4)'; X.fill();
        }
    }
}

function drawGlow(cx,cy,progress){
    if(progress<0.08)return;
    var ga=Math.min(0.1,(progress-0.08)*0.12);
    var t=performance.now()*0.001;
    var ps=155+Math.sin(t*1.0)*25;
    var g=X.createRadialGradient(cx,cy,0,cx,cy,ps*progress);
    g.addColorStop(0,'rgba(255,60,90,'+ga+')');
    g.addColorStop(0.45,'rgba(200,20,50,'+(ga*0.35)+')');
    g.addColorStop(1,'rgba(200,20,50,0)');
    X.fillStyle=g; X.fillRect(cx-ps*2,cy-ps*2,ps*4,ps*4);
}

function drawSparkles(cx,cy,progress){
    if(progress<0.55)return;
    var sa=(progress-0.55)/0.45;
    var t=performance.now()*0.003;
    for(var i=0;i<18;i++){
        var a=(6.2832/18)*i+t*0.2;
        var d=105+Math.sin(t+i*2.3)*42;
        var x=cx+Math.cos(a)*d, y=cy+Math.sin(a)*d;
        var sz=0.8+Math.sin(t*2+i)*0.6;
        var al=sa*(0.12+Math.sin(t*3+i*1.7)*0.1);
        X.beginPath(); X.arc(x,y,sz,0,6.2832);
        X.fillStyle='rgba(255,200,220,'+al+')'; X.fill();
        X.beginPath(); X.moveTo(x-sz*2.5,y); X.lineTo(x+sz*2.5,y);
        X.moveTo(x,y-sz*2.5); X.lineTo(x,y+sz*2.5);
        X.strokeStyle='rgba(255,220,240,'+(al*0.3)+')'; X.lineWidth=0.3; X.stroke();
    }
}

function drawDew(cx,cy,progress){
    if(progress<0.7)return;
    var da=(progress-0.7)/0.3;
    var t=performance.now()*0.001;
    var drops=[{a:0.3,d:60,s:2.8},{a:1.7,d:75,s:2.3},{a:3.1,d:50,s:1.8},{a:4.6,d:70,s:3.2},{a:5.4,d:55,s:2.0}];
    for(var i=0;i<drops.length;i++){
        var d=drops[i];
        var x=cx+Math.cos(d.a)*d.d, y=cy+Math.sin(d.a)*d.d;
        var sh=0.5+Math.sin(t*2+d.a*3)*0.3;
        X.save(); X.globalAlpha=da*sh;
        var g=X.createRadialGradient(x-d.s*0.3,y-d.s*0.3,0,x,y,d.s);
        g.addColorStop(0,'rgba(255,255,255,0.85)');
        g.addColorStop(0.3,'rgba(255,230,240,0.45)');
        g.addColorStop(0.7,'rgba(255,180,200,0.15)');
        g.addColorStop(1,'rgba(255,100,120,0.03)');
        X.beginPath(); X.arc(x,y,d.s,0,6.2832); X.fillStyle=g; X.fill();
        X.globalAlpha=1; X.restore();
    }
}

// ======== 花朵布局计算 ========
function getFlowerBase(){
    var elapsed = performance.now() - T0;
    var rawBloom = clamp(elapsed / BLOOM_MS, 0, 1);
    var bloomP = easeIO2(rawBloom);
    var cx = W / 2;
    // 花盆底部在屏幕偏下位置，留出播放器空间
    var potTop = H * 0.68;
    var stemH = 280 * bloomP;
    var cy = potTop; // 茎底部=花盆顶部
    return {cx: cx, cy: cy, stemH: stemH, bloomP: bloomP, potTop: potTop};
}

// ======== 主动画循环 ========
function animate(now){
    var elapsed=now-T0;
    var rawBloom=clamp(elapsed/BLOOM_MS,0,1);
    var bloomP=easeIO2(rawBloom);
    var breathS=1;
    if(rawBloom>=1){
        var bt=(elapsed-BLOOM_MS)*0.001;
        breathS=1+0.035*Math.sin(bt*0.8);
    }

    X.clearRect(0,0,W,H);

    if(currentBg === 'rain'){
        // 雨景由 HTML/CSS 组件渲染，不需要 Canvas 绘制
        requestAnimationFrame(animate);
        return;
    }

    drawBg(now);
    drawCelestial(now);

    var base = getFlowerBase();
    var cx = base.cx;
    var cy = base.cy;
    var stemH = base.stemH;
    var flowerY = cy - stemH;

    drawGlow(cx,flowerY,bloomP);
    drawStem(cx,cy,bloomP);

    if(bloomP>0.15){
        var lp=clamp((bloomP-0.15)/0.4,0,1);
        drawLeaf(cx-4,cy-stemH*0.4,-1,lp,1.0);
        drawLeaf(cx+4,cy-stemH*0.62,1,lp,0.85);
    }

    drawSepals(cx,flowerY,bloomP);
    drawRose(cx,flowerY,bloomP,breathS,now);

    updateFallingPetals(now);
    drawFallingPetals(now);

    drawDew(cx,flowerY,bloomP);
    drawSparkles(cx,flowerY,bloomP);

    drawPot(cx, cy, bloomP, now);

    // 定位花盆下方大字体歌词
    var bigLrc = document.getElementById('lyricsBig');
    var potBottom = cy + POT_H * (Math.min(W,H)/800);
    bigLrc.style.top = (potBottom + 16) + 'px';

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

var editIdx = -1;

function renderQuickGrid(){
    var grid = document.getElementById('quickGrid');
    var html = '';
    for(var i = 0; i < 9; i++){
        var slot = quickSlots[i];
        if(slot && slot.url){
            var iconHtml = '';
            if(slot.icon && slot.icon.startsWith('http')){
                iconHtml = '<img src="'+slot.icon+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\'" alt="">'+
                           '<span class="q-letter" style="display:none">'+slot.name.charAt(0).toUpperCase()+'</span>';
            } else if(slot.icon && !slot.icon.startsWith('http')){
                iconHtml = '<span class="q-emoji">'+slot.icon+'</span>';
            } else {
                // 尝试获取网站favicon
                var domain = slot.url.match(/https?:\/\/([^\/]+)/);
                var favicon = '';
                if(domain) favicon = 'https://'+domain[1]+'/favicon.ico';
                iconHtml = '<img src="'+favicon+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\'" alt="">'+
                           '<span class="q-letter" style="display:none">'+slot.name.charAt(0).toUpperCase()+'</span>';
            }
            html += '<div class="q-cell" data-idx="'+i+'" title="'+slot.name+'">'+iconHtml+'</div>';
        } else {
            html += '<div class="q-cell empty" data-idx="'+i+'" title="点击添加快捷方式"><span class="q-plus">+</span></div>';
        }
    }
    grid.innerHTML = html;

    // 绑定事件
    var cells = grid.querySelectorAll('.q-cell');
    for(var i = 0; i < cells.length; i++){
        cells[i].addEventListener('click', function(e){
            e.stopPropagation();
            var idx = parseInt(this.getAttribute('data-idx'));
            handleCellClick(idx);
        });
        cells[i].addEventListener('contextmenu', function(e){
            e.preventDefault();
            var idx = parseInt(this.getAttribute('data-idx'));
            openEditor(idx);
        });
    }
}

function handleCellClick(idx){
    var slot = quickSlots[idx];
    if(slot && slot.url){
        window.open(slot.url, '_blank');
    } else {
        openEditor(idx);
    }
}

function openEditor(idx){
    editIdx = idx;
    var slot = quickSlots[idx];
    document.getElementById('qName').value = slot ? slot.name : '';
    document.getElementById('qUrl').value = slot ? slot.url : '';
    document.getElementById('qIcon').value = (slot && slot.icon) ? slot.icon : '';
    document.getElementById('qDel').style.display = slot ? 'inline-block' : 'none';
    document.getElementById('qEdit').classList.add('show');
    document.getElementById('qOverlay').classList.add('show');
    document.getElementById('qName').focus();
}

function closeEditor(){
    document.getElementById('qEdit').classList.remove('show');
    document.getElementById('qOverlay').classList.remove('show');
    editIdx = -1;
}

document.getElementById('qSave').addEventListener('click', function(){
    if(editIdx < 0) return;
    var name = document.getElementById('qName').value.trim();
    var url = document.getElementById('qUrl').value.trim();
    var icon = document.getElementById('qIcon').value.trim();
    if(!name || !url){ alert('请输入名称和网址'); return; }
    if(!url.startsWith('http')) url = 'https://'+url;
    quickSlots[editIdx] = {name: name, url: url, icon: icon};
    renderQuickGrid();
    savePlaylist();
    closeEditor();
});

document.getElementById('qDel').addEventListener('click', function(){
    if(editIdx < 0) return;
    quickSlots[editIdx] = null;
    renderQuickGrid();
    savePlaylist();
    closeEditor();
});

document.getElementById('qCancel').addEventListener('click', closeEditor);
document.getElementById('qOverlay').addEventListener('click', closeEditor);

// ======== 雨天场景 - 万年历组件 ========
var rcalYear, rcalMonth;
(function(){
    var now = new Date();
    rcalYear = now.getFullYear();
    rcalMonth = now.getMonth() + 1;
})();

function renderRainCalendar(){
    var titleEl = document.getElementById('rcalTitle');
    var daysEl = document.getElementById('rcalDays');
    var infoEl = document.getElementById('rcalInfo');
    if(!titleEl) return;

    titleEl.textContent = rcalYear + '年' + rcalMonth + '月';

    // 计算日期网格
    var firstDay = new Date(rcalYear, rcalMonth - 1, 1).getDay(); // 星期几 0=日
    var daysInMonth = new Date(rcalYear, rcalMonth, 0).getDate();
    var prevMonthDays = new Date(rcalYear, rcalMonth - 1, 0).getDate();

    var now = new Date();
    var todayY = now.getFullYear(), todayM = now.getMonth() + 1, todayD = now.getDate();

    var html = '';
    // 上月尾部
    for(var i = firstDay - 1; i >= 0; i--){
        var d = prevMonthDays - i;
        html += '<div class="day-cell other-month">' + d + '</div>';
    }
    // 本月
    for(var d = 1; d <= daysInMonth; d++){
        var isToday = (rcalYear === todayY && rcalMonth === todayM && d === todayD);
        var dayOfWeek = new Date(rcalYear, rcalMonth - 1, d).getDay();
        var isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
        var cls = 'day-cell';
        if(isToday) cls += ' today';
        if(isWeekend) cls += ' weekend';
        html += '<div class="' + cls + '" data-day="' + d + '">' + d + '</div>';
    }
    // 下月头部（补齐6行）
    var totalCells = firstDay + daysInMonth;
    var remain = (7 - totalCells % 7) % 7;
    for(var i = 1; i <= remain; i++){
        html += '<div class="day-cell other-month">' + i + '</div>';
    }
    daysEl.innerHTML = html;

    // 今天的农历信息
    if(rcalYear === todayY && rcalMonth === todayM){
        var lunar = solar2lunar(todayY, todayM, todayD);
        if(lunar){
            var gzYear = ganZhiYear(lunar.year);
            var gzMonth = ganZhiMonth(lunar.year, lunar.month);
            var gzDay = ganZhiDay(todayY, todayM, todayD);
            var animal = getAnimal(lunar.year);
            var lunarM = lunar.isLeap ? '闰'+lunarMonthNames[lunar.month-1] : lunarMonthNames[lunar.month-1];
            var lunarD = lunarDayNames[lunar.day-1];

            var infoHtml = '<div class="lunar-day">农历 ' + lunarM + '月' + lunarD + '</div>';
            infoHtml += '<div class="gz-info">' + gzYear + '年 ' + gzMonth + '月 ' + gzDay + '日 · ' + animal + '年</div>';

            // 节日
            var festivals = [];
            var lmf = lunar.month, ldf = lunar.day;
            if(ldf===1&&lmf===1) festivals.push('春节');
            else if(ldf===15&&lmf===1) festivals.push('元宵节');
            else if(ldf===5&&lmf===5) festivals.push('端午节');
            else if(ldf===15&&lmf===8) festivals.push('中秋节');
            if(todayM===1&&todayD===1) festivals.push('元旦');
            if(todayM===10&&todayD===1) festivals.push('国庆节');
            if(festivals.length > 0){
                infoHtml += '<div class="festival">' + festivals.join(' · ') + '</div>';
            }
            infoEl.innerHTML = infoHtml;
        }
    } else {
        infoEl.innerHTML = '';
    }
}

// 月份切换
document.getElementById('rcalPrev').addEventListener('click', function(e){
    e.stopPropagation();
    rcalMonth--;
    if(rcalMonth < 1){ rcalMonth = 12; rcalYear--; }
    renderRainCalendar();
});
document.getElementById('rcalNext').addEventListener('click', function(e){
    e.stopPropagation();
    rcalMonth++;
    if(rcalMonth > 12){ rcalMonth = 1; rcalYear++; }
    renderRainCalendar();
});
</script>
