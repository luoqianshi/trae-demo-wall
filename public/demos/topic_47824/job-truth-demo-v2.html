// 打字机效果
async function typeWriter(el, text, speed = 28) {
  el.innerHTML = '<span class="cursor"></span>';
  const cursor = el.querySelector('.cursor');

// ===================== 核心分析 =====================
function analyze(text) {
  const normalized = text.replace(/\s+/g, ' ');
  const riskHits = riskRules.filter(r => text.includes(r.word)).map(r => ({...r, count: (text.match(new RegExp(escapeReg(r.word),'g'))||[]).length}));
  const positiveHits = positiveRules.filter(r => text.includes(r.word)).map(r => ({...r, count: (text.match(new RegExp(escapeReg(r.word),'g'))||[]).length}));

  const salary = parseSalary(normalized);
  const lengthScore = clamp(Math.round(text.length/18), 0, 18);
  const clarityCount = claritySignals.filter(w => text.includes(w)).length;
  const moduleScore = ["岗位职责","职位描述","任职要求","福利","薪资","地点"].filter(w => text.includes(w)).length * 4;
  const positiveScore = positiveHits.reduce((s,h) => s+h.score, 0);
  const riskScore = riskHits.reduce((s,h) => s+h.score*h.count, 0);
  const vaguePenalty = getVaguePenalty(text, clarityCount);

  const authenticity = clamp(62 + lengthScore + moduleScore + positiveScore - riskScore - salary.penalty - vaguePenalty, 8, 96);
  const riskLevelValue = clamp(20 + riskScore + salary.penalty + vaguePenalty - positiveScore, 4, 96);
  const clarity = clamp(45 + moduleScore + clarityCount*5 + lengthScore - vaguePenalty - Math.min(riskScore,30), 8, 96);
  const salaryTrans = clamp(50 + (salary.found ? 15 : -10) + (salary.ratio && salary.ratio < 1.6 ? 10 : 0) - salary.penalty, 10, 95);
  const matchSim = clamp(55 + (text.length > 300 ? 10 : 0) + clarityCount*2 - vaguePenalty, 15, 92);

  const decision = getDecision(authenticity, riskLevelValue, clarity);

  return {
    text, title: $('jobTitle').value.trim() || inferTitle(text),
    company: $('companyName').value.trim() || inferCompany(text),
    riskHits, positiveHits, salary,
    scores: { authenticity, risk: riskLevelValue, clarity, salary: salaryTrans, match: matchSim },
    decision, reasons: buildReasons(riskHits, positiveHits, salary, vaguePenalty, clarityCount),
    questions: buildQuestions(riskHits, salary),
    highlighted: highlightRiskWords(text, riskHits)
  };
}

function parseSalary(text) {
  const patterns = [
    /(\d+(?:\.\d+)?)\s*[-~—至]\s*(\d+(?:\.\d+)?)\s*[kK]/,
    /(\d+(?:\.\d+)?)\s*[kK]\s*[-~—至]\s*(\d+(?:\.\d+)?)\s*[kK]/,
    /(\d+(?:\.\d+)?)\s*[-~—至]\s*(\d+(?:\.\d+)?)\s*千/,
    /(\d+(?:\.\d+)?)\s*[-~—至]\s*(\d+(?:\.\d+)?)\s*万/
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m) {
      const low = +m[1], high = +m[2], ratio = high/Math.max(low,1);
      let penalty = 0, note = `识别到薪资范围约 ${low}-${high}`;
      if (ratio >= 2) { penalty += 13; note += "，跨度较大，可能存在实际到手偏低"; }
      else if (ratio >= 1.6) { penalty += 7; note += "，跨度偏大，建议确认固薪比例"; }
      else note += "，区间相对集中";
      return { found: true, low, high, ratio, penalty, note };
    }
  }
  return { found: false, penalty: 8, note: "未识别到明确薪资范围，建议优先确认" };
}

function getVaguePenalty(text, clarityCount) {
  let p = 0;
  if (text.length < 160) p += 12;
  if (clarityCount < 3) p += 10;
  if (text.includes("核心业务") && !text.includes("具体")) p += 5;
  return p;
}

function getDecision(auth, risk, clarity) {
  if (auth >= 72 && risk <= 42 && clarity >= 58) return { label: "建议投递", cls: "safe", summary: "岗位信息较透明，风险信号少，可进入沟通环节。" };
  if (auth <= 42 || risk >= 70) return { label: "不建议直接投", cls: "bad", summary: "存在较多不确定或高风险信号，建议先问清关键问题。" };
  return { label: "谨慎投递", cls: "warn", summary: "有吸引力但信息不透明，建议先沟通确认。" };
}

function buildReasons(riskHits, positiveHits, salary, vaguePenalty, clarityCount) {
  const r = [];
  if (salary.note) r.push(salary.note);
  riskHits.slice(0,6).forEach(h => r.push(h.reason));
  positiveHits.slice(0,4).forEach(h => r.push(h.reason));
  if (vaguePenalty > 0) r.push("岗位描述存在一定模糊性，需补充确认具体职责");
  if (clarityCount >= 6) r.push("文本包含较多动作型职责描述，内容可判断性较强");
  return [...new Set(r)].slice(0,9);
}

function buildQuestions(riskHits, salary) {
  const q = [...questionBase];
  if (!salary.found) q.unshift("这个岗位的薪资范围是多少？固薪和绩效比例？");
  if (riskHits.some(h => ["培训","贷款","押金"].includes(h.word))) q.unshift("入职前是否需要付费、贷款、押金或签培训协议？");
  if (riskHits.some(h => ["外包","驻场"].includes(h.word))) q.unshift("是否外包或驻场？合同主体、社保主体是谁？");
  if (riskHits.some(h => ["服从安排","领导安排","其他工作","接受调岗"].includes(h.word))) q.unshift("岗位职责边界是什么？是否会被安排非本岗位工作？");
  return [...new Set(q)].slice(0,7);
}

function highlightRiskWords(text, hits) {
  let e = escapeHtml(text);
  hits.forEach(h => {
    e = e.replace(new RegExp(escapeReg(escapeHtml(h.word)),'g'), `<mark>${escapeHtml(h.word)}</mark>`);
  });
  return e;
}

function inferTitle(t) { const m = t.match(/岗位[:：]\s*([^\n\r]+)/) || t.match(/职位[:：]\s*([^\n\r]+)/); return m ? m[1].trim().slice(0,28) : "待分析岗位"; }
function inferCompany(t) { const m = t.match(/公司[:：]\s*([^\n\r]+)/); return m ? m[1].trim().slice(0,28) : ""; }

// ===================== 要求比对 =====================
function compareRequirements(data) {
  const req = $('myRequire').value.trim();
  const text = data.text;
  const results = [];
  if (!req) return null;

  const cities = ['北京','上海','广州','深圳','杭州','成都','南京','武汉','西安','苏州','长沙','重庆','天津','厦门','青岛','大连'];

  // 1. 期望薪资
  const expectSalaryMatch = req.match(/(\d+(?:\.\d+)?)\s*[kK千]/);
  if (expectSalaryMatch) {
    const expect = +expectSalaryMatch[1];
    const noLess = /不低于|至少|以上|最少|最低|起薪/.test(req);
    if (data.salary.found) {
      const jdLow = data.salary.low, jdHigh = data.salary.high;
      if (jdLow >= expect) {
        results.push({ item: '期望薪资', mine: `${expect}K${noLess?'以上':''}`, jd: `${jdLow}-${jdHigh}K`, status: 'match', note: '岗位薪资下限达到你的期望' });
      } else if (jdHigh >= expect) {
        results.push({ item: '期望薪资', mine: `${expect}K${noLess?'以上':''}`, jd: `${jdLow}-${jdHigh}K`, status: 'warn', note: '薪资范围包含你的期望，但下限偏低，实际定薪可能达不到' });
      } else {
        results.push({ item: '期望薪资', mine: `${expect}K${noLess?'以上':''}`, jd: `${jdLow}-${jdHigh}K`, status: 'miss', note: '岗位薪资上限仍低于你的期望，不建议投递' });
      }
    } else {
      results.push({ item: '期望薪资', mine: `${expect}K${noLess?'以上':''}`, jd: '未写明', status: 'warn', note: '岗位未写明薪资，需主动确认是否达到你的期望' });
    }
  }

  // 2. 期望城市
  const myCity = cities.find(c => req.includes(c));
  if (myCity) {
    const jdHasCity = text.includes(myCity);
    const jdHasRemote = text.includes('远程') || text.includes('居家');
    if (jdHasCity) {
      results.push({ item: '期望城市', mine: myCity, jd: myCity, status: 'match', note: '岗位地点与你的期望一致' });
    } else if (jdHasRemote) {
      results.push({ item: '期望城市', mine: myCity, jd: '远程办公', status: 'match', note: '岗位支持远程办公，地点不受限' });
    } else {
      const jdCity = cities.find(c => text.includes(c)) || '其他';
      results.push({ item: '期望城市', mine: myCity, jd: jdCity, status: 'miss', note: '岗位地点与你的期望不符' });
    }
  }

  // 3. 不接受加班
  const noOvertime = /不接受加班|不加班|拒绝加班|不想加班|希望不加班|朝九晚五|准时下班|不接受高强度/.test(req);
  if (noOvertime) {
    const jdOvertime = text.includes('抗压') || text.includes('高强度') || text.includes('加班') || text.includes('996') || text.includes('强度');
    const jdNoOvertime = text.includes('不加班') || text.includes('准时下');
    if (jdNoOvertime) {
      results.push({ item: '加班情况', mine: '不接受加班', jd: '明确不加班', status: 'match', note: '岗位明确说明不加班' });
    } else if (jdOvertime) {
      results.push({ item: '加班情况', mine: '不接受加班', jd: '可能需加班', status: 'miss', note: 'JD 出现抗压/高强度等表述，与你「不接受加班」直接冲突' });
    } else {
      results.push({ item: '加班情况', mine: '不接受加班', jd: '未说明', status: 'warn', note: 'JD 未说明加班情况，需面试时确认' });
    }
  }

  // 4. 不接受外包/驻场
  const noOutsource = /不接受外包|不做外包|拒绝外包|不接受驻场|不做驻场|拒绝驻场|不想驻场|不驻场/.test(req);
  if (noOutsource) {
    const jdOutsource = text.includes('外包') || text.includes('驻场');
    if (jdOutsource) {
      results.push({ item: '外包/驻场', mine: '不接受', jd: '涉及外包/驻场', status: 'miss', note: '岗位涉及外包或驻场，与你要求直接冲突' });
    } else {
      results.push({ item: '外包/驻场', mine: '不接受', jd: '未涉及', status: 'match', note: '岗位未涉及外包/驻场' });
    }
  }

  // 5. 希望双休
  const wantWeekend = /双休|周末双休|希望双休|要双休|要求双休|需要双休/.test(req);
  if (wantWeekend) {
    const jdWeekend = text.includes('双休');
    const jdSingle = text.includes('单休') || text.includes('大小周');
    if (jdWeekend) {
      results.push({ item: '休息制度', mine: '双休', jd: '双休', status: 'match', note: '岗位明确双休' });
    } else if (jdSingle) {
      results.push({ item: '休息制度', mine: '双休', jd: '单休/大小周', status: 'miss', note: '岗位非双休，与你要求冲突' });
    } else {
      results.push({ item: '休息制度', mine: '双休', jd: '未说明', status: 'warn', note: 'JD 未说明休息制度，需确认' });
    }
  }

  // 6. 不接受狼性文化
  const noWolf = /不接受狼性|不要狼性|拒绝狼性|不喜欢狼性|反感狼性/.test(req);
  if (noWolf) {
    const jdWolf = text.includes('狼性');
    if (jdWolf) {
      results.push({ item: '企业文化', mine: '不接受狼性', jd: '强调狼性', status: 'miss', note: '岗位强调狼性文化，与你要求直接冲突' });
    } else {
      results.push({ item: '企业文化', mine: '不接受狼性', jd: '未提及', status: 'match', note: '岗位未提及狼性文化' });
    }
  }

  // 7. 薪资透明
  const wantClearSalary = /薪资透明|不接受面议|不要面议|明确薪资|不接受综合薪资/.test(req);
  if (wantClearSalary) {
    const jdVague = text.includes('薪资面议') || text.includes('综合薪资') || !data.salary.found;
    if (jdVague) {
      results.push({ item: '薪资透明', mine: '要求明确薪资', jd: '薪资不透明', status: 'miss', note: '岗位薪资表述模糊（面议/综合/未写明），与你要求冲突' });
    } else {
      results.push({ item: '薪资透明', mine: '要求明确薪资', jd: `${data.salary.low}-${data.salary.high}K`, status: 'match', note: '岗位薪资范围明确' });
    }
  }

  // 8. 不接受调岗
  const noTransfer = /不接受调岗|不接受岗位调整|不调岗|拒绝调岗/.test(req);
  if (noTransfer) {
    const jdTransfer = text.includes('接受调岗') || text.includes('接受岗位调整') || text.includes('岗位调整');
    if (jdTransfer) {
      results.push({ item: '岗位稳定', mine: '不接受调岗', jd: '可能调岗', status: 'miss', note: '岗位描述中提到可能调岗，与你要求冲突' });
    } else {
      results.push({ item: '岗位稳定', mine: '不接受调岗', jd: '未提及', status: 'match', note: '岗位未提及调岗' });
    }
  }

  return results;
}

// ===================== 渲染流程 =====================
async function runAnalysis() {
  const text = $('jobText').value.trim();
  if (!text) { alert('请先粘贴岗位信息'); return; }

  const data = analyze(text);
  area.innerHTML = '';

  // Step 1: 扫描 JD
  await renderStep1(data);
  await sleep(600);

  // Step 2: AI 思考
  await renderStep2(data);
  await sleep(500);

  // Step 3: 雷达图评分
  await renderStep3(data);
  await sleep(400);

  // Step 4: 决策结果
  await renderStep4(data);
  await sleep(300);

  // Step 5: 风险词高亮
  await renderStep5(data);
  await sleep(300);

  // Step 6: 面试追问
  await renderStep6(data);
  await sleep(300);

  // Step 7: 关键词匹配
  await renderStep7(data);
  await sleep(300);

  // Step 8: 我的要求 vs 岗位要求
  await renderStep8(data);
  await sleep(300);

  // Step 9: 简历条目（打字机）
  await renderStep9(data);
  await sleep(200);

  // Step 10: 自我介绍（打字机）
  await renderStep10(data);
}

function createStep(num, title, status) {
  const div = document.createElement('div');
  div.className = 'analysis-step';
  div.innerHTML = `
    <div class="step-header">
      <div class="step-num" id="stepNum${num}">${num}</div>
      <div class="step-title">${title}</div>
      <div class="step-status" id="stepStatus${num}">${status}</div>
    </div>
    <div id="stepBody${num}"></div>
  `;
  area.appendChild(div);
  return $(`stepBody${num}`);
}

function markDone(num) {
  const numEl = $(`stepNum${num}`);
  const statusEl = $(`stepStatus${num}`);
  if (numEl) numEl.classList.add('done');
  if (numEl) numEl.innerHTML = '✓';
  if (statusEl) statusEl.textContent = '完成';
}

// Step 1: 扫描 JD
async function renderStep1(data) {
  const body = createStep(1, '正在读取岗位文本', '扫描中...');
  const lines = data.text.split('\n').filter(l => l.trim());
  let html = '<div class="scan-box"><div class="scan-line"></div><div class="scan-text">';
  lines.forEach((line, i) => {
    html += `<div class="line" id="scanLine${i}">${escapeHtml(line)}</div>`;
  });
  html += '</div></div>';
  body.innerHTML = html;

  // 逐行高亮动画
  for (let i = 0; i < Math.min(lines.length, 12); i++) {
    const el = $(`scanLine${i}`);
    if (el) {
      el.classList.add('active');
      await sleep(120);
      el.classList.remove('active');
    }
  }
  markDone(1);
}

// Step 2: AI 思考
async function renderStep2(data) {
  const body = createStep(2, 'AI 正在分析', '思考中...');
  const thinkTexts = [
    `识别到岗位：${data.title}${data.company ? ' @ ' + data.company : ''}...`,
    `发现 ${data.riskHits.length} 处风险信号，${data.positiveHits.length} 处正向信号...`,
    data.salary.found ? `薪资范围 ${data.salary.low}-${data.salary.high}，跨度比 ${data.salary.ratio.toFixed(1)}...` : '未识别到明确薪资范围...',
    `职责描述清晰度评估中...`,
    `正在生成综合判断...`
  ];

  for (const t of thinkTexts) {
    const p = document.createElement('div');
    p.style.cssText = 'margin-bottom:8px;font-size:14px;color:var(--muted);';
    body.appendChild(p);
    await typeWriter(p, t, 22);
    await sleep(200);
  }
  markDone(2);
}

// Step 3: 雷达图
async function renderStep3(data) {
  const body = createStep(3, '多维度评估', '计算中...');
  const s = data.scores;

  body.innerHTML = `
    <div class="radar-wrap">
      <div class="radar-chart" id="radarChart"></div>
      <div class="score-detail">
        ${scoreBar('真实性', s.authenticity, s.authenticity > 60 ? 'var(--safe)' : s.authenticity > 40 ? 'var(--warn)' : 'var(--bad)')}
        ${scoreBar('风险指数', s.risk, s.risk > 60 ? 'var(--bad)' : s.risk > 35 ? 'var(--warn)' : 'var(--safe)')}
        ${scoreBar('职责清晰度', s.clarity, 'var(--accent)')}
        ${scoreBar('薪资透明度', s.salary, s.salary > 60 ? 'var(--safe)' : 'var(--warn)')}
        ${scoreBar('信息完整度', s.match, 'var(--accent2)')}
      </div>
    </div>
  `;

  // 用 CSS 画简单雷达图（SVG）
  drawRadarChart(s);
  markDone(3);
}

function scoreBar(label, value, color) {
  return `
    <div class="score-item">
      <span class="score-label">${label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:0%;background:${color}" data-width="${value}%"></div></div>
      <span class="score-num">${value}</span>
    </div>
  `;
}

function drawRadarChart(scores) {
  const container = $('radarChart');
  if (!container) return;
  const labels = ['真实性','风险指数','清晰度','薪资透明','完整度'];
  const vals = [scores.authenticity, 100-scores.risk, scores.clarity, scores.salary, scores.match];
  const max = 100;
  const cx = 130, cy = 120, r = 80;
  const n = labels.length;

  let points = '';
  vals.forEach((v, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const vr = (v / max) * r;
    const x = cx + vr * Math.cos(angle);
    const y = cy + vr * Math.sin(angle);
    points += `${x},${y} `;
  });

  let grid = '';
  for (let level = 1; level <= 4; level++) {
    let gp = '';
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const lr = (level / 4) * r;
      const x = cx + lr * Math.cos(angle);
      const y = cy + lr * Math.sin(angle);
      gp += `${x},${y} `;
    }
    grid += `<polygon points="${gp}" fill="none" stroke="#d8dee9" stroke-width="1"/>`;
  }

  let axes = '';
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    axes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#d8dee9" stroke-width="1"/>`;
    const lx = cx + (r + 22) * Math.cos(angle);
    const ly = cy + (r + 22) * Math.sin(angle);
    const anchor = lx > cx ? 'start' : lx < cx ? 'end' : 'middle';
    const dy = ly > cy ? 4 : ly < cy ? -4 : 4;
    axes += `<text x="${lx}" y="${ly + dy}" fill="#6b7689" font-size="11" text-anchor="${anchor}">${labels[i]}</text>`;
  }

  container.innerHTML = `
    <svg viewBox="0 0 260 240" style="width:100%;height:100%">
      ${grid}${axes}
      <polygon points="${points}" fill="rgba(37,99,235,0.18)" stroke="#2563eb" stroke-width="2"/>
      ${vals.map((v,i) => {
        const angle = (Math.PI*2*i/n) - Math.PI/2;
        const vr = (v/max)*r;
        const x = cx + vr*Math.cos(angle);
        const y = cy + vr*Math.sin(angle);
        return `<circle cx="${x}" cy="${y}" r="4" fill="#2563eb"/>`;
      }).join('')}
    </svg>
  `;

  // 进度条动画
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(b => {
      b.style.width = b.dataset.width;
    });
  }, 100);
}

// Step 4: 决策
async function renderStep4(data) {

}

    <div class="keyword-grid">

    </p>

// Step 8: 我的要求 vs 岗位要求
async function renderStep8(data) {
  const body = createStep(8, '我的要求 vs 岗位要求', '比对中...');
  const results = compareRequirements(data);
  if (!results || results.length === 0) {
    body.innerHTML = `<p style="color:var(--muted);font-size:14px;padding:8px 0">未填写求职要求，跳过比对。在左侧「我的求职要求」里写出你的硬性要求，可启用逐条比对。</p>`;
    markDone(8);
    return;
  }
  const missCount = results.filter(r => r.status === 'miss').length;
  const warnCount = results.filter(r => r.status === 'warn').length;

  let summary = '';
  if (missCount > 0) {
    summary = `<div class="decision-box bad" style="margin-bottom:16px">
      <div class="decision-badge bad">${missCount} 项冲突</div>
      <div class="decision-text">有 <strong>${missCount}</strong> 项岗位情况与你的期望直接冲突${warnCount > 0 ? `，另有 ${warnCount} 项需确认` : ''}，请重点关注下方标红项。</div>
    </div>`;
  } else if (warnCount > 0) {
    summary = `<div class="decision-box warn" style="margin-bottom:16px">
      <div class="decision-badge warn">${warnCount} 项待确认</div>
      <div class="decision-text">没有明显冲突，但有 ${warnCount} 项岗位未明确，建议面试时确认。</div>
    </div>`;
  } else {
    summary = `<div class="decision-box safe" style="margin-bottom:16px">
      <div class="decision-badge safe">全部符合</div>
      <div class="decision-text">岗位各项情况均符合你的求职要求。</div>
    </div>`;
  }

  body.innerHTML = summary + `
    <div class="compare-list">
      ${results.map(r => `
        <div class="compare-item ${r.status}">
          <div class="compare-status ${r.status}">${r.status === 'match' ? '✓' : r.status === 'warn' ? '!' : '✗'}</div>
          <div class="compare-content">
            <div class="compare-title">${r.item}</div>
            <div class="compare-row">
              <span class="compare-mine">我的要求：${escapeHtml(r.mine)}</span>
              <span class="compare-arrow">→</span>
              <span class="compare-jd">岗位实际：${escapeHtml(r.jd)}</span>
            </div>
            <div class="compare-note">${escapeHtml(r.note)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  markDone(8);
}

// Step 9: 简历条目（打字机）
async function renderStep9(data) {
  const body = createStep(9, 'AI 简历优化建议', '生成中...');

async function renderStep10(data) {

  card.className = 'suggestion-card relative';
  card.innerHTML = `
    <button class="copy-btn" onclick="copyIntro(this)">复制</button>

  `;

  const intro = generateSelfIntro(data);
  await typeWriter($('introText'), intro, 18);

}

function copyIntro(btn) {
  const text = $('introText').innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  });
}
