<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多模智协 v2.0 — AI 驱动内容创作工作坊（Demo）</title>
<style>
/* ========== 设计系统 tokens（与项目 ruoyi-web 保持一致）========== */
:root {
  --bg-primary: #111214;
  --bg-secondary: #1A1B1F;
  --bg-tertiary: #232428;
  --bg-elevated: #2A2B2F;
  --bg-hover: #2E3040;
  --border-primary: #2E3040;
  --border-secondary: #3A3C4D;
  --border-strong: #4A4D60;
  --text-primary: #E6E8EF;
  --text-secondary: #9CA3AF;
  --text-tertiary: #6B7280;
  --text-quaternary: #4B5563;
  --brand-primary: #6366F1;
  --brand-hover: #7C7FF0;
  --brand-pressed: #5558E6;
  --brand-soft: rgba(99, 102, 241, 0.12);
  --brand-border: rgba(99, 102, 241, 0.30);
  --success: #22C55E;
  --success-soft: rgba(34, 197, 94, 0.12);
  --warning: #F59E0B;
  --warning-soft: rgba(245, 158, 11, 0.12);
  --error: #EF4444;
  --error-soft: rgba(239, 68, 68, 0.12);
  --agent-script: #F59E0B;
  --agent-character: #EC4899;
  --agent-storyboard: #8B5CF6;
  --agent-image: #14B8A6;
  --radius-card: 12px;
  --radius-button: 8px;
  --radius-sm: 4px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.15);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.25);
  --shadow-float: 0 4px 20px rgba(0,0,0,0.4);
  --transition-fast: 120ms ease;
  --transition-base: 200ms ease;
}
* { box-sizing: border-box; }
html, body {
  height: 100%; margin: 0; padding: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(99,102,241,0.03) 0%, transparent 100%), var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px; line-height: 1.5; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
/* ========== 整体三栏布局 ========== */
.app { display: flex; height: 100vh; width: 100vw; }

/* 左侧导航 */
.nav {
  width: 56px; background: var(--bg-secondary);
  border-right: 1px solid var(--border-primary);
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 0; flex-shrink: 0;
}
.nav-item {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-button);
  color: var(--text-tertiary); cursor: pointer;
  margin-bottom: 6px; transition: all var(--transition-fast);
  position: relative;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--brand-soft); color: var(--brand-primary); }
.nav-item.active::before {
  content: ""; position: absolute;
  left: -12px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 20px; background: var(--brand-primary);
  border-radius: 0 3px 3px 0;
}
.nav-spacer { flex: 1; }
.nav-brand {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
  color: #fff; border-radius: var(--radius-button);
  margin-bottom: 20px; font-weight: 700; font-size: 14px;
}

/* 中间工作区 */
.workspace { flex: 1; display: flex; min-width: 0; }

.session-list {
  width: 240px; background: var(--bg-secondary);
  border-right: 1px solid var(--border-primary);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: width var(--transition-base);
}
.session-list.collapsed { width: 0; overflow: hidden; border-right: none; }
.session-header {
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border-primary);
}
.session-title { font-size: 14px; font-weight: 600; }
.new-btn {
  padding: 4px 10px; background: var(--brand-primary); color: #fff;
  border: none; border-radius: var(--radius-button); cursor: pointer;
  font-size: 12px; transition: background var(--transition-fast);
}
.new-btn:hover { background: var(--brand-hover); }
.session-search { padding: 10px 12px; }
.session-search input {
  width: 100%; padding: 7px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-button);
  color: var(--text-primary); font-size: 13px; outline: none;
  transition: border-color var(--transition-fast);
}
.session-search input:focus { border-color: var(--brand-primary); }
.session-items { flex: 1; overflow-y: auto; padding: 4px 8px; }
.session-item {
  padding: 10px 12px; border-radius: var(--radius-button);
  cursor: pointer; margin-bottom: 2px;
  transition: all var(--transition-fast);
}
.session-item:hover { background: var(--bg-hover); }
.session-item.active {
  background: var(--brand-soft);
  border: 1px solid var(--brand-border);
  padding: 9px 11px;
}
.si-title { font-size: 13px; color: var(--text-primary); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.si-meta { font-size: 11px; color: var(--text-quaternary); }

/* 对话主区 */
.chat { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-primary); }
.chat-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-primary);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-secondary);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-right { display: flex; gap: 8px; }
.toggle-btn, .icon-mini-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-tertiary); border: 1px solid var(--border-primary);
  border-radius: var(--radius-button); color: var(--text-secondary);
  cursor: pointer; transition: all var(--transition-fast);
}
.toggle-btn:hover, .icon-mini-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.chat-title { font-size: 15px; font-weight: 600; }
.chat-subtitle { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

.chat-body { flex: 1; overflow-y: auto; padding: 24px 0; }
.chat-body-inner { max-width: 880px; margin: 0 auto; padding: 0 24px; }

.message { display: flex; gap: 12px; margin-bottom: 28px; animation: fadeUp 300ms ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
}
.avatar.user { background: var(--brand-primary); color: #fff; }
.avatar.ai { background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%); color: #fff; }

.bubble {
  max-width: 90%; padding: 12px 16px;
  border-radius: var(--radius-card);
  font-size: 14px; line-height: 1.65;
}
.message.user .bubble {
  background: var(--brand-primary); color: #fff;
  border-bottom-right-radius: 4px;
}
.message.ai .bubble {
  background: var(--bg-secondary); color: var(--text-primary);
  border: 1px solid var(--border-primary);
  border-bottom-left-radius: 4px;
}
.bubble p { margin: 0 0 8px; }
.bubble p:last-child { margin-bottom: 0; }

/* AI 建议卡片 */
.suggestions {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px dashed var(--border-primary);
  display: flex; flex-wrap: wrap; gap: 8px;
}
.suggestion-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--bg-tertiary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-button); color: var(--text-secondary);
  font-size: 13px; cursor: pointer;
  transition: all var(--transition-fast);
}
.suggestion-chip:hover {
  background: var(--brand-soft); border-color: var(--brand-border);
  color: var(--brand-primary); transform: translateY(-1px);
}
.suggestion-chip.chosen {
  background: var(--brand-soft); border-color: var(--brand-border);
  color: var(--brand-primary);
}
.suggestion-chip.disabled { opacity: 0.4; pointer-events: none; }
.chip-icon {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; font-size: 10px; color: #fff;
}
.suggestion-chip[data-agent="script"] .chip-icon { background: var(--agent-script); }
.suggestion-chip[data-agent="character"] .chip-icon { background: var(--agent-character); }
.suggestion-chip[data-agent="storyboard"] .chip-icon { background: var(--agent-storyboard); }
.suggestion-chip[data-agent="image"] .chip-icon { background: var(--agent-image); }

/* 内容卡片（Agent 输出） */
.output-card {
  margin-top: 14px; background: var(--bg-secondary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-card); overflow: hidden;
  animation: slideIn 300ms ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.oc-header {
  padding: 12px 16px; background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border-primary);
  display: flex; align-items: center; justify-content: space-between;
}
.oc-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
.oc-tag { padding: 2px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 500; color: #fff; }
.oc-tag.script { background: var(--agent-script); }
.oc-tag.character { background: var(--agent-character); }
.oc-tag.storyboard { background: var(--agent-storyboard); }
.oc-tag.image { background: var(--agent-image); }
.oc-actions { display: flex; gap: 6px; }
.oc-action-btn {
  padding: 4px 10px; background: var(--bg-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-sm); color: var(--text-secondary);
  font-size: 12px; cursor: pointer; transition: all var(--transition-fast);
}
.oc-action-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.oc-action-btn.primary {
  background: var(--brand-soft); border-color: var(--brand-border);
  color: var(--brand-primary);
}
.oc-action-btn.primary:hover { background: var(--brand-primary); color: #fff; border-color: var(--brand-primary); }
.oc-body { padding: 16px; }

/* 剧本卡片 */
.script-content { font-size: 13px; line-height: 1.75; color: var(--text-primary); }
.script-scene { color: var(--brand-primary); font-weight: 600; margin-top: 12px; margin-bottom: 6px; }
.script-scene:first-child { margin-top: 0; }
.script-dialog {
  padding: 6px 12px; background: var(--bg-primary);
  border-left: 2px solid var(--border-secondary);
  margin-bottom: 4px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.script-speaker { color: var(--agent-script); font-weight: 600; margin-right: 8px; }

/* 角色卡片 */
.character-grid { display: grid; grid-template-columns: 120px 1fr; gap: 16px; }
.character-avatar-box {
  width: 120px; height: 120px;
  background: linear-gradient(135deg, #2A2B2F 0%, #3A3C4D 100%);
  border: 1px solid var(--border-primary); border-radius: var(--radius-card);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.character-avatar-box::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 30%, var(--agent-character) 0%, transparent 50%);
  opacity: 0.2;
}
.character-emoji { font-size: 48px; position: relative; z-index: 1; }
.character-info dl { margin: 0; display: grid; grid-template-columns: 80px 1fr; gap: 8px 12px; font-size: 13px; }
.character-info dt { color: var(--text-tertiary); }
.character-info dd { margin: 0; color: var(--text-primary); }

/* 分镜卡片 */
.storyboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.shot {
  background: var(--bg-primary); border: 1px solid var(--border-primary);
  border-radius: var(--radius-button); padding: 10px;
}
.shot-num { font-size: 11px; color: var(--agent-storyboard); font-weight: 600; margin-bottom: 6px; }
.shot-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }

/* 画面卡片 */
.image-grid { display: flex; gap: 12px; flex-wrap: wrap; }
.image-tile {
  flex: 1; min-width: 140px; aspect-ratio: 4/5;
  background: linear-gradient(135deg, #1A1B2F 0%, #3A3C5D 50%, #1A1B1F 100%);
  border: 1px solid var(--border-primary); border-radius: var(--radius-button);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 12px; position: relative; overflow: hidden;
}
.image-tile::after {
  content: ""; position: absolute; top: 50%; left: 50%;
  width: 80px; height: 80px; transform: translate(-50%,-50%);
  background: radial-gradient(circle, rgba(255,220,150,0.2) 0%, transparent 70%);
}

/* 流式指示器 */
.streaming { display: inline-flex; align-items: center; gap: 6px; color: var(--text-tertiary); font-size: 12px; }
.streaming .dots { display: inline-flex; gap: 3px; }
.streaming .dot {
  width: 4px; height: 4px; background: var(--brand-primary); border-radius: 50%;
  animation: pulse 1.4s infinite;
}
.streaming .dot:nth-child(2) { animation-delay: 0.2s; }
.streaming .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%, 60%, 100% { transform: scale(1); opacity: 0.5; } 30% { transform: scale(1.4); opacity: 1; } }

/* 输入区 */
.chat-input-area { padding: 16px 24px 24px; background: var(--bg-primary); }
.chat-input-inner {
  max-width: 880px; margin: 0 auto;
  background: var(--bg-secondary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-card);
  padding: 12px;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.chat-input-inner:focus-within { border-color: var(--brand-primary); box-shadow: 0 0 0 3px var(--brand-soft); }
.chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
.chat-textarea {
  flex: 1; background: transparent; border: none; resize: none;
  color: var(--text-primary); font-size: 14px; font-family: inherit;
  line-height: 1.6; outline: none;
  max-height: 160px; min-height: 24px;
}
.chat-textarea::placeholder { color: var(--text-quaternary); }
.send-btn {
  padding: 8px 16px; background: var(--brand-primary); color: #fff;
  border: none; border-radius: var(--radius-button); font-size: 13px;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: background var(--transition-fast);
}
.send-btn:hover { background: var(--brand-hover); }
.send-btn:disabled { background: var(--border-primary); cursor: not-allowed; }

.quick-tips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-primary); }
.quick-tip {
  padding: 4px 10px; background: var(--bg-primary);
  border: 1px solid var(--border-primary); border-radius: var(--radius-sm);
  color: var(--text-tertiary); font-size: 12px; cursor: pointer;
  transition: all var(--transition-fast);
}
.quick-tip:hover { color: var(--brand-primary); border-color: var(--brand-border); background: var(--brand-soft); }

/* 右侧资产面板 */
.right-panel {
  width: 340px; background: var(--bg-secondary);
  border-left: 1px solid var(--border-primary);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: width var(--transition-base);
}
.right-panel.collapsed { width: 0; overflow: hidden; border-left: none; }
.rp-header {
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border-primary);
}
.rp-title { font-size: 14px; font-weight: 600; }
.rp-tabs { display: flex; padding: 8px 12px; gap: 6px; border-bottom: 1px solid var(--border-primary); }
.rp-tab {
  flex: 1; padding: 6px 10px; text-align: center;
  background: transparent; border: 1px solid transparent;
  border-radius: var(--radius-sm); color: var(--text-tertiary);
  font-size: 12px; cursor: pointer; transition: all var(--transition-fast);
}
.rp-tab:hover { color: var(--text-primary); }
.rp-tab.active { background: var(--brand-soft); color: var(--brand-primary); border-color: var(--brand-border); }
.rp-body { flex: 1; overflow-y: auto; padding: 16px; }

.asset-empty { text-align: center; padding: 40px 20px; color: var(--text-quaternary); font-size: 12px; }
.asset-empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.3; }

.asset-item {
  background: var(--bg-primary); border: 1px solid var(--border-primary);
  border-radius: var(--radius-button); padding: 12px;
  margin-bottom: 10px; transition: all var(--transition-fast); cursor: pointer;
}
.asset-item:hover { border-color: var(--brand-border); transform: translateY(-1px); }
.asset-type {
  display: inline-block; padding: 2px 8px; border-radius: var(--radius-sm);
  font-size: 10px; font-weight: 600; color: #fff; margin-bottom: 8px;
}
.asset-name { font-size: 13px; color: var(--text-primary); margin-bottom: 4px; font-weight: 500; }
.asset-desc { font-size: 12px; color: var(--text-tertiary); line-height: 1.5; }

/* 滚动条 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-primary); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-secondary); }

/* Toast */
.toast {
  position: fixed; top: 20px; right: 20px;
  padding: 10px 16px; background: var(--bg-elevated);
  border: 1px solid var(--border-secondary);
  border-radius: var(--radius-button); color: var(--text-primary);
  font-size: 13px; box-shadow: var(--shadow-float);
  z-index: 1000; animation: toastIn 300ms ease;
  display: flex; align-items: center; gap: 8px;
}
.toast.success { border-color: rgba(34,197,94,0.3); }
.toast.info { border-color: rgba(99,102,241,0.3); }
.toast-icon { font-size: 14px; }
.toast.success .toast-icon { color: var(--success); }
.toast.info .toast-icon { color: var(--brand-primary); }
@keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

/* Project Guardian 审查报告 */
.guardian-card {
  margin-top: 14px;
  background: linear-gradient(135deg, rgba(99,102,241,0.06) 0%, rgba(139,92,246,0.06) 100%);
  border: 1px solid var(--brand-border);
  border-radius: var(--radius-card); overflow: hidden;
  animation: slideIn 300ms ease;
}
.guardian-header {
  padding: 12px 16px; background: rgba(99,102,241,0.08);
  border-bottom: 1px solid var(--brand-border);
  display: flex; align-items: center; gap: 10px;
}
.guardian-icon {
  width: 28px; height: 28px; background: var(--brand-primary);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px; font-weight: 700;
}
.guardian-title { font-size: 13px; font-weight: 600; }
.guardian-subtitle { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.guardian-body { padding: 14px 16px; }
.guardian-section { margin-bottom: 14px; }
.guardian-section:last-child { margin-bottom: 0; }
.guardian-section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
.issue-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; background: var(--bg-primary);
  border: 1px solid var(--border-primary);
  border-left: 3px solid var(--error);
  border-radius: var(--radius-sm);
  margin-bottom: 8px; font-size: 12px;
}
.issue-row.info { border-left-color: var(--brand-primary); }
.issue-row.success { border-left-color: var(--success); }
.issue-icon { font-size: 14px; flex-shrink: 0; }
.issue-title { color: var(--text-primary); font-weight: 500; margin-bottom: 2px; }
.issue-desc { color: var(--text-tertiary); font-size: 11px; line-height: 1.6; }

.code-block {
  background: #0D0E10; border: 1px solid var(--border-primary);
  border-radius: var(--radius-sm); padding: 10px 12px;
  font-family: "SF Mono", "Monaco", "Consolas", monospace;
  font-size: 11px; color: #B8BCC8; overflow-x: auto;
  line-height: 1.6; margin-top: 8px;
}
.code-block .kw { color: #C792EA; }
.code-block .str { color: #C3E88D; }
.code-block .num { color: #F78C6C; }
.code-block .cm { color: #546E7A; font-style: italic; }

/* 响应式 */
@media (max-width: 1200px) { .right-panel { width: 300px; } .storyboard-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 900px) {
  .session-list { position: absolute; z-index: 10; height: 100%; }
  .right-panel { position: absolute; right: 0; z-index: 10; height: 100%; }
  .character-grid { grid-template-columns: 1fr; }
  .storyboard-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ===================== 左侧导航 ===================== -->
  <aside class="nav">
    <div class="nav-brand">M</div>
    <div class="nav-item active" title="对话">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 01-11.5 7L3 21l2-5.5A8 8 0 1121 12z"></path></svg>
    </div>
    <div class="nav-item" title="文件">

              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>

            </button>

            <span class="quick-tip" onclick="useQuickTip('这个剧本的主角应该是什么样的人设？')">👤 角色设计</span>
            <span class="quick-tip" onclick="useQuickTip('把第一幕拆分成 3 个关键分镜')">🎬 分镜画面</span>

        </button>

        <button class="rp-tab active" onclick="switchAssetTab('all', this)">全部</button>
        <button class="rp-tab" onclick="switchAssetTab('script', this)">剧本</button>
        <button class="rp-tab" onclick="switchAssetTab('character', this)">角色</button>
        <button class="rp-tab" onclick="switchAssetTab('storyboard', this)">分镜</button>
      </div>

        <div class="asset-empty">
          <div class="asset-empty-icon">📦</div>
          <div>暂无资产</div>

        </div>

<script>
/* ============================================================
   会话数据
   ============================================================ */
const sessions = [
  { id: 1, title: '悬疑推理短剧 - 午夜来电', meta: '5 条消息 · 刚刚', active: true },
  { id: 2, title: '校园情感短片', meta: '12 条消息 · 2小时前' },
  { id: 3, title: '营销短视频 - 咖啡产品', meta: '8 条消息 · 昨天' },
  { id: 4, title: '科普动画 - 黑洞原理', meta: '20 条消息 · 3天前' },
];
let assets = [];
let isProcessing = false;

/* ============ 会话列表 ============ */
function renderSessionList() {
  const c = document.getElementById('sessionItems');
  c.innerHTML = sessions.map(s =>
    `<div class="session-item${s.active ? ' active' : ''}" onclick="selectSession(${s.id})">
      <div class="si-title">${s.title}</div>
      <div class="si-meta">${s.meta}</div>
    </div>`).join('');
}
function selectSession(id) {
  sessions.forEach(s => s.active = s.id === id);
  const s = sessions.find(x => x.id === id);
  document.getElementById('chatTitle').textContent = s.title.split(' - ')[0] || s.title;
  renderSessionList();
  resetChat(true);
}
function newSession() {
  const id = Date.now();
  sessions.forEach(s => s.active = false);
  sessions.unshift({ id, title: '新会话 ' + (sessions.length), meta: '0 条消息 · 刚刚', active: true });
  document.getElementById('chatTitle').textContent = 'AI 短剧创作工作坊';
  renderSessionList();
  resetChat(true);
  showToast('已创建新会话', 'success');
}
function toggleSessionList() { document.getElementById('sessionList').classList.toggle('collapsed'); }
function toggleRightPanel() { document.getElementById('rightPanel').classList.toggle('collapsed'); }

/* ============ 资产库 ============ */
function switchAssetTab(type, btn) {
  document.querySelectorAll('.rp-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderAssets(type);
}
function renderAssets(filter = 'all') {
  const list = document.getElementById('assetList');
  const items = filter === 'all' ? assets : assets.filter(a => a.type === filter);
  const typeLabel = { script: '剧本', character: '角色', storyboard: '分镜', image: '画面' };
  const typeBg = { script: 'var(--agent-script)', character: 'var(--agent-character)', storyboard: 'var(--agent-storyboard)', image: 'var(--agent-image)' };
  if (items.length === 0) {
    list.innerHTML = `<div class="asset-empty">
      <div class="asset-empty-icon">📦</div>
      <div>暂无${filter === 'all' ? '' : typeLabel[filter]}资产</div>
      <div style="margin-top:4px;">在对话中生成的内容卡片会自动入库</div>
    </div>`; return;
  }
  list.innerHTML = items.map(a =>
    `<div class="asset-item">
      <span class="asset-type" style="background:${typeBg[a.type]}">${typeLabel[a.type]}</span>
      <div class="asset-name">${a.name}</div>
      <div class="asset-desc">${a.desc}</div>
    </div>`).join('');
}
function addAsset(type, name, desc) {
  assets.unshift({ type, name, desc });
  const active = document.querySelector('.rp-tab.active');
  const filterMap = { '全部': 'all', '剧本': 'script', '角色': 'character', '分镜': 'storyboard' };
  renderAssets(filterMap[active.textContent] || 'all');
}

/* ============ 消息渲染 ============ */
function appendMessage(role, text) {
  const inner = document.getElementById('chatBodyInner');
  const msg = document.createElement('div');
  msg.className = 'message ' + role;
  msg.innerHTML = `<div class="avatar ${role}">${role === 'user' ? '我' : 'AI'}</div>
    <div class="bubble"></div>`;
  const bubble = msg.querySelector('.bubble');
  bubble.innerHTML = text.split('\n').filter(l => l.trim()).map(l => `<p>${l}</p>`).join('');
  inner.appendChild(msg);
  scrollToBottom();
  return { el: msg, bubble };
}
function appendStreamingMessage() {
  const inner = document.getElementById('chatBodyInner');
  const msg = document.createElement('div');
  msg.className = 'message ai';
  msg.innerHTML = `<div class="avatar ai">AI</div>
    <div class="bubble"><div class="msg-body"></div></div>`;
  inner.appendChild(msg);
  scrollToBottom();
  return { el: msg, bubble: msg.querySelector('.bubble'), body: msg.querySelector('.msg-body') };
}
function scrollToBottom() {
  const body = document.getElementById('chatBody');
  body.scrollTop = body.scrollHeight;
}

/* ============ 流式输出（模拟 SSE）============ */
function streamText(el, text, charDelay, callback) {
  el.textContent = '';
  const streamInfo = document.createElement('div');
  streamInfo.className = 'streaming';
  streamInfo.innerHTML = '<span>正在输出</span><span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
  el.appendChild(streamInfo);

  const textEl = document.createElement('div');
  textEl.style.marginTop = '4px';
  textEl.style.whiteSpace = 'pre-wrap';
  el.appendChild(textEl);

  let i = 0;
  const lines = text.split('\n');
  let lineIdx = 0;
  streamInfo.remove();

  // 简化：逐行追加显示
  function showNextLine() {
    if (lineIdx >= lines.length) {
      // 替换成 <p>
      const content = text.trim();
      if (content) {
        el.innerHTML = content.split('\n').filter(l => l.trim()).map(l => `<p>${l}</p>`).join('');
      }
      scrollToBottom();
      if (callback) callback();
      return;
    }
    const line = lines[lineIdx];
    // 逐字符
    let ci = 0;
    const lineEl = document.createElement('p');
    el.appendChild(lineEl);
    function typeChar() {
      if (ci >= line.length) {
        lineIdx++;
        scrollToBottom();
        setTimeout(showNextLine, charDelay);
        return;
      }
      lineEl.textContent += line[ci++];
      scrollToBottom();
      setTimeout(typeChar, charDelay);
    }
    if (!line.trim()) { lineIdx++; setTimeout(showNextLine, charDelay); }
    else setTimeout(typeChar, charDelay);
  }
  showNextLine();
}

/* ============ 发送消息 ============ */
function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isProcessing) return;

  if (text.includes('质量审查') || text.includes('guardian') || text.includes('审查')) {
    input.value = ''; autoResize(input);
    appendMessage('user', text);
    runGuardianFromChat();
    return;
  }

  input.value = ''; autoResize(input);
  appendMessage('user', text);
  isProcessing = true; updateSendBtnState();

  const aiMsg = appendStreamingMessage();
  const reply = generateReply(text);

  streamText(aiMsg.body, reply.text, 20, () => {
    if (reply.suggestions && reply.suggestions.length) {
      const sugWrap = document.createElement('div');
      sugWrap.className = 'suggestions';
      sugWrap.innerHTML = reply.suggestions.map(s =>
        `<div class="suggestion-chip" data-agent="${s.agent}" onclick="triggerAgent('${s.agent}', this)">
          <span class="chip-icon">${s.icon}</span>
          <span>${s.label}</span>
        </div>`).join('');
      aiMsg.bubble.appendChild(sugWrap);
    }
    scrollToBottom();
    isProcessing = false; updateSendBtnState();
  });
}

function generateReply(text) {
  const t = text.toLowerCase();
  if (t.includes('剧本') || t.includes('框架') || t.includes('写一个')) {
    return {
      text: '好的，我先理解你的需求——你想要一个有完整戏剧结构的短剧剧本。\n\n我建议按以下方式推进，你可以选择其中一项，对应的专业 Agent 会生成结构化内容卡片：',
      suggestions: [
        { agent: 'script', label: '生成剧本框架', icon: 'S' },
        { agent: 'character', label: '设计主角人设', icon: 'C' },
        { agent: 'storyboard', label: '拆分关键分镜', icon: 'SB' },
      ],
    };
  }
  if (t.includes('角色') || t.includes('人设') || t.includes('主角')) {
    return {
      text: '好的，角色设计是剧本的灵魂。让我帮你建立有辨识度的角色——外貌、性格、背景故事、台词风格。',
      suggestions: [
        { agent: 'character', label: '设计主角人设', icon: 'C' },
        { agent: 'script', label: '补充剧本对话', icon: 'S' },
      ],
    };
  }
  if (t.includes('分镜') || t.includes('画面') || t.includes('镜头')) {
    return {
      text: '分镜是文字到画面的桥梁。我可以帮你把剧本中的关键场景拆分成可拍摄的镜头序列。',
      suggestions: [
        { agent: 'storyboard', label: '拆分关键分镜', icon: 'SB' },
        { agent: 'image', label: '生成画面参考', icon: 'I' },
      ],
    };
  }
  if (t.includes('comfyui') || t.includes('节点') || t.includes('工作流')) {
    return {
      text: '你提到 ComfyUI——确实，节点工作流对非技术用户很不友好：需要理解节点连接、模型参数、CFG scale、采样器……每一步都是门槛。\n\n这正是多模智协想解决的：让对话驱动创作，而不是让用户在节点间连线。',
      suggestions: [
        { agent: 'script', label: '试试自动生成剧本', icon: 'S' },
        { agent: 'character', label: '试试自动角色设计', icon: 'C' },
        { agent: 'storyboard', label: '试试自动分镜', icon: 'SB' },
      ],
    };
  }
  return {
    text: '我理解你的需求了。你可以从以下任意环节开始，让对应的 Agent 生成结构化的内容卡片：',
    suggestions: [
      { agent: 'script', label: '先从剧本开始', icon: 'S' },
      { agent: 'character', label: '先从角色开始', icon: 'C' },
      { agent: 'storyboard', label: '先从分镜开始', icon: 'SB' },
    ],
  };
}

/* ============ 点击建议后调用 Agent 生成内容卡片 ============ */
function triggerAgent(agentType, el) {
  if (isProcessing) return;
  const parent = el.parentElement;
  parent.querySelectorAll('.suggestion-chip').forEach(c => c.classList.add('disabled'));
  el.classList.remove('disabled');
  el.classList.add('chosen');

  isProcessing = true; updateSendBtnState();

  const aiMsg = appendStreamingMessage();
  const typeLabel = { script: 'SCRIPT', character: 'CHARACTER', storyboard: 'STORYBOARD', image: 'IMAGE' }[agentType];
  const typeFirst = { script: 'S', character: 'C', storyboard: 'S', image: 'I' }[agentType];
  aiMsg.el.querySelector('.avatar').textContent = typeFirst;

  streamText(aiMsg.body, `正在调用 ${typeLabel} Agent... 请稍候。`, 30, () => {
    setTimeout(() => {
      const result = generateAgentContent(agentType);
      aiMsg.body.innerHTML = `<p>${result.intro}</p>`;
      setTimeout(() => {
        aiMsg.bubble.appendChild(result.card);
        scrollToBottom();
        isProcessing = false; updateSendBtnState();
        addAsset(agentType, result.assetName, result.assetDesc);
        showToast(`${typeLabel} 已生成并自动入库`, 'success');
      }, 300);
    }, 500);
  });
}

/* ============ 各 Agent 内容卡片生成 ============ */
function generateAgentContent(type) {
  if (type === 'script') {
    const card = document.createElement('div');
    card.className = 'output-card';
    card.innerHTML = `
      <div class="oc-header">
        <div class="oc-title"><span class="oc-tag script">SCRIPT</span>剧本框架《午夜来电》</div>
        <div class="oc-actions">
          <button class="oc-action-btn" onclick="showToast('已复制到剪贴板','success')">复制</button>
          <button class="oc-action-btn" onclick="showToast('进入编辑器','info')">编辑</button>
          <button class="oc-action-btn primary" onclick="regenerateCard(this,'script')">重新生成</button>
        </div>
      </div>
      <div class="oc-body"><div class="script-content">
        <div class="script-scene">第一幕 · 开场（0:00 - 1:30）</div>
        <div class="script-dialog"><span class="script-speaker">[场景]</span>深夜，老旧公寓。雨声。走廊尽头的灯光闪烁。</div>
        <div class="script-dialog"><span class="script-speaker">[音效]</span>电话铃声突然响起，划破寂静。</div>
        <div class="script-scene">第二幕 · 来电（1:30 - 4:00）</div>
        <div class="script-dialog"><span class="script-speaker">林薇：</span>"……喂？"（犹豫地接起电话）</div>
        <div class="script-dialog"><span class="script-speaker">神秘男声：</span>"你不认识我，但我认识你。三年前的那个雨夜，你忘了一件事。"</div>
        <div class="script-dialog"><span class="script-speaker">林薇：</span>（声音颤抖）"你是谁？你想干什么？"</div>
        <div class="script-scene">第三幕 · 反转（4:00 - 6:30）</div>
        <div class="script-dialog"><span class="script-speaker">[画面]</span>林薇猛然抬头，墙上旧照片出现一个模糊身影。</div>
        <div class="script-dialog"><span class="script-speaker">神秘男声：</span>"你一直以为是意外……但那通电话，其实是你自己打的。"</div>
        <div class="script-scene">第四幕 · 结局（6:30 - 8:00）</div>
        <div class="script-dialog"><span class="script-speaker">[旁白]</span>有些真相，失忆是为了保护你自己。</div>
      </div></div>`;
    return { intro: '我已基于你的需求生成了一份四幕结构的悬疑短剧剧本。你可以点击"编辑"查看完整台词细节，或"重新生成"换一个方向。', card, assetName: '《午夜来电》剧本', assetDesc: '四幕悬疑推理短剧，约 8 分钟' };
  }

  if (type === 'character') {
    const card = document.createElement('div');
    card.className = 'output-card';
    card.innerHTML = `
      <div class="oc-header">
        <div class="oc-title"><span class="oc-tag character">CHARACTER</span>主角人设 — 林薇</div>
        <div class="oc-actions">
          <button class="oc-action-btn" onclick="showToast('已复制','success')">复制</button>
          <button class="oc-action-btn" onclick="showToast('进入编辑器','info')">编辑</button>
          <button class="oc-action-btn primary" onclick="regenerateCard(this,'character')">重新生成</button>
        </div>
      </div>
      <div class="oc-body"><div class="character-grid">
        <div class="character-avatar-box"><span class="character-emoji">👩</span></div>
        <div class="character-info"><dl>
          <dt>姓名</dt><dd>林薇</dd>
          <dt>年龄</dt><dd>28 岁</dd>
          <dt>职业</dt><dd>心理咨询师</dd>
          <dt>外貌</dt><dd>中等身高，深色长发，眼神疲惫但锐利，常穿深灰色系衣物</dd>
          <dt>性格</dt><dd>表面冷静克制，内心敏感多疑；善于分析他人，但对自己的过去选择性失忆</dd>
          <dt>背景</dt><dd>三年前经历过一场神秘雨夜事件，之后出现片段性失忆。对电话铃声有本能恐惧。</dd>

  if (type === 'storyboard') {
    const card = document.createElement('div');
    card.className = 'output-card';

        <div class="shot"><div class="shot-num">镜头 01 · 远景 · 15s</div><div class="shot-desc">深夜老旧公寓外部，窗户透出昏黄灯光。雨丝打在玻璃上，整体色调偏冷蓝。</div></div>

  if (type === 'image') {

    card.innerHTML = `
      <div class="oc-header">

        <div style="margin-top:12px; font-size:12px; color:var(--text-tertiary); line-height:1.7;">
          提示词摘要：深夜老旧公寓走廊 · 昏黄灯光 · 雨丝打在玻璃上 · 冷蓝色调 · 电影级构图 · 胶片颗粒感
        </div>
      </div>`;
    return { intro: '我已生成 4 张风格一致的画面参考，可作为后续拍摄或 AI 绘图的提示词依据。', card, assetName: '雨夜公寓走廊画面', assetDesc: '4 张风格参考图 + 提示词' };
  }
  return { intro: '完成。', card: document.createElement('div'), assetName: '新内容', assetDesc: '占位' };
}

function regenerateCard(btn, type) {
  btn.textContent = '生成中...';
  setTimeout(() => {
    const card = btn.closest('.output-card');
    const result = generateAgentContent(type);
    card.replaceWith(result.card);
    showToast('已重新生成', 'success');
  }, 600);
}

/* ============ 辅助函数 ============ */
function useQuickTip(text) {
  const input = document.getElementById('chatInput');
  input.value = text;
  autoResize(input);
  input.focus();
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
function updateSendBtnState() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = isProcessing;
}
function resetChat(keepFirst) {
  const inner = document.getElementById('chatBodyInner');
  inner.innerHTML = '';
  isProcessing = false;
  updateSendBtnState();
}
function showToast(text, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.innerHTML = `<span class="toast-icon">${type === 'success' ? '✓' : 'ℹ'}</span><span>${text}</span>`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity 300ms'; t.style.opacity = '0'; }, 2200);
  setTimeout(() => t.remove(), 2600);
}
