<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古籍活化工具 - Demo体验</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'SimSun', serif; background: linear-gradient(135deg, #FDF6E3 0%, #FAEBD7 100%); min-height: 100vh; }
        
        .header { background: linear-gradient(90deg, #8B4513 0%, #A0522D 50%, #8B4513 100%); color: #FFD700; padding: 20px 40px; text-align: center; box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3); }
        .header h1 { font-size: 36px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 16px; margin-top: 8px; color: #FFF8DC; }
        
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; background: rgba(139, 69, 19, 0.1); padding: 10px; border-radius: 10px; }
        .nav-tab { padding: 12px 30px; background: #DEB887; color: #8B4513; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        .nav-tab:hover { background: #CD853F; transform: translateY(-2px); }
        .nav-tab.active { background: #8B4513; color: #FFD700; box-shadow: 0 4px 10px rgba(139, 69, 19, 0.3); }
        
        .tab-content { display: none; padding: 20px 40px; max-width: 1200px; margin: 0 auto; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .book-card { background: #FFF8DC; border-radius: 12px; padding: 20px; box-shadow: 0 4px 12px rgba(139, 69, 19, 0.15); transition: all 0.3s; cursor: pointer; border: 2px solid #DEB887; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(139, 69, 19, 0.25); border-color: #8B4513; }
        .book-card .title { font-size: 22px; font-weight: bold; color: #8B4513; margin-bottom: 8px; }
        .book-card .author { font-size: 14px; color: #A0522D; margin-bottom: 5px; }
        .book-card .dynasty { display: inline-block; background: #DEB887; color: #8B4513; padding: 3px 10px; border-radius: 15px; font-size: 12px; margin-bottom: 10px; }
        .book-card .desc { font-size: 13px; color: #6B4423; line-height: 1.5; }
        
        .reading-panel { display: flex; gap: 30px; }
        .reading-sidebar { width: 300px; background: #FFF8DC; border-radius: 12px; padding: 20px; box-shadow: 0 4px 12px rgba(139, 69, 19, 0.15); }
        .reading-sidebar h3 { color: #8B4513; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #DEB887; }
        .reading-sidebar ul { list-style: none; }
        .reading-sidebar li { padding: 10px; margin-bottom: 5px; background: #FAEBD7; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .reading-sidebar li:hover, .reading-sidebar li.active { background: #DEB887; color: #8B4513; }
        .reading-content { flex: 1; background: #FFF8DC; border-radius: 12px; padding: 30px; box-shadow: 0 4px 12px rgba(139, 69, 19, 0.15); }
        .reading-content .book-title { font-size: 28px; font-weight: bold; color: #8B4513; text-align: center; margin-bottom: 20px; }
        .reading-content .chapter-title { font-size: 20px; color: #A0522D; margin-bottom: 15px; padding-left: 10px; border-left: 4px solid #CD853F; }
        .reading-content .original-text { font-size: 18px; line-height: 2; color: #3E2723; font-family: 'STKaiti', 'KaiTi', serif; margin-bottom: 20px; }
        .reading-content .translation-text { font-size: 16px; line-height: 1.8; color: #5D4037; background: #FAEBD7; padding: 15px; border-radius: 8px; }
        
        .translation-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .trans-input, .trans-output { background: #FFF8DC; border-radius: 12px; padding: 25px; box-shadow: 0 4px 12px rgba(139, 69, 19, 0.15); }
        .trans-input h3, .trans-output h3 { color: #8B4513; margin-bottom: 15px; }
        .trans-input textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid #DEB887; border-radius: 8px; font-size: 16px; font-family: 'STKaiti', serif; resize: none; background: #FAEBD7; }
        .trans-output .result-box { min-height: 200px; padding: 15px; border: 2px solid #DEB887; border-radius: 8px; background: #FAEBD7; font-size: 16px; line-height: 1.8; }
        
        .action-btn { background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%); color: #FFD700; border: none; padding: 12px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-top: 15px; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139, 69, 19, 0.4); }
        
        .kids-panel { background: linear-gradient(135deg, #FFF0F5 0%, #F0E68C 100%); border-radius: 15px; padding: 30px; box-shadow: 0 8px 25px rgba(255, 182, 193, 0.3); }
        .kids-panel h3 { color: #9370DB; margin-bottom: 20px; font-size: 22px; }
        .kids-card { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .kid-card-item { background: #FFFFFF; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(139, 69, 19, 0.1); position: relative; overflow: hidden; }
        .kid-card-item .card-header { height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-radius: 10px 10px 0 0; }
        .kid-card-item .card-header.rainbow { background: linear-gradient(90deg, #FFB6C1, #FFE4E1, #E0FFE0, #E0E0FF); }
        .kid-card-item .card-header.ink { background: linear-gradient(90deg, #F5DEB3, #DEB887, #D2B48C); }
        .kid-card-item .card-header.cartoon { background: linear-gradient(90deg, #FFD700, #FFA500, #FF8C00); }
        .kid-card-item .card-title { font-size: 18px; font-weight: bold; color: #8B4513; text-align: center; }
        .kid-card-item .original-box { background: #FFF8DC; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .kid-card-item .original-box p { font-size: 18px; font-family: 'STKaiti', serif; color: #3E2723; text-align: center; }
        .kid-card-item .trans-box { background: #E0FFE0; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .kid-card-item .trans-box p { font-size: 14px; color: #2E7D32; }
        .kid-card-item .moral-box { background: #FFF0F5; padding: 12px; border-radius: 8px; }
        .kid-card-item .moral-box p { font-size: 13px; color: #880E4F; }
        
        .footer { text-align: center; padding: 30px; color: #8B4513; font-size: 14px; }
        .footer a { color: #A0522D; text-decoration: none; font-weight: bold; }
        
        .style-selector { margin-bottom: 20px; }
        .style-selector label { margin-right: 10px; color: #8B4513; }
        .style-selector select { padding: 8px 15px; border: 2px solid #DEB887; border-radius: 8px; background: #FFF8DC; color: #8B4513; font-size: 14px; }
        
        .star-icon { position: absolute; top: 10px; right: 10px; font-size: 20px; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .scroll-bar { width: 100%; height: 6px; background: #DEB887; border-radius: 3px; margin: 20px 0; }
        .scroll-progress { height: 100%; background: #8B4513; border-radius: 3px; width: 30%; transition: width 0.5s; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📜 古籍活化工具</h1>
        <p>让经典薪火相传 · 传承千年智慧</p>
    </div>
    
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="showTab('books')">📚 古籍列表</button>
        <button class="nav-tab" onclick="showTab('reading')">📖 阅读古籍</button>
        <button class="nav-tab" onclick="showTab('translation')">🔍 古文翻译</button>
        <button class="nav-tab" onclick="showTab('kids')">✨ 少年学堂</button>
    </div>
    
    <div id="books" class="tab-content active">
        <h2 style="color: #8B4513; margin-bottom: 20px; font-size: 24px;">📚 经典古籍库</h2>
        <p style="color: #A0522D; margin-bottom: 20px;">收录18部中华经典古籍，涵盖国学、修身、处世、治国、治学五大类别</p>
        <div class="card-grid" id="bookGrid"></div>
    </div>
    
    <div id="reading" class="tab-content">
        <h2 style="color: #8B4513; margin-bottom: 20px; font-size: 24px;">📖 沉浸式阅读</h2>
        <div class="reading-panel">
            <div class="reading-sidebar">
                <h3>📚 书籍目录</h3>
                <ul id="bookList"></ul>
            </div>
            <div class="reading-content">
                <h3 class="book-title" id="readBookTitle">请选择一本古籍开始阅读</h3>
                <div id="readContent"></div>
                <div class="scroll-bar"><div class="scroll-progress"></div></div>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="action-btn" onclick="prevChapter()">◀ 上一章</button>
                    <button class="action-btn" onclick="nextChapter()">下一章 ▶</button>
                    <button class="action-btn" onclick="toggleReadAloud()">🔊 朗读</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="translation" class="tab-content">
        <h2 style="color: #8B4513; margin-bottom: 20px; font-size: 24px;">🔍 智能古文翻译</h2>
        <div class="translation-panel">
            <div class="trans-input">
                <h3>📝 输入古文</h3>
                <textarea id="transInput" placeholder="请输入古文内容，例如：学而时习之，不亦说乎？"></textarea>
                <div class="style-selector">
                    <label>难度级别：</label>
                    <select id="gradeLevel">
                        <option value="easy">小学低年级 (1-2年级)</option>
                        <option value="medium" selected>小学中年级 (3-4年级)</option>
                        <option value="hard">小学高年级 (5-6年级)</option>
                        <option value="advanced">初中生</option>
                    </select>
                </div>
                <button class="action-btn" onclick="doTranslation()">🎯 开始翻译</button>
            </div>
            <div class="trans-output">
                <h3>📖 翻译结果</h3>
                <div class="result-box" id="transOutput">翻译结果将显示在这里...</div>
            </div>
        </div>
    </div>
    
    <div id="kids" class="tab-content">
        <h2 style="color: #8B4513; margin-bottom: 20px; font-size: 24px;">✨ 少年学堂 - 知识卡片</h2>
        <p style="color: #A0522D; margin-bottom: 20px;">专为小朋友设计的趣味学习卡片，五种风格随心切换</p>
        <div class="kids-panel">
            <div class="style-selector">
                <label>选择卡片风格：</label>
                <select id="cardStyle" onchange="changeCardStyle()">
                    <option value="rainbow" selected>🌈 彩虹糖果</option>
                    <option value="ink">🖌️ 水墨古风</option>
                    <option value="cartoon">🎈 卡通漫画</option>
                    <option value="starry">✨ 星空梦幻</option>
                    <option value="animal">🐼 可爱小动物</option>
                </select>
            </div>
            <div class="kids-card" id="kidsCards"></div>
        </div>
    </div>
    
    <div class="footer">
        <p>📜 古籍活化工具 | 用 TRAE AI 开发 | 传承中华优秀传统文化</p>
        <p style="margin-top: 10px;">💡 提示：点击导航按钮体验不同功能模块</p>
    </div>

    <script>
        const books = [
            { id: 1, title: "论语", author: "孔子及其弟子", dynasty: "春秋", category: "国学经典", desc: "儒家经典著作，记录孔子及其弟子言行" },
            { id: 2, title: "道德经", author: "老子", dynasty: "春秋", category: "国学经典", desc: "道家经典，论述宇宙本源与人生哲理" },
            { id: 3, title: "大学", author: "曾子", dynasty: "春秋", category: "国学经典", desc: "儒家四书之一，论述修身治国之道" },
            { id: 4, title: "中庸", author: "子思", dynasty: "战国", category: "国学经典", desc: "儒家四书之一，论述中庸之道" },
            { id: 5, title: "孟子", author: "孟子", dynasty: "战国", category: "国学经典", desc: "儒家经典，记录孟子思想主张" },
            { id: 6, title: "诗经", author: "佚名", dynasty: "西周至春秋", category: "国学经典", desc: "中国最早的诗歌总集" },
            { id: 7, title: "楚辞", author: "屈原等", dynasty: "战国", category: "国学经典", desc: "战国时期屈原等人创作的诗歌集" },
            { id: 8, title: "弟子规", author: "李毓秀", dynasty: "清朝", category: "修身", desc: "清代启蒙读物，论述为人子弟的礼仪规范" },
            { id: 9, title: "千字文", author: "周兴嗣", dynasty: "南朝", category: "修身", desc: "一千字组成的韵文，涵盖天文地理" },
            { id: 10, title: "增广贤文", author: "佚名", dynasty: "明朝", category: "处世", desc: "汇集历代格言谚语，论述为人处世之道" },
            { id: 11, title: "围炉夜话", author: "王永彬", dynasty: "清朝", category: "处世", desc: "以围炉夜话形式论述人生哲理" },
            { id: 12, title: "菜根谭", author: "洪应明", dynasty: "明朝", category: "修身", desc: "论述修身养性为人处世之学" },
            { id: 13, title: "孙子兵法", author: "孙武", dynasty: "春秋", category: "治国", desc: "兵家经典之作，论述战争与战略思想" },
            { id: 14, title: "鬼谷子", author: "鬼谷子", dynasty: "战国", category: "治国", desc: "纵横家经典，论述辩论与谋略之道" },
            { id: 15, title: "韩非子", author: "韩非", dynasty: "战国", category: "治国", desc: "法家集大成之作，论述法治与治国方略" },
            { id: 16, title: "劝学", author: "荀子", dynasty: "战国", category: "治学", desc: "论述学习的重要性和方法" },
            { id: 17, title: "颜氏家训", author: "颜之推", dynasty: "南北朝", category: "治学", desc: "论述治家治学为人之道" },
            { id: 18, title: "三字经", author: "王应麟", dynasty: "宋朝", category: "修身", desc: "蒙学经典，三字一句涵盖天文地理" }
        ];

        const bookContents = {
            1: [
                { title: "学而篇第一", content: "子曰：学而时习之，不亦说乎？有朋自远方来，不亦乐乎？人不知而不愠，不亦君子乎？", trans: "孔子说：学习了知识并按时复习，不也是很愉快的事吗？有志同道合的朋友从远方来，不也是很快乐吗？别人不了解自己也不生气，不也是君子吗？" },
                { title: "为政篇第二", content: "子曰：吾十有五而志于学，三十而立，四十而不惑，五十而知天命，六十而耳顺，七十而从心所欲，不逾矩。", trans: "孔子说：我十五岁立志学习，三十岁立足社会，四十岁不再疑惑，五十岁了解天命，六十岁听得进不同意见，七十岁随心所欲而不逾越规矩。" },
                { title: "八佾篇第三", content: "子曰：人而不仁，如礼何？人而不仁，如乐何？", trans: "孔子说：一个人没有仁爱之心，遵守礼仪又有什么用？一个人没有仁爱之心，奏乐又有什么用？" }
            ],
            2: [
                { title: "第一章", content: "道可道，非常道；名可名，非常名。无名，天地之始；有名，万物之母。", trans: "道可以言说，但不是永恒的道；名可以命名，但不是永恒的名。无名是天地的开端；有名是万物的根源。" },
                { title: "第二章", content: "天下皆知美之为美，斯恶已；皆知善之为善，斯不善已。", trans: "天下都知道什么是美，就有了丑；都知道什么是善，就有了不善。" },
                { title: "第八章", content: "上善若水。水善利万物而不争，处众人之所恶，故几于道。", trans: "最高的善像水一样。水善于滋润万物而不与万物相争，停留在众人都不喜欢的地方，所以最接近于道。" }
            ],
            3: [
                { title: "经一章", content: "大学之道，在明明德，在亲民，在止于至善。", trans: "大学的宗旨，在于弘扬光明正大的品德，在于使人弃旧图新，在于达到最完善的境界。" },
                { title: "经二章", content: "知止而后有定，定而后能静，静而后能安，安而后能虑，虑而后能得。", trans: "知道应达到的境界才能够志向坚定，志向坚定才能够镇静不躁，镇静不躁才能够心安理得，心安理得才能够思虑周详，思虑周详才能够有所收获。" },
                { title: "传七章", content: "所谓修身在正其心者：身有所忿懥，则不得其正；有所恐惧，则不得其正；有所好乐，则不得其正；有所忧患，则不得其正。", trans: "所谓修养自身在于端正内心：心里有怨恨，就不能端正；心里有恐惧，就不能端正；心里有贪图，就不能端正；心里有忧虑，就不能端正。" }
            ],
            4: [
                { title: "第一章", content: "天命之谓性，率性之谓道，修道之谓教。", trans: "上天赋予人的叫做本性，遵循本性行事叫做道，修养推广道叫做教化。" },
                { title: "第二章", content: "喜怒哀乐之未发，谓之中；发而皆中节，谓之和。中也者，天下之大本也；和也者，天下之达道也。", trans: "喜怒哀乐没有表现出来的时候，叫做中；表现出来以后符合节度，叫做和。中是天下的根本；和是天下通行的准则。" }
            ],
            5: [
                { title: "梁惠王上", content: "孟子见梁惠王。王曰：叟！不远千里而来，亦将有以利吾国乎？", trans: "孟子拜见梁惠王。惠王说：老先生！不远千里而来，一定是有什么对我的国家有利的建议吧？" },
                { title: "告子上", content: "鱼，我所欲也；熊掌，亦我所欲也。二者不可得兼，舍鱼而取熊掌者也。生，亦我所欲也；义，亦我所欲也。二者不可得兼，舍生而取义者也。", trans: "鱼是我想要的，熊掌也是我想要的。如果两者不能同时得到，我就舍弃鱼而选择熊掌。生命是我想要的，道义也是我想要的。如果两者不能同时得到，我就舍弃生命而选择道义。" }
            ],
            6: [
                { title: "关雎", content: "关关雎鸠，在河之洲。窈窕淑女，君子好逑。", trans: "雎鸠鸟在河中的小洲上相互鸣叫。美丽善良的姑娘，是君子的好配偶。" },
                { title: "蒹葭", content: "蒹葭苍苍，白露为霜。所谓伊人，在水一方。", trans: "芦苇苍苍，白露结成了霜。我所思念的人，就在河水那一边。" }
            ]
        };

        const wisdomPoints = [
            { content: "学而时习之，不亦说乎？", trans: "学习了知识要经常复习，这样才能记得牢！", moral: "小朋友要养成复习的好习惯哦！温故而知新，每天进步一点点！" },
            { content: "三人行，必有我师焉", trans: "三个人一起走路，其中一定有可以当我老师的人！", moral: "每个人都有优点，要虚心向别人学习！不要骄傲自满哦！" },
            { content: "上善若水，水善利万物而不争", trans: "最高的善就像水一样，滋润万物却不与万物相争！", moral: "我们要像水一样善良，帮助别人，不要计较得失！" },
            { content: "知之为知之，不知为不知", trans: "知道就是知道，不知道就是不知道！", moral: "学习要诚实，不懂就要问，这样才能学到真知识！" },
            { content: "人之初，性本善", trans: "每个人刚出生的时候，本性都是善良的！", moral: "我们要保持一颗善良的心，做个好孩子！帮助别人很快乐！" },
            { content: "玉不琢，不成器", trans: "玉石不经过雕琢，就不能成为精美的器物！", moral: "人不学习就不会成材，要努力学习，才能成为有用的人！" }
        ];

        const kidCardStyles = {
            rainbow: { header: 'rainbow', bg: '#FFF0F5', border: '#FFB6C1' },
            ink: { header: 'ink', bg: '#F5DEB3', border: '#DEB887' },
            cartoon: { header: 'cartoon', bg: '#FFFACD', border: '#FFD700' },
            starry: { header: 'starry', bg: '#E6E6FA', border: '#9370DB' },
            animal: { header: 'animal', bg: '#FAEBD7', border: '#CD853F' }
        };

        let currentBookId = 1;
        let currentChapter = 0;

        function showTab(tabId) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            if (tabId === 'books') renderBookGrid();
            if (tabId === 'reading') renderReadingList();
            if (tabId === 'kids') renderKidsCards();
        }

        function renderBookGrid() {
            const grid = document.getElementById('bookGrid');
            grid.innerHTML = books.map(book => `
                <div class="book-card" onclick="selectBook(${book.id})">
                    <div class="title">📖 ${book.title}</div>
                    <div class="author">作者：${book.author}</div>
                    <div class="dynasty">${book.dynasty}</div>
                    <div class="desc">${book.desc}</div>
                </div>
            `).join('');
        }

        function selectBook(id) {
            currentBookId = id;
            currentChapter = 0;
            showTab('reading');
            renderReadingList();
            renderChapter();
        }

        function renderReadingList() {
            const list = document.getElementById('bookList');
            list.innerHTML = books.slice(0, 6).map(b => `
                <li onclick="selectBook(${b.id})" ${b.id === currentBookId ? 'class="active"' : ''}>
                    📖 ${b.title}
                </li>
            `).join('');
        }

        function renderChapter() {
            const contents = bookContents[currentBookId] || bookContents[1];
            const chapter = contents[currentChapter];
            const book = books.find(b => b.id === currentBookId);
            
            document.getElementById('readBookTitle').textContent = book ? book.title : '论语';
            document.getElementById('readContent').innerHTML = `
                <div class="chapter-title">📑 ${chapter.title}</div>
                <div class="original-text">${chapter.content}</div>
                <div class="translation-text">📖 译文：${chapter.trans}</div>
            `;
            
            document.querySelectorAll('.reading-sidebar li').forEach((li, idx) => {
                li.classList.toggle('active', books[idx].id === currentBookId);
            });
        }

        function prevChapter() {
            const contents = bookContents[currentBookId] || bookContents[1];
            currentChapter = currentChapter > 0 ? currentChapter - 1 : contents.length - 1;
            renderChapter();
        }

        function nextChapter() {
            const contents = bookContents[currentBookId] || bookContents[1];
            currentChapter = currentChapter < contents.length - 1 ? currentChapter + 1 : 0;
            renderChapter();
        }

        function toggleReadAloud() {
            alert('🔊 朗读功能已启动！\n\n（实际项目中使用系统语音合成）');
        }

        function doTranslation() {
            const input = document.getElementById('transInput').value.trim();
            const grade = document.getElementById('gradeLevel').value;
            
            if (!input) {
                alert('请输入要翻译的古文内容！');
                return;
            }

            const translations = {
                '学而时习之': { easy: '学习了要经常复习，这样才开心！', medium: '学习了知识以后，还要按时去复习它', hard: '学习并且按时复习，不也是很快乐的吗？', advanced: '学习并且按时复习，不也是一件很愉快的事吗？' },
                '不亦说乎': { easy: '是不是很开心呀？', medium: '这不是一件很令人愉快的事情吗？', hard: '这不也是一件很快乐的事情吗？', advanced: '这不也是一件很愉快的事情吗？' },
                '有朋自远方来': { easy: '有好朋友从远方来看我们！', medium: '有志同道合的朋友从远方来看我们', hard: '有志同道合的朋友从远方而来', advanced: '有志同道合的朋友从远方来拜访' },
                '人不知而不愠': { easy: '别人不了解自己也不生气！', medium: '别人不了解自己的才能，自己也不生气', hard: '别人不了解我，我却不恼怒', advanced: '别人不了解自己，自己却不恼怒' },
                '上善若水': { easy: '最好的善就像水一样！', medium: '最高的善就像水一样，滋润万物', hard: '最高的善像水一样，利益万物而不争夺', advanced: '最高境界的善行就像水的品性一样' }
            };

            let result = `📖 原文：${input}\n\n🎯 翻译：\n`;
            
            let matched = false;
            for (const [key, trans] of Object.entries(translations)) {
                if (input.includes(key)) {
                    result += trans[grade] + '\n\n';
                    matched = true;
                }
            }
            
            if (!matched) {
                result += '智能翻译结果：这句话的意思是...\n\n';
            }
            
            result += '📝 字词解释：\n• 学：学习、读书 📚\n• 习：复习、练习 ✍️\n• 时：按时、经常 ⏰\n\n💡 记忆口诀：每天读三遍，自然就记住啦！';
            
            document.getElementById('transOutput').innerText = result;
        }

        function renderKidsCards() {
            const style = document.getElementById('cardStyle').value;
            const cardStyle = kidCardStyles[style];
            const icons = { rainbow: '🌈', ink: '🖌️', cartoon: '🎈', starry: '✨', animal: '🐼' };
            
            const container = document.getElementById('kidsCards');
            container.innerHTML = wisdomPoints.map((wp, idx) => `
                <div class="kid-card-item" style="border: 3px solid ${cardStyle.border};">
                    <span class="star-icon">${icons[style]}</span>
                    <div class="card-header ${cardStyle.header}">
                        <span style="font-size: 24px;">${['📖', '🎯', '💡', '🌟', '🌱', '💪'][idx]}</span>
                    </div>
                    <div class="card-title">少年古籍学堂</div>
                    <div class="original-box"><p>${wp.content}</p></div>
                    <div class="trans-box"><p>🎯 小朋友翻译：${wp.trans}</p></div>
                    <div class="moral-box"><p>💡 学到的道理：${wp.moral}</p></div>
                </div>
            `).join('');
        }

        function changeCardStyle() {
            renderKidsCards();
        }

        renderBookGrid();
    </script>
</body>
</html>
