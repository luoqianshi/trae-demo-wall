<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵感捕手 - AI 创意协作工作台</title>
    <style>
        :root {
            --primary: #ff0050;
            --primary-light: #ff4d7e;
            --secondary: #00d4ff;
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-light: #1e1e2e;
            --text: #f0f0f5;
            --text-muted: #8b8b9a;
            --border: #2a2a3a;
            --accent: #ff0050;
            --accent2: #00d4ff;
            --success: #00e676;
            --warning: #ffab00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation canvas {
            width: 100%;
            height: 100%;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        header {
            text-align: center;
            padding: 40px 0;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* 主工作区 */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 30px;
        }

        @media (max-width: 900px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        /* 面板样式 */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .icon-input { background: rgba(255, 0, 80, 0.15); }
        .icon-output { background: rgba(0, 212, 255, 0.15); }

        /* 输入区 */
        .input-area {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .inspiration-input {
            width: 100%;
            padding: 16px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .inspiration-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .inspiration-input::placeholder {
            color: var(--text-muted);
        }

        /* 标签输入 */
        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            background: rgba(255, 0, 80, 0.15);
            color: var(--primary-light);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: tagIn 0.3s ease;
        }

        @keyframes tagIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .tag .remove {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .tag .remove:hover {
            opacity: 1;
        }

        .tag-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            padding: 6px;
            min-width: 100px;
            outline: none;
        }

        /* 按钮 */
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 80, 0.3);
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        /* 创意卡片 */
        .idea-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .idea-card {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .idea-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .idea-card:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .idea-card:hover::before {
            opacity: 1;
        }

        .idea-card.selected {
            border-color: var(--primary);
            background: rgba(255, 0, 80, 0.05);
        }

        .idea-card.selected::before {
            opacity: 1;
        }

        .idea-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .idea-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .idea-tags {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .idea-tag {
            background: rgba(0, 212, 255, 0.1);
            color: var(--secondary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        /* 方案构建区 */
        .builder-area {
            margin-top: 20px;
        }

        .builder-canvas {
            background: var(--bg);
            border: 2px dashed var(--border);
            border-radius: 12px;
            min-height: 300px;
            padding: 20px;
            position: relative;
        }

        .builder-canvas.has-content {
            border-style: solid;
            border-color: var(--border);
        }

        .builder-item {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .builder-item-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .builder-item-content {
            flex: 1;
        }

        .builder-item-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .builder-item-desc {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 预览区 */
        .preview-panel {
            margin-top: 24px;
        }

        .preview-content {
            background: var(--bg);
            border-radius: 12px;
            padding: 24px;
            min-height: 200px;
        }

        .preview-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .preview-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .preview-meta {
            color: var(--text-muted);
            font-size: 14px;
        }

        .preview-section {
            margin-bottom: 20px;
        }

        .preview-section h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--secondary);
        }

        .preview-section p {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-muted);
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 操作栏 */
        .action-bar {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .logo { font-size: 36px; }
            .workspace { grid-template-columns: 1fr; }
            .action-bar { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 3s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-20px) scale(1.5); opacity: 1; }
        }

        /* 灵感火花动画 */
        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes sparkBurst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <canvas id="bgCanvas"></canvas>
    </div>

    <div class="container">
        <header>
            <h1 class="logo">灵感捕手</h1>
            <p class="subtitle">AI 驱动的创意协作工作台 — 让灵感瞬间成型</p>
        </header>

        <div class="workspace">
            <!-- 左侧：输入区 -->
            <div class="left-panel">
                <div class="panel">
                    <div class="panel-title">
                        <span class="icon icon-input">💡</span>
                        灵感输入
                    </div>

                    <div class="input-area">
                        <label class="input-label">描述你的创意碎片（关键词、想法、场景等）</label>
                        <textarea 
                            class="inspiration-input" 
                            id="inspirationInput"
                            placeholder="例如：AI + 短视频 + 教育，或者：让老年人也能轻松使用的社交工具..."></textarea>
                    </div>

                    <div class="input-area">
                        <label class="input-label">添加标签（按回车添加）</label>
                        <div class="tag-input-container" id="tagContainer">
                            <input 
                                type="text" 
                                class="tag-input" 
                                id="tagInput"
                                placeholder="输入标签...">
                        </div>
                    </div>

                    <button class="btn btn-primary" id="generateBtn" onclick="generateIdeas()">
                        <span>✨</span> 生成创意方向
                    </button>
                </div>

                <div class="panel" style="margin-top: 20px;">
                    <div class="panel-title">
                        <span class="icon icon-output">🎯</span>
                        创意方案
                    </div>
                    <div class="idea-cards" id="ideaCards">
                        <div class="empty-state">
                            <div class="empty-state-icon">🎨</div>
                            <p>输入灵感后，AI 将为你生成多个创意方向</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：构建区 -->
            <div class="right-panel">
                <div class="panel">
                    <div class="panel-title">
                        <span class="icon icon-output">🔨</span>
                        方案构建
                    </div>

                    <div class="builder-area">
                        <div class="builder-canvas" id="builderCanvas">
                            <div class="empty-state" id="builderEmpty">
                                <div class="empty-state-icon">📋</div>
                                <p>点击左侧创意卡片，将灵感加入你的方案</p>
                            </div>
                            <div id="builderContent" style="display: none;"></div>
                        </div>
                    </div>

                    <div class="action-bar">
                        <button class="btn btn-secondary" onclick="clearBuilder()">
                            <span>🗑️</span> 清空
                        </button>
                        <button class="btn btn-primary" onclick="previewPlan()">
                            <span>👁️</span> 预览方案
                        </button>
                    </div>
                </div>

                <div class="panel preview-panel" id="previewPanel" style="display: none;">
                    <div class="panel-title">
                        <span class="icon icon-output">📄</span>
                        方案预览
                    </div>
                    <div class="preview-content" id="previewContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 背景动画
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 0, 80, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) {
            particles.push(new Particle());
        }

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 连线
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(255, 0, 80, ${0.1 * (1 - dist / 150)})`;
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animateBg);
        }
        animateBg();

        // 标签管理
        const tagInput = document.getElementById('tagInput');
        const tagContainer = document.getElementById('tagContainer');
        let tags = [];

        tagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && tagInput.value.trim()) {
                e.preventDefault();
                addTag(tagInput.value.trim());
                tagInput.value = '';
            }
        });

        function addTag(text) {
            if (tags.includes(text)) return;
            tags.push(text);
            renderTags();
        }

        function removeTag(text) {
            tags = tags.filter(t => t !== text);
            renderTags();
        }

        function renderTags() {
            const tagElements = tags.map(tag => `
                <span class="tag">
                    ${tag}
                    <span class="remove" onclick="removeTag('${tag}')">×</span>
                </span>
            `).join('');
            tagContainer.innerHTML = tagElements + '<input type="text" class="tag-input" id="tagInput" placeholder="输入标签...">';
            document.getElementById('tagInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.target.value.trim()) {
                    e.preventDefault();
                    addTag(e.target.value.trim());
                    e.target.value = '';
                }
            });
            document.getElementById('tagInput').focus();
        }

        // 创意数据库
        const ideaDatabase = {
            'AI': [
                { title: 'AI 智能剪辑助手', desc: '基于多模态大模型的视频自动剪辑工具，一键生成精彩片段', tags: ['AI', '视频', '效率'] },
                { title: '个性化学习路径规划', desc: 'AI 分析用户知识盲区，动态生成最优学习方案', tags: ['AI', '教育', '个性化'] },
                { title: '实时语音翻译眼镜', desc: 'AR 眼镜结合 AI 翻译，打破语言障碍', tags: ['AI', '硬件', '翻译'] }
            ],
            '短视频': [
                { title: '沉浸式互动短剧', desc: '观众选择剧情走向的交互式短剧平台', tags: ['短视频', '互动', '娱乐'] },
                { title: 'AI 虚拟主播工厂', desc: '一键生成个性化虚拟主播，降低内容创作门槛', tags: ['短视频', 'AI', '虚拟人'] },
                { title: '知识胶囊', desc: '将长视频精华提取为 60 秒知识胶囊', tags: ['短视频', '知识', '效率'] }
            ],
            '教育': [
                { title: '游戏化编程学习', desc: '通过闯关游戏学习编程，适合全年龄段', tags: ['教育', '游戏', '编程'] },
                { title: 'AI 作文辅导老师', desc: '实时批改作文并提供个性化提升建议', tags: ['教育', 'AI', '写作'] },
                { title: '虚拟实验室', desc: 'VR/AR 沉浸式科学实验，安全且低成本', tags: ['教育', 'VR', '科学'] }
            ],
            '社交': [
                { title: '兴趣图谱匹配', desc: '基于深层兴趣图谱的精准社交匹配', tags: ['社交', 'AI', '匹配'] },
                { title: '跨代际沟通桥梁', desc: '帮助年轻人与长辈建立共同话题的社交平台', tags: ['社交', '家庭', '沟通'] },
                { title: '技能交换社区', desc: '用技能代替金钱的交易平台', tags: ['社交', '技能', '共享'] }
            ],
            '健康': [
                { title: 'AI 健康管家', desc: '全天候监测健康数据，提前预警潜在风险', tags: ['健康', 'AI', '监测'] },
                { title: '心理健康陪伴机器人', desc: '24/7 在线的心理支持 AI 伴侣', tags: ['健康', '心理', 'AI'] },
                { title: '智能饮食规划', desc: '根据个人体质和目标定制每日食谱', tags: ['健康', '饮食', '个性化'] }
            ],
            '默认': [
                { title: '智能内容创作平台', desc: '一站式 AI 辅助内容创作工具，覆盖图文音视频', tags: ['AI', '创作', '平台'] },
                { title: '跨平台数据同步助手', desc: '自动整合多平台数据，生成个人数据看板', tags: ['工具', '数据', '效率'] },
                { title: '社区驱动的知识库', desc: '用户共建的结构化知识库，AI 辅助整理', tags: ['社区', '知识', '协作'] },
                { title: '沉浸式虚拟展厅', desc: '3D 虚拟空间展示创意作品，支持实时互动', tags: ['VR', '展示', '创意'] },
                { title: '智能日程协调器', desc: '自动协调多人日程，找到最优会议时间', tags: ['工具', '日程', '协作'] },
                { title: 'AI 辅助设计工具', desc: '输入文字描述即可生成设计稿', tags: ['AI', '设计', '工具'] }
            ]
        };

        let currentIdeas = [];
        let selectedIdeas = [];

        function generateIdeas() {
            const input = document.getElementById('inspirationInput').value.trim();
            const ideaCards = document.getElementById('ideaCards');
            
            if (!input && tags.length === 0) {
                alert('请输入灵感描述或添加标签');
                return;
            }

            // 显示加载
            ideaCards.innerHTML = `
                <div class="loading active">
                    <div class="loading-spinner"></div>
                    <p>AI 正在分析你的灵感...</p>
                </div>
            `;

            // 模拟 AI 生成延迟
            setTimeout(() => {
                const allIdeas = [];
                const inputLower = input.toLowerCase();
                
                // 根据输入匹配创意
                Object.keys(ideaDatabase).forEach(key => {
                    if (key !== '默认' && (inputLower.includes(key.toLowerCase()) || tags.some(t => t.toLowerCase() === key.toLowerCase()))) {
                        allIdeas.push(...ideaDatabase[key]);
                    }
                });

                // 如果没有匹配，使用默认
                if (allIdeas.length === 0) {
                    allIdeas.push(...ideaDatabase['默认']);
                }

                // 去重并随机排序
                currentIdeas = [...new Set(allIdeas.map(JSON.stringify))].map(JSON.parse);
                currentIdeas.sort(() => Math.random() - 0.5);

                renderIdeaCards();
            }, 1500);
        }

        function renderIdeaCards() {
            const ideaCards = document.getElementById('ideaCards');
            
            if (currentIdeas.length === 0) {
                ideaCards.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎨</div>
                        <p>输入灵感后，AI 将为你生成多个创意方向</p>
                    </div>
                `;
                return;
            }

            ideaCards.innerHTML = currentIdeas.map((idea, index) => `
                <div class="idea-card ${selectedIdeas.includes(index) ? 'selected' : ''}" onclick="toggleIdea(${index})" data-index="${index}">
                    <div class="idea-title">${idea.title}</div>
                    <div class="idea-desc">${idea.desc}</div>
                    <div class="idea-tags">
                        ${idea.tags.map(tag => `<span class="idea-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleIdea(index) {
            const idx = selectedIdeas.indexOf(index);
            if (idx > -1) {
                selectedIdeas.splice(idx, 1);
            } else {
                selectedIdeas.push(index);
            }
            renderIdeaCards();
            updateBuilder();
        }

        function updateBuilder() {
            const builderCanvas = document.getElementById('builderCanvas');
            const builderEmpty = document.getElementById('builderEmpty');
            const builderContent = document.getElementById('builderContent');

            if (selectedIdeas.length === 0) {
                builderCanvas.classList.remove('has-content');
                builderEmpty.style.display = 'block';
                builderContent.style.display = 'none';
                return;
            }

            builderCanvas.classList.add('has-content');
            builderEmpty.style.display = 'none';
            builderContent.style.display = 'block';

            builderContent.innerHTML = selectedIdeas.map((ideaIndex, i) => {
                const idea = currentIdeas[ideaIndex];
                return `
                    <div class="builder-item">
                        <div class="builder-item-number">${i + 1}</div>
                        <div class="builder-item-content">
                            <div class="builder-item-title">${idea.title}</div>
                            <div class="builder-item-desc">${idea.desc}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function clearBuilder() {
            selectedIdeas = [];
            renderIdeaCards();
            updateBuilder();
            document.getElementById('previewPanel').style.display = 'none';
        }

        function previewPlan() {
            if (selectedIdeas.length === 0) {
                alert('请先选择至少一个创意方向');
                return;
            }

            const previewPanel = document.getElementById('previewPanel');
            const previewContent = document.getElementById('previewContent');
            
            const selectedIdeaObjects = selectedIdeas.map(i => currentIdeas[i]);
            const mainIdea = selectedIdeaObjects[0];
            
            previewContent.innerHTML = `
                <div class="preview-header">
                    <div class="preview-title">${mainIdea.title}</div>
                    <div class="preview-meta">创意方案预览 · 灵感捕手生成</div>
                </div>
                
                <div class="preview-section">
                    <h4>🎯 核心创意</h4>
                    <p>${mainIdea.desc}</p>
                </div>

                <div class="preview-section">
                    <h4>📋 方案模块</h4>
                    <p>${selectedIdeaObjects.map((idea, i) => `${i + 1}. ${idea.title}：${idea.desc}`).join('<br>')}</p>
                </div>

                <div class="preview-section">
                    <h4>🏷️ 关键词</h4>
                    <p>${[...new Set(selectedIdeaObjects.flatMap(i => i.tags))].join('、')}</p>
                </div>

                <div class="preview-section">
                    <h4>💡 创新点</h4>
                    <p>• 结合 AI 技术实现智能化处理<br>
                    • 用户友好的交互设计降低使用门槛<br>
                    • 多场景适配，满足多样化需求<br>
                    • 数据驱动，持续优化用户体验</p>
                </div>

                <div class="preview-section">
                    <h4>🚀 落地路径</h4>
                    <p>第一阶段：MVP 验证核心功能<br>
                    第二阶段：收集用户反馈迭代优化<br>
                    第三阶段：扩展功能矩阵，构建生态</p>
                </div>
            `;

            previewPanel.style.display = 'block';
            previewPanel.scrollIntoView({ behavior: 'smooth' });
        }

        // 添加示例数据
        document.getElementById('inspirationInput').value = 'AI + 短视频 + 教育';
        addTag('AI');
        addTag('短视频');
        addTag('教育');
    </script>
</body>
</html>
