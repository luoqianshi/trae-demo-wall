<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>网络流行语翻译器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;

      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px 10px;
      padding-bottom: 50px;
    }

    .card {
      background-color: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .card-label-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-label {
      font-size: 13px;
      font-weight: 600;
      color: #8E8E93;
      letter-spacing: 0.25px;
    }

    .source-tag {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .source-tag-normal {
      background-color: rgba(0, 122, 255, 0.1);
      color: #007AFF;
    }

    .source-tag-fuzzy {
      background-color: rgba(255, 149, 0, 0.1);
      color: #FF9500;
    }

    .source-tag-none {
      background-color: rgba(142, 142, 147, 0.15);
      color: #8E8E93;
    }

    .input-card {
      flex: 1;
      margin-bottom: 10px;
    }

    .input-area {
      flex: 1;
      width: 100%;
      font-size: 18px;
      color: #1C1C1E;
      line-height: 1.6;
      border: none;
      outline: none;
      resize: none;
      min-height: 100px;
      background: transparent;
    }

    .input-area::placeholder {
      color: #C7C7CC;
      font-size: 18px;
    }

    .translate-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .translate-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 32px;
      background-color: #007AFF;
      border-radius: 24px;
      cursor: pointer;
      transition: opacity 0.2s ease;
      border: none;
    }

    .translate-button:active {
      opacity: 0.7;
    }

    .translate-icon {
      font-size: 16px;
      color: #FFFFFF;
    }

    .translate-text {
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
    }

    .output-card {
      flex: 1;
    }

    .speak-button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: #F5F5F7;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .speak-button:active {
      opacity: 0.7;
    }

    .speak-text {
      font-size: 14px;
    }

    .output-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      overflow-y: auto;
    }

    .output-unmatched {
      opacity: 0.6;
    }

    .result {
      font-size: 18px;
      color: #1C1C1E;
      line-height: 1.6;
      word-break: break-word;
    }

    .explanation {
      font-size: 13px;
      color: #8E8E93;
      line-height: 1.5;
      word-break: break-word;
      padding-top: 10px;
      border-top: 1px solid #E5E5EA;
    }

    .empty-text {
      font-size: 18px;
      color: #C7C7CC;
      line-height: 1.6;
    }

    .feedback-btn {
      align-self: flex-start;
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid #007AFF;
      margin-top: 4px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .feedback-btn:active {
      opacity: 0.7;
    }

    .feedback-btn-text {
      font-size: 12px;
      color: #007AFF;
      font-weight: 500;
    }

    .feedback-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
      padding: 12px;
      background-color: #F5F5F7;
      border-radius: 10px;
    }

    .feedback-input {
      width: 100%;
      font-size: 14px;
      color: #1C1C1E;
      line-height: 1.5;
      min-height: 40px;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
    }

    .feedback-input::placeholder {
      color: #C7C7CC;
    }

    .feedback-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .feedback-cancel, .feedback-submit {
      padding: 6px 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s ease;
      border: none;
    }

    .feedback-cancel:active, .feedback-submit:active {
      opacity: 0.7;
    }

    .feedback-cancel {
      background-color: transparent;
    }

    .feedback-cancel-text {
      font-size: 13px;
      color: #8E8E93;
    }

    .feedback-submit {
      background-color: #007AFF;
    }

    .feedback-submit-text {
      font-size: 13px;
      color: #FFFFFF;
      font-weight: 500;
    }

    @media (min-width: 768px) {
      body {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }

      .input-area, .input-area::placeholder, .result, .empty-text {
        font-size: 20px;
      }

      .card-label {
        font-size: 14px;
      }

      .source-tag {
        font-size: 12px;
      }

      .translate-text {
        font-size: 18px;
      }

      .translate-button {
        padding: 12px 40px;
      }
    }
  </style>
</head>

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]) + 1;
        }
      }
      return dp[m][n];
    }

      Object.values(industryDictionary).forEach(arr => all.push(...arr));
      all.push(...workplaceDictionary);
      Object.values(hotwordsDictionary).forEach(arr => all.push(...arr));
      Object.values(acronymsDictionary).forEach(arr => all.push(...arr));
      Object.values(chimeDictionary).forEach(arr => all.push(...arr));
      Object.values(nbnhhshDictionary).forEach(arr => all.push(...arr));
      return all;
    }

    function exactMatch(text, dictionary) {
      const lowerText = text.toLowerCase();
      const words = text.split(/[\s，。！？、；：]/).filter(w => w.length > 0);

      for (const word of words) {
        const lowerWord = word.toLowerCase();
        const found = dictionary.find(item => item.word.toLowerCase() === lowerWord);
        if (found) {
          return { matched: true, meaning: found.meaning, explanation: found.explanation };
        }
      }

      for (const item of dictionary) {
        if (lowerText.includes(item.word.toLowerCase()) || item.word.toLowerCase().includes(lowerText)) {
          return { matched: true, meaning: item.meaning, explanation: item.explanation };
        }
      }

      return null;
    }

    function fuzzyMatch(text, dictionary) {
      const lowerText = text.toLowerCase();
      let bestScore = 0;
      let bestMatch = null;

      for (const item of dictionary) {
        const lowerWord = item.word.toLowerCase();
        const maxLen = Math.max(lowerText.length, lowerWord.length);
        if (maxLen === 0) continue;
        const distance = levenshtein(lowerText, lowerWord);
        const similarity = 1 - distance / maxLen;

        if (similarity > bestScore && similarity >= 0.7) {
          bestScore = similarity;
          bestMatch = item;
        }
      }

      if (bestMatch) {
        return {
          matched: true,
          meaning: bestMatch.meaning,
          explanation: `猜你想翻「${bestMatch.word}」：${bestMatch.explanation || ''}`
        };
      }

      return null;
    }

    function translateText(text) {
      if (!text.trim()) {
        return {
          success: false,
          result: '',
          source: 'none',
          matched: false
        };
      }

      const allDictionaries = getAllDictionaries();

      const exact = exactMatch(text, allDictionaries);
      if (exact) {
        return {
          success: true,
          result: exact.meaning,
          explanation: exact.explanation || '',
          source: 'dictionary',
          matched: true
        };
      }

      const fuzzy = fuzzyMatch(text, allDictionaries);
      if (fuzzy) {
        return {
          success: true,
          result: fuzzy.meaning,
          explanation: fuzzy.explanation || '',
          source: 'fuzzy',
          matched: true
        };
      }

      return {
        success: true,
        result: text,
        explanation: '暂未收录该词汇，你可以提交反馈帮助我们完善词库',
        source: 'none',
        matched: false
      };
    }

    let currentResult = '';

    function handleTranslate() {
      const inputText = document.getElementById('inputText').value;
      if (!inputText.trim()) return;

      const translationResult = translateText(inputText);
      currentResult = translationResult.result;

      const outputContent = document.getElementById('outputContent');
      const sourceTag = document.getElementById('sourceTag');
      const speakButton = document.getElementById('speakButton');

      if (translationResult.success) {
        let html = `<span class="result">${escapeHtml(translationResult.result)}</span>`;
        
        if (translationResult.explanation) {
          html += `<span class="explanation">${escapeHtml(translationResult.explanation)}</span>`;
        }

        if (!translationResult.matched) {
          html += `
            <div class="feedback-btn" onclick="showFeedback()">
              <span class="feedback-btn-text">提交反馈</span>
            </div>
          `;
        }

        outputContent.innerHTML = html;
        outputContent.className = `output-content ${!translationResult.matched ? 'output-unmatched' : ''}`;

        sourceTag.textContent = sourceLabels[translationResult.source] || '';
        sourceTag.style.display = 'inline-block';
        sourceTag.className = `source-tag ${
          translationResult.source === 'dictionary' ? 'source-tag-normal' :
          translationResult.source === 'fuzzy' ? 'source-tag-fuzzy' : 'source-tag-none'
        }`;

        speakButton.style.display = translationResult.result ? 'flex' : 'none';
      }
    }

    function showFeedback() {
      const outputContent = document.getElementById('outputContent');
      const inputText = document.getElementById('inputText').value;
      
      outputContent.innerHTML = `
        <span class="result">${escapeHtml(inputText)}</span>

            </button>
            <button class="feedback-submit" onclick="submitFeedback()">
              <span class="feedback-submit-text">提交</span>
            </button>
          </div>
        </div>
      `;
    }

    function hideFeedback() {
      handleTranslate();

    function submitFeedback() {
      const feedbackInput = document.getElementById('feedbackInput');
      if (feedbackInput && feedbackInput.value.trim()) {

    function handleSpeak() {

        const utterance = new SpeechSynthesisUtterance(currentResult);

        speechSynthesis.speak(utterance);

    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleTranslate();
      }
