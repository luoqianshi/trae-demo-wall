  }
  @keyframes tapUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
  }
  .sin-bar {

  .l-low { background: rgba(46,204,113,0.15); color: var(--green); }
  .l-mid { background: rgba(240,160,48,0.15); color: var(--gold); }
  .l-high { background: rgba(233,69,96,0.15); color: var(--red); }

  .input-area {
    background: var(--card); border-radius: 14px; padding: 1rem;
    margin-top: 0.5rem; border: 1px solid var(--rule);
  }
  .input-area textarea {

    border-radius: 10px; padding: 0.8rem; color: var(--ink);
    font-size: 0.85rem; font-family: inherit; resize: none; min-height: 60px;
  }
  .input-area textarea:focus { outline: none; border-color: var(--gold); }
  .btn-row { display: flex; gap: 0.6rem; margin-top: 0.6rem; }
  .btn {
    flex: 1; padding: 0.8rem; border: none; border-radius: 10px;
    font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn-confess {
    background: linear-gradient(135deg, var(--gold), var(--red));
    color: #fff; box-shadow: 0 4px 16px rgba(240,160,48,0.2);
  }
  .btn-confess:hover { transform: translateY(-1px); }
  .btn-voice {
    background: transparent; color: var(--green); border: 2px solid var(--green);
  }
  .btn-random {
    width: 100%; padding: 0.55rem 0.9rem;
    background: rgba(240,160,48,0.06); border: 1px dashed var(--gold);
    border-radius: 8px; color: var(--gold); font-size: 0.76rem;
    cursor: pointer; transition: all 0.2s; font-family: inherit; text-align: left;
  }
  .btn-random:hover {
    background: rgba(240,160,48,0.14); border-style: solid;
  }

  .voice-select {
    display: flex; gap: 0.5rem; margin-bottom: 0.8rem; flex-wrap: wrap;
  }
  .voice-chip {
    padding: 0.4rem 0.8rem; border-radius: 16px; font-size: 0.72rem;
    border: 1px solid var(--rule); cursor: pointer; transition: all 0.2s;
    background: rgba(0,0,0,0.2); color: var(--muted);
  }
  .voice-chip.active { border-color: var(--green); color: var(--green); background: rgba(46,204,113,0.08); }

  .history { margin-top: 1rem; }
  .history-item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.5rem 0.8rem; font-size: 0.78rem; color: var(--muted);
    border-bottom: 1px solid var(--rule);
  }
  .history-item .hi-karma { font-weight: 700; min-width: 40px; }
  .k-plus { color: var(--green); } .k-minus { color: var(--red); }

  .leaderboard {
    background: var(--card); border-radius: 14px; padding: 1rem;
    border: 1px solid var(--rule); margin-top: 0.8rem;
  }
  .leaderboard h4 { font-size: 0.8rem; color: var(--gold); margin-bottom: 0.6rem; text-align: center; }
  .lb-item {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0;
    font-size: 0.78rem; border-bottom: 1px solid var(--rule);
  }
  .lb-rank { font-weight: 900; color: var(--gold); min-width: 24px; }
  .lb-name { flex: 1; color: var(--ink); }
  .lb-score { color: var(--green); font-weight: 700; }
  .lb-you { background: rgba(240,160,48,0.08); border-radius: 8px; padding: 0.4rem 0.6rem; }

<body>
<div class="app">

  <div class="header">
    <h1>&#x1FA63; 电子木鱼 Pro Max</h1>
    <p class="sub">AI 功德量化与心灵净化系统</p>
  </div>

  <!-- 功德仪表盘 -->
  <div class="merit-banner">
    <div class="merit-num" id="meritNum">437</div>
    <div class="merit-label">当前功德值</div>
    <div class="merit-level" id="meritLevel">等级：罗汉初成</div>
  </div>

  <!-- 净化成就 -->
  <div class="purify-badge" id="purifyBadge" style="opacity:0.5">
    &#x2728; 暂无净化解锁 · 继续积攒功德吧
  </div>

  <!-- 近期业力 -->
  <div class="sin-bar">
    <span class="sin-icon">&#x1F4BB;</span>
    <span class="sin-text">摸鱼程度</span>
    <span class="sin-level l-mid">中等</span>
  </div>
  <div class="sin-bar">
    <span class="sin-icon">&#x1F37A;</span>
    <span class="sin-text">奶茶/宵夜业力</span>
    <span class="sin-level l-high">严重</span>
  </div>
  <div class="sin-bar">
    <span class="sin-icon">&#x1F4B0;</span>
    <span class="sin-text">冲动消费值</span>
    <span class="sin-level l-low">轻微</span>
  </div>

  <!-- 木鱼敲击区 -->
  <div class="woodfish-area" id="woodfishArea">
    <div class="woodfish" id="woodfishEl" onclick="tapWoodfish()">&#x1FA63;</div>
    <p style="font-size:0.72rem;color:var(--muted);margin-top:0.5rem;">👆 直接敲木鱼攒功德</p>
  </div>

  <!-- 忏悔输入 -->
  <div class="input-area">
    <div class="voice-select">
      <span class="voice-chip active">&#x1F9D8; 慈悲方丈</span>
      <span class="voice-chip" onclick="this.parentElement.querySelectorAll('.voice-chip').forEach(c=>c.classList.remove('active'));this.classList.add('active')">&#x1F608; 毒舌判官</span>
      <span class="voice-chip" onclick="this.parentElement.querySelectorAll('.voice-chip').forEach(c=>c.classList.remove('active'));this.classList.add('active')">&#x1F9D9; 禅意AI</span>
      <span class="voice-chip" onclick="this.parentElement.querySelectorAll('.voice-chip').forEach(c=>c.classList.remove('active'));this.classList.add('active')">&#x1F436; 旺财</span>
    </div>
    <textarea id="confessionInput" placeholder="点击下方按钮自动填入，或自己写～"></textarea>
    <div style="display:flex;flex-direction:column;gap:0.35rem;margin:0.5rem 0;">
      <button class="btn-random" onclick="fillConfession()">&#x1F3B2; 随机一条忏悔（点我不用打字）</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-confess" onclick="confess()">&#x1F64F; 忏悔 + 积功德</button>
      <button class="btn btn-voice" onclick="alert('🎤 Demo: 语音识别功能将在正式版中开放')">&#x1F399; 语音</button>
    </div>
  </div>

  <!-- 功德排行榜 -->
  <div class="leaderboard">
    <h4>&#x1F3C6; 功德排行榜</h4>
    <div class="lb-item"><span class="lb-rank">1</span><span class="lb-name">功德无量大师兄</span><span class="lb-score">8,421</span></div>
    <div class="lb-item"><span class="lb-rank">2</span><span class="lb-name">敲到手软的阿强</span><span class="lb-score">6,733</span></div>
    <div class="lb-item lb-you" id="lbYou"><span class="lb-rank">--</span><span class="lb-name">你</span><span class="lb-score" id="lbScore">437</span></div>
    <div class="lb-item"><span class="lb-rank">3</span><span class="lb-name">佛系打工人小美</span><span class="lb-score">5,210</span></div>
    <div class="lb-item"><span class="lb-rank">4</span><span class="lb-name">摸鱼毕业生存款机</span><span class="lb-score">3,892</span></div>
  </div>

  <div class="history" id="historyList">
    <p style="font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem;">📋 今日业力记录</p>
    <div class="history-item"><span class="hi-karma k-plus">+15</span><span>早上给流浪猫喂食</span></div>
    <div class="history-item"><span class="hi-karma k-minus">-8</span><span>摸了2小时鱼</span></div>
    <div class="history-item"><span class="hi-karma k-plus">+42</span><span>帮同事 debug 解决了大问题</span></div>
  </div>

</div>

<script>
  var merit = 437;
  var tapCount = 0;
  var purifyUnlocked = {};
  var rank = 6;

  function updateMeritDisplay() {
    var el = document.getElementById('meritNum');
    el.textContent = merit;
    el.classList.add('bump');
    setTimeout(function() { el.classList.remove('bump'); }, 400);

    var level = '等级：凡人起步';
    if (merit >= 10000) level = '等级：功德圆满 &#x1F451;';
    else if (merit >= 5000) level = '等级：菩萨垂青';
    else if (merit >= 2000) level = '等级：金刚不坏';
    else if (merit >= 1000) level = '等级：罗汉初成';
    else if (merit >= 500) level = '等级：沙弥进修';
    document.getElementById('meritLevel').innerHTML = level;
    document.getElementById('lbScore').textContent = merit;

    if (merit >= 2500) { rank = 4; }
    else if (merit >= 1500) { rank = 5; }
    document.getElementById('lbYou').querySelector('.lb-rank').textContent = rank;

    updatePurifyBadge();
  }

  function updatePurifyBadge() {
    var badges = [];
    if (merit >= 500 && !purifyUnlocked['milk']) { purifyUnlocked['milk'] = true; badges.push('奶茶业力已消除 &#x2714;'); }
    if (merit >= 1000 && !purifyUnlocked['sleep']) { purifyUnlocked['sleep'] = true; badges.push('熬夜能量清零 &#x2714;'); }
    if (merit >= 2000 && !purifyUnlocked['boss']) { purifyUnlocked['boss'] = true; badges.push('甲方怨气驱散 &#x2714;'); }
    if (merit >= 3000 && !purifyUnlocked['money']) { purifyUnlocked['money'] = true; badges.push('冲动消费封印 &#x2714;'); }

    var badge = document.getElementById('purifyBadge');
    if (badges.length > 0) {
      badge.innerHTML = '&#x2728; ' + badges.join(' &middot; ');
      badge.style.opacity = '1';
    } else {
      badge.innerHTML = '&#x2728; 暂无净化解锁 · 继续积攒功德吧';
      badge.style.opacity = '0.5';
    }
  }

  function addHistory(karma, text) {
    var div = document.createElement('div');
    div.className = 'history-item';
    var sign = karma >= 0 ? '+' : '';
    var cls = karma >= 0 ? 'k-plus' : 'k-minus';
    div.innerHTML = '<span class="hi-karma ' + cls + '">' + sign + karma + '</span><span>' + text + '</span>';
    var list = document.getElementById('historyList');
    list.insertBefore(div, list.children[1]);
    if (list.children.length > 8) list.removeChild(list.lastChild);
  }

  function tapWoodfish() {
    merit += 3;
    tapCount++;
    updateMeritDisplay();

    var el = document.getElementById('woodfishEl');
    el.style.transform = 'scale(0.85)';
    setTimeout(function() { el.style.transform = 'scale(1)'; }, 100);

    var fx = document.createElement('div');
    fx.className = 'tap-effect';
    fx.textContent = '功德+3';
    fx.style.left = Math.random() * 60 + 20 + '%';
    fx.style.top = Math.random() * 40 + 20 + '%';
    document.getElementById('woodfishArea').appendChild(fx);
    setTimeout(function() { fx.remove(); }, 1200);

    addHistory(3, '敲了一下木鱼');
  }

  function fillConfession() {
    var confessions = [
      '又摸了3小时鱼，老板走过来的时候我切换屏幕的速度堪比电竞选手',
      '半夜12点吃了一整袋薯片+两包辣条+一瓶可乐，现在躺在床上忏悔',
      '今天对甲方说了违心的话：这个方案真的很好，我们内部一致认可。其实我们想的是：这什么玩意',
      '熬夜刷抖音到凌晨三点，每个视频都告诉自己"最后一个"，刷了大概127个"最后一个"',
      '答应女朋友今天早睡结果又通宵打游戏，明天起来又要说手机自动更新了',
      '看到同事发的新方案明明很一般但我疯狂点赞：你真的太棒了！',
      '今天又冲动消费买了一个根本用不上的厨房小家电，包装都没拆就放储藏室了',
      '说好这个月不喝奶茶，结果今天又点了一杯超大杯加双份珍珠的',
      '上班时间偷偷看综艺还笑出了声，老板就在我后面站了大概五分钟我都没发现',
      '今天第8次对同事说"这个需求很简单"，其实每一行的"简单"背后都要改两天代码'
    ];
    var pick = confessions[Math.floor(Math.random() * confessions.length)];
    document.getElementById('confessionInput').value = pick;
    var btn = document.querySelector('.btn-confess');
    btn.style.boxShadow = '0 0 30px rgba(240,160,48,0.7)';
    setTimeout(function() { btn.style.boxShadow = '0 4px 16px rgba(240,160,48,0.2)'; }, 800);
  }

  function confess() {
    var text = document.getElementById('confessionInput').value.trim();
    if (!text) { alert('请先写下你的罪过再忏悔～'); return; }

    var karmaGain = Math.min(text.length / 2, 30);
    karmaGain = Math.floor(karmaGain) + Math.floor(Math.random() * 10);
    merit += karmaGain;
    updateMeritDisplay();

    var responses = [
      '善哉，此罪消矣。',
      '敲完这三下，翻篇了施主。',
      '功德已到账，下次别这样了。',
      '净化成功，业力消除。',
      '你的勇气值+"' + karmaGain + '"，继续加油。'
    ];
    addHistory(karmaGain, text.substring(0, 15) + '... — ' + responses[Math.floor(Math.random() * responses.length)]);
    document.getElementById('confessionInput').value = '';

    for (var i = 0; i < Math.min(5, Math.floor(karmaGain / 5)); i++) {
      setTimeout(function() {
        var fx = document.createElement('div');
        fx.className = 'tap-effect';
        fx.textContent = '✨';
        fx.style.left = Math.random() * 60 + 20 + '%';
        fx.style.top = Math.random() * 40 + 20 + '%';
        document.getElementById('woodfishArea').appendChild(fx);
        setTimeout(function() { fx.remove(); }, 1200);
      }, i * 150);
    }
  }
</script>
</body>
</html>
