<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>智行迷宫 - 最短路径可视化迷宫挑战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      color: #f0f4f8;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #gameContainer {
      position: relative;
      width: 100%;
      height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #gameCanvas {
      display: block;
      border: 2px solid #1e293b;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0,240,255,0.1);
    }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: #94a3b8;
      pointer-events: none;
      background: rgba(10, 14, 23, 0.8);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #1e293b;
    }
    #ui span { color: #00f0ff; font-weight: bold; }
    #status {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 100;
      font-size: 14px;
      color: #a855f7;
      pointer-events: none;
      transition: all 0.3s;
      background: rgba(10, 14, 23, 0.8);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #1e293b;
    }
    #status.ice { color: #60a5fa; text-shadow: 0 0 10px rgba(96,165,250,0.8); }
    #status.fire { color: #f97316; text-shadow: 0 0 10px rgba(249,115,22,0.8); }
    #controls {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
    }
    .btn {
      background: rgba(30,41,59,0.8);
      border: 1px solid #1e293b;
      color: #94a3b8;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .btn:hover {
      border-color: #00f0ff;
      color: #00f0ff;
      box-shadow: 0 0 15px rgba(0,240,255,0.3);
    }
    #message {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      font-size: 18px;
      color: #00f0ff;
      text-shadow: 0 0 20px rgba(0,240,255,0.8);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
      background: rgba(10, 14, 23, 0.85);
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid rgba(0, 240, 255, 0.3);
      white-space: nowrap;
    }
    #message.show { opacity: 1; }
    #mobileControls {
      position: absolute;
      bottom: 60px;
      right: 20px;
      z-index: 10;
      display: none;
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px;
      gap: 5px;
    }
    .d-btn {
      width: 60px;
      height: 60px;
      background: rgba(30,41,59,0.6);
      border: 1px solid #334155;
      border-radius: 12px;
      color: #94a3b8;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .d-btn:active {
      background: rgba(0,240,255,0.2);
      border-color: #00f0ff;
    }
    .d-btn:nth-child(1) { grid-column: 2; grid-row: 1; }
    .d-btn:nth-child(2) { grid-column: 2; grid-row: 3; }
    .d-btn:nth-child(3) { grid-column: 1; grid-row: 2; }
    .d-btn:nth-child(4) { grid-column: 3; grid-row: 2; }
    @media (max-width: 768px) {
      #mobileControls { display: grid; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>步数: <span id="steps">0</span></div>
    <div>最优: <span id="optimal">0</span></div>
    <div>关卡: <span id="level">1</span></div>
  </div>
  <div id="status"></div>
  <div id="message"></div>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div id="controls">
    <button class="btn" onclick="game.newGame()">新游戏</button>
    <button class="btn" onclick="game.togglePath()">显示路径</button>
    <button class="btn" onclick="game.nextLevel()">下一关</button>
  </div>
  <div id="mobileControls">
    <div class="d-btn" data-dir="up">&#9650;</div>
    <div class="d-btn" data-dir="down">&#9660;</div>
    <div class="d-btn" data-dir="left">&#9664;</div>
    <div class="d-btn" data-dir="right">&#9654;</div>
  </div>

  <script>
    // ===================== 迷宫生成算法 (DFS递归回溯) =====================
    // 生成真正的墙壁+通路迷宫
    // 奇数尺寸的网格：奇数坐标是房间，偶数坐标是墙壁
    class MazeGenerator {
      constructor(size) {
        // size 是房间数量，实际网格是 size*2+1
        this.size = size;
        this.grid = [];
        this.mainPath = [];
      }

      generate() {
        const gridSize = this.size * 2 + 1;
        this.grid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(1));
        this.mainPath = [];

        // 使用DFS递归回溯生成迷宫
        const visited = Array(gridSize).fill(null).map(() => Array(gridSize).fill(false));
        const stack = [];
        
        // 从(1,1)开始
        const startX = 1, startY = 1;
        this.grid[startY][startX] = 0;
        visited[startY][startX] = true;
        stack.push({x: startX, y: startY});

        while (stack.length > 0) {
          const current = stack[stack.length - 1];
          const neighbors = this.getUnvisitedNeighbors(current.x, current.y, visited, gridSize);

          if (neighbors.length > 0) {
            const next = neighbors[Math.floor(Math.random() * neighbors.length)];
            // 打通墙壁
            const wallX = (current.x + next.x) / 2;
            const wallY = (current.y + next.y) / 2;
            this.grid[wallY][wallX] = 0;
            this.grid[next.y][next.x] = 0;
            visited[next.y][next.x] = true;
            stack.push(next);
          } else {
            stack.pop();
          }
        }

        // 确保出口在右下角
        this.grid[gridSize - 2][gridSize - 1] = 0;

        // 计算主路径 (BFS找最短路径)
        this.mainPath = this.findShortestPath(
          {x: 1, y: 1},
          {x: gridSize - 2, y: gridSize - 2}
        );

        return {
          grid: this.grid,
          mainPath: this.mainPath,
          start: {x: 1, y: 1},
          end: {x: gridSize - 2, y: gridSize - 2}
        };
      }

      getUnvisitedNeighbors(x, y, visited, gridSize) {
        const neighbors = [];
        const dirs = [
          {dx: 0, dy: -2}, // 上
          {dx: 0, dy: 2},  // 下
          {dx: -2, dy: 0}, // 左
          {dx: 2, dy: 0}   // 右
        ];
        for (const dir of dirs) {
          const nx = x + dir.dx;
          const ny = y + dir.dy;
          if (nx > 0 && nx < gridSize - 1 && ny > 0 && ny < gridSize - 1 && !visited[ny][nx]) {
            neighbors.push({x: nx, y: ny});
          }
        }
        return neighbors;
      }

      findShortestPath(start, end) {
        const queue = [{x: start.x, y: start.y, path: [{x: start.x, y: start.y}]}];
        const visited = new Set();
        visited.add(`${start.x},${start.y}`);

        while (queue.length > 0) {
          const current = queue.shift();
          if (current.x === end.x && current.y === end.y) {
            return current.path;
          }

          const dirs = [
            {dx: 0, dy: -1}, {dx: 0, dy: 1},
            {dx: -1, dy: 0}, {dx: 1, dy: 0}
          ];
          for (const dir of dirs) {
            const nx = current.x + dir.dx;
            const ny = current.y + dir.dy;
            const key = `${nx},${ny}`;
            if (nx >= 0 && nx < this.grid[0].length && ny >= 0 && ny < this.grid.length &&
                this.grid[ny][nx] === 0 && !visited.has(key)) {
              visited.add(key);
              queue.push({
                x: nx, y: ny,
                path: [...current.path, {x: nx, y: ny}]
              });
            }
          }
        }
        return [];
      }
    }

    // ===================== 音效管理器 =====================
    class SoundManager {
      constructor() {
        this.ctx = null;
        this.initialized = false;
      }

      init() {
        if (this.initialized) return;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.initialized = true;
        } catch (e) {
          console.log('Web Audio not supported');
        }
      }

      _ensureInit() {
        if (!this.initialized) this.init();
        if (this.ctx && this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }

      _tone(freq, duration, type = 'sine', vol = 0.1) {
        this._ensureInit();
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      }

      _noise(duration, vol = 0.05) {
        this._ensureInit();
        if (!this.ctx) return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
        }
        const source = this.ctx.createBufferSource();
        const gain = this.ctx.createGain();
        source.buffer = buffer;
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        source.connect(gain);
        gain.connect(this.ctx.destination);
        source.start();
      }

      // 移动 tick 声
      playMove() {
        this._tone(200, 0.03, 'triangle', 0.04);
      }

      // 碰壁声
      playBounce() {
        this._tone(80, 0.1, 'square', 0.06);
        this._noise(0.08, 0.04);
      }

      // 破冰声
      playIceBreak() {
        this._tone(1200, 0.15, 'sine', 0.08);
        this._tone(1800, 0.1, 'sine', 0.06);
        this._tone(2400, 0.08, 'sine', 0.04);
        this._noise(0.15, 0.03);
      }

      // 结冰声
      playIce() {
        this._tone(600, 0.3, 'sine', 0.05);
        setTimeout(() => this._tone(400, 0.3, 'sine', 0.05), 100);
      }

      // 火焰加速声
      playFire() {
        this._tone(150, 0.2, 'sawtooth', 0.05);
        this._tone(200, 0.15, 'sawtooth', 0.04);
      }

      // 通关胜利音
      playWin() {
        [523, 659, 784, 1047].forEach((f, i) => {
          setTimeout(() => this._tone(f, 0.3, 'sine', 0.08), i * 120);
        });
      }
    }

    // ===================== 游戏主类 =====================
    class MazeGame {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.container = document.getElementById('gameContainer');
        this.level = 1;
        this.roomSize = 10; // 房间数量 (10x10个房间)
        this.tileW = 36;    // 等角投影宽度 (固定舒适大小)
        this.tileH = 18;    // 等角投影高度
        this.wallHeight = 28; // 墙壁高度
        
        // 相机系统
        this.camera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
        
        // 小球物理属性
        this.ball = {
          x: 1.5,  // 网格坐标 (浮点数，支持平滑移动)
          y: 1.5,
          vx: 0,   // 速度
          vy: 0,
          radius: 0.15, // 小球半径 (相对于网格，缩小以适应通道)
          targetX: 1.5,
          targetY: 1.5
        };
        
        this.steps = 0;
        this.state = 'normal'; // normal, ice, fire
        this.idleTime = 0;
        this.wrongTurns = 0;
        this.lastPositions = [];
        this.particles = [];
        this.animationFrame = 0;
        this.showPath = false;
        this.keys = {};
        this.stopDelay = 0;
        this.sound = new SoundManager();

        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.setupControls();
        this.newGame();
        this.loop();
      }

      resize() {
        const containerWidth = this.container.clientWidth;
        const containerHeight = this.container.clientHeight;
        
        this.canvas.width = containerWidth;
        this.canvas.height = containerHeight;
      }

      // 等角投影坐标转换（加入相机和缩放）
      isoToScreen(x, y) {
        const zoom = this.camera.zoom;
        const tw = this.tileW * zoom;
        const th = this.tileH * zoom;
        // 以画面中心为基准，加上相机偏移
        const centerX = this.canvas.width / 2 + this.camera.x;
        const centerY = this.canvas.height / 2 + this.camera.y;
        return {
          x: centerX + (x - y) * tw,
          y: centerY + (x + y) * th
        };
      }

      newGame() {
        this.roomSize = 12; // 固定中等大小
        this.resize();
        this.maze = new MazeGenerator(this.roomSize).generate();
        
        // 小球初始位置在第一个通路中心
        this.ball.x = this.maze.start.x + 0.5;
        this.ball.y = this.maze.start.y + 0.5;
        this.ball.vx = 0;
        this.ball.vy = 0;
        this.ball.targetX = this.ball.x;
        this.ball.targetY = this.ball.y;
        
        // 初始显示全图（看向小球和终点中点，zoom=stopZoom）
        const gs = this.roomSize * 2 + 1;
        const cw = this.canvas.width;
        const ch = this.canvas.height;
        const mazeScreenW = 2 * (gs - 1) * this.tileW;
        const mazeScreenH = 2 * (gs - 1) * this.tileH;
        const fitZoom = Math.min((cw - 60) / mazeScreenW, (ch - 60) / mazeScreenH);
        const startZoom = Math.min(0.75, fitZoom);
        const tw = this.tileW * startZoom;
        const th = this.tileH * startZoom;
        const endX = this.maze.end.x + 0.5;
        const endY = this.maze.end.y + 0.5;
        const midX = (this.ball.x + endX) / 2;
        const midY = (this.ball.y + endY) / 2;
        this.camera.zoom = startZoom;
        this.camera.targetZoom = startZoom;
        this.camera.x = -(midX - midY) * tw;
        this.camera.y = -(midX + midY) * th;
        
        this.steps = 0;
        this.state = 'normal';
        this.idleTime = 0;
        this.stopDelay = 999; // 开局直接保持全图视角，直到移动
        this.wrongTurns = 0;
        this.lastPositions = [];
        this.particles = [];
        this.showPath = false;
        this.updateUI();
        this.showMessage('开始挑战！');
      }

      nextLevel() {
        this.level++;
        this.newGame();
      }

      togglePath() {
        this.showPath = !this.showPath;
      }

      setupControls() {
        // 键盘按下
        document.addEventListener('keydown', (e) => {
          this.keys[e.key] = true;
          const dirs = {
            'ArrowUp': {dx: 0, dy: -1},
            'ArrowDown': {dx: 0, dy: 1},
            'ArrowLeft': {dx: -1, dy: 0},
            'ArrowRight': {dx: 1, dy: 0},
            'w': {dx: 0, dy: -1},
            's': {dx: 0, dy: 1},
            'a': {dx: -1, dy: 0},
            'd': {dx: 1, dy: 0}
          };
          if (dirs[e.key]) {
            e.preventDefault();
          }
        });

        // 键盘松开
        document.addEventListener('keyup', (e) => {
          this.keys[e.key] = false;
        });

        // 方向按钮控制（同时支持触摸和鼠标）
        document.querySelectorAll('.d-btn').forEach(btn => {
          const setDir = (active) => {
            const dir = btn.dataset.dir;
            this.keys[dir] = active;
          };
          btn.addEventListener('touchstart', (e) => { e.preventDefault(); setDir(true); });
          btn.addEventListener('touchend', (e) => { e.preventDefault(); setDir(false); });
          btn.addEventListener('mousedown', (e) => { e.preventDefault(); setDir(true); });
          btn.addEventListener('mouseup', (e) => { e.preventDefault(); setDir(false); });
          btn.addEventListener('mouseleave', (e) => { setDir(false); });
        });

        // 滚轮缩放
        this.canvas.addEventListener('wheel', (e) => {
          e.preventDefault();
          const delta = e.deltaY > 0 ? 0.9 : 1.1;
          this.camera.targetZoom = Math.max(0.5, Math.min(2.0, this.camera.targetZoom * delta));
        }, { passive: false });

        // 双指缩放（移动端）
        let lastPinchDist = 0;
        this.canvas.addEventListener('touchstart', (e) => {
          if (e.touches.length === 2) {
            lastPinchDist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
          }
        });
        this.canvas.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            const dist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
            if (lastPinchDist > 0) {
              const scale = dist / lastPinchDist;
              this.camera.targetZoom = Math.max(0.5, Math.min(2.0, this.camera.targetZoom * scale));
            }
            lastPinchDist = dist;
          }
        });
      }

      update() {
        this.animationFrame++;
        
        // 计算加速度
        let ax = 0, ay = 0;
        const accel = this.state === 'fire' ? 0.04 : 0.02;
        const maxSpeed = this.state === 'fire' ? 0.35 : 0.2;
        const friction = 0.88;

        // 等角投影方向映射：
        // 在等角投影中，屏幕上的"上"对应迷宫的左上方向 (x-, y-)
        // 屏幕上的"下"对应迷宫的右下方向 (x+, y+)
        // 屏幕上的"左"对应迷宫的左下方向 (x-, y+)
        // 屏幕上的"右"对应迷宫的右上方向 (x+, y-)
        // 为了防止自动滑入分叉口，使用单轴优先控制
        let dx = 0, dy = 0;
        if (this.keys['ArrowUp'] || this.keys['up'] || this.keys['w']) { dx = -1; dy = -1; }
        if (this.keys['ArrowDown'] || this.keys['down'] || this.keys['s']) { dx = 1; dy = 1; }
        if (this.keys['ArrowLeft'] || this.keys['left'] || this.keys['a']) { dx = -1; dy = 1; }
        if (this.keys['ArrowRight'] || this.keys['right'] || this.keys['d']) { dx = 1; dy = -1; }
        
        // 归一化方向并应用加速度
        if (dx !== 0 || dy !== 0) {
          const len = Math.sqrt(dx * dx + dy * dy);
          ax = (dx / len) * accel;
          ay = (dy / len) * accel;
        }

        // 如果有移动，重置idle时间
        if (ax !== 0 || ay !== 0) {
          this.idleTime = 0;
          if (this.state === 'ice') {
            this.state = 'normal';
            this.addParticles(this.ball.x, this.ball.y, 'iceBreak');
            this.showMessage('破冰！');
            this.sound.playIceBreak();
          }
        } else {
          this.idleTime += 1/60;
          if (this.idleTime > 10 && this.state === 'normal') {
            this.state = 'ice';
            this.showMessage('小球结冰了...');
            this.sound.playIce();
          }
        }

        // 应用加速度
        this.ball.vx += ax;
        this.ball.vy += ay;

        // 限制最大速度
        const speed = Math.sqrt(this.ball.vx * this.ball.vx + this.ball.vy * this.ball.vy);
        if (speed > maxSpeed) {
          this.ball.vx = (this.ball.vx / speed) * maxSpeed;
          this.ball.vy = (this.ball.vy / speed) * maxSpeed;
        }

        // 应用摩擦力
        this.ball.vx *= friction;
        this.ball.vy *= friction;

        // 如果速度极小，停止
        if (Math.abs(this.ball.vx) < 0.0001) this.ball.vx = 0;
        if (Math.abs(this.ball.vy) < 0.0001) this.ball.vy = 0;

        // 应用走廊方向约束：在走廊里只允许沿着走廊方向移动
        this.applyCorridorConstraint();

        // 预测新位置
        let newX = this.ball.x + this.ball.vx;
        let newY = this.ball.y + this.ball.vy;

        // 碰撞检测 - 路径采样：检测从当前位置到新位置的路径上是否穿过墙壁
        if (!this.isPathBlocked(this.ball.x, this.ball.y, newX, newY)) {
          // 路径畅通，正常移动
          this.ball.x = newX;
          this.ball.y = newY;
        } else {
          // 路径被阻挡，尝试只移动X
          if (!this.isPathBlocked(this.ball.x, this.ball.y, newX, this.ball.y)) {
            this.ball.x = newX;
            this.ball.vy = 0;
          } else if (!this.isPathBlocked(this.ball.x, this.ball.y, this.ball.x, newY)) {
            // 尝试只移动Y
            this.ball.y = newY;
            this.ball.vx = 0;
          } else {
            // 都走不了，温和停止
            this.ball.vx *= 0.2;
            this.ball.vy *= 0.2;
            this.addParticles(this.ball.x, this.ball.y, 'bounce');
            if (speed > 0.02) this.sound.playBounce();
          }
        }

        // 额外安全检查：确保小球中心永远不会在墙里
        if (this.isWall(this.ball.x, this.ball.y)) {
          // 如果卡墙里了，推回最近的通路中心
          const gx = Math.floor(this.ball.x);
          const gy = Math.floor(this.ball.y);
          const dirs = [{dx:0,dy:0},{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
          for (const d of dirs) {
            const nx = gx + d.dx;
            const ny = gy + d.dy;
            if (nx >= 0 && nx < this.maze.grid[0].length && ny >= 0 && ny < this.maze.grid.length) {
              if (this.maze.grid[ny][nx] === 0) {
                this.ball.x = nx + 0.5;
                this.ball.y = ny + 0.5;
                this.ball.vx = 0;
                this.ball.vy = 0;
                break;
              }
            }
          }
        }

        // 检查是否到达终点
        const end = this.maze.end;
        const distToEnd = Math.sqrt(
          (this.ball.x - (end.x + 0.5)) ** 2 + 
          (this.ball.y - (end.y + 0.5)) ** 2
        );
        if (distToEnd < 0.5) {
          this.showMessage(`通关！步数: ${Math.floor(this.steps)}`);
          this.addParticles(this.ball.x, this.ball.y, 'win');
          this.sound.playWin();
          setTimeout(() => this.nextLevel(), 2000);
        }

        // 更新步数 (根据移动距离)
        if (speed > 0.01) {
          this.steps += speed;
          // 移动 tick 声（每8帧一次，避免太吵）
          if (this.animationFrame % 8 === 0) {
            this.sound.playMove();
          }
        }

        // 检查错误转向
        this.checkWrongTurn();

        // 更新粒子
        this.updateParticles();

        // 相机平滑跟随小球
        this.updateCamera();
      }

      isWall(x, y) {
        // 小球半径碰撞检测 - 检查小球四周是否碰到墙壁
        const r = this.ball.radius * 0.85; // 略微缩小碰撞盒，更宽容
        const checkPoints = [
          {x: x, y: y},
          {x: x - r, y: y},
          {x: x + r, y: y},
          {x: x, y: y - r},
          {x: x, y: y + r}
        ];

        for (const point of checkPoints) {
          const gridX = Math.floor(point.x);
          const gridY = Math.floor(point.y);
          if (gridX < 0 || gridX >= this.maze.grid[0].length ||
              gridY < 0 || gridY >= this.maze.grid.length) {
            return true;
          }
          if (this.maze.grid[gridY][gridX] === 1) {
            return true;
          }
        }
        return false;
      }

      // 检测从 (x1,y1) 到 (x2,y2) 的直线路径上是否碰到墙壁
      isPathBlocked(x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 0.0001) return false;
        const steps = Math.max(3, Math.ceil(dist * 4));

        const r = this.ball.radius * 0.7;
        const offsets = [
          {x: 0, y: 0},
          {x: r, y: 0},
          {x: -r, y: 0},
          {x: 0, y: r},
          {x: 0, y: -r}
        ];

        // 从 i=1 开始，不检查起点本身（避免起点边缘贴墙导致误判）
        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          const cx = x1 + dx * t;
          const cy = y1 + dy * t;
          for (const offset of offsets) {
            if (this.isWall(cx + offset.x, cy + offset.y)) return true;
          }
        }
        return false;
      }

      checkWrongTurn() {
        // 只在小球有速度时才检测折返
        const speed = Math.sqrt(this.ball.vx * this.ball.vx + this.ball.vy * this.ball.vy);
        if (speed < 0.02) return;

        const pos = {x: Math.floor(this.ball.x), y: Math.floor(this.ball.y)};
        this.lastPositions.push(pos);
        if (this.lastPositions.length > 20) this.lastPositions.shift();

        // 检查是否频繁折返（需要连续多次来回才算）
        if (this.lastPositions.length >= 8) {
          const recent = this.lastPositions.slice(-8);
          let backAndForth = 0;
          for (let i = 2; i < recent.length; i++) {
            if (recent[i].x === recent[i-2].x && recent[i].y === recent[i-2].y) {
              backAndForth++;
            }
          }
          if (backAndForth >= 4) {
            this.wrongTurns++;
            if (this.wrongTurns >= 3) {
              this.state = 'fire';
              this.wrongTurns = 0;
              this.lastPositions = [];
              this.showMessage('火焰加速！');
              this.sound.playFire();
              setTimeout(() => { if (this.state === 'fire') this.state = 'normal'; }, 5000);
            }
          }
        }
      }

      // 获取当前格子类型：room(交叉口), h_corridor(水平走廊), v_corridor(垂直走廊), dead_end(死胡同)
      getCellType(x, y) {
        const gx = Math.floor(x);
        const gy = Math.floor(y);
        
        // 检查四个方向是否通路
        const up = gy > 0 && this.maze.grid[gy - 1][gx] === 0;
        const down = gy < this.maze.grid.length - 1 && this.maze.grid[gy + 1][gx] === 0;
        const left = gx > 0 && this.maze.grid[gy][gx - 1] === 0;
        const right = gx < this.maze.grid[0].length - 1 && this.maze.grid[gy][gx + 1] === 0;
        
        const openDirs = [up, down, left, right].filter(b => b).length;
        
        if (openDirs >= 3) return 'room';
        if (openDirs === 2) {
          if (left && right) return 'h_corridor';
          if (up && down) return 'v_corridor';
          return 'room'; // 拐角当作房间处理
        }
        if (openDirs === 1) return 'dead_end';
        return 'room';
      }

      // 走廊方向约束：在走廊里只允许沿着走廊方向移动
      applyCorridorConstraint() {
        const cellType = this.getCellType(this.ball.x, this.ball.y);

        if (cellType === 'h_corridor') {
          // 水平走廊：大幅衰减垂直速度，温和吸向中心线
          this.ball.vy *= 0.3;
          const centerY = Math.floor(this.ball.y) + 0.5;
          this.ball.y += (centerY - this.ball.y) * 0.15;
        } else if (cellType === 'v_corridor') {
          // 垂直走廊：大幅衰减水平速度，温和吸向中心线
          this.ball.vx *= 0.3;
          const centerX = Math.floor(this.ball.x) + 0.5;
          this.ball.x += (centerX - this.ball.x) * 0.15;
        } else if (cellType === 'dead_end') {
          // 死胡同：轻度减速，不要完全停住
          this.ball.vx *= 0.85;
          this.ball.vy *= 0.85;
        }
      }

      addParticles(x, y, type) {
        const count = type === 'win' ? 50 : (type === 'iceBreak' ? 20 : 8);
        for (let i = 0; i < count; i++) {
          this.particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 0.1,
            vy: (Math.random() - 0.5) * 0.1,
            life: 1.0,
            decay: 0.02 + Math.random() * 0.03,
            type: type,
            size: Math.random() * 3 + 1
          });
        }
      }

      updateParticles() {
        this.particles = this.particles.filter(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.life -= p.decay;
          return p.life > 0;
        });
      }

      updateCamera() {
        const zoom = this.camera.zoom;
        const tw = this.tileW * zoom;
        const th = this.tileH * zoom;
        const gs = this.roomSize * 2 + 1;
        const cw = this.canvas.width;
        const ch = this.canvas.height;

        // 检测小球是否在移动（有按键或速度较快）
        const hasInput = Object.values(this.keys).some(v => v);
        const speed = Math.sqrt(this.ball.vx * this.ball.vx + this.ball.vy * this.ball.vy);
        const isMoving = hasInput || speed > 0.03;

        // 计算停止时能 fit 整个迷宫的 zoom（不设硬下限，大迷宫自动缩小）
        const mazeScreenW = 2 * (gs - 1) * this.tileW;
        const mazeScreenH = 2 * (gs - 1) * this.tileH;
        const fitZoom = Math.min((cw - 60) / mazeScreenW, (ch - 60) / mazeScreenH);
        const stopZoom = Math.min(0.75, fitZoom);

        // 停止后延迟2秒再拉远，给用户反应时间
        if (!isMoving) {
          this.stopDelay = (this.stopDelay || 0) + 1/60;
        } else {
          this.stopDelay = 0;
        }
        const isReallyStopped = !isMoving && this.stopDelay > 2;

        // 停止时拉远看全局（确保能看到终点），移动时聚焦跟随
        const targetZoom = isReallyStopped ? stopZoom : 1.0;
        this.camera.targetZoom += (targetZoom - this.camera.targetZoom) * 0.03;

        // 平滑缩放过渡
        this.camera.zoom += (this.camera.targetZoom - this.camera.zoom) * 0.1;

        // 停止2秒后相机看向小球和终点的中点，方便规划路线；移动时跟随小球
        let lookAtX, lookAtY;
        if (isReallyStopped) {
          const endX = this.maze.end.x + 0.5;
          const endY = this.maze.end.y + 0.5;
          lookAtX = (this.ball.x + endX) / 2;
          lookAtY = (this.ball.y + endY) / 2;
        } else {
          lookAtX = this.ball.x;
          lookAtY = this.ball.y;
        }
        const targetX = -(lookAtX - lookAtY) * tw;
        const targetY = -(lookAtX + lookAtY) * th;

        // lerp 平滑跟随
        this.camera.x += (targetX - this.camera.x) * 0.08;
        this.camera.y += (targetY - this.camera.y) * 0.08;

        // 软性边界限制：不让迷宫外的空白区域大面积露出
        const leftX = cw / 2 + this.camera.x - (gs - 1) * tw;
        const rightX = cw / 2 + this.camera.x + (gs - 1) * tw;
        const topY = ch / 2 + this.camera.y;
        const bottomY = ch / 2 + this.camera.y + 2 * (gs - 1) * th;

        const margin = 80 * zoom;
        if (leftX > margin) this.camera.x -= (leftX - margin) * 0.05;
        if (rightX < cw - margin) this.camera.x += (cw - margin - rightX) * 0.05;
        if (topY > margin) this.camera.y -= (topY - margin) * 0.05;
        if (bottomY < ch - margin) this.camera.y += (ch - margin - bottomY) * 0.05;
      }

      draw() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0a0e17';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // 绘制迷宫 (从后往前，先画远的)
        this.drawMaze(ctx);

        // 绘制路径
        if (this.showPath) this.drawPath(ctx);

        // 绘制终点
        this.drawGoal(ctx);

        // 绘制小球
        this.drawBall(ctx);

        // 绘制粒子
        this.drawParticles(ctx);
      }

      drawMaze(ctx) {
        const grid = this.maze.grid;
        
        // 按从远到近的顺序绘制 (y+x 大的在前面)
        const tiles = [];
        for (let y = 0; y < grid.length; y++) {
          for (let x = 0; x < grid[0].length; x++) {
            tiles.push({x, y, value: grid[y][x], depth: x + y});
          }
        }
        tiles.sort((a, b) => a.depth - b.depth);

        for (const tile of tiles) {
          if (tile.value === 1) {
            this.drawWall(ctx, tile.x, tile.y);
          } else {
            this.drawFloor(ctx, tile.x, tile.y);
          }
        }
      }

      drawFloor(ctx, x, y) {
        const pos = this.isoToScreen(x, y);
        const zoom = this.camera.zoom;
        const w = this.tileW * zoom;
        const h = this.tileH * zoom;
        const dh = h * 0.5; // 方块厚度

        // 右侧面（拼接方块的厚度）
        ctx.fillStyle = '#1f3045';
        ctx.beginPath();
        ctx.moveTo(pos.x + w, pos.y + h);
        ctx.lineTo(pos.x, pos.y + h * 2);
        ctx.lineTo(pos.x, pos.y + h * 2 + dh);
        ctx.lineTo(pos.x + w, pos.y + h + dh);
        ctx.closePath();
        ctx.fill();

        // 左侧面（拼接方块的厚度）
        ctx.fillStyle = '#162333';
        ctx.beginPath();
        ctx.moveTo(pos.x - w, pos.y + h);
        ctx.lineTo(pos.x, pos.y + h * 2);
        ctx.lineTo(pos.x, pos.y + h * 2 + dh);
        ctx.lineTo(pos.x - w, pos.y + h + dh);
        ctx.closePath();
        ctx.fill();

        // 顶面 - 方块顶面
        ctx.fillStyle = '#2a3f5a';
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(pos.x - w, pos.y + h);
        ctx.lineTo(pos.x, pos.y + h * 2);
        ctx.lineTo(pos.x + w, pos.y + h);
        ctx.closePath();
        ctx.fill();

        // 顶面内部高光
        ctx.fillStyle = '#3a5570';
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y + 2);
        ctx.lineTo(pos.x - w + 3, pos.y + h);
        ctx.lineTo(pos.x, pos.y + h * 2 - 3);
        ctx.lineTo(pos.x + w - 3, pos.y + h);
        ctx.closePath();
        ctx.fill();

        // 顶面边缘线
        ctx.strokeStyle = 'rgba(0, 240, 255, 0.08)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y + 2);
        ctx.lineTo(pos.x - w + 3, pos.y + h);
        ctx.lineTo(pos.x, pos.y + h * 2 - 3);
        ctx.lineTo(pos.x + w - 3, pos.y + h);
        ctx.closePath();
        ctx.stroke();
      }

      drawWall(ctx, x, y) {
        const pos = this.isoToScreen(x, y);
        const zoom = this.camera.zoom;
        const w = this.tileW * zoom;
        const h = this.tileH * zoom;
        const wh = this.wallHeight * zoom;

        // 墙壁顶面 - 暗色，明显区别于通路
        ctx.fillStyle = '#151f2e';
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(pos.x - w, pos.y + h);
        ctx.lineTo(pos.x, pos.y + h * 2);
        ctx.lineTo(pos.x + w, pos.y + h);
        ctx.closePath();
        ctx.fill();

        // 墙壁右侧面
        ctx.fillStyle = '#0d1219';
        ctx.beginPath();
        ctx.moveTo(pos.x + w, pos.y + h);
        ctx.lineTo(pos.x, pos.y + h * 2);
        ctx.lineTo(pos.x, pos.y + h * 2 + wh);
        ctx.lineTo(pos.x + w, pos.y + h + wh);
        ctx.closePath();
        ctx.fill();

        // 墙壁左侧面 - 更深的阴影
        ctx.fillStyle = '#06090f';
        ctx.beginPath();
        ctx.moveTo(pos.x - w, pos.y + h);
        ctx.lineTo(pos.x, pos.y + h * 2);
        ctx.lineTo(pos.x, pos.y + h * 2 + wh);
        ctx.lineTo(pos.x - w, pos.y + h + wh);
        ctx.closePath();
        ctx.fill();

        // 墙壁顶部边缘微光（让立体感更强）
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(pos.x - w, pos.y + h);
        ctx.lineTo(pos.x - w, pos.y + h + wh);
        ctx.stroke();

        ctx.strokeStyle = '#1a2332';
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(pos.x + w, pos.y + h);
        ctx.lineTo(pos.x + w, pos.y + h + wh);
        ctx.stroke();
      }

      drawPath(ctx) {
        if (!this.maze.mainPath || this.maze.mainPath.length === 0) return;
        const zoom = this.camera.zoom;

        ctx.strokeStyle = 'rgba(0, 240, 255, 0.4)';
        ctx.lineWidth = 3 * zoom;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        ctx.beginPath();
        this.maze.mainPath.forEach((p, i) => {
          const pos = this.isoToScreen(p.x + 0.5, p.y + 0.5);
          if (i === 0) ctx.moveTo(pos.x, pos.y + this.tileH * zoom);
          else ctx.lineTo(pos.x, pos.y + this.tileH * zoom);
        });
        ctx.stroke();

        // 发光效果
        ctx.strokeStyle = 'rgba(0, 240, 255, 0.15)';
        ctx.lineWidth = 8 * zoom;
        ctx.stroke();
      }

      drawGoal(ctx) {
        const end = this.maze.end;
        const pos = this.isoToScreen(end.x + 0.5, end.y + 0.5);
        const pulse = Math.sin(this.animationFrame * 0.05) * 0.3 + 0.7;
        const zoom = this.camera.zoom;
        const cy = pos.y + this.tileH * zoom;

        // 光环
        ctx.beginPath();
        ctx.arc(pos.x, cy, this.tileW * 0.6 * zoom, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(168, 85, 247, ${0.2 * pulse})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(pos.x, cy, this.tileW * 0.4 * zoom, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(168, 85, 247, ${0.4 * pulse})`;
        ctx.fill();

        // 星星
        ctx.fillStyle = '#e9d5ff';
        ctx.font = `${this.tileW * zoom}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('★', pos.x, cy);
      }

      drawBall(ctx) {
        const pos = this.isoToScreen(this.ball.x, this.ball.y);
        const zoom = this.camera.zoom;
        const radius = this.tileW * 0.3 * zoom;
        // isoToScreen(ball.x, ball.y) 已返回格子中心，无需再加 tileH
        const cy = pos.y - radius * 0.4;

        // 阴影
        ctx.beginPath();
        ctx.ellipse(pos.x, pos.y + radius * 0.4, radius * 0.8, radius * 0.25, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fill();

        // 小球发光
        const glowRadius = radius * (this.state === 'ice' ? 2 : 1.5);
        const gradient = ctx.createRadialGradient(
          pos.x - radius * 0.2, cy - radius * 0.3, radius * 0.1,
          pos.x, cy, glowRadius
        );

        if (this.state === 'ice') {
          gradient.addColorStop(0, '#e0f2fe');
          gradient.addColorStop(0.3, '#60a5fa');
          gradient.addColorStop(0.7, '#1e40af');
          gradient.addColorStop(1, 'rgba(30, 64, 175, 0)');
          
          // 冰晶效果
          const iceGlow = Math.sin(this.animationFrame * 0.03) * 0.2 + 0.8;
          ctx.beginPath();
          ctx.arc(pos.x, cy, radius * 1.8, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(96, 165, 250, ${0.15 * iceGlow})`;
          ctx.fill();
        } else if (this.state === 'fire') {
          gradient.addColorStop(0, '#fef3c7');
          gradient.addColorStop(0.2, '#fbbf24');
          gradient.addColorStop(0.5, '#f97316');
          gradient.addColorStop(0.8, '#dc2626');
          gradient.addColorStop(1, 'rgba(220, 38, 38, 0)');
          
          // 火焰粒子
          for (let i = 0; i < 6; i++) {
            const angle = this.animationFrame * 0.15 + i * Math.PI * 0.33;
            const fx = pos.x + Math.cos(angle) * radius * 0.9;
            const fy = cy + Math.sin(angle) * radius * 0.5 - radius * 0.5;
            ctx.beginPath();
            ctx.arc(fx, fy, radius * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(249, 115, 22, ${0.5 + Math.sin(this.animationFrame * 0.2 + i) * 0.3})`;
            ctx.fill();
          }
        } else {
          gradient.addColorStop(0, '#e0f2fe');
          gradient.addColorStop(0.3, '#00f0ff');
          gradient.addColorStop(0.7, '#0891b2');
          gradient.addColorStop(1, 'rgba(8, 145, 178, 0)');
          
          // 正常发光
          ctx.beginPath();
          ctx.arc(pos.x, cy, radius * 1.5, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0, 240, 255, 0.1)';
          ctx.fill();
        }

        // 小球主体
        ctx.beginPath();
        ctx.arc(pos.x, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();

        // 高光
        ctx.beginPath();
        ctx.arc(pos.x - radius * 0.25, cy - radius * 0.25, radius * 0.35, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.fill();
      }

      drawParticles(ctx) {
        const zoom = this.camera.zoom;
        this.particles.forEach(p => {
          const pos = this.isoToScreen(p.x, p.y);
          const alpha = p.life;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y + this.tileH * zoom, p.size * p.life * zoom, 0, Math.PI * 2);
          switch (p.type) {
            case 'move': ctx.fillStyle = `rgba(0, 240, 255, ${alpha * 0.6})`; break;
            case 'fire': ctx.fillStyle = `rgba(249, 115, 22, ${alpha * 0.8})`; break;
            case 'iceBreak': ctx.fillStyle = `rgba(96, 165, 250, ${alpha * 0.8})`; break;
            case 'win': ctx.fillStyle = `rgba(168, 85, 247, ${alpha * 0.8})`; break;
            case 'bounce': ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.5})`; break;
          }
          ctx.fill();
        });
      }

      updateUI() {
        document.getElementById('steps').textContent = Math.floor(this.steps);
        document.getElementById('optimal').textContent = this.maze.mainPath.length;
        document.getElementById('level').textContent = this.level;
        const statusEl = document.getElementById('status');
        if (this.state === 'ice') {
          statusEl.textContent = '❄️ 结冰中...';
          statusEl.className = 'ice';
        } else if (this.state === 'fire') {
          statusEl.textContent = '🔥 火焰加速！';
          statusEl.className = 'fire';
        } else {
          statusEl.textContent = '';
          statusEl.className = '';
        }
      }

      showMessage(text) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.classList.add('show');
        setTimeout(() => msg.classList.remove('show'), 2000);
      }

      loop() {
        const self = this;
        function frame() {
          self.update();
          self.draw();
          self.updateUI();
          setTimeout(frame, 16);
        }
        frame();
      }
    }

    const game = new MazeGame();
  </script>
</body>
</html>
