<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI有声阅读 - Demo</title>
  <style>
    :root {
      --bg: #0f0f23;
      --bg-card: #1a1a2e;
      --bg-hover: #252542;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --border: #2d2d4a;
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --success: #22c55e;
      --warning: #fbbf24;
      --danger: #ef4444;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --bg-hover: #f1f5f9;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    [data-theme="purple"] {
      --bg: #1a0a2e;
      --bg-card: #2d1b4e;
      --bg-hover: #3d2a6b;
      --text-primary: #fdf4ff;
      --text-secondary: #c4a7e7;
      --border: #4c3a80;
      --primary: #a855f7;
      --secondary: #d946ef;
      --accent: #ec4899;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-switcher {
      display: flex;
      gap: 8px;
      padding: 4px;
      background: var(--bg-hover);
      border-radius: 10px;
    }

    .theme-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      background: transparent;
    }

    .theme-btn.active {
      background: var(--primary);
      color: white;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-primary);
    }

    .btn-outline:hover {
      background: var(--bg-hover);
    }

    .page-home {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .novels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .novel-card {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
    }

    .novel-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
    }

    .novel-cover {
      height: 180px;
      display: flex;
      align-items: flex-end;
      padding: 20px;
      position: relative;
    }

    .novel-title {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }

    .novel-author {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .novel-info {
      padding: 20px;
    }

    .novel-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .novel-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .progress-bar {
      width: 120px;
      height: 6px;
      background: var(--bg-hover);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 3px;
    }

    .features-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .feature-card {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
      text-align: center;
    }

    .feature-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .feature-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .feature-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .page-reader {
      display: flex;
      height: calc(100vh - 180px);
      gap: 20px;
    }

    .sidebar {
      width: 280px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 600;
    }

    .chapter-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .chapter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }

    .chapter-item:hover {
      background: rgba(99, 102, 241, 0.1);
    }

    .chapter-item.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
    }

    .chapter-index {
      color: var(--text-secondary);
      min-width: 24px;
    }

    .chapter-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chapter-status {
      font-size: 12px;
    }

    .chapter-status.done { color: #22c55e; }
    .chapter-status.pending { color: #6b7280; }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .reader-toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .toolbar-title {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }

    .toolbar-actions {
      display: flex;
      gap: 12px;
    }

    .dialogue-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      margin: auto;
      text-align: center;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-text {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .empty-hint {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .dialogue-bubble {
      max-width: 80%;
      padding: 16px 20px;
      border-radius: 16px;
      background: var(--bg);
      border-left: 4px solid;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .dialogue-bubble:hover {
      transform: translateX(4px);
    }

    .dialogue-bubble.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.1));
    }

    .dialogue-bubble.narrator {
      max-width: 90%;
      margin: 0 auto;
      text-align: center;
      border-left: none;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-style: italic;
    }

    .dialogue-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .role-tag {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: white;
    }

    .emotion-tag {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
    }

    .dialogue-content {
      font-size: 15px;
      line-height: 1.8;
    }

    .audio-player {
      padding: 16px 24px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .player-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .current-role {
      color: var(--primary);
      font-weight: 600;
    }

    .player-controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 12px;
    }

    .control-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }

    .control-btn:hover:not(:disabled) {
      background: rgba(99, 102, 241, 0.2);
    }

    .control-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .control-btn.play-btn {
      width: 56px;
      height: 56px;
      font-size: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .control-btn.play-btn:hover {
      transform: scale(1.05);
    }

    .player-progress {
      padding: 0 8px;
    }

    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 2px;
      transition: width 0.2s;
    }

    .roles-panel {
      width: 260px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .roles-title {
      padding: 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .role-list {
      padding: 8px;
      overflow-y: auto;
      max-height: calc(100vh - 240px);
    }

    .role-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .role-item:hover {
      background: rgba(99, 102, 241, 0.1);
    }

    .role-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 16px;
    }

    .role-info {
      flex: 1;
      min-width: 0;
    }

    .role-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .role-timbre {
      font-size: 11px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .role-tag-small {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--bg-hover);
      color: var(--text-secondary);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (max-width: 1024px) {
      .page-reader {
        flex-direction: column;
        height: auto;
      }
      .sidebar {
        width: 100%;
        max-height: 200px;
      }
      .roles-panel {
        width: 100%;
        max-height: 200px;
      }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="app-container">
    <header class="header">
      <div class="header-left">
        <div class="logo">🎧</div>
        <div>
          <div class="brand-title">AI有声阅读</div>
          <div style="font-size: 12px; color: var(--text-secondary)">多角色TTS · 情绪调度</div>

        </div>
      </div>
    </header>

    <div id="page-home" class="page-home">
      <div>
        <div class="section-header">
          <h2 class="section-title">📚 我的书架</h2>
        </div>
        <div class="novels-grid" id="novels-grid"></div>
      </div>

      <div>
        <div class="section-header">
          <h2 class="section-title">✨ 核心特性</h2>
        </div>
        <div class="features-section">
          <div class="feature-card">
            <div class="feature-icon">🎭</div>
            <div class="feature-title">多角色语音</div>
            <div class="feature-desc">Edge TTS真实多音色，每个角色有独特声音</div>
          </div>
          <div class="feature-card">
            <div class="feature-icon">💎</div>
            <div class="feature-title">情绪调度</div>
            <div class="feature-desc">根据对话情绪自动调整语速、音调</div>
          </div>
          <div class="feature-card">
            <div class="feature-icon">🎨</div>
            <div class="feature-title">三套主题</div>
            <div class="feature-desc">暗黑/浅色/紫色梦境，随心切换</div>
          </div>
          <div class="feature-card">
            <div class="feature-icon">📖</div>
            <div class="feature-title">沉浸式阅读</div>
            <div class="feature-desc">对话气泡、角色标签、情绪标注</div>
          </div>
        </div>
      </div>
    </div>

    <div id="page-reader" class="page-reader" style="display: none;">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h3 class="sidebar-title">章节目录</h3>
        </div>
        <div class="chapter-list" id="chapter-list"></div>
      </aside>

      <main class="main-content">
        <div class="reader-toolbar">
          <button class="btn btn-outline back-btn" onclick="goHome()">← 返回书架</button>
          <h2 class="toolbar-title" id="toolbar-title">选择章节</h2>
          <div class="toolbar-actions">
            <button class="btn btn-primary play-btn" id="play-btn" onclick="togglePlay()">
              ▶ 播放
            </button>
          </div>
        </div>

        <div class="dialogue-area" id="dialogue-area">
          <div class="empty-state">
            <div class="empty-icon">📖</div>
            <p class="empty-text">选择章节开始阅读</p>
            <p class="empty-hint">点击左侧章节列表开始</p>
          </div>
        </div>

        <div class="audio-player" id="audio-player" style="display: none;">
          <div class="player-info">
            <span class="current-role" id="current-role"></span>
            <span id="progress-text">1 / 1</span>
          </div>
          <div class="player-controls">
            <button class="control-btn" id="prev-btn" onclick="prevDialogue()" disabled>⏮</button>
            <button class="control-btn play-btn" id="player-play-btn" onclick="togglePlay()">▶</button>
            <button class="control-btn" id="next-btn" onclick="nextDialogue()" disabled>⏭</button>
          </div>
          <div class="player-progress">
            <div class="progress-track" onclick="seekDialogue(event)">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>
        </div>
      </main>

      <aside class="roles-panel">
        <h3 class="roles-title">👥 角色列表</h3>
        <div class="role-list" id="role-list"></div>
      </aside>
    </div>
  </div>

    let currentNovel = null
    let currentChapterId = null
    let currentDialogues = []
    let currentDialogueIndex = 0
    let isPlaying = false
    let currentAudio = null

    function setTheme(theme) {
      document.body.dataset.theme = theme
      document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'))
      event.target.classList.add('active')
    }

    function renderNovels() {
      const grid = document.getElementById('novels-grid')
      grid.innerHTML = novelsData.map(novel => `
        <div class="novel-card" onclick="openNovel('${novel.id}')">
          <div class="novel-cover" style="background: ${novel.coverGradient}">
            <div>
              <div class="novel-title">${novel.title}</div>
              <div class="novel-author">${novel.author}</div>
            </div>
          </div>
          <div class="novel-info">
            <p class="novel-desc">${novel.description}</p>
            <div class="novel-meta">
              <div class="meta-item">
                <span>📖</span>
                <span>${novel.chapters.length}章</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${novel.progress}%"></div>
              </div>
              <div class="meta-item">
                <span>${novel.progress}%</span>
              </div>
            </div>
          </div>
        </div>
      `).join('')
    }

    function openNovel(novelId) {
      currentNovel = novelsData.find(n => n.id === novelId)
      if (!currentNovel) return

      document.getElementById('page-home').style.display = 'none'
      document.getElementById('page-reader').style.display = 'flex'

      renderChapters()
      renderRoles()
      selectChapter(currentNovel.chapters[0].id)
    }

    function goHome() {
      stopPlayback()
      document.getElementById('page-reader').style.display = 'none'
      document.getElementById('page-home').style.display = 'flex'
      currentNovel = null
      currentChapterId = null
      currentDialogues = []
      currentDialogueIndex = 0
      isPlaying = false
    }

    function renderChapters() {
      const list = document.getElementById('chapter-list')
      list.innerHTML = currentNovel.chapters.map(ch => `
        <div class="chapter-item ${currentChapterId === ch.id ? 'active' : ''}" onclick="selectChapter(${ch.id})">
          <span class="chapter-index">${ch.index}.</span>
          <span class="chapter-title">${ch.title}</span>
          <span class="chapter-status ${ch.status}">${ch.status === 'done' ? '✓' : '○'}</span>
        </div>
      `).join('')
    }

    function renderRoles() {
      const list = document.getElementById('role-list')
      list.innerHTML = currentNovel.roles.map(role => `
        <div class="role-item">
          <div class="role-avatar" style="background: ${role.color}">${role.name.charAt(0)}</div>
          <div class="role-info">
            <div class="role-name">${role.name}</div>
            <div class="role-timbre">${voiceNames[role.timbre] || role.timbre}</div>
          </div>
        </div>
      `).join('')
    }

    function selectChapter(chapterId) {
      stopPlayback()
      currentChapterId = chapterId
      currentDialogueIndex = 0
      isPlaying = false

      const chapter = currentNovel.chapters.find(c => c.id === chapterId)
      document.getElementById('toolbar-title').textContent = chapter?.title || '选择章节'

      renderChapters()

      currentDialogues = currentNovel.dialogues[chapterId] || []

      if (currentDialogues.length === 0) {
        document.getElementById('dialogue-area').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <p class="empty-text">该章节暂无内容</p>
            <p class="empty-hint">敬请期待后续更新</p>
          </div>
        `
        document.getElementById('audio-player').style.display = 'none'
      } else {
        renderDialogues()
        document.getElementById('audio-player').style.display = 'block'
        updatePlayerInfo()
      }
    }

    function renderDialogues() {
      const area = document.getElementById('dialogue-area')
      area.innerHTML = currentDialogues.map((d, idx) => {
        const role = currentNovel.roles.find(r => r.name === d.role)
        const isNarrator = d.role === '旁白'
        const roleColor = role?.color || '#6b7280'
        return `
          <div class="dialogue-bubble ${isNarrator ? 'narrator' : ''} ${idx === currentDialogueIndex ? 'active' : ''}" 
               style="border-left-color: ${isNarrator ? 'transparent' : roleColor}"
               onclick="playDialogue(${idx})">
            <div class="dialogue-header">
              ${!isNarrator ? `<span class="role-tag" style="background: ${roleColor}">${d.role}</span>` : ''}
              ${d.emotion ? `<span class="emotion-tag">${d.emotion}</span>` : ''}
            </div>
            <div class="dialogue-content">${d.content}</div>
          </div>
        `
      }).join('')
    }

    function updatePlayerInfo() {
      const role = currentDialogues[currentDialogueIndex]?.role || ''
      document.getElementById('current-role').textContent = role
      document.getElementById('progress-text').textContent = `${currentDialogueIndex + 1} / ${currentDialogues.length}`
      document.getElementById('progress-fill').style.width = `${((currentDialogueIndex + 1) / currentDialogues.length) * 100}%`

      document.getElementById('prev-btn').disabled = currentDialogueIndex === 0
      document.getElementById('next-btn').disabled = currentDialogueIndex >= currentDialogues.length - 1

      const playBtn = document.getElementById('player-play-btn')
      playBtn.textContent = isPlaying ? '⏸' : '▶'

      const toolbarBtn = document.getElementById('play-btn')
      toolbarBtn.textContent = isPlaying ? '⏸ 暂停' : '▶ 播放'
    }

    function togglePlay() {
      if (isPlaying) {
        stopPlayback()
      } else if (currentDialogues.length > 0) {
        isPlaying = true
        playCurrentDialogue()
      }
    }

    function stopPlayback() {
      isPlaying = false
      if (currentAudio) {
        currentAudio.pause()
        currentAudio = null
      }
      window.speechSynthesis?.cancel()
      updatePlayerInfo()
    }

    async function playCurrentDialogue() {
      if (!isPlaying || currentDialogues.length === 0) return

      const dialogue = currentDialogues[currentDialogueIndex]
      if (!dialogue) return

      renderDialogues()
      updatePlayerInfo()

      const role = currentNovel.roles.find(r => r.name === dialogue.role)
      const timbre = role?.timbre || 'zh-CN-XiaoxiaoNeural'
      const emotion = dialogue.emotion || ''
      const rate = emotionModifiers[emotion]?.rate || 1.0

      try {
        const response = await fetch(`${PYTHON_API}/tts/generate-stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: dialogue.content, voice: timbre, rate: rate })
        })

        if (!response.ok) throw new Error('TTS请求失败')

        const blob = await response.blob()
        const audioUrl = URL.createObjectURL(blob)
        currentAudio = new Audio(audioUrl)

        currentAudio.onended = () => {
          URL.revokeObjectURL(audioUrl)
          if (isPlaying && currentDialogueIndex < currentDialogues.length - 1) {
            currentDialogueIndex++
            playCurrentDialogue()
          } else {
            stopPlayback()
          }
        }

        currentAudio.onerror = () => {
          URL.revokeObjectURL(audioUrl)
          stopPlayback()
        }

        await currentAudio.play()
      } catch (e) {
        console.error('Edge TTS失败，降级到浏览器TTS:', e)
        playWithBrowserTTS(dialogue)
      }
    }

    function playWithBrowserTTS(dialogue) {
      const utterance = new SpeechSynthesisUtterance(dialogue.content)
      utterance.lang = 'zh-CN'

      const role = currentNovel.roles.find(r => r.name === dialogue.role)
      const hash = dialogue.role.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0)
      utterance.pitch = Math.max(0.5, Math.min(2, 1 + ((hash % 40) - 20) / 100))
      utterance.rate = Math.max(0.5, Math.min(2, emotionModifiers[dialogue.emotion]?.rate || 1.0))

      const zhVoices = window.speechSynthesis?.getVoices().filter(v => v.lang.startsWith('zh'))
      if (zhVoices?.length > 0) {
        utterance.voice = zhVoices[hash % zhVoices.length]
      }

      utterance.onend = () => {
        if (isPlaying && currentDialogueIndex < currentDialogues.length - 1) {
          currentDialogueIndex++
          playCurrentDialogue()
        } else {
          stopPlayback()
        }
      }

      utterance.onerror = () => stopPlayback()

      window.speechSynthesis?.speak(utterance)
    }

    function playDialogue(index) {
      currentDialogueIndex = index
      isPlaying = true
      playCurrentDialogue()
    }

    function prevDialogue() {
      if (currentDialogueIndex > 0) {
        currentDialogueIndex--
        if (isPlaying) playCurrentDialogue()
        else { renderDialogues(); updatePlayerInfo() }
      }
    }

    function nextDialogue() {
      if (currentDialogueIndex < currentDialogues.length - 1) {
        currentDialogueIndex++
        if (isPlaying) playCurrentDialogue()
        else { renderDialogues(); updatePlayerInfo() }
      }
    }

    function seekDialogue(e) {
      const rect = e.target.getBoundingClientRect()
      const percent = (e.clientX - rect.left) / rect.width
      currentDialogueIndex = Math.floor(percent * currentDialogues.length)
      currentDialogueIndex = Math.max(0, Math.min(currentDialogueIndex, currentDialogues.length - 1))
      if (isPlaying) playCurrentDialogue()
      else { renderDialogues(); updatePlayerInfo() }
    }

    renderNovels()
  </script>
