var currentChar = null;

function selectChar(id) {
  currentChar = characters[id];
  document.querySelectorAll('.char-card').forEach(function(c) { c.classList.remove('selected'); });
  event.currentTarget.classList.add('selected');

  document.getElementById('char-selector').style.display = 'none';
  document.getElementById('chat-area').style.display = 'flex';

  // Clear messages
  var messages = document.getElementById('chat-messages');
  messages.innerHTML = '';

  // Add greeting
  addMessage('system', '你穿越到了' + currentChar.name + '的时代...');
  setTimeout(function() {
    addMessage('npc', currentChar.greeting);
    // Show quick questions
    var quickQ = document.getElementById('quick-questions');
    quickQ.innerHTML = '';
    currentChar.questions.forEach(function(q) {
      var btn = document.createElement('span');
      btn.className = 'quick-q';
      btn.textContent = q;
      btn.onclick = function() {
        document.getElementById('chat-input').value = q;
        sendMessage();
      };
      quickQ.appendChild(btn);
    });
  }, 800);
}

function addMessage(type, text) {
  var messages = document.getElementById('chat-messages');
  var msg = document.createElement('div');
  msg.className = 'msg ' + type;
  if (type === 'npc') {
    msg.innerHTML = '<div class="msg-name">' + currentChar.avatar + ' ' + currentChar.name + '</div>' + text;
  } else {
    msg.textContent = text;
  }
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function getResponse(text) {
  var responses = currentChar.responses;
  var lower = text.toLowerCase();
  // Check for keyword matches
  var keys = Object.keys(responses);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i] === 'default') continue;
    if (lower.indexOf(keys[i]) >= 0) {
      return responses[keys[i]];
    }
  }
  return responses['default'];
}

function sendMessage() {
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if (!text || !currentChar) return;

  addMessage('user', text);
  input.value = '';

  // Show typing indicator
  var typing = document.getElementById('typing-indicator');
  typing.classList.add('show');

  // Simulate response delay
  var delay = 800 + Math.random() * 1200;
  setTimeout(function() {
    typing.classList.remove('show');
    var response = getResponse(text);
    addMessage('npc', response);
  }, delay);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
</script>
