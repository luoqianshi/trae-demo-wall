<!-- 银发顺路帮 - 社区邻里互助小程序 Demo -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>银发顺路帮 - Demo</title>
  <style>
    :root {
      --primary: #c45c3e;
      --primary-light: #e8a090;
      --primary-bg: #fdf6f0;
      --success: #5a8a6e;
      --success-light: #d4e8d9;
      --warning: #e8a838;
      --bg: #f5f0e8;
      --card: #ffffff;
      --ink: #2d2a26;
      --muted: #8a8279;
      --rule: #e0d8ce;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      font-size: 18px;
    }

    /* 手机外壳 */
    .phone-frame {
      max-width: 420px;
      margin: 20px auto;
      background: var(--card);
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
      position: relative;
      min-height: 820px;
    }

    /* 状态栏 */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 8px;
      background: var(--card);
      font-size: 15px;
      font-weight: 600;
    }

    /* 页面头部 */
    .page-header {
      background: linear-gradient(135deg, var(--primary) 0%, #d4735a 100%);
      color: white;
      padding: 20px 20px 30px;
      position: relative;
    }
    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .page-header .subtitle {
      font-size: 15px;
      opacity: 0.9;
    }

    /* 用户角色切换 */
    .role-switcher {
      display: flex;
      background: white;
      margin: -20px 16px 16px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      z-index: 10;
    }
    .role-btn {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 18px;
      border: none;
      background: white;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.3s;
    }
    .role-btn.active {
      background: var(--primary-bg);
      color: var(--primary);
      font-weight: 600;
    }

    /* 页面内容 */
    .page-content {
      padding: 0 16px 90px;
      min-height: 500px;
    }

    /* 卡片 */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--primary-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* 任务卡片 */
    .task-card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--primary);
      position: relative;
      transition: transform 0.2s;
    }
    .task-card:active {
      transform: scale(0.98);
    }
    .task-card.completed {
      border-left-color: var(--success);
      opacity: 0.8;
    }
    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .task-type {
      display: inline-block;
      background: var(--primary-bg);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    .task-urgent {
      background: #fff3e0;
      color: var(--warning);
    }
    .task-location {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .task-desc {
      font-size: 17px;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .task-time {
      font-size: 14px;
      color: var(--muted);
    }
    .task-reward {
      font-size: 16px;
      color: var(--primary);
      font-weight: 600;
    }
    .task-thanks-money {
      font-size: 15px;
      color: var(--warning);
      font-weight: 600;
      background: #fff8e8;
      padding: 3px 10px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* 按钮 */
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #d4735a 100%);
      color: white;
    }
    .btn-primary:active {
      transform: scale(0.97);
    }
    .btn-success {
      background: linear-gradient(135deg, var(--success) 0%, #7ab58a 100%);
      color: white;
    }
    .btn-outline {
      background: white;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .btn-small {
      width: auto;
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 8px;
    }
    .btn-warning {
      background: linear-gradient(135deg, var(--warning) 0%, #f0b848 100%);
      color: white;
    }

    /* 表单 */
    .form-group {
      margin-bottom: 18px;
    }
    .form-label {
      display: block;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--ink);
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--rule);
      border-radius: 12px;
      font-size: 18px;
      background: white;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-textarea {
      min-height: 90px;
      resize: vertical;
    }
    .form-hint {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }
    .form-checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .form-checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 17px;
      background: var(--primary-bg);
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .form-checkbox-item.selected {
      background: var(--primary);
      color: white;
    }
    .form-checkbox-item input {
      display: none;
    }

    /* 感谢金选择 */
    .thanks-money-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .thanks-money-option {
      padding: 10px 18px;
      border: 2px solid var(--rule);
      border-radius: 12px;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
    }
    .thanks-money-option.selected {
      border-color: var(--warning);
      background: #fff8e8;
      color: var(--warning);
      font-weight: 600;
    }

    /* 语音按钮 */
    .voice-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--primary-light);
      background: var(--primary-bg);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 20px;
    }
    .voice-btn:active {
      transform: scale(0.9);
      background: var(--primary-light);
    }
    .voice-btn.listening {
      animation: pulse 1s infinite;
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(196,92,62,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(196,92,62,0); }
    }
    .voice-status {
      font-size: 14px;
      color: var(--primary);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .voice-status .dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* 语音播报按钮 */
    .speak-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--primary-bg);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 16px;
    }
    .speak-btn:hover {
      background: var(--primary-light);
    }
    .speak-btn.speaking {
      background: var(--primary);
      color: white;
      animation: pulse 1s infinite;
    }

    /* 积分显示 */
    .points-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary-bg) 0%, #fff 100%);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      border: 2px dashed var(--primary-light);
    }
    .points-number {
      font-size: 42px;
      font-weight: 700;
      color: var(--primary);
    }
    .points-label {
      font-size: 16px;
      color: var(--muted);
    }

    /* 通知 */
    .notification {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--card);
      padding: 18px 22px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 360px;
      width: 90%;
    }
    .notification.show {
      transform: translateX(-50%) translateY(0);
    }
    .notification-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--success-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .notification-content {
      flex: 1;
    }
    .notification-title {
      font-weight: 600;
      font-size: 17px;
      margin-bottom: 2px;
    }
    .notification-text {
      font-size: 15px;
      color: var(--muted);
    }

    /* 底部导航 */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: var(--card);
      border-top: 1px solid var(--rule);
      padding: 8px 0 22px;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      padding: 6px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-item.active {
      color: var(--primary);
    }
    .nav-icon {
      font-size: 24px;
      margin-bottom: 2px;
    }

    /* 标签页 */
    .tab-bar {
      display: flex;
      background: var(--card);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .tab-item {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 17px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab-item.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 600;
    }

    /* 隐藏 */
    .hidden { display: none !important; }

    /* 动画 */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: slideIn 0.4s ease;
    }

    /* 演示控制器 */
    .demo-controls {
      max-width: 420px;
      margin: 0 auto 20px;
      padding: 0 16px;
    }
    .demo-controls h3 {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 500;
    }
    .scenario-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .scenario-btn {
      padding: 10px 16px;
      border: 2px solid var(--rule);
      border-radius: 20px;
      background: white;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .scenario-btn:hover, .scenario-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-bg);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .icon {
      font-size: 52px;
      margin-bottom: 12px;
    }
    .empty-state p {
      font-size: 16px;
    }

    /* 完成标记 */
    .completed-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--success-light);
      color: var(--success);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    /* 步骤指示器 */
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--rule);
      transition: all 0.3s;
    }
    .step-dot.active {
      background: var(--primary);
      width: 24px;
      border-radius: 4px;
    }

    /* 注册页面 */
    .register-page {
      padding: 20px 16px;
    }
    .register-header {
      text-align: center;
      padding: 30px 0 20px;
    }
    .register-header .logo {
      font-size: 60px;
      margin-bottom: 10px;
    }
    .register-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .register-header p {
      font-size: 16px;
      color: var(--muted);
    }
    .register-form {
      margin-top: 20px;
    }
    .role-select-group {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .role-select-card {
      flex: 1;
      padding: 18px 14px;
      border: 2px solid var(--rule);
      border-radius: 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
    }
    .role-select-card.selected {
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    .role-select-card .role-icon {
      font-size: 36px;
      margin-bottom: 6px;
    }
    .role-select-card .role-name {
      font-size: 17px;
      font-weight: 600;
    }
    .role-select-card .role-desc {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }
    .extra-fields {
      margin-top: 16px;
      padding: 16px;
      background: var(--primary-bg);
      border-radius: 12px;
    }
    .extra-fields-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
    }

    /* 打赏弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-box {
      background: white;
      border-radius: 20px;
      padding: 28px 22px;
      max-width: 360px;
      width: 90%;
      animation: slideUp 0.3s;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
    }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 22px;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
    }

    /* 陪诊注意事项 */
    .notice-box {
      background: #fff8e8;
      border: 2px solid #f0d890;
      border-radius: 12px;
      padding: 16px;
      margin-top: 10px;
    }
    .notice-box .notice-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--warning);
      margin-bottom: 8px;
    }
    .notice-box ul {
      padding-left: 20px;
      font-size: 15px;
      color: var(--ink);
      line-height: 1.8;
    }

    /* 输入行（带语音按钮） */
    .input-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .input-row .form-textarea,
    .input-row .form-input {
      flex: 1;
    }

    /* 社区定位 */
    .location-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .location-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid var(--rule);
      background: white;
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .location-btn:active {
      transform: scale(0.95);
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    .community-suggestions {
      margin-top: 8px;
      border: 2px solid var(--primary-light);
      border-radius: 12px;
      overflow: hidden;
      background: white;
    }
    .community-suggestion-item {
      padding: 14px 16px;
      font-size: 17px;
      cursor: pointer;
      border-bottom: 1px solid var(--rule);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .community-suggestion-item:last-child {
      border-bottom: none;
    }
    .community-suggestion-item:hover,
    .community-suggestion-item:active {
      background: var(--primary-bg);
    }
    .community-suggestion-item .dist {
      font-size: 14px;
      color: var(--muted);
      margin-left: auto;
    }
  </style>
</head>
<body>

  <!-- 演示场景控制 -->
  <div class="demo-controls" id="demo-controls">
    <h3>选择演示场景：</h3>
    <div class="scenario-buttons">
      <button class="scenario-btn active" onclick="loadScenario('scenario1')">场景1：王阿姨帮李奶奶带菜</button>
      <button class="scenario-btn" onclick="loadScenario('scenario2')">场景2：张叔叔帮刘爷爷取快递</button>
      <button class="scenario-btn" onclick="loadScenario('scenario3')">场景3：赵阿姨帮陈奶奶上门看看</button>
    </div>
  </div>

  <!-- 手机框架 -->
  <div class="phone-frame" id="phone-frame">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span>9:41</span>
      <span>银发顺路帮</span>
      <span>5G</span>
    </div>

    <!-- 主内容区域（注册页或应用页） -->
    <div id="main-area">
      <!-- 动态渲染 -->
    </div>
  </div>

  <!-- 通知 -->
  <div class="notification" id="notification">
    <div class="notification-icon" id="notif-icon">&#10003;</div>
    <div class="notification-content">
      <div class="notification-title" id="notif-title">通知标题</div>
      <div class="notification-text" id="notif-text">通知内容</div>
    </div>
  </div>

  <!-- 打赏弹窗容器 -->
  <div id="tip-modal-container"></div>

  <script>
    // ===== 数据状态 =====
    let isRegistered = false;
    let currentUser = null;
    let currentRole = 'requester'; // 'requester' or 'helper'
    let currentTab = 'home';
    let currentScenario = 'scenario1';
    let myPoints = 0;
    let tasksCompleted = 0;
    let myTasks = [];
    let availableTasks = [];
    let selectedTaskType = '代买菜';
    let selectedThanksMoney = 0;
    let customThanksMoney = '';
    let isListening = false;
    let currentSpeakingBtn = null;

    // 场景数据
    const scenarios = {
      scenario1: {
        title: '王阿姨帮李奶奶带菜',
        requester: { name: '李奶奶', age: 78, location: '3号楼2单元', need: '帮忙带一把青菜和半斤豆腐' },
        helper: { name: '王阿姨', age: 62, route: '菜场', background: '退休医护' },
        task: {
          type: '代买菜',

      if (event && event.target) event.target.classList.add('active');

      availableTasks = [{
        ...s.task,
        id: Date.now(),
        status: 'pending',
        requester: s.requester.name,
        helperName: s.helper.name

      showNotification('场景切换', '已加载：' + s.title);
      if (isRegistered) render();

      currentRole = role;

      document.getElementById('role-' + role).classList.add('active');
      render();
    }

    // ===== 切换标签 =====

      currentTab = tab;

      render();

    // ===== 帮忙类型切换 =====
    function onTaskTypeChange() {
      selectedTaskType = document.getElementById('task-type').value;
      selectedThanksMoney = 0;
      const fieldsContainer = document.getElementById('type-specific-fields');
      fieldsContainer.innerHTML = renderTypeSpecificFields(selectedTaskType);
      fieldsContainer.classList.add('animate-in');

      // 陪诊类型时自动设置感谢金必填
      if (selectedTaskType === '陪诊') {
        selectedThanksMoney = 100;
      }
    }

    // ===== 复选框切换 =====
    function toggleCheckItem(el) {
      el.classList.toggle('selected');
      const cb = el.querySelector('input');
      cb.checked = !cb.checked;
    }

    // ===== 感谢金选择 =====
    function selectThanksMoney(el, amount) {
      const parent = el.parentElement;
      parent.querySelectorAll('.thanks-money-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedThanksMoney = amount;

      const customInput = document.getElementById('custom-thanks-input');
      if (amount === -1) {
        customInput.classList.remove('hidden');
      } else {
        customInput.classList.add('hidden');
      }
    }

    // ===== 语音输入（模拟） =====
    function startVoiceInput(targetId, sampleText) {
      if (isListening) return;
      isListening = true;

      const btn = event.target.closest('.voice-btn');
      btn.classList.add('listening');

      // 创建状态提示
      const statusEl = document.createElement('div');
      statusEl.className = 'voice-status';
      statusEl.innerHTML = '&#127908; 正在聆听<span class="dots"></span>';
      btn.parentElement.appendChild(statusEl);

      setTimeout(() => {
        const target = document.getElementById(targetId);
        if (target) {
          target.value = sampleText;
        }
        btn.classList.remove('listening');
        if (statusEl.parentElement) {
          statusEl.remove();
        }
        isListening = false;
        showNotification('语音识别', '已识别完成');
      }, 2000);
    }

    // ===== 语音播报 =====
    function speakText(text) {
      if (currentSpeakingBtn) {
        currentSpeakingBtn.classList.remove('speaking');
        window.speechSynthesis.cancel();
      }

      const btn = event.target.closest('.speak-btn');
      if (btn) {
        currentSpeakingBtn = btn;
        btn.classList.add('speaking');
      }

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.9;
      utterance.pitch = 1;

      utterance.onend = function () {
        if (btn) btn.classList.remove('speaking');
        currentSpeakingBtn = null;
      };
      utterance.onerror = function () {
        if (btn) btn.classList.remove('speaking');
        currentSpeakingBtn = null;
      };

      window.speechSynthesis.speak(utterance);
    }

    // ===== 发布任务 =====
    function publishTask() {
      const type = selectedTaskType;
      const location = document.getElementById('task-location').value;
      const time = document.getElementById('task-time').value;

      // 构建描述
      let desc = '';
      let details = {};

      switch (type) {
        case '代买菜': {
          const list = document.getElementById('field-grocery-list').value;
          const cost = document.getElementById('field-grocery-cost').value;
          desc = list || '帮忙买菜';
          details = { groceryList: list, estimatedCost: cost + '元' };
          break;
        }
        case '代取快递': {
          const code = document.getElementById('field-pickup-code').value;
          const itemDesc = document.getElementById('field-item-desc').value;
          const weight = document.getElementById('field-weight').value;
          desc = (itemDesc || '帮忙取快递') + '，取件码：' + (code || '未填写');
          details = { pickupCode: code, itemDesc, weight };
          break;
        }
        case '上门看看': {
          const target = document.getElementById('field-visit-target').value;
          const checks = [];
          document.querySelectorAll('#field-check-items .form-checkbox-item.selected').forEach(el => {
            checks.push(el.textContent.trim());
          });
          desc = '帮忙看看' + (target || '老人') + '，确认：' + checks.join('、');
          details = { visitTarget: target, checkItems: checks };
          break;
        }
        case '聊天': {
          const duration = document.getElementById('field-chat-duration').value;
          const topic = document.getElementById('field-chat-topic') ? document.getElementById('field-chat-topic').value : '';
          desc = '陪聊' + duration + (topic ? '，话题：' + topic : '');
          details = { duration, topic };
          break;
        }
        case '陪诊': {
          const hospital = document.getElementById('field-hospital').value;
          const dept = document.getElementById('field-department').value;
          const aptTime = document.getElementById('field-appointment-time').value;
          desc = '陪诊：' + (hospital || '') + ' ' + (dept || '') + ' ' + (aptTime || '');
          details = { hospital, department: dept, appointmentTime: aptTime };
          break;
        }
        case '自定义': {
          const customDesc = document.getElementById('field-custom-desc').value;
          desc = customDesc || '自定义需求';
          details = { customDesc };
          break;
        }
      }

      // 计算感谢金
      let thanksMoney = selectedThanksMoney;
      if (thanksMoney === -1) {
        const customVal = document.getElementById('custom-thanks-amount');
        thanksMoney = customVal ? parseInt(customVal.value) || 0 : 0;
      }
      if (type === '陪诊' && thanksMoney === 0) {
        thanksMoney = 100; // 陪诊默认100元
      }

      const newTask = {
        id: Date.now(),
        type,
        desc,
        location,
        time,
        reward: type === '上门看看' ? 2 : 1,
        thanksMoney,
        status: 'pending',
        requester: currentUser ? currentUser.name : '我',
        details
      };

      myTasks.push(newTask);
      availableTasks.push(newTask);

      showNotification('发布成功', '您的需求已发布，等待邻居接单');

      // 模拟收到接单通知
      setTimeout(() => {
        const s = scenarios[currentScenario];
        showNotification('有人接单啦！', (s.helper.name || '帮友') + '接受了您的任务');
        newTask.status = 'accepted';
        newTask.helperName = s.helper.name;
        if (currentTab === 'tasks') render();
      }, 3000);

      render();
    }

    // ===== 接受任务 =====
    // 建议与反馈
    function showFeedbackForm() {
      const container = document.getElementById('page-content');
      container.innerHTML = `
        <div class="animate-in">
          <div style="margin-bottom: 16px;">
            <button class="btn btn-outline" onclick="switchTab('profile')" style="margin-top:0;">&#8592; 返回</button>
          </div>

          <div class="card">
            <div class="card-title">
              <div class="icon">&#128172;</div>
              建议与反馈
            </div>
            <div class="form-group">
              <label class="form-label">您的建议</label>
              <div class="input-row">
                <textarea class="form-textarea" id="feedback-content" placeholder="请告诉我们您的想法或建议，帮助我们做得更好"></textarea>
                <button class="voice-btn" onclick="startVoiceInput('feedback-content', '希望增加更多帮忙类型')" title="语音输入">&#127908;</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">联系方式（选填）</label>
              <div class="input-row">
                <input type="tel" class="form-input" id="feedback-contact" placeholder="方便我们联系您">
                <button class="voice-btn" onclick="startVoiceInput('feedback-contact', '')" title="语音输入">&#127908;</button>
              </div>
            </div>
            <button class="btn btn-primary" onclick="submitFeedback()">提交反馈</button>
          </div>
        </div>
      `;
    }

    function submitFeedback() {
      const content = document.getElementById('feedback-content').value.trim();
      if (!content) {
        showNotification('提示', '请输入您的建议');
        return;
      }
      showNotification('感谢反馈', '您的建议已提交，我们会认真改进！');
      switchTab('profile');
    }

    // 查看任务详情（帮友视角）
    function showTaskDetail(taskId) {
      const task = availableTasks.find(t => t.id === taskId);
      if (!task) return;

      const container = document.getElementById('page-content');
      container.innerHTML = `
        <div class="animate-in">
          <div style="margin-bottom: 16px;">
            <button class="btn btn-outline" onclick="switchTab('tasks')" style="margin-top:0;">&#8592; 返回任务列表</button>
          </div>

          <div class="card">
            <div class="card-title">
              <div class="icon">&#128203;</div>
              任务详情
            </div>
            <div style="font-size: 17px; line-height: 2;">
              <p><strong>类型：</strong>${task.type}</p>
              <p><strong>需求：</strong>${task.desc}</p>
              <p><strong>地址：</strong>${task.location}</p>
              <p><strong>时间：</strong>${task.time}</p>
              ${task.thanksMoney > 0 ? '<p><strong>感谢金：</strong>&#128176; ' + task.thanksMoney + '元</p>' : '<p><strong>奖励：</strong>+' + task.reward + ' 时间币</p>'}
              <p><strong>发布人：</strong>${task.requester || '邻居'}</p>
              <p><strong>联系电话：</strong><a href="tel:13800138000" style="color: var(--primary); font-size: 20px; font-weight: 600;">138-0013-8000</a></p>
            </div>
          </div>

          <button class="btn btn-primary" onclick="acceptTask(${task.id})">我来帮忙</button>
        </div>
      `;
    }

    function acceptTask(taskId) {
      const task = availableTasks.find(t => t.id === taskId);
      if (task) {
        task.status = 'accepted';
        task.acceptedBy = 'me';
        if (task.thanksMoney > 0) {
          showNotification('接单成功', '感谢金' + task.thanksMoney + '元已自动锁定，请按约定时间完成帮忙');
        } else {
          showNotification('接单成功', '请按约定时间完成帮忙');
        }
        render();
      }
    }

    // ===== 完成任务 =====
    function completeTask(taskId) {
      const task = availableTasks.find(t => t.id === taskId);
      if (task) {
        task.status = 'completed';
        myPoints += task.reward;
        tasksCompleted++;
        let msg = '获得 ' + task.reward + ' 时间币！';
        if (task.thanksMoney > 0) {
          msg += ' 感谢金' + task.thanksMoney + '元已到账';
        }
        showNotification('任务完成', msg);
        render();
      }
    }

    // ===== 追加打赏弹窗 =====
    function showTipModal(taskId) {
      const container = document.getElementById('tip-modal-container');
      container.innerHTML = `
        <div class="modal-overlay" onclick="closeTipModal(event)">
          <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-title">&#127881; 追加打赏</div>
            <div class="form-group">
              <label class="form-label">打赏金额</label>
              <div class="thanks-money-options">
                <div class="thanks-money-option" onclick="selectTipAmount(this, 5)">5元</div>
                <div class="thanks-money-option" onclick="selectTipAmount(this, 10)">10元</div>
                <div class="thanks-money-option" onclick="selectTipAmount(this, 20)">20元</div>
                <div class="thanks-money-option" onclick="selectTipAmount(this, -1)">自定义</div>
              </div>
              <div id="tip-custom-input" class="hidden" style="margin-top:10px;">
                <div class="input-row">
                  <input type="number" class="form-input" id="tip-custom-amount" placeholder="输入金额（元）" min="1">
                  <button class="voice-btn" onclick="startVoiceInput('tip-custom-amount', '15')" title="语音输入">&#127908;</button>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">打赏留言（可选）</label>
              <div class="input-row">
                <textarea class="form-textarea" id="tip-message" placeholder="感谢帮友的辛苦付出"></textarea>
                <button class="voice-btn" onclick="startVoiceInput('tip-message', '谢谢您，辛苦了')" title="语音输入">&#127908;</button>
              </div>
            </div>
            <button class="btn btn-warning" onclick="submitTip(${taskId})">确认打赏</button>
            <button class="btn btn-outline" onclick="closeTipModal()" style="margin-top:8px;">取消</button>
          </div>
        </div>
      `;
    }

    let selectedTipAmount = 0;

    function selectTipAmount(el, amount) {
      const parent = el.parentElement;
      parent.querySelectorAll('.thanks-money-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedTipAmount = amount;

      const customInput = document.getElementById('tip-custom-input');
      if (amount === -1) {
        customInput.classList.remove('hidden');
      } else {
        customInput.classList.add('hidden');
      }
    }

    function submitTip(taskId) {
      let amount = selectedTipAmount;
      if (amount === -1) {
        amount = parseInt(document.getElementById('tip-custom-amount').value) || 0;
      }
      if (amount <= 0) {
        showNotification('提示', '请选择或输入打赏金额');
        return;
      }

      const task = availableTasks.find(t => t.id === taskId);
      if (task) {
        task.thanksMoney += amount;
      }

      closeTipModal();
      showNotification('打赏成功', '感谢您的慷慨打赏 ' + amount + ' 元！');
      render();
    }

    function closeTipModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('tip-modal-container').innerHTML = '';
    }

    // ===== 显示通知 =====
    function showNotification(title, text) {
      const notif = document.getElementById('notification');
      document.getElementById('notif-title').textContent = title;
      document.getElementById('notif-text').textContent = text;
      notif.classList.add('show');

      setTimeout(() => {
        notif.classList.remove('show');
      }, 3000);
    }

    // ===== 子标签切换 =====
    function switchSubTab(element, tabName) {
      const parent = element.parentElement;
      parent.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      element.classList.add('active');

      // Find sibling containers
      const wrapper = parent.parentElement;
      Array.from(wrapper.children).forEach(child => {
        if (child.classList.contains('tab-bar')) return;
        if (child.id === 'subtab-' + tabName) {
          child.classList.remove('hidden');
        } else if (child.id && child.id.startsWith('subtab-')) {
          child.classList.add('hidden');
        }
      });
    }

    // ===== 初始化 =====
    init();
  </script>
</body>
</html>
