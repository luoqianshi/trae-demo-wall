<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>别做 Notdo - 真实踩坑案例社区</title>
    <style>
        :root {
            --bg: #0d0d0b;
            --panel: #171713;
            --panel-soft: #202019;
            --card: #f7f1df;
            --card-muted: #ede4ca;
            --ink: #211f19;
            --muted: #8f896e;
            --line: rgba(247, 241, 223, 0.16);
            --danger: #f05a3b;
            --warn: #f1b33b;
            --ok: #6fbf73;
            --accent: #d8ff58;
            --white: #fffaf0;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
            --radius-lg: 28px;
            --radius-md: 18px;
            --radius-sm: 12px;
        }

        /* 红黑主题 */
        [data-theme="red-black"] {
            --bg: #0a0a0a;
            --panel: #151515;
            --panel-soft: #221818;
            --card: #fff5f5;
            --card-muted: #ffe8e8;
            --ink: #1a1a1a;
            --muted: #8a7878;
            --line: rgba(255, 245, 245, 0.12);
            --danger: #e53935;
            --warn: #ff6f60;
            --ok: #4caf50;
            --accent: #ff3d3d;
            --white: #ffffff;
            --shadow: 0 24px 80px rgba(229, 57, 53, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-width: 1180px;
            color: var(--white);
            background:
                radial-gradient(circle at 10% 0%, rgba(216, 255, 88, 0.16), transparent 28%),
                radial-gradient(circle at 88% 12%, rgba(240, 90, 59, 0.20), transparent 30%),
                linear-gradient(135deg, #0d0d0b 0%, #171713 48%, #11100d 100%);
            font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
            transition: background 0.5s ease, color 0.3s ease;
        }

        [data-theme="red-black"] body,
        body[data-theme="red-black"] {
            background:
                radial-gradient(circle at 10% 0%, rgba(255, 61, 61, 0.18), transparent 28%),
                radial-gradient(circle at 88% 12%, rgba(229, 57, 53, 0.25), transparent 30%),
                linear-gradient(135deg, #0a0a0a 0%, #151515 48%, #0d0808 100%);
        }

        /* 主题切换动画 */
        .theme-transition * {
            transition: background-color 0.5s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.16;
            background-image:
                linear-gradient(rgba(255, 250, 240, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 250, 240, 0.08) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, black, transparent 80%);
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .app-shell {
            position: relative;
            max-width: 1440px;
            margin: 0 auto;
            padding: 28px 32px 56px;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 22px;
            backdrop-filter: blur(18px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            color: var(--bg);
            background: var(--accent);
            border: 2px solid var(--white);
            border-radius: 16px;
            font-size: 26px;
            font-weight: 900;
            box-shadow: 6px 6px 0 rgba(240, 90, 59, 0.95);
        }

        .brand-title {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.08em;
        }

        .brand-title span {
            color: var(--accent);
        }

        .brand-subtitle {
            margin: 3px 0 0;
            color: rgba(255, 250, 240, 0.58);
            font-size: 12px;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 250, 240, 0.04);
            color: var(--white);
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .theme-toggle:hover {
            border-color: rgba(216, 255, 88, 0.5);
            background: rgba(216, 255, 88, 0.08);
        }

        [data-theme="red-black"] .theme-toggle:hover {
            border-color: rgba(255, 61, 61, 0.5);
            background: rgba(255, 61, 61, 0.08);
        }

        .theme-icon {
            font-size: 18px;
            line-height: 1;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) 380px;
            gap: 28px;
            align-items: stretch;
            margin-top: 12px;
        }

        .hero-main {
            position: relative;
            overflow: hidden;
            padding: 32px 36px;
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background:
                linear-gradient(135deg, rgba(247, 241, 223, 0.12), rgba(247, 241, 223, 0.03)),
                var(--panel);
            box-shadow: var(--shadow);
        }

        .hero-main::after {
            content: "NOT DO";
            position: absolute;
            right: -26px;
            bottom: -34px;
            color: transparent;
            -webkit-text-stroke: 1px rgba(216, 255, 88, 0.25);
            font-size: 96px;
            font-weight: 900;
            letter-spacing: -0.08em;
            pointer-events: none;
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.12em;
        }

        .kicker::before {
            content: "";
            width: 34px;
            height: 2px;
            background: var(--accent);
        }

        .hero h2 {
            position: relative;
            z-index: 1;
            margin: 14px 0 14px;
            max-width: 850px;
            font-size: 44px;
            line-height: 1.08;
            letter-spacing: -0.06em;
        }

        .hero h2 em {
            color: var(--accent);
            font-style: normal;
        }

        .hero-desc {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0 0 20px;
            color: rgba(255, 250, 240, 0.68);
            font-size: 15px;
            line-height: 1.75;
        }

        .search-panel {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            max-width: 820px;
            border: 1px solid rgba(216, 255, 88, 0.36);
            border-radius: 24px;
            background: rgba(13, 13, 11, 0.78);
            box-shadow: inset 0 0 0 1px rgba(255, 250, 240, 0.05);
        }

        .search-panel input {
            width: 100%;
            border: 0;
            outline: 0;
            color: var(--white);
            background: transparent;
            padding: 15px 14px;
            font-size: 18px;
        }

        .search-panel input::placeholder {
            color: rgba(255, 250, 240, 0.38);
        }

        .search-btn {
            flex: 0 0 auto;
            border: 0;
            border-radius: 18px;
            padding: 15px 26px;
            color: var(--bg);
            background: var(--accent);
            font-weight: 900;
            box-shadow: 0 10px 24px rgba(216, 255, 88, 0.18);
        }

        .hotwords {
            position: relative;
            z-index: 2;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .hotword {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 12px;
            color: rgba(255, 250, 240, 0.68);
            background: rgba(255, 250, 240, 0.04);
        }

        .hotword:hover {
            color: var(--accent);
            border-color: rgba(216, 255, 88, 0.6);
        }

        .hero-side {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 18px;
        }

        .risk-card,
        .upload-card,
        .section-card {
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: rgba(247, 241, 223, 0.08);
            box-shadow: var(--shadow);
        }

        .risk-card {
            padding: 28px;
        }

        .risk-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .risk-title h3 {
            margin: 0;
            font-size: 22px;
        }

        .risk-index {
            width: 78px;
            height: 78px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(240, 90, 59, 0.5);
            border-radius: 50%;
            color: var(--danger);
            background: rgba(240, 90, 59, 0.12);
            font-size: 28px;
            font-weight: 900;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-item {
            padding: 16px;
            border-radius: 18px;
            background: rgba(13, 13, 11, 0.42);
        }

        .stat-value {
            display: block;
            color: var(--accent);
            font-size: 25px;
            font-weight: 900;
        }

        .stat-label {
            color: rgba(255, 250, 240, 0.55);
            font-size: 13px;
        }

        .upload-card {
            padding: 20px;
        }

        .favorite-card {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 64px;
        }

        .favorite-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .favorite-card .section-title {
            margin: 0;
            font-size: 17px;
            display: inline;
        }

        .favorite-card .section-title small {
            margin-left: 0.4em;
            font-size: 14px;
        }

        .favorite-toggle {
            font-size: 12px;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }

        .favorite-drawer {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 420px;
            background: var(--panel);
            border-left: 1px solid var(--line);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease, box-shadow 0.35s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .favorite-drawer.open {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
            box-shadow: var(--shadow);
        }

        .favorite-drawer-header {
            padding: 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .favorite-drawer-header h3 {
            margin: 0;
            font-size: 20px;
        }

        .favorite-drawer-close {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            background: rgba(247, 241, 223, 0.1);
            border: none;
            border-radius: 50%;
            color: var(--white);
            font-size: 20px;
            cursor: pointer;
        }

        .favorite-drawer-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .favorite-drawer-item {
            padding: 16px;
            background: rgba(247, 241, 223, 0.06);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .favorite-drawer-item:hover {
            background: rgba(247, 241, 223, 0.12);
        }

        .favorite-drawer-item strong {
            display: block;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .favorite-drawer-item span {
            color: rgba(255, 250, 240, 0.58);
            font-size: 13px;
        }

        .favorite-drawer-empty {
            padding: 48px 24px;
            text-align: center;
            color: rgba(255, 250, 240, 0.58);
        }

        .upload-card h3 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .upload-card p {
            margin: 0 0 16px;
            color: rgba(255, 250, 240, 0.58);
            line-height: 1.7;
            font-size: 13px;
        }

        .upload-steps {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .upload-steps span {
            padding: 10px 8px;
            border: 1px dashed rgba(255, 250, 240, 0.22);
            border-radius: 12px;
            color: rgba(255, 250, 240, 0.62);
            text-align: center;
            font-size: 12px;
        }

        .content-layout {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 24px;
            margin-top: 28px;
            align-items: start;
        }

        .left-rail,
        .right-rail {
            position: sticky;
            top: 100px;
        }

        .section-card {
            padding: 22px;
            margin-bottom: 18px;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 0 16px;
            font-size: 17px;
        }

        .section-title small {
            color: rgba(255, 250, 240, 0.42);
            font-weight: 400;
        }

        .tag-list {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .tag-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid transparent;
            border-radius: 15px;
            padding: 12px 13px;
            color: rgba(255, 250, 240, 0.72);
            background: rgba(255, 250, 240, 0.05);
            text-align: left;
            transition: 0.18s ease;
        }

        .tag-btn:hover,
        .tag-btn.active {
            color: var(--bg);
            background: var(--accent);
            border-color: var(--accent);
        }

        .tag-btn b {
            font-size: 12px;
            opacity: 0.72;
        }

        .feed-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            padding: 18px 20px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: rgba(247, 241, 223, 0.08);
        }

        .feed-toolbar h3 {
            margin: 0 0 4px;
            font-size: 22px;
        }

        .feed-toolbar p {
            margin: 0;
            color: rgba(255, 250, 240, 0.56);
            font-size: 13px;
        }

        .sort-tabs {
            display: inline-flex;
            gap: 8px;
            padding: 5px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(13, 13, 11, 0.36);
        }

        .sort-tab {
            border: 0;
            border-radius: 999px;
            padding: 8px 13px;
            color: rgba(255, 250, 240, 0.66);
            background: transparent;
        }

        .sort-tab.active {
            color: var(--bg);
            background: var(--white);
        }

        .feed-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            align-items: start;
        }

        .case-card {
            overflow: hidden;
            color: var(--ink);
            border-radius: var(--radius-md);
            background: var(--card);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .case-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 46px rgba(0, 0, 0, 0.32);
        }

        .case-card-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px 4px;
        }

        .case-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .case-chip {
            border-radius: 999px;
            padding: 4px 8px;
            color: #4c4734;
            background: rgba(33, 31, 25, 0.08);
            font-size: 11px;
            font-weight: 700;
        }

        .risk-high {
            color: #8f2414;
            background: rgba(240, 90, 59, 0.16);
        }

        .risk-mid {
            color: #835814;
            background: rgba(241, 179, 59, 0.20);
        }

        .case-title {
            margin: 0;
            font-size: 19px;
            line-height: 1.3;
            letter-spacing: -0.03em;
        }

        .case-summary {
            margin: 10px 18px 14px;
            color: #4c4734;
            font-size: 13px;
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .case-reason {
            margin: 0 18px 14px;
            padding: 12px;
            border-left: 3px solid var(--danger);
            border-radius: 12px;
            background: rgba(240, 90, 59, 0.10);
            color: #3d3829;
            font-size: 12px;
            line-height: 1.7;
        }

        .metric-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 24px 20px;
        }

        .metric {
            min-height: 74px;
            padding: 13px;
            border-radius: 16px;
            background: var(--card-muted);
        }

        .metric span {
            display: block;
            color: #7f7656;
            font-size: 12px;
        }

        .metric strong {
            display: block;
            margin-top: 4px;
            font-size: 18px;
        }

        .case-card-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            padding: 10px 18px 14px;
        }

        .source-line {
            color: #6b644b;
            font-size: 13px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .ghost-btn,
        .dark-btn {
            border-radius: 999px;
            padding: 10px 14px;
            font-weight: 800;
        }

        .ghost-btn {
            border: 1px solid rgba(33, 31, 25, 0.18);
            color: var(--ink);
            background: transparent;
        }

        .ghost-btn.faved {
            color: var(--bg);
            border-color: var(--warn);
            background: var(--warn);
        }

        .ghost-btn.heartbeat {
            animation: heartbeat 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.25); }
            50% { transform: scale(1.1); }
            75% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .dark-btn {
            border: 1px solid var(--ink);
            color: var(--white);
            background: var(--ink);
        }

        .trend-list,
        .favorite-list,
        .similar-list {
            display: grid;
            gap: 12px;
        }

        .trend-item,
        .favorite-item,
        .similar-item {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            background: rgba(13, 13, 11, 0.36);
        }

        .trend-item strong,
        .favorite-item strong,
        .similar-item strong {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .trend-item span,
        .favorite-item span,
        .similar-item span {
            color: rgba(255, 250, 240, 0.52);
            font-size: 12px;
        }

        .empty-state {
            padding: 60px 36px;
            border: 1px dashed rgba(255, 250, 240, 0.24);
            border-radius: 20px;
            color: rgba(255, 250, 240, 0.56);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .empty-state-icon {
            font-size: 64px;
            line-height: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .empty-state h3 {
            margin: 0;
            font-size: 20px;
            color: rgba(255, 250, 240, 0.88);
            font-weight: 700;
        }

        .empty-state p {
            margin: 0;
            font-size: 14px;
            color: rgba(255, 250, 240, 0.56);
            line-height: 1.6;
        }

        .empty-state-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .empty-state-btn {
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(216, 255, 88, 0.1);
            border: 1px solid rgba(216, 255, 88, 0.3);
            color: var(--accent);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .empty-state-btn:hover {
                background: rgba(216, 255, 88, 0.2);
            }

            /* AI死亡报告样式 */
            .death-report {
                grid-column: 1/-1;
                margin-bottom: 24px;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: var(--radius-lg);
                padding: 20px 24px;
                box-shadow: var(--shadow);
                animation: slideDown 0.4s ease;
            }

            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-15px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* 加载动画 */
            .death-report-loading {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 30px 0;
                justify-content: center;
            }

            .loading-spinner {
                width: 32px;
                height: 32px;
                border: 3px solid var(--line);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            [data-theme="red-black"] .loading-spinner {
                border-top-color: var(--danger);
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .loading-text {
                font-size: 14px;
                color: rgba(255, 250, 240, 0.7);
                animation: pulse 1.5s ease-in-out infinite;
            }

            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.6; }
            }

            .death-report-part {
                opacity: 0;
                transform: translateY(8px);
            }

            .death-report-part.show {
                animation: fadeInUp 0.4s ease forwards;
            }

            @keyframes fadeInUp {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .death-report-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 16px;
                padding-bottom: 12px;
                border-bottom: 1px solid var(--line);
            }

            .death-report-title {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 18px;
                font-weight: 700;
                color: var(--white);
            }

            .death-report-stats {
                display: flex;
                gap: 20px;
            }

            .death-stat-item {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .death-stat-value {
                font-size: 24px;
                font-weight: 900;
                color: var(--accent);
            }

            .death-stat-value.high-risk {
                color: var(--danger);
            }

            .death-stat-label {
                font-size: 12px;
                color: rgba(255, 250, 240, 0.6);
                margin-top: 2px;
            }

            .death-report-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .death-report-section {
                background: rgba(255, 250, 240, 0.04);
                border-radius: var(--radius-md);
                padding: 14px 16px;
            }

            .death-report-section h4 {
                font-size: 14px;
                font-weight: 700;
                color: var(--white);
                margin: 0 0 10px 0;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .death-report-section ul {
                margin: 0;
                padding-left: 18px;
                color: rgba(255, 250, 240, 0.8);
                font-size: 13px;
                line-height: 1.7;
            }

            .death-report-section ul li {
                margin-bottom: 4px;
            }

            .death-report-advice {
                grid-column: 1/-1;
                background: rgba(216, 255, 88, 0.08);
                border: 1px solid rgba(216, 255, 88, 0.2);
                border-radius: var(--radius-md);
                padding: 14px 16px;
                margin-top: 4px;
            }

            .death-report-advice h4 {
                color: var(--accent);
                font-size: 14px;
                font-weight: 700;
                margin: 0 0 8px 0;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .death-report-advice p {
                margin: 0;
                color: rgba(255, 250, 240, 0.9);
                font-size: 14px;
                line-height: 1.7;
            }

            [data-theme="red-black"] .death-stat-value {
                color: var(--danger);
            }

            [data-theme="red-black"] .death-report-advice {
                background: rgba(255, 61, 61, 0.08);
                border-color: rgba(255, 61, 61, 0.2);
            }

            [data-theme="red-black"] .death-report-advice h4 {
                color: var(--danger);
            }

        /* ========== 案例详情弹窗 ========== */
        .detail-drawer {
            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 40;
            width: 820px;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            color: var(--ink);
            background: var(--card);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(247, 241, 223, 0.08);
            border-radius: var(--radius-lg);
            transform: translate(-50%, -50%) scale(0.9) translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.28s ease, box-shadow 0.35s ease;
            overflow: hidden;
        }

        .detail-drawer.open {
            transform: translate(-50%, -50%) scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 28px 100px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(247, 241, 223, 0.08);
        }

        .detail-drawer-header {
            flex-shrink: 0;
            padding: 32px 36px 20px;
            border-bottom: 1px solid rgba(33, 31, 25, 0.08);
        }

        .detail-drawer-header .drawer-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .detail-drawer-header h2 {
            margin: 0;
            font-size: 32px;
            line-height: 1.22;
            letter-spacing: -0.04em;
            font-weight: 900;
        }

        .detail-drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 28px 36px;
        }

        /* 自定义滚动条 */
        .detail-drawer-body::-webkit-scrollbar {
            width: 6px;
        }

        .detail-drawer-body::-webkit-scrollbar-track {
            background: transparent;
            margin: 8px 0;
        }

        .detail-drawer-body::-webkit-scrollbar-thumb {
            background: rgba(33, 31, 25, 0.18);
            border-radius: 99px;
        }

        .detail-drawer-body::-webkit-scrollbar-thumb:hover {
            background: rgba(33, 31, 25, 0.32);
        }

        .detail-drawer-footer {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 36px;
            border-top: 1px solid rgba(33, 31, 25, 0.08);
            background: var(--card);
        }

        .detail-drawer-footer .case-counter {
            font-size: 13px;
            color: rgba(33, 31, 25, 0.46);
        }

        .detail-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 13px 24px;
            border: 1px solid rgba(33, 31, 25, 0.12);
            border-radius: 14px;
            background: transparent;
            color: var(--ink);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
            letter-spacing: 0.02em;
        }

        .detail-nav-btn:hover {
            background: var(--ink);
            color: var(--card);
            border-color: var(--ink);
        }

        .detail-nav-btn:disabled {
            opacity: 0.28;
            cursor: not-allowed;
            pointer-events: none;
        }

        .detail-nav-btn .nav-arrow {
            font-size: 18px;
            line-height: 1;
        }

        .drawer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 38px;
            height: 38px;
            border: 1px solid rgba(33, 31, 25, 0.12);
            border-radius: 50%;
            color: var(--ink);
            background: transparent;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s ease;
            z-index: 2;
        }

        .drawer-close:hover {
            background: var(--ink);
            color: var(--card);
        }

        .drawer-mask {
            position: fixed;
            inset: 0;
            z-index: 35;
            opacity: 0;
            pointer-events: none;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            transition: opacity 0.28s ease, background 0.28s ease, backdrop-filter 0.28s ease;
        }

        .drawer-mask.open {
            opacity: 1;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.52);
            backdrop-filter: blur(4px);
        }

        .detail-section {
            margin-bottom: 28px;
        }

        .detail-section:last-child {
            margin-bottom: 0;
        }

        .detail-section h3 {
            margin: 0 0 14px;
            font-size: 15px;
            font-weight: 700;
            color: rgba(33, 31, 25, 0.54);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .detail-section p,
        .detail-section li {
            color: #423d2d;
            line-height: 1.8;
            font-size: 15px;
        }

        .detail-section ul {
            margin: 0;
            padding-left: 20px;
        }

        .detail-section ul li {
            margin-bottom: 6px;
        }

        .detail-section .highlight-box {
            padding: 20px 24px;
            border-radius: 16px;
            background: var(--card-muted);
            border: 1px solid rgba(33, 31, 25, 0.06);
        }

        .detail-section .highlight-box p {
            margin: 0 0 10px;
        }

        .detail-section .highlight-box p:last-child {
            margin-bottom: 0;
        }

        .original-text {
            white-space: normal;
            line-height: 1.9;
            font-size: 15px;
            padding: 20px 24px;
            background: var(--card-muted);
            border-radius: 16px;
            border: 1px solid rgba(33, 31, 25, 0.06);
        }

        .original-text p {
            margin: 0 0 12px;
        }

        .original-text p:last-child {
            margin-bottom: 0;
        }

        .inline-link {
            border: 0;
            padding: 0;
            color: #9b321f;
            background: transparent;
            font-weight: 900;
        }

        /* 弹窗内相似案例列表 */
        .detail-drawer .similar-list {
            display: grid;
            gap: 10px;
        }

        .detail-drawer .similar-item {
            display: block;
            width: 100%;
            text-align: left;
            border: 1px solid rgba(33, 31, 25, 0.1);
            border-radius: 14px;
            padding: 16px;
            background: var(--card-muted);
            cursor: pointer;
            transition: 0.2s ease;
        }

        .detail-drawer .similar-item:hover {
            border-color: var(--ink);
            background: rgba(33, 31, 25, 0.04);
        }

        .detail-drawer .similar-item strong {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--ink);
        }

        .detail-drawer .similar-item span {
            color: rgba(33, 31, 25, 0.5);
            font-size: 13px;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            z-index: 60;
            padding: 12px 18px;
            border-radius: 999px;
            color: var(--bg);
            background: var(--accent);
            box-shadow: 0 18px 46px rgba(0, 0, 0, 0.32);
            transform: translate(-50%, 120px);
            opacity: 0;
            transition: 0.22s ease;
            font-weight: 900;
        }

        .toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        .scrolling-slogan {
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: 0.32s ease;
        }

        .scrolling-slogan.show {
            opacity: 1;
        }

        .scrolling-slogan span {
            color: var(--white);
            font-weight: 400;
            font-size: 24px;
            letter-spacing: 0.08em;
        }

        .scrolling-slogan em {
            color: var(--accent);
            font-style: normal;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 0.08em;
        }
    </style>

    <!-- ========== 移动端适配 ========== -->

<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">别</div>
                <div>
                    <h1 class="brand-title">别做 <span>Notdo</span></h1>
                    <p class="brand-subtitle">真实案例驱动的经验搜索社区</p>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="scrolling-slogan" id="scrollingSlogan">
                    <span>看看有多少人，</span>
                    <em>死在你想做的项目上。</em>
                </div>
                <button class="theme-toggle" id="themeToggle" title="切换主题">
                    <span class="theme-icon" id="themeIcon">🎨</span>
                    <span id="themeLabel">默认</span>
                </button>
            </div>
        </header>

        <section class="hero">
            <div class="hero-main">
                <span class="kicker">BEFORE YOU START</span>
                <h2>看看有多少人，<br>死在你想做的<em>项目</em>上。</h2>
                <p class="hero-desc">
                    Notdo 把长篇踩坑资料拆成可搜索、可收藏、可对比的案例卡片。你不是来读故事，
                    你是来找答案：这个项目还能不能做，风险在哪里，别人为什么亏钱。
                </p>
                <div class="search-panel">
                    <input id="searchInput" type="search" placeholder="搜索项目、行业、关键词，例如：菜鸟驿站 / 手游代理 / 奶茶加盟">
                    <button class="search-btn" id="searchBtn">搜索案例</button>
                </div>
                <div class="hotwords" id="hotwords"></div>
            </div>

            <aside class="hero-side">
                <div class="risk-card">
                    <div class="risk-title">
                        <h3>今日风险雷达</h3>
                        <div class="risk-index">82</div>
                    </div>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="totalCases">0</span>
                            <span class="stat-label">已结构化案例</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">31</span>
                            <span class="stat-label">失败案例样例</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">¥1.8w</span>
                            <span class="stat-label">平均亏损示例</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">6</span>
                            <span class="stat-label">高频失败原因</span>
                        </div>
                    </div>
                </div>

                <div class="upload-card favorite-card">
                    <div class="favorite-header">
                        <h3 class="section-title">我的收藏 <small id="favoriteCount">0</small></h3>
                        <button class="favorite-toggle" id="favoriteToggle">查看全部</button>
                    </div>
                </div>
            </aside>
        </section>

        <main class="content-layout">
            <aside class="left-rail">
                <section class="section-card">
                    <h3 class="section-title">标签频道 <small>筛选</small></h3>
                    <div class="tag-list" id="tagList"></div>
                </section>
            </aside>

            <section class="feed-main">
                
                <div class="feed-list" id="feedList"></div>
            </section>
        </main>
    </div>

    <div class="drawer-mask" id="drawerMask"></div>
    <aside class="detail-drawer" id="detailDrawer"></aside>
    <aside class="favorite-drawer" id="favoriteDrawer">
        <div class="favorite-drawer-header">
            <h3>我的收藏 <small id="favoriteDrawerCount">0</small></h3>
            <button class="favorite-drawer-close" id="closeFavoriteDrawer">×</button>
        </div>
        <div class="favorite-drawer-list" id="favoriteDrawerList"></div>
    </aside>
    <div class="toast" id="toast">已更新</div>

    <script src="cases-data.js"></script>
    <script>
        const CASES = Array.isArray(window.CASES) ? window.CASES : [];
        // 从实际数据中提取所有标签
        const allTags = new Set();
        CASES.forEach(item => {
            if (item.category && item.category !== "其他") {
                allTags.add(item.category);
            }
        });
        const TAGS = ["全部", ...Array.from(allTags).sort()];

        const HOTWORDS = ["菜鸟驿站", "手游代理", "奶茶加盟", "短视频带货", "手机挂机", "电商培训"];
        const ITEMS_PER_PAGE = 9;

        // AI死亡报告数据
        const DEATH_REPORTS = {
            "菜鸟驿站": {
                riskScore: 82,
                topReasons: ["派件费持续降低", "电商平台政策变化", "人流量不足包裹量不够"],
                deathCycle: "6-12个月",
                typicalProject: "XX小区菜鸟驿站",
                whyPossible: ["快递需求稳定存在", "品牌效应引流"],
                whyNot: ["利润微薄，仅靠派件难以为继", "前期投入高（转让费、押金、装修）"],
                aiAdvice: "实地考察3公里内同行分布，计算日均包裹量200件以上才考虑。"
            },
            "手游代理": {
                riskScore: 95,
                topReasons: ["灰色地带风险", "虚假承诺无实际扶持", "市场饱和竞争激烈"],
                deathCycle: "1-3个月",
                typicalProject: "XX手游联运平台",
                whyPossible: ["游戏行业前景好", "入门门槛低"],
                whyNot: ["90%以上代理商无法盈利", "涉及灰色地带风险极高"],
                aiAdvice: "直接放弃！真正的游戏代理需要资质和资源，普通人做不了。"
            },
            "奶茶加盟": {
                riskScore: 92,
                topReasons: ["加盟费虚高", "选址靠碰运气", "无运营扶持"],
                deathCycle: "3-8个月",
                typicalProject: "XX知名奶茶品牌",
                whyPossible: ["奶茶品类刚需", "品牌自带流量"],
                whyNot: ["95%以上不盈利", "原材料成本被控制"],
                aiAdvice: "自己学技术开店比加盟强，加盟的钱90%是智商税。"
            },
            "短视频带货": {
                riskScore: 88,
                topReasons: ["MCN割韭菜培训", "平台算法频繁变化", "竞争极其激烈"],
                deathCycle: "1-6个月",
                typicalProject: "抖音/快手带货账号",
                whyPossible: ["短视频是趋势", "成功案例看起来很美"],
                whyNot: ["千分之一的成功率", "平台算法变化无常"],
                aiAdvice: "作为兴趣可以，不要全职，更不要交钱参加培训。"
            },
            "手机挂机": {
                riskScore: 100,
                topReasons: ["100%是骗局", "拉人头模式", "涉及违法APP"],
                deathCycle: "1-4周",
                typicalProject: "XX自动刷视频赚钱",
                whyPossible: ["听起来很美好"],
                whyNot: ["连电费都赚不回", "可能违法"],
                aiAdvice: "立即拉黑！所有挂机赚钱都是诈骗，不要有任何侥幸心理。"
            },
            "电商培训": {
                riskScore: 90,
                topReasons: ["讲师自己没经验", "90%是割韭菜课程", "靠实践而非听课"],
                deathCycle: "1-2个月",
                typicalProject: "XX电商学院VIP课程",
                whyPossible: ["电商确实能赚钱"],
                whyNot: ["培训课程都是过时的", "真正的经验没法通过听课获得"],
                aiAdvice: "直接开个小店实践，交的学费会比培训费便宜得多。"
            }
        };

        // 关键词映射（模糊搜索用）
        const KEYWORD_MAPPING = {
            "菜鸟驿站": ["开店", "创业", "加盟", "快递", "驿站"],
            "手游代理": ["网赚", "加盟", "拉人头", "游戏", "代理"],
            "奶茶加盟": ["餐饮加盟", "创业", "加盟", "奶茶", "开店"],
            "短视频带货": ["网赚", "抖音", "短视频", "带货", "直播"],
            "手机挂机": ["网赚", "挂机", "兼职", "刷视频", "赚钱"],
            "电商培训": ["培训", "割韭菜", "电商", "开店", "学习"]
        };

        /**
         * 主题切换相关
         */
        const THEME_KEY = "notdo_theme";

        function initTheme() {
            const savedTheme = loadTheme();
            if (savedTheme) {
                setTheme(savedTheme);
            }
        }

        function loadTheme() {
            try {
                return localStorage.getItem(THEME_KEY);
            } catch (e) {
                console.warn("Failed to load theme:", e);
            }
            return null;
        }

        function saveTheme(theme) {
            try {
                localStorage.setItem(THEME_KEY, theme);
            } catch (e) {
                console.warn("Failed to save theme:", e);
            }
        }

        function setTheme(theme) {
            document.documentElement.classList.add("theme-transition");
            requestAnimationFrame(() => {
                if (theme === "red-black") {
                    document.documentElement.setAttribute("data-theme", "red-black");
                    document.getElementById("themeIcon").textContent = "🔴";
                    document.getElementById("themeLabel").textContent = "红黑";
                } else {
                    document.documentElement.removeAttribute("data-theme");
                    document.getElementById("themeIcon").textContent = "🎨";
                    document.getElementById("themeLabel").textContent = "默认";
                }
                saveTheme(theme);
                setTimeout(() => {
                    document.documentElement.classList.remove("theme-transition");
                }, 500);
            });
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "red-black" ? "default" : "red-black";
            setTheme(newTheme);
        }

        /**
         * 从localStorage读取收藏数据
         */
        function loadFavorites() {
            try {
                const saved = localStorage.getItem("notdo_favorites");
                if (saved) {
                    return new Set(JSON.parse(saved));
                }
            } catch (e) {
                console.warn("Failed to load favorites from localStorage:", e);
                showToast("⚠️ 收藏数据加载失败，使用默认状态");
            }
            return new Set();
        }

        /**
         * 保存收藏数据到localStorage
         */
        function saveFavorites(favorites) {
            try {
                localStorage.setItem("notdo_favorites", JSON.stringify([...favorites]));
            } catch (e) {
                console.warn("Failed to save favorites to localStorage:", e);
                showToast("⚠️ 收藏数据保存失败，请检查浏览器设置");
            }
        }

        let state = {
            keyword: "",
            tag: "全部",
            sort: "hot",
            view: "all",
            favorites: loadFavorites(),
            currentCase: null,
            itemsShown: ITEMS_PER_PAGE
        };

        const els = {
            searchInput: document.getElementById("searchInput"),
            searchBtn: document.getElementById("searchBtn"),
            hotwords: document.getElementById("hotwords"),
            tagList: document.getElementById("tagList"),
            feedList: document.getElementById("feedList"),
            favoriteCount: document.getElementById("favoriteCount"),
            favoriteDrawer: document.getElementById("favoriteDrawer"),
            favoriteDrawerCount: document.getElementById("favoriteDrawerCount"),
            favoriteDrawerList: document.getElementById("favoriteDrawerList"),
            favoriteToggle: document.getElementById("favoriteToggle"),
            closeFavoriteDrawer: document.getElementById("closeFavoriteDrawer"),
            totalCases: document.getElementById("totalCases"),
            drawer: document.getElementById("detailDrawer"),
            mask: document.getElementById("drawerMask"),
            toast: document.getElementById("toast")
        };

        /**
         * 功能描述：根据当前关键词、标签、视图和排序规则筛选案例。
         * 参数说明：无，直接读取全局 state。
         * 返回值说明：返回筛选与排序后的案例数组。
         */
        function getFilteredCases() {
            let result = CASES.filter(item => {
                const keywordText = [
                    item.title,
                    item.project,
                    item.category,
                    item.tags.join(" "),
                    item.reasons.join(" "),
                    item.summary
                ].join(" ").toLowerCase();
                
                let matchKeyword = !state.keyword;
                if (state.keyword) {
                    const keywordLower = state.keyword.toLowerCase();
                    // 精确匹配
                    if (keywordText.includes(keywordLower)) {
                        matchKeyword = true;
                    } else {
                        // 模糊匹配：检查关键词映射
                        for (const [hotword, mappings] of Object.entries(KEYWORD_MAPPING)) {
                            if (hotword.includes(state.keyword) || state.keyword.includes(hotword)) {
                                // 检查是否匹配任何映射关键词
                                if (mappings.some(mapping => keywordText.includes(mapping.toLowerCase()))) {
                                    matchKeyword = true;
                                    break;
                                }
                            }
                        }
                    }
                }
                
                const matchTag = state.tag === "全部" || item.tags.includes(state.tag) || item.category === state.tag;
                const matchFavorite = state.view !== "favorites" || state.favorites.has(item.id);
                return matchKeyword && matchTag && matchFavorite;
            });

            if (state.sort === "loss") {
                result = result.sort((a, b) => b.lossValue - a.lossValue);
            } else if (state.sort === "new") {
                result = result.sort((a, b) => b.id - a.id);
            } else {
                result = result.sort((a, b) => b.heat - a.heat);
            }
            return result;
        }

        /**
         * 功能描述：检查当前搜索是否匹配死亡报告关键词
         * 返回值说明：返回匹配的关键词，不匹配返回null
         */
        function getMatchingDeathReport() {
            if (!state.keyword) return null;
            for (const hotword of Object.keys(DEATH_REPORTS)) {
                if (hotword.includes(state.keyword) || state.keyword.includes(hotword)) {
                    return hotword;
                }
            }
            return null;
        }

        /**
         * 功能描述：渲染顶部热搜词，点击后直接执行搜索。
         * 参数说明：无。
         * 返回值说明：无。
         */
        function renderHotwords() {
            els.hotwords.innerHTML = HOTWORDS.map(word => `<button class="hotword" data-word="${word}">${word}</button>`).join("");
        }

        /**
         * 功能描述：渲染左侧标签频道，并展示每个标签下的案例数量。
         * 参数说明：无。
         * 返回值说明：无。
         */
        function renderTags() {
            els.tagList.innerHTML = TAGS.map(tag => {
                const count = tag === "全部" ? CASES.length : CASES.filter(item => item.tags.includes(tag) || item.category === tag).length;
                const active = state.tag === tag ? "active" : "";
                return `<button class="tag-btn ${active}" data-tag="${tag}"><span>${tag}</span><b>${count}</b></button>`;
            }).join("");
        }

        /**
         * 功能描述：把案例数组渲染为中间信息流卡片。
         * 参数说明：cases，筛选后的案例数组。
         * 返回值说明：无。
         */
        function renderFeed(cases) {
            if (!cases.length) {
                const hasKeyword = !!state.keyword;
                const hasTag = state.tag !== "全部";
                let icon = "🔍";
                let title = "暂无案例";
                let desc = "这里还没有任何案例，敬请期待";
                if (hasKeyword || hasTag) {
                    icon = "😯";
                    title = "没有找到匹配案例";
                    desc = "试试调整关键词或标签，或者浏览全部案例";
                }
                els.feedList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${icon}</div>
                        <h3>${title}</h3>
                        <p>${desc}</p>
                        <div class="empty-state-actions">
                            ${hasKeyword || hasTag ? `<button class="empty-state-btn" onclick="resetSearch()">查看全部案例</button>` : ""}
                            <button class="empty-state-btn" onclick="focusSearch()">重新搜索</button>
                        </div>
                    </div>
                `;
                return;
            }
            
            let html = "";
            // 检查是否显示死亡报告
            const matchingKeyword = getMatchingDeathReport();
            if (matchingKeyword) {
                html += createDeathReport(matchingKeyword, cases.length);
            }
            
            const shownCases = cases.slice(0, state.itemsShown);
            const hasMore = cases.length > state.itemsShown;
            html += shownCases.map(item => createCaseCard(item)).join("");
            if (hasMore) {
                html += `
                    <div id="loadMoreTrigger" style="grid-column: 1/-1; height: 20px; margin-top: 20px;"></div>
                `;
            }
            
            els.feedList.innerHTML = html;
            if (hasMore) {
                setupLoadMoreObserver();
            }
            // 如果显示了死亡报告，启动动画
            if (matchingKeyword) {
                setTimeout(() => startDeathReportAnimation(), 50);
            }
        }

        function loadMore() {
            const filteredCases = getFilteredCases();
            if (state.itemsShown < filteredCases.length) {
                state.itemsShown += ITEMS_PER_PAGE;
                renderFeed(filteredCases);
            }
        }

        function setupLoadMoreObserver() {
            const trigger = document.getElementById("loadMoreTrigger");
            if (!trigger) return;
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        observer.disconnect();
                        loadMore();
                    }
                });
            }, { threshold: 0.1 });
            observer.observe(trigger);
        }

        function resetSearch() {
            state.keyword = "";
            state.tag = "全部";
            state.view = "all";
            state.itemsShown = ITEMS_PER_PAGE;
            els.searchInput.value = "";
            renderAll();
        }

        function focusSearch() {
            els.searchInput.focus();
        }

        /**
         * 功能描述：创建AI死亡报告HTML（带加载效果）
         * 参数说明：keyword，匹配的关键词；caseCount，案例数量
         * 返回值说明：返回HTML字符串
         */
        function createDeathReport(keyword, caseCount) {
            const report = DEATH_REPORTS[keyword];
            if (!report) return "";
            
            const isHighRisk = report.riskScore >= 80;
            
            return `
                <div class="death-report" id="deathReport">
                    <!-- 加载状态 -->
                    <div class="death-report-loading" id="deathReportLoading">
                        <div class="loading-spinner"></div>
                        <span class="loading-text">AI正在分析中...</span>
                    </div>
                    
                    <!-- 实际内容 -->
                    <div id="deathReportContent" style="display: none;">
                        <div class="death-report-header death-report-part" data-delay="0">
                            <div class="death-report-title">
                                <span>🤖</span>
                                <span>AI项目死亡报告 - ${keyword}</span>
                            </div>
                            <div class="death-report-stats">
                                <div class="death-stat-item">
                                    <span class="death-stat-value ${isHighRisk ? 'high-risk' : ''}">${report.riskScore}</span>
                                    <span class="death-stat-label">风险指数</span>
                                </div>
                                <div class="death-stat-item">
                                    <span class="death-stat-value">${caseCount}</span>
                                    <span class="death-stat-label">案例数量</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="death-report-grid death-report-part" data-delay="300">
                            <div class="death-report-section">
                                <h4>💀 死亡原因TOP3</h4>
                                <ul>
                                    ${report.topReasons.map(r => `<li>${r}</li>`).join("")}
                                </ul>
                            </div>
                            <div class="death-report-section">
                                <h4>⏱️ 死亡周期</h4>
                                <ul>
                                    <li>平均${report.deathCycle}</li>
                                </ul>
                                <h4 style="margin-top: 12px;">🎯 典型项目</h4>
                                <ul>
                                    <li>${report.typicalProject}</li>
                                </ul>
                            </div>
                        </div>
                        
                        <div class="death-report-grid death-report-part" data-delay="600">
                            <div class="death-report-section">
                                <h4>✅ 为什么能做？</h4>
                                <ul>
                                    ${report.whyPossible.map(r => `<li>${r}</li>`).join("")}
                                </ul>
                            </div>
                            <div class="death-report-section">
                                <h4>❌ 为什么不要做？</h4>
                                <ul>
                                    ${report.whyNot.map(r => `<li>${r}</li>`).join("")}
                                </ul>
                            </div>
                        </div>
                        
                        <div class="death-report-advice death-report-part" data-delay="900">
                            <h4>💡 AI建议</h4>
                            <p>${report.aiAdvice}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * 功能描述：启动死亡报告动画
         */
        function startDeathReportAnimation() {
            const loading = document.getElementById('deathReportLoading');
            const content = document.getElementById('deathReportContent');
            
            if (!loading || !content) return;
            
            // 显示加载状态1.2秒
            setTimeout(() => {
                loading.style.display = 'none';
                content.style.display = 'block';
                
                // 逐步显示各个部分
                const parts = content.querySelectorAll('.death-report-part');
                parts.forEach(part => {
                    const delay = parseInt(part.dataset.delay) || 0;
                    setTimeout(() => {
                        part.classList.add('show');
                    }, delay);
                });
            }, 1200);
        }

        /**
         * 功能描述：创建单张案例卡片 HTML。
         * 参数说明：item，案例对象。
         * 返回值说明：返回 HTML 字符串。
         */
        function createCaseCard(item) {
            const riskClass = item.riskLevel === "high" ? "risk-high" : "risk-mid";
            const isFaved = state.favorites.has(item.id);
            const categoryToShow = item.category && item.category !== "其他" ? item.category : "";
            const displayTags = (item.tags || [])
                .filter(tag => tag !== "其他" && tag !== categoryToShow)
                .slice(0, 2);
            return `
                <article class="case-card" data-detail="${item.id}">
                    <div class="case-card-header">
                        <div>
                            <div class="case-meta">
                                <span class="case-chip ${riskClass}">${item.risk}</span>
                                ${categoryToShow ? `<span class="case-chip">${categoryToShow}</span>` : ""}
                                ${displayTags.map(tag => `<span class="case-chip">#${tag}</span>`).join("")}
                            </div>
                            <h2 class="case-title">${item.title}</h2>
                        </div>
                    </div>
                    <p class="case-summary">${item.summary}</p>
                    <div class="case-reason"><strong>主要失败原因：</strong>${item.reasons.join("、")}</div>
                    <footer class="case-card-footer">
                        <button class="ghost-btn ${isFaved ? "faved" : ""}" data-fav="${item.id}">${isFaved ? "已收藏" : "收藏"}</button>
                        <button class="dark-btn" data-detail="${item.id}">查看</button>
                    </footer>
                </article>
            `;
        }

        /**
         * 功能描述：创建指标块，空值或未明确也保持展示，便于 demo 对比。
         * 参数说明：label 指标名，value 指标值。
         * 返回值说明：返回 HTML 字符串。
         */
        function createMetric(label, value) {
            return `<div class="metric"><span>${label}</span><strong>${value || "未明确"}</strong></div>`;
        }

        /**
         * 功能描述：渲染右侧收藏列表。
         * 参数说明：无。
         * 返回值说明：无。
         */
        function renderFavorites() {
            const favorites = CASES.filter(item => state.favorites.has(item.id));
            els.favoriteCount.textContent = favorites.length;
            els.favoriteDrawerCount.textContent = favorites.length;
            if (!favorites.length) {
                els.favoriteDrawerList.innerHTML = `<div class="favorite-drawer-empty">还没有收藏案例</div>`;
                return;
            }
            els.favoriteDrawerList.innerHTML = favorites.map(item => `
                <div class="favorite-drawer-item" data-detail="${item.id}">
                    <strong>${item.title}</strong>
                    <span>${item.summary}</span>
                </div>
            `).join("");
        }

        function openFavoriteDrawer() {
            els.favoriteDrawer.classList.add("open");
            els.mask.classList.add("open");
        }

        function closeFavoriteDrawer() {
            els.favoriteDrawer.classList.remove("open");
            els.mask.classList.remove("open");
        }

        /**
         * 功能描述：打开案例详情抽屉。
         * 参数说明：id，案例 ID。
         * 返回值说明：无。
         */
        function openDetail(id) {
            const item = CASES.find(caseItem => caseItem.id === Number(id));
            if (!item) {
                showToast("案例不存在");
                return;
            }
            state.currentCase = item;
            els.drawer.innerHTML = createDetailHTML(item);
            els.drawer.classList.add("open");
            els.mask.classList.add("open");
        }

        function prevCase() {
            if (!state.currentCase) return;
            const currentIndex = CASES.findIndex(caseItem => caseItem.id === state.currentCase.id);
            if (currentIndex > 0) {
                openDetail(CASES[currentIndex - 1].id);
            }
        }

        function nextCase() {
            if (!state.currentCase) return;
            const currentIndex = CASES.findIndex(caseItem => caseItem.id === state.currentCase.id);
            if (currentIndex < CASES.length - 1) {
                openDetail(CASES[currentIndex + 1].id);
            }
        }

        /**
         * 格式化原文文本：将 \n\n 保留为段落分隔，清除单个 \n（来自PDF的硬换行）。
         * 参数说明：text，原始文本。
         * 返回值说明：带 <p> 标签的 HTML 字符串。
         */
        function formatOriginalText(text) {
            const paragraphs = text
                .replace(/\n{2,}/g, "\n\n")
                .split("\n\n")
                .map(p => p.replace(/\n/g, ""));
            return paragraphs.map(p => `<p>${p}</p>`).join("");
        }

        /**
         * 功能描述：创建详情抽屉内容。
         * 参数说明：item，案例对象。
         * 返回值说明：返回 HTML 字符串。
         */
        function createDetailHTML(item) {
            const similar = CASES.filter(caseItem => caseItem.id !== item.id && caseItem.tags.some(tag => item.tags.includes(tag))).slice(0, 3);
            const currentIndex = CASES.findIndex(caseItem => caseItem.id === item.id);
            const hasPrev = currentIndex > 0;
            const hasNext = currentIndex < CASES.length - 1;
            return `
                <div class="detail-drawer-header">
                    <button class="drawer-close" id="closeDrawer">×</button>
                    <div class="drawer-meta">
                        <span class="case-chip ${item.riskLevel === "high" ? "risk-high" : "risk-mid"}">${item.risk}</span>
                        <span class="case-chip">${item.category}</span>
                    </div>
                    <h2>${item.title}</h2>
                </div>
                <div class="detail-drawer-body">
                    <section class="detail-section">
                        <h3>原文内容</h3>
                        <div class="original-text">${formatOriginalText(item.original)}</div>
                    </section>
                    <section class="detail-section">
                        <h3>AI 总结</h3>
                        <div class="highlight-box">
                            <p><strong>一句话总结：</strong>${item.summary}</p>
                            <ul>
                                ${item.reasons.map(reason => `<li>${reason}</li>`).join("")}
                            </ul>
                            <p><strong>适合人群：</strong>${item.suitable}</p>
                            <p><strong>风险提示：</strong>${item.warning}</p>
                        </div>
                    </section>
                    <section class="detail-section">
                        <h3>相似案例推荐</h3>
                        <div class="similar-list">
                            ${similar.map(caseItem => `
                                <button class="similar-item" data-detail="${caseItem.id}">
                                    <strong>${caseItem.title}</strong>
                                    <span>推荐依据：${caseItem.tags.filter(tag => item.tags.includes(tag)).join("、")}</span>
                                </button>
                            `).join("") || "暂无相似案例"}
                        </div>
                    </section>
                </div>
                <div class="detail-drawer-footer">
                    <button class="detail-nav-btn" id="prevCase" ${!hasPrev ? "disabled" : ""}>
                        <span class="nav-arrow">←</span>上一个案例
                    </button>
                    <span class="case-counter">${currentIndex + 1} / ${CASES.length}</span>
                    <button class="detail-nav-btn" id="nextCase" ${!hasNext ? "disabled" : ""}>
                        下一个案例<span class="nav-arrow">→</span>
                    </button>
                </div>
            `;
        }

        /**
         * 功能描述：关闭案例详情抽屉。
         * 参数说明：无。
         * 返回值说明：无。
         */
        function closeDetail() {
            els.drawer.classList.remove("open");
            els.mask.classList.remove("open");
        }

        /**
         * 功能描述：切换收藏状态。
         * 参数说明：id，案例 ID。
         * 参数说明：btnElement，按钮元素（可选）。
         * 返回值说明：无。
         */
        function toggleFavorite(id, btnElement) {
            const caseId = Number(id);
            if (state.favorites.has(caseId)) {
                state.favorites.delete(caseId);
            } else {
                state.favorites.add(caseId);
                // 播放心跳动画
                if (btnElement) {
                    btnElement.classList.add("heartbeat");
                    setTimeout(() => {
                        btnElement.classList.remove("heartbeat");
                    }, 600);
                }
            }
            saveFavorites(state.favorites);
            renderAll();
        }

        /**
         * 功能描述：显示底部提示信息。
         * 参数说明：message，提示文本。
         * 返回值说明：无。
         */
        function showToast(message) {
            els.toast.textContent = message;
            els.toast.classList.add("show");
            window.clearTimeout(showToast.timer);
            showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 1600);
        }

        /**
         * 功能描述：统一刷新页面上的动态区域。
         * 参数说明：无。
         * 返回值说明：无。
         */
        function renderAll() {
            const cases = getFilteredCases();
            renderTags();
            renderFeed(cases);
            renderFavorites();
            els.totalCases.textContent = CASES.length;
        }

        /**
         * 功能描述：绑定所有页面交互事件。
         * 参数说明：无。
         * 返回值说明：无。
         */
        function bindEvents() {
            els.searchBtn.addEventListener("click", () => {
                state.keyword = els.searchInput.value.trim();
                state.view = "all";
                state.itemsShown = ITEMS_PER_PAGE;
                renderAll();
            });

            els.searchInput.addEventListener("keydown", event => {
                if (event.key === "Enter") {
                    state.keyword = els.searchInput.value.trim();
                    state.view = "all";
                    state.itemsShown = ITEMS_PER_PAGE;
                    renderAll();
                }
            });

            document.body.addEventListener("click", event => {
                const detailBtn = event.target.closest("[data-detail]");
                const favBtn = event.target.closest("[data-fav]");
                const tagBtn = event.target.closest("[data-tag]");
                const hotwordBtn = event.target.closest("[data-word]");
                const sortBtn = event.target.closest("[data-sort]");
                const navBtn = event.target.closest("[data-view]");
                const themeBtn = event.target.closest("#themeToggle");

                if (themeBtn) { toggleTheme(); return; }
                if (favBtn) { toggleFavorite(favBtn.dataset.fav, favBtn); return; }
                if (detailBtn) openDetail(detailBtn.dataset.detail);
                if (tagBtn) selectTag(tagBtn.dataset.tag);
                if (hotwordBtn) searchHotword(hotwordBtn.dataset.word);
                if (sortBtn) selectSort(sortBtn.dataset.sort);
                if (navBtn) selectView(navBtn.dataset.view);
                if (event.target.id === "closeDrawer") closeDetail();
                if (event.target.id === "closeFavoriteDrawer") closeFavoriteDrawer();
                if (event.target.id === "favoriteToggle") openFavoriteDrawer();
                if (event.target.id === "prevCase") prevCase();
                if (event.target.id === "nextCase") nextCase();
            });

            els.mask.addEventListener("click", () => {
                closeDetail();
                closeFavoriteDrawer();
            });
        }

        /**
         * 功能描述：切换标签筛选。
         * 参数说明：tag，标签名称。
         * 返回值说明：无。
         */
        function selectTag(tag) {
            state.tag = tag;
            state.view = "all";
            state.itemsShown = ITEMS_PER_PAGE;
            renderAll();
        }

        /**
         * 功能描述：点击热搜词后填充搜索框并刷新列表。
         * 参数说明：word，热搜关键词。
         * 返回值说明：无。
         */
        function searchHotword(word) {
            state.keyword = word;
            els.searchInput.value = word;
            state.view = "all";
            state.itemsShown = ITEMS_PER_PAGE;
            renderAll();
        }

        /**
         * 功能描述：切换排序方式。
         * 参数说明：sort，排序类型。
         * 返回值说明：无。
         */
        function selectSort(sort) {
            state.sort = sort;
            document.querySelectorAll(".sort-tab").forEach(btn => btn.classList.toggle("active", btn.dataset.sort === sort));
            state.itemsShown = ITEMS_PER_PAGE;
            renderAll();
        }

        /**
         * 功能描述：切换顶部视图入口。
         * 参数说明：view，视图名称。
         * 返回值说明：无。
         */
        function selectView(view) {
            state.view = view;
            setActiveNav(view);
            if (view === "parse") {
                showToast("当前为 PDF 解析流程演示，展示模拟解析结果");
            }
            state.itemsShown = ITEMS_PER_PAGE;
            renderAll();
        }

        initTheme();
        renderHotwords();
        bindEvents();
        renderAll();

        const sloganEl = document.getElementById("scrollingSlogan");
        const heroMain = document.querySelector(".hero-main");

        const heroObserver = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    sloganEl.classList.remove("show");
                } else {
                    sloganEl.classList.add("show");
                }
            });
        }, { threshold: 0.1 });

        if (heroMain) {
            heroObserver.observe(heroMain);
        }
    </script>
</body>
</html>
