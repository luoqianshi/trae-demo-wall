<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeartShare · 让闲置温暖下一程</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path fill='%23E36B7D' d='M32 56s-20-12-20-28a12 12 0 0 1 22-7 12 12 0 0 1 22 7c0 16-24 28-24 28z'/></svg>" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#E36B7D" />
  <!-- 纯前端：所有字体均为系统字体，不发起任何外部网络请求 -->
  <link rel="preload" href="./images/hero-1.svg" as="image" />
  <link rel="preload" href="./images/hero-2.svg" as="image" />
  <link rel="preload" href="./images/hero-3.svg" as="image" />
  <style>
    /* ========== 设计变量 ========== */
    :root {
      --primary: #E36B7D;
      --primary-soft: #F5A6B8;
      --primary-bg: #FDF2F4;
      --accent: #F2B441;
      --secondary: #7C9E7E;
      --bg: #FFF9F4;
      --bg-soft: #FFF4EA;
      --surface: #FFFFFF;
      --border: #F0E2D6;
      --text: #2E2A26;
      --text-soft: #6B6258;
      --text-mute: #A39889;
      --success: #4F9D6A;
      --warning: #E89B2D;
      --danger: #D94B4B;
      --shadow-sm: 0 2px 8px rgba(227, 107, 125, 0.06);
      --shadow-md: 0 8px 24px rgba(227, 107, 125, 0.10);
      --shadow-lg: 0 20px 48px rgba(227, 107, 125, 0.14);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-pill: 9999px;
      --font-display: 'Songti SC', 'STSong', 'SimSun', 'Source Han Serif SC', 'Noto Serif CJK SC', serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Source Han Sans SC', 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif;
    }

    /* 离线 / 在线状态条 */
    .net-status {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      padding: 8px 16px; text-align: center; font-size: 13px;
      background: #FEF3C7; color: #92400E; border-bottom: 1px solid #FDE68A;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transform: translateY(-100%); transition: transform .25s ease;
    }
    .net-status.show { transform: translateY(0); }
    .net-status.ok { background: #ECFDF5; color: #047857; border-bottom-color: #A7F3D0; }
    .net-status .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    body.has-net-bar { padding-top: 36px; }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); font-size: 15px; line-height: 1.65;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    h1, h2, h3, h4 {
      font-family: var(--font-display); font-weight: 600;
      letter-spacing: 0.02em; margin: 0;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    button { font-family: inherit; cursor: pointer; }

    /* ========== 通用 ========== */
    .card {
      background: var(--surface); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm); border: 1px solid var(--border);
      transition: transform .25s ease, box-shadow .25s ease; overflow: hidden;
    }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      height: 44px; padding: 0 24px; border-radius: var(--radius-pill);
      border: none; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: all .2s ease;
    }
    .btn.primary {
      background: linear-gradient(135deg, var(--primary-soft) 0%, var(--primary) 100%);
      color: #fff; box-shadow: 0 6px 18px rgba(227, 107, 125, 0.32);
    }
    .btn.primary:hover { box-shadow: 0 10px 24px rgba(227, 107, 125, 0.40); transform: translateY(-1px); }
    .btn.ghost { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn.ghost:hover { background: var(--primary-bg); }
    .btn.lg { height: 52px; padding: 0 28px; font-size: 16px; }
    .btn.sm { height: 36px; padding: 0 16px; font-size: 13px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .tag {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: var(--radius-pill);
      font-size: 12px; background: var(--primary-bg); color: var(--primary);
    }
    .tag-soft { background: var(--bg-soft); color: var(--accent); }

    /* ========== 顶栏 ========== */
    .app-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255, 249, 244, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex; align-items: center; height: 68px; gap: 32px;
    }
    .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .brand-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-soft), var(--primary));
      color: #fff; font-size: 20px;
      box-shadow: 0 6px 16px rgba(227, 107, 125, 0.32);
    }
    .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
    .brand-name { font-family: var(--font-display); font-size: 19px; font-weight: 600; }
    .brand-slogan { font-size: 11px; color: var(--text-mute); margin-top: 2px; }

    .nav-list { display: flex; gap: 24px; margin-left: 24px; }
    .nav-item {
      position: relative; font-size: 15px; color: var(--text-soft);
      padding: 6px 4px; transition: color .2s; cursor: pointer;
    }
    .nav-item:hover, .nav-item.active { color: var(--primary); font-weight: 600; }
    .nav-item.active::after {
      content: ''; position: absolute; left: 50%; bottom: -22px;
      transform: translateX(-50%);
      width: 22px; height: 3px; border-radius: 2px; background: var(--primary);
    }

    .header-actions { margin-left: auto; display: flex; align-items: center; gap: 16px; }
    .msg-btn {
      position: relative; width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: var(--bg-soft); color: var(--text-soft);
      cursor: pointer; transition: all .2s; border: none; font-size: 16px;
    }
    .msg-btn:hover { background: var(--primary-bg); color: var(--primary); }
    .msg-dot {
      position: absolute; top: 4px; right: 4px;
      min-width: 16px; height: 16px; padding: 0 4px;
      background: var(--primary); color: #fff;
      border-radius: 8px; font-size: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 12px 4px 4px;
      border-radius: 9999px; background: var(--bg-soft);
      cursor: pointer; transition: all .2s;
    }
    .user-chip:hover { background: var(--primary-bg); }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 13px;
    }
    .user-name { font-size: 14px; }

    /* ========== 主区 ========== */
    .app-main { min-height: calc(100vh - 68px - 240px); padding: 24px 0 64px; }
    .fade-in { animation: fadeUp .4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ========== 首页 Hero ========== */
    .hero {
      position: relative;
      margin: 16px 0 48px; padding: 56px 0;
      background: linear-gradient(135deg, #FFF4EA 0%, #FDE6EC 50%, #FDF2F4 100%);
      border-radius: var(--radius-xl); overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 80% 20%, rgba(245, 166, 184, 0.4) 0%, transparent 35%),
        radial-gradient(circle at 10% 90%, rgba(242, 180, 65, 0.18) 0%, transparent 30%);
    }
    .hero-inner {
      position: relative;
      display: grid; grid-template-columns: 1.1fr 1fr; gap: 32px; align-items: center;
    }
    .eyebrow {
      display: inline-block; font-size: 13px; letter-spacing: 0.3em;
      color: var(--primary); margin-bottom: 16px;
    }
    .hero h1 { font-size: 52px; line-height: 1.18; margin-bottom: 16px; }
    .hero p { font-size: 16px; color: var(--text-soft); margin-bottom: 24px; line-height: 1.85; }
    .hero-actions { display: flex; gap: 12px; }

    .hero-visual { position: relative; height: 420px; }
    .visual-card {
      position: absolute; background: #fff;
      border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
      overflow: hidden; transition: transform .4s ease;
    }
    .visual-card:hover { transform: translateY(-6px) rotate(0deg) !important; }
    .vc-img { width: 100%; height: 100%; background-size: cover; background-position: center; }
    .vc-info {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; font-size: 13px;
    }
    .vc-tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: var(--primary-bg); color: var(--primary); }
    .vc-1 { top: 20px; right: 60px; width: 240px; height: 200px; transform: rotate(-3deg); }
    .vc-2 { bottom: 80px; right: 200px; width: 200px; height: 170px; transform: rotate(4deg); }
    .vc-3 { top: 130px; left: 0; width: 220px; height: 180px; transform: rotate(-2deg); }
    .visual-orb {
      position: absolute; bottom: -40px; left: 60px;
      width: 160px; height: 160px; border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity: .25; filter: blur(20px);
    }

    /* 数据统计 */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-bottom: 48px;
    }
    .stat {
      text-align: center; padding: 24px;
      background: #fff; border-radius: var(--radius-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .stat-num {
      font-family: var(--font-display); font-size: 36px;
      color: var(--primary); margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }
    .stat-label { font-size: 13px; color: var(--text-soft); }

    /* Section */
    .section { margin-bottom: 48px; }
    .section-head {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 24px;
    }
    .section-head h2 { font-size: 28px; }
    .section-head p { color: var(--text-soft); margin-top: 4px; }
    .more { font-size: 14px; color: var(--primary); cursor: pointer; }

    /* 分类网格 */
    .cat-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
    .cat-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 16px 0;
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius-md); cursor: pointer;
      transition: all .25s; animation: fadeUp .6s ease both;
    }
    .cat-card:hover { border-color: var(--primary-soft); background: var(--primary-bg); transform: translateY(-3px); }
    .cat-icon { font-size: 28px; }
    .cat-name { font-size: 13px; }

    /* 物品卡 */
    .item-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .item-card { display: flex; flex-direction: column; cursor: pointer; }
    .item-card .cover { position: relative; aspect-ratio: 4/3; overflow: hidden; }
    .item-card .cover img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s ease; }
    .item-card:hover .cover img { transform: scale(1.05); }
    .item-card .badge {
      position: absolute; padding: 2px 8px; font-size: 11px;
      border-radius: 6px; backdrop-filter: blur(4px);
    }
    .item-card .badge.condition { top: 10px; left: 10px; background: rgba(255, 255, 255, 0.85); color: var(--primary); font-weight: 600; }
    .item-card .badge.cat { top: 10px; right: 10px; background: rgba(0, 0, 0, 0.45); color: #fff; }
    .item-card .body { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .item-card .title {
      font-family: var(--font-body); font-size: 15px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .item-card .desc {
      font-size: 13px; color: var(--text-soft);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; min-height: 38px;
    }
    .item-card .meta {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text-mute);
    }
    .item-card .qty { color: var(--primary); font-weight: 600; }
    .item-card .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px; border-top: 1px dashed var(--border);
    }
    .item-card .donor { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-soft); }
    .item-card .donor img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }
    .item-card .delivery {
      font-size: 11px; padding: 2px 8px;
      background: var(--bg-soft); color: var(--accent); border-radius: 6px;
    }

    /* 需求 */
    .demand-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .demand-card { padding: 24px; }
    .demand-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .deadline { font-size: 12px; color: var(--text-mute); }
    .demand-title { font-family: var(--font-body); font-size: 16px; font-weight: 600; margin: 8px 0; }
    .demand-loc { font-size: 13px; color: var(--text-soft); margin-bottom: 16px; }
    .progress { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .bar { flex: 1; height: 6px; background: var(--bg-soft); border-radius: 9999px; overflow: hidden; }
    .fill { height: 100%; background: linear-gradient(90deg, var(--primary-soft), var(--primary)); border-radius: 9999px; }
    .pct { font-size: 13px; color: var(--primary); font-weight: 600; }

    /* CTA */
    .cta-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 32px 40px; background: linear-gradient(135deg, var(--primary) 0%, #D8567A 100%);
      border-radius: var(--radius-xl); color: #fff;
      box-shadow: 0 16px 40px rgba(227, 107, 125, 0.32);
    }
    .cta-inner h3 { font-size: 24px; color: #fff; margin-bottom: 6px; }
    .cta-inner p { opacity: .9; font-size: 14px; }
    .cta-inner .btn.lg { background: #fff; color: var(--primary); box-shadow: none; }
    .cta-inner .btn.lg:hover { background: var(--bg-soft); }

    /* ========== 列表页 ========== */
    .filter-bar { padding: 24px; margin-bottom: 24px; }
    .filter-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px dashed var(--border);
      flex-wrap: wrap;
    }
    .filter-row:last-child { border-bottom: none; padding-bottom: 0; }
    .filter-row.last { padding-top: 16px; }
    .filter-label { width: 80px; font-size: 13px; color: var(--text-soft); flex-shrink: 0; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 14px; border-radius: var(--radius-pill);
      font-size: 13px; color: var(--text-soft);
      background: var(--bg-soft); cursor: pointer; transition: all .2s;
    }
    .chip:hover { color: var(--primary); background: var(--primary-bg); }
    .chip.active {
      background: linear-gradient(135deg, var(--primary-soft), var(--primary));
      color: #fff; box-shadow: 0 4px 12px rgba(227, 107, 125, 0.28);
    }
    .chip-icon { font-size: 14px; }

    .text-input, .select-input {
      height: 38px; padding: 0 14px;
      border: 1px solid var(--border); border-radius: var(--radius-pill);
      background: #fff; font-family: inherit; font-size: 13px;
      color: var(--text); outline: none; transition: border-color .2s;
    }
    .text-input:focus, .select-input:focus { border-color: var(--primary); }

    .result-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; color: var(--text-soft); font-size: 14px;
    }
    .result-head b { color: var(--primary); font-size: 18px; margin: 0 4px; }
    .empty { grid-column: 1 / -1; text-align: center; padding: 48px 0; color: var(--text-mute); }
    .empty-illus { font-size: 56px; margin-bottom: 12px; }
    .pagination { margin-top: 32px; display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
    .page-btn {
      min-width: 36px; height: 36px; padding: 0 12px;
      border: 1px solid var(--border); background: #fff;
      border-radius: 8px; color: var(--text); font-size: 13px;
      transition: all .2s; cursor: pointer;
    }
    .page-btn:hover { border-color: var(--primary); color: var(--primary); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ========== 详情页 ========== */
    .crumb {
      display: flex; gap: 8px; align-items: center;
      font-size: 13px; color: var(--text-soft); margin-bottom: 16px;
    }
    .crumb a { cursor: pointer; }
    .crumb a:hover { color: var(--primary); }
    .crumb .sep { opacity: .5; }

    .detail-main {
      display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
      background: #fff; border-radius: var(--radius-xl);
      padding: 24px; border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .main-img {
      position: relative; aspect-ratio: 4/3;
      background: var(--bg-soft); border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .main-img img { width: 100%; height: 100%; object-fit: cover; }
    .main-img .badge {
      position: absolute; top: 14px; left: 14px;
      background: rgba(255, 255, 255, 0.9); color: var(--primary);
      padding: 4px 12px; border-radius: var(--radius-pill);
      font-size: 12px; font-weight: 600;
    }
    .thumbs { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .thumb {
      width: 80px; height: 60px; border-radius: var(--radius-sm);
      overflow: hidden; cursor: pointer;
      border: 2px solid transparent; transition: border-color .2s;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb.active { border-color: var(--primary); }

    .info { display: flex; flex-direction: column; }
    .info .title { font-family: var(--font-display); font-size: 28px; line-height: 1.3; margin: 8px 0 12px; }
    .info .desc {
      background: var(--bg-soft); padding: 12px 16px;
      border-radius: var(--radius-md); color: var(--text-soft);
      font-size: 14px; line-height: 1.8; margin-bottom: 16px;
    }
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px 24px; margin-bottom: 20px;
    }
    .ig-item { display: flex; flex-direction: column; gap: 4px; }
    .ig-label { font-size: 12px; color: var(--text-mute); }
    .ig-val { font-size: 15px; font-weight: 500; }
    .ig-val.primary { color: var(--primary); font-weight: 600; }

    .donor-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--bg-soft);
      border-radius: var(--radius-md); margin-bottom: 20px;
    }
    .donor-card .da { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .donor-card .dn { flex: 1; }
    .donor-card .dn-name { font-weight: 600; margin-bottom: 4px; }
    .donor-card .dn-meta { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-soft); }
    .dn-meta b { font-size: 15px; }

    .cta-row { display: flex; gap: 12px; }
    .cta-row .btn { flex: 1; }
    .cta-row .btn:first-child { flex: 2; }

    /* ========== 发布页 ========== */
    .page-head { text-align: center; margin-bottom: 24px; }
    .page-head h1 { font-size: 28px; margin-bottom: 6px; }
    .page-head p { color: var(--text-soft); }

    .form-card { padding: 32px; max-width: 880px; margin: 0 auto; }
    .form-section { padding: 16px 0; border-bottom: 1px dashed var(--border); }
    .form-section:last-of-type { border-bottom: none; }
    .section-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 16px; font-weight: 600; margin-bottom: 16px;
    }
    .section-title .num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; background: var(--primary-bg); color: var(--primary);
      border-radius: 50%; font-size: 12px; font-weight: 600;
    }
    .form-row { display: flex; gap: 16px; }
    .form-row .form-item { flex: 1; }
    .form-item { margin-bottom: 16px; }
    .form-divider {
      margin: 24px 0 16px; padding-top: 16px;
      border-top: 1px dashed var(--border);
      font-size: 13px; color: var(--text-soft); font-weight: 500;
    }
    .form-label {
      display: block; font-size: 13px; color: var(--text-soft);
      margin-bottom: 6px; font-weight: 500;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: #fff; font-family: inherit; font-size: 14px;
      color: var(--text); outline: none; transition: border-color .2s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--primary); }

  <!-- 纯前端：注册 Service Worker 实现离线缓存 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => { /* 忽略 */ });
      });
    }

    // 在线 / 离线状态条
    (function () {
      const bar = document.getElementById('netStatus');
      const txt = document.getElementById('netStatusText');
      function update() {
        const online = navigator.onLine;
        if (online) {
          bar.classList.add('show', 'ok');
          txt.textContent = '在线 · 数据仅保存在本机';
          setTimeout(() => bar.classList.remove('show'), 1800);
          document.body.classList.remove('has-net-bar');
        } else {
          bar.classList.add('show');
          bar.classList.remove('ok');
          txt.textContent = '当前离线 · 所有功能仍可正常使用';
          document.body.classList.add('has-net-bar');
        }
      }
      window.addEventListener('online', update);
      window.addEventListener('offline', update);
      update();
    })();

          const s = JSON.parse(raw);
          if (s._v && s._v !== STORE_VERSION) {
            // 版本不匹配（例如旧的 picsum.photos 远程图片数据），重置
            return null;
          }
          if (!s.user) s.user = { ...DEFAULT_USER };
          return s;

    const FALLBACK_IMG = 'data:image/svg+xml;utf8,' + encodeURIComponent(

      '<rect width="400" height="300" fill="#FFF4EA"/>' +

    function bindImageFallback(root) {
      (root || document).querySelectorAll('img').forEach(im => {
        if (im.dataset.fbBound) return;
        im.dataset.fbBound = '1';
        im.addEventListener('error', () => {
          if (im.src === FALLBACK_IMG) return;
          im.src = FALLBACK_IMG;
          im.style.objectFit = 'contain';

    // ============================================

    function parseRoute() {
      let hash = location.hash.replace(/^#/, '') || '/home';
      // 支持 /item/:id
      let itemId = null;
      const m = hash.match(/^\/item\/(\d+)/);
      if (m) { itemId = m[1]; hash = '/item'; }
      const [path, queryStr] = hash.split('?');
      const query = {};
      if (queryStr) queryStr.split('&').forEach(p => { const [k, v] = p.split('='); query[k] = decodeURIComponent(v || ''); });
      if (itemId) query.id = itemId;
      return { path, query };
    }

    function navigate(path) {
      location.hash = path;
    }

    // 本机文件选择：读取为 base64 dataURI，加入到 publishState.images
    function onPickLocalFiles(e) {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      const remain = 9 - publishState.images.length;
      if (remain <= 0) { showToast('已达 9 张上限'); e.target.value = ''; return; }
      const accept = files.slice(0, remain);
      let done = 0, failed = 0;
      accept.forEach(file => {
        if (!/^image\//.test(file.type)) { failed++; done++; checkDone(); return; }
        if (file.size > 3 * 1024 * 1024) { showToast(`「${file.name}」超过 3MB，已跳过`); failed++; done++; checkDone(); return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
          // 压缩到最长边 1280 以内（保持 base64 不至于太大撑爆 localStorage）
          compressImage(ev.target.result, 1280, 0.85).then(small => {
            publishState.images.push(small);
            saveState();
            render();
          }).catch(() => {
            publishState.images.push(ev.target.result);
            saveState();
            render();
          });
        };
        reader.onerror = () => { failed++; checkDone(); };
        reader.readAsDataURL(file);
        function checkDone() {
          if (++done === accept.length) {
            e.target.value = '';
            if (failed > 0) showToast(`已添加 ${accept.length - failed} 张，${failed} 张失败`);
            else showToast(`已添加 ${accept.length} 张图片`);
          }
        }
      });
    }

    // 用 canvas 对 base64 图片做尺寸压缩
    function compressImage(dataUrl, maxSide, quality) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          let { width: w, height: h } = img;
          if (w <= maxSide && h <= maxSide) {
            // 不需要缩放，但仍用 canvas 重新编码为 jpeg 减小体积
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(img, 0, 0);
            resolve(c.toDataURL('image/jpeg', quality));
            return;
          }
          if (w > h) { h = Math.round(h * maxSide / w); w = maxSide; }
          else       { w = Math.round(w * maxSide / h); h = maxSide; }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          const ctx = c.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = dataUrl;
      });
    }

                  <span class="status-pill ${statusMap[it.status]?.type || 'info'}">${statusMap[it.status]?.label || '未知'}</span>
                </div>
                <div class="row-time">${it.createdAt}</div>
              </div>
              <div class="row-actions">
                <button class="btn ghost sm" onclick="showToast('编辑功能开发中')">编辑</button>
                <button class="btn ghost sm" onclick="removeMyItem(${it.id})">下架</button>
              </div>
            </div>
          `).join('')}
        </div>`;
      }

      if (profileTab === 'applications') {
        if (!myApps.length) return `<div class="empty-block"><p>暂无申领记录</p><button class="btn ghost sm" onclick="navigate('/items')">去浏览物品</button></div>`;
        return `<div class="list-grid">
          ${myApps.map(a => `
            <div class="row-item">
              <img class="row-img" src="${a.itemImage}" />
              <div class="row-main">
                <h4 class="row-title">${escapeHtml(a.itemTitle)}</h4>
                <p class="reason">「${escapeHtml(a.reason)}」</p>
                <div class="row-time">${a.createdAt}</div>
              </div>
              <div class="row-actions">
                <span class="status-pill ${appStatusMap[a.status]?.type}">${appStatusMap[a.status]?.label}</span>
              </div>
            </div>
          `).join('')}
        </div>`;
      }

      if (profileTab === 'messages') {
        if (!state.messages.length) return `<div class="empty-block"><p>暂无消息</p></div>`;
        const iconMap = { 1: 'ℹ', 2: '✉', 3: '🔔' };
        return `<div class="msg-list">
          ${state.messages.map(m => `
            <div class="msg-item ${!m.read ? 'unread' : ''}" onclick="readMsg(${m.id})">
              ${!m.read ? '<span class="msg-dot"></span>' : ''}
              <div class="msg-icon t${m.type}">${iconMap[m.type] || '·'}</div>
              <div class="msg-main" style="flex: 1; min-width: 0;">
                <div class="msg-title">${escapeHtml(m.title)}</div>
                <div class="msg-content">${escapeHtml(m.content)}</div>
                <div class="msg-time">${m.createdAt}</div>
              </div>
            </div>
          `).join('')}
        </div>`;
      }

      // settings
      return `<div style="max-width: 540px;">
        <div class="form-item">
          <label class="form-label">昵称</label>
          <input class="form-input" id="setNickname" maxlength="20" value="${escapeHtml(CURRENT_USER.nickname)}" oninput="CURRENT_USER.nickname=this.value" />
        </div>
        <div class="form-item">
          <label class="form-label">手机号</label>
          <input class="form-input" value="${escapeHtml(CURRENT_USER.phone)}" disabled />
        </div>
        <div class="form-row">
          <div class="form-item">
            <label class="form-label">所在省/直辖市</label>
            <input class="form-input" id="setProvince" value="${escapeHtml(CURRENT_USER.province)}" oninput="CURRENT_USER.province=this.value" />
          </div>
          <div class="form-item">
            <label class="form-label">区/县</label>
            <input class="form-input" id="setCity" value="${escapeHtml(CURRENT_USER.city)}" oninput="CURRENT_USER.city=this.value" />
          </div>
        </div>
        <div style="margin-top: 16px;">
          <button class="btn primary" onclick="saveUserSettings()">保存修改</button>
          <button class="btn ghost" style="margin-left: 8px;" onclick="resetState()">重置全部数据</button>
        </div>
        <div class="form-divider">数据备份（仅本机）</div>
        <div class="form-item">
          <label class="form-label">导出全部数据为 JSON</label>
          <div style="font-size: 12px; color: var(--text-3); margin-bottom: 8px;">含物品、申领、消息、用户信息。可用于跨设备迁移或备份。</div>
          <button class="btn ghost" onclick="exportData()">⬇ 导出数据</button>
          <label class="btn ghost" style="margin-left: 8px; cursor: pointer;">
            ⬆ 导入数据
            <input type="file" accept="application/json,.json" style="display:none" onchange="importData(event)" />
          </label>
        </div>
        <div class="form-item">
          <label class="form-label">应用信息</label>
          <div style="font-size: 12px; color: var(--text-3); line-height: 1.8;">
            模式：纯前端 PWA · 无后端依赖<br>
            数据存储：localStorage（key = heartshare-state-v1）<br>
            离线缓存：Service Worker（sw.js）<br>
            本地资源：./images/*.svg
          </div>
        </div>
      </div>`;
    }

    // 导出全部数据为 JSON 文件下载
    function exportData() {
      try {
        const payload = {
          ...state,
          _v: STORE_VERSION,
          _exportedAt: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `heartshare-backup-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('数据已导出');
      } catch (e) {
        showToast('导出失败：' + e.message);
      }
    }

    // 从 JSON 文件还原数据
    function importData(ev) {
      const file = ev.target.files && ev.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.items || !Array.isArray(data.items)) throw new Error('文件格式不正确');
          if (!confirm(`确定要覆盖当前数据吗？将导入 ${data.items.length} 件物品。`)) {
            ev.target.value = '';
            return;
          }
          state.user = data.user || { ...DEFAULT_USER };
          state.items = data.items;
          state.applications = data.applications || [];
          state.messages = data.messages || [];
          saveState();
          showToast('数据已导入');
          render();
        } catch (err) {
          showToast('导入失败：' + err.message);
        } finally {
          ev.target.value = '';
        }
      };
      reader.readAsText(file);
    }

    // 保存用户设置：写入 localStorage + 重新渲染整页（让 header 头像、profile 头部都更新）
    function saveUserSettings() {
      const nick = (CURRENT_USER.nickname || '').trim();
      if (!nick) { showToast('昵称不能为空'); return; }
      CURRENT_USER.nickname = nick;
      state.user.nickname = nick;
      saveState();
      // 通知 + 重新渲染
      showToast('设置已保存');
      render();
    }

    function readMsg(id) {
      const m = state.messages.find(x => x.id === id);
      if (m) { m.read = true; saveState(); render(); }
    }
    function removeMyItem(id) {
      if (!confirm('确定下架该物品？')) return;
      state.items = state.items.filter(i => i.id !== id);
      saveState();
      showToast('已下架');
      render();
    }
    function resetState() {
      if (!confirm('将清空所有本地数据并恢复初始状态，确定继续？')) return;
      localStorage.removeItem(STORE_KEY);
      location.reload();
    }

    // ============================================
    // 11. 主渲染
    // ============================================
    const routeViews = {
      '/home': renderHome,
      '/items': renderItems,
      '/item': renderItemDetail,
      '/publish': renderPublish,
      '/profile': renderProfile
    };

    function render() {
      const r = parseRoute();
      const view = routeViews[r.path] || renderHome;
      const html = `
        ${renderHeader()}
        <main class="app-main fade-in">${view()}</main>
        ${renderFooter()}
      `;
      document.getElementById('app').innerHTML = html;
      window.scrollTo({ top: 0 });
      bindImageFallback();
    }

    window.addEventListener('hashchange', render);
    window.addEventListener('DOMContentLoaded', () => {
      if (!location.hash) location.hash = '/home';
      render();
    });
  </script>
</body>
</html>
