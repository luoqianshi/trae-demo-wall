<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>梅花易术 - 传统占卜智慧</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Serif SC', serif;
      background: linear-gradient(180deg, #F5F2EB 0%, #E8E4DC 100%);
      min-height: 100vh;
      color: #2C3E50;
      line-height: 1.6;
    }
    .container { max-width: 750px; margin: 0 auto; padding: 20px; }
    
    /* 首页样式 */
    .page { display: none; }
    .page.active { display: block; }
    
    .header { text-align: center; padding: 40px 20px; }
    .logo { font-size: 100px; margin-bottom: 10px; }
    .title { font-size: 36px; font-weight: 600; color: #2D5A4A; letter-spacing: 8px; margin-bottom: 10px; }
    .subtitle { font-size: 16px; color: #8B5A2B; font-style: italic; }
    
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    
    .section-title {
      font-size: 20px;
      font-weight: 600;
      color: #2D5A4A;
      margin-bottom: 16px;
    }
    
    .input {
      width: 100%;
      padding: 16px;
      background: #F5F2EB;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      color: #2C3E50;
      font-family: inherit;
    }
    
    .input:focus { outline: 2px solid #2D5A4A; }
    
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .category-card {
      background: #FFFFFF;
      border: 2px solid #E8E4DC;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .category-card.selected {
      background: #2D5A4A;
      border-color: #2D5A4A;
      color: #FFFFFF;
    }
    
    .category-card.selected .category-desc { color: rgba(255,255,255,0.7); }
    
    .category-icon { font-size: 36px; margin-bottom: 8px; }
    .category-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .category-desc { font-size: 12px; color: #95A5A6; }
    
    .btn {
      width: 100%;
      padding: 16px 32px;
      background: linear-gradient(135deg, #2D5A4A 0%, #3D7A6A 100%);
      color: #FFFFFF;
      border: none;
      border-radius: 48px;
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      margin: 20px 0;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    
    .btn:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(45,90,74,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .hint { text-align: center; font-size: 14px; color: #95A5A6; font-style: italic; }
    
    /* 结果页样式 */
    .result-header { text-align: center; padding: 30px 20px; background: #FFFFFF; border-radius: 16px; margin-bottom: 20px; }
    .result-symbol { font-size: 100px; margin-bottom: 10px; }
    .result-name { font-size: 32px; font-weight: 600; color: #2D5A4A; letter-spacing: 6px; margin-bottom: 10px; }
    .result-question { font-size: 16px; color: #5D6D7E; padding: 0 20px; }
    
    .summary-card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .summary-title { font-size: 18px; font-weight: 600; color: #2D5A4A; margin-bottom: 12px; }
    .summary-text { font-size: 16px; color: #2C3E50; line-height: 1.8; }
    
    .advice-card {
      background: linear-gradient(135deg, #2D5A4A 0%, #3D7A6A 100%);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .advice-title { font-size: 18px; font-weight: 600; color: #FFFFFF; margin-bottom: 12px; }
    .advice-text { font-size: 16px; color: rgba(255,255,255,0.95); line-height: 1.8; }
    
    .hexagram-detail { background: #FFFFFF; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .hexagram-header { display: flex; align-items: center; margin-bottom: 16px; }
    .hexagram-symbol { font-size: 60px; color: #2D5A4A; margin-right: 16px; }
    .hexagram-info { flex: 1; }
    .hexagram-name-text { font-size: 24px; font-weight: 600; color: #2C3E50; }
    .hexagram-meaning { font-size: 14px; color: #8B5A2B; }
    .hexagram-desc { font-size: 16px; color: #5D6D7E; line-height: 1.6; margin-bottom: 20px; }
    
    .lines-list { border-top: 1px solid #F0EDE6; padding-top: 16px; }
    .line-item { display: flex; padding: 12px 0; border-bottom: 1px solid #F0EDE6; }
    .line-item:last-child { border-bottom: none; }
    .line-num { width: 30px; color: #95A5A6; font-size: 14px; }
    .line-content { flex: 1; }
    .line-text { font-size: 15px; color: #2C3E50; margin-bottom: 4px; }
    .line-inter { font-size: 13px; color: #5D6D7E; }
    
    .btn-group { display: flex; gap: 16px; margin-top: 20px; }
    .btn-secondary {
      flex: 1;
      padding: 14px 20px;
      background: #FFFFFF;
      color: #2D5A4A;
      border: 2px solid #2D5A4A;
      border-radius: 48px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    
    .footer { text-align: center; padding: 30px 0; color: #95A5A6; font-size: 14px; }
    .footer-date { font-size: 12px; color: #BDC3C7; margin-top: 8px; }
    
    /* 历史页样式 */
    .history-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
    .history-title { font-size: 28px; font-weight: 600; color: #2D5A4A; }
    .history-count { font-size: 14px; color: #95A5A6; }
    
    .empty-state { text-align: center; padding: 80px 0; }
    .empty-icon { font-size: 80px; margin-bottom: 20px; }
    .empty-text { font-size: 20px; color: #5D6D7E; margin-bottom: 8px; }
    .empty-hint { font-size: 14px; color: #95A5A6; }
    
    .history-list { max-height: 60vh; overflow-y: auto; }
    .history-item { background: #FFFFFF; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .history-header-item { display: flex; margin-bottom: 12px; }
    .history-icon { font-size: 32px; margin-right: 12px; }
    .history-info { flex: 1; }
    .history-question { font-size: 16px; color: #2C3E50; margin-bottom: 6px; }
    .history-meta { display: flex; gap: 12px; }
    .history-type { font-size: 13px; color: #2D5A4A; }
    .history-date { font-size: 13px; color: #95A5A6; }
    .history-footer { display: flex; justify-content: space-between; padding-top: 12px; border-top: 1px solid #F0EDE6; }
    .history-hexagram { font-size: 15px; color: #8B5A2B; font-weight: 500; }
    .history-delete { font-size: 13px; color: #95A5A6; cursor: pointer; }
    .history-delete:hover { color: #F53F3F; }
    
    .clear-btn { font-size: 14px; color: #F53F3F; margin-bottom: 16px; cursor: pointer; }
    
    /* Tab Bar */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #FFFFFF;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .tab-item { text-align: center; cursor: pointer; }
    .tab-icon { font-size: 24px; margin-bottom: 4px; }
    .tab-text { font-size: 12px; color: #5D6D7E; }
    .tab-item.active .tab-text { color: #2D5A4A; }
  </style>
</head>
<body>
  <!-- 首页 -->
  <div id="page-home" class="page active">
    <div class="header">
      <div class="logo">🌸</div>
      <h1 class="title">梅花易术</h1>
      <p class="subtitle">遇事不决问苍天，梅花一卦定乾坤</p>
    </div>
    
    <div class="card">
      <h2 class="section-title">✋ 请输入您的问题</h2>
      <input type="text" id="question-input" class="input" placeholder="例如：我的事业会有发展吗？" maxlength="100">
    </div>
    
    <div class="card">
      <h2 class="section-title">🎯 选择占卜类型</h2>
      <div class="category-grid" id="category-grid"></div>
    </div>
    
    <button class="btn" id="divine-btn" onclick="performDivination()">🔮 开始占卜</button>
    <p class="hint">心诚则灵，随心而占</p>
    
    <div class="tab-bar">
      <div class="tab-item active" onclick="switchTab('home')">
        <div class="tab-icon">🔮</div>
        <div class="tab-text">占卜</div>
      </div>
      <div class="tab-item" onclick="switchTab('history')">
        <div class="tab-icon">📜</div>
        <div class="tab-text">历史</div>
      </div>
    </div>
  </div>
  
  <!-- 结果页 -->
  <div id="page-result" class="page">
    <div class="container">
      <div class="result-header">
        <div class="result-symbol" id="result-symbol"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-question" id="result-question"></div>
      </div>
      
      <div class="summary-card">
        <div class="summary-title">✨ 占卜结果</div>
        <div class="summary-text" id="result-summary"></div>
      </div>
      
      <div class="advice-card">
        <div class="advice-title">💡 指导建议</div>
        <div class="advice-text" id="result-advice"></div>
      </div>
      
      <div class="hexagram-detail" id="hexagram-detail"></div>
      
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="goHome()">再占一卦</button>
      </div>
      
      <div class="footer">
        <div>梅花易术 · 传承千年智慧</div>
        <div class="footer-date" id="result-date"></div>
      </div>
    </div>
  </div>
  
  <!-- 历史页 -->
  <div id="page-history" class="page">
    <div class="container">
      <div class="history-header">
        <h2 class="history-title">📜 占卜历史</h2>
        <span class="history-count" id="history-count"></span>
      </div>
      <div id="clear-btn" class="clear-btn" onclick="clearHistory()"></div>
      <div id="history-list"></div>
      <div class="empty-state" id="empty-history">
        <div class="empty-icon">🌸</div>
        <div class="empty-text">暂无占卜记录</div>
        <div class="empty-hint">开始你的第一次占卜吧</div>
      </div>
      
      <div class="tab-bar">
        <div class="tab-item" onclick="switchTab('home')">
          <div class="tab-icon">🔮</div>
          <div class="tab-text">占卜</div>
        </div>
        <div class="tab-item active" onclick="switchTab('history')">
          <div class="tab-icon">📜</div>
          <div class="tab-text">历史</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 数据定义
    const hexagrams = [
      {
        id: 'qian', name: '乾卦', symbol: '☰', meaning: '元亨利贞',
        description: '天行健，君子以自强不息。',
        lines: [
          { text: '潜龙勿用', inter: '时机未到，宜潜藏待时' },
          { text: '见龙在田，利见大人', inter: '初露锋芒，利于见贵人' },
          { text: '君子终日乾乾，夕惕若厉，无咎', inter: '自强不息，谨慎行事' },
          { text: '或跃在渊，无咎', inter: '审时度势，进退自如' },
          { text: '飞龙在天，利见大人', inter: '大展宏图，事业鼎盛' },
          { text: '亢龙有悔', inter: '物极必反，盛极而衰' }
        ]
      },
      {
        id: 'kun', name: '坤卦', symbol: '☷', meaning: '元亨，利牝马之贞',
        description: '地势坤，君子以厚德载物。',
        lines: [
          { text: '履霜，坚冰至', inter: '见微知著，防患未然' },
          { text: '直方大，不习无不利', inter: '正直端方，自然顺遂' },
          { text: '含章可贞，或从王事，无成有终', inter: '内蕴才华，功成不居' },
          { text: '括囊，无咎无誉', inter: '谨言慎行，明哲保身' },
          { text: '黄裳，元吉', inter: '柔顺居中，大吉大利' },
          { text: '龙战于野，其血玄黄', inter: '阴阳相争，谨防凶险' }
        ]
      },
      {
        id: 'zhen', name: '震卦', symbol: '☳', meaning: '亨，震来虩虩，笑言哑哑',
        description: '洊雷震，君子以恐惧修省。',
        lines: [
          { text: '震来虩虩，笑言哑哑，震惊百里，不丧匕鬯', inter: '临危不乱，镇定自若' },
          { text: '震来厉，亿丧贝，跻于九陵，勿逐，七日得', inter: '遭遇损失，静待时机' },
          { text: '震苏苏，震行无眚', inter: '振作精神，行动无碍' },
          { text: '震遂泥', inter: '过于震惊，陷入困境' },
          { text: '震往来厉，亿无丧，有事', inter: '谨慎行事，可保无失' },
          { text: '震索索，视矍矍，征凶', inter: '戒慎恐惧，可免灾祸' }
        ]
      },
      {
        id: 'xun', name: '巽卦', symbol: '☴', meaning: '小亨，利有攸往，利见大人',
        description: '随风巽，君子以申命行事。',
        lines: [
          { text: '进退，利武人之贞', inter: '灵活进退，坚守正道' },
          { text: '巽在床下，用史巫纷若，吉无咎', inter: '谦逊处世，祈福禳灾' },
          { text: '频巽，吝', inter: '过于顺从，必有悔恨' },
          { text: '悔亡，田获三品', inter: '悔恨消除，收获丰厚' },
          { text: '贞吉，悔亡，无不利', inter: '坚守正道，终获吉祥' },
          { text: '巽在床下，丧其资斧，贞凶', inter: '过于卑屈，损失惨重' }
        ]
      },
      {
        id: 'kan', name: '坎卦', symbol: '☵', meaning: '习坎，有孚维心亨，行有尚',
        description: '水洊至，习坎，君子以常德行，习教事。',
        lines: [
          { text: '习坎，入于坎窞，凶', inter: '深陷险境，难以自拔' },
          { text: '坎有险，求小得', inter: '虽有险阻，小有收获' },
          { text: '来之坎坎，险且枕，入于坎窞，勿用', inter: '步步艰险，不宜行动' },
          { text: '樽酒簋贰，用缶，纳约自牖，终无咎', inter: '以柔济刚，终能无咎' },
          { text: '坎不盈，祗既平，无咎', inter: '险未盈满，渐趋平安' },
          { text: '系用徽纆，置于丛棘，三岁不得，凶', inter: '深陷囹圄，难以解脱' }
        ]
      },
      {
        id: 'li', name: '离卦', symbol: '☲', meaning: '利贞，亨。畜牝牛，吉',
        description: '明两作，离，大人以继明照于四方。',
        lines: [
          { text: '履错然，敬之无咎', inter: '谨慎行事，恭敬无咎' },
          { text: '黄离，元吉', inter: '中正光明，大吉大利' },
          { text: '日昃之离，不鼓缶而歌，则大耋之嗟，凶', inter: '盛极而衰，及时行乐' },
          { text: '突如其来如，焚如，死如，弃如', inter: '意外降临，谨慎应对' },
          { text: '出涕沱若，戚嗟若，吉', inter: '忧患深思，终获吉祥' },
          { text: '王用出征，有嘉折首，获匪其丑，无咎', inter: '出师征伐，大获全胜' }
        ]
      },
      {
        id: 'gen', name: '艮卦', symbol: '☶', meaning: '艮其背，不获其身，行其庭，不见其人，无咎',
        description: '兼山艮，君子以思不出其位。',
        lines: [
          { text: '艮其趾，无咎，利永贞', inter: '止步于初，坚守正道' },
          { text: '艮其腓，不拯其随，其心不快', inter: '中途受阻，心意不畅' },
          { text: '艮其限，列其夤，厉薰心', inter: '腰部受困，危险迫心' },
          { text: '艮其身，无咎', inter: '安守本分，可保无咎' },
          { text: '艮其辅，言有序，悔亡', inter: '言语谨慎，悔恨消除' },
          { text: '敦艮，吉', inter: '敦厚静止，终获吉祥' }
        ]
      },
      {
        id: 'dui', name: '兑卦', symbol: '☱', meaning: '亨，利贞',
        description: '丽泽兑，君子以朋友讲习。',
        lines: [
          { text: '和兑，吉', inter: '和悦待人，吉祥如意' },
          { text: '孚兑，吉，悔亡', inter: '诚信和悦，悔恨消除' },
          { text: '来兑，凶', inter: '主动取悦，必有凶险' },
          { text: '商兑未宁，介疾有喜', inter: '商议未决，小病将愈' },
          { text: '孚于剥，有厉', inter: '信任小人，必有危险' },
          { text: '引兑', inter: '引导和悦，善始善终' }
        ]
      }
    ];

    const categories = [
      { id: 'career', name: '事业', icon: '💼', desc: '职业发展、工作决策' },
      { id: 'love', name: '感情', icon: '❤️', desc: '爱情、婚姻、人际关系' },
      { id: 'health', name: '健康', icon: '🏥', desc: '身体健康、养生调理' },
      { id: 'finance', name: '财运', icon: '💰', desc: '财富、投资、理财' },
      { id: 'general', name: '综合', icon: '🌟', desc: '其他各类问题' }
    ];

    const advices = {
      career: ['宜静不宜动，静待时机', '抓住机遇，大胆前行', '与人合作，共创辉煌', '修身养性，厚积薄发', '谨慎行事，防患未然', '顺势而为，水到渠成'],
      love: ['缘分天定，顺其自然', '主动出击，把握幸福', '真心相待，终成眷属', '冷静思考，理性抉择', '珍惜眼前人，莫失良机', '花开有时，静待佳期'],
      health: ['注意休息，调养身心', '适度运动，健康常在', '饮食有节，起居有常', '心态平和，百病不侵', '及时就医，防微杜渐', '修身养性，益寿延年'],
      finance: ['谨慎投资，量力而行', '开源节流，积少成多', '抓住机遇，大胆投资', '稳健经营，步步为营', '分散风险，稳中求进', '财运亨通，心想事成'],
      general: ['三思而后行，谋定而后动', '顺势而为，水到渠成', '自强不息，厚德载物', '宁静致远，淡泊明志', '知足常乐，平安是福', '吉人天相，逢凶化吉']
    };

    // 状态
    let selectedCategory = 'general';
    let history = JSON.parse(localStorage.getItem('divinationHistory') || '[]');

    // 初始化
    function init() {
      renderCategories();
      renderHistory();
    }

    // 渲染分类
    function renderCategories() {
      const grid = document.getElementById('category-grid');
      grid.innerHTML = categories.map(cat => `
        <div class="category-card ${cat.id === selectedCategory ? 'selected' : ''}" onclick="selectCategory('${cat.id}')">
          <div class="category-icon">${cat.icon}</div>
          <div class="category-name">${cat.name}</div>
          <div class="category-desc">${cat.desc}</div>
        </div>
      `).join('');
    }

    // 选择分类
    function selectCategory(id) {
      selectedCategory = id;
      renderCategories();
    }

    // 执行占卜
    function performDivination() {
      const question = document.getElementById('question-input').value || '随机占卜';
      const hexagram = hexagrams[Math.floor(Math.random() * hexagrams.length)];
      const typeAdvices = advices[selectedCategory];
      const advice = typeAdvices[Math.floor(Math.random() * typeAdvices.length)];
      
      const summaries = [
        `${hexagram.name}象征${hexagram.meaning}，预示着事情的发展趋势较为${Math.random() > 0.5 ? '顺利' : '曲折'}。`,
        `占得${hexagram.name}，${hexagram.description}。当前时机${Math.random() > 0.5 ? '成熟' : '尚未成熟'}，宜${Math.random() > 0.5 ? '积极行动' : '静观其变'}。`,
        `${hexagram.name}为${hexagram.symbol}，主${Math.random() > 0.5 ? '吉' : '凶'}。${Math.random() > 0.5 ? '坚守正道' : '灵活变通'}，可保无虞。`
      ];
      const summary = summaries[Math.floor(Math.random() * summaries.length)];
      
      const result = {
        id: Date.now().toString(),
        question,
        hexagram,
        advice,
        summary,
        date: new Date().toLocaleString('zh-CN'),
        type: selectedCategory
      };
      
      history.unshift(result);
      localStorage.setItem('divinationHistory', JSON.stringify(history));
      
      showResult(result);
    }

    // 显示结果
    function showResult(result) {
      document.getElementById('page-home').classList.remove('active');
      document.getElementById('page-history').classList.remove('active');
      document.getElementById('page-result').classList.add('active');
      
      document.getElementById('result-symbol').textContent = result.hexagram.symbol;
      document.getElementById('result-name').textContent = result.hexagram.name;
      document.getElementById('result-question').textContent = result.question;
      document.getElementById('result-summary').textContent = result.summary;
      document.getElementById('result-advice').textContent = result.advice;
      document.getElementById('result-date').textContent = result.date;
      
      const linesHtml = result.hexagram.lines.map((line, idx) => `
        <div class="line-item">
          <div class="line-num">${idx + 1}</div>
          <div class="line-content">
            <div class="line-text">${line.text}</div>
            <div class="line-inter">${line.inter}</div>
          </div>
        </div>
      `).join('');
      
      document.getElementById('hexagram-detail').innerHTML = `
        <div class="hexagram-header">
          <div class="hexagram-symbol">${result.hexagram.symbol}</div>
          <div class="hexagram-info">
            <div class="hexagram-name-text">${result.hexagram.name}</div>
            <div class="hexagram-meaning">${result.hexagram.meaning}</div>
          </div>
        </div>
        <div class="hexagram-desc">${result.hexagram.description}</div>
        <div class="lines-list">${linesHtml}</div>
      `;
    }

    // 返回首页
    function goHome() {
      document.getElementById('page-result').classList.remove('active');
      document.getElementById('page-history').classList.remove('active');
      document.getElementById('page-home').classList.add('active');
      document.getElementById('question-input').value = '';
    }

    // 切换标签
    function switchTab(tab) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      
      if (tab === 'home') {
        document.getElementById('page-home').classList.add('active');
        document.querySelectorAll('.tab-item')[0].classList.add('active');
      } else {
        document.getElementById('page-history').classList.add('active');
        document.querySelectorAll('.tab-item')[1].classList.add('active');
        renderHistory();
      }
    }

    // 渲染历史
    function renderHistory() {
      const list = document.getElementById('history-list');
      const empty = document.getElementById('empty-history');
      const count = document.getElementById('history-count');
      const clearBtn = document.getElementById('clear-btn');
      
      count.textContent = history.length > 0 ? `共 ${history.length} 条记录` : '';
      clearBtn.textContent = history.length > 0 ? '清空历史' : '';
      
      if (history.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      
      empty.style.display = 'none';
      
      list.innerHTML = history.map(item => {
        const cat = categories.find(c => c.id === item.type) || categories[4];
        return `
          <div class="history-item">
            <div class="history-header-item">
              <div class="history-icon">${cat.icon}</div>
              <div class="history-info">
                <div class="history-question">${item.question}</div>
                <div class="history-meta">
                  <span class="history-type">${cat.name}</span>
                  <span class="history-date">${item.date}</span>
                </div>
              </div>
            </div>
            <div class="history-footer">
              <span class="history-hexagram">得 ${item.hexagram.name}</span>
              <span class="history-delete" onclick="deleteHistory('${item.id}')">删除</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // 删除历史
    function deleteHistory(id) {
      history = history.filter(h => h.id !== id);
      localStorage.setItem('divinationHistory', JSON.stringify(history));
      renderHistory();
    }

    // 清空历史
    function clearHistory() {
      if (confirm('确定要清空所有历史记录吗？')) {
        history = [];
        localStorage.setItem('divinationHistory', JSON.stringify(history));
        renderHistory();
      }
    }

    // 启动
    init();
  </script>
</body>
</html>
