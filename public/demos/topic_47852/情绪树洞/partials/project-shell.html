<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪树洞</title>
    <style id="theme-vars">
/* 情绪树洞 - Brand Design Tokens */
:root {
  /* Color System */
  --color-bg: #E8F5F0;
  --color-bg-secondary: #F0FAF5;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-primary: #3BA99C;
  --color-primary-light: #5CC4B5;
  --color-primary-dark: #2D8A80;
  --color-accent: #E8914F;
  --color-accent-light: #F2AB72;
  --color-text-primary: #2D4A4A;
  --color-text-secondary: #5A7A78;
  --color-text-tertiary: #8AA8A5;
  --color-text-inverse: #FFFFFF;
  --color-border: #C8E0DC;
  --color-divider: #D8EDE8;

  /* Typography */
  --font-display: 'Noto Serif SC', 'Georgia', serif;
  --font-body: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-size-hero: 36px;
  --font-size-subtitle: 18px;
  --font-size-body: 15px;
  --font-size-caption: 13px;
  --font-weight-regular: 400;
  --font-weight-medium: 500;
  --font-weight-bold: 700;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;

  /* Shape */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* Spacing */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
  --spacing-2xl: 48px;

  /* Shadow */
  --shadow-card: 0 2px 8px rgba(59, 169, 156, 0.08);
  --shadow-elevated: 0 4px 16px rgba(59, 169, 156, 0.12);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
