<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64" role="img" aria-label="Gloop wordmark" shape-rendering="geometricPrecision">
  <g shape-rendering="crispEdges">
    <!-- icon background -->
    <rect x="4" y="4" width="56" height="56" rx="12" fill="#cfeeff"/>

    <!-- slime body -->
    <g fill="#7ed3f2">
      <rect x="12" y="18" width="40" height="28"/>
    </g>
    <rect x="12" y="45" width="40" height="2" fill="#1e7aad"/>
    <rect x="14" y="44" width="36" height="2" fill="#3aa3d6"/>

    <!-- glossy highlight -->
    <g fill="#c9f3ff">
      <rect x="14" y="28" width="6" height="2"/>
      <rect x="12" y="30" width="4" height="2"/>
    </g>

    <!-- belly patch -->
    <rect x="22" y="36" width="16" height="6" fill="#a7dff5"/>

    <!-- eyes -->
    <g fill="#103a56">
      <rect x="18" y="30" width="8" height="10"/>
      <rect x="34" y="30" width="8" height="10"/>
    </g>
    <g fill="#f4fdff">
      <rect x="20" y="32" width="4" height="6"/>
      <rect x="36" y="32" width="4" height="6"/>
    </g>

    <!-- golden hair -->
    <g fill="#f2c94c">
      <rect x="10" y="10" width="40" height="8"/>
      <rect x="12" y="18" width="36" height="2"/>
      <rect x="26" y="6" width="8" height="4"/>
      <rect x="24" y="8" width="12" height="2"/>
      <rect x="14" y="10" width="4" height="6"/>
      <rect x="38" y="10" width="4" height="6"/>
      <rect x="12" y="20" width="4" height="4"/>
      <rect x="22" y="20" width="4" height="6"/>
      <rect x="32" y="20" width="4" height="4"/>
      <rect x="42" y="20" width="4" height="6"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="76" y="41" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="32" font-weight="700" fill="#103a56" letter-spacing="-0.5">gloop</text>
  <text x="76" y="55" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="10" fill="#7a8a9a" letter-spacing="0.5">LOOP ENGINEERING</text>
</svg>
