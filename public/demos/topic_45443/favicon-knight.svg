  </g>
  <!-- sword (right side) -->
  <rect x="28" y="4" width="2" height="14" fill="#c7d2dd"/>
  <rect x="28" y="4" width="1" height="14" fill="#eef3f8"/>
  <rect x="28" y="4" width="2" height="1" fill="#eef3f8"/>
  <rect x="29" y="3" width="1" height="1" fill="#c7d2dd"/>
  <rect x="26" y="18" width="5" height="2" fill="#f2c94c"/>
  <rect x="28" y="20" width="2" height="3" fill="#5a3a1a"/>
  <rect x="27" y="23" width="3" height="2" fill="#f2c94c"/>
</svg>
