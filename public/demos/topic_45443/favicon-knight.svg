  <!-- dark-gold outline strands -->
  <g fill="#7a4e10">
    <rect x="9" y="3" width="1" height="1"/>
    <rect x="8" y="5" width="1" height="2"/>
    <rect x="13" y="1" width="2" height="1"/>
    <rect x="12" y="2" width="1" height="2"/>
    <rect x="11" y="4" width="1" height="3"/>
    <rect x="18" y="4" width="1" height="1"/>
    <rect x="17" y="6" width="1" height="1"/>
    <rect x="11" y="7" width="1" height="2"/>
    <rect x="17" y="7" width="1" height="2"/>
    <rect x="12" y="13" width="2" height="1"/>
    <rect x="20" y="13" width="2" height="1"/>
