    <rect x="18" y="16" width="2" height="3"/>
  </g>
  <!-- spiky golden hair -->
  <g fill="#f2c94c">
    <rect x="9" y="4" width="1" height="3"/>
    <rect x="8" y="5" width="3" height="2"/>
    <rect x="13" y="2" width="2" height="2"/>
    <rect x="12" y="3" width="4" height="1"/>
    <rect x="11" y="4" width="5" height="3"/>
    <rect x="18" y="5" width="3" height="2"/>
    <rect x="17" y="6" width="5" height="1"/>
    <rect x="7" y="7" width="16" height="2"/>
    <rect x="8" y="9" width="14" height="1"/>
    <rect x="8" y="10" width="2" height="2"/>
    <rect x="12" y="10" width="2" height="3"/>
    <rect x="16" y="10" width="2" height="2"/>
    <rect x="20" y="10" width="2" height="3"/>
