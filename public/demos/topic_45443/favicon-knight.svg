<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Gloop the knight slime" shape-rendering="crispEdges">
  <rect x="1" y="1" width="30" height="30" rx="7" ry="7" fill="#cfeeff"/>

  <!-- body outline (navy) -->
  <g fill="#103a56">
    <rect x="9" y="7" width="12" height="2"/>
    <rect x="8" y="8" width="14" height="2"/>
    <rect x="7" y="9" width="16" height="2"/>
    <rect x="6" y="10" width="18" height="2"/>
    <rect x="5" y="11" width="20" height="2"/>
    <rect x="4" y="12" width="22" height="2"/>
    <rect x="4" y="13" width="22" height="2"/>
    <rect x="3" y="14" width="24" height="2"/>
    <rect x="3" y="15" width="24" height="2"/>
    <rect x="3" y="16" width="24" height="2"/>
    <rect x="3" y="17" width="24" height="2"/>
    <rect x="3" y="18" width="24" height="2"/>
    <rect x="3" y="19" width="24" height="2"/>
    <rect x="3" y="20" width="24" height="2"/>
    <rect x="3" y="21" width="24" height="2"/>
  </g>
  <!-- body fill (slime cyan) -->
  <g fill="#7ed3f2">
    <rect x="10" y="8" width="10" height="1"/>
    <rect x="9" y="9" width="12" height="1"/>
    <rect x="8" y="10" width="14" height="1"/>
    <rect x="7" y="11" width="16" height="1"/>
    <rect x="6" y="12" width="18" height="1"/>
    <rect x="5" y="13" width="20" height="1"/>
    <rect x="5" y="14" width="20" height="1"/>
    <rect x="4" y="15" width="22" height="1"/>
    <rect x="4" y="16" width="22" height="1"/>
    <rect x="4" y="17" width="22" height="1"/>
    <rect x="4" y="18" width="22" height="1"/>
    <rect x="4" y="19" width="22" height="1"/>
    <rect x="4" y="20" width="22" height="1"/>
    <rect x="4" y="21" width="22" height="1"/>
  </g>
  <!-- bottom shadow -->
  <rect x="4" y="22" width="22" height="1" fill="#1e7aad"/>
