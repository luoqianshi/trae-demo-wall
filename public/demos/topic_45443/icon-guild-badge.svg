<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Gloop guild badge" shape-rendering="crispEdges">
  <rect width="120" height="120" rx="24" fill="#1a1a2e"/>

  <!-- slime body -->
  <g fill="#7ed3f2" opacity="0.9">
    <rect x="36" y="38" width="48" height="28"/>
    <rect x="34" y="40" width="52" height="24"/>
    <rect x="32" y="42" width="56" height="20"/>
  </g>
  <rect x="32" y="62" width="56" height="2" fill="#1e7aad"/>

  <!-- eyes -->
  <g fill="#103a56">
    <rect x="40" y="46" width="8" height="12"/>
    <rect x="60" y="46" width="8" height="12"/>
  </g>
  <g fill="#f4fdff">
    <rect x="42" y="48" width="4" height="8"/>
    <rect x="62" y="48" width="4" height="8"/>
  </g>

  <!-- glossy highlight -->
  <g fill="#c9f3ff" opacity="0.6">
    <rect x="34" y="44" width="6" height="2"/>
    <rect x="34" y="48" width="4" height="2"/>
  </g>

  <!-- golden hair -->
  <g fill="#f2c94c">
    <rect x="30" y="28" width="48" height="10"/>
    <rect x="32" y="38" width="44" height="2"/>
    <rect x="46" y="22" width="8" height="6"/>
    <rect x="44" y="24" width="12" height="4"/>
    <rect x="34" y="30" width="4" height="8"/>
    <rect x="58" y="30" width="4" height="8"/>
    <rect x="82" y="30" width="6" height="6"/>
    <rect x="80" y="32" width="10" height="4"/>
  </g>

  <!-- GUILD text -->
  <text x="60" y="82" text-anchor="middle" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="11" font-weight="600" fill="#f2c94c" letter-spacing="3" opacity="0.8">GUILD</text>

  <!-- golden border -->
  <g fill="none" stroke="#f2c94c" stroke-width="1.5" opacity="0.3">
    <rect x="8" y="8" width="104" height="104" rx="20"/>
  </g>

  <!-- decorative bars -->
  <g fill="#f2c94c" opacity="0.25">
    <rect x="16" y="92" width="24" height="2" rx="1"/>
    <rect x="80" y="92" width="24" height="2" rx="1"/>
    <rect x="16" y="96" width="16" height="2" rx="1"/>
    <rect x="88" y="96" width="16" height="2" rx="1"/>
  </g>

  <!-- corner circles -->
  <g fill="none" stroke="#7ed3f2" stroke-width="1" opacity="0.15">
    <circle cx="20" cy="20" r="4"/>
    <circle cx="100" cy="20" r="4"/>
    <circle cx="20" cy="100" r="4"/>
    <circle cx="100" cy="100" r="4"/>
  </g>
</svg>
