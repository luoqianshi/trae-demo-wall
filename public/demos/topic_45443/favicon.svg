<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Gloop the slime" shape-rendering="crispEdges">
  <!-- rounded-rect background (light blue, favicon-safe for all tab themes) -->
  <rect x="1" y="1" width="30" height="30" rx="7" ry="7" fill="#cfeeff"/>

  <!-- slime body: centered horizontally, visually balanced vertically -->
  <!-- total slime width = 24px, left=4, right=28, centered in 32px -->
  <!-- slime sits ~y=8 to y=24, top has hair spikes going higher -->

  <!-- ===== body outline (navy) ===== -->
  <g fill="#103a56">
    <rect x="11" y="9" width="10" height="2"/>
    <rect x="9" y="10" width="14" height="2"/>
    <rect x="8" y="11" width="16" height="2"/>
    <rect x="7" y="12" width="18" height="2"/>
    <rect x="6" y="13" width="20" height="2"/>
    <rect x="5" y="14" width="22" height="2"/>
    <rect x="5" y="15" width="22" height="2"/>
    <rect x="4" y="16" width="24" height="2"/>
    <rect x="4" y="17" width="24" height="2"/>
    <rect x="4" y="18" width="24" height="2"/>
    <rect x="4" y="19" width="24" height="2"/>
    <rect x="4" y="20" width="24" height="2"/>
    <rect x="4" y="21" width="24" height="2"/>
    <rect x="4" y="22" width="24" height="2"/>
  </g>
  <!-- ===== body fill (slime cyan) ===== -->
  <g fill="#7ed3f2">
    <rect x="12" y="10" width="8" height="1"/>
    <rect x="10" y="11" width="12" height="1"/>
    <rect x="9" y="12" width="14" height="1"/>
    <rect x="8" y="13" width="16" height="1"/>
    <rect x="7" y="14" width="18" height="1"/>
    <rect x="6" y="15" width="20" height="1"/>
    <rect x="6" y="16" width="20" height="1"/>
    <rect x="5" y="17" width="22" height="1"/>
    <rect x="5" y="18" width="22" height="1"/>
    <rect x="4" y="19" width="24" height="1"/>
    <rect x="4" y="20" width="24" height="1"/>
    <rect x="4" y="21" width="24" height="1"/>
    <rect x="4" y="22" width="24" height="1"/>
  </g>
  <!-- bottom shadow -->
  <rect x="4" y="23" width="24" height="1" fill="#1e7aad"/>
  <rect x="6" y="22" width="20" height="1" fill="#3aa3d6"/>
  <!-- glossy top highlight -->
  <g fill="#c9f3ff">
    <rect x="7" y="15" width="3" height="1"/>
    <rect x="6" y="16" width="2" height="1"/>
  </g>
  <!-- lighter belly patch -->
  <rect x="12" y="19" width="8" height="3" fill="#a7dff5"/>
  <!-- ===== eyes ===== -->
  <g fill="#103a56">
    <rect x="10" y="16" width="4" height="5"/>
    <rect x="18" y="16" width="4" height="5"/>
  </g>
  <g fill="#f4fdff">
    <rect x="11" y="17" width="2" height="3"/>
    <rect x="19" y="17" width="2" height="3"/>
  </g>
  <!-- ===== spiky golden hair (knight style) ===== -->
  <g fill="#f2c94c">
    <!-- left spike -->
    <rect x="10" y="5" width="1" height="3"/>
    <rect x="9" y="6" width="3" height="2"/>
    <!-- middle (tallest) spike -->
    <rect x="15" y="3" width="2" height="2"/>
    <rect x="14" y="4" width="4" height="1"/>
    <rect x="13" y="5" width="5" height="3"/>
    <!-- right spike -->
    <rect x="20" y="6" width="3" height="2"/>
    <rect x="19" y="7" width="5" height="1"/>
    <!-- scalp cap -->
    <rect x="8" y="8" width="16" height="2"/>
    <rect x="9" y="10" width="14" height="1"/>
    <!-- jagged fringe -->
    <rect x="9" y="11" width="2" height="2"/>
    <rect x="13" y="11" width="2" height="3"/>
    <rect x="17" y="11" width="2" height="2"/>
    <rect x="21" y="11" width="2" height="3"/>
  </g>
  <!-- dark-gold outline strands -->
  <g fill="#7a4e10">
    <rect x="10" y="4" width="1" height="1"/>
    <rect x="9" y="6" width="1" height="2"/>
    <rect x="15" y="2" width="2" height="1"/>
    <rect x="14" y="3" width="1" height="2"/>
    <rect x="13" y="5" width="1" height="3"/>
    <rect x="20" y="5" width="1" height="1"/>
    <rect x="19" y="7" width="1" height="1"/>
    <rect x="12" y="8" width="1" height="2"/>
    <rect x="18" y="8" width="1" height="2"/>
    <rect x="13" y="14" width="2" height="1"/>
    <rect x="21" y="14" width="2" height="1"/>
  </g>
  <!-- bright highlights -->
  <g fill="#ffe9a0">
    <rect x="15" y="3" width="1" height="2"/>
    <rect x="16" y="6" width="1" height="2"/>
    <rect x="10" y="8" width="2" height="1"/>
  </g>
</svg>
