<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Gloop monochrome inverted icon" shape-rendering="crispEdges">
  <rect width="64" height="64" rx="14" fill="#1a1a2e"/>

  <!-- body -->
  <g fill="#f8f9fa" opacity="0.9">
    <rect x="20" y="14" width="24" height="2"/>
    <rect x="18" y="16" width="28" height="2"/>
    <rect x="16" y="18" width="32" height="2"/>
    <rect x="14" y="20" width="36" height="2"/>
    <rect x="12" y="22" width="40" height="2"/>
    <rect x="10" y="24" width="44" height="2"/>
    <rect x="10" y="26" width="44" height="2"/>
    <rect x="8" y="28" width="48" height="2"/>
    <rect x="8" y="30" width="48" height="2"/>
    <rect x="8" y="32" width="48" height="2"/>
    <rect x="8" y="34" width="48" height="2"/>
    <rect x="8" y="36" width="48" height="2"/>
    <rect x="8" y="38" width="48" height="2"/>
    <rect x="8" y="40" width="48" height="2"/>
    <rect x="8" y="42" width="48" height="2"/>
    <rect x="8" y="44" width="48" height="2"/>
