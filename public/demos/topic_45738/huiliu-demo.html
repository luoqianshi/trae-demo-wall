/* ===== 人物列表页 ===== */

.detail-view {

.timeline-section {

.timeline-header {

}

.timeline-header h2 {

}

.add-story-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.add-story-btn:hover {
  background: var(--accent-dark);
  transform: translateY(-1px);
}

.timeline {
  position: relative;
  padding-left: 32px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--accent-light), var(--border));
  border-radius: 1px;
}

.timeline-item {
  position: relative;
  margin-bottom: 28px;
  padding: 20px 24px;
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: 0 2px 8px var(--shadow);
  border: 1px solid var(--border);
  transition: var(--transition);
  animation: slideInLeft 0.4s ease-out both;
}

.timeline-item:hover {
  box-shadow: 0 4px 16px var(--shadow-md);
  border-color: var(--accent-light);
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -28px;
  top: 26px;
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 50%;
  border: 3px solid var(--bg-primary);
  box-shadow: 0 0 0 2px var(--accent-light);
}

.timeline-date {
  font-size: 13px;
  color: var(--accent-dark);
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.timeline-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 8px;
}

.timeline-desc {

  color: var(--text-secondary);
  line-height: 1.7;
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-16px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ===== AI回忆录区域 ===== */
.memoir-section {
  margin-bottom: 40px;
}

.memoir-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.memoir-header h2 {
  font-size: 22px;
  font-weight: 700;
}

.memoir-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-secondary);
  padding: 4px;
  border-radius: 10px;
}

.memoir-tab {
  padding: 8px 20px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
}

.memoir-tab.active {
  background: var(--bg-card);
  color: var(--accent-dark);
  box-shadow: 0 1px 4px var(--shadow);
}

.memoir-tab:hover:not(.active) {
  color: var(--text-primary);
}

.memoir-content {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 32px;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1px solid var(--border);
  min-height: 200px;
  position: relative;
}

.memoir-text {
  font-size: 16px;
  line-height: 2;
  color: var(--text-primary);
  white-space: pre-wrap;
}

.memoir-text .cursor-blink {
  display: inline-block;
  width: 2px;
  height: 1.2em;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.memoir-placeholder {
  color: var(--text-light);
  font-size: 15px;
  text-align: center;
  padding: 40px 0;
}

.memoir-generating {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--accent);
  font-size: 14px;
  margin-bottom: 16px;
}

.memoir-generating .dot {
  display: inline-block;
  animation: dotPulse 1.4s ease-in-out infinite;
}

.memoir-generating .dot:nth-child(2) { animation-delay: 0.2s; }
.memoir-generating .dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}

/* ===== 关系图谱页 ===== */
.graph-view {
  padding-top: 80px;
  padding-bottom: 40px;

.graph-container {

}

}

/* ===== 模态框 ===== */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(74, 55, 40, 0.4);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.modal-overlay.show {
  display: flex;
  opacity: 1;
}

.modal {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 20px 60px rgba(74, 55, 40, 0.2);
  transform: translateY(20px) scale(0.97);
  transition: transform 0.3s ease;
}

.modal-overlay.show .modal {
  transform: translateY(0) scale(1);
}

.modal h3 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
}

.form-group {

}

.form-group label {

  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  color: var(--text-primary);
  background: var(--bg-primary);
  transition: var(--transition);
  outline: none;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {

  box-shadow: 0 0 0 3px rgba(232, 145, 90, 0.15);
}

}

}

.btn {

  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-primary:hover {
  background: var(--accent-dark);
}

.btn-secondary {
  background: var(--bg-secondary);
  color: var(--text-secondary);
}

.btn-secondary:hover {
  background: var(--border);
  color: var(--text-primary);
}

  bottom: 32px;

  z-index: 300;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== SVG图标内联 ===== */
.icon-svg {

}

::-webkit-scrollbar {

}

}

<script>
/* ===== 回留 HuiLiu - 主逻辑脚本 ===== */

// ===== 预置数据 =====
const PRESET_PERSONS = [
  {
    id: 'preset-laowang',
    name: '老王',
    relation: '最好的兄弟',
    description: '大学四年上下铺的兄弟，一起逃课、一起挂科、一起通宵打游戏',
    avatarColor: '#5B8C5A',
    avatarEmoji: '\u{1F9D1}',
    events: [
      { date: '2018.09', title: '初次见面', desc: '开学第一天，你提着行李走进宿舍，看到一个瘦高个正趴在上铺看书。你说"哥们，这床位有人吗？"他头也不抬说"没有，随便。"这就是你们故事的开端。' },
      { date: '2019.03', title: '一起通宵', desc: '期末考试前夜，两个人在图书馆通宵复习，结果你睡着了，他把你的笔记抄了一份放在你桌上。' },
      { date: '2020.06', title: '毕业分别', desc: '毕业典礼上，你们喝了很多酒。他说"以后不管在哪，每年至少见一次。"你们碰了杯，谁也没哭。' },
      { date: '2022.10', title: '重逢', desc: '两年后你出差到他的城市，他来机场接你，见面第一句话是"你怎么胖了这么多"。' }
    ],
    memoirs: {
      theirStory: '2018年的秋天，一个叫老王的年轻人走进了大学宿舍。他瘦高个，戴眼镜，总是趴在上铺看书，看起来不太好接近。但后来所有人都会告诉你，他是整个宿舍最靠谱的人。\n\n那四年里，他陪你度过了人生中最无忧无虑的时光。你们一起在期末考试前通宵复习，一起在食堂排队抢最后一份红烧肉，一起在深夜的操场上聊未来聊到凌晨三点。\n\n他不是那种会说漂亮话的人。毕业那天，他只说了一句"以后不管在哪，每年至少见一次"。但就是这句话，让你们在毕业后的两年里，真的每年都见了一次。\n\n有些友情不需要太多言语，它就安安静静地在那里，像一盏灯，不管你走多远，回头总能看到。',
      ourStory: '我和老王的故事，要从一袋泡面说起。\n\n大一军训期间，宿舍熄灯了，我饿得睡不着，偷偷泡了一袋方便面。上铺的老王闻到味道，探出头来说"哥们，分我一口"。就这样，一袋五块钱的泡面，开启了一段持续至今的兄弟情。\n\n我们之间的默契是一种很奇妙的东西。期末考试前，不用说话，他知道我要通宵，就会自动把他的笔记放在我桌上。打篮球的时候，不用眼神交流，他知道我要传球，球就已经到了。\n\n毕业那天我们喝了很多酒。他说"以后不管在哪，每年至少见一次"。我们碰了杯，谁也没哭。但后来每次想到那个画面，眼睛都会酸。\n\n两年后我出差到他的城市，他来机场接我。见面第一句话是"你怎么胖了这么多"。我笑了。有些人，不管多久没见，一开口就回到了当年那个宿舍。\n\n这就是我和老王的故事。没有轰轰烈烈，但每一段都值得记住。'
    }
  },
  {
    id: 'preset-mama',
    name: '妈妈',
    relation: '母亲',
    description: '那个总是把最好的留给我的人，不善表达，但每个细节都是爱',
    avatarColor: '#D4726A',
    avatarEmoji: '\u{1F469}',
    events: [
      { date: '1995.03', title: '出生', desc: '据她说，生我那天正好是春天，窗外桃花开了。她说是她这辈子最疼的一天，也是最幸福的一天。' },
      { date: '2008.09', title: '送我上初中', desc: '开学那天她骑车送我到学校门口，把书包递给我说"好好学"。我走进校门回头看，她还站在那里。' },
      { date: '2016.06', title: '高考', desc: '高考那两天她每天五点起床给我做早餐，我说不用了，她说"你考你的，我做我的"。' },
      { date: '2023.01', title: '过年回家', desc: '今年春节回家，发现她白头发多了很多。她笑着说"老了呗"，然后转身去厨房给我做了一桌子菜。' }
    ],
    memoirs: {
      theirStory: '她叫李秀芬，是一个普通的农村妇女。她没读过太多书，不会说大道理，但她用一辈子的行动告诉我，什么是爱。\n\n1995年春天，她生下了一个男孩。据她说那天窗外桃花开了，粉色的花瓣飘进病房。她说是她这辈子最疼的一天，也是最幸福的一天。\n\n她不擅长表达。送孩子上初中的那天，她骑车到学校门口，把书包递给孩子，只说了四个字"好好学"。孩子走进校门回头看，她还站在那里，阳光照在她身上。\n\n高考那两天，她每天五点起床做早餐。孩子说不用了，她说"你考你的，我做我的"。后来孩子才知道，她那两天根本没睡好，一直在客厅坐着等考试结束的消息。\n\n二十多年过去了，她的黑头发变成了白头发，但那双手还是一样温暖。每年过年回家，她还是会做一桌子菜，还是会说"多吃点，外面吃不好"。\n\n这就是一个母亲的故事。平凡，但伟大。',
      ourStory: '我和妈妈之间，隔着一代人的沉默。\n\n她从不说"我爱你"，但每次打电话，她说的第一句话永远是"吃饭了吗"。我以前觉得这话太普通了，后来才明白，在她那里，"吃饭了吗"就是"我想你了"。\n\n上初中的时候，我开始叛逆，嫌她唠叨，嫌她做的菜不好吃，嫌她不懂我的世界。有一次我冲她喊"你什么都不懂！"她愣了一下，然后转身进了厨房。后来我偷偷看到她在厨房里擦眼泪。\n\n那是我第一次意识到，我的话可以伤到她。\n\n上大学后，我离家远了。她开始学用微信，打字很慢，经常发错表情。有一次她发了一个"我想你"的表情包，我截图保存了。那可能是她鼓起很大勇气才发出来的。\n\n现在我也到了会想家的年纪。每次过年回家，看到她白头发又多了，心里都会酸。但她总是笑着说"老了呗"，然后转身去做饭。\n\n我和妈妈的故事还在继续。我希望来得及，在她还健康的时候，多陪她聊聊天，多听她说说那些她从来没说出口的话。'
    }

    name: '张老师',
    relation: '大学导师',
    description: '改变了我人生方向的恩师，让我从一个迷茫的大二学生找到了方向',

    avatarEmoji: '\u{1F9D3}',

      { date: '2019.09', title: '第一节课', desc: '大二开学第一节课，他走进教室说"我不是来教你们知识的，我是来帮你们找到自己想做什么的。"那句话改变了一切。' },
      { date: '2020.04', title: '论文指导', desc: '疫情期间，他每周视频指导我的毕业论文，有次网络断了，他打了四十分钟电话继续讲。' },
      { date: '2021.06', title: '毕业推荐', desc: '他主动帮我联系了一家很好的公司，推荐信写了三页纸。我后来才知道，他为了这封推荐信打了五个电话。' },
      { date: '2024.12', title: '教师节', desc: '每年教师节我都会给他发消息，他总是回一句"你过得好就是最好的教师节礼物"。' }
    ],
    memoirs: {
      theirStory: '张明远，1968年生，大学副教授，教了三十年书。在无数学生眼里，他只是一个普通的老师——上课准时，批改认真，偶尔讲几个冷笑话。\n\n但他改变了很多人的方向。\n\n2019年秋天，大二开学第一节课，他走进教室，放下课本，说了一句话："我不是来教你们知识的，我是来帮你们找到自己想做什么的。"\n\n这句话听起来像套话，但他真的在这么做。他会记住每个学生的名字，会在课后找迷茫的学生聊天，会帮有潜力的学生争取机会。\n\n疫情期间，他每周视频指导学生的毕业论文。有一次网络断了，他打了四十分钟电话继续讲。学生后来才知道，那天他爱人刚做完手术，他是一边在医院陪护一边给学生打电话的。\n\n他从不把这些事挂在嘴边。每年教师节收到学生的消息，他总是回一句"你过得好就是最好的教师节礼物"。\n\n三十年教学生涯，他没有出过什么名，但他点亮了很多人的路。',
      ourStory: '大二那年，我是一个迷茫的学生。不知道自己想做什么，不知道学这个专业有什么用，每天上课只是走个过场。\n\n直到张老师的第一节课。\n\n他说"我不是来教你们知识的，我是来帮你们找到自己想做什么的"。当时我觉得这话挺空的，但后来发生的事证明，他是认真的。\n\n大三下学期，我面临考研还是工作的选择，犹豫不决。张老师约我到办公室聊了两个小时。他没有告诉我该怎么做，而是问了我很多问题——你真正喜欢什么？你想象中五年后的自己在做什么？你愿意为这个方向付出什么？\n\n那次谈话之后，我做了决定。\n\n后来毕业找工作，他不声不响地帮我联系了一家很好的公司。推荐信写了三页纸。我后来才知道，他为了这封推荐信打了五个电话。他从来没提过这件事。\n\n现在每年教师节，我都会给他发消息。他总是回一句"你过得好就是最好的教师节礼物"。\n\n张老师教会我的不是专业知识，而是怎么找到自己的方向。这比任何课本上的知识都重要。'
    }

];

// ===== 应用状态 =====
let appState = {
  currentView: 'home',
  currentPersonId: null,
  memoirMode: 'theirStory', // 'theirStory' | 'ourStory'
  memoirTyping: false,
  typingTimer: null,
  persons: []
};

// ===== 初始化 =====
function init() {
  // 从localStorage加载数据，如果没有则使用预置数据
  const saved = localStorage.getItem('huiliu_persons');
  if (saved) {
    try {
      appState.persons = JSON.parse(saved);
    } catch(e) {
      appState.persons = JSON.parse(JSON.stringify(PRESET_PERSONS));
    }
  } else {
    appState.persons = JSON.parse(JSON.stringify(PRESET_PERSONS));
    saveData();
  }

  // 显示首页
  navigateTo('home');
}

// ===== 数据持久化 =====
function saveData() {
  localStorage.setItem('huiliu_persons', JSON.stringify(appState.persons));
}

// ===== 导航系统 =====
function navigateTo(viewName, personId) {
  // 停止正在进行的打字机动画
  stopTyping();

  // 隐藏所有视图
  document.querySelectorAll('.view').forEach(v => {
    v.classList.remove('active');
  });

  // 控制导航栏显示
  const navbar = document.getElementById('navbar');
  if (viewName === 'home') {
    navbar.classList.remove('visible');
  } else {
    navbar.classList.add('visible');
  }

  // 更新状态
  appState.currentView = viewName;
  if (personId !== undefined) {
    appState.currentPersonId = personId;
  }

  // 延迟显示目标视图（实现动画效果）
  setTimeout(() => {
    const targetView = document.getElementById('view-' + viewName);
    if (targetView) {
      targetView.classList.add('active');
    }

    // 根据视图渲染内容
    switch(viewName) {
      case 'list':
        renderPersonList();
        break;
      case 'detail':
        renderPersonDetail();
        break;
      case 'graph':
        renderGraph();
        break;
    }

    // 滚动到顶部
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 50);
}

// ===== 人物列表渲染 =====
function renderPersonList() {
  const container = document.getElementById('personList');
  let html = '';

  // 渲染每个人物卡片
  appState.persons.forEach((person, index) => {
    const eventCount = person.events ? person.events.length : 0;
    html += `
      <div class="person-card" onclick="navigateTo('detail', '${person.id}')" style="animation-delay: ${index * 0.08}s">
        <div class="person-card-avatar" style="background: ${person.avatarColor}">
          ${person.avatarEmoji || person.name.charAt(0)}
        </div>
        <div class="person-card-name">${escapeHtml(person.name)}</div>
        <span class="person-card-relation">${escapeHtml(person.relation)}</span>
        <div class="person-card-desc">${escapeHtml(person.description)}</div>
        <div class="person-card-events">${eventCount} 个故事</div>
      </div>
    `;
  });

  // 添加新人物卡片
  html += `
    <div class="add-card" onclick="openModal('modal-person')">
      <div class="add-card-icon">+</div>
      <div class="add-card-text">创建新人物</div>
    </div>
  `;

  container.innerHTML = html;
}

// ===== 人物详情渲染 =====
function renderPersonDetail() {
  const person = appState.persons.find(p => p.id === appState.currentPersonId);
  if (!person) {
    navigateTo('list');
    return;
  }

  const container = document.getElementById('detailContent');
  let html = '';

  // 返回按钮
  html += `<button class="detail-back" onclick="navigateTo('list')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    返回人物列表
  </button>`;

  // 人物档案卡片
  html += `
    <div class="detail-profile">
      <div class="detail-avatar" style="background: ${person.avatarColor}">
        ${person.avatarEmoji || person.name.charAt(0)}
      </div>
      <div class="detail-info">
        <h1>${escapeHtml(person.name)}</h1>
        <span class="relation-tag">${escapeHtml(person.relation)}</span>
        <p class="description">${escapeHtml(person.description)}</p>
      </div>
    </div>
  `;

  // 时间线区域
  html += `
    <div class="timeline-section">
      <div class="timeline-header">
        <h2>时间线</h2>
        <button class="add-story-btn" onclick="openModal('modal-story')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          添加故事
        </button>
      </div>
      <div class="timeline">
  `;

  if (person.events && person.events.length > 0) {
    person.events.forEach((event, index) => {
      html += `
        <div class="timeline-item" style="animation-delay: ${index * 0.1}s">
          <div class="timeline-date">${escapeHtml(event.date)}</div>
          <div class="timeline-title">${escapeHtml(event.title)}</div>
          <div class="timeline-desc">${escapeHtml(event.desc)}</div>
        </div>
      `;
    });
  } else {
    html += `<p class="memoir-placeholder">还没有故事，点击上方按钮添加第一个故事吧</p>`;
  }

  html += `</div></div>`;

  // AI回忆录区域
  const hasMemoir = person.memoirs && (person.memoirs.theirStory || person.memoirs.ourStory);
  const activeTab = appState.memoirMode;

  html += `
    <div class="memoir-section">
      <div class="memoir-header">
        <h2>AI 回忆录</h2>
        <div class="memoir-tabs">
          <button class="memoir-tab ${activeTab === 'theirStory' ? 'active' : ''}" onclick="switchMemoirMode('theirStory')">TA的故事</button>
          <button class="memoir-tab ${activeTab === 'ourStory' ? 'active' : ''}" onclick="switchMemoirMode('ourStory')">我们的故事</button>
        </div>
      </div>
      <div class="memoir-content">
  `;

  if (hasMemoir) {
    html += `<div class="memoir-text" id="memoirText"></div>`;
  } else {
    html += `<p class="memoir-placeholder">添加更多故事后，AI将为你生成回忆录</p>`;
  }

  html += `</div></div>`;

  container.innerHTML = html;

  // 如果有回忆录文本，启动打字机动画
  if (hasMemoir) {
    setTimeout(() => startTypewriter(), 300);
  }
}

// ===== 打字机动画 =====
function startTypewriter() {
  const person = appState.persons.find(p => p.id === appState.currentPersonId);
  if (!person || !person.memoirs) return;

  const text = person.memoirs[appState.memoirMode] || '';
  const container = document.getElementById('memoirText');
  if (!container) return;

  // 先显示生成中提示
  container.innerHTML = `
    <div class="memoir-generating">
      <span>AI 正在生成回忆录</span>
      <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </div>
    <div id="memoirOutput"></div>
  `;

  const output = document.getElementById('memoirOutput');
  let charIndex = 0;
  appState.memoirTyping = true;

  // 模拟短暂延迟后开始打字
  setTimeout(() => {
    const generatingHint = container.querySelector('.memoir-generating');
    if (generatingHint) generatingHint.remove();

    appState.typingTimer = setInterval(() => {
      if (!appState.memoirTyping || charIndex >= text.length) {
        clearInterval(appState.typingTimer);
        appState.typingTimer = null;
        appState.memoirTyping = false;
        // 移除光标
        const cursor = output.querySelector('.cursor-blink');
        if (cursor) cursor.remove();
        return;
      }

      // 每次输出1-3个字符，模拟不均匀的打字速度
      const chunkSize = Math.random() < 0.3 ? 2 : 1;
      const chunk = text.substring(charIndex, charIndex + chunkSize);
      charIndex += chunkSize;

      // 移除旧光标
      const cursor = output.querySelector('.cursor-blink');
      if (cursor) cursor.remove();

      // 添加文字和新光标
      output.innerHTML = escapeHtml(text.substring(0, charIndex)) + '<span class="cursor-blink"></span>';

      // 自动滚动
      const memoirContent = container.closest('.memoir-content');
      if (memoirContent) {
        memoirContent.scrollTop = memoirContent.scrollHeight;
      }
    }, 50);
  }, 800);
}

function stopTyping() {
  appState.memoirTyping = false;
  if (appState.typingTimer) {
    clearInterval(appState.typingTimer);
    appState.typingTimer = null;
  }
}

// ===== 切换回忆录模式 =====
function switchMemoirMode(mode) {
  appState.memoirMode = mode;
  renderPersonDetail();
}

// ===== 创建人物 =====
function createPerson() {
  const name = document.getElementById('input-name').value.trim();
  const relation = document.getElementById('input-relation').value.trim();
  const desc = document.getElementById('input-desc').value.trim();

  if (!name) {
    showToast('请输入姓名');
    return;
  }
  if (!relation) {
    showToast('请输入关系');
    return;
  }

  // 随机生成头像颜色
  const colors = ['#5B8C5A', '#D4726A', '#6B7DB3', '#C4956A', '#7BA68C', '#B37B8C', '#8C7BB3', '#B3A27B'];
  const color = colors[Math.floor(Math.random() * colors.length)];

  const newPerson = {
    id: 'user-' + Date.now(),
    name: name,
    relation: relation,
    description: desc || '暂无描述',
    avatarColor: color,
    avatarEmoji: name.charAt(0),
    events: [],
    memoirs: null
  };

  appState.persons.push(newPerson);
  saveData();
  closeModal('modal-person');

  // 清空表单
  document.getElementById('input-name').value = '';
  document.getElementById('input-relation').value = '';
  document.getElementById('input-desc').value = '';

  showToast('人物档案创建成功');
  renderPersonList();
}

// ===== 添加故事 =====
function addStory() {
  const date = document.getElementById('input-event-date').value.trim();
  const title = document.getElementById('input-event-title').value.trim();
  const desc = document.getElementById('input-event-desc').value.trim();

  if (!date) {
    showToast('请输入日期');
    return;
  }
  if (!title) {
    showToast('请输入标题');
    return;
  }
  if (!desc) {
    showToast('请输入故事内容');
    return;
  }

  const person = appState.persons.find(p => p.id === appState.currentPersonId);
  if (!person) return;

  if (!person.events) person.events = [];

  person.events.push({ date, title, desc });

  // 按日期排序
  person.events.sort((a, b) => a.date.localeCompare(b.date));

  saveData();
  closeModal('modal-story');

  // 清空表单
  document.getElementById('input-event-date').value = '';
  document.getElementById('input-event-title').value = '';
  document.getElementById('input-event-desc').value = '';

  showToast('故事添加成功');
  renderPersonDetail();
}

// ===== 关系图谱渲染 =====
function renderGraph() {
  const svg = document.getElementById('graphSvg');
  const persons = appState.persons;
  const count = persons.length;

  if (count === 0) {
    svg.innerHTML = '<text x="300" y="250" text-anchor="middle" fill="#B8A48E" font-size="16">还没有人物，去创建第一个吧</text>';
    return;
  }

  const cx = 300, cy = 250; // 中心点
  const radius = 170; // 人物节点分布半径
  let html = '';

  // 绘制连线（先画线，再画节点，这样节点覆盖线）
  persons.forEach((person, i) => {
    const angle = (2 * Math.PI * i / count) - Math.PI / 2;
    const px = cx + radius * Math.cos(angle);
    const py = cy + radius * Math.sin(angle);

    html += `<line x1="${cx}" y1="${cy}" x2="${px}" y2="${py}" stroke="#E8DDD0" stroke-width="2" stroke-dasharray="6,4"/>`;

    // 关系标签
    const midX = (cx + px) / 2;
    const midY = (cy + py) / 2;
    // 标签背景
    const labelText = person.relation;
    const textWidth = labelText.length * 12 + 16;
    html += `<rect x="${midX - textWidth/2}" y="${midY - 12}" width="${textWidth}" height="22" rx="11" fill="#F7EDE2" stroke="#E8DDD0" stroke-width="1"/>`;
    html += `<text x="${midX}" y="${midY + 4}" text-anchor="middle" fill="#8B7355" font-size="12" font-weight="500">${escapeHtml(labelText)}</text>`;
  });

  // 绘制中心节点"我"
  html += `
    <circle cx="${cx}" cy="${cy}" r="40" fill="#E8915A" opacity="0.15"/>
    <circle cx="${cx}" cy="${cy}" r="30" fill="#E8915A"/>
    <text x="${cx}" y="${cy + 6}" text-anchor="middle" fill="white" font-size="18" font-weight="700">我</text>
  `;

  // 绘制人物节点
  persons.forEach((person, i) => {
    const angle = (2 * Math.PI * i / count) - Math.PI / 2;
    const px = cx + radius * Math.cos(angle);
    const py = cy + radius * Math.sin(angle);

    // 外圈光晕
    html += `<circle cx="${px}" cy="${py}" r="34" fill="${person.avatarColor}" opacity="0.12"/>`;
    // 主圆
    html += `<circle cx="${px}" cy="${py}" r="26" fill="${person.avatarColor}"/>`;
    // 名字首字或emoji
    const displayChar = person.avatarEmoji && person.avatarEmoji.length <= 2 ? person.avatarEmoji : person.name.charAt(0);
    html += `<text x="${px}" y="${py + 7}" text-anchor="middle" fill="white" font-size="16" font-weight="700">${escapeHtml(displayChar)}</text>`;
    // 名字标签
    html += `<text x="${px}" y="${py + 48}" text-anchor="middle" fill="#4A3728" font-size="14" font-weight="600">${escapeHtml(person.name)}</text>`;
  });

  svg.innerHTML = html;
}

// ===== 模态框控制 =====
function openModal(id) {
  const modal = document.getElementById(id);
  modal.style.display = 'flex';
  // 触发重排以启动动画
  modal.offsetHeight;
  modal.classList.add('show');
}

function closeModal(id) {
  const modal = document.getElementById(id);
  modal.classList.remove('show');
  setTimeout(() => {
    modal.style.display = 'none';
  }, 300);
}

// 点击遮罩关闭模态框
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('show');
      setTimeout(() => {
        this.style.display = 'none';
      }, 300);
    }
  });
});

// ===== Toast提示 =====
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

// ===== 工具函数 =====
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', function(e) {
  // ESC关闭模态框
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.show').forEach(modal => {
      modal.classList.remove('show');
      setTimeout(() => {
        modal.style.display = 'none';
      }, 300);
    });
  }
});

// ===== 启动应用 =====
init();
</script>
