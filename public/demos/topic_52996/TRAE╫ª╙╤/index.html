<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

.nav{height:56px;display:flex;align-items:center;padding:0 16px;background:rgba(255,255,255,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--rule);position:relative;z-index:10;flex-shrink:0}
.nav .tt{font-size:17px;font-weight:600;flex:1;text-align:center;color:var(--ink)}

.eg{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:12px}

function psvg(seed,c1,c2,type='cat'){const r=s=>{let x=Math.sin(seed+s)*1e4;return x-Math.floor(x)};const ey=140+r(1)*10;const ear=type==='cat'?`<path d="M${70+r(0)*10} 100L60 50L100 80Z" fill="${c1}"/><path d="M${230-r(0)*10} 100L240 50L200 80Z" fill="${c1}"/>`:`<ellipse cx="80" cy="70" rx="30" ry="35" fill="${c1}"/><ellipse cx="220" cy="70" rx="30" ry="35" fill="${c1}"/>`;return`<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><defs><radialGradient id="g${seed}" cx="50%" cy="40%"><stop offset="0%" stop-color="${c2}"/><stop offset="100%" stop-color="${C.bg2}"/></radialGradient></defs><rect width="300" height="300" rx="20" fill="url(#g${seed})"/>${ear}<ellipse cx="150" cy="170" rx="95" ry="88" fill="${c1}"/><ellipse cx="150" cy="195" rx="60" ry="45" fill="${c2}" opacity=".6"/><ellipse cx="115" cy="${ey}" rx="14" ry="16" fill="#fff"/><ellipse cx="185" cy="${ey}" rx="14" ry="16" fill="#fff"/><ellipse cx="118" cy="${ey+2}" rx="8" ry="10" fill="#1a1a1a"/><ellipse cx="188" cy="${ey+2}" rx="8" ry="10" fill="#1a1a1a"/><circle cx="120" cy="${ey-2}" r="3" fill="#fff"/><circle cx="190" cy="${ey-2}" r="3" fill="#fff"/><path d="M150 ${ey+30}Q140 ${ey+42} 135 ${ey+35}M150 ${ey+30}Q160 ${ey+42} 165 ${ey+35}" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/><ellipse cx="100" cy="${ey+50}" rx="12" ry="8" fill="#ffb3b3" opacity=".5"/><ellipse cx="200" cy="${ey+50}" rx="12" ry="8" fill="#ffb3b3" opacity=".5"/></svg>`}

function genFeed(){const D=[{id:'p1',name:'小鱼干',breed:'布偶',traits:['粘人','软糯','胆小'],outfit:{hat:'h0',scarf:'s2',bg:'b0'},distance:2.3,c1:'#f0e6d2',c2:'#fff',type:'cat',moments:['又把碗推翻了','在窗台晒太阳','今天的睡姿好奇怪']},{id:'p2',name:'豆包',breed:'柴犬',traits:['欢脱','社牛','贪吃'],outfit:{hat:'h1',scarf:'s0',bg:'b2'},distance:5.1,c1:'#d4a554',c2:'#f5e6c8',type:'dog',moments:['今天又拆家了','学会握手了','追尾巴转了十圈']},{id:'p3',name:'团子',breed:'英短',traits:['慵懒','高冷','贪吃'],outfit:{hat:'h0',scarf:'s1',bg:'b1'},distance:1.2,c1:'#a0a0a0',c2:'#d0d0d0',type:'cat',moments:['又睡了一整天','对逗猫棒无动于衷','终于肯吃罐头了']},{id:'p4',name:'麻薯',breed:'金毛',traits:['粘人','社牛','话痨'],outfit:{hat:'h4',scarf:'s3',bg:'b3'},distance:3.8,c1:'#e8c878',c2:'#fff5dc',type:'dog',moments:['捡球捡到手软','跟邻居狗交朋友了','第一次下水游泳']},{id:'p5',name:'奶油',breed:'布偶',traits:['软糯','胆小','呆萌'],outfit:{hat:'h7',scarf:'s5',bg:'b0'},distance:.8,c1:'#fff0e6',c2:'#fff',type:'cat',moments:['躲在沙发后面','终于肯出来了','被自己的尾巴吓到']},{id:'p6',name:'咖啡',breed:'柯基',traits:['欢脱','贪吃','调皮'],outfit:{hat:'h2',scarf:'s0',bg:'b2'},distance:4.5,c1:'#c8804a',c2:'#f0d0a8',type:'dog',moments:['短腿的烦恼','又偷吃零食了','在公园狂奔']},{id:'p7',name:'芝麻',breed:'狸花猫',traits:['高冷','社恐','呆萌'],outfit:{hat:'h0',scarf:'s0',bg:'b1'},distance:6.2,c1:'#5a5a4a',c2:'#8a8a7a',type:'cat',moments:['在柜子顶上俯视众生','终于肯让我摸了','抓到一只飞蛾']},{id:'p8',name:'布丁',breed:'泰迪',traits:['粘人','话痨','社牛'],outfit:{hat:'h3',scarf:'s6',bg:'b3'},distance:2.9,c1:'#a8784a',c2:'#d8b888',type:'dog',moments:['美容完变帅了','对着镜子臭美','又跟路过的狗吵架了']},{id:'p9',name:'雪糕',breed:'美短',traits:['调皮','贪吃','社牛'],outfit:{hat:'h6',scarf:'s4',bg:'b0'},distance:3.1,c1:'#c0c0c0',c2:'#e8e8e8',type:'cat',moments:['把笔筒推下桌了','在键盘上踩了一排字','偷喝我的牛奶']},{id:'p10',name:'可乐',breed:'哈士奇',traits:['欢脱','调皮','话痨'],outfit:{hat:'h8',scarf:'s7',bg:'b4'},distance:7.8,c1:'#6a6a6a',c2:'#a0a0a0',type:'dog',moments:['又拆了沙发','跟镜子里的自己吵架','学会了开门']},{id:'p11',name:'芋圆',breed:'暹罗',traits:['话痨','高冷','社恐'],outfit:{hat:'h0',scarf:'s2',bg:'b5'},distance:5.6,c1:'#e8d0b0',c2:'#4a3a2a',type:'cat',moments:['半夜三点开始唱歌','对着 const Store={K:'zhaoyou',load(){try{const r=localStorage.getItem(this.K);if(r)ZY.state=JSON.parse(r)}catch(e){}if(!ZY.state.profile&&!ZY.state.onboarded)ZY.state=this.def()},save(){try{localStorage.setItem(this.K,JSON.stringify(ZY.state))}catch(e){if(e.name==='QuotaExceededError'){Toast.show('存储空间不足，已自动清理');if(ZY.state.moments&&ZY.state.moments.length>15){ZY.state.moments=ZY.state.moments.slice(0,15);try{localStorage.setItem(this.K,JSON.stringify(ZY.state))}catch(e2){}}}}},reset(){localStorage.removeItem(this.K);ZY.state=this.def()},def(){const f=genFeed();return{profile:null,points:50,signin:{lastDate:'',streak:0},chats:[],friends:[],owned:['h0','s0','b0'],feed:f,moments:genMoments(f),onboarded:false}}};

argin-top:2px">${it.price>0?it.price+' 积分':'免费'}</div><div style="margin-top:8px">${equipped?`<button class="btn btn-s btn-b" style="padding:6px;font-size:12px" disabled>已穿戴</button>`:owned?`<button class="btn btn-p btn-b" style="padding:6px;font-size:12px" onclick="equip('${cat}','${it.id}')">穿戴</button>`:tryOn===it.id?`<div style="display:flex;gap:4px"><button class="btn btn-s" style="flex:1;padding:6px;font-size:12px" onclick="tryOn=null;renderC()">取消</button><button class="btn btn-p" style="flex:1;padding:6px;font-size:12px" onclick="buy('${cat}','${it.id}',${it.price})">兑换</button></div>`:`<button class="btn btn-s btn-b" style="padding:6px;font-size:12px" onclick="tryOn='${it.id}';renderC()">试穿</button>`}</div></div></div>`}).join('')}</div></div>${tryOn?`<div style="position:absolute;bottom:0;left:0;right:0;padding:16px 20px 28px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--rule)"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div style="width:64px;height:64px;border-radius:12px;overflow:hidden;position:relative">${my.avatar}<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:24px">${cat==='hat'?OUTFITS.hat.find(h=>h.id===tryOn)?.emoji:''}</div><div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:20px">${cat==='scarf'?OUTFITS.scarf.find(s=>s.id===tryOn)?.emoji:''}</div></div><div><div style="font-size:14px;font-weight:700">试穿预览</div><div style="font-size:12px;color:var(--muted)">${OUTFITS[cat].find(i=>i.id===tryOn)?.name}</div></div></div><div style="display:flex;gap:12px"><button class="btn btn-s" style="flex:1" onclick="tryOn=null;renderC()">取消</button><button class="btn btn-p" style="flex:1" onclick="buy('${cat}','${tryOn}',${OUTFITS[cat].find(i=>i.id===tryOn)?.price||0})">兑换 ${OUTFITS[cat].find(i=>i.id===tryOn)?.price||0} 积分</button></div></div>`:''}`}window.swCat=t=>{cat=t;tryOn=null;renderC()};window.equip=(c,id)=>{my.outfit[c]=id;Store.save();renderC();Toast.show('已穿戴')};window.buy=(c,id,price)=>{if(ZY.state.points<price){Toast.show(`积分不足，再签到${Math.ceil((price-ZY.state.points)/10)}天即可兑换`);return}ZY.state.points-=price;ZY.state.owned.push(id);my.outfit[c]=id;Store.save();pa(-price);tryOn=null;renderC();Toast.show('兑换成功！')};renderC();return w}

/* === F10 · 我的中心 === */
function vMe(){const w=el('div','','');w.style.cssText='width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg)';const my=ZY.state.profile;const oh=OUTFITS.hat.find(h=>h.id===my.outfit.hat),os=OUTFITS.scarf.find(s=>s.id===my.outfit.scarf);const today=new Date().toDateString();const signed=ZY.state.signin.lastDate===today;w.innerHTML=`${sbar()}<div class="scroll" style="flex:1"><div style="background:linear-gradient(135deg,var(--accent3),#fff5f5);padding:24px 16px 28px;text-align:center;position:relative"><div style="width:100px;height:100px;border-radius:28px;overflow:hidden;margin:0 auto 14px;position:relative;box-shadow:var(--shadow-lg);border:3px solid #fff">${my.color3D?`<div id="me3d" style="width:100%;height:100%;background:linear-gradient(180deg,#fff5f5,var(--accent3))"></div>`:my.avatar}${oh.emoji?`<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:36px">${oh.emoji}</div>`:''}${os.emoji?`<div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:30px">${os.emoji}</div>`:''}</div><div style="font-size:22px;font-weight:700">${my.nickname}</div><div style="font-size:14px;color:var(--muted);margin-top:4px">${my.breed} · ${my.gender==='female'?'♀':'♂'} · ${my.age}岁</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px">${(my.traits||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></div><div style="display:flex;padding:0 16px;margin-top:-14px"><div class="card" style="flex:1;padding:18px;text-align:center;margin:4px;border-radius:16px"><div style="font-size:26px;font-weight:900;color:var(--accent)">${ZY.state.points}</div><div style="font-size:13px;color:var(--muted)">积分</div></div><div class="card" style="flex:1;padding:18px;text-align:center;margin:4px;border-radius:16px" onclick="nav('friends')"><div style="font-size:26px;font-weight:900;color:var(--accent)">${ZY.state.friends.length}</div><div style="font-size:13px;color:var(--muted)">好友</div></div><div class="card" style="flex:1;padding:18px;text-align:center;margin:4px;border-radius:16px" onclick="nav('points')"><div style="font-size:26px;font-weight:900;color:var(--accent)">${ZY.state.signin.streak}</div><div style="font-size:13px;color:var(--muted)">连续签到</div></div></div><div style="padding:16px">${signed?`<div style="background:var(--accent3);border-radius:16px;padding:16px;text-align:center;font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px">✅ 今日已签到 · 连续${ZY.state.signin.streak}天</div>`:`<button class="btn btn-p btn-b" style="margin-bottom:12px" onclick="doSignin()">📅 每日签到 +10积分</button>`}<div class="card" style="overflow:hidden;margin-bottom:12px"><div onclick="nav('dressup')" style="display:flex;align-items:center;padding:16px;cursor:pointer;border-bottom:1px solid var(--rule)"><span style="font-size:24px;margin-right:12px">✨</span><span style="flex:1;font-size:15px;font-weight:600">装扮商店</span><span style="font-size:13px;color:var(--muted)">›</span></div><div onclick="nav('friends')" style="display:flex;align-items:center;padding:16px;cursor:pointer;border-bottom:1px solid var(--rule)"><span style="font-size:24px;margin-right:12px">👥</span><span style="flex:1;font-size:15px;font-weight:600">好友列表</span><span style="font-size:13px;color:var(--muted)">${ZY.state.friends.length}位好友 ›</span></div><div onclick="nav('settings')" style="display:flex;align-items:center;padding:16px;cursor:pointer"><span style="font-size:24px;margin-right:12px">⚙️</span><span style="flex:1;font-size:15px;font-weight:600">设置</span><span style="font-size:13px;color:var(--muted)">›</span></div></div></div></div>`;window.doSignin=()=>{if(signed){Toast.show('今日已签到');return}ZY.state.signin.lastDate=today;ZY.state.signin.streak++;pa(10);if(ZY.state.signin.streak%7===0){pa(30);Toast.show('🎉 连续签到7天！额外+30积分')}else Toast.show('签到成功！+10积分');Store.save();render()};if(my.color3D){setTimeout(()=>{const c3d=document.getElementById('me3d');if(c3d&&window.THREE){ZY.temp.me3DInst=createPet3D(c3d,{primary:my.color3D.primary,secondary:my.color3D.secondary,type:my.petType||'cat',hat:oh.emoji,scarf:os.emoji})}},50)}return w}

/* === F12 · 好友列表 === */
function vFriends(){const w=el('div','','');w.style.cssText='width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg)';const friends=ZY.state.friends.map(fid=>ZY.state.feed.find(p=>p.id===fid)).filter(Boolean);w.innerHTML=`${sbar()}${navbar('好友列表')}<div class="scroll" style="flex:1">${friends.length===0?`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px;text-align:center"><div style="font-size:56px;margin-bottom:16px">👥</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">还没有好友</div><div style="font-size:13px;color:var(--muted);margin-bottom:20px">多聊天就能加好友啦～</div><button class="btn btn-p" onclick="tab('discover')">去发现</button></div>`:friends.map((f,i)=>{const oh=OUTFITS.hat.find(h=>h.id===f.outfit.hat);return`<div class="ae" style="animation-delay:${i*40}ms;display:flex;align-items:center;padding:12px 16px;background:#fff;border-bottom:1px solid var(--rule);cursor:pointer" onclick="nav('pet-detail',{petId:'${f.id}'})"><div style="width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;position:relative">${f.avatar}${oh.emoji?`<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:16px">${oh.emoji}</div>`:''}</div><div style="flex:1;margin-left:12px"><div style="font-weight:700;font-size:15px">${f.name}</div><div style="font-size:12px;color:var(--muted)">${f.breed} · ${(f.traits||[]).join(' ')}</div></div><div style="font-size:11px;color:var(--accent2)" onclick="event.stopPropagation();nav('chat',{petId:'${f.id}'})">发消息 ›</div></div>`}).join('')}</div>`;return w}

/* === F13 · 设置 === */
function vSettings(){const w=el('div','','');w.style.cssText='width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg)';w.innerHTML=`${sbar()}${navbar('设置')}<div class="scroll" style="flex:1;padding:12px 16px"><div class="card" style="overflow:hidden;margin-bottom:16px"><div onclick="showGuide()" style="display:flex;align-items:center;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--rule)"><span style="font-size:20px;margin-right:12px">📖</span><span style="flex:1;font-size:14px">查看引导</span><span style="color:var(--muted)">›</span></div><div onclick="Toast.show('爪友 v1.2 · 让毛孩子自己交朋友')" style="display:flex;align-items:center;padding:14px 16px;cursor:pointer"><span style="font-size:20px;margin-right:12px">ℹ️</span><span style="flex:1;font-size:14px">关于爪友</span><span style="color:var(--muted)">v1.2</span></div></div><button class="btn btn-d btn-b" onclick="confirmReset()">🗑 重置 Demo 数据</button><div style="text-align:center;padding:20px;font-size:12px;color:var(--muted)">爪友 · For Trae AI Creativity Contest</div></div>`;window.confirmReset=()=>{const ov=el('div','ov ovc');ov.innerHTML=`<div class="card si" style="padding:24px;width:280px;text-align:center"><div style="font-size:16px;font-weight:700;margin-bottom:8px">确认重置？</div><div style="font-size:13px;color:var(--muted);margin-bottom:20px">所有数据将被清空，包括毛孩子、积分、好友等</div><div style="display:flex;gap:12px"><button class="btn btn-s" style="flex:1" onclick="this.closest('.ov').remove()">取消</button><button class="btn btn-d" style="flex:1" onclick="doReset()">确认重置</button></div></div>`;w.appendChild(ov)};window.doReset=()=>{Store.reset();ZY.view='discover';ZY.stack=[];render()};return w}

/* === 积分明细 === */
function vPoints(){const w=el('div','','');w.style.cssText='width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg)';const rules=[{a:'每日签到',v:'+10'},{a:'创建毛孩子',v:'+50'},{a:'破冰对话',v:'+5'},{a:'发布动态',v:'+5'},{a:'连续签到7天',v:'+30'},{a:'兑换装扮',v:'-10~-100'}];w.innerHTML=`${sbar()}${navbar('积分明细')}<div class="scroll" style="flex:1;padding:16px"><div style="background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;padding:24px;text-align:center;color:#fff;margin-bottom:16px"><div style="font-size:13px;opacity:.8">当前积分</div><div style="font-size:36px;font-weight:900;margin-top:4px">${ZY.state.points}</div></div><div style="font-size:14px;font-weight:700;margin-bottom:12px">积分规则</div><div class="card" style="overflow:hidden">${rules.map((r,i)=>`<div style="display:flex;align-items:center;padding:12px 16px;${i<rules.length-1?'border-bottom:1px solid var(--rule);':''}"><span style="flex:1;font-size:14px">${r.a}</span><span style="font-size:14px;font-weight:700;color:var(--accent2)">${r.v}</span></div>`).join('')}</div></div>`;return w}

/* === INIT === */
Store.load();render();
</script>
</body>
</html>
