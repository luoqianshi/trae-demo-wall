<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelCraft · AI小说编辑器 | 交互式Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-primary:#0d0d0d;--bg-secondary:#12121a;--bg-panel:#1a1a2e;--bg-hover:#252535;
  --border-color:#2a2a4a;--text-primary:#c0c0d0;--text-secondary:#8a8aaa;--text-muted:#6a6a8a;
  --accent-purple:#6b21a8;--accent-indigo:#4f46e5;--accent-blue:#3b82f6;
  --accent-green:#10b981;--accent-amber:#fbbf24;--accent-red:#ef4444;
  --gradient-primary:linear-gradient(135deg,#6b21a8,#7c3aed);
  --gradient-success:linear-gradient(135deg,#10b981,#059669);
  --gradient-warning:linear-gradient(135deg,#fbbf24,#f59e0b);
}
body{
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg-primary);color:var(--text-primary);
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--bg-primary);}
::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted);}

/* Title Bar */
.titlebar{
  height:40px;background:var(--bg-secondary);border-bottom:1px solid var(--border-color);
  display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0;
}
.titlebar-left,.titlebar-right{display:flex;align-items:center;gap:6px;}
.window-controls{display:flex;gap:4px;}
.win-btn{width:12px;height:12px;border-radius:50%;cursor:pointer;}
.win-close{background:#ff5f57;}
.win-min{background:#febc2e;}
.win-max{background:#28c840;}
.app-title{color:var(--text-secondary);font-size:12px;font-weight:500;}
.btn{
  padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;
  display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-family:inherit;
}
.btn-primary{background:var(--gradient-primary);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-success{background:var(--gradient-success);color:#fff;}
.btn-success:hover{opacity:.9;}
.btn-warning{background:var(--gradient-warning);color:#1a1a2e;}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-color);}
.btn-ghost:hover{background:var(--bg-hover);color:#fff;}
.btn-sm{padding:4px 8px;font-size:11px;}
.btn-icon{padding:6px;background:transparent;color:var(--text-secondary);}
.btn-icon:hover{background:var(--bg-hover);color:#fff;}

/* Main Layout */
.main-layout{flex:1;display:flex;overflow:hidden;}

/* Sidebar */
.sidebar{
  width:48px;background:var(--bg-secondary);border-right:1px solid var(--border-color);
  display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:8px;flex-shrink:0;
}
.sidebar-item{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-muted);transition:all .2s;font-size:18px;position:relative;
}
.sidebar-item:hover{background:var(--bg-hover);color:#fff;}
.sidebar-item.active{background:var(--bg-hover);color:var(--accent-purple);}
.sidebar-item .badge{
  position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;
  background:var(--accent-purple);color:#fff;border-radius:8px;font-size:9px;
  display:flex;align-items:center;justify-content:center;font-weight:600;
}

/* File Explorer */
.explorer{
  width:220px;background:var(--bg-primary);border-right:1px solid var(--border-color);
  display:flex;flex-direction:column;flex-shrink:0;
}
.explorer-header{
  padding:12px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;
}
.explorer-title{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;}
.novel-list{flex:1;overflow-y:auto;padding:8px;}
.novel-item{
  padding:10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .15s;color:var(--text-primary);font-size:13px;
}
.novel-item:hover{background:var(--bg-hover);}
.novel-item.active{background:rgba(107,33,168,.2);}
.novel-icon{font-size:14px;}

/* Editor Area */
.editor-area{flex:1;display:flex;flex-direction:column;min-width:0;}
.editor-tabs{
  height:36px;background:var(--bg-secondary);border-bottom:1px solid var(--border-color);
  display:flex;align-items:center;padding:0 8px;gap:2px;flex-shrink:0;
}
.editor-tab{
  padding:0 16px;height:32px;display:flex;align-items:center;gap:8px;
  color:var(--text-secondary);cursor:pointer;border-radius:6px 6px 0 0;font-size:13px;transition:all .15s;
}
.editor-tab:hover{background:var(--bg-hover);color:#fff;}
.editor-tab.active{background:var(--bg-primary);color:#fff;border-top:2px solid var(--accent-purple);}

.editor-toolbar{
  height:40px;background:var(--bg-primary);border-bottom:1px solid var(--border-color);
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
}
.toolbar-divider{width:1px;height:20px;background:var(--border-color);}

.editor-container{flex:1;display:flex;overflow:hidden;}
.outline-panel{
  width:200px;background:var(--bg-primary);border-right:1px solid var(--border-color);
  display:flex;flex-direction:column;flex-shrink:0;
}
.outline-header{padding:10px;border-bottom:1px solid var(--border-color);font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;}
.chapter-tree{flex:1;overflow-y:auto;padding:8px;}
.chapter-node{
  padding:8px 10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .15s;margin-bottom:2px;font-size:12px;
}
.chapter-node:hover{background:var(--bg-hover);}
.chapter-node.active{background:rgba(107,33,168,.25);color:#fff;}
.chapter-node .chapter-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chapter-node .chapter-actions{display:none;gap:2px;}
.chapter-node:hover .chapter-actions{display:flex;}

.editor-main{flex:1;display:flex;flex-direction:column;min-width:0;padding:24px;overflow-y:auto;}
.chapter-title-input{
  width:100%;background:transparent;border:none;color:#fff;font-size:28px;font-weight:700;
  outline:none;margin-bottom:8px;font-family:inherit;
}
.chapter-info{display:flex;align-items:center;gap:12px;color:var(--text-muted);font-size:12px;margin-bottom:20px;}
.chapter-content{
  width:100%;min-height:400px;background:transparent;border:none;color:var(--text-primary);
  font-size:15px;line-height:1.8;outline:none;resize:none;font-family:inherit;
}
.chapter-content::placeholder{color:var(--text-muted);}

.status-bar{
  height:28px;background:var(--accent-purple);display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;font-size:11px;color:#fff;flex-shrink:0;
}
.status-left,.status-right{display:flex;gap:16px;}

/* Right Panel */
.right-panels{width:280px;display:flex;flex-shrink:0;}
.panel-tabs{
  width:48px;background:var(--bg-secondary);border-left:1px solid var(--border-color);
  display:flex;flex-direction:column;padding:12px 0;gap:4px;flex-shrink:0;
}
.panel-tab{
  width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-muted);transition:all .2s;font-size:16px;position:relative;
}
.panel-tab:hover{background:var(--bg-hover);color:#fff;}
.panel-tab.active{background:var(--bg-hover);color:var(--accent-purple);}
.panel-tab .count{
  position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;padding:0 3px;
  background:var(--accent-purple);color:#fff;border-radius:8px;font-size:9px;
  display:flex;align-items:center;justify-content:center;font-weight:600;
}

.panel-content{
  flex:1;background:var(--bg-secondary);display:flex;flex-direction:column;min-width:0;
}
.panel-header{
  padding:12px 16px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
}
.panel-title{font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px;}
.panel-body{flex:1;overflow-y:auto;padding:12px;}
.panel-footer{padding:12px;border-top:1px solid var(--border-color);flex-shrink:0;}

/* Character Card */
.char-card{
  background:var(--bg-primary);border-radius:10px;padding:12px;margin-bottom:10px;
  border:1px solid var(--border-color);transition:all .2s;
}
.char-card:hover{border-color:var(--accent-purple);}
.char-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.char-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--gradient-primary);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;flex-shrink:0;
}
.char-info{flex:1;min-width:0;}
.char-name{color:#fff;font-size:14px;font-weight:600;}
.char-role{color:var(--text-muted);font-size:11px;}
.char-actions{display:flex;gap:4px;}
.char-traits{display:flex;flex-wrap;gap:4px;}
.trait-tag{
  padding:3px 8px;border-radius:4px;background:rgba(107,33,168,.2);color:#c4b5fd;
  font-size:11px;
}

/* Timeline */
.timeline-day{
  background:var(--bg-primary);border-radius:8px;padding:10px;margin-bottom:8px;
  border-left:3px solid var(--border-color);cursor:pointer;transition:all .2s;
}
.timeline-day:hover{border-left-color:var(--accent-purple);background:var(--bg-hover);}
.timeline-day.key{border-left-color:var(--accent-amber);background:linear-gradient(90deg,rgba(251,191,36,.1),transparent);}
.day-label{color:#fff;font-size:13px;font-weight:500;}
.day-note{color:var(--text-muted);font-size:12px;margin-top:4px;}

/* Event Card */
.event-card{
  background:var(--bg-primary);border-radius:10px;padding:12px;margin-bottom:10px;
  border:1px solid var(--border-color);transition:all .2s;
}
.event-card:hover{border-color:var(--accent-purple);}
.event-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.event-title{color:#fff;font-size:13px;font-weight:600;}
.event-meta{display:flex;gap:8px;flex-wrap:wrap;}
.event-cat{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.cat-plot{background:rgba(59,135,246,.2);color:#93c5fd;}
.cat-character{background:rgba(16,185,129,.2);color:#6ee7b7;}
.cat-world{background:rgba(107,33,168,.2);color:#c4b5fd;}
.cat-other{background:rgba(107,114,128,.2);color:#cbd5e1;}

/* AI Panel */
.ai-panel{
  width:320px;background:var(--bg-secondary);border-left:1px solid var(--border-color);
  display:flex;flex-direction:column;flex-shrink:0;transition:width .3s;
}
.ai-panel.collapsed{width:48px;}
.ai-header{
  padding:12px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;
}
.ai-title{display:flex;align-items:center;gap:8px;color:#fff;font-weight:600;font-size:13px;}
.ai-status{display:flex;align-items:center;gap:6px;color:var(--accent-green);font-size:11px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;}
.ai-message{max-width:90%;padding:10px 12px;border-radius:12px;font-size:13px;line-height:1.5;}
.ai-message.user{align-self:flex-end;background:var(--gradient-primary);color:#fff;border-bottom-right-radius:4px;}
.ai-message.assistant{align-self:flex-start;background:var(--bg-primary);color:var(--text-primary);border-bottom-left-radius:4px;border:1px solid var(--border-color);}
.ai-suggestions{padding:8px 12px;border-top:1px solid var(--border-color);display:flex;gap:6px;flex-wrap:wrap;}
.suggestion-chip{
  padding:4px 10px;border-radius:14px;background:var(--bg-hover);color:var(--text-secondary);
  font-size:11px;cursor:pointer;transition:all .15s;border:none;
}
.suggestion-chip:hover{background:rgba(107,33,168,.3);color:#fff;}
.ai-input-area{padding:12px;border-top:1px solid var(--border-color);display:flex;gap:8px;}
.ai-input{
  flex:1;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;
  padding:8px 12px;color:#fff;font-size:13px;outline:none;font-family:inherit;
}
.ai-input:focus{border-color:var(--accent-purple);}
.ai-send{
  width:36px;height:36px;background:var(--gradient-primary);border:none;border-radius:8px;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.ai-send:hover{opacity:.9;}
.ai-send:disabled{opacity:.5;cursor:not-allowed;}

/* Modal */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);
}
.modal{
  background:var(--bg-panel);border:1px solid var(--border-color);border-radius:16px;padding:24px;
  width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.modal-title{color:#fff;font-size:18px;font-weight:600;margin-bottom:8px;}
.modal-desc{color:var(--text-secondary);font-size:13px;margin-bottom:20px;}
.modal-input{
  width:100%;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:10px;
  padding:10px 14px;color:#fff;font-size:14px;outline:none;margin-bottom:16px;font-family:inherit;
}
.modal-input:focus{border-color:var(--accent-purple);}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;}

/* Toast */
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:10px;color:#fff;font-size:13px;z-index:200;
  display:flex;align-items:center;gap:8px;animation:slideDown .3s ease-out;
}
.toast.success{background:var(--gradient-success);}
.toast.error{background:linear-gradient(135deg,#ef4444,#dc2626);}
.toast.info{background:var(--gradient-primary);}
@keyframes slideDown{from{opacity:0;transform:translate(-50%,-20px);}to{opacity:1;transform:translate(-50%,0);}}

/* Welcome Screen */
.welcome-screen{
  flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:var(--bg-primary);
}
.welcome-icon{
  width:80px;height:80px;border-radius:20px;background:var(--gradient-primary);
  display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;
  box-shadow:0 10px 40px rgba(107,33,168,.4);
}
.welcome-title{color:#fff;font-size:24px;font-weight:700;margin-bottom:8px;}
.welcome-desc{color:var(--text-muted);font-size:14px;margin-bottom:24px;}

/* Empty State */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty-text{font-size:13px;}
.empty-action{margin-top:16px;}

/* Highlight */
.highlight{background:rgba(251,191,36,.2);color:#fbbf24;padding:2px 4px;border-radius:4px;}
</style>
</head>
<body>

<!-- Title Bar -->
<div class="titlebar">
  <div class="titlebar-left">
    <div class="window-controls">
      <div class="win-btn win-close" title="关闭" onclick="showToast('演示模式 - 无法关闭','info')"></div>
      <div class="win-btn win-min" title="最小化" onclick="showToast('演示模式 - 无法最小化','info')"></div>
      <div class="win-btn win-max" title="最大化" onclick="showToast('演示模式 - 无法最大化','info')"></div>
    </div>
    <span class="app-title">📖 NovelCraft · AI小说编辑器</span>
  </div>
  <div class="titlebar-right">
    <button class="btn btn-primary" onclick="showNewNovelModal()">
      <span>✨</span> 新建小说
    </button>
    <button class="btn btn-success" onclick="importDocument()">
      <span>📥</span> 导入文档
    </button>
    <button class="btn btn-warning" onclick="saveCurrentNovel()">
      <span>💾</span> 保存
    </button>
    <button class="btn btn-ghost" onclick="toggleEyeCare()">
      <span id="eyeIcon">👁️</span>
    </button>
  </div>
</div>

<!-- Main Layout -->
<div class="main-layout">
  
  <!-- Left Sidebar -->
  <div class="sidebar">
    <div class="sidebar-item active" data-view="explorer" onclick="switchSidebar('explorer')" title="资源管理器">📁</div>
    <div class="sidebar-item" data-view="search" onclick="switchSidebar('search')" title="搜索">🔍</div>
    <div class="sidebar-item" data-view="git" onclick="switchSidebar('git')" title="版本">📋</div>
    <div class="sidebar-item" data-view="settings" onclick="switchSidebar('settings')" title="设置">⚙️</div>
  </div>

  <!-- File Explorer -->
  <div class="explorer" id="explorer">
    <div class="explorer-header">
      <span class="explorer-title">📚 我的小说</span>
      <button class="btn-icon" onclick="showNewNovelModal()" title="新建">＋</button>
    </div>
    <div class="novel-list" id="novelList">
      <!-- Novels injected by JS -->
    </div>
  </div>

  <!-- Editor Area -->
  <div class="editor-area">
    <div class="editor-tabs" id="editorTabs">
      <!-- Tabs injected by JS -->
    </div>
    <div class="editor-toolbar">
      <button class="btn btn-icon" onclick="execFormat('undo')" title="撤销">↩️</button>
      <button class="btn btn-icon" onclick="execFormat('redo')" title="重做">↪️</button>
      <div class="toolbar-divider"></div>
      <button class="btn btn-icon" onclick="execFormat('bold')" title="加粗"><strong>B</strong></button>
      <button class="btn btn-icon" onclick="execFormat('italic')" title="斜体"><em>I</em></button>
      <button class="btn btn-icon" onclick="execFormat('underline')" title="下划线"><u>U</u></button>
      <div class="toolbar-divider"></div>
      <button class="btn btn-icon" onclick="showAddChapterModal()" title="添加章节">📄</button>
      <button class="btn btn-icon" onclick="toggleOutline()" title="大纲">📋</button>
      <div class="toolbar-divider"></div>
      <span style="color:var(--text-muted);font-size:12px;" id="wordCountDisplay">0 字</span>
    </div>
    <div class="editor-container">
      <div class="outline-panel" id="outlinePanel">
        <div class="outline-header">📑 章节大纲</div>
        <div class="chapter-tree" id="chapterTree">
          <!-- Chapters injected by JS -->
        </div>
        <div style="padding:10px;border-top:1px solid var(--border-color);">
          <button class="btn btn-success btn-sm" style="width:100%;" onclick="showAddChapterModal()">
            ＋ 添加章节
          </button>
        </div>
      </div>
      <div class="editor-main" id="editorMain">
        <!-- Welcome screen or editor content injected by JS -->
      </div>
    </div>
    <div class="status-bar">
      <div class="status-left">
        <span id="statusNovelName">📖 未选择小说</span>
        <span id="statusChapter">📄 0 章</span>
      </div>
      <div class="status-right">
        <span id="statusWordCount">字数: 0</span>
        <span>行 1, 列 1</span>
        <span>UTF-8</span>
        <span>Markdown</span>
      </div>
    </div>
  </div>

  <!-- Right Panels -->
  <div class="right-panels">
    <div class="panel-tabs">
      <div class="panel-tab active" data-panel="info" onclick="switchRightPanel('info')" title="信息">ℹ️</div>
      <div class="panel-tab" data-panel="characters" onclick="switchRightPanel('characters')" title="人物">👥<span class="count" id="charCount">0</span></div>
      <div class="panel-tab" data-panel="timeline" onclick="switchRightPanel('timeline')" title="时间线">📅<span class="count" id="timelineCount">0</span></div>
      <div class="panel-tab" data-panel="events" onclick="switchRightPanel('events')" title="事件">📋<span class="count" id="eventCount">0</span></div>
    </div>
    <div class="panel-content">
      <!-- Info Panel -->
      <div id="panel-info">
        <div class="panel-header"><span class="panel-title">ℹ️ 小说信息</span></div>
        <div class="panel-body" id="infoBody">
          <div class="empty-state"><div class="empty-icon">📖</div><div class="empty-text">请选择一个小说</div></div>
        </div>
      </div>
      <!-- Characters Panel -->
      <div id="panel-characters" style="display:none;flex:1;flex-direction:column;">
        <div class="panel-header"><span class="panel-title">👥 人物管理</span></div>
        <div class="panel-body" id="charactersBody">
          <div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">暂无人物，点击下方添加</div></div>
        </div>
        <div class="panel-footer">
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            <input class="modal-input" id="newCharName" placeholder="人物名称..." style="margin:0;" onkeydown="if(event.key==='Enter')addCharacter()">
          </div>
          <div style="display:flex;gap:6px;">
            <input class="modal-input" id="newCharTrait" placeholder="特质（可选）..." style="margin:0;flex:1;" onkeydown="if(event.key==='Enter')addCharacter()">
            <button class="btn btn-primary btn-sm" onclick="addCharacter()">添加</button>
          </div>
        </div>
      </div>
      <!-- Timeline Panel -->
      <div id="panel-timeline" style="display:none;flex:1;flex-direction:column;">
        <div class="panel-header"><span class="panel-title">📅 时间线</span></div>
        <div class="panel-body" id="timelineBody">
          <div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">暂无天数记录</div></div>
        </div>
        <div class="panel-footer">
          <button class="btn btn-success" style="width:100%;" onclick="addTimelineDay()">＋ 添加天数</button>
        </div>
      </div>
      <!-- Events Panel -->
      <div id="panel-events" style="display:none;flex:1;flex-direction:column;">
        <div class="panel-header"><span class="panel-title">📋 事件记录</span></div>
        <div class="panel-body" id="eventsBody">
          <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">暂无事件记录</div></div>
        </div>
        <div class="panel-footer">
          <button class="btn btn-primary" style="width:100%;" onclick="showAddEventModal()">＋ 添加事件</button>
        </div>
      </div>
    </div>
  </div>

  <!-- AI Panel -->
  <div class="ai-panel" id="aiPanel">
    <div class="ai-header">
      <div class="ai-title">
        <span>🤖</span> AI 写作助手
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="ai-status"><span class="status-dot"></span>在线</div>
        <button class="btn-icon" onclick="toggleAIPanel()" title="收起">«</button>
      </div>
    </div>
    <div class="ai-messages" id="aiMessages">
      <div class="ai-message assistant">
        你好！我是 NovelCraft AI 写作助手 ✨<br><br>我可以帮你：<br>• 💡 构思情节和故事走向<br>• 👤 塑造人物性格和关系<br>• 🌍 构建世界观设定<br>• ✍️ 润色文字和对话<br><br>有什么想聊的吗？
      </div>
    </div>
    <div class="ai-suggestions">
      <button class="suggestion-chip" onclick="quickAI('帮我构思一个新情节')">💡 构思情节</button>
      <button class="suggestion-chip" onclick="quickAI('如何让主角更有魅力？')">👤 塑造人物</button>
      <button class="suggestion-chip" onclick="quickAI('给我一些写作灵感')">✨ 获取灵感</button>
    </div>
    <div class="ai-input-area">
      <input type="text" class="ai-input" id="aiInput" placeholder="向AI助手提问..." onkeydown="if(event.key==='Enter')sendAIMessage()">
      <button class="ai-send" onclick="sendAIMessage()">📤</button>
    </div>
  </div>
</div>

<!-- Modal Container -->
<div id="modalContainer"></div>
<div id="toastContainer"></div>

<script>
// ============== State ==============
let state = {
  novels: [],
  currentNovelId: null,
  activeChapterId: null,
  rightPanel: 'info',
  sidebar: 'explorer',
  aiCollapsed: false,
  eyeCare: false,
  editingChapterId: null
};

// ============== Sample Data ==============
function initSampleData(){
  state.novels = [
    {
      id: 'novel-1',
      name: '星辰之境',
      createdAt: '2024-01-15',
      chapters: [
        {id:'ch1', title:'第一章 命运的起点', content:'夜幕降临，星辰闪烁。\n\n林晓站在天台上，眺望着远处的城市。这个世界正在悄然发生变化，而他，将成为改变一切的关键。\n\n"你准备好了吗？"一个神秘的声音在他耳边响起。\n\n他不知道自己即将面对什么，但他知道，属于他的故事，才刚刚开始。', wordCount: 156},
        {id:'ch2', title:'第二章 神秘的邀请', content:'第二天一早，林晓收到了一封奇怪的信件。\n\n信封是黑色的，上面用金色的墨水写着他的名字。信的内容很简短：\n\n"星辰之境即将开启，你被选中了。\n\n三天后，在你常去的咖啡馆，会有人联系你。\n\n不要迟到。"', wordCount: 98},
        {id:'ch3', title:'第三章 新的相遇', content:'咖啡馆里，一个身穿白色连衣裙的女孩正望着窗外。\n\n她叫苏婉，是"星辰组织"的成员。她告诉林晓，这个世界存在着无数个平行空间，而他们的使命，是保护这些空间的平衡。\n\n"你拥有特殊的能力，林晓。"苏婉认真地说，"你能看到别人看不到的东西。"', wordCount: 112}
      ],
      characters: [
        {id:'char1', name:'林晓', role:'主角', traits:['勇敢','聪明','正义感'], description:''},
        {id:'char2', name:'苏婉', role:'女主角', traits:['神秘','美丽','能力强'], description:''},
        {id:'char3', name:'老陈', role:'导师', traits:['经验丰富','幽默','可靠'], description:''}
      ],
      timeline: [
        {day:1, label:'第1天 - 命运的起点', note:'林晓收到神秘邀请', isKeyMoment:true},
        {day:2, label:'第2天 - 初遇苏婉', note:'主角与女主首次相遇', isKeyMoment:true},
        {day:3, label:'第3天 - 加入组织', note:'林晓决定加入星辰组织', isKeyMoment:false},
        {day:7, label:'第7天 - 第一次任务', note:'执行第一次空间修复任务', isKeyMoment:true}
      ],
      events: [
        {id:'evt1', title:'神秘信件', day:1, category:'plot', description:'林晓收到黑色信封的神秘信件'},
        {id:'evt2', title:'初遇苏婉', day:2, category:'character', description:'在咖啡馆第一次见到苏婉'},
        {id:'evt3', title:'能力觉醒', day:5, category:'world', description:'林晓发现自己能看到平行空间'}
      ]
    },
    {
      id: 'novel-2',
      name: '暗夜守护者',
      createdAt: '2024-02-20',
      chapters: [
        {id:'ch1', title:'第一章 黑暗降临', content:'城市的夜晚，总有一些不为人知的秘密。\n\n作为一名私家侦探，陈默习惯了黑暗。但今晚的案件，似乎比以往任何一个都更加复杂。', wordCount: 78},
        {id:'ch2', title:'第二章 嫌疑人', content:'三个嫌疑人，各怀心事。\n\n陈默需要在48小时内找出真凶，否则，真相将被永远埋葬。', wordCount: 52}
      ],
      characters: [
        {id:'char1', name:'陈默', role:'主角', traits:['冷静','敏锐','神秘'], description:''}
      ],
      timeline: [
        {day:1, label:'第1天 - 案件开始', note:'案件发生', isKeyMoment:true}
      ],
      events: [
        {id:'evt1', title:'案发', day:1, category:'plot', description:'神秘谋杀案发生'}
      ]
    }
  ];
  state.currentNovelId = 'novel-1';
  state.activeChapterId = 'ch1';
}

// ============== Rendering ==============
function getCurrentNovel(){
  return state.novels.find(n => n.id === state.currentNovelId);
}

function renderNovelList(){
  const list = document.getElementById('novelList');
  list.innerHTML = state.novels.map(n => `
    <div class="novel-item ${n.id===state.currentNovelId?'active':''}" onclick="selectNovel('${n.id}')">
      <span class="novel-icon">📖</span>
      <span>${n.name}</span>
    </div>
  `).join('');
}

function selectNovel(id){
  state.currentNovelId = id;
  const novel = getCurrentNovel();
  if(novel && novel.chapters.length > 0){
    state.activeChapterId = novel.chapters[0].id;
  }
  renderAll();
  showToast(`已切换到「${novel.name}」`,'success');
}

function renderEditorTabs(){
  const novel = getCurrentNovel();
  const tabs = document.getElementById('editorTabs');
  if(!novel){ tabs.innerHTML=''; return; }
  tabs.innerHTML = novel.chapters.map(c => `
    <div class="editor-tab ${c.id===state.activeChapterId?'active':''}" onclick="switchChapter('${c.id}')">
      📄 ${c.title}
      <span style="margin-left:8px;color:var(--text-muted);cursor:pointer;" onclick="event.stopPropagation();deleteChapter('${c.id}')">✕</span>
    </div>
  `).join('');
}

function renderChapterTree(){
  const novel = getCurrentNovel();
  const tree = document.getElementById('chapterTree');
  if(!novel){ tree.innerHTML=''; return; }
  tree.innerHTML = novel.chapters.map((c,i) => `
    <div class="chapter-node ${c.id===state.activeChapterId?'active':''}" onclick="switchChapter('${c.id}')">
      <span style="color:var(--text-muted);font-size:10px;">${String(i+1).padStart(2,'0')}</span>
      <span class="chapter-title">${c.title}</span>
      <div class="chapter-actions">
        <span onclick="editChapterTitle('${c.id}')" style="cursor:pointer;">✏️</span>
        <span onclick="deleteChapter('${c.id}')" style="cursor:pointer;">🗑️</span>
      </div>
    </div>
  `).join('');
}

function renderEditor(){
  const novel = getCurrentNovel();
  const main = document.getElementById('editorMain');
  
  if(!novel){
    main.innerHTML = `
      <div class="welcome-screen">
        <div class="welcome-icon">📖</div>
        <div class="welcome-title">欢迎使用 NovelCraft</div>
        <div class="welcome-desc">让AI成为你的创作伙伴</div>
        <button class="btn btn-primary" onclick="showNewNovelModal()">✨ 创建新小说</button>
      </div>
    `;
    return;
  }
  
  const chapter = novel.chapters.find(c => c.id === state.activeChapterId);
  if(!chapter){
    main.innerHTML = `
      <div class="welcome-screen">
        <div class="welcome-icon">📄</div>
        <div class="welcome-title">开始写作</div>
        <div class="welcome-desc">点击下方按钮添加第一个章节</div>
        <button class="btn btn-success" onclick="showAddChapterModal()">＋ 添加章节</button>
      </div>
    `;
    return;
  }
  
  main.innerHTML = `
    <input type="text" class="chapter-title-input" value="${escapeHtml(chapter.title)}" 
           onchange="updateChapter('${chapter.id}',{title:this.value})"
           placeholder="章节标题...">
    <div class="chapter-info">
      <span>📖 ${chapter.wordCount} 字</span>
      <span>📅 第 ${getChapterIndex('${chapter.id}')+1} 章</span>
      <span>🕐 ${new Date().toLocaleDateString()}</span>
    </div>
    <textarea class="chapter-content" id="chapterContent" placeholder="开始你的创作..." 
              oninput="updateChapterContent('${chapter.id}',this.value)">${escapeHtml(chapter.content)}</textarea>
  `;
  
  updateWordCount();
}

function renderRightPanel(){
  const novel = getCurrentNovel();
  updateCounts();
  
  // Info
  const infoBody = document.getElementById('infoBody');
  if(!novel){
    infoBody.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-text">请选择一个小说</div></div>';
  } else {
    const totalWords = novel.chapters.reduce((a,c) => a+c.wordCount, 0);
    infoBody.innerHTML = `
      <div style="background:linear-gradient(135deg,rgba(107,33,168,.2),rgba(124,58,237,.2));border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid rgba(107,33,168,.3);">
        <div style="color:var(--text-muted);font-size:11px;margin-bottom:4px;">📖 小说名称</div>
        <div style="color:#fff;font-size:18px;font-weight:700;">${escapeHtml(novel.name)}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div style="background:var(--bg-primary);border-radius:10px;padding:12px;">
          <div style="color:var(--text-muted);font-size:11px;margin-bottom:4px;">📄 章节数</div>
          <div style="color:#fff;font-size:20px;font-weight:700;">${novel.chapters.length}</div>
        </div>
        <div style="background:var(--bg-primary);border-radius:10px;padding:12px;">
          <div style="color:var(--text-muted);font-size:11px;margin-bottom:4px;">👥 人物数</div>
          <div style="color:#fff;font-size:20px;font-weight:700;">${novel.characters.length}</div>
        </div>
        <div style="background:var(--bg-primary);border-radius:10px;padding:12px;">
          <div style="color:var(--text-muted);font-size:11px;margin-bottom:4px;">📅 时间线</div>
          <div style="color:#fff;font-size:20px;font-weight:700;">${novel.timeline.length}</div>
        </div>
        <div style="background:var(--bg-primary);border-radius:10px;padding:12px;">
          <div style="color:var(--text-muted);font-size:11px;margin-bottom:4px;">📋 事件数</div>
          <div style="color:#fff;font-size:20px;font-weight:700;">${novel.events.length}</div>
        </div>
      </div>
      <div style="background:var(--bg-primary);border-radius:10px;padding:16px;">
        <div style="color:var(--text-muted);font-size:11px;margin-bottom:4px;">✍️ 总字数</div>
        <div style="color:#fff;font-size:28px;font-weight:700;">${totalWords.toLocaleString()} <span style="font-size:14px;color:var(--text-muted);font-weight:400;">字</span></div>
      </div>
    `;
  }
  
  // Characters
  const charBody = document.getElementById('charactersBody');
  if(!novel || novel.characters.length === 0){
    charBody.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">暂无人物，点击下方添加</div></div>';
  } else {
    charBody.innerHTML = novel.characters.map(c => `
      <div class="char-card">
        <div class="char-header">
          <div class="char-avatar">${c.name.charAt(0)}</div>
          <div class="char-info">
            <div class="char-name">${escapeHtml(c.name)}</div>
            <div class="char-role">${c.role}</div>
          </div>
          <div class="char-actions">
            <button class="btn-icon" onclick="editCharacter('${c.id}')" title="编辑">✏️</button>
            <button class="btn-icon" onclick="deleteCharacter('${c.id}')" title="删除">🗑️</button>
          </div>
        </div>
        <div class="char-traits">
          ${c.traits.map(t => `<span class="trait-tag">${escapeHtml(t)}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }
  
  // Timeline
  const tlBody = document.getElementById('timelineBody');
  if(!novel || novel.timeline.length === 0){
    tlBody.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">暂无天数记录</div></div>';
  } else {
    tlBody.innerHTML = novel.timeline.map(t => `
      <div class="timeline-day ${t.isKeyMoment?'key':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="day-label">${escapeHtml(t.label)}</div>
          <div style="display:flex;gap:4px;">
            <button class="btn-icon" onclick="toggleKeyMoment(${t.day})" title="${t.isKeyMoment?'取消关键':'设为关键'}">${t.isKeyMoment?'⭐':'☆'}</button>
            <button class="btn-icon" onclick="deleteTimelineDay(${t.day})" title="删除">🗑️</button>
          </div>
        </div>
        ${t.note?`<div class="day-note">${escapeHtml(t.note)}</div>`:''}
      </div>
    `).join('');
  }
  
  // Events
  const evtBody = document.getElementById('eventsBody');
  if(!novel || novel.events.length === 0){
    evtBody.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">暂无事件记录</div></div>';
  } else {
    evtBody.innerHTML = novel.events.map(e => `
      <div class="event-card">
        <div class="event-header">
          <div class="event-title">${escapeHtml(e.title)}</div>
          <div style="display:flex;gap:4px;">
            <button class="btn-icon" onclick="editEvent('${e.id}')" title="编辑">✏️</button>
            <button class="btn-icon" onclick="deleteEvent('${e.id}')" title="删除">🗑️</button>
          </div>
        </div>
        <div class="event-meta">
          <span class="event-cat cat-${e.category}">${catLabels[e.category]}</span>
          <span style="color:var(--text-muted);font-size:11px;">📅 第${e.day}天</span>
        </div>
        ${e.description?`<div style="color:var(--text-muted);font-size:12px;margin-top:6px;">${escapeHtml(e.description)}</div>`:''}
      </div>
    `).join('');
  }
}

const catLabels = {plot:'情节',character:'人物',world:'世界观',other:'其他'};

function updateCounts(){
  const novel = getCurrentNovel();
  document.getElementById('charCount').textContent = novel?novel.characters.length:0;
  document.getElementById('timelineCount').textContent = novel?novel.timeline.length:0;
  document.getElementById('eventCount').textContent = novel?novel.events.length:0;
  
  document.getElementById('statusNovelName').textContent = novel?`📖 ${novel.name}`:'📖 未选择小说';
  document.getElementById('statusChapter').textContent = novel?`📄 ${novel.chapters.length} 章`:'📄 0 章';
}

function renderAll(){
  renderNovelList();
  renderEditorTabs();
  renderChapterTree();
  renderEditor();
  renderRightPanel();
  updateCounts();
}

// ============== Actions ==============
function switchChapter(id){
  state.activeChapterId = id;
  renderEditor();
  renderEditorTabs();
  renderChapterTree();
}

function getChapterIndex(id){
  const novel = getCurrentNovel();
  return novel? novel.chapters.findIndex(c=>c.id===id) : 0;
}

function updateChapter(id, updates){
  const novel = getCurrentNovel();
  if(!novel) return;
  const ch = novel.chapters.find(c=>c.id===id);
  if(ch) Object.assign(ch, updates);
  renderEditorTabs();
  renderChapterTree();
}

function updateChapterContent(id, content){
  const novel = getCurrentNovel();
  if(!novel) return;
  const ch = novel.chapters.find(c=>c.id===id);
  if(ch){
    ch.content = content;
    ch.wordCount = countWords(content);
    updateWordCount();
    updateCounts();
  }
}

function countWords(text){
  if(!text) return 0;
  const chineseChars = (text.match(/[\u4e00-\u9fa5]/g)||[]).length;
  const englishWords = (text.match(/[a-zA-Z]+/g)||[]).length;
  return chineseChars + englishWords;
}

function updateWordCount(){
  const novel = getCurrentNovel();
  const ch = novel?.chapters.find(c=>c.id===state.activeChapterId);
  const wc = ch? ch.wordCount : 0;
  document.getElementById('wordCountDisplay').textContent = `${wc} 字`;
  document.getElementById('statusWordCount').textContent = `字数: ${wc}`;
}

function deleteChapter(id){
  const novel = getCurrentNovel();
  if(!novel || novel.chapters.length <= 1){
    showToast('至少保留一个章节','error');
    return;
  }
  novel.chapters = novel.chapters.filter(c => c.id !== id);
  if(state.activeChapterId === id){
    state.activeChapterId = novel.chapters[0].id;
  }
  renderAll();
  showToast('章节已删除','success');
}

function showAddChapterModal(){
  if(!getCurrentNovel()){
    showToast('请先选择或创建一个小说','error');
    return;
  }
  showModal('📄 添加章节','输入新章节的标题：','',(title)=>{
    const novel = getCurrentNovel();
    if(!novel || !title.trim()) return;
    const newChapter = {
      id:'ch-'+Date.now(),
      title:title.trim(),
      content:'',
      wordCount:0
    };
    novel.chapters.push(newChapter);
    state.activeChapterId = newChapter.id;
    renderAll();
    showToast('章节已添加','success');
  });
}

function editChapterTitle(id){
  const novel = getCurrentNovel();
  const ch = novel?.chapters.find(c=>c.id===id);
  if(!ch) return;
  showModal('✏️ 编辑章节','修改章节标题：',ch.title,(title)=>{
    if(title.trim()){
      updateChapter(id,{title:title.trim()});
      showToast('章节已更新','success');
    }
  });
}

function showNewNovelModal(){
  showModal('✨ 创建新小说','输入小说名称：','',(name)=>{
    if(!name.trim()) return;
    const novel = {
      id:'novel-'+Date.now(),
      name:name.trim(),
      createdAt:new Date().toISOString(),
      chapters:[{id:'ch-'+Date.now(),title:'第一章',content:'',wordCount:0}],
      characters:[],timeline:[],events:[]
    };
    state.novels.push(novel);
    state.currentNovelId = novel.id;
    state.activeChapterId = novel.chapters[0].id;
    renderAll();
    showToast(`「${name}」已创建`,'success');
  });
}

function saveCurrentNovel(){
  showToast('💾 小说已保存（演示模式）','success');
}

function importDocument(){
  showModal('📥 导入文档（演示）','输入要导入的文件名：（演示用）','demo.txt',(fileName)=>{
    if(!fileName.trim()) return;
    const name = fileName.replace(/\.(txt|docx)$/i,'');
    const novel = {
      id:'novel-'+Date.now(),
      name:name || '导入的小说',
      createdAt:new Date().toISOString(),
      chapters:[
        {id:'ch-'+Date.now(),title:'第一章',content:'这是导入的内容...',wordCount:6},
        {id:'ch-'+Date.now()+1,title:'第二章',content:'更多内容...',wordCount:4}
      ],
      characters:[],timeline:[],events:[]
    };
    state.novels.push(novel);
    state.currentNovelId = novel.id;
    state.activeChapterId = novel.chapters[0].id;
    renderAll();
    showToast(`已导入「${name}」（识别到2章）`,'success');
  });
}

// Characters
function addCharacter(){
  const name = document.getElementById('newCharName').value.trim();
  const trait = document.getElementById('newCharTrait').value.trim();
  if(!name){ showToast('请输入人物名称','error'); return; }
  const novel = getCurrentNovel();
  if(!novel) return;
  const char = {
    id:'char-'+Date.now(),
    name:name,
    role:'重要角色',
    traits:trait?[trait]:[],
    description:''
  };
  novel.characters.push(char);
  document.getElementById('newCharName').value='';
  document.getElementById('newCharTrait').value='';
  renderRightPanel();
  showToast(`「${name}」已添加`,'success');
}

function editCharacter(id){
  const novel = getCurrentNovel();
  const ch = novel?.characters.find(c=>c.id===id);
  if(!ch) return;
  showModal('✏️ 编辑人物','修改人物名称：',ch.name,(name)=>{
    if(name.trim()){
      ch.name = name.trim();
      renderRightPanel();
      showToast('人物已更新','success');
    }
  });
}

function deleteCharacter(id){
  const novel = getCurrentNovel();
  if(!novel) return;
  novel.characters = novel.characters.filter(c=>c.id!==id);
  renderRightPanel();
  showToast('人物已删除','success');
}

// Timeline
function addTimelineDay(){
  const novel = getCurrentNovel();
  if(!novel) return;
  const nextDay = novel.timeline.length + 1;
  novel.timeline.push({
    day: nextDay,
    label: `第${nextDay}天`,
    note: '',
    isKeyMoment: false
  });
  renderRightPanel();
  showToast(`第${nextDay}天已添加`,'success');
}

function deleteTimelineDay(day){
  const novel = getCurrentNovel();
  if(!novel) return;
  novel.timeline = novel.timeline.filter(t=>t.day!==day);
  renderRightPanel();
  showToast('天数已删除','success');
}

function toggleKeyMoment(day){
  const novel = getCurrentNovel();
  const tl = novel?.timeline.find(t=>t.day===day);
  if(tl){
    tl.isKeyMoment = !tl.isKeyMoment;
    renderRightPanel();
  }
}

// Events
function showAddEventModal(){
  if(!getCurrentNovel()){ showToast('请先选择小说','error'); return; }
  showEventModal('add', null);
}

function editEvent(id){
  showEventModal('edit', id);
}

function showEventModal(mode, id){
  const novel = getCurrentNovel();
  if(!novel) return;
  const evt = mode==='edit'? novel.events.find(e=>e.id===id) : {title:'',day:1,category:'plot',description:''};
  
  showModal(
    mode==='edit'?'✏️ 编辑事件':'📋 添加事件',
    '事件标题：',
    evt.title,
    (title)=>{
      if(!title.trim()) return;
      if(mode==='add'){
        novel.events.push({
          id:'evt-'+Date.now(),
          title:title.trim(),
          day:evt.day,
          category:evt.category,
          description:''
        });
        showToast('事件已添加','success');
      } else {
        evt.title = title.trim();
        showToast('事件已更新','success');
      }
      renderRightPanel();
    }
  );
}

function deleteEvent(id){
  const novel = getCurrentNovel();
  if(!novel) return;
  novel.events = novel.events.filter(e=>e.id!==id);
  renderRightPanel();
  showToast('事件已删除','success');
}

// Panel switching
function switchSidebar(view){
  state.sidebar = view;
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.view===view);
  });
  document.getElementById('explorer').style.display = view==='explorer'?'flex':'none';
}

function switchRightPanel(panel){
  state.rightPanel = panel;
  document.querySelectorAll('.panel-tab').forEach(el=>{
    el.classList.toggle('active', el.dataset.panel===panel);
  });
  ['info','characters','timeline','events'].forEach(p=>{
    document.getElementById('panel-'+p).style.display = p===panel?'flex':'none';
  });
}

function toggleOutline(){
  const panel = document.getElementById('outlinePanel');
  panel.style.display = panel.style.display==='none'?'flex':'none';
}

function toggleEyeCare(){
  state.eyeCare = !state.eyeCare;
  document.body.style.filter = state.eyeCare?'sepia(0.3) brightness(0.95)':'none';
  showToast(state.eyeCare?'👁️ 护眼模式已开启':'👁️ 护眼模式已关闭','info');

function toggleAIPanel(){
  state.aiCollapsed = !state.aiCollapsed;
  document.getElementById('aiPanel').classList.toggle('collapsed', state.aiCollapsed);
}

function execFormat(type){
  showToast(`格式操作：${type}（演示模式）`,'info');
}

// AI
const aiResponses = {
  '构思情节': '💡 建议：可以让主角林晓在执行第一次任务时，遇到一个神秘的"时间裂缝"，他必须在拯救陌生人与保护世界之间做出选择。这个抉择能展现他的内心冲突。',
  '塑造人物': '👤 苏婉这个角色可以增加一些矛盾的特质：\n\n• 表面冷静专业，但私下里喜欢吃甜食\n• 对林晓有好感，但因为组织规定不能表现出来\n• 有一段不为人知的过去\n\n这些反差会让人物更立体。',
  '写作灵感': '✨ 灵感时间到！\n\n试试这个设定：\n"在星辰之境中，每个角色都有一颗属于自己的'守护之星'，当这颗星开始暗淡时，意味着命运即将改变。林晓发现，他的守护之星，竟然和苏婉的紧紧缠绕在一起……"',
  'default': '我理解你的问题。作为AI写作助手，我可以帮你：\n\n1. 构思新的情节发展\n2. 深入挖掘人物性格\n3. 构建独特的世界观\n4. 优化文字表达\n\n请告诉我，你现在需要哪方面的帮助？'
};

function quickAI(text){
  document.getElementById('aiInput').value = text;
  sendAIMessage();
}

function sendAIMessage(){
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if(!text) return;
  
  addAIMessage(text, 'user');
  input.value = '';
  
  setTimeout(()=>{
    let response = aiResponses.default;
    for(const key in aiResponses){
      if(key!=='default' && text.includes(key)){
        response = aiResponses[key];
        break;
      }
    }
    if(text.includes('林晓') || text.includes('主角')){
      response = `关于主角林晓：\n\n他是一个很好的起点！建议给他增加一些内在的矛盾：\n\n• 他渴望保护别人，但害怕自己会伤害亲近的人\n• 他想相信苏婉，但又不确定她的真实目的\n• 他发现自己的能力越强，就越孤独\n\n这些内心挣扎会让角色更有深度。`;
    }
    addAIMessage(response, 'assistant');
  }, 600);
}

function addAIMessage(text, role){
  const msgs = document.getElementById('aiMessages');
  const msg = document.createElement('div');
  msg.className = `ai-message ${role}`;
  msg.innerHTML = text.replace(/\n/g,'<br>');
  msgs.appendChild(msg);
  msgs.scrollTop = msgs.scrollHeight;
}

// ============== UI Helpers ==============
function showModal(title, placeholder, defaultValue, onConfirm){
  const container = document.getElementById('modalContainer');
  container.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">${title}</div>
        <div class="modal-desc">${placeholder}</div>
        <input type="text" class="modal-input" id="modalInput" value="${escapeHtml(defaultValue)}" autofocus>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" id="modalConfirm">确定</button>
        </div>
      </div>
    </div>
  `;
  setTimeout(()=>document.getElementById('modalInput').focus(),50);
  
  const input = document.getElementById('modalInput');
  const confirm = document.getElementById('modalConfirm');
  const handleConfirm = () => {
    const val = input.value;
    closeModal();
    onConfirm && onConfirm(val);
  };
  confirm.onclick = handleConfirm;
  input.onkeydown = (e) => { if(e.key==='Enter') handleConfirm(); };
}

function closeModal(){
  document.getElementById('modalContainer').innerHTML = '';
}

function showToast(message, type='info'){
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(()=>{
    toast.style.transition = 'all .3s';
    toast.style.opacity = '0';
    toast.style.transform = 'translate(-50%,-20px)';
  }, 2000);
  setTimeout(()=>toast.remove(), 2500);
}

function escapeHtml(text){
  const div = document.createElement('div');
  div.textContent = text||'';
  return div.innerHTML;
}
