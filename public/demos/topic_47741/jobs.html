<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>职位匹配 — ZhiJue 智觅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,700&family=Noto+Serif+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e1524;
    --ink-2: #1b2538;
    --paper: #faf6ee;
    --paper-2: #f3ece0;
    --amber: #e8a33d;
    --amber-soft: #f4c77b;
    --rust: #c7653a;
    --muted: #7a7165;
    --line: #2a3347;
    --line-soft: #e6ddcd;
    --success: #4ade80;
    --card-radius: 22px;
  }

  [data-theme="dark"] {
    --ink: #faf6ee;
    --ink-2: #bdb7a8;
    --paper: #0e1524;
    --paper-2: #1b2538;
    --line-soft: #2a3347;
    --muted: #7a7165;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: "Noto Serif SC", "Fraunces", Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    transition: background 0.4s ease, color 0.4s ease;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    z-index: 1;
  }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 2; }

  /* ===== NAV ===== */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 0;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
    background: rgba(250, 246, 238, 0.85);
    border-bottom: 1px solid var(--line-soft);
    transition: background 0.4s ease;
  }
  [data-theme="dark"] nav {
    background: rgba(14, 21, 36, 0.9);
  }
  nav .wrap {
    display: flex; align-items: center; justify-content: space-between; width: 100%;
  }
  .logo {
    font-family: "Fraunces", serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: var(--ink);
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--amber);
    font-family: "JetBrains Mono", monospace;
    font-size: 14px; font-weight: 700;
    transition: transform 0.3s ease, background 0.4s ease;
  }
  [data-theme="dark"] .logo-mark {
    background: var(--paper);
  }
  .logo:hover .logo-mark {
    transform: rotate(15deg) scale(1.1);
  }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a {
    color: var(--ink-2); text-decoration: none;
    font-weight: 500; font-size: 15px;
    position: relative;
    transition: color 0.2s;
  }
  .nav-links a::after {
    content: ""; position: absolute; bottom: -4px; left: 0; right: 100%;
    height: 2px; background: var(--amber);
    transition: right 0.3s ease;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a:hover::after { right: 0; }

  .nav-controls { display: flex; align-items: center; gap: 10px; }

  .theme-toggle {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--paper-2);
    border: 1px solid var(--line-soft);
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 18px;
    transition: all 0.3s ease;
  }
  .theme-toggle:hover {
    background: var(--amber);
    transform: rotate(180deg);
  }

  .nav-btn {
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--line-soft);
    background: transparent;
    color: var(--ink);
    font-family: inherit;
    transition: all 0.25s ease;
    text-decoration: none;
    display: inline-block;
  }
  .nav-btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .nav-btn.primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .nav-btn.primary:hover {
    background: var(--amber);
    color: var(--ink);
    border-color: var(--amber);
  }

  /* ===== PAGE HEADER ===== */
  .page-header {
    padding: 60px 0 40px;
    text-align: center;
  }
  .page-header h1 {
    font-family: "Fraunces", serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 900;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
    line-height: 1.1;
  }
  .page-header h1 .highlight {
    background: linear-gradient(135deg, var(--amber), var(--rust));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .page-header p {
    font-size: 17px;
    color: var(--muted);
    max-width: 600px;
    margin: 0 auto;
  }

  /* ===== SEARCH BAR ===== */
  .search-section {
    margin-bottom: 32px;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--paper-2);
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    padding: 8px 8px 8px 24px;
    max-width: 680px;
    margin: 0 auto;
    transition: all 0.3s ease;
  }
  .search-box:focus-within {
    border-color: var(--amber);
    box-shadow: 0 0 0 4px rgba(232, 163, 61, 0.15);
  }
  .search-box input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 16px;
    color: var(--ink);
    font-family: inherit;
    outline: none;
    padding: 10px 0;
  }
  .search-box input::placeholder {
    color: var(--muted);
  }
  .search-icon {
    font-size: 20px;
    color: var(--muted);
  }
  .search-btn {
    padding: 12px 28px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
  }
  .search-btn:hover {
    background: var(--amber);
    color: var(--ink);
  }

  /* ===== FILTER TABS ===== */
  .filter-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .filter-tab {
    padding: 10px 22px;
    border-radius: 999px;
    border: 1px solid var(--line-soft);
    background: transparent;
    color: var(--ink-2);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
  }
  .filter-tab:hover {
    border-color: var(--amber);
    color: var(--ink);
  }
  .filter-tab.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* ===== SECONDARY FILTERS ===== */
  .secondary-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    margin-bottom: 32px;
    padding: 20px;
    background: var(--paper-2);
    border-radius: 16px;
    border: 1px solid var(--line-soft);
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .filter-group label {
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
  }
  .filter-group select {
    padding: 8px 14px;
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .filter-group select:focus {
    border-color: var(--amber);
  }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line-soft);
  }
  .stats-count {
    font-size: 15px;
    color: var(--muted);
  }
  .stats-count strong {
    color: var(--ink);
    font-weight: 700;
  }
  .view-toggle {
    display: flex;
    gap: 8px;
  }
  .view-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--line-soft);
    background: transparent;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 16px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .view-btn:hover {
    border-color: var(--amber);
    color: var(--ink);
  }
  .view-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* ===== JOB GRID ===== */
  .job-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .job-card {
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: var(--card-radius);
    padding: 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .job-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--amber), var(--rust));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }
  .job-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    border-color: var(--amber);
  }
  .job-card:hover::before {
    transform: scaleX(1);
  }

  .job-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .company-logo {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--amber), var(--rust));
    display: grid; place-items: center;
    color: white;
    font-family: "Fraunces", serif;
    font-weight: 700;
    font-size: 18px;
    flex-shrink: 0;
  }
  .bookmark-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--line-soft);
    background: transparent;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 16px;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .bookmark-btn:hover {
    border-color: var(--amber);
    background: rgba(232, 163, 61, 0.1);
  }
  .bookmark-btn.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--ink);
  }

  .job-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.4;
    color: var(--ink);
  }
  .job-company {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .job-company a {
    color: var(--ink-2);
    text-decoration: none;
    font-weight: 500;
  }
  .job-company a:hover {
    color: var(--amber);
  }

  .job-salary {
    font-size: 20px;
    font-weight: 700;
    color: var(--rust);
    margin-bottom: 12px;
    font-family: "JetBrains Mono", monospace;
  }

  .job-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .job-tag {
    padding: 4px 12px;
    background: var(--paper-2);
    border-radius: 999px;
    font-size: 12px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .job-tag.type {
    background: rgba(232, 163, 61, 0.15);
    color: var(--rust);
  }
  .job-tag.location {
    background: rgba(74, 222, 128, 0.15);
    color: #16a34a;
  }

  .job-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .job-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--line-soft);
  }
  .job-size {
    font-size: 12px;
    color: var(--muted);
  }
  .apply-btn-card {
    padding: 8px 18px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
    text-decoration: none;
  }
  .apply-btn-card:hover {
    background: var(--amber);
    color: var(--ink);
  }

  /* ===== LOAD MORE ===== */
  .load-more-section {
    text-align: center;
    margin-bottom: 60px;
  }
  .load-more-btn {
    padding: 14px 40px;
    background: var(--paper-2);
    color: var(--ink);
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s ease;
  }
  .load-more-btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .load-more-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  .modal-overlay.show {
    display: flex;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--paper);
    border-radius: 24px;
    max-width: 720px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--line-soft);
    background: var(--paper);
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 20px;
    color: var(--muted);
    z-index: 10;
    transition: all 0.2s;
  }
  .modal-close:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
    transform: rotate(90deg);
  }

  .modal-header {
    padding: 32px;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    gap: 20px;
  }
  .modal-logo {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--amber), var(--rust));
    display: grid; place-items: center;
    color: white;
    font-family: "Fraunces", serif;
    font-weight: 700;
    font-size: 24px;
    flex-shrink: 0;
  }
  .modal-header-info {
    flex: 1;
  }
  .modal-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .modal-company {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .modal-company a {
    color: var(--ink-2);
    text-decoration: none;
    font-weight: 500;
  }
  .modal-company a:hover {
    color: var(--amber);
  }
  .modal-salary {
    font-size: 22px;
    font-weight: 700;
    color: var(--rust);
    font-family: "JetBrains Mono", monospace;
  }

  .modal-body {
    padding: 32px;
  }
  .modal-section {
    margin-bottom: 28px;
  }
  .modal-section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-section-title::before {
    content: "";
    width: 4px;
    height: 18px;
    background: linear-gradient(to bottom, var(--amber), var(--rust));
    border-radius: 2px;
  }
  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .modal-tag {
    padding: 6px 14px;
    background: var(--paper-2);
    border-radius: 999px;
    font-size: 13px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .modal-section p {
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.8;
  }
  .modal-section ul {
    list-style: none;
    padding: 0;
  }
  .modal-section li {
    font-size: 14px;
    color: var(--ink-2);
    padding: 6px 0 6px 24px;
    position: relative;
    line-height: 1.7;
  }
  .modal-section li::before {
    content: "✦";
    position: absolute;
    left: 0;
    color: var(--amber);
    font-size: 10px;
    top: 10px;
  }

  .modal-footer {
    padding: 24px 32px;
    border-top: 1px solid var(--line-soft);
    display: flex;
    gap: 12px;
    position: sticky;
    bottom: 0;
    background: var(--paper);
    border-radius: 0 0 24px 24px;
  }
  .apply-btn-modal {
    flex: 1;
    padding: 14px 28px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  /* 投递成功提示 */
  .apply-toast {
    position: fixed;
    top: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--ink);
    color: var(--paper);
    padding: 16px 32px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    z-index: 10000;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .apply-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .apply-toast.success { border-bottom: 3px solid var(--success); }
  .apply-toast.info { border-bottom: 3px solid var(--amber); }
  .apply-btn-modal:hover {
    background: var(--amber);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .bookmark-btn-modal {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--line-soft);
    background: transparent;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 20px;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .bookmark-btn-modal:hover {
    border-color: var(--amber);
    background: rgba(232, 163, 61, 0.1);
  }
  .bookmark-btn-modal.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--ink);
  }

  /* ===== FOOTER ===== */
  footer {
    padding: 40px 0;
    border-top: 1px solid var(--line-soft);
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  /* ===== NO RESULTS ===== */
  .no-results {
    text-align: center;
    padding: 80px 20px;
  }
  .no-results-icon {
    font-size: 64px;
    margin-bottom: 20px;
    opacity: 0.5;
  }
  .no-results h3 {
    font-size: 20px;
    margin-bottom: 8px;
  }
  .no-results p {
    color: var(--muted);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .nav-links { display: none; }
    .job-grid {
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }
  }

  @media (max-width: 640px) {
    .wrap { padding: 0 20px; }
    .page-header { padding: 40px 0 28px; }
    .search-box { padding: 6px 6px 6px 18px; }
    .search-btn { padding: 10px 20px; font-size: 14px; }
    .secondary-filters { padding: 16px; gap: 12px; }
    .filter-group { flex: 1 1 100%; }
    .filter-group select { flex: 1; }
    .job-grid {
      grid-template-columns: 1fr;
    }
    .modal-header { padding: 24px; flex-direction: column; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 20px 24px; }

function generateAllJobs() {
  const jobs = [];
  let id = 1;

  // 国内公司 - 300+条
  for (let i = 0; i < 320; i++) {
    const company = domesticCompanies[Math.floor(Math.random() * domesticCompanies.length)];
    const type = jobTypes[Math.floor(Math.random() * jobTypes.length)];
    const city = domesticCities[Math.floor(Math.random() * domesticCities.length)];
    jobs.push(generateJob(id++, company, "domestic", type, city));
  }

  // 国外公司 - 200+条
  for (let i = 0; i < 220; i++) {
    const company = foreignCompanies[Math.floor(Math.random() * foreignCompanies.length)];
    const type = jobTypes[Math.floor(Math.random() * jobTypes.length)];
    const city = foreignCities[Math.floor(Math.random() * foreignCities.length)];
    jobs.push(generateJob(id++, company, "foreign", type, city));
  }

  return jobs;
}

function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  document.getElementById("themeToggle").textContent = next === "dark" ? "☀️" : "🌙";
}

function getFilteredJobs() {
  return allJobs.filter(job => {
    if (currentFilter === "domestic" && job.region !== "domestic") return false;
    if (currentFilter === "foreign" && job.region !== "foreign") return false;
    if (currentFilter === "frontend" && job.typeKey !== "frontend") return false;
    if (currentFilter === "backend" && job.typeKey !== "backend") return false;
    if (currentFilter === "qa" && job.typeKey !== "qa") return false;
    if (currentFilter === "data" && job.typeKey !== "data") return false;
    if (currentFilter === "product" && job.typeKey !== "product") return false;
    if (currentFilter === "design" && job.typeKey !== "design") return false;

    if (currentCity !== "all" && job.location !== currentCity) return false;
    if (currentSize !== "all" && job.size !== currentSize) return false;

    if (currentSalary !== "all") {
      if (job.region === "domestic") {
        if (currentSalary === "10-20" && !job.salary.includes("15K") && !job.salary.includes("20K")) {
          const match = job.salary.match(/(\d+)K-(\d+)K/);
          if (match) {
            const min = parseInt(match[1]);
            if (min < 10 || min > 20) return false;
          }
        }
        if (currentSalary === "20-40") {
          const match = job.salary.match(/(\d+)K-(\d+)K/);
          if (match) {
            const min = parseInt(match[1]);
            if (min < 20 || min > 40) return false;
          }
        }
        if (currentSalary === "40-60") {
          const match = job.salary.match(/(\d+)K-(\d+)K/);
          if (match) {
            const min = parseInt(match[1]);
            if (min < 40 || min > 60) return false;
          }
        }
        if (currentSalary === "60-100") {
          const match = job.salary.match(/(\d+)K-(\d+)K/);
          if (match) {
            const min = parseInt(match[1]);
            if (min < 60 || min > 100) return false;
          }
        }
        if (currentSalary === "100+") {
          const match = job.salary.match(/(\d+)K-(\d+)K/);
          if (match) {
            const min = parseInt(match[1]);
            if (min < 100) return false;
          }
        }
      }
      if (job.region === "foreign") {
        if (currentSalary === "100k-150k") {
          const match = job.salary.match(/\$(\d+)K-\$(\d+)K/);
          if (match) {
            const min = parseInt(match[1]);
            if (min < 100 || min > 150) return false;
          }
        }
        if (currentSalary === "150k-250k") {
          const match = job.salary.match(/\$(\d+)K-\$(\d+)K/);
          if (match) {
            const min = parseInt(match[1]);
            if (min < 150 || min > 250) return false;
          }
        }
        if (currentSalary === "250k+") {
          const match = job.salary.match(/\$(\d+)K-\$(\d+)K/);
          if (match) {
            const min = parseInt(match[1]);
            if (min < 250) return false;
          }
        }
      }
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return job.title.toLowerCase().includes(q) ||
        job.company.toLowerCase().includes(q) ||
        job.tags.some(t => t.toLowerCase().includes(q)) ||
        job.description.toLowerCase().includes(q) ||
        job.location.toLowerCase().includes(q);
    }

    return true;
  });
}

// ===== RENDER =====
function renderJobs() {
  const filtered = getFilteredJobs();
  const toShow = filtered.slice(0, displayedCount);
  const grid = document.getElementById("jobGrid");
  const totalCount = document.getElementById("totalCount");
  const loadMoreBtn = document.getElementById("loadMoreBtn");

  totalCount.textContent = filtered.length;
  loadMoreBtn.style.display = displayedCount >= filtered.length ? "none" : "inline-block";

  if (toShow.length === 0) {
    grid.innerHTML = `
      <div class="no-results" style="grid-column: 1/-1;">
        <div class="no-results-icon">🔍</div>
        <h3>没有找到匹配的职位</h3>
        <p>试试调整筛选条件或搜索关键词</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = toShow.map(job => `
    <div class="job-card" onclick="openModal(${job.id})">
      <div class="job-card-header">
        <div class="company-logo">${job.companyLogo}</div>
        <button class="bookmark-btn ${bookmarks.includes(job.id) ? 'active' : ''}" 
                onclick="event.stopPropagation(); toggleBookmark(${job.id})" title="收藏">
          ${bookmarks.includes(job.id) ? '★' : '☆'}
        </button>
      </div>
      <div class="job-title">${job.title}</div>
      <div class="job-company">
        <a href="${job.companyUrl}" target="_blank" onclick="event.stopPropagation()">${job.company}</a>
      </div>
      <div class="job-salary">${job.salary}</div>
      <div class="job-meta">
        <span class="job-tag type">${job.type}</span>
        <span class="job-tag location">📍 ${job.location}</span>
        ${job.tags.slice(0, 2).map(t => `<span class="job-tag">${t}</span>`).join("")}
      </div>
      <div class="job-desc">${job.description}</div>
      <div class="job-card-footer">
        <span class="job-size">🏢 ${job.size}人</span>
        <a href="${job.applyUrl}" target="_blank" class="apply-btn-card" onclick="event.stopPropagation(); trackApply(${job.id})">立即投递 →</a>
      </div>
    </div>
  `).join("");
}

// ===== FILTER TABS =====
document.querySelectorAll(".filter-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentFilter = tab.dataset.filter;
    displayedCount = 20;
    renderJobs();
  });
});

// ===== SECONDARY FILTERS =====
document.getElementById("cityFilter").addEventListener("change", (e) => {
  currentCity = e.target.value;
  displayedCount = 20;
  renderJobs();
});

document.getElementById("salaryFilter").addEventListener("change", (e) => {
  currentSalary = e.target.value;
  displayedCount = 20;
  renderJobs();
});

document.getElementById("sizeFilter").addEventListener("change", (e) => {
  currentSize = e.target.value;
  displayedCount = 20;
  renderJobs();
});

// ===== SEARCH =====
let searchTimeout;
document.getElementById("searchInput").addEventListener("input", (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchQuery = e.target.value;
    displayedCount = 20;
    renderJobs();
  }, 200);
});

function handleSearch() {
  searchQuery = document.getElementById("searchInput").value;
  displayedCount = 20;
  renderJobs();
}

document.getElementById("searchInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") handleSearch();
});

// ===== LOAD MORE =====
function loadMore() {
  displayedCount += 20;
  renderJobs();
}

// ===== BOOKMARK =====
function toggleBookmark(jobId) {
  if (bookmarks.includes(jobId)) {
    bookmarks = bookmarks.filter(id => id !== jobId);
  } else {
    bookmarks.push(jobId);
  }
  localStorage.setItem("jobBookmarks", JSON.stringify(bookmarks));
  renderJobs();
  if (document.getElementById("jobModal").classList.contains("show")) {
    updateModalBookmarkBtn(jobId);
  }
}

function updateModalBookmarkBtn(jobId) {
  const btn = document.querySelector(".bookmark-btn-modal");
  if (btn) {
    btn.classList.toggle("active", bookmarks.includes(jobId));
    btn.textContent = bookmarks.includes(jobId) ? "★" : "☆";
  }
}

// ===== MODAL =====
function openModal(jobId) {
  const job = allJobs.find(j => j.id === jobId);
  if (!job) return;

  const modal = document.getElementById("jobModal");
  const content = document.getElementById("modalContent");

  content.innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-logo">${job.companyLogo}</div>
      <div class="modal-header-info">
        <div class="modal-title">${job.title}</div>
        <div class="modal-company">
          <a href="${job.companyUrl}" target="_blank">${job.company}</a> · ${job.type}
        </div>
        <div class="modal-salary">${job.salary}</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">职位信息</div>
        <div class="modal-tags">
          <span class="modal-tag">📍 ${job.location}</span>
          <span class="modal-tag">🏢 ${job.size}人</span>
          <span class="modal-tag">${job.region === "domestic" ? "🇨🇳 国内" : "🌍 海外"}</span>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">技能标签</div>
        <div class="modal-tags">
          ${job.tags.map(t => `<span class="modal-tag">${t}</span>`).join("")}
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">职位描述</div>
        <p>${job.description}</p>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">任职要求</div>
        <ul>
          ${job.requirements.map(r => `<li>${r}</li>`).join("")}
        </ul>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">福利待遇</div>
        <div class="modal-tags">
          ${job.benefits.map(b => `<span class="modal-tag">✓ ${b}</span>`).join("")}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="bookmark-btn-modal ${bookmarks.includes(job.id) ? 'active' : ''}" 
              onclick="toggleBookmark(${job.id})" title="收藏">
        ${bookmarks.includes(job.id) ? '★' : '☆'}
      </button>
      <a href="${job.applyUrl}" target="_blank" class="apply-btn-modal" onclick="closeModal(); trackApply(${job.id})">
        立即投递 →
      </a>
    </div>
  `;

  modal.classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  const modal = document.getElementById("jobModal");
  modal.classList.remove("show");
  document.body.style.overflow = "";
}

document.getElementById("jobModal").addEventListener("click", (e) => {
  if (e.target.id === "jobModal") closeModal();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

// 记录投递行为
let appliedJobs = JSON.parse(localStorage.getItem('zhijue_applied_jobs') || '[]');

function trackApply(jobId) {
  const job = allJobs.find(j => j.id === jobId);
  if (!job) return;
  
  if (!appliedJobs.includes(jobId)) {
    appliedJobs.push(jobId);
    localStorage.setItem('zhijue_applied_jobs', JSON.stringify(appliedJobs));
  }
}

// ===== INIT =====
renderJobs();
</script>
</body>
</html>
