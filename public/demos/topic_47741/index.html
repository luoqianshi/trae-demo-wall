<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZhiJue 智觅 — AI驱动的智能求职助手</title>
<meta http-equiv="refresh" content="0; url=zhijue.html" />
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #faf6ee;
    font-family: "Noto Serif SC", Georgia, serif;
    color: #0e1524;
  }
  .loading {
    text-align: center;
  }
  .loading h1 {
    font-size: 36px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #e8a33d, #c7653a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .loading p {
    color: #7a7165;
    font-size: 16px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #e6ddcd;
    border-top-color: #e8a33d;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  a {
    color: #e8a33d;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <h1>ZhiJue 智觅</h1>
    <p>正在进入智能求职助手...</p>
    <p style="margin-top: 12px; font-size: 14px;">
      如果没有自动跳转，<a href="zhijue.html">点击这里</a>
    </p>
  </div>
</body>
</html>
