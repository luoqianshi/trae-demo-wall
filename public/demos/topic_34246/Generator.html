<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>六边形子幕生成器</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .row { margin-bottom: 10px; }
  label { display: inline-block; width: 100px; }
  input { padding: 5px; margin: 3px; width: 300px; }
  textarea { width: 100%; height: 240px; margin-top: 10px; }
  button { padding: 6px 12px; margin: 5px; }
</style>
</head>
<body>
<h1>六边形子幕生成器</h1>

<div class="row"><label>文件名：</label><input id="fileName" value="全自动烤鸡机.html"></div>
<div class="row"><label>顶端字幕：</label><input id="title" value="全自动烤鸡机"></div>
<div class="row"><label>描边色：</label><input id="stroke" value="#ff9900"></div>
<div class="row"><label>填充色：</label><input id="fill" value="#ffcc00"></div>
<div class="row"><label>六个值：</label><input id="values" value="0.2,0.9,0.8,1.0,0.2,0.3"></div>

<button onclick="generate()">生成HTML</button>
<button onclick="download()">下载HTML</button>

<h2>预览代码</h2>
<textarea id="output"></textarea>

<script>
function generate() {
  const fileName = document.getElementById('fileName').value.trim();
  const title = document.getElementById('title').value.trim();
  const stroke = document.getElementById('stroke').value.trim();
  const fill = document.getElementById('fill').value.trim();
  const values = document.getElementById('values').value
                  .split(',')
                  .map(v => parseFloat(v.trim()));

  const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>${title}</title>
<style>
@font-face {
  font-family: 'Minecraft';
  src: url('./Minecraft.woff2') format('woff2');
}
text { font-family: 'Minecraft', monospace !important; }
body { margin:0; overflow:hidden; }
svg { width:600px; height:600px; display:block; margin:auto; }
.outline{ fill:none; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; }
.fill{ opacity:0; }
.fill.exit{ opacity:0; }
</style>
</head>
<body>
<svg viewBox="-500 -500 1000 1000">
  <polygon id="fill" class="fill"/>
  <path id="outline" class="outline"/>
</svg>
<script>
let outline = document.getElementById('outline');
let fill = document.getElementById('fill');
window.strokeColor = '${stroke}';
const values = ${JSON.stringify(values)};
const R = 200;
const angleStep = Math.PI*2/6;
const fillColor = '${fill}';

function getPoints(vals){
  return vals.map((v,i)=>{
    let angle = -Math.PI/2 + i*angleStep;
    let x = Math.cos(angle)*v*R;
    let y = Math.sin(angle)*v*R;
    return \`\${x},\${y}\`;
  }).join(" ");
}

function drawHexagon() {
    const pts = getPoints(values);
    fill.setAttribute('points', pts);
    fill.style.fill = fillColor;

    outline.setAttribute('d', 'M'+pts.split(' ').join(' L')+' Z');
    outline.style.stroke = strokeColor;

    const length = outline.getTotalLength();
    outline.style.strokeDasharray = length;
    outline.style.strokeDashoffset = length;
    fill.style.opacity = 0;

    let start = null;
    const duration = 600;
    function animate(time) {
        if (!start) start = time;
        let t = (time - start) / duration;
        if (t > 1) t = 1;
        t = t < 0.5 ? 2*t*t : -1 + (4-2*t)*t;
        outline.style.strokeDashoffset = length * (1 - t);
        fill.style.opacity = 0.4 * t;
        if (t < 1) requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
}

function exitHexagon() {
    const length = outline.getTotalLength();
    let start = null;
    const duration = 600;
    function animateExit(time) {
        if (!start) start = time;
        let t = (time - start) / duration;
        if (t > 1) t = 1;
        t = t < 0.5 ? 2*t*t : -1 + (4-2*t)*t;
        outline.style.strokeDashoffset = length * t;
        fill.style.opacity = 0.4 * (1 - t);
        if (t < 1) requestAnimationFrame(animateExit);
    }
    requestAnimationFrame(animateExit);
}
drawHexagon();
<\/script>
</body>
</html>`;

  document.getElementById('output').value = html;
  window.generatedHTML = {fileName, html};
}

function download() {
  if(!window.generatedHTML) return alert("请先点『生成HTML』！");
  const blob = new Blob([window.generatedHTML.html], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = window.generatedHTML.fileName;
  a.click();
}
</script>
</body>
</html>
