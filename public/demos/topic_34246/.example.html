<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>动态六边形</title>
<style>
@font-face {
    font-family: 'Minecraft';
    src: url('./Minecraft.woff2') format('woff2');
}
text {
    font-family: 'Minecraft', monospace !important;
}
body { margin:0; overflow:hidden; }
svg { width:600px; height:600px; display:block; margin:auto; }
.outline{ fill:none; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; }
.fill{ opacity:0; }
.fill.exit{ opacity:0; }
</style>
</head>
<body>
<svg viewBox="-500 -500 1000 1000">

  <!-- 仅保留动态六边形 -->
  <polygon id="fill" class="fill"/>
  <path id="outline" class="outline"/>

</svg>

<script>
let outline = document.getElementById('outline');
let fill = document.getElementById('fill');

// 顶点比例，可随动画修改 [5,1.0] [4,0.8] [3,0.6] [2,0.4] [1,0.2]
// 1,效率
// 2,玩家普及率
// 3,产物重要性
// 4,自动化程度
// 5,版本兼容度
// 6,規模
const values = [1.0, 0.80, 0.70, 0.90, 0.63, 0.1];
const R = 200;
const angleStep = Math.PI*2/6;
const fillColor = '#000000';
window.strokeColor = '#000000';

function getPoints(vals){
  return vals.map((v,i)=>{
    let angle = -Math.PI/2 + i*angleStep;
    let x = Math.cos(angle)*v*R;
    let y = Math.sin(angle)*v*R;
    return `${x},${y}`;
  }).join(" ");
}

function drawHexagon() {
    const pts = getPoints(values);
    fill.setAttribute('points', pts);
    fill.style.fill = fillColor;

    outline.setAttribute('d', 'M'+pts.split(' ').join(' L')+' Z');
    outline.style.stroke = strokeColor;

    // 入场动画
    outline.style.strokeDasharray = outline.getTotalLength();
    outline.style.strokeDashoffset = outline.getTotalLength();
    outline.getBoundingClientRect(); // 强制刷新
    outline.style.transition = 'stroke-dashoffset 0.6s linear';
    outline.style.strokeDashoffset = 0;

    fill.style.transition = 'opacity 0.9s ease 0.5s';
    fill.style.opacity = 0.4;
}

function exitHexagon() {
    // 退场动画
    fill.style.transition = 'opacity 0.4s ease';
    fill.style.opacity = 0;

    outline.style.transition = 'stroke-dashoffset 0.6s linear';
    outline.style.strokeDashoffset = outline.getTotalLength();
}

// 页面加载完成后绘制
drawHexagon();
</script>
</body>
</html>
