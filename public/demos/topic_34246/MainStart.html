<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>JOJO Stand Panel — Meister 版本</title>
<style>
@font-face { font-family: 'Minecraft'; src: url('./Minecraft.woff2') format('woff2'); }
body { margin:0; overflow:hidden; background:#fff; height:100vh; width:100vw; position:relative; }
#hexPanel { width:600px; height:600px; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); pointer-events:none; z-index:10; }
.hexFrame { border:none; width:600px; height:600px; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); z-index:20; }
#topText { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-family:'Minecraft'; font-size:36px; color:#ff9900; text-align:center; pointer-events:none; transition: opacity 0.5s, color 1s ease; z-index:30; }
.outline{ fill:none; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; }
.fill{ opacity:0; }
.fill.exit{ opacity:0; }
.grid{ fill:none; stroke:#c5c3c3; stroke-width:1; }
text { font-family:'Minecraft'; fill:#000; text-anchor:middle; }
#sideImageContainer { position:fixed; top:50%; right:-300px; transform:translateY(-50%); width:250px; height:250px; transition:right 0.5s ease; z-index:50; }
#sideImageContainer img { width:100%; height:100%; object-fit:contain; }
#playBtn { position:fixed; top:10px; left:10px; z-index:9999; padding:5px 10px; font-size:12px; cursor:pointer; }

/* ========== 配置面板样式 ========== */
#configPanel { position:fixed; top:0; right:0; width:380px; height:100vh; background:#f5f5f5; border-left:1px solid #ccc; box-shadow:-2px 0 8px rgba(0,0,0,0.15); z-index:10000; transition:transform 0.3s ease; transform:translateX(100%); font-family:'Microsoft YaHei', sans-serif; overflow-y:auto; box-sizing:border-box; }
#configPanel.open { transform:translateX(0); }
#configToggle { position:fixed; top:0; right:0; width:40px; height:40px; background:#ff9900; color:#fff; border:none; cursor:pointer; font-size:18px; z-index:10001; display:flex; align-items:center; justify-content:center; transition:right 0.3s ease; }
#configToggle.open { right:380px; }
.config-header { background:#ff9900; color:#fff; padding:12px 16px; font-size:16px; font-weight:bold; position:sticky; top:0; z-index:1; }
.config-section { padding:12px 16px; border-bottom:1px solid #e0e0e0; }
.config-section h3 { margin:0 0 10px 0; font-size:14px; color:#333; }
.config-section label { display:block; font-size:12px; color:#666; margin-bottom:4px; margin-top:6px; }
.config-section input[type="text"], .config-section input[type="number"] { width:100%; padding:4px 6px; border:1px solid #ccc; border-radius:3px; font-size:12px; box-sizing:border-box; }
.config-section input[type="color"] { width:50px; height:24px; border:1px solid #ccc; border-radius:3px; cursor:pointer; vertical-align:middle; }
.config-section input[type="file"] { font-size:11px; }
.config-section button { padding:5px 10px; font-size:12px; border:none; border-radius:3px; cursor:pointer; margin-right:4px; margin-bottom:4px; }
.btn-primary { background:#ff9900; color:#fff; }
.btn-danger { background:#e74c3c; color:#fff; }
.btn-success { background:#27ae60; color:#fff; }
.btn-default { background:#95a5a6; color:#fff; }
.btn-primary:hover { background:#e68a00; }
.btn-danger:hover { background:#c0392b; }
.btn-success:hover { background:#229954; }
.btn-default:hover { background:#7f8c8d; }
.farm-item { background:#fff; border:1px solid #ddd; border-radius:4px; padding:8px; margin-bottom:8px; }
.farm-item-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.farm-item-header span { font-size:13px; font-weight:bold; color:#333; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.farm-item-header div { display:flex; gap:4px; }
.farm-item-header button { padding:2px 6px; font-size:11px; margin:0; }
.farm-item-fields { display:none; }
.farm-item.expanded .farm-item-fields { display:block; }
.toggle-btn { background:#3498db; color:#fff; }
.toggle-btn:hover { background:#2980b9; }
.color-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
.color-row span { font-size:12px; color:#666; }
.music-item { display:flex; justify-content:space-between; align-items:center; background:#fff; border:1px solid #ddd; border-radius:4px; padding:6px 8px; margin-bottom:4px; font-size:12px; }
.music-item span { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.music-item button { padding:2px 6px; font-size:11px; margin:0; }
.action-buttons { display:flex; flex-wrap:wrap; gap:4px; }
.image-preview { max-width:100px; max-height:60px; margin-top:4px; border:1px solid #ddd; border-radius:3px; }
</style>
</head>
<body>

<div id="topText">初始文字</div>

<svg id="hexPanel" viewBox="-500 -500 1000 1000">
    <circle cx="0" cy="0" r="275" fill="none" stroke="#808080" stroke-width="2"/>
    <g id="grid">
        <polygon class="grid" points="0,-200 173,-100 173,100 0,200 -173,100 -173,-100"/>
        <polygon class="grid" points="0,-160 138,-80 138,80 0,160 -138,80 -138,-80"/>
        <polygon class="grid" points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"/>
        <polygon class="grid" points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40"/>
        <polygon class="grid" points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20"/>
        <line class="grid" x1="0" y1="0" x2="0" y2="-200"/>
        <line class="grid" x1="0" y1="0" x2="173" y2="-100"/>
        <line class="grid" x1="0" y1="0" x2="173" y2="100"/>
        <line class="grid" x1="0" y1="0" x2="0" y2="200"/>
        <line class="grid" x1="0" y1="0" x2="-173" y2="100"/>
        <line class="grid" x1="0" y1="0" x2="-173" y2="-100"/>
    </g>
    <g id="numbers" font-size="14">
        <circle cx="0" cy="-40" r="12" fill="#fff"/><text x="0" y="-36">1</text>
        <circle cx="0" cy="-80" r="12" fill="#fff"/><text x="0" y="-76">2</text>
        <circle cx="0" cy="-120" r="12" fill="#fff"/><text x="0" y="-116">3</text>
        <circle cx="0" cy="-160" r="12" fill="#fff"/><text x="0" y="-156">4</text>
        <circle cx="0" cy="-200" r="12" fill="#fff"/><text x="0" y="-196">5</text>
    </g>
    <g id="labels" font-size="18">
        <text x="0" y="-220">效率</text>
        <text x="190" y="-110">推广度</text>
        <text x="190" y="120">产物</text>
        <text x="0" y="230">自动化程度</text>
        <text x="-190" y="120">版本兼容度</text>
        <text x="-190" y="-110">规模</text>
    </g>
</svg>

<iframe id="stageFrame1" class="hexFrame"></iframe>
<iframe id="stageFrame2" class="hexFrame"></iframe>

<audio id="bgMusic"></audio>
<button id="playBtn" disabled>播放音乐 + 动画</button>
<div id="sideImageContainer"><img id="sideImage" src=""></div>

<!-- ========== 配置面板 ========== -->
<button id="configToggle" title="配置面板">☰</button>
<div id="configPanel">
    <div class="config-header">配置面板</div>

    <div class="config-section">
        <h3>农场列表编辑</h3>
        <div id="farmList"></div>
        <button class="btn-success" id="addFarmBtn">+ 添加农场</button>
    </div>

    <div class="config-section">
        <h3>音乐管理</h3>
        <input type="file" id="musicFileInput" accept="audio/*" multiple>
        <div id="musicList" style="margin-top:8px;"></div>
    </div>

    <div class="config-section">
        <h3>操作</h3>
        <div class="action-buttons">
            <button class="btn-success" id="saveConfigBtn">保存配置</button>
            <button class="btn-danger" id="resetConfigBtn">重置默认</button>
        </div>
    </div>
</div>

<script>
// ========== DOM 元素获取 ==========
const frames = [document.getElementById('stageFrame1'), document.getElementById('stageFrame2')];
const topText = document.getElementById('topText');
const sideImageContainer = document.getElementById('sideImageContainer');
const sideImage = document.getElementById('sideImage');
const audio = document.getElementById('bgMusic');
const playBtn = document.getElementById('playBtn');
const musicFolder = './Music/';
let currentIndex = 0;

// 配置面板元素
const configPanel = document.getElementById('configPanel');
const configToggle = document.getElementById('configToggle');
const farmListEl = document.getElementById('farmList');
const musicListEl = document.getElementById('musicList');
const musicFileInput = document.getElementById('musicFileInput');
const addFarmBtn = document.getElementById('addFarmBtn');
const saveConfigBtn = document.getElementById('saveConfigBtn');
const resetConfigBtn = document.getElementById('resetConfigBtn');

// ========== 默认数据（后备） ==========
// 内联音乐列表（离线模式后备，解决 file:// 协议下 fetch 的 CORS 限制）
const inlineMusicList = ["9月1日(7).MP3"];

// 默认农场列表（硬编码后备）
const defaultStages = [
    { src: '全自动烤鸡机.html', duration: 1150, image: 'images/Weixin Image_20250902084325_154_25.jpg' },
    { src: '仙人掌农场 甘蔗农场.html', duration: 1150, image: 'images/Weixin Image_20250902084336_164_25.jpg' },
    { src: '刷线机.html', duration: 1150, image: 'images/Weixin Image_20250902084334_163_25.jpg' },
    { src: '全自动农场(村民).html', duration: 1150, image: 'images/Weixin Image_20250902084329_158_25.jpg' },
    { src: '刷石机.html', duration: 1150, image: 'images/Weixin Image_20250902084333_162_25.jpg' },
    { src: '刷铁机.html', duration: 1150, image: 'images/Weixin Image_20250902084332_161_25.jpg' },
    { src: '潜影贝农场.html', duration: 1150, image: 'images/Weixin Image_20250902084331_160_25.jpg' },
    { src: '沼泽农场.html', duration: 1150, image: 'images/Weixin Image_20250902084330_159_25.jpg' },
    { src: '蜂蜜农场.html', duration: 1150, image: 'images/Weixin Image_20250902084553_165_25.jpg' },
    { src: '树厂.html', duration: 1150, image: 'images/Weixin Image_20250902084328_157_25.jpg' },
    { src: '刷沙 龙蛋 混凝土机.html', duration: 1150, image: 'images/Weixin Image_20250902084327_156_25.jpg' },
    { src: '猪人农场(交易所).html', duration: 1150, image: 'images/Weixin Image_20250902084326_155_25.jpg' }
];

// ========== 配置状态 ==========
let stages = [];
let musicList = []; // 统一格式：[{ name, url }]

// ========== localStorage 持久化 ==========
const STORAGE_KEY = 'animationBoardConfig';

// 从 localStorage 加载配置
function loadConfig() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const config = JSON.parse(saved);
            stages = config.stages || defaultStages.slice();
            musicList = config.music || [];
            // 如果有自定义音乐，直接启用播放按钮
            if (musicList.length > 0) {
                playBtn.disabled = false;
            }
            console.log('从 localStorage 加载配置成功');
            return true;
        }
    } catch(e) {
        console.log('加载 localStorage 配置失败:', e.message);
    }
    return false;
}

// 保存配置到 localStorage
function saveConfig() {
    try {
        const config = { stages, music: musicList };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        console.log('配置已保存到 localStorage');
        alert('配置已保存成功！');
    } catch(e) {
        console.log('保存配置失败:', e.message);
        alert('保存失败：' + e.message + '\n（可能是 data URL 过大超出 localStorage 容量，建议减少上传的图片/音乐数量）');
    }
}

// 重置为默认配置
function resetConfig() {
    if (!confirm('确定要重置为默认配置吗？所有自定义数据将被清除。')) return;
    localStorage.removeItem(STORAGE_KEY);
    stages = defaultStages.slice();
    musicList = [];
    playBtn.disabled = true;
    // 重新加载默认音乐
    loadDefaultMusic();
    renderFarmList();
    renderMusicList();
    alert('已重置为默认配置');
}

// ========== 音乐加载 ==========
// 加载默认音乐列表（优先 fetch 服务器模式，失败则降级到内联数据）
function loadDefaultMusic() {
    // 如果已有自定义音乐（从 localStorage 加载），跳过 fetch
    if (musicList.length > 0) {
        playBtn.disabled = false;
        return;
    }
    fetch(musicFolder + 'musicList.json')
      .then(res => res.json())
      .then(data => {
          musicList = data.map(name => ({ name, url: musicFolder + name }));
          console.log('音乐列表加载完成（服务器模式）:', musicList.map(m=>m.name));
          if(musicList.length>0) playBtn.disabled = false;
      })
      .catch(err => {
          console.log('fetch 失败，使用内联音乐列表（离线模式）:', err.message);
          musicList = inlineMusicList.map(name => ({ name, url: musicFolder + name }));
          if(musicList.length>0) playBtn.disabled = false;
      });
}

// ========== 动态农场页面生成 ==========
// 根据农场配置生成完整 HTML 字符串（与现有农场页面动画行为一致）
function generateHexagonHTML(stage) {
    const values = stage.values || [0.5, 0.5, 0.5, 0.5, 0.5, 0.5];
    const stroke = stage.stroke || '#ff9900';
    const fill = stage.fill || '#ffcc00';
    // 转义颜色字符串中的特殊字符
    const escStroke = String(stroke).replace(/'/g, "\\'");
    const escFill = String(fill).replace(/'/g, "\\'");

    return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>动态六边形</title>
<style>
@font-face{font-family:'Minecraft';src:url('./Minecraft.woff2') format('woff2');}
text{font-family:'Minecraft', monospace !important;}
body{margin:0;overflow:hidden;}
svg{width:600px;height:600px;display:block;margin:auto;}
.outline{fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;}
.fill{opacity:0;}
.fill.exit{opacity:0;}
</style>
</head>
<body>
<svg viewBox="-500 -500 1000 1000">
  <polygon id="fill" class="fill"/>
  <path id="outline" class="outline"/>
</svg>
<script>
let outline=document.getElementById('outline');
let fill=document.getElementById('fill');
window.strokeColor='${escStroke}';
const values=${JSON.stringify(values)};
const R=200;
const angleStep=Math.PI*2/6;
const fillColor='${escFill}';
function getPoints(vals){
 return vals.map((v,i)=>{
  let angle=-Math.PI/2+i*angleStep;
  let x=Math.cos(angle)*v*R;
  let y=Math.sin(angle)*v*R;
  return x+','+y;
 }).join(' ');
}
function drawHexagon(){
 const pts=getPoints(values);
 fill.setAttribute('points',pts);
 fill.style.fill=fillColor;
 outline.setAttribute('d','M'+pts.split(' ').join(' L')+' Z');
 outline.style.stroke=strokeColor;
 const length=outline.getTotalLength();
 outline.style.strokeDasharray=length;
 outline.style.strokeDashoffset=length;
 fill.style.opacity=0;
 let start=null;const duration=600;
 function animate(time){
  if(!start) start=time;
  let t=(time-start)/duration;
  if(t>1) t=1;
  t=t<0.5?2*t*t:-1+(4-2*t)*t;
  outline.style.strokeDashoffset=length*(1-t);
  fill.style.opacity=0.4*t;
  if(t<1) requestAnimationFrame(animate);
 }
 requestAnimationFrame(animate);
}
function exitHexagon(){
 const length=outline.getTotalLength();
 let start=null;const duration=600;
 function animateExit(time){
  if(!start) start=time;
  let t=(time-start)/duration;
  if(t>1) t=1;
  t=t<0.5?2*t*t:-1+(4-2*t)*t;
  outline.style.strokeDashoffset=length*t;
  fill.style.opacity=0.4*(1-t);
  if(t<1) requestAnimationFrame(animateExit);
 }
 requestAnimationFrame(animateExit);
}
drawHexagon();
<\/script>
</body>
</html>`;
}

// ========== 轮播逻辑 ==========
function wait(ms){ return new Promise(resolve=>setTimeout(resolve,ms)); }

async function playStages(){
    let prevWin = null;
    let prevFrameIndex = 0;
    for(let i=0;i<stages.length;i++){
        const stage = stages[i];
        const currFrameIndex = 1-prevFrameIndex;
        const currFrame = frames[currFrameIndex];

        topText.style.opacity = 0;
        await wait(500);
        // 获取农场名称：自定义农场用 name 字段，默认农场从 src 推导
        const farmName = stage.name || (stage.src ? stage.src.replace(/\.html$/,'') : '未命名');
        topText.textContent = farmName;

        // 自定义农场（无 src 或标记为 isCustom）使用 srcdoc 加载动态生成的 HTML
        // 默认农场（有 src 字段）保持原有 iframe.src 方式
        if (stage.isCustom || !stage.src) {
            await new Promise(resolve=>{
                let done = false;
                const finish = ()=>{ if(!done){ done=true; resolve(); } };
                currFrame.onload = finish;
                currFrame.srcdoc = generateHexagonHTML(stage);
                // srcdoc 加载超时保护
                setTimeout(finish, 800);
            });
        } else {
            currFrame.src = stage.src + "?t=" + Date.now();
            await new Promise(resolve=>{ currFrame.onload = ()=>resolve(); });
        }
        const win = currFrame.contentWindow;

        let strokeColor = '#ff9900';
        try{ if(win.strokeColor) strokeColor = win.strokeColor; }catch(e){}
        topText.style.color = strokeColor;
        topText.style.opacity = 1;

        if(win.drawHexagon) win.drawHexagon();
        if(prevWin && prevWin.exitHexagon) prevWin.exitHexagon();

        sideImage.src = stage.image || '';
        sideImageContainer.style.right = '20px';
        setTimeout(()=>{ sideImageContainer.style.right = '-300px'; }, stage.duration-200);

        await wait(stage.duration);
        prevWin = win;
        prevFrameIndex = currFrameIndex;
    }
    if(prevWin && prevWin.exitHexagon) prevWin.exitHexagon();
    await wait(500);
    topText.style.opacity = 0;
}

// ========== 播放按钮事件 ==========
playBtn.addEventListener('click', async ()=>{
    if(musicList.length === 0){
        alert("音乐列表为空或尚未加载完成！");
        return;
    }

    playBtn.disabled = true;
    playBtn.style.opacity = 0.5;

    async function playNextMusic(){
        if(currentIndex >= musicList.length) return; // 所有音乐播放完成
        const track = musicList[currentIndex];
        audio.src = track.url;
        try{ await audio.play(); console.log('播放:', track.name); }
        catch(e){ console.log('播放被阻止', e); }
        audio.onended = ()=>{
            currentIndex++;
            playNextMusic();
        };
    }

    playNextMusic();
    playStages();
});

// ========== 配置面板 UI 逻辑 ==========

// 面板折叠/展开
configToggle.addEventListener('click', ()=>{
    configPanel.classList.toggle('open');
    configToggle.classList.toggle('open');
    if (configPanel.classList.contains('open')) {
        renderFarmList();
        renderMusicList();
    }
});

// 渲染农场列表
function renderFarmList() {
    farmListEl.innerHTML = '';
    stages.forEach((stage, index) => {
        const item = document.createElement('div');
        item.className = 'farm-item';

        const isCustom = stage.isCustom || !stage.src;
        const farmName = stage.name || (stage.src ? stage.src.replace(/\.html$/,'') : '未命名');
        const valuesStr = (stage.values || []).join(',');
        const stroke = stage.stroke || '#ff9900';
        const fill = stage.fill || '#ffcc00';
        const hasImage = !!stage.image;

        item.innerHTML = `
            <div class="farm-item-header">
                <span>${index+1}. ${escapeHtml(farmName)} ${isCustom ? '(自定义)' : '(默认)'}</span>
                <div>
                    <button class="toggle-btn">编辑</button>
                    <button class="btn-danger delete-farm">删除</button>
                </div>
            </div>
            <div class="farm-item-fields">
                <label>名称</label>
                <input type="text" class="farm-name" value="${escapeAttr(farmName)}">
                <label>六边形数值（6个，逗号分隔，0-1）</label>
                <input type="text" class="farm-values" value="${escapeAttr(valuesStr)}" placeholder="0.2,0.9,0.8,1.0,0.2,0.3">
                <div class="color-row">
                    <span>描边色:</span>
                    <input type="color" class="farm-stroke" value="${stroke}">
                    <span>填充色:</span>
                    <input type="color" class="farm-fill" value="${fill}">
                </div>
                <label>图片 ${hasImage ? '（已设置，可替换）' : ''}</label>
                <input type="file" class="farm-image" accept="image/*">
                ${hasImage && stage.image.indexOf('data:') === 0 ? '<img class="image-preview" src="'+stage.image+'">' : ''}
                <label>持续时间(ms)</label>
                <input type="number" class="farm-duration" value="${stage.duration || 1150}">
            </div>
        `;

        // 编辑/折叠切换
        item.querySelector('.toggle-btn').addEventListener('click', ()=>{
            const isExpanded = item.classList.contains('expanded');
            if (isExpanded) {
                // 收起前保存编辑值
                saveFarmEdit(index, item);
                item.classList.remove('expanded');
                item.querySelector('.toggle-btn').textContent = '编辑';
                // 更新标题
                const newName = item.querySelector('.farm-name').value.trim() || '未命名';
                item.querySelector('.farm-item-header span').textContent = (index+1) + '. ' + newName + ' (自定义)';
            } else {
                item.classList.add('expanded');
                item.querySelector('.toggle-btn').textContent = '收起';
            }
        });

        // 删除按钮
        item.querySelector('.delete-farm').addEventListener('click', ()=>{
            if (!confirm('确定删除农场「'+farmName+'」吗？')) return;
            stages.splice(index, 1);
            renderFarmList();
        });

        // 图片上传（使用 FileReader 转 data URL 以便持久化）
        item.querySelector('.farm-image').addEventListener('change', (e)=>{
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                stages[index].image = ev.target.result;
                stages[index].isCustom = true;
                renderFarmList();
                // 重新展开当前项
                const newItem = farmListEl.children[index];
                if (newItem) {
                    newItem.classList.add('expanded');
                    newItem.querySelector('.toggle-btn').textContent = '收起';
                }
            };
            reader.readAsDataURL(file);
        });

        farmListEl.appendChild(item);
    });
}

// 保存农场编辑值到 stages 数组
function saveFarmEdit(index, item) {
    const name = item.querySelector('.farm-name').value.trim();
    const valuesStr = item.querySelector('.farm-values').value.trim();
    const stroke = item.querySelector('.farm-stroke').value;
    const fill = item.querySelector('.farm-fill').value;
    const duration = parseInt(item.querySelector('.farm-duration').value) || 1150;

    // 解析数值数组，限制在 0-1 范围
    let values = valuesStr.split(',').map(v => {
        const num = parseFloat(v.trim());
        return isNaN(num) ? 0.5 : Math.max(0, Math.min(1, num));
    });
    // 补齐到6个
    while (values.length < 6) values.push(0.5);
    values = values.slice(0, 6);

    stages[index].name = name;
    stages[index].values = values;
    stages[index].stroke = stroke;
    stages[index].fill = fill;
    stages[index].duration = duration;
    stages[index].isCustom = true;
}

// 添加新农场
addFarmBtn.addEventListener('click', ()=>{
    stages.push({
        name: '新农场',
        values: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5],
        stroke: '#ff9900',
        fill: '#ffcc00',
        image: '',
        duration: 1150,
        isCustom: true
    });
    renderFarmList();
    // 自动展开新添加的项
    const newItem = farmListEl.children[stages.length - 1];
    if (newItem) {
        newItem.classList.add('expanded');
        newItem.querySelector('.toggle-btn').textContent = '收起';
        newItem.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
});

// 渲染音乐列表
function renderMusicList() {
    musicListEl.innerHTML = '';
    if (musicList.length === 0) {
        musicListEl.innerHTML = '<div style="font-size:12px;color:#999;">暂无音乐，请上传或加载默认列表</div>';
        return;
    }
    musicList.forEach((track, index) => {
        const item = document.createElement('div');
        item.className = 'music-item';
        const isDataUrl = track.url && track.url.indexOf('data:') === 0;
        item.innerHTML = `
            <span>${escapeHtml(track.name)} ${isDataUrl ? '(已上传)' : '(默认)'}</span>
            <button class="btn-danger delete-music">删除</button>
        `;
        item.querySelector('.delete-music').addEventListener('click', ()=>{
            musicList.splice(index, 1);
            renderMusicList();
            if (musicList.length === 0) playBtn.disabled = true;
        });
        musicListEl.appendChild(item);
    });
}

// 音乐文件上传（使用 FileReader 转 data URL 以便持久化）
musicFileInput.addEventListener('change', (e)=>{
    const files = Array.from(e.target.files);
    if (files.length === 0) return;
    let processed = 0;
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            musicList.push({ name: file.name, url: ev.target.result });
            processed++;
            if (processed === files.length) {
                renderMusicList();
                playBtn.disabled = musicList.length === 0;
            }
        };
        reader.readAsDataURL(file);
    });
    musicFileInput.value = ''; // 清空 input 以便重复选择同一文件
});

// 保存配置按钮
saveConfigBtn.addEventListener('click', ()=>{
    // 收起所有展开的农场编辑项，触发保存
    Array.from(farmListEl.children).forEach(item => {
        if (item.classList.contains('expanded')) {
            const index = Array.from(farmListEl.children).indexOf(item);
            saveFarmEdit(index, item);
            item.classList.remove('expanded');
            item.querySelector('.toggle-btn').textContent = '编辑';
        }
    });
    saveConfig();
});

// 重置配置按钮
resetConfigBtn.addEventListener('click', resetConfig);

// ========== 工具函数 ==========
function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str) {
    return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ========== 初始化 ==========
// 页面加载时从 localStorage 恢复配置
if (!loadConfig()) {
    // 没有保存的配置，使用默认数据
    stages = defaultStages.slice();
}
// 加载音乐（如果有自定义音乐则跳过 fetch）
loadDefaultMusic();
</script>
</body>
