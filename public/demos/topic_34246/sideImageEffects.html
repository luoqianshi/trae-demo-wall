<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>右侧滑动特效控制</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: transparent;
}

#imageContainer {
    position: absolute;
    top: 50%;
    right: -300px; /* 初始在右边屏幕外 */
    transform: translateY(-50%);
    width: 250px;
    height: 250px;
    transition: right 0.5s ease; /* 滑动动画 */
}

#imageContainer img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
</style>
</head>
<body>

<div id="imageContainer">
    <img id="sideImage" src="" alt="动态特效图">
</div>

<script>
const imageContainer = document.getElementById('imageContainer');
const sideImage = document.getElementById('sideImage');

// 定义每一帧对应的图片
const stageImages = [
    'images/烤鸡机.png',
    'images/仙人掌农场.png',
    'images/刷线机.png',
    'images/全自动农场.png',
    'images/刷石机.png',
    'images/刷铁机.png',
    'images/潜影贝农场.png',
    'images/沼泽农场.png',
    'images/蜂蜜农场.png',
    'images/树厂.png',
    'images/刷沙混凝土机.png',
    'images/猪人农场.png'
];

// 由主页面调用此函数播放滑入滑出动画
// index = 当前舞台的索引，duration = 当前舞台持续时间
function playImageEffect(index, duration) {
    if (index < 0 || index >= stageImages.length) return;

    sideImage.src = stageImages[index];

    // 滑入
    imageContainer.style.right = '20px';

    // 保持显示 duration ms 后滑出
    setTimeout(() => {
        imageContainer.style.right = '-300px';
    }, duration - 200); // 提前一点开始滑出，避免和下一帧冲突
}

// 暴露给外部 iframe 调用
window.playImageEffect = playImageEffect;
</script>

</body>
</html>
