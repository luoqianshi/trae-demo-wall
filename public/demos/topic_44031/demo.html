// ==================== UTILS ====================
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function formatPrice(price) {
  return '¥' + price.toFixed(2);
}

function getCustomerPrice(customerId, productId) {
  // Check negotiated price first
  const negotiated = Store.negotiatedPrices[customerId];
  if (negotiated) {
    const np = negotiated.find(n => n.productId === productId);
    if (np) return { price: np.price, type: 'negotiated', isPrivate: np.isPrivate, note: np.note };
  }
  // Fall back to customer-specific price
  const cp = Store.customerPrices[customerId];
  if (cp && cp[productId]) return { price: cp[productId], type: 'custom' };
  // Fall back to base price
  const product = Store.products.find(p => p.id === productId);
  return { price: product.basePrice, type: 'base' };
}

function generateOrderId() {
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const rand = Math.floor(Math.random() * 900 + 100);
  return 'ORD' + date + rand;
}

function getStatusText(status) {
  const map = { pending: '待接单', processing: '生产中', shipped: '配送中', delivered: '已完成' };
  return map[status] || status;
}

function getStatusClass(status) {
  return 'status-' + status;
}

  Store.role = role;

}

        </div>
      </div>
    `;
  });

  const cartItems = Object.entries(Store.cart).filter(([_, qty]) => qty > 0);
  if (cartItems.length > 0) {

      const pi = getCustomerPrice(customer.id, pid);
      total += pi.price * qty;
    });

function updateCart(productId, delta) {
  Store.cart[productId] = (Store.cart[productId] || 0) + delta;
  if (Store.cart[productId] < 0) Store.cart[productId] = 0;
  document.getElementById(`qty-${productId}`).textContent = Store.cart[productId];

  // Re-render to update cart bar
  const content = document.getElementById('customerContent');
  if (document.querySelector('.bottom-nav .nav-item.active .label').textContent === '选购') {
    content.innerHTML = renderCustomerProducts();
  }
}

function submitOrder() {
  const customer = Store.currentUser;
  const items = Object.entries(Store.cart)
    .filter(([_, qty]) => qty > 0)
    .map(([pid, qty]) => {
      const pi = getCustomerPrice(customer.id, pid);
      return { productId: pid, quantity: qty, price: pi.price };
    });

  if (items.length === 0) {
    showToast('请先选择商品');
    return;
  }

  const total = items.reduce((sum, item) => sum + item.price * item.quantity, 0);
  const order = {
    id: generateOrderId(),
    customerId: customer.id,
    items: items,
    total: total,
    status: 'pending',
    createdAt: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-'),
    timeline: [
      { time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}), title: '下单成功', desc: `${customer.name}提交了订单`, completed: true, active: true },
      { time: '', title: '商家接单', desc: '等待商家确认', completed: false },
      { time: '', title: '生产中', desc: '等待生产', completed: false },
      { time: '', title: '已送出', desc: '等待配送', completed: false },
      { time: '', title: '已送达', desc: '等待确认', completed: false }
    ]
  };

  Store.orders.unshift(order);
  Store.cart = {};
  showToast('订单提交成功！');
  switchCustomerTab('orders');
}

function updateOrderStatus(orderId, newStatus) {
  const order = Store.orders.find(o => o.id === orderId);
  if (!order) return;

  order.status = newStatus;
  const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});

  // Update timeline
  const statusMap = {
    processing: { title: '生产中', desc: '正在加工制作' },
    shipped: { title: '已送出', desc: '司机配送中' },
    delivered: { title: '已送达', desc: '订单已完成' }
  };

  const timelineMap = { processing: 2, shipped: 3, delivered: 4 };
  const idx = timelineMap[newStatus];
  if (idx !== undefined && order.timeline[idx]) {
    order.timeline[idx].time = time;
    order.timeline[idx].completed = true;
    order.timeline[idx].active = false;
    if (order.timeline[idx + 1]) order.timeline[idx + 1].active = true;
  }

  showToast(`订单已更新为：${getStatusText(newStatus)}`);
  switchMerchantTab('orders');
}

        <span>${p.icon} ${p.name} × ${item.quantity}${p.unit}</span>
        <div style="text-align:right;">
          <div>${formatPrice(item.price * item.quantity)}</div>
          ${pi.type === 'negotiated' ? `<span class="price-tag">协议价 ${formatPrice(item.price)}</span>` : ''}
        </div>
      </div>
    `;
  });
  html += `
    <div style="display:flex;justify-content:space-between;padding:12px 0;font-weight:700;">
      <span>合计</span>
      <span style="color:var(--accent);">${formatPrice(order.total)}</span>
    </div></div>
  `;

  html += '<div style="margin-bottom:1rem;"><div style="font-weight:600;margin-bottom:0.5rem;">订单追踪</div><div class="timeline">';
  order.timeline.forEach(t => {
    const cls = t.completed ? 'completed' : (t.active ? 'active' : '');
    html += `
      <div class="timeline-item ${cls}">
        <div class="timeline-time">${t.time || '待处理'}</div>
        <div class="timeline-title">${t.title}</div>
        <div class="timeline-desc">${t.desc}</div>
      </div>
    `;
  });
  html += `</div></div>
        <div style="display:flex;gap:0.5rem;">${getOrderActions(order)}</div>
      </div>
    </div>
  `;

  document.body.insertAdjacentHTML('beforeend', html);
}

function renderMerchantCustomers() {
  let html = `
    <div style="margin-bottom:1rem;">
      <div style="font-size:1.1rem;font-weight:600;">客户管理</div>
      <div style="font-size:0.85rem;color:var(--muted);">管理客户专属价格与协议价</div>
    </div>
  `;

  Store.customers.forEach(customer => {
    const customerOrders = Store.orders.filter(o => o.customerId === customer.id);
    const totalSpent = customerOrders.reduce((sum, o) => sum + o.total, 0);
    const negotiatedCount = (Store.negotiatedPrices[customer.id] || []).length;

    html += `
      <div class="customer-card" onclick="showCustomerDetail('${customer.id}')">
        <div class="customer-avatar">${customer.avatar}</div>
        <div class="customer-info">
          <div class="customer-name">${customer.name}</div>
          <div class="customer-type">${customer.type} · ${customerOrders.length}单 · 累计${formatPrice(totalSpent)}</div>
        </div>
        <div style="text-align:right;">
          ${negotiatedCount > 0 ? `<span class="price-tag">${negotiatedCount}个协议价</span>` : ''}
          <div style="font-size:0.8rem;color:var(--muted);margin-top:4px;">查看详情 →</div>
        </div>
      </div>
    `;
  });

  return html;
}

function showCustomerDetail(customerId) {
  const customer = Store.customers.find(c => c.id === customerId);
  const negotiated = Store.negotiatedPrices[customerId] || [];

  let html = `
    <div class="modal-overlay show" onclick="if(event.target===this)closeModal()">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">${customer.name} - 价格管理</span>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
          <span style="font-size:2rem;">${customer.avatar}</span>
          <div>
            <div style="font-weight:600;">${customer.name}</div>
            <div style="font-size:0.85rem;color:var(--muted);">${customer.type}</div>
          </div>
        </div>
  `;

  // Customer-specific prices
  html += '<div style="margin-bottom:1rem;"><div style="font-weight:600;margin-bottom:0.5rem;">专属价格设置</div>';
  Store.products.forEach(p => {
    const cp = Store.customerPrices[customerId];
    const price = cp && cp[p.id] ? cp[p.id] : p.basePrice;
    html += `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--rule);">
        <span>${p.icon} ${p.name}</span>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <span style="font-size:0.8rem;color:var(--muted);">基准${formatPrice(p.basePrice)}</span>
          <input type="number" step="0.1" value="${price}" style="width:70px;padding:4px 8px;border:1px solid var(--rule);border-radius:6px;text-align:right;"
            onchange="updateCustomerPrice('${customerId}', '${p.id}', this.value)">
        </div>
      </div>
    `;
  });
  html += '</div>';

  // Negotiated prices
  html += '<div style="margin-bottom:1rem;"><div style="font-weight:600;margin-bottom:0.5rem;">协议价管理</div>';
  if (negotiated.length === 0) {
    html += '<div style="font-size:0.9rem;color:var(--muted);padding:1rem;text-align:center;">暂无协议价</div>';
  } else {
    negotiated.forEach(np => {
      const p = Store.products.find(pr => pr.id === np.productId);
      html += `
        <div style="background:var(--bg2);border-radius:8px;padding:0.75rem;margin-bottom:0.5rem;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:600;">${p.icon} ${p.name}</span>
            <span style="font-weight:700;color:var(--accent);">${formatPrice(np.price)}</span>
          </div>
          <div style="font-size:0.85rem;color:var(--muted);margin-top:4px;">
            数量≥${np.quantity}${p.unit} · ${np.note} · 到期 ${np.expiresAt}
          </div>
          <div style="margin-top:0.5rem;">
            <span class="privacy-badge ${np.isPrivate ? 'privacy-private' : 'privacy-public'}">
              ${np.isPrivate ? '🔒 隐私' : '🔓 公开'}
            </span>
            <button class="btn btn-sm btn-outline" style="margin-left:0.5rem;" onclick="toggleNegotiatedPrivacy('${customerId}', '${np.id}')">切换</button>
          </div>
        </div>
      `;
    });
  }
  html += `
    <button class="btn btn-primary btn-block" style="margin-top:0.5rem;" onclick="showAddNegotiatedPrice('${customerId}')">+ 添加协议价</button>
    </div>
  `;

  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function updateCustomerPrice(customerId, productId, price) {
  if (!Store.customerPrices[customerId]) Store.customerPrices[customerId] = {};
  Store.customerPrices[customerId][productId] = parseFloat(price);
  showToast('价格已更新');
}

function toggleNegotiatedPrivacy(customerId, npId) {
  const negotiated = Store.negotiatedPrices[customerId];
  const np = negotiated.find(n => n.id === npId);
  if (np) {
    np.isPrivate = !np.isPrivate;
    showToast(np.isPrivate ? '已设为隐私' : '已设为公开');
    closeModal();
    showCustomerDetail(customerId);
  }
}

function showAddNegotiatedPrice(customerId) {
  let html = `
    <div class="modal-overlay show" onclick="if(event.target===this)closeModal()">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">添加协议价</span>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="form-group">
          <label class="form-label">选择商品</label>
          <select class="form-select" id="npProduct">
            ${Store.products.map(p => `<option value="${p.id}">${p.icon} ${p.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">协议价格</label>
          <input type="number" step="0.1" class="form-input" id="npPrice" placeholder="输入协议价格">
        </div>
        <div class="form-group">
          <label class="form-label">起订数量</label>
          <input type="number" class="form-input" id="npQuantity" placeholder="输入起订数量">
        </div>
        <div class="form-group">
          <label class="form-label">备注</label>
          <input type="text" class="form-input" id="npNote" placeholder="如：月度协议、试合作等">
        </div>
        <div class="form-group">
          <label class="form-label">隐私设置</label>
          <div style="display:flex;align-items:center;gap:0.75rem;">
            <label class="toggle">
              <input type="checkbox" id="npPrivate" checked>
              <span class="toggle-slider"></span>
            </label>
            <span style="font-size:0.85rem;color:var(--muted);">仅该客户可见</span>
          </div>
        </div>
        <button class="btn btn-primary btn-block" onclick="addNegotiatedPrice('${customerId}')">确认添加</button>
      </div>
    </div>
  `;
  closeModal();
  document.body.insertAdjacentHTML('beforeend', html);
}

function addNegotiatedPrice(customerId) {
  const productId = document.getElementById('npProduct').value;
  const price = parseFloat(document.getElementById('npPrice').value);
  const quantity = parseInt(document.getElementById('npQuantity').value);
  const note = document.getElementById('npNote').value || '协议价';
  const isPrivate = document.getElementById('npPrivate').checked;

  if (!price || !quantity) {
    showToast('请填写完整信息');
    return;
  }

  if (!Store.negotiatedPrices[customerId]) Store.negotiatedPrices[customerId] = [];
  Store.negotiatedPrices[customerId].push({
    id: 'np' + Date.now(),
    productId,
    price,
    quantity,
    note,
    isPrivate,
    expiresAt: new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10)
  });

  showToast('协议价添加成功');
  closeModal();
  showCustomerDetail(customerId);
}

// ==================== GLOBAL ====================
function switchRole() {
  Store.role = null;
  Store.currentUser = null;
  Store.cart = {};
  document.getElementById('app').style.display = 'none';
  document.getElementById('roleSelector').classList.remove('hidden');
}

function filterOrders(status) {
  // Simple re-render with filter would go here
  showToast('筛选功能：' + (status === 'all' ? '全部订单' : getStatusText(status)));
}

// Initialize
showToast('欢迎使用面食链 Demo！');
</script>
