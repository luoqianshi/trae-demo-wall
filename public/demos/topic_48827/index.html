let currentUtterance = null;
let isSpeaking = false;

function initVoice() {
  if (!('speechSynthesis' in window)) return false;
  // Warm up speech synthesis (some browsers need this)
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  window.speechSynthesis.speak(u);
  window.speechSynthesis.cancel();
  return true;
}

function getChineseVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Prefer Chinese voices
  const zhVoices = voices.filter(v => v.lang && v.lang.startsWith('zh'));
  if (zhVoices.length) {
    // Prefer female or neutral voices for gentle guidance
    const female = zhVoices.find(v => v.name.includes('女') || v.name.includes('Female') || v.name.includes('Mei'));
    return female || zhVoices[0];
  }
  // Fallback to any voice
  return voices[0] || null;
}

function speak(text, options = {}) {
  if (!('speechSynthesis' in window)) return;
  // Cancel previous speech
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  const voice = getChineseVoice();
  if (voice) utterance.voice = voice;

  // Gentle, slow settings for bedtime guidance
  utterance.rate = options.rate || 0.82;   // slower pace
  utterance.pitch = options.pitch || 0.92; // slightly lower, calming
  utterance.volume = options.volume || 0.7;
  utterance.lang = 'zh-CN';

  utterance.onstart = () => {
    isSpeaking = true;
    updateVoiceStatus(options.context || 'general', true);
  };
  utterance.onend = () => {
    isSpeaking = false;
    updateVoiceStatus(options.context || 'general', false);
  };
  utterance.onerror = () => {
    isSpeaking = false;
    updateVoiceStatus(options.context || 'general', false);
  };

  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

function stopSpeaking() {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    isSpeaking = false;
  }
}

function updateVoiceStatus(context, speaking) {
  const statusEl = context === 'breathe' ? document.getElementById('breatheVoiceStatus')
                   : context === 'scan' ? document.getElementById('scanVoiceStatus')
                   : null;
  if (!statusEl) return;
  statusEl.classList.toggle('speaking', speaking);
  statusEl.textContent = speaking ? '朗读中...' : '';
}

function toggleVoice(context) {
  voiceEnabled[context] = !voiceEnabled[context];
  const btn = context === 'breathe' ? document.getElementById('breatheVoiceToggle')
              : context === 'scan' ? document.getElementById('scanVoiceToggle')
              : null;
  if (btn) {
    btn.classList.toggle('active', voiceEnabled[context]);
    btn.querySelector('.voice-icon').textContent = voiceEnabled[context] ? '🔊' : '🔇';
  }
  // Stop any current speech when disabling
  if (!voiceEnabled[context]) {
    stopSpeaking();
    updateVoiceStatus(context, false);
  }
  return voiceEnabled[context];
}

// ========== Utils ==========
function nowTime() {
  const d = new Date();
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function saveMessages() {
  localStorage.setItem('sleepCompanion_msgs', JSON.stringify(messages.slice(-200)));
}

function saveMemory() {
  localStorage.setItem('sleepCompanion_memory', JSON.stringify(memory));
}

function updateMemoryBar() {
  const parts = [];
  if (memory.mood) parts.push(`心情：${memory.mood}`);
  if (memory.insomniaType) parts.push(`困扰：${memory.insomniaType}`);
  if (memory.lastTopic) parts.push(`话题：${memory.lastTopic}`);
  memoryBar.textContent = parts.length ? '✦ ' + parts.join(' · ') : '';
}

function scrollToBottom() {
  chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
}

// ========== Render Messages ==========
function renderMessages() {
  chatContainer.innerHTML = '';

function appendMessageBubble(msg, animate = true) {

// ========== AI Response Logic ==========
function analyzeInput(text) {
  const t = text.toLowerCase();
  let mood = null, type = null;

  if (/烦|躁|焦虑|不安|慌|急/.test(t)) mood = '焦虑';
  else if (/难过|伤心|低落|丧|抑郁/.test(t)) mood = '低落';
  else if (/累|疲惫|倦|乏/.test(t)) mood = '疲惫';
  else if (/生气|愤怒|不爽/.test(t)) mood = '烦躁';
  else if (/怕|恐惧|担心/.test(t)) mood = '担忧';
  else mood = '复杂';

  if (/睡不着|入睡|躺下|闭眼/.test(t)) type = '入睡困难';
  else if (/半夜|醒来|醒|起夜/.test(t)) type = '半夜易醒';
  else if (/早醒|很早就|四五点/.test(t)) type = '早醒';
  else if (/多梦|噩梦|做梦/.test(t)) type = '多梦';
  else if (/作息|规律|时间|熬夜/.test(t)) type = '作息紊乱';

  if (mood) memory.mood = mood;
  if (type) memory.insomniaType = type;
  memory.lastTopic = text.slice(0, 30);
  saveMemory();
  updateMemoryBar();
}

  const wantMethod = /怎么|方法|办法|怎么做|教教我|试试|有用吗/.test(t);

    ];

  // CBT-I: sleep hygiene questions
  if (/为什么|原因|怎么回事|是不是/.test(t) && /睡不着|失眠|睡不好/.test(t)) {
    return `失眠的原因有很多呢，每个人都不太一样。

比较常见的有：
• 心理因素：焦虑、压力、过度思考

• 身体因素：疼痛、激素变化、某些药物

你提到「${text.slice(0, 20)}...」，是最近才出现的情况，还是已经有一段时间了？

了解多一点，才能找到更适合你的调整方向。`;

  // User asks for method
  if (wantMethod || /放松|平静|安静|助眠/.test(t)) {
    const methods = [
      `分享一个躺在床上就能做的方法——478呼吸：

用鼻子吸气，数4秒
屏住呼吸，数7秒

重复几次，不用刻意控制，顺其自然就好。

  ];

  // Context-aware
  let pool = [...empathyPool];
  if (memory.mood === '焦虑') {
    pool.push(`焦虑的时候，身体其实也很紧张呢。\n\n试试轻轻握紧拳头，数5秒，然后慢慢松开。感受那种「从紧到松」的感觉。\n\n有时候，身体放松了，心也会跟着松一点。`);
  }
  if (memory.insomniaType === '半夜易醒') {
    pool.push(`半夜醒来，其实是很常见的。很多人都会在夜里醒一两次。\n\n如果醒了，不用急着看时间，也不用急着再次入睡。翻个身，调整一下姿势，慢慢来。\n\n告诉自己：「醒一下没关系，我还会睡着的。」`);

// ========== Send Message ==========
function sendUserMessage(text) {
  if (!text.trim() || isTyping) return;

  const msg = { role: 'user', content: text.trim(), time: nowTime() };
  messages.push(msg);
  saveMessages();
  appendMessageBubble(msg, true);

  analyzeInput(text);

  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  isTyping = true;

  showTyping();

  const delay = Math.min(800 + text.length * 30, 2500);
  setTimeout(() => {
    hideTyping();
    const response = generateResponse(text);
    const aiMsg = { role: 'ai', content: response, time: nowTime() };
    messages.push(aiMsg);
    saveMessages();
    appendMessageBubble(aiMsg, true);
    isTyping = false;
    sendBtn.disabled = false;
  }, delay);
}

// ========== Breathing ==========
function startBreathe() {
  document.getElementById('breatheOverlay').classList.add('active');
  const circle = document.getElementById('breathCircle');
  const text = document.getElementById('breathText');
  const count = document.getElementById('breathCount');
  const hint = document.getElementById('breathHint');

  const phases = [
    { name: '吸气', seconds: 4, scale: 1.6, hint: '用鼻子缓慢吸气，让腹部轻轻鼓起', sub: '吸气', voice: '吸气，四秒。用鼻子缓慢吸气，让腹部轻轻鼓起。' },
    { name: '屏息', seconds: 7, scale: 1.6, hint: '保持呼吸，身体放松，不用紧张', sub: '屏息', voice: '屏息，七秒。保持呼吸，身体放松，不用紧张。' },
    { name: '呼气', seconds: 8, scale: 1, hint: '用嘴巴缓缓呼气，像吹蜡烛一样轻柔', sub: '呼气', voice: '呼气，八秒。用嘴巴缓缓呼气，像吹蜡烛一样轻柔。' }
  ];

  let cycle = 0;
  let phaseIdx = 0;
  let startTime = null;
  let animFrame = null;

  function runPhase() {
    if (!breatheActive) return;
    const phase = phases[phaseIdx];
    text.textContent = phase.sub;
    hint.textContent = phase.hint;
    startTime = Date.now();

    // Voice guidance for each phase
    if (voiceEnabled.breathe) {
      speak(phase.voice, { context: 'breathe', rate: 0.78, pitch: 0.9 });
    }

    function tick() {
      if (!breatheActive) return;
      const elapsed = (Date.now() - startTime) / 1000;
      const progress = Math.min(elapsed / phase.seconds, 1);
      const remaining = Math.max(0, Math.ceil(phase.seconds - elapsed));
      count.textContent = remaining;

      // Smooth scale
      const prevScale = phaseIdx === 0 ? 1 : (phaseIdx === 2 ? 1.6 : 1.6);
      const curScale = prevScale + (phase.scale - prevScale) * progress;
      circle.style.transform = `scale(${curScale})`;
      circle.style.opacity = 0.2 + progress * 0.5;

      if (progress < 1) {
        animFrame = requestAnimationFrame(tick);
      } else {
        phaseIdx++;
        if (phaseIdx >= phases.length) {
          phaseIdx = 0;
          cycle++;
          if (cycle >= 4) {
            text.textContent = '完成';
            count.textContent = '✓';
            hint.textContent = '感觉怎么样？可以再做几组，或者慢慢结束';
            circle.style.transform = 'scale(1)';
            circle.style.opacity = 0.3;
            if (voiceEnabled.breathe) {
              speak('练习完成。感觉怎么样？可以再做几组，或者慢慢结束。', { context: 'breathe', rate: 0.78 });
            }
            return;
          }
        }
        runPhase();
      }
    }
    tick();
  }

  breatheActive = true;
  text.textContent = '准备';
  count.textContent = '4';
  hint.textContent = '点击「结束练习」随时退出';
  circle.style.transform = 'scale(1)';
  circle.style.opacity = 0.3;

  // Initial voice prompt
  if (voiceEnabled.breathe) {
    speak('准备开始478呼吸练习。跟随我的声音，慢慢来。', { context: 'breathe', rate: 0.78 });
  }

  setTimeout(runPhase, voiceEnabled.breathe ? 3500 : 1000);
}

// ========== Body Scan ==========
function startScan() {
  document.getElementById('scanOverlay').classList.add('active');
  const stepEl = document.getElementById('scanStep');
  let stepIdx = 0;
  scanActive = true;

  // Prepare voice-friendly instructions (clean newlines)
  const scanVoiceTexts = bodyScanSteps.map(s => ({
    part: s.part,
    text: s.instruction.replace(/\n/g, '，').replace(/\.\.\./g, '…').replace(/resting/g, '休息'),
    icon: s.icon
  }));

  function showStep() {
    if (!scanActive) return;
    if (stepIdx >= bodyScanSteps.length) stepIdx = 0;
    const s = bodyScanSteps[stepIdx];
    const sv = scanVoiceTexts[stepIdx];
    stepEl.innerHTML = `
      <div class="scan-body-icon">${s.icon}</div>
      <div class="scan-part">${s.part}</div>
      <div class="scan-instruction">${s.instruction.replace(/\n/g, '<br>')}</div>
    `;

    // Voice guidance for each scan step
    if (voiceEnabled.scan && sv) {
      const isFirst = stepIdx === 0;
      const isLast = stepIdx === bodyScanSteps.length - 1;
      let voiceText = sv.text;
      if (isFirst) voiceText = '现在开始身体扫描。' + voiceText;
      if (isLast) voiceText = voiceText + '。扫描完成。让自己沉在床垫上，像一片叶子漂在水面上。';
      speak(voiceText, { context: 'scan', rate: 0.75, pitch: 0.88, volume: 0.65 });
    }

    stepIdx++;
    // Allow longer time when voice is enabled for the speech to finish
    const delay = voiceEnabled.scan ? (stepIdx === 1 ? 9000 : stepIdx === bodyScanSteps.length ? 12000 : 10000)
                                    : (stepIdx === 1 ? 5000 : 7000);
    setTimeout(showStep, delay);
  }

  // Initial voice prompt
  if (voiceEnabled.scan) {
    speak('准备开始身体扫描放松。找个舒服的姿势躺好，轻轻闭上眼睛。', { context: 'scan', rate: 0.78, volume: 0.65 });
    setTimeout(() => showStep(), 4000);
  } else {
    showStep();
  }
}

document.getElementById('scanClose').addEventListener('click', () => {

  document.getElementById('scanOverlay').classList.remove('active');
  if (messages.length > 0) {
    const msg = { role: 'ai', content: '身体扫描结束了。从头到脚，你都温柔地关照了一遍。现在，就让自己沉在床垫上，像一片叶子漂在水面上。', time: nowTime() };
    messages.push(msg); saveMessages(); appendMessageBubble(msg, true);
  }
});

document.getElementById('scanVoiceToggle').addEventListener('click', () => {
  const enabled = toggleVoice('scan');
  if (enabled) {
    speak('语音引导已开启', { context: 'scan', rate: 0.85 });
  }
});

// ========== Thought Dump ==========
function startDump() {
  document.getElementById('dumpOverlay').classList.add('active');
  document.getElementById('dumpArea').value = '';
}

document.getElementById('dumpSubmit').addEventListener('click', () => {
  const text = document.getElementById('dumpArea').value.trim();
  document.getElementById('dumpOverlay').classList.remove('active');
  const msg = { role: 'ai', content: text
    ? '那些思绪，已经交给这片星空保管了。\n\n你现在不需要再背着它们。闭上眼睛，让心跟着身体一起沉下来。'
    : '没关系，有时候思绪太多反而写不出来。就静静地躺一会儿，也很好。',
    time: nowTime() };
  messages.push(msg); saveMessages(); appendMessageBubble(msg, true);
});
document.getElementById('dumpClose').addEventListener('click', () => {
  document.getElementById('dumpOverlay').classList.remove('active');
});

// ========== Sleep Tips ==========
function showTips() {
  document.getElementById('tipsOverlay').classList.add('active');
  const card = document.getElementById('tipsCard');
  card.innerHTML = '<h3>温和的睡眠小知识</h3>' +
    sleepTips.map((t, i) => `<div class="tip-item"><span class="tip-num">${i+1}.</span>${t.title}<br><span style="color:var(--text-muted);font-size:13px;display:block;margin-top:6px;">${t.content}</span></div>`).join('');
}
document.getElementById('tipsClose').addEventListener('click', () => {
  document.getElementById('tipsOverlay').classList.remove('active');
});

// ========== Init ==========
renderMessages();
updateMemoryBar();
sendBtn.disabled = true;

// Initialize voice synthesis
initVoice();
// Load voices (some browsers load asynchronously)
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => getChineseVoice();
}

// Greeting if no messages
if (messages.length === 0) {
  const hour = new Date().getHours();
  let greeting = '夜深了';
  if (hour >= 5 && hour < 12) greeting = '早上好';
  else if (hour >= 12 && hour < 18) greeting = '下午好';
  else if (hour >= 18 && hour < 23) greeting = '晚上好';

  const firstMsg = { role: 'ai', content: `${greeting}，我是你的失眠陪伴官。\n\n今晚如果睡不着，或者心里有些乱，可以随时和我聊聊。不用刻意找话题，想到什么说什么就好。`, time: nowTime() };
  messages.push(firstMsg);
  saveMessages();
  setTimeout(() => appendMessageBubble(firstMsg, true), 300);
}
</script>
</body>
</html>
