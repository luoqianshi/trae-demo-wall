<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课件库</title>
    <style id="theme-vars">
/* ============================================
   LessonPress · 教科片 Turbo — Brand CSS
   Style: 活力教育科技风 (Vibrant EdTech)
   Tone: Energetic, creative, tool-oriented
   ============================================ */

:root {
  /* — Brand Primary — Vivid Orange-Red — */
  --color-primary: #F97316;
  --color-primary-hover: #EA580C;
  --color-primary-light: #FFF7ED;
  --color-primary-50: #FFF7ED;
  --color-primary-100: #FFEDD5;
  --color-primary-200: #FED7AA;
  --color-primary-300: #FDBA74;
  --color-primary-400: #FB923C;
  --color-primary-500: #F97316;
  --color-primary-600: #EA580C;
  --color-primary-700: #C2410C;
  --color-primary-800: #9A3412;
  --color-primary-900: #7C2D12;

  /* — Neutral Palette — */
  --color-gray-50: #F8FAFC;
  --color-gray-100: #F1F5F9;
  --color-gray-200: #E2E8F0;
  --color-gray-300: #CBD5E1;
  --color-gray-400: #94A3B8;
  --color-gray-500: #64748B;
  --color-gray-600: #475569;
  --color-gray-700: #334155;
  --color-gray-800: #1E293B;
  --color-gray-900: #0F172A;

  /* — Background — */
  --bg-primary: #FFFFFF;
  --bg-secondary: #F8FAFC;
  --bg-tertiary: #FFF7ED;
  --bg-inverse: #0F172A;

  /* — Text — */
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-tertiary: #94A3B8;
  --text-inverse: #FFFFFF;
  --text-link: #F97316;

  /* — State Colors (semantic only) — */
  --state-success: #10B981;
  --state-warning: #F59E0B;
  --state-error: #EF4444;
  --state-info: #3B82F6;

  /* — Border — */
  --border-default: #E2E8F0;
  --border-light: #F1F5F9;
  --border-focus: #F97316;

  /* — Radius — */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* — Shadow — */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.08);

  /* — Typography — */
  --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  --font-display: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;

  /* Type Scale */
  --text-xs: 0.75rem;     /* 12px */
  --text-sm: 0.875rem;    /* 14px */
  --text-base: 1rem;      /* 16px */
  --text-lg: 1.125rem;    /* 18px */
  --text-xl: 1.25rem;     /* 20px */
  --text-2xl: 1.5rem;     /* 24px */
  --text-3xl: 1.875rem;   /* 30px */
  --text-4xl: 2.25rem;    /* 36px */
  --text-5xl: 3rem;       /* 48px */

  /* Line Heights */
  --leading-tight: 1.25;
  --leading-snug: 1.375;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  /* Font Weights */
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* — Spacing — */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;    /* 8px */
  --space-3: 0.75rem;   /* 12px */
  --space-4: 1rem;      /* 16px */
  --space-5: 1.25rem;   /* 20px */
  --space-6: 1.5rem;    /* 24px */
  --space-8: 2rem;      /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */
  --space-20: 5rem;     /* 80px */
}

/* Dark mode support */
.dark {
  --bg-primary: #0F172A;
  --bg-secondary: #1E293B;
  --bg-tertiary: #1C1917;
  --bg-inverse: #F8FAFC;

  --text-primary: #F8FAFC;
  --text-secondary: #CBD5E1;
  --text-tertiary: #64748B;
  --text-inverse: #0F172A;

  --border-default: #334155;
  --border-light: #1E293B;
  --border-focus: #FB923C;

  --color-primary-light: #1C1917;
  --color-primary-50: #171412;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Top Navigation -->
      <nav class="w-full border-b" style="border-color: var(--border-default); background: var(--bg-primary);">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
          <!-- Logo -->
          <a href="#" class="flex items-center gap-2 shrink-0">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <rect width="28" height="28" rx="6" fill="var(--color-primary)"/>
              <path d="M8 10l6 4-6 4V10z" fill="white"/>
              <rect x="17" y="9" width="3" height="10" rx="1" fill="white"/>
            </svg>
            <span class="text-lg font-semibold truncate" style="color: var(--text-primary); font-family: var(--font-display);">LessonPress</span>
          </a>
          <!-- Nav Links -->
          <div class="flex items-center gap-8">
            <a href="#" data-dom-id="nav-home" class="text-sm font-medium whitespace-nowrap transition-colors duration-150" style="color: var(--text-secondary);" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color='var(--text-secondary)'">首页</a>
            <a href="#" data-dom-id="nav-create" class="text-sm font-medium whitespace-nowrap transition-colors duration-150" style="color: var(--text-secondary);" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color='var(--text-secondary)'">创建</a>
            <a href="#" class="text-sm font-semibold whitespace-nowrap" style="color: var(--color-primary); border-bottom: 2px solid var(--color-primary); padding-bottom: 2px;">课件库</a>
          </div>
          <!-- Login -->
          <button class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border whitespace-nowrap transition-colors duration-150" style="color: var(--text-secondary); border-color: var(--border-default); background: var(--bg-primary);" onmouseover="this.style.borderColor='var(--color-primary)';this.style.color='var(--color-primary)'" onmouseout="this.style.borderColor='var(--border-default)';this.style.color='var(--text-secondary)'">
            登录
          </button>
        </div>
      </nav>

      <!-- Page Content Area -->
      <div class="max-w-7xl mx-auto px-6 py-8">

        <!-- Page Header -->
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-baseline gap-3 min-w-0">
            <h1 class="text-2xl font-semibold truncate" style="color: var(--text-primary); font-family: var(--font-display); text-wrap: balance; word-break: keep-all;">我的课件库</h1>
            <span class="text-sm whitespace-nowrap" style="color: var(--text-tertiary);">共 24 个课件</span>
          </div>
          <a href="#" data-dom-id="cta-create" class="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-semibold rounded-lg text-white whitespace-nowrap transition-colors duration-150 shrink-0" style="background: var(--color-primary); font-family: var(--font-sans);" onmouseover="this.style.background='var(--color-primary-hover)'" onmouseout="this.style.background='var(--color-primary)'">
            <i data-lucide="plus" class="w-4 h-4"></i>
            新建课件
          </a>
        </div>

        <!-- Filter Toolbar -->
        <div class="flex flex-col gap-4 mb-8">
          <!-- Search Row -->
          <div class="flex items-center gap-4 flex-wrap">
            <div class="relative flex-1 min-w-[200px] max-w-md">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--text-tertiary);"></i>
              <input type="text" placeholder="搜索知识点..." class="w-full pl-10 pr-4 py-2.5 text-sm rounded-lg border outline-none transition-colors duration-150" style="background: var(--bg-primary); border-color: var(--border-default); color: var(--text-primary); font-family: var(--font-sans);" onfocus="this.style.borderColor='var(--border-focus)';this.style.boxShadow='0 0 0 2px var(--color-primary-light)'" onblur="this.style.borderColor='var(--border-default)';this.style.boxShadow='none'" />
            </div>

            <!-- Sort Dropdown -->
            <select class="px-3 py-2.5 text-sm rounded-lg border outline-none transition-colors duration-150 cursor-pointer shrink-0" style="background: var(--bg-primary); border-color: var(--border-default); color: var(--text-secondary); font-family: var(--font-sans);" onfocus="this.style.borderColor='var(--border-focus)'" onblur="this.style.borderColor='var(--border-default)'">
              <option>最近创建</option>
              <option>最早创建</option>
            </select>
          </div>

          <!-- Filter Pills -->
          <div class="flex items-center gap-6 flex-wrap">
            <!-- Subject Filters -->
            <div class="flex items-center gap-2">
              <span class="text-xs font-medium whitespace-nowrap" style="color: var(--text-tertiary);">学科</span>
              <div class="flex items-center gap-2">
                <button class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded-lg whitespace-nowrap transition-colors duration-150" style="background: var(--bg-secondary); color: var(--text-secondary);">全部</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded-lg whitespace-nowrap transition-colors duration-150" style="background: var(--color-primary); color: var(--text-inverse);">物理</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded-lg whitespace-nowrap transition-colors duration-150" style="background: var(--bg-secondary); color: var(--text-secondary);">数学</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded-lg whitespace-nowrap transition-colors duration-150" style="background: var(--bg-secondary); color: var(--text-secondary);">化学</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded-lg whitespace-nowrap transition-colors duration-150" style="background: var(--bg-secondary); color: var(--text-secondary);">生物</button>
              </div>
            </div>

            <!-- Divider -->
            <div class="w-px h-5 shrink-0" style="background: var(--border-default);"></div>

            <!-- Grade Filters -->
            <div class="flex items-center gap-2">
              <span class="text-xs font-medium whitespace-nowrap" style="color: var(--text-tertiary);">年级</span>
              <div class="flex items-center gap-2">
                <button class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded-lg whitespace-nowrap transition-colors duration-150" style="background: var(--bg-secondary); color: var(--text-secondary);">全部</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded-lg whitespace-nowrap transition-colors duration-150" style="background: var(--bg-secondary); color: var(--text-secondary);">高一</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded-lg whitespace-nowrap transition-colors duration-150" style="background: var(--color-primary); color: var(--text-inverse);">高二</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded-lg whitespace-nowrap transition-colors duration-150" style="background: var(--bg-secondary); color: var(--text-secondary);">高三</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Video Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">

          <!-- Card 1: 牛顿第二定律 — Physics -->
          <article class="rounded-xl border overflow-hidden transition-all duration-150" style="background: var(--bg-primary); border-color: var(--border-default);" onmouseover="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 4px 12px rgba(0,0,0,0.05)'" onmouseout="this.style.borderColor='var(--border-default)';this.style.boxShadow='none'">
            <div class="relative aspect-video flex items-center justify-center" style="background: var(--bg-secondary);">
              <!-- Physics illustration: force arrows -->
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <circle cx="32" cy="32" r="8" stroke="var(--color-primary)" stroke-width="2" fill="none"/>
                <path d="M32 8v16" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round"/>
                <path d="M32 8l-4 4" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round"/>
                <path d="M32 8l4 4" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round"/>
                <path d="M8 32h16" stroke="var(--text-tertiary)" stroke-width="2" stroke-linecap="round"/>
                <path d="M8 32l4-4" stroke="var(--text-tertiary)" stroke-width="2" stroke-linecap="round"/>
                <path d="M8 32l4 4" stroke="var(--text-tertiary)" stroke-width="2" stroke-linecap="round"/>
                <rect x="44" y="28" width="12" height="8" rx="2" fill="var(--color-primary)" opacity="0.2"/>
              </svg>
              <!-- Play icon overlay -->
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background: rgba(0,0,0,0.4);">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><path d="M5 3l9 5-9 5V3z"/></svg>
                </div>
              </div>
            </div>
            <div class="p-4">
              <h3 class="text-sm font-semibold mb-2 truncate" style="color: var(--text-primary); font-family: var(--font-display);">牛顿第二定律</h3>
              <div class="flex items-center gap-2 mb-3">
                <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-medium rounded whitespace-nowrap" style="background: var(--bg-secondary); color: var(--text-secondary);">物理</span>
                <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-medium rounded whitespace-nowrap" style="background: var(--bg-secondary); color: var(--text-secondary);">高一</span>
                <span class="text-xs whitespace-nowrap" style="color: var(--text-tertiary);">2:30</span>
              </div>
              <div class="flex items-center justify-between">
                <span class="text-xs" style="color: var(--text-tertiary);">2024-01-15</span>
                <div class="flex items-center gap-2">
                  <span class="inline-flex items-center gap-1 px-2 py-0.5 text-xs font-medium rounded whitespace-nowrap" style="background: rgba(16,185,129,0.1); color: var(--state-success);">
                    <span class="w-1.5 h-1.5 rounded-full shrink-0" style="background: var(--state-success);"></span>
                    已完成
                  </span>
                  <button class="w-7 h-7 flex items-center justify-center rounded transition-colors duration-150 shrink-0" style="color: var(--text-tertiary);" onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background='transparent'" aria-label="更多操作">
                    <i data-lucide="more-horizontal" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
            </div>
          </article>

          <!-- Card 2: 氧化还原反应 — Chemistry -->
          <article class="rounded-xl border overflow-hidden transition-all duration-150" style="background: var(--bg-primary); border-color: var(--border-default);" onmouseover="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 4px 12px rgba(0,0,0,0.05)'" onmouseout="this.style.borderColor='var(--border-default)';this.style.boxShadow='none'">
            <div class="relative aspect-video flex items-center justify-center" style="background: var(--bg-secondary);">
              <!-- Chemistry illustration: flask -->
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <path d="M24 12h16v8l8 20a6 6 0 01-5.5 8.5H21.5A6 6 0 0116 40l8-20v-8z" stroke="var(--color-primary)" stroke-width="2" fill="var(--color-primary)" fill-opacity="0.1"/>
                <line x1="22" y1="12" x2="42" y2="12" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="28" cy="38" r="2" fill="var(--color-primary)" opacity="0.4"/>
                <circle cx="36" cy="42" r="1.5" fill="var(--color-primary)" opacity="0.3"/>
                <circle cx="32" cy="34" r="1" fill="var(--color-primary)" opacity="0.5"/>
              </svg>
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background: rgba(0,0,0,0.4);">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><path d="M5 3l9 5-9 5V3z"/></svg>
                </div>
              </div>
            </div>
            <div class="p-4">
              <h3 class="text-sm font-semibold mb-2 truncate" style="color: var(--text-primary); font-family: var(--font-display);">氧化还原反应</h3>
              <div class="flex items-center gap-2 mb-3">
                <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-medium rounded whitespace-nowrap" style="background: var(--bg-secondary); color: var(--text-secondary);">化学</span>
                <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-medium rounded whitespace-nowrap" style="background: var(--bg-secondary); color: var(--text-secondary);">高二</span>
                <span class="text-xs whitespace-nowrap" style="color: var(--text-tertiary);">3:15</span>
              </div>
              <div class="flex items-center justify-between">
                <span class="text-xs" style="color: var(--text-tertiary);">2024-01-14</span>
                <div class="flex items-center gap-2">
                  <span class="inline-flex items-center gap-1 px-2 py-0.5 text-xs font-medium rounded whitespace-nowrap" style="background: rgba(16,185,129,0.1); color: var(--state-success);">
                    <span class="w-1.5 h-1.5 rounded-full shrink-0" style="background: var(--state-success);"></span>
                    已完成
                  </span>
                  <button class="w-7 h-7 flex items-center justify-center rounded transition-colors duration-150 shrink-0" style="color: var(--text-tertiary);" onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background='transparent'" aria-label="更多操作">
                    <i data-lucide="more-horizontal" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
            </div>
          </article>

          <!-- Card 3: 遗传定律 — Biology -->
          <article class="rounded-xl border overflow-hidden transition-all duration-150" style="background: var(--bg-primary); border-color: var(--border-default);" onmouseover="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 4px 12px rgba(0,0,0,0.05)'" onmouseout="this.style.borderColor='var(--border-default)';this.style.boxShadow='none'">
            <div class="relative aspect-video flex items-center justify-center" style="background: var(--bg-secondary);">
              <!-- Biology illustration: cell -->
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <ellipse cx="32" cy="32" rx="24" ry="22" stroke="var(--color-primary)" stroke-width="2" fill="var(--color-primary)" fill-opacity="0.08"/>
                <ellipse cx="32" cy="32" rx="8" ry="7" stroke="var(--color-primary)" stroke-width="1.5" fill="var(--color-primary)" fill-opacity="0.15"/>
                <circle cx="32" cy="32" r="3" fill="var(--color-primary)" opacity="0.3"/>
                <ellipse cx="20" cy="22" rx="4" ry="3" stroke="var(--color-primary)" stroke-width="1" fill="var(--color-primary)" fill-opacity="0.1" transform="rotate(-15 20 22)"/>
                <ellipse cx="44" cy="26" rx="3" ry="4" stroke="var(--color-primary)" stroke-width="1" fill="var(--color-primary)" fill-opacity="0.1" transform="rotate(20 44 26)"/>
                <ellipse cx="26" cy="42" rx="3" ry="3.5" stroke="var(--color-primary)" stroke-width="1" fill="var(--color-primary)" fill-opacity="0.1"/>
              </svg>
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background: rgba(0,0,0,0.4);">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><path d="M5 3l9 5-9 5V3z"/></svg>
                </div>
              </div>
            </div>
            <div class="p-4">
              <h3 class="text-sm font-semibold mb-2 truncate" style="color: var(--text-primary); font-family: var(--font-display);">遗传定律</h3>
              <div class="flex items-center gap-2 mb-3">
                <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-medium rounded whitespace-nowrap" style="background: var(--bg-secondary); color: var(--text-secondary);">生物</span>
                <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-medium rounded whitespace-nowrap" style="background: var(--bg-secondary); color: var(--text-secondary);">高一</span>
                <span class="text-xs whitespace-nowrap" style="color: var(--text-tertiary);">2:00</span>
              </div>
              <div class="flex items-center justify-between">
                <span class="text-xs" style="color: var(--text-tertiary);">2024-01-13</span>
                <div class="flex items-center gap-2">
                  <span class="inline-flex items-center gap-1 px-2 py-0.5 text-xs font-medium rounded whitespace-nowrap" style="background: rgba(16,185,129,0.1); color: var(--state-success);">
                    <span class="w-1.5 h-1.5 rounded-full shrink-0" style="background: var(--state-success);"></span>
                    已完成
                  </span>
                  <button class="w-7 h-7 flex items-center justify-center rounded transition-colors duration-150 shrink-0" style="color: var(--text-tertiary);" onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background='transparent'" aria-label="更多操作">
