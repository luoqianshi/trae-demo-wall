<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理想值</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="mobile-app">
    <div class="app-container">
        <header class="app-header">
            <span class="logo-text">理想值</span>
        </header>

        <!-- 用户状态区 -->
        <section class="user-status-section">
            <div class="user-avatar-large">
                <div class="user-avatar-inner"></div>
            </div>
            <h2 class="user-greeting">找到理想的TA</h2>
            <p class="user-subtitle">基于AI深度交互的精准交友平台</p>
            
            <div class="user-stats">
                <div class="user-stat-item">
                    <span class="stat-value">10,000+</span>
                    <span class="stat-label">用户</span>
                </div>
                <div class="stat-divider"></div>
                <div class="user-stat-item">
                    <span class="stat-value">85%</span>
                    <span class="stat-label">匹配度</span>
                </div>
                <div class="stat-divider"></div>
                <div class="user-stat-item">
                    <span class="stat-value">3,200+</span>
                    <span class="stat-label">成功配对</span>
                </div>
            </div>

            <button class="btn-start-match" onclick="navigateTo('profile.html')">
                开始匹配
            </button>
        </section>

        <!-- 功能入口 -->
        <section class="feature-entries">
            <div class="entry-item" onclick="navigateTo('avatar-center.html')">
                <div class="entry-icon-wrap ai">
                    <div class="entry-icon-inner"></div>
                </div>
                <span class="entry-name">AI分身</span>
            </div>
            <div class="entry-item" onclick="navigateTo('growth.html')">
                <div class="entry-icon-wrap growth">
                    <div class="entry-icon-inner"></div>
                </div>
                <span class="entry-name">成长中心</span>
            </div>
            <div class="entry-item" onclick="navigateTo('report.html')">
                <div class="entry-icon-wrap report">
                    <div class="entry-icon-inner"></div>
                </div>
                <span class="entry-name">分析报告</span>
            </div>
            <div class="entry-item" onclick="navigateTo('matches.html')">
                <div class="entry-icon-wrap match">
                    <div class="entry-icon-inner"></div>
                </div>
                <span class="entry-name">匹配结果</span>
            </div>
        </section>

        <!-- 快速操作区 -->
        <section class="quick-actions">
            <h3 class="section-title">快速开始</h3>
            
            <div class="action-card primary" onclick="navigateTo('profile.html')">
                <div class="action-icon">
                    <div class="action-icon-inner"></div>
                </div>
                <div class="action-content">
                    <h4 class="action-title">完善资料</h4>
                    <p class="action-desc">5分钟完成，开启匹配之旅</p>
                </div>
                <div class="action-arrow">›</div>
            </div>
            
            <div class="action-card" onclick="navigateTo('ai-chat.html')">
                <div class="action-icon">
                    <div class="action-icon-inner"></div>
                </div>
                <div class="action-content">
                    <h4 class="action-title">AI深度交流</h4>
                    <p class="action-desc">与AI对话，让TA更懂你</p>
                </div>
                <div class="action-arrow">›</div>
            </div>
            
            <div class="action-card" onclick="navigateTo('requirements.html')">
                <div class="action-icon">
                    <div class="action-icon-inner"></div>
                </div>
                <div class="action-content">
                    <h4 class="action-title">设置择偶要求</h4>
                    <p class="action-desc">明确你的理想型</p>
                </div>
                <div class="action-arrow">›</div>
            </div>
        </section>

        <!-- 匹配流程 -->
        <section class="process-section">
            <h3 class="section-title">匹配流程</h3>
            
            <div class="process-steps">
                <div class="process-step">
                    <div class="step-circle">1</div>
                    <span class="step-label">填写资料</span>
                </div>
                <div class="step-line"></div>
                <div class="process-step">
                    <div class="step-circle">2</div>
                    <span class="step-label">AI分析</span>
                </div>
                <div class="step-line"></div>
                <div class="process-step">
                    <div class="step-circle">3</div>
                    <span class="step-label">精准匹配</span>
                </div>
            </div>
        </section>

        <!-- 特色展示 -->
        <section class="features-section">
            <h3 class="section-title">平台特色</h3>
            
            <div class="feature-grid">
                <div class="feature-cell">
                    <div class="feature-cell-icon"></div>
                    <span class="feature-cell-title">AI智能匹配</span>
                </div>
                <div class="feature-cell">
                    <div class="feature-cell-icon"></div>
                    <span class="feature-cell-title">隐私保护</span>
                </div>
                <div class="feature-cell">
                    <div class="feature-cell-icon"></div>
                    <span class="feature-cell-title">真实认证</span>
                </div>
                <div class="feature-cell">
                    <div class="feature-cell-icon"></div>
                    <span class="feature-cell-title">数据分析</span>
                </div>
            </div>
        </section>

        <nav class="tab-bar">
            <button class="tab-item active" onclick="navigateTo('index.html')">
                <div class="tab-icon"></div>
                <span class="tab-text">首页</span>
            </button>
            <button class="tab-item" onclick="navigateTo('messages.html')">
                <div class="tab-icon"></div>
                <span class="tab-text">消息</span>
                <span class="tab-badge" id="msg-badge">10</span>
            </button>
            <button class="tab-item" onclick="navigateTo('my.html')">
                <div class="tab-icon"></div>
                <span class="tab-text">我的</span>
            </button>
        </nav>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
