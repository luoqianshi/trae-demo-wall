<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神秘塔罗 - AI占卜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #2a1a4a 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: #e0e0e0;
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(139, 92, 246, 0.6);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 40px 0 20px;
    }

    header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #8b5cf6, #fbbf24, #8b5cf6);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    header p {
      color: #a0a0b0;
      font-size: 1rem;
    }

    .tarot-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 500px;
      justify-content: center;
    }

    .card-deck {
      position: relative;
      width: 200px;
      height: 300px;
      cursor: pointer;
      margin-bottom: 40px;
    }

    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      transition: all 0.3s ease;
      transform-style: preserve-3d;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card-back {
      background: linear-gradient(145deg, #1e1e3e, #2a2a5a);
      border: 2px solid rgba(251, 191, 36, 0.3);
      box-shadow: 0 10px 40px rgba(139, 92, 246, 0.3);
    }

    .card-back::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border: 1px solid rgba(251, 191, 36, 0.2);
      border-radius: 8px;
    }

    .card-back .symbol {
      font-size: 3rem;
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
    }

    .card-front {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 2px solid rgba(139, 92, 246, 0.5);
      box-shadow: 0 10px 40px rgba(139, 92, 246, 0.4);
      padding: 15px;
      align-items: center;
      justify-content: center;
    }

    .card-front .card-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: #fbbf24;
      margin-bottom: 3px;
      text-align: center;
    }

    .card-front .card-name-en {
      font-size: 0.7rem;
      color: #8b5cf6;
      margin-bottom: 10px;
    }

    .card-front .card-image {
      width: 80px;
      height: 80px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #e0e0e0;
    }

    .card-front .card-reversed {
      font-size: 0.65rem;
      color: #ff6b6b;
      margin-top: 8px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .card-deck .card:nth-child(1) { transform: translate(0, 0) rotate(-2deg); z-index: 5; }
    .card-deck .card:nth-child(2) { transform: translate(5px, 5px) rotate(1deg); z-index: 4; }
    .card-deck .card:nth-child(3) { transform: translate(-5px, 8px) rotate(-1deg); z-index: 3; }
    .card-deck .card:nth-child(4) { transform: translate(3px, 12px) rotate(2deg); z-index: 2; }
    .card-deck .card:nth-child(5) { transform: translate(-3px, 15px) rotate(-1deg); z-index: 1; }

    .card-deck:hover .card:nth-child(1) { transform: translate(0, -10px) rotate(-3deg); }
    .card-deck:hover .card:nth-child(2) { transform: translate(8px, 0) rotate(2deg); }
    .card-deck:hover .card:nth-child(3) { transform: translate(-8px, 3px) rotate(-2deg); }
    .card-deck:hover .card:nth-child(4) { transform: translate(5px, 8px) rotate(3deg); }
    .card-deck:hover .card:nth-child(5) { transform: translate(-5px, 12px) rotate(-2deg); }

    .btn-divine {
      padding: 15px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #8b5cf6, #a855f7);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
    }

    .btn-divine:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.6);
    }

    .btn-divine:active {
      transform: translateY(-1px);
    }

    .btn-divine:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-section {
      display: none;
      text-align: center;
      margin-top: 30px;
      width: 100%;
    }

    .result-section.show {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      display: inline-block;
      margin-bottom: 20px;
      position: relative;
      width: 160px;
      height: 240px;
    }

    .spread-layout {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .spread-card-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .spread-card-container .position-label {
      font-size: 0.85rem;
      color: #fbbf24;
      font-weight: 500;
      text-align: center;
    }

    .interpretation {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 30px;
      max-width: 600px;
      margin: 0 auto;
      border: 1px solid rgba(139, 92, 246, 0.2);
      text-align: left;
    }

    .interpretation h3 {
      color: #fbbf24;
      margin-bottom: 20px;
      font-size: 1.3rem;
      text-align: center;
    }

    .interpretation p {
      color: #c0c0d0;
      line-height: 1.8;
      font-size: 1rem;
      margin-bottom: 15px;
    }

    .loading-spinner {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading-spinner.show {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(139, 92, 246, 0.3);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .scattered-cards {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      display: none;
    }

    .scattered-cards.show {
      display: block;
    }

    .scattered-card {
      position: absolute;
      width: 100px;
      height: 150px;
      background: linear-gradient(145deg, #1e1e3e, #2a2a5a);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 8px;
      animation: scatter 1s ease-out forwards;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fbbf24;
    }

    @keyframes scatter {
      0% { transform: translate(50vw, 50vh) rotate(0deg) scale(1); opacity: 1; }
      100% { opacity: 0; }
    }

    .keywords {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }

    .keyword {
      padding: 4px 12px;
      background: rgba(139, 92, 246, 0.2);
      border-radius: 15px;
      font-size: 0.7rem;
      color: #a855f7;
    }

    footer {
      text-align: center;
      padding: 30px 0;
      color: #606070;
      font-size: 0.85rem;
    }

    .spread-selector {
      margin-bottom: 30px;
      text-align: center;
    }

    .spread-selector h3 {
      color: #fbbf24;
      margin-bottom: 15px;
      font-size: 1.1rem;
    }

    .spread-options {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .spread-option {
      padding: 12px 25px;
      border: 2px solid rgba(139, 92, 246, 0.3);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.02);
      color: #c0c0d0;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .spread-option:hover {
      border-color: #8b5cf6;
      background: rgba(139, 92, 246, 0.1);
    }

    .spread-option.selected {
      border-color: #fbbf24;
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
    }

    .spread-description {
      margin-top: 15px;
      font-size: 0.85rem;
      color: #8a8a9a;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .card-interpretation {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(139, 92, 246, 0.2);
    }

    .card-interpretation .card-title {
      color: #fbbf24;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .card-interpretation .card-text {
      color: #c0c0d0;
      font-size: 0.9rem;
      line-height: 1.6;
    }
  </style>
</head>

    const spreadSummaries = {
      'single': (cards) => {
        const card = cards[0];
        const interpretation = aiInterpretations[card.card.name];
        return `本次占卜抽到了「${card.card.name}」${card.isReversed ? '逆位' : '正位'}。${interpretation[card.isReversed ? 'reversed' : 'upright']}`;
      },
      'past-present-future': (cards) => {
        let result = '<p><strong>🔮 三牌阵解读</strong></p>';
        result += '<p>通过过去、现在、未来三张牌，我们可以看到您人生旅程的脉络：</p>';
        
        const positionNames = ['过去', '现在', '未来'];
        cards.forEach((card, index) => {
          const interpretation = aiInterpretations[card.card.name];
          result += `
            <div class="card-interpretation">
              <div class="card-title">${positionNames[index]} —— ${card.card.name}${card.isReversed ? ' (逆位)' : ''}</div>
              <div class="card-text">${interpretation[card.isReversed ? 'reversed' : 'upright']}</div>
            </div>
          `;
        });
        
        result += '<p><strong>💡 综合指引：</strong>回顾过去的经验，把握现在的机遇，展望未来的方向。三张牌共同构成了您当前阶段的完整图景，请用心感受其中的联系。</p>';
        return result;
      },
      'celtic-cross': (cards) => {
        const positionNames = ['问题核心', '障碍', '潜意识', '过去影响', '最佳时机', '未来', '建议', '最终结果'];
        let result = '<p><strong>🔮 凯尔特十字解读</strong></p>';
        result += '<p>凯尔特十字是最全面的牌阵之一，从八个维度揭示问题的全貌：</p>';
        
        cards.forEach((card, index) => {
          const interpretation = aiInterpretations[card.card.name];
          result += `
            <div class="card-interpretation">
              <div class="card-title">${positionNames[index]} —— ${card.card.name}${card.isReversed ? ' (逆位)' : ''}</div>
              <div class="card-text">${interpretation[card.isReversed ? 'reversed' : 'upright']}</div>
            </div>
          `;
        });
        
        result += '<p><strong>💡 核心建议：</strong>综合八张牌的信息，您的问题核心已经清晰呈现。关注潜意识的声音，克服当前障碍，在最佳时机采取行动，最终将获得圆满的结果。</p>';
        return result;
      }
    };

    let currentSpread = 'single';

    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 6 + 's';
        particle.style.animationDuration = (4 + Math.random() * 4) + 's';
        container.appendChild(particle);
      }
    }

    function getRandomCards(count) {
      const shuffled = [...tarotCards].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count).map(card => ({
        card,
        isReversed: Math.random() > 0.7
      }));
    }

    function createScatteredCards() {
      const container = document.getElementById('scatteredCards');
      container.innerHTML = '';
      container.classList.add('show');
      
      for (let i = 0; i < 15; i++) {
        const card = document.createElement('div');
        card.className = 'scattered-card';
        card.style.left = Math.random() * 100 + 'vw';
        card.style.top = Math.random() * 100 + 'vh';
        card.style.animationDelay = i * 0.05 + 's';
        card.style.transform = `translate(${Math.random() * 200 - 100}px, ${Math.random() * 200 - 100}px) rotate(${Math.random() * 360}deg)`;
        card.textContent = '🔮';
        container.appendChild(card);
      }
    }

    function showResult(cards) {
      const spreadLayout = document.getElementById('spreadLayout');
      const interpretationContent = document.getElementById('interpretationContent');
      
      spreadLayout.innerHTML = '';
      
      const spread = spreads[currentSpread];
      cards.forEach((cardData, index) => {
        const { card, isReversed } = cardData;
        const cardContainer = document.createElement('div');
        cardContainer.className = 'spread-card-container';
        
        const positionLabel = document.createElement('div');
        positionLabel.className = 'position-label';
        positionLabel.textContent = spread.positions[index];
        
        const cardDiv = document.createElement('div');
        cardDiv.className = 'result-card';
        cardDiv.innerHTML = `
          <div class="card flipped">
            <div class="card-inner">
              <div class="card-back"><span class="symbol">🔮</span></div>
              <div class="card-front">
                <div class="card-name">${card.name}</div>
                <div class="card-name-en">${card.nameEn}</div>
                <div class="card-image">${card.emoji}</div>
                <div class="keywords">
                  ${card.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}
                </div>
                ${isReversed ? '<div class="card-reversed">逆位</div>' : ''}
              </div>
            </div>
          </div>
        `;
        
        cardContainer.appendChild(cardDiv);
        cardContainer.appendChild(positionLabel);
        spreadLayout.appendChild(cardContainer);
      });

      interpretationContent.innerHTML = spreadSummaries[currentSpread](cards);

      setTimeout(() => {
        document.getElementById('scatteredCards').classList.remove('show');
        document.getElementById('loadingSpinner').classList.remove('show');
        document.getElementById('resultSection').classList.add('show');
      }, 1000);
    }

    document.querySelectorAll('.spread-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.spread-option').forEach(opt => opt.classList.remove('selected'));
        option.classList.add('selected');
        currentSpread = option.dataset.spread;
        document.getElementById('spreadDescription').textContent = spreads[currentSpread].description;
      });
    });

    document.getElementById('divineBtn').addEventListener('click', async () => {
      const btn = document.getElementById('divineBtn');
      btn.disabled = true;
      btn.textContent = '占卜中...';
      
      document.getElementById('cardDeck').style.display = 'none';
      document.getElementById('spreadSelector').style.display = 'none';
      document.getElementById('loadingSpinner').classList.add('show');

      createScatteredCards();

      await new Promise(resolve => setTimeout(resolve, 2000));

      const cardCount = spreads[currentSpread].positions.length;
      const cards = getRandomCards(cardCount);
      showResult(cards);

      btn.textContent = '开始占卜';
      btn.disabled = false;
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('resultSection').classList.remove('show');
      document.getElementById('cardDeck').style.display = 'block';
      document.getElementById('spreadSelector').style.display = 'block';
    });

    createParticles();
  </script>
