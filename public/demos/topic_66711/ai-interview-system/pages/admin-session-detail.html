  <style>
    /* === Collapsible Sidebar Groups === */
    .admin-nav-group-section { margin-top: 4px; }
    .admin-nav-group-header { display: flex; align-items: center; gap: 12px; padding: 10px var(--spacing-md); border-radius: var(--radius-sm); color: rgba(255,255,255,0.7); font-size: var(--font-size-sm); font-weight: 600; cursor: pointer; transition: all var(--transition-fast); user-select: none; }
    .admin-nav-group-header:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .admin-nav-group-header .nav-icon { opacity: 0.6; }
    .nav-group-arrow { margin-left: auto; transition: transform 0.3s ease; opacity: 0.4; }
    .admin-nav-group-section.collapsed .nav-group-arrow { transform: rotate(-90deg); }
    .admin-nav-group-items { overflow: hidden; transition: max-height 0.3s ease; max-height: 500px; }
    .admin-nav-group-section.collapsed .admin-nav-group-items { max-height: 0; }
    .admin-nav-item.sub { padding-left: calc(var(--spacing-md) + 28px); font-size: calc(var(--font-size-sm) - 1px); }
    .admin-nav-item.sub .nav-icon { width: 16px; height: 16px; }
    .admin-nav-item.sub .nav-icon svg { width: 16px; height: 16px; }

    /* === Info card === */
    .info-card { background: var(--color-bg-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card); padding: var(--spacing-2xl); margin-bottom: var(--spacing-xl); }
    .info-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--spacing-lg); }
    .info-card-item { display: flex; flex-direction: column; gap: 4px; }
    .info-card-label { font-size: var(--font-size-xs); color: var(--color-text-tertiary); font-weight: var(--font-weight-medium); text-transform: uppercase; letter-spacing: 0.5px; }
    .info-card-value { font-size: var(--font-size-base); color: var(--color-text-primary); font-weight: var(--font-weight-semibold); }

    /* === Status pill === */
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); line-height: 1.6; }
    .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-pill.upcoming { background: var(--color-warning-bg); color: var(--color-warning); }
    .status-pill.upcoming::before { background: var(--color-warning); }
    .status-pill.ongoing { background: var(--color-success-bg); color: var(--color-success); }
    .status-pill.ongoing::before { background: var(--color-success); animation: pulse 1.5s ease-in-out infinite; }
    .status-pill.completed { background: var(--color-bg-light); color: var(--color-text-tertiary); }
    .status-pill.completed::before { background: var(--color-text-tertiary); }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(1.4);} }

    /* === Mini stat cards === */
    .mini-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-md); margin-bottom: var(--spacing-xl); }
    .mini-stat-card { background: var(--color-bg-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card); padding: var(--spacing-lg); text-align: center; transition: all var(--transition-normal); }
    .mini-stat-card:hover { box-shadow: var(--shadow-card-hover); transform: translateY(-2px); }
    .mini-stat-value { font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); line-height: 1; margin-bottom: var(--spacing-xs); }
    .mini-stat-value.orange { color: var(--color-warning); }
    .mini-stat-value.blue { color: var(--color-primary); }
    .mini-stat-value.green { color: var(--color-success); }
    .mini-stat-value.purple { color: var(--color-secondary); }
    .mini-stat-label { font-size: var(--font-size-sm); color: var(--color-text-secondary); }

    /* === Progress section === */
    .progress-section { background: var(--color-bg-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card); padding: var(--spacing-2xl); margin-bottom: var(--spacing-xl); }
    .progress-section-title { font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); margin-bottom: var(--spacing-lg); color: var(--color-text-primary); }
    .progress-item { display: flex; align-items: center; gap: var(--spacing-lg); margin-bottom: var(--spacing-lg); }
    .progress-item:last-child { margin-bottom: 0; }
    .progress-label { width: 80px; font-size: var(--font-size-sm); color: var(--color-text-secondary); flex-shrink: 0; }
    .progress-bar-wrap { flex: 1; }
    .progress-bar { width: 100%; height: 10px; background: var(--color-bg-light); border-radius: var(--radius-full); overflow: hidden; }
    .progress-bar-inner { height: 100%; border-radius: var(--radius-full); transition: width 1s cubic-bezier(0.25,0.46,0.45,0.94); width: 0; }
    .progress-bar-inner.blue { background: linear-gradient(90deg, #4A6CF7, #6C5CE7); }
    .progress-bar-inner.green { background: linear-gradient(90deg, #10B981, #34D399); }
    .progress-bar-inner.purple { background: linear-gradient(90deg, #8B5CF6, #A78BFA); }
    .progress-bar-inner.orange { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
    .progress-pct { width: 48px; text-align: right; font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); flex-shrink: 0; }

    /* === Student status tags === */
    .stu-status { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); }
    .stu-status.pending { background: var(--color-warning-bg); color: var(--color-warning); }
    .stu-status.interviewing { background: var(--color-success-bg); color: var(--color-success); }
    .stu-status.completed { background: var(--color-bg-light); color: var(--color-text-tertiary); }
    .stu-status.pass { background: var(--color-success-bg); color: var(--color-success); }
    .stu-status.warning { background: var(--color-warning-bg); color: var(--color-warning); }
    .stu-status.na { color: var(--color-text-tertiary); font-size: var(--font-size-xs); }

    /* === Action link === */
    .action-link { font-size: var(--font-size-sm); color: var(--color-primary); cursor: pointer; transition: color var(--transition-fast); text-decoration: none; }
    .action-link:hover { color: var(--color-primary-dark); text-decoration: underline; }
  </style>
</head>

            <div class="progress-item"><span class="progress-label">视频录制</span><div class="progress-bar-wrap"><div class="progress-bar"><div class="progress-bar-inner green" id="progVideo"></div></div></div><span class="progress-pct" id="progVideoPct">0%</span></div>
            <div class="progress-item"><span class="progress-label">AI检测</span><div class="progress-bar-wrap"><div class="progress-bar"><div class="progress-bar-inner purple" id="progDetection"></div></div></div><span class="progress-pct" id="progDetectionPct">0%</span></div>
            <div class="progress-item"><span class="progress-label">面试评分</span><div class="progress-bar-wrap"><div class="progress-bar"><div class="progress-bar-inner orange" id="progScoring"></div></div></div><span class="progress-pct" id="progScoringPct">0%</span></div>
          </div>
        </div>

        <!-- Student Table -->
        <div class="admin-table-wrapper">
          <div class="admin-table-header">
            <span class="admin-table-title">学生列表</span>
          </div>
          <div class="admin-table-scroll">
            <table class="table">
              <thead>
                <tr class="table-header">
                  <th class="table-cell">学生姓名</th>
                  <th class="table-cell">班级</th>
                  <th class="table-cell">问卷状态</th>
                  <th class="table-cell">视频状态</th>
                  <th class="table-cell">AI检测</th>
                  <th class="table-cell">分数</th>
                  <th class="table-cell">操作</th>
                </tr>
              </thead>
              <tbody id="studentTableBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    /* --- Sidebar toggle --- */
    (function() {
      var sidebar = document.getElementById('adminSidebar');
      var toggle = document.getElementById('sidebarToggle');
      if (toggle && sidebar) { toggle.addEventListener('click', function() { sidebar.classList.toggle('collapsed'); }); }
    })();

    function getInterviewId() {
      var params = new URLSearchParams(window.location.search);
      return params.get('id') || 'INT001';
    }

    function init() {
      MockData.init();
      var interviewId = getInterviewId();
      var interviews = DataStore.getAllInterviews();
      var interview = interviews.find(function(i) { return i.id === interviewId; });
      if (!interview) {
        document.getElementById('pageTitle').textContent = '场次未找到';
        document.getElementById('pageSubtitle').textContent = '未找到ID为 ' + interviewId + ' 的面试场次。';
        return;
      }

      // Set header
      document.getElementById('pageTitle').textContent = interview.title;
      document.getElementById('pageSubtitle').textContent = interview.description || '查看面试场次的详细信息和进度。';

      // Info card
      var statusMap = { upcoming: '待开始', ongoing: '进行中', completed: '已完成' };
      var modeMap = { scheduled: '安排面试', self_service: '自助测评' };
      var interviewerName = interview.interviewer ? interview.interviewer.name : '--';
      document.getElementById('infoGrid').innerHTML =
        '<div class="info-card-item"><span class="info-card-label">面试日期</span><span class="info-card-value">' + interview.date + '</span></div>' +
        '<div class="info-card-item"><span class="info-card-label">面试时间</span><span class="info-card-value">' + interview.time + '</span></div>' +
        '<div class="info-card-item"><span class="info-card-label">面试官</span><span class="info-card-value">' + interviewerName + '</span></div>' +
        '<div class="info-card-item"><span class="info-card-label">专业</span><span class="info-card-value">' + interview.major + '</span></div>' +
        '<div class="info-card-item"><span class="info-card-label">面试模式</span><span class="info-card-value">' + (modeMap[interview.mode] || interview.mode) + '</span></div>' +
        '<div class="info-card-item"><span class="info-card-label">状态</span><span class="info-card-value"><span class="status-pill ' + interview.status + '">' + statusMap[interview.status] + '</span></span></div>';

      // Students and stats
      var students = InterviewState.getInterviewStudents(interviewId);
      var pending = 0, interviewing = 0, completed = 0, needScoring = 0;
      students.forEach(function(s) {
        var st = InterviewState.getStudentStatus(s.id, interviewId);
        var status = st.status || 'pending';
        if (status === 'pending') pending++;
        else if (status === 'interviewing') { interviewing++; }
        else if (status === 'completed') {
          completed++;
          var score = InterviewState.getScore(s.id, interviewId);
          if (!score) needScoring++;
        }
      });
      needScoring += (interviewing);

      document.getElementById('miniStats').innerHTML =
        '<div class="mini-stat-card"><div class="mini-stat-value orange">' + pending + '</div><div class="mini-stat-label">待面试</div></div>' +
        '<div class="mini-stat-card"><div class="mini-stat-value blue">' + interviewing + '</div><div class="mini-stat-label">面试中</div></div>' +
        '<div class="mini-stat-card"><div class="mini-stat-value green">' + completed + '</div><div class="mini-stat-label">已完成</div></div>' +
        '<div class="mini-stat-card"><div class="mini-stat-value purple">' + needScoring + '</div><div class="mini-stat-label">待评分</div></div>';

      // Progress bars
      var progress = InterviewState.getInterviewProgress(interviewId);
      setTimeout(function() {
        document.getElementById('progQuestionnaire').style.width = progress.questionnaire + '%';
        document.getElementById('progQuestionnairePct').textContent = progress.questionnaire + '%';
        document.getElementById('progVideo').style.width = progress.video + '%';
        document.getElementById('progVideoPct').textContent = progress.video + '%';
        document.getElementById('progDetection').style.width = progress.detection + '%';
        document.getElementById('progDetectionPct').textContent = progress.detection + '%';
        document.getElementById('progScoring').style.width = progress.scoring + '%';
        document.getElementById('progScoringPct').textContent = progress.scoring + '%';
      }, 100);

      // Student table
      var tbody = document.getElementById('studentTableBody');
      var html = '';
      students.forEach(function(s) {
        var st = InterviewState.getStudentStatus(s.id, interviewId);
        var status = st.status || 'pending';
        var aiResult = InterviewState.getAIResult(s.id, interviewId);
        var score = InterviewState.getScore(s.id, interviewId);

        var statusLabel = { pending: '待面试', interviewing: '面试中', completed: '已完成' };
        var questionnaireStatus = (status === 'interviewing' || status === 'completed') ? '<span class="stu-status completed">已完成</span>' : '<span class="stu-status pending">未开始</span>';
        var videoStatus = status === 'completed' ? '<span class="stu-status completed">已提交</span>' : status === 'interviewing' ? '<span class="stu-status interviewing">录制中</span>' : '<span class="stu-status pending">未开始</span>';
        var aiStatus = aiResult ? '<span class="stu-status ' + aiResult.status + '">' + (aiResult.status === 'pass' ? '通过' : '异常') + '</span>' : '<span class="stu-status na">未检测</span>';
        var scoreText = score ? score.total + ' 分' : '--';

        var actionHtml = '';
        if (status === 'completed' && !score) {
          actionHtml = '<a class="action-link" href="admin-scoring.html?studentId=' + s.id + '&interviewId=' + interviewId + '">评分</a>';
        } else if (score) {
          actionHtml = '<a class="action-link" href="admin-scoring.html?studentId=' + s.id + '&interviewId=' + interviewId + '">查看</a>';
        } else {
          actionHtml = '<span style="color:var(--color-text-tertiary);font-size:var(--font-size-sm);">--</span>';
        }

        html += '<tr class="table-row">' +
          '<td class="table-cell" style="font-weight:600;">' + s.name + '</td>' +
          '<td class="table-cell">' + s.className + '</td>' +
          '<td class="table-cell">' + questionnaireStatus + '</td>' +
          '<td class="table-cell">' + videoStatus + '</td>' +
          '<td class="table-cell">' + aiStatus + '</td>' +
          '<td class="table-cell" style="font-weight:600;">' + scoreText + '</td>' +
          '<td class="table-cell">' + actionHtml + '</td>' +
        '</tr>';
      });

      if (students.length === 0) {
        html = '<tr><td class="table-cell" colspan="7" style="text-align:center;padding:40px 0;color:var(--color-text-tertiary);">该场次暂无学生</td></tr>';
      }
      tbody.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
