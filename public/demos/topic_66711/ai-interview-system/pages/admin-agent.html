<head>
  <meta charset="UTF-8">

  <style>
    /* === Collapsible Sidebar Groups === */
    .admin-nav-group-section { margin-top: 4px; }
    .admin-nav-group-header { display: flex; align-items: center; gap: 12px; padding: 10px var(--spacing-md); border-radius: var(--radius-sm); color: rgba(255,255,255,0.7); font-size: var(--font-size-sm); font-weight: 600; cursor: pointer; transition: all var(--transition-fast); user-select: none; }
    .admin-nav-group-header:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .admin-nav-group-header .nav-icon { opacity: 0.6; }
    .nav-group-arrow { margin-left: auto; transition: transform 0.3s ease; opacity: 0.4; }
    .admin-nav-group-section.collapsed .nav-group-arrow { transform: rotate(-90deg); }
    .admin-nav-group-items { overflow: hidden; transition: max-height 0.3s ease; max-height: 500px; }
    .admin-nav-group-section.collapsed .admin-nav-group-items { max-height: 0; }
    .admin-nav-item.sub { padding-left: calc(var(--spacing-md) + 28px); font-size: calc(var(--font-size-sm) - 1px); }
    .admin-nav-item.sub .nav-icon { width: 16px; height: 16px; }
    .admin-nav-item.sub .nav-icon svg { width: 16px; height: 16px; }

    /* === Agent Groups === */
    .agent-group {
      background: var(--color-bg-card); border-radius: var(--radius-md);
      box-shadow: var(--shadow-card); margin-bottom: var(--spacing-lg); overflow: hidden;
    }
    .agent-group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--spacing-lg) var(--spacing-xl); border-bottom: 1px solid var(--color-border-light);
      cursor: pointer; user-select: none; transition: background var(--transition-fast);
    }
    .agent-group-header:hover { background: var(--color-bg-light); }
    .agent-group-left { display: flex; align-items: center; gap: 12px; }
    .agent-group-icon {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .agent-group-icon svg { width: 20px; height: 20px; }
    .agent-group-icon.blue { background: rgba(74,108,247,0.1); color: #4A6CF7; }
    .agent-group-icon.green { background: rgba(34,197,94,0.1); color: #22C55E; }
    .agent-group-icon.purple { background: rgba(139,92,246,0.1); color: #8B5CF6; }
    .agent-group-name { font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); }
    .agent-group-count { font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-top: 2px; }
    .agent-group-arrow { color: var(--color-text-tertiary); transition: transform 0.3s ease; }
    .agent-group.collapsed .agent-group-arrow { transform: rotate(-90deg); }
    .agent-group-body { padding: var(--spacing-lg); transition: max-height 0.3s ease; overflow: hidden; }
    .agent-group.collapsed .agent-group-body { max-height: 0; padding: 0 var(--spacing-lg); }

    /* === Agent Card === */
    .agent-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: var(--spacing-md); }
    .agent-card {
      background: var(--color-bg-light); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); padding: var(--spacing-lg);
      transition: all var(--transition-fast);
    }
    .agent-card:hover { border-color: var(--color-primary); box-shadow: var(--shadow-sm); }
    .agent-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: var(--spacing-sm); }
    .agent-card-name { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); }
    .agent-card-desc { font-size: var(--font-size-xs); color: var(--color-text-tertiary); line-height: var(--line-height-relaxed); margin-bottom: var(--spacing-md); }
    .agent-card-meta { display: flex; align-items: center; gap: var(--spacing-lg); font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-bottom: var(--spacing-md); }
    .agent-card-meta-item { display: flex; align-items: center; gap: 4px; }
    .agent-card-actions { display: flex; align-items: center; gap: var(--spacing-sm); }

    /* Status badge */
    .agent-status {
      display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px;
      border-radius: var(--radius-full); font-size: var(--font-size-xs); font-weight: var(--font-weight-medium);
    }
    .agent-status.running { background: var(--color-success-bg); color: var(--color-success); }
    .agent-status.stopped { background: var(--color-bg-card); color: var(--color-text-tertiary); }
    .agent-status.error { background: var(--color-danger-bg); color: var(--color-danger); }
    .agent-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .agent-status-dot.running { background: var(--color-success); box-shadow: 0 0 4px rgba(34,197,94,0.4); }
    .agent-status-dot.stopped { background: var(--color-text-tertiary); }
    .agent-status-dot.error { background: var(--color-danger); }

    /* Toggle switch */
    .toggle-switch {
      position: relative; width: 40px; height: 22px; border-radius: 11px;
      background: var(--color-border); cursor: pointer; transition: background var(--transition-fast);
      flex-shrink: 0;
    }
    .toggle-switch.on { background: var(--color-success); }
    .toggle-switch::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; border-radius: 50%; background: white;
      box-shadow: var(--shadow-xs); transition: transform var(--transition-fast);
    }
    .toggle-switch.on::after { transform: translateX(18px); }
    .toggle-switch.loading {
      opacity: 0.6;
      pointer-events: none;
    }
    .toggle-switch.loading::after {
      animation: togglePulse 0.6s ease-in-out infinite;
    }
    @keyframes togglePulse {
      0%, 100% { transform: translateX(18px) scale(1); }
      50% { transform: translateX(9px) scale(0.8); }
    }

    /* === Modal form === */
    .modal-body .form-group { margin-bottom: var(--spacing-md); }
    .modal-body .form-group label {
      display: block; font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
      color: var(--color-text-primary); margin-bottom: 6px;
    }
    .modal-body .form-group input,
    .modal-body .form-group select,
    .modal-body .form-group textarea {
      width: 100%; padding: 8px 12px; font-size: var(--font-size-sm);
      border: 1px solid var(--color-border); border-radius: 6px;
      background: var(--color-bg-card); color: var(--color-text-primary);
      transition: border-color var(--transition-fast);
    }
    .modal-body .form-group textarea { min-height: 60px; resize: vertical; }
    .modal-body .form-group input:focus,
    .modal-body .form-group select:focus,
    .modal-body .form-group textarea:focus {
      border-color: var(--color-border-focus); outline: none;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    .modal-body { max-height: 65vh; overflow-y: auto; }
  </style>

          { id: 3, name: '综合分析智能体', desc: '汇总各维度评分，生成综合评价报告和排名建议。', status: 'running', runCount: 843, lastRun: '2026-06-28 10:50', config: { model: 'GPT-4o', dimensions: 5, reportFormat: '详细' } },
          { id: 4, name: '问卷分析智能体', desc: '自动分析问卷填写数据，提取关键信息和统计指标。', status: 'stopped', runCount: 312, lastRun: '2026-06-27 16:00', config: { model: 'GPT-3.5-turbo', autoAnalyze: true, threshold: 0.7 } },
          { id: 5, name: '异常检测智能体', desc: '监控面试过程，自动检测作弊、代考等异常行为。', status: 'running', runCount: 2100, lastRun: '2026-06-28 11:35', config: { sensitivity: 0.85, alertThreshold: 0.7, realTime: true } }
        ]
      },
      {
        id: 'video', name: '视频录制组', iconClass: 'green',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>',
        agents: [
          { id: 6, name: '视频录制智能体', desc: '管理面试视频录制流程，确保视频质量和完整性。', status: 'running', runCount: 1560, lastRun: '2026-06-28 11:20', config: { resolution: '1080p', maxDuration: 1800, storagePath: '/data/videos' } },
          { id: 7, name: '视频质检智能体', desc: '对录制的视频进行质量检测，识别模糊、黑屏等异常。', status: 'running', runCount: 1548, lastRun: '2026-06-28 11:22', config: { qualityThreshold: 0.9, checkInterval: 10, autoRetry: true } },
          { id: 8, name: '纹身检测智能体', desc: '通过视觉识别技术检测考生是否有纹身等违规标记。', status: 'running', runCount: 1560, lastRun: '2026-06-28 11:21', config: { confidence: 0.95, regions: ['手臂','颈部'], model: 'YOLO-v8' } },
          { id: 9, name: '活体检测智能体', desc: '验证考生身份真实性，防止照片、视频等替考手段。', status: 'error', runCount: 1555, lastRun: '2026-06-28 11:18', config: { challengeType: '动作+摇头', timeout: 30, livenessThreshold: 0.92 } },
          { id: 10, name: '视频摘要智能体', desc: '自动生成面试视频的关键帧摘要和时长统计。', status: 'stopped', runCount: 420, lastRun: '2026-06-26 14:30', config: { keyFrameInterval: 5, summaryLength: 30, format: '图文' } }
        ]
      },
      {
        id: 'realtime', name: '实时面试组', iconClass: 'purple',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
        agents: [
          { id: 11, name: '实时对话智能体', desc: '支持面试官与AI智能体的实时对话和问答辅助。', status: 'running', runCount: 890, lastRun: '2026-06-28 11:00', config: { mode: '辅助模式', contextWindow: 8000, temperature: 0.7 } },
          { id: 12, name: '实时翻译智能体', desc: '提供面试过程中的多语言实时翻译服务。', status: 'stopped', runCount: 65, lastRun: '2026-06-25 09:00', config: { sourceLang: 'auto', targetLang: 'zh-CN', latency: 500 } },
          { id: 13, name: '完整性校验智能体', desc: '实时校验面试数据的完整性和一致性。', status: 'running', runCount: 2100, lastRun: '2026-06-28 11:35', config: { checkInterval: 5, failAction: '告警', autoFix: false } },
          { id: 14, name: '表情分析智能体', desc: '分析考生面试过程中的表情和情绪变化。', status: 'stopped', runCount: 230, lastRun: '2026-06-24 15:00', config: { emotions: ['微笑','紧张','困惑'], fps: 15, reportInterval: 30 } }
        ]
      }
    ];

    /* --- Render --- */
    function renderGroups() {
      var container = document.getElementById('agentGroupsContainer');
      var html = '';
      agentGroups.forEach(function(group) {
        html += '<div class="agent-group" id="group-' + group.id + '">';
        html += '<div class="agent-group-header" onclick="document.getElementById(\'group-' + group.id + '\').classList.toggle(\'collapsed\')">';
        html += '<div class="agent-group-left">';
        html += '<div class="agent-group-icon ' + group.iconClass + '">' + group.icon + '</div>';
        html += '<div><div class="agent-group-name">' + group.name + '</div>';
        html += '<div class="agent-group-count">' + group.agents.length + ' 个智能体</div></div></div>';
        html += '<svg class="agent-group-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
        html += '</div>';
        html += '<div class="agent-group-body"><div class="agent-card-grid">';
        group.agents.forEach(function(agent) {
          var statusClass = agent.status === 'running' ? 'running' : (agent.status === 'error' ? 'error' : 'stopped');
          var statusText = agent.status === 'running' ? '运行中' : (agent.status === 'error' ? '异常' : '已停止');
          var toggleOn = agent.status === 'running' ? ' on' : '';
          html += '<div class="agent-card">';
          html += '<div class="agent-card-top">';
          html += '<div><div class="agent-card-name">' + agent.name + '</div>';
          html += '<div class="agent-status ' + statusClass + '"><span class="agent-status-dot ' + statusClass + '"></span>' + statusText + '</div></div>';
          html += '<div class="toggle-switch' + toggleOn + '" onclick="toggleAgent(event,' + agent.id + ')"></div>';
          html += '</div>';
          html += '<div class="agent-card-desc">' + agent.desc + '</div>';
          html += '<div class="agent-card-meta">';
          html += '<div class="agent-card-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>' + agent.runCount + ' 次运行</div>';
          html += '<div class="agent-card-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + agent.lastRun + '</div>';
          html += '</div>';
          html += '<div class="agent-card-actions">';
          html += '<button class="btn btn-secondary btn-sm" onclick="openConfigModal(' + agent.id + ')">配置</button>';
          html += '<button class="btn btn-secondary btn-sm" onclick="restartAgent(' + agent.id + ')">重启</button>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div></div></div>';
      });
      container.innerHTML = html;
    }

    /* --- Find agent by id --- */
    function findAgent(id) {
      for (var i = 0; i < agentGroups.length; i++) {
        for (var j = 0; j < agentGroups[i].agents.length; j++) {
          if (agentGroups[i].agents[j].id === id) return agentGroups[i].agents[j];
        }
      }
      return null;
    }

    /* --- Toggle agent status --- */
    function toggleAgent(e, id) {
      e.stopPropagation();
      var agent = findAgent(id);
      if (!agent) return;

      // Find the toggle switch element and add loading class
      var toggleEl = e.currentTarget || e.target;
      toggleEl.classList.add('loading');

      // Simulate 1-2 second delay for start/stop process
      var delay = 1000 + Math.random() * 1000;

      setTimeout(function() {
        toggleEl.classList.remove('loading');

        if (agent.status === 'running') {
          // Stop the agent
          agent.status = 'stopped';
          agent.lastRun = '刚刚';
          renderGroups();
          Toast.info('Agent ' + agent.name + ' 已停止');
        } else {
          // Start the agent
          agent.status = 'running';
          agent.runCount += 1;
          var now = new Date();
          agent.lastRun = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
          renderGroups();
          Toast.success('Agent ' + agent.name + ' 已启动');
        }
      }, delay);
    }

    /* --- Restart agent --- */
    function restartAgent(id) {
      var agent = findAgent(id);
      if (!agent) return;
      Modal.confirm('确定要重启 "' + agent.name + '" 吗？重启期间该智能体将暂停服务。', function() {
        agent.status = 'running';
        agent.runCount += 1;
        var now = new Date();
        agent.lastRun = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        renderGroups();
        Toast.success(agent.name + ' 重启成功');
      });
    }

    /* --- Config modal --- */
    function openConfigModal(id) {
      var agent = findAgent(id);
      if (!agent) return;
      var configHtml = '';
      var config = agent.config;
      for (var key in config) {
        var val = config[key];
        var label = key;
        /* prettify common keys */
        var labels = {
          model: 'AI模型', difficulty: '出题难度', maxQuestions: '最大题数',
          rubric: '评分标准', autoScore: '自动评分', dimensions: '评价维度', reportFormat: '报告格式',
          autoAnalyze: '自动分析', threshold: '分析阈值', sensitivity: '灵敏度', alertThreshold: '告警阈值', realTime: '实时监控',
          resolution: '视频分辨率', maxDuration: '最大时长(秒)', storagePath: '存储路径',
          qualityThreshold: '质量阈值', checkInterval: '检测间隔(秒)', autoRetry: '自动重试',
          confidence: '置信度', regions: '检测区域', livenessThreshold: '活体阈值', challengeType: '验证方式', timeout: '超时(秒)',
          keyFrameInterval: '关键帧间隔(秒)', summaryLength: '摘要长度(秒)', format: '摘要格式',
          mode: '对话模式', contextWindow: '上下文窗口', temperature: '温度参数',
          sourceLang: '源语言', targetLang: '目标语言', latency: '延迟(ms)',
          failAction: '失败动作', autoFix: '自动修复',
          emotions: '检测情绪', fps: '帧率(fps)', reportInterval: '报告间隔(秒)'
        };
        label = labels[key] || key;
        if (typeof val === 'boolean') {
          configHtml += '<div class="form-group"><label>' + label + '</label><select id="cfg_' + key + '"><option value="true"' + (val ? ' selected' : '') + '>开启</option><option value="false"' + (!val ? ' selected' : '') + '>关闭</option></select></div>';
        } else if (typeof val === 'number') {
          configHtml += '<div class="form-group"><label>' + label + '</label><input type="number" id="cfg_' + key + '" value="' + val + '"></div>';
        } else if (Array.isArray(val)) {
          configHtml += '<div class="form-group"><label>' + label + '</label><input type="text" id="cfg_' + key + '" value="' + val.join(', ') + '"></div>';
        } else {
          configHtml += '<div class="form-group"><label>' + label + '</label><input type="text" id="cfg_' + key + '" value="' + val + '"></div>';
        }
      }
      Modal.show({
        title: '配置 — ' + agent.name,
        content: configHtml,
        confirmText: '保存',
        cancelText: '取消',
        onConfirm: function() {
          var newConfig = {};
          for (var key in config) {
            var el = document.getElementById('cfg_' + key);
            if (!el) continue;
            var v = el.value;
            if (typeof config[key] === 'boolean') {
              newConfig[key] = v === 'true';
            } else if (typeof config[key] === 'number') {
              newConfig[key] = parseFloat(v) || 0;
            } else if (Array.isArray(config[key])) {
              newConfig[key] = v.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
            } else {
              newConfig[key] = v;
            }
          }
          agent.config = newConfig;
          Toast.success(agent.name + ' 配置已更新');
        }
      });
    }

    /* --- Init --- */
    renderGroups();
  </script>
</body>
</html>
