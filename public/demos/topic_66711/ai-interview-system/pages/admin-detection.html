<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI智能面试系统 - AI检测</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    /* === Collapsible Sidebar Groups === */
    .admin-nav-group-section { margin-top: 4px; }
    .admin-nav-group-header { display: flex; align-items: center; gap: 12px; padding: 10px var(--spacing-md); border-radius: var(--radius-sm); color: rgba(255,255,255,0.7); font-size: var(--font-size-sm); font-weight: 600; cursor: pointer; transition: all var(--transition-fast); user-select: none; }
    .admin-nav-group-header:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .admin-nav-group-header .nav-icon { opacity: 0.6; }
    .nav-group-arrow { margin-left: auto; transition: transform 0.3s ease; opacity: 0.4; }
    .admin-nav-group-section.collapsed .nav-group-arrow { transform: rotate(-90deg); }
    .admin-nav-group-items { overflow: hidden; transition: max-height 0.3s ease; max-height: 500px; }
    .admin-nav-group-section.collapsed .admin-nav-group-items { max-height: 0; }
    .admin-nav-item.sub { padding-left: calc(var(--spacing-md) + 28px); font-size: calc(var(--font-size-sm) - 1px); }
    .admin-nav-item.sub .nav-icon { width: 16px; height: 16px; }
    .admin-nav-item.sub .nav-icon svg { width: 16px; height: 16px; }

    /* === Stat card animation === */
    .admin-stat-card { opacity: 0; transform: translateY(16px); animation: statCardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .admin-stat-card:nth-child(1) { animation-delay: 0.05s; }
    .admin-stat-card:nth-child(2) { animation-delay: 0.1s; }
    .admin-stat-card:nth-child(3) { animation-delay: 0.15s; }
    .admin-stat-card:nth-child(4) { animation-delay: 0.2s; }
    @keyframes statCardIn { to { opacity: 1; transform: translateY(0); } }

    /* === Detection Table === */
    .det-table-wrap {
      background: var(--color-bg-card); border-radius: var(--radius-md);
      box-shadow: var(--shadow-card); overflow: hidden;
    }
    .det-table { width: 100%; border-collapse: collapse; font-size: var(--font-size-sm); }
    .det-table thead th {
      padding: 14px 16px; text-align: left; font-weight: var(--font-weight-semibold);
      color: var(--color-text-secondary); background: var(--color-bg-light);
      border-bottom: 1px solid var(--color-border-light); white-space: nowrap;
    }
    .det-table tbody td {
      padding: 12px 16px; border-bottom: 1px solid var(--color-border-light);
      color: var(--color-text-primary); vertical-align: middle;
    }
    .det-table tbody tr:hover { background: var(--color-bg-light); }
    .det-table tbody tr:last-child td { border-bottom: none; }

    /* Detection item icons */
    .det-items { display: flex; gap: 6px; flex-wrap: wrap; }
    .det-item-tag {
      display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px;
      border-radius: var(--radius-sm); font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
    }
    .det-item-tag.pass { background: var(--color-success-bg); color: var(--color-success); }
    .det-item-tag.fail { background: var(--color-danger-bg); color: var(--color-danger); }
    .det-item-tag.pending { background: var(--color-warning-bg); color: var(--color-warning); }
    .det-item-tag svg { width: 12px; height: 12px; }

    /* Overall result badge */
    .det-result-badge {
      display: inline-flex; padding: 3px 12px; border-radius: var(--radius-full);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold);
    }
    .det-result-badge.pass { background: var(--color-success-bg); color: var(--color-success); }
    .det-result-badge.fail { background: var(--color-danger-bg); color: var(--color-danger); }
    .det-result-badge.checking { background: var(--color-warning-bg); color: var(--color-warning); }

    /* Confidence bar */
    .conf-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .conf-bar { flex: 1; height: 8px; border-radius: 4px; background: var(--color-bg-light); overflow: hidden; }
    .conf-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .conf-bar-fill.high { background: var(--color-success); }
    .conf-bar-fill.mid { background: var(--color-warning); }
    .conf-bar-fill.low { background: var(--color-danger); }
    .conf-value { font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); color: var(--color-text-secondary); min-width: 40px; text-align: right; }

    /* Detail modal extra styles */
    .detail-modal .det-detail-section { margin-bottom: var(--spacing-lg); }
    .detail-modal .det-detail-section:last-child { margin-bottom: 0; }
    .detail-modal .det-detail-title {
      font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary); margin-bottom: var(--spacing-sm);
      padding-bottom: 6px; border-bottom: 1px solid var(--color-border-light);
    }
    .detail-modal .det-detail-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid var(--color-border-light);
    }
    .detail-modal .det-detail-row:last-child { border-bottom: none; }
    .detail-modal .det-detail-label { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .detail-modal .det-detail-value { font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-text-primary); }
    .detail-modal .det-thumb-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .detail-modal .det-thumb {
      width: 100%; aspect-ratio: 16/9; border-radius: 8px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      position: relative; overflow: hidden;
    }
    .detail-modal .det-thumb .frame-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.3);
    }
    .detail-modal .det-thumb .frame-label {
      position: absolute; bottom: 4px; right: 6px;
      font-size: 10px; color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.5); padding: 1px 6px; border-radius: 4px;
    }
  </style>

            </thead>
            <tbody id="detTableBody"></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    /* --- Sidebar toggle --- */
    (function() {
      var sidebar = document.getElementById('adminSidebar');
      var toggle = document.getElementById('sidebarToggle');
      if (toggle && sidebar) toggle.addEventListener('click', function() { sidebar.classList.toggle('collapsed'); });
    })();

    /* --- Mock Data --- */
    var detections = [
      { id: 1, student: '张明', interview: '2026秋季-汽车维修-第1场', time: '2026-06-28 09:15',
        items: [
          { name: '纹身检测', pass: true, confidence: 98 },
          { name: '活体验证', pass: true, confidence: 99 },
          { name: '视频质检', pass: true, confidence: 96 },
          { name: '完整性校验', pass: true, confidence: 100 }
        ], result: 'pass' },
      { id: 2, student: '李婷', interview: '2026秋季-烹饪工艺-第2场', time: '2026-06-28 09:32',
        items: [
          { name: '纹身检测', pass: true, confidence: 97 },
          { name: '活体验证', pass: true, confidence: 98 },
          { name: '视频质检', pass: true, confidence: 94 },
          { name: '完整性校验', pass: true, confidence: 100 }
        ], result: 'pass' },
      { id: 3, student: '王浩', interview: '2026秋季-数控技术-第1场', time: '2026-06-28 10:05',
        items: [
          { name: '纹身检测', pass: false, confidence: 72 },
          { name: '活体验证', pass: true, confidence: 99 },
          { name: '视频质检', pass: true, confidence: 91 },
          { name: '完整性校验', pass: true, confidence: 100 }
        ], result: 'fail' },
      { id: 4, student: '赵丽', interview: '2026秋季-电子商务-第1场', time: '2026-06-28 10:18',
        items: [
          { name: '纹身检测', pass: true, confidence: 99 },
          { name: '活体验证', pass: true, confidence: 100 },
          { name: '视频质检', pass: false, confidence: 68 },
          { name: '完整性校验', pass: true, confidence: 100 }
        ], result: 'fail' },
      { id: 5, student: '刘强', interview: '2026秋季-护理学-第1场', time: '2026-06-28 10:45',
        items: [
          { name: '纹身检测', pass: true, confidence: 98 },
          { name: '活体验证', pass: true, confidence: 97 },
          { name: '视频质检', pass: true, confidence: 95 },
          { name: '完整性校验', pass: true, confidence: 100 }
        ], result: 'pass' },
      { id: 6, student: '陈静', interview: '2026秋季-汽车维修-第2场', time: '2026-06-28 11:02',
        items: [
          { name: '纹身检测', pass: true, confidence: 96 },
          { name: '活体验证', pass: false, confidence: 45 },
          { name: '视频质检', pass: true, confidence: 88 },
          { name: '完整性校验', pass: true, confidence: 100 }
        ], result: 'checking' }
    ];

    var passIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg>';
    var failIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    var pendingIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

    function renderTable() {
      var tbody = document.getElementById('detTableBody');
      var html = '';
      detections.forEach(function(d) {
        var itemsHtml = '';
        d.items.forEach(function(item) {
          var cls = item.pass ? 'pass' : 'fail';
          var icon = item.pass ? passIcon : failIcon;
          itemsHtml += '<span class="det-item-tag ' + cls + '">' + icon + item.name + '</span>';
        });
        var resultClass = d.result === 'pass' ? 'pass' : (d.result === 'fail' ? 'fail' : 'checking');
        var resultText = d.result === 'pass' ? '全部通过' : (d.result === 'fail' ? '异常' : '检测中');
        html += '<tr>' +
          '<td style="font-weight:var(--font-weight-medium);">' + d.student + '</td>' +
          '<td style="color:var(--color-text-secondary);font-size:var(--font-size-xs);">' + d.interview + '</td>' +
          '<td style="color:var(--color-text-tertiary);font-size:var(--font-size-xs);">' + d.time + '</td>' +
          '<td><div class="det-items">' + itemsHtml + '</div></td>' +
          '<td><span class="det-result-badge ' + resultClass + '">' + resultText + '</span></td>' +
          '<td><button class="btn btn-secondary btn-sm" onclick="showDetail(' + d.id + ')">查看详情</button></td>' +
        '</tr>';
      });
      tbody.innerHTML = html;
    }

    function showDetail(id) {
      var d = detections.find(function(x) { return x.id === id; });
      if (!d) return;
      var resultText = d.result === 'pass' ? '全部通过' : (d.result === 'fail' ? '检测异常' : '检测进行中');
      var resultClass = d.result === 'pass' ? 'pass' : (d.result === 'fail' ? 'fail' : 'checking');

      var contentHtml = '<div class="detail-modal">';
      /* Basic info */
      contentHtml += '<div class="det-detail-section"><div class="det-detail-title">基本信息</div>';
      contentHtml += '<div class="det-detail-row"><span class="det-detail-label">学生姓名</span><span class="det-detail-value">' + d.student + '</span></div>';
      contentHtml += '<div class="det-detail-row"><span class="det-detail-label">面试场次</span><span class="det-detail-value">' + d.interview + '</span></div>';
      contentHtml += '<div class="det-detail-row"><span class="det-detail-label">检测时间</span><span class="det-detail-value">' + d.time + '</span></div>';
      contentHtml += '<div class="det-detail-row"><span class="det-detail-label">检测结果</span><span class="det-detail-value"><span class="det-result-badge ' + resultClass + '">' + resultText + '</span></span></div>';
      contentHtml += '</div>';

      /* Detection items with confidence */
      contentHtml += '<div class="det-detail-section"><div class="det-detail-title">检测详情</div>';
      d.items.forEach(function(item) {
        var cls = item.confidence >= 90 ? 'high' : (item.confidence >= 70 ? 'mid' : 'low');
        var icon = item.pass ? passIcon : failIcon;
        contentHtml += '<div class="det-detail-row" style="flex-direction:column;align-items:stretch;gap:6px;">';
        contentHtml += '<div style="display:flex;align-items:center;justify-content:space-between;"><span class="det-detail-label">' + icon + ' ' + item.name + '</span><span class="det-detail-value">' + (item.pass ? '通过' : '未通过') + '</span></div>';
        contentHtml += '<div class="conf-bar-wrap"><div class="conf-bar"><div class="conf-bar-fill ' + cls + '" style="width:' + item.confidence + '%;"></div></div><span class="conf-value">' + item.confidence + '%</span></div>';
        contentHtml += '</div>';
      });
      contentHtml += '</div>';

      /* Placeholder thumbnails */
      contentHtml += '<div class="det-detail-section"><div class="det-detail-title">视频截图</div>';
      contentHtml += '<div class="det-thumb-grid">';
      var thumbTimes = ['00:03', '01:15', '02:48', '04:22'];
      for (var i = 0; i < 4; i++) {
        contentHtml += '<div class="det-thumb">' +
          '<div class="frame-overlay">' +
            '<svg viewBox="0 0 24 24" fill="white" width="20" height="20"><polygon points="5 3 19 12 5 21 5 3"/></svg>' +
          '</div>' +
          '<span class="frame-label">' + thumbTimes[i] + '</span>' +
        '</div>';
      }
      contentHtml += '</div></div>';
      contentHtml += '</div>';

      Modal.show({
        title: '检测详情 — ' + d.student,
        content: contentHtml,
        confirmText: '关闭',
        cancelText: false
      });
    }

    /* --- Init --- */
    renderTable();
  </script>
</body>
</html>
