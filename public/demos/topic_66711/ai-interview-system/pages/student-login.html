<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI智能面试系统 - 登录</title>

  <!-- ========================================
       CSS — Base Reset & Variables
       ======================================== -->
  <style>
    /* ---------- Reset ---------- */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
      font-weight: 400;
      line-height: 1.5;
      color: #1E293B;
      overflow-x: hidden;
      background: #F0F2F8;
    }

    /* ---------- Animated Gradient Mesh Background ---------- */
    .login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #F0F2F8 0%, #E8ECF4 100%);
      overflow: hidden;
    }

    .login-bg::before,
    .login-bg::after,
    .login-bg .gradient-orb-3 {
      content: '';
      position: absolute;
      border-radius: 50%;
    }

    /* Orb 1 — top-left blue */
    .login-bg::before {
      width: 600px;
      height: 600px;
      top: -10%;
      left: -5%;
      background: radial-gradient(circle, rgba(74,108,247,0.3), transparent 50%);
      animation: orbFloat1 20s ease-in-out infinite;
    }

    /* Orb 2 — bottom-right purple */
    .login-bg::after {
      width: 700px;
      height: 700px;
      bottom: -15%;
      right: -10%;
      background: radial-gradient(circle, rgba(108,92,231,0.3), transparent 50%);
      animation: orbFloat2 20s ease-in-out infinite;
    }

    /* Orb 3 — center indigo (extra element) */
    .gradient-orb-3 {
      width: 500px;
      height: 500px;
      top: 30%;
      left: 30%;
      background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 60%);
      animation: orbFloat3 20s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25%      { transform: translate(40px, 30px) scale(1.05); }
      50%      { transform: translate(20px, 60px) scale(0.95); }
      75%      { transform: translate(-20px, 20px) scale(1.03); }
    }

    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25%      { transform: translate(-30px, -40px) scale(1.08); }
      50%      { transform: translate(-50px, -20px) scale(0.96); }
      75%      { transform: translate(20px, -50px) scale(1.02); }
    }

    @keyframes orbFloat3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(50px, -30px) scale(1.1); }
      66%      { transform: translate(-30px, 40px) scale(0.9); }
    }

    /* ---------- Page Container ---------- */
    .login-page {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    /* ---------- Center Card (Glassmorphism) ---------- */
    .login-card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
      padding: 40px 32px 36px;
      /* Page-load entrance animation */
      opacity: 0;
      transform: translateY(20px);
      animation: cardEnter 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.15s forwards;
    }

    @keyframes cardEnter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ---------- Logo Area ---------- */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 14px;
    }

    .logo-title {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    .logo-subtitle {
      font-size: 14px;
      color: #94A3B8;
      margin-top: 4px;
    }

    /* ---------- Mode Toggle ---------- */
    .mode-toggle {
      display: flex;
      background: #F1F5F9;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .mode-tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 600;
      color: #94A3B8;
      border-radius: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .mode-tab:active {
      transform: scale(0.97);
    }

    .mode-tab.active {
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      color: #fff;
      box-shadow: 0 4px 12px rgba(74,108,247,0.3);
    }

    /* ---------- Form Fields ---------- */
    .form-group {
      margin-bottom: 16px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #64748B;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: #94A3B8;
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .form-input,
    .form-select {
      width: 100%;
      height: 52px;
      padding-left: 44px;
      padding-right: 14px;
      font-size: 16px;
      font-family: inherit;
      color: #1E293B;
      background: #F8FAFC;
      border: 2px solid transparent;
      border-radius: 14px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      -webkit-appearance: none;
      appearance: none;
    }

    .form-input::placeholder {
      color: #CBD5E1;
    }

    .form-input:focus,
    .form-select:focus {
      background: #fff;
      border-color: #4A6CF7;
      box-shadow: 0 0 0 4px rgba(74,108,247,0.1);
    }

    .form-input:focus + .input-icon,
    .form-select:focus + .input-icon {
      color: #4A6CF7;
    }

    /* Select dropdown custom arrow */
    .form-select {
      cursor: pointer;
    }

    .select-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: #94A3B8;
      pointer-events: none;
    }

    /* ---------- Agreement Checkbox ---------- */
    .agreement-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 20px 0 24px;
    }

    .custom-checkbox {
      position: relative;
      width: 20px;
      height: 20px;
      min-width: 20px;
      margin-top: 2px;
      cursor: pointer;
    }

    .custom-checkbox input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 1;
    }

    .checkbox-visual {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .checkbox-visual svg {
      width: 12px;
      height: 12px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s ease;
    }

    .custom-checkbox input:checked + .checkbox-visual {
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      border-color: transparent;
    }

    .custom-checkbox input:checked + .checkbox-visual svg {
      opacity: 1;
      transform: scale(1);
    }

    .custom-checkbox input:active + .checkbox-visual {
      transform: scale(0.9);
    }

    .agreement-text {
      font-size: 13px;
      color: #94A3B8;
      line-height: 1.5;
    }

    .agreement-text a {
      color: #4A6CF7;
      text-decoration: none;
      font-weight: 500;
    }

    .agreement-text a:active {
      opacity: 0.7;
    }

    /* ---------- Scheduled-time info (shown in 安排面试 mode) ---------- */
    .scheduled-info {
      background: #F0F4FF;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .scheduled-info.visible {
      display: flex;
    }

    .scheduled-info svg {
      width: 20px;
      height: 20px;
      color: #4A6CF7;
      min-width: 20px;
    }

    .scheduled-info span {
      font-size: 13px;
      color: #4A6CF7;
      font-weight: 500;
    }

    /* ---------- Submit Button ---------- */
    .submit-btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(74,108,247,0.35);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Shine layer */
    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.25), transparent 60%);
      pointer-events: none;
    }

    .submit-btn:hover {
      box-shadow: 0 10px 28px rgba(74,108,247,0.45);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: scale(0.97) translateY(0);
      box-shadow: 0 4px 12px rgba(74,108,247,0.25);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* ---------- Bottom Link ---------- */
    .back-link {
      display: inline-block;
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #94A3B8;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .back-link:active {
      color: #64748B;
      transform: scale(0.97);
    }

    /* ---------- Error hint ---------- */
    .field-error {
      font-size: 12px;
      color: #EF4444;
      margin-top: 4px;
      display: none;
    }

    .field-error.visible {
      display: block;
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 375px) {
      .login-card {
        padding: 32px 20px 28px;
      }

      .logo-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <!-- ======== Animated Gradient Background ======== -->
  <div class="login-bg">
    <div class="gradient-orb-3"></div>
  </div>

  <!-- ======== Login Page ======== -->
  <div class="login-page">

    <!-- Center Card -->
    <div class="login-card">

      <!-- Logo Area -->
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#4A6CF7"/>
                <stop offset="100%" stop-color="#6C5CE7"/>
              </linearGradient>
            </defs>
            <!-- Brain left -->
            <path d="M20 28C20 22 24 16 28 16C32 16 36 22 36 28" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- Brain right -->
            <path d="M16 26C14 26 12 28 12 31C12 34 14 36 16 36" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
            <path d="M40 26C42 26 44 28 44 31C44 34 42 36 40 36" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
            <!-- Brain center -->
            <path d="M24 32L28 28L32 32" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <!-- Circuit nodes -->
            <circle cx="16" cy="20" r="3" fill="url(#logoGrad)"/>
            <circle cx="40" cy="20" r="3" fill="url(#logoGrad)"/>
            <circle cx="12" cy="31" r="2.5" fill="url(#logoGrad)" opacity="0.7"/>
            <circle cx="44" cy="31" r="2.5" fill="url(#logoGrad)" opacity="0.7"/>
            <!-- Circuit lines -->
            <line x1="16" y1="20" x2="24" y2="22" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.5"/>
            <line x1="40" y1="20" x2="32" y2="22" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.5"/>
            <!-- Spark -->
            <circle cx="28" cy="14" r="2" fill="#6C5CE7" opacity="0.8"/>
            <line x1="26" y1="11" x2="28" y2="14" stroke="#6C5CE7" stroke-width="1" opacity="0.6"/>
            <line x1="30" y1="11" x2="28" y2="14" stroke="#6C5CE7" stroke-width="1" opacity="0.6"/>
            <line x1="28" y1="9" x2="28" y2="14" stroke="#6C5CE7" stroke-width="1" opacity="0.6"/>
          </svg>
        </div>
        <div class="logo-title">AI智能面试系统</div>
        <div class="logo-subtitle">职业技能测评平台</div>
      </div>

      <!-- Mode Toggle -->
      <div class="mode-toggle">
        <button class="mode-tab active" data-mode="self">自助测评</button>
        <button class="mode-tab" data-mode="scheduled">安排面试</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" autocomplete="off">

        <!-- Name -->
        <div class="form-group" id="groupName">
          <label>姓名</label>
          <div class="input-wrapper">
            <input type="text" class="form-input" id="inputName" placeholder="请输入姓名" value="张三">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="field-error" id="errorName">请输入姓名</div>
        </div>

        <!-- Student No -->
        <div class="form-group" id="groupStudentNo">
          <label>学号</label>
          <div class="input-wrapper">
            <input type="text" class="form-input" id="inputStudentNo" placeholder="请输入学号" value="2026001">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="16" rx="2"/>
              <line x1="8" y1="10" x2="16" y2="10"/>
              <line x1="8" y1="14" x2="12" y2="14"/>
            </svg>
          </div>
          <div class="field-error" id="errorStudentNo">请输入学号</div>
        </div>

        <!-- Major (select) -->
        <div class="form-group" id="groupMajor">
          <label>专业</label>
          <div class="input-wrapper">
            <select class="form-select" id="inputMajor">
              <option value="" disabled selected>请选择专业</option>
            </select>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
            <svg class="select-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 8 11 13 6"/>
            </svg>
          </div>
          <div class="field-error" id="errorMajor">请选择专业</div>
        </div>

        <!-- Exam Ticket No (scheduled mode only) -->
        <div class="form-group" id="groupTicketNo" style="display:none">
          <label>准考证号</label>
          <div class="input-wrapper">
            <input type="text" class="form-input" id="inputTicketNo" placeholder="请输入准考证号">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="field-error" id="errorTicketNo">请输入准考证号</div>
        </div>
        <!-- ID Card Last 6 (scheduled mode only) -->
        <div class="form-group" id="groupIdCardLast6" style="display:none">
          <label>身份证后6位</label>
          <div class="input-wrapper">
            <input type="text" class="form-input" id="inputIdCardLast6" placeholder="请输入身份证后6位" maxlength="6">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <div class="field-error" id="errorIdCardLast6">请输入身份证后6位</div>
        </div>

        <!-- Scheduled-time info (visible in 安排面试 mode) -->
        <div class="scheduled-info" id="scheduledInfo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>面试时间以通知为准，请留意最新消息</span>
        </div>

        <!-- Agreement -->
        <div class="agreement-row">
          <label class="custom-checkbox">
            <input type="checkbox" id="agreeCheck">
            <div class="checkbox-visual">
              <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2 6 5 9 10 3"/>
              </svg>
            </div>
          </label>
          <span class="agreement-text">
            我已阅读并同意<a href="javascript:void(0)" onclick="Toast.info('测评须知内容即将上线')">《测评须知》</a>
          </span>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="submitBtn" disabled>开始测评</button>
      </form>
    </div>

    <!-- Back Link -->
    <a href="../index.html" class="back-link">&larr; 返回首页</a>
  </div>

  <!-- ======== Scripts ======== -->
  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    (function () {
      'use strict';

      /* ---- DOM refs ---- */
      var form = document.getElementById('loginForm');
      var inputName = document.getElementById('inputName');
      var inputStudentNo = document.getElementById('inputStudentNo');
      var inputMajor = document.getElementById('inputMajor');
      var agreeCheck = document.getElementById('agreeCheck');
      var submitBtn = document.getElementById('submitBtn');
      var scheduledInfo = document.getElementById('scheduledInfo');
      var modeTabs = document.querySelectorAll('.mode-tab');
      var currentMode = 'self';

      /* ---- Populate major select from MockData ---- */
      MockData.init();
      var majors = MockData.majors;
      majors.forEach(function (m) {
        var opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        inputMajor.appendChild(opt);
      });

      /* ---- Mode toggle ---- */
      modeTabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          modeTabs.forEach(function (t) { t.classList.remove('active'); });
          tab.classList.add('active');
          currentMode = tab.dataset.mode;

          // Toggle field visibility based on mode
          var selfFields = ['groupName', 'groupStudentNo', 'groupMajor'];
          var scheduledFields = ['groupTicketNo', 'groupIdCardLast6'];

          if (currentMode === 'scheduled') {
            selfFields.forEach(function(id) {
              var el = document.getElementById(id);
              if (el) el.style.display = 'none';
            });
            scheduledFields.forEach(function(id) {
              var el = document.getElementById(id);
              if (el) el.style.display = '';
            });
            scheduledInfo.classList.add('visible');
            submitBtn.textContent = '查看面试安排';
          } else {
            selfFields.forEach(function(id) {
              var el = document.getElementById(id);
              if (el) el.style.display = '';
            });
            scheduledFields.forEach(function(id) {
              var el = document.getElementById(id);
              if (el) el.style.display = 'none';
            });
            scheduledInfo.classList.remove('visible');
            submitBtn.textContent = '开始测评';
          }
        });
      });

      /* ---- Agreement checkbox (visual only, no block) ---- */
      agreeCheck.addEventListener('change', updateBtnState);

      function updateBtnState() {
        // Button always enabled, no validation
        submitBtn.disabled = false;
      }

      // Enable button immediately
      submitBtn.disabled = false;

      /* ---- Form submit (no validation, direct login) ---- */
      form.addEventListener('submit', function (e) {
        e.preventDefault();

        // Match student from mock data or create new
        var name = inputName.value.trim();
        var studentNo = inputStudentNo.value.trim();
        var major = inputMajor.value;

        var matched = MockData.students.find(function (s) {
          return s.studentNo === studentNo;
        });

        var currentUser = matched || {
          id: 'STU_' + Date.now(),
          name: name,
          studentNo: studentNo,
          major: major,
          className: '',
          phone: '',
          avatar: null
        };

        // If matched but name differs, use the input name (they are logging in)
        currentUser.name = name;
        currentUser.major = major;

        DataStore.setCurrentUser(currentUser);
        Toast.success('登录成功，欢迎 ' + name);

        setTimeout(function () {
          navigateTo('student-home.html');
        }, 600);
      });

    })();
  </script>
</body>
</html>
