  <style>
    /* === Collapsible Sidebar Groups === */
    .admin-nav-group-section { margin-top: 4px; }
    .admin-nav-group-header { display: flex; align-items: center; gap: 12px; padding: 10px var(--spacing-md); border-radius: var(--radius-sm); color: rgba(255,255,255,0.7); font-size: var(--font-size-sm); font-weight: 600; cursor: pointer; transition: all var(--transition-fast); user-select: none; }
    .admin-nav-group-header:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .admin-nav-group-header .nav-icon { opacity: 0.6; }
    .nav-group-arrow { margin-left: auto; transition: transform 0.3s ease; opacity: 0.4; }
    .admin-nav-group-section.collapsed .nav-group-arrow { transform: rotate(-90deg); }
    .admin-nav-group-items { overflow: hidden; transition: max-height 0.3s ease; max-height: 500px; }
    .admin-nav-group-section.collapsed .admin-nav-group-items { max-height: 0; }
    .admin-nav-item.sub { padding-left: calc(var(--spacing-md) + 28px); font-size: calc(var(--font-size-sm) - 1px); }
    .admin-nav-item.sub .nav-icon { width: 16px; height: 16px; }
    .admin-nav-item.sub .nav-icon svg { width: 16px; height: 16px; }

    /* === Status pills === */
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); line-height: 1.6; }
    .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-pill.upcoming { background: var(--color-warning-bg); color: var(--color-warning); }
    .status-pill.upcoming::before { background: var(--color-warning); }
    .status-pill.ongoing { background: var(--color-success-bg); color: var(--color-success); }
    .status-pill.ongoing::before { background: var(--color-success); animation: pulse 1.5s ease-in-out infinite; }
    .status-pill.completed { background: var(--color-bg-light); color: var(--color-text-tertiary); }
    .status-pill.completed::before { background: var(--color-text-tertiary); }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(1.4);} }

    /* === Filter pill buttons === */
    .filter-pills { display: flex; gap: 6px; }
    .filter-pill { padding: 6px 16px; border-radius: var(--radius-full); font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); cursor: pointer; transition: all var(--transition-fast); border: 1px solid var(--color-border); background: var(--color-bg-card); color: var(--color-text-secondary); }
    .filter-pill:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .filter-pill.active { background: var(--gradient-primary); color: white; border-color: transparent; }

    /* === Mode badge === */
    .mode-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); }
    .mode-badge.scheduled { background: rgba(74,108,247,0.1); color: var(--color-primary); }
    .mode-badge.self_service { background: rgba(139,92,246,0.1); color: #8B5CF6; }

    /* === Action links === */
    .action-link { font-size: var(--font-size-sm); color: var(--color-primary); cursor: pointer; transition: color var(--transition-fast); text-decoration: none; }
    .action-link:hover { color: var(--color-primary-dark); text-decoration: underline; }
    .action-link.danger { color: var(--color-danger); }
    .action-link.danger:hover { color: #DC2626; }

    /* === Search in filter bar === */
    .filter-search { position: relative; }
    .filter-search input { height: 36px; padding: 0 12px 0 36px; font-size: var(--font-size-sm); background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-sm); color: var(--color-text-primary); min-width: 200px; transition: all var(--transition-fast); }
    .filter-search input:focus { border-color: var(--color-border-focus); box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
    .filter-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--color-text-tertiary); }

    /* === Dashboard Card (reusable) === */
    .dashboard-card { background: var(--color-bg-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card); overflow: hidden; }
    .dashboard-card-header { display: flex; align-items: center; justify-content: space-between; padding: var(--spacing-lg) var(--spacing-2xl); border-bottom: 1px solid var(--color-border-light); }
    .dashboard-card-title { font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); }
    .dashboard-card-body { padding: var(--spacing-lg) var(--spacing-2xl); }

    /* === Form in modal === */
    .create-form .form-group { margin-bottom: var(--spacing-lg); }
    .create-form .form-label { display: block; margin-bottom: 6px; font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-text-primary); }
    .create-form .form-label .required { color: var(--color-danger); margin-left: 2px; }
    .create-form .form-input, .create-form .form-select { width: 100%; padding: 10px 14px; font-size: var(--font-size-sm); background: var(--color-bg-light); border: 1px solid var(--color-border); border-radius: var(--radius-sm); color: var(--color-text-primary); transition: all var(--transition-fast); }
    .create-form .form-input:focus, .create-form .form-select:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(74,108,247,0.1); background: var(--color-bg-card); }
    .create-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md); }
  </style>
</head>

                  <th class="table-cell">日期</th>
                  <th class="table-cell">时间</th>
                  <th class="table-cell">面试官</th>
                  <th class="table-cell">模式</th>
                  <th class="table-cell">学生数</th>
                  <th class="table-cell">状态</th>
                  <th class="table-cell">操作</th>
                </tr>
              </thead>
              <tbody id="interviewTableBody">
              </tbody>
            </table>
          </div>
          <div class="admin-table-footer">
            <span id="tableInfo">共 0 条记录</span>
            <div class="admin-table-pagination" id="pagination"></div>
          </div>
        </div>

      </main>
    </div>

  </div>

  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    /* --- Sidebar toggle --- */
    (function() {
      var sidebar = document.getElementById('adminSidebar');
      var toggle = document.getElementById('sidebarToggle');
      if (toggle && sidebar) {
        toggle.addEventListener('click', function() { sidebar.classList.toggle('collapsed'); });
      }
    })();

    /* --- Data & State --- */
    var currentStatusFilter = 'all';
    var currentPage = 1;
    var pageSize = 10;

    function init() {
      MockData.init();
      populateMajorFilter();
      renderTable();
    }

    function populateMajorFilter() {
      var select = document.getElementById('majorFilter');
      var majors = MockData.majors;
      majors.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        select.appendChild(opt);
      });
    }

    function getFilteredInterviews() {
      var interviews = DataStore.getAllInterviews();
      var majorFilter = document.getElementById('majorFilter').value;
      var searchVal = document.getElementById('searchInput').value.trim().toLowerCase();

      return interviews.filter(function(inv) {
        if (currentStatusFilter !== 'all' && inv.status !== currentStatusFilter) return false;
        if (majorFilter && inv.major !== majorFilter) return false;
        if (searchVal && inv.title.toLowerCase().indexOf(searchVal) === -1) return false;
        return true;
      });
    }

    function renderTable() {
      var filtered = getFilteredInterviews();
      var tbody = document.getElementById('interviewTableBody');
      var total = filtered.length;
      var totalPages = Math.max(1, Math.ceil(total / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      var start = (currentPage - 1) * pageSize;
      var pageData = filtered.slice(start, start + pageSize);

      var statusMap = { upcoming: '待开始', ongoing: '进行中', completed: '已完成' };
      var modeMap = { scheduled: '安排面试', self_service: '自助测评' };

      var html = '';
      pageData.forEach(function(inv) {
        var stuCount = inv.students ? inv.students.length : 0;
        var interviewerName = inv.interviewer ? inv.interviewer.name : '--';
        html += '<tr class="table-row" style="cursor:pointer;" onclick="goToDetail(\'' + inv.id + '\')">' +
          '<td class="table-cell" style="font-weight:600;max-width:260px;"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + inv.title + '">' + inv.title + '</div></td>' +
          '<td class="table-cell">' + inv.major + '</td>' +
          '<td class="table-cell">' + inv.date + '</td>' +
          '<td class="table-cell">' + inv.time + '</td>' +
          '<td class="table-cell">' + interviewerName + '</td>' +
          '<td class="table-cell"><span class="mode-badge ' + inv.mode + '">' + modeMap[inv.mode] + '</span></td>' +
          '<td class="table-cell">' + stuCount + ' 人</td>' +
          '<td class="table-cell"><span class="status-pill ' + inv.status + '">' + statusMap[inv.status] + '</span></td>' +
          '<td class="table-cell" onclick="event.stopPropagation();">' +
            '<a class="action-link" onclick="goToDetail(\'' + inv.id + '\')" style="margin-right:10px;">查看</a>' +
            '<a class="action-link" onclick="editInterview(\'' + inv.id + '\')" style="margin-right:10px;">编辑</a>' +
            '<a class="action-link danger" onclick="deleteInterview(\'' + inv.id + '\')">删除</a>' +
          '</td>' +
        '</tr>';
      });

      if (pageData.length === 0) {
        html = '<tr><td class="table-cell" colspan="9" style="text-align:center;padding:40px 0;color:var(--color-text-tertiary);">暂无匹配的面试场次</td></tr>';
      }

      tbody.innerHTML = html;

      document.getElementById('tableInfo').textContent = '共 ' + total + ' 条记录';

      // Pagination
      var pagEl = document.getElementById('pagination');
      var pagHtml = '';
      pagHtml += '<div class="admin-table-page-btn' + (currentPage <= 1 ? '' : '') + '" ' + (currentPage <= 1 ? '' : 'onclick="changePage(' + (currentPage - 1) + ')"') + '>&lt;</div>';
      for (var i = 1; i <= totalPages; i++) {
        pagHtml += '<div class="admin-table-page-btn' + (i === currentPage ? ' active' : '') + '" onclick="changePage(' + i + ')">' + i + '</div>';
      }
      pagHtml += '<div class="admin-table-page-btn" ' + (currentPage >= totalPages ? '' : 'onclick="changePage(' + (currentPage + 1) + ')"') + '>&gt;</div>';
      pagEl.innerHTML = pagHtml;
    }

    function filterByStatus(status, el) {
      currentStatusFilter = status;
      currentPage = 1;
      document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
      el.classList.add('active');
      applyFilters();
    }

    function applyFilters() {
      currentPage = 1;
      renderTable();
    }

    function changePage(page) {
      currentPage = page;
      renderTable();
    }

    function goToDetail(id) {
      window.location.href = 'admin-session-detail.html?id=' + id;
    }

    function openCreateModal() {
      var majorOptions = '<option value="">请选择专业</option>';
      MockData.majors.forEach(function(m) { majorOptions += '<option value="' + m + '">' + m + '</option>'; });

      var interviewerOptions = '<option value="">请选择面试官</option>';
      var interviewers = MockData.interviewers || [];
      interviewers.forEach(function(i) { interviewerOptions += '<option value="' + i.id + '">' + i.name + ' (' + i.department + ')</option>'; });

      Modal.show({
        title: '创建面试场次',
        content: '<div class="create-form">' +
          '<div class="form-group"><label class="form-label">场次名称 <span class="required">*</span></label><input class="form-input" id="createFormTitle" placeholder="例如：2026年秋季汽车维修专业面试（第一批）"></div>' +
          '<div class="form-row">' +
            '<div class="form-group"><label class="form-label">专业 <span class="required">*</span></label><select class="form-select" id="createFormMajor">' + majorOptions + '</select></div>' +
            '<div class="form-group"><label class="form-label">面试模式 <span class="required">*</span></label><select class="form-select" id="createFormMode"><option value="scheduled">安排面试</option><option value="self_service">自助测评</option></select></div>' +
          '</div>' +
          '<div class="form-row">' +
            '<div class="form-group"><label class="form-label">面试日期 <span class="required">*</span></label><input class="form-input" type="date" id="createFormDate"></div>' +
            '<div class="form-group"><label class="form-label">面试时间 <span class="required">*</span></label><input class="form-input" type="time" id="createFormTimeStart" value="09:00"> - <input class="form-input" type="time" id="createFormTimeEnd" value="12:00" style="width:100px;display:inline-block;margin-left:4px;"></div>' +
          '</div>' +
          '<div class="form-group"><label class="form-label">面试官</label><select class="form-select" id="createFormInterviewer">' + interviewerOptions + '</select></div>' +
        '</div>',
        confirmText: '创建',
        cancelText: '取消',
        onConfirm: function() {
          var title = document.getElementById('createFormTitle').value.trim();
          var major = document.getElementById('createFormMajor').value;
          var date = document.getElementById('createFormDate').value;
          var mode = document.getElementById('createFormMode').value;
          var timeStart = document.getElementById('createFormTimeStart').value;
          var timeEnd = document.getElementById('createFormTimeEnd').value;
          var interviewerId = document.getElementById('createFormInterviewer').value;

          if (!title) { Toast.warning('请填写场次名称'); return; }
          if (!major) { Toast.warning('请选择专业'); return; }
          if (!date) { Toast.warning('请选择面试日期'); return; }

          var interviews = DataStore.getAllInterviews();
          var interviewer = null;
          if (interviewerId) {
            var allInterviewers = DataStore.getAllInterviewers();
            interviewer = allInterviewers.find(function(i) { return i.id === interviewerId; });
          }

          var newInterview = {
            id: 'INT' + String(interviews.length + 1).padStart(3, '0'),
            title: title,
            major: major,
            date: date,
            time: timeStart + '-' + timeEnd,
            mode: mode,
            interviewer: interviewer ? { name: interviewer.name, id: interviewer.id, avatar: null } : null,
            status: 'upcoming',
            description: major + '专业面试',
            students: [],
            trtcRoomId: mode === 'scheduled' ? 'TRTC-' + date.replace(/-/g, '') + '-' + String(interviews.length + 1).padStart(3, '0') : null
          };
          interviews.push(newInterview);
          DataStore.setAllInterviews(interviews);
          renderTable();
          Toast.success('面试场次 "' + title + '" 创建成功');
        }
      });
    }

    function editInterview(id) {
      var interviews = DataStore.getAllInterviews();
      var inv = interviews.find(function(i) { return i.id === id; });
      if (!inv) return;

      var majorOptions = '<option value="">请选择专业</option>';
      MockData.majors.forEach(function(m) {
        majorOptions += '<option value="' + m + '"' + (inv.major === m ? ' selected' : '') + '>' + m + '</option>';
      });

      Modal.show({
        title: '编辑面试场次',
        content: '<div class="create-form">' +
          '<div class="form-group"><label class="form-label">场次名称 <span class="required">*</span></label><input class="form-input" id="editFormTitle" value="' + inv.title + '"></div>' +
          '<div class="form-row">' +
            '<div class="form-group"><label class="form-label">专业 <span class="required">*</span></label><select class="form-select" id="editFormMajor">' + majorOptions + '</select></div>' +
            '<div class="form-group"><label class="form-label">面试模式</label><select class="form-select" id="editFormMode"><option value="scheduled"' + (inv.mode === 'scheduled' ? ' selected' : '') + '>安排面试</option><option value="self_service"' + (inv.mode === 'self_service' ? ' selected' : '') + '>自助测评</option></select></div>' +
          '</div>' +
          '<div class="form-row">' +
            '<div class="form-group"><label class="form-label">面试日期</label><input class="form-input" type="date" id="editFormDate" value="' + inv.date + '"></div>' +
            '<div class="form-group"><label class="form-label">面试时间</label><input class="form-input" type="time" id="editFormTimeStart" value="' + inv.time.split('-')[0] + '"> - <input class="form-input" type="time" id="editFormTimeEnd" value="' + inv.time.split('-')[1] + '" style="width:100px;display:inline-block;margin-left:4px;"></div>' +
          '</div>' +
        '</div>',
        confirmText: '保存',
        cancelText: '取消',
        onConfirm: function() {
          var title = document.getElementById('editFormTitle').value.trim();
          var major = document.getElementById('editFormMajor').value;
          if (!title) { Toast.warning('请填写场次名称'); return; }
          if (!major) { Toast.warning('请选择专业'); return; }

          inv.title = title;
          inv.major = major;
          inv.mode = document.getElementById('editFormMode').value;
          inv.date = document.getElementById('editFormDate').value || inv.date;
          inv.time = (document.getElementById('editFormTimeStart').value || inv.time.split('-')[0]) + '-' + (document.getElementById('editFormTimeEnd').value || inv.time.split('-')[1]);

          DataStore.setAllInterviews(interviews);
          renderTable();
          Toast.success('面试场次已更新');
        }
      });
    }

    function deleteInterview(id) {
      Modal.confirm('确定要删除该面试场次吗？删除后无法恢复。', function() {
        var interviews = DataStore.getAllInterviews();
        var filtered = interviews.filter(function(i) { return i.id !== id; });
        DataStore.setAllInterviews(filtered);
        renderTable();
        Toast.success('面试场次已删除');
      });
    }

    /* --- Init on load --- */
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
