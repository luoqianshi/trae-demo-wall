<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邻里换物</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>邻里换物</h1>
    </header>

    <main class="main-content">
      <div id="home-page" class="page active">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="搜索闲置物品...">
          <button id="search-btn">搜索</button>
        </div>
        
        <div class="category-tabs">
          <span class="tab active" data-category="all">全部</span>
          <span class="tab" data-category="数码">数码</span>
          <span class="tab" data-category="家居">家居</span>
          <span class="tab" data-category="服饰">服饰</span>
          <span class="tab" data-category="书籍">书籍</span>
        </div>

        <div class="goods-list" id="goods-list"></div>
      </div>

      <div id="publish-page" class="page">
        <h2>发布闲置</h2>
        <form id="publish-form">
          <div class="form-group">
            <label>物品名称</label>
            <input type="text" id="goods-name" placeholder="请输入物品名称">
          </div>
          <div class="form-group">
            <label>分类</label>
            <select id="goods-category">
              <option value="">请选择分类</option>
              <option value="数码">数码</option>
              <option value="家居">家居</option>
              <option value="服饰">服饰</option>
              <option value="书籍">书籍</option>
            </select>
          </div>
          <div class="form-group">
            <label>成色</label>
            <select id="goods-condition">
              <option value="">请选择成色</option>
              <option value="全新">全新</option>
              <option value="九成新">九成新</option>
              <option value="八成新">八成新</option>
              <option value="七成新">七成新</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>描述</label>
            <textarea id="goods-desc" placeholder="请描述物品详情"></textarea>
          </div>
          <div class="form-group">
            <label>期望置换物品</label>
            <input type="text" id="goods-exchange" placeholder="您期望交换的物品">
          </div>
          <button type="submit" class="submit-btn">发布</button>
        </form>
      </div>

      <div id="profile-page" class="page">
        <div class="user-info">
          <div class="avatar">👤</div>
          <div class="user-detail">
            <h3>邻居小王</h3>
            <p>🏆 积分：100</p>
          </div>
          <div class="user-actions">
            <span class="action-btn" id="settings-btn">⚙️</span>
            <span class="action-btn" id="message-btn">💬</span>
          </div>
        </div>
        
        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-value">6</span>
            <span class="stat-label">发布</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">2</span>
            <span class="stat-label">收藏</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">2</span>
            <span class="stat-label">订单</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">5</span>
            <span class="stat-label">交换成功</span>
          </div>
        </div>
        
        <div class="profile-tabs">
          <span class="profile-tab active" data-tab="goods">我的发布</span>
          <span class="profile-tab" data-tab="favorites">我的收藏</span>
          <span class="profile-tab" data-tab="orders">置换订单</span>
        </div>
        
        <div class="tab-content">
          <div id="goods-tab" class="tab-pane active">
            <div id="my-goods-list" class="profile-goods-list"></div>
          </div>
          
          <div id="favorites-tab" class="tab-pane">
            <div id="my-favorites-list" class="profile-goods-list"></div>
          </div>
          
          <div id="orders-tab" class="tab-pane">
            <div class="order-tabs">
              <span class="order-tab active" data-status="pending">待确认</span>
              <span class="order-tab" data-status="completed">已完成</span>
            </div>
            <div id="order-list"></div>
          </div>
        </div>
      </div>
    </main>

    <nav class="tab-bar">
      <span class="tab-item active" data-page="home-page">
        <span class="icon">🏠</span>
        <span class="text">首页</span>
      </span>
      <span class="tab-item publish-btn" data-page="publish-page">
        <span class="icon">+</span>
      </span>
      <span class="tab-item" data-page="profile-page">
        <span class="icon">👤</span>
        <span class="text">我的</span>
      </span>
    </nav>
  </div>

  <div id="detail-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn" id="close-detail">×</span>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </div>

  <div id="order-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn" id="close-order">×</span>
      <h3>发起置换</h3>
      <form id="order-form">
        <div class="form-group">
          <label>交换时间</label>
          <input type="datetime-local" id="order-time">
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="order-note" placeholder="请输入备注信息"></textarea>
        </div>
        <button type="submit" class="submit-btn">确认发起</button>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div id="confirm-modal" class="modal">
    <div class="modal-content confirm-content">
      <div class="confirm-icon">⚠️</div>
      <h3 id="confirm-title">确认删除</h3>
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button class="btn-cancel">取消</button>
        <button class="btn-confirm">确认</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
