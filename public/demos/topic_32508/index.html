<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI食光机 - 智能食谱助手</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #fef7f0;
            color: #3d2b1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== Variables ===== */
        :root {
            --orange-50: #fff7ed;
            --orange-100: #ffedd5;
            --orange-200: #fed7aa;
            --orange-300: #fdba74;
            --orange-400: #fb923c;
            --orange-500: #f97316;
            --orange-600: #ea580c;
            --orange-700: #c2410c;
            --warm-white: #fffaf5;
            --text-primary: #3d2b1f;
            --text-secondary: #7a5c4a;
            --text-light: #a88b7a;
            --card-shadow: 0 8px 30px rgba(233, 119, 36, 0.10);
            --card-hover-shadow: 0 16px 48px rgba(233, 119, 36, 0.18);
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ===== Header / Navigation ===== */
        header {
            background: linear-gradient(135deg, #fff6ed 0%, #fff0e0 100%);
            border-bottom: 1px solid rgba(251, 146, 60, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: var(--orange-600);
            text-decoration: none;
            letter-spacing: 0.5px;
        }
        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--orange-400), var(--orange-600));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }
        .brand span { background: linear-gradient(135deg, var(--orange-500), var(--orange-700)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        nav a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 10px;
            transition: var(--transition);
            position: relative;
        }
        nav a:hover, nav a.active {
            color: var(--orange-600);
            background: rgba(249, 115, 22, 0.08);
        }
        nav a.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            border-radius: 2px;
            background: var(--orange-400);
        }
        .nav-links { display: flex; gap: 4px; align-items: center; }

        /* ===== Mobile Menu Toggle ===== */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
        }
        .menu-toggle span {
            width: 24px;
            height: 2.5px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: var(--transition);
        }

        /* ===== Hero Section ===== */
        .hero {
            text-align: center;
            padding: 60px 24px 32px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(253, 186, 116, 0.13) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero h1 {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .hero h1 .highlight {
            background: linear-gradient(135deg, var(--orange-400), var(--orange-600));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            margin-top: 12px;
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
        }

        /* ===== Main Container ===== */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px 80px;
            flex: 1;
        }

        /* ===== Section Title ===== */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
        }
        .section-title .badge {
            font-size: 12px;
            font-weight: 600;
            background: var(--orange-400);
            color: #fff;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 6px;
        }
        .section-title .badge.ai {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        /* ===== Fridge Input Area ===== */
        .fridge-card {
            background: var(--warm-white);
            border-radius: var(--radius-md);
            padding: 28px 32px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(253, 186, 116, 0.15);
            transition: var(--transition);
            margin-bottom: 32px;
        }
        .fridge-card:hover { box-shadow: var(--card-hover-shadow); }

        .fridge-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .fridge-header .icon {
            font-size: 28px;
        }
        .fridge-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .fridge-input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .fridge-input-row input {
            flex: 1;
            min-width: 180px;
            padding: 12px 18px;
            border: 2px solid var(--orange-200);
            border-radius: var(--radius-sm);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            background: #fff;
            color: var(--text-primary);
        }
        .fridge-input-row input:focus {
            border-color: var(--orange-400);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.10);
        }
        .fridge-input-row input::placeholder { color: var(--text-light); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--orange-400), var(--orange-600));
            color: #fff;
            box-shadow: 0 4px 14px rgba(249, 115, 22, 0.30);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(249, 115, 22, 0.40);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-outline {
            background: transparent;
            color: var(--orange-600);
            border: 2px solid var(--orange-300);
        }
        .btn-outline:hover { background: rgba(249, 115, 22, 0.06); }

        /* ===== Tags (ingredients) ===== */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: linear-gradient(135deg, var(--orange-50), var(--orange-100));
            border: 1px solid var(--orange-200);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--orange-700);
            transition: var(--transition);
            cursor: default;
        }
        .tag .remove {
            cursor: pointer;
            font-size: 14px;
            color: var(--text-light);
            transition: var(--transition);
            background: none;
            border: none;
            padding: 0 2px;
            line-height: 1;
        }
        .tag .remove:hover { color: var(--orange-600); transform: scale(1.2); }

        /* ===== Recommend Button Area ===== */
        .recommend-cta {
            text-align: center;
            margin: 28px 0 32px;
        }
        .btn-recommend {
            padding: 16px 48px;
            font-size: 18px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--orange-400), var(--orange-600));
            color: #fff;
            border: none;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.30);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .btn-recommend:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(249, 115, 22, 0.40);
        }
        .btn-recommend:active { transform: translateY(0); }
        .btn-recommend:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== Recipe Grid ===== */
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 8px;
        }

        /* ===== Recipe Card ===== */
        .recipe-card {
            background: #fff;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(253, 186, 116, 0.10);
            transition: var(--transition);
            cursor: pointer;
        }
        .recipe-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-hover-shadow);
        }
        .recipe-card-img {
            height: 140px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 12px 16px;
        }
        .recipe-card-img .difficulty {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.92);
            color: var(--text-secondary);
            backdrop-filter: blur(4px);
        }
        .recipe-card-body {
            padding: 16px 18px 18px;
        }
        .recipe-card-body h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .recipe-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-light);
        }
        .recipe-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== Expanded Steps ===== */
        .recipe-steps {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.22, 1, 0.36, 1), padding 0.4s ease;
            padding: 0 18px;
            background: var(--orange-50);
        }
        .recipe-card.expanded .recipe-steps {
            max-height: 600px;
            padding: 16px 18px 20px;
        }
        .recipe-steps ol {
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .recipe-steps li {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            padding-left: 4px;
        }
        .recipe-steps li::marker {
            color: var(--orange-500);
            font-weight: 700;
        }
        .recipe-steps .ingredients-used {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .recipe-steps .ingredients-used .mini-tag {
            font-size: 12px;
            padding: 3px 10px;
            background: #fff;
            border: 1px solid var(--orange-200);
            border-radius: 14px;
            color: var(--orange-600);
        }

        /* ===== Empty State / Loading ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state .icon-big {
            font-size: 52px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .empty-state p { font-size: 15px; line-height: 1.8; }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--orange-400);
            animation: dotPulse 1.2s infinite ease-in-out;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.30s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ===== Fade-in animation ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up {
            animation: fadeUp 0.5s ease forwards;
        }
        .fade-up-delay-1 { animation-delay: 0.05s; }
        .fade-up-delay-2 { animation-delay: 0.10s; }
        .fade-up-delay-3 { animation-delay: 0.15s; }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 24px;
            font-size: 13px;
            color: var(--text-light);
            border-top: 1px solid rgba(253, 186, 116, 0.12);
            background: rgba(255, 250, 245, 0.6);
        }
        footer .powered {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 18px;
            background: linear-gradient(135deg, rgba(249,115,22,0.06), rgba(99,102,241,0.06));
            border-radius: 20px;
            font-weight: 500;
        }
        footer .powered .ai-icon {
            display: inline-block;
            background: linear-gradient(135deg, var(--orange-400), #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .nav-links { display: none; position: absolute; top: 68px; left: 0; right: 0; background: #fff; flex-direction: column; padding: 12px 24px 20px; box-shadow: 0 12px 32px rgba(0,0,0,0.08); border-radius: 0 0 var(--radius-md) var(--radius-md); }
            .nav-links.open { display: flex; }
            .menu-toggle { display: flex; }

            .hero h1 { font-size: 26px; }
            .hero p { font-size: 14px; }

            .fridge-card { padding: 20px; }
            .fridge-input-row input { min-width: 120px; }

            .recipe-grid { grid-template-columns: 1fr; }

            .btn-recommend { width: 100%; padding: 14px 24px; font-size: 16px; }
        }

        @media (max-width: 480px) {
            .nav-inner { padding: 0 16px; }
            .container { padding: 0 16px 60px; }
            .hero { padding: 40px 16px 24px; }
            .hero h1 { font-size: 22px; }
            .fridge-header h2 { font-size: 16px; }
        }
    </style>
</head>
<body>

<!-- ===== Header ===== -->
<header>
    <div class="nav-inner">
        <a href="#" class="brand">
            <div class="brand-icon">&#9202;</div>
            <span>AI食光机</span>
        </a>
        <nav>
            <div class="nav-links" id="navLinks">
                <a href="#" class="active" data-section="fridge">冰箱管理</a>
                <a href="#" data-section="recommend">智能推荐</a>
                <a href="#" data-section="favorites">我的收藏</a>
            </div>
        </nav>
        <button class="menu-toggle" id="menuToggle" aria-label="菜单">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>

<!-- ===== Hero ===== -->
<section class="hero">
    <h1>打开冰箱，<span class="highlight">AI</span> 为你决定吃什么</h1>
    <p>输入你手边的食材，让智能食谱引擎为你推荐最合适的家常菜 &mdash; 不浪费、不纠结。</p>
</section>

<!-- ===== Main Container ===== -->
<main class="container">

    <!-- ===== Fridge Section ===== -->
    <section id="fridge">
        <div class="section-title">
            <span>&#127857;</span> 我的冰箱
            <span class="badge" id="countBadge">0 种食材</span>
        </div>

        <div class="fridge-card">
            <div class="fridge-header">
                <span class="icon">&#128083;</span>
                <h2>打开冰箱，看看有什么</h2>
            </div>
            <div class="fridge-input-row">
                <input type="text" id="ingredientInput" placeholder="输入食材名称，如：鸡胸肉" list="suggestList" autocomplete="off">
                <datalist id="suggestList">
                    <option value="鸡蛋">
                    <option value="西红柿">
                    <option value="洋葱">
                    <option value="鸡胸肉">
                    <option value="牛奶">
                    <option value="土豆">
                    <option value="胡萝卜">
                    <option value="青椒">
                    <option value="豆腐">
                    <option value="牛肉">
                    <option value="猪肉">
                    <option value="白菜">
                    <option value="大蒜">
                    <option value="生姜">
                    <option value="面条">
                    <option value="米饭">
                </datalist>
                <button class="btn btn-primary" id="addIngredientBtn">+ 添加</button>
                <button class="btn btn-outline" id="clearFridgeBtn" style="font-size:13px; padding:12px 16px;">清空</button>
            </div>
            <div class="tag-list" id="ingredientTags">
                <!-- tags injected by JS -->
            </div>
        </div>
    </section>

    <!-- ===== Recommend CTA ===== -->
    <div class="recommend-cta">
        <button class="btn-recommend" id="recommendBtn">
            &#129302; 开始智能推荐
        </button>
    </div>

    <!-- ===== Recommendation Section ===== -->
    <section id="recommend">
        <div class="section-title">
            <span>&#127860;</span> 智能推荐
            <span class="badge ai">AI 匹配</span>
        </div>
        <div id="recipeContainer">
            <div class="empty-state" id="emptyState">
                <div class="icon-big">&#127858;</div>
                <p>先在冰箱里添加一些食材，<br>然后点击「开始智能推荐」吧！</p>
            </div>
            <div class="recipe-grid" id="recipeGrid" style="display:none;"></div>
        </div>
    </section>

    <!-- ===== Favorites Section ===== -->
    <section id="favorites" style="margin-top: 48px;">
        <div class="section-title">
            <span>&#128151;</span> 我的收藏
        </div>
        <div class="empty-state" id="favEmptyState">
            <div class="icon-big">&#128722;</div>
            <p>还没有收藏的食谱，<br>点击食谱卡片上的 &#9825; 即可收藏。</p>
        </div>
        <div class="recipe-grid" id="favGrid" style="display:none;"></div>
    </section>

</main>

<!-- ===== Footer ===== -->
<footer>
    <div class="powered">
        <span class="ai-icon">&#129302;</span> Powered by <strong>TRAE Work</strong>
    </div>
</footer>

<!-- ===== JavaScript ===== -->
<script>

    'use strict';

    // --- Data ---

                '热锅倒油，下鸡胸肉炒至变色盛出。',
                '锅中留底油炒洋葱至透明，倒回鸡肉，加蚝油、黑胡椒翻炒均匀即可。'
            ]
        },
        {
            id: 'r4',
            name: '牛奶滑蛋',
            emoji: '&#129370;',
            time: '8 分钟',
            difficulty: '简单',
            difficultyColor: '#22c55e',
            bgColor: 'linear-gradient(135deg, #fefce8, #fef9c3)',
            ingredients: ['鸡蛋', '牛奶'],
            tags: ['早餐', '嫩滑'],
            steps: [
                '鸡蛋 2 个打散，加入 30ml 牛奶和少许盐搅匀。',
                '平底锅小火融化一小块黄油。',
                '倒入蛋液，用锅铲从边缘轻轻向中间推，直到蛋液凝固成嫩滑的块状。',
                '撒少许黑胡椒，趁热享用。'
            ]
        },
        {
            id: 'r5',
            name: '西红柿洋葱沙拉',
            emoji: '&#129361;',
            time: '10 分钟',
            difficulty: '简单',
            difficultyColor: '#22c55e',
            bgColor: 'linear-gradient(135deg, #fdf2f8, #fce7f3)',
            ingredients: ['西红柿', '洋葱'],
            tags: ['清爽', '低卡'],
            steps: [
                '西红柿切片，洋葱切薄环，用冰水浸泡 5 分钟去辛辣。',
                '调油醋汁：橄榄油 2 勺 + 苹果醋 1 勺 + 蜂蜜 1 小勺 + 盐和黑胡椒。',
                '沥干洋葱，与西红柿混合，淋上油醋汁。',
                '撒一点欧芹碎或罗勒叶装饰即可。'
            ]
        },
        {
            id: 'r6',
            name: '土豆胡萝卜炖鸡',
            emoji: '&#127839;',
            time: '40 分钟',
            difficulty: '中等',
            difficultyColor: '#f59e0b',
            bgColor: 'linear-gradient(135deg, #fff7ed, #fef3c7)',
            ingredients: ['鸡胸肉', '土豆', '胡萝卜'],
            tags: ['炖菜', '暖身'],
            steps: [
                '鸡胸肉切块，用料酒和姜片腌制；土豆、胡萝卜切滚刀块。',
                '热锅倒油，爆香姜蒜，下鸡块炒至表面变色。',
                '加入土豆和胡萝卜翻炒 2 分钟，加生抽、老抽、冰糖。',
                '加入没过食材的热水，大火烧开转小火炖 25 分钟，收汁出锅。'
            ]
        },
        {
            id: 'r7',
            name: '青椒土豆丝',
            emoji: '&#127858;',
            time: '15 分钟',
            difficulty: '简单',
            difficultyColor: '#22c55e',
            bgColor: 'linear-gradient(135deg, #f0fdf4, #ecfccb)',
            ingredients: ['土豆', '青椒'],
            tags: ['家常', '素菜'],
            steps: [
                '土豆切丝，用清水浸泡去掉多余淀粉；青椒切丝。',
                '热锅倒油，放入干辣椒和花椒爆香（可选）。',
                '下土豆丝大火翻炒约 2 分钟，加盐和少许醋。',
                '加入青椒丝再炒 1 分钟，出锅前撒少许鸡精。'
            ]
        },
        {
            id: 'r8',
            name: '牛肉洋葱盖饭',
            emoji: '&#127860;',
            time: '25 分钟',
            difficulty: '中等',
            difficultyColor: '#f59e0b',
            bgColor: 'linear-gradient(135deg, #fef2f2, #fee2e2)',
            ingredients: ['牛肉', '洋葱'],
            tags: ['主食', '满足'],
            steps: [
                '牛肉切薄片，用生抽、料酒、糖、淀粉腌制 10 分钟。',
                '洋葱切丝。热锅倒油，先炒牛肉至八成熟盛出。',
                '锅中补少许油，炒洋葱至焦糖色，倒回牛肉。',
                '加一勺照烧汁或蚝油翻炒均匀，盖在米饭上，撒芝麻。'
            ]
        }
    ];

    // --- State ---
    let ingredients = [];
    let favorites = new Set();
    let currentRecipes = [];
    let isRecommending = false;

    // --- DOM refs ---
    const ingredientInput = document.getElementById('ingredientInput');
    const addBtn = document.getElementById('addIngredientBtn');
    const clearBtn = document.getElementById('clearFridgeBtn');
    const tagContainer = document.getElementById('ingredientTags');
    const countBadge = document.getElementById('countBadge');
    const recommendBtn = document.getElementById('recommendBtn');
    const recipeGrid = document.getElementById('recipeGrid');
    const emptyState = document.getElementById('emptyState');
    const favGrid = document.getElementById('favGrid');
    const favEmptyState = document.getElementById('favEmptyState');
    const navLinks = document.getElementById('navLinks');

    // --- Helpers ---
    function updateFridgeUI() {
        // Update tags
        tagContainer.innerHTML = ingredients.map((item, i) =>
            `<span class="tag">${item}<button class="remove" data-index="${i}">&times;</button></span>`
        ).join('');
        // Attach remove events
        tagContainer.querySelectorAll('.remove').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const idx = parseInt(this.dataset.index);
                ingredients.splice(idx, 1);
                updateFridgeUI();
                clearRecommendations();
            });
        });
        // Update badge
        countBadge.textContent = ingredients.length + ' 种食材';
    }

    function addIngredient(name) {
        const val = name || ingredientInput.value.trim();
        if (!val) return;
        // Normalize
        const normalized = val;
        if (ingredients.includes(normalized)) {
            // highlight briefly
            ingredientInput.value = '';
            return;
        }
        ingredients.push(normalized);
        ingredientInput.value = '';
        updateFridgeUI();
        clearRecommendations();
    }

    function clearRecommendations() {
        currentRecipes = [];
        recipeGrid.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.innerHTML = `
            <div class="icon-big">&#127858;</div>
            <p>食材已变化，点击「开始智能推荐」重新匹配吧！</p>
        `;
    }

    function getMatchScore(recipe) {
        if (ingredients.length === 0) return 0;
        let matchCount = 0;
        for (const ing of recipe.ingredients) {
            if (ingredients.includes(ing)) matchCount++;
        }
        return matchCount / recipe.ingredients.length;
    }

    function recommend() {
        if (isRecommending) return;
        if (ingredients.length === 0) {
            emptyState.style.display = 'block';
            recipeGrid.style.display = 'none';
            emptyState.innerHTML = `
                <div class="icon-big">&#128683;</div>
                <p>冰箱还是空的呢！<br>先添加一些食材吧 &#128522;</p>
            `;
            return;
        }

        isRecommending = true;
        recommendBtn.disabled = true;
        recommendBtn.innerHTML = '&#129302; AI 分析中 <span class="loading-dots"><span></span><span></span><span></span></span>';

        // Simulate AI "thinking"
        setTimeout(() => {
            // Score and sort recipes
            const scored = ALL_RECIPES.map(r => ({
                ...r,
                score: getMatchScore(r)
            })).filter(r => r.score > 0)
              .sort((a, b) => b.score - a.score || (a.time.localeCompare(b.time)));

            currentRecipes = scored;

            // Render
            if (scored.length === 0) {
                emptyState.style.display = 'block';
                recipeGrid.style.display = 'none';
                emptyState.innerHTML = `
                    <div class="icon-big">&#129300;</div>
                    <p>没有找到匹配的食谱。<br>试试添加其他食材吧！</p>
                `;
            } else {
                emptyState.style.display = 'none';
                recipeGrid.style.display = 'grid';
                recipeGrid.innerHTML = scored.map((recipe, idx) => renderRecipeCard(recipe, idx)).join('');
                // Attach click events for expansion
                recipeGrid.querySelectorAll('.recipe-card').forEach(card => {
                    const expandBtn = card.querySelector('.card-click-area');
                    if (expandBtn) {
                        expandBtn.addEventListener('click', function(e) {
                            if (e.target.closest('.fav-btn')) return;
                            card.classList.toggle('expanded');
                        });
                    }
                    const favBtn = card.querySelector('.fav-btn');
                    if (favBtn) {
                        favBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const rid = this.dataset.recipeId;
                            toggleFavorite(rid);
                            this.textContent = favorites.has(rid) ? '&#9829;' : '&#9825;';
                            this.classList.toggle('active', favorites.has(rid));
                            renderFavorites();
                        });
                    }
                });
            }

            isRecommending = false;
            recommendBtn.disabled = false;
            recommendBtn.innerHTML = '&#129302; 开始智能推荐';
        }, 800);
    }

    function renderRecipeCard(recipe, idx) {
        const isFav = favorites.has(recipe.id);
        const matched = recipe.ingredients.filter(ing => ingredients.includes(ing));
        const missing = recipe.ingredients.filter(ing => !ingredients.includes(ing));
        return `
            <div class="recipe-card fade-up ${idx < 3 ? 'fade-up-delay-' + (idx + 1) : ''}" data-id="${recipe.id}">
                <div class="recipe-card-img" style="background: ${recipe.bgColor};">
                    <span style="font-size:48px; line-height:1; margin-bottom:4px;">${recipe.emoji}</span>
                    <span class="difficulty" style="position:absolute; bottom:12px; right:16px; color:${recipe.difficultyColor};">${recipe.difficulty}</span>
                </div>
                <div class="recipe-card-body card-click-area">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <h3>${recipe.name}</h3>
                        <button class="fav-btn" data-recipe-id="${recipe.id}" style="background:none;border:none;font-size:20px;cursor:pointer;color:${isFav ? '#e11d48' : '#ccc'};transition:var(--transition);padding:2px 4px;" title="收藏">${isFav ? '&#9829;' : '&#9825;'}</button>
                    </div>
                    <div class="recipe-meta">
                        <span>&#9200; ${recipe.time}</span>
                        <span>
                            &#127869; 匹配 
                            <strong style="color:var(--orange-500);">${matched.length}/${recipe.ingredients.length}</strong>
                        </span>
                    </div>
                    <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:4px;">
                        ${recipe.tags.map(t => `<span style="font-size:11px;background:var(--orange-50);color:var(--orange-600);padding:2px 8px;border-radius:10px;">${t}</span>`).join('')}
                    </div>
                </div>
                <div class="recipe-steps">
                    ${missing.length > 0 ? `
                        <div style="margin-bottom:8px; font-size:13px; color:var(--text-light);">
                            还缺：${missing.map(m => `<span class="mini-tag" style="background:#fff;border:1px dashed var(--orange-300);padding:2px 10px;border-radius:12px;font-size:12px;margin:0 2px;">${m}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="ingredients-used">
                        ${matched.map(m => `<span class="mini-tag">&#10003; ${m}</span>`).join('')}
                    </div>
                    <ol>
                        ${recipe.steps.map(s => `<li>${s}</li>`).join('')}
                    </ol>
                    <div style="margin-top:10px; font-size:12px; color:var(--text-light); text-align:right;">
                        &#128073; 点击收起
                    </div>
                </div>
            </div>
        `;
    }

    function toggleFavorite(recipeId) {
        if (favorites.has(recipeId)) {
            favorites.delete(recipeId);
        } else {
            favorites.add(recipeId);
        }
        // Update recipe grid favorite buttons
        recipeGrid.querySelectorAll('.fav-btn').forEach(btn => {
            if (btn.dataset.recipeId === recipeId) {
                const isFav = favorites.has(recipeId);
                btn.textContent = isFav ? '&#9829;' : '&#9825;';
                btn.classList.toggle('active', isFav);
                btn.style.color = isFav ? '#e11d48' : '#ccc';
            }
        });
    }

    function renderFavorites() {
        const favRecipes = ALL_RECIPES.filter(r => favorites.has(r.id));
        if (favRecipes.length === 0) {
            favGrid.style.display = 'none';
            favEmptyState.style.display = 'block';
            return;
        }
        favEmptyState.style.display = 'none';
        favGrid.style.display = 'grid';
        favGrid.innerHTML = favRecipes.map((recipe, idx) => {
            const isFav = favorites.has(recipe.id);
            return `
                <div class="recipe-card fade-up" data-id="${recipe.id}">
                    <div class="recipe-card-img" style="background: ${recipe.bgColor};">
                        <span style="font-size:48px; line-height:1; margin-bottom:4px;">${recipe.emoji}</span>
                        <span class="difficulty" style="position:absolute; bottom:12px; right:16px; color:${recipe.difficultyColor};">${recipe.difficulty}</span>
                    </div>
                    <div class="recipe-card-body card-click-area">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <h3>${recipe.name}</h3>
                            <button class="fav-btn" data-recipe-id="${recipe.id}" style="background:none;border:none;font-size:20px;cursor:pointer;color:#e11d48;transition:var(--transition);padding:2px 4px;" title="取消收藏">&#9829;</button>
                        </div>
                        <div class="recipe-meta">
                            <span>&#9200; ${recipe.time}</span>
                            <span>&#128221; ${recipe.difficulty}</span>
                        </div>
                        <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:4px;">
                            ${recipe.tags.map(t => `<span style="font-size:11px;background:var(--orange-50);color:var(--orange-600);padding:2px 8px;border-radius:10px;">${t}</span>`).join('')}
                        </div>
                    </div>
                    <div class="recipe-steps">
                        <ol>
                            ${recipe.steps.map(s => `<li>${s}</li>`).join('')}
                        </ol>
                        <div style="margin-top:10px; font-size:12px; color:var(--text-light); text-align:right;">
                            &#128073; 点击收起
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // Attach events for favorites grid
        favGrid.querySelectorAll('.recipe-card').forEach(card => {
            const expandBtn = card.querySelector('.card-click-area');
            if (expandBtn) {
                expandBtn.addEventListener('click', function(e) {
                    if (e.target.closest('.fav-btn')) return;
                    card.classList.toggle('expanded');
                });
            }
            const favBtn = card.querySelector('.fav-btn');
            if (favBtn) {
                favBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const rid = this.dataset.recipeId;
                    toggleFavorite(rid);
                    renderFavorites();
                    // Also update in recipe grid if visible
                    recipeGrid.querySelectorAll('.fav-btn').forEach(b => {
                        if (b.dataset.recipeId === rid) {
                            b.textContent = '&#9825;';
                            b.style.color = '#ccc';
                            b.classList.remove('active');
                        }
                    });
                });
            }
        });
    }

    // --- Init: add default ingredients ---
    function initDefaultIngredients() {
        const defaults = ['鸡蛋', '西红柿', '洋葱', '鸡胸肉', '牛奶'];
        defaults.forEach(item => {
            if (!ingredients.includes(item)) ingredients.push(item);
        });
        updateFridgeUI();
    }

    // --- Event Bindings ---
    addBtn.addEventListener('click', () => addIngredient());
    ingredientInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addIngredient(); }
    });
    clearBtn.addEventListener('click', () => {
        ingredients = [];
        updateFridgeUI();
        clearRecommendations();
    });
    recommendBtn.addEventListener('click', recommend);

    // Nav switching
    navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            navLinks.querySelectorAll('a').forEach(a => a.classList.remove('active'));
            this.classList.add('active');

            const section = this.dataset.section;
            document.querySelectorAll('section').forEach(s => s.style.display = '');
            if (section === 'favorites') {
                document.getElementById('fridge').style.display = 'none';
                document.getElementById('recommend').style.display = 'none';
                document.querySelector('.recommend-cta').style.display = 'none';
                renderFavorites();
            } else if (section === 'recommend') {
                document.getElementById('fridge').style.display = 'none';
                document.getElementById('favorites').style.display = 'none';
                document.querySelector('.recommend-cta').style.display = '';
                document.getElementById('recommend').style.display = '';
            } else {
                // fridge + default
                document.getElementById('fridge').style.display = '';
                document.getElementById('recommend').style.display = '';
                document.getElementById('favorites').style.display = '';
                document.querySelector('.recommend-cta').style.display = '';
            }

            // Close mobile menu
            navLinks.classList.remove('open');
        });
    });

    // Mobile menu toggle
    document.getElementById('menuToggle').addEventListener('click', function() {
        navLinks.classList.toggle('open');
    });

    // Close mobile menu on outside click
    document.addEventListener('click', function(e) {
        if (!e.target.closest('header') && navLinks.classList.contains('open')) {
            navLinks.classList.remove('open');
        }
    });

    // --- Bootstrap ---
    initDefaultIngredients();
    renderFavorites();

})();
</script>

</body>
</html>
