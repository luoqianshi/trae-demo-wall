<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨字破妖 · InkBattle</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="start-screen" class="overlay">
      <div class="screen-content">
        <h1 class="title">墨字破妖</h1>
        <p class="subtitle">执笔破妖，识字通关</p>
        <div class="button-container">
          <button id="start-btn" class="game-btn">开始游戏</button>
        </div>
        <div class="lang-switch">
          <span class="lang-label active" data-lang="zh">中文</span>
          <span class="lang-label" data-lang="en">English</span>
        </div>
      </div>
    </div>

    <div id="hud">
      <div class="hud-left">
        <div class="hp-bar">
          <div class="hp-label">墨心</div>
          <div class="hp-hearts">
            <span class="heart active">❤</span>
            <span class="heart active">❤</span>
            <span class="heart active">❤</span>
          </div>
        </div>
        <div class="timer">
          <div class="timer-icon">⏳</div>
          <div class="timer-bar">
            <div class="timer-fill"></div>
          </div>
          <div class="timer-text">20s</div>
        </div>
      </div>
      <div class="hud-center">
        <div class="level-display">
          <span class="level-label">第 <span id="level-num">1</span> 关</span>
          <span class="current-char" id="current-char">一</span>
        </div>
      </div>
      <div class="hud-right">
        <div class="score-display">
          <span class="score-label">积分</span>
          <span class="score-value">0</span>
        </div>
        <div class="items-bar" id="items-bar">
          <div class="item-slot" data-item="null"></div>
          <div class="item-slot" data-item="null"></div>
        </div>
      </div>
    </div>

    <div id="radical-collector">
      <div class="collector-title">部首收集</div>
      <div class="radical-slots" id="radical-slots"></div>
    </div>

    <div id="draw-modal" class="modal hidden">
      <div class="modal-content">
        <div class="draw-header">
          <div class="target-radical" id="target-radical">一</div>
          <div class="draw-hint">按住鼠标描摹部首</div>
        </div>
        <canvas id="draw-canvas"></canvas>
        <div class="draw-footer">
          <button id="draw-cancel" class="cancel-btn">取消</button>
          <button id="draw-submit" class="submit-btn">确认</button>
        </div>
      </div>
    </div>

    <div id="result-panel" class="overlay hidden">
      <div class="screen-content">
        <h2 class="result-title" id="result-title">通关成功!</h2>
        <div class="result-stats">
          <div class="stat-item">
            <span class="stat-label" id="result-label-level">关卡</span>
            <span class="stat-value" id="result-level">第 1 关</span>
          </div>
          <div class="stat-item">
            <span class="stat-label" id="result-label-score">得分</span>
            <span class="stat-value" id="result-score">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label" id="result-label-char">汉字</span>
            <span class="stat-value" id="result-char">一</span>
          </div>
        </div>
        <div class="collected-section">
          <div class="collected-label" id="result-collected-label">收集汉字</div>
          <div class="collected-list" id="collected-chars-result"></div>
        </div>
        <div class="reward-section">
          <div class="reward-label">获得道具</div>
          <div class="reward-item" id="reward-item">✒️</div>
        </div>
        <button id="next-level-btn" class="game-btn">下一关</button>
      </div>
    </div>

    <div id="game-over" class="overlay hidden">
      <div class="screen-content">
        <h2 class="game-over-title">游戏结束</h2>
        <div class="final-score">
          <span class="final-label">最终得分</span>
          <span class="final-value">0</span>
        </div>
        <div class="collected-chars">
          <span class="collected-label">收集汉字</span>
          <div class="collected-list"></div>
        </div>
        <button id="restart-btn" class="game-btn">重新开始</button>
      </div>
    </div>

    <div id="boss-merge" class="overlay hidden">
      <div class="boss-merge-content">
        <div class="char-reveal" id="char-reveal">一</div>
        <div class="merge-text">BOSS 合体!</div>
      </div>
    </div>

    <div id="damage-popup" class="popup"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
