let activePatient = null;
let activeStep = 1;

/* ===== Render Patient List ===== */
function renderPatientList(){
  const el = document.getElementById('patientList');
  el.innerHTML = patients.map((p,i) => {
    let dotClass = p.step===p.maxStep ? 'done' : (p.risk==='🔴'?'risk':'wip');
    let dotText = p.step===p.maxStep ? '✓' : p.step;
    return `<div class="patient-item${activePatient===i?' active':''}" onclick="selectPatient(${i})">
      <div class="pn">${p.name} <span style="font-size:10px;color:#6c7086">#${p.id}</span></div>
      <div class="pd">${p.diag}</div>
      <div class="pd">步骤 ${p.step}/7 · ${p.risk}</div>
      <div class="step-dot ${dotClass}">${dotText}</div>
    </div>`;
  }).join('');
}

/* ===== Render Progress Bar ===== */
function renderProgressBar(){
  const max = activePatient!=null ? patients[activePatient].maxStep : 7;
  const done = activePatient!=null ? patients[activePatient].stepsDone : [];
  let html = '';
  for(let i=1;i<=max;i++){
    const isActive = activeStep===i;
    const isDone = done.includes(i);
    html += `<div class="progress-step${isActive?' active':''}${isDone?' done':''}" onclick="goStep(${i})">
      <div class="ps-num">${isDone?'✓':i}</div>${i<=7?['采集','入院','检查','手术','病程','记录','出院'][i-1]:''}
    </div>`;
    if(i<max) html += '<div class="progress-arrow">→</div>';
  }
  document.getElementById('progressBar').innerHTML = html || '<span style="color:#6c7086;font-size:12px">请选择患者</span>';
}

/* ===== Select Patient ===== */
function selectPatient(idx){
  activePatient = idx;
  const p = patients[idx];
  activeStep = p.step;
  renderPatientList();
  renderProgressBar();
  renderStep();
  renderSelfCheck();
  renderDecisionAid();
}

function goStep(s){
  if(activePatient===null) return;
  const p = patients[activePatient];
  if(!p.stepsDone.includes(s) && s > Math.max(...p.stepsDone)) return; // can't skip ahead
  activeStep = s;
  renderProgressBar();
  renderStep();
  renderSelfCheck();
  renderDecisionAid();
  document.getElementById('stepDisplay').scrollTop = 0;
}

/* ===== Render Step Content ===== */
function renderStep(){
  const el = document.getElementById('stepDisplay');
  if(activePatient===null){ el.innerHTML = `<div class="empty-state"><div class="es-ic">👈</div><div class="es-text">请从左侧选择一位患者开始</div></div>`; return; }
  const p = patients[activePatient];
  const d = p.data;
  const titles = ['信息采集','入院记录','检查规划','手术计划','病程计划草案','手术记录','出院小结'];
  const step = activeStep;

  let content = `<div class="step-title">步骤 0${step}</div><div class="step-h2">${titles[step-1]}</div>`;

  if(step===1) content += renderStep01(d);
  else if(step===2) content += renderStep02(d,p);
  else if(step===3) content += renderStep03(d);
  else if(step===4) content += renderStep04(d);
  else if(step===5) content += renderStep05(d);
  else if(step===6) content += renderStep06(d);
  else if(step===7) content += renderStep07(d,p);

  el.innerHTML = content;
}

  <div class="step-card"><h4>📂 文书完整性终检</h4>
    ${['00_身份卡.md','01_采集结果.md','02_入院记录草稿.md','03_检查规划.md','04_手术计划.md','05_病程计划草案.md','06_手术记录.md','07_出院小结.md'].map(f=>{
      const done = p.id==='001'?true:p.step>=parseInt(f.charAt(1)||'0');
      return `<div class="checklist-item"><span class="${done?'ck':'cx'}">${done?'✅':'❌'}</span>${f} ${done?'':'— 缺失'}</div>`;
    }).join('')}
  </div>`;
  return html;
}

/* ===== Self-Check Panel ===== */
function renderSelfCheck(){
  const el = document.getElementById('selfCheck');
  if(activePatient===null){ el.innerHTML = '<p style="color:#6c7086;font-size:12px;padding:14px">请先选择患者</p>'; return; }

  const dims = [
    {name:'信息完整性',status:activeStep>=2?'pass':activeStep===1?'warn':'fail'},
    {name:'医学术语规范性',status:activeStep>=2?'pass':'warn'},
    {name:'偏好合规性',status:activeStep>=2?'pass':'warn'},
    {name:'逻辑一致性',status:activeStep>=4?'pass':'warn'},
    {name:'格式规范性',status:activeStep>=2?'pass':'warn'},
  ];
  const labels = {pass:'✓ 通过',warn:'⚠ 待核查',fail:'✗ 失败'};
  el.innerHTML = dims.map(d => {
    return `<div class="sc-item">
      <div class="sc-dot ${d.status}"></div>
      <span class="sc-label">${d.name}</span>
      <span style="margin-left:auto;font-size:10px;color:${d.status==='pass'?'#a6e3a1':d.status==='warn'?'#f9e2af':'#f38ba8'}">${labels[d.status]}</span>
    </div>`;
  }).join('');
}

/* ===== Decision Aid Panel ===== */
function renderDecisionAid(){
  const el = document.getElementById('decisionAid');
  if(activePatient===null){ el.innerHTML = ''; return; }
  const p = patients[activePatient];
  const tips = {
    1:'<p>⚠️ 采集阶段实时预警：若 GCS ≤ 8 → 确认气管插管；若瞳孔不等大 → 排查脑疝；若长期服抗凝药 → 记录末次服药时间+凝血结果。</p>',
    2:`<p>📊 诊断推理链：${p.data.diagBasis.length?p.data.diagBasis[0]:'待分析'}</p><p style="margin-top:6px">⚠️ 信息缺口清单：列出所有【待补充】项并标注影响程度（高/中/低）。</p>`,
    3:'<p>🔬 检查冲突提醒：增强核磁+CTA 需间隔 4h以上。高危患者：肾功能异常→造影剂肾毒性；服二甲双胍→增强后停药48h。</p>',
    4:'<p>⚔️ 手术难度分级：参考占位位置、邻近功能区和血管关系。备血量核验：根据病变血供估算 vs 实际备血量。</p>',
    5:'<p>🕐 关键节点一览：预计拔管日、转出ICU日、出院日。并发症窗口期：0-24h出血、24-72h水肿高锋、3-7d感染/癫痫、7-14d迟发脑积水/DVT。</p>',
    6:'<p>📋 合规提醒：术中出血 > 1000ml → 确认输血记录。标本送检 → 注明冰冻/常规病理。Clavien-Dindo 评级。</p>',
    7:'<p>✅ 出院标准核验（5项逐条检查）。抗癫痫药 → 需写明「不可自行停药」。文书完整性终检 → 核对全部 .md 文件。</p>'
  };
  const tip = tips[activeStep] || '';
  el.innerHTML = `<div class="da-box">
    <div class="da-title">🚨 步骤 0${activeStep} 决策辅助</div>
    <p>${tip}</p>
    ${activeStep===4?'<div class="da-action" onclick="alert(\'演示：若患者拒绝手术 → 04停止 → 调度员通知 → 看板标记「拒绝手术」→ 05/06/07 跳过\')">🖱️ 点击演示：患者拒绝手术流程</div>':''}
  </div>`;
}
