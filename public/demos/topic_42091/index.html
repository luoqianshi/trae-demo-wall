<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>成长星球 · AI 亲子任务激励系统 Demo</title>
<style>
  :root{
    --purple:#7c6cf0;--purple-d:#6a5ae0;--pink:#ff8fb1;--yellow:#ffd45e;
    --green:#4ecb8d;--orange:#ff9f59;--blue:#5ec5ff;--ink:#33305a;--muted:#8e8bb0;
    --bg:#f4f3ff;--card:#ffffff;--shadow:0 10px 24px rgba(108,92,231,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(circle at 15% 10%,#e7e2ff,transparent 40%),radial-gradient(circle at 85% 0%,#ffe4ef,transparent 35%),radial-gradient(circle at 50% 100%,#dff6ff,transparent 45%),#eef0fb;
    display:flex;flex-direction:column;align-items:center;padding:28px 12px 48px;color:var(--ink);}
  .page-title{text-align:center;margin:0 0 4px;font-size:22px;font-weight:800;color:#4a3fb0;}
  .page-sub{margin:0 0 22px;color:#7d79a8;font-size:13px;}
  .phone{position:relative;width:390px;max-width:96vw;height:800px;max-height:88vh;background:#111018;border-radius:54px;padding:14px;
    box-shadow:0 30px 70px rgba(50,40,120,.35),inset 0 0 0 2px #2a2838;}
  .phone::before{content:"";position:absolute;top:16px;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#111018;border-radius:0 0 18px 18px;z-index:30;}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:42px;overflow:hidden;display:flex;flex-direction:column;}
  .statusbar{height:46px;flex:0 0 46px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:14px;font-weight:700;z-index:5;}
  .statusbar .dots{display:flex;gap:5px;align-items:center;}
  .view{flex:1;overflow-y:auto;padding:6px 16px 92px;}
  .view::-webkit-scrollbar{width:0;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;}
  .logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:var(--shadow);}
  .coin{background:linear-gradient(135deg,#fff4cf,#ffe49b);color:#9b6b00;font-weight:800;padding:7px 12px;border-radius:14px;font-size:14px;display:flex;gap:5px;align-items:center;}
  .pill-btn{background:#fff;border:none;border-radius:13px;padding:7px 10px;font-size:14px;box-shadow:var(--shadow);cursor:pointer;}
  .card{background:var(--card);border-radius:22px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px;}
  .sec-title{display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:16px;margin:6px 2px 10px;}
  .sec-title .more{font-size:12px;color:var(--purple);font-weight:600;cursor:pointer;}
  .hero{border-radius:24px;padding:18px;color:#fff;margin-bottom:16px;background:linear-gradient(135deg,#8a7bff,#7c6cf0 55%,#9d8bff);box-shadow:0 14px 30px rgba(124,108,240,.4);position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.12);}
  .hero-top{display:flex;align-items:center;gap:12px;}
  .avatar{width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:26px;}
  .hero h2{margin:0;font-size:19px;}
  .hero p{margin:3px 0 0;font-size:13px;opacity:.92;}
  .streak{position:absolute;right:16px;top:16px;background:rgba(255,255,255,.22);padding:5px 11px;border-radius:13px;font-size:12px;font-weight:700;}
  .stat-row{display:flex;gap:10px;margin-top:16px;}
  .stat{flex:1;background:rgba(255,255,255,.16);border-radius:16px;padding:11px;text-align:center;}
  .stat b{display:block;font-size:21px;}
  .stat span{font-size:11px;opacity:.9;}
  .task{display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;background:#faf9ff;margin-bottom:10px;border:1px solid #f0edff;}
  .task .ic{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 44px;}
  .task .info{flex:1;min-width:0;}
  .task .info b{font-size:15px;}
  .task .info span{font-size:12px;color:var(--muted);display:block;margin-top:2px;}
  .task .pts{font-size:12px;color:var(--orange);font-weight:800;}
  .chk{width:34px;height:34px;border-radius:50%;border:2px solid #d9d3ff;background:#fff;flex:0 0 34px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;transition:.2s;}
  .chk.done{background:var(--green);border-color:var(--green);}
  .task.done{opacity:.6;}
  .task.done .info b{text-decoration:line-through;}
  .reward-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .reward{background:#fff;border-radius:20px;padding:14px;text-align:center;box-shadow:var(--shadow);border:1px solid #f2efff;}
  .reward .emoji{font-size:38px;}
  .reward b{display:block;font-size:14px;margin:6px 0 2px;}
  .reward .cost{color:#9b6b00;background:#fff4cf;border-radius:11px;padding:3px 0;font-size:12px;font-weight:800;margin:6px 0 10px;}
  .btn{border:none;border-radius:13px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;width:100%;transition:.15s;}
  .btn:active{transform:scale(.96);}
  .btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-d));color:#fff;}
  .btn-soft{background:#efeaff;color:var(--purple);}
  .btn-green{background:linear-gradient(135deg,#5fd49a,var(--green));color:#fff;}
  .btn-line{background:#fff;border:1.5px solid #e6e1ff;color:var(--ink);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn-sm{padding:6px 12px;font-size:12px;width:auto;}
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:74px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-around;padding:0 8px 10px;z-index:10;border-radius:0 0 42px 42px;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:#b3b0cc;cursor:pointer;padding-top:12px;}
  .tab .i{font-size:22px;}
  .tab.active{color:var(--purple);font-weight:700;}
  .tab.center{flex:0 0 auto;color:var(--purple);font-weight:700;}
  .tab.center .i{position:relative;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;margin-top:-30px;box-shadow:0 10px 20px rgba(255,143,177,.55);border:4px solid #fff;transition:.18s;}
  .tab.center:active .i{transform:scale(.92);}
  .tab.center.child .i{background:linear-gradient(135deg,#ff9ec4,#ff7aa8);box-shadow:0 10px 20px rgba(255,122,168,.55);}
  .tab.center.parent .i{background:linear-gradient(135deg,#7c6cf0,#6a5ae0);box-shadow:0 10px 20px rgba(124,108,240,.5);}
  .tab.center .dot{position:absolute;top:-2px;right:-2px;min-width:20px;height:20px;padding:0 5px;border-radius:11px;background:#ff4d6d;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
  .tab.center .label{font-size:11px;margin-top:5px;}
  .login{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px 26px;text-align:center;background:radial-gradient(circle at 50% 20%,#efeaff,transparent 60%);}
  .login .big-logo{width:84px;height:84px;border-radius:26px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:var(--shadow);margin-bottom:16px;}
  .login h1{margin:0;font-size:26px;}
  .login .slogan{color:var(--muted);font-size:13px;margin:8px 0 30px;}
  .role-card{width:100%;background:#fff;border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid transparent;transition:.18s;text-align:left;}
  .role-card:active{transform:scale(.98);}
  .role-card .rc-ic{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;flex:0 0 56px;}
  .role-card h3{margin:0;font-size:17px;}
  .role-card p{margin:3px 0 0;font-size:12px;color:var(--muted);}
  .badge-row{display:flex;gap:10px;flex-wrap:wrap;}
  .badge{width:60px;text-align:center;}
  .badge .b-ic{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#fff0c4,#ffd45e);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 4px;box-shadow:0 6px 14px rgba(255,212,94,.4);}
  .badge.lock .b-ic{background:#eee;filter:grayscale(1);opacity:.5;}
  .badge span{font-size:10px;color:var(--muted);}
  .bar{height:8px;border-radius:8px;background:#eee;overflow:hidden;margin-top:8px;}
  .bar>i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--green),#7be0ad);}
  .ai-fab{position:absolute;right:16px;bottom:88px;width:56px;height:56px;border-radius:50%;z-index:12;cursor:pointer;background:linear-gradient(135deg,#9d8bff,#7c6cf0);box-shadow:0 10px 22px rgba(124,108,240,.5);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .ai-tip{background:linear-gradient(135deg,#f3f0ff,#fff);border:1px solid #e7e1ff;border-radius:18px;padding:14px;display:flex;gap:10px;margin-bottom:14px;}
  .ai-tip .ava{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#9d8bff,#7c6cf0);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 38px;}
  .ai-tip .txt{font-size:13px;line-height:1.6;}
  .ai-tip .txt b{color:var(--purple);}
  .mask{position:absolute;inset:0;background:rgba(40,30,80,.45);z-index:40;display:none;align-items:flex-end;border-radius:42px;}
  .mask.show{display:flex;}
  .sheet{width:100%;background:#fff;border-radius:26px 26px 42px 42px;padding:20px 18px 26px;max-height:84%;overflow-y:auto;animation:up .25s ease;}
  @keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .sheet h3{margin:2px 0 14px;font-size:18px;text-align:center;}
  .field{margin-bottom:12px;}
  .field label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid #e8e3ff;border-radius:13px;padding:11px;font-size:14px;font-family:inherit;background:#faf9ff;}
  .row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;background:#faf9ff;margin-bottom:10px;border:1px solid #f0edff;}
  .row .ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 42px;}
  .row .info{flex:1;min-width:0;}
  .row .info b{font-size:14px;}
  .row .info span{font-size:12px;color:var(--muted);display:block;margin-top:2px;}
  .tag{font-size:10px;font-weight:800;padding:3px 8px;border-radius:9px;}
  .tag.wait{background:#fff3da;color:#c98200;}
  .tag.ok{background:#e3f8ee;color:#1f9d62;}
  .tag.no{background:#ffe6e6;color:#d65151;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
  .seg{display:flex;background:#efeaff;border-radius:14px;padding:4px;margin-bottom:14px;}
  .seg button{flex:1;border:none;background:transparent;padding:9px;border-radius:11px;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer;}
  .seg button.active{background:#fff;color:var(--purple);box-shadow:0 3px 8px rgba(124,108,240,.15);}
  .toast{position:absolute;left:50%;top:60px;transform:translateX(-50%);background:rgba(51,48,90,.95);color:#fff;padding:11px 20px;border-radius:14px;font-size:13px;z-index:60;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;top:72px;}
  .role-switch{font-size:11px;color:var(--purple);background:#efeaff;border-radius:10px;padding:5px 9px;border:none;cursor:pointer;font-weight:700;}
</style>
</head>
<body>
  <h1 class="page-title">成长星球 · AI 亲子任务激励系统</h1>
  <p class="page-sub">Demo 演示 · 家长端 / 孩子端 · 移动端体验</p>

  <div class="phone">
    <div class="screen">
      <div class="statusbar"><span>9:41</span><span class="dots"><span>●●●</span> 📶 🔋</span></div>

      <div id="view-login" class="login">
        <div class="big-logo">🪐</div>
        <h1>成长星球</h1>
        <p class="slogan">AI 帮你把目标变成孩子愿意完成的小任务</p>
        <div class="role-card" onclick="loginAs('child')">
          <div class="rc-ic" style="background:linear-gradient(135deg,#ffe3ef,#ffc6dc)">🧒</div>
          <div><h3>我是小朋友</h3><p>完成任务 · 赚积分 · 换奖励</p></div>
        </div>
        <div class="role-card" onclick="loginAs('parent')">
          <div class="rc-ic" style="background:linear-gradient(135deg,#e3ecff,#c6d8ff)">👩‍👧</div>
          <div><h3>我是家长</h3><p>布置任务 · 设奖励 · 看成长</p></div>
        </div>
        <p style="font-size:11px;color:#b3b0cc;margin-top:16px;">点击任意角色即可体验 Demo</p>
      </div>

      <div id="app" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div id="view" class="view"></div>
        <div id="aiFab" class="ai-fab" onclick="openAI()">🐻</div>
        <div id="tabbar" class="tabbar"></div>
      </div>

      <div id="mask" class="mask" onclick="if(event.target===this)closeSheet()"><div id="sheet" class="sheet"></div></div>
      <div id="toast" class="toast"></div>
    </div>
  </div>

<script>
const state={
  role:null,tab:'home',
  child:{name:'朵朵',age:8,avatar:'🦊',points:1280,streak:7,level:5},
  tasks:[
    {id:1,icon:'📖',color:'#ffe3ef',title:'阅读绘本 15 分钟',desc:'选一个喜欢的角色讲给妈妈听',pts:10,done:true},
    {id:2,icon:'🦷',color:'#e3f1ff',title:'认真刷牙',desc:'早晚各一次，每次 2 分钟',pts:5,done:true},
    {id:3,icon:'🎒',color:'#fff3da',title:'整理书包',desc:'检查明天要带的东西',pts:8,done:false},
    {id:4,icon:'🏃',color:'#e3f8ee',title:'跳绳 100 下',desc:'给身体充充电',pts:10,done:false},
    {id:5,icon:'🍚',color:'#f0e9ff',title:'帮忙摆碗筷',desc:'当一次家庭小帮手',pts:6,done:false},
  ],
  rewards:[
    {id:1,emoji:'🍦',title:'冰淇淋一个',cost:120},
    {id:2,emoji:'🎬',title:'动画时间 30 分钟',cost:200},
    {id:3,emoji:'🧸',title:'选一个小玩具',cost:500},
    {id:4,emoji:'🎡',title:'周末游乐园',cost:1000},
    {id:5,emoji:'📚',title:'新的故事书',cost:300},
    {id:6,emoji:'👑',title:'当一天家庭小队长',cost:150},
  ],
  approvals:[{id:1,emoji:'🎬',title:'动画时间 30 分钟',cost:200,status:'wait',time:'今天 18:20'}],
  history:[
    {type:'task',icon:'📖',title:'完成「阅读绘本 15 分钟」',pts:'+10',time:'今天 08:30'},
    {type:'task',icon:'🦷',title:'完成「认真刷牙」',pts:'+5',time:'今天 08:05'},
    {type:'redeem',icon:'🍦',title:'兑换「冰淇淋一个」',pts:'-120',time:'昨天 19:10'},
    {type:'task',icon:'🏃',title:'完成「跳绳 100 下」',pts:'+10',time:'昨天 17:40'},
  ],
  badges:[
    {ic:'📚',name:'阅读之星',got:true},{ic:'🔥',name:'7天坚持',got:true},
    {ic:'🏃',name:'运动达人',got:true},{ic:'🌟',name:'全勤宝贝',got:false},{ic:'👑',name:'自律小王',got:false},
  ]
};
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function closeSheet(){$('mask').classList.remove('show');}
function openSheet(h){$('sheet').innerHTML=h;$('mask').classList.add('show');}
function loginAs(r){state.role=r;state.tab='home';$('view-login').style.display='none';$('app').style.display='flex';render();}
function logout(){state.role=null;$('app').style.display='none';$('view-login').style.display='flex';}
function switchRole(){const n=state.role==='child'?'parent':'child';loginAs(n);toast(n==='child'?'已切换到孩子端':'已切换到家长端');}
function go(t){state.tab=t;render();$('view').scrollTop=0;}
function aiTip(html){return `<div class="ai-tip"><div class="ava">🐻</div><div class="txt">${html}</div></div>`;}

function render(){state.role==='child'?renderChild():renderParent();renderTabbar();}

function renderChild(){
  const c=state.child,v=$('view');let html='';
  html+=`<div class="topbar"><div class="brand"><div class="logo">🪐</div>成长星球</div>
    <div style="display:flex;gap:8px;align-items:center;"><div class="coin">🪙 ${c.points}</div>
    <button class="pill-btn" onclick="logout()">🚪</button></div></div>`;
  if(state.tab==='home'){
    const d=state.tasks.filter(t=>t.done).length,goal=Math.round(d/state.tasks.length*100);
    html+=`<div class="hero"><div class="streak">🔥 ${c.streak} 天</div>
      <div class="hero-top"><div class="avatar">${c.avatar}</div>
      <div><h2>嗨，${c.name} 👋</h2><p>今天也要元气满满哦！Lv.${c.level} 成长中</p></div></div>
      <div class="stat-row"><div class="stat"><b>${c.points}</b><span>我的积分</span></div>
      <div class="stat"><b>${d}/${state.tasks.length}</b><span>今日任务</span></div>
      <div class="stat"><b>${goal}%</b><span>今日目标</span></div></div></div>`;
    html+=aiTip(`<b>AI 成长助手：</b>${c.name}今天已经完成 ${d} 个任务啦！再完成「整理书包」就能点亮 <b>自律小王</b> 徽章，加油！`);
    html+=`<div class="sec-title">今日任务 <span class="more" onclick="go('tasks')">全部 →</span></div>`;
    state.tasks.slice(0,3).forEach(t=>html+=taskItem(t));
    html+=`<div class="sec-title">我的徽章</div><div class="card"><div class="badge-row">`;
    state.badges.forEach(b=>html+=`<div class="badge ${b.got?'':'lock'}"><div class="b-ic">${b.ic}</div><span>${b.name}</span></div>`);
    html+=`</div></div>`;
  }
  if(state.tab==='tasks'){
    html+=`<div class="sec-title">今日任务清单</div>`;
    html+=aiTip(`<b>AI 助手提示：</b>建议先做最简单的「认真刷牙」热热身，再挑战「跳绳 100 下」，更容易坚持下来～`);
    html+=`<div class="card">`;state.tasks.forEach(t=>html+=taskItem(t));html+=`</div>`;
  }
  if(state.tab==='rewards'){
    html+=`<div class="hero" style="background:linear-gradient(135deg,#ffb36b,#ff8fb1)">
      <div class="hero-top"><div class="avatar">🪙</div>
      <div><h2>奖励商店</h2><p>我有 ${c.points} 积分，看看能换什么～</p></div></div></div>`;
    html+=aiTip(`<b>AI 助手：</b>你最近坚持运动很棒！比起零食，要不要把积分攒起来换「周末游乐园」呢？妈妈也会更开心哦～`);
    html+=`<div class="reward-grid">`;
    state.rewards.forEach(r=>{const can=c.points>=r.cost;
      html+=`<div class="reward"><div class="emoji">${r.emoji}</div><b>${r.title}</b>
      <div class="cost">${r.cost} 积分</div>
      <button class="btn ${can?'btn-primary':'btn-soft'}" ${can?'':'disabled'} onclick="redeem(${r.id})">${can?'兑换':'积分不足'}</button></div>`;});
    html+=`</div>`;
  }
  if(state.tab==='history')html+=historyView();
  v.innerHTML=html;
}
function taskItem(t){return `<div class="task ${t.done?'done':''}"><div class="ic" style="background:${t.color}">${t.icon}</div>
  <div class="info"><b>${t.title}</b><span>${t.desc}</span><span class="pts">+${t.pts} 积分</span></div>
  <div class="chk ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div></div>`;}
function toggleTask(id){const t=state.tasks.find(x=>x.id===id);
  if(t.done){t.done=false;state.child.points-=t.pts;state.history=state.history.filter(h=>h.title!==`完成「${t.title}」`);}
  else{t.done=true;state.child.points+=t.pts;state.history.unshift({type:'task',icon:t.icon,title:`完成「${t.title}」`,pts:'+'+t.pts,time:'刚刚'});toast(`🎉 太棒了！+${t.pts} 积分`);}
  render();}
function redeem(id){const r=state.rewards.find(x=>x.id===id);if(state.child.points<r.cost)return;
  state.approvals.unshift({id:Date.now(),emoji:r.emoji,title:r.title,cost:r.cost,status:'wait',time:'刚刚'});
  openSheet(`<h3>🎁 兑换申请已提交</h3><div style="text-align:center;font-size:54px;margin:6px 0;">${r.emoji}</div>
    <p style="text-align:center;color:var(--muted);font-size:14px;">「${r.title}」需要 <b>${r.cost}</b> 积分<br>已发送给家长审批，通过后积分才会扣除哦～</p>
    <button class="btn btn-primary" style="margin-top:14px;" onclick="closeSheet()">好的</button>`);}

function renderParent(){
  const c=state.child,v=$('view');let html='';
  html+=`<div class="topbar"><div class="brand"><div class="logo">🪐</div>成长星球</div>
    <div style="display:flex;gap:8px;align-items:center;"><button class="role-switch" onclick="switchRole()">切到孩子端</button>
    <button class="pill-btn" onclick="logout()">🚪</button></div></div>`;
  if(state.tab==='home'){
    const d=state.tasks.filter(t=>t.done).length,w=state.approvals.filter(a=>a.status==='wait').length;
    html+=`<div class="hero" style="background:linear-gradient(135deg,#6f8bff,#7c6cf0)">
      <div class="hero-top"><div class="avatar">${c.avatar}</div>
      <div><h2>${c.name}的成长面板</h2><p>${c.age}岁 · Lv.${c.level} · 连续打卡 ${c.streak} 天</p></div></div>
      <div class="stat-row"><div class="stat"><b>${d}/${state.tasks.length}</b><span>今日完成</span></div>
      <div class="stat"><b>${c.points}</b><span>当前积分</span></div>
      <div class="stat"><b>${w}</b><span>待审批</span></div></div></div>`;
    html+=aiTip(`<b>AI 成长助手周报：</b>本周${c.name}阅读和运动习惯最稳定，建议把「整理书包」积分稍微提高，强化责任感。${c.name}对说教比较敏感，多用鼓励式表达效果更好。`);
    html+=`<div class="sec-title">快捷管理</div><div class="reward-grid">
      <div class="reward"><div class="emoji">📝</div><b>任务管理</b><div style="height:6px"></div><button class="btn btn-soft" onclick="go('tasks')">去设置</button></div>
      <div class="reward"><div class="emoji">🎁</div><b>奖励管理</b><div style="height:6px"></div><button class="btn btn-soft" onclick="go('rewards')">去设置</button></div>
      <div class="reward"><div class="emoji">✅</div><b>兑换审批</b><div style="height:6px"></div><button class="btn btn-soft" onclick="go('approve')">${w>0?w+' 条待处理':'查看'}</button></div>
      <div class="reward"><div class="emoji">📊</div><b>成长记录</b><div style="height:6px"></div><button class="btn btn-soft" onclick="go('history')">查看</button></div></div>`;
    html+=`<div class="sec-title" style="margin-top:6px;">今日任务进度</div><div class="card"><div class="bar"><i style="width:${d/state.tasks.length*100}%"></i></div>
      <p style="font-size:12px;color:var(--muted);margin:10px 0 0;">已完成 ${d} / ${state.tasks.length} 个任务</p></div>`;
  }
  if(state.tab==='tasks'){
    html+=`<div class="sec-title">任务管理 <span class="more" onclick="openTaskForm()">+ 新建任务</span></div>`;
    html+=aiTip(`<b>AI 建议任务：</b>根据${c.name}（${c.age}岁，想培养自律）推荐：「睡前自己准备好衣物」「每天主动说一句感谢」。点下方按钮一键采纳。`);
    html+=`<div style="margin-bottom:14px;display:flex;gap:8px;">
      <button class="btn btn-green btn-sm" onclick="aiAddTask('🌙','睡前准备好衣物',8)">+ 睡前准备衣物</button>
      <button class="btn btn-green btn-sm" onclick="aiAddTask('💝','主动说一句感谢',5)">+ 表达感谢</button></div>`;
    html+=`<div class="card">`;
    state.tasks.forEach(t=>html+=`<div class="row"><div class="ic" style="background:${t.color}">${t.icon}</div>
      <div class="info"><b>${t.title}</b><span>${t.desc} · +${t.pts}分</span></div>
      <button class="btn btn-line btn-sm" onclick="delTask(${t.id})">删除</button></div>`);
    html+=`</div>`;
  }
  if(state.tab==='rewards'){
    html+=`<div class="sec-title">奖励管理 <span class="more" onclick="openRewardForm()">+ 新建奖励</span></div>`;
    html+=aiTip(`<b>AI 提醒：</b>奖励里物质类偏多，建议增加亲子陪伴型奖励（如「一起做蛋糕」），对孩子心理成长更健康。`);
    html+=`<button class="btn btn-green btn-sm" style="margin-bottom:14px;" onclick="aiAddReward('🍰','一起做一次蛋糕',400)">+ 采纳：一起做蛋糕</button>`;
    html+=`<div class="card">`;
    state.rewards.forEach(r=>html+=`<div class="row"><div class="ic" style="background:#fff4cf">${r.emoji}</div>
      <div class="info"><b>${r.title}</b><span>${r.cost} 积分</span></div>
      <button class="btn btn-line btn-sm" onclick="delReward(${r.id})">删除</button></div>`);
    html+=`</div>`;
  }
  if(state.tab==='approve'){
    html+=`<div class="sec-title">兑换审批</div>`;
    const w=state.approvals.filter(a=>a.status==='wait');
    if(!w.length)html+=`<div class="empty">🎉 暂无待审批的兑换申请</div>`;
    w.forEach(a=>html+=`<div class="card"><div class="row" style="background:#fff;border:none;margin:0;padding:0;">
      <div class="ic" style="background:#fff4cf">${a.emoji}</div>
      <div class="info"><b>${a.title}</b><span>${a.cost} 积分 · ${a.time}</span></div><span class="tag wait">待审批</span></div>
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button class="btn btn-line" onclick="approve(${a.id},false)">暂不</button>
        <button class="btn btn-green" onclick="approve(${a.id},true)">通过</button></div></div>`);
    const done=state.approvals.filter(a=>a.status!=='wait');
    if(done.length){html+=`<div class="sec-title" style="margin-top:6px;">已处理</div>`;
      done.forEach(a=>html+=`<div class="row"><div class="ic" style="background:#f3f0ff">${a.emoji}</div>
        <div class="info"><b>${a.title}</b><span>${a.cost} 积分</span></div>
        <span class="tag ${a.status==='ok'?'ok':'no'}">${a.status==='ok'?'已通过':'已拒绝'}</span></div>`);}
  }
  if(state.tab==='history')html+=historyView();
  v.innerHTML=html;
}
function openTaskForm(){openSheet(`<h3>📝 新建任务</h3>
  <div class="field"><label>任务名称</label><input id="f_title" placeholder="例如：练琴 20 分钟"/></div>
  <div class="field"><label>任务说明</label><input id="f_desc" placeholder="给孩子一句温柔的说明"/></div>
  <div class="field"><label>积分奖励</label><input id="f_pts" type="number" value="10"/></div>
  <button class="btn btn-primary" onclick="saveTask()">保存任务</button>`);}
function saveTask(){const title=$('f_title').value.trim()||'新任务',desc=$('f_desc').value.trim()||'加油完成它～',pts=parseInt($('f_pts').value)||5;
  state.tasks.push({id:Date.now(),icon:'⭐',color:'#f0e9ff',title,desc,pts,done:false});closeSheet();render();toast('已添加任务');}
function aiAddTask(icon,title,pts){state.tasks.push({id:Date.now(),icon,color:'#e3f8ee',title,desc:'AI 推荐 · 培养自律责任感',pts,done:false});render();toast('已采纳 AI 推荐任务');}
function delTask(id){state.tasks=state.tasks.filter(t=>t.id!==id);render();toast('已删除');}
function openRewardForm(){openSheet(`<h3>🎁 新建奖励</h3>
  <div class="field"><label>奖励名称</label><input id="r_title" placeholder="例如：亲子骑行一次"/></div>
  <div class="field"><label>所需积分</label><input id="r_cost" type="number" value="200"/></div>
  <button class="btn btn-primary" onclick="saveReward()">保存奖励</button>`);}
function saveReward(){const title=$('r_title').value.trim()||'新奖励',cost=parseInt($('r_cost').value)||100;
  state.rewards.push({id:Date.now(),emoji:'🎈',title,cost});closeSheet();render();toast('已添加奖励');}
function aiAddReward(emoji,title,cost){state.rewards.push({id:Date.now(),emoji,title,cost});render();toast('已采纳 AI 推荐奖励');}
function delReward(id){state.rewards=state.rewards.filter(r=>r.id!==id);render();toast('已删除');}
function approve(id,ok){const a=state.approvals.find(x=>x.id===id);
  if(ok){if(state.child.points<a.cost){toast('孩子积分不足，无法通过');return;}
    state.child.points-=a.cost;a.status='ok';
    state.history.unshift({type:'redeem',icon:a.emoji,title:`兑换「${a.title}」`,pts:'-'+a.cost,time:'刚刚'});toast('已通过，积分已扣除');}
  else{a.status='no';toast('已拒绝该申请');}render();}

function historyView(){
  let html=`<div class="sec-title">成长记录</div>
    <div class="seg"><button class="active" onclick="filterHist(this,'all')">全部</button>
    <button onclick="filterHist(this,'task')">任务</button>
    <button onclick="filterHist(this,'redeem')">兑换</button></div><div id="histList" class="card">`;
  state.history.forEach(h=>html+=histRow(h));html+=`</div>`;return html;
}
function histRow(h){const add=h.pts.startsWith('+');
  return `<div class="row" data-type="${h.type}"><div class="ic" style="background:${add?'#e3f8ee':'#fff4cf'}">${h.icon}</div>
    <div class="info"><b>${h.title}</b><span>${h.time}</span></div>
    <b style="color:${add?'var(--green)':'var(--orange)'}">${h.pts}</b></div>`;}
function filterHist(btn,type){[...btn.parentNode.children].forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  $('histList').querySelectorAll('.row').forEach(r=>r.style.display=(type==='all'||r.dataset.type===type)?'':'none');}

function openAI(){
  const c=state.child;let body;
  if(state.role==='child'){
    body=`<div class="ai-tip" style="margin:0 0 12px;"><div class="ava">🐻</div>
      <div class="txt">嗨 ${c.name}！我是你的成长小助手。你今天超棒哒，想让我帮你做什么？</div></div>
      <button class="btn btn-soft" style="margin-bottom:10px;" onclick="aiReply('我不想做任务')">😣 我不太想做任务</button>
      <button class="btn btn-soft" style="margin-bottom:10px;" onclick="aiReply('我想要更多积分')">🪙 怎么赚更多积分？</button>
      <button class="btn btn-soft" onclick="aiReply('给我加油')">💪 给我加加油</button>
      <div id="aiAns" style="margin-top:14px;"></div>`;
  }else{
    body=`<div class="ai-tip" style="margin:0 0 12px;"><div class="ava">🐻</div>
      <div class="txt">我是 AI 成长助手，可以帮你拆解目标、推荐奖励、优化和孩子的沟通方式。</div></div>
      <button class="btn btn-soft" style="margin-bottom:10px;" onclick="aiReply('孩子不写作业很生气')">💬 孩子不写作业，我该怎么说？</button>
      <button class="btn btn-soft" style="margin-bottom:10px;" onclick="aiReply('帮我拆解目标')">🎯 把「更自律」拆成任务</button>
      <button class="btn btn-soft" onclick="aiReply('本周成长分析')">📊 看本周成长分析</button>
      <div id="aiAns" style="margin-top:14px;"></div>`;
  }
  openSheet(`<h3>🤖 AI 成长助手</h3>${body}`);
}
function aiReply(q){
  const c=state.child;
  const map={
    '我不想做任务':`没关系呀～我们先做最简单的「认真刷牙」就好，完成一个就能点亮一颗星星 ⭐ 要不要先试试这个？`,
    '我想要更多积分':`完成今日任务最快啦！现在还差「整理书包」「跳绳」「摆碗筷」，全部完成今天就能 +24 积分 🪙`,
    '给我加油':`${c.name}已经连续坚持 ${c.streak} 天啦，超级厉害！再坚持 3 天就能解锁「自律小王」徽章，我相信你！💪`,
    '孩子不写作业很生气':`试试把命令换成邀请：「今天的学习任务还差最后一步，完成后就能点亮学习徽章，要不要先从最简单的一项开始？」更温和也更有效哦。`,
    '帮我拆解目标':`「更自律」可以拆成：① 睡前自己准备好衣物（+8）② 早上闹钟响后自己起床（+5）③ 写作业前先列今日计划（+6）。要我一键加入任务吗？`,
    '本周成长分析':`本周${c.name}完成率 86%，阅读、运动最稳定；「整理书包」偶有遗漏。建议：稍微提高该任务积分，并多用鼓励式表达，避免说教。`,
  };
  $('aiAns').innerHTML=`<div class="ai-tip"><div class="ava">🐻</div><div class="txt">${map[q]||'我在的，慢慢说～'}</div></div>`;
}

function renderTabbar(){
  const tb=$('tabbar');let tabs;
  if(state.role==='child'){
    tabs=[{k:'home',i:'🏠',t:'首页'},{k:'tasks',i:'📋',t:'任务'},
      {k:'rewards',i:'🎁',t:'换奖励',center:true,role:'child'},{k:'history',i:'📊',t:'记录'},{k:'_logout',i:'🚪',t:'退出'}];
  }else{
    const w=state.approvals.filter(a=>a.status==='wait').length;
    tabs=[{k:'home',i:'🏠',t:'面板'},{k:'tasks',i:'📝',t:'任务'},
      {k:'approve',i:'🛎️',t:'审批',center:true,role:'parent',badge:w},{k:'rewards',i:'🎁',t:'奖励'},{k:'history',i:'📊',t:'记录'}];
  }
  tb.innerHTML=tabs.map(t=>{
    if(t.center){
      const dot=t.badge?`<span class="dot">${t.badge}</span>`:'';
      return `<div class="tab center ${t.role}" onclick="go('${t.k}')"><div class="i">${t.i}${dot}</div><span class="label">${t.t}</span></div>`;
    }
    if(t.k==='_logout')return `<div class="tab" onclick="logout()"><div class="i">${t.i}</div>${t.t}</div>`;
    return `<div class="tab ${state.tab===t.k?'active':''}" onclick="go('${t.k}')"><div class="i">${t.i}</div>${t.t}</div>`;
  }).join('');
}
</script>
</body>
</html>
