<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史对话模拟器 - Chat History</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
  background: #181d27;
  color: #979aa5;
  height: 100vh;
  overflow: hidden;
  display: flex;
  font-size: 14px;
}

.sidebar {
  width: 260px;
  background: #232a36;
  border-right: 1px solid #2e3544;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  height: 48px;
  flex-shrink: 0;
}

.solo-logo {
  height: 28px;
  width: auto;
  display: block;
}

.sidebar-divider {
  width: 1px;
  height: 24px;
  background: #2e3544;
  margin-left: 2px;
}

.new-task-btn {
  margin: 4px 12px 8px;
  padding: 8px 12px;
  background: transparent;
  border: 1px solid #2e3544;
  border-radius: 8px;
  color: #d0d2d9;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  transition: background 0.1s;
  font-family: inherit;
}

.new-task-btn:hover {
  background: #29303d;
}

.new-task-btn .plus-icon {
  font-size: 16px;
  color: #32c391;
  font-weight: 300;
  line-height: 1;
}

.new-task-btn .shortcut {
  margin-left: auto;
  font-size: 11px;
  color: #565c66;
}

.task-count {
  padding: 4px 16px 6px;
  font-size: 12px;
  color: #565c66;
}

.conversation-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 6px 8px;
}

.conversation-list::-webkit-scrollbar { width: 4px; }
.conversation-list::-webkit-scrollbar-track { background: transparent; }
.conversation-list::-webkit-scrollbar-thumb { background: #2e3544; border-radius: 2px; }

.conv-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.1s;
}

.conv-item:hover { background: #29303d; }
.conv-item.active { background: #29303d; }

.conv-status {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.status-icon {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.status-done {
  background: url("TASK_ICON_B64") center/contain no-repeat;
  background-size: 18px 18px;
}

.status-interrupted {
  background: #3a4150;
  color: #747985;
  font-size: 12px;
  font-weight: 500;
}

.conv-title {
  font-size: 13px;
  color: #d0d2d9;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  line-height: 1.4;
}

.conv-meta {
  margin-left: 28px;
  font-size: 11px;
  color: #565c66;
  margin-top: 4px;
  line-height: 1.3;
}

.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #181d27;
  min-width: 0;
}

.chat-header {
  height: 48px;
  padding: 0 16px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #2e3544;
  gap: 8px;
  flex-shrink: 0;
}

.project-name {
  font-size: 14px;
  font-weight: 500;
  color: #d0d2d9;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}

.project-name .chevron {
  font-size: 9px;
  color: #565c66;
}

.header-spacer { flex: 1; }

.header-btn {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: #979aa5;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
  padding: 0;
}

.header-btn:hover { background: #29303d; color: #d0d2d9; }

.header-bot-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-bot-icon img {
  width: 20px;
  height: 20px;
  object-fit: contain;
}

.header-avatar-section {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 4px;
}

.user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  border: 2px solid #2e3544;
}

.user-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.online-dot {
  position: absolute;
  bottom: -1px;
  right: -1px;
  width: 9px;
  height: 9px;
  background: #32c391;
  border-radius: 50%;
  border: 2px solid #181d27;
}

.user-name {
  font-size: 13px;
  color: #d0d2d9;
  font-weight: 500;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
}

.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #2e3544; border-radius: 3px; }

.messages-inner {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 24px;
  height: 100%;
}

.message {
  margin-bottom: 24px;
  display: flex;
  gap: 12px;
}

.message.user {
  flex-direction: column;
  align-items: flex-end;
  position: relative;
}

.message.assistant {
  flex-direction: row;
}

.message-avatar {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.message.user .message-avatar {
  display: none;
}

.message.assistant .message-avatar {
  background: transparent;
  border: none;
}

.message.assistant .message-avatar img {
  width: 20px;
  height: 20px;
  object-fit: contain;
}

.message-content {
  min-width: 0;
}

.message.user .message-content {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  max-width: 75%;
}

.message.assistant .message-content {
  flex: 1;
  max-width: calc(100% - 48px);
}

.message-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.message.user .message-header {
  flex-direction: row;
  gap: 8px;
}

.message-role {
  font-size: 13px;
  font-weight: 400;
  color: #d0d2d9;
}

.message-time {
  font-size: 12px;
  color: #565c66;
}

.header-user-avatar {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  overflow: hidden;
  flex-shrink: 0;
}

.header-user-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.message-bubble-wrapper {
  display: inline-block;
  position: relative;
}

.message.user .message-bubble-wrapper {
  position: relative;
}

.message-actions {
  position: absolute;
  right: 100%;
  top: 3px;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-right: 6px;
}

.action-btn {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  border: none;
  background: transparent;
  color: #5b6270;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  padding: 0;
  flex-shrink: 0;
  opacity: 0;
  pointer-events: none;
}

.action-btn svg {
  display: block;
  width: 14px;
  height: 14px;
  pointer-events: none;
  shape-rendering: crispEdges;
}

.action-btn.recall-btn {
  opacity: 1;
  pointer-events: auto;
}

.action-btn.recall-btn svg {
  width: 13px;
  height: 13px;
}

.message.user:hover .action-btn {
  opacity: 1;
  pointer-events: auto;
}

.action-btn:hover {
  background: #2d3545;
  color: #b0b4bc;
}

.message-bubble {
  font-size: 14px;
  line-height: 1.65;
  word-wrap: break-word;
}

.message.user .message-bubble {
  background: #2a3140;
  padding: 10px 14px;
  border-radius: 12px;
}

.message.user .message-bubble .md-content {
  color: #e4e6eb;
}

.message.assistant .message-bubble {
  background: transparent;
  padding: 0;
}

.md-content {
  font-size: 14px;
  line-height: 1.65;
  color: #979aa5;
}

.md-content p { margin-bottom: 10px; }
.md-content p:last-child { margin-bottom: 0; }

.md-content h1, .md-content h2, .md-content h3, .md-content h4 {
  color: #d0d2d9;
  font-weight: 600;
  margin: 18px 0 10px;
}

.md-content h1 { font-size: 20px; }
.md-content h2 { font-size: 17px; }
.md-content h3 { font-size: 15px; }
.md-content h4 { font-size: 14px; }

.md-content ul, .md-content ol { margin: 10px 0; padding-left: 22px; }
.md-content li { margin: 4px 0; }
.md-content strong { color: #e3b341; font-weight: 600; }

.md-content blockquote {
  border-left: 3px solid #32c391;
  padding: 6px 14px;
  margin: 10px 0;
  background: rgba(50, 195, 145, 0.08);
  border-radius: 0 6px 6px 0;
  color: #747985;
}

.md-content blockquote p:last-child { margin-bottom: 0; }
.md-content hr { border: none; border-top: 1px solid #2e3544; margin: 16px 0; }

.inline-code {
  background: #29303d;
  color: #e85058;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
}

.code-block {
  margin: 12px 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #2e3544;
}

.code-header {
  padding: 8px 12px;
  background: #1d232e;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: #565c66;
}

.code-lang { color: #32c391; font-weight: 500; }

.code-copy {
  background: none;
  border: none;
  color: #565c66;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-family: inherit;
  transition: all 0.15s;
}

.code-copy:hover { background: #29303d; color: #d0d2d9; }

.code-content {
  padding: 12px;
  background: #232a36;
  overflow-x: auto;
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
  color: #979aa5;
}

.code-content::-webkit-scrollbar { height: 4px; }
.code-content::-webkit-scrollbar-thumb { background: #2e3544; border-radius: 2px; }

.md-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  border: 1px solid #2e3544;
  border-radius: 8px;
  overflow: hidden;
  font-size: 13px;
}

.md-content th {
  background: #1d232e;
  color: #d0d2d9;
  font-weight: 600;
  text-align: left;
  padding: 8px 12px;
  border: 1px solid #2e3544;
}

.md-content td {
  padding: 8px 12px;
  border: 1px solid #2e3544;
  color: #979aa5;
  vertical-align: top;
}

.md-content tr:nth-child(even) td { background: rgba(24, 29, 39, 0.5); }
.md-content td .inline-code { font-size: 12px; }

.input-area {
  padding: 10px 24px 14px;
  border-top: 1px solid #2e3544;
  flex-shrink: 0;
}

.input-wrapper {
  max-width: 760px;
  margin: 0 auto;
  background: #1d232e;
  border: 1px solid #2e3544;
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.15s;
}

.input-wrapper:focus-within { border-color: #32c391; box-shadow: 0 0 0 1px rgba(50, 195, 145, 0.15); }

.input-header {
  padding: 8px 14px 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.input-header .at-label {
  color: #32c391;
  font-size: 13px;
  font-weight: 500;
}

.input-header-bot-icon {
  display: flex;
  align-items: center;
  margin-right: 2px;
}

.input-header-bot-icon img {
  width: 16px;
  height: 16px;
  object-fit: contain;
}

.input-box {
  width: 100%;
  background: transparent;
  border: none;
  padding: 6px 14px 10px;
  color: #d0d2d9;
  font-size: 13px;
  font-family: inherit;
  resize: none;
  outline: none;
  min-height: 36px;
  max-height: 140px;
  line-height: 1.5;
}

.input-box::placeholder { color: #565c66; }

.input-footer {
  padding: 4px 10px 8px;
  display: flex;
  align-items: center;
  gap: 2px;
}

.input-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: #565c66;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.1s;
  padding: 0;
  font-family: inherit;
}

.input-btn:hover { background: #29303d; color: #d0d2d9; }

.input-btn-text {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: #565c66;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.1s;
  font-family: inherit;
  white-space: nowrap;
}

.input-btn-text:hover { background: #29303d; color: #d0d2d9; }

.input-btn-text svg {
  width: 16px;
  height: 16px;
}

.input-divider {
  width: 1px;
  height: 18px;
  background: #2e3544;
  margin: 0 4px;
}

.input-footer-spacer { flex: 1; }

.model-selector {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  background: transparent;
  border: none;
  border-radius: 6px;
  color: #565c66;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  margin-right: 2px;
}

.model-selector:hover { background: #29303d; color: #d0d2d9; }

.send-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  background: #32c391;
  color: #181d27;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
  padding: 0;
}

.send-btn:hover { background: #40d49f; }

.send-btn:disabled {
  background: #24403e;
  color: #2c5e4f;
  cursor: not-allowed;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-bottom: 60px;
}

.empty-logo-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 24px;
}

.empty-logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.empty-logo-icon {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.empty-logo-icon img {
  width: 26px;
  height: 26px;
  object-fit: contain;
}

.empty-logo-text {
  font-size: 22px;
  font-weight: 700;
  color: #d0d2d9;
  line-height: 22px;
}

.empty-subtitle {
  font-size: 14px;
  color: #565c66;
  margin-bottom: 20px;
}

.empty-features {
  list-style: none;
  padding: 0;
  margin: 0 0 20px;
}

.empty-features li {
  font-size: 13px;
  color: #979aa5;
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

.empty-features li .check-icon {
  width: 16px;
  height: 16px;
  color: #32c391;
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2e3544; border-radius: 3px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <img class="solo-logo" src="SOLO_ICON_B64" alt="SOLO">
  </div>

  <button class="new-task-btn" onclick="showWelcome()">
    <span class="plus-icon">+</span>
    <span>新任务</span>
    <span class="shortcut">Ctrl+Alt+N</span>
  </button>

  <div class="task-count">任务 <span id="taskCount">0</span></div>

  <div class="conversation-list" id="convList"></div>
</div>

<div class="main-area">
  <div class="chat-header">
    <div class="project-name" id="projectNameDisplay">
      历史对话记录
      <span class="chevron">▼</span>
    </div>
    <div class="header-spacer"></div>
    <button class="header-btn" title="新会话" onclick="showWelcome()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="header-btn" title="搜索">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="header-bot-icon">
      <img src="AGENT_ICON_B64" alt="Agent">
    </div>
    <div class="header-avatar-section">
      <div class="user-avatar">
        <img src="ICON_B64_PLACEHOLDER" alt="avatar">
        <div class="online-dot"></div>
      </div>
      <span class="user-name">作者：纳米物语</span>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="messages-inner" id="messagesInner">
      <div class="empty-state" id="emptyState">
        <div class="empty-logo-section">
          <div class="empty-logo-row">
            <div class="empty-logo-icon">
              <img src="SOLO_AGENT_EMPTY_B64" alt="SOLO Agent">
            </div>
            <span class="empty-logo-text">历史对话模拟器</span>
          </div>
          <div class="empty-subtitle">回顾项目开发过程中的重要对话记录</div>
          <ul class="empty-features">
            <li><span class="check-icon">✓</span>自动解析 MD 会话文档，生成结构化对话界面</li>
            <li><span class="check-icon">✓</span>支持 Markdown 渲染，包含代码块、表格、列表等</li>
            <li><span class="check-icon">✓</span>工作区 ID 变更后的临时过渡方案，无需后端服务</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <div class="input-header">
        <span class="input-header-bot-icon">
          <img src="AGENT_ICON_B64" alt="Agent">
        </span>
        <span class="at-label">@历史对话模拟器</span>
      </div>
      <textarea class="input-box" id="inputBox" placeholder="这是一个只读的对话查看界面，用于回顾历史开发记录" rows="1" disabled></textarea>
      <div class="input-footer">
        <button class="input-btn" title="@提及">@</button>
        <button class="input-btn" title="文件">#</button>
        <button class="input-btn" title="图片">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
        <div class="input-divider"></div>
        <div class="input-footer-spacer"></div>
        <button class="model-selector">
          <span>只读模式</span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="send-btn" disabled title="只读">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script type="application/json" id="conversations-data">__DATA_PLACEHOLDER__</script>
<script>
var conversationsData = [];
var currentConv = null;
var userAvatarB64 = 'ICON_B64_PLACEHOLDER';
var agentIconB64 = 'AGENT_ICON_B64';
var soloAgentEmptyB64 = 'SOLO_AGENT_EMPTY_B64';

function escapeHtml(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

function parseMarkdown(text) {
  if (!text) return '';
  text = String(text);

  var codeBlocks = [];
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
    var idx = codeBlocks.length;
    var processed = code.replace(/\s+$/, '');
    codeBlocks.push({ lang: lang || 'Code', code: processed });
    return '\x00CODE' + idx + '\x00';
  });

  var inlineCodes = [];
  text = text.replace(/`([^`]+)`/g, function(match, code) {
    var idx = inlineCodes.length;
    inlineCodes.push(code);
    return '\x00ICODE' + idx + '\x00';
  });

  var bolds = [];
  text = text.replace(/\*\*(.+?)\*\*/g, function(match, content) {
    var idx = bolds.length;
    bolds.push(content);
    return '\x00BOLD' + idx + '\x00';
  });

  var italics = [];
  text = text.replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, function(match, prefix, content) {
    var idx = italics.length;
    italics.push(content);
    return prefix + '\x00ITALIC' + idx + '\x00';
  });

  var links = [];
  text = text.replace(/\[(.+?)\]\((.+?)\)/g, function(match, text2, url) {
    var idx = links.length;
    links.push({ text: text2, url: url });
    return '\x00LINK' + idx + '\x00';
  });

  var tables = [];
  var tableRegex = /((?:^\|.*\|\s*$\n?)+)/gm;
  text = text.replace(tableRegex, function(match) {
    var idx = tables.length;
    tables.push(renderTableRaw(match, inlineCodes, bolds, italics, links));
    return '\x00TABLE' + idx + '\x00';
  });

  text = escapeHtml(text);

  text = text.replace(/\x00ICODE(\d+)\x00/g, function(match, idx) {
    return '<code class="inline-code">' + escapeHtml(inlineCodes[parseInt(idx)]) + '</code>';
  });

  text = text.replace(/\x00BOLD(\d+)\x00/g, function(match, idx) {
    return '<strong>' + escapeHtml(bolds[parseInt(idx)]) + '</strong>';
  });

  text = text.replace(/\x00ITALIC(\d+)\x00/g, function(match, idx) {
    return '<em>' + escapeHtml(italics[parseInt(idx)]) + '</em>';
  });

  text = text.replace(/\x00LINK(\d+)\x00/g, function(match, idx) {
    var link = links[parseInt(idx)];
    return '<a href="' + escapeHtml(link.url) + '" target="_blank" style="color:#32c391;text-decoration:none;">' + escapeHtml(link.text) + '</a>';
  });

  text = text.replace(/\x00TABLE(\d+)\x00/g, function(match, idx) {
    return tables[parseInt(idx)];
  });

  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');

  text = text.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  text = text.replace(/^---+$/gm, '<hr>');

  text = text.replace(/^\s*[-*+]\s+(.+)$/gm, '<li class="ul-item">$1</li>');
  text = text.replace(/^\s*(\d+)\.\s+(.+)$/gm, '<li class="ol-item">$2</li>');

  text = text.replace(/(<li class="ul-item">.*<\/li>\n?)+/g, function(match) {
    return '<ul>' + match.replace(/class="ul-item"/g, '') + '</ul>';
  });
  text = text.replace(/(<li class="ol-item">.*<\/li>\n?)+/g, function(match) {
    return '<ol>' + match.replace(/class="ol-item"/g, '') + '</ol>';
  });

  text = text.split(/\n\n+/).map(function(p) {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<ol') ||
        p.startsWith('<blockquote') || p.startsWith('<hr') ||
        p.startsWith('<table') || p.startsWith('<div class="code-block"') || p.startsWith('\x00CODE')) {
      return p;
    }
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).filter(Boolean).join('\n');

  text = text.replace(/\x00CODE(\d+)\x00/g, function(match, idx) {
    var block = codeBlocks[parseInt(idx)];
    return '<div class="code-block">' +
      '<div class="code-header">' +
        '<span class="code-lang">' + escapeHtml(block.lang) + '</span>' +
        '<button class="code-copy" onclick="copyCode(this)">复制</button>' +
      '</div>' +
      '<pre class="code-content"><code>' + escapeHtml(block.code) + '</code></pre>' +
    '</div>';
  });

  return text;
}

function renderInlineRaw(cellText, inlineCodes, bolds, italics, links) {
  return cellText
    .replace(/\x00ICODE(\d+)\x00/g, function(m, i) {
      return '<code class="inline-code">' + escapeHtml(inlineCodes[parseInt(i)]) + '</code>';
    })
    .replace(/\x00BOLD(\d+)\x00/g, function(m, i) {
      return '<strong>' + escapeHtml(bolds[parseInt(i)]) + '</strong>';
    })
    .replace(/\x00ITALIC(\d+)\x00/g, function(m, i) {
      return '<em>' + escapeHtml(italics[parseInt(i)]) + '</em>';
    })
    .replace(/\x00LINK(\d+)\x00/g, function(m, i) {
      var l = links[parseInt(i)];
      return '<a href="' + escapeHtml(l.url) + '" target="_blank" style="color:#32c391;text-decoration:none;">' + escapeHtml(l.text) + '</a>';
    });
}

function renderTableRaw(tableText, inlineCodes, bolds, italics, links) {
  var lines = tableText.trim().split('\n');
  var rows = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (line.startsWith('|') && line.endsWith('|')) {
      line = line.slice(1, -1);
    }
    var cells = line.split('|').map(function(c) { return c.trim(); });
    var isSeparator = cells.every(function(c) { return /^[-:\s]+$/.test(c); });
    if (isSeparator) continue;
    rows.push(cells);
  }
  if (rows.length === 0) return tableText;
  var html = '<table>';
  for (var r = 0; r < rows.length; r++) {
    var tag = r === 0 ? 'th' : 'td';
    html += '<tr>';
    for (var c = 0; c < rows[r].length; c++) {
      html += '<' + tag + '>' + renderInlineRaw(rows[r][c], inlineCodes, bolds, italics, links) + '</' + tag + '>';
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

function copyCode(btn) {
  var codeBlock = btn.closest('.code-block');
  var code = codeBlock.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(function() {
    btn.textContent = '已复制';
    setTimeout(function() { btn.textContent = '复制'; }, 2000);
  });
}

function formatTime(ts) {
  if (!ts) return '';
  var d = new Date(ts * 1000);
  var hours = d.getHours().toString().padStart(2, '0');
  var minutes = d.getMinutes().toString().padStart(2, '0');
  var month = (d.getMonth() + 1).toString().padStart(2, '0');
  var day = d.getDate().toString().padStart(2, '0');
  return month + '月' + day + '日 ' + hours + ':' + minutes;
}

function getStatusIcon(conv) {
  if (conv.status === 'interrupted' || conv.status === '任务中断') {
    return '<span class="status-icon status-interrupted">−</span>';
  }
  return '<span class="status-icon status-done"></span>';
}

function getStatusText(conv) {
  if (conv.status === 'interrupted' || conv.status === '任务中断') {
    return '任务中断';
  }
  return '任务完成';
}

function renderConversationList() {
  var list = document.getElementById('convList');
  list.innerHTML = '';

  var convs = conversationsData.slice().sort(function(a, b) {
    return (b.timestamp || 0) - (a.timestamp || 0);
  });

  document.getElementById('taskCount').textContent = convs.length;

  convs.forEach(function(conv) {
    var item = document.createElement('div');
    item.className = 'conv-item' + (currentConv && currentConv.id === conv.id ? ' active' : '');
    item.innerHTML =
      '<div class="conv-status">' +
        getStatusIcon(conv) +
        '<span class="conv-title" title="' + escapeHtml(conv.title) + '">' + escapeHtml(conv.title) + '</span>' +
      '</div>' +
      '<div class="conv-meta">' + getStatusText(conv) + ' · ' + escapeHtml(conv.time_str || formatTime(conv.timestamp)) + '</div>';
    item.onclick = function() { openConversation(conv); };
    list.appendChild(item);
  });
}

function getBotAvatarHtml() {
  return '<img src="' + agentIconB64 + '" alt="Agent">';

function openConversation(conv) {
  currentConv = conv;
  renderConversationList();
  renderMessages();

function init() {
  var dataEl = document.getElementById('conversations-data');
  try {
    var parsed = JSON.parse(dataEl.textContent);
    conversationsData = parsed.conversations || [];
  } catch(e) {
    console.error('Failed to parse conversations data:', e);
    conversationsData = [];
  }

  renderConversationList();

  var inputBox = document.getElementById('inputBox');
  inputBox.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 140) + 'px';
  });
}
