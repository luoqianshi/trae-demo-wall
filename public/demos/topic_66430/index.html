<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 一周穿搭规划师</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EEE6;
    --bg-soft:#EAE4D9;
    --card:#FBF9F4;
    --card-2:#F6F2EA;
    --ink:#3A352E;
    --ink-soft:#6B6358;
    --ink-mute:#9A9082;
    --line:#E2DBCD;
    --rose:#C7A99E;
    --sage:#A7B19C;
    --terra:#C2997D;
    --blue:#8FA0AE;
    --plum:#A896A0;
    --shadow:0 1px 2px rgba(58,53,46,.04),0 8px 24px rgba(58,53,46,.06);
    --shadow-lg:0 2px 4px rgba(58,53,46,.05),0 18px 48px rgba(58,53,46,.10);
    --radius:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:"Noto Sans SC",system-ui,-apple-system,sans-serif;font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased}
  body{
    background:
      radial-gradient(1200px 600px at 85% -5%, rgba(199,169,158,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 30%, rgba(167,177,156,.16), transparent 55%),
      var(--bg);
    min-height:100vh;
  }
  .wrap{max-width:1280px;margin:0 auto;padding:36px 28px 80px}
  .serif{font-family:"Cormorant Garamond","Noto Serif SC",serif}

  /* ---------- Header ---------- */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;padding-bottom:28px;border-bottom:1px solid var(--line);margin-bottom:34px}
  .brand{display:flex;flex-direction:column;gap:6px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
  .eyebrow::before{content:"";width:24px;height:1px;background:var(--terra)}
  h1{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-weight:600;font-size:clamp(34px,5vw,52px);line-height:1.05;letter-spacing:-.01em}
  h1 .accent{font-style:italic;color:var(--terra);font-weight:500}
  .sub{color:var(--ink-soft);font-size:14px;max-width:520px;margin-top:4px}

  .btn-main{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--ink);color:#FBF9F4;border:none;cursor:pointer;
    padding:15px 26px;border-radius:999px;font-family:inherit;font-size:14px;font-weight:500;letter-spacing:.02em;
    transition:transform .25s ease,box-shadow .25s ease,background .25s ease;
    box-shadow:var(--shadow);
  }
  .btn-main:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);background:#2c2822}
  .btn-main:active{transform:translateY(0)}
  .btn-main .dot{width:8px;height:8px;border-radius:50%;background:var(--terra);box-shadow:0 0 0 0 rgba(194,153,125,.6);animation:pulse 2s infinite}
  .btn-main.loading{pointer-events:none;opacity:.85}
  .btn-main.loading .dot{animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(194,153,125,.6)}70%{box-shadow:0 0 0 10px rgba(194,153,125,0)}100%{box-shadow:0 0 0 0 rgba(194,153,125,0)}}

  /* ---------- Section ---------- */
  section{margin-bottom:38px}
  .sec-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
  .sec-title{display:flex;align-items:baseline;gap:12px}
  .sec-title .num{font-family:"Cormorant Garamond",serif;font-style:italic;color:var(--terra);font-size:18px}
  .sec-title h2{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-weight:600;font-size:22px;letter-spacing:.01em}
  .sec-title .cn{color:var(--ink-mute);font-size:13px;font-weight:400}
  .toggle{background:none;border:1px solid var(--line);color:var(--ink-soft);cursor:pointer;padding:7px 14px;border-radius:999px;font-size:12px;font-family:inherit;transition:all .2s}
  .toggle:hover{border-color:var(--terra);color:var(--terra)}

  /* ---------- Wardrobe ---------- */
  .wardrobe{overflow:hidden;transition:max-height .5s ease,opacity .35s ease;max-height:2000px}
  .wardrobe.collapsed{max-height:0;opacity:0;margin-bottom:-18px}
  .closet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
  .closet-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px 14px;display:flex;flex-direction:column;gap:10px;transition:transform .25s,box-shadow .25s}
  .closet-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .closet-card .swatch{display:flex;align-items:center;gap:10px}
  .swatch-dot{width:26px;height:26px;border-radius:50%;border:1px solid rgba(0,0,0,.08);box-shadow:inset 0 0 0 2px rgba(255,255,255,.4);flex-shrink:0}
  .swatch-name{font-size:14px;font-weight:500}
  .closet-card .meta{display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:10.5px;padding:3px 8px;border-radius:6px;background:var(--card-2);color:var(--ink-soft);letter-spacing:.02em}
  .tag.type-上衣{background:rgba(199,169,158,.22);color:#8a6f64}
  .tag.type-下装{background:rgba(167,177,156,.22);color:#6b7560}
  .tag.type-外套{background:rgba(143,160,174,.22);color:#5d6f7d}
  .tag.type-配饰{background:rgba(168,150,160,.22);color:#735d68}
  .closet-card .icon{font-size:22px}

  /* ---------- Weather ---------- */
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
  .day{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .25s,box-shadow .25s;border-top:3px solid transparent}
  .day:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .day .wk{font-size:11px;letter-spacing:.18em;color:var(--ink-mute);text-transform:uppercase}
  .day .dt{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:600;line-height:1}
  .day .wico{font-size:26px;line-height:1}
  .day .temp{font-size:13px;color:var(--ink-soft);font-weight:400}
  .day .temp b{color:var(--ink);font-weight:500}
  .occ-chip{margin-top:4px;background:var(--card-2);border:1px solid transparent;border-radius:999px;padding:5px 12px;font-size:12px;color:var(--ink-soft);cursor:pointer;transition:all .2s;user-select:none}
  .occ-chip:hover{border-color:var(--terra);color:var(--terra)}
  .occ-chip:active{transform:scale(.96)}

  /* ---------- Results ---------- */
  .empty{border:1.5px dashed var(--line);border-radius:var(--radius);padding:70px 24px;text-align:center;color:var(--ink-mute);background:repeating-linear-gradient(45deg,transparent,transparent 14px,rgba(226,219,205,.25) 14px,rgba(226,219,205,.25) 28px)}
  .empty .em{font-size:40px;margin-bottom:12px;opacity:.7}
  .empty p{font-size:14px}
  .empty .hint{font-family:"Cormorant Garamond",serif;font-style:italic;color:var(--terra);font-size:16px;margin-top:6px}

  .outfits{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
  .outfit{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .35s ease,box-shadow .35s ease,opacity .4s;opacity:0;transform:translateY(16px)}
  .outfit.show{opacity:1;transform:translateY(0)}
  .outfit:hover{box-shadow:var(--shadow-lg)}
  .outfit-head{padding:14px 16px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(180deg,var(--card-2),var(--card))}
  .outfit-head .l{display:flex;flex-direction:column;gap:2px}
  .outfit-head .wk{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:600;line-height:1.1}
  .outfit-head .dt{font-size:11px;color:var(--ink-mute);letter-spacing:.05em}
  .outfit-head .r{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
  .outfit-head .wico{font-size:18px}
  .outfit-head .occ{font-size:11px;color:var(--terra);font-weight:500}
  .outfit-body{padding:14px 16px;display:flex;flex-direction:column;gap:11px;flex:1}
  .piece{display:flex;align-items:center;gap:11px}
  .piece .pdot{width:22px;height:22px;border-radius:50%;border:1px solid rgba(0,0,0,.08);flex-shrink:0;box-shadow:inset 0 0 0 2px rgba(255,255,255,.45)}
  .piece .pinfo{display:flex;flex-direction:column;gap:1px;min-width:0}
  .piece .ptype{font-size:10px;color:var(--ink-mute);letter-spacing:.08em;text-transform:uppercase}
  .piece .pname{font-size:13px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .outfit-foot{padding:11px 16px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .swatch-row{display:flex;gap:5px}
  .swatch-row span{width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,.08)}
  .swap-btn{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-family:inherit;font-size:12px;display:inline-flex;align-items:center;gap:5px;padding:5px 4px;border-radius:6px;transition:color .2s}
  .swap-btn:hover{color:var(--terra)}
  .swap-btn:active{transform:scale(.94)}
  .swap-btn.spinning .ico{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .loading-bar{height:2px;background:linear-gradient(90deg,transparent,var(--terra),transparent);background-size:200% 100%;animation:slide 1.2s linear infinite;border-radius:2px;margin:0 0 4px}
  @keyframes slide{0%{background-position:200% 0}100%{background-position:-200% 0}}

  footer{text-align:center;color:var(--ink-mute);font-size:12px;padding-top:30px;border-top:1px solid var(--line);margin-top:30px}
  footer .serif{font-style:italic;color:var(--terra)}

  /* ---------- 场合下拉菜单 ---------- */
  .occ-menu{position:fixed;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px;display:flex;flex-direction:column;gap:2px;z-index:80;min-width:110px;opacity:0;transform:translateY(-6px) scale(.97);pointer-events:none;transition:opacity .18s ease,transform .18s ease}
  .occ-menu.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  .occ-menu button{background:none;border:none;cursor:pointer;text-align:left;padding:8px 14px;border-radius:8px;font-family:inherit;font-size:12.5px;color:var(--ink-soft);transition:background .15s,color .15s}
  .occ-menu button:hover{background:var(--card-2);color:var(--ink)}
  .occ-menu button.active{color:var(--terra);font-weight:500;background:rgba(194,153,125,.12)}
  .occ-chip.active{border-color:var(--terra);color:var(--terra)}

  /* ---------- 换一套过渡 ---------- */
  .outfit.swapping{opacity:0;transform:translateY(10px) scale(.97);transition:opacity .32s ease,transform .32s ease}

  /* ---------- 无解状态 ---------- */
  .no-fit{padding:30px 16px;text-align:center;color:var(--ink-mute);font-size:13px}
  .no-fit .ico{font-size:30px;display:block;margin-bottom:8px;opacity:.55}

  /* ---------- 内联提示 ---------- */
  .inline-notice{max-height:0;overflow:hidden;opacity:0;transition:max-height .3s ease,opacity .3s ease;padding:0 16px;text-align:center;color:var(--terra);font-size:12px}
  .inline-notice.show{max-height:40px;opacity:1;padding:6px 16px}

  /* responsive */
  @media (max-width:860px){
    .wrap{padding:24px 16px 60px}
    .week{grid-template-columns:repeat(7,minmax(120px,1fr));overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
    .day{min-width:108px}
    header{align-items:flex-start}
  }
  @media (max-width:520px){
    .closet-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    .outfits{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="eyebrow">Weekly · Wardrobe · Weather</span>
      <h1>AI 一周穿搭<span class="accent">规划师</span></h1>
      <p class="sub">根据一周天气与日程场合，从你的衣橱里智能匹配每日搭配。清爽、得体、不重复。</p>
    </div>
    <button class="btn-main" id="genBtn">
      <span class="dot"></span>
      <span id="genTxt">生成一周穿搭</span>
    </button>
  </header>

  <!-- 衣柜 -->
  <section>
    <div class="sec-head">
      <div class="sec-title">
        <span class="num">01</span>
        <h2>My Closet</h2>
        <span class="cn">示例衣橱 · <span id="closetCount">0</span> 件</span>
      </div>
      <button class="toggle" id="closetToggle">收起</button>
    </div>
    <div class="wardrobe" id="wardrobe">
      <div class="closet-grid" id="closetGrid"></div>
    </div>
  </section>

  <!-- 天气日程 -->
  <section>
    <div class="sec-head">
      <div class="sec-title">
        <span class="num">02</span>
        <h2>Weekly Forecast</h2>
        <span class="cn">一周天气与日程 · 点击场合可切换</span>
      </div>
    </div>
    <div class="week" id="week"></div>
  </section>

  <!-- 穿搭结果 -->
  <section>
    <div class="sec-head">
      <div class="sec-title">
        <span class="num">03</span>
        <h2>Styled Looks</h2>
        <span class="cn">AI 搭配方案</span>
      </div>
    </div>
    <div id="resultArea">
      <div class="empty">
        <div class="em">☂</div>
        <p>还没有搭配方案</p>
        <p class="hint">点击上方「生成一周穿搭」开始</p>
      </div>
    </div>
  </section>

  <footer>
    <span class="serif">Dress with intention.</span> · 本地规则匹配 · Demo 演示
  </footer>
</div>

<script>
/* ============ 数据：颜色映射 ============ */
const COLOR_HEX = {
  '白色':'#F2EFE8','黑色':'#2E2A26','米色':'#E6DAC4','灰色':'#B6B0A6',
  '燕麦色':'#D8C9AC','灰蓝色':'#8E9DAF','驼色':'#C09A6E','深蓝色':'#33414F',
  '卡其色':'#BDB280','藏青':'#2B3950','焦糖色':'#B5723E','雾霾蓝':'#9FB0BC',
  '酒红':'#7E4450','墨绿':'#4F5D45','浅粉':'#E0CFC4'
};
const isLight = c => ['#F2EFE8','#E6DAC4','#D8C9AC','#E0CFC4','#BDB280'].includes(COLOR_HEX[c]||'');

/* ============ 数据：衣柜 ============ */
const WARDROBE = [
  // 上衣
  {id:'u1', name:'白色棉质衬衫',  type:'上衣', color:'白色',  material:'棉',  seasons:['春','夏','秋'], occasions:['通勤','约会']},
  {id:'u2', name:'黑色针织毛衣',  type:'上衣', color:'黑色',  material:'羊毛',seasons:['秋','冬'],     occasions:['通勤','休闲']},
  {id:'u3', name:'燕麦色亚麻T恤', type:'上衣', color:'燕麦色',material:'亚麻',seasons:['夏'],         occasions:['休闲','运动']},
  {id:'u4', name:'灰蓝丝绸衬衫',  type:'上衣', color:'灰蓝色',material:'丝绸',seasons:['春','夏','秋'],occasions:['通勤','约会']},
  {id:'u5', name:'浅粉雪纺衫',    type:'上衣', color:'浅粉',  material:'雪纺',seasons:['春','夏'],     occasions:['约会','聚会']},
  {id:'u6', name:'墨绿针织衫',    type:'上衣', color:'墨绿',  material:'羊毛',seasons:['秋','冬'],     occasions:['休闲','约会']},
  // 下装
  {id:'b1', name:'黑色修身西裤',  type:'下装', color:'黑色',  material:'涤纶',seasons:['春','夏','秋','冬'],occasions:['通勤','约会']},
  {id:'b2', name:'卡其休闲长裤',  type:'下装', color:'卡其色',material:'棉',  seasons:['春','夏','秋','冬'],occasions:['休闲','通勤']},
  {id:'b3', name:'深蓝直筒牛仔',  type:'下装', color:'深蓝色',material:'牛仔',seasons:['春','夏','秋','冬'],occasions:['休闲','约会']},
  {id:'b4', name:'米色半身裙',    type:'下装', color:'米色',  material:'棉',  seasons:['春','夏','秋'],     occasions:['约会','聚会']},
  {id:'b5', name:'藏青阔腿裤',    type:'下装', color:'藏青',  material:'棉',  seasons:['春','夏','秋','冬'],occasions:['通勤','休闲']},
  {id:'b6', name:'灰色运动裤',    type:'下装', color:'灰色',  material:'棉',  seasons:['春','夏','秋','冬'],occasions:['运动','休闲']},
  // 外套
  {id:'o1', name:'驼色长款风衣',  type:'外套', color:'驼色',  material:'棉',  seasons:['春','秋'],     occasions:['通勤','休闲']},
  {id:'o2', name:'黑色西装外套',  type:'外套', color:'黑色',  material:'羊毛',seasons:['春','秋','冬'],occasions:['通勤','约会']},
  {id:'o3', name:'焦糖羊毛大衣',  type:'外套', color:'焦糖色',material:'羊毛',seasons:['冬'],         occasions:['通勤','休闲']},
  {id:'o4', name:'雾霾蓝牛仔夹克',type:'外套', color:'雾霾蓝',material:'牛仔',seasons:['春','秋'],     occasions:['休闲','约会']},
  // 配饰
  {id:'a1', name:'米色羊绒围巾',  type:'配饰', color:'米色',  material:'羊绒',seasons:['秋','冬'],     occasions:['通勤','休闲']},
  {id:'a2', name:'黑色细皮带',    type:'配饰', color:'黑色',  material:'牛皮',seasons:['春','夏','秋','冬'],occasions:['通勤','约会']},
  {id:'a3', name:'酒红丝绒贝雷帽',type:'配饰', color:'酒红',  material:'丝绒',seasons:['秋','冬'],     occasions:['约会','聚会']},
];

const TYPE_ICON = {'上衣':'👔','下装':'👖','外套':'🧥','配饰':'🧣'};
const WEATHER_ICON = {'晴':'☀️','阴':'☁️','雨':'🌧️','雪':'❄️'};
const WEATHER_ACCENT = {'晴':'#E0B872','阴':'#B6B0A6','雨':'#8FA0AE','雪':'#C7A99E'};
const WEEK_CN = ['周一','周二','周三','周四','周五','周六','周日'];
const OCCASIONS = ['通勤','约会','聚会','运动','休闲'];

/* ============ 数据：一周天气日程 ============ */
const WEEK = [
  {date:'07/01', wk:0, weather:'晴', low:12, high:22, occasion:'通勤'},
  {date:'07/02', wk:1, weather:'阴', low:10, high:18, occasion:'通勤'},
  {date:'07/03', wk:2, weather:'雨', low:8,  high:14, occasion:'约会'},
  {date:'07/04', wk:3, weather:'晴', low:15, high:24, occasion:'聚会'},
  {date:'07/05', wk:4, weather:'阴', low:13, high:20, occasion:'通勤'},
  {date:'07/06', wk:5, weather:'晴', low:16, high:26, occasion:'运动'},
  {date:'07/07', wk:6, weather:'雨', low:11, high:17, occasion:'休闲'},
];

/* ============ 渲染：衣柜 ============ */
const closetGrid = document.getElementById('closetGrid');
document.getElementById('closetCount').textContent = WARDROBE.length;
WARDROBE.forEach(it=>{
  const card = document.createElement('div');
  card.className = 'closet-card';
  card.innerHTML = `
    <div class="icon">${TYPE_ICON[it.type]}</div>
    <div class="swatch">
      <span class="swatch-dot" style="background:${COLOR_HEX[it.color]||'#ccc'}"></span>
      <span class="swatch-name">${it.name}</span>
    </div>
    <div class="meta">
      <span class="tag type-${it.type}">${it.type}</span>
      <span class="tag">${it.color}</span>
      <span class="tag">${it.material}</span>
    </div>
    <div class="meta">
      ${it.seasons.map(s=>`<span class="tag">${s}</span>`).join('')}
      ${it.occasions.map(o=>`<span class="tag">${o}</span>`).join('')}
    </div>`;
  closetGrid.appendChild(card);
});
document.getElementById('closetToggle').addEventListener('click', e=>{
  const w = document.getElementById('wardrobe');
  w.classList.toggle('collapsed');
  e.target.textContent = w.classList.contains('collapsed') ? '展开' : '收起';
});

/* ============ 渲染：天气日程 ============ */
const weekEl = document.getElementById('week');
WEEK.forEach((d,i)=>{
  const el = document.createElement('div');
  el.className = 'day';
  el.style.borderTopColor = WEATHER_ACCENT[d.weather]||'';
  el.innerHTML = `
    <span class="wk">${WEEK_CN[d.wk]}</span>
    <span class="dt">${d.date}</span>
    <span class="wico">${WEATHER_ICON[d.weather]}</span>
    <span class="temp"><b>${d.high}°</b> / ${d.low}°</span>
    <span class="occ-chip" data-i="${i}">${d.occasion}</span>`;
  weekEl.appendChild(el);
});
weekEl.addEventListener('click', e=>{
  const chip = e.target.closest('.occ-chip');
  if(!chip) return;
  if(occMenu.classList.contains('show')){ hideOccMenu(); return; }
  showOccMenu(chip, +chip.dataset.i);
});

/* ============ 场合下拉菜单 ============ */
const occMenu = document.createElement('div');
occMenu.className = 'occ-menu';
document.body.appendChild(occMenu);

function showOccMenu(chip, dayIdx){
  const rect = chip.getBoundingClientRect();
  occMenu.style.left = Math.min(rect.left, window.innerWidth - 130) + 'px';
  occMenu.style.top = (rect.bottom + 6) + 'px';
  occMenu.innerHTML = OCCASIONS.map(o=>`<button class="${WEEK[dayIdx].occasion===o?'active':''}" data-o="${o}">${o}</button>`).join('');
  occMenu.classList.add('show');
  occMenu.dataset.i = dayIdx;
  chip.classList.add('active');
}
function hideOccMenu(){
  occMenu.classList.remove('show');
  document.querySelectorAll('.occ-chip.active').forEach(c=>c.classList.remove('active'));
}
occMenu.addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  const i = +occMenu.dataset.i;
  const newOcc = btn.dataset.o;
  hideOccMenu();
  if(WEEK[i].occasion === newOcc) return;
  WEEK[i].occasion = newOcc;
  weekEl.querySelector(`.occ-chip[data-i="${i}"]`).textContent = newOcc;
  // 已生成搭配则重生成该天
  if(currentOutfits.length) regenDay(i);
});
document.addEventListener('click', e=>{
  if(!e.target.closest('.occ-chip') && !e.target.closest('.occ-menu')) hideOccMenu();
});
window.addEventListener('scroll', hideOccMenu, {passive:true});

/* ============ 重新生成某天（场合变化或换一套） ============ */
function regenDay(i){
  const old = currentOutfits[i];
  if(old && old.upper){
    [old.upper, old.lower, old.outer, old.acc].filter(Boolean).forEach(x=>{usedCount[x.id]=Math.max(0,(usedCount[x.id]||1)-1)});
  }
  const newFit = generateForDay(WEEK[i], usedCount, null);
  const card = resultArea.querySelectorAll('.outfit')[i];
  if(card) card.classList.add('swapping');
  setTimeout(()=>{
    currentOutfits[i] = newFit || {upper:null,lower:null,outer:null,acc:null};
    if(newFit){
      [newFit.upper, newFit.lower, newFit.outer, newFit.acc].filter(Boolean).forEach(x=>{usedCount[x.id]=(usedCount[x.id]||0)+1});
    }
    renderOutfits();
  }, 320);
}

/* ============ 内联提示 ============ */
function showInlineNotice(i, msg){
  const card = resultArea.querySelectorAll('.outfit')[i];
  if(!card) return;
  let notice = card.querySelector('.inline-notice');
  if(!notice){
    notice = document.createElement('div');
    notice.className = 'inline-notice';
    const foot = card.querySelector('.outfit-foot');
    if(foot) card.insertBefore(notice, foot); else card.appendChild(notice);
  }
  notice.textContent = msg;
  notice.classList.add('show');
  clearTimeout(notice._t);
  notice._t = setTimeout(()=>notice.classList.remove('show'), 2200);
}

/* ============ 穿搭匹配算法 ============ */
function getSeason(avg){
  if(avg >= 22) return '夏';
  if(avg >= 16) return '春';
  if(avg >= 8)  return '秋';
  return '冬';
}
function pickSeasonOk(item, avg){
  // 季节匹配：冬装不穿在夏天，夏装不穿在冬天；春秋宽容
  const s = getSeason(avg);
  if(s==='夏') return !item.seasons.includes('冬');
  if(s==='冬') return !item.seasons.includes('夏');
  return item.seasons.includes(s);
}
// 颜色协调：按色族判断；中性色百搭，同色族协调，跨色族需中性色过渡
const COLOR_FAMILY = {
  '白色':'中性','黑色':'中性','米色':'中性','灰色':'中性','燕麦色':'中性','卡其色':'中性','驼色':'中性','藏青':'中性',
  '焦糖色':'暖','酒红':'暖','浅粉':'暖',
  '灰蓝色':'冷','深蓝色':'冷','雾霾蓝':'冷',
  '墨绿':'绿'
};
const familyOf = c => COLOR_FAMILY[c] || '其他';
function colorHarmony(a,b){
  const fa = familyOf(a), fb = familyOf(b);
  if(fa==='中性'||fb==='中性') return true;   // 中性百搭
  if(fa===fb) return true;                     // 同色族协调
  if((fa==='暖'&&fb==='绿')||(fa==='绿'&&fb==='暖')) return true; // 暖与绿相邻协调
  return false;
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

// usedCount: 记录每件衣物本周已使用次数（用于避免重复）
function generateForDay(day, usedCount, excludeCombo){
  const avg = (day.low + day.high)/2;
  const needCoat = avg < 16 || day.weather==='雨' || day.weather==='雪';

  // 先按季节+场合过滤；若该类型为空则放宽季节约束（保证 Demo 始终有解）
  const byType = (type) => WARDROBE.filter(i=>i.type===type && i.occasions.includes(day.occasion));
  let uppers = byType('上衣').filter(i=>pickSeasonOk(i,avg));
  uppers = uppers.length ? uppers : byType('上衣');
  let lowers = byType('下装').filter(i=>pickSeasonOk(i,avg));
  lowers = lowers.length ? lowers : byType('下装');
  let outers = [];
  if(needCoat){
    const oc = byType('外套').filter(i=>pickSeasonOk(i,avg));
    outers = oc.length ? oc : byType('外套');
  }
  let accs   = byType('配饰').filter(i=>pickSeasonOk(i,avg));
  accs = accs.length ? accs : byType('配饰');

  // 雨天避开浅色下装（白鞋/浅色易脏）
  if(day.weather==='雨') lowers = lowers.filter(i=>!isLight(i.color));
  // 雪天同样避免浅色
  if(day.weather==='雪') lowers = lowers.filter(i=>!isLight(i.color));

  if(uppers.length===0 || lowers.length===0) return null;

  // 按使用次数升序排列，优先用没穿过的（少重复）
  const byFresh = arr => [...arr].sort((a,b)=>(usedCount[a.id]||0)-(usedCount[b.id]||0));
  uppers = byFresh(uppers); lowers = byFresh(lowers); outers = byFresh(outers); accs = byFresh(accs);

  // 候选组合：先取新鲜度最高的若干件，再随机打乱，保证少重复的同时有变化
  uppers = shuffle(uppers.slice(0, Math.min(uppers.length, 4)));
  lowers = shuffle(lowers.slice(0, Math.min(lowers.length, 4)));

  for(const u of uppers){
    for(const l of lowers){
      if(!colorHarmony(u.color, l.color)) continue;
      const combo = {upper:u, lower:l, outer:null, acc:null};
      // 选外套
      if(needCoat && outers.length){
        // 外套颜色与内搭协调，优先不重复
        const oc = outers.find(o=>colorHarmony(o.color,u.color) || colorHarmony(o.color,l.color)) || outers[0];
        combo.outer = oc;
      }
      // 选配饰：优先与上下装都协调且新鲜，其次任意协调，最后兜底
      if(accs.length){
        const ac = accs.find(a=>colorHarmony(a.color,u.color) && colorHarmony(a.color,l.color) && !(excludeCombo && a.id===excludeCombo.acc?.id))
          || accs.find(a=>colorHarmony(a.color,u.color) && colorHarmony(a.color,l.color))
          || accs.find(a=>!(excludeCombo && a.id===excludeCombo.acc?.id))
          || accs[0];
        combo.acc = ac;
      }
      // 检查是否与已排除组合完全相同
      if(excludeCombo && sameCombo(combo, excludeCombo)) continue;
      return combo;
    }
  }
  // 实在协调不上，退而求其次，忽略颜色协调
  const u = uppers[0], l = lowers[0];
  const combo = {upper:u, lower:l, outer:null, acc:null};
  if(needCoat && outers.length) combo.outer = outers[0];
  if(accs.length) combo.acc = accs[0];
  return combo;
}
function sameCombo(a,b){
  if(!b) return false;
  return a.upper?.id===b.upper?.id && a.lower?.id===b.lower?.id && a.outer?.id===b.outer?.id && a.acc?.id===b.acc?.id;
}

/* ============ 渲染：穿搭结果 ============ */
const resultArea = document.getElementById('resultArea');
let currentOutfits = []; // 当前 7 天搭配
let usedCount = {};       // 本周使用计数

function renderOutfits(){
  resultArea.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'outfits';
  currentOutfits.forEach((fit, i)=>{
    const day = WEEK[i];
    const card = document.createElement('div');
    card.className = 'outfit';
    const swatches = [fit.upper, fit.lower, fit.outer, fit.acc].filter(Boolean).map(x=>`<span style="background:${COLOR_HEX[x.color]||'#ccc'}"></span>`).join('');
    const pieces = [
      ['上衣', fit.upper], ['下装', fit.lower],
      [fit.outer?'外套':'外套', fit.outer],
      ['配饰', fit.acc]
    ].filter(p=>p[1]).map(([t,x])=>`
      <div class="piece">
        <span class="pdot" style="background:${COLOR_HEX[x.color]||'#ccc'}"></span>
        <div class="pinfo"><span class="ptype">${t}</span><span class="pname">${x.name}</span></div>
      </div>`).join('');
    card.innerHTML = `
      <div class="outfit-head">
        <div class="l">
          <span class="wk">${WEEK_CN[day.wk]}</span>
          <span class="dt">${day.date} · ${day.weather} ${day.low}–${day.high}°</span>
        </div>
        <div class="r">
          <span class="wico">${WEATHER_ICON[day.weather]}</span>
          <span class="occ">${day.occasion}</span>
        </div>
      </div>
      <div class="outfit-body">${pieces || '<div class="no-fit"><span class="ico">∅</span>暂无合适搭配<div style="font-size:11px;opacity:.8;margin-top:4px">试试调整该天场合</div></div>'}</div>
      <div class="outfit-foot">
        <div class="swatch-row">${swatches}</div>
        <button class="swap-btn" data-i="${i}"><span class="ico">↻</span> 换一套</button>
      </div>`;
    grid.appendChild(card);
    setTimeout(()=>card.classList.add('show'), i*90);
  });
  resultArea.appendChild(grid);

  // 绑定换一套
  grid.querySelectorAll('.swap-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const i = +btn.dataset.i;
      swapOne(i, btn);
    });
  });
}

function swapOne(i, btn){
  const old = currentOutfits[i];
  // 临时减少该天旧搭配的使用计数，让重选更自由
  if(old && old.upper){
    [old.upper, old.lower, old.outer, old.acc].filter(Boolean).forEach(x=>{ usedCount[x.id] = Math.max(0,(usedCount[x.id]||1)-1) });
  }
  // 传入 old 作为排除组合，避免换一套后还是同一套
  const newFit = generateForDay(WEEK[i], usedCount, old);
  if(!newFit){
    // 无解：恢复旧搭配的使用计数，避免计数泄漏
    if(old && old.upper){
      [old.upper, old.lower, old.outer, old.acc].filter(Boolean).forEach(x=>{ usedCount[x.id]=(usedCount[x.id]||0)+1 });
    }
    showInlineNotice(i, '该天暂无更多合适搭配，试试调整场合');
    return;
  }
  const card = btn.closest('.outfit');
  if(card) card.classList.add('swapping');
  btn.classList.add('spinning');
  setTimeout(()=>{
    currentOutfits[i] = newFit;
    [newFit.upper, newFit.lower, newFit.outer, newFit.acc].filter(Boolean).forEach(x=>{usedCount[x.id]=(usedCount[x.id]||0)+1});
    renderOutfits();
  }, 350);
}

/* ============ 主按钮：生成一周 ============ */
const genBtn = document.getElementById('genBtn');
const genTxt = document.getElementById('genTxt');
genBtn.addEventListener('click', ()=>{
  if(genBtn.classList.contains('loading')) return;
  genBtn.classList.add('loading');
  genTxt.textContent = 'AI 正在搭配中…';
  // 显示 loading 条
  resultArea.innerHTML = '<div class="loading-bar"></div><p style="text-align:center;color:var(--ink-mute);font-size:13px;padding:24px">正在根据天气与场合匹配最佳搭配…</p>';

  setTimeout(()=>{
    usedCount = {};
    currentOutfits = [];
    // 逐天生成，使用计数实时更新以减少重复
    for(let i=0;i<WEEK.length;i++){
      const fit = generateForDay(WEEK[i], usedCount, null);
      if(fit){
        currentOutfits.push(fit);
        [fit.upper, fit.lower, fit.outer, fit.acc].filter(Boolean).forEach(x=>{usedCount[x.id]=(usedCount[x.id]||0)+1});
      } else {
        currentOutfits.push({upper:null,lower:null,outer:null,acc:null});
      }
    }
    renderOutfits();
    genBtn.classList.remove('loading');
    genTxt.textContent = '重新生成一周穿搭';
  }, 900);
});
</script>
