<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>童心智伴 — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF7F2;
  --bg-warm: #F5EDE0;
  --bg-card: #FFFFFF;
  --ink: #2D2A24;
  --ink-soft: #5C574E;
  --muted: #9B9489;
  --accent: #E8825C;
  --accent-soft: #FBE3D6;
  --accent-deep: #C5633E;
  --green: #6B9B6F;
  --green-soft: #D4E8D6;
  --blue: #5B8DBE;
  --blue-soft: #D0E2F0;
  --yellow: #D4A537;
  --yellow-soft: #F5E6B8;
  --pink: #C76B7E;
  --pink-soft: #F0D1D8;
  --red: #D45656;
  --red-soft: #F5D6D6;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 1px 8px rgba(45,42,36,0.05);
  --shadow-md: 0 4px 20px rgba(45,42,36,0.08);
  --font-display: "LXGW WenKai TC", "Noto Sans SC", serif;
  --font-body: "Noto Sans SC", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px 0;
}

/* ===== App Container ===== */
.app {
  width: 100%;
  max-width: 420px;
  background: var(--bg);
  min-height: 600px;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ===== App Header ===== */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
}
.app-header .title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}
.app-header .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
}
.app-header .avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--accent-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}
.app-header .avatar:hover {
  border-color: var(--accent);
  transform: scale(1.05);
}
.app-header .avatar.logged-in {
  background: var(--green-soft);
  border-color: var(--green);
}

/* ===== Modal Overlay ===== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(45,42,36,0.4);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-card {
  background: var(--bg);
  border-radius: 20px;
  width: 100%;
  max-width: 380px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 12px 48px rgba(45,42,36,0.2);
  animation: modalIn 0.3s ease-out;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 12px;
}
.modal-header .m-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
}
.modal-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: none;
  background: var(--bg-warm);
  color: var(--ink-soft);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover { background: var(--pink-soft); color: var(--pink); }
.modal-body { padding: 0 20px 24px; }

/* ===== Auth Forms ===== */
.auth-tabs {
  display: flex;
  gap: 6px;
  background: var(--bg-warm);
  padding: 4px;
  border-radius: 10px;
  margin-bottom: 20px;
}
.auth-tab {
  flex: 1;
  padding: 9px;
  text-align: center;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}
.auth-tab.active {
  background: var(--bg-card);
  color: var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.auth-form { display: none; }
.auth-form.active { display: block; }
.auth-form .form-group { margin-bottom: 14px; }
.auth-form .form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--ink-soft);
  margin-bottom: 5px;
}
.auth-form .form-group label .required { color: var(--accent); }
.auth-form .form-group input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--bg-warm);
  border-radius: 10px;
  font-size: 0.88rem;
  font-family: var(--font-body);
  background: var(--bg-card);
  color: var(--ink);
  transition: border-color 0.2s;
}
.auth-form .form-group input:focus {
  outline: none;
  border-color: var(--accent);
}
.auth-form .form-group .hint {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 3px;
}
.auth-error {
  background: var(--red-soft);
  color: var(--red);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.8rem;
  margin-bottom: 14px;
  display: none;
}
.auth-error.show { display: block; }
.auth-btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 13px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 6px;
}
.auth-btn:hover { background: var(--accent-deep); }
.auth-btn:disabled { background: var(--muted); cursor: not-allowed; }
.auth-divider {
  text-align: center;
  margin: 18px 0;
  font-size: 0.76rem;
  color: var(--muted);
  position: relative;
}
.auth-divider::before, .auth-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 35%;
  height: 1px;
  background: var(--bg-warm);
}
.auth-divider::before { left: 0; }
.auth-divider::after { right: 0; }

/* ===== Profile Page ===== */
.profile-info {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.profile-info .p-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--green-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.2s;
  border: 2px solid transparent;
  background-size: cover;
  background-position: center;
}
.profile-info .p-avatar:hover { border-color: var(--accent); }
.profile-info .p-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
.p-avatar .p-cam {
  position: absolute;
  bottom: -2px; right: -2px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 0.65rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bg-card);
}
.profile-info .p-detail { flex: 1; }
.profile-info .p-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
}
.profile-info .p-email {
  font-size: 0.78rem;
  color: var(--muted);
}
.profile-stats {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.profile-stat {
  flex: 1;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 14px 10px;
  text-align: center;
  box-shadow: var(--shadow);
}
.profile-stat .num {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
}
.profile-stat .label {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 2px;
}
.profile-child {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.profile-child .pc-label {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--ink-soft);
  margin-bottom: 10px;
}
.profile-child .pc-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--bg-warm);
}
.profile-child .pc-item:last-child { border-bottom: none; }
.profile-child .pc-item .pc-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--accent-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}
.profile-child .pc-item .pc-info { flex: 1; }
.profile-child .pc-item .pc-name { font-size: 0.85rem; font-weight: 600; color: var(--ink); }
.profile-child .pc-item .pc-meta { font-size: 0.72rem; color: var(--muted); }
.profile-menu {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.profile-menu-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.2s;
  border-bottom: 1px solid var(--bg-warm);
}
.profile-menu-item:last-child { border-bottom: none; }
.profile-menu-item:hover { background: var(--bg-warm); }
.profile-menu-item .pm-icon { font-size: 1.1rem; }
.profile-menu-item .pm-text { flex: 1; font-size: 0.88rem; color: var(--ink); }
.profile-menu-item .pm-arrow { font-size: 0.8rem; color: var(--muted); }
.logout-btn {
  width: 100%;
  background: var(--red-soft);
  color: var(--red);
  border: none;
  padding: 12px;
  border-radius: 10px;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 16px;
}
.logout-btn:hover { background: var(--red); color: #fff; }

/* ===== Bottom Tab Bar ===== */
.tab-bar {
  display: flex;
  border-bottom: 1px solid rgba(155,148,137,0.12);
  padding: 0 4px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  flex: 1;
  min-width: 0;
  padding: 10px 2px;
  text-align: center;
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
  white-space: nowrap;
}
.tab.active { color: var(--accent); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 24px; height: 3px;
  background: var(--accent);
  border-radius: 2px;
}

/* ===== Tab Content ===== */
.tab-content {
  flex: 1;
  padding: 16px 20px 24px;
  display: none;
}
.tab-content.active { display: block; }

/* ===== Scene Grid ===== */
.section-label {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--ink-soft);
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}
.scene-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.scene-card {
  background: var(--bg-card);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.scene-card:hover { transform: translateY(-1px); }
.scene-card.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.scene-card .emoji { font-size: 1.6rem; display: block; margin-bottom: 4px; }
.scene-card .name { font-size: 0.8rem; font-weight: 600; color: var(--ink); }

/* ===== Form ===== */
.form-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.form-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.form-group {
  flex: 1;
  margin-bottom: 12px;
}
.form-group:last-child { margin-bottom: 0; }
.form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--ink-soft);
  margin-bottom: 5px;
}
.form-group label .required { color: var(--accent); }
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--bg-warm);
  border-radius: 8px;
  font-size: 0.85rem;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-group textarea { resize: none; height: 64px; }
.form-group .hint { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

/* ===== Buttons ===== */
.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 13px;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { background: var(--accent-deep); }
.btn-primary:disabled { background: var(--muted); cursor: not-allowed; }

.btn-ghost {
  background: var(--bg-warm);
  color: var(--ink-soft);
  border: none;
  padding: 11px;
  border-radius: var(--radius-sm);
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}
.btn-ghost:hover { background: var(--bg-card); color: var(--ink); }

/* ===== Loading ===== */
.loading-box {
  text-align: center;
  padding: 48px 20px;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--bg-warm);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box p { color: var(--ink-soft); font-size: 0.88rem; }
.loading-box .sub { color: var(--muted); font-size: 0.78rem; margin-top: 6px; }

/* ===== Result Report ===== */
.report-header {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 18px 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.report-header .icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--accent-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}
.report-header .info h3 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.report-header .info p {
  font-size: 0.78rem;
  color: var(--ink-soft);
}

.confidence-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 0.72rem;
  font-weight: 600;
  margin-top: 6px;
}
.confidence-badge.high { background: var(--green-soft); color: var(--green); }
.confidence-badge.medium { background: var(--yellow-soft); color: var(--yellow); }
.confidence-badge.low { background: var(--pink-soft); color: var(--pink); }

.cause-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.cause-card .tag {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.cause-card .factor {
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.cause-card .detail {
  font-size: 0.84rem;
  color: var(--ink-soft);
  line-height: 1.6;
}
.cause-card .dev-significance {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--bg-warm);
  font-size: 0.78rem;
  color: var(--blue);
}

/* ===== Safety Warning ===== */
.safety-warning {
  background: var(--red-soft);
  border-left: 3px solid var(--red);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 12px;
  font-size: 0.8rem;
  color: var(--red);
  line-height: 1.55;
}
.safety-warning strong { display: block; margin-bottom: 2px; }

/* ===== Low Confidence Notice ===== */
.low-confidence-notice {
  background: var(--yellow-soft);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 12px;
  font-size: 0.8rem;
  color: #8A6D1A;
  line-height: 1.55;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.low-confidence-notice .lc-icon { font-size: 1rem; flex-shrink: 0; }

/* ===== Guide Steps ===== */
.guide-section {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 18px 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.guide-section .section-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 14px;
}
.age-scope {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--muted);
  background: var(--bg-warm);
  padding: 3px 8px;
  border-radius: 100px;
  margin-bottom: 12px;
  display: inline-block;
}
.step-item {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  position: relative;
}
.step-item:last-child { margin-bottom: 0; }
.step-item:not(:last-child)::before {
  content: '';
  position: absolute;
  left: 13px; top: 30px; bottom: -6px;
  width: 2px;
  background: var(--green-soft);
}
.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--green);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  z-index: 1;
}
.step-body { flex: 1; }
.step-body .step-title {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 3px;
}
.step-body .step-desc {
  font-size: 0.82rem;
  color: var(--ink-soft);
  line-height: 1.55;
  margin-bottom: 4px;
}
.step-body .step-script {
  background: var(--green-soft);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 0.78rem;
  color: var(--green);
  font-style: italic;
}
.step-body .step-note {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 3px;
}

/* ===== Quick Actions ===== */
.quick-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}
.qa-btn {
  flex: 1;
  background: var(--bg-card);
  border: 1.5px solid var(--bg-warm);
  border-radius: 8px;
  padding: 10px 4px;
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.qa-btn:hover { border-color: var(--accent); color: var(--accent); }
.qa-btn.active-good { background: var(--green-soft); border-color: var(--green); color: var(--green); }
.qa-btn.active-bad { background: var(--pink-soft); border-color: var(--pink); color: var(--pink); }

/* ===== Voice Button ===== */
.voice-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--blue-soft);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-top: 12px;
}
.voice-bar .vb-icon { font-size: 1.1rem; }
.voice-bar .text { font-size: 0.82rem; color: var(--blue); font-weight: 600; flex: 1; }
.voice-bar .play-btn {
  background: var(--blue);
  color: #fff;
  border: none;

.input-method-tabs { display: flex; gap: 6px; margin-bottom: 10px; }

.input-panel { margin-top: 4px; }

  border-radius: 20px; border: 1px solid var(--border); background: var(--surface);
  color: var(--ink-soft); cursor: pointer;
}
.audio-record-area {
  text-align: center; padding: 24px 16px; border: 2px dashed var(--border);
  border-radius: var(--radius); background: var(--bg);
}
.audio-wave { display: flex; align-items: center; justify-content: center; gap: 3px; height: 40px; margin-bottom: 12px; }
.audio-wave span {
  width: 4px; height: 8px; background: var(--accent); border-radius: 2px;
  transition: height 0.15s;
}
.audio-wave.recording span { animation: wave-bounce 0.6s infinite ease-in-out; }
.audio-wave span:nth-child(1) { animation-delay: 0s; }
.audio-wave span:nth-child(2) { animation-delay: 0.05s; }
.audio-wave span:nth-child(3) { animation-delay: 0.1s; }
.audio-wave span:nth-child(4) { animation-delay: 0.15s; }
.audio-wave span:nth-child(5) { animation-delay: 0.2s; }
.audio-wave span:nth-child(6) { animation-delay: 0.25s; }
.audio-wave span:nth-child(7) { animation-delay: 0.3s; }
.audio-wave span:nth-child(8) { animation-delay: 0.35s; }
.audio-wave span:nth-child(9) { animation-delay: 0.4s; }
.audio-wave span:nth-child(10) { animation-delay: 0.45s; }
.audio-wave span:nth-child(11) { animation-delay: 0.5s; }
.audio-wave span:nth-child(12) { animation-delay: 0.55s; }
.audio-wave span:nth-child(13) { animation-delay: 0.6s; }
.audio-wave span:nth-child(14) { animation-delay: 0.65s; }
.audio-wave span:nth-child(15) { animation-delay: 0.7s; }
@keyframes wave-bounce {

// ===== Init Scene Grid =====
function initSceneGrid() {
  const grid = document.getElementById('scene-grid');
  grid.innerHTML = '';
  Object.entries(scenes).forEach(function(entry) {
    var key = entry[0];
    var data = entry[1];
    var card = document.createElement('div');
    card.className = 'scene-card' + (key === currentScene ? ' selected' : '');
    card.setAttribute('data-key', key);
    card.onclick = function() { selectScene(key, card); };
    card.innerHTML = '<span class="emoji">' + data.emoji + '</span><span class="name">' + data.name + '</span>';
    grid.appendChild(card);
  });
}

function selectScene(key, el) {
  currentScene = key;
  document.querySelectorAll('.scene-card').forEach(function(c) { c.classList.remove('selected'); });
  el.classList.add('selected');
}

// ===== Desc Char Count =====
document.getElementById('scene-desc').addEventListener('input', function() {
  var len = this.value.length;
  var hint = document.getElementById('desc-hint');
  hint.textContent = '已输入 ' + len + ' 字';
  if (len < 10) {
    hint.style.color = 'var(--pink)';
    hint.textContent += '（至少需要10个字）';
  } else if (len > 500) {
    hint.style.color = 'var(--pink)';

  } else {
    hint.style.color = 'var(--muted)';
  }
});

// ===== Multi-Modal Input =====
var currentInputMethod = 'text';
var photoData = null;
var videoData = null;
var audioRecording = false;
var audioRecorded = false;
var audioTimerInterval = null;
var audioSeconds = 0;

function switchInputMethod(method) {
  currentInputMethod = method;
  document.querySelectorAll('.im-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('.im-tab[data-method="' + method + '"]').classList.add('active');
  ['text', 'photo', 'video', 'audio'].forEach(function(m) {
    document.getElementById('input-' + m).style.display = m === method ? 'block' : 'none';
  });
}

function handlePhotoSelect(e) {
  var file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('图片不能超过5MB'); return; }
  var reader = new FileReader();
  reader.onload = function(ev) {
    photoData = ev.target.result;
    document.getElementById('photo-img').src = photoData;
    document.getElementById('photo-placeholder').style.display = 'none';
    document.getElementById('photo-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearPhoto() {
  photoData = null;
  document.getElementById('photo-input').value = '';
  document.getElementById('photo-placeholder').style.display = 'block';
  document.getElementById('photo-preview').style.display = 'none';
}

function handleVideoSelect(e) {
  var file = e.target.files[0];
  if (!file) return;
  if (file.size > 30 * 1024 * 1024) { alert('视频不能超过30MB'); return; }
  var url = URL.createObjectURL(file);
  videoData = url;
  document.getElementById('video-player').src = url;
  document.getElementById('video-placeholder').style.display = 'none';
  document.getElementById('video-preview').style.display = 'block';
}

function clearVideo() {
  if (videoData) URL.revokeObjectURL(videoData);
  videoData = null;
  document.getElementById('video-input').value = '';
  document.getElementById('video-player').src = '';
  document.getElementById('video-placeholder').style.display = 'block';
  document.getElementById('video-preview').style.display = 'none';
}

function toggleAudioRecord() {
  if (!audioRecording) {
    // Start recording
    audioRecording = true;
    audioRecorded = false;
    audioSeconds = 0;
    document.getElementById('audio-wave').classList.add('recording');
    document.getElementById('audio-record-btn').classList.add('recording');
    document.getElementById('audio-btn-icon').textContent = '⏹️';
    document.getElementById('audio-btn-text').textContent = '停止录音';
    document.getElementById('audio-timer').style.display = 'block';
    document.getElementById('audio-playback').style.display = 'none';
    audioTimerInterval = setInterval(function() {
      audioSeconds++;
      var m = Math.floor(audioSeconds / 60);
      var s = audioSeconds % 60;
      document.getElementById('audio-timer').textContent =
        String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      if (audioSeconds >= 60) toggleAudioRecord();
    }, 1000);
  } else {
    // Stop recording
    audioRecording = false;
    audioRecorded = true;
    clearInterval(audioTimerInterval);
    document.getElementById('audio-wave').classList.remove('recording');
    document.getElementById('audio-record-btn').classList.remove('recording');
    document.getElementById('audio-btn-icon').textContent = '🎤';
    document.getElementById('audio-btn-text').textContent = '重新录音';
    document.getElementById('audio-playback').style.display = 'flex';
  }
}

function playAudioDemo() {
  // Demo: simulate audio playback with wave animation
  var wave = document.getElementById('audio-wave');
  wave.classList.add('recording');
  setTimeout(function() { wave.classList.remove('recording'); }, 2000);
}

function clearAudio() {
  audioRecording = false;
  audioRecorded = false;
  audioSeconds = 0;
  if (audioTimerInterval) clearInterval(audioTimerInterval);
  document.getElementById('audio-wave').classList.remove('recording');
  document.getElementById('audio-record-btn').classList.remove('recording');
  document.getElementById('audio-btn-icon').textContent = '🎤';
  document.getElementById('audio-btn-text').textContent = '点击录音';
  document.getElementById('audio-timer').style.display = 'none';
  document.getElementById('audio-playback').style.display = 'none';
}

// ===== Analyze =====
function analyze() {
  // Validate based on input method
  var desc = '';
  if (currentInputMethod === 'text') {
    desc = document.getElementById('scene-desc').value.trim();
    if (desc.length < 10) { alert('请至少输入10个字的场景描述'); return; }
    if (desc.length > 500) { alert('场景描述不能超过500字'); return; }
  } else if (currentInputMethod === 'photo') {
    if (!photoData) { alert('请先拍照或上传照片'); return; }
    desc = document.getElementById('photo-desc').value.trim() || '（通过照片识别行为表现）';
  } else if (currentInputMethod === 'video') {
    if (!videoData) { alert('请先录制或上传视频'); return; }
    desc = document.getElementById('video-desc').value.trim() || '（通过视频识别行为表现）';
  } else if (currentInputMethod === 'audio') {
    if (!audioRecorded) { alert('请先录制音频'); return; }
    desc = document.getElementById('audio-desc').value.trim() || '（通过录音识别行为表现）';
  }

  var btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.textContent = '分析中...';

  // Update loading text based on input method
  var loadingTexts = {
    text: { main: 'AI 正在分析行为背后的心理因素...', sub: '匹配心理学知识图谱 · 评估置信度' },
    photo: { main: 'AI 正在识别照片中的行为表现...', sub: '视觉分析 · 表情识别 · 体态判断' },
    video: { main: 'AI 正在分析视频中的行为模式...', sub: '动作序列分析 · 情绪识别 · 评估置信度' },
    audio: { main: 'AI 正在分析录音中的情绪特征...', sub: '声学分析 · 哭闹模式识别 · 评估置信度' }
  };
  var lt = loadingTexts[currentInputMethod];
  document.getElementById('loading-main-text').textContent = lt.main;
  document.getElementById('loading-sub-text').textContent = lt.sub;

  document.getElementById('interpret-input').style.display = 'none';
  document.getElementById('interpret-loading').style.display = 'block';
  document.getElementById('interpret-result').style.display = 'none';

  setTimeout(function() {
    var data = scenes[currentScene];
    var age = document.getElementById('child-age').value;
    var gender = document.getElementById('child-gender').value;
    var activity = document.getElementById('before-activity').value;
    var duration = document.getElementById('duration').value;
    var frequency = document.getElementById('frequency').value;

    analysisResult = {
      scene: currentScene,
      sceneName: data.name,
      emoji: data.emoji,
      age: age, gender: gender, activity: activity, duration: duration, frequency: frequency, desc: desc,
      inputMethod: currentInputMethod,
      photoData: photoData,
      causes: data.causes,
      confidence: data.confidence,
      confidenceText: data.confidenceText,
      ageScope: data.ageScope,
      hasSafetyWarning: data.hasSafetyWarning,
      safetyWarning: data.safetyWarning,
      steps: data.steps,
      timestamp: new Date().toLocaleString('zh-CN')
    };

    // Add to archive
    var tagColors = {
      cry: { bg: 'var(--accent-soft)', color: 'var(--accent-deep)', tag: '行为事件' },
      tantrum: { bg: 'var(--pink-soft)', color: 'var(--pink)', tag: '情绪事件' },
      refuse: { bg: 'var(--yellow-soft)', color: 'var(--yellow)', tag: '行为事件' },
      withdraw: { bg: 'var(--blue-soft)', color: 'var(--blue)', tag: '社交事件' },
      sleep: { bg: 'var(--green-soft)', color: 'var(--green)', tag: '睡眠事件' },
      aggression: { bg: 'var(--red-soft)', color: 'var(--red)', tag: '行为事件' }
    };
    var tc = tagColors[currentScene];
    archive.unshift({
      emoji: data.emoji,
      title: data.name + ' · 解读记录',
      time: new Date().toLocaleString('zh-CN'),
      tag: tc.tag,
      color: tc.bg,
      tagBg: tc.bg,
      tagColor: tc.color
    });

    renderResult();
    renderGuide();
    renderArchive();
    btn.disabled = false;
    btn.textContent = 'AI 行为解读';
  }, 2200);
}

  header.className = 'report-header fade-in';
  header.innerHTML =
    '<div class="icon">' + r.emoji + '</div>' +
    '<div class="info">' +
      '<h3>' + r.sceneName + ' · 解读报告</h3>' +

      '<div class="confidence-badge ' + r.confidence + '">' + r.confidenceText + '</div>' +
    '</div>';
  result.appendChild(header);

  // Causes
  r.causes.forEach(function(cause, i) {

    card.className = 'cause-card fade-in-delay';
    card.style.animationDelay = (0.1 + i * 0.08) + 's';

      '<div class="tag">可能原因 ' + (i + 1) + '</div>' +
      '<div class="factor">' + cause.factor + '</div>' +
      '<div class="detail">' + cause.detail + '</div>' +
      '<div class="dev-significance">📌 发展意义：' + cause.significance + '</div>';
    result.appendChild(card);
  });

  // Action buttons
  var actions = document.createElement('div');
  actions.style.cssText = 'display:flex; gap:10px; margin-top:14px;';
  actions.innerHTML =
    '<button class="btn-primary" style="flex:1;" onclick="switchMainTab(\'guide\')">查看应对指导 →</button>' +
    '<button class="btn-ghost" style="flex:0 0 auto; width:auto; padding:13px 16px; margin-top:0;" onclick="resetInterpret()">重新分析</button>';
  result.appendChild(actions);
}

// ===== Render Guide =====

  var guideContent = document.getElementById('guide-content');
  if (!analysisResult) {
    guideContent.innerHTML =
      '<div class="archive-empty">' +
        '<div class="ae-icon">📋</div>' +
        '<p>请先完成"行为解读"分析<br>然后查看个性化应对指导</p>' +
      '</div>';
    return;
  }

  var r = analysisResult;
  var html = '';

  html += '<div class="guide-section fade-in">';
  html += '<div class="section-title">📋 即时应对指导</div>';
  html += '<div class="age-scope">适用年龄：' + r.ageScope + '</div>';

  if (r.hasSafetyWarning) {
    html += '<div class="safety-warning" style="margin-bottom:14px;"><strong>⚠️ 安全前置警告</strong>' + r.safetyWarning + '</div>';
  }

  r.steps.forEach(function(step, i) {
    html += '<div class="step-item">';
    html += '<div class="step-num">' + (i + 1) + '</div>';
    html += '<div class="step-body">';
    html += '<div class="step-title">' + step.title + '</div>';
    html += '<div class="step-desc">' + step.desc + '</div>';
    if (step.script) {
      html += '<div class="step-script">💬 "' + step.script + '"</div>';
    }
    if (step.note) {
      html += '<div class="step-note">💡 ' + step.note + '</div>';
    }
    html += '</div></div>';
  });

  html += '</div>';

  // Voice bar
  html += '<div class="voice-bar fade-in-delay">';
  html += '<span class="vb-icon">🔊</span>';
  html += '<span class="text">语音播报模式（方便双手抱孩子时收听）</span>';
  html += '<button class="play-btn" onclick="toggleVoice(this)">▶</button>';
  html += '</div>';

  // Quick actions
  html += '<div class="quick-actions fade-in-delay">';
  html += '<button class="qa-btn" onclick="markFeedback(this, \'good\')">👍 有效</button>';
  html += '<button class="qa-btn" onclick="markFeedback(this, \'bad\')">👎 无效</button>';
  html += '<button class="qa-btn" onclick="bookmark(this)">⭐ 收藏</button>';
  html += '<button class="qa-btn" onclick="shareResult()">📤 分享</button>';
  html += '</div>';

  guideContent.innerHTML = html;
}

// ===== Voice Toggle =====
function toggleVoice(btn) {
  if (btn.textContent === '▶') {
    btn.textContent = '⏸';
    btn.style.background = 'var(--green)';
  } else {
    btn.textContent = '▶';
    btn.style.background = 'var(--blue)';
  }
}

// ===== Feedback =====
function markFeedback(btn, type) {
  var all = btn.parentElement.querySelectorAll('.qa-btn');
  all.forEach(function(b) {
    b.classList.remove('active-good', 'active-bad');
  });
  if (type === 'good') {
    btn.classList.add('active-good');
  } else {
    btn.classList.add('active-bad');
    setTimeout(function() {
      var tip = document.createElement('div');
      tip.style.cssText = 'text-align:center; padding:10px; color:var(--muted); font-size:0.78rem;';
      tip.textContent = '感谢反馈，系统将优化推荐策略';
      btn.parentElement.appendChild(tip);
    }, 200);
  }
}

function bookmark(btn) {
  btn.classList.toggle('active-good');
  var isFav = btn.classList.contains('active-good');
  btn.textContent = isFav ? '⭐ 已收藏' : '⭐ 收藏';
  if (isFav && analysisResult) {
    favorites.push({
      emoji: analysisResult.emoji,
      title: analysisResult.sceneName,
      time: new Date().toLocaleString('zh-CN'),
      scene: analysisResult.scene
    });
  } else if (analysisResult) {
    for (var i = favorites.length - 1; i >= 0; i--) {
      if (favorites[i].scene === analysisResult.scene) {
        favorites.splice(i, 1);
        break;
      }
    }
  }
}

  if (archive.length === 0) {
    content.innerHTML =
      '<div class="archive-empty">' +
        '<div class="ae-icon">📖</div>' +
        '<p>成长档案还是空的<br>完成行为解读后，事件将自动记录到这里</p>' +
      '</div>';
    return;
  }

  var html = '';
  archive.forEach(function(item, i) {
    html += '<div class="archive-item fade-in" style="animation-delay:' + (i * 0.05) + 's">';
    html += '<div class="a-icon" style="background:' + item.color + '">' + item.emoji + '</div>';

    html += '<span class="a-tag" style="background:' + item.tagBg + '; color:' + item.tagColor + '">' + item.tag + '</span>';

  });
  content.innerHTML = html;
}

  { level: 'warn', title: '焦虑情绪持续偏高', desc: '过去2小时检测到3次焦虑表情，建议关注孩子状态', time: '14:30' },
  { level: 'danger', title: '异常烦躁模式', desc: '连续3天午间出现烦躁情绪，可能与午睡环境有关', time: '昨日 12:45' }
];

function renderEmotion() {
  var el = document.getElementById('emotion-content');

  // Build donut chart using conic-gradient
  var total = emotionData.calm + emotionData.happy + emotionData.anxious + emotionData.irritable;
  var calmEnd = emotionData.calm / total * 360;
  var happyEnd = calmEnd + emotionData.happy / total * 360;
  var anxiousEnd = happyEnd + emotionData.anxious / total * 360;
  var donutBg = 'conic-gradient(' +
    emotionColors.calm + ' 0deg ' + calmEnd + 'deg, ' +
    emotionColors.happy + ' ' + calmEnd + 'deg ' + happyEnd + 'deg, ' +
    emotionColors.anxious + ' ' + happyEnd + 'deg ' + anxiousEnd + 'deg, ' +
    emotionColors.irritable + ' ' + anxiousEnd + 'deg 360deg)';

  var dominantEmotion = 'calm';
  var maxVal = 0;
  Object.keys(emotionData).forEach(function(k) { if (emotionData[k] > maxVal) { maxVal = emotionData[k]; dominantEmotion = k; } });

  // Build timeline bars (12 hours)
  var timeSlots = ['6', '8', '10', '12', '14', '16', '18', '20', '22'];
  var timelineColors = [emotionColors.calm, emotionColors.happy, emotionColors.calm, emotionColors.anxious, emotionColors.irritable, emotionColors.anxious, emotionColors.happy, emotionColors.calm, emotionColors.happy];
  var timelineHeights = [30, 50, 40, 55, 45, 35, 50, 40, 35];

  var html = '';

  // Today's emotion overview
  html +=
    '<div class="section-label">今日情绪概览</div>' +
    '<div class="form-card">' +
      '<div class="emotion-donut" style="background:' + donutBg + ';">' +
        '<div class="ed-center">' +
          '<div class="ed-emoji">' + emotionEmojis[dominantEmotion] + '</div>' +
          '<div class="ed-label">主导：' + emotionLabels[dominantEmotion] + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="emotion-legend">';
  Object.keys(emotionData).forEach(function(k) {
    html += '<div class="emotion-legend-item"><div class="el-dot" style="background:' + emotionColors[k] + ';"></div>' + emotionLabels[k] + ' ' + emotionData[k] + '%</div>';
  });
  html += '</div></div>';

  // Emotion timeline
  html +=
    '<div class="section-label">情绪时间线</div>' +
    '<div class="form-card">' +
      '<div class="emotion-timeline">';
  timeSlots.forEach(function(t, i) {
    html += '<div class="emotion-bar" style="height:' + timelineHeights[i] + 'px; background:' + timelineColors[i] + ';" data-label="' + t + ':00 ' + getEmotionLabelByColor(timelineColors[i]) + '"></div>';
  });
  html += '</div>' +
      '<div class="emotion-time-labels">';
  timeSlots.forEach(function(t) { html += '<span>' + t + '</span>'; });
  html += '</div></div>';

  // Device binding
  html +=
    '<div class="section-label">智能硬件</div>' +
    '<div class="form-card">' +
      '<div style="display:flex; align-items:center; gap:12px;">' +
        '<div style="font-size:2rem;">📷</div>' +
        '<div style="flex:1;">' +
          '<div style="font-size:0.85rem; font-weight:600; color:var(--ink);">情绪监测摄像头</div>' +
          '<div style="font-size:0.74rem; color:var(--muted);">' + (deviceBound ? '已绑定 · 客厅' : '未绑定') + '</div>' +
        '</div>' +
        '<button class="btn-ghost" style="width:auto; margin:0; padding:6px 14px; font-size:0.78rem;" onclick="toggleDevice()">' + (deviceBound ? '解绑' : '绑定设备') + '</button>' +
      '</div>' +
      '<div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--bg-warm);">' +
        '<div style="font-size:0.76rem; color:var(--muted); margin-bottom:8px;">监测设置</div>' +
        '<div style="display:flex; gap:8px; flex-wrap:wrap;">' +
          '<span class="cc-tag" style="background:var(--accent-soft); color:var(--accent-deep);">午睡时段</span>' +
          '<span class="cc-tag" style="background:var(--accent-soft); color:var(--accent-deep);">晚间游戏</span>' +
          '<span class="cc-tag" style="background:var(--accent-soft); color:var(--accent-deep);">用餐场景</span>' +
        '</div>' +
        '<div style="font-size:0.72rem; color:var(--muted); margin-top:8px;">敏感度：标准 · 视频数据仅本地处理</div>' +
      '</div>' +
    '</div>';

  // Alert history
  html += '<div class="section-label">预警记录</div>';
  if (alertHistory.length === 0) {
    html += '<div class="form-card" style="text-align:center; color:var(--muted); font-size:0.82rem; padding:24px;">暂无预警记录</div>';
  } else {
    alertHistory.forEach(function(a) {
      html +=
        '<div class="alert-item ' + a.level + '">' +
          '<div class="ai-icon">' + (a.level === 'danger' ? '🚨' : '⚠️') + '</div>' +
          '<div class="ai-body">' +
            '<div class="ai-title">' + a.title + '</div>' +
            '<div class="ai-desc">' + a.desc + '</div>' +
            '<div class="ai-time">' + a.time + '</div>' +
          '</div>' +
        '</div>';
    });
  }

  // Weekly report preview
  html +=
    '<div class="section-label">本周情绪趋势</div>' +
    '<div class="form-card">' +
      '<div class="emotion-timeline">';
  var weekDays = ['一', '二', '三', '四', '五', '六', '日'];
  var weekHeights = [35, 45, 30, 50, 40, 55, 42];
  var weekColors = [emotionColors.calm, emotionColors.happy, emotionColors.calm, emotionColors.anxious, emotionColors.happy, emotionColors.irritable, emotionColors.calm];
  weekDays.forEach(function(d, i) {
    html += '<div class="emotion-bar" style="height:' + weekHeights[i] + 'px; background:' + weekColors[i] + ';" data-label="周' + d + ' ' + getEmotionLabelByColor(weekColors[i]) + '"></div>';
  });
  html += '</div>' +
      '<div class="emotion-time-labels">';
  weekDays.forEach(function(d) { html += '<span>' + d + '</span>'; });
  html += '</div>' +
      '<div style="font-size:0.78rem; color:var(--ink-soft); margin-top:12px; line-height:1.6;">' +
        '📊 本周整体情绪平稳，平静占比42%<br>' +
        '⚠️ 周四焦虑情绪偏高，建议关注<br>' +
        '✅ 周末愉悦情绪明显提升' +
      '</div>' +
    '</div>';

  el.innerHTML = html;
}

function getEmotionLabelByColor(color) {
  for (var k in emotionColors) { if (emotionColors[k] === color) return emotionLabels[k]; }
  return '';
}

function toggleDevice() {
  deviceBound = !deviceBound;
  if (deviceBound) {
    alert('设备绑定成功！\n摄像头已连接，开始监测情绪数据');
  }
  renderEmotion();
}

  renderCompanion();

function markActivityDone(id) {
  companionActivities[id].done = !companionActivities[id].done;
  if (companionActivities[id].done) {
    alert('已完成"' + companionActivities[id].title + '"！\n系统已记录并更新孩子心理画像');
  }
  renderCompanionDetail(id);
}

function showFeedback(id) {
  document.getElementById('feedback-section').style.display = 'block';
}

var selectedFeedbacks = [];
function selectFeedback(el) {
  var siblings = el.parentElement.querySelectorAll('.feedback-emoji');
  siblings.forEach(function(s) { s.classList.remove('selected'); });
  el.classList.add('selected');
  selectedFeedbacks.push(el.dataset.val);
}

function submitFeedback(id) {
  alert('感谢反馈！\n您的反馈将帮助AI优化推荐策略');
  selectedFeedbacks = [];
  backToCompanionList();
}

var selectedMood = null;
function selectMood(el) {
  var siblings = el.parentElement.querySelectorAll('.mood-option');
  siblings.forEach(function(s) { s.classList.remove('selected'); });
  el.classList.add('selected');
  selectedMood = el.dataset.mood;
}

function saveReflection() {
  if (!selectedMood) { alert('请先选择今天的心情'); return; }
  var moodEmojis = { great: '😄', good: '🙂', ok: '😐', bad: '😟', terrible: '😢' };
  reflectionEntries.push({
    mood: selectedMood,
    moodEmoji: moodEmojis[selectedMood],
    event: document.getElementById('reflection-event').value.trim(),
    trigger: document.getElementById('reflection-trigger').value.trim(),
    plan: document.getElementById('reflection-plan').value.trim(),
    time: new Date().toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
  });
  selectedMood = null;
  alert('复盘已保存！\n记录和反思是打破"发火-自责-焦虑"循环的第一步 💪');
  renderSupport();
}

function toggleBreathing() {
  if (breathingActive) {
    stopBreathing();
  } else {
    startBreathing();
  }
}

function startBreathing() {
  breathingActive = true;
  breathingCount = 0;
  var circle = document.getElementById('breathing-circle');
  var text = document.getElementById('bc-text');
  var count = document.getElementById('bc-count');

  function inhale() {
    if (breathingCount >= 4) { stopBreathing(); return; }
    breathingCount++;
    breathingPhase = 1;
    circle.classList.remove('exhale');
    circle.classList.add('inhale');
    text.textContent = '吸气';
    count.textContent = breathingCount + '/4';

    breathingTimer = setTimeout(function() {
      breathingPhase = 2;
      circle.classList.remove('inhale');
      circle.classList.add('exhale');
      text.textContent = '呼气';
      breathingTimer = setTimeout(inhale, 4000);
    }, 4000);
  }
  inhale();
}

function stopBreathing() {
  breathingActive = false;
  clearTimeout(breathingTimer);
  breathingTimer = null;
  var circle = document.getElementById('breathing-circle');
  if (circle) {
    circle.classList.remove('inhale', 'exhale');
    document.getElementById('bc-text').textContent = '点击开始';
    document.getElementById('bc-count').textContent = '';
  }
  if (breathingCount >= 4) {
    anxietyLevel = Math.max(10, anxietyLevel - 15);
    alert('呼吸练习完成！\n焦虑指数已降低15点 🌿');
    renderSupport();
  }
}

// ===== Tab Switching =====
function switchMainTab(tab) {
  var tabs = document.querySelectorAll('.tab');
  var contents = document.querySelectorAll('.tab-content');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  contents.forEach(function(c) { c.classList.remove('active'); });

  var tabMap = { interpret: 0, guide: 1, emotion: 2, companion: 3, archive: 4, support: 5 };
  var idx = tabMap[tab];
  if (idx === undefined) idx = 0;
  tabs[idx].classList.add('active');
  contents[idx].classList.add('active');

  if (tab === 'guide') renderGuide();
  else if (tab === 'emotion') renderEmotion();
  else if (tab === 'companion') renderCompanion();
  else if (tab === 'archive') renderArchive();
  else if (tab === 'support') renderSupport();
}

function handleLogin() {
  var account = document.getElementById('login-account').value.trim();
  var password = document.getElementById('login-password').value;
  var errEl = document.getElementById('login-error');
  errEl.classList.remove('show');

  if (!account) { showAuthError('login-error', '请输入手机号或邮箱'); return; }
  if (!password) { showAuthError('login-error', '请输入密码'); return; }

  var users = getUsers();
  var user = null;
  for (var i = 0; i < users.length; i++) {
    if ((users[i].phone === account || users[i].email === account) && users[i].password === password) {
      user = users[i];
      break;
    }
  }

  if (!user) {
    showAuthError('login-error', '账号或密码不正确，请重试');
    return;
  }

  currentUser = { nickname: user.nickname, phone: user.phone, email: user.email, childName: user.childName, childAge: user.childAge, childGender: user.childGender };
  saveSession(currentUser);
  updateAvatarUI();
  renderProfilePage();
}

function handleRegister() {
  var nickname = document.getElementById('reg-nickname').value.trim();
  var phone = document.getElementById('reg-phone').value.trim();
  var email = document.getElementById('reg-email').value.trim();
  var password = document.getElementById('reg-password').value;
  var password2 = document.getElementById('reg-password2').value;
  var errEl = document.getElementById('register-error');
  errEl.classList.remove('show');

  if (!nickname) { showAuthError('register-error', '请输入昵称'); return; }
  if (!phone || !/^1\d{10}$/.test(phone)) { showAuthError('register-error', '请输入正确的11位手机号'); return; }
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAuthError('register-error', '邮箱格式不正确'); return; }
  if (!password || password.length < 6) { showAuthError('register-error', '密码至少6位'); return; }
  if (password !== password2) { showAuthError('register-error', '两次密码输入不一致'); return; }

  var users = getUsers();
  for (var i = 0; i < users.length; i++) {
    if (users[i].phone === phone) {
      showAuthError('register-error', '该手机号已注册，请直接登录');
      return;
    }
  }

  var newUser = {
    nickname: nickname,
    phone: phone,
    email: email,
    password: password,
    childName: '宝宝',
    childAge: '3',
    childGender: 'male',
    createdAt: new Date().toLocaleString('zh-CN')
  };
  users.push(newUser);
  saveUsers(users);

  currentUser = { nickname: nickname, phone: phone, email: email, childName: '宝宝', childAge: '3', childGender: 'male' };
  saveSession(currentUser);
  updateAvatarUI();
  renderProfilePage();
}

// ===== Avatar Upload =====
function uploadUserAvatar() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert('图片大小不能超过2MB'); return; }
    var reader = new FileReader();
    reader.onload = function(ev) {
      currentUser.userAvatar = ev.target.result;
      saveSession(currentUser);
      updateAvatarUI();
      renderProfilePage();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

    reader.onload = function(ev) {

}

function exportData() {
  var data = {
    user: currentUser,
    archive: archive,
    favorites: favorites,
    family: familyMembers,
    exportTime: new Date().toLocaleString('zh-CN')
  };
  var json = JSON.stringify(data, null, 2);
  try {
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'txzb-data-' + Date.now() + '.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('数据导出成功（Demo环境无法下载文件）');
  }
}

function clearAllData() {
  if (!confirm('确定要清除所有数据吗？此操作不可恢复。')) return;
  archive.length = 0;
  favorites.length = 0;
  familyMembers.length = 1;
  familyMembers[0] = { name: '我', role: '爸爸', avatar: '👨', color: 'var(--accent-soft)', tag: '管理员', tagBg: 'var(--accent-soft)', tagColor: 'var(--accent-deep)' };
  localStorage.removeItem('txzb_session');
  localStorage.removeItem('txzb_users');
  closeProfileModal();
  renderArchive();
  renderGuide();
  alert('所有数据已清除');
}

function selectRate(val) {
  currentRate = val;
  var stars = document.querySelectorAll('.rate-star');
  stars.forEach(function(s) {
    if (parseInt(s.dataset.val) <= val) {
      s.classList.add('active');
    } else {
      s.classList.remove('active');
    }
  });
  var feedbacks = {
    1: '我们会努力改进！',
    2: '感谢反馈，我们会优化',
    3: '感谢支持，继续加油！',
    4: '非常感谢您的认可！',
    5: '太棒了！感谢您的五星好评！'
  };
  document.getElementById('rate-feedback').textContent = feedbacks[val];
  document.getElementById('rate-submit').disabled = false;
}

function submitRate() {
  if (currentRate === 0) { alert('请先选择评分'); return; }
  var comment = document.getElementById('rate-comment').value.trim();
  var msg = '感谢您的评价！\n评分：' + currentRate + ' 星';
  if (comment) msg += '\n反馈：' + comment;
  msg += '\n\n我们会持续优化产品，为您提供更好的服务。';
  alert(msg);
  renderAboutPage();
}
