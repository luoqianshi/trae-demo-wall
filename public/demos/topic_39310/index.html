        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .note-card {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        
        .note-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .note-card.active {
            border-left-color: #667eea;
            background: #f8f9ff;
        }
        
        .tag {
            transition: all 0.2s ease;
        }
        
        .tag:hover {
            transform: scale(1.05);
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .typing-effect::after {
            content: '|';
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .knowledge-node {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .knowledge-node:hover {
            transform: scale(1.1);
        }
        
        .sidebar-item {
            transition: all 0.2s ease;
        }
        
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        
        .search-box {
            transition: all 0.3s ease;
        }
        
        .search-box:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .markdown-content h1 { font-size: 1.5rem; font-weight: bold; margin: 1rem 0; }
        .markdown-content h2 { font-size: 1.25rem; font-weight: bold; margin: 0.75rem 0; }
        .markdown-content p { margin: 0.5rem 0; line-height: 1.6; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin: 0.5rem 0; }
        .markdown-content code { background: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .connection-line {
            stroke: #667eea;
            stroke-width: 2;
            fill: none;
            opacity: 0.6;
        }
    </style>

                category: "灵感想法",
                createdAt: "2026-06-10",
                updatedAt: "2026-06-11",
                isStarred: false,
                aiSummary: "AI智能日程助手产品创意，包含自然语言输入、智能提醒和冲突检测功能。"
            },
            {
                id: 6,
                title: "团队代码规范文档",
                content: "## 前端代码规范\n\n### 命名规范\n- 组件名：PascalCase\n- 变量名：camelCase\n- 常量名：UPPER_SNAKE_CASE\n\n### 代码风格\n- 使用2空格缩进\n- 单行最大长度100字符\n- 使用单引号\n\n### Git提交规范\n- feat: 新功能\n- fix: 修复bug\n- docs: 文档更新\n- style: 代码格式\n- refactor: 重构",
                tags: ["工作项目", "规范"],
                category: "工作项目",
                createdAt: "2026-06-08",
                updatedAt: "2026-06-09",
                isStarred: false,
                aiSummary: "团队前端代码规范文档，涵盖命名规范、代码风格和Git提交规范。"
            }
        ];

        let selectedNoteId = null;
        let selectedTags = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderNoteList();
            setupEventListeners();
        });

        // 渲染笔记列表
        function renderNoteList() {
            const noteList = document.getElementById('noteList');
            noteList.innerHTML = '';
            
            notes.forEach(note => {
                const noteCard = document.createElement('div');
                noteCard.className = `note-card p-4 cursor-pointer ${selectedNoteId === note.id ? 'active' : ''}`;
                noteCard.onclick = () => selectNote(note.id);
                
                noteCard.innerHTML = `
                    <div class="flex items-start justify-between mb-2">
                        <h3 class="font-semibold text-gray-800 text-sm line-clamp-1">${note.title}</h3>
                        ${note.isStarred ? '<i class="fas fa-star text-yellow-400 text-xs"></i>' : ''}
                    </div>
                    <p class="text-xs text-gray-500 line-clamp-2 mb-2">${note.aiSummary}</p>
                    <div class="flex items-center justify-between">
                        <div class="flex space-x-1">
                            ${note.tags.map(tag => `<span class="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded">${tag}</span>`).join('')}
                        </div>
                        <span class="text-xs text-gray-400">${note.updatedAt}</span>
                    </div>
                `;
                
                noteList.appendChild(noteCard);
            });
            
            document.getElementById('totalNotes').textContent = notes.length;
        }

        // 选择笔记
        function selectNote(id) {
            selectedNoteId = id;
            const note = notes.find(n => n.id === id);
            
            if (note) {
                renderNoteDetail(note);
                renderNoteList(); // 更新选中状态
            }
        }

        // 渲染笔记详情
        function renderNoteDetail(note) {
            const detail = document.getElementById('noteDetail');
            detail.innerHTML = `
                <div class="fade-in">
                    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex-1">
                                <h1 class="text-2xl font-bold text-gray-800 mb-2">${note.title}</h1>
                                <div class="flex items-center space-x-4 text-sm text-gray-500">
                                    <span><i class="fas fa-calendar mr-1"></i>${note.createdAt}</span>
                                    <span><i class="fas fa-edit mr-1"></i>${note.updatedAt}</span>
                                    <span class="px-2 py-1 bg-purple-100 text-purple-600 rounded-full text-xs">${note.category}</span>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2">
                                <button onclick="toggleStar(${note.id})" class="p-2 hover:bg-gray-100 rounded-lg ${note.isStarred ? 'text-yellow-400' : 'text-gray-400'}">
                                    <i class="fas fa-star"></i>
                                </button>
                                <button class="p-2 hover:bg-gray-100 rounded-lg text-gray-400">
                                    <i class="fas fa-share-alt"></i>
                                </button>
                                <button class="p-2 hover:bg-gray-100 rounded-lg text-gray-400">
                                    <i class="fas fa-ellipsis-v"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${note.tags.map(tag => `<span class="tag px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-sm">${tag}</span>`).join('')}
                        </div>
                        
                        <div class="border-t border-gray-200 pt-4">
                            <div class="markdown-content text-gray-700">
                                ${renderMarkdown(note.content)}
                            </div>
                        </div>
                    </div>
                    
                    <!-- AI智能分析 -->
                    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                        <div class="flex items-center space-x-2 mb-4">
                            <i class="fas fa-robot text-purple-600"></i>
                            <h3 class="font-semibold text-gray-800">AI智能分析</h3>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="bg-purple-50 rounded-lg p-4">
                                <div class="text-2xl font-bold text-purple-600 mb-1">${note.tags.length}</div>
                                <div class="text-sm text-gray-600">智能标签</div>
                            </div>
                            <div class="bg-blue-50 rounded-lg p-4">
                                <div class="text-2xl font-bold text-blue-600 mb-1">${Math.floor(Math.random() * 10) + 3}</div>
                                <div class="text-sm text-gray-600">关联笔记</div>
                            </div>
                            <div class="bg-green-50 rounded-lg p-4">
                                <div class="text-2xl font-bold text-green-600 mb-1">${Math.floor(Math.random() * 5) + 1}</div>
                                <div class="text-sm text-gray-600">知识节点</div>
                            </div>
                        </div>
                        <div class="mt-4 p-4 bg-gray-50 rounded-lg">
                            <h4 class="font-medium text-gray-700 mb-2">AI摘要</h4>
                            <p class="text-sm text-gray-600">${note.aiSummary}</p>
                        </div>
                    </div>
                    
                    <!-- 相关笔记推荐 -->
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <div class="flex items-center space-x-2 mb-4">
                            <i class="fas fa-lightbulb text-yellow-500"></i>
                            <h3 class="font-semibold text-gray-800">相关笔记推荐</h3>
                        </div>
                        <div class="space-y-3">
                            ${getRelatedNotes(note).map(related => `
                                <div class="flex items-center space-x-3 p-3 hover:bg-gray-50 rounded-lg cursor-pointer" onclick="selectNote(${related.id})">
                                    <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                                        <i class="fas fa-file-alt text-purple-600"></i>
                                    </div>
                                    <div class="flex-1">
                                        <h4 class="font-medium text-gray-800 text-sm">${related.title}</h4>
                                        <p class="text-xs text-gray-500">${related.aiSummary}</p>
                                    </div>
                                    <span class="text-xs text-gray-400">${Math.floor(Math.random() * 90 + 10)}% 相关</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // 简单的Markdown渲染
        function renderMarkdown(content) {
            return content
                .replace(/## (.*)/g, '<h2>$1</h2>')
                .replace(/### (.*)/g, '<h3>$1</h3>')
                .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^(.+)$/gm, '<p>$1</p>');
        }

        // 获取相关笔记
        function getRelatedNotes(currentNote) {
            return notes
                .filter(n => n.id !== currentNote.id)
                .filter(n => n.tags.some(tag => currentNote.tags.includes(tag)))
                .slice(0, 3);
        }

        // 切换星标
        function toggleStar(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.isStarred = !note.isStarred;
                renderNoteDetail(note);
                renderNoteList();
            }
        }

        // 显示创建模态框
        function showCreateModal() {
            document.getElementById('createModal').classList.remove('hidden');
            document.getElementById('createModal').classList.add('flex');
        }

        // 隐藏创建模态框
        function hideCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
            document.getElementById('createModal').classList.remove('flex');
        }

        // 创建笔记
        function createNote() {
            const title = document.getElementById('newNoteTitle').value;
            const content = document.getElementById('newNoteContent').value;
            
            if (!title.trim()) {
                alert('请输入标题');
                return;
            }
            
            const newNote = {
                id: notes.length + 1,
                title: title,
                content: content,
                tags: selectedTags.length > 0 ? selectedTags : ['未分类'],
                category: selectedTags[0] || '未分类',
                createdAt: new Date().toISOString().split('T')[0],
                updatedAt: new Date().toISOString().split('T')[0],
                isStarred: false,
                aiSummary: "AI正在分析笔记内容..."
            };
            
            notes.unshift(newNote);
            renderNoteList();
            hideCreateModal();
            
            // 模拟AI分析
            setTimeout(() => {
                newNote.aiSummary = `这是一篇关于${title}的笔记，涵盖了${selectedTags.join('、')}相关内容。`;
                if (selectedNoteId === newNote.id) {
                    renderNoteDetail(newNote);
                }
            }, 2000);
            
            // 清空表单
            document.getElementById('newNoteTitle').value = '';
            document.getElementById('newNoteContent').value = '';
            selectedTags = [];
            updateTagSelection();
        }

        // 标签选择
        function setupEventListeners() {
            const tags = document.querySelectorAll('#tagContainer .tag');
            tags.forEach(tag => {
                tag.addEventListener('click', function() {
                    const tagName = this.textContent;
                    if (selectedTags.includes(tagName)) {
                        selectedTags = selectedTags.filter(t => t !== tagName);
                        this.classList.remove('ring-2', 'ring-purple-500');
                    } else {
                        selectedTags.push(tagName);
                        this.classList.add('ring-2', 'ring-purple-500');
                    }
                });
            });
            
            // 全局搜索
            document.getElementById('globalSearch').addEventListener('input', function() {
                const query = this.value.toLowerCase();
                if (query) {
                    const filtered = notes.filter(note => 
                        note.title.toLowerCase().includes(query) ||
                        note.content.toLowerCase().includes(query) ||
                        note.tags.some(tag => tag.toLowerCase().includes(query))
                    );
                    renderFilteredNotes(filtered);
                } else {
                    renderNoteList();
                }
            });
        }

        function updateTagSelection() {
            const tags = document.querySelectorAll('#tagContainer .tag');
            tags.forEach(tag => {
                if (selectedTags.includes(tag.textContent)) {
                    tag.classList.add('ring-2', 'ring-purple-500');
                } else {
                    tag.classList.remove('ring-2', 'ring-purple-500');
                }
            });
        }

        function renderFilteredNotes(filteredNotes) {
            const noteList = document.getElementById('noteList');
            noteList.innerHTML = '';
            
            filteredNotes.forEach(note => {
                const noteCard = document.createElement('div');
                noteCard.className = `note-card p-4 cursor-pointer ${selectedNoteId === note.id ? 'active' : ''}`;
                noteCard.onclick = () => selectNote(note.id);
                
                noteCard.innerHTML = `
                    <div class="flex items-start justify-between mb-2">
                        <h3 class="font-semibold text-gray-800 text-sm line-clamp-1">${note.title}</h3>
                        ${note.isStarred ? '<i class="fas fa-star text-yellow-400 text-xs"></i>' : ''}
                    </div>
                    <p class="text-xs text-gray-500 line-clamp-2 mb-2">${note.aiSummary}</p>
                    <div class="flex items-center justify-between">
                        <div class="flex space-x-1">
                            ${note.tags.map(tag => `<span class="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded">${tag}</span>`).join('')}
                        </div>
                        <span class="text-xs text-gray-400">${note.updatedAt}</span>
                    </div>
                `;
                
                noteList.appendChild(noteCard);
            });
        }

        // 显示知识图谱
        function showKnowledgeGraph() {
            document.getElementById('graphModal').classList.remove('hidden');
            document.getElementById('graphModal').classList.add('flex');
            
            setTimeout(() => {
                initKnowledgeGraph();
            }, 100);
        }

        // 隐藏知识图谱
        function hideGraphModal() {
            document.getElementById('graphModal').classList.add('hidden');
            document.getElementById('graphModal').classList.remove('flex');
        }

        // 初始化知识图谱
        function initKnowledgeGraph() {
            const chartDom = document.getElementById('knowledgeGraph');
            const myChart = echarts.init(chartDom);
            
            const categories = [
                { name: '技术学习', itemStyle: { color: '#3b82f6' } },
                { name: '工作项目', itemStyle: { color: '#10b981' } },
                { name: '读书笔记', itemStyle: { color: '#f59e0b' } },
                { name: '灵感想法', itemStyle: { color: '#8b5cf6' } }
            ];
            
            const nodes = notes.map((note, index) => ({
                id: String(note.id),
                name: note.title,
                category: categories.findIndex(c => c.name === note.category),
                symbolSize: 30 + note.tags.length * 5,
                value: note.tags.length
            }));
            
            // 添加标签节点
            const allTags = [...new Set(notes.flatMap(n => n.tags))];
            allTags.forEach((tag, index) => {
                nodes.push({
                    id: `tag_${index}`,
                    name: tag,
                    category: 4,
                    symbolSize: 20,
                    value: 1,
                    itemStyle: { color: '#6b7280' }
                });
            });
            
            const links = [];
            notes.forEach(note => {
                note.tags.forEach((tag, tagIndex) => {
                    const tagNodeId = `tag_${allTags.indexOf(tag)}`;
                    links.push({
                        source: String(note.id),
                        target: tagNodeId
                    });
                });
                
                // 添加笔记之间的关联
                notes.forEach(otherNote => {
                    if (note.id !== otherNote.id) {
                        const commonTags = note.tags.filter(tag => otherNote.tags.includes(tag));
                        if (commonTags.length > 0) {
                            links.push({
                                source: String(note.id),
                                target: String(otherNote.id),
                                lineStyle: { opacity: commonTags.length * 0.2 }
                            });
                        }
                    }
                });
            });
            
            const option = {
                title: {
                    text: '知识关联图谱',
                    subtext: '基于AI分析自动构建',
                    left: 'center'
                },
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.dataType === 'node') {
                            return `<strong>${params.data.name}</strong><br/>类别: ${categories[params.data.category]?.name || '标签'}`;
                        }
                        return '';
                    }
                },
                legend: {
                    data: categories.map(c => c.name),
                    bottom: 10
                },
                series: [{
                    type: 'graph',
                    layout: 'force',
                    data: nodes,
                    links: links,
                    categories: categories,
                    roam: true,
                    label: {
                        show: true,
                        position: 'bottom',
                        formatter: '{b}'
                    },
                    force: {
                        repulsion: 300,
                        edgeLength: 100
                    },
                    emphasis: {
                        focus: 'adjacency',
                        lineStyle: {
                            width: 4
                        }
                    }
                }]
            };
            
            myChart.setOption(option);
            
            window.addEventListener('resize', () => {
                myChart.resize();
            });
        }

        // AI助手
        function toggleAIAssistant() {
            const panel = document.getElementById('aiPanel');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
            } else {
                panel.classList.add('hidden');
            }
        }

        function sendAIMessage() {
            const input = document.getElementById('aiInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addChatMessage(message, 'user');
            input.value = '';
            
            // 模拟AI回复
            setTimeout(() => {
                const responses = [
                    "我来帮你分析这篇笔记的内容...",
                    "根据你的笔记，我建议添加以下标签：技术学习、最佳实践",
                    "我发现这篇笔记与'React Hooks 深度解析'有很高的关联度",
                    "已为你生成知识图谱，可以看到这篇笔记在知识网络中的位置",
                    "AI分析完成！这篇笔记的核心关键词是：React、Hooks、前端开发"
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addChatMessage(randomResponse, 'ai');
            }, 1500);
        }

        function addChatMessage(message, sender) {
            const chatContent = document.getElementById('aiChatContent');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex items-start space-x-2 mb-4 fade-in';
            
            if (sender === 'user') {
                messageDiv.innerHTML = `
                    <div class="ml-auto bg-purple-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-sm text-gray-700">${message}</p>
                    </div>
                    <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-gray-600 text-sm">
                        <i class="fas fa-user"></i>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="w-8 h-8 gradient-bg rounded-full flex items-center justify-center text-white text-sm">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="bg-gray-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-sm text-gray-700">${message}</p>
                    </div>
                `;
            }
            
            chatContent.appendChild(messageDiv);
            chatContent.scrollTop = chatContent.scrollHeight;
        }

        // 回车发送消息
        document.addEventListener('DOMContentLoaded', function() {
            const aiInput = document.getElementById('aiInput');
            if (aiInput) {
                aiInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        sendAIMessage();
                    }
                });
            }
        });
    </script>
</body>
</html>
