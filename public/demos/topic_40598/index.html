  </div>

  <div id="tab-stats" class="tab-content" style="display:none;">
    <div class="week-nav">
      <button onclick="prevWeekStats()">◀</button><span class="week-label" id="statsWeekLabel"></span><button onclick="nextWeekStats()">▶</button>

    <div class="stats-grid" id="statsGrid"></div>

        </div>

        </div>

<script>

function getDefaultSettings() {
  return { 
    morningInStart: '07:30', morningInEnd: '09:00',
    morningOutStart: '11:30', morningOutEnd: '12:30',
    afternoonInStart: '13:30', afternoonInEnd: '15:00',
    afternoonOutStart: '17:30', afternoonOutEnd: '18:30',
    eveningInStart: '19:00', eveningInEnd: '19:30',
    eveningOutStart: '21:00', eveningOutEnd: '22:30'
  };
}
function getDefaultTargets() { return { morning: 240, afternoon: 240, evening: 120 }; }

function migrateSettings(st) {
  var def = getDefaultSettings();
  // If old format detected (has morningIn but not morningInStart), migrate
  if (st.morningIn !== undefined && st.morningInStart === undefined) {
    st.morningInStart = def.morningInStart;
    st.morningInEnd = def.morningInEnd;
    st.morningOutStart = def.morningOutStart;
    st.morningOutEnd = def.morningOutEnd;
    st.afternoonInStart = def.afternoonInStart;
    st.afternoonInEnd = def.afternoonInEnd;
    st.afternoonOutStart = def.afternoonOutStart;
    st.afternoonOutEnd = def.afternoonOutEnd;
    st.eveningInStart = def.eveningInStart;
    st.eveningInEnd = def.eveningInEnd;
    st.eveningOutStart = def.eveningOutStart;
    st.eveningOutEnd = def.eveningOutEnd;
  }
  // Ensure all new keys exist
  for (var k in def) { if (st[k] === undefined) st[k] = def[k]; }
  return st;
}

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var data = JSON.parse(raw);
      if (!data.settings) data.settings = getDefaultSettings();
      else data.settings = migrateSettings(data.settings);
      if (!data.records) data.records = {};
      if (!data.targets) data.targets = getDefaultTargets();
      return data;
    }
    return { settings: getDefaultSettings(), records: {}, targets: getDefaultTargets() };
  } catch (e) { return { settings: getDefaultSettings(), records: {}, targets: getDefaultTargets() }; }
}

function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

// ============ Utils ============
function timeToMinutes(t) { if (!t) return 0; var p = t.split(':').map(Number); return p[0]*60+p[1]; }
function minutesToHours(m) { return (m/60).toFixed(1); }
function formatDuration(min) {
  if (min <= 0) return '0h';
  var h = Math.floor(min/60), m = min%60;
  return m === 0 ? h+'h' : h+'h'+m+'m';
}
function formatDurationFull(min) { var h=Math.floor(min/60),m=min%60; return h+'h '+m+'m'; }
function getMonday(date) { var d=new Date(date),day=d.getDay(),diff=day===0?-6:1-day; d.setDate(d.getDate()+diff); d.setHours(0,0,0,0); return d; }
function getWeekDates(offset) {
  var now=new Date(),monday=getMonday(now); monday.setDate(monday.getDate()+offset*7);
  var dates=[];
  for (var i=0;i<5;i++) { var d=new Date(monday); d.setDate(d.getDate()+i); dates.push(d); }
  return dates;
}
function formatDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getWeekdayName(d) { return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]; }
function getWeekdayShort(d) { return ['日','一','二','三','四','五','六'][d.getDay()]; }
function isToday(d) { var n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); }
function getWeekLabel(dates) { return formatDate(dates[0])+' ~ '+formatDate(dates[4]); }

function showToast(msg) {

  clearTimeout(toastTimer); toastTimer=setTimeout(function(){el.classList.remove('show');},2000);
}

}

// ============ Calc ============
function calcPeriodDuration(dateKey, period) {
  var rec=appData.records[dateKey], target=getDayPeriodTarget(dateKey,period);
  if (target<=0) return {target:target,actual:0,percent:0,completed:false};
  if (!rec) return {target:target,actual:0,percent:0,completed:false};
  var inT=rec[period+'In'], outT=rec[period+'Out'];
  if (inT&&outT) {
    var actual=timeToMinutes(outT)-timeToMinutes(inT);
    if (actual<0) actual=0;
    return {target:target,actual:Math.max(0,actual),percent:Math.max(0,Math.min(Math.round((actual/target)*100),150)),completed:true};
  }
  return {target:target,actual:0,percent:0,completed:false};
}
function calcDayDurations(dateKey) {
  var m=calcPeriodDuration(dateKey,'morning'), a=calcPeriodDuration(dateKey,'afternoon'), e=calcPeriodDuration(dateKey,'evening');
  var tt=m.target+a.target+e.target, ta=m.actual+a.actual+e.actual;
  return {morning:m,afternoon:a,evening:e,totalTarget:tt,totalActual:ta,totalPct:tt>0?Math.min(Math.round((ta/tt)*100),150):0,completed:(m.completed?1:0)+(a.completed?1:0)+(e.completed?1:0)};
}

function setNow(dateKey, fieldKey) {
  var now=new Date();
  var h=String(now.getHours()).padStart(2,'0'), m=String(now.getMinutes()).padStart(2,'0');
  var val=h+':'+m;
  var rangeCheck = validateTimeRange(fieldKey, val);
  if (!rangeCheck.valid) {
    showToast('当前不在有效打卡时间（'+rangeCheck.msg+'）');
    return;
  }
  if (!appData.records[dateKey]) appData.records[dateKey]={};
  appData.records[dateKey][fieldKey]=val;
  saveData(appData);
  renderWeekGrid(); renderDayDetail(dateKey);
  showToast('已设置为当前时间 '+val);
}
function clearTime(dateKey, fieldKeyIn, fieldKeyOut) {
  if (!appData.records[dateKey]) return;
  delete appData.records[dateKey][fieldKeyIn];
  delete appData.records[dateKey][fieldKeyOut];
  saveData(appData);
  renderWeekGrid(); renderDayDetail(dateKey);
  showToast('已清空签到签退时间');
}
function scheduleTimeUpdate(dateKey, fieldKey, value) {
  var key = dateKey + '_' + fieldKey;
  clearTimeout(timeInputTimers[key]);
  timeInputTimers[key] = setTimeout(function() {
    delete timeInputTimers[key];
    updateTime(dateKey, fieldKey, value);
  }, 500);
}
function updateTime(dateKey, fieldKey, value) {
  if (!value) { 
    if (!appData.records[dateKey]) appData.records[dateKey]={};
    delete appData.records[dateKey][fieldKey];
    saveData(appData);
    renderWeekGrid(); renderDayDetail(dateKey);
    return;
  }
  var rangeCheck = validateTimeRange(fieldKey, value);
  if (!rangeCheck.valid) {
    showToast(rangeCheck.msg);
    renderDayDetail(dateKey);
    return;
  }
  if (!appData.records[dateKey]) appData.records[dateKey]={};
  appData.records[dateKey][fieldKey]=value;
  saveData(appData);
  renderWeekGrid(); renderDayDetail(dateKey);
}
function validateTimeRange(fieldKey, timeValue) {
  var match = fieldKey.match(/^(morning|afternoon|evening)(In|Out)$/);
  if (!match) return { valid: true };
  var period = match[1], direction = match[2];
  var startKey = period + direction + 'Start';
  var endKey = period + direction + 'End';
  var startVal = appData.settings[startKey];
  var endVal = appData.settings[endKey];
  if (!startVal || !endVal) return { valid: true };
  var t = timeToMinutes(timeValue);
  var tStart = timeToMinutes(startVal);
  var tEnd = timeToMinutes(endVal);
  var periodLabel = {morning:'上午',afternoon:'下午',evening:'晚上'}[period];
  var dirLabel = direction==='In'?'签到':'签退';
  if (t < tStart || t > tEnd) {
    return { valid: false, msg: periodLabel+dirLabel+'有效时间段为 '+startVal+'~'+endVal+'，请重新选择' };
  }
  return { valid: true };
}

  document.getElementById('setEveningInStart').value=s.eveningInStart||'19:00';
  document.getElementById('setEveningInEnd').value=s.eveningInEnd||'19:30';
  document.getElementById('setEveningOutStart').value=s.eveningOutStart||'21:00';
  document.getElementById('setEveningOutEnd').value=s.eveningOutEnd||'22:30';
  document.getElementById('setMorningTarget').value=appData.targets.morning;
  document.getElementById('setAfternoonTarget').value=appData.targets.afternoon;
  document.getElementById('setEveningTarget').value=appData.targets.evening;
}
function saveSettings() {
  appData.settings.morningInStart=document.getElementById('setMorningInStart').value;
  appData.settings.morningInEnd=document.getElementById('setMorningInEnd').value;
  appData.settings.morningOutStart=document.getElementById('setMorningOutStart').value;
  appData.settings.morningOutEnd=document.getElementById('setMorningOutEnd').value;
  appData.settings.afternoonInStart=document.getElementById('setAfternoonInStart').value;
  appData.settings.afternoonInEnd=document.getElementById('setAfternoonInEnd').value;
  appData.settings.afternoonOutStart=document.getElementById('setAfternoonOutStart').value;
  appData.settings.afternoonOutEnd=document.getElementById('setAfternoonOutEnd').value;
  appData.settings.eveningInStart=document.getElementById('setEveningInStart').value;
  appData.settings.eveningInEnd=document.getElementById('setEveningInEnd').value;
  appData.settings.eveningOutStart=document.getElementById('setEveningOutStart').value;
  appData.settings.eveningOutEnd=document.getElementById('setEveningOutEnd').value;
  var mt=parseInt(document.getElementById('setMorningTarget').value)||240;
  var at=parseInt(document.getElementById('setAfternoonTarget').value)||240;
  var et=parseInt(document.getElementById('setEveningTarget').value)||120;
  if (mt<10) mt=10; if (mt>720) mt=720;
  if (at<10) at=10; if (at>720) at=720;
  if (et<10) et=10; if (et>720) et=720;
  appData.targets.morning=mt;
  appData.targets.afternoon=at;
  appData.targets.evening=et;
  saveData(appData); refreshAll(); showToast('设置已保存');
}
function resetSettings() { appData.settings=getDefaultSettings(); appData.targets=getDefaultTargets(); saveData(appData); renderSettingsTab(); refreshAll(); showToast('已恢复默认设置'); }
function clearAllData() {
  if (confirm('确定要清除所有打卡数据吗？此操作不可恢复！建议先导出 Excel 备份。')) {
    appData={settings:getDefaultSettings(),records:{},targets:getDefaultTargets()}; saveData(appData); refreshAll(); showToast('所有数据已清除');
  }
}

// ============ Excel ============
function exportExcel() {
  var dates=getWeekDates(currentWeekOffset);
  var rows=[['日期','星期','上午签到','上午签退','上午时长','下午签到','下午签退','下午时长','晚上签到','晚上签退','晚上时长','当日总时长','打卡进度']];
  var tm=0,ta=0,te=0,tall=0;
  dates.forEach(function(d){
    var dateKey=formatDate(d),dur=calcDayDurations(dateKey),rec=appData.records[dateKey]||{};
    tm+=dur.morning.actual; ta+=dur.afternoon.actual; te+=dur.evening.actual; tall+=dur.totalActual;
    rows.push([dateKey,getWeekdayName(d),rec.morningIn||'',rec.morningOut||'',dur.morning.actual>0?formatDurationFull(dur.morning.actual):'',rec.afternoonIn||'',rec.afternoonOut||'',dur.afternoon.actual>0?formatDurationFull(dur.afternoon.actual):'',rec.eveningIn||'',rec.eveningOut||'',dur.evening.actual>0?formatDurationFull(dur.evening.actual):'',dur.totalActual>0?formatDurationFull(dur.totalActual):'',dur.totalPct+'%']);
  });
  rows.push(['合计','','','',formatDurationFull(tm),'','',formatDurationFull(ta),'','',formatDurationFull(te),formatDurationFull(tall),'']);
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:8},{wch:10},{wch:10},{wch:12},{wch:10},{wch:10},{wch:12},{wch:10},{wch:10},{wch:12},{wch:14},{wch:10}];
  var wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'打卡记录');
  XLSX.writeFile(wb,'打卡记录_'+getWeekLabel(dates).replace(/ ~ /g,'_')+'.xlsx'); showToast('Excel 导出成功！');
}

// ============ Tabs ============
function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active');});
  if (tabName==='clock') { document.getElementById('tab-clock').style.display='block'; document.querySelector('[data-tab="clock"]').classList.add('active'); renderClockTab(); }
  else if (tabName==='stats') { document.getElementById('tab-stats').style.display='block'; document.querySelector('[data-tab="stats"]').classList.add('active'); renderStatsTab(); }
  else if (tabName==='settings') { document.getElementById('tab-settings').style.display='block'; document.querySelector('[data-tab="settings"]').classList.add('active'); renderSettingsTab(); }
}
document.getElementById('tabNav').addEventListener('click',function(e){var btn=e.target.closest('.tab-btn'); if(!btn) return; switchTab(btn.dataset.tab);});
function refreshAll() { var activeTab=document.querySelector('.tab-btn.active'); if(activeTab) switchTab(activeTab.dataset.tab); else renderClockTab(); }
document.addEventListener('keydown',function(e){ if(e.ctrlKey&&e.key==='ArrowLeft'){e.preventDefault();prevWeek();} if(e.ctrlKey&&e.key==='ArrowRight'){e.preventDefault();nextWeek();} if(e.ctrlKey&&e.key==='t'){e.preventDefault();goCurrentWeek();} });
switchTab('clock');
</script>
