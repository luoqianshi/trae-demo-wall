<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 周计划生成器</title>
<style>
  :root {
    --primary: #4F46E5;
    --primary-hover: #4338CA;
    --primary-light: #EEF2FF;
    --primary-ghost: rgba(79,70,229,0.08);
    --high: #EF4444;
    --high-bg: #FEF2F2;
    --high-border: #FECACA;
    --medium: #3B82F6;
    --medium-bg: #EFF6FF;
    --medium-border: #BFDBFE;
    --low: #6B7280;
    --low-bg: #F9FAFB;
    --low-border: #E5E7EB;
    --bg: #F1F5F9;
    --card: #FFFFFF;
    --text: #0F172A;
    --text-secondary: #64748B;
    --border: #E2E8F0;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    --shadow-sm: 0 2px 4px rgba(0,0,0,0.04), 0 4px 8px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.08), 0 16px 48px rgba(0,0,0,0.04);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { overflow-x: hidden; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  .container {
    max-width: 1140px;
    margin: 0 auto;
    padding: 32px 24px 80px;
    width: 100%;
    min-width: 0;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    padding-top: 24px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.8px;
  }
  .header h1 span { color: var(--primary); }
  .header p {
    color: var(--text-secondary);
    font-size: 15px;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* Input Section */
  .input-section {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 32px;
    margin-bottom: 40px;
    border: 1px solid var(--border);
  }
  .input-section label {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .input-section label .hint {
    font-weight: 400;
    color: var(--text-secondary);
    font-size: 13px;
    margin-left: 6px;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 16px 18px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: #FAFBFC;
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    line-height: 1.7;
  }
  textarea::placeholder { color: #94A3B8; }
  textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
    background: #fff;
  }
  textarea.shake-error {
    border-color: var(--high) !important;
    animation: shake 0.45s ease;
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  /* Primary Button */
  .btn-generate {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 36px;
    background: linear-gradient(135deg, var(--primary) 0%, #6366F1 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 12px rgba(79,70,229,0.3);
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .btn-generate::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .btn-generate:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(79,70,229,0.4);
  }
  .btn-generate:hover:not(:disabled)::after {
    background: rgba(255,255,255,0.08);
  }
  .btn-generate:active:not(:disabled) {
    transform: translateY(0) scale(0.97);
    box-shadow: 0 2px 8px rgba(79,70,229,0.3);
  }
  .btn-generate:disabled {
    opacity: 0.65;
    cursor: not-allowed;
    transform: none !important;
  }
  .btn-generate .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .btn-generate.loading .spinner { display: inline-block; }
  .btn-generate.loading .btn-text { display: none; }
  .btn-generate.loading .btn-loading-text { display: inline; }
  .btn-generate .btn-loading-text { display: none; }

  /* Secondary Button */
  .btn-reset {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 24px;
    background: #fff;
    color: var(--text-secondary);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn-reset:hover {
    border-color: #CBD5E1;
    color: var(--text);
    background: #F8FAFC;
    transform: translateY(-1px);
  }
  .btn-reset:active {
    transform: translateY(0) scale(0.97);
  }

  /* Copy Button */
  .btn-copy {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 24px;
    background: var(--primary-ghost);
    color: var(--primary);
    border: 1.5px solid rgba(79,70,229,0.15);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn-copy:hover {
    background: rgba(79,70,229,0.14);
    border-color: rgba(79,70,229,0.25);
    transform: translateY(-1px);
  }
  .btn-copy:active {
    transform: translateY(0) scale(0.97);
  }
  .btn-copy svg { width: 16px; height: 16px; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results { display: none; }
  .results.show { display: block; animation: fadeIn 0.4s ease; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .results-header h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .results-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .legend {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .legend-dot.high { background: var(--high); }
  .legend-dot.medium { background: var(--medium); }
  .legend-dot.low { background: var(--low); }

  /* Week Grid */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 14px;
  }

  .day-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
    animation: fadeInUp 0.5s ease both;
  }
  .day-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-3px);
  }

  .day-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }
  .day-date {
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .day-card.today .day-header {
    background: linear-gradient(135deg, var(--primary-light) 0%, #E0E7FF 100%);
  }
  .day-card.today .day-name { color: var(--primary); }

  .day-tasks {
    padding: 12px 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 11px 12px;
    border-radius: var(--radius-xs);
    border-left: 3px solid transparent;
    font-size: 13px;
    line-height: 1.55;
    transition: all 0.15s ease;
    cursor: default;
  }
  .task-item:hover {
    filter: brightness(0.97);
    transform: translateX(1px);
  }

  .task-item.high {
    background: var(--high-bg);
    border-left-color: var(--high);
  }
  .task-item.medium {
    background: var(--medium-bg);
    border-left-color: var(--medium);
  }
  .task-item.low {
    background: var(--low-bg);
    border-left-color: var(--low);
  }

  .task-checkbox {
    flex-shrink: 0;
    width: 17px; height: 17px;
    border: 2px solid #CBD5E1;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 1px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .task-checkbox:hover { border-color: var(--primary); }
  .task-checkbox.checked {
    background: var(--primary);
    border-color: var(--primary);
  }
  .task-checkbox.checked::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }

  .task-content { flex: 1; }
  .task-content.done { text-decoration: line-through; color: var(--text-secondary); }

  .priority-tag {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 5px;
    margin-top: 1px;
    letter-spacing: 0.3px;
  }
  .priority-tag.high { background: var(--high); color: #fff; }
  .priority-tag.medium { background: var(--medium); color: #fff; }
  .priority-tag.low { background: var(--low); color: #fff; }

  .empty-day {
    padding: 24px 12px;
    text-align: center;
    color: #CBD5E1;
    font-size: 13px;
  }

  /* Stats bar */
  .stats-bar {
    margin-top: 28px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 14px;
  }
  .stat-item { text-align: center; }
  .stat-value {
    font-size: 26px;
    font-weight: 800;
    color: var(--primary);
    line-height: 1.2;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-weight: 500;
  }

  /* Progress bar */
  .progress-section {
    margin-top: 16px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    padding: 20px 28px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .progress-header span:last-child { font-weight: 600; color: var(--text); }
  .progress-track {
    width: 100%;
    height: 10px;
    background: var(--bg);
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #8B5CF6);
    border-radius: 5px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--text);
    color: #fff;
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Empty hint */
  .empty-hint {
    display: none;
    background: var(--high-bg);
    border: 1px solid var(--high-border);
    color: var(--high);
    padding: 10px 16px;
    border-radius: var(--radius-xs);
    font-size: 13px;
    font-weight: 500;
    margin-top: 12px;
    animation: fadeIn 0.25s ease;
  }
  .empty-hint.show { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    40% { transform: translateX(7px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Responsive */
  @media (max-width: 1024px) {
    .week-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 768px) {
    .container { padding: 20px 16px 48px; }
    .header { margin-bottom: 28px; padding-top: 12px; }
    .header h1 { font-size: 24px; }
    .input-section { padding: 22px; margin-bottom: 28px; }
    .week-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .day-card { animation-delay: 0s !important; }
    .stats-bar { padding: 16px 18px; gap: 10px; }
    .stat-value { font-size: 22px; }
    .progress-section { padding: 16px 18px; }
    .results-header { margin-bottom: 18px; }
    .results-header h2 { font-size: 18px; }
    .legend { gap: 12px; font-size: 12px; }
  }
  @media (max-width: 480px) {
    .container { padding: 16px 12px 40px; max-width: 100%; }
    .header h1 { font-size: 22px; }
    .header p { font-size: 14px; }
    .input-section { padding: 18px; }
    textarea { min-height: 100px; padding: 14px; font-size: 16px; }
    .week-grid { grid-template-columns: 1fr; gap: 10px; }
    .btn-generate, .btn-reset, .btn-copy {
      width: 100%;
      justify-content: center;
      padding: 14px;
    }
    .btn-row { flex-direction: column; gap: 10px; }
    .results-actions { width: 100%; }
    .results-actions .btn-copy { width: 100%; }
    .results-header { flex-direction: column; align-items: flex-start; }
    .legend { width: 100%; justify-content: flex-start; }
    .day-header { padding: 14px 14px 10px; }
    .day-tasks { padding: 10px 10px 14px; }
    .task-item { padding: 10px; font-size: 14px; }
    .stats-bar { padding: 14px 14px; }
    .stat-value { font-size: 20px; }
    .progress-section { padding: 14px 16px; }
    .toast { font-size: 13px; padding: 10px 18px; white-space: normal; text-align: center; max-width: 90vw; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>AI <span>周计划</span>生成器</h1>
    <p>输入你的核心目标，智能拆解为每日可执行任务</p>
  </div>

  <!-- Input -->
  <div class="input-section">
    <label>本周核心目标 <span class="hint">（1-3个，每行一个）</span></label>
    <textarea id="goalsInput" placeholder="例如：&#10;完成产品需求文档的初稿&#10;学习 TypeScript 基础语法&#10;每周跑步 3 次，每次 5 公里"></textarea>
    <div class="empty-hint" id="emptyHint">请先输入至少一个核心目标，再点击生成</div>
    <div class="btn-row">
      <button class="btn-generate" id="btnGenerate" onclick="generatePlan()">
        <span class="spinner"></span>
        <span class="btn-text">生成周计划</span>
        <span class="btn-loading-text">生成中...</span>
      </button>
      <button class="btn-reset" onclick="resetAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        重置
      </button>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <h2 id="weekTitle"></h2>
      <div class="results-actions">
        <button class="btn-copy" id="btnCopy" onclick="copyPlan()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          复制全部计划
        </button>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot high"></div>高优先级</div>
          <div class="legend-item"><div class="legend-dot medium"></div>中优先级</div>
          <div class="legend-item"><div class="legend-dot low"></div>低优先级</div>
        </div>
      </div>
    </div>

    <div class="week-grid" id="weekGrid"></div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="progress-section">
      <div class="progress-header">
        <span>本周完成进度</span>
        <span id="progressText">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== SMART Task Decomposition Engine ====================

const DAYS = ['周一','周二','周三','周四','周五','周六','周日'];

const TEMPLATES = {
  '文档|报告|方案|计划|初稿|总结|提案|PRD|需求|说明书': {
    tasks: [
      { text: '收集3-5份同类文档作为参考，整理成对比表格', priority: 'high' },
      { text: '用思维导图梳理文档大纲（至少3个一级章节）', priority: 'high' },
      { text: '撰写第一章节初稿（不少于500字）', priority: 'high' },
      { text: '补充关键数据、图表或案例支撑材料', priority: 'medium' },
      { text: '邀请2位同事评审并收集书面反馈', priority: 'medium' },
      { text: '根据反馈逐条修改，标注修改点', priority: 'medium' },
      { text: '统一排版格式，检查错别字与数据一致性', priority: 'low' },
      { text: '导出最终版本并同步到团队文档库', priority: 'low' },
    ]
  },
  '学习|培训|课程|读书|阅读|教程|掌握|语法|基础': {
    tasks: [
      { text: '列出本周要学的3个核心知识点清单', priority: 'high' },
      { text: '完成第一章视频/章节学习并做笔记', priority: 'high' },
      { text: '动手完成课后练习题（至少5道）', priority: 'high' },
      { text: '用所学知识完成一个小demo或实验', priority: 'medium' },
      { text: '整理学习笔记为结构化文档（含代码片段）', priority: 'medium' },
      { text: '针对1个难点查阅资料并写出理解总结', priority: 'medium' },
      { text: '回顾本周笔记，用费曼法复述核心概念', priority: 'low' },
      { text: '制定下周进阶学习清单', priority: 'low' },
    ]
  },
  '运动|跑步|健身|锻炼|游泳|瑜伽|骑行|减脂': {
    tasks: [
      { text: '制定本周训练计划（含3次具体训练安排）', priority: 'high' },
      { text: '完成周一训练：热身10min + 主训练30min + 拉伸', priority: 'high' },
      { text: '完成周三训练：热身10min + 主训练30min + 拉伸', priority: 'high' },
      { text: '完成周五训练：热身10min + 主训练30min + 拉伸', priority: 'medium' },

const GENERIC_TEMPLATE = [
  { text: '拆解目标为3个可量化的里程碑', priority: 'high' },
  { text: '列出执行所需资源清单（工具/人/信息）', priority: 'high' },
  { text: '完成第一步具体动作并记录结果', priority: 'high' },
  { text: '推进主体工作，完成阶段性交付物', priority: 'medium' },
  { text: '识别并解决当前最大卡点', priority: 'medium' },
  { text: '对照里程碑检查进度，调整计划', priority: 'medium' },
  { text: '整理成果物并做最终检查', priority: 'low' },
  { text: '写100字复盘，提炼可复用经验', priority: 'low' },
];

function matchTemplate(goalText) {
  let bestMatch = null;
  let bestScore = 0;
  for (const [pattern, template] of Object.entries(TEMPLATES)) {
    const keywords = pattern.split('|');
    let score = 0;
    for (const kw of keywords) {
      if (goalText.includes(kw)) score++;
    }
    if (score > bestScore) {
      bestScore = score;
      bestMatch = template;
    }
  }
  return bestScore > 0 ? bestMatch.tasks : null;
}

function decomposeGoals(goals) {
  const allTasks = [];
  for (const goal of goals) {
    const trimmed = goal.trim();
    if (!trimmed) continue;
    const matched = matchTemplate(trimmed);
    const tasks = matched || GENERIC_TEMPLATE.map(t => ({ ...t }));
    for (const task of tasks) {
      allTasks.push({ text: task.text, priority: task.priority, goal: trimmed, done: false });
    }
  }
  return allTasks;
}

// ==================== Rhythm-Aware Distribution ====================
function distributeTasks(tasks) {
  const days = Array.from({ length: 7 }, () => []);
  const high = tasks.filter(t => t.priority === 'high');
  const medium = tasks.filter(t => t.priority === 'medium');
  const low = tasks.filter(t => t.priority === 'low');
  shuffle(high); shuffle(medium); shuffle(low);
  const MAX_PER_DAY = 4;

  const highSlots = [0, 1, 0, 1];
  high.forEach((task, i) => {
    const slot = highSlots[i % highSlots.length];
    if (slot !== undefined && days[slot].length < MAX_PER_DAY) {
      days[slot].push(task);
    } else {
      days[findBestSlot(days, MAX_PER_DAY, [2, 3])].push(task);
    }
  });

  const medSlots = [2, 3, 2, 3, 0, 1];
  medium.forEach((task, i) => {
    const slot = medSlots[i % medSlots.length];
    if (days[slot].length < MAX_PER_DAY) {
      days[slot].push(task);
    } else {
      days[findBestSlot(days, MAX_PER_DAY, [2, 3, 0, 1])].push(task);
    }
  });

  const lowSlots = [4, 5, 6, 4, 5, 6, 0, 1, 2, 3];
  low.forEach((task, i) => {
    const slot = lowSlots[i % lowSlots.length];
    if (days[slot].length < MAX_PER_DAY) {
      days[slot].push(task);
    } else {
      days[findBestSlot(days, MAX_PER_DAY, [4, 5, 6, 2, 3, 0, 1])].push(task);
    }
  });

  for (let d = 0; d < 7; d++) {
    while (days[d].length > MAX_PER_DAY) {
      const overflow = days[d].pop();
      days[findBestSlot(days, MAX_PER_DAY, [0,1,2,3,4,5,6].filter(i => i !== d))].push(overflow);
    }
  }

  days.forEach(day => {
    day.sort((a, b) => {
      const order = { high: 0, medium: 1, low: 2 };
      return order[a.priority] - order[b.priority];
    });
  });
  return days;
}

function findBestSlot(days, maxCap, preferredOrder) {
  for (const idx of preferredOrder) { if (days[idx].length < maxCap) return idx; }
  for (let i = 0; i < 7; i++) { if (days[i].length < maxCap) return i; }
  let min = Infinity, minIdx = 0;
  for (let i = 0; i < 7; i++) { if (days[i].length < min) { min = days[i].length; minIdx = i; } }
  return minIdx;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ==================== UI Logic ====================

let currentPlan = null;
let totalTasks = 0;
let doneTasks = 0;

function generatePlan() {
  const input = document.getElementById('goalsInput').value.trim();
  const emptyHint = document.getElementById('emptyHint');

  if (!input) {
    emptyHint.classList.add('show');
    shakeInput();
    setTimeout(() => emptyHint.classList.remove('show'), 3000);
    return;
  }

  const goals = input.split('\n').map(g => g.trim()).filter(g => g.length > 0);
  if (goals.length === 0) {
    emptyHint.classList.add('show');
    shakeInput();
    setTimeout(() => emptyHint.classList.remove('show'), 3000);
    return;
  }

  emptyHint.classList.remove('show');

  const btn = document.getElementById('btnGenerate');
  btn.classList.add('loading');
  btn.disabled = true;

  setTimeout(() => {
    const allTasks = decomposeGoals(goals);
    const weekDays = distributeTasks(allTasks);
    currentPlan = weekDays;
    totalTasks = allTasks.length;
    doneTasks = 0;
    renderPlan(weekDays, goals);
    updateStats();
    btn.classList.remove('loading');
    btn.disabled = false;
  }, 1200 + Math.random() * 600);
}

function shakeInput() {
  const textarea = document.getElementById('goalsInput');
  textarea.classList.add('shake-error');
  setTimeout(() => textarea.classList.remove('shake-error'), 500);
}

function renderPlan(weekDays, goals) {
  const results = document.getElementById('results');
  const grid = document.getElementById('weekGrid');
  const title = document.getElementById('weekTitle');

  const today = new Date();
  const dayOfWeek = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const monday = new Date(today);
  monday.setDate(today.getDate() - dayOfWeek);
  const endDate = new Date(monday);
  endDate.setDate(monday.getDate() + 6);
  title.textContent = `${monday.getMonth()+1}/${monday.getDate()} - ${endDate.getMonth()+1}/${endDate.getDate()} 周计划`;

  grid.innerHTML = '';
  weekDays.forEach((tasks, i) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);
    const dateStr = `${date.getMonth()+1}/${date.getDate()}`;
    const isToday = i === dayOfWeek;

    const card = document.createElement('div');
    card.className = `day-card${isToday ? ' today' : ''}`;
    card.style.animationDelay = `${i * 0.06}s`;

    let tasksHtml = '';
    if (tasks.length === 0) {
      tasksHtml = '<div class="empty-day">暂无任务安排</div>';
    } else {
      tasks.forEach((task, ti) => {
        tasksHtml += `
          <div class="task-item ${task.priority}" data-day="${i}" data-task="${ti}">
            <div class="task-checkbox" onclick="toggleTask(${i}, ${ti}, this)"></div>
            <div class="task-content">${task.text}</div>
            <span class="priority-tag ${task.priority}">${
              task.priority === 'high' ? '高' : task.priority === 'medium' ? '中' : '低'
            }</span>
          </div>`;
      });
    }

    card.innerHTML = `
      <div class="day-header">
        <span class="day-name">${DAYS[i]}${isToday ? ' (今天)' : ''}</span>
        <span class="day-date">${dateStr}</span>
      </div>
      <div class="day-tasks">${tasksHtml}</div>`;
    grid.appendChild(card);
  });

  results.classList.add('show');
  setTimeout(() => results.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function toggleTask(dayIdx, taskIdx, checkboxEl) {
  if (!currentPlan) return;
  const task = currentPlan[dayIdx][taskIdx];
  task.done = !task.done;
  checkboxEl.classList.toggle('checked', task.done);
  const content = checkboxEl.nextElementSibling;
  content.classList.toggle('done', task.done);
  doneTasks += task.done ? 1 : -1;
  updateStats();
}

function updateStats() {
  const highCount = currentPlan.flat().filter(t => t.priority === 'high').length;
  const medCount = currentPlan.flat().filter(t => t.priority === 'medium').length;
  const lowCount = currentPlan.flat().filter(t => t.priority === 'low').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><div class="stat-value">${totalTasks}</div><div class="stat-label">总任务数</div></div>
    <div class="stat-item"><div class="stat-value" style="color:var(--high)">${highCount}</div><div class="stat-label">高优先级</div></div>
    <div class="stat-item"><div class="stat-value" style="color:var(--medium)">${medCount}</div><div class="stat-label">中优先级</div></div>
    <div class="stat-item"><div class="stat-value" style="color:var(--low)">${lowCount}</div><div class="stat-label">低优先级</div></div>
    <div class="stat-item"><div class="stat-value" style="color:#10B981">${doneTasks}</div><div class="stat-label">已完成</div></div>`;

  const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
  document.getElementById('progressText').textContent = `${doneTasks} / ${totalTasks}`;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

function resetAll() {
  document.getElementById('goalsInput').value = '';
  document.getElementById('results').classList.remove('show');
  document.getElementById('emptyHint').classList.remove('show');
  currentPlan = null;
  totalTasks = 0;
  doneTasks = 0;
}

// ==================== Copy Plan ====================
function copyPlan() {
  if (!currentPlan) return;

  const today = new Date();
  const dayOfWeek = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const monday = new Date(today);
  monday.setDate(today.getDate() - dayOfWeek);

  let text = document.getElementById('weekTitle').textContent + '\n';
  text += '='.repeat(text.length - 1) + '\n\n';

  currentPlan.forEach((tasks, i) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);
    const dateStr = `${date.getMonth()+1}/${date.getDate()}`;
    text += `【${DAYS[i]} ${dateStr}】\n`;
    if (tasks.length === 0) {
      text += '  暂无任务\n';
    } else {
      tasks.forEach(task => {
        const mark = task.done ? '[x]' : '[ ]';
        const pLabel = task.priority === 'high' ? '[高]' : task.priority === 'medium' ? '[中]' : '[低]';
        text += `  ${mark} ${task.text} ${pLabel}\n`;
      });
    }
    text += '\n';
  });

  text += `---\n`;
  text += `总任务: ${totalTasks} | 已完成: ${doneTasks} | 完成率: ${totalTasks > 0 ? Math.round((doneTasks/totalTasks)*100) : 0}%\n`;
  text += `生成时间: ${new Date().toLocaleString('zh-CN')}`;

  navigator.clipboard.writeText(text).then(() => {
    showToast('计划已复制到剪贴板');
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('计划已复制到剪贴板');
  });
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ==================== Keyboard Shortcuts ====================
document.getElementById('goalsInput').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    generatePlan();
  }
});
