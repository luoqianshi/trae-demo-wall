<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能客服助手 — 潮品数码商城</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif;
  background: #F1F5F9;
  overflow: hidden;
  height: 100vh;
}

/* ===== Layout ===== */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ===== Sidebar ===== */
.sidebar {
  width: 250px; background: #0F172A; display: flex; flex-direction: column;
  padding: 24px 0; flex-shrink: 0; transition: width 0.25s ease, padding 0.25s ease;
  z-index: 10;
}
.sidebar.collapsed { width: 0; padding: 0; overflow: hidden; }

.sidebar-section { padding: 0 20px; }
.sidebar-divider { border-bottom: 1px solid #1E293B; padding-bottom: 20px; margin-bottom: 20px; }

.brand-row { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, #6366F1, #8B5CF6);
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.brand-name { color: #F8FAFC; font-weight: 700; font-size: 14px; }
.brand-status { color: #10B981; font-size: 11px; display: flex; align-items: center; gap: 5px; }
.brand-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10B981; display: inline-block; }

.section-label { color: #94A3B8; font-size: 11px; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }

.brand-text {
  color: #CBD5E1; font-size: 12px; line-height: 1.7; cursor: pointer; padding: 10px; border-radius: 8px;
  background: #1E293B; border: 1px solid transparent; transition: border-color 0.2s;
}
.brand-text:hover { border-color: #4F46E5; }
.brand-text .edit-hint { color: #6366F1; font-size: 11px; margin-top: 4px; }

.brand-edit-area textarea {
  width: 100%; height: 80px; border-radius: 8px; border: 1px solid #4F46E5;
  background: #1E293B; color: #F8FAFC; font-size: 12px; padding: 8px; resize: none;
  outline: none; font-family: inherit; line-height: 1.5;
}
.brand-edit-btns { display: flex; gap: 8px; margin-top: 8px; }
.btn-sm {
  flex: 1; padding: 6px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer; font-family: inherit;
}
.btn-save { background: #6366F1; color: #fff; }
.btn-cancel { background: #334155; color: #CBD5E1; }

.quick-btn {
  width: 100%; background: #1E293B; border: 1px solid #334155; color: #CBD5E1;
  border-radius: 8px; padding: 10px 12px; font-size: 12px; text-align: left; cursor: pointer;
  line-height: 1.5; transition: all 0.2s; font-family: inherit; margin-bottom: 8px;
}
.quick-btn:hover { background: #2D3F55; border-color: #6366F1; color: #E2E8F0; }
.quick-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.clear-btn {
  width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155;
  background: transparent; color: #64748B; font-size: 12px; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.clear-btn:hover { border-color: #EF4444; color: #EF4444; }

/* ===== Main Chat ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.header {
  background: #FFFFFF; border-bottom: 1px solid #E2E8F0; padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.menu-btn { background: none; border: none; cursor: pointer; color: #64748B; font-size: 20px; padding: 4px; border-radius: 6px; }
.menu-btn:hover { color: #0F172A; }
.header-title { font-weight: 700; color: #0F172A; font-size: 16px; }
.header-sub { color: #64748B; font-size: 12px; margin-top: 1px; }
.ai-badge {
  background: #F0FDF4; border: 1px solid #BBF7D0; color: #16A34A;
  font-size: 12px; padding: 4px 14px; border-radius: 20px; font-weight: 600;
}

.messages {
  flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px;
}

.empty-state { text-align: center; margin: auto; color: #94A3B8; }
.empty-state .icon-lg { font-size: 52px; margin-bottom: 12px; }
.empty-state h3 { font-weight: 600; color: #475569; margin-bottom: 6px; font-size: 15px; }
.empty-state p { font-size: 13px; }

.msg-row { display: flex; gap: 10px; align-items: flex-end; }
.msg-row.user { justify-content: flex-end; }
.msg-row.assistant { justify-content: flex-start; }

.msg-avatar {
  width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 17px;
}
.msg-avatar.ai { background: linear-gradient(135deg, #6366F1, #8B5CF6); }
.msg-avatar.user { background: #E2E8F0; }

.msg-bubble {
  max-width: 65%; border-radius: 18px 18px 4px 18px; padding: 12px 16px;
  font-size: 14px; line-height: 1.65; word-break: break-word;
}
.msg-bubble.ai {
  background: #FFFFFF; color: #1E293B; border-radius: 18px 18px 18px 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid #F1F5F9;
}
.msg-bubble.user {
  background: linear-gradient(135deg, #6366F1, #4F46E5); color: #FFFFFF;
  box-shadow: 0 2px 12px rgba(99,102,241,0.3);
}
.msg-bubble .ai-label { font-size: 10px; color: #A5B4FC; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; }

/* Typing dots */
.typing-dots { display: flex; gap: 4px; align-items: center; height: 20px; }
.typing-dots .dot { width: 7px; height: 7px; border-radius: 50%; background: #A5B4FC; }
.typing-dots .dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
.typing-dots .dot:nth-child(2) { animation: bounce 1.2s ease-in-out 0.2s infinite; }
.typing-dots .dot:nth-child(3) { animation: bounce 1.2s ease-in-out 0.4s infinite; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Input area */
.input-area { background: #FFFFFF; border-top: 1px solid #E2E8F0; padding: 14px 24px; }
.input-row {
  display: flex; gap: 10px; align-items: flex-end; background: #F8FAFC;
  border-radius: 14px; border: 2px solid #E2E8F0; padding: 6px 6px 6px 16px;
  transition: border-color 0.2s;
}
.input-row:focus-within { border-color: #6366F1; }

.input-row textarea {
  flex: 1; border: none; background: transparent; outline: none;
  font-size: 14px; color: #1E293B; resize: none; line-height: 1.6;
  padding-top: 8px; font-family: inherit; max-height: 100px; overflow-y: auto;
}
.input-row textarea::placeholder { color: #94A3B8; }

.send-btn {
  width: 40px; height: 40px; border-radius: 10px; border: none; flex-shrink: 0;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.send-btn.active { background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff; }
.send-btn.inactive { background: #E2E8F0; color: #94A3B8; cursor: not-allowed; }

.input-hint { text-align: center; color: #CBD5E1; font-size: 11px; margin-top: 8px; }

/* Welcome banner */
.welcome-banner {
  background: linear-gradient(135deg, #EEF2FF, #E0E7FF); border-radius: 16px;
  padding: 20px 24px; margin-bottom: 8px; display: flex; align-items: center; gap: 16px;
}
.welcome-banner .wb-icon { font-size: 40px; }
.welcome-banner .wb-text h4 { color: #3730A3; font-size: 15px; margin-bottom: 4px; }
.welcome-banner .wb-text p { color: #6366F1; font-size: 13px; line-height: 1.5; }

/* Responsive */
@media (max-width: 720px) {
  .sidebar { width: 220px; }
  .sidebar.collapsed { width: 0; }
  .msg-bubble { max-width: 85%; }
  .header { padding: 12px 16px; }
  .messages { padding: 16px; }
  .input-area { padding: 12px 16px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- ========== Sidebar ========== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section sidebar-divider">
      <div class="brand-row">
        <div class="brand-icon">🤖</div>
        <div>
          <div class="brand-name">智能客服</div>
          <div class="brand-status"><span class="brand-status-dot"></span>在线服务中</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section sidebar-divider">
      <div class="section-label">品牌信息</div>
      <div id="brandView">
        <div class="brand-text" onclick="startEditBrand()" id="brandDisplay"></div>
      </div>
      <div class="brand-edit-area" id="brandEdit" style="display:none">
        <textarea id="brandInput"></textarea>
        <div class="brand-edit-btns">
          <button class="btn-sm btn-save" onclick="saveBrand()">保存</button>
          <button class="btn-sm btn-cancel" onclick="cancelEditBrand()">取消</button>
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1;overflow-y:auto;">
      <div class="section-label">常见问题</div>
      <div id="quickBtns"></div>
    </div>

    <div class="sidebar-section" style="margin-top:12px;">
      <button class="clear-btn" onclick="clearChat()">清空对话</button>
    </div>
  </aside>

  <!-- ========== Main Chat ========== -->
  <div class="main">
    <div class="header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()" title="切换侧边栏">☰</button>
        <div>
          <div class="header-title">AI 客服助手</div>
          <div class="header-sub">由 DeepSeek 驱动 · 智能应答</div>
        </div>
      </div>
      <div class="ai-badge">✦ AI 在线</div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="icon-lg">💬</div>
        <h3>有什么可以帮你的？</h3>
        <p>点击左侧常见问题或直接输入</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="msgInput" rows="1" placeholder="输入你的问题… (Enter 发送)" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn inactive" id="sendBtn" onclick="sendMessage()">↑</button>
      </div>
      <div class="input-hint">Demo 演示模式 · AI 智能应答</div>
    </div>
  </div>
</div>

<script>
// ==================== STATE ====================
const QUICK_QUESTIONS = [
  "我的订单什么时候发货？",
  "如何申请退款退货？",
  "产品有质量问题怎么办？",
  "支持哪些支付方式？",
  "如何修改收货地址？"
];

const DEFAULT_BRAND = "潮品数码商城 — 专注年轻人的数码好物，覆盖手机配件、耳机、智能穿戴等品类，7天无理由退换，极速发货。";

let messages = [];
let brandInfo = DEFAULT_BRAND;
let editingBrand = false;
let loading = false;

// ==================== AI SIMULATION ====================
const SMART_REPLIES = {
  default: [
    "感谢您的咨询 😊 让我来帮您解答～",
    "好的，我了解您的问题了，请稍等……",
    "这是一个常见问题，我来为您详细说明一下 👇"
  ],
  order: [
    "您好！订单一般在下单后 24-48 小时内安排发货哦 📦\n\n如果您需要查询具体订单的发货状态，请提供订单号，我可以帮您进一步确认。一般情况下，发货后您会收到包含物流单号的短信提醒。",
    "我们一般会在 1-2 个工作日内发货，物流信息会在发货后同步更新 📮\n\n如遇活动期间订单量较大，可能会有轻微延迟，敬请谅解。如需加急，可以联系人工客服哦～",
    "发货时效：正常 48 小时内发出 ✈️\n\n您可以关注短信通知或在小程序「我的订单」中查看物流进度。如果超过 48 小时仍未发货，可能是商品临时缺货，建议联系人工客服确认～"
  ],
  refund: [
    "退款退货流程很简单哦，跟着下面几步就行 🙌\n\n1️⃣ 在「我的订单」中找到对应订单\n2️⃣ 点击「申请退款/退货」\n3️⃣ 选择退款原因并提交\n4️⃣ 审核通过后会生成退货地址\n5️⃣ 寄回商品后等待退款到账\n\n我们支持 7 天无理由退换，审核一般 24 小时内完成 💚",
    "退货很方便的！我们支持 7 天无理由退换服务 🔄\n\n操作步骤：\n→ 进入「我的订单」\n→ 选择需要退货的商品\n→ 点击「申请售后」\n→ 填写退货原因\n→ 提交后等待审核（通常 1 个工作日内）\n\n审核通过后您会收到退货地址，退款将在收到退货后 3-5 个工作日内原路返回 💰"
  ],
  quality: [
    "非常抱歉给您带来不便！如果产品存在质量问题，我们一定会负责到底 💪\n\n📋 请按以下步骤处理：\n1. 先拍照/录视频保留凭证\n2. 在订单详情页点击「申请售后」\n3. 选择「质量问题」并上传凭证\n4. 客服会在 24 小时内审核处理\n\n可申请换货或退款，来回运费由我们承担。再次为不好的体验道歉 🙏",
    "产品有质量问题？别担心，我们一定帮您处理好 😊\n\n首先请您拍几张能体现问题的照片，然后在订单页面提交售后申请，选择「商品质量问题」+ 上传图片。\n\n我们的售后团队会在收到申请后尽快处理，支持免费换新或全额退款，不需要您承担任何运费 🛡️"
  ],
  payment: [
    "目前我们支持以下支付方式 💳\n\n✅ 微信支付\n✅ 支付宝\n✅ 银行卡支付（借记卡/信用卡）\n✅ Apple Pay\n\n暂时不支持货到付款哦～支付过程中如遇到问题，随时找我 😊",
    "付款方式多多！您可以用以下几种：\n\n📱 微信支付 / 支付宝 — 最快捷\n💳 银行卡 — 支持国内主流银行\n🍎 Apple Pay — iOS 用户专属\n\n所有支付均通过加密通道，安全有保障 🔒 暂不支持货到付款和分期哦～"
  ],
  address: [
    "修改收货地址很简单，看这里 🏠\n\n如果订单还未发货：\n→ 进入「我的订单」→ 找到对应订单 → 点击「修改地址」即可\n\n如果订单已经发货：\n→ 需要联系人工客服协助更改，我们会帮您联系快递公司修改配送信息\n\n建议下单前仔细核对地址，避免不必要的麻烦哦 📍",
    "收货地址怎么改？分两种情况 📝\n\n❌ 未发货订单：直接在「我的订单」页面修改，即时生效\n✅ 已发货订单：需要联系人工客服，由我们帮您联系物流修改\n\n📌 小提示：发货后修改地址可能会增加 1-2 天的配送时间哦～"
  ],
  greet: [
    "您好！欢迎来到潮品数码商城 🙌 有什么可以帮您的吗？",
    "Hi～很高兴为您服务 😊 请问有什么想了解的？",
    "您好呀！有什么需要帮忙的吗？无论是产品咨询还是售后问题，都可以问我哦 💬"
  ],
  fallback: [
    "抱歉，这个问题涉及到具体的账户/订单信息，建议您联系人工客服处理哦 📞\n\n您可以拨打客服热线或在公众号留言，我们会尽快为您解决～",
    "这个问题我需要更多信息才能准确回答 😊 建议您：\n\n1. 在订单页查看相关说明\n2. 联系人工客服获取一对一服务\n3. 在工作时间拨打 400 客服热线\n\n还有什么其他我能帮您的吗？"
  ]
};

function getAIReply(userMsg) {
  const text = userMsg.toLowerCase().replace(/\s/g, '');

  if (/你好|hi|hello|在吗/.test(text)) {
    return pickRandom(SMART_REPLIES.greet);
  }
  if (/发货|物流|订单.*什么时候|什么时候.*发|快递|发货时间/.test(text)) {
    return pickRandom(SMART_REPLIES.order);
  }
  if (/退款|退货|退换|退钱|申请退款|如何退/.test(text)) {
    return pickRandom(SMART_REPLIES.refund);
  }
  if (/质量|坏了|有问题|瑕疵|破损|次品|不能用/.test(text)) {
    return pickRandom(SMART_REPLIES.quality);
  }
  if (/支付|付款|微信|支付宝|银行卡|怎么付|支付方式/.test(text)) {
    return pickRandom(SMART_REPLIES.payment);
  }
  if (/地址|收货|修改地址|收货地址|改地址/.test(text)) {
    return pickRandom(SMART_REPLIES.address);
  }

  // Longer unknown queries → fallback
  if (text.length > 8 && !/[吗呢吧啊？?]$/.test(text)) {
    return pickRandom(SMART_REPLIES.fallback);
  }

  return pickRandom(SMART_REPLIES.default);
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ==================== DOM HELPERS ====================
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

// ==================== RENDER ====================
function renderQuickBtns() {
  const container = document.getElementById('quickBtns');
  container.innerHTML = QUICK_QUESTIONS.map(q =>
    `<button class="quick-btn" onclick="sendMessage('${q.replace(/'/g, "\\'")}')" ${loading ? 'disabled' : ''}>${q}</button>`
  ).join('');
}

function renderBrandDisplay() {
  const text = brandInfo;
  document.getElementById('brandDisplay').innerHTML =
    (text.length > 60 ? text.slice(0, 60) + '…' : text) +
    '<div class="edit-hint">点击编辑 ✎</div>';
}

function renderMessages() {
  const container = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');

  if (messages.length === 0) {
    container.innerHTML = '';
    container.appendChild(createEmptyState());
    return;
  }

  let html = '<div class="welcome-banner"><div class="wb-icon">✨</div><div class="wb-text"><h4>Demo 演示模式</h4><p>本 Demo 为离线演示版本，模拟 AI 客服智能应答。实际产品接入 DeepSeek 大模型。</p></div></div>';

  messages.forEach(msg => {
    const isUser = msg.role === 'user';
    html += `<div class="msg-row ${isUser ? 'user' : 'assistant'}">`;
    if (!isUser) {
      html += '<div class="msg-avatar ai">🤖</div>';
    }
    html += `<div class="msg-bubble ${isUser ? 'user' : 'ai'}">`;
    if (!isUser) {
      html += '<div class="ai-label">✦ AI 回复</div>';
    }
    html += `<div style="white-space:pre-wrap">${escHtml(msg.content)}</div>`;
    html += '</div>';
    if (isUser) {
      html += '<div class="msg-avatar user">👤</div>';
    }
    html += '</div>';
  });

  if (loading) {
    html += `
      <div class="msg-row assistant">
        <div class="msg-avatar ai">🤖</div>
        <div class="msg-bubble ai" style="padding:14px 18px;">
          <div class="typing-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
        </div>
      </div>`;
  }

  container.innerHTML = html;
  scrollToBottom();
}

function createEmptyState() {
  const div = document.createElement('div');
  div.className = 'empty-state';
  div.id = 'emptyState';
  div.innerHTML = '<div class="icon-lg">💬</div><h3>有什么可以帮你的？</h3><p>点击左侧常见问题或直接输入</p>';
  return div;
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function scrollToBottom() {
  const container = document.getElementById('messages');
  setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
}

// ==================== BRAND EDIT ====================
function startEditBrand() {
  if (loading) return;
  editingBrand = true;
  document.getElementById('brandInput').value = brandInfo;
  document.getElementById('brandView').style.display = 'none';
  document.getElementById('brandEdit').style.display = 'block';
  document.getElementById('brandInput').focus();
}

function saveBrand() {
  brandInfo = document.getElementById('brandInput').value.trim() || DEFAULT_BRAND;
  editingBrand = false;
  document.getElementById('brandView').style.display = 'block';
  document.getElementById('brandEdit').style.display = 'none';
  renderBrandDisplay();
}

function cancelEditBrand() {
  editingBrand = false;
  document.getElementById('brandInput').value = brandInfo;
  document.getElementById('brandView').style.display = 'block';
  document.getElementById('brandEdit').style.display = 'none';
}

// ==================== CHAT LOGIC ====================
async function sendMessage(text) {
  const input = document.getElementById('msgInput');
  const msgText = (text || input.value.trim());

  if (!msgText || loading) return;

  messages.push({ role: 'user', content: msgText });
  input.value = '';
  input.style.height = 'auto';
  loading = true;
  updateSendBtn();
  renderMessages();
  renderQuickBtns();

  // Simulate AI thinking delay
  await sleep(600 + Math.random() * 800);

  const reply = getAIReply(msgText);
  messages.push({ role: 'assistant', content: reply });
  loading = false;
  renderMessages();
  renderQuickBtns();
  updateSendBtn();
  input.focus();
}

function clearChat() {
  if (loading) return;
  messages = [];
  renderMessages();
  document.getElementById('msgInput').focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  updateSendBtn();
}

function updateSendBtn() {
  const input = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  const hasText = input.value.trim().length > 0;
  btn.className = 'send-btn ' + (hasText && !loading ? 'active' : 'inactive');
}

// ==================== SIDEBAR TOGGLE ====================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ==================== INIT ====================
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function init() {
  renderBrandDisplay();
  renderQuickBtns();
  renderMessages();
  document.getElementById('msgInput').addEventListener('input', () => updateSendBtn());
  document.getElementById('msgInput').focus();
}

init();
</script>
</body>
</html>
