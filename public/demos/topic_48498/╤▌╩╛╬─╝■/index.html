<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在线考试系统</title>
    <script src="./assets/app.js"></script>
  <script>
      // Polyfill for Node.js globals in browser
      window.process = window.process || { env: { NODE_ENV: 'production', BASE_URL: './' } };
      window.global = window;
      window.Buffer = window.Buffer || { isBuffer: function() { return false; } };
      window.addEventListener('error', function(e) {
        alert('页面加载出错：' + (e.error && e.error.message ? e.error.message : e.message));
      });
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
