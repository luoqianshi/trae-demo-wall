<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菜帮帮 - AI买菜小助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F3EE;
  --bg-warm: #EDE6DB;
  --ink: #2C2420;
  --ink-light: #5C5348;
  --muted: #9A9088;
  --rule: #D4CCC3;
  --accent: #C75C2E;
  --accent-light: #E87A4A;
  --accent-bg: #FDF0E8;
  --green: #5A8F5E;
  --green-bg: #E8F2E9;
  --blue: #4A7A9E;
  --blue-bg: #E8F0F6;
  --yellow: #C9A23A;
  --yellow-bg: #FDF6E0;
  --purple: #8B6B9E;
  --purple-bg: #F0E8F5;
  --card: #FFFFFF;
  --shadow: 0 4px 24px rgba(44,36,32,0.08);
  --shadow-hover: 0 8px 32px rgba(44,36,32,0.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.8;
  min-height: 100vh;
}

/* ===== Header ===== */
header {
  background: var(--card);
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.92);
}
.header-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 0.8rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent);
}
.logo-icon {
  width: 40px; height: 40px;
  background: var(--accent);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
}
.nav-tabs {
  display: flex;
  gap: 0.3rem;
}
.nav-tab {
  padding: 0.5rem 1rem;
  border-radius: 8px;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: transparent;
  color: var(--ink-light);
  font-family: inherit;
}
.nav-tab:hover { background: var(--bg); color: var(--ink); }
.nav-tab.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }

/* ===== Main ===== */
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* ===== Hero Input ===== */
.hero-section {
  text-align: center;
  padding: 3rem 0 2rem;
}
.hero-section h1 {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 2.4rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  color: var(--ink);
}
.hero-section .subtitle {
  color: var(--muted);
  font-size: 1rem;
  margin-bottom: 2rem;
}

.input-area {
  background: var(--card);
  border-radius: 20px;
  padding: 1.5rem;
  box-shadow: var(--shadow);
  max-width: 640px;
  margin: 0 auto;
  border: 1px solid var(--rule);
}
.input-row {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 1rem;
}
#dishInput {
  flex: 1;
  padding: 0.9rem 1.2rem;
  border: 2px solid var(--rule);
  border-radius: 12px;
  font-size: 1rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  background: var(--bg);
}
#dishInput:focus { border-color: var(--accent); }
#dishInput::placeholder { color: var(--muted); }
.btn-primary {
  padding: 0.9rem 1.8rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.quick-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
}
.quick-tag {
  padding: 0.4rem 0.9rem;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 20px;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  color: var(--ink-light);
}
.quick-tag:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* ===== Section Title ===== */
.section-title {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 1.4rem;
  font-weight: 700;
  margin: 2.5rem 0 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.section-title .icon { font-size: 1.2rem; }

/* ===== Result Cards ===== */
.result-card {
  background: var(--card);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.2rem;
  box-shadow: var(--shadow);
  border: 1px solid var(--rule);
  animation: fadeInUp 0.4s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px dashed var(--rule);
}
.result-header h3 {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 1.3rem;
  color: var(--accent);
}
.result-header .meta {
  font-size: 0.8rem;
  color: var(--muted);
}

/* ===== Ingredient List ===== */
.ingredient-category {
  margin-bottom: 1rem;
}
.ingredient-category h4 {
  font-size: 0.9rem;
  color: var(--ink-light);
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
.ingredient-items {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.ingredient-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 0.8rem;
  background: var(--bg);
  border-radius: 8px;
  font-size: 0.88rem;
  border: 1px solid var(--rule);
  cursor: pointer;
  transition: all 0.2s;
}
.ingredient-item:hover { border-color: var(--accent); }
.ingredient-item.checked {
  opacity: 0.5;
  text-decoration: line-through;
  background: var(--green-bg);
  border-color: var(--green);
}
.ingredient-item input[type="checkbox"] {
  cursor: pointer;
  width: 16px; height: 16px;
  accent-color: var(--green);
}

/* ===== Recommend Cards ===== */
.recommend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
}
.recommend-card {
  background: var(--card);
  border-radius: 14px;
  padding: 1.2rem;
  border: 1px solid var(--rule);
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.recommend-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: var(--accent);
}
.recommend-card .dish-name {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 0.3rem;
}
.recommend-card .dish-tags {
  display: flex;
  gap: 0.3rem;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}
.recommend-card .dish-tag {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 10px;
  font-weight: 500;
}
.recommend-card .dish-desc {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.6;
}
.recommend-card .dish-action {
  margin-top: 0.8rem;
  padding-top: 0.6rem;
  border-top: 1px solid var(--rule);
  font-size: 0.82rem;
  color: var(--accent);
  font-weight: 600;
}

.tag-spicy { background: #FDE8E0; color: #C75C2E; }
.tag-sweet { background: #FDF0E0; color: #C9A23A; }
.tag-light { background: #E8F2E9; color: #5A8F5E; }
.tag-salty { background: #E8F0F6; color: #4A7A9E; }
.tag-hot { background: #F0E8F5; color: #8B6B9E; }

/* ===== Blind Box ===== */
.blindbox-area {
  text-align: center;
  padding: 2rem;
  background: var(--card);
  border-radius: 20px;
  border: 2px dashed var(--rule);
  margin-bottom: 1.5rem;
}
.blindbox-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  display: inline-block;
  animation: shake 2s infinite;
}
@keyframes shake {
  0%, 100% { transform: rotate(0deg); }
  10% { transform: rotate(-8deg); }
  20% { transform: rotate(8deg); }
  30% { transform: rotate(-4deg); }
  40% { transform: rotate(4deg); }
  50% { transform: rotate(0deg); }
}
.blindbox-area h3 {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 1.3rem;
  margin-bottom: 0.5rem;
}
.blindbox-area p {
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 1.2rem;
}

/* ===== Hot Dishes ===== */
.hot-dish-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--rule);
  margin-bottom: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.hot-dish-item:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.hot-rank {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.85rem;
  flex-shrink: 0;
}
.hot-rank.top3 { background: var(--accent-bg); color: var(--accent); }
.hot-rank.normal { background: var(--bg); color: var(--muted); }
.hot-info { flex: 1; }
.hot-name { font-weight: 600; margin-bottom: 0.15rem; }
.hot-desc { font-size: 0.82rem; color: var(--muted); }
.hot-tag {
  font-size: 0.72rem;
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  background: var(--yellow-bg);
  color: var(--yellow);
  font-weight: 600;
  white-space: nowrap;
}

/* ===== Loading ===== */
.loading {
  text-align: center;
  padding: 3rem;
  color: var(--muted);
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--rule);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--muted);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

/* ===== Footer ===== */
footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid var(--rule);
  color: var(--muted);
  font-size: 0.82rem;
}

/* ===== Responsive ===== */
@media (max-width: 640px) {
  .hero-section h1 { font-size: 1.8rem; }
  .input-row { flex-direction: column; }
  .recommend-grid { grid-template-columns: 1fr; }
  .nav-tabs { display: none; }
  .header-inner { justify-content: center; }
}

/* ===== Hidden ===== */
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🥬</div>
      <span>菜帮帮</span>
    </div>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-tab="list">📝 买菜清单</button>
      <button class="nav-tab" data-tab="recommend">🍽️ 口味推荐</button>
      <button class="nav-tab" data-tab="blindbox">🎁 盲盒选菜</button>
      <button class="nav-tab" data-tab="hot">🔥 热门菜品</button>
    </nav>
  </div>
</header>

<main>

<!-- ===== TAB: 买菜清单 ===== -->
<div id="tab-list" class="tab-content">
  <div class="hero-section">
    <h1>今天想吃什么？</h1>
    <p class="subtitle">告诉我菜名，我帮你列好买菜清单</p>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="dishInput" placeholder="例如：红烧肉、麻婆豆腐、糖醋排骨...">
        <button class="btn-primary" onclick="generateList()">生成清单</button>
      </div>
      <div class="quick-tags">
        <button class="quick-tag" onclick="setInput('红烧肉')">红烧肉</button>
        <button class="quick-tag" onclick="setInput('麻婆豆腐')">麻婆豆腐</button>
        <button class="quick-tag" onclick="setInput('番茄炒蛋')">番茄炒蛋</button>
        <button class="quick-tag" onclick="setInput('可乐鸡翅')">可乐鸡翅</button>
        <button class="quick-tag" onclick="setInput('酸辣土豆丝')">酸辣土豆丝</button>
        <button class="quick-tag" onclick="setInput('清蒸鲈鱼')">清蒸鲈鱼</button>
      </div>
    </div>
  </div>
  <div id="listResult"></div>
</div>

<!-- ===== TAB: 口味推荐 ===== -->
<div id="tab-recommend" class="tab-content hidden">
  <div class="hero-section">
    <h1>想吃点什么口味的？</h1>
    <p class="subtitle">选择你的口味偏好，AI为你推荐今日菜单</p>
    <div class="input-area">
      <div class="quick-tags">
        <button class="quick-tag" onclick="recommendByTaste('spicy')">🌶️ 辣味</button>
        <button class="quick-tag" onclick="recommendByTaste('sweet')">🍯 甜味</button>
        <button class="quick-tag" onclick="recommendByTaste('light')">🥗 清淡</button>
        <button class="quick-tag" onclick="recommendByTaste('salty')">🧂 咸鲜</button>
        <button class="quick-tag" onclick="recommendByTaste('sour')">🍋 酸甜</button>
        <button class="quick-tag" onclick="recommendByTaste('heavy')">🍖 重口味</button>
      </div>
    </div>
  </div>
  <div id="recommendResult"></div>
</div>

<!-- ===== TAB: 盲盒选菜 ===== -->
<div id="tab-blindbox" class="tab-content hidden">
  <div class="hero-section">
    <h1>今天吃什么？交给命运吧</h1>
    <p class="subtitle">开盲盒，随机推荐一道创意菜品</p>
  </div>
  <div class="blindbox-area">
    <div class="blindbox-icon">🎁</div>
    <h3>开盲盒，随机选菜</h3>
    <p>不知道吃什么？让AI为你随机推荐一道菜，附带完整买菜清单</p>
    <button class="btn-primary" onclick="openBlindBox()" style="font-size:1.1rem;padding:1rem 2.5rem;">立即开盲盒</button>
  </div>
  <div id="blindboxResult"></div>
</div>

<!-- ===== TAB: 热门菜品 ===== -->
<div id="tab-hot" class="tab-content hidden">
  <div class="hero-section">
    <h1>全网热门菜品</h1>
    <p class="subtitle">实时追踪网络热门菜谱，尝鲜不落后</p>
  </div>
  <div class="section-title"><span class="icon">🔥</span>本周热门</div>
  <div id="hotResult"></div>
</div>

</main>

<footer>
  <p>菜帮帮 - Trae AI创造力大赛初赛Demo | 用AI让买菜更简单</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
