<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑白</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #000;
            z-index: 10;
            pointer-events: none;
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 2px solid rgba(0, 0, 0, 0.5);
        }

        .health-fill {
            height: 100%;
            background: #000;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #000;
        }

        .cooldown-indicator {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.7);
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(0, 0, 0, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }

        #minimap {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            z-index: 10;
            pointer-events: none;
        }

        #gameOver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #gameOver h1 {
            font-size: 96px;
            color: #000;
            margin-bottom: 20px;
            font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
            font-weight: bold;
            text-shadow: 8px 8px 30px rgba(0, 0, 0, 0.6);
        }

        #gameOver .final-score {
            font-size: 32px;
            color: #000;
            margin-bottom: 40px;
        }

        #restartBtn {
            padding: 15px 40px;
            font-size: 20px;
            background: #000;
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        #restartBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }

        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        #startScreen h1 {
            font-size: 72px;
            color: #000;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 0.8;
            }
            to {
                opacity: 1;
            }
        }

        #startScreen .instructions {
            color: rgba(0, 0, 0, 0.8);
            font-size: 18px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 2;
        }

        #startBtn {
            padding: 20px 60px;
            font-size: 24px;
            background: #000;
            border: none;
            border-radius: 40px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
        }

        #startBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.7);
        }

        #tutorial {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 200;
        }

        #tutorial h2 {
            font-size: 28px;
            color: #000;
            margin: 0 0 12px 0;
        }

        #tutorial .tutorial-content {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.6;
        }

        #tutorial .tutorial-hint {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        #tutorial .tutorial-progress {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        #tutorial .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
            transition: all 0.3s ease;
        }

        #tutorial .progress-dot.active {
            background: #000;
            transform: scale(1.3);
        }

        #nextTutorialBtn, #skipTutorialBtn {
            padding: 10px 25px;
            font-size: 16px;
            background: #000;
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            margin: 3px;
        }

        #skipTutorialBtn {
            background: transparent;
            border: 2px solid #000;
            color: #000;
        }

        #nextTutorialBtn:hover, #skipTutorialBtn:hover {
            transform: scale(1.05);
        }

        .tutorial-arrow {
            position: absolute;
            font-size: 40px;
            animation: bounce 1s ease-in-out infinite;
            pointer-events: none;
            z-index: 199;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>黑白</h1>
        <div class="instructions">
            <p>🎮 WASD 或 方向键 移动</p>
            <p>🖱️ 鼠标拖拽弹弓式位移（向后拖拽，向前弹射）</p>
            <p>⚔️ 位移时撞击敌人即可消灭</p>
        </div>
        <button id="startBtn">开始游戏</button>
        <button id="multiplayerBtn" style="margin-top: 15px; padding: 15px 40px; font-size: 20px; background: transparent; border: 2px solid #000; border-radius: 30px; color: #000; cursor: pointer; font-weight: bold;">双人联机</button>
    </div>

    <div id="ui">
        <div class="health-bar">
            <div class="health-fill" id="healthFill"></div>
        </div>
        <div class="score">分数: <span id="scoreDisplay">0</span></div>
        <div class="cooldown-indicator" id="cooldownIndicator"></div>
    </div>

    <div class="controls">
        WASD 或 方向键 移动 | 鼠标拖拽弹弓式位移（向后拖拽，向前弹射）
    </div>

    <canvas id="gameCanvas"></canvas>
    <canvas id="minimap"></canvas>

    <div id="gameOver">
        <h1>菜</h1>
        <div class="final-score">最终得分: <span id="finalScore">0</span></div>
        <button id="restartBtn">再来一局</button>
    </div>

    <div id="player2UI" style="position: fixed; top: 140px; left: 20px; z-index: 10; display: none;">
        <div style="font-size: 14px; color: #666; margin-bottom: 5px;">玩家2</div>
        <div class="health-bar" style="width: 200px;">
            <div class="health-fill" id="player2HealthFill"></div>
        </div>
    </div>

    <div id="respawnTimer" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 72px; color: #000; font-weight: bold; z-index: 200; display: none; text-shadow: 2px 2px 4px rgba(255,255,255,0.8);"></div>

    <div id="tutorial">
        <div class="tutorial-progress" id="tutorialProgress"></div>
        <h2 id="tutorialTitle">欢迎来到黑白！</h2>
        <div class="tutorial-content" id="tutorialContent"></div>
        <div class="tutorial-hint" id="tutorialHint"></div>
        <div>
            <button id="skipTutorialBtn">跳过教程</button>
            <button id="nextTutorialBtn">下一步</button>
        </div>
    </div>

    <div id="multiplayerMenu" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 150; flex-direction: column; justify-content: center; align-items: center;">
        <h2 style="font-size: 36px; color: #000; margin-bottom: 30px;">双人联机</h2>
        
        <div style="margin-bottom: 30px; text-align: center;">
            <h3 style="font-size: 24px; color: #333; margin-bottom: 15px;">创建房间</h3>
            <button id="createRoomBtn" style="padding: 12px 30px; font-size: 18px; background: #000; color: #fff; border: none; border-radius: 25px; cursor: pointer; margin: 5px;">创建新房间</button>
            <p id="roomCodeDisplay" style="font-size: 20px; color: #000; margin-top: 15px; display: none;">
                房间代码: <strong id="roomCode" style="font-size: 28px; color: #000;"></strong>
            </p>
            <p style="font-size: 14px; color: #666; margin-top: 10px;">等待对方加入...</p>
        </div>
        
        <div style="margin-bottom: 30px; text-align: center;">
            <h3 style="font-size: 24px; color: #333; margin-bottom: 15px;">加入房间</h3>
            <input type="text" id="roomCodeInput" placeholder="输入房间代码" style="padding: 12px 20px; font-size: 18px; border: 2px solid #000; border-radius: 25px; width: 250px; text-align: center;">
            <br>
            <button id="joinRoomBtn" style="padding: 12px 30px; font-size: 18px; background: #000; color: #fff; border: none; border-radius: 25px; cursor: pointer; margin-top: 10px;">加入</button>
        </div>
        
        <button id="backToMenuBtn" style="padding: 10px 25px; font-size: 16px; background: transparent; color: #000; border: 2px solid #000; border-radius: 20px; cursor: pointer;">返回主菜单</button>
        
        <p id="connectionStatus" style="font-size: 16px; color: #666; margin-top: 20px;"></p>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        minimapCanvas.width = 200;
        minimapCanvas.height = 200;

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 25,
            vx: 0,
            vy: 0,
            health: 6,
            maxHealth: 6,
            isDashing: false,
            isInvincible: false,
            damageInvincible: 0,
            damageInvincibleMax: 60,
            dashCooldown: 0,
            dashCooldownMax: 90,
            dashDuration: 0,
            dashDurationMax: 15,
            dashTargetX: 0,
            dashTargetY: 0,
            dashStartX: 0,
            dashStartY: 0,
            speed: 5,
            acceleration: 0.5,
            friction: 0.92,
            trail: []
        };

        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            arrowup: false,
            arrowdown: false,
            arrowleft: false,
            arrowright: false
        };

        const MAP_WIDTH = 15000;
        const MAP_HEIGHT = 15000;

        let mouseX = 0;
        let mouseY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let aiBalls = [];
        let particles = [];
        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        let frameCount = 0;
        let timeScale = 1;
        let screenShake = 0;
        let screenShakeX = 0;
        let screenShakeY = 0;
        let cameraX = MAP_WIDTH / 2;
        let cameraY = MAP_HEIGHT / 2;
        let afterimages = [];
        let targetCameraX = MAP_WIDTH / 2;
        let targetCameraY = MAP_HEIGHT / 2;
        let zoom = 0.65;
        let moveTrails = [];
        let edgeGlow = 0; // 边缘发光效果强度
        
        // 联机系统
        let isMultiplayer = false;
        let isHost = false;
        let peer = null;
        let conn = null;
        let player2 = null;
        
        // 复活倒计时系统
        let isDead = false;
        let respawnCountdown = 0;
        let isPlayer2Dead = false;
        let player2RespawnCountdown = 0;
        
        const MIN_DASH_DISTANCE = 200;
        const MAX_DASH_DISTANCE = 800;

        const AI_BALL_COUNT = 20;
        const MAX_AI_BALLS = 35;
        
        function createPlayer2() {
            return {
                x: MAP_WIDTH / 2,
                y: MAP_HEIGHT / 2,
                radius: 25,
                vx: 0,
                vy: 0,
                health: 6,
                maxHealth: 6,
                isDashing: false,
                isInvincible: false,
                damageInvincible: 0,
                damageInvincibleMax: 60,
                dashCooldown: 0,
                dashCooldownMax: 90,
                dashDuration: 0,
                dashDurationMax: 15,
                dashVx: 0,
                dashVy: 0,
                speed: 5,
                acceleration: 0.5,
                friction: 0.92,
                trail: [],
                afterimages: [],
                moveTrails: [],
                keys: {
                    w: false, a: false, s: false, d: false,
                    arrowup: false, arrowdown: false, arrowleft: false, arrowright: false
                },
                isDragging: false,
                dragStartX: 0,
                dragStartY: 0
            };
        }
        
        class AIBall {
            constructor() {
                this.radius = 20 + Math.random() * 10;
                this.spawn();
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.health = 1;
                this.isAlive = true;
                this.aiState = 'wander';
                this.changeDirectionTimer = 0;
                this.changeDirectionInterval = 60 + Math.random() * 120;
                this.dashTimer = 0;
                this.dashCooldown = 300 + Math.random() * 300;
                this.opacity = 0;
                this.fadeIn = true;
            }

            spawn() {
                this.x = Math.random() * MAP_WIDTH;
                this.y = Math.random() * MAP_HEIGHT;
            }

            update() {
                if (this.fadeIn && this.opacity < 1) {
                    this.opacity += 0.02;
                    if (this.opacity >= 1) this.fadeIn = false;
                }

                if (!this.isAlive) return;

                this.changeDirectionTimer++;

                if (this.changeDirectionTimer >= this.changeDirectionInterval) {
                    this.changeDirectionTimer = 0;
                    this.changeDirectionInterval = 60 + Math.random() * 120;
                }

                // 确定追踪目标
                let targetX, targetY;
                
                if (isMultiplayer && player2 && !isPlayer2Dead) {
                    // 联机模式下，追踪更近的玩家
                    const distToPlayer1 = Math.hypot(player.x - this.x, player.y - this.y);
                    const distToPlayer2 = Math.hypot(player2.x - this.x, player2.y - this.y);
                    
                    if (isDead) {
                        // 玩家1死亡，追踪玩家2
                        targetX = player2.x;
                        targetY = player2.y;
                    } else if (isPlayer2Dead) {
                        // 玩家2死亡，追踪玩家1
                        targetX = player.x;
                        targetY = player.y;
                    } else if (distToPlayer1 <= distToPlayer2) {
                        // 玩家1更近
                        targetX = player.x;
                        targetY = player.y;
                    } else {
                        // 玩家2更近
                        targetX = player2.x;
                        targetY = player2.y;
                    }
                } else {
                    // 单人模式或玩家2不存在，只追踪玩家1
                    targetX = player.x;
                    targetY = player.y;
                }
                
                // 计算到目标的距离和角度
                const distToTarget = Math.hypot(targetX - this.x, targetY - this.y);
                const angleToTarget = Math.atan2(targetY - this.y, targetX - this.x);
                
                // 基础追随速度
                const chaseSpeed = 0.8;
                
                // 如果不在冲刺状态，持续向目标移动
                if (this.dashTimer <= 0) {
                    // 添加一些随机性让移动更自然
                    const randomAngle = (Math.random() - 0.5) * 0.5;
                    const finalAngle = angleToTarget + randomAngle;
                    this.vx = Math.cos(finalAngle) * chaseSpeed;
                    this.vy = Math.sin(finalAngle) * chaseSpeed;
                }

                // 距离目标一定距离时冲刺
                if (distToTarget < 400 && Math.random() < 0.015) {
                    this.dash(targetX, targetY);
                }

                if (this.dashTimer > 0) {
                    this.dashTimer--;
                    if (this.dashTimer === 0) {
                        // 冲刺结束后继续向目标移动
                        const newAngle = Math.atan2(targetY - this.y, targetX - this.x);
                        this.vx = Math.cos(newAngle) * chaseSpeed;
                        this.vy = Math.sin(newAngle) * chaseSpeed;
                    }
                }

                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;

                if (this.x < this.radius) {
                    this.x = this.radius;
                    this.vx *= -1;
                }
                if (this.x > MAP_WIDTH - this.radius) {
                    this.x = MAP_WIDTH - this.radius;
                    this.vx *= -1;
                }
                if (this.y < this.radius) {
                    this.y = this.radius;
                    this.vy *= -1;
                }
                if (this.y > MAP_HEIGHT - this.radius) {
                    this.y = MAP_HEIGHT - this.radius;
                    this.vy *= -1;
                }
            }

            dash(targetX, targetY) {
                if (this.dashTimer > 0) return;

                const angle = Math.atan2(targetY - this.y, targetX - this.x);
                const dashSpeed = 15;
                this.vx = Math.cos(angle) * dashSpeed;
                this.vy = Math.sin(angle) * dashSpeed;
                this.dashTimer = this.dashCooldown;
            }

            draw() {
                if (!this.isAlive) return;

                ctx.save();
                ctx.globalAlpha = this.opacity;

                const speed = Math.hypot(this.vx, this.vy);
                const isDashing = speed > 3;

                if (isDashing) {
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#000';
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#000';
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = isDashing ? '#555' : '#888';
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = isDashing ? '#000' : '#555';
                ctx.lineWidth = isDashing ? 4 : 3;
                ctx.stroke();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, speed, size) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const velocity = speed * (0.5 + Math.random() * 0.5);
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.life = 1;
                this.decay = 0.008 + Math.random() * 0.012;
                this.size = size * (0.5 + Math.random() * 0.5);
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.originalSize = this.size;
            }

            update() {
                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;
                this.vx *= 0.96;
                this.vy *= 0.96;
                this.life -= this.decay * timeScale;
                this.size = this.originalSize * (0.8 + this.life * 0.4);
                this.rotation += this.rotationSpeed * timeScale;
            }

            draw() {
                if (this.life <= 0) return;

                ctx.save();
                ctx.globalAlpha = this.life * 0.9;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#000';
                
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 绘制不规则的墨水斑点
                ctx.beginPath();
                const points = 6 + Math.floor(Math.random() * 4);
                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2;
                    const radius = this.size * (0.7 + Math.random() * 0.6);
                    const px = Math.cos(angle) * radius;
                    const py = Math.sin(angle) * radius;
                    if (i === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        const prevAngle = ((i - 1) / points) * Math.PI * 2;
                        const cp1x = Math.cos(prevAngle + 0.5) * this.size * 0.8;
                        const cp1y = Math.sin(prevAngle + 0.5) * this.size * 0.8;
                        const cp2x = Math.cos(angle - 0.5) * this.size * 0.8;
                        const cp2y = Math.sin(angle - 0.5) * this.size * 0.8;
                        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, px, py);
                    }
                }
                ctx.closePath();
                ctx.fillStyle = '#000';
                ctx.fill();
                ctx.restore();
            }
        }

        class WaterSplat {
            constructor(x, y, baseRadius) {
                this.x = x;
                this.y = y;
                this.baseRadius = baseRadius;
                this.currentRadius = 0;
                this.targetRadius = baseRadius * 2.2;
                this.alpha = 0.6;
                this.life = 1;
                this.decay = 0.004;
                this.blobs = [];
                this.waves = [];
                this.setupBlobs();
                this.setupWaves();
            }
            
            setupBlobs() {
                const blobCount = 6 + Math.floor(Math.random() * 5);
                for (let i = 0; i < blobCount; i++) {
                    const angle = (i / blobCount) * Math.PI * 2 + Math.random() * 0.5;
                    const dist = this.baseRadius * (0.4 + Math.random() * 0.7);
                    this.blobs.push({
                        offsetAngle: angle,
                        offsetDist: dist,
                        size: this.baseRadius * (0.2 + Math.random() * 0.3),
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }
            
            setupWaves() {
                const waveCount = 2 + Math.floor(Math.random() * 2);
                for (let i = 0; i < waveCount; i++) {
                    this.waves.push({
                        radius: this.targetRadius * (0.5 + i * 0.4),
                        width: 2 + i * 1.5,
                        alpha: 0.4 - i * 0.15,
                        speed: 0.02 + i * 0.01
                    });
                }
            }
            
            update() {
                if (this.currentRadius < this.targetRadius) {
                    this.currentRadius += (this.targetRadius - this.currentRadius) * 0.06;
                }
                this.life -= this.decay;
                this.alpha = this.life * 0.6;
                return this.life > 0;
            }
            
            draw() {
                if (this.life <= 0) return;
                
                ctx.save();
                
                // 绘制主水潭
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(100, 180, 255, 0.3)';
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200, 230, 255, 0.7)';
                ctx.fill();
                
                // 绘制周围的小水点
                ctx.shadowBlur = 8;
                for (const blob of this.blobs) {
                    const offsetX = this.x + Math.cos(blob.offsetAngle) * blob.offsetDist * (this.currentRadius / this.targetRadius);
                    const offsetY = this.y + Math.sin(blob.offsetAngle) * blob.offsetDist * (this.currentRadius / this.targetRadius);
                    
                    ctx.beginPath();
                    ctx.arc(offsetX, offsetY, blob.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 绘制水波纹
                for (const wave of this.waves) {
                    const waveRadius = wave.radius * (this.currentRadius / this.targetRadius);
                    ctx.globalAlpha = this.alpha * wave.alpha;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, waveRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(150, 200, 255, 0.6)';
                    ctx.lineWidth = wave.width;
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }

        function playKillSound() {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;

            // 主要击杀音效 - 清脆的打击声
            const osc1 = ctx.createOscillator();
            const gain1 = ctx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(800, now);
            osc1.frequency.exponentialRampToValueAtTime(200, now + 0.1);
            gain1.gain.setValueAtTime(0.3, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc1.connect(gain1);
            gain1.connect(ctx.destination);
            osc1.start(now);
            osc1.stop(now + 0.3);

            // 添加一点低频率打击感
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(150, now);
            osc2.frequency.exponentialRampToValueAtTime(50, now + 0.15);
            gain2.gain.setValueAtTime(0.2, now);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.start(now);
            osc2.stop(now + 0.15);

            // 添加一点噪音效果
            const bufferSize = ctx.sampleRate * 0.2;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.1));
            }
            const noise = ctx.createBufferSource();
            noise.buffer = buffer;
            const noiseGain = ctx.createGain();
            noiseGain.gain.setValueAtTime(0.15, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            noise.connect(noiseGain);
            noiseGain.connect(ctx.destination);
            noise.start(now);
            noise.stop(now + 0.2);
        }

            // 悲伤的下降音

        class KillText {
            constructor(text = 'nice', isGameOver = false) {
                this.text = text;
                this.isGameOver = isGameOver;
                this.life = 1;
                this.decay = isGameOver ? 0.005 : 0.008;
                this.vy = isGameOver ? 0 : -1.5;
                this.scale = isGameOver ? 3 : 2.5;
                this.rotation = (Math.random() - 0.5) * 0.15;
                this.offsetY = 0;
            }

            update() {
                if (this.isGameOver) {
                    // 游戏结束文字不动，保持
                    this.life -= this.decay;
                    // 稍微放大一下
                    this.scale = 3 + (1 - this.life) * 0.5;
                    return this.life > 0;
                } else {
                    this.offsetY += this.vy;
                    this.vy *= 0.985;
                    this.life -= this.decay;
                    this.scale *= 0.996;
                    return this.life > 0;
                }
            }

            draw() {
                if (this.life <= 0) return;

                // 计算屏幕中心位置
                const screenCenterX = canvas.width / 2;
                const screenCenterY = canvas.height / 2 + this.offsetY;

                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(screenCenterX, screenCenterY);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);

                const fontSize = this.isGameOver ? 96 : 72;

                // 绘制文字描边（白色外圈）
                ctx.font = `bold ${fontSize}px "Microsoft YaHei", "SimHei", Arial`;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = this.isGameOver ? 12 : 8;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeText(this.text, 0, 0);

                // 绘制文字填充
                ctx.fillStyle = '#000';
                ctx.fillText(this.text, 0, 0);
                
                // 添加文字阴影
                ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
                ctx.shadowBlur = this.isGameOver ? 30 : 20;
                ctx.shadowOffsetX = this.isGameOver ? 8 : 5;
                ctx.shadowOffsetY = this.isGameOver ? 8 : 5;
                
                ctx.restore();
            }
        }

        function updatePlayer() {
            if (player.isDashing) {
                player.dashDuration++;
                
                player.x += player.dashVx;
                player.y += player.dashVy;

                if (player.x < player.radius) {
                    player.x = player.radius;
                    player.dashVx = -player.dashVx * 0.9;
                    createExplosion(player.x, player.y, '#fff', 5);
                    screenShake = 10;
                }
                if (player.x > MAP_WIDTH - player.radius) {
                    player.x = MAP_WIDTH - player.radius;
                    player.dashVx = -player.dashVx * 0.9;
                    createExplosion(player.x, player.y, '#fff', 5);
                    screenShake = 10;
                }
                if (player.y < player.radius) {
                    player.y = player.radius;
                    player.dashVy = -player.dashVy * 0.9;
                    createExplosion(player.x, player.y, '#fff', 5);
                    screenShake = 10;
                }
                if (player.y > MAP_HEIGHT - player.radius) {
                    player.y = MAP_HEIGHT - player.radius;
                    player.dashVy = -player.dashVy * 0.9;
                    createExplosion(player.x, player.y, '#fff', 5);
                    screenShake = 10;
                }

                for (const ball of aiBalls) {
                if (!ball.isAlive) continue;
                
                const dist = Math.hypot(player.x - ball.x, player.y - ball.y);
                if (dist < player.radius + ball.radius) {
                    ball.health--;
                    if (ball.health <= 0) {
                        ball.isAlive = false;
                        score++;
                        updateUI();
                        createExplosion(ball.x, ball.y, '#aaa', 20);
                        waterSplats.push(new WaterSplat(ball.x, ball.y, ball.radius));
                        killTexts.push(new KillText());
                        playKillSound();
                        screenShake = 25;
                        edgeGlow = 1;

                        // 增加连击
                        comboCount++;
                        if (comboCount >= 2) {
                            comboTexts.push(new ComboText(comboCount));
                        }

                        player.dashCooldown = 0;

                        if (player.health < player.maxHealth) {
                            player.health++;
                            updateUI();
                        }

                        // 教程：检测击杀（在冲刺状态下）
                        if (inTutorial && tutorialStep === 3 && !tutorialActionCompleted) {
                            completeTutorialAction();
                        }

                        for (let i = 0; i < 3; i++) {
                            const offsetAngle = Math.random() * Math.PI * 2;
                            const offsetDist = 250 + Math.random() * 150;
                            const newX = player.x + Math.cos(offsetAngle) * offsetDist;
                            const newY = player.y + Math.sin(offsetAngle) * offsetDist;
                            
                            if (newX > 50 && newX < canvas.width - 50 && 
                                newY > 50 && newY < canvas.height - 50) {
                                aiBalls.push(new AIBall());
                                aiBalls[aiBalls.length - 1].x = newX;
                                aiBalls[aiBalls.length - 1].y = newY;
                                break;
                            }
                        }
                    }
                }
            }

                if (frameCount % 2 === 0) {
                    afterimages.push({
                        x: player.x,
                        y: player.y,
                        radius: player.radius,
                        alpha: 1,
                        scale: 1
                    });
                }

                if (player.dashDuration >= player.dashDurationMax) {
                    player.vx = player.dashVx * 0.4;
                    player.vy = player.dashVy * 0.4;
                    
                    player.isDashing = false;
                    player.isInvincible = false;
                    player.dashDuration = 0;
                }
            } else {
                let ax = 0;
                let ay = 0;

                if (keys.w) ay -= player.acceleration;
                if (keys.s) ay += player.acceleration;
                if (keys.a) ax -= player.acceleration;
                if (keys.d) ax += player.acceleration;
                if (keys.arrowup) ay -= player.acceleration;
                if (keys.arrowdown) ay += player.acceleration;
                if (keys.arrowleft) ax -= player.acceleration;
                if (keys.arrowright) ax += player.acceleration;

                if (ax !== 0 || ay !== 0) {
                    const length = Math.hypot(ax, ay);
                    if (length > 0) {
                        ax = (ax / length) * player.acceleration;
                        ay = (ay / length) * player.acceleration;
                    }
                }

                player.vx += ax;
                player.vy += ay;

                player.vx *= player.friction;
                player.vy *= player.friction;

                const speed = Math.hypot(player.vx, player.vy);
                if (speed > player.speed) {
                    player.vx = (player.vx / speed) * player.speed;
                    player.vy = (player.vy / speed) * player.speed;
                }

                player.x += player.vx * timeScale;
                player.y += player.vy * timeScale;
            }

            if (!player.isDashing) {
                if (player.x < player.radius) {
                    player.x = player.radius;
                    player.vx = Math.abs(player.vx) * 0.9;
                }
                if (player.x > MAP_WIDTH - player.radius) {
                    player.x = MAP_WIDTH - player.radius;
                    player.vx = -Math.abs(player.vx) * 0.9;
                }
                if (player.y < player.radius) {
                    player.y = player.radius;
                    player.vy = Math.abs(player.vy) * 0.9;
                }
                if (player.y > MAP_HEIGHT - player.radius) {
                    player.y = MAP_HEIGHT - player.radius;
                    player.vy = -Math.abs(player.vy) * 0.9;
                }
            }

            if (player.damageInvincible > 0) {
                player.damageInvincible--;
            }

            if (player.dashCooldown > 0) {
                player.dashCooldown--;
            }

            player.trail = player.trail.filter(t => {
                t.alpha -= 0.025;
                return t.alpha > 0;
            });

            afterimages = afterimages.filter(img => {
                img.alpha -= 0.04;
                img.scale -= 0.012;
                return img.alpha > 0 && img.scale > 0;
            });
            
            // 添加移动拖影
            const currentSpeed = Math.hypot(player.vx, player.vy);
            if (currentSpeed > 0.5 && frameCount % 3 === 0) {
                moveTrails.push({
                    x: player.x,
                    y: player.y,
                    alpha: 0.3,
                    size: player.radius * 0.85
                });
            }
            
            // 更新拖影
            moveTrails = moveTrails.filter(trail => {
                trail.alpha -= 0.006;
                trail.size *= 0.996;
                return trail.alpha > 0;
            });
        }

                let ax = 0;
                let ay = 0;

                if (p2.keys.w) ay -= p2.acceleration;
                if (p2.keys.s) ay += p2.acceleration;
                if (p2.keys.a) ax -= p2.acceleration;
                if (p2.keys.d) ax += p2.acceleration;
                if (p2.keys.arrowup) ay -= p2.acceleration;
                if (p2.keys.arrowdown) ay += p2.acceleration;
                if (p2.keys.arrowleft) ax -= p2.acceleration;
                if (p2.keys.arrowright) ax += p2.acceleration;

                if (ax !== 0 || ay !== 0) {
                    const length = Math.hypot(ax, ay);
                    if (length > 0) {
                        ax = (ax / length) * p2.acceleration;
                        ay = (ay / length) * p2.acceleration;
                    }
                }

                p2.vx += ax;
                p2.vy += ay;

                p2.vx *= p2.friction;
                p2.vy *= p2.friction;

                const speed = Math.hypot(p2.vx, p2.vy);
                if (speed > p2.speed) {
                    p2.vx = (p2.vx / speed) * p2.speed;
                    p2.vy = (p2.vy / speed) * p2.speed;
                }

                p2.x += p2.vx * timeScale;
                p2.y += p2.vy * timeScale;
            }

            if (!p2.isDashing) {
                if (p2.x < p2.radius) {
                    p2.x = p2.radius;
                    p2.vx = Math.abs(p2.vx) * 0.9;
                }
                if (p2.x > MAP_WIDTH - p2.radius) {
                    p2.x = MAP_WIDTH - p2.radius;
                    p2.vx = -Math.abs(p2.vx) * 0.9;
                }
                if (p2.y < p2.radius) {
                    p2.y = p2.radius;
                    p2.vy = Math.abs(p2.vy) * 0.9;
                }
                if (p2.y > MAP_HEIGHT - p2.radius) {
                    p2.y = MAP_HEIGHT - p2.radius;
                    p2.vy = -Math.abs(p2.vy) * 0.9;
                }
            }

            if (p2.damageInvincible > 0) {
                p2.damageInvincible--;
            }

            if (p2.dashCooldown > 0) {
                p2.dashCooldown--;
            }

            p2.trail = p2.trail.filter(t => {
                t.alpha -= 0.025;
                return t.alpha > 0;
            });

            p2.afterimages = p2.afterimages.filter(img => {
                img.alpha -= 0.04;
                img.scale -= 0.012;
                return img.alpha > 0 && img.scale > 0;
            });
            
            const currentSpeed = Math.hypot(p2.vx, p2.vy);
            if (currentSpeed > 0.5 && frameCount % 3 === 0) {
                p2.moveTrails.push({
                    x: p2.x,
                    y: p2.y,
                    alpha: 0.3,
                    size: p2.radius * 0.85
                });
            }
            
            p2.moveTrails = p2.moveTrails.filter(trail => {
                trail.alpha -= 0.006;
                trail.size *= 0.996;
                return trail.alpha > 0;
            });
        }

        function checkCollisions() {
            if (!player.isInvincible && player.damageInvincible === 0) {
                for (const ball of aiBalls) {
                    if (!ball.isAlive) continue;
                    
                    const dist = Math.hypot(player.x - ball.x, player.y - ball.y);
                    if (dist < player.radius + ball.radius) {
                        if (ball.vx > 3 || ball.vy > 3) {
                            player.health--;
                            player.damageInvincible = player.damageInvincibleMax;
                            createExplosion(player.x, player.y, '#fff', 10);
                            playHitSound();
                            comboCount = 0; // 重置连击
                            updateUI();

                            if (player.health <= 0) {
                                waterSplats.push(new WaterSplat(player.x, player.y, player.radius));
                                playDeathSound();
                                
                                // 联机模式下：复活倒计时
                                if (isMultiplayer) {
                                    isDead = true;
                                    respawnCountdown = 3; // 3秒复活
                                    document.getElementById('respawnTimer').style.display = 'block';
                                    document.getElementById('respawnTimer').textContent = respawnCountdown;
                                    player.health = player.maxHealth;
                                    // 在全图随机位置复活
                                    player.x = Math.random() * MAP_WIDTH;
                                    player.y = Math.random() * MAP_HEIGHT;
                                    // 确保不会复活在地图边缘
                                    player.x = Math.max(player.radius, Math.min(MAP_WIDTH - player.radius, player.x));
                                    player.y = Math.max(player.radius, Math.min(MAP_HEIGHT - player.radius, player.y));
                                } else {
                                    // 单人模式：结束游戏
                                    endGame();
                                    return;
                                }
                            }

                            const angle = Math.atan2(player.y - ball.y, player.x - ball.x);
                            player.x += Math.cos(angle) * 50;
                            player.y += Math.sin(angle) * 50;
                        } else {
                            const angle = Math.atan2(player.y - ball.y, player.x - ball.x);
                            const overlap = (player.radius + ball.radius) - dist;
                            
                            player.x += Math.cos(angle) * overlap;
                            player.y += Math.sin(angle) * overlap;
                            
                            const dotProduct = player.vx * Math.cos(angle) + player.vy * Math.sin(angle);
                            player.vx -= 2 * dotProduct * Math.cos(angle);
                            player.vy -= 2 * dotProduct * Math.sin(angle);
                            
                            player.vx *= 0.95;
                            player.vy *= 0.95;
                        }
                    }
                }
            }

            if (player.isInvincible) {
                for (const ball of aiBalls) {
                    if (!ball.isAlive) continue;

                    const dist = Math.hypot(player.x - ball.x, player.y - ball.y);
                    if (dist < player.radius + ball.radius) {
                        ball.isAlive = false;
                        score++;
                        player.dashCooldown = 0;
                        
                        // 非联机模式下击杀敌人才会回血
                        if (!isMultiplayer && player.health < player.maxHealth) {
                            player.health++;
                        }
                        
                        createExplosion(ball.x, ball.y, '#fff', 30);
                        waterSplats.push(new WaterSplat(ball.x, ball.y, ball.radius));
                        killTexts.push(new KillText());
                        playKillSound();
                        // 增加连击
                        comboCount++;
                        if (comboCount >= 2) {
                            comboTexts.push(new ComboText(comboCount));
                        }
                        // 教程：检测击杀
                        if (inTutorial && tutorialStep === 3 && !tutorialActionCompleted) {
                            completeTutorialAction();
                        }
                        screenShake = 25; // 增加击杀时的屏幕抖动
                        edgeGlow = 1; // 触发边缘发光
                        updateUI();
                    }
                }
            }
            
            // 联机模式：玩家1攻击玩家2
            if (isMultiplayer && player2 && player.isDashing && player.isInvincible) {
                const dist = Math.hypot(player.x - player2.x, player.y - player2.y);
                if (dist < player.radius + player2.radius && player2.damageInvincible === 0) {
                    // 通知对方被攻击
                    if (conn && conn.open) {
                        conn.send({ type: 'playerHit', from: 'player1' });
                    }
                    
                    player2.health--;
                    player2.damageInvincible = player2.damageInvincibleMax;
                    createExplosion(player2.x, player2.y, '#fff', 15);
                    playHitSound();
                    
                    if (player2.health <= 0) {
                        waterSplats.push(new WaterSplat(player2.x, player2.y, player2.radius));
                        playDeathSound();
                        
                        // 通知对方死亡（由对方自己处理复活）
                        if (conn && conn.open) {
                            conn.send({ type: 'playerDead', from: 'player1' });
                        }
                        
                        player2.health = player2.maxHealth;
                        // 在全图随机位置复活
                        player2.x = Math.random() * MAP_WIDTH;
                        player2.y = Math.random() * MAP_HEIGHT;
                        // 确保不会复活在地图边缘
                        player2.x = Math.max(player2.radius, Math.min(MAP_WIDTH - player2.radius, player2.x));
                        player2.y = Math.max(player2.radius, Math.min(MAP_HEIGHT - player2.radius, player2.y));
                    }
                    
                    const angle = Math.atan2(player2.y - player.y, player2.x - player.x);
                    player2.x += Math.cos(angle) * 50;
                    player2.y += Math.sin(angle) * 50;
                }
            }
        }

        function updateAI() {
            for (const ball of aiBalls) {
                ball.update();
            }

            const aliveCount = aiBalls.filter(b => b.isAlive).length;
            if (aliveCount < AI_BALL_COUNT && frameCount % 120 === 0) {
                aiBalls.push(new AIBall());
            }

            if (aliveCount < MAX_AI_BALLS && frameCount % 180 === 0) {
                aiBalls.push(new AIBall());
            }

            aiBalls = aiBalls.filter(b => b.isAlive);
        }

        function drawBackground() {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const offsetX = canvas.width / 2 - cameraX * zoom;
            const offsetY = canvas.height / 2 - cameraY * zoom;

            if (timeScale < 0.9) {
                const blurAmount = (1 - timeScale) * 10;
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 * (1 - timeScale)})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.save();
                ctx.strokeStyle = `rgba(0, 0, 0, ${0.3 * (1 - timeScale)})`;
                ctx.lineWidth = 2;
                const screenCenterX = canvas.width / 2;
                const screenCenterY = canvas.height / 2;
                const gradient = ctx.createRadialGradient(
                    screenCenterX, screenCenterY, 0,
                    screenCenterX, screenCenterY, Math.max(canvas.width, canvas.height) * 0.8
                );
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(1, `rgba(0, 0, 0, ${0.2 * (1 - timeScale)})`);
                ctx.strokeStyle = gradient;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(screenCenterX, screenCenterY, 100 + i * 100, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }

            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(zoom, zoom);
            
            // 绘制地图外的背景（更浅的灰色）
            ctx.fillStyle = 'rgba(245, 245, 245, 0.8)';
            const outerGridSize = 200;
            const outerStartX = Math.floor((cameraX - (canvas.width / 2) / zoom) / outerGridSize) * outerGridSize;
            const outerStartY = Math.floor((cameraY - (canvas.height / 2) / zoom) / outerGridSize) * outerGridSize;
            
            // 绘制外层稀疏网格（地图外的区域）
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.025)';
            ctx.lineWidth = 1;
            for (let x = outerStartX; x < cameraX + (canvas.width / 2) / zoom + outerGridSize; x += outerGridSize) {
                ctx.beginPath();
                ctx.moveTo(x, outerStartY - 10000);
                ctx.lineTo(x, outerStartY + (canvas.height / 2) / zoom + 20000);
                ctx.stroke();
            }
            for (let y = outerStartY; y < cameraY + (canvas.height / 2) / zoom + outerGridSize; y += outerGridSize) {
                ctx.beginPath();
                ctx.moveTo(outerStartX - 10000, y);
                ctx.lineTo(outerStartX + (canvas.width / 2) / zoom + 20000, y);
                ctx.stroke();
            }
            
            // 绘制地图内的正常网格
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 100;
            const startX = Math.floor((cameraX - (canvas.width / 2) / zoom) / gridSize) * gridSize;
            const startY = Math.floor((cameraY - (canvas.height / 2) / zoom) / gridSize) * gridSize;
            
            for (let x = startX; x < cameraX + (canvas.width / 2) / zoom + gridSize; x += gridSize) {
                if (x >= 0 && x <= MAP_WIDTH) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, MAP_HEIGHT);
                    ctx.stroke();
                }
            }
            for (let y = startY; y < cameraY + (canvas.height / 2) / zoom + gridSize; y += gridSize) {
                if (y >= 0 && y <= MAP_HEIGHT) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(MAP_WIDTH, y);
                    ctx.stroke();
                }
            }
            
            // 绘制地图边界（不可越过的墙）
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.lineWidth = 12;
            ctx.strokeRect(0, 0, MAP_WIDTH, MAP_HEIGHT);
            
            // 绘制内层强调边界
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.lineWidth = 4;
            ctx.strokeRect(10, 10, MAP_WIDTH - 20, MAP_HEIGHT - 20);
            
            // 绘制边界外的提示虚线
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 15]);
            ctx.strokeRect(-200, -200, MAP_WIDTH + 400, MAP_HEIGHT + 400);
            ctx.setLineDash([]);
            
            // 绘制水潭
            for (const splat of waterSplats) {
                splat.draw();
            }
            
            ctx.restore();
        }
        
        function drawPlayer2() {
            if (!player2 || isPlayer2Dead) return;
            
            const p2 = player2;
            
            // 绘制移动时的淡淡拖影
            for (const trail of p2.moveTrails) {
                ctx.save();
                ctx.globalAlpha = trail.alpha;
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#666';
                
                ctx.beginPath();
                ctx.arc(trail.x, trail.y, trail.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(100, 100, 100, 0.7)';
                ctx.fill();
                ctx.restore();
            }
            
            let currentVx = p2.isDashing ? p2.dashVx : p2.vx;
            let currentVy = p2.isDashing ? p2.dashVy : p2.vy;
            let speed = Math.hypot(currentVx, currentVy);
            let moveAngle = Math.atan2(currentVy, currentVx);
            
            // 计算拉伸变形
            let stretchFactor = Math.min(1.5, 1 + speed * 0.015);
            let squashFactor = 1 / Math.sqrt(stretchFactor);
            
            // 绘制更多的拖尾
            for (const img of p2.afterimages) {
                ctx.save();
                ctx.globalAlpha = img.alpha * 0.7;
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#666';
                
                let trailStretch = 1 + (img.scale - 1) * 1.5;
                let trailSquash = 1 / Math.sqrt(trailStretch);
                
                ctx.translate(img.x, img.y);
                ctx.rotate(moveAngle);
                ctx.scale(trailStretch, trailSquash);

                ctx.beginPath();
                ctx.arc(0, 0, img.radius * img.scale, 0, Math.PI * 2);
                ctx.fillStyle = '#666';
                ctx.fill();
                ctx.restore();
            }

            for (const t of p2.trail) {
                ctx.save();
                ctx.globalAlpha = t.alpha * 0.6;
                ctx.shadowBlur = 18;
                ctx.shadowColor = '#666';

                ctx.translate(t.x, t.y);
                ctx.rotate(moveAngle);
                ctx.scale(1.2, 0.85);

                ctx.beginPath();
                ctx.arc(0, 0, p2.radius * 0.85, 0, Math.PI * 2);
                ctx.fillStyle = '#666';
                ctx.fill();
                ctx.restore();
            }

            ctx.save();

            const showDamageFlash = p2.damageInvincible > 0 && Math.floor(frameCount / 5) % 2 === 0;
            
            if (p2.isInvincible) {
                ctx.shadowBlur = 45;
                ctx.shadowColor = '#666';

                const glowRadius = p2.radius + 20 + Math.sin(frameCount * 0.3) * 8;
                ctx.strokeStyle = 'rgba(100, 100, 100, 0.7)';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(p2.x, p2.y, glowRadius, 0, Math.PI * 2);
                ctx.stroke();
            } else if (showDamageFlash) {
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#666';
            } else {
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#666';
            }

            if (showDamageFlash) {
                ctx.globalAlpha = 0.3;
            }

            ctx.translate(p2.x, p2.y);
            ctx.rotate(moveAngle);
            ctx.scale(stretchFactor, squashFactor);

            ctx.beginPath();
            ctx.arc(0, 0, p2.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#666';
            ctx.fill();

            ctx.strokeStyle = '#888';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.restore();
        }

        function drawMinimap() {
            minimapCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            minimapCtx.fillRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            
            minimapCtx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
            minimapCtx.lineWidth = 2;
            minimapCtx.strokeRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            
            const scaleX = minimapCanvas.width / MAP_WIDTH;
            const scaleY = minimapCanvas.height / MAP_HEIGHT;
            const scale = Math.min(scaleX, scaleY);
            
            const offsetX = (minimapCanvas.width - MAP_WIDTH * scale) / 2;
            const offsetY = (minimapCanvas.height - MAP_HEIGHT * scale) / 2;
            
            // 绘制地图边界
            minimapCtx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            minimapCtx.lineWidth = 1;
            minimapCtx.strokeRect(offsetX, offsetY, MAP_WIDTH * scale, MAP_HEIGHT * scale);
            
            // 绘制AI小球
            for (const ball of aiBalls) {
                if (!ball.isAlive) continue;
                minimapCtx.beginPath();
                minimapCtx.arc(
                    offsetX + ball.x * scale,
                    offsetY + ball.y * scale,
                    Math.max(2, ball.radius * scale),
                    0,
                    Math.PI * 2
                );
                minimapCtx.fillStyle = 'rgba(100, 100, 100, 0.8)';
                minimapCtx.fill();
            }
            
            // 绘制玩家
            minimapCtx.beginPath();
            minimapCtx.arc(
                offsetX + player.x * scale,
                offsetY + player.y * scale,
                Math.max(4, player.radius * scale),
                0,
                Math.PI * 2
            );
            minimapCtx.fillStyle = 'rgba(0, 0, 0, 1)';
            minimapCtx.fill();
            
            // 绘制玩家2（联机模式）
            if (player2) {
                minimapCtx.beginPath();
                minimapCtx.arc(
                    offsetX + player2.x * scale,
                    offsetY + player2.y * scale,
                    Math.max(4, player2.radius * scale),
                    0,
                    Math.PI * 2
                );
                minimapCtx.fillStyle = 'rgba(100, 100, 100, 1)';
                minimapCtx.fill();
            }
            
            // 绘制视野范围
            const viewWidth = (canvas.width / zoom) * scale;
            const viewHeight = (canvas.height / zoom) * scale;
            minimapCtx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
            minimapCtx.lineWidth = 1;
            minimapCtx.setLineDash([3, 3]);
            minimapCtx.strokeRect(
                offsetX + (cameraX - canvas.width / 2 / zoom) * scale,
                offsetY + (cameraY - canvas.height / 2 / zoom) * scale,
                viewWidth,
                viewHeight
            );
            minimapCtx.setLineDash([]);
        }

        function drawPlayer() {
            // 绘制移动时的淡淡拖影
            for (const trail of moveTrails) {
                ctx.save();
                ctx.globalAlpha = trail.alpha;
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#000';
                
                ctx.beginPath();
                ctx.arc(trail.x, trail.y, trail.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fill();
                ctx.restore();
            }
            
            let currentVx = player.isDashing ? player.dashVx : player.vx;
            let currentVy = player.isDashing ? player.dashVy : player.vy;
            let speed = Math.hypot(currentVx, currentVy);
            let moveAngle = Math.atan2(currentVy, currentVx);
            
            // 计算拉伸变形
            let stretchFactor = Math.min(1.5, 1 + speed * 0.015);
            let squashFactor = 1 / Math.sqrt(stretchFactor);
            
            // 绘制更多的拖尾
            for (const img of afterimages) {
                ctx.save();
                ctx.globalAlpha = img.alpha * 0.7;
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#000';
                
                let trailStretch = 1 + (img.scale - 1) * 1.5;
                let trailSquash = 1 / Math.sqrt(trailStretch);
                
                ctx.translate(img.x, img.y);
                ctx.rotate(moveAngle);
                ctx.scale(trailStretch, trailSquash);

                ctx.beginPath();
                ctx.arc(0, 0, img.radius * img.scale, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                ctx.restore();
            }

            for (const t of player.trail) {
                ctx.save();
                ctx.globalAlpha = t.alpha * 0.6;
                ctx.shadowBlur = 18;
                ctx.shadowColor = '#000';

                ctx.translate(t.x, t.y);
                ctx.rotate(moveAngle);
                ctx.scale(1.2, 0.85);

                ctx.beginPath();
                ctx.arc(0, 0, player.radius * 0.85, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                ctx.restore();
            }

            ctx.save();

            const showDamageFlash = player.damageInvincible > 0 && Math.floor(frameCount / 5) % 2 === 0;
            
            if (player.isInvincible) {
                ctx.shadowBlur = 45;
                ctx.shadowColor = '#000';

                const glowRadius = player.radius + 20 + Math.sin(frameCount * 0.3) * 8;
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(player.x, player.y, glowRadius, 0, Math.PI * 2);
                ctx.stroke();
            } else if (showDamageFlash) {
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#000';
            } else {
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#000';
            }

            if (showDamageFlash) {
                ctx.globalAlpha = 0.3;
            }

            // 绘制变形的小球
            ctx.translate(player.x, player.y);
            ctx.rotate(moveAngle);
            ctx.scale(stretchFactor, squashFactor);

            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();

            ctx.strokeStyle = '#222';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.restore();
            
            // 在位移时添加额外的墨水飞溅效果
            if (player.isDashing && frameCount % 3 === 0) {
                for (let i = 0; i < 3; i++) {
                    const splashAngle = moveAngle + (Math.random() - 0.5) * 1.5;
                    const splashDist = player.radius + Math.random() * 20;
                    const splashX = player.x - Math.cos(splashAngle) * splashDist;
                    const splashY = player.y - Math.sin(splashAngle) * splashDist;
                    particles.push(new Particle(splashX, splashY, '#000', 0.5 + Math.random() * 1, 4 + Math.random() * 4));
                }
            }
        }

        function drawAimLine() {
            if (player.dashCooldown > 0) return;

            const pullBackX = dragStartX - mouseX;
            const pullBackY = dragStartY - mouseY;
            const pullBackDistance = Math.hypot(pullBackX, pullBackY);
            
            const dashAngle = Math.atan2(-pullBackY, -pullBackX);
            const dashDistance = Math.max(MIN_DASH_DISTANCE, Math.min(MAX_DASH_DISTANCE, pullBackDistance * 6));
            const powerPercent = Math.min(1, (pullBackDistance * 6) / MIN_DASH_DISTANCE);

            const offsetX = canvas.width / 2 - cameraX * zoom;
            const offsetY = canvas.height / 2 - cameraY * zoom;
            const screenPlayerX = player.x * zoom + offsetX;
            const screenPlayerY = player.y * zoom + offsetY;

            ctx.save();

            if (pullBackDistance > 20) {
                const targetX = player.x + Math.cos(dashAngle) * dashDistance;
                const targetY = player.y + Math.sin(dashAngle) * dashDistance;
                const screenTargetX = targetX * zoom + offsetX;
                const screenTargetY = targetY * zoom + offsetY;

                const pullLen = Math.min(pullBackDistance * 0.5, 80);
                
                ctx.strokeStyle = `rgba(100, 100, 100, ${0.5 + powerPercent * 0.3})`;
                ctx.lineWidth = 3 + powerPercent * 3;
                ctx.setLineDash([8, 6]);
                ctx.beginPath();
                ctx.moveTo(screenPlayerX, screenPlayerY);
                ctx.lineTo(screenTargetX, screenTargetY);
                ctx.stroke();
                ctx.setLineDash([]);

                const dotSpacing = 40;
                const numDots = Math.floor(dashDistance / dotSpacing);
                ctx.fillStyle = `rgba(100, 100, 100, ${0.4 + powerPercent * 0.4})`;
                for (let i = 1; i <= numDots; i++) {
                    const t = i / numDots;
                    const dotX = player.x + Math.cos(dashAngle) * dashDistance * t;
                    const dotY = player.y + Math.sin(dashAngle) * dashDistance * t;
                    const screenDotX = dotX * zoom + offsetX;
                    const screenDotY = dotY * zoom + offsetY;
                    const dotSize = (6 + powerPercent * 4) * zoom;
                    ctx.beginPath();
                    ctx.arc(screenDotX, screenDotY, dotSize * (1 - t * 0.5), 0, Math.PI * 2);
                    ctx.fill();
                }

                const pullAngle = Math.atan2(pullBackY, pullBackX);
                
                ctx.strokeStyle = `rgba(0, 0, 0, 0.6)`;
                ctx.lineWidth = 2 + powerPercent * 2;
                ctx.setLineDash([4, 3]);
                ctx.beginPath();
                ctx.moveTo(screenPlayerX, screenPlayerY);
                ctx.lineTo(screenPlayerX + Math.cos(pullAngle) * pullLen, screenPlayerY + Math.sin(pullAngle) * pullLen);
                ctx.stroke();
                ctx.setLineDash([]);

                const pullDotSpacing = 20;
                const pullNumDots = Math.floor(pullLen / pullDotSpacing);
                ctx.fillStyle = `rgba(0, 0, 0, ${0.5 + powerPercent * 0.3})`;
                for (let i = 1; i <= pullNumDots; i++) {
                    const t = i / pullNumDots;
                    const dotX = screenPlayerX + Math.cos(pullAngle) * pullLen * t;
                    const dotY = screenPlayerY + Math.sin(pullAngle) * pullLen * t;
                    const dotSize = (4 + powerPercent * 3) * zoom;
                    ctx.beginPath();
                    ctx.arc(dotX, dotY, dotSize * (1 - t * 0.3), 0, Math.PI * 2);
                    ctx.fill();
                }

                const circleRadius = (player.radius + 20) * zoom;
                const endAngle = -Math.PI / 2 + (dashDistance / MAX_DASH_DISTANCE) * Math.PI * 2;
                ctx.strokeStyle = `rgba(0, 0, 0, ${0.3 + powerPercent * 0.35})`;
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(screenPlayerX, screenPlayerY, circleRadius, -Math.PI / 2, endAngle);
                ctx.stroke();
            }

            ctx.restore();
        }

        function updateUI() {
            const healthFill = document.getElementById('healthFill');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const cooldownIndicator = document.getElementById('cooldownIndicator');

            const healthPercent = (player.health / player.maxHealth) * 100;
            healthFill.style.width = healthPercent + '%';

            scoreDisplay.textContent = score;

            if (player.dashCooldown > 0) {
                const remaining = Math.ceil(player.dashCooldown / 60 * 10) / 10;
                cooldownIndicator.textContent = `位移冷却: ${remaining.toFixed(1)}秒`;
                cooldownIndicator.style.color = 'rgba(100, 100, 100, 0.8)';
            } else {
                cooldownIndicator.textContent = '位移就绪! (拖拽鼠标弹射)';
                cooldownIndicator.style.color = 'rgba(0, 0, 0, 0.9)';
            }
        }
        
        function updatePlayer2UI() {
            if (!player2) return;
            
            const player2HealthFill = document.getElementById('player2HealthFill');
            if (!player2HealthFill) return;
            
            const healthPercent = (player2.health / player2.maxHealth) * 100;
