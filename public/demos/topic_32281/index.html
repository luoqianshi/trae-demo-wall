        function endGame() {
            // 如果在教程期间，重置玩家状态而不是结束游戏
            if (inTutorial) {
                player.x = MAP_WIDTH / 2;
                player.y = MAP_HEIGHT / 2;
                player.vx = 0;
                player.vy = 0;
                player.health = player.maxHealth;
                player.isDashing = false;
                player.isInvincible = false;
                player.dashCooldown = 0;
                updateUI();
                return;
            }
            gameOver = true;
            // 添加死亡文字效果（游戏结束专用）
            deathTexts.push(new KillText('菜', true));
            // 开始渐暗效果
            isFadingOut = true;
            fadeOutProgress = 0;
            document.getElementById('finalScore').textContent = score;
            // 提前准备游戏结束界面
            const gameOverEl = document.getElementById('gameOver');
            gameOverEl.style.display = 'flex';
            gameOverEl.style.opacity = '0';
        }

        function gameLoop() {
            if (!gameStarted) {
                requestAnimationFrame(gameLoop);
                return;
            }

            if (!gameOver) {
                // 联机模式下不暂停时间
                if (!isMultiplayer) {
                    if (player.isDashing) {
                        timeScale = Math.max(0.1, timeScale - 0.05);
                    } else if (isDragging && player.dashCooldown <= 0) {
                        timeScale = Math.max(0.3, timeScale - 0.03);
                    } else {
                        timeScale = Math.min(1, timeScale + 0.05);
                    }
                } else {
                    timeScale = 1; // 联机模式保持正常速度
                }
                
                if (screenShake > 0) {
                    screenShake--;
                    screenShakeX = (Math.random() - 0.5) * screenShake * 2;
                    screenShakeY = (Math.random() - 0.5) * screenShake * 2;
                } else {
                    screenShakeX = 0;
                    screenShakeY = 0;
                }

                // 更新边缘发光效果
                if (edgeGlow > 0) {
                    edgeGlow -= 0.015;
                    if (edgeGlow < 0) edgeGlow = 0;
                }
                
                frameCount++;
                
                // 复活倒计时更新
                if (isDead && respawnCountdown > 0) {
                    if (frameCount % 60 === 0) { // 每秒更新一次
                        respawnCountdown--;
                        document.getElementById('respawnTimer').textContent = respawnCountdown;
                        
                        if (respawnCountdown <= 0) {
                            isDead = false;
                            document.getElementById('respawnTimer').style.display = 'none';
                            player.damageInvincible = player.damageInvincibleMax; // 复活后短暂无敌
                        }
                    }
                }
                
                // 死亡期间不更新玩家
                if (!isDead) {
                    updatePlayer();
                }
                
                updatePlayer2();
                updateAI();
                checkCollisions();
                checkCollisionsPlayer2();
                updateParticles();
                updateWaterSplats();
                updateKillTexts();
                updateDeathTexts();
                updateComboTexts();
                updatePlayer2UI();
                
                // 定期发送玩家状态到对方（联机模式）
                if (isMultiplayer && conn && conn.open && frameCount % 5 === 0) {
                    sendPlayerState();
                }

                targetCameraX = player.x;
                targetCameraY = player.y;

                let playerSpeed;
                if (player.isDashing) {
                    playerSpeed = Math.hypot(player.dashVx, player.dashVy);
                } else {
                    playerSpeed = Math.hypot(player.vx, player.vy);
                }

                const maxSmoothSpeed = 0.12;
                const minSmoothSpeed = 0.03;
                const maxSpeedReference = 50;
                const speedRatio = Math.min(1, playerSpeed / maxSpeedReference);
                const cameraSmoothness = maxSmoothSpeed - (maxSmoothSpeed - minSmoothSpeed) * speedRatio;

                cameraX = cameraX + (targetCameraX - cameraX) * cameraSmoothness;
                cameraY = cameraY + (targetCameraY - cameraY) * cameraSmoothness;

                // 相机不再限制在地图边界内，可以看到外面的区域
            }

            // 更新渐暗效果
            if (isFadingOut) {
                fadeOutProgress += 0.012;
                // 检查游戏结束文字的状态
                const gameOverText = deathTexts.find(t => t.isGameOver);
                // 当游戏结束文字到一半时开始淡入HTML界面
                if (gameOverText && gameOverText.life < 0.7) {
                    const gameOverEl = document.getElementById('gameOver');
                    // 让HTML界面的出现和Canvas文字的淡出同步
                    const htmlOpacity = Math.min((0.7 - gameOverText.life) / 0.6, 1);
                    gameOverEl.style.opacity = htmlOpacity.toString();
                }
                // 完全变暗后停止渐暗
                if (fadeOutProgress >= 1) {
                    fadeOutProgress = 1;
                    isFadingOut = false;
                }
                updateDeathTexts();
            }

            const offsetX = canvas.width / 2 - cameraX * zoom;
            const offsetY = canvas.height / 2 - cameraY * zoom;
            
            ctx.save();
            ctx.translate(screenShakeX, screenShakeY);
            
            drawBackground();
            
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(zoom, zoom);

            for (const particle of particles) {
                particle.draw();
            }

            for (const ball of aiBalls) {
                ball.draw();
            }

            // 死亡期间不绘制玩家
            if (!isDead) {
                drawPlayer();
            }
            drawPlayer2();

            ctx.restore();
            
            if (isDragging && !player.isDashing) {
                drawAimLine();
            }

            ctx.restore();

            // 绘制边缘发光效果
            if (edgeGlow > 0) {
                ctx.save();
                const glowIntensity = edgeGlow;
                const glowSize = 100 * glowIntensity;
                
                // 创建径向渐变从边缘向中心发光
                const gradient = ctx.createRadialGradient(
                    canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) / 2 - glowSize,
                    canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) / 2
                );
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(1, `rgba(0, 0, 0, ${0.6 * glowIntensity})`);
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 也可以添加一些闪光效果
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 * glowIntensity})`;
                ctx.lineWidth = 3;
                ctx.strokeRect(0, 0, canvas.width, canvas.height);
                
                ctx.restore();
            }
            
            // 血量低时的黑圈警告效果
            const healthThreshold = player.maxHealth * 0.5; // 低于50%血量时开始显示
            if (player.health <= healthThreshold && !gameOver) {
                const lowHealthRatio = 1 - (player.health / healthThreshold);
                const vignetteAlpha = lowHealthRatio * 0.4; // 最大透明度40%
                
                ctx.save();
                const gradient = ctx.createRadialGradient(
                    canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.3,
                    canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.7
                );
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(0.5, `rgba(0, 0, 0, ${vignetteAlpha * 0.3})`);
                gradient.addColorStop(1, `rgba(0, 0, 0, ${vignetteAlpha})`);
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 额外的闪烁效果（血量越低闪烁越快）
                if (player.health <= 2 && Math.floor(frameCount / (15 - player.health * 5)) % 2 === 0) {
                    ctx.globalAlpha = 0.1;
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                ctx.restore();
            }
            
            if (gameStarted) {
                drawMinimap();
            }

            // 绘制击杀文字（在最上层）
            for (const text of killTexts) {
                text.draw();
            }

            // 绘制死亡文字（在最上层）
            for (const text of deathTexts) {
                text.draw();
            }

            // 绘制连击文字（在nice下方）
            for (const text of comboTexts) {
                text.draw();
            }

            // 绘制渐暗遮罩
            if (fadeOutProgress > 0) {
                ctx.save();
                ctx.fillStyle = `rgba(0, 0, 0, ${fadeOutProgress})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) {
                keys[key] = true;
                // 教程：检测移动
                if (inTutorial && tutorialStep === 1 && !tutorialActionCompleted) {
                    completeTutorialAction();
                }
            }
            // 处理箭头键
            if (e.key === 'ArrowUp') keys.arrowup = true;
            if (e.key === 'ArrowDown') keys.arrowdown = true;
            if (e.key === 'ArrowLeft') keys.arrowleft = true;
            if (e.key === 'ArrowRight') keys.arrowright = true;
            // 教程：检测移动（箭头键）
            if ((e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') && inTutorial && tutorialStep === 1 && !tutorialActionCompleted) {
                completeTutorialAction();
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) {
                keys[key] = false;
            }
            // 处理箭头键
            if (e.key === 'ArrowUp') keys.arrowup = false;
            if (e.key === 'ArrowDown') keys.arrowdown = false;
            if (e.key === 'ArrowLeft') keys.arrowleft = false;
            if (e.key === 'ArrowRight') keys.arrowright = false;
        });

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.addEventListener('mousedown', (e) => {
            if (gameOver || !gameStarted) return;
            
            // 教程第二步：只要按下鼠标就算完成操作
            if (inTutorial && tutorialStep === 2 && !tutorialActionCompleted) {
                completeTutorialAction();
            }
            
            if (player.isDashing || player.dashCooldown > 0) return;
            
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
        });

        document.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            
            if (gameOver || !gameStarted) return;
            if (player.isDashing || player.dashCooldown > 0) return;

            const releaseX = e.clientX;
            const releaseY = e.clientY;

            const pullBackX = dragStartX - releaseX;
            const pullBackY = dragStartY - releaseY;
            const pullBackDistance = Math.hypot(pullBackX, pullBackY);
            
            if (pullBackDistance < 20) return;

            const angle = Math.atan2(pullBackY, pullBackX);
            const dashDistance = Math.max(MIN_DASH_DISTANCE, Math.min(MAX_DASH_DISTANCE, pullBackDistance * 6));
            const powerPercent = (dashDistance - MIN_DASH_DISTANCE) / (MAX_DASH_DISTANCE - MIN_DASH_DISTANCE);
            const adjustedDashDuration = Math.floor(10 + powerPercent * 10);

            const dashSpeed = dashDistance / adjustedDashDuration;
            player.dashVx = Math.cos(angle) * dashSpeed;
            player.dashVy = Math.sin(angle) * dashSpeed;
            player.dashDurationMax = adjustedDashDuration;

            player.isDashing = true;
            player.isInvincible = true;
            player.dashDuration = 0;
            player.dashCooldown = player.dashCooldownMax;

            // 教程：检测位移
            if (inTutorial && tutorialStep === 2 && !tutorialActionCompleted) {
                completeTutorialAction();
            }

            updateUI();
        });

            if (!gameStarted) {

            const roomCode = document.getElementById('roomCodeInput').value.toUpperCase();
            if (!roomCode) {

                return;
            }
            
            document.getElementById('connectionStatus').textContent = '正在连接...';
            
            peer = new Peer();
            
            peer.on('open', () => {
                conn = peer.connect('heibai-' + roomCode);
                setupConnection();
            });
            
            peer.on('error', (err) => {
                document.getElementById('connectionStatus').textContent = '连接错误: ' + err.message;
            });
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('connectionStatus').textContent = '连接成功！';
                document.getElementById('multiplayerMenu').style.display = 'none';
                
                isMultiplayer = true;
                isHost = peer.id.startsWith('heibai-');
                
                player2 = createPlayer2();
                
                // 显示玩家2的血条UI
                document.getElementById('player2UI').style.display = 'block';
                
                gameStarted = true;
                initGame();
                
                // 发送初始状态
                sendPlayerState();
            });
            
            conn.on('data', (data) => {
                handleNetworkData(data);
            });
            
            conn.on('close', () => {
                document.getElementById('connectionStatus').textContent = '连接已断开';
                document.getElementById('player2UI').style.display = 'none';
                isMultiplayer = false;
                player2 = null;
            });
        }

        function sendPlayerState() {
            if (!conn || !conn.open) return;
            
            const state = {
                type: 'playerState',
                x: player.x,
                y: player.y,
                vx: player.vx,
                vy: player.vy,
                isDashing: player.isDashing,
                dashVx: player.dashVx,
                dashVy: player.dashVy,
                health: player.health,
                keys: keys,
                isDragging: isDragging,
                dragStartX: dragStartX,
                dragStartY: dragStartY,
                isDead: isDead
            };
            
            conn.send(state);
        }

        function handleNetworkData(data) {
            if (!player2) return;
            
            if (data.type === 'playerState') {
                player2.x = data.x;
                player2.y = data.y;
                player2.vx = data.vx;
                player2.vy = data.vy;
                player2.isDashing = data.isDashing;
                player2.dashVx = data.dashVx;
                player2.dashVy = data.dashVy;
                player2.health = data.health;
                player2.keys = data.keys;
                player2.isDragging = data.isDragging;
                player2.dragStartX = data.dragStartX;
                player2.dragStartY = data.dragStartY;
                // 同步对方死亡状态
                if (data.isDead !== undefined) {
                    isPlayer2Dead = data.isDead;
                }
            } else if (data.type === 'dash') {
                player2.isDashing = true;
                player2.dashVx = data.dashVx;
                player2.dashVy = data.dashVy;
                player2.dashDuration = 0;
                player2.isInvincible = true;
                player2.dashCooldown = player2.dashCooldownMax;
            } else if (data.type === 'kill') {
                // 处理来自其他玩家的击杀
                score++;
                updateUI();
                createExplosion(data.x, data.y, '#aaa', 20);
                waterSplats.push(new WaterSplat(data.x, data.y, data.radius));
                killTexts.push(new KillText());
                playKillSound();
                screenShake = 25;
                edgeGlow = 1;
                comboCount++;
                if (comboCount >= 2) {
                    comboTexts.push(new ComboText(comboCount));
                }
            } else if (data.type === 'hit') {
                player2.health--;
                player2.damageInvincible = player2.damageInvincibleMax;
                createExplosion(player2.x, player2.y, '#fff', 10);
                if (player2.health <= 0) {
                    waterSplats.push(new WaterSplat(player2.x, player2.y, player2.radius));
                    player2.health = player2.maxHealth;
                    // 在全图随机位置复活
                    player2.x = Math.random() * MAP_WIDTH;
                    player2.y = Math.random() * MAP_HEIGHT;
                    // 确保不会复活在地图边缘
                    player2.x = Math.max(player2.radius, Math.min(MAP_WIDTH - player2.radius, player2.x));
                    player2.y = Math.max(player2.radius, Math.min(MAP_HEIGHT - player2.radius, player2.y));
                }
            } else if (data.type === 'playerHit') {
                // 对方被自己攻击的处理（同步状态）
                updateUI();
            } else if (data.type === 'playerDead') {
                // 玩家被对方击杀，自己处理复活
                // 这种情况我们已经在本地处理了，这里只是通知
            }
        }

        // 修改玩家2的鼠标事件
        const originalMousedown = document.addEventListener;
        document.addEventListener('mousemove', (e) => {
            if (isMultiplayer && player2) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        gameLoop();
    </script>
</body>
</html>
