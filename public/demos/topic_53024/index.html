<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学星球 - 小学数学冒险</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0a0a1a;touch-action:none}
        #game-container{width:100vw;height:100vh;position:relative}
        canvas{display:block}

        /* ===== 加载页面 - 手绘风格 ===== */
        #loading-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:#5DBDB6;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;transition:opacity 1.2s ease-out}
        #loading-screen.hidden{opacity:0;pointer-events:none}
        .loading-planet{width:180px;height:180px;margin-bottom:30px;position:relative}
        .loading-planet svg{width:100%;height:100%;animation:planetFloat 3s ease-in-out infinite}
        @keyframes planetFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        .loading-title{color:#fff;font-size:52px;font-weight:bold;margin-bottom:8px;text-shadow:3px 3px 0 rgba(0,0,0,0.15);letter-spacing:4px}
        .loading-subtitle{color:rgba(255,255,255,0.7);font-size:16px;margin-bottom:40px;letter-spacing:2px}
        .loading-envelope{width:80px;height:60px;margin:20px auto;position:relative}
        .loading-hint{color:rgba(255,255,255,0.6);font-size:14px;margin-top:30px;min-height:24px;letter-spacing:1px}
        #start-btn{margin-top:40px;padding:16px 60px;font-size:22px;background:#F5C542;color:#333;border:none;border-radius:50px;cursor:pointer;font-family:inherit;font-weight:bold;opacity:0;transform:translateY(20px);transition:all 0.5s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,0.2)}
        #start-btn.visible{opacity:1;transform:translateY(0);pointer-events:auto}
        #start-btn:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 10px 30px rgba(0,0,0,0.3)}

        /* ===== UI - 手绘风格 ===== */
        #ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}
        .hud-panel{background:rgba(255,255,255,0.9);border-radius:16px;padding:12px 18px;color:#333;font-size:14px;border:3px solid #333;pointer-events:auto;box-shadow:4px 4px 0 rgba(0,0,0,0.1)}
        .score-board{position:absolute;top:20px;left:20px}
        .score-board .score{font-size:24px;font-weight:bold;color:#E85D4E;margin-top:4px}
        .level-info{position:absolute;top:20px;right:20px;text-align:right}
        .level-info .level{font-size:18px;font-weight:bold;color:#5DBDB6;margin-top:4px}
        .npc-progress{position:absolute;top:96px;right:20px;text-align:right}
        .npc-progress .npc-count{font-size:18px;font-weight:bold;color:#7CB342;margin-top:4px}
        .energy-hud{position:absolute;top:80px;left:20px;display:flex;align-items:center;gap:8px}
        .energy-icon{width:24px;height:24px;background:#F5C542;border:2px solid #333;border-radius:50%;display:inline-block}
        .energy-bar{width:120px;height:12px;background:#ddd;border:2px solid #333;border-radius:6px;overflow:hidden}
        .energy-fill{height:100%;background:#F5C542;border-radius:4px;transition:width 0.5s}

        /* 准星 */
        #crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;pointer-events:none;z-index:50}
        #mute-btn{position:absolute;top:166px;right:20px;width:40px;height:40px;border-radius:50%;border:2px solid #333;background:rgba(255,255,255,0.9);font-size:20px;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 rgba(0,0,0,0.1);transition:transform 0.2s}
        #mute-btn:hover{transform:scale(1.1)}
        #mute-btn.muted{color:#E85D4E}
        #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.8);border-radius:2px}
        #crosshair::before{top:9px;left:2px;width:16px;height:2px}
        #crosshair::after{top:2px;left:9px;width:2px;height:16px}

        /* NPC提示 */
        #npc-hint{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);background:#fff;color:#333;padding:12px 24px;border-radius:16px;font-size:15px;display:none;pointer-events:none;border:3px solid #333;box-shadow:4px 4px 0 rgba(0,0,0,0.1);white-space:nowrap;font-weight:bold}
        #npc-hint.visible{display:block;animation:hintBounce 1s infinite}
        @keyframes hintBounce{0%,100%{transform:translateX(-50%)translateY(0)}50%{transform:translateX(-50%)translateY(-5px)}}

        /* ===== 对话系统 ===== */
        #dialogue-box{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:90%;max-width:600px;background:#fff;border:3px solid #333;border-radius:20px;padding:20px 25px;display:none;z-index:300;box-shadow:6px 6px 0 rgba(0,0,0,0.1);pointer-events:auto}
        #dialogue-box.visible{display:block;animation:dialoguePop 0.3s ease-out}
        @keyframes dialoguePop{from{transform:translateX(-50%)scale(0.9);opacity:0}to{transform:translateX(-50%)scale(1);opacity:1}}
        .dialogue-npc{font-size:13px;color:#5DBDB6;font-weight:bold;margin-bottom:6px}
        .dialogue-text{font-size:16px;color:#333;line-height:1.6;min-height:50px}
        .dialogue-next{position:absolute;right:15px;bottom:15px;width:36px;height:36px;background:#5DBDB6;border:2px solid #333;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
        .dialogue-next:hover{transform:scale(1.1)}
        .dialogue-next::after{content:'▶';color:#fff;font-size:14px}

        /* ===== 题目面板 - 手绘风格 ===== */
        #question-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:24px;padding:35px 40px;min-width:520px;text-align:center;border:4px solid #333;box-shadow:8px 8px 0 rgba(0,0,0,0.1);pointer-events:auto;display:none;z-index:300}
        #question-panel.visible{display:block;animation:popIn 0.3s ease-out}
        @keyframes popIn{from{transform:translate(-50%,-50%)scale(0.85);opacity:0}to{transform:translate(-50%,-50%)scale(1);opacity:1}}
        .q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .q-type{color:#fff;font-size:13px;background:#5DBDB6;padding:5px 14px;border-radius:20px;border:2px solid #333}
        .q-count{color:#999;font-size:14px}
        .question-text{font-size:36px;color:#333;margin:25px 0;font-weight:bold;font-family:'Courier New',monospace}
        .answer-options{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:15px}
        .answer-btn{padding:14px 20px;font-size:20px;border:3px solid #333;background:#fff;color:#333;border-radius:12px;cursor:pointer;transition:all 0.2s;font-family:inherit;font-weight:bold}
        .answer-btn:hover{background:#5DBDB6;color:#fff;transform:translateY(-2px);box-shadow:3px 3px 0 rgba(0,0,0,0.1)}
        .answer-btn.correct{background:#7CB342!important;border-color:#333!important;color:#fff!important}
        .answer-btn.wrong{background:#E85D4E!important;border-color:#333!important;color:#fff!important}
        .feedback{margin-top:18px;font-size:18px;font-weight:bold;min-height:28px}
        .feedback.correct{color:#7CB342}
        .feedback.wrong{color:#E85D4E}
        .explanation-box{background:#FFF8E1;border:2px solid #F5C542;border-radius:12px;padding:12px;margin-top:12px;font-size:14px;color:#666;text-align:left;display:none}
        .explanation-box.visible{display:block}

        /* ===== 能量碎片收集提示 ===== */
        #shard-popup{position:absolute;top:30%;left:50%;transform:translateX(-50%);background:#F5C542;color:#333;padding:12px 30px;border-radius:50px;font-size:18px;font-weight:bold;border:3px solid #333;display:none;z-index:350;box-shadow:4px 4px 0 rgba(0,0,0,0.1)}
        #shard-popup.visible{display:block;animation:shardPop 0.5s ease-out}
        @keyframes shardPop{0%{transform:translateX(-50%)scale(0)}50%{transform:translateX(-50%)scale(1.1)}100%{transform:translateX(-50%)scale(1)}}

        /* ===== 过场动画 ===== */
        #transition-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:500;pointer-events:none;display:none}
        #transition-overlay.active{display:block;pointer-events:auto}
        #transition-canvas{width:100%;height:100%}
        .transition-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333;font-size:32px;font-weight:bold;text-align:center;opacity:0;transition:opacity 0.5s;text-shadow:2px 2px 0 rgba(255,255,255,0.5)}
        .transition-text.visible{opacity:1}

        /* ===== 通关面板 ===== */
        #level-complete-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:24px;padding:45px;text-align:center;pointer-events:auto;display:none;z-index:400;border:4px solid #333;min-width:400px;box-shadow:8px 8px 0 rgba(0,0,0,0.1)}
        #level-complete-panel.visible{display:block;animation:popIn 0.5s ease-out}
        #level-complete-panel h2{color:#5DBDB6;font-size:32px;margin-bottom:15px}
        #level-complete-panel p{color:#333;font-size:16px;margin:8px 0}
        .next-level-btn{margin-top:25px;padding:14px 35px;font-size:20px;background:#F5C542;color:#333;border:3px solid #333;border-radius:50px;cursor:pointer;font-family:inherit;font-weight:bold;transition:all 0.3s;box-shadow:4px 4px 0 rgba(0,0,0,0.1)}
        .next-level-btn:hover{transform:translateY(-2px);box-shadow:6px 6px 0 rgba(0,0,0,0.15)}

        /* ===== 角色自定义面板 ===== */
        #customize-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:24px;padding:35px;text-align:center;pointer-events:auto;display:none;z-index:400;border:4px solid #333;box-shadow:8px 8px 0 rgba(0,0,0,0.1)}
        #customize-panel.visible{display:block;animation:popIn 0.3s ease-out}
        .customize-title{font-size:24px;font-weight:bold;color:#333;margin-bottom:20px}
        .customize-section{margin:15px 0;text-align:left}
        .customize-label{font-size:14px;color:#666;margin-bottom:8px}
        .customize-options{display:flex;gap:10px;flex-wrap:wrap}
        .customize-opt{padding:8px 16px;border:2px solid #333;border-radius:20px;cursor:pointer;background:#fff;transition:all 0.2s;font-size:14px}
        .customize-opt:hover,.customize-opt.active{background:#5DBDB6;color:#fff}
        .customize-close{margin-top:20px;padding:10px 30px;background:#E85D4E;color:#fff;border:2px solid #333;border-radius:20px;cursor:pointer;font-weight:bold}

        /* ===== 收集品提示 ===== */
        #collectible-hint{position:absolute;top:80px;right:20px;background:rgba(255,255,255,0.9);border:2px solid #333;border-radius:12px;padding:8px 14px;color:#333;font-size:12px;display:none;pointer-events:auto}
        #collectible-hint.visible{display:block}

        .controls-hint{position:absolute;bottom:20px;left:20px;color:rgba(255,255,255,0.6);font-size:12px;pointer-events:none;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}

        /* 移动端控制 */
        #mobile-controls{position:absolute;bottom:20px;right:20px;display:none;z-index:200}
        .mobile-btn{width:60px;height:60px;background:rgba(255,255,255,0.3);border:2px solid rgba(255,255,255,0.5);border-radius:50%;position:absolute}
        #btn-up{bottom:140px;right:80px}
        #btn-down{bottom:20px;right:80px}
        #btn-left{bottom:80px;right:140px}
        #btn-right{bottom:80px;right:20px}
        #btn-action{bottom:80px;left:30px;width:70px;height:70px;background:rgba(93,189,182,0.5)}
    </style>
</head>
<body>
<div id="game-container">
    <!-- 加载页面 -->
    <div id="loading-screen">
        <div class="loading-planet">
            <svg viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="80" fill="#7CB342" stroke="#333" stroke-width="3"/>
                <path d="M30,80 Q60,60 90,85 Q120,110 150,75 Q170,55 180,70" fill="none" stroke="#5D8C3A" stroke-width="4" stroke-linecap="round"/>
                <path d="M20,120 Q50,100 80,125 Q110,150 140,115 Q160,95 175,110" fill="none" stroke="#5D8C3A" stroke-width="4" stroke-linecap="round"/>
                <circle cx="60" cy="70" r="12" fill="#5DBDB6" stroke="#333" stroke-width="2"/>
                <circle cx="140" cy="60" r="15" fill="#5DBDB6" stroke="#333" stroke-width="2"/>
                <circle cx="100" cy="130" r="10" fill="#5DBDB6" stroke="#333" stroke-width="2"/>
                <rect x="85" y="40" width="30" height="25" rx="5" fill="#F5C542" stroke="#333" stroke-width="2"/>
                <polygon points="100,30 110,45 90,45" fill="#E85D4E" stroke="#333" stroke-width="2"/>
            </svg>
        </div>
        <div class="loading-title">数学星球</div>
        <div class="loading-subtitle">数学小使者的冒险之旅</div>
        <div class="loading-envelope">
            <svg viewBox="0 0 80 60" width="80" height="60">
                <rect x="5" y="10" width="70" height="45" rx="5" fill="#F5C542" stroke="#333" stroke-width="2"/>
                <polygon points="5,10 40,35 75,10" fill="#FFD54F" stroke="#333" stroke-width="2"/>
                <circle cx="40" cy="38" r="8" fill="#E85D4E" stroke="#333" stroke-width="1.5"/>
                <text x="40" y="42" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">π</text>
            </svg>
        </div>
        <div class="loading-hint" id="math-hint">正在准备数学星球...</div>
        <button id="start-btn" onclick="startGame()">开始冒险</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <!-- UI层 -->
    <div id="ui-layer">
        <div class="hud-panel score-board">
            <div>得分</div>
            <div class="score" id="score">0</div>
        </div>
        <div class="hud-panel level-info">
            <div>当前大陆</div>
            <div class="level" id="current-grade">一年级大陆</div>
        </div>
        <div class="hud-panel npc-progress">
            <div>导师进度</div>
            <div class="npc-count"><span id="npc-visited">0</span> / <span id="npc-total">0</span></div>
        </div>
        <button id="mute-btn" title="静音/开启音乐">&#128264;</button>
        <div class="energy-hud">
            <span class="energy-icon"></span>
            <div class="energy-bar"><div class="energy-fill" id="energy-fill" style="width:0%"></div></div>
            <span id="energy-text" style="font-size:12px;color:#fff;font-weight:bold">0/5</span>
        </div>
        <div id="crosshair"></div>
        <div id="npc-hint">按 E 与数学导师对话</div>
        <div id="shard-popup">✨ 获得能量碎片！</div>
        <div id="collectible-hint"></div>
        <div class="controls-hint">WASD 移动 | 空格跳跃 | 鼠标视角 | E 对话 | C 自定义</div>
    </div>

    <!-- 对话系统 -->
    <div id="dialogue-box">
        <div class="dialogue-npc" id="dialogue-npc">数学导师</div>
        <div class="dialogue-text" id="dialogue-text"></div>
        <div class="dialogue-next" id="dialogue-next" onclick="nextDialogue()"></div>
    </div>

    <!-- 题目面板 -->
    <div id="question-panel">
        <div class="q-header">
            <span class="q-type" id="q-type">加法</span>
            <span class="q-count" id="q-count">1/30</span>
        </div>
        <div class="question-text" id="question-text"></div>
        <div class="answer-options" id="answer-options"></div>
        <div class="feedback" id="feedback"></div>
        <div class="explanation-box" id="explanation-box"></div>
    </div>

    <!-- 过场动画 -->
    <div id="transition-overlay">
        <canvas id="transition-canvas"></canvas>
        <div class="transition-text" id="transition-text"></div>
    </div>

    <!-- 通关面板 -->
    <div id="level-complete-panel">
        <h2>🎉 大陆试炼完成！</h2>
        <p id="complete-score"></p>
        <p id="complete-grade"></p>
        <p style="color:#666;font-size:14px;margin-top:10px">能量碎片已集满，可以渡船前往下一大陆了！</p>
        <button class="next-level-btn" id="next-level-btn" onclick="goNextLevel()">坐船出发</button>
    </div>

    <!-- 角色自定义 -->
    <div id="customize-panel">
        <div class="customize-title">🎨 装扮你的小使者</div>
        <div class="customize-section">
            <div class="customize-label">发型</div>
            <div class="customize-options" id="hair-options"></div>
        </div>
        <div class="customize-section">
            <div class="customize-label">衣服</div>
            <div class="customize-options" id="clothes-options"></div>
        </div>
        <div class="customize-section">
            <div class="customize-label">背包</div>
            <div class="customize-options" id="bag-options"></div>
        </div>
        <button class="customize-close" onclick="closeCustomize()">完成</button>
    </div>

    <!-- 移动端控制 -->
    <div id="mobile-controls">
        <div class="mobile-btn" id="btn-up"></div>
        <div class="mobile-btn" id="btn-down"></div>
        <div class="mobile-btn" id="btn-left"></div>
        <div class="mobile-btn" id="btn-right"></div>
        <div class="mobile-btn" id="btn-action">E</div>
    </div>
</div>

<!-- 第三方库 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/cannon.min.js"></script>

<!-- 游戏模块 -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/physics.js"></script>
<script src="js/decorations.js"></script>
<script src="js/planet.js"></script>
<script src="js/player.js"></script>
<script src="js/npc.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>

<!-- 背景音乐 -->
<audio id="bg-music" src="music/bg.mp4" loop preload="auto"></audio>

<script>
window.addEventListener('load', initLoadingScreen);

// 背景音乐控制：点击开始按钮后播放
var bgMusic = document.getElementById('bg-music');
var startBtn = document.getElementById('start-btn');
if (startBtn && bgMusic) {
    bgMusic.volume = 0.3;
    startBtn.addEventListener('click', function() {
        bgMusic.play().catch(function(e) {
            console.log('背景音乐播放需要用户交互:', e);
        });
    });
}

// 静音切换
var muteBtn = document.getElementById('mute-btn');
if (muteBtn && bgMusic) {
    muteBtn.addEventListener('click', function() {
        bgMusic.muted = !bgMusic.muted;
        muteBtn.classList.toggle('muted', bgMusic.muted);
        muteBtn.innerHTML = bgMusic.muted ? '&#128263;' : '&#128264;';
    });
}
</script>
</body>
</html>
