<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>避险一刻 AI — 极端天气下的 15 分钟城市安全行动导航</title>
<style>
  :root {
    --teal: #0f4c5c;
    --teal-light: #1a6b7d;
    --white: #ffffff;
    --warm-yellow: #f4d35e;
    --warm-yellow-light: #fdf0b5;
    --red: #d7263d;
    --bg: #f5f7f8;
    --surface: #ffffff;
    --ink: #1a2e33;
    --muted: #5c6f75;
    --rule: #dbe3e6;
    --card-shadow: 0 2px 8px rgba(15, 76, 92, 0.08);
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
    color: var(--white);
    padding: 1rem 1rem 0.5rem;
    text-align: center;
  }
  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.02em; }
  header p { font-size: 0.85rem; opacity: 0.9; margin-top: 0.25rem; }

  .role-bar {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    background: var(--teal);
  }
  .role-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--white);
    padding: 0.5rem 1rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .role-btn:hover { background: rgba(255,255,255,0.25); }
  .role-btn.active {
    background: var(--warm-yellow);
    color: var(--ink);
    border-color: var(--warm-yellow);
    font-weight: 600;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 1rem; }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .card-title .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--warm-yellow);
  }

  .form-row { margin-bottom: 0.75rem; }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; font-weight: 500; }
  select, input[type="text"] {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--rule);
    border-radius: 6px;
    font-size: 0.95rem;
    color: var(--ink);
    background: var(--surface);
  }
  select:focus, input:focus { outline: none; border-color: var(--teal-light); }

  .checkbox-group {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem;
  }
  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    color: var(--ink);
    background: var(--bg);
    padding: 0.5rem 0.6rem;
    border-radius: 6px;
    border: 1px solid var(--rule);
    cursor: pointer;
    margin-bottom: 0;
  }
  .checkbox-group input { width: 16px; height: 16px; accent-color: var(--teal); cursor: pointer; }

  .btn-primary {
    width: 100%;
    padding: 0.75rem;
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--teal-light); }
  .btn-primary:active { transform: translateY(1px); }

  .action-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 1rem;
    margin-top: 1rem;
    border-left: 4px solid var(--teal);
  }
  .action-card.high { border-left-color: var(--red); }
  .action-card.medium { border-left-color: var(--warm-yellow); }
  .action-card.low { border-left-color: #4caf50; }

  .risk-badge {
    display: inline-block;
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .risk-high { background: #fde8eb; color: var(--red); }
  .risk-medium { background: var(--warm-yellow-light); color: #8a6d1f; }
  .risk-low { background: #e8f5e9; color: #2e7d32; }

  .action-list { list-style: none; margin: 0.5rem 0; }
  .action-list li {
    padding: 0.4rem 0;
    font-size: 0.9rem;
    border-bottom: 1px dashed var(--rule);
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .action-list li:last-child { border-bottom: none; }
  .action-list .num {
    min-width: 22px; height: 22px;
    background: var(--teal);
    color: var(--white);
    border-radius: 50%;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .info-row {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.75rem;
    flex-wrap: wrap;
  }
  .info-pill {
    background: var(--bg);
    padding: 0.35rem 0.7rem;
    border-radius: 6px;
    font-size: 0.8rem;
    color: var(--muted);
    border: 1px solid var(--rule);
  }
  .info-pill strong { color: var(--ink); }

  .msg-box {
    background: var(--warm-yellow-light);
    border: 1px solid var(--warm-yellow);
    border-radius: 6px;
    padding: 0.75rem;
    font-size: 0.85rem;
    margin-top: 0.75rem;
    color: var(--ink);
  }

  .btn-copy {
    margin-top: 0.75rem;
    padding: 0.5rem 1rem;
    background: var(--white);
    border: 1px solid var(--teal);
    color: var(--teal);
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-copy:hover { background: var(--teal); color: var(--white); }

  .shelter-grid {
    display: grid;
    grid-template-columns: repeat(1, 1fr);
    gap: 1rem;
  }
  @media (min-width: 640px) {
    .shelter-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .shelter-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 1rem;
    border-top: 3px solid var(--teal);
  }
  .shelter-card h3 { font-size: 1rem; color: var(--teal); margin-bottom: 0.5rem; }
  .shelter-status { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.5rem 0; }
  .status-tag {
    font-size: 0.75rem;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--rule);
  }
  .status-tag.on { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .status-tag.off { background: #fde8eb; color: var(--red); border-color: #f5b0bb; }
  .status-tag.warn { background: var(--warm-yellow-light); color: #8a6d1f; border-color: var(--warm-yellow); }

  .shelter-edit label { font-size: 0.8rem; margin-top: 0.5rem; }
  .shelter-edit select, .shelter-edit input {
    width: 100%;
    padding: 0.4rem 0.5rem;
    font-size: 0.85rem;
    margin-top: 0.2rem;
  }

  .dash-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  @media (min-width: 640px) {
    .dash-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .dash-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 1rem;
    text-align: center;
  }
  .dash-card h4 { font-size: 0.9rem; color: var(--teal); margin-bottom: 0.5rem; }
  .dash-metric { font-size: 1.5rem; font-weight: 700; color: var(--ink); }
  .dash-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

  .dash-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
    justify-content: center;
  }
  .dash-actions button {
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    border: 1px solid var(--rule);
    background: var(--bg);
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--ink);
  }
  .dash-actions button:hover { background: var(--warm-yellow-light); border-color: var(--warm-yellow); }

  .copy-toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--white);
    padding: 0.6rem 1.2rem;
    border-radius: var(--radius);
    font-size: 0.85rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 100;
  }
  .copy-toast.show { opacity: 1; }

  .section-note {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .tag-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
  }
  .tag {
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .tag.active {
    background: var(--warm-yellow-light);
    border-color: var(--warm-yellow);
    color: var(--ink);
    font-weight: 600;
  }

  .ad-box {
    background: #eaf4f7;
    border: 1px solid #b2d8e4;
    border-radius: var(--radius);
    padding: 1rem;
    margin-top: 1rem;
    font-size: 0.9rem;
  }
  .ad-box h4 { color: var(--teal); margin-bottom: 0.5rem; font-size: 0.95rem; }
  .ad-box p { margin-bottom: 0.5rem; line-height: 1.6; }
  .ad-box .btn-copy { margin-top: 0.5rem; }

  @media (max-width: 400px) {
    header h1 { font-size: 1.05rem; }
    .role-btn { padding: 0.45rem 0.7rem; font-size: 0.8rem; }
    .checkbox-group { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>避险一刻 AI</h1>
  <p>极端天气下的 15 分钟城市安全行动导航</p>
</header>

<div class="role-bar">
  <button class="role-btn active" onclick="switchRole('traveler')">出行者</button>
  <button class="role-btn" onclick="switchRole('shelter')">避险点</button>
  <button class="role-btn" onclick="switchRole('dashboard')">服务看板</button>
</div>

<div class="container">

  <!-- 出行者 -->
  <div id="panel-traveler" class="panel active">
    <div class="card">
      <div class="card-title"><span class="dot"></span>选择你的情况</div>

      <div class="form-row">
        <label>天气类型</label>
        <select id="weatherType">
          <option value="heat">高温（≥35°C）</option>
          <option value="rain">暴雨 / 强对流</option>
          <option value="cold">寒潮 / 大风</option>
        </select>
      </div>

      <div class="form-row">
        <label>身份</label>
        <select id="identity">
          <option value="rider">外卖骑手</option>
          <option value="courier">快递员</option>
          <option value="sanitation">环卫工</option>
          <option value="commuter">通勤者</option>
          <option value="family">带娃家庭</option>
          <option value="visitor">临时来访者</option>
        </select>
      </div>

      <div class="form-row">
        <label>当前状态（可多选）</label>
        <div class="checkbox-group">
          <label><input type="checkbox" value="long_outdoor"> 连续户外40分钟+</label>
          <label><input type="checkbox" value="mild_discomfort"> 轻微不适</label>
          <label><input type="checkbox" value="with_child"> 携带儿童</label>
          <label><input type="checkbox" value="low_battery"> 手机电量低</label>
          <label><input type="checkbox" value="need_water"> 需要饮水</label>
          <label><input type="checkbox" value="need_shelter"> 需要避雨</label>
          <label><input type="checkbox" value="mobility_issue"> 行动不便</label>
        </div>
      </div>

      <button class="btn-primary" onclick="generateActionCard()">生成 15 分钟安全行动卡</button>
    </div>

    <div id="actionCardArea"></div>
  </div>

  <!-- 避险点 -->
  <div id="panel-shelter" class="panel">
    <div class="section-note">更新避险点状态后，出行者的推荐结果会实时变化。</div>
    <div class="shelter-grid" id="shelterGrid"></div>
  </div>

  <!-- 服务看板 -->
  <div id="panel-dashboard" class="panel">
    <div class="section-note">点击片区卡片下方的标签，标记需求并生成公益传播文案。</div>
    <div class="dash-grid" id="dashGrid"></div>
    <div id="adArea"></div>
  </div>

</div>

<div class="copy-toast" id="copyToast">已复制到剪贴板</div>

<script>
  // ===== 数据 =====
  const shelters = [
    { id: 1, name: '全家便利店（中山北路店）', type: '便利店', open: true, capacity: 12, maxCap: 20, water: true, charge: true, medicine: false, rainGear: true },
    { id: 2, name: '城北工会驿站', type: '工会驿站', open: true, capacity: 8, maxCap: 15, water: true, charge: true, medicine: true, rainGear: false },
    { id: 3, name: '人民广场地铁站', type: '地铁站', open: true, capacity: 45, maxCap: 80, water: false, charge: false, medicine: false, rainGear: false },
    { id: 4, name: '静安社区服务中心', type: '社区服务中心', open: true, capacity: 6, maxCap: 25, water: true, charge: true, medicine: true, rainGear: true },
    { id: 5, name: '24h 书店·阅空间', type: '文化空间', open: false, capacity: 0, maxCap: 30, water: false, charge: true, medicine: false, rainGear: false },
    { id: 6, name: '城南快递小哥驿站', type: '工会驿站', open: true, capacity: 3, maxCap: 10, water: true, charge: true, medicine: false, rainGear: true },
  ];

  const districts = [
    { name: '城北片区', risk: '高', pressure: 85, shortage: '饮水、药箱', blank: '避雨点不足', tags: [] },
    { name: '城中片区', risk: '中', pressure: 62, shortage: '充电位', blank: '无', tags: [] },
    { name: '城南片区', risk: '高', pressure: 91, shortage: '雨具、饮水', blank: '带娃家庭服务', tags: [] },
    { name: '城东片区', risk: '低', pressure: 34, shortage: '无', blank: '无', tags: [] },
  ];

  // ===== 工具 =====
  function $(id) { return document.getElementById(id); }

  function switchRole(role) {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    $(`panel-${role}`).classList.add('active');
    if (role === 'shelter') renderShelters();
    if (role === 'dashboard') renderDashboard();
  }

  function showToast(msg) {
    const t = $('copyToast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板')).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('已复制到剪贴板');
    });
  }

  // ===== 出行者 =====
  function generateActionCard(opts) {
    const weather = opts ? opts.weather : $('weatherType').value;
    const identity = opts ? opts.identity : $('identity').value;
    const checks = opts ? opts.checks : Array.from(document.querySelectorAll('#panel-traveler .checkbox-group input:checked')).map(i => i.value);

    const identityNames = {
      rider: '外卖骑手', courier: '快递员', sanitation: '环卫工',
      commuter: '通勤者', family: '带娃家庭', visitor: '临时来访者'
    };
    const weatherNames = { heat: '高温', rain: '暴雨', cold: '寒潮' };

    let riskLevel = 'low';
    let riskLabel = '低风险';
    let riskClass = 'low';
    if (checks.includes('mild_discomfort') || checks.includes('long_outdoor') || weather === 'rain') {
      riskLevel = 'medium'; riskLabel = '中风险'; riskClass = 'medium';
    }
    if ((checks.includes('mild_discomfort') && checks.includes('long_outdoor')) ||
        (checks.includes('with_child') && weather === 'rain') ||
        (checks.includes('mobility_issue') && weather === 'cold')) {
      riskLevel = 'high'; riskLabel = '高风险'; riskClass = 'high';
    }

    // 建议生成
    const tips = [];
    const w = weather;
    const idn = identity;
    if (w === 'heat') {
      tips.push('立即寻找阴凉或室内避险点，避免阳光直射');
      tips.push('少量多次补充水分，优先选择含电解质的饮品');
      if (checks.includes('long_outdoor')) tips.push('已连续户外超40分钟，建议休息至少15分钟再出发');
      if (idn === 'rider' || idn === 'courier') tips.push('电动车坐垫可能高温，注意防烫伤');
      if (checks.includes('with_child')) tips.push('儿童体温调节弱，优先进入有空调的避险点');
    } else if (w === 'rain') {
      tips.push('避开低洼路段、工地围挡及大型广告牌下方');
      tips.push('穿戴雨具，保持视线清晰，减速慢行');
      if (checks.includes('need_shelter')) tips.push('优先前往提供雨具或室内空间充足的避险点');
      if (idn === 'rider') tips.push('路面湿滑，刹车距离增加，建议步行推行通过积水段');
      if (checks.includes('low_battery')) tips.push('雨天信号搜索耗电快，开启省电模式并尽快充电');
    } else {
      tips.push('注意防风保暖，优先选择室内避风点');
      tips.push('避免在临时搭建物、大树及广告牌下停留');
      if (checks.includes('mobility_issue')) tips.push('行动不便者建议呼叫社区协助或原地等待');
      if (idn === 'sanitation') tips.push('户外作业请佩戴防风护具，定时回站取暖');
      if (checks.includes('need_water')) tips.push('寒潮天气干燥，温水少量多次饮用');
    }
    if (checks.includes('low_battery')) tips.push('手机电量低，到达避险点后立即充电并告知家人位置');
    if (checks.includes('mild_discomfort')) tips.push('身体已有不适信号，切勿硬撑，及时休息观察');
    while (tips.length < 5) tips.push('保持通讯畅通，关注官方预警信息');

    // 推荐避险点
    let candidates = shelters.filter(s => s.open);
    if (checks.includes('need_water')) candidates = candidates.filter(s => s.water);
    if (checks.includes('low_battery')) candidates = candidates.filter(s => s.charge);
    if (checks.includes('need_shelter')) candidates = candidates.filter(s => s.rainGear || s.type === '地铁站');
    if (checks.includes('with_child') || checks.includes('mobility_issue')) candidates = candidates.filter(s => s.type === '社区服务中心' || s.type === '地铁站');
    if (candidates.length === 0) candidates = shelters.filter(s => s.open);
    candidates.sort((a, b) => (b.capacity / b.maxCap) - (a.capacity / a.maxCap));
    const topShelter = candidates[0] || shelters[0];

    const routeWarn = w === 'rain' ? '避开低洼积水路段，预计步行约 8 分钟' :
                      w === 'heat' ? '沿树荫或建筑物阴影侧行走，预计步行约 6 分钟' :
                      '注意防风，建议贴内侧建筑行走，预计步行约 7 分钟';

    const safeMsg = `【报平安】我是${identityNames[idn]}，当前遇到${weatherNames[w]}天气，已收到避险一刻 AI 的行动建议，正前往 ${topShelter.name}，预计 15 分钟内到达。`;

    const html = `
      <div class="action-card ${riskClass}">
        <div class="risk-badge risk-${riskClass}">${riskLabel} · ${weatherNames[weather]} · ${identityNames[identity]}</div>
        <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;">生成时间：${new Date().toLocaleString('zh-CN')}</div>
        <h3 style="font-size:1rem;color:var(--teal);margin-bottom:0.5rem;">5 条行动建议</h3>
        <ol class="action-list">
          ${tips.slice(0,5).map((t,i) => `<li><span class="num">${i+1}</span>${t}</li>`).join('')}
        </ol>
        <div class="info-row">
          <div class="info-pill"><strong>推荐避险点</strong> ${topShelter.name}</div>
          <div class="info-pill"><strong>类型</strong> ${topShelter.type}</div>
          <div class="info-pill"><strong>当前容量</strong> ${topShelter.capacity}/${topShelter.maxCap}</div>
        </div>
        <div class="info-row">
          <div class="info-pill"><strong>路线提醒</strong> ${routeWarn}</div>
        </div>
        <div class="msg-box">
          <strong>报平安消息</strong><br>
          ${safeMsg}
        </div>
        <button class="btn-copy" onclick='copyText("${safeMsg.replace(/"/g,'\\"')}")'>复制报平安消息</button>
      </div>
    `;
    $('actionCardArea').innerHTML = html;
  }

  // 默认示例
  function showDefaultCard() {
    generateActionCard({ weather: 'heat', identity: 'rider', checks: ['long_outdoor', 'low_battery', 'need_water'] });
  }

  // ===== 避险点 =====
  function renderShelters() {
    $('shelterGrid').innerHTML = shelters.map(s => `
      <div class="shelter-card">
        <h3>${s.name}</h3>
        <div class="shelter-status">
          <span class="status-tag ${s.open ? 'on' : 'off'}">${s.open ? '开放中' : '已关闭'}</span>
          <span class="status-tag ${s.capacity / s.maxCap > 0.8 ? 'warn' : 'on'}">容量 ${s.capacity}/${s.maxCap}</span>
          <span class="status-tag ${s.water ? 'on' : 'off'}">饮水 ${s.water ? '有' : '无'}</span>
          <span class="status-tag ${s.charge ? 'on' : 'off'}">充电 ${s.charge ? '有' : '无'}</span>
          <span class="status-tag ${s.medicine ? 'on' : 'off'}">药箱 ${s.medicine ? '有' : '无'}</span>
          <span class="status-tag ${s.rainGear ? 'on' : 'off'}">雨具 ${s.rainGear ? '有' : '无'}</span>
        </div>
        <div class="shelter-edit">
          <label>开放状态</label>
          <select onchange="updateShelter(${s.id}, 'open', this.value==='true')">
            <option value="true" ${s.open ? 'selected' : ''}>开放中</option>
            <option value="false" ${!s.open ? 'selected' : ''}>已关闭</option>
          </select>
          <label>当前人数</label>
          <input type="number" min="0" max="${s.maxCap}" value="${s.capacity}" onchange="updateShelter(${s.id}, 'capacity', parseInt(this.value)||0)">
          <label>最大容量</label>
          <input type="number" min="1" value="${s.maxCap}" onchange="updateShelter(${s.id}, 'maxCap', parseInt(this.value)||1)">
          <div class="checkbox-group" style="margin-top:0.5rem;">
            <label><input type="checkbox" ${s.water ? 'checked' : ''} onchange="updateShelter(${s.id}, 'water', this.checked)"> 饮水</label>
            <label><input type="checkbox" ${s.charge ? 'checked' : ''} onchange="updateShelter(${s.id}, 'charge', this.checked)"> 充电</label>
            <label><input type="checkbox" ${s.medicine ? 'checked' : ''} onchange="updateShelter(${s.id}, 'medicine', this.checked)"> 药箱</label>
            <label><input type="checkbox" ${s.rainGear ? 'checked' : ''} onchange="updateShelter(${s.id}, 'rainGear', this.checked)"> 雨具</label>
          </div>
        </div>
      </div>
    `).join('');
  }

  function updateShelter(id, key, val) {
    const s = shelters.find(x => x.id === id);
    if (!s) return;
    s[key] = val;
    renderShelters();
    showToast('避险点已更新');
  }

  // ===== 服务看板 =====
  function renderDashboard() {
    $('dashGrid').innerHTML = districts.map((d, idx) => `
      <div class="dash-card">
        <h4>${d.name}</h4>
        <div class="dash-metric" style="color:${d.risk==='高'? 'var(--red)' : d.risk==='中'? '#8a6d1f':'#2e7d32'}">${d.risk}风险</div>
        <div class="dash-label">容量压力 ${d.pressure}%</div>
        <div class="dash-label">资源短缺：${d.shortage}</div>
        <div class="dash-label">服务空白：${d.blank}</div>
        <div class="tag-bar" style="margin-top:0.75rem;">
          ${['需要补水','需要雨具','容量紧张'].map(tag => `
            <span class="tag ${d.tags.includes(tag)?'active':''}" onclick="toggleTag(${idx}, '${tag}')">${tag}</span>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  function toggleTag(idx, tag) {
    const d = districts[idx];
    if (d.tags.includes(tag)) d.tags = d.tags.filter(t => t !== tag);
    else d.tags.push(tag);
    renderDashboard();
    generateAd();
  }

  function generateAd() {
    const active = districts.filter(d => d.tags.length > 0);
    if (active.length === 0) { $('adArea').innerHTML = ''; return; }
    const lines = active.map(d => {
      const needs = d.tags.join('、');
      return `📍 ${d.name}：${needs}。当前风险等级${d.risk}，容量压力${d.pressure}%，请附近市民与志愿者关注支援。`;
    });
    const ad = `【避险一刻 AI · 公益播报】\n\n${lines.join('\n')}\n\n每一份关注都是城市韧性的一部分。如果你就在附近，一杯水、一把伞、一个充电位，都可能成为他人的“避险一刻”。\n\n#避险一刻 #城市安全 #极端天气互助`;
    $('adArea').innerHTML = `
      <div class="ad-box">
        <h4>公益传播文案</h4>
        <p style="white-space:pre-line;">${ad}</p>
        <button class="btn-copy" onclick='copyText(\`${ad.replace(/`/g,'\\`')}\`)'>复制文案</button>
      </div>
    `;
  }

  // 初始化
  showDefaultCard();
</script>

</body>
</html>
