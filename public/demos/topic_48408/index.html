<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衡水体英语字体检测</title>
<script src="_shared/js/echarts.min.js"></script>
<style>
/* ========== CSS Variables & Reset ========== */
:root {
  --primary: #2E5A4C;
  --primary-light: #3D7A68;
  --primary-dark: #1F3F34;
  --accent: #C9A96E;
  --accent-light: #E0C88A;
  --accent-dark: #B08A4A;
  --bg: #F7F5F0;
  --bg-card: #FFFFFF;
  --text: #2C3E3A;
  --text-secondary: #6B7F79;
  --text-muted: #9AABA5;
  --border: #E5E0D8;
  --shadow: 0 4px 24px rgba(46,90,76,0.08);
  --shadow-hover: 0 8px 40px rgba(46,90,76,0.14);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.35s cubic-bezier(.4,0,.2,1);
  --font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-family);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: var(--primary); text-decoration: none; }
a:hover { color: var(--primary-light); }

/* ========== Layout ========== */
.container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

/* ========== Header ========== */
.header {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
  padding: 0;
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}
.header-inner {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 24px;
  gap: 20px;
  flex-wrap: wrap;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-logo {
  width: 52px;
  height: 52px;
  background: var(--accent);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 800;
  color: var(--primary-dark);
  box-shadow: 0 4px 12px rgba(201,169,110,0.35);
  flex-shrink: 0;
}
.header-title h1 {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
}
.header-title p {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  margin-top: 2px;
  letter-spacing: 0.5px;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 18px;
  border-radius: 30px;
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-weight: 500;
}
.header-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4ADE80;
  animation: pulse-dot 1.8s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

/* ========== Section ========== */
.section {
  padding: 40px 0;
}
.section-header {
  text-align: center;
  margin-bottom: 36px;
}
.section-header h2 {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary-dark);
  letter-spacing: 0.5px;
}
.section-header p {
  color: var(--text-secondary);
  margin-top: 8px;
  font-size: 15px;
}

/* ========== Card ========== */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
  transition: box-shadow var(--transition), transform var(--transition);
}
.card:hover { box-shadow: var(--shadow-hover); }
.card-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--primary-dark);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-title .icon { font-size: 22px; }

/* ========== Upload Area ========== */
.upload-area {
  border: 2.5px dashed var(--border);
  border-radius: var(--radius);
  padding: 50px 30px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  background: rgba(247,245,240,0.5);
  position: relative;
}
.upload-area:hover,
.upload-area.dragover {
  border-color: var(--accent);
  background: rgba(201,169,110,0.06);
  transform: translateY(-2px);
}
.upload-area .upload-icon {
  font-size: 52px;
  color: var(--accent);
  margin-bottom: 12px;
  display: block;
}
.upload-area h3 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.upload-area p {
  font-size: 14px;
  color: var(--text-muted);
}
.upload-area input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.upload-preview {
  display: none;
  margin-top: 20px;
  position: relative;
  border-radius: var(--radius-sm);
  overflow: hidden;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.upload-preview img {
  width: 100%;
  height: auto;
  display: block;
}
.upload-preview .remove-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  color: #fff;
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  backdrop-filter: blur(4px);
}
.upload-preview .remove-btn:hover { background: rgba(0,0,0,0.8); }

/* ========== Mode Switcher ========== */
.mode-switcher {
  display: flex;
  gap: 0;
  background: var(--bg);
  border-radius: 30px;
  padding: 4px;
  max-width: 360px;
  margin: 28px auto 0;
  border: 1px solid var(--border);
}
.mode-btn {
  flex: 1;
  padding: 10px 20px;
  border: none;
  background: transparent;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 26px;
  transition: all var(--transition);
  font-family: var(--font-family);
}
.mode-btn.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 12px rgba(46,90,76,0.25);
}
.mode-btn:not(.active):hover { color: var(--text); }

/* ========== Detect Button ========== */
.detect-btn-wrap { text-align: center; margin-top: 28px; }
.detect-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 48px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: 0 4px 16px rgba(46,90,76,0.3);
  font-family: var(--font-family);
  letter-spacing: 0.5px;
}
.detect-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(46,90,76,0.35);
}
.detect-btn:active { transform: translateY(0); }
.detect-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
}
.detect-btn .spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.detect-btn.loading .spinner { display: inline-block; }
.detect-btn.loading .btn-text { opacity: 0.7; }
@keyframes spin { to { transform: rotate(360deg); } }

.demo-link {
  margin-top: 12px;
  text-align: center;
}
.demo-link button {
  background: none;
  border: none;
  color: var(--accent-dark);
  font-size: 14px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  font-family: var(--font-family);
  font-weight: 500;
}
.demo-link button:hover { color: var(--accent); }

/* ========== Results Container ========== */
.results-container {
  display: none;
  animation: fadeUp 0.5s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== Quick Score ========== */
.quick-score-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}
@media (max-width: 768px) {
  .quick-score-grid { grid-template-columns: 1fr; }
}
.radar-chart-wrap {
  position: relative;
}
.radar-chart-wrap #radarChart {
  width: 100%;
  height: 380px;
}
.total-score-wrap {
  text-align: center;
  padding: 20px;
}
.total-score-number {
  font-size: 64px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}
.total-score-number .percent { font-size: 28px; }
.total-score-label {
  font-size: 15px;
  color: var(--text-secondary);
  margin-top: 6px;
}
.score-bars { margin-top: 8px; }
.score-bar-item {
  margin-bottom: 14px;
}
.score-bar-header {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 5px;
}
.score-bar-header .label { color: var(--text); font-weight: 500; }
.score-bar-header .val { color: var(--primary); font-weight: 700; }
.score-bar-track {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
  width: 0%;
  transition: width 1s ease;
}

.suggestions-list {
  margin-top: 8px;
}
.suggestion-item {
  display: flex;
  gap: 12px;
  padding: 14px 16px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  align-items: flex-start;
  border-left: 3px solid var(--accent);
}
.suggestion-item .num {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.suggestion-item .text { font-size: 14px; color: var(--text); line-height: 1.5; }

/* ========== Detailed Diagnosis ========== */
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}
@media (max-width: 768px) {
  .detail-grid { grid-template-columns: 1fr; }
}
.detail-image-wrap {
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg);
}
.detail-image-wrap img {
  width: 100%;
  height: auto;
  display: block;
}
.ocr-text-box {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  line-height: 1.8;
  border: 1px solid var(--border);
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.ocr-text-box .char-ok { color: #2E7D32; }
.ocr-text-box .char-bad { color: #C62828; }
.ocr-text-box .char-warn { color: #E65100; }

.char-analysis-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.char-analysis-table th {
  text-align: left;
  padding: 10px 12px;
  background: var(--bg);
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 13px;
  border-bottom: 2px solid var(--border);
}
.char-analysis-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.char-analysis-table tr:hover td {
  background: rgba(201,169,110,0.04);
}
.char-analysis-table .char-cell {
  font-family: 'Courier New', monospace;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
}
.badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.badge-ok { background: #E8F5E9; color: #2E7D32; }
.badge-bad { background: #FFEBEE; color: #C62828; }
.badge-warn { background: #FFF3E0; color: #E65100; }

.char-img-compare {
  display: flex;
  gap: 8px;
  align-items: center;
}
.char-img-compare .std-char,
.char-img-compare .user-char {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  font-size: 22px;
  font-weight: 700;
  border-radius: 6px;
  border: 2px solid var(--border);
}
.char-img-compare .std-char { background: var(--primary); color: #fff; border-color: var(--primary); }
.char-img-compare .user-char { background: var(--bg); }
.char-img-compare .arrow { color: var(--text-muted); font-size: 16px; }
.improve-note {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ========== API Config Panel ========== */
.api-panel {
  margin-top: 20px;
}
.api-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
  font-family: var(--font-family);
  padding: 4px 0;
}
.api-toggle .arrow {
  transition: transform var(--transition);
  display: inline-block;
}
.api-toggle.open .arrow { transform: rotate(180deg); }
.api-config-body {
  display: none;
  margin-top: 16px;
  padding: 20px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.api-config-body.open { display: block; }
.api-config-body .field-group {
  margin-bottom: 14px;
}
.api-config-body label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.api-config-body input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font-family);
  transition: border-color 0.2s;
  background: var(--bg-card);
}
.api-config-body input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(46,90,76,0.1);
}
.api-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  margin-top: 8px;
}
.api-status.configured { background: #E8F5E9; color: #2E7D32; }
.api-status.unconfigured { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
.api-status .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}
.api-status.configured .dot { background: #2E7D32; }
.api-status.unconfigured .dot { background: var(--text-muted); }

/* ========== Footer ========== */
.footer {
  text-align: center;
  padding: 30px 0;
  font-size: 13px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

/* ========== Toast ========== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--primary-dark);
  color: #fff;
  padding: 14px 28px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
  z-index: 999;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="container">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo">衡</div>
        <div class="header-title">
          <h1>衡水体英语字体检测</h1>
          <p>AI 驱动的英文书写标准化评估系统</p>
        </div>
      </div>
      <div class="header-badge">
        <span class="dot"></span>
        Demo · AI 评分
      </div>
    </div>
  </div>
</header>

<!-- ===== UPLOAD SECTION ===== -->
<section class="section">
  <div class="container">
    <div class="card">
      <div class="card-title"><span class="icon">&#128196;</span> 上传书写图片</div>

      <!-- Upload Area -->
      <div class="upload-area" id="uploadArea">
        <span class="upload-icon">&#128247;</span>
        <h3>拖拽图片到此处，或点击上传</h3>
        <p>支持 JPG / PNG 格式</p>
        <input type="file" id="fileInput" accept="image/jpeg,image/png">
        <div class="upload-preview" id="uploadPreview">
          <img id="previewImg" alt="预览">
          <button class="remove-btn" id="removeBtn" type="button">&times;</button>
        </div>
      </div>

      <!-- Mode Switcher -->
      <div class="mode-switcher" id="modeSwitcher">
        <button class="mode-btn active" data-mode="quick">快速评分</button>
        <button class="mode-btn" data-mode="detail">详细诊断</button>
      </div>

      <!-- Detect Button -->
      <div class="detect-btn-wrap">
        <button class="detect-btn" id="detectBtn">
          <span class="spinner"></span>
          <span class="btn-text">开始检测</span>
        </button>
      </div>
      <div class="demo-link">
        <button id="demoBtn">&#9654; 加载示例图片体验 Demo</button>
      </div>
    </div>

    <!-- API Config Panel -->
    <div class="card api-panel" style="margin-top:20px;">
      <button class="api-toggle" id="apiToggle">
        <span>&#9881; 百度 OCR API 配置</span>
        <span class="arrow">&#9660;</span>
      </button>
      <div class="api-config-body" id="apiConfigBody">
        <div class="field-group">
          <label for="apiKey">API Key</label>
          <input type="text" id="apiKey" placeholder="请输入您的百度 OCR API Key">
        </div>
        <div class="field-group">
          <label for="secretKey">Secret Key</label>
          <input type="text" id="secretKey" placeholder="请输入您的 Secret Key">
        </div>
        <button class="detect-btn" id="saveApiBtn" style="padding:10px 28px;font-size:14px;border-radius:8px;margin-top:4px;">
          <span class="btn-text">保存配置</span>
        </button>
        <div class="api-status unconfigured" id="apiStatus">
          <span class="dot"></span>
          <span id="apiStatusText">未配置</span>
        </div>
        <p style="font-size:12px;color:var(--text-muted);margin-top:10px;">
          如何获取密钥？
          <a href="https://console.bce.baidu.com/ai/#/ai/ocr/overview/index" target="_blank">百度 OCR 控制台</a>
          &middot;
          <a href="https://cloud.baidu.com/doc/OCR/s/9k3h7xuv8" target="_blank">API 文档</a>
        </p>
      </div>
    </div>
  </div>
</section>

<!-- ===== RESULTS SECTION ===== -->
<section class="section results-container" id="resultsSection">
  <div class="container">

    <!-- Quick Score Mode -->
    <div id="quickScoreMode" style="display:block;">
      <div class="section-header">
        <h2>评分结果</h2>
        <p>基于衡水体六维标准评估</p>
      </div>
      <div class="quick-score-grid">
        <!-- Radar Chart -->
        <div class="card radar-chart-wrap">
          <div id="radarChart"></div>
        </div>
        <!-- Scores & Suggestions -->
        <div class="card">
          <div class="total-score-wrap">
            <div class="total-score-number" id="totalScore">0<span class="percent">%</span></div>
            <div class="total-score-label">综合评分</div>
          </div>
          <div class="score-bars" id="scoreBars"></div>
        </div>
      </div>

// -------- Demo Image --------
demoBtn.addEventListener('click', function() {
  // Generate a demo handwriting image via canvas
  const canvas = document.createElement('canvas');
  canvas.width = 800;
  canvas.height = 300;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#FFFDF5';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Lines (four-line grid)
  const baseY = 60;
  const lineH = 40;
  ctx.strokeStyle = '#D0C8B8';
  ctx.lineWidth = 0.5;
  for (let row = 0; row < 5; row++) {
    const y = baseY + row * lineH;
    ctx.beginPath();
    ctx.moveTo(30, y);
    ctx.lineTo(canvas.width - 30, y);
    ctx.stroke();
  }
  // highlight baseline
  ctx.strokeStyle = '#C9A96E';
  ctx.lineWidth = 1.2;
  for (let row = 0; row < 5; row++) {
    const y = baseY + row * lineH;
    if (row === 3) {
      ctx.beginPath();
      ctx.moveTo(30, y);
      ctx.lineTo(canvas.width - 30, y);
      ctx.stroke();
    }
  }

  // Write demo text with handwriting-like style
  const text = 'The quick brown fox jumps over the lazy dog. Practice makes perfect!';
  ctx.font = '32px "Courier New", monospace';
  ctx.fillStyle = '#3A3A3A';
  ctx.textBaseline = 'middle';
  let x = 40;
  const y0 = baseY + 3 * lineH;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const w = ctx.measureText(ch).width;
    // Slight irregularity
    const offsetY = (Math.sin(i * 0.7) * 3) | 0;
    ctx.fillText(ch, x, y0 + offsetY);
    x += w + (ch === ' ' ? 10 : 2);
  }

  // Convert to file
  canvas.toBlob(function(blob) {
    const file = new File([blob], 'demo-handwriting.png', { type: 'image/png' });
    uploadedFile = file;
    isDemoImage = true;
    previewImg.src = canvas.toDataURL('image/png');
    uploadPreview.style.display = 'block';
    document.querySelector('.upload-area .upload-icon').style.display = 'none';
    document.querySelector('.upload-area h3').style.display = 'none';
    document.querySelector('.upload-area p').style.display = 'none';
    resultsSection.style.display = 'none';
    showToast('已加载示例书写图片');
  });
});

// -------- Number Animation --------
function animateNumber(el, target, duration) {
  const start = 0;
  const startTime = performance.now();
  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const val = Math.round(start + (target - start) * eased);
    el.innerHTML = val + '<span class="percent">%</span>';
    if (progress < 1) {
      requestAnimationFrame(tick);
    }
  }
  requestAnimationFrame(tick);
}

      html += ' ';

      html += '<span class="char-ok">' + c.char + '</span>';
    } else if (c.status === 'bad') {
      html += '<span class="char-bad">' + c.char + '</span>';
    } else {
      html += '<span class="char-warn">' + c.char + '</span>';
    }
  });

    const statusLabel = c.status === 'ok' ? '合格' : (c.status === 'bad' ? '不合格' : '需改进');
    const badgeCls = c.status === 'ok' ? 'badge-ok' : (c.status === 'bad' ? 'badge-bad' : 'badge-warn');

    // Generate a simulated user-written version of the character (slightly different)
    const stdChar = c.char;
    let userChar = c.char;
    if (c.status === 'bad' || c.status === 'warn') {
      // Slightly distort the character to simulate poor handwriting
      const distortMap = {
        'a': 'o', 'c': 'e', 'e': 'c', 'o': 'a',
        'r': 'v', 's': 'z', 'p': 'q', 'b': 'h',
      };
      userChar = distortMap[c.char.toLowerCase()] || c.char;
    }

    tr.innerHTML =
      '<td class="char-cell">' + c.char + '</td>' +
      '<td><span class="badge ' + badgeCls + '">' + statusLabel + '</span></td>' +
      '<td><div class="char-img-compare"><span class="std-char">' + c.char + '</span></div></td>' +
      '<td><div class="char-img-compare"><span class="user-char">' + userChar + '</span></div></td>' +
      '<td class="improve-note">' + (c.issue || '书写规范') + '</td>';

    // Highlight problem rows
    if (c.status !== 'ok') {
      tr.style.background = 'rgba(201,169,110,0.04)';
      tr.style.borderLeft = '3px solid ' + (c.status === 'bad' ? '#C62828' : '#E65100');
    }

    charTableBody.appendChild(tr);
  });
}
