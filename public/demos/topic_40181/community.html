<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孝心社区 - 分享爱与关怀</title>
  <style>
    :root {
      --primary: #E87D4E;
      --primary-light: #F5A77A;
      --secondary: #5B8C5A;
      --bg: #FFF8F5;
      --bg2: #FFF0E8;
      --card: #FFFFFF;
      --text: #2D2A26;
      --text-muted: #8A8279;
      --border: #E8D8D0;
      --danger: #E74C3C;
      --success: #27AE60;
      --warning: #F39C12;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .app-container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: var(--bg);
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      padding: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      max-width: 480px;
      margin: 0 auto;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
    }
    .header-title {
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header-actions {
      display: flex;
      gap: 0.75rem;
    }
    .btn {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .btn-primary {
      background: white;
      color: var(--primary);
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--bg); }
    .btn-outline {
      background: transparent;
      color: white;
      border: 1px solid white;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.2); }

    /* Stats Bar */
    .stats-bar {
      background: var(--card);
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      font-size: 0.85rem;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      color: var(--primary);
      font-weight: 600;
      font-size: 1.1rem;
    }
    .stat-label {
      color: var(--text-muted);
    }

    /* Category Tabs */
    .category-tabs {
      background: var(--card);
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
    }
    .category-tab {
      padding: 0.4rem 0.8rem;
      border-radius: 15px;
      background: var(--bg2);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      border: none;
    }
    .category-tab.active {
      background: var(--primary);
      color: white;
    }
    .category-tab:hover:not(.active) {
      background: var(--border);
    }

    /* Main Content */
    .main-content {
      max-width: 480px;
      margin: 0 auto;
      padding: 1rem;
      padding-bottom: 5rem;
    }

    /* Post Card */
    .post-card {
      background: var(--card);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .post-card:hover {
      box-shadow: 0 4px 12px rgba(232,125,78,0.15);
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }
    .post-author {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .author-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }
    .author-info {
      display: flex;
      flex-direction: column;
    }
    .author-name {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .post-time {
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .post-badge {
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      font-size: 0.75rem;
      background: var(--bg2);
      color: var(--primary);
    }
    .post-badge.hot {
      background: #FFE5E5;
      color: var(--danger);
    }
    .post-badge.quality {
      background: #E5F5E5;
      color: var(--secondary);
    }

    .post-content {
      margin-bottom: 0.75rem;
    }
    .post-text {
      font-size: 0.95rem;
      line-height: 1.7;
    }
    .post-images {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .post-image {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
    }
    .post-tags {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .post-tag {
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      background: var(--bg2);
      color: var(--primary);
      font-size: 0.8rem;
    }

    /* Post Actions */
    .post-actions {
      display: flex;
      justify-content: space-between;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .action-group {
      display: flex;
      gap: 1rem;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      background: none;
      border: none;
      padding: 0.3rem 0.5rem;
      border-radius: 15px;
    }
    .action-btn:hover {
      background: var(--bg2);
      color: var(--primary);
    }
    .action-btn.active {
      color: var(--primary);
    }
    .action-btn.liked {
      color: var(--danger);
    }
    .action-btn.collected {
      color: var(--warning);
    }
    .action-icon {
      font-size: 1rem;
    }
    .adopt-btn {
      background: var(--secondary);
      color: white;
      padding: 0.4rem 0.8rem;
      border-radius: 15px;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    .adopt-btn:hover {
      background: #4A7A4A;
    }

    /* Comments Section */
    .comments-section {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .comments-toggle {
      color: var(--primary);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .comments-list {
      margin-top: 0.5rem;
      display: none;
    }
    .comments-list.show {
      display: block;
    }
    .comment-item {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem;
      background: var(--bg);
      border-radius: 8px;
    }
    .comment-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .comment-content {
      flex: 1;
    }
    .comment-author {
      font-weight: 600;
      font-size: 0.85rem;
    }
    .comment-text {
      font-size: 0.85rem;
      color: var(--text);
    }
    .comment-input {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .comment-input input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.85rem;
      outline: none;
    }
    .comment-input input:focus {
      border-color: var(--primary);
    }
    .comment-input button {
      padding: 0.5rem 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    /* Create Post Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal {
      background: var(--card);
      border-radius: 16px;
      width: 90%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
    }
    .modal-body {
      padding: 1rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .form-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      resize: vertical;
    }
    .form-input:focus {
      border-color: var(--primary);
    }
    .category-select {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .category-option {
      padding: 0.4rem 0.8rem;
      border-radius: 15px;
      background: var(--bg2);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.3s;
    }
    .category-option.selected {
      border-color: var(--primary);
      background: var(--bg);
      color: var(--primary);
    }
    .image-upload {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .image-preview {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-preview.add {
      color: var(--text-muted);
      font-size: 2rem;
    }
    .modal-footer {
      padding: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .btn-submit {
      background: var(--primary);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      flex: 1;
    }
    .btn-cancel {
      background: var(--bg2);
      color: var(--text);
      padding: 0.75rem 1.5rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      flex: 1;
    }

    /* Review Status */
    .review-status {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.5rem;
      border-radius: 10px;
      font-size: 0.75rem;
      margin-top: 0.5rem;
    }
    .review-status.pending {
      background: #FFF3E0;
      color: var(--warning);
    }
    .review-status.approved {
      background: #E8F5E9;
      color: var(--success);
    }
    .review-status.rejected {
      background: #FFEBEE;
      color: var(--danger);
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 0;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0.5rem;
      transition: all 0.3s;
    }
    .nav-item.active {
      color: var(--primary);
    }
    .nav-icon {
      font-size: 1.3rem;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 20px;
      font-size: 0.9rem;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show {
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .post-images {
        grid-template-columns: repeat(2, 1fr);
      }
      .modal {
        width: 95%;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="header-title">孝心社区</div>
      <div class="header-actions">
        <button class="btn btn-outline" onclick="goBack()">返回</button>
        <button class="btn btn-primary" onclick="showCreatePostModal()">发布话题</button>
      </div>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-value" id="totalPosts">128</div>
      <div class="stat-label">话题总数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="totalUsers">56</div>
      <div class="stat-label">参与用户</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="totalInteractions">892</div>
      <div class="stat-label">互动次数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="adoptedCount">45</div>
      <div class="stat-label">采用次数</div>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="category-tabs">
    <button class="category-tab active" data-category="all">全部话题</button>
    <button class="category-tab" data-category="story">孝道故事</button>
    <button class="category-tab" data-category="health">健康养生</button>
    <button class="category-tab" data-category="festival">节日祝福</button>
    <button class="category-tab" data-category="tips">陪伴技巧</button>
    <button class="category-tab" data-category="help">求助问答</button>
    <button class="category-tab" data-category="memory">温馨回忆</button>
  </div>

  <!-- Main Content -->
  <main class="main-content" id="postsContainer">
    <!-- Posts will be dynamically loaded -->
  </main>

  <!-- Create Post Modal -->
  <div class="modal-overlay" id="createPostModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">发布话题</div>
        <button class="modal-close" onclick="hideCreatePostModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">话题分类</label>
          <div class="category-select" id="categorySelect">
            <div class="category-option selected" data-value="story">孝道故事</div>
            <div class="category-option" data-value="health">健康养生</div>
            <div class="category-option" data-value="festival">节日祝福</div>
            <div class="category-option" data-value="tips">陪伴技巧</div>
            <div class="category-option" data-value="help">求助问答</div>
            <div class="category-option" data-value="memory">温馨回忆</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">话题内容</label>
          <textarea class="form-input" id="postContent" rows="5" placeholder="分享您关于孝敬父母的故事、经验或想法..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">添加图片（最多3张）</label>
          <div class="image-upload" id="imageUpload">
            <div class="image-preview add" onclick="addImage()">+</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">话题标签</label>
          <input type="text" class="form-input" id="postTags" placeholder="输入标签，用逗号分隔">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="hideCreatePostModal()">取消</button>
        <button class="btn-submit" onclick="submitPost()">发布</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item" onclick="goBack()">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">返回主页</span>
    </button>
    <button class="nav-item active">
      <span class="nav-icon">💬</span>
      <span class="nav-label">话题</span>
    </button>
    <button class="nav-item" onclick="showMyPosts()">
      <span class="nav-icon">📝</span>
      <span class="nav-label">我的</span>
    </button>
    <button class="nav-item" onclick="showStats()">
      <span class="nav-icon">📊</span>
      <span class="nav-label">统计</span>
    </button>
  </nav>

            author: { name: '温馨回忆', avatar: '温' },
            category: 'memory',
            content: '翻看相册，找到了一张小时候和爸爸的合影。那时候爸爸还年轻，现在他已经70岁了。时间过得真快，要珍惜每一次陪伴的机会。今天决定周末回家看看他们。',
            images: [],
            tags: ['回忆', '珍惜', '陪伴'],
            likes: 67,
            comments: [
              { author: '时光飞逝', avatar: '光', text: '看哭了，我们真的要珍惜当下' }
            ],
            collects: 25,
            adopts: 12,
            createTime: Date.now() - 9000000,
            status: 'approved',
            hotScore: 88
          }
        ];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(samplePosts));
      }
    }

    // Get all posts
    function getPosts() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    // Save posts
    function savePosts(posts) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    }

    // ========== Hot Score Algorithm ==========
    function calculateHotScore(post) {
      // 综合考虑：讨论量、互动率、内容质量、时间衰减
      const timeDecay = Math.exp(-(Date.now() - post.createTime) / 86400000); // 一天衰减
      const interactionRate = (post.likes + post.comments.length * 2 + post.collects * 3) / 10;
      const qualityFactor = post.adopts > 0 ? 1.5 : 1;
      
      return Math.round((interactionRate * qualityFactor * timeDecay) * 10);
    }

    // ========== Render Posts ==========
    function renderPosts(category = 'all') {
      const container = document.getElementById('postsContainer');
      let posts = getPosts();
      
      // Filter by category
      if (category !== 'all') {
        posts = posts.filter(p => p.category === category);
      }
      
      // Sort by hot score
      posts.sort((a, b) => b.hotScore - a.hotScore);
      
      if (posts.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>暂无话题内容</p>
            <p>点击"发布话题"分享您的孝心故事</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = posts.map(post => renderPostCard(post)).join('');
      updateStats();
    }

    function renderPostCard(post) {
      const badge = post.hotScore >= 80 ? '<span class="post-badge hot">热门</span>' :
                    post.adopts >= 10 ? '<span class="post-badge quality">优质</span>' : '';
      
      const imagesHtml = post.images.length > 0 ? 
        `<div class="post-images">
          ${post.images.map(img => `<img class="post-image" src="${img}" alt="话题图片">`).join('')}
        </div>` : '';
      
      const tagsHtml = post.tags.length > 0 ?
        `<div class="post-tags">
          ${post.tags.map(tag => `<span class="post-tag">#${tag}</span>`).join('')}
        </div>` : '';
      
      const commentsHtml = post.comments.length > 0 ?
        `<div class="comments-list" id="comments-${post.id}">
          ${post.comments.map(c => `
            <div class="comment-item">
              <div class="comment-avatar">${c.avatar}</div>
              <div class="comment-content">
                <div class="comment-author">${c.author}</div>
                <div class="comment-text">${c.text}</div>
              </div>
            </div>
          `).join('')}
          <div class="comment-input">
            <input type="text" placeholder="写下您的评论..." id="commentInput-${post.id}">
            <button onclick="addComment('${post.id}')">发送</button>
          </div>
        </div>` :
        `<div class="comments-list" id="comments-${post.id}">
          <div class="comment-input">
            <input type="text" placeholder="写下您的评论..." id="commentInput-${post.id}">
            <button onclick="addComment('${post.id}')">发送</button>
          </div>
        </div>`;
      
      const timeStr = formatTime(post.createTime);
      
      return `
        <div class="post-card" id="post-${post.id}">
          <div class="post-header">
            <div class="post-author">
              <div class="author-avatar">${post.author.avatar}</div>
              <div class="author-info">
                <div class="author-name">${post.author.name}</div>
                <div class="post-time">${timeStr}</div>
              </div>
            </div>
            ${badge}
          </div>
          <div class="post-content">
            <div class="post-text">${post.content}</div>
            ${imagesHtml}
            ${tagsHtml}
          </div>
          <div class="post-actions">
            <div class="action-group">
              <button class="action-btn" onclick="likePost('${post.id}')">
                <span class="action-icon">👍</span>
                <span>${post.likes}</span>
              </button>
              <button class="action-btn" onclick="toggleComments('${post.id}')">
                <span class="action-icon">💬</span>
                <span>${post.comments.length}</span>
              </button>
              <button class="action-btn" onclick="collectPost('${post.id}')">
                <span class="action-icon">⭐</span>
                <span>${post.collects}</span>
              </button>
            </div>
            <button class="adopt-btn" onclick="adoptPost('${post.id}')">
              采用此话题
            </button>
          </div>
          <div class="comments-section">
            <div class="comments-toggle" onclick="toggleComments('${post.id}')">
              <span>💬 ${post.comments.length > 0 ? `${post.comments.length}条评论` : '写评论'}</span>
            </div>
            ${commentsHtml}
          </div>
        </div>
      `;
    }

    function formatTime(timestamp) {
      const diff = Date.now() - timestamp;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
      return `${Math.floor(diff / 86400000)}天前`;
    }

    // ========== Interactions ==========
    function likePost(postId) {
      const posts = getPosts();
      const post = posts.find(p => p.id === postId);
      if (post) {
        post.likes++;
        post.hotScore = calculateHotScore(post);
        savePosts(posts);
        renderPosts(getCurrentCategory());
        showToast('点赞成功');
      }
    }

    function collectPost(postId) {
      const posts = getPosts();
      const post = posts.find(p => p.id === postId);
      if (post) {
        post.collects++;
        post.hotScore = calculateHotScore(post);
        savePosts(posts);
        renderPosts(getCurrentCategory());
        showToast('已收藏到个人话题库');
      }
    }

    function adoptPost(postId) {
      const posts = getPosts();
      const post = posts.find(p => p.id === postId);
      if (post) {
        post.adopts++;
        post.hotScore = calculateHotScore(post);
        savePosts(posts);
        renderPosts(getCurrentCategory());
        showToast('话题已采用！可在下次通话时使用');
        
        // Save to user's adopted topics
        const adopted = JSON.parse(localStorage.getItem('familycare_adopted') || '[]');
        adopted.push({
          postId: post.id,
          content: post.content,
          category: post.category,
          adoptTime: Date.now()
        });
        localStorage.setItem('familycare_adopted', JSON.stringify(adopted));
      }
    }

    function toggleComments(postId) {
      const commentsList = document.getElementById(`comments-${postId}`);
      if (commentsList) {
        commentsList.classList.toggle('show');
      }
    }

    function addComment(postId) {
      const input = document.getElementById(`commentInput-${postId}`);
      const text = input.value.trim();
      if (!text) {
        showToast('请输入评论内容');
        return;
      }
      
      // Content review
      if (containsSensitiveWords(text)) {
        showToast('评论包含敏感内容，请修改后重试');
        return;
      }
      
      const posts = getPosts();
      const post = posts.find(p => p.id === postId);
      if (post) {
        post.comments.push({
          author: '我',
          avatar: '我',
          text: text
        });
        post.hotScore = calculateHotScore(post);
        savePosts(posts);
        renderPosts(getCurrentCategory());
        showToast('评论发布成功');
      }
    }

    // ========== Content Review ==========
    const sensitiveWords = ['广告', '推销', '诈骗', '赌博', '暴力', '色情'];
    
    function containsSensitiveWords(text) {
      return sensitiveWords.some(word => text.includes(word));
    }

    function reviewContent(content) {
      // AI审核模拟
      const issues = [];
      
      if (containsSensitiveWords(content)) {
        issues.push('包含敏感词汇');
      }
      
      if (content.length < 10) {
        issues.push('内容过短');
      }
      
      return {
        passed: issues.length === 0,
        issues: issues
      };
    }

    // ========== Create Post ==========
    let selectedCategory = 'story';
    let uploadedImages = [];

    function showCreatePostModal() {
      document.getElementById('createPostModal').classList.add('show');
      selectedCategory = 'story';
      uploadedImages = [];
      document.getElementById('postContent').value = '';
      document.getElementById('postTags').value = '';
      updateCategorySelect();
      updateImagePreview();
    }

    function hideCreatePostModal() {
      document.getElementById('createPostModal').classList.remove('show');
    }

    function updateCategorySelect() {
      const options = document.querySelectorAll('.category-option');
      options.forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === selectedCategory);
      });
    }

    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('category-option')) {
        selectedCategory = e.target.dataset.value;
        updateCategorySelect();
      }
    });

    function addImage() {
      if (uploadedImages.length >= 3) {
        showToast('最多只能添加3张图片');
        return;
      }
      // 模拟添加图片
      uploadedImages.push('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23E87D4E" width="100" height="100"/><text x="50" y="50" text-anchor="middle" fill="white" font-size="14">图片</text></svg>');
      updateImagePreview();
    }

    function updateImagePreview() {
      const container = document.getElementById('imageUpload');
      let html = uploadedImages.map((img, i) => 
        `<div class="image-preview" onclick="removeImage(${i})">
          <img src="${img}" alt="预览图">
        </div>`
      ).join('');
      
      if (uploadedImages.length < 3) {
        html += `<div class="image-preview add" onclick="addImage()">+</div>`;
      }
      
      container.innerHTML = html;
    }

    function removeImage(index) {
      uploadedImages.splice(index, 1);
      updateImagePreview();
    }

    function submitPost() {
      const content = document.getElementById('postContent').value.trim();
      const tags = document.getElementById('postTags').value.split(',').map(t => t.trim()).filter(t => t);
      
      if (!content) {
        showToast('请输入话题内容');
        return;
      }
      
      // Content review
      const review = reviewContent(content);
      if (!review.passed) {
        showToast(`内容审核未通过：${review.issues.join(', ')}`);
        return;
      }
      
      const posts = getPosts();
      const newPost = {
        id: 'p' + Date.now(),
        author: { name: '我', avatar: '我' },
        category: selectedCategory,
        content: content,
        images: uploadedImages,
        tags: tags,
        likes: 0,
        comments: [],
        collects: 0,
        adopts: 0,
        createTime: Date.now(),
        status: review.passed ? 'approved' : 'pending',
        hotScore: 0
      };
      
      posts.unshift(newPost);
      savePosts(posts);
      
      hideCreatePostModal();
      renderPosts(getCurrentCategory());
      showToast('话题发布成功！');
    }

    // ========== Category Filter ==========
    function getCurrentCategory() {
      const activeTab = document.querySelector('.category-tab.active');
      return activeTab ? activeTab.dataset.category : 'all';
    }

    document.querySelectorAll('.category-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderPosts(this.dataset.category);
      });
    });

    // ========== Stats ==========
    function updateStats() {
      const posts = getPosts();
      const totalPosts = posts.length;
      const totalUsers = new Set(posts.map(p => p.author.name)).size;
      const totalInteractions = posts.reduce((sum, p) => sum + p.likes + p.comments.length + p.collects, 0);
      const adoptedCount = posts.reduce((sum, p) => sum + p.adopts, 0);
      
      document.getElementById('totalPosts').textContent = totalPosts;
      document.getElementById('totalUsers').textContent = totalUsers;
      document.getElementById('totalInteractions').textContent = totalInteractions;
      document.getElementById('adoptedCount').textContent = adoptedCount;
    }

    function showStats() {
      const posts = getPosts();
      const myPosts = posts.filter(p => p.author.name === '我');
      
      showToast(`我的话题：${myPosts.length}条，获赞：${myPosts.reduce((s,p) => s+p.likes, 0)}次`);
    }

    function showMyPosts() {
      const posts = getPosts();
      const myPosts = posts.filter(p => p.author.name === '我');
      
      if (myPosts.length === 0) {
        showToast('您还没有发布话题');
        return;
      }
      
      // Show only my posts
      const container = document.getElementById('postsContainer');
      container.innerHTML = myPosts.map(post => renderPostCard(post)).join('');
      showToast(`显示我的${myPosts.length}条话题`);
    }

    // ========== Navigation ==========
    function goBack() {
      window.location.href = 'index.html';
    }

    // ========== Toast ==========
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ========== Initialize ==========
    initData();
    renderPosts();
  </script>
  </div>
</body>
</html>
