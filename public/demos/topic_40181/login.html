<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>孝心助手 - 用户登录</title>
  <style>
    :root {
      --primary-color: #E87D4E;
      --primary-dark: #C4653A;
      --secondary-color: #5B8C5A;
      --bg-color: #FFF8F0;
      --bg-card: #FFFFFF;
      --text-primary: #2D2A26;
      --text-secondary: #8A8279;
      --border-color: #E0D6CC;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(45,42,38,0.2);
    }

    .login-header {
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 2rem;
    }

    .login-header h1 {
      font-size: 1.5rem;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .login-header p {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .login-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-color);
    }

    .tab-btn {
      flex: 1;
      padding: 1rem;
      background: none;
      border: none;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      position: relative;
    }

    .tab-btn.active {
      color: var(--primary-color);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      background: var(--primary-color);
      border-radius: 2px;
    }

    .login-form {
      padding: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.875rem;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-size: 0.95rem;
      background: var(--bg-color);
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .form-group input::placeholder {
      color: var(--text-secondary);
    }

    .form-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 0.75rem;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    .checkbox-group label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin: 0;
    }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 1rem;
    }

    .btn-secondary {
      width: 100%;
      padding: 0.875rem;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-wechat {
      background: #5B8C5A;
      border-color: #5B8C5A;
      color: #fff;
    }

    .forgot-link {
      text-align: center;
      margin-bottom: 1rem;
    }

    .forgot-link a {
      font-size: 0.85rem;
      color: var(--primary-color);
      text-decoration: none;
    }

    .forgot-link a:hover {
      text-decoration: underline;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.75rem 1.25rem;
      background: rgba(45,42,38,0.9);
      color: #fff;
      border-radius: 24px;
      font-size: 0.875rem;
      z-index: 1000;
      display: none;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(45,42,38,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 360px;
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .modal-header h3 {
      font-size: 1.1rem;
      color: var(--text-primary);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg-color);
      color: var(--text-secondary);
      font-size: 1.25rem;
      cursor: pointer;
    }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-footer {
      padding: 1rem 1.5rem 1.5rem;
      display: flex;
      gap: 0.75rem;
    }

    .btn-cancel {
      flex: 1;
      padding: 0.875rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .btn-confirm {
      flex: 1;
      padding: 0.875rem;
      border: none;
      border-radius: 10px;
      background: var(--primary-color);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }

    .error-message {
      color: #EF4444;
      font-size: 0.8rem;
      margin-top: 0.25rem;
      display: none;
    }

    .error-message.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo-icon">❤️</div>
      <h1>孝心助手</h1>
      <p>AI帮你常回家看看</p>
    </div>

    <div class="login-tabs">
      <button class="tab-btn active" onclick="showTab('login')">登录</button>
      <button class="tab-btn" onclick="showTab('register')">注册</button>
    </div>

    <div id="login-tab" class="login-form">
      <div class="form-group">
        <label>手机号/邮箱</label>
        <input type="text" id="login-account" placeholder="请输入手机号或邮箱">
        <div class="error-message" id="login-account-error">请输入账号</div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="请输入密码">
        <div class="error-message" id="login-password-error">请输入密码</div>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">记住我</label>
      </div>
      <button class="btn-primary" onclick="handleLogin()">登录</button>
      <div class="forgot-link">
        <a href="#" onclick="showForgotModal()">忘记密码？</a>
      </div>
      <button class="btn-secondary btn-wechat" onclick="handleWechatLogin()">
        <span>💬</span>
        <span>微信一键登录</span>
      </button>
    </div>

    <div id="register-tab" class="login-form" style="display: none;">
      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="register-phone" placeholder="请输入手机号">
        <div class="error-message" id="register-phone-error">请输入正确的手机号</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>验证码</label>
          <input type="text" id="register-code" placeholder="请输入验证码">
        </div>
        <button class="btn-secondary" style="height: 44px; margin-top: 20px;" onclick="sendCode()">获取验证码</button>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="register-password" placeholder="请设置密码（6-20位）">
        <div class="error-message" id="register-password-error">密码长度需6-20位</div>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="register-confirm" placeholder="请再次输入密码">
        <div class="error-message" id="register-confirm-error">两次密码不一致</div>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="agree-terms">
        <label for="agree-terms">我已阅读并同意<a href="#" style="color: var(--primary-color);">用户协议</a>和<a href="#" style="color: var(--primary-color);">隐私政策</a></label>
      </div>
      <button class="btn-primary" onclick="handleRegister()">注册</button>
    </div>
  </div>

  <div id="forgot-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>找回密码</h3>
        <button class="modal-close" onclick="closeForgotModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>手机号/邮箱</label>
          <input type="text" id="forgot-account" placeholder="请输入注册时的手机号或邮箱">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>验证码</label>
            <input type="text" id="forgot-code" placeholder="请输入验证码">
          </div>
          <button class="btn-secondary" style="height: 44px; margin-top: 20px;" onclick="sendForgotCode()">获取验证码</button>
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input type="password" id="forgot-password" placeholder="请设置新密码">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeForgotModal()">取消</button>
        <button class="btn-confirm" onclick="handleForgotPassword()">确定</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    function showTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector('.tab-btn[onclick="showTab(\'' + tabName + '\')"]').classList.add('active');
      document.getElementById('login-tab').style.display = tabName === 'login' ? 'block' : 'none';
      document.getElementById('register-tab').style.display = tabName === 'register' ? 'block' : 'none';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 2000);
    }

    function validatePhone(phone) {
      return /^1[3-9]\d{9}$/.test(phone);
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function sendCode() {
      const phone = document.getElementById('register-phone').value;
      if (!validatePhone(phone)) {
        document.getElementById('register-phone-error').classList.add('active');
        return;
      }
      document.getElementById('register-phone-error').classList.remove('active');
      showToast('验证码已发送，请注意查收');
    }

    function sendForgotCode() {
      const account = document.getElementById('forgot-account').value;
      if (!account) {
        showToast('请输入账号');
        return;
      }
      showToast('验证码已发送');
    }

    function handleLogin() {
      const account = document.getElementById('login-account').value;
      const password = document.getElementById('login-password').value;

      if (!account) {
        document.getElementById('login-account-error').classList.add('active');
        return;
      }
      document.getElementById('login-account-error').classList.remove('active');

      if (!password) {
        document.getElementById('login-password-error').classList.add('active');
        return;
      }
      document.getElementById('login-password-error').classList.remove('active');

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user = users.find(u => (u.phone === account || u.email === account) && u.password === password);

      if (user) {
        localStorage.setItem('currentUser', JSON.stringify(user));
        showToast('登录成功');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } else {
        showToast('账号或密码错误');
      }
    }

    function handleRegister() {
      const phone = document.getElementById('register-phone').value;
      const code = document.getElementById('register-code').value;
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      const agree = document.getElementById('agree-terms').checked;

      let isValid = true;

      if (!validatePhone(phone)) {
        document.getElementById('register-phone-error').classList.add('active');
        isValid = false;
      } else {
        document.getElementById('register-phone-error').classList.remove('active');
      }

      if (!code) {
        showToast('请输入验证码');
        isValid = false;
      }

      if (password.length < 6 || password.length > 20) {
        document.getElementById('register-password-error').classList.add('active');
        isValid = false;
      } else {
        document.getElementById('register-password-error').classList.remove('active');
      }

      if (password !== confirm) {
        document.getElementById('register-confirm-error').classList.add('active');
        isValid = false;
      } else {
        document.getElementById('register-confirm-error').classList.remove('active');
      }

      if (!agree) {
        showToast('请同意用户协议和隐私政策');
        isValid = false;
      }

      if (!isValid) return;

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const exists = users.some(u => u.phone === phone);

      if (exists) {
        showToast('该手机号已注册');
        return;
      }

      const newUser = {
        id: Date.now().toString(),
        phone,
        email: '',
        password,
        name: '',
        createdAt: new Date().toISOString()
      };

      users.push(newUser);
      localStorage.setItem('users', JSON.stringify(users));
      localStorage.setItem('currentUser', JSON.stringify(newUser));

      showToast('注册成功');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    }

    function showForgotModal() {
      document.getElementById('forgot-modal').classList.add('active');
    }

    function closeForgotModal() {
      document.getElementById('forgot-modal').classList.remove('active');
    }

    function handleForgotPassword() {
      const account = document.getElementById('forgot-account').value;
      const code = document.getElementById('forgot-code').value;
      const password = document.getElementById('forgot-password').value;

      if (!account || !code || !password) {
        showToast('请填写完整信息');
        return;
      }

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const userIndex = users.findIndex(u => u.phone === account || u.email === account);

      if (userIndex === -1) {
        showToast('该账号不存在');
        return;
      }

      users[userIndex].password = password;
      localStorage.setItem('users', JSON.stringify(users));

      showToast('密码修改成功');
      closeForgotModal();
    }

    function handleWechatLogin() {
      showToast('微信登录功能开发中');
    }
  </script>
</body>
</html>
