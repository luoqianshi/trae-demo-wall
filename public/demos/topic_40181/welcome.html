<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>孝心助手 - AI帮你常回家看看</title>
  <style>
    :root {
      --primary-color: #E87D4E;
      --primary-dark: #C4653A;
      --secondary-color: #5B8C5A;
      --bg-color: #FFF8F0;
      --text-primary: #2D2A26;
      --text-secondary: #8A8279;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .welcome-container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    .welcome-slider {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .slide {
      width: 100%;
      height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .slide.active {
      display: flex;
    }

    .slide-logo {
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.25);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      margin-bottom: 2rem;
    }

    .slide-icon {
      width: 180px;
      height: 180px;
      background: rgba(255,255,255,0.2);
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      margin-bottom: 2rem;
    }

    .slide-title {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1rem;
    }

    .slide-desc {
      font-size: 1rem;
      color: rgba(255,255,255,0.9);
      line-height: 1.8;
      max-width: 300px;
    }

    .slide-features {
      margin-top: 1.5rem;
      text-align: left;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      color: rgba(255,255,255,0.9);
      font-size: 0.95rem;
    }

    .feature-icon {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }

    .slider-dots {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
    }

    .dot.active {
      background: #fff;
      width: 24px;
      border-radius: 10px;
    }

    .welcome-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn-start {
      width: 100%;
      padding: 1.25rem;
      background: #fff;
      border: none;
      border-radius: 24px;
      color: var(--primary-color);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-skip {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .slide-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide-nav.prev { left: 1rem; }
    .slide-nav.next { right: 1rem; }

    .slide-nav:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    @media (max-width: 480px) {
      .slide-title { font-size: 1.75rem; }
      .slide-icon { width: 140px; height: 140px; font-size: 4rem; }
      .slide-nav { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    <div class="welcome-slider">
      <!-- Slide 1: 欢迎 -->
      <div class="slide active" id="slide-1">
        <div class="slide-logo">❤️</div>
        <h1 class="slide-title">孝心助手</h1>
        <p class="slide-desc">AI帮你常回家看看<br>让每一份孝心都不被距离和忙碌稀释</p>
      </div>

      <!-- Slide 2: 智能提醒 -->
      <div class="slide" id="slide-2">
        <div class="slide-icon">🔔</div>
        <h2 class="slide-title">智能提醒</h2>
        <p class="slide-desc">AI根据天气、节日、日程智能推荐最佳联系时机</p>
        <div class="slide-features">
          <div class="feature-item">
            <div class="feature-icon">🌡️</div>
            <span>天气变化自动提醒</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">🎂</div>
            <span>生日节日提前通知</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">📅</div>
            <span>根据空闲时段推荐</span>
          </div>
        </div>
      </div>

      <!-- Slide 3: 话题推荐 -->
      <div class="slide" id="slide-3">
        <div class="slide-icon">💬</div>
        <h2 class="slide-title">话题推荐</h2>
        <p class="slide-desc">AI生成个性化聊天话题，让每次通话更有温度</p>
        <div class="slide-features">
          <div class="feature-item">
            <div class="feature-icon">🌤️</div>
            <span>天气话题一键复制</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">💊</div>
            <span>健康话题贴心关怀</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">🍲</div>
            <span>生活话题轻松聊天</span>
          </div>
        </div>
      </div>

      <!-- Slide 4: 家人档案 -->
      <div class="slide" id="slide-4">
        <div class="slide-icon">
          <svg viewBox="0 0 120 120" width="100" height="100">
            <!-- 背景圆 -->
            <circle cx="60" cy="60" r="55" fill="rgba(255,255,255,0.15)"/>
            <!-- 左侧人物背影 -->
            <ellipse cx="40" cy="42" rx="14" ry="16" fill="rgba(255,255,255,0.9)"/>
            <path d="M26 58 Q40 52 54 58 L52 95 Q40 90 28 95 Z" fill="rgba(255,255,255,0.85)"/>
            <!-- 右侧人物背影 -->
            <ellipse cx="80" cy="42" rx="14" ry="16" fill="rgba(255,255,255,0.9)"/>
            <path d="M66 58 Q80 52 94 58 L92 95 Q80 90 68 95 Z" fill="rgba(255,255,255,0.85)"/>
            <!-- 牵手部分 -->
            <path d="M50 72 Q60 68 70 72" stroke="rgba(255,255,255,0.6)" stroke-width="4" fill="none" stroke-linecap="round"/>
            <!-- 爱心 -->
            <path d="M55 78 Q55 74 60 74 Q65 74 65 78 Q65 82 60 86 Q55 82 55 78" fill="#FF6B6B"/>
          </svg>
        </div>
        <h2 class="slide-title">家人档案</h2>
        <p class="slide-desc">系统化管理父母长辈信息，持续关注健康状态</p>
        <div class="slide-features">
          <div class="feature-item">
            <div class="feature-icon">📋</div>
            <span>基本信息完整记录</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">❤️</div>
            <span>健康状况追踪关注</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">📅</div>
            <span>重要日期永不遗忘</span>
          </div>
        </div>
      </div>

      <!-- Slide 5: 沟通记录 -->
      <div class="slide" id="slide-5">
        <div class="slide-icon">📝</div>
        <h2 class="slide-title">沟通记录</h2>
        <p class="slide-desc">记录每次通话要点，语音转文字轻松录入</p>
        <div class="slide-features">
          <div class="feature-item">
            <div class="feature-icon">🎤</div>
            <span>语音转文字高效录入</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">📊</div>
            <span>沟通报告一目了然</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">📌</div>
            <span>待跟进事项自动提醒</span>
          </div>
        </div>
      </div>
    </div>

    <button class="slide-nav prev" onclick="prevSlide()" disabled>←</button>
    <button class="slide-nav next" onclick="nextSlide()">→</button>

    <div class="slider-dots">
      <div class="dot active" onclick="goToSlide(1)"></div>
      <div class="dot" onclick="goToSlide(2)"></div>
      <div class="dot" onclick="goToSlide(3)"></div>
      <div class="dot" onclick="goToSlide(4)"></div>
      <div class="dot" onclick="goToSlide(5)"></div>
    </div>

    <div class="welcome-footer">
      <button class="btn-start" onclick="startApp()">立即体验</button>
      <button class="btn-skip" onclick="skipWelcome()">跳过引导</button>
    </div>
  </div>

  <script>
    let currentSlide = 1;
    const totalSlides = 5;

    function updateSlide() {
      document.querySelectorAll('.slide').forEach((slide, index) => {
        slide.classList.toggle('active', index + 1 === currentSlide);
      });

      document.querySelectorAll('.dot').forEach((dot, index) => {
        dot.classList.toggle('active', index + 1 === currentSlide);
      });

      document.querySelector('.slide-nav.prev').disabled = currentSlide === 1;
      document.querySelector('.slide-nav.next').disabled = currentSlide === totalSlides;
    }

    function nextSlide() {
      if (currentSlide < totalSlides) {
        currentSlide++;
        updateSlide();
      }
    }

    function prevSlide() {
      if (currentSlide > 1) {
        currentSlide--;
        updateSlide();
      }
    }

    function goToSlide(slideNum) {
      currentSlide = slideNum;
      updateSlide();
    }

    function startApp() {
      localStorage.setItem('welcomeShown', 'true');
      window.location.href = 'index.html';
    }

    function skipWelcome() {
      localStorage.setItem('welcomeShown', 'true');
      window.location.href = 'index.html';
    }

    // 自动轮播
    let autoSlideInterval = setInterval(() => {
      if (currentSlide < totalSlides) {
        nextSlide();
      } else {
        currentSlide = 1;
        updateSlide();
      }
    }, 5000);

    // 用户交互时停止自动轮播
    document.addEventListener('click', () => {
      clearInterval(autoSlideInterval);
    });
  </script>
</body>
</html>
