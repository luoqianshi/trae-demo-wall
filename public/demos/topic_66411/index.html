3. prompt 必须为英文，描述具体、现实的视觉场景

## 输出格式

直接输出一段英文 prompt，不要加任何解释或前后缀。示例：
"warm hand-drawn illustration, a teenager sitting under a cherry blossom tree reading a book, soft golden sunlight, pastel warm tones, gentle and healing atmosphere, subtle mood, handwritten style, no text, 16:9 aspect ratio, high quality"`,nv=`# 文章配图 Prompt 生成技能（ian-xiaohei-scenes）

## 核心公式

小黑 + 真实物件 + 物理动作 + 留白叙事

一句话：让读者先看到一个真实、轻、怪的小现场，再在 1 秒内意识到"这说的就是我"。

## 视觉规则

1. **纯白色背景**：干净的白底，不做复杂场景

## 创作流程

### Step 1: 联网搜集资料（模拟）

### Step 2: 撰写内容
- **故事化开头**：带情感色彩（温暖/好奇/共鸣），不用说教式开头
- **像朋友对话**：像同龄伙伴分享，不像教科书复读
- **结构清晰**：场景描述 → 核心观点 → 实用方法 → 温暖收尾

- **不使用命令式表达**：不用"你应该""你必须"
- **不出现敏感词**：不涉及自杀、自残、暴力等负面诱导内容

### Step 3: 生成标题
- 温暖治愈，引发共鸣
- 不做标题党，不夸大
- 15-25 字为宜

### Step 4: 排版
- 段落以 \\n\\n 分隔

- 适合手机阅读的短段落

你将生成两种形式的内容：
