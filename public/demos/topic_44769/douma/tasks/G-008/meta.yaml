entry_file: buggy/solution.cpp
focus: counter() 返回指向 vector 元素的指针，后续注册新计数器触发扩容/搬迁使旧句柄悬垂（use-after-free）；须改用地址稳定的容器（如
  deque）或保证元素地址不随新增变动。核心不变量是"任意数量、任意登记顺序下句柄恒有效"——仅靠 reserve(大数) 预留容量只是在有限测试规模内回避问题，并未真正满足该不变量
