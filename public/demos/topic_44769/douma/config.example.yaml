# DouMa 模型配置示例
# 安全：api_key 一律从环境变量读取，本文件严禁出现明文 key。

max_concurrency: 4        # 并发上限，避免触发 API 限流
agentic_max_rounds: 5     # Agentic 模式最大迭代轮次

models:
  # —— 本地 mock 选手（无需 API，用于自测闭环）——
  - name: "mock-学霸"        # 用参考修复作答，应全过
    adapter: "mock"
    extra:
      mode: "reference"
      latency: 0.05

  - name: "mock-躺平"        # 原样返回 buggy 代码，应全挂（验证判分负例）
    adapter: "mock"
    extra:
      mode: "buggy"
      latency: 0.08

  # —— 真实模型选手（火山 CodingPlan，OpenAI 兼容）——
  # 取消注释并配置环境变量后启用：
  # - name: "model-A"
  #   adapter: "openai"
  #   base_url: "https://<volc-coding-plan-endpoint>/v1"
  #   api_key_env: "LLMCHECK_KEY_A"   # 从环境变量读取
  #   model: "<model-id-A>"
