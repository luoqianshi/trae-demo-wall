<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DouMa · 论剑台</title>
  <link rel="stylesheet" href="/static/style.css?v=20260624" />
</head>
<body>
  <!-- 顶部步骤指引（已走到过的步骤可点击回看；评测进行中锁定） -->
  <nav class="stepbar">
    <span class="step-dot" data-step="1" role="button" tabindex="0"><i>壹</i>点将</span>
    <span class="step-dot" data-step="2" role="button" tabindex="0"><i>贰</i>点题</span>
    <span class="step-dot" data-step="3" role="button" tabindex="0"><i>叁</i>过招</span>
    <span class="step-dot" data-step="4" role="button" tabindex="0"><i>肆</i>论剑</span>
  </nav>

  <!-- 第一步：演武堂 · 点将（选手配置） -->
  <section class="stage" id="stage-setup">
    <div class="stage-inner">
      <h1 class="brush">演武堂 · 点将</h1>
      <p id="readonly-banner" class="readonly-banner" hidden>当前为历史回合回溯视图（只读）。如需重新比试，请到「论剑」页点「再战一场」。</p>
      <p class="subtitle">群雄聚首，先择英雄登台</p>

      <!-- 配置来源固定为运行时选手库；下拉隐藏保留，仅供脚本读取选中值 -->
      <select id="config-select" hidden></select>
      <div class="field">
        <label>列位英雄
          <button id="toggle-models" class="link">全选 / 反选</button>
          <button id="manage-players" class="link">⚙ 管理选手</button>
        </label>
        <div id="model-list" class="card-grid"></div>
      </div>
      <div class="field inline">
        <label>比试规则</label>
        <select id="mode-select">
          <option value="one_shot">一击定胜负（one_shot）</option>
          <option value="agentic">连绵不绝（agentic）</option>
        </select>
        <label>并发</label>
        <input id="concurrency" type="number" min="1" value="4" />
        <label class="checkbox" title="把本场各题通过率加权合并回题库，用于难度定级。one_shot 为标准口径默认开启；agentic 通过率偏高，默认关闭以免污染基准。"><input id="calibrate" type="checkbox" /> 回填校准</label>
      </div>
      <p id="calibrate-hint" class="hint inline-hint"></p>
      <p id="setup-error" class="error"></p>
      <div class="stage-actions">
        <button id="to-wall-btn" class="seal-btn">前往题墙 ▶</button>
      </div>
    </div>
  </section>

  <!-- 第二步：题墙 · 拈阄点题 -->
  <section class="stage" id="stage-wall" hidden>
    <div class="stage-inner">
      <h1 class="brush">题墙 · 拈阄点题</h1>
      <p class="subtitle" id="wall-subtitle">诸式罗列于壁，每档拈取一道，凑成本场三式</p>

      <div id="task-wall" class="wall"></div>

      <div id="drawn-tray" class="tray" hidden>
        <span class="tray-label">本场三式</span>
        <div id="drawn-slots" class="slots"></div>
      </div>

      <p id="wall-error" class="error"></p>
      <div class="stage-actions">
        <button id="back-setup-btn" class="seal-btn ghost">◀ 返回点将</button>
        <button id="draw-btn" class="seal-btn">拈阄点题</button>
        <button id="start-btn" class="seal-btn" hidden>华山论剑 ⚔</button>
      </div>
    </div>
  </section>

  <!-- 第三步：擂台 · 过招（比试页） -->
  <section class="stage arena-stage" id="stage-arena" hidden>
    <div class="stage-inner wide">
      <h1 class="brush">擂台 · 过招</h1>
      <div class="progress-wrap"><div id="progress-bar"></div><span id="progress-text"></span></div>
      <div id="versus" class="versus"></div>
    </div>
  </section>

  <!-- 第四步：论剑 · 榜单 -->
  <section class="stage" id="stage-results" hidden>
    <div class="stage-inner wide">
      <h1 class="brush">论剑 · 榜单</h1>
      <div id="scorecards" class="card-grid"></div>
      <h3 class="brush-sm">英雄榜</h3>
      <table id="leaderboard" class="scroll"></table>
      <h3 class="brush-sm">试炼区分度</h3>
      <table id="discrimination" class="scroll"></table>
      <div class="stage-actions">
        <button id="open-console-btn" class="seal-btn ghost">查看做题详情 ▤</button>
        <button id="again-btn" class="seal-btn">再战一场</button>
      </div>
    </div>
  </section>

  <!-- Console 抽屉：查看/对比选手做题明细 -->
  <div id="console-mask" class="console-mask" hidden>
    <div class="console-drawer">
      <div class="console-head">
        <h3 class="brush-sm">做题 Console</h3>
        <button id="console-close" class="seal-btn ghost">关闭 ✕</button>
      </div>
      <div class="console-pick" id="console-pick"></div>
      <div class="console-body" id="console-body"></div>
    </div>
  </div>

  <!-- 选手管理抽屉：增/删/测试参赛选手（持久化于服务端卷） -->
  <div id="players-mask" class="console-mask" hidden>
    <div class="console-drawer">
      <div class="console-head">
        <h3 class="brush-sm">管理选手 · 招贤纳士</h3>
        <button id="players-close" class="seal-btn ghost">关闭 ✕</button>
      </div>
      <div class="players-body">
        <div class="player-form">
          <h4 class="brush-sm">新增选手</h4>
          <div class="pf-grid">
            <label>名号<input id="pf-name" type="text" placeholder="如 MyModel-Pro" /></label>
            <label>模型 ID<input id="pf-model" type="text" placeholder="如 deepseek-chat" /></label>
            <label>Base URL<input id="pf-baseurl" type="text" placeholder="https://.../v1" /></label>
            <label>API Key<input id="pf-key" type="password" placeholder="明文输入，加密保存" /></label>
          </div>
          <p id="pf-error" class="error"></p>
          <button id="pf-add" class="seal-btn">招入麾下 ＋</button>
        </div>
        <h4 class="brush-sm">现有选手</h4>
        <div id="players-list" class="players-list"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=20260624"></script>
</body>
</html>
