<script>
/**
 * 妈马装 H5 · 成长相册
 * 依赖：MMZ.Store, MMZ.Router, MMZ.request, MMZ.config, MMZ.Loading
 *
 * 功能：
 *   - 按月份分组展示历史试穿结果（时间轴式）
 *   - 点击照片查看大图
 *   - 长按或右上角图标删除（DELETE /api/album/{photo_id}）
 *
 * 接口：
 *   GET /api/album/list → { total, months:[{ month_key, photos:[{id,image_url,scene,...}] }] }
 *   DELETE /api/album/{photo_id} → { photo_id }
 */
window.MMZ = window.MMZ || {};

MMZ.Album = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;

  /** 相册原始数据 */
  var albumData = null;
  /** 长按计时器 */
  var pressTimer = null;

  /**
   * 渲染相册页
   * @returns {string}
   */
  function render() {
    var html = '';
    html += '<div class="page page-album">';

    if (!albumData) {
      html += '<div class="album-loading">加载中…</div>';
    } else {
      html += renderTimeline(albumData);
    }

    html += '</div>';
    return html;
  }

  /**
   * 渲染时间轴
   */
  function renderTimeline(data) {
    var months = (data && data.months) || [];
    if (months.length === 0) {
      return (
        '<div class="album-empty">' +
          '<div class="album-empty-icon">' + MMZ.Icon.render('empty_camera', 'line', 48) + '</div>' +
          '<div class="album-empty-text">相册还是空的</div>' +
          '<div class="album-empty-desc">完成试穿后点击"保存到相册"即可</div>' +
          '<div class="album-empty-btn" data-action="go-tryon">去试衣间</div>' +
        '</div>'
      );
    }

    var html = '';
    months.forEach(function (group) {
      html += '<div class="timeline-section">';
      html += '<div class="timeline-header">' + formatMonth(group.month_key) + '</div>';
      html += '<div class="timeline-grid">';

      var photos = group.photos || [];
      photos.forEach(function (photo) {
        var url = imgUrl(photo.image_url);
        var sceneName = photo.scene || '';
        html +=
          '<div class="album-photo" data-action="view-photo" data-id="' + photo.id + '" data-url="' + url + '" data-scene="' + escapeAttr(sceneName) + '">' +
            '<div class="album-photo-cover" style="background-image:url(' + url + ')"></div>' +
            '<div class="album-photo-del" data-action="delete-photo" data-id="' + photo.id + '">' + MMZ.Icon.render('trash', 'line', 16) + '</div>' +
          '</div>';
      });

      html += '</div>'; // .timeline-grid
      html += '</div>'; // .timeline-section
    });

    return html;
  }

  /**
   * 页面挂载：加载数据 + 绑定事件
   */
  function onMount() {
    loadAlbum();
    bindEvents();
  }

  /**
   * 加载相册数据
   */
  function loadAlbum() {
    request.get('/api/album/list').then(function (data) {
      albumData = data;
      // 重新渲染
      var page = document.querySelector('.page-album');
      if (page) {
        page.innerHTML = renderTimeline(data);
      }
    }).catch(function (err) {
      var page = document.querySelector('.page-album');
      if (page) {
        page.innerHTML = '<div class="album-empty">' + escapeHtml(err.message) + '</div>';
      }
    });
  }

  /**
   * 绑定事件
   */
  function bindEvents() {
    var app = document.getElementById('app');
    if (!app) return;

    var clickHandler = function (e) {
      // 删除按钮优先（阻止冒泡到查看）
      var delBtn = e.target.closest('[data-action="delete-photo"]');
      if (delBtn) {
        e.stopPropagation();
        var id = parseInt(delBtn.getAttribute('data-id'), 10);
        handleDelete(id);
        return;
      }

      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'view-photo':
          var url = target.getAttribute('data-url');
          var scene = target.getAttribute('data-scene');
          showLargeImage(url, scene);
          break;
        case 'go-tryon':
          Router.navigate('tryon', 'tryon');
          break;
        default:
          break;
      }
    };
    window.MMZ._pageClickHandler = clickHandler;
    app.addEventListener('click', clickHandler);
  }

  /**
   * 删除照片
   */
  function handleDelete(photoId) {
    if (!confirm('确定删除这张照片吗？')) return;

    request.del('/api/album/' + photoId).then(function () {
      Loading.toast('已删除');
      // 从本地数据中移除
      if (albumData && albumData.months) {
        albumData.months.forEach(function (group) {
          group.photos = (group.photos || []).filter(function (p) {
            return p.id !== photoId;
          });
        });
        // 移除空的月份组
        albumData.months = albumData.months.filter(function (g) {
          return g.photos.length > 0;
        });
      }
      var page = document.querySelector('.page-album');
      if (page) {
        page.innerHTML = renderTimeline(albumData);
      }
    }).catch(function (err) {
      Loading.toast(err.message);
    });
  }

  /**
   * 格式化月份显示
   */
  function formatMonth(monthKey) {
    if (!monthKey) return '';
    var parts = monthKey.split('-');
    if (parts.length >= 2) {
      return parts[0] + '年' + parseInt(parts[1], 10) + '月';
    }
    return monthKey;
  }

  /**
   * 显示大图
   */
  function showLargeImage(url, title) {
    var overlay = document.createElement('div');
    overlay.className = 'image-preview-overlay';
    overlay.innerHTML =
      '<div class="image-preview-header">' +
        '<span class="image-preview-title">' + escapeHtml(title || '') + '</span>' +
        '<span class="image-preview-close">' + MMZ.Icon.render('close', 'line', 18) + '</span>' +
      '</div>' +
      '<img class="image-preview-img" src="' + url + '" />';
    overlay.addEventListener('click', function () {
      overlay.remove();
    });
    document.body.appendChild(overlay);
  }

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return String(str).replace(/"/g, '&quot;');
  }

  return {
    render: render,
    onMount: onMount
  };
})();

</script>

<script>
/**
 * 妈妈装 H5 · 我的
 * 依赖：MMZ.Store, MMZ.Router, MMZ.request, MMZ.config, MMZ.Loading
 *
 * 功能：
 *   - 顶部孩子卡片（头像/昵称/年龄）+ 切换孩子
 *   - 配额卡片（今日剩余次数 / 总次数）
 *   - 功能列表入口：编辑档案、收藏搭配、买入清单、关于我们
 *
 * 接口：
 *   GET /api/quota → { free_total, free_used, free_remaining, is_vip, reset_at }
 *   GET /api/child/list → { children:[{id,name,gender,age,...}] }
 *   GET /api/favorite/list → { total, items:[{id,tryon_id,name,...}] }
 *   GET /api/buylist/list → { total, items:[{id,tryon_id,garment_id,status,...}] }
 */
window.MMZ = window.MMZ || {};

MMZ.Mine = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;

  /** 配额数据 */
  var quotaInfo = null;
  /** 收藏数量 */
  var favoriteCount = 0;
  /** 买入清单数量 */
  var buyCount = 0;

  /**
   * 渲染我的页
   * @returns {string}
   */
  function render() {
    var child = Store.getState().child;
    var hasChild = child && child.id;

    var html = '';
    html += '<div class="page page-mine">';

    // ===== 账号状态条 =====
    var user = Store.getState().user;
    var demoFixed = MMZ.Auth && MMZ.Auth.isDemoFixedAccount && MMZ.Auth.isDemoFixedAccount();
    if (demoFixed) {
      html += '<div class="account-bar account-bar--demo" data-action="account-manage">';
      html += '<span class="account-bar-label">Demo 演示账号</span>';
      html += '<span class="account-bar-name">' + escapeHtml((user && user.nickname) || '共用演示') + '</span>';
      html += '<span class="account-bar-id">' + (user && user.id ? 'ID ' + user.id : '') + '</span>';
      html += '<span class="account-bar-arrow">›</span>';
      html += '</div>';
    } else if (user && user.id) {
      html += '<div class="account-bar" data-action="account-manage">';
      html += '<span class="account-bar-label">已登录</span>';
      html += '<span class="account-bar-name">' + escapeHtml(user.nickname || '妈妈用户') + '</span>';
      html += '<span class="account-bar-id">ID ' + user.id + '</span>';
      html += '<span class="account-bar-arrow">›</span>';
      html += '</div>';
    } else {
      html += '<div class="account-bar account-bar--guest" data-action="account-manage">';
      html += '<span class="account-bar-label">未登录</span>';
      html += '<span class="account-bar-action">点击登录 / 找回账号</span>';
      html += '<span class="account-bar-arrow">›</span>';
      html += '</div>';
    }

    // ===== 孩子卡片 =====
    if (hasChild) {
      var photoUrl = child.avatar_url || child.standard_photo_processed_url || child.standard_photo_url;
      var avatar = photoUrl ? imgUrl(photoUrl) : '';
      var avatarStyle = avatar ? ' style="background-image:url(' + avatar + ')"' : '';
      html +=
        '<div class="profile-card" data-action="edit-child">' +
          '<div class="profile-avatar"' + avatarStyle + '></div>' +
          '<div class="profile-info">' +
            '<div class="profile-name">' + escapeHtml(child.name || '小宝') + '</div>' +
            '<div class="profile-meta">' + formatChildMeta(child) + '</div>' +
          '</div>' +
          '<div class="profile-arrow">›</div>' +
        '</div>';
    } else {
      html +=
        '<div class="profile-card profile-card-empty" data-action="add-child">' +
          '<div class="profile-avatar"></div>' +
          '<div class="profile-info">' +
            '<div class="profile-name">添加宝贝档案</div>' +
          '</div>' +
          '<div class="profile-arrow">›</div>' +
        '</div>';
    }

    // ===== 配额卡片 =====
    html += '<div class="quota-card">';
    if (quotaInfo) {
      var used = quotaInfo.free_used || 0;
      var total = quotaInfo.free_total || 3;
      var remaining = quotaInfo.is_vip ? '不限' : String(Math.max(0, total - used));
      html +=
        '<div class="quota-row">' +
          '<div class="quota-label">今日免费次数</div>' +
          '<div class="quota-value">' + remaining + '</div>' +
        '</div>' +
        '<div class="quota-bar">' +
          '<div class="quota-bar-fill" style="width:' + quotaPercent(used, total, quotaInfo.is_vip) + '%"></div>' +
        '</div>';
      if (!quotaInfo.is_vip && quotaInfo.reset_at) {
        html += '<div class="quota-reset">次日 ' + formatTime(quotaInfo.reset_at) + ' 重置</div>';
      }
    } else {
      html += '<div class="quota-row"><div class="quota-label">今日免费次数</div><div class="quota-value">--</div></div>';
    }
    html += '</div>';

    // ===== 功能列表 =====
    html += '<div class="mine-menu">';
    html += renderMenuItem('account-manage', MMZ.Icon.render('mine', 'line', 22), '账号与登录', '');
    html += renderMenuItem('edit-child', MMZ.Icon.render('edit', 'line', 22), '编辑宝贝档案', '');
    html += renderMenuItem('favorites', MMZ.Icon.render('star', 'line', 22), '我的收藏', favoriteCount > 0 ? String(favoriteCount) : '');
    html += renderMenuItem('go-album', MMZ.Icon.render('photo', 'line', 22), '相册', '');
    html += renderMenuItem('go-aid-liked', MMZ.Icon.render('heart', 'line', 22), '我的点赞', '');
    html += renderMenuItem('buylist', MMZ.Icon.render('cart', 'line', 22), '买入清单', buyCount > 0 ? String(buyCount) : '');
    html += renderMenuItem('about', MMZ.Icon.render('info', 'line', 22), '关于妈妈装', '');
    html += '</div>';

    html += '</div>';
    return html;
  }

  /**
   * 渲染菜单项
   */
  function renderMenuItem(action, icon, label, badge) {
    var badgeHtml = badge ? '<span class="mine-badge">' + badge + '</span>' : '';
    return (
      '<div class="mine-menu-item" data-action="' + action + '">' +
        '<span class="mine-menu-icon">' + icon + '</span>' +
        '<span class="mine-menu-label">' + label + '</span>' +
        badgeHtml +
        '<span class="mine-menu-arrow">›</span>' +
      '</div>'
    );
  }

  /**
   * 页面挂载：加载数据 + 绑定事件
   */
  function onMount() {
    var openBuylist = Store.getState().mineOpenBuylist;
    if (openBuylist) {
      Store.setState({ mineOpenBuylist: false });
    }

    loadQuota();
    loadChildren();
    loadFavoriteCount();
    loadBuyCount(openBuylist);
    bindEvents();
  }

  /**
   * 加载配额
   */
  function loadQuota() {
    request.get('/api/quota').then(function (data) {
      quotaInfo = data;
      refreshQuotaCard();
    }).catch(function () {
      // 静默失败，卡片显示 --
    });
  }

  /**
   * 加载孩子列表
   */
  function loadChildren() {
    request.get('/api/child/list').then(function (data) {
      var children = (data && data.children) || [];
      Store.setState({ childList: children });
      // 如果列表有孩子但当前 Store 没有选中，自动选第一个
      var cur = Store.getState().child;
      if ((!cur || !cur.id) && children.length > 0) {
        var normalized = normalizeChild(children[0]);
        Store.setState({ child: normalized });
        localStorage.setItem(config.CHILD_ID_KEY, String(children[0].id));
        localStorage.setItem(config.CHILD_CACHE_KEY, JSON.stringify(normalized));
      }
    }).catch(function () {
      // 静默
    });
  }

  /**
   * 加载收藏数量
   */
  function loadFavoriteCount() {
    request.get('/api/favorite/list').then(function (data) {
      favoriteCount = (data && data.total) || 0;
      Store.setState({ favoriteList: (data && data.items) || [] });
      updateBadge('favorites', favoriteCount);
    }).catch(function () {});
  }

  /**
   * 加载买入清单数量
   */
  function loadBuyCount(autoOpen) {
    request.get('/api/buylist/list').then(function (data) {
      buyCount = (data && data.total) || 0;
      Store.setState({ buyList: (data && data.items) || [] });
      updateBadge('buylist', buyCount);
      if (autoOpen) {
        showBuyList();
      }
    }).catch(function () {});
  }

  /**
   * 绑定事件
   */
  function bindEvents() {
    var app = document.getElementById('app');
    if (!app) return;

    var clickHandler = function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'edit-child':
        case 'add-child':
          Router.navigate('register');
          break;
        case 'favorites':
          showFavoriteList();
          break;
        case 'go-album':
          Router.navigate('album');
          break;
        case 'go-aid-liked':
          // 进入爱搭页-我的点赞
          Store.setState({ aidTab: 'liked' });
          Router.navigate('aid');
          break;
        case 'buylist':
          showBuyList();
          break;
        case 'about':
          Loading.toast('妈妈装 v1.0 · AI 儿童虚拟试衣');
          break;
        case 'account-manage':
          if (MMZ.Auth && MMZ.Auth.showAccountModal) {
            MMZ.Auth.showAccountModal();
          } else {
            Loading.toast('账号模块未加载');
          }
          break;
        default:
          break;
      }
    };
    window.MMZ._pageClickHandler = clickHandler;
    app.addEventListener('click', clickHandler);
  }

  /**
   * 显示收藏列表（可点击查看试穿效果）
   */
  function showFavoriteList() {
    request.get('/api/favorite/list').then(function (data) {
      var favs = (data && data.items) || [];
      favoriteCount = (data && data.total) || favs.length;
      Store.setState({ favoriteList: favs });
      updateBadge('favorites', favoriteCount);

      if (favs.length === 0) {
        Loading.toast('暂无收藏');
        return;
      }

      var html = '<div class="list-popup">';
      html += '<div class="list-popup-header"><span>我的收藏</span><span class="list-popup-close">' + MMZ.Icon.render('close', 'line', 18) + '</span></div>';
      html += '<div class="list-popup-body">';
      favs.forEach(function (f) {
        var thumb = imgUrl(f.result_image_url || f.scene_image_url || '');
        var label = f.name || ('试穿 #' + f.tryon_id);
        var scene = f.scene ? (' · ' + f.scene) : '';
        html +=
          '<div class="list-popup-item list-popup-item-clickable" data-action="open-favorite-tryon" data-tryon-id="' + f.tryon_id + '">' +
            (thumb ? '<div class="list-popup-thumb" style="background-image:url(' + thumb + ')"></div>' : '') +
            '<div class="list-popup-item-text">' +
              '<div class="list-popup-item-title">' + escapeHtml(label) + '</div>' +
              (scene ? '<div class="list-popup-item-sub">' + escapeHtml(scene.replace(/^ · /, '')) + '</div>' : '') +
            '</div>' +
            '<span class="list-popup-arrow">›</span>' +
          '</div>';
      });
      html += '</div></div>';

      var overlay = document.createElement('div');
      overlay.className = 'image-preview-overlay';
      overlay.innerHTML = html;
      overlay.addEventListener('click', function (e) {
        if (e.target.closest('.list-popup-close') || e.target === overlay) {
          overlay.remove();
          return;
        }
        var item = e.target.closest('[data-action="open-favorite-tryon"]');
        if (item) {
          openFavoriteTryon(item.getAttribute('data-tryon-id'));
          overlay.remove();
        }
      });
      document.body.appendChild(overlay);
    }).catch(function () {
      Loading.toast('加载收藏失败');
    });
  }

  function openFavoriteTryon(tryonId) {
    if (!tryonId) return;
    var favs = Store.getState().favoriteList || [];
    var fav = null;
    var i;
    for (i = 0; i < favs.length; i++) {
      if (String(favs[i].tryon_id) === String(tryonId)) {
        fav = favs[i];
        break;
      }
    }
    if (!fav) {
      Loading.toast('收藏记录不存在');
      return;
    }
    if (fav.status === 'failed') {
      Loading.toast('试穿记录不可用');
      return;
    }
    var resultUrl = fav.result_image_url || fav.scene_image_url || '';
    if (!resultUrl) {
      Loading.toast('暂无试穿效果图，请重新试穿后再收藏');
      return;
    }
    Store.setState({
      tryon: Object.assign({}, Store.getState().tryon || {}, {
        task_uuid: 'fav_' + tryonId
      }),
      result: {
        loading: false,
        progress: 100,
        tipIndex: 0,
        scene: fav.scene || '',
        demo: !!fav.demo,
        status: 'success',
        tryon_id: fav.tryon_id,
        favorited: true,
        result_url: resultUrl,
        scene_image_url: fav.scene_image_url || resultUrl,
        error_msg: ''
      }
    });
    if (MMZ.DemoBadge) {
      MMZ.DemoBadge.setDemo(!!fav.demo);
    }
    Router.navigate('result');
  }

  /**
   * 显示买入清单（简易弹窗）
   */
  function showBuyList() {
    var buys = Store.getState().buyList || [];
    if (buys.length === 0) {
      Loading.toast('暂无买入清单');
      return;
    }
    var html = '<div class="list-popup">';
    html += '<div class="list-popup-header"><span>买入清单</span><span class="list-popup-close">' + MMZ.Icon.render('close', 'line', 18) + '</span></div>';
    html += '<div class="list-popup-body">';
    buys.forEach(function (b) {
      var statusIcon = b.status === 'bought' ? MMZ.Icon.render('check', 'solid', 16) : (b.status === 'skipped' ? MMZ.Icon.render('arrow_right', 'line', 16) : MMZ.Icon.render('refresh', 'line', 16));
      var statusLabel = statusIcon + ' ' + (b.status === 'bought' ? '已买' : (b.status === 'skipped' ? '已跳过' : '待买'));
      html +=
        '<div class="list-popup-item">' +
          '<span>服装 #' + b.garment_id + '</span>' +
          '<span class="list-popup-status">' + statusLabel + '</span>' +
        '</div>';
    });
    html += '</div></div>';

    var overlay = document.createElement('div');
    overlay.className = 'image-preview-overlay';
    overlay.innerHTML = html;
    overlay.addEventListener('click', function (e) {
      if (e.target.classList.contains('list-popup-close') || e.target === overlay) {
        overlay.remove();
      }
    });
    document.body.appendChild(overlay);
  }

  /**
   * 刷新配额卡片 UI
   */
  function refreshQuotaCard() {
    if (!quotaInfo) return;
    var card = document.querySelector('.quota-card');
    if (!card) return;

    var used = quotaInfo.free_used || 0;
    var total = quotaInfo.free_total || 3;
    var remaining = quotaInfo.is_vip ? '不限' : String(Math.max(0, total - used));

    var html =
      '<div class="quota-row">' +
        '<div class="quota-label">今日免费次数</div>' +
        '<div class="quota-value">' + remaining + '</div>' +
      '</div>' +
      '<div class="quota-bar">' +
        '<div class="quota-bar-fill" style="width:' + quotaPercent(used, total, quotaInfo.is_vip) + '%"></div>' +
      '</div>';

    if (!quotaInfo.is_vip && quotaInfo.reset_at) {
      html += '<div class="quota-reset">次日 ' + formatTime(quotaInfo.reset_at) + ' 重置</div>';
    }

    card.innerHTML = html;
  }

  /**
   * 更新菜单 badge
   */
  function updateBadge(action, count) {
    var item = document.querySelector('[data-action="' + action + '"]');
    if (!item) return;
    var badge = item.querySelector('.mine-badge');
    if (count > 0) {
      if (badge) {
        badge.textContent = count;
      } else {
        var arrow = item.querySelector('.mine-menu-arrow');
        var span = document.createElement('span');
        span.className = 'mine-badge';
        span.textContent = count;
        item.insertBefore(span, arrow);
      }
    } else if (badge) {
      badge.remove();
    }
  }

  /**
   * 格式化孩子信息
   */
  function formatChildMeta(child) {
    var parts = [];
    if (child.age !== undefined && child.age !== null) parts.push(child.age + '岁');
    if (child.gender !== undefined && child.gender !== null) {
      parts.push(child.gender === 1 ? '男孩' : '女孩');
    }
    return parts.join(' · ') || '点击编辑完善信息';
  }

  /**
   * 计算配额百分比
   */
  function quotaPercent(used, total, isVip) {
    if (isVip) return 100;
    if (!total) return 0;
    var pct = (used / total) * 100;
    return Math.min(100, Math.max(0, pct));
  }

  /**
   * 格式化时间（只取时分）
   */
  function formatTime(isoStr) {
    if (!isoStr) return '';
    var parts = isoStr.split('T');
    if (parts.length > 1) {
      return parts[1].substring(0, 5);
    }
    return isoStr;
  }

  /**
   * 将后端 ChildInfo 格式化为 Store.child 格式
   */
  function normalizeChild(raw) {
    return {
      id: raw.id,
      name: raw.name,
      gender: raw.gender,
      age: raw.age,
      height: raw.height,
      weight: raw.weight,
      birthdate: raw.birthdate || '',
      standard_photo_url: raw.standard_photo_url || '',
      standard_photo_processed_url: raw.standard_photo_processed_url || '',
      avatar_url: raw.avatar_url || ''
    };
  }

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  return {
    render: render,
    onMount: onMount
  };
})();

</script>

<script>
/**
 * 妈妈装 H5 · 帖子卡片组件（纯渲染，无状态）
 * 依赖：MMZ.config
 *
 * 职责：
 *   暴露 render(post, opts) → 返回瀑布流卡片 HTML 字符串
 *
 * 字段映射（与后端 PostListItem 对齐）：
 *   { id, image_url, description, tags:[], anonymous_name, like_count, is_liked, created_at }
 *
 * 渲染结构：
 *   <div class="post-card" data-action="open-post" data-post-id="xx">
 *     <div class="post-card-cover" style="background-image:url(...)"></div>
 *     <div class="post-card-desc">描述（2 行省略）</div>
 *     <div class="post-card-tags">[标签1][标签2]</div>
 *     <div class="post-card-footer">
 *       <span class="post-card-author">小苹果妈妈</span>
 *       <span class="post-card-likes {liked}">[heart-icon] 128</span>
 *     </div>
 *   </div>
 *
 * opts.deletable = true 时，右上角追加删除按钮
 */
window.MMZ = window.MMZ || {};

MMZ.PostCard = (function () {
  'use strict';

  var config = MMZ.config;

  /**
   * 渲染帖子卡片
   * @param {object} post - 帖子对象
   * @param {object} [opts] - 可选配置 { deletable: boolean }
   * @returns {string} HTML 字符串
   */
  function render(post, opts) {
    if (!post) return '';
    opts = opts || {};

    var id = post.id || '';
    var img = imgUrl(post.image_url);
    var desc = escapeHtml(post.description || '');
    var tags = post.tags || [];
    var author = escapeHtml(post.author_name || post.anonymous_name || '神秘宝妈');
    var likes = post.like_count || 0;
    var liked = post.is_liked ? ' liked' : '';

    var html = '';
    html += '<div class="post-card" data-action="open-post" data-post-id="' + id + '">';

    // 删除按钮（仅"我的"Tab）
    if (opts.deletable) {
      html += '<div class="post-card-delete" data-action="delete-post" data-id="' + id + '" data-post-id="' + id + '">' + MMZ.Icon.render('trash', 'line', 16) + '</div>';
    }

    // 封面图（CSS url 需加引号，避免特殊字符导致加载失败）
    html += '<div class="post-card-cover" style="background-image:url(\'' + escapeAttr(img) + '\')"></div>';

    // 描述（最多2行）
    if (desc) {
      html += '<div class="post-card-desc">' + desc + '</div>';
    }

    // 标签（最多显示前2个）
    if (tags.length > 0) {
      html += '<div class="post-card-tags">';
      var showCount = Math.min(tags.length, 2);
      for (var i = 0; i < showCount; i++) {
        html += '<span class="post-card-tag">' + escapeHtml(tags[i]) + '</span>';
      }
      html += '</div>';
    }

    // 底栏：作者 + 点赞数
    html += '<div class="post-card-footer">';
    html += '<span class="post-card-author">' + author + '</span>';
    html += '<span class="post-card-likes' + liked + '">' + MMZ.Icon.render('heart', 'line', 14) + ' ' + likes + '</span>';
    html += '</div>';

    html += '</div>';
    return html;
  }

  // ===== 工具函数 =====

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeAttr(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/'/g, '&#39;')
      .replace(/"/g, '&quot;');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  return {
    render: render
  };
})();

</script>

<!-- components/share_modal.js -->
<script>
/**
 * 妈妈装 H5 · 分享弹层组件（不走 hash 路由）
 * 依赖：MMZ.Store, MMZ.Router, MMZ.request, MMZ.config, MMZ.Loading
 *
 * 职责：
 *   监听 Store.state.shareModal.show → 在 document.body 上渲染/移除分享 overlay
 *
 * 弹层结构：
 *   顶部 Tab 切换：试穿记录 / 上传照片
 *   - 试穿记录 Tab：横滑卡片选择 + 穿搭描述 + 风格标签 + 匿名昵称 + 提交
 *   - 上传照片 Tab：图片上传控件 + 穿搭描述 + 风格标签 + 匿名昵称 + 提交
 *
 * 接口：
 *   GET  /api/tryon/records                       → { items:[{id,image_url,scene,created_at}] }
 *   GET  /api/user/anonymous-name?refresh=true    → { anonymous_name }
 *   POST /api/posts/share      { tryon_id, description, tags } → { post_id, image_url, author_name }
 *   POST /api/posts/share-upload (multipart)      → { post_id, image_url, author_name }
 */
window.MMZ = window.MMZ || {};

MMZ.ShareModal = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;

  /** 预定义标签 */
  var SHARE_TAGS = ['防晒', '国风', '亲子', '街头', '北欧', '运动', '清凉', '公主', 'IP联名', '度假', '功能性', '甜美'];

  /** 弹层 DOM 元素 */
  var overlayEl = null;

  /** 是否已初始化 */
  var initialized = false;

  /** 当前 Tab：'record' | 'upload' */
  var currentTab = 'record';

  /** 选中的试穿记录 ID */
  var selectedTryonId = null;

  /** 可分享的试穿记录列表 */
  var shareableRecords = [];

  /** 上传的照片预览 URL（data URL） */
  var uploadedPreviewUrl = null;

  /** 上传的照片二进制（File 对象） */
  var uploadedFile = null;

  /** 当前匿名昵称 */
  var anonymousName = '';

  /** 已选标签 */
  var selectedTags = [];

  /**
   * 初始化组件（app.js 启动时调用一次）
   * 注册 Store 监听，当 shareModal.show 变化时触发渲染
   */
  function init() {
    if (initialized) return;
    initialized = true;

    Store.subscribe(function (state) {
      var sm = state.shareModal;
      if (!sm) return;

      if (sm.show) {
        // 打开弹层
        if (!overlayEl) {
          // 重置状态
          currentTab = 'record';
          selectedTryonId = sm.tryonId || null;
          selectedTags = [];
          shareableRecords = [];
          uploadedPreviewUrl = null;
          uploadedFile = null;
          anonymousName = '';

          renderOverlay();
          loadData();
        }
      } else {
        // 关闭弹层
        removeOverlay();
      }
    });
  }

  /**
   * 渲染弹层骨架到 document.body
   */
  function renderOverlay() {
    removeOverlay();

    var html = '';
    html += '<div class="share-modal-overlay" id="shareModalOverlay">';
    html += '<div class="share-modal-mask" data-action="close-share"></div>';
    html += '<div class="share-modal-panel">';

    // 标题 + 关闭
    html += '<div class="share-modal-header">';
    html += '<div class="share-modal-title">分享到爱搭（匿名）</div>';
    html += '<div class="share-modal-close" data-action="close-share">' + MMZ.Icon.render('close', 'line', 18) + '</div>';
    html += '</div>';

    // 内容区（骨架，加载后填充）
    html += '<div class="share-modal-body" id="shareModalBody">';
    html += '<div class="share-modal-loading">加载中…</div>';
    html += '</div>';

    html += '</div>'; // .share-modal-panel
    html += '</div>'; // .share-modal-overlay

    var temp = document.createElement('div');
    temp.innerHTML = html;
    overlayEl = temp.firstElementChild;
    document.body.appendChild(overlayEl);

    bindOverlayEvents();
  }

  /**
   * 渲染弹层完整内容
   */
  function renderBody() {
    var body = overlayEl ? overlayEl.querySelector('#shareModalBody') : null;
    if (!body) return;

    var html = '';

    // ===== 顶部 Tab 切换 =====
    html += '<div class="share-tab-bar">';
    html += '<div class="share-tab' + (currentTab === 'record' ? ' active' : '') + '" data-action="switch-share-tab" data-tab="record">试穿记录</div>';
    html += '<div class="share-tab' + (currentTab === 'upload' ? ' active' : '') + '" data-action="switch-share-tab" data-tab="upload">上传照片</div>';
    html += '</div>';

    if (currentTab === 'record') {
      html += renderRecordTab();
    } else {
      html += renderUploadTab();
    }

    // ===== 穿搭描述 =====
    html += '<div class="share-section">';
    html += '<div class="share-section-label">穿搭描述</div>';
    html += '<textarea class="share-textarea" id="shareDescription" maxlength="50" placeholder="说说这套穿搭的亮点吧～（最多50字）"></textarea>';
    html += '<div class="share-char-count"><span id="shareCharCount">0</span>/50</div>';
    html += '</div>';

    // ===== 风格标签 =====
    html += '<div class="share-section">';
    html += '<div class="share-section-label">风格标签（最多选3个）</div>';
    html += '<div class="share-tag-list">';
    SHARE_TAGS.forEach(function (tag) {
      var isSelected = selectedTags.indexOf(tag) > -1;
      html += '<span class="share-tag' + (isSelected ? ' selected' : '') + '" data-action="toggle-tag" data-tag="' + escapeAttr(tag) + '">' + tag + '</span>';
    });
    html += '</div>';
    html += '</div>';

    // ===== 匿名昵称 =====
    html += '<div class="share-section">';
    html += '<div class="share-section-label">匿名昵称</div>';
    html += '<div class="share-name-row">';
    html += '<span class="share-name-value">' + escapeHtml(anonymousName || '神秘宝妈') + '</span>';
    html += '<button class="share-name-refresh" data-action="refresh-name">换一个</button>';
    html += '</div>';
    html += '</div>';

    // ===== 操作按钮 =====
    html += '<div class="share-modal-actions">';
    html += '<button class="btn-secondary" data-action="close-share">取消</button>';
    html += '<button class="btn-primary" data-action="submit-share">分享</button>';
    html += '</div>';

    body.innerHTML = html;

    // 绑定 textarea 字数统计
    var textarea = body.querySelector('#shareDescription');
    if (textarea) {
      textarea.addEventListener('input', function () {
        var countEl = body.querySelector('#shareCharCount');
        if (countEl) {
          countEl.textContent = String(textarea.value.length);
        }
      });
    }
  }

  /**
   * 渲染试穿记录 Tab 内容
   */
  function renderRecordTab() {
    var html = '';
    html += '<div class="share-section">';
    html += '<div class="share-section-label">选择试穿记录</div>';
    html += '<div class="share-record-scroll" id="shareRecordScroll">';
    if (shareableRecords.length === 0) {
      html += '<div class="share-record-empty">暂无可分享的试穿记录，去试衣间生成一张吧～</div>';
    } else {
      shareableRecords.forEach(function (rec) {
        var isSelected = selectedTryonId === rec.id;
        var img = imgUrl(rec.image_url);
        html +=
          '<div class="share-record-card' + (isSelected ? ' selected' : '') + '" data-action="select-record" data-tryon-id="' + rec.id + '">' +
            '<div class="share-record-cover" style="background-image:url(' + img + ')"></div>' +
            '<div class="share-record-scene">' + escapeHtml(rec.scene || '') + '</div>' +
          '</div>';
      });
    }
    html += '</div>';
    html += '</div>';
    return html;
  }

  /**
   * 渲染上传照片 Tab 内容
   */
  function renderUploadTab() {
    var html = '';
    html += '<div class="share-section">';
    html += '<div class="share-section-label">上传穿搭照片</div>';
    html += '<div class="share-upload-area" id="shareUploadArea">';
    if (uploadedPreviewUrl) {
      html += '<div class="share-upload-preview" style="background-image:url(' + uploadedPreviewUrl + ')">';
      html += '<div class="share-upload-replace" data-action="trigger-upload">重新选择</div>';
      html += '</div>';
    } else {
      html += '<div class="share-upload-placeholder">';
      html += '<div class="share-upload-icon">' + MMZ.Icon.render('camera', 'line', 40) + '</div>';
      html += '<div class="share-upload-text">点击上传穿搭照片</div>';
      html += '<div class="share-upload-hint">支持 JPG / PNG / WebP</div>';
      html += '</div>';
    }
    html += '<input type="file" id="shareFileInput" accept="image/*" style="display:none">';
    html += '</div>';
    html += '</div>';
    return html;
  }

  // ===== 数据加载 =====

  /**
   * 加载初始数据
   * GET /api/tryon/records + GET /api/user/anonymous-name
   */
  function loadData() {
    // 加载可分享的试穿记录
    request.get('/api/tryon/records').then(function (data) {
      shareableRecords = (data && data.items) || [];

      // 默认选第一个
      if (!selectedTryonId && shareableRecords.length > 0) {
        selectedTryonId = shareableRecords[0].id;
      }

      renderBody();
    }).catch(function (err) {
      var body = overlayEl ? overlayEl.querySelector('#shareModalBody') : null;
      if (body) {
        body.innerHTML = '<div class="share-modal-loading">加载失败：' + escapeHtml(err.message) + '</div>';
      }
    });

    // 加载匿名昵称
    request.get('/api/user/anonymous-name').then(function (data) {
      anonymousName = (data && data.anonymous_name) || '神秘宝妈';
      renderBody();
    }).catch(function () {
      anonymousName = '神秘宝妈';
    });
  }

  /**
   * 换一个匿名昵称
   * GET /api/user/anonymous-name?refresh=true
   */
  function refreshName() {
    request.get('/api/user/anonymous-name?refresh=true').then(function (data) {
      anonymousName = (data && data.anonymous_name) || '神秘宝妈';
      renderBody();
    }).catch(function (err) {
      Loading.toast(err.message);
    });
  }

  // ===== 交互处理 =====

  /**
   * 切换 Tab
   * @param {string} tab 'record' | 'upload'
   */
  function switchTab(tab) {
    currentTab = tab;
    renderBody();
  }

  /**
   * 选择试穿记录
   * @param {number} tryonId
   */
  function selectRecord(tryonId) {
    selectedTryonId = tryonId;
    // 更新选中态
    var cards = overlayEl ? overlayEl.querySelectorAll('.share-record-card') : [];
    cards.forEach(function (card) {
      var cardId = parseInt(card.getAttribute('data-tryon-id'), 10);
      card.classList.toggle('selected', cardId === tryonId);
    });
  }

  /**
   * 触发文件选择
   */
  function triggerUpload() {
    var input = overlayEl ? overlayEl.querySelector('#shareFileInput') : null;
    if (input) {
      input.click();
    }
  }

  /**
   * 处理文件选择
   * @param {Event} e
   */
  function handleFileSelect(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;

    // 校验类型
    if (!file.type.startsWith('image/')) {
      Loading.toast('请选择图片文件');
      return;
    }

    // 校验大小（10MB）
    if (file.size > 10 * 1024 * 1024) {
      Loading.toast('图片大小不能超过 10MB');
      return;
    }

    uploadedFile = file;

    // 生成预览
    var reader = new FileReader();
    reader.onload = function (ev) {
      uploadedPreviewUrl = ev.target.result;
      renderBody();
    };
    reader.readAsDataURL(file);
  }

  /**
   * 切换标签选中态
   * @param {string} tag
   */
  function toggleTag(tag) {
    var idx = selectedTags.indexOf(tag);
    if (idx > -1) {
      // 取消选中
      selectedTags.splice(idx, 1);
    } else {
      // 选中：检查上限
      if (selectedTags.length >= 3) {
        Loading.toast('最多选择3个标签');
        return;
      }
      selectedTags.push(tag);
    }

    // 更新 UI
    var tagEls = overlayEl ? overlayEl.querySelectorAll('.share-tag') : [];
    tagEls.forEach(function (el) {
      var elTag = el.getAttribute('data-tag');
      el.classList.toggle('selected', selectedTags.indexOf(elTag) > -1);
    });
  }

  /**
   * 提交分享
   */
  function submitShare() {
    var descEl = overlayEl ? overlayEl.querySelector('#shareDescription') : null;
    var description = descEl ? descEl.value.trim() : '';
    if (description.length > 50) {
      Loading.toast('描述不能超过50字');
      return;
    }

    if (currentTab === 'record') {
      // 试穿记录分享
      if (!selectedTryonId) {
        Loading.toast('请先选择一条试穿记录');
        return;
      }

      Loading.show('正在分享…');
      request.post('/api/posts/share', {
        tryon_id: selectedTryonId,
        description: description,
        tags: selectedTags
      }).then(function (data) {
        Loading.hide();
        Loading.toast('分享成功，等大家来点赞～');
        closeShare();
        refreshMineList();
      }).catch(function (err) {
        Loading.hide();
        if (err.message && err.message.indexOf('已经分享') > -1) {
          Loading.toast('这条试穿记录已经分享过了');
        } else {
          Loading.toast(err.message);
        }
      });
    } else {
      // 上传照片分享
      if (!uploadedFile) {
        Loading.toast('请先上传一张穿搭照片');
        return;
      }

      // 构造 FormData
      var formData = new FormData();
      formData.append('file', uploadedFile);
      formData.append('description', description);
      if (selectedTags.length > 0) {
        formData.append('tags', selectedTags.join(','));
      }

      Loading.show('正在上传…');
      request.post('/api/posts/share-upload', null, { formData: formData }).then(function (res) {
        Loading.hide();
        Loading.toast('分享成功，等大家来点赞～');
        closeShare();
        refreshMineList();
      }).catch(function (err) {
        Loading.hide();
        Loading.toast(err.message || '分享失败');
      });
    }
  }

  /**
   * 关闭弹层后刷新"我的"列表
   */
  function refreshMineList() {
    var aidTab = Store.getState().aidTab;
    if (aidTab === 'mine') {
      Store.setState({ myPostList: [] });
    }
  }

  /**
   * 关闭弹层
   */
  function closeShare() {
    Store.setState({
      shareModal: { show: false, tryonId: null }
    });
  }

  /**
   * 移除弹层
   */
  function removeOverlay() {
    if (overlayEl && overlayEl.parentNode) {
      overlayEl.parentNode.removeChild(overlayEl);
    }
    overlayEl = null;
  }

  // ===== 事件绑定 =====

  /**
   * 绑定弹层事件（直接绑定在 overlay 上）
   */
  function bindOverlayEvents() {
    if (!overlayEl) return;

    overlayEl.addEventListener('click', function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'close-share':
          closeShare();
          break;
        case 'switch-share-tab':
          var tab = target.getAttribute('data-tab');
          switchTab(tab);
          break;
        case 'select-record':
          var tryonId = parseInt(target.getAttribute('data-tryon-id'), 10);
          selectRecord(tryonId);
          break;
        case 'trigger-upload':
          triggerUpload();
          break;
        case 'toggle-tag':
          var tag = target.getAttribute('data-tag');
          toggleTag(tag);
          break;
        case 'refresh-name':
          refreshName();
          break;
        case 'submit-share':
          submitShare();
          break;
        default:
          break;
      }
    });

    // 文件选择 change 事件（change 不冒泡到 closest，需单独绑定）
    overlayEl.addEventListener('change', function (e) {
      if (e.target && e.target.id === 'shareFileInput') {
        handleFileSelect(e);
      }
    });
  }

  // ===== 工具函数 =====

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return String(str).replace(/"/g, '&quot;');
  }

  return {
    init: init
  };
})();

</script>

<!-- pages/aid.js -->
<script>
/**
 * 妈妈装 H5 · 爱搭社区页
 * 依赖：MMZ.Store, MMZ.Router, MMZ.request, MMZ.config, MMZ.Loading, MMZ.PostCard
 *
 * 功能：
 *   - 子 Tab 切换：社区（hot）/ 我的（mine）/ 我的点赞（liked）
 *   - 社区 Tab：标签筛选 + 双列瀑布流 + 上拉加载更多 + 下拉刷新
 *   - 我的 Tab：分享按钮 + 我的帖子网格（可删除）+ 空态引导
 *   - 我的点赞：点赞过的帖子列表
 *
 * 接口：
 *   GET    /api/posts/list?page=1&size=10&tag=   → { items, total, page, has_more }
 *   GET    /api/posts/mine                       → { items, total }
 *   GET    /api/posts/liked                      → { items, total }
 *   DELETE /api/posts/{id}                       → { id }
 *
 * 事件：
 *   switch-tab / filter-tag / open-post / open-share / delete-post / go-tryon
 *
 * aidTab 取值约定（T08 定型）：
 *   'hot'   → 社区瀑布流（按 like_count 倒序）
 *   'mine'  → 我的分享列表
 *   'liked' → 我的点赞列表
 */
window.MMZ = window.MMZ || {};

MMZ.Aid = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;
  var PostCard = MMZ.PostCard;

  /** 预定义标签（与首页/分享弹层一致） */
  var TAG_LIST = ['全部', '防晒', '国风', '亲子', '街头', '北欧', '运动', '清凉', '公主', '度假', '甜美'];

  /** 是否正在加载（防抖） */
  var loading = false;

  /** 上拉加载节流 timer */
  var scrollTimer = null;

  /** 下拉刷新相关 */
  var touchStartY = 0;
  var pullDistance = 0;
  var isPulling = false;

  /**
   * 主 Tab 栏（小红书风：文字 + 短下划线）
   */
  function renderMainTabs(aidTab) {
    var html = '<div class="xhs-main-tabs" id="aidMainTabs">';
    html += '<div class="xhs-main-tab' + (aidTab === 'hot' ? ' active' : '') + '" data-action="switch-tab" data-tab="hot">社区</div>';
    html += '<div class="xhs-main-tab' + (aidTab === 'mine' ? ' active' : '') + '" data-action="switch-tab" data-tab="mine">我的</div>';
    html += '<div class="xhs-main-tab' + (aidTab === 'liked' ? ' active' : '') + '" data-action="switch-tab" data-tab="liked">点赞</div>';
    html += '</div>';
    return html;
  }

  /**
   * 二级栏：社区=Tag 筛选；我的=发布按钮；点赞=无
   */
  function renderSubBar(aidTab) {
    if (aidTab === 'hot') {
      return renderTagBar();
    }
    if (aidTab === 'mine') {
      return (
        '<div class="xhs-sub-toolbar" id="aidSubBar">' +
          '<span class="xhs-sub-toolbar-meta">我的分享</span>' +
          '<button type="button" class="xhs-capsule-btn" data-action="open-share">发布</button>' +
        '</div>'
      );
    }
    return '<div class="xhs-sub-toolbar xhs-sub-toolbar--compact" id="aidSubBar"></div>';
  }

  /**
   * Tag 筛选条（仅社区 Tab）
   */
  function renderTagBar() {
    var currentTag = Store.getState().postTagFilter || '';
    var html = '<div class="xhs-filter-bar aid-filter-bar" id="aidSubBar">';
    TAG_LIST.forEach(function (tag) {
      var isActive = (tag === '全部' && !currentTag) || tag === currentTag;
      html +=
        '<div class="xhs-filter-chip' + (isActive ? ' active' : '') + '" data-action="filter-tag" data-tag="' +
        (tag === '全部' ? '' : tag) + '">' + tag + '</div>';
    });
    html += '</div>';
    return html;
  }

  function refreshTagBarActive() {
    var currentTag = Store.getState().postTagFilter || '';
    var chips = document.querySelectorAll('#aidSubBar .xhs-filter-chip');
    chips.forEach(function (el) {
      var tag = el.getAttribute('data-tag') || '';
      el.classList.toggle('active', tag === currentTag);
    });
  }

  /**
   * 渲染爱搭页
   */
  function render() {
    var aidTab = Store.getState().aidTab || 'hot';

    var html = '';
    html += '<div class="page page-aid">';
    html += '<div class="xhs-sticky-head aid-sticky-head">';
    html += renderMainTabs(aidTab);
    html += renderSubBar(aidTab);
    html += '</div>';
    html += '<div class="aid-content" id="aidContent">';
    html += renderContentBody(aidTab);
    html += '</div>';
    html += '</div>';
    return html;
  }

  /**
   * 渲染内容区（不含顶部导航）
   */
  function renderContentBody(aidTab) {
    switch (aidTab) {
      case 'hot':
        return renderHotBody();
      case 'mine':
        return renderMineBody();
      case 'liked':
        return renderLikedBody();
      default:
        return renderHotBody();
    }
  }

  /**
   * 社区 Tab 内容（瀑布流）
   */
  function renderHotBody() {
    var state = Store.getState();
    var posts = state.postList || [];

    var html = '';
    html += '<div class="post-waterfall" id="postWaterfall">';
    if (posts.length === 0) {
      html += '<div class="aid-empty">';
      html += '<div class="aid-empty-icon">' + MMZ.Icon.render('empty_bag', 'line', 48) + '</div>';
      html += '<div class="aid-empty-text">还没有人分享穿搭</div>';
      html += '<div class="aid-empty-desc">来第一个分享吧～</div>';
      html += '</div>';
    } else {
      posts.forEach(function (p) {
        html += PostCard.render(p);
      });
    }
    html += '</div>';

    // 加载更多 / 没有更多
    if (posts.length > 0) {
      if (state.postHasMore) {
        html += '<div class="aid-load-more" id="aidLoadMore">上拉加载更多…</div>';
      } else {
        html += '<div class="aid-load-more aid-no-more">没有更多了</div>';
      }
    }

    return html;
  }

  /**
   * 我的 Tab 内容
   */
  function renderMineBody() {
    var myPosts = Store.getState().myPostList || [];

    var html = '';

    if (myPosts.length === 0) {
      html += '<div class="aid-empty">';
      html += '<div class="aid-empty-icon">' + MMZ.Icon.render('empty_camera', 'line', 48) + '</div>';
      html += '<div class="aid-empty-text">你还没有分享过穿搭</div>';
      html += '<div class="aid-empty-desc">试穿后点击「分享到爱搭」即可</div>';
      html += '<button class="btn-secondary" data-action="go-tryon">去试衣间</button>';
      html += '</div>';
    } else {
      html += '<div class="post-waterfall post-waterfall-mine">';
      myPosts.forEach(function (p) {
        html += PostCard.render(p, { deletable: true });
      });
      html += '</div>';
    }

    return html;
  }

  /**
   * 点赞 Tab 内容
   */
  function renderLikedBody() {
    var likedPosts = Store.getState().likedPostList || [];

    var html = '';

    if (likedPosts.length === 0) {
      html += '<div class="aid-empty">';
      html += '<div class="aid-empty-icon">' + MMZ.Icon.render('broken_heart', 'line', 48) + '</div>';
      html += '<div class="aid-empty-text">还没有点赞过任何穿搭</div>';
      html += '<div class="aid-empty-desc">去社区看看大家的分享吧～</div>';
      html += '</div>';
    } else {
      html += '<div class="post-waterfall">';
      likedPosts.forEach(function (p) {
        html += PostCard.render(p);
      });
      html += '</div>';
    }

    return html;
  }

  // ===== 页面挂载 =====

  /**
   * 页面挂载：加载数据 + 绑定事件
   */
  function onMount() {
    var aidTab = Store.getState().aidTab || 'hot';
    loadTabData(aidTab);
    bindEvents();
    bindScrollLoad();
  }

  /**
   * 清理：移除滚动监听
   */
  function cleanup() {
    var screen = document.getElementById('app');
    if (screen && scrollTimer) {
      // 节流 timer 由 clearInterval 处理
      clearTimeout(scrollTimer);
      scrollTimer = null;
    }
  }

  /**
   * 加载对应 Tab 的数据
   * @param {string} aidTab
   */
  function loadTabData(aidTab) {
    loading = true;
    switch (aidTab) {
      case 'hot':
        // 重置分页
        Store.setState({
          postPage: 1,
          postHasMore: true,
          postList: [],
          postTagFilter: Store.getState().postTagFilter || ''
        });
        loadPosts(true);
        break;
      case 'mine':
        loadMyPosts();
        break;
      case 'liked':
        loadLikedPosts();
        break;
      default:
        loadPosts(true);
        break;
    }
  }

  /**
   * 加载社区帖子列表
   * GET /api/posts/list?page=1&size=10&tag=
   * @param {boolean} isRefresh - 是否下拉刷新（重置 page=1）
   */
  function loadPosts(isRefresh) {
    var state = Store.getState();
    var page = isRefresh ? 1 : (state.postPage || 1);
    var tag = state.postTagFilter || '';
    var size = 10;

    var url = '/api/posts/list?page=' + page + '&size=' + size;
    if (tag) {
      url += '&tag=' + encodeURIComponent(tag);
    }

    loading = true;

    request.get(url).then(function (data) {
      var items = (data && data.items) || [];
      var hasMore = data ? !!data.has_more : false;

      var newList;
      if (isRefresh) {
        newList = items;
      } else {
        newList = (state.postList || []).concat(items);
      }

      Store.setState({
        postList: newList,
        postPage: page,
        postHasMore: hasMore
      });

      updateContent();
      loading = false;
    }).catch(function (err) {
      Loading.toast(err.message);
      loading = false;
    });
  }

  /**
   * 加载更多（上拉触发）
   */
  function loadMore() {
    var state = Store.getState();
    if (loading || !state.postHasMore) return;

    Store.setState({ postPage: (state.postPage || 1) + 1 });
    loadPosts(false);
  }

  /**
   * 加载我的帖子列表
   * GET /api/posts/mine
   */
  function loadMyPosts() {
    request.get('/api/posts/mine').then(function (data) {
      var items = (data && data.items) || [];
      Store.setState({ myPostList: items });
      updateContent();
      loading = false;
    }).catch(function (err) {
      Loading.toast(err.message);
      loading = false;
    });
  }

  /**
   * 加载我的点赞列表
   * GET /api/posts/liked
   */
  function loadLikedPosts() {
    request.get('/api/posts/liked').then(function (data) {
      var items = (data && data.items) || [];
      Store.setState({ likedPostList: items });
      updateContent();
      loading = false;
    }).catch(function (err) {
      Loading.toast(err.message);
      loading = false;
    });
  }

  /**
   * 刷新内容区 DOM
   */
  function updateContent() {
    var contentEl = document.getElementById('aidContent');
    if (!contentEl) return;
    var aidTab = Store.getState().aidTab || 'hot';
    contentEl.innerHTML = renderContentBody(aidTab);
  }

  // ===== 事件绑定 =====

  /**
   * 绑定点击事件（事件委托在 #app 上）
   */
  function bindEvents() {
    var app = document.getElementById('app');
    if (!app) return;

    var clickHandler = function (e) {
      // 删除按钮优先（阻止冒泡到 open-post）
      var delBtn = e.target.closest('[data-action="delete-post"]');
      if (delBtn) {
        e.stopPropagation();
        var delId = parseInt(delBtn.getAttribute('data-id'), 10);
        handleDeletePost(delId);
        return;
      }

      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'switch-tab':
          var tab = target.getAttribute('data-tab');
          Store.setState({ aidTab: tab });
          // 重新渲染整个页面（更新 Tab 高亮 + 内容）
          var pageEl = document.querySelector('.page-aid');
          if (pageEl) {
            pageEl.outerHTML = render();
          }
          loadTabData(tab);
          bindScrollLoad();
          break;
        case 'filter-tag':
          var tag = target.getAttribute('data-tag') || '';
          Store.setState({
            postTagFilter: tag,
            postPage: 1,
            postHasMore: true,
            postList: []
          });
          refreshTagBarActive();
          loadPosts(true);
          break;
        case 'open-post':
          var postId = parseInt(target.getAttribute('data-post-id'), 10);
          MMZ.PostDetail.open(postId, 'aid');
          break;
        case 'open-share':
          Store.setState({
            shareModal: {
              show: true,
              tryonId: null
            }
          });
          break;
        case 'go-tryon':
          Router.navigate('tryon', 'tryon');
          break;
        default:
          break;
      }
    };
    window.MMZ._pageClickHandler = clickHandler;
    app.addEventListener('click', clickHandler);
  }

  /**
   * 绑定上拉加载（监听 #app 滚动）
   */
  function bindScrollLoad() {
    var app = document.getElementById('app');
    if (!app) return;

    // 避免重复绑定：先移除旧的 scroll listener
    if (window.MMZ._aidScrollHandler) {
      app.removeEventListener('scroll', window.MMZ._aidScrollHandler);
    }

    var scrollHandler = function () {
      var aidTab = Store.getState().aidTab || 'hot';
      if (aidTab !== 'hot') return; // 只有社区 Tab 才分页
      if (loading) return;

      if (scrollTimer) return; // 节流中

      scrollTimer = setTimeout(function () {
        scrollTimer = null;
        var appEl = document.getElementById('app');
        if (!appEl) return;

        var scrollTop = appEl.scrollTop;
        var scrollHeight = appEl.scrollHeight;
        var clientHeight = appEl.clientHeight;
        var distanceToBottom = scrollHeight - scrollTop - clientHeight;

        if (distanceToBottom < 100 && Store.getState().postHasMore) {
          loadMore();
        }
      }, 200);
    };

    window.MMZ._aidScrollHandler = scrollHandler;
    app.addEventListener('scroll', scrollHandler);
  }

  /**
   * 删除帖子
   * DELETE /api/posts/{id}
   * @param {number} postId
   */
  function handleDeletePost(postId) {
    if (!confirm('确定删除这条分享吗？删除后无法恢复。')) return;

    Loading.show('正在删除…');
    request.del('/api/posts/' + postId).then(function () {
      Loading.hide();
      Loading.toast('已删除');

      // 从本地列表移除
      var myPosts = (Store.getState().myPostList || []).filter(function (p) {
        return p.id !== postId;
      });
      Store.setState({ myPostList: myPosts });
      updateContent();
    }).catch(function (err) {
      Loading.hide();
      Loading.toast(err.message);
    });
  }

  // ===== 工具函数 =====

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  return {
    render: render,
    onMount: onMount,
    cleanup: cleanup
  };
})();

</script>

<!-- pages/post_detail.js -->
<script>
/**
 * 妈妈装 H5 · 帖子详情页（全屏，小红书风格）
 * 路由：#/post
 *
 * 打开方式：MMZ.PostDetail.open(postId, returnRoute)
 * 从首页爱豆精选 / 爱搭瀑布流点击进入
 */
window.MMZ = window.MMZ || {};

MMZ.PostDetail = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;

  var loadingData = false;
  var pageBound = false;
  var pageKeyHandler = null;

  var comments = {
    items: [],
    total: 0,
    page: 1,
    has_more: false
  };

  var loadingComments = false;
  var submittingComment = false;

  /**
   * 打开帖子详情全屏页
   * @param {number} postId
   * @param {string} [returnRoute] - 返回时回到的路由
   */
  function open(postId, returnRoute) {
    var route = returnRoute || Store.getState().route || 'home';
    Store.setState({
      postDetail: { show: true, postId: postId, data: null },
      postReturnRoute: route
    });
    try {
      sessionStorage.setItem('mmz_post_id', String(postId));
      sessionStorage.setItem('mmz_post_return', route);
    } catch (e) { /* ignore */ }
    loadingData = false;
    comments = { items: [], total: 0, page: 1, has_more: false };
    Router.navigate('post');
  }

  function init() {
    /* 兼容 app.js 调用，详情已改为全页路由 */
  }

  function render() {
    var pd = Store.getState().postDetail || {};
    var data = pd.data;

    var pageStyle = 'padding:0;margin:0;width:100%;max-width:100%;min-width:0;overflow-x:clip;box-sizing:border-box';
    var html = '<div class="page page-post-detail" id="postDetailPage" style="' + pageStyle + '">';
    if (!data) {
      html += renderLoading();
    } else {
      html += renderDetailContent(data);
    }
    html += '</div>';
    return html;
  }

  function renderLoading() {
    return (
      '<div class="post-detail-loading">' +
        '<div class="post-detail-loading-spinner"></div>' +
        '<div class="post-detail-loading-text">加载中…</div>' +
      '</div>'
    );
  }

  function renderDetailContent(data) {
    var img = imgUrl(data.image_url);
    var desc = escapeHtml(data.description || '');
    var tags = data.tags || [];
    var author = escapeHtml(data.author_name || data.anonymous_name || '神秘宝妈');
    var initial = escapeHtml(getAvatarInitial(data.author_name || data.anonymous_name));
    var likes = data.like_count || 0;
    var liked = data.is_liked;
    var outfitId = data.outfit_id;
    var tryLabel = outfitId ? '试同款' : '去试衣间';

    var html = '';

    html += '<div class="post-detail-scroll">';

    html += '<div class="post-detail-hero">';
    html += '<img class="post-detail-hero-img" src="' + img + '" alt="" loading="lazy" data-action="preview-image" data-url="' + img + '" />';
    html += '</div>';

    html += '<div class="post-detail-author-bar">';
    html += '<div class="post-detail-avatar">' + initial + '</div>';
    html += '<div class="post-detail-author-meta">';
    html += '<div class="post-detail-author-name">' + author + '</div>';
    html += '<div class="post-detail-author-sub">分享宝贝穿搭</div>';
    html += '</div>';
    html += '</div>';

    if (desc) {
      html += '<div class="post-detail-desc">' + desc + '</div>';
    }

    if (tags.length > 0) {
      html += '<div class="post-detail-tags">';
      tags.forEach(function (tag) {
        html += '<span class="post-detail-tag">#' + escapeHtml(tag) + '</span>';
      });
      html += '</div>';
    }

    html += renderCommentSection(data);
    html += '</div>';

    html += '<div class="post-detail-bottom-bar">';
    html += '<button type="button" class="post-detail-bar-like' + (liked ? ' liked' : '') + '" data-action="toggle-like" data-post-id="' + data.id + '">';
    html += MMZ.Icon.render('heart', liked ? 'solid' : 'line', 20);
    html += '<span class="post-detail-bar-like-num">' + likes + '</span>';
    html += '</button>';
    html += '<div class="post-detail-bar-input-wrap">';
    html += '<input type="text" class="comment-input post-detail-bar-input" id="commentInput" placeholder="说点什么吧…" maxlength="200" data-post-id="' + data.id + '" />';
    html += '<button type="button" class="post-detail-bar-send" data-action="submit-comment" data-post-id="' + data.id + '">发送</button>';
    html += '</div>';
    html += '<button type="button" class="post-detail-bar-try" data-action="try-same" data-outfit-id="' + (outfitId || '') + '">' + tryLabel + '</button>';
    html += '</div>';

    return html;
  }

  function renderCommentSection(postData) {
    var html = '';
    html += '<div class="comment-section post-detail-comments" id="commentSection">';
    html += '<div class="comment-section-title">评论 ' + (comments.total || 0) + '</div>';
    html += renderCommentList();
    if (comments.has_more) {
      html += '<div class="comment-load-more" data-action="load-more-comments" data-post-id="' + postData.id + '">加载更多评论</div>';
    }
    html += '</div>';
    return html;
  }

  function renderCommentList() {
    if (loadingComments && comments.items.length === 0) {
      return '<div class="comment-empty">评论加载中…</div>';
    }
    if (!loadingComments && comments.items.length === 0) {
      return '<div class="comment-empty">还没有评论，快来抢沙发吧~</div>';
    }
    var html = '<div class="comment-list" id="commentList">';
    comments.items.forEach(function (item) {
      html += renderCommentItem(item);
    });
    html += '</div>';
    return html;
  }

  function renderCommentItem(item) {
    var initial = getAvatarInitial(item.author_name);
    var name = escapeHtml(item.author_name || '匿名用户');
    var content = escapeHtml(item.content || '');
    var time = formatTime(item.created_at);
    var deleteBtn = item.is_mine
      ? '<span class="comment-delete" data-action="delete-comment" data-comment-id="' + item.id + '">' + MMZ.Icon.render('close', 'line', 12) + '</span>'
      : '';

    return (
      '<div class="comment-item">' +
        '<div class="comment-avatar">' + escapeHtml(initial) + '</div>' +
        '<div class="comment-body">' +
          '<div class="comment-meta">' +
            '<span class="comment-name">' + name + '</span>' +
            '<span class="comment-time">' + escapeHtml(time) + '</span>' +
            deleteBtn +
          '</div>' +
          '<div class="comment-content">' + content + '</div>' +
        '</div>' +
      '</div>'
    );
  }

  function updatePageContent() {
    var el = document.getElementById('postDetailPage');
    if (!el) return;
    var data = Store.getState().postDetail.data;
    if (!data) return;
    el.innerHTML = renderDetailContent(data);
  }

  function onMount() {
    var pd = Store.getState().postDetail || {};
    var postId = pd.postId;
    if (!postId) {
      try {
        postId = parseInt(sessionStorage.getItem('mmz_post_id'), 10) || null;
        if (postId) {
          Store.setState({
            postDetail: { show: true, postId: postId, data: pd.data || null },
            postReturnRoute: sessionStorage.getItem('mmz_post_return') || 'home'
          });
        }
      } catch (e) { /* ignore */ }
    }
    if (!postId) {
      Router.navigate('home', 'home');
      return;
    }
    bindPageEvents();
    var appEl = document.getElementById('app');
    if (appEl) {
      appEl.scrollLeft = 0;
    }
    if (!pd.data && !loadingData) {
      loadPostDetail(postId);
    } else if (pd.data) {
      loadComments(postId, 1);
    }
  }

  function cleanup() {
    pageBound = false;
    comments = { items: [], total: 0, page: 1, has_more: false };
    loadingComments = false;
    submittingComment = false;
    loadingData = false;
    var app = document.getElementById('app');
    if (app && pageKeyHandler) {
      app.removeEventListener('keydown', pageKeyHandler);
      pageKeyHandler = null;
    }
  }

  function loadPostDetail(postId) {
    loadingData = true;
    request.get('/api/posts/' + postId).then(function (data) {
      loadingData = false;
      Store.setState({
        postDetail: { show: true, postId: postId, data: data }
      });
      updatePageContent();
      loadComments(postId, 1);
    }).catch(function (err) {
      loadingData = false;
      Loading.toast(err.message);
      Router.goBack();
    });
  }

  function loadComments(postId, page) {
    loadingComments = true;
    request.get('/api/posts/' + postId + '/comments?page=' + page + '&size=20').then(function (data) {
      loadingComments = false;
      var newItems = (data && data.items) || [];
      if (page === 1) {
        comments.items = newItems;
      } else {
        comments.items = comments.items.concat(newItems);
      }
      comments.total = (data && data.total) || 0;
      comments.page = page;
      comments.has_more = (data && data.has_more) || false;
      updateCommentSection(postId);
    }).catch(function (err) {
      loadingComments = false;
      Loading.toast(err.message);
    });
  }

  function updateCommentSection(postId) {
    var sectionEl = document.getElementById('commentSection');
    if (!sectionEl) return;
    var postData = Store.getState().postDetail.data;
    if (!postData) return;
    sectionEl.outerHTML = renderCommentSection(postData);
  }

  function handleCommentSubmit(postId, content) {
    content = (content || '').trim();
    if (!content) {
      Loading.toast('请输入评论内容');
      return;
    }
    if (submittingComment) return;
    submittingComment = true;

    request.post('/api/posts/' + postId + '/comments', { content: content }).then(function () {
      submittingComment = false;
      var inputEl = document.getElementById('commentInput');
      if (inputEl) inputEl.value = '';
      loadComments(postId, 1);
    }).catch(function (err) {
      submittingComment = false;
      Loading.toast(err.message);
    });
  }

  function handleCommentDelete(commentId) {
    if (!confirm('确定要删除这条评论吗？')) return;
    request.del('/api/comments/' + commentId).then(function () {
      comments.items = comments.items.filter(function (item) {
        return item.id !== commentId;
      });
      comments.total = Math.max(0, comments.total - 1);
      var pd = Store.getState().postDetail;
      if (pd && pd.postId) updateCommentSection(pd.postId);
    }).catch(function (err) {
      Loading.toast(err.message);
    });
  }

  function toggleLike(postId) {
    var data = Store.getState().postDetail.data;
    if (!data) return;

    var oldLiked = data.is_liked;
    var oldCount = data.like_count || 0;
    var newLiked = !oldLiked;
    var newCount = newLiked ? oldCount + 1 : Math.max(0, oldCount - 1);

    Store.setState({
      postDetail: {
        show: true,
        postId: postId,
        data: Object.assign({}, data, { is_liked: newLiked, like_count: newCount })
      }
    });
    updatePageContent();

    request.post('/api/posts/' + postId + '/like').then(function (resp) {
      if (resp) {
        var cur = Store.getState().postDetail.data;
        Store.setState({
          postDetail: {
            show: true,
            postId: postId,
            data: Object.assign({}, cur, {
              is_liked: resp.is_liked,
              like_count: resp.like_count
            })
          }
        });
        updatePageContent();
      }
    }).catch(function (err) {
      Loading.toast(err.message);
      Store.setState({
        postDetail: {
          show: true,
          postId: postId,
          data: Object.assign({}, data, { is_liked: oldLiked, like_count: oldCount })
        }
      });
      updatePageContent();
    });
  }

  function trySameOutfit(outfitIdStr) {
    var outfitId = outfitIdStr ? parseInt(outfitIdStr, 10) : null;
    if (!outfitId) {
      Router.navigate('tryon', 'tryon');
      return;
    }
    if (MMZ.Tryon && MMZ.Tryon.beginOutfitBuilder) {
      MMZ.Tryon.beginOutfitBuilder(outfitId, '试同款搭配', { redecompose: true });
    } else {
      Router.navigate('tryon', 'tryon');
    }
  }

  function showFullImage(url) {
    var previewOverlay = document.createElement('div');
    previewOverlay.className = 'image-preview-overlay';
    previewOverlay.innerHTML =
      '<div class="image-preview-header">' +
        '<span class="image-preview-close">' + MMZ.Icon.render('close', 'line', 18) + '</span>' +
      '</div>' +
      '<img class="image-preview-img" src="' + url + '" alt="" />';
    previewOverlay.addEventListener('click', function () {
      previewOverlay.remove();
    });
    document.body.appendChild(previewOverlay);
  }

  function bindPageEvents() {
    if (pageBound) return;
    pageBound = true;

    var app = document.getElementById('app');
    if (!app) return;

    var clickHandler = function (e) {
      if (Store.getState().route !== 'post') return;
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'toggle-like':
          toggleLike(parseInt(target.getAttribute('data-post-id'), 10));
          break;
        case 'try-same':
          trySameOutfit(target.getAttribute('data-outfit-id'));
          break;
        case 'preview-image':
          showFullImage(target.getAttribute('data-url'));
          break;
        case 'submit-comment':
          handleCommentSubmit(
            parseInt(target.getAttribute('data-post-id'), 10),
            (document.getElementById('commentInput') || {}).value
          );
          break;
        case 'delete-comment':
          handleCommentDelete(parseInt(target.getAttribute('data-comment-id'), 10));
          break;
        case 'load-more-comments':
          loadComments(parseInt(target.getAttribute('data-post-id'), 10), comments.page + 1);
          break;
        default:
          break;
      }
    };

    pageKeyHandler = function (e) {
      if (Store.getState().route !== 'post') return;
      if (!e.target || e.target.id !== 'commentInput') return;
      if (e.key === 'Enter' || e.keyCode === 13) {
        e.preventDefault();
        handleCommentSubmit(
          parseInt(e.target.getAttribute('data-post-id'), 10),
          e.target.value
        );
      }
    };

    window.MMZ._pageClickHandler = clickHandler;
    window.MMZ._pageKeyHandler = pageKeyHandler;
    app.addEventListener('click', clickHandler);
    app.addEventListener('keydown', pageKeyHandler);
  }

  function getAvatarInitial(name) {
    if (!name) return '匿';
    return name.charAt(0);
  }

  function formatTime(dateStr) {
    if (!dateStr) return '';
    try {
      var d = new Date(dateStr);
      var diff = (new Date() - d) / 1000;
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + '天前';
      return (d.getMonth() + 1) + '月' + d.getDate() + '日';
    } catch (e) {
      return '';
    }
  }

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  return {
    init: init,
    open: open,
    render: render,
    onMount: onMount,
    cleanup: cleanup
  };
})();

</script>
