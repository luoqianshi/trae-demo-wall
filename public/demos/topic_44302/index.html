        db.favorites = db.favorites.filter(function (f) { return f.tryon_id !== favId; });
        return mockResolve({ favorited: false });
      } else {
        db.favorites.push({
          id: Date.now(),
          tryon_id: favId,
          image_url: UNSPLASH + '1518895949257-7621c3c786d7?w=400&h=600&fit=crop',
          scene: '温馨客厅',
          created_at: new Date().toISOString()

    // /api/buylist/list
    if (path === '/api/buylist/list' && m === 'GET') {
      return mockResolve({ items: db.buylist });

    // /api/user/anonymous-name
    if (path === '/api/user/anonymous-name' && m === 'GET') {

      var idx = params.refresh === 'true' ? Math.floor(Math.random() * names.length) : 0;
      return mockResolve({ anonymous_name: names[idx] });
    }

    // /api/wechat/jsconfig
    if (path.indexOf('/api/wechat/jsconfig') === 0 && m === 'GET') {
      return mockResolve({ enabled: false, appId: '', timestamp: 0, nonceStr: '', signature: '' });
    }

    // /api/checkin/list
    if (path === '/api/checkin/list' && m === 'GET') {
      return mockResolve({ items: MOCK.checkinSpots });
    }

    // 兜底
    console.warn('[Mock] 未匹配的 API:', method, fullPath);
    return mockResolve({});
  }

  // ===== 对外接口（与原 request.js 兼容） =====

  function ensureLogin() {
    if (loginPromise) return loginPromise;
    var Auth = MMZ.Auth;
    var deviceId = Auth ? Auth.ensureDeviceId() : (config.DEMO_DEVICE_ID || 'mmz_demo_default');
    loginPromise = mockResolve({
      token: 'mock_token_' + Date.now(),
      user: MOCK.user,
      is_new_user: false
    }, 300).then(function (data) {
      if (Auth) Auth.saveSession(data);
      return data;
    }).finally(function () {
      loginPromise = null;
    });
    return loginPromise;
  }

  function send(path, options) {
    options = options || {};
    var method = options.method || 'GET';
    return handleMock(method, path, options.body, options);
  }

  function get(path, options) {
    return send(path, Object.assign({}, options || {}, { method: 'GET' }));
  }

  function post(path, body, options) {
    return send(path, Object.assign({}, options || {}, { method: 'POST', body: body }));
  }

  function put(path, body, options) {
    return send(path, Object.assign({}, options || {}, { method: 'PUT', body: body }));
  }

  function del(path, options) {
    return send(path, Object.assign({}, options || {}, { method: 'DELETE' }));
  }

  return {
    send: send,
    get: get,
    post: post,
    put: put,
    del: del,
    ensureLogin: ensureLogin
  };
})();

 *   - hashchange 事件驱动页面切换
 *   - navigate(route) 修改 hash → 触发 hashchange → handleHashChange
 *   - 页面渲染通过 onRender(callback) 注册回调
 *   - TabBar 活跃态由 MMZ.TabBar 组件通过 Store.subscribe 自行管理
 */
window.MMZ = window.MMZ || {};

MMZ.Router = (function () {
  'use strict';

  var config = MMZ.config;
  var Store = MMZ.Store;

  /** 页面渲染回调（由 app.js 注册） */
  var renderCallback = null;

  /**
   * 注册页面渲染回调
   * @param {function} fn - (route: string) => htmlString
   */
  function onRender(fn) {
    renderCallback = fn;
  }

  /**
   * 从 hash 解析当前路由名
   * @returns {string} route key，如 'home'
   */
  function currentRoute() {
    var hash = window.location.hash.replace(/^#\/?/, '').split('?')[0].split('/')[0];
    return config.ROUTES.indexOf(hash) > -1 ? hash : 'home';
  }

  /**
   * 导航到指定路由
   * @param {string} route - 目标路由
   * @param {string} [tab]  - 可选，同步设置的 tab
   */
  function navigate(route, tab) {
    if (config.ROUTES.indexOf(route) === -1) {
      route = 'home';
    }
    window.location.hash = '#/' + route;
    if (tab) {
      Store.setState({ tab: tab });
    }
  }

  /**
   * Tab 切换：route 和 tab 同步
   * @param {string} tab - tab key
   */
  function goTab(tab) {
    navigate(tab, tab);
  }

  /**
   * 返回上一页（固定映射规则）
   *   result → tryon
   *   register → home
   *   其他 → home
   */
  function goBack() {
    var route = Store.getState().route;
    if (route === 'result') {
      navigate('tryon', 'tryon');
    } else if (route === 'register') {
      navigate('home', 'home');
    } else if (route === 'post') {
      var ret = Store.getState().postReturnRoute || 'home';
      Store.setState({
        postDetail: { show: false, postId: null, data: null }
      });
      if (config.TAB_PAGES.indexOf(ret) > -1) {
        navigate(ret, ret);
      } else {
        navigate(ret);
      }
    } else if (route === 'checkin') {
      var checkinRet = Store.getState().checkinReturnRoute || 'home';
      Store.setState({
        checkinDetail: { spotId: null, data: null, preview: null }
      });
      if (config.TAB_PAGES.indexOf(checkinRet) > -1) {
        navigate(checkinRet, checkinRet);
      } else {
        navigate(checkinRet);
      }
    } else if (route === 'decompose') {
      navigate('tryon', 'tryon');
    } else {
      navigate('home', 'home');
    }
  }

  /**
   * hashchange 处理器：更新 Store → 更新导航栏 → 渲染页面
   */
  function handleHashChange() {
    var route = currentRoute();
    var isTab = config.TAB_PAGES.indexOf(route) > -1;
    var currentTab = Store.getState().tab;

    // 同步 tab：如果导航到 tab 页，tab 跟随 route
    var newTab = isTab ? route : currentTab;
    Store.setState({ route: route, tab: newTab });

    // 更新导航栏 UI
    updateNav(route, isTab);

    // 渲染页面内容
    renderCurrentPage(route);
  }

  /**
   * 更新顶部导航栏（标题、返回按钮、TabBar 可见性）
   */
  function updateNav(route, isTab) {
    var navTitle = document.getElementById('navTitle');
    var navBack = document.getElementById('navBack');
    var tabbar = document.getElementById('tabbar');
    var app = document.getElementById('app');

    if (navTitle) {
      navTitle.textContent = config.PAGE_TITLES[route] || '妈妈装';
    }
    if (navBack) {
      navBack.classList.toggle('show', !isTab);
    }
    if (tabbar) {
      tabbar.classList.toggle('hidden', !isTab);
    }
    if (app) {
      app.classList.toggle('has-tab', isTab);
      app.classList.toggle('screen-post', route === 'post');
      app.classList.toggle('screen-checkin', route === 'checkin');
    }
  }

  /**
   * 调用渲染回调，输出页面 HTML
   */
  function renderCurrentPage(route) {
    if (typeof renderCallback !== 'function') return;
    var app = document.getElementById('app');
    if (app) {
      app.innerHTML = renderCallback(route);
    }
  }

  /**
   * 初始化路由系统
   * 绑定 hashchange + 返回按钮，触发首次渲染
   */
  function init() {
    // 监听 hash 变化
    window.addEventListener('hashchange', handleHashChange);

    // 返回按钮
    var navBack = document.getElementById('navBack');
    if (navBack) {
      navBack.addEventListener('click', goBack);
    }

    // 设置默认路由
    if (!window.location.hash) {
      window.location.hash = '#/home';
    }

    // 立即触发首次渲染（不等 hashchange 异步事件）
    handleHashChange();
  }

  return {
    init: init,
    navigate: navigate,
    goTab: goTab,
    goBack: goBack,
    currentRoute: currentRoute,
    onRender: onRender,
    handleHashChange: handleHashChange
  };
})();

</script>

    },
    close: {
      line: '<path d="M6 6l12 12M18 6L6 18"/>',
      solid: '<path d="M6 4.6L12 10.6 18 4.6a1 1 0 0 1 1.4 1.4L13.4 12 19.4 18a1 1 0 0 1-1.4 1.4L12 13.4 6 19.4A1 1 0 0 1 4.6 18L10.6 12 4.6 6A1 1 0 0 1 6 4.6z"/>'
    },
    arrow_right: {
      line: '<path d="M5 12h14M13 6l6 6-6 6"/>',
      solid: '<path d="M4 11a1 1 0 0 0 0 2h9.6l-3.3 3.3a1 1 0 0 0 1.4 1.4l5-5a1 1 0 0 0 0-1.4l-5-5a1 1 0 1 0-1.4 1.4L13.6 11H4z"/>'
    },
    dress: {
      line: '<path d="M9 3l3 3 3-3M9 3l-2 5 2 2v11h6V10l2-2-2-5"/><path d="M12 6v14"/>',
      solid: '<path d="M8.5 2a1 1 0 0 0-.8.4l-2.6 6.4a1 1 0 0 0 .3 1.2l1.6 1.3V21a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-9.7l1.6-1.3a1 1 0 0 0 .3-1.2L15.3 2.4a1 1 0 0 0-.8-.4h-1a.5.5 0 0 0-.4.2L12 3.5l-1.1-1.3a.5.5 0 0 0-.4-.2h-2z"/>'
    }
  };

  /**
   * 渲染 SVG 图标
   * @param {string} name - 图标名（见 ICONS 定义）
   * @param {string} [variant='line'] - 变体：'line' | 'solid'
   * @param {number} [size=24] - 图标尺寸（px）
   * @returns {string} SVG HTML 字符串
   */
  function render(name, variant, size) {
    var icon = ICONS[name];
    if (!icon) {
      console.warn('[MMZ.Icon] Unknown icon:', name);
      return '';
    }
    variant = variant || 'line';
    size = size || 24;

    var paths = icon[variant] || icon.line;

    var attrs;
    if (variant === 'solid') {
      attrs = 'fill="currentColor" stroke="none"';
    } else {
      attrs = 'fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"';
    }

    return (
      '<svg class="mmz-icon" width="' + size + '" height="' + size + '" ' +
      'viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" ' + attrs + '>' +
      paths +
      '</svg>'
    );
  }

  /**
   * Tab 图标快捷渲染（active 态用 solid，inactive 态用 line）
   * @param {string} tabKey - tab key（home/wardrobe/tryon/aid/mine）
   * @param {boolean} active - 是否选中
   * @returns {string} SVG HTML 字符串
   */
  function tab(tabKey, active) {
    return render(tabKey, active ? 'solid' : 'line', 24);
  }

  return {
    render: render,
    tab: tab,
    ICONS: ICONS
  };
})();

</script>

<script>
/**
 * 妈妈装 H5 · TabBar 组件
 * 依赖：MMZ.config, MMZ.Store, MMZ.Router
 *
 * 功能：
 *   1. 动态渲染 5 个 Tab（home/wardrobe/tryon/aid/mine）到 #tabbar
 *   2. 点击 Tab → Router.goTab()
 *   3. 订阅 Store 变化 → 自动更新 active 高亮 + 可见性
 *
 * 变更说明：
 *   - 底栏固定 5 个 Tab：首页 → 衣柜 → 试衣台 → 爱搭 → 我的
 *   - 相册（album）已从底栏移除，入口收敛至「我的」页菜单
 *   - 爱搭（aid）从「我的」菜单上移至底栏
 */
window.MMZ = window.MMZ || {};

MMZ.TabBar = (function () {
  'use strict';

  var config = MMZ.config;
  var Store = MMZ.Store;

  /** 5 个 Tab 定义（顺序即底栏从左到右顺序） */
  var TABS = [
    { key: 'home',     label: '首页' },
    { key: 'wardrobe', label: '衣柜' },
    { key: 'tryon',    label: '试衣间' },
    { key: 'aid',      label: '爱搭' },
    { key: 'mine',     label: '我的' }
  ];

  /**
   * 生成 TabBar HTML
   * @returns {string}
   */
  function render() {
    var state = Store.getState();
    var isTab = config.TAB_PAGES.indexOf(state.route) > -1;
    return TABS.map(function (t) {
      var active = (isTab && state.tab === t.key);
      return (
        '<button class="tab' + (active ? ' active' : '') + '" data-tab="' + t.key + '">' +
          '<span class="tab-ico">' + MMZ.Icon.tab(t.key, active) + '</span>' +
          '<span class="tab-txt">' + t.label + '</span>' +
        '</button>'
      );
    }).join('');
  }

  /**
   * 初始化 TabBar
   * 渲染 DOM + 绑定点击 + 订阅 Store
   */
  function init() {
    var container = document.getElementById('tabbar');
    if (!container) {
      console.warn('[MMZ TabBar] #tabbar 容器未找到');
      return;
    }

    // 渲染初始 HTML
    container.innerHTML = render();

    // 绑定点击事件（事件委托）
    container.addEventListener('click', function (e) {
      var tab = e.target.closest('.tab');
      if (tab && MMZ.Router) {
        MMZ.Router.goTab(tab.dataset.tab);
      }
    });

    // 订阅 Store → 自动更新 active 高亮
    Store.subscribe(function () {
      update();
    });
  }

  /**
   * 更新 TabBar active 状态（由 Store subscribe 触发）
   */
  function update() {
    var state = Store.getState();
    var isTab = config.TAB_PAGES.indexOf(state.route) > -1;

    var tabs = document.querySelectorAll('#tabbar .tab');
    tabs.forEach(function (el) {
      el.classList.toggle('active', isTab && el.dataset.tab === state.tab);
    });
  }

  return {
    init: init,
    render: render,
    update: update
  };
})();

</script>

<script>
/**
 * 妈妈装 H5 · Loading 组件
 * 依赖：MMZ.config, MMZ.Store
 *
 * 功能：
 *   1. show(msg) / hide()   — 全屏 Loading 遮罩
 *   2. toast(msg)           — 轻提示 Toast
 *   3. startProgress(onDone)— 试穿进度模拟（T05 替换为真实轮询）
 *   4. stopProgress()       — 停止进度模拟
 */
window.MMZ = window.MMZ || {};

MMZ.Loading = (function () {
  'use strict';

  var Store = MMZ.Store;
  var config = MMZ.config;

  var progressTimer = null;
  var toastTimer = null;

  // ===== 全屏 Loading =====

  /**
   * 显示全屏 Loading 遮罩
   * @param {string} [message] - 提示文案，默认"加载中…"
   */
  function show(message) {
    hide();
    var el = document.createElement('div');
    el.className = 'loading-overlay';
    el.id = 'mmzLoadingOverlay';
    el.innerHTML =
      '<div class="loading-spinner"></div>' +
      '<div class="loading-text">' + (message || '加载中…') + '</div>';
    document.body.appendChild(el);
  }

  /**
   * 隐藏全屏 Loading
   */
  function hide() {
    var el = document.getElementById('mmzLoadingOverlay');
    if (el) el.remove();
  }

  // ===== Toast 轻提示 =====

  /**
   * 显示 Toast 轻提示（1.8 秒后自动消失）
   * @param {string} msg - 提示文案
   */
  function toast(msg) {
    var el = document.querySelector('.toast');
    if (!el) {
      el = document.createElement('div');
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      el.classList.remove('show');
    }, 1800);
  }

  // ===== 试穿进度模拟 =====

  /**
   * 启动试穿进度模拟（T05 将替换为 GET /api/tryon/{id}/status 轮询）
   * 通过 Store.state.result.loading / progress / tipIndex 驱动 UI
   * @param {function} [onComplete] - 进度到 100% 时的回调
   */
  function startProgress(onComplete) {
    stopProgress();

    // 重置 result 状态
    var s = Store.getState();
    Store.setState({
      result: Object.assign({}, s.result, {
        loading: true,
        progress: 0,
        tipIndex: 0
      })
    });

    progressTimer = setInterval(function () {
      var cur = Store.getState();
      var p = cur.result.progress + 8;
      var tipIndex = p > 66 ? 2 : (p > 33 ? 1 : 0);

      if (p >= 100) {
        clearInterval(progressTimer);
        progressTimer = null;
        Store.setState({
          result: Object.assign({}, cur.result, {
            loading: false,
            progress: 100,
            tipIndex: tipIndex
          })
        });
        if (typeof onComplete === 'function') {
          onComplete();
        }
      } else {
        Store.setState({
          result: Object.assign({}, cur.result, {
            progress: p,
            tipIndex: tipIndex
          })
        });
      }
    }, 350);
  }

  /**
   * 停止进度模拟
   */
  function stopProgress() {
    if (progressTimer) {
      clearInterval(progressTimer);
      progressTimer = null;
    }
  }

  return {
    show: show,
    hide: hide,
    toast: toast,
    startProgress: startProgress,
    stopProgress: stopProgress
  };
})();

</script>

<script>
/**
 * 妈妈装 H5 · 微信分享工具
 * 依赖：MMZ.config, MMZ.request, MMZ.Loading
 *
 * 分享试穿效果图：
 *   - 弹层展示预览 +「保存图片」「分享到爱搭」两个按钮
 *   - 分享到爱搭：自动配文案，一键发布到社区
 *   - 微信内置浏览器：额外配置 JS-SDK，支持右上角转发好友
 */
window.MMZ = window.MMZ || {};

MMZ.WechatShare = (function () {
  'use strict';

  var config = MMZ.config;
  var request = MMZ.request;

  var overlayEl = null;
  var wxScriptPromise = null;
  var sharingToAid = false;

  function toast(msg) {
    if (MMZ.Loading) {
      MMZ.Loading.toast(msg);
    }
  }

  function showLoading(msg) {
    if (MMZ.Loading) {
      MMZ.Loading.show(msg);
    }
  }

  function hideLoading() {
    if (MMZ.Loading) {
      MMZ.Loading.hide();
    }
  }

  function isWechat() {
    return /MicroMessenger/i.test(navigator.userAgent);
  }

  function isVideoUrl(url) {
    if (!url) return false;
    return /\.(mp4|webm|mov)(\?|$)/i.test(url);
  }

  function absUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function removeOverlay() {
    if (overlayEl && overlayEl.parentNode) {
      overlayEl.parentNode.removeChild(overlayEl);
    }
    overlayEl = null;
    sharingToAid = false;
  }

  function loadWxScript() {
    if (window.wx) {
      return Promise.resolve(window.wx);
    }
    if (wxScriptPromise) {
      return wxScriptPromise;
    }
    wxScriptPromise = new Promise(function (resolve, reject) {
      var script = document.createElement('script');
      script.src = 'https://res.wx.qq.com/open/js/jweixin-1.6.0.js';
      script.onload = function () {
        resolve(window.wx);
      };
      script.onerror = function () {
        wxScriptPromise = null;
        reject(new Error('微信 JS-SDK 加载失败'));
      };
      document.head.appendChild(script);
    });
    return wxScriptPromise;
  }

  function fetchJsConfig() {
    var pageUrl = window.location.href.split('#')[0];
    return request.get('/api/wechat/jsconfig?url=' + encodeURIComponent(pageUrl));
  }

  function setupWxShare(opts) {
    return loadWxScript().then(function (wx) {
      return fetchJsConfig().then(function (cfg) {
        if (!cfg || !cfg.enabled || !cfg.appId) {
          throw new Error('微信分享未配置');
        }
        wx.config({
          debug: false,
          appId: cfg.appId,
          timestamp: cfg.timestamp,
          nonceStr: cfg.nonceStr,
          signature: cfg.signature,
          jsApiList: ['updateAppMessageShareData', 'updateTimelineShareData']
        });
        return new Promise(function (resolve, reject) {
          wx.ready(function () {
            var shareData = {
              title: opts.title,
              desc: opts.desc,
              link: opts.link,
              imgUrl: opts.imageUrl
            };
            wx.updateAppMessageShareData(shareData);
            wx.updateTimelineShareData(shareData);
            resolve();
          });
          wx.error(function (err) {
            reject(err || new Error('wx.config failed'));
          });
        });
      });
    });
  }

  function renderPreviewMedia(mediaUrl, isVideo) {
    if (isVideo) {
      return (
        '<video class="wx-share-preview-video" src="' + escapeHtml(mediaUrl) + '" controls playsinline webkit-playsinline></video>'
      );
    }
    return (
      '<img class="wx-share-preview-img" src="' + escapeHtml(mediaUrl) + '" alt="试衣效果" />'
    );
  }

  function buildAidDescription(scene) {
    var desc = scene ? ('场景：' + scene + ' · 看看我家宝贝的试穿效果') : '看看我家宝贝的试穿效果～';
    if (desc.length > 50) {
      desc = desc.substring(0, 50);
    }
    return desc;
  }

  function shareToAid(opts) {
    opts = opts || {};
    if (sharingToAid) {
      return Promise.resolve();
    }

    var tryonId = opts.tryonId;
    if (!tryonId) {
      toast('无法分享，缺少试穿记录');
      return Promise.reject(new Error('no tryon id'));
    }

    var description = buildAidDescription(opts.scene || '');

    sharingToAid = true;
    var aidBtn = overlayEl ? overlayEl.querySelector('[data-action="wx-share-aid"]') : null;
    if (aidBtn) {
      aidBtn.disabled = true;
      aidBtn.textContent = '分享中…';
    }
    showLoading('正在分享到爱搭…');

    return request.post('/api/posts/share', {
      tryon_id: parseInt(tryonId, 10),
      description: description,
      tags: []
    }).then(function () {
      hideLoading();
      removeOverlay();
      toast('分享成功，等大家来点赞～');
    }).catch(function (err) {
      hideLoading();
      sharingToAid = false;
      if (aidBtn) {
        aidBtn.disabled = false;
        aidBtn.textContent = '分享到爱搭';
      }
      if (err.message && err.message.indexOf('已经分享') > -1) {
        toast('这条试穿记录已经分享过了');
      } else {
        toast(err.message || '分享失败');
      }
    });
  }

  function renderActionButtons(opts) {
    var mediaUrl = opts.mediaUrl;
    var isVideo = opts.isVideo;
    var tryonId = opts.tryonId;
    var html = '';

    if (!isVideo || tryonId) {
      html += '<div class="wx-share-actions">';
      if (!isVideo) {
        html += '<a class="btn-secondary wx-share-download" href="' + escapeHtml(mediaUrl) + '" download="tryon.jpg" target="_blank" rel="noopener">保存图片</a>';
      }
      if (tryonId) {
        html += '<button type="button" class="btn-primary wx-share-aid-btn" data-action="wx-share-aid">分享到爱搭</button>';
      }
      html += '</div>';
    }
    return html;
  }

  function showShareOverlay(opts) {
    removeOverlay();

    var mediaUrl = opts.mediaUrl;
    var isVideo = opts.isVideo;
    var title = opts.title || '妈妈装 · 试衣效果';
    var tip = opts.tip || '保存图片或分享到爱搭社区';
    var showWechatGuide = opts.wechatGuide === true;
    var tryonId = opts.tryonId || '';
    var scene = opts.scene || '';

    var html = '';
    html += '<div class="wx-share-overlay" id="wxShareOverlay"';
    if (tryonId) {
      html += ' data-tryon-id="' + escapeHtml(String(tryonId)) + '"';
    }
    if (scene) {
      html += ' data-scene="' + escapeHtml(scene) + '"';
    }
    html += '>';
    html += '<div class="wx-share-mask" data-action="wx-share-close"></div>';
    html += '<div class="wx-share-panel">';
    html += '<div class="wx-share-header">';
    html += '<div class="wx-share-title">' + escapeHtml(title) + '</div>';
    html += '<button type="button" class="wx-share-close" data-action="wx-share-close" aria-label="关闭">';
    html += MMZ.Icon.render('close', 'line', 18);
    html += '</button>';
    html += '</div>';
    html += '<div class="wx-share-preview">';
    html += renderPreviewMedia(mediaUrl, isVideo);
    html += '</div>';
    if (showWechatGuide) {
      html += '<div class="wx-share-wechat-guide">';
      html += '<div class="wx-share-guide-arrow"></div>';
      html += '<div class="wx-share-guide-text">已准备好分享内容</div>';
      html += '<div class="wx-share-guide-sub">也可点右上角 ··· 发送给微信好友</div>';
      html += '</div>';
    } else {
      html += '<div class="wx-share-tip">' + escapeHtml(tip) + '</div>';
    }
    html += renderActionButtons({ mediaUrl: mediaUrl, isVideo: isVideo, tryonId: tryonId });
    html += '</div>';
    html += '</div>';

    var temp = document.createElement('div');
    temp.innerHTML = html;
    overlayEl = temp.firstElementChild;
    document.body.appendChild(overlayEl);

    overlayEl.addEventListener('click', function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');
      if (action === 'wx-share-close') {
        removeOverlay();
      } else if (action === 'wx-share-aid') {
        e.preventDefault();
        e.stopPropagation();
        shareToAid({
          tryonId: overlayEl.getAttribute('data-tryon-id'),
          scene: overlayEl.getAttribute('data-scene') || ''
        });
      }
    });
  }

  function shareTryonResult(opts) {
    opts = opts || {};
    var rawUrl = opts.resultImageUrl || opts.imageUrl || opts.mediaUrl || '';
    var mediaUrl = absUrl(rawUrl);

    if (!mediaUrl) {
      toast('暂无试衣效果，请先完成试穿');
      return Promise.reject(new Error('no media'));
    }

    var isVideo = opts.isVideo === true || isVideoUrl(mediaUrl);
    var scene = opts.scene || '';
    var title = opts.title || '妈妈装 · 试衣效果';
    var desc = scene ? ('场景：' + scene + ' · 看看我家宝贝的试穿效果') : '看看我家宝贝的试穿效果～';
    var link = window.location.href.split('#')[0] + '#/home';
    var previewImage = isVideo ? absUrl(opts.posterUrl || opts.resultImageUrl || '') : mediaUrl;

    if (isWechat()) {
      var wxImage = previewImage || mediaUrl;
      setupWxShare({
        title: title,
        desc: desc,
        link: link,
        imageUrl: wxImage
      }).catch(function () { /* 未配置公众号时仍展示分享弹层 */ });
    }

    showShareOverlay({
      mediaUrl: mediaUrl,
      isVideo: isVideo,
      title: '分享试衣效果',
      tryonId: opts.tryonId,
      scene: scene,
      wechatGuide: isWechat()
    });
    return Promise.resolve();
  }

  return {
    isWechat: isWechat,
    shareTryonResult: shareTryonResult,
    showShareOverlay: showShareOverlay
  };
})();

</script>

<script>
/**
 * 妈妈装 H5 · Demo 角标组件
 * 依赖：MMZ.Store
 *
 * 功能：
 *   当 Store.state.result.demo === true 时，在屏幕右上角显示红色 "DEMO" 角标。
 *   场景：后端 AI 网关无 API Key 时走 MockProvider，返回 demo=true，
 *   前端据此提示用户当前结果为演示数据。
 */
window.MMZ = window.MMZ || {};

MMZ.DemoBadge = (function () {
  'use strict';

  var Store = MMZ.Store;
  var badgeEl = null;

  /**
   * 创建 Demo 角标 DOM 元素
   * @returns {HTMLElement}
   */
  function createBadge() {
    var el = document.createElement('div');
    el.className = 'demo-badge';
    el.id = 'mmzDemoBadge';
    el.textContent = 'DEMO';
    el.style.display = 'none';
    return el;
  }

  /**
   * 初始化 Demo 角标
   * 创建 DOM + 订阅 Store.state.result.demo
   */
  function init() {
    badgeEl = createBadge();
    document.body.appendChild(badgeEl);

    // 订阅 Store 变化，根据 result.demo 显示/隐藏
    Store.subscribe(function (state) {
      update(state);
    });

    // 初始检查
    update(Store.getState());
  }

  /**
   * 更新角标可见性
   * @param {object} state - Store state
   */
  function update(state) {
    if (!badgeEl) return;
    var show = state.result && state.result.demo === true;
    badgeEl.style.display = show ? 'block' : 'none';
  }

  /**
   * 手动设置 demo 状态（供 API 层调用）
   * @param {boolean} isDemo
   */
  function setDemo(isDemo) {
    var s = Store.getState();
    Store.setState({
      result: Object.assign({}, s.result, {
        demo: !!isDemo
      })
    });
  }

  return {
    init: init,
    update: update,
    setDemo: setDemo
  };
})();

</script>

<script>
/**
 * 试衣进度悬浮弹窗 — 提交 + 轮询 + 环形进度
 * 依赖：MMZ.Store, MMZ.Router, MMZ.request, MMZ.config
 */
window.MMZ = window.MMZ || {};

MMZ.TryonProgress = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;

  var PROGRESS_RADIUS = 52;
  var PROGRESS_CIRCUMFERENCE = 2 * Math.PI * PROGRESS_RADIUS;
  var MAX_POLL = 30;
  var POLL_INTERVAL = 2000;

  var overlayEl = null;
  var active = false;
  var progress = 0;
  var progressCap = 15;
  var pollCount = 0;
  var tipIndex = 0;
  var tickTimer = null;
  var pollTimer = null;
  var tipTimer = null;
  var taskUuid = '';
  var runId = 0;

  function progressOffset(pct) {
    var val = Math.min(100, Math.max(0, pct || 0));
    return 100 - val;
  }

  function applyArcProgress(arc, pct) {
    if (!arc) return;
    var val = Math.min(100, Math.max(0, pct || 0));
    arc.setAttribute('pathLength', '100');
    arc.setAttribute('stroke-dasharray', '100');
    arc.setAttribute('stroke-dashoffset', String(100 - val));
  }

  function progressLabel(pct) {
    if (pct >= 100) return '完成';
    return pct > 0 ? Math.round(pct) + '%' : '准备中';
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function setProgress(next) {
    progress = Math.max(progress, Math.min(100, next));
    updateUI();
  }

  function updateUI(extraSub) {
    if (!overlayEl) return;
    var arc = overlayEl.querySelector('.tryon-progress-arc');
    applyArcProgress(arc, progress);
    var pctEl = overlayEl.querySelector('#tryonProgressPct');
    if (pctEl) {
      pctEl.textContent = progressLabel(progress);
    }
    if (extraSub) {
      var subEl = overlayEl.querySelector('#tryonProgressSub');
      if (subEl) subEl.textContent = extraSub;
    }
  }

  function stopTimers() {
    if (tickTimer) {
      clearInterval(tickTimer);
      tickTimer = null;
    }
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
    if (tipTimer) {
      clearInterval(tipTimer);
      tipTimer = null;
    }
  }

  function removeOverlay() {
    stopTimers();
    if (overlayEl && overlayEl.parentNode) {
      overlayEl.parentNode.removeChild(overlayEl);
    }
    overlayEl = null;
    active = false;
    progress = 0;
    progressCap = 15;
    pollCount = 0;
    taskUuid = '';
  }

  function renderOverlay() {
    removeOverlay();
    active = true;
    progress = 3;
    progressCap = 18;
    tipIndex = 0;
    var tip = config.LOADING_TIPS[0];

    var html = '';
    html += '<div class="tryon-progress-overlay" id="tryonProgressOverlay">';
    html += '<div class="tryon-progress-mask"></div>';
    html += '<div class="tryon-progress-panel">';
    html += '<div class="tryon-progress-animation">';
    html += '<svg class="result-progress-svg" viewBox="0 0 120 120" aria-hidden="true">';
    html += '<defs>';
    html += '<linearGradient id="tryonProgressGradient" x1="0%" y1="0%" x2="100%" y2="100%">';
    html += '<stop offset="0%" stop-color="#ff9a5c" />';
    html += '<stop offset="100%" stop-color="#ff7a3d" />';
    html += '</linearGradient>';
    html += '</defs>';
    html += '<circle class="result-progress-track" cx="60" cy="60" r="' + PROGRESS_RADIUS + '" fill="none" />';
    html += '<circle class="tryon-progress-arc result-progress-arc" cx="60" cy="60" r="' + PROGRESS_RADIUS + '"';
    html += ' fill="none" stroke="url(#tryonProgressGradient)" stroke-width="8" stroke-linecap="round"';
    html += ' pathLength="100" stroke-dasharray="100" stroke-dashoffset="' + progressOffset(progress) + '" />';
    html += '</svg>';
    html += '<div class="result-progress-center">';
    html += '<div class="result-progress-icon">' + MMZ.Icon.render('loading_sparkle', 'line', 22) + '</div>';
    html += '<div class="result-progress-pct" id="tryonProgressPct">' + progressLabel(progress) + '</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="tryon-progress-tip" id="tryonProgressTip">' + escapeHtml(tip) + '</div>';
    html += '<div class="tryon-progress-sub" id="tryonProgressSub">正在提交试穿任务…</div>';
    html += '<div class="tryon-progress-error" id="tryonProgressError" hidden></div>';
    html += '<div class="tryon-progress-actions" id="tryonProgressActions" hidden>';
    html += '<button type="button" class="btn-secondary" data-action="tryon-progress-close">关闭</button>';
    html += '<button type="button" class="btn-primary" data-action="tryon-progress-retry">重试</button>';
    html += '</div>';
    html += '</div>';
    html += '</div>';

    var temp = document.createElement('div');
    temp.innerHTML = html;
    overlayEl = temp.firstElementChild;
    var root = document.querySelector('.device') || document.body;
    root.appendChild(overlayEl);

    overlayEl.addEventListener('click', function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');
      if (action === 'tryon-progress-close') {
        cancel();
      } else if (action === 'tryon-progress-retry') {
        var retryBody = overlayEl._retryBody;
        cancel(true);
        if (retryBody) {
          start(retryBody);
        }
      }
    });
  }

  function startTipRotation() {
    if (tipTimer) clearInterval(tipTimer);
    tipTimer = setInterval(function () {
      tipIndex = (tipIndex + 1) % config.LOADING_TIPS.length;
      var tipEl = overlayEl ? overlayEl.querySelector('#tryonProgressTip') : null;
      if (tipEl) {
        tipEl.textContent = config.LOADING_TIPS[tipIndex];
      }
    }, 3000);
  }

  function startTick() {
    if (tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(function () {
      if (progress < progressCap) {
        setProgress(progress + 1);
      }
    }, 350);
  }

  function showError(message) {
    stopTimers();
    active = false;
    if (!overlayEl) return;
    var errEl = overlayEl.querySelector('#tryonProgressError');
    var actionsEl = overlayEl.querySelector('#tryonProgressActions');
    var subEl = overlayEl.querySelector('#tryonProgressSub');
    if (subEl) subEl.hidden = true;
    if (errEl) {
      errEl.hidden = false;
      errEl.textContent = message || '试穿失败，请重试';
    }
    if (actionsEl) actionsEl.hidden = false;
  }

  function doPoll() {
    if (!taskUuid) return;
    pollCount++;

    if (pollCount > MAX_POLL) {
      showError('等待超时，请稍后重试');
      return;
    }

    request.get('/api/tryon/' + taskUuid).then(function (data) {
      var pollProgress = 18 + pollCount * (72 / MAX_POLL);
      if (data.layered && data.layer_total) {
        var ld = data.layer_done || 0;
        var lt = data.layer_total || 1;
        pollProgress = 15 + (ld / lt) * 75;
        updateUI('分层试穿 ' + ld + '/' + lt + '（上装→下装→配饰）…');
      } else if (typeof data.progress === 'number') {
        pollProgress = data.progress;
      }
      setProgress(Math.min(92, pollProgress));

      if (data.status === 'success') {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        animateProgressTo100(function () {
          finishSuccess(data);
        });
      } else if (data.status === 'failed') {
        showError(data.error_msg || '生成失败，请重试');
      } else {
        updateUI('AI 正在生成试穿效果…');
      }
    }).catch(function (err) {
      console.warn('[TryonProgress] poll failed:', err.message);
    });
  }

  function animateProgressTo100(done) {
    if (tickTimer) {
      clearInterval(tickTimer);
      tickTimer = null;
    }
    progressCap = 100;
    var startedAt = Date.now();
    tickTimer = setInterval(function () {
      if (progress >= 100) {
        clearInterval(tickTimer);
        tickTimer = null;
        setProgress(100);
        updateUI('生成完成，即将展示…');
        var elapsed = Date.now() - startedAt;
        var waitMs = Math.max(0, 900 - elapsed);
        if (typeof done === 'function') {
          setTimeout(done, waitMs + 280);
        }
        return;
      }
      setProgress(progress + 1.5);
    }, 55);
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    doPoll();
    pollTimer = setInterval(doPoll, POLL_INTERVAL);
  }

  function finishSuccess(data) {
    stopTimers();
    setProgress(100);

    var state = Store.getState();
    Store.setState({
      tryon: Object.assign({}, state.tryon || {}, { task_uuid: taskUuid }),
      result: {
        loading: false,
        progress: 100,
        tipIndex: tipIndex,
        scene: data.scene || (state.tryon && state.tryon.scene) || '',
        demo: data.demo || false,
        status: 'success',
        tryon_id: data.tryon_id || null,
        favorited: false,
        result_url: data.result_url || '',
        scene_image_url: data.scene_image_url || '',
        error_msg: ''
      }
    });

    if (MMZ.DemoBadge) {
      MMZ.DemoBadge.setDemo(data.demo || false);
    }

    removeOverlay();
    Router.navigate('result');
  }

  function start(body) {
    if (!body) return;
    if (active) return;

    var currentRun = ++runId;
    renderOverlay();
    overlayEl._retryBody = body;
    startTipRotation();
    startTick();

    request.post('/api/tryon', body, { timeout: 90000 }).then(function (data) {
      if (currentRun !== runId || !overlayEl) return;

      taskUuid = data.task_uuid || '';
      if (!taskUuid) {
        showError('未获取到任务 ID');
        return;
      }

      progressCap = 95;
      setProgress(Math.max(progress, 20));
      updateUI(data.layered ? '分层 AI 试穿已提交…' : '任务已提交，AI 生成中…');
      startTick();
      startPolling();
    }).catch(function (err) {
      if (currentRun !== runId) return;
      showError(err.message || '提交失败，请重试');
    });
  }

  function cancel(silent) {
    runId++;
    removeOverlay();
    if (!silent && MMZ.Loading) {
      MMZ.Loading.toast('已取消试穿');
    }
  }

  function isActive() {
    return active || !!overlayEl;
  }

  return {
    start: start,
    cancel: cancel,
    isActive: isActive
  };
})();

</script>

<script>
/**
 * 妈妈装 H5 · 首页推荐卡片组件（纯渲染，无状态）
 * 依赖：MMZ.config, MMZ.Store, MMZ.Router, MMZ.request, MMZ.Loading
 *
 * 职责：
 *   暴露 render(data) → 返回推荐卡片 HTML 字符串
 *   暴露 load(containerSelector) → 从后端加载并渲染到指定容器
 *
 * 三态互斥渲染（对应后端 card_type）：
 *   1. tryon_remind — 最近试穿：展示效果图 + 衣服列表 + 「再试一次/分享」
 *   2. ootd — 今日穿搭推荐：展示 3 套穿搭横滑 + 「一键试穿」
 *   3. empty — 兜底引导：引导去衣柜
 *
 * data-action 事件（由 home.js bindEvents 统一委托）：
 *   rc-retry         — 再试一次（跳试衣台，带 tryon_id）
 *   rc-share         — 分享试衣效果（保存图片 / 分享到爱搭）
 *   rc-tryon-outfit  — 穿搭套装一键试穿（data-outfit-id）
 *   rc-go-wardrobe   — 去衣柜
 *   rc-dismiss-remind — 关闭试穿提醒条（data-tryon-id）
 */
window.MMZ = window.MMZ || {};

MMZ.RecommendCard = (function () {
  'use strict';

  var config = MMZ.config;
  var request = MMZ.request;
  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var Loading = MMZ.Loading;

  /**
   * 主渲染入口：根据 card_type 分发到对应渲染函数
   * @param {object} data - 后端返回的推荐卡片数据
   * @returns {string} HTML 字符串
   */
  function render(data) {
    if (!data || !data.card_type) {
      return '';
    }

    switch (data.card_type) {
      case 'tryon_remind':
        return renderTryonRemind(data);
      case 'ootd':
        return renderOOTD(data);
      case 'empty':
        return renderEmpty(data);
      default:
        return '';
    }
  }

  // ========================================================================
  // 方案 B: 最近试穿未下单（tryon_remind）
  // ========================================================================

  /**
   * 渲染「最近试穿未下单」卡片
   * @param {object} data - TryonRemindData
   * @returns {string} HTML
   */
  function renderTryonRemind(data) {
    var imgUrlVal = imgUrl(data.result_image_url);
    var bgStyle = imgUrlVal ? ' style="background-image:url(' + imgUrlVal + ')"' : '';
    var hint = escapeHtml(data.hint || '效果不错，分享给朋友看看？');
    var scene = escapeHtml(data.scene || '');
    var garments = data.garments || [];

    var html = '';
    html += '<div class="recommend-card recommend-card-tryon">';

    // 天气标签
    html += renderWeatherBadge(data.weather);

    // 试穿效果图
    html += '<div class="rc-tryon-image"' + bgStyle + '>';
    if (!imgUrlVal) {
      html += '<div class="rc-tryon-placeholder">' + MMZ.Icon.render('dress', 'line', 48) + '</div>';
    }
    html += '</div>';

    // 引导文案
    html += '<div class="rc-tryon-hint">' + hint + '</div>';

    // 场景标签
    if (scene) {
      html += '<div class="rc-tryon-scene">' + scene + '</div>';
    }

    // 关联服装列表
    if (garments.length > 0) {
      html += '<div class="rc-tryon-garments">';
      garments.forEach(function (g) {
        var gImg = imgUrl(g.image_url);
        html +=
          '<div class="rc-garment-chip" title="' + escapeHtml(g.name) + '">' +
            '<div class="rc-garment-thumb"' +
              (gImg ? ' style="background-image:url(' + gImg + ')"' : '') +
            '></div>' +
            '<span class="rc-garment-name">' + escapeHtml(g.name) + '</span>' +
          '</div>';
      });
      html += '</div>';
    }

    // 操作按钮
    html += '<div class="rc-actions">';
    html += '<button class="rc-btn rc-btn-primary" data-action="rc-retry" data-tryon-id="' + data.tryon_id + '">再试一次</button>';
    html += renderShareButton(data);
    html += '</div>';

    html += '</div>';
    return html;
  }

  function isRemindDismissed(tryonId) {
    if (!tryonId) return false;
    try {
      return localStorage.getItem('mmz_remind_dismiss_' + tryonId) === '1';
    } catch (err) {
      return false;
    }
  }

  function dismissRemind(tryonId) {
    if (!tryonId) return;
    try {
      localStorage.setItem('mmz_remind_dismiss_' + tryonId, '1');
    } catch (err) {
      /* ignore */
    }
  }

  function renderTryonRemindStrip(data) {
    if (!data || !data.tryon_id) return '';
    if (isRemindDismissed(data.tryon_id)) return '';

    var imgUrlVal = imgUrl(data.result_image_url);
    var bgStyle = imgUrlVal ? ' style="background-image:url(' + imgUrlVal + ')"' : '';
    var hint = escapeHtml(data.hint || '效果不错，分享给朋友看看？');

    var html = '';
    html += '<div class="rc-remind-strip" data-tryon-id="' + data.tryon_id + '">';
    html += '<button type="button" class="rc-remind-close" data-action="rc-dismiss-remind" data-tryon-id="' + data.tryon_id + '" aria-label="关闭提醒">';
    html += MMZ.Icon.render('close', 'line', 14);
    html += '</button>';
    html += '<div class="rc-remind-thumb"' + bgStyle + '></div>';
    html += '<div class="rc-remind-body">';
    html += '<div class="rc-remind-hint">' + hint + '</div>';
    html += '<div class="rc-remind-actions">';
    html += '<button type="button" class="rc-remind-btn rc-remind-btn-primary" data-action="rc-retry" data-tryon-id="' + data.tryon_id + '">再试</button>';
    html += renderShareButton(data, 'rc-remind-btn rc-remind-btn-outline');
    html += '</div>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  /**
   * 渲染「今日穿搭推荐」卡片
   * @param {object} data - OOTDData
   * @returns {string} HTML
   */
  function renderOOTD(data) {
    var title = escapeHtml(data.title || '今日推荐');
    var subtitle = escapeHtml(data.subtitle || '');
    var outfits = data.outfits || [];

    var html = '';
    html += '<div class="recommend-card recommend-card-ootd">';

    html += renderWeatherBadge(data.weather);

    if (data.tryon_remind) {
      html += renderTryonRemindStrip(data.tryon_remind);
    }

    html += '<div class="rc-ootd-header">';
    html += '<div class="rc-ootd-title">' + title + '</div>';
    if (subtitle) {
      html += '<div class="rc-ootd-subtitle">' + subtitle + '</div>';
    }
    html += '</div>';

    // 今日推荐：三列横排，间距随屏宽自适应
    html += '<div class="rc-ootd-grid">';
    outfits.slice(0, 3).forEach(function (o) {
      var cover = imgUrl(o.cover_url);
      var name = escapeHtml(o.name || '');
      html +=
        '<div class="rc-ootd-card">' +
          '<div class="rc-ootd-cover"' +
            (cover ? ' style="background-image:url(' + cover + ')"' : '') +
          '></div>' +
          '<div class="rc-ootd-name">' + name + '</div>' +
          '<button type="button" class="rc-ootd-action" data-action="rc-tryon-outfit" data-outfit-id="' + o.id + '" data-garment-ids=\'' + JSON.stringify(o.garment_ids || []) + '\'>试穿</button>' +
        '</div>';
    });
    html += '</div>';

    html += '</div>';
    return html;
  }

  // ========================================================================
  // 兜底：empty
  // ========================================================================

  /**
   * 渲染兜底引导卡片
   * @param {object} data - EmptyData
   * @returns {string} HTML
   */
  function renderEmpty(data) {
    var title = escapeHtml(data.title || '宝贝的衣柜还在等待');
    var subtitle = escapeHtml(data.subtitle || '先去衣柜添加几件单品吧');

    var html = '';
    html += '<div class="recommend-card recommend-card-empty">';

    // 天气标签
    html += renderWeatherBadge(data.weather);

    // 引导内容
    html += '<div class="rc-empty-icon">' + MMZ.Icon.render('wardrobe', 'line', 48) + '</div>';
    html += '<div class="rc-empty-title">' + title + '</div>';
    html += '<div class="rc-empty-subtitle">' + subtitle + '</div>';

    // 操作按钮
    html += '<div class="rc-actions">';
    html += '<button class="rc-btn rc-btn-primary" data-action="rc-go-wardrobe">去衣柜</button>';
    html += '</div>';

    html += '</div>';
    return html;
  }

  // ========================================================================
  // 公共：天气标签
  // ========================================================================

  /**
   * 渲染天气信息小标签
   * @param {object} weather - { temp, text, source }
   * @returns {string} HTML
   */
  function renderWeatherBadge(weather) {
    if (!weather) return '';
    var temp = weather.temp || '';
    var text = escapeHtml(weather.text || '');
    return '<div class="rc-weather-badge">' + temp + '°C · ' + text + '</div>';
  }

  // ========================================================================
  // 数据加载（供 home.js 调用）
  // ========================================================================

  /**
   * 从后端加载推荐卡片数据并渲染到容器
   * GET /api/home/recommend-card → { card_type, weather, ... }
   *
   * @param {string} containerSelector - 容器选择器（如 '#recommendCardWrap'）
   * @returns {Promise} resolve 时返回 data
   */
  function load(containerSelector) {
    return request.get('/api/home/recommend-card').then(function (data) {
      Store.setState({ recommendCard: data });
      var container = document.querySelector(containerSelector);
      if (container) {
        container.innerHTML = render(data);
      }
      return data;
    }).catch(function (err) {
      console.warn('[RecommendCard] load failed:', err.message || err);
      var container = document.querySelector(containerSelector);
      if (container) {
        container.innerHTML = '<div class="scene-empty">今日推荐暂不可用</div>';
      }
      return null;
    });
  }

  // ========================================================================
  // 工具函数
  // ========================================================================

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttr(str) {
    return escapeHtml(str).replace(/`/g, '&#96;');
  }

  function renderShareButton(data, btnClass) {
    var cls = btnClass || 'rc-btn rc-btn-outline';
    return (
      '<button type="button" class="' + cls + '" data-action="rc-share"' +
        ' data-tryon-id="' + data.tryon_id + '"' +
        ' data-result-url="' + escapeAttr(data.result_image_url || '') + '"' +
        ' data-scene="' + escapeAttr(data.scene || '') + '">分享</button>'
    );
  }

  return {
    render: render,
    load: load,
    dismissRemind: dismissRemind,
    isRemindDismissed: isRemindDismissed
  };
})();

</script>

<script>
/**
 * 妈妈装 H5 · 首页
 * 依赖：MMZ.Store, MMZ.Router, MMZ.request, MMZ.config, MMZ.Loading
 *
 * 板块：
 *   - 宝贝档案卡片
 *   - 今日适合（GET /api/home/recommend-card）
 *   - 爱豆精选竖向列表（GET /api/featured/list）
 *   - 推荐打卡（GET /api/home/checkin-spots）
 */
window.MMZ = window.MMZ || {};

MMZ.Home = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;

  var CHECKIN_PAGE_SIZE = 6;
  var checkinPager = {
    lat: null,
    lng: null,
    offset: 0,
    hasMore: false,
    loading: false
  };

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function renderFeaturedItems(items, opts) {
    opts = opts || {};
    var html = '';
    if (!items || items.length === 0) {
      if (opts.loaded) {
        return '<div class="scene-empty">暂无精选内容</div>';
      }
      return '<div class="scene-empty">精选加载中…</div>';
    }
    items.forEach(function (p) {
      var img = imgUrl(p.image_url);
      var name = escapeHtml(p.author_name || p.anonymous_name || '神秘宝妈');
      var desc = escapeHtml(p.description || '');
      var likes = p.like_count || 0;
      html +=
        '<div class="featured-row" data-action="open-post" data-post-id="' + p.id + '">' +
          '<div class="featured-row-thumb" style="background-image:url(' + img + ')"></div>' +
          '<div class="featured-row-body">' +
            '<div class="featured-row-author">' + name + '</div>' +
            '<div class="featured-row-desc">' + desc + '</div>' +
            '<div class="featured-row-meta">' +
              MMZ.Icon.render('heart', 'line', 14) + ' ' + likes +
            '</div>' +
          '</div>' +
          '<div class="featured-row-arrow">›</div>' +
        '</div>';
    });
    return html;
  }

  function renderCheckinItem(spot, location) {
    var img = imgUrl(spot.image_url);
    var heat = spot.heat >= 1000 ? (spot.heat / 1000).toFixed(1) + 'k' : spot.heat;
    var distText = spot.distance_km > 0 ? spot.distance_km + 'km' : '';
    var locParts = [];
    if (spot.city) locParts.push(spot.city);
    if (spot.district) locParts.push(spot.district);
    if (distText) locParts.push(distText);
    var locLine = locParts.join(' · ') || (location && location.city) || '';

    return (
      '<div class="checkin-card" data-action="open-checkin-detail" data-spot-id="' + spot.id + '" data-scene="' + escapeAttr(spot.scene || 'park') + '">' +
        '<div class="checkin-card-thumb" style="background-image:url(' + img + ')">' +
          '<span class="checkin-heat">' + MMZ.Icon.render('fire', 'line', 12) + ' ' + heat + '</span>' +
        '</div>' +
        '<div class="checkin-card-body">' +
          '<div class="checkin-card-name">' + escapeHtml(spot.name) + '</div>' +
          '<div class="checkin-card-loc">' + escapeHtml(locLine) + '</div>' +
        '</div>' +
      '</div>'
    );
  }

  function renderCheckinItems(items, location) {
    var html = '';
    items.forEach(function (spot) {
      html += renderCheckinItem(spot, location);
    });
    if (items.length === 0) {
      html = '<div class="checkin-empty scene-empty">打卡推荐加载中…</div>';
    }
    return html;
  }

  function renderCheckinHeader(location) {
    var sub = '附近热度高';
    if (location && location.city) {
      if (location.source === 'gps') {
        sub = location.city + ' · 已定位';
      } else if (location.source === 'gps_fallback') {
        sub = location.city + ' · 精选';
      } else {
        sub = location.city;
      }
    }
    return sub;
  }

  function render() {
    var state = Store.getState();
    var child = state.child;
    var featured = state.featuredList || [];
    var checkin = state.checkinSpots || [];
    var checkinLoc = state.checkinLocation || null;
    var hasChild = child && child.id;

    var html = '';
    html += '<div class="page page-home">';

    if (hasChild) {
      var photo = imgUrl(child.avatar_url || child.standard_photo_processed_url || child.standard_photo_url);
      var avatarStyle = photo ? ' style="background-image:url(' + photo + ')"' : '';
      html +=
        '<div class="hero-card" data-action="go-register">' +
          '<div class="hero-avatar"' + avatarStyle + '></div>' +
          '<div class="hero-info">' +
            '<div class="hero-name">' + escapeHtml(child.name || '小宝') + '</div>' +
            '<div class="hero-meta">' + formatMeta(child) + '</div>' +
          '</div>' +
          '<div class="hero-edit">编辑</div>' +
        '</div>';
    } else {
      html +=
        '<div class="hero-card hero-card-empty" data-action="go-register">' +
          '<div class="hero-add-icon">＋</div>' +
          '<div class="hero-add-text">添加宝贝档案</div>' +
          '<div class="hero-add-desc">上传一张正面全身照即可开始</div>' +
        '</div>';
    }

    html += '<div id="recommendCardWrap" class="rc-skeleton">推荐加载中…</div>';

    html += '<div class="section-header home-section-header"><span>爱豆精选</span></div>';
    html += '<div class="featured-list" id="featuredList">';
    html += renderFeaturedItems(featured);
    html += '</div>';

    html += '<div class="section-header home-section-header checkin-section-header">';
    html += '<div class="checkin-section-title">';
    html += '<span>推荐打卡</span>';
    html += '<span class="section-sub" id="checkinSub">' + escapeHtml(renderCheckinHeader(checkinLoc)) + '</span>';
    html += '</div>';
    html += '<button type="button" class="more checkin-more-btn is-hidden" id="checkinMoreBtn" data-action="load-more-checkin">更多</button>';
    html += '</div>';
    html += '<div class="checkin-list" id="checkinList">';
    html += renderCheckinItems(checkin, checkinLoc);
    html += '</div>';

    html += '</div>';
    return html;
  }

  function formatMeta(child) {
    var parts = [];
    if (child.age) parts.push(child.age + '岁');
    if (child.height) parts.push(child.height + 'cm');
    if (child.weight) parts.push(child.weight + 'kg');
    return parts.join(' · ') || '点击编辑完善信息';
  }

  function onMount() {
    bindEvents();
    request.ensureLogin().then(function () {
      loadRecommendCard();
      loadFeatured();
      loadCheckinWithGeo();
    }).catch(function (err) {
      showHomeLoadError(err.message || '加载失败');
    });
  }

  function showHomeLoadError(message) {
    var wrap = document.getElementById('recommendCardWrap');
    if (wrap) {
      wrap.innerHTML = '<div class="scene-empty">' + escapeHtml(message) + '</div>';
    }
    var featuredEl = document.getElementById('featuredList');
    if (featuredEl) {
      featuredEl.innerHTML = '<div class="scene-empty">精选暂不可用</div>';
    }
    var checkinEl = document.getElementById('checkinList');
    if (checkinEl) {
      checkinEl.innerHTML = '<div class="checkin-empty scene-empty">打卡推荐暂不可用</div>';
    }
    var subEl = document.getElementById('checkinSub');
    if (subEl) subEl.textContent = '加载失败';
    Loading.toast(message);
  }

  function loadRecommendCard() {
    if (MMZ.RecommendCard && typeof MMZ.RecommendCard.load === 'function') {
      MMZ.RecommendCard.load('#recommendCardWrap');
    }
  }

  function loadFeatured() {
    request.get('/api/featured/list').then(function (data) {
      var items = (data && data.items) || [];
      Store.setState({ featuredList: items });
      var listEl = document.getElementById('featuredList');
      if (listEl) {
        listEl.innerHTML = renderFeaturedItems(items, { loaded: true });
      }
    }).catch(function (err) {
      Loading.toast(err.message);
      var listEl = document.getElementById('featuredList');
      if (listEl) {
        listEl.innerHTML = '<div class="scene-empty">精选暂不可用</div>';
      }
    });
  }

  function updateCheckinMoreBtn() {
    var btn = document.getElementById('checkinMoreBtn');
    if (!btn) return;
    if (checkinPager.hasMore && !checkinPager.loading) {
      btn.classList.remove('is-hidden');
      btn.textContent = '更多';
    } else if (checkinPager.loading) {
      btn.classList.remove('is-hidden');
      btn.textContent = '加载中…';
    } else {
      btn.classList.add('is-hidden');
    }
  }

  function loadCheckinSpots(lat, lng, append) {
    if (checkinPager.loading) return;

    if (!append) {
      checkinPager.offset = 0;
      checkinPager.lat = lat != null ? lat : null;
      checkinPager.lng = lng != null ? lng : null;
    }

    checkinPager.loading = true;
    updateCheckinMoreBtn();

    var query = '?limit=' + CHECKIN_PAGE_SIZE + '&offset=' + checkinPager.offset;
    var useLat = checkinPager.lat;
    var useLng = checkinPager.lng;
    if (useLat != null && useLng != null) {
      query += '&lat=' + encodeURIComponent(useLat) + '&lng=' + encodeURIComponent(useLng);
    }

    request.get('/api/home/checkin-spots' + query).then(function (data) {
      checkinPager.loading = false;
      var items = (data && data.items) || [];
      var location = (data && data.location) || null;
      checkinPager.hasMore = !!(data && data.has_more);
      checkinPager.offset += items.length;

      var merged = append
        ? (Store.getState().checkinSpots || []).concat(items)
        : items;
      Store.setState({ checkinSpots: merged, checkinLocation: location });

      var listEl = document.getElementById('checkinList');
      var subEl = document.getElementById('checkinSub');
      if (listEl) {
        if (append) {
          var emptyEl = listEl.querySelector('.checkin-empty');
          if (emptyEl) emptyEl.remove();
          listEl.insertAdjacentHTML('beforeend', renderCheckinItems(items, location));
        } else {
          listEl.innerHTML = items.length
            ? renderCheckinItems(items, location)
            : '<div class="checkin-empty scene-empty">暂无打卡推荐</div>';
        }
      }
      if (subEl) {
        subEl.textContent = renderCheckinHeader(location);
      }
      updateCheckinMoreBtn();
    }).catch(function () {
      checkinPager.loading = false;
      updateCheckinMoreBtn();
      if (!append) {
        var listEl = document.getElementById('checkinList');
        if (listEl) {
          listEl.innerHTML = '<div class="checkin-empty scene-empty">暂无打卡推荐</div>';
        }
      } else {
        Loading.toast('加载失败，请重试');
      }
    });
  }

  function loadCheckinWithGeo() {
    // 先加载全国精选，不等待 GPS（避免「定位中…」一直卡住）
    loadCheckinSpots(null, null, false);

    if (!navigator.geolocation) return;

    var subEl = document.getElementById('checkinSub');
    if (subEl) subEl.textContent = '定位中…';

    navigator.geolocation.getCurrentPosition(
      function (pos) {
        loadCheckinSpots(pos.coords.latitude, pos.coords.longitude, false);
      },
      function () {
        if (subEl) subEl.textContent = '全国热门 · 未授权定位';
      },
      { enableHighAccuracy: false, timeout: 5000, maximumAge: 300000 }
    );
  }

  function bindEvents() {
    var app = document.getElementById('app');
    if (!app) return;

    var clickHandler = function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'go-register':
          Router.navigate('register');
          break;
        case 'go-tryon':
          if (!Store.getState().child.id) {
            Loading.toast('请先添加宝贝档案');
            Router.navigate('register');
          } else {
            Router.navigate('tryon', 'tryon');
          }
          break;
        case 'go-wardrobe':
          Router.navigate('wardrobe', 'wardrobe');
          break;
        case 'go-aid':
          Store.setState({ aidTab: 'hot' });
          Router.navigate('aid');
          break;
        case 'rc-retry':
          if (!Store.getState().child.id) {
            Loading.toast('请先添加宝贝档案');
            Router.navigate('register');
          } else {
            Router.navigate('tryon', 'tryon');
          }
          break;
        case 'rc-share':
          if (MMZ.WechatShare) {
            MMZ.WechatShare.shareTryonResult({
              tryonId: target.getAttribute('data-tryon-id'),
              resultImageUrl: target.getAttribute('data-result-url') || '',
              scene: target.getAttribute('data-scene') || ''
            });
          } else {
            Loading.toast('分享功能加载中，请刷新后重试');
          }
          break;
        case 'rc-dismiss-remind':
          var dismissTryonId = target.getAttribute('data-tryon-id');
          if (MMZ.RecommendCard && MMZ.RecommendCard.dismissRemind) {
            MMZ.RecommendCard.dismissRemind(dismissTryonId);
          }
          var remindStrip = target.closest('.rc-remind-strip');
          if (remindStrip) {
            remindStrip.remove();
          }
          break;
        case 'rc-tryon-outfit':
          if (!Store.getState().child.id) {
            Loading.toast('请先添加宝贝档案');
            Router.navigate('register');
          } else {
            var outfitId = target.getAttribute('data-outfit-id');
            if (MMZ.Tryon && MMZ.Tryon.beginOutfitBuilder) {
              MMZ.Tryon.beginOutfitBuilder(parseInt(outfitId, 10), '试同款搭配', { redecompose: true });
            } else {
              Router.navigate('tryon', 'tryon');
            }
          }
          break;
        case 'rc-go-wardrobe':
          Router.navigate('wardrobe', 'wardrobe');
          break;
        case 'open-checkin-detail':
          var spotId = parseInt(target.getAttribute('data-spot-id'), 10);
          if (spotId) {
            MMZ.CheckinDetail.open(spotId, 'home');
          }
          break;
        case 'load-more-checkin':
          if (checkinPager.hasMore && !checkinPager.loading) {
            loadCheckinSpots(checkinPager.lat, checkinPager.lng, true);
          }
          break;
        case 'open-post':
          var postId = parseInt(target.getAttribute('data-post-id'), 10);
          MMZ.PostDetail.open(postId, 'home');
          break;
        default:
          break;
      }
    };
    window.MMZ._pageClickHandler = clickHandler;
    app.addEventListener('click', clickHandler);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return String(str).replace(/"/g, '&quot;');
  }

  return {
    render: render,
    onMount: onMount
  };
})();

</script>

<!-- pages/register.js -->
<script>
/**
 * 妈妈装 H5 · 添加/编辑孩子档案
 * 依赖：MMZ.Store, MMZ.Router, MMZ.request, MMZ.config, MMZ.Loading
 *
 * 功能：
 *   - 表单：昵称、性别（0女/1男）、生日(YYYY-MM-DD)、身高cm、体重kg
 *   - 新建模式：需要上传标准照，POST /api/child/register (FormData)
 *   - 编辑模式：从 Store.child 预填，PUT /api/child/{id} (JSON)
 *
 * 接口：
 *   POST /api/child/register (multipart: photo + name + gender + birthdate + height + weight)
 *     → { child_id, name, standard_photo_url, standard_photo_processed_url, ... }
 *   PUT /api/child/{child_id} (JSON: { name, gender, birthdate, height, weight })
 *     → { child_id, name }
 *
 * 校验：
 *   - 昵称必填
 *   - 生日不能晚于今天
 *   - 身高 50-200
 *   - 体重 5-100
 */
window.MMZ = window.MMZ || {};

MMZ.Register = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;

  /** 当前选中的照片文件（仅新建模式） */
  var selectedFile = null;
  /** 编辑模式标记 */
  var isEditMode = false;
  /** 预置卡通头像列表 */
  var presetAvatars = [];
  /** 当前选中的头像 URL（空=不使用卡通头像） */
  var selectedAvatar = '';

  /**
   * 渲染注册/编辑页
   * @returns {string}
   */
  function render() {
    var child = Store.getState().child;
    isEditMode = !!(child && child.id);
    selectedFile = null;

    var name = child.name || '';
    var gender = child.gender !== undefined ? child.gender : 0;
    var birthdate = child.birthdate || '';
    var height = child.height || '';
    var weight = child.weight || '';
    selectedAvatar = child.avatar_url || '';

    var html = '';
    html += '<div class="page page-register">';

    // 标题由顶部 nav 展示，此处不再重复

    // ===== 头像选择 =====
    html +=
      '<div class="avatar-picker-section">' +
        '<div class="avatar-picker-label">选择宝贝头像</div>' +
        '<div class="avatar-picker-row" id="avatarPickerRow">' +
          renderAvatarOptions() +
        '</div>' +
      '</div>';

    // ===== 照片上传区（仅新建模式） =====
    if (!isEditMode) {
      html +=
        '<div class="photo-upload-area" id="photoUploadArea">' +
          '<div class="photo-upload-placeholder">' +
            '<div class="photo-upload-icon">' + MMZ.Icon.render('photo', 'line', 32) + '</div>' +
            '<div class="photo-upload-text">点击上传宝贝正面全身照</div>' +
            '<div class="photo-upload-tip">支持 JPG / PNG，请上传完整全身照（含头部和脚部）</div>' +
          '</div>' +
          '<input type="file" id="photoInput" accept="image/jpeg,image/png" style="display:none" />' +
        '</div>';
    } else {
      // 编辑模式显示当前全身照
      var photoUrl = child.standard_photo_url || child.standard_photo_processed_url;
      if (photoUrl) {
        var fullUrl = photoUrl.indexOf('http') === 0 ? photoUrl : config.API_BASE + photoUrl;
        html +=
          '<div class="photo-upload-area has-photo" style="background-image:url(' + fullUrl + ')"></div>';
      }
    }

    // ===== 表单字段 =====
    html += '<div class="form-list">';

    // 昵称
    html +=
      '<div class="form-item">' +
        '<label class="form-label">昵称</label>' +
        '<input class="form-input" id="regName" type="text" maxlength="32" placeholder="请输入宝贝昵称" value="' + escapeAttr(name) + '" />' +
      '</div>';

    // 性别
    html +=
      '<div class="form-item">' +
        '<label class="form-label">性别</label>' +
        '<div class="form-gender">' +
          '<div class="gender-option ' + (gender === 1 ? 'active' : '') + '" data-gender="1">' + MMZ.Icon.render('mine', 'line', 24) + ' 男孩</div>' +
          '<div class="gender-option ' + (gender === 0 ? 'active' : '') + '" data-gender="0">' + MMZ.Icon.render('mine', 'line', 24) + ' 女孩</div>' +
        '</div>' +
      '</div>';

    // 生日
    html +=
      '<div class="form-item">' +
        '<label class="form-label">生日</label>' +
        '<input class="form-input" id="regBirthdate" type="date" max="' + todayStr() + '" value="' + escapeAttr(birthdate) + '" />' +
      '</div>';

    // 身高
    html +=
      '<div class="form-item">' +
        '<label class="form-label">身高(cm)</label>' +
        '<input class="form-input" id="regHeight" type="number" min="50" max="200" placeholder="50-200" value="' + (height || '') + '" />' +
      '</div>';

    // 体重
    html +=
      '<div class="form-item">' +
        '<label class="form-label">体重(kg)</label>' +
        '<input class="form-input" id="regWeight" type="number" min="5" max="100" step="0.1" placeholder="5-100" value="' + (weight || '') + '" />' +
      '</div>';

    html += '</div>'; // .form-list

    // ===== 提交按钮 =====
    html +=
      '<button class="btn-primary btn-full btn-submit" id="regSubmit" data-action="submit">' +
        (isEditMode ? '保存修改' : '创建档案') +
      '</button>';

    html += '</div>'; // .page
    return html;
  }

  /**
   * 渲染头像选项（含「不使用」占位）
   */
  function renderAvatarOptions() {
    var html = '';
    // 「不使用」选项：显示真人照/默认
    html +=
      '<div class="avatar-option avatar-option-none' + (selectedAvatar ? '' : ' active') + '" data-avatar="">' +
        MMZ.Icon.render('close', 'line', 18) +
      '</div>';
    presetAvatars.forEach(function (a) {
      var url = imgUrl(a.url);
      var active = a.url === selectedAvatar ? ' active' : '';
      html +=
        '<div class="avatar-option' + active + '" data-avatar="' + escapeAttr(a.url) + '" title="' + escapeAttr(a.name || '') + '">' +
          '<div class="avatar-option-img" style="background-image:url(' + url + ')"></div>' +
        '</div>';
    });
    return html;
  }

  /**
   * 页面挂载：绑定事件
   */
  function onMount() {
    var navTitle = document.getElementById('navTitle');
    if (navTitle) {
      navTitle.textContent = isEditMode ? '编辑宝贝信息' : '创建宝贝档案';
    }
    bindPhotoUpload();
    bindGenderSelect();
    bindAvatarPicker();
    bindSubmit();
    loadAvatars();
  }

  /**
   * 加载预置头像
   */
  function loadAvatars() {
    request.get('/api/child/avatars').then(function (data) {
      presetAvatars = (data && data.items) || [];
      var row = document.getElementById('avatarPickerRow');
      if (row) row.innerHTML = renderAvatarOptions();
    }).catch(function () {});
  }

  /**
   * 绑定头像选择（事件委托）
   */
  function bindAvatarPicker() {
    var row = document.getElementById('avatarPickerRow');
    if (!row) return;
    row.addEventListener('click', function (e) {
      var opt = e.target.closest('[data-avatar]');
      if (!opt) return;
      selectedAvatar = opt.getAttribute('data-avatar') || '';
      row.querySelectorAll('.avatar-option').forEach(function (el) {
        el.classList.toggle('active', el === opt);
      });
    });
  }

  /**
   * 绑定照片上传
   */
  function bindPhotoUpload() {
    var area = document.getElementById('photoUploadArea');
    var input = document.getElementById('photoInput');
    if (!area || !input) return;

    area.addEventListener('click', function () {
      input.click();
    });

    input.addEventListener('change', function () {
      if (input.files && input.files[0]) {
        selectedFile = input.files[0];
        var reader = new FileReader();
        reader.onload = function (e) {
          area.classList.add('has-photo');
          var placeholder = area.querySelector('.photo-upload-placeholder');
          if (placeholder) placeholder.style.display = 'none';
          var preview = area.querySelector('.photo-upload-preview');
          if (!preview) {
            preview = document.createElement('img');
            preview.className = 'photo-upload-preview';
            preview.alt = '宝贝照片预览';
            area.appendChild(preview);
          }
          preview.src = e.target.result;
          area.style.backgroundImage = '';
        };
        reader.readAsDataURL(selectedFile);
      }
    });
  }

  /**
   * 绑定性别选择
   */
  function bindGenderSelect() {
    var options = document.querySelectorAll('.gender-option');
    options.forEach(function (opt) {
      opt.addEventListener('click', function () {
        options.forEach(function (o) { o.classList.remove('active'); });
        opt.classList.add('active');
      });
    });
  }

  /**
   * 绑定提交按钮
   */
  function bindSubmit() {
    var btn = document.getElementById('regSubmit');
    if (!btn) return;
    btn.addEventListener('click', handleSubmit);
  }

  /**
   * 提交表单
   */
  function handleSubmit() {
    var name = (document.getElementById('regName') || {}).value || '';
    var birthdate = (document.getElementById('regBirthdate') || {}).value || '';
    var height = parseInt((document.getElementById('regHeight') || {}).value || '0', 10);
    var weight = parseFloat((document.getElementById('regWeight') || {}).value || '0');

    var genderEl = document.querySelector('.gender-option.active');
    var gender = genderEl ? parseInt(genderEl.getAttribute('data-gender'), 10) : 0;

    // ===== 校验 =====
    name = name.trim();
    if (!name) {
      Loading.toast('请输入昵称');
      return;
    }

    if (!isEditMode && !selectedFile) {
      Loading.toast('请上传宝贝照片');
      return;
    }

    if (birthdate) {
      var today = new Date();
      var bd = new Date(birthdate);
      if (bd > today) {
        Loading.toast('生日不能晚于今天');
        return;
      }
    }

    if (height && (height < 50 || height > 200)) {
      Loading.toast('身高请在 50-200cm 之间');
      return;
    }

    if (weight && (weight < 5 || weight > 100)) {
      Loading.toast('体重请在 5-100kg 之间');
      return;
    }

    // ===== 提交 =====
    if (isEditMode) {
      doUpdate(name, gender, birthdate, height, weight);
    } else {
      doRegister(name, gender, birthdate, height, weight);
    }
  }

  /**
   * 新建：POST /api/child/register (FormData)
   */
  function doRegister(name, gender, birthdate, height, weight) {
    Loading.show('正在创建档案…');

    var formData = new FormData();
    formData.append('photo', selectedFile);
    formData.append('name', name);
    formData.append('gender', String(gender));
    if (birthdate) formData.append('birthdate', birthdate);
    if (height) formData.append('height', String(height));
    if (weight) formData.append('weight', String(weight));
    if (selectedAvatar) formData.append('avatar_url', selectedAvatar);

    request.post('/api/child/register', null, { formData: formData }).then(function (data) {
      Loading.hide();
      var childData = {
        id: data.child_id,
        name: data.name,
        gender: gender,
        birthdate: birthdate,
        height: height || null,
        weight: weight || null,
        standard_photo_url: data.standard_photo_url || '',
        standard_photo_processed_url: data.standard_photo_processed_url || '',
        avatar_url: data.avatar_url || ''
      };
      Store.setState({ child: childData });
      localStorage.setItem(config.CHILD_ID_KEY, String(childData.id));
      localStorage.setItem(config.CHILD_CACHE_KEY, JSON.stringify(childData));
      Loading.toast('建档成功');
      setTimeout(function () {
        Router.navigate('home', 'home');
      }, 800);
    }).catch(function (err) {
      Loading.hide();
      Loading.toast(err.message);
    });
  }

  /**
   * 编辑：PUT /api/child/{id} (JSON)
   */
  function doUpdate(name, gender, birthdate, height, weight) {
    var child = Store.getState().child;
    Loading.show('正在保存…');

    var body = { name: name, gender: gender, avatar_url: selectedAvatar };
    if (birthdate) body.birthdate = birthdate;
    if (height) body.height = height;
    if (weight) body.weight = weight;

    request.put('/api/child/' + child.id, body).then(function (data) {
      Loading.hide();
      var updated = Object.assign({}, child, {
        name: name,
        gender: gender,
        birthdate: birthdate || child.birthdate,
        height: height || child.height,
        weight: weight || child.weight,
        avatar_url: selectedAvatar
      });
      Store.setState({ child: updated });
      localStorage.setItem(config.CHILD_ID_KEY, String(updated.id));
      localStorage.setItem(config.CHILD_CACHE_KEY, JSON.stringify(updated));
      Loading.toast('保存成功');
      setTimeout(function () {
        Router.navigate('home', 'home');
      }, 800);
    }).catch(function (err) {
      Loading.hide();
      Loading.toast(err.message);
    });
  }

  function todayStr() {
    var d = new Date();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }

  function escapeAttr(str) {
    if (!str) return '';
    return String(str).replace(/"/g, '&quot;');
  }

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  return {
    render: render,
    onMount: onMount
  };
})();

</script>
