<script>
/**
 * 妈妈装 H5 · 穿搭拆解工作台
 * 流程：导入整套 → 轮询拆解 → 分组多选 → 一键入柜 / 去试装
 * 优化：单品预览放大、一键全选/反选、置信度显示、进度动画
 */
window.MMZ = window.MMZ || {};

MMZ.Decompose = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;
  var GarmentMix = MMZ.GarmentMix;

  var pollTimer = null;
  var outfitData = null;
  var selectedIds = [];
  var categoryMap = {};
  var previewModal = null;  // 预览放大弹窗

  // 类目中文标签（与后端同步）
  var CATEGORY_LABELS = {
    'hat': '帽子', 'headwear': '头饰', 'glasses': '眼镜', 'sunglasses': '太阳镜',
    'hairpin': '发夹', 'hairband': '发带', 'accessory': '配饰',
    'scarf': '围巾', 'necklace': '项链', 'bracelet': '手链', 'watch': '手表',
    'ring': '戒指', 'earrings': '耳饰',
    'upper': '上衣', 'tshirt': 'T恤', 'shirt': '衬衫', 'blouse': '女士衬衫',
    'sweater': '毛衣', 'hoodie': '卫衣', 'cardigan': '开衫', 'vest': '马甲',
    'outer': '外套', 'coat': '大衣', 'jacket': '夹克', 'blazer': '西装',
    'windbreaker': '风衣', 'dress': '连衣裙', 'skirt': '半身裙',
    'belt': '腰带', 'bag': '包包', 'backpack': '背包', 'handbag': '手提包',
    'crossbody': '斜挎包', 'tote': '托特包', 'purse': '钱包',
    'lower': '裤子', 'pants': '长裤', 'jeans': '牛仔裤', 'shorts': '短裤',
    'leggings': '打底裤', 'trousers': '西裤', 'socks': '袜子',
    'shoes': '鞋子', 'sneakers': '运动鞋', 'boots': '靴子', 'sandals': '凉鞋',
    'heels': '高跟鞋', 'flats': '平底鞋'
  };

  function categoryLabel(cat) {
    if (!cat) return '服装';
    return CATEGORY_LABELS[cat.toLowerCase()] || cat;
  }

  function render() {
    var state = Store.getState().decompose || {};
    var html = '<div class="page page-decompose">';

    html += '<div class="decompose-header">';
    html += '<div class="decompose-title">' + escapeHtml(state.title || '穿搭拆解') + '</div>';
    html += '<div class="decompose-status" id="decomposeStatus">加载中…</div>';
    html += '</div>';

    html += '<div class="decompose-preview" id="decomposePreview"></div>';
    
    // 添加全选/反选按钮
    html += '<div class="decompose-toolbar" id="decomposeToolbar">';
    html += '<button type="button" class="btn-small" data-action="decompose-select-all">全选</button>';
    html += '<button type="button" class="btn-small" data-action="decompose-select-none">反选</button>';
    html += '<span class="decompose-method" id="decomposeMethod"></span>';
    html += '</div>';
    
    html += '<div class="decompose-groups" id="decomposeGroups"></div>';

    html += '<div class="decompose-footer" id="decomposeFooter">';
    html += '<div class="decompose-selected-count" id="decomposeCount">已选 0 件</div>';
    html += '<div class="decompose-actions">';
    html += '<button type="button" class="btn-secondary" data-action="decompose-add-wardrobe" disabled>加入衣柜</button>';
    html += '<button type="button" class="btn-primary" data-action="decompose-tryon" disabled>下一步：模特搭配</button>';
    html += '</div>';
    html += '</div>';

    // 预览放大弹窗
    html += '<div class="decompose-preview-modal" id="decomposePreviewModal" style="display:none">';
    html += '<div class="decompose-preview-content">';
    html += '<img id="decomposePreviewImg" src="" alt="单品预览">';
    html += '<div class="decompose-preview-info" id="decomposePreviewInfo"></div>';
    html += '<button type="button" class="decompose-preview-close" data-action="decompose-close-preview">×</button>';
    html += '</div>';
    html += '</div>';

    html += '</div>';
    return html;
  }

  function onMount() {
    var state = Store.getState().decompose || {};
    if (!state.outfitId) {
      Loading.toast('缺少搭配 ID');
      Router.navigate('tryon', 'tryon');
      return;
    }
    selectedIds = (state.selectedIds || []).slice();
    bindEvents();
    loadOutfit(state.outfitId);
  }

  function cleanup() {
    stopPoll();
  }

  function stopPoll() {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }

  function loadOutfit(outfitId) {
    request.get('/api/outfits/' + outfitId).then(function (resp) {
      var item = (resp && resp.item) ? resp.item : resp;
      outfitData = item;
      categoryMap = {};
      (item.garments || []).forEach(function (g) {
        categoryMap[g.id] = g.category;
      });
      if (selectedIds.length === 0 && item.garments && item.garments.length) {
        selectedIds = item.garments.map(function (g) { return g.id; });
      }
      renderContent();
      var status = item.decompose_status || 'done';
      if (status === 'pending' || status === 'processing') {
        startPoll(outfitId);
      } else {
        stopPoll();
      }
    }).catch(function (err) {
      Loading.toast(err.message || '加载失败');
    });
  }

  function startPoll(outfitId) {
    stopPoll();
    pollTimer = setInterval(function () {
      request.get('/api/outfits/' + outfitId).then(function (resp) {
        var item = (resp && resp.item) ? resp.item : resp;
        outfitData = item;
        categoryMap = {};
        (item.garments || []).forEach(function (g) {
          categoryMap[g.id] = g.category;
        });
        renderContent();
        var status = item.decompose_status || 'done';
        if (status === 'done' || status === 'failed') {
          stopPoll();
          if (status === 'failed') {
            Loading.toast('拆解失败，请重新上传');
          }
        }
      }).catch(function () { /* 轮询静默 */ });
    }, 2000);
  }

  function statusText(status, method) {
    var map = {
      pending: '等待拆解…',
      processing: method === 'vlm' ? 'VLM 精准识别单品中…' : '正在识别单品…',
      done: method === 'vlm' ? 'VLM 拆解完成，请选择单品' : '拆解完成，请选择单品',
      failed: '拆解失败'
    };
    return map[status] || status;
  }

  function renderContent() {
    if (!outfitData) return;

    var statusEl = document.getElementById('decomposeStatus');
    if (statusEl) {
      statusEl.textContent = statusText(outfitData.decompose_status || 'done', outfitData.decompose_method);
    }

    var previewEl = document.getElementById('decomposePreview');
    if (previewEl && outfitData.cover_url) {
      previewEl.innerHTML =
        '<div class="decompose-cover" style="background-image:url(' + imgUrl(outfitData.cover_url) + ')"></div>';
    }

    // 显示拆解方法
    var methodEl = document.getElementById('decomposeMethod');
    if (methodEl) {
      var method = outfitData.decompose_method || 'zone';
      methodEl.textContent = method === 'vlm' ? 'VLM精准识别' : '区域切分';
    }

    var groupsEl = document.getElementById('decomposeGroups');
    if (!groupsEl) return;

    var groups = outfitData.garment_groups || {};
    var html = '';
    // 扩展分组：头饰、上装、下装、鞋履、配饰
    ['head', 'upper', 'lower', 'shoes', 'accessory'].forEach(function (key) {
      var group = groups[key];
      if (!group || !group.items || group.items.length === 0) return;
      html += '<div class="decompose-group">';
      html += '<div class="decompose-group-label">' + escapeHtml(group.label || key) + '</div>';
      html += '<div class="decompose-item-grid">';
      group.items.forEach(function (g) {
        var sel = selectedIds.indexOf(g.id) !== -1;
        var inWard = g.in_wardrobe ? '<span class="decompose-in-wardrobe">已在柜</span>' : '';
        // 置信度显示（VLM模式）
        var confBadge = '';
        if (g.confidence && outfitData.decompose_method === 'vlm') {
          var confClass = g.confidence >= 0.8 ? 'high' : (g.confidence >= 0.6 ? 'medium' : 'low');
          confBadge = '<span class="decompose-confidence ' + confClass + '">' + Math.round(g.confidence * 100) + '%</span>';
        }
        html +=
          '<div class="decompose-item' + (sel ? ' selected' : '') + '" data-action="decompose-toggle" data-id="' + g.id + '" data-category="' + escapeAttr(g.category) + '">' +
            '<div class="decompose-item-cover" style="background-image:url(' + imgUrl(g.cover_url || g.image_url) + ')" data-preview="' + imgUrl(g.image_url || g.cover_url) + '" data-preview-action="decompose-preview">' +
              (sel ? '<span class="decompose-check">' + MMZ.Icon.render('check', 'solid', 14) + '</span>' : '') +
              inWard +
              confBadge +
            '</div>' +
            '<div class="decompose-item-name">' + escapeHtml(categoryLabel(g.category)) + '</div>' +
          '</div>';
      });
      html += '</div></div>';
    });

    if (!html && (outfitData.decompose_status === 'pending' || outfitData.decompose_status === 'processing')) {
      html = '<div class="decompose-loading"><div class="decompose-spinner"></div><p>AI 正在拆解整套穿搭…</p></div>';
    }
    groupsEl.innerHTML = html;

    var countEl = document.getElementById('decomposeCount');
    if (countEl) countEl.textContent = '已选 ' + selectedIds.length + ' 件';

    var footer = document.getElementById('decomposeFooter');
    if (footer) {
      var disabled = selectedIds.length === 0 || outfitData.decompose_status !== 'done';
      footer.querySelectorAll('button').forEach(function (btn) {
        btn.disabled = disabled;
      });
    }
  }

  function bindEvents() {
    var app = document.getElementById('app');
    if (!app) return;

    var handler = function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'decompose-toggle':
          toggleItem(
            parseInt(target.getAttribute('data-id'), 10),
            target.getAttribute('data-category')
          );
          break;
        case 'decompose-preview':
          // 点击图片预览放大
          var previewUrl = target.getAttribute('data-preview');
          if (previewUrl) {
            showPreviewModal(previewUrl, target.getAttribute('data-category'));
          }
          break;
        case 'decompose-close-preview':
          hidePreviewModal();
          break;
        case 'decompose-select-all':
          selectAll();
          break;
        case 'decompose-select-none':
          selectNone();
          break;
        case 'decompose-add-wardrobe':
          handleAddToWardrobe();
          break;
        case 'decompose-tryon':
          handleGoTryon();
          break;
        default:
          break;
      }
    };
    window.MMZ._pageClickHandler = handler;
    app.addEventListener('click', handler);
  }

  function selectAll() {
    if (!outfitData || !outfitData.garments) return;
    selectedIds = outfitData.garments.map(function (g) { return g.id; });
    Store.setState({
      decompose: Object.assign({}, Store.getState().decompose, { selectedIds: selectedIds })
    });
    renderContent();
  }

  function selectNone() {
    if (!outfitData || !outfitData.garments) return;
    // 反选：取消已选的，选中未选的
    var allIds = outfitData.garments.map(function (g) { return g.id; });
    selectedIds = allIds.filter(function (id) { return selectedIds.indexOf(id) === -1; });
    Store.setState({
      decompose: Object.assign({}, Store.getState().decompose, { selectedIds: selectedIds })
    });
    renderContent();
  }

  function showPreviewModal(imageUrl, category) {
    var modal = document.getElementById('decomposePreviewModal');
    var img = document.getElementById('decomposePreviewImg');
    var info = document.getElementById('decomposePreviewInfo');
    if (!modal || !img) return;
    img.src = imageUrl;
    if (info) {
      info.textContent = categoryLabel(category);
    }
    modal.style.display = 'flex';
  }

  function hidePreviewModal() {
    var modal = document.getElementById('decomposePreviewModal');
    if (modal) {
      modal.style.display = 'none';
    }
  }

  function toggleItem(id, category) {
    var cats = selectedIds.map(function (gid) { return categoryMap[gid]; });
    var result = GarmentMix.toggleSelection(selectedIds, cats, id, category);
    if (result.error) {
      Loading.toast(result.error);
      return;
    }
    selectedIds = result.ids;
    Store.setState({
      decompose: Object.assign({}, Store.getState().decompose, { selectedIds: selectedIds })
    });
    renderContent();
  }

  function handleAddToWardrobe() {
    if (!outfitData || selectedIds.length === 0) return;
    Loading.show('加入衣柜…');
    request.post('/api/wardrobe/add-from-decompose', {
      outfit_id: outfitData.id,
      garment_ids: selectedIds,
      mode: 'selected'
    }).then(function (data) {
      Loading.hide();
      var added = (data && data.added) ? data.added.length : 0;
      var skipped = (data && data.skipped) ? data.skipped.length : 0;
      Loading.toast('已加入 ' + added + ' 件' + (skipped ? '（' + skipped + ' 件已在柜）' : ''));
      loadOutfit(outfitData.id);
    }).catch(function (err) {
      Loading.hide();
      Loading.toast(err.message || '入柜失败');
    });
  }

  function handleGoTryon() {
    if (!outfitData || selectedIds.length === 0) return;
    if (MMZ.Tryon && MMZ.Tryon.beginOutfitBuilder) {
      MMZ.Tryon.beginOutfitBuilder(outfitData.id, outfitData.name || '穿搭拆解');
      return;
    }
    Router.navigate('tryon', 'tryon');
  }

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return String(str).replace(/"/g, '&quot;');
  }

  return { render: render, onMount: onMount, cleanup: cleanup };
})();

</script>

    { key: 'headwear', label: '头饰' },
    { key: 'accessory', label: '配饰' },
    { key: 'bag', label: '包包' }
  ];

  var currentGarmentCategory = 'upper';
  var importFileBound = false;
  var canvasResizeObserver = null;
  var canvasDragBound = false;
  var canvasDragHandlers = null;

  function renderImportSection() {

  function parsePoseBboxes(child) {
    if (!child || !child.pose_slot_bboxes) return null;
    try {
      return typeof child.pose_slot_bboxes === 'string'
        ? JSON.parse(child.pose_slot_bboxes)
        : child.pose_slot_bboxes;
    } catch (e) {
      return null;
    }
  }

  function getCanvasDragOptions() {
    var child = Store.getState().child;
    return {
      slotMap: currentOutfit,
      metaMap: buildGarmentMetaMap(),
      poseBboxes: parsePoseBboxes(child),
      garmentOffsets: garmentDragOffsets
    };
  }

  function ensureGarmentOffset(slotKey) {
    if (!garmentDragOffsets[slotKey]) {
      garmentDragOffsets[slotKey] = { dx: 0, dy: 0, scale: 1 };
    }
    return garmentDragOffsets[slotKey];
  }

  function resetGarmentOffsets() {
    garmentDragOffsets = {};
    activeAdjustSlot = null;
    repaintCanvas();
  }

  function scaleActiveGarment(delta) {
    if (!activeAdjustSlot) {
      Loading.toast('请先按住拖动选中一件单品');
      return;
    }
    var off = ensureGarmentOffset(activeAdjustSlot);
    off.scale = Math.max(0.5, Math.min(2.0, (off.scale || 1) + delta));
    repaintCanvas();
  }

  function repaintCanvas() {
    if (currentStep !== 2 || !TryonCanvas) return;
    if (Store.getState().route !== 'tryon') return;
    var wrap = document.getElementById('tryonCanvasWrap');
    if (!wrap) return;

    var child = Store.getState().child;
    var photoUrl = child && (child.standard_photo_processed_url || child.standard_photo_url);
    var size = TryonCanvas.measureContainer ? TryonCanvas.measureContainer(wrap) : {
      w: wrap.clientWidth || 280,
      h: wrap.clientHeight || Math.round((wrap.clientWidth || 280) * 1.5)
    };

    TryonCanvas.render(wrap, {
      baseUrl: photoUrl ? imgUrl(photoUrl) : '',
      slotMap: currentOutfit,
      metaMap: buildGarmentMetaMap(),
      poseBboxes: parsePoseBboxes(child),
      garmentOffsets: garmentDragOffsets,
      width: size.w,
      height: size.h,
      imgUrlFn: imgUrl
    }).catch(function (err) {
      console.warn('[Tryon] canvas render failed:', err);
    });
  }

  function scheduleRepaintCanvas() {
    if (repaintTimer) return;
    repaintTimer = setTimeout(function () {
      repaintTimer = null;
      requestAnimationFrame(repaintCanvas);
    }, 16);
  }

  function unbindCanvasDrag() {
    var wrap = document.getElementById('tryonCanvasWrap');
    if (wrap && canvasDragHandlers) {
      wrap.removeEventListener('pointerdown', canvasDragHandlers.down);
      wrap.removeEventListener('pointermove', canvasDragHandlers.move);
      wrap.removeEventListener('pointerup', canvasDragHandlers.up);
      wrap.removeEventListener('pointercancel', canvasDragHandlers.up);
      wrap.removeEventListener('touchstart', canvasDragHandlers.touchStart);
      wrap.removeEventListener('touchmove', canvasDragHandlers.touchMove);
      wrap.removeEventListener('touchend', canvasDragHandlers.touchEnd);
    }
    canvasDragHandlers = null;
    canvasDragBound = false;
    canvasDragState.dragging = false;
  }

  function bindCanvasDrag() {
    unbindCanvasDrag();
    if (currentStep !== 2 || !TryonCanvas || !TryonCanvas.hitTestSlot) return;
    var wrap = document.getElementById('tryonCanvasWrap');
    if (!wrap) return;

    var pinchStartDist = 0;
    var pinchStartScale = 1;

    function touchDistance(touches) {
      if (touches.length < 2) return 0;
      var dx = touches[0].clientX - touches[1].clientX;
      var dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    canvasDragHandlers = {
      down: function (e) {
        if (e.pointerType === 'touch') return;
        var slot = TryonCanvas.hitTestSlot(wrap, e.clientX, e.clientY, getCanvasDragOptions());
        if (!slot) return;
        e.preventDefault();
        activeAdjustSlot = slot;
        canvasDragState.dragging = true;
        canvasDragState.slot = slot;
        canvasDragState.startX = e.clientX;
        canvasDragState.startY = e.clientY;
        var off = ensureGarmentOffset(slot);
        canvasDragState.startDx = off.dx;
        canvasDragState.startDy = off.dy;
        wrap.classList.add('is-dragging');
        try { wrap.setPointerCapture(e.pointerId); } catch (err) { /* ignore */ }
      },
      move: function (e) {
        if (!canvasDragState.dragging || !canvasDragState.slot) return;
        e.preventDefault();
        var rect = wrap.getBoundingClientRect();
        var off = ensureGarmentOffset(canvasDragState.slot);
        off.dx = canvasDragState.startDx + (e.clientX - canvasDragState.startX) / rect.width;
        off.dy = canvasDragState.startDy + (e.clientY - canvasDragState.startY) / rect.height;
        repaintCanvas();
      },
      up: function (e) {
        if (!canvasDragState.dragging) return;
        canvasDragState.dragging = false;
        wrap.classList.remove('is-dragging');
        try { wrap.releasePointerCapture(e.pointerId); } catch (err) { /* ignore */ }
      },
      touchStart: function (e) {
        if (e.touches.length === 2) {
          var slot = activeAdjustSlot;
          if (!slot) {
            slot = TryonCanvas.hitTestSlot(wrap, e.touches[0].clientX, e.touches[0].clientY, getCanvasDragOptions());
          }
          if (!slot) return;
          activeAdjustSlot = slot;
          pinchStartDist = touchDistance(e.touches);
          pinchStartScale = ensureGarmentOffset(slot).scale || 1;
          e.preventDefault();
          return;
        }
        if (e.touches.length !== 1) return;
        var slotOne = TryonCanvas.hitTestSlot(wrap, e.touches[0].clientX, e.touches[0].clientY, getCanvasDragOptions());
        if (!slotOne) return;
        activeAdjustSlot = slotOne;
        canvasDragState.dragging = true;
        canvasDragState.slot = slotOne;
        canvasDragState.startX = e.touches[0].clientX;
        canvasDragState.startY = e.touches[0].clientY;
        var off = ensureGarmentOffset(slotOne);
        canvasDragState.startDx = off.dx;
        canvasDragState.startDy = off.dy;
        wrap.classList.add('is-dragging');
        e.preventDefault();
      },
      touchMove: function (e) {
        if (e.touches.length === 2 && activeAdjustSlot && pinchStartDist > 0) {
          var dist = touchDistance(e.touches);
          var off = ensureGarmentOffset(activeAdjustSlot);
          off.scale = Math.max(0.5, Math.min(2.0, pinchStartScale * (dist / pinchStartDist)));
          repaintCanvas();
          e.preventDefault();
          return;
        }
        if (!canvasDragState.dragging || !canvasDragState.slot || e.touches.length !== 1) return;
        var rect = wrap.getBoundingClientRect();
        var offMove = ensureGarmentOffset(canvasDragState.slot);
        offMove.dx = canvasDragState.startDx + (e.touches[0].clientX - canvasDragState.startX) / rect.width;
        offMove.dy = canvasDragState.startDy + (e.touches[0].clientY - canvasDragState.startY) / rect.height;
        repaintCanvas();
        e.preventDefault();
      },
      touchEnd: function () {
        canvasDragState.dragging = false;
        pinchStartDist = 0;
        wrap.classList.remove('is-dragging');
      }
    };

    wrap.addEventListener('pointerdown', canvasDragHandlers.down);
    wrap.addEventListener('pointermove', canvasDragHandlers.move);
    wrap.addEventListener('pointerup', canvasDragHandlers.up);
    wrap.addEventListener('pointercancel', canvasDragHandlers.up);
    wrap.addEventListener('touchstart', canvasDragHandlers.touchStart, { passive: false });
    wrap.addEventListener('touchmove', canvasDragHandlers.touchMove, { passive: false });
    wrap.addEventListener('touchend', canvasDragHandlers.touchEnd);
    canvasDragBound = true;
  }

  function bindCanvasResizeObserver() {
    if (canvasResizeObserver) {
      canvasResizeObserver.disconnect();
      canvasResizeObserver = null;
    }
    if (typeof ResizeObserver === 'undefined') return;
    var wrap = document.getElementById('tryonCanvasWrap');
    if (!wrap) return;
    canvasResizeObserver = new ResizeObserver(function () {
      if (currentStep === 2 && Store.getState().route === 'tryon') {
        scheduleRepaintCanvas();
      }
    });
    canvasResizeObserver.observe(wrap);
  }

  // 已选单品快捷栏
  function renderSelectedGarmentBar() {
    var meta = buildGarmentMetaMap();
    var hasSelection = false;
    var html = '<div class="selected-bar">';
    html += '<div class="selected-bar-title">当前搭配</div>';
    html += '<div class="selected-bar-items">';

    SLOT_KEYS.forEach(function (slotKey) {
      var gid = currentOutfit[slotKey];
      if (gid && meta[gid]) {
        hasSelection = true;
        html += '<div class="selected-bar-item" data-slot="' + slotKey + '" data-action="clear-slot">';
        html += '<div class="selected-bar-cover" style="background-image:url(' + imgUrl(meta[gid].cover_url) + ')"></div>';
        html += '<div class="selected-bar-name">' + escapeHtml(meta[gid].garment || '') + '</div>';
        html += '<div class="selected-bar-remove">×</div>';
        html += '</div>';
      }
    });

    if (!hasSelection) {
      html += '<div class="selected-bar-empty">点击下方单品进行搭配</div>';
    }

    html += '</div></div>';
    return html;
  }

  // 品类筛选标签
  function renderGarmentCategoryTabs() {
    var html = '<div class="garment-cat-tabs">';
    CATEGORY_TABS.forEach(function (cat) {
      var active = cat.key === currentGarmentCategory ? ' active' : '';
      html += '<div class="garment-cat-tab' + active + '" data-action="switch-garment-cat" data-cat="' + cat.key + '">' + cat.label + '</div>';
    });
    html += '</div>';
    return html;
  }

  // 单品选择器
  function renderGarmentPicker() {
    var html = '<div class="garment-picker">';

    // 衣柜 + 刚拆解出的单品（拆解完成前也能看到）
    var allGarments = getMergedGarmentList();
    var filtered = allGarments.filter(function (item) {
      return OutfitBuilder.categoryMatchesTab(item.category, currentGarmentCategory);
    });

    if (filtered.length === 0) {
      html += '<div class="garment-picker-empty">该分类暂无衣服，去衣柜添加吧</div>';
    } else {
      html += '<div class="garment-picker-grid">';
      filtered.forEach(function (item) {
        // 检查是否已穿在身上
        var isWorn = false;
        SLOT_KEYS.forEach(function (sk) {
          if (currentOutfit[sk] === item.id) {
            isWorn = true;
          }
        });

        var wornClass = isWorn ? ' worn' : '';
        html += '<div class="garment-picker-item' + wornClass + '" ';
        html += 'data-action="wear-garment" data-id="' + item.id + '" data-category="' + (item.category || 'upper') + '">';
        html += '<div class="garment-picker-cover">';
        html += '<img src="' + imgUrl(item.cover_url) + '" alt="' + escapeHtml(item.garment || '') + '" loading="lazy">';
        if (isWorn) {
          html += '<div class="garment-picker-worn-badge">已穿</div>';
        }
        html += '</div>';
        html += '<div class="garment-picker-name">' + escapeHtml(item.garment || '') + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
    return html;
  }

  function renderStep3() {

    var selectedScene = tryonState.scene || 'livingroom';

    var html = '';

          '<div class="step-scene-item' + selClass + '" data-action="pick-scene" data-key="' + s.key + '">' +
            '<div class="step-scene-cover" style="background-image:url(' + thumb + ')"></div>' +
            '<div class="step-scene-name">' + escapeHtml(s.name || s.key) + '</div>' +

          '</div>';
      });

    html += '<button class="btn-secondary" data-action="prev-step" data-to="2">上一步</button>';
    html += '<button class="btn-primary" data-action="start-tryon">开始试穿 ' + MMZ.Icon.render('sparkle_small', 'line', 18) + '</button>';
    html += '</div>';

    return html;
  }

  // ===== 工具函数 =====

  function buildGarmentMetaMap() {
    var map = {};
    getMergedGarmentList().forEach(function (g) {
      if (g && g.id) map[g.id] = g;
    });
    // 从decompose导入的单品
    var tryonState = Store.getState().tryon || {};
    (tryonState.decomposeGarments || []).forEach(function (g) {
      if (g && g.id) map[g.id] = g;
    });
    return map;
  }

  function getMergedGarmentList() {
    var map = {};
    wardrobeCache.forEach(function (g) {
      if (g && g.id) map[g.id] = g;
    });
    outfitGarmentCache.forEach(function (g) {
      if (g && g.id) map[g.id] = g;
    });
    return Object.keys(map).map(function (k) { return map[k]; });
  }

  function wearGarment(garmentId, category) {
    var meta = buildGarmentMetaMap();
    var result = OutfitBuilder.wearGarment(currentOutfit, garmentId, category, meta);
    if (result.error) {
      Loading.toast(result.error);
      return;
    }
    currentOutfit = result.slotMap;
    syncOutfitState();
    if (TryonCanvas && TryonCanvas.clearCache) TryonCanvas.clearCache();
    var wornSlot = OutfitBuilder.categoryToSlot(category);
    delete garmentDragOffsets[wornSlot];
    renderStepContent();
  }

  function clearSlot(slotKey) {
    if (!slotKey) return;
    currentOutfit = Object.assign({}, defaultSlotMap(), currentOutfit);
    currentOutfit[slotKey] = null;
    delete garmentDragOffsets[slotKey];
    if (activeAdjustSlot === slotKey) activeAdjustSlot = null;
    syncOutfitState();
    renderStepContent();
  }

  function clearAllOutfit() {
    currentOutfit = defaultSlotMap();
    garmentDragOffsets = {};
    activeAdjustSlot = null;
    syncOutfitState();
    renderStepContent();
  }

  function syncOutfitState() {
    var meta = buildGarmentMetaMap();
    var ids = OutfitBuilder.slotMapToIds(currentOutfit);
    var err = OutfitBuilder.validateSlotMap(currentOutfit, meta);

    Store.setState({
      tryon: Object.assign({}, Store.getState().tryon || {}, {
        slotMap: Object.assign({}, currentOutfit),
        garment_ids: ids,
        category: ids.length > 0 ? ((meta[ids[0]] && meta[ids[0]].category) || 'upper') : 'upper'
      })
    });
    return err;
  }

  // ===== 步骤切换 =====

  function renderStepContent() {
    var container = document.getElementById('stepContent');
    if (!container) return;

    var html = '';
    switch (currentStep) {
      case 1:
        html = renderStep1(Store.getState().child);
        break;
      case 2:
        html = renderStep2();
        break;
      case 3:
        html = renderStep3();
        break;
      default:
        break;
    }
    container.innerHTML = html;
    updateStepper();
    if (currentStep === 2) {
      scheduleRepaintCanvas();
      bindCanvasResizeObserver();
      bindCanvasDrag();
    }
  }

  function updateStepper() {
    var dots = document.querySelectorAll('.stepper-dot');
    var lines = document.querySelectorAll('.stepper-line');
    dots.forEach(function (dot, idx) {
      var stepNum = idx + 1;
      dot.classList.toggle('active', currentStep >= stepNum);
      dot.innerHTML = currentStep > stepNum ? MMZ.Icon.render('check', 'solid', 16) : String(stepNum);
    });
    lines.forEach(function (line, idx) {
      line.classList.toggle('active', currentStep >= (idx + 2));
    });
  }

  function goToStep(step) {
    currentStep = step;
    if (step === 2) {
      TryonCanvas.clearCache();
      refreshChildForTryon(function () {
        renderStepContent();
      });
      return;
    }
    renderStepContent();
  }

  function refreshChildForTryon(done) {
    request.get('/api/child/list').then(function (data) {
      var children = (data && data.children) || [];
      var state = Store.getState();
      var picked = null;
      var savedId = localStorage.getItem(MMZ.config.CHILD_ID_KEY);
      if (savedId) {
        children.forEach(function (c) {
          if (String(c.id) === String(savedId)) picked = c;
        });
      }
      if (!picked && children.length > 0) picked = children[0];
      if (picked) {
        Store.setState({
          child: {
            id: picked.id,
            name: picked.name,
            gender: picked.gender,
            age: picked.age,
            height: picked.height,
            weight: picked.weight,
            birthdate: picked.birthdate || '',
            standard_photo_url: picked.standard_photo_url || '',
            standard_photo_processed_url: picked.standard_photo_processed_url || '',
            pose_slot_bboxes: picked.pose_slot_bboxes || null,
            avatar_url: picked.avatar_url || ''
          }
        });
        try {
          localStorage.setItem(MMZ.config.CHILD_CACHE_KEY, JSON.stringify(Store.getState().child));
        } catch (e) { /* ignore */ }
      }
      if (done) done();
    }).catch(function () {
      if (done) done();
    });
  }

  // ===== 数据加载 =====

  function onMount() {
    loadScenes();
    loadWardrobe();
    bindEvents();
    bindImportFileInput();

    if (childUnsub) childUnsub();
    childUnsub = Store.subscribe(function (state) {
      if (state.route !== 'tryon' || currentStep !== 2) return;
      if (state.child) scheduleRepaintCanvas();
      if (currentStep !== 1 || !state.child || !state.child.id) return;
      var container = document.getElementById('stepContent');
      if (container && container.querySelector('.step-empty')) {
        renderStepContent();
      }
    });

    // 从其他页面跳转状态处理
    var tryonState = Store.getState().tryon || {};
    if (tryonState._goCustomizeStep || tryonState.decomposeOutfitId) {
      Store.setState({
        tryon: Object.assign({}, tryonState, { _goCustomizeStep: null })
      });
      goToStep(2);
      if (tryonState.decomposeOutfitId) {
        refreshOutfitBuilder(true);
      }
      return;
    }

    if ((tryonState.garment_ids || []).length > 0) {
      // 恢复之前的搭配
      if (tryonState.slotMap) {
        currentOutfit = Object.assign({}, tryonState.slotMap);
      }
      goToStep(2);
    }
  }

  function loadWardrobe() {
    request.get('/api/wardrobe/list').then(function (data) {
      wardrobeCache = ((data && data.items) || []).map(function (g) {
        return OutfitBuilder.normalizeGarment(Object.assign({}, g, {
          category: g.raw_category || g.category,
          cover_url: g.cover_url || g.image_url || ''
        }));
      });
      if (currentStep === 2) {
        renderStepContent();
      }
    }).catch(function (err) {
      Loading.toast(err.message);
    });
  }

  function loadScenes() {
    request.get('/api/scene/list').then(function (data) {
      sceneCache = (data && data.items) || [];
      if (currentStep === 3) {
        renderStepContent();
      }
    }).catch(function (err) {
      Loading.toast(err.message);
    });
  }

  // ===== 拆解相关 =====

  function refreshOutfitBuilder(showLoading) {
    var tryonState = Store.getState().tryon || {};
    var outfitId = tryonState.decomposeOutfitId;
    if (!outfitId) return;

    if (showLoading) Loading.show('加载搭配…');
    request.get('/api/outfits/' + outfitId).then(function (resp) {
      if (showLoading) Loading.hide();
      var outfit = (resp && resp.item) ? resp.item : resp;
      if (!outfit) return;

      var garments = OutfitBuilder.flattenOutfitGarments(outfit);
      garments.forEach(function (g) {
        if (!g || !g.id) return;
        var exists = outfitGarmentCache.some(function (w) { return w.id === g.id; });
        if (!exists) outfitGarmentCache.push(g);
      });

      var status = outfit.decompose_status || 'done';
      var prevStatus = (Store.getState().tryon || {}).decomposeStatus;

      Store.setState({
        tryon: Object.assign({}, Store.getState().tryon || {}, {
          decomposeStatus: status,
          decomposeCount: garments.length,
          decomposeGarments: garments,
          decomposeMethod: outfit.decompose_method || ''
        })
      });

      // 拆解完成：自动填充槽位 + 刷新衣柜（单品已入柜）
      if (status === 'done') {
        stopDecomposePoll();
        if (prevStatus !== 'done') {
          currentOutfit = OutfitBuilder.autoFillSlotMap(garments);
          syncOutfitState();
          loadWardrobe();
        }
      } else if (status === 'failed') {
        stopDecomposePoll();
      } else {
        startDecomposePoll();
      }

      if (currentStep === 2) renderStepContent();
    }).catch(function (err) {
      if (showLoading) Loading.hide();
      Loading.toast(err.message || '加载失败');
    });
  }

  function startDecomposePoll() {
    if (decomposePollTimer) return;
    decomposePollTimer = setInterval(function () {
      var st = Store.getState().tryon || {};
      if (!st.decomposeOutfitId) {
        stopDecomposePoll();
        return;
      }
      refreshOutfitBuilder(false);
    }, 2500);
  }

  function stopDecomposePoll() {
    if (decomposePollTimer) {
      clearInterval(decomposePollTimer);
      decomposePollTimer = null;
    }
  }

  function beginOutfitBuilder(outfitId, title, opts) {
    opts = opts || {};
    if (!Store.getState().child.id) {
      Loading.toast('请先添加宝贝档案');
      Router.navigate('register');
      return;
    }
    currentOutfit = defaultSlotMap();
    Store.setState({
      tryon: Object.assign({}, Store.getState().tryon, {
        decomposeOutfitId: outfitId,
        decomposeTitle: title || '搭配试穿',
        decomposeGarments: [],
        decomposeStatus: 'pending',
        decomposeCount: 0,
        slotMap: defaultSlotMap(),
        garment_ids: [],
        _goCustomizeStep: true
      })
    });

    function finishStart() {
      if (Store.getState().route === 'tryon') {
        currentStep = 2;
        renderStepContent();
        refreshOutfitBuilder(true);
        startDecomposePoll();
      } else {
        Router.navigate('tryon', 'tryon');
      }
    }

    if (opts.redecompose) {
      Loading.show('AI 正在拆解穿搭…');
      request.post('/api/outfits/' + outfitId + '/redecompose', {}).then(function () {
        Loading.hide();
        finishStart();
      }).catch(function (err) {
        Loading.hide();
        Loading.toast((err && err.message) || '拆解失败，请稍后重试');
        finishStart();
      });
      return;
    }

    if (Store.getState().route === 'tryon') {
      currentStep = 2;
      renderStepContent();
      refreshOutfitBuilder(true);
    } else {
      Router.navigate('tryon', 'tryon');
    }
  }

  function handleImportLink() {
    var input = document.getElementById('tryonImportLink');
    var url = input ? String(input.value || '').trim() : '';
    if (!url) {
      Loading.toast('请先粘贴商品链接');
      return;
    }
    if (!Store.getState().child.id) {
      Loading.toast('请先添加宝贝档案');
      Router.navigate('register');
      return;
    }

    Loading.show('正在解析…');
    request.post('/api/outfits/import/link', { url: url }, { timeout: 60000 }).then(function (data) {
      Loading.hide();
      var outfitId = data && data.outfit_id;
      if (!outfitId) {
        Loading.toast('导入失败，请上传穿搭截图');
        return;
      }
      if (input) input.value = '';
      if (data.decompose_method === 'product_flat') {
        Loading.toast('商品已抠图入柜');
      }
      beginOutfitBuilder(outfitId, '链接导入搭配');
    }).catch(function (err) {
      Loading.hide();
      Loading.toast((err && err.message) || '链接无法解析，请上传穿搭截图');
    });
  }

  function handleImportUpload() {
    var fileInput = document.getElementById('tryonImportFile');
    if (fileInput) fileInput.click();
  }

  function onImportFileSelected(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!Store.getState().child.id) {
      Loading.toast('请先添加宝贝档案');
      Router.navigate('register');
      e.target.value = '';
      return;
    }

    Loading.show('正在上传并拆解…');
    var fd = new FormData();
    fd.append('file', file);
    request.post('/api/outfits/import/upload', null, { formData: fd, timeout: 60000 }).then(function (data) {
      Loading.hide();
      var outfitId = data && data.outfit_id;
      if (!outfitId) {
        Loading.toast('上传失败');
        return;
      }
      e.target.value = '';
      beginOutfitBuilder(outfitId, '上传搭配');
    }).catch(function (err) {
      Loading.hide();
      e.target.value = '';
      Loading.toast((err && err.message) || '上传失败');
    });
  }

  function bindImportFileInput() {
    if (importFileBound) return;
    var fileInput = document.getElementById('tryonImportFile');
    if (!fileInput) return;
    fileInput.addEventListener('change', onImportFileSelected);
    importFileBound = true;
  }

  // ===== 事件绑定 =====

  function bindEvents() {
    var app = document.getElementById('app');
    if (!app) return;

    var clickHandler = function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'go-register':
          Router.navigate('register');
          break;
        case 'next-step':
          var to = parseInt(target.getAttribute('data-to'), 10);
          if (to === 2 && wardrobeCache.length === 0) {
            loadWardrobe();
          }
          if (to === 3 && sceneCache.length === 0) {
            loadScenes();
          }
          goToStep(to);
          break;
        case 'prev-step':
          goToStep(parseInt(target.getAttribute('data-to'), 10));
          break;
        case 'switch-garment-cat':
          currentGarmentCategory = target.getAttribute('data-cat');
          renderStepContent();
          break;
        case 'wear-garment':
          var gid = parseInt(target.getAttribute('data-id'), 10);
          var meta = buildGarmentMetaMap();
          var gcat = (meta[gid] && meta[gid].category) || target.getAttribute('data-category') || 'upper';
          wearGarment(gid, gcat);
          break;
        case 'clear-slot':
          var slotEl = target.closest('[data-slot]');
          if (slotEl) {
            clearSlot(slotEl.getAttribute('data-slot'));
          }
          break;
        case 'clear-all-outfit':
          clearAllOutfit();
          break;
        case 'reset-garment-offsets':
          resetGarmentOffsets();
          break;
        case 'scale-garment-up':
          scaleActiveGarment(0.08);
          break;
        case 'scale-garment-down':
          scaleActiveGarment(-0.08);
          break;
        case 'pick-scene':
          var key = target.getAttribute('data-key');
          Store.setState({
            tryon: Object.assign({}, Store.getState().tryon, { scene: key })
          });
          renderStepContent();
          break;
        case 'view-wardrobe':
          Router.navigate('wardrobe');
          break;
        case 'import-link':
          handleImportLink();
          break;
        case 'import-upload':
          handleImportUpload();
          break;
        case 'start-tryon':
          handleSubmit();
          break;
        default:
          break;
      }
    };
    window.MMZ._pageClickHandler = clickHandler;
    app.addEventListener('click', clickHandler);
  }

  function handleSubmit() {
    var state = Store.getState();
    var child = state.child;
    var tryonState = state.tryon;
    var garmentIds = (tryonState && tryonState.garment_ids) || [];

    if (!child || !child.id) {
      Loading.toast('请先添加宝贝档案');
      return;
    }
    if (garmentIds.length === 0) {
      Loading.toast('请至少搭配一件服装');
      return;
    }
    var meta = buildGarmentMetaMap();
    var mixErr = OutfitBuilder.validateSlotMap(currentOutfit, meta);
    if (mixErr) {
      Loading.toast(mixErr);
      return;
    }

    var body = {
      child_id: child.id,
      garment_ids: garmentIds,
      scene: tryonState.scene || 'livingroom'
    };

    if (MMZ.TryonProgress) {
      MMZ.TryonProgress.start(body);
    } else {
      Loading.toast('进度组件加载失败，请刷新页面');
    }
  }

  function cleanup() {
    unbindCanvasDrag();
    if (repaintTimer) {
      clearTimeout(repaintTimer);
      repaintTimer = null;
    }
    currentStep = 1;
    canvasDragState.dragging = false;
    if (canvasResizeObserver) {
      canvasResizeObserver.disconnect();
      canvasResizeObserver = null;
    }
    if (childUnsub) {
      childUnsub();
      childUnsub = null;
    }
    if (decomposePollTimer) {
      clearInterval(decomposePollTimer);
      decomposePollTimer = null;
    }
    if (MMZ.TryonProgress && MMZ.TryonProgress.isActive()) {
      MMZ.TryonProgress.cancel(true);
    }
    importFileBound = false;
  }

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  return {
    render: render,
    onMount: onMount,
    cleanup: cleanup,
    beginOutfitBuilder: beginOutfitBuilder
  };
})();

</script>

<!-- pages/result.js -->
<script>
/**
 * 妈马装 H5 · 试穿结果
 * 依赖：MMZ.Store, MMZ.Router, MMZ.request, MMZ.config, MMZ.Loading
 *
 * 功能：
 *   - 进入页面后启动轮询 GET /api/tryon/{task_uuid}
 *   - 状态 queued/processing → 显示 loading 动画 + 文案轮播
 *   - 状态 success → 展示结果图 + 操作按钮（保存/再试一次/换场景/收藏）
 *   - 状态 failed → 显示失败提示 + 重试按钮
 *   - demo=true → DemoBadge 自动显示（T04 已实现）
 *
 * 接口：
 *   GET  /api/tryon/{task_uuid} → { task_uuid, status, result_url, scene_image_url, scene, demo, tryon_id, error_msg }
 *   POST /api/album   (JSON: { tryon_id }) → 保存到相册
 *   POST /api/scene/change (JSON: { tryon_id, scene_key }) → 换场景
 *   POST /api/favorite/toggle (JSON: { tryon_id }) → 收藏/取消
 *
 * 轮询策略：
 *   每 2s 一次，最多 30 次（60s），done/failed 终止
 *   离开页面 clearInterval（cleanup）
 */
window.MMZ = window.MMZ || {};

MMZ.Result = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;

  /** 轮询定时器 */
  var pollTimer = null;
  /** 轮询计数 */
  var pollCount = 0;
  /** 最大轮询次数 */
  var MAX_POLL = 30;
  /** 轮询间隔 ms */
  var POLL_INTERVAL = 2000;
  /** 环形进度条周长（r=52） */
  var PROGRESS_RADIUS = 52;
  var PROGRESS_CIRCUMFERENCE = 2 * Math.PI * PROGRESS_RADIUS;
  /** 文案轮播定时器 */
  var tipTimer = null;

  /**
   * 渲染结果页（初始为 loading 状态）
   * @returns {string}
   */
  function render() {
    var state = Store.getState();
    var result = state.result || {};
    var taskUuid = (state.tryon && state.tryon.task_uuid) || '';

    if (!taskUuid) {
      return (
        '<div class="page page-result">' +
          '<div class="result-empty">' +
            '<div class="result-empty-icon">' + MMZ.Icon.render('confused', 'line', 48) + '</div>' +
            '<div class="result-empty-text">还没有试穿任务</div>' +
            '<button class="btn-primary" data-action="back-tryon">去试衣间</button>' +
          '</div>' +
        '</div>'
      );
    }

    if (result.status === 'success') {
      return renderSuccess(result);
    }
    if (result.status === 'failed') {
      return renderFailed(result);
    }
    return renderLoading(result);
  }

  /**
   * 渲染 loading 状态
   */
  function renderLoading(result) {
    var tip = config.LOADING_TIPS[result.tipIndex || 0] || config.LOADING_TIPS[0];
    var progress = result.progress || 0;
    var offset = progressOffset(progress);
    var label = progressLabel(progress);

    return (
      '<div class="page page-result page-result-loading">' +
        '<div class="result-loading-wrap">' +
          '<div class="result-loading-animation">' +
            '<div class="result-progress-orbit"></div>' +
            '<svg class="result-progress-svg" viewBox="0 0 120 120" aria-hidden="true">' +
              '<defs>' +
                '<linearGradient id="resultProgressGradient" x1="0%" y1="0%" x2="100%" y2="100%">' +
                  '<stop offset="0%" stop-color="#ff9a5c" />' +
                  '<stop offset="100%" stop-color="#ff7a3d" />' +
                '</linearGradient>' +
              '</defs>' +
              '<circle class="result-progress-track" cx="60" cy="60" r="' + PROGRESS_RADIUS + '" fill="none" />' +
              '<circle class="result-progress-arc" cx="60" cy="60" r="' + PROGRESS_RADIUS + '"' +
                ' fill="none" stroke="url(#resultProgressGradient)" stroke-width="8" stroke-linecap="round"' +
                ' pathLength="100" stroke-dasharray="100" stroke-dashoffset="' + offset + '" />' +
            '</svg>' +
            '<div class="result-progress-center">' +
              '<div class="result-progress-icon">' + MMZ.Icon.render('loading_sparkle', 'line', 22) + '</div>' +
              '<div class="result-progress-pct" id="resultProgressPct">' + label + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="result-loading-tip" id="loadingTip">' + escapeHtml(tip) + '</div>' +
        '</div>' +
      '</div>'
    );
  }

  /**
   * 渲染成功状态
   */
  function renderSuccess(result) {
    var imageUrl = imgUrl(result.result_url || result.scene_image_url);
    var sceneName = result.scene || '';

    var html = '';
    html += '<div class="page page-result page-result-success">';

    // 结果大图
    html +=
      '<div class="result-image-wrap">' +
        '<img class="result-image" src="' + imageUrl + '" alt="试穿结果" />' +
        (result.demo ? '<div class="result-demo-tag">演示图</div>' : '') +
      '</div>';

    // 信息行
    if (sceneName) {
      html += '<div class="result-scene-info">' + MMZ.Icon.render('location', 'line', 16) + ' ' + escapeHtml(sceneName) + '</div>';
    }

    // 操作按钮网格
    html += '<div class="result-action-grid">';
    html += renderActionItem('save-album', MMZ.Icon.render('save', 'line', 24), '保存相册', '');
    html += renderActionItem('retry', MMZ.Icon.render('refresh', 'line', 24), '再试一次', '');
    html += renderActionItem('change-scene', MMZ.Icon.render('scene', 'line', 24), '换场景', '');
    var favorited = !!result.favorited;
    html += renderActionItem(
      'favorite',
      MMZ.Icon.render('star', favorited ? 'solid' : 'line', 24),
      favorited ? '已收藏' : '收藏',
      favorited ? 'is-active' : ''
    );
    html += '</div>';

    // 底部按钮
    html +=
      '<div class="result-bottom-bar">' +
        '<button class="btn-secondary" data-action="back-tryon">返回试衣间</button>' +
        '<button class="btn-primary" data-action="go-home">回到首页</button>' +
      '</div>';

    html += '</div>';
    return html;
  }

  /**
   * 渲染失败状态
   */
  function renderFailed(result) {
    var errorMsg = result.error_msg || '生成失败，请重试';

    return (
      '<div class="page page-result page-result-failed">' +
        '<div class="result-failed-wrap">' +
          '<div class="result-failed-icon">' + MMZ.Icon.render('sad', 'line', 48) + '</div>' +
          '<div class="result-failed-text">试穿未成功</div>' +
          '<div class="result-failed-desc">' + escapeHtml(errorMsg) + '</div>' +
          '<div class="result-failed-note">本次不扣除配额</div>' +
          '<button class="btn-primary btn-full" data-action="retry">重新试穿</button>' +
          '<button class="btn-secondary btn-full" data-action="back-tryon">返回试衣间</button>' +
        '</div>' +
      '</div>'
    );
  }

  /**
   * 渲染操作项
   */
  function renderActionItem(action, icon, label, extraClass) {
    return (
      '<div class="result-action-item' + (extraClass ? ' ' + extraClass : '') + '" data-action="' + action + '">' +
        '<div class="result-action-icon">' + icon + '</div>' +
        '<div class="result-action-label">' + label + '</div>' +
      '</div>'
    );
  }

  // ===== 生命周期 =====

  /**
   * 页面挂载：启动轮询
   */
  function onMount() {
    bindEvents();
    prefetchScenes();

    var state = Store.getState();
    var taskUuid = state.tryon && state.tryon.task_uuid;
    var result = state.result || {};

    if (!taskUuid) {
      return;
    }

    if (result.status === 'success' || result.status === 'failed') {
      if (result.status === 'success' && result.tryon_id) {
        syncFavoriteState(result.tryon_id);
      }
      return;
    }

    pollCount = 0;
    startPolling(taskUuid);
    startTipRotation();
  }

  /**
   * 页面卸载：清除定时器
   */
  function cleanup() {
    stopPolling();
    stopTipRotation();
    closeScenePicker();
  }

  // ===== 轮询逻辑 =====

  /**
   * 启动轮询
   */
  function startPolling(taskUuid) {
    stopPolling();

    // 立即查一次
    doPoll(taskUuid);

    // 定时轮询
    pollTimer = setInterval(function () {
      doPoll(taskUuid);
    }, POLL_INTERVAL);
  }

  /**
   * 停止轮询
   */
  function stopPolling() {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }

  /**
   * 执行一次轮询
   */
  function doPoll(taskUuid) {
    pollCount++;

    // 超过最大次数
    if (pollCount > MAX_POLL) {
      stopPolling();
      stopTipRotation();
      Store.setState({
        result: Object.assign({}, Store.getState().result, {
          status: 'failed',
          error_msg: '等待超时，请稍后重试'
        })
      });
      rerenderPage();
      return;
    }

    request.get('/api/tryon/' + taskUuid).then(function (data) {
      var status = data.status;
      var state = Store.getState();
      var prevProgress = (state.result && state.result.progress) || 0;
      var pollProgress = 15 + pollCount * (80 / MAX_POLL);
      var progress = Math.max(prevProgress, Math.min(95, pollProgress));

      if (status === 'success') {
        // 成功
        stopPolling();
        stopTipRotation();

        Store.setState({
          result: Object.assign({}, state.result, {
            status: 'success',
            loading: false,
            progress: 100,
            result_url: data.result_url || '',
            scene_image_url: data.scene_image_url || '',
            scene: data.scene || '',
            demo: data.demo || false,
            tryon_id: data.tryon_id || null,
            provider: data.provider || '',
            favorited: false
          })
        });

        // 更新 DemoBadge
        if (MMZ.DemoBadge) {
          MMZ.DemoBadge.setDemo(data.demo || false);
        }

        rerenderPage();
        if (data.tryon_id) {
          syncFavoriteState(data.tryon_id);
        }
      } else if (status === 'failed') {
        // 失败
        stopPolling();
        stopTipRotation();

        Store.setState({
          result: Object.assign({}, state.result, {
            status: 'failed',
            loading: false,
            error_msg: data.error_msg || '生成失败'
          })
        });

        rerenderPage();
      } else {
        // queued / processing → 更新进度
        Store.setState({
          result: Object.assign({}, state.result, {
            status: status,
            loading: true,
            progress: progress
          })
        });

        // 局部刷新 loading 视图（仅更新进度条和文案）
        updateLoadingUI(progress);
      }
    }).catch(function (err) {
      // 网络错误不停轮询，但提示
      console.warn('[Result] 轮询失败:', err.message);
    });
  }

  /**
   * 局部更新 loading UI（避免每次轮询全量重渲染）
   */
  function updateLoadingUI(progress) {
    var arc = document.querySelector('.page-result-loading .result-progress-arc');
    applyArcProgress(arc, progress);
    var pct = document.getElementById('resultProgressPct');
    if (pct) {
      pct.textContent = progressLabel(progress);
    }
  }

  /**
   * 全量重渲染页面
   */
  function rerenderPage() {
    var app = document.getElementById('app');
    if (app) {
      app.innerHTML = render();
      bindEvents();
    }
  }

  // ===== 文案轮播 =====

  /**
   * 启动 loading 文案轮播
   */
  function startTipRotation() {
    stopTipRotation();
    tipTimer = setInterval(function () {
      var state = Store.getState();
      var nextIdx = ((state.result.tipIndex || 0) + 1) % config.LOADING_TIPS.length;
      Store.setState({
        result: Object.assign({}, state.result, { tipIndex: nextIdx })
      });
      var tipEl = document.getElementById('loadingTip');
      if (tipEl) {
        tipEl.textContent = config.LOADING_TIPS[nextIdx];
      }
    }, 3000);
  }

  /**
   * 停止文案轮播
   */
  function stopTipRotation() {
    if (tipTimer) {
      clearInterval(tipTimer);
      tipTimer = null;
    }
  }

  // ===== 事件 =====

  /**
   * 绑定事件
   */
  function bindEvents() {
    var app = document.getElementById('app');
    if (!app) return;

    var clickHandler = function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'back-tryon':
          cleanup();
          resetResult();
          Router.navigate('tryon', 'tryon');
          break;
        case 'go-home':
          cleanup();
          resetResult();
          Router.navigate('home', 'home');
          break;
        case 'retry':
          cleanup();
          resetResult();
          Router.navigate('tryon', 'tryon');
          break;
        case 'save-album':
          handleSaveAlbum();
          break;
        case 'change-scene':
          handleShowScenePicker();
          break;
        case 'favorite':
          handleToggleFavorite();
          break;
        case 'pick-new-scene':
          var key = target.getAttribute('data-key');
          handleSceneChange(key);
          break;
        case 'close-scene-picker':
          closeScenePicker();
          break;
        default:
          break;
      }
    };
    window.MMZ._pageClickHandler = clickHandler;
    app.addEventListener('click', clickHandler);
  }

  /**
   * 保存到相册
   * POST /api/album (JSON: { tryon_id })
   */
  function handleSaveAlbum() {
    var result = Store.getState().result;
    if (!result.tryon_id) {
      Loading.toast('缺少试穿记录，无法保存');
      return;
    }

    Loading.show('正在保存…');
    request.post('/api/album/save', { tryon_id: result.tryon_id }).then(function () {
      Loading.hide();
      Loading.toast('已保存到相册');
    }).catch(function (err) {
      Loading.hide();
      Loading.toast(err.message);
    });
  }

  /**
   * 预加载场景列表（换场景弹层依赖）
   */
  function prefetchScenes() {
    var scenes = Store.getState().sceneList || [];
    if (scenes.length > 0) return;
    request.get('/api/scene/list').then(function (data) {
      Store.setState({ sceneList: (data && data.items) || [] });
    }).catch(function () { /* 换场景时再 toast */ });
  }

  /**
   * 显示场景选择器
   */
  function handleShowScenePicker() {
    var result = Store.getState().result;
    if (!result.tryon_id) {
      Loading.toast('缺少试穿记录，无法换场景');
      return;
    }

    var scenes = Store.getState().sceneList || [];
    if (scenes.length === 0) {
      Loading.show('加载场景…');
      request.get('/api/scene/list').then(function (data) {
        Loading.hide();
        var items = (data && data.items) || [];
        Store.setState({ sceneList: items });
        if (items.length === 0) {
          Loading.toast('暂无可用场景');
          return;
        }
        openScenePicker(items, result);
      }).catch(function (err) {
        Loading.hide();
        Loading.toast(err.message);
      });
      return;
    }

    openScenePicker(scenes, result);
  }

  function openScenePicker(scenes, result) {
    closeScenePicker();

    var html = '';
    html += '<div class="scene-picker-overlay" id="mmzScenePicker">';
    html += '<div class="scene-picker-backdrop" data-action="close-scene-picker"></div>';
    html += '<div class="scene-picker-panel">';
    html += '<div class="scene-picker-header">';
    html += '<button type="button" class="scene-picker-back" data-action="close-scene-picker">‹ 返回</button>';
    html += '<span class="scene-picker-title">选择新场景</span>';
    html += '<button type="button" class="scene-picker-close" data-action="close-scene-picker" aria-label="关闭">' + MMZ.Icon.render('close', 'line', 18) + '</button>';
    html += '</div>';
    html += '<div class="scene-picker-body">';
    html += '<div class="scene-picker-grid">';
    scenes.forEach(function (s) {
      var isSelected = s.key === result.scene;
      var selClass = isSelected ? ' selected' : '';
      var thumb = imgUrl(s.preview_url);
      html +=
        '<div class="scene-picker-item' + selClass + '" data-action="pick-new-scene" data-key="' + s.key + '">' +
          '<div class="scene-picker-cover" style="background-image:url(' + thumb + ')"></div>' +
          '<div class="scene-picker-name">' + escapeHtml(s.name || s.key) + '</div>' +
          (isSelected ? '<div class="scene-picker-check">' + MMZ.Icon.render('check', 'solid', 14) + '</div>' : '') +
        '</div>';
    });
    html += '</div>';
    html += '</div>';
    html += '</div>';
    html += '</div>';

    var div = document.createElement('div');
    div.innerHTML = html;
    var overlay = div.firstElementChild;
    bindScenePickerEvents(overlay);
    var root = document.querySelector('.device') || document.body;
    root.appendChild(overlay);
  }

  /**
   * 场景弹层挂在 device/body 上，需在弹层自身绑定点击（#app 委托收不到）
   */
  function bindScenePickerEvents(overlay) {
    if (!overlay) return;
    var handler = function (e) {
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');
      if (action === 'close-scene-picker') {
        closeScenePicker();
      } else if (action === 'pick-new-scene') {
        var key = target.getAttribute('data-key');
        handleSceneChange(key);
      }
    };
    overlay._scenePickerHandler = handler;
    overlay.addEventListener('click', handler);
  }

  /**
   * 关闭场景选择器
   */
  function closeScenePicker() {
    var picker = document.getElementById('mmzScenePicker');
    if (picker) {
      if (picker._scenePickerHandler) {
        picker.removeEventListener('click', picker._scenePickerHandler);
        picker._scenePickerHandler = null;
      }
      picker.remove();
    }
  }

  /**
   * 换场景
   * POST /api/scene/change (JSON: { tryon_id, scene_key })
   */
  function handleSceneChange(sceneKey) {
    var result = Store.getState().result;
    if (!result.tryon_id) return;

    closeScenePicker();
    Loading.show('正在换场景…');

    request.post('/api/scene/change', {
      tryon_id: result.tryon_id,
      scene_key: sceneKey
    }).then(function (data) {
      Loading.hide();

      Store.setState({
        result: Object.assign({}, result, {
          result_url: data.result_url || result.result_url,
          scene: sceneKey,
          demo: data.demo !== undefined ? data.demo : result.demo
        })
      });

      if (MMZ.DemoBadge) {
        MMZ.DemoBadge.setDemo(data.demo || false);
      }

      Loading.toast('换场景成功');
      rerenderPage();
    }).catch(function (err) {
      Loading.hide();
      Loading.toast(err.message);
    });
  }

  function syncFavoriteState(tryonId) {
    request.get('/api/favorite/list').then(function (data) {
      var items = (data && data.items) || [];
      var favorited = false;
      var i;
      for (i = 0; i < items.length; i++) {
        if (items[i].tryon_id === tryonId) {
          favorited = true;
          break;
        }
      }
      Store.setState({
        result: Object.assign({}, Store.getState().result, { favorited: favorited })
      });
      updateFavoriteButtonUI();
    }).catch(function () { /* 静默失败，不影响主流程 */ });
  }

  function updateFavoriteButtonUI() {
    var favorited = !!(Store.getState().result && Store.getState().result.favorited);
    var btn = document.querySelector('.result-action-item[data-action="favorite"]');
    if (!btn) return;
    btn.classList.toggle('is-active', favorited);
    var iconEl = btn.querySelector('.result-action-icon');
    var labelEl = btn.querySelector('.result-action-label');
    if (iconEl) {
      iconEl.innerHTML = MMZ.Icon.render('star', favorited ? 'solid' : 'line', 24);
    }
    if (labelEl) {
      labelEl.textContent = favorited ? '已收藏' : '收藏';
    }
  }

  /**
   * 收藏/取消收藏
   * POST /api/favorite/toggle (JSON: { tryon_id })
   */
  function handleToggleFavorite() {
    var result = Store.getState().result;
    if (!result.tryon_id) {
      Loading.toast('缺少试穿记录');
      return;
    }

    request.post('/api/favorite/toggle', { tryon_id: result.tryon_id }).then(function (data) {
      var favorited = !!(data && data.favorited);
      Store.setState({
        result: Object.assign({}, Store.getState().result, { favorited: favorited })
      });
      updateFavoriteButtonUI();
      Loading.toast(favorited ? '已收藏' : '已取消收藏');
    }).catch(function (err) {
      Loading.toast(err.message);
    });
  }

  /**
   * 重置 result 状态（离开页面时调用）
   */
  function resetResult() {
    Store.setState({
      result: {
        loading: false,
        progress: 0,
        tipIndex: 0,
        scene: '',
        demo: false,
        status: undefined,
        tryon_id: null,
        favorited: false,
        result_url: '',
        scene_image_url: '',
        error_msg: ''
      }
    });
  }

  // ===== 工具 =====

  function progressOffset(progress) {
    var pct = Math.min(100, Math.max(0, progress || 0));
    return 100 - pct;
  }

  function applyArcProgress(arc, progress) {
    if (!arc) return;
    var pct = Math.min(100, Math.max(0, progress || 0));
    arc.setAttribute('pathLength', '100');
    arc.setAttribute('stroke-dasharray', '100');
    arc.setAttribute('stroke-dashoffset', String(100 - pct));
  }

  function progressLabel(progress) {
    return progress > 0 ? Math.round(progress) + '%' : '准备中';
  }

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  return {
    render: render,
    onMount: onMount,
    cleanup: cleanup
  };
})();

</script>

<!-- pages/wardrobe.js -->
<script>
/**
 * 妈妈装 H5 · 我的衣柜（单品模式 - 改造版）
 *
 * 核心设计：
 * 1. 衣柜只存放拆解后的单品服装图（透明背景PNG），不存整套穿搭人物照片
 * 2. 按品类分类展示：上衣、裤子、裙装、外套、鞋子、帽子、头饰、配饰等
 * 3. 点击单品直接跳转试衣间进行搭配试穿
 * 4. 支持多选单品进行组合搭配
 * 5. 从穿搭拆解导入的单品自动按品类归类
 */
window.MMZ = window.MMZ || {};

MMZ.Wardrobe = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;
  var OutfitBuilder = MMZ.OutfitBuilder;

  var allItems = [];
  var currentCategory = 'all';
  var selectedItems = []; // 多选模式
  var isMultiSelect = false;

  // 品类定义（与后端细分类目对齐）
  var CATEGORIES = [
    { key: 'upper', label: '上衣', icon: '👕' },
    { key: 'lower', label: '裤子', icon: '👖' },
    { key: 'dress', label: '裙装', icon: '👗' },
    { key: 'outer', label: '外套', icon: '🧥' },
    { key: 'shoes', label: '鞋子', icon: '👟' },
    { key: 'hat', label: '帽子', icon: '🎩' },
    { key: 'headwear', label: '头饰', icon: '👑' },
    { key: 'accessory', label: '配饰', icon: '💍' },
    { key: 'bag', label: '包包', icon: '👜' },
    { key: 'belt', label: '腰带', icon: '〰️' },
    { key: 'socks', label: '袜子', icon: '🧦' },
  ];

  function renderCategoryTabs() {
    var html = '<div class="wardrobe-cat-tabs" id="wardrobeCatTabs">';
    html += '<div class="wardrobe-cat-tab' + (currentCategory === 'all' ? ' active' : '') + '" data-cat="all">全部</div>';
    CATEGORIES.forEach(function (cat) {
      var active = cat.key === currentCategory ? ' active' : '';
      html += '<div class="wardrobe-cat-tab' + active + '" data-cat="' + cat.key + '">' + cat.icon + ' ' + cat.label + '</div>';
    });
    html += '</div>';
    return html;
  }

  function render() {
    var html = '';
    html += '<div class="page page-wardrobe">';

    // 顶部标题栏
    html += '<div class="wardrobe-header">';
    html += '<div class="wardrobe-title">我的衣柜</div>';
    html += '<div class="wardrobe-actions">';
    html += '<button class="wardrobe-btn-multi" data-action="toggle-multi">' + (isMultiSelect ? '完成' : '多选') + '</button>';
    html += '<button class="wardrobe-btn-add" data-action="upload-garment">＋添加</button>';
    html += '</div>';
    html += '</div>';

    // 品类筛选
    html += renderCategoryTabs();

    // 统计信息
    html += '<div class="wardrobe-meta">';
    html += '<span id="wardrobeCount">共 0 件</span>';
    if (isMultiSelect) {
      html += '<span class="wardrobe-selected-info">已选 <span id="selectedCount">0</span> 件</span>';
    }
    html += '</div>';

    // 单品网格
    html += '<div class="wardrobe-grid" id="wardrobeGrid" style="padding-bottom:' + (isMultiSelect ? '140px' : '80px') + '">';
    html += '<div class="wardrobe-loading">加载中…</div>';
    html += '</div>';

    // 底部操作栏（多选模式显示）
    if (isMultiSelect) {
      html += '<div class="wardrobe-bottom-bar wardrobe-bottom-bar--multi">';
      html += '<button class="btn-outline btn-half" data-action="delete-selected" disabled>删除</button>';
      html += '<button class="btn-primary btn-half" data-action="tryon-selected" disabled>去试穿</button>';
      html += '</div>';
    }

    html += '</div>';
    return html;
  }

  function onMount() {
    loadWardrobe();
    bindEvents();
  }

  function loadWardrobe() {
    var url = '/api/wardrobe/list';
    if (currentCategory !== 'all') {
      url += '?category=' + currentCategory;
    }
    request.get(url).then(function (data) {
      allItems = (data && data.items) || [];
      renderGrid();
    }).catch(function (err) {
      var grid = document.getElementById('wardrobeGrid');
      if (grid) grid.innerHTML = '<div class="wardrobe-empty">' + escapeHtml(err.message) + '</div>';
    });
  }

  function getFilteredItems() {
    // 后端已按品类筛选，直接返回全部
    return allItems.slice();
  }

  function renderGrid() {
    var grid = document.getElementById('wardrobeGrid');
    if (!grid) return;

    var filtered = getFilteredItems();
    updateCount();

    if (filtered.length === 0) {
      var emptyText = currentCategory === 'all'
        ? '衣柜还是空的，快去添加衣服吧'
        : '还没有这个分类的衣服';
      grid.innerHTML =
        '<div class="wardrobe-empty">' +
          '<div class="wardrobe-empty-icon">👗</div>' +
          '<div class="wardrobe-empty-text">' + emptyText + '</div>' +
          '<div class="wardrobe-empty-action" data-action="upload-garment">点击添加衣服</div>' +
        '</div>';
      return;
    }

    var html = '';
    filtered.forEach(function (item) {
      var cover = imgUrl(item.cover_url);
      var isSelected = selectedItems.indexOf(item.id) !== -1;
      var catLabel = getCategoryLabel(item.category);

      html += '<div class="wardrobe-item' + (isSelected ? ' selected' : '') + '" ';
      html += 'data-id="' + item.id + '" ';
      html += 'data-category="' + item.category + '">';

      // 单品图片（透明背景）- 使用img标签确保正确显示透明PNG
      html += '<div class="wardrobe-item-cover">';
      html += '<img src="' + cover + '" alt="' + escapeHtml(item.garment || '服装') + '" loading="lazy" onerror="this.style.display=\'none\'">';
      if (isMultiSelect) {
        html += '<div class="wardrobe-item-check">' + (isSelected ? '✓' : '') + '</div>';
      }
      html += '</div>';

      // 单品信息
      html += '<div class="wardrobe-item-info">';
      html += '<div class="wardrobe-item-name">' + escapeHtml(item.garment || '未命名') + '</div>';
      html += '<div class="wardrobe-item-category">' + catLabel + '</div>';
      html += '</div>';

      // 操作按钮（非多选模式）
      if (!isMultiSelect) {
        html += '<div class="wardrobe-item-actions">';
        html += '<button class="wardrobe-btn-tryon" data-action="tryon-item" data-id="' + item.id + '">试穿</button>';
        html += '<button class="wardrobe-btn-delete" data-action="delete-item" data-id="' + item.id + '">删除</button>';
        html += '</div>';
      }

      html += '</div>';
    });
    grid.innerHTML = html;
  }

  function getCategoryLabel(category) {
    var cat = CATEGORIES.find(function (c) { return c.key === category; });
    return cat ? cat.label : category;
  }

  function updateCount() {
    var countEl = document.getElementById('wardrobeCount');
    if (countEl) {
      countEl.textContent = '共 ' + getFilteredItems().length + ' 件';
    }
    var selectedEl = document.getElementById('selectedCount');
    if (selectedEl) {
      selectedEl.textContent = selectedItems.length;
    }
    // 更新底部按钮状态
    var tryonBtn = document.querySelector('[data-action="tryon-selected"]');
    if (tryonBtn) {
      tryonBtn.disabled = selectedItems.length === 0;
    }
    var deleteBtn = document.querySelector('[data-action="delete-selected"]');
    if (deleteBtn) {
      deleteBtn.disabled = selectedItems.length === 0;
    }
  }

  function bindEvents() {
    var app = document.getElementById('app');
    if (!app) return;

    var clickHandler = function (e) {
      // 品类切换
      var catEl = e.target.closest('[data-cat]');
      if (catEl) {
        switchCategory(catEl.getAttribute('data-cat'));
        return;
      }

      // 多选模式：点击单品卡片任意位置都能选中
      if (isMultiSelect) {
        var itemEl = e.target.closest('.wardrobe-item');
        if (itemEl) {
          toggleSelectItem(parseInt(itemEl.getAttribute('data-id'), 10));
          return;
        }
      }

      // 非多选模式：点击试穿按钮
      var actionEl = e.target.closest('[data-action]');
      if (actionEl) {
        var action = actionEl.getAttribute('data-action');
        switch (action) {
          case 'tryon-item':
            var itemId = parseInt(actionEl.getAttribute('data-id') || actionEl.closest('.wardrobe-item').getAttribute('data-id'), 10);
            handleTryonItem(itemId);
            break;
          case 'delete-item':
            handleDeleteItem(parseInt(actionEl.getAttribute('data-id'), 10));
            break;
          case 'toggle-multi':
            toggleMultiSelect();
            break;
          case 'tryon-selected':
            handleTryonSelected();
            break;
          case 'delete-selected':
            handleDeleteSelected();
            break;
          case 'upload-garment':
            showUploadModal();
            break;
          default:
            break;
        }
      }
    };
    window.MMZ._pageClickHandler = clickHandler;
    app.addEventListener('click', clickHandler);
  }

  function switchCategory(cat) {
    currentCategory = cat;
    selectedItems = []; // 切换分类清空选择
    var tabs = document.querySelectorAll('#wardrobeCatTabs .wardrobe-cat-tab');
    tabs.forEach(function (tab) {
      tab.classList.toggle('active', tab.getAttribute('data-cat') === cat);
    });
    loadWardrobe();
  }

  function toggleMultiSelect() {
    if (isMultiSelect && selectedItems.length > 0) {
      // 多选模式下点"完成"，如果有选中项则跳转试穿
      handleTryonSelected();
      return;
    }
    isMultiSelect = !isMultiSelect;
    selectedItems = [];
    // 重新渲染页面
    var app = document.getElementById('app');
    if (app) {
      app.innerHTML = render();
      onMount();
    }
  }

  function toggleSelectItem(id) {
    var idx = selectedItems.indexOf(id);
    if (idx === -1) {
      selectedItems.push(id);
    } else {
      selectedItems.splice(idx, 1);
    }
    renderGrid();
  }

  function handleTryonItem(id) {
    var item = allItems.find(function (i) { return i.id === id; });
    if (!item) return;

    // 跳转到试衣间，带上选中的单品，直接进入模特搭配步骤
    Store.setState({
      tryon: Object.assign({}, Store.getState().tryon || {}, {
        garment_ids: [item.id],
        garment_name: item.garment,
        garment_cover: item.cover_url,
        category: item.category,
        _fromWardrobe: true,
        _goCustomizeStep: true
      })
    });
    Router.navigate('tryon', 'tryon');
  }

  function handleTryonSelected() {
    if (selectedItems.length === 0) {
      Loading.toast('请先选择衣服');
      return;
    }

    var items = allItems.filter(function (i) { return selectedItems.indexOf(i.id) !== -1; });
    var garmentIds = items.map(function (i) { return i.id; });
    var garmentNames = items.map(function (i) { return i.garment || '未命名'; }).join(' + ');

    // 构建 slotMap 用于模特搭配
    var slotMap = OutfitBuilder.defaultSlotMap();
    var meta = {};
    items.forEach(function (item) {
      meta[item.id] = item;
      // 自动分配到对应槽位
      var slotKey = OutfitBuilder.categoryToSlot(item.category);
      if (slotKey && !slotMap[slotKey]) {
        slotMap[slotKey] = item.id;
      }
    });

    Store.setState({
      tryon: Object.assign({}, Store.getState().tryon || {}, {
        garment_ids: garmentIds,
        garment_name: garmentNames,
        garment_cover: items[0].cover_url,
        category: items[0].category,
        _fromWardrobe: true,
        _multiSelect: true,
        _goCustomizeStep: true,
        slotMap: slotMap
      })
    });
    Router.navigate('tryon', 'tryon');
  }

  function handleDeleteItem(id) {
    var item = allItems.find(function (i) { return i.id === id; });
    if (!item) return;
    var name = item.garment || '这件衣服';
    if (!window.confirm('确定删除「' + name + '」？删除后无法恢复。')) {
      return;
    }
    Loading.show('删除中…');
    request.del('/api/wardrobe/' + id).then(function () {
      Loading.hide();
      Loading.toast('已删除');
      allItems = allItems.filter(function (i) { return i.id !== id; });
      selectedItems = selectedItems.filter(function (sid) { return sid !== id; });
      renderGrid();
    }).catch(function (err) {
      Loading.hide();
      Loading.toast(err.message || '删除失败');
    });
  }

  function handleDeleteSelected() {
    if (selectedItems.length === 0) {
      Loading.toast('请先选择要删除的衣服');
      return;
    }
    var count = selectedItems.length;
    if (!window.confirm('确定删除选中的 ' + count + ' 件衣服？删除后无法恢复。')) {
      return;
    }
    Loading.show('删除中…');
    var ids = selectedItems.slice();
    var chain = Promise.resolve();
    ids.forEach(function (id) {
      chain = chain.then(function () {
        return request.del('/api/wardrobe/' + id);
      });
    });
    chain.then(function () {
      Loading.hide();
      Loading.toast('已删除 ' + count + ' 件');
      selectedItems = [];
      loadWardrobe();
    }).catch(function (err) {
      Loading.hide();
      Loading.toast(err.message || '删除失败');
      loadWardrobe();
    });
  }

  /**
   * 上传衣服弹层
   */
  function showUploadModal() {
    var defaultCat = currentCategory !== 'all' ? currentCategory : 'upper';

    var catOptions = '';
    CATEGORIES.forEach(function (cat) {
      var active = cat.key === defaultCat ? ' active' : '';
      catOptions +=
        '<div class="garment-up-cat' + active + '" data-up-cat="' + cat.key + '">' + cat.icon + ' ' + cat.label + '</div>';
    });

    var overlay = document.createElement('div');
    overlay.className = 'garment-upload-overlay';
    overlay.innerHTML =
      '<div class="garment-upload-card">' +
        '<div class="garment-upload-head">' +
          '<span class="garment-upload-title">添加衣服</span>' +
          '<span class="garment-upload-close">✕</span>' +
        '</div>' +
        '<div class="garment-upload-label">选择类目</div>' +
        '<div class="garment-upload-cats">' + catOptions + '</div>' +
        '<div class="garment-upload-label">上传图片（建议透明背景）</div>' +
        '<div class="garment-upload-pick" data-up-pick="1">' +
          '<div class="garment-upload-preview" id="garmentUpPreview">点击选择图片</div>' +
        '</div>' +
        '<input type="file" accept="image/*" id="garmentUpFile" style="display:none" />' +
        '<button type="button" class="btn-primary btn-full" data-up-submit="1">确认上传</button>' +
      '</div>';

    var selectedCat = defaultCat;
    var selectedFile = null;

    function close() {
      overlay.remove();
    }

    overlay.addEventListener('click', function (e) {
      var t = e.target;
      // 点击遮罩层关闭
      if (t === overlay) {
        close();
        return;
      }
      // 点击X关闭按钮
      if (t.classList.contains('garment-upload-close') || t.closest('.garment-upload-close')) {
        e.preventDefault();
        e.stopPropagation();
        close();
        return;
      }
      var catEl = t.closest('[data-up-cat]');
      if (catEl) {
        selectedCat = catEl.getAttribute('data-up-cat');
        overlay.querySelectorAll('.garment-up-cat').forEach(function (el) {
          el.classList.toggle('active', el === catEl);
        });
        return;
      }
      if (t.closest('[data-up-pick]')) {
        overlay.querySelector('#garmentUpFile').click();
        return;
      }
      if (t.closest('[data-up-submit]')) {
        doUpload();
      }
    });

    overlay.querySelector('#garmentUpFile').addEventListener('change', function (e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      selectedFile = file;
      var preview = overlay.querySelector('#garmentUpPreview');
      var reader = new FileReader();
      reader.onload = function (ev) {
        preview.innerHTML = '<img src="' + ev.target.result + '" class="garment-upload-thumb" />';
      };
      reader.readAsDataURL(file);
    });

    function doUpload() {
      if (!selectedFile) {
        Loading.toast('请先选择图片');
        return;
      }
      var fd = new FormData();
      fd.append('file', selectedFile);
      fd.append('category', selectedCat);
      fd.append('source', 'upload');

      Loading.show('上传中…');
      request.post('/api/wardrobe/add', undefined, { formData: fd, timeout: 60000 })
        .then(function () {
          Loading.hide();
          Loading.toast('添加成功');
          close();
          loadWardrobe();
        })
        .catch(function (err) {
          Loading.hide();
          Loading.toast(err.message || '上传失败');
        });
    }

    document.body.appendChild(overlay);
  }

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  return {
    render: render,
    onMount: onMount
  };
})();

</script>
