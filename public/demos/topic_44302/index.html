<script>
/**
 * 妈妈装 H5 · 景区打卡详情页
 * 路由：#/checkin
 *
 * 打开方式：MMZ.CheckinDetail.open(spotId, returnRoute)
 */
window.MMZ = window.MMZ || {};

MMZ.CheckinDetail = (function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var request = MMZ.request;
  var config = MMZ.config;
  var Loading = MMZ.Loading;

  var loadingData = false;
  var pageBound = false;

  function open(spotId, returnRoute) {
    var route = returnRoute || Store.getState().route || 'home';
    var spots = Store.getState().checkinSpots || [];
    var preview = null;
    for (var i = 0; i < spots.length; i++) {
      if (spots[i].id === spotId) {
        preview = spots[i];
        break;
      }
    }
    Store.setState({
      checkinDetail: { spotId: spotId, data: null, preview: preview },
      checkinReturnRoute: route
    });
    try {
      sessionStorage.setItem('mmz_checkin_id', String(spotId));
      sessionStorage.setItem('mmz_checkin_return', route);
    } catch (e) { /* ignore */ }
    loadingData = false;
    Router.navigate('checkin');
  }

  function render() {
    var cd = Store.getState().checkinDetail || {};
    var data = cd.data;

    var pageStyle = 'padding:0;margin:0;width:100%;max-width:100%;min-width:0;overflow-x:clip;box-sizing:border-box';
    var html = '<div class="page page-checkin-detail" id="checkinDetailPage" style="' + pageStyle + '">';
    if (!data) {
      html += renderLoading();
    } else {
      html += renderDetailContent(data);
    }
    html += '</div>';
    return html;
  }

  function renderLoading() {
    return (
      '<div class="checkin-detail-loading">' +
        '<div class="checkin-detail-loading-spinner"></div>' +
        '<div class="checkin-detail-loading-text">加载中…</div>' +
      '</div>'
    );
  }

  function renderDetailContent(data) {
    var gallery = data.gallery || [];
    if (!gallery.length && data.image_url) {
      gallery = [data.image_url];
    }
    var tags = data.tags || [];
    var locLine = [data.city, data.district].filter(Boolean).join(' · ');
    var heat = data.heat >= 1000 ? (data.heat / 1000).toFixed(1) + 'k' : (data.heat || '');
    var photoSpots = data.photo_spots || [];

    var html = '<div class="checkin-detail-scroll">';

    html += '<div class="checkin-detail-gallery">';
    gallery.forEach(function (url, idx) {
      var img = imgUrl(url);
      html += '<div class="checkin-detail-gallery-item">';
      html += '<img src="' + img + '" alt="" loading="' + (idx === 0 ? 'eager' : 'lazy') + '" data-action="preview-image" data-url="' + img + '" />';
      html += '</div>';
    });
    html += '</div>';

    html += '<div class="checkin-detail-head">';
    html += '<h1 class="checkin-detail-name">' + escapeHtml(data.name || '') + '</h1>';
    if (locLine) {
      html += '<div class="checkin-detail-loc">' + escapeHtml(locLine) + '</div>';
    }
    html += '<div class="checkin-detail-meta">';
    if (heat) {
      html += '<span class="checkin-detail-heat">' + MMZ.Icon.render('fire', 'line', 12) + ' ' + heat + '</span>';
    }
    tags.forEach(function (tag) {
      html += '<span class="checkin-detail-tag">' + escapeHtml(tag) + '</span>';
    });
    html += '</div>';
    html += '</div>';

    html += '<div class="checkin-detail-section">';
    html += '<div class="checkin-detail-section-title">景区介绍</div>';
    html += '<div class="checkin-detail-intro">' + escapeHtml(data.intro || '') + '</div>';
    html += '</div>';

    html += '<div class="checkin-detail-section">';
    html += '<div class="checkin-detail-section-title">推荐最佳拍照打卡位置</div>';
    html += '<div class="checkin-detail-spots">';
    photoSpots.forEach(function (spot, idx) {
      html += '<div class="checkin-detail-spot-card">';
      html += '<div class="checkin-detail-spot-num">' + (idx + 1) + '</div>';
      html += '<div class="checkin-detail-spot-body">';
      html += '<div class="checkin-detail-spot-head">';
      html += '<span class="checkin-detail-spot-name">' + escapeHtml(spot.name || '') + '</span>';
      if (spot.badge) {
        html += '<span class="checkin-detail-spot-badge">' + escapeHtml(spot.badge) + '</span>';
      }
      html += '</div>';
      html += '<div class="checkin-detail-spot-tip">' + escapeHtml(spot.tip || '') + '</div>';
      if (spot.best_time) {
        html += '<div class="checkin-detail-spot-time">最佳时间：' + escapeHtml(spot.best_time) + '</div>';
      }
      html += '</div></div>';
    });
    html += '</div></div>';

    html += '<div class="checkin-detail-spacer"></div>';
    html += '</div>';

    html += '<div class="checkin-detail-bottom-bar">';
    html += '<button type="button" class="btn-primary btn-full" data-action="go-tryon-scene" data-scene="' + escapeAttr(data.scene || 'park') + '">去试衣间选穿搭</button>';
    html += '</div>';

    return html;
  }

  function updatePageContent() {
    var el = document.getElementById('checkinDetailPage');
    if (!el) return;
    var data = Store.getState().checkinDetail.data;
    if (!data) return;
    el.innerHTML = renderDetailContent(data);
  }

  function buildDetailQuery(preview) {
    if (!preview) return '';
    var params = [];
    function add(key, val) {
      if (val != null && val !== '') {
        params.push(encodeURIComponent(key) + '=' + encodeURIComponent(String(val)));
      }
    }
    add('name', preview.name);
    add('city', preview.city);
    add('district', preview.district);
    add('tip', preview.tip);
    add('scene', preview.scene);
    add('image_url', preview.image_url);
    return params.length ? '?' + params.join('&') : '';
  }

  function loadDetail(spotId) {
    loadingData = true;
    var preview = (Store.getState().checkinDetail || {}).preview;
    var query = buildDetailQuery(preview);
    request.get('/api/home/checkin-spots/' + spotId + query).then(function (data) {
      loadingData = false;
      Store.setState({
        checkinDetail: {
          spotId: spotId,
          data: data,
          preview: preview
        }
      });
      updatePageContent();
    }).catch(function (err) {
      loadingData = false;
      if (preview) {
        Store.setState({
          checkinDetail: {
            spotId: spotId,
            data: buildClientDetail(preview),
            preview: preview
          }
        });
        updatePageContent();
      } else {
        Loading.toast(err.message || '加载失败');
        Router.goBack();
      }
    });
  }

  function buildClientDetail(spot) {
    var gallery = spot.image_url ? [spot.image_url] : [];
    return {
      id: spot.id,
      name: spot.name,
      city: spot.city,
      district: spot.district,
      heat: spot.heat,
      tags: spot.tags || [],
      scene: spot.scene || 'park',
      intro: (spot.tip ? spot.name + '：' + spot.tip : spot.name) || '',
      gallery: gallery,
      photo_spots: [
        { name: '经典主视角', tip: spot.tip || '正对标志性景观拍照', best_time: '上午 9:00-11:00', badge: '必拍' },
        { name: '侧向层次机位', tip: '利用前景增加画面层次', best_time: '下午 4:00-6:00', badge: '避人流' },
        { name: '远景亲子合影', tip: '退后几步拍全身合影', best_time: '晴日傍晚', badge: '亲子' }
      ]
    };
  }

  function onMount() {
    var cd = Store.getState().checkinDetail || {};
    var spotId = cd.spotId;
    if (!spotId) {
      try {
        spotId = parseInt(sessionStorage.getItem('mmz_checkin_id'), 10) || null;
        if (spotId) {
          Store.setState({
            checkinDetail: { spotId: spotId, data: cd.data || null, preview: cd.preview || null },
            checkinReturnRoute: sessionStorage.getItem('mmz_checkin_return') || 'home'
          });
        }
      } catch (e) { /* ignore */ }
    }
    if (!spotId) {
      Router.navigate('home', 'home');
      return;
    }
    bindPageEvents();
    var appEl = document.getElementById('app');
    if (appEl) appEl.scrollLeft = 0;
    if (!cd.data && !loadingData) {
      loadDetail(spotId);
    }
  }

  function cleanup() {
    pageBound = false;
    loadingData = false;
  }

  function bindPageEvents() {
    if (pageBound) return;
    pageBound = true;

    var app = document.getElementById('app');
    if (!app) return;

    var clickHandler = function (e) {
      if (Store.getState().route !== 'checkin') return;
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');

      switch (action) {
        case 'go-tryon-scene':
          if (!Store.getState().child.id) {
            Loading.toast('请先添加宝贝档案');
            Router.navigate('register');
          } else {
            var sceneKey = target.getAttribute('data-scene') || 'park';
            var tryonState = Store.getState().tryon || {};
            Store.setState({
              tryon: Object.assign({}, tryonState, {
                scene: sceneKey,
                _initialStep: (tryonState.garment_ids || []).length > 0 ? 3 : 2
              })
            });
            Loading.toast('已匹配景点场景，请选穿搭');
            Router.navigate('tryon', 'tryon');
          }
          break;
        case 'preview-image':
          showFullImage(target.getAttribute('data-url'));
          break;
        default:
          break;
      }
    };

    window.MMZ._pageClickHandler = clickHandler;
    app.addEventListener('click', clickHandler);
  }

  function showFullImage(url) {
    if (!url) return;
    var overlay = document.createElement('div');
    overlay.className = 'checkin-detail-preview-overlay';
    overlay.innerHTML = '<img src="' + url + '" alt="" />';
    overlay.addEventListener('click', function () {
      document.body.removeChild(overlay);
    });
    document.body.appendChild(overlay);
  }

  function imgUrl(url) {
    if (!url) return '';
    if (url.indexOf('http') === 0) return url;
    return config.API_BASE + url;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escapeAttr(str) {
    return escapeHtml(str).replace(/'/g, '&#39;');
  }

  function init() {}

  return {
    open: open,
    init: init,
    render: render,
    onMount: onMount,
    cleanup: cleanup
  };
})();

</script>

<!-- app.js -->
<script>
/**
 * 妈马装 H5 · 应用入口
 * 职责：
 *   1. 注册 renderPage 回调到 Router（按 route.name 分发到各 pages/*.js）
 *   2. 管理页面生命周期（onMount / cleanup）
 *   3. 自动登录（device_id → POST /api/auth/login → 存 token）
 *
 * 页面模块约定（挂载在 MMZ.Home / MMZ.Register / ... 上）：
 *   - render()     → 返回 HTML 字符串
 *   - onMount()    → 页面渲染后调用（加载数据、绑定事件）
 *   - cleanup()    → 离开页面前调用（清除定时器等），可选
 */
(function () {
  'use strict';

  var Store = MMZ.Store;
  var Router = MMZ.Router;
  var config = MMZ.config;

  /** 当前活跃页面模块（用于 cleanup） */
  var activePage = null;

  /**
   * 页面模块映射表
   * 每个 route 对应一个 page module（MMZ 命名空间下）
   */
  var PAGE_MAP = {
    home:     MMZ.Home,
    tryon:    MMZ.Tryon,
    register: MMZ.Register,
    result:   MMZ.Result,
    wardrobe: MMZ.Wardrobe,
    aid:      MMZ.Aid,
    mine:     MMZ.Mine,
    album:    MMZ.Album,
    post:     MMZ.PostDetail,
    checkin:  MMZ.CheckinDetail,
    decompose: MMZ.Decompose
  };

  /**
   * 路由渲染回调
   * 由 Router.handleHashChange → renderCurrentPage → renderCallback(route) 调用
   * @param {string} route - 当前路由名
   * @returns {string} HTML 字符串
   */
  function renderPage(route) {
    // 0. 移除上一个页面的 click / keydown 事件委托（防止监听器累积）
    var appEl = document.getElementById('app');
    if (appEl && window.MMZ._pageClickHandler) {
      appEl.removeEventListener('click', window.MMZ._pageClickHandler);
      window.MMZ._pageClickHandler = null;
    }
    if (appEl && window.MMZ._pageKeyHandler) {
      appEl.removeEventListener('keydown', window.MMZ._pageKeyHandler);
      window.MMZ._pageKeyHandler = null;
    }

    // 1. 清理上一个页面的资源（定时器等）
    if (activePage && typeof activePage.cleanup === 'function') {
      try {
        activePage.cleanup();
      } catch (e) {
        console.error('[app.js] cleanup error:', e);
      }
    }

    // 2. 获取目标页面模块
    var page = PAGE_MAP[route];
    if (!page || typeof page.render !== 'function') {
      // 未知路由 → 兜底占位
      activePage = null;
      return (
        '<div class="page"><div class="skeleton-placeholder">' +
        '<div class="skeleton-icon">' + MMZ.Icon.render('confused', 'line', 48) + '</div>' +
        '<div class="skeleton-title">页面开发中</div>' +
        '<div class="skeleton-desc">route: ' + route + '</div>' +
        '</div></div>'
      );
    }

    // 3. 渲染页面 HTML
    activePage = page;
    var html;
    try {
      html = page.render();
    } catch (e) {
      console.error('[app.js] render error:', e);
      html = '<div class="page"><div class="skeleton-placeholder">' +
        '<div class="skeleton-icon">' + MMZ.Icon.render('sad', 'line', 48) + '</div>' +
        '<div class="skeleton-title">渲染出错</div>' +
        '<div class="skeleton-desc">' + e.message + '</div>' +
        '</div></div>';
    }

    // 4. 延迟调用 onMount（等 DOM 插入后）
    setTimeout(function () {
      if (activePage === page && typeof page.onMount === 'function') {
        try {
          page.onMount();
        } catch (e) {
          console.error('[app.js] onMount error:', e);
        }
      }
    }, 0);

    return html;
  }

  /**
   * 从 localStorage 恢复孩子档案（刷新首屏避免误显示「未建档」）
   */
  function hydrateChildCache() {
    try {
      var raw = localStorage.getItem(config.CHILD_CACHE_KEY);
      if (raw) {
        var cached = JSON.parse(raw);
        if (cached && cached.id) {
          Store.setState({ child: cached });
          return;
        }
      }
      // 仅有 child_id 时先占位，避免刷新首屏误显示「未建档」
      var savedId = localStorage.getItem(config.CHILD_ID_KEY);
      if (savedId) {
        Store.setState({
          child: Object.assign({}, Store.getState().child, { id: parseInt(savedId, 10) || savedId })
        });
      }
    } catch (e) {
      console.warn('[hydrateChildCache] parse failed');
    }
  }

  /**
   * 加载当前孩子档案（刷新页面后恢复，避免首页误显示「未建档」）
   * @returns {Promise<void>}
   */
  function loadCurrentChild(isRetry) {
    return MMZ.request.get('/api/child/list').then(function (data) {
      var children = (data && data.children) || [];
      Store.setState({ childList: children });

      if (children.length === 0) {
        localStorage.removeItem(config.CHILD_CACHE_KEY);
        return;
      }

      var savedId = localStorage.getItem(config.CHILD_ID_KEY);
      var picked = null;
      var i;
      if (savedId) {
        for (i = 0; i < children.length; i++) {
          if (String(children[i].id) === savedId) {
            picked = children[i];
            break;
          }
        }
      }
      if (!picked && children.length > 0) {
        picked = children[0];
      }
      if (picked) {
        var normalized = normalizeChild(picked);
        Store.setState({ child: normalized });
        localStorage.setItem(config.CHILD_ID_KEY, String(picked.id));
        localStorage.setItem(config.CHILD_CACHE_KEY, JSON.stringify(normalized));
      }
    }).catch(function (err) {
      if (!isRetry) {
        return new Promise(function (resolve) {
          setTimeout(function () {
            resolve(loadCurrentChild(true));
          }, 600);
        });
      }
      console.warn('[loadCurrentChild] 加载孩子档案失败:', err.message);
    });
  }

  function normalizeChild(raw) {
    return {
      id: raw.id,
      name: raw.name,
      gender: raw.gender,
      age: raw.age,
      height: raw.height,
      weight: raw.weight,
      birthdate: raw.birthdate || '',
      standard_photo_url: raw.standard_photo_url || '',
      standard_photo_processed_url: raw.standard_photo_processed_url || '',
      pose_slot_bboxes: raw.pose_slot_bboxes || null,
      avatar_url: raw.avatar_url || ''
    };
  }

  hydrateChildCache();
  if (MMZ.Auth) {
    MMZ.Auth.hydrateUserCache();
    if (MMZ.Auth.isDemoFixedAccount && MMZ.Auth.isDemoFixedAccount()) {
      localStorage.setItem(config.DEVICE_ID_KEY, config.DEMO_DEVICE_ID);
    }
  }
  Router.onRender(renderPage);
  MMZ.TabBar.init();
  MMZ.DemoBadge.init();
  MMZ.PostDetail.init();
  MMZ.ShareModal.init();
  // 登录 + 孩子档案都就绪后再渲染，避免刷新后首屏误报「未建档」
  MMZ.request.ensureLogin().then(function (data) {
    if (data && data.is_new_user) {
      console.warn('[app] 当前为新账号，若无宝贝档案请在「我的-账号与登录」用旧设备号找回');
    }
    return loadCurrentChild();
  }).catch(function (err) {
    console.warn('[autoLogin] 登录失败:', err.message);
  }).finally(function () {
    Router.init();
  });
})();

</script>
