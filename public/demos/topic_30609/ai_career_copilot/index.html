<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Copilot - 职业成长与面试辅助系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0A66C2;
            --primary-dark: #004182;
            --primary-light: #E7F0FA;
            --success: #057642;
            --success-light: #ECFDF5;
            --warning: #B45309;
            --warning-light: #FFFBEB;
            --danger: #DC2626;
            --danger-light: #FEF2F2;
            --purple: #7C3AED;
            --purple-light: #F3E8FF;
            --bg-gray: #F9FAFB;
            --bg-white: #FFFFFF;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --border-light: #F3F4F6;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gray);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary-light);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .header-badge svg {
            width: 14px;
            height: 14px;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 38px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 560px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: box-shadow 0.2s ease;
            margin-bottom: 20px;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-icon svg {
            width: 20px;
            height: 20px;
        }

        .card-icon.blue { background: var(--primary-light); color: var(--primary); }
        .card-icon.green { background: var(--success-light); color: var(--success); }
        .card-icon.orange { background: var(--warning-light); color: var(--warning); }
        .card-icon.purple { background: var(--purple-light); color: var(--purple); }
        .card-icon.gray { background: #F3F4F6; color: var(--text-secondary); }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-body {
            padding: 24px;
        }

        /* Input Module */
        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            background: var(--bg-white);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.1);
        }

        textarea.input-field {
            min-height: 120px;
            resize: vertical;
            line-height: 1.6;
        }

        .btn-primary {
            width: 100%;
            padding: 14px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        /* Snapshot Module */
        .snapshot {
            background: linear-gradient(135deg, #0A66C2 0%, #7C3AED 100%);
            color: white;
            padding: 24px;
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
        }

        .snapshot::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }

        .snapshot-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            position: relative;
        }

        .snapshot-header svg {
            width: 22px;
            height: 22px;
        }

        .snapshot-header span {
            font-weight: 600;
            font-size: 15px;
        }

        .snapshot-score {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .score-circle-lg {
            width: 90px;
            height: 90px;
            position: relative;
            flex-shrink: 0;
        }

        .score-circle-lg svg {
            transform: rotate(-90deg);
        }

        .score-circle-bg-lg {
            fill: none;
            stroke: rgba(255,255,255,0.2);
            stroke-width: 8;
        }

        .score-circle-fill-lg {
            fill: none;
            stroke: #ffffff;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 314;
            stroke-dashoffset: 314;
            transition: stroke-dashoffset 1s ease-out;
        }

        .score-value-lg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
        }

        .score-info {
            flex: 1;
        }

        .score-info-row {
            margin-bottom: 6px;
            font-size: 14px;
            opacity: 0.95;
        }

        .score-info-row strong {
            font-weight: 600;
        }

        .snapshot-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            position: relative;
        }

        .snapshot-tag-group {
            flex: 1;
            min-width: 200px;
        }

        .snapshot-tag-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.8;
            margin-bottom: 6px;
        }

        .snapshot-tag-content {
            font-size: 13px;
            line-height: 1.5;
        }

        /* Analysis Module */
        .score-section {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 16px 0 24px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 24px;
        }

        .score-circle-sm {
            width: 72px;
            height: 72px;
            position: relative;
            flex-shrink: 0;
        }

        .score-circle-sm svg {
            transform: rotate(-90deg);
        }

        .score-circle-bg-sm {
            fill: none;
            stroke: var(--border-light);
            stroke-width: 8;
        }

        .score-circle-fill-sm {
            fill: none;
            stroke: var(--success);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 251;
            stroke-dashoffset: 251;
            transition: stroke-dashoffset 1s ease-out;
        }

        .score-value-sm {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }

        .score-text-block {
            flex: 1;
        }

        .score-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .score-comment {
            font-size: 14px;
            color: var(--text-primary);
            margin-top: 4px;
            font-weight: 500;
        }

        .analysis-section {
            margin-bottom: 20px;
        }

        .analysis-section:last-child {
            margin-bottom: 0;
        }

        .analysis-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .analysis-title svg {
            width: 14px;
            height: 14px;
        }

        .analysis-list {
            list-style: none;
        }

        .analysis-list li {
            position: relative;
            padding: 8px 0 8px 20px;
            margin-bottom: 4px;
            font-size: 14px;
            line-height: 1.5;
            border-bottom: 1px solid var(--border-light);
        }

        .analysis-list li:last-child {
            border-bottom: none;
        }

        .analysis-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .strengths-list li::before { background: var(--success); }
        .weaknesses-list li::before { background: var(--danger); }

        /* Interview Module */
        .question-item {
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            overflow: hidden;
        }

        .question-item:last-child {
            margin-bottom: 0;
        }

        .question-header {
            padding: 14px 16px;
            background: var(--bg-gray);
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: background 0.15s ease;
        }

        .question-header:hover {
            background: var(--border-light);
        }

        .question-number {
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .question-text {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .question-toggle {
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .question-item.expanded .question-toggle {
            transform: rotate(180deg);
        }

        .question-content {
            display: none;
            padding: 14px 16px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-white);
        }

        .question-item.expanded .question-content {
            display: block;
        }

        .answer-block, .followup-block {
            margin-bottom: 12px;
        }

        .answer-block:last-child, .followup-block:last-child {
            margin-bottom: 0;
        }

        .block-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .answer-label { color: var(--primary); }
        .followup-label { color: var(--warning); }

        .block-content {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
            background: var(--bg-gray);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
        }

        /* Growth Path Module */
        .timeline {
            position: relative;
            padding-left: 24px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: var(--border);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 20px;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -20px;
            top: 2px;
            width: 14px;
            height: 14px;
            background: var(--bg-white);
            border: 2px solid var(--primary);
            border-radius: 50%;
            z-index: 1;
        }

        .timeline-item.completed .timeline-dot {
            background: var(--primary);
        }

        .timeline-week {
            font-size: 11px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 4px;
        }

        .timeline-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .timeline-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .timeline-topics {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .topic-tag {
            padding: 3px 10px;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 11px;
            font-weight: 500;
            border-radius: 12px;
        }

        /* Loading & Empty States */
        .loading {
            display: none;
            text-align: center;
            padding: 32px 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Loading Animation */
        .loading-steps {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            padding: 40px 32px;
            text-align: center;
            margin-bottom: 20px;
        }

        .loading-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .loading-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .steps-list {
            list-style: none;
            display: inline-block;
            text-align: left;
            min-width: 260px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            font-size: 14px;
            color: var(--text-muted);
            transition: color 0.3s ease;
            border-bottom: 1px solid var(--border-light);
        }

        .step-item:last-child {
            border-bottom: none;
        }

        .step-item.active {
            color: var(--primary);
            font-weight: 500;
        }

        .step-item.done {
            color: var(--success);
            font-weight: 500;
        }

        .step-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .step-icon.pending {
            border: 2px solid var(--border);
            background: transparent;
        }

        .step-icon.active {
            border: 2px solid var(--primary);
            background: var(--primary-light);
            animation: pulse 1s ease-in-out infinite;
        }

        .step-icon.done {
            border: 2px solid var(--success);
            background: var(--success);
        }

        .step-icon svg {
            width: 12px;
            height: 12px;
        }

        .step-spinner {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(10, 102, 194, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-item.animate-in {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
        .fade-in-delay-4 { animation-delay: 0.4s; opacity: 0; }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 12px;
        }

        .stage-badge {
            display: inline-block;
            background: var(--warning-light);
            color: var(--warning);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 28px; }
            .snapshot-score { flex-direction: column; align-items: flex-start; gap: 12px; }
            .snapshot-tags { flex-direction: column; }
            .score-section { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-badge">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                AI驱动职业成长
            </div>
            <h1>AI Career Copilot</h1>
            <p>智能分析简历匹配度，模拟真实面试问题，规划专属职业成长路径</p>
        </header>

        <div class="card">
            <div class="card-header">
                <div class="card-icon blue">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                </div>
                <div>
                    <h2 class="card-title">简历与岗位输入</h2>
                    <p class="card-subtitle">输入您的简历内容和目标岗位，AI 将为您定制分析</p>
                </div>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <label class="input-label" for="position">目标岗位</label>
                    <input type="text" id="position" class="input-field" placeholder="例如：高级前端工程师 / 产品经理 / 运营经理 / Java后端开发">
                </div>
                <div class="input-group">
                    <label class="input-label" for="resume">简历内容</label>
                    <textarea id="resume" class="input-field" placeholder="请粘贴您的简历内容，包括教育背景、工作经历、技能特长、项目经验等...&#10;&#10;示例：&#10;3年前端开发经验，熟练使用 React、Vue、TypeScript，熟悉 Webpack 和前端工程化。负责过公司官网和后台管理系统的开发，有独立完成项目的经验。"></textarea>
                </div>

                    { level: 1, q: '请解释 CSS 的盒模型（Box Model）以及 box-sizing 的作用。', a: 'CSS 盒模型由 content、padding、border、margin 四部分组成。box-sizing: content-box（默认）时，宽度仅指 content；border-box 时，width 包含 content + padding + border。border-box 便于布局控制，推荐全局使用。', f: '在实际项目中，你是如何管理和组织 CSS 的？有遇到过样式冲突问题吗？' },
                    { level: 1, q: '什么是闭包（Closure）？请举例说明其应用场景。', a: '闭包是指有权访问另一个函数作用域中变量的函数。形成条件：函数嵌套 + 内部函数引用外部函数的局部变量。应用场景包括：模块化封装、函数柯里化、防抖节流实现、数据私有化等。闭包的代价是变量不会被垃圾回收，需注意内存泄漏。', f: '闭包在 React Hooks 中扮演什么角色？useCallback/useMemo 与闭包有什么关系？' },
                    { level: 1, q: '请说明浏览器的事件循环（Event Loop）机制。', a: '浏览器事件循环中，代码执行分为同步和异步。同步代码在调用栈执行，异步任务分为宏任务（setTimeout、setInterval、I/O）和微任务（Promise.then、MutationObserver）。执行顺序：执行同步代码 -> 清空微任务队列 -> 执行一个宏任务 -> 清空微任务 -> 循环往复。理解这一点有助于写出正确的异步代码。', f: 'async/await 在事件循环中是如何工作的？和 Promise 有什么区别？' },
                    { level: 2, q: '请描述一次你做过的前端性能优化实践，说明思路和效果。', a: '性能优化的典型思路是从指标出发（FCP/LCP/CLS等），通过 Chrome DevTools Performance 面板和 Lighthouse 分析瓶颈，然后针对性优化：首屏资源体积控制（代码分割、Tree Shaking）、图片优化（WebP/懒加载/响应式图片）、资源预加载（preload/prefetch）、缓存策略（Service Worker）、避免布局抖动等。核心是先量化再优化再验证。', f: '在做性能优化时，如何权衡开发效率和运行效率？有没有过度优化的经历？' },
                    { level: 2, q: 'React 的虚拟 DOM 和 Diff 算法是如何工作的？', a: '虚拟 DOM 是 JS 对象描述的 DOM 结构。当状态变化时，React 生成新的虚拟 DOM 树并与旧树对比。Diff 算法基于三个假设：1）不同类型元素直接替换；2）同层级用 key 标识；3）只在同层比较。通过 key 和类型判断，将 O(n3) 的树对比优化到 O(n)。理解这个原理有助于写出更高效的组件和避免不必要的重渲染。', f: 'React 18 的 Concurrent Mode 对 Diff 和渲染有什么影响？它解决了什么问题？' },
                    { level: 2, q: '你在项目中是如何进行状态管理的？为什么这样选择？', a: '状态管理的选择取决于项目规模和团队习惯。小型项目用 React Hooks（useState/useContext）足够；中大型项目可以考虑 Redux Toolkit 或 Zustand/Jotai 等轻量方案。设计原则是：区分全局状态和局部状态、避免状态提升过度、关注状态更新成本。好的状态管理应该让数据流清晰、易于调试、不会产生不必要的渲染。', f: '你如何看待服务端状态（如 SWR/React Query）和客户端状态的分离？这对架构有什么影响？' },
                    { level: 2, q: '说说你对前端工程化的理解：脚手架、构建工具、CI/CD 等。', a: '前端工程化是让前端开发系统化、标准化、自动化的过程。包括脚手架（快速初始化项目）、构建工具（Webpack/Vite/Rollup，负责打包优化）、代码规范（ESLint/Prettier）、自动化测试（Jest/Cypress）、CI/CD（自动构建部署）等。目标是提升开发效率、保证代码质量、降低重复劳动。实际工作中需要根据团队情况做定制化方案。', f: 'Vite 和 Webpack 的核心差异是什么？Vite 的"快"体现在哪里？' },
                    { level: 3, q: '如果让你从零设计一个中大型项目的前端架构，你会考虑哪些核心要素？', a: '设计中大型前端架构需要考虑：1）技术选型：框架、状态管理、UI库的选择；2）目录结构和模块划分：按功能组织而非文件类型；3）组件设计原则：原子设计或容器/展示组件分离；4）状态管理策略：全局 vs 局部；5）路由设计：懒加载、权限路由；6）可扩展性：插件机制、微前端方案；7）性能：缓存策略、首屏优化；8）工程化：ESLint、测试、CI/CD；9）监控：错误监控、性能埋点。', f: '微前端（Micro-Frontends）适合什么样的项目？它的引入代价和收益如何权衡？' },
                    { level: 3, q: '如何评估和提升前端团队的工程质量？', a: '团队工程质量的提升需要制度和工具双管齐下。制度方面：代码规范文档、Code Review 流程、技术分享机制、架构评审流程。工具方面：ESLint/Prettier 自动化检测、Husky + lint-staged 提交拦截、CI 自动测试、SonarQube 代码质量分析、前端错误监控平台（Sentry）。关键指标：Bug 率、代码覆盖率、构建时长、首屏性能等。最终目标是让团队产出稳定且可维护的代码。', f: '你遇到过团队中"技术债务"堆积的问题吗？如何推动解决？' },

                questions: [
                    { level: 1, q: '请解释什么是进程和线程，以及它们的区别。', a: '进程是操作系统分配资源的最小单位，拥有独立的内存空间；线程是 CPU 调度的最小单位，共享进程的内存。一个进程可以包含多个线程。进程间通信复杂（IPC/消息队列），线程间通信简单（共享内存），但需要处理同步问题。理解这个区别对理解并发编程至关重要。', f: '在你使用的编程语言中（如 Java/Python/Go），线程模型是怎样的？有哪些并发控制工具？' },
                    { level: 1, q: '数据库索引的原理是什么？B+ 树和 B 树有什么区别？', a: '索引是数据库中用于加速查询的数据结构。B+ 树是 MySQL InnoDB 的主要索引结构，它是一种多路平衡搜索树，特点是：非叶子节点只存键值，叶子节点存完整数据且通过链表连接，便于范围查询。相比 B 树，B+ 树的扇出更大、树高更低、范围查询更高效。索引的代价是增加写入开销和占用存储空间。', f: '什么是覆盖索引、回表、联合索引的最左前缀原则？请举例说明。' },
                    { level: 1, q: '请解释 HTTP 和 HTTPS 的区别，以及 TLS 握手过程。', a: 'HTTP 是明文传输，HTTPS 在 HTTP 基础上加入 SSL/TLS 加密层，保证传输安全。TLS 1.2 握手过程：客户端发送支持的加密套件 -> 服务端返回证书和公钥 -> 客户端验证证书 -> 客户端用公钥加密生成会话密钥 -> 双方用会话密钥加密通信。TLS 1.3 已简化为 1-RTT。HTTPS 带来的代价是额外的握手延迟和加解密计算开销。', f: '在实际项目中，你是如何配置 HTTPS 的？有遇到过证书相关的问题吗？' },
                    { level: 2, q: '说说你对 Redis 的理解，它适合哪些场景？有什么常见的坑？', a: 'Redis 是一个高性能的内存键值存储系统。典型应用场景：缓存热点数据、会话存储（Session）、计数器、分布式锁、排行榜、消息队列等。常见的坑：缓存穿透（布隆过滤器）、缓存击穿（互斥锁）、缓存雪崩（过期时间随机化）、缓存一致性问题（双写一致性）、大 Key 问题、内存淘汰策略选择不当。使用时需要结合业务场景做合理的容量规划。', f: 'Redis 的持久化机制（RDB/AOF）你是如何选择的？在实际生产环境中如何做备份和恢复？' },
                    { level: 2, q: '请描述一个你处理过的数据库性能问题，以及排查思路。', a: '数据库性能问题的典型排查流程：1）通过慢查询日志定位有问题的 SQL；2）用 EXPLAIN 分析执行计划，确认是否走了正确的索引；3）检查索引设计是否合理，是否需要新增联合索引；4）分析锁等待和死锁情况；5）评估 SQL 写法是否可以优化（如避免 SELECT *、LIMIT 分页优化）；6）必要时考虑分库分表或读写分离。核心原则是先定位再优化，避免盲目改代码。', f: '你如何评估一个 SQL 的性能？除了 EXPLAIN，还有哪些手段？' },
                    { level: 2, q: '微服务拆分的原则是什么？你遇到过哪些坑？', a: '微服务拆分原则：1）单一职责，每个服务围绕一个业务能力；2）服务间高内聚低耦合；3）避免跨服务频繁调用（否则考虑合并）；4）数据独立，每个服务管理自己的数据；5）可独立部署和扩展。常见坑：服务拆分过度导致调用链过长、分布式事务难以处理、服务治理成本过高、初期投入大但收益不明显。微服务不是银弹，需要根据团队和业务规模评估。', f: '你如何看待服务网格（Service Mesh）如 Istio？它解决了什么问题，引入了什么新复杂度？' },
                    { level: 2, q: '如何设计一个高可用的系统？请从多维度说明。', a: '高可用设计需要从多个层面考虑：1）应用层：多实例部署 + 负载均衡 + 健康检查；2）数据层：主从复制/读写分离/多副本；3）网络层：多可用区部署/DNS 智能解析；4）缓存层：Redis Cluster/Sentinel；5）降级限流：熔断（Hystrix/Sentinel）、限流（令牌桶/漏桶）；6）监控告警：Prometheus + Grafana + 告警规则；7）故障演练：定期进行 Chaos Engineering。目标是将 SPOF（单点故障）降到最低。', f: '降级策略是如何设计的？在什么情况下选择降级而不是扩容？' },
                    { level: 3, q: '如何设计一个秒杀系统？说说你的思路和关键技术点。', a: '秒杀系统的核心挑战是瞬间高并发和库存正确。设计思路：1）前端：按钮防抖、答题/验证码、静态资源 CDN；2）接入层：Nginx 限流、动静分离；3）应用层：服务端限流 + 异步化（消息队列削峰）+ 库存预扣减（Redis Lua 原子操作）；4）数据层：热点数据隔离 + 数据库最终一致性；5）监控：全链路监控和实时大盘。关键是"挡"（拦住无效请求）、"削"（削峰填谷）、"降"（降级）三个策略配合。', f: '在 Redis 预扣减后，如果下游订单创建失败，如何回滚库存？如何保证最终一致性？' },
                    { level: 3, q: '你是如何做技术选型的？请举一个具体的例子。', a: '技术选型需要综合考虑：1）业务场景：是高并发还是高可用？数据一致性要求如何？2）团队能力：是否有足够的人驾驭所选技术？3）生态成熟度：社区活跃度、文档完善度、问题可搜索度；4）性能和可扩展性；5）维护成本和人才可招聘性；6）长期可演进性。我做选型时会做小型 PoC 验证，对比至少 2-3 个方案，输出选型报告并在团队内评审确认。盲目追新是大忌。', f: '你如何说服团队/领导采用你认为正确但可能有学习成本的技术方案？' },
                    { level: 3, q: '谈谈你对后端工程师成长路径的理解，以及你自己的规划。', a: '后端工程师的成长我理解为几个阶段：1）入门：熟练语言和框架，能完成需求；2）进阶：深入理解底层原理，能独立设计模块；3）高级：能设计系统架构，有跨领域视野；4）专家：在某一方向有深度积累，能指导团队。我的规划是：短期内深耕分布式系统和性能优化，中期目标能独立负责中大型系统架构设计，长期希望在云原生/数据库/基础架构方向有深入贡献。持续输出文章和开源项目来检验成长。', f: '你觉得后端工程师需要关注 AI/LLM 吗？它会如何改变后端开发？' }

                questions: [
                    { level: 1, q: '请描述一次你从 0 到 1 做产品需求的完整流程。', a: '产品需求的完整流程包括：1）需求收集：用户访谈、数据挖掘、业务方反馈；2）需求分析：KANO 模型判断优先级，用 5Why 追问本质；3）产品方案：画原型 + 写 PRD + 设计评审；4）项目管理：需求评审、技术评审、排期跟进；5）上线验证：埋点设计、AB 测试、效果评估；6）复盘迭代：总结经验，规划下一版本。核心是"先理解问题，再给方案"。', f: '当业务方的需求和用户真实需求不一致时，你是如何处理的？请举一个例子。' },
                    { level: 1, q: '你如何判断一个需求的优先级？常用什么方法？', a: '需求优先级判断常用方法：1）KANO 模型：分为基本型、期望型、魅力型、无差异、反向；2）RICE 模型：Reach × Impact × Confidence / Effort；3）四象限法：重要紧急、重要不紧急、紧急不重要、不重要不紧急；4）用户价值 × 开发成本矩阵。实际工作中往往结合使用：先从战略和用户价值出发，再考虑实现成本。避免"会哭的孩子有奶吃"的主观判断。', f: '当老板指定的需求优先级和你按模型得出的结论不一致时，你如何沟通和处理？' },
                    { level: 1, q: '说说你做用户研究的方法，以及如何从用户反馈中提炼产品洞察。', a: '用户研究常用方法：定性（用户访谈、可用性测试、现场观察）和定量（问卷、数据分析、A/B 测试）。从反馈中提炼洞察的关键：1）区分"用户说的"和"用户真实的行为"；2）关注异常用户和极端场景；3）用数据验证假设，不要仅凭几个人的反馈就下结论；4）把用户反馈翻译成"用户问题 + 场景 + 动机"。好的洞察往往来自对用户深层动机的理解。', f: '请分享一个你通过用户研究发现关键产品问题的案例。' },
                    { level: 2, q: '请举一个你主导设计的产品功能案例，说明设计思路和效果。', a: '好的产品功能设计案例应包含：1）背景和问题：当时产品遇到了什么问题，数据指标是什么；2）目标：明确要达成什么指标（如提升转化率 5%）；3）方案设计：为什么选这个方案而不是其他方案（Show your trade-off）；4）执行过程：和哪些团队协作，有什么挑战；5）上线效果：数据对比、用户反馈、业务价值；6）经验总结。回答时用 STAR 结构，量化结果是关键。', f: '在这个功能设计中，你做了哪些取舍？为什么放弃了某些看起来也很合理的方案？' },
                    { level: 2, q: '你如何做竞品分析？关注哪些维度？', a: '竞品分析的框架：1）战略层：对方的定位、目标用户、商业模式；2）范围层：功能覆盖、核心功能对比；3）结构层：信息架构、交互流程；4）框架层：界面布局、导航设计；5）表现层：视觉设计风格。可操作的分析维度：核心功能对比矩阵、关键流程体验对比（注册/下单/支付等）、数据表现（下载量/活跃度/评分）、定价策略、用户评价关键词、技术实现差异。输出时避免罗列功能，要关注"对方为什么这么做"。', f: '你如何处理"竞品有这个功能，我们也必须有"这种压力？如何判断是真需求还是伪需求？' },
                    { level: 2, q: '如何通过数据发现产品问题？请分享你的数据思维。', a: '数据驱动的产品思维：1）建立产品指标体系（北极星指标 + 分层指标）；2）定期看核心指标看板，关注指标异动和趋势变化；3）细分拆解：按渠道/用户群/地区/设备等维度下钻，定位异常来源；4）漏斗分析：看各环节转化率，找到流失点；5）留存分析：看新老用户留存曲线；6）用户分群：对比不同群体的行为差异；7）A/B 测试验证假设。关键是不仅看数字，还要问"为什么"并提出可验证的假设。', f: '请描述一次你通过数据分析发现产品问题并推动改进的具体经历。' },
                    { level: 2, q: '你如何和研发团队高效协作？遇到过哪些常见的沟通问题？', a: '产品经理和研发的协作要点：1）清晰的需求文档：PRD 要完整定义业务流程、异常流程、数据口径；2）尽早沟通：不要等到写好文档才和研发聊，前期多对齐思路；3）尊重技术方案：不要在方案评审时临时加需求或推翻之前的设计；4）明确优先级：清晰传达"必须做"和"可以不做"；5）提供兜底方案：关键路径需要 Plan B。常见沟通问题：需求频繁变更、技术实现细节理解不足导致的不合理预期、排期压力下的矛盾。解决之道是透明沟通、相互尊重、建立信任。', f: '当研发说"这个需求做不了/做不完"时，你是如何处理的？' },
                    { level: 3, q: '如果让你设计一个新的 AI 产品（如 AI 助理），你会如何做产品定义和 MVP 设计？', a: 'AI 产品设计的核心挑战是：1）能力边界：AI 能做什么不能做什么，要诚实管理用户预期；2）交互模式：从"指令式"到"对话式"的范式转移；3）价值验证：是真的提升效率，还是只是"看起来很酷"。MVP 设计应该：聚焦一个核心场景（不要做全能助理）、定义清晰的"成功使用路径"、设计 AI 犯错时的兜底机制、收集真实用户反馈快速迭代。产品定义要回答清楚：为谁、解决什么问题、相比现有方案的优势、如何赚钱。', f: 'AI 产品的"幻觉"和不可控性问题，你在产品层面如何处理？有哪些产品策略可以降低负面影响？' },
                    { level: 3, q: '如何评估一个新产品方向是否值得投入？说说你的判断框架。', a: '评估新产品方向的框架：1）市场空间：TAM/SAM/SOM 测算，天花板有多高；2）用户需求：是真需求还是伪需求（痛点强度、频次、付费意愿）；3）竞争格局：现有玩家是谁，我们的差异化在哪里；4）商业模式：变现路径是否清晰，单位经济模型（UE）是否成立；5）战略契合：和公司现有业务/能力是否协同；6）执行可行性：团队能力、技术门槛、资源投入、时间窗口；7）风险评估：政策风险、技术风险、市场风险。好的产品方向应该是市场大 + 需求真 + 我们有独特优势。', f: '你如何验证一个你很看好但团队/领导有争议的产品方向？有哪些低成本的验证方法？' },
                    { level: 3, q: '谈谈你对产品经理这个职业的理解，以及你的长期成长规划。', a: '产品经理的核心价值是"在不确定中做正确的决策"，通过发现问题、定义问题、推动解决来创造用户价值和商业价值。能力模型包括：用户同理心、逻辑分析能力、执行力/推动力、商业敏感度。我的成长规划：短期目标是在当前产品方向上做出被用户和数据认可的成果，沉淀方法论；中期目标是能独立负责一条完整产品线，从 0 到 1 再到 100；长期希望在 AI + 某个垂直领域有深入积累，能够定义和推动有长期价值的产品方向。持续通过写作和分享来检验思考质量。', f: '你认为 AI 时代的产品经理和传统产品经理有什么本质区别？需要培养哪些新能力？' }

                questions: [
                    { level: 1, q: '请描述一次你从 0 到 1 策划执行的线上活动，说明思路和效果。', a: '活动策划的完整流程：1）明确目标：拉新/促活/转化/品牌？需要量化（如新增用户 5000、转化率 8%）；2）用户洞察：目标用户是谁，什么能打动他们；3）活动玩法：核心机制是什么（抽奖/打卡/裂变/排行榜），是否有传播性；4）资源评估：预算、人力、外部合作需求；5）执行：排期表、物料准备、数据埋点、风险预案；6）上线：灰度测试、实时监控；7）复盘：数据对比、效果评估、经验沉淀。回答时用数据展示效果是关键。', f: '活动执行中你遇到过哪些突发问题？如何处理的？有哪些教训？' },
                    { level: 1, q: '如何理解 AARRR 模型？请结合你的实际经验说明。', a: 'AARRR（海盗模型）描述用户生命周期的 5 个阶段：Acquisition（获取用户）、Activation（激活用户）、Retention（留存用户）、Revenue（变现）、Referral（推荐/传播）。它帮助运营人员建立全链路思维：1）获客：关注渠道质量和 CAC；2）激活：定义并优化 Aha Moment；3）留存：看次日/7日/30日留存曲线；4）变现：付费转化率、ARPU、LTV；5）推荐：K 因子、传播效率。实际应用中需要结合产品阶段选择重点突破环节（如早期关注留存，成长期关注增长）。', f: '你负责的产品中，哪个环节是你最关注的？为什么？你是如何优化的？' },
                    { level: 1, q: '说说你做内容运营的思路。如何判断内容选题的价值？', a: '内容运营的核心是"在对的时间把对的内容给对的人"。我的内容策划思路：1）定位：目标用户画像 + 用户需要什么信息；2）选题：从用户搜索关键词、热门话题、行业趋势、竞品内容中寻找灵感；3）价值判断：是否解决用户真实问题、是否有独特视角、是否有传播潜力、是否符合品牌调性；4）执行：标题优化、结构清晰、配图精良；5）数据反馈：打开率、完成率、互动率、转化效果；6）复盘迭代：分析成功/失败原因，优化选题方向。', f: '请分享一个你做过的最成功的内容案例，分析它成功的关键因素。' },
                    { level: 2, q: '请描述一个你通过数据分析发现运营机会的案例。', a: '运营中的数据分析思路：1）建立指标看板：日活、新增、留存、转化率等核心指标的日常监控；2）发现异常：关注指标的异常波动和长期趋势；3）下钻分析：按用户渠道、用户来源、用户等级、地域等维度细分；4）用户分层：新老用户、高价值用户 vs 沉默用户行为对比；5）漏斗分析：找到流失最严重的环节；6）归因分析：判断变化的核心驱动因素；7）形成假设：基于数据提出可验证的改进方案；8）A/B 测试：用实验验证假设。回答时展示完整的数据分析链路和最终带来的业务价值。', f: '数据分析中，你如何区分"相关性"和"因果性"？举一个你误判的例子。' },
                    { level: 2, q: '如何设计一个用户激励体系（如积分/等级/签到）？关键考虑因素有哪些？', a: '用户激励体系设计的要点：1）明确目标：是提升活跃、培养习惯、还是付费转化？2）用户分层：不同用户群体需要不同的激励方式；3）核心循环：触发 -> 行动 -> 奖励 -> 投资，形成正向循环；4）价值感知：奖励要让用户觉得"有用/有意义"，而不是随意的积分；5）可持续性：避免奖励通胀，设计合理的"积分回收"机制；6）可扩展性：体系要能支撑未来的功能扩展；7）成本可控：预算模型和 RO I 评估。好的激励体系应该让用户"为了价值留下，因为习惯持续"。', f: '你见过哪些"刷积分"或"薅羊毛"的问题？如何在设计时预防？' },
                    { level: 2, q: '说说你对增长黑客（Growth Hacking）的理解，以及应用经验。', a: '增长黑客的核心是"数据驱动 + 产品化 + 实验思维"的增长方式，区别于传统运营的"人力驱动"。典型方法：1）找到产品的 Aha Moment（惊喜时刻），优化用户到达路径；2）设计病毒式传播机制（Referral）；3）用 A/B 测试持续优化关键路径；4）关注留存而非只看拉新（增长的基础是留存）；5）精细化的用户分层和生命周期管理；6）产品化的增长手段（如通知、推荐、个性化）。增长黑客不是灵丹妙药，前提是产品有真实需求。', f: '请分享一个你设计或参与的增长实验，包括假设、实验设计和结果。' },
                    { level: 2, q: '你对新媒体运营（公众号/小红书/抖音等）有哪些经验？各平台有什么差异？', a: '不同平台的用户心智和算法差异决定运营策略不同：1）微信公众号：用户订阅关系强、内容生命周期长、适合深度内容和品牌建设、增长依赖内容质量和外部引流；2）小红书：女性用户为主、搜索和推荐并重、"种草/笔记"文化、图文是主流但视频在增长；3）抖音：算法推荐极强、内容生命周期短但爆发力强、完播率/互动率是关键、适合娱乐和短平快内容；4）B站：社区氛围强、UP 主文化、内容深度要求高。运营需要"平台原生思维"，不要一套内容打所有平台。', f: '你是如何做跨平台内容策略的？如何在有限资源下高效产出多平台内容？' },
                    { level: 3, q: '如果让你从 0 到 1 设计一个产品的增长策略，你的思路是什么？', a: '从 0 到 1 产品的增长策略，核心是"先验证留存，再谈增长"。我的思路：1）Product/Market Fit 验证：先确认产品是否真的解决了一个有人愿意付费/持续使用的问题（关注留存曲线而非新增）；2）定义核心指标：找到北极星指标和关键转化路径；3）冷启动：通过精准渠道获取种子用户，而不是大规模投放；4）找到增长杠杆：分析不同渠道/方式的 CAC 和 LTV，找到 ROI 最优的增长方式；5）规模化：在验证 ROI 后逐步加大投入；6）建立增长循环：让现有用户带来新用户（Referral）。切忌"产品还没打磨好就大举投放"。', f: '如果早期资源有限（钱少人少），你会优先投入哪些增长手段？为什么？' },
                    { level: 3, q: '如何评估一个运营活动的投入产出比（ROI）？请分享你的方法论。', a: '运营活动 ROI 评估需要从投入和产出两方面量化：人力成本、预算成本和时间成本为主要投入；GMV/新增用户/转化率提升、品牌曝光、用户口碑为主要产出。关键在于合理评估"增量"价值而非全量价值。我的做法是：设定清晰的北极星指标、建立对照组或看前后数据对比、持续追踪 LTV/留存等长期指标。最终目标是让每一分投入都能产出可衡量的价值。', f: '你遇到过"看起来热闹但 ROI 很低"的活动吗？如何优化或止损？' },
                    { level: 3, q: '谈谈你对运营这个职业未来发展的理解，以及你的成长规划。', a: '我认为运营正从"人力驱动"走向"数据驱动 + 产品化 + AI 辅助"。传统的内容编辑、活动执行等基础工作正在被工具和 AI 替代。未来的高价值运营需要具备：1）数据思维：能从数据中发现洞察；2）产品化能力：将重复工作变成产品能力；3）用户理解：比算法更懂用户深层动机；4）商业敏感度：理解变现和增长的底层逻辑。我的成长规划是：短期内深耕数据驱动的增长运营，中期目标能独立负责一条业务线的增长策略，长期希望在用户增长/商业化方向有体系化的方法论输出。', f: '你认为 AI/大模型会如何改变运营工作？哪些运营能力是最难被替代的？' }
                ],

                    { level: 1, q: '请描述你最有成就感的一个项目，你在其中的角色和贡献。', a: '用 STAR 结构回答：Situation（背景）、Task（任务）、Action（你做了什么）、Result（结果）。结果部分一定要量化：提升了多少、影响了多少用户、节省了多少成本。如果能加上反思和改进会更有深度。核心是展示"你"的贡献，而不是团队的贡献。', f: '在这个项目中你遇到的最大困难是什么？如何克服的？' },
                    { level: 2, q: '你的短期和长期职业规划是什么？', a: '职业规划的回答要"真实 + 有逻辑 + 和岗位匹配"。短期（1-2年）：扎实做好当前工作，在某个方向建立深度；中期（3-5年）：成为某领域的专家，能带团队或独立负责重要项目；长期（5年+）：在行业中有影响力，能定义和推动有长期价值的事情。要和正在面试的公司/岗位有呼应，但不要"为了迎合而说谎"。', f: '如果入职后发现实际工作和你预期的不一样，你会如何调整？' },
                    { level: 2, q: '你如何看待我们这个行业当前的趋势和挑战？', a: '回答要展示你做了功课：1）行业趋势：技术变革、用户变化、政策影响等；2）关键挑战：获客成本上升、竞争加剧、技术迭代压力等；3）你的观察：可以提到 1-2 个你长期关注的点，并有自己的判断。准备这个问题最好的方式是：看行业报告、关注头部公司动态、读高质量媒体的深度文章。', f: '在你看来，我们公司在行业中的差异化优势是什么？' },
                    { level: 2, q: '你在工作中是如何做决策的？举一个例子。', a: '我的决策思路：1）明确目标和约束；2）收集数据和信息（不追求完美但要足够）；3）列出选项 + 评估利弊（用清单或决策矩阵）；4）做决策并承担结果；5）复盘和迭代。例子：讲一个具体的决策场景，你如何分析、选择了什么方案、结果如何、如果重来会怎么改进。展示"理性 + 果断 + 有反思能力"。', f: '你做过的最艰难的决策是什么？它如何影响了你？' },
                    { level: 2, q: '描述一次你和他人意见不一致的经历，你是怎么处理的？', a: '这类问题考察"冲突管理 + 沟通能力"。回答框架：1）背景：是什么分歧（不要吐槽，客观描述）；2）我的立场和对方立场的核心差异；3）我做了什么来理解对方和寻求共识（倾听/数据论证/找到共同目标/妥协）；4）结果：达成了什么方案，关系是否受影响；5）学到了什么。重点是展示你能处理分歧而非避免分歧。', f: '在你的经验中，什么情况下你会选择妥协？什么情况下会坚持？' },
                    { level: 3, q: '如果你来做我们公司的[岗位]，前 90 天会怎么做？', a: '前 90 天的规划应体现"学习 + 贡献 + 影响"的节奏：前 30 天：深度了解业务（和团队聊、看数据、读文档）；30-60 天：做一个小而有价值的项目来验证理解；60-90 天：基于理解提出改进建议并推动落地。核心是先"听和学"，再"做和影响"。不要一上来就提大方案，也不要 90 天了还在观望。', f: '你如何判断自己在前 90 天是否"做对了"？你会看哪些信号？' },
                    { level: 3, q: '你认为优秀的职场人和平庸的职场人最大的区别是什么？', a: '我认为最大的区别是"思维质量 + 执行能力 + 学习速度"的组合。思维质量：能看到问题的本质而非表象；执行能力：能把想法落地，遇到困难能推进而不是放弃；学习速度：行业变化快，持续学习能力决定长期上限。具体到某个岗位还要加上该岗位特有的能力要求。', f: '在你自己身上，这三个方面你最强的是哪个？最弱的是哪个？如何补强？' },
                    { level: 3, q: '你有什么问题想问我们的？', a: '这是展示你思考深度的机会，不要问"薪资多少""加班多吗"这种基础问题（可以问但要放在最后）。好问题包括：1）关于团队和文化：团队的工作方式、决策机制、挑战是什么；2）关于业务和战略：公司最看重的增长引擎、今年的战略重点；3）关于岗位和成长：这个岗位对公司的价值、成功的衡量标准、成长路径；4）关于面试官：对方在公司最有成就感的事情。', f: '（无追问，这是你提问的环节）' }

        // ============================================================
        // 核心引擎：岗位识别
        // ============================================================
        function detectJobType(positionText, resumeText) {
            const text = (positionText + ' ' + resumeText).toLowerCase();
            let bestMatch = 'unknown';
            let bestScore = 0;
            for (const [key, template] of Object.entries(JOB_TEMPLATES)) {
                if (key === 'unknown') continue;
                let score = 0;
                template.keywords.forEach(kw => {
                    if (text.includes(kw.toLowerCase())) score++;
                });
                if (score > bestScore) {
                    bestScore = score;
                    bestMatch = key;
                }
            }
            return bestMatch;
        }

        // ============================================================
        // 核心引擎：工作年限识别
        // ============================================================
        function extractYears(text) {
            const patterns = [
                /(\d+)\s*[年]/,
                /(\d+)\s*years?/i,
                /work\s*experience\s*[:：]?\s*(\d+)/i,
            ];
            for (const p of patterns) {
                const m = text.match(p);
                if (m) return parseInt(m[1], 10);
            }
            return 0;
        }

        function getYearLevel(years) {
            if (years <= 0) return 0;
            if (years <= 2) return 1;
            if (years <= 5) return 2;
            return 3;
        }

        // ============================================================
        // 核心引擎：技能关键词提取
        // ============================================================
        function extractMatchedSkills(resumeText, coreSkills) {
            const lower = resumeText.toLowerCase();
            const matched = [];
            coreSkills.forEach(skill => {
                if (lower.includes(skill.toLowerCase())) matched.push(skill);
            });
            return matched;
        }

        // ============================================================
        // 核心引擎：评分算法
        // ============================================================
        function calculateScore(template, matchedSkills, years) {
            let score = template.baseScore;
            const skillBonus = Math.min(matchedSkills.length * 3, 12);
            score += skillBonus;
            if (years > 0 && years <= 2) score += 1;
            else if (years > 2 && years <= 5) score += 3;
            else if (years > 5) score += 5;
            const randomFactor = Math.floor(Math.random() * 5) - 2;
            score += randomFactor;
            return Math.max(50, Math.min(95, score));
        }

        // 面试准备度：基于匹配度、匹配技能数、年限综合评估
        function calculateInterviewScore(matchScore, matchedSkills, years) {
            let base = matchScore * 0.5;
            const skillScore = Math.min(matchedSkills.length * 4, 20);
            const yearBonus = years > 0 ? Math.min(years * 1.5, 15) : 5;
            const randomFactor = Math.floor(Math.random() * 6) - 3;
            return Math.max(40, Math.min(96, Math.round(base + skillScore + yearBonus + randomFactor)));
        }

        // 职业竞争力等级
        // 综合分 = 匹配度 + 技能加分(上限15) + 年限加分(上限12)，满分120
        // A+: >=102 / A: >=92 / B+: >=82 / B: >=72 / C+: >=62 / C: <62
        function calculateCompetencyLevel(matchScore, matchedSkills, years) {
            const skillScore = Math.min(matchedSkills.length * 2.5, 15);
            const yearScore = years > 0 ? Math.min(years * 2, 12) : 2;
            const total = matchScore + skillScore + yearScore;
            if (total >= 102) return { letter: 'A+', color: '#057642', label: '极具竞争力' };
            if (total >= 92)  return { letter: 'A',  color: '#0A66C2', label: '竞争力较强' };
            if (total >= 82)  return { letter: 'B+', color: '#B45309', label: '有一定竞争力' };
            if (total >= 72)  return { letter: 'B',  color: '#92400E', label: '基本达标' };
            if (total >= 62)  return { letter: 'C+', color: '#DC2626', label: '需要提升' };
            return { letter: 'C',  color: '#991B1B', label: '差距较大' };
        }

        // ============================================================
        // 内容生成引擎
        // ============================================================
        function generateStrengths(template, matchedSkills) {
            const items = [...template.strengths.fixed];
            for (const skill of matchedSkills) {
                const key = skill.toLowerCase();
                for (const [dynKey, dynVal] of Object.entries(template.strengths.dynamic)) {
                    if (key.includes(dynKey.toLowerCase()) || dynKey.toLowerCase().includes(key)) {
                        if (!items.includes(dynVal)) items.push(dynVal);
                    }
                }
            }
            return items.slice(0, 6);
        }

        function generateWeaknesses(template, matchedSkills) {
            const items = [...template.weaknesses.fixed];
            const missingSkills = template.coreSkills.filter(s => {
                const lower = s.toLowerCase();
                return !matchedSkills.some(m => m.toLowerCase().includes(lower) || lower.includes(m.toLowerCase()));
            });
            let added = 0;
            for (const missing of missingSkills) {
                for (const [key, val] of Object.entries(template.weaknesses.dynamic)) {
                    if (key.startsWith('!') && missing.includes(key.substring(1).toLowerCase())) {
                        if (!items.includes(val)) {
                            items.push(val);
                            added++;
                            if (added >= 2) break;
                        }
                    }
                }
                if (added >= 2) break;
            }
            return items.slice(0, 5);
        }

        // 从 JD 文本中提取技能关键词（不区分大小写，去重）
        function extractSkillsFromJD(jdText) {
            if (!jdText || jdText.trim().length === 0) return [];
            const text = jdText.toLowerCase();
            const found = [];
            JD_SKILL_LIBRARY.forEach(skill => {
                if (text.includes(skill.toLowerCase())) {
                    found.push(skill);
                }
            });
            return found;
        }

        // 生成 JD 技能匹配结果
        // 返回数组：[{skill, matched, highlight}]
        function generateJDMatch(jdText, template, resume) {
            // 无 JD 文本输入时返回空，不做匹配
            if (!jdText || jdText.trim().length === 0) return null;

            // 仅从 JD 文本中提取技能关键词（不使用岗位模板的 coreSkills，
            // 因为 coreSkills 已在 Career Snapshot 中作为通用分析展示，
            // 这里只做针对性的 JD 对比，不重复输出）
            const jdSkills = extractSkillsFromJD(jdText);

            // JD 文本中没有匹配到技能库中的任何关键词 → 无法做有意义的对比
            if (jdSkills.length === 0) return null;

            // JD 技能去重 —— 按长度降序后再按 normalized key 去重，
            // 确保 "Spring Boot" 优先于 "Spring"，"RocketMQ" 优先于更短的关键词
            jdSkills.sort((a, b) => b.length - a.length);

            const allSkills = [];
            const seen = new Set();
            const normalizeKey = s => {
                const m = s.toLowerCase().match(/^[a-z\u4e00-\u9fa5]+/);
                return m ? m[0] : s.toLowerCase();
            };
            jdSkills.forEach(s => {
                const key = normalizeKey(s);
                if (!seen.has(key)) { seen.add(key); allSkills.push(s); }
            });

            // 二次去重：若关键词 A 完全包含关键词 B 的文本，且 A 更长，B 为冗余（如 "架构设计" 与 "系统设计" 不冲突，但 "SQL" 与 "SQL优化" 冲突）
            // 这里做一次互相包含检测，避免 "SQL" 和 "SQL优化" 同时出现
            const finalSkills = [];
            allSkills.forEach(s => {
                const lower = s.toLowerCase();
                const redundant = finalSkills.some(existing =>
                    existing.toLowerCase().includes(lower) || lower.includes(existing.toLowerCase())
                );
                if (!redundant) finalSkills.push(s);
            });

            // 匹配简历内容（使用 finalSkills：经过双层去重后的最终技能列表）
            const resumeLower = (resume || '').toLowerCase();
            return finalSkills.map(skill => {
                const lower = skill.toLowerCase();
                // 检查简历中是否包含该技能（模糊匹配）
                let matched = false;
                if (resumeLower.includes(lower)) matched = true;
                // 一些常见的变形匹配 —— 双向 alias
                const aliases = {
                    'ts': ['typescript'],
                    'typescript': ['ts'],
                    'js': ['javascript'],
                    'javascript': ['js'],
                    'node.js': ['node', 'nodejs', 'node js'],
                    'node': ['node.js', 'nodejs'],
                    'react.js': ['react'],
                    'react': ['react.js'],
                    'vue.js': ['vue'],
                    'vue': ['vue.js'],
                    'css': ['css3'],
                    'css3': ['css'],
                    'html': ['html5'],
                    'html5': ['html'],
                    'golang': ['go'],
                    'go': ['golang'],
                    'k8s': ['kubernetes'],
                    'kubernetes': ['k8s'],
                    'rocketmq': ['rocket'],
                    'php': ['laravel', 'thinkphp'],
                    'python': ['pandas', 'numpy']
                };
                if (!matched && aliases[lower]) {
                    aliases[lower].forEach(a => { if (resumeLower.includes(a)) matched = true; });
                }
                return { skill, matched };
            });
        }

        // 将小写技能名转为可读形式
        function capitalizeSkill(s) {
            const mapping = {
                'react': 'React',
                'vue': 'Vue',

            return mapping[s.toLowerCase()] || s.charAt(0).toUpperCase() + s.slice(1);
        }

        // 渲染 JD 技能匹配卡片

            const unmatched = jdMatches.filter(m => !m.matched);

            const renderRow = (items, isMatched) => items.map(m => `

            const cols = (items, isMatched) => {

                    </div>
                    <div class="card-body">
                        ${unmatched.length > 0 ? `
                        <div style="margin-bottom:16px;">
                            <div style="font-size:12px;font-weight:600;color:#DC2626;margin-bottom:8px;letter-spacing:0.03em;">⚡ 需要补充（${unmatched.length} 项）</div>
                            ${cols(unmatched, false)}
                        </div>
                        ` : ''}
                        ${matchedList.length > 0 ? `
                        <div>
                            <div style="font-size:12px;font-weight:600;color:#057642;margin-bottom:8px;letter-spacing:0.03em;">✓ 已具备（${matchedList.length} 项）</div>
                            ${cols(matchedList, true)}

            `;
        }

        // 生成面试风险分析（增强版）

            const KNOWN_TERMS = [
                'TypeScript', 'React', 'Vue', 'Angular', 'JavaScript', 'Node',
                'Webpack', '性能优化', '算法', '数据结构', '架构设计', '微前端',
                '前端工程化', '后端技术栈', '分布式', '微服务', '数据库', 'SQL',

                'Java', 'Python', 'Go', 'Spring', '产品方法论', '商业模式',
                '需求分析', '用户研究', '数据分析', 'AARRR', '增长黑客',
                '内容运营', '活动策划', '新媒体', '用户体系', 'ROI'
            ];
            // 预设的追问问题和建议知识点
            const riskKnowledge = {
                'TypeScript': { question: '请解释 TypeScript 的类型系统，包括泛型、类型推断、条件类型等概念', suggest: '泛型编程、类型体操、类型守卫' },
                'React': { question: 'React 的 Fiber 架构是什么？它如何优化渲染性能？', suggest: 'Fiber 原理、调度机制、Hooks 源码' },
                'Vue': { question: 'Vue3 的响应式原理是什么？与 Vue2 有什么区别？', suggest: 'Proxy 代理、响应式 API、Composition API' },
                '性能优化': { question: '你在项目中做过哪些性能优化？效果如何？', suggest: 'LCP/FID/CLS、代码分割、懒加载、缓存策略' },
                '架构设计': { question: '请描述一个你设计的系统架构，为什么这样设计？', suggest: '系统设计原则、高可用架构、设计模式' },
                '算法': { question: '请手写一个快速排序算法，并分析时间复杂度', suggest: '常见排序算法、动态规划、图论基础' },
                '后端技术栈': { question: '你了解哪些后端技术？如何与前端协作？', suggest: 'RESTful API、微服务、数据库设计' },
                '分布式': { question: '分布式系统中如何保证数据一致性？', suggest: 'CAP 理论、分布式事务、消息队列' },
                '产品方法论': { question: '你常用什么方法进行需求分析和优先级排序？', suggest: 'KANO 模型、RICE 模型、用户研究方法' },
                '数据分析': { question: '你如何用数据驱动产品决策？举个例子', suggest: '指标体系、漏斗分析、A/B 测试' },
                '增长黑客': { question: '什么是增长黑客？请分享一个增长实验案例', suggest: 'AARRR 模型、病毒系数、增长杠杆' },
                'Webpack': { question: 'Webpack 的构建流程是什么？如何优化构建速度？', suggest: 'Tree Shaking、缓存策略、懒加载' },
                '默认': { question: '请详细介绍你在这方面的经验和项目', suggest: '深入学习相关理论和实践' }
            };
            return weaknesses.slice(0, 3).map(w => {
                const lower = w.toLowerCase();
                let techTerm = '默认';
                for (const term of KNOWN_TERMS) {
                    if (lower.includes(term.toLowerCase())) {
                        techTerm = term;
                        break;
                    }
                }
                const knowledge = riskKnowledge[techTerm] || riskKnowledge['默认'];
                // 根据弱点内容判断风险等级
                const isHighRisk = w.includes('深入') || w.includes('不足') || w.includes('较少') || w.includes('有限');
                return {
                    term: techTerm,
                    level: isHighRisk ? '高' : '中',
                    description: w,
                    question: knowledge.question,
                    suggestion: knowledge.suggest
                };
            });
        }

        function generateQuestions(template, yearLevel) {
            const level1 = template.questions.filter(q => q.level === 1);
            const level2 = template.questions.filter(q => q.level === 2);
            const level3 = template.questions.filter(q => q.level === 3);
            const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
            let selected = [];
            if (yearLevel === 3 || yearLevel === 0) {
                selected = [...shuffle(level3).slice(0, 1), ...shuffle(level2).slice(0, 2)];
            } else if (yearLevel === 2) {
                selected = [...shuffle(level2).slice(0, 2), ...shuffle(level3).slice(0, 1)];
            } else {
                selected = [...shuffle(level1).slice(0, 2), ...shuffle(level2).slice(0, 1)];
            }
            return selected.sort((a, b) => a.level - b.level);
        }

        function getScoreComment(score) {
            if (score >= 85) return '非常匹配！核心能力和岗位要求高度契合，建议重点准备深度面试问题。';
            if (score >= 75) return '匹配度良好。核心能力基本达标，部分技能可以加强展示。';
            if (score >= 65) return '基本匹配。有亮点但也有明显短板，建议针对性补强。';
            return '匹配度偏低。建议重新审视岗位要求，或补强核心技能后再投递。';
        }

                            </div>
                            <div style="flex:1; min-width:180px; background:rgba(255,255,255,0.08); border-radius:8px; padding:12px;">
                                <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.05em; opacity:0.7; margin-bottom:6px;">提升建议</div>
                                <div style="font-size:13px; line-height:1.5;">${strengths.length >= 3 ? strengths.slice(0, 2).join('；') : '持续学习行业前沿知识'}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 能力评估卡片（Linear/Stripe 风格）
        function renderAnalysisCard(matchScore, interviewScore, competencyGrade, strengths, weaknesses, riskAnalysis) {
            // 过滤高风险项，最多3个
            const topRisks = riskAnalysis.filter(r => r.level === '高').slice(0, 3);
            
            return `
                <div class="card fade-in fade-in-delay-1">
                    <div class="card-header">
                        <div class="card-icon green">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                        </div>
                        <div>
                            <div class="card-title">Career Snapshot</div>
                            <div class="card-subtitle">职业能力评估报告</div>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- KPI Cards -->
                        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:28px;">
                            <div style="background:linear-gradient(135deg, #0A66C2 0%, #004182 100%); border-radius:12px; padding:20px; text-align:center; color:white;">
                                <div style="font-size:10px; text-transform:uppercase; letter-spacing:0.1em; opacity:0.8; margin-bottom:6px; font-weight:500;">Match Score</div>
                                <div style="font-family:'Space Grotesk',sans-serif; font-size:40px; font-weight:700; line-height:1;">${matchScore}</div>
                                <div style="font-size:12px; opacity:0.75;">/ 100</div>
                            </div>
                            <div style="background:linear-gradient(135deg, #B45309 0%, #92400E 100%); border-radius:12px; padding:20px; text-align:center; color:white;">
                                <div style="font-size:10px; text-transform:uppercase; letter-spacing:0.1em; opacity:0.8; margin-bottom:6px; font-weight:500;">Competitiveness</div>
                                <div style="font-family:'Space Grotesk',sans-serif; font-size:40px; font-weight:700; line-height:1;">${competencyGrade.letter}</div>
                                <div style="font-size:12px; opacity:0.75;">${competencyGrade.label}</div>
                            </div>
                            <div style="background:linear-gradient(135deg, #057642 0%, #045329 100%); border-radius:12px; padding:20px; text-align:center; color:white;">
                                <div style="font-size:10px; text-transform:uppercase; letter-spacing:0.1em; opacity:0.8; margin-bottom:6px; font-weight:500;">Interview</div>
                                <div style="font-family:'Space Grotesk',sans-serif; font-size:40px; font-weight:700; line-height:1;">${interviewScore}</div>
                                <div style="font-size:12px; opacity:0.75;">/ 100</div>
                            </div>
                        </div>

                        <!-- 能力评估双栏 -->
                        <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; margin-bottom:28px;">
                            <!-- 核心优势 -->
                            <div style="background:#F9FAFB; border-radius:12px; padding:20px;">
                                <div style="display:flex; align-items:center; gap:6px; margin-bottom:14px;">
                                    <div style="width:8px; height:8px; background:#057642; border-radius:50%;"></div>
                                    <span style="font-size:14px; font-weight:600; color:var(--text-primary);">核心优势</span>
                                    <span style="font-size:11px; color:var(--text-muted); margin-left:auto;">${strengths.length}项</span>
                                </div>
                                <div style="display:grid; gap:10px;">
                                    ${strengths.slice(0, 6).map((s, i) => `
                                        <div style="display:flex; gap:10px; align-items:flex-start;">
                                            <span style="width:20px; height:20px; background:#ECFDF5; color:#057642; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0;">${i+1}</span>
                                            <span style="font-size:13px; color:var(--text-primary); line-height:1.5;">${s}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <!-- 重点提升项 -->
                            <div style="background:#FEFCE8; border-radius:12px; padding:20px;">
                                <div style="display:flex; align-items:center; gap:6px; margin-bottom:14px;">
                                    <div style="width:8px; height:8px; background:#B45309; border-radius:50%;"></div>
                                    <span style="font-size:14px; font-weight:600; color:var(--text-primary);">重点提升</span>
                                    <span style="font-size:11px; color:var(--text-muted); margin-left:auto;">${weaknesses.length}项</span>
                                </div>
                                <div style="display:grid; gap:10px;">
                                    ${weaknesses.slice(0, 3).map((w, i) => `
                                        <div style="display:flex; gap:10px; align-items:flex-start;">
                                            <span style="width:20px; height:20px; background:#FEF3C7; color:#B45309; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0;">${i+1}</span>
                                            <span style="font-size:13px; color:var(--text-primary); line-height:1.5;">${w}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <!-- Top 风险项（Accordion） -->
                        ${topRisks.length > 0 ? `
                        <div style="border:1px solid var(--border); border-radius:12px; overflow:hidden;">
                            <div style="display:flex; align-items:center; gap:8px; padding:16px 20px; background:#FEF2F2; cursor:pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'; this.lastElementChild.style.transform = this.nextElementSibling.style.display === 'block' ? 'rotate(180deg)' : 'rotate(0deg)';">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                                <span style="font-size:14px; font-weight:600; color:#DC2626;">Top 风险项</span>
                                <span style="font-size:11px; color:#DC2626; opacity:0.7; margin-left:auto;">${topRisks.length}项</span>
                                <svg style="width:16px; height:16px; color:#DC2626; transition:transform 0.2s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div style="display:none; border-top:1px solid var(--border);">
                                ${topRisks.map((risk, i) => `
                                    <div style="padding:16px 20px; border-bottom:${i < topRisks.length-1 ? '1px solid var(--border)' : 'none'};">
                                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                                            <span style="padding:3px 8px; background:#FEF2F2; color:#DC2626; border-radius:12px; font-size:10px; font-weight:600;">高风险</span>
                                            <span style="font-size:13px; font-weight:500; color:var(--text-primary);">${risk.term}</span>
                                        </div>
                                        <div style="padding-left:12px; margin-bottom:8px;">
                                            <div style="font-size:11px; color:var(--text-muted); margin-bottom:4px;">风险原因</div>
                                            <div style="font-size:13px; color:var(--text-secondary);">${risk.description}</div>
                                        </div>
                                        <div style="padding-left:12px; margin-bottom:8px;">
                                            <div style="font-size:11px; color:var(--text-muted); margin-bottom:4px;">面试可能追问</div>
                                            <div style="font-size:13px; color:var(--text-primary); font-style:italic;">"${risk.question}"</div>
                                        </div>
                                        <div style="padding-left:12px;">
                                            <div style="font-size:11px; color:var(--text-muted); margin-bottom:4px;">补强建议</div>
                                            <div style="font-size:13px; color:#0A66C2; font-weight:500;">${risk.suggestion}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderInterviewCard(questions) {
            return `
                <div class="card fade-in fade-in-delay-2">
                    <div class="card-header">
                        <div class="card-icon orange">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        </div>
                        <div>
                            <div class="card-title">AI 面试问题模拟</div>
                            <div class="card-subtitle">点击问题展开查看参考答案和追问</div>
                        </div>
                    </div>
                    <div class="card-body">
                        ${questions.map((q, idx) => `
                            <div style="border:1px solid var(--border-light); border-radius:8px; margin-bottom:10px; overflow:hidden;">
                                <div onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'; this.querySelector('.toggle-icon').style.transform = this.nextElementSibling.style.display === 'block' ? 'rotate(180deg)' : 'rotate(0deg)';" style="padding:12px 14px; background: var(--bg-gray); cursor:pointer; display:flex; align-items:flex-start; gap:12px; transition: background 0.15s ease;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='var(--bg-gray)'">
                                    <span style="min-width:22px; height:22px; background: var(--primary); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0;">${idx + 1}</span>
                                    <span style="flex:1; font-size:14px; font-weight:500; color:var(--text-primary); line-height:1.5;">${q.q}</span>
                                    <svg class="toggle-icon" style="width:20px; height:20px; color:var(--text-muted); flex-shrink:0; transition: transform 0.2s ease;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                                </div>
                                <div style="display:none; padding:14px; border-top:1px solid var(--border-light);">
                                    <div style="margin-bottom:12px;">
                                        <div style="font-size:11px; font-weight:600; color:var(--primary); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">参考思路</div>
                                        <div style="font-size:13px; color:var(--text-secondary); line-height:1.7; background: var(--bg-gray); padding:10px 12px; border-radius:6px;">${q.a}</div>
                                    </div>
                                    <div>
                                        <div style="font-size:11px; font-weight:600; color:var(--warning); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">延伸追问</div>
                                        <div style="font-size:13px; color:var(--text-secondary); line-height:1.7; background: var(--bg-gray); padding:10px 12px; border-radius:6px;">${q.f}</div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // 30天成长计划（简洁展开式）
        function renderGrowthCard(growthPlan) {
            const phases = [
                { id: 'phase1', title: '基础补强', week: 'Week 1', color: '#0A66C2' },
                { id: 'phase2', title: '框架深化', week: 'Week 2', color: '#7C3AED' },
                { id: 'phase3', title: '架构实践', week: 'Week 3', color: '#057642' },
                { id: 'phase4', title: '面试冲刺', week: 'Week 4', color: '#B45309' }
            ];
            
            return `
                <div class="card fade-in fade-in-delay-3">
                    <div class="card-header">
                        <div class="card-icon purple">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        </div>
                        <div>
                            <div class="card-title">30天成长计划</div>
                            <div class="card-subtitle">4个阶段系统化提升</div>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- 简洁阶段展示 -->
                        <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:20px;">
                            ${phases.map((phase, idx) => {
                                const item = growthPlan[idx];
                                return `
                                    <div style="background:#F9FAFB; border-radius:10px; padding:16px; text-align:center; cursor:pointer;" 
                                         onclick="document.getElementById('${phase.id}').style.display = document.getElementById('${phase.id}').style.display === 'block' ? 'none' : 'block';">
                                        <div style="width:8px; height:8px; background:${phase.color}; border-radius:50%; margin:0 auto 8px;"></div>
                                        <div style="font-size:12px; font-weight:600; color:var(--text-primary); margin-bottom:4px;">${phase.title}</div>
                                        <div style="font-size:10px; color:var(--text-muted);">${phase.week}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        
                        <!-- 详细内容（默认收起） -->
                        ${phases.map((phase, idx) => {
                            const item = growthPlan[idx];
                            return `
                                <div id="${phase.id}" style="display:none; margin-bottom:16px; padding:16px; background:#F9FAFB; border-radius:10px; border-left:3px solid ${phase.color};">
                                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
                                        <div style="font-size:11px; font-weight:600; color:${phase.color}; text-transform:uppercase;">${phase.week}</div>
                                        <div style="font-size:14px; font-weight:600; color:var(--text-primary);">${item?.title || phase.title}</div>
                                    </div>
                                    <div style="font-size:13px; color:var(--text-secondary); line-height:1.5; margin-bottom:10px;">${item?.desc || '深入学习相关知识与技能'}</div>
                                    <div style="display:flex; flex-wrap:wrap; gap:6px;">
                                        ${item?.topics?.map(t => `<span style="padding:3px 10px; background:rgba(10,102,194,0.1); color:#0A66C2; font-size:11px; font-weight:500; border-radius:12px;">${t}</span>`).join('') || ''}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // ============================================================
        // 加载动画渲染
        // ============================================================
        function showLoadingSteps(container) {
            const steps = [
                '识别岗位方向',
                '提取核心技能',
                '计算岗位匹配度',
                '生成职业报告'
            ];
            container.innerHTML = `
                <div class="loading-steps" id="loadingSteps">
                    <div class="loading-title">AI 正在解析简历</div>
                    <div class="loading-subtitle">Powered by AI Career Copilot · Career Intelligence Engine</div>
                    <ul class="steps-list">
                        ${steps.map((step, i) => `
                            <li class="step-item" id="step${i}" style="opacity:0;">
                                <div class="step-icon pending" id="stepIcon${i}"></div>
                                <span>${step}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
            // 依次入场动画
            steps.forEach((_, i) => {
                const el = document.getElementById('step' + i);
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.classList.add('animate-in');
                }, i * 200);
            });
        }

        function advanceStep(stepIndex, totalSteps, onComplete) {
            const icon = document.getElementById('stepIcon' + stepIndex);
            if (icon) {
                icon.className = 'step-icon done';
                icon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
                const item = icon.closest('.step-item');
                item.classList.remove('active');
                item.classList.add('done');
            }

            if (stepIndex + 1 < totalSteps) {
                const nextIcon = document.getElementById('stepIcon' + (stepIndex + 1));
                const nextItem = nextIcon.closest('.step-item');
                nextIcon.className = 'step-icon active';
                nextIcon.innerHTML = '<div class="step-spinner"></div>';
                nextItem.classList.remove('pending');
                nextItem.classList.add('active');
                setTimeout(() => advanceStep(stepIndex + 1, totalSteps, onComplete), 400);
            } else {
                setTimeout(onComplete, 500);
            }
        }

        // ============================================================
        // 主入口
        // ============================================================
        const analyzeBtn = document.getElementById('analyzeBtn');
        const snapshotContainer = document.getElementById('snapshotContainer');
        const jdContainer = document.getElementById('jdContainer');
        const analysisContainer = document.getElementById('analysisContainer');
        const interviewContainer = document.getElementById('interviewContainer');
        const growthContainer = document.getElementById('growthContainer');
        const loadingContainer = document.getElementById('loadingContainer');

        analyzeBtn.addEventListener('click', () => {
            const resume = document.getElementById('resume').value.trim();
            const position = document.getElementById('position').value.trim();
            const jd = document.getElementById('jd').value.trim();

            if (!resume || !position) {
                alert('请先填写简历内容和目标岗位');
                return;
            }

            // 清空之前的结果
            snapshotContainer.innerHTML = '';
            jdContainer.innerHTML = '';
            analysisContainer.innerHTML = '';
            interviewContainer.innerHTML = '';
            growthContainer.innerHTML = '';

            // 显示加载动画
            showLoadingSteps(loadingContainer);

            // 禁用按钮 + 滚动到加载区
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>分析中...`;
            window.scrollTo({ top: loadingContainer.offsetTop - 20, behavior: 'smooth' });

            // 开始步骤动画
            setTimeout(() => {
                const firstIcon = document.getElementById('stepIcon0');
                if (firstIcon) {
                    firstIcon.className = 'step-icon active';
                    firstIcon.innerHTML = '<div class="step-spinner"></div>';
                    const firstItem = firstIcon.closest('.step-item');
                    firstItem.classList.remove('pending');
                    firstItem.classList.add('active');
                }
                advanceStep(0, 4, () => {
                    // 生成数据
                    const jobType = detectJobType(position, resume);
                    const template = JOB_TEMPLATES[jobType];
                    const years = extractYears(resume + ' ' + position);
                    const matchedSkills = extractMatchedSkills(resume + ' ' + position, template.coreSkills);
                    const matchScore = calculateScore(template, matchedSkills, years);
                    const interviewScore = calculateInterviewScore(matchScore, matchedSkills, years);
                    const competencyGrade = calculateCompetencyLevel(matchScore, matchedSkills, years);
                    const strengths = generateStrengths(template, matchedSkills);
                    const weaknesses = generateWeaknesses(template, matchedSkills);
                    const riskAnalysis = generateRiskAnalysis(weaknesses);
                    const questions = generateQuestions(template, getYearLevel(years));
                    const jdMatches = generateJDMatch(jd, template, resume);

                    // 渲染结果
                    loadingContainer.innerHTML = '';
                    snapshotContainer.innerHTML = renderSnapshot(template, matchScore, matchedSkills, years, strengths, interviewScore, competencyGrade);
                    jdContainer.innerHTML = renderJDMatchCard(jdMatches, jd);
                    analysisContainer.innerHTML = renderAnalysisCard(matchScore, interviewScore, competencyGrade, strengths, weaknesses, riskAnalysis);
                    interviewContainer.innerHTML = renderInterviewCard(questions);
                    growthContainer.innerHTML = renderGrowthCard(template.growthPlan);

                    // 恢复按钮
                    analyzeBtn.disabled = false;
                    analyzeBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>重新分析`;
                    window.scrollTo({ top: snapshotContainer.offsetTop - 20, behavior: 'smooth' });
                });
            }, 300);
        });
    </script>
</body>
</html>
