<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>涂鸦小人</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Comic Sans MS', 'PingFang SC', cursive, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Paper texture overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(200,190,170,0.15) 28px, rgba(200,190,170,0.15) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(200,190,170,0.15) 28px, rgba(200,190,170,0.15) 29px);
    pointer-events: none;
    z-index: 0;
  }

  /* Doodle corner decorations */
  .corner-deco {
    position: fixed;
    z-index: 0;
    opacity: 0.12;
    font-size: 40px;
  }
  .corner-deco.tl { top: 20px; left: 20px; transform: rotate(-15deg); }
  .corner-deco.tr { top: 20px; right: 20px; transform: rotate(10deg); }
  .corner-deco.bl { bottom: 20px; left: 20px; transform: rotate(5deg); }
  .corner-deco.br { bottom: 20px; right: 20px; transform: rotate(-8deg); }

  /* Stage */
  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Speech bubble - hand drawn style */
  .speech-bubble {
    position: relative;
    background: #fff;
    border: 2.5px solid #333;
    border-radius: 18px;
    padding: 10px 18px;
    font-size: 15px;
    color: #444;
    max-width: 260px;
    text-align: center;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(10px) scale(0.8);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.5;
    /* hand-drawn border effect */
    filter: url(#sketchy);
  }
  .speech-bubble.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px; height: 16px;
    background: #fff;
    border-right: 2.5px solid #333;
    border-bottom: 2.5px solid #333;
    transform: translateX(-50%) rotate(45deg);
    clip-path: polygon(0 0, 100% 0, 100% 100%);
  }

  /* Character container */
  .character {
    position: relative;
    width: 200px;
    height: 320px;
    cursor: pointer;
    transition: transform 0.3s;
  }
  .character:hover { transform: scale(1.03); }

  /* SVG character */
  .char-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Idle breathing */
  .character.idle {
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* ===== Action Animations ===== */
  .character.wave { animation: waveBody 0.5s ease-in-out infinite alternate; }
  @keyframes waveBody {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-3px) rotate(2deg); }
  }
  .character.wave .arm-right-group { animation: waveArmSVG 0.5s ease-in-out infinite alternate; transform-origin: 130px 200px; }
  @keyframes waveArmSVG {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(-25deg); }
  }

  .character.jump { animation: jumpAnim 0.6s ease-in-out; }
  @keyframes jumpAnim {
    0% { transform: translateY(0) scaleY(1); }
    30% { transform: translateY(10px) scaleY(0.92); }
    50% { transform: translateY(-50px) scaleY(1.05); }
    70% { transform: translateY(-20px); }
    85% { transform: translateY(-5px) scaleY(0.97); }
    100% { transform: translateY(0) scaleY(1); }
  }

  .character.dance { animation: danceAnim 0.7s ease-in-out infinite; }
  @keyframes danceAnim {
    0% { transform: translateX(0) rotate(0deg); }
    25% { transform: translateX(-12px) rotate(-6deg); }
    50% { transform: translateX(0) rotate(0deg); }
    75% { transform: translateX(12px) rotate(6deg); }
    100% { transform: translateX(0) rotate(0deg); }
  }
  .character.dance .arm-left-group { animation: danceArmL 0.7s ease-in-out infinite; transform-origin: 70px 200px; }
  .character.dance .arm-right-group { animation: danceArmR 0.7s ease-in-out infinite; transform-origin: 130px 200px; }
  @keyframes danceArmL { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-40deg); } }
  @keyframes danceArmR { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(40deg); } }

  .character.nod .head-group { animation: nodAnim 0.7s ease-in-out; transform-origin: 100px 110px; }
  @keyframes nodAnim {
    0%,100% { transform: rotate(0deg); }
    30% { transform: rotate(12deg); }
    60% { transform: rotate(-4deg); }
  }

  .character.shake .head-group { animation: shakeAnim 0.5s ease-in-out; transform-origin: 100px 110px; }
  @keyframes shakeAnim {
    0%,100% { transform: rotate(0deg) translateX(0); }
    20% { transform: rotate(-4deg) translateX(-8px); }
    40% { transform: rotate(4deg) translateX(8px); }
    60% { transform: rotate(-4deg) translateX(-8px); }
    80% { transform: rotate(4deg) translateX(8px); }
  }

  .character.walk { animation: walkBounce 0.35s ease-in-out infinite; }
  @keyframes walkBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .character.walk .leg-left { animation: walkLegL 0.35s ease-in-out infinite; transform-origin: 85px 230px; }
  .character.walk .leg-right { animation: walkLegR 0.35s ease-in-out infinite; transform-origin: 115px 230px; }
  @keyframes walkLegL { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(12deg); } }
  @keyframes walkLegR { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-12deg); } }

  .character.spin { animation: spinAnim 0.8s ease-in-out; }
  @keyframes spinAnim {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(0.85); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .character.sleep { animation: sleepBreathe 3.5s ease-in-out infinite; }
  @keyframes sleepBreathe { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }

  .character.surprise { animation: surpriseAnim 0.5s ease-in-out; }
  @keyframes surpriseAnim {
    0% { transform: scale(1); }
    40% { transform: scale(1.08); }
    70% { transform: scale(0.98); }
    100% { transform: scale(1); }
  }

  /* ZZZ */
  .zzz {
    position: absolute;
    top: -5px;
    right: -15px;
    font-size: 16px;
    color: #999;
    animation: zzzFloat 2.5s ease-in-out infinite;
    pointer-events: none;
    font-weight: bold;
    letter-spacing: 2px;
  }
  @keyframes zzzFloat {
    0%, 100% { opacity: 0.3; transform: translate(0, 0) scale(0.8); }
    50% { opacity: 1; transform: translate(8px, -12px) scale(1.15); }
  }

  /* Heart particles */
  .particle {
    position: absolute;
    pointer-events: none;
    z-index: 20;
    animation: particleFloat 1.2s ease-out forwards;
  }
  @keyframes particleFloat {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    100% { opacity: 0; transform: translateY(-90px) scale(1.3); }
  }

  /* Status text */
  .status {
    margin-top: 12px;
    font-size: 13px;
    color: #aaa;
    min-height: 20px;
    font-style: italic;
  }

  /* Hint */
  .hint {
    position: fixed;
    bottom: 25px;
    font-size: 13px;
    color: #ccc;
    z-index: 20;
    font-style: italic;
  }

  /* SVG filter for sketchy look */
  .sketch-filter { position: absolute; width: 0; height: 0; }
</style>
</head>
<body>

<!-- SVG Filters -->
<svg class="sketch-filter">
  <defs>
    <filter id="sketchy">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="noise" seed="1"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketchyMore">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="3" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- Corner doodles -->
<div class="corner-deco tl">✿</div>
<div class="corner-deco tr">☆</div>
<div class="corner-deco bl">☁</div>
<div class="corner-deco br">♡</div>

<!-- Stage -->
<div class="stage">
  <div class="speech-bubble" id="bubble"></div>

  <div class="character idle" id="character">
    <svg class="char-svg" viewBox="0 0 200 320" id="charSvg">
      <!-- Hand-drawn filter on the whole character -->
      <g filter="url(#sketchyMore)">

        <!-- === LEGS (with knee joint) === -->
        <g class="leg-left" data-part="leg">
          <!-- 大腿 thigh -->
          <line x1="88" y1="240" x2="82" y2="265" stroke="#333" stroke-width="3.2" stroke-linecap="round" fill="none"/>
          <!-- 膝盖 knee dot -->
          <circle cx="82" cy="265" r="2.5" fill="#333"/>
          <!-- 小腿 shin -->
          <line x1="82" y1="265" x2="73" y2="290" stroke="#333" stroke-width="3.2" stroke-linecap="round" fill="none"/>
          <!-- 左鞋 left shoe -->
          <ellipse cx="68" cy="295" rx="14" ry="8" fill="#a0522d" stroke="#333" stroke-width="2.5"/>
          <!-- 鞋面线条 -->
          <line x1="58" y1="293" x2="78" y2="295" stroke="#333" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
          <!-- 点击热区 hit area -->
          <rect x="50" y="240" width="40" height="65" fill="transparent" class="hit-leg"/>
        </g>
        <g class="leg-right" data-part="leg">
          <!-- 大腿 -->
          <line x1="112" y1="240" x2="118" y2="265" stroke="#333" stroke-width="3.2" stroke-linecap="round" fill="none"/>
          <!-- 膝盖 -->
          <circle cx="118" cy="265" r="2.5" fill="#333"/>
          <!-- 小腿 -->
          <line x1="118" y1="265" x2="127" y2="290" stroke="#333" stroke-width="3.2" stroke-linecap="round" fill="none"/>
          <!-- 右鞋 -->
          <ellipse cx="132" cy="295" rx="14" ry="8" fill="#a0522d" stroke="#333" stroke-width="2.5"/>
          <line x1="122" y1="293" x2="142" y2="295" stroke="#333" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
          <rect x="110" y="240" width="40" height="65" fill="transparent" class="hit-leg"/>
        </g>

        <!-- === BODY (dress/shirt trapezoid) === -->
        <path class="body-shape" data-part="body"
              d="M 78 200 Q 75 205 72 245 Q 70 255 80 258 L 120 258 Q 130 255 128 245 Q 125 205 122 200 Z"
              fill="#d4c9a8" stroke="#333" stroke-width="2.8" stroke-linejoin="round" fill-opacity="0.9"/>
        <!-- 衣服中线 dress line -->
        <line x1="100" y1="200" x2="100" y2="255" stroke="#333" stroke-width="2" stroke-linecap="round" opacity="0.3" pointer-events="none"/>
        <!-- 小纽扣 buttons -->
        <circle cx="100" cy="215" r="1.5" fill="#8b7355" pointer-events="none"/>
        <circle cx="100" cy="230" r="1.5" fill="#8b7355" pointer-events="none"/>

        <!-- === ARMS (with elbow joint) === -->
        <g class="arm-left-group" data-part="arm">
          <!-- 上臂 upper arm -->
          <line x1="75" y1="210" x2="58" y2="225" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
          <!-- 肘 elbow dot -->
          <circle cx="58" cy="225" r="2.5" fill="#333"/>
          <!-- 前臂 forearm -->
          <line x1="58" y1="225" x2="45" y2="248" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
          <!-- 手心 left hand -->
          <circle cx="44" cy="250" r="4" fill="#f0d5a8" stroke="#333" stroke-width="2"/>
          <!-- 小手指 fingers -->
          <line x1="44" y1="250" x2="37" y2="244" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="44" y1="250" x2="36" y2="252" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="44" y1="250" x2="38" y2="258" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
          <!-- 点击热区 -->
          <rect x="30" y="205" width="40" height="55" fill="transparent" class="hit-arm"/>
        </g>
        <g class="arm-right-group" data-part="arm">
          <!-- 上臂 -->
          <line x1="125" y1="210" x2="142" y2="225" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
          <!-- 肘 -->
          <circle cx="142" cy="225" r="2.5" fill="#333"/>
          <!-- 前臂 -->
          <line x1="142" y1="225" x2="155" y2="248" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
          <!-- 手心 -->
          <circle cx="156" cy="250" r="4" fill="#f0d5a8" stroke="#333" stroke-width="2"/>
          <line x1="156" y1="250" x2="163" y2="244" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="156" y1="250" x2="164" y2="252" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="156" y1="250" x2="162" y2="258" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
          <rect x="130" y="205" width="40" height="55" fill="transparent" class="hit-arm"/>
        </g>

        <!-- === HEAD GROUP === -->
        <g class="head-group" data-part="head">
         <g id="head-track">
          <!-- Hair - messy blue scribble behind head -->
          <g data-part="hair">
          <path d="M 42 90 Q 38 55 55 35 Q 70 20 100 18 Q 130 20 145 35 Q 162 55 158 90"
                fill="#a8d8ea" stroke="none" opacity="0.85"/>
          <!-- hair scribbles on top -->
          <path d="M 50 75 Q 55 45 70 30 Q 80 22 95 25 Q 110 22 120 30 Q 140 45 150 70"
                fill="none" stroke="#5ba3c9" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
          <path d="M 55 80 Q 62 50 78 35 Q 90 28 105 32 Q 118 28 130 35 Q 145 50 148 75"
                fill="none" stroke="#5ba3c9" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
          <!-- hair tufts -->
          <path d="M 70 30 Q 68 18 75 12" fill="none" stroke="#5ba3c9" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M 95 25 Q 97 12 105 8" fill="none" stroke="#5ba3c9" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M 120 30 Q 125 16 132 14" fill="none" stroke="#5ba3c9" stroke-width="2.5" stroke-linecap="round"/>
          </g>

          <!-- Head - big circle -->
          <circle cx="100" cy="110" r="72" fill="#f5deb3" stroke="#333" stroke-width="3.5"/>

          <!-- === FACE === -->
          <!-- Cheeks - rosy pink -->
          <ellipse cx="55" cy="118" rx="14" ry="10" fill="#f8b4b4" opacity="0.55"/>
          <ellipse cx="145" cy="118" rx="14" ry="10" fill="#f8b4b4" opacity="0.55"/>

          <!-- Eyes - white sclera + movable pupils -->
          <g id="eyes" data-part="eye">
            <!-- 眼白 eye whites -->
            <ellipse cx="78" cy="105" rx="9" ry="10" fill="#fff" stroke="#333" stroke-width="2"/>
            <ellipse cx="122" cy="105" rx="9" ry="10" fill="#fff" stroke="#333" stroke-width="2"/>
            <!-- 瞳孔 pupils (movable) -->
            <g id="pupils-track">
              <circle id="pupil-left" cx="78" cy="105" r="4.5" fill="#333"/>
              <circle id="pupil-right" cx="122" cy="105" r="4.5" fill="#333"/>
              <!-- 瞳孔高光 highlights -->
              <circle id="hl-left" cx="76" cy="103" r="1.5" fill="#fff"/>
              <circle id="hl-right" cx="120" cy="103" r="1.5" fill="#fff"/>
            </g>
          </g>
          <!-- Eye states (hidden by default) -->
          <g id="eyes-happy" style="display:none">
            <path class="eye-left" d="M 70 105 Q 78 98 86 105" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
            <path class="eye-right" d="M 114 105 Q 122 98 130 105" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
          </g>
          <g id="eyes-surprised" style="display:none">
            <circle class="eye-left" cx="78" cy="105" r="8" fill="#333"/>
            <circle class="eye-right" cx="122" cy="105" r="8" fill="#333"/>
            <circle cx="75" cy="102" r="2.5" fill="#fff"/>
            <circle cx="119" cy="102" r="2.5" fill="#fff"/>
          </g>
          <g id="eyes-sad" style="display:none">
            <circle class="eye-left" cx="78" cy="107" r="5" fill="#333"/>
            <circle class="eye-right" cx="122" cy="107" r="5" fill="#333"/>
            <line x1="68" y1="96" x2="86" y2="100" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="132" y1="96" x2="114" y2="100" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
          </g>
          <g id="eyes-sleepy" style="display:none">
            <line class="eye-left" x1="70" y1="106" x2="86" y2="106" stroke="#333" stroke-width="3" stroke-linecap="round"/>
            <line class="eye-right" x1="114" y1="106" x2="130" y2="106" stroke="#333" stroke-width="3" stroke-linecap="round"/>
          </g>
          <g id="eyes-love" style="display:none">
            <text class="eye-left" x="70" y="110" font-size="18" fill="#e74c3c">♥</text>
            <text class="eye-right" x="114" y="110" font-size="18" fill="#e74c3c">♥</text>
          </g>
          <g id="eyes-wink" style="display:none">
            <circle class="eye-left" cx="78" cy="105" r="5" fill="#333"/>
            <path class="eye-right" d="M 114 105 Q 122 98 130 105" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
          </g>
          <g id="eyes-angry" style="display:none">
            <circle class="eye-left" cx="78" cy="107" r="5" fill="#333"/>
            <circle class="eye-right" cx="122" cy="107" r="5" fill="#333"/>
            <line x1="66" y1="93" x2="86" y2="98" stroke="#333" stroke-width="3" stroke-linecap="round"/>
            <line x1="134" y1="93" x2="114" y2="98" stroke="#333" stroke-width="3" stroke-linecap="round"/>
          </g>
          <g id="eyes-dizzy" style="display:none">
            <g transform="translate(78,105)"><line x1="-5" y1="-5" x2="5" y2="5" stroke="#333" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="-5" x2="-5" y2="5" stroke="#333" stroke-width="2.5" stroke-linecap="round"/></g>
            <g transform="translate(122,105)"><line x1="-5" y1="-5" x2="5" y2="5" stroke="#333" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="-5" x2="-5" y2="5" stroke="#333" stroke-width="2.5" stroke-linecap="round"/></g>
          </g>

          <!-- Nose - tiny dot -->
          <circle cx="100" cy="118" r="2.5" fill="#e0a880" opacity="0.6"/>

          <!-- Mouth - default smile -->
          <g id="mouth-default" data-part="mouth">
            <path d="M 82 130 Q 100 148 118 130" fill="none" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>
          </g>
          <g id="mouth-happy" style="display:none">
            <path d="M 78 128 Q 100 155 122 128" fill="#e07050" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 85 138 Q 100 145 115 138" fill="#c04030" stroke="none" opacity="0.4"/>
          </g>
          <g id="mouth-surprised" style="display:none">
            <ellipse cx="100" cy="135" rx="8" ry="10" fill="#4a2010" stroke="#333" stroke-width="2.5"/>
          </g>
          <g id="mouth-sad" style="display:none">
            <path d="M 85 140 Q 100 130 115 140" fill="none" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>
          </g>
          <g id="mouth-flat" style="display:none">
            <line x1="85" y1="135" x2="115" y2="135" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>
          </g>
          <g id="mouth-tongue" style="display:none">
            <path d="M 80 128 Q 100 150 120 128" fill="none" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>
            <ellipse cx="100" cy="140" rx="7" ry="8" fill="#e07050" stroke="#333" stroke-width="1.5"/>
          </g>
          <g id="mouth-angry" style="display:none">
            <path d="M 85 140 Q 100 132 115 140" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
          </g>

         </g><!-- /head-track -->
        </g><!-- /head-group -->
      </g>
    </svg>

    <!-- ZZZ overlay -->
  </div>

  <div class="status" id="status"></div>
</div>

<div class="hint">✏️ 移动鼠标小人会看你~ 点不同部位有不同反应！</div>

<script>
(function() {
  const character = document.getElementById('character');
  const bubble = document.getElementById('bubble');
  const status = document.getElementById('status');

  // SVG eye/mouth groups
  const eyesDefault = document.getElementById('eyes');
  const eyesHappy = document.getElementById('eyes-happy');
  const eyesSurprised = document.getElementById('eyes-surprised');
  const eyesSad = document.getElementById('eyes-sad');
  const eyesSleepy = document.getElementById('eyes-sleepy');
  const eyesLove = document.getElementById('eyes-love');
  const eyesWink = document.getElementById('eyes-wink');
  const eyesAngry = document.getElementById('eyes-angry');
  const eyesDizzy = document.getElementById('eyes-dizzy');

  const mouthDefault = document.getElementById('mouth-default');
  const mouthHappy = document.getElementById('mouth-happy');
  const mouthSurprised = document.getElementById('mouth-surprised');
  const mouthSad = document.getElementById('mouth-sad');
  const mouthFlat = document.getElementById('mouth-flat');
  const mouthTongue = document.getElementById('mouth-tongue');
  const mouthAngry = document.getElementById('mouth-angry');

  const allEyes = [eyesDefault, eyesHappy, eyesSurprised, eyesSad, eyesSleepy, eyesLove, eyesWink, eyesAngry, eyesDizzy];
  const allMouths = [mouthDefault, mouthHappy, mouthSurprised, mouthSad, mouthFlat, mouthTongue, mouthAngry];

  let currentAction = 'idle';
  let actionTimer = null;
  let bubbleTimer = null;

  // ===== Expression system =====
  function hideAllEyes() { allEyes.forEach(g => g.style.display = 'none'); }
  function hideAllMouths() { allMouths.forEach(g => g.style.display = 'none'); }

  function setExpression(name) {
    hideAllEyes();
    hideAllMouths();

    const eyeMap = {
      normal: eyesDefault, happy: eyesHappy, surprised: eyesSurprised,
      sad: eyesSad, sleepy: eyesSleepy, love: eyesLove,
      wink: eyesWink, angry: eyesAngry, dizzy: eyesDizzy
    };
    const mouthMap = {
      default: mouthDefault, happy: mouthHappy, surprised: mouthSurprised,
      sad: mouthSad, flat: mouthFlat, tongue: mouthTongue, angry: mouthAngry
    };

    (eyeMap[name] || eyesDefault).style.display = '';
    (mouthMap[name] || mouthDefault).style.display = '';
  }

  // ===== Actions =====
  const actions = [
    { name: 'wave', label: '👋 挥手打招呼', duration: 2200 },
    { name: 'jump', label: '🦘 蹦跳', duration: 800 },
    { name: 'dance', label: '💃 跳舞', duration: 3200 },
    { name: 'nod', label: '😊 点头', duration: 1200 },
    { name: 'shake', label: '🙅 摇头', duration: 1000 },
    { name: 'walk', label: '🚶 散步', duration: 2500 },
    { name: 'spin', label: '🌀 转圈', duration: 1000 },
    { name: 'sleep', label: '😴 打瞌睡', duration: 4000 },
    { name: 'surprise', label: '😲 惊讶', duration: 1500 }
  ];

  // ===== Speeches =====
  const speeches = {
    happy: ['今天心情真好呀~ ☀️', '好开心！嘿嘿~', '嘻嘻，太棒了！', '世界真美好~'],
    surprised: ['哇！这是什么？', '哎呀！吓我一跳~', '真的吗？！', '天哪天哪！'],
    sad: ['呜呜，有点难过...', '好想回家...', '能陪陪我吗？', '今天不太开心呢...'],
    love: ['好爱你呀~ ❤️', '你是我最好的朋友！', '抱抱~ 🤗', '最喜欢你了！'],
    wave: ['嗨~ 你好呀！', '哈喽哈喽~', '见到你真高兴！', '嗨！最近好吗？'],
    dance: ['♪ 跳起来~ ♪', '一起来跳舞吧！', '动次打次~', '耶！派对时间！'],
    sleep: ['呼...呼...', '好困呀...💤', '让我睡一会儿...', 'zzZ...'],
    jump: ['嘿！看我看我！', '蹦蹦蹦~', '好高好高！', '耶~弹起来！'],
    nod: ['嗯嗯！好的好的~', '同意同意！', '没问题！'],
    shake: ['不要不要~', '才不是呢！', '哼，拒绝！'],
    walk: ['出去走走吧~', '散步真舒服~', '溜达溜达~'],
    spin: ['转呀转呀~', '好晕好晕！', '哈哈太好玩了！'],
    default: ['今天天气真好~', '你吃了吗？', '要不要一起玩？', '嘿嘿嘿~', '我是最可爱的小人！', '今天做什么好呢？', '生活真有趣~', '你猜我在想什么？', '啦啦啦~']
  };

  // ===== Set action =====
  function setAction(name, duration) {
    character.className = 'character';
    const zzz = character.querySelector('.zzz');
    if (zzz) zzz.remove();

    if (name === 'idle') {
      character.classList.add('idle');
      setExpression('normal');
      status.textContent = '';
      currentAction = 'idle';
      return;
    }

    currentAction = name;
    character.classList.add(name);
    status.textContent = (actions.find(a => a.name === name) || {}).label || '';

    if (name === 'sleep') {
      const z = document.createElement('div');
      z.className = 'zzz';
      z.textContent = 'z Z z';
      character.appendChild(z);
    }

    // Map action to expression
    const exprMap = {
      wave: 'happy', jump: 'surprised', dance: 'love', nod: 'happy',
      shake: 'angry', walk: 'normal', spin: 'dizzy', sleep: 'sleepy', surprise: 'surprised'
    };
    setExpression(exprMap[name] || 'normal');

    // Show speech
    const key = name in speeches ? name : 'default';
    showSpeech(rnd(speeches[key]));

    // End action
    if (actionTimer) clearTimeout(actionTimer);
    actionTimer = setTimeout(() => {
      setAction('idle');
      scheduleNext();
    }, duration);
  }

  // ===== Speech bubble =====
  function showSpeech(text) {
    bubble.textContent = text;
    bubble.classList.add('show');
    if (bubbleTimer) clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 2800);
  }

  // ===== Helpers =====
  function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function rndInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

  // ===== Schedule next =====
  function scheduleNext() {
    setTimeout(() => {
      if (currentAction !== 'idle') return;
      const a = rnd(actions);
      setAction(a.name, a.duration);
    }, rndInt(2500, 5500));
  }

  // ===== 检测点击部位 =====
  function detectPart(target) {
    // 向上查找 data-part 属性或特定 class
    let el = target;
    while (el && el !== character) {
      if (el.dataset && el.dataset.part) return el.dataset.part;
      const cls = el.getAttribute && el.getAttribute('class') || '';
      if (/hit-arm/.test(cls)) return 'arm';
      if (/hit-leg/.test(cls)) return 'leg';
      if (/head-group|eyes|mouth|cheek|hair/.test(cls)) return 'head';
      if (cls.indexOf('eye') >= 0) return 'eye';
      if (cls.indexOf('mouth') >= 0) return 'mouth';
      if (cls.indexOf('hair') >= 0) return 'hair';
      el = el.parentNode;
    }
    return 'head'; // 默认认为是头
  }

  // ===== 不同部位的反应库 =====
  const partReactions = {
    head: [
      () => { setExpression('happy'); showSpeech('嘿嘿，摸摸头~ 🥰'); spawnParticles(['✨','💫','⭐']); resetAfter(2500); },
      () => { setExpression('love'); showSpeech('好舒服呀~ ❤️'); spawnParticles(['❤️','💕','💖']); resetAfter(2500); },
      () => { setExpression('wink'); showSpeech('嘿嘿，被你发现了~'); resetAfter(2000); },
      () => setAction('nod', 1200)
    ],
    eye: [
      () => { setExpression('surprised'); showSpeech('哎呀！别戳我眼睛啦~'); resetAfter(2000); },
      () => { setExpression('dizzy'); showSpeech('看不清啦！😵'); resetAfter(2200); }
    ],
    mouth: [
      () => { setExpression('tongue'); showSpeech('略略略~ 🤪'); resetAfter(2200); },
      () => { setExpression('surprised'); showSpeech('呜呜，不要捏我嘴！'); resetAfter(2000); }
    ],
    hair: [
      () => { setExpression('happy'); showSpeech('我的头发蓬蓬的~'); resetAfter(2000); },
      () => { setExpression('wink'); showSpeech('小心别弄乱我的发型！'); resetAfter(2200); }
    ],
    body: [
      () => { setExpression('surprised'); showSpeech('哎呀，痒痒！😆'); resetAfter(2200); },
      () => setAction('dance', 3200),
      () => { setExpression('love'); showSpeech('抱抱~ 🤗'); spawnParticles(['❤️','🤗','💕']); resetAfter(2500); }
    ],
    arm: [
      () => setAction('wave', 2200),
      () => { setExpression('happy'); showSpeech('握握手~ ✋'); resetAfter(2000); },
      () => { setExpression('surprised'); showSpeech('哎呀，要拉我去哪呀？'); resetAfter(2200); }
    ],
    leg: [
      () => setAction('jump', 800),
      () => setAction('walk', 2500),
      () => { setExpression('surprised'); showSpeech('哎哟，腿好痒~'); resetAfter(2000); },
      () => setAction('spin', 1000)
    ]
  };

  function resetAfter(ms) {
    setTimeout(() => setAction('idle'), ms);
  }

  // ===== 点击事件 =====
  character.addEventListener('click', (e) => {
    if (currentAction !== 'idle') return;
    const part = detectPart(e.target);
    const reactions = partReactions[part] || partReactions.head;
    rnd(reactions)();
    // 在状态栏显示点到的部位
    const partNames = { head: '🧠 摸了摸头', eye: '👀 戳眼睛', mouth: '👄 戳嘴巴', hair: '💇 摸头发', body: '👕 戳身体', arm: '💪 戳手臂', leg: '🦵 戳腿' };
    status.textContent = partNames[part] || '';
  });

  // ===== Hearts / Particles =====
  function spawnHearts() {
    spawnParticles(['❤️', '💕', '💖', '💗', '✨', '♡']);
  }
  function spawnParticles(emojis) {
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'particle';
        h.textContent = rnd(emojis);
        h.style.left = (80 + rndInt(-50, 50)) + 'px';
        h.style.top = (rndInt(-30, 30)) + 'px';
        h.style.fontSize = rndInt(16, 26) + 'px';
        character.appendChild(h);
        setTimeout(() => h.remove(), 1200);
      }, i * 120);
    }
  }

  // ===== 鼠标追踪 Mouse Tracking =====
  const headTrack = document.getElementById('head-track');
  const pupilsTrack = document.getElementById('pupils-track');
  let targetX = 0, targetY = 0;   // 目标方向 (-1 ~ 1)
  let smoothX = 0, smoothY = 0;   // 平滑插值

  document.addEventListener('mousemove', (e) => {
    const rect = character.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height * 0.35; // 头部在上方 35% 处
    const dx = (e.clientX - cx) / (rect.width / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);
    targetX = Math.max(-1.5, Math.min(1.5, dx));
    targetY = Math.max(-1.5, Math.min(1.5, dy));
  });

  // 触屏支持
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      const rect = character.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height * 0.35;
      const dx = (e.touches[0].clientX - cx) / (rect.width / 2);
      const dy = (e.touches[0].clientY - cy) / (rect.height / 2);
      targetX = Math.max(-1.5, Math.min(1.5, dx));
      targetY = Math.max(-1.5, Math.min(1.5, dy));
    }
  }, { passive: true });

  function updateTracking() {
    // 平滑插值
    smoothX += (targetX - smoothX) * 0.1;
    smoothY += (targetY - smoothY) * 0.1;

    // 头部：最大 7 度旋转 + 4px 平移
    const headRot = smoothX * 7;
    const headTx = smoothX * 4;
    const headTy = smoothY * 3;
    headTrack.setAttribute('transform',
      `translate(${headTx.toFixed(2)} ${headTy.toFixed(2)}) rotate(${headRot.toFixed(2)} 100 110)`);

    // 瞳孔：最大 3.5px 移动（在眼白内滑动）
    const px = smoothX * 3.5;
    const py = smoothY * 3;
    pupilsTrack.setAttribute('transform',
      `translate(${px.toFixed(2)} ${py.toFixed(2)})`);

    requestAnimationFrame(updateTracking);
  }
  requestAnimationFrame(updateTracking);

  // ===== Blink =====
  setInterval(() => {
    if (currentAction !== 'idle') return;
    if (Math.random() < 0.35) {
      // 压扁眼白 + 隐藏瞳孔
      const whites = eyesDefault.querySelectorAll('ellipse');
      whites.forEach(el => { el.setAttribute('ry', '1.5'); });
      pupilsTrack.style.opacity = '0';
      setTimeout(() => {
        whites.forEach(el => { el.setAttribute('ry', '10'); });
        pupilsTrack.style.opacity = '1';
      }, 150);
    }
  }, 2500);

  // ===== Init =====
  setExpression('normal');
  showSpeech('你好呀~ 点我试试！ ✨');
  setTimeout(() => bubble.classList.remove('show'), 3500);
  scheduleNext();
})();
</script>
</body>
</html>
