<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可爱小人聊天</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/character.css">
</head>
<body>

<!-- SVG Filters (手绘抖动滤镜) -->
<svg class="sketch-filter">
  <defs>
    <filter id="sketchy">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="noise" seed="1"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketchyMore">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="3" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- Corner doodles -->
<div class="corner-deco tl">✿</div>
<div class="corner-deco tr">☆</div>
<div class="corner-deco bl">☁</div>
<div class="corner-deco br">♡</div>

<!-- Top bar -->
<header class="top-bar">
  <h1 class="app-title">✏️ 可爱小人聊天</h1>
  <div class="top-actions">
    <button id="clear-chat-btn" class="icon-btn" title="清空聊天窗口（不清空记忆）">🧹</button>
    <button id="settings-btn" class="icon-btn" title="设置">⚙️</button>
  </div>
</header>

<!-- Main layout: left chat + right character -->
<main class="app-layout">

  <!-- Left: Chat panel -->
  <section class="chat-panel">
    <div id="message-list" class="message-list"></div>
    <div class="input-area">
      <!-- Image preview (shown when an image is attached) -->
      <div class="image-preview" id="image-preview" style="display:none;"></div>
      <textarea id="chat-input" class="chat-input" rows="1" placeholder="和小人说点什么吧~ (Enter发送)"></textarea>
      <div class="btn-group">
        <button id="emoji-btn" class="tool-btn" title="表情">😀</button>
        <button id="image-btn" class="tool-btn" title="发图片">🖼️</button>
        <input type="file" id="image-file" accept="image/*" style="display:none;">
        <button id="send-btn" class="send-btn">发送</button>
        <button id="stop-btn" class="stop-btn" style="display:none;">停止</button>
      </div>
    </div>

    <!-- Emoji picker panel -->
    <div class="emoji-panel" id="emoji-panel" style="display:none;"></div>
  </section>

  <!-- Right: Character panel -->
  <section class="character-panel">
    <!-- Weather background layer -->
    <div class="weather-layer sunny" id="weather-layer"></div>
    <div class="weather-particles weather-particles-back" id="weather-particles-back"></div>

    <!-- Weather toggle -->
    <div class="weather-bar">
      <button class="weather-btn" id="weather-cycle-btn" title="切换天气">🌤️</button>
      <span class="weather-status" id="weather-status">☀️ 晴天</span>
    </div>

    <div class="stage">
      <div class="speech-bubble" id="speech-bubble"></div>

      <div class="character idle" id="character">
        <svg class="char-svg" viewBox="0 0 200 320" id="charSvg">
          <!-- Hand-drawn filter on the whole character -->
          <g filter="url(#sketchyMore)">

            <!-- === LEGS (with knee joint) === -->
            <g class="leg-left" data-part="leg">
              <line x1="88" y1="240" x2="82" y2="265" stroke="#333" stroke-width="3.2" stroke-linecap="round" fill="none"/>
              <circle cx="82" cy="265" r="2.5" fill="#333"/>
              <line x1="82" y1="265" x2="73" y2="290" stroke="#333" stroke-width="3.2" stroke-linecap="round" fill="none"/>
              <ellipse cx="68" cy="295" rx="14" ry="8" fill="#a0522d" stroke="#333" stroke-width="2.5"/>
              <line x1="58" y1="293" x2="78" y2="295" stroke="#333" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
              <rect x="50" y="240" width="40" height="65" fill="transparent" class="hit-leg"/>
            </g>
            <g class="leg-right" data-part="leg">
              <line x1="112" y1="240" x2="118" y2="265" stroke="#333" stroke-width="3.2" stroke-linecap="round" fill="none"/>
              <circle cx="118" cy="265" r="2.5" fill="#333"/>
              <line x1="118" y1="265" x2="127" y2="290" stroke="#333" stroke-width="3.2" stroke-linecap="round" fill="none"/>
              <ellipse cx="132" cy="295" rx="14" ry="8" fill="#a0522d" stroke="#333" stroke-width="2.5"/>
              <line x1="122" y1="293" x2="142" y2="295" stroke="#333" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
              <rect x="110" y="240" width="40" height="65" fill="transparent" class="hit-leg"/>
            </g>

            <!-- === BODY (dress/shirt trapezoid) === -->
            <path class="body-shape" data-part="body"
                  d="M 78 200 Q 75 205 72 245 Q 70 255 80 258 L 120 258 Q 130 255 128 245 Q 125 205 122 200 Z"
                  fill="#d4c9a8" stroke="#333" stroke-width="2.8" stroke-linejoin="round" fill-opacity="0.9"/>
            <line x1="100" y1="200" x2="100" y2="255" stroke="#333" stroke-width="2" stroke-linecap="round" opacity="0.3" pointer-events="none"/>
            <circle cx="100" cy="215" r="1.5" fill="#8b7355" pointer-events="none"/>
            <circle cx="100" cy="230" r="1.5" fill="#8b7355" pointer-events="none"/>

            <!-- === ARMS (with elbow joint) === -->
            <g class="arm-left-group" data-part="arm">
              <line x1="75" y1="210" x2="58" y2="225" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
              <circle cx="58" cy="225" r="2.5" fill="#333"/>
              <line x1="58" y1="225" x2="45" y2="248" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
              <circle cx="44" cy="250" r="4" fill="#f0d5a8" stroke="#333" stroke-width="2"/>
              <line x1="44" y1="250" x2="37" y2="244" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="44" y1="250" x2="36" y2="252" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="44" y1="250" x2="38" y2="258" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
              <rect x="30" y="205" width="40" height="55" fill="transparent" class="hit-arm"/>
            </g>
            <g class="arm-right-group" data-part="arm">
              <line x1="125" y1="210" x2="142" y2="225" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
              <circle cx="142" cy="225" r="2.5" fill="#333"/>
              <line x1="142" y1="225" x2="155" y2="248" stroke="#333" stroke-width="3" stroke-linecap="round" fill="none"/>
              <circle cx="156" cy="250" r="4" fill="#f0d5a8" stroke="#333" stroke-width="2"/>
              <line x1="156" y1="250" x2="163" y2="244" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="156" y1="250" x2="164" y2="252" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="156" y1="250" x2="162" y2="258" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
              <rect x="130" y="205" width="40" height="55" fill="transparent" class="hit-arm"/>
            </g>

            <!-- === HEAD GROUP === -->
            <g class="head-group" data-part="head">
             <g id="head-track">
              <!-- Hair -->
              <g data-part="hair">
              <path d="M 42 90 Q 38 55 55 35 Q 70 20 100 18 Q 130 20 145 35 Q 162 55 158 90"
                    fill="#a8d8ea" stroke="none" opacity="0.85"/>
              <path d="M 50 75 Q 55 45 70 30 Q 80 22 95 25 Q 110 22 120 30 Q 140 45 150 70"
                    fill="none" stroke="#5ba3c9" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
              <path d="M 55 80 Q 62 50 78 35 Q 90 28 105 32 Q 118 28 130 35 Q 145 50 148 75"
                    fill="none" stroke="#5ba3c9" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
              <path d="M 70 30 Q 68 18 75 12" fill="none" stroke="#5ba3c9" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M 95 25 Q 97 12 105 8" fill="none" stroke="#5ba3c9" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M 120 30 Q 125 16 132 14" fill="none" stroke="#5ba3c9" stroke-width="2.5" stroke-linecap="round"/>
              </g>

              <!-- Head -->
              <circle cx="100" cy="110" r="72" fill="#f5deb3" stroke="#333" stroke-width="3.5"/>

              <!-- Cheeks -->
              <ellipse cx="55" cy="118" rx="14" ry="10" fill="#f8b4b4" opacity="0.55"/>
              <ellipse cx="145" cy="118" rx="14" ry="10" fill="#f8b4b4" opacity="0.55"/>

              <!-- Eyes - default -->
              <g id="eyes" data-part="eye">
                <ellipse cx="78" cy="105" rx="9" ry="10" fill="#fff" stroke="#333" stroke-width="2"/>
                <ellipse cx="122" cy="105" rx="9" ry="10" fill="#fff" stroke="#333" stroke-width="2"/>
                <g id="pupils-track">
                  <circle id="pupil-left" cx="78" cy="105" r="4.5" fill="#333"/>
                  <circle id="pupil-right" cx="122" cy="105" r="4.5" fill="#333"/>
                  <circle id="hl-left" cx="76" cy="103" r="1.5" fill="#fff"/>
                  <circle id="hl-right" cx="120" cy="103" r="1.5" fill="#fff"/>
                </g>
              </g>
              <!-- Eye states -->
              <g id="eyes-happy" style="display:none">
                <path class="eye-left" d="M 70 105 Q 78 98 86 105" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
                <path class="eye-right" d="M 114 105 Q 122 98 130 105" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
              </g>
              <g id="eyes-surprised" style="display:none">
                <circle class="eye-left" cx="78" cy="105" r="8" fill="#333"/>
                <circle class="eye-right" cx="122" cy="105" r="8" fill="#333"/>
                <circle cx="75" cy="102" r="2.5" fill="#fff"/>
                <circle cx="119" cy="102" r="2.5" fill="#fff"/>
              </g>
              <g id="eyes-sad" style="display:none">
                <circle class="eye-left" cx="78" cy="107" r="5" fill="#333"/>
                <circle class="eye-right" cx="122" cy="107" r="5" fill="#333"/>
                <line x1="68" y1="96" x2="86" y2="100" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="132" y1="96" x2="114" y2="100" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
              </g>
              <g id="eyes-sleepy" style="display:none">
                <line class="eye-left" x1="70" y1="106" x2="86" y2="106" stroke="#333" stroke-width="3" stroke-linecap="round"/>
                <line class="eye-right" x1="114" y1="106" x2="130" y2="106" stroke="#333" stroke-width="3" stroke-linecap="round"/>
              </g>
              <g id="eyes-love" style="display:none">
                <text class="eye-left" x="70" y="110" font-size="18" fill="#e74c3c">♥</text>
                <text class="eye-right" x="114" y="110" font-size="18" fill="#e74c3c">♥</text>
              </g>
              <g id="eyes-wink" style="display:none">
                <circle class="eye-left" cx="78" cy="105" r="5" fill="#333"/>
                <path class="eye-right" d="M 114 105 Q 122 98 130 105" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
              </g>
              <g id="eyes-angry" style="display:none">
                <circle class="eye-left" cx="78" cy="107" r="5" fill="#333"/>
                <circle class="eye-right" cx="122" cy="107" r="5" fill="#333"/>
                <line x1="66" y1="93" x2="86" y2="98" stroke="#333" stroke-width="3" stroke-linecap="round"/>
                <line x1="134" y1="93" x2="114" y2="98" stroke="#333" stroke-width="3" stroke-linecap="round"/>
              </g>
              <g id="eyes-dizzy" style="display:none">
                <g transform="translate(78,105)"><line x1="-5" y1="-5" x2="5" y2="5" stroke="#333" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="-5" x2="-5" y2="5" stroke="#333" stroke-width="2.5" stroke-linecap="round"/></g>
                <g transform="translate(122,105)"><line x1="-5" y1="-5" x2="5" y2="5" stroke="#333" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="-5" x2="-5" y2="5" stroke="#333" stroke-width="2.5" stroke-linecap="round"/></g>
              </g>

              <!-- Nose -->
              <circle cx="100" cy="118" r="2.5" fill="#e0a880" opacity="0.6"/>

              <!-- Mouth -->
              <g id="mouth-default" data-part="mouth">
                <path d="M 82 130 Q 100 148 118 130" fill="none" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>
              </g>
              <g id="mouth-happy" style="display:none">
                <path d="M 78 128 Q 100 155 122 128" fill="#e07050" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M 85 138 Q 100 145 115 138" fill="#c04030" stroke="none" opacity="0.4"/>
              </g>
              <g id="mouth-surprised" style="display:none">
                <ellipse cx="100" cy="135" rx="8" ry="10" fill="#4a2010" stroke="#333" stroke-width="2.5"/>
              </g>
              <g id="mouth-sad" style="display:none">
                <path d="M 85 140 Q 100 130 115 140" fill="none" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>
              </g>
              <g id="mouth-flat" style="display:none">
                <line x1="85" y1="135" x2="115" y2="135" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>
              </g>
              <g id="mouth-tongue" style="display:none">
                <path d="M 80 128 Q 100 150 120 128" fill="none" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>
                <ellipse cx="100" cy="140" rx="7" ry="8" fill="#e07050" stroke="#333" stroke-width="1.5"/>
              </g>
              <g id="mouth-angry" style="display:none">
                <path d="M 85 140 Q 100 132 115 140" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
              </g>

             </g><!-- /head-track -->
            </g><!-- /head-group -->
          </g>
        </svg>
      </div>

      <div class="status" id="status"></div>
    </div>

    <!-- Front particle layer (in front of character for depth) -->
    <div class="weather-particles weather-particles-front" id="weather-particles-front"></div>
  </section>

</main>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <h2 class="modal-title">⚙️ 设置</h2>
    <p class="modal-hint">API Key 仅保存在你的浏览器本地 (localStorage)，不会上传到任何服务器。</p>

    <div class="form-group">
      <label for="cfg-baseUrl">API 地址 (Base URL)</label>
      <input type="text" id="cfg-baseUrl" placeholder="https://api.openai.com/v1">
    </div>

    <div class="form-group">
      <label for="cfg-apiKey">API Key</label>
      <div class="input-with-toggle">
        <input type="password" id="cfg-apiKey" placeholder="sk-...">
        <button type="button" id="toggle-key" class="toggle-btn">👁</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="cfg-chatModel">聊天模型</label>
        <input type="text" id="cfg-chatModel" placeholder="gpt-4o-mini">
      </div>
      <div class="form-group">
        <label for="cfg-actionModel">动作模型</label>
        <input type="text" id="cfg-actionModel" placeholder="gpt-4o-mini">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="cfg-temperature">聊天温度</label>
        <input type="number" id="cfg-temperature" step="0.05" min="0" max="2">
      </div>
      <div class="form-group">
        <label for="cfg-actionTemperature">动作温度</label>
        <input type="number" id="cfg-actionTemperature" step="0.05" min="0" max="2">
      </div>
    </div>

    <div class="form-group">
      <label for="cfg-mode">协调模式</label>
      <select id="cfg-mode">
        <option value="parallel">并行 (聊天与动作同时进行，推荐)</option>
        <option value="sequential">顺序 (动作先于聊天回复)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="cfg-chatPrompt">聊天系统提示词</label>
      <textarea id="cfg-chatPrompt" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label for="cfg-actionPrompt">动作系统提示词</label>
      <textarea id="cfg-actionPrompt" rows="4"></textarea>
    </div>

    <div class="modal-actions">
      <button type="button" id="clear-memory-btn" class="btn-warn">清空记忆</button>
      <div class="btn-spacer"></div>
      <button type="button" id="settings-cancel" class="btn-secondary">取消</button>
      <button type="button" id="settings-save" class="btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- Scripts (按依赖顺序引入) -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/memory.js"></script>
<script src="js/demo.js"></script>
<script src="js/weather.js"></script>
<script src="js/character.js"></script>
<script src="js/chat-ui.js"></script>
<script src="js/chat-agent.js"></script>
<script src="js/action-agent.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
