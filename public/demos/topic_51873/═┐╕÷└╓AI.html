<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>涂个乐 AI · TRAE 加速 · 绘画心理分析</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(180deg, #FFF0F6 0%, #FFFFFF 50%, #F5F3FF 100%);
    color: #1F2937;
    min-height: 100vh;
    line-height: 1.6;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }

  /* 顶部 Header */
  .header {
    text-align: center;
    padding: 20px 0 24px;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 24px;
    font-weight: 700;
    color: #FF6B9D;
  }
  .logo-badge {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 1px;
  }
  .slogan {
    font-size: 13px;
    color: #9CA3AF;
    margin-top: 6px;
  }

  /* 情绪精灵 */
  .elf-stage {
    display: flex;
    justify-content: center;
    margin: 16px 0;
  }
  .elf-container {
    position: relative;
    width: 120px;
    height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .elf-aura {
    position: absolute;
    top: -10%;
    left: -10%;
    width: 120%;
    height: 120%;
    border-radius: 50%;
    animation: aura 3s ease-in-out infinite;
  }
  @keyframes aura {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
  }
  .elf-body {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15), inset -6px -6px 18px rgba(0,0,0,0.15);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .elf-name {
    margin-top: 12px;
    font-size: 12px;
    color: #6B7280;
  }
  .stage-info {
    text-align: center;
    font-size: 11px;
    color: #9CA3AF;
    margin-top: 4px;
  }
  .stage-info b { color: #FF6B9D; }

  /* 上传区 */
  .upload-zone {
    background: #fff;
    border: 2px dashed #FFB6C1;
    border-radius: 16px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    margin: 16px 0;
  }
  .upload-zone:hover { border-color: #FF6B9D; background: #FFF5F7; }
  .upload-zone.has-img { padding: 0; border-style: solid; border-color: #FF6B9D; }
  .upload-icon { font-size: 40px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; color: #6B7280; }
  .upload-hint { font-size: 11px; color: #9CA3AF; margin-top: 4px; }
  #previewImg { width: 100%; max-height: 280px; border-radius: 14px; display: block; }

  /* 任务类型选择 */
  .task-selector {
    display: flex;
    gap: 8px;
    margin: 16px 0;
  }
  .task-btn {
    flex: 1;
    padding: 12px;
    background: #fff;
    border: 2px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-size: 13px;
    color: #6B7280;
  }
  .task-btn.active {
    border-color: #FF6B9D;
    background: #FFF0F6;
    color: #FF6B9D;
    font-weight: 600;
  }
  .task-btn .task-emoji { display: block; font-size: 22px; margin-bottom: 4px; }

  /* 主按钮 */
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #FF6B9D, #EC4899);
    color: #fff;
    border: none;
    border-radius: 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 16px rgba(255, 107, 157, 0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4); }
  .btn-primary:disabled { background: #E5E7EB; color: #9CA3AF; cursor: not-allowed; box-shadow: none; transform: none; }

  /* 分析中状态 */
  .analyzing {
    text-align: center;
    padding: 24px;
    background: #fff;
    border-radius: 16px;
    margin: 16px 0;
  }
  .timer-display {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  .timer-num {
    font-size: 56px;
    font-weight: 200;
    color: #FF6B9D;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
    line-height: 1;
  }
  .timer-unit { font-size: 18px; color: #999; }
  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid #FFE4EE;
    border-top-color: #FF6B9D;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .stage-text { font-size: 14px; color: #333; margin-bottom: 16px; }
  .stages-list { text-align: left; max-width: 280px; margin: 0 auto; }
  .stage-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #F9FAFB;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 12px;
    color: #9CA3AF;
    border: 1px solid transparent;
  }
  .stage-item.active { border-color: #FF6B9D; color: #FF6B9D; background: #FFF0F6; }
  .stage-item.done { color: #10B981; background: #F0FDF4; }
  .stage-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #E5E7EB;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: #fff;
  }
  .stage-item.active .stage-icon { background: #FF6B9D; }
  .stage-item.done .stage-icon { background: #10B981; }
  .stage-time { margin-left: auto; font-variant-numeric: tabular-nums; }
  .target-hint {
    margin-top: 12px;
    font-size: 11px;
    color: #6366f1;
    background: rgba(99, 102, 241, 0.08);
    padding: 4px 12px;
    border-radius: 12px;
    display: inline-block;
  }

  /* 结果卡片 */
  .results { margin-top: 16px; }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    position: relative;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-content { font-size: 13px; line-height: 1.7; color: #374151; }
  .top-card { padding: 0; overflow: hidden; }
  .top-card img { width: 100%; max-height: 280px; object-fit: contain; background: #f9f9f9; }
  .badges { padding: 10px 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .crisis-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 600;
  }
  .crisis-badge.safe { background: #DCFCE7; color: #16A34A; }
  .crisis-badge.warning { background: #FEF3C7; color: #D97706; }
  .crisis-badge.crisis { background: #FEE2E2; color: #DC2626; }
  .time-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: rgba(99, 102, 241, 0.92);
    color: #fff;
    font-weight: 500;
  }
  .rules-tags { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 14px 12px; }
  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: #E0F2FE;
    color: #0284C7;
  }

  /* 毒舌卡片 */
  .toxic-card { border-left: 4px solid #FF6B9D; }
  .toxic-text { color: #FF6B9D; font-weight: 500; }

  /* 专业卡片 */
  .pro-card { border-left: 4px solid #0284C7; }

  /* 启发卡片 */
  .ask-card { border-left: 4px solid #10B981; }
  .ask-text { color: #059669; font-style: italic; }

  /* TRAE 视角卡片 */
  .trae-card {
    border-left: 4px solid #6366f1;
    background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
    position: relative;
    overflow: hidden;
  }
  .trae-card::before {
    content: '';
    position: absolute;
    top: -40%; right: -20%;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .trae-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
    position: relative; z-index: 1;
  }
  .trae-badge {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    letter-spacing: 1px;
    box-shadow: 0 2px 6px rgba(99,102,241,0.3);
  }
  .trae-tag {
    font-size: 11px;
    color: #6366f1;
    background: rgba(99,102,241,0.1);
    padding: 3px 8px;
    border-radius: 6px;
  }
  .trae-text {
    color: #4338ca;
    font-style: italic;
    font-weight: 500;
    position: relative; z-index: 1;
  }

  /* 雷达图 */
  .radar-card { text-align: center; }
  #radarCanvas { max-width: 100%; }

  /* 暗黑卡片 */
  .dark-card {
    background: linear-gradient(135deg, #1F2937 0%, #4B5563 100%);
    color: #FBBF24;
    border-left: 4px solid #A78BFA;
  }
  .dark-card.locked { cursor: pointer; }
  .dark-card .card-title { color: #FBBF24; }
  .dark-locked-text { color: #9CA3AF; font-size: 12px; text-align: center; padding: 8px 0; }
  .dark-unlock-btn {
    display: block;
    margin: 8px auto 0;
    padding: 6px 18px;
    background: linear-gradient(135deg, #F59E0B, #D97706);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  /* 操作按钮 */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .actions button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 22px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-again { background: #fff; color: #FF6B9D; border: 1px solid #FF6B9D; }
  .btn-share { background: #6366f1; color: #fff; }

  /* Toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 10px 20px;
    border-radius: 22px;
    font-size: 13px;
    z-index: 1000;
    transition: transform 0.3s;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 底部 */
  .footer {
    text-align: center;
    margin-top: 24px;
    padding: 16px;
    font-size: 11px;
    color: #9CA3AF;
  }
  .footer .trae-mark {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  /* 隐藏 */
  .hidden { display: none !important; }

  /* 危机弹窗 */
  .modal-mask {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .modal h3 { color: #DC2626; margin-bottom: 12px; font-size: 18px; }
  .modal p { font-size: 13px; color: #6B7280; margin-bottom: 16px; line-height: 1.7; }
  .modal .hotline {
    display: inline-block;
    background: #FEE2E2;
    color: #DC2626;
    padding: 8px 20px;
    border-radius: 20px;
    font-weight: 600;
    margin: 8px 0 16px;
  }
  .modal button {
    padding: 10px 24px;
    background: #FF6B9D;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      🎨 涂个乐 AI
      <span class="logo-badge">⚡ TRAE</span>
    </div>
    <div class="slogan">白天涂个乐，深夜看穿你的小心机</div>
  </div>

  <!-- 情绪精灵 -->
  <div class="elf-stage">
    <div class="elf-container">
      <div class="elf-aura" id="elfAura"></div>
      <div class="elf-body" id="elfBody">
        <div id="elfInner"></div>
      </div>
      <div class="elf-name" id="elfName">萌芽期 · Lv.1</div>
      <div class="stage-info">已分析 <b id="analyzeCount">0</b> 次 · 距下一阶段 <b id="nextStage">3</b> 次</div>
    </div>
  </div>

  <!-- 上传区 -->
  <div class="upload-zone" id="uploadZone">
    <div id="uploadPlaceholder">
      <div class="upload-icon">📸</div>
      <div class="upload-text">点击上传你的涂鸦</div>
      <div class="upload-hint">支持 树木画 / 几何图形 添加</div>
    </div>
    <img id="previewImg" class="hidden">
    <input type="file" id="fileInput" accept="image/*" class="hidden">
  </div>

  <!-- 任务类型 -->
  <div class="task-selector">
    <div class="task-btn active" data-task="tree_extend">
      <span class="task-emoji">🌳</span>
      树木画
    </div>
    <div class="task-btn" data-task="geometry_add">
      <span class="task-emoji">⭕</span>
      几何添加
    </div>
  </div>

  <!-- 分析按钮 -->
  <button class="btn-primary" id="analyzeBtn" disabled>请先上传图片</button>

  <!-- 分析中状态 -->
  <div class="analyzing hidden" id="analyzingBox">
    <div class="timer-display">
      <div class="timer-num" id="timerNum">0.0</div>
      <div class="timer-unit">秒</div>
    </div>
    <div class="spinner"></div>
    <div class="stage-text" id="stageText">上传中...</div>
    <div class="stages-list" id="stagesList"></div>
    <div class="target-hint">⚡ 5 秒响应优化 · TRAE 加速</div>
  </div>

  <!-- 结果区 -->
  <div class="results hidden" id="results"></div>

  <!-- 危机弹窗 -->
  <div class="modal-mask hidden" id="crisisModal">
    <div class="modal">
      <h3>⚠️ 我有点担心你</h3>
      <p id="crisisMsg"></p>
      <div class="hotline">📞 24小时心理援助：400-161-9995</div>
      <br>
      <button onclick="document.getElementById('crisisModal').classList.add('hidden')">我明白了</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="footer">
  <div class="trae-mark">⚡ Powered by TRAE AI</div>
  <div>三阶 Pipeline · Vision + RAG + Report · 5 秒响应</div>
  <div style="margin-top:4px;">本 Demo 为比赛演示版本，数据本地模拟</div>
</div>

  { name: "萌芽期", color: "#9CA3AF", dark: "#6B7280", threshold: 0 },
  { name: "幼苗期", color: "#86EFAC", dark: "#10B981", threshold: 3 },

// =================== 工具函数 ===================
function $(id) { return document.getElementById(id); }
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}
function pickSeed(taskType) {
  const candidates = SEEDS.filter(s => s.task_type === taskType);
  return candidates[Math.floor(Math.random() * candidates.length)].report;
}

// =================== 精灵渲染 ===================
function renderElf() {
  const count = state.analyzeCount;
  let stageIdx = 0;
  for (let i = 0; i < ELF_STAGES.length; i++) {
    if (count >= ELF_STAGES[i].threshold) stageIdx = i;
  }
  const stage = ELF_STAGES[stageIdx];
  const next = ELF_STAGES[stageIdx + 1];
  const remain = next ? (next.threshold - count) : 0;

  $("elfName").textContent = `${stage.name} · Lv.${stageIdx + 1}`;
  $("analyzeCount").textContent = count;
  $("nextStage").textContent = remain > 0 ? remain : "已满级";

  $("elfAura").style.background = `radial-gradient(circle, ${stage.color}40 0%, transparent 70%)`;
  $("elfBody").style.background = `radial-gradient(circle at 30% 30%, ${stage.color} 0%, ${stage.dark} 100%)`;

  // 各阶段 SVG/HTML 内容
  const inner = $("elfInner");
  inner.innerHTML = renderElfStage(stageIdx + 1, stage);
}

  if (stage === 1) {
    return `<div style="position:relative;width:60%;height:60%;">
      <div style="width:32px;height:38px;background:#5B3A1F;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;position:absolute;bottom:10%;left:50%;margin-left:-16px;animation:shake 2s ease-in-out infinite;"></div>
      <div style="width:5px;height:18px;background:#86EFAC;position:absolute;bottom:55%;left:50%;margin-left:-2.5px;border-radius:2px;animation:grow 2s ease-in-out infinite;transform-origin:bottom;"></div>

      <div style="width:28px;height:18px;background:#34D399;border-radius:0 100% 0 100%;position:absolute;top:15%;right:30%;transform:rotate(150deg);transform-origin:bottom left;animation:sway 3s ease-in-out 0.5s infinite;"></div>

// =================== 上传交互 ===================
const uploadZone = $("uploadZone");
const fileInput = $("fileInput");
const previewImg = $("previewImg");
const uploadPlaceholder = $("uploadPlaceholder");
const analyzeBtn = $("analyzeBtn");

uploadZone.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    state.filePath = ev.target.result;
    previewImg.src = ev.target.result;
    previewImg.classList.remove("hidden");
    uploadPlaceholder.classList.add("hidden");
    uploadZone.classList.add("has-img");
    analyzeBtn.disabled = false;
    analyzeBtn.textContent = "🚀 开始 TRAE 加速分析";
  };
  reader.readAsDataURL(file);
});

// 任务类型切换
document.querySelectorAll(".task-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".task-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.taskType = btn.dataset.task;
  });
});

// =================== 分析流程 ===================
analyzeBtn.addEventListener("click", () => {
  if (state.analyzing || !state.filePath) return;
  startAnalysis();
});

function startAnalysis() {
  state.analyzing = true;
  analyzeBtn.disabled = true;
  analyzeBtn.textContent = "分析中...";
  $("analyzingBox").classList.remove("hidden");
  $("results").classList.add("hidden");

  const stages = [
    { name: "上传", text: "上传中..." },
    { name: "视觉识别", text: "视觉识别中..." },
    { name: "RAG 检索", text: "RAG 检索中..." },
    { name: "报告生成", text: "报告生成中..." }
  ];

  // 渲染阶段列表
  $("stagesList").innerHTML = stages.map((s, i) => `
    <div class="stage-item" data-idx="${i+1}">
      <span class="stage-icon">${i+1}</span> ${s.name}
      <span class="stage-time"></span>
    </div>
  `).join("");

  const totalStart = Date.now();
  let curStage = 1;
  const stageStart = Date.now();

  // 实时计时
  const tickTimer = setInterval(() => {
    const elapsed = ((Date.now() - totalStart) / 1000).toFixed(1);
    $("timerNum").textContent = elapsed;
    const stageElapsed = Date.now() - stageStart;
    const stageItem = document.querySelector(`.stage-item[data-idx="${curStage}"] .stage-time`);
    if (stageItem) {
      stageItem.textContent = stageElapsed < 1000 ? stageElapsed + "ms" : (stageElapsed/1000).toFixed(1) + "s";
    }
  }, 100);

  // 阶段切换
  const stageTimer = setInterval(() => {
    if (curStage < 4) {
      // 标记前一阶段完成
      const prev = document.querySelector(`.stage-item[data-idx="${curStage}"]`);
      prev.classList.remove("active");
      prev.classList.add("done");
      prev.querySelector(".stage-icon").textContent = "✓";
      curStage++;
      const cur = document.querySelector(`.stage-item[data-idx="${curStage}"]`);
      cur.classList.add("active");
      $("stageText").textContent = stages[curStage-1].text;
    }
  }, 1200);

  // 模拟 3.5-4.5 秒返回
  const analyzeTime = 3500 + Math.random() * 1000;
  setTimeout(() => {
    clearInterval(tickTimer);
    clearInterval(stageTimer);
    const totalElapsed = ((Date.now() - totalStart) / 1000).toFixed(1);

    // 标记所有阶段完成
    document.querySelectorAll(".stage-item").forEach(item => {
      item.classList.remove("active");
      item.classList.add("done");
      item.querySelector(".stage-icon").textContent = "✓";
    });

    $("stageText").textContent = "完成！";

    // 取种子数据
    const report = pickSeed(state.taskType);

    // 短暂停留后显示结果
    setTimeout(() => {
      $("analyzingBox").classList.add("hidden");
      $("results").classList.remove("hidden");
      renderResults(report, totalElapsed);
      state.analyzing = false;
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = "🔄 再画一张";
      state.analyzeCount++;
      renderElf();

      // 危机弹窗
      if (report.crisis_level === "warning" || report.crisis_level === "crisis") {
        $("crisisMsg").textContent = report.crisis_message || "画作中存在一些需要关注的信号，请照顾好自己。";
        $("crisisModal").classList.remove("hidden");
      }
    }, 500);
  }, analyzeTime);
}

                     report.crisis_level === "warning" ? "🌧️ 情绪预警" : "✨ 安全";

  $("results").innerHTML = `
    <div class="card top-card">
      <img src="${state.filePath}">
      <div class="badges">
        <span class="crisis-badge ${report.crisis_level}">${crisisText}</span>
        <span class="time-badge">⚡ ${elapsed}s · TRAE 加速</span>
      </div>
      <div class="rules-tags">
        ${report.htp_rules_matched.map(r => `<span class="tag">${r}</span>`).join("")}
      </div>
    </div>

    <div class="card toxic-card">
      <div class="card-title">🎭 毒舌吐槽</div>
      <div class="card-content toxic-text">${report.toxic_review}</div>

// =================== 雷达图绘制 ===================
function drawRadar(metrics) {
  const canvas = $("radarCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const cx = 140, cy = 140, r = 100;
  const keys = Object.keys(metrics);
  const n = keys.length;

  ctx.clearRect(0, 0, 280, 280);

  // 背景五边形（3 层）
  for (let layer = 1; layer <= 3; layer++) {
    const lr = r * layer / 3;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const angle = -Math.PI / 2 + (Math.PI * 2 * i) / n;
      const x = cx + Math.cos(angle) * lr;
      const y = cy + Math.sin(angle) * lr;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = "#E5E7EB";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 数据多边形
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI / 2 + (Math.PI * 2 * i) / n;
    const value = metrics[keys[i]] / 100;
    const x = cx + Math.cos(angle) * r * value;
    const y = cy + Math.sin(angle) * r * value;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = "rgba(255, 107, 157, 0.25)";
  ctx.fill();
  ctx.strokeStyle = "#FF6B9D";
  ctx.lineWidth = 2;
  ctx.stroke();

  // 数据点
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI / 2 + (Math.PI * 2 * i) / n;
    const value = metrics[keys[i]] / 100;
    const x = cx + Math.cos(angle) * r * value;
    const y = cy + Math.sin(angle) * r * value;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#FF6B9D";
    ctx.fill();
  }

  // 标签
  ctx.fillStyle = "#374151";
  ctx.font = "12px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI / 2 + (Math.PI * 2 * i) / n;
    const lx = cx + Math.cos(angle) * (r + 22);
    const ly = cy + Math.sin(angle) * (r + 22);
    ctx.fillText(keys[i], lx, ly);
    ctx.fillStyle = "#FF6B9D";
    ctx.font = "bold 11px sans-serif";
    ctx.fillText(metrics[keys[i]], lx, ly + 14);
    ctx.fillStyle = "#374151";
    ctx.font = "12px sans-serif";
  }
}

// =================== 重置 ===================
function resetAll() {
  state.filePath = "";
  $("results").classList.add("hidden");
  $("analyzingBox").classList.add("hidden");
  previewImg.classList.add("hidden");
  uploadPlaceholder.classList.remove("hidden");
  uploadZone.classList.remove("has-img");
  fileInput.value = "";
  analyzeBtn.disabled = true;
  analyzeBtn.textContent = "请先上传图片";
  window.scrollTo({ top: 0, behavior: "smooth" });
}
