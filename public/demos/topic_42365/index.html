<!--
============================================================
                    网站跳转引导文件
 使用说明：
 1. 把代码中所有的 https://www.example.com 替换成你自己的网站地址
 2. 一共3处需要修改的地方，都有明显标注，全部改成同一个网址即可
 3. 修改完成后保存为 .html 后缀的文件（比如 进入网站.html）
 4. 用户双击这个文件，就会自动用默认浏览器打开你的网站
 5. 以后换网站，只需要改这3处地址，直接复用
============================================================
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转到网站...</title>

    <!-- ===================== 第1处 修改这里 ===================== -->
    <!-- 核心自动跳转配置：把 url= 后面的网址换成你的网站链接 -->
    <!-- content="0 表示0秒后立即跳转，数字越大等待时间越长 -->
    <meta http-equiv="refresh" content="0; url=https://www.example.com">
    <!-- ========================================================= -->

    <style>
        /* 页面整体样式，居中显示提示 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 全屏高度，垂直水平居中 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f7fa;
            font-family: "Microsoft Yahei", "微软雅黑", sans-serif;
            color: #333;
        }
        .jump-card {
            text-align: center;
            padding: 50px 70px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .title {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 18px;
        }
        .tip {
            font-size: 14px;
            color: #666666;
            margin-bottom: 24px;
        }
        .link {
            color: #409eff;
            text-decoration: none;
            font-size: 15px;
        }
        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="jump-card">
        <div class="title">正在为您跳转到网站...</div>
        <div class="tip">若浏览器没有自动跳转，请点击下方链接手动进入</div>

        <!-- ===================== 第2处 修改这里 ===================== -->
        <!-- 手动跳转链接：自动跳转失败时用户可以点击这里进入 -->
        <!-- 把 href="" 里的网址换成你的网站地址 -->
        <a href="https://cloudbase-2gaohnd031115efa-1309470654.tcloudbaseapp.com" class="link" target="_blank">点击这里手动进入网站</a>
        <!-- ========================================================= -->
    </div>

    <script>
        // ===================== 第3处 修改这里 =====================
        // JS备用跳转地址：作为补充，兼容部分特殊浏览器环境
        // 把引号里的网址换成你的网站地址
        var targetWebsite = "https://cloudbase-2gaohnd031115efa-1309470654.tcloudbaseapp.com";
        // =========================================================

        /*
         * 功能：页面加载后，延迟300毫秒再用JS跳转一次
         * 作用：作为meta跳转的双保险，确保所有浏览器都能正常跳转
         */
        window.onload = function () {
            setTimeout(function () {
                window.location.href = targetWebsite;
            }, 300);
        };
    </script>
</body>
</html>
