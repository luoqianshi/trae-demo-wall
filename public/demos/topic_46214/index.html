<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>宴策 Wedflow AI - 你的备婚搭子</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f9f4ec;--ink:#23211d;--surface:#fffdf8;--surface-soft:#f0ebe2;
  --muted:#746f66;--border:#ddd4c5;--accent:#b99b6b;--accent-dark:#8d7047;--accent-light:#d7b779;
  --success:#667a58;--success-bg:#eef3e8;--warning:#a9763f;--warning-bg:#f7eddf;
  --danger:#9b5148;--danger-bg:#f7e9e7;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:84px;background:linear-gradient(180deg,#fbf7ef 0%,#f3eadc 50%,#efe4d2 100%)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
button:disabled{opacity:.5;cursor:not-allowed}
input,textarea,select{font-family:inherit;font-size:inherit;border:none;outline:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}

/* ====== 底部导航 ====== */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;height:72px;background:rgba(255,253,248,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid #eadfce;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#a89d8d;transition:color .2s;font-size:10px;padding-top:8px}
.nav-item.active{color:var(--accent-dark)}
.nav-item svg{width:22px;height:22px}

/* ====== 通用组件 ====== */
.page{display:none;flex-direction:column;min-height:calc(100vh - 84px);animation:fadeIn .3s ease}
.page.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.px-5{padding-left:20px;padding-right:20px}
.py-5{padding-top:20px;padding-bottom:20px}
.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-5{margin-top:20px}.mt-6{margin-top:24px}
.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.rounded-2xl{border-radius:16px}.rounded-3xl{border-radius:24px}.rounded-full{border-radius:999px}

/* Header */
.page-header{padding:20px;padding-bottom:8px}
.page-header h1{font-size:28px;font-weight:700;color:var(--ink);letter-spacing:-.5px}
.page-header p{font-size:14px;color:#746c60;margin-top:4px}
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:#6f665b;margin-bottom:12px;padding:6px 12px;border:1px solid #e1d7c6;background:rgba(255,253,248,.8);border-radius:999px}

/* Card */
.card{background:rgba(255,253,248,.92);border:1px solid #eadfce;border-radius:24px;padding:16px;box-shadow:0 1px 3px rgba(51,40,26,.04)}
.card-dark{background:var(--ink);color:#fffdf8;border-radius:28px;padding:20px;box-shadow:0 18px 45px rgba(35,33,29,.18)}

/* Buttons */
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;height:48px;width:100%;background:var(--ink);color:#fffdf8;font-size:15px;font-weight:600;border-radius:22px;transition:transform .1s}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:#c5baa9}
.btn-gold{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:999px;font-size:14px;font-weight:600}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid #eadfce;background:rgba(255,253,248,.9);border-radius:999px;font-size:13px;color:#6f665b}

/* Progress bar */
.progress-bar{height:8px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent-light);border-radius:999px;transition:width .6s ease}

/* Task card */
.task-card{background:rgba(255,253,248,.92);border:1px solid #eadfce;border-radius:24px;padding:16px;box-shadow:0 1px 3px rgba(51,40,26,.04);transition:all .2s}
.task-card.done{opacity:.6}
.task-check{width:24px;height:24px;border-radius:50%;border:2px solid #d4c7b3;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:rgba(255,255,255,.8)}
.task-check.checked{background:var(--success);border-color:var(--success);color:#fff}
.task-priority{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600}
.task-priority.must{background:var(--danger);color:#fff}
.task-priority.optional{background:#f4eadb;color:#8d7047}
.task-priority.review{background:var(--success-bg);color:var(--success)}
.talk-track{background:#fff7e8;border-radius:16px;padding:12px;margin-top:10px;font-size:13px;color:#5c4a2e;line-height:1.6}
.talk-track-label{font-size:11px;font-weight:600;color:#b99b6b;margin-bottom:4px;display:flex;align-items:center;gap:4px}

/* Tabs */
.tabs{display:flex;background:rgba(255,253,248,.8);border-radius:999px;padding:4px;margin-bottom:16px;gap:4px}
.tab{flex:1;text-align:center;padding:8px 0;border-radius:999px;font-size:13px;color:#8a8073;transition:all .2s;font-weight:500}
.tab.active{background:var(--ink);color:#fffdf8;font-weight:600}

/* Day list item */
.day-item{display:flex;align-items:center;gap:12px;border:1px solid #eadfce;background:rgba(255,253,248,.82);border-radius:20px;padding:12px;transition:all .2s}
.day-item.today{border-color:var(--accent);background:#fff7e8;box-shadow:0 4px 14px rgba(185,155,107,.15)}
.day-item.rest{background:rgba(250,246,239,.6)}
.day-badge{width:40px;height:40px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700}
.day-badge.today{background:var(--accent);color:#fff}
.day-badge.rest{background:#e7dcc9;color:#8a8073}
.day-badge.past{background:#d8cebf;color:#8a8073}
.day-badge.future{background:var(--ink);color:#fffdf8}
.day-badge span.sub{font-size:8px;font-weight:400;margin-top:1px}

/* Inputs */
.input-field{width:100%;height:44px;border:1px solid #e1d7c6;background:#fffaf2;border-radius:16px;padding:0 16px;font-size:14px;transition:border-color .2s}
.input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(185,155,107,.15)}
textarea.input-field{height:auto;padding:12px 16px;resize:vertical;min-height:80px}

/* Chips */
.chip{display:inline-flex;align-items:center;padding:6px 14px;border:1px solid #eadfce;background:#fffaf2;border-radius:999px;font-size:13px;color:#6f665b;transition:all .15s;cursor:pointer;user-select:none}
.chip:active{transform:scale(.95)}
.chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}

/* Option card */
.option-card{position:relative;width:100%;border:2px solid #e7dcc9;background:rgba(255,253,248,.86);border-radius:24px;padding:16px;text-align:left;transition:all .15s}
.option-card:active{transform:scale(.98)}
.option-card.selected{border-color:var(--accent);box-shadow:0 8px 24px rgba(185,155,107,.2)}
.option-tag{position:absolute;right:12px;top:12px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600}

/* AI Chat */
.chat-bubble-user{background:var(--ink);color:#fffdf8;border-radius:20px 20px 4px 20px;padding:10px 14px;font-size:13px;max-width:80%;align-self:flex-end;line-height:1.5}
.chat-bubble-ai{background:#fff7e8;border-radius:20px 20px 20px 4px;padding:12px 14px;font-size:13px;max-width:85%;line-height:1.6;color:#5c4a2e}
.chat-expert-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#f4eadb;border-radius:999px;font-size:11px;color:#8d7047;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chat-expert-pill.active{background:var(--accent);color:#fff}

/* Budget AI result */
.budget-category{border-radius:16px;padding:12px;margin-bottom:8px}
.budget-bar{height:6px;background:#f0ebe2;border-radius:999px;margin-top:6px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:999px}
.budget-bar-fill.must{background:var(--success)}
.budget-bar-fill.can-talk{background:var(--accent)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fffdf8;padding:10px 20px;border-radius:999px;font-size:13px;z-index:200;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}

/* Loading dots */
.loading-dots{display:inline-flex;gap:4px}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1s infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}

/* Onboarding stepper */
.stepper{display:flex;align-items:center;gap:4px;padding:12px 20px 0}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid #e1d7c6;background:#fffdf8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#c5baa9;flex-shrink:0;transition:all .3s}
.step-dot.done{background:var(--success);border-color:var(--success);color:#fff}
.step-dot.current{background:var(--accent);border-color:var(--accent);color:#fff}
.step-line{flex:1;height:3px;background:#eadfce;border-radius:2px}
.step-line.done{background:var(--success)}

/* Celebration */
.celebrate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 20px;animation:pop .5s ease}
.celebrate-emoji{font-size:80px;animation:bounce 1s ease infinite}

/* Scrollbar */
::-webkit-scrollbar{width:0;height:0}

/* Utility */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.text-center{text-align:center}.text-xs{font-size:11px}.text-sm{font-size:13px}.text-lg{font-size:18px}.text-xl{font-size:20px}
.font-semibold{font-weight:600}.font-bold{font-weight:700}
.text-gold{color:var(--accent-dark)}.text-muted{color:#8a8073}.text-success{color:var(--success)}.text-danger{color:var(--danger)}
.w-full{width:100%}.flex-1{flex:1;min-width:0}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>

      </div>
    </div>

}

function nextStep() { if (state.onboardingStep < 5) { state.onboardingStep++; render(); } }
function prevStep() { if (state.onboardingStep > 1) { state.onboardingStep--; render(); } }
function goToStep(s) { state.onboardingStep = s; render(); }
function updateForm(key, val) { state.form[key] = val; render(); }
function skipDate() { state.form.dateSkipped = true; state.form.weddingDate = ""; render(); }
function pickDate() { state.form.dateSkipped = false; render(); }
function useDefaultDate() {
  const d = new Date(); d.setMonth(d.getMonth()+3);
  state.form.weddingDate = d.toISOString().split("T")[0];
  state.form.dateSkipped = false; render();
}
function adjustGuests(delta) {
  const cur = Number(state.form.guestCount)||0;
  state.form.guestCount = String(Math.max(10, cur+delta));
  render();
}
function selectBudget(id) { state.form.selectedBudget = id; state.form.customBudget = ""; render(); }

  // Hidden dev click counter (just for fun)
}

  state.form.generating = true;

}

function toggleTask(id) {
  if (state.completedTasks.has(id)) state.completedTasks.delete(id);
  else state.completedTasks.add(id);
  render();
}

function renderTasksTab(plan) {

    {name:"🎯 仪式执行",days:"71-90天",filter:d=>d.dayIndex>70}
  ];
  return stages.map(stage => {
    const days = plan.days.filter(d => !d.isRestDay && stage.filter(d));
    const tasks = days.flatMap(d => d.tasks);
    if (!tasks.length) return '';
    const done = tasks.filter(t => state.completedTasks.has(t.id)).length;
    return `
      <div style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

        <div style="display:flex;flex-direction:column;gap:8px">
          ${tasks.slice(0,5).map(t => {
            const d = plan.completedTaskIds?.includes(t.id);
            const isDone = state.completedTasks.has(t.id);
            return `
              <button onclick="toggleTask('${t.id}')" style="display:flex;align-items:center;gap:10px;width:100%;background:rgba(255,253,248,.8);border:1px solid #eadfce;border-radius:16px;padding:12px;text-align:left;transition:all .15s">

              </button>

  }).join("");
}

      </div>

function sendChat(text) {
  const msg = text || state.chatInput;
  if (!msg.trim()) return;
  state.chatMessages.push({type:"user",text:msg});
  state.chatInput = "";
  render();
  setTimeout(() => {
    const response = AI_RESPONSES.chat[msg] || AI_RESPONSES.chat.default;
    state.chatMessages.push({type:"ai",text:response});
    render();
    const el = document.getElementById("chat-messages");
    if (el) el.scrollTop = el.scrollHeight;
  }, 800 + Math.random()*600);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById("app");
  let html = "";
  switch(state.currentPage) {
    case "landing": html = renderLanding(); break;
    case "onboarding": html = renderOnboarding(); break;
    case "flow": html = renderFlow(); break;
    case "day": html = renderDayDetail(); break;
    case "checklist": html = renderChecklist(); break;
    case "tools": html = renderTools(); break;
    default: html = renderLanding();
  }

  if (!["landing","onboarding"].includes(state.currentPage)) {
    html += renderBottomNav();
  }

  app.innerHTML = html;
  if (state.chatOpen) {
    const el = document.getElementById("chat-messages");
    if (el) el.scrollTop = el.scrollHeight;
  }
}

function renderBottomNav() {
  const page = state.currentPage;
  const items = [
    {id:"flow",label:"首页",icon:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'},
    {id:"checklist",label:"备婚",icon:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>'},
    {id:"tools",label:"工具",icon:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'}
  ];
  return `
    <nav class="nav">
      ${items.map(item => `
        <button onclick="navigate('${item.id}')" class="nav-item ${page===item.id||(item.id==='flow'&&page==='day')?'active':''}">
          ${item.icon}
          <span>${item.label}</span>
        </button>
      `).join("")}
    </nav>
  `;
}

document.addEventListener("DOMContentLoaded", () => {
  if (window.location.protocol === "file:") window.__DEMO_MODE__ = true;

if (document.readyState !== "loading") render();
