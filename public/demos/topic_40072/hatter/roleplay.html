<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>角色铸造</title>
    <link rel="icon" href="hatter.png">
    <link rel="apple-touch-icon" href="hatter.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e12;
            --surface: #18181f;
            --surface-raised: #1f1f28;
            --border: rgba(255,255,255,0.06);
            --border-accent: rgba(212,175,105,0.25);
            --text: #f0ece4;
            --text-dim: #8a8478;
            --text-muted: #55504a;
            --gold: #d4af69;
            --gold-dim: rgba(212,175,105,0.15);
            --gold-glow: rgba(212,175,105,0.3);
            --gold-grad: linear-gradient(135deg, #d4af69 0%, #f0d48a 45%, #d4af69 100%);
            --danger: #e74c3c;
            --success: #2ecc71;
            --card-shadow: 0 8px 32px rgba(0,0,0,0.5);
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Outfit', system-ui, sans-serif;
        }
        [data-theme="light"] {
            --bg: #f4f0e8;
            --surface: #ffffff;
            --surface-raised: #faf8f4;
            --border: rgba(0,0,0,0.08);
            --border-accent: rgba(160,130,60,0.25);
            --text: #1c1810;
            --text-dim: #7a7264;
            --text-muted: #b0a898;
            --gold: #a88530;
            --gold-dim: rgba(168,133,48,0.1);
            --gold-glow: rgba(168,133,48,0.2);
            --gold-grad: linear-gradient(135deg, #a88530 0%, #c9a84c 45%, #a88530 100%);
            --card-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:var(--font-body);background:var(--bg);color:var(--text);
            height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;
            display:flex;flex-direction:column;
        }
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:2px}

        @keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes dangerPulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.25)}50%{box-shadow:0 0 24px 4px rgba(231,76,60,.45)}}

        .topbar{
            display:flex;align-items:center;justify-content:space-between;
            padding:0.6rem 1rem;flex-shrink:0;
            background:var(--surface);border-bottom:1px solid var(--border);
        }
        .topbar-left{display:flex;align-items:center;gap:0.5rem}
        .topbar-btn{
            width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
            background:transparent;color:var(--text-dim);cursor:pointer;
            display:flex;align-items:center;justify-content:center;transition:all .2s;
        }
        .topbar-btn:hover{background:var(--gold-dim);color:var(--gold);border-color:var(--border-accent)}
        .topbar-btn:active{transform:scale(.9)}
        .topbar-title{
            font-family:var(--font-display);font-size:1.05rem;font-weight:700;
            color:var(--gold);letter-spacing:.03em;
        }
        .topbar-btn .icon-sun{display:none}
        [data-theme="light"] .topbar-btn .icon-moon{display:none}
        [data-theme="light"] .topbar-btn .icon-sun{display:block}

        .stage{
            flex:1;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            position:relative;padding:1rem;
        }

        .deck{
            position:relative;width:280px;height:380px;
            perspective:1200px;
        }

        .card{
            position:absolute;left:0;right:0;height:380px;
            border-radius:18px;background:var(--surface-raised);
            border:1px solid var(--border-accent);
            box-shadow:var(--card-shadow);
            overflow:hidden;cursor:grab;
            transition:transform .55s cubic-bezier(.16,1,.3,1),
                        opacity .55s cubic-bezier(.16,1,.3,1),
                        box-shadow .3s;
            will-change:transform,opacity;
            display:flex;flex-direction:column;
            backface-visibility:hidden;
        }
        .card:active{cursor:grabbing}
        .card.dismissed-left{
            transform:translateX(-130%) rotate(-18deg) !important;
            opacity:0 !important;
            transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .4s ease !important;
            pointer-events:none !important;
        }
        .card.dismissed-right{
            transform:translateX(130%) rotate(18deg) !important;
            opacity:0 !important;
            transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .4s ease !important;
            pointer-events:none !important;
        }

        .card-top{
            position:relative;padding:1.6rem 1.4rem 1rem;
            display:flex;flex-direction:column;align-items:center;text-align:center;
        }
        .card-top::after{
            content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;
            background:linear-gradient(90deg,transparent,var(--gold-glow),transparent);
        }
        .card-name{
            font-family:var(--font-display);font-size:1.8rem;font-weight:900;
            color:var(--text);letter-spacing:.02em;line-height:1.2;
        }
        .card-tags{
            display:flex;flex-wrap:wrap;gap:0.3rem;justify-content:center;margin-top:0.5rem;
        }
        .card-tag{
            padding:0.15rem 0.55rem;border-radius:10px;font-size:0.62rem;font-weight:500;
            background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,175,105,0.12);
            letter-spacing:.02em;
        }
        .card-content{
            flex:1;padding:1rem 1.4rem;display:flex;flex-direction:column;
            align-items:center;text-align:center;gap:0.4rem;overflow:hidden;
        }
        .card-personality{
            font-size:0.78rem;color:var(--text-dim);line-height:1.6;
            max-width:220px;
        }
        .card-catchphrase{
            font-family:var(--font-display);font-style:italic;font-size:0.85rem;
            color:var(--gold);margin-top:auto;padding-top:0.6rem;
            border-top:1px solid var(--border);width:100%;
        }
        .card-bottom{
            padding:0.55rem 0.8rem;display:flex;gap:0.35rem;
            border-top:1px solid var(--border);
        }
        .card-btn{
            flex:1;padding:0.4rem 0;border-radius:8px;border:none;
            font-family:var(--font-body);font-size:0.68rem;font-weight:600;
            cursor:pointer;transition:all .15s;letter-spacing:.02em;
        }
        .card-btn:active{transform:scale(.96)}
        .card-btn-apply{background:var(--gold-grad);color:#1a1612;box-shadow:0 2px 8px var(--gold-glow)}
        .card-btn-apply:hover{opacity:.9}
        .card-btn-edit{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
        .card-btn-edit:hover{color:var(--gold);border-color:var(--border-accent)}
        .card-btn-del{
            background:transparent;color:var(--text-muted);border:1px solid var(--border);
            width:30px;flex:none;
        }
        .card-btn-del:hover{color:var(--danger);border-color:rgba(231,76,60,.2)}

        .card-add{
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            gap:0.8rem;cursor:pointer;
            border:1px dashed var(--border-accent);background:var(--surface);
        }
        .card-add:hover{border-color:var(--gold);background:var(--gold-dim)}
        .card-add:hover .add-icon{transform:scale(1.08)}
        .add-icon{
            width:56px;height:56px;border-radius:50%;
            border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;
            color:var(--gold);transition:all .3s;
        }
        .add-label{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text-dim)}
        .add-hint{font-size:0.68rem;color:var(--text-muted)}

        .nav{
            display:flex;align-items:center;gap:0.8rem;margin-top:1.2rem;
        }
        .nav-btn{
            width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
            background:var(--surface);color:var(--text-dim);cursor:pointer;
            display:flex;align-items:center;justify-content:center;transition:all .2s;
        }
        .nav-btn:hover{background:var(--gold-dim);color:var(--gold);border-color:var(--border-accent)}
        .nav-btn:active{transform:scale(.9)}
        .nav-btn:disabled{opacity:.25;cursor:not-allowed}
        .nav-indicator{font-size:0.68rem;color:var(--text-muted);font-weight:500;min-width:36px;text-align:center}

        .overlay{
            position:fixed;inset:0;z-index:100;
            background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
            display:none;align-items:flex-end;justify-content:center;
        }
        .overlay.active{display:flex}
        .sheet{
            width:100%;max-width:440px;max-height:88dvh;
            background:var(--surface);border-radius:18px 18px 0 0;
            padding:1.2rem 1rem 1rem;overflow-y:auto;
            animation:slideUp .35s cubic-bezier(.16,1,.3,1);
        }
        .sheet-handle{width:32px;height:3px;border-radius:2px;background:var(--text-muted);margin:0 auto .8rem;opacity:.4}
        .sheet-title{
            font-family:var(--font-display);font-size:1.1rem;font-weight:700;
            margin-bottom:.8rem;text-align:center;color:var(--gold);
        }
        .field{margin-bottom:.6rem}
        .field-label{
            display:block;font-size:.65rem;font-weight:600;color:var(--text-dim);
            margin-bottom:.2rem;letter-spacing:.03em;text-transform:uppercase;
        }
        .field-input{
            width:100%;padding:.45rem .65rem;border:1px solid var(--border);
            border-radius:8px;font-family:var(--font-body);font-size:.8rem;
            outline:none;background:transparent;color:var(--text);transition:border-color .2s;
        }
        .field-input:focus{border-color:var(--gold)}
        .field-input::placeholder{color:var(--text-muted)}
        textarea.field-input{resize:vertical;min-height:44px;line-height:1.5}

        .chips{display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.3rem}
        .chip{
            padding:.18rem .5rem;border-radius:12px;font-size:.64rem;font-weight:500;
            border:1px solid var(--border);background:transparent;color:var(--text-dim);
            cursor:pointer;transition:all .15s;font-family:var(--font-body);
        }
        .chip:hover{border-color:var(--gold);color:var(--gold)}
        .chip.on{background:var(--gold);color:#1a1612;border-color:var(--gold)}
        .chip-add-row{display:flex;gap:.25rem}
        .chip-add-input{
            flex:1;padding:.2rem .45rem;border:1px solid var(--border);
            border-radius:12px;font-family:var(--font-body);font-size:.64rem;
            outline:none;background:transparent;color:var(--text);
        }
        .chip-add-input:focus{border-color:var(--gold)}
        .chip-add-input::placeholder{color:var(--text-muted)}
        .chip-add-btn{
            padding:.2rem .45rem;border-radius:12px;border:1px solid var(--border-accent);
            background:var(--gold-dim);color:var(--gold);font-size:.64rem;font-weight:500;
            cursor:pointer;font-family:var(--font-body);
        }
        .chip-add-btn:hover{background:var(--gold);color:#1a1612}

        .ai-section{margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border)}
        .ai-head{font-size:.65rem;font-weight:600;color:var(--gold);margin-bottom:.3rem;display:flex;align-items:center;gap:.25rem}
        .ai-row{display:flex;gap:.35rem}
        .ai-textarea{
            flex:1;padding:.4rem .55rem;border:1px solid var(--border);
            border-radius:8px;font-family:var(--font-body);font-size:.75rem;
            outline:none;background:transparent;color:var(--text);
            resize:none;min-height:34px;max-height:56px;line-height:1.4;
        }
        .ai-textarea:focus{border-color:var(--gold)}
        .ai-textarea::placeholder{color:var(--text-muted)}
        .ai-btn{
            padding:0 .7rem;border-radius:8px;border:none;
            background:var(--gold-grad);color:#1a1612;font-family:var(--font-body);
            font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;
            display:flex;align-items:center;gap:.2rem;
        }
        .ai-btn:hover{opacity:.9}
        .ai-btn:active{transform:scale(.97)}
        .ai-btn:disabled{opacity:.35;cursor:not-allowed}
        .ai-btn svg{width:11px;height:11px}
        .ai-loading{display:none;align-items:center;gap:.35rem;padding:.4rem;margin-top:.35rem;border-radius:6px;background:var(--gold-dim)}
        .ai-loading.active{display:flex}
        .ai-dots{display:flex;gap:.15rem}
        .ai-dots span{width:4px;height:4px;border-radius:50%;background:var(--gold);animation:dotBounce 1.2s ease-in-out infinite}
        .ai-dots span:nth-child(2){animation-delay:.15s}
        .ai-dots span:nth-child(3){animation-delay:.3s}
        .ai-loading-text{font-size:.64rem;color:var(--gold);font-weight:500}

        .sheet-actions{display:flex;gap:.35rem;margin-top:.8rem}
        .sheet-btn{
            flex:1;padding:.5rem 0;border-radius:10px;border:none;
            font-family:var(--font-body);font-size:.78rem;font-weight:600;
            cursor:pointer;transition:all .15s;
        }
        .sheet-btn:active{transform:scale(.97)}
        .sheet-btn-save{background:var(--gold-grad);color:#1a1612;box-shadow:0 2px 8px var(--gold-glow)}
        .sheet-btn-cancel{background:transparent;color:var(--text-dim);border:1px solid var(--border)}

        .toast{
            position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(14px);
            background:var(--surface-raised);border:1px solid var(--border-accent);border-radius:16px;
            padding:.4rem .9rem;font-size:.7rem;font-weight:500;color:var(--gold);
            box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:999;opacity:0;
            transition:all .25s cubic-bezier(.16,1,.3,1);pointer-events:none;
        }
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        .confirm-overlay{
            position:fixed;inset:0;z-index:200;
            background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
            display:none;align-items:center;justify-content:center;padding:1rem;
        }
        .confirm-overlay.active{display:flex}
        .confirm-box{
            background:var(--surface);border:1.5px solid rgba(231,76,60,.35);border-radius:16px;
            padding:1.5rem;max-width:340px;width:100%;text-align:center;
            animation:cardIn .3s cubic-bezier(.16,1,.3,1);
            box-shadow:0 0 40px rgba(231,76,60,.12);
        }
        .confirm-box.step2{
            border-color:rgba(231,76,60,.55);
            box-shadow:0 0 60px rgba(231,76,60,.2);
            animation:dangerPulse 2s ease-in-out infinite;
        }
        .confirm-box.step3{
            border-color:rgba(231,76,60,.75);
            box-shadow:0 0 80px rgba(231,76,60,.3);
            animation:dangerPulse 1.2s ease-in-out infinite;
        }
        .confirm-icon{
            width:56px;height:56px;border-radius:50%;margin:0 auto .8rem;
            background:rgba(231,76,60,.15);color:var(--danger);
            display:flex;align-items:center;justify-content:center;
            border:2px solid rgba(231,76,60,.25);
        }
        .confirm-box.step2 .confirm-icon{
            background:rgba(231,76,60,.2);border-color:rgba(231,76,60,.4);
        }
        .confirm-box.step3 .confirm-icon{
            background:rgba(231,76,60,.28);border-color:rgba(231,76,60,.55);
        }
        .confirm-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--danger);margin-bottom:.5rem;letter-spacing:.02em}
        .confirm-msg{font-size:.73rem;color:var(--text-dim);line-height:1.7;margin-bottom:1rem}
        .confirm-msg strong{color:var(--danger);font-weight:600}
        .confirm-actions{display:flex;gap:.4rem}
        .confirm-btn{
            flex:1;padding:.5rem 0;border-radius:10px;border:none;
            font-family:var(--font-body);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;
        }
        .confirm-btn:active{transform:scale(.97)}
        .confirm-btn-cancel{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
        .confirm-btn-proceed{background:rgba(231,76,60,.12);color:var(--danger);border:1px solid rgba(231,76,60,.2)}
        .confirm-btn-proceed:hover{background:var(--danger);color:#fff}
        .confirm-btn-proceed:disabled{opacity:.4;cursor:not-allowed}
        .confirm-btn-proceed:disabled:hover{background:rgba(231,76,60,.12);color:var(--danger)}
        .confirm-step2 .confirm-btn-proceed{background:rgba(231,76,60,.2);border-color:rgba(231,76,60,.35)}
        .confirm-step2 .confirm-btn-proceed:hover{background:var(--danger);color:#fff}
        .confirm-step3 .confirm-btn-proceed{background:rgba(231,76,60,.3);border-color:rgba(231,76,60,.5)}
        .confirm-step3 .confirm-btn-proceed:hover{background:var(--danger);color:#fff}

        @media(max-width:400px){.deck{width:250px;height:340px}.card{height:340px}}
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <button class="topbar-btn" onclick="window.location.href='index.html'" title="返回">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            </button>
            <span class="topbar-title">角色铸造</span>
        </div>
        <button class="topbar-btn" id="btnTheme" title="切换主题">
            <svg class="icon-moon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
    </header>

    <div class="stage">
        <div class="deck" id="deck"></div>
        <div class="nav">
            <button class="nav-btn" id="btnPrev" title="上一个">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span class="nav-indicator" id="indicator">0/0</span>
            <button class="nav-btn" id="btnNext" title="下一个">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="sheet" id="sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-title" id="sheetTitle">新建角色</div>
            <div class="ai-section" style="margin-top:0;padding-top:0;border-top:none;margin-bottom:.6rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)">
                <div class="ai-head">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    AI 铸造
                </div>
                <div class="ai-row">
                    <textarea class="ai-textarea" id="aiDesc" rows="1" placeholder="描述角色，如：傲娇的猫耳少女…"></textarea>
                    <button class="ai-btn" id="btnAi">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                        铸造
                    </button>
                </div>
                <div class="ai-loading" id="aiLoading">
                    <div class="ai-dots"><span></span><span></span><span></span></div>
                    <span class="ai-loading-text">构思中…</span>
                </div>
            </div>
            <div class="field">
                <label class="field-label" for="fName">名称</label>
                <input type="text" class="field-input" id="fName" placeholder="给角色起个名字" maxlength="30">
            </div>
            <div class="field">
                <label class="field-label" for="fPersonality">性格</label>
                <textarea class="field-input" id="fPersonality" rows="2" placeholder="温柔体贴、内心坚韧…"></textarea>
            </div>
            <div class="field">
                <label class="field-label">风格</label>
                <div class="chips" id="fChips"></div>
                <div class="chip-add-row">
                    <input type="text" class="chip-add-input" id="fChipInput" placeholder="自定义…" maxlength="8">
                    <button class="chip-add-btn" id="btnChipAdd">+</button>
                </div>
            </div>
            <div class="field">
                <label class="field-label" for="fBackground">背景</label>
                <textarea class="field-input" id="fBackground" rows="2" placeholder="角色的经历…"></textarea>
            </div>
            <div class="field">
                <label class="field-label" for="fCatchphrase">口头禅</label>
                <input type="text" class="field-input" id="fCatchphrase" placeholder="常说的话" maxlength="50">
            </div>
            <div class="field">
                <label class="field-label" for="fExtra">备注</label>
                <textarea class="field-input" id="fExtra" rows="2" placeholder="特殊习惯、禁忌等"></textarea>
            </div>
            <div class="sheet-actions">
                <button class="sheet-btn sheet-btn-cancel" id="btnCancel">取消</button>
                <button class="sheet-btn sheet-btn-save" id="btnSheetSave">保存</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box" id="confirmBox">
            <div class="confirm-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div class="confirm-title" id="confirmTitle">内容安全警告</div>
            <div class="confirm-msg" id="confirmMsg"></div>
            <div class="confirm-actions" id="confirmActions">
                <button class="confirm-btn confirm-btn-cancel" id="confirmCancel">取消</button>
                <button class="confirm-btn confirm-btn-proceed" id="confirmProceed" disabled>我了解风险，继续 (10s)</button>
            </div>
        </div>
    </div>

    <script>
    (function(){
        'use strict';
        const RP_KEY='hatter_roleplay_roles';
        const RP_ACTIVE='hatter_roleplay_active';
        const DS_CACHE='hatter_ds_apikey';
        const DS_BASE='https://api.deepseek.com/v1';
        const THEME_KEY='hatter_theme';
        const STYLES=['温柔','冷酷','幽默','正式','活泼','沉稳','傲娇','毒舌'];
        const INCREMENT_Y=14;
        const INCREMENT_Z=12;
        const INCREMENT_ROT=3;
        const MAX_VISIBLE=5;

        let topIndex=0;
        let selStyles=[];
        let editId=null;
        let DS_KEY='';
        let isAnimating=false;

        const $=id=>document.getElementById(id);
        const el={
            deck:$('deck'),indicator:$('indicator'),
            btnPrev:$('btnPrev'),btnNext:$('btnNext'),
            overlay:$('overlay'),sheet:$('sheet'),sheetTitle:$('sheetTitle'),
            fName:$('fName'),fPersonality:$('fPersonality'),fChips:$('fChips'),
            fChipInput:$('fChipInput'),fBackground:$('fBackground'),
            fCatchphrase:$('fCatchphrase'),fExtra:$('fExtra'),
            aiDesc:$('aiDesc'),btnAi:$('btnAi'),aiLoading:$('aiLoading'),
            btnChipAdd:$('btnChipAdd'),btnCancel:$('btnCancel'),
            btnSheetSave:$('btnSheetSave'),btnTheme:$('btnTheme'),toast:$('toast'),
            confirmOverlay:$('confirmOverlay'),
        };

        const toast=m=>{el.toast.textContent=m;el.toast.classList.add('show');setTimeout(()=>el.toast.classList.remove('show'),2200)};

        let confirmTimer=null;
        const showConfirm=(step,desc,reason)=>{
            if(confirmTimer){clearInterval(confirmTimer);confirmTimer=null}
            const overlay=$('confirmOverlay');
            const box=$('confirmBox');
            const btnProceed=$('confirmProceed');
            const btnCancel=$('confirmCancel');
            const title=$('confirmTitle');
            const msg=$('confirmMsg');
            const actions=$('confirmActions');
            box.classList.remove('step2','step3');
            actions.classList.remove('confirm-step2','confirm-step3');
            if(step===1){
                title.textContent='内容安全警告';
                const reasonText=reason?`（${reason}）`:'';
                msg.innerHTML=`检测到输入内容可能包含敏感信息${reasonText}。<br><br>生成此类角色设定<strong>可能违反《网络安全法》《未成年人保护法》等法律法规</strong>，以及平台使用条款。违规内容将被记录，严重者<strong>可能面临账号封禁乃至法律责任</strong>。<br><br>是否仍要继续？`;
                btnProceed.textContent='我了解风险，继续 (10s)';
                btnProceed.disabled=true;
            }else if(step===2){
                box.classList.add('step2');
                actions.classList.add('confirm-step2');
                title.textContent='二次确认';
                msg.innerHTML=`<strong>请慎重确认：</strong>您正在尝试生成可能包含违规内容的角色设定。<br><br>继续操作意味着您<strong>自行承担全部法律风险</strong>，包括但不限于行政处罚、民事赔偿及刑事责任。平台对由此产生的任何后果<strong>不承担任何责任</strong>。<br><br><strong>此操作不可撤销，确认后将无法撤回。</strong>`;
                btnProceed.textContent='我确认，继续 (10s)';
                btnProceed.disabled=true;
            }else{
                box.classList.add('step3');
                actions.classList.add('confirm-step3');
                title.textContent='最终确认';
                msg.innerHTML=`<strong>这是最后一次确认机会。</strong><br><br>您已两次确认继续，一旦生成，<strong>所有违规内容将无法撤回</strong>，您需对生成内容承担全部责任。<br><br><strong>确认即代表您完全知悉并自愿承担一切法律后果。</strong>`;
                btnProceed.textContent='我完全知悉，继续 (10s)';
                btnProceed.disabled=true;
            }
            overlay.classList.add('active');
            let sec=10;
            const labels=['','我了解风险，继续','我确认，继续','我完全知悉，继续'];
            const label=labels[step];
            btnProceed.textContent=`${label} (${sec}s)`;
            confirmTimer=setInterval(()=>{
                sec--;
                if(sec<=0){
                    clearInterval(confirmTimer);confirmTimer=null;
                    btnProceed.disabled=false;
                    btnProceed.textContent=label;
                }else{
                    btnProceed.textContent=`${label} (${sec}s)`;
                }
            },1000);
            btnCancel.onclick=()=>{
                clearInterval(confirmTimer);confirmTimer=null;
                overlay.classList.remove('active');
            };
            btnProceed.onclick=()=>{
                if(btnProceed.disabled)return;
                clearInterval(confirmTimer);confirmTimer=null;
                if(step<3){
                    overlay.classList.remove('active');
                    setTimeout(()=>showConfirm(step+1,desc,reason),300);
                }else{
                    overlay.classList.remove('active');
                    doGenerate(desc);
                }
            };
        };

        const initTheme=()=>{
            const s=localStorage.getItem(THEME_KEY);
            if(s==='light')document.documentElement.setAttribute('data-theme','light');
            else document.documentElement.removeAttribute('data-theme');
        };
        const toggleTheme=()=>{
            const l=document.documentElement.getAttribute('data-theme')==='light';
            if(l){document.documentElement.removeAttribute('data-theme');localStorage.setItem(THEME_KEY,'dark')}
            else{document.documentElement.setAttribute('data-theme','light');localStorage.setItem(THEME_KEY,'light')}
        };
        initTheme();
        el.btnTheme.onclick=toggleTheme;

        const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        const loadRoles=()=>{try{return JSON.parse(localStorage.getItem(RP_KEY))||[]}catch(e){return[]}};
        const saveRoles=r=>localStorage.setItem(RP_KEY,JSON.stringify(r));

        const renderDeck=()=>{
            const roles=loadRoles();
            const items=[...roles.map((r,i)=>({type:'role',data:r,origIdx:i})),{type:'add'}];
            const total=items.length;
            if(topIndex>=total)topIndex=total-1;
            if(topIndex<0)topIndex=0;
            el.deck.innerHTML='';

            items.forEach((item,i)=>{
                const card=document.createElement('div');
                card.className='card';

                const dist=i-topIndex;
                const absDist=Math.abs(dist);

                if(absDist>MAX_VISIBLE){
                    card.style.opacity='0';
                    card.style.pointerEvents='none';
                    card.style.transform=`translateY(${dist*INCREMENT_Y}px) translateZ(${-absDist*INCREMENT_Z}px) rotate(${dist*INCREMENT_ROT}deg)`;
                    card.style.zIndex=0;
                }else{
                    const ty=dist*INCREMENT_Y;
                    const tz=-absDist*INCREMENT_Z;
                    const sc=1-absDist*0.03;
                    const op=absDist===0?1:Math.max(0.4,1-absDist*0.18);
                    const rot=dist*INCREMENT_ROT;
                    card.style.transform=`translateY(${ty}px) translateZ(${tz}px) scale(${Math.max(sc,0.88)}) rotate(${rot}deg)`;
                    card.style.opacity=op;
                    card.style.zIndex=total-absDist;
                    card.style.pointerEvents=dist===0?'auto':'none';

                    if(absDist>0){
                        const blur=absDist*1.5;
                        card.style.filter=`blur(${blur}px)`;
                    }
                }

                if(item.type==='add'){
                    card.classList.add('card-add');
                    card.innerHTML=`
                        <div class="add-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </div>
                        <div class="add-label">新建角色</div>
                        <div class="add-hint">点击添加</div>`;
                    card.onclick=()=>openSheet(null);
                }else{
                    const r=item.data;
                    const tagsHtml=(r.speakingStyle||[]).map(s=>`<span class="card-tag">${esc(s)}</span>`).join('');
                    const catchHtml=r.catchphrase?`<div class="card-catchphrase">\u201C${esc(r.catchphrase)}\u201D</div>`:'';
                    card.innerHTML=`
                        <div class="card-top">
                            <div class="card-name">${esc(r.name||'未命名')}</div>
                            <div class="card-tags">${tagsHtml}</div>
                        </div>
                        <div class="card-content">
                            <div class="card-personality">${esc(r.personality||'暂无描述')}</div>
                            ${catchHtml}
                        </div>
                        <div class="card-bottom">
                            <button class="card-btn card-btn-apply">应用</button>
                            <button class="card-btn card-btn-edit">编辑</button>
                            <button class="card-btn card-btn-del" title="删除">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>`;
                    card.querySelector('.card-btn-apply').onclick=e=>{e.stopPropagation();applyExisting(r)};
                    card.querySelector('.card-btn-edit').onclick=e=>{e.stopPropagation();openSheet(r)};
                    card.querySelector('.card-btn-del').onclick=e=>{e.stopPropagation();deleteRole(r.id)};
                }

                el.deck.appendChild(card);
            });

            el.indicator.textContent=`${topIndex+1}/${total}`;
            el.btnPrev.disabled=topIndex<=0;
            el.btnNext.disabled=topIndex>=total-1;
        };

        const navigate=dir=>{
            if(isAnimating)return;
            const total=loadRoles().length+1;
            const newIdx=topIndex+dir;
            if(newIdx<0||newIdx>=total)return;
            isAnimating=true;
            const cards=el.deck.querySelectorAll('.card');
            const cls=dir<0?'dismissed-right':'dismissed-left';
            if(cards[topIndex])cards[topIndex].classList.add(cls);
            setTimeout(()=>{topIndex=newIdx;renderDeck();isAnimating=false},380);
        };

        el.btnPrev.onclick=()=>navigate(-1);
        el.btnNext.onclick=()=>navigate(1);

        let tx0=0,ty0=0;
        el.deck.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY},{passive:true});
        el.deck.addEventListener('touchend',e=>{
            const dx=e.changedTouches[0].clientX-tx0;
            const dy=e.changedTouches[0].clientY-ty0;
            if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy))navigate(dx<0?1:-1);
        },{passive:true});

        const openSheet=role=>{
            editId=role?role.id:null;
            el.sheetTitle.textContent=role?'编辑角色':'新建角色';
            el.fName.value=role?(role.name||''):'';
            el.fPersonality.value=role?(role.personality||''):'';
            el.fBackground.value=role?(role.background||''):'';
            el.fCatchphrase.value=role?(role.catchphrase||''):'';
            el.fExtra.value=role?(role.extra||''):'';
            el.aiDesc.value='';
            selStyles=role?[...(role.speakingStyle||[])]:[];
            renderChips();
            el.overlay.classList.add('active');
        };
        const closeSheet=()=>{el.overlay.classList.remove('active');editId=null};

        const renderChips=()=>{
            el.fChips.innerHTML='';
            const all=[...new Set([...STYLES,...selStyles.filter(s=>!STYLES.includes(s))])];
            all.forEach(s=>{
                const c=document.createElement('button');
                c.className='chip'+(selStyles.includes(s)?' on':'');
                c.textContent=s;
                c.onclick=()=>{selStyles=selStyles.includes(s)?selStyles.filter(x=>x!==s):[...selStyles,s];renderChips()};
                el.fChips.appendChild(c);
            });
        };
        const addChip=()=>{
            const v=el.fChipInput.value.trim();
            if(!v)return;
            if(selStyles.includes(v)){toast('已存在');return}
            if(selStyles.length>=8){toast('最多8个');return}
            selStyles.push(v);el.fChipInput.value='';renderChips();
        };

        el.btnChipAdd.onclick=addChip;
        el.fChipInput.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();addChip()}};
        el.btnCancel.onclick=closeSheet;
        el.overlay.onclick=e=>{if(e.target===el.overlay)closeSheet()};

        el.btnSheetSave.onclick=()=>{
            if(!el.fName.value.trim()){toast('请输入名称');el.fName.focus();return}
            const d={
                id:editId||('rp_'+Date.now()),
                name:el.fName.value.trim(),
                personality:el.fPersonality.value.trim(),
                speakingStyle:[...selStyles],
                background:el.fBackground.value.trim(),
                catchphrase:el.fCatchphrase.value.trim(),
                extra:el.fExtra.value.trim(),
            };
            const roles=loadRoles();
            const idx=roles.findIndex(r=>r.id===d.id);
            if(idx>=0){d.createdAt=roles[idx].createdAt;roles[idx]=d}
            else{d.createdAt=Date.now();roles.unshift(d)}
            saveRoles(roles);topIndex=0;closeSheet();renderDeck();toast('已保存');
        };

        const applyExisting=role=>{
            localStorage.setItem(RP_ACTIVE,JSON.stringify(role));
            toast('已应用');setTimeout(()=>{window.location.href='index.html'},500);
        };
        const deleteRole=id=>{
            const roles=loadRoles().filter(r=>r.id!==id);
            saveRoles(roles);
            if(topIndex>roles.length)topIndex=roles.length;
            renderDeck();toast('已删除');
        };

        const loadApiKey=async()=>{
            let c=localStorage.getItem(DS_CACHE);
            if(c){DS_KEY=c;return}
            try{
                const r=await fetch('https://api.textdb.online/maoziaikey');
                if(r.ok){const t=await r.text();if(t&&t!=='null'){DS_KEY=t.trim();localStorage.setItem(DS_CACHE,DS_KEY)}}
            }catch(e){}
        };

        el.btnAi.onclick=async()=>{
            const desc=el.aiDesc.value.trim();
            if(!desc){toast('请描述角色');return}
            if(!DS_KEY){toast('AI未就绪');return}
            el.btnAi.disabled=true;
            el.aiLoading.classList.add('active');
            el.aiLoading.querySelector('.ai-loading-text').textContent='检测内容安全性…';

            try{
                const safeRes=await fetch(`${DS_BASE}/chat/completions`,{
                    method:'POST',
                    headers:{'Content-Type':'application/json','Authorization':`Bearer ${DS_KEY}`},
                    body:JSON.stringify({model:'deepseek-v4-flash',messages:[{role:'system',content:`你是专业的内容安全审核员，负责审核AI角色扮演提示词。请严格从以下维度逐一评估用户输入：

1. 色情与性暗示：包括但不限于露骨性描写、性暗示、擦边软色情、性化未成年人、恋童倾向
2. 暴力与血腥：包括但不限于残忍暴力、血腥描写、虐待、自残、鼓励暴力行为
3. 违法犯罪：包括但不限于教唆犯罪、传授违法方法、宣扬恐怖主义、毒品相关
4. 仇恨与歧视：包括但不限于种族歧视、性别歧视、宗教仇恨、侮辱特定群体
5. 欺诈与误导：包括但不限于伪装身份行骗、传播虚假信息、伪科学、健康误导
6. 心理操控：包括但不限于PUA话术、精神控制、情感操纵、诱导依赖
7. 隐私侵犯：包括但不限于索要真实个人信息、人肉搜索、跟踪骚扰
8. 危害未成年人：包括但不限于诱导未成年人不当行为、校园霸凌美化、未成年人不良引导
9. 其他违规：包括但不限于赌博、邪教、极端主义、违反公序良俗

请特别注意隐晦表达、暗语、谐音梗、表情符号代指等规避手段。仅输出JSON：{"safe":true} 或 {"safe":false,"reason":"简要说明违规类别和具体问题"}。无上下文，仅根据当前输入判断。`},{role:'user',content:desc}],temperature:0,stream:false})
                });
                if(!safeRes.ok){
                    el.aiLoading.classList.remove('active');
                    el.btnAi.disabled=false;
                    toast('安全检测失败，请重试');
                    return;
                }
                const sd=await safeRes.json();
                const st=sd.choices?.[0]?.message?.content?.trim()||'';
                const si=st.indexOf('{'),sj=st.lastIndexOf('}')+1;
                if(si>=0&&sj>si){
                    const sp=JSON.parse(st.substring(si,sj));
                    if(sp.safe===false){
                        el.aiLoading.classList.remove('active');
                        el.btnAi.disabled=false;
                        showConfirm(1,desc,sp.reason||'');
                        return;
                    }
                }
                doGenerate(desc);
            }catch(e){
                el.aiLoading.classList.remove('active');
                el.btnAi.disabled=false;
                toast('安全检测失败，请重试');
                return;
            }
        };

        const doGenerate=async(desc)=>{
            el.aiLoading.classList.add('active');
            el.aiLoading.querySelector('.ai-loading-text').textContent='构思中…';
            const sys=`你是角色设定生成器。根据用户描述生成完整角色设定，严格输出JSON：\n{"name":"角色名称","personality":"性格描述2-3句","speakingStyle":["标签1","标签2"],"background":"背景3-5句","catchphrase":"口头禅","extra":"额外设定"}\n只输出JSON。风格标签最多4个，每个2-4字。`;
            try{
                const r=await fetch(`${DS_BASE}/chat/completions`,{
                    method:'POST',
                    headers:{'Content-Type':'application/json','Authorization':`Bearer ${DS_KEY}`},
                    body:JSON.stringify({model:'deepseek-v4-flash',messages:[{role:'system',content:sys},{role:'user',content:desc}],temperature:0.8,stream:false})
                });
                if(!r.ok)throw new Error(`API ${r.status}`);
                const d=await r.json();
                const t=d.choices?.[0]?.message?.content?.trim()||'';
                const i=t.indexOf('{'),j=t.lastIndexOf('}')+1;
                if(i<0||j<=i)throw new Error('解析失败');
                const p=JSON.parse(t.substring(i,j));
                if(p.name)el.fName.value=p.name;
                if(p.personality)el.fPersonality.value=p.personality;
                if(p.background)el.fBackground.value=p.background;
                if(p.catchphrase)el.fCatchphrase.value=p.catchphrase;
                if(p.extra)el.fExtra.value=p.extra;
                if(Array.isArray(p.speakingStyle)){selStyles=p.speakingStyle.filter(s=>typeof s==='string'&&s.trim()).slice(0,8);renderChips()}
                el.aiDesc.value='';
                toast('角色已铸造');
            }catch(e){toast('失败：'+(e.message||'未知'))}
            finally{el.btnAi.disabled=false;el.aiLoading.classList.remove('active')}
        };

        document.addEventListener('keydown',e=>{
            if(el.overlay.classList.contains('active'))return;
            if(el.confirmOverlay.classList.contains('active'))return;
            if(e.key==='ArrowLeft')navigate(-1);
            if(e.key==='ArrowRight')navigate(1);
        });

        renderDeck();loadApiKey();
    })();
    </script>
</body>
</html>
