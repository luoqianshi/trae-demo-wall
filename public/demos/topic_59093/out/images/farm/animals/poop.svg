<svg xmlns="http://www.w3.org/2000/svg" width="32" height="24" viewBox="0 0 32 24">
  <!-- 像素风粪便贴图 - 星露谷风格 -->
  <defs>
    <!-- 粪便主体渐变 -->
    <linearGradient id="poopGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6B4423;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a3018;stop-opacity:1" />
    </linearGradient>

    <!-- 高光效果 -->
    <linearGradient id="poopHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84A;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#B8944A;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- 粪便形状（由3个椭圆组成） -->
  <g>
    <!-- 左边一团 -->
    <ellipse cx="10" cy="16" rx="6" ry="5" fill="url(#poopGradient)" stroke="#5A420D" stroke-width="1"/>
    <ellipse cx="8" cy="14" rx="2" ry="1.5" fill="url(#poopHighlight)"/>

    <!-- 中间一团（最大） -->
    <ellipse cx="16" cy="14" rx="7" ry="6" fill="url(#poopGradient)" stroke="#5A420D" stroke-width="1"/>
    <ellipse cx="13" cy="11" rx="2.5" ry="2" fill="url(#poopHighlight)"/>

    <!-- 右边一团 -->
    <ellipse cx="23" cy="16" rx="5.5" ry="4.5" fill="url(#poopGradient)" stroke="#5A420D" stroke-width="1"/>
    <ellipse cx="21" cy="14" rx="2" ry="1.5" fill="url(#poopHighlight)"/>

    <!-- 像素化边缘细节 -->
    <rect x="7" y="12" width="2" height="2" fill="#A07830" opacity="0.5"/>
    <rect x="13" y="9" width="2" height="2" fill="#A07830" opacity="0.5"/>
    <rect x="20" y="13" width="2" height="2" fill="#A07830" opacity="0.5"/>
  </g>
</svg>