<svg xmlns="http://www.w3.org/2000/svg" width="32" height="18" viewBox="0 0 32 18" shape-rendering="crispEdges">
  <!-- 鲤鱼 (Carp) - 星露谷物语风格 -->
  <defs>
    <linearGradient id="carpBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB74D"/>
      <stop offset="40%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
    <linearGradient id="carpBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE0B2"/>
      <stop offset="100%" style="stop-color:#FFF3E0"/>
    </linearGradient>
  </defs>

  <!-- 鱼尾（分叉） -->
  <polygon points="24,9 32,3 29,9 32,15" fill="#E65100" stroke="#BF360C" stroke-width="0.6"/>

  <!-- 鱼身主体 -->
  <ellipse cx="13" cy="9" rx="13" ry="5.5" fill="url(#carpBody)" stroke="#BF360C" stroke-width="0.8"/>

  <!-- 鱼腹 -->
  <ellipse cx="13" cy="11" rx="11" ry="3" fill="url(#carpBelly)" opacity="0.7"/>

  <!-- 背鳍（鲤鱼高背鳍特征） -->
  <polygon points="8,3.5 13,0 18,3.5" fill="#EF6C00" stroke="#BF360C" stroke-width="0.5"/>
  <path d="M8,3.5 L18,3.5" stroke="#BF360C" stroke-width="0.5"/>

  <!-- 腹鳍 -->
  <ellipse cx="10" cy="13.5" rx="2.5" ry="1.2" fill="#EF6C00" stroke="#BF360C" stroke-width="0.5"/>

  <!-- 胸鳍 -->
  <ellipse cx="7" cy="10" rx="2.2" ry="1.1" fill="#FB8C00" stroke="#BF360C" stroke-width="0.5"/>

  <!-- 眼睛 -->
  <circle cx="4" cy="7.5" r="2" fill="white" stroke="#BF360C" stroke-width="0.6"/>
  <circle cx="3.8" cy="7.5" r="1.1" fill="#BF360C"/>
  <circle cx="4.2" cy="7" r="0.35" fill="white"/>

  <!-- 鳃线 -->
  <path d="M7,6 Q7,9 7,12.5" stroke="#BF360C" stroke-width="0.7" fill="none" opacity="0.6"/>

  <!-- 鳞片纹理（鲤鱼大鳞片特征） -->
  <g fill="#BF360C" opacity="0.3">
    <rect x="9" y="7" width="1.5" height="1.5"/>
    <rect x="12" y="8" width="1.5" height="1.5"/>
    <rect x="15" y="7" width="1.5" height="1.5"/>
    <rect x="18" y="8" width="1.5" height="1.5"/>
    <rect x="10" y="10" width="1.5" height="1.5"/>
    <rect x="13" y="10" width="1.5" height="1.5"/>
    <rect x="16" y="9" width="1.5" height="1.5"/>
  </g>

  <!-- 侧线 -->
  <path d="M7,9 Q13,8.5 20,9" stroke="#BF360C" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- 高光 -->
  <ellipse cx="9" cy="5.5" rx="3.5" ry="1" fill="white" opacity="0.3"/>
</svg>