<svg xmlns="http://www.w3.org/2000/svg" width="32" height="24" viewBox="0 0 32 24">
  <!-- 像素风木栅栏贴图 - 星露谷风格 -->
  <!-- 栅栏横板 -->
  <rect x="2" y="4" width="28" height="6" fill="#8B5A2B" stroke="#5D3A1A" stroke-width="1"/>
  <rect x="2" y="14" width="28" height="6" fill="#A0724D" stroke="#5D3A1A" stroke-width="1"/>

  <!-- 栅栏竖柱 -->
  <rect x="4" y="2" width="3" height="20" fill="#9B6B3B" stroke="#5D3A1A" stroke-width="1"/>
  <rect x="15" y="2" width="3" height="20" fill="#9B6B3B" stroke="#5D3A1A" stroke-width="1"/>
  <rect x="26" y="2" width="3" height="20" fill="#9B6B3B" stroke="#5D3A1A" stroke-width="1"/>

  <!-- 木纹细节（像素点） -->
  <rect x="5" y="6" width="1" height="1" fill="#7B4B2B"/>
  <rect x="16" y="16" width="1" height="1" fill="#7B4B2B"/>
  <rect x="27" y="10" width="1" height="1" fill="#7B4B2B"/>

  <!-- 铆钉/金属装饰 -->
  <circle cx="5.5" cy="7" r="1" fill="#696969"/>
  <circle cx="5.5" cy="17" r="1" fill="#696969"/>
  <circle cx="16.5" cy="7" r="1" fill="#696969"/>
  <circle cx="16.5" cy="17" r="1" fill="#696969"/>
  <circle cx="27.5" cy="7" r="1" fill="#696969"/>
  <circle cx="27.5" cy="17" r="1" fill="#696969"/>
</svg>