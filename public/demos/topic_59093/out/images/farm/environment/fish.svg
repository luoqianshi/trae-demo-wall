<svg xmlns="http://www.w3.org/2000/svg" width="28" height="16" viewBox="0 0 28 16">
  <!-- 像素风鱼贴图 - 星露谷物语原版风格（大嘴鲈鱼） -->
  <defs>
    <!-- 鱼身渐变（星露谷绿色调） -->
    <linearGradient id="fishBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1" />
    </linearGradient>

    <!-- 鱼腹渐变（浅色腹部） -->
    <linearGradient id="fishBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 鱼尾（星露谷风格分叉尾） -->
  <polygon
    points="22,8 28,3 26,8 28,13"
    fill="#388E3C"
    stroke="#1B5E20"
    stroke-width="0.5"
  />

  <!-- 鱼身主体（椭圆型） -->
  <ellipse cx="11" cy="8" rx="12" ry="5" fill="url(#fishBody)" stroke="#1B5E20" stroke-width="0.8"/>

  <!-- 鱼腹（浅色下半部） -->
  <ellipse cx="11" cy="10" rx="10" ry="3" fill="url(#fishBelly)" opacity="0.6"/>

  <!-- 背鳍（星露谷风格尖鳍） -->
  <polygon points="8,3 11,0 14,3" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>

  <!-- 腹鳍 -->
  <ellipse cx="9" cy="12" rx="2.5" ry="1.2" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>

  <!-- 胸鳍 -->
  <ellipse cx="6" cy="9" rx="2" ry="1" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>

  <!-- 眼睛（星露谷风格大眼） -->
  <circle cx="3" cy="6.5" r="1.8" fill="white" stroke="#1B5E20" stroke-width="0.5"/>
  <circle cx="2.8" cy="6.5" r="1" fill="#1B5E20"/>
  <circle cx="3.2" cy="6" r="0.3" fill="white"/>

  <!-- 鳃线（星露谷风格特征） -->
  <path d="M6,5 Q6,8 6,11" stroke="#1B5E20" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- 鳞片纹理（像素点阵） -->
  <g fill="#1B5E20" opacity="0.2">
    <rect x="8" y="6" width="1" height="1"/>
    <rect x="11" y="7" width="1" height="1"/>
    <rect x="14" y="6" width="1" height="1"/>
    <rect x="9" y="9" width="1" height="1"/>
    <rect x="12" y="9" width="1" height="1"/>
    <rect x="15" y="8" width="1" height="1"/>
    <rect x="17" y="7" width="1" height="1"/>
  </g>

  <!-- 高光 -->
  <ellipse cx="8" cy="5" rx="3" ry="1" fill="white" opacity="0.25"/>
</svg>