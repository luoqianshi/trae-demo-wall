<svg xmlns="http://www.w3.org/2000/svg" width="20" height="24" viewBox="0 0 20 24">
  <!-- 像素风花朵贴图 - 星露谷风格（向日葵） -->
  <defs>
    <!-- 花瓣渐变 -->
    <radialGradient id="petalGradient">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8F00;stop-opacity:1" />
    </radialGradient>

    <!-- 花心渐变 -->
    <radialGradient id="centerGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#5D4037;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- 茎干 -->
  <rect x="9" y="14" width="2" height="8" fill="#558B2F" stroke="#33691E" stroke-width="0.5"/>
  <!-- 叶子 -->
  <ellipse cx="6" cy="18" rx="3" ry="2" fill="#689F38" transform="rotate(-30, 6, 18)"/>

  <!-- 花瓣（8片，像素风） -->
  <g fill="url(#petalGradient)" stroke="#FF6F00" stroke-width="0.5">
    <!-- 上 -->
    <ellipse cx="10" cy="4" rx="2.5" ry="4"/>
    <!-- 下 -->
    <ellipse cx="10" cy="12" rx="2.5" ry="4"/>
    <!-- 左 -->
    <ellipse cx="4" cy="8" rx="4" ry="2.5"/>
    <!-- 右 -->
    <ellipse cx="16" cy="8" rx="4" ry="2.5"/>
    <!-- 左上 -->
    <ellipse cx="5.5" cy="5" rx="2.5" ry="3" transform="rotate(-45, 5.5, 5)"/>
    <!-- 右上 -->
    <ellipse cx="14.5" cy="5" rx="2.5" ry="3" transform="rotate(45, 14.5, 5)"/>
    <!-- 左下 -->
    <ellipse cx="5.5" cy="11" rx="2.5" ry="3" transform="rotate(45, 5.5, 11)"/>
    <!-- 右下 -->
    <ellipse cx="14.5" cy="11" rx="2.5" ry="3" transform="rotate(-45, 14.5, 11)"/>
  </g>

  <!-- 花心 -->
  <circle cx="10" cy="8" r="4" fill="url(#centerGradient)" stroke="#3E2723" stroke-width="1"/>

  <!-- 花心纹理（种子点） -->
  <g fill="#212121" opacity="0.6">
    <circle cx="9" cy="7" r="0.5"/>
    <circle cx="11" cy="7.5" r="0.5"/>
    <circle cx="10" cy="9" r="0.5"/>
    <circle cx="8.5" cy="8.5" r="0.5"/>
    <circle cx="11.5" cy="8.5" r="0.5"/>
  </g>
</svg>