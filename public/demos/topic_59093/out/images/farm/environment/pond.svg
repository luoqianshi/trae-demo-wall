<svg xmlns="http://www.w3.org/2000/svg" width="280" height="150" viewBox="0 0 280 150" shape-rendering="crispEdges">
  <!-- 像素风长方形池塘 - 星露谷物语风格（2倍放大版） -->
  <defs>
    <!-- 水面渐变（星露谷蓝色调） -->
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2874A6;stop-opacity:1" />
    </linearGradient>

    <!-- 水波纹图案 -->
    <pattern id="waterRipple" x="0" y="0" width="32" height="16" patternUnits="userSpaceOnUse">
      <path d="M0,8 Q8,5 16,8 T32,8" stroke="#85C1E9" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M0,12 Q8,10 16,12 T32,12" stroke="#AED6F1" stroke-width="0.7" fill="none" opacity="0.3"/>
    </pattern>

    <!-- 岸边渐变（沙土色） -->
    <linearGradient id="shoreGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D2B48C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C4A06A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A6824A;stop-opacity:1" />
    </linearGradient>

    <!-- 草地渐变 -->
    <linearGradient id="grassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7CB342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558B2F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 外层草地边框（圆角矩形） -->
  <rect x="2" y="2" width="276" height="146" rx="6" ry="6" fill="url(#grassGradient)" stroke="#33691E" stroke-width="2"/>

  <!-- 沙土岸边层 -->
  <rect x="9" y="9" width="262" height="132" rx="4" ry="4" fill="url(#shoreGradient)" stroke="#8B6F47" stroke-width="1.5"/>

  <!-- 水面主体（长方形） -->
  <rect x="18" y="18" width="244" height="114" rx="2" ry="2" fill="url(#waterGradient)" stroke="#1A5276" stroke-width="2.5"/>

  <!-- 水波纹层 -->
  <rect x="20" y="20" width="240" height="110" rx="1" ry="1" fill="url(#waterRipple)"/>

  <!-- 水面高光反射 -->
  <ellipse cx="80" cy="36" rx="42" ry="7" fill="white" opacity="0.2"/>
  <ellipse cx="75" cy="34" rx="22" ry="4" fill="white" opacity="0.35"/>
  <ellipse cx="190" cy="44" rx="30" ry="5" fill="white" opacity="0.15"/>
  <ellipse cx="210" cy="42" rx="15" ry="3" fill="white" opacity="0.25"/>

  <!-- 岸边像素细节（小石子） -->
  <g fill="#8B6F47" opacity="0.6">
    <rect x="13" y="13" width="3" height="3"/>
    <rect x="264" y="13" width="3" height="3"/>
    <rect x="13" y="134" width="3" height="3"/>
    <rect x="264" y="134" width="3" height="3"/>
    <rect x="140" y="11" width="3" height="3"/>
    <rect x="140" y="136" width="3" height="3"/>
    <rect x="70" y="12" width="2" height="2"/>
    <rect x="210" y="12" width="2" height="2"/>
    <rect x="70" y="135" width="2" height="2"/>
    <rect x="210" y="135" width="2" height="2"/>
  </g>

  <!-- 草地像素细节（岸边小草） -->
  <g fill="#558B2F" opacity="0.7">
    <rect x="5" y="5" width="3" height="3"/>
    <rect x="272" y="5" width="3" height="3"/>
    <rect x="5" y="142" width="3" height="3"/>
    <rect x="272" y="142" width="3" height="3"/>
    <rect x="100" y="4" width="2" height="2"/>
    <rect x="180" y="4" width="2" height="2"/>
    <rect x="100" y="144" width="2" height="2"/>
    <rect x="180" y="144" width="2" height="2"/>
  </g>

  <!-- 水中倒影（深色阴影） -->
  <rect x="22" y="104" width="236" height="26" fill="#1A5276" opacity="0.12"/>

  <!-- 荷叶装饰（星露谷风格水中植物） -->
  <g opacity="0.75">
    <!-- 左侧荷叶群 -->
    <ellipse cx="50" cy="110" rx="9" ry="4.5" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.6"/>
    <ellipse cx="62" cy="108" rx="7" ry="3.5" fill="#388E3C" stroke="#1B5E20" stroke-width="0.6"/>
    <ellipse cx="42" cy="112" rx="5" ry="2.5" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>
    <!-- 荷叶上的小花 -->
    <rect x="48" y="107" width="2" height="2" fill="#E91E63" opacity="0.8"/>

    <!-- 右侧荷叶群 -->
    <ellipse cx="220" cy="52" rx="8" ry="4" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.6"/>
    <ellipse cx="232" cy="55" rx="6" ry="3" fill="#388E3C" stroke="#1B5E20" stroke-width="0.6"/>
    <ellipse cx="214" cy="54" rx="4" ry="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>
    <rect x="219" y="50" width="2" height="2" fill="#E91E63" opacity="0.8"/>

    <!-- 中部小荷叶 -->
    <ellipse cx="140" cy="118" rx="6" ry="3" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
    <ellipse cx="150" cy="120" rx="4" ry="2" fill="#388E3C" stroke="#1B5E20" stroke-width="0.5"/>
  </g>

  <!-- 水草装饰（像素风） -->
  <g opacity="0.55">
    <path d="M32,128 Q35,115 32,108 Q29,115 32,128" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
    <path d="M36,128 Q38,118 36,112 Q34,118 36,128" fill="#388E3C" stroke="#1B5E20" stroke-width="0.4"/>
    <path d="M244,128 Q247,116 244,110 Q241,116 244,128" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
    <path d="M248,128 Q250,119 248,114 Q246,119 248,128" fill="#388E3C" stroke="#1B5E20" stroke-width="0.4"/>
  </g>

  <!-- 水面气泡（像素风小圆点） -->
  <g fill="white" opacity="0.4">
    <rect x="100" y="70" width="2" height="2"/>
    <rect x="160" y="85" width="2" height="2"/>
    <rect x="200" y="100" width="2" height="2"/>
    <rect x="80" y="95" width="2" height="2"/>
  </g>

  <!-- 岸边木板/桥装饰（像素风） -->
  <g opacity="0.5">
    <rect x="120" y="14" width="40" height="4" fill="#8B6F47" stroke="#5D4037" stroke-width="0.5"/>
    <rect x="122" y="15" width="2" height="2" fill="#6D4C41"/>
    <rect x="135" y="15" width="2" height="2" fill="#6D4C41"/>
    <rect x="148" y="15" width="2" height="2" fill="#6D4C41"/>
  </g>
</svg>
