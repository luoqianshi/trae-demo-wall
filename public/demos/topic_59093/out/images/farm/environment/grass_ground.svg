<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- 像素风草皮贴图 - 星露谷风格 -->
  <defs>
    <pattern id="grassPattern" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <!-- 基础草色背景 -->
      <rect width="16" height="16" fill="#5d9a2d"/>

      <!-- 草地细节 - 像素点 -->
      <rect x="2" y="2" width="2" height="2" fill="#6aa832"/>
      <rect x="8" y="4" width="2" height="2" fill="#4a7c23"/>
      <rect x="12" y="1" width="2" height="2" fill="#72b43a"/>
      <rect x="4" y="9" width="2" height="2" fill="#528f28"/>
      <rect x="10" y="11" width="3" height="2" fill="#63a12e"/>
      <rect x="1" y="13" width="2" height="2" fill="#70b038"/>
      <rect x="14" y="8" width="1" height="2" fill="#58962b"/>

      <!-- 深色土壤斑点 -->
      <rect x="6" y="6" width="1" height="1" fill="#4a7520"/>
      <rect x="13" y="13" width="1" height="1" fill="#4a7520"/>
      <rect x="0" y="7" width="1" height="1" fill="#4a7520"/>

      <!-- 浅色高光 -->
      <rect x="3" y="0" width="1" height="1" fill="#7bc442"/>
      <rect x="11" y="6" width="1" height="1" fill="#7bc442"/>
    </pattern>
  </defs>

  <!-- 应用草皮图案 -->
  <rect width="64" height="64" fill="url(#grassPattern)"/>

  <!-- 额外的随机草丛（增加自然感） -->
  <g opacity="0.3">
    <rect x="20" y="15" width="3" height="3" fill="#72b43a"/>
    <rect x="45" y="30" width="2" height="2" fill="#528f28"/>
    <rect x="35" y="50" width="4" height="3" fill="#6aa832"/>
    <rect x="55" y="20" width="2" height="2" fill="#70b038"/>
  </g>
</svg>