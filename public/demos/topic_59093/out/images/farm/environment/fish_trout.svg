<svg xmlns="http://www.w3.org/2000/svg" width="32" height="18" viewBox="0 0 32 18" shape-rendering="crispEdges">
  <!-- 虹鳟鱼 (Rainbow Trout) - 星露谷物语风格 -->
  <defs>
    <linearGradient id="troutBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#90CAF9"/>
      <stop offset="30%" style="stop-color:#42A5F5"/>
      <stop offset="60%" style="stop-color:#7E57C2"/>
      <stop offset="100%" style="stop-color:#5E35B1"/>
    </linearGradient>
    <linearGradient id="troutBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E1F5FE"/>
      <stop offset="50%" style="stop-color:#FFCDD2"/>
      <stop offset="100%" style="stop-color:#F8BBD0"/>
    </linearGradient>
  </defs>

  <!-- 鱼尾（分叉） -->
  <polygon points="24,9 32,3 29,9 32,15" fill="#5E35B1" stroke="#311B92" stroke-width="0.6"/>

  <!-- 鱼身主体 -->
  <ellipse cx="13" cy="9" rx="13" ry="5.5" fill="url(#troutBody)" stroke="#311B92" stroke-width="0.8"/>

  <!-- 鱼腹（虹鳟鱼特征：粉红腹部） -->
  <ellipse cx="13" cy="11" rx="11" ry="3" fill="url(#troutBelly)" opacity="0.8"/>

  <!-- 背鳍 -->
  <polygon points="9,3.5 13,0 17,3.5" fill="#5E35B1" stroke="#311B92" stroke-width="0.5"/>
  <polygon points="15,3.5 18,1 20,3.5" fill="#5E35B1" stroke="#311B92" stroke-width="0.5"/>

  <!-- 腹鳍 -->
  <ellipse cx="10" cy="13.5" rx="2.5" ry="1.2" fill="#7E57C2" stroke="#311B92" stroke-width="0.5"/>

  <!-- 胸鳍 -->
  <ellipse cx="7" cy="10" rx="2.2" ry="1.1" fill="#5C6BC0" stroke="#311B92" stroke-width="0.5"/>

  <!-- 眼睛 -->
  <circle cx="4" cy="7.5" r="2" fill="white" stroke="#311B92" stroke-width="0.6"/>
  <circle cx="3.8" cy="7.5" r="1.1" fill="#311B92"/>
  <circle cx="4.2" cy="7" r="0.35" fill="white"/>

  <!-- 鳃线 -->
  <path d="M7,6 Q7,9 7,12.5" stroke="#311B92" stroke-width="0.7" fill="none" opacity="0.6"/>

  <!-- 鳞片纹理（虹鳟鱼细密鳞片） -->
  <g fill="#311B92" opacity="0.2">
    <rect x="9" y="7" width="0.8" height="0.8"/>
    <rect x="10.5" y="7.5" width="0.8" height="0.8"/>
    <rect x="12" y="7" width="0.8" height="0.8"/>
    <rect x="13.5" y="7.5" width="0.8" height="0.8"/>
    <rect x="15" y="7" width="0.8" height="0.8"/>
    <rect x="16.5" y="7.5" width="0.8" height="0.8"/>
    <rect x="18" y="7" width="0.8" height="0.8"/>
    <rect x="9.5" y="9.5" width="0.8" height="0.8"/>
    <rect x="11" y="10" width="0.8" height="0.8"/>
    <rect x="12.5" y="9.5" width="0.8" height="0.8"/>
    <rect x="14" y="10" width="0.8" height="0.8"/>
    <rect x="15.5" y="9.5" width="0.8" height="0.8"/>
    <rect x="17" y="10" width="0.8" height="0.8"/>
  </g>

  <!-- 虹鳟鱼特征：彩色斑点 -->
  <g opacity="0.5">
    <circle cx="11" cy="8.5" r="0.6" fill="#E91E63"/>
    <circle cx="14" cy="9" r="0.6" fill="#E91E63"/>
    <circle cx="17" cy="8.5" r="0.6" fill="#E91E63"/>
    <circle cx="12" cy="10.5" r="0.6" fill="#E91E63"/>
    <circle cx="15" cy="10.5" r="0.6" fill="#E91E63"/>
  </g>

  <!-- 侧线 -->
  <path d="M7,9 Q13,8.5 20,9" stroke="#311B92" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- 高光 -->
  <ellipse cx="9" cy="5.5" rx="3.5" ry="1" fill="white" opacity="0.35"/>
</svg>