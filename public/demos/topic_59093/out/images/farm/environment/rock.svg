<svg xmlns="http://www.w3.org/2000/svg" width="24" height="20" viewBox="0 0 24 20">
  <!-- 像素风石头贴图 - 星露谷风格 -->
  <defs>
    <!-- 石头渐变 -->
    <linearGradient id="rockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9E9E9E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#757575;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#616161;stop-opacity:1" />
    </linearGradient>

    <!-- 高光 -->
    <radialGradient id="rockHighlight" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#E0E0E0;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#BDBDBD;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- 石头主体（不规则多边形） -->
  <polygon
    points="4,16 2,12 3,8 6,5 10,3 15,4 19,7 21,11 20,16 16,18 10,18"
    fill="url(#rockGradient)"
    stroke="#424242"
    stroke-width="1.5"
  />

  <!-- 高光层 -->
  <ellipse cx="9" cy="8" rx="4" ry="3" fill="url(#rockHighlight)"/>

  <!-- 石头纹理（像素裂缝和斑点） -->
  <line x1="8" y1="10" x2="12" y2="14" stroke="#555" stroke-width="1"/>
  <line x1="13" y1="8" x2="16" y2="12" stroke="#555" stroke-width="0.8"/>

  <!-- 暗部阴影 -->
  <polygon
    points="15,14 17,16 19,15 18,13"
    fill="#424242"
    opacity="0.3"
  />

  <!-- 苔藓点缀（增加自然感） -->
  <circle cx="6" cy="15" r="1.5" fill="#689F38" opacity="0.6"/>
  <circle cx="18" cy="16" r="1" fill="#689F38" opacity="0.5"/>
</svg>