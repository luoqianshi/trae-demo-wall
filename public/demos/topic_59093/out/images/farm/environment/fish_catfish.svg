<svg xmlns="http://www.w3.org/2000/svg" width="32" height="18" viewBox="0 0 32 18" shape-rendering="crispEdges">
  <!-- 鲶鱼 (Catfish) - 星露谷物语风格 -->
  <defs>
    <linearGradient id="catfishBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5D4037"/>
      <stop offset="40%" style="stop-color:#4E342E"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
    <linearGradient id="catfishBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63"/>
      <stop offset="100%" style="stop-color:#BCAAA4"/>
    </linearGradient>
  </defs>

  <!-- 鱼尾（分叉，鲶鱼宽尾特征） -->
  <polygon points="23,9 32,2 28,9 32,16" fill="#3E2723" stroke="#1B0F0A" stroke-width="0.6"/>

  <!-- 鱼身主体（鲶鱼较宽） -->
  <ellipse cx="13" cy="9" rx="13" ry="6" fill="url(#catfishBody)" stroke="#1B0F0A" stroke-width="0.8"/>

  <!-- 鱼腹 -->
  <ellipse cx="13" cy="11.5" rx="11" ry="3" fill="url(#catfishBelly)" opacity="0.7"/>

  <!-- 背鳍（鲶鱼小背鳍） -->
  <polygon points="11,3 13,1 15,3" fill="#4E342E" stroke="#1B0F0A" stroke-width="0.5"/>

  <!-- 腹鳍 -->
  <ellipse cx="10" cy="14" rx="2.5" ry="1.2" fill="#4E342E" stroke="#1B0F0A" stroke-width="0.5"/>

  <!-- 胸鳍（鲶鱼大胸鳍特征） -->
  <ellipse cx="6.5" cy="10.5" rx="2.8" ry="1.4" fill="#5D4037" stroke="#1B0F0A" stroke-width="0.5"/>

  <!-- 鲶鱼特征：触须（胡须） -->
  <path d="M3,9 Q1,11 0.5,13" stroke="#1B0F0A" stroke-width="0.8" fill="none"/>
  <path d="M3,9.5 Q1.5,12 1,14" stroke="#1B0F0A" stroke-width="0.6" fill="none"/>
  <path d="M5,10 Q3.5,12.5 3,14.5" stroke="#1B0F0A" stroke-width="0.6" fill="none"/>

  <!-- 眼睛（鲶鱼小眼特征） -->
  <circle cx="4.5" cy="7" r="1.5" fill="white" stroke="#1B0F0A" stroke-width="0.5"/>
  <circle cx="4.3" cy="7" r="0.9" fill="#1B0F0A"/>
  <circle cx="4.6" cy="6.7" r="0.3" fill="white"/>

  <!-- 鳃线 -->
  <path d="M7,5.5 Q7,9 7,13" stroke="#1B0F0A" stroke-width="0.7" fill="none" opacity="0.6"/>

  <!-- 鳞片纹理（鲶鱼无鳞，皮肤纹理） -->
  <g fill="#1B0F0A" opacity="0.15">
    <rect x="9" y="7" width="2" height="0.5"/>
    <rect x="12" y="8" width="2" height="0.5"/>
    <rect x="15" y="7" width="2" height="0.5"/>
    <rect x="18" y="8" width="2" height="0.5"/>
    <rect x="10" y="10" width="2" height="0.5"/>
    <rect x="13" y="10" width="2" height="0.5"/>
    <rect x="16" y="9" width="2" height="0.5"/>
  </g>

  <!-- 侧线 -->
  <path d="M7,9 Q13,8.5 20,9" stroke="#1B0F0A" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- 高光 -->
  <ellipse cx="9" cy="5.5" rx="3.5" ry="1" fill="white" opacity="0.2"/>
</svg>