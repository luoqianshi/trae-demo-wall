<svg xmlns="http://www.w3.org/2000/svg" width="32" height="18" viewBox="0 0 32 18" shape-rendering="crispEdges">
  <!-- 大嘴鲈鱼 (Largemouth Bass) - 星露谷物语风格 -->
  <defs>
    <linearGradient id="bassBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7CB342"/>
      <stop offset="40%" style="stop-color:#558B2F"/>
      <stop offset="100%" style="stop-color:#33691E"/>
    </linearGradient>
    <linearGradient id="bassBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#AED581"/>
      <stop offset="100%" style="stop-color:#DCEDC8"/>
    </linearGradient>
  </defs>

  <!-- 鱼尾（分叉） -->
  <polygon points="24,9 32,3 29,9 32,15" fill="#33691E" stroke="#1B5E20" stroke-width="0.6"/>

  <!-- 鱼身主体 -->
  <ellipse cx="13" cy="9" rx="13" ry="5.5" fill="url(#bassBody)" stroke="#1B5E20" stroke-width="0.8"/>

  <!-- 鱼腹 -->
  <ellipse cx="13" cy="11" rx="11" ry="3" fill="url(#bassBelly)" opacity="0.7"/>

  <!-- 背鳍 -->
  <polygon points="9,3.5 13,0 17,3.5" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
  <polygon points="15,3.5 18,1 20,3.5" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>

  <!-- 腹鳍 -->
  <ellipse cx="10" cy="13.5" rx="2.5" ry="1.2" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>

  <!-- 胸鳍 -->
  <ellipse cx="7" cy="10" rx="2.2" ry="1.1" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>

  <!-- 眼睛 -->
  <circle cx="4" cy="7.5" r="2" fill="white" stroke="#1B5E20" stroke-width="0.6"/>
  <circle cx="3.8" cy="7.5" r="1.1" fill="#1B5E20"/>
  <circle cx="4.2" cy="7" r="0.35" fill="white"/>

  <!-- 鳃线 -->
  <path d="M7,6 Q7,9 7,12.5" stroke="#1B5E20" stroke-width="0.7" fill="none" opacity="0.6"/>

  <!-- 鳞片纹理 -->
  <g fill="#1B5E20" opacity="0.25">
    <rect x="9" y="7" width="1" height="1"/>
    <rect x="12" y="8" width="1" height="1"/>
    <rect x="15" y="7" width="1" height="1"/>
    <rect x="18" y="8" width="1" height="1"/>
    <rect x="10" y="10" width="1" height="1"/>
    <rect x="13" y="10" width="1" height="1"/>
    <rect x="16" y="9" width="1" height="1"/>
    <rect x="19" y="9" width="1" height="1"/>
  </g>

  <!-- 侧线（鲈鱼特征） -->
  <path d="M7,9 Q13,8.5 20,9" stroke="#1B5E20" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- 高光 -->
  <ellipse cx="9" cy="5.5" rx="3.5" ry="1" fill="white" opacity="0.3"/>
</svg>