<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Chat — 交互式Demo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  background:#fff;color:#1f2937
}
.scroll-custom::-webkit-scrollbar{width:6px}
.scroll-custom::-webkit-scrollbar-track{background:transparent}
.scroll-custom::-webkit-scrollbar-thumb{background-color:#e5e7eb;border-radius:3px}
.scroll-custom::-webkit-scrollbar-thumb:hover{background-color:#d1d5db}
.scroll-custom{scrollbar-width:thin;scrollbar-color:#e5e7eb transparent}

.app-layout{display:flex;height:100vh;width:100vw;background:#fff;overflow:hidden}

/* Sidebar */
.sidebar{width:256px;height:100%;display:flex;flex-direction:column;background:#f9fafb;border-right:1px solid rgba(229,231,235,.8);flex-shrink:0;z-index:10}
.sidebar-hdr{display:flex;align-items:center;gap:8px;min-height:52px;padding:0 12px}
.logo-icon{width:32px;height:32px;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:16px;height:16px;color:#fff}
.sidebar-title{font-size:16px;font-weight:600;color:#1f2937}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px 12px;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.conv-list{flex:1;overflow-y:auto;padding:8px}
.conv-item{width:100%;text-align:left;padding:10px 12px;border-radius:12px;border:1px solid transparent;background:none;cursor:pointer;transition:all .2s;display:flex;gap:8px;align-items:flex-start}
.conv-item:hover{background:#f3f4f6}
.conv-item.active{background:rgba(102,126,234,.1);border-color:rgba(102,126,234,.2)}
.conv-icon{width:16px;height:16px;color:#9ca3af;margin-top:2px;flex-shrink:0}
.conv-name{font-size:14px;font-weight:500;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-meta{font-size:12px;color:#9ca3af;margin-top:2px}
.sidebar-ftr{padding:8px;border-top:1px solid rgba(229,231,235,.8)}
.sidebar-ftr .conv-item{color:#6b7280;font-size:13px;cursor:default}
.sidebar-ftr .conv-item:hover{background:transparent}

/* Main */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;position:relative}
.toggle-btn{position:absolute;top:10px;z-index:40;padding:6px;border-radius:8px;border:none;background:none;cursor:pointer;color:#9ca3af;transition:all .2s;display:flex}
.toggle-btn:hover{color:#6b7280;background:#f3f4f6}
.tl{left:12px}.tr{right:12px}
.header{position:sticky;top:0;z-index:30;display:flex;align-items:center;padding:0 48px 0 56px;min-height:52px;background:rgba(255,255,255,.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(229,231,235,.5)}
.bc{display:flex;align-items:center;gap:4px;font-size:14px;color:#6b7280}
.bc-sep{color:#d1d5db}
.bc-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#6b7280;transition:color .2s;padding:2px 4px;border-radius:4px}
.bc-btn:hover{color:#667eea}
.bc-btn.active{color:#1f2937;font-weight:500}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msgs{flex:1;overflow-y:auto;padding:16px 24px}

/* Messages */
.msg-row{display:flex;margin-bottom:16px;animation:fadeIn .4s ease-out}
.msg-row.user{justify-content:flex-end}
.msg-row.assistant{justify-content:flex-start}
.msg-inner{display:flex;flex-direction:column;gap:2px}
.user .msg-inner{align-items:flex-end}
.bubble{font-size:15px;line-height:1.65}
.bubble.user{max-width:480px;background:#f3f4f6;color:#1f2937;border-radius:16px;border-bottom-right-radius:4px;padding:12px 16px}
.bubble.assistant{max-width:800px;color:#1f2937}
.bubble.merge{max-width:736px;width:100%;border:1px solid #e5e7eb;border-radius:16px;padding:24px 16px 12px;position:relative;margin:16px 0}
.merge-badge{position:absolute;top:0;left:12px;transform:translateY(-50%);background:#fff;padding:0 8px;font-size:12px;font-weight:600;color:#000;display:flex;align-items:center;gap:4px}
.sys-msg{display:flex;justify-content:center;margin:8px 0}
.sys-inner{font-size:12px;color:#6b7280;background:#f3f4f6;padding:8px 16px;border-radius:8px;max-width:80%}
.bubble p{margin:6px 0}
.bubble h2{font-size:16px;font-weight:700;margin:12px 0 8px}
.bubble h3{font-size:14px;font-weight:700;margin:8px 0 4px}
.bubble ul,.bubble ol{margin:6px 0;padding-left:20px}
.bubble li{margin:2px 0}
.bubble code{background:#f3f4f6;padding:1px 6px;border-radius:4px;font-size:14px}
.bubble pre{background:#f9fafb;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:13px}
.bubble blockquote{border-left:3px solid #d1d5db;background:#f9fafb;padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0}
.bubble a{color:#667eea;text-decoration:underline}
.bubble table{border-collapse:collapse;font-size:14px;margin:8px 0;width:100%}
.bubble th,.bubble td{border:1px solid #e5e7eb;padding:6px 10px;text-align:left}
.bubble th{background:#f9fafb;font-weight:600}
.branch-label{font-size:11px;color:#667eea;font-weight:500;margin-bottom:2px}

/* Annotation */
.ann-highlight{background:#eff6ff;border-bottom:2px solid #93c5fd;border-radius:2px;cursor:pointer;transition:background .2s}
.ann-highlight:hover{background:#dbeafe}

.ann-popup{position:fixed;z-index:100;width:288px;background:#fff;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.05);overflow:hidden}
.ann-popup-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:linear-gradient(135deg,rgba(102,126,234,.05),rgba(118,75,162,.05));border-bottom:1px solid #f3f4f6}
.ann-popup-hdr h4{font-size:13px;font-weight:600;color:#374151}
.ann-popup-close{background:none;border:none;color:#9ca3af;cursor:pointer;padding:2px;border-radius:4px}
.ann-popup-close:hover{color:#6b7280}
.ann-popup-qt{padding:8px 12px;border-bottom:1px solid #f3f4f6;font-size:12px;color:#6b7280;font-style:italic}
.ann-popup-body{padding:8px;max-height:200px;overflow-y:auto}
.ann-sug{padding:8px 12px;border-radius:8px;transition:background .2s;position:relative}
.ann-sug:hover{background:rgba(102,126,234,.05)}
.ann-sug-t{font-size:14px;font-weight:500;color:#1f2937}
.ann-sug-d{font-size:12px;color:#6b7280;margin-top:2px}
.ann-sug-actions{margin-top:6px;display:flex;gap:4px;opacity:0;transition:opacity .2s}
.ann-sug:hover .ann-sug-actions{opacity:1}
.ann-act{padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:12px;transition:all .2s;display:flex;align-items:center;gap:4px}
.ann-act.primary{color:#667eea}
.ann-act.primary:hover{background:rgba(102,126,234,.1)}
.ann-act.secondary{color:#6b7280}
.ann-act.secondary:hover{background:rgba(102,126,234,.1)}

/* Tree sidebar */
.tree-sb{width:256px;height:100%;display:flex;flex-direction:column;background:rgba(249,250,251,.8);border-left:1px solid rgba(229,231,235,.5);backdrop-filter:blur(8px);flex-shrink:0}
.tree-sb-hdr{min-height:52px;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid rgba(229,231,235,.5)}
.tree-sb-hdr h3{font-size:14px;font-weight:600;color:#374151}
.tree-nodes{flex:1;overflow-y:auto;padding:8px}
.tn{position:relative}
.tn-btn{width:100%;text-align:left;padding:6px 8px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:4px;overflow:hidden}
.tn-btn:hover{background:#f3f4f6}
.tn-btn.active{background:rgba(102,126,234,.15);color:#667eea;font-weight:500}
.tn-btn .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tn-chev{width:12px;height:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
.tn-chev.open{transform:rotate(90deg)}
.tn-child{padding-left:8px}

/* Input */
.input-area{padding:10px 16px 14px}
.input-box{max-width:736px;margin:0 auto;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden}
.input-box textarea{width:100%;resize:none;padding:12px 16px 4px;font-size:15px;color:#1f2937;border:none;outline:none;font-family:inherit;line-height:1.5;background:transparent}
.input-box textarea::placeholder{color:#9ca3af}
.input-ftr{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 6px}
.input-actions{display:flex;gap:4px}
.ia-btn{display:flex;align-items:center;gap:6px;height:32px;padding:0 10px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;color:#9ca3af}
.ia-btn.active{background:rgba(102,126,234,.1);color:#667eea}
.btn-send{width:32px;height:32px;border-radius:8px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .2s;flex-shrink:0}
.btn-send:disabled{opacity:.4;cursor:not-allowed}

/* Merge floating */
.merge-float{position:fixed;bottom:24px;right:24px;z-index:30;display:flex;align-items:center;gap:8px;padding:12px 20px;border-radius:9999px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:14px;font-weight:500;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(102,126,234,.3);transition:all .2s}
.merge-float:hover{opacity:.9;box-shadow:0 8px 32px rgba(102,126,234,.4)}
.merge-float.pulse{animation:guidePulse 1.5s ease-in-out infinite}
@keyframes guidePulse{0%,100%{box-shadow:0 8px 24px rgba(102,126,234,.3)}50%{box-shadow:0 8px 40px rgba(102,126,234,.6)}}

/* Fork button for text selection */
.fork-btn{position:fixed;z-index:50;padding:6px 14px;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:12px;font-weight:500;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(102,126,234,.3);transition:opacity .2s;display:none;align-items:center;gap:4px;white-space:nowrap}
.fork-btn:hover{opacity:.9}
.fork-btn svg{width:12px;height:12px;flex-shrink:0}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-width:480px;width:90%;overflow:hidden}
.modal-hdr{padding:20px 24px 12px;border-bottom:1px solid #f3f4f6}
.modal-body{padding:16px 24px 20px;max-height:60vh;overflow-y:auto}
.modal-body select{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:14px;color:#374151;outline:none;background:#fff;cursor:pointer}
.modal-body select:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 2px rgba(102,126,234,.15)}
.modal-body label[style^="display:flex"]{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .15s}
.modal-body label[style^="display:flex"]:hover{background:#f9fafb}
.modal-body input[type="checkbox"]{accent-color:#667eea;width:16px;height:16px;cursor:pointer;margin:0;flex-shrink:0}
.modal-ftr{display:flex;justify-content:flex-end;gap:8px;padding:12px 24px;border-top:1px solid #f3f4f6}

/* Welcome */
.welcome{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e)}
.welcome.hide{display:none}
.welcome-inner{max-width:560px;padding:48px;text-align:center}
.welcome .logo-icon{width:64px;height:64px;border-radius:20px;margin:0 auto 24px;box-shadow:0 8px 32px rgba(102,126,234,.3)}
.welcome .logo-icon svg{width:32px;height:32px}
.welcome h1{font-size:32px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-.02em}
.welcome-sub{font-size:18px;color:rgba(255,255,255,.6);margin-bottom:24px}
.welcome p{font-size:15px;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:32px;max-width:420px;margin-left:auto;margin-right:auto}
.btn-start{padding:14px 48px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px rgba(102,126,234,.3)}
.btn-start:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(102,126,234,.4)}

/* Guide overlay */
.guide-overlay{position:fixed;inset:0;z-index:200;pointer-events:none}
.guide-overlay.active{pointer-events:auto}
.guide-bg{position:absolute;inset:0;background:rgba(0,0,0,.3);opacity:0;transition:opacity .4s}
.guide-overlay.active .guide-bg{opacity:1}
.guide-card{position:absolute;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15),0 0 0 1px rgba(0,0,0,.05);max-width:420px;overflow:hidden}
.guide-card-hdr{padding:20px 24px 8px}
.guide-step{font-size:11px;font-weight:600;color:#667eea;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.guide-card h3{font-size:18px;font-weight:700;color:#1f2937}
.guide-card-body{padding:8px 24px 20px}
.guide-card-body p{font-size:15px;color:#6b7280;line-height:1.6}
.guide-card-ftr{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#f9fafb;border-top:1px solid #f3f4f6}
.guide-dots{display:flex;gap:6px}
.gd{width:8px;height:8px;border-radius:50%;background:#e5e7eb;transition:all .3s}
.gd.active{background:#667eea}
.gd.done{background:#667eea;opacity:.4}
.btn-guide{padding:8px 20px;border-radius:10px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-guide.primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-guide.primary:hover{opacity:.9}
.btn-guide.secondary{background:#f3f4f6;color:#374151}

/* Animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes treeGrow{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.tree-grow{animation:treeGrow .5s cubic-bezier(.22,1,.36,1)}
</style>
</head>
<body>

<div class="app-layout">
  <!-- Left sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-hdr">
      <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg></div>
      <span class="sidebar-title">Graph Chat</span>
    </div>
    <div style="padding:0 12px 12px"><button class="btn-primary" onclick="resetDemo()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新对话</button></div>
    <div class="conv-list scroll-custom">
      <div class="conv-item active">
        <svg class="conv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <div><div class="conv-name">💻 编程笔记本电脑推荐</div><div class="conv-meta">互动演示</div></div>
      </div>
    </div>
    <div class="sidebar-ftr"><div class="conv-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-top:1px;flex-shrink:0"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>设置</div></div>
  </div>

  <!-- Main area -->
  <div class="main-area">
    <button class="toggle-btn tl" onclick="toggleSidebar()" title="切换侧栏"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <button class="toggle-btn tr" id="treeToggle" onclick="toggleTree()" title="切换对话树" style="display:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>
    <div class="header"><nav class="bc" id="bc"></nav></div>
    <div class="chat-area">
      <div class="msgs scroll-custom" id="msgs"></div>
      <div class="input-area"><div class="input-box">
        <textarea rows="1" placeholder="输入消息..." disabled></textarea>
        <div class="input-ftr">
          <div class="input-actions">
            <button class="ia-btn active"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>智能标注</button>
          </div>
          <button class="btn-send" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        </div>
      </div></div>
    </div>
  </div>

  <!-- Tree sidebar -->
  <div class="tree-sb" id="treeSb" style="display:none">
    <div class="tree-sb-hdr"><h3>对话树</h3></div>
    <div class="tree-nodes scroll-custom" id="treeNodes"></div>
  </div>
</div>

<button class="merge-float" id="mergeBtn" style="display:none" onclick="openMergeModal()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></svg>
  合并结论
</button>

<div class="ann-popup" id="annPopup" style="display:none"></div>

<button class="fork-btn" id="forkBtn" style="display:none" onclick="handleFork()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
  分支探索
</button>

<div class="modal-overlay" id="mergeModal" style="display:none">
  <div class="modal" style="max-width:480px">
    <div class="modal-hdr" style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></svg>
        <h2 style="font-size:18px;font-weight:600;color:#1f2937">合并分支结论</h2>
      </div>
      <button onclick="closeMergeModal()" style="background:none;border:none;color:#9ca3af;cursor:pointer;padding:2px;border-radius:4px;display:flex">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:16px">

// ============================================================
// RENDER
// ============================================================
function renderBC() {
  const e=document.getElementById('bc');
  const p=S.branch==='root'?[{id:'root',label:'主对话'}]:[{id:'root',label:'主对话'},{id:S.branch,label:CONVS[S.branch].name}];
  e.innerHTML=p.map((x,i)=>(i>0?'<span class="bc-sep">/</span>':'')+'<button class="bc-btn'+(i===p.length-1?' active':'')+'" onclick="goBranch(\''+x.id+'\')">'+x.label+'</button>').join('');
}
function renderMsgs() {
  const c=document.getElementById('msgs');
  const ms=S.msgs[S.branch]||[];
  if(!ms.length){c.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#d1d5db"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p style="font-size:14px">开始对话探索吧</p></div>';return;}
  c.innerHTML=ms.map(m=>{
    if(m.role==='system') return '<div class="sys-msg fade-in"><div class="sys-inner">'+m.content+'</div></div>';
    const iu=m.role==='user', im=m.nodeType==='merge';
    const badge=im?'<div class="merge-badge">合并结论</div>':'';
    return '<div class="msg-row fade-in" data-mid="'+(m.id||'')+'"><div class="msg-inner"'+(iu?' style="align-items:flex-end"':'')+'>'+(m.forkLabel?'<div class="branch-label">'+m.forkLabel+'</div>':'')+'<div class="bubble '+(iu?'user':im?'assistant merge':'assistant')+'">'+badge+md(m.content)+'</div></div></div>';
  }).join('');
  c.scrollTop=c.scrollHeight;
  if(S.branch==='root') setTimeout(applyAnns,150);
}
function md(t) {
  if(!t) return '';
  // Extract tables first
  const tables=[];
  let tmp=t.replace(/^\|.+\|(\n\|[-| :]+\|)?(\n\|.+\|)*/gm,m=>{const i=tables.length;tables.push(m);return '%%T'+i+'%%'});
  let h=tmp.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^>\s?(.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  h='<p>'+h+'</p>';
  // Restore tables
  tables.forEach((tb,i)=>{
    const rows=tb.split('\n').filter(r=>!/^\|[-| :]+\|$/.test(r.trim()));
    let th='<table>';
    rows.forEach((r,ri)=>{
      const cells=r.split('|').filter(c=>c.trim()).map(c=>c.trim());
      th+='<tr>'+cells.map(c=>'<'+((ri===0&&rows.length>1)?'th':'td')+'>'+c+'</'+((ri===0&&rows.length>1)?'th':'td')+'>').join('')+'</tr>';
    });
    th+='</table>';
    h=h.replace('%%T'+i+'%%',th);
  });
  h=h.replace(/<p><\/p>/g,'').replace(/<(ul|ol)>\s*<\/\1>/g,'');
  return h;
}
function renderTree() {
  document.getElementById('treeNodes').innerHTML=tn('root',0);
}
function tn(id,d){
  const c=CONVS[id]; if(!c) return '';
  const pad=d*8+8;
  return '<div class="tn tree-grow"><button class="tn-btn'+(S.branch===id?' active':'')+'" onclick="goBranch(\''+id+'\')" style="padding-left:'+pad+'px">'+
    (c.children.length?'<span class="tn-chev open"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>':'<span style="width:12px;flex-shrink:0"></span>')+
    '<span class="lbl">'+(id==='root'?'主对话':c.name)+'</span></button>'+
    (c.children.length?'<div class="tn-child">'+c.children.map(ch=>tn(ch,d+1)).join('')+'</div>':'')+'</div>';
}
function renderMergeModal(){

  if(!avail.length){body.innerHTML='<p style="color:#9ca3af;text-align:center;padding:20px">没有可合并的分支</p>';return;}

function updateMergeBtn(){

// ============================================================
// ANNOTATIONS
// ============================================================
function applyAnns(){
  const anns=ANNS['msg-root-1'];if(!anns)return;
  const el=document.querySelector('[data-mid="msg-root-1"]');if(!el)return;
  const c=el.querySelector('.bubble.assistant');if(!c)return;
  // Remove existing highlights first
  c.querySelectorAll('.ann-highlight').forEach(h=>{
    const p=h.parentNode;if(!p)return;
    const txt=document.createTextNode(h.textContent);
    p.replaceChild(txt,h);
    p.normalize();
  });
  anns.forEach(ann=>{
    const walker=document.createTreeWalker(c,NodeFilter.SHOW_TEXT,null,false);
    const nodes=[];
    while(walker.nextNode()){const n=walker.currentNode;if(n.textContent&&n.parentNode&&!n.parentNode.closest('.ann-highlight')&&!n.parentNode.closest('pre')&&!n.parentNode.closest('code'))nodes.push(n);}
    nodes.forEach(node=>{
      const txt=node.textContent;const idx=txt.indexOf(ann.text);
      if(idx===-1)return;
      const before=txt.slice(0,idx),match=txt.slice(idx,idx+ann.text.length),after=txt.slice(idx+ann.text.length);
      if(!match)return;
      const parent=node.parentNode;
      const span=document.createElement('span');span.className='ann-highlight';span.textContent=match;
      span.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();onAnnClick(ann,e.clientX,e.clientY);});
      const frag=document.createDocumentFragment();
      if(before)frag.appendChild(document.createTextNode(before));
      frag.appendChild(span);
      if(after)frag.appendChild(document.createTextNode(after));
      parent.replaceChild(frag,node);
    });
  });
}
function onAnnClick(ann,x,y){
  const popup=document.getElementById('annPopup');
  let h='<div class="ann-popup-hdr"><h4>推荐深入探索</h4><button class="ann-popup-close" onclick="closeAnnPopup()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="ann-popup-qt">"'+ann.text+'"</div><div class="ann-popup-body">';
  (ann.suggestions||[]).forEach(s=>{
    h+='<div class="ann-sug" style="position:relative"><div class="ann-sug-t">'+s.text+'</div>'+(s.description?'<div class="ann-sug-d">'+s.description+'</div>':'')+'<div class="ann-sug-actions">'
      +'<button class="ann-act secondary" onclick="closeAnnPopup();alert(\'追问功能在演示中暂不可用\')" title="在当前对话追问"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 追问</button>'
      +'<button class="ann-act primary" onclick="branchFromAnn(\''+ann.id+'\')" title="分支探索"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg> 分支探索</button>'
      +'</div></div>';
  });
  h+='</div>';
  popup.innerHTML=h;popup.style.display='block';
  let left=x,top=y+8;
  if(left+288>window.innerWidth-8)left=window.innerWidth-288-8;
  if(top+300>window.innerHeight-8)top=y-300-8;
  if(top<8)top=8;
  popup.style.left=left+'px';popup.style.top=top+'px';
}
function closeAnnPopup(){document.getElementById('annPopup').style.display='none';}

// ============================================================
// BRANCH
// ============================================================
function branchFromAnn(annId){
  closeAnnPopup();
  const ann=(ANNS['msg-root-1']||[]).find(a=>a.id===annId);if(!ann)return;
  const map={a_cpu:'branch-cpu','a-cpu':'branch-cpu',a_storage:'branch-storage','a-storage':'branch-storage',a_battery:'branch-battery','a-battery':'branch-battery',a_screen:'branch-cpu','a-screen':'branch-cpu'};
  const bid=map[annId];if(!bid)return;
  if((S.msgs[bid]||[]).length>0){goBranch(bid);return;}
  S.msgs[bid]=[{role:'system',content:'从主对话分支，深入探索「'+CONVS[bid].forkText+'」方向'}];
  goBranch(bid);
  const resp=BRANCH_RESP[CONVS[bid].forkText];
  if(resp)typeText(bid,resp,CONVS[bid].forkText,()=>{
    // Typing done - advance guide if appropriate
    if(S.guideIdx===1)setTimeout(()=>showGuide(2),300);
    else if(S.guideIdx===5)setTimeout(()=>showGuide(6),300);
  });
}

function typeText(bid,text,topic,cb){
  S.typing=true;
  const ms=S.msgs[bid];
  ms.push({role:'assistant',id:'msg-'+bid,content:'',nodeType:'normal',forkLabel:'探索「'+topic+'」'});
  renderMsgs();
  const last=document.querySelector('#msgs .msg-row:last-child .bubble.assistant');
  if(!last){S.typing=false;if(cb)cb();return;}
  let idx=0;last.innerHTML='';const s=document.createElement('span');last.appendChild(s);
  function go(){
    if(idx>=text.length){
      last.innerHTML=md(text);
      document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
      ms[ms.length-1].content=text;S.typing=false;
      if(cb)cb();return;
    }
    idx+=2;s.textContent=text.substring(0,idx)+'▌';
    document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
    setTimeout(go,25+Math.random()*15);
  }go();
}

// ============================================================
// NAVIGATION
// ============================================================
function goBranch(id){
  S.branch=id;closeAnnPopup();hideForkBtn();window.getSelection()?.removeAllRanges();
  renderBC();renderMsgs();renderTree();
  if(S.treeVisible){document.getElementById('treeSb').style.display='flex';document.getElementById('treeToggle').style.display='block';}
  const exp=CONVS.root.children.filter(b=>(S.msgs[b]||[]).length>0).length;
  if(exp>=2&&id==='root'){document.getElementById('mergeBtn').style.display='flex';if(S.guideIdx===6)setTimeout(()=>showGuide(6),400);}
  else document.getElementById('mergeBtn').style.display='none';
}
function toggleSidebar(){const e=document.getElementById('sidebar');e.style.display=e.style.display==='none'?'flex':'none';}
function toggleTree(){const e=document.getElementById('treeSb');e.style.display=e.style.display==='none'?'flex':'none';}

// ============================================================
// SIMULATION
// ============================================================
function sendUserMsg(){
  S.msgs.root.push({role:'user',content:'帮我推荐一台适合编程的笔记本电脑，预算8000-12000元',id:'msg-root-user'});
  renderMsgs();
}
function sendAiResp(){
  S.msgs.root.push({role:'assistant',content:'好的，针对 8000-12000 元预算的编程笔记本电脑，以下是关键考量维度：\n\n## 核心考量因素\n\n### 处理器性能\n编程中最直接影响体验的是 CPU。编译代码、运行测试、启动开发服务器都依赖处理器性能。建议选择 **Intel Core i7-13700H 或 AMD Ryzen 7 7840HS** 以上的型号。\n\n### 内存与存储\n开发环境占用资源较多：IDE、浏览器标签、Docker 容器、数据库等。**32GB 内存** 已成为开发者的新标配。存储方面，**1TB PCIe 4.0 SSD** 是理想起点。\n\n### 显示屏素质\n程序员每天盯着屏幕 6-10 小时，一块好屏幕至关重要。推荐 **14-16 英寸、2K 以上分辨率、100% sRGB** 的屏幕。\n\n### 便携与续航\n如果你需要携带电脑通勤或出差，**1.2-1.5kg** 的重量和 **8小时以上** 的续航值得优先考虑。\n\n这些维度相互制约——追求性能通常要牺牲便携，关键在于找到适合你开发场景的平衡点。',id:'msg-root-1',nodeType:'normal',annotationsGenerated:true});
  renderMsgs();
  setTimeout(()=>{applyAnns();setTimeout(()=>showGuide(1),400);},200);
}

// ============================================================
// MERGE
// ============================================================
function openMergeModal(){S.mergeSel=[];document.getElementById('mergeModal').style.display='flex';renderMergeModal();}
function closeMergeModal(){document.getElementById('mergeModal').style.display='none';}
function toggleMerge(id){const i=S.mergeSel.indexOf(id);if(i>=0)S.mergeSel.splice(i,1);else S.mergeSel.push(id);updateMergeBtn();}
function doMerge(){
  if(S.mergeSel.length<2)return;
  closeMergeModal();
  S.mergeSel.forEach(id=>{if(!S.merged.includes(id))S.merged.push(id);});
  document.getElementById('mergeBtn').style.display='none';
  goBranch('root');
  S.msgs.root.push({role:'assistant',content:MERGE_TEXT,nodeType:'merge',id:'msg-merge-'+Date.now()});
  renderMsgs();
  if(S.guideIdx===6||S.guideIdx===7)setTimeout(()=>showGuide(7),600);
}

// ============================================================
// GUIDE
// ============================================================
function showGuide(idx){
  if(idx>=GUIDES.length){hideGuide();return;}
  S.guideIdx=idx;const g=GUIDES[idx];
  const overlay=document.getElementById('guideOverlay'),card=document.getElementById('guideCard');
  document.getElementById('guideStep').textContent='步骤 '+g.step+'/'+GUIDES.length;
  document.getElementById('guideTitle').textContent=g.title;
  document.getElementById('guideDesc').innerHTML=g.desc;
  document.getElementById('guideBtn').textContent=g.btn;
  document.getElementById('guideDots').innerHTML=GUIDES.map((_,i)=>'<span class="gd'+(i<idx?' done':'')+(i===idx?' active':'')+'"></span>').join('');
  card.style.left='50%';card.style.top='42%';card.style.transform='translate(-50%,-50%)';
  card.style.display='block';overlay.classList.add('active');
}
function hideGuide(){document.getElementById('guideOverlay').classList.remove('active');document.getElementById('guideCard').style.display='none';}
function guideNext(){const g=GUIDES[S.guideIdx];if(g&&g.act)g.act();}

// ============================================================
// CLICK HANDLING FOR GUIDE ADVANCEMENT
// ============================================================
// Guide advancement is handled inside branchFromAnn/typeText callback, handleFork, and doMerge

// Close popup on outside click
document.addEventListener('click',function(e){
  const p=document.getElementById('annPopup');
  if(p.style.display!=='none'&&!p.contains(e.target)&&!e.target.closest('.ann-highlight'))closeAnnPopup();
});

// ============================================================
// TEXT SELECTION FORK
// ============================================================
function hideForkBtn(){document.getElementById('forkBtn').style.display='none';}
let _forkHide=null;

document.getElementById('msgs').addEventListener('mouseup',function(e){
  if(e.target.closest('.ann-popup')||e.target.closest('.fork-btn')||e.target.closest('.ann-highlight'))return;
  if(_forkHide)clearTimeout(_forkHide);
  _forkHide=setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed){hideForkBtn();return;}
    const text=sel.toString().trim();
    if(!text||text.length<3){hideForkBtn();return;}
    const range=sel.getRangeAt(0);
    const container=range.commonAncestorContainer;
    if(!container||!container.closest||!container.closest('.bubble.assistant')){hideForkBtn();return;}
    const rect=range.getBoundingClientRect();
    if(!rect||rect.width===0){hideForkBtn();return;}
    const btn=document.getElementById('forkBtn');
    btn.dataset.selectedText=text;
    btn.style.display='flex';
    const l=rect.left+rect.width/2-btn.offsetWidth/2;
    btn.style.top=Math.max(4,rect.top-40)+'px';
    btn.style.left=Math.max(4,Math.min(l,window.innerWidth-btn.offsetWidth-4))+'px';
  },10);
});

document.getElementById('msgs').addEventListener('scroll',hideForkBtn);
document.addEventListener('scroll',hideForkBtn,true);

document.addEventListener('mousedown',function(e){
  const btn=document.getElementById('forkBtn');
  if(btn.style.display!=='none'&&!btn.contains(e.target))hideForkBtn();
});

function handleFork(){
  const btn=document.getElementById('forkBtn');
  const selectedText=btn.dataset.selectedText||'';
  hideForkBtn();window.getSelection()?.removeAllRanges();
  if(!selectedText||selectedText.length<2)return;
  const ts=Date.now(),forkId='fork-'+ts;
  const shortName=selectedText.length>18?selectedText.slice(0,18)+'…':selectedText;
  CONVS[forkId]={id:forkId,name:shortName,parentId:'root',forkText:selectedText,children:[]};
  CONVS.root.children.push(forkId);
  S.msgs[forkId]=[{role:'system',content:'从主对话中分叉，深入探索「'+selectedText+'」方向'}];
  const resp='## 关于「'+selectedText+'」的深入分析\n\n基于主对话中提到的「'+selectedText+'」，以下是值得关注的几个维度：\n\n'+
    '1. **具体需求分析** — 根据您的使用场景，这一因素的重要性有所不同\n'+
    '2. **主流方案对比** — 当前市场上的选择各有优劣\n'+
    '3. **性价比权衡** — 结合预算找到最优平衡点\n\n'+
    '> 您可以在当前分支继续追问深入了解，或返回主对话探索其他方向。\n\n'+
    '### 建议下一步\n\n'+
    '如果这个方向对您有帮助，可以继续深入。回到主对话探索其他维度后，使用「合并结论」功能获得综合推荐。';
  goBranch(forkId);
  typeText(forkId,resp,selectedText,function(){
    renderTree();
    if(S.guideIdx===3)setTimeout(()=>showGuide(4),300);
  });
}

// ============================================================
// DEMO FLOW
// ============================================================
function startDemo(){document.getElementById('welcome').classList.add('hide');showGuide(0);}
function resetDemo(){
  S.guideIdx=-1;S.branch='root';
  // Remove dynamically created fork branches
  Object.keys(CONVS).forEach(k=>{if(k!=='root'&&k!=='branch-cpu'&&k!=='branch-storage'&&k!=='branch-battery')delete CONVS[k];});
  CONVS.root.children=['branch-cpu','branch-storage','branch-battery'];
  S.msgs={root:[],'branch-cpu':[],'branch-storage':[],'branch-battery':[]};
  S.treeVisible=false;S.mergeSel=[];S.merged=[];S.typing=false;
  document.getElementById('treeSb').style.display='none';document.getElementById('treeToggle').style.display='none';
  document.getElementById('mergeBtn').style.display='none';closeAnnPopup();hideForkBtn();document.getElementById('mergeModal').style.display='none';
  renderBC();renderMsgs();renderTree();hideGuide();
  document.getElementById('welcome').classList.remove('hide');
}

renderBC();renderMsgs();renderTree();
console.log('Graph Chat Demo ready!');
