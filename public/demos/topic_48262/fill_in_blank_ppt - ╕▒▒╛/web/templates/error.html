{% extends "base.html" %}
{% block title %}错误 - 填空题PPT生成器{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-icon"><svg class="icon icon-xl"><use href="#icon-circle-x"/></svg></div>
    <div class="error-code">{{ code }}</div>
    <div class="error-message">{{ message }}</div>
    <a href="{{ url_for('home.index') }}" class="btn btn-primary">
        <svg class="icon"><use href="#icon-house"/></svg> 返回首页
    </a>
</div>
{% endblock %}
