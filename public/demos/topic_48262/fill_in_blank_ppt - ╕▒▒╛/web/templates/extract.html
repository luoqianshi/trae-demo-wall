{% extends "base.html" %}
{% block title %}提取文本 - 填空题PPT生成器{% endblock %}

{% block content %}
<div class="page-header">
    <h1>从PPT提取挖空文本</h1>
    <p>上传已生成的挖空PPT，逆向提取出带 {{ "{{}}" }} 标记的文本</p>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<form action="{{ url_for('extract.start') }}" method="POST" enctype="multipart/form-data" class="form-card">
    <div class="form-section">
        <h2 class="form-section-title">上传 PPT 文件</h2>
        <div class="upload-zone" id="uploadZone">
            <input type="file" name="file" id="fileInput" accept=".pptx" required>
            <label for="fileInput" class="upload-label">
                <span class="upload-icon"><svg class="icon icon-lg"><use href="#icon-upload"/></svg></span>
                <span class="upload-text">点击或拖拽 PPT 文件到此处</span>
                <span class="upload-hint">支持 .pptx 格式，最大 10 MB</span>
            </label>
            <div class="upload-preview" id="uploadPreview" style="display:none;">
                <span class="file-name" id="fileName"></span>
                <span class="file-size" id="fileSize"></span>
            </div>
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg">开始提取</button>
        <a href="{{ url_for('home.index') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}

{% block extra_body %}
<script src="{{ url_for('static', filename='js/upload.js') }}"></script>
{% endblock %}
