{% extends "base.html" %}
{% block title %}提取预览 - 填空题PPT生成器{% endblock %}

{% block content %}
<div class="page-header">
    <h1>提取结果预览</h1>
    <p>任务 ID: <code>{{ task.task_id }}</code></p>
</div>

<div class="task-actions">
    <a href="{{ url_for('extract.download', task_id=task.task_id) }}" class="btn btn-primary">
        <svg class="icon"><use href="#icon-download"/></svg> 下载文本
    </a>
    <a href="{{ url_for('generate.index') }}" class="btn btn-secondary">
        <svg class="icon"><use href="#icon-upload"/></svg> 用此文本生成新PPT
    </a>
    <a href="{{ url_for('home.index') }}" class="btn btn-secondary">
        <svg class="icon"><use href="#icon-house"/></svg> 返回首页
    </a>
</div>

<div class="preview-container">
    <pre class="preview-content">{{ content }}</pre>
</div>
{% endblock %}
