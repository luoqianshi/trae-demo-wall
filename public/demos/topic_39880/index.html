<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>咪伴 FocusCat｜创意提案</title>
  <style>
    :root {
      --bg: #fbf7f2;
      --paper: rgba(255, 255, 255, 0.76);
      --paper-solid: #ffffff;
      --line: rgba(106, 83, 67, 0.12);
      --text: #5d493c;
      --muted: #8d7665;
      --accent: #f59f78;
      --accent-strong: #ec7f50;
      --accent-soft: #ffe2d4;
      --green: #8fce9d;
      --shadow: 0 24px 60px rgba(160, 118, 93, 0.14);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --ink: rgba(255,255,255,0.92);
      --ink-dim: rgba(255,255,255,0.62);
      --night-1: rgba(24, 18, 24, 0.86);
      --night-2: rgba(10, 8, 12, 0.84);
      --fur-a: #ffb062;
      --fur-b: #e07a2d;
      --fur-c: #fff6ee;
      --fur-d: #b6591d;
      --fur-shadow: rgba(152, 78, 34, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(255, 227, 209, 0.9), transparent 24%),
        linear-gradient(135deg, #fffaf4, #ffece2 48%, #fff5ef);
      overflow-x: hidden;
    }

    body.intro-complete {
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.72), transparent 22%),
        radial-gradient(circle at 80% 0%, rgba(255, 231, 218, 0.78), transparent 24%),
        linear-gradient(135deg, #fffdf9, #f8ede8 48%, #f5e7e0);
    }

    .float-paw {
      position: fixed;
      z-index: 0;
      font-size: clamp(26px, 4vw, 48px);
      opacity: 0.08;
      user-select: none;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite;
    }

    .float-paw:nth-child(1) { top: 9%; left: 8%; }
    .float-paw:nth-child(2) { top: 18%; right: 10%; animation-delay: -4s; }
    .float-paw:nth-child(3) { bottom: 14%; left: 12%; animation-delay: -7s; }
    .float-paw:nth-child(4) { bottom: 10%; right: 14%; animation-delay: -2s; }

    @keyframes drift {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(8deg); }
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 40px;
    }

    .experience {
      position: relative;
      min-height: calc(100vh - 44px);
      display: grid;
      place-items: center;
    }

    .skip-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 40;
      border: 1px solid rgba(255,255,255,0.26);
      background: rgba(22, 16, 22, 0.44);
      color: var(--ink);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 34px rgba(17, 12, 16, 0.16);
    }

    .skip-btn:hover {
      box-shadow: 0 14px 44px rgba(17, 12, 16, 0.22);
    }

    .skip-btn.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-12px);
    }

    .intro-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      pointer-events: none;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .intro-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .intro-stack {
      position: relative;
      width: min(100%, 980px);
      height: min(76vh, 720px);
    }

    .intro-layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
      padding: 28px;
      border-radius: 34px;
      border: 1px solid rgba(255,255,255,0.14);
      background:
        radial-gradient(circle at 18% 0%, rgba(255,255,255,0.18), transparent 40%),
        radial-gradient(circle at 82% 10%, rgba(255, 188, 163, 0.16), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03)),
        linear-gradient(180deg, var(--night-1), var(--night-2));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        inset 0 -1px 0 rgba(0,0,0,0.22),
        0 40px 120px rgba(12, 9, 14, 0.34);
      backdrop-filter: blur(20px);
      transition:
        opacity 0.9s ease,
        transform 0.9s cubic-bezier(.16,1,.3,1),
        filter 0.9s ease;
      overflow: hidden;
      transform: translate3d(0,0,0);
    }

    .intro-layer::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.14), transparent 30%),
        radial-gradient(circle at 12% 56%, rgba(255, 190, 164, 0.12), transparent 34%),
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.14) 18%, transparent 38%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 6px);
      pointer-events: none;
      opacity: 0.9;
      animation: sheen 5.6s ease-in-out infinite;
    }

    @keyframes sheen {
      0%, 100% { transform: translateX(-6%); opacity: 0.82; }
      50% { transform: translateX(6%); opacity: 1; }
    }

    .intro-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.46),
        rgba(245,159,120,0.26),
        rgba(255,255,255,0.18));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.62;
      pointer-events: none;
    }

    .intro-layer:hover {
      transform: scale(1.012);
    }

    .intro-layer.exit {
      opacity: 0;
      transform: scale(1.16) translateY(-54px) rotate(-3deg);
      filter: blur(22px) saturate(1.25);
      pointer-events: none;
    }

    .intro-layer.is-back {
      transform: scale(0.94) translateY(22px) perspective(900px) rotateX(5deg);
      opacity: 0.66;
    }

    .intro-layer.is-back-2 {
      transform: scale(0.88) translateY(46px) perspective(900px) rotateX(8deg);
      opacity: 0.34;
    }

    .intro-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: var(--ink);
      display: grid;
      gap: 20px;
      place-items: center;
    }

    .intro-index {
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.56);
    }

    .intro-keyword {
      font-size: clamp(58px, 12vw, 150px);
      line-height: 0.9;
      letter-spacing: -0.06em;
      font-weight: 700;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255, 210, 190, 0.92) 58%, rgba(245,159,120,0.9));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 18px 54px rgba(0,0,0,0.22);
    }

    .intro-sub {
      font-size: clamp(14px, 2vw, 18px);
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.74);
      text-transform: uppercase;
    }

    .intro-hint {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.84);
      font-size: 13px;
    }

    .intro-progress {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 21;
      pointer-events: none;
    }

    .intro-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    }

    .intro-dot.active {
      width: 26px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(245,159,120,0.92), rgba(255,255,255,0.72));
      border: 1px solid rgba(255,255,255,0.32);
    }

    .intro-signature {
      color: rgba(255,255,255,0.68);
      font-size: 14px;
      letter-spacing: 0.48em;
      text-indent: 0.48em;
      pointer-events: none;
    }

    .scene {
      position: relative;
      width: 100%;
      opacity: 0.12;
      transform: scale(0.98);
      filter: blur(10px);
      transition: opacity 0.9s ease, transform 0.9s ease, filter 0.9s ease;
    }

    body.intro-complete .scene {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }

    .scene-panel {
      position: relative;
      width: min(100%, 1100px);
      margin: 0 auto;
      padding: 24px;
      border-radius: 36px;
      background:
        linear-gradient(150deg, rgba(255,255,255,0.76), rgba(255,255,255,0.42)),
        radial-gradient(circle at top right, rgba(255,255,255,0.84), transparent 26%);
      border: 1px solid rgba(255,255,255,0.46);
      box-shadow:
        0 28px 90px rgba(128, 91, 86, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.55);
      backdrop-filter: blur(28px);
      overflow: hidden;
    }

    .scene-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 0%, rgba(255,255,255,0.54), transparent 24%),
        radial-gradient(circle at 88% 16%, rgba(255, 224, 211, 0.74), transparent 22%);
      pointer-events: none;
    }

    .scene-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 20px;
      align-items: stretch;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: var(--radius-xl);
    }

    .hero {
      padding: 34px;
      overflow: hidden;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: var(--accent-strong);
      border: 1px solid rgba(245, 159, 120, 0.26);
      background: rgba(255,255,255,0.72);
    }

    .hero-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 26px;
      align-items: center;
    }

    h1, h2, h3 {
      margin: 0;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    h1 {
      font-size: clamp(36px, 6vw, 62px);
      margin-bottom: 14px;
    }

    h2 {
      font-size: clamp(26px, 4vw, 36px);
      margin-bottom: 12px;
    }

    h3 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.85;
      font-size: 15px;
    }

    .lead {
      font-size: 17px;
      max-width: 44em;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .mini-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(106, 83, 67, 0.08);
    }

    .mini-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .mini-value {
      font-size: 16px;
      color: var(--text);
      font-weight: 700;
      line-height: 1.5;
    }

    .mockup {
      position: relative;
      padding: 24px;
      border-radius: 26px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.96), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,243,236,0.86));
      border: 1px solid rgba(255,255,255,0.58);
      min-height: 430px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.72),
        0 22px 46px rgba(148, 104, 96, 0.1);
    }

    .window-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .window-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffd0be;
    }

    .window-dot:nth-child(2) { background: #ffe2a8; }
    .window-dot:nth-child(3) { background: #bde6c3; }

    .cat-wrap {
      display: grid;
      place-items: center;
      margin-top: 8px;
      position: relative;
      cursor: pointer;
      user-select: none;
      outline: none;
      border-radius: 22px;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .cat-wrap:hover {
      transform: translateY(-2px);
      filter: drop-shadow(0 12px 22px rgba(236, 127, 80, 0.16));
    }

    .cat-wrap:focus-visible {
      box-shadow: 0 0 0 4px rgba(245, 159, 120, 0.22);
    }

    .cat-wrap.is-petted {
      animation: petBounce 0.42s ease;
    }

    @keyframes petBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.05) translateY(-4px); }
      100% { transform: scale(1); }
    }

    .pet-hint {
      position: absolute;
      top: -2px;
      right: 4px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--accent-strong);
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(106, 83, 67, 0.08);
    }

    .pet-hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }

    .pet-heart {
      position: absolute;
      left: 50%;
      top: 30%;
      font-size: 22px;
      opacity: 0;
      animation: floatHeart 0.95s ease-out forwards;
      filter: drop-shadow(0 4px 8px rgba(236, 127, 80, 0.16));
    }

    @keyframes floatHeart {
      0% {
        opacity: 0;
        transform: translate(-50%, 8px) scale(0.7);
      }
      25% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--x, -50%), -54px) scale(1.15);
      }
    }

    .cat-stage {
      position: relative;
      width: min(100%, 360px);
      height: 338px;
      margin: 8px auto 0;
      padding-top: 8px;
      border-radius: 28px;
      display: grid;
      place-items: end center;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.96), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.46), rgba(255,255,255,0.08));
      overflow: hidden;
    }

    .cat-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.8), transparent 36%),
        linear-gradient(180deg, rgba(255,248,242,0.86), rgba(255,238,228,0.72));
      filter: drop-shadow(0 22px 30px rgba(152, 78, 34, 0.12));
    }

    .cat-model-badge {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 2;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(255,255,255,0.7);
      color: #8a664f;
      font-size: 12px;
      box-shadow: 0 12px 28px rgba(143, 102, 79, 0.12);
      backdrop-filter: blur(12px);
      display: none;
    }

    .cat-shadow {
      position: absolute;
      left: 50%;
      bottom: 10px;
      width: 188px;
      height: 26px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(152, 78, 34, 0.22), rgba(152, 78, 34, 0.02) 70%);
      filter: blur(6px);
      animation: shadowPulse 4s ease-in-out infinite;
    }

    @keyframes bobCat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(-1deg); }
    }

    @keyframes shadowPulse {
      0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.9; }
      50% { transform: translateX(-50%) scaleX(0.93); opacity: 0.6; }
    }

    .speech {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.64);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .speech strong {
      display: block;
      margin-bottom: 8px;
      color: var(--accent-strong);
      font-size: 14px;
    }

    .speech p {
      color: var(--text);
      font-size: 18px;
      line-height: 1.65;
    }

    .demo-actions {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(160, 118, 93, 0.14);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
    }

    .secondary {
      background: rgba(255,255,255,0.76);
      color: var(--text);
      border: 1px solid rgba(106, 83, 67, 0.08);
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .section {
      margin-top: 20px;
      padding: 28px;
    }

    .list {
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .list li {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(106, 83, 67, 0.08);
      color: var(--text);
      line-height: 1.7;
    }

    .list strong {
      color: var(--accent-strong);
    }

    .feature-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .feature-card {
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(255,255,255,0.66));
      border: 1px solid rgba(106, 83, 67, 0.08);
    }

    .feature-card span {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .scenario {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .scenario-card {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(106, 83, 67, 0.08);
      min-height: 166px;
    }

    .value-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .value-card {
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(106, 83, 67, 0.08);
    }

    .demo-panel {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 16px;
    }

    .timer-card,
    .todo-card {
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.62);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.66));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.74),
        0 18px 34px rgba(153, 116, 103, 0.08);
    }

    .timer {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: var(--text);
      margin: 8px 0 12px;
    }

    .progress {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(245, 159, 120, 0.16);
      overflow: hidden;
    }

    .progress > div {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffd6c8, var(--accent-strong));
      transition: width 0.4s ease;
    }

    .pill-row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(255,255,255,0.72);
      color: var(--muted);
      border: 1px solid rgba(106, 83, 67, 0.08);
    }

    .todo-input {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    input {
      flex: 1;
      border: 1px solid rgba(106, 83, 67, 0.12);
      background: rgba(255,255,255,0.86);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }

    .todo-list {
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(106, 83, 67, 0.08);
    }

    .check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      flex: 0 0 auto;
      cursor: pointer;
      position: relative;
    }

    .todo-item.done span:last-child {
      text-decoration: line-through;
      color: #ab9788;
    }

    .todo-item.done .check {
      background: var(--accent);
    }

    .todo-item.done .check::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .footer {
      margin: 20px 0 0;
      padding: 26px;
      text-align: center;
    }

    .footer p {
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .scene-grid,
      .hero-grid,
      .section-grid,
      .demo-panel {
        grid-template-columns: 1fr;
      }

      .info-grid,
      .feature-grid,
      .value-grid,
      .scenario {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 16px 12px 28px;
      }

      .hero,
      .section {
        padding: 22px 18px;
      }

      .info-grid,
      .feature-grid,
      .value-grid,
      .scenario {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 34px;
      }

      .mockup {
        min-height: auto;
      }

      .skip-btn {
        top: 16px;
        right: 16px;
      }

      .intro-stack {
        height: 62vh;
      }

      .intro-keyword {
        font-size: clamp(46px, 13vw, 82px);
      }
    }
  </style>
</head>
<body>
  <div class="float-paw">🐾</div>
  <div class="float-paw">🐾</div>
  <div class="float-paw">🐾</div>
  <div class="float-paw">🐾</div>

  <main class="shell">
    <div class="experience">
      <button class="skip-btn" id="skipIntro">跳过</button>

      <section class="intro-overlay" id="introOverlay" aria-label="开场层级动画">
        <div class="intro-stack" id="introStack">
          <article class="intro-layer" data-step="0">
            <div class="intro-content">
              <span class="intro-signature">羽安</span>
              <div class="intro-keyword">FocusPet</div>
              <div class="intro-sub">meme</div>
              <div class="intro-hint">点击继续</div>
            </div>
          </article>
          <article class="intro-layer" data-step="1">
            <div class="intro-content">
              <span class="intro-index">01</span>
              <div class="intro-keyword">陪伴</div>
              <div class="intro-sub">Presence</div>
              <div class="intro-hint">点击继续</div>
            </div>
          </article>
          <article class="intro-layer" data-step="2">
            <div class="intro-content">
              <span class="intro-index">02</span>
              <div class="intro-keyword">专注</div>
              <div class="intro-sub">Focus</div>
              <div class="intro-hint">点击继续</div>
            </div>
          </article>
          <article class="intro-layer" data-step="3">
            <div class="intro-content">
              <span class="intro-index">03</span>
              <div class="intro-keyword">治愈</div>
              <div class="intro-sub">Comfort</div>
              <div class="intro-hint">点击进入</div>
            </div>
          </article>
        </div>
        <div class="intro-progress" id="introProgress" aria-hidden="true"></div>
      </section>

      <section class="scene" id="petScene">
        <div class="scene-panel">
          <div class="scene-grid">
            <div class="mockup">
              <div
                class="cat-wrap"
                id="catWrap"
                role="button"
                tabindex="0"
                aria-label="点击和小猫互动"
                title="点一下小猫试试"
              >
                <span class="pet-hint">点点小猫</span>
                <div class="pet-hearts" id="petHearts" aria-hidden="true"></div>
                <div class="cat-stage">
                  <div class="cat-shadow" aria-hidden="true"></div>
                  <canvas class="cat-canvas" id="catCanvas" aria-label="3D 小猫模型"></canvas>
                  <div class="cat-model-badge">meme.glb</div>
                </div>
              </div>

              <div class="speech">
                <strong>meme说</strong>
                <p id="catSpeech">先完成一个很小的步骤吧，我会一直在这儿陪你。</p>
              </div>

              <div class="demo-actions">
                <button class="primary" id="encourageBtn">鼓励我</button>
                <button class="secondary" id="restBtn">提醒休息</button>
              </div>
            </div>

            <div class="demo-panel">
              <div class="timer-card">
                <h3 style="margin:0 0 8px;">专注计时</h3>
                <div class="timer" id="timerText">25:00</div>
                <div class="progress"><div id="progressFill"></div></div>
                <div class="pill-row">
                  <span class="pill" id="focusState">未开始</span>
                </div>
                <div class="demo-actions" style="margin-top:14px;">
                  <button class="primary" id="focusBtn">开始 / 暂停</button>
                </div>
              </div>

              <div class="todo-card">
                <h3 style="margin:0 0 8px;">小目标</h3>
                <div class="todo-input">
                  <input id="todoInput" type="text" placeholder="输入一个小目标…" />
                  <button class="secondary" id="addTodoBtn">添加</button>
                </div>
                <ul class="todo-list" id="todoList">
                  <li class="todo-item">
                    <span class="check"></span>
                    <span>开始第一轮专注</span>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="./assets/vendor/babylon.js"></script>
  <script src="./assets/vendor/babylonjs.loaders.min.js"></script>
  <script src="./assets/memecat-data.js"></script>
  <script>
    const body = document.body;
    const introOverlay = document.getElementById("introOverlay");
    const introLayers = Array.from(document.querySelectorAll(".intro-layer"));
    const skipIntro = document.getElementById("skipIntro");
    const introProgress = document.getElementById("introProgress");
    const speech = document.getElementById("catSpeech");
    const catWrap = document.getElementById("catWrap");
    const catCanvas = document.getElementById("catCanvas");
    const petHearts = document.getElementById("petHearts");
    const encourageBtn = document.getElementById("encourageBtn");
    const restBtn = document.getElementById("restBtn");
    const focusBtn = document.getElementById("focusBtn");
    const timerText = document.getElementById("timerText");
    const progressFill = document.getElementById("progressFill");
    const focusState = document.getElementById("focusState");
    const todoInput = document.getElementById("todoInput");
    const addTodoBtn = document.getElementById("addTodoBtn");
    const todoList = document.getElementById("todoList");

    const encourageLines = [
      "先完成一个很小的步骤吧，我会一直在这儿陪你。",
      "不用一下子全做完，能开始就已经很厉害了。",
      "你现在推进的每一分钟，都会变成后面的轻松。",
      "卡住也没关系，我们把任务再拆小一点点。"
    ];

    const restLines = [
      "喝一口水，眨眨眼睛，再回来也完全来得及。",
      "休息不是中断进度，是为了让下一轮更稳。",
      "现在适合站起来走两步，我帮你守着这页。"
    ];

    const petLines = [
      "喵，我在。你继续写，我帮你守住今天这点专注。",
      "被你摸到了，奖励你现在就开始第一小步。",
      "我已经收到你的点击啦，接下来一起推进当前任务。",
      "喵呜，别怕难，我们先把眼前这一段做完。"
    ];

    let introStep = 0;
    let speakTimer = null;
    let memecatEngine = null;
    let memecatScene = null;
    let memecatRoot = null;
    let memecatBlobUrl = null;
    let memecatBaseY = 0;
    let memecatBasePosY = 0;
    let memecatLastInteractAt = 0;
    let memecatCamera = null;
    let memecatCameraBaseAlpha = 0;
    let memecatIsDragging = false;
    let memecatReturnStartAt = 0;
    let memecatReturnFromAlpha = 0;
    let memecatReturnFromBeta = 0;
    let memecatReturnFromRadius = 0;
    let memecatAutoStartAt = 0;
    let memecatWheelTimer = null;
    const memecatCameraBaseBeta = 0.88;
    const memecatCameraMinRadius = 2.05;

    const dots = introLayers.map(() => {
      const dot = document.createElement("span");
      dot.className = "intro-dot";
      introProgress.appendChild(dot);
      return dot;
    });

    function renderIntroStack() {
      introLayers.forEach((layer, index) => {
        layer.classList.remove("is-back", "is-back-2");
        if (index === introStep + 1) {
          layer.classList.add("is-back");
        }
        if (index >= introStep + 2) {
          layer.classList.add("is-back-2");
        }
        layer.style.zIndex = String(20 - index);
      });

      dots.forEach((dot, index) => {
        dot.classList.toggle("active", index === introStep);
      });
    }

    function completeIntro() {
      body.classList.add("intro-complete");
      introOverlay.classList.add("hidden");
      skipIntro.classList.add("hidden");
    }

    function nextIntroStep() {
      const currentLayer = introLayers[introStep];
      if (!currentLayer) {
        completeIntro();
        return;
      }

      currentLayer.classList.add("exit");
      introStep += 1;
      renderIntroStack();

      if (introStep >= introLayers.length) {
        setTimeout(completeIntro, 620);
      }
    }

    introLayers.forEach((layer) => {
      layer.addEventListener("click", nextIntroStep);
    });

    skipIntro.addEventListener("click", completeIntro);

    renderIntroStack();

    function base64ToBlobUrl(base64, mimeType) {
      const binary = atob(base64);
      const length = binary.length;
      const bytes = new Uint8Array(length);
      for (let i = 0; i < length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      const blob = new Blob([bytes], { type: mimeType });
      return URL.createObjectURL(blob);
    }

    async function initMemecatModel() {
      if (!window.BABYLON || !window.MEMECAT_GLB_BASE64 || !catCanvas) {
        return;
      }

      memecatBlobUrl = base64ToBlobUrl(
        window.MEMECAT_GLB_BASE64,
        window.MEMECAT_GLB_MIME || "model/gltf-binary"
      );

      memecatEngine = new BABYLON.Engine(catCanvas, true, {
        preserveDrawingBuffer: true,
        stencil: true,
        adaptToDeviceRatio: true
      });

      memecatScene = new BABYLON.Scene(memecatEngine);
      memecatScene.clearColor = new BABYLON.Color4(0, 0, 0, 0);

      const camera = new BABYLON.ArcRotateCamera(
        "memecat-camera",
        -Math.PI / 2,
        0.92,
        2.2,
        new BABYLON.Vector3(0, 0.7, 0),
        memecatScene
      );
      memecatCamera = camera;
      camera.attachControl(catCanvas, true);
      camera.lowerRadiusLimit = 1.15;
      camera.upperRadiusLimit = 5.6;
      camera.wheelPrecision = 24;
      camera.panningSensibility = 0;
      camera.useBouncingBehavior = false;

      const markMemecatInteraction = () => {
        memecatLastInteractAt = performance.now();
        memecatReturnStartAt = 0;
      };

      const startMemecatDrag = () => {
        memecatIsDragging = true;
        markMemecatInteraction();
      };

      const finishMemecatInteraction = () => {
        if (!memecatCamera) return;
        memecatIsDragging = false;
        memecatLastInteractAt = performance.now();
        memecatReturnFromAlpha = memecatCamera.alpha;
        memecatReturnFromBeta = memecatCamera.beta;
        memecatReturnFromRadius = memecatCamera.radius;
        memecatReturnStartAt = performance.now();
      };

      catCanvas.addEventListener("pointerdown", startMemecatDrag);
      window.addEventListener("pointerup", finishMemecatInteraction);
      catCanvas.addEventListener("wheel", () => {
        markMemecatInteraction();
        if (memecatWheelTimer) {
          clearTimeout(memecatWheelTimer);
        }
        memecatWheelTimer = setTimeout(finishMemecatInteraction, 260);
      }, { passive: true });
      catCanvas.addEventListener("touchstart", startMemecatDrag, { passive: true });
      window.addEventListener("touchend", finishMemecatInteraction, { passive: true });

      const hemi = new BABYLON.HemisphericLight(
        "memecat-hemi",
        new BABYLON.Vector3(0, 1, 0),
        memecatScene
      );
      hemi.intensity = 1.2;

      const fill = new BABYLON.DirectionalLight(
        "memecat-fill",
        new BABYLON.Vector3(-0.4, -1, 0.25),
        memecatScene
      );
      fill.position = new BABYLON.Vector3(2, 5, -2);
      fill.intensity = 1.4;

      const rim = new BABYLON.PointLight(
        "memecat-rim",
        new BABYLON.Vector3(-2.2, 2.2, -1.8),
        memecatScene
      );
      rim.intensity = 20;
      rim.range = 12;

      const result = await BABYLON.SceneLoader.ImportMeshAsync(
        "",
        "",
        memecatBlobUrl,
        memecatScene,
        undefined,
        ".glb"
      );

      memecatRoot = new BABYLON.TransformNode("memecat-root", memecatScene);
      const importedRootNodes = [
        ...result.transformNodes,
        ...result.meshes
      ].filter((node) => node && !node.parent && node !== memecatRoot);

      importedRootNodes.forEach((node) => {
        node.parent = memecatRoot;
      });

      const childMeshes = result.meshes.filter((mesh) => {
        return mesh && typeof mesh.getTotalVertices === "function" && mesh.getTotalVertices() > 0;
      });
      childMeshes.forEach((mesh) => {
        mesh.receiveShadows = false;
        mesh.isPickable = false;
      });

      const bounds = BABYLON.Mesh.MinMax(childMeshes);
      const size = bounds.max.subtract(bounds.min);
      const center = bounds.min.add(size.scale(0.5));
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const scale = 1.75 / maxDim;

      memecatRoot.scaling = new BABYLON.Vector3(scale, scale, scale);
      memecatBasePosY = -bounds.min.y * scale - 0.14;
      memecatRoot.position = new BABYLON.Vector3(
        -center.x * scale,
        memecatBasePosY,
        -center.z * scale
      );
      memecatBaseY = Math.PI;
      memecatRoot.rotation = new BABYLON.Vector3(0, memecatBaseY, 0);

      camera.beta = memecatCameraBaseBeta;
      camera.target = new BABYLON.Vector3(0, Math.max(0.48, size.y * scale * 0.36), 0);
      camera.radius = Math.max(memecatCameraMinRadius, maxDim * scale * 1.7);
      memecatCameraBaseAlpha = -Math.PI / 2;
      camera.alpha = memecatCameraBaseAlpha;
      memecatLastInteractAt = 0;
      memecatAutoStartAt = performance.now();

      memecatScene.registerBeforeRender(() => {
        if (!memecatRoot) return;
        const now = performance.now();

        if (!memecatIsDragging && memecatReturnStartAt > 0) {
          const returnProgress = Math.min(1, (now - memecatReturnStartAt) / 1100);
          const eased = 1 - Math.pow(1 - returnProgress, 3);
          camera.alpha = memecatReturnFromAlpha + (memecatCameraBaseAlpha - memecatReturnFromAlpha) * eased;
          camera.beta = memecatReturnFromBeta + (memecatCameraBaseBeta - memecatReturnFromBeta) * eased;
          camera.radius = memecatReturnFromRadius + (Math.max(memecatCameraMinRadius, maxDim * scale * 1.7) - memecatReturnFromRadius) * eased;
          if (returnProgress >= 1) {
            camera.alpha = memecatCameraBaseAlpha;
            camera.beta = memecatCameraBaseBeta;
            camera.radius = Math.max(memecatCameraMinRadius, maxDim * scale * 1.7);
            memecatReturnStartAt = 0;
            memecatLastInteractAt = 0;
            memecatAutoStartAt = now;
          }
        } else if (!memecatIsDragging && now - memecatLastInteractAt > 600) {
          const autoT = (now - memecatAutoStartAt) * 0.001;
          camera.alpha = memecatCameraBaseAlpha + Math.sin(autoT * 0.44) * (Math.PI / 4);
        }

        const t = now * 0.001;
        memecatRoot.position.y = memecatBasePosY + Math.sin(t * 1.2) * 0.028;
      });

      memecatEngine.runRenderLoop(() => {
        if (memecatScene) {
          memecatScene.render();
        }
      });

      window.addEventListener("resize", () => {
        if (memecatEngine) {
          memecatEngine.resize();
        }
      });
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function makeCatSpeak(text, duration = 1800) {
      speech.textContent = text;
      if (speakTimer) {
        clearTimeout(speakTimer);
      }
      speakTimer = setTimeout(() => {
      }, duration);
    }

    encourageBtn.addEventListener("click", () => {
      makeCatSpeak(pick(encourageLines), 2200);
    });

    restBtn.addEventListener("click", () => {
      makeCatSpeak(pick(restLines), 2200);
      focusState.textContent = "建议休息";
    });

    function popHeart() {
      const heart = document.createElement("span");
      const icons = ["❤", "✨", "🐾"];
      heart.className = "pet-heart";
      heart.textContent = pick(icons);
      heart.style.left = `${38 + Math.random() * 24}%`;
      heart.style.setProperty("--x", `${-50 + (Math.random() * 40 - 20)}px`);
      petHearts.appendChild(heart);
      heart.addEventListener("animationend", () => heart.remove(), { once: true });
    }

    function petCat() {
      memecatLastInteractAt = performance.now();
      makeCatSpeak(pick(petLines), 1600);
      catWrap.classList.remove("is-petted");
      void catWrap.offsetWidth;
      catWrap.classList.add("is-petted");
      popHeart();
      if (Math.random() > 0.45) {
        setTimeout(popHeart, 120);
      }
      setTimeout(() => {
        catWrap.classList.remove("is-petted");
      }, 450);
    }

    catWrap.addEventListener("click", petCat);
    catWrap.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        petCat();
      }
    });

    let totalSeconds = 25 * 60;
    let remainingSeconds = totalSeconds;
    let timer = null;

    function renderTimer() {
      const min = String(Math.floor(remainingSeconds / 60)).padStart(2, "0");
      const sec = String(remainingSeconds % 60).padStart(2, "0");
      timerText.textContent = `${min}:${sec}`;
      const progress = ((totalSeconds - remainingSeconds) / totalSeconds) * 100;
      progressFill.style.width = `${Math.max(0, Math.min(100, progress))}%`;
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    focusBtn.addEventListener("click", () => {
      if (timer) {
        stopTimer();
        focusBtn.textContent = "继续专注";
        focusState.textContent = "已暂停";
        makeCatSpeak("暂停一下也没关系，整理好思路再回来。", 1800);
        return;
      }

      if (remainingSeconds === 0) {
        remainingSeconds = totalSeconds;
      }

      focusState.textContent = "专注中";
      focusBtn.textContent = "暂停";
      makeCatSpeak("好的，现在进入专注时间，我会安静陪你。", 1800);

      timer = setInterval(() => {
        remainingSeconds -= 1;
        renderTimer();

        if (remainingSeconds <= 0) {
          stopTimer();
          remainingSeconds = 0;
          renderTimer();
          focusState.textContent = "已完成";
          focusBtn.textContent = "再来一轮";
          makeCatSpeak("这一轮完成啦，你真的推进了很重要的一步。", 2200);
        }
      }, 1000);
    });

    function bindTodoItem(item) {
      const check = item.querySelector(".check");
      check.addEventListener("click", () => {
        item.classList.toggle("done");
        if (item.classList.contains("done")) {
          makeCatSpeak("收到一项完成，我决定认真夸夸你。", 1800);
        }
      });
    }

    Array.from(document.querySelectorAll(".todo-item")).forEach(bindTodoItem);

    addTodoBtn.addEventListener("click", () => {
      const value = todoInput.value.trim();
      if (!value) return;

      const item = document.createElement("li");
      item.className = "todo-item";
      item.innerHTML = '<span class="check"></span><span></span>';
      item.querySelector("span:last-child").textContent = value;
      todoList.prepend(item);
      bindTodoItem(item);
      todoInput.value = "";
      makeCatSpeak("新目标已经记下来了，我们一个一个解决。", 1800);
    });

    todoInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        addTodoBtn.click();
      }
    });

    renderTimer();
    initMemecatModel().catch((error) => {
      console.error("memecat model init failed:", error);
      speech.textContent = "meme.glb 暂时没载入成功，我们可以继续换 dog.glb 再试。";
    });
  </script>
</body>
