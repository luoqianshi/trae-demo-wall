      width: 80px;

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(13, 148, 136, 0.4); }

    }

      font-size: 0.75rem;

    }
    .result-actions {
      display: flex;

    .btn-small {

    /* Library Section */
    .library-header {
      display: flex;

      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .library-card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);

    }
    .library-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .library-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .library-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }
    .library-card-title {
      font-weight: 600;

    }
    .library-card-source {

    }

    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--text-secondary);
    }
    .empty-state-icon {

      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content { flex-direction: column; gap: 16px; }
      .hero h1 { font-size: 1.6rem; }
      .input-box { flex-direction: column; }
      .results-header { flex-direction: column; gap: 12px; align-items: flex-start; }
      .result-card { flex-wrap: wrap; }
      .result-actions { width: 100%; justify-content: flex-end; }
      .library-grid { grid-template-columns: 1fr; }
      .loading-steps { flex-direction: column; gap: 16px; }
    }
  </style>

<body>

  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">🎯</div>
        Collectify
      </div>
      <nav class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('extract')">🔗 链接提取</button>
        <button class="nav-tab" onclick="switchTab('library')">📚 我的收藏</button>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Extract Tab -->
    <div id="extract-tab" class="tab-content active">
      <div class="hero">
        <h1>AI 智能链接提取</h1>
        <p>粘贴视频链接，AI自动提取所有网址、工具、书籍，一键直达</p>
      </div>

      <div class="input-section">
        <div class="input-label">
          <span>📋</span>
          粘贴视频链接
        </div>
        <div class="input-box">
          <input type="text" id="videoUrl" placeholder="https://v.douyin.com/xxxxx 或 https://www.xiaohongshu.com/..." />
          <button class="btn-primary" id="extractBtn" onclick="startExtract()">
            ✨ AI解析
          </button>
        </div>
        <div class="demo-hint">
          <span>💡</span>
          <span>Demo模式：输入任意链接即可体验，或试试 <code>demo</code> 查看示例结果</span>
        </div>
      </div>

      <!-- Loading -->
      <div class="loading-section" id="loadingSection">
        <div class="ai-brain">🧠</div>
        <div class="loading-text">AI正在解析视频内容...</div>
        <div class="loading-subtext">语音转文字 + 画面识别 + 实体提取</div>
        <div class="loading-steps">
          <div class="loading-step" id="step1">
            <div class="loading-step-icon">🎵</div>
            <div class="loading-step-label">语音转文字</div>
          </div>
          <div class="loading-step" id="step2">
            <div class="loading-step-icon">👁️</div>
            <div class="loading-step-label">画面识别</div>
          </div>
          <div class="loading-step" id="step3">
            <div class="loading-step-icon">🏷️</div>
            <div class="loading-step-label">提取实体</div>
          </div>
          <div class="loading-step" id="step4">
            <div class="loading-step-icon">📊</div>
            <div class="loading-step-label">生成清单</div>
          </div>
        </div>
      </div>

      <!-- Results -->
      <div class="results-section" id="resultsSection">
        <div class="results-header">
          <div class="results-title">📋 提取结果</div>
          <span class="results-count" id="resultsCount">找到 6 个结果</span>
        </div>
        <div class="results-actions">
          <button class="btn-secondary" onclick="openAll()">🚀 一键打开全部</button>
          <button class="btn-secondary" onclick="saveAll()">💾 全部收藏</button>
        </div>
        <div class="result-list" id="resultList">
          <!-- Results will be inserted here -->
        </div>
      </div>
    </div>

    <!-- Library Tab -->
    <div id="library-tab" class="tab-content">
      <div class="library-header">
        <h2 style="font-size: 1.3rem;">📚 我的收藏</h2>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterLibrary('all')">全部</button>
          <button class="filter-tab" onclick="filterLibrary('tool')">🔧 工具</button>
          <button class="filter-tab" onclick="filterLibrary('book')">📖 书籍</button>
          <button class="filter-tab" onclick="filterLibrary('link')">🔗 链接</button>
        </div>
      </div>
      <div class="library-grid" id="libraryGrid">
        <!-- Library items will be inserted here -->
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // Demo Data
    const demoResults = [
      {
        id: 1,
        type: 'tool',
        icon: '🛠️',
        name: 'Notion AI',
        desc: 'AI驱动的笔记与协作工具，支持智能写作和知识管理',
        tags: ['笔记工具', 'AI写作'],
        url: 'https://www.notion.so'
      },
      {
        id: 2,
        type: 'tool',
        icon: '🎨',
        name: 'Midjourney',
        desc: 'AI图像生成工具，通过文字描述创作高质量图片',
        tags: ['AI绘画', '设计工具'],
        url: 'https://www.midjourney.com'
      },
      {
        id: 3,
        type: 'book',
        icon: '📖',
        name: '《深度工作》',
        desc: '卡尔·纽波特著，教你如何在分心的世界中专注成功',
        tags: ['效率', '自我提升'],
        url: 'https://book.douban.com/subject/27056409/'
      },
      {
        id: 4,
        type: 'link',
        icon: '🌐',
        name: 'AI工具导航站',
        desc: '收录1000+AI工具的分类导航网站，快速找到适合的工具',
        tags: ['导航', '资源'],
        url: 'https://www.aitools.com'
      },
      {
        id: 5,
        type: 'tool',
        icon: '📝',
        name: 'ChatGPT',
        desc: 'OpenAI开发的对话AI，可用于写作、编程、学习等多种场景',
        tags: ['AI对话', '生产力'],
        url: 'https://chat.openai.com'
      },
      {
        id: 6,
        type: 'book',
        icon: '📚',
        name: '《原子习惯》',
        desc: '詹姆斯·克利尔著，通过微小改变实现巨大成就的实用指南',
        tags: ['习惯', '成长'],
        url: 'https://book.douban.com/subject/34326931/'
      }
    ];

    let savedItems = [];
    let currentResults = [];

    // Tab Switching
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tab + '-tab').classList.add('active');
      event.target.classList.add('active');
      if (tab === 'library') renderLibrary();
    }

    // Start Extraction
    function startExtract() {
      const url = document.getElementById('videoUrl').value.trim();
      if (!url) {
        showToast('请输入视频链接');
        return;
      }

      document.getElementById('extractBtn').disabled = true;
      document.getElementById('resultsSection').classList.remove('active');
      document.getElementById('loadingSection').classList.add('active');

      // Simulate AI processing steps
      const steps = ['step1', 'step2', 'step3', 'step4'];
      steps.forEach((step, i) => {
        setTimeout(() => {
          document.getElementById(step).classList.add('active');
        }, i * 600);
      });

      // Show results after animation
      setTimeout(() => {
        document.getElementById('loadingSection').classList.remove('active');
        document.getElementById('resultsSection').classList.add('active');
        document.getElementById('extractBtn').disabled = false;
        
        currentResults = demoResults;
        renderResults();
        showToast('✅ 解析完成！找到 ' + demoResults.length + ' 个结果');
      }, 3000);
    }

    // Render Results
    function renderResults() {
      const list = document.getElementById('resultList');
      list.innerHTML = currentResults.map(item => `
        <div class="result-card" data-id="${item.id}">
          <div class="result-icon ${item.type}">${item.icon}</div>
          <div class="result-info">
            <div class="result-name">${item.name}</div>
            <div class="result-desc">${item.desc}</div>
            <div class="result-tags">
              ${item.tags.map(tag => `<span class="result-tag">${tag}</span>`).join('')}
            </div>
          </div>
          <div class="result-actions">
            <button class="btn-small btn-open" onclick="openLink('${item.url}')">打开</button>
            <button class="btn-small btn-save" id="save-${item.id}" onclick="saveItem(${item.id})">收藏</button>
          </div>
        </div>
      `).join('');
      
      document.getElementById('resultsCount').textContent = `找到 ${currentResults.length} 个结果`;
    }

    // Open Link
    function openLink(url) {
      window.open(url, '_blank');
      showToast('🌐 正在打开链接...');
    }

    // Open All
    function openAll() {
      currentResults.forEach((item, i) => {
        setTimeout(() => window.open(item.url, '_blank'), i * 300);
      });
      showToast('🚀 正在批量打开 ' + currentResults.length + ' 个链接');
    }

    // Save Item
    function saveItem(id) {
      const item = currentResults.find(r => r.id === id);
      if (!item) return;
      
      if (!savedItems.find(s => s.id === id)) {
        savedItems.push({...item, savedAt: new Date().toLocaleDateString()});
        const btn = document.getElementById('save-' + id);
        btn.textContent = '已收藏';
        btn.classList.add('btn-saved');
        showToast('✅ 已收藏到知识库');
      } else {
        showToast('⚠️ 已经收藏过了');
      }
    }

    // Save All
    function saveAll() {
      let count = 0;
      currentResults.forEach(item => {
        if (!savedItems.find(s => s.id === item.id)) {
          savedItems.push({...item, savedAt: new Date().toLocaleDateString()});
          count++;
        }
      });
      
      // Update all buttons
      currentResults.forEach(item => {
        const btn = document.getElementById('save-' + item.id);
        if (btn) {
          btn.textContent = '已收藏';
          btn.classList.add('btn-saved');
        }
      });
      
      showToast('✅ 已批量收藏 ' + count + ' 个内容');
    }

    // Render Library
    function renderLibrary(filter = 'all') {
      const grid = document.getElementById('libraryGrid');
      
      if (savedItems.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="empty-state-icon">📭</div>
            <div>还没有收藏内容</div>
            <div style="font-size: 0.85rem; margin-top: 8px;">去"链接提取"页面收藏一些内容吧</div>
          </div>
        `;
        return;
      }
      
      const items = filter === 'all' ? savedItems : savedItems.filter(item => item.type === filter);
      
      grid.innerHTML = items.map(item => `
        <div class="library-card">
          <div class="library-card-header">
            <div class="library-card-icon" style="background: ${getTypeColor(item.type)}">${item.icon}</div>
            <div>
              <div class="library-card-title">${item.name}</div>
              <div class="library-card-source">${item.tags.join(' · ')}</div>
            </div>
          </div>
          <div class="library-card-desc">${item.desc}</div>
          <div class="library-card-footer">
            <span class="library-card-date">📅 ${item.savedAt}</span>
            <button class="btn-small btn-open" onclick="openLink('${item.url}')">打开</button>
          </div>
        </div>
      `).join('');
    }

    // Filter Library
    function filterLibrary(type) {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderLibrary(type);
    }

    // Get Type Color
    function getTypeColor(type) {
      const colors = {
        tool: '#dbeafe',
        book: '#fce7f3',
        link: '#d1fae5',
        video: '#fef3c7'
      };
      return colors[type] || '#f3f4f6';
    }

    // Show Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Enter key to submit
    document.getElementById('videoUrl').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') startExtract();
    });
  </script>

</body>
</html>
