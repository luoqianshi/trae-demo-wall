  (function() {
    var STATE = {

    function $ (sel, root) { return (root || document).querySelector(sel); }
    function $all (sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

    function now() {
      var d = new Date();
      var pad = function(n) { return String(n).padStart(2, "0"); };
      return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    }
    function genTicketId() {
      var d = new Date();
      var pad = function(n) { return String(n).padStart(2, "0"); };
      return "T-" + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + "-" + String(Math.floor(Math.random() * 900) + 100);
    }
    function categoryMeta(key) { return window.MOCK.categories.find(function(c) { return c.key === key; }) || window.MOCK.categories[0]; }

    function getLocation(callback) {
      if (!navigator.geolocation) {
        callback({ success: false, error: "您的浏览器不支持定位功能" });
        return;
      }
      navigator.geolocation.getCurrentPosition(function(position) {
        var lat = position.coords.latitude;
        var lng = position.coords.longitude;
        reverseGeocode(lat, lng, function(result) {
          callback({ success: true, lat: lat, lng: lng, address: result });
        });
      }, function(error) {
        var msg = "定位失败";
        switch(error.code) {
          case error.PERMISSION_DENIED: msg = "定位权限被拒绝"; break;
          case error.POSITION_UNAVAILABLE: msg = "无法获取位置"; break;
          case error.TIMEOUT: msg = "定位超时"; break;
        }
        callback({ success: false, error: msg });
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
    }

    function reverseGeocode(lat, lng, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lng + "&accept-language=zh&zoom=18", true);
      xhr.setRequestHeader("User-Agent", "CityCareDemo/1.0");
      xhr.onload = function() {
        if (xhr.status === 200) {
          var data = JSON.parse(xhr.responseText);
          var addr = data.address || {};
          var province = addr.province || addr.state || "";
          var city = addr.city || addr.town || addr.village || addr.county || "";
          var district = addr.district || addr.suburb || "";
          var road = addr.road || addr.street || "";
          var houseNumber = addr.house_number || "";
          var parts = [];
          if (province && province !== city) parts.push(province);
          if (city) parts.push(city);
          if (district && district !== city) parts.push(district);
          if (road) parts.push(houseNumber ? road + " " + houseNumber + "号" : road);
          var result = parts.length > 0 ? parts.join(" · ") : "位置获取成功";
          callback(result);
        } else {
          callback("位置获取成功");
        }
      };
      xhr.onerror = function() { callback("位置获取成功"); };
      xhr.send();
    }

    function initCamera(videoEl, callback) {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        callback({ success: false, error: "您的浏览器不支持相机功能" });
        return;
      }
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false })
        .then(function(stream) { videoEl.srcObject = stream; videoEl.play(); callback({ success: true, stream: stream }); })
        .catch(function(error) {
          var msg = "相机访问失败";
          if (error.name === "NotAllowedError") msg = "相机权限被拒绝";
          else if (error.name === "NotFoundError") msg = "未检测到相机";
          callback({ success: false, error: msg });
        });
    }

    function capturePhoto(videoEl, canvasEl) {
      var canvas = canvasEl;
      canvas.width = videoEl.videoWidth || 1280;
      canvas.height = videoEl.videoHeight || 720;
      canvas.getContext("2d").drawImage(videoEl, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL("image/jpeg", 0.85);
    }

    function stopCamera(stream) {
      if (stream) stream.getTracks().forEach(function(track) { track.stop(); });

      var statusMap = { "ai-pending": "bg-amber-100 text-amber-600", "dispatched": "bg-indigo-100 text-indigo-600", "queued": "bg-gray-100 text-gray-600", "closed": "bg-green-100 text-green-600" };
      var statusLabels = { "ai-pending": "AI识别中", "dispatched": "已派单", "queued": "待受理", "closed": "已办结" };
      return '<div data-ticket-id="' + t.id + '" class="track-card bg-white rounded-xl p-4 shadow-card border border-gray-100 card-hover cursor-pointer"><div class="flex items-center gap-3"><div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-100 to-purple-100 flex items-center justify-center text-xl">' + meta.icon + '</div><div class="flex-1 min-w-0"><div class="flex items-center justify-between gap-2"><span class="font-medium text-gray-800">' + t.title + '</span><span class="text-xs font-medium ' + (statusMap[t.status] || statusMap.queued) + ' px-2.5 py-1 rounded-full">' + (statusLabels[t.status] || "待受理") + '</span></div><div class="text-xs text-gray-500 mt-1">📍 ' + t.address + '</div><div class="text-xs text-gray-400 mt-0.5">' + t.id + ' · ' + t.createdAt + '</div>' + (t.status === "closed" && t.imgBefore ? '<div class="mt-2 rounded-lg border border-green-200 overflow-hidden flex"><img src="' + t.imgBefore + '" class="w-16 h-16 object-cover" /><div class="w-16 h-16 bg-green-100 flex items-center justify-center text-xs font-medium text-green-600">处理后</div></div>' : "") + '</div><div class="text-gray-300">›</div></div></div>';
    }

    function buildTicketDetailPage(id) {
      var t = STATE.tickets.find(function(x) { return x.id === id; }) || STATE.tickets[0];
      var el = document.createElement("main");
      el.className = "px-4 py-6";
      var meta = categoryMeta(t.category);

      el.innerHTML = '<div class="mb-6"><button id="btn-back" class="inline-flex items-center gap-1 text-gray-500 hover:text-gray-700 transition mb-4">← 返回工单列表</button><div class="text-xs text-gray-500 font-mono">工单编号：' + t.id + '</div><h1 class="text-xl font-bold text-gray-800 mt-1">' + meta.icon + ' ' + t.title + '</h1><p class="text-sm text-gray-500 mt-1">📍 ' + t.address + ' · ' + t.createdAt + '</p></div><div class="bg-white rounded-2xl shadow-card border border-gray-100 p-4 mb-4"><h2 class="font-semibold text-gray-800 mb-4">处理进度</h2><ol class="space-y-4">' + [{ok: true, title: "您提交了上报", time: t.createdAt, desc: t.description}, {ok: !!t.aiRecognizedAt, title: "AI 完成初审", time: t.aiRecognizedAt, desc: t.aiResult || "识别中..."}, {ok: !!t.dispatchedAt, title: "自动派单至 " + meta.targetDept, time: t.dispatchedAt, desc: "工单已进入处理队列"}, {ok: !!t.processedAt, title: "现场处置完成", time: t.processedAt, desc: t.processingNote || "工作人员已到达现场"}, {ok: t.status === "closed", title: "工单办结", time: t.closedAt, desc: "感谢您的反馈"}].map(function(s) { return '<li class="relative pl-6 border-l-2 ' + (s.ok ? "border-indigo-300" : "border-gray-200") + '"><span class="absolute -left-2.5 top-0 w-5 h-5 rounded-full ' + (s.ok ? "bg-indigo-500 ring-4 ring-indigo-100" : "bg-gray-300") + '"></span><div class="' + (s.ok ? "font-medium text-gray-800" : "text-gray-400") + '">' + s.title + '</div><div class="text-xs text-gray-500 mt-0.5">' + (s.time || "待触发") + '</div><div class="text-xs text-gray-600 mt-1">' + s.desc + '</div></li>'; }).join("") + '</ol></div><div class="bg-white rounded-2xl shadow-card border border-gray-100 overflow-hidden mb-4"><div class="px-4 py-3 border-b border-gray-100"><h2 class="font-semibold text-gray-800">问题详情</h2></div><div class="p-4"><div class="bg-gray-50 rounded-lg p-3 text-sm text-gray-700">' + t.description + '</div><div class="mt-3 grid grid-cols-2 gap-2"><div class="bg-gray-50 rounded-lg p-2"><div class="text-xs text-gray-500">分类</div><div class="text-sm font-medium">' + meta.icon + ' ' + meta.label + '</div></div><div class="bg-gray-50 rounded-lg p-2"><div class="text-xs text-gray-500">派单部门</div><div class="text-sm font-medium text-indigo-600">' + meta.targetDept + '</div></div></div></div></div><div class="bg-white rounded-2xl shadow-card border border-gray-100 overflow-hidden mb-4"><div class="px-4 py-3 border-b border-gray-100"><h2 class="font-semibold text-gray-800">对比照片</h2></div><div class="grid grid-cols-2"><div class="p-2 border-r border-gray-100"><div class="text-xs text-gray-500 mb-2 text-center">上报时</div><div class="aspect-video bg-gray-100 rounded-lg overflow-hidden">' + (t.imgBefore ? '<img src="' + t.imgBefore + '" class="w-full h-full object-cover" />' : '<div class="w-full h-full flex items-center justify-center text-gray-400">无图片</div>') + '</div></div><div class="p-2"><div class="text-xs text-gray-500 mb-2 text-center">' + (t.status === "closed" ? "处理后" : "待处理") + '</div><div class="aspect-video bg-gray-100 rounded-lg overflow-hidden">' + (t.imgAfter ? '<img src="' + t.imgAfter + '" class="w-full h-full object-cover" />' : (t.status === "closed" ? '<div class="w-full h-full flex items-center justify-center text-green-500">✅ 已处理</div>' : '<div class="w-full h-full flex items-center justify-center text-gray-400">等待处理</div>')) + '</div></div></div></div><div class="flex gap-3"><button id="btn-goto-track" class="flex-1 bg-gray-100 text-gray-700 font-semibold py-3 rounded-xl hover:bg-gray-200 transition btn-press">返回工单列表</button><button id="btn-goto-report" class="flex-1 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-semibold py-3 rounded-xl hover:shadow-lg transition btn-press">继续上报</button></div>';

      $("#btn-back", el).addEventListener("click", function() { navigate("track"); });
      $("#btn-goto-track", el).addEventListener("click", function() { navigate("track"); });
      $("#btn-goto-report", el).addEventListener("click", function() { navigate("report"); });
      return el;
    }

    render();
  })();
  </script>
</body>
</html>
