<section class="page help" id="help"><div class="top"><button class="back" data-go="home">‹</button><div class="title">一键找儿女</div></div><div class="hero"><h1>叫家人帮我看看</h1><p>会把刚才拍的照片一起发过去</p></div><div class="attach"><div class="thumb"></div><div><small>已附带刚才的照片</small><b id="attachName">产品 / 海报照片</b></div></div><div class="fam on"><div class="avatar">儿</div><div><b>儿子 · 小李</b><small>在线，通常 5 分钟内回复</small></div><div class="check">✓</div></div><div class="fam"><div class="avatar" style="background:#FF6B97">女</div><div><b>女儿 · 小芳</b><small>在线</small></div><div class="check" style="display:none">✓</div></div><button class="primary send" id="sendHelp">发送求助</button></section><div class="toast" id="toast"></div></div>
<script>
let mode='product';const pages=[...document.querySelectorAll('.page')],toast=document.getElementById('toast');function show(id){pages.forEach(p=>p.classList.toggle('on',p.id===id));}
function tip(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1600)}
document.addEventListener('click',e=>{const b=e.target.closest('[data-go]');if(!b)return; if(b.dataset.mode){mode=b.dataset.mode;document.getElementById('camTip').textContent=mode==='product'?'对准包装拍一张':'对准海报拍一张';document.getElementById('scanTitle').textContent=mode==='product'?'把产品放进黄框中央':'把海报放进黄框中央';document.getElementById('attachName').textContent=mode==='product'?'刚拍的产品包装':'刚拍的活动海报'} show(b.dataset.go)});
document.getElementById('shoot').onclick=()=>{show('loading');setTimeout(()=>{const activity=mode==='activity';document.getElementById('photoWord').textContent=activity?'义诊':'养生';document.getElementById('resultTop').textContent=activity?'活动辨真假':'核验结果';document.getElementById('resultTag').textContent=activity?'留意一下':'拿捏不准';document.getElementById('resultTag').className='tag '+(activity?'activity':'');document.getElementById('resultTitle').innerHTML=activity?'免费义诊多为推销活动<br>建议先问问家人':'这个东西不值这个价<br>建议先问问家人';document.getElementById('priceBox').style.display=activity?'none':'grid';show('result')},900)}
document.querySelectorAll('.fam').forEach(f=>f.onclick=()=>{document.querySelectorAll('.fam').forEach(x=>{x.classList.remove('on');x.querySelector('.check').style.display='none'});f.classList.add('on');f.querySelector('.check').style.display='grid'});
document.getElementById('sendHelp').onclick=()=>tip('已发给家人，请等电话或微信回复');document.getElementById('voice').onclick=()=>tip('正在播放每日安心语音');
</script></body></html>
