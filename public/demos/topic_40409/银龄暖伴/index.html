<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银龄暖伴 - 爸妈的手机里，也该有一个懂他们的人</title>
    <style>
        /* ===== CSS 变量定义 ===== */
        :root {
            --primary-color: #FF8C00;
            --primary-hover: #E67E00;
            --bg-color: #FFF8DC;
            --text-color: #3E2723;
            --card-bg: #FFFFFF;
            --border-color: #FFD699;
            --shadow-color: rgba(255, 140, 0, 0.15);
            --success-color: #4CAF50;
            --warning-color: #FFC107;
            --danger-color: #F44336;
        }

        /* ===== 全局样式 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
            background: linear-gradient(145deg, #FFE0B2 0%, #FFCC80 30%, #FFB74D 60%, #FFA726 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* ===== 手机外壳 ===== */
        .phone-wrapper {
            /* 用于 JS 动态缩放 */
            transform-origin: center center;
        }
        .phone-frame {
            width: 390px;
            height: 844px;
            background: #111;
            border-radius: 55px;
            padding: 12px;
            box-shadow:
                0 0 0 2px #555,
                0 0 0 4px #222,
                0 40px 80px rgba(0,0,0,0.4),
                inset 0 0 6px rgba(255,255,255,0.05);
            position: relative;
        }

        /* 侧面按钮 */
        .phone-frame::before {
            content: '';
            position: absolute;
            right: -4px;
            top: 180px;
            width: 4px;
            height: 60px;
            background: #333;
            border-radius: 0 3px 3px 0;
        }
        .phone-frame::after {
            content: '';
            position: absolute;
            left: -4px;
            top: 160px;
            width: 4px;
            height: 35px;
            background: #333;
            border-radius: 3px 0 0 3px;
            box-shadow: 0 55px 0 #333, 0 95px 0 #333;
        }

        /* ===== 手机屏幕 ===== */
        .phone-screen {
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            border-radius: 44px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ===== 刘海 ===== */
        .notch {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 126px;
            height: 34px;
            background: #111;
            border-radius: 0 0 22px 22px;
            z-index: 200;
        }
        .notch::after {
            content: '';
            width: 10px;
            height: 10px;
            background: #1a2a3a;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            right: 22px;
            box-shadow: inset 0 0 3px rgba(50,120,180,0.5);
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            height: 54px;
            background: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 30px 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }
        .status-time { font-size: 15px; font-weight: 700; }
        .status-icons { display: flex; gap: 6px; align-items: center; font-size: 13px; }

        /* ===== 内容滚动区 ===== */
        .container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 16px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .container::-webkit-scrollbar { width: 0; }

        /* ===== 标题区域 ===== */
        .header {
            text-align: center;
            padding: 12px 8px 10px;
        }
        .header h1 {
            font-size: 26px;
            color: var(--primary-color);
            margin-bottom: 4px;
        }
        .header p {
            font-size: 14px;
            color: #999;
        }

        /* ===== 底部导航栏 ===== */
        .tab-nav {
            display: flex;
            gap: 0;
            background: var(--card-bg);
            border-top: 1.5px solid var(--border-color);
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .tab-btn {
            flex: 1;
            padding: 8px 4px 10px;
            font-size: 11px;
            font-weight: bold;
            border: none;
            background: transparent;
            color: #999;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            position: relative;
        }
        .tab-btn .tab-icon {
            font-size: 22px;
            transition: transform 0.25s ease;
        }
        .tab-btn .tab-label {
            font-size: 11px;
            line-height: 1;
        }
        .tab-btn.active {
            color: var(--primary-color);
        }
        .tab-btn.active .tab-icon {
            transform: scale(1.15);
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 2.5px;
            background: var(--primary-color);
            border-radius: 0 0 2px 2px;
        }

        /* ===== Tab 内容 ===== */
        .tab-content { display: none; animation: fadeIn 0.35s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 卡片 ===== */
        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px var(--shadow-color);
            border: 1.5px solid var(--border-color);
        }
        .card-title {
            font-size: 20px;
            color: var(--primary-color);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px dashed var(--border-color);
        }

        /* ===== 上传区域 ===== */
        .upload-area {
            border: 2.5px dashed var(--border-color);
            border-radius: 14px;
            padding: 30px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #FFFBF0;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary-color);
            background: #FFF5E6;
        }
        .upload-icon { font-size: 44px; margin-bottom: 10px; }
        .upload-text { font-size: 16px; color: var(--text-color); margin-bottom: 6px; }
        .upload-hint { font-size: 13px; color: #aaa; }

        /* ===== 按钮 ===== */
        .btn {
            display: inline-block;
            padding: 13px 36px;
            font-size: 17px;
            font-weight: bold;
            color: white;
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 3px 10px rgba(255,140,0,0.25);
            margin-top: 14px;
        }
        .btn:hover { background: var(--primary-hover); transform: scale(1.03); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background: #CCC; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-center { text-align: center; }

        /* ===== 输入框 ===== */
        .input-group { margin-bottom: 14px; }
        .input-label { display: block; font-size: 16px; margin-bottom: 8px; color: var(--text-color); font-weight: bold; }
        .input-field {
            width: 100%;
            padding: 13px 16px;
            font-size: 17px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: #FFFBF0;
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255,140,0,0.15);
        }

        /* ===== 加载动画 ===== */
        .loading-container { text-align: center; padding: 28px 16px; display: none; }
        .loading-container.show { display: block; }
        .loading-icon { font-size: 40px; margin-bottom: 14px; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.12); opacity: 0.75; }
        }
        .loading-text { font-size: 17px; color: var(--primary-color); margin-bottom: 14px; min-height: 24px; }
        .progress-bar { width: 100%; height: 10px; background: #FFE4B5; border-radius: 5px; overflow: hidden; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), #FFB347);
            border-radius: 5px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* ===== 结果卡片 ===== */
        .result-card { display: none; animation: slideUp 0.45s ease; }
        .result-card.show { display: block; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #FFE4B5 0%, #FFD699 100%);
            border-radius: 14px;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            border: 2px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        .result-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .result-item {
            margin-bottom: 12px;
            padding: 14px;
            background: #FFFBF0;
            border-radius: 12px;
            border-left: 3px solid var(--primary-color);
        }
        .result-label { font-size: 13px; color: #999; margin-bottom: 4px; }
        .result-value { font-size: 16px; color: var(--text-color); line-height: 1.6; }

        /* ===== 药品说明卡片 ===== */
        .medicine-name {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 18px;
            padding: 16px;
            background: #FFFBF0;
            border-radius: 14px;
        }
        .medicine-info { list-style: none; }
        .medicine-info li {
            padding: 14px;
            margin-bottom: 10px;
            background: #FFFBF0;
            border-radius: 12px;
            font-size: 16px;
            border-left: 3px solid var(--primary-color);
            line-height: 1.5;
        }
        .medicine-info li strong { color: var(--primary-color); margin-right: 6px; }

        /* ===== Agent 防诈骗样式 ===== */
        .agent-status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: #E8F5E9;
            border-radius: 12px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #2E7D32;
            font-weight: bold;
        }
        .agent-status-bar.active {
            background: #FFF3E0;
            color: #E65100;
        }
        .agent-status-bar.alert {
            background: #FFEBEE;
            color: #C62828;
            animation: alertPulse 1s ease-in-out infinite;
        }
        @keyframes alertPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            flex-shrink: 0;
        }
        .agent-status-bar.active .status-dot { background: #FF9800; animation: blink 0.8s infinite; }
        .agent-status-bar.alert .status-dot { background: #F44336; animation: blink 0.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Agent 日志 */
        .agent-log {
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 14px;
            padding: 4px;
        }
        .agent-log::-webkit-scrollbar { width: 3px; }
        .agent-log::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        .log-entry {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #FFF0D4;
            animation: logSlide 0.35s ease;
        }
        @keyframes logSlide {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .log-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            background: #FFFBF0;
        }
        .log-body { flex: 1; min-width: 0; }
        .log-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 3px;
        }
        .log-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }
        .log-desc.highlight { color: var(--danger-color); font-weight: bold; }

        /* 工具调用卡片 */
        .tool-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin: 6px 0;
            background: #FFFBF0;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            animation: toolPop 0.4s ease;
        }
        @keyframes toolPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .tool-card.executed {
            border-color: var(--primary-color);
            background: #FFF5E6;
        }
        .tool-icon { font-size: 20px; }
        .tool-info { flex: 1; }
        .tool-name { font-size: 13px; font-weight: bold; color: var(--text-color); }
        .tool-status { font-size: 12px; color: #999; }
        .tool-status.done { color: var(--success-color); }
        .tool-check { font-size: 16px; }

        /* 来电模拟卡片 */
        .call-card {
            text-align: center;
            padding: 20px 16px;
            background: linear-gradient(135deg, #FFF5E6, #FFFBF0);
            border-radius: 16px;
            border: 2px solid var(--border-color);
            margin-bottom: 14px;
        }
        .call-avatar {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 10px;
            color: white;
        }
        .call-number { font-size: 18px; font-weight: bold; color: var(--text-color); }
        .call-label { font-size: 13px; color: #999; margin-top: 4px; }
        .call-transcript {
            text-align: left;
            margin-top: 12px;
            padding: 12px;
            background: white;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-color);
            border: 1px solid #FFE0B2;
            min-height: 40px;
        }
        /* 逐句分析块 */
        .sentence-block {
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #FFE0B2;
            animation: logSlide 0.35s ease;
        }
        .sentence-block:last-child { border-bottom: none; margin-bottom: 0; }
        .sentence-text { font-size: 14px; line-height: 1.7; color: var(--text-color); }
        .sentence-analysis {
            display: inline-block;
            margin-top: 5px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: bold;
            color: var(--danger-color);
            background: #FFEBEE;
            border-radius: 6px;
            animation: toolPop 0.4s ease;
        }
        .transcript-cursor {
            display: inline-block;
            width: 2px;
            height: 14px;
            background: var(--primary-color);
            animation: cursorBlink 0.6s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* 最终结果 */
        .agent-result {
            padding: 16px;
            border-radius: 14px;
            margin-top: 14px;
            animation: resultFade 0.5s ease;
        }
        @keyframes resultFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .agent-result.danger { background: #FFEBEE; border: 2px solid #EF9A9A; }
        .agent-result.safe { background: #E8F5E9; border: 2px solid #A5D6A7; }
        .result-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-actions {
            list-style: none;
        }
        .result-actions li {
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.7);
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* 场景选择 */
        .scenario-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }
        .scenario-chip {
            padding: 8px 12px;
            font-size: 13px;
            border: 1.5px solid var(--border-color);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.25s ease;
            color: var(--text-color);
        }
        .scenario-chip:hover {
            border-color: var(--primary-color);
            background: #FFF5E6;
        }
        .scenario-chip.active {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: white;
        }

        /* ===== 底部 Home Indicator ===== */
        .home-indicator {
            height: 34px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-top: 1px solid #F0E0C0;
        }
        .home-bar {
            width: 134px;
            height: 5px;
            background: #CCC;
            border-radius: 3px;
        }

        /* ===== 背景装饰 ===== */
        .bg-decor {
            position: fixed;
            pointer-events: none;
            z-index: -1;
        }
        .bg-decor-1 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,200,100,0.3), transparent 70%);
            top: -80px; left: -80px;
            border-radius: 50%;
        }
        .bg-decor-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,160,60,0.2), transparent 70%);
            bottom: -100px; right: -100px;
            border-radius: 50%;
        }

        /* ===== 底部信息（手机外） ===== */
        .footer-text {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: rgba(120, 80, 40, 0.6);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decor bg-decor-1"></div>
    <div class="bg-decor bg-decor-2"></div>

    <!-- 手机外壳 -->
    <div class="phone-wrapper">
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="phone-screen">
            <!-- 状态栏 -->
            <div class="status-bar">
                <span class="status-time" id="statusTime">9:41</span>
                <div class="status-icons">
                    <span>📶</span>
                    <span>📡</span>
                    <span>🔋</span>
                </div>
            </div>

            <!-- 内容滚动区 -->
            <div class="container">
                <!-- 标题 -->
                <header class="header">
                    <h1>🌟 银龄暖伴</h1>
                    <p>爸妈的手机里，也该有一个懂他们的人</p>
                </header>

                <!-- 内容区 -->

                <!-- Tab1: 老照片修复 -->
                <div class="tab-content active" id="tab-photo">
                    <div class="card">
                        <h2 class="card-title">📸 老照片修复</h2>

                        <div class="upload-area" id="uploadArea">
                            <div class="upload-icon">📷</div>
                            <div class="upload-text">点击上传老照片</div>
                            <div class="upload-hint">支持 JPG、PNG 格式</div>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">

                        <div class="btn-center">
                            <button class="btn" id="repairBtn" disabled>开始修复</button>
                        </div>

                        <!-- 加载动画 -->
                        <div class="loading-container" id="photoLoading">
                            <div class="loading-icon">🔍</div>
                            <div class="loading-text" id="loadingText">正在准备...</div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                        </div>

                        <!-- 修复结果 -->
                        <div class="result-card" id="photoResult">
                            <div class="result-image" id="resultImage">🏞️</div>
                            <div class="result-item">
                                <div class="result-label">📅 年代推测</div>
                                <div class="result-value" id="resultEra"></div>
                            </div>
                            <div class="result-item">
                                <div class="result-label">🎬 场景描述</div>
                                <div class="result-value" id="resultScene"></div>
                            </div>
                            <div class="result-item">
                                <div class="result-label">📖 回忆故事</div>
                                <div class="result-value" id="resultStory"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab2: 用药提醒 -->
                <div class="tab-content" id="tab-medicine">
                    <div class="card">
                        <h2 class="card-title">💊 用药提醒</h2>

                        <div class="input-group">
                            <label class="input-label" for="medicineInput">请输入药品名称</label>
                            <input type="text" class="input-field" id="medicineInput" placeholder="例如：阿莫西林、降压药">
                        </div>

                        <div class="btn-center">
                            <button class="btn" id="medicineBtn">生成说明</button>
                        </div>

                        <div class="result-card" id="medicineResult">
                            <div class="medicine-name" id="medicineName"></div>

            setAgentStatus('active', '🎙️ 正在监听通话内容…');
            await typeSentencesWithAnalysis(scenario.sentences);
            document.getElementById('transcriptCursor').style.display = 'none';
            await delay(600);

            // Phase 3: Agent 开始分析
            setAgentStatus('alert', '⚠️ 检测到异常！Agent 正在分析…');
            agentLog.style.display = 'block';

            // Phase 4: 逐个调用工具
            for (let i = 0; i < scenario.tools.length; i++) {
                const tool = scenario.tools[i];
                await addLogEntry(tool.icon, tool.name, tool.desc, 'analyzing');
                await delay(800);
                await updateLogEntry(tool.result, 'done');
                await delay(400);
            }

            // Phase 5: 输出最终结果
            await delay(500);
            setAgentStatus('alert', '🚨 确认诈骗！已启动防护！');
            showAgentResult(scenario);
            agentRunning = false;
            agentStartBtn.disabled = false;
            agentStartBtn.textContent = '再次模拟';
        }

        function setAgentStatus(type, text) {
            agentStatusBar.className = 'agent-status-bar ' + type;
            agentStatusText.textContent = text;
        }

        // 逐句显示通话内容，每句显示完立即给出 Agent 实时分析
        async function typeSentencesWithAnalysis(sentences) {
            const area = document.getElementById('transcriptArea');
            area.innerHTML = '';
            for (let i = 0; i < sentences.length; i++) {
                const s = sentences[i];
                // 创建句子块
                const block = document.createElement('div');
                block.className = 'sentence-block';
                const textEl = document.createElement('div');
                textEl.className = 'sentence-text';
                const analysisEl = document.createElement('div');
                analysisEl.className = 'sentence-analysis';
                analysisEl.style.display = 'none';
                block.appendChild(textEl);
                block.appendChild(analysisEl);
                area.appendChild(block);

                // 打字机效果显示这一句
                for (let j = 0; j < s.text.length; j++) {
                    textEl.textContent += s.text[j];
                    container.scrollTo({ top: container.scrollHeight, behavior: 'auto' });
                    await delay(40 + Math.random() * 30);
                }
                // 短暂停顿后，Agent 给出这一句的实时分析
                await delay(300);
                analysisEl.textContent = '🔍 ' + s.analysis;
                analysisEl.style.display = 'inline-block';
                container.scrollTo({ top: container.scrollHeight, behavior: 'auto' });
                await delay(550);
            }
        }

        async function addLogEntry(icon, title, desc, status) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML =
                '<div class="log-icon">' + icon + '</div>' +
                '<div class="log-body">' +
                    '<div class="log-title">' + title + '</div>' +
                    '<div class="log-desc">' + desc + '</div>' +
                    '<div class="tool-card" id="tool-' + Date.now() + '">' +
                        '<span class="tool-icon">⏳</span>' +
                        '<div class="tool-info"><span class="tool-name">执行中…</span></div>' +
                    '</div>' +
                '</div>';
            agentLog.appendChild(entry);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        async function updateLogEntry(result, status) {
            const cards = agentLog.querySelectorAll('.tool-card');
            const lastCard = cards[cards.length - 1];
            if (lastCard) {
                lastCard.className = 'tool-card executed';
                lastCard.innerHTML =
                    '<span class="tool-icon">✅</span>' +
                    '<div class="tool-info">' +
                        '<span class="tool-name">' + result + '</span>' +
                        '<span class="tool-status done">已完成</span>' +
                    '</div>';
            }
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function showAgentResult(scenario) {
            const isDanger = scenario.riskLevel === 'high';
            agentResultArea.innerHTML =
                '<div class="agent-result ' + (isDanger ? 'danger' : 'safe') + '">' +
                    '<div class="result-header">' +
                        (isDanger ? '🔴 高风险 — ' : '🟡 中风险 — ') + scenario.fraudType +
                    '</div>' +
                    '<div style="font-size:14px; font-weight:bold; margin-bottom:8px; color:var(--text-color);">Agent 已自动执行：</div>' +
                    '<ul class="result-actions">' +
                        scenario.actions.map(function(a) { return '<li>' + a + '</li>'; }).join('') +
                    '</ul>' +
                    '<div style="margin-top:10px; font-size:13px; color:#999; line-height:1.6;">' +
                        '📰 ' + scenario.case +
                    '</div>' +
                '</div>';
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function delay(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
    </script>
</body>
</html>
