  }
};

const BaziEngine = {
  stems: ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'],
  branches: ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'],
  hourBranches: [
    { branch: '子', range: '23:00-01:00', keys: ['子时', '半夜', '深夜'] },
    { branch: '丑', range: '01:00-03:00', keys: ['丑时', '后半夜'] },
    { branch: '寅', range: '03:00-05:00', keys: ['寅时', '天没亮'] },
    { branch: '卯', range: '05:00-07:00', keys: ['卯时', '早上', '天刚亮'] },
    { branch: '辰', range: '07:00-09:00', keys: ['辰时', '上午'] },
    { branch: '巳', range: '09:00-11:00', keys: ['巳时', '上午后半'] },
    { branch: '午', range: '11:00-13:00', keys: ['午时', '中午', '正午'] },
    { branch: '未', range: '13:00-15:00', keys: ['未时', '下午刚开始'] },
    { branch: '申', range: '15:00-17:00', keys: ['申时', '下午'] },
    { branch: '酉', range: '17:00-19:00', keys: ['酉时', '傍晚'] },
    { branch: '戌', range: '19:00-21:00', keys: ['戌时', '晚上'] },
    { branch: '亥', range: '21:00-23:00', keys: ['亥时', '夜里', '睡前'] }
  ],
  parse(text) {
    const q = String(text || '').replace(/[，。；、]/g, ' ');
    const birthday = q.match(/(19\d{2}|20\d{2})\s*(?:年|[-/.])\s*(\d{1,2})\s*(?:月|[-/.])\s*(\d{1,2})\s*(?:日|号)?/);
    const year = birthday?.[1] || (q.match(/(19\d{2}|20\d{2})/) || [])[1];
    const gender = /(^|\s)(男|男性|男生|男命)(\s|$)/.test(q) ? '男' : /(^|\s)(女|女性|女生|女命)(\s|$)/.test(q) ? '女' : '';
    const placeMatch = q.match(/(?:出生地|出生于|生于|在)\s*([\u4e00-\u9fa5]{2,12}(?:省|市|县|区)?)/) || q.match(/([\u4e00-\u9fa5]{2,8}(?:省|市|县|区))/g)?.slice(-1)?.map(x => [null, x])[0];
    const place = placeMatch?.[1] || '';
    const hour = this.hourBranches.find(h => h.keys.some(k => q.includes(k))) || null;
    const calendar = q.includes('农历') || q.includes('阴历') ? '农历' : q.includes('阳历') || q.includes('公历') ? '阳历' : '';
    const missing = [];
    if (!birthday) missing.push('阳历或农历生日');
    if (!hour) missing.push('出生时辰');
    if (!gender) missing.push('性别');
    if (!place) missing.push('出生地');
    return { year: year ? Number(year) : null, month: birthday ? Number(birthday[2]) : null, day: birthday ? Number(birthday[3]) : null, gender, place, hour, calendar, missing };
  },
  yearPillar(year, month, day) {
    if (!year) return '未知年柱';
    const adjustedYear = month && day && (month < 2 || (month === 2 && day < 4)) ? year - 1 : year;
    const stemIdx = ((adjustedYear - 4) % 10 + 10) % 10;
    const branchIdx = ((adjustedYear - 4) % 12 + 12) % 12;
    return this.stems[stemIdx] + this.branches[branchIdx] + '年';
  },
  analyze(text) {
    const info = this.parse(text);
    if (info.missing.length) return { complete: false, info, missing: info.missing };
    const yearPillar = this.yearPillar(info.year, info.month, info.day);
    const branch = yearPillar.replace('年', '').slice(1);
    const elementMap = { 子:'水', 丑:'土', 寅:'木', 卯:'木', 辰:'土', 巳:'火', 午:'火', 未:'土', 申:'金', 酉:'金', 戌:'土', 亥:'水' };
    const baseElement = elementMap[branch] || '土';
    return {
      complete: true,
      info,
      pillars: {
        year: yearPillar,
        month: '需节气万年历确认',
        day: '需万年历日柱确认',
        hour: `${info.hour.branch}时（${info.hour.range}，天干需日柱推定）`
      },
      wuxing: `年支属${baseElement}，时支为${info.hour.branch}。完整五行强弱需月令、日主、藏干和十神共同判断。`,
      element: `初步参考${baseElement}气，不作为完整喜用神结论`,
      audit: '前端 BaziEngine 已完成信息完整性校验、年柱和时辰识别；完整四柱、大运流年、十神格局需接入 bazi-skill 或万年历排盘。'
    };
  }
};

const WeatherService = {
  getPeriod(date = new Date()) {
    const h = date.getHours();
    return h < 6 ? '黎明前' : h < 11 ? '上午' : h < 13 ? '正午' : h < 17 ? '午后' : h < 19 ? '黄昏' : '夜晚';
  },
  getSeason(date = new Date()) {
    const m = date.getMonth();
    return m < 2 || m === 11 ? '冬' : m < 5 ? '春' : m < 8 ? '夏' : '秋';
  },
  getSun(date = new Date(), weather = '') {
    const h = date.getHours();
    if (weather.includes('雨')) return '雨幕遮日';
    if (weather.includes('阴')) return '天光暗淡';
    if (weather.includes('云')) return h >= 6 && h < 18 ? '日光朦胧' : '月隐云后';
    return h >= 6 && h < 18 ? (h < 12 ? '太阳东升渐高' : h < 15 ? '烈日当空' : '夕阳西斜') : '月明星稀';
  },

          ...base,

          temperature: data.tem || '',

const AI = {
  async chat(prompt) {
    const provider = AIConfig.getActive();
    if (provider.model === 'mock' || !provider.apiKey) {
      return this._sanitize(this.mock(prompt), 'mock');
    }
    try {
      // 15秒超时控制
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      const resp = await fetch(provider.endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${provider.apiKey}`
        },
        body: JSON.stringify({
          model: provider.model,
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.7,
          max_tokens: 2000
        }),
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      if (!resp.ok) throw new Error(I18N.t('ai_error') + resp.status);
      const data = await resp.json();
      const content = data.choices?.[0]?.message?.content || '';
      const parsed = this._parseJSON(content);
      if (!parsed) throw new Error(I18N.t('ai_parse_error'));
      return this._sanitize(parsed, 'real');
    } catch (e) {
      console.warn('AI调用失败，降级到模拟', e);
      // 提示用户降级
      toast(I18N.t('toast_ai_fallback'));
      return this._sanitize(this.mock(prompt), 'mock');
    }
  },
  _text(value, max = 240) {
    return String(value == null ? '' : value).replace(/[\u0000-\u001f\u007f]/g, '').slice(0, max);
  },
  _array(value, maxItems = 8, maxText = 120) {
    return Array.isArray(value) ? value.slice(0, maxItems).map(v => this._text(v, maxText)).filter(Boolean) : [];
  },
  _sanitize(raw, source) {
    const type = ['rational', 'random', 'nature', 'dialogue', 'fengshui'].includes(raw?.type) ? raw.type : 'rational';
    const warnings = [];
    const base = { type, _source: source };
    const ensureText = (value, fallback, max) => {
      const text = this._text(value, max);
      if (!text) warnings.push(fallback);
      return text || fallback;
    };
    const ensureArray = (value, fallback, min = 1, maxItems = 8, maxText = 120) => {
      const arr = this._array(value, maxItems, maxText);
      if (arr.length < min) warnings.push(fallback.join(' / '));
      return arr.length >= min ? arr : fallback;
    };
    const done = (data) => warnings.length ? { ...data, _schemaWarning: warnings.slice(0, 4).join('；') } : data;
    if (type === 'rational') return done({ ...base, pros: ensureArray(raw.pros, ['优势信息不足'], 1, 6), cons: ensureArray(raw.cons, ['风险信息不足'], 1, 6), conclusion: ensureText(raw.conclusion, '先缓一步，补齐信息后再决定', 220) });
    if (type === 'random') return done({ ...base, options: ensureArray(raw.options, ['先暂停', '换个角度', '问问朋友', '明天再定', '做最小尝试', '保留原状'], 6, 8, 50), reason: this._text(raw.reason, 160) });
    if (type === 'nature') return done({ ...base, time: ensureText(raw.time, '此刻', 30), season: ensureText(raw.season, '当前季节', 20), weather: ensureText(raw.weather, '未知天气', 40), sun: this._text(raw.sun, 60), wind: this._text(raw.wind, 60), source: ensureText(raw.source, '自然信号', 80), isReal: !!raw.isReal, signal: ensureText(raw.signal, '顺势而行', 80), poem: ensureText(raw.poem, '当前自然信号不足，先降低动作幅度。', 260), suggestion: ensureText(raw.suggestion, '先做一个低风险的小动作', 180) });
    if (type === 'dialogue') return done({ ...base, question: ensureText(raw.question, '你真正担心失去的是什么？', 180), options: ensureArray(raw.options, ['害怕损失', '想要改变', '需要更多信息'], 3, 4, 80) });
    if (type === 'fengshui') return done({ ...base, needBirth: !!raw.needBirth, question: this._text(raw.question, 240), bazi: ensureText(raw.bazi, raw.needBirth ? '' : '八字排盘信息不足', 200), wuxing: this._text(raw.wuxing, 240), element: this._text(raw.element, 120), analysis: ensureText(raw.analysis, raw.needBirth ? '需要补齐出生信息后再排盘。' : '命理分析信息不足。', 360), suggestion: ensureText(raw.suggestion, '先补齐信息，再做判断', 200), baziAudit: this._text(raw.baziAudit, 260) });
    return base;
  },
  _parseJSON(text) {
    try {
      // 处理markdown代码块包裹的JSON
      let cleaned = text.trim();
      // 去除 ```json ... ``` 包裹
      const codeBlock = cleaned.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (codeBlock) cleaned = codeBlock[1].trim();
      // 优先尝试直接解析完整JSON
      try {
        const direct = JSON.parse(cleaned);
        if (direct && typeof direct === 'object') return direct;
      } catch (e) {}
      // 提取JSON对象（贪婪匹配到最后一个}，支持嵌套对象）
      const m = cleaned.match(/\{[\s\S]*\}/);
      if (m) {
        const parsed = JSON.parse(m[0]);
        if (parsed && typeof parsed === 'object') return parsed;
      }
      return null;
    } catch (e) {
      return null;
    }
  },
  mock(prompt) {
    // 从 prompt 提取问题（针对问题："..."格式，避免误匹配 _humanize 中的引号词组）
    const qm = prompt.match(/针对问题："([^"]+)"/);
    const q = qm ? qm[1] : '你的问题';
    if (prompt.includes('"type":"rational"')) {
      return {
        type: 'rational',
        pros: ['说白了，能让你以后少纠结这事', '自己拿主意的次数多了，人也更干脆', '省得老惦记着，心里踏实'],
        cons: ['短期内得扛点压力，不舒服', '搞不好身边人会念叨两句'],
        conclusion: '依我看，分两步走，先动起来再说，给自己留个退路就行。'
      };
    }
    if (prompt.includes('"type":"random"')) {
      // 6个选项，覆盖不同方向，让转盘视觉饱满
      const opts = q.includes('吃') ? ['麻辣烫', '便利店寿司', '清淡沙拉', '兰州拉面', '黄焖鸡饭', '煎饼果子'] :
                   q.includes('看') ? ['爽片放松', '纪录片', '喜剧乐呵', '悬疑烧脑', '动画回忆', '综艺下饭'] :
                   q.includes('买') ? ['先等三天', '找平替', '二手淘', '等大促', '咬牙拿下', '果断放弃'] :
                   ['先这样试试', '换个思路', '再想想', '问朋友', '睡一觉再说', '抛硬币决定'];
      return { type: 'random', options: opts };
    }
    if (prompt.includes('"type":"nature"')) {
      // 从prompt提取自然条件
      const timeMatch = prompt.match(/时间：[^，]*\s([^，]*)/);
      const seasonMatch = prompt.match(/季节：([^，]*)/);
      const weatherMatch = prompt.match(/天气：([^，]*)/);
      const sunMatch = prompt.match(/，([^，]*太阳[^，]*|[^，]*月明[^，]*|[^，]*日光[^，]*|[^，]*天光[^，]*|[^，]*雨幕[^，]*)，/);
      const windMatch = prompt.match(/风向：([^，。]*)/);
      const time = timeMatch ? timeMatch[1] : '此刻';
      const season = seasonMatch ? seasonMatch[1] : '四季';
      const weather = weatherMatch ? weatherMatch[1] : '晴朗';
      const sun = sunMatch ? sunMatch[1] : '日光和煦';
      const wind = windMatch ? windMatch[1] : '微风轻拂';

      // 根据问题+自然条件组合生成不同意象
      const natureMap = [
        { keys: ['吃', '喝', '食物', '餐厅'], signal: '成熟的果实', poem: `${season}的${weather}里，果实不问甜涩，到时便落。${sun}时，万物自有其节奏。`, suggestion: `选那个此刻最让你心头一动的，如同${wind}吹向的方向。` },
        { keys: ['辞职', '跳槽', '工作', '离职', '职业'], signal: '迁徙的候鸟', poem: `${season}天${wind}，候鸟启程。不为背叛旧林，只为顺应天时。${sun}指引方向。`, suggestion: `如果留下只是出于恐惧，${wind}已在催你启程。` },
        { keys: ['分手', '恋爱', '感情', '爱', '结婚', '离婚'], signal: '两条交汇的溪流', poem: `${weather}之下，溪流交汇又分岔。${sun}映照水面，聚散皆是自然。`, suggestion: '问自己：和TA在一起时，你更像自己还是更不像自己？' },
        { keys: ['买', '卖', '房', '车', '租', '钱', '投资'], signal: '深根与浅根的树', poem: `${wind}中，深根的树纹丝不动，浅根的树灵活摇摆。${season}的土壤，决定根的走向。`, suggestion: '算清成本，再听${wind}的方向。' },
        { keys: ['学', '考', '读', '书', '专业', '考研', '出国'], signal: '向阳的藤蔓', poem: `${sun}，藤蔓不问路有多远，只向着光攀爬。${season}是生长的季节。`, suggestion: '选那条让你眼睛发亮的路。' },
        { keys: ['搬', '走', '留', '城市', '回'], signal: '随风飘散的蒲公英', poem: `${wind}起，蒲公英乘风向远方。${weather}的天空下，落处即是归处。`, suggestion: '想象五年后的自己会在哪里后悔。' },
        { keys: ['要不要', '该不该', '行不行', '能不能'], signal: '潮起潮落的海', poem: `${time}，${weather}，海不催促潮水。${sun}下，进退自有节律。`, suggestion: '等三天，如果答案没变，就去做。' },
        { keys: ['选', '挑', '哪个', '还是'], signal: '分岔的河流', poem: `${season}的${weather}，河流到了分岔处。${wind}推着水流，每条支流都有风景。`, suggestion: '抛硬币的瞬间，你就知道答案了。' }
      ];
      let matched = natureMap.find(m => m.keys.some(k => q.includes(k)));
      if (!matched) {
        const defaults = [
          { signal: '风中摇曳的芦苇', poem: `${weather}的${time}，${wind}拂过芦苇。心若执着答案，便听不见万物的低语。`, suggestion: '放下执念，顺${wind}而行。' },
          { signal: '破土的春笋', poem: `${season}雨后，春笋不问头顶有多少泥土。${sun}下，生长的力量不需要理由。`, suggestion: '如果内心有冲动，那就是方向。' },
          { signal: '落叶归根', poem: `${wind}起，叶子落下时不悲伤。${time}的${weather}里，结束也是另一种开始。`, suggestion: '该放手的，就让它随${wind}去吧。' },
          { signal: '云卷云舒', poem: `${weather}的天空，${sun}。云不执着于形状，执念越少，天地越宽。`, suggestion: '别想太多，答案会在不经意间出现。' }
        ];
        matched = defaults[Math.floor(Math.random() * defaults.length)];
      }
      return {
        type: 'nature',
        time, season, weather, sun, wind,
        signal: matched.signal,
        poem: matched.poem,
        suggestion: matched.suggestion
      };
    }
    if (prompt.includes('"type":"fengshui"')) {
      const bazi = BaziEngine.analyze(q);
      if (!bazi.complete) {
        return {
          type: 'fengshui',
          needBirth: true,
          question: `要按 bazi-skill 完整排盘，还缺：${bazi.missing.join('、')}。请补充出生年月日时、性别、出生地，阳历/农历也请说明。`,
          bazi: '', wuxing: '', element: '', analysis: '', suggestion: ''
        };
      }
      return {
        type: 'fengshui',
        needBirth: false,
        question: '',
        bazi: `${bazi.pillars.year} / ${bazi.pillars.month} / ${bazi.pillars.day} / ${bazi.pillars.hour}`,
        wuxing: bazi.wuxing,
        element: bazi.element,
        analysis: '当前前端只完成基础排盘校验，不能凭空判断日主强弱、大运流年或完整喜用神。要做完整玄学决策，需要接入 bazi-skill 的四柱、十神、格局、大运流年分析。',
        suggestion: '可以先把这条作为传统文化参考；真正要按八字做决策，请先补齐 bazi-skill 完整排盘。',
        baziAudit: bazi.audit
      };
    }
    if (prompt.includes('"type":"dialogue"')) {
      return {
        type: 'dialogue',
        question: '说真的，你最在意的那个人，要是知道你这么纠结，他会怎么说？',
        options: ['他估计会让我别想太多', '他肯定支持我', '他可能觉得我矫情', '我也不确定他咋想']
      };
    }
    return null;
  }
};

/* ============ 9.5 语音输出（TTS） - Web Speech API，免费零依赖 ============ */
// 浏览器原生 SpeechSynthesis，无需API Key，无需服务器，所有主流浏览器支持
const TTS = {
  _supported: typeof window !== 'undefined' && 'speechSynthesis' in window,
  _voices: [],
  _currentUtter: null,

  init() {
    if (!this._supported) {
      console.warn('浏览器不支持语音合成');
      return;
    }
    const loadVoices = () => {
      this._voices = window.speechSynthesis.getVoices() || [];
    };
    loadVoices();
    // Chrome 异步加载语音列表
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }
  },

  isSupported() { return this._supported; },

  // 根据当前界面语言选择合适的voice
  _pickVoice() {
    if (!this._voices.length) return null;
    const ttsLang = I18N.getTTSLang();
    // 精确匹配 > 前缀匹配
    return this._voices.find(v => v.lang === ttsLang) ||
           this._voices.find(v => v.lang && v.lang.startsWith(ttsLang.split('-')[0])) ||
           null;
  },

  // 从决策结果提取要朗读的纯文本
  _extractText(result) {
    if (!result) return '';
    if (result.conclusion) return result.conclusion;
    if (result.suggestion) return result.suggestion;
    if (result.poem) return result.poem;
    if (result.question) return result.question;
    if (result.options) return result.options.join('，');
    if (result.analysis) return result.analysis;
    return '';
  },

  // 朗读文本，返回是否成功启动
  speak(text, opts = {}) {
    if (!this._supported || !text) return false;
    // 停止当前朗读
    this.stop();
    const u = new SpeechSynthesisUtterance(text);
    // 根据当前界面语言设置朗读语言
    u.lang = I18N.getTTSLang();
    // 优先使用用户选择的voice，否则按语言自动匹配
    const voiceURI = opts.voiceURI;
    let voice = null;
    if (voiceURI) {
      voice = this._voices.find(v => v.voiceURI === voiceURI);
    }
    if (!voice) voice = this._pickVoice();
    if (voice) u.voice = voice;
    // 默认参数优化：rate 0.95（稍慢更自然）、pitch 1.05（稍高更亲切）
    u.rate = opts.rate != null ? opts.rate : 0.95;
    u.pitch = opts.pitch != null ? opts.pitch : 1.05;
    u.volume = opts.volume != null ? opts.volume : 1.0;
    this._currentUtter = u;
    try {
      window.speechSynthesis.speak(u);
      return true;
    } catch (e) {
      console.warn('TTS播放失败', e);
      return false;
    }
  },

  // 获取当前语言可用的voice列表
  getVoicesForLang() {
    if (!this._voices.length) return [];
    const ttsLang = I18N.getTTSLang();
    const langPrefix = ttsLang.split('-')[0];
    // 精确匹配 + 前缀匹配，去重
    const exact = this._voices.filter(v => v.lang === ttsLang);
    const prefix = this._voices.filter(v => v.lang && v.lang.startsWith(langPrefix) && v.lang !== ttsLang);
    return [...exact, ...prefix];
  },

  // 朗读决策结果
  speakResult(result, opts = {}) {
    const text = this._extractText(result);
    if (!text) {
      toast(I18N.t('toast_no_speak'));
      return false;
    }
    return this.speak(text, opts);
  },

  pause() {
    if (this._supported && window.speechSynthesis.speaking) {
      window.speechSynthesis.pause();
    }
  },
  resume() {
    if (this._supported && window.speechSynthesis.paused) {
      window.speechSynthesis.resume();
    }
  },
  stop() {
    if (this._supported) {
      try { window.speechSynthesis.cancel(); } catch (e) {}
    }
    this._currentUtter = null;
  },
  isSpeaking() {
    return this._supported && window.speechSynthesis.speaking;
  },
  isPaused() {
    return this._supported && window.speechSynthesis.paused;
  }
};

/* ============ 10. 决策模式渲染 ============ */
const ModeRenderer = {
  currentMode: 'auto',
  dialogueState: null, // 对话引导状态
  _executing: false,

  setMode(mode) {
    if (!ModeRecognizer.validModes.includes(mode)) return;
    if (mode !== 'dialogue') this.dialogueState = null;
    this.currentMode = mode;
    document.querySelectorAll('.mode-card').forEach(c => {
      const isActive = c.dataset.mode === mode;
      c.classList.toggle('active', isActive);
      c.setAttribute('aria-checked', isActive ? 'true' : 'false');
    });
  },

  getActualMode(text) {
    if (this.currentMode !== 'auto') return this.currentMode;
    return ModeRecognizer.recognize(text);
  },

  async execute(text) {
    if (this._executing) throw new Error(I18N.t('err_analyze_failed'));
    this._executing = true;
    try {
    const mode = this.getActualMode(text);
    if (mode === 'rational') return await this.rational(text);
    if (mode === 'random') return await this.random(text);
    if (mode === 'nature') return await this.nature(text);
    if (mode === 'dialogue') return await this.dialogue(text);
    if (mode === 'fengshui') return await this.fengshui(text);
    return await this.rational(text);
    } finally {
      this._executing = false;
    }
  },

  async rational(q) {
    // 读取用户价值观权重，注入prompt
    let values = null;
    try {
      const pref = await DB.get('preferences', User.current?.username || 'guest');
      if (pref && pref.values) values = pref.values;
    } catch (e) { /* 忽略，用默认 */ }
    const result = await AIService.chat(Prompts.rational(q, values));
    result.score = DecisionScoreEngine.score(q, result, values);
    return { mode: 'rational', result, element: this.renderRational(result) };
  },

  // 决策简报卡构造器：所有模式共用，生成结构化简报
  renderBrief(o) {
    const article = el('article', 'brief');
    // 头部
    const head = el('div', 'brief-head');
    head.setAttribute('data-tone', o.tone);
    const typeBar = el('div', 'brief-type');
    typeBar.appendChild(el('span', '', o.modeName));
    const percentText = new Intl.NumberFormat(I18N.getLocale(), { style: 'percent', maximumFractionDigits: 0 }).format((o.percent || 0) / 100);
    typeBar.appendChild(el('span', '', I18N.t('brief_evidence') + ' ' + percentText));
    head.appendChild(typeBar);
    head.appendChild(el('div', 'brief-title', o.title));
    article.appendChild(head);
    // 主体
    const body = el('div', 'brief-body');
    // 当前判断 + 信心环
    const verdict = el('div', 'verdict');
    const verdictLeft = el('div');
    verdictLeft.appendChild(el('div', 'verdict-label', I18N.t('verdict_label')));
    verdictLeft.appendChild(el('div', 'verdict-main', o.verdict));
    verdict.appendChild(verdictLeft);
    const conf = el('div', 'confidence');
    conf.appendChild(el('span', '', String(o.percent)));
    // 按百分比动态设置 conic-gradient
    const deg = Math.round((o.percent / 100) * 360);
    conf.style.background = `conic-gradient(var(--ink) 0 ${deg}deg, rgba(25,26,22,0.12) ${deg}deg 360deg)`;
    verdict.appendChild(conf);
    body.appendChild(verdict);
    // 保留 / 放下 双栏
    const cols = el('div', 'brief-columns');
    const keepSec = el('section', 'mini-section');
    keepSec.appendChild(el('h3', '', I18N.t('keep_signal')));
    keepSec.appendChild(el('p', '', o.keep));
    cols.appendChild(keepSec);
    const dropSec = el('section', 'mini-section');
    dropSec.appendChild(el('h3', '', I18N.t('drop_signal')));
    dropSec.appendChild(el('p', '', o.drop));
    cols.appendChild(dropSec);
    body.appendChild(cols);
    // 下一步
    body.appendChild(el('div', 'next-step', I18N.t('brief_next') + o.next));
    // 额外内容（如对话选项按钮）
    if (o.extra) body.appendChild(o.extra);
    article.appendChild(body);
    return article;
  },

  renderRational(r) {
    if (!r) return el('div', 'msg-bubble', I18N.t('err_analyze_failed'));
    const pros = r.pros || [];
    const cons = r.cons || [];
    const diff = pros.length - cons.length;
    const percent = r.score?.confidence || Math.max(35, Math.min(88, 58 + diff * 6));
    const verdict = r.conclusion || (diff >= 0 ? I18N.t('rational_title_go') : I18N.t('rational_title_wait'));
    const title = verdict.length > 22 ? verdict.slice(0, 22) + '…' : verdict;
    const scoreLine = r.score ? `${I18N.t('rational_score_benefit')}${r.score.benefit} / ${I18N.t('rational_score_risk')}${r.score.risk} / ${I18N.t('rational_score_reversibility')}${r.score.reversibility} / ${I18N.t('rational_score_value')}${r.score.valueFit}` : '';
    return this.renderBrief({
      tone: 'rational',
      modeName: I18N.t('mode_rational'),
      percent,
      title,
      verdict,
      keep: [pros.length ? pros.join('；') : I18N.t('rational_keep_profit'), scoreLine].filter(Boolean).join('｜'),
      drop: cons.length ? cons.join('；') : I18N.t('rational_drop_cost'),
      next: I18N.t('rational_next')
    });
  },

  async random(q) {
    const result = await AIService.chat(Prompts.random(q));
    return { mode: 'random', result, element: await this.renderRandom(result) };
  },

  async renderRandom(r) {
    const options = r?.options || [];
    // 强制6格：不足补齐，超过截断
    let opts = options.slice(0, 6);
    const fallbackPool = ['再想想', '换个角度', '问朋友', '睡一觉', '抛硬币', '跟着心走'];
    let fi = 0;
    while (opts.length < 6) opts.push(fallbackPool[fi++ % fallbackPool.length]);

    // 随机选择（保留原逻辑：结果挂到 result 对象上由 saveDecision 持久化）
    const idx = Math.floor(Math.random() * opts.length);
    const chosen = opts[idx];
    r.wheelResult = chosen;
    haptic([10, 50, 30]);

    const others = opts.filter((_, i) => i !== idx);
    return this.renderBrief({
      tone: 'random',
      modeName: I18N.t('mode_random'),
      percent: 50,
      title: '天意指向：「' + chosen + '」',
      verdict: chosen,
      keep: '被命运选中：' + chosen,
      drop: '此次未中：' + others.join('、'),
      next: '接受天意，或重新抛掷'
    });
  },

  async nature(q) {
    const weather = await WeatherService.getCurrent();
    weather.signals = NatureSignalEngine.build(weather);
    const result = await AIService.chat(Prompts.nature(q, weather));
    result.source = result.source || weather.source;
    result.isReal = result.isReal != null ? result.isReal : weather.isReal;
    result.city = result.city || weather.city;
    result.temperature = result.temperature || weather.temperature;
    result.humidity = result.humidity || weather.humidity;
    result.air = result.air || weather.air;
    result.signals = result.signals || weather.signals;
    return { mode: 'nature', result, element: this.renderNature(result) };
  },

  renderNature(r) {
    const signal = r?.signal || I18N.t('render_nature_signal');
    const suggestion = r?.suggestion || '顺时而动';
    const poem = r?.poem || '时令与气象支持此时行动';
    const source = r?.source ? `数据源：${r.source}${r.isReal ? '' : '（降级）'}` : '数据源：自然信号';
    const weather = [r?.city, r?.weather, r?.temperature ? `${r.temperature}℃` : '', r?.wind].filter(Boolean).join(' · ');
    const signalLine = r?.signals?.summary ? '权重：' + r.signals.summary : '';
    return this.renderBrief({
      tone: 'nature',
      modeName: I18N.t('mode_nature'),
      percent: r?.isReal ? 72 : 56,
      title: signal,
      verdict: suggestion,
      keep: [weather, poem].filter(Boolean).join('｜'),
      drop: [source, signalLine].filter(Boolean).join('｜'),
      next: suggestion
    });
  },

  async fengshui(q) {
    const bazi = BaziEngine.analyze(q);
    if (!bazi.complete) {
      const result = {
        type: 'fengshui',
        needBirth: true,
        question: `要按 bazi-skill 的完整四柱逻辑排盘，还缺：${bazi.missing.join('、')}。请补充出生年月日时、性别、出生地，阳历/农历也请说明。`,
        bazi: '', wuxing: '', element: '', analysis: '', suggestion: ''
      };
      return { mode: 'fengshui', result, element: this.renderFengshui(result, q) };
    }
    const result = await AIService.chat(Prompts.fengshui(q, bazi));
    if (result._source === 'mock') {
      result.baziAudit = 'mock 降级校验摘要：未调用真实 bazi-skill/万年历完整排盘，以下只用于本地演示和信息核对。';
    }
    result.baziAudit = result.baziAudit || bazi.audit;
    result.bazi = result.bazi || `${bazi.pillars.year} / ${bazi.pillars.month} / ${bazi.pillars.day} / ${bazi.pillars.hour}`;
    result.wuxing = result.wuxing || bazi.wuxing;
    result.element = result.element || bazi.element;
    return { mode: 'fengshui', result, element: this.renderFengshui(result, q) };
  },

  renderFengshui(r, q) {
    // 需要生辰时，保留原交互表单（非决策结果，不走简报）
    if (r?.needBirth) {
      const container = el('div', 'fengshui-container');
      container.appendChild(el('div', 'fs-title', I18N.t('render_fengshui_title')));
      container.appendChild(el('div', 'fs-question', r.question || I18N.t('render_fengshui_ask_birth')));
      const inputId = 'fs-birth-input-' + Date.now();
      const input = el('input', 'fs-input');
      input.id = inputId;
      input.type = 'text';
      input.inputMode = 'text';
      input.placeholder = I18N.t('render_fengshui_birth_ph');
      input.setAttribute('aria-label', I18N.t('render_fengshui_ask_birth'));
      input.setAttribute('autocomplete', 'off');
      input.setAttribute('spellcheck', 'false');
      input.style.cssText = 'width:100%;padding:10px 12px;border-radius:10px;border:0.5px solid var(--separator);background:var(--surface);color:var(--text-primary);caret-color:var(--fengshui);font-size:14px;margin:8px 0;';
      container.appendChild(input);
      const btn = el('button', 'fs-btn', I18N.t('render_fengshui_calc'));
      btn.style.cssText = 'width:100%;padding:10px;border-radius:10px;border:none;background:var(--fengshui);color:#fff;font-size:14px;font-weight:600;cursor:pointer;';
      const submitBirth = () => {
        if (input.value.trim()) {
          window.dispatchEvent(new CustomEvent('bjj:resubmit', { detail: q + ' ' + input.value.trim() }));
        }
      };
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          submitBirth();
        }
      });
      btn.onclick = submitBirth;
      container.appendChild(btn);
      return container;
    }

    // 八字结果 → 决策简报
    const title = r?.element || r?.wuxing || '玄机已现';
    const verdict = r?.analysis || '命理有迹可循';
    const keep = r?.wuxing ? '五行：' + r.wuxing : '用神得位，五行调和';
    const drop = r?.baziAudit || (r?.analysis ? '五行偏枯处需调' : '未知处需谨慎');
    const next = r?.suggestion || '择吉日再行';
    const brief = this.renderBrief({
      tone: 'fengshui',
      modeName: I18N.t('mode_fengshui'),
      percent: 55,
      title,
      verdict,
      keep,
      drop,
      next
    });
    // 八字信息条挂在简报头部之后（若有）
    if (r?.bazi) {
      const label = r?._source === 'mock' ? '降级摘要：' : '八字：';
      const baziNote = el('div', '', label + r.bazi);
      baziNote.style.cssText = 'padding:8px 16px;font-size:12px;color:var(--ink-faint);background:var(--paper-2);';
      brief.insertBefore(baziNote, brief.querySelector('.brief-body'));
    }
    return brief;
  },

  async dialogue(q) {
    try {
      const result = await AIService.chat(Prompts.dialogue(q));
      this.dialogueState = { question: q, history: [] };
      return { mode: 'dialogue', result, element: this.renderDialogue(result) };
    } catch (e) {
      this.dialogueState = null;
      throw e;
    }
  },

  renderDialogue(r) {
    const question = r?.question || I18N.t('render_dialogue_default_q');
    // 选项按钮区（保留原交互逻辑：点击后隐藏选项、记录回答、触发 onDialogueComplete）
    const opts = el('div', 'dialogue-options');
    opts.style.marginTop = '12px';
    (r?.options || []).forEach(opt => {
      const b = el('button', 'dialogue-option', opt);
      b.onclick = () => {
        if (!this.dialogueState) this.dialogueState = { question: r.question || question, history: [] };
        this.dialogueState.history.push({ question: r.question, answer: opt });
        opts.querySelectorAll('.dialogue-option').forEach(x => { x.style.display = 'none'; x.disabled = true; });
        const recordDiv = el('div');
        recordDiv.style.cssText = 'padding:10px;background:rgba(105,82,111,0.1);border-radius:10px;font-size:13px;margin-top:8px;';
        recordDiv.appendChild(document.createTextNode(I18N.t('render_dialogue_recorded') + opt + '\n\n'));
        recordDiv.appendChild(el('strong', '', I18N.t('render_dialogue_insight')));
        recordDiv.appendChild(document.createTextNode(I18N.t('render_dialogue_insight_text')));
        recordDiv.style.whiteSpace = 'pre-wrap';
        opts.parentElement.appendChild(recordDiv);
        // 保存对话结果
        window.dispatchEvent(new CustomEvent('bjj:dialogue-complete', { detail: this.dialogueState }));
      };
      opts.appendChild(b);
    });
    return this.renderBrief({
      tone: 'dialogue',
      modeName: I18N.t('mode_dialogue'),
      percent: 45,
      title: question,
      verdict: '答案藏在你心里',
      keep: '诚实作答，线索自现',
      drop: '回避只会延长纠结',
      next: '选择下方一个选项回答',
      extra: opts
    });
  }
};

const ModeUseCases = {
  execute(text) { return ModeRenderer.execute(text); },
  getActualMode(text) { return ModeRenderer.getActualMode(text); },
  setMode(mode) { return ModeRenderer.setMode(mode); }
};

  setupKeyboardAvoidance() {
    if (!window.visualViewport) return;
    const vv = window.visualViewport;
    const onResize = () => {
      const kbHeight = window.innerHeight - vv.height - vv.offsetTop;
      if (kbHeight > 50) {
        // 键盘弹出：上移输入栏
        document.documentElement.style.setProperty('--kb-height', kbHeight + 'px');
      } else {
        document.documentElement.style.setProperty('--kb-height', '0px');
      }
    };
    vv.addEventListener('resize', onResize);
    vv.addEventListener('scroll', onResize);
  },

  initQuickExamplesDrag() {
    const qe = document.querySelector('.quick-examples');
    if (!qe) return;
    let isDown = false, startX, scrollLeft, moved = false;
    qe.addEventListener('mousedown', (e) => {
      isDown = true;
      moved = false;
      startX = e.pageX - qe.offsetLeft;
      scrollLeft = qe.scrollLeft;
    });
    qe.addEventListener('mouseleave', () => { isDown = false; });
    qe.addEventListener('mouseup', () => { isDown = false; });
    qe.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - qe.offsetLeft;
      const walk = (x - startX) * 1.5;
      if (Math.abs(walk) > 3) moved = true;
      qe.scrollLeft = scrollLeft - walk;
    });
    // 防止拖拽后误触发chip点击
    qe.addEventListener('click', (e) => {
      if (moved) { e.preventDefault(); e.stopPropagation(); moved = false; }
    }, true);
  },

  renderWelcome() {
    const container = $('chatContainer');
    container.innerHTML = '';
    container.classList.add('welcome-mode');
    const pageChat = $('page-chat');
    if (pageChat) pageChat.classList.remove('chat-mode');

    // 首页保持为空聊天区，仅展示 decision-hero + quick-row + composer
  },

  switchTab(tab, fromHash = false) {
    if (!['chat', 'archive', 'stats', 'settings'].includes(tab)) return;
    this.currentTab = tab;
    // 切换 tab 时若详情页 hash 还在，直接替换 URL，避免 history.back 与切页状态竞态
    if (location.hash === '#detail') {
      history.replaceState(null, '', location.pathname + location.search);
    }
    if (!fromHash && location.hash !== '#tab-' + tab) {
      history.replaceState(null, '', location.pathname + location.search + '#tab-' + tab);
    }
    // 切换页面时清理资源
    if (tab !== 'chat') {
      // 关闭相机
      if (this._cameraStream) this.closeCamera();
      // 清理转盘timer
      if (ModeRenderer._wheelTimer1) { clearTimeout(ModeRenderer._wheelTimer1); ModeRenderer._wheelTimer1 = null; }
      if (ModeRenderer._wheelTimer2) { clearTimeout(ModeRenderer._wheelTimer2); ModeRenderer._wheelTimer2 = null; }
      // 停止语音朗读
      TTS.stop();
      // 停止语音识别
      if (this._recognition) { try { this._recognition.stop(); } catch(e){} this._recognition = null; $('voiceBtn').classList.remove('recording'); clearTimeout(this._srTimeout); }
    }
    // 关闭档案详情页
    $('detailView').classList.remove('show');
    document.querySelectorAll('.tab-item').forEach(t => {
      const isActive = t.dataset.tab === tab;
      t.classList.toggle('active', isActive);
      t.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    document.querySelectorAll('.page').forEach(p => {
      p.classList.toggle('active', p.id === 'page-' + tab);
    });
    this.updateTabIndicator();
    if (tab === 'archive') this.renderArchive();
    if (tab === 'stats') this.renderStats();
    if (tab === 'settings') this.renderUserCard();
  },

  updateTabIndicator() {
    const tabs = document.querySelectorAll('.tab-item');
    const active = document.querySelector('.tab-item.active');
    if (!active) return;
    const idx = Array.from(tabs).indexOf(active);
    const width = 100 / tabs.length;
    const ind = $('tabIndicator');
    ind.style.width = width + '%';
    // 用 transform 替代 left，避免 layout thrashing
    ind.style.transform = `translateX(${idx * 100}%)`;
  },

  async sendMessage() {
    if (this._sending) return; // 防重入
    const text = $('inputText').value.trim();
    if (!text) return;
    // 发送第一条真实消息时，清空首页示例决策简报并切换为聊天滚动模式
    const container = $('chatContainer');
    container.classList.remove('welcome-mode');
    const pageChat = $('page-chat');
    if (pageChat) pageChat.classList.add('chat-mode');
    const demo = container.querySelector('.demo-content');
    if (demo) demo.remove();
    // 输入长度二次校验（HTML maxlength可被绕过）
    if (text.length > 2000) {
      toast(I18N.t('err_input_too_long'));
      return;
    }
    this._sending = true;
    const requestSeq = this._requestSeq;
    // 视觉禁用发送按钮
    const sendBtn = $('sendBtn');
    if (sendBtn) sendBtn.disabled = true;
    // 清理转盘定时器，避免旧定时器操作新消息DOM
    if (ModeRenderer._wheelTimer1) { clearTimeout(ModeRenderer._wheelTimer1); ModeRenderer._wheelTimer1 = null; }
    if (ModeRenderer._wheelTimer2) { clearTimeout(ModeRenderer._wheelTimer2); ModeRenderer._wheelTimer2 = null; }
    $('inputText').value = '';
    $('inputText').style.height = 'auto';

    // 用户消息
    this.appendMessage(text, 'user');

    // 识别模式提示
    const actualMode = ModeRenderer.getActualMode(text);
    if (ModeRenderer.currentMode === 'auto') {
      const route = ExplainRouter.explain(text);
      const hint = el('span');
      hint.style.cssText = 'color:var(--text-tertiary);font-size:13px;';
      hint.textContent = I18N.t('render_auto_hint') + I18N.t('mode_' + actualMode) + I18N.t('render_auto_hint_end') + '，' + route.reason;
      this.appendMessageEl(hint, 'ai');
    }

    // 加载中
    const loadingMsg = this.appendLoading();

    try {
      // 仅mock模式延迟模拟思考，真实AI调用不额外延迟
      const provider = AIConfig.getActive();
      const isMock = provider.model === 'mock' || !provider.apiKey;
      if (isMock) await sleep(800);
      const res = await ModeUseCases.execute(text);
      if (requestSeq !== this._requestSeq) return;
      loadingMsg.remove();

      // AI 消息
      const msg = el('div', 'message ai');
      msg.appendChild(this.renderBadge('msg-avatar'));
      // 内容容器
      const contentWrap = el('div', 'msg-content-wrap');
      contentWrap.appendChild(res.element);
      msg.appendChild(contentWrap);
      // 朗读按钮（TTS支持时才显示）
      if (TTS.isSupported()) {
        const speakBtn = el('button', 'msg-speak-btn');
        speakBtn.setAttribute('aria-label', I18N.t('title_speak_msg'));
        speakBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
        speakBtn.title = I18N.t('btn_read');
        speakBtn.onclick = (e) => {
          e.stopPropagation();
          this.toggleSpeak(res.result, speakBtn);
        };
        contentWrap.appendChild(speakBtn);
      }
      $('chatContainer').appendChild(msg);
      this.scrollToBottom();

      // 保存决策
      const saved = await this.saveDecision(text, actualMode, res.result);
      if (!saved) contentWrap.appendChild(el('div', 'next-step', I18N.t('decision_unsaved')));

      // 自动朗读（如果用户开启了该选项）
      const pref = await DB.get('preferences', User.current?.username || 'guest').catch(() => null);
      if (pref && pref.autoSpeak && TTS.isSupported()) {
        const speakBtn = contentWrap.querySelector('.msg-speak-btn');
        this.toggleSpeak(res.result, speakBtn);
      }
    } catch (e) {
      loadingMsg.remove();
      ModeRenderer.dialogueState = null;
      this.appendMessage(I18N.t('err_general') + e.message, 'ai');
    } finally {
      this._sending = false;
      const sendBtn = $('sendBtn');
      if (sendBtn) sendBtn.disabled = false;
    }
  },

  // 切换朗读/停止
  async toggleSpeak(result, btn) {
    if (!TTS.isSupported()) {
      toast(I18N.t('toast_tts_not_supported'));
      return;
    }
    // 如果正在朗读且是同一条消息，则停止
    if (TTS.isSpeaking() && btn && btn.classList.contains('speaking')) {
      TTS.stop();
      btn.classList.remove('speaking');
      btn.title = I18N.t('btn_read');
      return;
    }
    // 停止其他正在朗读的
    TTS.stop();
    document.querySelectorAll('.msg-speak-btn.speaking').forEach(b => {
      b.classList.remove('speaking');
      b.title = I18N.t('btn_read');
    });
    // 读取用户偏好的语速/音调/语音
    let opts = {};
    try {
      const pref = await DB.get('preferences', User.current.username);
      if (pref) {
        if (pref.ttsRate != null) opts.rate = pref.ttsRate;
        if (pref.ttsPitch != null) opts.pitch = pref.ttsPitch;
        if (pref.ttsVoiceURI) opts.voiceURI = pref.ttsVoiceURI;
      }
    } catch (e) {}
    const ok = TTS.speakResult(result, opts);
    if (ok && btn) {
      btn.classList.add('speaking');
      btn.title = I18N.t('btn_stop_read');
      // 朗读结束后恢复按钮状态
      const checkEnd = setInterval(() => {
        if (!TTS.isSpeaking()) {
          btn.classList.remove('speaking');
          btn.title = I18N.t('btn_read');
          clearInterval(checkEnd);
        }
      }, 200);
    } else if (!ok) {
      toast(I18N.t('toast_no_speakable'));
    }
  },

  appendMessage(content, type, isHtml = false) {
    const msg = el('div', 'message ' + type);
    if (type === 'ai') msg.appendChild(this.renderBadge('msg-avatar'));
    const bubble = el('div', 'msg-bubble');
    if (isHtml) bubble.innerHTML = content;
    else bubble.textContent = content;
    msg.appendChild(bubble);
    $('chatContainer').appendChild(msg);
    this.scrollToBottom();
    return msg;
  },

  // 安全追加消息（接收DOM元素而非字符串）
  appendMessageEl(element, type) {
    const msg = el('div', 'message ' + type);
    if (type === 'ai') msg.appendChild(this.renderBadge('msg-avatar'));
    const bubble = el('div', 'msg-bubble');
    bubble.appendChild(element);
    msg.appendChild(bubble);
    $('chatContainer').appendChild(msg);
    this.scrollToBottom();
    return msg;
  },

  appendLoading() {
    const msg = el('div', 'message ai');
    msg.appendChild(this.renderBadge('msg-avatar'));
    const bubble = el('div', 'msg-bubble');
    const dots = el('div', 'loading-dots');
    dots.appendChild(el('span'));
    dots.appendChild(el('span'));
    dots.appendChild(el('span'));
    bubble.appendChild(dots);
    msg.appendChild(bubble);
    $('chatContainer').appendChild(msg);
    this.scrollToBottom();
    return msg;
  },

  scrollToBottom() {
    const c = $('chatContainer');
    setTimeout(() => c.scrollTop = c.scrollHeight, 50);
  },

  async saveDecision(question, mode, result) {
    const decision = {
      id: uid(),
      username: User.current.username,
      question,
      mode,
      result,
      createdAt: Date.now(),
      executed: false,
      regret: false
    };
    try {
      await DB.put('decisions', decision);
      this.currentDecision = decision;
      return true;
    } catch (e) {
      console.error('决策保存失败', e);
      toast(I18N.t('err_save_failed'));
      return false;
    }
  },

  async onDialogueComplete(state) {
    // 对话引导完成后更新当前决策
    if (this.currentDecision) {
      this.currentDecision.dialogueHistory = state.history;
      try {
        await DB.put('decisions', this.currentDecision);
      } catch (e) {
        console.error('对话历史保存失败', e);
      }
    }
  },

  /* ===== 档案 ===== */
  async renderArchive() {
    const all = await DB.getAll('decisions');
    const mine = all.filter(d => d.username === User.current.username).sort((a, b) => b.createdAt - a.createdAt);
    const list = $('archiveList');
    list.innerHTML = '';
    if (mine.length === 0) {
      const empty = el('div', 'archive-empty');
      const icon = el('div', 'emoji');
      icon.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M5 4h14v16H5z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>';
      empty.appendChild(icon);
      const emptyText = el('div');
      emptyText.appendChild(document.createTextNode(I18N.t('archive_empty')));
      emptyText.appendChild(el('br'));
      emptyText.appendChild(document.createTextNode(I18N.t('archive_empty_hint')));
      empty.appendChild(emptyText);
      list.appendChild(empty);
      return;
    }
    const modeColors = { rational: 'var(--lapis)', random: 'var(--brass)', nature: 'var(--moss)', dialogue: 'var(--plum)', fengshui: 'var(--cinnabar)', auto: 'var(--aqua)' };
    mine.forEach(d => {
      // 外层包装：用于左滑删除交互
      const wrap = el('div', 'archive-card-wrap');
      const card = el('article', 'archive-card');
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${I18N.t('mode_' + d.mode + '_short')} ${d.question}`);
      card.onclick = () => this.showDetail(d);
      card.onkeydown = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          this.showDetail(d);
        }
      };

      // 左滑删除手势：iOS 标准交互
      let startX = 0, currentX = 0, isSliding = false;
      card.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        currentX = startX;  // 同步初始化，避免 tap 误判为滑动
        isSliding = true;
      }, { passive: true });
      card.addEventListener('touchmove', (e) => {
        if (!isSliding) return;
        currentX = e.touches[0].clientX;
        const delta = currentX - startX;
        // 仅允许左滑（负值），限制最大 80px
        if (delta < 0 && delta > -80) {
          card.style.transform = `translateX(${delta}px)`;
          card.style.transition = 'none';
        }
      }, { passive: true });
      card.addEventListener('touchend', () => {
        if (!isSliding) return;
        isSliding = false;
        card.style.transition = 'transform 0.3s var(--ease-ios)';
        const delta = currentX - startX;
        // 滑动超过 40px 则展开删除按钮，否则回弹
        if (delta < -40) {
          card.classList.add('sliding');
          card.style.transform = '';
        } else {
          card.classList.remove('sliding');
          card.style.transform = '';
        }
      });

      // 新设计提案结构：header(h3 + pill) + p + archive-meta
      const header = el('header');
      header.appendChild(el('h3', '', d.question));
      const pill = el('span', 'pill');
      pill.style.background = modeColors[d.mode] || 'var(--moss)';
      pill.textContent = I18N.t('mode_' + d.mode + '_short');
      header.appendChild(pill);
      card.appendChild(header);

      let resultText = '';
      if (d.result) {
        if (d.result.conclusion) resultText = d.result.conclusion;
        else if (d.result.options) resultText = I18N.t('archive_result_options') + d.result.options.join(' / ');
        else if (d.result.poem) resultText = d.result.poem;
        else if (d.result.question) resultText = d.result.question;
      }
      card.appendChild(el('p', '', resultText));

      const meta = el('div', 'archive-meta');
      meta.appendChild(el('span', '', this.formatDate(d.createdAt)));
      let statusText = I18N.t('detail_track');
      if (d.executed) statusText = I18N.t('executed');
      if (d.regret) statusText = I18N.t('regret');
      meta.appendChild(el('span', '', statusText));
      card.appendChild(meta);

      // 删除按钮（左滑后显示）
      const delBtn = el('button', 'ac-delete-btn', I18N.t('btn_delete'));
      delBtn.onclick = async (e) => {
        e.stopPropagation();
        haptic(10);
        this.showConfirm(I18N.t('confirm_delete'), async () => {
          try {
            await DB.delete('decisions', d.id);
            haptic([10, 50, 30]);
            toast(I18N.t('toast_deleted'));
            this.renderArchive();
          } catch (err) {
            console.error('删除失败', err);
            toast(I18N.t('err_delete_failed'));
          }
        });
      };

      wrap.appendChild(card);
      wrap.appendChild(delBtn);
      list.appendChild(wrap);
    });
  },

    if (location.hash !== '#detail') {

    const body = $('detailBody');

      if (d.result.signal) sec3.appendChild(el('p', '', d.result.signal));

    btnRegret.onclick = async () => {

      d.regret = !d.regret;
      try {
        await DB.put('decisions', d);
        this.showDetail(d);
      } catch (e) {

        toast(I18N.t('err_save_failed'));
      }

    actions.appendChild(btnExec);
    actions.appendChild(btnRegret);
    sec4.appendChild(actions);
    body.appendChild(sec4);

    const sec5 = el('div', 'detail-section');
    sec5.appendChild(el('h3', '', I18N.t('detail_time')));
    sec5.appendChild(el('p', '', new Date(d.createdAt).toLocaleString(I18N.getLocale())));
    body.appendChild(sec5);

    // 删除此记录：iOS 风格红色危险操作
    const sec6 = el('div', 'detail-section');

    btnDelete.onclick = async () => {
      haptic(10);
      this.showConfirm(I18N.t('confirm_delete'), async () => {
        try {
          await DB.delete('decisions', d.id);
          haptic([10, 50, 30]);
          toast(I18N.t('toast_deleted'));
          if (location.hash === '#detail') history.back();
          else $('detailView').classList.remove('show');
          this.renderArchive();
        } catch (err) {

          toast(I18N.t('err_delete_failed'));

  formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return I18N.t('time_just_now');
    const rtf = new Intl.RelativeTimeFormat(I18N.getLocale(), { numeric: 'auto' });
    if (diff < 3600) return rtf.format(-Math.floor(diff / 60), 'minute');
    if (diff < 86400) return rtf.format(-Math.floor(diff / 3600), 'hour');
    if (diff < 604800) return rtf.format(-Math.floor(diff / 86400), 'day');
    return new Intl.DateTimeFormat(I18N.getLocale(), { month: 'short', day: 'numeric' }).format(d);
  },

  drawPieChart(decisions) {
    const canvas = $('pieChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    // 高DPI适配
    const dpr = window.devicePixelRatio || 1;
    const cssW = 320, cssH = 220;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    ctx.scale(dpr, dpr);
    const W = cssW, H = cssH;
    ctx.clearRect(0, 0, W, H);
    const style = getComputedStyle(document.documentElement);
    const textColor = style.getPropertyValue('--text-primary').trim() || '#000';
    const mutedColor = style.getPropertyValue('--text-tertiary').trim() || '#8E8E93';
    const surfaceColor = style.getPropertyValue('--surface').trim() || '#fff';
    const counts = { rational: 0, random: 0, nature: 0, dialogue: 0, fengshui: 0 };
    decisions.forEach(d => counts[d.mode] = (counts[d.mode] || 0) + 1);
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    if (total === 0) {
      ctx.fillStyle = mutedColor;
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(I18N.t('stats_no_data'), W / 2, H / 2);
      return;
    }
    const cx = W / 2 - 40, cy = H / 2, r = 80;
    const colors = { rational: '#365385', random: '#9b7636', nature: '#486a55', dialogue: '#69526f', fengshui: '#b45a42' };
    const names = { rational: I18N.t('mode_rational_short'), random: I18N.t('mode_random_short'), nature: I18N.t('mode_nature_short'), dialogue: I18N.t('mode_dialogue_short'), fengshui: I18N.t('mode_fengshui_short') };
    let start = -Math.PI / 2;
    Object.keys(counts).forEach(k => {
      const val = counts[k];
      if (val === 0) return;
      const angle = (val / total) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, start + angle);
      ctx.closePath();
      ctx.fillStyle = colors[k];
      ctx.fill();
      start += angle;
    });
    // 中心圆
    ctx.beginPath();
    ctx.arc(cx, cy, 35, 0, Math.PI * 2);
    ctx.fillStyle = surfaceColor;
    ctx.fill();
    ctx.fillStyle = textColor;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(total, cx, cy - 6);
    ctx.font = '10px sans-serif';
    ctx.fillStyle = mutedColor;
    ctx.fillText(I18N.t('stats_total_label'), cx, cy + 10);
    // 图例
    let ly = 30;
    Object.keys(counts).forEach(k => {
      ctx.fillStyle = colors[k];
      ctx.fillRect(W - 80, ly, 12, 12);
      ctx.fillStyle = textColor;
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${names[k]} ${counts[k]}`, W - 62, ly + 6);
      ly += 24;
    });
  },

  drawBarChart(decisions) {
    const canvas = $('barChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    // 高DPI适配
    const dpr = window.devicePixelRatio || 1;
    const cssW = 320, cssH = 180;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    ctx.scale(dpr, dpr);
    const W = cssW, H = cssH;
    ctx.clearRect(0, 0, W, H);
    const style = getComputedStyle(document.documentElement);
    const textColor = style.getPropertyValue('--text-primary').trim() || '#000';
    const mutedColor = style.getPropertyValue('--text-tertiary').trim() || '#8E8E93';
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(Date.now() - i * 86400 * 1000);
      const start = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
      const end = start + 86400 * 1000;
      const count = decisions.filter(x => x.createdAt >= start && x.createdAt < end).length;
      days.push({ label: new Intl.DateTimeFormat(I18N.getLocale(), { month: 'numeric', day: 'numeric' }).format(d), count });
    }
    const max = Math.max(...days.map(d => d.count), 1);
    const barW = 32, gap = (W - 40 - barW * 7) / 6;
    const baseY = H - 30;
    ctx.fillStyle = mutedColor;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    days.forEach((d, i) => {
      const x = 20 + i * (barW + gap);
      const h = (d.count / max) * (baseY - 20);
      // 渐变
      const grad = ctx.createLinearGradient(0, baseY - h, 0, baseY);
      grad.addColorStop(0, '#365385');
      grad.addColorStop(1, '#486a55');
      ctx.fillStyle = grad;
      ctx.fillRect(x, baseY - h, barW, h);
      ctx.fillStyle = mutedColor;
      ctx.fillText(d.label, x + barW / 2, H - 12);
      if (d.count > 0) {
        ctx.fillStyle = textColor;
        ctx.font = 'bold 11px sans-serif';
        ctx.fillText(d.count, x + barW / 2, baseY - h - 6);
      }
    });
  },

  /* ===== 用户卡片 ===== */
  async renderUserCard() {
    if (User.current.isGuest) {
      $('userAvatar').textContent = I18N.t('guest_avatar');
      $('userName').textContent = I18N.t('user_guest');
      $('userSub').textContent = I18N.t('user_guest_hint');
      $('loginBtn').textContent = I18N.t('btn_login');
      $('loginBtn').style.display = 'block';
    } else {
      $('userAvatar').textContent = User.current.username.charAt(0).toUpperCase();
      $('userName').textContent = User.current.username;
      const sync = await CloudSync.getStatus(User.current.username);
      $('userSub').textContent = sync ? I18N.t('synced_count', { n: sync.count }) : I18N.t('user_logged_in');
      $('loginBtn').textContent = I18N.t('btn_logout');
      $('loginBtn').style.display = 'block';
    }
    // 加载偏好
    const pref = await DB.get('preferences', User.current?.username || 'guest');
    if (pref) {
      if (ModeRecognizer.validModes.includes(pref.defaultMode)) {
        $('defaultModeValue').textContent = I18N.t('mode_' + pref.defaultMode + '_short');
      }
      if (pref.theme) {
        document.documentElement.setAttribute('data-theme', pref.theme);
        const themeNames = { light: I18N.t('theme_light'), dark: I18N.t('theme_dark'), auto: I18N.t('theme_auto') };
        $('themeValue').textContent = themeNames[pref.theme] || pref.theme;
      }
      if (pref.cloudSync !== undefined) {
        $('syncToggle').classList.toggle('on', pref.cloudSync);
        $('syncToggle').setAttribute('aria-checked', pref.cloudSync ? 'true' : 'false');
      }
      if (pref.autoSpeak !== undefined) {
        $('autoSpeakToggle').classList.toggle('on', pref.autoSpeak);
        $('autoSpeakToggle').setAttribute('aria-checked', pref.autoSpeak ? 'true' : 'false');
        $('ttsToggle').classList.toggle('speak-on', pref.autoSpeak);
        $('ttsToggle').setAttribute('aria-pressed', pref.autoSpeak ? 'true' : 'false');
      }
      if (pref.ttsRate || pref.ttsPitch) {
        const isDefault = (!pref.ttsRate || Math.abs(pref.ttsRate - 1) < 0.05) && (!pref.ttsPitch || Math.abs(pref.ttsPitch - 1) < 0.05);
        $('ttsParamsValue').textContent = isDefault ? I18N.t('values_default') : I18N.t('tts_params_value', { rate: (pref.ttsRate || 1).toFixed(1), pitch: (pref.ttsPitch || 1).toFixed(1) });
      }
      if (pref.language && I18N.langs[pref.language]) {
        $('languageValue').textContent = I18N.langs[pref.language].name;
      }
    }
  },

  /* ===== 登录弹窗 ===== */
  openLoginModal() {
    if (!User.current.isGuest) {
      // 登出
      this.showConfirm(I18N.t('confirm_logout'), async () => {
        await User.logout();
        this.renderUserCard();
        toast(I18N.t('toast_logout'));
      });
      return;
    }
    const content = $('modalContent');
    content.innerHTML = `
      <div class="modal-title">${I18N.t('login_title')}</div>
      <div class="modal-tabs" role="tablist">
        <button type="button" class="modal-tab active" data-tab="login" role="tab" aria-selected="true">${I18N.t('login_tab_login')}</button>
        <button type="button" class="modal-tab" data-tab="register" role="tab" aria-selected="false">${I18N.t('login_tab_register')}</button>
      </div>
      <label for="loginUser" class="sr-only">${I18N.t('login_username')}</label>
      <input class="modal-input" id="loginUser" name="username" placeholder="${I18N.t('login_username')}" autocomplete="username" maxlength="32" spellcheck="false">
      <label for="loginPass" class="sr-only">${I18N.t('login_password')}</label>
      <input class="modal-input" id="loginPass" name="password" type="password" placeholder="${I18N.t('login_password')}" autocomplete="current-password" maxlength="128">
      <button class="modal-btn primary" id="loginSubmit">${I18N.t('login_tab_login')}</button>
      <button class="modal-btn secondary" id="loginCancel">${I18N.t('btn_cancel')}</button>
      <div style="text-align:center;margin-top:10px;font-size:11px;color:var(--text-tertiary);">${I18N.t('login_security_note')}</div>
    `;
    OverlayManager.show('modalOverlay');
    let mode = 'login';
    content.querySelectorAll('.modal-tab').forEach(t => {
      t.onclick = () => {
        content.querySelectorAll('.modal-tab').forEach(x => {
          x.classList.remove('active');
          x.setAttribute('aria-selected', 'false');
        });
        t.classList.add('active');
        t.setAttribute('aria-selected', 'true');
        mode = t.dataset.tab;
        $('loginSubmit').textContent = mode === 'login' ? I18N.t('login_tab_login') : I18N.t('login_tab_register');
      };
    });
    $('loginCancel').onclick = () => this.closeModal();
    $('loginSubmit').onclick = async () => {
      const submit = $('loginSubmit');
      if (submit.disabled) return;
      submit.disabled = true;
      const u = $('loginUser').value.trim();
      const p = $('loginPass').value;
      try {
        if (mode === 'register') await User.register(u, p);
        else await User.login(u, p);
        this.closeModal();
        this.renderUserCard();
        toast(mode === 'register' ? I18N.t('toast_register_ok') : I18N.t('toast_login_ok'));
      } catch (e) {
        toast(e.message);
      } finally {
        if (document.contains(submit)) submit.disabled = false;
      }
    };
  },

  /* ===== 设置项 ===== */
  async pickDefaultMode() {
    const modes = [
      { id: 'auto', name: I18N.t('mode_auto_short') },
      { id: 'rational', name: I18N.t('mode_rational') },
      { id: 'random', name: I18N.t('mode_random') },
      { id: 'nature', name: I18N.t('mode_nature') },
      { id: 'dialogue', name: I18N.t('mode_dialogue') },
      { id: 'fengshui', name: I18N.t('mode_fengshui') }
    ];
    const content = $('modalContent');

  /* ===== 语言切换 ===== */
  async pickLanguage() {
    const content = $('modalContent');
    content.innerHTML = '<div class="modal-title">' + I18N.t('lang_title') + '</div>';
    // 当前语言
    const username = User.current?.username || 'guest';
    const pref = (await DB.get('preferences', username).catch(() => null)) || { username };
    const currentLang = pref.language || 'zh-CN';
    // 列出所有语言选项，每项显示该语言自己的名称（不是中文写"English"）
    Object.entries(I18N.langs).forEach(([code, info]) => {
      const b = el('button', 'modal-btn' + (code === currentLang ? ' primary' : ' secondary'));
      b.style.cssText = 'display:flex;justify-content:space-between;align-items:center;';
      const left = el('span', '', info.name);
      const right = el('span');
      right.style.cssText = 'font-size:12px;color:var(--text-tertiary);';
      right.textContent = code === currentLang ? '✓' : '';
      b.appendChild(left);
      b.appendChild(right);
      b.onclick = async () => {
        try {
          // 切换语言
          I18N.setLang(code);
          pref.language = code;
          pref.username = username;
          await DB.put('preferences', pref);
          // 应用翻译到DOM
          I18N.applyToDOM();
          // 更新语言显示值
          $('languageValue').textContent = info.name;
          this.closeModal();
          toast(I18N.t('lang_changed') + ': ' + info.name);
          // 重新渲染当前页面
          this.renderUserCard();
          if (this.currentTab === 'archive') this.renderArchive();
          if (this.currentTab === 'stats') this.renderStats();
          // 重新渲染欢迎消息（如果聊天区只有欢迎消息）
          const msgs = $('chatContainer').children;
          if (msgs.length <= 1) {
            $('chatContainer').innerHTML = '';
            this.renderWelcome();
          }
        } catch (e) {
          console.error('语言切换失败', e);
          toast(I18N.t('err_general') + e.message);
        }
      };
      content.appendChild(b);
    });
    content.appendChild(el('button', 'modal-btn secondary', I18N.t('btn_cancel'))).onclick = () => this.closeModal();
    OverlayManager.show('modalOverlay');
  },

  async editTTSParams() {
    if (!TTS.isSupported()) {
      toast(I18N.t('toast_tts_not_supported'));
      return;
    }
    const pref = (await DB.get('preferences', User.current.username)) || { username: User.current.username };
    const rate = pref.ttsRate != null ? pref.ttsRate : 0.95;
    const pitch = pref.ttsPitch != null ? pref.ttsPitch : 1.05;
    const savedVoiceURI = pref.ttsVoiceURI || '';
    const content = $('modalContent');
    content.innerHTML = '<div class="modal-title">' + I18N.t('tts_title') + '</div>';

    // 语音选择器：列出当前语言可用的所有voice
    const voiceRow = el('div');
    const voiceHeader = el('div');
    voiceHeader.style.cssText = 'display:flex;justify-content:space-between;font-size:13px;margin:10px 0 4px;';
    voiceHeader.appendChild(el('span', '', I18N.t('tts_voice') || '语音'));
    voiceRow.appendChild(voiceHeader);
    const voiceSelect = el('select');
    voiceSelect.style.cssText = 'width:100%;padding:8px 10px;border-radius:10px;border:0.5px solid var(--separator);background:var(--surface);font-size:14px;font-family:var(--font-text);';
    const voices = TTS.getVoicesForLang();
    const autoOpt = el('option', '', I18N.t('tts_voice_auto') || '自动（系统默认）');
    autoOpt.value = '';
    voiceSelect.appendChild(autoOpt);
    voices.forEach(v => {
      const opt = el('option', '', v.name + (v.localService ? '' : '（网络）'));
      opt.value = v.voiceURI;
      if (v.voiceURI === savedVoiceURI) opt.selected = true;
      voiceSelect.appendChild(opt);
    });
    if (voices.length === 0) {
      const opt = el('option', '', I18N.t('tts_voice_none') || '当前语言无可用语音');
      opt.disabled = true;
      voiceSelect.appendChild(opt);
    }
    voiceRow.appendChild(voiceSelect);
    content.appendChild(voiceRow);

    // 语速
    const rateRow = el('div');
    const rateHeader = el('div');
    rateHeader.style.cssText = 'display:flex;justify-content:space-between;font-size:13px;margin:10px 0 4px;';
    rateHeader.appendChild(el('span', '', I18N.t('tts_rate')));
    const rateVal = el('span', '', rate.toFixed(2) + 'x');
    rateVal.id = 'tts_rate_val';
    rateHeader.appendChild(rateVal);
    rateRow.appendChild(rateHeader);
    const rateSlider = el('input');
    rateSlider.type = 'range';
    rateSlider.min = '0.5'; rateSlider.max = '1.5'; rateSlider.step = '0.05'; rateSlider.value = rate;
    rateSlider.style.width = '100%';
    rateSlider.oninput = () => rateVal.textContent = parseFloat(rateSlider.value).toFixed(2) + 'x';
    rateRow.appendChild(rateSlider);
    content.appendChild(rateRow);

    // 音调
    const pitchRow = el('div');
    const pitchHeader = el('div');
    pitchHeader.style.cssText = 'display:flex;justify-content:space-between;font-size:13px;margin:10px 0 4px;';
    pitchHeader.appendChild(el('span', '', I18N.t('tts_pitch')));
    const pitchVal = el('span', '', pitch.toFixed(2));
    pitchVal.id = 'tts_pitch_val';
    pitchHeader.appendChild(pitchVal);
    pitchRow.appendChild(pitchHeader);
    const pitchSlider = el('input');
    pitchSlider.type = 'range';
    pitchSlider.min = '0.5'; pitchSlider.max = '1.5'; pitchSlider.step = '0.05'; pitchSlider.value = pitch;
    pitchSlider.style.width = '100%';
    pitchSlider.oninput = () => pitchVal.textContent = parseFloat(pitchSlider.value).toFixed(2);
    pitchRow.appendChild(pitchSlider);
    content.appendChild(pitchRow);

    // 试听按钮
    const previewBtn = el('button', 'modal-btn secondary', I18N.t('btn_preview'));
    previewBtn.style.marginTop = '10px';
    previewBtn.onclick = () => {
      TTS.speak(I18N.t('tts_preview_text'), {
        rate: parseFloat(rateSlider.value),
        pitch: parseFloat(pitchSlider.value),
        voiceURI: voiceSelect.value
      });
    };
    content.appendChild(previewBtn);

    const saveBtn = el('button', 'modal-btn primary', I18N.t('btn_save'));
    saveBtn.onclick = async () => {
      pref.ttsRate = parseFloat(rateSlider.value);
      pref.ttsPitch = parseFloat(pitchSlider.value);
      pref.ttsVoiceURI = voiceSelect.value;
      await DB.put('preferences', pref);
      TTS.stop();
      const isDefault = Math.abs(pref.ttsRate - 0.95) < 0.05 && Math.abs(pref.ttsPitch - 1.05) < 0.05 && !pref.ttsVoiceURI;
      $('ttsParamsValue').textContent = isDefault ? I18N.t('values_default') : I18N.t('tts_params_value', { rate: pref.ttsRate.toFixed(2), pitch: pref.ttsPitch.toFixed(2) });
      this.closeModal();
      toast(I18N.t('toast_tts_params_saved'));
    };
    content.appendChild(saveBtn);
    content.appendChild(el('button', 'modal-btn secondary', I18N.t('btn_cancel'))).onclick = () => { TTS.stop(); this.closeModal(); };
    OverlayManager.show('modalOverlay');
  },

  /* ===== 相机 ===== */
  async openCamera() {
    if (!navigator.mediaDevices?.getUserMedia) {
      toast(I18N.t('err_camera') + I18N.t('err_sr_not_supported'));
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      $('cameraVideo').srcObject = stream;
      OverlayManager.show('cameraView');
      setTimeout(() => $('cameraClose').focus({ preventScroll: true }), 0);
      this._cameraStream = stream;
    } catch (e) {
      toast(I18N.t('err_camera') + e.message);
    }
  },

  closeCamera() {
    if (this._cameraStream) {
      this._cameraStream.getTracks().forEach(t => t.stop());
      this._cameraStream = null;
    }
    OverlayManager.hide('cameraView');
  },

  capturePhoto() {
    try {
      const video = $('cameraVideo');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      // 简单识别：取平均亮度
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      let sum = 0;
      for (let i = 0; i < data.length; i += 4) sum += (data[i] + data[i + 1] + data[i + 2]) / 3;
      const avg = Math.round(sum / (data.length / 4));
      this.closeCamera();
      const desc = avg > 200 ? I18N.t('cam_white') : avg > 128 ? I18N.t('cam_light') : avg > 64 ? I18N.t('cam_dark') : I18N.t('cam_black');
      $('inputText').value = I18N.t('cam_input_template', { desc });
      $('inputText').focus();
      haptic([10, 50, 30]); // 拍照成功反馈
      toast(I18N.t('toast_photo_recognized') + desc);
    } catch (e) {
      this.closeCamera();
      toast(I18N.t('err_camera_fail'));
    }
  },

  /* ===== 语音 ===== */
  toggleVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      toast(I18N.t('err_sr_not_supported'));
      return;
    }
    if (this._recognition) {
      try { this._recognition.stop(); } catch (e) {}
      try { this._recognition.abort(); } catch (e) {}
      this._recognition = null;
      $('voiceBtn').classList.remove('recording');
      clearTimeout(this._srTimeout);
      return;
    }
    const r = new SR();
    r.lang = I18N.getSRLang();
    r.continuous = false;
    r.interimResults = false;
    r.onresult = (e) => {
      const text = e.results[0][0].transcript;
      $('inputText').value = text;
      $('inputText').focus();
    };
    r.onerror = (e) => {
      toast(I18N.t('err_sr_failed') + e.error);
      $('voiceBtn').classList.remove('recording');
      this._recognition = null;
      clearTimeout(this._srTimeout);
    };
    r.onend = () => {
      $('voiceBtn').classList.remove('recording');
      this._recognition = null;
      clearTimeout(this._srTimeout);
    };
    try {
      r.start();
    } catch (e) {
      toast(I18N.t('err_sr_failed') + e.message);
      return;
    }
    this._recognition = r;
    $('voiceBtn').classList.add('recording');
    toast(I18N.t('toast_sr_start'));
    // 安全超时：防止识别器卡住
    this._srTimeout = setTimeout(() => {
      if (this._recognition) {
        try { this._recognition.stop(); } catch (e) {}
        this._recognition = null;
        $('voiceBtn').classList.remove('recording');
      }
    }, 10000);
  },

      opt.type = 'button';
      opt.setAttribute('aria-label', I18N.t('logo_' + logo.id));
      const iconDiv = el('div', 'logo-icon');

      opt.appendChild(el('span', 'logo-option-label', I18N.t('logo_' + logo.id)));

        this.currentLogo = logo.id;

  closeLogoPicker() {
    OverlayManager.hide('logoPicker');
  },

  async updateLogo(logo) {
    const icon = document.querySelector('.nav-logo .logo-icon');
    if (icon) {
      icon.style.background = logo.bg;
      icon.innerHTML = logo.icon;
    }
    document.querySelectorAll('.msg-avatar').forEach(node => {
      node.textContent = '';
      node.style.background = logo.bg;
      node.innerHTML = logo.icon;
    });
    try {
      const username = User.current?.username || 'guest';
      const pref = (await DB.get('preferences', username)) || { username };
      pref.logo = logo.id;
      await DB.put('preferences', pref);
    } catch (e) { console.warn('logo保存失败', e); }
  },

  async loadLogo() {
    let saved = null;
    try {
      const username = User.current?.username || 'guest';
      const pref = await DB.get('preferences', username);
      saved = pref?.logo;
    } catch (e) {}
    if (saved) {
      this.currentLogo = saved;
      const logo = this.logoOptions.find(l => l.id === saved);
      if (logo) {
        this.updateLogo(logo);
        return;
      }
    }
    // 如果没有保存的logo或找不到，使用默认logo
    const defaultLogo = this.logoOptions.find(l => l.id === 'tree1');
    if (defaultLogo) {
      this.currentLogo = 'tree1';
      this.updateLogo(defaultLogo);
    }
  }
};
