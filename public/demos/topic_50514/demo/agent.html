<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 工作台 — 企业背调智能Agent系统 (Demo)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #050509;
            --bg-panel: #0d0d12;
            --bg-elevated: #14141b;
            --text-primary: #f0f0f5;
            --text-secondary: #8a8a9a;
            --accent-cyan: #00f0ff;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-green: #10b981;
            --accent-yellow: #facc15;
            --accent-blue: #60a5fa;
            --accent-red: #f87171;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(0, 240, 255, 0.3);
            --gradient-accent: linear-gradient(135deg, #00f0ff 0%, #a855f7 50%, #ec4899 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }

        body {
            position: relative;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 240, 255, 0.2) rgba(255, 255, 255, 0.02);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 80%);
        }

        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 18px 0;
            background: rgba(5, 5, 9, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }

        .nav-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--gradient-accent);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            color: #fff;
            font-size: 14px;
        }

        .nav-logo-text {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .demo-badge {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(236, 72, 153, 0.15);
            border: 1px solid rgba(236, 72, 153, 0.4);
            border-radius: 5px;
            font-size: 10px;
            color: var(--accent-pink);
            font-family: 'JetBrains Mono', monospace;
            margin-left: 8px;
            vertical-align: middle;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .btn-primary {
            background: var(--gradient-accent);
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.35);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .app-page {
            min-height: 100vh;
            padding: 100px 24px 40px;
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .query-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .query-bar input {
            flex: 1;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
            font-family: 'Space Grotesk', sans-serif;
        }

        .form-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.08);
        }

        .form-input::placeholder {
            color: rgba(138, 138, 154, 0.5);
        }

        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .chip {
            padding: 7px 14px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
        }

        .chip:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.1);
        }

        .chip.active {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.12);
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            min-height: calc(100vh - 300px);
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 280px);
        }

        .panel-header {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 600;
        }

        .panel-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 240, 255, 0.2) rgba(255, 255, 255, 0.02);
        }

        .panel-body::-webkit-scrollbar {
            width: 5px;
        }

        .panel-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .panel-body::-webkit-scrollbar-thumb {
            background: rgba(0, 240, 255, 0.2);
            border-radius: 3px;
        }

        .panel-body::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 240, 255, 0.35);
        }

        .log-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-line {
            padding: 6px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            word-break: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-line.step { color: var(--accent-cyan); }
        .log-line.tool { color: var(--accent-yellow); }
        .log-line.agent { color: var(--accent-blue); }
        .log-line.error { color: var(--accent-red); }
        .log-line.success { color: var(--accent-green); }
        .log-line.info { color: var(--text-secondary); }

        .report-preview {
            word-break: break-word;
            color: var(--text-primary);
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'PingFang SC', sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }

        .report-preview > *:first-child { margin-top: 0 !important; }
        .report-preview > *:last-child { margin-bottom: 0 !important; }

        .report-preview h1,
        .report-preview h2,
        .report-preview h3,
        .report-preview h4 {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'PingFang SC', sans-serif;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.35;
            margin: 0;
            padding: 0;
        }

        .report-preview h1 {
            font-size: 22px;
            padding-bottom: 10px;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .report-preview h2 {
            font-size: 17px;
            color: var(--accent-cyan);
            margin-top: 22px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .report-preview h3 {
            font-size: 15px;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .report-preview h4 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 14px;
            margin-bottom: 6px;
        }

        .report-preview p {
            margin: 0 0 10px;
            color: var(--text-secondary);
        }

        .report-preview strong,
        .report-preview b {
            color: var(--text-primary);
            font-weight: 600;
        }

        .report-preview a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        .report-preview a:hover { text-decoration: underline; }

        .report-preview ul,
        .report-preview ol {
            margin: 0 0 12px 18px;
            padding: 0;
            color: var(--text-secondary);
        }

        .report-preview ul { list-style-type: disc; }
        .report-preview ol { list-style-type: decimal; }

        .report-preview li {
            margin: 0 0 5px;
            padding-left: 2px;
        }

        .report-preview li > ul,
        .report-preview li > ol {
            margin-top: 4px;
            margin-bottom: 4px;
        }

        .report-preview code {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--accent-pink);
        }

        .report-preview pre {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
            margin: 0 0 12px;
        }

        .report-preview pre code {
            background: transparent;
            padding: 0;
            color: var(--text-primary);
        }

        .report-preview table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 0 14px;
            font-size: 13px;
            border-radius: 8px;
            overflow: hidden;
        }

        .report-preview th,
        .report-preview td {
            border: 1px solid var(--border-subtle);
            padding: 8px 10px;
            text-align: left;
            vertical-align: top;
        }

        .report-preview th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-weight: 600;
        }

        .report-preview tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .report-preview blockquote {
            border-left: 3px solid var(--accent-purple);
            margin: 0 0 12px;
            padding: 6px 0 6px 14px;
            color: var(--text-secondary);
            background: rgba(168, 85, 247, 0.04);
            border-radius: 0 6px 6px 0;
        }

        .report-preview hr {
            border: none;
            border-top: 1px solid var(--border-subtle);
            margin: 18px 0;
        }

        .report-preview img {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }

        .report-preview .empty-state {
            padding: 0;
        }

        .empty-state {
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 100px;
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid var(--border-glow);
            color: var(--accent-cyan);
        }

        .status-badge.running::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-badge.done {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--accent-green);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .download-wrap {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }

        .progress-bar-wrap {
            margin-top: 12px;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--gradient-accent);
            border-radius: 2px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .toast {
            position: fixed;
            top: 90px;
            right: 24px;
            z-index: 2000;
            padding: 12px 20px;
            background: var(--bg-elevated);
            border: 1px solid var(--accent-green);
            border-radius: 10px;
            color: var(--accent-green);
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease, fadeOut 0.4s ease 2.6s forwards;
            pointer-events: none;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; }
            .query-bar { flex-direction: column; }
            .panel { max-height: 50vh; }
            .app-page { padding: 90px 16px 30px; }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 240, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 240, 255, 0.35);
        }

        ::-webkit-scrollbar-corner {
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon">CB</div>
                <span class="nav-logo-text">企业背调Agent<span class="demo-badge">DEMO</span></span>
            </a>
            <div class="nav-actions">
                <a href="index.html" class="btn btn-secondary">← 返回首页</a>
            </div>
        </div>
    </nav>

    <main class="app-page">
        <div class="container">
            <div class="query-bar">
                <input type="text" id="company-input" class="form-input" placeholder="请输入企业名称，例如：深圳市腾讯计算机系统有限公司" value="示例科技有限公司">
                <button id="start-btn" class="btn btn-primary" style="padding:14px 28px;white-space:nowrap;">开始调查</button>
            </div>
            <div class="quick-chips" id="quick-chips">
                <span style="font-size:12px;color:var(--text-secondary);margin-right:4px;line-height:30px;">快速体验:</span>
                <span class="chip active" data-company="示例科技有限公司">示例科技有限公司</span>
                <span class="chip" data-company="星辰互联网集团有限公司">星辰互联网集团</span>
                <span class="chip" data-company="东海新能源股份公司">东海新能源股份</span>
                <span class="chip" data-company="锦程国际贸易有限公司">锦程国际贸易</span>
            </div>

            <div class="workspace">
                <section class="panel">
                    <div class="panel-header">
                        <span class="panel-title">执行日志</span>
                        <span id="status-badge" class="status-badge">就绪</span>
                    </div>
                    <div class="panel-body">
                        <div id="log-container" class="log-container">
                            <div class="empty-state">点击"开始调查"或选择上方企业，Agent 执行过程将实时显示在这里</div>
                        </div>
                        <div class="progress-bar-wrap" id="progress-wrap" style="display:none;">
                            <div class="progress-bar-fill" id="progress-fill"></div>
                        </div>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <span class="panel-title">报告预览</span>
                    </div>
                    <div class="panel-body">
                        <div id="report-preview" class="report-preview">
                            <div class="empty-state">报告生成后将在这里显示</div>
                        </div>
                        <div id="download-wrap" class="download-wrap"></div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        // ============ Demo Simulation Engine ============

        let isRunning = false;
        let timers = [];
        let reportContent = '';

        function formatTime() {
            return new Date().toLocaleTimeString('zh-CN', { hour12: false });
        }

        function $(id) { return document.getElementById(id); }

        function appendLog(message, type) {
            if (type === void 0) type = 'info';
            var container = $('log-container');
            if (!container) return;
            var line = document.createElement('div');
            line.className = 'log-line ' + type;
            line.innerHTML = '<span style="opacity:0.5">[' + formatTime() + ']</span> ' + escapeHtml(message);
            container.appendChild(line);
            container.scrollTop = container.scrollHeight;
        }

        function appendReport(content) {
            var preview = $('report-preview');
            if (!preview) return;
            reportContent += content;
            if (window.marked) {
                preview.innerHTML = marked.parse(reportContent);
            } else {
                preview.textContent = reportContent;
            }
            preview.parentElement.scrollTop = preview.parentElement.scrollHeight;
        }

        function setStatus(text, running) {
            if (running === void 0) running = false;
            var badge = $('status-badge');
            if (!badge) return;
            badge.textContent = text;
            badge.className = 'status-badge' + (running ? ' running' : '') + (text === '已完成' ? ' done' : '');
        }

        function setProgress(pct) {
            var wrap = $('progress-wrap');
            var fill = $('progress-fill');
            if (!wrap || !fill) return;
            wrap.style.display = 'block';
            fill.style.width = pct + '%';
        }

        function resetWorkspace() {
            reportContent = '';
            var container = $('log-container');
            if (container) container.innerHTML = '';
            var preview = $('report-preview');
            if (preview) {
                preview.innerHTML = '<div class="empty-state">报告生成后将在这里显示</div>';
            }
            var wrap = $('download-wrap');
            if (wrap) wrap.innerHTML = '';
            setProgress(0);
            $('progress-wrap').style.display = 'none';
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg) {
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3200);
        }

        // Simulate report download
        function downloadReport(companyName) {
            var text = reportContent;
            // Strip markdown for plain text download
            var plainText = text.replace(/#{1,6}\s/g, '').replace(/\*\*/g, '').replace(/\*/g, '').replace(/`/g, '').replace(/\[|\]|\(|\)/g, '');
            var blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = companyName.replace(/[\\/:*?"<>|]/g, '_') + '_背调报告.md';
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            showToast('报告已下载！');
        }

        // The demo simulation data
        function getDemoReport(companyName) {
            return [
                '# ' + companyName + ' — 企业背景调查报告\n',
                '\n> **报告生成时间**: ' + new Date().toLocaleString('zh-CN') + '\n',
                '> **调查方式**: 多Agent协作自动调查\n',
                '> **风险等级**: <span style="color:#facc15;">⚠ 中等风险</span>\n',
                '\n---\n',
                '\n## 一、企业基本信息\n',
                '\n| 项目 | 内容 |\n',
                '|------|------|\n',
                '| 企业名称 | ' + companyName + ' |\n',
                '| 统一社会信用代码 | 91330100MA2XXXXXX |\n',
                '| 法定代表人 | 张** |\n',
                '| 注册资本 | 5000万元人民币 |\n',
                '| 成立日期 | 2018-03-15 |\n',
                '| 经营状态 | 存续（在营、开业、在册） |\n',

        // Main simulation orchestrator
        function startDemo(companyName) {
            if (isRunning) return;
            isRunning = true;

            var btn = $('start-btn');
            var input = $('company-input');
            input.value = companyName;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 调查中...';

            resetWorkspace();
            setStatus('运行中', true);
            setProgress(5);

            var demoParts = getDemoReport(companyName);

            // Simulation timeline — each entry: [delay_ms, log_message, log_type, action]
            var timeline = [
                [300, 'Coordinator Agent 初始化完成', 'step'],
                [500, '接收到调查任务: ' + companyName, 'info'],
                [700, '任务拆解: 工商查询 → 司法分析 → 舆情扫描 → 报告生成', 'step'],
                [900, '子Agent [Business Check] 启动 — 查询工商信息', 'agent'],
                [1100, '调用工具: web_search — 搜索企业工商注册信息', 'tool'],
                [1300, '工具完成: web_search — 获取到 8 条相关记录', 'tool'],
                [1500, '调用工具: web_scrape — 抓取企业详情页', 'tool'],
                [1800, '工具完成: web_scrape — 工商数据提取完成', 'tool'],
                [2000, '子Agent [Business Check] 完成 — 工商信息查询完毕', 'agent'],
                [2200, '子Agent [Judicial Check] 启动 — 分析司法风险', 'agent'],
                [2400, '调用工具: web_search — 检索裁判文书、执行信息', 'tool'],
                [2700, '工具完成: web_search — 检索到 3 条相关司法记录', 'tool'],
                [2900, '调用工具: database_query — 查询失信被执行人名单', 'tool'],
                [3100, '工具完成: database_query — 未发现失信记录', 'tool'],
                [3300, '子Agent [Judicial Check] 完成 — 司法风险分析完毕', 'agent'],
                [3500, '子Agent [Sentiment] 启动 — 扫描舆情数据', 'agent'],
                [3700, '调用工具: web_search — 搜索新闻、社交媒体舆情', 'tool'],
                [3900, '工具完成: web_search — 采集到 1,247 条舆情信息', 'tool'],
                [4100, '调用工具: sentiment_analyze — NLP情感分析中...', 'tool'],
                [4400, '工具完成: sentiment_analyze — 正面62.3% / 中性28.7% / 负面9.0%', 'tool'],
                [4600, '子Agent [Sentiment] 完成 — 舆情分析完毕', 'agent'],
                [4800, '子Agent [Report Writer] 启动 — 汇总生成报告', 'agent'],
                [5000, '正在整合各Agent分析结果...', 'info'],
                [5200, '正在生成结构化报告...', 'info'],
            ];

            var totalSteps = timeline.length + demoParts.length;
            var currentStep = 0;
            var timeAccum = 0;

            // Schedule log entries
            timeline.forEach(function(entry) {
                timeAccum += entry[0];
                var msg = entry[1];
                var type = entry[2];
                timers.push(setTimeout(function() {
                    currentStep++;
                    appendLog(msg, type);
                    setProgress(Math.round((currentStep / totalSteps) * 100));
                }, timeAccum));
            });

            // Schedule report content — each part appears with delay
            demoParts.forEach(function(part, i) {
                timeAccum += 600 + Math.random() * 400;
                timers.push(setTimeout(function() {
                    currentStep++;
                    appendReport(part);
                    setProgress(Math.round((currentStep / totalSteps) * 100));
                }, timeAccum));
            });

            // Final completion
            timeAccum += 800;
            timers.push(setTimeout(function() {
                setProgress(100);
                appendLog('调查完成 — 所有Agent任务执行完毕', 'success');
                setStatus('已完成', false);
                btn.disabled = false;
                btn.textContent = '开始调查';
                isRunning = false;

                // Add download button
                var wrap = $('download-wrap');
                wrap.innerHTML = '';
                var dlBtn = document.createElement('button');
                dlBtn.className = 'btn btn-primary';
                dlBtn.textContent = '下载报告 (Markdown)';
                dlBtn.style.marginTop = '0';
                dlBtn.addEventListener('click', function() {
                    downloadReport(companyName);
                });
                var resetBtn = document.createElement('button');
                resetBtn.className = 'btn btn-secondary';
                resetBtn.textContent = '重新调查';
                resetBtn.addEventListener('click', function() {
                    input.value = '';
                    input.focus();
                    resetWorkspace();
                    setStatus('就绪');
                    setProgress(0);
                    $('progress-wrap').style.display = 'none';
                });
                wrap.appendChild(dlBtn);
                wrap.appendChild(resetBtn);

                showToast('调查报告生成完毕！');
            }, timeAccum));
        }

        function stopAllTimers() {
            timers.forEach(function(t) { clearTimeout(t); });
            timers = [];
        }

        // ============ Event Bindings ============

        var startBtn = $('start-btn');
        var input = $('company-input');

        startBtn.addEventListener('click', function() {
            if (isRunning) return;
            var q = input.value.trim();
            if (!q) {
                input.focus();
                return;
            }
            startDemo(q);
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (isRunning) return;
                var q = input.value.trim();
                if (!q) return;
                startDemo(q);
            }
        });

        // Quick chips
        var chips = document.querySelectorAll('.chip');
        chips.forEach(function(chip) {
            chip.addEventListener('click', function() {
                if (isRunning) return;
                chips.forEach(function(c) { c.classList.remove('active'); });
                chip.classList.add('active');
                var company = chip.getAttribute('data-company');
                input.value = company;
                startDemo(company);
            });
        });

        // Auto-focus input
        input.focus();
        input.setSelectionRange(0, input.value.length);
    </script>
