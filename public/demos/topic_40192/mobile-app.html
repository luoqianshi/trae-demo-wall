          const confirmed = status === 'toRate' || status === 'completed';
          return {
            id: `m${idx + 1}`,
            serviceId: s.id,
            serviceName: s.name,
            type: s.type === 'need' ? '申请' : '邀请',
            from: { userId: s.publisherId, emoji: s.publisher.emoji, name: s.publisher.name },
            toUserId: currentUser.id,

            createdAt: s.publishTime,
            expanded: false,

        transactions: generateInitialTransactions(currentUser),
        reviews: generateInitialReviews(),
      };
    }

    function generateInitialTransactions(currentUser) {
      return [
        { id: 't1', type: 'income', amount: 1.5, desc: '完成 取快递/外卖', date: '2026-06-20', userId: currentUser.id },

    function initialStateFactory() {
      const currentUser = users.find((u) => u.id === 'u2');
      const initial = buildInitialState(currentUser);
      return {

        ...initial,
      };

    function appReducer(state, action) {
      switch (action.type) {
        case 'SET_CURRENT_USER': {
          const user = state.users.find((u) => u.id === action.payload);
          if (!user) return state;
          return { ...state, currentUser: user };
        }
        case 'PUBLISH_SERVICE': {
          const newService = {
            ...action.payload,
            id: `s${Date.now()}`,
            status: 'open',
            publishTime: '刚刚',
            distance: '0km',
            publisher: {
              emoji: state.currentUser.emoji,
              name: state.currentUser.name,
              rating: state.currentUser.rating,
            },
            publisherId: state.currentUser.id,
          };
          return { ...state, services: [newService, ...state.services] };
        }
        case 'TAKE_ORDER': {
          const { serviceId, applicantId, messageId } = action.payload;
          const applicant = state.users.find((u) => u.id === applicantId);
          const service = state.services.find((s) => s.id === serviceId);
          if (!service) return state;

          if (messageId) {
            return {
              ...state,
              services: state.services.map((s) =>
                s.id === serviceId ? { ...s, status: 'inProgress', applicant } : s
              ),
              messages: state.messages.map((m) =>
                m.id === messageId
                  ? { ...m, status: 'inProgress', confirmedByPublisher: false, confirmedByApplicant: false }
                  : m
              ),
            };
          }

          const publisher = state.users.find((u) => u.id === service.publisherId);
          const newMessage = {
            id: `m${Date.now()}`,
            serviceId,
            serviceName: service.name,
            type: service.type === 'need' ? '申请' : '邀请',
            from: { userId: publisher.id, emoji: publisher.emoji, name: publisher.name },
            toUserId: applicantId,
            content:
              service.type === 'need'
                ? `${publisher.name} 发布了「${service.name}」需求，您是否愿意接单？`
                : `${publisher.name} 提供了「${service.name}」服务，您是否感兴趣？`,
            status: 'pending',
            createdAt: '刚刚',
            expanded: false,
            reviewed: false,
            confirmedByPublisher: false,
            confirmedByApplicant: false,
          };
          return {
            ...state,
            services: state.services.map((s) =>
              s.id === serviceId ? { ...s, status: 'inProgress', applicant } : s
            ),
            messages: [newMessage, ...state.messages],
          };
        }
        case 'COMPLETE_ORDER': {
          const { messageId } = action.payload;
          const message = state.messages.find((m) => m.id === messageId);
          if (!message) return state;
          const service = state.services.find((s) => s.id === message.serviceId);
          if (!service || !service.applicant) return state;

          const isPublisher = state.currentUser.id === service.publisherId;
          const isApplicant = state.currentUser.id === service.applicant.id;
          if (!isPublisher && !isApplicant) return state;

          const updatedMessage = {
            ...message,
            confirmedByPublisher: message.confirmedByPublisher || isPublisher,
            confirmedByApplicant: message.confirmedByApplicant || isApplicant,
          };
          const bothConfirmed = updatedMessage.confirmedByPublisher && updatedMessage.confirmedByApplicant;

          return {
            ...state,
            services: state.services.map((s) =>
              s.id === message.serviceId ? { ...s, status: bothConfirmed ? 'toRate' : 'inProgress' } : s
            ),
            messages: state.messages.map((m) =>
              m.id === messageId ? { ...updatedMessage, status: bothConfirmed ? 'toRate' : 'inProgress' } : m
            ),
          };
        }
        case 'SUBMIT_REVIEW': {
          const { messageId, rating, tags, content } = action.payload;
          const message = state.messages.find((m) => m.id === messageId);
          if (!message) return state;
          const service = state.services.find((s) => s.id === message.serviceId);
          if (!service || !service.applicant) return state;

          const demanderId = service.type === 'need' ? service.publisherId : service.applicant.id;
          const providerId = service.type === 'need' ? service.applicant.id : service.publisherId;
          const amount = service.timeCoins;
          const isWelfare = service.isWelfareSubsidized;
          const welfareAmount = isWelfare ? Math.round(amount * 0.3 * 10) / 10 : 0;
          const demanderPay = isWelfare ? Math.round((amount - welfareAmount) * 10) / 10 : amount;
          const date = new Date().toISOString().slice(0, 10);

          const providerTransaction = {
            id: `t${Date.now()}_p`,
            type: 'income',
            amount,
            desc: `完成 ${service.name}${isWelfare ? '（公益补贴）' : ''}`,
            date,
            userId: providerId,
          };
          const demanderTransaction = {
            id: `t${Date.now()}_d`,
            type: 'expense',
            amount: demanderPay,
            desc: `完成 ${service.name}${isWelfare ? '（公益补贴）' : ''}`,
            date,
            userId: demanderId,
          };
          const subsidyTransaction = isWelfare
            ? {
                id: `t${Date.now()}_s`,
                type: 'subsidy',
                amount: welfareAmount,
                desc: `公益池补贴 ${service.name}`,
                date,
                userId: demanderId,
              }
            : null;

          const newTransactions = subsidyTransaction
            ? [providerTransaction, demanderTransaction, subsidyTransaction]
            : [providerTransaction, demanderTransaction];

          const updatedUsers = state.users.map((u) => {
            if (u.id === demanderId) {
              return { ...u, coins: Math.max(0, Math.round((u.coins - demanderPay) * 10) / 10), completedOrders: u.completedOrders + 1 };
            }
            if (u.id === providerId) {
              return { ...u, coins: Math.round((u.coins + amount) * 10) / 10, completedOrders: u.completedOrders + 1 };
            }
            return u;
          });

          const newWelfareRecord = isWelfare
            ? {
                id: `w${Date.now()}`,
                date,
                amount: welfareAmount,
                desc: `补贴 ${service.name}（${state.users.find((u) => u.id === demanderId).name}）`,
              }
            : null;

          const counterpartyId =
            service.publisherId === state.currentUser.id ? service.applicant.id : service.publisherId;
          const counterparty = state.users.find((u) => u.id === counterpartyId);

          return {
            ...state,
            users: updatedUsers,
            currentUser: updatedUsers.find((u) => u.id === state.currentUser.id),
            services: state.services.map((s) =>
              s.id === message.serviceId ? { ...s, status: 'rated' } : s
            ),
            messages: state.messages.map((m) =>
              m.id === messageId ? { ...m, status: 'completed', reviewed: true } : m
            ),
            transactions: [...newTransactions, ...state.transactions],
            reviews: [
              {
                id: `r${Date.now()}`,
                from: state.currentUser.name,
                fromId: state.currentUser.id,
                to: counterparty.name,
                toId: counterparty.id,
                rating,
                tags,
                content,
                date,
              },
              ...state.reviews,
            ],
            welfarePoolBalance: isWelfare ? Math.round((state.welfarePoolBalance - welfareAmount) * 10) / 10 : state.welfarePoolBalance,
            welfareRecords: newWelfareRecord ? [newWelfareRecord, ...state.welfareRecords] : state.welfareRecords,
          };
        }
        case 'CANCEL_SERVICE': {
          const { serviceId } = action.payload;
          return {
            ...state,
            services: state.services.filter((s) => s.id !== serviceId),
            messages: state.messages.filter((m) => m.serviceId !== serviceId),
          };
        }
        case 'ADD_TOAST': {
          const id = `${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
          return {
            ...state,
            toasts: [...state.toasts, { id, message: action.payload.message, type: action.payload.type || 'success' }],
          };
        }
        case 'REMOVE_TOAST':
          return { ...state, toasts: state.toasts.filter((t) => t.id !== action.payload) };
        case 'TOGGLE_MESSAGE': {
          return {
            ...state,
            messages: state.messages.map((m) =>
              m.id === action.payload ? { ...m, expanded: !m.expanded } : m
            ),
          };
        }
        default:
          return state;
      }
    }

    const AppContext = React.createContext({ state: {}, dispatch: () => {} });

    function ToastItem({ id, message, type, show, onExited }) {
      React.useEffect(() => {
        if (!show) {
          const timer = setTimeout(onExited, 300);
          return () => clearTimeout(timer);
        }
      }, [show, onExited]);
      return (
        <div
          className={`max-w-[260px] ${type === 'error' ? 'bg-[#C2410C]' : 'bg-[#B45309]'} text-white px-4 py-2.5 rounded-xl shadow-[0_8px_24px_rgba(180,83,9,0.10),0_2px_8px_rgba(180,83,9,0.06)] text-sm font-medium flex items-center gap-2 transition-all duration-300 ease-in-out pointer-events-auto ${
            show ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-[120%]'
          }`}
        >
          <span>{type === 'error' ? '⚠' : '✓'}</span>
          <span>{message}</span>
        </div>
      );
    }

    function ToastContainer({ toasts, dispatch }) {
      const [items, setItems] = React.useState([]);
      const scheduledRef = React.useRef(new Set());
      React.useEffect(() => {
        toasts.forEach((t) => {
          if (scheduledRef.current.has(t.id)) return;
          scheduledRef.current.add(t.id);
          setItems((prev) => (prev.some((i) => i.id === t.id) ? prev : [...prev, { ...t, show: true }]));
          setTimeout(() => {
            setItems((prev) => prev.map((i) => (i.id === t.id ? { ...i, show: false } : i)));
          }, 2700);
          setTimeout(() => {
            dispatch({ type: 'REMOVE_TOAST', payload: t.id });
            scheduledRef.current.delete(t.id);
          }, 3000);
        });
        items.forEach((i) => {
          if (!toasts.some((t) => t.id === i.id) && i.show) {
            setItems((prev) => prev.map((p) => (p.id === i.id ? { ...p, show: false } : p)));
            setTimeout(() => {
              setItems((prev) => prev.filter((p) => p.id !== i.id));
            }, 300);
          }
        });
      }, [toasts, items, dispatch]);
      return (
        <div className="fixed top-4 right-4 z-[60] flex flex-col gap-2 pointer-events-none">
          {items.map((item) => (
            <ToastItem
              key={item.id}
              {...item}
              onExited={() => setItems((prev) => prev.filter((p) => p.id !== item.id))}
            />
          ))}
        </div>
      );
    }

    function WelfarePoolBadge({ variant = 'default' }) {
      const { state } = React.useContext(AppContext);
      const [displayBalance, setDisplayBalance] = React.useState(state.welfarePoolBalance);

      React.useEffect(() => {
        const start = displayBalance;
        const end = state.welfarePoolBalance;
        if (start === end) return;
        const duration = 600;
        const startTime = performance.now();
        let rafId;
        const animate = (now) => {
          const progress = Math.min((now - startTime) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          setDisplayBalance(Math.round((start + (end - start) * eased) * 10) / 10);
          if (progress < 1) {
            rafId = requestAnimationFrame(animate);
          }
        };
        rafId = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(rafId);
      }, [state.welfarePoolBalance]);

      if (variant === 'compact') {
        return (
          <div className="flex items-center gap-1.5 bg-[#166534]/10 text-[#166534] px-2.5 py-1 rounded-full text-xs font-bold">
            <span className="text-sm">🛡️</span>
            <span className="font-mono">{displayBalance.toFixed(1)}</span>
            <span className="text-[10px] opacity-80">币</span>
          </div>
        );
      }

      return (
        <div className="bg-gradient-to-br from-[#166534] to-[#15803D] rounded-2xl p-4 text-white shadow-[0_4px_12px_rgba(22,101,52,0.2)] flex items-center justify-between">

            <div className="text-3xl font-bold font-mono leading-none">{displayBalance.toFixed(1)}</div>
            <div className="text-xs opacity-90 mt-0.5">时间币</div>
          </div>
        </div>
      );
    }

      const [category, setCategory] = React.useState('陪伴');
      const [serviceName, setServiceName] = React.useState('');
      const [description, setDescription] = React.useState('');
      const [duration, setDuration] = React.useState(1);
      const [timeCoins, setTimeCoins] = React.useState(1);
      const [isWelfare, setIsWelfare] = React.useState(false);

      const catalog = state.serviceCatalog.find((c) => c.category === category) || { items: [] };

      const handleSelectItem = (item) => {
        setServiceName(item.name);
        setDuration(item.defaultDuration);
        setTimeCoins(item.timeCoins);
      };

      const handlePublish = () => {
        if (!serviceName.trim()) {
          dispatch({ type: 'ADD_TOAST', payload: { message: '请选择或输入服务名称', type: 'error' } });
          return;
        }
        const selectedItem = catalog.items.find((i) => i.name === serviceName) || {};
        dispatch({
          type: 'PUBLISH_SERVICE',
          payload: {
            name: serviceName,
            category,
            defaultDuration: Number(duration) || 1,
            skillLevel: selectedItem.skillLevel || 'basic',
            intensity: selectedItem.intensity || 'light',
            timeCoins: Number(timeCoins) || 1,
            type: publishType,
            isWelfareSubsidized: isWelfare,
            description:
              description.trim() ||
              (publishType === 'need' ? `需要${serviceName}，欢迎联系。` : `擅长${serviceName}，欢迎联系。`),
          },
        });
        dispatch({ type: 'ADD_TOAST', payload: { message: '发布成功', type: 'success' } });
        setServiceName('');
        setDescription('');
        setDuration(1);
        setTimeCoins(1);
        setIsWelfare(false);
        navigate('/');
      };

      return (
        <div className="animate-page-in h-full flex flex-col bg-[#FAF6F0]">
          <header className="bg-[#FFFEFB] px-4 py-3 shadow-[0_1px_3px_rgba(180,83,9,0.04)] z-10">
            <h1 className="text-lg font-bold font-serif text-[#3D2B1F] text-center">发布服务</h1>
          </header>
          <main className="flex-1 overflow-y-auto p-4 space-y-4">
            <div className="bg-[#FFFEFB] rounded-2xl p-4 shadow-[0_1px_3px_rgba(180,83,9,0.04)]">
              <div className="flex rounded-xl overflow-hidden border border-[#E7DDD0] mb-4">
                <button
                  onClick={() => setPublishType('provide')}
                  className={`flex-1 py-2.5 text-sm font-medium ${
                    publishType === 'provide' ? 'bg-[#0F766E] text-white' : 'bg-[#FFFEFB] text-[#78716C]'
                  }`}
                >
                  我能提供
                </button>
                <button
                  onClick={() => setPublishType('need')}
                  className={`flex-1 py-2.5 text-sm font-medium ${
                    publishType === 'need' ? 'bg-[#C2410C] text-white' : 'bg-[#FFFEFB] text-[#78716C]'
                  }`}
                >
                  我需要
                </button>
              </div>
              <div className="space-y-3">
                <div>
                  <label className="text-xs text-[#78716C] mb-1 block">服务目录</label>
                  <select
                    value={serviceName}
                    onChange={(e) => {
                      const name = e.target.value;
                      if (!name) return;
                      for (const cat of state.serviceCatalog) {
                        const item = cat.items.find((i) => i.name === name);
                        if (item) {
                          setCategory(cat.category);
                          handleSelectItem(item);
                          break;
                        }
                      }
                    }}
                    className="w-full bg-[#F5EFE6] rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-[#D97706]/40"
                  >
                    <option value="">请选择服务</option>
                    {state.serviceCatalog.map((c) => (
                      <optgroup key={c.category} label={c.category}>
                        {c.items.map((item) => (
                          <option key={item.name} value={item.name}>
                            {item.name} · {item.timeCoins.toFixed(1)} 币
                          </option>
                        ))}
                      </optgroup>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="text-xs text-[#78716C] mb-1 block">服务名称</label>
                  <div className="flex flex-wrap gap-2 mb-2">
                    {catalog.items.map((item) => (
                      <button
                        key={item.name}
                        onClick={() => handleSelectItem(item)}
                        className={`px-3 py-1.5 rounded-full text-xs border ${
                          serviceName === item.name
                            ? 'bg-[#FEF3C7] border-[#B45309] text-[#92400E]'
                            : 'bg-[#FFFEFB] border-[#E7DDD0] text-[#78716C]'
                        }`}
                      >
                        {item.name}
                      </button>
                    ))}
                  </div>
                  <input
                    type="text"
                    value={serviceName}
                    onChange={(e) => setServiceName(e.target.value)}
                    placeholder="或手动输入服务名称"
                    className="w-full bg-[#F5EFE6] rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-[#D97706]/40"
                  />
                </div>
                <div>
                  <label className="text-xs text-[#78716C] mb-1 block">服务说明</label>
                  <textarea
                    value={description}
                    onChange={(e) => setDescription(e.target.value)}
                    placeholder="请描述具体需求或能力..."
                    rows={3}
                    className="w-full bg-[#F5EFE6] rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-[#D97706]/40 resize-none"
                  />
                </div>
                <div className="flex gap-3">
                  <div className="flex-1">
                    <label className="text-xs text-[#78716C] mb-1 block">预计时长(小时)</label>
                    <input
                      type="number"
                      step="0.5"
                      min="0.5"
                      value={duration}
                      onChange={(e) => setDuration(e.target.value)}
                      className="w-full bg-[#F5EFE6] rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-[#D97706]/40"
                    />
                  </div>
                  <div className="flex-1">
                    <label className="text-xs text-[#78716C] mb-1 block">时间币</label>
                    <input
                      type="number"
                      step="0.1"
                      min="0"
                      value={timeCoins}
                      onChange={(e) => setTimeCoins(e.target.value)}
                      className="w-full bg-[#F5EFE6] rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-[#D97706]/40"
                    />
                  </div>
                </div>
                <label className="flex items-center gap-2 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={isWelfare}
                    onChange={(e) => setIsWelfare(e.target.checked)}
                    className="w-4 h-4 text-[#B45309] rounded"
                  />
                  <span className="text-sm text-[#57423A]">申请公益池补贴（老年/困难群体）</span>
                </label>
              </div>
            </div>
            <div className="bg-[#FFFEFB] rounded-2xl p-4 shadow-[0_1px_3px_rgba(180,83,9,0.04)]">
              <h3 className="text-sm font-bold font-serif text-[#3D2B1F] mb-3">发布摘要</h3>
              <div className="space-y-2 text-sm">
                <div className="flex justify-between">
                  <span className="text-[#78716C]">类型</span>
                  <span className={publishType === 'need' ? 'text-[#C2410C]' : 'text-[#166534]'}>
                    {publishType === 'need' ? '我需要' : '我能提供'}
                  </span>
                </div>
                <div className="flex justify-between">
                  <span className="text-[#78716C]">服务</span>
                  <span className="text-[#3D2B1F]">{serviceName || '未选择'}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-[#78716C]">分类</span>
                  <span className="text-[#3D2B1F]">{category}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-[#78716C]">时长</span>
                  <span className="text-[#3D2B1F]">{duration} 小时</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-[#78716C]">时间币</span>
                  <span className="text-[#D97706] font-bold font-mono">{timeCoins} 币</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-[#78716C]">公益补贴</span>
                  <span className="text-[#3D2B1F]">{isWelfare ? '已申请' : '否'}</span>
                </div>
              </div>
            </div>
            <button
              onClick={handlePublish}
              className="w-full py-3 rounded-xl bg-[#B45309] text-white font-bold shadow-[0_4px_12px_rgba(180,83,9,0.2)] active:scale-[0.98] transition-transform"
            >
              立即发布
            </button>
            <Footer />
          </main>
        </div>
      );
    }

    function ServiceDetailPage() {
      const { id } = useParams();
      const { state, dispatch } = React.useContext(AppContext);
      const navigate = useNavigate();
      const service = state.services.find((s) => s.id === id);
      const [pricingOpen, setPricingOpen] = React.useState(false);
      const [confirmOpen, setConfirmOpen] = React.useState(false);

      if (!service) {
        return (
          <div className="animate-page-in h-full flex flex-col bg-[#FAF6F0]">
            <div className="bg-[#FFFEFB] px-4 py-3 shadow-[0_1px_3px_rgba(180,83,9,0.04)] flex items-center gap-3">
              <button onClick={() => navigate(-1)} className="text-[#B45309] text-sm font-medium">
                ← 返回
              </button>
              <span className="font-bold font-serif text-[#3D2B1F]">服务详情</span>
            </div>
            <div className="flex-1 flex items-center justify-center text-[#D6D3D1]">未找到服务</div>
          </div>
        );
      }

      const isMine = service.publisherId === state.currentUser.id;
      const canTake = service.status === 'open' && !isMine;
      const isInProgress = service.status === 'inProgress';
      const isToRate = service.status === 'toRate';
      const isCompleted = service.status === 'rated';

      const handleConfirm = () => {
        dispatch({ type: 'TAKE_ORDER', payload: { serviceId: service.id, applicantId: state.currentUser.id } });
        dispatch({
          type: 'ADD_TOAST',
          payload: {
            message: service.isWelfareSubsidized ? '爱心接单申请已提交' : '申请已提交',
            type: 'success',
          },
        });
        setConfirmOpen(false);
        navigate('/messages');
      };

      const levelText = { basic: '基础', skilled: '熟练', professional: '专业' }[service.skillLevel] || service.skillLevel;
      const intensityText = { light: '轻度', moderate: '中度', heavy: '重度' }[service.intensity] || service.intensity;
      const skillMultiplier = { basic: 1.0, skilled: 1.5, professional: 2.0 }[service.skillLevel] || 1.0;
      const intensityMultiplier = { light: 1.0, moderate: 1.3, heavy: 1.6 }[service.intensity] || 1.0;
      const baseRate = 1.0;
      const calculatedCoins = Math.round(baseRate * skillMultiplier * intensityMultiplier * service.defaultDuration * 10) / 10;

      return (
        <div className="animate-page-in h-full flex flex-col bg-[#FAF6F0]">
          <div className="bg-[#FFFEFB] px-4 py-3 shadow-[0_1px_3px_rgba(180,83,9,0.04)] flex items-center gap-3 z-10">
            <button onClick={() => navigate(-1)} className="text-[#B45309] text-sm font-medium">
              ← 返回
            </button>
            <span className="font-bold font-serif text-[#3D2B1F]">服务详情</span>
          </div>
          <main className="flex-1 overflow-y-auto p-4 space-y-4">
            <div className="bg-[#FFFEFB] rounded-2xl p-5 shadow-[0_2px_8px_rgba(180,83,9,0.06),0_1px_3px_rgba(180,83,9,0.04)]">
              <div className="flex justify-between items-start mb-4">
                <div>
                  <div
                    className={`inline-block text-xs text-white px-2 py-0.5 rounded mb-2 ${
                      service.type === 'need' ? 'bg-[#C2410C]' : 'bg-[#0F766E]'
                    }`}
                  >
                    {service.type === 'need' ? '我需要' : '我能提供'}
                  </div>
                  <h1 className="text-xl font-bold font-serif text-[#3D2B1F]">{service.name}</h1>
                </div>
                <div className="text-right">
                  <div className="text-2xl font-bold text-[#D97706] font-mono">
                    {service.timeCoins}
                    <span className="text-sm font-normal">币</span>
                  </div>
                  <div className="text-xs text-[#A8A29E]">预计 {service.defaultDuration} 小时</div>
                </div>
              </div>
              <div className="flex items-center gap-3 p-3 bg-[#FAF6F0] rounded-xl">
                <div className="text-4xl">{service.publisher.emoji}</div>
                <div>
                  <div className="font-semibold text-[#3D2B1F]">{service.publisher.name}</div>
                  <div className="text-xs text-[#A8A29E]">
                    {state.users.find((u) => u.id === service.publisherId)?.building || ''} · 好评 {service.publisher.rating}
                  </div>
                </div>
              </div>
              <div className="mt-4 text-sm text-[#57423A] leading-relaxed">{service.description}</div>
              {service.isWelfareSubsidized && (
                <div className="mt-3 space-y-2">
                  <div className="flex items-center gap-1 text-xs text-[#14532D] bg-[#F0FDF4] px-3 py-2 rounded-lg">
                    <span>🛡️</span>
                    <span>该服务可申请公益池补贴</span>
                  </div>
                  <div className="flex items-center justify-between text-xs bg-[#F0FDF4] text-[#14532D] px-3 py-2 rounded-lg">
                    <span>公益池实时余额</span>
                    <span className="font-mono font-bold">{state.welfarePoolBalance.toFixed(1)} 币</span>
                  </div>
                </div>
              )}
            </div>

            <div className="bg-[#FFFEFB] rounded-2xl shadow-[0_2px_8px_rgba(180,83,9,0.06),0_1px_3px_rgba(180,83,9,0.04)] overflow-hidden">
              <button
                onClick={() => setPricingOpen(!pricingOpen)}
                className="w-full flex items-center justify-between px-5 py-4 text-left"
              >
                <span className="font-bold font-serif text-[#3D2B1F]">计价说明</span>
                <span className="text-[#D6D3D1]">{pricingOpen ? '▲' : '▼'}</span>
              </button>
              {pricingOpen && (
                <div className="px-5 pb-4 text-sm text-[#57423A] space-y-2 border-t border-[#F0E9DD] pt-3">
                  <div className="flex justify-between">
                    <span>基础时薪</span>
                    <span>{baseRate.toFixed(1)} 币/小时</span>
                  </div>
                  <div className="flex justify-between">
                    <span>技能等级</span>
                    <span>{levelText} × {skillMultiplier.toFixed(1)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span>劳动强度</span>
                    <span>{intensityText} × {intensityMultiplier.toFixed(1)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span>默认时长</span>
                    <span>{service.defaultDuration} 小时</span>
                  </div>
                  <div className="flex justify-between font-bold text-[#3D2B1F] pt-2 border-t border-dashed border-[#E7DDD0]">
                    <span>合计</span>
                    <span>{baseRate.toFixed(1)} × {skillMultiplier.toFixed(1)} × {intensityMultiplier.toFixed(1)} × {service.defaultDuration} ≈ {calculatedCoins.toFixed(1)} 币</span>
                  </div>
                </div>
              )}
            </div>

            {isInProgress && (
              <div className="bg-[#F0FDFA] text-[#0F766E] text-sm px-4 py-3 rounded-xl">
                该服务已被 {service.applicant?.emoji} {service.applicant?.name} 接单
              </div>
            )}
            {isToRate && (
              <div className="bg-[#F0FDF4] text-[#166534] text-sm px-4 py-3 rounded-xl">服务已完成，等待评价</div>
            )}
            {isCompleted && (
              <div className="bg-[#FAF6F0] text-[#78716C] text-sm px-4 py-3 rounded-xl">该服务已完成</div>
            )}
          </main>

          <div className="shrink-0 p-4 bg-[#FFFEFB] border-t border-[#E7DDD0]">
            {canTake ? (
              <button
                onClick={() => setConfirmOpen(true)}
                className="w-full py-3 rounded-xl bg-[#B45309] text-white font-bold shadow-[0_2px_8px_rgba(180,83,9,0.06),0_1px_3px_rgba(180,83,9,0.04)] active:scale-[0.98] transition-transform"
              >
                {service.isWelfareSubsidized
                  ? '爱心接单🛡️｜由公益池支付'
                  : service.type === 'need'
                  ? '申请接单'
                  : '请求帮助'}
              </button>
            ) : isMine ? (
              <button disabled className="w-full py-3 rounded-xl bg-[#E7DDD0] text-[#A8A29E] font-bold">
                自己的服务
              </button>
            ) : (
              <button disabled className="w-full py-3 rounded-xl bg-[#E7DDD0] text-[#A8A29E] font-bold">
                {isInProgress ? '进行中' : isToRate ? '待评价' : '已完成'}
              </button>
            )}
          </div>
          <Footer />

          <Modal
            open={confirmOpen}
            title={
              service.isWelfareSubsidized
                ? '确认爱心接单？'
                : service.type === 'need'
                ? '确认申请接单？'
                : '确认请求帮助？'
            }
            onConfirm={handleConfirm}
            onCancel={() => setConfirmOpen(false)}
            confirmText="确认"
          >
            <p>
              您将{service.type === 'need' ? '为' : '请求'} <strong>{service.publisher.name}</strong> 的「{service.name}」服务。
            </p>
            <p className="mt-2">
              预计获得/支付 <strong className="text-[#D97706]">{service.timeCoins} 时间币</strong>。
            </p>
            {service.isWelfareSubsidized && (
              <>
                <p className="mt-2 text-[#166534] text-xs">该服务由公益池补贴部分费用。</p>
                <p className="mt-1 text-[#166534] text-xs flex items-center justify-between">
                  <span>公益池实时余额</span>
                  <span className="font-mono font-bold">{state.welfarePoolBalance.toFixed(1)} 币</span>
                </p>
              </>
            )}
          </Modal>
        </div>
      );
    }

    function MessagesPage() {
      const { state, dispatch } = React.useContext(AppContext);
      const navigate = useNavigate();
      const [reviewForms, setReviewForms] = React.useState({});

      const toggleExpand = (msgId) => dispatch({ type: 'TOGGLE_MESSAGE', payload: msgId });

      const handleComplete = (msgId) => {
        dispatch({ type: 'COMPLETE_ORDER', payload: { messageId: msgId } });
      };

      const handleReviewChange = (msgId, field, value) => {
        setReviewForms((prev) => ({ ...prev, [msgId]: { ...(prev[msgId] || {}), [field]: value } }));
      };

      const handleReviewSubmit = (msgId) => {
        const form = reviewForms[msgId] || {};
        dispatch({
          type: 'SUBMIT_REVIEW',
          payload: {
            messageId: msgId,
            rating: form.rating || 5,
            tags: form.tags || [],
            content: form.content || '',
          },
        });
        dispatch({ type: 'ADD_TOAST', payload: { message: '评价提交成功，交易完成', type: 'success' } });
        navigate('/messages');
      };

      const statusText = {
        pending: '待处理',
        inProgress: '进行中',
        toRate: '待评价',
        completed: '已完成',
      };

      const statusColor = {
        pending: 'text-[#92400E] bg-[#FEF3C7]',
        inProgress: 'text-[#0F766E] bg-[#F0FDFA]',
        toRate: 'text-[#166534] bg-[#F0FDF4]',
        completed: 'text-[#A8A29E] bg-[#F5EFE6]',
      };

      const reviewTags = ['准时', '热情', '专业', '耐心', '细心', '周到'];

      return (
        <div className="animate-page-in h-full flex flex-col bg-[#FAF6F0]">
          <header className="bg-[#FFFEFB] px-4 py-3 shadow-[0_1px_3px_rgba(180,83,9,0.04)] z-10">
            <h1 className="text-lg font-bold font-serif text-[#3D2B1F] text-center">消息</h1>
          </header>
          <main className="flex-1 overflow-y-auto p-4 space-y-3">
            {state.messages.length === 0 && (
              <div className="text-center text-[#D6D3D1] mt-10 text-sm">暂无消息</div>
            )}
            {state.messages.map((msg) => (
              <div key={msg.id} className="bg-[#FFFEFB] rounded-2xl shadow-[0_1px_3px_rgba(180,83,9,0.04)] overflow-hidden">
                <div
                  onClick={() => toggleExpand(msg.id)}
                  className="p-4 flex items-center justify-between cursor-pointer"
                >
                  <div className="flex items-center gap-3">
                    <div className="text-3xl">{msg.from.emoji}</div>
                    <div>
                      <div className="text-sm font-semibold text-[#3D2B1F]">
                        {msg.from.name} · {msg.type}
                      </div>
                      <div className="text-xs text-[#A8A29E] truncate max-w-[180px]">{msg.serviceName}</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className={`text-xs px-2 py-0.5 rounded ${statusColor[msg.status]}`}>
                      {statusText[msg.status]}
                    </span>
                    <span className="text-[#D6D3D1] text-xs">{msg.expanded ? '▲' : '▼'}</span>
                  </div>
                </div>
                {msg.expanded && (
                  <div className="px-4 pb-4 border-t border-[#F0E9DD] pt-3">
                    <div className="text-sm text-[#57423A] mb-3">{msg.content}</div>
                    <div className="text-xs text-[#D6D3D1] mb-3">{msg.createdAt}</div>
                    {msg.status === 'pending' && (
                      <div className="flex gap-3">
                        <button
                          onClick={() =>
                            dispatch({
                              type: 'TAKE_ORDER',
                              payload: { serviceId: msg.serviceId, applicantId: state.currentUser.id, messageId: msg.id },
                            })
                          }
                          className="flex-1 py-2 rounded-xl bg-[#B45309] text-white text-sm font-medium"
                        >
                          {msg.type === '申请' ? '同意接单' : '接受邀请'}
                        </button>
                      </div>
                    )}
                    {msg.status === 'inProgress' && (
                      <div className="space-y-2">
                        <div className="text-xs text-[#78716C] flex gap-3">
                          <span>{msg.confirmedByPublisher ? '✓ 发布方已确认' : '○ 发布方待确认'}</span>
                          <span>{msg.confirmedByApplicant ? '✓ 申请方已确认' : '○ 申请方待确认'}</span>
                        </div>
                        {(() => {
                          const isPub = state.currentUser.id === msg.from.userId;
                          const isApp = state.currentUser.id === msg.toUserId;
                          const alreadyConfirmed =
                            (isPub && msg.confirmedByPublisher) || (isApp && msg.confirmedByApplicant);
                          if (!isPub && !isApp) {
                            return <div className="text-xs text-[#D6D3D1]">您不是该订单参与方</div>;
                          }
                          if (alreadyConfirmed) {
                            return (
                              <div className="text-sm text-[#166534] font-medium">已确认，等待对方确认</div>
                            );
                          }
                          return (
                            <button
                              onClick={() => handleComplete(msg.id)}
                              className="w-full py-2 rounded-xl bg-[#0F766E] text-white text-sm font-medium"
                            >
                              确认服务完成
                            </button>
                          );
                        })()}
                      </div>
                    )}
                    {msg.status === 'toRate' && (
                      <div className="space-y-3">
                        <div className="text-sm font-medium text-[#57423A]">请为对方评价</div>
                        {(() => {
                          const service = state.services.find((s) => s.id === msg.serviceId);
                          if (!service?.isWelfareSubsidized) return null;
                          return (
                            <div className="bg-[#F0FDF4] text-[#14532D] text-xs px-3 py-2 rounded-lg flex items-center justify-between">
                              <span>🛡️ 公益池将补贴部分费用 · 实时余额</span>
                              <span className="font-mono font-bold">{state.welfarePoolBalance.toFixed(1)} 币</span>
                            </div>
                          );
                        })()}
                        <StarRating
                          value={reviewForms[msg.id]?.rating || 5}
                          onChange={(val) => handleReviewChange(msg.id, 'rating', val)}
                        />
                        <div className="flex flex-wrap gap-2">
                          {reviewTags.map((tag) => (
                            <button
                              key={tag}
                              onClick={() => {
                                const current = reviewForms[msg.id]?.tags || [];
                                const next = current.includes(tag)
                                  ? current.filter((t) => t !== tag)
                                  : [...current, tag];
                                handleReviewChange(msg.id, 'tags', next);
                              }}
                              className={`px-3 py-1 rounded-full text-xs border ${
                                (reviewForms[msg.id]?.tags || []).includes(tag)
                                  ? 'bg-[#FEF3C7] border-[#B45309] text-[#92400E]'
                                  : 'bg-[#FFFEFB] border-[#E7DDD0] text-[#78716C]'
                              }`}
                            >
                              {tag}
                            </button>
                          ))}
                        </div>
                        <textarea
                          value={reviewForms[msg.id]?.content || ''}
                          onChange={(e) => handleReviewChange(msg.id, 'content', e.target.value)}
                          placeholder="写下您的评价..."
                          rows={2}
                          className="w-full bg-[#F5EFE6] rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-[#D97706]/40 resize-none"
                        />
                        <button
                          onClick={() => handleReviewSubmit(msg.id)}
                          className="w-full py-2 rounded-xl bg-[#B45309] text-white text-sm font-medium"
                        >
                          提交评价
                        </button>
                      </div>
                    )}
                    {msg.status === 'completed' && (
                      <div className="text-sm text-[#A8A29E]">已评价，交易完成</div>
                    )}
                  </div>
                )}
              </div>
            ))}
            <Footer />
          </main>
        </div>
      );
    }

    function ProfilePage() {
      const { state, dispatch } = React.useContext(AppContext);
      const [activeTab, setActiveTab] = React.useState('overview');

      const myPublishes = state.services.filter((s) => s.publisherId === state.currentUser.id);
      const myApplies = state.services.filter((s) => s.applicant?.id === state.currentUser.id);
      const myReviews = state.reviews.filter(
        (r) => r.fromId === state.currentUser.id || r.toId === state.currentUser.id
      );
      const myTransactions = state.transactions.filter((t) => t.userId === state.currentUser.id);

      const tabs = [
        { key: 'overview', label: '概览' },
        { key: 'published', label: '我的发布' },
        { key: 'applied', label: '我的申请' },
        { key: 'reviews', label: '历史评价' },
        { key: 'transactions', label: '时间币明细' },
        { key: 'welfare', label: '公益池公示' },
      ];

      const typeText = { provide: '我能提供', need: '我需要' };
      const statusText = { open: '待接单', inProgress: '进行中', toRate: '待评价', rated: '已完成' };

      return (
        <div className="animate-page-in h-full flex flex-col bg-[#FAF6F0]">
          <header className="bg-[#FFFEFB] px-4 py-3 shadow-[0_1px_3px_rgba(180,83,9,0.04)] z-10">
            <h1 className="text-lg font-bold font-serif text-[#3D2B1F] text-center">我的</h1>
          </header>
          <main className="flex-1 overflow-y-auto">
            <div className="bg-gradient-to-br from-[#B45309] to-[#92400E] p-5 text-white">
              <div className="flex items-center gap-4 mb-4">
                <div className="text-5xl bg-white/20 rounded-full p-1">{state.currentUser.emoji}</div>
                <div>
                  <div className="text-xl font-bold font-serif">{state.currentUser.name}</div>
                  <div className="text-sm opacity-90">
                    {state.currentUser.building} · {state.currentUser.age}岁
                  </div>
                </div>
              </div>
              <div className="grid grid-cols-3 gap-3 text-center">
                <div className="bg-white/15 backdrop-blur-sm rounded-xl p-2">
                  <div className="text-lg font-bold font-mono">{state.currentUser.coins}</div>
                  <div className="text-xs opacity-90">时间币</div>
                </div>
                <div className="bg-white/15 backdrop-blur-sm rounded-xl p-2">
                  <div className="text-lg font-bold">{state.currentUser.completedOrders}</div>
                  <div className="text-xs opacity-90">已完成</div>
                </div>
                <div className="bg-white/15 backdrop-blur-sm rounded-xl p-2">
                  <div className="text-lg font-bold">{state.currentUser.rating}</div>
                  <div className="text-xs opacity-90">好评率</div>
                </div>
              </div>
              <div className="mt-4">
                <label className="text-xs opacity-90 mb-1 block">切换用户</label>
                <select
                  value={state.currentUser.id}
                  onChange={(e) => dispatch({ type: 'SET_CURRENT_USER', payload: e.target.value })}
                  className="w-full bg-white/20 text-white rounded-xl px-3 py-2 text-sm outline-none border border-white/30"
                >
                  {state.users.map((u) => (
                    <option key={u.id} value={u.id} className="text-[#3D2B1F]">
                      {u.emoji} {u.name}
                    </option>
                  ))}
                </select>
              </div>
            </div>

            <div className="flex overflow-x-auto bg-[#FFFEFB] border-b border-[#E7DDD0] no-scrollbar">
              {tabs.map((tab) => (
                <button
                  key={tab.key}
                  onClick={() => setActiveTab(tab.key)}
                  className={`flex-1 whitespace-nowrap px-4 py-3 text-sm font-medium ${
                    activeTab === tab.key
                      ? 'text-[#B45309] border-b-2 border-[#B45309]'
                      : 'text-[#A8A29E]'
                  }`}
                >
                  {tab.label}
                </button>
              ))}
            </div>

            <div className="p-4 space-y-3">
              {activeTab === 'overview' && (
                <div className="space-y-3">
                  <div className="bg-[#FFFEFB] rounded-2xl p-4 shadow-[0_1px_3px_rgba(180,83,9,0.04)]">
                    <h3 className="font-bold font-serif text-[#3D2B1F] mb-3">快捷入口</h3>
                    <div className="grid grid-cols-2 gap-3">
                      <button
                        onClick={() => setActiveTab('published')}
                        className="p-3 bg-[#F5EFE6] rounded-xl text-sm text-[#57423A] font-medium text-left"
                      >
                        我的发布 ({myPublishes.length})
                      </button>
                      <button
                        onClick={() => setActiveTab('applied')}
                        className="p-3 bg-[#F5EFE6] rounded-xl text-sm text-[#57423A] font-medium text-left"
                      >
                        我的申请 ({myApplies.length})
                      </button>
                      <button
                        onClick={() => setActiveTab('reviews')}
                        className="p-3 bg-[#F5EFE6] rounded-xl text-sm text-[#57423A] font-medium text-left"
                      >
                        历史评价 ({myReviews.length})
                      </button>
                      <button
                        onClick={() => setActiveTab('transactions')}
                        className="p-3 bg-[#F5EFE6] rounded-xl text-sm text-[#57423A] font-medium text-left"
                      >
                        时间币明细
                      </button>
                    </div>
                  </div>
                  <div className="bg-[#FFFEFB] rounded-2xl p-4 shadow-[0_1px_3px_rgba(180,83,9,0.04)]">
                    <h3 className="font-bold font-serif text-[#3D2B1F] mb-2">公益身份</h3>
                    <div className="text-sm text-[#57423A]">
                      {state.currentUser.isPublicWelfare
                        ? '您是公益扶助对象，可申请公益池补贴。'
                        : '普通用户，可通过志愿服务积累时间币。'}
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'published' &&
                (myPublishes.length === 0 ? (
                  <div className="text-center text-[#D6D3D1] mt-10 text-sm">暂无发布</div>
                ) : (
                  myPublishes.map((s) => (
                    <div key={s.id} className="bg-[#FFFEFB] rounded-2xl p-4 shadow-[0_1px_3px_rgba(180,83,9,0.04)]">
                      <div className="flex justify-between items-start mb-2">
                        <div className="font-bold text-[#3D2B1F]">{s.name}</div>
                        <span
                          className={`text-xs px-2 py-0.5 rounded ${
                            s.type === 'need' ? 'bg-[#FFF7ED] text-[#C2410C]' : 'bg-[#DCFCE7] text-[#166534]'
                          }`}
                        >
                          {typeText[s.type]}
                        </span>
                      </div>
                      <div className="text-xs text-[#A8A29E] mb-2">{statusText[s.status]}</div>
                      <div className="flex justify-between text-sm">
                        <span className="text-[#A8A29E]">{s.publishTime}</span>
                        <span className="text-[#D97706] font-bold font-mono">{s.timeCoins} 币</span>
                      </div>
                      {s.status === 'open' && !s.applicant && (
                        <button
                          onClick={() => dispatch({ type: 'CANCEL_SERVICE', payload: { serviceId: s.id } })}
                          className="mt-3 text-xs text-[#C2410C] border border-[#C2410C]/30 px-3 py-1 rounded-full"
                        >
                          取消发布
                        </button>
                      )}
                    </div>
                  ))
                ))}

              {activeTab === 'applied' &&
                (myApplies.length === 0 ? (
                  <div className="text-center text-[#D6D3D1] mt-10 text-sm">暂无申请</div>
                ) : (
                  myApplies.map((s) => (
                    <div key={s.id} className="bg-[#FFFEFB] rounded-2xl p-4 shadow-[0_1px_3px_rgba(180,83,9,0.04)]">
                      <div className="font-bold text-[#3D2B1F] mb-1">{s.name}</div>
                      <div className="text-xs text-[#A8A29E] mb-2">
                        发布者：{s.publisher.name} · {statusText[s.status]}
                      </div>
                      <div className="flex justify-between text-sm">
                        <span className="text-[#A8A29E]">{s.publishTime}</span>
                        <span className="text-[#D97706] font-bold font-mono">{s.timeCoins} 币</span>
                      </div>
                    </div>
                  ))
                ))}

              {activeTab === 'reviews' &&
                (myReviews.length === 0 ? (
                  <div className="text-center text-[#D6D3D1] mt-10 text-sm">暂无评价</div>
                ) : (
                  myReviews.map((r) => (
                    <div key={r.id} className="bg-[#FFFEFB] rounded-2xl p-4 shadow-[0_1px_3px_rgba(180,83,9,0.04)]">
                      <div className="flex justify-between items-start mb-2">
                        <div className="text-sm text-[#3D2B1F]">
                          <span className="font-bold">{r.from}</span> → <span className="font-bold">{r.to}</span>
                        </div>
                        <StarRating value={r.rating} readOnly />
                      </div>
                      <div className="flex flex-wrap gap-1 mb-2">
                        {r.tags.map((tag) => (
                          <span key={tag} className="px-2 py-0.5 bg-[#FEF3C7] text-[#92400E] text-xs rounded-full">
                            {tag}
                          </span>
                        ))}
                      </div>
                      <div className="text-sm text-[#57423A] mb-1">{r.content}</div>
                      <div className="text-xs text-[#D6D3D1]">{r.date}</div>
                    </div>
                  ))
                ))}

              {activeTab === 'transactions' &&
                (myTransactions.length === 0 ? (
                  <div className="text-center text-[#D6D3D1] mt-10 text-sm">暂无明细</div>
                ) : (
                  [...myTransactions]
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .map((t) => (
                      <div key={t.id} className="bg-[#FFFEFB] rounded-2xl p-4 shadow-[0_1px_3px_rgba(180,83,9,0.04)] flex justify-between items-center">
                      <div>
                        <div className="text-sm font-medium text-[#3D2B1F]">{t.desc}</div>
                        <div className="text-xs text-[#D6D3D1]">{t.date}</div>
                      </div>
                      <div
                        className={`font-bold font-mono ${
                          t.type === 'income' || t.type === 'subsidy' ? 'text-[#166534]' : 'text-[#C2410C]'
                        }`}
                      >
                        {t.type === 'expense' ? '-' : '+'}{t.amount} 币
                      </div>
                    </div>
                  ))
                ))}

              {activeTab === 'welfare' && (
                <div className="space-y-3">
                  <div className="bg-gradient-to-br from-[#166534] to-[#15803D] rounded-2xl p-5 text-white text-center">
                    <div className="text-sm opacity-90 mb-1">公益池余额</div>
                    <div className="text-3xl font-bold font-mono">{state.welfarePoolBalance} 币</div>
                  </div>
                  <div className="bg-[#FFFEFB] rounded-2xl p-4 shadow-[0_1px_3px_rgba(180,83,9,0.04)]">
                    <h3 className="font-bold font-serif text-[#3D2B1F] mb-3">补贴公示</h3>
                    {state.welfareRecords.length === 0 ? (
                      <div className="text-sm text-[#D6D3D1]">暂无记录</div>
                    ) : (
                      state.welfareRecords.map((w) => (
                        <div key={w.id} className="flex justify-between py-2 border-b border-[#F0E9DD] last:border-0">
                          <div className="text-sm text-[#57423A]">{w.desc}</div>
                          <div className="text-sm font-bold text-[#166534] font-mono">+{w.amount} 币</div>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              )}
            </div>
            <Footer />
          </main>
        </div>
      );
    }

    function StatusBar() {
      const [time, setTime] = React.useState('');
      React.useEffect(() => {
        const update = () => {
          const now = new Date();
          setTime(`${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`);
        };
        update();
        const timer = setInterval(update, 60000);
        return () => clearInterval(timer);
      }, []);
      return (
        <div className="hidden sm:flex shrink-0 h-8 bg-[#FFFEFB]/80 backdrop-blur-sm items-center justify-between px-5 text-xs font-medium text-[#78716C] z-20 rounded-t-[2.5rem] relative">
          <span>{time}</span>
          <div className="absolute left-1/2 -translate-x-1/2 top-1 w-20 h-5 bg-[#2D1810] rounded-full"></div>
          <div className="flex items-center gap-2">
            <WelfarePoolBadge variant="compact" />
            <span>📶</span>
            <span>5G</span>
            <span>🔋</span>
          </div>
        </div>
      );
    }

    const tabs = [
      { path: '/', label: '首页', icon: '🏠' },
      { path: '/publish', label: '发布', icon: '➕' },
      { path: '/messages', label: '消息', icon: '💬' },
      { path: '/profile', label: '我的', icon: '👤' },
    ];

    function TabBar() {
      const navigate = useNavigate();
      const location = useLocation();

      return (
        <nav className="shrink-0 border-t border-[#E7DDD0] bg-[#FFFEFB]">
          <div className="flex h-16">
            {tabs.map((tab) => {
              const isActive = location.pathname === tab.path;
              const colorClass = isActive ? 'text-[#B45309]' : 'text-[#D6D3D1]';
              return (
                <button
                  key={tab.path}
                  onClick={() => navigate(tab.path)}
                  className={`flex-1 flex flex-col items-center justify-center gap-1 ${colorClass}`}
                >
                  <span className="text-2xl leading-none">{tab.icon}</span>
                  {isActive && <span className="w-1 h-1 rounded-full bg-[#B45309]"></span>}
                  <span className="text-xs font-medium">{tab.label}</span>
                </button>
              );
            })}
          </div>
        </nav>
      );
    }

    function App() {
      const { state, dispatch } = React.useContext(AppContext);
      return (
        <>
          <StatusBar />
          <main className="flex-1 overflow-y-auto">
            <Routes>
              <Route path="/" element={<HomePage />} />
              <Route path="/publish" element={<PublishPage />} />
              <Route path="/messages" element={<MessagesPage />} />
              <Route path="/service/:id" element={<ServiceDetailPage />} />
              <Route path="/profile" element={<ProfilePage />} />
            </Routes>
          </main>
          <TabBar />
          <ToastContainer toasts={state.toasts} dispatch={dispatch} />
        </>
      );
    }

    function Root() {
      const [state, dispatch] = React.useReducer(appReducer, null, initialStateFactory);
      return (
        <AppContext.Provider value={{ state, dispatch }}>
          <HashRouter>
            <App />
          </HashRouter>
        </AppContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
