<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安伴守护 - 被监护端</title>
<link rel="stylesheet" href="css/common.css">
<style>
/* ═══ Ward Header ═══ */
.w-header { display:flex; align-items:center; padding:46px 16px 10px; gap:10px; }
.w-header .exit { font-size:12px; color:var(--text-secondary); cursor:pointer; padding:6px 12px; border-radius:var(--radius-pill); background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06); backdrop-filter:blur(12px); font-weight:600; }
/* ═══ Check-in ═══ */
.ck-area { display:flex; flex-direction:column; align-items:center; padding:20px 0 10px; }
.ck-btn {
  width:152px; height:152px; border-radius:50%; border:3px solid var(--accent-green);
  background:rgba(63,185,80,.08); cursor:pointer; transition:all .3s;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  color:var(--accent-green); font-size:16px; font-weight:700;
}
.ck-btn:active { transform:scale(.95); background:rgba(63,185,80,.15); }
.ck-btn.done { border-color:var(--text-muted); color:var(--text-muted); background:rgba(255,255,255,.03); }
.ck-btn .pin { font-size:28px; }
.ck-zone { font-size:13px; color:var(--accent-green); margin-top:10px; text-align:center; }
.ck-zone.warn { color:var(--accent-yellow); }
.ck-meta { font-size:11px; color:var(--text-secondary); margin-top:4px; }
/* ═══ Records ═══ */
.ck-records { padding:0 20px; margin-top:10px; }
.ck-rec-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(48,54,61,.4); font-size:12px; }
.ck-rec-item .time { color:var(--text-muted); min-width:48px; }
.ck-rec-item .loc { flex:1; color:var(--text-secondary); }
/* ═══ Reminders ═══ */
.rem-section { padding:0 20px; }
.rem-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:14px; margin-bottom:10px; display:flex; align-items:center; gap:12px;
  transition:all .3s; position:relative; overflow:hidden;
}
.rem-card .bar { width:4px; height:36px; border-radius:2px; flex-shrink:0; }
.rem-card .info { flex:1; }
.rem-card .rname { font-size:14px; font-weight:600; }
.rem-card .rmeta { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.rem-card .go-btn {
  padding:6px 14px; border-radius:8px; border:none; background:var(--accent-blue);
  color:#fff; font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; flex-shrink:0;
}
.rem-card .go-btn:active { transform:scale(.95); }
.rem-card.done { transform:translateX(100%); opacity:0; height:0; padding:0; margin:0; border:0; overflow:hidden; }
.rem-empty { text-align:center; padding:20px; color:var(--text-muted); font-size:12px; }
/* ═══ SOS Ball ═══ */
.sos-ball {
  position:absolute; right:16px; bottom:24px; width:54px; height:54px;
  border-radius:50%; border:2px solid var(--accent-red);
  background:transparent; color:var(--accent-red); font-size:12px; font-weight:800;
  cursor:pointer; z-index:50; display:flex; align-items:center; justify-content:center;
  animation:sosGlow 2s infinite; letter-spacing:1px;
}
@keyframes sosGlow {
  0%,100% { box-shadow:0 0 8px rgba(248,81,73,.3); }
  50% { box-shadow:0 0 20px rgba(248,81,73,.5); }
}
/* ═══ SOS Overlay ═══ */
.sos-overlay {
  position:absolute; inset:0; z-index:200; background:rgba(1,4,9,.85);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.sos-overlay.active { display:flex; }
.sos-big {
  width:160px; height:160px; border-radius:50%; border:3px solid var(--accent-red);
  background:rgba(248,81,73,.08); display:flex; flex-direction:column;
  align-items:center; justify-content:center; cursor:pointer; position:relative;
  color:var(--accent-red); font-size:34px; font-weight:800;
}
.sos-ripple {
  position:absolute; inset:-20px; border-radius:50%; border:2px solid rgba(248,81,73,.3);
  animation:ripple 2s infinite;
}
.sos-ripple:nth-child(2) { animation-delay:.6s; }
.sos-ripple:nth-child(3) { animation-delay:1.2s; }
.sos-loc { font-size:12px; color:var(--text-secondary); margin-top:20px; text-align:center; max-width:80%; }
.sos-cancel { margin-top:24px; padding:10px 30px; border:1px solid var(--border); border-radius:var(--radius-pill); background:transparent; color:var(--text-secondary); font-size:13px; cursor:pointer; }
.sos-cancel:active { background:rgba(255,255,255,.05); }
.sos-count { font-size:64px; font-weight:800; color:var(--accent-red); }
.sos-sent { font-size:16px; font-weight:700; color:var(--accent-red); }
.count-anim { animation:countPulse .4s ease-out; }
@keyframes countPulse { 0% { transform:scale(1.5); opacity:0; } 100% { transform:scale(1); opacity:1; } }
/* ═══ Lock Screen ═══ */
.lock-screen {
  position:absolute; inset:0; z-index:300;
  background:linear-gradient(180deg,#0d1117,#010409);
  display:none; flex-direction:column; align-items:center; justify-content:center;
}
.lock-screen.active { display:flex; }
.lock-time { font-size:76px; font-weight:200; letter-spacing:-2px; }
.lock-date { font-size:14px; color:var(--text-secondary); margin-top:4px; margin-bottom:40px; }
.lock-icon { font-size:36px; margin-bottom:10px; }
.lock-msg { font-size:15px; font-weight:600; margin-bottom:4px; }
.lock-sub { font-size:12px; color:var(--text-secondary); margin-bottom:40px; }
/* ═══ Auto Notify ═══ */
.notify-bar {
  position:absolute; top:42px; left:0; right:0; z-index:100;
  background:rgba(210,153,34,.15); border-bottom:1px solid rgba(210,153,34,.3);
  padding:10px 16px; display:none; align-items:center; gap:10px;
  animation:slideDown .3s ease;
}
.notify-bar.active { display:flex; }
.notify-bar .icon { font-size:16px; }
.notify-bar .text { flex:1; font-size:12px; color:var(--accent-yellow); font-weight:600; }
.notify-bar .dismiss { padding:4px 10px; border-radius:8px; border:none; background:rgba(255,255,255,.08); color:var(--text-secondary); font-size:11px; cursor:pointer; }
</style>
</head>
<body>
<div class="phone-frame">
<div class="phone-screen" id="mainScreen">
  <!-- Header -->
  <div class="w-header">
    <button class="exit" onclick="AnBan.auth.logout()">‹ 退出</button>
  </div>

  <!-- Auto Notify Bar -->
  <div class="notify-bar" id="notifyBar">
    <span class="icon">🔊</span>
    <span class="text" id="notifyText">提醒时间到了</span>
    <button class="dismiss" onclick="dismissNotify()">知道了</button>
  </div>

  <!-- Check-in -->
  <div class="ck-area">
    <button class="ck-btn" id="ckBtn" onclick="doCheckin()">
      <span class="pin">📍</span>
      <span>打卡</span>
    </button>
    <div class="ck-zone" id="ckZone"></div>
    <div class="ck-meta" id="ckMeta"></div>
  </div>

  <!-- Reminders -->
  <div style="padding:14px 20px 0">
    <div class="section-divider">今日提醒</div>
  </div>
  <div class="rem-section" id="remList"></div>

  <!-- SOS Ball -->
  <button class="sos-ball" id="sosBall" onclick="openSOS()">SOS</button>
</div>

<!-- SOS Overlay -->
<div class="sos-overlay" id="sosOverlay">
  <div id="sosContent"></div>
</div>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-time" id="lockTime">--:--</div>
  <div class="lock-date" id="lockDate">--</div>
  <div class="lock-icon">🔒</div>
  <div class="lock-msg">学习模式已开启</div>
  <div class="lock-sub">仅可使用必要功能</div>
</div>

</div><!-- phone-frame -->

<script src="js/common.js"></script>
<script>
AnBan.init();

// ═══ Init ward identity ═══
var currentUser = AnBan.auth.getCurrentUser();
var wardPhone = currentUser ? currentUser.phone : '';
var ward = AnBan.data.getWardByPhone(wardPhone);
// Demo fallback: if no ward found, use w1
if (!ward) {
  ward = AnBan.data.getWard('w1');
  if (ward) AnBan.data.setCurrentWardId('w1');
}
var wardId = ward ? ward.id : 'w1';
AnBan.data.setCurrentWardId(wardId);
var checkinBusy = false;
var lockClockInterval = null;
var notifyCount = 0;

// Header (date removed per Round 7)

// ═══ Render ═══
function renderAll() {
  renderReminders();
  checkLockMode();
}

function renderReminders() {
  var reminders = AnBan.data.getEnabledReminders(wardId);
  var responded = AnBan.data.getRespondedToday(wardId);
  var html = '';
  var pendingCount = 0;
  reminders.forEach(function(r, i) {
    if (responded.indexOf(i) >= 0) return;
    pendingCount++;
    var audioIcon = r.audio ? ' <span class="audio-play-btn" onclick="event.stopPropagation();playReminderAudio(\''+r.wardId+'\',\''+AnBan.data.getReminders(r.wardId).indexOf(r)+'\')" style="display:inline-block;cursor:pointer;color:var(--accent-blue);font-size:14px;margin-left:4px">🔊</span>' : '';
    html += '<div class="rem-card" id="rem-'+i+'"><div class="bar" style="background:'+r.color+'"></div>';
    html += '<div class="info"><div class="rname">'+r.name+audioIcon+'</div><div class="rmeta">'+r.time+' · '+r.cycle+'</div></div>';
    html += '<button class="go-btn" onclick="respondRem(document.getElementById(\'rem-'+i+'\'),'+i+')">去响应</button>';
    html += '</div>';
  });
  if (!pendingCount) html = '<div class="rem-empty">今日提醒已全部响应 ✓</div>';
  document.getElementById('remList').innerHTML = html;
}

function playReminderAudio(wardId, idx) {
  var reminders = AnBan.data.getReminders(wardId);
  var r = reminders[parseInt(idx)];
  if (r && r.audio) {
    AnBan.hardware.playAudio(r.audio);
    AnBan.ui.toast('正在播放：' + r.name);
  }
}

// ═══ Check-in ═══
function doCheckin() {
  if (checkinBusy) return;
  var lastTs = AnBan.data.getLastCheckinTime(wardId);
  var elapsed = Date.now() - lastTs;
  var cooldownMs = 15 * 60 * 1000; // 15 minutes
  if (lastTs > 0 && elapsed < cooldownMs) {
    var remaining = Math.ceil((cooldownMs - elapsed) / 60000);
    AnBan.ui.toast('请等待' + remaining + '分钟后再打卡');
    return;
  }
  checkinBusy = true;
  var btn = document.getElementById('ckBtn');
  btn.innerHTML = '<span class="pin" style="animation:spin 1s linear infinite">📍</span><span>定位中...</span>';
  setTimeout(function() {
    var zones = AnBan.data.getSafeZones(wardId);
    var loc = AnBan.data.simulateLocation(zones.length ? zones[0] : null);
    var zone = AnBan.data.isInSafeZone(loc.lat, loc.lng, wardId);
    AnBan.data.addCheckin(wardId, loc.address, zone ? zone.name : null);

    btn.classList.add('done');
    btn.innerHTML = '<span class="pin">✓</span><span>已打卡</span>';
    if (zone) {
      document.getElementById('ckZone').textContent = '● 安全区域内 · ' + zone.name;
      document.getElementById('ckZone').classList.remove('warn');
      AnBan.hardware.speak('打卡成功，当前在安全区域内');
    } else {
      document.getElementById('ckZone').textContent = '● 超出安全范围';
      document.getElementById('ckZone').classList.add('warn');
      AnBan.hardware.speak('打卡成功，当前超出安全范围');
    }
    document.getElementById('ckMeta').textContent = '刚刚打卡 · ' + loc.address;
    AnBan.ui.toast('打卡成功');
    AnBan.hardware.vibrate([50]);

    setTimeout(function() {
      btn.classList.remove('done');
      btn.innerHTML = '<span class="pin">📍</span><span>打卡</span>';
      checkinBusy = false;
    }, 1500);
  }, 800);
}

// ═══ Reminder Response ═══
function respondRem(card, idx) {
  AnBan.hardware.vibrate([50]);
  AnBan.data.markResponded(wardId, idx);
  card.classList.add('done');
  setTimeout(function() { renderReminders(); }, 350);
}

// ═══ SOS ═══
var sosTimer = null;
function openSOS() {
  var zones = AnBan.data.getSafeZones(wardId);
  var zone = zones.length ? zones[0] : null;
  var loc = AnBan.data.simulateLocation(zone);
  // Directly start countdown
  startSOSCountdown(loc);
}

function startSOSCountdown(loc) {
  var count = 3;
  var content = document.getElementById('sosContent');

  function renderCount() {
    var html = '<div style="text-align:center;padding:40px 20px">';
    html += '<div style="font-size:72px;font-weight:800;color:var(--accent-red);line-height:1;margin-bottom:16px" class="count-anim">' + count + '</div>';
    html += '<div style="font-size:14px;color:var(--text-secondary);margin-bottom:8px">即将发送求助信号</div>';
    html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:24px">📍 ' + loc.address + '</div>';
    html += '<button onclick="cancelSOS()" style="padding:10px 40px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:14px;cursor:pointer">取消</button>';
    html += '</div>';
    content.innerHTML = html;
  }

  renderCount();
  document.getElementById('sosOverlay').classList.add('active');

  sosTimer = setInterval(function() {
    count--;
    if (count > 0) {
      renderCount();
    } else {
      clearInterval(sosTimer);
      sosTimer = null;
      executeSOS(loc);
    }
  }, 1000);
}

function cancelSOS() {
  if (sosTimer) { clearInterval(sosTimer); sosTimer = null; }
  closeSOS();
}

function executeSOS(loc) {
  var content = document.getElementById('sosContent');

  // Step 1: Record SOS
  AnBan.data.addSosRecord(wardId, loc.address);
  AnBan.hardware.vibrate([200, 100, 200]);

  // Step 2: Show notification sent + SMS sent
  var phones = AnBan.data.getAnswerPhones();
  var primaryPhone = phones.length > 0 ? phones[0] : '';

  var html = '<div style="text-align:center;padding:20px">';
  html += '<div style="font-size:40px;margin-bottom:12px">🚨</div>';
  html += '<div style="font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:8px">求助信号已发送</div>';
  html += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">📍 ' + loc.address + '</div>';

  // Notification to guardian
  html += '<div style="background:rgba(63,185,80,.1);border-radius:8px;padding:10px 14px;margin-bottom:10px;text-align:left;font-size:12px;color:var(--accent-green)">✅ 已通知监护人App</div>';

  // SMS to all phones
  if (phones.length > 0) {
    html += '<div style="background:rgba(47,129,247,.08);border-radius:8px;padding:10px 14px;margin-bottom:10px;text-align:left">';
    html += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">已发送短信至：</div>';
    phones.forEach(function(p, i) {
      html += '<div style="font-size:12px;color:var(--text-primary);margin-top:3px">📱 ' + AnBan.crypto.mask(p) + (i===0?' (默认)':'') + '</div>';
    });
    html += '<div style="font-size:10px;color:var(--text-muted);margin-top:6px">短信内容：SOS求助 · ' + loc.address + '</div>';
    html += '</div>';
  }

  // Dial default phone
  if (primaryPhone) {
    html += '<div style="margin-top:12px;padding:14px;background:var(--bg-card);border-radius:12px;border:1px solid var(--border)">';
    html += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">正在拨打默认接听号码</div>';
    html += '<div style="font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:12px">📞 ' + AnBan.crypto.mask(primaryPhone) + '</div>';
    html += '<div style="display:flex;gap:10px;justify-content:center">';
    html += '<button onclick="closeSOS()" style="padding:8px 28px;border-radius:20px;border:none;background:var(--accent-red);color:#fff;font-size:13px;cursor:pointer;font-weight:600">挂断</button>';
    html += '</div></div>';
  }

  html += '</div>';
  content.innerHTML = html;

  AnBan.hardware.speak('求助信号已发送，正在拨打接听号码');
}

function closeSOS() {
  if (sosTimer) { clearInterval(sosTimer); sosTimer = null; }
  document.getElementById('sosOverlay').classList.remove('active');
}

// ═══ Lock Mode ═══
function checkLockMode() {
  var locked = AnBan.data.getLockMode();
  var lockEl = document.getElementById('lockScreen');
  if (locked) {
    lockEl.classList.add('active');
    if (lockClockInterval) clearInterval(lockClockInterval);
    updateLockClock();
    lockClockInterval = setInterval(updateLockClock, 1000);
  } else {
    lockEl.classList.remove('active');
    if (lockClockInterval) { clearInterval(lockClockInterval); lockClockInterval = null; }
  }
}
function updateLockClock() {
  var now = new Date();
  document.getElementById('lockTime').textContent = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  document.getElementById('lockDate').textContent = AnBan.ui.formatDate();
}

// ═══ Auto-Notify (Demo) ═══
// Check URL param for demo notify
function checkNotifyParam() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('notify') === '1') {
    triggerNotify('吃降压药', null);
  }
}
function triggerNotify(reminderName, audioData) {
  if (notifyCount >= 3) return;
  notifyCount++;
  var bar = document.getElementById('notifyBar');
  document.getElementById('notifyText').textContent = '⏰ ' + reminderName + ' — 该提醒了';
  bar.classList.add('active');
  AnBan.hardware.vibrate([200, 100, 200, 100, 200]);
  if (audioData) {
    AnBan.hardware.playAudio(audioData);
  } else {
    AnBan.hardware.speak(reminderName + '，请及时处理');
  }
  // Auto dismiss after 15s
  setTimeout(function() { dismissNotify(); }, 15000);
}
function dismissNotify() {
  document.getElementById('notifyBar').classList.remove('active');
  notifyCount = 0;
}

// ═══ Periodic check for reminder times ═══
function checkReminderTimes() {
  var reminders = AnBan.data.getEnabledReminders(wardId);
  var responded = AnBan.data.getRespondedToday(wardId);
  var now = new Date();
  var nowMin = now.getHours() * 60 + now.getMinutes();
  reminders.forEach(function(r, i) {
    if (responded.indexOf(i) >= 0) return;
    var parts = r.time.split(':');
    var rMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    if (nowMin === rMin) {
      triggerNotify(r.name, r.audio);
    }
  });
}
setInterval(checkReminderTimes, 60000);

// ═══ Init ═══
renderAll();
checkNotifyParam();
</script>
</body>
</html>
