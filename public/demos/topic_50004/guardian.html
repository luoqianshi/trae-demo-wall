<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安伴守护 - 监护端</title>
<link rel="stylesheet" href="css/common.css">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
/* ═══ Header ═══ */
.g-header { display:flex; align-items:center; padding:46px 16px 8px; gap:8px; position:relative; z-index:10; }
.g-header .exit { font-size:12px; color:var(--text-secondary); cursor:pointer; padding:6px 12px; border-radius:var(--radius-pill); background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06); backdrop-filter:blur(12px); font-weight:600; }
.g-header .spacer { flex:1; }
/* ═══ Header Icon Group ═══ */
.g-header .icon-group { display:flex; align-items:center; gap:0; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:var(--radius-pill); backdrop-filter:blur(12px); overflow:hidden; }
.g-header .icon-btn { width:34px; height:30px; border:none; background:transparent; color:var(--text-secondary); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.g-header .icon-btn:active { background:rgba(255,255,255,.08); color:var(--text-primary); }
.g-header .icon-btn.add { color:var(--accent-blue); font-size:17px; }
.g-header .icon-btn.del { color:var(--accent-red); font-size:13px; }
.g-header .icon-btn + .icon-btn { border-left:1px solid rgba(255,255,255,.06); }
/* ═══ Ward Dropdown ═══ */
.ward-trigger { display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:var(--radius-pill); background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06); cursor:pointer; backdrop-filter:blur(12px); font-size:13px; font-weight:600; }
.ward-trigger .dot { width:8px; height:8px; border-radius:50%; }
.ward-dropdown { position:absolute; top:100%; left:0; right:0; z-index:50; background:rgba(22,27,34,.96); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-top:1px solid var(--border); transform:scale(.96); opacity:0; transition:all .2s; pointer-events:none; }
.ward-dropdown.open { transform:scale(1); opacity:1; pointer-events:auto; }
.ward-item { display:flex; align-items:center; gap:10px; padding:14px 20px; cursor:pointer; transition:background .15s; font-size:13px; border-bottom:1px solid rgba(48,54,61,.4); }
.ward-item:hover { background:var(--bg-hover); }
.ward-item .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ward-item .info { flex:1; }
.ward-item .meta { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.ward-item .check { color:var(--accent-blue); font-weight:700; font-size:16px; }
.ward-add { display:flex; align-items:center; justify-content:center; gap:6px; padding:14px; color:var(--accent-blue-light); font-size:13px; font-weight:600; cursor:pointer; }
.ward-add:hover { background:var(--bg-hover); }
/* ═══ Tabs ═══ */
.g-tabs { display:flex; padding:8px 16px 0; gap:0; }
.g-tab { flex:1; text-align:center; padding:10px 0; font-size:13px; font-weight:600; color:var(--text-secondary); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
.g-tab.active { color:var(--accent-blue-light); border-bottom-color:var(--accent-blue); }
/* ═══ Content ═══ */
.g-content { padding:14px 16px 24px; }
.tab-view { display:none; }
.tab-view.active { display:block; animation:fadeIn .25s ease; }
/* ═══ Reminder card in sub-tab ═══ */
.rem-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px; margin-bottom:10px; }
.rem-card .top { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.rem-card .color-bar { width:4px; height:28px; border-radius:2px; }
.rem-card .name { font-size:13px; font-weight:600; flex:1; }
.rem-card .bottom { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--text-secondary); }
.rem-card .has-audio { font-size:10px; color:var(--accent-blue-light); }
/* ═══ Zone card ═══ */
.zone-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px; margin-bottom:10px; }
.zone-card .top { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.zone-card .name { font-size:13px; font-weight:600; flex:1; }
.zone-card .meta { font-size:11px; color:var(--text-secondary); }
/* ═══ Settings page ═══ */
.settings-page { position:absolute; inset:0; z-index:150; background:var(--bg-deep); display:none; overflow-y:auto; }
.settings-page.active { display:block; animation:fadeIn .2s ease; }
.settings-header { display:flex; align-items:center; padding:46px 16px 10px; gap:10px; }
.settings-header .back { font-size:22px; color:var(--text-secondary); cursor:pointer; background:none; border:none; padding:4px 8px; }
.settings-header .title { font-size:16px; font-weight:700; flex:1; }
/* ═══ Poster/Report templates ═══ */
.tpl-row { display:flex; gap:8px; margin-bottom:14px; }
.tpl-opt { flex:1; text-align:center; padding:8px; border-radius:10px; border:1px solid var(--border); font-size:11px; cursor:pointer; font-weight:600; transition:all .15s; }
.tpl-opt.active { border-color:var(--accent-blue); color:var(--accent-blue-light); background:rgba(47,129,247,.08); }
.report-preview { background:#fff; border-radius:12px; padding:20px; margin-bottom:14px; color:#222; font-size:12px; line-height:1.8; }
.report-preview h3 { color:#da3633; font-size:16px; margin-bottom:8px; }
.report-preview .photo-box { display:flex; gap:8px; margin:10px 0; }
.report-preview .photo-box .ph { width:60px; height:60px; border-radius:8px; background:#e5e7eb; display:flex; align-items:center; justify-content:center; font-size:10px; color:#999; }
.poster-preview { border-radius:12px; padding:24px; margin-bottom:14px; font-size:12px; line-height:1.8; position:relative; overflow:hidden; }
.poster-preview .watermark { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; color:rgba(0,0,0,.06); transform:rotate(-30deg); pointer-events:none; font-weight:700; }
/* ═══ Inline Editable (softened) ═══ */
.inline-val { outline:none; padding:1px 6px; border-radius:4px; cursor:pointer; transition:all .15s; border-bottom:1px solid transparent; }
.inline-val:hover { background:rgba(255,255,255,.06); }
.inline-val:focus { background:rgba(47,129,247,.08); border-bottom-color:rgba(47,129,247,.25); }
.inline-val.unit-cm::after { content:'cm'; font-size:10px; color:var(--text-muted); margin-left:2px; font-weight:400; }
.inline-val.unit-kg::after { content:'kg'; font-size:10px; color:var(--text-muted); margin-left:2px; font-weight:400; }
/* ═══ Popup Input (age/bloodType) ═══ */
.popup-input { position:fixed; z-index:200; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:12px; box-shadow:0 8px 24px rgba(0,0,0,.4); min-width:120px; }
.popup-input input[type=number] { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:6px; background:var(--bg-deep); color:var(--text-primary); font-size:14px; outline:none; }
.popup-input input[type=number]:focus { border-color:var(--accent-blue); }
.popup-input .bt-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.popup-input .bt-opt { padding:8px; text-align:center; border-radius:6px; border:1px solid var(--border); background:var(--bg-deep); color:var(--text-primary); font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
.popup-input .bt-opt:active { background:rgba(47,129,247,.15); border-color:var(--accent-blue); }
.popup-input .bt-opt.selected { border-color:var(--accent-blue); color:var(--accent-blue-light); background:rgba(47,129,247,.08); }
/* ═══ Map Picker ═══ */
.map-picker { position:relative; width:100%; height:160px; border-radius:10px; border:1px solid var(--border); cursor:crosshair; overflow:hidden;
  background:linear-gradient(rgba(48,54,61,.25) 1px,transparent 1px),linear-gradient(90deg,rgba(48,54,61,.25) 1px,transparent 1px),
  linear-gradient(rgba(48,54,61,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(48,54,61,.12) 1px,transparent 1px),#0d1117;
  background-size:100% 25%,100% 25%,100% 12.5%,12.5% 100%,100% 100%; }
.map-picker .pin { position:absolute; transform:translate(-50%,-100%); pointer-events:none; z-index:2; transition:left .1s,top .1s; }
.map-picker .pin-dot { width:12px; height:12px; border-radius:50%; background:var(--accent-red); border:2px solid #fff; box-shadow:0 0 8px rgba(248,81,73,.5); margin:0 auto; }
.map-picker .pin-line { width:2px; height:14px; background:var(--accent-red); margin:0 auto; opacity:.5; }
.map-picker .coords { position:absolute; bottom:6px; right:8px; font-size:10px; color:var(--text-secondary); background:rgba(13,17,23,.85); padding:2px 8px; border-radius:4px; z-index:3; pointer-events:none; }
.map-picker .hint { position:absolute; top:8px; left:8px; font-size:10px; color:var(--text-muted); z-index:3; pointer-events:none; }
/* ═══ Photo Grid ═══ */
.photo-grid { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0; }
.photo-thumb { position:relative; width:60px; height:60px; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
.photo-thumb img { width:100%; height:100%; object-fit:cover; }
.photo-thumb .del-photo { position:absolute; top:2px; right:2px; width:16px; height:16px; border-radius:50%; background:rgba(0,0,0,.6); color:#fff; font-size:10px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
/* ═══ System Background Check Notification ═══ */
.sys-notify { position:absolute; top:0; left:0; right:0; z-index:999; background:rgba(22,27,34,.97); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:48px 16px 14px; transform:translateY(-100%); transition:transform .4s cubic-bezier(.4,0,.2,1); cursor:pointer; }
.sys-notify.show { transform:translateY(0); }
.sys-notify .sn-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.sys-notify .sn-icon { width:20px; height:20px; border-radius:5px; background:var(--accent-red); display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff; font-weight:700; }
.sys-notify .sn-app { font-size:11px; color:var(--text-secondary); font-weight:600; }
.sys-notify .sn-time { font-size:10px; color:var(--text-muted); margin-left:auto; }
.sys-notify .sn-title { font-size:13px; font-weight:700; color:var(--accent-red); margin-bottom:3px; }
.sys-notify .sn-body { font-size:12px; color:var(--text-secondary); line-height:1.4; }
</style>
</head>
<body>
<div class="phone-frame">
<div class="phone-screen" id="mainScreen">
  <!-- System Background Check Notification -->
  <div class="sys-notify" id="sysNotify" onclick="dismissSysNotify()"></div>
  <!-- ═══ Header ═══ -->
  <div class="g-header">
    <button class="exit" onclick="AnBan.auth.logout()">‹ 退出</button>
    <div class="spacer"></div>
    <div class="icon-group">
      <button class="icon-btn" onclick="openSettings()" title="设置">⚙</button>
      <button class="icon-btn add" onclick="openAddWard()" title="添加被监护人">+</button>
      <button class="icon-btn del" onclick="deleteWardConfirm()" title="注销当前被监护人">✕</button>
    </div>
    <div class="ward-trigger" id="wardTrigger" onclick="toggleDropdown()">
      <span class="dot" id="triggerDot"></span>
      <span id="triggerName">--</span>
      <span style="font-size:10px;color:var(--text-muted)">▾</span>
    </div>
  </div>
  <!-- Dropdown -->
  <div class="ward-dropdown" id="wardDropdown"></div>

  <!-- ═══ Tabs ═══ -->
  <div class="g-tabs">
    <div class="g-tab active" data-tab="dashboard" onclick="switchTab('dashboard')">动态</div>
    <div class="g-tab" data-tab="config" onclick="switchTab('config')">监护</div>
    <div class="g-tab" data-tab="recovery" onclick="switchTab('recovery')">寻回</div>
  </div>

  <!-- ═══ Content ═══ -->
  <div class="g-content">
    <!-- ── Dashboard ── -->
    <div class="tab-view active" id="tab-dashboard"></div>
    <!-- ── Config ── -->
    <div class="tab-view" id="tab-config"></div>
    <!-- ── Recovery ── -->
    <div class="tab-view" id="tab-recovery"></div>
  </div>
</div>

<!-- ═══ Settings Page ═══ -->
<div class="settings-page" id="settingsPage">
  <div class="settings-header">
    <button class="back" onclick="closeSettings()">‹</button>
    <div class="title">设置</div>
  </div>
  <div style="padding:0 16px 24px" id="settingsContent"></div>
</div>

<!-- ═══ Overlays ═══ -->
<div class="overlay" id="overlayAddWard">
  <div class="overlay-content scroll">
    <div class="overlay-header"><div class="title" id="addWardTitle">添加被监护人</div><button class="overlay-close" onclick="AnBan.ui.hideOverlay('overlayAddWard')">✕</button></div>
    <div id="addWardForm">
      <div class="form-group"><div class="form-label">手机号</div><div class="form-row"><input class="form-input" id="awPhone" placeholder="被监护人手机号" maxlength="11"><button class="form-code-btn" id="awCodeBtn" onclick="sendWardCode()">获取验证码</button></div></div>
      <div class="form-group"><div class="form-label">验证码</div><input class="form-input" id="awCode" placeholder="Demo自动填充"></div>
      <div class="form-group"><div class="form-label">昵称</div><input class="form-input" id="awName" placeholder="输入昵称"></div>
      <div class="form-group"><div class="form-label">类型</div><select class="form-select" id="awType"><option value="elderly">老人</option><option value="child">孩子</option></select></div>
      <div class="form-group"><div class="form-label">年龄</div><input class="form-input" id="awAge" type="number" placeholder="年龄"></div>
      <div class="form-group"><div class="form-label">性别</div><select class="form-select" id="awGender"><option value="女">女</option><option value="男">男</option></select></div>
      <div class="form-group" id="awCheckinGroup"><div style="display:flex;align-items:center;justify-content:space-between"><div class="form-label" style="margin:0">每日必须打卡</div><div class="toggle" id="awCheckinToggle" onclick="this.classList.toggle('on')"></div></div><div style="font-size:10px;color:var(--text-muted);margin-top:6px">开启后前一天未打卡将自动推送通知和短信给监护人</div></div>
      <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-outline" style="flex:1" onclick="AnBan.ui.hideOverlay('overlayAddWard')">取消</button><button class="btn btn-ghost" style="flex:1" onclick="fillWardRandom()">一键填充</button><button class="btn btn-primary" style="flex:1" onclick="submitAddWard()">确定</button></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlayEditWard">
  <div class="overlay-content scroll">
    <div class="overlay-header"><div class="title">编辑基本信息</div><button class="overlay-close" onclick="AnBan.ui.hideOverlay('overlayEditWard')">✕</button></div>
    <div id="editWardForm"></div>
  </div>
</div>

<div class="overlay" id="overlayAddReminder">
  <div class="overlay-content scroll">
    <div class="overlay-header"><div class="title" id="reminderFormTitle">添加提醒</div><button class="overlay-close" onclick="AnBan.ui.hideOverlay('overlayAddReminder')">✕</button></div>
    <div id="reminderForm">
      <div class="form-group"><div class="form-label">提醒名称</div><input class="form-input" id="rfName" placeholder="如：吃降压药"></div>
      <div class="form-group"><div class="form-label">提醒时间</div><input class="form-input" id="rfTime" type="time" value="08:00"></div>
      <div class="form-group"><div class="form-label">重复周期</div><select class="form-select" id="rfCycle"><option>每天</option><option>周一至周五</option><option>周六至周日</option></select></div>
      <div class="form-group"><div class="form-label">颜色标识</div><div class="color-row" id="rfColors"></div></div>
      <div class="form-group"><div class="form-label">语音提醒</div><div id="rfRecArea"><button class="rec-btn" id="rfRecBtn" onclick="toggleRec()">🎤 录制语音</button><div id="rfRecResult"></div></div></div>
      <input type="hidden" id="rfEditIdx" value="-1">
      <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-outline" style="flex:1" onclick="AnBan.ui.hideOverlay('overlayAddReminder')">取消</button><button class="btn btn-primary" style="flex:1" onclick="submitReminder()">保存</button></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlayAddZone">
  <div class="overlay-content">
    <div class="overlay-header"><div class="title" id="zoneFormTitle">添加安全区域</div><button class="overlay-close" onclick="AnBan.ui.hideOverlay('overlayAddZone')">✕</button></div>
    <div class="form-group"><div class="form-label">区域名称</div><input class="form-input" id="zfName" placeholder="如：翠苑小区（家）"></div>
    <div class="form-group"><div class="form-label">详细地址</div><input class="form-input" id="zfAddr" placeholder="详细地址"></div>
    <div class="form-group"><div class="form-label">安全半径</div><div class="form-row"><input class="form-input" id="zfRadius" type="number" value="500" placeholder="500"><span style="font-size:13px;color:var(--text-secondary);padding-top:10px">米</span></div></div>
    <div class="form-group"><div class="form-label">地图定位 <span style="font-weight:400;color:var(--text-muted);font-size:10px">（点击选取位置）</span></div>
      <div class="map-picker" id="zoneMapPicker" onclick="pickMapLocation(event)">
        <div class="hint">📍 点击地图选取坐标</div>
        <div class="pin" id="zoneMapPin" style="display:none;left:50%;top:50%"><div class="pin-dot"></div><div class="pin-line"></div></div>
        <div class="coords" id="zoneMapCoords">--</div>
      </div>
    </div>
    <input type="hidden" id="zfLat" value="">
    <input type="hidden" id="zfLng" value="">
    <input type="hidden" id="zfEditIdx" value="-1">
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-outline" style="flex:1" onclick="AnBan.ui.hideOverlay('overlayAddZone')">取消</button><button class="btn btn-primary" style="flex:1" onclick="submitZone()">保存</button></div>
  </div>
</div>

<div class="overlay" id="overlayAddPhone">
  <div class="overlay-content">
    <div class="overlay-header"><div class="title">添加接听号码</div><button class="overlay-close" onclick="AnBan.ui.hideOverlay('overlayAddPhone')">✕</button></div>
    <div class="form-group"><div class="form-label">手机号码</div><input class="form-input" id="apPhone" placeholder="请输入手机号码" maxlength="11" type="tel"></div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-outline" style="flex:1" onclick="AnBan.ui.hideOverlay('overlayAddPhone')">取消</button><button class="btn btn-primary" style="flex:1" onclick="submitPhone()">添加</button></div>
  </div>
</div>

<div class="overlay" id="overlayReportPreview">
  <div class="overlay-content scroll">
    <div class="overlay-header"><div class="title">报警档案预览</div><button class="overlay-close" onclick="AnBan.ui.hideOverlay('overlayReportPreview')">✕</button></div>
    <div id="reportPreviewContent"></div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-outline" style="flex:1" onclick="AnBan.ui.hideOverlay('overlayReportPreview')">关闭</button><button class="btn btn-primary" style="flex:1" onclick="generateReport()">📥 保存长图</button></div>
  </div>
</div>

</div><!-- phone-frame -->

<script src="js/common.js"></script>
<script>
AnBan.init();
var currentWardId = AnBan.data.getCurrentWardId();
var currentTab = 'dashboard';
var currentSubTab = 'info';
var recAudioData = null;
var COLORS = ['#2f81f7','#3fb950','#d29922','#f85149','#bc8cff'];
var selectedColor = COLORS[0];

// ═══ Ward Dropdown ═══
function renderDropdown() {
  var wards = AnBan.data.getWards();
  var dd = document.getElementById('wardDropdown');
  var html = '';
  wards.forEach(function(w) {
    var sc = w.status==='safe'?'var(--accent-green)':w.status==='warning'?'var(--accent-yellow)':w.status==='danger'?'var(--accent-red)':'var(--text-muted)';
    var sel = w.id === currentWardId;
    html += '<div class="ward-item" onclick="selectWard(\''+w.id+'\')">' +
      '<span class="dot" style="background:'+sc+'"></span>' +
      '<div class="info"><div>'+w.name+'</div><div class="meta">'+(w.type==='elderly'?'老人':'孩子')+' · '+w.age+'岁</div></div>' +
      (sel?'<span class="check">✓</span>':'') + '</div>';
  });
  dd.innerHTML = html;
  // Update trigger
  var cw = AnBan.data.getWard(currentWardId);
  if (cw) {
    var sc2 = cw.status==='safe'?'var(--accent-green)':cw.status==='warning'?'var(--accent-yellow)':cw.status==='danger'?'var(--accent-red)':'var(--text-muted)';
    document.getElementById('triggerDot').style.background = sc2;
    document.getElementById('triggerName').textContent = cw.name;
  }
}
function toggleDropdown() {
  var dd = document.getElementById('wardDropdown');
  dd.classList.toggle('open');
}
function selectWard(id) {
  currentWardId = id;
  AnBan.data.setCurrentWardId(id);
  document.getElementById('wardDropdown').classList.remove('open');
  renderDropdown(); renderAll();
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.ward-trigger') && !e.target.closest('.ward-dropdown')) {
    document.getElementById('wardDropdown').classList.remove('open');
  }
});

// ═══ Tab Switch ═══
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.g-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab===tab); });
  document.querySelectorAll('.tab-view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
  renderAll();
}
function switchSubTab(sub) {
  currentSubTab = sub;
  document.querySelectorAll('.sub-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.sub===sub); });
  document.querySelectorAll('.sub-view').forEach(function(v) { v.classList.remove('active'); });
  var el = document.getElementById('sub-'+sub);
  if (el) el.classList.add('active');
}

// ═══ Render Helpers ═══
function statusColor(s) { return s==='safe'?'var(--accent-green)':s==='warning'?'var(--accent-yellow)':s==='danger'?'var(--accent-red)':'var(--text-muted)'; }
function statusText(s) { return s==='safe'?'安全':s==='warning'?'待确认':s==='danger'?'异常':'离线'; }

function renderAll() {
  renderDashboard(); renderConfig(); renderRecovery();
}

// ═══ Dashboard ═══
function renderDashboard() {
  var w = AnBan.data.getWard(currentWardId);
  if (!w) { document.getElementById('tab-dashboard').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><div style="font-size:48px;margin-bottom:16px">👤</div><div style="font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">还没有被监护人</div><div style="font-size:12px;margin-bottom:24px">点击右上角 + 按钮添加被监护人</div></div>'; return; }
  var checkins = AnBan.data.getCheckins(currentWardId);
  var reminders = AnBan.data.getEnabledReminders(currentWardId);
  var responded = AnBan.data.getRespondedToday(currentWardId);
  var zones = AnBan.data.getSafeZones(currentWardId);
  var lastCheckin = checkins[0];
  var now = new Date();
  var todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  var todayCheckins = checkins.filter(function(r) { return r.date && r.date.indexOf(todayStr) >= 0; });

  var html = '';

  // Top dual-column: 打卡 + 活动
  html += '<div style="display:flex;gap:10px;margin-bottom:10px">';
  // LEFT: 打卡 info box
  html += '<div style="flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px">';
  html += '<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">打卡</div>';
  if (todayCheckins.length > 0) {
    var lastToday = todayCheckins[0];
    var zoneColor = lastToday.status === 'safe' ? 'var(--accent-green)' : 'var(--accent-red)';
    html += '<div style="font-size:14px;font-weight:600;color:var(--text-primary)">✓ ' + lastToday.time + '</div>';
    html += '<div style="font-size:12px;margin-top:4px;color:' + zoneColor + '">' + lastToday.location + '</div>';
  } else {
    html += '<div style="font-size:14px;font-weight:600;color:var(--text-muted)">—</div>';
    html += '<div style="font-size:12px;margin-top:4px;color:var(--text-muted)">今日未打卡</div>';
  }
  html += '</div>';
  // RIGHT: 活动 info box
  html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;min-width:80px">';
  html += '<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">活动</div>';
  html += '<div style="font-size:14px;font-weight:600;color:var(--text-primary)">正常</div>';
  html += '<div style="font-size:12px;margin-top:4px;color:var(--text-muted)">128步</div>';
  html += '</div>';
  html += '</div>';

  // Map
  var lastZone = lastCheckin ? lastCheckin.zone : null;
  html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;font-weight:600">📍 当前位置</span><span style="font-size:10px;color:var(--text-muted)">更新于 '+(lastCheckin?lastCheckin.time:'--:--')+'</span></div>';
  html += '<div class="map-box"><div class="grid-lines"></div><div class="map-pin"><div class="map-dot"></div><div class="map-label">'+(lastCheckin?lastCheckin.location:'暂无位置')+'</div></div></div>';
  if (lastZone) html += '<div style="font-size:11px;color:var(--accent-green)">● 安全区域内 · '+lastZone+'</div>';
  else if (lastCheckin) html += '<div style="font-size:11px;color:var(--accent-yellow)">● 超出安全范围</div>';
  html += '</div>';

  // Reminder Status
  if (reminders.length) {
    html += '<div class="section-divider">提醒执行情况</div>';
    html += '<div class="cfg">';
    reminders.forEach(function(r, i) {
      var isResp = responded.indexOf(i) >= 0;
      var nowR = new Date(), rTime = r.time.split(':'), rDate = new Date();
      rDate.setHours(parseInt(rTime[0]), parseInt(rTime[1]), 0);
      var status = isResp ? '✅ 已响应' : (nowR >= rDate ? '⏳ 待响应' : '—— 未到时间');
      html += '<div class="cfg-row"><span>'+r.name+' '+r.time+'</span><span class="cfg-val" style="font-size:11px">'+status+'</span></div>';
    });
    html += '</div>';
  }

  document.getElementById('tab-dashboard').innerHTML = html;
}

// ═══ Config ═══

  html += '<button class="btn-action primary" onclick="openAddReminder()">+ 添加新提醒</button>';

  var zones = AnBan.data.getSafeZones(currentWardId);
  zones.forEach(function(z, i) {
    html += '<div class="zone-card"><div class="top"><span style="font-size:16px">📍</span><div class="name">'+z.name+'</div></div>';
    html += '<div class="meta" style="padding-left:24px">'+z.address+' · 半径'+z.radius+'m</div>';
    html += '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px"><button class="inline-btn edit" onclick="openEditZone('+i+')">编辑</button><button class="inline-btn del" onclick="deleteZone('+i+')">删除</button></div>';
    html += '</div>';
  });
  if (!zones.length) html += '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px">暂无安全区域</div>';
  html += '<button class="btn-action primary" onclick="openAddZone()">+ 添加安全区域</button>';
  html += '</div>';

  document.getElementById('tab-config').innerHTML = html;
}

// ═══ Profile Inline Edit (contenteditable) ═══
function saveInlineField(el, field) {
  var val = el.textContent.trim();
  if (field === 'height' && val && /^\d+$/.test(val)) val += 'cm';
  if (field === 'weight' && val && /^\d+$/.test(val)) val += 'kg';
  var updates = {};
  updates[field] = val;
  AnBan.data.updateWard(currentWardId, updates);
  AnBan.ui.toast('已保存');
}
function closePopup() {
  var p = document.getElementById('fieldPopup');
  if (p) p.remove();
}
function showAgePopup(el, e) {
  e.stopPropagation();
  closePopup();
  var frame = document.querySelector('.phone-frame') || document.body;
  var frameRect = frame.getBoundingClientRect();
  var rect = el.getBoundingClientRect();
  var popup = document.createElement('div');
  popup.id = 'fieldPopup';
  popup.className = 'popup-input';
  var left = rect.left - frameRect.left;
  var top = rect.bottom - frameRect.top + 6;
  // Constrain within phone frame
  left = Math.max(10, Math.min(left, frameRect.width - 150));
  if (top + 60 > frameRect.height) top = rect.top - frameRect.top - 60;
  popup.style.left = (frameRect.left + left) + 'px';
  popup.style.top = (frameRect.top + top) + 'px';
  popup.innerHTML = '<input type="number" value="'+el.textContent.trim()+'" min="0" max="150" id="popupAgeInput">';
  document.body.appendChild(popup);
  var inp = document.getElementById('popupAgeInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') {
      var v = parseInt(inp.value);
      if (!isNaN(v) && v > 0) { el.textContent = v; AnBan.data.updateWard(currentWardId, {age:v}); AnBan.ui.toast('已保存'); }
      closePopup();
    }
    if (ev.key === 'Escape') closePopup();
  });
  inp.addEventListener('blur', function() {
    setTimeout(function() {
      var v = parseInt(inp.value);
      if (!isNaN(v) && v > 0) { el.textContent = v; AnBan.data.updateWard(currentWardId, {age:v}); AnBan.ui.toast('已保存'); }
      closePopup();
    }, 100);
  });
}
function showBloodPopup(el, e) {
  e.stopPropagation();
  closePopup();
  var frame = document.querySelector('.phone-frame') || document.body;
  var frameRect = frame.getBoundingClientRect();
  var rect = el.getBoundingClientRect();
  var current = el.textContent.trim();
  var types = ['A','B','AB','O'];
  var popup = document.createElement('div');
  popup.id = 'fieldPopup';
  popup.className = 'popup-input';
  var left = rect.left - frameRect.left;
  var top = rect.bottom - frameRect.top + 6;
  left = Math.max(10, Math.min(left, frameRect.width - 180));
  if (top + 120 > frameRect.height) top = rect.top - frameRect.top - 120;
  popup.style.left = (frameRect.left + left) + 'px';
  popup.style.top = (frameRect.top + top) + 'px';
  var html = '<div class="bt-grid">';
  types.forEach(function(t) {
    html += '<div class="bt-opt'+(current===t?' selected':'')+'" onclick="pickBloodType(\''+t+'\')">'+t+'</div>';
  });
  html += '</div>';
  popup.innerHTML = html;
  document.body.appendChild(popup);
}
function pickBloodType(type) {
  AnBan.data.updateWard(currentWardId, {bloodType: type});
  closePopup();
  renderRecovery();
  AnBan.ui.toast('已保存');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.popup-input') && !e.target.closest('.inline-val')) closePopup();
});

// ═══ Recovery ═══
function renderRecovery() {
  var w = AnBan.data.getWard(currentWardId);
  if (!w) { document.getElementById('tab-recovery').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><div style="font-size:48px;margin-bottom:16px">👤</div><div style="font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">还没有被监护人</div><div style="font-size:12px">点击右上角 + 按钮添加被监护人</div></div>'; return; }
  var primaryPhone = AnBan.data.getPrimaryPhone();
  var html = '';

  // ── Full Profile ──
  html += '<div class="cfg"><div class="cfg-title" style="justify-content:space-between">📋 安全档案 <button class="inline-btn edit" onclick="openEditWard()">编辑</button></div>';
  html += '<div class="cfg-row"><span>昵称</span><span class="cfg-val"><span class="inline-val" contenteditable="true" onblur="saveInlineField(this,\'name\')">'+w.name+'</span></span></div>';
  html += '<div class="cfg-row"><span>性别 / 年龄</span><span class="cfg-val">'+w.gender+' · <span class="inline-val" onclick="showAgePopup(this,event)">'+w.age+'</span>岁</span></div>';
  // Height/weight: contenteditable contains only the number, unit displayed via CSS ::after
  var rawH = w.height ? w.height.replace(/cm/gi,'').trim() : '';
  var rawW = w.weight ? w.weight.replace(/kg/gi,'').trim() : '';
  html += '<div class="cfg-row"><span>身高 / 体重</span><span class="cfg-val"><span class="inline-val'+(rawH?' unit-cm':'')+'" contenteditable="true" onblur="saveInlineField(this,\'height\')">'+(rawH||'?')+'</span> / <span class="inline-val'+(rawW?' unit-kg':'')+'" contenteditable="true" onblur="saveInlineField(this,\'weight\')">'+(rawW||'?')+'</span></span></div>';
  html += '<div class="cfg-row"><span>血型</span><span class="cfg-val"><span class="inline-val" onclick="showBloodPopup(this,event)">'+(w.bloodType ? w.bloodType : '未知')+'</span></span></div>';
  html += '<div class="cfg-row"><span>体貌特征</span><span class="cfg-val" style="max-width:180px;text-align:right"><span class="inline-val" contenteditable="true" onblur="saveInlineField(this,\'features\')">'+(w.features||'点击填写')+'</span></span></div>';
  if (w.chronicDiseases) html += '<div class="cfg-row"><span>慢性病</span><span class="cfg-val"><span class="inline-val" contenteditable="true" onblur="saveInlineField(this,\'chronicDiseases\')">'+w.chronicDiseases+'</span></span></div>';
  if (w.medications) html += '<div class="cfg-row"><span>用药</span><span class="cfg-val" style="max-width:180px;text-align:right"><span class="inline-val" contenteditable="true" onblur="saveInlineField(this,\'medications\')">'+w.medications+'</span></span></div>';
  html += '<div class="cfg-row"><span>联系电话</span><span class="cfg-val">'+(primaryPhone?AnBan.crypto.mask(primaryPhone):'未设置')+'</span></div>';
  if (w.idCard) html += '<div class="cfg-row"><span>身份证号</span><span class="cfg-val">'+AnBan.crypto.maskId(w.idCard)+' 🔒</span></div>';
  if (w.address) html += '<div class="cfg-row"><span>家庭住址</span><span class="cfg-val">'+w.address+' 🔒</span></div>';
  html += '</div>';

  // Photo upload section
  html += '<div class="section-divider">近照</div>';
  var photos = Array.isArray(w.photos) ? w.photos : [];
  if (photos.length) {
    html += '<div class="photo-grid">';
    photos.forEach(function(p, pi) {
      html += '<div class="photo-thumb"><img src="'+p+'" alt="近照'+(pi+1)+'"><button class="del-photo" onclick="deletePhoto('+pi+')">✕</button></div>';
    });
    html += '</div>';
  }
  html += '<button class="btn-action ghost" onclick="document.getElementById(\'photoInput\').click()">'+(photos.length?'继续上传':'+ 上传近照')+'</button>';
  html += '<input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotoUpload(event)">';

  // Report
  html += '<div class="section-divider">紧急报警档案</div>';
  html += '<div class="cfg">';
  html += '<div class="form-group"><div class="form-label">走失时间</div><input class="form-input" id="lostTime" type="datetime-local"></div>';

  html += '<div class="cfg">';

  html += '<div style="display:flex;gap:10px"><button class="btn-action ghost" style="flex:1" onclick="generatePoster()">📥 保存海报</button><button class="btn-action ghost" style="flex:1" onclick="AnBan.ui.toast(\'Demo：分享功能\')">📤 分享</button></div>';
  html += '</div>';

  document.getElementById('tab-recovery').innerHTML = html;
  renderPosterPreview();

function previewReport() {
  var w = AnBan.data.getWard(currentWardId);
  if (!w) return;
  var primaryPhone = AnBan.data.getPrimaryPhone();
  var t = document.getElementById('lostTime').value || '2026-06-25T14:00';
  var p = document.getElementById('lostPlace').value || '幸福小区南门';
  var html = '<div class="report-preview" id="reportEl">';
  html += '<h3>失踪人员紧急信息单</h3>';
  var reportPhotos = Array.isArray(w.photos) ? w.photos : [];
  html += '<div class="photo-box">';
  if (reportPhotos.length > 0) {
    reportPhotos.slice(0, 2).forEach(function(p) { html += '<img src="'+p+'" style="width:60px;height:60px;border-radius:8px;object-fit:cover">'; });
  } else {
    html += '<div class="ph">近照1</div><div class="ph">近照2</div>';
  }
  html += '</div>';
  html += '<b>'+w.name+'</b> '+w.gender+' '+w.age+'岁<br>';
  html += '身高'+(w.height ? (/\d/.test(w.height) && !/[a-z]/i.test(w.height) ? w.height+'cm' : w.height) : '?')+' 体重'+(w.weight ? (/\d/.test(w.weight) && !/[a-z]/i.test(w.weight) ? w.weight+'kg' : w.weight) : '?')+' 血型'+(w.bloodType||'?')+'型<br>';
  html += '特征：'+(w.features||'无')+'<br>';
  html += '走失时间：'+t.replace('T',' ')+'<br>';
  html += '走失地点：'+p+'<br>';
  if (w.chronicDiseases) html += '慢性病：'+w.chronicDiseases+'<br>';
  if (w.address) html += '家庭住址：'+w.address+'<br>';
  html += '联系电话：'+(primaryPhone?AnBan.crypto.mask(primaryPhone):'未设置')+'<br>';
  html += '</div>';
  document.getElementById('reportPreviewContent').innerHTML = html;
  AnBan.ui.showOverlay('overlayReportPreview');
}
function generateReport() {
  previewReport();
  var el = document.getElementById('reportEl');
  if (!el) return;
  if (typeof html2canvas === 'undefined') { AnBan.ui.toast('html2canvas未加载'); return; }
  html2canvas(el, {scale:2}).then(function(canvas) {
    var a = document.createElement('a'); a.download = '报警档案_'+currentWardId+'.png'; a.href = canvas.toDataURL(); a.click();
    AnBan.ui.hideOverlay('overlayReportPreview');
    AnBan.ui.toast('报警档案已保存');
  });
}
function generatePoster() {
  renderPosterPreview();
  var el = document.getElementById('posterEl');
  if (!el) return;

  var phones = AnBan.data.getAnswerPhones();

    html += '<div class="cfg" style="padding:12px 16px;margin-bottom:6px"><div class="cfg-row" style="padding:0;border:none">';
    html += '<div style="display:flex;align-items:center;gap:10px">';

    html += '</div></div>';

    html += '<div><div style="font-size:13px;font-weight:600">'+AnBan.crypto.mask(phones[i]);
    if (isDefault) html += ' <span class="tag tag-info">默认</span>';
    html += '</div>';
    html += '<div style="font-size:10px;color:var(--text-muted);margin-top:2px">额外号码</div></div>';
    html += '</div>';
    html += '<div style="display:flex;gap:6px">';

    html += '<button class="inline-btn del" onclick="removePhone('+(i)+')">删除</button>';
    html += '</div>';
    html += '</div></div>';
  }

function pickMapLocation(e) {
  var picker = document.getElementById('zoneMapPicker');
  var rect = picker.getBoundingClientRect();
  var x = (e.clientX - rect.left) / rect.width;
  var y = (e.clientY - rect.top) / rect.height;
  x = Math.max(0, Math.min(1, x));
  y = Math.max(0, Math.min(1, y));
  // Map pixel to Hangzhou area coordinates
  var lat = 30.32 - y * 0.08;
  var lng = 120.1 + x * 0.1;
  document.getElementById('zfLat').value = lat.toFixed(5);
  document.getElementById('zfLng').value = lng.toFixed(5);
  var pin = document.getElementById('zoneMapPin');
  pin.style.display = 'block';
  pin.style.left = (x * 100) + '%';
  pin.style.top = (y * 100) + '%';
  document.getElementById('zoneMapCoords').textContent = lat.toFixed(5) + ', ' + lng.toFixed(5);
}

// ═══ Photo Upload ═══
function handlePhotoUpload(e) {
  var files = e.target.files;
  if (!files || !files.length) return;
  var w = AnBan.data.getWard(currentWardId);
  if (!w) return;
  var photos = Array.isArray(w.photos) ? w.photos : [];
  var loaded = 0;
  Array.from(files).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var maxW = 300, scale = Math.min(1, maxW / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        photos.push(canvas.toDataURL('image/jpeg', 0.6));
        loaded++;
        if (loaded === files.length) {
          AnBan.data.updateWard(currentWardId, { photos: photos });
          renderAll();
          AnBan.ui.toast('已上传' + loaded + '张照片');
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
function deletePhoto(idx) {
  var w = AnBan.data.getWard(currentWardId);
  if (!w || !Array.isArray(w.photos)) return;
  var photos = w.photos.slice();
  photos.splice(idx, 1);
  AnBan.data.updateWard(currentWardId, { photos: photos });
  renderAll();
  AnBan.ui.toast('已删除');
}

// ═══ Toggle Mandatory Checkin (Config Page) ═══
function toggleMandatoryCheckin() {
  var w = AnBan.data.getWard(currentWardId);
  if (!w) return;
  var mc = !w.mandatoryCheckin;
  AnBan.data.updateWard(currentWardId, { mandatoryCheckin: mc });
  renderConfig();
  AnBan.ui.toast(mc ? '已开启每日必须打卡' : '已关闭每日必须打卡');
}

// ═══ System Background Check-in Check ═══
function backgroundCheckinCheck() {
  var allWards = AnBan.data.getWards();
  var now = new Date();
  var yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  var yesterdayStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth()+1).padStart(2,'0') + '-' + String(yesterday.getDate()).padStart(2,'0');
  var missed = [];
  allWards.forEach(function(w) {
    if (w.mandatoryCheckin) {
      var checkins = AnBan.data.getCheckins(w.id);
      var yesterdayCheckins = checkins.filter(function(r) { return r.date && r.date.indexOf(yesterdayStr) >= 0; });
      if (yesterdayCheckins.length === 0) missed.push(w);
    }
  });
  if (missed.length > 0) {
    var names = missed.map(function(w) { return w.name; }).join('、');
    var el = document.getElementById('sysNotify');
    var timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    el.innerHTML = '<div class="sn-head"><div class="sn-icon">!</div><div class="sn-app">安伴守护</div><div class="sn-time">'+timeStr+'</div></div>'
      + '<div class="sn-title">未打卡提醒</div>'
      + '<div class="sn-body">'+names+' 昨日未打卡，已自动发送位置短信通知。点击查看详情</div>';
    el.classList.add('show');
    AnBan.ui.toast('系统检测到'+names+'昨日未打卡，已通知监护人');
  }
}
function dismissSysNotify() {
  document.getElementById('sysNotify').classList.remove('show');
}

// ═══ Init ═══
renderDropdown();
renderAll();
// Background check-in check: runs as system service (initial 8s delay for demo, then every 5 min)
setTimeout(backgroundCheckinCheck, 8000);
setInterval(backgroundCheckinCheck, 300000);
</script>
