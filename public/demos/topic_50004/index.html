<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安伴守护 - 牵挂家人的每一刻</title>
<link rel="stylesheet" href="css/common.css">
<style>
  .login-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100%; padding: 40px 24px;
  }
  .logo-area { text-align: center; margin-bottom: 36px; }
  .logo-icon {
    width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--accent-blue), #1a6dff);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: #fff; box-shadow: 0 8px 24px rgba(47,129,247,.3);
  }
  .logo-title { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
  .logo-sub { font-size: 13px; color: var(--text-secondary); margin-top: 6px; letter-spacing: 2px; }
  .login-card {
    width: 100%; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px;
  }
  .login-card .form-group:last-of-type { margin-bottom: 0; }
  .login-btn {
    width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
    background: var(--accent-blue); color: #fff; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all .2s; margin-top: 20px;
  }
  .login-btn:active { transform: scale(.97); background: #2563eb; }
  .login-btn:disabled { opacity: .5; cursor: default; }
  .demo-tools { width: 100%; margin-bottom: 20px; }
  .demo-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .demo-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .demo-btns { display: flex; gap: 10px; }
  .demo-btn {
    flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg-card); color: var(--text-secondary); font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all .2s; text-align: center;
  }
  .demo-btn:active { transform: scale(.97); background: var(--bg-hover); color: var(--text-primary); }
  .demo-btn.danger { border-color: rgba(248,81,73,.2); color: var(--accent-red); }
  .footer-text { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-screen">
    <div class="login-wrap">
      <div class="logo-area anim-fadeUp">
        <div class="logo-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="logo-title">安伴守护</div>
        <div class="logo-sub">牵挂家人的每一刻</div>
      </div>

      <div class="login-card anim-fadeUp anim-d1">
        <div class="form-group">
          <div class="form-label">手机号</div>
          <input type="tel" class="form-input" id="phoneInput" placeholder="请输入手机号" maxlength="11">
        </div>
        <div class="form-group">
          <div class="form-label">验证码</div>
          <div class="form-row">
            <input type="text" class="form-input" id="codeInput" placeholder="请输入验证码" maxlength="6">
            <button class="form-code-btn" id="getCodeBtn" onclick="getCode()">获取验证码</button>
          </div>
        </div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
      </div>

      <div class="demo-tools anim-fadeUp anim-d2">
        <div class="demo-title">Demo 工具</div>
        <div class="demo-btns">
          <button class="demo-btn" onclick="fillMockData()">一键填充模拟数据</button>
          <button class="demo-btn danger" onclick="clearAllData()">清空所有数据</button>
        </div>
      </div>

      <div class="footer-text anim-fadeUp anim-d3">安全 · 私密 · 本地加密存储</div>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
AnBan.init();

var codeTimer = null;
function getCode() {
  var phone = document.getElementById('phoneInput').value.trim();
  if (phone.length < 11) { AnBan.ui.toast('请输入11位手机号'); return; }
  var btn = document.getElementById('getCodeBtn');
  btn.disabled = true;
  var sec = 60;
  btn.textContent = sec + 's';
  document.getElementById('codeInput').value = '886622';
  codeTimer = setInterval(function() {
    sec--;
    btn.textContent = sec + 's';
    if (sec <= 0) { clearInterval(codeTimer); btn.disabled = false; btn.textContent = '获取验证码'; }
  }, 1000);
  AnBan.ui.toast('验证码已发送（Demo自动填充）');
}

function doLogin() {
  var phone = document.getElementById('phoneInput').value.trim();
  var code = document.getElementById('codeInput').value.trim();
  if (phone.length < 11) { AnBan.ui.toast('请输入11位手机号'); return; }
  if (!code) { AnBan.ui.toast('请输入验证码'); return; }

  var account = AnBan.auth.login(phone);
  AnBan.ui.toast('登录成功');
  setTimeout(function() {
    window.location.href = account.type === 'guardian' ? 'guardian.html' : 'ward.html';
  }, 600);
}

function fillMockData() {
  document.getElementById('phoneInput').value = '13812345678';
  document.getElementById('codeInput').value = '886622';
  AnBan.ui.toast('模拟数据已填充，点击登录即可');
}

function clearAllData() {
  AnBan.ui.confirm('确定清空所有演示数据？这将恢复出厂状态。', function() {
    AnBan.storage.clearAll();
    AnBan.ui.toast('数据已清空，即将刷新');
    setTimeout(function() { location.reload(); }, 800);
  });
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
