function initScratchCanvas() {
  scratchCanvas = document.getElementById('scratch-canvas');
  scratchCtx = scratchCanvas.getContext('2d');
  resetScratchCanvas();
}

function resetScratchCanvas() {
  if (!scratchCtx) return;
  const w = scratchCanvas.width, h = scratchCanvas.height;
  scratchCtx.globalCompositeOperation = 'source-over';
  scratchCtx.fillStyle = '#B0B0B0';
  scratchCtx.fillRect(0, 0, w, h);
  scratchCtx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 40; i++) {
    scratchCtx.beginPath();
    scratchCtx.arc(Math.random()*w, Math.random()*h, Math.random()*25+5, 0, Math.PI*2);
    scratchCtx.fill();
  }
  scratchCtx.fillStyle = '#888';
  scratchCtx.font = 'bold 56px Nunito, "Noto Sans SC", "ZCOOL KuaiLe", sans-serif';
  scratchCtx.textAlign = 'center';
  scratchCtx.textBaseline = 'middle';
  scratchCtx.fillText(t('scratchText'), w/2, h/2);
  scratchCtx.strokeStyle = '#999';
  scratchCtx.lineWidth = 3;
  scratchCtx.lineCap = 'round';
  const ax = w/2, ay = h/2 + 46;
  scratchCtx.beginPath();
  scratchCtx.moveTo(ax, ay - 10);
  scratchCtx.lineTo(ax, ay + 10);
  scratchCtx.moveTo(ax - 8, ay + 2);
  scratchCtx.lineTo(ax, ay + 12);
  scratchCtx.lineTo(ax + 8, ay + 2);
  scratchCtx.stroke();
  scratchCtx.globalCompositeOperation = 'destination-out';
  state.scratchCleared = false;
}

function startScratch() {
  if (state.scratchStarted && !state.scratchCleared) return;
  const scratchPrizes = state.prizes.filter(p => p.locs.includes('scratch') && p.weight > 0);
  if (scratchPrizes.length === 0) { toast(t('noScratchPrizes'), 'error'); return; }
  if (getPoints() < state.scratchCost) { toast(t('notEnoughPoints'), 'error'); return; }

  changePoints(-state.scratchCost, t('reasonScratch'), 'sub');

  const totalW = scratchPrizes.reduce((s, p) => s + p.weight, 0);
  let rand = Math.random() * totalW;
  let winner = scratchPrizes[0];
  let cumW = 0;
  for (const p of scratchPrizes) {
    cumW += p.weight;
    if (rand <= cumW) { winner = p; break; }
  }

  document.getElementById('scratch-prize').innerHTML = `
    <div class="scratch-prize-icon">${faIcon(winner.icon)}</div>
    <div class="scratch-prize-name">${esc(winner.name)}</div>`;
  resetScratchCanvas();
  state.scratchStarted = true;
  state.scratchCleared = false;
  state.currentScratchPrize = winner;
  const btn = document.getElementById('scratch-start-btn');
  btn.style.display = 'none';
  btn.disabled = true;
  document.getElementById('scratch-hint').textContent = t('scratchHint');
  const canvas = document.getElementById('scratch-canvas');
  canvas.classList.remove('fading');
  canvas.style.opacity = '1';
  renderAll();
}

function setupScratchEvents() {
  const canvas = document.getElementById('scratch-canvas');
  let drawing = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const touch = e.touches ? e.touches[0] : e;
    return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
  }

  function scratch(e) {
    if (!drawing || !state.scratchStarted || state.scratchCleared) return;
    e.preventDefault();
    const pos = getPos(e);
    scratchCtx.beginPath();
    scratchCtx.arc(pos.x, pos.y, 32, 0, Math.PI*2);
    scratchCtx.fill();
    checkScratchReveal();
  }

  function startDraw(e) {
    if (!state.scratchStarted || state.scratchCleared) return;
    drawing = true;
    scratch(e);
  }
  function endDraw() { drawing = false; }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', scratch);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', scratch, { passive: false });
  canvas.addEventListener('touchend', endDraw);
}

function checkScratchReveal() {
  if (state.scratchCleared) return;
  const canvas = document.getElementById('scratch-canvas');
  const img = scratchCtx.getImageData(0,0,canvas.width,canvas.height);
  let transparent = 0;
  const step = 4 * 20;
  let total = 0;
  for (let i = 3; i < img.data.length; i += step) {
    total++;
    if (img.data[i] === 0) transparent++;
  }
  const pct = transparent / total;
  if (pct >= 0.6) {
    state.scratchCleared = true;
    canvas.classList.add('fading');
    setTimeout(() => {
      scratchCtx.clearRect(0,0,canvas.width,canvas.height);
      const prize = state.currentScratchPrize;
      const isEmpty = prize.name === t('emptyPrize') || (prize.price === 0 && !prize.locs.includes('redeem'));
      if (!isEmpty) {
        state.rewards.push({
          id: uid(), prizeId: prize.id, name: prize.name, icon: prize.icon,
          source: 'lottery', status: 'pending', time: Date.now(),
          userId: state.multiUser ? state.currentUserId : null,
        });
      }
      document.getElementById('result-icon').innerHTML = isEmpty ? faIcon('fa-face-smile') : faIcon(prize.icon);
      document.getElementById('result-name').textContent = isEmpty ? t('thanks') : prize.name;
      document.getElementById('result-desc').textContent = isEmpty ? '' : (t('won') + ' ' + prize.name + '！');
      document.getElementById('result-modal').classList.remove('hidden');
      if (!isEmpty) launchConfetti();
      const btn = document.getElementById('scratch-start-btn');
      btn.style.display = '';
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-hand-pointer"></i> ' + t('startScratch') + ' (' + state.scratchCost + t('points') + ')';
      document.getElementById('scratch-hint').textContent = t('scratchHint2');
      state.scratchStarted = false;
      save();
      renderAll();
    }, 500);
  }
}

function renderRedeem() {
  const el = document.getElementById('redeem-list');
  if (!el) return;
  const redeemPrizes = state.prizes.filter(p => p.locs.includes('redeem') && p.price > 0);
  if (redeemPrizes.length === 0) {
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-gift"></i><p>${t('noRedeemPrizes')}</p></div>`;
    return;
  }
  const pts = getPoints();
  el.innerHTML = redeemPrizes.map(p => {
    const canAfford = pts >= p.price;
    const diff = p.price - pts;
    return `
    <div class="redeem-card">
      <div class="redeem-icon">${faIcon(p.icon)}</div>
      <div class="redeem-info">
        <div class="redeem-name">${esc(p.name)}</div>
        <div class="redeem-price ${canAfford ? '' : 'not-enough'}"><i class="fa-solid fa-star"></i> ${p.price}${t('points')}</div>
      </div>
      <button class="btn ${canAfford ? 'btn-mint' : 'btn-outline'}" onclick="redeemPrize('${p.id}')" ${canAfford ? '' : 'disabled'}>
        ${canAfford ? '<i class="fa-solid fa-check"></i> ' + t('redeem') : '<i class="fa-solid fa-lock"></i> ' + t('needPoints').replace('{n}', diff)}
      </button>
    </div>`;
  }).join('');
}

function redeemPrize(id) {
  const p = state.prizes.find(p => p.id === id);
  if (!p) return;
  if (getPoints() < p.price) { toast(t('notEnoughPoints'), 'error'); return; }
  changePoints(-p.price, t('reasonRedeem'), 'sub');
  state.rewards.push({
    id: uid(), prizeId: p.id, name: p.name, icon: p.icon,
    source: 'redeem', status: 'pending', time: Date.now(),
    userId: state.multiUser ? state.currentUserId : null,
  });
  save();
  document.getElementById('result-icon').innerHTML = faIcon(p.icon);
  document.getElementById('result-name').textContent = p.name;
  document.getElementById('result-desc').textContent = t('redeemed') + '！';
  document.getElementById('result-modal').classList.remove('hidden');
  launchConfetti();
  renderAll();
}

function switchRewardTab(tab) {
  state.rewardTab = tab;
  document.querySelectorAll('[data-rtab]').forEach(b => b.classList.toggle('active', b.dataset.rtab === tab));
  renderMyRewards(tab);
}

function renderMyRewards(tab) {
  const el = document.getElementById('my-rewards-list');
  if (!el) return;
  const rewards = getVisibleRewards().filter(r => r.status === (tab === 'pending' ? 'pending' : 'done'))
    .sort((a,b) => b.time - a.time);
  if (rewards.length === 0) {
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-medal"></i><p>${t('noRewards')}</p></div>`;
    return;
  }
  el.innerHTML = rewards.map(r => `
    <div class="reward-card ${r.status === 'done' ? 'done' : ''}">
      <div class="reward-icon">${faIcon(r.icon)}</div>
      <div class="reward-info">
        <div class="reward-name">${esc(r.name)}</div>
        <div class="reward-meta">${r.source === 'lottery' ? t('wheelLottery') + '/' + t('scratch') : t('pointsRedeem')} · ${formatTime(r.time)}</div>
      </div>
      <span class="reward-status ${r.status}">${r.status === 'pending' ? t('pending') : t('fulfilled')}</span>
    </div>
  `).join('');
}

function renderChildHistory() {
  const el = document.getElementById('child-records');
  if (!el) return;
  const records = getVisibleRecords();
  if (records.length === 0) {
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-chart-column"></i><p>${t('noRecords')}</p></div>`;
    return;
  }
  el.innerHTML = records.slice(0, 50).map(r => recordItemHTML(r, false)).join('');
}

function renderParentHistory() {
  const el = document.getElementById('parent-records');
  if (!el) return;
  const records = state.records;
  if (records.length === 0) {
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-chart-column"></i><p>${t('noRecords')}</p></div>`;
    return;
  }
  el.innerHTML = records.slice(0, 100).map(r => recordItemHTML(r, true)).join('');
}

function recordItemHTML(r, showOp) {
  const iconMap = {
    add: { cls: 'add', icon: 'fa-plus' },
    sub: { cls: 'sub', icon: 'fa-minus' },
  };
  const info = iconMap[r.type] || iconMap.add;
  let opInfo = '';
  if (showOp && r.operator) {
    opInfo = `<span class="record-operator">· ${t('operator')}: ${esc(r.operator)}</span>`;
  }
  if (r.userName && state.multiUser) {
    opInfo = `<span class="record-operator">· ${esc(r.userName)}</span>`;
  }
  const isNew = r.id === state.newestRecordId;
  return `
    <div class="record-item ${isNew ? 'new-record' : ''}">
      <div class="record-icon ${info.cls}"><i class="fa-solid ${info.icon}"></i></div>
      <div class="record-info">
        <div class="record-reason">${esc(r.reason)}</div>
        <div class="record-time">${formatTime(r.time)}${opInfo}</div>
      </div>
      <div class="record-points ${info.cls}">${r.type === 'add' ? '+' : '-'}${r.points}</div>
    </div>`;
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) {
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function selectQuickAdd(btn, pts) {
  document.querySelectorAll('.quick-add-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.selectedQuickAdd = pts;
  document.getElementById('custom-add-box').style.display = 'none';
}

function toggleCustomAdd(btn) {
  document.querySelectorAll('.quick-add-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('custom-add-box').style.display = 'flex';
  state.selectedQuickAdd = 'custom';
  document.getElementById('custom-points').focus();
}

function addPoints() {
  let pts;
  if (state.selectedQuickAdd === 'custom') {
    pts = parseInt(document.getElementById('custom-points').value);
  } else {
    pts = state.selectedQuickAdd;
  }
  if (!pts || pts < 1) { toast(t('enterPoints'), 'error'); return; }
  const reason = document.getElementById('add-reason').value.trim() || t('reasonManual');
  changePoints(pts, reason, 'add');
  document.getElementById('add-reason').value = '';
  document.getElementById('custom-points').value = '';
  document.querySelectorAll('.quick-add-btn').forEach(b => b.classList.remove('selected'));
  state.selectedQuickAdd = null;
  document.getElementById('custom-add-box').style.display = 'none';
  toast('+' + pts + t('points'), 'success');
}

function openTaskModal(id) {
  state.editingTaskId = id || null;
  const modal = document.getElementById('task-modal');
  if (id) {
    const tk = state.tasks.find(t => t.id === id);
    document.getElementById('task-modal-title').innerHTML = '<i class="fa-solid fa-list-check" style="color:var(--soft-teal);margin-right:6px"></i>' + t('edit') + ' - ' + esc(tk.name);
    document.getElementById('task-name').value = tk.name;
    document.getElementById('task-reward').value = tk.reward;
    state.selectedTaskIcon = tk.icon;
    document.getElementById('task-daily-toggle').checked = !!tk.daily;
  } else {
    document.getElementById('task-modal-title').innerHTML = '<i class="fa-solid fa-list-check" style="color:var(--soft-teal);margin-right:6px"></i>' + t('createTask');
    document.getElementById('task-name').value = '';
    document.getElementById('task-reward').value = 10;
    state.selectedTaskIcon = 'fa-bed';
    document.getElementById('task-daily-toggle').checked = false;
  }
  renderIconPicker('task-icon-picker', TASK_ICONS, state.selectedTaskIcon, 'selectTaskIcon');
  modal.classList.remove('hidden');
}

function openPrizeModal(id) {
  state.editingPrizeId = id || null;
  const modal = document.getElementById('prize-modal');
  if (id) {
    const p = state.prizes.find(p => p.id === id);
    document.getElementById('prize-modal-title').innerHTML = '<i class="fa-solid fa-gift" style="color:var(--coral);margin-right:6px"></i>' + t('edit') + ' - ' + esc(p.name);
    document.getElementById('prize-name').value = p.name;
    document.getElementById('prize-weight').value = p.weight;
    document.getElementById('prize-price').value = p.price || '';
    state.selectedPrizeIcon = p.icon;
    state.selectedPrizeLocs = { wheel: p.locs.includes('wheel'), scratch: p.locs.includes('scratch'), redeem: p.locs.includes('redeem') };
  } else {
    document.getElementById('prize-modal-title').innerHTML = '<i class="fa-solid fa-gift" style="color:var(--coral);margin-right:6px"></i>' + t('createPrize');
    document.getElementById('prize-name').value = '';
    document.getElementById('prize-weight').value = 10;
    document.getElementById('prize-price').value = '';
    state.selectedPrizeIcon = 'fa-gift';
    state.selectedPrizeLocs = { wheel: true, scratch: true, redeem: true };
  }
  renderIconPicker('prize-icon-picker', PRIZE_ICONS, state.selectedPrizeIcon, 'selectPrizeIcon');
  document.querySelectorAll('#prize-locs .checkbox-chip').forEach(chip => {
    chip.classList.toggle('checked', state.selectedPrizeLocs[chip.dataset.loc]);
  });
  modal.classList.remove('hidden');
}

function renderIconPicker(containerId, icons, selected, fnName) {
  const el = document.getElementById(containerId);
  el.innerHTML = icons.map(ic =>
    `<div class="icon-pick ${ic === selected ? 'selected' : ''}" onclick="${fnName}(this,'${ic}')"><i class="fa-solid ${ic}"></i></div>`
  ).join('');
}

function selectTaskIcon(el, icon) {
  state.selectedTaskIcon = icon;
  document.querySelectorAll('#task-icon-picker .icon-pick').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
}

function selectPrizeIcon(el, icon) {
  state.selectedPrizeIcon = icon;
  document.querySelectorAll('#prize-icon-picker .icon-pick').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleChip(el) {
  el.classList.toggle('checked');
  state.selectedPrizeLocs[el.dataset.loc] = el.classList.contains('checked');
}

function saveTask() {
  const name = document.getElementById('task-name').value.trim();
  const reward = parseInt(document.getElementById('task-reward').value);
  const daily = document.getElementById('task-daily-toggle').checked;
  if (!name) { toast(t('emptyName'), 'error'); return; }
  if (!reward || reward < 1) { toast(t('taskReward'), 'error'); return; }
  if (state.editingTaskId) {
    const tk = state.tasks.find(t => t.id === state.editingTaskId);
    tk.name = name; tk.reward = reward; tk.icon = state.selectedTaskIcon; tk.daily = daily;
  } else {
    state.tasks.push({ id: uid(), name, reward, icon: state.selectedTaskIcon, daily });
  }
  save(); closeModal('task-modal'); renderAll(); toast(t('saved'), 'success');
}

function savePrize() {
  const name = document.getElementById('prize-name').value.trim();
  const weight = parseInt(document.getElementById('prize-weight').value);
  const priceVal = document.getElementById('prize-price').value;
  const price = priceVal === '' ? 0 : parseInt(priceVal);
  if (!name) { toast(t('emptyName'), 'error'); return; }
  if (!weight || weight < 1) { toast(t('prizeWeight'), 'error'); return; }
  const locs = Object.keys(state.selectedPrizeLocs).filter(k => state.selectedPrizeLocs[k]);
  if (locs.length === 0) { toast(t('appearIn'), 'error'); return; }
  if (state.editingPrizeId) {
    const p = state.prizes.find(p => p.id === state.editingPrizeId);
    p.name = name; p.weight = weight; p.price = price; p.icon = state.selectedPrizeIcon; p.locs = locs;
  } else {
    state.prizes.push({ id: uid(), name, weight, price, icon: state.selectedPrizeIcon, locs });
  }
  save(); closeModal('prize-modal'); renderAll(); toast(t('saved'), 'success');
}

function deleteTask(id) {
  if (!confirm(t('deleteConfirm'))) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  state.requests = state.requests.filter(r => r.taskId !== id);
  save(); renderAll(); toast(t('saved'), 'success');
}

function deletePrize(id) {
  if (!confirm(t('deleteConfirm'))) return;
  state.prizes = state.prizes.filter(p => p.id !== id);
  save(); renderAll(); toast(t('saved'), 'success');
}

function renderParentTasks() {
  const el = document.getElementById('parent-tasks-list');
  if (!el) return;
  if (state.tasks.length === 0) {
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-list-check"></i><p>${t('noTasks')}</p></div>`;
    return;
  }
  el.innerHTML = state.tasks.map(tk => `
    <div class="manage-item">
      <div class="manage-item-icon"><i class="fa-solid ${tk.icon}"></i></div>
      <div class="manage-item-info">
        <div class="manage-item-name">${esc(tk.name)}${tk.daily ? ' <span style="font-size:11px;color:var(--soft-teal);font-weight:600">↻</span>' : ''}</div>
        <div class="manage-item-meta"><i class="fa-solid fa-star" style="color:var(--duck-yellow)"></i> +${tk.reward}${t('points')}${tk.daily ? ' · ' + t('dailyTask') : ''}</div>
      </div>
      <div class="manage-item-actions">
        <button class="icon-btn" onclick="openTaskModal('${tk.id}')"><i class="fa-solid fa-pencil"></i></button>
        <button class="icon-btn danger" onclick="deleteTask('${tk.id}')"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>
  `).join('');
}

function renderParentPrizes() {
  const el = document.getElementById('parent-prizes-list');
  if (!el) return;
  if (state.prizes.length === 0) {
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-gift"></i><p>${t('noWheelPrizes')}</p></div>`;
    return;
  }
  const totalW = state.prizes.reduce((s,p) => s + p.weight, 0);
  el.innerHTML = state.prizes.map(p => {
    const pct = ((p.weight / totalW) * 100).toFixed(1);
    const locLabels = [];
    if (p.locs.includes('wheel')) locLabels.push('<i class="fa-solid fa-trophy" style="font-size:10px"></i>');
    if (p.locs.includes('scratch')) locLabels.push('<i class="fa-solid fa-ticket" style="font-size:10px"></i>');
    if (p.locs.includes('redeem')) locLabels.push('<i class="fa-solid fa-gift" style="font-size:10px"></i>');
    return `
    <div class="manage-item">
      <div class="manage-item-icon" style="font-size:22px">${faIcon(p.icon)}</div>
      <div class="manage-item-info">
        <div class="manage-item-name">${esc(p.name)}</div>
        <div class="manage-item-meta">${t('prizeWeight')}: ${p.weight} (${pct}%) · ${p.price > 0 ? p.price + t('points') : t('notRedeemable')} · ${locLabels.join(' ')}</div>
      </div>
      <div class="manage-item-actions">
        <button class="icon-btn" onclick="openPrizeModal('${p.id}')"><i class="fa-solid fa-pencil"></i></button>
        <button class="icon-btn danger" onclick="deletePrize('${p.id}')"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function renderParentRequests() {
  const el = document.getElementById('parent-requests-list');
  if (!el) return;
  const pending = state.requests.filter(r => r.status === 'pending');
  if (pending.length === 0) {
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-clipboard-check"></i><p>${t('noRequests')}</p></div>`;
    return;
  }
  el.innerHTML = pending.map(r => `
    <div class="manage-item">
      <div class="manage-item-icon"><i class="fa-solid ${r.icon}"></i></div>
      <div class="manage-item-info">
        <div class="manage-item-name">${esc(r.taskName)}</div>
        <div class="manage-item-meta">${r.userName ? esc(r.userName) + ' · ' : ''}<i class="fa-solid fa-star" style="color:var(--duck-yellow)"></i> +${r.reward}${t('points')} · ${formatTime(r.time)}</div>
      </div>
      <div class="manage-item-actions">
        <button class="icon-btn success" onclick="approveRequest('${r.id}')"><i class="fa-solid fa-check"></i></button>
        <button class="icon-btn danger" onclick="rejectRequest('${r.id}')"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>
  `).join('');
}

function approveRequest(id) {
  const r = state.requests.find(r => r.id === id);
  if (!r) return;
  r.status = 'approved';
  if (state.multiUser && r.userId) {
    const u = state.users.find(u => u.id === r.userId);
    if (u) u.points += r.reward;
  } else {
    state._singlePoints = (state._singlePoints || 0) + r.reward;
  }
  addRecord(t('reasonTask') + ': ' + r.taskName, r.reward, 'add');
  state._pendingPointsAnim = true;
  state._pendingPointsDelta = r.reward;
  save(); renderAll(); toast(t('approved') + ' +' + r.reward, 'success');
}

function rejectRequest(id) {
  const r = state.requests.find(r => r.id === id);
  if (!r) return;
  r.status = 'rejected';
  save(); renderAll(); toast(t('rejected'), 'error');
}

function switchFulfillTab(tab) {
  state.fulfillTab = tab;
  document.querySelectorAll('[data-ftab]').forEach(b => b.classList.toggle('active', b.dataset.ftab === tab));
  renderParentFulfill();
}

function renderParentFulfill() {
  const el = document.getElementById('parent-fulfill-list');
  if (!el) return;
  if (state.fulfillTab === 'pending') {
    const pending = getVisibleRewards().filter(r => r.status === 'pending').sort((a,b) => b.time - a.time);
    if (pending.length === 0) {
      el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-box-open"></i><p>${t('noFulfill')}</p></div>`;
      return;
    }
    el.innerHTML = pending.map(r => `
      <div class="manage-item">
        <div class="manage-item-icon" style="font-size:22px">${faIcon(r.icon)}</div>
        <div class="manage-item-info">
          <div class="manage-item-name">${esc(r.name)}</div>
          <div class="manage-item-meta">${r.source === 'lottery' ? t('wheelLottery') : t('pointsRedeem')} · ${formatTime(r.time)}</div>
        </div>
        <button class="btn btn-mint btn-sm" onclick="fulfillReward('${r.id}')"><i class="fa-solid fa-check"></i> ${t('markFulfilled')}</button>
      </div>
    `).join('');
  } else {
    const history = getVisibleRewards().filter(r => r.status === 'done').sort((a,b) => (b.fulfilledAt || b.time) - (a.fulfilledAt || a.time));
    if (history.length === 0) {
      el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-clock-rotate-left"></i><p>${t('noFulfillHistory')}</p></div>`;
      return;
    }
    el.innerHTML = history.map(r => `
      <div class="manage-item" style="opacity:0.75">
        <div class="manage-item-icon" style="font-size:22px">${faIcon(r.icon)}</div>
        <div class="manage-item-info">
          <div class="manage-item-name">${esc(r.name)}</div>
          <div class="manage-item-meta">${r.source === 'lottery' ? t('wheelLottery') : t('pointsRedeem')} · ${t('fulfilled')} ${r.fulfilledAt ? formatTime(r.fulfilledAt) : ''}</div>
        </div>
        <span class="reward-status done">${t('fulfilled')}</span>
      </div>
    `).join('');
  }
}

function fulfillReward(id) {
  const r = state.rewards.find(r => r.id === id);
  if (!r) return;
  r.status = 'done';
  r.fulfilledAt = Date.now();
  save(); renderAll(); toast(t('saved'), 'success');
}

function openSettings() {
  document.getElementById('setting-wheel-cost').value = state.wheelCost;
  document.getElementById('setting-scratch-cost').value = state.scratchCost;
  document.getElementById('setting-new-pwd').value = '';
  document.getElementById('multi-user-toggle').checked = state.multiUser;
  document.getElementById('multi-user-section').style.display = state.multiUser ? 'block' : 'none';
  renderUsersList();
  document.getElementById('settings-modal').classList.remove('hidden');
}

function saveSettings() {
  state.wheelCost = parseInt(document.getElementById('setting-wheel-cost').value) || 10;
  state.scratchCost = parseInt(document.getElementById('setting-scratch-cost').value) || 10;
  state.multiUser = document.getElementById('multi-user-toggle').checked;
  if (state.multiUser && state.users.length === 0) {
    state.multiUser = false;
    toast(t('childUsers'), 'error');
    return;
  }
  const newPwd = document.getElementById('setting-new-pwd').value;
  if (newPwd) {
    if (newPwd.length === 6 && /^\d{6}$/.test(newPwd)) {
      state.password = newPwd;
    } else {
      toast(t('parentPwdLenError'), 'error');
      return;
    }
  }
  save(); closeModal('settings-modal'); renderAll(); toast(t('saved'), 'success');
}

function resetData() {
  if (!confirm(t('resetData') + '?')) return;
  localStorage.removeItem('duckpicks');
  state.password = '';
  state.multiUser = false;
  state.users = [];
  state.currentUserId = null;
  state._singlePoints = 100;
  state.spinCost = 10;
  state.tasks = [];
  state.prizes = [];
  state.requests = [];
  state.rewards = [];
  state.records = [];
  seedData();
  closeModal('settings-modal');
  state.mode = 'child';
  currentMode = 'child';
  document.getElementById('mode-child').classList.add('active');
  document.getElementById('mode-parent').classList.remove('active');
  document.getElementById('multi-user-toggle').checked = false;
  document.getElementById('multi-user-section').style.display = 'none';
  navigate('child-home');
  toast(t('dataReset'), 'success');
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

function init() {
  try {
    load();
    if (!state.password && state.tasks.length === 0 && state.prizes.length === 0) {
      seedData();
    }
    if (typeof state._singlePoints !== 'number' && !state.multiUser) {
      state._singlePoints = 100;
    }
    applyI18n();
    initScratchCanvas();
    setupScratchEvents();
    renderAll();
    navigate('child-home');
  } catch (e) {
    console.warn('Init error:', e);
  }
}

init();
</script>
</body>
</html>
