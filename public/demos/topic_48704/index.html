                                    <tbody>
                                        ${mockData.unitPrices.map(u => `
                                            <tr class="table-row border-b border-gray-100">
                                                <td class="py-4">
                                                    <span class="px-2 py-1 rounded text-xs ${
                                                        u.category === '材料' ? 'bg-blue-100 text-blue-700' :
                                                        u.category === '设备' ? 'bg-purple-100 text-purple-700' :
                                                        u.category === '人工' ? 'bg-green-100 text-green-700' :
                                                        'bg-orange-100 text-orange-700'
                                                    }">${u.category}</span>
                                                </td>
                                                <td class="py-4 text-sm font-medium text-gray-800">${u.name}</td>
                                                <td class="py-4 text-sm text-gray-600">${u.unit}</td>
                                                <td class="py-4 text-sm font-medium text-accent">¥${u.price}</td>
                                                <td class="py-4 text-sm text-gray-600">${formatDate(u.effectiveDate)}</td>
                                                <td class="py-4 text-sm text-gray-600">${u.supplier}</td>
                                                <td class="py-4">
                                                    <button class="text-accent text-sm hover:underline mr-2">编辑</button>
                                                    <button class="text-gray-500 text-sm hover:underline">历史</button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                        <!-- 价格趋势图 -->
                        <div class="glass-card rounded-xl p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-4">价格趋势</h3>
                            <div class="h-[200px] relative">
                                <canvas id="priceChart"></canvas>
                            </div>
                            <div class="mt-4 space-y-2">
                                ${mockData.unitPrices.slice(0, 3).map(u => `
                                    <div class="flex items-center justify-between text-sm">
                                        <span class="text-gray-600">${u.name}</span>
                                        <span class="font-medium text-accent">¥${u.price}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `);
        }

        // ============ 事件处理 ============
        function handleLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('loginPhone').value;
            const user = mockData.users.find(u => u.phone === phone);
            if (user) {
                state.currentUser = user;
                state.currentPage = 'dashboard';
                showToast('登录成功！');
                render();
            } else {
                showToast('登录失败，请检查手机号和密码', 'error');
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            showToast('注册成功，请等待管理员审核');
            state.currentPage = 'login';
            render();
        }

        function handleLogout() {
            state.currentUser = null;
            state.currentPage = 'login';
            showToast('已退出登录');
            render();
        }

        function handleWechatLogin() {
            showToast('微信扫码登录功能开发中');
        }

        function handleSSOLogin() {
            showToast('SSO单点登录功能开发中');
        }

        function handleApprove(id) {
            const approval = mockData.approvals.find(a => a.id === id);
            if (approval) {
                approval.status = '已通过';
                showToast('审批已通过');
                render();
            }
        }

        function handleReject(id) {
            const approval = mockData.approvals.find(a => a.id === id);
            if (approval) {
                approval.status = '已驳回';
                showToast('审批已驳回');
                render();
            }
        }

        function handleProjectSubmit(e) {
            e.preventDefault();
            showToast('立项申请已提交，请等待审批');
            state.currentPage = 'projects';
            render();
        }

        // ============ 导航和模态框 ============
        function navigateTo(page) {
            state.currentPage = page;
            state.selectedProject = null;
            render();
        }

        function viewProject(id) {
            state.selectedProject = id;
            state.currentPage = 'projectDetail';
            render();
        }

        function toggleSidebar() {
            state.sidebarCollapsed = !state.sidebarCollapsed;
            render();
        }

        function setActiveTab(index) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.className = `px-6 py-2 rounded-md text-sm font-medium transition-colors ${i === index ? 'bg-white text-accent shadow-sm' : 'text-gray-600 hover:text-gray-800'}`;
            });
            document.querySelectorAll('.tab-content').forEach((content, i) => {
                content.classList.toggle('hidden', i !== index);
            });
            // 初始化图表
            if (index === 2) {
                setTimeout(initCostChart, 100);
            }
        }

        function showModal(type) {
            state.showModal = type;
            render();
        }

        function closeModal() {
            state.showModal = null;
            render();
        }

        // ============ 图表初始化 ============
        function initCharts() {
            // 工作台进度图表
            const progressCtx = document.getElementById('progressChart');
            if (progressCtx) {
                new Chart(progressCtx, {
                    type: 'bar',
                    data: {
                        labels: mockData.reports.progress.map(p => p.month),
                        datasets: [
                            {
                                label: '计划进度',
                                data: mockData.reports.progress.map(p => p.planned),
                                backgroundColor: 'rgba(49, 130, 206, 0.3)',
                                borderColor: '#3182ce',
                                borderWidth: 1
                            },
                            {
                                label: '实际进度',
                                data: mockData.reports.progress.map(p => p.actual),
                                backgroundColor: 'rgba(56, 161, 105, 0.3)',
                                borderColor: '#38a169',
                                borderWidth: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' }
                        },
                        scales: {
                            y: { beginAtZero: true, max: 100 }
                        }
                    }
                });
            }

            // 报表页面图表
            initReportCharts();
        }

        function initReportCharts() {
            const reportProgressCtx = document.getElementById('reportProgressChart');
            if (reportProgressCtx) {
                new Chart(reportProgressCtx, {
                    type: 'line',
                    data: {
                        labels: mockData.reports.progress.map(p => p.month),
                        datasets: [
                            {
                                label: '计划进度',
                                data: mockData.reports.progress.map(p => p.planned),
                                borderColor: '#3182ce',
                                tension: 0.3,
                                fill: false
                            },
                            {
                                label: '实际进度',
                                data: mockData.reports.progress.map(p => p.actual),
                                borderColor: '#38a169',
                                tension: 0.3,
                                fill: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } }
                    }
                });
            }

            const reportCostCtx = document.getElementById('reportCostChart');
            if (reportCostCtx) {
                new Chart(reportCostCtx, {
                    type: 'bar',
                    data: {
                        labels: mockData.reports.cost.map(c => c.month),
                        datasets: [
                            {
                                label: '预算金额',
                                data: mockData.reports.cost.map(c => c.budget / 10000),
                                backgroundColor: 'rgba(49, 130, 206, 0.5)'
                            },
                            {
                                label: '实际支出',
                                data: mockData.reports.cost.map(c => c.actual / 10000),
                                backgroundColor: 'rgba(237, 137, 54, 0.5)'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
        }

        function initCostChart() {
            const costCtx = document.getElementById('costChart');
            if (costCtx && !costCtx.chart) {
                costCtx.chart = new Chart(costCtx, {
                    type: 'line',
                    data: {
                        labels: mockData.reports.cost.map(c => c.month),
                        datasets: [
                            {
                                label: '预算',
                                data: mockData.reports.cost.map(c => c.budget),
                                borderColor: '#3182ce',
                                backgroundColor: 'rgba(49, 130, 206, 0.1)',
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: '实际',
                                data: mockData.reports.cost.map(c => c.actual),
                                borderColor: '#38a169',
                                backgroundColor: 'rgba(56, 161, 105, 0.1)',
                                fill: true,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: value => (value / 10000) + '万'
                                }
                            }
                        }
                    }
                });
            }
        }

        function initPriceChart() {
            const priceCtx = document.getElementById('priceChart');
            if (priceCtx) {
                new Chart(priceCtx, {
                    type: 'line',
                    data: {
                        labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                        datasets: [{
                            label: '综合价格指数',
                            data: [100, 102, 98, 105, 103, 108],
                            borderColor: '#3182ce',
                            backgroundColor: 'rgba(49, 130, 206, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    }
                });
            }
        }

        // ============ 渲染引擎 ============
        function render() {
            const app = document.getElementById('app');
            let content = '';

            switch (state.currentPage) {
                case 'login':
                    content = renderLogin();
                    break;
                case 'register':
                    content = renderRegister();
                    break;
                case 'dashboard':
                    content = renderDashboard();
                    setTimeout(initCharts, 100);
                    break;
                case 'projects':
                    content = renderProjects();
                    break;
                case 'projectDetail':
                    content = renderProjectDetail();
                    setTimeout(initCostChart, 100);
                    break;
                case 'projectNew':
                    content = renderProjectNew();
                    break;
                case 'approval':
                    content = renderApproval();
                    break;
                case 'reports':
                    content = renderReports();
                    setTimeout(initReportCharts, 100);
                    break;
                case 'contracts':
                    content = renderContracts();
                    break;
                case 'personnel':
                    content = renderPersonnel();
                    break;
                case 'pricing':
                    content = renderPricing();
                    setTimeout(initPriceChart, 100);
                    break;
                default:
                    content = renderDashboard();
            }

            app.innerHTML = content;
        }

        // ============ 初始化 ============
        render();
    </script>
</body>
</html>
