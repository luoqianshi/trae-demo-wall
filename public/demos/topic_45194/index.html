<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快乐跑酷 - 休闲跑酷小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 9/16;
            background: #0f3460;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .ui-layer.interactive {
            pointer-events: auto;
        }
        
        .hidden {
            display: none !important;
        }
        
        #mainMenu.hidden,
        #gameOver.hidden,
        #skinShop.hidden,
        #settingsPanel.hidden,
        #pauseMenu.hidden,
        #tutorial.hidden {
            display: none !important;
        }
        
        /* 顶部信息栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }
        
        .score-display {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .distance-display {
            color: #ffd700;
            font-size: 14px;
        }
        
        .health-bar {
            display: flex;
            gap: 5px;
        }
        
        .heart {
            width: 24px;
            height: 24px;
            background: #ff4757;
            clip-path: polygon(50% 0%, 61% 12%, 75% 12%, 100% 35%, 100% 70%, 50% 100%, 0% 70%, 0% 35%, 25% 12%, 39% 12%);
        }
        
        .heart.empty {
            background: #444;
        }
        
        /* 底部按钮栏 */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-start {
            background: #2ed573;
        }
        
        .btn-pause {
            background: #ffa502;
        }
        
        .btn-skin {
            background: #70a1ff;
        }
        
        .btn-settings {
            background: #747d8c;
        }
        
        /* 主菜单 */
        .main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 52, 96, 0.95);
            z-index: 20;
        }
        
        .game-title {
            font-size: 48px;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .menu-btn {
            width: 200px;
            padding: 15px;
            margin: 10px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            transition: transform 0.2s;
        }
        
        .menu-btn:active {
            transform: scale(0.95);
        }
        
        .menu-btn-play {
            background: #2ed573;
        }
        
        .menu-btn-endless {
            background: #1e90ff;
        }
        
        .menu-btn-skin {
            background: #ff6b81;
        }
        
        .menu-btn-settings {
            background: #747d8c;
        }
        
        /* 游戏结束画面 */
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            z-index: 30;
        }
        
        .game-over-title {
            font-size: 36px;
            color: #ff4757;
            margin-bottom: 20px;
        }
        
        .stats-container {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 15px;
            width: 80%;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            color: #fff;
            font-size: 16px;
        }
        
        .stat-value {
            color: #ffd700;
            font-weight: bold;
        }
        
        /* 皮肤商店 */
        .skin-shop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 52, 96, 0.95);
            z-index: 25;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        
        .shop-title {
            font-size: 28px;
            color: #ffd700;
            margin: 20px 0;
        }
        
        .skin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            padding: 10px;
        }
        
        .skin-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }
        
        .skin-item.selected {
            border-color: #ffd700;
            background: rgba(255,215,0,0.2);
        }
        
        .skin-item:active {
            transform: scale(0.95);
        }
        
        .skin-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 8px;
        }
        
        .skin-name {
            color: #fff;
            font-size: 12px;
            text-align: center;
        }
        
        .btn-back {
            margin-top: 20px;
            padding: 12px 40px;
            background: #747d8c;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* 设置面板 */
        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 52, 96, 0.95);
            z-index: 25;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .settings-title {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 30px;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 80%;
            margin: 15px 0;
            color: #fff;
            font-size: 18px;
        }
        
        .toggle {
            width: 50px;
            height: 28px;
            background: #444;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle.active {
            background: #2ed573;
        }
        
        .toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        
        .toggle.active::after {
            transform: translateX(22px);
        }
        
        /* 暂停菜单 */
        .pause-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 25;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .pause-title {
            font-size: 36px;
            color: #fff;
            margin-bottom: 30px;
        }
        
        /* BUFF显示 */
        .buff-container {
            position: absolute;
            top: 60px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .buff-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 金币显示 */
        .coin-display {
            position: absolute;
            top: 60px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
        }
        
        .coin-icon {
            width: 24px;
            height: 24px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 14px;
        }
        
        /* 新手引导 */
        .tutorial {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 35;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        
        .tutorial-text {
            font-size: 20px;
            text-align: center;
            margin: 20px;
            line-height: 1.6;
        }
        
        .tutorial-hint {
            font-size: 16px;
            color: #ffd700;
            margin-top: 20px;
            animation: blink 1s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 连击显示 */
        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ff6b81;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            animation: comboPop 0.5s ease-out;
            pointer-events: none;
        }
        
        @keyframes comboPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        /* 响应式适配 */
        @media (max-width: 480px) {
            #gameContainer {
                aspect-ratio: auto;
                height: 100vh;
            }
        }
        
        @media (orientation: landscape) and (max-height: 480px) {
            #gameContainer {
                aspect-ratio: 16/9;
                height: 100vh;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI层 -->
        <div class="ui-layer" id="gameUI">
            <div class="top-bar">
                <div>
                    <div class="score-display">得分: <span id="score">0</span></div>
                    <div class="distance-display">距离: <span id="distance">0</span>m</div>
                </div>
                <div class="health-bar" id="healthBar">
                    <div class="heart"></div>
                    <div class="heart"></div>
                    <div class="heart"></div>
                </div>
            </div>
            
            <div class="coin-display">
                <div class="coin-icon">$</div>
                <span id="coinCount">0</span>
            </div>
            
            <div class="buff-container" id="buffContainer"></div>
            
            <div class="bottom-bar">
                <button class="btn btn-start" id="btnStart">开始</button>
                <button class="btn btn-pause" id="btnPause">暂停</button>
                <button class="btn btn-skin" id="btnSkin">皮肤</button>
                <button class="btn btn-settings" id="btnSettings">设置</button>
            </div>
        </div>
        
        <!-- 主菜单 -->
        <div class="main-menu interactive" id="mainMenu">
            <div class="game-title">快乐跑酷</div>
            <button class="menu-btn menu-btn-play" id="btnPlay">闯关模式</button>
            <button class="menu-btn menu-btn-endless" id="btnEndless">无尽模式</button>
            <button class="menu-btn menu-btn-skin" id="btnMenuSkin">皮肤商店</button>
            <button class="menu-btn menu-btn-settings" id="btnMenuSettings">游戏设置</button>
        </div>
        
        <!-- 游戏结束 -->
        <div class="game-over interactive hidden" id="gameOver">
            <div class="game-over-title">游戏结束</div>
            <div class="stats-container">
                <div class="stat-item">
                    <span>跑酷距离</span>
                    <span class="stat-value" id="finalDistance">0m</span>
                </div>
                <div class="stat-item">
                    <span>总得分</span>
                    <span class="stat-value" id="finalScore">0</span>
                </div>
                <div class="stat-item">
                    <span>收集金币</span>
                    <span class="stat-value" id="finalCoins">0</span>
                </div>
                <div class="stat-item">
                    <span>历史最高</span>
                    <span class="stat-value" id="bestScore">0</span>
                </div>
            </div>
            <button class="menu-btn menu-btn-play" id="btnRestart">重新开始</button>
            <button class="menu-btn menu-btn-settings" id="btnBackMenu">返回主菜单</button>
        </div>
        
        <!-- 皮肤商店 -->
        <div class="skin-shop interactive hidden" id="skinShop">
            <div class="shop-title">皮肤商店</div>
            <div class="skin-grid" id="skinGrid"></div>
            <button class="btn-back" id="btnBackFromSkin">返回</button>
        </div>
        
        <!-- 设置面板 -->
        <div class="settings-panel interactive hidden" id="settingsPanel">
            <div class="settings-title">游戏设置</div>
            <div class="setting-item">
                <span>背景音乐</span>
                <div class="toggle active" id="toggleBGM"></div>
            </div>
            <div class="setting-item">
                <span>操作音效</span>
                <div class="toggle active" id="toggleSFX"></div>
            </div>
            <div class="setting-item">
                <span>高清画质</span>
                <div class="toggle active" id="toggleHD"></div>
            </div>
            <button class="btn-back" id="btnBackFromSettings">返回</button>
        </div>
        
        <!-- 暂停菜单 -->
        <div class="pause-menu interactive hidden" id="pauseMenu">
            <div class="pause-title">游戏暂停</div>
            <button class="menu-btn menu-btn-play" id="btnResume">继续游戏</button>
            <button class="menu-btn menu-btn-settings" id="btnQuit">退出本局</button>
        </div>
        
        <!-- 新手引导 -->
        <div class="tutorial interactive hidden" id="tutorial">
            <div class="tutorial-text">
                <div>点击屏幕 = 跳跃</div>
                <div>空中再次点击 = 二段跳</div>
                <div>向下滑动 = 下蹲翻滚</div>
                <div>躲避障碍，收集金币！</div>
            </div>
            <div class="tutorial-hint">点击任意处开始游戏</div>
        </div>
    </div>

    <script>
        // ==================== 游戏核心引擎 ====================
        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.container = document.getElementById('gameContainer');
                
                this.state = 'menu'; // menu, playing, paused, gameover
                this.mode = 'level'; // level, endless
                this.level = 1;
                
                this.score = 0;
                this.distance = 0;
                this.coins = 0;
                this.health = 3;
                this.maxHealth = 3;
                this.combo = 0;
                
                this.speed = 5;
                this.baseSpeed = 5;
                this.speedMultiplier = 1;
                
                // 道具持续时间管理（帧计时，60帧≈1秒）
                this.buffTimers = {
                    shield: 0,    // 盾牌剩余帧数
                    magnet: 0,    // 磁铁剩余帧数
                    speed: 0      // 加速剩余帧数
                };
                this.buffDurations = {
                    shield: 300,   // 盾牌持续5秒
                    magnet: 300,   // 磁铁持续5秒
                    speed: 180     // 加速持续3秒
                };
                
                this.lastTime = 0;
                this.deltaTime = 0;
                this.frameCount = 0;
                
                this.settings = {
                    bgm: true,
                    sfx: true,
                    hd: true
                };
                
                this.skins = [
                    { id: 'rat', name: '鼠小弟', color: '#8B8B8B', unlocked: true, price: 0, emoji: '🐭' },
                    { id: 'ox', name: '牛壮壮', color: '#8B4513', unlocked: false, price: 100, emoji: '🐮' },
                    { id: 'tiger', name: '虎威威', color: '#FF8C00', unlocked: false, price: 200, emoji: '🐯' },
                    { id: 'rabbit', name: '兔乖乖', color: '#FFB6C1', unlocked: false, price: 300, emoji: '🐰' },
                    { id: 'dragon', name: '龙飞飞', color: '#DC143C', unlocked: false, price: 400, emoji: '🐲' },
                    { id: 'snake', name: '蛇灵灵', color: '#32CD32', unlocked: false, price: 500, emoji: '🐍' },
                    { id: 'horse', name: '马奔奔', color: '#A0522D', unlocked: false, price: 600, emoji: '🐴' },
                    { id: 'goat', name: '羊咩咩', color: '#F5F5DC', unlocked: false, price: 700, emoji: '🐑' },
                    { id: 'monkey', name: '猴皮皮', color: '#D2691E', unlocked: false, price: 800, emoji: '🐵' },
                    { id: 'rooster', name: '鸡喔喔', color: '#FFD700', unlocked: false, price: 900, emoji: '🐔' },
                    { id: 'dog', name: '狗旺财', color: '#CD853F', unlocked: false, price: 1000, emoji: '🐶' },
                    { id: 'pig', name: '猪嘟嘟', color: '#FF69B4', unlocked: false, price: 1200, emoji: '🐷' }
                ];
                this.currentSkin = 'rat';
                
                this.bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
                this.totalCoins = parseInt(localStorage.getItem('totalCoins')) || 0;
                
                this.init();
            }
            
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                this.input = new InputManager(this);
                this.player = new Player(this);
                this.world = new World(this);
                this.renderer = new Renderer(this);
                this.audio = new AudioManager(this);
                this.particles = new ParticleSystem(this);
                
                this.setupUI();
                this.loadProgress();
                
                requestAnimationFrame((t) => this.loop(t));
            }
            
            resize() {
                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width * (this.settings.hd ? 2 : 1);
                this.canvas.height = rect.height * (this.settings.hd ? 2 : 1);
                this.width = rect.width;
                this.height = rect.height;
                this.ctx.scale(this.settings.hd ? 2 : 1, this.settings.hd ? 2 : 1);
            }
            
            setupUI() {
                // 主菜单
                document.getElementById('btnPlay').addEventListener('click', () => this.startGame('level'));
                document.getElementById('btnEndless').addEventListener('click', () => this.startGame('endless'));
                document.getElementById('btnMenuSkin').addEventListener('click', () => this.openSkinShop());
                document.getElementById('btnMenuSettings').addEventListener('click', () => this.openSettings());
                
                // 游戏内按钮
                document.getElementById('btnStart').addEventListener('click', () => this.startGame(this.mode));
                document.getElementById('btnPause').addEventListener('click', () => this.pauseGame());
                document.getElementById('btnSkin').addEventListener('click', () => this.openSkinShop());
                document.getElementById('btnSettings').addEventListener('click', () => this.openSettings());
                
                // 游戏结束
                document.getElementById('btnRestart').addEventListener('click', () => this.startGame(this.mode));
                document.getElementById('btnBackMenu').addEventListener('click', () => this.backToMenu());
                
                // 暂停菜单
                document.getElementById('btnResume').addEventListener('click', () => this.resumeGame());
                document.getElementById('btnQuit').addEventListener('click', () => this.backToMenu());
                
                // 返回按钮
                document.getElementById('btnBackFromSkin').addEventListener('click', () => this.closeSkinShop());
                document.getElementById('btnBackFromSettings').addEventListener('click', () => this.closeSettings());
                
                // 设置开关
                document.getElementById('toggleBGM').addEventListener('click', (e) => this.toggleSetting('bgm', e.target));
                document.getElementById('toggleSFX').addEventListener('click', (e) => this.toggleSetting('sfx', e.target));
                document.getElementById('toggleHD').addEventListener('click', (e) => this.toggleSetting('hd', e.target));
                
                // 新手引导
                document.getElementById('tutorial').addEventListener('click', () => {
                    document.getElementById('tutorial').classList.add('hidden');
                    if (this.state === 'tutorial') {
                        this.state = 'playing';
                        this.audio.playBGM();
                    }
                });
            }
            
            startGame(mode) {
                this.mode = mode;
                this.state = 'playing';
                this.score = 0;
                this.distance = 0;
                this.coins = 0;
                this.health = this.maxHealth;
                this.combo = 0;
                this.speed = this.baseSpeed;
                this.speedMultiplier = 1;
                this.buffTimers = { shield: 0, magnet: 0, speed: 0 };
                
                this.player.reset();
                this.world.reset();
                this.particles.clear();
                
                // 隐藏所有菜单，显示游戏UI
                document.getElementById('mainMenu').classList.add('hidden');
                document.getElementById('gameOver').classList.add('hidden');
                document.getElementById('skinShop').classList.add('hidden');
                document.getElementById('settingsPanel').classList.add('hidden');
                document.getElementById('pauseMenu').classList.add('hidden');
                document.getElementById('gameUI').classList.remove('hidden');
                
                // 首次游戏显示教程
                if (!localStorage.getItem('tutorialShown')) {
                    document.getElementById('tutorial').classList.remove('hidden');
                    this.state = 'tutorial';
                    localStorage.setItem('tutorialShown', 'true');
                } else {
                    this.audio.playBGM();
                }
                
                this.updateUI();
            }
            
            pauseGame() {
                if (this.state === 'playing') {
                    this.state = 'paused';
                    document.getElementById('pauseMenu').classList.remove('hidden');
                    this.audio.pauseBGM();
                }
            }
            
            resumeGame() {
                if (this.state === 'paused') {
                    this.state = 'playing';
                    document.getElementById('pauseMenu').classList.add('hidden');
                    this.audio.playBGM();
                }
            }
            
            gameOver() {
                this.state = 'gameover';
                
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('bestScore', this.bestScore);
                }
                
                this.totalCoins += this.coins;
                localStorage.setItem('totalCoins', this.totalCoins);
                
                document.getElementById('finalDistance').textContent = Math.floor(this.distance) + 'm';
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalCoins').textContent = this.coins;
                document.getElementById('bestScore').textContent = this.bestScore;
                document.getElementById('gameOver').classList.remove('hidden');
                
                this.audio.stopBGM();
                this.audio.playSFX('gameover');
            }
            
            backToMenu() {
                this.state = 'menu';
                document.getElementById('gameUI').classList.add('hidden');
                document.getElementById('gameOver').classList.add('hidden');
                document.getElementById('pauseMenu').classList.add('hidden');
                document.getElementById('mainMenu').classList.remove('hidden');
                this.audio.stopBGM();
            }
            
            openSkinShop() {
                this.renderSkinShop();
                document.getElementById('skinShop').classList.remove('hidden');
            }
            
            closeSkinShop() {
                document.getElementById('skinShop').classList.add('hidden');
            }
            
            openSettings() {
                document.getElementById('settingsPanel').classList.remove('hidden');
            }
            
            closeSettings() {
                document.getElementById('settingsPanel').classList.add('hidden');
            }
            
            toggleSetting(key, element) {
                this.settings[key] = !this.settings[key];
                element.classList.toggle('active');
                
                if (key === 'hd') {
                    this.resize();
                }
                if (key === 'bgm' && this.state === 'playing') {
                    this.settings.bgm ? this.audio.playBGM() : this.audio.pauseBGM();
                }
            }
            
            renderSkinShop() {
                const grid = document.getElementById('skinGrid');
                grid.innerHTML = '';
                
                // 显示当前金币
                let coinHeader = document.getElementById('shopCoinDisplay');
                if (!coinHeader) {
                    coinHeader = document.createElement('div');
                    coinHeader.id = 'shopCoinDisplay';
                    coinHeader.style.cssText = 'color:#ffd700;font-size:18px;margin-bottom:10px;font-weight:bold;';
                    grid.parentElement.insertBefore(coinHeader, grid);
                }
                coinHeader.textContent = '金币: ' + this.totalCoins;
                
                this.skins.forEach(skin => {
                    const item = document.createElement('div');
                    item.className = 'skin-item' + (skin.id === this.currentSkin ? ' selected' : '');
                    
                    let statusText = '';
                    if (skin.unlocked && skin.id === this.currentSkin) {
                        statusText = '<div style="color:#2ed573;font-size:11px;margin-top:4px;">使用中</div>';
                    } else if (skin.unlocked) {
                        statusText = '<div style="color:#70a1ff;font-size:11px;margin-top:4px;">已解锁</div>';
                    } else {
                        statusText = '<div style="color:#ffd700;font-size:11px;margin-top:4px;">' + skin.price + ' 金币</div>';
                    }
                    
                    item.innerHTML = `
                        <div class="skin-preview" style="background: ${skin.color};display:flex;align-items:center;justify-content:center;font-size:28px;">${skin.emoji}</div>
                        <div class="skin-name">${skin.name}</div>
                        ${statusText}
                    `;
                    item.addEventListener('click', () => {
                        if (skin.unlocked) {
                            // 已解锁，直接选用
                            this.currentSkin = skin.id;
                            this.renderSkinShop();
                        } else if (this.totalCoins >= skin.price) {
                            // 金币足够，购买解锁
                            this.totalCoins -= skin.price;
                            skin.unlocked = true;
                            this.currentSkin = skin.id;
                            localStorage.setItem('totalCoins', this.totalCoins);
                            this.saveUnlockedSkins();
                            this.renderSkinShop();
                        }
                        // 金币不足时不做任何操作（后续可加提示）
                    });
                    grid.appendChild(item);
                });
            }
            
            saveUnlockedSkins() {
                const unlocked = this.skins.filter(s => s.unlocked).map(s => s.id);
                localStorage.setItem('unlockedSkins', JSON.stringify(unlocked));
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('distance').textContent = Math.floor(this.distance);
                document.getElementById('coinCount').textContent = this.coins;
                
                const hearts = document.querySelectorAll('.heart');
                hearts.forEach((heart, i) => {
                    heart.classList.toggle('empty', i >= this.health);
                });
                
                const buffContainer = document.getElementById('buffContainer');
                buffContainer.innerHTML = '';
                if (this.player.shield && this.buffTimers.shield > 0) {
                    const sec = Math.ceil(this.buffTimers.shield / 60);
                    buffContainer.innerHTML += '<div class="buff-icon" style="background: rgba(100,200,255,0.5);font-size:14px;">🛡️' + sec + '</div>';
                }
                if (this.player.magnet && this.buffTimers.magnet > 0) {
                    const sec = Math.ceil(this.buffTimers.magnet / 60);
                    buffContainer.innerHTML += '<div class="buff-icon" style="background: rgba(255,200,100,0.5);font-size:14px;">🧲' + sec + '</div>';
                }
                if (this.buffTimers.speed > 0) {
                    const sec = Math.ceil(this.buffTimers.speed / 60);
                    buffContainer.innerHTML += '<div class="buff-icon" style="background: rgba(255,100,100,0.5);font-size:14px;">⚡' + sec + '</div>';
                }
            }
            
            loop(timestamp) {
                this.deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;
                
                if (this.state === 'playing') {
                    this.update();
                }
                
                this.renderer.render();
                requestAnimationFrame((t) => this.loop(t));
            }
            
            update() {
                const dt = Math.min(this.deltaTime / 16.67, 2); // 标准化到60fps
                
                this.speed = this.baseSpeed * this.speedMultiplier;
                this.distance += this.speed * dt * 0.1;
                
                // 无尽模式速度递增
                if (this.mode === 'endless') {
                    this.speedMultiplier = 1 + this.distance * 0.001;
                }
                
                this.player.update(dt);
                this.world.update(dt);
                this.particles.update(dt);
                this.updateBuffTimers(dt);
                
                // 碰撞检测
                this.checkCollisions();
                
                // 更新UI
                if (this.frameCount % 10 === 0) {
                    this.updateUI();
                }
                
                this.frameCount++;
            }
            
            checkCollisions() {
                const playerRect = this.player.getBounds();
                
                // 障碍物碰撞
                this.world.obstacles.forEach(obstacle => {
                    if (!obstacle.active) return; // 跳过已处理的障碍物
                    if (this.isColliding(playerRect, obstacle.getBounds())) {
                        if (this.player.shield) {
                            this.player.shield = false;
                            obstacle.active = false; // 标记为已处理，防止重复碰撞
                            this.particles.createExplosion(obstacle.x, obstacle.y, '#64c8ff');
                            this.audio.playSFX('shield');
                        } else if (!this.player.invincible) {
                            this.player.hit();
                            this.health--;
                            this.combo = 0;
                            obstacle.active = false; // 碰撞后标记为已处理
                            this.particles.createExplosion(this.player.x, this.player.y, '#ff4757');
                            this.audio.playSFX('hit');
                            
                            if (this.health <= 0) {
                                this.gameOver();
                            }
                        }
                    }
                });
                
                // 金币收集
                this.world.coins.forEach(coin => {
                    if (coin.active && this.isColliding(playerRect, coin.getBounds())) {
                        coin.active = false;
                        this.coins++;
                        this.score += 10;
                        this.combo++;
                        this.particles.createSparkle(coin.x, coin.y, '#ffd700');
                        this.audio.playSFX('coin');
                    }
                });
                
                // 道具收集
                this.world.powerups.forEach(powerup => {
                    if (powerup.active && this.isColliding(playerRect, powerup.getBounds())) {
                        powerup.active = false;
                        this.applyPowerup(powerup.type);
                        this.particles.createSparkle(powerup.x, powerup.y, '#2ed573');
                        this.audio.playSFX('powerup');
                    }
                });
            }
            
            isColliding(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            }
            
            applyPowerup(type) {
                switch(type) {
                    case 'shield':
                        this.player.shield = true;
                        this.buffTimers.shield += this.buffDurations.shield; // 叠加时间
                        break;
                    case 'magnet':
                        this.player.magnet = true;
                        this.buffTimers.magnet += this.buffDurations.magnet; // 叠加时间
                        break;
                    case 'speed':
                        this.speedMultiplier = 2;
                        this.buffTimers.speed += this.buffDurations.speed; // 叠加时间
                        break;
                }
            }
            
            updateBuffTimers(dt) {
                // 盾牌计时
                if (this.buffTimers.shield > 0) {
                    this.buffTimers.shield -= dt;
                    if (this.buffTimers.shield <= 0) {
                        this.buffTimers.shield = 0;
                        this.player.shield = false;
                    }
                }
                // 磁铁计时
                if (this.buffTimers.magnet > 0) {
                    this.buffTimers.magnet -= dt;
                    if (this.buffTimers.magnet <= 0) {
                        this.buffTimers.magnet = 0;
                        this.player.magnet = false;
                    }
                }
                // 加速计时
                if (this.buffTimers.speed > 0) {
                    this.buffTimers.speed -= dt;
                    if (this.buffTimers.speed <= 0) {
                        this.buffTimers.speed = 0;
                        this.speedMultiplier = 1;
                    }
                }
            }
            
            loadProgress() {
                const savedSkins = localStorage.getItem('unlockedSkins');
                if (savedSkins) {
                    const unlocked = JSON.parse(savedSkins);
                    this.skins.forEach(skin => {
                        if (unlocked.includes(skin.id)) {
                            skin.unlocked = true;
                        }
                    });
                }
            }
        }

        // ==================== 输入管理器 ====================
        class InputManager {
            constructor(game) {
                this.game = game;
                this.keys = {};
                this.touchStartY = 0;
                this.touchStartX = 0;
                
                this.setupEventListeners();
            }
            
            setupEventListeners() {
                // 键盘事件
                window.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    
                    if (this.game.state === 'playing') {
                        if (e.code === 'Space' || e.code === 'ArrowUp') {
                            e.preventDefault();
                            this.game.player.jump();
                        }
                        if (e.code === 'ArrowDown') {
                            e.preventDefault();
                            this.game.player.slide();
                        }
                    }
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                });
                
                // 触摸事件
                this.game.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.touchStartY = touch.clientY;
                    this.touchStartX = touch.clientX;
                }, { passive: false });
                
                this.game.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    if (this.game.state !== 'playing') return;
                    
                    const touch = e.changedTouches[0];
                    const deltaY = touch.clientY - this.touchStartY;
                    const deltaX = touch.clientX - this.touchStartX;
                    
                    if (Math.abs(deltaY) > Math.abs(deltaX)) {
                        if (deltaY < -30) {
                            this.game.player.jump();
                        } else if (deltaY > 30) {
                            this.game.player.slide();
                        }
                    }
                }, { passive: false });
                
                // 鼠标事件
                this.game.canvas.addEventListener('mousedown', (e) => {
                    if (this.game.state === 'playing') {
                        this.game.player.jump();
                    }
                });
            }
        }

        // ==================== 玩家角色 ====================
        class Player {
            constructor(game) {
                this.game = game;
                this.x = 100;
                this.y = 0;
                this.width = 40;
                this.height = 50;
                this.groundY = 0;
                
                this.velocityY = 0;
                this.gravity = 0.8;
                this.jumpPower = -15;
                this.maxJumps = 2;
                this.jumpsLeft = 2;
                
                this.isSliding = false;
                this.slideTimer = 0;
                this.slideDuration = 30;
                
                this.shield = false;
                this.magnet = false;
                this.invincible = false;
                this.invincibleTimer = 0;
                
                this.animFrame = 0;
                this.animTimer = 0;
            }
            
            reset() {
                this.y = this.groundY;
                this.velocityY = 0;
                this.jumpsLeft = this.maxJumps;
                this.isSliding = false;
                this.shield = false;
                this.magnet = false;
                this.invincible = false;
            }
            
            update(dt) {
                // 重力
                this.velocityY += this.gravity * dt;
                this.y += this.velocityY * dt;
                
                // 地面碰撞
                if (this.y >= this.groundY) {
                    this.y = this.groundY;
                    this.velocityY = 0;
                    this.jumpsLeft = this.maxJumps;
                    this.isSliding = false;
                }
                
                // 滑铲计时
                if (this.isSliding) {
                    this.slideTimer -= dt;
                    if (this.slideTimer <= 0) {
                        this.isSliding = false;
                        this.height = 50;
                    }
                }
                
                // 无敌计时
                if (this.invincible) {
                    this.invincibleTimer -= dt;
                    if (this.invincibleTimer <= 0) {
                        this.invincible = false;
                    }
                }
                
                // 动画
                this.animTimer += dt;
                if (this.animTimer > 5) {
                    this.animFrame = (this.animFrame + 1) % 4;
                    this.animTimer = 0;
                }
                
                // 磁铁效果
                if (this.magnet) {
                    this.game.world.coins.forEach(coin => {
                        if (coin.active) {
                            const dx = this.x - coin.x;
                            const dy = this.y - coin.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 150) {
                                coin.x += dx * 0.1;
                                coin.y += dy * 0.1;
                            }
                        }
                    });
                }
            }
            
            jump() {
                if (this.jumpsLeft > 0) {
                    this.velocityY = this.jumpPower;
                    this.jumpsLeft--;
                    this.isSliding = false;
                    this.game.particles.createDust(this.x, this.y + this.height);
                    this.game.audio.playSFX('jump');
                }
            }
            
            slide() {
                if (!this.isSliding && this.y >= this.groundY - 5) {
                    this.isSliding = true;
                    this.slideTimer = this.slideDuration;
                    this.height = 25;
                    this.game.audio.playSFX('slide');
                }
            }
            
            hit() {
                this.invincible = true;
                this.invincibleTimer = 60;
            }
            
            getBounds() {
                return {
                    x: this.x - this.width / 2,
                    y: this.y - this.height,
                    width: this.width,
                    height: this.height
                };
            }
            
            getSkinColor() {
                const skin = this.game.skins.find(s => s.id === this.game.currentSkin);
                return skin ? skin.color : '#ff6b81';
            }
        }

        // ==================== 游戏世界 ====================
        class World {
            constructor(game) {
                this.game = game;
                this.obstacles = [];
                this.coins = [];
                this.powerups = [];
                this.particles = [];
                
                this.groundHeight = 80;
                
                this.spawnTimer = 0;
                this.spawnInterval = 100;
                this.coinTimer = 0;
                this.powerupTimer = 0;
                
                this.bgOffset = 0;
                this.groundOffset = 0;
                
                this.scene = 'city';
                this.scenes = ['city', 'forest', 'cloud', 'school', 'grassland'];
                this.sceneColors = {
                    city: { sky: '#87CEEB', ground: '#808080' },
                    forest: { sky: '#98FB98', ground: '#228B22' },
                    cloud: { sky: '#E0F6FF', ground: '#B0C4DE' },
                    school: { sky: '#FFE4B5', ground: '#DEB887' },
                    grassland: { sky: '#87CEEB', ground: '#90EE90' }
                };
            }
            
            reset() {
                this.obstacles = [];
                this.coins = [];
                this.powerups = [];
                this.spawnTimer = 0;
                this.coinTimer = 0;
                this.powerupTimer = 0;
                this.bgOffset = 0;
                this.groundOffset = 0;
                this.scene = this.scenes[Math.floor(Math.random() * this.scenes.length)];
            }
            
            update(dt) {
                // 更新玩家地面位置
                if (this.game.player) {
                    this.game.player.groundY = this.game.height - this.groundHeight;
                }
                
                // 背景滚动
                this.bgOffset += this.game.speed * 0.2 * dt;
                this.groundOffset += this.game.speed * dt;
                
                // 生成障碍物
                this.spawnTimer += dt;
                const interval = Math.max(30, this.spawnInterval - this.game.distance * 0.01);
                if (this.spawnTimer > interval) {
                    this.spawnObstacle();
                    this.spawnTimer = 0;
                }
                
                // 生成金币
                this.coinTimer += dt;
                if (this.coinTimer > 20) {
                    this.spawnCoin();
                    this.coinTimer = 0;
                }
                
                // 生成道具
                this.powerupTimer += dt;
                if (this.powerupTimer > 300) {
                    this.spawnPowerup();
                    this.powerupTimer = 0;
                }
                
                // 更新障碍物
                this.obstacles.forEach(obs => {
                    obs.x -= this.game.speed * dt;
                    if (obs.update) obs.update(dt);
                });
                this.obstacles = this.obstacles.filter(obs => obs.x > -100);
                
                // 更新金币
                this.coins.forEach(coin => {
                    coin.x -= this.game.speed * dt;
                });
                this.coins = this.coins.filter(coin => coin.x > -50 && coin.active);
                
                // 更新道具
                this.powerups.forEach(powerup => {
                    powerup.x -= this.game.speed * dt;
                });
                this.powerups = this.powerups.filter(p => p.x > -50 && p.active);
                
                // 场景切换
                if (this.game.mode === 'endless' && Math.floor(this.game.distance) % 500 === 0 && this.game.distance > 0) {
                    const newScene = this.scenes[Math.floor(Math.random() * this.scenes.length)];
                    if (newScene !== this.scene) {
                        this.scene = newScene;
                    }
                }
            }
            
            spawnObstacle() {
                const types = ['ground', 'air', 'moving'];
                const type = types[Math.floor(Math.random() * types.length)];
                
                let obstacle;
                switch(type) {
                    case 'ground':
                        obstacle = new Obstacle(this.game.width + 50, this.game.height - this.groundHeight - 40, 40, 40, 'ground');
                        break;
                    case 'air':
                        obstacle = new Obstacle(this.game.width + 50, this.game.height - this.groundHeight - 120, 40, 40, 'air');
                        break;
                    case 'moving':
                        obstacle = new MovingObstacle(this.game.width + 50, this.game.height - this.groundHeight - 80, 30, 30);
                        break;
                }
                
                this.obstacles.push(obstacle);
            }
            
            spawnCoin() {
                const pattern = Math.floor(Math.random() * 3);
                const baseY = this.game.height - this.groundHeight - 60;
                
                if (pattern === 0) {
                    // 直线
                    for (let i = 0; i < 5; i++) {
                        this.coins.push(new Coin(this.game.width + 50 + i * 40, baseY));
                    }
                } else if (pattern === 1) {
                    // 弧线
                    for (let i = 0; i < 5; i++) {
                        const y = baseY - Math.sin(i * 0.5) * 60;
                        this.coins.push(new Coin(this.game.width + 50 + i * 40, y));
                    }
                } else {
                    // 高低
                    for (let i = 0; i < 4; i++) {
                        const y = baseY - (i % 2) * 80;
                        this.coins.push(new Coin(this.game.width + 50 + i * 40, y));
                    }
                }
            }
            
            spawnPowerup() {
                const types = ['shield', 'magnet', 'speed'];
                const type = types[Math.floor(Math.random() * types.length)];
                const y = this.game.height - this.groundHeight - 60 - Math.random() * 80;
                this.powerups.push(new Powerup(this.game.width + 50, y, type));
            }
            
            getSceneColor() {
                return this.sceneColors[this.scene] || this.sceneColors.city;
            }
        }

        // ==================== 障碍物类 ====================
        class Obstacle {
            constructor(x, y, width, height, type) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type;
                this.active = true;
            }
            
            getBounds() {
                return {
                    x: this.x - this.width / 2,
                    y: this.y - this.height / 2,
                    width: this.width,
                    height: this.height
                };
            }
        }

        class MovingObstacle extends Obstacle {
            constructor(x, y, width, height) {
                super(x, y, width, height, 'moving');
                this.startY = y;
                this.offset = 0;
            }
            
            update(dt) {
                this.offset += dt * 0.05;
                this.y = this.startY + Math.sin(this.offset) * 40;
            }
        }

        // ==================== 金币类 ====================
        class Coin {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 12;
                this.active = true;
                this.bobOffset = Math.random() * Math.PI * 2;
            }
            
            update(dt) {
                this.bobOffset += dt * 0.1;
            }
            
            getBounds() {
                return {
                    x: this.x - this.radius,
                    y: this.y - this.radius,
                    width: this.radius * 2,
                    height: this.radius * 2
                };
            }
        }

        // ==================== 道具类 ====================
        class Powerup {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.radius = 15;
                this.active = true;
                this.pulse = 0;
            }
            
            update(dt) {
                this.pulse += dt * 0.1;
            }
            
            getBounds() {
                return {
                    x: this.x - this.radius,
                    y: this.y - this.radius,
                    width: this.radius * 2,
                    height: this.radius * 2
                };
            }
        }

        // ==================== 粒子系统 ====================
        class ParticleSystem {
            constructor(game) {
                this.game = game;
                this.particles = [];
            }
            
            clear() {
                this.particles = [];
            }
            
            createDust(x, y) {
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 3,
                        vy: -Math.random() * 3,
                        life: 30,
                        maxLife: 30,
                        color: '#ccc',
                        size: Math.random() * 4 + 2
                    });
                }
            }
            
            createSparkle(x, y, color) {
                for (let i = 0; i < 8; i++) {
                    const angle = (Math.PI * 2 / 8) * i;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * 4,
                        vy: Math.sin(angle) * 4,
                        life: 20,
                        maxLife: 20,
                        color: color,
                        size: Math.random() * 3 + 2
                    });
                }
            }
            
            createExplosion(x, y, color) {
                for (let i = 0; i < 15; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 2;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 40,
                        maxLife: 40,
                        color: color,
                        size: Math.random() * 5 + 3
                    });
                }
            }
            
            update(dt) {
                this.particles.forEach(p => {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 0.1 * dt;
                    p.life -= dt;
                });
                this.particles = this.particles.filter(p => p.life > 0);
            }
            
            render(ctx) {
                this.particles.forEach(p => {
                    const alpha = p.life / p.maxLife;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }
        }

        // ==================== 渲染器 ====================
        class Renderer {
            constructor(game) {
                this.game = game;
                this.ctx = game.ctx;
            }
            
            render() {
                const ctx = this.ctx;
                const w = this.game.width;
                const h = this.game.height;
                
                // 清空画布
                ctx.clearRect(0, 0, w, h);
                
                // 渲染背景
                this.renderBackground(ctx, w, h);
                
                // 渲染地面
                this.renderGround(ctx, w, h);
                
                // 渲染金币
                this.renderCoins(ctx);
                
                // 渲染道具
                this.renderPowerups(ctx);
                
                // 渲染障碍物
                this.renderObstacles(ctx);
                
                // 渲染玩家
                this.renderPlayer(ctx);
                
                // 渲染粒子
                this.game.particles.render(ctx);
                
                // 渲染特效
                this.renderEffects(ctx);
            }
            
            renderBackground(ctx, w, h) {
                const colors = this.game.world.getSceneColor();
                
                // 天空渐变
                const gradient = ctx.createLinearGradient(0, 0, 0, h);
                gradient.addColorStop(0, colors.sky);
                gradient.addColorStop(1, '#fff');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, w, h);
                
                // 云朵
                const offset = this.game.world.bgOffset;
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                for (let i = 0; i < 5; i++) {
                    const x = ((i * 200 - offset * 0.3) % (w + 200)) - 100;
                    const y = 50 + i * 30;
                    this.drawCloud(ctx, x, y, 30 + i * 10);
                }
                
                // 远景建筑/树木
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                for (let i = 0; i < 10; i++) {
                    const x = ((i * 150 - offset * 0.5) % (w + 150)) - 75;
                    const height = 60 + (i % 3) * 30;
                    ctx.fillRect(x, h - this.game.world.groundHeight - height, 40, height);
                }
            }
            
            renderGround(ctx, w, h) {
                const colors = this.game.world.getSceneColor();
                const groundY = h - this.game.world.groundHeight;
                
                // 地面
                ctx.fillStyle = colors.ground;
                ctx.fillRect(0, groundY, w, this.game.world.groundHeight);
                
                // 地面纹理
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                const offset = this.game.world.groundOffset % 40;
                for (let i = -1; i < w / 40 + 1; i++) {
                    ctx.fillRect(i * 40 - offset, groundY, 2, this.game.world.groundHeight);
                }
                
                // 地面顶部线条
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, groundY);
                ctx.lineTo(w, groundY);
                ctx.stroke();
            }
            
            renderPlayer(ctx) {
                const player = this.game.player;
                const x = player.x;
                const y = player.y;
                const w = player.width;
                const h = player.height;
                const skin = this.game.skins.find(s => s.id === this.game.currentSkin);
                const emoji = skin ? skin.emoji : '🐭';
                const color = skin ? skin.color : '#8B8B8B';
                
                ctx.save();
                
                // 无敌闪烁
                if (player.invincible && Math.floor(player.invincibleTimer / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // 护盾效果
                if (player.shield) {
                    ctx.strokeStyle = 'rgba(100,200,255,0.6)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(x, y - h / 2, w * 0.9, 0, Math.PI * 2);
                    ctx.stroke();
                    // 护盾光晕
                    ctx.fillStyle = 'rgba(100,200,255,0.15)';
                    ctx.beginPath();
                    ctx.arc(x, y - h / 2, w * 0.9, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 磁铁效果
                if (player.magnet) {
                    ctx.strokeStyle = 'rgba(255,200,100,0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, y - h / 2, 100, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                if (player.isSliding) {
                    // 滑铲姿态 - 扁平椭圆 + 表情
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.ellipse(x, y - h / 2, w / 2 + 5, h / 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 滑铲时的萌宠表情（小一点）
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(emoji, x, y - h / 2);
                } else {
                    // 正常跑酷姿态 - Q版萌宠
                    const bobY = Math.sin(player.animFrame * Math.PI / 2) * 2; // 跑动时的轻微上下弹跳
                    const drawY = y - h / 2 + bobY;
                    
                    // 身体阴影
                    ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    ctx.beginPath();
                    ctx.ellipse(x + 3, drawY + 3, w / 2 + 2, h / 2 + 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 身体底色
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.ellipse(x, drawY, w / 2 + 2, h / 2 + 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 身体高光（Q版光泽感）
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.beginPath();
                    ctx.ellipse(x - 5, drawY - 5, w / 4, h / 5, -0.3, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 绘制十二生肖萌宠表情
                    ctx.font = '32px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(emoji, x, drawY);
                    
                    // 跑动时的腿部动画（小短腿）
                    const legOffset = Math.sin(player.animFrame * Math.PI / 2) * 6;
                    ctx.fillStyle = color;
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 1;
                    
                    // 左腿
                    ctx.beginPath();
                    ctx.ellipse(x - 8 + legOffset, y - 8, 4, 6, 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    // 右腿
                    ctx.beginPath();
                    ctx.ellipse(x + 8 - legOffset, y - 8, 4, 6, -0.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    // 小尾巴摆动
                    const tailWag = Math.sin(player.animFrame * Math.PI / 2) * 0.5;
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(x - w / 2, drawY + 5);
                    ctx.quadraticCurveTo(x - w / 2 - 10, drawY + tailWag * 8, x - w / 2 - 5, drawY - 5 + tailWag * 5);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
            
            renderObstacles(ctx) {
                this.game.world.obstacles.forEach(obs => {
                    if (!obs.active) return;
                    
                    ctx.fillStyle = '#ff4757';
                    
                    if (obs.type === 'ground') {
                        // 地面障碍 - 石头/箱子
                        ctx.fillRect(obs.x - obs.width / 2, obs.y - obs.height / 2, obs.width, obs.height);
                        ctx.fillStyle = 'rgba(0,0,0,0.2)';
                        ctx.fillRect(obs.x - obs.width / 2 + 5, obs.y - obs.height / 2 + 5, obs.width - 10, 5);
                    } else if (obs.type === 'air') {
                        // 空中障碍 - 飞鸟/气球
                        ctx.beginPath();
                        ctx.ellipse(obs.x, obs.y, obs.width / 2, obs.height / 3, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.beginPath();
                        ctx.ellipse(obs.x - 5, obs.y - 5, obs.width / 4, obs.height / 6, 0, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (obs.type === 'moving') {
                        // 移动障碍
                        ctx.fillStyle = '#ff6348';
                        ctx.beginPath();
                        ctx.arc(obs.x, obs.y, obs.width / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(obs.x - 3, obs.y - 3, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            }
            
            renderCoins(ctx) {
                this.game.world.coins.forEach(coin => {
                    if (!coin.active) return;
                    
                    const bobY = Math.sin(coin.bobOffset) * 3;
                    
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y + bobY, coin.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ffed4a';
                    ctx.beginPath();
                    ctx.arc(coin.x - 2, coin.y + bobY - 2, coin.radius * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#b8860b';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('$', coin.x, coin.y + bobY);
                });
            }
            
            renderPowerups(ctx) {
                this.game.world.powerups.forEach(powerup => {
                    if (!powerup.active) return;
                    
                    const pulse = Math.sin(powerup.pulse) * 3;
                    
                    ctx.save();
                    ctx.shadowColor = '#2ed573';
                    ctx.shadowBlur = 10;
                    
                    ctx.fillStyle = '#2ed573';
                    ctx.beginPath();
                    ctx.arc(powerup.x, powerup.y, powerup.radius + pulse, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    let icon = '?';
                    if (powerup.type === 'shield') icon = '🛡️';
                    if (powerup.type === 'magnet') icon = '🧲';
                    if (powerup.type === 'speed') icon = '⚡';
                    
                    ctx.fillText(icon, powerup.x, powerup.y);
                    
                    ctx.restore();
                });
            }
            
            renderEffects(ctx) {
                // 速度线效果
                if (this.game.speedMultiplier > 1) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 5; i++) {
                        const x = Math.random() * this.game.width;
                        const y = Math.random() * this.game.height;
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x - 50, y);
                        ctx.stroke();
                    }
                }
            }
            
            drawCloud(ctx, x, y, size) {
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.arc(x + size * 0.8, y - size * 0.3, size * 0.7, 0, Math.PI * 2);
                ctx.arc(x + size * 1.2, y, size * 0.8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== 音频管理器 ====================
        class AudioManager {
            constructor(game) {
                this.game = game;
                this.bgmPlaying = false;
                
                // 使用Web Audio API生成音效
                this.audioContext = null;
                this.initAudio();
            }
            
            initAudio() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Web Audio API not supported');
                }
            }
            
            playBGM() {
                if (!this.game.settings.bgm || this.bgmPlaying) return;
                this.bgmPlaying = true;
                // BGM使用简单的循环旋律
            }
            
            pauseBGM() {
                this.bgmPlaying = false;
            }
            
            stopBGM() {
                this.bgmPlaying = false;
            }
            
            playSFX(type) {
                if (!this.game.settings.sfx || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                switch(type) {
                    case 'jump':
                        oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(600, this.audioContext.currentTime + 0.1);
                        gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + 0.1);
                        break;
                    case 'coin':
                        oscillator.frequency.setValueAtTime(800, this.audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(1200, this.audioContext.currentTime + 0.05);
                        gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + 0.1);
                        break;
                    case 'hit':
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(200, this.audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(50, this.audioContext.currentTime + 0.2);
                        gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.2);
                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + 0.2);
                        break;
                    case 'powerup':
                        oscillator.frequency.setValueAtTime(500, this.audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(1000, this.audioContext.currentTime + 0.2);
                        gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.3);
                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + 0.3);
                        break;
                    case 'slide':
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(300, this.audioContext.currentTime);
                        gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + 0.1);
                        break;
                    case 'gameover':
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(100, this.audioContext.currentTime + 0.5);
                        gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.5);
                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + 0.5);
                        break;
                }
            }
        }

        // ==================== 启动游戏 ====================
        window.addEventListener('load', () => {
            const game = new GameEngine();
        });
    </script>
