<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词四线三格练习纸生成器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
        :root {
            --spring-p: #43A047; --spring-s: #66BB6A; --spring-a: #FF9800; --spring-bg: #E8F5E9; --spring-l: #4CAF50; --spring-t: #C8E6C9;
            --summer-p: #1E88E5; --summer-s: #42A5F5; --summer-a: #FF5722; --summer-bg: #E3F2FD; --summer-l: #2196F3; --summer-t: #BBDEFB;
            --autumn-p: #FB8C00; --autumn-s: #FFA726; --autumn-a: #D84315; --autumn-bg: #FFF3E0; --autumn-l: #FF9800; --autumn-t: #FFE0B2;
            --winter-p: #546E7A; --winter-s: #78909C; --winter-a: #3949AB; --winter-bg: #ECEFF1; --winter-l: #607D8B; --winter-t: #CFD8DC;
            --p: var(--spring-p); --s: var(--spring-s); --a: var(--spring-a); --bg: var(--spring-bg);
            --ln: var(--spring-l); --lt: var(--spring-t); --tx: #2D3436; --tx2: #636E72; --cd: #fff;
            --sh: 0 2px 16px rgba(0,0,0,0.06); --sh-h: 0 8px 32px rgba(0,0,0,0.1);
            --r: 16px; --rs: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg); color: var(--tx); min-height: 100vh;
            transition: background 0.5s ease; overflow-x: hidden;
        }
        /* ===== HEADER ===== */
        .hd {
            background: linear-gradient(135deg, var(--p) 0%, var(--s) 50%, var(--s)cc 100%);
            color: #fff; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            transition: background 0.5s ease;
        }
        .hd-in { max-width: 1280px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
        .lg { display: flex; align-items: center; gap: 12px; }
        .lg-ic { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .lg-t h1 { font-size: 17px; font-weight: 700; line-height: 1.3; }
        .lg-t p { font-size: 11px; opacity: 0.8; font-weight: 300; }
        .tb { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 30px; }
        .tb-l { font-size: 12px; opacity: 0.9; margin-right: 4px; }
        .tb-btn {
            width: 32px; height: 32px; border: 2px solid transparent; border-radius: 50%; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
            transition: all 0.3s; position: relative;
        }
        .tb-btn:hover { transform: scale(1.2); background: rgba(255,255,255,0.25); }
        .tb-btn.on { border-color: #fff; background: rgba(255,255,255,0.3); transform: scale(1.1); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
        .tb-btn .tp { position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75);
            color: #fff; padding: 3px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .tb-btn:hover .tp { opacity: 1; }
        /* ===== MAIN ===== */
        .mn { max-width: 1280px; margin: 0 auto; padding: 20px 24px; display: grid; grid-template-columns: 360px 1fr; gap: 20px; min-height: calc(100vh - 64px); }
        .sd { display: flex; flex-direction: column; gap: 14px; }
        /* ===== CARD ===== */
        .cd { background: var(--cd); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; transition: box-shadow 0.3s; }
        .cd:hover { box-shadow: var(--sh-h); }
        .cd-h {
            padding: 13px 18px; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid #f0f0f0; color: var(--p); transition: color 0.3s;
        }
        .cd-h .ic { font-size: 17px; }
        .bdg { margin-left: auto; background: var(--p); color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: 500; transition: background 0.3s; }
        .cd-b { padding: 12px 18px; }
        /* ===== GRADES ===== */
        .g-g { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .g-btn {
            padding: 12px 6px; border: 2px solid #eee; border-radius: var(--rs); text-align: center; cursor: pointer;
            transition: all 0.3s; background: #fff; font-family: inherit; position: relative; overflow: hidden;
        }
        .g-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--p), var(--s)); opacity: 0; transition: opacity 0.3s; }
        .g-btn:hover { border-color: var(--s); transform: translateY(-2px); }
        .g-btn.on { border-color: var(--p); color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .g-btn.on::after { opacity: 1; }
        .g-btn .num { font-size: 18px; font-weight: 900; position: relative; z-index: 1; }
        .g-btn .lbl { font-size: 11px; opacity: 0.8; margin-top: 2px; position: relative; z-index: 1; }
        /* ===== UNITS ===== */
        .u-g { display: flex; flex-wrap: wrap; gap: 7px; }
        .u-ch {
            padding: 6px 13px; border: 2px solid #eee; border-radius: 20px; cursor: pointer; transition: all 0.3s;
            font-size: 13px; background: #fff; font-family: inherit; color: var(--tx); white-space: nowrap;
        }
        .u-ch:hover { border-color: var(--s); background: var(--bg); }
        .u-ch.on { border-color: var(--p); background: var(--p); color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        .u-ch .ct { font-size: 10px; opacity: 0.7; margin-left: 3px; }
        /* ===== WORDS ===== */
        .w-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; margin-bottom: 6px; }
        .w-bl { display: flex; align-items: center; gap: 8px; }
        .cb {
            width: 22px; height: 22px; border: 2px solid #ccc; border-radius: 6px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.25s; flex-shrink: 0;
        }
        .cb.ck { background: var(--p); border-color: var(--p); }
        .cb.ck::after { content: '✓'; color: #fff; font-size: 14px; font-weight: 700; }
        .w-bl span { font-size: 13px; color: var(--tx2); cursor: pointer; }
        .w-bar .ct { font-weight: 700; color: var(--p); font-size: 14px; }
        .q-btns { display: flex; gap: 6px; margin-bottom: 8px; }
        .q-btn {
            padding: 5px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 12px;
            cursor: pointer; background: #fff; font-family: inherit; color: var(--tx2); transition: all 0.2s;
        }
        .q-btn:hover { border-color: var(--p); color: var(--p); }
        .w-sc { max-height: 360px; overflow-y: auto; padding-right: 4px; }
        .w-sc::-webkit-scrollbar { width: 4px; }
        .w-sc::-webkit-scrollbar-thumb { background: var(--s); border-radius: 4px; }
        .w-it {
            display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-radius: var(--rs);
            cursor: pointer; transition: all 0.2s; border: 2px solid transparent; margin-bottom: 2px;
        }
        .w-it:hover { background: var(--bg); }
        .w-it.sel { background: var(--bg); border-color: var(--p); }
        .w-it .wc {
            width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 5px; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;
        }
        .w-it.sel .wc { background: var(--p); border-color: var(--p); }
        .w-it.sel .wc::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }
        .w-it .wb { flex: 1; min-width: 0; }
        .w-it .we { font-size: 15px; font-weight: 600; font-family: Georgia, 'Times New Roman', serif; }
        .w-it .wz { font-size: 12px; color: var(--tx2); margin-top: 1px; }
        /* ===== RIGHT ===== */
        .rp { display: flex; flex-direction: column; gap: 14px; }
        .s-r { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
        .s-g { display: flex; align-items: center; gap: 6px; }
        .s-g label { font-size: 13px; color: var(--tx2); font-weight: 500; white-space: nowrap; }
        .s-sl {
            padding: 7px 12px; border: 2px solid #e0e0e0; border-radius: var(--rs); font-size: 13px;
            font-family: inherit; color: var(--tx); background: #fff; cursor: pointer; outline: none; transition: border-color 0.3s;
        }
        .s-sl:focus { border-color: var(--p); }
        .pb {
            flex: 1; background: var(--cd); border-radius: var(--r); box-shadow: var(--sh);
            display: flex; flex-direction: column; overflow: hidden; min-height: 500px;
        }
        .pb-h { padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; }
        .pb-h h3 { font-size: 14px; color: var(--p); display: flex; align-items: center; gap: 6px; }
        .cv {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 20px; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); overflow: auto;
        }
        .cv canvas { box-shadow: 0 8px 40px rgba(0,0,0,0.12); max-width: 100%; height: auto; border-radius: 4px; }
        .emp { text-align: center; padding: 60px 20px; color: #bbb; }
        .emp .e-ic { font-size: 72px; margin-bottom: 16px; opacity: 0.5; }
        .emp h3 { font-size: 18px; margin-bottom: 8px; color: #ccc; font-weight: 500; }
        .emp p { font-size: 13px; line-height: 1.6; }
        .emp .st { margin-top: 20px; text-align: left; display: inline-block; }
        .emp .stp { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; color: #aaa; }
        .emp .st-n { width: 24px; height: 24px; background: var(--lt); color: var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
        .ab {
            background: var(--cd); border-radius: var(--r); box-shadow: var(--sh);
            padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
        }
        .ai { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .ai .i { font-size: 13px; color: var(--tx2); }
        .ai .i strong { color: var(--p); font-size: 15px; }
        .ab-b { display: flex; gap: 10px; }
        .btn {
            padding: 10px 20px; border: none; border-radius: var(--rs); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .btn:active { transform: translateY(0); }
        .btn-p { background: linear-gradient(135deg, var(--p), var(--s)); color: #fff; }
        .btn-o { background: #fff; color: var(--p); border: 2px solid var(--p); }
        .btn-g { background: transparent; color: var(--tx2); }
        .btn-g:hover { background: var(--bg); }
        .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }
        /* ===== TOAST ===== */
        .tw { position: fixed; top: 80px; right: 24px; z-index: 1000; }
        .ts {
            background: #fff; padding: 14px 22px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: flex; align-items: center; gap: 10px; font-size: 14px;
            transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border-left: 4px solid var(--p);
        }
        .ts.sh { transform: translateX(0); }
        /* ===== LOADER ===== */
        .ld {
            position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s;
        }
        .ld.dn { opacity: 0; pointer-events: none; }
        .sp { width: 48px; height: 48px; border: 4px solid var(--bg); border-top-color: var(--p); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ld p { margin-top: 16px; color: var(--tx2); font-size: 14px; }
        /* ===== ANIM ===== */
        @keyframes fu { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .cd { animation: fu 0.4s ease both; }
        .cd:nth-child(2) { animation-delay: 0.08s; }
        .cd:nth-child(3) { animation-delay: 0.16s; }
        /* ===== RWD ===== */
        @media (max-width: 960px) {
            .mn { grid-template-columns: 1fr; padding: 16px; }
            .lg-t p { display: none; }
            .tb-l { display: none; }
            .s-r { flex-direction: column; align-items: stretch; }
            .ab { flex-direction: column; }
            .ab-b { width: 100%; }
            .ab-b .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>

"种植；植物"},{"word":"air","meaning":"空气"},{"word":"fresh","meaning":"新鲜的"},{"word":"keep the air clean","meaning":"保持空气清新"}]},"unit5":{"name":"Unit 5 上册","words":[{"word":"clear","meaning":"晴朗的"},{"word":"rain","meaning":"雨；下雨"},{"word":"windy","meaning":"刮风的"},{"word":"heavy","meaning":"重的；大量的"},{"word":"strong wind","meaning":"大风"},{"word":"temperature","meaning":"温度"},{"word":"earth","meaning":"地球"},{"word":"protect","meaning":"保护"},{"word":"save water","meaning":"节约用水"},{"word":"reuse paper","meaning":"重复利用纸张"}]},"unit6":{"name":"Unit 6 上册","words":[{"word":"picnic","meaning":"野餐"},{"word":"bring","meaning":"带来"},{"word":"fruit","meaning":"水果"},{"word":"sausage","meaning":"香肠"},{"word":"meet","meaning":"碰面；遇见"},{"word":"gate","meaning":"大门"},{"word":"wanted","meaning":"想要（want过去式）"},{"word":"stood","meaning":"站立（stand过去式）"},{"word":"saw","meaning":"看见（see过去式）"},{"word":"went","meaning":"去（go过去式）"},{"word":"ate","meaning":"吃（eat过去式）"},{"word":"drank","meaning":"喝（drink过去式）"}]},"unit7":{"name":"Unit 7 上册","words":[{"word":"birthday party","meaning":"生日派对"},{"word":"invite","meaning":"邀请"},{"word":"have fun","meaning":"玩得开心"},{"word":"travel","meaning":"旅行"},{"word":"by plane","meaning":"乘飞机"},{"word":"by train","meaning":"乘火车"},{"word":"by ship","meaning":"乘轮船"}]},"unit8":{"name":"Unit 8 上册","words":[{"word":"shopping centre","meaning":"购物中心"},{"word":"cheap","meaning":"便宜的"},{"word":"expensive","meaning":"昂贵的"},{"word":"fit","meaning":"适合；合身"},{"word":"try on","meaning":"试穿"},{"word":"International Children's Day","meaning":"国际儿童节"},{"word":"celebrate","meaning":"庆祝"},{"word":"have a picnic","meaning":"去野餐"},{"word":"go to the museum","meaning":"去博物馆"}]},"unit9":{"name":"Unit 9 上册","words":[{"word":"see a doctor","meaning":"看医生"},{"word":"have a cold","meaning":"感冒"},{"word":"have a fever","meaning":"发烧"},{"word":"have a headache","meaning":"头疼"},{"word":"have a cough","meaning":"咳嗽"},{"word":"take medicine","meaning":"吃药"},{"word":"rest","meaning":"休息"},{"word":"fairy tale","meaning":"童话故事"},{"word":"science story","meaning":"科学故事"},{"word":"exciting","meaning":"令人兴奋的"},{"word":"boring","meaning":"无聊的"}]},"unit10":{"name":"Unit 10 上册","words":[{"word":"No littering","meaning":"禁止乱扔垃圾"},{"word":"keep off the grass","meaning":"请勿践踏草坪"},{"word":"be careful","meaning":"小心"},{"word":"wet floor","meaning":"地面湿滑"},{"word":"inventor","meaning":"发明家"},{"word":"invention","meaning":"发明"},{"word":"paper","meaning":"造纸术"},{"word":"printing","meaning":"印刷术"},{"word":"compass","meaning":"指南针"},{"word":"gunpowder","meaning":"火药"}]},"unit11":{"name":"Unit 11 上册","words":[{"word":"tomorrow","meaning":"明天"},{"word":"next week","meaning":"下周"},{"word":"see a film","meaning":"看电影"},{"word":"go boating","meaning":"去划船"},{"word":"dream","meaning":"梦想"},{"word":"astronaut","meaning":"宇航员"},{"word":"scientist","meaning":"科学家"},{"word":"want to be","meaning":"想要成为"},{"word":"come true","meaning":"实现"}]},"unit12":{"name":"Unit 12 上册","words":[{"word":"Christmas","meaning":"圣诞节"},{"word":"New Year","meaning":"新年"},{"word":"card","meaning":"卡片"},{"word":"dinner","meaning":"晚餐；正餐"},{"word":"farewell party","meaning":"告别派对"},{"word":"say goodbye","meaning":"道别"},{"word":"best wishes","meaning":"最美好的祝愿"},{"word":"keep in touch","meaning":"保持联系"}]}}}};
    let cg = null, cu = null, sel = new Set();
    
    const TH = {
        spring: { n:'春·清新绿', p:'#43A047', s:'#66BB6A', a:'#FF9800', bg:'#E8F5E9', l:'#4CAF50', t:'#C8E6C9' },
        summer: { n:'夏·海洋蓝', p:'#1E88E5', s:'#42A5F5', a:'#FF5722', bg:'#E3F2FD', l:'#2196F3', t:'#BBDEFB' },
        autumn: { n:'秋·暖阳橙', p:'#FB8C00', s:'#FFA726', a:'#D84315', bg:'#FFF3E0', l:'#FF9800', t:'#FFE0B2' },
        winter: { n:'冬·静谧灰', p:'#546E7A', s:'#78909C', a:'#3949AB', bg:'#ECEFF1', l:'#607D8B', t:'#CFD8DC' }
    };
    function gt() { const a=document.querySelector('.tb-btn.on'); return a?a.dataset.t:'spring'; }
    function gc() { return TH[gt()]; }
    
    // ==================== INIT ====================
    function init() {
        rG(); bE(); document.getElementById('ld').classList.add('dn');
    }
    
    // ==================== GRADES ====================
    function rG() {
        const c=document.getElementById('gG'); c.innerHTML='';
        // Dynamically iterate over all grade keys in order
        Object.keys(D).forEach(g => {
            const b=document.createElement('button');
            b.className='g-btn'+(cg===g?' on':'');
            // Extract grade number from key like "grade1" → "1" or use name
            const m=g.match(/\d+/);
            const num=m?m[0]:'?';
            b.innerHTML=`<div class="num">${num}</div><div class="lbl">${D[g].name||num+'年级'}</div>`;
            b.addEventListener('click',function(){ pG(g); });
            c.appendChild(b);
        });
    }
    
    function pG(g) { cg=g; cu=null; rG(); rU(); rW(); pv(); }
    
    // ==================== UNITS ====================
    function rU() {
        const c=document.getElementById('uG'), badge=document.getElementById('uB'); c.innerHTML='';
        if(!cg||!D[cg]){ badge.textContent='0 个单元'; return; }
        const units=D[cg].units, keys=Object.keys(units);
        badge.textContent=keys.length+' 个单元';
        keys.forEach(k => {
            const u=units[k], b=document.createElement('button');
            b.className='u-ch'+(cu===k?' on':'');
            const sn=u.name.replace('Unit ','U');
            b.innerHTML=`${sn} <span class="ct">(${u.words.length})</span>`;
            b.addEventListener('click',function(){ pU(k); });
            c.appendChild(b);
        });
    }
    
    function pU(u) { cu=u; rU(); rW(); pv(); }
    
    // ==================== WORDS ====================
    function rW() {
        const c=document.getElementById('wS'), cnt=document.getElementById('wC'); c.innerHTML='';
        if(!cg||!cu||!D[cg]){ cnt.textContent='0 个单词'; uC(); return; }
        const unit=D[cg].units[cu];
        if(!unit){ cnt.textContent='0 个单词'; uC(); return; }
        cnt.textContent=unit.words.length+' 个单词';
        
        unit.words.forEach((w,i) => {
            const key=cg+'_'+cu+'_'+i;
            const d=document.createElement('div');
            d.className='w-it'+(sel.has(key)?' sel':'');
            d.innerHTML=`<div class="wc"></div><div class="wb"><div class="we">${w.word}</div><div class="wz">${w.meaning}${w.phonetic?' · '+w.phonetic:''}</div></div>`;
            // Use closure to capture key correctly
            d.addEventListener('click',(function(k){ return function(){ tW(k); }; })(key));
            c.appendChild(d);
        });
        uC(); uCA();
    }
    
    function tW(key) {
        if(sel.has(key)) sel.delete(key); else sel.add(key);
        rW(); pv();
    }
    
    function sAU() {
        if(!cg||!cu||!D[cg]) return;
        const unit=D[cg].units[cu];
        if(!unit) return;
        unit.words.forEach((_,i)=>sel.add(cg+'_'+cu+'_'+i));
        rW(); pv();
    }
    
    function cAll() { sel.clear(); rW(); pv(); }
    
    function uC() {
        document.getElementById('sB').textContent='已选 '+sel.size+' 个';
        document.getElementById('tW').textContent=sel.size;
    }
    
    function uCA() {
        const box=document.getElementById('cA');
        if(!cg||!cu||!D[cg]){ box.classList.remove('ck'); return; }
        const unit=D[cg].units[cu];
        if(!unit){ box.classList.remove('ck'); return; }
        const all=unit.words.length>0&&unit.words.every((_,i)=>sel.has(cg+'_'+cu+'_'+i));
        box.classList.toggle('ck',all);
    }
    
    // ==================== THEME ====================
    function aT(theme) {
        const t=TH[theme], r=document.documentElement.style;
        r.setProperty('--p',t.p); r.setProperty('--s',t.s); r.setProperty('--a',t.a);
        r.setProperty('--bg',t.bg); r.setProperty('--ln',t.l); r.setProperty('--lt',t.t);
        document.getElementById('cT').textContent=t.n;
    }
    
    // ==================== CANVAS ====================
    function gW() {
        const words=[];
        sel.forEach(key => {
            const p=key.split('_'), g=p[0], u=p[1], idx=parseInt(p[2]);
            if(D[g]?.units[u]?.words[idx]) words.push(D[g].units[u].words[idx]);
        });
        return words;
    }
    
    function pv() {
        const words=gW(), cvs=document.getElementById('cvs'), emp=document.getElementById('emp');
        if(!words.length){ cvs.style.display='none'; emp.style.display='block'; return; }
        cvs.style.display='block'; emp.style.display='none';
        dS(cvs,words,false);
    }
    
    function dS(cvs,words,hiRes) {
        const tc=gc(), mode=document.getElementById('sM').value;
        const repeat=parseInt(document.getElementById('sR').value);
        const orient=document.getElementById('sO').value;
        const size=document.getElementById('sZ').value;
        
        const s=hiRes?1:0.5;
        let W,H;
        if(orient==='portrait'){ W=Math.round(2480*s); H=Math.round(3508*s); }
        else{ W=Math.round(3508*s); H=Math.round(2480*s); }
        cvs.width=W; cvs.height=H;
        
        const ctx=cvs.getContext('2d'), m=hiRes?2:1;
        let ts,ws,ms,ls;
        if(size==='small'){ ts=28*m; ws=48*m; ms=20*m; ls=18*m; }
        else if(size==='large'){ ts=40*m; ws=72*m; ms=28*m; ls=24*m; }
        else{ ts=34*m; ws=60*m; ms=24*m; ls=20*m; }
        
        const mg=60*m, lH=ws*1.8, bH=lH*(repeat+1)+20*m;
        
        ctx.fillStyle='#FFF'; ctx.fillRect(0,0,W,H);
        
        const hH=70*m, hg=ctx.createLinearGradient(0,0,W,0);
        hg.addColorStop(0,tc.p); hg.addColorStop(0.5,tc.s); hg.addColorStop(1,tc.t);
        ctx.fillStyle=hg; ctx.fillRect(0,0,W,hH);
        
        ctx.globalAlpha=0.08; ctx.fillStyle='#fff';
        [[W*0.08,hH*0.4,50*m],[W*0.92,hH*0.6,35*m],[W*0.85,hH*0.2,25*m]].forEach(([x,y,r])=>{
            ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha=1;
        
        ctx.fillStyle='#FFF';
        ctx.font='bold '+ts+'px "Noto Sans SC", sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('英语单词四线三格练习纸',W/2,hH/2-6*m);
        
        const mn={trace:'描红模式',copy:'临摹模式',dictation:'听写模式'};
        ctx.font=(ls-2*m)+'px "Noto Sans SC", sans-serif';
        ctx.fillStyle='rgba(255,255,255,0.8)';
        ctx.fillText('湘少版 · '+tc.n+' · '+mn[mode],W/2,hH/2+ts*0.65);
        
        let y=hH+30*m;
        ctx.fillStyle='#999'; ctx.font=ls+'px "Noto Sans SC", sans-serif';
        ctx.textAlign='left'; ctx.fillText('姓名：________________',mg,y);
        ctx.textAlign='right'; ctx.fillText('日期：________________',W-mg,y);
        ctx.textAlign='left';
        
        y+=18*m;
        ctx.strokeStyle=tc.t; ctx.lineWidth=1*m;
        ctx.beginPath(); ctx.moveTo(mg,y); ctx.lineTo(W-mg,y); ctx.stroke();
        y+=18*m;
        
        words.forEach((w,idx)=>{
            if(y+bH>H-40*m) return;
            ctx.fillStyle=tc.p;
            ctx.font='bold '+ls+'px "Noto Sans SC", sans-serif';
            ctx.textAlign='left';
            const lb=(idx+1)+'. '+w.word;
            ctx.fillText(lb,mg,y);
            
            ctx.fillStyle='#999'; ctx.font=(ls-3*m)+'px "Noto Sans SC", sans-serif';
            const lw=ctx.measureText(lb).width;
            ctx.fillText('('+w.meaning+')',mg+lw+8*m,y);
            
            if(w.phonetic&&hiRes){
                ctx.fillStyle=tc.s;
                const mw=ctx.measureText('('+w.meaning+')').width;
                ctx.fillText(w.phonetic,mg+lw+8*m+mw+8*m,y);
            }
            y+=ls+8*m;
            
            for(let r=0;r<repeat+1;r++){
                const top=y, bot=y+lH;
                ctx.strokeStyle=tc.l; ctx.lineWidth=1*m;
                ctx.beginPath(); ctx.moveTo(mg,top); ctx.lineTo(W-mg,top); ctx.stroke();
                ctx.setLineDash([5*m,3*m]);
                ctx.beginPath(); ctx.moveTo(mg,top+lH*0.5); ctx.lineTo(W-mg,top+lH*0.5); ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath(); ctx.moveTo(mg,bot); ctx.lineTo(W-mg,bot); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(mg,bot+4*m); ctx.lineTo(W-mg,bot+4*m); ctx.stroke();
                
                if(r===0&&mode==='trace'){
                    ctx.fillStyle=tc.t; ctx.font=ws+'px "Georgia","Times New Roman",serif';
                    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
                    ctx.fillText(w.word,mg+20*m,bot-6*m);
                }else if(r===0&&mode==='copy'){
                    ctx.fillStyle='#333'; ctx.font=ws+'px "Georgia","Times New Roman",serif';
                    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
                    ctx.fillText(w.word,mg+20*m,bot-6*m);
                }
                y=bot+8*m;
            }
            y+=12*m;
        });
        
        ctx.fillStyle='#ccc'; ctx.font=(12*m)+'px "Noto Sans SC", sans-serif';
        ctx.textAlign='center';
        ctx.fillText('英语单词四线三格练习纸生成器 · 湘少版教材同步',W/2,H-18*m);
    }
    
    // ==================== EXPORT ====================
    function ePNG() {
        const words=gW();
        if(!words.length){ ts2('⚠️','请先选择要导出的单词'); return; }
        const c=document.createElement('canvas');
        dS(c,words,true);
        const a=document.createElement('a');
        a.download='练习纸_'+gc().n+'_'+new Date().toLocaleDateString().replace(/\//g,'-')+'.png';
        a.href=c.toDataURL('image/png'); a.click();
        ts2('✅','练习纸已导出为 PNG 图片！');
    }
    
    function prP() {
        const words=gW();
        if(!words.length){ ts2('⚠️','请先选择要打印的单词'); return; }
        const c=document.createElement('canvas');
        dS(c,words,true);
        const url=c.toDataURL('image/png');
        const w=window.open('','_blank');
        w.document.write('<!DOCTYPE html><html><head><title>练习纸打印</title><style>@page{size:'+(document.getElementById('sO').value==='landscape'?'A4 landscape':'A4 portrait')+';margin:0}body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}img{max-width:100%;max-height:100vh}@media print{body{display:block}img{width:100%;height:auto}}</style></head><body><img src="'+url+'" onload="window.print()"></body></html>');
        w.document.close();
    }
    
    function ts2(icon,msg) {
        document.getElementById('tsI').textContent=icon;
        document.getElementById('tsM').textContent=msg;
        const t=document.getElementById('ts');
        t.classList.add('sh');
        setTimeout(()=>t.classList.remove('sh'),2500);
    }
    
    // ==================== EVENTS ====================
    function bE() {
        document.querySelectorAll('.tb-btn').forEach(b=>{
            b.addEventListener('click',()=>{
                document.querySelectorAll('.tb-btn').forEach(x=>x.classList.remove('on'));
                b.classList.add('on'); aT(b.dataset.t); pv();
                ts2('🎨','已切换到「'+TH[b.dataset.t].n+'」主题');
            });
        });
        document.getElementById('cA').addEventListener('click',sAU);
        document.getElementById('cAL').addEventListener('click',sAU);
        document.getElementById('bSA').addEventListener('click',sAU);
        document.getElementById('bCA').addEventListener('click',function(){ cAll(); ts2('🗑️','已清空所有选择'); });
        ['sM','sR','sO','sZ'].forEach(id=>{ document.getElementById(id).addEventListener('change',pv); });
        document.getElementById('bR').addEventListener('click',pv);
        document.getElementById('bE').addEventListener('click',ePNG);
        document.getElementById('bP').addEventListener('click',prP);
    }
    
    init();
    </script>
