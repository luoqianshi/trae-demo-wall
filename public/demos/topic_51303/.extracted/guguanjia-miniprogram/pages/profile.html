<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的</title>
    <style id="theme-vars">
/* ===== 菇管家小程序 — Brand Design Tokens ===== */
:root {
  /* — Color System — */
  --color-bg: #f5f5f5;
  --color-bg-elevated: #ffffff;
  --color-bg-deep: #f0f0f0;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-muted: #999999;
  --color-text-placeholder: #bbbbbb;
  --color-rule: #e5e5e5;

  /* Brand — Green (Primary) */
  --color-primary: #07c160;
  --color-primary-light: #e8f5e9;
  --color-primary-dark: #06ad56;

  /* State Colors */
  --state-success: #07c160;
  --state-success-light: #e8f5e9;
  --state-warning: #fa9d3b;
  --state-warning-light: #fff3e0;
  --state-error: #fa5151;
  --state-error-light: #ffebee;
  --state-info: #10aeff;
  --state-info-light: #e3f2fd;

  /* — Typography — */
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  /* Type Scale */
  --text-display: 48px;
  --text-display-weight: 700;
  --text-h1: 32px;
  --text-h1-weight: 700;
  --text-h2: 24px;
  --text-h2-weight: 700;
  --text-h3: 20px;
  --text-h3-weight: 600;
  --text-h4: 18px;
  --text-h4-weight: 600;
  --text-page-title: 18px;
  --text-page-title-weight: 600;
  --text-card-title: 16px;
  --text-card-title-weight: 600;
  --text-body: 15px;
  --text-body-weight: 400;
  --text-body-secondary: 14px;
  --text-body-secondary-weight: 400;
  --text-caption: 12px;
  --text-caption-weight: 400;
  --text-micro: 11px;
  --text-micro-weight: 400;

  /* Line Heights */
  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* — Spacing — */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* — Radius — */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* — Shadows — */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);

  /* — Interactive — */
  --control-height: 48px;
  --control-height-sm: 40px;
  --control-height-lg: 56px;
  --icon-touch-target: 44px;
  --page-padding: 12px;
  --card-padding: 14px;
  --card-gap: 10px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

                    </div>
                    <div class="arrow-right">›</div>
                </div>
                <div class="settings-item">

                        <span class="settings-icon">📞</span>
                        <span class="settings-label">一键求助</span>
                    </div>
                    <div class="arrow-right">›</div>
                </div>
                <div class="settings-item settings-item-last">
                    <div class="settings-item-left">
                        <span class="settings-icon">📤</span>

                    </div>

            </div>

            <!-- Footer Version -->
            <div class="footer-version">菇管家 v1.2.0</div>
        </div>

        <!-- Bottom Tab Bar -->
        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <button class="tab-item" data-dom-id="tab-home">
                    <span class="tab-icon">🏠</span>
                    <span class="tab-label">首页</span>
                </button>
                <button class="tab-item" data-dom-id="tab-ai">
                    <span class="tab-icon">🤖</span>
                    <span class="tab-label">AI助手</span>
                </button>
                <button class="tab-item" data-dom-id="tab-archive">
                    <span class="tab-icon">📁</span>
                    <span class="tab-label">档案</span>
                </button>
                <button class="tab-item tab-active" data-dom-id="tab-profile">
                    <span class="tab-icon">👤</span>
                    <span class="tab-label tab-label-active">我的</span>
                </button>
            </nav>
            <div class="safe-area-bottom"></div>
        </div>

    <!-- Page-specific styles (pure CSS, no Tailwind) -->
    <style>
        /* ===== Profile Page — Pure CSS ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .profile-page {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            padding-bottom: 84px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Status Bar */
        .status-bar {
            height: 44px;
            background: var(--color-bg-elevated);
        }

        /* Navigation Header */
        .nav-header {
            display: flex;
            align-items: center;
            height: 44px;
            padding: 0 var(--page-padding);
            background: var(--color-bg-elevated);
            border-bottom: 1px solid var(--color-rule);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .nav-left {
            width: 88px;
            flex-shrink: 0;
        }

        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            line-height: var(--leading-snug);
            color: var(--color-text-primary);
            letter-spacing: -0.02em;
        }

        .nav-capsule {
            width: 88px;
            height: 32px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            border: 1px solid var(--color-rule);
            border-radius: var(--radius-full);
            background: var(--color-bg-elevated);
            overflow: hidden;
        }

        .capsule-btn {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-text-primary);
            font-size: 14px;
            line-height: 1;
        }

        .capsule-divider {
            width: 1px;
            height: 16px;
            background: var(--color-rule);
            flex-shrink: 0;
        }

        .icon-dots {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .icon-x {
            font-size: 12px;
        }

        /* Content Area */
        .content-area {
            padding: var(--page-padding);
        }

        /* Card */
        .card {
            background: var(--color-bg-elevated);
            border-radius: var(--radius-md);
            margin-bottom: var(--card-gap);
            border: 1px solid var(--color-rule);
        }

        /* User Card */
        .user-card {
            padding: var(--card-padding);
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-full);
            background: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            color: #fff;
        }

        .user-detail {
            flex: 1;
            min-width: 0;
            margin-left: var(--space-md);
        }

        .user-name {
            font-size: 16px;
            font-weight: 600;
            line-height: var(--leading-snug);
            color: var(--color-text-primary);
        }

        .user-phone {
            font-size: 12px;
            font-weight: 400;
            line-height: var(--leading-normal);
            color: var(--color-text-muted);
            margin-top: 2px;
        }

        .arrow-right {
            flex-shrink: 0;
            font-size: 18px;
            color: var(--color-text-placeholder);
            margin-left: var(--space-sm);
            line-height: 1;
        }

        /* Device Card */
        .device-card {
            padding: 0;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--card-padding) var(--card-padding) var(--space-sm) var(--card-padding);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-primary);
            line-height: var(--leading-snug);
        }

        .add-link {
            font-size: 13px;
            font-weight: 400;
            color: var(--color-primary);
            background: none;
            border: none;
            cursor: pointer;
            line-height: 1;
            padding: 4px 0;
        }

        .card-list {
            padding: 0;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md) var(--card-padding);
            border-bottom: 1px solid var(--color-rule);
            min-height: 56px;
        }

        .list-item-last {
            border-bottom: none;
        }

        .list-item-left {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
        }

        .device-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-right: var(--space-sm);
        }

        .list-item-text {
            font-size: 15px;
            font-weight: 400;
            color: var(--color-text-primary);
            line-height: var(--leading-normal);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .list-item-right {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            margin-left: var(--space-sm);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
        }

        .status-online {
            background: var(--state-success);
        }

        .status-offline {
            background: var(--state-error);
        }

        .status-text {
            font-size: 12px;
            margin-left: var(--space-xs);
            line-height: 1;
        }

        .status-online-text {
            color: var(--state-success);
        }

        .status-offline-text {
            color: var(--state-error);
        }

        .list-item-right .arrow-right {
            margin-left: var(--space-sm);
        }

        /* Settings Card (no padding, flush items) */
        .settings-card {
            padding: 0;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--card-padding);
            height: 56px;
            border-bottom: 1px solid var(--color-rule);
        }

        .settings-item-last {
            border-bottom: none;
        }

        .settings-item-left {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
        }

        .settings-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-right: var(--space-sm);
        }

        .settings-label {
            font-size: 15px;
            font-weight: 400;
            color: var(--color-text-primary);
            line-height: var(--leading-normal);
        }

        /* Footer Version */
        .footer-version {
            text-align: center;
            font-size: 12px;
            color: var(--color-text-muted);
            padding-top: var(--space-3xl);
            padding-bottom: var(--space-2xl);
            line-height: 1;
        }

        /* Tab Bar */
        .tab-bar-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
            background: var(--color-bg-elevated);
            border-top: 1px solid var(--color-rule);
        }

        .tab-bar {
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: 50px;
            padding: 0;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 0;
            min-width: 60px;
            gap: 2px;
        }

        .tab-icon {
            font-size: 20px;
            line-height: 1;
        }

        .tab-label {
            font-size: 10px;
            color: var(--color-text-muted);
            line-height: 1;
        }

        .tab-label-active {
            color: var(--color-primary);
            font-weight: 600;
        }

        .tab-active .tab-icon {
            /* Keep emoji as-is for the active tab */
        }

        .safe-area-bottom {
            height: 34px;
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
