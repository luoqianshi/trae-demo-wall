<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 · 离线状态</title>
    <style id="theme-vars">
/* ===== 菇管家小程序 — Brand Design Tokens ===== */
:root {
  /* — Color System — */
  --color-bg: #f5f5f5;
  --color-bg-elevated: #ffffff;
  --color-bg-deep: #f0f0f0;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-muted: #999999;
  --color-text-placeholder: #bbbbbb;
  --color-rule: #e5e5e5;

  /* Brand — Green (Primary) */
  --color-primary: #07c160;
  --color-primary-light: #e8f5e9;
  --color-primary-dark: #06ad56;

  /* State Colors */
  --state-success: #07c160;
  --state-success-light: #e8f5e9;
  --state-warning: #fa9d3b;
  --state-warning-light: #fff3e0;
  --state-error: #fa5151;
  --state-error-light: #ffebee;
  --state-info: #10aeff;
  --state-info-light: #e3f2fd;

  /* — Typography — */
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  /* Type Scale */
  --text-display: 48px;
  --text-display-weight: 700;
  --text-h1: 32px;
  --text-h1-weight: 700;
  --text-h2: 24px;
  --text-h2-weight: 700;
  --text-h3: 20px;
  --text-h3-weight: 600;
  --text-h4: 18px;
  --text-h4-weight: 600;
  --text-page-title: 18px;
  --text-page-title-weight: 600;
  --text-card-title: 16px;
  --text-card-title-weight: 600;
  --text-body: 15px;
  --text-body-weight: 400;
  --text-body-secondary: 14px;
  --text-body-secondary-weight: 400;
  --text-caption: 12px;
  --text-caption-weight: 400;
  --text-micro: 11px;
  --text-micro-weight: 400;

  /* Line Heights */
  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* — Spacing — */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* — Radius — */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* — Shadows — */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);

  /* — Interactive — */
  --control-height: 48px;
  --control-height-sm: 40px;
  --control-height-lg: 56px;
  --icon-touch-target: 44px;
  --page-padding: 12px;
  --card-padding: 14px;
  --card-gap: 10px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--color-bg); font-family: var(--font-body);">
    <main style="max-width: 375px; margin: 0 auto; min-height: 812px; display: flex; flex-direction: column; background: var(--color-bg);">

      <!-- Status Bar -->
      <div style="height: 44px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 4px; font-size: 12px; font-weight: 600; color: var(--color-text-primary);">
        <span>9:41</span>
        <div style="display: flex; align-items: center; gap: 4px;">
          <i data-lucide="signal" style="width: 14px; height: 14px;"></i>
          <i data-lucide="wifi" style="width: 14px; height: 14px;"></i>
          <i data-lucide="battery-full" style="width: 14px; height: 14px;"></i>
        </div>
      </div>

      <!-- Navigation Header -->
      <header style="height: 44px; display: flex; align-items: center; padding: 0 12px; position: relative; background: var(--color-bg-elevated);">
        <div style="width: 88px; display: flex; align-items: center; justify-content: flex-start;">
        </div>
        <div style="flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">2号棚 · 香菇</div>
        <div style="width: 88px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 9999px; border: 1px solid var(--color-rule); background: rgba(255,255,255,0.9);">
          <button style="flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer;" aria-label="更多">
            <i data-lucide="more-horizontal" style="width: 16px; height: 16px; color: var(--color-text-primary);"></i>
          </button>
          <span style="width: 1px; height: 16px; background: var(--color-rule);" aria-hidden="true"></span>
          <button style="flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer;" aria-label="关闭">
            <i data-lucide="x" style="width: 16px; height: 16px; color: var(--color-text-primary);"></i>
          </button>
        </div>
      </header>

      <!-- Scrollable Content Area -->
      <div style="flex: 1; overflow-y: auto; padding: 0 16px 16px;">

        <!-- Offline Empty State Illustration -->
        <section style="display: flex; flex-direction: column; align-items: center; padding-top: 48px; padding-bottom: 32px;">
          <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--color-bg-deep); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; position: relative;">
            <i data-lucide="wifi-off" style="width: 36px; height: 36px; color: var(--color-text-muted);"></i>
          </div>
          <p style="font-size: 18px; font-weight: 600; color: var(--color-text-primary); margin: 0 0 6px;">设备已离线</p>
          <p style="font-size: 13px; color: var(--color-text-muted); margin: 0;">最后在线：06-30 02:15</p>
        </section>

        <!-- View Cached Data Button -->
        <section style="display: flex; justify-content: center; padding-bottom: 24px;">
          <button style="height: 48px; padding: 0 24px; border-radius: var(--radius-md); border: 1px solid var(--color-rule); background: var(--color-bg-elevated); color: var(--color-text-primary); font-size: 15px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; transition: background-color 160ms cubic-bezier(.2,.8,.2,1);" onmouseover="this.style.background='var(--color-bg-deep)'" onmouseout="this.style.background='var(--color-bg-elevated)'">
            查看缓存数据
          </button>
        </section>

        <!-- Cached Data Card (muted) -->
        <section style="opacity: 0.6; background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: 16px; margin-bottom: 16px;">
          <p style="font-size: 12px; color: var(--color-text-muted); margin: 0 0 12px; font-weight: 500;">缓存数据（12小时前）</p>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div style="display: flex; flex-direction: column; align-items: center; padding: 12px; border-radius: var(--radius-sm); background: var(--color-bg);">
              <span style="font-size: 24px; font-weight: 700; color: var(--color-text-primary); font-variant-numeric: tabular-nums;">21.0°C</span>
              <span style="font-size: 12px; color: var(--color-text-secondary); margin-top: 4px;">温度</span>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; padding: 12px; border-radius: var(--radius-sm); background: var(--color-bg);">
              <span style="font-size: 24px; font-weight: 700; color: var(--color-text-primary); font-variant-numeric: tabular-nums;">65%</span>
              <span style="font-size: 12px; color: var(--color-text-secondary); margin-top: 4px;">湿度</span>
            </div>
          </div>
        </section>

        <!-- Troubleshooting Tip -->
        <section style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: 16px; border-left: 3px solid var(--color-primary); margin-bottom: 100px;">
          <div style="display: flex; align-items: flex-start; gap: 10px;">
            <i data-lucide="info" style="width: 18px; height: 18px; color: var(--color-primary); flex-shrink: 0; margin-top: 1px;"></i>
            <p style="font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin: 0;">
              <span style="font-weight: 600; color: var(--color-text-primary);">可能原因：</span>设备没电 / 网络信号差 / 设备被移动。请检查设备太阳能板是否被遮挡。
            </p>
          </div>
        </section>

      </div>

      <!-- Bottom Tab Bar -->
      <nav style="position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 375px; background: var(--color-bg-elevated); border-top: 1px solid var(--color-rule); display: flex; align-items: center; justify-content: space-around; height: 50px; z-index: 30;">
        <a href="#" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; text-decoration: none; color: var(--color-primary); width: 25%;" aria-label="首页" aria-current="page">
          <i data-lucide="home" style="width: 22px; height: 22px;"></i>
          <span style="font-size: 10px; font-weight: 500;">首页</span>
        </a>
        <a href="#" data-dom-id="tab-ai" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; text-decoration: none; color: var(--color-text-muted); width: 25%;" aria-label="AI助手">
          <i data-lucide="bot" style="width: 22px; height: 22px;"></i>
          <span style="font-size: 10px; font-weight: 400;">AI助手</span>
        </a>
        <a href="#" data-dom-id="tab-archive" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; text-decoration: none; color: var(--color-text-muted); width: 25%;" aria-label="档案">
          <i data-lucide="folder-open" style="width: 22px; height: 22px;"></i>
          <span style="font-size: 10px; font-weight: 400;">档案</span>
        </a>
        <a href="#" data-dom-id="tab-profile" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; text-decoration: none; color: var(--color-text-muted); width: 25%;" aria-label="我的">
          <i data-lucide="user" style="width: 22px; height: 22px;"></i>
          <span style="font-size: 10px; font-weight: 400;">我的</span>
        </a>
      </nav>

      <!-- Safe Area Bottom -->
      <div style="height: 34px;"></div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
