<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>种植档案</title>
    <style id="theme-vars">
/* ===== 菇管家小程序 — Brand Design Tokens ===== */
:root {
  /* — Color System — */
  --color-bg: #f5f5f5;
  --color-bg-elevated: #ffffff;
  --color-bg-deep: #f0f0f0;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-muted: #999999;
  --color-text-placeholder: #bbbbbb;
  --color-rule: #e5e5e5;

  /* Brand — Green (Primary) */
  --color-primary: #07c160;
  --color-primary-light: #e8f5e9;
  --color-primary-dark: #06ad56;

  /* State Colors */
  --state-success: #07c160;
  --state-success-light: #e8f5e9;
  --state-warning: #fa9d3b;
  --state-warning-light: #fff3e0;
  --state-error: #fa5151;
  --state-error-light: #ffebee;
  --state-info: #10aeff;
  --state-info-light: #e3f2fd;

  /* — Typography — */
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  /* Type Scale */
  --text-display: 48px;
  --text-display-weight: 700;
  --text-h1: 32px;
  --text-h1-weight: 700;
  --text-h2: 24px;
  --text-h2-weight: 700;
  --text-h3: 20px;
  --text-h3-weight: 600;
  --text-h4: 18px;
  --text-h4-weight: 600;
  --text-page-title: 18px;
  --text-page-title-weight: 600;
  --text-card-title: 16px;
  --text-card-title-weight: 600;
  --text-body: 15px;
  --text-body-weight: 400;
  --text-body-secondary: 14px;
  --text-body-secondary-weight: 400;
  --text-caption: 12px;
  --text-caption-weight: 400;
  --text-micro: 11px;
  --text-micro-weight: 400;

  /* Line Heights */
  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* — Spacing — */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* — Radius — */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* — Shadows — */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);

  /* — Interactive — */
  --control-height: 48px;
  --control-height-sm: 40px;
  --control-height-lg: 56px;
  --icon-touch-target: 44px;
  --page-padding: 12px;
  --card-padding: 14px;
  --card-gap: 10px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen pb-[84px]">
      <!-- Status bar spacer -->
      <div class="h-11" style="background: var(--color-bg-elevated);"></div>

      <!-- Navigation bar -->
      <header class="sticky top-0 z-30" style="background: var(--color-bg-elevated); border-bottom: 1px solid var(--color-rule);">
        <div class="flex items-center justify-between px-4" style="height: 44px;">
          <!-- Left balancing area -->
          <div class="flex items-center" style="width: 88px;">
            <div style="width: 32px;"></div>
          </div>
          <!-- Centered title -->
          <h1 class="flex-1 text-center" style="font-size: var(--text-page-title); font-weight: var(--text-page-title-weight); color: var(--color-text-primary); letter-spacing: -0.02em;">种植档案</h1>
          <!-- Right: search icon + system capsule -->
          <div class="flex items-center gap-2" style="width: 88px; justify-content: flex-end;">
            <button class="inline-flex items-center justify-center" style="width: 32px; height: 32px; color: var(--color-text-secondary);" aria-label="搜索">
              <i data-lucide="search" style="width: 18px; height: 18px;"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Filter tags row -->
      <div class="flex items-center gap-2 px-4 py-3 no-scrollbar overflow-x-auto" style="background: var(--color-bg-elevated);">
        <button class="inline-flex items-center justify-center shrink-0 whitespace-nowrap" style="padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--text-caption); font-weight: var(--text-card-title-weight); background: var(--color-primary); color: var(--color-bg-elevated); height: 28px;">全部</button>
        <button class="inline-flex items-center justify-center shrink-0 whitespace-nowrap" style="padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--text-caption); font-weight: 400; background: var(--color-bg-deep); color: var(--color-text-secondary); height: 28px;">菌丝期</button>
        <button class="inline-flex items-center justify-center shrink-0 whitespace-nowrap" style="padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--text-caption); font-weight: 400; background: var(--color-bg-deep); color: var(--color-text-secondary); height: 28px;">转色期</button>
        <button class="inline-flex items-center justify-center shrink-0 whitespace-nowrap" style="padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--text-caption); font-weight: 400; background: var(--color-bg-deep); color: var(--color-text-secondary); height: 28px;">出菇期</button>
        <button class="inline-flex items-center justify-center shrink-0 whitespace-nowrap" style="padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--text-caption); font-weight: 400; background: var(--color-bg-deep); color: var(--color-text-secondary); height: 28px;">已采收</button>
      </div>

      <!-- Card list -->
      <div class="flex flex-col gap-3 px-3 pt-3" style="background: var(--color-bg);">

        <!-- Batch card 1 — 转色期 -->
        <section class="flex flex-col" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); box-shadow: var(--shadow-card);">
          <!-- Header row -->
          <div class="flex items-start justify-between gap-2">
            <div class="flex flex-col min-w-0">
              <h2 class="truncate" style="font-size: var(--text-card-title); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug);">批次 #2026-A001</h2>
              <span class="truncate" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal); margin-top: 2px;">香菇 · 1号棚</span>
            </div>
            <span class="inline-flex items-center justify-center shrink-0 whitespace-nowrap" style="padding: 2px 8px; border-radius: var(--radius-full); font-size: var(--text-caption); font-weight: var(--text-card-title-weight); background: var(--color-primary-light); color: var(--color-primary); height: 22px;">转色期</span>
          </div>
          <!-- Metrics row -->
          <div class="flex items-stretch gap-2 mt-3" style="background: var(--color-bg); border-radius: var(--radius-sm); padding: var(--space-sm) var(--space-md);">
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">进棚</span>
              <span style="font-size: var(--text-body-secondary); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug); margin-top: 2px; font-variant-numeric: tabular-nums;">06-12</span>
            </div>
            <div style="width: 1px; background: var(--color-rule);"></div>
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">天数</span>
              <span style="font-size: var(--text-body-secondary); font-weight: var(--text-card-title-weight); color: var(--color-primary); line-height: var(--leading-snug); margin-top: 2px; font-variant-numeric: tabular-nums;">第18天</span>
            </div>
            <div style="width: 1px; background: var(--color-rule);"></div>
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">预计采收</span>
              <span style="font-size: var(--text-body-secondary); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug); margin-top: 2px; font-variant-numeric: tabular-nums;">07-20</span>
            </div>
          </div>
          <!-- Footer -->
          <div class="flex items-center mt-3" style="padding-top: var(--space-sm); border-top: 1px solid var(--color-rule);">
            <span class="truncate" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal);">最近操作：06-30 10:23 绿霉病防治处理</span>
          </div>
        </section>

        <!-- Batch card 2 — 出菇期 -->
        <section class="flex flex-col" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); box-shadow: var(--shadow-card);">
          <!-- Header row -->
          <div class="flex items-start justify-between gap-2">
            <div class="flex flex-col min-w-0">
              <h2 class="truncate" style="font-size: var(--text-card-title); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug);">批次 #2026-A002</h2>
              <span class="truncate" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal); margin-top: 2px;">平菇 · 3号棚</span>
            </div>
            <span class="inline-flex items-center justify-center shrink-0 whitespace-nowrap" style="padding: 2px 8px; border-radius: var(--radius-full); font-size: var(--text-caption); font-weight: var(--text-card-title-weight); background: var(--state-warning-light); color: var(--state-warning); height: 22px;">出菇期</span>
          </div>
          <!-- Metrics row -->
          <div class="flex items-stretch gap-2 mt-3" style="background: var(--color-bg); border-radius: var(--radius-sm); padding: var(--space-sm) var(--space-md);">
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">进棚</span>
              <span style="font-size: var(--text-body-secondary); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug); margin-top: 2px; font-variant-numeric: tabular-nums;">06-01</span>
            </div>
            <div style="width: 1px; background: var(--color-rule);"></div>
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">天数</span>
              <span style="font-size: var(--text-body-secondary); font-weight: var(--text-card-title-weight); color: var(--state-warning); line-height: var(--leading-snug); margin-top: 2px; font-variant-numeric: tabular-nums;">第29天</span>
            </div>
            <div style="width: 1px; background: var(--color-rule);"></div>
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">预计采收</span>
              <span style="font-size: var(--text-body-secondary); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug); margin-top: 2px; font-variant-numeric: tabular-nums;">07-05</span>
            </div>
          </div>
          <!-- Footer -->
          <div class="flex items-center mt-3" style="padding-top: var(--space-sm); border-top: 1px solid var(--color-rule);">
            <span class="truncate" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal);">最近操作：06-29 16:00 开启喷雾增湿</span>
          </div>
        </section>

        <!-- Batch card 3 — 已采收 (faded) -->
        <section class="flex flex-col" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); box-shadow: var(--shadow-card); opacity: 0.7;">
          <!-- Header row -->
          <div class="flex items-start justify-between gap-2">
            <div class="flex flex-col min-w-0">
              <h2 class="truncate" style="font-size: var(--text-card-title); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug);">批次 #2026-A003</h2>
              <span class="truncate" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal); margin-top: 2px;">香菇 · 2号棚</span>
            </div>
            <span class="inline-flex items-center justify-center shrink-0 whitespace-nowrap" style="padding: 2px 8px; border-radius: var(--radius-full); font-size: var(--text-caption); font-weight: var(--text-card-title-weight); background: var(--color-bg-deep); color: var(--color-text-muted); height: 22px;">已采收</span>
          </div>
          <!-- Metrics row -->
          <div class="flex items-stretch gap-2 mt-3" style="background: var(--color-bg); border-radius: var(--radius-sm); padding: var(--space-sm) var(--space-md);">
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">进棚</span>
              <span style="font-size: var(--text-body-secondary); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug); margin-top: 2px; font-variant-numeric: tabular-nums;">04-10</span>
            </div>
            <div style="width: 1px; background: var(--color-rule);"></div>
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">采收</span>
              <span style="font-size: var(--text-body-secondary); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug); margin-top: 2px; font-variant-numeric: tabular-nums;">06-15</span>
            </div>
            <div style="width: 1px; background: var(--color-rule);"></div>
            <div class="flex flex-col items-center flex-1">
              <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">产量</span>
              <span style="font-size: var(--text-body-secondary); font-weight: var(--text-card-title-weight); color: var(--color-text-primary); line-height: var(--leading-snug); margin-top: 2px; font-variant-numeric: tabular-nums;">850斤</span>
            </div>
          </div>
          <!-- Footer -->
          <div class="flex items-center mt-3" style="padding-top: var(--space-sm); border-top: 1px solid var(--color-rule);">
            <span class="truncate" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal);">状态：已完结 · 单斤成本 2.3 元</span>
          </div>
        </section>

      </div>

      <!-- Bottom tab bar -->
      <nav class="fixed bottom-0 left-0 right-0 z-30" style="background: var(--color-bg-elevated); border-top: 1px solid var(--color-rule); height: 50px;">
        <div class="flex items-center justify-around h-full px-2">
          <!-- Tab: 首页 -->
          <button data-dom-id="tab-home" class="flex flex-col items-center justify-center gap-0.5 flex-1" style="height: 50px; color: var(--color-text-muted);" aria-label="首页">
            <i data-lucide="home" style="width: 20px; height: 20px;"></i>
            <span style="font-size: 10px; line-height: 1;">首页</span>
          </button>
          <!-- Tab: AI助手 -->
          <button data-dom-id="tab-ai" class="flex flex-col items-center justify-center gap-0.5 flex-1" style="height: 50px; color: var(--color-text-muted);" aria-label="AI助手">
            <i data-lucide="bot" style="width: 20px; height: 20px;"></i>
            <span style="font-size: 10px; line-height: 1;">AI助手</span>
          </button>
          <!-- Tab: 档案 (active) -->
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1" style="height: 50px; color: var(--color-primary);" aria-label="档案">
            <i data-lucide="clipboard-list" style="width: 20px; height: 20px;"></i>
            <span style="font-size: 10px; font-weight: var(--text-card-title-weight); line-height: 1;">档案</span>
          </button>
          <!-- Tab: 我的 -->
          <button data-dom-id="tab-profile" class="flex flex-col items-center justify-center gap-0.5 flex-1" style="height: 50px; color: var(--color-text-muted);" aria-label="我的">
            <i data-lucide="user" style="width: 20px; height: 20px;"></i>
            <span style="font-size: 10px; line-height: 1;">我的</span>
          </button>
        </div>
        <!-- Safe area bottom -->
        <div style="height: env(safe-area-inset-bottom, 34px);"></div>
      </nav>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
