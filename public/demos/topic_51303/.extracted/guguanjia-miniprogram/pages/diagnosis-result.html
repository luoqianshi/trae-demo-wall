<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诊断结果</title>
    <style id="theme-vars">
/* ===== 菇管家小程序 — Brand Design Tokens ===== */
:root {
  /* — Color System — */
  --color-bg: #f5f5f5;
  --color-bg-elevated: #ffffff;
  --color-bg-deep: #f0f0f0;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-muted: #999999;
  --color-text-placeholder: #bbbbbb;
  --color-rule: #e5e5e5;

  /* Brand — Green (Primary) */
  --color-primary: #07c160;
  --color-primary-light: #e8f5e9;
  --color-primary-dark: #06ad56;

  /* State Colors */
  --state-success: #07c160;
  --state-success-light: #e8f5e9;
  --state-warning: #fa9d3b;
  --state-warning-light: #fff3e0;
  --state-error: #fa5151;
  --state-error-light: #ffebee;
  --state-info: #10aeff;
  --state-info-light: #e3f2fd;

  /* — Typography — */
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  /* Type Scale */
  --text-display: 48px;
  --text-display-weight: 700;
  --text-h1: 32px;
  --text-h1-weight: 700;
  --text-h2: 24px;
  --text-h2-weight: 700;
  --text-h3: 20px;
  --text-h3-weight: 600;
  --text-h4: 18px;
  --text-h4-weight: 600;
  --text-page-title: 18px;
  --text-page-title-weight: 600;
  --text-card-title: 16px;
  --text-card-title-weight: 600;
  --text-body: 15px;
  --text-body-weight: 400;
  --text-body-secondary: 14px;
  --text-body-secondary-weight: 400;
  --text-caption: 12px;
  --text-caption-weight: 400;
  --text-micro: 11px;
  --text-micro-weight: 400;

  /* Line Heights */
  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* — Spacing — */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* — Radius — */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* — Shadows — */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);

  /* — Interactive — */
  --control-height: 48px;
  --control-height-sm: 40px;
  --control-height-lg: 56px;
  --icon-touch-target: 44px;
  --page-padding: 12px;
  --card-padding: 14px;
  --card-gap: 10px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Status Bar Spacer -->
      <div class="h-11 bg-[var(--color-bg)]"></div>

      <!-- WeChat Mini Program Nav Bar -->
      <header class="sticky top-0 z-30 bg-[var(--color-bg)]">
        <div class="flex h-11 items-center px-4">
          <div class="flex w-[88px] items-center justify-start">
            <button data-dom-id="btn-back" class="inline-flex h-8 w-8 items-center justify-center" aria-label="返回">
              <i data-lucide="chevron-left" class="h-5 w-5 text-[var(--color-text-primary)]"></i>
            </button>
          </div>
          <div class="min-w-0 flex-1 text-center text-[16px] font-semibold" style="font-family: var(--font-body);">诊断结果</div>
          <div class="flex h-8 w-[88px] items-center justify-center rounded-full border border-[var(--color-rule)] bg-[var(--color-bg-elevated)]">
            <button class="flex h-full flex-1 items-center justify-center" aria-label="更多">
              <i data-lucide="more-horizontal" class="h-4 w-4 text-[var(--color-text-secondary)]"></i>
            </button>
            <span class="h-4 w-px bg-[var(--color-rule)]" aria-hidden="true"></span>
            <button class="flex h-full flex-1 items-center justify-center" aria-label="关闭">
              <i data-lucide="x" class="h-3.5 w-3.5 text-[var(--color-text-secondary)]"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <div class="px-3 pb-6 pt-2" style="font-family: var(--font-body);">

        <!-- Photo Preview Area -->
        <div class="mb-3 flex h-[140px] items-center justify-center overflow-hidden rounded-[var(--radius-md)] bg-[var(--color-bg-deep)]">
          <div class="flex flex-col items-center gap-1.5">
            <i data-lucide="camera" class="h-8 w-8 text-[var(--color-text-placeholder)]"></i>
            <span class="text-[12px] text-[var(--color-text-placeholder)]">菌棒照片</span>
          </div>
        </div>

        <!-- Diagnosis Result Card -->
        <div class="mb-3 rounded-[var(--radius-md)] border-l-4 border-[var(--state-error)] bg-[var(--state-error-light)] p-4">
          <div class="flex items-start gap-2.5">
            <i data-lucide="alert-triangle" class="mt-0.5 h-5 w-5 shrink-0 text-[var(--state-error)]"></i>
            <div>
              <h2 class="text-[20px] font-bold leading-tight text-[var(--state-error)]" style="word-break: keep-all; text-wrap: balance;">绿霉病</h2>
              <p class="mt-0.5 text-[14px] text-[var(--color-text-muted)]" style="font-family: var(--font-mono);">Trichoderma</p>
              <p class="mt-2 text-[14px] font-semibold text-[var(--color-text-primary)]">置信度 92%</p>
            </div>
          </div>
        </div>

        <!-- Symptoms Card -->
        <div class="mb-3 rounded-[var(--radius-md)] bg-[var(--color-bg-elevated)] p-4">
          <h3 class="text-[var(--text-card-title)] text-[var(--text-card-title-weight)] text-[var(--color-text-primary)]" style="font-family: var(--font-body);">症状描述</h3>
          <p class="mt-2.5 text-[var(--text-body)] text-[var(--color-text-secondary)]" style="line-height: var(--leading-normal);">
            菌棒表面出现绿色粉末状霉层，伴有酸臭味。霉菌扩散速度快，需立即处理。
          </p>
        </div>

        <!-- Treatment Card -->
        <div class="mb-3 rounded-[var(--radius-md)] bg-[var(--color-bg-elevated)] p-4">
          <h3 class="text-[var(--text-card-title)] text-[var(--text-card-title-weight)] text-[var(--color-text-primary)]" style="font-family: var(--font-body);">治疗方案</h3>
          <div class="mt-3 flex flex-col gap-4">
            <!-- Step 1 -->
            <div class="flex gap-3">
              <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-[var(--state-error)] text-[12px] font-semibold text-white">1</div>
              <div>
                <p class="text-[var(--text-body-secondary)] font-semibold text-[var(--color-text-primary)]" style="font-family: var(--font-body);">紧急处理</p>
                <p class="mt-1 text-[var(--text-body-secondary)] text-[var(--color-text-muted)]" style="line-height: var(--leading-normal);">立即移除受感染菌棒，隔离处理</p>
              </div>
            </div>
            <!-- Step 2 -->
            <div class="flex gap-3">
              <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-[var(--state-error)] text-[12px] font-semibold text-white">2</div>
              <div>
                <p class="text-[var(--text-body-secondary)] font-semibold text-[var(--color-text-primary)]" style="font-family: var(--font-body);">用药建议</p>
                <p class="mt-1 text-[var(--text-body-secondary)] text-[var(--color-text-muted)]" style="line-height: var(--leading-normal);">多菌灵 1:500 稀释，喷洒菌棒表面，每日一次，连续 3 天</p>
              </div>
            </div>
            <!-- Step 3 -->
            <div class="flex gap-3">
              <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-[var(--state-error)] text-[12px] font-semibold text-white">3</div>
              <div>
                <p class="text-[var(--text-body-secondary)] font-semibold text-[var(--color-text-primary)]" style="font-family: var(--font-body);">预防措施</p>
                <p class="mt-1 text-[var(--text-body-secondary)] text-[var(--color-text-muted)]" style="line-height: var(--leading-normal);">加强通风，降低湿度，严格无菌操作</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Action Buttons Row -->
        <div class="mb-3 flex gap-2.5">
          <button class="flex flex-1 items-center justify-center gap-1.5 rounded-[var(--radius-sm)] py-3 text-[15px] font-semibold text-white whitespace-nowrap" style="background: var(--color-primary); font-family: var(--font-body);">
            <i data-lucide="volume-2" class="h-4 w-4"></i>
            <span>语音播报</span>
          </button>
          <button class="flex flex-1 items-center justify-center gap-1.5 rounded-[var(--radius-sm)] border py-3 text-[15px] font-semibold whitespace-nowrap" style="border-color: var(--color-rule); color: var(--color-text-secondary); background: var(--color-bg-elevated); font-family: var(--font-body);">
            <i data-lucide="message-circle" class="h-4 w-4"></i>
            <span>问专家</span>
          </button>
        </div>

        <!-- Disclaimer Callout -->
        <div class="border-l-3 rounded-[var(--radius-sm)] border-l-[var(--state-warning)] bg-[var(--state-warning-light)] px-3 py-2.5" style="border-left-width: 3px;">
          <p class="text-[11px] leading-relaxed text-[var(--color-text-muted)]">
            免责声明：诊断结果仅供参考，严重时请联系当地农技人员现场确认。
          </p>
        </div>

      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
