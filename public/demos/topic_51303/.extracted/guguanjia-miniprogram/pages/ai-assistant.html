<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手</title>
    <style id="theme-vars">
/* ===== 菇管家小程序 — Brand Design Tokens ===== */
:root {
  /* — Color System — */
  --color-bg: #f5f5f5;
  --color-bg-elevated: #ffffff;
  --color-bg-deep: #f0f0f0;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-muted: #999999;
  --color-text-placeholder: #bbbbbb;
  --color-rule: #e5e5e5;

  /* Brand — Green (Primary) */
  --color-primary: #07c160;
  --color-primary-light: #e8f5e9;
  --color-primary-dark: #06ad56;

  /* State Colors */
  --state-success: #07c160;
  --state-success-light: #e8f5e9;
  --state-warning: #fa9d3b;
  --state-warning-light: #fff3e0;
  --state-error: #fa5151;
  --state-error-light: #ffebee;
  --state-info: #10aeff;
  --state-info-light: #e3f2fd;

  /* — Typography — */
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  /* Type Scale */
  --text-display: 48px;
  --text-display-weight: 700;
  --text-h1: 32px;
  --text-h1-weight: 700;
  --text-h2: 24px;
  --text-h2-weight: 700;
  --text-h3: 20px;
  --text-h3-weight: 600;
  --text-h4: 18px;
  --text-h4-weight: 600;
  --text-page-title: 18px;
  --text-page-title-weight: 600;
  --text-card-title: 16px;
  --text-card-title-weight: 600;
  --text-body: 15px;
  --text-body-weight: 400;
  --text-body-secondary: 14px;
  --text-body-secondary-weight: 400;
  --text-caption: 12px;
  --text-caption-weight: 400;
  --text-micro: 11px;
  --text-micro-weight: 400;

  /* Line Heights */
  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* — Spacing — */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* — Radius — */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* — Shadows — */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);

  /* — Interactive — */
  --control-height: 48px;
  --control-height-sm: 40px;
  --control-height-lg: 56px;
  --icon-touch-target: 44px;
  --page-padding: 12px;
  --card-padding: 14px;
  --card-gap: 10px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main style="background: var(--color-bg); padding-bottom: 84px;">

        <!-- Status bar spacer -->
        <div class="h-11" style="background: var(--color-bg-elevated);"></div>

        <!-- WeChat mini program navigation bar -->
        <header style="background: var(--color-bg-elevated); border-bottom: 1px solid var(--color-rule); position: sticky; top: 0; z-index: 30;">
            <div class="flex items-center" style="height: 44px; padding: 0 16px;">
                <!-- Left balancing area -->
                <div class="flex items-center justify-start" style="width: 88px;">
                    <button style="display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--color-rule); background: var(--color-bg-elevated);" aria-label="返回">
                        <i data-lucide="chevron-left" style="width: 16px; height: 16px; color: var(--color-text-primary);"></i>
                    </button>
                </div>
                <!-- Centered title -->
                <div class="flex-1 text-center" style="font-size: var(--text-page-title); font-weight: var(--text-page-title-weight); color: var(--color-text-primary); min-width: 0; letter-spacing: -0.02em;">AI 助手</div>
                <!-- Right capsule area with chat icon -->
                <div class="flex items-center justify-center" style="width: 88px;">
                    <button style="display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--color-bg-elevated);" aria-label="聊天记录">
                        <i data-lucide="message-circle" style="width: 18px; height: 18px; color: var(--color-text-secondary);"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Page content area -->
        <div style="padding: var(--space-lg);">

            <!-- Camera action card (green gradient) -->
            <section data-dom-id="btn-snap-disease" style="background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-bg-elevated) 100%); border-radius: var(--radius-md); padding: var(--space-2xl); margin-bottom: var(--card-gap); border: 1px solid var(--color-primary-light);">
                <div class="flex items-center gap-4">
                    <!-- 72px circular green camera icon -->
                    <div class="flex items-center justify-center" style="width: 72px; height: 72px; min-width: 72px; border-radius: 50%; background: var(--color-primary); font-size: 32px; line-height: 1;">
                        &#x1F4F7;
                    </div>
                    <div style="min-width: 0;">
                        <div style="font-size: var(--text-h4); font-weight: var(--text-h4-weight); color: var(--color-primary-dark); margin-bottom: var(--space-xs);">拍病害</div>
                        <div style="font-size: var(--text-body-secondary); color: var(--color-text-secondary); line-height: var(--leading-normal);">对准菌棒拍照，AI秒级诊断</div>
                    </div>
                </div>
            </section>

            <!-- Voice card (white bg) -->
            <section style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--space-2xl); margin-bottom: var(--card-gap); border: 1px solid var(--color-rule);">
                <div class="flex items-center gap-4">
                    <!-- 72px circular blue mic icon -->
                    <div class="flex items-center justify-center" style="width: 72px; height: 72px; min-width: 72px; border-radius: 50%; background: var(--state-info); font-size: 32px; line-height: 1;">
                        &#x1F399;&#xFE0F;
                    </div>
                    <div style="min-width: 0;">
                        <div style="font-size: var(--text-h4); font-weight: var(--text-h4-weight); color: var(--state-info); margin-bottom: var(--space-xs);">语音问</div>
                        <div style="font-size: var(--text-body-secondary); color: var(--color-text-secondary); line-height: var(--leading-normal);">按住说话，问什么答什么</div>
                    </div>
                </div>
            </section>

            <!-- Knowledge base card -->
            <section style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); margin-bottom: var(--card-gap); border: 1px solid var(--color-rule);">
                <!-- Title row -->
                <div class="flex items-center justify-between" style="margin-bottom: var(--space-md);">
                    <div style="font-size: var(--text-card-title); font-weight: var(--text-card-title-weight); color: var(--color-text-primary);">知识库</div>
                    <button style="font-size: var(--text-body-secondary); color: var(--color-text-muted); background: none; border: none; padding: 0; display: inline-flex; align-items: center; gap: 2px; white-space: nowrap;">更多 <i data-lucide="chevron-right" style="width: 14px; height: 14px;"></i></button>
                </div>
                <!-- Tags row (horizontal wrapped) -->
                <div class="flex flex-wrap gap-2">
                    <span style="display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: var(--radius-full); font-size: var(--text-body-secondary); font-weight: var(--text-body-secondary-weight); background: var(--color-primary-light); color: var(--color-primary-dark); white-space: nowrap;">香菇种植</span>
                    <span style="display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: var(--radius-full); font-size: var(--text-body-secondary); font-weight: var(--text-body-secondary-weight); background: var(--color-primary-light); color: var(--color-primary-dark); white-space: nowrap;">病害防治</span>
                    <span style="display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: var(--radius-full); font-size: var(--text-body-secondary); font-weight: var(--text-body-secondary-weight); background: var(--color-primary-light); color: var(--color-primary-dark); white-space: nowrap;">环境管理</span>
                    <span style="display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: var(--radius-full); font-size: var(--text-body-secondary); font-weight: var(--text-body-secondary-weight); background: var(--color-primary-light); color: var(--color-primary-dark); white-space: nowrap;">采收技巧</span>
                    <span style="display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: var(--radius-full); font-size: var(--text-body-secondary); font-weight: var(--text-body-secondary-weight); background: var(--color-bg-deep); color: var(--color-text-secondary); white-space: nowrap;">农药使用</span>
                    <span style="display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: var(--radius-full); font-size: var(--text-body-secondary); font-weight: var(--text-body-secondary-weight); background: var(--color-bg-deep); color: var(--color-text-secondary); white-space: nowrap;">设备维护</span>
                </div>
            </section>

            <!-- Recent history card -->
            <section style="background: var(--color-bg-elevated); border-radius: var(--radius-md); border: 1px solid var(--color-rule); overflow: hidden;">
                <!-- Title row -->
                <div style="padding: var(--card-padding) var(--card-padding) var(--space-sm) var(--card-padding);">
                    <div style="font-size: var(--text-card-title); font-weight: var(--text-card-title-weight); color: var(--color-text-primary);">最近记录</div>
                </div>
                <!-- History item 1 -->
                <div class="flex items-center" style="padding: var(--space-md) var(--card-padding); border-top: 1px solid var(--color-rule);">
                    <span style="font-size: 18px; margin-right: var(--space-md); line-height: 1;">&#x1F4F8;</span>
                    <div class="flex-1" style="min-width: 0;">
                        <div style="font-size: var(--text-body); font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px;">绿霉病诊断</div>
                        <div style="font-size: var(--text-caption); color: var(--color-text-muted);">今天 10:23 · 置信度 92%</div>
                    </div>
                    <i data-lucide="chevron-right" style="width: 16px; height: 16px; color: var(--color-text-placeholder); flex-shrink: 0; margin-left: var(--space-sm);"></i>
                </div>
                <!-- History item 2 -->
                <div class="flex items-center" style="padding: var(--space-md) var(--card-padding); border-top: 1px solid var(--color-rule);">
                    <span style="font-size: 18px; margin-right: var(--space-md); line-height: 1;">&#x1F399;&#xFE0F;</span>
                    <div class="flex-1" style="min-width: 0;">
                        <div style="font-size: var(--text-body); font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px;">菌棒出水怎么办</div>
                        <div style="font-size: var(--text-caption); color: var(--color-text-muted);">昨天 18:45</div>
                    </div>
                    <i data-lucide="chevron-right" style="width: 16px; height: 16px; color: var(--color-text-placeholder); flex-shrink: 0; margin-left: var(--space-sm);"></i>
                </div>
            </section>

        </div>

        <!-- Bottom tab bar -->
        <nav style="position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: var(--color-bg-elevated); border-top: 1px solid var(--color-rule); display: flex; align-items: center; justify-content: space-around; z-index: 30;">
            <button data-dom-id="tab-home" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: none; border: none; padding: 0; width: 64px; height: 100%;">
                <i data-lucide="home" style="width: 22px; height: 22px; color: var(--color-text-muted);"></i>
                <span style="font-size: var(--text-micro); color: var(--color-text-muted); white-space: nowrap;">首页</span>
            </button>
            <button data-dom-id="tab-archive" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: none; border: none; padding: 0; width: 64px; height: 100%;">
                <i data-lucide="folder-open" style="width: 22px; height: 22px; color: var(--color-text-muted);"></i>
                <span style="font-size: var(--text-micro); color: var(--color-text-muted); white-space: nowrap;">档案</span>
            </button>
            <button data-dom-id="tab-profile" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: none; border: none; padding: 0; width: 64px; height: 100%;">
                <i data-lucide="user" style="width: 22px; height: 22px; color: var(--color-text-muted);"></i>
                <span style="font-size: var(--text-micro); color: var(--color-text-muted); white-space: nowrap;">我的</span>
            </button>
        </nav>

        <!-- Safe area bottom padding -->
        <div style="height: env(safe-area-inset-bottom, 34px);"></div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
