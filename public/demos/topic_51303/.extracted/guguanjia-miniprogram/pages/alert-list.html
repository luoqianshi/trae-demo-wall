<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警列表</title>
    <style id="theme-vars">
/* ===== 菇管家小程序 — Brand Design Tokens ===== */
:root {
  /* — Color System — */
  --color-bg: #f5f5f5;
  --color-bg-elevated: #ffffff;
  --color-bg-deep: #f0f0f0;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-muted: #999999;
  --color-text-placeholder: #bbbbbb;
  --color-rule: #e5e5e5;

  /* Brand — Green (Primary) */
  --color-primary: #07c160;
  --color-primary-light: #e8f5e9;
  --color-primary-dark: #06ad56;

  /* State Colors */
  --state-success: #07c160;
  --state-success-light: #e8f5e9;
  --state-warning: #fa9d3b;
  --state-warning-light: #fff3e0;
  --state-error: #fa5151;
  --state-error-light: #ffebee;
  --state-info: #10aeff;
  --state-info-light: #e3f2fd;

  /* — Typography — */
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  /* Type Scale */
  --text-display: 48px;
  --text-display-weight: 700;
  --text-h1: 32px;
  --text-h1-weight: 700;
  --text-h2: 24px;
  --text-h2-weight: 700;
  --text-h3: 20px;
  --text-h3-weight: 600;
  --text-h4: 18px;
  --text-h4-weight: 600;
  --text-page-title: 18px;
  --text-page-title-weight: 600;
  --text-card-title: 16px;
  --text-card-title-weight: 600;
  --text-body: 15px;
  --text-body-weight: 400;
  --text-body-secondary: 14px;
  --text-body-secondary-weight: 400;
  --text-caption: 12px;
  --text-caption-weight: 400;
  --text-micro: 11px;
  --text-micro-weight: 400;

  /* Line Heights */
  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* — Spacing — */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* — Radius — */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* — Shadows — */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);

  /* — Interactive — */
  --control-height: 48px;
  --control-height-sm: 40px;
  --control-height-lg: 56px;
  --icon-touch-target: 44px;
  --page-padding: 12px;
  --card-padding: 14px;
  --card-gap: 10px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-bg); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
        <!-- Status Bar Spacer -->
        <div style="height: 44px;"></div>

        <!-- Navigation Header -->
        <header class="sticky top-0 z-30 bg-[var(--color-bg-elevated)]/95 backdrop-blur" style="border-bottom: 1px solid var(--color-rule);">
            <div class="flex items-center" style="height: 44px; padding: 0 16px;">
                <!-- Left: Back button + balancing area -->
                <div class="flex items-center justify-start" style="width: 88px;">
                    <button data-dom-id="btn-back" class="inline-flex items-center justify-center" style="width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--color-rule); background: var(--color-bg-elevated);" aria-label="返回">
                        <i data-lucide="chevron-left" style="width: 16px; height: 16px; color: var(--color-text-primary);"></i>
                    </button>
                </div>
                <!-- Center: Title -->
                <div class="min-w-0 flex-1 text-center" style="font-size: var(--text-page-title); font-weight: var(--text-page-title-weight); line-height: var(--leading-tight); letter-spacing: -0.02em; color: var(--color-text-primary);">告警记录</div>
                <!-- Right: System capsule -->
                <div class="flex items-center justify-center" style="width: 88px; height: 32px; border-radius: var(--radius-full); border: 1px solid var(--color-rule); background: rgba(245,245,245,0.9);" aria-label="小程序菜单">
                    <button class="flex items-center justify-center" style="flex: 1; height: 100%;" aria-label="更多">
                        <i data-lucide="more-horizontal" style="width: 16px; height: 16px; color: var(--color-text-secondary);"></i>
                    </button>
                    <span style="width: 1px; height: 16px; background: var(--color-rule);" aria-hidden="true"></span>
                    <button class="flex items-center justify-center" style="flex: 1; height: 100%;" aria-label="关闭">
                        <i data-lucide="x" style="width: 16px; height: 16px; color: var(--color-text-secondary);"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Filter Tags Row -->
        <div class="flex items-center gap-2" style="padding: 12px 16px; background: var(--color-bg-elevated);">
            <span class="inline-flex items-center justify-center whitespace-nowrap" style="padding: 6px 16px; font-size: var(--text-body-secondary); font-weight: 500; border-radius: var(--radius-full); background: var(--color-primary); color: #ffffff;">未处理</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap" style="padding: 6px 16px; font-size: var(--text-body-secondary); font-weight: 400; border-radius: var(--radius-full); background: var(--color-bg-deep); color: var(--color-text-secondary);">已处理</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap" style="padding: 6px 16px; font-size: var(--text-body-secondary); font-weight: 400; border-radius: var(--radius-full); background: var(--color-bg-deep); color: var(--color-text-secondary);">全部</span>
        </div>

        <!-- Alert List Content -->
        <div class="flex flex-col" style="padding: 12px 16px; gap: 12px;">

            <!-- Alert Card 1: Unhandled, Red severity -->
            <div class="relative" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); border: 1px solid var(--color-rule);">
                <!-- Left severity border -->
                <div class="absolute left-0 top-0 bottom-0" style="width: 3px; border-radius: var(--radius-md) 0 0 var(--radius-md); background: var(--state-error);"></div>
                <!-- Title + Time row -->
                <div class="flex items-center justify-between" style="margin-left: 6px;">
                    <span style="font-size: 14px; font-weight: 600; color: var(--state-error); line-height: var(--leading-snug);">温度过高</span>
                    <span style="font-size: 11px; color: var(--color-text-muted); line-height: var(--leading-snug);">今天 14:32</span>
                </div>
                <!-- Detail text -->
                <p style="margin-top: 8px; margin-left: 6px; font-size: 13px; color: var(--color-text-secondary); line-height: var(--leading-normal);">3号棚温度 32.5°C，超过阈值 28°C</p>
                <!-- Action button -->
                <div style="margin-top: 10px; margin-left: 6px;">
                    <button class="inline-flex items-center justify-center whitespace-nowrap" data-dom-id="btn-handle-alert-1" style="padding: 4px 10px; font-size: 12px; font-weight: 500; border-radius: var(--radius-sm); background: var(--state-error); color: #ffffff; transition: opacity 160ms cubic-bezier(.2,.8,.2,1);">标记已处理</button>
                </div>
            </div>

            <!-- Alert Card 2: Handled, Orange severity -->
            <div class="relative" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); border: 1px solid var(--color-rule);">
                <!-- Left severity border -->
                <div class="absolute left-0 top-0 bottom-0" style="width: 3px; border-radius: var(--radius-md) 0 0 var(--radius-md); background: var(--state-warning);"></div>
                <!-- Title + Time row -->
                <div class="flex items-center justify-between" style="margin-left: 6px;">
                    <span style="font-size: 14px; font-weight: 600; color: var(--state-warning); line-height: var(--leading-snug);">湿度过低</span>
                    <span style="font-size: 11px; color: var(--color-text-muted); line-height: var(--leading-snug);">今天 12:15</span>
                </div>
                <!-- Detail text -->
                <p style="margin-top: 8px; margin-left: 6px; font-size: 13px; color: var(--color-text-secondary); line-height: var(--leading-normal);">3号棚湿度 45%，低于阈值 50%</p>
                <!-- Resolved status -->
                <div style="margin-top: 10px; margin-left: 6px;">
                    <span style="font-size: 12px; color: var(--state-success); font-weight: 500;">&#10003; 已处理 · 开启喷雾</span>
                </div>
            </div>

            <!-- Alert Card 3: Handled, Orange severity, lower opacity -->
            <div class="relative" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); border: 1px solid var(--color-rule); opacity: 0.7;">
                <!-- Left severity border -->
                <div class="absolute left-0 top-0 bottom-0" style="width: 3px; border-radius: var(--radius-md) 0 0 var(--radius-md); background: var(--state-warning);"></div>
                <!-- Title + Time row -->
                <div class="flex items-center justify-between" style="margin-left: 6px;">
                    <span style="font-size: 14px; font-weight: 600; color: var(--state-warning); line-height: var(--leading-snug);">CO2 偏高</span>
                    <span style="font-size: 11px; color: var(--color-text-muted); line-height: var(--leading-snug);">昨天 22:08</span>
                </div>
                <!-- Detail text -->
                <p style="margin-top: 8px; margin-left: 6px; font-size: 13px; color: var(--color-text-secondary); line-height: var(--leading-normal);">1号棚 CO2 3200ppm，超过阈值 3000</p>
                <!-- Resolved status -->
                <div style="margin-top: 10px; margin-left: 6px;">
                    <span style="font-size: 12px; color: var(--state-success); font-weight: 500;">&#10003; 已处理 · 自动通风</span>
                </div>
            </div>

        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
