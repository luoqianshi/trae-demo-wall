<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 · 正常状态</title>
    <style id="theme-vars">
/* ===== 菇管家小程序 — Brand Design Tokens ===== */
:root {
  /* — Color System — */
  --color-bg: #f5f5f5;
  --color-bg-elevated: #ffffff;
  --color-bg-deep: #f0f0f0;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-muted: #999999;
  --color-text-placeholder: #bbbbbb;
  --color-rule: #e5e5e5;

  /* Brand — Green (Primary) */
  --color-primary: #07c160;
  --color-primary-light: #e8f5e9;
  --color-primary-dark: #06ad56;

  /* State Colors */
  --state-success: #07c160;
  --state-success-light: #e8f5e9;
  --state-warning: #fa9d3b;
  --state-warning-light: #fff3e0;
  --state-error: #fa5151;
  --state-error-light: #ffebee;
  --state-info: #10aeff;
  --state-info-light: #e3f2fd;

  /* — Typography — */
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  /* Type Scale */
  --text-display: 48px;
  --text-display-weight: 700;
  --text-h1: 32px;
  --text-h1-weight: 700;
  --text-h2: 24px;
  --text-h2-weight: 700;
  --text-h3: 20px;
  --text-h3-weight: 600;
  --text-h4: 18px;
  --text-h4-weight: 600;
  --text-page-title: 18px;
  --text-page-title-weight: 600;
  --text-card-title: 16px;
  --text-card-title-weight: 600;
  --text-body: 15px;
  --text-body-weight: 400;
  --text-body-secondary: 14px;
  --text-body-secondary-weight: 400;
  --text-caption: 12px;
  --text-caption-weight: 400;
  --text-micro: 11px;
  --text-micro-weight: 400;

  /* Line Heights */
  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* — Spacing — */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* — Radius — */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* — Shadows — */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);

  /* — Interactive — */
  --control-height: 48px;
  --control-height-sm: 40px;
  --control-height-lg: 56px;
  --icon-touch-target: 44px;
  --page-padding: 12px;
  --card-padding: 14px;
  --card-gap: 10px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-bg); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="font-family: var(--font-body);">
    <style>
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
      button:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: 4px; }
    </style>
    <main class="pb-[84px]">
      <!-- Status bar spacer -->
      <div style="height: 44px; background: var(--color-bg-elevated);"></div>

      <!-- Navigation header: centered title + right capsule -->
      <header style="background: var(--color-bg-elevated); border-bottom: 1px solid var(--color-rule);" class="sticky top-0 z-30">
        <div class="flex items-center" style="height: 44px; padding: 0 16px;">
          <!-- Left balancing area -->
          <div class="flex items-center justify-start" style="width: 88px;">
            <span style="font-size: 18px; color: var(--color-text-secondary);">🍄</span>
          </div>
          <!-- Center title -->
          <div class="flex-1 text-center" style="font-size: 17px; font-weight: 600; color: var(--color-text-primary); letter-spacing: -0.01em;">1号棚 · 香菇</div>
          <!-- Right system capsule -->
          <div class="flex items-center justify-center" style="width: 88px; height: 32px; border-radius: 9999px; border: 1px solid var(--color-rule); background: rgba(255,255,255,0.9);" aria-label="小程序菜单">
            <button class="flex items-center justify-center" style="height: 100%; flex: 1;" aria-label="切换棚">
              <i data-lucide="chevron-down" style="width: 16px; height: 16px; color: var(--color-text-secondary);"></i>
            </button>
            <span style="width: 1px; height: 16px; background: var(--color-rule);"></span>
            <button class="flex items-center justify-center" style="height: 100%; flex: 1;" aria-label="更多">
              <i data-lucide="more-horizontal" style="width: 16px; height: 16px; color: var(--color-text-secondary);"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Stage tag row -->
      <div class="flex items-center justify-center gap-2" style="padding: 12px 16px 0;">
        <span style="display: inline-flex; align-items: center; height: 26px; padding: 0 10px; border-radius: 9999px; font-size: 13px; font-weight: 500; background: var(--state-success-light); color: var(--state-success);">转色期</span>
        <span style="display: inline-flex; align-items: center; height: 26px; padding: 0 10px; border-radius: 9999px; font-size: 13px; font-weight: 400; background: var(--color-bg-deep); color: var(--color-text-muted);">第 18 天</span>
      </div>

      <!-- Main content area -->
      <div style="padding: 12px;">

        <!-- Main temperature card -->
        <div style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); box-shadow: var(--shadow-card); margin-bottom: var(--card-gap);">
          <div class="flex items-baseline justify-between">
            <div>
              <div style="font-size: var(--text-caption); color: var(--color-text-muted); margin-bottom: 4px;">当前温度</div>
              <div class="flex items-baseline gap-1">
                <span style="font-size: var(--text-display); font-weight: var(--text-display-weight); color: var(--state-success); font-variant-numeric: tabular-nums; line-height: var(--leading-tight);">22.5</span>
                <span style="font-size: var(--text-h3); font-weight: var(--text-h3-weight); color: var(--state-success);">°C</span>
              </div>
            </div>
            <div style="text-align: right;">
              <div style="font-size: var(--text-body-secondary); color: var(--color-text-secondary); margin-bottom: 2px;">目标 18–20°C</div>
              <div style="font-size: var(--text-body-secondary); color: var(--state-warning);">略偏高</div>
            </div>
          </div>
        </div>

        <!-- 2x2 metrics grid -->
        <div class="grid grid-cols-2 gap-[10px]" style="margin-bottom: var(--card-gap);">
          <!-- 湿度 - Normal (green) -->
          <div style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); box-shadow: var(--shadow-card);">
            <div style="font-size: var(--text-caption); color: var(--color-text-muted); margin-bottom: 6px;">湿度</div>
            <div class="flex items-baseline gap-1">
              <span style="font-size: var(--text-h2); font-weight: var(--text-h2-weight); color: var(--state-success); font-variant-numeric: tabular-nums;">68</span>
              <span style="font-size: var(--text-body-secondary); color: var(--color-text-secondary);">%</span>
            </div>
            <div style="font-size: var(--text-micro); color: var(--state-success); margin-top: 2px;">正常</div>
          </div>
          <!-- CO2 - Warning (orange) -->
          <div style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); box-shadow: var(--shadow-card);">
            <div style="font-size: var(--text-caption); color: var(--color-text-muted); margin-bottom: 6px;">CO₂</div>
            <div class="flex items-baseline gap-1">
              <span style="font-size: var(--text-h2); font-weight: var(--text-h2-weight); color: var(--state-warning); font-variant-numeric: tabular-nums;">3200</span>
              <span style="font-size: var(--text-body-secondary); color: var(--color-text-secondary);">ppm</span>
            </div>
            <div style="font-size: var(--text-micro); color: var(--state-warning); margin-top: 2px;">偏高</div>
          </div>
          <!-- 光照 - Normal (green) -->
          <div style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); box-shadow: var(--shadow-card);">
            <div style="font-size: var(--text-caption); color: var(--color-text-muted); margin-bottom: 6px;">光照</div>
            <div class="flex items-baseline gap-1">
              <span style="font-size: var(--text-h2); font-weight: var(--text-h2-weight); color: var(--state-success); font-variant-numeric: tabular-nums;">850</span>
              <span style="font-size: var(--text-body-secondary); color: var(--color-text-secondary);">lux</span>
            </div>
            <div style="font-size: var(--text-micro); color: var(--state-success); margin-top: 2px;">正常</div>
          </div>
          <!-- 土壤温 - Normal (green) -->
          <div style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); box-shadow: var(--shadow-card);">
            <div style="font-size: var(--text-caption); color: var(--color-text-muted); margin-bottom: 6px;">土壤温</div>
            <div class="flex items-baseline gap-1">
              <span style="font-size: var(--text-h2); font-weight: var(--text-h2-weight); color: var(--state-success); font-variant-numeric: tabular-nums;">21.2</span>
              <span style="font-size: var(--text-body-secondary); color: var(--color-text-secondary);">°C</span>
            </div>
            <div style="font-size: var(--text-micro); color: var(--state-success); margin-top: 2px;">正常</div>
          </div>
        </div>

        <!-- Warning card -->
        <div style="background: var(--state-warning-light); border-radius: var(--radius-md); padding: var(--card-padding); margin-bottom: var(--card-gap);">
          <div class="flex items-start gap-3">
            <span style="font-size: 20px; line-height: 1; flex-shrink: 0; padding-top: 2px;">⚠️</span>
            <div class="flex-1 min-w-0">
              <div style="font-size: var(--text-card-title); font-weight: var(--text-card-title-weight); color: var(--state-warning); margin-bottom: 4px;">CO₂ 浓度偏高</div>
              <div style="font-size: var(--text-body-secondary); color: var(--color-text-secondary); margin-bottom: 10px;">建议开启风机通风 30 分钟</div>
              <button style="display: inline-flex; align-items: center; justify-content: center; height: 36px; padding: 0 16px; border-radius: var(--radius-full); background: var(--state-warning); color: #ffffff; font-size: var(--text-body); font-weight: 500; border: none; min-width: 44px; transition: opacity 120ms cubic-bezier(.2,.8,.2,1);" data-dom-id="btn-handle-warning" aria-label="去处理">去处理</button>
            </div>
          </div>
        </div>

        <!-- Quick action row -->
        <div style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); box-shadow: var(--shadow-card); margin-bottom: var(--card-gap);">
          <div class="flex items-center justify-around">
            <button class="flex flex-col items-center gap-1" style="min-width: 44px; min-height: 44px; background: none; border: none; cursor: pointer; padding: 8px 12px;" data-dom-id="btn-snap-disease" aria-label="拍病害">
              <span style="font-size: 24px; line-height: 1;">📸</span>
              <span style="font-size: var(--text-caption); color: var(--color-text-secondary);">拍病害</span>
            </button>
            <button class="flex flex-col items-center gap-1" style="min-width: 44px; min-height: 44px; background: none; border: none; cursor: pointer; padding: 8px 12px;" data-dom-id="btn-voice-ask" aria-label="语音问">
              <span style="font-size: 24px; line-height: 1;">🎤</span>
              <span style="font-size: var(--text-caption); color: var(--color-text-secondary);">语音问</span>
            </button>
            <button class="flex flex-col items-center gap-1" style="min-width: 44px; min-height: 44px; background: none; border: none; cursor: pointer; padding: 8px 12px;" data-dom-id="btn-view-chart" aria-label="看曲线">
              <span style="font-size: 24px; line-height: 1;">📈</span>
              <span style="font-size: var(--text-caption); color: var(--color-text-secondary);">看曲线</span>
            </button>
          </div>
        </div>

      </div>

      <!-- Bottom tab bar -->
      <nav style="position: fixed; bottom: 0; left: 0; right: 0; height: 50px; border-top: 1px solid var(--color-rule); background: var(--color-bg-elevated); display: flex; align-items: center; justify-content: space-around; z-index: 40;">
        <button class="flex flex-col items-center gap-0" style="flex: 1; min-height: 44px; background: none; border: none; cursor: pointer; padding: 4px 0;" data-dom-id="tab-home" data-active="true" aria-label="首页">
          <span style="font-size: 22px; line-height: 1;">🏠</span>
          <span style="font-size: 10px; font-weight: 500; color: var(--color-primary);">首页</span>
        </button>
        <button class="flex flex-col items-center gap-0" style="flex: 1; min-height: 44px; background: none; border: none; cursor: pointer; padding: 4px 0;" data-dom-id="tab-ai" aria-label="AI助手">
          <span style="font-size: 22px; line-height: 1; opacity: 0.45;">🤖</span>
          <span style="font-size: 10px; color: var(--color-text-muted);">AI助手</span>
        </button>
        <button class="flex flex-col items-center gap-0" style="flex: 1; min-height: 44px; background: none; border: none; cursor: pointer; padding: 4px 0;" data-dom-id="tab-archive" aria-label="档案">
          <span style="font-size: 22px; line-height: 1; opacity: 0.45;">📂</span>
          <span style="font-size: 10px; color: var(--color-text-muted);">档案</span>
        </button>
        <button class="flex flex-col items-center gap-0" style="flex: 1; min-height: 44px; background: none; border: none; cursor: pointer; padding: 4px 0;" data-dom-id="tab-profile" aria-label="我的">
          <span style="font-size: 22px; line-height: 1; opacity: 0.45;">👤</span>
          <span style="font-size: 10px; color: var(--color-text-muted);">我的</span>
        </button>
      </nav>

      <!-- Safe area bottom -->
      <div style="position: fixed; bottom: 50px; left: 0; right: 0; height: env(safe-area-inset-bottom, 0px); background: var(--color-bg-elevated); z-index: 39;"></div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
