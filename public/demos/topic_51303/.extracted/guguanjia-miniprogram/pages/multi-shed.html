<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled</title>
    <style id="theme-vars">
/* ===== 菇管家小程序 — Brand Design Tokens ===== */
:root {
  /* — Color System — */
  --color-bg: #f5f5f5;
  --color-bg-elevated: #ffffff;
  --color-bg-deep: #f0f0f0;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-muted: #999999;
  --color-text-placeholder: #bbbbbb;
  --color-rule: #e5e5e5;

  /* Brand — Green (Primary) */
  --color-primary: #07c160;
  --color-primary-light: #e8f5e9;
  --color-primary-dark: #06ad56;

  /* State Colors */
  --state-success: #07c160;
  --state-success-light: #e8f5e9;
  --state-warning: #fa9d3b;
  --state-warning-light: #fff3e0;
  --state-error: #fa5151;
  --state-error-light: #ffebee;
  --state-info: #10aeff;
  --state-info-light: #e3f2fd;

  /* — Typography — */
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  /* Type Scale */
  --text-display: 48px;
  --text-display-weight: 700;
  --text-h1: 32px;
  --text-h1-weight: 700;
  --text-h2: 24px;
  --text-h2-weight: 700;
  --text-h3: 20px;
  --text-h3-weight: 600;
  --text-h4: 18px;
  --text-h4-weight: 600;
  --text-page-title: 18px;
  --text-page-title-weight: 600;
  --text-card-title: 16px;
  --text-card-title-weight: 600;
  --text-body: 15px;
  --text-body-weight: 400;
  --text-body-secondary: 14px;
  --text-body-secondary-weight: 400;
  --text-caption: 12px;
  --text-caption-weight: 400;
  --text-micro: 11px;
  --text-micro-weight: 400;

  /* Line Heights */
  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* — Spacing — */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* — Radius — */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* — Shadows — */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);

  /* — Interactive — */
  --control-height: 48px;
  --control-height-sm: 40px;
  --control-height-lg: 56px;
  --icon-touch-target: 44px;
  --page-padding: 12px;
  --card-padding: 14px;
  --card-gap: 10px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Status bar spacer -->
      <div style="height: 44px; background: var(--color-bg-elevated);"></div>

      <!-- WeChat mini program navigation bar -->
      <header style="position: sticky; top: 0; z-index: 30; border-bottom: 1px solid var(--color-rule); background: rgba(255,255,255,0.95); backdrop-filter: blur(2px);">
        <div style="display: flex; height: 44px; align-items: center; padding: 0 16px;">
          <!-- Left: back button area -->
          <div style="width: 88px; display: flex; align-items: center; justify-content: start;">
            <button data-dom-id="btn-back" style="display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--color-rule); background: var(--color-bg-elevated); cursor: pointer;" aria-label="返回">
              <i data-lucide="chevron-left" style="width: 16px; height: 16px; color: var(--color-text-primary);"></i>
            </button>
          </div>
          <!-- Center: title -->
          <div style="flex: 1; min-width: 0; text-align: center; font-size: var(--text-page-title); font-weight: var(--text-page-title-weight); color: var(--color-text-primary); letter-spacing: -0.02em; line-height: var(--leading-snug);">多棚管理</div>
          <!-- Right: system capsule -->
          <div style="width: 88px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-full); border: 1px solid var(--color-rule); background: rgba(255,255,255,0.9);" aria-label="小程序菜单">
            <button style="flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer;" aria-label="更多">
              <i data-lucide="more-horizontal" style="width: 16px; height: 16px; color: var(--color-text-primary);"></i>
            </button>
            <span style="width: 1px; height: 16px; background: var(--color-rule); flex-shrink: 0;" aria-hidden="true"></span>
            <button style="flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer;" aria-label="关闭">
              <i data-lucide="x" style="width: 16px; height: 16px; color: var(--color-text-primary);"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Page content area -->
      <div style="background: var(--color-bg); padding: 16px 12px; min-height: calc(100vh - 88px);">

        <!-- Summary stats row: 3 equal cards -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px;">
          <!-- Card: 总棚数 -->
          <div style="background: var(--state-success-light); border-radius: var(--radius-md); padding: 14px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <span style="font-size: 20px; font-weight: 700; color: var(--state-success); line-height: var(--leading-tight); font-variant-numeric: tabular-nums;">20</span>
            <span style="font-size: 11px; font-weight: 400; color: var(--color-text-muted); line-height: var(--leading-normal); margin-top: 2px;">总棚数</span>
          </div>
          <!-- Card: 正常 -->
          <div style="background: var(--state-success-light); border-radius: var(--radius-md); padding: 14px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <span style="font-size: 20px; font-weight: 700; color: var(--state-success); line-height: var(--leading-tight); font-variant-numeric: tabular-nums;">18</span>
            <span style="font-size: 11px; font-weight: 400; color: var(--color-text-muted); line-height: var(--leading-normal); margin-top: 2px;">正常</span>
          </div>
          <!-- Card: 异常 -->
          <div style="background: var(--state-warning-light); border-radius: var(--radius-md); padding: 14px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <span style="font-size: 20px; font-weight: 700; color: var(--state-warning); line-height: var(--leading-tight); font-variant-numeric: tabular-nums;">2</span>
            <span style="font-size: 11px; font-weight: 400; color: var(--color-text-muted); line-height: var(--leading-normal); margin-top: 2px;">异常</span>
          </div>
        </div>

        <!-- Shed list -->
        <div style="display: flex; flex-direction: column; gap: 10px;">

          <!-- Shed 1: 1号棚 · 香菇 — 正常 (green) -->
          <div style="background: var(--color-bg-elevated); border-radius: var(--radius-md); border: 1px solid var(--color-rule); border-left: 3px solid var(--state-success); padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <span style="font-size: 15px; font-weight: 600; color: var(--color-text-primary); line-height: var(--leading-snug); white-space: nowrap;">1号棚 · 香菇</span>
              <span style="display: inline-flex; align-items: center; justify-content: center; padding: 2px 8px; border-radius: var(--radius-xs); background: var(--state-success-light); color: var(--state-success); font-size: 11px; font-weight: 500; line-height: var(--leading-normal); white-space: nowrap;">正常</span>
            </div>
            <div style="font-size: 12px; font-weight: 400; color: var(--color-text-muted); line-height: var(--leading-normal);">22.5°C · 68% · 正常</div>
          </div>

          <!-- Shed 2: 3号棚 · 平菇 — 异常 (orange) -->
          <div style="background: var(--color-bg-elevated); border-radius: var(--radius-md); border: 1px solid var(--color-rule); border-left: 3px solid var(--state-warning); padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <span style="font-size: 15px; font-weight: 600; color: var(--color-text-primary); line-height: var(--leading-snug); white-space: nowrap;">3号棚 · 平菇</span>
              <span style="display: inline-flex; align-items: center; justify-content: center; padding: 2px 8px; border-radius: var(--radius-xs); background: var(--state-warning-light); color: var(--state-warning); font-size: 11px; font-weight: 500; line-height: var(--leading-normal); white-space: nowrap;">异常</span>
            </div>
            <div style="font-size: 12px; font-weight: 400; color: var(--color-text-muted); line-height: var(--leading-normal);">32.5°C · 45% · 2个告警</div>
          </div>

          <!-- Shed 3: 2号棚 · 香菇 — 离线 (red) -->
          <div style="background: var(--color-bg-elevated); border-radius: var(--radius-md); border: 1px solid var(--color-rule); border-left: 3px solid var(--state-error); padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <span style="font-size: 15px; font-weight: 600; color: var(--color-text-primary); line-height: var(--leading-snug); white-space: nowrap;">2号棚 · 香菇</span>
              <span style="display: inline-flex; align-items: center; justify-content: center; padding: 2px 8px; border-radius: var(--radius-xs); background: var(--state-error-light); color: var(--state-error); font-size: 11px; font-weight: 500; line-height: var(--leading-normal); white-space: nowrap;">离线</span>
            </div>
            <div style="font-size: 12px; font-weight: 400; color: var(--color-text-muted); line-height: var(--leading-normal);">离线 12 小时</div>
          </div>

        </div>
      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
