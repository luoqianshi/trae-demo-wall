<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 · 告警状态</title>
    <style id="theme-vars">
/* ===== 菇管家小程序 — Brand Design Tokens ===== */
:root {
  /* — Color System — */
  --color-bg: #f5f5f5;
  --color-bg-elevated: #ffffff;
  --color-bg-deep: #f0f0f0;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-muted: #999999;
  --color-text-placeholder: #bbbbbb;
  --color-rule: #e5e5e5;

  /* Brand — Green (Primary) */
  --color-primary: #07c160;
  --color-primary-light: #e8f5e9;
  --color-primary-dark: #06ad56;

  /* State Colors */
  --state-success: #07c160;
  --state-success-light: #e8f5e9;
  --state-warning: #fa9d3b;
  --state-warning-light: #fff3e0;
  --state-error: #fa5151;
  --state-error-light: #ffebee;
  --state-info: #10aeff;
  --state-info-light: #e3f2fd;

  /* — Typography — */
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

  /* Type Scale */
  --text-display: 48px;
  --text-display-weight: 700;
  --text-h1: 32px;
  --text-h1-weight: 700;
  --text-h2: 24px;
  --text-h2-weight: 700;
  --text-h3: 20px;
  --text-h3-weight: 600;
  --text-h4: 18px;
  --text-h4-weight: 600;
  --text-page-title: 18px;
  --text-page-title-weight: 600;
  --text-card-title: 16px;
  --text-card-title-weight: 600;
  --text-body: 15px;
  --text-body-weight: 400;
  --text-body-secondary: 14px;
  --text-body-secondary-weight: 400;
  --text-caption: 12px;
  --text-caption-weight: 400;
  --text-micro: 11px;
  --text-micro-weight: 400;

  /* Line Heights */
  --leading-tight: 1.15;
  --leading-snug: 1.35;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* — Spacing — */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* — Radius — */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* — Shadows — */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);

  /* — Interactive — */
  --control-height: 48px;
  --control-height-sm: 40px;
  --control-height-lg: 56px;
  --icon-touch-target: 44px;
  --page-padding: 12px;
  --card-padding: 14px;
  --card-gap: 10px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-bg); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex flex-col min-h-screen" style="max-width: 375px; margin: 0 auto; font-family: var(--font-body);">

        <!-- Status bar spacer -->
        <div class="shrink-0" style="height: 44px;"></div>

        <!-- WeChat navigation bar -->
        <header class="sticky top-0 z-30 shrink-0 flex items-center justify-between" style="height: 44px; padding: 0 16px; background: var(--color-bg-elevated); border-bottom: 1px solid var(--color-rule);">
            <!-- Left balancing area -->
            <div class="flex items-center justify-start" style="width: 88px;">
                <i data-lucide="chevron-left" style="width: 18px; height: 18px; color: var(--color-text-primary);"></i>
            </div>
            <!-- Centered title -->
            <div class="flex items-center gap-1 justify-center flex-1 truncate" style="font-size: var(--text-page-title); font-weight: var(--text-page-title-weight); letter-spacing: -0.02em; line-height: var(--leading-snug);">
                3号棚 · 平菇
                <i data-lucide="chevron-down" style="width: 16px; height: 16px; color: var(--color-text-muted);"></i>
            </div>
            <!-- Right system capsule -->
            <div class="flex items-center justify-center rounded-full" style="width: 88px; height: 32px; border: 1px solid var(--color-rule); background: var(--color-bg-elevated);" aria-label="小程序菜单">
                <button class="flex flex-1 items-center justify-center" style="height: 100%;" aria-label="更多">
                    <i data-lucide="more-horizontal" style="width: 16px; height: 16px; color: var(--color-text-primary);"></i>
                </button>
                <span style="width: 1px; height: 16px; background: var(--color-rule);" aria-hidden="true"></span>
                <button class="flex flex-1 items-center justify-center" style="height: 100%;" aria-label="关闭">
                    <i data-lucide="x" style="width: 16px; height: 16px; color: var(--color-text-primary);"></i>
                </button>
            </div>
        </header>

        <!-- Stage tag row -->
        <div class="shrink-0 flex items-center justify-center gap-2" style="padding: 10px 16px 6px;">
            <span class="inline-flex items-center justify-center whitespace-nowrap" style="background: var(--state-error); color: #fff; font-size: var(--text-caption); font-weight: 500; padding: 2px 10px; border-radius: var(--radius-full); line-height: 20px;">出菇期</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap" style="background: var(--color-bg-deep); color: var(--color-text-secondary); font-size: var(--text-caption); font-weight: 400; padding: 2px 10px; border-radius: var(--radius-full); line-height: 20px;">第 5 天</span>
        </div>

        <!-- Scrollable content area -->
        <div class="flex-1 overflow-y-auto" style="padding: 8px var(--page-padding) 100px;">

            <!-- Main temperature card (danger) -->
            <section class="flex flex-col items-center justify-center" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: 20px 16px 18px; border: 2px solid var(--state-error); margin-bottom: 10px; box-shadow: var(--shadow-card);">
                <span style="font-size: var(--text-body-secondary); color: var(--color-text-muted); margin-bottom: 4px; line-height: var(--leading-normal);">当前温度</span>
                <span style="font-size: var(--text-display); font-weight: var(--text-display-weight); color: var(--state-error); line-height: 1.1; font-variant-numeric: tabular-nums; letter-spacing: -0.03em;">32.5°C</span>
                <span style="font-size: var(--text-body-secondary); color: var(--state-error); margin-top: 8px; line-height: var(--leading-normal); font-weight: 500;">目标 20-24°C · 严重超标！</span>
            </section>

            <!-- 2x2 metrics grid -->
            <div class="grid grid-cols-2 gap-[10px]" style="margin-bottom: 10px;">
                <!-- 湿度 - danger/red -->
                <div class="flex flex-col" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); border: 1px solid var(--color-rule); box-shadow: var(--shadow-card);">
                    <span class="flex items-center gap-1" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal);">
                        湿度
                    </span>
                    <div class="flex items-baseline gap-1" style="margin-top: 4px;">
                        <span style="font-size: 28px; font-weight: 700; color: var(--state-error); line-height: 1.2; font-variant-numeric: tabular-nums;">45%</span>
                    </div>
                    <span class="inline-flex items-center justify-center whitespace-nowrap" style="margin-top: 6px; background: var(--state-error-light); color: var(--state-error); font-size: var(--text-micro); font-weight: 500; padding: 1px 6px; border-radius: var(--radius-full); width: fit-content; line-height: 16px;">过低</span>
                </div>
                <!-- CO2 - warning/orange -->
                <div class="flex flex-col" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); border: 1px solid var(--color-rule); box-shadow: var(--shadow-card);">
                    <span class="flex items-center gap-1" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal);">
                        CO2
                    </span>
                    <div class="flex items-baseline gap-1" style="margin-top: 4px;">
                        <span style="font-size: 28px; font-weight: 700; color: var(--state-warning); line-height: 1.2; font-variant-numeric: tabular-nums;">4800</span>
                        <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">ppm</span>
                    </div>
                    <span class="inline-flex items-center justify-center whitespace-nowrap" style="margin-top: 6px; background: var(--state-warning-light); color: var(--state-warning); font-size: var(--text-micro); font-weight: 500; padding: 1px 6px; border-radius: var(--radius-full); width: fit-content; line-height: 16px;">偏高</span>
                </div>
                <!-- 光照 - normal/green -->
                <div class="flex flex-col" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); border: 1px solid var(--color-rule); box-shadow: var(--shadow-card);">
                    <span class="flex items-center gap-1" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal);">
                        光照
                    </span>
                    <div class="flex items-baseline gap-1" style="margin-top: 4px;">
                        <span style="font-size: 28px; font-weight: 700; color: var(--state-success); line-height: 1.2; font-variant-numeric: tabular-nums;">620</span>
                        <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">lux</span>
                    </div>
                    <span class="inline-flex items-center justify-center whitespace-nowrap" style="margin-top: 6px; background: var(--state-success-light); color: var(--state-success); font-size: var(--text-micro); font-weight: 500; padding: 1px 6px; border-radius: var(--radius-full); width: fit-content; line-height: 16px;">正常</span>
                </div>
                <!-- 土壤温 - warning/orange -->
                <div class="flex flex-col" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); padding: var(--card-padding); border: 1px solid var(--color-rule); box-shadow: var(--shadow-card);">
                    <span class="flex items-center gap-1" style="font-size: var(--text-caption); color: var(--color-text-muted); line-height: var(--leading-normal);">
                        土壤温
                    </span>
                    <div class="flex items-baseline gap-1" style="margin-top: 4px;">
                        <span style="font-size: 28px; font-weight: 700; color: var(--state-warning); line-height: 1.2; font-variant-numeric: tabular-nums;">28.5</span>
                        <span style="font-size: var(--text-micro); color: var(--color-text-muted); line-height: var(--leading-normal);">°C</span>
                    </div>
                    <span class="inline-flex items-center justify-center whitespace-nowrap" style="margin-top: 6px; background: var(--state-warning-light); color: var(--state-warning); font-size: var(--text-micro); font-weight: 500; padding: 1px 6px; border-radius: var(--radius-full); width: fit-content; line-height: 16px;">偏高</span>
                </div>
            </div>

            <!-- Danger alert card -->
            <section class="flex items-start gap-3" style="background: var(--state-error-light); border-radius: var(--radius-md); padding: 14px; margin-bottom: 10px;">
                <span style="font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 1px;">&#x1F525;</span>
                <div class="flex flex-col gap-1 min-w-0">
                    <span style="font-size: var(--text-body); font-weight: 600; color: var(--state-error); line-height: var(--leading-snug);">温度 32.5°C 严重超标</span>
                    <span style="font-size: var(--text-body-secondary); color: var(--color-text-secondary); line-height: var(--leading-normal);">立即开启风机+湿帘降温！</span>
                </div>
            </section>

            <!-- Warning alert card -->
            <section class="flex items-start gap-3" style="background: var(--state-warning-light); border-radius: var(--radius-md); padding: 14px; margin-bottom: 16px;">
                <span style="font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 1px;">&#x26A0;&#xFE0F;</span>
                <div class="flex flex-col gap-1 min-w-0">
                    <span style="font-size: var(--text-body); font-weight: 600; color: var(--state-warning); line-height: var(--leading-snug);">湿度仅 45%</span>
                    <span style="font-size: var(--text-body-secondary); color: var(--color-text-secondary); line-height: var(--leading-normal);">建议开启喷雾增湿</span>
                </div>
            </section>

            <!-- Action buttons side by side -->
            <div class="grid grid-cols-2 gap-[10px]" style="margin-bottom: 20px;">
                <button class="flex items-center justify-center whitespace-nowrap" style="height: var(--control-height); background: var(--state-error); color: #fff; font-size: var(--text-body); font-weight: 600; border-radius: var(--radius-md); border: none; cursor: pointer; transition: opacity 120ms cubic-bezier(.2,.8,.2,1);" aria-label="一键通风">
                    <span style="display: inline-flex; align-items: center; gap: 4px;"><i data-lucide="wind" style="width: 18px; height: 18px;"></i>一键通风</span>
                </button>
                <button class="flex items-center justify-center whitespace-nowrap" style="height: var(--control-height); background: var(--state-warning); color: #fff; font-size: var(--text-body); font-weight: 600; border-radius: var(--radius-md); border: none; cursor: pointer; transition: opacity 120ms cubic-bezier(.2,.8,.2,1);" aria-label="一键喷雾">
                    <span style="display: inline-flex; align-items: center; gap: 4px;"><i data-lucide="droplets" style="width: 18px; height: 18px;"></i>一键喷雾</span>
                </button>
            </div>

        </div>

        <!-- Bottom tab bar -->
        <div class="shrink-0 fixed bottom-0 left-1/2 -translate-x-1/2 flex items-center justify-around" style="max-width: 375px; width: 100%; height: 50px; background: var(--color-bg-elevated); border-top: 1px solid var(--color-rule);">
            <button class="flex flex-col items-center justify-center gap-0.5" style="flex: 1; height: 100%; background: none; border: none; cursor: pointer;" aria-label="首页">
                <i data-lucide="home" style="width: 22px; height: 22px; color: var(--color-primary);"></i>
                <span style="font-size: 10px; color: var(--color-primary); font-weight: 500; line-height: 1;">首页</span>
            </button>
            <button data-dom-id="tab-ai" class="flex flex-col items-center justify-center gap-0.5" style="flex: 1; height: 100%; background: none; border: none; cursor: pointer;" aria-label="AI助手">
                <i data-lucide="bot" style="width: 22px; height: 22px; color: var(--color-text-muted);"></i>
                <span style="font-size: 10px; color: var(--color-text-muted); line-height: 1;">AI助手</span>
            </button>
            <button data-dom-id="tab-archive" class="flex flex-col items-center justify-center gap-0.5" style="flex: 1; height: 100%; background: none; border: none; cursor: pointer;" aria-label="档案">
                <i data-lucide="folder-open" style="width: 22px; height: 22px; color: var(--color-text-muted);"></i>
                <span style="font-size: 10px; color: var(--color-text-muted); line-height: 1;">档案</span>
            </button>
            <button data-dom-id="tab-profile" class="flex flex-col items-center justify-center gap-0.5" style="flex: 1; height: 100%; background: none; border: none; cursor: pointer;" aria-label="我的">
                <i data-lucide="user" style="width: 22px; height: 22px; color: var(--color-text-muted);"></i>
                <span style="font-size: 10px; color: var(--color-text-muted); line-height: 1;">我的</span>
            </button>
        </div>
        <!-- Safe area bottom spacer -->
        <div class="shrink-0" style="height: env(safe-area-inset-bottom, 34px);"></div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
