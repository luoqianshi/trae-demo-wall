<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 — AI智能面试系统</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/student.css">
  <style>
    /* ============================================
       Student Profile Page — Personal Center
       ============================================ */

    :root {
      --p-primary: #4A6CF7;
      --p-bg: #F0F2F8;
      --p-card: #fff;
      --p-text: #1E293B;
      --p-text-secondary: #64748B;
      --p-text-muted: #94A3B8;
      --p-border: #E2E8F0;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
      background: var(--p-bg);
      color: var(--p-text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Profile Header — Full Gradient ===== */
    .profile-header {
      background:
        linear-gradient(135deg, rgba(74,108,247,0.75) 0%, rgba(108,92,231,0.68) 50%, rgba(139,92,246,0.60) 100%),
        url('../assets/profile-campus-bg.jpg') center/cover no-repeat;
      padding: 48px 20px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .profile-back-btn {
      position: absolute;
      top: 12px; left: 16px;
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      text-decoration: none;
      transition: all 0.3s;
    }
    .profile-back-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.25); }
    .profile-back-btn svg { width: 20px; height: 20px; }

    .profile-header::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .profile-header::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -30px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      border-radius: 50%;
    }

    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      border: 3px solid rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .profile-avatar .initials {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    .profile-major {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    .profile-id {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      position: relative;
      z-index: 1;
    }

    /* ===== Content Area ===== */
    .profile-content {
      flex: 1;
      padding: 16px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    }

    /* ===== Ability Radar Chart ===== */
    .radar-card {
      background: var(--p-card);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .radar-card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .radar-card-title svg { width: 20px; height: 20px; color: var(--p-primary); }

    .radar-chart-container {
      width: 100%;
      height: 260px;
      position: relative;
    }

    .radar-chart-container canvas {
      width: 100%; height: 100%;
    }

    /* ===== Stats Row ===== */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--p-card);
      border-radius: 16px;
      padding: 18px 12px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .stat-card:active { transform: scale(0.97); }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--p-text);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-number span {
      font-size: 14px;
      font-weight: 500;
      color: var(--p-text-muted);
    }

    .stat-label {
      font-size: 12px;
      color: var(--p-text-secondary);
      font-weight: 500;
    }

    /* ===== Menu List ===== */
    .menu-card {
      background: var(--p-card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.8);
      margin-bottom: 16px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      text-decoration: none;
      color: var(--p-text);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      cursor: pointer;
    }

    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: rgba(0, 0, 0, 0.03); }

    .menu-item.danger { color: #EF4444; }
    .menu-item.danger .menu-icon { background: rgba(239, 68, 68, 0.1); }
    .menu-item.danger .menu-icon svg { color: #EF4444; }

    .menu-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .menu-icon svg { width: 18px; height: 18px; color: var(--p-primary); }

    .menu-icon.blue { background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(59, 130, 246, 0.15)); }
    .menu-icon.green { background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.15)); }
    .menu-icon.purple { background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(139, 92, 246, 0.15)); }
    .menu-icon.orange { background: linear-gradient(135deg, rgba(249, 115, 22, 0.1), rgba(249, 115, 22, 0.15)); }
    .menu-icon.indigo { background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(99, 102, 241, 0.15)); }
    .menu-icon.gray { background: linear-gradient(135deg, rgba(148, 163, 184, 0.1), rgba(148, 163, 184, 0.15)); }

    .menu-label {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
    }

    .menu-chevron {
      color: var(--p-text-muted);
      flex-shrink: 0;
    }

    .menu-chevron svg { width: 18px; height: 18px; }

    /* ===== About Dialog ===== */
    .about-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .about-overlay.show { opacity: 1; visibility: visible; }

    .about-modal {
      background: var(--p-card);
      border-radius: 24px;
      padding: 32px 24px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.15);
    }

    .about-overlay.show .about-modal { transform: scale(1); }

    .about-logo {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(74, 108, 247, 0.3);
    }

    .about-logo svg { width: 36px; height: 36px; color: #fff; }

    .about-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .about-version {
      font-size: 13px;
      color: var(--p-text-muted);
      margin-bottom: 16px;
    }

    .about-desc {
      font-size: 14px;
      color: var(--p-text-secondary);
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .about-close-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 40px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }

    .about-close-btn:active { transform: scale(0.97); }

    /* ===== TabBar ===== */
    .student-tabbar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; display: flex;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      z-index: 200;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06);
    }

    .student-tabbar .tabbar-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      padding: 4px 0; color: #9CA3AF; font-size: 10px; font-weight: 500;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .student-tabbar .tabbar-item svg { width: 24px; height: 24px; transition: all 0.3s; }
    .student-tabbar .tabbar-item.active { color: #4A6CF7; }
    .student-tabbar .tabbar-item.active svg { transform: scale(1.1); }
    .student-tabbar .tabbar-item.active::after {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 20px; height: 3px; border-radius: 0 0 3px 3px;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
    }
    .student-tabbar .tabbar-item:active { transform: scale(0.92); }
  </style>
</head>

  <script>
    /* ============================================
       Student Profile Page Logic
       ============================================ */

    var currentUser = null;

    document.addEventListener('DOMContentLoaded', function () {
      MockData.init();
      EventBus.init();
      currentUser = DataStore.getCurrentUser();
      if (!currentUser) {
        navigateTo('student-login.html');
        return;
      }
      loadProfile();
      drawRadarChart();
    });

    /* ---- Load Profile Info ---- */
    function loadProfile() {
      /* Avatar initials */
      var name = currentUser.name || '张同学';
      document.getElementById('avatarInitials').textContent = name.charAt(0);
      document.getElementById('profileName').textContent = name;

      /* Major */
      var major = currentUser.major || '汽车维修专业';
      document.getElementById('profileMajor').textContent = major;

      /* Student ID */
      var sid = currentUser.id || '2024001001';
      document.getElementById('profileId').textContent = '\u5B66\u53F7\uFF1A' + sid;

      /* Stats — compute from interview data if available */
      var interviews = DataStore.getAllInterviews ? DataStore.getAllInterviews() : [];
      var studentInterviews = interviews.filter(function(iv) {
        return iv.studentId === currentUser.id || iv.participants && iv.participants.indexOf(currentUser.id) !== -1;
      });

      var interviewCount = studentInterviews.length || 3;
      var avgScore = 82.5;
      var passRate = 100;

      if (studentInterviews.length > 0) {
        var total = 0;
        var passed = 0;
        studentInterviews.forEach(function(iv) {
          total += (iv.score || 80);
          if ((iv.score || 80) >= 60) passed++;
        });
        avgScore = (total / studentInterviews.length).toFixed(1);
        passRate = Math.round((passed / studentInterviews.length) * 100);
      }

      document.getElementById('statInterviews').textContent = interviewCount;
      document.getElementById('statAvgScore').textContent = avgScore;
      document.getElementById('statPassRate').innerHTML = passRate + '<span>%</span>';
    }

    /* ---- Draw Radar Chart ---- */
    function drawRadarChart() {
      var canvas = document.getElementById('radarChart');
      if (!canvas) return;

      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      var w = rect.width;
      var h = rect.height;
      var cx = w / 2;
      var cy = h / 2;
      var maxR = Math.min(w, h) / 2 - 40;

      var dimensions = [
        { label: '\u4E13\u4E1A\u7D20\u517B', value: 0.88 },
        { label: '\u8868\u8FBE\u80FD\u529B', value: 0.82 },
        { label: '\u4EEA\u5BB9\u4EEA\u8868', value: 0.91 },
        { label: '\u7EFC\u5408\u5370\u8C61', value: 0.85 },
        { label: 'AI\u8BC4\u5206', value: 0.86 }
      ];

      var n = dimensions.length;
      var angleStep = (Math.PI * 2) / n;
      var startAngle = -Math.PI / 2;

      /* Draw background rings */
      for (var ring = 1; ring <= 4; ring++) {
        var r = maxR * (ring / 4);
        ctx.beginPath();
        for (var i = 0; i <= n; i++) {
          var angle = startAngle + angleStep * i;
          var x = cx + r * Math.cos(angle);
          var y = cy + r * Math.sin(angle);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = '#E5E7EB';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      /* Draw axis lines */
      for (var i = 0; i < n; i++) {
        var angle = startAngle + angleStep * i;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + maxR * Math.cos(angle), cy + maxR * Math.sin(angle));
        ctx.strokeStyle = '#E5E7EB';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      /* Animate data shape */
      var animProgress = 0;
      var animDuration = 1200;
      var animStart = performance.now();

      function animateFrame(t) {
        var elapsed = t - animStart;
        animProgress = Math.min(elapsed / animDuration, 1);
        /* Ease out cubic */
        var eased = 1 - Math.pow(1 - animProgress, 3);

        /* Clear center area */
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, maxR + 2, 0, Math.PI * 2);
        ctx.clip();

        /* Redraw axes under data */
        for (var ring = 1; ring <= 4; ring++) {
          var r = maxR * (ring / 4);
          ctx.beginPath();
          for (var j = 0; j <= n; j++) {
            var angle = startAngle + angleStep * j;
            var x = cx + r * Math.cos(angle);
            var y = cy + r * Math.sin(angle);
            if (j === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.strokeStyle = '#E5E7EB';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }

        for (var i = 0; i < n; i++) {
          var angle = startAngle + angleStep * i;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + maxR * Math.cos(angle), cy + maxR * Math.sin(angle));
          ctx.strokeStyle = '#E5E7EB';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }

        /* Gradient fill */
        var points = [];
        dimensions.forEach(function(dim, idx) {
          var angle = startAngle + angleStep * idx;
          var r = maxR * dim.value * eased;
          points.push({
            x: cx + r * Math.cos(angle),
            y: cy + r * Math.sin(angle)
          });
        });

        /* Fill */
        var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
        grad.addColorStop(0, 'rgba(74, 108, 247, 0.15)');
        grad.addColorStop(1, 'rgba(108, 92, 231, 0.05)');

        ctx.beginPath();
        points.forEach(function(p, idx) {
          if (idx === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        /* Stroke */
        var lineGrad = ctx.createLinearGradient(cx - maxR, cy, cx + maxR, cy);
        lineGrad.addColorStop(0, '#4A6CF7');
        lineGrad.addColorStop(1, '#6C5CE7');

        ctx.beginPath();
        points.forEach(function(p, idx) {
          if (idx === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        /* Data points */
        points.forEach(function(p) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
          ctx.strokeStyle = '#4A6CF7';
          ctx.lineWidth = 2;
          ctx.stroke();
        });

        ctx.restore();

        /* Labels (drawn outside clip) */
        ctx.fillStyle = '#64748B';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        dimensions.forEach(function(dim, idx) {
          var angle = startAngle + angleStep * idx;
          var labelR = maxR + 24;
          var lx = cx + labelR * Math.cos(angle);
          var ly = cy + labelR * Math.sin(angle);

          /* Score value */
          ctx.fillStyle = '#4A6CF7';
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText(Math.round(dim.value * 100), lx, ly - 9);

          /* Label */
          ctx.fillStyle = '#64748B';
          ctx.font = '12px sans-serif';
          ctx.fillText(dim.label, lx, ly + 8);
        });

        if (animProgress < 1) {
          requestAnimationFrame(animateFrame);
        }
      }

      requestAnimationFrame(animateFrame);
    }

    /* ---- About Dialog ---- */
    function showAbout() {
      document.getElementById('aboutOverlay').classList.add('show');
    }

    function hideAbout(e) {
      if (!e || e.target === document.getElementById('aboutOverlay')) {
        document.getElementById('aboutOverlay').classList.remove('show');
      }
    }

    /* ---- Logout ---- */
    function handleLogout() {
      if (confirm('\u786E\u5B9A\u8981\u9000\u51FA\u767B\u5F55\u5417\uFF1F')) {
        DataStore.clearCurrentUser();
        navigateTo('student-login.html');
      }
    }
  </script>
</body>
