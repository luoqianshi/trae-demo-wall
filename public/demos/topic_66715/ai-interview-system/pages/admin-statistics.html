<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI智能面试系统 - 数据统计</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .date-filter-bar {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) 0;
      margin-bottom: var(--spacing-lg);
      flex-wrap: wrap;
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-card);
    }
    .date-filter-bar label {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
    }
    .date-filter-bar input[type="date"] {
      height: 36px;
      padding: 0 12px;
      font-size: var(--font-size-sm);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      color: var(--color-text-primary);
      background: var(--color-bg-card);
      transition: all var(--transition-fast);
    }
    .date-filter-bar input[type="date"]:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(74,108,247,0.1);
    }
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }
    .chart-container {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      padding: var(--spacing-xl);
    }
    .chart-title {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-lg);
    }
    .bar-chart-css {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      height: 220px;
      padding: 0 8px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-value {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
    }
    .bar-fill {
      width: 100%;
      max-width: 48px;
      border-radius: 6px 6px 0 0;
      transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }
    .bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
      border-radius: 6px 6px 0 0;
    }
    .bar-label {
      font-size: 11px;
      color: var(--color-text-secondary);
      text-align: center;
      white-space: nowrap;
    }
    /* Horizontal bar chart */
    .h-bar-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .h-bar-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .h-bar-label {
      width: 80px;
      font-size: var(--font-size-sm);
      color: var(--color-text-primary);
      text-align: right;
      flex-shrink: 0;
    }
    .h-bar-track {
      flex: 1;
      height: 24px;
      background: var(--color-bg-light);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .h-bar-fill {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
    }
    .h-bar-pct {
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      color: white;
    }
    /* SVG line chart */
    .line-chart-svg {
      width: 100%;
      height: 220px;
    }
    /* stat card animation */
    .admin-stat-card {
      opacity: 0;
      transform: translateY(16px);
      animation: statCardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .admin-stat-card:nth-child(1) { animation-delay: 0.05s; }
    .admin-stat-card:nth-child(2) { animation-delay: 0.1s; }
    .admin-stat-card:nth-child(3) { animation-delay: 0.15s; }
    .admin-stat-card:nth-child(4) { animation-delay: 0.2s; }
    @keyframes statCardIn {
      to { opacity: 1; transform: translateY(0); }
    }
    /* Collapsible sidebar groups */
    .admin-nav-group-section { margin-top: 4px; }
    .admin-nav-group-header { display: flex; align-items: center; gap: 12px; padding: 10px var(--spacing-md); border-radius: var(--radius-sm); color: rgba(255,255,255,0.7); font-size: var(--font-size-sm); font-weight: 600; cursor: pointer; transition: all var(--transition-fast); user-select: none; }
    .admin-nav-group-header:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .admin-nav-group-header .nav-icon { opacity: 0.6; }
    .nav-group-arrow { margin-left: auto; transition: transform 0.3s ease; opacity: 0.4; }
    .admin-nav-group-section.collapsed .nav-group-arrow { transform: rotate(-90deg); }
    .admin-nav-group-items { overflow: hidden; transition: max-height 0.3s ease; max-height: 500px; }
    .admin-nav-group-section.collapsed .admin-nav-group-items { max-height: 0; }
    .admin-nav-item.sub { padding-left: calc(var(--spacing-md) + 28px); font-size: calc(var(--font-size-sm) - 1px); }
    .admin-nav-item.sub .nav-icon { width: 16px; height: 16px; }
    .admin-nav-item.sub .nav-icon svg { width: 16px; height: 16px; }
    @media (max-width: 768px) {
      .charts-row { grid-template-columns: 1fr; }
      .date-filter-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>

          <div class="admin-stat-card" style="position:relative;">
            <div class="admin-stat-card-header">
              <div class="admin-stat-card-icon" style="background:rgba(139,92,246,0.1);color:#8B5CF6;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
            </div>
            <div class="admin-stat-card-value" id="statPassRate">94%</div>
            <div class="admin-stat-card-label">通过率</div>
          </div>
        </div>

        <!-- Charts Row -->
        <div class="charts-row">
          <!-- Bar Chart: Score Distribution -->
          <div class="chart-container">
            <div class="chart-title">面试成绩分布</div>
            <div id="scoreChart" class="bar-chart-css"></div>
          </div>
          <!-- Horizontal Bar: Major Pass Rate -->
          <div class="chart-container">
            <div class="chart-title">各专业通过率</div>
            <div id="majorChart" class="h-bar-list"></div>
          </div>
        </div>

        <!-- Line Chart: AI Detection Pass Rate Trend -->
        <div class="chart-container">
          <div class="chart-title">AI检测通过率趋势</div>
          <svg id="lineChart" class="line-chart-svg" viewBox="0 0 600 220"></svg>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    var statsData = {
      sessions: 15, students: 89, avgScore: 82.3, passRate: 94,
      scoreDist: [
        { label: '0-59', count: 2, color: '#EF4444' },
        { label: '60-69', count: 5, color: '#F59E0B' },
        { label: '70-79', count: 12, color: '#FBBF24' },
        { label: '80-89', count: 28, color: '#22C55E' },
        { label: '90-100', count: 42, color: '#4A6CF7' }
      ],
      majorRates: [
        { name: '汽车维修', rate: 95, color: '#4A6CF7' },
        { name: '烹饪工艺', rate: 88, color: '#22C55E' },
        { name: '机电一体化', rate: 92, color: '#8B5CF6' },
        { name: '数控技术', rate: 90, color: '#F59E0B' },
        { name: '电子商务', rate: 96, color: '#EC4899' },
        { name: '计算机应用', rate: 85, color: '#06B6D4' }
      ],
      trendMonths: ['2月', '3月', '4月', '5月', '6月', '7月'],
      trendValues: [88, 91, 87, 93, 95, 94]
    };

    function renderScoreChart() {
      var maxCount = Math.max.apply(null, statsData.scoreDist.map(function(d) { return d.count; }));
      var html = '';
      statsData.scoreDist.forEach(function(item) {
        var pct = (item.count / maxCount) * 100;
        html += '<div class="bar-col">';
        html += '  <span class="bar-value">' + item.count + '人</span>';
        html += '  <div class="bar-fill" style="height:' + pct + '%;background:' + item.color + ';"></div>';
        html += '  <span class="bar-label">' + item.label + '</span>';
        html += '</div>';
      });
      document.getElementById('scoreChart').innerHTML = html;
    }

    function renderMajorChart() {
      var html = '';
      statsData.majorRates.forEach(function(item) {
        html += '<div class="h-bar-item">';
        html += '  <span class="h-bar-label">' + item.name + '</span>';
        html += '  <div class="h-bar-track">';
        html += '    <div class="h-bar-fill" style="width:' + item.rate + '%;background:' + item.color + ';">';
        html += '      <span class="h-bar-pct">' + item.rate + '%</span>';
        html += '    </div>';
        html += '  </div>';
        html += '</div>';
      });
      document.getElementById('majorChart').innerHTML = html;
    }

    function renderLineChart() {
      var svg = document.getElementById('lineChart');
      var months = statsData.trendMonths;
      var values = statsData.trendValues;
      var w = 600, h = 220;
      var padL = 50, padR = 20, padT = 20, padB = 40;
      var chartW = w - padL - padR;
      var chartH = h - padT - padB;
      var minV = 80, maxV = 100;
      var range = maxV - minV;

      function getX(i) { return padL + (i / (months.length - 1)) * chartW; }
      function getY(v) { return padT + chartH - ((v - minV) / range) * chartH; }

      var points = values.map(function(v, i) { return getX(i) + ',' + getY(v); }).join(' ');
      var areaPoints = padL + ',' + (padT + chartH) + ' ' + points + ' ' + getX(values.length - 1) + ',' + (padT + chartH);

      var html = '';
      // Grid lines
      for (var v = minV; v <= maxV; v += 5) {
        var y = getY(v);
        html += '<line x1="' + padL + '" y1="' + y + '" x2="' + (w - padR) + '" y2="' + y + '" stroke="#F3F4F6" stroke-width="0.5" stroke-dasharray="4"/>';
        html += '<text x="' + (padL - 8) + '" y="' + (y + 4) + '" text-anchor="end" fill="#9CA3AF" font-size="11">' + v + '%</text>';
      }
      // X labels
      months.forEach(function(m, i) {
        html += '<text x="' + getX(i) + '" y="' + (h - 8) + '" text-anchor="middle" fill="#6B7280" font-size="12">' + m + '</text>';
      });
      // Area fill
      html += '<polygon points="' + areaPoints + '" fill="rgba(74,108,247,0.08)"/>';
      // Line
      html += '<polyline points="' + points + '" fill="none" stroke="#4A6CF7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
      // Dots + values
      values.forEach(function(v, i) {
        html += '<circle cx="' + getX(i) + '" cy="' + getY(v) + '" r="5" fill="white" stroke="#4A6CF7" stroke-width="2.5"/>';
        html += '<text x="' + getX(i) + '" y="' + (getY(v) - 12) + '" text-anchor="middle" fill="#4A6CF7" font-size="12" font-weight="600">' + v + '%</text>';
      });
      svg.innerHTML = html;
    }

    function filterData() {
      var start = document.getElementById('startDate').value;
      var end = document.getElementById('endDate').value;
      // Simulate data update
      var rand = Math.random();
      statsData.sessions = Math.round(10 + rand * 10);
      statsData.students = Math.round(70 + rand * 30);
      statsData.avgScore = (78 + rand * 10).toFixed(1);
      statsData.passRate = Math.round(88 + rand * 10);
      document.getElementById('statSessions').textContent = statsData.sessions;
      document.getElementById('statStudents').textContent = statsData.students;
      document.getElementById('statAvgScore').textContent = statsData.avgScore;
      document.getElementById('statPassRate').textContent = statsData.passRate + '%';
      Toast.success('数据已更新 (' + start + ' 至 ' + end + ')');
    }

    function exportReport() {
      Toast.info('报告导出功能已触发');
    }

    (function() {
      var sidebar = document.getElementById('adminSidebar');
      var toggle = document.getElementById('sidebarToggle');
      if (toggle && sidebar) { toggle.addEventListener('click', function() { sidebar.classList.toggle('collapsed'); }); }
    })();

    MockData.init();
    renderScoreChart();
    renderMajorChart();
    renderLineChart();
  </script>
</body>
</html>
