<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>测评结果 — AI智能面试系统</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/student.css">
  <style>
    /* ============================================
       Student Result Page — Assessment Results
       ============================================ */

    :root {
      --r-primary: #4A6CF7;
      --r-bg: #F0F2F8;
      --r-card: #fff;
      --r-text: #1E293B;
      --r-text-secondary: #64748B;
      --r-text-muted: #94A3B8;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
      background: var(--r-bg);
      color: var(--r-text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Fixed Header — Glassmorphism ===== */
    .result-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .result-header .back-btn {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      color: var(--r-text);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .result-header .back-btn:active { transform: scale(0.92); background: rgba(74, 108, 247, 0.08); }
    .result-header .back-btn svg { width: 22px; height: 22px; }

    .result-header .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--r-text);
    }

    /* ===== Main Content ===== */
    .result-content {
      flex: 1;
      padding: 16px;
      padding-bottom: calc(140px + env(safe-area-inset-bottom, 0px));
    }

    /* ===== Score Hero Card ===== */
    .score-hero {
      background: linear-gradient(135deg, #4A6CF7 0%, #6C5CE7 100%);
      border-radius: 20px;
      padding: 36px 24px 28px;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(74, 108, 247, 0.35);
      margin-bottom: 16px;
    }

    .score-hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .score-hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -40px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .score-hero .score-label {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .score-hero .score-number {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
      letter-spacing: -2px;
    }

    .score-hero .grade-badge {
      display: inline-flex;
      padding: 6px 20px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .grade-badge.excellent { background: rgba(255,255,255,0.95); color: #4A6CF7; }
    .grade-badge.good { background: rgba(255,255,255,0.95); color: #10B981; }
    .grade-badge.pass { background: rgba(255,255,255,0.95); color: #F59E0B; }
    .grade-badge.fail { background: rgba(255,255,255,0.95); color: #EF4444; }

    .score-hero .score-subtitle {
      font-size: 13px;
      opacity: 0.7;
      position: relative;
      z-index: 1;
    }

    /* ===== Dimension Scores Grid ===== */
    .dimension-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .dimension-card {
      background: var(--r-card);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .dimension-card:active { transform: scale(0.97); }

    .dimension-info { flex: 1; min-width: 0; }

    .dimension-label {
      font-size: 13px;
      color: var(--r-text-secondary);
      margin-bottom: 4px;
    }

    .dimension-score {
      font-size: 20px;
      font-weight: 800;
      color: var(--r-text);
    }

    .dimension-score span { font-size: 13px; font-weight: 500; color: var(--r-text-muted); }

    /* SVG Ring Progress */
    .ring-progress {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      position: relative;
    }

    .ring-progress svg { width: 100%; height: 100%; transform: rotate(-90deg); }

    .ring-progress .ring-bg {
      fill: none;
      stroke: #E5E7EB;
      stroke-width: 4;
    }

    .ring-progress .ring-fill {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .ring-progress .ring-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      font-weight: 700;
    }

    /* ===== Card Sections ===== */
    .result-card {
      background: var(--r-card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .result-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-card-icon svg { width: 18px; height: 18px; color: #fff; }

    .result-card-icon.blue { background: linear-gradient(135deg, #3B82F6, #60A5FA); }
    .result-card-icon.green { background: linear-gradient(135deg, #10B981, #34D399); }
    .result-card-icon.purple { background: linear-gradient(135deg, #8B5CF6, #A78BFA); }
    .result-card-icon.orange { background: linear-gradient(135deg, #F97316, #FB923C); }

    .result-card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--r-text);
    }

    /* ===== AI Analysis Typing ===== */
    .ai-analysis-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--r-text-secondary);
      min-height: 80px;
    }

    .ai-analysis-text .cursor {
      display: inline-block;
      width: 2px;
      height: 16px;
      background: var(--r-primary);
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .ai-findings {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ai-finding {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: var(--r-text-secondary);
      line-height: 1.6;
    }

    .ai-finding-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .ai-finding-dot.blue { background: #3B82F6; }
    .ai-finding-dot.green { background: #22C55E; }
    .ai-finding-dot.purple { background: #8B5CF6; }
    .ai-finding-dot.orange { background: #F97316; }

    /* ===== AI Detection Results ===== */
    .detection-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .detection-status.pass {
      background: #ECFDF5;
      color: #065F46;
    }

    .detection-status.fail {
      background: #FEF2F2;
      color: #991B1B;
    }

    .detection-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .detection-item:last-child { border-bottom: none; }

    .detection-item-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--r-text);
    }

    .detection-item-left svg {
      width: 18px;
      height: 18px;
      color: #22C55E;
      flex-shrink: 0;
    }

    .detection-bar {
      width: 100px;
      height: 6px;
      background: #E5E7EB;
      border-radius: 9999px;
      overflow: hidden;
    }

    .detection-bar-fill {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(135deg, #22C55E, #34D399);
      transition: width 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .detection-percent {
      font-size: 13px;
      font-weight: 700;
      color: #22C55E;
      margin-left: 8px;
      min-width: 40px;
      text-align: right;
    }

    /* ===== Score History Chart ===== */
    .history-chart-container {
      position: relative;
      width: 100%;
      height: 200px;
    }

    .history-chart-container canvas {
      width: 100%;
      height: 100%;
    }

    /* ===== Result Type Tabs ===== */
    .result-type-tabs {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: #F1F5F9;
      border-radius: 14px;
      margin-bottom: 16px;
    }

    .result-type-tab {
      flex: 1;
      padding: 10px 8px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--r-text-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      text-align: center;
    }

    .result-type-tab:active { transform: scale(0.96); }

    .result-type-tab.active {
      background: #fff;
      color: var(--r-primary);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    /* Tab content panels */
    .result-tab-panel {
      display: none;
    }

    .result-tab-panel.active {
      display: block;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Exam result: knowledge dimension bars */
    .knowledge-dimension {
      margin-bottom: 16px;
    }

    .knowledge-dimension:last-child { margin-bottom: 0; }

    .knowledge-dimension-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .knowledge-dimension-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--r-text);
    }

    .knowledge-dimension-score {
      font-size: 14px;
      font-weight: 700;
      color: var(--r-primary);
    }

    .knowledge-dimension-bar {
      height: 10px;
      background: #E5E7EB;
      border-radius: 5px;
      overflow: hidden;
    }

    .knowledge-dimension-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      width: 0;
    }

    .knowledge-dimension-fill.blue { background: linear-gradient(90deg, #3B82F6, #60A5FA); }
    .knowledge-dimension-fill.green { background: linear-gradient(90deg, #22C55E, #34D399); }
    .knowledge-dimension-fill.orange { background: linear-gradient(90deg, #F97316, #FB923C); }
    .knowledge-dimension-fill.purple { background: linear-gradient(90deg, #8B5CF6, #A78BFA); }
    .knowledge-dimension-fill.red { background: linear-gradient(90deg, #EF4444, #F87171); }

    /* Video detection status items */
    .video-detection-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .video-detection-item:last-child { border-bottom: none; }

    .video-detection-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--r-text);
      font-weight: 500;
    }

    .video-detection-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 700;
    }

    .video-detection-status.pass { background: #ECFDF5; color: #065F46; }
    .video-detection-status.fail { background: #FEF2F2; color: #991B1B; }
    .video-detection-status.review { background: #FEF3C7; color: #92400E; }

    /* ===== Bottom Action Bar ===== */
    .bottom-actions {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      z-index: 150;
    }

    .bottom-actions .action-btn {
      flex: 1;
      height: 48px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border: none;
    }

    .bottom-actions .action-btn:active { transform: scale(0.97); }

    .bottom-actions .action-btn.outline {
      background: transparent;
      color: var(--r-primary);
      border: 1.5px solid var(--r-primary);
    }

    .bottom-actions .action-btn.gradient {
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      color: #fff;
      box-shadow: 0 4px 16px rgba(74, 108, 247, 0.3);
    }

    .bottom-actions .action-btn svg { width: 18px; height: 18px; }

    /* ===== TabBar ===== */
    .student-tabbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      display: flex;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      z-index: 200;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06);
    }

    .student-tabbar .tabbar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 4px 0;
      color: #9CA3AF;
      font-size: 10px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .student-tabbar .tabbar-item svg {
      width: 24px; height: 24px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .student-tabbar .tabbar-item.active { color: #4A6CF7; }
    .student-tabbar .tabbar-item.active svg { transform: scale(1.1); }

    .student-tabbar .tabbar-item.active::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      border-radius: 0 0 3px 3px;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
    }

    .student-tabbar .tabbar-item:active { transform: scale(0.92); }
  </style>
</head>
<body>
  <div class="student-page">
    <!-- Fixed Header -->
    <header class="result-header">
      <a href="javascript:history.back()" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="header-title">测评结果</div>

    <!-- Main Content -->

  <!-- Bottom Action Bar -->
  <div class="bottom-actions" id="bottomActions">

      分享成绩
    </button>
    <button class="action-btn gradient" onclick="navigateTo('student-home.html')">

    <a href="student-notice.html" class="tabbar-item">

  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    /* ============================================
       Student Result Page Logic
       ============================================ */

    var currentUser = null;
    var scoreData = null;
    var examResultData = null;
    var videoDetectionData = null;

    document.addEventListener('DOMContentLoaded', function () {
      MockData.init();
      EventBus.init();
      currentUser = DataStore.getCurrentUser();
      if (!currentUser) {
        navigateTo('student-login.html');
        return;
      }
      loadAllData();
    });

    /* ---- Load All Result Data ---- */
    function loadAllData() {
      // 1. Load exam (comprehensive test) result from DataStore
      examResultData = DataStore.getExamResult();
      if (!examResultData || !examResultData.score) {
        examResultData = {
          score: 78,
          correct: 8,
          total: 10,
          passed: true,
          submittedAt: Date.now() - 3600000,
          completedAt: new Date(Date.now() - 3600000).toISOString(),
          dimensions: [
            { label: '发动机原理', score: 85, color: 'blue' },
            { label: '底盘构造', score: 78, color: 'green' },
            { label: '制动系统', score: 72, color: 'orange' },
            { label: '润滑系统', score: 68, color: 'purple' },
            { label: '电气系统', score: 82, color: 'red' }
          ]
        };
      } else if (!examResultData.dimensions) {
        examResultData.dimensions = [
          { label: '发动机原理', score: Math.min(100, Math.round(examResultData.score * 1.05)), color: 'blue' },
          { label: '底盘构造', score: Math.min(100, Math.round(examResultData.score * 0.98)), color: 'green' },
          { label: '制动系统', score: Math.min(100, Math.round(examResultData.score * 0.9)), color: 'orange' },

    /* ---- Draw History Chart ---- */
    function drawHistoryChart() {
      var canvas = document.getElementById('historyChart');
      if (!canvas) return;
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      var w = rect.width;
      var h = rect.height;
      var padding = { top: 20, right: 20, bottom: 40, left: 40 };
      var chartW = w - padding.left - padding.right;
      var chartH = h - padding.top - padding.bottom;

      var data = [
        { label: '第一次', score: 72 },
        { label: '第二次', score: 80 },
        { label: '第三次', score: Math.round(scoreData.total) }
      ];

      var minScore = 50;
      var maxScore = 100;
      var range = maxScore - minScore;

      /* Grid lines */
      ctx.strokeStyle = '#E5E7EB';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([4, 4]);
      for (var i = 0; i <= 4; i++) {
        var y = padding.top + (chartH / 4) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();

        ctx.fillStyle = '#94A3B8';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(maxScore - (range / 4) * i, padding.left - 8, y + 4);
      }
      ctx.setLineDash([]);

      var points = data.map(function(d, idx) {
        var x = padding.left + (chartW / (data.length - 1 || 1)) * idx;
        var y = padding.top + chartH - ((d.score - minScore) / range) * chartH;
        return { x: x, y: y, score: d.score, label: d.label };
      });

      var gradient = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
      gradient.addColorStop(0, 'rgba(74, 108, 247, 0.2)');
      gradient.addColorStop(1, 'rgba(74, 108, 247, 0.01)');

      ctx.beginPath();
      ctx.moveTo(points[0].x, padding.top + chartH);
      points.forEach(function(p) { ctx.lineTo(p.x, p.y); });
      ctx.lineTo(points[points.length - 1].x, padding.top + chartH);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      var lineGradient = ctx.createLinearGradient(padding.left, 0, w - padding.right, 0);
      lineGradient.addColorStop(0, '#4A6CF7');
      lineGradient.addColorStop(1, '#6C5CE7');

      ctx.beginPath();
      ctx.strokeStyle = lineGradient;
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      points.forEach(function(p, idx) {
        if (idx === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();

      points.forEach(function(p) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(74, 108, 247, 0.15)';
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#4A6CF7';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.fillStyle = '#4A6CF7';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.score, p.x, p.y - 14);

        ctx.fillStyle = '#94A3B8';
        ctx.font = '11px sans-serif';
        ctx.fillText(p.label, p.x, padding.top + chartH + 24);
      });
    }

    /* ---- Animate Number Counter ---- */
    function animateNumber(el, target, duration) {
      var start = 0;
      var startTime = performance.now();
      function update(t) {
        var elapsed = t - startTime;
        var progress = Math.min(elapsed / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(target * eased);
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

      if (navigator.share) {
        navigator.share({ title: 'AI面试测评成绩', text: text, url: location.href });
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
          Toast.success('成绩已复制到剪贴板');
        });
      } else {
        Toast.info('当前浏览器不支持分享功能');
      }
    }
  </script>
</body>
</html>
