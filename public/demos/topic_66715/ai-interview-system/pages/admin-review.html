  <style>
    .admin-nav-group-section { margin-top: 4px; }
    .admin-nav-group-header { display: flex; align-items: center; gap: 12px; padding: 10px var(--spacing-md); border-radius: var(--radius-sm); color: rgba(255,255,255,0.7); font-size: var(--font-size-sm); font-weight: 600; cursor: pointer; transition: all var(--transition-fast); user-select: none; }
    .admin-nav-group-header:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .admin-nav-group-header .nav-icon { opacity: 0.6; }
    .nav-group-arrow { margin-left: auto; transition: transform 0.3s ease; opacity: 0.4; }
    .admin-nav-group-section.collapsed .nav-group-arrow { transform: rotate(-90deg); }
    .admin-nav-group-items { overflow: hidden; transition: max-height 0.3s ease; max-height: 500px; }
    .admin-nav-group-section.collapsed .admin-nav-group-items { max-height: 0; }
    .admin-nav-item.sub { padding-left: calc(var(--spacing-md) + 28px); font-size: calc(var(--font-size-sm) - 1px); }
    .admin-nav-item.sub .nav-icon { width: 16px; height: 16px; }
    .admin-nav-item.sub .nav-icon svg { width: 16px; height: 16px; }

    .review-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-md); margin-bottom: var(--spacing-xl); }
    .review-stat-card { background: var(--color-bg-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card); padding: var(--spacing-lg); text-align: center; }
    .review-stat-value { font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); line-height: 1; margin-bottom: var(--spacing-xs); }
    .review-stat-value.orange { color: var(--color-warning); }
    .review-stat-value.green { color: var(--color-success); }
    .review-stat-value.red { color: var(--color-danger); }
    .review-stat-label { font-size: var(--font-size-sm); color: var(--color-text-secondary); }

    .review-tabs { display: flex; gap: 0; margin-bottom: var(--spacing-xl); background: var(--color-bg-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card); overflow: hidden; }
    .review-tab { flex: 1; padding: 14px 20px; font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-text-secondary); text-align: center; cursor: pointer; transition: all var(--transition-fast); border-bottom: 3px solid transparent; }
    .review-tab:hover { color: var(--color-text-primary); background: var(--color-bg-light); }
    .review-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); background: rgba(74,108,247,0.04); }
    .review-tab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: var(--radius-full); font-size: 11px; font-weight: var(--font-weight-bold); margin-left: 6px; }
    .review-tab.active .review-tab-count { background: var(--gradient-primary); color: white; }
    .review-tab:not(.active) .review-tab-count { background: var(--color-bg-light); color: var(--color-text-tertiary); }

    .review-card { background: var(--color-bg-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card); padding: var(--spacing-2xl); margin-bottom: var(--spacing-md); transition: all var(--transition-normal); }
    .review-card:hover { box-shadow: var(--shadow-card-hover); transform: translateY(-1px); }
    .review-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--spacing-lg); }
    .review-card-title { font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); }
    .review-card-subtitle { font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-top: 2px; }
    .review-card-meta { display: flex; gap: var(--spacing-lg); flex-wrap: wrap; margin-bottom: var(--spacing-lg); }
    .review-meta-item { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .review-meta-item strong { color: var(--color-text-primary); }

    .score-breakdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-sm); margin-bottom: var(--spacing-lg); }
    .score-breakdown-item { text-align: center; padding: var(--spacing-md); background: var(--color-bg-light); border-radius: var(--radius-sm); }
    .score-breakdown-label { font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-bottom: 4px; }
    .score-breakdown-value { font-size: var(--font-size-lg); font-weight: var(--font-weight-bold); color: var(--color-primary); }

    .ai-result-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 12px; border-radius: var(--radius-full); font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); }
    .ai-result-badge.pass { background: var(--color-success-bg); color: var(--color-success); }
    .ai-result-badge.warning { background: var(--color-warning-bg); color: var(--color-warning); }

    .review-comment { font-size: var(--font-size-sm); color: var(--color-text-secondary); line-height: var(--line-height-relaxed); padding: var(--spacing-md); background: var(--color-bg-light); border-radius: var(--radius-sm); border-left: 3px solid var(--color-primary); margin-bottom: var(--spacing-lg); }

    .review-card-actions { display: flex; gap: var(--spacing-sm); justify-content: flex-end; }
  </style>
</head>

  <script>
    (function() {
      var sidebar = document.getElementById('adminSidebar');
      var toggle = document.getElementById('sidebarToggle');
      if (toggle && sidebar) { toggle.addEventListener('click', function() { sidebar.classList.toggle('collapsed'); }); }
    })();

    var currentTab = 'pending';
    var reviewData = [];

    function init() {
      MockData.init();
      buildReviewData();
      renderStats();
      renderList();
    }

    function buildReviewData() {
      reviewData = [];
      var interviews = DataStore.getAllInterviews();
      var students = DataStore.getAllStudents();

      interviews.forEach(function(inv) {
        if (!inv.students) return;
        inv.students.forEach(function(stuId) {
          var student = students.find(function(s) { return s.id === stuId; });
          if (!student) return;
          var score = InterviewState.getScore(stuId, inv.id);
          if (!score) return;

          var aiResult = InterviewState.getAIResult(stuId, inv.id);
          var review = InterviewState.getReview(stuId, inv.id);
          var reviewStatus = review ? review.status : 'pending';

          reviewData.push({
            studentId: stuId,
            studentName: student.name,
            major: student.major,
            className: student.className,
            interviewId: inv.id,
            interviewTitle: inv.title,
            score: score,
            aiResult: aiResult,
            reviewStatus: reviewStatus,
            teacherComment: score.comment || ''
          });
        });
      });
    }

    function renderStats() {
      var pending = reviewData.filter(function(r) { return r.reviewStatus === 'pending'; }).length;
      var approved = reviewData.filter(function(r) { return r.reviewStatus === 'approved'; }).length;
      var rejected = reviewData.filter(function(r) { return r.reviewStatus === 'rejected'; }).length;

      document.getElementById('reviewStats').innerHTML =
        '<div class="review-stat-card"><div class="review-stat-value orange">' + pending + '</div><div class="review-stat-label">待审核</div></div>' +
        '<div class="review-stat-card"><div class="review-stat-value green">' + approved + '</div><div class="review-stat-label">已通过</div></div>' +
        '<div class="review-stat-card"><div class="review-stat-value red">' + rejected + '</div><div class="review-stat-label">已驳回</div></div>';

      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('approvedCount').textContent = approved;
      document.getElementById('rejectedCount').textContent = rejected;
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.review-tab').forEach(function(t) { t.classList.remove('active'); });
      el.classList.add('active');
      renderList();
    }

    function renderList() {
      var filtered = reviewData.filter(function(r) { return r.reviewStatus === currentTab; });
      var container = document.getElementById('reviewList');

      if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:60px 0;color:var(--color-text-tertiary);font-size:var(--font-size-sm);">暂无' + (currentTab === 'pending' ? '待审核' : currentTab === 'approved' ? '已通过' : '已驳回') + '的记录</div>';
        return;
      }

      var html = '';
      filtered.forEach(function(r) {
        var aiBadge = r.aiResult ? '<span class="ai-result-badge ' + r.aiResult.status + '">' + (r.aiResult.status === 'pass' ? 'AI检测通过' : 'AI检测异常') + '</span>' : '';
        var statusLabel = r.reviewStatus === 'approved' ? '<span class="tag tag-success">已通过</span>' : r.reviewStatus === 'rejected' ? '<span class="tag tag-danger">已驳回</span>' : '';

        html += '<div class="review-card">' +
          '<div class="review-card-header">' +
            '<div><div class="review-card-title">' + r.studentName + '</div><div class="review-card-subtitle">' + r.className + ' | ' + r.major + '</div></div>' +
            statusLabel +
          '</div>' +
          '<div class="review-card-meta">' +
            '<div class="review-meta-item">面试场次：<strong>' + r.interviewTitle + '</strong></div>' +
            '<div class="review-meta-item">综合得分：<strong>' + r.score.total + ' 分</strong></div>' +
            '<div class="review-meta-item">' + aiBadge + '</div>' +
          '</div>' +
          '<div class="score-breakdown">' +
            '<div class="score-breakdown-item"><div class="score-breakdown-label">专业素养</div><div class="score-breakdown-value">' + r.score.professionalism + '</div></div>' +
            '<div class="score-breakdown-item"><div class="score-breakdown-label">表达能力</div><div class="score-breakdown-value">' + r.score.expression + '</div></div>' +
            '<div class="score-breakdown-item"><div class="score-breakdown-label">仪容仪表</div><div class="score-breakdown-value">' + r.score.appearance + '</div></div>' +
            '<div class="score-breakdown-item"><div class="score-breakdown-label">综合印象</div><div class="score-breakdown-value">' + r.score.impression + '</div></div>' +
          '</div>' +
          '<div class="review-comment">' + (r.teacherComment || '暂无评语') + '</div>' +
          '<div class="review-card-actions">';

        if (r.reviewStatus === 'pending') {
          html += '<button class="btn btn-success btn-sm" onclick="approveReview(\'' + r.studentId + '\', \'' + r.interviewId + '\')">通过</button>';
          html += '<button class="btn btn-danger btn-sm" onclick="rejectReview(\'' + r.studentId + '\', \'' + r.interviewId + '\')">驳回</button>';
          html += '<button class="btn btn-secondary btn-sm" onclick="viewReviewDetail(\'' + r.studentId + '\', \'' + r.interviewId + '\')">查看详情</button>';
        } else {
          html += '<button class="btn btn-secondary btn-sm" onclick="viewReviewDetail(\'' + r.studentId + '\', \'' + r.interviewId + '\')">查看详情</button>';
        }

        html += '</div></div>';
      });

      container.innerHTML = html;
    }

    function approveReview(studentId, interviewId) {
      Modal.confirm('确定通过该学生的面试评分结果？', function() {
        InterviewState.setReview(studentId, interviewId, { status: 'approved', reviewedBy: '管理员', reviewedAt: Date.now(), comment: '' });
        buildReviewData();
        renderStats();
        renderList();
        Toast.success('审核已通过');
      });
    }

    function rejectReview(studentId, interviewId) {
      Modal.show({
        title: '驳回审核',
        content: '<div style="margin-bottom:var(--spacing-md);"><label style="display:block;margin-bottom:6px;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);">驳回原因 <span style="color:var(--color-danger);">*</span></label><textarea id="rejectReason" class="comment-area" placeholder="请输入驳回原因..." style="min-height:80px;"></textarea></div>',
        confirmText: '确认驳回',
        cancelText: '取消',
        onConfirm: function() {
          var reason = document.getElementById('rejectReason').value.trim();
          if (!reason) { Toast.warning('请填写驳回原因'); return; }
          InterviewState.setReview(studentId, interviewId, { status: 'rejected', reviewedBy: '管理员', reviewedAt: Date.now(), comment: reason });
          buildReviewData();
          renderStats();
          renderList();
          Toast.success('已驳回，原因已记录');
        }
      });
    }

    function viewReviewDetail(studentId, interviewId) {
      var students = DataStore.getAllStudents();
      var student = students.find(function(s) { return s.id === studentId; });
      var interview = DataStore.getAllInterviews().find(function(i) { return i.id === interviewId; });
      var score = InterviewState.getScore(studentId, interviewId);
      var aiResult = InterviewState.getAIResult(studentId, interviewId);
      var review = InterviewState.getReview(studentId, interviewId);

      if (!student || !score) return;

      var reviewStatusText = review ? (review.status === 'approved' ? '已通过' : review.status === 'rejected' ? '已驳回' : '待审核') : '待审核';
      var aiText = aiResult ? (aiResult.status === 'pass' ? '通过 (置信度' + Math.round(aiResult.confidence * 100) + '%)' : '异常 (置信度' + Math.round(aiResult.confidence * 100) + '%)') : '未检测';
      var reviewComment = review && review.comment ? '<div style="margin-top:12px;padding:12px;background:var(--color-danger-bg);border-radius:var(--radius-sm);font-size:var(--font-size-sm);color:#991B1B;"><strong>驳回原因：</strong>' + review.comment + '</div>' : '';

      Modal.show({
        title: '审核详情 — ' + student.name,
        content: '<div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">' +
            '<div><span style="font-size:var(--font-size-xs);color:var(--color-text-tertiary);">专业</span><div style="font-weight:600;margin-top:2px;">' + student.major + '</div></div>' +
            '<div><span style="font-size:var(--font-size-xs);color:var(--color-text-tertiary);">班级</span><div style="font-weight:600;margin-top:2px;">' + student.className + '</div></div>' +
            '<div><span style="font-size:var(--font-size-xs);color:var(--color-text-tertiary);">面试场次</span><div style="font-weight:600;margin-top:2px;">' + (interview ? interview.title : '--') + '</div></div>' +
            '<div><span style="font-size:var(--font-size-xs);color:var(--color-text-tertiary);">审核状态</span><div style="font-weight:600;margin-top:2px;">' + reviewStatusText + '</div></div>' +
          '</div>' +
          '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;">' +
            '<div style="text-align:center;padding:10px;background:var(--color-bg-light);border-radius:8px;"><div style="font-size:11px;color:var(--color-text-tertiary);">专业素养</div><div style="font-size:18px;font-weight:700;color:var(--color-primary);">' + score.professionalism + '</div></div>' +
            '<div style="text-align:center;padding:10px;background:var(--color-bg-light);border-radius:8px;"><div style="font-size:11px;color:var(--color-text-tertiary);">表达能力</div><div style="font-size:18px;font-weight:700;color:var(--color-primary);">' + score.expression + '</div></div>' +
            '<div style="text-align:center;padding:10px;background:var(--color-bg-light);border-radius:8px;"><div style="font-size:11px;color:var(--color-text-tertiary);">仪容仪表</div><div style="font-size:18px;font-weight:700;color:var(--color-primary);">' + score.appearance + '</div></div>' +
            '<div style="text-align:center;padding:10px;background:var(--color-bg-light);border-radius:8px;"><div style="font-size:11px;color:var(--color-text-tertiary);">综合印象</div><div style="font-size:18px;font-weight:700;color:var(--color-primary);">' + score.impression + '</div></div>' +
          '</div>' +
          '<div style="text-align:center;padding:12px;background:var(--gradient-primary-light);border-radius:8px;margin-bottom:16px;"><div style="font-size:12px;color:var(--color-text-secondary);">综合得分</div><div style="font-size:28px;font-weight:700;color:var(--color-primary);">' + score.total + '</div></div>' +
          '<div style="margin-bottom:12px;"><span style="font-size:var(--font-size-xs);color:var(--color-text-tertiary);">AI检测结果</span><div style="margin-top:2px;">' + aiText + '</div></div>' +
          '<div><span style="font-size:var(--font-size-xs);color:var(--color-text-tertiary);">教师评语</span><div style="margin-top:2px;font-size:var(--font-size-sm);color:var(--color-text-secondary);line-height:1.6;">' + (score.comment || '暂无评语') + '</div></div>' +
          reviewComment +
        '</div>',
        confirmText: '关闭',
        cancelText: false
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
