<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .interviewer-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-lg);
    }
    .interviewer-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      padding: var(--spacing-xl);
      transition: all var(--transition-normal);
    }
    .interviewer-card:hover {
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-2px);
    }
    .interviewer-card-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }
    .interviewer-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: white;
      flex-shrink: 0;
    }
    .interviewer-info h3 {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
    }
    .interviewer-info .title {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
    }
    .interviewer-stats {
      display: flex;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--color-border-light);
    }
    .interviewer-stat {
      text-align: center;
      flex: 1;
    }
    .interviewer-stat-value {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
    }
    .interviewer-stat-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
    }
    .interviewer-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: var(--spacing-lg);
    }
    .interviewer-skill {
      padding: 3px 10px;
      font-size: var(--font-size-xs);
      border-radius: var(--radius-full);
      background: var(--color-primary-50);
      color: var(--color-primary);
    }
    .interviewer-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      border-radius: var(--radius-full);
      margin-bottom: var(--spacing-md);
    }
    .interviewer-status.active {
      background: var(--color-success-bg);
      color: var(--color-success);
    }
    .interviewer-status.leave {
      background: var(--color-warning-bg);
      color: var(--color-warning);
    }
    .interviewer-status.disabled {
      background: var(--color-danger-bg);
      color: var(--color-danger);
    }
    .interviewer-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .interviewer-status.active::before { background: var(--color-success); }
    .interviewer-status.leave::before { background: var(--color-warning); }
    .interviewer-status.disabled::before { background: var(--color-danger); }
    .interviewer-actions {
      display: flex;
      gap: var(--spacing-sm);
    }
    .search-actions-bar {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }
    .search-input {
      flex: 1;
      max-width: 320px;
      height: 40px;
      padding: 0 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: var(--font-size-sm);
      color: var(--color-text-primary);
      background: var(--color-bg-card);
      transition: all var(--transition-fast);
    }
    .search-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(74,108,247,0.1);
    }
    .search-input::placeholder { color: var(--color-text-tertiary); }
    .admin-stat-card {
      opacity: 0;
      transform: translateY(16px);
      animation: statCardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .admin-stat-card:nth-child(1) { animation-delay: 0.05s; }
    .admin-stat-card:nth-child(2) { animation-delay: 0.1s; }
    .admin-stat-card:nth-child(3) { animation-delay: 0.15s; }
    @keyframes statCardIn { to { opacity: 1; transform: translateY(0); } }
    /* Collapsible sidebar groups */
    .admin-nav-group-section { margin-top: 4px; }
    .admin-nav-group-header { display: flex; align-items: center; gap: 12px; padding: 10px var(--spacing-md); border-radius: var(--radius-sm); color: rgba(255,255,255,0.7); font-size: var(--font-size-sm); font-weight: 600; cursor: pointer; transition: all var(--transition-fast); user-select: none; }
    .admin-nav-group-header:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .admin-nav-group-header .nav-icon { opacity: 0.6; }
    .nav-group-arrow { margin-left: auto; transition: transform 0.3s ease; opacity: 0.4; }
    .admin-nav-group-section.collapsed .nav-group-arrow { transform: rotate(-90deg); }
    .admin-nav-group-items { overflow: hidden; transition: max-height 0.3s ease; max-height: 500px; }
    .admin-nav-group-section.collapsed .admin-nav-group-items { max-height: 0; }
    .admin-nav-item.sub { padding-left: calc(var(--spacing-md) + 28px); font-size: calc(var(--font-size-sm) - 1px); }
    .admin-nav-item.sub .nav-icon { width: 16px; height: 16px; }
    .admin-nav-item.sub .nav-icon svg { width: 16px; height: 16px; }
    @media (max-width: 1024px) { .interviewer-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 768px) { .interviewer-grid { grid-template-columns: 1fr; } }
  </style>
</head>

      { id: 'INTW002', name: '陈老师', title: '副教授', phone: '13900001002', email: 'chen@school.edu.cn', status: 'active', interviews: 5, skills: ['烹饪工艺', '食品安全', '营养学'], avatarColor: '#22C55E' },
      { id: 'INTW003', name: '王老师', title: '副教授', phone: '13900001003', email: 'wang@school.edu.cn', status: 'active', interviews: 6, skills: ['机电一体化', 'PLC编程', '电工基础'], avatarColor: '#8B5CF6' },
      { id: 'INTW004', name: '赵老师', title: '讲师', phone: '13900001004', email: 'zhao@school.edu.cn', status: 'leave', interviews: 2, skills: ['数控技术', '数控编程', 'CAM'], avatarColor: '#F59E0B' },
      { id: 'INTW005', name: '孙老师', title: '讲师', phone: '13900001005', email: 'sun@school.edu.cn', status: 'active', interviews: 2, skills: ['电子商务', '网络营销', 'SEO'], avatarColor: '#EC4899' }
    ];

    function renderInterviewers(list) {
      var grid = document.getElementById('interviewerGrid');
      var data = list || interviewers;
      if (data.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">0</div><div class="empty-state-title">未找到匹配的面试官</div></div>';
        return;
      }
      var html = '';
      data.forEach(function(p) {
        var statusLabel = p.status === 'active' ? '活跃' : p.status === 'leave' ? '休假' : '已禁用';
        html += '<div class="interviewer-card">';
        html += '  <div class="interviewer-card-header">';
        html += '    <div class="interviewer-avatar" style="background:' + p.avatarColor + ';">' + p.name.charAt(0) + '</div>';
        html += '    <div class="interviewer-info">';
        html += '      <h3>' + p.name + '</h3>';
        html += '      <span class="title">' + p.title + '</span>';
        html += '    </div>';
        html += '  </div>';
        html += '  <span class="interviewer-status ' + p.status + '">' + statusLabel + '</span>';
        html += '  <div class="interviewer-stats">';
        html += '    <div class="interviewer-stat"><div class="interviewer-stat-value">' + p.interviews + '</div><div class="interviewer-stat-label">已面试</div></div>';
        html += '    <div class="interviewer-stat"><div class="interviewer-stat-value">' + p.skills.length + '</div><div class="interviewer-stat-label">专业领域</div></div>';
        html += '  </div>';
        html += '  <div class="interviewer-skills">';
        p.skills.forEach(function(s) { html += '<span class="interviewer-skill">' + s + '</span>'; });
        html += '  </div>';
        html += '  <div class="interviewer-actions">';
        html += '    <button class="btn btn-secondary btn-sm" onclick="editInterviewer(\'' + p.id + '\')">编辑</button>';
        html += '    <button class="btn btn-outline btn-sm" onclick="viewSchedule(\'' + p.name + '\')">查看排期</button>';
        if (p.status === 'active') {
          html += '    <button class="btn btn-sm" style="background:var(--color-danger-bg);color:var(--color-danger);" onclick="disableInterviewer(\'' + p.id + '\')">禁用</button>';
        } else {
          html += '    <button class="btn btn-success btn-sm" onclick="enableInterviewer(\'' + p.id + '\')">启用</button>';
        }
        html += '  </div>';
        html += '</div>';
      });
      grid.innerHTML = html;
    }

    function filterInterviewers() {
      var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!keyword) { renderInterviewers(); return; }
      var filtered = interviewers.filter(function(p) { return p.name.toLowerCase().indexOf(keyword) !== -1; });
      renderInterviewers(filtered);
    }

    function editInterviewer(id) {
      var p = interviewers.find(function(i) { return i.id === id; });
      if (!p) return;
      var content = '<div class="form-group"><label class="form-label">姓名</label><input type="text" class="form-input" id="editName" value="' + p.name + '"></div>';
      content += '<div class="form-group"><label class="form-label">职称</label><select class="form-select" id="editTitle"><option' + (p.title === '教授' ? ' selected' : '') + '>教授</option><option' + (p.title === '副教授' ? ' selected' : '') + '>副教授</option><option' + (p.title === '讲师' ? ' selected' : '') + '>讲师</option></select></div>';
      content += '<div class="admin-form-row"><div class="form-group"><label class="form-label">手机</label><input type="text" class="form-input" id="editPhone" value="' + p.phone + '"></div><div class="form-group"><label class="form-label">邮箱</label><input type="text" class="form-input" id="editEmail" value="' + p.email + '"></div></div>';
      content += '<div class="form-group"><label class="form-label">专业特长</label><input type="text" class="form-input" id="editSkills" value="' + p.skills.join(', ') + '"></div>';
      Modal.show({
        title: '编辑面试官',
        content: content,
        confirmText: '保存',
        cancelText: '取消',
        onConfirm: function() {
          p.name = document.getElementById('editName').value.trim() || p.name;
          p.title = document.getElementById('editTitle').value;
          p.phone = document.getElementById('editPhone').value.trim();
          p.email = document.getElementById('editEmail').value.trim();
          p.skills = document.getElementById('editSkills').value.split(/[,，]/).map(function(s) { return s.trim(); }).filter(Boolean);
          renderInterviewers();
          Toast.success('面试官信息已更新');
        }
      });
    }

    function viewSchedule(name) {
      Toast.info(name + ' 的排期功能已触发');
    }

    function disableInterviewer(id) {
      Modal.confirm('确定要禁用该面试官吗？禁用后将无法分配面试任务。', function() {
        var p = interviewers.find(function(i) { return i.id === id; });
        if (p) { p.status = 'disabled'; renderInterviewers(); Toast.warning('面试官已禁用'); }
      });
    }

    function enableInterviewer(id) {
      var p = interviewers.find(function(i) { return i.id === id; });
      if (p) { p.status = 'active'; renderInterviewers(); Toast.success('面试官已启用'); }
    }

    function openAddInterviewerModal() {
      var content = '<div class="form-group"><label class="form-label">姓名 <span class="required">*</span></label><input type="text" class="form-input" id="addName" placeholder="请输入姓名"></div>';
      content += '<div class="form-group"><label class="form-label">职称</label><select class="form-select" id="addTitle"><option>教授</option><option selected>副教授</option><option>讲师</option></select></div>';
      content += '<div class="admin-form-row"><div class="form-group"><label class="form-label">手机</label><input type="text" class="form-input" id="addPhone" placeholder="请输入手机号"></div><div class="form-group"><label class="form-label">邮箱</label><input type="text" class="form-input" id="addEmail" placeholder="请输入邮箱"></div></div>';
      content += '<div class="form-group"><label class="form-label">专业特长</label><input type="text" class="form-input" id="addSkills" placeholder="用逗号分隔多个专业"></div>';
      Modal.show({
        title: '添加面试官',
        content: content,
        confirmText: '添加',
        cancelText: '取消',
        onConfirm: function() {
          var name = document.getElementById('addName').value.trim();
          if (!name) { Toast.error('请输入姓名'); return; }
          var colors = ['#4A6CF7', '#22C55E', '#8B5CF6', '#F59E0B', '#EC4899', '#06B6D4'];
          var newP = {
            id: 'INTW' + Date.now().toString().slice(-4),
            name: name,
            title: document.getElementById('addTitle').value,
            phone: document.getElementById('addPhone').value.trim() || '未填写',
            email: document.getElementById('addEmail').value.trim() || '未填写',
            status: 'active',
            interviews: 0,
            skills: document.getElementById('addSkills').value.split(/[,，]/).map(function(s) { return s.trim(); }).filter(Boolean),
            avatarColor: colors[Math.floor(Math.random() * colors.length)]
          };
          interviewers.push(newP);
          renderInterviewers();
          Toast.success('面试官 ' + name + ' 已添加');
        }
      });
    }

    (function() {
      var sidebar = document.getElementById('adminSidebar');
      var toggle = document.getElementById('sidebarToggle');
      if (toggle && sidebar) { toggle.addEventListener('click', function() { sidebar.classList.toggle('collapsed'); }); }
    })();

    MockData.init();
    renderInterviewers();
  </script>
</body>
</html>
