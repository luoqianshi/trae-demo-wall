<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>面试列表 — AI智能面试系统</title>
  <style>
    /* ============================================
       Reset & Base
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
      font-weight: 400;
      line-height: 1.5;
      color: #1E293B;
      overflow-x: hidden;
      background: #F0F2F8;
    }

    /* ============================================
       Header (Fixed, Glassmorphism)
       ============================================ */
    .page-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      max-width: 480px;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .back-btn {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: #1E293B;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .back-btn:active {
      transform: scale(0.92);
      background: rgba(74, 108, 247, 0.08);
    }

    .back-btn svg {
      width: 22px;
      height: 22px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #1E293B;
    }

    .filter-btn {
      position: absolute;
      right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: #64748B;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .filter-btn:active {
      transform: scale(0.92);
      background: rgba(74, 108, 247, 0.08);
    }

    .filter-btn svg {
      width: 20px;
      height: 20px;
    }

    /* ============================================
       Filter Tabs (below header)
       ============================================ */
    .filter-tabs {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      z-index: 99;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .filter-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 600;
      color: #64748B;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      font-family: inherit;
    }

    .filter-tab:active {
      transform: scale(0.95);
    }

    .filter-tab.active {
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      color: #fff;
      box-shadow: 0 4px 14px rgba(74, 108, 247, 0.35);
    }

    /* ============================================
       Main Content
       ============================================ */
    .page-content {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 120px 16px 100px;
      min-height: 100vh;
    }

    /* ============================================
       Interview Card
       ============================================ */
    .interview-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.04),
        0 8px 24px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeSlideUp 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .interview-card:active {
      transform: scale(0.97);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    /* Stagger animation delays */
    .interview-card:nth-child(1) { animation-delay: 0.08s; }
    .interview-card:nth-child(2) { animation-delay: 0.16s; }
    .interview-card:nth-child(3) { animation-delay: 0.24s; }
    .interview-card:nth-child(4) { animation-delay: 0.32s; }
    .interview-card:nth-child(5) { animation-delay: 0.40s; }

    @keyframes fadeSlideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Top row: title + status badge */
    .card-top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .card-title {
      flex: 1;
      min-width: 0;
      font-size: 16px;
      font-weight: 700;
      color: #1E293B;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .status-badge {
      flex-shrink: 0;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-badge.pending {
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      color: #fff;
      box-shadow: 0 2px 8px rgba(74, 108, 247, 0.3);
    }

    .status-badge.interviewing {
      background: linear-gradient(135deg, #F97316, #FB923C);
      color: #fff;
      box-shadow: 0 2px 8px rgba(249, 115, 22, 0.3);
      animation: badgePulse 2s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 2px 8px rgba(249, 115, 22, 0.3); }
      50% { box-shadow: 0 2px 16px rgba(249, 115, 22, 0.5); }
    }

    .status-badge.completed {
      background: linear-gradient(135deg, #22C55E, #4ADE80);
      color: #fff;
      box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
    }

    /* Info row */
    .card-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748B;
      line-height: 1.4;
    }

    .info-item .info-icon {
      width: 16px;
      height: 16px;
      min-width: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    /* Bottom row: action button */
    .card-action {
      width: 100%;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 12px 0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      text-decoration: none;
      border: none;
    }

    .action-btn:active {
      transform: scale(0.97);
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      color: #fff;
      box-shadow: 0 4px 14px rgba(74, 108, 247, 0.35);
    }

    .action-btn.primary:active {
      box-shadow: 0 2px 8px rgba(74, 108, 247, 0.25);
    }

    .action-btn.outline {
      background: transparent;
      color: #4A6CF7;
      border: 1.5px solid #4A6CF7;
    }

    .action-btn.outline:active {
      background: rgba(74, 108, 247, 0.06);
    }

    .action-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ============================================
       Empty State
       ============================================ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .empty-icon {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8ECF4, #F1F5F9);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
    }

    .empty-icon svg {
      width: 44px;
      height: 44px;
      color: #94A3B8;
    }

    .empty-icon::after {
      content: '';
      position: absolute;
      bottom: 2px;
      right: 4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: #64748B;
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 13px;
      color: #94A3B8;
      max-width: 240px;
      line-height: 1.5;
    }

    /* ============================================
       TabBar (Fixed Bottom, Glassmorphism)
       ============================================ */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      max-width: 480px;
      margin: 0 auto;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 10px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .tab-item:active {
      transform: scale(0.92);
    }

    .tab-item svg {
      width: 22px;
      height: 22px;
      color: #94A3B8;
      transition: color 0.2s ease;
    }

    .tab-item span {
      font-size: 11px;
      color: #94A3B8;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .tab-item.active svg {
      color: #4A6CF7;
    }

    .tab-item.active span {
      color: #4A6CF7;
      font-weight: 600;
    }

    /* ============================================
       Page transitions
       ============================================ */
    body.page-entering {
      opacity: 0;
      transform: translateX(30px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    body.page-entered {
      opacity: 1;
      transform: translateX(0);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    body.page-leaving {
      opacity: 0;
      transform: translateX(-30px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    /* ============================================
       Responsive
       ============================================ */
    @media (max-width: 375px) {
      .page-content {
        padding: 120px 12px 100px;
      }

      .interview-card {
        padding: 14px;
      }
    }
  </style>
</head>
<body>

  <!-- ======== Fixed Header ======== -->
  <header class="page-header">
    <a href="student-home.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <div class="header-title">面试列表</div>
    <button class="filter-btn" id="filterBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
    </button>
  </header>

  <!-- ======== Filter Tabs ======== -->
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-filter="all">全部</button>
    <button class="filter-tab" data-filter="pending">待面试</button>
    <button class="filter-tab" data-filter="completed">已完成</button>
  </div>

  <!-- ======== Main Content ======== -->
  <main class="page-content" id="pageContent">
    <!-- Dynamically rendered -->
  </main>

  <!-- ======== TabBar ======== -->
  <nav class="tab-bar">
    <a href="student-home.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </a>
    <a href="student-interview-list.html" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 14l2 2 4-4"/>
      </svg>
      <span>测评</span>
    </a>
    <a href="student-profile.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </a>
  </nav>

  <!-- ======== Scripts ======== -->
  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    (function () {
      'use strict';

      /* ---- Auth check ---- */
      var currentUser = DataStore.getCurrentUser();
      if (!currentUser) {
        window.location.href = 'student-login.html';
        return;
      }

      /* ---- Init MockData ---- */
      MockData.init();

      /* ---- State ---- */
      var currentFilter = 'all';
      var allInterviews = [];

      /* ---- Load interviews for this student ---- */
      function loadInterviews() {
        var interviews = DataStore.getAllInterviews();
        var interviewState = DataStore.get('interviewState') || {};

        allInterviews = interviews.filter(function (inv) {
          return inv.mode === 'scheduled' &&
                 inv.students &&
                 inv.students.indexOf(currentUser.id) !== -1;
        }).map(function (inv) {
          var stateKey = inv.id + '_' + currentUser.id;
          var state = interviewState[stateKey] || {};
          var displayStatus = state.status || 'pending';

          // Map internal status to display status
          var statusMap = {
            'pending': 'pending',
            'check': 'pending',
            'waiting': 'pending',
            'interviewing': 'interviewing',
            'ended': 'completed',
            'completed': 'completed'
          };
          var status = statusMap[displayStatus] || 'pending';

          return {
            id: inv.id,
            title: inv.title,
            major: inv.major,
            date: inv.date,
            time: inv.time,
            interviewer: inv.interviewer,
            status: status,
            trtcRoomId: inv.trtcRoomId,
            description: inv.description
          };
        });

        // Sort: pending first, then by date desc
        allInterviews.sort(function (a, b) {
          if (a.status === 'pending' && b.status !== 'pending') return -1;
          if (a.status !== 'pending' && b.status === 'pending') return 1;
          if (a.status === 'interviewing' && b.status !== 'interviewing') return -1;
          if (a.status !== 'interviewing' && b.status === 'interviewing') return 1;
          return new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time);
        });
      }

      /* ---- Render ---- */
      function renderList() {
        var container = document.getElementById('pageContent');
        var filtered = allInterviews;

        if (currentFilter === 'pending') {
          filtered = allInterviews.filter(function (i) {
            return i.status === 'pending' || i.status === 'interviewing';
          });
        } else if (currentFilter === 'completed') {
          filtered = allInterviews.filter(function (i) {
            return i.status === 'completed';
          });
        }

        if (filtered.length === 0) {
          container.innerHTML =
            '<div class="empty-state">' +
              '<div class="empty-icon">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                  '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>' +
                  '<line x1="16" y1="2" x2="16" y2="6"/>' +
                  '<line x1="8" y1="2" x2="8" y2="6"/>' +
                  '<line x1="3" y1="10" x2="21" y2="10"/>' +
                  '<line x1="9" y1="14" x2="15" y2="14"/>' +
                  '<line x1="12" y1="11" x2="12" y2="17"/>' +
                '</svg>' +
              '</div>' +
              '<div class="empty-title">暂无面试安排</div>' +
              '<div class="empty-desc">当前筛选条件下没有匹配的面试记录</div>' +
            '</div>';
          return;
        }

        var html = '';
        filtered.forEach(function (inv) {
          var statusText, statusClass;
          switch (inv.status) {
            case 'interviewing':
              statusText = '面试中';
              statusClass = 'interviewing';
              break;
            case 'completed':
              statusText = '已完成';
              statusClass = 'completed';
              break;
            default:
              statusText = '待面试';
              statusClass = 'pending';
          }

          var location = inv.trtcRoomId ? '线上面试室' : '线下教室';

          var actionHtml;
          if (inv.status === 'completed') {
            actionHtml =
              '<a href="student-result.html?id=' + inv.id + '" class="action-btn outline">' +
                '查看结果' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                  '<polyline points="9 18 15 12 9 6"/>' +
                '</svg>' +
              '</a>';
          } else {
            actionHtml =
              '<a href="student-video.html?mode=interview&id=' + inv.id + '" class="action-btn primary">' +
                '进入面试' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                  '<polygon points="5 3 19 12 5 21 5 3"/>' +
                '</svg>' +
              '</a>';
          }

          html +=
            '<div class="interview-card">' +
              '<div class="card-top-row">' +
                '<div class="card-title">' + escapeHtml(inv.title) + '</div>' +
                '<span class="status-badge ' + statusClass + '">' + statusText + '</span>' +
              '</div>' +
              '<div class="card-info">' +
                '<div class="info-item">' +
                  '<span class="info-icon">&#x1F4C5;</span>' +
                  '<span>' + inv.date + ' ' + inv.time + '</span>' +
                '</div>' +
                '<div class="info-item">' +
                  '<span class="info-icon">&#x1F464;</span>' +
                  '<span>面试官: ' + escapeHtml(inv.interviewer ? inv.interviewer.name : '') + '</span>' +
                '</div>' +
                '<div class="info-item">' +
                  '<span class="info-icon">&#x1F3EB;</span>' +
                  '<span>专业: ' + escapeHtml(inv.major) + '</span>' +
                '</div>' +
                '<div class="info-item">' +
                  '<span class="info-icon">&#x1F4CD;</span>' +
                  '<span>地点: ' + location + '</span>' +
                '</div>' +
              '</div>' +
              '<div class="card-action">' +
                actionHtml +
              '</div>' +
            '</div>';
        });

        container.innerHTML = html;
      }

      /* ---- Bind filter tabs ---- */
      function bindTabs() {
        var tabs = document.querySelectorAll('.filter-tab');
        tabs.forEach(function (tab) {
          tab.addEventListener('click', function () {
            tabs.forEach(function (t) { t.classList.remove('active'); });
            this.classList.add('active');
            currentFilter = this.getAttribute('data-filter');
            renderList();
          });
        });
      }

      /* ---- Escape HTML ---- */
      function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text || ''));
        return div.innerHTML;
      }

      /* ---- Initialize ---- */
      loadInterviews();
      renderList();
      bindTabs();

    })();
  </script>
</body>
</html>
