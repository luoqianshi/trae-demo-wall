<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>消息通知 — AI智能面试系统</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/student.css">
  <style>
    /* ============================================
       Student Notice Page — Notification Center v2
       Category-based grouped layout with timeline
       ============================================ */

    :root {
      --n-primary: #4A6CF7;
      --n-bg: #F0F2F8;
      --n-card: #fff;
      --n-text: #1E293B;
      --n-text-secondary: #64748B;
      --n-text-muted: #94A3B8;
      --n-border: #E2E8F0;
      --n-blue: #3B82F6;
      --n-purple: #8B5CF6;
      --n-green: #22C55E;
      --n-orange: #F97316;
      --n-red: #EF4444;
      --n-indigo: #6366F1;
      --n-cyan: #06B6D4;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
      background: var(--n-bg);
      color: var(--n-text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Fixed Header ===== */
    .notice-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .notice-header .back-btn {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      color: var(--n-text);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .notice-header .back-btn:active {
      transform: scale(0.92);
      background: rgba(74, 108, 247, 0.08);
    }

    .notice-header .back-btn svg { width: 22px; height: 22px; }

    .notice-header .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--n-text);
      text-align: center;
    }

    .notice-header .header-actions {
      position: absolute;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .mark-all-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(74, 108, 247, 0.08);
      color: var(--n-primary);
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mark-all-btn:active {
      transform: scale(0.95);
      background: rgba(74, 108, 247, 0.15);
    }

    .mark-all-btn svg { width: 14px; height: 14px; }

    .mark-all-btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ===== Category Filter Tabs — Grid Style ===== */
    .category-filter {
      position: sticky;
      top: 56px;
      z-index: 99;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .category-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .category-tabs::-webkit-scrollbar { display: none; }

    .cat-tab {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--n-text-secondary);
      background: rgba(0, 0, 0, 0.03);
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .cat-tab:active { transform: scale(0.95); }

    .cat-tab .cat-icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .cat-tab .cat-icon svg {
      width: 13px;
      height: 13px;
      color: inherit;
    }

    .cat-tab .cat-count {
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background: rgba(0, 0, 0, 0.08);
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--n-text-secondary);
      line-height: 1;
    }

    /* Tab color variants */
    .cat-tab[data-type="all"] .cat-icon { background: linear-gradient(135deg, #4A6CF7, #6C5CE7); color: #fff; }
    .cat-tab[data-type="all"].active { background: linear-gradient(135deg, rgba(74,108,247,0.1), rgba(108,92,231,0.1)); color: var(--n-primary); border-color: rgba(74,108,247,0.2); }

    .cat-tab[data-type="system"] .cat-icon { background: linear-gradient(135deg, #3B82F6, #60A5FA); color: #fff; }
    .cat-tab[data-type="system"].active { background: rgba(59,130,246,0.08); color: var(--n-blue); border-color: rgba(59,130,246,0.2); }

    .cat-tab[data-type="interview"] .cat-icon { background: linear-gradient(135deg, #8B5CF6, #A78BFA); color: #fff; }
    .cat-tab[data-type="interview"].active { background: rgba(139,92,246,0.08); color: var(--n-purple); border-color: rgba(139,92,246,0.2); }

    .cat-tab[data-type="exam"] .cat-icon { background: linear-gradient(135deg, #22C55E, #4ADE80); color: #fff; }
    .cat-tab[data-type="exam"].active { background: rgba(34,197,94,0.08); color: var(--n-green); border-color: rgba(34,197,94,0.2); }

    .cat-tab[data-type="detection"] .cat-icon { background: linear-gradient(135deg, #F97316, #FB923C); color: #fff; }
    .cat-tab[data-type="detection"].active { background: rgba(249,115,22,0.08); color: var(--n-orange); border-color: rgba(249,115,22,0.2); }

    .cat-tab[data-type="result"] .cat-icon { background: linear-gradient(135deg, #EF4444, #F87171); color: #fff; }
    .cat-tab[data-type="result"].active { background: rgba(239,68,68,0.08); color: var(--n-red); border-color: rgba(239,68,68,0.2); }

    .cat-tab[data-type="assessment"] .cat-icon { background: linear-gradient(135deg, #06B6D4, #22D3EE); color: #fff; }
    .cat-tab[data-type="assessment"].active { background: rgba(6,182,212,0.08); color: var(--n-cyan); border-color: rgba(6,182,212,0.2); }

    .cat-tab.active .cat-count {
      background: currentColor;
      color: #fff;
      opacity: 0.85;
    }

    /* ===== Notification List Container ===== */
    .notice-container {
      padding: 12px 16px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    }

    /* ===== Time Group Header ===== */
    .time-group {
      margin-bottom: 16px;
    }

    .time-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 0 4px;
    }

    .time-group-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--n-primary);
      flex-shrink: 0;
    }

    .time-group-dot.past {
      background: var(--n-text-muted);
    }

    .time-group-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--n-border), transparent);
    }

    .time-group-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--n-text-muted);
      white-space: nowrap;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ===== Notification Card — Enhanced ===== */
    .notice-item {
      background: var(--n-card);
      border-radius: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.03);
      position: relative;
      overflow: hidden;
      animation: noticeSlideIn 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) backwards;
    }

    .notice-item:active {
      transform: scale(0.985);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    /* Stagger animation */
    .notice-item:nth-child(1) { animation-delay: 0s; }
    .notice-item:nth-child(2) { animation-delay: 0.04s; }
    .notice-item:nth-child(3) { animation-delay: 0.08s; }
    .notice-item:nth-child(4) { animation-delay: 0.12s; }
    .notice-item:nth-child(5) { animation-delay: 0.16s; }

    @keyframes noticeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Unread state */
    .notice-item.unread {
      border: 1.5px solid rgba(74, 108, 247, 0.15);
      background: linear-gradient(135deg, rgba(74, 108, 247, 0.02), rgba(108, 92, 231, 0.01));
    }

    .notice-item.unread::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, var(--n-primary), var(--n-purple));
      border-radius: 0 3px 3px 0;
    }

    /* Card inner layout */
    .notice-card-inner {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
    }

    /* Icon — larger, more distinct per category */
    .notice-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .notice-icon svg { width: 20px; height: 20px; color: #fff; }

    .notice-icon.system { background: linear-gradient(135deg, #3B82F6, #60A5FA); box-shadow: 0 3px 12px rgba(59,130,246,0.3); }
    .notice-icon.interview { background: linear-gradient(135deg, #8B5CF6, #A78BFA); box-shadow: 0 3px 12px rgba(139,92,246,0.3); }
    .notice-icon.exam { background: linear-gradient(135deg, #22C55E, #4ADE80); box-shadow: 0 3px 12px rgba(34,197,94,0.3); }
    .notice-icon.detection { background: linear-gradient(135deg, #F97316, #FB923C); box-shadow: 0 3px 12px rgba(249,115,22,0.3); }
    .notice-icon.result { background: linear-gradient(135deg, #EF4444, #F87171); box-shadow: 0 3px 12px rgba(239,68,68,0.3); }
    .notice-icon.assessment { background: linear-gradient(135deg, #06B6D4, #22D3EE); box-shadow: 0 3px 12px rgba(6,182,212,0.3); }

    /* Unread dot on icon */
    .notice-icon .icon-badge {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--n-red);
      border: 2px solid var(--n-card);
      animation: badgePulse 2s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50% { transform: scale(1.1); box-shadow: 0 0 0 4px rgba(239,68,68,0); }
    }

    /* Content area */
    .notice-content { flex: 1; min-width: 0; }

    .notice-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .notice-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--n-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .notice-item.unread .notice-title {
      font-weight: 700;
    }

    .notice-time {
      font-size: 11px;
      color: var(--n-text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .notice-preview {
      font-size: 13px;
      color: var(--n-text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 2px;
    }

    /* Category tag on card */
    .notice-type-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      margin-top: 6px;
      letter-spacing: 0.3px;
    }

    .notice-type-tag.system { background: rgba(59,130,246,0.1); color: #3B82F6; }
    .notice-type-tag.interview { background: rgba(139,92,246,0.1); color: #8B5CF6; }
    .notice-type-tag.exam { background: rgba(34,197,94,0.1); color: #22C55E; }
    .notice-type-tag.detection { background: rgba(249,115,22,0.1); color: #F97316; }
    .notice-type-tag.result { background: rgba(239,68,68,0.1); color: #EF4444; }
    .notice-type-tag.assessment { background: rgba(6,182,212,0.1); color: #06B6D4; }

    /* Expanded detail */
    .notice-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  padding 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      font-size: 13px;
      color: var(--n-text-secondary);
      line-height: 1.7;
    }

    .notice-detail.open {
      max-height: 500px;
      padding: 12px 16px 14px 72px;
      background: rgba(0, 0, 0, 0.015);
      border-top: 1px solid rgba(0, 0, 0, 0.04);
    }

    /* ===== Action Buttons ===== */
    .notice-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border-radius: 10px;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 2px 8px rgba(74,108,247,0.3);
      transition: all 0.3s ease;
    }

    .notice-action-btn:active { transform: scale(0.95); }

    .notice-action-btn svg {
      width: 14px;
      height: 14px;
    }

    /* ===== Empty State ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }

    .empty-state .empty-illustration {
      width: 140px;
      height: 140px;
      margin-bottom: 24px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state .empty-bell {
      width: 64px;
      height: 56px;
      background: linear-gradient(135deg, #E2E8F0, #F1F5F9);
      border-radius: 32px 32px 8px 8px;
      position: relative;
    }

    .empty-state .empty-bell::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E2E8F0, #F1F5F9);
    }

    .empty-state .empty-bell::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 0 0 6px 6px;
      background: #CBD5E1;
    }

    .empty-state .empty-ring-left,
    .empty-state .empty-ring-right {
      position: absolute;
      width: 14px;
      height: 14px;
      border: 2px solid #E2E8F0;
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
    }

    .empty-state .empty-ring-left { left: 24px; }
    .empty-state .empty-ring-right { right: 24px; }

    .empty-state .empty-sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--n-primary);
      border-radius: 50%;
      opacity: 0.3;
    }

    .empty-state .empty-sparkle:nth-child(2) { top: 10px; right: 30px; }
    .empty-state .empty-sparkle:nth-child(3) { bottom: 15px; left: 25px; }
    .empty-state .empty-sparkle:nth-child(4) { top: 25px; left: 18px; opacity: 0.2; }

    .empty-state .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--n-text-secondary);
      margin-bottom: 8px;
    }

    .empty-state .empty-desc {
      font-size: 13px;
      color: var(--n-text-muted);
      max-width: 260px;
      line-height: 1.6;
    }

    /* ===== TabBar ===== */
    .student-tabbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      display: flex;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      z-index: 200;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06);
    }

    .student-tabbar .tabbar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 4px 0;
      color: #9CA3AF;
      font-size: 10px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .student-tabbar .tabbar-item svg {
      width: 24px;
      height: 24px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .student-tabbar .tabbar-item.active { color: #4A6CF7; }
    .student-tabbar .tabbar-item.active svg { transform: scale(1.1); }

    .student-tabbar .tabbar-item.active::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      border-radius: 0 0 3px 3px;
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
    }

    .student-tabbar .tabbar-item:active { transform: scale(0.92); }

    /* ===== Swipe hint for unread ===== */
    .notice-item .swipe-hint {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 50px;
      background: linear-gradient(to right, transparent, rgba(74,108,247,0.06));
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .notice-item.unread .swipe-hint {
      opacity: 1;
    }

    /* ===== Responsive ===== */
    @media (min-width: 481px) {
      .category-tabs {
        flex-wrap: wrap;
        justify-content: center;
      }

      .notice-container {
        max-width: 480px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="student-page">
    <!-- Fixed Header -->
    <header class="notice-header">
      <a href="javascript:history.back()" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="header-title">消息</div>
      <div class="header-actions">
        <button class="mark-all-btn disabled" id="markAllBtn" onclick="markAllAsRead()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>全部已读</span>
        </button>
      </div>
    </header>

    <!-- Category Filter Tabs -->
    <div class="category-filter">
      <div class="category-tabs" id="categoryTabs">
        <button class="cat-tab active" data-type="all">
          <span class="cat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
          <span>全部</span>
          <span class="cat-count" data-count="all">0</span>
        </button>
        <button class="cat-tab" data-type="system">

  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    /* ============================================
       Student Notice Page Logic v2
       Grouped by time, enhanced category filtering
       ============================================ */

    var currentUser = null;
    var allNotifications = [];
    var currentFilter = 'all';

    /* Type display names */
    var typeNames = {
      system: '系统',
      interview: '面试',
      exam: '测评',
      detection: '检测',
      result: '结果',
      assessment: '提示'
    };

    /* Icon SVGs per type */
    var typeIcons = {
      system: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
      interview: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
      exam: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
      detection: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      result: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
      assessment: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'
    };

    document.addEventListener('DOMContentLoaded', function () {
      MockData.init();
      EventBus.init();
      currentUser = DataStore.getCurrentUser();
      if (!currentUser) {
        navigateTo('student-login.html');
        return;
      }
      loadNotifications();
      bindCategoryTabs();
    });

    /* ---- Load Notifications ---- */
    function loadNotifications() {
      allNotifications = DataStore.get('allNotifications') || [];
      allNotifications = allNotifications.filter(function(n) {
        return n.studentId === 'all' || n.studentId === currentUser.id;
      });
      allNotifications.sort(function(a, b) { return b.time - a.time; });
      updateCounts();
      updateMarkAllBtn();
      renderList();
    }

    /* ---- Update Category Counts ---- */
    function updateCounts() {
      /* All count */
      document.querySelector('[data-count="all"]').textContent = allNotifications.length;

      /* Per-type counts */
      var typeCounts = {};
      allNotifications.forEach(function(n) {
        typeCounts[n.type] = (typeCounts[n.type] || 0) + 1;
      });

      var types = ['system', 'interview', 'exam', 'detection', 'result', 'assessment'];
      types.forEach(function(t) {
        var el = document.querySelector('[data-count="' + t + '"]');
        if (el) el.textContent = typeCounts[t] || 0;
      });
    }

    /* ---- Update Mark All Button State ---- */
    function updateMarkAllBtn() {
      var hasUnread = allNotifications.some(function(n) { return !n.read; });
      var btn = document.getElementById('markAllBtn');
      if (hasUnread) {
        btn.classList.remove('disabled');
      } else {
        btn.classList.add('disabled');
      }
    }

    /* ---- Mark All as Read ---- */
    function markAllAsRead() {
      var notifications = DataStore.get('allNotifications') || [];
      var changed = false;
      notifications.forEach(function(n) {
        if ((n.studentId === 'all' || n.studentId === currentUser.id) && !n.read) {
          n.read = true;
          changed = true;
        }
      });
      if (changed) {
        DataStore.set('allNotifications', notifications);
        loadNotifications();
      }
    }

    /* ---- Group Notifications by Time ---- */
    function groupByTime(notifications) {
      var now = Date.now();
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var todayStart = today.getTime();
      var yesterday = new Date(todayStart - 86400000);
      var yesterdayEnd = todayStart;
      var weekAgo = now - 7 * 86400000;

      var groups = {
        today: [],
        yesterday: [],
        thisWeek: [],
        earlier: []
      };

      notifications.forEach(function(n) {
        if (n.time >= todayStart) {
          groups.today.push(n);
        } else if (n.time >= todayStart - 86400000 && n.time < todayStart) {
          groups.yesterday.push(n);
        } else if (n.time >= weekAgo) {
          groups.thisWeek.push(n);
        } else {
          groups.earlier.push(n);
        }
      });

      return groups;
    }

    /* ---- Render List ---- */
    function renderList() {
      var container = document.getElementById('noticeList');
      var filtered = currentFilter === 'all'
        ? allNotifications
        : allNotifications.filter(function(n) { return n.type === currentFilter; });

      if (filtered.length === 0) {
        container.innerHTML = '\
          <div class="empty-state">\
            <div class="empty-illustration">\
              <div class="empty-bell"></div>\
              <div class="empty-ring-left"></div>\
              <div class="empty-ring-right"></div>\
              <div class="empty-sparkle"></div>\
              <div class="empty-sparkle"></div>\
              <div class="empty-sparkle"></div>\
            </div>\
            <div class="empty-title">暂无消息</div>\
            <div class="empty-desc">当前没有相关通知，有新消息时会第一时间通知你</div>\
          </div>';
        return;
      }

      var groups = groupByTime(filtered);
      var html = '';

      /* Today group */
      if (groups.today.length > 0) {
        html += renderTimeGroup('今天', groups.today, false);
      }

      /* Yesterday group */
      if (groups.yesterday.length > 0) {
        html += renderTimeGroup('昨天', groups.yesterday, true);
      }

      /* This week group */
      if (groups.thisWeek.length > 0) {
        html += renderTimeGroup('本周', groups.thisWeek, true);
      }

      /* Earlier group */
      if (groups.earlier.length > 0) {
        html += renderTimeGroup('更早', groups.earlier, true);
      }

      container.innerHTML = html;
    }

    /* ---- Render Time Group ---- */
    function renderTimeGroup(label, items, isPast) {
      var html = '<div class="time-group">';
      html += '<div class="time-group-header">';
      html += '<div class="time-group-dot' + (isPast ? ' past' : '') + '"></div>';
      html += '<span class="time-group-label">' + label + '</span>';
      html += '<div class="time-group-line"></div>';
      html += '</div>';

      items.forEach(function(n) {
        html += renderNoticeItem(n);
      });

      html += '</div>';
      return html;
    }

    /* ---- Render Single Notice ---- */
    function renderNoticeItem(n) {
      var typeClass = n.type || 'system';
      var iconSvg = typeIcons[typeClass] || typeIcons.system;
      var typeName = typeNames[typeClass] || '系统';
      var isUnread = !n.read;
      var timeStr = formatExactTime(n.time);

      /* Build action button based on notification type and metadata */
      var actionBtnHtml = '';
      if (n.type === 'interview' && n.interviewId) {
        actionBtnHtml = '<button class="notice-action-btn" onclick="event.stopPropagation(); navigateTo(\'student-interview-list.html\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> 查看面试</button>';
      } else if (n.type === 'interview') {
        actionBtnHtml = '<button class="notice-action-btn" onclick="event.stopPropagation(); navigateTo(\'student-interview-list.html\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> 进入面试</button>';
      } else if (n.type === 'questionnaire') {
        actionBtnHtml = '<button class="notice-action-btn" onclick="event.stopPropagation(); navigateTo(\'student-questionnaire.html\')">去填写</button>';
      } else if (n.type === 'assessment') {
        actionBtnHtml = '<button class="notice-action-btn" onclick="event.stopPropagation(); navigateTo(\'student-home.html\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg> 查看详情</button>';
      }

      return '\
        <div class="notice-item' + (isUnread ? ' unread' : '') + '" data-id="' + n.id + '" onclick="toggleNotice(this, \'' + n.id + '\')">\
          <div class="notice-card-inner">\
            <div class="notice-icon ' + typeClass + '">\
              ' + iconSvg + '\
              ' + (isUnread ? '<div class="icon-badge"></div>' : '') + '\
            </div>\
            <div class="notice-content">\
              <div class="notice-title-row">\
                <div class="notice-title">' + escapeHtml(n.title) + '</div>\
                <div class="notice-time">' + timeStr + '</div>\
              </div>\
              <div class="notice-preview" id="preview-' + n.id + '">' + escapeHtml(n.content) + '</div>\
              <div class="notice-type-tag ' + typeClass + '">' + typeName + '</div>\
            </div>\
          </div>\
          <div class="notice-detail" id="detail-' + n.id + '">' + escapeHtml(n.content).replace(/\n/g, '<br>') + '\
            ' + actionBtnHtml + '\
          </div>\
        </div>';
    }

    /* ---- Toggle Expand/Collapse ---- */
    function toggleNotice(el, id) {
      var detail = document.getElementById('detail-' + id);
      var preview = document.getElementById('preview-' + id);
      var isOpen = detail.classList.contains('open');

      if (isOpen) {
        detail.classList.remove('open');
      } else {
        detail.classList.add('open');
        preview.style.display = 'none';
        markAsRead(id);
        el.classList.remove('unread');
        var badge = el.querySelector('.icon-badge');
        if (badge) badge.remove();
        updateMarkAllBtn();
        updateCounts();
      }
    }

    /* ---- Mark as Read ---- */
    function markAsRead(id) {
      var notifications = DataStore.get('allNotifications') || [];
      notifications.forEach(function(n) {
        if (n.id === id) n.read = true;
      });
      DataStore.set('allNotifications', notifications);
    }

    /* ---- Bind Category Tabs ---- */
    function bindCategoryTabs() {
      var tabs = document.querySelectorAll('.cat-tab');
      tabs.forEach(function(tab) {
        tab.addEventListener('click', function () {
          tabs.forEach(function(t) { t.classList.remove('active'); });
          this.classList.add('active');
          currentFilter = this.getAttribute('data-type');
          renderList();
        });
      });
    }

    /* ---- Format Exact Time (within a day, show HH:MM) ---- */
    function formatExactTime(timestamp) {
      var now = Date.now();
      var diff = now - timestamp;
      var seconds = Math.floor(diff / 1000);
      var minutes = Math.floor(seconds / 60);
      var hours = Math.floor(minutes / 60);

      if (seconds < 60) return '刚刚';
      if (minutes < 60) return minutes + '分钟前';

      var date = new Date(timestamp);
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var yesterday = new Date(today.getTime() - 86400000);

      /* Today: show HH:MM */
      if (date >= today) {
        return padZero(date.getHours()) + ':' + padZero(date.getMinutes());
      }

      /* Yesterday */
      if (date >= yesterday) {
        return '昨天 ' + padZero(date.getHours()) + ':' + padZero(date.getMinutes());
      }

      /* This week */
      var weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      if (date.getTime() >= today.getTime() - 7 * 86400000) {
        return weekDays[date.getDay()] + ' ' + padZero(date.getHours()) + ':' + padZero(date.getMinutes());
      }

      /* Older */
      return (date.getMonth() + 1) + '/' + date.getDate() + ' ' + padZero(date.getHours()) + ':' + padZero(date.getMinutes());
    }

    function padZero(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    /* ---- Escape HTML ---- */
    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
