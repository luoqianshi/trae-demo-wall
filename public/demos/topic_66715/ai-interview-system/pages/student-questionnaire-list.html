<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>问卷列表 — AI智能面试系统</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/student.css">
  <style>
    /* ============================================
       Student Questionnaire List Page
       ============================================ */

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
      background: #F0F2F8;
      color: #1E293B;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .q-list-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
    }

    .q-list-header .back-btn {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      color: #1E293B;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .q-list-header .back-btn:active { transform: scale(0.92); }
    .q-list-header .back-btn svg { width: 22px; height: 22px; }

    .q-list-header .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #1E293B;
      text-align: center;
    }

    .q-filter-tabs {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .q-filter-tabs::-webkit-scrollbar { display: none; }

    .q-filter-tab {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 600;
      color: #64748B;
      background: #F1F5F9;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      -webkit-tap-highlight-color: transparent;
    }

    .q-filter-tab.active {
      background: linear-gradient(135deg, #4A6CF7, #6C5CE7);
      color: #fff;
      box-shadow: 0 4px 12px rgba(74, 108, 247, 0.3);
    }

    .q-filter-tab:active { transform: scale(0.95); }

    .q-list {
      flex: 1;
      padding: 12px 16px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    }

    .q-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.8);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .q-card:active { transform: scale(0.98); }

    .q-card-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .q-card-icon.pending { background: rgba(74, 108, 247, 0.1); color: #4A6CF7; }
    .q-card-icon.completed { background: rgba(16, 185, 129, 0.1); color: #10B981; }

    .q-card-icon svg { width: 24px; height: 24px; }

    .q-card-body { flex: 1; min-width: 0; }

    .q-card-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .q-card-desc {
      font-size: 12px;
      color: #94A3B8;
      margin-bottom: 6px;
    }

    .q-card-meta { display: flex; align-items: center; gap: 8px; }

    .q-card-tag {
      display: inline-flex;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }

    .q-card-tag.pending { background: #FEF3C7; color: #92400E; }
    .q-card-tag.completed { background: #D1FAE5; color: #065F46; }

    .q-card-arrow { color: #CBD5E1; flex-shrink: 0; }

    /* Tab bar overrides for 5-tab layout */
    .student-tabbar .tabbar-item svg { width: 20px; height: 20px; }
    .student-tabbar .tabbar-item { font-size: 9px; }
  </style>
</head>
<body>
  <div class="student-page">
    <header class="q-list-header">
      <a href="student-home.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="header-title">问卷</div>
    </header>

    <div class="q-filter-tabs" id="filterTabs">
      <button class="q-filter-tab active" data-status="pending">待填写</button>
      <button class="q-filter-tab" data-status="completed">已完成</button>
      <button class="q-filter-tab" data-status="all">全部</button>
    </div>

    <div class="q-list" id="questionnaireList">
      <!-- Dynamically rendered -->
    </div>
  </div>

  <!-- 5-Tab TabBar, Questionnaire active -->
  <div class="student-tabbar">
    <a href="student-notice.html" class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>通知</span>
    </a>
    <a href="student-exam.html" class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>测评</span>
    </a>
    <a href="student-questionnaire-list.html" class="tabbar-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>问卷</span>
    </a>
    <a href="student-video.html?mode=self" class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      <span>录制</span>
    </a>
    <a href="student-result.html" class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>结果</span>
    </a>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    (function() {
      'use strict';
      MockData.init();

      var questionnaires = [
        { id: 'Q001', title: '新生入学适应性问卷', desc: '了解您的学习习惯和适应情况', status: 'pending', questions: 10, category: '适应性' },
        { id: 'Q002', title: '专业兴趣调查', desc: '帮助学校了解您的专业兴趣方向', status: 'pending', questions: 8, category: '专业' },
        { id: 'Q003', title: '职业素养评估', desc: '评估您的职业认知和素养水平', status: 'pending', questions: 12, category: '职业' },
        { id: 'Q004', title: '心理健康筛查', desc: '关注您的心理状态和健康状况', status: 'completed', questions: 15, category: '心理', completedAt: '2026-06-28' }
      ];

      var currentFilter = 'pending';

      function renderList() {
        var container = document.getElementById('questionnaireList');
        var filtered = questionnaires;
        if (currentFilter !== 'all') {
          filtered = questionnaires.filter(function(q) { return q.status === currentFilter; });
        }

        if (filtered.length === 0) {
          container.innerHTML = '<div style="text-align:center;padding:60px 20px;"><div style="font-size:48px;margin-bottom:16px;opacity:0.3;">&#128203;</div><div style="font-size:15px;color:#64748B;font-weight:500;">暂无' + (currentFilter === 'pending' ? '待填写' : '已完成') + '问卷</div></div>';
          return;
        }

        var html = '';
        filtered.forEach(function(q) {
          var isPending = q.status === 'pending';
          html += '<div class="q-card" onclick="openQuestionnaire(\'' + q.id + '\', \'' + q.status + '\')">';
          html += '<div class="q-card-icon ' + q.status + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>';
          html += '<div class="q-card-body">';
          html += '<div class="q-card-title">' + q.title + '</div>';
          html += '<div class="q-card-desc">' + q.desc + '</div>';
          html += '<div class="q-card-meta"><span class="q-card-tag ' + q.status + '">' + (isPending ? '待填写' : '已完成') + '</span>';
          if (q.status === 'completed') {
            html += '<span style="font-size:11px;color:#94A3B8;">完成于 ' + q.completedAt + '</span>';
          } else {
            html += '<span style="font-size:11px;color:#94A3B8;">共 ' + q.questions + ' 题</span>';
          }
          html += '</div></div>';
          html += '<svg class="q-card-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
          html += '</div>';
        });
        container.innerHTML = html;
      }

      // Filter tabs
      document.getElementById('filterTabs').addEventListener('click', function(e) {
        if (!e.target.classList.contains('q-filter-tab')) return;
        document.querySelectorAll('.q-filter-tab').forEach(function(t) { t.classList.remove('active'); });
        e.target.classList.add('active');
        currentFilter = e.target.dataset.status;
        renderList();
      });

      window.openQuestionnaire = function(id, status) {
        if (status === 'pending') {
          navigateTo('student-questionnaire.html?from=list');
        } else {
          Toast.info('已完成问卷可在结果页查看');
        }
      };

      document.addEventListener('DOMContentLoaded', renderList);
    })();
  </script>
</body>
</html>
