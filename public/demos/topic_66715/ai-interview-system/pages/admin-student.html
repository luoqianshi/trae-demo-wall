<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI智能面试系统 - 学生管理</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .admin-stat-card {
      opacity: 0;
      transform: translateY(16px);
      animation: statCardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .admin-stat-card:nth-child(1) { animation-delay: 0.05s; }
    .admin-stat-card:nth-child(2) { animation-delay: 0.1s; }
    .admin-stat-card:nth-child(3) { animation-delay: 0.15s; }
    @keyframes statCardIn { to { opacity: 1; transform: translateY(0); } }
    .student-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      border-radius: var(--radius-full);
    }
    .student-status.active { background: var(--color-success-bg); color: var(--color-success); }
    .student-status.completed { background: var(--color-bg-light); color: var(--color-text-secondary); }
    .student-status.pending { background: var(--color-warning-bg); color: var(--color-warning); }
    .student-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .student-status.active::before { background: var(--color-success); }
    .student-status.completed::before { background: var(--color-text-tertiary); }
    .student-status.pending::before { background: var(--color-warning); }
    .table-actions button {
      padding: 4px 10px;
      font-size: var(--font-size-xs);
      border-radius: 6px;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .table-actions .btn-view { background: var(--color-info-bg); color: var(--color-info); }
    .table-actions .btn-view:hover { background: var(--color-info); color: white; }
    .table-actions .btn-edit { background: var(--color-primary-50); color: var(--color-primary); }
    .table-actions .btn-edit:hover { background: var(--color-primary); color: white; }
    .table-actions .btn-del { background: var(--color-danger-bg); color: var(--color-danger); }
    .table-actions .btn-del:hover { background: var(--color-danger); color: white; }
    /* Student detail modal extras */
    .stu-detail-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing-lg);
      border-bottom: 1px solid var(--color-border-light);
    }
    .stu-detail-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: white;
      flex-shrink: 0;
    }
    .stu-detail-info h3 { font-size: var(--font-size-lg); }
    .stu-detail-info .meta { font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-top: 4px; }
    .stu-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }
    .stu-detail-field {
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border-light);
    }
    .stu-detail-field .label { font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-bottom: 2px; }
    .stu-detail-field .value { font-size: var(--font-size-sm); color: var(--color-text-primary); font-weight: 500; }
    .stu-history { margin-top: var(--spacing-md); }
    .stu-history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--color-border-light);
    }
    .stu-history-item:last-child { border-bottom: none; }
    .stu-history-name { font-size: var(--font-size-sm); font-weight: 500; }
    .stu-history-date { font-size: var(--font-size-xs); color: var(--color-text-tertiary); }
    .stu-history-score { font-size: var(--font-size-sm); font-weight: var(--font-weight-bold); }
    /* Collapsible sidebar groups */
    .admin-nav-group-section { margin-top: 4px; }
    .admin-nav-group-header { display: flex; align-items: center; gap: 12px; padding: 10px var(--spacing-md); border-radius: var(--radius-sm); color: rgba(255,255,255,0.7); font-size: var(--font-size-sm); font-weight: 600; cursor: pointer; transition: all var(--transition-fast); user-select: none; }
    .admin-nav-group-header:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .admin-nav-group-header .nav-icon { opacity: 0.6; }
    .nav-group-arrow { margin-left: auto; transition: transform 0.3s ease; opacity: 0.4; }
    .admin-nav-group-section.collapsed .nav-group-arrow { transform: rotate(-90deg); }
    .admin-nav-group-items { overflow: hidden; transition: max-height 0.3s ease; max-height: 500px; }
    .admin-nav-group-section.collapsed .admin-nav-group-items { max-height: 0; }
    .admin-nav-item.sub { padding-left: calc(var(--spacing-md) + 28px); font-size: calc(var(--font-size-sm) - 1px); }
    .admin-nav-item.sub .nav-icon { width: 16px; height: 16px; }
    .admin-nav-item.sub .nav-icon svg { width: 16px; height: 16px; }
    @media (max-width: 768px) {
      .stu-detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

                  <th class="table-cell">专业</th>
                  <th class="table-cell">班级</th>
                  <th class="table-cell">面试次数</th>
                  <th class="table-cell">最新成绩</th>
                  <th class="table-cell">状态</th>
                  <th class="table-cell">操作</th>
                </tr>
              </thead>
              <tbody id="studentTableBody"></tbody>
            </table>
          </div>
          <div class="admin-table-footer">
            <span id="paginationInfo">第 1-8 条，共 8 条</span>
            <div class="admin-table-pagination" id="paginationBtns"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    var currentPage = 1;
    var pageSize = 8;

    // Extended mock data with interview counts and scores
    var studentExtras = {
      'STU001': { interviews: 3, score: 86.4, status: 'active' },
      'STU002': { interviews: 2, score: 89.6, status: 'completed' },
      'STU003': { interviews: 2, score: null, status: 'pending' },
      'STU004': { interviews: 2, score: 74.4, status: 'completed' },
      'STU005': { interviews: 1, score: 68.8, status: 'active' },
      'STU006': { interviews: 1, score: 92.2, status: 'completed' },
      'STU007': { interviews: 0, score: null, status: 'pending' },
      'STU008': { interviews: 2, score: null, status: 'active' }
    };

    function getStudents() {
      return DataStore.getAllStudents().map(function(s) {
        var ext = studentExtras[s.id] || { interviews: 0, score: null, status: 'pending' };
        return {
          id: s.id,
          name: s.name,
          studentNo: s.studentNo,
          major: s.major,
          className: s.className,
          phone: s.phone,
          interviews: ext.interviews,
          score: ext.score,
          status: ext.status
        };
      });
    }

    function initMajorFilter() {
      var sel = document.getElementById('filterMajor');
      MockData.majors.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        sel.appendChild(opt);
      });
    }

    function renderTable() {
      var students = getStudents();
      var major = document.getElementById('filterMajor').value;
      var keyword = document.getElementById('filterName').value.trim().toLowerCase();

      if (major) {
        students = students.filter(function(s) { return s.major === major; });
      }
      if (keyword) {
        students = students.filter(function(s) {
          return s.name.toLowerCase().indexOf(keyword) !== -1 || s.studentNo.toLowerCase().indexOf(keyword) !== -1;
        });
      }

      document.getElementById('tableCount').textContent = '共 ' + students.length + ' 条';

      var tbody = document.getElementById('studentTableBody');
      if (students.length === 0) {
        tbody.innerHTML = '<tr><td class="table-cell" colspan="8" style="text-align:center;padding:40px;color:var(--color-text-tertiary);">暂无匹配的学生数据</td></tr>';
        document.getElementById('paginationInfo').textContent = '第 0 条，共 0 条';
        document.getElementById('paginationBtns').innerHTML = '';
        return;
      }

      var start = (currentPage - 1) * pageSize;
      var end = Math.min(start + pageSize, students.length);
      var pageData = students.slice(start, end);

      var html = '';
      pageData.forEach(function(s) {
        var statusClass = s.status === 'active' ? 'active' : s.status === 'completed' ? 'completed' : 'pending';
        var statusText = s.status === 'active' ? '活跃' : s.status === 'completed' ? '已完成' : '待面试';
        html += '<tr class="table-row">';
        html += '<td class="table-cell" style="font-weight:600;">' + s.name + '</td>';
        html += '<td class="table-cell">' + s.studentNo + '</td>';
        html += '<td class="table-cell">' + s.major + '</td>';
        html += '<td class="table-cell">' + s.className + '</td>';
        html += '<td class="table-cell">' + s.interviews + '</td>';
        html += '<td class="table-cell">' + (s.score !== null ? '<strong style="color:' + (s.score >= 80 ? 'var(--color-success)' : 'var(--color-warning)') + ';">' + s.score + '</strong>' : '<span style="color:var(--color-text-tertiary);">--</span>') + '</td>';
        html += '<td class="table-cell"><span class="student-status ' + statusClass + '">' + statusText + '</span></td>';
        html += '<td class="table-cell"><div class="table-actions" style="display:flex;gap:6px;">';
        html += '<button class="btn-view" onclick="viewStudent(\'' + s.id + '\')">查看</button>';
        html += '<button class="btn-edit" onclick="editStudent(\'' + s.id + '\')">编辑</button>';
        html += '<button class="btn-del" onclick="deleteStudent(\'' + s.id + '\')">删除</button>';
        html += '</div></td>';
        html += '</tr>';
      });
      tbody.innerHTML = html;

      document.getElementById('paginationInfo').textContent = '第 ' + (start + 1) + '-' + end + ' 条，共 ' + students.length + ' 条';

      // Pagination buttons
      var totalPages = Math.ceil(students.length / pageSize);
      var pagHtml = '';
      pagHtml += '<div class="admin-table-page-btn' + (currentPage <= 1 ? ' disabled' : '') + '" onclick="goPage(' + (currentPage - 1) + ')">&lt;</div>';
      for (var i = 1; i <= totalPages; i++) {
        pagHtml += '<div class="admin-table-page-btn' + (i === currentPage ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</div>';
      }
      pagHtml += '<div class="admin-table-page-btn' + (currentPage >= totalPages ? ' disabled' : '') + '" onclick="goPage(' + (currentPage + 1) + ')">&gt;</div>';
      document.getElementById('paginationBtns').innerHTML = pagHtml;
    }

    function goPage(p) {
      var students = getStudents();
      var major = document.getElementById('filterMajor').value;
      var keyword = document.getElementById('filterName').value.trim().toLowerCase();
      if (major) students = students.filter(function(s) { return s.major === major; });
      if (keyword) students = students.filter(function(s) { return s.name.toLowerCase().indexOf(keyword) !== -1 || s.studentNo.toLowerCase().indexOf(keyword) !== -1; });
      var totalPages = Math.ceil(students.length / pageSize);
      if (p < 1 || p > totalPages) return;
      currentPage = p;
      renderTable();
    }

    function viewStudent(id) {
      var students = DataStore.getAllStudents();
      var s = students.find(function(st) { return st.id === id; });
      if (!s) return;
      var ext = studentExtras[id] || { interviews: 0, score: null, status: 'pending' };

      // Get interview history
      var interviews = DataStore.getAllInterviews();
      var history = interviews.filter(function(int) { return int.students && int.students.indexOf(id) !== -1; });

      var content = '<div class="stu-detail-header">';
      content += '<div class="stu-detail-avatar">' + s.name.charAt(0) + '</div>';
      content += '<div class="stu-detail-info"><h3>' + s.name + '</h3><div class="meta">' + s.studentNo + ' | ' + s.major + ' | ' + s.className + '</div></div>';
      content += '</div>';
      content += '<div class="stu-detail-grid">';
      content += '<div class="stu-detail-field"><div class="label">手机号</div><div class="value">' + s.phone + '</div></div>';
      content += '<div class="stu-detail-field"><div class="label">身份证号</div><div class="value">' + s.idCard + '</div></div>';
      content += '<div class="stu-detail-field"><div class="label">入学年份</div><div class="value">' + s.enrollmentYear + '</div></div>';
      content += '<div class="stu-detail-field"><div class="label">面试次数</div><div class="value">' + ext.interviews + ' 次</div></div>';
      content += '</div>';

      // AI detection results
      var aiResults = interviews.filter(function(int) { return int.students && int.students.indexOf(id) !== -1; });
      if (aiResults.length > 0) {
        content += '<div style="margin-bottom:var(--spacing-md);"><h4 style="font-size:var(--font-size-sm);margin-bottom:var(--spacing-sm);color:var(--color-text-secondary);">AI检测结果</h4>';
        aiResults.forEach(function(int) {
          var ai = InterviewState.getAIResult(id, int.id);
          var aiStatus = ai ? (ai.status === 'pass' ? '<span style="color:var(--color-success);">通过</span> (置信度: ' + Math.round(ai.confidence * 100) + '%)' : '<span style="color:var(--color-warning);">异常</span>') : '待检测';
          content += '<div style="font-size:var(--font-size-sm);padding:6px 0;border-bottom:1px solid var(--color-border-light);">' + int.title + ': ' + aiStatus + '</div>';
        });
        content += '</div>';
      }

      // Interview history
      if (history.length > 0) {
        content += '<h4 style="font-size:var(--font-size-sm);margin-bottom:var(--spacing-sm);color:var(--color-text-secondary);">面试记录</h4>';
        content += '<div class="stu-history">';
        history.forEach(function(int) {
          var score = InterviewState.getScore(id, int.id);
          var scoreText = score ? score.total + '分' : '--';
          var scoreColor = score && score.total >= 80 ? 'var(--color-success)' : score && score.total >= 60 ? 'var(--color-warning)' : 'var(--color-danger)';
          content += '<div class="stu-history-item">';
          content += '  <div><div class="stu-history-name">' + int.title + '</div><div class="stu-history-date">' + int.date + ' ' + int.time + '</div></div>';
          content += '  <span class="stu-history-score" style="color:' + scoreColor + ';">' + scoreText + '</span>';
          content += '</div>';
        });
        content += '</div>';
      }

      Modal.show({
        title: '学生详情',
        content: content,
        confirmText: false,
        cancelText: '关闭'
      });
    }

    function editStudent(id) {
      var students = DataStore.getAllStudents();
      var s = students.find(function(st) { return st.id === id; });
      if (!s) return;
      var content = '<div class="admin-form-row"><div class="form-group"><label class="form-label">姓名</label><input type="text" class="form-input" id="editSName" value="' + s.name + '"></div><div class="form-group"><label class="form-label">学号</label><input type="text" class="form-input" id="editSNo" value="' + s.studentNo + '"></div></div>';
      content += '<div class="admin-form-row"><div class="form-group"><label class="form-label">手机</label><input type="text" class="form-input" id="editSPhone" value="' + s.phone + '"></div><div class="form-group"><label class="form-label">身份证号</label><input type="text" class="form-input" id="editSIdCard" value="' + s.idCard + '"></div></div>';
      content += '<div class="admin-form-row"><div class="form-group"><label class="form-label">专业</label><select class="form-select" id="editSMajor">';
      MockData.majors.forEach(function(m) { content += '<option' + (m === s.major ? ' selected' : '') + '>' + m + '</option>'; });
      content += '</select></div><div class="form-group"><label class="form-label">班级</label><input type="text" class="form-input" id="editSClass" value="' + s.className + '"></div></div>';
      Modal.show({
        title: '编辑学生',
        content: content,
        confirmText: '保存',
        cancelText: '取消',
        onConfirm: function() {
          s.name = document.getElementById('editSName').value.trim() || s.name;
          s.studentNo = document.getElementById('editSNo').value.trim();
          s.phone = document.getElementById('editSPhone').value.trim();
          s.idCard = document.getElementById('editSIdCard').value.trim();
          s.major = document.getElementById('editSMajor').value;
          s.className = document.getElementById('editSClass').value.trim();
          DataStore.setAllStudents(students);
          renderTable();
          Toast.success('学生信息已更新');
        }
      });
    }

    function deleteStudent(id) {
      Modal.confirm('确定要删除该学生吗？删除后不可恢复。', function() {
        var students = DataStore.getAllStudents();
        var s = students.find(function(st) { return st.id === id; });
        var name = s ? s.name : '';
        DataStore.setAllStudents(students.filter(function(st) { return st.id !== id; }));
        renderTable();
        Toast.success('学生 ' + name + ' 已删除');
      });
    }

    function exportStudents() {
      Toast.info('学生数据导出功能已触发');
    }

    (function() {
      var sidebar = document.getElementById('adminSidebar');
      var toggle = document.getElementById('sidebarToggle');
      if (toggle && sidebar) { toggle.addEventListener('click', function() { sidebar.classList.toggle('collapsed'); }); }
    })();

    MockData.init();
    initMajorFilter();
    renderTable();
  </script>
</body>
</html>
