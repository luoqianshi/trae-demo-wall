<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Work Hub - 个人工作台</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --bg: #f5f7fb;
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --text-sub: #6b7280;
    --text-light: #9ca3af;
    --border: #eef0f4;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(16, 24, 40, .04), 0 4px 16px rgba(16, 24, 40, .04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", -apple-system, sans-serif;
    background: var(--bg); color: var(--text-main); font-size: 14px;
    display: flex; min-height: 100vh;
  }

  /* 侧边栏 */
  .sidebar {
    width: 220px; background: var(--card-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 10px; padding: 20px 18px 16px; }
  .logo-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: 0 4px 10px rgba(37, 99, 235, .3);
  }
  .logo-text b { display: block; font-size: 14px; }
  .logo-text span { font-size: 12px; color: var(--text-light); }
  .nav { flex: 1; padding: 8px 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 11px 14px;
    border-radius: 10px; color: var(--text-sub); cursor: pointer;
    margin-bottom: 4px; transition: all .2s;
  }
  .nav-item:hover { background: #f3f6fc; color: var(--primary); }
  .nav-item.active {
    background: var(--primary); color: #fff;
    box-shadow: 0 4px 12px rgba(37, 99, 235, .35);
  }
  .nav-item .ico { width: 18px; text-align: center; font-size: 15px; }
  .sidebar-tip {
    margin: 12px; padding: 16px 14px; border-radius: 12px;
    background: linear-gradient(160deg, #eaf1ff, #f3f8ff);
    font-size: 12px; color: var(--text-sub); line-height: 1.7;
    position: relative; overflow: hidden;
  }
  .sidebar-tip .arrow {
    position: absolute; right: 10px; bottom: 8px;
    font-size: 22px; color: #3b82f6; opacity: .6; transform: rotate(-20deg);
  }
  .version { padding: 10px 18px 16px; font-size: 12px; color: var(--text-light); }

  /* 主区域 */
  .main { flex: 1; margin-left: 220px; display: flex; flex-direction: column; }
  .topbar {
    height: 60px; background: var(--card-bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; position: sticky; top: 0; z-index: 5;
  }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: #f3f5f9; border-radius: 10px; padding: 8px 14px;
    width: 340px; color: var(--text-light);
  }
  .search input {
    border: none; outline: none; background: transparent;
    flex: 1; font-size: 13px; color: var(--text-main);
  }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card-bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 15px; transition: all .2s;
  }
  .icon-btn:hover { background: #f3f6fc; }
  .user { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #60a5fa, #2563eb);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px;
  }
  .user-name { font-size: 13px; font-weight: 500; }

  .content { padding: 24px 28px 36px; }
  .page { display: flex; flex-direction: column; gap: 28px; }

  .page-header h2 { font-size: 20px; font-weight: 600; }
  .page-header p { font-size: 13px; color: var(--text-sub); margin-top: 6px; }

  .card {
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 22px 24px;
  }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
  .card-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card-title .dot { width: 4px; height: 16px; border-radius: 2px; background: var(--primary); }
  .more-link { font-size: 12px; color: var(--primary); cursor: pointer; }
  .more-link:hover { text-decoration: underline; }

  .grid-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }

  /* 欢迎横幅 */
  .welcome {
    border-radius: 18px;
    background: linear-gradient(115deg, #2563eb 0%, #3b82f6 55%, #60a5fa 100%);
    color: #fff; padding: 32px 34px; display: flex;
    justify-content: space-between; align-items: center;
    position: relative; overflow: hidden;
    box-shadow: 0 10px 30px rgba(37, 99, 235, .25);
    min-height: 150px;
  }
  .welcome::before, .welcome::after {
    content: ""; position: absolute; border-radius: 50%; background: rgba(255,255,255,.08);
  }
  .welcome::before { width: 220px; height: 220px; right: -60px; top: -100px; }
  .welcome::after { width: 140px; height: 140px; right: 160px; bottom: -80px; }
  .welcome h1 { font-size: 24px; margin-bottom: 8px; }
  .welcome p { font-size: 13px; opacity: .85; margin-bottom: 20px; }
  .welcome-actions { display: flex; gap: 12px; position: relative; z-index: 1; flex-wrap: wrap; }
  .welcome-chart { position: relative; z-index: 1; opacity: .9; flex-shrink: 0; }

  /* 按钮 */
  .btn {
    border: none; border-radius: 10px; padding: 9px 18px;
    font-size: 13px; cursor: pointer; display: inline-flex;
    align-items: center; gap: 6px; transition: all .2s;
    text-decoration: none; font-family: inherit;
  }
  .btn-white { background: #fff; color: var(--primary); font-weight: 600; }
  .btn-white:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(0,0,0,.15); }
  .btn-ghost { background: rgba(255,255,255,.16); color: #fff; border: 1px solid rgba(255,255,255,.35); }
  .btn-ghost:hover { background: rgba(255,255,255,.26); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
  .btn-outline:hover { background: var(--primary-light); }
  .btn-danger { background: transparent; color: #ef4444; border: 1px solid #fecaca; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 8px; }

  /* 统计 */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .stat-card {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 22px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 14px; transition: transform .2s;
  }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-icon {
    width: 46px; height: 46px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .stat-icon.blue { background: #eaf1ff; color: #2563eb; }
  .stat-icon.green { background: #e7f8ef; color: #10b981; }
  .stat-icon.orange { background: #fff4e6; color: #f59e0b; }
  .stat-icon.purple { background: #f3edff; color: #8b5cf6; }
  .stat-info .num { font-size: 22px; font-weight: 700; line-height: 1.2; }
  .stat-info .label { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .stat-info .trend { font-size: 11px; color: #10b981; margin-top: 2px; }

  /* 工具网格 */
  .tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .tool-item {
    display: flex; align-items: center; gap: 10px; padding: 12px;
    border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all .2s;
    text-decoration: none; color: var(--text-main);
  }
  .tool-item:hover { border-color: #c7dbff; background: #f7faff; transform: translateY(-2px); }
  .tool-logo {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; color: #fff;
  }
  .tool-name { font-size: 13px; font-weight: 500; }

  /* 待办 */
  .todo-item {
    display: flex; align-items: center; gap: 10px; padding: 11px 4px;
    border-bottom: 1px dashed var(--border);
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
  .todo-text { flex: 1; font-size: 13px; }
  .todo-text.done { text-decoration: line-through; color: var(--text-light); }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; }
  .tag.high { background: #fee2e2; color: #ef4444; }
  .tag.mid { background: #fff4e6; color: #f59e0b; }
  .tag.low { background: #e7f8ef; color: #10b981; }
  .tag.done-tag { background: #e5e7eb; color: #6b7280; }

  /* 笔记 */
  .note-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 4px;
    border-bottom: 1px dashed var(--border); cursor: pointer;
  }
  .note-item:last-child { border-bottom: none; }
  .note-item:hover .note-title { color: var(--primary); }
  .note-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .note-info { flex: 1; min-width: 0; }
  .note-title { font-size: 13px; font-weight: 500; transition: color .2s; }
  .note-cat { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .note-date { font-size: 11px; color: var(--text-light); flex-shrink: 0; }

  /* 终端 */
  .terminal {
    background: #1e293b; border-radius: 12px; padding: 14px 16px;
    font-family: Consolas, "Courier New", monospace;
    font-size: 12.5px; line-height: 2.1;
  }
  .cmd-line {
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; border-radius: 6px; padding: 0 8px;
    transition: background .2s;
  }
  .cmd-line:hover { background: rgba(255,255,255,.06); }
  .cmd-line .prompt { color: #38bdf8; margin-right: 8px; }
  .cmd-line .cmd { color: #4ade80; flex: 1; word-break: break-all; }
  .cmd-line .copy { color: #64748b; font-size: 11px; }
  .cmd-line:hover .copy { color: #cbd5e1; }

  /* 快捷工具 */
  .quick-tools { display: flex; flex-wrap: wrap; gap: 12px; }
  .quick-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--card-bg);
    cursor: pointer; font-size: 13px; transition: all .2s;
    color: var(--text-main);
  }
  .quick-chip:hover { border-color: #c7dbff; background: #f7faff; color: var(--primary); transform: translateY(-2px); }

  /* 表单 */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 500;
    color: var(--text-main); margin-bottom: 5px;
  }
  .form-input {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; color: var(--text-main); background: var(--card-bg);
    outline: none; transition: border-color .2s; font-family: inherit;
  }
  .form-input:focus { border-color: var(--primary); }
  textarea.form-input { resize: vertical; }

  /* 弹窗 */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 24px; width: 90%; max-width: 480px;
    box-shadow: 0 10px 40px rgba(0,0,0,.15);
  }
  .modal-head { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
  .modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

  /* 列表行 */
  .row-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 8px;
  }
  .row-card:hover { border-color: #c7dbff; }
  .row-icon {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
  }
  .row-info { flex: 1; min-width: 0; }
  .row-name { font-size: 14px; font-weight: 600; }
  .row-meta { font-size: 12px; color: var(--text-light); margin-top: 2px; word-break: break-all; }
  .icon-star {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; font-size: 14px;
  }
  .icon-star.starred { border-color: #f59e0b; background: #fffbeb; }

  .filter-tabs { display: inline-flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 3px; }
  .filter-tab {
    border: none; background: transparent; padding: 5px 14px;
    border-radius: 6px; font-size: 12px; cursor: pointer;
    color: var(--text-sub); transition: all .2s;
  }
  .filter-tab.active { background: var(--primary); color: #fff; }

  /* 设置 */
  .settings-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px dashed var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 13px; font-weight: 500; }
  .settings-desc { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .toggle-btn {
    width: 48px; height: 28px; border-radius: 14px; border: none;
    background: #d1d5db; cursor: pointer; position: relative; transition: background .3s;
  }
  .toggle-btn.on { background: var(--primary); }
  .toggle-knob {
    position: absolute; top: 3px; left: 3px;
    width: 22px; height: 22px; border-radius: 50%; background: #fff;
    transition: transform .3s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle-btn.on .toggle-knob { transform: translateX(20px); }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e293b; color: #fff; padding: 10px 24px;
    border-radius: 10px; font-size: 13px; opacity: 0;
    transition: all .3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .twin-area { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; min-height: 320px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

  .cmd-card {
    display: flex; align-items: center; gap: 12px;
    padding: 14px; border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 8px;
  }
  .cmd-card-info { flex: 1; min-width: 0; }
  .cmd-card-title { font-size: 14px; font-weight: 600; }
  .cmd-card-meta { font-size: 11px; color: var(--text-light); margin-bottom: 8px; }
  .terminal-inline {
    background: #1e293b; border-radius: 8px; padding: 8px 14px;
    font-family: Consolas, monospace; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }
  .terminal-inline .prompt { color: #38bdf8; }
  .terminal-inline .cmd { color: #4ade80; flex: 1; word-break: break-all; }
  .copy-btn {
    background: transparent; border: none; color: #64748b;
    cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 4px;
  }
  .copy-btn:hover { color: #cbd5e1; background: rgba(255,255,255,.06); }

  .uuid-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0; border-bottom: 1px dashed var(--border);
  }
  .uuid-row:last-child { border-bottom: none; }
  .uuid-num {
    width: 24px; height: 24px; border-radius: 50%; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--text-sub); flex-shrink: 0;
  }
  .uuid-text { flex: 1; font-family: Consolas, monospace; font-size: 14px; word-break: break-all; user-select: all; }

  .now-card {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: #fff; border-radius: 12px; padding: 16px;
  }
  .now-time { font-size: 28px; font-weight: 700; font-family: monospace; }
  .now-meta { font-size: 14px; opacity: .9; margin-top: 4px; }

  .empty { text-align: center; padding: 40px; color: var(--text-light); }

  @media (max-width: 1100px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
    .tools-grid { grid-template-columns: repeat(2, 1fr); }
    .welcome-chart { display: none; }
    .twin-area { grid-template-columns: 1fr; }
  }
  @media (max-width: 720px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .search { width: 180px; }
  }

  [data-theme="dark"] {
    --bg: #0f172a; --card-bg: #1e293b;
    --text-main: #f1f5f9; --text-sub: #94a3b8;
    --text-light: #64748b; --border: #334155;
  }
  [data-theme="dark"] .search { background: #334155; }
  [data-theme="dark"] .icon-btn { background: #1e293b; }
  [data-theme="dark"] .quick-chip { background: #1e293b; }
  [data-theme="dark"] .sidebar-tip { background: linear-gradient(160deg, #1e2d4a, #1a2744); }
  [data-theme="dark"] .form-input { background: #334155; border-color: #475569; color: #f1f5f9; }
  [data-theme="dark"] .filter-tabs { background: #334155; }
  [data-theme="dark"] .modal-overlay { background: rgba(0,0,0,.7); }
  [data-theme="dark"] .toggle-btn { background: #475569; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text"><b>Personal Work Hub</b><span>个人工作台</span></div>
  </div>
  <nav class="nav" id="nav">
    <a class="nav-item active" data-route="dashboard"><span class="ico">🏠</span> 工作台</a>
    <a class="nav-item" data-route="tools"><span class="ico">🧰</span> 在线工具</a>
    <a class="nav-item" data-route="notes"><span class="ico">📝</span> 笔记管理</a>
    <a class="nav-item" data-route="todos"><span class="ico">✅</span> 待办事项</a>
    <a class="nav-item" data-route="commands"><span class="ico">💻</span> 命令管理</a>
    <a class="nav-item" data-route="settings"><span class="ico">⚙️</span> 系统设置</a>
  </nav>
  <div class="sidebar-tip">
    <div style="font-size:20px;">💡</div>
    保持专注，持续积累。<br>让每一天的工作都更高效。
    <div class="arrow">↗</div>
  </div>
  <div class="version">版本 1.0.0</div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="search">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="搜索工具 / 笔记 / 命令...">
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="themeBtn" title="切换主题">🌙</button>
      <button class="icon-btn" title="通知">🔔</button>
      <div class="user">
        <div class="avatar">W</div>
        <span class="user-name">Wu</span>
        <span style="color:#9ca3af;font-size:10px;">▼</span>
      </div>
    </div>
  </header>
  <main class="content"><div class="page" id="view"></div></main>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ============== 数据 ============== */
const STORE = { tools:'workhub-tools', notes:'workhub-notes', todos:'workhub-todos', commands:'workhub-commands', theme:'workhub-theme' };
const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
const persist = (k) => localStorage.setItem(STORE[k], JSON.stringify(state[k]));

const DEFAULT_TOOLS = [
  { id: 1, name: 'GitHub', url: 'https://github.com', color: '#24292f', icon: '🐙', fav: true, category: '开发平台', desc: '全球最大代码托管' },
  { id: 2, name: 'GitLab', url: 'https://gitlab.com', color: '#fc6d26', icon: '🦊', fav: true, category: '开发平台', desc: '私有项目仓库' },
  { id: 3, name: '公司项目', url: '#', color: '#2563eb', icon: '🏢', fav: true, category: '项目管理', desc: '内部协作平台' },

/* ============== 工具 ============== */
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const uid = () => Date.now() + Math.floor(Math.random() * 1000);
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 1800);
}
function copy(text) { navigator.clipboard.writeText(text).then(() => toast('已复制')).catch(() => toast('复制失败')); }

/* ============== 弹窗 ============== */
function modal({ title, body, okText = '保存', onOk, cancelText = '取消', hideCancel = false }) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-head">${esc(title)}</div>
        <div>${body}</div>
        <div class="modal-foot">
          ${hideCancel ? '' : `<button class="btn btn-sm" id="mc">${esc(cancelText)}</button>`}
          <button class="btn btn-sm btn-primary" id="mo">${esc(okText)}</button>
        </div>
      </div>
    </div>`;
  const close = () => { root.innerHTML = ''; };
  root.querySelector('.modal-overlay').onclick = (e) => { if (e.target.classList.contains('modal-overlay')) close(); };
  if (!hideCancel) root.querySelector('#mc').onclick = close;
  root.querySelector('#mo').onclick = () => {
    const r = onOk && onOk();
    if (r !== false) close();
  };
  return close;
}
function confirmDialog(msg, onYes) {
  modal({
    title: '确认操作',
    body: `<div style="font-size:13px;line-height:1.7;">${esc(msg)}</div>`,
    okText: '确定',
    onOk: () => { onYes(); }
  });
}

function noteForm(note) {
  const cats = ['后端','前端','运维','数据库','部署','其他'];
  const isEdit = !!note;
  const f = note || { title:'', category:'后端', tags:[], summary:'', content:'' };
  modal({

    body: `

    onOk: () => {

      if (!title) { toast('标题不能为空'); return false; }
      const data = {
        title,
        category: document.getElementById('nfCat').value,
        tags: document.getElementById('nfTags').value.split(',').map(s=>s.trim()).filter(Boolean),
        summary: document.getElementById('nfSum').value,
        content: document.getElementById('nfContent').value,

      };
      if (isEdit) Object.assign(note, data);
      else state.notes.unshift({ id: uid(), ...data });
      persist('notes'); toast('保存成功'); render();
    }
  });
}

  render();
}

views['tool-timestamp'].bind = function() {
  document.querySelectorAll('[data-route]').forEach(el => el.onclick = () => navigate(el.dataset.route));
  const pad = n => n < 10 ? '0' + n : n;
  function tick() {
    const d = new Date();
    const t = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    const nt = document.getElementById('nowTime');
    if (!nt) { clearInterval(_tsTimer); return; }
    nt.textContent = t;
    document.getElementById('nowMeta').textContent = `秒: ${Math.floor(d.getTime()/1000)} | 毫秒: ${d.getTime()}`;
  }
  clearInterval(_tsTimer); tick(); _tsTimer = setInterval(tick, 1000);
  document.getElementById('tsBtn').onclick = () => {
    const v = document.getElementById('tsIn').value.trim();
    if (!v) return toast('请输入时间戳');
    const n = parseInt(v, 10);
    if (isNaN(n)) return toast('无效时间戳');
    const ts = n > 1e12 ? n : n * 1000;
    const d = new Date(ts);
    document.getElementById('tsOut').textContent = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    toast('转换完成');
  };
  document.getElementById('dtIn').oninput = (e) => {
    if (!e.target.value) return;
    const ms = new Date(e.target.value).getTime();
    document.getElementById('dtS').textContent = Math.floor(ms / 1000);
    document.getElementById('dtMs').textContent = ms;
  };
};

/* === UUID === */
views['tool-uuid'] = function() {
  const list = state._uuids || [];
  const last = state._lastUuid || '';
  return `
    <div class="page-header"><h2>🎲 UUID 生成</h2><a class="more-link" data-route="tools">← 返回工具列表</a></div>
    <div class="card">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
        <button class="btn btn-sm btn-primary" id="uOne">🎲 生成单个</button>
        <button class="btn btn-sm btn-primary" id="uBatch">📦 批量生成</button>
        <span style="font-size:13px;">数量:</span>
        <input class="form-input" id="uCnt" type="number" min="1" max="100" value="${state._uCount||10}" style="width:80px;padding:5px 8px;">
        <span style="font-size:13px;">格式:</span>
        <select class="form-input" id="uFmt" style="width:100px;padding:5px 8px;">
          <option value="standard" ${state._uFmt==='standard'||!state._uFmt?'selected':''}>标准</option>
          <option value="compact" ${state._uFmt==='compact'?'selected':''}>紧凑</option>
          <option value="upper" ${state._uFmt==='upper'?'selected':''}>大写</option>
        </select>
        <button class="btn btn-sm btn-danger" id="uClear">清空</button>
      </div>
      ${list.length ? list.map((u, i) => `
        <div class="uuid-row">
          <span class="uuid-num">${i+1}</span>
          <span class="uuid-text">${esc(u)}</span>
          <button class="btn btn-sm btn-outline" data-uuid-copy="${esc(u)}">📋</button>
        </div>`).join('') : '<div class="empty">点击上方按钮生成 UUID</div>'}
    </div>
    ${last ? `<div class="card">
      <div class="card-head"><div class="card-title"><span class="dot"></span>变体格式</div></div>
      ${variants(last).map(v => `
        <div class="uuid-row">
          <span style="width:80px;font-size:12px;color:var(--text-sub);">${v.label}</span>
          <span class="uuid-text">${esc(v.value)}</span>
          <button class="btn btn-sm btn-outline" data-uuid-copy="${esc(v.value)}">📋</button>
        </div>`).join('')}
    </div>` : ''}`;
};
function genUuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}
function variants(u) {
  const hex = u.replace(/-/g, '');
  const bytes = [];
  for (let i = 0; i < hex.length; i += 2) bytes.push(parseInt(hex.substr(i, 2), 16));
  return [
    { label: '标准格式', value: u },
    { label: '紧凑格式', value: u.replace(/-/g, '') },
    { label: '大写格式', value: u.toUpperCase() },
    { label: 'Base64', value: btoa(String.fromCharCode.apply(null, bytes)).replace(/=+$/, '') },
  ];
}
views['tool-uuid'].bind = function() {
  document.querySelectorAll('[data-route]').forEach(el => el.onclick = () => navigate(el.dataset.route));
  const fmt = (u) => {
    const f = state._uFmt || 'standard';
    if (f === 'compact') return u.replace(/-/g, '');
    if (f === 'upper') return u.toUpperCase();
    return u;
  };
  document.getElementById('uFmt').onchange = (e) => { state._uFmt = e.target.value; };
  document.getElementById('uCnt').oninput = (e) => { state._uCount = parseInt(e.target.value, 10) || 10; };
  document.getElementById('uOne').onclick = () => { const u = genUuid(); state._lastUuid = u; state._uuids = [fmt(u)]; render(); };
  document.getElementById('uBatch').onclick = () => {
    const n = state._uCount || 10;
    const arr = [];
    for (let i = 0; i < n; i++) arr.push(fmt(genUuid()));
    state._lastUuid = arr[0];
    state._uuids = arr;
    toast(`已生成 ${n} 个`); render();
  };
  document.getElementById('uClear').onclick = () => { state._uuids = []; state._lastUuid = ''; render(); };
  document.querySelectorAll('[data-uuid-copy]').forEach(el => el.onclick = () => copy(el.dataset.uuidCopy));
};

/* ============== 主题 ============== */
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem(STORE.theme, JSON.stringify(state.theme));
  applyTheme(); render();
}

/* ============== 全局事件 ============== */
document.querySelectorAll('#nav .nav-item').forEach(el => {
  el.addEventListener('click', () => navigate(el.dataset.route));
});
document.getElementById('themeBtn').addEventListener('click', toggleTheme);

/* 搜索：跳到对应页面并 toast 命中条数 */
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const kw = e.target.value.trim().toLowerCase();
  if (!kw) return;
  const noteHit = state.notes.filter(n => (n.title+n.content+n.summary+(n.tags||[]).join('')).toLowerCase().includes(kw));
  const toolHit = state.tools.filter(t => (t.name+t.desc+t.url).toLowerCase().includes(kw));
  const cmdHit = state.commands.filter(c => (c.title+c.command+c.desc).toLowerCase().includes(kw));
  if (noteHit.length) { state.noteCategory=''; navigate('notes'); toast(`找到 ${noteHit.length} 条笔记`); }
  else if (toolHit.length) { state.toolCategory=''; navigate('tools'); toast(`找到 ${toolHit.length} 个工具`); }
  else if (cmdHit.length) { state.cmdCategory=''; navigate('commands'); toast(`找到 ${cmdHit.length} 条命令`); }
  else toast('未找到匹配项');
});

/* ============== 初始化 ============== */
applyTheme();
render();
</script>
