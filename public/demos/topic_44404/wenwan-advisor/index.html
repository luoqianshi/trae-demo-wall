<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>珠玑 · 文玩智能配饰顾问</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg-deep: #0f0f1a;
    --bg-card: #1a1a2e;
    --bg-card-hover: #222240;
    --bg-input: #12122a;
    --gold: #c9a95c;
    --gold-light: #e0c97f;
    --gold-dark: #a68a3e;
    --jade: #2d6a4f;
    --jade-light: #40916c;
    --jade-bright: #52b788;
    --coral: #c44545;
    --coral-light: #e07a5f;
    --amber: #d4a373;
    --lapis: #3a5a8c;
    --lapis-light: #5b8cb8;
    --text-primary: #e8e0d5;
    --text-secondary: #a09888;
    --text-muted: #6b6358;
    --border: #2a2a3e;
    --border-gold: #3d3520;
    --radius: 12px;
    --radius-lg: 20px;
    --shadow-gold: 0 0 30px rgba(201,169,92,0.08);
    --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Background ambient */
  .bg-ambient {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(45,106,79,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,169,92,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(58,90,140,0.04) 0%, transparent 60%);
  }

  .bg-pattern {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201,169,92,0.3) 40px, rgba(201,169,92,0.3) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,169,92,0.3) 40px, rgba(201,169,92,0.3) 41px);
  }

  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px 24px 60px; }

  /* Header */
  .header {
    text-align: center; padding: 40px 0 20px;
  }
  .header .logo-icon {
    font-size: 48px; display: block; margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2.4rem; font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.08em;
  }
  .header .subtitle {
    font-size: 0.95rem; color: var(--text-secondary);
    margin-top: 6px; letter-spacing: 0.05em;
  }

  /* Steps */
  .steps-bar {
    display: flex; justify-content: center; gap: 16px;
    margin: 24px 0 32px; flex-wrap: wrap;
  }
  .step-dot {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 18px; border-radius: 24px;
    background: var(--bg-card); border: 1px solid var(--border);
    font-size: 0.85rem; color: var(--text-muted);
    transition: var(--transition);
  }
  .step-dot.active {
    border-color: var(--gold); color: var(--gold);
    box-shadow: 0 0 16px rgba(201,169,92,0.12);
  }
  .step-dot.done {
    border-color: var(--jade-light); color: var(--jade-bright);
  }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
    background: var(--border); color: var(--text-muted);
  }
  .step-dot.active .step-num { background: var(--gold); color: var(--bg-deep); }
  .step-dot.done .step-num { background: var(--jade); color: #fff; }

  /* Cards */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 28px;
    margin-bottom: 20px; box-shadow: var(--shadow-card);
    transition: var(--transition);
  }
  .card-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.25rem; font-weight: 700; color: var(--gold);
    margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }
  .card-title .icon { font-size: 1.4rem; }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 24px; text-align: center;
    cursor: pointer; transition: var(--transition);
    background: var(--bg-input);
    position: relative; overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: rgba(201,169,92,0.04);
    box-shadow: var(--shadow-gold);
  }
  .upload-zone .upload-icon {
    font-size: 56px; display: block; margin-bottom: 12px;
    opacity: 0.6; transition: var(--transition);
  }
  .upload-zone:hover .upload-icon { opacity: 1; transform: scale(1.05); }
  .upload-zone .upload-text {
    font-size: 1.05rem; color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .upload-zone .upload-hint {
    font-size: 0.8rem; color: var(--text-muted);
  }
  .upload-zone input[type="file"] { display: none; }

  /* Preview */
  .preview-container {
    display: none; position: relative; margin-top: 16px;
  }
  .preview-container.show { display: block; }
  .preview-img {
    width: 100%; max-height: 360px; object-fit: contain;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--bg-input);
  }
  .preview-actions {
    display: flex; gap: 12px; margin-top: 12px; justify-content: center;
  }

  /* Analysis Result */
  .analysis-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-top: 16px;
  }
  .analysis-item {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    transition: var(--transition);
  }
  .analysis-item .label {
    font-size: 0.78rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .analysis-item .value {
    font-size: 1.1rem; font-weight: 600; color: var(--text-primary);
  }
  .analysis-item .value.gold { color: var(--gold); }
  .color-dots {
    display: flex; gap: 6px; margin-top: 6px;
  }
  .color-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
  }

  /* Style Selector */
  .style-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px;
  }
  .style-chip {
    padding: 14px 10px; border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-input); color: var(--text-secondary);
    text-align: center; cursor: pointer; transition: var(--transition);
    font-size: 0.9rem; font-weight: 500;
    user-select: none;
  }
  .style-chip:hover {
    border-color: var(--gold); color: var(--gold);
    background: rgba(201,169,92,0.06);
  }
  .style-chip.selected {
    border-color: var(--gold); color: var(--bg-deep);
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    font-weight: 700; box-shadow: 0 0 20px rgba(201,169,92,0.25);
  }
  .custom-style-wrap {
    display: flex; gap: 10px; margin-top: 16px;
  }
  .custom-style-wrap input {
    flex: 1; padding: 12px 16px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text-primary); font-size: 0.95rem;
    font-family: inherit; outline: none; transition: var(--transition);
  }
  .custom-style-wrap input:focus {
    border-color: var(--gold); box-shadow: 0 0 12px rgba(201,169,92,0.1);
  }
  .custom-style-wrap input::placeholder { color: var(--text-muted); }

  /* Buttons */
  .btn {
    padding: 12px 28px; border-radius: 28px; border: none;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: var(--transition);
    display: inline-flex; align-items: center; gap: 8px;
    letter-spacing: 0.03em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    color: var(--bg-deep); box-shadow: 0 4px 16px rgba(201,169,92,0.25);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(201,169,92,0.35);
  }
  .btn-primary:disabled {
    opacity: 0.4; cursor: not-allowed; transform: none;
    box-shadow: none;
  }
  .btn-secondary {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-secondary:hover {
    border-color: var(--gold); color: var(--gold);
  }
  .btn-sm {
    padding: 8px 18px; font-size: 0.82rem; border-radius: 20px;
  }

  /* Results */
  .result-section { display: none; }
  .result-section.show { display: block; }

  .bead-visual {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; padding: 24px 16px; overflow-x: auto;
    background: var(--bg-input); border-radius: var(--radius);
    margin: 16px 0; min-height: 100px;
    border: 1px solid var(--border);
  }
  .bead {
    width: 40px; height: 40px; border-radius: 50%;
    flex-shrink: 0; position: relative;
    box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), inset 3px 3px 6px rgba(255,255,255,0.15);
    transition: transform 0.2s;
  }
  .bead:hover { transform: scale(1.3); z-index: 2; }
  .bead.accent {
    width: 48px; height: 48px;
    box-shadow: 0 0 12px rgba(201,169,92,0.4), inset -3px -3px 6px rgba(0,0,0,0.4);
  }
  .bead.spacer { width: 24px; height: 24px; }
  .bead-label {
    position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
    font-size: 0.6rem; white-space: nowrap; color: var(--text-muted);
    pointer-events: none;
  }

  .rec-card {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
    transition: var(--transition);
  }
  .rec-card:hover { border-color: var(--border-gold); }
  .rec-card .rec-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .rec-card .rec-name {
    font-weight: 700; font-size: 1.05rem; color: var(--gold);
  }
  .rec-card .rec-role {
    font-size: 0.75rem; padding: 4px 10px; border-radius: 12px;
    background: rgba(201,169,92,0.1); color: var(--gold-light);
  }
  .rec-card .rec-detail {
    font-size: 0.88rem; color: var(--text-secondary);
    line-height: 1.7;
  }
  .rec-card .rec-tags {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
  }
  .rec-tag {
    font-size: 0.72rem; padding: 4px 10px; border-radius: 12px;
    background: rgba(45,106,79,0.15); color: var(--jade-bright);
    border: 1px solid rgba(45,106,79,0.2);
  }

  .tips-box {
    background: rgba(201,169,92,0.06); border: 1px solid var(--border-gold);
    border-radius: var(--radius); padding: 18px; margin-top: 16px;
  }
  .tips-box .tips-title {
    font-weight: 700; color: var(--gold); margin-bottom: 8px;
    font-size: 0.9rem;
  }
  .tips-box ul {
    list-style: none; padding: 0;
  }
  .tips-box li {
    font-size: 0.85rem; color: var(--text-secondary);
    padding: 4px 0; padding-left: 16px; position: relative;
  }
  .tips-box li::before {
    content: '◆'; position: absolute; left: 0; color: var(--gold);
    font-size: 0.5rem; top: 9px;
  }

  /* Loading */
  .loading-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(15,15,26,0.85); backdrop-filter: blur(4px);
    justify-content: center; align-items: center; flex-direction: column;
  }
  .loading-overlay.show { display: flex; }
  .loading-spinner {
    width: 48px; height: 48px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    margin-top: 16px; color: var(--gold); font-size: 0.95rem;
    letter-spacing: 0.05em;
  }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 200; padding: 12px 24px; border-radius: 24px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-primary); font-size: 0.9rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .app { padding: 12px 12px 40px; }
    .header h1 { font-size: 1.8rem; }
    .card { padding: 18px; }
    .style-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); }
    .bead { width: 30px; height: 30px; }
    .bead.accent { width: 36px; height: 36px; }
    .bead.spacer { width: 18px; height: 18px; }
  }
</style>
</head>
<body>
<div class="bg-ambient"></div>
<div class="bg-pattern"></div>

<div class="app">
  <!-- Header -->
  <header class="header">
    <span class="logo-icon">📿</span>
    <h1>珠 玑</h1>
    <p class="subtitle">文玩智能配饰顾问 · 一拍即合，串出你的风格</p>
  </header>

  <!-- Steps -->
  <div class="steps-bar">
    <div class="step-dot active" id="step1">
      <span class="step-num">1</span> 上传图片
    </div>
    <div class="step-dot" id="step2">
      <span class="step-num">2</span> AI 分析
    </div>
    <div class="step-dot" id="step3">
      <span class="step-num">3</span> 选择风格
    </div>
    <div class="step-dot" id="step4">
      <span class="step-num">4</span> 获取推荐
    </div>
  </div>

  <!-- Step 1: Upload -->
  <div class="card" id="uploadCard">
    <div class="card-title"><span class="icon">📷</span> 上传你的文玩宝贝</div>
    <div class="upload-zone" id="uploadZone">
      <span class="upload-icon">🔮</span>
      <p class="upload-text">点击上传或拖拽图片到此处</p>
      <p class="upload-hint">支持手串、手持、挂脖、散珠 · JPG/PNG/WebP</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div class="preview-container" id="previewContainer">
      <img id="previewImg" class="preview-img" alt="预览">
      <div class="preview-actions">
        <button class="btn btn-secondary btn-sm" onclick="resetUpload()">重新上传</button>
        <button class="btn btn-primary btn-sm" id="analyzeBtn" onclick="analyzeImage()">
          ✨ 开始分析
        </button>
      </div>
    </div>
  </div>

  <!-- Step 2: Analysis Result -->
  <div class="card" id="analysisCard" style="display:none;">
    <div class="card-title"><span class="icon">🔍</span> AI 识别分析结果</div>
    <div class="analysis-grid" id="analysisGrid"></div>
  </div>

  <!-- Step 3: Style Selection -->
  <div class="card" id="styleCard" style="display:none;">
    <div class="card-title"><span class="icon">🎨</span> 选择你想要的风格</div>
    <div class="style-grid" id="styleGrid"></div>
    <div class="custom-style-wrap">
      <input type="text" id="customStyle" placeholder="输入自定义风格，如：赛博朋克、敦煌飞天、极简禅意…">
      <button class="btn btn-secondary btn-sm" onclick="addCustomStyle()">+ 添加</button>
    </div>
    <div style="margin-top:16px; text-align:center;">
      <button class="btn btn-primary" id="recommendBtn" onclick="generateRecommendation()" disabled>
        🪄 生成配饰推荐
      </button>
    </div>
  </div>

  <!-- Step 4: Results -->
  <div class="card result-section" id="resultCard">
    <div class="card-title"><span class="icon">💎</span> 配饰搭配方案</div>
    <div id="resultContent"></div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <p class="loading-text" id="loadingText">AI 正在分析图片…</p>
</div>

<script>
// ==================== DATA MODELS ====================

// 材质库
const MATERIALS = {

  '紫云母': { color: '#7b5ea7', type:'矿石', traits:['小众','冷淡','高级'],瓷度:5, category:'blue' },

// ==================== UI HELPERS ====================
function $(id) { return document.getElementById(id); }
function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2000);
}
function showLoading(text) {
  $('loadingText').textContent = text || '处理中…';
  $('loadingOverlay').classList.add('show');
}
function hideLoading() {
  $('loadingOverlay').classList.remove('show');
}
function updateStep(step) {
  for (let i = 1; i <= 4; i++) {
    const el = $('step' + i);
    el.classList.remove('active', 'done');
    if (i < step) el.classList.add('done');
    if (i === step) el.classList.add('active');
  }
}

// ==================== UPLOAD ====================
const uploadZone = $('uploadZone');
const fileInput = $('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  if (!file.type.match(/image\/(jpeg|png|webp)/)) {
    toast('请上传 JPG、PNG 或 WebP 格式的图片');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    state.uploadedImage = e.target.result;
    $('previewImg').src = e.target.result;
    $('previewContainer').classList.add('show');
    uploadZone.style.display = 'none';
    updateStep(1);
  };
  reader.readAsDataURL(file);
}

function resetUpload() {
  state.uploadedImage = null;
  state.analysisResult = null;
  state.recommendations = null;
  $('previewContainer').classList.remove('show');
  uploadZone.style.display = '';
  $('analysisCard').style.display = 'none';
  $('styleCard').style.display = 'none';
  $('resultCard').classList.remove('show');
  fileInput.value = '';
  updateStep(1);
}

// ==================== ANALYSIS ====================
async function analyzeImage() {
  if (!state.uploadedImage) return;
  showLoading('AI 正在识别文玩特征…');
  updateStep(2);

  // 模拟 AI 分析延迟
  await new Promise(r => setTimeout(r, 1800));

  // 从图片中提取颜色信息（使用 Canvas）
  const img = new Image();
  img.src = state.uploadedImage;
  await new Promise(r => { img.onload = r; });

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const size = 200;
  canvas.width = size; canvas.height = size;
  ctx.drawImage(img, 0, 0, size, size);
  const data = ctx.getImageData(0, 0, size, size).data;

  // 提取主色调
  const colorBuckets = {};
  for (let i = 0; i < data.length; i += 16) {
    const r = Math.round(data[i] / 32) * 32;
    const g = Math.round(data[i+1] / 32) * 32;
    const b = Math.round(data[i+2] / 32) * 32;
    const key = `${r},${g},${b}`;
    colorBuckets[key] = (colorBuckets[key] || 0) + 1;
  }
  const sorted = Object.entries(colorBuckets).sort((a,b) => b[1] - a[1]);
  const topColors = sorted.slice(0, 5).map(([k]) => {
    const [r,g,b] = k.split(',').map(Number);
    return { hex: `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`, r, g, b };
  });

  // 判断主色类别
  const mainColor = topColors[0];
  let colorCategory = 'dark';
  const hsl = rgbToHsl(mainColor.r, mainColor.g, mainColor.b);
  if (hsl[1] < 0.1) colorCategory = 'white';
  else if (hsl[0] < 20 || hsl[0] > 340) colorCategory = 'red';
  else if (hsl[0] < 50) colorCategory = 'yellow';
  else if (hsl[0] < 160) colorCategory = 'green';
  else if (hsl[0] < 260) colorCategory = 'blue';
  else colorCategory = 'dark';

  // 计算瓷度（基于颜色饱和度和亮度）
  const saturation = hsl[1];
  const lightness = hsl[2];
  const ciDu = Math.min(10, Math.max(2, Math.round(saturation * 8 + (1 - Math.abs(lightness - 0.5)) * 4)));

  // 判断材质类型（基于颜色特征）
  let materialGuess = '未知材质';
  const matScores = [];
  for (const [name, mat] of Object.entries(MATERIALS)) {
    const matRgb = hexToRgb(mat.color);
    const dist = colorDistance(mainColor, {r:matRgb.r, g:matRgb.g, b:matRgb.b});
    matScores.push({ name, dist, mat });
  }
  matScores.sort((a,b) => a.dist - b.dist);
  const topMatch = matScores[0];
  materialGuess = topMatch.dist < 80 ? topMatch.name : '混合材质';

  // 判断盘玩效果
  const panWanLevels = ['全新未盘', '初步盘玩', '已有包浆', '深度包浆', '老物件开片'];
  const panWan = lightness < 0.3 ? panWanLevels[3] : lightness < 0.45 ? panWanLevels[2] : lightness < 0.6 ? panWanLevels[1] : panWanLevels[0];

  // 判断品类
  const categories = ['手串', '手持', '挂脖/长串', '散珠'];
  const category = categories[Math.floor(Math.random() * 2)]; // 随机模拟

  state.analysisResult = {
    topColors, colorCategory, ciDu, materialGuess, panWan, category,
    saturation, lightness,
  };

  // 显示分析结果
  renderAnalysis();
  hideLoading();

  // 显示风格选择
  $('styleCard').style.display = '';
  renderStyleGrid();
  updateStep(3);
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [h * 360, s, l];
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function colorDistance(c1, c2) {
  return Math.sqrt((c1.r-c2.r)**2 + (c1.g-c2.g)**2 + (c1.b-c2.b)**2);
}

function renderAnalysis() {
  const a = state.analysisResult;
  const catNames = { 'red':'红色系', 'yellow':'黄色系', 'green':'绿色系', 'blue':'蓝紫色系', 'white':'白色系', 'dark':'深色系' };
  const ciDuLabels = ['','','较低','一般','中等','中上','较高','高','很高','极高','顶级'];

  $('analysisCard').style.display = '';
  $('analysisGrid').innerHTML = `
    <div class="analysis-item">
      <div class="label">🎨 主色调</div>
      <div class="value gold">${catNames[a.colorCategory] || '混合色系'}</div>
      <div class="color-dots">${a.topColors.slice(0,3).map(c => `<span class="color-dot" style="background:${c.hex}"></span>`).join('')}</div>
    </div>
    <div class="analysis-item">
      <div class="label">💎 瓷度评估</div>
      <div class="value">${ciDuLabels[a.ciDu] || '中等'} <span style="font-size:0.8rem;color:var(--text-muted)">(${a.ciDu}/10)</span></div>
    </div>
    <div class="analysis-item">
      <div class="label">🪨 材质推测</div>
      <div class="value">${a.materialGuess}</div>
    </div>
    <div class="analysis-item">
      <div class="label">✨ 盘玩效果</div>
      <div class="value">${a.panWan}</div>
    </div>
    <div class="analysis-item">
      <div class="label">📿 品类判断</div>
      <div class="value">${a.category}</div>
    </div>
  `;
}

// ==================== STYLE SELECTION ====================
function renderStyleGrid() {
  const grid = $('styleGrid');
  grid.innerHTML = PRESET_STYLES.map(s => `
    <div class="style-chip${state.selectedStyle === s ? ' selected' : ''}" onclick="selectStyle('${s}')">${s}</div>
  `).join('');
  // 添加自定义风格
  state.customStyles.forEach(s => {
    const chip = document.createElement('div');
    chip.className = 'style-chip' + (state.selectedStyle === s ? ' selected' : '');
    chip.textContent = s;
    chip.onclick = () => selectStyle(s);
    grid.appendChild(chip);
  });
}

function selectStyle(style) {
  state.selectedStyle = style;
  renderStyleGrid();
  $('recommendBtn').disabled = false;
}

function addCustomStyle() {
  const input = $('customStyle');
  const val = input.value.trim();
  if (!val) return;
  if (PRESET_STYLES.includes(val) || state.customStyles.includes(val)) {
    selectStyle(val);
    input.value = '';
    return;
  }
  state.customStyles.push(val);
  // 动态解析风格
  STYLE_MAP[val] = {
    keywords: val.split(/[,，、\s]+/).filter(Boolean),
    tone: 'custom',
    colorPref: guessColorPref(val),
    avoid: [],
  };
  renderStyleGrid();
  selectStyle(val);
  input.value = '';
}

function guessColorPref(text) {
  const prefs = [];
  if (/红|火|热|喜|暖|rose|red/i.test(text)) prefs.push('red');
  if (/黄|金|暖|阳|橘|橙|amber|gold/i.test(text)) prefs.push('yellow');
  if (/绿|翠|青|自然|清新|森|jade|green/i.test(text)) prefs.push('green');
  if (/蓝|青|海|天|冷|紫|blue|purple/i.test(text)) prefs.push('blue');
  if (/白|素|净|纯|淡|清|雪|white|cream/i.test(text)) prefs.push('white');
  if (/黑|暗|深|沉|稳|酷|dark|black/i.test(text)) prefs.push('dark');
  if (/银|金属|科技|未来|赛博|机械|silver/i.test(text)) prefs.push('silver');
  if (/粉|嫩|甜|少女|可爱|梦幻|pink/i.test(text)) prefs.push('red');
  if (/多|彩|绚|缤纷|color/i.test(text)) prefs.push('colorful');
  return prefs.length > 0 ? prefs : ['balanced'];
}

// ==================== RECOMMENDATION ENGINE ====================
function generateRecommendation() {
  if (!state.analysisResult || !state.selectedStyle) return;
  showLoading('正在为你生成配饰方案…');
  updateStep(4);

  setTimeout(() => {
    const a = state.analysisResult;
    const styleName = state.selectedStyle;
    const styleInfo = STYLE_MAP[styleName] || { tone:'custom', colorPref:['balanced'], keywords:[] };

    // 确定推荐配色方向
    const baseColorCat = a.colorCategory;
    const matchColors = COLOR_PAIRS[baseColorCat]?.match || ['white','dark','green'];
    const stylePrefs = styleInfo.colorPref || ['balanced'];

    // 根据风格调整配色权重
    let preferredColors = [...matchColors];
    if (stylePrefs.includes('gold') || stylePrefs.includes('warm')) preferredColors = ['yellow','red','gold','dark'];
    if (stylePrefs.includes('silver') || stylePrefs.includes('neon') || stylePrefs.includes('blue')) preferredColors = ['blue','silver','white','dark'];
    if (stylePrefs.includes('colorful') || stylePrefs.includes('bright')) preferredColors = ['red','yellow','green','blue','white'];
    if (stylePrefs.includes('pastel') || stylePrefs.includes('pink')) preferredColors = ['white','yellow','red'];
    if (stylePrefs.includes('dark') || stylePrefs.includes('black')) preferredColors = ['dark','white','blue','gold'];
    if (stylePrefs.includes('balanced') || stylePrefs.includes('harmonious')) preferredColors = matchColors;

    // 选择配饰材质
    const accMaterials = [];
    for (const [name, mat] of Object.entries(MATERIALS)) {
      if (preferredColors.includes(mat.category) || matchColors.includes(mat.category)) {
        accMaterials.push({ name, ...mat });
      }
    }

    // 生成推荐方案
    const recommendations = [];
    const usedMaterials = new Set();

    // 顶珠 - 视觉中心
    const topCandidates = accMaterials.filter(m => m.瓷度 >= 6 && !usedMaterials.has(m.name));
    if (topCandidates.length > 0) {
      const top = topCandidates[Math.floor(Math.random() * topCandidates.length)];
      usedMaterials.add(top.name);
      recommendations.push({
        role: '顶珠', roleDesc: '视觉中心 · 画龙点睛',
        material: top.name, color: top.color,
        reason: `${top.traits.join('、')}，与主串${catName(baseColorCat)}形成${getColorRelation(baseColorCat, top.category)}`,
        size: '比主珠大约2mm',
      });
    }

    // 腰珠 x2
    const waistCandidates = accMaterials.filter(m => m.name !== recommendations[0]?.material && !usedMaterials.has(m.name));
    const waist1 = waistCandidates[Math.floor(Math.random() * Math.min(3, waistCandidates.length))];
    if (waist1) { usedMaterials.add(waist1.name); }
    const waist2Candidates = waistCandidates.filter(m => m.name !== waist1?.name);
    const waist2 = waist2Candidates[Math.floor(Math.random() * Math.min(3, waist2Candidates.length))];
    if (waist2) { usedMaterials.add(waist2.name); }

    if (waist1) {
      recommendations.push({
        role: '腰珠（左）', roleDesc: '对称点缀 · 丰富层次',
        material: waist1.name, color: waist1.color,
        reason: `${waist1.traits.join('、')}，与主串${catName(baseColorCat)}搭配${getColorRelation(baseColorCat, waist1.category)}`,
        size: '与主珠尺寸接近（±0.5mm）',
      });
    }
    if (waist2) {
      recommendations.push({
        role: '腰珠（右）', roleDesc: '对称点缀 · 平衡视觉',
        material: waist2.name, color: waist2.color,
        reason: `与左侧腰珠呼应，${waist2.traits.join('、')}`,
        size: '与主珠尺寸接近（±0.5mm）',
      });
    }

    // 佛头三通
    const fhCandidates = accMaterials.filter(m => !usedMaterials.has(m.name) && m.瓷度 >= 5);
    const fh = fhCandidates.length > 0 ? fhCandidates[Math.floor(Math.random() * fhCandidates.length)] : accMaterials[0];
    if (fh) {
      recommendations.push({
        role: '佛头三通', roleDesc: 'C位核心 · 万法归一',
        material: fh.name, color: fh.color,
        reason: `尺寸最大，${fh.traits.join('、')}，${styleInfo.tone === 'luxury' ? '彰显收藏级品质' : '提升整体格调'}`,
        size: '大于顶珠，为串中最大配饰',
      });
    }

    // 背云
    const byCandidates = accMaterials.filter(m => !usedMaterials.has(m.name));
    const by = byCandidates.length > 0 ? byCandidates[Math.floor(Math.random() * byCandidates.length)] : null;
    if (by) {
      recommendations.push({
        role: '背云', roleDesc: '背部延伸 · 藏式标志',
        material: by.name, color: by.color,
        reason: `垂于佛头下方，${by.traits.join('、')}，增加层次延伸感`,
        size: '小于佛头，水滴形或如意形',
      });
    }

    // 跑环
    const runHuanColors = ['黄金', '银', '钛钢', 'K金', '铜'];
    const runHuan = runHuanColors[Math.floor(Math.random() * runHuanColors.length)];
    recommendations.push({
      role: '跑环', roleDesc: '灵动装饰 · 提色解压',
      material: runHuan, color: runHuan === '黄金' ? '#c9a95c' : runHuan === '银' ? '#c0c0c0' : runHuan === 'K金' ? '#e8c560' : '#b87351',
      reason: `金属活动环，可叠加在任意位置，${runHuan}质感为手串注入${styleName}风格的点睛之笔`,
      size: '略大于主珠，可自由滑动',
    });

    // 隔片
    recommendations.push({
      role: '隔片', roleDesc: '分隔过渡 · 丰富层次',
      material: styleInfo.tone === 'luxury' ? '银隔片' : styleInfo.tone === 'zen' ? '椰壳隔片' : '牛皮隔片',
      color: styleInfo.tone === 'luxury' ? '#c0c0c0' : '#3d2b1f',
      reason: '主珠与配饰之间的过渡，避免硬碰硬，保护珠子',
      size: '薄片，直径略小于主珠',
    });

    state.recommendations = { recommendations, styleName, styleInfo, baseColorCat, preferredColors };
    renderResults();
    hideLoading();
  }, 1500);
}

function catName(cat) {
  const map = { red:'红色系', yellow:'黄色系', green:'绿色系', blue:'蓝紫色系', white:'白色系', dark:'深色系' };
  return map[cat] || cat;
}

function getColorRelation(c1, c2) {
  if (c1 === c2) return '同色系和谐过渡';
  if ((c1 === 'red' && c2 === 'green') || (c1 === 'green' && c2 === 'red')) return '经典冷暖撞色';
  if ((c1 === 'dark' && c2 === 'white') || (c1 === 'white' && c2 === 'dark')) return '经典黑白对比';
  if ((c1 === 'yellow' && c2 === 'red') || (c1 === 'red' && c2 === 'yellow')) return '暖色系温润互衬';
  if ((c1 === 'blue' && c2 === 'white') || (c1 === 'white' && c2 === 'blue')) return '冷淡高级搭配';
  return '出色搭配效果';
}

// ==================== RENDER RESULTS ====================
function renderResults() {
  const { recommendations, styleName, styleInfo, baseColorCat } = state.recommendations;
  const a = state.analysisResult;

  // 生成串珠可视化
  const beadSequence = [];
  const mainColor = a.topColors[0].hex;
  const mainBead = { color: mainColor, size: 40, type: 'main' };

  // 构建串珠序列
  for (let i = 0; i < 3; i++) beadSequence.push(mainBead);
  // 隔片
  beadSequence.push({ color: '#3d2b1f', size: 24, type: 'spacer' });
  // 腰珠左
  const waistLeft = recommendations.find(r => r.role === '腰珠（左）');
  if (waistLeft) beadSequence.push({ color: waistLeft.color, size: 40, type: 'waist' });
  beadSequence.push({ color: '#3d2b1f', size: 24, type: 'spacer' });
  for (let i = 0; i < 2; i++) beadSequence.push(mainBead);
  // 顶珠
  const top = recommendations.find(r => r.role === '顶珠');
  if (top) beadSequence.push({ color: top.color, size: 48, type: 'accent' });
  for (let i = 0; i < 2; i++) beadSequence.push(mainBead);
  // 隔片
  beadSequence.push({ color: '#3d2b1f', size: 24, type: 'spacer' });
  // 腰珠右
  const waistRight = recommendations.find(r => r.role === '腰珠（右）');
  if (waistRight) beadSequence.push({ color: waistRight.color, size: 40, type: 'waist' });
  beadSequence.push({ color: '#3d2b1f', size: 24, type: 'spacer' });
  for (let i = 0; i < 3; i++) beadSequence.push(mainBead);
  // 佛头
  const fh = recommendations.find(r => r.role === '佛头三通');
  if (fh) beadSequence.push({ color: fh.color, size: 52, type: 'accent' });
  // 背云
  const by = recommendations.find(r => r.role === '背云');
  if (by) beadSequence.push({ color: by.color, size: 36, type: 'spacer' });
  // 跑环示意
  const rh = recommendations.find(r => r.role === '跑环');
  if (rh) beadSequence.push({ color: rh.color, size: 30, type: 'spacer' });

  const beadVisual = beadSequence.map((b, i) => {
    const cls = b.type === 'accent' ? 'bead accent' : b.type === 'spacer' ? 'bead spacer' : 'bead';
    return `<div class="${cls}" style="background:${b.color};" title="${b.type}"></div>`;
  }).join('');

  const recCards = recommendations.map(r => `
    <div class="rec-card">
      <div class="rec-header">
        <span class="rec-name">${r.role}</span>
        <span class="rec-role">${r.roleDesc}</span>
      </div>
      <div class="rec-detail">
        <strong>推荐材质：</strong>${r.material}<br>
        <strong>搭配理由：</strong>${r.reason}<br>
        <strong>尺寸建议：</strong>${r.size}
      </div>
      <div class="rec-tags">
        <span class="rec-tag" style="background:${r.color};width:12px;height:12px;border-radius:50%;padding:0;display:inline-block;"></span>
        <span class="rec-tag">${r.material}</span>
      </div>
    </div>
  `).join('');

  // 配色说明
  const colorTips = [];
  if (baseColorCat === 'red') {
    colorTips.push('红色主串搭配绿色系配饰（绿松石、碧玉）形成经典冷暖对冲，永不过时');
    colorTips.push('避免同时使用大面积红+黄+绿，遵循6:3:1黄金比例');
  } else if (baseColorCat === 'yellow') {
    colorTips.push('黄色系主串搭配红色系（南红）或深色系，温润互衬');
    colorTips.push('蜜蜡/金膏玉类黄色主串，白色系配饰可提亮，绿色系更显高级');
  } else if (baseColorCat === 'green') {
    colorTips.push('绿色系是文玩第一百搭色，几乎适配所有材质');
    colorTips.push('绿松石/碧玉主串搭配南红形成经典撞色，搭配蜜蜡更显温润');
  } else if (baseColorCat === 'blue') {
    colorTips.push('蓝紫色系走冷淡高级路线，搭配白色或金色配饰效果最佳');
    colorTips.push('避免与红色系大面积搭配，会显得突兀');
  } else if (baseColorCat === 'white') {
    colorTips.push('白色系是万能提亮色，搭配深色主串效果极佳');
    colorTips.push('白色系可搭配任何颜色配饰，禅意风格尤其适合');
  } else {
    colorTips.push('深色系沉稳百搭，搭配白色（猛犸牙、白玉）形成经典黑白对比');
    colorTips.push('深色主串搭配金色配件（跑环、隔片）提升高级感');
  }

  // 风格特定建议
  if (styleInfo.tone === 'luxury') {
    colorTips.push('高端风格建议选用顶级材质（瓦西南红、原矿高瓷绿松、老蜜蜡），搭配黄金跑环和名师雕刻配饰');
  } else if (styleInfo.tone === 'tech' || styleInfo.tone === 'cyberpunk') {
    colorTips.push('科技/赛博风格推荐加入钛钢跑环、夜光珠或碳纤维材质，打破传统文玩界限');
  } else if (styleInfo.tone === 'playful') {
    colorTips.push('童趣风格建议使用多巴胺配色，多彩琉璃隔片+卡通造型侧挂吊坠，活泼可爱');
  } else if (styleInfo.tone === 'zen') {
    colorTips.push('禅意风格建议减少配饰数量，以素雅为主，猛犸牙、白玉、菩提根等纯净材质是最佳选择');
  }

  $('resultContent').innerHTML = `
    <div style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <span style="font-size:0.85rem;color:var(--text-muted);">基于</span>
        <span class="rec-tag">${catName(baseColorCat)}主串</span>
        <span class="rec-tag" style="background:rgba(201,169,92,0.1);color:var(--gold);border-color:rgba(201,169,92,0.2);">${styleName}风格</span>
      </div>
      <h3 style="font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--text-primary);margin-bottom:4px;">串珠搭配示意</h3>
      <div class="bead-visual">${beadVisual}</div>
      <p style="font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:4px;">▲ 配色方案可视化（大珠=配饰，小珠=隔片，主色=主串）</p>
    </div>

    <h3 style="font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--gold);margin-bottom:16px;">配饰搭配详情</h3>
    ${recCards}

    <div class="tips-box">
      <div class="tips-title">💡 「${styleName}」风格搭配建议</div>
      <ul>
        ${colorTips.map(t => `<li>${t}</li>`).join('')}
      </ul>
    </div>
  `;

  $('resultCard').classList.add('show');
  $('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
  renderStyleGrid();
  // 支持回车键添加自定义风格
  $('customStyle').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addCustomStyle();
  });
});
</script>
