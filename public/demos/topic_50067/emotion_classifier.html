<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪分类机器人</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 页面独有样式：容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 页面独有样式：主内容卡片 */
        .main-card {
            background: #FFFFFF;
            border: 1px solid #E4E9F2;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            padding: 40px;
        }

        /* 页面独有样式：机器人图标 */
        .robot-icon {
            font-size: 64px;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }

        /* 页面独有样式：输入区域 */
        .input-section {
            margin-bottom: 28px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px 20px;
            border: 2px solid #E4E9F2;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
            background: #FFFFFF;
            color: #1A1F36;
        }

        textarea:focus {
            outline: none;
            border-color: #3366FF;
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(51, 102, 255, 0.15);
        }

        textarea::placeholder {
            color: #C5CEE0;
        }

        .btn-analyze {
            width: 100%;
            padding: 16px;
            background: #3366FF;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            font-family: inherit;
        }

        .btn-analyze:hover {
            background: #274BDB;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(51, 102, 255, 0.25);
        }

        .btn-analyze:active {
            transform: translateY(0);
        }

        .result-section {
            display: none;
            animation: fadeIn 0.5s ease;
            background: #FFFFFF;
            border: 1px solid #E4E9F2;
            border-radius: 12px;
            padding: 24px;
            margin-top: 20px;
        }

        .result-section.active {
            display: block;
        }

        .result-card {
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            background: #FFFFFF !important;
            border: 1px solid #E4E9F2 !important;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .result-emoji {
            font-size: 72px;
            margin-bottom: 12px;
            display: block;
        }

        .result-name {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .result-name-cn {
            font-size: 18px;
            opacity: 0.85;
            margin-bottom: 8px;
        }

        .result-desc {
            font-size: 14px;
            opacity: 0.75;
        }

        /* 页面独有样式：情绪标签网格 */
        .all-emotions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .emotion-tag {
            padding: 12px 8px;
            border-radius: 14px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            opacity: 0.4;
            transform: scale(0.95);
            background: #FFFFFF !important;
            color: #1A1F36 !important;
            border: 1px solid #E4E9F2 !important;
        }

        .emotion-tag.active {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            font-weight: 700;
        }

        .emotion-tag.active.emotion-sadness { background: #F0F5FF !important; color: #0095FF !important; border-color: rgba(0,149,255,0.2) !important; }
        .emotion-tag.active.emotion-joy { background: #EDFFF5 !important; color: #009E60 !important; border-color: rgba(0,224,150,0.2) !important; }
        .emotion-tag.active.emotion-love { background: #FFF2F2 !important; color: #DB2C66 !important; border-color: rgba(255,61,113,0.2) !important; }
        .emotion-tag.active.emotion-anger { background: #FFF2F2 !important; color: #DB2C66 !important; border-color: rgba(255,61,113,0.2) !important; }
        .emotion-tag.active.emotion-fear { background: #F0E6FF !important; color: #7B4DFF !important; border-color: rgba(123,77,255,0.2) !important; }
        .emotion-tag.active.emotion-surprise { background: #FFF8E6 !important; color: #B37500 !important; border-color: rgba(255,170,0,0.2) !important; }

        .tag-emoji {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }

        .examples {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--card-border);
        }

        .examples-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 8px 14px;
            background: #EDF1F7;
            border-radius: 20px;
            font-size: 13px;
            color: #1A1F36;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #E4E9F2;
        }

        .chip:hover {
            background: #E4E9F2;
            border-color: #C5CEE0;
            transform: translateY(-1px);
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #EDF1F7;
            border-radius: 4px;
            margin-top: 16px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
            background: linear-gradient(90deg, #3366FF, #598BFF) !important;
        }

        @media (max-width: 500px) {
            .main-card { padding: 24px; }
            .all-emotions { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">


        <div class="header">
            <div class="robot-icon">🤖</div>
            <h1>情绪分类机器人</h1>
            <p>输入一段话，AI 将自动识别其中蕴含的情绪类型</p>
            <div id="modeTag" style="margin-top:10px;font-size:12px;color:var(--text-muted);display:none">
                <span style="display:inline-block;padding:3px 10px;border-radius:6px;background:#EDFFF5;color:#009E60;font-weight:500">🟢 API 模式</span>
            </div>
            <div id="fallbackTag" style="margin-top:10px;font-size:12px;color:var(--text-muted);display:none">
                <span style="display:inline-block;padding:3px 10px;border-radius:6px;background:#FFF8E6;color:#B37500;font-weight:500">🟡 本地模式 (后端未连接)</span>
            </div>
        </div>

        <div class="input-section">
            <label class="input-label">✍️ 输入你的文字</label>
            <textarea id="textInput" placeholder="例如：今天天气真好，我和朋友们去公园野餐，度过了美好的一天！"></textarea>
            <button class="btn-analyze" onclick="analyzeEmotion()">🔍 分析情绪</button>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-card" id="resultCard">
                <span class="result-emoji" id="resultEmoji"></span>
                <div class="result-name" id="resultName"></div>
                <div class="result-name-cn" id="resultNameCn"></div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
            </div>

            <div class="all-emotions" id="allEmotions"></div>
        </div>

        <div class="examples">
            <div class="examples-title">💡 点击快速试用示例</div>
            <div class="example-chips">
                <span class="chip" onclick="setText('I\'m feeling so alone...')">I'm feeling so alone...</span>
                <span class="chip" onclick="setText('I am so happy today!')">I am so happy today!</span>
                <span class="chip" onclick="setText('I love you so much!')">I love you so much!</span>
                <span class="chip" onclick="setText('This is so frustrating!')">This is so frustrating!</span>
                <span class="chip" onclick="setText('I\'m scared of the dark.')">I'm scared of the dark.</span>
                <span class="chip" onclick="setText('I can\'t believe it!')">I can't believe it!</span>
                <span class="chip" onclick="setText('今天工作超级顺利，心情特别好！')">今天工作超级顺利，心情特别好！</span>
                <span class="chip" onclick="setText('失去了最珍贵的东西，心如刀割...')">失去了最珍贵的东西，心如刀割...</span>
            </div>
        </div>
    </div>

    <script>
        const emotions = [
            {
                id: 0,
                name: 'sadness',
                nameCn: '悲伤',
                emoji: '😢',
                desc: '文字中流露出失落、孤独或难过的情绪',
                class: 'emotion-sadness',
                keywords: ['sad', 'alone', 'lonely', 'cry', 'tears', 'miss', 'regret', 'sorry', 'hurt', 'pain', 'broken', 'depressed', 'upset', 'unhappy', 'miserable', 'grief', 'sorrow', 'heartbroken', 'disappointed', '孤独', '难过', '伤心', '悲伤', '哭', '泪', '失去', '痛苦', '遗憾', '失望', '郁闷', '沮丧', '寂寞', '想念', '分手', '离别', '绝望', '心碎', '难受']
            },
            {
                id: 1,
                name: 'joy',
                nameCn: '快乐',
                emoji: '😄',
                desc: '文字中充满开心、满足或愉悦的情绪',
                class: 'emotion-joy',
                keywords: ['happy', 'joy', 'glad', 'cheerful', 'delighted', 'excited', 'wonderful', 'great', 'awesome', 'amazing', 'fantastic', 'excellent', 'good', 'nice', 'fun', 'laugh', 'smile', 'pleased', 'thrilled', 'blissful', '开心', '快乐', '高兴', '幸福', '棒', '好', '喜欢', '愉快', '兴奋', '满足', '爽', '美好', '欢乐', '笑', '哈哈', '嘿嘿', '耶', '太好了', '顺利']
            },
            {
                id: 2,
                name: 'love',
                nameCn: '爱',
                emoji: '❤️',
                desc: '文字中表达了爱意、温暖或关怀的情绪',
                class: 'emotion-love',
                keywords: ['love', 'adore', 'cherish', 'darling', 'sweetheart', 'honey', 'beloved', 'romantic', 'affection', 'caring', 'tender', 'passion', 'devoted', 'kiss', 'hug', 'cute', 'beautiful', '爱', '喜欢', '亲爱的', '宝贝', '心动', '浪漫', '温暖', ' affection', '关怀', '珍惜', '依恋', '甜蜜', '温柔', '拥抱', '亲吻', '暗恋', '表白', '相爱', '依恋', '宝贝']
            },
            {
                id: 3,
                name: 'anger',
                emoji: '😠',
                nameCn: '愤怒',
                desc: '文字中体现出不满、恼火或愤怒的情绪',
                class: 'emotion-anger',
                keywords: ['angry', 'mad', 'furious', 'rage', 'hate', 'annoyed', 'irritated', 'frustrated', 'pissed', 'outraged', 'fuming', 'livid', 'resent', 'disgusted', '生气', '愤怒', '讨厌', '烦', '恼火', '气愤', '暴躁', '怒', '火大', '气死了', '混蛋', '恶心', '忍无可忍', '不满', '怨恨', '讨厌', '厌恶', '争吵', '冲突']
            },
            {
                id: 4,
                name: 'fear',
                emoji: '😨',
                nameCn: '恐惧',
                desc: '文字中透露出害怕、担忧或不安的情绪',
                class: 'emotion-fear',
                keywords: ['scared', 'afraid', 'fear', 'terrified', 'panic', 'anxious', 'worried', 'nervous', 'dread', 'horror', 'frightened', 'uneasy', 'tense', 'stressed', '害怕', '恐惧', '担心', '紧张', '焦虑', '不安', '惊恐', '恐怖', '吓', '慌', '哆嗦', '胆寒', '畏惧', '惊悚', '压力', '忐忑', '惊慌', '阴影', '噩梦']
            },
            {
                id: 5,
                name: 'surprise',
                emoji: '😲',
                nameCn: '惊讶',
                desc: '文字中展现出意外、震惊或不可思议的情绪',
                class: 'emotion-surprise',
                keywords: ['surprised', 'shocked', 'amazed', 'astonished', 'stunned', 'unexpected', 'wow', 'omg', 'incredible', 'unbelievable', 'speechless', 'startled', 'dumbfounded', '惊讶', '震惊', '意外', '没想到', '天哪', '天啊', '居然', '竟然', '不可思议', '难以置信', '吓一跳', '愣住', '哇', '哦买噶', '怎么会', '太意外了']
            }
        ];

        function setText(text) {
            document.getElementById('textInput').value = text;
            analyzeEmotion();
        }

        // 检测后端是否可用
        let apiAvailable = false;
        let API_BASE = '';

        // 尝试多种方式检测后端（只尝试本地地址，避免命中 TRAE 代理）
        async function checkApi() {
            const urls = [
                'http://localhost:8000',
                'http://127.0.0.1:8000',
            ];
            for (const base of urls) {
                try {
                    const ctrl = new AbortController();
                    const timer = setTimeout(() => ctrl.abort(), 1500);
                    const res = await fetch(base + '/', { method: 'GET', signal: ctrl.signal });
                    clearTimeout(timer);
                    if (res.ok && (res.headers.get('content-type') || '').includes('application/json')) {
                        API_BASE = base;
                        apiAvailable = true;
                        document.getElementById('modeTag').style.display = 'block';
                        document.getElementById('modeTag').querySelector('span').textContent = '🟢 API 模式';
                        document.getElementById('fallbackTag').style.display = 'none';
                        console.log('后端已连接:', base);
                        return;
                    }
                } catch (e) { continue; }
            }
            apiAvailable = false;
            document.getElementById('modeTag').style.display = 'none';
            document.getElementById('fallbackTag').style.display = 'block';
            console.log('后端未连接，使用本地关键词模式');
        }
        checkApi();

        function localPredict(text) {
            const lowerText = text.toLowerCase();
            const scores = emotions.map(emotion => {
                let score = 0;
                emotion.keywords.forEach(keyword => {
                    const regex = new RegExp(keyword, 'gi');
                    const matches = lowerText.match(regex);
                    if (matches) score += matches.length;
                });
                return { ...emotion, score };
            });

            const maxScore = Math.max(...scores.map(s => s.score));
            let bestEmotion;
            if (maxScore === 0) {
                if (text.includes('!') || text.includes('！')) bestEmotion = emotions[5];
                else if (text.includes('?') || text.includes('？')) bestEmotion = emotions[4];
                else if (text.includes('...') || text.includes('。。。')) bestEmotion = emotions[0];
                else bestEmotion = emotions[1];
                scores.find(s => s.id === bestEmotion.id).score = 1;
            } else {
                bestEmotion = scores.reduce((prev, current) => (prev.score > current.score) ? prev : current);
            }

            const totalScore = scores.reduce((sum, s) => sum + s.score, 0) || 1;
            const normalizedScores = scores.map(s => ({
                ...s,
                percentage: Math.round((s.score / totalScore) * 100)
            }));
            return { bestEmotion, normalizedScores };
        }

        async function analyzeEmotion() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('请输入一段文字后再分析哦！');
                return;
            }

            if (apiAvailable) {
                try {
                    const res = await fetch(API_BASE + '/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text }),
                        signal: AbortSignal.timeout(5000)
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const bestEmotion = emotions.find(e => e.id === data.emotion_id);
                        const normalizedScores = emotions.map(e => ({
                            ...e,
                            percentage: Math.round(data.all_scores[e.id] || 0)
                        }));
                        displayResult(bestEmotion, normalizedScores, data.mode === 'model' ? 'API (AI 模型)' : 'API (关键词)');
                        return;
                    }
                } catch (e) {
                    console.log('API 调用失败，回退到本地模式', e);
                }
            }

            const { bestEmotion, normalizedScores } = localPredict(text);
            displayResult(bestEmotion, normalizedScores, '本地关键词');
        }

        function displayResult(bestEmotion, allScores, modeLabel) {
            const resultSection = document.getElementById('resultSection');
            const resultCard = document.getElementById('resultCard');
            const resultEmoji = document.getElementById('resultEmoji');
            const resultName = document.getElementById('resultName');
            const resultNameCn = document.getElementById('resultNameCn');
            const resultDesc = document.getElementById('resultDesc');
            const confidenceFill = document.getElementById('confidenceFill');
            const allEmotionsDiv = document.getElementById('allEmotions');

            resultCard.className = 'result-card ' + bestEmotion.class;

            resultEmoji.textContent = bestEmotion.emoji;
            resultName.textContent = bestEmotion.name;
            resultNameCn.textContent = bestEmotion.nameCn;
            resultDesc.innerHTML = bestEmotion.desc + `<span style="display:inline-block;margin-left:8px;padding:2px 8px;border-radius:6px;background:rgba(0,0,0,0.08);font-size:11px;font-weight:500">${modeLabel}</span>`;

            const bestScore = allScores.find(s => s.id === bestEmotion.id);
            confidenceFill.style.width = bestScore.percentage + '%';
            confidenceFill.style.background = getComputedStyle(resultCard).color;

            allEmotionsDiv.innerHTML = '';
            allScores.forEach(score => {
                const tag = document.createElement('div');
                tag.className = 'emotion-tag ' + (score.id === bestEmotion.id ? 'active ' : '') + score.class;
                tag.innerHTML = `
                    <span class="tag-emoji">${score.emoji}</span>
                    <div>${score.nameCn}</div>
                    <div style="font-size:11px;opacity:0.7;margin-top:2px">${score.percentage}%</div>
                `;
                tag.style.background = getTagBackground(score.class);
                tag.style.color = getTagColor(score.class);
                allEmotionsDiv.appendChild(tag);
            });

            resultSection.classList.add('active');
        }

        function getTagBackground(emotionClass) {
            const map = {
                'emotion-sadness': 'rgba(96,165,250,0.15)',
                'emotion-joy': 'rgba(251,191,36,0.15)',
                'emotion-love': 'rgba(244,114,182,0.15)',
                'emotion-anger': 'rgba(248,113,113,0.15)',
                'emotion-fear': 'rgba(167,139,250,0.15)',
                'emotion-surprise': 'rgba(34,211,238,0.15)'
            };
            return map[emotionClass] || 'rgba(255,255,255,0.05)';
        }

        function getTagColor(emotionClass) {
            const map = {
                'emotion-sadness': '#60a5fa',
                'emotion-joy': '#fbbf24',
                'emotion-love': '#f472b6',
                'emotion-anger': '#f87171',
                'emotion-fear': '#a78bfa',
                'emotion-surprise': '#22d3ee'
            };
            return map[emotionClass] || '#94a3b8';
        }

        // Allow Enter key to trigger analysis
        document.getElementById('textInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                analyzeEmotion();
            }
        });
    </script>
    </div>
</body>
</html>
