<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批量文件重命名工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f5;--card:#fff;--border:#ddd;--primary:#4a90d9;--primary-hover:#357abd;--text:#333;--text2:#666;--danger:#e74c3c;--success:#27ae60;--warning:#f39c12;--drag-line:#4a90d9}
body{font-family:"Microsoft YaHei","Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:16px}
h1{text-align:center;font-size:22px;padding:12px 0;color:var(--primary);font-weight:600}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text2);border-bottom:1px solid var(--border);padding-bottom:6px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{flex:1;min-width:200px}
label{display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer;font-size:13px}
label input[type="radio"],label input[type="checkbox"]{accent-color:var(--primary)}
input[type="text"],input[type="number"],select{border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:13px;outline:none;transition:border-color .2s}
input[type="text"]:focus,input[type="number"]:focus,select:focus{border-color:var(--primary)}
input[type="text"]{width:100%}
input[type="number"]{width:70px}
select{padding:4px 8px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:6px 16px;border:1px solid var(--border);border-radius:4px;background:var(--card);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none}
.btn:hover{background:#e8e8e8}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-hover)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#c0392b}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-sm{padding:4px 10px;font-size:12px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.toolbar .spacer{flex:1}
.dir-bar{display:flex;gap:8px;align-items:center}
.dir-bar input{flex:1}
.config-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.config-row label{white-space:nowrap}
.extension-row{display:none;align-items:center;gap:6px;margin-top:6px}
.extension-row.show{display:flex}
.file-table-wrap{border:1px solid var(--border);border-radius:6px;overflow:auto;max-height:400px;position:relative;background:var(--card)}
.file-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.file-table th{position:sticky;top:0;background:#f0f0f0;z-index:2;text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-weight:600;white-space:nowrap}
.file-table td{padding:6px 10px;border-bottom:1px solid #eee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-table tr:hover{background:#f7f9fc}
.file-table tr.dragging{opacity:.4}
.file-table tr.drag-over-top{box-shadow:inset 0 2px 0 var(--drag-line)}
.file-table tr.drag-over-bottom{box-shadow:inset 0 -2px 0 var(--drag-line)}
.file-table .col-name{width:50%}
.file-table .col-preview{width:50%}
.file-table .changed{color:var(--primary);font-weight:600}
.file-table .same{color:var(--text2)}
.status-bar{display:flex;gap:16px;font-size:12px;color:var(--text2);padding:6px 0}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:6px;color:#fff;font-size:14px;z-index:9999;animation:toastIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--primary)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9998}
.modal{background:var(--card);border-radius:8px;padding:24px;min-width:320px;max-width:500px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{margin-bottom:12px;font-size:16px}
.modal p{margin-bottom:16px;font-size:14px;line-height:1.6}
.modal .modal-btns{display:flex;gap:8px;justify-content:flex-end}
.browser-warn{background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:10px 16px;border-radius:6px;margin-bottom:12px;font-size:13px;display:none}
.empty-tip{text-align:center;padding:40px 0;color:#bbb;font-size:14px}
@media(max-width:700px){.row{flex-direction:column}.col{min-width:100%}.file-table .col-name,.file-table .col-preview{width:50%}}
</style>
</head>
<body>
<div class="container">
<h1>📁 批量文件重命名工具</h1>

<div class="browser-warn" id="browserWarn">
⚠️ 您的浏览器不支持 File System Access API，文件操作功能将不可用。请使用最新版 Chrome 或 Edge 浏览器。
</div>

<div class="card">
<div class="dir-bar">
  <label style="white-space:nowrap;font-weight:600">工作目录：</label>
  <input type="text" id="dirPath" readonly placeholder="点击"选择目录"选取文件夹">
  <button class="btn btn-primary" onclick="selectDirectory()">选择目录</button>
  <button class="btn" onclick="loadFiles()">加载文件</button>
</div>
</div>

<div class="card">
<div class="row">
  <div class="col">
    <div class="card-title">重命名方式</div>
    <label><input type="radio" name="method" value="添加前缀" checked onchange="onMethodChange()"> 添加前缀</label>
    <label><input type="radio" name="method" value="添加后缀" onchange="onMethodChange()"> 添加后缀</label>
    <label><input type="radio" name="method" value="字符串替换" onchange="onMethodChange()"> 字符串替换</label>
    <label><input type="radio" name="method" value="删除前缀" onchange="onMethodChange()"> 删除前缀</label>
    <label><input type="radio" name="method" value="删除后缀" onchange="onMethodChange()"> 删除后缀</label>
    <label><input type="radio" name="method" value="匹配字符串删除" onchange="onMethodChange()"> 匹配字符串删除</label>
  </div>
  <div class="col">
    <div class="card-title">重命名范围</div>
    <label><input type="radio" name="target" value="仅文件" checked onchange="onTargetChange()"> 仅文件</label>
    <label><input type="radio" name="target" value="仅文件夹" onchange="onTargetChange()"> 仅文件夹</label>
    <label><input type="radio" name="target" value="文件及文件夹" onchange="onTargetChange()"> 文件及文件夹</label>
    <label><input type="radio" name="target" value="特定扩展名文件" onchange="onTargetChange()"> 特定扩展名文件</label>
    <div class="extension-row" id="extensionRow">
      <label>扩展名：</label>
      <input type="text" id="targetExt" placeholder="如 .txt" style="width:100px">
    </div>
  </div>
</div>
</div>

<div class="card" id="configCard">
<div class="card-title">配置</div>
<div id="methodConfig"></div>
</div>

<div class="card" style="display:flex;flex-direction:column">
<div class="toolbar">
  <label>排序方式：</label>
  <select id="sortMode" onchange="onSortChange()">
    <option value="按名字">按名字</option>
    <option value="按修改时间">按修改时间</option>
    <option value="按大小">按大小</option>
    <option value="自定义">自定义（拖动）</option>
  </select>
  <label>排序顺序：</label>
  <select id="sortOrder" onchange="sortFiles()">
    <option value="升序">升序</option>
    <option value="降序">降序</option>
  </select>
  <button class="btn btn-sm" onclick="loadFiles()">刷新列表</button>
  <span class="spacer"></span>
  <button class="btn btn-sm" id="btnUndo" disabled onclick="undoRename()">↩ 撤销</button>
  <button class="btn btn-sm" id="btnRedo" disabled onclick="redoRename()">↪ 恢复</button>
  <button class="btn btn-sm btn-primary" onclick="previewRename()">👁 预览</button>
  <button class="btn btn-sm btn-danger" onclick="clearList()">✕ 清空</button>
  <button class="btn btn-sm" style="background:var(--success);color:#fff;border-color:var(--success)" onclick="executeRename()">✓ 执行重命名</button>
</div>
<div class="status-bar" id="statusBar">就绪</div>
<div class="file-table-wrap" id="tableWrap">
  <table class="file-table" id="fileTable">
    <thead><tr><th class="col-name">原文件名</th><th class="col-preview">预览文件名</th></tr></thead>
    <tbody id="fileBody"></tbody>
  </table>
  <div class="empty-tip" id="emptyTip">请选择目录并加载文件</div>
</div>
</div>
</div>

<div id="modalContainer"></div>

<script>
let dirHandle = null;
let files = [];
let history = [];
let historyIndex = -1;
let dragSrcIndex = null;

function getMethod(){return document.querySelector('input[name="method"]:checked').value}
function getTarget(){return document.querySelector('input[name="target"]:checked').value}

function checkBrowser(){
  if(!('showDirectoryPicker' in window)){
    document.getElementById('browserWarn').style.display='block';
  }
}
checkBrowser();

async function selectDirectory(){
  try{
    dirHandle = await window.showDirectoryPicker({mode:'readwrite'});
    document.getElementById('dirPath').value = dirHandle.name;
  }catch(e){
    if(e.name!=='AbortError') toast('选择目录失败：'+e.message,'error');
  }
}

async function loadFiles(){
  if(!dirHandle){toast('请先选择目录','info');return}
  files=[];
  const target=getTarget();
  const ext=document.getElementById('targetExt').value.trim().toLowerCase();
  try{
    for await(const entry of dirHandle.values()){
      const isFile=entry.kind==='file';
      const isDir=entry.kind==='directory';
      let include=false;
      if(target==='仅文件'&&isFile) include=true;
      if(target==='仅文件夹'&&isDir) include=true;
      if(target==='文件及文件夹') include=true;
      if(target==='特定扩展名文件'&&isFile&&ext&&entry.name.toLowerCase().endsWith(ext)) include=true;
      if(include){
        let size=0, mtime=0;
        if(isFile){
          try{const f=await entry.getFile();size=f.size;mtime=f.lastModified}catch(e){}
        }
        files.push({name:entry.name,handle:entry,kind:entry.kind,size,mtime,previewName:entry.name});
      }
    }
  }catch(e){toast('读取目录失败：'+e.message,'error');return}
  sortFiles();
  toast(`已加载 ${files.length} 个项目`,'success');
}

function sortFiles(){
  const mode=document.getElementById('sortMode').value;
  const order=document.getElementById('sortOrder').value==='升序'?1:-1;
  if(mode==='按名字') files.sort((a,b)=>a.name.localeCompare(b.name)*order);
  else if(mode==='按修改时间') files.sort((a,b)=>(a.mtime-b.mtime)*order);
  else if(mode==='按大小') files.sort((a,b)=>(a.size-b.size)*order);
  renderTable();
}

function onSortChange(){
  const mode=document.getElementById('sortMode').value;
  if(mode!=='自定义') sortFiles();
  else renderTable();
}

function renderTable(){
  const body=document.getElementById('fileBody');
  const tip=document.getElementById('emptyTip');
  body.innerHTML='';
  if(files.length===0){tip.style.display='block';updateStatus();return}
  tip.style.display='none';
  const isCustom=document.getElementById('sortMode').value==='自定义';
  files.forEach((f,i)=>{
    const tr=document.createElement('tr');
    tr.draggable=isCustom;
    tr.dataset.index=i;
    const changed=f.previewName!==f.name;
    tr.innerHTML=`<td class="col-name" title="${esc(f.name)}">${esc(f.name)}</td><td class="col-preview ${changed?'changed':'same'}" title="${esc(f.previewName)}">${esc(f.previewName)}</td>`;
    if(isCustom){
      tr.addEventListener('dragstart',onDragStart);
      tr.addEventListener('dragover',onDragOver);
      tr.addEventListener('dragleave',onDragLeave);
      tr.addEventListener('drop',onDrop);
      tr.addEventListener('dragend',onDragEnd);
    }
    body.appendChild(tr);
  });
  updateStatus();
}

function onDragStart(e){
  dragSrcIndex=+e.currentTarget.dataset.index;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',dragSrcIndex);
}
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const tr=e.currentTarget;
  const rect=tr.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  tr.classList.remove('drag-over-top','drag-over-bottom');
  if(e.clientY<mid) tr.classList.add('drag-over-top');
  else tr.classList.add('drag-over-bottom');
}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over-top','drag-over-bottom')}
function onDrop(e){
  e.preventDefault();
  const tr=e.currentTarget;
  tr.classList.remove('drag-over-top','drag-over-bottom');
  const targetIdx=+tr.dataset.index;
  if(dragSrcIndex===null||dragSrcIndex===targetIdx)return;
  const rect=tr.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  let insertIdx=e.clientY<mid?targetIdx:targetIdx+1;
  const item=files.splice(dragSrcIndex,1)[0];
  if(dragSrcIndex<insertIdx) insertIdx--;
  files.splice(insertIdx,0,item);
  renderTable();
}
function onDragEnd(e){
  dragSrcIndex=null;
  document.querySelectorAll('.dragging,.drag-over-top,.drag-over-bottom').forEach(el=>{
    el.classList.remove('dragging','drag-over-top','drag-over-bottom');
  });
}

function onMethodChange(){
  updateMethodConfig();
  files.forEach(f=>f.previewName=f.name);
  renderTable();
}
function onTargetChange(){
  const extRow=document.getElementById('extensionRow');
  extRow.classList.toggle('show',getTarget()==='特定扩展名文件');
}

function updateMethodConfig(){
  const c=document.getElementById('methodConfig');
  const m=getMethod();
  let h='';
  if(m==='添加前缀'){
    h=`<div class="config-row"><label><input type="checkbox" id="useIndex"> 使用序号前缀</label></div>
    <div class="config-row"><label>固定前缀：</label><input type="text" id="prefixText" placeholder="输入前缀内容"></div>
    <div class="config-row" id="indexConfig">
      <label>起始序号：</label><input type="number" id="startIndex" value="1" min="0" max="9999">
      <label>填充位数：</label><input type="number" id="padLen" value="0" min="0" max="10">
      <label>分隔符：</label><input type="text" id="idxSep" value="_" style="width:40px">
      <label>序号顺序：</label><button class="btn btn-sm" id="idxOrderBtn" onclick="toggleIndexOrder()">升序</button>
    </div>`;
  }else if(m==='添加后缀'){
    h=`<div class="config-row"><label>后缀内容：</label><input type="text" id="suffixText" placeholder="输入后缀内容"></div>`;
  }else if(m==='字符串替换'){
    h=`<div class="config-row"><label>查找：</label><input type="text" id="findText" placeholder="要查找的字符串"></div>
    <div class="config-row"><label>替换为：</label><input type="text" id="replaceText" placeholder="替换后的字符串"></div>`;
  }else if(m==='删除前缀'){
    h=`<div class="config-row"><label>前缀长度：</label><input type="number" id="prefixLen" value="0" min="0" max="200"></div>`;
  }else if(m==='删除后缀'){
    h=`<div class="config-row"><label>后缀长度：</label><input type="number" id="suffixLen" value="0" min="0" max="200"></div>`;
  }else if(m==='匹配字符串删除'){
    h=`<div class="config-row"><label>要删除的字符串：</label><input type="text" id="delStr" placeholder="输入要删除的字符串"></div>
    <div class="config-row"><label>匹配模式：</label><select id="matchMode"><option value="精确匹配">精确匹配</option><option value="正则表达式">正则表达式</option></select></div>`;
  }
  c.innerHTML=h;
  const idx=document.getElementById('useIndex');
  if(idx) idx.addEventListener('change',()=>{
    document.getElementById('indexConfig').style.display=idx.checked?'flex':'none';
    document.getElementById('indexConfig').style.flexWrap='wrap';
  });
  if(document.getElementById('indexConfig')) document.getElementById('indexConfig').style.display='none';
}

function toggleIndexOrder(){
  const btn=document.getElementById('idxOrderBtn');
  btn.textContent=btn.textContent==='升序'?'降序':'升序';
  autoUpdatePreview();
}

function autoUpdatePreview(){
  if(files.length===0)return;
  const m=getMethod();
  if(m==='添加前缀'&&document.getElementById('useIndex')&&document.getElementById('useIndex').checked){
    previewRename();
  }
}

function computeNewName(name,index,total){
  const m=getMethod();
  if(m==='添加前缀'){
    const prefix=document.getElementById('prefixText').value;
    if(document.getElementById('useIndex').checked){
      const start=+document.getElementById('startIndex').value;
      const pad=+document.getElementById('padLen').value;
      const sep=document.getElementById('idxSep').value;
      const order=document.getElementById('idxOrderBtn').textContent;
      const idx=order==='升序'?start+index:start+(total-1-index);
      const idxStr=pad>0?String(idx).padStart(pad,'0'):String(idx);
      return prefix+idxStr+sep+name;
    }
    return prefix+name;
  }else if(m==='添加后缀'){
    const suffix=document.getElementById('suffixText').value;
    const dot=name.lastIndexOf('.');
    if(dot>0) return name.slice(0,dot)+suffix+name.slice(dot);
    return name+suffix;
  }else if(m==='字符串替换'){
    const find=document.getElementById('findText').value;
    const rep=document.getElementById('replaceText').value;
    return name.split(find).join(rep);
  }else if(m==='删除前缀'){
    const len=+document.getElementById('prefixLen').value;
    return name.slice(len);
  }else if(m==='删除后缀'){
    const len=+document.getElementById('suffixLen').value;
    const dot=name.lastIndexOf('.');
    if(dot>0){
      const base=name.slice(0,dot);
      if(len<base.length) return base.slice(0,-len)+name.slice(dot);
    }
    return name;
  }else if(m==='匹配字符串删除'){
    const del=document.getElementById('delStr').value;
    const mode=document.getElementById('matchMode').value;
    if(mode==='精确匹配') return name.split(del).join('');
    try{return name.replace(new RegExp(del,'g'),'')}catch(e){toast('正则表达式语法错误','error');return name}
  }
  return name;
}

function previewRename(){
  if(files.length===0){toast('请先加载文件','info');return}
  const total=files.length;
  files.forEach((f,i)=>{f.previewName=computeNewName(f.name,i,total)});
  renderTable();
  const changed=files.filter(f=>f.previewName!==f.name).length;
  toast(`预览完成，${changed} 个项目将被重命名`,'info');
}

async function executeRename(){
  if(files.length===0){toast('请先加载文件','info');return}
  const pairs=[];
  files.forEach((f,i)=>{
    if(f.previewName!==f.name) pairs.push({handle:f.handle,oldName:f.name,newName:f.previewName});
  });
  if(pairs.length===0){toast('没有需要重命名的项目','info');return}
  if(!await confirmModal(`确定要重命名 ${pairs.length} 个项目吗？`))return;
  let ok=0,fail=0;
  const record=[];
  for(const p of pairs){
    try{
      if(p.handle.move){
        await p.handle.move(p.newName);
      }else{
        const file=await p.handle.getFile();
        const content=await file.arrayBuffer();
        const newHandle=await dirHandle.getFileHandle(p.newName,{create:true});
        const writable=await newHandle.createWritable();
        await writable.write(content);
        await writable.close();
        await dirHandle.removeEntry(p.oldName);
      }
      ok++;
      record.push({oldName:p.oldName,newName:p.newName});
    }catch(e){fail++;console.error(e)}
  }
  if(record.length>0){
    while(history.length>historyIndex+1) history.pop();
    history.push(record);
    historyIndex++;
    updateHistoryBtns();
  }
  toast(`重命名完成！成功：${ok}，失败：${fail}`,fail>0?'error':'success');
  await loadFiles();
}

async function undoRename(){
  if(historyIndex<0)return;
  const record=history[historyIndex];
  let ok=0,fail=0;
  for(const r of record){
    try{
      for await(const entry of dirHandle.values()){
        if(entry.name===r.newName){
          if(entry.move) await entry.move(r.oldName);
          else{
            const file=await entry.getFile();
            const content=await file.arrayBuffer();
            const oldHandle=await dirHandle.getFileHandle(r.oldName,{create:true});
            const writable=await oldHandle.createWritable();
            await writable.write(content);
            await writable.close();
            await dirHandle.removeEntry(r.newName);
          }
          ok++;break;
        }
      }
    }catch(e){fail++}
  }
  historyIndex--;
  updateHistoryBtns();
  toast(`撤销完成！成功：${ok}，失败：${fail}`,fail>0?'error':'success');
  await loadFiles();
}

async function redoRename(){
  if(historyIndex>=history.length-1)return;
  historyIndex++;
  const record=history[historyIndex];
  let ok=0,fail=0;
  for(const r of record){
    try{
      for await(const entry of dirHandle.values()){
        if(entry.name===r.oldName){
          if(entry.move) await entry.move(r.newName);
          else{
            const file=await entry.getFile();
            const content=await file.arrayBuffer();
            const newHandle=await dirHandle.getFileHandle(r.newName,{create:true});
            const writable=await newHandle.createWritable();
            await writable.write(content);
            await writable.close();
            await dirHandle.removeEntry(r.oldName);
          }
          ok++;break;
        }
      }
    }catch(e){fail++}
  }
  updateHistoryBtns();
  toast(`恢复完成！成功：${ok}，失败：${fail}`,fail>0?'error':'success');
  await loadFiles();
}

function updateHistoryBtns(){
  document.getElementById('btnUndo').disabled=historyIndex<0;
  document.getElementById('btnRedo').disabled=historyIndex>=history.length-1;
}

function clearList(){
  files=[];
  renderTable();
  toast('列表已清空','info');
}

function updateStatus(){
  const bar=document.getElementById('statusBar');
  const total=files.length;
  const changed=files.filter(f=>f.previewName!==f.name).length;
  bar.textContent=`共 ${total} 个项目 | ${changed} 个将被重命名`;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className='toast '+type;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},2500);
}

function confirmModal(msg){
  return new Promise(resolve=>{
    const overlay=document.createElement('div');
    overlay.className='modal-overlay';
    overlay.innerHTML=`<div class="modal"><h3>确认操作</h3><p>${esc(msg)}</p><div class="modal-btns"><button class="btn" id="modalCancel">取消</button><button class="btn btn-primary" id="modalOk">确定</button></div></div>`;
    document.getElementById('modalContainer').appendChild(overlay);
    overlay.querySelector('#modalCancel').onclick=()=>{overlay.remove();resolve(false)};
    overlay.querySelector('#modalOk').onclick=()=>{overlay.remove();resolve(true)};
    overlay.onclick=e=>{if(e.target===overlay){overlay.remove();resolve(false)}};
  });
}

updateMethodConfig();
</script>
</body>
</html>
