<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美食决策转盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink-1: #FF9A9E; --pink-2: #FECFEF;
      --yellow-1: #F6D365; --yellow-2: #FDA085;
      --mint: #A8E6CF; --sky: #88D8E8;
      --lavender: #D4A5FF; --coral: #FFB7B2; --peach: #FFDAC1;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FECFEF 0%, #FFDAC1 50%, #FFE5B4 100%);
      font-family: 'ZCOOL KuaiLe', cursive, system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; overflow-y: auto; position: relative;
    }

    /* 装饰背景 */
    .decoration { position: fixed; pointer-events: none; z-index: 0; }
    .star {
      width: 20px; height: 20px; background: #FFD700;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      animation: twinkle 2s ease-in-out infinite;
    }
    .star:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
    .star:nth-child(2) { top: 20%; right: 10%; animation-delay: .3s; transform: scale(.7); }
    .star:nth-child(3) { bottom: 15%; left: 8%; animation-delay: .6s; transform: scale(.5); }
    .star:nth-child(4) { bottom: 25%; right: 5%; animation-delay: .9s; transform: scale(.8); }
    @keyframes twinkle {
      0%,100% { opacity: 1; transform: scale(1) rotate(0deg); }
      50% { opacity: .5; transform: scale(.8) rotate(180deg); }
    }

    /* 场景 Tab */
    .scene-tabs {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 6px; z-index: 1;
    }
    .scene-tab {
      padding: 8px 20px; font-size: 1.1rem; font-family: inherit;
      background: rgba(255,255,255,.7); color: #888;
      border: 2px solid transparent; border-radius: 30px;
      cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 4px;
    }
    .scene-tab:hover { background: #FFF; transform: translateY(-2px); }
    .scene-tab.active {
      background: linear-gradient(135deg, var(--pink-1), var(--lavender));
      color: #FFF; border-color: #FFF;
      box-shadow: 0 4px 14px rgba(212,165,255,.4);
    }

    /* 主容器 */
    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      width: 100%; max-width: 500px;
    }

    .title {
      font-size: 2.4rem; margin-top: 10px;
      background: linear-gradient(135deg, var(--pink-1), var(--lavender), var(--sky));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-shadow: 3px 3px 6px rgba(0,0,0,.1);
      animation: bounce 2s ease-in-out infinite;
      display: flex; align-items: center; gap: 10px;
    }
    .title-emoji { font-size: 2rem; -webkit-text-fill-color: initial; animation: wiggle 1s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes wiggle { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }

    /* 分类筛选 */
    .filter-bar {
      display: flex; align-items: center; gap: 8px; font-size: .95rem; color: #888;
    }
    .filter-select {
      font-family: inherit; font-size: .95rem; padding: 6px 14px;
      border: 2px solid var(--pink-2); border-radius: 20px; background: #FFF;
      color: #FF6B8A; outline: none; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--pink-1); }

    /* 转盘 */
    .wheel-container { position: relative; width: 340px; height: 340px; }
    .wheel {
      width: 100%; height: 100%;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,.2));
      transition: transform 4s cubic-bezier(.17,.67,.12,.99);
    }
    .wheel-outer-ring { fill: none; stroke: #FF9A9E; stroke-width: 8; }
    .wheel-inner-ring { fill: none; stroke: #FFF; stroke-width: 10; }
    .sector-text { font-family: 'ZCOOL KuaiLe', cursive; font-size: 18px; fill: #FFF; text-shadow: 1px 1px 2px rgba(0,0,0,.3); }

    .pointer {
      position: absolute; top: -8px; left: 50%; transform: translateX(-50%); z-index: 10;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.2));
    }
    .pointer svg { width: 40px; height: 50px; }

    /* 旋转按钮 */
    .spin-btn {
      padding: 16px 56px; font-size: 1.6rem; font-family: inherit;
      background: linear-gradient(135deg, var(--pink-1), var(--lavender));
      color: #FFF; border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 0 #D4A5FF, 0 8px 20px rgba(212,165,255,.4);
      transition: all .15s ease; position: relative; top: 0;
    }
    .spin-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 8px 0 #D4A5FF, 0 12px 30px rgba(212,165,255,.5); }
    .spin-btn:active:not(:disabled) { top: 4px; box-shadow: 0 2px 0 #D4A5FF, 0 4px 10px rgba(212,165,255,.3); }
    .spin-btn:disabled { opacity: .7; cursor: not-allowed; }

    /* 管理按钮 */
    .manage-btn {
      position: fixed; top: 20px; right: 20px; z-index: 50;
      padding: 10px 22px; font-size: 1rem; font-family: inherit;
      background: #FFF; color: #FF6B8A; border: 2px solid var(--pink-1);
      border-radius: 40px; cursor: pointer; transition: all .15s ease;
      display: inline-flex; align-items: center; gap: 6px;
      box-shadow: 0 4px 12px rgba(255,154,158,.2);
    }
    .manage-btn:hover { background: var(--pink-2); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255,154,158,.3); }

    /* 历史记录 */
    .history-section {
      width: 100%; max-width: 460px; margin-top: 8px;
      background: rgba(255,255,255,.6); border-radius: 16px; padding: 14px 18px;
      border: 2px solid rgba(255,154,158,.2);
    }
    .history-title { font-size: 1.1rem; color: #FF6B8A; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      background: #FFF; border-radius: 10px; font-size: .9rem; color: #666;
      border: 1px solid #FEE4DD;
    }
    .history-item .h-emoji { font-size: 1.4rem; }
    .history-item .h-name { font-size: 1.05rem; color: #FF6B8A; flex: 1; }
    .history-item .h-scene { font-size: .8rem; color: #AAA; }
    .history-item .h-cat { font-size: .75rem; padding: 2px 8px; border-radius: 8px; background: var(--pink-2); color: #FF6B8A; }
    .history-item .h-time { font-size: .75rem; color: #BBB; }
    .history-empty { text-align: center; color: #BBB; padding: 12px; font-size: .9rem; }

    /* 结果大弹窗 */
    .result-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,.45); display: none;
      align-items: center; justify-content: center; z-index: 300;
      backdrop-filter: blur(6px);
    }
    .result-overlay.active { display: flex; }
    .result-card {
      background: linear-gradient(160deg, #FFF 0%, #FFF5F8 100%);
      border-radius: 28px; padding: 40px 50px; text-align: center;
      box-shadow: 0 20px 80px rgba(0,0,0,.25);
      animation: resultPop .5s cubic-bezier(.68,-.55,.265,1.55);
      position: relative; overflow: hidden;
    }
    @keyframes resultPop {
      0% { transform: scale(.3) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    .result-card .r-label { font-size: 1.1rem; color: #AAA; margin-bottom: 8px; }
    .result-card .r-emoji { font-size: 5rem; display: block; margin-bottom: 12px; animation: jump .6s ease infinite; }
    @keyframes jump { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .result-card .r-name { font-size: 3rem; color: #FF6B8A; margin-bottom: 8px; }
    .result-card .r-cat { display: inline-block; font-size: .9rem; padding: 4px 14px; border-radius: 12px; background: var(--pink-2); color: #FF6B8A; margin-bottom: 20px; }
    .result-card .r-sub { font-size: 1rem; color: #888; margin-bottom: 24px; }
    .result-card .r-close {
      padding: 10px 36px; font-size: 1.1rem; font-family: inherit;
      background: linear-gradient(135deg, var(--pink-1), var(--lavender));
      color: #FFF; border: none; border-radius: 30px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(212,165,255,.4); transition: all .15s;
    }
    .result-card .r-close:hover { transform: scale(1.05); }

    /* 撒花 */
    .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 400; display: none; }
    .confetti.active { display: block; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; animation: confetti-fall 3s ease-out forwards; }
    @keyframes confetti-fall {
      0% { transform: translateY(-100px) rotate(0); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* 模态框 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,.4); display: none;
      align-items: center; justify-content: center; z-index: 200;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #FFF; border-radius: 20px; width: 90%; max-width: 500px;
      max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: modalIn .25s cubic-bezier(.17,.67,.12,.99);
    }
    @keyframes modalIn { from{transform:scale(.9) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
    .modal-header {
      padding: 18px 24px; background: linear-gradient(135deg, var(--pink-1), var(--lavender));
      color: #FFF; display: flex; justify-content: space-between; align-items: center;
    }
    .modal-title { font-size: 1.3rem; }
    .modal-close {
      background: none; border: none; color: #FFF; font-size: 1.6rem;
      cursor: pointer; width: 32px; height: 32px; display: flex;
      align-items: center; justify-content: center; border-radius: 50%;
      transition: background .15s;
    }
    .modal-close:hover { background: rgba(255,255,255,.2); }

    .menu-list { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
    .menu-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: #FFF8F5; border-radius: 12px; border: 1px solid #FEE4DD; transition: all .15s;
    }
    .menu-item:hover { background: #FFF0EB; border-color: var(--pink-1); }
    .menu-item-emoji { font-size: 1.5rem; width: 30px; text-align: center; flex-shrink: 0; }
    .menu-item-name { flex: 1; font-size: 1.05rem; color: #555; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .menu-item-cat { font-size: .75rem; padding: 2px 8px; border-radius: 8px; background: var(--pink-2); color: #FF6B8A; flex-shrink: 0; }
    .menu-item-cat.unknown { background: #F0F0F0; color: #AAA; }
    .menu-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .95rem; transition: all .15s;
    }
    .icon-btn.edit { background: #E8F5E9; color: #4CAF50; }
    .icon-btn.edit:hover { background: #C8E6C9; transform: scale(1.1); }
    .icon-btn.delete { background: #FFEBEE; color: #E53935; }
    .icon-btn.delete:hover { background: #FFCDD2; transform: scale(1.1); }
    .empty-list { text-align: center; padding: 40px 20px; color: #AAA; font-size: 1rem; }

    .modal-footer {
      padding: 14px 18px 18px; background: #FFFAF8; border-top: 1px solid #FEE4DD;
      display: flex; gap: 8px; align-items: stretch; flex-wrap: wrap;
    }
    .input-emoji, .input-text, .input-cat {
      font-family: inherit; border: 2px solid var(--pink-2); border-radius: 10px;
      padding: 0 10px; outline: none; transition: border-color .15s; background: #FFF;
      font-size: .95rem; height: 42px;
    }
    .input-emoji { width: 54px; text-align: center; font-size: 1.2rem; }
    .input-text { flex: 1; min-width: 100px; }
    .input-cat { width: 90px; font-size: .85rem; cursor: pointer; }
    .input-emoji:focus, .input-text:focus, .input-cat:focus { border-color: var(--pink-1); }
    .add-btn {
      font-family: inherit; background: linear-gradient(135deg, var(--pink-1), var(--lavender));
      color: #FFF; border: none; border-radius: 10px; padding: 0 18px; font-size: .95rem;
      cursor: pointer; transition: all .15s; height: 42px; box-shadow: 0 4px 10px rgba(212,165,255,.3);
    }
    .add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(212,165,255,.4); }

    /* Emoji 选择器弹窗 */
    .emoji-picker-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,.4); display: none;
      align-items: center; justify-content: center; z-index: 250;
      backdrop-filter: blur(4px);
    }
    .emoji-picker-overlay.active { display: flex; }
    .emoji-picker {
      background: #FFF; border-radius: 20px; width: 90%; max-width: 420px;
      max-height: 70vh; display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: modalIn .25s cubic-bezier(.17,.67,.12,.99);
    }
    .emoji-picker-header {
      padding: 16px 20px; background: linear-gradient(135deg, var(--pink-1), var(--lavender));
      color: #FFF; display: flex; justify-content: space-between; align-items: center;
    }
    .emoji-picker-title { font-size: 1.2rem; }
    .emoji-picker-grid {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
    }
    .emoji-picker-item {
      font-size: 1.8rem; width: 100%; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border: none; background: #FFF8F5; border-radius: 12px; cursor: pointer;
      transition: all .12s;
    }
    .emoji-picker-item:hover { background: var(--pink-2); transform: scale(1.15); }
    .emoji-picker-item.selected { background: var(--pink-1); }

    /* 图标展示区 */
    .icon-display {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; background: #FFF8F5; border: 2px solid var(--pink-2);
      cursor: pointer; transition: all .15s;
    }
    .icon-display:hover { border-color: var(--pink-1); transform: scale(1.05); }
    .icon-choose-btn {
      font-family: inherit; font-size: .8rem; padding: 4px 12px;
      background: var(--pink-2); color: #FF6B8A; border: none; border-radius: 8px;
      cursor: pointer; transition: all .15s; white-space: nowrap; height: 36px;
    }
    .icon-choose-btn:hover { background: var(--pink-1); color: #FFF; }
    .icon-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    /* 响应式 */
    @media (max-width: 480px) {
      .title { font-size: 1.8rem; }
      .wheel-container { width: 280px; height: 280px; }
      .sector-text { font-size: 14px; }
      .spin-btn { padding: 14px 42px; font-size: 1.3rem; }
      .result-card { padding: 30px 28px; }
      .result-card .r-name { font-size: 2.2rem; }
      .result-card .r-emoji { font-size: 4rem; }
    }
  </style>
</head>
<body>
  <!-- 装饰 -->
  <div class="decoration star"></div>
  <div class="decoration star"></div>
  <div class="decoration star"></div>
  <div class="decoration star"></div>

  <!-- 场景 Tab -->
  <div class="scene-tabs" id="sceneTabs"></div>

  <div class="container">
    <h1 class="title">
      <span class="title-emoji">🍜</span>
      <span id="titleText">午餐转盘</span>
      <span class="title-emoji">🍕</span>
    </h1>

    <!-- 分类筛选 -->
    <div class="filter-bar">
      <span>🔎 分类筛选</span>
      <select class="filter-select" id="categoryFilter">
        <option value="all">全部分类</option>
      </select>
    </div>

    <!-- 转盘 -->
    <div class="wheel-container">
      <div class="pointer">
        <svg viewBox="0 0 40 50">
          <polygon points="20,50 0,0 40,0" fill="url(#pointerGrad)" stroke="#FFF" stroke-width="2"/>
          <defs>
            <linearGradient id="pointerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#FFB7B2"/>
              <stop offset="100%" stop-color="#FF9A9E"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <svg class="wheel" id="wheel" viewBox="0 0 400 400">
        <g id="wheelInner"></g>
        <circle class="wheel-outer-ring" cx="200" cy="200" r="196"/>
        <circle class="wheel-inner-ring" cx="200" cy="200" r="190"/>
        <circle cx="200" cy="200" r="28" fill="#FFF" stroke="#FF9A9E" stroke-width="3"/>
        <text x="200" y="208" text-anchor="middle" font-size="28">🎯</text>
      </svg>
    </div>

    <button class="spin-btn" id="spinBtn">开始转转！</button>

    <!-- 历史记录 -->
    <div class="history-section">
      <div class="history-title">📋 最近转出的结果</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">还没有转出过结果哦～</div>
      </div>
    </div>
  </div>

  <!-- 管理按钮 -->
  <button class="manage-btn" id="manageBtn"><span>⚙️</span><span>管理菜单</span></button>

  <!-- 撒花 -->
  <div class="confetti" id="confetti"></div>

  <!-- 结果大弹窗 -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="r-label">🎉 今天吃这个！</div>
      <span class="r-emoji" id="resultEmoji">🍽️</span>
      <div class="r-name" id="resultName">--</div>
      <div class="r-cat" id="resultCat"></div>
      <div class="r-sub">就是这么决定啦～</div>
      <button class="r-close" id="resultCloseBtn">好耶！</button>
    </div>
  </div>

  <!-- 管理模态框 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">📝 管理菜单 · <span id="modalSceneName">午餐</span></div>
        <button class="modal-close" id="modalCloseBtn">✕</button>
      </div>
      <div class="menu-list" id="menuList"></div>
      <div class="modal-footer">
        <div class="icon-display" id="newIconDisplay" title="点击选择图标">🍽️</div>
        <input type="text" class="input-text" id="newName" placeholder="菜名"/>
        <select class="input-cat" id="newCategory">
          <option value="">分类</option>
        </select>
        <button class="add-btn" id="addBtn">添加</button>
      </div>
    </div>
  </div>

  <!-- Emoji 选择器弹窗 -->
  <div class="emoji-picker-overlay" id="emojiPickerOverlay">
    <div class="emoji-picker">
      <div class="emoji-picker-header">
        <div class="emoji-picker-title">🎨 选择图标</div>
        <button class="modal-close" id="emojiPickerClose">✕</button>
      </div>
      <div class="emoji-picker-grid" id="emojiPickerGrid"></div>
    </div>
  </div>

  <script>
    /* ========== 常量 & 默认数据 ========== */
    const COLOR_PALETTE = [
      ['#FF9A9E','#FFB7B2'], ['#F6D365','#FDA085'], ['#D4A5FF','#FECFEF'],
      ['#88D8E8','#B8E8F0'], ['#A8E6CF','#C8F0D8'], ['#FFDAC1','#FDA085'],
      ['#B8E8F0','#88D8E8'], ['#FFB7B2','#FF9A9E']
    ];

    const SCENES = [
      { key: 'breakfast', name: '早餐', icon: '🌅' },
      { key: 'lunch',     name: '午餐', icon: '☀️' },
      { key: 'dinner',    name: '晚餐', icon: '🌙' },
      { key: 'tea',       name: '下午茶', icon: '☕' }
    ];

    const ALL_CATEGORIES = ['中餐', '西餐', '快餐', '日料', '轻食', '甜品', '饮品'];

    // 分类 → 默认图标映射
    const CATEGORY_EMOJI = {
      '中餐': '🥢', '西餐': '🍴', '轻食': '🥗', '快餐': '🍔',
      '甜品': '🍰', '日料': '🍣', '饮品': '🥤'
    };

    // Emoji 选择器候选列表
    const EMOJI_CHOICES = '🍎🍔🍟🌭🍕🍟🍝🍜🍣🍤🍥🥮🍡🥟🍦🍧🍩🍪☕🍵🥤🧃🍺🥗🥙🌮🌯🥪🧇🧀🥓🍳🥚🍗🍖🌽🥕🥬🥦🍇🍉🍊🍋🍌🍑🍒🍈'.split(/(?<=.)/u);

    const DEFAULT_DATA = {
      breakfast: [
        { name: '豆浆油条', emoji: '🥟', category: '中餐' },
        { name: '小笼包',   emoji: '🥟', category: '中餐' },
        { name: '三明治',   emoji: '🥪', category: '西餐' },
        { name: '煎饼果子', emoji: '🥞', category: '中餐' },
        { name: '麦片牛奶', emoji: '🥛', category: '轻食' },
        { name: '松饼',     emoji: '🧇', category: '西餐' }
      ],
      lunch: [
        { name: '麻辣烫',   emoji: '🌶️', category: '中餐' },
        { name: '汉堡',     emoji: '🍔', category: '快餐' },
        { name: '披萨',     emoji: '🍕', category: '西餐' },
        { name: '拉面',     emoji: '🍜', category: '日料' },
        { name: '饺子',     emoji: '🥟', category: '中餐' },
        { name: '炒饭',     emoji: '🍚', category: '中餐' },
        { name: '轻食沙拉', emoji: '🥗', category: '轻食' },
        { name: '麻辣香锅', emoji: '🔥', category: '中餐' },
        { name: '寿司',     emoji: '🍣', category: '日料' },
        { name: '炸鸡',     emoji: '🍗', category: '快餐' }
      ],
      dinner: [
        { name: '火锅',     emoji: '🍲', category: '中餐' },
        { name: '牛排',     emoji: '🥩', category: '西餐' },
        { name: '烤肉',     emoji: '🍖', category: '中餐' },
        { name: '意大利面', emoji: '🍝', category: '西餐' },
        { name: '咖喱饭',   emoji: '🍛', category: '日料' },
        { name: '冒菜',     emoji: '🌶️', category: '中餐' },
        { name: '轻食碗',   emoji: '🥗', category: '轻食' }
      ],
      tea: [
        { name: '珍珠奶茶', emoji: '🧋', category: '饮品' },
        { name: '蛋糕',     emoji: '🍰', category: '甜品' },
        { name: '咖啡',     emoji: '☕', category: '饮品' },
        { name: '马卡龙',   emoji: '🍪', category: '甜品' },
        { name: '冰淇淋',   emoji: '🍦', category: '甜品' },
        { name: '果汁',     emoji: '🧃', category: '饮品' }
      ]
    };

    const DATA_KEY = 'foodWheelData';
    const HISTORY_KEY = 'foodWheelHistory';
    const SCENE_KEY = 'foodWheelScene';
    const cx = 200, cy = 200, r = 180;

    /* ========== 数据读写 ========== */
    function loadData() {
      const stored = localStorage.getItem(DATA_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (parsed && typeof parsed === 'object') {
            // 确保所有场景都存在
            const result = {};
            for (const s of SCENES) {
              result[s.key] = Array.isArray(parsed[s.key]) ? parsed[s.key] : (DEFAULT_DATA[s.key] || []).slice();
            }
            return result;
          }
        } catch(e) {}
      }
      // 深拷贝默认数据
      const result = {};
      for (const s of SCENES) {
        result[s.key] = (DEFAULT_DATA[s.key] || []).map(o => ({...o}));
      }
      return result;
    }

    function saveData() {
      localStorage.setItem(DATA_KEY, JSON.stringify(allData));
    }

    function loadHistory() {
      const stored = localStorage.getItem(HISTORY_KEY);
      if (stored) {
        try { return JSON.parse(stored) || []; } catch(e) {}
      }
      return [];
    }

    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function loadScene() {
      const s = localStorage.getItem(SCENE_KEY);
      return SCENES.find(x => x.key === s) ? s : 'lunch';
    }

    let allData = loadData();
    let history = loadHistory();
    let currentScene = loadScene();
    let isSpinning = false;
    let currentRotation = 0;

    /* ========== DOM 引用 ========== */
    const wheel = document.getElementById('wheel');
    const wheelInner = document.getElementById('wheelInner');
    const spinBtn = document.getElementById('spinBtn');
    const confettiContainer = document.getElementById('confetti');
    const sceneTabs = document.getElementById('sceneTabs');
    const titleText = document.getElementById('titleText');
    const categoryFilter = document.getElementById('categoryFilter');
    const historyList = document.getElementById('historyList');

    const resultOverlay = document.getElementById('resultOverlay');
    const resultEmoji = document.getElementById('resultEmoji');
    const resultName = document.getElementById('resultName');
    const resultCat = document.getElementById('resultCat');
    const resultCloseBtn = document.getElementById('resultCloseBtn');

    const modalOverlay = document.getElementById('modalOverlay');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
    const modalSceneName = document.getElementById('modalSceneName');
    const menuList = document.getElementById('menuList');
    const newIconDisplay = document.getElementById('newIconDisplay');
    const newNameInput = document.getElementById('newName');
    const newCategorySelect = document.getElementById('newCategory');
    const addBtn = document.getElementById('addBtn');
    const manageBtn = document.getElementById('manageBtn');
    const emojiPickerOverlay = document.getElementById('emojiPickerOverlay');
    const emojiPickerClose = document.getElementById('emojiPickerClose');
    const emojiPickerGrid = document.getElementById('emojiPickerGrid');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /* ========== Emoji 选择器 ========== */
    // pickerContext: { type: 'add' | 'edit', index?: number }
    let pickerContext = null;

    function openEmojiPicker(context) {
      pickerContext = context;
      renderEmojiGrid();
      emojiPickerOverlay.classList.add('active');
    }

    function closeEmojiPicker() {
      emojiPickerOverlay.classList.remove('active');
      pickerContext = null;
    }

    function renderEmojiGrid() {
      emojiPickerGrid.innerHTML = EMOJI_CHOICES.map(e =>
        `<button class="emoji-picker-item" data-emoji="${e}">${e}</button>`
      ).join('');
    }

    emojiPickerGrid.addEventListener('click', (e) => {
      const btn = e.target.closest('.emoji-picker-item');
      if (!btn) return;
      const emoji = btn.dataset.emoji;

      if (pickerContext) {
        if (pickerContext.type === 'add') {
          newIconDisplay.textContent = emoji;
        } else if (pickerContext.type === 'edit') {
          const item = menuList.querySelector(`.menu-item[data-index="${pickerContext.index}"]`);
          if (item) {
            const display = item.querySelector('[data-edit-icon-display]');
            if (display) display.textContent = emoji;
          }
        }
      }
      closeEmojiPicker();
    });

    emojiPickerClose.addEventListener('click', closeEmojiPicker);
    emojiPickerOverlay.addEventListener('click', (e) => {
      if (e.target === emojiPickerOverlay) closeEmojiPicker();
    });

    // 分类联动：选分类时自动预设图标（仅当图标还是默认值 🍽️ 时）
    newCategorySelect.addEventListener('change', () => {
      const cat = newCategorySelect.value;
      if (cat && CATEGORY_EMOJI[cat] && newIconDisplay.textContent.trim() === '🍽️') {
        newIconDisplay.textContent = CATEGORY_EMOJI[cat];
      }
    });

    // 添加区的图标点击
    newIconDisplay.addEventListener('click', () => openEmojiPicker({ type: 'add' }));

    function currentOptions() {
      return allData[currentScene] || [];
    }

    /* 获取筛选后的选项 */
    function filteredOptions() {
      const opts = currentOptions();
      const cat = categoryFilter.value;
      if (cat === 'all' || !cat) return opts;
      return opts.filter(o => (o.category || '未分类') === cat);
    }

    /* ========== 场景 Tab ========== */
    function renderSceneTabs() {
      sceneTabs.innerHTML = SCENES.map(s =>
        `<button class="scene-tab ${s.key === currentScene ? 'active' : ''}" data-scene="${s.key}">
          ${s.icon} ${s.name}
        </button>`
      ).join('');
    }

    sceneTabs.addEventListener('click', (e) => {
      const btn = e.target.closest('.scene-tab');
      if (!btn) return;
      const newScene = btn.dataset.scene;
      if (newScene === currentScene) return;
      currentScene = newScene;
      localStorage.setItem(SCENE_KEY, currentScene);
      // 切换场景时重置旋转，避免角度对应错误
      currentRotation = 0;
      wheel.style.transition = 'none';
      wheel.style.transform = 'rotate(0deg)';
      void wheel.offsetWidth;
      wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
      renderSceneTabs();
      updateTitle();
      refreshCategoryFilter();
      buildWheel();
    });

    function updateTitle() {
      const scene = SCENES.find(s => s.key === currentScene);
      titleText.textContent = (scene ? scene.name : '') + '转盘';
    }

    /* ========== 分类筛选 ========== */
    function refreshCategoryFilter() {
      const opts = currentOptions();
      const cats = ['all'];
      opts.forEach(o => {
        const c = o.category || '未分类';
        if (!cats.includes(c)) cats.push(c);
      });
      const prevVal = categoryFilter.value;
      categoryFilter.innerHTML = cats.map(c =>
        `<option value="${c}">${c === 'all' ? '全部分类' : c}</option>`
      ).join('');
      // 如果之前选的分类还存在则保留，否则重置为 all
      if (cats.includes(prevVal)) {
        categoryFilter.value = prevVal;
      } else {
        categoryFilter.value = 'all';
      }
    }

    categoryFilter.addEventListener('change', () => {
      currentRotation = 0;
      wheel.style.transition = 'none';
      wheel.style.transform = 'rotate(0deg)';
      void wheel.offsetWidth;
      wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
      buildWheel();
    });

    /* 刷新管理模态框中的分类下拉 */
    function refreshModalCategories() {
      newCategorySelect.innerHTML = '<option value="">分类</option>' +
        ALL_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    /* ========== 转盘绘制 ========== */
    function buildWheel() {
      const opts = filteredOptions();
      const numSectors = opts.length;
      if (numSectors === 0) {
        wheelInner.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#FEE4DD"/>
          <text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="18" fill="#FF9A9E">该分类下暂无选项</text>`;
        return;
      }

      const anglePerSector = 360 / numSectors;
      let svgContent = '';

      for (let i = 0; i < numSectors; i++) {
        const startAngle = -90 - anglePerSector / 2 + i * anglePerSector;
        const endAngle = startAngle + anglePerSector;
        const startRad = startAngle * Math.PI / 180;
        const endRad = endAngle * Math.PI / 180;
        const x1 = cx + r * Math.cos(startRad);
        const y1 = cy + r * Math.sin(startRad);
        const x2 = cx + r * Math.cos(endRad);
        const y2 = cy + r * Math.sin(endRad);
        const largeArc = anglePerSector > 180 ? 1 : 0;
        const gradientId = `grad${i}`;
        const colorPair = COLOR_PALETTE[i % COLOR_PALETTE.length];

        svgContent += `<defs><linearGradient id="${gradientId}" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="${colorPair[0]}"/>
          <stop offset="100%" stop-color="${colorPair[1]}"/>
        </linearGradient></defs>`;

        svgContent += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z"
          fill="url(#${gradientId})" stroke="#FFF" stroke-width="2"/>`;

        const midAngle = (startAngle + endAngle) / 2;
        const midRad = midAngle * Math.PI / 180;
        const textR = r * 0.62;
        const textX = cx + textR * Math.cos(midRad);
        const textY = cy + textR * Math.sin(midRad);
        const rotateDeg = midAngle + 90;
        const fontSize = numSectors > 12 ? 12 : (numSectors > 8 ? 14 : 17);

        svgContent += `<g transform="translate(${textX}, ${textY}) rotate(${rotateDeg})">
          <text class="sector-text" text-anchor="middle" dominant-baseline="middle">
            <tspan x="0" dy="-10" font-size="${fontSize+4}">${escapeHtml(opts[i].emoji || '🍽️')}</tspan>
            <tspan x="0" dy="${fontSize+6}" font-size="${fontSize}">${escapeHtml(opts[i].name)}</tspan>
          </text>
        </g>`;
      }

      wheelInner.innerHTML = svgContent;
    }

    /* ========== 旋转逻辑 ========== */
    spinBtn.addEventListener('click', spin);

    function spin() {
      if (isSpinning) return;
      const opts = filteredOptions();
      if (opts.length === 0) {
        alert('当前分类下没有选项，请先添加或更换筛选！');
        return;
      }

      isSpinning = true;
      spinBtn.disabled = true;
      spinBtn.textContent = '转转转...';

      const numSectors = opts.length;
      const anglePerSector = 360 / numSectors;
      const extraSpins = 5 + Math.floor(Math.random() * 5);
      const randomOffset = Math.random() * 360;
      const totalRotation = currentRotation + (extraSpins * 360) + randomOffset;
      currentRotation = totalRotation;
      wheel.style.transform = `rotate(${totalRotation}deg)`;

      setTimeout(() => {
        const normalizedRotation = ((totalRotation % 360) + 360) % 360;
        const segmentIndex = Math.floor(((360 - normalizedRotation + anglePerSector / 2) % 360) / anglePerSector) % numSectors;
        const result = opts[segmentIndex];

        // 展示大弹窗
        resultEmoji.textContent = result.emoji || '🍽️';
        resultName.textContent = result.name;
        const cat = result.category || '未分类';
        resultCat.textContent = cat;
        resultOverlay.classList.add('active');

        createConfetti();

        // 记录历史
        const sceneName = SCENES.find(s => s.key === currentScene)?.name || '';
        history.unshift({
          scene: sceneName,
          name: result.name,
          emoji: result.emoji || '🍽️',
          category: cat,
          time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
        });
        if (history.length > 5) history = history.slice(0, 5);
        saveHistory();
        renderHistory();

        spinBtn.disabled = false;
        spinBtn.textContent = '再转一次！';
        isSpinning = false;
      }, 4000);
    }

    resultCloseBtn.addEventListener('click', () => resultOverlay.classList.remove('active'));
    resultOverlay.addEventListener('click', (e) => {
      if (e.target === resultOverlay) resultOverlay.classList.remove('active');
    });

    function createConfetti() {
      confettiContainer.innerHTML = '';
      confettiContainer.classList.add('active');
      const colors = ['#FF9A9E','#FECFEF','#F6D365','#FDA085','#A8E6CF','#88D8E8','#D4A5FF','#FFD700'];
      for (let i = 0; i < 80; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = piece.style.width;
        confettiContainer.appendChild(piece);
      }
      setTimeout(() => confettiContainer.classList.remove('active'), 3500);
    }

    /* ========== 历史记录 ========== */
    function renderHistory() {
      if (history.length === 0) {
        historyList.innerHTML = '<div class="history-empty">还没有转出过结果哦～</div>';
        return;
      }
      historyList.innerHTML = history.map(h =>
        `<div class="history-item">
          <span class="h-emoji">${escapeHtml(h.emoji)}</span>
          <span class="h-name">${escapeHtml(h.name)}</span>
          <span class="h-cat">${escapeHtml(h.category || '未分类')}</span>
          <span class="h-scene">${escapeHtml(h.scene)}</span>
          <span class="h-time">${escapeHtml(h.time)}</span>
        </div>`
      ).join('');
    }

    /* ========== 管理菜单 ========== */
    manageBtn.addEventListener('click', openModal);
    modalCloseBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
    addBtn.addEventListener('click', addOption);
    newNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addOption(); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (emojiPickerOverlay.classList.contains('active')) closeEmojiPicker();
        else if (resultOverlay.classList.contains('active')) resultOverlay.classList.remove('active');
        else if (modalOverlay.classList.contains('active')) closeModal();
      }
    });

    function openModal() {
      modalSceneName.textContent = SCENES.find(s => s.key === currentScene)?.name || '';
      refreshModalCategories();
      newIconDisplay.textContent = '🍽️';
      renderMenuList();
      modalOverlay.classList.add('active');
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      // 关闭后重绘转盘（选项可能已变更）
      refreshCategoryFilter();
      currentRotation = 0;
      wheel.style.transition = 'none';
      wheel.style.transform = 'rotate(0deg)';
      void wheel.offsetWidth;
      wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
      buildWheel();
    }

    function renderMenuList() {
      const opts = currentOptions();
      if (opts.length === 0) {
        menuList.innerHTML = '<div class="empty-list">暂无菜单，快去添加吧～</div>';
        return;
      }
      menuList.innerHTML = opts.map((opt, i) => {
        const safeEmoji = escapeHtml(opt.emoji || '🍽️');
        const safeName = escapeHtml(opt.name);
        const cat = opt.category || '';
        const catClass = cat ? '' : ' unknown';
        const catText = cat || '未分类';
        return `<div class="menu-item" data-index="${i}">
          <div class="menu-item-emoji" data-view>${safeEmoji}</div>
          <div class="menu-item-name" data-view>${safeName}</div>
          <div class="menu-item-cat${catClass}" data-view>${escapeHtml(catText)}</div>
          <div class="menu-item-actions" data-view-actions>
            <button class="icon-btn edit" data-action="edit" title="编辑">✏️</button>
            <button class="icon-btn delete" data-action="delete" title="删除">🗑️</button>
          </div>
          <div data-edit style="display:none;flex:1;gap:6px;align-items:center;flex-wrap:wrap;">
            <div class="icon-display" data-edit-icon-display style="width:40px;height:40px;font-size:1.3rem;">${safeEmoji}</div>
            <input type="text" class="input-text" data-edit-name value="${safeName}" style="height:36px;font-size:.95rem;flex:1;min-width:80px;"/>
            <select class="input-cat" data-edit-cat style="width:80px;height:36px;font-size:.8rem;">
              <option value="">分类</option>
              ${ALL_CATEGORIES.map(c => `<option value="${c}" ${c===cat?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="menu-item-actions" data-edit-actions style="display:none;">
            <button class="icon-btn edit" data-action="save" title="保存">✅</button>
            <button class="icon-btn delete" data-action="cancel" title="取消">✖️</button>
          </div>
        </div>`;
      }).join('');
    }

    menuList.addEventListener('click', (e) => {
      // 点击编辑模式的图标展示区
      const iconDisplay = e.target.closest('[data-edit-icon-display]');
      if (iconDisplay) {
        const item = iconDisplay.closest('.menu-item');
        const index = parseInt(item.dataset.index, 10);
        if (!isNaN(index)) openEmojiPicker({ type: 'edit', index });
        return;
      }

      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const item = btn.closest('.menu-item');
      const index = parseInt(item.dataset.index, 10);
      const opts = currentOptions();
      if (isNaN(index) || index < 0 || index >= opts.length) return;

      if (action === 'edit') {
        enterEditMode(item);
      } else if (action === 'delete') {
        if (confirm(`确定删除 "${opts[index].name}" 吗？`)) {
          opts.splice(index, 1);
          saveData();
          renderMenuList();
        }
      } else if (action === 'save') {
        const nameInput = item.querySelector('[data-edit-name]');
        const iconDisp = item.querySelector('[data-edit-icon-display]');
        const catInput = item.querySelector('[data-edit-cat]');
        const newNameVal = nameInput.value.trim();
        if (!newNameVal) { alert('菜名不能为空'); nameInput.focus(); return; }
        opts[index].name = newNameVal;
        opts[index].emoji = iconDisp.textContent.trim() || '🍽️';
        opts[index].category = catInput.value || '';
        saveData();
        renderMenuList();
      } else if (action === 'cancel') {
        renderMenuList();
      }
    });

    // 编辑模式分类联动：选分类时自动预设图标
    menuList.addEventListener('change', (e) => {
      const catSelect = e.target.closest('[data-edit-cat]');
      if (!catSelect) return;
      const item = catSelect.closest('.menu-item');
      if (!item) return;
      const iconDisp = item.querySelector('[data-edit-icon-display]');
      if (!iconDisp) return;
      const cat = catSelect.value;
      // 仅当图标还是默认值 🍽️ 时才自动替换
      if (cat && CATEGORY_EMOJI[cat] && iconDisp.textContent.trim() === '🍽️') {
        iconDisp.textContent = CATEGORY_EMOJI[cat];
      }
    });

    menuList.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const btn = e.target.closest('.menu-item');
        if (btn) {
          const saveBtn = btn.querySelector('button[data-action="save"]');
          if (saveBtn && saveBtn.offsetParent !== null) saveBtn.click();
        }
      }
    });

    function enterEditMode(item) {
      item.querySelectorAll('[data-view], [data-view-actions]').forEach(n => n.style.display = 'none');
      item.querySelectorAll('[data-edit], [data-edit-actions]').forEach(n => n.style.display = 'flex');
      const input = item.querySelector('[data-edit-name]');
      if (input) { input.focus(); input.select(); }
    }

    function addOption() {
      const name = newNameInput.value.trim();
      if (!name) { newNameInput.focus(); return; }
      const emoji = newIconDisplay.textContent.trim() || '🍽️';
      const category = newCategorySelect.value || '';
      currentOptions().push({ name, emoji, category });
      saveData();
      newNameInput.value = '';
      newIconDisplay.textContent = '🍽️';
      newCategorySelect.value = '';
      renderMenuList();
      newNameInput.focus();
    }

    /* ========== 初始化 ========== */
    renderSceneTabs();
    updateTitle();
    refreshCategoryFilter();
    buildWheel();
    renderHistory();
  </script>
</body>
</html>
