<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>觅影 SeekPhoto - 万千影像，一觅即中</title>
<style>
/* ============ 主题变量（与真实应用完全一致） ============ */
:root {
  --bg-primary: #F8F9FA;
  --bg-secondary: #F1F3F5;
  --bg-tertiary: #E9ECEF;
  --bg-hover: #DEE2E6;
  --bg-card: #FFFFFF;
  --text-primary: #111827;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --border-color: #E5E7EB;
  --border-light: #F3F4F6;
  --accent: #3B82F6;
  --accent-hover: #2563EB;
  --accent-bg: #EFF6FF;
  --accent-purple: #8B5CF6;
  --accent-purple-bg: #F5F3FF;
  --success: #10B981;
  --success-bg: #ECFDF5;
  --warning: #F59E0B;
  --warning-bg: #FFFBEB;
  --danger: #EF4444;
  --danger-bg: #FEF2F2;
  --brand-gradient: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.07);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
  --overlay: rgba(0, 0, 0, 0.4);
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-full: 9999px;
  --transition-fast: 0.15s ease;
  --transition-normal: 0.2s ease;
  --scrollbar-thumb: rgba(128, 128, 128, 0.4);
  --scrollbar-thumb-hover: rgba(128, 128, 128, 0.7);
  --font-xs: 11px;
  --font-sm: 12px;
  --font-base: 13px;
  --font-md: 14px;
  --font-lg: 16px;
  --font-xl: 18px;
  --font-2xl: 22px;
  --font-3xl: 28px;
  --font-4xl: 36px;
  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
}

[data-theme="dark"] {
  --bg-primary: #0F1117;
  --bg-secondary: #161922;
  --bg-tertiary: #1E2231;
  --bg-hover: #282D3E;
  --bg-card: #1A1D27;
  --text-primary: #F1F5F9;
  --text-secondary: #94A3B8;
  --text-tertiary: #64748B;
  --border-color: #2D3348;
  --border-light: #232840;
  --accent: #60A5FA;
  --accent-hover: #3B82F6;
  --accent-bg: #1E3A5F;
  --accent-purple: #A78BFA;
  --accent-purple-bg: #2D1B69;
  --success: #34D399;
  --success-bg: #052E1B;
  --warning: #FBBF24;
  --warning-bg: #3D2A00;
  --danger: #F87171;
  --danger-bg: #3F1212;
  --brand-gradient: linear-gradient(135deg, #60A5FA 0%, #A78BFA 100%);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.35);
  --overlay: rgba(0, 0, 0, 0.65);
  --scrollbar-thumb: rgba(148, 163, 184, 0.3);
  --scrollbar-thumb-hover: rgba(148, 163, 184, 0.5);
}

/* ============ 基础重置 ============ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: var(--font-base);
  line-height: 1.5;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
input { font-family: inherit; }
img { display: block; }
.hidden { display: none !important; }
svg { flex-shrink: 0; }

/* 滚动条统一 */
.scroll-thin { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) transparent; }
.scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
.scroll-thin::-webkit-scrollbar-track { background: transparent; }
.scroll-thin::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
.scroll-thin::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

/* ============ 动画 ============ */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
@keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

.shimmer {
  background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease-in-out infinite;
}

/* ============ 按钮体系 ============ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-1);
  padding: var(--space-2) var(--space-4);
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  font-size: var(--font-sm); font-weight: 500; line-height: 1;
  cursor: pointer; transition: all var(--transition-fast);
  white-space: nowrap; user-select: none;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-secondary { background: transparent; border-color: var(--border-color); color: var(--text-primary); }
.btn-secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.btn-tertiary { background: transparent; color: var(--text-secondary); }
.btn-tertiary:hover:not(:disabled) { background: var(--bg-hover); color: var(--text-primary); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled) { background: #DC2626; }

/* 无障碍焦点样式 */
.btn:focus-visible,
button:focus-visible,
[role="button"]:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* 触摸设备最小目标尺寸 */
@media (pointer: coarse) {
  button, [role="button"], .nav-icon-btn, .viewer-action-btn, .sort-btn, .filter-tag {
    min-height: 44px;
    min-width: 44px;
  }
}

/* 统一关闭按钮（圆形） */
.modal-close-btn, .settings-close, .close-btn, .dialog-close-btn, .viewer-close {
  width: 32px; height: 32px;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  transition: all var(--transition-fast);
}
.modal-close-btn:hover, .settings-close:hover, .close-btn:hover,
.dialog-close-btn:hover, .viewer-close:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ============ 应用布局 ============ */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* 头部 */
.header {
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border-color);
  padding: 0 var(--space-5);
  display: flex; justify-content: space-between; align-items: center;
  height: 32px; flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: var(--space-2); }
.sidebar-toggle {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md); color: var(--text-secondary); transition: all var(--transition-fast);
}
.sidebar-toggle:hover, .sidebar-toggle.active { background: var(--bg-hover); color: var(--text-primary); }
.logo-icon {
  width: 22px; height: 22px; border-radius: var(--radius-md);
  background: var(--brand-gradient);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px;
}
.logo-text { font-size: var(--font-lg); font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
.header-right { display: flex; align-items: center; gap: var(--space-2); }
.stat-pill {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px var(--space-2);
  background: var(--bg-tertiary); border-radius: var(--radius-full);
  font-size: var(--font-xs); color: var(--text-secondary); white-space: nowrap;
}
.icon-btn {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md); color: var(--text-secondary);
  transition: all var(--transition-fast);
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* 主内容 */
.main-content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ============ 侧边栏导航 ============ */
.sidebar-nav {
  width: 64px; min-width: 64px; flex-shrink: 0;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex; flex-direction: column; align-items: center;
  padding: var(--space-2) 0; gap: var(--space-1);
  z-index: 5;
}
.nav-icon-btn {
  width: 56px; height: 56px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  background: transparent; border: none; border-radius: var(--radius-lg);
  color: var(--text-secondary); transition: all var(--transition-normal);
  position: relative;
}
.nav-icon-btn .nav-label { font-size: 10px; line-height: 1; }
.nav-icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-icon-btn.active { color: var(--accent); }
.nav-icon-btn.active::before {
  content: ''; position: absolute; left: -8px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 18px; background: var(--accent); border-radius: 0 3px 3px 0;
}
.nav-spacer { flex: 1; }

/* 侧边栏面板 */
.sidebar-panel {
  width: 0; background: var(--bg-primary);
  border-right: 1px solid var(--border-color);
  transition: width var(--transition-normal); overflow: hidden;
  flex-shrink: 0; position: relative;
  display: flex; flex-direction: column;
}
.sidebar-panel.open { width: 240px; }
.sidebar-content { display: flex; flex-direction: column; height: 100%; min-width: 240px; }
.sidebar-header {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-4); border-bottom: 1px solid var(--border-light);
  color: var(--text-primary); font-weight: 500; font-size: var(--font-md); white-space: nowrap;
}
.sidebar-header .header-count { font-size: var(--font-sm); color: var(--text-secondary); margin-left: auto; }
.header-action-btn {
  margin-left: auto; background: transparent; border: none; color: var(--accent);
  padding: var(--space-1); border-radius: var(--radius-sm);
  display: flex; align-items: center; transition: all var(--transition-fast);
}
.header-action-btn:hover { background: var(--accent-bg); }

/* 时间线 */
.timeline-list { overflow-y: auto; flex: 1; }
.timeline-year { border-bottom: 1px solid var(--border-light); }
.year-header {
  display: flex; align-items: center; gap: var(--space-1);
  padding: var(--space-3) var(--space-4); cursor: pointer; transition: background var(--transition-normal); white-space: nowrap;
}
.year-header:hover { background: var(--bg-tertiary); }
.expand-icon { transition: transform var(--transition-normal); color: var(--text-secondary); }
.expand-icon.expanded { transform: rotate(90deg); }
.year-text { font-size: var(--font-md); font-weight: 500; color: var(--text-primary); }
.month-list { background: var(--bg-tertiary); }
.month-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px var(--space-4) 10px 36px; cursor: pointer; transition: background var(--transition-normal); white-space: nowrap;
}
.month-item:hover { background: var(--bg-hover); }
.month-item.selected { background: var(--accent-bg); color: var(--accent); }
.month-text { font-size: var(--font-base); color: var(--text-primary); }
.month-item.selected .month-text { color: var(--accent); font-weight: 500; }
.month-count {
  font-size: var(--font-sm); color: var(--text-secondary);
  background: var(--bg-hover); padding: 1px var(--space-2); border-radius: 10px;
}
.month-item.selected .month-count { background: var(--accent-bg); color: var(--accent); }
.sidebar-empty { padding: var(--space-6); text-align: center; color: var(--text-secondary); font-size: var(--font-base); }
.sidebar-empty .hint { font-size: var(--font-sm); margin-top: var(--space-2); color: var(--text-tertiary); }

/* 人物列表 */
.person-actions { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border-light); display: flex; gap: var(--space-2); }
.face-action-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px var(--space-3); border-radius: var(--radius-md);
  font-size: var(--font-sm); font-weight: 500; cursor: pointer; transition: all var(--transition-fast);
  white-space: nowrap; border: 1px solid transparent; line-height: 1; height: 30px;
}
.face-action-btn.primary { flex: 1; background: var(--accent); color: #fff; border-color: var(--accent); }
.face-action-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.face-action-btn.secondary { background: transparent; color: var(--text-secondary); border-color: var(--border-color); }
.face-action-btn.secondary:hover { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border-color); }
.face-action-btn.danger { flex: 1; background: var(--danger); color: #fff; border-color: var(--danger); }
.face-action-btn.danger:hover:not(:disabled) { background: #DC2626; border-color: #DC2626; }
.face-action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.face-action-btn svg { flex-shrink: 0; }
.face-empty .face-action-btn.primary { margin: var(--space-2) auto 0; }
.progress-eta { font-size: 11px; color: var(--text-tertiary); margin-top: var(--space-1); text-align: right; }
.face-scan-progress { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-light); }
.progress-bar-container { width: 100%; height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; margin-bottom: var(--space-2); }
.progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; min-width: 2px; }
.progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-tertiary); }
.person-list { overflow-y: auto; flex: 1; }
.person-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-3) var(--space-4); cursor: pointer; transition: background var(--transition-normal);
}
.person-item:hover { background: var(--bg-tertiary); }
.person-item.selected { background: var(--accent-bg); }
.person-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg-hover); display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); flex-shrink: 0; overflow: hidden; font-size: 18px;
}
.person-item.selected .person-avatar { background: var(--accent-bg); }
.person-avatar img { width: 100%; height: 100%; object-fit: cover; }
.person-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
.person-name { font-size: var(--font-md); color: var(--text-primary); }
.person-count { font-size: var(--font-sm); color: var(--text-secondary); }

/* 标签列表 */
.tag-gen-btn {
  margin: var(--space-2) var(--space-3); width: calc(100% - 24px);
  padding: var(--space-2) var(--space-3); background: var(--bg-tertiary);
  border: 1px solid var(--border-light); border-radius: var(--radius-lg);
  color: var(--text-primary); font-size: var(--font-base); cursor: pointer; transition: all var(--transition-normal);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.tag-gen-btn:hover:not(:disabled) { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.tags-list { overflow-y: auto; flex: 1; }
.tag-item {
  display: flex; align-items: center; gap: 10px;
  padding: var(--space-2) var(--space-4); cursor: pointer; transition: background var(--transition-fast);
}
.tag-item:hover { background: var(--bg-hover); }
.tag-item-icon {
  width: 32px; height: 32px; border-radius: var(--radius-lg);
  background: var(--accent-bg); color: var(--accent);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tag-item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.tag-item-name { font-size: var(--font-base); font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag-item-count { font-size: 11px; color: var(--text-tertiary); }

/* 相册列表 */
.albums-list { display: flex; flex-direction: column; gap: 2px; padding: var(--space-2); }
.album-item {
  display: flex; align-items: center; gap: 10px;
  padding: var(--space-2) var(--space-3); border-radius: var(--radius-lg);
  cursor: pointer; transition: background var(--transition-normal);
}
.album-item:hover { background: var(--bg-hover); }
.album-cover {
  width: 40px; height: 40px; border-radius: var(--radius-md);
  overflow: hidden; flex-shrink: 0; background: var(--bg-tertiary);
  display: flex; align-items: center; justify-content: center; color: var(--accent);
}
.album-cover img { width: 100%; height: 100%; object-fit: cover; }
.album-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.album-name { font-size: var(--font-base); font-weight: 500; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.album-count { font-size: var(--font-sm); color: var(--text-tertiary); }

/* 地图侧边栏 */
.map-sidebar { padding: var(--space-6); text-align: center; color: var(--text-secondary); }
.map-placeholder {
  width: 100%; height: 120px; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, #a5d8ff 0%, #b197fc 100%);
  display: flex; align-items: center; justify-content: center; margin-bottom: var(--space-3);
  position: relative; overflow: hidden;
}
[data-theme="dark"] .map-placeholder { background: linear-gradient(135deg, #1E3A5F 0%, #2D1B69 100%); }

/* ============ 内容区 ============ */
.content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: var(--bg-secondary); }

/* 搜索框 */
.search-container { background: var(--bg-primary); padding: var(--space-2) var(--space-4) var(--space-3); flex-shrink: 0; }
.search-box {
  display: flex; gap: 0; max-width: 560px; margin: 0 auto;
  border: 1px solid var(--border-color); border-radius: var(--radius-full);
  box-shadow: var(--shadow-sm); transition: box-shadow var(--transition-normal), border-color var(--transition-normal);
  background: var(--bg-card);
}
.search-box:focus-within { box-shadow: var(--shadow-md); border-color: var(--accent); }
.search-input {
  flex: 1; padding: 10px var(--space-5); border: none;
  border-radius: var(--radius-full) 0 0 var(--radius-full);
  font-size: var(--font-md); outline: none; background: transparent; color: var(--text-primary);
}
.search-input::placeholder { color: var(--text-tertiary); }
.clear-btn { background: transparent; border: none; color: var(--text-secondary); padding: var(--space-2); display: flex; align-items: center; }
.clear-btn:hover { color: var(--text-primary); }
.search-btn {
  background: transparent; border: none; color: var(--text-secondary);
  padding: var(--space-2) var(--space-4);
  border-radius: 0 var(--radius-full) var(--radius-full) 0;
  display: flex; align-items: center; transition: color var(--transition-normal);
}
.search-btn:hover { color: var(--accent); }
.search-btn:disabled { color: var(--text-tertiary); }
.loading-spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border-light); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block;
}

/* 快捷标签 */
.quick-tags { display: flex; align-items: center; justify-content: center; gap: var(--space-2); margin: var(--space-2) auto 0; flex-wrap: wrap; max-width: 100%; }
.tag-label { font-size: var(--font-sm); color: var(--text-tertiary); }
.quick-tag {
  font-size: var(--font-sm); padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full); background: var(--bg-tertiary); color: var(--text-secondary);
  cursor: pointer; transition: all var(--transition-fast); white-space: nowrap;
}
.quick-tag:hover { background: var(--accent-bg); color: var(--accent); }

/* 加载骨架屏 */
.loading { padding: var(--space-5); }
.skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--space-3); max-width: 1200px; margin: 0 auto; }
.skeleton-card { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
.skeleton-img { width: 100%; aspect-ratio: 4/3; }
.skeleton-line { height: 12px; margin: var(--space-2) var(--space-3); border-radius: var(--radius-sm); }

/* 空状态/欢迎 */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px var(--space-5); text-align: center; flex: 1; }
.empty-icon {
  width: 96px; height: 96px; border-radius: 50%;
  background: var(--accent-bg); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; margin-bottom: var(--space-4); position: relative;
}
.empty-icon::before {
  content: ''; position: absolute; inset: -8px;
  border-radius: 50%; border: 1px dashed var(--accent);
  animation: emptyPulse 3s ease-in-out infinite;
}
@keyframes emptyPulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.05); }
}
.empty-state h3 { font-size: var(--font-xl); font-weight: 600; color: var(--text-primary); margin-bottom: var(--space-2); }
.empty-desc { font-size: var(--font-md); color: var(--text-secondary); margin-bottom: var(--space-5); }
.empty-features { display: flex; gap: var(--space-5); flex-wrap: wrap; justify-content: center; margin-bottom: var(--space-6); }
.feature { display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-sm); color: var(--text-secondary); }
.feature-icon { color: var(--accent); display: flex; }
.cta-button {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-3) var(--space-5); background: var(--accent);
  color: #fff; border: none; border-radius: var(--radius-lg);
  font-size: var(--font-md); font-weight: 500; cursor: pointer; transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}
.cta-button:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.empty-hint { margin-top: var(--space-3); font-size: var(--font-sm); color: var(--text-tertiary); }
.no-results { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; text-align: center; flex: 1; }
.no-results-icon { color: var(--text-tertiary); margin-bottom: var(--space-4); display: flex; }
.no-results-text { font-size: var(--font-lg); font-weight: 500; color: var(--text-primary); margin-bottom: var(--space-3); }
.no-results-hint { color: var(--text-secondary); font-size: var(--font-sm); }
.search-tips { display: flex; flex-direction: column; gap: var(--space-2); margin-top: var(--space-3); }
.tip { display: flex; align-items: center; gap: var(--space-2); }

/* 结果容器 */
.results-container { flex: 1; overflow-y: auto; padding: 0 var(--space-4) var(--space-4); }
.results-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--space-3) var(--space-1); flex-wrap: wrap; gap: var(--space-2);
  position: sticky; top: 0; z-index: 10; background: var(--bg-primary);
}
.results-stats { font-size: var(--font-sm); color: var(--text-secondary); }
.selection-info { color: var(--accent); font-weight: 500; }
.results-actions { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
.selection-toggle-btn, .batch-action-btn, .sort-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px var(--space-3); border-radius: var(--radius-md);
  background: var(--bg-tertiary); border: 1px solid var(--border-light);
  color: var(--text-secondary); font-size: var(--font-sm); cursor: pointer; transition: all var(--transition-fast);
}
.selection-toggle-btn:hover, .batch-action-btn:hover, .sort-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.selection-toggle-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
.batch-action-btn.danger { color: var(--danger); border-color: var(--danger); }
.batch-action-btn.danger:hover { background: rgba(239,68,68,0.1); }
.sort-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
.filter-toggle-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
.sort-label { font-size: var(--font-sm); color: var(--text-tertiary); margin-left: var(--space-1); }
.view-switcher { display: flex; border: 1px solid var(--border-light); border-radius: var(--radius-md); overflow: hidden; }
.view-btn {
  padding: var(--space-1); display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); transition: all var(--transition-fast);
}
.view-btn:hover { color: var(--text-primary); }
.view-btn.active { background: var(--accent-bg); color: var(--accent); }

/* 筛选面板 */
.filter-panel {
  background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg);
  padding: var(--space-4); margin-bottom: var(--space-3); box-shadow: var(--shadow-sm);
  animation: fadeIn var(--transition-normal);
  position: sticky; top: 36px; z-index: 9;
}
.filter-sections { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: var(--space-6); }
.filter-section { min-width: 180px; }
.filter-section-title { font-size: var(--font-sm); font-weight: 600; color: var(--text-primary); margin-bottom: var(--space-2); }
.filter-tags { display: flex; flex-wrap: wrap; gap: var(--space-2); }
.filter-tag { font-size: var(--font-sm); padding: 4px var(--space-3); border-radius: var(--radius-full); background: var(--bg-tertiary); color: var(--text-secondary); cursor: pointer; transition: all var(--transition-fast); }
.filter-tag.active { background: var(--accent); color: #fff; }
.filter-group { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-2); }
.filter-label { font-size: var(--font-sm); color: var(--text-secondary); }
.filter-range { width: 120px; }
.filter-date { padding: 4px var(--space-2); border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-primary); color: var(--text-primary); font-size: var(--font-sm); }
.filter-switch { position: relative; width: 36px; height: 20px; background: var(--bg-tertiary); border-radius: 10px; cursor: pointer; transition: background var(--transition-fast); }
.filter-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform var(--transition-fast); box-shadow: var(--shadow-sm); }
.filter-switch.active { background: var(--accent); }
.filter-switch.active::after { transform: translateX(16px); }
.filter-reset-btn { margin-top: var(--space-2); padding: 4px var(--space-3); background: transparent; border: 1px solid var(--border-color); border-radius: var(--radius-sm); color: var(--text-secondary); font-size: var(--font-sm); cursor: pointer; }
.filter-reset-btn:hover { color: var(--accent); border-color: var(--accent); }

/* 结果网格 */
.results-grid { display: grid; gap: var(--space-1); max-width: 1400px; margin: 0 auto; }
.results-grid.view-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
.results-grid.view-list { grid-template-columns: 1fr; }
.results-grid.view-waterfall { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); align-items: start; }
.result-card {
  background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden;
  cursor: pointer; transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  position: relative; animation: fadeIn 0.3s ease both;
}
.result-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.result-card.card-selected { outline: 2px solid var(--accent); outline-offset: -2px; }
.card-image { position: relative; width: 100%; aspect-ratio: 1; background: var(--bg-tertiary); overflow: hidden; }
.card-image img { width: 100%; height: 100%; object-fit: cover; }
.card-similarity {
  position: absolute; bottom: var(--space-1); left: var(--space-1);
  background: rgba(0,0,0,0.65); color: #fff; font-size: 11px; font-weight: 600;
  padding: 2px var(--space-2); border-radius: var(--radius-full); backdrop-filter: blur(4px);
}
.card-fav-btn {
  position: absolute; top: var(--space-2); right: var(--space-2);
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.9);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all var(--transition-fast); backdrop-filter: blur(4px);
}
.result-card:hover .card-fav-btn { opacity: 1; }
.card-fav-btn.active { opacity: 1; color: var(--warning); }
.card-fav-btn:hover { background: rgba(0,0,0,0.6); }
.card-info { padding: var(--space-2) var(--space-3); }
.card-name { font-size: var(--font-sm); color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.card-tags { display: flex; gap: var(--space-1); margin-bottom: 2px; }
.card-tag { font-size: 11px; background: var(--accent-bg); color: var(--accent); padding: 1px var(--space-1); border-radius: var(--radius-sm); }
.card-tag-more { font-size: 11px; color: var(--text-tertiary); }
.card-meta { display: flex; gap: var(--space-2); font-size: 11px; color: var(--text-tertiary); flex-wrap: wrap; opacity: 0; transition: opacity var(--transition-fast); }
.result-card:hover .card-meta { opacity: 1; }
.meta-item { display: inline-flex; align-items: center; gap: 2px; }

/* 列表视图 */
.results-grid.view-list .result-card { display: flex; }
.results-grid.view-list .card-image { width: 160px; flex-shrink: 0; aspect-ratio: 4/3; }
.results-grid.view-list .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
/* 瀑布流视图 */
.results-grid.view-waterfall .card-image { aspect-ratio: auto; }
.results-grid.view-waterfall .card-image img { height: auto; }

/* 回到顶部 */
.scroll-top-btn {
  position: fixed; bottom: 64px; right: var(--space-5);
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg-card); border: 1px solid var(--border-color);
  box-shadow: var(--shadow-md); color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center; z-index: 50;
  transition: all var(--transition-fast);
}
.scroll-top-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ============ 图片查看器 ============ */
.viewer-overlay {
  position: fixed; inset: 0; background: #0a0a0a; z-index: 1000;
  display: flex; flex-direction: column; animation: overlayIn 0.2s ease;
}
.viewer-top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--space-1); z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
}
.viewer-zoom-controls {
  display: flex; align-items: center; gap: var(--space-1);
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-full); padding: 1px var(--space-1); backdrop-filter: blur(12px);
}
.viewer-zoom-btn {
  background: transparent; border: none; color: rgba(255,255,255,0.9);
  width: 28px; height: 28px; padding: 0; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast);
}
.viewer-zoom-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
.viewer-zoom-level {
  color: rgba(255,255,255,0.9); font-size: var(--font-sm); min-width: 40px; text-align: center;
  cursor: pointer; padding: 2px var(--space-1); border-radius: var(--radius-full); transition: all var(--transition-fast);
}
.viewer-zoom-level:hover { background: rgba(255,255,255,0.15); }
.viewer-actions { display: flex; align-items: center; gap: var(--space-1); }
.viewer-action-btn {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.9);
  padding: 1px var(--space-1); border-radius: var(--radius-full);
  font-size: var(--font-sm); transition: all var(--transition-fast);
  backdrop-filter: blur(12px);
}
.viewer-action-btn:hover { background: rgba(255,255,255,0.15); }
.viewer-action-btn:active { transform: scale(0.95); }
.viewer-action-btn.active { color: var(--accent); background: var(--accent-bg); border-color: var(--accent); }
.viewer-action-btn:disabled { opacity: 0.5; }
.viewer-close {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.9);
  width: 32px; height: 32px; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast);
  backdrop-filter: blur(12px);
}
.viewer-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
.viewer-more-wrapper { position: relative; }
.viewer-more-menu {
  position: absolute; top: 100%; right: 0; margin-top: 4px;
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: var(--radius-lg); padding: var(--space-1); min-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: fadeIn var(--transition-fast); z-index: 20;
}
.more-menu-item {
  display: flex; align-items: center; gap: var(--space-2); width: 100%;
  padding: 8px var(--space-3); background: transparent; border: none;
  color: var(--text-primary); font-size: var(--font-sm); text-align: left; border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
}
.more-menu-item:hover { background: var(--accent-bg); color: var(--accent); }
.more-menu-item.danger { color: var(--danger); }
.more-menu-item.danger:hover { background: var(--danger-bg); color: var(--danger); }
.more-menu-divider { height: 1px; background: var(--border-light); margin: var(--space-1) 0; }

.viewer-body { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.viewer-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: var(--radius-full);
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.8);
  display: flex; align-items: center; justify-content: center; z-index: 5;
  transition: all var(--transition-fast); backdrop-filter: blur(12px);
}
.viewer-nav:hover { background: rgba(255,255,255,0.15); color: #fff; }
.viewer-prev { left: var(--space-1); }
.viewer-next { right: var(--space-1); }
.viewer-content { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.viewer-content.dragging { cursor: grabbing; }
.viewer-image {
  width: 100%; height: 100%; object-fit: contain;
  user-select: none; pointer-events: none;
  transition: transform var(--transition-fast);
}
.viewer-content.dragging .viewer-image { transition: none; }

/* 底部信息栏 */
.viewer-info {
  position: absolute; bottom: 36px; left: 0; right: 0;
  padding: var(--space-2) var(--space-5);
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  z-index: 10;
}
.viewer-tags { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-1); }
.viewer-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.12); color: #fff;
  padding: 2px var(--space-2); border-radius: var(--radius-full);
  font-size: 11px; backdrop-filter: blur(8px);
}
.viewer-tag-remove { background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.viewer-tag-remove:hover { color: #fff; }
.viewer-tag-add {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(255,255,255,0.12); color: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.viewer-tag-add:hover { background: var(--accent); }
.viewer-meta { display: flex; align-items: center; gap: var(--space-4); color: rgba(255,255,255,0.85); font-size: var(--font-sm); flex-wrap: wrap; }
.viewer-meta-item { display: inline-flex; align-items: center; gap: 4px; }
.viewer-filename { font-weight: 500; }
.viewer-counter { margin-left: auto; color: rgba(255,255,255,0.6); }

/* 胶片条 */
.viewer-filmstrip {
  height: 56px; background: rgba(0,0,0,0.5); display: flex; align-items: center;
  padding: 0 var(--space-2); overflow-x: auto; overflow-y: hidden; gap: 4px;
  flex-shrink: 0; backdrop-filter: blur(8px);
}
.filmstrip-item {
  width: 40px; height: 40px; flex-shrink: 0; border-radius: var(--radius-sm);
  overflow: hidden; cursor: pointer; opacity: 0.5; transition: all var(--transition-fast);
  border: 2px solid transparent;
}
.filmstrip-item:hover { opacity: 0.8; }
.filmstrip-item.active { opacity: 1; border-color: var(--accent); }
.filmstrip-item img { width: 100%; height: 100%; object-fit: cover; }

/* ============ 弹窗对话框 ============ */
.modal-overlay {
  position: fixed; inset: 0; background: var(--overlay);
  display: flex; align-items: center; justify-content: center; z-index: 2000;
  animation: overlayIn 0.2s ease; padding: var(--space-5);
}
.dialog-card {
  background: var(--bg-card); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg); width: 100%; max-width: 480px; max-height: 85vh;
  display: flex; flex-direction: column; overflow: hidden; animation: modalIn 0.2s ease;
}
.modal-header, .settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-5) var(--space-6); border-bottom: 1px solid var(--border-color); flex-shrink: 0;
}
.modal-header h2, .modal-header h3, .settings-header h2 { font-size: var(--font-lg); font-weight: 600; color: var(--text-primary); }
.dialog-close-btn {
  background: transparent; border: none; color: var(--text-secondary);
  width: 32px; height: 32px; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast);
}
.dialog-close-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.modal-body { padding: var(--space-5) var(--space-6); overflow-y: auto; flex: 1; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: var(--space-2);
  padding: var(--space-4) var(--space-6); border-top: 1px solid var(--border-light); flex-shrink: 0;
}

/* 信息面板 */
.info-panel { max-width: 420px; }
.info-row { display: flex; justify-content: space-between; padding: var(--space-2) 0; border-bottom: 1px solid var(--border-light); font-size: var(--font-sm); }
.info-label { color: var(--text-secondary); }
.info-value { color: var(--text-primary); font-weight: 500; text-align: right; word-break: break-all; }
.info-thumb { width: 100%; aspect-ratio: 4/3; border-radius: var(--radius-lg); object-fit: cover; margin-bottom: var(--space-4); background: var(--bg-tertiary); }

/* 标签编辑 */
.tag-input-row { display: flex; gap: var(--space-2); margin-bottom: var(--space-3); }
.tag-input { flex: 1; padding: var(--space-2) var(--space-3); border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-size: var(--font-sm); outline: none; }
.tag-input:focus { border-color: var(--accent); }
.tag-chips { display: flex; flex-wrap: wrap; gap: var(--space-2); }
.tag-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px var(--space-3); background: var(--accent-bg); color: var(--accent);
  border-radius: var(--radius-full); font-size: var(--font-sm);
}
.tag-chip-remove { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }
.tag-chip-remove:hover { color: var(--danger); }
.tag-current { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
.tag-suggest { display: flex; flex-wrap: wrap; gap: 6px; }
.suggest-tag {
  padding: 4px 10px; background: var(--bg-secondary); color: var(--text-secondary);
  border: 1px solid var(--border-color); border-radius: var(--radius-full);
  font-size: var(--font-sm); cursor: pointer; transition: all var(--transition-fast);
}
.suggest-tag:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

/* 相册选择列表 */
.album-select-list { display: flex; flex-direction: column; gap: var(--space-1); }
.album-select-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-3); border: 1px solid var(--border-color); border-radius: var(--radius-md);
  cursor: pointer; transition: all var(--transition-fast);
}
.album-select-item:hover { border-color: var(--accent); background: var(--accent-bg); }

/* ============ 右键菜单 ============ */
.context-menu {
  position: fixed; background: var(--bg-primary); border: 1px solid var(--border-color);
  border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  z-index: 3000; min-width: 180px; padding: 6px; overflow: hidden;
  animation: fadeIn 0.1s ease;
}
.context-item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 10px 14px; background: transparent; border: none; border-radius: 6px;
  color: var(--text-primary); font-size: var(--font-base); text-align: left; transition: all var(--transition-fast);
  white-space: nowrap;
}
.context-item svg { color: var(--text-secondary); }
.context-item:hover { background: var(--bg-hover); }
.context-item.context-item-danger { color: var(--danger); }
.context-item.context-item-danger:hover { background: var(--danger-bg); }
.context-divider { height: 1px; background: var(--border-light); margin: 4px 8px; }

/* ============ Toast ============ */
.toast-container { position: fixed; bottom: var(--space-5); left: 50%; transform: translateX(-50%); z-index: 4000; display: flex; flex-direction: column; gap: var(--space-2); align-items: center; }
.toast {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-3) var(--space-4); border-radius: var(--radius-md);
  background: var(--bg-card); border: 1px solid var(--border-color);
  box-shadow: var(--shadow-lg); font-size: var(--font-sm); color: var(--text-primary);
  backdrop-filter: blur(8px); animation: toastIn 0.25s ease; max-width: 360px;
}
.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }
.toast-icon { display: flex; }

/* ============ 设置面板 ============ */

/* 步骤式操作流程 */
.setup-steps { display: flex; flex-direction: column; gap: 0; margin-top: var(--space-4); }

.legal-links a:hover { text-decoration: underline; }

/* 主题切换按钮 */
.theme-toggle { position: relative; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-md); color: var(--text-secondary); transition: all var(--transition-fast); }
.theme-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }

/* 移动端 */
@media (max-width: 768px) {
  .header { height: 40px; padding: 0 var(--space-3); }
  .logo-text { display: none; }
  .stat-pill { display: none; }
  .results-grid.view-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .sidebar-panel.open { position: fixed; top: 40px; left: 64px; bottom: 0; z-index: 500; box-shadow: var(--shadow-lg); }
}
</style>

  </svg>`;
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

/* ============ 头像 SVG 生成 ============ */
function generateAvatarSvg(name) {
  const colors = ['#3B82F6','#8B5CF6','#10B981','#F59E0B','#EF4444'];
  const idx = name.charCodeAt(0) % colors.length;
  const color = colors[idx];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
    <rect width="80" height="80" fill="${color}"/>
    <text x="40" y="50" text-anchor="middle" font-size="32" fill="#fff">${name[0]}</text>
  </svg>`;
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

const CAMERAS = ['iPhone 15 Pro', 'Canon EOS R6', 'Sony A7M4', 'Huawei P60', 'Nikon Z6 II'];
const LOCATIONS = ['三亚·亚龙湾','上海·外滩','北京·故宫','杭州·西湖','成都·宽窄巷子','厦门·鼓浪屿','云南·大理','青岛·栈桥'];

// 生成 30 张照片

const months2024 = ['2024-01','2024-02','2024-03','2024-04','2024-05','2024-06'];
const months2023 = ['2023-10','2023-11','2023-12'];
for (let i = 0; i < 30; i++) {
  // 日期分布：前 18 张在 2024，后 12 张在 2023
  const ym = i < 18 ? months2024[i % months2024.length] : months2023[i % months2023.length];
  const [y, m] = ym.split('-');
  const day = ((i * 7) % 27) + 1;
  const tags = [];
  while (tags.length < 2) {
    const t = TAG_POOL[(i * 3 + tags.length * 5) % TAG_POOL.length];
    if (!tags.includes(t)) tags.push(t);
  }
  photos.push({
    id: i,
    src: generatePhotoSvg(i),
    name: `IMG_${1000 + i}.jpg`,
    similarity: i === 0 ? 1 : (0.95 - (i * 0.018) + Math.random() * 0.02),
    date: `${y}-${m}-${String(day).padStart(2,'0')}`,
    camera: CAMERAS[i % CAMERAS.length],
    location: LOCATIONS[i % LOCATIONS.length],
    tags,
    width: [4000, 3000, 4032, 3840][i % 4],
    height: [3000, 4000, 3024, 2160][i % 4],

/* 时间线 */
function buildTimeline() {
  const tl = {};
  photos.forEach(p => {
    const [y, m] = p.date.split('-');
    if (!tl[y]) tl[y] = {};
    tl[y][m] = (tl[y][m] || 0) + 1;
  });
  return Object.keys(tl).sort((a,b) => +b - +a).map(y => ({
    year: y,
    months: Object.entries(tl[y]).sort((a,b) => +b[0] - +a[0]).map(([m,c]) => ({ month: m, count: c }))
  }));
}
function renderTimeline() {
  const tl = buildTimeline();
  const monthNames = {'01':'1月','02':'2月','03':'3月','04':'4月','05':'5月','06':'6月','07':'7月','08':'8月','09':'9月','10':'10月','11':'11月','12':'12月'};
  let html = `<div class="sidebar-header"><span>按时间</span>
    <button class="header-action-btn" onclick="toggleAllYears()" title="全部展开/收起">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
    </button></div><div class="timeline-list scroll-thin">`;
  tl.forEach(item => {
    const expanded = state.expandedYears.has(item.year);
    html += `<div class="timeline-year">
      <div class="year-header" onclick="toggleYear('${item.year}')">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" class="expand-icon ${expanded ? 'expanded' : ''}"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        <span class="year-text">${item.year}年</span>
      </div>`;
    if (expanded) {
      html += '<div class="month-list">';
      item.months.forEach(m => {
        const key = `${item.year}-${m.month}`;
        const sel = state.selectedYearMonth === key;
        html += `<div class="month-item ${sel ? 'selected' : ''}" onclick="selectMonth('${item.year}','${m.month}')">
          <span class="month-text">${monthNames[m.month]}</span>
          <span class="month-count">${m.count}</span></div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  sidebarContent.innerHTML = html;
}
function toggleYear(year) {
  if (state.expandedYears.has(year)) state.expandedYears.delete(year);
  else state.expandedYears.add(year);
  renderTimeline();
}
function toggleAllYears() {
  const tl = buildTimeline();
  if (state.expandedYears.size >= tl.length) state.expandedYears.clear();
  else state.expandedYears = new Set(tl.map(t => t.year));
  renderTimeline();
}
function selectMonth(year, month) {

  }

}

function performSearch() {
  const q = state.searchQuery.trim().toLowerCase();
  state.filterMode = { type: 'keyword', keyword: q };

}

function doSearch() {
  // 显示骨架屏
  state.isLoading = true;
  state.hasSearched = true;
  renderMain();
  setTimeout(() => {
    const mode = state.filterMode || { type: 'keyword', keyword: '' };
    let res = [];
    if (mode.type === 'month') {
      res = photos.filter(p => p.date.startsWith(`${mode.year}-${mode.month}`));
    } else if (mode.type === 'person') {
      res = photos.filter(p => p.personId === mode.personId);
    } else if (mode.type === 'tag') {
      res = photos.filter(p => p.tags.includes(mode.tag));
    } else if (mode.type === 'album') {
      const a = albums.find(x => x.id === mode.albumId);
      res = a ? photos.filter(p => a.photos.includes(p.id)) : [];
    } else if (mode.type === 'favorites') {
      res = photos.filter(p => p.favorite);
    } else if (mode.type === 'similar') {
      // 相似搜索：基于参考照片的标签
      const ref = photos.find(p => p.id === mode.refId);
      res = photos.filter(p => {
        if (p.id === mode.refId) return false;
        const overlap = p.tags.filter(t => ref.tags.includes(t)).length;
        return overlap > 0;
      }).sort((a,b) => {
        const oa = a.tags.filter(t => ref.tags.includes(t)).length;
        const ob = b.tags.filter(t => ref.tags.includes(t)).length;
        return ob - oa;
      }).slice(0, 12);
      res.unshift(ref);
    } else {
      // 关键词搜索：匹配标签或文件名
      const kw = (mode.keyword || '').toLowerCase();
      if (!kw) res = photos.slice();
      else res = photos.filter(p =>
        p.tags.some(t => t.toLowerCase().includes(kw)) ||
        p.name.toLowerCase().includes(kw) ||
        (p.location && p.location.toLowerCase().includes(kw)) ||
        persons[p.personId].name.toLowerCase().includes(kw)
      );
    }
    // 赋予相似度排序
    res = res.map((p, i) => ({ ...p, similarity: i === 0 && mode.type !== 'similar' ? 1 : Math.max(0.5, 0.98 - i * 0.015) }));
    state.results = res;
    state.filteredResults = applySortAndFilter(res);
    state.isLoading = false;
    updateStats();
    renderMain();
  }, 600);
}

function applySortAndFilter(list) {
  let r = list.slice();
  // 筛选
  if (state.filterFavoriteOnly) r = r.filter(p => p.favorite);
  if (state.filterTags.length > 0) r = r.filter(p => state.filterTags.some(t => p.tags.includes(t)));
  if (state.filterMinSimilarity > 0) r = r.filter(p => p.similarity * 100 >= state.filterMinSimilarity);
  // 排序
  r.sort((a, b) => {
    let v = 0;
    if (state.sortField === 'similarity') v = b.similarity - a.similarity;
    else if (state.sortField === 'date') v = new Date(b.date) - new Date(a.date);
    else if (state.sortField === 'name') v = a.name.localeCompare(b.name);
    return state.sortAsc ? -v : v;
  });
  return r;
}

function toggleSort(field) {
  if (state.sortField === field) state.sortAsc = !state.sortAsc;
  else { state.sortField = field; state.sortAsc = false; }
  state.filteredResults = applySortAndFilter(state.results);
  renderMain();
}

function clearSearch() {
  state.searchQuery = '';
  state.filterMode = null;
  state.hasSearched = false;
  state.results = [];
  state.filteredResults = [];
  state.selectedYearMonth = null;
  state.selectedPerson = null;
  searchInput.value = '';
  renderMain();
  if (state.sidebarTab === 'timeline') renderTimeline();
  if (state.sidebarTab === 'persons') renderPersons();
}

/* ============ 主视图渲染 ============ */
function renderMain() {
  // 更新清空按钮
  clearBtn.classList.toggle('hidden', !state.searchQuery);
  searchBtn.disabled = state.isLoading;
  searchBtn.innerHTML = state.isLoading
    ? '<span class="loading-spinner"></span>'
    : '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>';

  // 骨架屏
  if (state.isLoading) {
    let html = '<div class="loading"><div class="skeleton-grid">';
    for (let i = 0; i < 9; i++) {
      html += `<div class="skeleton-card"><div class="skeleton-img shimmer"></div><div class="skeleton-line shimmer" style="width:60%"></div><div class="skeleton-line shimmer" style="width:40%"></div></div>`;
    }
    html += '</div></div>';
    mainView.innerHTML = html;
    mainView.scrollTop = 0;
    return;
  }

  // 空状态：未搜索
  if (!state.hasSearched) {
    mainView.innerHTML = `<div class="empty-state">
      <div class="empty-icon" style="color:var(--accent)">✨</div>
      <h3>${photos.length} 张照片已就绪</h3>
      <p class="empty-desc">试试用自然语言搜索你的照片</p>
      <div class="empty-features">
        <div class="feature"><span class="feature-icon">${ICONS.search}</span><span>自然语言："海边的日落"</span></div>
        <div class="feature"><span class="feature-icon">${ICONS.users}</span><span>人物："宝宝的笑容"</span></div>
        <div class="feature"><span class="feature-icon">${ICONS.calendar}</span><span>时间："2023年春节"</span></div>
      </div>
      <p class="empty-hint">在上方搜索框输入关键词，或点击左侧时间线浏览</p>
    </div>`;
    return;
  }

  // 无结果
  if (state.filteredResults.length === 0) {
    mainView.innerHTML = `<div class="no-results">
      <div class="no-results-icon">${ICONS.search.replace('width="16"','width="48"').replace('height="16"','height="48"')}</div>
      <div class="no-results-text">未找到相关照片</div>
      <div class="no-results-hint"><p>试试这些搜索方式：</p>
        <div class="search-tips">
          <span class="tip">${ICONS.search} 自然语言："海边的日落"</span>
          <span class="tip">${ICONS.users} 人物："宝宝的笑容"</span>
          <span class="tip">${ICONS.calendar} 时间："2023年春节"</span>
        </div></div>
    </div>`;
    return;
  }

  // 结果列表
  const list = state.filteredResults;
  let html = '<div class="results-header">' +
    `<div class="results-stats">找到 ${list.length} 张相关照片${state.selectedPhotos.size > 0 ? `<span class="selection-info">（已选 ${state.selectedPhotos.size} 张）</span>` : ''}</div>` +
    '<div class="results-actions">' +
      `<button class="selection-toggle-btn ${state.selectionMode ? 'active' : ''}" onclick="toggleSelectionMode()">${ICONS.tag}${state.selectionMode ? '取消选择' : '多选'}</button>` +
      (state.selectionMode && state.selectedPhotos.size > 0 ? `
        <button class="batch-action-btn danger" onclick="batchDelete()">删除 (${state.selectedPhotos.size})</button>
        <button class="batch-action-btn" onclick="batchAddToAlbum()">添加到相册</button>` : '') +
      `<div class="view-switcher">
        <button class="view-btn ${state.viewMode==='grid'?'active':''}" onclick="setViewMode('grid')" title="网格视图"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8z"/></svg></button>
        <button class="view-btn ${state.viewMode==='list'?'active':''}" onclick="setViewMode('list')" title="列表视图"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></button>
        <button class="view-btn ${state.viewMode==='waterfall'?'active':''}" onclick="setViewMode('waterfall')" title="瀑布流视图"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M2 2h4v8H2V2zm6 0h4v12H8V2zm6 0h4v6h-4V2zm6 0h4v14h-4V2zM2 12h4v10H2V12zm14 4h4v6h-4v-6z"/></svg></button>
      </div>` +
      `<button class="sort-btn filter-toggle-btn ${state.filterPanelOpen?'active':''}" onclick="toggleFilterPanel()"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>筛选</button>` +
      '<span class="sort-label">排序：</span>' +
      `<button class="sort-btn ${state.sortField==='similarity'?'active':''}" onclick="toggleSort('similarity')">相似度 ${state.sortField==='similarity'?(state.sortAsc?'↑':'↓'):''}</button>` +
      `<button class="sort-btn ${state.sortField==='date'?'active':''}" onclick="toggleSort('date')">日期 ${state.sortField==='date'?(state.sortAsc?'↑':'↓'):''}</button>` +
      `<button class="sort-btn ${state.sortField==='name'?'active':''}" onclick="toggleSort('name')">名称 ${state.sortField==='name'?(state.sortAsc?'↑':'↓'):''}</button>` +
    '</div></div>';

  // 筛选面板
  if (state.filterPanelOpen) {
    const tags = getAllTags();
    html += '<div class="filter-panel"><div class="filter-sections">';
    if (tags.length > 0) {
      html += '<div class="filter-section"><div class="filter-section-title">标签</div><div class="filter-tags">';
      tags.forEach(t => {
        const active = state.filterTags.includes(t.name);
        html += `<span class="filter-tag ${active?'active':''}" onclick="toggleFilterTag('${t.name}')">${t.name}</span>`;
      });
      html += '</div></div>';
    }
    html += `<div class="filter-section"><div class="filter-section-title">属性</div>
      <div class="filter-group"><span class="filter-label">仅收藏</span>
        <label style="cursor:pointer"><input type="checkbox" ${state.filterFavoriteOnly?'checked':''} onchange="state.filterFavoriteOnly=this.checked;rerenderFilter()"> 收藏</label></div>
      <div class="filter-group"><span class="filter-label">最低相似度：${state.filterMinSimilarity}%</span>
        <input type="range" min="0" max="100" step="5" value="${state.filterMinSimilarity}" class="filter-range" oninput="state.filterMinSimilarity=+this.value;rerenderFilter()"></div></div>`;
    html += '</div></div>';
  }

  // 结果网格
  html += `<div class="results-grid view-${state.viewMode}">`;
  list.forEach(p => {
    const sel = state.selectedPhotos.has(p.id);
    const fav = p.favorite;
    const simPct = p.similarity < 1 ? Math.round(p.similarity * 100) + '%' : '';
    const tagsHtml = p.tags.slice(0, 2).join(' · ') + (p.tags.length > 2 ? `<span class="card-tag-more">+${p.tags.length-2}</span>` : '');
    const styleAttr = state.viewMode === 'waterfall' ? `style="aspect-ratio:${p.width}/${p.height}"` : '';
    html += `<div class="result-card ${sel?'card-selected':''}" data-id="${p.id}" onclick="onCardClick(event, ${p.id})" oncontextmenu="onCardContext(event, ${p.id})">
      ${state.selectionMode ? `<div class="card-checkbox" style="position:absolute;top:8px;left:8px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:2;color:#fff">
        ${sel ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
      </div>` : ''}
      <div class="card-image" ${styleAttr}>
        <img src="${p.src}" alt="${p.name}" loading="lazy">
        ${simPct ? `<div class="card-similarity">${simPct}</div>` : ''}
        <button class="card-fav-btn ${fav?'active':''}" onclick="event.stopPropagation();toggleFavorite(${p.id})" title="${fav?'取消收藏':'收藏'}">
          ${fav ? ICONS.star : ICONS.starOutline}
        </button>
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        ${tagsHtml ? `<div class="card-tags"><span class="card-tag">${tagsHtml}</span></div>` : ''}
        <div class="card-meta">
          ${p.location ? `<span class="meta-item">${ICONS.pin}${p.location}</span>` : ''}
          <span class="meta-item">${ICONS.calendar}${p.date}</span>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  mainView.innerHTML = html;
}

function setViewMode(mode) { state.viewMode = mode; renderMain(); }
function toggleFilterPanel() { state.filterPanelOpen = !state.filterPanelOpen; renderMain(); }
function toggleFilterTag(tag) {
  if (state.filterTags.includes(tag)) state.filterTags = state.filterTags.filter(t => t !== tag);
  else state.filterTags.push(tag);
  state.filteredResults = applySortAndFilter(state.results);
  renderMain();
}
function rerenderFilter() {
  state.filteredResults = applySortAndFilter(state.results);
  renderMain();
}
function toggleSelectionMode() {
  state.selectionMode = !state.selectionMode;
  if (!state.selectionMode) state.selectedPhotos.clear();
  renderMain();
}
function onCardClick(e, id) {
  if (state.selectionMode) {
    if (state.selectedPhotos.has(id)) state.selectedPhotos.delete(id);
    else state.selectedPhotos.add(id);
    renderMain();
  } else {
    openViewer(id);
  }
}
function onCardContext(e, id) {
  e.preventDefault();
  showContextMenu(e.clientX, e.clientY, id);
}
function toggleFavorite(id) {
  const p = photos.find(x => x.id === id);
  if (!p) return;
  p.favorite = !p.favorite;
  // 同步收藏相册
  const favAlbum = albums.find(a => a.isSystem);
  if (p.favorite) { if (!favAlbum.photos.includes(id)) favAlbum.photos.push(id); }
  else { favAlbum.photos = favAlbum.photos.filter(x => x !== id); }
  renderMain();
  if (viewer && !viewer.classList.contains('hidden')) updateViewerFav();
  showToast(p.favorite ? '已收藏' : '已取消收藏', 'success');
}
function batchDelete() {
  openDialog({
    title: '确认删除',
    body: `<p style="font-size:14px">确定要删除选中的 ${state.selectedPhotos.size} 张照片吗？此操作不可撤销。</p>`,
    footer: `<button class="btn btn-tertiary" data-close>取消</button><button class="btn btn-danger" id="confirmBatchDelete">删除</button>`,
    onMount: () => {
      $('confirmBatchDelete').onclick = () => {
        state.selectedPhotos.forEach(id => {
          const idx = photos.findIndex(p => p.id === id);
          if (idx >= 0) photos.splice(idx, 1);
        });
        state.selectedPhotos.clear();
        state.selectionMode = false;
        state.results = state.results.filter(p => photos.includes(p));
        state.filteredResults = applySortAndFilter(state.results);
        closeModal();
        showToast('已删除选中照片', 'success');
        renderMain();
      };
    }
  });
}
function batchAddToAlbum() {
  let opts = albums.filter(a => !a.isSystem).map(a => `<div class="album-select-item" onclick="doBatchAddAlbum('${a.id}')"><div class="album-cover">${a.cover?`<img src="${a.cover}">`:ICONS.tag}</div><div class="album-info"><span class="album-name">${a.name}</span><span class="album-count">${a.photos.length} 张</span></div></div>`).join('');
  openDialog({
    title: '添加到相册',
    body: `<p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">选择目标相册：</p><div class="album-select-list">${opts}</div>`,
    footer: `<button class="btn btn-tertiary" data-close>取消</button>`,
  });
}
function doBatchAddAlbum(albumId) {
  const a = albums.find(x => x.id === albumId);
  if (!a) return;
  state.selectedPhotos.forEach(id => { if (!a.photos.includes(id)) a.photos.push(id); });
  closeModal();
  showToast(`已添加到「${a.name}」`, 'success');
}

/* ============ 图片查看器 ============ */
function openViewer(id) {
  const idx = state.filteredResults.findIndex(p => p.id === id);
  if (idx < 0) return;
  state.viewerIndex = idx;
  state.viewerScale = 1;
  state.viewerTranslate = { x: 0, y: 0 };
  viewer.classList.remove('hidden');
  renderViewer();
}
function closeViewer() {
  viewer.classList.add('hidden');
  state.viewerIndex = -1;
  stopSlideshow();
}
function getCurrent() { return state.filteredResults[state.viewerIndex]; }
function renderViewer() {
  const p = getCurrent();
  if (!p) return;
  const img = $('vImage');
  img.src = p.src;
  img.style.transform = `translate(${state.viewerTranslate.x}px, ${state.viewerTranslate.y}px) scale(${state.viewerScale})`;
  img.style.rotate = `${p.rotation}deg`;
  $('zoomLevel').textContent = Math.round(state.viewerScale * 100) + '%';
  $('vPrev').classList.toggle('hidden', state.viewerIndex <= 0);
  $('vNext').classList.toggle('hidden', state.viewerIndex >= state.filteredResults.length - 1);
  updateViewerFav();
  updateViewerInfo();
  renderFilmstrip();
}
function updateViewerFav() {
  const p = getCurrent();
  if (!p) return;
  const btn = $('vFav');
  btn.classList.toggle('active', p.favorite);
  btn.querySelector('svg').innerHTML = p.favorite
    ? '<path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>'
    : '<path d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/>';
}
function updateViewerInfo() {
  const p = getCurrent();
  if (!p) return;
  // 标签
  $('vTags').innerHTML = p.tags.map(t => `<span class="viewer-tag">${t}<button class="viewer-tag-remove" onclick="removeViewerTag('${t}')">&times;</button></span>`).join('') +
    `<button class="viewer-tag-add" onclick="openTagDialog(${p.id})" title="添加标签">+</button>`;
  // 元数据
  $('vMeta').innerHTML = `<span class="viewer-meta-item viewer-filename">${p.name}</span>` +
    (p.location ? `<span class="viewer-meta-item">${ICONS.pin}${p.location}</span>` : '') +
    `<span class="viewer-meta-item">${ICONS.calendar}${p.date}</span>` +
    `<span class="viewer-meta-item">${ICONS.camera}${p.camera}</span>` +
    `<span class="viewer-meta-item">${p.width} × ${p.height}</span>` +
    `<div class="viewer-counter">${state.viewerIndex + 1} / ${state.filteredResults.length}</div>`;
}
function renderFilmstrip() {
  const list = state.filteredResults;
  $('vFilmstrip').innerHTML = list.map((p, i) =>
    `<div class="filmstrip-item ${i === state.viewerIndex ? 'active' : ''}" onclick="jumpToImage(${i})"><img src="${p.src}"></div>`
  ).join('');
  // 滚动到当前
  const active = $('vFilmstrip').children[state.viewerIndex];
  if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}
function prevImage() {
  if (state.viewerIndex <= 0) return;
  state.viewerIndex--;
  state.viewerScale = 1;
  state.viewerTranslate = { x: 0, y: 0 };
  renderViewer();
}
function nextImage() {
  if (state.viewerIndex >= state.filteredResults.length - 1) return;
  state.viewerIndex++;
  state.viewerScale = 1;
  state.viewerTranslate = { x: 0, y: 0 };
  renderViewer();
}
function jumpToImage(i) {
  state.viewerIndex = i;
  state.viewerScale = 1;
  state.viewerTranslate = { x: 0, y: 0 };
  renderViewer();
}
function zoom(delta) {
  state.viewerScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, state.viewerScale + delta));
  const img = $('vImage');
  img.style.transform = `translate(${state.viewerTranslate.x}px, ${state.viewerTranslate.y}px) scale(${state.viewerScale})`;
  $('zoomLevel').textContent = Math.round(state.viewerScale * 100) + '%';
}
function resetZoom() {
  state.viewerScale = 1;
  state.viewerTranslate = { x: 0, y: 0 };
  const img = $('vImage');
  img.style.transform = 'translate(0,0) scale(1)';
  $('zoomLevel').textContent = '100%';
}
function handleViewerWheel(e) {
  e.preventDefault();
  zoom(e.deltaY < 0 ? SCALE_STEP : -SCALE_STEP);
}
let dragStart = null;
function handleMouseDown(e) {
  if (e.button !== 0) return;
  state.viewerDragging = true;
  dragStart = { x: e.clientX - state.viewerTranslate.x, y: e.clientY - state.viewerTranslate.y };
  $('vContent').classList.add('dragging');
}
function handleMouseMove(e) {
  if (!state.viewerDragging) return;
  state.viewerTranslate = { x: e.clientX - dragStart.x, y: e.clientY - dragStart.y };
  $('vImage').style.transform = `translate(${state.viewerTranslate.x}px, ${state.viewerTranslate.y}px) scale(${state.viewerScale})`;
}
function handleMouseUp() {
  state.viewerDragging = false;
  $('vContent').classList.remove('dragging');
}
function handleDoubleClick() {
  if (state.viewerScale > 1.5) resetZoom();
  else { state.viewerScale = 2; $('vImage').style.transform = `translate(0,0) scale(2)`; $('zoomLevel').textContent = '200%'; }
}

/* 幻灯片 */
function toggleSlideshow() {
  state.slideshowActive = !state.slideshowActive;
  if (state.slideshowActive) startSlideshow();
  else stopSlideshow();
}
function startSlideshow() {
  state.slideshowActive = true;
  if (state.slideshowTimer) clearInterval(state.slideshowTimer);
  state.slideshowTimer = setInterval(() => {
    if (state.viewerIndex < state.filteredResults.length - 1) nextImage();
    else stopSlideshow();
  }, 3000);
  showToast('幻灯片已开始', 'success');
}
function stopSlideshow() {
  state.slideshowActive = false;
  if (state.slideshowTimer) { clearInterval(state.slideshowTimer); state.slideshowTimer = null; }
}

/* 查看器操作 */
function searchSimilar() {
  const p = getCurrent();
  if (!p) return;
  state.searchQuery = '相似照片';
  searchInput.value = '相似照片';
  state.filterMode = { type: 'similar', refId: p.id };
  closeViewer();
  doSearch();
}
function rotatePhoto(dir) {
  const p = getCurrent();
  if (!p) return;
  p.rotation = (p.rotation + (dir === 'left' ? -90 : 90) + 360) % 360;
  $('vImage').style.rotate = p.rotation + 'deg';
  showToast(`已向${dir === 'left' ? '左' : '右'}旋转`, 'success');
}
function deleteCurrentPhoto() {
  const p = getCurrent();
  if (!p) return;
  openDialog({
    title: '确认删除',

/* ============ 弹窗辅助函数 ============ */
function openDialog({ title, body, footer = '', onMount }) {
  const root = $('modalRoot');
  root.innerHTML = `<div class="modal-overlay" id="modalOverlay">
    <div class="dialog-card">
      <div class="modal-header">
        <h3 class="modal-title">${title || ''}</h3>
        <button class="dialog-close-btn" data-close title="关闭">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="modal-body">${body || ''}</div>
      ${footer ? `<div class="modal-footer">${footer}</div>` : ''}
    </div>
  </div>`;
  // 绑定关闭
  root.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', closeModal));
  $('modalOverlay').addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });
  if (typeof onMount === 'function') onMount();
}
function closeModal() {
  const root = $('modalRoot');
  const overlay = $('modalOverlay');
  if (overlay) {
    overlay.style.opacity = '0';
    const card = overlay.querySelector('.dialog-card');
    if (card) card.style.transform = 'scale(0.95) translateY(8px)';
  }
  setTimeout(() => { root.innerHTML = ''; }, 180);
}

/* ============ 右键菜单 ============ */
function showContextMenu(x, y, id) {
  const root = $('contextRoot');
  const p = photos.find(ph => ph.id === id);
  if (!p) return;
  const items = [
    { label: p.favorite ? '取消收藏' : '收藏照片', icon: p.favorite ? ICONS.star : ICONS.starOutline, act: () => { p.favorite = !p.favorite; renderMain(); showToast(p.favorite ? '已收藏' : '已取消收藏'); } },
    { label: '添加标签', icon: ICONS.tag, act: () => openTagDialog(id) },
    { label: '添加到相册', icon: ICONS.pin, act: () => addToAlbumSingle(id) },
    { label: '查找相似照片', icon: ICONS.search, act: () => { openViewer(id); searchSimilar(); } },
    { label: '打开文件位置', icon: ICONS.camera, act: () => showToast('Demo 演示：打开文件位置') },
    { label: '复制文件路径', icon: ICONS.tag, act: () => { showToast('已复制路径到剪贴板', 'success'); } },
    { divider: true },
    { label: '向左旋转', icon: ICONS.tag, act: () => { p.rotation = (p.rotation + 270) % 360; renderMain(); showToast('已向左旋转'); } },
    { label: '向右旋转', icon: ICONS.tag, act: () => { p.rotation = (p.rotation + 90) % 360; renderMain(); showToast('已向右旋转'); } },
    { divider: true },
    { label: '隐藏照片', danger: true, icon: ICONS.tag, act: () => { p.hidden = true; state.results = state.results.filter(r => r.id !== id); state.filteredResults = applySortAndFilter(state.results); closeModal(); renderMain(); showToast('已隐藏照片'); } },
    { label: '删除照片', danger: true, icon: ICONS.tag, act: () => deleteCurrentPhotoById(id) },
  ];
  root.innerHTML = `<div class="context-menu" id="ctxMenu" style="left:${x}px;top:${y}px">
    ${items.map(it => it.divider ? '<div class="context-divider"></div>' :
      `<button class="context-item${it.danger ? ' context-item-danger' : ''}" data-label="${it.label}">${it.icon}<span>${it.label}</span></button>`).join('')}
  </div>`;
  // 边界检测
  requestAnimationFrame(() => {
    const menu = $('ctxMenu');
    if (!menu) return;
    const w = menu.offsetWidth, h = menu.offsetHeight, m = 8;
    let nx = x, ny = y;
    if (x + w + m > window.innerWidth) nx = window.innerWidth - w - m;
    if (y + h + m > window.innerHeight) ny = window.innerHeight - h - m;
    menu.style.left = Math.max(m, nx) + 'px';
    menu.style.top = Math.max(m, ny) + 'px';
  });
  const btns = root.querySelectorAll('.context-item');
  items.filter(i => !i.divider).forEach((it, i) => {
    if (btns[i]) btns[i].addEventListener('click', () => { closeContextMenu(); it.act(); });
  });
}
function closeContextMenu() { $('contextRoot').innerHTML = ''; }

function addToAlbumSingle(id) {

/* ============ 标签编辑弹窗 ============ */
function openTagDialog(id) {
  const p = photos.find(ph => ph.id === id);
  if (!p) return;
  const allTags = [...new Set(photos.flatMap(x => x.tags))];
  const renderTags = () => p.tags.map(t =>
    `<span class="tag-chip">${t}<button class="tag-chip-remove" data-tag="${t}" title="移除">×</button></span>`).join('');
  const renderSuggest = () => allTags.filter(t => !p.tags.includes(t)).slice(0, 12).map(t =>
    `<button class="suggest-tag" data-tag="${t}">+ ${t}</button>`).join('');
  openDialog({
    title: '编辑标签',
    body: `<div style="margin-bottom:12px">
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">当前标签</div>
        <div class="tag-current" id="tagCurrent">${renderTags() || '<span style="color:var(--text-tertiary);font-size:13px">暂无标签</span>'}</div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">添加标签</div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input type="text" id="tagInput" class="search-input" placeholder="输入新标签..." style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-primary);color:var(--text-primary);font-size:13px" />
          <button class="btn btn-primary" id="tagAddBtn">添加</button>
        </div>
        <div class="tag-suggest" id="tagSuggest">${renderSuggest()}</div>
      </div>`,
    footer: `<button class="btn btn-primary" data-close>完成</button>`,
    onMount: () => {
      const refresh = () => {
        $('tagCurrent').innerHTML = renderTags() || '<span style="color:var(--text-tertiary);font-size:13px">暂无标签</span>';
        $('tagSuggest').innerHTML = renderSuggest();
        bindTagEvents();
        if ($('vInfoBar')) updateViewerInfo();
        renderMain();
        renderSidebarPanel();
      };
      const bindTagEvents = () => {
        document.querySelectorAll('.tag-chip-remove').forEach(el => {
          el.onclick = () => { p.tags = p.tags.filter(t => t !== el.dataset.tag); refresh(); };
        });
        document.querySelectorAll('.suggest-tag').forEach(el => {
          el.onclick = () => { p.tags.push(el.dataset.tag); refresh(); };
        });
      };
      $('tagAddBtn').onclick = () => {
        const v = $('tagInput').value.trim();
        if (!v) return;
        if (!p.tags.includes(v)) p.tags.push(v);
        $('tagInput').value = '';
        refresh();
      };
      $('tagInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('tagAddBtn').click(); });
      bindTagEvents();
    }
  });
}

/* ============ 事件绑定 ============ */
function bindEvents() {
  // 侧边栏导航点击
  sidebarNav.querySelectorAll('.nav-icon-btn').forEach(btn => {
    btn.addEventListener('click', () => switchSidebarTab(btn.dataset.tab));
  });
  // 侧边栏开关
  $('sidebarToggle').addEventListener('click', () => toggleSidebar(!state.sidebarOpen));
  // 主题切换
  $('themeToggle').addEventListener('click', toggleTheme);
  // 设置按钮
  $('settingsBtn').addEventListener('click', openSettings);
  // 搜索框
  searchInput.addEventListener('input', (e) => {
    $('clearBtn').classList.toggle('hidden', !e.target.value);
  });
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      state.searchQuery = e.target.value.trim();
      state.filterMode = { type: 'keyword' };
      doSearch();
    }
  });
  $('searchBtn').addEventListener('click', () => {
    state.searchQuery = searchInput.value.trim();
    state.filterMode = { type: 'keyword' };
    doSearch();
  });
  $('clearBtn').addEventListener('click', () => {
    searchInput.value = '';
    $('clearBtn').classList.add('hidden');
    state.searchQuery = '';
    state.filterMode = { type: 'keyword' };
    doSearch();
    searchInput.focus();
  });

  // 查看器：关闭/导航/缩放
  $('vClose').addEventListener('click', closeViewer);
  $('vPrev').addEventListener('click', prevImage);
  $('vNext').addEventListener('click', nextImage);
  $('zoomIn').addEventListener('click', () => zoom(0.2));
  $('zoomOut').addEventListener('click', () => zoom(-0.2));
  $('zoomLevel').addEventListener('click', resetZoom);
  // 查看器：操作按钮
  $('vFav').addEventListener('click', () => {
    const p = getCurrent(); if (!p) return;
    toggleFavorite(p.id);
    updateViewerFav();
  });
  $('vSimilar').addEventListener('click', searchSimilar);
  $('vInfo').addEventListener('click', () => {
    const p = getCurrent(); if (p) openInfoPanel(p.id);
  });
  // 更多菜单
  $('vMore').addEventListener('click', (e) => {
    e.stopPropagation();
    $('vMoreMenu').classList.toggle('hidden');
  });
  $('vMoreMenu').querySelectorAll('.more-menu-item').forEach(item => {
    item.addEventListener('click', () => {
      const act = item.dataset.act;
      $('vMoreMenu').classList.add('hidden');
      const p = getCurrent();
      if (!p) return;
      if (act === 'rotate-left') rotatePhoto('left');
      else if (act === 'rotate-right') rotatePhoto('right');
      else if (act === 'slideshow') toggleSlideshow();
      else if (act === 'album') addToAlbumSingle(p.id);
      else if (act === 'location') showToast('Demo 演示：打开文件位置');
      else if (act === 'delete') deleteCurrentPhoto();
    });
  });
  // 查看器内容区交互：滚轮缩放、拖拽、双击
  const vc = $('vContent');
  vc.addEventListener('wheel', handleViewerWheel, { passive: false });
  vc.addEventListener('mousedown', handleMouseDown);
  vc.addEventListener('dblclick', handleDoubleClick);

  // 全局键盘快捷键
  document.addEventListener('keydown', (e) => {
    // 弹窗打开时仅响应 Esc
    if ($('modalOverlay')) {
      if (e.key === 'Escape') closeModal();
      return;
    }
    // 右键菜单打开时仅响应 Esc
    if ($('ctxMenu')) {
      if (e.key === 'Escape') closeContextMenu();
      return;
    }
    const viewerOpen = !viewer.classList.contains('hidden');
    if (e.key === 'Escape' && viewerOpen) { closeViewer(); return; }
    // 输入框聚焦时不触发导航快捷键
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (viewerOpen) {
      if (e.key === 'ArrowLeft') prevImage();
      else if (e.key === 'ArrowRight') nextImage();
      else if (e.key === '+' || e.key === '=') zoom(0.2);
      else if (e.key === '-') zoom(-0.2);
      else if (e.key === '0') resetZoom();
      else if (e.key === ' ') { e.preventDefault(); toggleSlideshow(); }
    }
  });

  // 全局点击：关闭右键菜单、更多菜单
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.context-menu') && !e.target.closest('[data-ctx-trigger]')) closeContextMenu();
    if (!e.target.closest('.viewer-more-wrapper')) {
      const mm = $('vMoreMenu');
      if (mm) mm.classList.add('hidden');
    }
  });
  // 窗口大小变化时刷新
  window.addEventListener('resize', () => {
    if (!viewer.classList.contains('hidden')) renderFilmstrip();
  });
}

/* ============ 启动 ============ */
function init() {
  initTheme();
  bindEvents();
  renderQuickTags();
  renderSidebarPanel();
  doSearch();
  updateStats();
  // 欢迎提示
  setTimeout(() => showToast('觅影 SeekPhoto 已就绪，试试搜索"海边日落"', 'success'), 500);
}
init();
</script>
</body>
