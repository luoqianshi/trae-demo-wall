<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能眼镜POS系统 - TRAE AI创意大赛</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(234, 179, 8, 0); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-in-left {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-pulse-border { animation: pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-pulse-glow { animation: pulse-glow 1.5s ease-in-out infinite; }
    .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    .animate-slide-in-left { animation: slide-in-left 0.3s ease-out forwards; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    
    /* 视频测试模式样式 */
    #ar-video {
      background: #000;
      z-index: 1;
    }
    #ar-video.video-active {
      object-fit: contain !important;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <button id="mobile-menu-btn" onclick="toggleMobileMenu()" class="fixed top-4 left-4 z-50 p-2 bg-white rounded-lg shadow-lg md:hidden">
    <i data-lucide="menu" class="w-6 h-6 text-gray-600"></i>
  </button>
  
  <div id="mobile-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>
  
  <div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm fixed inset-y-0 left-0 z-50 transform -translate-x-full transition-transform duration-300 md:translate-x-0 md:relative">
      <div class="p-6 border-b border-gray-100">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl flex items-center justify-center">
            <i data-lucide="glasses" class="w-6 h-6 text-white"></i>
          </div>
          <div>
            <h1 class="text-lg font-bold text-gray-800">智能眼镜POS</h1>
            <p class="text-xs text-gray-500">TRAE AI创意大赛</p>
          </div>
        </div>
      </div>
      
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <button onclick="switchPage('home'); toggleMobileMenu()" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-colors" data-page="home">
          <i data-lucide="home" class="w-5 h-5"></i>首页
        </button>
        <button onclick="switchPage('products'); toggleMobileMenu()" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-colors" data-page="products">
          <i data-lucide="package" class="w-5 h-5"></i>商品管理
        </button>
        <button onclick="switchPage('orders'); toggleMobileMenu()" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-colors" data-page="orders">
          <i data-lucide="file-text" class="w-5 h-5"></i>订单管理
        </button>
        <button onclick="switchPage('ar'); toggleMobileMenu()" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-colors" data-page="ar">
          <i data-lucide="eye" class="w-5 h-5"></i>AR智能眼镜
        </button>
        <button onclick="switchPage('stats'); toggleMobileMenu()" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-colors" data-page="stats">
          <i data-lucide="bar-chart-3" class="w-5 h-5"></i>销售统计
        </button>
      </nav>
      
      <div class="p-4 border-t border-gray-100">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">
            <i data-lucide="user" class="w-5 h-5 text-gray-600"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-gray-800">店家管理员</p>
            <p class="text-xs text-gray-500">在线</p>
          </div>
        </div>
      </div>
    </aside>
    
    <main class="flex-1 overflow-auto scrollbar-thin">
      <div id="page-home" class="page-content p-6"></div>
      <div id="page-products" class="page-content p-6 hidden"></div>
      <div id="page-orders" class="page-content p-6 hidden"></div>
      <div id="page-ar" class="page-content p-6 hidden"></div>
      <div id="page-stats" class="page-content p-6 hidden"></div>
    </main>
  </div>
  
  <script>
    const products = [
      { id: '1', name: '宫保鸡丁', price: 38, category: '热菜', desc: '经典川菜，鸡肉嫩滑', flavors: ['微辣', '中辣+¥2', '特辣+¥4'] },
      { id: '2', name: '麻婆豆腐', price: 22, category: '素菜', desc: '麻辣鲜香，豆腐嫩滑', flavors: ['微辣', '中辣+¥2'] },
      { id: '3', name: '清蒸鲈鱼', price: 68, category: '热菜', desc: '鲜嫩多汁，原汁原味', flavors: [] },
      { id: '4', name: '蒜蓉西兰花', price: 26, category: '素菜', desc: '营养健康，清脆爽口', flavors: [] },
      { id: '5', name: '可乐', price: 8, category: '饮料', desc: '冰爽可乐', flavors: ['正常冰', '少冰', '不加冰'] },
      { id: '6', name: '米饭', price: 3, category: '主食', desc: '白米饭', flavors: ['小碗', '大碗+¥2'] },
      { id: '7', name: '红烧肉', price: 48, category: '热菜', desc: '肥而不腻，入口即化', flavors: [] },
      { id: '8', name: '橙汁', price: 12, category: '饮料', desc: '鲜榨橙汁', flavors: ['正常糖', '少糖'] },
    ];
    
    const customers = [
      { id: 'c1', name: '顾客A', phone: '138****1234' },
      { id: 'c2', name: '顾客B', phone: '139****5678' },
      { id: 'c3', name: '顾客C', phone: '137****9012' },
    ];
    
    let orders = [];
    let faceTracks = [];
    
    const formatPrice = (p) => p.toFixed(2);
    const formatDate = (d) => new Date(d).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    
    let currentPage = 'home';
    let orderItems = [];
    let paymentResult = null;
    
    function toggleMobileMenu() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('mobile-overlay');
      const btn = document.getElementById('mobile-menu-btn');
      
      if (sidebar.classList.contains('-translate-x-full')) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
        btn.innerHTML = '<i data-lucide="x" class="w-6 h-6 text-gray-600"></i>';
      } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
        btn.innerHTML = '<i data-lucide="menu" class="w-6 h-6 text-gray-600"></i>';
      }
      lucide.createIcons();
    }
    
    function switchPage(id) {
      document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('page-' + id).classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach(el => {
        el.classList.remove('bg-blue-50', 'text-blue-600');
        el.classList.add('text-gray-600');
      });
      document.querySelector('.nav-btn[data-page="' + id + '"]').classList.add('bg-blue-50', 'text-blue-600');
      document.querySelector('.nav-btn[data-page="' + id + '"]').classList.remove('text-gray-600');
      currentPage = id;
      renderPage(id);
      lucide.createIcons();
      
      if (id !== 'ar') {
        // 离开AR页面时停止语音识别
        if (arVoiceRecognition) {
          try { arVoiceRecognition.stop(); } catch(e) {}
          arVoiceRecognition = null;
        }
        isVoiceListening = false;
      } else {
        // 进入AR页面时只自动开启摄像头，语音需要用户手动点击按钮
        setTimeout(() => {
          autoStartCameraAndMic();
        }, 500);
      }
    }
    
    function renderPage(id) {
      const container = document.getElementById('page-' + id);
      if (id === 'home') container.innerHTML = renderHome();
      else if (id === 'products') container.innerHTML = renderProducts();
      else if (id === 'orders') container.innerHTML = renderOrders();
      else if (id === 'ar') container.innerHTML = renderAR();
      else if (id === 'stats') container.innerHTML = renderStats();
      lucide.createIcons();
    }
    
    function renderHome() {
      const todayOrders = orders.filter(o => new Date(o.createdAt).toDateString() === new Date().toDateString());
      const todayRevenue = todayOrders.filter(o => o.status === 'paid').reduce((s, o) => s + o.totalAmount, 0);
      const pendingCount = todayOrders.filter(o => o.status === 'pending').length;
      const recentOrders = [...orders].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
      
      return `
        <div class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-2xl font-bold">欢迎回来</h1>
            <p class="text-gray-500 mt-1">${new Date().toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
          </div>
          ${pendingCount > 0 ? '<div class="flex items-center gap-2 px-4 py-2 bg-yellow-50 rounded-full animate-pulse-glow"><i data-lucide="alert-triangle" class="w-5 h-5 text-yellow-600"></i><span class="text-sm font-medium text-yellow-700">' + pendingCount + ' 笔待支付</span></div>' : ''}
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          ${[
            { icon: 'package', label: '商品数量', value: products.length, color: 'from-blue-500 to-blue-600' },
            { icon: 'file-text', label: '今日订单', value: todayOrders.length, color: 'from-blue-500 to-blue-600' },
            { icon: 'dollar-sign', label: '今日营收', value: '¥' + formatPrice(todayRevenue), color: 'from-green-500 to-green-600' },
            { icon: 'users', label: '顾客数量', value: customers.length, color: 'from-purple-500 to-purple-600' },
          ].map((stat, i) => `
            <div class="bg-white rounded-xl p-5 border border-gray-100 hover:shadow-lg transition-all animate-fade-in" style="animation-delay: ${i * 100}ms">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-gray-500 text-sm">${stat.label}</p>
                  <p class="text-2xl font-bold mt-1">${stat.value}</p>
                </div>
                <div class="w-12 h-12 bg-gradient-to-br ${stat.color} rounded-xl flex items-center justify-center shadow-lg">
                  <i data-lucide="${stat.icon}" class="w-6 h-6 text-white"></i>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
          <div class="bg-white rounded-xl p-5 border border-yellow-200">
            <div class="flex items-center gap-3 mb-3">
              <i data-lucide="clock" class="w-5 h-5 text-yellow-600"></i>
              <h3 class="font-semibold">黄色菜单 - 待支付</h3>
              <span class="ml-auto px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-sm font-medium">${pendingCount}</span>
            </div>
            <div class="text-3xl font-bold text-yellow-600">¥${formatPrice(todayOrders.filter(o => o.status === 'pending').reduce((s, o) => s + o.totalAmount, 0))}</div>
          </div>
          <div class="bg-white rounded-xl p-5 border border-green-200">
            <div class="flex items-center gap-3 mb-3">
              <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
              <h3 class="font-semibold">绿色菜单 - 已支付</h3>
              <span class="ml-auto px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">${todayOrders.filter(o => o.status === 'paid').length}</span>
            </div>
            <div class="text-3xl font-bold text-green-600">¥${formatPrice(todayRevenue)}</div>
          </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="lg:col-span-2">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-lg font-semibold">最新订单</h2>
              <button onclick="switchPage('orders')" class="flex items-center gap-1 text-blue-600 hover:text-blue-700 text-sm font-medium">查看全部 <i data-lucide="arrow-up-right" class="w-4 h-4"></i></button>
            </div>
            <div class="space-y-4">${recentOrders.map((o, i) => renderOrderCard(o, i)).join('')}</div>
          </div>
          
          <div class="bg-white rounded-xl p-5 border border-gray-100">
            <h2 class="text-lg font-semibold mb-4">商品分类</h2>
            <div class="space-y-3">
              ${['热菜', '素菜', '饮料', '主食'].map((cat, i) => {
                const count = products.filter(p => p.category === cat).length;
                const percent = products.length > 0 ? Math.round((count / products.length) * 100) : 0;
                return `
                  <div class="animate-fade-in" style="animation-delay: ${(i + 4) * 100}ms">
                    <div class="flex items-center justify-between mb-1">
                      <span class="text-sm font-medium">${cat}</span>
                      <span class="text-sm text-gray-500">${count} 种</span>
                    </div>
                    <div class="h-2.5 bg-gray-100 rounded-full overflow-hidden">
                      <div class="h-full bg-gradient-to-r from-blue-400 to-blue-600 rounded-full transition-all duration-700" style="width: ${percent}%"></div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
            
            <div class="mt-6 pt-6 border-t border-gray-100">
              <h3 class="text-sm font-semibold mb-3">快捷操作</h3>
              <div class="grid grid-cols-2 gap-2">
                <button onclick="switchPage('products')" class="flex items-center justify-center gap-2 px-4 py-3 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-all">
                  <i data-lucide="package" class="w-5 h-5"></i>添加商品
                </button>
                <button onclick="showAddOrderModal()" class="flex items-center justify-center gap-2 px-4 py-3 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 transition-all">
                  <i data-lucide="file-text" class="w-5 h-5"></i>新建订单
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }
    
    function renderOrderCard(order, index) {
      const config = order.status === 'pending' ? { icon: 'clock', color: 'text-yellow-600', bg: 'bg-yellow-50', border: 'border-yellow-400', label: '黄色菜单', pulse: true }
        : order.status === 'paid' ? { icon: 'check', color: 'text-green-600', bg: 'bg-green-50', border: 'border-green-400', label: '绿色菜单', pulse: false }
        : { icon: 'x', color: 'text-red-500', bg: 'bg-red-50', border: 'border-red-300', label: '已取消', pulse: false };
      
      return `
        <div class="animate-slide-in-left" style="animation-delay: ${index * 100}ms">
          <div class="bg-white rounded-xl p-5 border ${config.border} ${config.pulse ? 'animate-pulse-border' : ''}">
            <div class="flex items-center justify-between mb-4">
              <div>
                <div class="flex items-center gap-2">
                  <span class="text-sm text-gray-500">订单号: ${order.id}</span>
                  <span class="text-sm text-gray-500">|</span>
                  <span class="text-sm text-gray-500">${order.customerName}</span>
                </div>
                <p class="text-xs text-gray-400 mt-1">${formatDate(order.createdAt)}</p>
              </div>
              <div class="flex items-center gap-2 px-3 py-1.5 ${config.bg} rounded-full">
                <i data-lucide="${config.icon}" class="w-4 h-4 ${config.color}"></i>
                <span class="text-sm font-medium ${config.color}">${config.label}</span>
              </div>
            </div>
            
            <div class="space-y-2 mb-4">
              ${order.items.map(item => `
                <div class="flex items-center justify-between">
                  <div>
                    <span class="font-medium">${item.name}</span>
                    ${item.flavor ? '<span class="ml-2 text-sm text-gray-500">(' + item.flavor + ')</span>' : ''}
                  </div>
                  <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500">x${item.quantity}</span>
                    <span class="font-medium">¥${formatPrice(item.price * item.quantity)}</span>
                  </div>
                </div>
              `).join('')}
            </div>
            
            <div class="flex items-center justify-between pt-4 border-t border-gray-100">
              <div class="text-2xl font-bold">¥${formatPrice(order.totalAmount)}</div>
              <div class="flex items-center gap-2">
                ${order.status === 'pending' ? `
                  <button onclick="payOrder('${order.id}', ${order.totalAmount})" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium">立即支付</button>
                  <button onclick="cancelOrder('${order.id}')" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 text-sm font-medium">取消</button>
                ` : order.status === 'paid' ? '<span class="text-sm text-green-600">已通过人脸支付完成</span>' : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }
    
    function renderProducts() {
      return `
        <div class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-2xl font-bold">商品管理</h1>
            <p class="text-gray-500 mt-1">管理菜单商品和口味选项</p>
          </div>
          <button onclick="showAddProductModal()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium">
            <i data-lucide="plus" class="w-5 h-5"></i>添加商品
          </button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          ${products.map((p, i) => `
            <div class="bg-white rounded-xl border border-gray-100 overflow-hidden hover:shadow-lg transition-all animate-fade-in" style="animation-delay: ${i * 100}ms">
              <div class="h-40 bg-gray-100 overflow-hidden">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${encodeURIComponent(p.name + ' Chinese dish food photography')}&image_size=square" alt="${p.name}" class="w-full h-full object-cover">
              </div>
              <div class="p-4">
                <div class="flex items-center justify-between mb-2">
                  <h3 class="font-bold">${p.name}</h3>
                  <span class="text-xl font-bold text-blue-600">¥${formatPrice(p.price)}</span>
                </div>
                <p class="text-sm text-gray-500 mb-3">${p.desc}</p>
                <span class="inline-block px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded-md">${p.category}</span>
                
                ${p.flavors.length > 0 ? `
                  <div class="mt-3">
                    <p class="text-xs text-gray-400 mb-2">可选口味</p>
                    <div class="flex flex-wrap gap-2">
                      ${p.flavors.map(f => '<span class="inline-block px-2 py-1 bg-gray-50 text-gray-600 text-xs rounded-md">' + f + '</span>').join('')}
                    </div>
                  </div>
                ` : ''}
                
                <div class="flex items-center gap-2 mt-4">
                  <button onclick="editProduct('${p.id}')" class="flex-1 flex items-center justify-center gap-1 px-3 py-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 text-sm font-medium">
                    <i data-lucide="edit" class="w-4 h-4"></i>编辑
                  </button>
                  <button onclick="deleteProduct('${p.id}')" class="flex-1 flex items-center justify-center gap-1 px-3 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 text-sm font-medium">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>删除
                  </button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    function renderOrders() {
      const pending = orders.filter(o => o.status === 'pending');
      const paid = orders.filter(o => o.status === 'paid');
      
      return `
        <div class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-2xl font-bold">订单管理</h1>
            <p class="text-gray-500 mt-1">查看和管理所有订单</p>
          </div>
          <button onclick="showAddOrderModal()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium">
            <i data-lucide="plus" class="w-5 h-5"></i>新建订单
          </button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div class="bg-white rounded-xl p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm">订单总数</p>
                <p class="text-2xl font-bold mt-1">${orders.length}</p>
              </div>
              <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                <i data-lucide="file-text" class="w-6 h-6 text-blue-600"></i>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl p-5 border border-yellow-200">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm">黄色菜单</p>
                <p class="text-2xl font-bold text-yellow-600 mt-1">${pending.length}</p>
              </div>

    }
    
    let arVoiceRecognition = null;

    let cameraInitialized = false;

    async function autoStartCameraAndMic() {
      if (permissionRequested) {
        return;
      }
      permissionRequested = true;
      
      const savedPermission = localStorage.getItem('micPermission');
      if (savedPermission === 'granted') {
        micPermissionGranted = true;
      } else if (savedPermission === 'denied') {
        micPermissionDenied = true;
      }
      
      if (!cameraInitialized) {
        toggleCamera();
        cameraInitialized = true;
      }
      
      // 不再自动启动语音识别，改为用户手动点击按钮启动
      // 这样符合移动端安全策略，需要用户手势才能启动麦克风
    }
    
    async function requestMicPermission() {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micPermissionGranted = true;
        localStorage.setItem('micPermission', 'granted');
        console.log('麦克风权限已获取');
      } catch (error) {

    async function checkMicPermission() {
      if (navigator.permissions && navigator.permissions.query) {
        try {
          const result = await navigator.permissions.query({ name: 'microphone' });
          return result.state;
        } catch (e) {

        }
      }

    let isVoiceListening = false;

    function toggleARVoice() {
      const textEl = document.getElementById('ar-voice-text');
      const voiceBtn = document.getElementById('voice-btn');
      const micIcon = document.getElementById('mic-icon');
      const micWrapper = document.getElementById('mic-icon-wrapper');
      
      if (!textEl || !voiceBtn) return;
      
      if (isVoiceListening) {
        // 停止语音识别和音频分析
        isVoiceListening = false;
        stopAudioAnalysis();
        if (arVoiceRecognition) {
          try { arVoiceRecognition.stop(); } catch(e) {}
          arVoiceRecognition = null;
        }
        voiceBtn.innerHTML = '<i data-lucide="mic" class="w-5 h-5"></i>语音点餐';

        textEl.textContent = '点击"语音点餐"按钮开始识别...';
        lucide.createIcons();
        return;
      }
      
      // 开始语音识别
      if (micPermissionDenied) {
        textEl.textContent = '🔒 麦克风权限已拒绝，请在浏览器设置中开启';
        return;
      }
      
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        textEl.textContent = '❌ 您的浏览器不支持语音识别（请使用Chrome/Edge/Safari）';
        return;
      }
      
      isVoiceListening = true;
      voiceBtn.innerHTML = '<i data-lucide="square" class="w-5 h-5"></i>停止识别';
      voiceBtn.className = 'flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium';
      micIcon.className = 'w-5 h-5 text-red-400 animate-pulse';
      micWrapper.className = 'w-10 h-10 bg-red-500/20 rounded-lg flex items-center justify-center';
      textEl.textContent = '🎤 正在聆听...请说出菜品名称';
      lucide.createIcons();
      
      startContinuousARVoice();
    }

    async function startAudioAnalysis() {
      if (audioAnalysisInterval) return;
      
      try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        audioSource = audioContext.createMediaStreamSource(audioStream);
        audioSource.connect(analyser);
        
        audioAnalysisInterval = setInterval(() => {
          const dataArray = new Uint8Array(analyser.frequencyBinCount);
          analyser.getByteFrequencyData(dataArray);
          
          let sum = 0;
          for (let i = 0; i < dataArray.length; i++) {
            sum += dataArray[i];
          }
          const average = sum / dataArray.length;
          currentAudioEnergy = average;
          isSpeakingAudio = average > 20;
        }, 100);
      } catch (e) {
        console.log('音频分析启动失败:', e);
      }
    }
    
    function stopAudioAnalysis() {
      if (audioAnalysisInterval) {
        clearInterval(audioAnalysisInterval);
        audioAnalysisInterval = null;
      }
      if (audioSource) {
        try { audioSource.disconnect(); } catch(e) {}
        audioSource = null;
      }
      if (audioContext) {
        try { audioContext.close(); } catch(e) {}
        audioContext = null;
      }
      if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
        audioStream = null;
      }
      currentAudioEnergy = 0;
      isSpeakingAudio = false;
    }
    
    function startContinuousARVoice() {
      const textEl = document.getElementById('ar-voice-text');
      if (!textEl) return;
      
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        textEl.textContent = '❌ 您的浏览器不支持语音识别';
        return;
      }
      
      startAudioAnalysis();
      
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (arVoiceRecognition) {
        try { arVoiceRecognition.stop(); } catch(e) {}
      }
      
      arVoiceRecognition = new SpeechRecognition();
      arVoiceRecognition.lang = 'zh-CN';
      arVoiceRecognition.continuous = true;
      arVoiceRecognition.interimResults = true;
      
      let silenceTimer = null;
      const SILENCE_TIMEOUT = 3000; // 3秒无语音自动停止
      
      arVoiceRecognition.onresult = (event) => {
        let text = '';
        let isFinalResult = false;
        
        // 获取最新的识别结果
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          if (result.isFinal) {
            text = result[0].transcript;
            isFinalResult = true;
            break;
          }
        }
        
        // 如果没有最终结果，获取临时结果
        if (!isFinalResult) {
          for (let i = event.resultIndex; i < event.results.length; i++) {
            text += event.results[i][0].transcript;
          }
        }
        
        textEl.textContent = '🎤 ' + text;
        console.log('语音识别结果:', text, 'isFinal:', isFinalResult);
        
        // 重置静音计时器
        if (silenceTimer) clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
          if (isVoiceListening && arVoiceRecognition) {
            try { arVoiceRecognition.stop(); } catch(e) {}
          }
        }, SILENCE_TIMEOUT);
        
        // 只有最终结果才处理
        if (isFinalResult && text.trim().length > 0) {
          console.log('处理最终识别结果:', text);
          micPermissionGranted = true;
          localStorage.setItem('micPermission', 'granted');
          processVoiceOrder(text, textEl);
        }
      };
      
      arVoiceRecognition.onerror = (event) => {
        console.warn('语音识别错误:', event.error);
        if (event.error === 'not-allowed') {
          micPermissionDenied = true;
          localStorage.setItem('micPermission', 'denied');
          textEl.textContent = '🔒 麦克风权限已拒绝，请在浏览器设置中开启';
          toggleARVoice(); // 自动停止
        } else if (event.error === 'network') {
          textEl.textContent = '❌ 网络错误，请检查网络连接';
        } else if (event.error !== 'no-speech' && event.error !== 'aborted') {
          textEl.textContent = '🎤 识别出错，请重试...';
        }
      };
      
      arVoiceRecognition.onend = () => {

      products.forEach(product => {

        aliases.forEach(alias => {

    // 加载 face-api.js 模型
    async function loadFaceApiModels() {
      if (isModelLoaded || isModelLoading) return isModelLoaded;
      
      isModelLoading = true;
      const loadingEl = document.getElementById('model-loading');
      const loadingText = document.getElementById('model-loading-text');
      const progressEl = document.getElementById('model-progress');
      
      if (loadingEl) loadingEl.classList.remove('hidden');
      
      try {
        if (loadingText) loadingText.textContent = '正在加载 TinyFaceDetector 模型...';
        if (progressEl) progressEl.style.width = '20%';
        
        await faceapi.nets.tinyFaceDetector.loadFromUri(FACE_API_MODEL_URL);
        
        if (loadingText) loadingText.textContent = '正在加载人脸关键点模型...';
        if (progressEl) progressEl.style.width = '60%';
        
        await faceapi.nets.faceLandmark68Net.loadFromUri(FACE_API_MODEL_URL);
        
        if (progressEl) progressEl.style.width = '100%';
        if (loadingText) loadingText.textContent = '模型加载完成！';
        
        isModelLoaded = true;
        isModelLoading = false;
        
        setTimeout(() => {
          if (loadingEl) loadingEl.classList.add('hidden');
        }, 800);
        
        console.log('face-api.js 模型加载完成');
        return true;
      } catch (error) {
        console.error('模型加载失败:', error);
        if (loadingText) {
          loadingText.innerHTML = '<span class="text-red-400">模型加载失败，将使用模拟模式</span>';
        }
        isModelLoading = false;
        
        setTimeout(() => {
          if (loadingEl) loadingEl.classList.add('hidden');
        }, 2000);
        return false;
      }
    }
    
    async function toggleCamera() {
      const video = document.getElementById('ar-video');
      const canvas = document.getElementById('ar-canvas');
      const placeholder = document.getElementById('camera-placeholder');
      const status = document.getElementById('camera-status');
      const btn = document.getElementById('camera-btn');
      const result = document.getElementById('face-detection-result');
      const voiceText = document.getElementById('ar-voice-text');
      const customersOverlay = document.getElementById('ar-customers-overlay');
      
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
        cameraInitialized = false;
        if (faceDetectionInterval) {
          clearInterval(faceDetectionInterval);
          faceDetectionInterval = null;
        }
        faceTracks = [];
        
        video.classList.add('hidden');
        placeholder.classList.remove('hidden');
        status.className = 'w-2 h-2 bg-gray-400 rounded-full';
        status.parentElement.querySelector('span').textContent = '摄像头未开启';
        btn.innerHTML = '<i data-lucide="camera" class="w-5 h-5"></i>开启摄像头';
        btn.className = 'flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium';
        result.classList.add('hidden');
        
        if (customersOverlay) {
          customersOverlay.style.display = 'block';
        }
        
        lucide.createIcons();
        return;
      }
      
      try {
        const constraints = {
          video: {
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        };
        
        cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = cameraStream;
        
        await video.play();
        
        placeholder.classList.add('hidden');
        video.classList.remove('hidden');
        
        status.className = 'w-2 h-2 bg-green-500 rounded-full animate-pulse';
        status.parentElement.querySelector('span').textContent = '摄像头已连接';
        btn.innerHTML = '<i data-lucide="camera-off" class="w-5 h-5"></i>关闭摄像头';
        btn.className = 'flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium';
        
        if (customersOverlay) {
          customersOverlay.style.display = 'none';
        }
        
        startCameraFaceDetection(video, canvas);
        
        voiceText.textContent = '摄像头已开启，正在进行人脸识别...';
        
      } catch (error) {
        console.error('Camera error:', error);
        
        let message = '无法开启摄像头';
        if (error.name === 'NotAllowedError') {
          message = '请允许访问摄像头权限';
        } else if (error.name === 'NotFoundError') {
          message = '未检测到摄像头设备';
        } else if (error.name === 'NotReadableError') {
          message = '摄像头被其他应用占用';
        }
        
        if (voiceText) {
          voiceText.textContent = message;
        }
        
        if (confirm(message + '\n\n是否前往浏览器设置开启权限？')) {
          if (navigator.permissions && navigator.permissions.query) {
            navigator.permissions.query({ name: 'camera' }).then(function(r) {
              if (r.state === 'denied') {
                window.open('https://support.google.com/chrome/answer/2392284', '_blank');
              }
            });
          }
        }
      }
      
      lucide.createIcons();
    }
    
    function startCameraFaceDetection(video, canvas) {
      const ctx = canvas.getContext('2d');
      const result = document.getElementById('face-detection-result');
      const detectedName = document.getElementById('detected-name');
      const overlay = document.getElementById('ar-overlay');
      const detectCanvas = document.getElementById('face-detect-canvas');
      
      if (overlay) {
        overlay.classList.remove('hidden');
      }
      
      if (!isModelLoaded && !isModelLoading) {
        loadFaceApiModels();
      }
      
      faceDetectionInterval = setInterval(async function() {
        if (!video.videoWidth || !cameraStream) return;
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        if (isModelLoaded && typeof faceapi !== 'undefined') {
          try {
            const maxSize = 512;
            let targetWidth, targetHeight;
            if (video.videoWidth > video.videoHeight) {
              targetWidth = Math.min(video.videoWidth, maxSize);
              targetHeight = Math.round(video.videoHeight * (targetWidth / video.videoWidth));
            } else {
              targetHeight = Math.min(video.videoHeight, maxSize);
              targetWidth = Math.round(video.videoWidth * (targetHeight / video.videoHeight));
            }
            
            detectCanvas.width = targetWidth;
            detectCanvas.height = targetHeight;
            const dCtx = detectCanvas.getContext('2d');
            dCtx.drawImage(video, 0, 0, targetWidth, targetHeight);
            
            const detectorOptions = new faceapi.TinyFaceDetectorOptions({
              inputSize: 608,
              scoreThreshold: 0.3
            });
            
            let detections = await faceapi.detectAllFaces(detectCanvas, detectorOptions);
            
            let hasLandmarks = false;
            try {
              detections = await detections.withFaceLandmarks();
              hasLandmarks = true;
            } catch (e) {
              console.log('关键点模型未加载，跳过说话检测');
            }
            
            if (overlay) {
              const oldFaceBoxes = overlay.querySelectorAll('.face-box-item');
              oldFaceBoxes.forEach(box => box.remove());
            }
            
            if (detections && detections.length > 0) {
              const currentSpeaker = hasLandmarks ? detectSpeakingFace(detections) : -1;
              
              faceTracks = trackFaces(detections, faceTracks, customers, currentSpeaker);
              
              faceTracks.forEach(track => {
                const videoX = (track.box.x / targetWidth) * video.videoWidth;
                const videoY = (track.box.y / targetHeight) * video.videoHeight;
                const videoW = (track.box.width / targetWidth) * video.videoWidth;
                const videoH = (track.box.height / targetHeight) * video.videoHeight;
                
                const customer = track.customer;
                const isSpeaking = track.isSpeaking;
                
                const borderColor = isSpeaking ? '#f59e0b' : '#10b981';
                
                ctx.beginPath();
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = 4;
                ctx.rect(videoX, videoY, videoW, videoH);
                ctx.stroke();
                
                const bgColor = isSpeaking ? 'rgba(245, 158, 11, 0.8)' : 'rgba(16, 185, 129, 0.8)';
                ctx.fillStyle = bgColor;
                ctx.fillRect(videoX, videoY - 30, 150, 24);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px sans-serif';
                const label = isSpeaking ? '🔊 ' + customer.name : '已识别: ' + customer.name;
                ctx.fillText(label, videoX + 8, videoY - 10);
                
                if (overlay) {
                  const faceBox = document.createElement('div');
                  const borderClass = isSpeaking ? 'border-yellow-400' : 'border-green-400';
                  faceBox.className = `face-box-item absolute border-2 ${borderClass} transition-all duration-150`;
                  faceBox.dataset.videoX = videoX;
                  faceBox.dataset.videoY = videoY;
                  faceBox.dataset.videoW = videoW;
                  faceBox.dataset.videoH = videoH;
                  faceBox.dataset.customerId = customer.id;
                  faceBox.dataset.isSpeaking = isSpeaking;
                  overlay.appendChild(faceBox);
                  updateFaceBoxPosition(faceBox, videoX, videoY, videoW, videoH, video.videoWidth, video.videoHeight, customer);
                }
                
                result.classList.remove('hidden');
                detectedName.textContent = isSpeaking ? '🔊 ' + customer.name + ' 正在说话' : '识别成功！欢迎 ' + customer.name;
              });
            }
          } catch (e) {
            console.warn('人脸识别错误:', e);
          }
        } else {
          // 模拟模式：固定显示多个人脸，用于演示多人点餐
          if (faceTracks.length === 0) {
            faceTracks = [
              { box: { x: canvas.width * 0.15, y: canvas.height * 0.2, width: canvas.width * 0.25, height: canvas.height * 0.35 }, customer: customers[0], id: Date.now() + 1, isSpeaking: false },
              { box: { x: canvas.width * 0.4, y: canvas.height * 0.3, width: canvas.width * 0.25, height: canvas.height * 0.35 }, customer: customers[1], id: Date.now() + 2, isSpeaking: false },
              { box: { x: canvas.width * 0.6, y: canvas.height * 0.15, width: canvas.width * 0.25, height: canvas.height * 0.35 }, customer: customers[2], id: Date.now() + 3, isSpeaking: false }
            ];
          }
          
          if (overlay) {
            const oldFaceBoxes = overlay.querySelectorAll('.face-box-item');
            oldFaceBoxes.forEach(box => box.remove());
          }
          
          faceTracks.forEach(track => {
            const customer = track.customer;
            const isSpeaking = track.isSpeaking;
            const videoX = track.box.x;
            const videoY = track.box.y;
            const videoW = track.box.width;
            const videoH = track.box.height;
            
            const borderColor = isSpeaking ? '#f59e0b' : '#10b981';
            ctx.beginPath();
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 4;
            ctx.rect(track.box.x, track.box.y, track.box.width, track.box.height);
            ctx.stroke();
            
            const bgColor = isSpeaking ? 'rgba(245, 158, 11, 0.8)' : 'rgba(16, 185, 129, 0.8)';
            ctx.fillStyle = bgColor;
            ctx.fillRect(track.box.x, track.box.y - 30, 200, 24);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px sans-serif';
            const label = isSpeaking ? '🔊 ' + customer.name : '已识别: ' + customer.name;
            ctx.fillText(label, track.box.x + 8, track.box.y - 10);
            
            if (overlay) {
              const faceBox = document.createElement('div');
              const borderClass = isSpeaking ? 'border-yellow-400' : 'border-green-400';
              faceBox.className = `face-box-item absolute border-2 ${borderClass} transition-all duration-150`;
              faceBox.dataset.videoX = videoX;
              faceBox.dataset.videoY = videoY;
              faceBox.dataset.videoW = videoW;
              faceBox.dataset.videoH = videoH;
              faceBox.dataset.customerId = customer.id;
              faceBox.dataset.isSpeaking = isSpeaking;
              overlay.appendChild(faceBox);
              updateFaceBoxPosition(faceBox, videoX, videoY, videoW, videoH, canvas.width, canvas.height, customer);
            }
          });
          
          result.classList.remove('hidden');
          const speakingCustomer = faceTracks.find(t => t.isSpeaking);
          detectedName.textContent = speakingCustomer ? '🔊 ' + speakingCustomer.customer.name + ' 正在说话' : '识别成功！欢迎多位顾客';
        }
      }, 500);
    }

    function updateARCustomersOverlay() {
      const result = document.getElementById('face-detection-result');
      const detectedName = document.getElementById('detected-name');
      const overlay = document.getElementById('ar-overlay');
      const detectCanvas = document.getElementById('face-detect-canvas');
      
      // 清除旧的检测间隔
      if (faceDetectionInterval) {
        clearInterval(faceDetectionInterval);
        faceDetectionInterval = null;
      }
      
      // 防止重复启动
      if (faceDetectionRunning) return;
      faceDetectionRunning = true;
      
      // 显示AR覆盖层
      if (overlay) {
        overlay.classList.remove('hidden');
      }
      
      // 异步加载模型（如果还未加载）
      if (!isModelLoaded && !isModelLoading) {
        loadFaceApiModels();
      }
      
      // 根据是否使用真实人脸检测来选择检测策略
      if (isModelLoaded && typeof faceapi !== 'undefined') {
        // 使用真实的 face-api.js 检测
        startRealFaceDetection(video, detectCanvas, overlay, result, detectedName);
      } else {
        // 模型加载中或加载失败，使用模拟检测
        if (overlay) {
          const loadingHint = document.createElement('div');
          loadingHint.className = 'absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-blue-500/80 text-white text-xs px-3 py-2 rounded-lg';
          loadingHint.id = 'detection-mode-hint';
          loadingHint.textContent = isModelLoading ? '模型加载中，使用模拟模式...' : '模拟模式';
          overlay.appendChild(loadingHint);
        }
        startSimulatedFaceDetection(video, overlay, result, detectedName);
      }
    }
    
    // 真实人脸检测
    function startRealFaceDetection(video, detectCanvas, overlay, result, detectedName) {
      const ctx = detectCanvas.getContext('2d');
      
      // 移除模拟模式提示
      const hint = document.getElementById('detection-mode-hint');
      if (hint) hint.remove();
      
      // 使用更大的输入尺寸以提高检测精度
      const detectorOptions = new faceapi.TinyFaceDetectorOptions({
        inputSize: 608,      // 增大输入尺寸以提高检测准确性
        scoreThreshold: 0.3   // 降低阈值以提高检测率
      });
      
      // 立即执行一次检测
      doRealDetection();
      
      // 每300ms检测一次
      faceDetectionInterval = setInterval(async function() {
        if (!cameraStream) {
          clearInterval(faceDetectionInterval);
          faceDetectionInterval = null;
          faceDetectionRunning = false;
          return;
        }
        await doRealDetection();
      }, 300);
      
      async function doRealDetection() {
        if (!video.videoWidth || !video.videoHeight) return;
        if (video.paused || video.ended) return;
        
        try {
          // 根据视频分辨率调整检测canvas大小
          const maxSize = 512;
          let targetWidth, targetHeight;
          if (video.videoWidth > video.videoHeight) {
            targetWidth = Math.min(video.videoWidth, maxSize);
            targetHeight = Math.round(video.videoHeight * (targetWidth / video.videoWidth));
          } else {
            targetHeight = Math.min(video.videoHeight, maxSize);
            targetWidth = Math.round(video.videoWidth * (targetHeight / video.videoHeight));
          }
          
          detectCanvas.width = targetWidth;
          detectCanvas.height = targetHeight;
          ctx.drawImage(video, 0, 0, targetWidth, targetHeight);
          
          // 使用 face-api.js 检测人脸
          const detections = await faceapi.detectAllFaces(detectCanvas, detectorOptions);
          
          // 清除旧的人脸框
          const oldFaceBoxes = overlay.querySelectorAll('.face-box-item');
          oldFaceBoxes.forEach(box => box.remove());
          
          if (detections && detections.length > 0) {
            // 检测到人脸
            detections.forEach((detection, index) => {
              const box = detection.box;
              
              // 计算在视频中的原始位置
              const videoX = (box.x / targetWidth) * video.videoWidth;
              const videoY = (box.y / targetHeight) * video.videoHeight;
              const videoW = (box.width / targetWidth) * video.videoWidth;
              const videoH = (box.height / targetHeight) * video.videoHeight;
              
              console.log('检测到人脸', index, '坐标:', videoX, videoY, videoW, videoH);
              
              // 随机分配顾客（可优化为基于特征匹配）
              const randomCustomer = customers[index % customers.length];
              
              // 创建人脸框元素
              const faceBox = document.createElement('div');
              faceBox.className = 'face-box-item absolute border-2 border-green-400 transition-all duration-150';
              faceBox.dataset.videoX = videoX;
              faceBox.dataset.videoY = videoY;
              faceBox.dataset.videoW = videoW;
              faceBox.dataset.videoH = videoH;
              faceBox.dataset.customerId = randomCustomer.id;
              
              overlay.appendChild(faceBox);
              
              // 立即更新位置
              updateFaceBoxPosition(faceBox, videoX, videoY, videoW, videoH, video.videoWidth, video.videoHeight, randomCustomer);
            });
            
            // 更新识别结果
            result.classList.remove('hidden');
            const topDetection = detections[0];
            const topCustomer = customers[0];
            if (detectedName) {
              detectedName.innerHTML = '<span class="text-green-400">✓ 检测到 ' + detections.length + ' 人 | ' + topCustomer.name +
                ' <span class="text-xs text-gray-400">(' + (topDetection.score * 100).toFixed(0) + '%)</span></span>';
            }
          } else {
            // 未检测到人脸
            if (detectedName) {
              detectedName.innerHTML = '<span class="text-gray-400">未检测到人脸...</span>';
            }
          }
        } catch (error) {
          console.error('人脸检测错误:', error);
          if (detectedName) {
            detectedName.innerHTML = '<span class="text-red-400">检测出错</span>';
          }
        }
      }
    }
    
    // 更新人脸框位置
    function updateFaceBoxPosition(faceBox, videoX, videoY, videoW, videoH, videoWidth, videoHeight, customer) {
      const containerEl = faceBox.parentElement;
      const containerRect = containerEl.getBoundingClientRect();
      
      const containerWidth = containerRect.width;
      const containerHeight = containerRect.height;
      
      const containerRatio = containerWidth / containerHeight;
      const videoRatio = videoWidth / videoHeight;
      
      let displayWidth, displayHeight, offsetX, offsetY;
      
      if (videoRatio > containerRatio) {
        displayWidth = containerWidth;
        displayHeight = containerWidth / videoRatio;
        offsetX = 0;
        offsetY = (containerHeight - displayHeight) / 2;
      } else {
        displayHeight = containerHeight;
        displayWidth = containerHeight * videoRatio;
        offsetX = (containerWidth - displayWidth) / 2;
        offsetY = 0;
      }
      
      const scaleX = displayWidth / videoWidth;
      const scaleY = displayHeight / videoHeight;
      
      const faceX = offsetX + videoX * scaleX;
      const faceY = offsetY + videoY * scaleY;
      const faceW = videoW * scaleX;
      const faceH = videoH * scaleY;
      
      const leftPercent = (faceX / containerWidth) * 100;
      const topPercent = (faceY / containerHeight) * 100;
      const widthPercent = (faceW / containerWidth) * 100;
      const heightPercent = (faceH / containerHeight) * 100;
      
      faceBox.style.left = leftPercent + '%';
      faceBox.style.top = topPercent + '%';
      faceBox.style.width = widthPercent + '%';
      faceBox.style.height = heightPercent + '%';
      faceBox.style.boxShadow = '0 0 0 2px rgba(16, 185, 129, 0.3)';
      
      const customerOrders = orders.filter(o => o.customerId === customer.id);
      const pendingOrder = customerOrders.find(o => o.status === 'pending');
      const paidOrder = customerOrders.find(o => o.status === 'paid');
      
      faceBox.innerHTML = `
        <div class="absolute -top-1 -left-1 w-5 h-5 border-l-4 border-t-4 border-green-400"></div>
        <div class="absolute -top-1 -right-1 w-5 h-5 border-r-4 border-t-4 border-green-400"></div>
        <div class="absolute -bottom-1 -left-1 w-5 h-5 border-l-4 border-b-4 border-green-400"></div>
        <div class="absolute -bottom-1 -right-1 w-5 h-5 border-r-4 border-b-4 border-green-400"></div>
        <div class="absolute -top-8 left-0 bg-green-500/90 text-white text-xs px-2 py-1 rounded font-bold whitespace-nowrap">
          ✓ ${customer.name}
        </div>
        ${pendingOrder ? `
          <div class="absolute -bottom-20 left-0 right-0 bg-yellow-500/90 text-white text-xs px-2 py-1.5 rounded whitespace-nowrap">
            🟡 待支付 ¥${formatPrice(pendingOrder.totalAmount)}
            <br>${pendingOrder.items.map(i => i.name + ' x' + i.quantity).join(', ')}
          </div>
        ` : paidOrder ? `
          <div class="absolute -bottom-16 left-0 right-0 bg-green-500/90 text-white text-xs px-2 py-1.5 rounded whitespace-nowrap">
            ✅ 已支付 ¥${formatPrice(paidOrder.totalAmount)}
          </div>
        ` : ''}
      `;
    }
    
    let mouthOpenHistory = [];
    
    function detectSpeakingFace(detections) {
      if (!isSpeakingAudio && currentAudioEnergy < 15) {
        if (mouthOpenHistory.length > 0) {
          mouthOpenHistory = [];
        }
        return -1;
      }
      
      let bestScore = 0;
      let speakingIndex = -1;
      
      detections.forEach((detection, index) => {
        if (!detection.landmarks) return;
        
        const landmarks = detection.landmarks.positions;
        if (!landmarks || landmarks.length < 68) return;
        
        const upperLip = landmarks[62];
        const lowerLip = landmarks[66];
        const leftCorner = landmarks[60];
        const rightCorner = landmarks[64];
        
        const mouthHeight = Math.abs(lowerLip.y - upperLip.y);
        const mouthWidth = Math.abs(rightCorner.x - leftCorner.x);
        const faceHeight = detection.box.height;
        
        const mouthOpenRatio = mouthHeight / mouthWidth;
        const normalizedOpenness = mouthOpenRatio * (faceHeight / 100);
        
        const mouthScore = normalizedOpenness > 0.3 ? normalizedOpenness : 0;
        const audioBonus = isSpeakingAudio ? 0.5 : 0;
        const totalScore = mouthScore + audioBonus;
        
        if (totalScore > bestScore) {
          bestScore = totalScore;
          speakingIndex = index;
        }
      });
      
      if (mouthOpenHistory.length > 5) mouthOpenHistory.shift();
      mouthOpenHistory.push(speakingIndex);
      
      const counts = {};
      mouthOpenHistory.forEach(idx => {
        if (idx >= 0) counts[idx] = (counts[idx] || 0) + 1;
      });
      
      let mostFrequent = -1;
      let maxCount = 0;
      Object.entries(counts).forEach(([idx, count]) => {
        if (count > maxCount) {
          maxCount = count;
          mostFrequent = parseInt(idx);
        }
      });
      
      const confidenceThreshold = isSpeakingAudio ? 2 : 3;
      return maxCount >= confidenceThreshold ? mostFrequent : -1;
    }
    
    function trackFaces(newDetections, oldTracks, customers, speakingIndex = -1) {
      const newTracks = [];
      const usedCustomers = new Set();
      const matchedTrackIds = new Set();
      
      newDetections.forEach((detection, detIndex) => {
        const newBox = detection.box;
        let bestMatch = null;
        let minDistance = Infinity;
        
        oldTracks.forEach(track => {
          if (matchedTrackIds.has(track.id)) return;
          if (usedCustomers.has(track.customer.id)) return;
          
          const oldBox = track.box;
          const centerX1 = oldBox.x + oldBox.width / 2;
          const centerY1 = oldBox.y + oldBox.height / 2;
          const centerX2 = newBox.x + newBox.width / 2;
          const centerY2 = newBox.y + newBox.height / 2;
          const distance = Math.sqrt(Math.pow(centerX2 - centerX1, 2) + Math.pow(centerY2 - centerY1, 2));
          
          if (distance < minDistance && distance < 100) {
            minDistance = distance;
            bestMatch = track;
          }
        });
        
        if (bestMatch) {
          matchedTrackIds.add(bestMatch.id);
          usedCustomers.add(bestMatch.customer.id);
          newTracks.push({
            ...bestMatch,
            box: newBox,
            isSpeaking: detIndex === speakingIndex
          });
        }
      });
      
      const availableCustomers = customers.filter(c => !usedCustomers.has(c.id));
      
      newDetections.forEach((detection, detIndex) => {
        const newBox = detection.box;
        
        let alreadyMatched = false;
        newTracks.forEach(track => {
          const trackBox = track.box;
          const centerX1 = trackBox.x + trackBox.width / 2;
          const centerY1 = trackBox.y + trackBox.height / 2;
          const centerX2 = newBox.x + newBox.width / 2;
          const centerY2 = newBox.y + newBox.height / 2;
          const distance = Math.sqrt(Math.pow(centerX2 - centerX1, 2) + Math.pow(centerY2 - centerY1, 2));
          
          if (distance < 50) {
            alreadyMatched = true;
          }
        });
        
        if (!alreadyMatched) {
          let newCustomer = availableCustomers.shift();
          if (!newCustomer) {
            newCustomer = customers[newTracks.length % customers.length];
          }
          usedCustomers.add(newCustomer.id);
          newTracks.push({
            box: newBox,
            customer: newCustomer,
            id: Date.now() + Math.random(),
            isSpeaking: detIndex === speakingIndex
          });
        }
      });
      
      return newTracks;
    }
    
    // 模拟人脸检测（fallback）
    function startSimulatedFaceDetection(video, overlay, result, detectedName) {
      // 立即执行一次检测
      doSimulatedDetection();
      
      // 每2.5秒检测一次
      faceDetectionInterval = setInterval(function() {
        if (!cameraStream) {
          clearInterval(faceDetectionInterval);
          faceDetectionInterval = null;
          faceDetectionRunning = false;
          return;
        }
        doSimulatedDetection();
      }, 2500);
      
      function doSimulatedDetection() {
        const faceDetected = Math.random() > 0.4;
        
        if (faceDetected) {
          const randomCustomer = customers[Math.floor(Math.random() * customers.length)];
          
          const faceSizePercent = 20 + Math.random() * 15;
          const leftPercent = 15 + Math.random() * 55;
          const topPercent = 15 + Math.random() * 40;
          
          updateFaceBox(overlay, leftPercent, topPercent, faceSizePercent, faceSizePercent * 1.2, randomCustomer);
          
          result.classList.remove('hidden');
          if (detectedName) {
            detectedName.innerHTML = '<span class="text-green-400">✓ 识别成功！欢迎 ' + randomCustomer.name + '</span>';
          }
        }
      }
    }
    
    // 更新人脸框DOM元素
    function updateFaceBox(overlay, leftPercent, topPercent, widthPercent, heightPercent, customer) {
      if (!overlay) return;
      
      let faceBox = document.getElementById('ar-face-box');
      if (!faceBox) {
        faceBox = document.createElement('div');
        faceBox.id = 'ar-face-box';
        faceBox.className = 'face-box-item absolute border-2 border-green-400';
        faceBox.style.transition = 'all 0.15s ease-out';
        overlay.appendChild(faceBox);
      }
      faceBox.dataset.customerId = customer.id;
      
      faceBox.style.left = leftPercent + '%';
      faceBox.style.top = topPercent + '%';
      faceBox.style.width = widthPercent + '%';
      faceBox.style.height = heightPercent + '%';
      faceBox.style.boxShadow = '0 0 0 2px rgba(16, 185, 129, 0.3)';
      
      const customerOrders = orders.filter(o => o.customerId === customer.id);
      const pendingOrder = customerOrders.find(o => o.status === 'pending');
      const paidOrder = customerOrders.find(o => o.status === 'paid');
      
      faceBox.innerHTML = `
        <div class="absolute -top-1 -left-1 w-5 h-5 border-l-4 border-t-4 border-green-400"></div>
        <div class="absolute -top-1 -right-1 w-5 h-5 border-r-4 border-t-4 border-green-400"></div>
        <div class="absolute -bottom-1 -left-1 w-5 h-5 border-l-4 border-b-4 border-green-400"></div>
        <div class="absolute -bottom-1 -right-1 w-5 h-5 border-r-4 border-b-4 border-green-400"></div>
        <div class="absolute -top-8 left-0 bg-green-500/90 text-white text-xs px-2 py-1 rounded font-bold whitespace-nowrap">
          ✓ 已识别: ${customer.name}
        </div>
        ${pendingOrder ? `
          <div class="absolute -bottom-20 left-0 right-0 bg-yellow-500/90 text-white text-xs px-2 py-1.5 rounded whitespace-nowrap">
            🟡 待支付 ¥${formatPrice(pendingOrder.totalAmount)}
            <br>${pendingOrder.items.map(i => i.name + ' x' + i.quantity).join(', ')}
          </div>
        ` : paidOrder ? `
          <div class="absolute -bottom-16 left-0 right-0 bg-green-500/90 text-white text-xs px-2 py-1.5 rounded whitespace-nowrap">
            ✅ 已支付 ¥${formatPrice(paidOrder.totalAmount)}
          </div>
        ` : ''}
      `;
    }
