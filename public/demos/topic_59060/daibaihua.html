<!doctype html>
<!-- 大白话 · 语言陷阱解码器 · 形态 C 单文件版（doc/05-ops.md §5.6）
     纯手写 HTML+CSS+JS，零框架依赖，file:// 双击即跑。
     两个占位符由注入脚本替换：DATA（8 seed × 3 tone）、SEEDS（chip 列表）。 -->
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>大白话 · 语言陷阱解码器</title>
<style>
/* ─── 主题 token（匹配 src/app/globals.css）─── */
:root, [data-theme="dark"] {
  --stage:#15110d; --stage-2:#1d1813; --stage-3:#2c241c;
  --paper:#f4ecd9; --paper-2:#ebe1ca;
  --ink:#1a1612; --ink-2:#4a4239; --ink-3:#8a7f70;
  --fg:#f4ecd9;
  --stamp:#d6452c; --stamp-deep:#b8362a;
  --gold:#c8a96a; --ink-blue:#3a5a8a;
  --bg-glow:#221a13;
  color-scheme: dark;
}
[data-theme="light"] {
  --stage:#ece3cc; --stage-2:#e0d5b8; --stage-3:#cdbf9c;
  --paper:#ffffff; --paper-2:#f4ecd9;
  --ink:#1a1612; --ink-2:#524a40; --ink-3:#756a5a;
  --fg:#1a1612;
  --stamp:#c4362a; --stamp-deep:#a22a20;
  --gold:#9a8038; --ink-blue:#2a4a7a;
  --bg-glow:#f5eed8;
  color-scheme: light;
}
* { box-sizing: border-box; }
html { background: var(--stage); }
body {
  margin: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%, var(--bg-glow) 0%, transparent 60%),
    var(--stage);
  color: var(--fg);
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",sans-serif;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
::selection { background: var(--stamp); color: var(--paper); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--stage); }
::-webkit-scrollbar-thumb { background: var(--stage-3); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-2); }

.mono { font-family: ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
.serif { font-family: "Songti SC","STSong","Source Han Serif SC","Noto Serif SC",serif; }
.hand { font-family: "Kaiti SC","STKaiti","Marker Felt","Bradley Hand","Comic Sans MS",cursive; }

/* ─── 布局 ─── */
.wrap { max-width: 760px; margin: 0 auto; padding: 0 24px; }
header.site { border-bottom: 1px solid var(--stage-3); padding: 32px 0; }
header.site .kicker {
  font-family: ui-monospace,"SF Mono",Menlo,monospace;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.4em; color: var(--ink-3);
}
header.site h1 {
  font-family: "Songti SC","STSong",serif;
  font-size: 48px; font-weight: 900; letter-spacing: 0.12em;
  margin: 8px 0 0; color: var(--fg); display: inline;
}
header.site .badge {
  display: inline-block; vertical-align: middle; margin-left: 10px;
  background: var(--stamp); color: var(--paper);
  font-family: ui-monospace,monospace; font-size: 10px; font-weight: 500;
  letter-spacing: 0.25em; padding: 4px 6px; border-radius: 2px;
}
header.site p { margin: 12px 0 0; font-size: 14px; line-height: 1.6; color: var(--ink-3); }
header.site p .gold-c { color: var(--gold); }

#theme-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 50;
  background: var(--stage-2); color: var(--fg);
  border: 1px solid var(--stage-3);
  font-family: ui-monospace,monospace; font-size: 11px; letter-spacing: 0.15em;
  padding: 6px 10px; cursor: pointer; border-radius: 2px;
}
#theme-toggle:hover { border-color: var(--stamp); color: var(--stamp); }

/* ─── 输入区 ─── */
section.input { padding: 24px 0; }
textarea#text {
  width: 100%; resize: none;
  background: var(--stage-2); color: var(--fg);
  border: 1px solid var(--stage-3);
  padding: 12px; font-size: 14px; line-height: 1.6;
  font-family: inherit; border-radius: 2px; min-height: 110px;
}
textarea#text:focus { outline: none; border-color: var(--stamp); }
textarea#text::placeholder { color: var(--ink-3); }
.meta {
  margin-top: 6px; display: flex; align-items: center; justify-content: space-between;
  font-family: ui-monospace,monospace; font-size: 10px; color: var(--ink-3);
}
.meta .right { display: flex; align-items: center; gap: 12px; }
.tones { display: flex; gap: 4px; }
.tones button, .btn-decode, .seeds button {
  font-family: ui-monospace,monospace; cursor: pointer; border-radius: 2px;
  border: 1px solid transparent; transition: all 0.15s;
}
.tones button {
  background: var(--stage-3); color: var(--ink-3);
  padding: 4px 8px; font-size: 11px; letter-spacing: 0.15em; border: 0;
}
.tones button:hover { color: var(--fg); }
.tones button.active { background: var(--stamp); color: var(--paper); }
.tones button:disabled, .btn-decode:disabled, .seeds button:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-decode {
  background: var(--stamp); color: var(--paper);
  padding: 6px 16px; font-size: 11px; letter-spacing: 0.2em; border: 0;
}
.btn-decode:hover:not(:disabled) { background: var(--stamp-deep); }
.seeds { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
.seeds button {
  background: var(--stage-2); color: var(--ink-3);
  border: 1px solid var(--stage-3);
  padding: 4px 8px; font-size: 11px;
}
.seeds button:hover:not(:disabled) { border-color: var(--stamp); color: var(--fg); }

/* ─── 结果区 ─── */
section.result { padding: 0 0 80px; }
.accusation { border-left: 2px solid var(--stamp); padding-left: 12px; margin-bottom: 16px; }
.accusation .meta-line {
  font-family: ui-monospace,monospace; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.3em; color: var(--ink-3);
}
.accusation .text { font-size: 14px; color: var(--fg); margin-top: 4px; }

.loading { padding: 64px 0; text-align: center; }
.loading .kicker {
  font-family: ui-monospace,monospace; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.4em; color: var(--ink-3);
}
.loading .pulse { margin-top: 12px; font-size: 18px; color: var(--gold); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.55} 50%{opacity:1} }
.loading .hint { margin-top: 8px; font-size: 11px; color: var(--ink-3); }

.disclaimer { text-align: center; font-size: 11px; color: var(--ink-3); margin-top: 16px; }

.idle-card {
  border: 1px dashed var(--stage-3); padding: 32px; text-align: center; color: var(--ink-3);
}
.idle-card .big { font-size: 14px; margin-bottom: 8px; }
.idle-card .small { font-size: 11px; }
.idle-card.warn { border-color: var(--gold); color: var(--gold); }

/* ─── 伪造件通用 ─── */
.paper {
  position: relative; background: var(--paper); color: var(--ink);
  margin: 0 auto; max-width: 480px;
  box-shadow: 0 30px 80px -25px rgba(0,0,0,0.75);
  outline: 1px solid rgba(0,0,0,0.1);
}
.paper.w-narrow { max-width: 400px; }
.paper.w-mid { max-width: 560px; }
.paper.w-wide { max-width: 640px; }
.paper.p-5 { padding: 20px; }
.paper.p-6 { padding: 24px; }
.paper.p-7 { padding: 28px; }
.dash { margin: 12px 0; border-top: 1px dashed rgba(26,22,18,0.3); }

.ink { color: var(--ink); } .ink-2 { color: var(--ink-2); } .ink-3 { color: var(--ink-3); }
.stamp-c { color: var(--stamp); } .stamp-deep-c { color: var(--stamp-deep); }
.gold-c { color: var(--gold); } .blue-c { color: var(--ink-blue); }

.k { font-family: ui-monospace,monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--ink-3); }

@keyframes stamp-in {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.stamp-in { animation: stamp-in 0.28s ease-out backwards; }

.watermark {
  pointer-events: none; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 0;
}
.watermark span {
  font-size: 42px; font-weight: 700; letter-spacing: 0.3em;
  color: rgba(214,69,44,0.07); transform: rotate(-28deg);
  white-space: nowrap; user-select: none;
}
.paper > .body { position: relative; z-index: 1; }

.round-stamp {
  position: absolute; right: -12px; top: 24px; z-index: 2;
  width: 78px; height: 78px; border-radius: 50%;
  border: 3px solid var(--stamp); color: var(--stamp);
  display: flex; align-items: center; justify-content: center;
  transform: rotate(-12deg); pointer-events: none;
  animation: round-in 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.95s backwards;
}
@keyframes round-in {
  from { opacity: 0; transform: rotate(-22deg) scale(1.6); }
  to { opacity: 1; transform: rotate(-12deg) scale(1); }
}
.round-stamp span { font-size: 11px; font-weight: 700; text-align: center; line-height: 1.3; }

/* 发疯贴纸：金色手写、旋转 -7deg、弹簧入场 */
.unhinged-sticker {
  position: absolute; top: -16px; left: 50%; margin-left: -70px;
  background: var(--gold); color: var(--ink);
  font-family: "Kaiti SC","STKaiti","Marker Felt","Bradley Hand",cursive;
  font-weight: 900; font-size: 20px; letter-spacing: 4px;
  padding: 6px 16px; box-shadow: 0 6px 16px rgba(0,0,0,0.45);
  z-index: 10; transform-origin: top center;
  animation: sticker-bounce 0.6s cubic-bezier(0.34,1.8,0.64,1);
}
@keyframes sticker-bounce {
  0%   { opacity: 0; transform: rotate(-30deg) scale(2.2) translateY(-20px); }
  55%  { opacity: 1; transform: rotate(-2deg) scale(1.12) translateY(0); }
  100% { opacity: 1; transform: rotate(-7deg) scale(1) translateY(0); }
}

/* Receipt */
.receipt-row { display: flex; justify-content: space-between; gap: 8px; }
.receipt-row .k-v { color: var(--ink-3); }
.receipt-row .v { text-align: right; }
.receipt-row .v.hl { font-weight: 700; color: var(--stamp); }
.barcode { display: flex; align-items: flex-end; justify-content: center; gap: 2px; height: 32px; }
.barcode i { display: inline-block; background: var(--ink); width: 2px; }

/* LabReport 表格 */
.lab-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.lab-table th { text-align: left; font-weight: 400; font-size: 11px; color: var(--ink-3); padding: 4px 8px 4px 0; border-bottom: 1px solid rgba(26,22,18,0.4); }
.lab-table td { padding: 6px 8px 6px 0; border-bottom: 1px solid rgba(26,22,18,0.15); vertical-align: top; }
.lab-table td.t { font-weight: 600; color: var(--ink-blue); }

/* 风险等级 */
.risk-tag { font-size: 11px; font-weight: 600; }
.risk-high { color: var(--stamp); } .risk-medium { color: var(--gold); } .risk-low { color: var(--ink-blue); }

/* finance trick 标签 */
.trick-tag { background: var(--stamp); color: var(--paper); padding: 1px 4px; font-size: 10px; border-radius: 2px; }

/* clarity 标签 */
.clarity-tag { display: inline-block; padding: 2px 6px; font-size: 10px; border-radius: 2px; }
.clarity-jargon { background: var(--stamp); color: var(--paper); }
.clarity-vague { background: var(--gold); color: var(--ink); }
.clarity-clear { background: var(--ink-blue); color: var(--paper); }

/* Gist 卡片头 */
.gist-head { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 1px solid rgba(26,22,18,0.15); background: var(--paper-2); font-size: 11px; color: var(--ink-3); }
.gist-dots { display: flex; gap: 6px; }
.gist-dots i { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
pre.corecode { background: var(--stage); color: var(--paper-2); padding: 12px; font-size: 12px; overflow-x: auto; margin: 0; font-family: ui-monospace,monospace; }

/* BattleBrief 武器行 */
.weapon-row { display: flex; align-items: flex-start; gap: 8px; border: 1px solid rgba(26,22,18,0.2); padding: 8px; }
.weapon-label { flex-shrink: 0; background: var(--ink-blue); color: var(--paper); padding: 2px 6px; font-size: 10px; border-radius: 2px; }
.weapon-text { flex: 1; font-size: 13px; color: var(--ink); }
.weapon-copy { flex-shrink: 0; padding: 2px 6px; font-family: ui-monospace,monospace; font-size: 9px; letter-spacing: 1px; cursor: pointer; border: 0; border-radius: 2px; }
.weapon-copy.idle { background: rgba(26,22,18,0.1); color: var(--ink-3); }
.weapon-copy.idle:hover { background: rgba(26,22,18,0.2); color: var(--ink); }
.weapon-copy.copied { background: var(--ink-blue); color: var(--paper); }
.weapon-copy.failed { background: var(--stamp); color: var(--paper); }

/* RedHeader 红头 */
.red-header .title { font-size: 24px; font-weight: 700; letter-spacing: 0.3em; color: var(--stamp); text-align: center; }
.red-header .line-thick { height: 3px; background: var(--stamp); margin: 8px 0 2px; }
.red-header .line-thin { height: 1px; background: var(--stamp); }

/* 通用工具 */
.flex-between { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.flex-items { display: flex; align-items: baseline; gap: 8px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.col-span-2 { grid-column: span 2; }
.border-l-stamp { border-left: 2px solid rgba(214,69,44,0.5); padding-left: 12px; }
.border-l-ink { border-left: 2px solid rgba(26,22,18,0.3); padding-left: 12px; }
.border-l-blue { border-left: 2px solid rgba(58,90,138,0.5); padding-left: 12px; }
.border-l-stamp-deep { border-left: 2px solid rgba(214,69,44,0.6); padding-left: 12px; }
.box-stamp { border: 1px solid rgba(214,69,44,0.5); padding: 12px; background: rgba(214,69,44,0.06); }
.box-stamp-2 { border: 1px solid rgba(214,69,44,0.6); padding: 12px; }
.box-stamp-deep { border: 2px solid var(--stamp); background: rgba(214,69,44,0.08); padding: 12px; }
.box-blue { border: 1px solid rgba(58,90,138,0.5); padding: 12px; background: rgba(58,90,138,0.06); }
.italic { font-style: italic; }
.semibold { font-weight: 600; }
.bold { font-weight: 700; }
.strike { text-decoration: line-through; text-decoration-color: rgba(214,69,44,0.6); }
.text-center { text-align: center; }
.pre-line { white-space: pre-line; }
.hype-big { font-size: 48px; font-weight: 700; }
.hype-suf { font-size: 18px; }
.lg { font-size: 14px; } .md { font-size: 13px; } .sm { font-size: 12px; }
.xs { font-size: 11px; } .xxs { font-size: 10px; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; }
.mb-2 { margin-bottom: 8px; }
.col-gap-1 > * + * { margin-top: 4px; }
.col-gap-2 > * + * { margin-top: 8px; }
.col-gap-3 > * + * { margin-top: 12px; }
</style>
</head>
<body>
<button id="theme-toggle" title="切换主题">暖米</button>

<header class="site">
  <div class="wrap">
    <div class="kicker">Case File · 语言陷阱档案馆</div>
    <div class="flex-items" style="margin-top:8px">
      <h1>大白话</h1><span class="badge">解码器</span>
    </div>
    <p>把营销话术 / 医疗天书 / 职场黑话，<span class="gold-c">翻译成人话「诚实文件」</span>。</p>
  </div>
</header>

<section class="input">
  <div class="wrap">
    <textarea id="text" placeholder="点下方 chip 选一段样本，或粘贴营销话术 / 体检报告 / 职场通知 / 用户协议 / 政策条文…" maxlength="3000"></textarea>
    <div class="meta">
      <span><span id="count">0</span> / 3000</span>
      <div class="right">
        <div class="tones" id="tones">
          <button data-tone="gentle">温柔</button>
          <button data-tone="sharp" class="active">犀利</button>
          <button data-tone="unhinged">发疯</button>
        </div>
        <button class="btn-decode" id="decode">解 码</button>
      </div>
    </div>
    <div class="seeds" id="seeds"></div>
  </div>
</section>

<section class="result">
  <div class="wrap" id="result">
    <div class="idle-card">
      <div class="big">点上方 chip 选一段样本开始解码</div>
      <div class="small">演示版预烘焙 8 条 seed × 3 种腔调，离线秒回</div>
    </div>
  </div>
</section>

<script>

:"操控密度","value":80,"raw":"4 种操控手法","band":"重度"},"breakdown":{"decoder":"pua","rows":[{"quote":"我这么说还不是为了你好，别人我才懒得管。","tactic":"条件式付出","expose":"包装圣人以压制你"},{"quote":"你看看你自己，工作一般长相也普通，除了我谁还能受得了你这个脾气？","tactic":"贬低打压 + 孤立切断","expose":"摧毁你的价值与社交支持，迫使你依附于他"},{"quote":"你要是因为这点事跟我吵架，就是不知好歹，我把你当回事你倒蹬鼻子上脸了。","tactic":"愧疚绑架","expose":"把你正常的情绪反应定罪，制造你的错与他的对"},{"quote":"我朋友都说你这性格，换个人早受不了了。","tactic":"外部背书","expose":"引用外部‘权威’来证明你的缺陷，让你陷入自我怀疑"}]},"weaponLibrary":{"gentle":"“我听得见你的‘为你好’，但我更想听你自己说。你这样贬低我，会让我觉得我不值信任。”","sharp":"“你所谓的‘为我好’里藏的都是控制：贬低、比较、道德绑架。真正的关心不会用别人的嘴来压我。”","unhinged":"“你说谁受得了我？那就让全世界看看你是谁，别把自己当救主了——我受不受不了我自己说了算！”"},"steps":[{"text":"暂停自我辩护，拒绝进入他设定的‘谁对谁错’游戏","pitfall":"注意对方会立即转换话题到另一个控制点"},{"text":"对‘为你好’直接说：‘你的关心我收下了，但你对我这样说话让我感到受伤。请换一种方式表达。'","pitfall":"他可能用愧疚继续拖着你回应"},{"text":"对贬低与外部背书：‘你拿我的工作、外貌和朋友的话来比较我，这不是爱，是操控。'","pitfall":"他可能说‘我只是开玩笑’来绕开正题，保持你的严肃立场"},{"text":"若继续贬损，平静但坚定地离开对话现场；真正爱你的人会尊重你的边界","pitfall":"注意不要被他拉入‘你这样我会很伤心’的道德勒索"}],"shield":"当他说‘都是为我好’，你不必承认他是对的——‘为你好’里夹杂贬低比较和道德勒索，就不是真的关心。你可以：一、停止自我辩护，把情绪责任交还给他；二、守住边界：‘我不需要向任何人证明他的观点是对的。我清楚自己需要什么，他对我说的这些只是操控。’若对方继续用‘你这样让我没法跟你说话’来挟持你，告诉他：‘你的感受很重要。但如果持续对我这样，我会停止这段对话。’必要时直接离开现场——真正关心你的人不会用言语压毁你的意志。","confidence":{"disclaimer":"本分析仅基于您提供的文本，不构成专业心理或法律诊断。若对话升级为暴力、胁迫或严重情绪伤害，请优先联系警方（110）、妇联维权热线（12338）或心理援助热线（010-82951332 或全国心理援助热线 400161-5515）。","sourceNote":"[隐蔽操控解码器·温柔版]"}},"sharp":{"decoder":"pua","codename":"隐蔽操控解码器","tone":"sharp","verdict":"这不是关心，这是用打压和牺牲感把你架在感恩的椅子上","headlineMetric":{"label":"操控密度","value":100,"raw":"6 种操控手法","band":"危险"},"breakdown":{"decoder":"pua","rows":[{"quote":"除了我谁还能受得了你这个脾气？","tactic":"唯一性绑架 (Uniqueness Binding)","expose":"用打压贬低把你逼成只会顺从的受害者。这不是关心，是把你自我价值踩进泥里再踩实，让你觉得自己离不开对方的‘忍受’"},{"quote":"我朋友都说你这性格，换个人早受不了了","tactic":"借第三方的嘴实施打压","expose":"拿第三方的嘴当武器，用他们的话来孤立你。把你自己塑造成‘有问题的人’，把操控伪装成社交义务"},{"quote":"我这么说还不是为了你好，别人我才懒得管","tactic":"借关心实施情感勒索","expose":"自居为牺牲者，把自己塑造成唯一宽容你的人。任何‘不理解’被重构为忘恩负义，把情感绑架包装成理所当然"},{"quote":"你看看你自己，工作一般长相也普通","tactic":"贬低打压 + 外貌羞辱 (Belittling)","expose":"贬低外貌和工作，这是最廉价的情感打压。制造‘只有我能忍受你’的虚假优越感，让你为他的‘包容’持续感恩顺从"},{"quote":"你倒蹬鼻子上脸了","tactic":"情绪勒索 + 贬低打压","expose":"把正常争吵定义为‘不知好歹’。这完全无视你的感受和边界，是控制欲的外衣——对方不想听你对话题的看法，只想让你觉得‘我为你好所以你不能说我不对'"},{"quote":"你要是因为这点事跟我吵架","tactic":"情绪勒索 (Emotional Blackmail)","expose":"这是最赤裸的情绪勒索。吵架不是因为你‘不知好歹’，是因为你在维护边界。他说你蹬鼻子上脸——翻译一下就是：你不能对他说‘不’"}]},"weaponLibrary":{"gentle":"你说为我好，可尊重不是建立在贬低上。你愿意帮我解决问题，而不是制造我的问题，我才能相信这话是真的；而且别人也值得喜欢——我不需要你‘是唯一’的证明。","sharp":"谁还能受得了你这个脾气——除了你吗？既然别人都怕你的脾气，你凭什么觉得我离不开你？蹬鼻子上脸的是把话当控制，不是把对话当理解。","unhinged":"你把我当回事？把‘我这么对你’当回事。下次吵架先别甩话，直接说事；别拿别人压我，也别拿我的感受当借口——我受不起这种控制，哪怕你说为了好也一样"},"steps":[{"text":"先标记对方话语中的攻击成分为情绪而非事实。把那些话翻译成‘他们在发泄/掌控情绪’，而不是‘我在被否定’","pitfall":"标记情绪是好事，但还要给自己时间消化；别立刻用‘他在发泄’去合理化对方后续贬低，情绪不等于许可"},{"text":"对唯一性绑架给出简短回应：‘我值得别人喜欢和尊重，你不需要是我的唯一，这反而说明你对我有更高期望。’然后坚持不被‘谁还能受得了你’牵着走","pitfall":"这句反击能稳住边界，别指望立刻让对方承认自己不对；若对方继续拉黑/翻旧账，及时抽离对话场景"}],"shield":"停止把自我价值绑定在对方的嘴上。他们说的是他们的叙事，不反映客观——工作有起伏、长相无价、脾气是真实感受。别接招这种叙事陷阱，守住三条边：‘我不接受贬低’‘我的事我自己管’‘吵架要就事不就人’。必要时直接抽离对话场景，用物理距离换取心理空间。","confidence":{"disclaimer":"非专业心理/法律建议，若对方持续贬低、威胁或限制自由涉及人身安全请优先求助专业机构","sourceNote":"仅做信息分析，不构成诊断。若你已离开并寻求支持，请优先联系现实中的可信任亲友或专业援助"}},"unhinged":{"decoder":"pua","codename":"驯兽师剧本","tone":"unhinged","verdict":"你不是在表达关心,而是在通过贬低、孤立和操控愧疚感来让我习惯依赖你并放弃自我,这是一种隐蔽的支配手段","headlineMetric":{"label":"操控密度","value":100,"raw":"5 种操控手法","band":"危险"},"breakdown":{"decoder":"pua","rows":[{"quote":"\"我这么说还不是为了你好，别人我才懒得管\"","tactic":"虚假动机绑架","expose":"你在试图把我不接受你的贬低说成是'为了我好'"},{"quote":"\"你看看你自己，工作一般长相也普通，除了我谁还能受得了你这个脾气\"","tactic":"贬低打压","expose":"你通过列举工作、长相、脾气等负面标签试图给我戴高帽"},{"quote":"\"你要是因为这点事跟我吵架，就是不知好歹\"","tactic":"煤气灯效应","expose":"你把吵架这个正常的表达不满的行为定义为'不知好歹'"},{"quote":"\"我把你当回事你倒蹬鼻子上脸了\"","tactic":"愧疚绑架","expose":"利用'我把你当回事'这句话让我产生亏欠感和自我怀疑"},{"quote":"\"我朋友都说你这性格，换个人早受不了了\"","tactic":"孤立切断","expose":"通过搬出'朋友都说'这个第三方声音来孤立我、否定我的判断"}]},"weaponLibrary":{"gentle":"\"你说的是为我好,但我也能理解自己,不需要通过别人的眼睛定义'好坏'","sharp":"\"我不是为了谁才好好生活,也不是因为你的夸奖才能存在,我是我自己\"","unhinged":"\"你拿朋友说事?你倒是去问问他们我为什么还跟你待在一起——他们可能会说我被PUA了\"。顺便说一句,以后别试图用任何第三方的观点来定义我。我的人生   if (!result) {

    return;
  }
  const html = `
    <div class="accusation">
      <div class="meta-line">${escapeHtml(cls.codename)} · 置信 ${Number(cls.confidence).toFixed(2)}</div>
      <div class="text">${escapeHtml(cls.accusation)}</div>
    </div>
    <div class="forgery">${renderForgery(result, cls.codename, tone)}</div>
    <p class="disclaimer">${escapeHtml(result.confidence && result.confidence.disclaimer || "")}</p>
  `;
  el("result").innerHTML = html;
}

/* ─── 伪造件总入口 ─── */
function renderForgery(result, codename, tone) {
  const dec = result.decoder;
  let inner = "";
  if (dec === "marketing") inner = renderReceipt(result, codename);
  else if (dec === "medical") inner = renderLabReport(result, codename);
  else if (dec === "workplace") inner = renderRedHeader(result, codename);
  else if (dec === "academic") inner = renderGistCard(result, codename);
  else if (dec === "pua") inner = renderBattleBrief(result, codename, tone);
  else if (dec === "legal") inner = renderRiskDisclosure(result, codename);
  else if (dec === "finance") inner = renderProductLabel(result, codename);
  else if (dec === "government") inner = renderPolicyBrief(result, codename);
  else inner = `<div class="paper p-7"><div class="ink">未知 decoder: ${escapeHtml(dec)}</div></div>`;

  /* 发疯档：金色手写贴纸 */
  if (tone === "unhinged") {
    return `<div class="unhinged-sticker">⚠ 发疯档 ⚠</div>` + inner;
  }
  return inner;
}

  return `<div class="paper w-narrow mono p-5 sm" style="line-height:1.7">
    ${stamp(`<div style="border:2px solid var(--ink);padding:8px;text-align:center">
      <div class="xxs" style="letter-spacing:0.3em;text-transform:uppercase;color:var(--ink-2)">金 融 产 品 猫 腥 营 养 表</div>
      <div class="mt-1 xs ink-3">NO. ${escapeHtml(codename)} · ${TODAY}</div>
    </div>`, 0.05)}
    ${dash()}
    ${stamp(`<div class="text-center">
      <div class="xxs" style="letter-spacing:0.2em;text-transform:uppercase">${escapeHtml(headlineMetric.label)}</div>
      <div class="mt-1 stamp-c"><span class="hype-big bold">${escapeHtml(headlineMetric.value)}</span><span class="hype-suf">/100</span></div>
      <div class="sm semibold ink">${escapeHtml(headlineMetric.raw)} · ${escapeHtml(headlineMetric.band)}</div>
    </div>`, 0.12)}
    ${nutSection}
    ${dash()}
    ${stamp(`<div class="lg semibold ink">${escapeHtml(verdict)}</div>`, 0.3)}
    ${dash()}
    ${stamp(`<div class="col-gap-2">
      <div class="k">猫 腥 明 细</div>
      ${trs}
    </div>`, 0.4)}
    ${dash()}
    ${stamp(`<div class="col-gap-1">
      <div class="k">反 推 销 核 对 清 单</div>
      <div class="ink">${escapeHtml(shield)}</div>
    </div>`, 0.55)}
    ${dash()}
    ${stamp(`<div class="col-gap-1">
      <div class="k">行 动</div>
      ${stepRows}
    </div>`, 0.65)}
    ${dash()}
    ${stamp(`<div class="text-center ink-3" style="font-size:9px">${escapeHtml(confidence && confidence.disclaimer || "")}</div>`, 0.75)}
  </div>`;
}

/* ─── 8. government → PolicyBrief 双语对照 ─── */
function renderPolicyBrief(result, codename) {
  const rows = (result.breakdown && result.breakdown.rows) || [];
  const { headlineMetric, verdict, shield, steps, confidence } = result;
  const CLARITY = {
    jargon: { tag: "纯术语", cls: "clarity-jargon" },
    vague: { tag: "模糊", cls: "clarity-vague" },
    clear: { tag: "已直白", cls: "clarity-clear" },
  };
  const trs = rows.map((r) => {
    const c = CLARITY[r.clarity] || CLARITY.vague;
    return `<div class="grid-2 border-l-blue">
      <div>
        <div class="xxs ink-3">原文</div>
        <div class="sm italic ink-2">「${escapeHtml(r.clause)}」</div>
      </div>
      <div>
        <div class="xxs ink-3">人话</div>
        <div class="md ink">${escapeHtml(r.plain)}</div>
        <div class="sm ink-2 mt-1">意味着：${escapeHtml(r.meaning)}</div>
      </div>
      <div class="col-span-2">
        <span class="clarity-tag ${c.cls}">${c.tag}</span>
      </div>
    </div>`;
  }).join("");
  const stepRows = steps.map((s, i) =>
    `<div class="ink">${i+1}. ${escapeHtml(s.text)}${s.pitfall ? `<span class="stamp-deep-c"> ⚠${escapeHtml(s.pitfall)}</span>` : ""}</div>`
  ).join("");

  return `<div class="paper w-wide serif p-7">
    ${stamp(`<div class="text-center" style="border-bottom:2px solid rgba(26,22,18,0.7);padding-bottom:8px">
      <div class="bold ink" style="font-size:20px;letter-spacing:0.2em">政策双语对照解读单</div>
      <div class="mt-1 xs ink-3">编号：DBH-GOV-${escapeHtml(codename)}-${TODAY}</div>
    </div>`, 0.05)}
    ${stamp(`<div class="mt-3 flex-items">
      <span class="k">${escapeHtml(headlineMetric.label)}</span>
      <span class="bold stamp-c" style="font-size:20px">${escapeHtml(headlineMetric.value)}</span>
      <span class="xs ink-2">/100 · ${escapeHtml(headlineMetric.raw)} · ${escapeHtml(headlineMetric.band)}</span>
    </div>`, 0.12)}
    ${dash()}
    ${stamp(`<div class="lg semibold ink">${escapeHtml(verdict)}</div>`, 0.18)}
    ${dash()}
    ${stamp(`<div class="col-gap-3">
      <div class="k">原 文 ← → 人 话</div>
      ${trs}
    </div>`, 0.25)}
    ${dash()}
    ${stamp(`<div class="box-blue">
      <div class="k bold" style="letter-spacing:0.2em;color:var(--ink-blue)">指 路 官 方</div>
      <div class="mt-1 md ink pre-line">${escapeHtml(shield)}</div>
    </div>`, 0.5)}
    ${dash()}
    ${stamp(`<div class="col-gap-1">
      <div class="k">行 动</div>
      ${stepRows}
    </div>`, 0.6)}
    ${dash()}
    ${stamp(`<div class="xxs ink-3">${escapeHtml(confidence && confidence.disclaimer || "")}</div>`, 0.72)}
  </div>`;
}

/* ─── 解码主流程 ─── */
function findEntryByText(text) {
  const t = (text || "").trim();
  return DATA.find((e) => e.text === t) || null;
}

function runDecode(entry, tone) {
  if (!entry) {
    renderIdle("演示版仅含 8 条预烘焙 seed", "请点上方 chip 选一段样本，或把 seed 文本粘进输入框再解码。", true);
    return;
  }
  state.entry = entry;
  state.text = entry.text;
  el("text").value = entry.text;
  el("count").textContent = String(entry.text.length);

  setBusy(true);
  renderLoading(entry.classify && entry.classify.decoder);

  if (state.timer) clearTimeout(state.timer);
  state.timer = setTimeout(() => {
    setBusy(false);
    renderDone(entry, tone);
  }, 450);
}

function onPickSeed(seed) {
  if (state.busy) return;
  setTone("sharp");
  runDecode(seed, "sharp");
}

function onToneChange(t) {
  if (state.busy || t === state.tone) return;
  setTone(t);
  if (state.entry) runDecode(state.entry, t);
}

function onDecodeClick() {
  if (state.busy) return;
  const text = el("text").value;
  const entry = findEntryByText(text);
  if (!entry) {
    renderIdle("演示版仅含 8 条预烘焙 seed", "请点上方 chip 选一段样本，或把 seed 文本粘进输入框再解码。", true);
    return;
  }
  runDecode(entry, state.tone);
}

/* ─── 事件绑定 ─── */
el("text").addEventListener("input", (e) => {
  state.text = e.target.value;
  el("count").textContent = String(e.target.value.length);
});
el("tones").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-tone]");
  if (btn) onToneChange(btn.dataset.tone);
});
el("decode").addEventListener("click", onDecodeClick);
el("seeds").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-id]");
  if (!btn) return;
  const seed = SEEDS.find((s) => s.id === btn.dataset.id);
  if (seed) onPickSeed(seed);
});

/* 武器复制按钮：事件委托（idle → copied / failed） */
el("result").addEventListener("click", async (e) => {
  const btn = e.target.closest("button.weapon-copy");
  if (!btn) return;
  const text = btn.getAttribute("data-weapon") || "";
  const setStateCls = (st) => {
    btn.classList.remove("idle", "copied", "failed");
    btn.classList.add(st);
    btn.textContent = st === "copied" ? "已复制" : st === "failed" ? "复制失败·选中" : "复制";
  };
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }
    setStateCls("copied");
    setTimeout(() => setStateCls("idle"), 1500);
  } catch (err) {
    setStateCls("failed");
    setTimeout(() => setStateCls("idle"), 2500);
  }
});

/* ─── 启动 ─── */
renderSeeds();
</script>
