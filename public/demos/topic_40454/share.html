<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>协作显影卡 — 共创显影 CoCreate Mirror</title>
  <meta name="description" content="把一次完整的人 × AI 协作浓缩为一张可下载的显影卡。" />

  <!-- 全局样式 token -->
  <link rel="stylesheet" href="assets/styles.css" />

  <!-- Noto Sans SC（确保导出 PNG 字体一致） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      background-color: var(--color-bg);
    }

    /* ===== 顶部栏 ===== */
    .share-topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--color-border);
    }
    .share-topbar__inner {
      max-width: 1080px; margin: 0 auto;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .share-topbar__title {
      font-size: 0.95rem; font-weight: 500; color: var(--color-text);
      flex: 1; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ===== 卡片舞台 ===== */
    .share-stage {
      min-height: calc(100vh - 62px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }

    /* 缩放容器：桌面端原尺寸，移动端等比缩放 */
    .share-scale-outer {
      width: 800px; height: 800px;
      flex-shrink: 0;
    }
    .share-scale-inner {
      width: 800px; height: 800px;
      transform-origin: top left;
    }

    .share-loading {
      width: 800px; height: 800px;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary); font-size: 0.95rem;
      background: #fff; border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }

    /* ===== 移动端缩放 ===== */
    @media (max-width: 880px) {
      .share-scale-outer {
        --s: calc((100vw - 48px) / 800);
        width: calc(800px * var(--s));
        height: calc(800px * var(--s));
      }
      .share-scale-inner {
        transform: scale(var(--s));
      }
      .share-topbar__title { display: none; }
    }
    @media (max-width: 480px) {
      .share-stage { padding: 20px 16px; }
      .share-scale-outer {
        --s: calc((100vw - 32px) / 800);
        width: calc(800px * var(--s));
        height: calc(800px * var(--s));
      }
    }
  </style>
</head>

<body>

  <!-- ============ 顶部栏 ============ -->
  <header class="share-topbar">
    <div class="share-topbar__inner">
      <a href="replay.html" class="btn btn-secondary" style="padding:8px 16px;font-size:0.88rem;">
        ← 回到时间轴
      </a>
      <span class="share-topbar__title">协作显影卡</span>
      <button type="button" class="btn btn-primary" id="download-btn" style="padding:8px 18px;font-size:0.88rem;">
        下载 PNG
      </button>
    </div>
  </header>

  <!-- ============ 卡片舞台 ============ -->
  <main class="share-stage">
    <div class="share-scale-outer">
      <div class="share-scale-inner" id="card-mount">
        <div class="share-loading">加载中…</div>
      </div>
    </div>
  </main>

  <!-- card-export.js 提供 CCCard.build / exportCard / showToast -->
  <script src="assets/card-export.js"></script>
  <script>
    (function () {
      'use strict';

      var cardEl = null;

      async function init() {
        var params = new URLSearchParams(location.search);
        var from = params.get('from') || 'sample';

        try {
          var res = await fetch('assets/sample.json', { cache: 'no-cache' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          var data = await res.json();
          if (!data || !data.meta) throw new Error('数据格式不正确');

          cardEl = CCCard.build(data);
          var mount = document.getElementById('card-mount');
          mount.innerHTML = '';
          mount.appendChild(cardEl);
        } catch (err) {
          document.getElementById('card-mount').innerHTML =
            '<div class="share-loading" style="flex-direction:column;gap:12px;">' +
            '<div style="font-size:2rem;color:#E8913A;">⚠</div>' +
            '<div>样本数据加载失败</div>' +
            '<div style="font-size:0.8rem;color:#6B7A90;">' +
            (err.message || String(err)) + '</div>' +
            '<a class="btn btn-secondary" href="replay.html">← 返回</a></div>';
        }
      }

      /* 下载按钮 */
      document.getElementById('download-btn').addEventListener('click', function () {
        if (!cardEl) return;
        var btn = this;
        btn.disabled = true;
        var original = btn.textContent;
        btn.textContent = '导出中…';

        CCCard.exportCard(cardEl, '共创显影卡.png')
          .then(function () {
            CCCard.showToast('已保存到本地');
          })
          .catch(function () {
            CCCard.showToast('导出失败，请重试或截屏保存');
          })
          .then(function () {
            btn.disabled = false;
            btn.textContent = original;
          });
      });

      init();
    })();
  </script>
</body>
</html>
