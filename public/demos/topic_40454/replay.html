<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>样本回放 — 共创显影 CoCreate Mirror</title>
  <meta name="description" content="回放一次真实的人 × AI 协作显影线：提案、反馈、反思、调整、落地。" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 全局样式 token -->
  <link rel="stylesheet" href="assets/styles.css" />

  <!-- Noto Sans SC（确保导出 PNG 字体一致） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind 配置：对齐设计 token（与 index.html 一致） -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B6CB5',
            'primary-dark': '#2E568F',
            accent: '#E8913A',
            bg: '#F7F8FA',
            surface: '#FFFFFF',
            ink: '#1D2939',
            'ink-soft': '#6B7A90',
            line: '#E5E8EE',
          },
          fontFamily: {
            sans: ['"Noto Sans SC"', '-apple-system', 'BlinkMacSystemFont',
                   '"Segoe UI"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
          },
          borderRadius: {
            DEFAULT: '10px',
          },
        },
      },
    };
  </script>

  <!-- replay 页面专属样式 -->
  <style>
    /* ===== 顶部栏 ===== */
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 14px; border-radius: var(--radius);
      color: var(--color-text-secondary); font-size: 0.9rem;
      transition: background-color .15s, color .15s;
      flex-shrink: 0;
    }
    .back-btn:hover { background: var(--color-bg); color: var(--color-primary); }

    .topbar-title {
      flex: 1; min-width: 0; text-align: center;
      font-size: 1rem; font-weight: 500; color: var(--color-text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      padding: 0 12px;
    }

    .share-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: var(--radius);
      border: 1px solid var(--color-border); background: var(--color-surface);
      color: var(--color-text-secondary); font-size: 0.9rem;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .share-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }

    /* ===== 区块小标题 ===== */
    .section-head {
      font-size: 0.78rem; letter-spacing: 0.18em;
      color: var(--color-text-secondary); margin-bottom: 16px;
    }
    .insights-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 12px;
    }
    .deep-read-link {
      font-size: 0.8rem; letter-spacing: 0.02em;
      color: var(--color-text-secondary);
      transition: color .15s; flex-shrink: 0;
    }
    .deep-read-link:hover { color: var(--color-primary); }

    /* ===== meta 统计 ===== */
    .stats-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
    .stat {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius); padding: 12px 18px; min-width: 104px;
    }
    .stat__value {
      font-size: 1.5rem; font-weight: 600; color: var(--color-primary); line-height: 1.2;
    }
    .stat__value--text { font-size: 1rem; font-weight: 500; color: var(--color-text); }
    .stat__label { font-size: 0.75rem; color: var(--color-text-secondary); margin-top: 2px; }

    /* ===== 时间轴 ===== */
    .tl-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 44px 28px 28px;
    }
    .tl-track {
      position: relative; display: flex;
      justify-content: space-between; align-items: flex-start;
    }
    /* 横向连接线：落在节点圆点的垂直中心（num 24 + gap 4 + dotwrap/2 12 = 40px） */
    .tl-track::before {
      content: ""; position: absolute; left: 32px; right: 32px; top: 40px;
      height: 2px; background: var(--color-border);
      transform: translateY(-50%); z-index: 0;
    }

    .tl-node {
      position: relative; z-index: 1; width: 64px; flex: 0 0 auto;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; padding: 0; cursor: pointer;
    }
    .tl-node__num {
      height: 24px; display: flex; align-items: center;
      font-size: 0.8rem; font-weight: 500; color: var(--color-text-secondary);
      transition: color .15s;
    }
    .tl-node__dotwrap {
      height: 24px; display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    /* 关键转折：外圈光晕（::before，独立于圆点 box-shadow，避免与 ship 白边冲突） */
    .tl-node__dotwrap::before {
      content: ""; position: absolute; inset: -7px; border-radius: 50%;
      background: radial-gradient(circle, rgba(232,145,58,0.32), transparent 68%);
      opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 0;
    }
    /* 选中态：外圈描边 */
    .tl-node__dotwrap::after {
      content: ""; position: absolute; inset: -5px; border-radius: 50%;
      border: 2px solid var(--node-color); opacity: 0;
      transition: opacity .15s; z-index: 2;
    }
    .tl-node__dot {
      position: relative; z-index: 1;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--node-color);
      transition: transform .15s;
    }
    .tl-node--key .tl-node__dot { width: 18px; height: 18px; }
    .tl-node--key .tl-node__dotwrap::before { opacity: 1; }
    /* 落地节点：实心 + 白边 */
    .tl-node--ship .tl-node__dot {
      box-shadow: inset 0 0 0 2px var(--color-surface), 0 0 0 2px var(--node-color);
    }
    .tl-node--active .tl-node__dotwrap::after { opacity: 0.55; }
    .tl-node--active .tl-node__num { color: var(--node-color); font-weight: 600; }
    .tl-node:hover .tl-node__dot { transform: scale(1.15); }

    .tl-node__abbr {
      height: 24px; display: flex; align-items: center;
      font-size: 0.72rem; font-weight: 600; color: var(--node-color);
      letter-spacing: 0.05em;
    }
    .tl-node__title { display: none; } /* 桌面端用 tooltip，移动端显示 */

    /* hover tooltip（位于节点上方） */
    .tl-node__tooltip {
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: var(--color-text); color: #fff; font-size: 0.78rem;
      padding: 6px 10px; border-radius: 6px;
      width: max-content; max-width: 220px; text-align: center;
      opacity: 0; pointer-events: none; transition: opacity .15s; z-index: 5;
    }
    .tl-node__tooltip::before {
      content: ""; position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent; border-top-color: var(--color-text);
    }
    .tl-node:hover .tl-node__tooltip,
    .tl-node:focus .tl-node__tooltip { opacity: 1; }

    .tl-hint {
      font-size: 0.75rem; color: var(--color-text-secondary);
      text-align: center; margin-top: 22px;
    }

    /* ===== 节点详情面板 ===== */
    .detail {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 32px;
      scroll-margin-top: 84px;
    }
    .detail__top {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px; margin-bottom: 18px;
    }
    .detail__labels { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      display: inline-flex; align-items: center; padding: 4px 12px;
      border-radius: 999px; font-size: 0.75rem; font-weight: 500;
    }
    .badge--type {
      background: color-mix(in srgb, var(--node-color) 14%, transparent);
      color: var(--node-color);
    }
    .badge--round { background: var(--color-bg); color: var(--color-text-secondary); }
    .badge--speaker.speaker--human { background: rgba(59,108,181,0.12); color: var(--color-primary); }
    .badge--speaker.speaker--ai    { background: rgba(232,145,58,0.12); color: var(--color-accent); }
    .badge--speaker.speaker--both  { background: rgba(106,173,142,0.16); color: #4a8c70; }

    .detail__nav { display: inline-flex; align-items: center; gap: 10px; }
    .detail__nav-btn {
      padding: 5px 10px; border-radius: var(--radius-sm);
      font-size: 0.8rem; color: var(--color-text-secondary);
      border: 1px solid var(--color-border); background: var(--color-surface);
      transition: border-color .15s, color .15s, opacity .15s;
    }
    .detail__nav-btn:hover:not(:disabled) {
      border-color: var(--color-primary); color: var(--color-primary);
    }
    .detail__nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .detail__nav-pos { font-size: 0.78rem; color: var(--color-text-secondary); min-width: 44px; text-align: center; }

    .detail__title { font-size: 1.5rem; font-weight: 600; line-height: 1.35; margin-bottom: 8px; }
    .detail__summary { color: var(--color-text-secondary); font-size: 1rem; margin-bottom: 18px; }

    .detail__moment {
      display: flex; align-items: flex-start; gap: 10px;
      background: rgba(232,145,58,0.08); border-left: 3px solid var(--color-accent);
      padding: 12px 16px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 20px;
    }
    .moment-tag {
      flex-shrink: 0; background: var(--color-accent); color: #fff;
      font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 999px;
    }
    .detail__moment-text { color: #b5701f; font-size: 0.92rem; font-weight: 500; line-height: 1.6; }

    .detail__content-wrap { margin-top: 4px; }
    .detail__content {
      font-size: 0.95rem; line-height: 1.75; color: var(--color-text);
      white-space: pre-wrap; word-break: break-word;
    }
    .detail__content[data-collapsed="true"] {
      max-height: 5.4em; overflow: hidden; position: relative;
    }
    .detail__content[data-collapsed="true"]::after {
      content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 2.6em;
      background: linear-gradient(to bottom, transparent, var(--color-surface));
    }
    .detail__toggle {
      margin-top: 10px; display: inline-flex; align-items: center; gap: 6px;
      color: var(--color-primary); font-size: 0.85rem; font-weight: 500;
      padding: 4px 0; transition: color .15s;
    }
    .detail__toggle:hover { color: var(--color-primary-dark); }

    .detail__tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px; }
    .tag {
      font-size: 0.75rem; padding: 4px 12px; border-radius: 999px;
      background: var(--color-bg); color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }

    /* ===== 底部洞察 ===== */
    .insights-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .insight-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius); padding: 24px;
      transition: box-shadow .2s, transform .2s;
    }
    .insight-card:hover {
      box-shadow: 0 4px 16px rgba(29,41,57,0.06); transform: translateY(-2px);
    }
    .insight-card__num {
      font-size: 0.8rem; font-weight: 600; color: var(--color-accent);
      margin-bottom: 8px; letter-spacing: 0.05em;
    }
    .insight-card__title { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; }
    .insight-card__body { font-size: 0.9rem; line-height: 1.7; color: var(--color-text-secondary); }

    /* ===== 错误提示 ===== */
    .error-box {
      max-width: 520px; margin: 80px auto; text-align: center;
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 48px 32px;
    }
    .error-box__icon { font-size: 2.5rem; color: var(--color-accent); margin-bottom: 12px; }
    .error-box__title { font-size: 1.25rem; font-weight: 600; margin-bottom: 10px; }
    .error-box__desc { color: var(--color-text-secondary); font-size: 0.92rem; margin-bottom: 8px; }
    .error-box__desc code { background: var(--color-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
    .error-box__detail { font-size: 0.8rem; color: var(--color-text-secondary); margin-bottom: 20px; opacity: 0.8; }

    /* ===== Toast ===== */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--color-text); color: #fff;
      padding: 10px 20px; border-radius: var(--radius);
      font-size: 0.88rem; opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s; z-index: 50;
    }
    .toast--show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== 移动端：时间轴竖向 ===== */
    @media (max-width: 640px) {
      .tl-card { padding: 28px 16px 20px; }
      .tl-track { flex-direction: column; align-items: stretch; }
      /* 竖向连接线：左侧，穿过圆点中心（圆点 left:10 + 半径 7 ≈ 17px） */
      .tl-track::before {
        left: 17px; right: auto; top: 0; bottom: 0; width: 2px; height: auto;
        transform: none;
      }
      .tl-node {
        width: 100%; flex-direction: row; align-items: center; gap: 10px;
        padding: 12px 8px 12px 36px; height: auto;
      }
      .tl-node__dotwrap {
        position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
        height: auto;
      }
      .tl-node__num { height: auto; font-size: 0.85rem; }
      .tl-node__abbr { height: auto; font-size: 0.72rem; }
      .tl-node__title {
        display: inline; flex: 1; min-width: 0;
        font-size: 0.9rem; color: var(--color-text);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .tl-node__tooltip { display: none; }
      .tl-node--active {
        background: rgba(59,108,181,0.05); border-radius: var(--radius-sm);
      }
      .tl-node--active .tl-node__title { color: var(--color-primary); font-weight: 500; }
      .tl-hint { display: none; }

      .detail { padding: 22px 18px; }
      .detail__title { font-size: 1.25rem; }
      .insights-grid { grid-template-columns: 1fr; }
      .stats-row .stat { flex: 1 1 calc(50% - 12px); min-width: 0; }
    }

    /* ===== 分享模态层 ===== */
    .share-modal {
      position: fixed; inset: 0; z-index: 100;
      display: none;
      align-items: center; justify-content: center;
    }
    .share-modal--open { display: flex; }

    .share-modal__backdrop {
      position: absolute; inset: 0;
      background: rgba(29, 41, 57, 0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .share-modal__dialog {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
      max-height: 100vh; max-width: 100vw;
      padding: 32px 24px;
      overflow: auto;
    }

    /* 卡片缩放容器 */
    .share-modal__scale-outer {
      width: 800px; height: 800px;
      flex-shrink: 0;
    }
    .share-modal__scale-inner {
      width: 800px; height: 800px;
      transform-origin: top left;
    }

    .share-modal__actions {
      display: flex; gap: 12px; flex-shrink: 0;
    }
    .share-modal__actions .btn { padding: 10px 28px; font-size: 0.9rem; }

    /* 移动端：卡片缩放 fit 视口 */
    @media (max-width: 880px) {
      .share-modal__dialog { padding: 16px 12px; gap: 16px; }
      .share-modal__scale-outer {
        --s: min(calc((100vw - 24px) / 800), calc((100vh - 140px) / 800));
        width: calc(800px * var(--s));
        height: calc(800px * var(--s));
      }
      .share-modal__scale-inner {
        transform: scale(var(--s));
      }
    }
  </style>
</head>

<body class="font-sans text-ink bg-bg">

  <!-- ============ 顶部栏 ============ -->
  <header class="border-b border-line bg-surface/80 backdrop-blur-sm sticky top-0 z-20">
    <div class="container flex items-center justify-between py-4 gap-3">
      <!-- 返回首页 -->
      <a href="index.html" class="back-btn">← 返回</a>
      <!-- 样本标题 -->
      <h1 id="sample-title" class="topbar-title">加载中…</h1>
      <!-- 分享按钮（占位） -->
      <button type="button" id="share-btn" class="share-btn" aria-label="分享">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
        <span class="hidden sm:inline">分享</span>
      </button>
    </div>
  </header>

  <!-- ============ 主体 ============ -->
  <main id="replay-root">

    <!-- meta：副标题 / 上下文 / 统计 -->
    <section class="container pt-8 pb-6">
      <p id="sample-subtitle" class="text-ink-soft text-sm tracking-widest mb-3">…</p>
      <p id="sample-context" class="text-ink-soft text-base leading-relaxed max-w-3xl"></p>
      <div id="sample-stats" class="stats-row"></div>
    </section>

    <!-- 时间轴 -->
    <section class="container pb-6">
      <div class="section-head">协作显影线 · TIMELINE</div>
      <div class="tl-card">
        <div id="tl-track" class="tl-track" role="tablist" aria-label="协作时间轴"></div>
        <p class="tl-hint">点击节点查看详情 · ← → 键切换</p>
      </div>
    </section>

    <!-- 节点详情 -->
    <section class="container pb-10">
      <div class="section-head">节点详情 · DETAIL</div>
      <div id="detail-panel" class="detail"></div>
    </section>

    <!-- 底部洞察 -->
    <section class="container pb-16">
      <div class="section-head insights-head">
        <span>协作洞察 · INSIGHTS</span>
        <a href="insights.html" class="deep-read-link">深度阅读 →</a>
      </div>
      <div id="insights-grid" class="insights-grid"></div>
    </section>
  </main>

  <!-- ============ 页脚 ============ -->
  <footer class="border-t border-line">
    <div class="container py-6 text-center text-xs text-ink-soft">
      共创显影 CoCreate Mirror · 让每一次人 × AI 协作都留下痕迹
    </div>
  </footer>

  <!-- ============ 分享模态层 ============ -->
  <div class="share-modal" id="share-modal" aria-hidden="true">
    <div class="share-modal__backdrop" data-share-close></div>
    <div class="share-modal__dialog" role="dialog" aria-modal="true" aria-label="协作显影卡预览">
      <div class="share-modal__scale-outer">
        <div class="share-modal__scale-inner" id="modal-card-mount"></div>
      </div>
      <div class="share-modal__actions">
        <button type="button" class="btn btn-primary" id="modal-download-btn">下载 PNG</button>
        <button type="button" class="btn btn-secondary" data-share-close>取消</button>
      </div>
    </div>
  </div>

  <script src="assets/card-export.js"></script>
  <script src="assets/timeline.js"></script>
</body>
</html>
