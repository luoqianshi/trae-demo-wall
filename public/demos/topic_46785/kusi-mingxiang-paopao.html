<!DOCTYPE html>

<head>

    <title>苦思冥想泡泡 - 灵感收集器</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --bg2: #121830;
            --ink: #e8ecf4;
            --muted: #7a8ab0;
            --rule: #2a3458;
            --accent: #6c9fff;
            --accent2: #ff8a6c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--ink);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 背景星空效果 */
        .stars {
            position: fixed;

        .star {
            position: absolute;
            background: white;

        @keyframes twinkle {

        /* 主容器 */

        .header h1 {
            font-size: 2rem;

            text-shadow: 0 0 20px rgba(108, 159, 255, 0.5);
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        /* 输入区域 */
        .input-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            background: rgba(18, 24, 48, 0.8);
            padding: 16px 24px;
            border-radius: 50px;
            border: 1px solid var(--rule);
            backdrop-filter: blur(10px);
        }

        .input-area input {
            background: transparent;
            border: none;
            color: var(--ink);
            font-size: 1rem;
            width: 300px;
            outline: none;
            font-family: inherit;
        }

        .input-area input::placeholder {
            color: var(--muted);
        }

        .input-area button {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }

        .input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(108, 159, 255, 0.4);
        }

        .input-area button.shake-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .input-area button.shake-btn:hover {
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.5);
        }

        .input-area button.shake-btn:active {
            transform: scale(0.95);
        }

        /* 泡泡容器 */
        .bubble-container {
            position: absolute;
            top: 0;

            overflow: hidden;

        }

        /* 泡泡样式 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-break: break-word;
            transition: transform 0.3s ease;
            box-shadow: 
                inset -10px -10px 20px rgba(0,0,0,0.3),
                inset 10px 10px 20px rgba(255,255,255,0.2),
                0 0 30px rgba(255,255,255,0.1);
            animation: float 6s infinite ease-in-out;
        }

        .bubble::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 25%;
            height: 15%;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            filter: blur(2px);
        }

        .bubble:hover {
            transform: scale(1.1);
            z-index: 100;
        }

        .bubble .idea-text {
            color: white;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            max-height: 80%;
            overflow: hidden;
        }

        .bubble .idea-date {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.8);
            margin-top: 4px;
        }

        /* 石化效果 */
        .bubble.petrified {
            background: linear-gradient(135deg, #4a4a5a, #2a2a3a) !important;
            box-shadow: 
                inset -5px -5px 10px rgba(0,0,0,0.5),
                inset 5px 5px 10px rgba(255,255,255,0.05),
                0 0 10px rgba(0,0,0,0.5) !important;
            animation: none;
        }

        .bubble.petrified::before {
            display: none;
        }

        .bubble.petrified .idea-text {
            color: #aaa;
        }

        .bubble.petrified .idea-date {
            color: #888;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(1deg); }
            50% { transform: translateY(-5px) rotate(-1deg); }
            75% { transform: translateY(-15px) rotate(0.5deg); }
        }

        /* 底部沉淀区域 */
        .sediment-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to top, rgba(10,14,26,0.9), transparent);
            z-index: 3;
            pointer-events: none;
        }

        /* 统计信息 */
        .stats {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 10;
            background: rgba(18, 24, 48, 0.7);
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid var(--rule);
            font-size: 0.8rem;
            color: var(--muted);
            backdrop-filter: blur(10px);
        }

        .stats span {
            color: var(--accent);
            font-weight: 600;
        }

        /* 提示信息 */
        .hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--muted);
            font-size: 0.8rem;
            z-index: 10;
            opacity: 0.7;
            pointer-events: none;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
            .input-area { width: 90%; }
            .input-area input { width: 200px; }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>苦思冥想泡泡</h1>
            <p>捕捉每一个稍纵即逝的灵感</p>
        </div>

        <!-- 统计 -->
        <div class="stats">
            <div>活跃泡泡: <span id="activeCount">0</span></div>
            <div>已石化: <span id="petrifiedCount">0</span></div>
            <div>总灵感: <span id="totalCount">0</span></div>
        </div>

        <!-- 泡泡容器 -->
        <div class="bubble-container" id="bubbleContainer"></div>

        <!-- 沉淀区域 -->
        <div class="sediment-area"></div>

        <!-- 提示 -->
        <div class="hint">输入灵感，按回车或点击按钮生成泡泡 · 泡泡会随时间沉淀石化</div>

        <!-- 输入区域 -->
        <div class="input-area">
            <input type="text" id="ideaInput" placeholder="输入你的灵感想法..." maxlength="50">
            <button onclick="createBubble()">生成泡泡</button>
            <button class="shake-btn" onclick="shakeBubbles()">晃一晃</button>
        </div>
    </div>

    <script>
        // 泡泡颜色配置 - 五颜六色
        const bubbleColors = [
            'linear-gradient(135deg, #ff6b9d, #c44569)',
            'linear-gradient(135deg, #f8b500, #f093fb)',
            'linear-gradient(135deg, #4facfe, #00f2fe)',
            'linear-gradient(135deg, #43e97b, #38f9d7)',
            'linear-gradient(135deg, #fa709a, #fee140)',
            'linear-gradient(135deg, #a8edea, #fed6e3)',
            'linear-gradient(135deg, #ff9a9e, #fecfef)',
            'linear-gradient(135deg, #667eea, #764ba2)',
            'linear-gradient(135deg, #f093fb, #f5576c)',
            'linear-gradient(135deg, #4facfe, #00f2fe)',
            'linear-gradient(135deg, #43e97b, #38f9d7)',
            'linear-gradient(135deg, #fa709a, #fee140)'
        ];

        let bubbles = [];
        let bubbleIdCounter = 0;
        const PETRIFY_TIME = 3000000; // 3000秒后石化
        const STORAGE_KEY = 'kusi-mingxiang-bubbles';
        const SHAKE_SPEED = 40; // 晃一晃时的统一速度
        const SHAKE_DURATION = 1000; // 高速运动持续时间（1秒）
        const DECELERATE_DURATION = 9000; // 减速持续时间（9秒）
        const POTION_CLICKS = 5; // 激活魔法药水需要的点击次数
        const POTION_WINDOW = 2000; // 魔法药水点击时间窗口（2秒）
        const POTION_DURATION = 10000; // 魔法药水效果持续时间（10秒）
        let speedMultiplier = 1; // 速度倍率
        let shakeEndTime = 0; // 高速运动结束时间
        let decelerateEndTime = 0; // 减速结束时间
        let shakeClicks = []; // 最近点击晃一晃按钮的时间记录
        let potionEndTime = 0; // 魔法药水效果结束时间

        // 从 localStorage 加载泡泡数据
        function loadBubblesFromStorage() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    const savedBubbles = JSON.parse(data);
                    savedBubbles.forEach(b => {
                        const bubble = document.createElement('div');
                        bubble.className = 'bubble' + (b.isPetrified ? ' petrified' : '');
                        bubble.style.width = b.size + 'px';
                        bubble.style.height = b.size + 'px';
                        bubble.style.background = bubbleColors[b.colorIndex];
                        bubble.style.left = b.x + 'px';
                        bubble.style.top = b.y + 'px';

                        const ideaText = document.createElement('div');
                        ideaText.className = 'idea-text';
                        ideaText.textContent = b.text;

                        const ideaDate = document.createElement('div');
                        ideaDate.className = 'idea-date';
                        ideaDate.textContent = b.createdAtStr;

                        bubble.appendChild(ideaText);
                        bubble.appendChild(ideaDate);

                        const bubbleData = {
                            id: b.id,
                            element: bubble,
                            createdAt: b.createdAt,
                            createdAtStr: b.createdAtStr,
                            x: b.x,
                            y: b.y,
                            vx: b.vx,
                            vy: b.vy,
                            isPetrified: b.isPetrified,
                            text: b.text,
                            size: b.size,
                            colorIndex: b.colorIndex,
                            hasSettled: b.hasSettled || false
                        };

                        bubbles.push(bubbleData);
                        document.getElementById('bubbleContainer').appendChild(bubble);

                        bubble.addEventListener('click', function() {
                            if (!bubbleData.isPetrified) {
                                removeBubble(bubbleData);
                            }
                        });
                    });

                    if (savedBubbles.length > 0) {
                        bubbleIdCounter = Math.max(...savedBubbles.map(b => b.id)) + 1;
                    }
                }
            } catch (e) {
                console.warn('加载泡泡数据失败:', e);
            }
        }

        // 保存泡泡数据到 localStorage
        function saveBubblesToStorage() {
            try {
                const data = bubbles.map(b => ({
                    id: b.id,
                    text: b.text,
                    createdAt: b.createdAt,
                    createdAtStr: b.createdAtStr,
                    x: b.x,
                    y: b.y,
                    vx: b.vx,
                    vy: b.vy,
                    isPetrified: b.isPetrified,
                    size: b.size,
                    colorIndex: b.colorIndex,
                    hasSettled: b.hasSettled || false
                }));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.warn('保存泡泡数据失败:', e);
            }
        }

        // 初始化星空背景
        function initStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 获取当前时间字符串
        function getCurrentTime() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        // 创建泡泡
        function createBubble() {
            const input = document.getElementById('ideaInput');
            const text = input.value.trim();
            if (!text) return;

            const container = document.getElementById('bubbleContainer');
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // 随机大小
            const size = Math.random() * 60 + 100; // 100-160px
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            
            // 随机颜色
            const colorIndex = Math.floor(Math.random() * bubbleColors.length);
            bubble.style.background = bubbleColors[colorIndex];
            
            // 随机位置（上半部分）
            const x = Math.random() * (window.innerWidth - size);
            const y = Math.random() * (window.innerHeight * 0.4) + 80;
            bubble.style.left = x + 'px';
            bubble.style.top = y + 'px';
            
            // 内容
            const ideaText = document.createElement('div');
            ideaText.className = 'idea-text';
            ideaText.textContent = text;
            
            const ideaDate = document.createElement('div');
            ideaDate.className = 'idea-date';
            ideaDate.textContent = getCurrentTime();
            
            bubble.appendChild(ideaText);
            bubble.appendChild(ideaDate);
            
            // 存储泡泡数据
            const bubbleData = {
                id: bubbleIdCounter++,
                element: bubble,
                createdAt: Date.now(),
                createdAtStr: getCurrentTime(),
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 1.5,
                isPetrified: false,
                text: text,
                size: size,
                colorIndex: colorIndex
            };
            
            bubbles.push(bubbleData);
            container.appendChild(bubble);
            
            // 清空输入
            input.value = '';
            
            // 更新统计
            updateStats();
            // 保存到 localStorage
            saveBubblesToStorage();
            
            // 点击删除
            bubble.addEventListener('click', function() {
                if (!bubbleData.isPetrified) {
                    removeBubble(bubbleData);
                }
            });
        }

        // 移除泡泡
        function removeBubble(bubbleData) {
            const index = bubbles.indexOf(bubbleData);
            if (index > -1) {
                bubbles.splice(index, 1);
                bubbleData.element.remove();
                updateStats();
                saveBubblesToStorage();
            }
        }

        // 更新统计
        function updateStats() {
            const active = bubbles.filter(b => !b.isPetrified).length;
            const petrified = bubbles.filter(b => b.isPetrified).length;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('petrifiedCount').textContent = petrified;
            document.getElementById('totalCount').textContent = bubbles.length;
        }

        // 晃一晃按钮 - 高速运动1秒后逐渐减速9秒
        function shakeBubbles() {
            const now = Date.now();
            shakeEndTime = now + SHAKE_DURATION;
            decelerateEndTime = now + SHAKE_DURATION + DECELERATE_DURATION;
            // 记录点击时间，检测魔法药水连击
            shakeClicks.push(now);
            shakeClicks = shakeClicks.filter(t => now - t <= POTION_WINDOW);
            if (shakeClicks.length >= POTION_CLICKS) {
                activatePotion();
                shakeClicks = [];
            }
        }

        // 激活魔法药水 - 使所有石化泡泡恢复正常
        function activatePotion() {
            const now = Date.now();
            potionEndTime = now + POTION_DURATION;
            let revivedCount = 0;
            bubbles.forEach(bubble => {
                if (bubble.isPetrified) {
                    bubble.isPetrified = false;
                    bubble.hasSettled = false;
                    bubble.element.classList.remove('petrified');
                    // 重新分配随机速度
                    bubble.vx = (Math.random() - 0.5) * 2;
                    bubble.vy = (Math.random() - 0.5) * 1.5;
                    revivedCount++;
                }
            });
            if (revivedCount > 0) {
                updateStats();
                saveBubblesToStorage();
            }
        }

        // 动画循环
        let lastSaveTime = 0;
        function animate() {
            const now = Date.now();
            const containerHeight = window.innerHeight;
            
            // 更新速度倍率
            if (now > decelerateEndTime && speedMultiplier > 1) {
                // 减速阶段结束后，重置为正常速度
                speedMultiplier = 1;
            }
            
            // 判断当前阶段
            const isShaking = now < shakeEndTime;
            const isDecelerating = now >= shakeEndTime && now < decelerateEndTime;
            
            if (isDecelerating) {
                // 减速阶段：从 SHAKE_SPEED 线性降到 1
                const elapsed = now - shakeEndTime;
                const progress = elapsed / DECELERATE_DURATION;
                speedMultiplier = SHAKE_SPEED * (1 - progress) + 1 * progress;
            } else if (!isShaking && speedMultiplier !== 1) {
                speedMultiplier = 1;
            }
            
            bubbles.forEach(bubble => {
                const age = now - bubble.createdAt;
                
                // 石化判断（魔法药水生效期间不会石化）
                if (age > PETRIFY_TIME && !bubble.isPetrified && now > potionEndTime) {
                    bubble.isPetrified = true;
                    bubble.element.classList.add('petrified');
                    updateStats();
                    saveBubblesToStorage();
                }
                
                // 运动逻辑
                if (!bubble.isPetrified) {
                    // 活跃泡泡随机运动
                    if (isShaking) {
                        // 晃一晃时统一速度为 SHAKE_SPEED
                        bubble.x += (bubble.vx > 0 ? 1 : -1) * SHAKE_SPEED;
                        bubble.y += (bubble.vy > 0 ? 1 : -1) * SHAKE_SPEED;
                    } else {
                        bubble.x += bubble.vx * speedMultiplier;
                        bubble.y += bubble.vy * speedMultiplier;
                    }
                    
                    // 边界反弹
                    if (bubble.x <= 0 || bubble.x >= window.innerWidth - 100) bubble.vx *= -1;
                    if (bubble.y <= 80 || bubble.y >= containerHeight * 0.6) bubble.vy *= -1;
                    
                    // 添加随机扰动
                    bubble.vx += (Math.random() - 0.5) * 0.02;
                    bubble.vy += (Math.random() - 0.5) * 0.02;
                    
                    // 限制速度
                    bubble.vx = Math.max(-2, Math.min(2, bubble.vx));
                    bubble.vy = Math.max(-2, Math.min(2, bubble.vy));
                } else {
                    // 石化后下沉到底部，沉底后静止
                    if (!bubble.hasSettled) {
                        const targetY = containerHeight - 120;
                        bubble.y += (targetY - bubble.y) * 0.05;
                        // 接近底部时停止
                        if (Math.abs(targetY - bubble.y) < 1) {
                            bubble.y = targetY;
                            bubble.hasSettled = true;
                            saveBubblesToStorage();
                        }
                    }
                }
                
                // 更新位置
                bubble.element.style.left = bubble.x + 'px';
                bubble.element.style.top = bubble.y + 'px';
            });
            
            requestAnimationFrame(animate);
        }

        // 回车提交
        document.getElementById('ideaInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') createBubble();
        });

        // 初始化
        initStars();
        loadBubblesFromStorage();
        animate();

        // 预置示例泡泡（仅在首次打开时）
        if (bubbles.length === 0) {
            const sampleIdeas = [
                '为什么天空是蓝色的？',
                '为什么太阳会发光？',
                '为什么月亮会跟着人走？',
                '为什么海水是咸的？',
                '为什么鱼能在水里呼吸？',
                '为什么鸟会飞？',
                '为什么树叶会变色？',
                '为什么冬天会下雪？',
                '为什么彩虹有七种颜色？',
                '为什么大象的鼻子那么长？',
                '为什么猫从高处摔下来不会受伤？',
                '为什么狗会摇尾巴？',
                '为什么蚂蚁不会迷路？',
                '为什么企鹅生活在南极？',
                '为什么长颈鹿的脖子那么长？',
                '为什么萤火虫会发光？',
                '为什么星星会眨眼？',
                '为什么冰会融化？',
                '为什么气球会飞上天？',
                '为什么气球会破？'
            ];

            let index = 0;
            const interval = setInterval(() => {
                if (index >= sampleIdeas.length) {
                    clearInterval(interval);
                    return;
                }
                document.getElementById('ideaInput').value = sampleIdeas[index];
                createBubble();
                index++;
            }, 100);
        }
    </script>
</body>
</html>
