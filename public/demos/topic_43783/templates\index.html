<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛道透视镜</title>
    <!-- 暗色主题样式 -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="app-header">
        <h1 class="app-title">赛道透视镜</h1>
        <div class="header-right">
            <span id="service-indicator" class="service-indicator"></span>
            <span class="header-label">last_sync:</span>
            <span id="last-updated">--</span>
        </div>
    </header>

    <!-- 赛事结束横幅（默认隐藏） -->
    <div id="event-ended-banner" class="event-ended-banner" style="display: none;">
        赛事已结束，数据更新已暂停
    </div>

    <!-- Tab 导航栏 -->
    <nav class="tab-nav">
        <a class="tab-item active" data-tab="leaderboard">数据中心</a>
        <a class="tab-item" data-tab="tracks">赛道分析</a>
        <a class="tab-item" data-tab="generator">提交生成器</a>
        <a class="tab-item" data-tab="manage">数据管理</a>
    </nav>

    <!-- Tab 内容区域 -->
    <main class="tab-content">
        <!-- 排行榜 Tab（含搜索） -->
        <section id="tab-leaderboard" class="tab-panel active">
            <div class="search-bar">
                <input type="text" id="search-input" class="search-input" placeholder="输入关键词搜索，留空显示全部...">
                <button id="btn-search" class="btn btn-primary">搜索</button>
                <label class="switch-label">
                    <input type="checkbox" id="search-demo-only" checked>
                    <span>仅参赛帖</span>
                </label>
            </div>
            <!-- 排行榜表格容器 -->
            <div id="leaderboard-table-container" class="table-container"></div>
            <!-- 分页栏 -->
            <div id="leaderboard-pagination" class="pagination"></div>
        </section>

        <!-- 赛道分析 Tab -->
        <section id="tab-tracks" class="tab-panel">
            <div id="tracks-container" class="tracks-container"></div>
        </section>

        <!-- 提交生成器 Tab -->
        <section id="tab-generator" class="tab-panel">
            <div id="generator-container" class="generator-container"></div>
        </section>

        <!-- 数据管理 Tab -->
        <section id="tab-manage" class="tab-panel">
            <!-- 手动更新区域 -->
            <div class="manage-section">
                <h3 class="section-title">手动更新</h3>
                <button id="btn-update" class="btn btn-primary">触发增量更新</button>
            </div>

            <!-- 更新进度区域 -->
            <div id="update-progress" class="update-progress" style="display: none;">
                <div class="progress-bar-container">
                    <div class="progress-bar-fill"></div>
                </div>
                <div id="update-status-text" class="update-status-text">准备中...</div>
            </div>

            <!-- 更新日志区域 -->
            <div class="manage-section">
                <h3 class="section-title">更新日志</h3>
                <div id="update-log-container" class="update-log-container"></div>
            </div>

            <!-- 趋势图区域 -->
            <div class="manage-section">
                <h3 class="section-title">整体趋势</h3>
                <div class="trend-days-buttons">
                    <button class="btn trend-days-btn" data-days="7">7 天</button>
                    <button class="btn trend-days-btn active" data-days="14">14 天</button>
                    <button class="btn trend-days-btn" data-days="30">30 天</button>
                </div>
                <div id="trend-chart-container" class="trend-chart-container">
                    <canvas id="trend-canvas" width="800" height="300"></canvas>
                </div>
            </div>

            <!-- 数据导出区域 -->
            <div class="manage-section">
                <h3 class="section-title">数据导出</h3>
                <button id="btn-export-csv" class="btn btn-primary">导出 CSV</button>
                <button id="btn-export-json" class="btn btn-primary">导出 JSON</button>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="app-footer">
        <span>TRAE AI 创造力大赛</span>
        <span class="footer-sep">|</span>
        <span>数据来源于 forum.trae.cn</span>
    </footer>

    <!-- 右侧抽屉面板 -->
    <div id="drawer-overlay" class="drawer-overlay" style="display: none;"></div>
    <aside id="drawer" class="drawer" style="display: none;">
        <div id="drawer-content" class="drawer-content">
            <!-- 抽屉头部 -->
            <div class="drawer-header">
                <h2 id="drawer-title" class="drawer-title"></h2>
                <button id="drawer-close" class="drawer-close">×</button>
            </div>
            <!-- 作者信息 -->
            <div id="drawer-author" class="drawer-author"></div>
            <!-- 标签 -->
            <div id="drawer-tags" class="drawer-tags"></div>
            <!-- 数据卡片 -->
            <div id="drawer-stats" class="drawer-stats"></div>
            <!-- 趋势小图 -->
            <div class="drawer-trend-section">
                <h4 class="drawer-subtitle">浏览量趋势</h4>
                <div id="drawer-trend-chart" class="drawer-trend-chart"></div>
            </div>
            <!-- 正文 -->
            <div class="drawer-subtitle">正文</div>
            <div id="drawer-body" class="drawer-body"></div>
            <!-- 论坛链接按钮 -->
            <a id="drawer-link" class="btn btn-primary drawer-link" target="_blank" rel="noopener noreferrer">查看论坛原帖</a>
        </div>
    </aside>

    <!-- 相似作品抽屉（独立于详情抽屉） -->
    <div id="similar-drawer-overlay" class="drawer-overlay similar-overlay" style="display: none;"></div>
    <aside id="similar-drawer" class="drawer similar-drawer" style="display: none;">
        <div class="drawer-content">
            <div class="drawer-header">
                <h2 class="drawer-title">相似作品</h2>
                <button id="similar-drawer-close" class="drawer-close">×</button>
            </div>
            <div id="similar-drawer-anchor" class="similar-drawer-anchor"></div>
            <div class="similar-drawer-controls">
                <label class="slider-label">
                    阈值：<span id="similar-drawer-threshold-value">0.50</span>
                    <input type="range" id="similar-drawer-threshold" class="slider" min="0.3" max="1.0" step="0.01" value="0.5">
                </label>
                <label class="switch-label">
                    <input type="checkbox" id="similar-drawer-demo-only" checked>
                    <span>仅参赛帖</span>
                </label>
            </div>
            <div id="similar-drawer-results" class="similar-drawer-results"></div>
        </div>
    </aside>

    <!-- JS 脚本（按顺序加载） -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/table.js"></script>
    <script src="/static/js/drawer.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/generator.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
