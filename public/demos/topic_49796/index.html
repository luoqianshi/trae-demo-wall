<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>蛛网小卫士 —— 可爱风切蛛网游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ffeef8 0%, #f0e6ff 50%, #e6f0ff 100%);
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            cursor: crosshair;
            user-select: none;
            touch-action: none;
        }
        canvas { display: block; }
        
        .ui-layer {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .ui-left { display: flex; flex-direction: column; gap: 6px; }
        .ui-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        
        .game-title {
            font-size: 22px;
            font-weight: bold;
            color: #7b68ee;
            text-shadow: 0 2px 8px rgba(123,104,238,0.3);
        }
        .level-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: #fff;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            box-shadow: 0 2px 8px rgba(255,154,158,0.3);
        }
        .score-display {
            font-size: 32px;
            font-weight: bold;
            color: #ff6b9d;
            text-shadow: 0 2px 10px rgba(255,107,157,0.4);
        }
        .progress-bar {
            width: 200px;
            height: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a8edea, #fed6e3);
            border-radius: 5px;
            transition: width 0.3s ease;
        }
        .timer {
            font-size: 20px;
            color: #ff8a65;
            font-weight: bold;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            color: #555;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 3px 12px rgba(168,237,234,0.4);
            pointer-events: auto;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(168,237,234,0.6);
        }
        .btn-classic {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            color: #555;
            font-size: 15px;
            padding: 12px 24px;
        }
        .btn-eradicate {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #fff;
            font-size: 15px;
            padding: 12px 24px;
        }
        .btn-classic:hover, .btn-eradicate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,154,158,0.5);
        }
        .mode-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .buff-display {
            display: flex;
            gap: 6px;
            min-height: 22px;
        }
        .buff-icon {
            font-size: 18px;
            animation: buffPulse 0.8s ease-in-out infinite alternate;
        }
        @keyframes buffPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        .hearts-display {
            font-size: 20px;
            letter-spacing: 2px;
        }
        .spider-count {
            font-size: 14px;
            color: #ff6b9d;
            font-weight: bold;
        }
        .eradicate-info {
            display: none;
        }
        .eradicate-info.active {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .classic-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .classic-info.hidden {
            display: none;
        }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: linear-gradient(135deg, #fff5f8, #f5f0ff);
            padding: 40px 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-width: 420px;
            width: 90%;
        }
        .modal-content h2 {
            font-size: 28px;
            color: #7b68ee;
            margin-bottom: 15px;
        }
        .modal-content p {
            color: #888;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        
        .floating-text {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            font-size: 20px;
            z-index: 5;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="ui-layer">
        <div class="ui-left">
            <div class="game-title">🕸️ 蛛网小卫士</div>
            <div class="level-badge" id="levelBadge">第 1 关</div>
            <div class="classic-info" id="classicInfo">
                <div style="margin-top:4px;">切断进度: <span id="cutPercent">0%</span></div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            </div>

    </div>
    
    <div class="controls">
        <button class="btn" id="backMenuBtn" style="display:none;" onclick="game.backToMenu()">🏠 返回菜单</button>
        <button class="btn" onclick="game.restartLevel()">🔄 重开本关</button>
        <button class="btn" onclick="toggleSound()">🔊 音效</button>
    </div>
    
    <div class="modal show" id="gameModal">
        <div class="modal-content">
            <h2 id="modalTitle">🕸️ 蛛网小卫士</h2>
            <p id="modalText">
                选择你喜欢的模式开始游戏！<br><br>
                <b>🕸️ 经典模式</b> — 切断蛛丝达标过关<br>
                🕷️ 切到蜘蛛 <b style="color:#ff6b6b">-50分</b> |
                🦟 蚊子 <b style="color:#4ecdc4">+30</b> |
                🦋 蝴蝶 <b style="color:#ff6b9d">+50</b> |
                ✨ 萤火虫 <b style="color:#ffd93d">+100</b><br><br>
                <b>🕷️ 清剿模式</b> — 消灭所有蜘蛛过关<br>
                ❤️ 3滴血 | 切断蛛丝让蜘蛛掉落 | 虫子掉落道具可拾取
            </p>
            <div id="menuBtns" class="mode-btns">
                <button class="btn btn-classic" onclick="game.startGame('classic')">🕸️ 经典模式</button>
                <button class="btn btn-eradicate" onclick="game.startGame('eradicate')">🕷️ 清剿模式</button>
            </div>
            <button class="btn" id="startBtn" style="font-size:16px;padding:12px 30px;display:none;">🎮 开始游戏</button>
        </div>
    </div>
    
    <canvas id="canvas"></canvas>

    <!-- ============ UTILITIES ============ -->
    <script>
    const Vec2 = {
        add: (a, b) => ({ x: a.x + b.x, y: a.y + b.y }),
        sub: (a, b) => ({ x: a.x - b.x, y: a.y - b.y }),
        mul: (v, s) => ({ x: v.x * s, y: v.y * s }),
        dot: (a, b) => a.x * b.x + a.y * b.y,
        len: (v) => Math.sqrt(v.x * v.x + v.y * v.y),
        dist: (a, b) => Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2),
        norm: (v) => {
            const l = Math.sqrt(v.x * v.x + v.y * v.y);
            return l > 0.001 ? { x: v.x / l, y: v.y / l } : { x: 0, y: 0 };
        },
        lerp: (a, b, t) => ({ x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t }),
        mid: (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 })
    };

    function pointSegmentDistance(p, a, b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len2 = dx * dx + dy * dy;
        if (len2 < 0.001) return { dist: Vec2.dist(p, a), t: 0 };
        let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
        t = Math.max(0, Math.min(1, t));
        const closest = { x: a.x + t * dx, y: a.y + t * dy };
        return { dist: Vec2.dist(p, closest), t, closest };
    }

    function segmentsIntersect(p1, p2, p3, p4) {
        const d1 = (p2.x - p1.x) * (p3.y - p1.y) - (p3.x - p1.x) * (p2.y - p1.y);
        const d2 = (p2.x - p1.x) * (p4.y - p1.y) - (p4.x - p1.x) * (p2.y - p1.y);
        const d3 = (p4.x - p3.x) * (p1.y - p3.y) - (p1.x - p3.x) * (p4.y - p3.y);
        const d4 = (p4.x - p3.x) * (p2.y - p3.y) - (p2.x - p3.x) * (p4.y - p3.y);
        if (((d1 > 0 && d2 < 0) || (d1 < 0 && d2 > 0)) &&
            ((d3 > 0 && d4 < 0) || (d3 < 0 && d4 > 0))) return true;
        return false;
    }
    </script>

    <!-- ============ AUDIO SYSTEM ============ -->
    <script>
    class AudioSystem {
        constructor() {
            this.ctx = null;
            this.enabled = true;
        }
        init() {
            if (!this.ctx) {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioCtx();
            }
        }
        toggle() {
            this.enabled = !this.enabled;
            return this.enabled;
        }
        _playOscillator(freqStart, freqEnd, type, duration, volume = 0.15) {
            if (!this.enabled || !this.ctx) return;
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freqStart, t);
            osc.frequency.exponentialRampToValueAtTime(freqEnd, t + duration);
            gain.gain.setValueAtTime(volume, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
            osc.start(t);
            osc.stop(t + duration);
        }
        playCut() { this._playOscillator(800, 200, 'sine', 0.1, 0.12); }
        playSpiderHit() { this._playOscillator(300, 100, 'sawtooth', 0.2, 0.1); }
        playBugCatch() { this._playOscillator(500, 1200, 'sine', 0.15, 0.12); }
        playItemCollect() {
            if (!this.enabled || !this.ctx) return;
            const t = this.ctx.currentTime;
            [880, 1100, 1320].forEach((freq, i) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t + i * 0.06);
                gain.gain.setValueAtTime(0.1, t + i * 0.06);
                gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.15);
                osc.start(t + i * 0.06);
                osc.stop(t + i * 0.06 + 0.15);
            });
        }
        playHeal() { this._playOscillator(600, 900, 'sine', 0.2, 0.12); }
        playShield() {
            if (!this.enabled || !this.ctx) return;
            const t = this.ctx.currentTime;
            [660, 880, 660].forEach((freq, i) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, t + i * 0.1);
                gain.gain.setValueAtTime(0.08, t + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.2);
                osc.start(t + i * 0.1);
                osc.stop(t + i * 0.1 + 0.2);
            });
        }
        playDamage() {
            if (!this.enabled || !this.ctx) return;
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, t);
            osc.frequency.exponentialRampToValueAtTime(80, t + 0.3);
            gain.gain.setValueAtTime(0.15, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            osc.start(t);
            osc.stop(t + 0.3);
        }
        playLevelComplete() {
            if (!this.enabled || !this.ctx) return;
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const t = this.ctx.currentTime + i * 0.1;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                osc.start(t);
                osc.stop(t + 0.3);
            });
        }
    }
    </script>

    <!-- ============ ENTITIES ============ -->
    <script>
    class Strand {
        constructor(a, b) {
            this.a = a;
            this.b = b;
            this.cut = false;
            this.cutProgress = 0;
            this.vibrate = 0;
            this.restLength = Vec2.dist(a, b);
        }
        update() {
            if (this.cut) {
                this.cutProgress += 0.05;
                this.vibrate *= 0.9;
            }
        }
        draw(ctx) {
            if (this.cut && this.cutProgress >= 1) return;
            const alpha = this.cut ? Math.max(0, 1 - this.cutProgress * 2) : 0.7;
            const vx = (Math.random() - 0.5) * this.vibrate;
            const vy = (Math.random() - 0.5) * this.vibrate;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.moveTo(this.a.x + vx, this.a.y + vy);
            const midX = (this.a.x + this.b.x) / 2 + vx;
            const midY = (this.a.y + this.b.y) / 2 + vy + this.restLength * 0.02;
            ctx.quadraticCurveTo(midX, midY, this.b.x + vx, this.b.y + vy);
            ctx.strokeStyle = 'rgba(200, 200, 255, 0.8)';
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(this.a.x + vx, this.a.y + vy);
            ctx.quadraticCurveTo(midX, midY - 1, this.b.x + vx, this.b.y + vy);
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 * alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
            ctx.restore();
        }
        checkCut(p1, p2) {
            if (this.cut) return false;
            // Use segment-segment intersection for reliable detection
            const hit1 = pointSegmentDistance(p1, this.a, this.b).dist < 25;
            const hit2 = pointSegmentDistance(p2, this.a, this.b).dist < 25;
            if (hit1 || hit2) {
                this.cut = true;
                this.vibrate = 12;
                return true;
            }
            // Also check if the mouse movement segment intersects this strand
            if (segmentsIntersect(p1, p2, this.a, this.b)) {
                this.cut = true;
                this.vibrate = 12;
                return true;
            }
            return false;
        }
    }

    class CuteSpider {
        constructor(strand, speedMultiplier = 1, gameRef = null) {
            this.strand = strand;
            this.gameRef = gameRef;
            this.t = Math.random();
            this.speed = (0.3 + Math.random() * 0.3) * speedMultiplier;
            this.direction = Math.random() > 0.5 ? 1 : -1;
            this.size = 14;
            this.legAngle = 0;
            this.blinkTimer = 0;
            this.isBlinking = false;
            this.hit = false;
            this.hitTimer = 0;
            this.color = `hsl(${320 + Math.random() * 40}, 70%, 65%)`;
            this.dead = false;
            this.falling = false;
            this.fallVy = 0;
            this.fallVx = 0;
            this.switchTimer = 180 + Math.floor(Math.random() * 180); // 3-6s @60fps
        }
        update() {
            if (this.dead) return;
            if (this.falling) {
                this.fallVy += 0.3;
                this.fallVx *= 0.99;
                this._fallX = (this._fallX || 0) + this.fallVx;
                this._fallY = (this._fallY || 0) + this.fallVy;

                // Check if spider lands on an uncut strand below
                const game = this.gameRef;
                if (game && game.strands) {
                    for (const strand of game.strands) {
                        if (strand.cut || strand === this.strand) continue;
                        const d = pointSegmentDistance({x: this._fallX, y: this._fallY}, strand.a, strand.b);
                        if (d.dist < 25) {
                            // Landed on a strand — catch and continue crawling
                            this.strand = strand;
                            this.falling = false;
                            this.fallVy = 0;
                            this.fallVx = 0;
                            this.t = Math.max(0, Math.min(1, d.t));
                            this.direction = Math.random() > 0.5 ? 1 : -1;
                            this.hit = false;
                            return;
                        }
                    }
                }

                // Fell off screen — dead
                if (this._fallY > (game ? game.H + 100 : 100)) {
                    this.dead = true;
                }
                return;
            }
            if (this.hit) {
                this.hitTimer--;
                if (this.hitTimer <= 0) this.hit = false;
                // In eradicate mode, if strand was cut while hit, start falling
                if (this.strand.cut && this.gameRef && this.gameRef.gameMode === 'eradicate' && !this.falling) {
                    const t = this.t;
                    this._fallX = this.strand.a.x + (this.strand.b.x - this.strand.a.x) * t;
                    this._fallY = this.strand.a.y + (this.strand.b.y - this.strand.a.y) * t;
                    this.falling = true;
                    this.fallVy = 0;
                    this.fallVx = (Math.random() - 0.5) * 2;
                }
                return;
            }
            if (this.strand.cut) {
                // In eradicate mode, spider falls when its strand is cut
                if (this.gameRef && this.gameRef.gameMode === 'eradicate') {
                    const t = this.t;
                    this._fallX = this.strand.a.x + (this.strand.b.x - this.strand.a.x) * t;
                    this._fallY = this.strand.a.y + (this.strand.b.y - this.strand.a.y) * t;
                    this.falling = true;
                    this.fallVy = 0;
                    this.fallVx = (Math.random() - 0.5) * 2;
                    return;
                }
                this.hit = true;
                this.hitTimer = 60;
                return;
            }
            this.t += this.speed * this.direction * 0.01;
            if (this.t >= 1) { this.t = 1; this.direction = -1; }
            if (this.t <= 0) { this.t = 0; this.direction = 1; }
            this.legAngle += 0.3;
            this.blinkTimer++;
            if (this.blinkTimer > 120 + Math.random() * 100) {
                this.isBlinking = true;
                if (this.blinkTimer > 130 + Math.random() * 100) {
                    this.isBlinking = false;
                    this.blinkTimer = 0;
                }
            }
            // No auto strand switching — spiders only move when their strand is cut
        }
        _switchStrand() {
            if (!this.gameRef || !this.gameRef.strands) return;
            const uncutStrands = this.gameRef.strands.filter(s => !s.cut && s !== this.strand);
            if (uncutStrands.length > 0) {
                this.strand = uncutStrands[Math.floor(Math.random() * uncutStrands.length)];
                this.t = Math.random();
            }
        }
        getPosition() {
            if (this.falling) {
                return { x: this._fallX, y: this._fallY };
            }
            if (!this.strand || this.strand.cut) return null;
            return {
                x: this.strand.a.x + (this.strand.b.x - this.strand.a.x) * this.t,
                y: this.strand.a.y + (this.strand.b.y - this.strand.a.y) * this.t
            };
        }
        draw(ctx) {
            const pos = this.getPosition();
            if (!pos && !this.falling) return;
            if (!pos) return;
            ctx.save();
            ctx.translate(pos.x, pos.y);
            if (this.falling) {
                ctx.rotate(this.fallVx * 0.05);
            }
            if (this.hit) {
                ctx.globalAlpha = Math.max(0, 1 - this.hitTimer / 60);
                ctx.translate(0, (60 - this.hitTimer) * 0.5);
            }
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 * i) / 8 + Math.sin(this.legAngle + i) * 0.3;
                const legLen = this.size * 0.9;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(angle) * legLen, Math.sin(angle) * legLen);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(0, 0, this.size * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-3, -3, this.size * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fill();
            const eyeY = -2, eyeOffset = 4;
            [-eyeOffset, eyeOffset].forEach(ex => {
                ctx.beginPath();
                ctx.arc(ex, eyeY, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                if (!this.isBlinking) {
                    ctx.beginPath();
                    ctx.arc(ex + 1, eyeY, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#333';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex + 2, eyeY - 1, 1, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(ex - 3, eyeY);
                    ctx.lineTo(ex + 3, eyeY);
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            });
            ctx.beginPath();
            ctx.arc(0, 3, 2, 0, Math.PI);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }
        checkHit(p1, p2) {
            if (this.hit || this.dead || (this.strand.cut && !this.falling)) return false;
            const pos = this.getPosition();
            if (!pos) return false;
            const d1 = Vec2.dist(p1, pos);
            const d2 = Vec2.dist(p2, pos);
            if (d1 < this.size + 15 || d2 < this.size + 15) {
                this.hit = true;
                this.hitTimer = 60;
                return true;
            }
            return false;
        }
    }

    class CuteBug {
        constructor(type, strand) {
            this.type = type;
            this.strand = strand;
            this.t = Math.random();
            this.direction = Math.random() > 0.5 ? 1 : -1;
            this.hit = false;
            this.hitTimer = 0;
            this.dead = false;
            this.wingAngle = 0;
            const configs = {
                mosquito: { speed: 1.2, size: 10, score: 30, body: '#a8a8a8', wing: 'rgba(200,200,200,0.5)' },
                butterfly: { speed: 0.6, size: 12, score: 50, body: `hsl(${Math.random() * 360}, 80%, 65%)`, wing: `hsla(${Math.random() * 360}, 80%, 70%, 0.6)` },
                firefly: { speed: 0.4, size: 10, score: 100, body: '#ffd93d', wing: 'rgba(255,217,61,0.5)' }
            };
            const cfg = configs[type];
            this.speed = cfg.speed;
            this.size = cfg.size;
            this.score = cfg.score;
            this.bodyColor = cfg.body;
            this.wingColor = cfg.wing;
        }
        update() {
            if (this.dead) return;
            if (this.hit) {
                this.hitTimer--;
                if (this.hitTimer <= 0) this.dead = true;
                return;
            }
            if (this.strand.cut) {
                this.hit = true;
                this.hitTimer = 40;
                return;
            }
            this.t += this.speed * this.direction * 0.008;
            if (this.t >= 1) { this.t = 1; this.direction = -1; }
            if (this.t <= 0) { this.t = 0; this.direction = 1; }
            this.wingAngle += 0.5;
        }
        getPosition() {
            if (!this.strand || this.strand.cut) return null;
            return {
                x: this.strand.a.x + (this.strand.b.x - this.strand.a.x) * this.t,
                y: this.strand.a.y + (this.strand.b.y - this.strand.a.y) * this.t
            };
        }
        draw(ctx) {
            const pos = this.getPosition();
            if (!pos) return;
            ctx.save();
            ctx.translate(pos.x, pos.y);
            if (this.hit) {
                ctx.globalAlpha = Math.max(0, 1 - this.hitTimer / 40);
                ctx.translate(0, -this.hitTimer * 0.3);
            }
            const wingW = Math.abs(Math.sin(this.wingAngle) * 8) + 4;
            ctx.beginPath();
            ctx.ellipse(-6, -2, wingW, 6, -0.3, 0, Math.PI * 2);
            ctx.fillStyle = this.wingColor;
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(6, -2, wingW, 6, 0.3, 0, Math.PI * 2);
            ctx.fillStyle = this.wingColor;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, this.size * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = this.bodyColor;
            ctx.fill();
            if (this.type === 'firefly') {
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 217, 61, 0.2)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 3.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 217, 61, 0.08)';
                ctx.fill();
            }
            [-3, 3].forEach(x => {
                ctx.beginPath();
                ctx.arc(x, -2, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 1, -2, 1, 0, Math.PI * 2);
                ctx.fillStyle = '#333';
                ctx.fill();
            });
            ctx.restore();
        }
        checkHit(p1, p2) {
            if (this.hit || this.dead || this.strand.cut) return false;
            const pos = this.getPosition();
            if (!pos) return false;
            const d1 = Vec2.dist(p1, pos);
            const d2 = Vec2.dist(p2, pos);
            if (d1 < this.size + 15 || d2 < this.size + 15) {
                this.hit = true;
                this.hitTimer = 40;
                return true;
            }
            return false;
        }
    }

    class Particle {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.life = 1;
            this.size = 2 + Math.random() * 3;
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 4;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed - (type === 'bug' ? 3 : 1);
            this.decay = 0.015 + Math.random() * 0.02;
            const colors = {
                web: `hsla(220, 80%, 80%,`,
                spider: `hsla(340, 80%, 75%,`,
                bug: `hsla(${45 + Math.random() * 30}, 90%, 70%,`
            };
            this.colorBase = colors[type];
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.08;
            this.life -= this.decay;
            this.size *= 0.98;
        }
        draw(ctx) {
            if (this.life <= 0) return;
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.colorBase + this.life + ')';
            ctx.shadowBlur = 8;
            ctx.shadowColor = this.colorBase + '1)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
        isDead() { return this.life <= 0; }
    }

    class DropItem {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type; // 'heal', 'shield', 'invincible', 'time'
            this.vy = 0.5;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.life = 300; // 5s @ 60fps
            this.size = 18;
            this.collected = false;
            this.collectAnim = 0;
            this.angle = 0;
        }
        update() {
            if (this.collected) {
                this.collectAnim++;
                return;
            }
            this.y += this.vy;
            this.x += this.vx;
            this.vx += (Math.random() - 0.5) * 0.05;
            this.vx *= 0.98;
            this.life--;
            this.angle += 0.03;
        }
        draw(ctx) {
            if (this.collected && this.collectAnim > 15) return;
            if (this.life <= 0 && !this.collected) return;
            ctx.save();
            ctx.translate(this.x, this.y);
            if (this.collected) {
                const s = 1 + this.collectAnim * 0.08;
                ctx.scale(s, s);
                ctx.globalAlpha = Math.max(0, 1 - this.collectAnim / 15);
            } else {
                const blink = this.life < 90 ? (Math.sin(this.life * 0.3) > 0 ? 1 : 0.3) : 1;
                ctx.globalAlpha = blink;
            }
            ctx.rotate(this.angle);
            const s = this.size;
            switch (this.type) {
                case 'heal':
                    this._drawHeart(ctx, s);
                    break;
                case 'shield':
                    this._drawShield(ctx, s);
                    break;
                case 'invincible':
                    this._drawStar(ctx, s);
                    break;
                case 'time':
                    this._drawClock(ctx, s);
                    break;
            }
            ctx.restore();
        }
        _drawHeart(ctx, s) {
            ctx.beginPath();
            ctx.moveTo(0, s * 0.3);
            ctx.bezierCurveTo(-s * 0.5, -s * 0.3, -s * 0.5, -s * 0.6, 0, -s * 0.3);
            ctx.bezierCurveTo(s * 0.5, -s * 0.6, s * 0.5, -s * 0.3, 0, s * 0.3);
            ctx.fillStyle = '#ff4466';
            ctx.fill();
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff4466';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-s * 0.15, -s * 0.25, s * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fill();
        }
        _drawShield(ctx, s) {
            ctx.beginPath();
            ctx.moveTo(0, -s * 0.4);
            ctx.lineTo(s * 0.35, -s * 0.2);
            ctx.lineTo(s * 0.35, s * 0.1);
            ctx.quadraticCurveTo(s * 0.2, s * 0.4, 0, s * 0.45);
            ctx.quadraticCurveTo(-s * 0.2, s * 0.4, -s * 0.35, s * 0.1);
            ctx.lineTo(-s * 0.35, -s * 0.2);
            ctx.closePath();
            ctx.fillStyle = '#4488ff';
            ctx.fill();
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#4488ff';
            ctx.fill();
            ctx.strokeStyle = '#88bbff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, -s * 0.2);
            ctx.lineTo(0, s * 0.2);
            ctx.moveTo(-s * 0.15, s * 0.0);
            ctx.lineTo(s * 0.15, s * 0.0);
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        _drawStar(ctx, s) {
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
                const outerX = Math.cos(angle) * s * 0.4;
                const outerY = Math.sin(angle) * s * 0.4;
                const innerAngle = angle + Math.PI / 5;
                const innerX = Math.cos(innerAngle) * s * 0.18;
                const innerY = Math.sin(innerAngle) * s * 0.18;
                if (i === 0) ctx.moveTo(outerX, outerY);
                else ctx.lineTo(outerX, outerY);
                ctx.lineTo(innerX, innerY);
            }
            ctx.closePath();
            ctx.fillStyle = '#ffcc00';
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffcc00';
            ctx.fill();
        }
        _drawClock(ctx, s) {
            ctx.beginPath();
            ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = '#44dd88';
            ctx.fill();
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#44dd88';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, s * 0.28, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -s * 0.18);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(s * 0.12, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();
        }
        checkCollect(p1, p2) {
            if (this.collected || this.life <= 0) return false;
            const d1 = Vec2.dist(p1, { x: this.x, y: this.y });
            const d2 = Vec2.dist(p2, { x: this.x, y: this.y });
            if (d1 < this.size + 12 || d2 < this.size + 12) {
                this.collected = true;
                this.collectAnim = 0;
                return true;
            }
            return false;
        }
        isDead() {
            return (this.collected && this.collectAnim > 15) || (!this.collected && this.life <= 0);
        }
    }
    </script>

    <!-- ============ GAME CONTROLLER ============ -->
    <script>
    class Game {
        constructor(canvas, audioSystem) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audioSystem;
            this.state = 'MENU';
            this.level = 0;
            this.score = 0;
            this.timeLeft = 0;
            this.strands = [];
            this.spiders = [];
            this.bugs = [];
            this.particles = [];
            this.dropItems = [];
            this.mouse = { x: 0, y: 0, px: 0, py: 0, down: false };
            this.timerInterval = null;
            this.gameMode = 'classic';
            this.hp = 3;
            this.maxHp = 3;
            this.hasShield = false;
            this.invincibleTimer = 0;
            this.LEVEL_CONFIGS = [
                { rays: 8,  rings: 4, spiders: 2,  bugs: { mosquito: 2 }, targetCut: 0.6, time: 35 },
                { rays: 10, rings: 5, spiders: 4,  bugs: { mosquito: 3, butterfly: 1 }, targetCut: 0.7, time: 45 },
                { rays: 12, rings: 6, spiders: 6,  bugs: { mosquito: 3, butterfly: 2, firefly: 1 }, targetCut: 0.75, time: 55 },
                { rays: 14, rings: 7, spiders: 8,  bugs: { mosquito: 4, butterfly: 2, firefly: 2 }, targetCut: 0.8, time: 65 },
                { rays: 18, rings: 9, spiders: 12, bugs: { mosquito: 5, butterfly: 3, firefly: 2 }, targetCut: 0.85, time: 75 }
            ];
            this.setupInput();
            this.resize();
            window.addEventListener('resize', () => this.resize());
        }
        resize() {
            this.W = this.canvas.width = window.innerWidth;
            this.H = this.canvas.height = window.innerHeight;
        }
        setupInput() {
            const onDown = (x, y) => {
                this.audio.init();
                this.mouse.down = true;
                this.mouse.px = this.mouse.x = x;
                this.mouse.py = this.mouse.y = y;
            };
            const onMove = (x, y) => {
                this.mouse.px = this.mouse.x;
                this.mouse.py = this.mouse.y;
                this.mouse.x = x;
                this.mouse.y = y;
                if (this.state === 'PLAYING' && this.mouse.down) this.handleCut();
            };
            const onUp = () => { this.mouse.down = false; };
            this.canvas.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
            this.canvas.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
            this.canvas.addEventListener('mouseup', onUp);
            this.canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
            this.canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
            this.canvas.addEventListener('touchend', onUp);
        }
        generateWeb() {
            this.strands = [];
            this.spiders = [];
            this.bugs = [];
            this.particles = [];
            this.dropItems = [];
            const cfg = this.LEVEL_CONFIGS[this.level];
            const cx = this.W / 2, cy = this.H / 2;
            const maxR = Math.min(this.W, this.H) * 0.35;
            const anchors = [];
            for (let i = 0; i < cfg.rays; i++) {
                const angle = (Math.PI * 2 * i) / cfg.rays - Math.PI / 2;
                const r = maxR * (0.8 + Math.random() * 0.2);
                anchors.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
            }
            const center = { x: cx, y: cy };
            for (let i = 0; i < cfg.rays; i++) {
                this.strands.push(new Strand(center, anchors[i]));
            }
            for (let r = 1; r <= cfg.rings; r++) {
                const t = r / (cfg.rings + 1);
                for (let i = 0; i < cfg.rays; i++) {
                    const nextI = (i + 1) % cfg.rays;
                    const a1 = { x: cx + (anchors[i].x - cx) * t, y: cy + (anchors[i].y - cy) * t };
                    const a2 = { x: cx + (anchors[nextI].x - cx) * t, y: cy + (anchors[nextI].y - cy) * t };
                    this.strands.push(new Strand(a1, a2));
                }
            }
            const availableStrands = () => this.strands.filter(s => !s.cut);
            for (let i = 0; i < cfg.spiders; i++) {
                const strands = availableStrands();
                if (strands.length > 0) {
                    const strand = strands[Math.floor(Math.random() * strands.length)];
                    this.spiders.push(new CuteSpider(strand, i === 0 ? 1 : 1.2, this));
                }
            }
            Object.entries(cfg.bugs).forEach(([type, count]) => {
                for (let i = 0; i < count; i++) {
                    const strands = availableStrands();
                    if (strands.length > 0) {
                        const strand = strands[Math.floor(Math.random() * strands.length)];
                        this.bugs.push(new CuteBug(type, strand));
                    }
                }
            });
            this.totalStrands = this.strands.length;
            this.cutStrands = 0;
        }
        handleCut() {
            const { x, y, px, py } = this.mouse;
            let spiderHit = false;

            // Check drop items collection first
            for (const item of this.dropItems) {
                if (item.checkCollect({ x, y }, { x: px, y: py })) {
                    this._applyDropItem(item);
                    this.audio.playItemCollect();
                    const colors = { heal: '#ff4466', shield: '#4488ff', invincible: '#ffcc00', time: '#44dd88' };
                    const labels = { heal: '+1\u2764\uFE0F', shield: '\uD83D\uDEE1\uFE0F\u62A4\u76FE', invincible: '\u2B50\u65E0\u654C', time: '+5s' };
                    this.showFloatingText(item.x, item.y, labels[item.type] || '+', colors[item.type] || '#fff');
                }
            }

            if (this.gameMode === 'eradicate') {
                // Eradicate mode: hitting spider directly damages player
                for (const spider of this.spiders) {
                    if (spider.checkHit({ x, y }, { x: px, y: py })) {
                        spiderHit = true;
                        const pos = spider.getPosition() || { x, y };
                        this.createParticles(pos, 'spider');
                        if (this.invincibleTimer > 0) {
                            // Invincible: spider is destroyed, no damage
                            spider.dead = true;
                            spider.hit = false; // Don't show hit animation
                            this.score += 100;
                            this.audio.playBugCatch();
                            this.showFloatingText(pos.x, pos.y, '+100 消灭!', '#ffd93d');
                        } else if (this.hasShield) {
                            // Shield: consume shield, no damage
                            this.hasShield = false;
                            this.audio.playShield();
                            this.showFloatingText(pos.x, pos.y, '\uD83D\uDEE1\uFE0F \u62A4\u76FE\u62B5\u6321', '#4488ff');
                        } else {
                            // Take damage
                            this.hp--;
                            this.audio.playDamage();
                            this.showFloatingText(pos.x, pos.y, '-1\u2764\uFE0F', '#ff4466');
                            if (this.hp <= 0) {
                                this.levelComplete(false, 'hp');
                                return;
                            }
                        }
                    }
                }
                for (const bug of this.bugs) {
                    if (bug.checkHit({ x, y }, { x: px, y: py })) {
                        this.score += bug.score;
                        const pos = bug.getPosition() || { x, y };
                        this.createParticles(pos, 'bug');
                        this.audio.playBugCatch();
                        const color = bug.type === 'firefly' ? '#ffd93d' : bug.type === 'butterfly' ? '#ff6b9d' : '#4ecdc4';
                        this.showFloatingText(pos.x, pos.y, `+${bug.score}`, color);
                        this._trySpawnDropItem(pos, bug.type);
                    }
                }
                // In eradicate mode, always allow cutting strands (even if spider was hit)
                for (const strand of this.strands) {
                        if (strand.checkCut({ x, y }, { x: px, y: py })) {
                            this.score += 10;
                            this.cutStrands++;
                            this.createParticles(Vec2.mid(strand.a, strand.b), 'web');
                            this.audio.playCut();
                        }
                    }
            } else {
                // Classic mode: original logic unchanged
                for (const spider of this.spiders) {
                    if (spider.checkHit({ x, y }, { x: px, y: py })) {
                        this.score = Math.max(0, this.score - 50);
                        spiderHit = true;
                        const pos = spider.getPosition() || { x, y };
                        this.createParticles(pos, 'spider');
                        this.audio.playSpiderHit();
                        this.showFloatingText(pos.x, pos.y, '-50', '#ff6b6b');
                    }
                }
                for (const bug of this.bugs) {
                    if (bug.checkHit({ x, y }, { x: px, y: py })) {
                        this.score += bug.score;
                        const pos = bug.getPosition() || { x, y };
                        this.createParticles(pos, 'bug');
                        this.audio.playBugCatch();
                        const color = bug.type === 'firefly' ? '#ffd93d' : bug.type === 'butterfly' ? '#ff6b9d' : '#4ecdc4';
                        this.showFloatingText(pos.x, pos.y, `+${bug.score}`, color);
                    }
                }
                if (!spiderHit) {
                    for (const strand of this.strands) {
                        if (strand.checkCut({ x, y }, { x: px, y: py })) {
                            this.score += 10;
                            this.cutStrands++;
                            this.createParticles(Vec2.mid(strand.a, strand.b), 'web');
                            this.audio.playCut();
                        }
                    }
                }
            }
            this.updateUI();
            this.checkWinCondition();
        }
        _trySpawnDropItem(pos, bugType) {
            // Only spawn in eradicate mode
            if (this.gameMode !== 'eradicate') return;
            const dropTable = {
                mosquito: { chance: 0.2, items: ['heal'] },
                butterfly: { chance: 0.4, items: ['heal', 'shield'] },
                firefly: { chance: 0.6, items: ['heal', 'invincible', 'time'] }
            };
            const cfg = dropTable[bugType];
            if (!cfg || Math.random() > cfg.chance) return;
            const type = cfg.items[Math.floor(Math.random() * cfg.items.length)];
            this.dropItems.push(new DropItem(pos.x, pos.y, type));
        }
        _applyDropItem(item) {
            switch (item.type) {
                case 'heal':
                    this.hp = Math.min(this.maxHp, this.hp + 1);
                    this.audio.playHeal();
                    break;
                case 'shield':
                    this.hasShield = true;
                    this.audio.playShield();
                    break;
                case 'invincible':
                    this.invincibleTimer = 300; // 5s @60fps
                    break;
                case 'time':
                    this.timeLeft += 5;
                    break;
            }
        }
        createParticles(pos, type) {
            if (!pos) return;
            for (let i = 0; i < 10; i++) {
                this.particles.push(new Particle(pos.x, pos.y, type));
            }
        }
        showFloatingText(x, y, text, color) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        startGame(mode) {
            this.gameMode = mode || 'classic';
            this.hideModal();
            document.getElementById('backMenuBtn').style.display = 'inline-block';
            this.level = 0;
            this.score = 0;
            this.hp = this.maxHp;
            this.hasShield = false;
            this.invincibleTimer = 0;
            this._updateModeUI();
            this.startLevel();
        }
        startLevel() {
            this.hideModal();
            this.mouse.down = false;
            const cfg = this.LEVEL_CONFIGS[this.level];
            this.timeLeft = cfg.time;
            if (this.gameMode === 'eradicate') {
                this.hp = this.maxHp;
                this.hasShield = false;
                this.invincibleTimer = 0;
            }
            this._updateModeUI();
            this.generateWeb();
            this.state = 'PLAYING';
            this.updateUI();
            if (this.timerInterval) clearInterval(this.timerInterval);
            this.timerInterval = setInterval(() => {
                if (this.state !== 'PLAYING') return;
                this.timeLeft--;
                this.updateUI();
                if (this.timeLeft <= 0) this.levelComplete(false);
            }, 1000);
            this.loop();
        }
        checkWinCondition() {
            if (this.gameMode === 'classic') {
                const cutRatio = this.cutStrands / this.totalStrands;
                const target = this.LEVEL_CONFIGS[this.level].targetCut;
                if (cutRatio >= target) this.levelComplete(true);
            } else {
                // Eradicate mode: win when all spiders are dead
                const aliveSpiders = this.spiders.filter(s => !s.dead);
                if (aliveSpiders.length === 0) this.levelComplete(true);
            }
        }
        levelComplete(won, reason) {
            this.state = won ? 'LEVEL_COMPLETE' : 'GAME_OVER';
            clearInterval(this.timerInterval);
            if (won) {
                this.score += 200;
                this.audio.playLevelComplete();
                if (this.level >= this.LEVEL_CONFIGS.length - 1) {
                    const modeLabel = this.gameMode === 'eradicate' ? '清剿模式' : '经典模式';
                    this.showModal('\uD83C\uDF89 恭喜通关\uff01', `你完成了${modeLabel}所有关卡\uff01<br>最终得分: ${this.score}`, '重新开始', () => this.backToMenu());
                } else {
                    this.showModal('\u2728 关卡完成\uff01', `得分: ${this.score}<br>准备进入第 ${this.level + 2} 关`, '下一关', () => {
                        this.level++;
                        this.startLevel();
                    });
                }
            } else {
                if (this.gameMode === 'eradicate' && reason === 'hp') {
                    this.showModal('\uD83D\uDC9A 血量归零\uff01', `本关蜘蛛未全部消灭<br>得分: ${this.score}`, '重试', () => this.startLevel());
                } else {
                    this.showModal('\u23F0 时间到\uff01', `本关目标未完成<br>得分: ${this.score}`, '重试', () => this.startLevel());
                }
            }
        }
        restartLevel() {
            if (this.state !== 'PLAYING') return;
            clearInterval(this.timerInterval);
            this.startLevel();
        }
        showModal(title, text, btnText, callback) {
            this.mouse.down = false;
            const modal = document.getElementById('gameModal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').innerHTML = text;
            document.getElementById('menuBtns').style.display = 'none';
            const btn = document.getElementById('startBtn');
            btn.style.display = 'inline-block';
            btn.textContent = btnText;
            btn.onclick = callback;
            modal.classList.add('show');
        }
        showMenuModal() {
            const modal = document.getElementById('gameModal');
            document.getElementById('modalTitle').textContent = '\uD83D\uDD78\uFE0F 蛛网小卫士';
            document.getElementById('modalText').innerHTML =
                '选择你喜欢的模式开始游戏！<br><br>' +
                '<b>\uD83D\uDD78\uFE0F 经典模式</b> — 切断蛛丝达标过关<br>' +
                '\uD83D\uDD77\uFE0F 切到蜘蛛 <b style="color:#ff6b6b">-50分</b> | ' +
                '\uD83E\uDD8F 蚊子 <b style="color:#4ecdc4">+30</b> | ' +
                '\uD83D\uDC8B 蝴蝶 <b style="color:#ff6b9d">+50</b> | ' +
                '\u2728 萤火虫 <b style="color:#ffd93d">+100</b><br><br>' +
                '<b>\uD83D\uDD77\uFE0F 清剿模式</b> — 消灭所有蜘蛛过关<br>' +
                '\u2764\uFE0F 3滴血 | 切断蛛丝让蜘蛛掉落 | ' +
                '虫子掉落道具可拾取';
            document.getElementById('menuBtns').style.display = 'flex';
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('backMenuBtn').style.display = 'none';
            modal.classList.add('show');
        }
        hideModal() {
            document.getElementById('gameModal').classList.remove('show');
        }
        backToMenu() {
            clearInterval(this.timerInterval);
            this.state = 'MENU';
            this.showMenuModal();
        }
        update() {
            if (this.state !== 'PLAYING') return;
            this.strands.forEach(s => s.update());
            this.spiders.forEach(s => s.update());
            this.bugs.forEach(b => b.update());
            this.dropItems.forEach(d => d.update());
            this.dropItems = this.dropItems.filter(d => !d.isDead());
            this.particles = this.particles.filter(p => !p.isDead());
            this.particles.forEach(p => p.update());
            // Invincible timer per frame (300 frames = 5s @ 60fps)
            if (this.invincibleTimer > 0) this.invincibleTimer--;
            this.updateUI(); // Update buff display in real-time
            this.checkWinCondition();
        }
        render() {
            const grad = this.ctx.createRadialGradient(this.W/2, this.H/2, 0, this.W/2, this.H/2, this.W);
            grad.addColorStop(0, '#fff8fb');
            grad.addColorStop(1, '#f0f4ff');
            this.ctx.fillStyle = grad;
            this.ctx.fillRect(0, 0, this.W, this.H);
            this.strands.forEach(s => s.draw(this.ctx));
            this.bugs.forEach(b => b.draw(this.ctx));
            this.spiders.forEach(s => s.draw(this.ctx));
            this.dropItems.forEach(d => d.draw(this.ctx));
            this.particles.forEach(p => p.draw(this.ctx));
            if (this.mouse.down && this.state === 'PLAYING') {
                this.ctx.save();
                this.ctx.strokeStyle = 'rgba(123, 104, 238, 0.3)';
                this.ctx.lineWidth = 4;
                this.ctx.lineCap = 'round';
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = 'rgba(123, 104, 238, 0.3)';
                this.ctx.beginPath();
                this.ctx.moveTo(this.mouse.px, this.mouse.py);
                this.ctx.lineTo(this.mouse.x, this.mouse.y);
                this.ctx.stroke();
                this.ctx.restore();
            }
        }
        loop() {
            if (this.state !== 'PLAYING') return;
            this.update();
            this.render();
            requestAnimationFrame(() => this.loop());
        }
        updateUI() {
            document.getElementById('score').textContent = this.score;
            document.getElementById('timer').textContent = this.timeLeft;
            document.getElementById('levelBadge').textContent = `第 ${this.level + 1} 关`;
            if (this.gameMode === 'eradicate') {
                const aliveSpiders = this.spiders.filter(s => !s.dead).length;
                document.getElementById('spiderCount').textContent = `剩余蜘蛛 ${aliveSpiders}只`;
                let hearts = '';
                for (let i = 0; i < this.maxHp; i++) {
                    hearts += i < this.hp ? '❤️' : '🖤';
                }
                document.getElementById('heartsDisplay').textContent = hearts;
                // Update buff display
                let buffHtml = '';
                if (this.hasShield) buffHtml += '<span class="buff-icon" title="护盾">🛡️</span>';
                if (this.invincibleTimer > 0) buffHtml += '<span class="buff-icon" title="无敌">⭐</span>';
                document.getElementById('buffDisplay').innerHTML = buffHtml;
            } else {
                const cutRatio = this.totalStrands > 0 ? this.cutStrands / this.totalStrands : 0;
                const target = this.LEVEL_CONFIGS[this.level].targetCut;
                document.getElementById('cutPercent').textContent = `${Math.floor(cutRatio * 100)}% / ${Math.floor(target * 100)}%`;
                document.getElementById('progressFill').style.width = `${Math.min(cutRatio / target * 100, 100)}%`;
                document.getElementById('buffDisplay').innerHTML = '';
            }
        }
        _updateModeUI() {
            const classicInfo = document.getElementById('classicInfo');
            const eradicateInfo = document.getElementById('eradicateInfo');
            if (this.gameMode === 'eradicate') {
                classicInfo.classList.add('hidden');
                eradicateInfo.classList.add('active');
            } else {
                classicInfo.classList.remove('hidden');
                eradicateInfo.classList.remove('active');
            }
        }
    }
    </script>

    <!-- ============ MAIN ENTRY ============ -->

        event.target.textContent = enabled ? '🔊 音效' : '🔇 音效';
