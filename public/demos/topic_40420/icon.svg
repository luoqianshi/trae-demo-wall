<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a7f4b"/>
      <stop offset="100%" stop-color="#0d5c33"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f28c38"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 药丸 -->
  <g transform="translate(256 200)">
    <rect x="-90" y="-45" width="180" height="90" rx="45" fill="url(#pill)"/>
    <rect x="0" y="-45" width="90" height="90" fill="#fff" opacity="0.95"/>
    <rect x="-3" y="-45" width="6" height="90" fill="url(#pill)"/>
  </g>
  <!-- 文字 药明白 -->
  <text x="256" y="380" font-size="78" font-weight="900" fill="#ffffff" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="2">药明白</text>
  <text x="256" y="440" font-size="22" font-weight="500" fill="#fbbf24" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="6">让父母听懂每一粒药</text>
</svg>
