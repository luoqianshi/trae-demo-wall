<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>费曼学伴 · Feynman Buddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #8b5cf6;
            --accent: #f59e0b;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* 页面容器 */
        .page {
            display: none;
            min-height: 100vh;
            animation: fadeIn 0.4s ease;
        }

        .page.active {
            display: block;
        }

        /* 聊天页特殊处理 */
        .page.chat-page {
            display: none;
            flex-direction: column;
            height: 100vh;
            min-height: 100vh;
        }

        .page.chat-page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: white;
        }

        /* 首页 - 概念选择 */
        .hero {
            text-align: center;
            padding: 4rem 2rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        .concept-input-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .concept-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .concept-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .difficulty-selector {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficulty-btn {
            padding: 0.6rem 1.2rem;
            border: 2px solid var(--border);
            border-radius: 25px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .difficulty-btn:hover {
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .start-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1.5rem;
            font-family: inherit;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .start-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 题库 */
        .question-bank {
            margin-top: 2rem;
        }

        .question-bank h3 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .category-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-tab {
            padding: 0.5rem 1rem;
            border: none;
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .category-tab.active {
            background: var(--primary);
            color: white;
        }

        .concepts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .concept-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .concept-card:hover {
            border-color: var(--primary-light);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .concept-card.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .concept-card .concept-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .concept-card .concept-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* 讲课对话页 */
        .chat-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header-info h2 {
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
        }

        .chat-header-info .difficulty-tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .chat-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-secondary {
            padding: 0.6rem 1.2rem;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .btn-danger {
            padding: 0.6rem 1.2rem;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background: var(--bg);
        }

        .message {
            max-width: 80%;
            margin-bottom: 1.5rem;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            margin-left: auto;
        }

        .message-bubble {
            padding: 1rem 1.25rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-bubble {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .message-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .layer-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .typing-indicator {
            display: flex;
            gap: 0.4rem;
            padding: 1rem 1.25rem;
            background: var(--card-bg);
            border-radius: 18px;
            border: 1px solid var(--border);
            width: fit-content;
            margin-bottom: 1.5rem;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
        }

        .chat-input-area {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 1rem 2rem;
            flex-shrink: 0;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 0.75rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .chat-input {
            flex: 1;
            padding: 0.9rem 1.25rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
            resize: none;
            max-height: 120px;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .send-btn {
            padding: 0.9rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 掌握度报告页 */
        .report-page {
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .report-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .report-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .report-header .concept-name {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .report-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .report-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .report-card h3 {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .chart-container {
            position: relative;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .score-display {
            text-align: center;
            padding: 2rem;
        }

        .score-number {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-label {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .level-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            margin-top: 1rem;
            font-size: 1rem;
        }

        .level-badge.mastered {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .level-badge.partial {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .level-badge.beginner {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .weak-points-list {
            list-style: none;
        }

        .weak-point-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.05);
            border-radius: 12px;
            margin-bottom: 0.75rem;
            border-left: 4px solid var(--danger);
        }

        .weak-point-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .weak-point-content {
            flex: 1;
        }

        .weak-point-dimension {
            font-weight: 600;
            color: var(--danger);
            font-size: 0.9rem;
        }

        .weak-point-detail {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .report-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-outline {
            padding: 1rem 2rem;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-outline:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        /* 巩固练习页 */
        .practice-page {
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .practice-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .practice-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }

        .question-dimension {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            padding: 1rem 1.25rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .option-item:hover {
            border-color: var(--primary-light);
            background: rgba(99, 102, 241, 0.02);
        }

        .option-item.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .option-item.correct {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
        }

        .option-item.wrong {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.05);
        }

        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .option-item.selected .option-letter {
            background: var(--primary);
            color: white;
        }

        .option-item.correct .option-letter {
            background: var(--success);
            color: white;
        }

        .option-item.wrong .option-letter {
            background: var(--danger);
            color: white;
        }

        .feedback-area {
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-radius: 12px;
            display: none;
        }

        .feedback-area.show {
            display: block;
        }

        .feedback-area.correct {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
        }

        .feedback-area.wrong {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .feedback-area.correct .feedback-title {
            color: var(--success);
        }

        .feedback-area.wrong .feedback-title {
            color: var(--danger);
        }

        .practice-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.8rem;
            }

            .report-content {
                grid-template-columns: 1fr;
            }

            .chat-header {
                padding: 1rem;
            }

            .chat-messages {
                padding: 1rem;
            }

            .message {
                max-width: 90%;
            }

            .chat-input-area {
                padding: 1rem;
            }

            .concepts-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .report-actions {
                flex-direction: column;
            }

            .btn-primary, .btn-outline {
                width: 100%;
            }
        }

        /* 状态提示 */
        .status-bar {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .status-bar .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 学习档案页 */
        .archive-page {
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .archive-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .archive-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .history-list {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-info h4 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .history-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .history-score {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <span>费曼学伴</span>
        </div>
        <div class="nav-links">
            <a href="#" onclick="showPage('home'); return false;">首页</a>
            <a href="#" onclick="showPage('archive'); return false;">学习档案</a>
        </div>
    </nav>

    <!-- 首页 - 概念选择 -->
    <div id="home" class="page active">
        <div class="hero">
            <h1>费曼学伴</h1>
            <p class="subtitle">用你自己的话讲清楚一个概念，AI 学生来检验你是否真的懂了</p>
        </div>

        <div style="max-width: 700px; margin: 0 auto; padding: 0 2rem;">
            <div class="concept-input-section">
                <div class="input-group">
                    <label>你想掌握的概念是什么？</label>
                    <input type="text" class="concept-input" id="conceptInput" placeholder="例如：熵、递归、机会成本...">
                </div>

                <div class="input-group">
                    <label>选择 AI 学生的水平</label>
                    <div class="difficulty-selector">
                        <button class="difficulty-btn active" data-level="kindergarten">幼儿园小孩</button>
                        <button class="difficulty-btn" data-level="middle">初中生</button>
                        <button class="difficulty-btn" data-level="college">大学生</button>
                        <button class="difficulty-btn" data-level="professor">教授</button>
                    </div>
                </div>

                <button class="start-btn" id="startBtn" onclick="startSession()">开始讲解</button>
            </div>

            <div class="question-bank">
                <h3>或者从题库中选择一个概念</h3>
                <div class="category-tabs">
                    <button class="category-tab active" data-category="physics">物理</button>
                    <button class="category-tab" data-category="math">数学</button>
                    <button class="category-tab" data-category="cs">计算机</button>
                    <button class="category-tab" data-category="econ">经济学</button>
                    <button class="category-tab" data-category="biology">生物</button>
                </div>
                <div class="concepts-grid" id="conceptsGrid">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 讲课对话页 -->
    <div id="chat" class="page chat-page">
        <div class="chat-header">
            <div class="chat-header-info">
                <h2 id="chatConceptName">概念名称</h2>
                <span class="difficulty-tag" id="chatDifficulty">难度</span>
            </div>
            <div class="chat-actions">
                <button class="btn-secondary" onclick="changeDifficulty()">切换难度</button>
                <button class="btn-danger" onclick="endSession()">结束讲解</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- 消息动态生成 -->
        </div>

        <div class="chat-input-area">
            <div class="status-bar" id="statusBar">
                <span class="status-dot"></span>
                <span id="statusText">AI 正在听你讲...</span>
            </div>
            <div class="chat-input-wrapper">
                <textarea class="chat-input" id="chatInput" rows="1" placeholder="用自己的话讲解这个概念..." onkeydown="handleEnter(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <!-- 掌握度报告页 -->
    <div id="report" class="page report-page">
        <div class="report-header">
            <h1>掌握度报告</h1>
            <p class="concept-name" id="reportConceptName">概念名称</p>
        </div>

        <div class="report-content">
            <div class="report-card">
                <h3>五维能力评估</h3>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <div class="report-card">
                <div class="score-display">
                    <div class="score-number" id="totalScore">--</div>
                    <div class="score-label">综合得分</div>
                    <div class="level-badge" id="levelBadge">--</div>
                </div>

                <h3 style="margin-top: 2rem; margin-bottom: 1rem;">薄弱点分析</h3>
                <ul class="weak-points-list" id="weakPointsList">
                    <!-- 动态生成 -->
                </ul>
            </div>
        </div>

        <div class="report-actions">
            <button class="btn-primary" onclick="startPractice()">开始巩固练习</button>
            <button class="btn-outline" onclick="showPage('home')">再来一次</button>
        </div>
    </div>

    <!-- 巩固练习页 -->
    <div id="practice" class="page practice-page">
        <div class="practice-header">
            <h1>巩固练习</h1>
            <p style="color: var(--text-secondary);">针对薄弱点进行针对性练习</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <div id="practiceContainer">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- 学习档案页 -->
    <div id="archive" class="page archive-page">
        <div class="archive-header">
            <h1>学习档案</h1>
            <p style="color: var(--text-secondary);">记录你的学习成长轨迹</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalSessions">0</div>
                <div class="stat-label">总讲解次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgScore">--</div>
                <div class="stat-label">平均得分</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="masteredCount">0</div>
                <div class="stat-label">已掌握概念</div>
            </div>
        </div>

        <div class="history-list">
            <h3 style="margin-bottom: 1rem;">学习记录</h3>
            <div id="historyList">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // ==================== 数据与状态 ====================
        const conceptBank = {
            physics: [
                { name: '熵', icon: '🔥' },
                { name: '相对论', icon: '⚡' },
                { name: '量子力学', icon: '🔮' },
                { name: '牛顿定律', icon: '🍎' },
                { name: '电磁波', icon: '📡' },
                { name: '黑洞', icon: '🕳️' }
            ],
            math: [
                { name: '微积分', icon: '📐' },
                { name: '概率论', icon: '🎲' },
                { name: '线性代数', icon: '📊' },
                { name: '递归', icon: '🔄' },
                { name: '拓扑学', icon: '🧶' },
                { name: '数论', icon: '🔢' }
            ],
            cs: [
                { name: '递归', icon: '🔄' },
                { name: '时间复杂度', icon: '⏱️' },
                { name: '面向对象', icon: '📦' },
                { name: '数据库索引', icon: '🗂️' },
                { name: 'API', icon: '🔌' },
                { name: '机器学习', icon: '🤖' }
            ],
            econ: [
                { name: '机会成本', icon: '⚖️' },
                { name: '边际效应', icon: '📉' },
                { name: '通货膨胀', icon: '💸' },
                { name: '供需关系', icon: '📈' },
                { name: 'GDP', icon: '🏛️' },
                { name: '比较优势', icon: '🌍' }
            ],
            biology: [
                { name: '进化论', icon: '🧬' },
                { name: '光合作用', icon: '🌱' },
                { name: 'DNA复制', icon: '🔬' },
                { name: '免疫系统', icon: '🛡️' },
                { name: '神经元', icon: '🧠' },
                { name: '生态系统', icon: '🌿' }
            ]
        };

        const difficultyConfig = {
            kindergarten: { name: '幼儿园小孩', maxLayer: 1, style: 'simple' },
            middle: { name: '初中生', maxLayer: 3, style: 'normal' },
            college: { name: '大学生', maxLayer: 4, style: 'advanced' },
            professor: { name: '教授', maxLayer: 5, style: 'expert' }
        };

        const layerNames = {
            1: 'L1 · 澄清定义',
            2: 'L2 · 举例说明',
            3: 'L3 · 反例边界',
            4: 'L4 · 应用迁移',
            5: 'L5 · 证伪挑刺'
        };

        let currentSession = null;
        let currentDifficulty = 'kindergarten';
        let selectedConcept = null;
        let chatHistory = [];
        let currentLayer = 0;
        let messageCount = 0;
        let isWaitingAI = false;
        let radarChartInstance = null;

        // ==================== 页面切换 ====================
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if (pageId === 'archive') {
                loadArchive();
            }
        }

        // ==================== 首页逻辑 ====================
        function renderConcepts(category) {
            const grid = document.getElementById('conceptsGrid');
            const concepts = conceptBank[category] || [];
            grid.innerHTML = concepts.map(c => `
                <div class="concept-card" onclick="selectConcept('${c.name}', this)">
                    <div class="concept-icon">${c.icon}</div>
                    <div class="concept-name">${c.name}</div>
                </div>
            `).join('');
        }

        function selectConcept(name, element) {
            selectedConcept = name;
            document.getElementById('conceptInput').value = name;
            document.querySelectorAll('.concept-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
        }

        // 难度选择
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentDifficulty = this.dataset.level;
            });
        });

        // 分类切换
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderConcepts(this.dataset.category);
            });
        });

        // 初始化题库
        renderConcepts('physics');

        // ==================== 会话管理 ====================
        function startSession() {
            const concept = document.getElementById('conceptInput').value.trim();
            if (!concept) {
                alert('请输入或选择一个概念');
                return;
            }

            selectedConcept = concept;
            currentSession = {
                id: Date.now(),
                concept: concept,
                difficulty: currentDifficulty,
                messages: [],
                startTime: new Date(),
                status: 'teaching'
            };

            chatHistory = [];
            currentLayer = 0;
            messageCount = 0;
            isWaitingAI = false;

            // 更新聊天页头部
            document.getElementById('chatConceptName').textContent = concept;
            document.getElementById('chatDifficulty').textContent = difficultyConfig[currentDifficulty].name;

            // 清空消息区
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.innerHTML = '';

            // 添加开场白
            addMessage('ai', `你好！我是你的AI学生。今天请你给我讲讲「${concept}」这个概念吧！

请你用自己的话，尽可能清楚地解释这个概念，就像教一个${difficultyConfig[currentDifficulty].name}一样。准备好了吗？开始讲吧！`);

            showPage('chat');
            updateStatus('AI 正在听你讲...');
        }

        function addMessage(role, content, layer = null) {
            const container = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let layerBadge = '';
            if (layer && role === 'ai') {
                layerBadge = `<span class="layer-badge">${layerNames[layer]}</span>`;
            }

            messageDiv.innerHTML = `
                <div class="message-bubble">${content.replace(/\n/g, '<br>')}</div>
                <div class="message-meta">
                    ${role === 'ai' ? '🎓 AI学生' : '👤 你'}
                    ${layerBadge}
                </div>
            `;

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;

            // 保存到历史
            chatHistory.push({ role, content, layer, timestamp: new Date() });
            currentSession.messages = chatHistory;
        }

        function showTyping() {
            const container = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function updateStatus(text) {
            document.getElementById('statusText').textContent = text;
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendMessage() {
            if (isWaitingAI) return;

            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content) return;

            // 添加用户消息
            addMessage('user', content);
            input.value = '';
            messageCount++;

            // AI 回复
            isWaitingAI = true;
            updateStatus('AI 正在思考...');
            document.getElementById('sendBtn').disabled = true;

            showTyping();

            // 模拟 AI 思考延迟
            setTimeout(() => {
                hideTyping();
                generateAIResponse(content);
                isWaitingAI = false;
                updateStatus('AI 正在听你讲...');
                document.getElementById('sendBtn').disabled = false;
            }, 1500 + Math.random() * 1000);
        }

        // ==================== AI 分层提问引擎 ====================
        function generateAIResponse(userContent) {
            const config = difficultyConfig[currentDifficulty];
            const maxLayer = config.maxLayer;

            // 检查是否应该结束
            if (messageCount >= 12 || currentLayer >= maxLayer) {
                addMessage('ai', '谢谢你这么详细的讲解！我已经听得很清楚了。让我们来看看你的掌握度报告吧。');
                setTimeout(() => {
                    generateReport();
                }, 1500);
                return;
            }

            // 推进层级
            if (currentLayer < maxLayer) {
                currentLayer++;
            }

            // 根据层级生成问题
            const question = generateLayerQuestion(currentLayer, selectedConcept);
            addMessage('ai', question, currentLayer);
        }

        function generateLayerQuestion(layer, concept) {
            const questions = {
                1: [
                    `你刚说的「${concept}」具体指什么？能用大白话给我解释一下吗？`,
                    `我对「${concept}」这个概念有点模糊，你能用最简单的语言告诉我它到底是什么吗？`,
                    `能不能先给我讲讲，「${concept}」的核心意思是什么？`
                ],
                2: [
                    `能给我举个生活中的例子吗？这样我可能更容易理解。`,
                    `如果我要向一个完全不懂的人解释「${concept}」，你能给我打个比方吗？`,
                    `这个概念在现实生活中有什么具体的例子可以说明吗？`
                ],
                3: [
                    `那在什么情况下，「${concept}」就不适用了呢？`,
                    `有没有例外的情况？比如...如果条件变了，这个说法还成立吗？`,
                    `这个概念有没有什么边界条件或者限制？`
                ],
                4: [
                    `如果让你用「${concept}」来解决一个实际问题，你会怎么做？`,
                    `假设我遇到了一个相关的问题，你能用这个概念帮我分析一下吗？`,
                    `这个概念能怎么应用到其他领域呢？`
                ],
                5: [
                    `我听说有人对「${concept}」有不同的理解，你怎么看？`,
                    `如果有人说你的理解有问题，你会怎么反驳？`,
                    `这个概念有没有什么常见的误解？你能帮我澄清一下吗？`
                ]
            };

            const layerQuestions = questions[layer] || questions[1];
            return layerQuestions[Math.floor(Math.random() * layerQuestions.length)];
        }

        function changeDifficulty() {
            const levels = ['kindergarten', 'middle', 'college', 'professor'];
            const currentIndex = levels.indexOf(currentDifficulty);
            const nextIndex = (currentIndex + 1) % levels.length;
            currentDifficulty = levels[nextIndex];

            document.getElementById('chatDifficulty').textContent = difficultyConfig[currentDifficulty].name;
            addMessage('ai', `好的，我现在切换到「${difficultyConfig[currentDifficulty].name}」模式了。我们继续吧！`);
        }

        function endSession() {
            if (confirm('确定要结束讲解并查看报告吗？')) {
                addMessage('ai', '好的，让我来总结一下你的讲解，生成掌握度报告...');
                setTimeout(() => {
                    generateReport();
                }, 1500);
            }
        }

        // ==================== 掌握度报告 ====================
        function generateReport() {
            // 基于对话历史生成评分
            const scores = calculateScores();
            const totalScore = Math.round((scores.accuracy + scores.completeness + scores.clarity + scores.example + scores.adaptability) / 5);

            let level = '还没懂';
            let levelClass = 'beginner';
            if (totalScore >= 85) {
                level = '真懂了';
                levelClass = 'mastered';
            } else if (totalScore >= 70) {
                level = '半懂';
                levelClass = 'partial';
            }

            const weakPoints = [];
            if (scores.accuracy < 70) weakPoints.push({ dimension: '准确性', score: scores.accuracy, detail: '讲解中存在一些概念性错误或不准确之处' });
            if (scores.completeness < 70) weakPoints.push({ dimension: '完整性', score: scores.completeness, detail: '遗漏了一些关键要点或前提条件' });
            if (scores.clarity < 70) weakPoints.push({ dimension: '清晰度', score: scores.clarity, detail: '表达可以更有条理，逻辑更连贯' });
            if (scores.example < 70) weakPoints.push({ dimension: '举例力', score: scores.example, detail: '缺少具体的例子或类比来帮助理解' });
            if (scores.adaptability < 70) weakPoints.push({ dimension: '应变力', score: scores.adaptability, detail: '面对追问时的回应可以更加自信和准确' });

            // 保存报告
            currentSession.evaluation = {
                scores,
                totalScore,
                level,
                weakPoints,
                endTime: new Date()
            };

            // 保存到本地存储
            saveSession(currentSession);

            // 渲染报告页
            document.getElementById('reportConceptName').textContent = selectedConcept;
            document.getElementById('totalScore').textContent = totalScore;

            const badge = document.getElementById('levelBadge');
            badge.textContent = level;
            badge.className = 'level-badge ' + levelClass;

            // 薄弱点列表
            const weakList = document.getElementById('weakPointsList');
            if (weakPoints.length === 0) {
                weakList.innerHTML = '<li style="color: var(--text-secondary); text-align: center; padding: 1rem;">🎉 太棒了！你在所有维度都表现很好，没有明显薄弱点。</li>';
            } else {
                weakList.innerHTML = weakPoints.map(wp => `
                    <li class="weak-point-item">
                        <span class="weak-point-icon">⚠️</span>
                        <div class="weak-point-content">
                            <div class="weak-point-dimension">${wp.dimension} (${wp.score}分)</div>
                            <div class="weak-point-detail">${wp.detail}</div>
                        </div>
                    </li>
                `).join('');
            }

            // 渲染雷达图
            renderRadarChart(scores);

            showPage('report');
        }

        function calculateScores() {
            // 基于对话内容模拟评分
            const userMessages = chatHistory.filter(m => m.role === 'user');
            const totalUserMessages = userMessages.length;

            // 消息长度作为清晰度参考
            const avgLength = userMessages.reduce((sum, m) => sum + m.content.length, 0) / (totalUserMessages || 1);

            // 基础分
            let accuracy = 75 + Math.random() * 20;
            let completeness = 70 + Math.random() * 25;
            let clarity = Math.min(90, 60 + avgLength / 5);
            let example = 65 + Math.random() * 25;
            let adaptability = 70 + Math.random() * 20;

            // 根据对话轮数调整
            if (totalUserMessages < 3) {
                completeness -= 15;
                clarity -= 10;
            }

            // 根据最高层级调整
            if (currentLayer >= 4) {
                adaptability += 10;
            }

            return {
                accuracy: Math.round(Math.max(0, Math.min(100, accuracy))),
                completeness: Math.round(Math.max(0, Math.min(100, completeness))),
                clarity: Math.round(Math.max(0, Math.min(100, clarity))),
                example: Math.round(Math.max(0, Math.min(100, example))),
                adaptability: Math.round(Math.max(0, Math.min(100, adaptability)))
            };
        }

        function renderRadarChart(scores) {
            const ctx = document.getElementById('radarChart').getContext('2d');

            if (radarChartInstance) {
                radarChartInstance.destroy();
            }

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['准确性', '完整性', '清晰度', '举例力', '应变力'],
                    datasets: [{
                        label: '你的表现',
                        data: [scores.accuracy, scores.completeness, scores.clarity, scores.example, scores.adaptability],
                        backgroundColor: 'rgba(99, 102, 241, 0.2)',
                        borderColor: 'rgba(99, 102, 241, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(99, 102, 241, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(99, 102, 241, 1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            min: 0,
                            ticks: {
                                stepSize: 20,
                                font: { size: 11 }
                            },
                            pointLabels: {
                                font: { size: 13, family: 'Noto Sans SC' }
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // ==================== 巩固练习 ====================
        let practiceQuestions = [];
        let currentQuestionIndex = 0;
        let practiceResults = [];

        function startPractice() {
            const weakDimensions = currentSession.evaluation.weakPoints.map(wp => wp.dimension);

            if (weakDimensions.length === 0) {
                alert('太棒了！你没有薄弱点，不需要巩固练习。');
                return;
            }

            // 生成练习题
            practiceQuestions = generatePracticeQuestions(weakDimensions, selectedConcept);
            currentQuestionIndex = 0;
            practiceResults = [];

            renderPracticeQuestion();
            showPage('practice');
        }

        function generatePracticeQuestions(dimensions, concept) {
            const questions = [];

            const questionTemplates = {
                '准确性': [
                    {
                        type: 'choice',
                        question: `关于「${concept}」的以下说法，哪个是正确的？`,
                        options: [
                            '这是一个基础概念，不需要深入理解',
                            '它是多个学科交叉的核心概念',
                            '这个概念只在特定条件下成立',
                            '以上说法都不准确'
                        ],
                        correct: 1,
                        explanation: '准确性要求我们对概念有正确的理解，不能模糊或错误。'
                    }
                ],
                '完整性': [
                    {
                        type: 'choice',
                        question: `在讲解「${concept}」时，以下哪个要素最容易被忽略？`,
                        options: [
                            '概念的定义',
                            '适用条件和边界',
                            '历史背景',
                            '相关公式'
                        ],
                        correct: 1,
                        explanation: '完整性要求我们不仅讲定义，还要讲清楚适用条件和边界。'
                    }
                ],
                '清晰度': [
                    {
                        type: 'text',
                        question: `请用一句话简洁地解释「${concept}」，让完全不懂的人也能明白。`,
                        explanation: '清晰度要求表达简洁明了，避免术语堆砌。'
                    }
                ],
                '举例力': [
                    {
                        type: 'text',
                        question: `请举一个生活中的具体例子来说明「${concept}」。`,
                        explanation: '举例力要求例子贴切、具体，能帮助理解抽象概念。'
                    }
                ],
                '应变力': [
                    {
                        type: 'choice',
                        question: `如果有人质疑你对「${concept}」的理解，最好的应对方式是？`,
                        options: [
                            '坚持自己的观点',
                            '先确认对方的质疑点，再针对性解释',
                            '回避这个问题',
                            '转移话题'
                        ],
                        correct: 1,
                        explanation: '应变力要求我们能冷静分析质疑，并给出合理的回应。'
                    }
                ]
            };

            dimensions.forEach(dim => {
                const templates = questionTemplates[dim] || questionTemplates['准确性'];
                const q = templates[Math.floor(Math.random() * templates.length)];
                questions.push({ ...q, dimension: dim });
            });

            return questions;
        }

        function renderPracticeQuestion() {
            const container = document.getElementById('practiceContainer');
            const progress = ((currentQuestionIndex) / practiceQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            if (currentQuestionIndex >= practiceQuestions.length) {
                showPracticeResult();
                return;
            }

            const q = practiceQuestions[currentQuestionIndex];

            let optionsHtml = '';
            if (q.type === 'choice') {
                optionsHtml = `
                    <ul class="options-list">
                        ${q.options.map((opt, i) => `
                            <li class="option-item" onclick="selectOption(${i})">
                                <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                                <span>${opt}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
            } else {
                optionsHtml = `
                    <textarea class="concept-input" id="practiceAnswer" rows="4" placeholder="请输入你的答案..."></textarea>
                    <button class="btn-primary" style="margin-top: 1rem;" onclick="submitTextAnswer()">提交答案</button>
                `;
            }

            container.innerHTML = `
                <div class="question-card">
                    <span class="question-dimension">${q.dimension}</span>
                    <div class="question-text">${q.question}</div>
                    ${optionsHtml}
                    <div class="feedback-area" id="practiceFeedback">
                        <div class="feedback-title"></div>
                        <div class="feedback-content"></div>
                    </div>
                </div>
                <div class="practice-nav">
                    <span style="color: var(--text-secondary);">题目 ${currentQuestionIndex + 1} / ${practiceQuestions.length}</span>
                    <button class="btn-primary" id="nextBtn" style="display: none;" onclick="nextQuestion()">下一题</button>
                </div>
            `;
        }

        function selectOption(index) {
            const options = document.querySelectorAll('.option-item');
            options.forEach((opt, i) => {
                opt.classList.remove('selected', 'correct', 'wrong');
                if (i === index) opt.classList.add('selected');
            });

            const q = practiceQuestions[currentQuestionIndex];
            const isCorrect = index === q.correct;

            setTimeout(() => {
                options[index].classList.remove('selected');
                options[index].classList.add(isCorrect ? 'correct' : 'wrong');
                if (!isCorrect) {
                    options[q.correct].classList.add('correct');
                }

                showPracticeFeedback(isCorrect, q.explanation);
                practiceResults.push({ correct: isCorrect, dimension: q.dimension });
            }, 300);
        }

        function submitTextAnswer() {
            const answer = document.getElementById('practiceAnswer').value.trim();
            if (!answer) {
                alert('请输入答案');
                return;
            }

            const q = practiceQuestions[currentQuestionIndex];
            // 文本题默认算正确，给出鼓励
            showPracticeFeedback(true, q.explanation + '\n\n你的回答：' + answer);
            practiceResults.push({ correct: true, dimension: q.dimension });
        }

        function showPracticeFeedback(isCorrect, explanation) {
            const feedback = document.getElementById('practiceFeedback');
            feedback.className = 'feedback-area show ' + (isCorrect ? 'correct' : 'wrong');
            feedback.querySelector('.feedback-title').textContent = isCorrect ? '✅ 回答正确！' : '❌ 回答错误';
            feedback.querySelector('.feedback-content').textContent = explanation;
            document.getElementById('nextBtn').style.display = 'inline-block';

            // 禁用选项
            document.querySelectorAll('.option-item').forEach(opt => {
                opt.style.pointerEvents = 'none';
            });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            renderPracticeQuestion();
        }

        function showPracticeResult() {
            const container = document.getElementById('practiceContainer');
            const correctCount = practiceResults.filter(r => r.correct).length;
            const total = practiceResults.length;

            container.innerHTML = `
                <div class="question-card" style="text-align: center;">
                    <div style="font-size: 4rem; margin-bottom: 1rem;">🎉</div>
                    <h2 style="margin-bottom: 1rem;">练习完成！</h2>
                    <p style="font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 1.5rem;">
                        你答对了 ${correctCount}/${total} 道题
                    </p>
                    <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                        <button class="btn-primary" onclick="showPage('home')">返回首页</button>
                        <button class="btn-outline" onclick="showPage('archive')">查看学习档案</button>
                    </div>
                </div>
            `;
            document.getElementById('progressFill').style.width = '100%';
        }

        // ==================== 学习档案 ====================
        function saveSession(session) {
            let sessions = JSON.parse(localStorage.getItem('feynman_sessions') || '[]');
            sessions.push(session);
            localStorage.setItem('feynman_sessions', JSON.stringify(sessions));
        }

        function loadArchive() {
            const sessions = JSON.parse(localStorage.getItem('feynman_sessions') || '[]');

            document.getElementById('totalSessions').textContent = sessions.length;

            if (sessions.length > 0) {
                const avgScore = Math.round(
                    sessions.reduce((sum, s) => sum + (s.evaluation?.totalScore || 0), 0) / sessions.length
                );
                document.getElementById('avgScore').textContent = avgScore;

                const mastered = sessions.filter(s => s.evaluation?.level === '真懂了').length;
                document.getElementById('masteredCount').textContent = mastered;

                const historyList = document.getElementById('historyList');
                historyList.innerHTML = sessions.slice().reverse().map(s => `
                    <div class="history-item">
                        <div class="history-info">
                            <h4>${s.concept}</h4>
                            <div class="history-meta">
                                ${new Date(s.startTime).toLocaleDateString()} · ${difficultyConfig[s.difficulty]?.name || s.difficulty}
                            </div>
                        </div>
                        <div class="history-score">${s.evaluation?.totalScore || '--'}</div>
                    </div>
                `).join('');
            } else {
                document.getElementById('avgScore').textContent = '--';
                document.getElementById('masteredCount').textContent = '0';
                document.getElementById('historyList').innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">还没有学习记录，快去开始第一次讲解吧！</p>';
            }
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            // 自动调整输入框高度
            const chatInput = document.getElementById('chatInput');
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
        });
    </script>
</body>
</html>
