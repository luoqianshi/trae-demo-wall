<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>带薪拉屎收益器</title>
<style>
  :root{
    --blue:#3DA9FC;
    --green:#5BC0BE;
    --yellow:#FFD23F;
    --bg:#FAF9F6;
    --text:#2D3142;
    --gray:#9AA0B5;
    --silver:#C0C8D0;
    --gold:#FFB300;
    --legend:linear-gradient(135deg,#7B2FF7,#FFD23F);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);
    color:var(--text);
    font-size:15px;
    line-height:1.5;
    overflow-x:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;}
  .hidden{display:none !important;}

  /* ===== 顶部 ===== */
  .header{
    position:sticky;top:0;z-index:10;
    background:linear-gradient(135deg,var(--blue),var(--green));
    color:#fff;padding:14px 16px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
  }
  .header h1{font-size:18px;font-weight:700;letter-spacing:1px;}
  .header .sub{font-size:11px;opacity:.85;margin-top:2px;}

  /* ===== Tab ===== */
  .tabs{
    display:flex;background:#fff;
    border-bottom:1px solid #eee;
    position:sticky;top:54px;z-index:9;
  }
  .tab{
    flex:1;padding:12px 0;text-align:center;
    font-size:14px;color:var(--gray);position:relative;
    transition:color .2s;
  }
  .tab.active{color:var(--blue);font-weight:600;}
  .tab.active::after{
    content:"";position:absolute;left:50%;bottom:0;
    transform:translateX(-50%);
    width:28px;height:3px;border-radius:2px;background:var(--blue);
  }

  .page{padding:16px;padding-bottom:80px;}

  /* ===== 卡片 ===== */
  .card{
    background:#fff;border-radius:14px;padding:16px;
    margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04);
  }
  .card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .muted{color:var(--gray);font-size:12px;}

  /* ===== 计时主页 ===== */
  .hero{
    text-align:center;padding:30px 16px 24px;
  }
  .hero .emoji{font-size:64px;line-height:1;margin-bottom:8px;}
  .hero .title{font-size:20px;font-weight:700;margin-bottom:6px;}
  .hero .desc{font-size:13px;color:var(--gray);}

  .big-btn{
    display:block;width:100%;padding:18px;
    background:linear-gradient(135deg,var(--yellow),#FF8C00);
    color:#3a2a00;font-size:18px;font-weight:700;
    border-radius:16px;box-shadow:0 6px 0 #d68900;
    margin-top:18px;transition:transform .1s;
  }
  .big-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #d68900;}
  .big-btn.stop{background:linear-gradient(135deg,#FF6B6B,#EE5253);color:#fff;box-shadow:0 6px 0 #c0392b;}
  .big-btn.stop:active{box-shadow:0 2px 0 #c0392b;}
  .big-btn.pause{background:#fff;color:var(--text);box-shadow:0 6px 0 #ddd;border:2px solid #eee;}

  .timer-box{
    background:linear-gradient(135deg,#1f2a44,#3DA9FC);
    color:#fff;border-radius:18px;padding:24px 16px;
    text-align:center;margin-top:18px;
  }
  .timer-box .duration{font-size:48px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px;}
  .timer-box .earning{font-size:32px;font-weight:700;color:var(--yellow);margin-top:8px;font-variant-numeric:tabular-nums;}
  .timer-box .rate{font-size:12px;opacity:.8;margin-top:6px;}
  .timer-box .buff{font-size:13px;margin-top:10px;min-height:18px;color:var(--yellow);font-weight:600;}

  .row-btns{display:flex;gap:10px;margin-top:14px;}
  .row-btns .big-btn{margin-top:0;flex:1;}

  /* ===== 设置表单 ===== */
  .form-item{margin-bottom:14px;}
  .form-item label{display:block;font-size:13px;color:var(--gray);margin-bottom:6px;}
  .form-item input{
    width:100%;padding:12px;border:1.5px solid #eee;border-radius:10px;
    font-size:16px;background:#fafafa;
  }
  .form-item input:focus{outline:none;border-color:var(--blue);background:#fff;}
  .calc-result{
    background:#f4f9ff;border-radius:10px;padding:14px;margin-top:6px;
  }
  .calc-result div{display:flex;justify-content:space-between;font-size:14px;padding:4px 0;}
  .calc-result .val{color:var(--blue);font-weight:700;}

  .save-btn{
    width:100%;padding:14px;background:var(--blue);color:#fff;
    font-size:16px;font-weight:600;border-radius:12px;margin-top:8px;
  }

  /* ===== 历史记录 ===== */
  .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .summary .item{background:#f4f9ff;border-radius:10px;padding:12px;text-align:center;}
  .summary .num{font-size:20px;font-weight:700;color:var(--blue);}
  .summary .lbl{font-size:11px;color:var(--gray);margin-top:2px;}

  .record-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 0;border-bottom:1px solid #f0f0f0;
  }
  .record-item:last-child{border-bottom:none;}
  .record-item .left .date{font-size:13px;font-weight:600;}
  .record-item .left .meta{font-size:11px;color:var(--gray);margin-top:2px;}
  .record-item .right{text-align:right;}
  .record-item .money{font-size:15px;font-weight:700;color:var(--green);}
  .record-item .dur{font-size:11px;color:var(--gray);}

  .badge{
    display:inline-block;padding:2px 8px;border-radius:10px;
    font-size:11px;font-weight:600;margin-left:6px;
  }
  .b-gray{background:#eee;color:#666;}
  .b-green{background:#e6f7f0;color:#2da77a;}
  .b-silver{background:#eceff3;color:#5a6473;}
  .b-gold{background:#fff3cc;color:#b07b00;}
  .b-legend{background:var(--legend);color:#fff;}

  .empty{text-align:center;padding:40px 0;color:var(--gray);font-size:13px;}

  /* ===== 排行榜 ===== */
  .rank-item{
    display:flex;align-items:center;gap:12px;
    padding:12px 0;border-bottom:1px solid #f0f0f0;
  }
  .rank-item:last-child{border-bottom:none;}
  .rank-num{
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;background:#eee;color:#666;flex-shrink:0;
  }
  .rank-num.top1{background:#FFD700;color:#5a4500;}
  .rank-num.top2{background:#C0C0C0;color:#333;}
  .rank-num.top3{background:#CD7F32;color:#fff;}
  .rank-info{flex:1;}
  .rank-name{font-size:14px;font-weight:600;}
  .rank-meta{font-size:11px;color:var(--gray);}
  .rank-money{font-size:15px;font-weight:700;color:var(--green);}
  .rank-item.me{background:#fff8e0;border-radius:8px;padding:12px;}
  .rank-item.me .rank-name::after{content:" (你)";color:var(--yellow);font-weight:700;}

  /* ===== 成就 ===== */
  .ach-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .ach-item{
    background:#f7f7f9;border-radius:10px;padding:12px;text-align:center;
    opacity:.45;transition:opacity .2s;
  }
  .ach-item.unlocked{opacity:1;background:#fff8e0;}
  .ach-item .ico{font-size:28px;}
  .ach-item .nm{font-size:12px;font-weight:600;margin-top:4px;}
  .ach-item .ds{font-size:10px;color:var(--gray);margin-top:2px;}

  /* ===== 引导遮罩 ===== */
  .mask{
    position:fixed;inset:0;background:rgba(0,0,0,.5);
    z-index:100;display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  .modal{
    background:#fff;border-radius:18px;padding:24px 20px;
    max-width:360px;width:100%;max-height:90vh;overflow-y:auto;
  }
  .modal h2{text-align:center;font-size:18px;margin-bottom:6px;}
  .modal .tagline{text-align:center;color:var(--gray);font-size:12px;margin-bottom:18px;}
  .modal .big-emoji{text-align:center;font-size:56px;margin-bottom:10px;}

  /* ===== 战绩卡 ===== */
  .result-card{text-align:center;}
  .result-card .emoji{font-size:72px;margin-bottom:8px;}
  .result-card .ttl{font-size:22px;font-weight:800;margin-bottom:4px;}
  .result-card .sub{font-size:13px;color:var(--gray);margin-bottom:18px;}
  .result-card .stat{
    display:flex;justify-content:space-around;
    background:#f4f9ff;border-radius:12px;padding:16px;margin-bottom:14px;
  }
  .result-card .stat .v{font-size:22px;font-weight:700;color:var(--blue);}
  .result-card .stat .l{font-size:11px;color:var(--gray);margin-top:2px;}
  .result-card .events{font-size:12px;color:var(--gray);margin-bottom:14px;min-height:18px;}

  /* ===== Toast 随机事件 ===== */
  .toast{
    position:fixed;left:50%;top:30%;transform:translateX(-50%) translateY(-20px);
    background:rgba(31,42,68,.95);color:#fff;
    padding:14px 20px;border-radius:14px;font-size:14px;
    z-index:200;opacity:0;pointer-events:none;
    transition:opacity .3s,transform .3s;
    max-width:80%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.2);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast .ico{font-size:24px;display:block;margin-bottom:4px;}
  .toast .efx{font-size:11px;color:var(--yellow);margin-top:4px;}

  .footer-tip{text-align:center;font-size:11px;color:var(--gray);margin-top:20px;}
</style>
</head>
<body>

<!-- 顶部 -->
<div class="header">
  <div>
    <h1>💩 带薪拉屎收益器</h1>
    <div class="sub">拉得久 = 赚得多</div>
  </div>
</div>

<!-- Tab -->
<div class="tabs">
  <div class="tab active" data-tab="timer">⏱️ 计时</div>
  <div class="tab" data-tab="record">📋 记录</div>
  <div class="tab" data-tab="rank">🏆 排行</div>
  <div class="tab" data-tab="setting">⚙️ 设置</div>
</div>

<!-- 计时页 -->
<div class="page" id="page-timer">
  <div class="card hero">
    <div class="emoji" id="heroEmoji">🚽</div>
    <div class="title" id="heroTitle">今天,带薪了吗?</div>
    <div class="desc" id="heroDesc">点击下方按钮,让公司为你买单</div>

    <!-- 未开始 -->
    <button class="big-btn" id="startBtn">开始带薪拉屎</button>

    <!-- 计时中 -->
    <div class="timer-box hidden" id="timerBox">
      <div class="duration" id="durText">00:00</div>
      <div class="earning" id="earnText">¥0.00</div>
      <div class="rate" id="rateText">¥0.00 / 秒</div>
      <div class="buff" id="buffText"></div>
    </div>
    <div class="row-btns hidden" id="runningBtns">
      <button class="big-btn pause" id="pauseBtn">暂停</button>
      <button class="big-btn stop" id="endBtn">结束</button>
    </div>
  </div>

  <!-- 成就概览 -->
  <div class="card">
    <h3>🎖️ 我的成就 <span class="muted" id="achCount"></span></h3>
    <div class="ach-grid" id="achGrid"></div>
  </div>

  <div class="footer-tip">— 摸鱼光荣,健康第一 —</div>
</div>

<!-- 记录页 -->
<div class="page hidden" id="page-record">
  <div class="card">
    <h3>📊 摸鱼汇总</h3>
    <div class="summary" id="summaryBox"></div>
  </div>
  <div class="card">
    <h3>📝 历史记录 <button class="muted" id="clearBtn" style="float:right;font-size:12px;">清空</button></h3>
    <div id="recordList"></div>
  </div>
</div>

<!-- 排行页 -->
<div class="page hidden" id="page-rank">
  <div class="card">
    <h3>🏆 摸鱼富豪榜</h3>
    <div class="muted" style="margin-bottom:10px;">本地模拟榜 · 击败 NPC 提升排名</div>
    <div id="rankList"></div>
  </div>
</div>

<!-- 设置页 -->
<div class="page hidden" id="page-setting">
  <div class="card">
    <h3>💰 薪资设置</h3>
    <div class="form-item">
      <label>月薪(元)</label>
      <input type="number" id="salaryInput" placeholder="例如 15000" />
    </div>
    <div class="form-item">
      <label>每月工作天数</label>
      <input type="number" id="daysInput" placeholder="例如 22" />
    </div>
    <div class="form-item">
      <label>每日工作时长(小时)</label>
      <input type="number" id="hoursInput" placeholder="例如 8" />
    </div>
    <div class="calc-result" id="calcResult">
      <div><span>时薪</span><span class="val" id="hourly">¥0.00</span></div>
      <div><span>分薪</span><span class="val" id="perMin">¥0.00</span></div>
      <div><span>秒薪</span><span class="val" id="perSec">¥0.0000</span></div>
    </div>
    <button class="save-btn" id="saveBtn">保存设置</button>
  </div>
</div>

<!-- 引导遮罩 -->
<div class="mask hidden" id="guideMask">
  <div class="modal">
    <div class="big-emoji">💩</div>
    <h2>带薪拉屎收益器</h2>
    <div class="tagline">先填个薪资,才能算你赚了多少</div>
    <div class="form-item">
      <label>月薪(元)</label>
      <input type="number" id="gSalary" placeholder="例如 15000" />
    </div>
    <div class="form-item">
      <label>每月工作天数</label>
      <input type="number" id="gDays" value="22" />
    </div>
    <div class="form-item">
      <label>每日工作时长(小时)</label>
      <input type="number" id="gHours" value="8" />
    </div>
    <button class="save-btn" id="gSaveBtn">开始摸鱼 🚽</button>
  </div>
</div>

<!-- 战绩卡 -->
<div class="mask hidden" id="resultMask">
  <div class="modal result-card">
    <div class="emoji" id="rEmoji">🏆</div>
    <div class="ttl" id="rTitle">黄金摸鱼王</div>
    <div class="sub" id="rSub">老板已哭晕在厕所</div>
    <div class="stat">
      <div><div class="v" id="rDur">8:00</div><div class="l">时长</div></div>
      <div><div class="v" id="rMoney">¥12.34</div><div class="l">本次收益</div></div>
    </div>
    <div class="events" id="rEvents"></div>
    <button class="big-btn" id="rAgain">再来一次</button>
    <button class="big-btn pause" id="rClose" style="margin-top:10px;">关闭</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="ico" id="toastIco">🎉</span>
  <div id="toastText">提示</div>
  <div class="efx" id="toastEfx"></div>
</div>

<script>
/* ============== 存储层 ============== */
const LS = {
  get(key, def){
    try{
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : def;
    }catch(e){ return def; }
  },
  set(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
  },
  del(key){ try{ localStorage.removeItem(key); }catch(e){} }
};

const K_CONFIG = 'ps_salary_config';
const K_HISTORY = 'ps_history';
const K_ACH = 'ps_achievements';

/* ============== 配置 & 计算 ============== */
function getConfig(){
  return LS.get(K_CONFIG, null);
}
function calcRates(cfg){
  if(!cfg || !cfg.monthlySalary || !cfg.workDaysPerMonth || !cfg.workHoursPerDay){
    return { hourly:0, perMin:0, perSec:0 };
  }
  const hourly = cfg.monthlySalary / (cfg.workDaysPerMonth * cfg.workHoursPerDay);
  return {
    hourly: hourly,
    perMin: hourly / 60,
    perSec: hourly / 3600
  };
}

/* ============== 称号 ============== */
const TITLES = [
  { min:0,        max:60,       name:'打工人萌新',   cls:'b-gray',   emoji:'🐣' },
  { min:60,       max:300,      name:'摸鱼学徒',     cls:'b-green',  emoji:'🐟' },
  { min:300,      max:900,      name:'白银摸鱼者',   cls:'b-silver', emoji:'🥈' },
  { min:900,      max:1800,     name:'黄金摸鱼王',   cls:'b-gold',   emoji:'👑' },
  { min:1800,     max:Infinity, name:'传说级带薪侠', cls:'b-legend', emoji:'💎' }
];
function getTitle(sec){
  return TITLES.find(t => sec >= t.min && sec < t.max) || TITLES[0];
}

/* ============== 随机事件 ============== */
const EVENTS = [
  { id:'boss',   name:'老板路过',   ico:'👀', desc:'紧张加成!',  effect:'x2',   duration:3000,  weight:15, cooldown:60000 },
  { id:'paper',  name:'纸不够了',   ico:'🧻', desc:'被迫加时2分钟', effect:'add120', duration:0, weight:8,  cooldown:90000 },
  { id:'neighbor',name:'隔间有人',  ico:'🚪', desc:'社交压力',  effect:'x0.5', duration:10000, weight:18, cooldown:60000 },
  { id:'signal', name:'信号真好',   ico:'📶', desc:'纯属吐槽',  effect:'none', duration:0,    weight:30, cooldown:30000 },
  { id:'inspire',name:'灵感乍现',   ico:'💡', desc:'收益+10%',  effect:'x1.1', duration:5000, weight:12, cooldown:60000 }
];
const eventLastTrigger = {}; // id -> timestamp

function tryTriggerEvent(){
  const now = Date.now();
  const candidates = EVENTS.filter(e => !eventLastTrigger[e.id] || now - eventLastTrigger[e.id] > e.cooldown);
  if(candidates.length === 0) return null;
  const totalW = candidates.reduce((s,e)=>s+e.weight, 0);
  let r = Math.random() * totalW;
  for(const e of candidates){
    r -= e.weight;
    if(r <= 0){
      eventLastTrigger[e.id] = now;
      return e;
    }
  }
  return candidates[candidates.length-1];
}

/* ============== 成就 ============== */
const ACHIEVEMENTS = [
  { id:'first',    ico:'🎯', name:'初出茅庐', desc:'完成首次带薪拉屎' },
  { id:'hour1',    ico:'⏰', name:'久经沙场', desc:'累计拉满1小时' },
  { id:'single20', ico:'🔥', name:'一战封神', desc:'单次破20分钟' },
  { id:'streak3',  ico:'📅', name:'持之以恒', desc:'连续3天打卡' },
  { id:'rich100',  ico:'💵', name:'摸鱼大师', desc:'累计收益破100元' },
  { id:'single30', ico:'💎', name:'传说降临', desc:'单次破30分钟' }
];

function getAch(){ return LS.get(K_ACH, []); }
function unlockAch(id){
  const list = getAch();
  if(list.find(a=>a.id===id)) return null;
  const rec = { id, unlockedAt: Date.now() };
  list.push(rec);
  LS.set(K_ACH, list);
  const def = ACHIEVEMENTS.find(a=>a.id===id);
  if(def) showToast(def.ico, '成就解锁:'+def.name, def.desc);
  return rec;
}

function checkAchievements(session, history){
  // session: {durationSec, earning}
  const all = [...(history||[]), session];
  const totalSec = all.reduce((s,r)=>s+r.durationSec,0);
  const totalEarn = all.reduce((s,r)=>s+r.earning,0);

  unlockAch('first');
  if(totalSec >= 3600) unlockAch('hour1');
  if(session.durationSec >= 1200) unlockAch('single20');
  if(session.durationSec >= 1800) unlockAch('single30');
  if(totalEarn >= 100) unlockAch('rich100');

  // 连续3天
  const days = [...new Set((history||[]).map(r=>new Date(r.timestamp).toDateString()))]
    .sort((a,b)=>new Date(b)-new Date(a));
  if(days.length >= 3){
    // 检查最近3天连续
    const today = new Date();
    let cont = true;
    for(let i=0;i<3;i++){
      const d = new Date(today); d.setDate(d.getDate()-i);
      if(!days.includes(d.toDateString())){ cont=false; break; }
    }
    if(cont) unlockAch('streak3');
  }
}

/* ============== Toast ============== */
let toastTimer = null;
function showToast(ico, text, efx){
  const t = document.getElementById('toast');
  document.getElementById('toastIco').textContent = ico;
  document.getElementById('toastText').textContent = text;
  document.getElementById('toastEfx').textContent = efx || '';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ============== 计时核心 ============== */
const timer = {
  running:false,
  paused:false,
  startTs:0,        // 本次开始时间戳
  accElapsed:0,     // 累计有效毫秒(不含暂停)
  pauseTs:0,        // 暂停开始时间戳
  rates:null,
  buffMul:1,        // 当前收益倍率
  buffEndTs:0,
  extraSec:0,       // 纸不够加时(秒)
  eventsTriggered:[], // 本次触发的事件名
  rafId:null
};

function startTimer(){
  const cfg = getConfig();
  if(!cfg){
    document.getElementById('guideMask').classList.remove('hidden');
    return;
  }
  timer.rates = calcRates(cfg);
  timer.running = true;
  timer.paused = false;
  timer.startTs = Date.now();
  timer.accElapsed = 0;
  timer.buffMul = 1;
  timer.buffEndTs = 0;
  timer.extraSec = 0;
  timer.eventsTriggered = [];

  // UI 切换
  document.getElementById('startBtn').classList.add('hidden');
  document.getElementById('timerBox').classList.remove('hidden');
  document.getElementById('runningBtns').classList.remove('hidden');
  document.getElementById('heroEmoji').textContent = '💩';
  document.getElementById('heroTitle').textContent = '带薪中...';
  document.getElementById('heroDesc').textContent = '别紧张,老板看不到';

  // 随机事件调度
  timer.eventScheduler = setInterval(()=>{
    if(!timer.running || timer.paused) return;
    const e = tryTriggerEvent();
    if(e) applyEvent(e);
  }, 8000);

  tick();
}

function applyEvent(e){
  timer.eventsTriggered.push(e.name);
  if(e.effect === 'x2'){
    timer.buffMul = 2;
    timer.buffEndTs = Date.now() + e.duration;
  } else if(e.effect === 'x0.5'){
    timer.buffMul = 0.5;
    timer.buffEndTs = Date.now() + e.duration;
  } else if(e.effect === 'x1.1'){
    timer.buffMul = 1.1;
    timer.buffEndTs = Date.now() + e.duration;
  } else if(e.effect === 'add120'){
    timer.extraSec += 120;
  }
  showToast(e.ico, e.name, e.desc);
}

function pauseTimer(){
  if(!timer.running) return;
  if(timer.paused){
    // 恢复
    timer.paused = false;
    timer.accElapsed += Date.now() - timer.startTs; // 这里逻辑见 tick 注释
    timer.startTs = Date.now();
    document.getElementById('pauseBtn').textContent = '暂停';
  } else {
    timer.paused = true;
    timer.accElapsed += Date.now() - timer.startTs;
    document.getElementById('pauseBtn').textContent = '继续';
  }
}

function endTimer(){
  if(!timer.running) return;
  timer.running = false;
  clearInterval(timer.eventScheduler);
  cancelAnimationFrame(timer.rafId);

  // 计算最终时长
  if(!timer.paused){
    timer.accElapsed += Date.now() - timer.startTs;
  }
  let durMs = timer.accElapsed;
  let durSec = Math.floor(durMs / 1000) + timer.extraSec;
  if(durSec < 1) durSec = 1;

  const earning = durSec * timer.rates.perSec * 1; // extraSec 不在计时内,但作为额外收益,这里简化为时长内
  // 注:extraSec 已加入 durSec,按秒薪计算收益

  // 保存记录
  const rec = {
    id: 'r_' + Date.now(),
    timestamp: Date.now(),
    durationSec: durSec,
    earning: parseFloat(earning.toFixed(2)),
    title: getTitle(durSec).name,
    events: timer.eventsTriggered
  };
  const history = LS.get(K_HISTORY, []);
  history.push(rec);
  LS.set(K_HISTORY, history);

  // 成就
  checkAchievements(rec, history.slice(0, -1));

  // 战绩卡
  showResult(rec);

  // 重置 UI
  resetTimerUI();
  renderAch();
  renderRecords();
  renderRank();
}

function resetTimerUI(){
  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('timerBox').classList.add('hidden');
  document.getElementById('runningBtns').classList.add('hidden');
  document.getElementById('heroEmoji').textContent = '🚽';
  document.getElementById('heroTitle').textContent = '今天,带薪了吗?';
  document.getElementById('heroDesc').textContent = '点击下方按钮,让公司为你买单';
  document.getElementById('durText').textContent = '00:00';
  document.getElementById('earnText').textContent = '¥0.00';
  document.getElementById('rateText').textContent = '¥0.00 / 秒';
  document.getElementById('buffText').textContent = '';
}

function tick(){
  if(!timer.running) return;
  if(!timer.paused){
    const elapsed = timer.accElapsed + (Date.now() - timer.startTs);
    const totalSec = Math.floor(elapsed / 1000) + timer.extraSec;
    // buff 过期检查
    if(timer.buffEndTs && Date.now() > timer.buffEndTs){
      timer.buffMul = 1;
      timer.buffEndTs = 0;
    }
    const earn = totalSec * timer.rates.perSec * timer.buffMul;
    // 显示
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    document.getElementById('durText').textContent =
      String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    document.getElementById('earnText').textContent = '¥' + earn.toFixed(2);
    document.getElementById('rateText').textContent =
      '¥' + (timer.rates.perSec * timer.buffMul).toFixed(4) + ' / 秒';
    const buffEl = document.getElementById('buffText');
    if(timer.buffMul !== 1){
      buffEl.textContent = '⚡ 收益 ×' + timer.buffMul;
    } else if(timer.extraSec > 0){
      buffEl.textContent = '🧻 加时 +' + timer.extraSec + '秒';
    } else {
      buffEl.textContent = '';
    }
  }
  timer.rafId = requestAnimationFrame(tick);
}

/* ============== 战绩卡 ============== */
function showResult(rec){
  const t = getTitle(rec.durationSec);
  document.getElementById('rEmoji').textContent = t.emoji;
  document.getElementById('rTitle').textContent = t.name;
  document.getElementById('rSub').textContent =
    '老板已哭晕在厕所 · 本次斩获 ¥' + rec.earning.toFixed(2);
  const m = Math.floor(rec.durationSec / 60);
  const s = rec.durationSec % 60;
  document.getElementById('rDur').textContent = m + ':' + String(s).padStart(2,'0');
  document.getElementById('rMoney').textContent = '¥' + rec.earning.toFixed(2);
  document.getElementById('rEvents').textContent =
    rec.events.length ? ('途中遭遇: ' + rec.events.join('、')) : '一路顺畅,无人打扰';
  document.getElementById('resultMask').classList.remove('hidden');
}

/* ============== 渲染 ============== */
function renderAch(){
  const list = getAch();
  const unlockedIds = list.map(a=>a.id);
  document.getElementById('achCount').textContent =
    '(' + unlockedIds.length + '/' + ACHIEVEMENTS.length + ')';
  const html = ACHIEVEMENTS.map(a=>{
    const on = unlockedIds.includes(a.id);
    return `<div class="ach-item ${on?'unlocked':''}">
      <div class="ico">${a.ico}</div>
      <div class="nm">${a.name}</div>
      <div class="ds">${a.desc}</div>
    </div>`;
  }).join('');
  document.getElementById('achGrid').innerHTML = html;
}

function renderRecords(){
  const history = LS.get(K_HISTORY, []);
  // 汇总
  const totalSec = history.reduce((s,r)=>s+r.durationSec,0);
  const totalEarn = history.reduce((s,r)=>s+r.earning,0);
  const days = new Set(history.map(r=>new Date(r.timestamp).toDateString())).size;
  const avg = history.length ? Math.floor(totalSec / history.length) : 0;
  document.getElementById('summaryBox').innerHTML = `
    <div class="item"><div class="num">${formatDur(totalSec)}</div><div class="lbl">累计时长</div></div>
    <div class="item"><div class="num">¥${totalEarn.toFixed(2)}</div><div class="lbl">累计收益</div></div>
    <div class="item"><div class="num">${days}</div><div class="lbl">摸鱼天数</div></div>
    <div class="item"><div class="num">${formatDur(avg)}</div><div class="lbl">平均时长</div></div>
  `;
  // 列表
  if(history.length === 0){
    document.getElementById('recordList').innerHTML =
      '<div class="empty">还没有记录,去拉一次试试 💩</div>';
    return;
  }
  const sorted = [...history].sort((a,b)=>b.timestamp - a.timestamp);
  const html = sorted.map(r=>{
    const t = TITLES.find(x=>x.name===r.title) || TITLES[0];
    const d = new Date(r.timestamp);
    const ds = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="record-item">
      <div class="left">
        <div class="date">${ds} <span class="badge ${t.cls}">${r.title}</span></div>
        <div class="meta">${r.events.length?('遭遇: '+r.events.join('、')):'一路顺畅'}</div>
      </div>
      <div class="right">
        <div class="money">¥${r.earning.toFixed(2)}</div>
        <div class="dur">${formatDur(r.durationSec)}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('recordList').innerHTML = html;
}

function renderRank(){
  const history = LS.get(K_HISTORY, []);
  const myEarn = history.reduce((s,r)=>s+r.earning,0);
  // NPC
  const NPCs = [
    { name:'厕所之王', earn:8888.88 },
    { name:'摸鱼祖师爷', earn:5234.50 },
    { name:'带薪侠客', earn:3120.00 },
    { name:'马桶思想家', earn:2050.66 },
    { name:'隔间常驻代表', earn:1280.00 },
    { name:'纸篓收藏家', earn:760.30 },
    { name:'冲水艺术家', earn:420.00 },
    { name:'坑位占星师', earn:230.50 },
    { name:'新手摸鱼人', earn:80.00 },
    { name:'路过的打工人', earn:12.00 }
  ];
  const me = { name:'我', earn: parseFloat(myEarn.toFixed(2)), isMe:true };
  const all = [...NPCs, me].sort((a,b)=>b.earn - a.earn);
  const myRank = all.findIndex(x=>x.isMe) + 1;
  const nextIdx = all.findIndex(x=>x.isMe) - 1;

  let nextTip = '';
  if(myRank === 1){
    nextTip = '👑 你已是榜首,继续保持!';
  } else if(nextIdx >= 0){
    const gap = all[nextIdx].earn - myEarn;
    nextTip = `距上一名还差 ¥${gap.toFixed(2)},再加把劲!`;
  }

  const html = all.map((x,i)=>{
    const num = i + 1;
    let cls = '';
    if(num===1) cls='top1';
    else if(num===2) cls='top2';
    else if(num===3) cls='top3';
    return `<div class="rank-item ${x.isMe?'me':''}">
      <div class="rank-num ${cls}">${num}</div>
      <div class="rank-info">
        <div class="rank-name">${x.name}</div>
        <div class="rank-meta">${x.isMe?'你的累计收益':'模拟数据'}</div>
      </div>
      <div class="rank-money">¥${x.earn.toFixed(2)}</div>
    </div>`;
  }).join('');
  document.getElementById('rankList').innerHTML =
    `<div class="muted" style="margin-bottom:10px;">${nextTip || '拉一次试试,看看你排第几'}</div>` + html;
}

function renderSetting(){
  const cfg = getConfig() || { monthlySalary:'', workDaysPerMonth:22, workHoursPerDay:8 };
  document.getElementById('salaryInput').value = cfg.monthlySalary || '';
  document.getElementById('daysInput').value = cfg.workDaysPerMonth || 22;
  document.getElementById('hoursInput').value = cfg.workHoursPerDay || 8;
  updateCalc();
}

function updateCalc(){
  const cfg = {
    monthlySalary: parseFloat(document.getElementById('salaryInput').value) || 0,
    workDaysPerMonth: parseFloat(document.getElementById('daysInput').value) || 0,
    workHoursPerDay: parseFloat(document.getElementById('hoursInput').value) || 0
  };
  const r = calcRates(cfg);
  document.getElementById('hourly').textContent = '¥' + r.hourly.toFixed(2);
  document.getElementById('perMin').textContent = '¥' + r.perMin.toFixed(4);
  document.getElementById('perSec').textContent = '¥' + r.perSec.toFixed(6);
}

function formatDur(sec){
  if(sec < 60) return sec + '秒';
  const m = Math.floor(sec/60);
  const s = sec % 60;
  if(m < 60) return m + '分' + (s? s+'秒':'');
  const h = Math.floor(m/60);
  const mm = m % 60;
  return h + '时' + (mm? mm+'分':'');
}

/* ============== Tab 切换 ============== */
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.tab === name);
  });
  ['timer','record','rank','setting'].forEach(p=>{
    document.getElementById('page-'+p).classList.toggle('hidden', p !== name);
  });
  if(name === 'record') renderRecords();
  if(name === 'rank') renderRank();
  if(name === 'setting') renderSetting();
  if(name === 'timer') renderAch();
}

/* ============== 初始化 ============== */
function init(){
  // Tab
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>switchTab(t.dataset.tab));
  });

  // 计时
  document.getElementById('startBtn').addEventListener('click', startTimer);
  document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
  document.getElementById('endBtn').addEventListener('click', endTimer);

  // 设置
  ['salaryInput','daysInput','hoursInput'].forEach(id=>{
    document.getElementById(id).addEventListener('input', updateCalc);
  });
  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const cfg = {
      monthlySalary: parseFloat(document.getElementById('salaryInput').value) || 0,
      workDaysPerMonth: parseFloat(document.getElementById('daysInput').value) || 22,
      workHoursPerDay: parseFloat(document.getElementById('hoursInput').value) || 8
    };
    if(cfg.monthlySalary <= 0){
      showToast('⚠️','月薪必填','别闹,填个数字');
      return;
    }
    LS.set(K_CONFIG, cfg);
    showToast('✅','设置已保存','可以开始带薪拉屎了');
  });

  // 引导
  document.getElementById('gSaveBtn').addEventListener('click', ()=>{
    const cfg = {
      monthlySalary: parseFloat(document.getElementById('gSalary').value) || 0,
      workDaysPerMonth: parseFloat(document.getElementById('gDays').value) || 22,
      workHoursPerDay: parseFloat(document.getElementById('gHours').value) || 8
    };
    if(cfg.monthlySalary <= 0){
      showToast('⚠️','月薪必填','别闹,填个数字');
      return;
    }
    LS.set(K_CONFIG, cfg);
    document.getElementById('guideMask').classList.add('hidden');
    showToast('🎉','设置完成','开始你的摸鱼之旅');
  });

  // 战绩卡
  document.getElementById('rAgain').addEventListener('click', ()=>{
    document.getElementById('resultMask').classList.add('hidden');
    startTimer();
  });
  document.getElementById('rClose').addEventListener('click', ()=>{
    document.getElementById('resultMask').classList.add('hidden');
  });

  // 清空记录
  document.getElementById('clearBtn').addEventListener('click', ()=>{
    if(confirm('确定清空所有记录?此操作不可恢复。')){
      LS.del(K_HISTORY);
      LS.del(K_ACH);
      renderRecords();
      renderAch();
      renderRank();
      showToast('🗑️','已清空','重新开始摸鱼');
    }
  });

  // 首次引导
  const cfg = getConfig();
  if(!cfg || !cfg.monthlySalary){
    document.getElementById('guideMask').classList.remove('hidden');
  }

  renderAch();
  renderRecords();
  renderRank();
}

init();
</script>
