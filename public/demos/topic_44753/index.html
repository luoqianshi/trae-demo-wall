<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>代际翻译官</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --transition-speed: 200ms;
    }

    /* Young (Dark) Theme */
    .theme-young {
      --bg-primary: #0F0F11;
      --bg-secondary: #1A1A1F;
      --bg-tertiary: #222228;
      --border-color: #2A2A30;
      --border-light: #333340;
      --accent: #6C8EEF;
      --accent-hover: #7D9CF5;
      --accent-muted: rgba(108,142,239,0.15);
      --self-bubble: #2A3545;
      --other-bubble: #1E1E24;
      --text-primary: #E8E8ED;
      --text-secondary: #9898A6;
      --text-tertiary: #6B6B78;
      --success: #4ADE80;
      --danger: #F87171;
      --warning: #FBBF24;
      --warning-bg: rgba(251,191,36,0.1);
      --glass-bg: rgba(15,15,17,0.8);
      --glass-border: rgba(255,255,255,0.06);
      --input-bg: #141418;
      --shadow-color: rgba(0,0,0,0.3);
      --overlay: rgba(0,0,0,0.6);
      --font-base: 14px;
      --font-message: 14px;
      --line-height: 1.5;
      --header-height: 48px;
      --bubble-radius: 12px;
      --btn-radius: 8px;
      --transition-speed: 200ms;
      --spacing-compact: 8px;
      --spacing-normal: 12px;
      --spacing-generous: 16px;
    }

    .theme-young.theme-light {
      --bg-primary: #FAFAFA;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #F3F3F5;
      --border-color: #E5E5EA;
      --border-light: #F0F0F2;
      --accent: #5B7ADB;
      --accent-hover: #4A69CC;
      --accent-muted: rgba(91,122,219,0.1);
      --self-bubble: #E8EDF5;
      --other-bubble: #F3F3F5;
      --text-primary: #1A1A1F;
      --text-secondary: #6B6B78;
      --text-tertiary: #9898A6;
      --success: #22C55E;
      --danger: #EF4444;
      --warning: #F59E0B;
      --warning-bg: rgba(245,158,11,0.08);
      --glass-bg: rgba(250,250,250,0.85);
      --glass-border: rgba(0,0,0,0.06);
      --input-bg: #F3F3F5;
      --shadow-color: rgba(0,0,0,0.08);
      --overlay: rgba(0,0,0,0.3);
    }

    /* Elder (Warm Light) Theme */
    .theme-elder {
      --bg-primary: #FFF9F5;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #FFF5EE;
      --border-color: #F0E8E0;
      --border-light: #F5EDE5;
      --accent: #E8734A;
      --accent-hover: #D4622E;
      --accent-muted: rgba(232,115,74,0.1);
      --self-bubble: #95EC69;
      --other-bubble: #FFFFFF;
      --text-primary: #2D2D2D;
      --text-secondary: #5A5A5A;
      --text-tertiary: #8A8A8A;
      --success: #4CAF7D;
      --danger: #E74C3C;
      --warning: #F5A623;
      --warning-bg: rgba(245,166,35,0.12);
      --glass-bg: rgba(255,249,245,0.9);
      --glass-border: rgba(240,232,224,0.8);
      --input-bg: #FFFFFF;
      --shadow-color: rgba(0,0,0,0.06);
      --overlay: rgba(0,0,0,0.35);
      --font-base: 18px;
      --font-message: 20px;
      --line-height: 1.7;
      --header-height: 60px;
      --bubble-radius: 16px;
      --btn-radius: 9999px;
      --transition-speed: 300ms;
      --spacing-compact: 12px;
      --spacing-normal: 16px;
      --spacing-generous: 24px;
    }

    /* ===== BASE STYLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #app {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ===== SCROLLBAR ===== */
    .theme-young ::-webkit-scrollbar,
    .theme-young::-webkit-scrollbar {
      width: 6px;
    }
    .theme-young ::-webkit-scrollbar-track,
    .theme-young::-webkit-scrollbar-track {
      background: transparent;
    }
    .theme-young ::-webkit-scrollbar-thumb,
    .theme-young::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    .theme-elder ::-webkit-scrollbar,
    .theme-elder::-webkit-scrollbar {
      width: 8px;
    }
    .theme-elder ::-webkit-scrollbar-track,
    .theme-elder::-webkit-scrollbar-track {
      background: transparent;
    }
    .theme-elder ::-webkit-scrollbar-thumb,
    .theme-elder::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(108,142,239,0.3); }
      50% { box-shadow: 0 0 12px 4px rgba(108,142,239,0.15); }
    }

    .anim-fade { animation: fadeIn var(--transition-speed) ease-out; }
    .anim-slide-up { animation: slideUp var(--transition-speed) ease-out; }
    .anim-slide-down { animation: slideDown var(--transition-speed) ease-out; }
    .anim-scale { animation: scaleIn var(--transition-speed) ease-out; }

    /* ===== V3 ANIMATION KEYFRAMES ===== */

    /* Spring physics message animations */
    @keyframes springIn {
      0% { opacity: 0; transform: translateY(30px) scale(0.9); }
      60% { opacity: 1; transform: translateY(-4px) scale(1.02); }
      80% { transform: translateY(2px) scale(0.99); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes springInLeft {
      0% { opacity: 0; transform: translateX(-40px) scale(0.95); }
      60% { opacity: 1; transform: translateX(4px) scale(1.01); }
      100% { transform: translateX(0) scale(1); }
    }

    @keyframes springInRight {
      0% { opacity: 0; transform: translateX(40px) scale(0.95); }
      60% { opacity: 1; transform: translateX(-4px) scale(1.01); }
      100% { transform: translateX(0) scale(1); }
    }

    /* Wave dots for typing indicator */
    @keyframes waveDot {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-8px); opacity: 1; }
    }

    /* Morph reveal for translation */
    @keyframes morphReveal {
      0% { max-height: 0; opacity: 0; filter: blur(4px); }
      100% { max-height: 200px; opacity: 1; filter: blur(0); }
    }

    /* Ripple effect */
    @keyframes rippleExpand {
      0% { transform: scale(0); opacity: 0.5; }
      100% { transform: scale(4); opacity: 0; }
    }

    /* Glow pulse for send button */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 8px 2px rgba(108,142,239,0.3); }
      50% { box-shadow: 0 0 16px 6px rgba(108,142,239,0.5); }
    }

    @keyframes glowPulseElder {
      0%, 100% { box-shadow: 0 0 8px 2px rgba(232,115,74,0.3); }
      50% { box-shadow: 0 0 16px 6px rgba(232,115,74,0.5); }
    }

    /* Aurora blobs */
    @keyframes aurora1 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      33% { transform: translate(30px, -30px) scale(1.1); opacity: 0.5; }
      66% { transform: translate(-20px, 20px) scale(0.9); opacity: 0.4; }
    }

    @keyframes aurora2 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.2; }
      33% { transform: translate(-40px, 20px) scale(1.2); opacity: 0.4; }
      66% { transform: translate(20px, -40px) scale(0.8); opacity: 0.3; }
    }

    @keyframes aurora3 {
      0%, 100% { transform: translate(0, 0) scale(1.1); opacity: 0.25; }
      50% { transform: translate(25px, 25px) scale(0.85); opacity: 0.45; }
    }

    /* Gradient border for header */
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Sparkle particles */
    @keyframes sparkle {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-40px) scale(0); opacity: 0; }
    }

    /* Shake for emotion buffer */
    @keyframes subtleShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      40% { transform: translateX(3px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }

    /* Badge pulse */
    @keyframes badgePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Stagger entrance */
    @keyframes staggerIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Floating logo */
    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Card glow border pulse */
    @keyframes cardGlowPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(108,142,239,0.2), 0 0 0 1px var(--border-color); }
      50% { box-shadow: 0 0 20px 4px rgba(108,142,239,0.15), 0 0 0 1px var(--border-color); }
    }

    @keyframes cardGlowPulseElder {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,115,74,0.2), 0 0 0 1px var(--border-color); }
      50% { box-shadow: 0 0 20px 4px rgba(232,115,74,0.15), 0 0 0 1px var(--border-color); }
    }

    /* Send button click */
    @keyframes sendClick {
      0% { transform: scale(1); }
      30% { transform: scale(0.9); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* Page transitions */
    .page-enter-active {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .page-leave-active {
      transition: all 0.25s ease-in;
    }
    .page-enter-from {
      opacity: 0;
      transform: translateY(20px) scale(0.98);
    }
    .page-leave-to {
      opacity: 0;
      transform: translateY(-15px) scale(0.98);
    }

    /* Emotion buffer bounce in */
    @keyframes emotionBounceIn {
      0% { opacity: 0; transform: translateY(40px) scale(0.9); }
      50% { opacity: 1; transform: translateY(-8px) scale(1.02); }
      70% { transform: translateY(4px) scale(0.99); }
      100% { transform: translateY(0) scale(1); }
    }

    /* Warning icon pulse glow */
    @keyframes warningPulse {
      0%, 100% { filter: drop-shadow(0 0 0 transparent); }
      50% { filter: drop-shadow(0 0 8px rgba(251,191,36,0.6)); }
    }

    /* CTA glowing border */
    @keyframes ctaGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(108,142,239,0.25), 0 0 0 0 rgba(108,142,239,0); }
      50% { box-shadow: 0 0 30px rgba(108,142,239,0.4), 0 0 0 3px rgba(108,142,239,0.15); }
    }

    /* ===== V3 ANIMATION CLASSES ===== */

    .spring-in-left {
      animation: springInLeft 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .spring-in-right {
      animation: springInRight 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .morph-reveal {
      animation: morphReveal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .badge-pulse {
      animation: badgePulse 0.4s ease-out;
    }

    .float-logo {
      animation: floatLogo 3s ease-in-out infinite;
    }

    .ripple-btn {
      position: relative;
      overflow: hidden;
    }
    .ripple-btn .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: rippleExpand 0.6s ease-out forwards;
      pointer-events: none;
    }

    .send-glow {
      animation: glowPulse 2s ease-in-out infinite;
    }
    .send-glow-elder {
      animation: glowPulseElder 2s ease-in-out infinite;
    }

    .send-click {
      animation: sendClick 0.3s ease-out;
    }

    /* Gradient header border */
    .gradient-header-border {
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #A78BFA, #F472B6, var(--accent));
      background-size: 200% 100%;
      animation: gradientShift 3s ease infinite;
    }

    .gradient-header-border-elder {
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #F5A623, #E8734A, var(--accent));
      background-size: 200% 100%;
      animation: gradientShift 3s ease infinite;
    }

    /* Aurora blobs */
    .aurora-blob-1 {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(80px);
      animation: aurora1 8s ease-in-out infinite;
      pointer-events: none;
    }
    .aurora-blob-2 {
      position: absolute;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      filter: blur(70px);
      animation: aurora2 10s ease-in-out infinite;
      pointer-events: none;
    }
    .aurora-blob-3 {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      filter: blur(60px);
      animation: aurora3 12s ease-in-out infinite;
      pointer-events: none;
    }

    /* Particle canvas */
    #particleCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* 3D Tilt card */
    .tilt-card {
      transform-style: preserve-3d;
      transition: transform 0.1s ease;
      will-change: transform;
    }
    .card-glare {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      pointer-events: none;
      z-index: 10;
      background: transparent;
    }

    /* Card stagger entrance */
    .card-stagger-1 {
      animation: springIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    }
    .card-stagger-2 {
      animation: springIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s both;
    }

    /* Sparkle particles container */
    .sparkle-container {
      position: absolute;
      pointer-events: none;
      z-index: 50;
    }
    .sparkle-dot {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      animation: sparkle 0.8s ease-out forwards;
    }

    /* Emotion buffer animations */
    .emotion-shake {
      animation: subtleShake 0.4s ease-in-out;
    }
    .emotion-bounce-in {
      animation: emotionBounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .warning-pulse {
      animation: warningPulse 1.5s ease-in-out infinite;
    }
    .stagger-btn-1 { animation: staggerIn 0.3s ease-out 0.1s both; }
    .stagger-btn-2 { animation: staggerIn 0.3s ease-out 0.2s both; }

    /* CTA glow animation */
    .cta-glow {
      animation: ctaGlow 2s ease-in-out infinite;
    }

    /* Onboarding step transition */
    .onboard-step-enter-active {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .onboard-step-leave-active {
      transition: all 0.2s ease-in;
    }
    .onboard-step-enter-from {
      opacity: 0;
      transform: translateX(30px);
    }
    .onboard-step-leave-to {
      opacity: 0;
      transform: translateX(-30px);
    }

    /* Emoji bounce in onboarding */
    @keyframes emojiBounce {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      50% { transform: scale(1.2) rotate(5deg); opacity: 1; }
      70% { transform: scale(0.9) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .emoji-bounce {
      animation: emojiBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .emoji-bounce svg {
      display: block;
    }

    /* Progress dot glow */
    .progress-dot-active {
      box-shadow: 0 0 8px 2px var(--accent-muted);
      transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    }

    /* Input focus glow */
    .input-glow-v3:focus {
      box-shadow: 0 0 0 2px var(--accent-muted), 0 0 20px 4px rgba(108,142,239,0.08);
    }
    .theme-elder .input-glow-v3:focus {
      box-shadow: 0 0 0 2px var(--accent-muted), 0 0 20px 4px rgba(232,115,74,0.08);
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .aurora-blob-1, .aurora-blob-2, .aurora-blob-3 {
        display: none;
      }
      #particleCanvas {
        display: none;
      }
    }

    /* ===== YOUNG-SPECIFIC ===== */
    .theme-young .input-glow:focus {
      box-shadow: 0 0 0 2px var(--accent-muted), 0 0 16px 2px rgba(108,142,239,0.1);
    }
    .theme-young .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
    }
    .theme-young .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      transition: all var(--transition-speed) ease;
    }
    .theme-young .btn-ghost:hover {
      background: var(--accent-muted);
      border-color: var(--accent);
      color: var(--accent);
    }
    .theme-young .pill-toggle {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 9999px;
      transition: all var(--transition-speed) ease;
    }
    .theme-young .pill-toggle.active {
      background: var(--accent);
      color: #fff;
    }
    .theme-young .pill-toggle:not(.active) {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    /* ===== ELDER-SPECIFIC ===== */
    .theme-elder .btn-large {
      min-height: 52px;
      font-size: 18px;
      padding: 14px 28px;
      border-radius: var(--btn-radius);
      font-weight: 500;
      transition: all var(--transition-speed) ease;
    }
    .theme-elder .btn-primary-large {
      min-height: 56px;
      font-size: 20px;
      padding: 16px 36px;
      border-radius: var(--btn-radius);
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(232,115,74,0.3);
      transition: all var(--transition-speed) ease;
    }
    .theme-elder .btn-primary-large:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(232,115,74,0.35);
    }
    .theme-elder .btn-primary-large:active {
      transform: translateY(0);
    }
    .theme-elder .toggle-pill {
      min-height: 48px;
      font-size: 18px;
      padding: 10px 24px;
      border-radius: var(--btn-radius);
      font-weight: 500;
      transition: all var(--transition-speed) ease;
    }
    .theme-elder .toggle-pill.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(232,115,74,0.25);
    }
    .theme-elder .toggle-pill:not(.active) {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1.5px solid var(--border-color);
    }

    /* ===== SHARED UTILITIES ===== */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const { createApp, ref, reactive, computed, nextTick, onMounted, watch } = Vue;

    // ============================================================
    // TRANSLATION ENGINE (180+ entries)
    // ============================================================
    const youngToElderDict = {
      'yyds': '太厉害了，永远是最棒的！',
      '绝绝子': '特别好，特别满意！',
      'emo': '心里有点难受，不太开心',
      '内卷': '大家都在拼命努力，竞争很激烈',
      '躺平': '想歇歇了，不想太累了',
      '摆烂': '有点累了，不想折腾了',
      '社死': '太不好意思了，尴尬得想钻地缝',
      '破防了': '心里特别感动，忍不住了',
      '搭子': '好朋友，经常一起玩的小伙伴',
      'i人': '比较内向，不太爱说话的孩子',
      'e人': '性格开朗，爱交朋友的孩子',
      '尊嘟假嘟': '真的吗？不会吧？',

    function translateMessage(text, direction) {
      if (!text || !text.trim()) return text;
      const dict = direction === 'youngToElder' ? youngToElderDict : elderToYoungDict;
      let result = text;
      if (dict[text.trim()]) return dict[text.trim()];
      const keys = Object.keys(dict).sort((a, b) => b.length - a.length);
      for (const key of keys) {
        if (result.includes(key)) {
          result = result.replace(key, dict[key]);
        }
      }
      return result;
    }

    function detectEmotion(text) {
      for (const keyword of negativeEmotionKeywords) {
        if (text.includes(keyword)) {
          const suggestions = emotionSuggestions[keyword] || [
            '妈，我这边有点忙，晚点跟您说',
            '没事的，我能处理好，您放心',
            '谢谢关心，我挺好的',
          ];
          return {
            hasNegative: true,
            keyword,
            level: 'warning',
            message: '这句话可能让长辈感到担心。建议换一种更温和的说法：',
            suggestions,
          };
        }
      }
      for (const keyword of positiveEmotionKeywords) {
        if (text.includes(keyword)) {
          return { hasNegative: false, hasPositive: true, keyword };
        }
      }
      return { hasNegative: false, hasPositive: false };
    }

    function generateVoiceSummary(text) {
      const len = text.length;
      if (len <= 10) return '发了一条很短的语音消息';
      if (len <= 30) return '发了一条语音消息，大概几秒钟';
      if (len <= 60) return '发了一条语音消息，大概十几秒';
      return '发了一条比较长的语音消息';
    }

    function generatePhotoStory(photoDesc) {
      const stories = [
        `拍了一张照片：${photoDesc || '一张生活照'}，记录了这一刻的美好。`,
        `分享了一张照片：${photoDesc || '日常随拍'}，觉得挺有意思的。`,
        `刚拍了张照片：${photoDesc || '随手拍的'}，发给你看看。`,
      ];
      return stories[Math.floor(Math.random() * stories.length)];
    }

    function getTranslationStats(messages) {
      let total = 0;
      let translated = 0;
      for (const msg of messages) {
        total++;
        // Count as translated only if there's an actual translation (different from original)
        if (msg.translatedText && msg.translatedText !== msg.content) translated++;
      }
      return { total, translated, rate: total > 0 ? Math.round((translated / total) * 100) : 0 };
    }

    // ============================================================
    // V3 PARTICLE SYSTEM
    // ============================================================
    function initParticles(canvasId, color) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let particles = [];
      let mouse = { x: null, y: null };
      let animFrameId = null;
      const count = 60;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      canvas.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      canvas.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
      });

      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          r: Math.random() * 2 + 1,
          alpha: Math.random() * 0.5 + 0.2,
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

          if (mouse.x !== null) {
            const dx = mouse.x - p.x;
            const dy = mouse.y - p.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 150) {
              p.x -= dx * 0.01;
              p.y -= dy * 0.01;
            }
          }

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = color.replace('1)', p.alpha + ')');
          ctx.fill();

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = color.replace('1)', (p.alpha * 0.15) + ')');
          ctx.fill();

          for (let j = i + 1; j < particles.length; j++) {
            const p2 = particles[j];
            const dx = p.x - p2.x;
            const dy = p.y - p2.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = color.replace('1)', ((1 - dist/120) * 0.15) + ')');
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        animFrameId = requestAnimationFrame(draw);
      }
      draw();

      return {
        destroy() {
          if (animFrameId) cancelAnimationFrame(animFrameId);
          window.removeEventListener('resize', resize);
        }
      };
    }

    function initCardTilt() {
      document.querySelectorAll('.tilt-card').forEach(card => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = (y - centerY) / centerY * -8;
          const rotateY = (x - centerX) / centerX * 8;
          card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
          const glare = card.querySelector('.card-glare');
          if (glare) {
            glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.15) 0%, transparent 60%)`;
          }
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = 'perspective(800px) rotateX(0) rotateY(0) scale(1)';
          card.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
          const glare = card.querySelector('.card-glare');
          if (glare) glare.style.background = 'transparent';
          setTimeout(() => { card.style.transition = 'transform 0.1s ease'; }, 500);
        });
        card.addEventListener('mouseenter', () => {
          card.style.transition = 'transform 0.1s ease';
        });
        // Touch support
        card.addEventListener('touchmove', (e) => {
          const touch = e.touches[0];
          const rect = card.getBoundingClientRect();
          const x = touch.clientX - rect.left;
          const y = touch.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = (y - centerY) / centerY * -6;
          const rotateY = (x - centerX) / centerX * 6;
          card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
          const glare = card.querySelector('.card-glare');
          if (glare) {
            glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.1) 0%, transparent 60%)`;
          }
        });
        card.addEventListener('touchend', () => {
          card.style.transform = 'perspective(800px) rotateX(0) rotateY(0) scale(1)';
          card.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
          const glare = card.querySelector('.card-glare');
          if (glare) glare.style.background = 'transparent';
          setTimeout(() => { card.style.transition = 'transform 0.1s ease'; }, 500);
        });
      });

            <!-- Elder settings -->
            <div v-if="identity === 'elder'" class="rounded-t-3xl sm:rounded-3xl w-full sm:max-w-md anim-slide-up" style="max-height:85vh;overflow:hidden;box-shadow:0 16px 48px var(--shadow-color);">
              <div style="background:var(--bg-secondary);border:1.5px solid var(--border-color);max-height:85vh;overflow-y:auto;">
              <div class="flex items-center justify-between p-5 sticky top-0 z-10" style="border-bottom:1.5px solid var(--border-color);background:var(--bg-secondary);">
                <h3 class="text-xl font-semibold" style="color:var(--text-primary);">设置</h3>
                <button @click="showSettings=false" class="ripple-btn w-12 h-12 rounded-full flex items-center justify-center text-xl" style="color:var(--text-secondary);background:var(--bg-tertiary);">✕</button>
              </div>
              <div class="p-5 space-y-5">
                <!-- Emotion buffer toggle -->
                <div class="flex items-center justify-between py-3">
                  <div>
                    <div class="text-lg font-medium" style="color:var(--text-primary);">情绪缓冲</div>
                    <div class="text-base" style="color:var(--text-secondary);">检测负面情绪并提醒</div>
                  </div>
                  <button @click="toggleEmotionBuffer" class="ripple-btn toggle-pill" :class="{active: emotionBufferEnabled}">{{ emotionBufferEnabled ? '开' : '关' }}</button>
                </div>
                <!-- NO dark mode for elder -->
                <!-- Actions -->
                <div class="space-y-3">
                  <button @click="loadDemoData" class="ripple-btn w-full btn-large text-left px-5" style="background:var(--bg-tertiary);color:var(--text-primary);border:1.5px solid var(--border-color);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>加载演示数据</button>
                  <button @click="clearMessages" class="ripple-btn w-full btn-large text-left px-5" style="background:var(--bg-tertiary);color:var(--danger);border:1.5px solid var(--border-color);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>清空消息</button>
                  <button @click="switchIdentity" class="ripple-btn w-full btn-large text-left px-5" style="background:var(--bg-tertiary);color:var(--text-primary);border:1.5px solid var(--border-color);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>切换身份</button>
                </div>
                <!-- Divider -->
                <div style="border-top:1.5px solid var(--border-color);"></div>
                <!-- About -->
                <div class="py-3 text-center">
                  <div class="text-lg font-medium" style="color:var(--text-primary);">代际翻译官</div>
                  <div class="text-base" style="color:var(--text-tertiary);">v3.0 — 让每一句话都充满温度</div>
                </div>
              </div>
              </div>
            </div>
          </div>

          <!-- ===== TOAST NOTIFICATIONS ===== -->
          <div class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 items-center pointer-events-none">
            <div v-for="toast in toasts" :key="toast.id" class="anim-slide-down rounded-xl px-4 py-2.5 pointer-events-auto" :style="{
              background: toast.type === 'success' ? 'var(--success)' : toast.type === 'danger' ? 'var(--danger)' : 'var(--accent)',
              color: '#fff',
              fontSize: identity === 'elder' ? '16px' : '13px',
              boxShadow: '0 8px 24px var(--shadow-color)',
            }">
              {{ toast.message }}
            </div>
          </div>

        </div>
      `,
    });

    app.mount('#app');
  </script>
</body>
</html>
