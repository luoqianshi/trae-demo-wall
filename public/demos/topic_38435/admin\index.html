<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市脉搏 - 管理后台</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="admin-app">
    <!-- 登录页 -->
    <div id="login-page" class="login-page">
      <div class="login-box">
        <div class="login-logo">🌆 城市脉搏</div>
        <div class="login-title">管理后台</div>
        <div class="login-form">
          <input type="text" id="login-user" placeholder="用户名" value="admin">
          <input type="password" id="login-pass" placeholder="密码" value="admin123">
          <button onclick="adminApp.login()">登录</button>
        </div>
        <div class="login-hint">默认账号：admin / admin123</div>
      </div>
    </div>

    <!-- 管理主界面 -->
    <div id="admin-main" class="admin-main" style="display:none;">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-logo">🌆 城市脉搏</div>
        <nav class="sidebar-nav">
          <div class="nav-group">
            <div class="nav-item active" data-page="dashboard" onclick="adminApp.switchPage('dashboard')">
              <span>📊</span> 数据看板
            </div>
            <div class="nav-item" data-page="highway" onclick="adminApp.switchPage('highway')">
              <span>🛣️</span> 高速路口管理
            </div>
            <div class="nav-item" data-page="bus" onclick="adminApp.switchPage('bus')">
              <span>🚌</span> 公交管理
            </div>
            <div class="nav-item" data-page="message" onclick="adminApp.switchPage('message')">
              <span>📰</span> 城市消息管理
            </div>
            <div class="nav-item" data-page="tag" onclick="adminApp.switchPage('tag')">
              <span>🏷️</span> 标签管理
            </div>
            <div class="nav-item" data-page="weather" onclick="adminApp.switchPage('weather')">
              <span>🌤️</span> 天气管理
            </div>
          </div>
          <div class="nav-item logout" onclick="adminApp.logout()">
            <span>🚪</span> 退出登录
          </div>
        </nav>
      </aside>

      <!-- 主内容区 -->
      <main class="main-area">
        <!-- 顶部栏 -->
        <header class="topbar">
          <div class="topbar-title" id="page-title">数据看板</div>
          <div class="topbar-user">👤 管理员</div>
        </header>

        <!-- 页面内容 -->
        <div class="content-area">
          <!-- 数据看板 -->
          <div id="admin-dashboard" class="admin-page active">
            <div class="stat-cards">
              <div class="stat-card">
                <div class="stat-icon">📰</div>
                <div class="stat-info">
                  <div class="stat-num" id="stat-messages">10</div>
                  <div class="stat-label">消息总数</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">🏷️</div>
                <div class="stat-info">
                  <div class="stat-num" id="stat-tags">6</div>
                  <div class="stat-label">标签数量</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">👁️</div>
                <div class="stat-info">
                  <div class="stat-num" id="stat-today">128</div>
                  <div class="stat-label">今日访问</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                  <div class="stat-num" id="stat-total">3456</div>
                  <div class="stat-label">总访问量</div>
                </div>
              </div>
            </div>

            <div class="dashboard-section">
              <div class="section-header">
                <h3>消息分类统计</h3>
              </div>
              <div class="tag-stats" id="tag-stats">
                <!-- JS 填充 -->
              </div>
            </div>

            <div class="dashboard-section">
              <div class="section-header">
                <h3>最新消息</h3>
              </div>
              <div class="recent-messages" id="recent-messages">
                <!-- JS 填充 -->
              </div>
            </div>
          </div>

          <!-- 高速路口管理 -->
          <div id="admin-highway" class="admin-page">
            <div class="manage-list" id="highway-manage-list">
              <!-- JS 填充 -->
            </div>
          </div>

          <!-- 公交管理 -->
          <div id="admin-bus" class="admin-page">
            <div class="bus-edit-card">
              <div class="form-group">
                <label>当前站点</label>
                <input type="text" id="bus-edit-current" value="和平里南口">
              </div>
              <div class="form-group">
                <label>下一站</label>
                <input type="text" id="bus-edit-next" value="地坛西门">
              </div>
              <div class="form-group">
                <label>预计到站时间（分钟）</label>
                <input type="number" id="bus-edit-arrival" value="3">
              </div>
              <div class="form-group">
                <label>运行状态</label>
                <select id="bus-edit-status">
                  <option value="运行中">运行中</option>
                  <option value="临时调整">临时调整</option>
                  <option value="停运">停运</option>
                </select>
              </div>
              <button class="btn-primary" onclick="adminApp.saveBus()">保存修改</button>
            </div>
          </div>

          <!-- 城市消息管理 -->
          <div id="admin-message" class="admin-page">
            <div class="message-toolbar">
              <button class="btn-primary" onclick="adminApp.showMessageForm()">+ 发布消息</button>
            </div>
            <div class="manage-table">
              <div class="table-header">
                <span style="flex:2">标题</span>
                <span style="flex:1">标签</span>
                <span style="flex:1">时间</span>
                <span style="width:100px">操作</span>
              </div>
              <div id="message-table-body">
                <!-- JS 填充 -->
              </div>
            </div>
          </div>

          <!-- 标签管理 -->
          <div id="admin-tag" class="admin-page">
            <div class="tag-manage-list" id="tag-manage-list">
              <!-- JS 填充 -->
            </div>
          </div>

          <!-- 天气管理 -->
          <div id="admin-weather" class="admin-page">
            <div class="weather-edit-card">
              <div class="form-group">
                <label>当前天气</label>
                <input type="text" id="weather-condition" value="小雪">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>温度</label>
                  <input type="number" id="weather-temp" value="-3">
                </div>
                <div class="form-group">
                  <label>最高温</label>
                  <input type="number" id="weather-high" value="1">
                </div>
                <div class="form-group">
                  <label>最低温</label>
                  <input type="number" id="weather-low" value="-8">
                </div>
              </div>
              <div class="form-group">
                <label>预警信息</label>
                <textarea id="weather-alert" rows="3" placeholder="输入预警内容，留空则无预警"></textarea>
              </div>
              <button class="btn-primary" onclick="adminApp.saveWeather()">保存修改</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- 消息编辑弹窗 -->
  <div id="message-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>发布消息</h3>
        <button class="modal-close" onclick="adminApp.hideMessageForm()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="msg-title" placeholder="消息标题">
        </div>
        <div class="form-group">
          <label>摘要</label>
          <textarea id="msg-summary" rows="2" placeholder="消息摘要"></textarea>
        </div>
        <div class="form-group">
          <label>详细内容</label>
          <textarea id="msg-content" rows="4" placeholder="详细内容"></textarea>
        </div>
        <div class="form-group">
          <label>标签</label>
          <div class="tag-checkboxes" id="msg-tag-checkboxes">
            <!-- JS 填充 -->
          </div>
        </div>
        <div class="form-group">
          <label>来源</label>
          <input type="text" id="msg-source" placeholder="消息来源">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-default" onclick="adminApp.hideMessageForm()">取消</button>
        <button class="btn-primary" onclick="adminApp.saveMessage()">发布</button>
      </div>
    </div>
  </div>

  <script src="../mock/mockData.js"></script>
  <script src="admin.js"></script>
</body>
</html>
