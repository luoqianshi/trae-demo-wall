<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市脉搏 - City Pulse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      color: #fff;
      padding: 40px;
    }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 16px; opacity: 0.9; margin-bottom: 40px; }
    .links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .link-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 28px 36px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s;
      min-width: 200px;
    }
    .link-card:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-4px);
    }
    .link-icon { font-size: 40px; margin-bottom: 12px; }
    .link-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .link-desc { font-size: 13px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌆</div>
    <h1>城市脉搏</h1>
    <p>City Pulse - 城市信息生活服务平台</p>
    <div class="links">
      <a href="user/index.html" class="link-card">
        <div class="link-icon">📱</div>
        <div class="link-title">用户端 H5</div>
        <div class="link-desc">查看天气、路况、公交、城市消息</div>
      </a>
      <a href="admin/index.html" class="link-card">
        <div class="link-icon">⚙️</div>
        <div class="link-title">管理后台</div>
        <div class="link-desc">数据管理、内容发布、系统配置</div>
      </a>
    </div>
  </div>
</body>
</html>
