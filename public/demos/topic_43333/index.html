<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeScore — 外设定量评测平台</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #0f0f12; color: #e4e4e7; min-height: 100vh; line-height: 1.5;
}
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font: inherit; border: none; outline: none; }
input { font: inherit; border: none; outline: none; }

/* Layout */
.app-header {
  background: #18181b; border-bottom: 1px solid #27272a; padding: 0 24px;
  display: flex; align-items: center; height: 60px; gap: 24px; position: sticky; top: 0; z-index: 100;
}
.app-header .logo { font-size: 20px; font-weight: 700; color: #10b981; letter-spacing: -0.5px; white-space: nowrap; }
.app-header .logo span { color: #e4e4e7; }
.app-header nav { display: flex; gap: 4px; }
.app-header nav a {
  padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500;
  color: #a1a1aa; transition: all 0.15s;
}
.app-header nav a:hover { color: #e4e4e7; background: #27272a; }
.app-header nav a.active { color: #10b981; background: rgba(16,185,129,0.1); }
.app-header .mode-group { margin-left: auto; display: flex; gap: 4px; }
.app-header .mode-btn {
  padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
  background: transparent; color: #71717a; border: 1px solid #27272a; transition: all 0.15s;
}
.app-header .mode-btn:hover { border-color: #3f3f46; color: #e4e4e7; }
.app-header .mode-btn.active { background: #10b981; color: #fff; border-color: #10b981; }

.app-main { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Page header */
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 28px; font-weight: 700; }
.page-header p { color: #a1a1aa; font-size: 14px; margin-top: 4px; }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card {
  background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 20px;
}
.stat-card .stat-label { font-size: 13px; color: #a1a1aa; font-weight: 500; }
.stat-card .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }

/* Toolbar */
.toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
.search-box {
  flex: 1; min-width: 200px; background: #18181b; border: 1px solid #27272a;
  border-radius: 8px; padding: 10px 16px; color: #e4e4e7; font-size: 14px;
}
.search-box::placeholder { color: #52525b; }
.search-box:focus { border-color: #10b981; }
.filter-group { display: flex; gap: 4px; }
.filter-btn {
  padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
  background: transparent; color: #71717a; border: 1px solid #27272a; transition: all 0.15s;
}
.filter-btn:hover { border-color: #3f3f46; color: #e4e4e7; }
.filter-btn.active { background: #10b981; color: #fff; border-color: #10b981; }

/* Device grid */
.device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.device-card {
  background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 20px;
  transition: border-color 0.15s, transform 0.15s; cursor: pointer;
}
.device-card:hover { border-color: #3f3f46; transform: translateY(-2px); }
.device-card .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.device-card .card-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
.device-card .card-type { font-size: 12px; color: #71717a; margin-top: 2px; }
.device-card .card-score { text-align: right; }
.device-card .score-num { font-size: 24px; font-weight: 700; }
.device-card .tier-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px;
  font-weight: 700; margin-top: 2px;
}
.device-card .card-price { font-size: 13px; color: #a1a1aa; margin-top: 8px; }
.device-card .card-dims { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.device-card .dim-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

/* Ranking table */
.rank-table { width: 100%; border-collapse: separate; border-spacing: 0; }
.rank-table th {
  text-align: left; padding: 10px 16px; font-size: 12px; font-weight: 600;
  color: #71717a; text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 1px solid #27272a;
}
.rank-table td { padding: 12px 16px; border-bottom: 1px solid #27272a; font-size: 14px; }
.rank-table tr:hover td { background: rgba(24,24,27,0.5); }
.rank-table .rank-num { font-weight: 600; color: #71717a; width: 32px; }
.rank-table .rank-name { font-weight: 600; cursor: pointer; }
.rank-table .rank-name:hover { color: #10b981; }
.rank-table .rank-score { font-weight: 700; text-align: right; }
.rank-table .rank-price { color: #a1a1aa; font-size: 13px; }

/* Detail page */
.detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
.detail-back {
  padding: 8px 16px; border-radius: 6px; background: #18181b; border: 1px solid #27272a;
  color: #a1a1aa; font-size: 14px; transition: all 0.15s;
}
.detail-back:hover { border-color: #3f3f46; color: #e4e4e7; }
.detail-title { font-size: 28px; font-weight: 700; }
.detail-meta { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.detail-meta-item { font-size: 14px; color: #a1a1aa; }
.detail-meta-item strong { color: #e4e4e7; font-weight: 600; }
.detail-badge { padding: 4px 12px; border-radius: 6px; font-weight: 700; font-size: 14px; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }

.dim-section { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; }
.dim-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.dim-bar-group { display: flex; flex-direction: column; gap: 14px; }
.dim-bar-row .dim-bar-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
.dim-bar-label .dim-name { font-weight: 500; }
.dim-bar-label .dim-val { color: #a1a1aa; }
.dim-bar-track { height: 8px; background: #27272a; border-radius: 4px; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.dim-desc { font-size: 12px; color: #71717a; margin-top: 2px; }

.price-section { display: flex; flex-direction: column; gap: 12px; }
.price-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #27272a; font-size: 14px; }
.price-row:last-child { border-bottom: none; }
.price-row .price-label { color: #a1a1aa; }
.price-row .price-value { font-weight: 600; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 24px; color: #71717a; }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* Rank highlight */
.rank-1 .rank-score { color: #f59e0b; }
.rank-2 .rank-score { color: #a1a1aa; }
.rank-3 .rank-score { color: #cd7f32; }

/* Action buttons in header */
.header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.action-btn {
  padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
  transition: all 0.15s; white-space: nowrap;
}
.action-btn-ai {
  background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.3);
}
.action-btn-ai:hover { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.5); }
.action-btn-ai.loading { opacity: 0.6; pointer-events: none; }
.action-btn-ai.loading::after { content: ''; display: inline-block; width: 12px; height: 12px; margin-left: 6px; border: 2px solid rgba(16,185,129,0.3); border-top-color: #10b981; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
.action-btn-purple {
  background: rgba(139,92,246,0.1); color: #8b5cf6; border: 1px solid rgba(139,92,246,0.3);
}
.action-btn-purple:hover { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.5); }
.action-btn-dim {
  background: transparent; color: #71717a; border: 1px solid #27272a;
}
.action-btn-dim:hover { border-color: #3f3f46; color: #e4e4e7; }

/* Modal overlay */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
}
.modal-box {
  background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 24px;
  width: 90%; max-width: 480px; max-height: 85vh; overflow-y: auto;
}
.modal-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal-box .modal-sub { font-size: 13px; color: #71717a; margin-bottom: 20px; }
.modal-close {
  float: right; background: transparent; color: #71717a; font-size: 20px; line-height: 1; padding: 4px 8px; border-radius: 4px;
}
.modal-close:hover { color: #e4e4e7; background: #27272a; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: #a1a1aa; margin-bottom: 6px; }
.form-group input, .form-group select {
  width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #27272a;
  background: #0f0f12; color: #e4e4e7; font-size: 14px; transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus { border-color: #10b981; outline: none; }
.form-group select { appearance: auto; cursor: pointer; }
.btn-primary {
  width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600;
  background: #10b981; color: #fff; transition: background 0.15s;
}
.btn-primary:hover { background: #059669; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary.loading { position: relative; }
.btn-primary.loading::after {
  content: ''; position: absolute; right: 16px; top: 50%; margin-top: -8px;
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
}
.modal-result {
  margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px;
}
.modal-result.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #10b981; }
.modal-result.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
.modal-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
  background: rgba(139,92,246,0.15); color: #8b5cf6; border: 1px solid rgba(139,92,246,0.3);
}
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.connected { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
.status-dot.disconnected { background: #71717a; }

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">Vibe<span>Score</span></div>
  <nav id="nav">
    <a href="#dashboard" class="active">仪表盘</a>
    <a href="#keyboards">键盘排行</a>
    <a href="#mice">鼠标排行</a>
  </nav>
  <div class="header-actions" id="headerActions">
    <button class="action-btn action-btn-ai" id="btnAIFetch" onclick="openAIFetchModal()">AI 获取数据</button>
    <button class="action-btn action-btn-purple" onclick="openCustomAddModal()">+ 自定义</button>
    <button class="action-btn action-btn-dim" onclick="openAISettings()">API 设置</button>
  </div>
</header>

<main class="app-main" id="app"></main>

<script>
// ═══════════════════════════════════════════════════════════════════
// TYPES (converted from TypeScript)
// ═══════════════════════════════════════════════════════════════════

const VIBE_TIER_THRESHOLDS = {
  S: { min: 85, max: 100, label: "God-Tier",     color: "#10b981" },
  A: { min: 75, max: 84,  label: "Exceptional",  color: "#22c55e" },
  B: { min: 60, max: 74,  label: "Solid Value",  color: "#3b82f6" },
  C: { min: 45, max: 59,  label: "Average",      color: "#f59e0b" },
  D: { min: 30, max: 44,  label: "Below Avg",    color: "#f97316" },
  F: { min: 0,  max: 29,  label: "Overpriced",   color: "#f43f5e" },
};

function getVibeTier(score) {
  if (score >= 85) return "S";
  if (score >= 75) return "A";
  if (score >= 60) return "B";
  if (score >= 45) return "C";
  if (score >= 30) return "D";
  return "F";
}

function getTierConfig(tier) {
  return VIBE_TIER_THRESHOLDS[tier];
}

// ═══════════════════════════════════════════════════════════════════
// QUANT ENGINE (converted from TypeScript)
// ═══════════════════════════════════════════════════════════════════

const KEYBOARD_REFERENCE_PRICE = 400;
const MOUSE_REFERENCE_PRICE = 300;

const WEIGHT_MODES = {
  balanced: {
    id: "balanced", label: "Balanced", labelZh: "综合性价比", descZh: "均衡评分，适合大多数用户",
    kbWeights: { latency: 0.25, pollingRate: 0.20, switchQuality: 0.20, structure: 0.15, keycap: 0.10, connection: 0.05, features: 0.05 },
    mouseWeights: { sensor: 0.30, weight: 0.20, pollingRate: 0.15, clickLatency: 0.15, coating: 0.08, connection: 0.07, battery: 0.05 },
  },
  quality: {
    id: "quality", label: "Quality", labelZh: "质感优先", descZh: "材质、手感、做工权重更高",
    kbWeights: { structure: 0.25, keycap: 0.20, switchQuality: 0.20, features: 0.15, latency: 0.08, pollingRate: 0.07, connection: 0.05 },
    mouseWeights: { coating: 0.25, connection: 0.20, weight: 0.20, battery: 0.15, sensor: 0.10, pollingRate: 0.05, clickLatency: 0.05 },
  },
  hardware: {
    id: "hardware", label: "Hardware", labelZh: "硬件优先", descZh: "性能参数优先，延迟和传感器权重最高",
    kbWeights: { latency: 0.30, pollingRate: 0.25, switchQuality: 0.25, structure: 0.08, keycap: 0.05, connection: 0.04, features: 0.03 },
    mouseWeights: { sensor: 0.35, pollingRate: 0.25, clickLatency: 0.20, weight: 0.08, coating: 0.05, connection: 0.04, battery: 0.03 },
  },
};

const SWITCH_BRAND_SCORES = {
  WOOTING_LEKKER: 95, ZEALPC: 92, HOLY_PANDA: 88, GATERON_OIL_KING: 85,
  TTC: 78, JWK: 75, STEELSERIES_OMNIPOINT: 80, RAZER_OPTICAL: 72,
  KAILH_BOX: 70, KAILH: 65, GATERON: 58, CHERRY_MX: 55, LOGITECH_ROMER_G: 50,
  AKKO: 48, OUTEMU: 40, TOPRE: 85, GENERIC: 30, OTHER: 35,
};

const SWITCH_TYPE_BONUS = {
  MAGNETIC_HALL_EFFECT: 1.15, TOPRE_ELECTROSTATIC: 1.10,
  OPTICAL: 1.05, LINEAR: 1.00, TACTILE: 1.00, CLICKY: 0.95,
};

const STRUCTURE_SCORES = {
  GASKET_LEAF_HYBRID: 95, LEAF_SPRING: 90, GASKET_MOUNT: 82,
  O_RING_GASKET: 80, TOP_MOUNT: 60, SANDWICH_MOUNT: 55,
  BOTTOM_MOUNT: 50, TRAY_MOUNT: 40, INTEGRATED_PLATE: 30, OTHER: 35,
};

const KEYCAP_SCORES = {
  PBT_DOUBLE_SHOT: 95, DOUBLE_SHOT_PBT: 95, PBT_DYE_SUB: 85,
  PBT: 72, ABS_DOUBLE_SHOT: 60, POM: 55, PC_POLYCARBONATE: 50,
  ABS: 30, OTHER: 35,
};

const CONNECTION_SCORES = {
  TRI_MODE_DONGLE_STORAGE: 95, TRI_MODE_STABLE: 88, TRI_MODE_BASIC: 70,
  WIRED_2_4G: 55, WIRED_BLE: 45, WIRED_ONLY: 30,
};

const SENSOR_SCORES = {
  PAW3950_ULTRA: 98, PWM3950: 95, PAW3950: 93, RAZER_FOCUS_PRO_35K: 95,
  RAZER_FOCUS_PLUS: 90, FOCUS_PRO_30K: 88, HERO_2: 87, PAW3395: 82,
  HERO_25K: 78, HERO_16K: 65, PAW3370: 60, PAW3335: 48, PAW3327: 38,
  PAW3325: 30, PAW3311: 35, STEELSERIES_TRUEMOVE_AIR: 50, PIXART_OTHER: 40, OTHER: 35,
};

const COATING_SCORES = {
  PREMIUM: 95, GREAT: 80, GOOD: 60, AVERAGE: 40, POOR: 20, NONE: 10,
};

function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }

function linearNormalize(value, min, max, invert) {
  if (max === min) return 50;
  const raw = clamp((value - min) / (max - min), 0, 1);
  return clamp(invert ? (1 - raw) * 100 : raw * 100, 0, 100);
}

function scoreKbLatency(latencyMs) {
  if (latencyMs === null || latencyMs === undefined) return 50;
  return linearNormalize(latencyMs, 0, 20, true);
}

function scoreKbPollingRate(hz) {
  const tiers = [[8000, 100], [4000, 88], [2000, 72], [1000, 55], [500, 35], [250, 20], [125, 10]];
  for (const [threshold, score] of tiers) { if (hz >= threshold) return score; }
  return 5;
}

function scoreKbSwitchQuality(brand, type) {
  const base = SWITCH_BRAND_SCORES[brand] ?? 30;
  const bonus = SWITCH_TYPE_BONUS[type] ?? 1.0;
  return clamp(base * bonus, 0, 100);
}

function scoreKbStructure(structure) { return STRUCTURE_SCORES[structure] ?? 35; }
function scoreKbKeycap(material) { return KEYCAP_SCORES[material] ?? 35; }
function scoreKbConnection(quality) { return CONNECTION_SCORES[quality] ?? 30; }

function scoreKbFeatures(input) {
  let score = 0;
  if (input.isHotSwappable) score += 25;
  if (input.isPreLubed) score += 10;
  if (input.hasRGB) score += 10;
  if (input.isSouthFacing) score += 10;
  if (input.hasQMKVIA) score += 20;
  if (input.hasKnob) score += 10;
  if (input.hasScreen) score += 5;
  if (input.hasFoamMod) score += 10;
  return clamp(score, 0, 100);
}

function scoreKeyboard(input, mode) {
  mode = mode || "balanced";
  const weights = WEIGHT_MODES[mode].kbWeights;
  const dims = [
    { label: "Latency", rawValue: scoreKbLatency(input.latencyMs), weight: weights.latency, weightedScore: 0, description: input.latencyMs != null ? input.latencyMs + "ms measured latency" : "Latency data not available" },
    { label: "Polling Rate", rawValue: scoreKbPollingRate(input.pollingRateHz), weight: weights.pollingRate, weightedScore: 0, description: input.pollingRateHz + "Hz polling rate" },
    { label: "Switch Quality", rawValue: scoreKbSwitchQuality(input.switchBrand, input.switchType), weight: weights.switchQuality, weightedScore: 0, description: input.switchBrand + " (" + input.switchType + ")" },
    { label: "Structure", rawValue: scoreKbStructure(input.structure), weight: weights.structure, weightedScore: 0, description: input.structure.replace(/_/g, " ") },
    { label: "Keycap", rawValue: scoreKbKeycap(input.keycapMaterial), weight: weights.keycap, weightedScore: 0, description: input.keycapMaterial.replace(/_/g, " ") },
    { label: "Connection", rawValue: scoreKbConnection(input.connectionQuality), weight: weights.connection, weightedScore: 0, description: input.connectionQuality.replace(/_/g, " ") },
    { label: "Features", rawValue: scoreKbFeatures(input), weight: weights.features, weightedScore: 0, description: "Hot-swap, RGB, QMK/VIA, etc." },
  ];
  for (const d of dims) { d.weightedScore = d.rawValue * d.weight; }
  const performanceRating = dims.reduce((s, d) => s + d.weightedScore, 0);
  const effectivePrice = input.currentLowestPrice * input.marketPremiumCoefficient;
  const priceRatio = KEYBOARD_REFERENCE_PRICE / effectivePrice;
  const scoreTotal = clamp(performanceRating * priceRatio, 0, 100);
  const tier = getVibeTier(scoreTotal);
  const tierConfig = getTierConfig(tier);
  return {
    peripheralType: "KEYBOARD", name: input.name, scoreTotal: Math.round(scoreTotal * 10) / 10, tier,
    priceUsed: input.currentLowestPrice, premiumCoeffUsed: input.marketPremiumCoefficient,
    effectivePrice: Math.round(effectivePrice * 100) / 100, priceNote: input.priceNote || "",
    dimensions: dims.map(function(d) { return { ...d, rawValue: Math.round(d.rawValue * 10) / 10, weightedScore: Math.round(d.weightedScore * 10) / 10 }; }),
    tierColor: tierConfig.color, tierLabel: tierConfig.label,
  };
}

function scoreMouseSensor(model) { return SENSOR_SCORES[model] ?? 35; }

function scoreMouseWeight(grams) {
  if (grams <= 60) { return clamp(100 - (60 - grams) * 0.75, 70, 100); }
  return clamp(85 - (grams - 60) * 1.5, 0, 85);
}

function scoreMousePollingRate(hz) {
  const tiers = [[8000, 100], [4000, 88], [2000, 72], [1000, 55], [500, 35], [250, 20], [125, 10]];
  for (const [threshold, score] of tiers) { if (hz >= threshold) return score; }
  return 5;
}

function scoreMouseClickLatency(ms) {
  if (ms === null || ms === undefined) return 50;
  return linearNormalize(ms, 0, 15, true);
}

function scoreMouseCoating(quality) { return COATING_SCORES[quality] ?? 40; }
function scoreMouseConnection(quality) { return CONNECTION_SCORES[quality] ?? 30; }

function scoreMouseBattery(batteryHours, hasDongleStorage) {
  if (batteryHours === null || batteryHours === undefined) return 50;
  let score = 0;
  if (batteryHours >= 150) score = 95;
  else if (batteryHours >= 120) score = 88;
  else if (batteryHours >= 90) score = 78;
  else if (batteryHours >= 70) score = 65;
  else if (batteryHours >= 40) score = 45;
  else score = 25;
  if (hasDongleStorage) score = clamp(score + 10, 0, 100);
  return score;
}

function scoreMouse(input, mode) {
  mode = mode || "balanced";
  const weights = WEIGHT_MODES[mode].mouseWeights;
  const dims = [
    { label: "Sensor", rawValue: scoreMouseSensor(input.sensorModel), weight: weights.sensor, weightedScore: 0, description: input.sensorModel },
    { label: "Weight", rawValue: scoreMouseWeight(input.weightGrams), weight: weights.weight, weightedScore: 0, description: input.weightGrams + "g" },
    { label: "Polling Rate", rawValue: scoreMousePollingRate(input.pollingRateHz), weight: weights.pollingRate, weightedScore: 0, description: input.pollingRateHz + "Hz" },
    { label: "Click Latency", rawValue: scoreMouseClickLatency(input.clickLatencyMs), weight: weights.clickLatency, weightedScore: 0, description: input.clickLatencyMs != null ? input.clickLatencyMs + "ms" : "Not measured" },
    { label: "Coating", rawValue: scoreMouseCoating(input.coatingQuality), weight: weights.coating, weightedScore: 0, description: input.coatingQuality },
    { label: "Connection", rawValue: scoreMouseConnection(input.connectionQuality), weight: weights.connection, weightedScore: 0, description: input.connectionQuality.replace(/_/g, " ") },
    { label: "Battery", rawValue: scoreMouseBattery(input.batteryLifeHours, input.hasDongleStorage), weight: weights.battery, weightedScore: 0, description: input.batteryLifeHours != null ? input.batteryLifeHours + "h" : "Unknown" },
  ];
  for (const d of dims) { d.weightedScore = d.rawValue * d.weight; }
  const performanceRating = dims.reduce((s, d) => s + d.weightedScore, 0);
  const effectivePrice = input.currentLowestPrice * input.marketPremiumCoefficient;
  const priceRatio = MOUSE_REFERENCE_PRICE / effectivePrice;
  const scoreTotal = clamp(performanceRating * priceRatio, 0, 100);
  const tier = getVibeTier(scoreTotal);
  const tierConfig = getTierConfig(tier);
  return {
    peripheralType: "MOUSE", name: input.name, scoreTotal: Math.round(scoreTotal * 10) / 10, tier,
    priceUsed: input.currentLowestPrice, premiumCoeffUsed: input.marketPremiumCoefficient,
    effectivePrice: Math.round(effectivePrice * 100) / 100, priceNote: input.priceNote || "",
    dimensions: dims.map(function(d) { return { ...d, rawValue: Math.round(d.rawValue * 10) / 10, weightedScore: Math.round(d.weightedScore * 10) / 10 }; }),
    tierColor: tierConfig.color, tierLabel: tierConfig.label,
  };
}

var _cachedResults = {};

function getCached(mode) {
  var cached = _cachedResults[mode];
  if (cached) return cached;
  var kb = keyboardInputs.map(function(input) { return scoreKeyboard(input, mode); }).sort(function(a, b) { return b.scoreTotal - a.scoreTotal; });
  var ms = mouseInputs.map(function(input) { return scoreMouse(input, mode); }).sort(function(a, b) { return b.scoreTotal - a.scoreTotal; });
  _cachedResults[mode] = { kb: kb, ms: ms };
  return { kb: kb, ms: ms };
}

function getKeyboardResults(mode) { return getCached(mode || "balanced").kb; }
function getMouseResults(mode) { return getCached(mode || "balanced").ms; }
function getAllResults(mode) {
  var r = getCached(mode || "balanced");
  return r.kb.concat(r.ms).sort(function(a, b) { return b.scoreTotal - a.scoreTotal; });
}

var currentMode = "balanced";
var currentRoute = "dashboard";
var searchQuery = "";
var categoryFilter = "All";

function navigate(hash) {
  if (!hash || hash === "#" || hash === "#dashboard") {
    currentRoute = "dashboard";
    renderDashboard();
  } else if (hash === "#keyboards") {
    currentRoute = "keyboards";
    renderKeyboards();
  } else if (hash === "#mice") {
    currentRoute = "mice";
    renderMice();
  } else if (hash.indexOf("#peripheral/") === 0) {
    currentRoute = "detail";
    var name = decodeURIComponent(hash.slice("#peripheral/".length));
    renderDetail(name);
  } else {
    currentRoute = "dashboard";
    renderDashboard();
  }
  updateNav();
}

function updateNav() {
  var links = document.querySelectorAll("#nav a");
  links.forEach(function(a) {
    a.classList.toggle("active", a.getAttribute("href") === "#" + currentRoute || (currentRoute === "dashboard" && a.getAttribute("href") === "#dashboard") || (currentRoute === "keyboards" && a.getAttribute("href") === "#keyboards") || (currentRoute === "mice" && a.getAttribute("href") === "#mice"));
  });
}

window.addEventListener("hashchange", function() { navigate(window.location.hash); });

// TOOL DEFINITIONS — Web Search + Fetch Page
// ═══════════════════════════════════════════════════════════════════

var CORS_PROXY = "https://api.allorigins.win/raw?url=";

var TOOL_DEFS = [
  {
    type: "function",
    function: {
      name: "web_search",
      description: "搜索互联网获取最新信息。当你需要了解真实产品的参数、价格、评测时使用。返回搜索结果列表。",
      parameters: {
        type: "object",
        properties: {
          query: { type: "string", description: "搜索关键词，如: Wooting 60HE+ 键盘 参数 评测" },
          max_results: { type: "number", description: "最大结果数 (1-10)", default: 5 },
        },
        required: ["query"],
      },
    },
  },
  {
    type: "function",
    function: {
      name: "fetch_page",
      description: "获取指定 URL 的网页内容。用于读取产品详情页、评测文章等。",
      parameters: {
        type: "object",
        properties: {
          url: { type: "string", description: "要读取的完整 URL" },
        },
        required: ["url"],
      },
    },
  },
];

async function executeTool(name, args) {
  if (name === "web_search") {
    var query = encodeURIComponent(args.query || "");
    var maxResults = Math.min(args.max_results || 5, 10);
    var searchUrl = "https://lite.duckduckgo.com/lite/?q=" + query;
    var resp = await fetch(CORS_PROXY + encodeURIComponent(searchUrl));
    if (!resp.ok) throw new Error("搜索失败: " + resp.status);
    var html = await resp.text();
    var results = [];
    var linkRegex = /<a[^>]+class="[^"]*result-link[^"]*"[^>]*href="([^"]*)"[^>]*>([\s\S]*?)<\/a>/gi;
    var snippetRegex = /<td[^>]*class="[^"]*result-snippet[^"]*"[^>]*>([\s\S]*?)<\/td>/gi;
    var links = [], snippets = [], m;
    while ((m = linkRegex.exec(html)) !== null) {
      links.push({ url: m[1].trim(), title: m[2].replace(/<[^>]+>/g, "").trim() });
    }
    while ((m = snippetRegex.exec(html)) !== null) {
      snippets.push(m[1].replace(/<[^>]+>/g, "").trim());
    }
    for (var i = 0; i < Math.min(links.length, maxResults); i++) {
      results.push({
        title: links[i].title || "无标题",
        url: links[i].url,
        snippet: snippets[i] || "",
      });
    }
    if (results.length === 0) {
      var altRegex = /<a[^>]*href="([^"]*)"[^>]*class="[^"]*result__a[^"]*"[^>]*>([\s\S]*?)<\/a>/gi;
      while ((m = altRegex.exec(html)) !== null) {
        var snippetAlt = /<a[^>]*class="[^"]*result__snippet[^"]*"[^>]*>([\s\S]*?)<\/a>/gi;
        links.push({ url: m[1], title: m[2].replace(/<[^>]+>/g, "").trim() });
      }
      for (var i = 0; i < Math.min(links.length, maxResults); i++) {
        results.push({ title: links[i].title || "无标题", url: links[i].url, snippet: "" });
      }
    }
    return JSON.stringify({ results: results }, null, 2);
  } else if (name === "fetch_page") {
    var url = args.url;
    if (!url) throw new Error("URL 不能为空");
    var resp = await fetch(CORS_PROXY + encodeURIComponent(url));
    if (!resp.ok) throw new Error("获取页面失败: " + resp.status);
    var html = await resp.text();
    var text = html.replace(/<script[\s\S]*?<\/script>/gi, "")
      .replace(/<style[\s\S]*?<\/style>/gi, "")
      .replace(/<nav[\s\S]*?<\/nav>/gi, "")
      .replace(/<footer[\s\S]*?<\/footer>/gi, "")
      .replace(/<header[\s\S]*?<\/header>/gi, "")
      .replace(/<[^>]+>/g, " ")
      .replace(/\s+/g, " ")
      .trim();
    if (text.length > 8000) text = text.slice(0, 8000) + "\n...(内容已截断)";
    return JSON.stringify({ url: url, content: text }, null, 2);
  }
  throw new Error("未知工具: " + name);
}

async function callAIWithTools(prompt, systemPrompt, toolNames) {
  if (!aiSettings) throw new Error("未配置 AI API");
  var base = aiSettings.baseUrl.replace(/\/+$/, "");
  var tools = toolNames ? TOOL_DEFS.filter(function(t) { return toolNames.indexOf(t.function.name) !== -1; }) : TOOL_DEFS;

  var messages = [
    { role: "system", content: systemPrompt || "你是一个有用的助手。你可以使用工具搜索网络获取实时信息。" },
    { role: "user", content: prompt }
  ];

  var maxRound = 5;
  for (var round = 0; round < maxRound; round++) {
    var body = {
      model: aiSettings.model || "gpt-4o",
      messages: messages,
      temperature: 0.3,
      max_tokens: 4096,
    };
    if (tools.length > 0) body.tools = tools;

    var resp = await fetch(base + "/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + aiSettings.apiKey },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      var errText = await resp.text().catch(function() { return ""; });
      throw new Error("API 错误 (" + resp.status + "): " + (errText || resp.statusText));
    }
    var data = await resp.json();
    var choice = data.choices && data.choices[0];
    var msg = choice && choice.message;
    if (!msg) throw new Error("API 返回为空");

    messages.push({ role: "assistant", content: msg.content || null, tool_calls: msg.tool_calls });

    if (!msg.tool_calls || msg.tool_calls.length === 0) {
      return msg.content || "";
    }

    for (var tc of msg.tool_calls) {
      try {
        var args = JSON.parse(tc.function.arguments);
        var result = await executeTool(tc.function.name, args);
        messages.push({
          role: "tool",
          tool_call_id: tc.id,
          content: result,
        });
      } catch (err) {
        messages.push({
          role: "tool",
          tool_call_id: tc.id,
          content: JSON.stringify({ error: err.message }),
        });
      }
    }
  }
  throw new Error("工具调用超过最大轮次 (" + maxRound + ")");
}

async function callAI(prompt) {
  var systemPrompt = "你是一个外设数据助手。严格以 JSON 格式输出，不要包含 markdown 代码块标记，不要包含其他文字说明。";
  var result = await callAIWithTools(prompt, systemPrompt, []);
  return JSON.parse(result);
}

          switchBrand: item.switchBrand, switchType: item.switchType || "LINEAR",
          structure: item.structure || "GASKET_MOUNT", keycapMaterial: item.keycapMaterial || "PBT",
          connectionQuality: item.connectionQuality || "TRI_MODE_BASIC", pollingRateHz: item.pollingRateHz || 1000,
          latencyMs: item.latencyMs || 8.0, isHotSwappable: item.isHotSwappable !== false,
          isPreLubed: item.isPreLubed !== false, hasRGB: item.hasRGB !== false,
          isSouthFacing: item.isSouthFacing === true, hasQMKVIA: item.hasQMKVIA === true,
          hasKnob: item.hasKnob === true, hasScreen: item.hasScreen === true, hasFoamMod: item.hasFoamMod !== false,
          marketPremiumCoefficient: item.marketPremiumCoefficient || 1.0, priceNote: "AI 获取",
        });
        added++;
      } else if ((item.type === "MOUSE" || cat === "mouse") && item.sensorModel) {
        mouseInputs.push({
          name: name, msrp: item.msrp || item.currentLowestPrice, currentLowestPrice: item.currentLowestPrice,
          sensorModel: item.sensorModel, weightGrams: item.weightGrams || 60, pollingRateHz: item.pollingRateHz || 1000,
          clickLatencyMs: item.clickLatencyMs || 3.0, motionLatencyMs: item.motionLatencyMs || 1.5,
          coatingQuality: item.coatingQuality || "AVERAGE", connectionQuality: item.connectionQuality || "TRI_MODE_BASIC",
          batteryLifeHours: item.batteryLifeHours || 60, hasDongleStorage: item.hasDongleStorage === true,
          hasGripTape: item.hasGripTape === true, marketPremiumCoefficient: item.marketPremiumCoefficient || 1.0,
          priceNote: "AI 获取",
        });
        added++;
      } else { skipped++; }
    });
    _cachedResults = {};
    resultEl.innerHTML = '<div class="modal-result success">获取完成：新增 ' + added + ' 款，跳过 ' + skipped + ' 款重复/无效数据</div>';
    navigate(window.location.hash || "#dashboard");
  } catch (err) {
    resultEl.innerHTML = '<div class="modal-result error">' + escapeHtml(err.message || String(err)) + '</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = "开始获取";
  }
}

// ═══════════════════════════════════════════════════════════════════
// CUSTOM ADD — Single peripheral via AI
// ═══════════════════════════════════════════════════════════════════

function openCustomAddModal() {
  if (!aiSettings) { openAISettings(); return; }
  var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">' +
    '<div class="modal-box" onclick="event.stopPropagation()">' +
    '<button class="modal-close" onclick="closeModal()">&times;</button>' +
    '<h2>自定义添加外设</h2>' +
    '<p class="modal-sub">输入设备名称，AI 将自动获取参数并评分</p>' +
    '<div class="form-group">' +
      '<label>设备类型</label>' +
      '<select id="customCat">' +
        '<option value="keyboard">键盘</option>' +
        '<option value="mouse">鼠标</option>' +
      '</select>' +
    '</div>' +
    '<div class="form-group">' +
      '<label>设备名称 <span style="color:#ef4444;">*</span></label>' +
      '<input id="customName" type="text" placeholder="如: Wooting 60HE+" onkeydown="if(event.key===\'Enter\')doCustomAdd()">' +
    '</div>' +
    '<button class="btn-primary" id="btnCustomAdd" onclick="doCustomAdd()">AI 查询</button>' +
    '<div id="customAddResult"></div>' +
    '</div></div>';
  showModal(html);
  setTimeout(function() {
    var inp = document.getElementById("customName");
    if (inp) inp.focus();
  }, 100);
}

async function doCustomAdd() {
  var btn = document.getElementById("btnCustomAdd");
  var resultEl = document.getElementById("customAddResult");
  var name = document.getElementById("customName").value.trim();
  var cat = document.getElementById("customCat").value;
  if (!name) { resultEl.innerHTML = '<div class="modal-result error">请输入设备名称</div>'; return; }
  btn.disabled = true;
  btn.textContent = "查询中...";
  resultEl.innerHTML = "";
  try {
    var targetType = cat === "keyboard" ? "机械键盘" : "游戏鼠标";
    var systemPrompt = "你是一个外设评测助手。你的任务是通过 web_search 工具搜索真实产品的信息，然后汇总输出。\n"
      + "步骤1: 使用 web_search 搜索 '" + name + "' " + targetType + " 的详细参数、价格和评测\n"
      + "步骤2: 如果需要更详细的信息，使用 fetch_page 查看产品页面\n"
      + "步骤3: 汇总所有数据,严格按以下 JSON 格式输出单个对象,不要包含 markdown 代码块标记,不要输出其他文字:\n\n"
      + (cat === "keyboard"
        ? '{"type":"KEYBOARD","name":"' + name + '","msrp":999,"currentLowestPrice":899,"switchBrand":"品牌","switchType":"轴体类型","structure":"结构","keycapMaterial":"键帽材质","connectionQuality":"连接方式","pollingRateHz":1000,"latencyMs":5.0,"isHotSwappable":true,"isPreLubed":true,"hasRGB":true,"isSouthFacing":true,"hasQMKVIA":true,"hasKnob":false,"hasScreen":false,"hasFoamMod":true,"marketPremiumCoefficient":1.0}'
        : '{"type":"MOUSE","name":"' + name + '","msrp":499,"currentLowestPrice":429,"sensorModel":"传感器型号","weightGrams":55,"pollingRateHz":4000,"clickLatencyMs":1.5,"motionLatencyMs":0.8,"coatingQuality":"涂层质量","connectionQuality":"连接方式","batteryLifeHours":70,"hasDongleStorage":true,"hasGripTape":false,"marketPremiumCoefficient":1.0}')
      + "\n\n请确保所有数据来自真实的市售产品。使用 web_search 搜索获取真实数据后再输出,不要编造数据。";

    var prompt = "请搜索 " + name + " " + targetType + " 的真实产品参数和价格";
    var raw = await callAIWithTools(prompt, systemPrompt, ["web_search", "fetch_page"]);
    var item = JSON.parse(raw);
    if (cat === "keyboard" && item.switchBrand) {
      var exists = keyboardInputs.some(function(k) { return k.name === (item.name || name); });
      if (exists) throw new Error("该设备已在列表中");
      keyboardInputs.push({
        name: item.name || name, msrp: item.msrp || item.currentLowestPrice, currentLowestPrice: item.currentLowestPrice || 999,
        switchBrand: item.switchBrand, switchType: item.switchType || "LINEAR",
        structure: item.structure || "GASKET_MOUNT", keycapMaterial: item.keycapMaterial || "PBT",
        connectionQuality: item.connectionQuality || "TRI_MODE_BASIC", pollingRateHz: item.pollingRateHz || 1000,
        latencyMs: item.latencyMs || 8.0, isHotSwappable: item.isHotSwappable !== false,
        isPreLubed: item.isPreLubed !== false, hasRGB: item.hasRGB !== false,
        isSouthFacing: item.isSouthFacing === true, hasQMKVIA: item.hasQMKVIA === true,
        hasKnob: item.hasKnob === true, hasScreen: item.hasScreen === true, hasFoamMod: item.hasFoamMod !== false,
        marketPremiumCoefficient: item.marketPremiumCoefficient || 1.0, priceNote: "AI 获取",
      });
    } else if (cat === "mouse" && item.sensorModel) {
      var exists2 = mouseInputs.some(function(m) { return m.name === (item.name || name); });
      if (exists2) throw new Error("该设备已在列表中");
      mouseInputs.push({
        name: item.name || name, msrp: item.msrp || item.currentLowestPrice, currentLowestPrice: item.currentLowestPrice || 999,
        sensorModel: item.sensorModel, weightGrams: item.weightGrams || 60, pollingRateHz: item.pollingRateHz || 1000,
        clickLatencyMs: item.clickLatencyMs || 3.0, motionLatencyMs: item.motionLatencyMs || 1.5,
        coatingQuality: item.coatingQuality || "AVERAGE", connectionQuality: item.connectionQuality || "TRI_MODE_BASIC",
        batteryLifeHours: item.batteryLifeHours || 60, hasDongleStorage: item.hasDongleStorage === true,
        hasGripTape: item.hasGripTape === true, marketPremiumCoefficient: item.marketPremiumCoefficient || 1.0,
        priceNote: "AI 获取",
      });
    } else {
      throw new Error("AI 返回数据不完整，无法解析");
    }
    _cachedResults = {};
    resultEl.innerHTML = '<div class="modal-result success">添加成功：' + escapeHtml(item.name || name) + ' 已加入列表</div>';
    navigate(window.location.hash || "#dashboard");
  } catch (err) {
    resultEl.innerHTML = '<div class="modal-result error">' + escapeHtml(err.message || String(err)) + '</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = "AI 查询";
  }
}

function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function renderTierBadge(tier, tierColor, tierLabel) {
  return '<span class="tier-badge" style="background:' + tierColor + '20;color:' + tierColor + ';border:1px solid ' + tierColor + '40;">' + escapeHtml(tierLabel) + '</span>';
}

function renderDimDots(dimensions, tierColor) {
  var colors = { "Latency":"#a78bfa","Polling Rate":"#60a5fa","Switch Quality":"#34d399","Structure":"#f472b6","Keycap":"#fb923c","Connection":"#a1a1aa","Features":"#eab308","Sensor":"#a78bfa","Weight":"#60a5fa","Click Latency":"#34d399","Coating":"#f472b6","Battery":"#eab308" };
  return dimensions.map(function(d) { return '<span class="dim-dot" style="background:' + (colors[d.label] || tierColor) + '" title="' + escapeHtml(d.label) + ': ' + d.rawValue + '"></span>'; }).join("");
}

function renderDeviceCard(result) {
  var typeLabel = result.peripheralType === "KEYBOARD" ? "键盘" : "鼠标";
  var scoreColor = result.scoreTotal >= 75 ? "#10b981" : result.scoreTotal >= 60 ? "#3b82f6" : result.scoreTotal >= 45 ? "#f59e0b" : "#f43f5e";
  return '<div class="device-card" onclick="navigate(\'#peripheral/' + encodeURIComponent(result.name) + '\')">' +
    '<div class="card-top">' +
      '<div><div class="card-name">' + escapeHtml(result.name) + '</div><div class="card-type">' + typeLabel + ' \u00b7 \u00a5' + result.priceUsed + '</div></div>' +
      '<div class="card-score"><div class="score-num" style="color:' + scoreColor + '">' + result.scoreTotal + '</div>' + renderTierBadge(result.tier, result.tierColor, result.tierLabel) + '</div>' +
    '</div>' +
    '<div class="card-dims">' + renderDimDots(result.dimensions, result.tierColor) + '</div>' +
  '</div>';
}

function renderSearchToolbar(placeholder, showCategoryFilter) {
  var catHtml = '';
  if (showCategoryFilter) {
    catHtml = '<div class="filter-group" id="catFilter">' +
      '<button class="filter-btn active" data-cat="All">全部</button>' +
      '<button class="filter-btn" data-cat="KEYBOARD">键盘</button>' +
      '<button class="filter-btn" data-cat="MOUSE">鼠标</button>' +
    '</div>';
  }
  return '<div class="toolbar">' +
    '<input class="search-box" id="searchBox" type="text" placeholder="' + escapeHtml(placeholder) + '" value="' + escapeHtml(searchQuery) + '">' +
    catHtml +
  '</div>';
}

function renderStatsBoxes(allResults, keyboards, mice) {
  var avgScore = allResults.length ? (allResults.reduce(function(s, r) { return s + r.scoreTotal; }, 0) / allResults.length) : 0;
  var sCount = allResults.filter(function(r) { return r.tier === "S"; }).length;
  var best = allResults.length ? allResults[0] : null;
  return '<div class="stats-row">' +
    '<div class="stat-card"><div class="stat-label">设备总数</div><div class="stat-value">' + (keyboards.length + mice.length) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">平均 VibeScore</div><div class="stat-value">' + avgScore.toFixed(1) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">S-Tier 数量</div><div class="stat-value">' + sCount + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">最佳价值之选</div><div class="stat-value" style="font-size:16px;line-height:1.3;">' + (best ? escapeHtml(best.name) : '-') + '</div></div>' +
  '</div>';
}

function renderDashboard() {
  var allResults = getAllResults(currentMode);
  var kbResults = getKeyboardResults(currentMode);
  var msResults = getMouseResults(currentMode);

  var html = '<div class="page-header"><h1>📊 仪表盘</h1><p>VibeScore ' + WEIGHT_MODES[currentMode].labelZh + ' · ' + WEIGHT_MODES[currentMode].descZh + '</p></div>';

  html += renderStatsBoxes(allResults, keyboardInputs, mouseInputs);

  html += renderSearchToolbar("搜索设备...", true);
  html += '<div id="dashboardContent" class="device-grid"></div>';

  document.getElementById("app").innerHTML = html;

  document.getElementById("searchBox").addEventListener("input", function() {
    searchQuery = this.value;
    renderDashboardList();
  });

  var catEl = document.getElementById("catFilter");
  if (catEl) {
    catEl.addEventListener("click", function(e) {
      var btn = e.target.closest(".filter-btn");
      if (!btn) return;
      categoryFilter = btn.getAttribute("data-cat");
      catEl.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      renderDashboardList();
    });
  }

  renderDashboardList();
}

function renderDashboardList() {
  var allResults = getAllResults(currentMode);
  var filtered = allResults;

  if (categoryFilter === "KEYBOARD") filtered = filtered.filter(function(r) { return r.peripheralType === "KEYBOARD"; });
  else if (categoryFilter === "MOUSE") filtered = filtered.filter(function(r) { return r.peripheralType === "MOUSE"; });

  if (searchQuery.trim()) {
    var q = searchQuery.trim().toLowerCase();
    filtered = filtered.filter(function(r) { return r.name.toLowerCase().indexOf(q) !== -1; });
  }

  var top = filtered.slice(0, 8);

  var container = document.getElementById("dashboardContent");
  if (top.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>没有找到匹配的设备</h3><p>试试调整搜索条件或筛选器</p></div>';
    return;
  }
  container.innerHTML = top.map(function(r) { return renderDeviceCard(r); }).join("");
}

function renderKeyboards() {
  var results = getKeyboardResults(currentMode);

  var html = '<div class="page-header"><h1>⌨️ 键盘排行</h1><p>VibeScore ' + WEIGHT_MODES[currentMode].labelZh + ' · 共 ' + results.length + ' 款键盘</p></div>';
  html += renderSearchToolbar("搜索键盘...", false);
  html += '<div id="rankTableWrap"></div>';

  document.getElementById("app").innerHTML = html;

  document.getElementById("searchBox").addEventListener("input", function() {
    searchQuery = this.value;
    renderKeyboardTable();
  });

  renderKeyboardTable();
}

function renderKeyboardTable() {
  var results = getKeyboardResults(currentMode);
  var filtered = results;
  if (searchQuery.trim()) {
    var q = searchQuery.trim().toLowerCase();
    filtered = filtered.filter(function(r) { return r.name.toLowerCase().indexOf(q) !== -1; });
  }

  var wrap = document.getElementById("rankTableWrap");
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><h3>没有找到匹配的键盘</h3><p>试试其他关键词</p></div>';
    return;
  }

  var rows = filtered.map(function(r, i) {
    var rank = i + 1;
    var cls = rank <= 3 ? ' class="rank-' + rank + '"' : '';
    var scoreColor = r.scoreTotal >= 75 ? "#10b981" : r.scoreTotal >= 60 ? "#3b82f6" : r.scoreTotal >= 45 ? "#f59e0b" : "#f43f5e";
    return '<tr' + cls + '>' +
      '<td class="rank-num">#' + rank + '</td>' +
      '<td class="rank-name" onclick="navigate(\'#peripheral/' + encodeURIComponent(r.name) + '\')">' + escapeHtml(r.name) + '</td>' +
      '<td>' + renderTierBadge(r.tier, r.tierColor, r.tierLabel) + '</td>' +
      '<td class="rank-price">¥' + r.priceUsed + '</td>' +
      '<td class="rank-score" style="color:' + scoreColor + '">' + r.scoreTotal + '</td>' +
    '</tr>';
  }).join("");

  wrap.innerHTML = '<table class="rank-table">' +
    '<thead><tr><th>#</th><th>名称</th><th>等级</th><th>价格</th><th>VibeScore</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

function renderMice() {
  var results = getMouseResults(currentMode);

  var html = '<div class="page-header"><h1>🖱️ 鼠标排行</h1><p>VibeScore ' + WEIGHT_MODES[currentMode].labelZh + ' · 共 ' + results.length + ' 款鼠标</p></div>';
  html += renderSearchToolbar("搜索鼠标...", false);
  html += '<div id="rankTableWrap"></div>';

  document.getElementById("app").innerHTML = html;

  document.getElementById("searchBox").addEventListener("input", function() {
    searchQuery = this.value;
    renderMouseTable();
  });

  renderMouseTable();
}

function renderMouseTable() {
  var results = getMouseResults(currentMode);
  var filtered = results;
  if (searchQuery.trim()) {
    var q = searchQuery.trim().toLowerCase();
    filtered = filtered.filter(function(r) { return r.name.toLowerCase().indexOf(q) !== -1; });
  }

  var wrap = document.getElementById("rankTableWrap");
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><h3>没有找到匹配的鼠标</h3><p>试试其他关键词</p></div>';
    return;
  }

  var rows = filtered.map(function(r, i) {
    var rank = i + 1;
    var cls = rank <= 3 ? ' class="rank-' + rank + '"' : '';
    var scoreColor = r.scoreTotal >= 75 ? "#10b981" : r.scoreTotal >= 60 ? "#3b82f6" : r.scoreTotal >= 45 ? "#f59e0b" : "#f43f5e";
    return '<tr' + cls + '>' +
      '<td class="rank-num">#' + rank + '</td>' +
      '<td class="rank-name" onclick="navigate(\'#peripheral/' + encodeURIComponent(r.name) + '\')">' + escapeHtml(r.name) + '</td>' +
      '<td>' + renderTierBadge(r.tier, r.tierColor, r.tierLabel) + '</td>' +
      '<td class="rank-price">¥' + r.priceUsed + '</td>' +
      '<td class="rank-score" style="color:' + scoreColor + '">' + r.scoreTotal + '</td>' +
    '</tr>';
  }).join("");

  wrap.innerHTML = '<table class="rank-table">' +
    '<thead><tr><th>#</th><th>名称</th><th>等级</th><th>价格</th><th>VibeScore</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

function renderDetail(name) {
  var allResults = getAllResults(currentMode);
  var result = null;
  for (var i = 0; i < allResults.length; i++) {
    if (allResults[i].name === name) { result = allResults[i]; break; }
  }

  if (!result) {
    document.getElementById("app").innerHTML = '<div class="page-header"><h1>设备未找到</h1><p>请返回 <a href="#dashboard" style="color:#10b981;">仪表盘</a></p></div>';
    return;
  }

  var typeIcon = result.peripheralType === "KEYBOARD" ? "⌨️" : "🖱️";
  var typeLabel = result.peripheralType === "KEYBOARD" ? "键盘" : "鼠标";
  var scoreColor = result.scoreTotal >= 75 ? "#10b981" : result.scoreTotal >= 60 ? "#3b82f6" : result.scoreTotal >= 45 ? "#f59e0b" : "#f43f5e";

  var html = '<div class="detail-header">' +
    '<button class="detail-back" onclick="window.history.back()">← 返回</button>' +
    '<h1 class="detail-title">' + typeIcon + ' ' + escapeHtml(result.name) + '</h1>' +
    '<span class="detail-badge" style="background:' + result.tierColor + '20;color:' + result.tierColor + ';border:1px solid ' + result.tierColor + '40;">' + escapeHtml(result.tierLabel) + '</span>' +
  '</div>';

  html += '<div class="detail-meta" style="margin-bottom:24px;">' +
    '<span class="detail-meta-item">类型: <strong>' + typeLabel + '</strong></span>' +
    '<span class="detail-meta-item">VibeScore: <strong style="color:' + scoreColor + '">' + result.scoreTotal + '</strong></span>' +
    '<span class="detail-meta-item">当前价格: <strong>¥' + result.priceUsed + '</strong></span>' +
    '<span class="detail-meta-item">品牌溢价系数: <strong>×' + result.premiumCoeffUsed + '</strong></span>' +
    '<span class="detail-meta-item">有效价格: <strong>¥' + result.effectivePrice + '</strong></span>' +
    '<span class="detail-meta-item">评分模式: <strong>' + WEIGHT_MODES[currentMode].labelZh + '</strong></span>' +
  '</div>';

  html += '<div class="dim-section"><h3>维度评分详情</h3><div class="dim-bar-group">';
  result.dimensions.forEach(function(d) {
    var pct = Math.round(d.rawValue);
    html += '<div class="dim-bar-row">' +
      '<div class="dim-bar-label"><span class="dim-name">' + escapeHtml(d.label) + '</span><span class="dim-val">' + d.rawValue + ' 分 · 权重 ' + (d.weight * 100) + '% · 加权 ' + d.weightedScore + '</span></div>' +
      '<div class="dim-bar-track"><div class="dim-bar-fill" style="width:' + pct + '%;background:' + result.tierColor + '"></div></div>' +
      '<div class="dim-desc">' + escapeHtml(d.description) + '</div>' +
    '</div>';
  });
  html += '</div></div>';

  html += '<div class="dim-section" style="margin-top:24px;"><h3>价格信息</h3><div class="price-section">' +
    '<div class="price-row"><span class="price-label">建议零售价 (MSRP)</span><span class="price-value">¥' + result.priceUsed + '</span></div>' +
    '<div class="price-row"><span class="price-label">品牌溢价系数</span><span class="price-value">×' + result.premiumCoeffUsed + '</span></div>' +
    '<div class="price-row"><span class="price-label">有效价格 (最低价 × 溢价系数)</span><span class="price-value">¥' + result.effectivePrice + '</span></div>' +
    '<div class="price-row"><span class="price-label">参考基准价</span><span class="price-value">¥' + (result.peripheralType === "KEYBOARD" ? KEYBOARD_REFERENCE_PRICE : MOUSE_REFERENCE_PRICE) + '</span></div>' +
    '<div class="price-row"><span class="price-label">价格来源</span><span class="price-value">' + escapeHtml(result.priceNote || '参考价') + '</span></div>' +
  '</div></div>';

  html += '<div class="dim-section" style="margin-top:24px;"><h3>其他评分模式</h3><div class="price-section">';
  ["balanced", "quality", "hardware"].forEach(function(m) {
    if (m === currentMode) return;
    var altResults;
    if (result.peripheralType === "KEYBOARD") altResults = getKeyboardResults(m);
    else altResults = getMouseResults(m);
    var alt = null;
    for (var j = 0; j < altResults.length; j++) {
      if (altResults[j].name === name) { alt = altResults[j]; break; }
    }
    if (alt) {
      html += '<div class="price-row"><span class="price-label">' + WEIGHT_MODES[m].labelZh + '</span><span class="price-value" style="color:' + scoreColor + '">' + alt.scoreTotal + ' 分 · ' + alt.tierLabel + '</span></div>';
    }
  });
  html += '</div></div>';

  document.getElementById("app").innerHTML = html;
}

navigate(window.location.hash || "#dashboard");
</script>
