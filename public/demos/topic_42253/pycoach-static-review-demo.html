<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PyCoach 静态评审 Demo</title>
  <style>
    :root {
      --bg: #f7f7f4;
      --paper: #fffef9;
      --ink: #242424;
      --muted: #686868;
      --line: #dedbd2;
      --green: #27755b;
      --blue: #285f9f;
      --yellow: #f3c953;
      --red: #b84a4a;
      --shadow: 0 14px 40px rgba(31, 35, 31, .1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { border-color: #a8a296; }
    button.primary { background: var(--ink); border-color: var(--ink); color: #fff; }
    button:disabled { cursor: not-allowed; opacity: .45; }
    .app {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 18px 28px 14px;
      background: #fffdfa;
      border-bottom: 1px solid var(--line);
    }
    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.15;
    }
    .subtitle { margin: 0; color: var(--muted); font-size: 15px; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #3c3c3c;
      font-size: 13px;
      white-space: nowrap;
    }
    .timeline {
      display: grid;
      grid-template-columns: repeat(12, minmax(70px, 1fr));
      gap: 6px;
      padding: 12px 28px;
      overflow-x: auto;
      background: #f0eee7;
      border-bottom: 1px solid var(--line);
    }
    .tick {
      min-width: 72px;
      border: 1px solid var(--line);
      background: #fffdfa;
      border-radius: 8px;
      padding: 7px 8px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .tick.done { border-color: #8bb7a6; color: var(--green); }
    .tick.active { background: var(--yellow); border-color: #caa43b; color: #292514; font-weight: 700; }
    main {
      display: grid;
      grid-template-columns: 260px minmax(420px, 1fr) 310px;
      min-height: 0;
      overflow: hidden;
    }
    aside, .evidence {
      min-height: 0;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: #fbfaf5;
      padding: 18px;
    }
    .evidence { border-right: 0; border-left: 1px solid var(--line); }
    .steps { display: grid; gap: 8px; }
    .step-button {
      width: 100%;
      text-align: left;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }
    .step-button.done { border-color: #9dc5b3; }
    .step-button.active { border-color: #1f1f1f; box-shadow: inset 4px 0 0 var(--yellow); }
    .step-index { color: var(--muted); font-size: 12px; }
    .stage {
      min-height: 0;
      overflow: auto;
      padding: 24px;
    }
    .document {
      max-width: 980px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 28px;
    }
    .document h2 { margin: 0 0 8px; font-size: 28px; }
    .document h3 { margin: 26px 0 10px; font-size: 19px; }
    .document p, .document li { line-height: 1.72; }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin: 18px 0;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }
    .card strong { display: block; margin-bottom: 6px; }
    .section {
      border-top: 1px solid var(--line);
      padding-top: 16px;
      margin-top: 18px;
    }
    pre {
      margin: 10px 0;
      padding: 14px;
      background: #1f2428;
      color: #f3f6f3;
      border-radius: 8px;
      overflow: auto;
      line-height: 1.55;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 14px;
    }
    .answer {
      background: #fff8da;
      border: 1px solid #e2c45f;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
    }
    .eval {
      border-left: 4px solid var(--blue);
      background: #f1f6fc;
      padding: 12px;
      border-radius: 0 8px 8px 0;
    }
    .score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      height: 32px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      margin-right: 8px;
    }
    .score.low { background: var(--red); }
    .qa {
      display: grid;
      gap: 12px;
    }
    .bubble {
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.68;
      white-space: pre-wrap;
    }
    .bubble.user { background: #eaf2ff; border: 1px solid #b8d1ef; }
    .bubble.ai { background: #f5f5f0; border: 1px solid var(--line); }
    .evidence h2 { margin: 0 0 12px; font-size: 18px; }
    .evidence dl { margin: 0; display: grid; gap: 12px; }
    .evidence dt { font-size: 12px; color: var(--muted); }
    .evidence dd { margin: 3px 0 0; line-height: 1.5; overflow-wrap: anywhere; }
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 28px;
      background: #fffdfa;
      border-top: 1px solid var(--line);
      z-index: 20;
      box-shadow: 0 -10px 28px rgba(31, 35, 31, .08);
    }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    .progress-text { color: var(--muted); }
    @media (max-width: 1050px) {
      main { grid-template-columns: 210px 1fr; }
      .evidence { display: none; }
    }
    @media (max-width: 760px) {
      .title-row { display: block; }
      .badges { justify-content: flex-start; margin-top: 12px; }
      main { grid-template-columns: 1fr; }
      aside { display: none; }
      .stage { padding: 14px; }
      .document { padding: 18px; }
      footer { align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-row">
        <div>
          <h1>PyCoach：AI 驱动的 Python 学习工作台</h1>
          <p class="subtitle">把学习过程从聊天记录变成可保存、可批改、可复习的本地学习文档。</p>
        </div>
        <div class="badges">
          <span class="badge">静态评审演示</span>
          <span class="badge">真实运行快照</span>
          <span class="badge">无需 API 配置</span>
        </div>
      </div>
    </header>
    <nav class="timeline" id="timeline" aria-label="演示时间线"></nav>
    <main>
      <aside>

        <dl id="evidence"></dl>
      </section>
    </main>
    <footer>
      <div class="progress-text" id="progressText"></div>
      <div class="controls">
        <button id="prevBtn">上一步</button>
        <button class="primary" id="nextBtn">下一步</button>
        <button id="autoBtn">自动播放</button>
        <button id="replayBtn">重播</button>
      </div>
    </footer>
  </div>

"isCore":true,"prompt":"请用自己的话解释：Python 程序为什么可以像“任务清单”一样让计算机做事？再说明 print() 在这张“任务清单”里负责什么。","studentAnswer":"Python代码一行行按顺序执行，就像逐条写明步骤的任务清单，计算机从上到下依次完成指令。\nprint()是清单里专门负责把结果、文字展示输出的任务。","evaluation":{"correct":true,"score":100,"reason":"回答说明了程序会按指令一步步、从上到下执行，也准确说明了 print() 负责显示文字或结果，没有把它说成负责所有计算。","suggestion":"继续保持，可以尝试举一个包含多行代码和 print() 的小例子来说明。","questionId":"hw_basic_1","provider":"真实模型批改节点","model":"真实模型批改节点"}},{"questionId":"hw_basic_2","conceptId":"string_vs_number","level":"基础题","isCore":true,"prompt":"阅读下面两行代码，分别会显示什么？为什么？\n\n```python\nprint(\"8-3\")\nprint(8-3)\n```","studentAnswer":"\"8-3\"5\n因为双引号代表引用,所以里面是字符串,没有就是正常的数字","evaluation":{"correct":false,"score":70,"reason":"第二行输出 5 正确，也知道引号内是字符串；但第一行实际显示的是 8-3，不会显示引号，对不带引号的 8-3 会先计算这一点解释不够明确。","suggestion":"注意 print 字符串时引号只是用来表示字符串本身，不会被输出；不带引号的 8-3 是表达式，会先算出 5 再显示。","questionId":"hw_basic_2","provider":"真实模型批改节点","model":"真实模型批改节点"}},{"questionId":"hw_basic_3","conceptId":"print_output","level":"基础题","isCore":false,"prompt":"阅读下面代码，按顺序写出屏幕上会显示的内容，并简单说明每一行的判断理由。\n\n```python\nprint(\"Python\")\nprint(6 + 4)\nprint(\"6 + 4\")\n```","studentAnswer":"1. Python\n理由：被双引号包裹，是字符串，原样打印文字。\n2. 10\n理由：无引号，6+4是算术运算，先计算结果再输出。\n3. 6 + 4\n理由：加了引号，属于纯文本，直接原样输出字符。","evaluation":{"correct":true,"score":100,"reason":"答案按顺序写出了 Python、10、6 + 4，并正确说明了字符串原样输出和算术表达式先计算的原因。","suggestion":"继续保持，注意区分带引号的文本和不带引号的表达式。","questionId":"hw_basic_3","provider":"真实模型批改节点","model":"真实模型批改节点"}},{"questionId":"hw_apply_1","conceptId":"print_arguments","level":"应用题","isCore":true,"prompt":"你想让屏幕显示“加法:”和 1+1 的计算结果。下面这行代码有问题：\n\n```python\nprint(\"加法:\"1+1)\n```\n\n请回答：\n1. 这行代码为什么不合适？\n2. 请写出一种更合适的写法。\n3. 你写的新代码大概会显示什么？","studentAnswer":"1. 字符串 `\"加法:\"` 和数字表达式 `1+1` 直接挨在一起，中间缺少分隔运算符，Python无法区分两段内容，触发语法错误。\n2. `print(\"加法:\", 1+1)`\n3. 屏幕输出：加法: 2","evaluation":{"correct":true,"score":100,"reason":"回答完整：说明了缺少分隔导致语法错误，给出了正确写法，并说明输出为“加法: 2”。","suggestion":"继续练习 print 中用逗号、f-string 等方式组合文字和计算结果。","questionId":"hw_apply_1","provider":"真实模型批改节点","model":"真实模型批改节点"}},{"questionId":"hw_review_1","conceptId":"print_role_misconception","level":"辨析题","isCore":false,"prompt":"有同学说：“print() 会把括号里的东西都变成最终答案，所以 print(\"3+2\") 也应该显示 5。”你同意吗？请说明理由。","studentAnswer":"不同意。\n理由：带双引号的`\"3+2\"`是字符串，引号代表纯文本，Python不会计算里面的算式，只会原样输出文字`3+2`；只有不加引号的`3+2`才会运算得到5。","evaluation":{"correct":true,"score":98,"reason":"回答明确不同意，并说明了带引号的是字符串，会原样输出；不加引号的表达式才会计算得到 5。","suggestion":"可以再补一句：print() 的作用主要是把结果显示出来，而不是把字符串内容当算式计算。","questionId":"hw_review_1","provider":"真实模型批改节点","model":"真实模型批改节点"}}],"grading":{"totalScore":94,"passed":true,"coreZero":false,"remediationRequired":false}}},"lesson002":{"lecture":{"title":"第 2 课：变量与数据类型","summary":"本课学习变量的作用，以及 Python 中最常见的基础数据类型：字符串、整数、浮点数和布尔值。你会理解变量像“贴标签的盒子”，可以保存数据；也会继续巩固上一课的重点：引号里的内容是字符串，通常不会被当作算式计算。","status":"answering","version":1,"sections":[{"sectionId":"goals","title":"本节目标","body":["理解变量是用来保存数据的名字，而不是神秘的数学符号。","能读懂并写出基本的变量赋值语句，例如 name = \"小明\"。","能区分常见基础数据类型：字符串 str、整数 int、浮点数 float、布尔值 bool。","能用 print() 输出变量保存的内容，并解释变量名和字符串的区别。"],"items":[],"code":"","explanation":[]},{"sectionId":"concepts","title":"核心概念","body":["这一课只抓住 3 个核心点：变量、赋值、数据类型。先理解它们的作用，不急着背复杂规则。"],"items":[{"title":"变量：给数据起名字","text":"生活类比：变量像一个贴了标签的盒子。盒子里可以放一个值，标签就是变量名。例如 name = \"小明\"，可以理解为：把文本“小明”放进一个叫 name 的盒子里。以后写 print(name)，Python 会去 name 这个盒子里取出“小明”并显示。"},{"title":"赋值：用 = 把右边的值交给左边的名字","text":"在 Python 里，= 不是“左右相等”的证明题，而是“把右边保存到左边名字里”的动作。例如 age = 18，意思是把 18 保存到变量 age 里。执行顺序是：先看右边是什么值，再把这个值交给左边的变量名。"},{"title":"数据类型：Python 需要知道数据是什么种类","text":"不同数据有不同种类。\"Python\" 是字符串 str，18 是整数 int，3.14 是浮点数 float，True 和 False 是布尔值 bool。类型会影响 Python 怎么理解它们：\"3+2\" 是文本，3+2 是算式；\"18\" 是字符串，18 是整数。"}],"code":"","explanation":["可视化理解：name = \"小明\" 可以想成一个标签为 name 的盒子，盒子里装着字符串“小明”。","可视化理解：age = 18 可以想成一个标签为 age 的盒子，盒子里装着数字 18。","和上一课的联系：print() 负责显示内容；变量负责保存内容。print(name) 会显示变量里的值，而 print(\"name\") 会显示文本 name。"]},{"sectionId":"code_examples","title":"代码案例","body":["先读代码，再预测输出。重点看：有没有引号？是变量名，还是字符串文本？"],"items":[{"title":"案例 1：变量保存字符串","text":"变量 name 保存了字符串“小明”。print(name) 会取出变量里的值；print(\"name\") 会原样输出文本 name。"},{"title":"案例 2：变量保存数字","text":"变量 age 保存整数 18。print(age + 1) 会先取出 age 的值，再计算 18 + 1。"},{"title":"案例 3：查看数据类型","text":"type() 可以告诉我们一个值属于什么类型。现在只需要会读结果，不需要深入研究 type() 的内部原理。"}],"code":"name = \"小明\"\nprint(name)\nprint(\"name\")\n\nage = 18\nprint(age)\nprint(age + 1)\n\nprice = 9.9\nis_student = True\n\nprint(type(name))\nprint(type(age))\nprint(type(price))\nprint(type(is_student))","explanation":["第 1 行：name = \"小明\"，把字符串“小明”保存到变量 name 里。","第 2 行：print(name)，name 没有引号，所以 Python 会把它当变量名，输出变量里保存的“小明”。","第 3 行：print(\"name\")，name 有引号，所以它是字符串文本，会输出 name 这四个字母本身。","第 5 行：age = 18，把整数 18 保存到变量 age 里。","第 7 行：print(age + 1)，先取出 age 的值 18，再计算 18 + 1，最后显示 19。","price = 9.9 中的 9.9 是浮点数 float，也就是带小数点的数字。","is_student = True 中的 True 是布尔值 bool，通常表示“是 / 真”。注意 True 首字母要大写。","type(name) 会显示 name 里保存的数据类型，结果类似 <class 'str'>。"]},{"sectionId":"mistakes","title":"常见误区","body":["下面这些错误很常见，尤其是刚学完 print() 和引号之后。遇到时不要慌，先判断 Python 看到的是“变量名”还是“字符串”。"],"items":[{"title":"误区 1：把变量名加上引号","text":"name = \"小明\" 之后，print(name) 输出小明；print(\"name\") 输出 name。因为加了引号后，Python 就不再把 name 当变量名，而是当普通文本。"},{"title":"误区 2：以为 = 是数学里的“相等”","text":"在 Python 赋值语句里，age = 18 的意思不是证明 age 和 18 永远相等，而是把 18 保存到 age 这个变量名里。后面也可以写 age = 19，让 age 保存新的值。"},{"title":"误区 3：混淆 \"18\" 和 18","text":"\"18\" 是字符串，18 是整数。它们看起来像，但类型不同。字符串更像文字，整数可以直接参与加减乘除。"},{"title":"误区 4：变量使用前没有先赋值","text":"如果直接写 print(score)，但前面从来没有写过 score = 某个值，Python 会不知道 score 是什么。要先赋值，再使用。"}],"code":"name = \"小明\"\nprint(name)      # 输出：小明\nprint(\"name\")    # 输出：name\n\nage = 18\nprint(age + 1)   # 输出：19\n\ntext_age = \"18\"\nprint(text_age)  # 输出：18，但它是字符串","explanation":["判断口诀：没有引号，Python 会尝试把它当变量名或表达式；有引号，通常就是字符串文本。","变量使用顺序很重要：先创建变量，再使用变量。","数字文本和真正的数字不同：\"18\" 看起来像数字，但它是字符串。"]},{"sectionId":"recall","title":"主动回忆","body":["合上讲义，用自己的话回答下面 3 个问题：","1. 变量为什么可以类比成“贴标签的盒子”？","2. name 和 \"name\" 在 print() 里有什么不同？","3. \"18\" 和 18 的区别是什么？","如果你能不用看答案讲清楚这 3 点，本课核心就基本掌握了。"],"items":[],"code":"","explanation":["主动回忆比反复看讲义更有效。不要只觉得“我懂了”，要能说出来、判断代码输出，并解释原因。"]}],"questions":[{"questionId":"q_variable_role","conceptId":"variables","level":"理解","isCore":true,"prompt":"请用自己的话解释：变量在 Python 中有什么作用？可以用“盒子和标签”的类比来说明。","studentAnswer":"","evaluation":null},{"questionId":"q_assignment_meaning","conceptId":"assignment","level":"理解","isCore":true,"prompt":"阅读代码 age = 18。请解释这行代码中 = 的作用。它和数学里的“等于”完全一样吗？为什么？","studentAnswer":"","evaluation":null},{"questionId":"q_variable_vs_string","conceptId":"variable_vs_string","level":"应用","isCore":true,"prompt":"阅读下面代码，按顺序写出屏幕会显示什么，并解释原因：\n\n```python\nname = \"小明\"\nprint(name)\nprint(\"name\")\n```","studentAnswer":"","evaluation":null},{"questionId":"q_basic_types","conceptId":"basic_data_types","level":"理解","isCore":true,"prompt":"请分别判断下面这些值更适合看作哪种基础数据类型，并说明理由：\"Python\"、20、3.5、True。","studentAnswer":"","evaluation":null},{"questionId":"q_string_number_difference","conceptId":"string_vs_number","level":"应用","isCore":false,"prompt":"有同学说：\"18\" 和 18 看起来一样，所以在 Python 里完全一样。你同意吗？请结合“类型”说明理由。","studentAnswer":"","evaluation":null},{"questionId":"q_predict_variable_update","conceptId":"assignment_update","level":"应用","isCore":false,"prompt":"阅读下面代码，屏幕最后会显示什么？请解释变量 score 前后发生了什么变化。\n\n```python\nscore = 80\nscore = 95\nprint(score)\n```","studentAnswer":"","evaluation":null}]},"record":{"title":"第 2 课：变量与数据类型 · 学习记录","status":"not_started","version":0},"homework":{"title":"第 2 课：变量与数据类型 · 作业","status":"locked","version":0}}};
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[char]));
    const textBlock = (value) => escapeHtml(value || "暂无").replace(/\n/g, "<br>");
    const mdLite = (value) => {
      const safe = escapeHtml(value || "暂无");
      return safe
        .replace(/```python\n([\s\S]*?)```/g, "<pre>$1</pre>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\n\n/g, "<br><br>")
        .replace(/\n/g, "<br>");
    };
    const list = (items) => `<ul>${(items || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    const scoreClass = (score) => Number(score) >= 80 ? "score" : "score low";
    const sectionHtml = (section) => `
      <div class="section">
        <h3>${escapeHtml(section.title)}</h3>
        ${section.body?.length ? list(section.body) : ""}
        ${section.items?.length ? `<div class="grid">${section.items.map((item) => `<div class="card"><strong>${escapeHtml(item.title)}</strong><p>${escapeHtml(item.text)}</p></div>`).join("")}</div>` : ""}
        ${section.code ? `<pre>${escapeHtml(section.code)}</pre>` : ""}
        ${section.explanation?.length ? list(section.explanation) : ""}
      </div>`;
    const questionAnswerHtml = (question, withEvaluation = false) => `
      <div class="section">
        <h3>${escapeHtml(question.prompt)}</h3>
        <div class="answer">${textBlock(question.studentAnswer || "尚未作答")}</div>
        ${withEvaluation && question.evaluation ? `
          <div class="eval">
            <p><span class="${scoreClass(question.evaluation.score)}">${escapeHtml(question.evaluation.score)}分</span>${question.evaluation.correct ? "判断：基本正确" : "判断：需要修正"}</p>
            <p><strong>原因：</strong>${escapeHtml(question.evaluation.reason)}</p>
            <p><strong>建议：</strong>${escapeHtml(question.evaluation.suggestion)}</p>
          </div>` : ""}
      </div>`;
    const evidence = (source, status, details) => ({
      "数据来源": source,
      "当前状态": status,
      "模型说明": "真实模型结果的静态回放，不再次请求模型",
      ...details
    });
    const avg = (items) => Math.round((items || []).reduce((sum, item) => sum + Number(item.score || 0), 0) / Math.max((items || []).length, 1));
    const l1 = SNAPSHOT.lesson001;
    const l2 = SNAPSHOT.lesson002;
    const steps = [
      {
        title: "项目定位",
        short: "定位",
        render: () => `
          <h2>一次真实学习闭环的快照回放</h2>
          <p class="muted">这个页面不是实时 AI，也不是固定课程播放器，而是 PyCoach 主系统真实运行后导出的评审快照。</p>
          <div class="grid">
            <div class="card"><strong>生成/组织课程页面</strong><p>课程以讲义文档呈现，结构固定，内容可由模型生成或预置。</p></div>
            <div class="card"><strong>文档中作答留痕</strong><p>用户答案保存进学习文档，而不是散落在聊天窗口。</p></div>
            <div class="card"><strong>真实模型语义批改</strong><p>批改看语义和评分要点，不按字数或字符串硬判。</p></div>
            <div class="card"><strong>记录驱动下一课</strong><p>学习记录、作业和错点会成为复习与下一课生成依据。</p></div>
          </div>
          <p>请点击「下一步」，按顺序查看第 1 课到第 2 课的真实数据链路。</p>`,
        evidence: evidence("导出的两节课 state.json 白名单字段", "静态回放起点", {"交互方式": "点击下一步查看全过程"})
      },
      {
        title: "第 1 课讲义",
        short: "讲义",
        render: () => `<h2>${escapeHtml(l1.lecture.title)}</h2><p class="muted">${escapeHtml(l1.lecture.summary)}</p>${l1.lecture.sections.map(sectionHtml).join("")}`,
        evidence: evidence(SNAPSHOT.sources.lesson001Lecture, `讲义状态：${l1.lecture.status}`, {"版本": `v${l1.lecture.version}`, "题目数": l1.lecture.questions.length})
      },
      {
        title: "随堂作答",
        short: "作答",
        render: () => `<h2>学生在讲义中完成随堂作答</h2><p class="muted">这些答案来自真实保存的讲义状态。</p>${l1.lecture.questions.map((q) => questionAnswerHtml(q, false)).join("")}`,
        evidence: evidence(SNAPSHOT.sources.lesson001Lecture, "已保存随堂答案", {"保存方式": "讲义 state.json", "答案数量": l1.lecture.questions.filter((q) => q.studentAnswer).length})
      },
      {
        title: "模型批改",
        short: "批改",
        render: () => `<h2>真实模型语义批改</h2><p class="muted">批改结果包含分数、原因和改进建议。</p>${l1.lecture.questions.map((q) => questionAnswerHtml(q, true)).join("")}`,
        evidence: evidence(SNAPSHOT.sources.lesson001Record, "讲义批改完成", {"平均分": `${avg(l1.record.evaluations)}分`, "分数序列": l1.record.evaluations.map((e) => e.score).join(" / ")})
      },
      {
        title: "学习记录生成",
        short: "记录",
        render: () => `<h2>${escapeHtml(l1.record.title)}</h2><p class="muted">${escapeHtml(l1.record.summary)}</p>${l1.record.evaluations.map((item) => `
          <div class="section">
            <h3>${escapeHtml(item.prompt)}</h3>
            <p><span class="${scoreClass(item.score)}">${escapeHtml(item.score)}分</span>${item.correct ? "基本正确" : "需要修正"}</p>
            <p><strong>原因：</strong>${escapeHtml(item.reason)}</p>
            <p><strong>建议：</strong>${escapeHtml(item.suggestion)}</p>
          </div>`).join("")}`,
        evidence: evidence(SNAPSHOT.sources.lesson001Record, `记录状态：${l1.record.status}`, {"记录版本": `v${l1.record.version}`, "用途": "沉淀批改结果与后续追问"})
      },
      {
        title: "追问答疑",
        short: "追问",
        render: () => `<h2>学习记录中的追问答疑</h2><p class="muted">追问不是漂浮聊天，而是追加到本课学习记录里。</p><div class="qa">${l1.record.qaBlocks.map((qa) => `
          <div class="bubble user"><strong>用户：</strong><br>${textBlock(qa.userQuestion)}</div>
          <div class="bubble ai"><strong>AI：</strong><br>${mdLite(qa.aiAnswer)}</div>
        `).join("") || "<p>暂无追问。</p>"}</div>`,
        evidence: evidence(SNAPSHOT.sources.lesson001Record, "追问已追加到记录", {"追问数量": l1.record.qaBlocks.length, "关联区块": l1.record.qaBlocks[0]?.relatedSectionId || "无"})
      },
      {
        title: "下课生成作业",
        short: "作业",
        render: () => `<h2>${escapeHtml(l1.homework.title)}</h2><p>${escapeHtml(l1.homework.goal)}</p><h3>作业要求</h3>${list(l1.homework.requirements)}<h3>题目概览</h3><div class="grid">${l1.homework.questions.map((q) => `<div class="card"><strong>${escapeHtml(q.level)}${q.isCore ? " · 核心" : ""}</strong><p>${escapeHtml(q.prompt).slice(0, 120)}${q.prompt.length > 120 ? "..." : ""}</p></div>`).join("")}</div>`,
        evidence: evidence(SNAPSHOT.sources.lesson001Homework, "作业已生成", {"作业状态": l1.homework.status, "题目数": l1.homework.questions.length})
      },
      {
        title: "作业作答",
        short: "作业答案",
        render: () => `<h2>学生完成作业</h2><p class="muted">作业答案继续保存在本地文档状态中。</p>${l1.homework.questions.map((q) => questionAnswerHtml(q, false)).join("")}`,
        evidence: evidence(SNAPSHOT.sources.lesson001Homework, "作业答案已保存", {"已答题数": l1.homework.questions.filter((q) => q.studentAnswer).length, "核心题数": l1.homework.questions.filter((q) => q.isCore).length})
      },
      {
        title: "作业批改通过",
        short: "作业批改",
        render: () => `<h2>作业批改通过</h2><p class="muted">通过规则：总分达标，并且核心题不能为 0 分。</p><div class="grid">
          <div class="card"><strong>总分</strong><p><span class="score">${escapeHtml(l1.homework.grading.totalScore)}分</span></p></div>
          <div class="card"><strong>是否通过</strong><p>${l1.homework.grading.passed ? "通过" : "未通过"}</p></div>
          <div class="card"><strong>核心题 0 分</strong><p>${l1.homework.grading.coreZero ? "存在" : "不存在"}</p></div>
          <div class="card"><strong>是否需要补救</strong><p>${l1.homework.grading.remediationRequired ? "需要" : "不需要"}</p></div>
        </div>${l1.homework.questions.map((q) => questionAnswerHtml(q, true)).join("")}`,
        evidence: evidence(SNAPSHOT.sources.lesson001Homework, "作业批改完成", {"总分": `${l1.homework.grading.totalScore}分`, "通过": l1.homework.grading.passed ? "是" : "否"})
      },
      {
        title: "触发生成下一课",
        short: "下一课",
        render: () => `<h2>通过第 1 课后，解锁下一课生成</h2><p>第 1 课作业通过后，系统可以根据课程主线和学习记录生成第 2 课。</p><div class="grid">
          <div class="card"><strong>前置条件</strong><p>第 1 课作业通过，核心题没有 0 分。</p></div>
          <div class="card"><strong>生成依据</strong><p>课程大纲、讲义记录、作业表现和追问内容。</p></div>
          <div class="card"><strong>下一课结果</strong><p>${escapeHtml(l2.lecture.title)}</p></div>
        </div>`,
        evidence: evidence(`${SNAPSHOT.sources.lesson001Homework} → ${SNAPSHOT.sources.lesson002Lecture}`, "下一课生成条件满足", {"第 1 课总分": `${l1.homework.grading.totalScore}分`, "第 2 课状态": l2.lecture.status})
      },
      {
        title: "第 2 课生成结果",
        short: "结果",
        render: () => `<h2>${escapeHtml(l2.lecture.title)}</h2><p class="muted">${escapeHtml(l2.lecture.summary)}</p><div class="grid">
          <div class="card"><strong>讲义状态</strong><p>${escapeHtml(l2.lecture.status)}</p></div>
          <div class="card"><strong>讲义版本</strong><p>v${escapeHtml(l2.lecture.version)}</p></div>
          <div class="card"><strong>讲义区块</strong><p>${l2.lecture.sections.length} 个</p></div>
          <div class="card"><strong>随堂题</strong><p>${l2.lecture.questions.length} 道</p></div>
        </div>`,
        evidence: evidence(SNAPSHOT.sources.lesson002Lecture, "第 2 课已生成", {"记录状态": l2.record.status, "作业状态": l2.homework.status})
      },
      {
        title: "第 2 课讲义预览",
        short: "预览",
        render: () => `<h2>${escapeHtml(l2.lecture.title)}</h2><p class="muted">${escapeHtml(l2.lecture.summary)}</p>${l2.lecture.sections.map(sectionHtml).join("")}<h3>第 2 课随堂题</h3>${l2.lecture.questions.map((q) => `<div class="section"><h3>${escapeHtml(q.prompt)}</h3><p class="muted">状态：等待学生作答</p></div>`).join("")}`,
        evidence: evidence(SNAPSHOT.sources.lesson002Lecture, "静态回放结束", {"说明": "真实系统中，用户会继续在第 2 课讲义中作答、保存、批改。"})
      }
    ];
    let current = 0;
    let timer = null;
    function render() {
      const step = steps[current];
      document.getElementById("document").innerHTML = step.render();
      document.getElementById("progressText").textContent = `第 ${current + 1} / ${steps.length} 步：${step.title}`;
      document.getElementById("prevBtn").disabled = current === 0;
      document.getElementById("nextBtn").textContent = current === steps.length - 1 ? "已到最后" : "下一步";
      document.getElementById("nextBtn").disabled = current === steps.length - 1;
      document.getElementById("timeline").innerHTML = steps.map((item, index) => `<button class="tick ${index < current ? "done" : ""} ${index === current ? "active" : ""}" data-step="${index}">${String(index + 1).padStart(2, "0")} ${escapeHtml(item.short)}</button>`).join("");
      document.getElementById("steps").innerHTML = steps.map((item, index) => `<button class="step-button ${index < current ? "done" : ""} ${index === current ? "active" : ""}" data-step="${index}"><span class="step-index">${String(index + 1).padStart(2, "0")}</span><br>${escapeHtml(item.title)}</button>`).join("");
      document.getElementById("evidence").innerHTML = Object.entries(step.evidence).map(([key, value]) => `<div><dt>${escapeHtml(key)}</dt><dd>${escapeHtml(value)}</dd></div>`).join("");
      document.querySelectorAll("[data-step]").forEach((button) => {
        button.addEventListener("click", () => {
          current = Number(button.dataset.step);
          stopAuto();
          render();
        });
      });
    }
    function stopAuto() {
      if (timer) clearInterval(timer);
      timer = null;
      document.getElementById("autoBtn").textContent = "自动播放";
    }
    document.getElementById("prevBtn").addEventListener("click", () => { current = Math.max(0, current - 1); stopAuto(); render(); });
    document.getElementById("nextBtn").addEventListener("click", () => { current = Math.min(steps.length - 1, current + 1); stopAuto(); render(); });
    document.getElementById("replayBtn").addEventListener("click", () => { current = 0; stopAuto(); render(); });
    document.getElementById("autoBtn").addEventListener("click", () => {
      if (timer) { stopAuto(); return; }
      document.getElementById("autoBtn").textContent = "暂停播放";
      timer = setInterval(() => {
        if (current >= steps.length - 1) { stopAuto(); return; }
        current += 1;
        render();
      }, 2600);
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" && current < steps.length - 1) { current += 1; stopAuto(); render(); }
      if (event.key === "ArrowLeft" && current > 0) { current -= 1; stopAuto(); render(); }
    });
    render();
  </script>
</body>
</html>
