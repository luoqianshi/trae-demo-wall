<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>食光知味</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="app-header">
    <div class="header-left">
      <h1 class="app-title">食光知味</h1>
      <span class="app-subtitle">AI 食物营养扫描</span>
    </div>
    <div class="header-right" id="userSwitcher">
      <button class="user-avatar-btn" id="currentUserBtn" onclick="toggleUserMenu()">
        <span class="avatar-text" id="currentUserAvatar">?</span>
      </button>
    </div>
  </header>

  <!-- 用户切换下拉菜单 -->
  <div class="user-menu" id="userMenu" style="display:none;">
    <div class="user-menu-header">
      <span>切换用户</span>
      <button class="add-user-btn" onclick="openUserModal()">+ 添加用户</button>
    </div>
    <div class="user-list" id="userList"></div>
  </div>

  <!-- 主内容区 -->
  <main class="app-main">

    <!-- ========== 用户信息卡片 ========== -->
    <section class="user-card" id="userCard">
      <div class="user-card-header">
        <div class="user-info-main">
          <div class="user-avatar-large" id="userAvatarLarge">?</div>
          <div class="user-info-text">
            <h2 class="user-name" id="userName">未选择用户</h2>
            <p class="user-meta" id="userMeta">请先添加用户信息</p>
          </div>
        </div>
        <button class="edit-btn" onclick="openUserModal(true)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>

      <div class="health-tags" id="healthTags">
        <p class="empty-hint">暂无健康信息</p>
      </div>

      <div class="user-actions">
        <button class="action-btn secondary" onclick="openUserModal()">添加新用户</button>
        <button class="action-btn secondary" onclick="openUserModal(true)">编辑信息</button>
      </div>
    </section>

    <!-- ========== 扫描区域 ========== -->
    <section class="scan-section">
      <div class="scan-card" id="scanCard">
        <div class="scan-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="8" y="8" width="48" height="48" rx="8" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4"/>
            <path d="M24 32h16M32 24v16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="20" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
          </svg>
        </div>
        <h3 class="scan-title">扫描食品包装</h3>
        <p class="scan-desc">拍照识别配料表和营养成分</p>

        <div class="scan-buttons">
          <button class="scan-btn primary" onclick="openCamera()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            拍照扫描
          </button>
          <button class="scan-btn secondary" onclick="triggerFileInput()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            从相册选择
          </button>
        </div>
      </div>

      <!-- 隐藏的文件输入 -->
      <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
      <!-- 相机输入：使用 capture="camera" 确保调用相机 -->
      <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none;" onchange="handleFileSelect(event)">
    </section>

    <!-- ========== 扫描历史 ========== -->
    <section class="history-section" id="historySection" style="display:none;">
      <div class="section-header">
        <h3>最近扫描</h3>
        <button class="clear-btn" onclick="clearHistory()">清空</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>

  </main>

  <!-- ========== 用户编辑弹窗 ========== -->
  <div class="modal-overlay" id="userModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">添加用户</h3>
        <button class="modal-close" onclick="closeUserModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>姓名 <span class="required">*</span></label>
          <input type="text" id="formName" placeholder="如：张奶奶" maxlength="10">
        </div>
        <div class="form-row">
          <div class="form-group half">
            <label>年龄 <span class="required">*</span></label>
            <input type="number" id="formAge" placeholder="65" min="1" max="120">
          </div>
          <div class="form-group half">
            <label>性别</label>
            <select id="formGender">
              <option value="">请选择</option>
              <option value="女">女</option>
              <option value="男">男</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>健康状况（可多选）</label>
          <div class="checkbox-grid" id="healthConditions">
            <label class="checkbox-item"><input type="checkbox" value="糖尿病"><span>糖尿病</span></label>
            <label class="checkbox-item"><input type="checkbox" value="高血压"><span>高血压</span></label>
            <label class="checkbox-item"><input type="checkbox" value="高血脂"><span>高血脂</span></label>
            <label class="checkbox-item"><input type="checkbox" value="骨质疏松"><span>骨质疏松</span></label>
            <label class="checkbox-item"><input type="checkbox" value="胃炎"><span>胃炎</span></label>
            <label class="checkbox-item"><input type="checkbox" value="胃溃疡"><span>胃溃疡</span></label>
            <label class="checkbox-item"><input type="checkbox" value="肠易激综合征"><span>肠易激综合征</span></label>
            <label class="checkbox-item"><input type="checkbox" value="便秘"><span>便秘</span></label>
            <label class="checkbox-item"><input type="checkbox" value="腹泻"><span>易腹泻</span></label>
            <label class="checkbox-item"><input type="checkbox" value="失眠"><span>失眠/难入睡</span></label>
            <label class="checkbox-item"><input type="checkbox" value="焦虑抑郁"><span>焦虑/抑郁</span></label>
            <label class="checkbox-item"><input type="checkbox" value="乳糖不耐受"><span>乳糖不耐受</span></label>
            <label class="checkbox-item"><input type="checkbox" value="痛风"><span>痛风</span></label>
            <label class="checkbox-item"><input type="checkbox" value="肾病"><span>肾病</span></label>
            <label class="checkbox-item"><input type="checkbox" value="肝病"><span>肝病</span></label>
            <label class="checkbox-item"><input type="checkbox" value="过敏"><span>食物过敏</span></label>
          </div>
        </div>

        <div class="form-group">
          <label>其他健康备注</label>
          <textarea id="formNotes" rows="2" placeholder="如：视力不佳、听力下降、正在服用降压药..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn secondary" onclick="closeUserModal()">取消</button>
        <button class="btn primary" onclick="saveUser()">保存</button>
      </div>
    </div>
  </div>

  <!-- ========== 分析结果弹窗 ========== -->
  <div class="modal-overlay" id="resultModal" style="display:none;">
    <div class="modal result-modal">
      <div class="modal-header">
        <h3>分析结果</h3>
        <button class="modal-close" onclick="closeResultModal()">&times;</button>
      </div>
      <div class="modal-body result-body" id="resultBody">
        <!-- 动态填充 -->
      </div>
      <div class="modal-footer">
        <button class="btn primary" onclick="closeResultModal()">知道了</button>
      </div>
    </div>
  </div>

  <!-- ========== 加载中 ========== -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="loading-spinner"></div>
    <p class="loading-text">AI 正在分析中...</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
