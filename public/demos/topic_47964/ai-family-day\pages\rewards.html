<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>激励中心 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/design-tokens.css?v=5" rel="stylesheet">
  <link href="../css/components.css?v=5" rel="stylesheet">
  <script src="../css/icons.js?v=5"></script>
  <style>
    .section-card { background: var(--surface-card); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .points-bar { height: 16px; border-radius: 9999px; background: linear-gradient(90deg, var(--color-amber-glow), var(--color-burnt-sienna)); transition: width 0.6s ease; position: relative; overflow: hidden; }
    .points-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%); animation: shimmer 2s infinite; }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .task-card { background: var(--surface-card); border-radius: var(--radius-lg); padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.3s; cursor: pointer; border: 2px solid transparent; }
    .task-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-color: var(--color-amber-glow); }
    .task-card.done { border-color: var(--color-mint-leaf); background: #f0faf2; }
    .task-card.done .task-check { display: flex; }
    .task-check { display: none; position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: var(--color-mint-leaf); color: #fff; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
    .shop-card { background: var(--surface-card); border-radius: var(--radius-lg); padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.3s; position: relative; overflow: hidden; }
    .shop-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .shop-card.insufficient { opacity: 0.5; filter: grayscale(0.5); }
    .badge-card { background: var(--surface-card); border-radius: var(--radius-lg); padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.3s; position: relative; border: 3px solid transparent; }
    .badge-card.unlocked { border-color: var(--color-amber-glow); box-shadow: 0 0 20px rgba(212,136,32,0.3), 0 2px 8px rgba(0,0,0,0.06); }
    .badge-card.unlocked::before { content: ''; position: absolute; inset: -3px; border-radius: var(--radius-lg); background: linear-gradient(135deg, #d48820, #c84400, #d48820); z-index: -1; animation: badgeGlow 2s ease-in-out infinite alternate; }
    @keyframes badgeGlow { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    .badge-emoji { font-size: 40px; margin-bottom: 8px; display: block; }
    .badge-card.unlocked .badge-emoji { filter: drop-shadow(0 0 8px rgba(212,136,32,0.6)); }
    .checkin-day { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; border: 2px solid #e5e0db; transition: all 0.3s; }
    .checkin-day.checked { background: linear-gradient(135deg, var(--color-amber-glow), var(--color-burnt-sienna)); color: #fff; border-color: var(--color-amber-glow); box-shadow: 0 2px 8px rgba(212,136,32,0.3); }
    .checkin-day.today { border-color: var(--color-burnt-sienna); font-weight: 700; }
    .log-item { padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; }
    .log-item.earn { background: #f0faf2; color: var(--color-mint-leaf); }
    .log-item.spend { background: #fff5f0; color: var(--color-rose-bud); }
    .popup-content { background: var(--surface-card); border-radius: 16px; padding: 40px; text-align: center; max-width: 360px; width: 90%; animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .gallery-item { border-radius: var(--radius-lg); overflow: hidden; background: var(--surface-card); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    @media (max-width: 768px) {
      .section-card { padding: 16px; }
      .task-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .shop-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .badge-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .checkin-grid { grid-template-columns: repeat(7, 1fr) !important; }
    }
    @media (max-width: 480px) {
      .task-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .shop-grid { grid-template-columns: 1fr !important; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body class="page-wrapper">
  <div id="nav-container"></div>
  <div id="main-content" class="page-container" style="max-width:1100px;padding-top:72px;padding-bottom:80px;">

    <!-- Page Hero -->
    <div class="page-hero">
      <h1><span style="background: linear-gradient(135deg, var(--color-amber-glow), var(--color-burnt-sienna)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><span data-icon="trophy"></span> 激励中心</span></h1>
      <p>赚取积分，解锁更多AI创作工具</p>
    </div>

    <!-- Section 1: Points Overview -->
    <div class="section-card card" id="points-overview">
      <div style="text-align: center;">
        <div style="font-size: 14px; color: var(--color-grey-brown); margin-bottom: 4px;">我的总积分</div>
        <div id="total-points" style="font-size: 56px; font-weight: 700; background: linear-gradient(135deg, var(--color-amber-glow), var(--color-burnt-sienna)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2;">0</div>
        <div style="display: flex; justify-content: center; gap: 32px; margin-top: 16px;">
          <div>
            <div style="font-size: 13px; color: var(--color-grey-brown);">本周获得</div>
            <div id="week-earned" style="font-size: 24px; font-weight: 700; color: var(--color-mint-leaf);">+0</div>
          </div>
          <div style="width: 1px; background: var(--color-cork-shadow); opacity: 0.4;"></div>
          <div>
            <div style="font-size: 13px; color: var(--color-grey-brown);">本周消耗</div>
            <div id="week-spent" style="font-size: 24px; font-weight: 700; color: var(--color-rose-bud);">-0</div>
          </div>
        </div>
        <div style="margin-top: 20px;">
          <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--color-grey-brown); margin-bottom: 6px;">
            <span>积分余额</span>
            <span id="bar-label">0 / 1000</span>
          </div>
          <div class="progress-bar" style="height:16px;">
            <div class="points-bar" id="points-bar" style="width: 0%;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Section 2: Earn Points - Task Wall -->
    <div class="section-card">
      <h3 class="section-title"><span data-icon="check" data-icon-size="20"></span> 今日任务</h3>
      <div class="task-grid" id="task-wall" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
      </div>
    </div>

    <!-- Section 3: Points Shop -->
    <div class="section-card">
      <h3 class="section-title"><span data-icon="trophy" data-icon-size="20"></span> 积分商店</h3>
      <p style="font-size: 14px; color: var(--color-grey-brown); margin-bottom: 16px;">用积分兑换AI创作能力</p>
      <div class="shop-grid" id="shop-list" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
      </div>
    </div>

    <!-- Section 4: Checkin Calendar -->
    <div class="section-card">
      <h3 class="section-title"><span data-icon="calendar" data-icon-size="20"></span> 签到日历</h3>
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
        <div>
          <span style="font-size: 14px; color: var(--color-grey-brown);">连续签到</span>
          <span id="streak-count" style="font-size: 24px; font-weight: 700; color: var(--color-amber-glow); margin-left: 4px;">0</span>
          <span style="font-size: 14px; color: var(--color-grey-brown);">天</span>
          <span id="streak-fire" style="margin-left: 4px;"><span data-icon="flame" data-icon-size="16"></span></span>
        </div>
        <button class="btn btn-primary" id="checkin-btn" onclick="doCheckin()">
          <span id="checkin-btn-text"><span data-icon="plus" data-icon-size="16"></span> 签到 +5</span>
        </button>
      </div>
      <div class="checkin-grid" id="checkin-calendar" style="display: grid; grid-template-columns: repeat(14, 1fr); gap: 8px; justify-items: center;">
      </div>
    </div>

    <!-- Section 5: Badge Wall -->
    <div class="section-card">
      <h3 class="section-title"><span data-icon="award" data-icon-size="20"></span> 勋章墙</h3>
      <div class="badge-grid" id="badge-wall" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
      </div>
    </div>

    <!-- Section 6: Points Detail -->
    <div class="section-card">
      <div class="section-title" style="cursor: pointer;" onclick="togglePointsLog()">
        <span data-icon="barChart" data-icon-size="20"></span> 积分明细
        <span id="log-toggle-icon" style="margin-left: auto; font-size: 14px; transition: transform 0.3s;"><span data-icon="chevronDown" data-icon-size="16"></span></span>
      </div>
      <div id="points-log-container" style="display: none; max-height: 500px; overflow-y: auto; margin-top: 12px;">
        <div id="points-log-list">
        </div>
        <div id="no-log" class="empty-state"><span data-icon="heart" data-icon-size="48"></span><p>暂无积分记录</p></div>
      </div>
    </div>

    <!-- Section 7: Gallery -->
    <div class="section-card">
      <h3 class="section-title"><span data-icon="image" data-icon-size="20"></span> 我的作品集</h3>
      <div id="gallery-container">
      </div>
    </div>

    <!-- Data Management -->
    <div style="text-align: center; padding: 24px 0 40px;">
      <button class="btn btn-ghost" onclick="handleReset()" style="color:var(--color-rose-bud);">
        <span data-icon="rotateCcw" data-icon-size="16"></span> 重置所有数据
      </button>
    </div>

  </div>

  <div id="bottom-tab-container"></div>
  <div id="footer-container"></div>

  <!-- Badge Popup -->
  <div class="overlay" id="badge-popup">
    <div class="popup-content">
      <div id="popup-emoji" style="font-size: 64px; margin-bottom: 12px;"></div>
      <div id="popup-title" style="font-size: 22px; font-weight: 700; margin-bottom: 8px;"></div>
      <div id="popup-desc" style="font-size: 14px; color: var(--color-grey-brown); margin-bottom: 24px;"></div>
      <button class="btn btn-primary" onclick="closeBadgePopup()">太棒了！</button>
    </div>
  </div>

  <script src="../js/app.js?v=11"></script>
  <script>
    // ---- V6 Auth Check ----
if (!App.isRegistered()) {
    document.body.innerHTML = App.renderAuthPage();
    window.onAuthSuccess = function() { location.reload(); };
} else {
  App.login();
  // Check onboarding for new users
  if (App.shouldShowOnboarding()) {
    window.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'onboarding-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,0.2);text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🎉</div>' +
        '<h2 style="font-family:var(--font-display);font-size:22px;color:var(--color-warm-cream);margin:0 0 8px;">欢迎加入AI家庭日！</h2>' +
        '<p style="color:var(--color-grey-brown);font-size:14px;margin:0 0 24px;">' + (App.getUser().nickname || '') + '，让我们开始你的家庭AI之旅吧！<br>只需3步即可开始：</p>' +
        '<div style="text-align:left;margin:0 0 24px;">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">1</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">创建你的家庭AI学习计划</div><div style="font-size:12px;color:var(--color-grey-brown);">AI为你定制专属12周学习路径</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-amber-glow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">2</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">选择你的AI伙伴</div><div style="font-size:12px;color:var(--color-grey-brown);">10个经典角色陪你学习</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-sky-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">3</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">开始探索和创作</div><div style="font-size:12px;color:var(--color-grey-brown);">聊天、漫画、3D、视频等你来玩</div></div></div>' +
        '</div>' +
        '<a href="family-plan.html" class="btn btn-primary" style="display:inline-block;padding:12px 32px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(200,68,0,0.3);">开始定制计划 →</a>' +
        '<button onclick="document.getElementById(\'onboarding-overlay\').remove();App.completeOnboarding();" style="display:block;margin:12px auto 0;background:none;border:none;color:var(--color-grey-brown);cursor:pointer;font-size:13px;">稍后再说</button>' +
        '</div>';
      document.body.appendChild(overlay);
    });
  }
    // ======== Init ========
    (function init() {
      Icons.init();
      document.getElementById('nav-container').innerHTML = App.renderNav('rewards');
      document.getElementById('bottom-tab-container').innerHTML = App.renderBottomTab('rewards');
      document.getElementById('footer-container').innerHTML = App.renderFooter();
      renderAll();
    })();

    function renderAll() {
      renderPointsOverview();
      renderTaskWall();
      renderShop();
      renderCheckinCalendar();
      renderBadgeWall();
      renderPointsLog();
      renderGallery();
    }

    // ======== Section 1: Points Overview ========
    function renderPointsOverview() {
      var state = App.getState();
      var total = App.getTotalPoints();
      document.getElementById('total-points').textContent = total;

      var now = Date.now();
      var weekAgo = now - 7 * 24 * 60 * 60 * 1000;
      var log = (state.pointsLog || []);
      var weekEarned = 0, weekSpent = 0;
      for (var i = 0; i < log.length; i++) {
        var entry = log[i];
        if (entry.time >= weekAgo) {
          if (entry.type === 'spend') {
            weekSpent += entry.amount;
          } else {
            weekEarned += entry.amount;
          }
        }
      }
      document.getElementById('week-earned').textContent = '+' + weekEarned;
      document.getElementById('week-spent').textContent = '-' + weekSpent;

      var pct = Math.min(100, Math.round(total / 1000 * 100));
      document.getElementById('points-bar').style.width = pct + '%';
      document.getElementById('bar-label').textContent = total + ' / 1000';
    }

    // ======== Section 2: Task Wall ========
    function renderTaskWall() {
      var state = App.getState();
      var today = new Date().toISOString().slice(0, 10);
      var checkedIn = (state.checkinDates || []).indexOf(today) !== -1;

      var tasks = [
        { id: 'checkin', icon: '✋', title: '每日签到', points: 5, link: null, action: 'checkin', done: checkedIn },
        { id: 'chat', icon: '💬', title: '和AI伙伴聊天', points: 10, link: 'ai-chat.html', action: null, done: state.chatCount > 0 },
        { id: 'daily', icon: '📋', title: '完成每日任务', points: 10, link: 'home.html', action: null, done: App.getDailyTasksStatus().some(function(t){return t.done;}) },
        { id: 'explore', icon: '🔍', title: '探索新知识', points: 5, link: 'explore.html', action: null, done: (state.exploreCount || 0) > 0 },
        { id: 'challenge', icon: '💪', title: '完成AI挑战', points: 50, link: 'explore.html#challenge', action: null, done: (state.challengeCount || 0) > 0 },
        { id: 'share', icon: '📤', title: '分享到社区', points: 15, link: 'community.html', action: null, done: (state.shareCount || 0) > 0 }
      ];

      var html = '';
      for (var i = 0; i < tasks.length; i++) {
        var t = tasks[i];
        html += '<div class="task-card card' + (t.done ? ' done' : '') + '" data-task="' + t.id + '" style="position:relative;">';
        html += '<div class="task-check">' + Icons.check(16) + '</div>';
        html += '<div style="font-size:36px;margin-bottom:8px;">' + t.icon + '</div>';
        html += '<div style="font-size:14px;font-weight:600;margin-bottom:4px;">' + t.title + '</div>';
        html += '<div style="font-size:20px;font-weight:700;color:var(--color-amber-glow);">+' + t.points + '</div>';
        if (t.action === 'checkin' && !t.done) {
          html += '<button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="doCheckin();renderAll();">去签到</button>';
        } else if (t.link) {
          html += '<a class="btn btn-primary btn-sm" style="margin-top:12px;" href="' + t.link + '">' + (t.done ? '再看看' : '去完成') + '</a>';
        } else if (t.done) {
          html += '<div style="margin-top:12px;color:var(--color-mint-leaf);font-size:13px;font-weight:600;">已完成 ' + Icons.check(14) + '</div>';
        }
        html += '</div>';
      }
      document.getElementById('task-wall').innerHTML = html;
    }

    // ======== Section 3: Shop ========
    function renderShop() {
      var total = App.getTotalPoints();
      var items = [
        { id: 'video', emoji: '🎬', title: 'AI视频生成', price: 30, link: 'video-creator.html' },
        { id: 'bg', emoji: '🖼️', title: 'AI背景替换', price: 20, link: 'photo-workshop.html' },
        { id: 'ppt', emoji: '📊', title: 'AI PPT生成', price: 20, link: 'doc-helper.html' },
        { id: 'excel', emoji: '📈', title: 'AI Excel模板', price: 10, link: 'doc-helper.html' },
        { id: 'filter', emoji: '✨', title: 'AI风格滤镜', price: 10, link: 'photo-workshop.html' },
        { id: 'comic', emoji: '🎨', title: '自定义漫画主题', price: 25, link: 'comic-workshop.html' }
      ];

      var html = '';
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var insufficient = total < item.price;
        html += '<div class="shop-card card' + (insufficient ? ' insufficient' : '') + '">';
        html += '<div style="font-size:40px;margin-bottom:8px;">' + item.emoji + '</div>';
        html += '<div style="font-size:14px;font-weight:600;margin-bottom:4px;">' + item.title + '</div>';
        html += '<div style="font-size:18px;font-weight:700;color:var(--color-amber-glow);margin-bottom:12px;">' + item.price + ' 积分</div>';
        if (insufficient) {
          html += '<div style="color:var(--color-rose-bud);font-size:12px;font-weight:600;padding:6px 12px;border:1px solid var(--color-rose-bud);border-radius:9999px;display:inline-block;">积分不足</div>';
        } else {
          html += '<a class="btn btn-primary btn-sm" href="' + item.link + '" onclick="return spendForShop(' + item.price + ',\'' + item.title + '\')">去使用</a>';
        }
        html += '</div>';
      }
      document.getElementById('shop-list').innerHTML = html;
    }

    function spendForShop(amount, title) {
      var ok = App.spendPoints(amount, title);
      if (ok) {
        renderAll();
        return true;
      } else {
        alert('积分不足！');
        return false;
      }
    }

    // ======== Section 4: Checkin Calendar ========
    function renderCheckinCalendar() {
      var state = App.getState();
      var dates = App.getCheckinCalendar();
      var checkinDates = state.checkinDates || [];
      var today = new Date().toISOString().slice(0, 10);

      document.getElementById('streak-count').textContent = state.streak || 0;

      var btn = document.getElementById('checkin-btn-text');
      if (checkinDates.indexOf(today) !== -1) {
        btn.innerHTML = Icons.check(16) + ' 今日已签到';
        document.getElementById('checkin-btn').style.opacity = '0.6';
        document.getElementById('checkin-btn').style.cursor = 'default';
      }

      var html = '';
      for (var i = 0; i < dates.length; i++) {
        var d = dates[i];
        var isChecked = checkinDates.indexOf(d) !== -1;
        var isToday = d === today;
        var dayNum = d.slice(8, 10);
        var cls = 'checkin-day';
        if (isChecked) cls += ' checked';
        if (isToday) cls += ' today';
        html += '<div class="' + cls + '" title="' + d + '">' + dayNum + '</div>';
      }
      document.getElementById('checkin-calendar').innerHTML = html;
    }

    function doCheckin() {
      var state = App.getState();
      var today = new Date().toISOString().slice(0, 10);
      if ((state.checkinDates || []).indexOf(today) !== -1) return;
      App.checkin();
      renderAll();
      App.showToast('签到成功！+5积分');
    }

    // ======== Section 5: Badge Wall ========
    function renderBadgeWall() {
      var state = App.getState();
      var badges = App.BADGES;
      var earned = (function() {
        try { return JSON.parse(localStorage.getItem('ai_family_badges')) || []; }
        catch(e) { return []; }
      })();

      var html = '';
      for (var i = 0; i < badges.length; i++) {
        var b = badges[i];
        var isUnlocked = earned.indexOf(b.id) !== -1;
        var progress = b.progress(state);
        var progressText = b.progressText(state);
        var isConditionMet = b.condition(state);

        if (isConditionMet && !isUnlocked) {
          earned.push(b.id);
          try { localStorage.setItem('ai_family_badges', JSON.stringify(earned)); } catch(e) {}
          showBadgePopup(b);
        }

        html += '<div class="badge-card card' + (isUnlocked ? ' unlocked' : '') + '">';
        html += '<span class="badge-emoji">' + b.emoji + '</span>';
        html += '<div style="font-size:13px;font-weight:600;margin-bottom:6px;' + (isUnlocked ? '' : 'color:var(--color-grey-brown);') + '">' + b.name + '</div>';
        html += '<div class="progress-bar" style="height:8px;">';
        html += '<div class="progress-bar-fill" style="width:' + progress + '%;' + (isUnlocked ? '' : 'background:var(--color-cork-shadow);') + '"></div>';
        html += '</div>';
        html += '<div style="font-size:11px;color:var(--color-grey-brown);margin-top:4px;">' + progressText + (isUnlocked ? ' ' + Icons.check(12) : '') + '</div>';
        html += '</div>';
      }
      document.getElementById('badge-wall').innerHTML = html;
    }

    function showBadgePopup(badge) {
      document.getElementById('popup-emoji').textContent = badge.emoji;
      document.getElementById('popup-title').textContent = '解锁勋章：' + badge.name;
      document.getElementById('popup-desc').textContent = '恭喜你获得了新勋章！继续努力吧！';
      document.getElementById('badge-popup').classList.add('show');
    }

    function closeBadgePopup() {
      document.getElementById('badge-popup').classList.remove('show');
    }

    // ======== Section 6: Points Log ========
    function togglePointsLog() {
      var container = document.getElementById('points-log-container');
      var icon = document.getElementById('log-toggle-icon');
      if (container.style.display === 'none') {
        container.style.display = 'block';
        icon.style.transform = 'rotate(180deg)';
      } else {
        container.style.display = 'none';
        icon.style.transform = 'rotate(0deg)';
      }
    }

    function renderPointsLog() {
      var log = App.getPointsLog().slice(-20).reverse();
      var listEl = document.getElementById('points-log-list');
      var noLogEl = document.getElementById('no-log');

      if (log.length === 0) {
        listEl.innerHTML = '';
        noLogEl.style.display = 'block';
        return;
      }
      noLogEl.style.display = 'none';

      var html = '';
      for (var i = 0; i < log.length; i++) {
        var entry = log[i];
        var isEarn = entry.type !== 'spend';
        var cls = isEarn ? 'earn' : 'spend';
        var sign = isEarn ? '+' : '-';
        var timeStr = formatTime(entry.time);
        html += '<div class="log-item ' + cls + '">';
        html += '<div><div style="font-weight:600;">' + (entry.reason || (isEarn ? '获得积分' : '消耗积分')) + '</div>';
        html += '<div style="font-size:12px;opacity:0.7;">' + timeStr + '</div></div>';
        html += '<div style="font-weight:700;font-size:16px;">' + sign + entry.amount + '</div>';
        html += '</div>';
      }
      listEl.innerHTML = html;
    }

    function formatTime(ts) {
      if (!ts) return '';
      var d = new Date(ts);
      var m = (d.getMonth() + 1);
      var day = d.getDate();
      var h = String(d.getHours()).padStart(2, '0');
      var min = String(d.getMinutes()).padStart(2, '0');
      return m + '/' + day + ' ' + h + ':' + min;
    }

    // ======== Section 7: Gallery ========
    function renderGallery() {
      var gallery = App.getGallery();
      var galleryContainer = document.getElementById('gallery-container') || document.querySelector('.gallery-grid');
      if (galleryContainer) {
        if (gallery.length === 0) {
          galleryContainer.innerHTML = '<div class="empty-state"><p>还没有作品，快去创作吧！</p><a href="create.html" class="btn btn-primary btn-sm">去创作</a></div>';
        } else {
          var typeIcons = { comic: '🎨', video: '🎬', model: '🧊', ppt: '📊', photo: '📷' };
          var typeNames = { comic: '漫画', video: '视频', model: '3D模型', ppt: 'PPT文档', photo: '照片' };
          var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">';
          gallery.forEach(function(item) {
            var icon = typeIcons[item.type] || '📁';
            var typeName = typeNames[item.type] || '作品';
            html += '<div class="card" style="padding:16px;">' +
              '<div style="font-size:32px;margin-bottom:8px;">' + icon + '</div>' +
              '<div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">' + (item.title || typeName) + '</div>' +
              '<div style="font-size:12px;color:var(--color-grey-brown);margin-top:4px;">' + (item.date || '') + '</div>' +
              '<div style="display:flex;gap:6px;margin-top:10px;">' +
              '<button onclick="App.shareToCommunity(\'' + (item.type || '').toUpperCase() + '\')" style="flex:1;padding:6px;border:1px solid var(--color-primary);border-radius:12px;background:#fff;color:var(--color-primary);font-size:11px;cursor:pointer;">📤 分享</button>' +
              '<button onclick="App.shareToWechat(\'' + (item.type || '').toUpperCase() + '\')" style="flex:1;padding:6px;border:1px solid #07c160;border-radius:12px;background:#fff;color:#07c160;font-size:11px;cursor:pointer;">💬 朋友圈</button>' +
              '</div></div>';
          });
          html += '</div>';
          galleryContainer.innerHTML = html;
        }
      }
    }

    // ======== Reset ========
    function handleReset() {
      if (!confirm('确定要重置所有数据吗？此操作不可撤销！')) return;
      if (!confirm('再次确认：所有积分、签到记录、勋章、作品都将被清除。')) return;
      App.resetAllData();
      App.showToast('数据已重置');
      setTimeout(function() { location.reload(); }, 1000);
    }
  } // end auth check else
</script>
</body>
</html>
