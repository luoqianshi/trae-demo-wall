<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI文档助手 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/design-tokens.css?v=5" rel="stylesheet">
  <link href="../css/components.css?v=5" rel="stylesheet">
  <script src="../css/icons.js?v=5"></script>
  <style>
    .option-card { background: var(--surface-card); border: 2px solid var(--color-cork-shadow); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: all 0.25s ease; text-align: center; }
    .option-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .option-card.selected { border-color: var(--color-burnt-sienna); background: #fff5ef; }
    .custom-input { width: 100%; padding: 12px 16px; border: 2px solid var(--color-cork-shadow); border-radius: var(--radius-lg); font-size: 14px; font-family: var(--font-cn); background: var(--surface-card); box-sizing: border-box; }
    .custom-input:focus { outline: none; border-color: var(--color-burnt-sienna); }
    .outline-item { background: var(--surface-card); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--color-amber-glow); }
    .slide-page { background: white; border-radius: var(--radius-lg); padding: 32px 24px; text-align: center; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
    .editable-cell { padding: 8px; border: 1px solid #eee; min-width: 60px; outline: none; }
    .editable-cell:focus { border-color: var(--color-burnt-sienna); background: #fffaf5; }
    /* Senior mode */
    .senior-mode { font-size: 20px !important; }
    .senior-mode .option-card, .senior-mode .btn-primary, .senior-mode .btn-secondary { padding: 20px 32px; font-size: 22px; }
    .senior-mode button, .senior-mode textarea { min-height: 52px; font-size: 20px; }
    .senior-mode textarea { min-height: 140px !important; }
    .senior-mode .senior-big-btn { min-height: 64px; font-size: 24px; font-weight: 700; display: block; width: 100%; padding: 20px; margin-bottom: 24px; }
    .senior-mode .senior-text-display { font-size: 26px; line-height: 1.8; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .points-badge { display: inline-flex; align-items: center; gap: 4px; background: #fef3e0; color: var(--color-amber-glow); padding: 4px 12px; border-radius: var(--radius-full); font-size: 13px; font-weight: 600; }
    @media (max-width: 768px) {
      .tab-btn { font-size: 13px; padding: 8px 14px; }
      .options-grid-3 { grid-template-columns: 1fr !important; }
      .options-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
      .slide-page { padding: 20px 16px; min-height: 220px; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body class="page-wrapper">
  <div id="nav-container"></div>
  <main>
    <div class="page-container" style="max-width:900px;">

      <!-- Header -->
      <div class="page-hero">
        <h1><span data-icon="fileText"></span> AI文档助手</h1>
        <p>AI驱动的文档生成，PPT、Excel一键搞定</p>
        <div style="margin-top:8px;" id="points-display"></div>
      </div>

      <!-- Main Tabs -->
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;">
        <button class="tab-btn tab-btn--active" onclick="switchMainTab('ppt')"><span data-icon="barChart" data-icon-size="16"></span> AI PPT助手</button>
        <button class="tab-btn" onclick="switchMainTab('excel')"><span data-icon="grid" data-icon-size="16"></span> AI Excel助手</button>
        <button class="tab-btn" onclick="switchMainTab('senior')"><span data-icon="heart" data-icon-size="16"></span> 长辈专区</button>
      </div>

      <!-- ===== Tab 1: AI PPT Helper ===== -->
      <div id="tab-ppt" class="tab-panel active">
        <!-- Template Selection -->
        <h2 style="font-size:18px;font-weight:600;margin:0 0 16px;">选择模板类型</h2>
        <div class="options-grid-3" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">
          <div class="option-card" data-ppt-type="school" onclick="selectPPTType('school')">
            <div style="font-size:36px;margin-bottom:8px;">🏫</div>
            <div style="font-weight:600;font-size:14px;">孩子的学校展示</div>
            <div style="font-size:12px;color:var(--color-grey-brown);margin-top:4px;">"我的AI学习之旅"</div>
          </div>
          <div class="option-card" data-ppt-type="family" onclick="selectPPTType('family')">
            <div style="font-size:36px;margin-bottom:8px;">👨‍👩‍👧</div>
            <div style="font-weight:600;font-size:14px;">家庭活动记录</div>
            <div style="font-size:12px;color:var(--color-grey-brown);margin-top:4px;">"我们的AI家庭日第N周"</div>
          </div>
          <div class="option-card" data-ppt-type="work" onclick="selectPPTType('work')">
            <div style="font-size:36px;margin-bottom:8px;">💼</div>
            <div style="font-weight:600;font-size:14px;">家长工作PPT</div>
            <div style="font-size:12px;color:var(--color-grey-brown);margin-top:4px;">会议汇报</div>
          </div>
        </div>

        <!-- Input Area -->
        <div style="background:var(--surface-card);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;">
          <div style="margin-bottom:16px;">
            <label style="font-size:14px;font-weight:600;display:block;margin-bottom:8px;">主题输入</label>
            <input class="custom-input" id="ppt-topic" placeholder="输入你的PPT主题...">
          </div>
          <div>
            <label style="font-size:14px;font-weight:600;display:block;margin-bottom:8px;">选择页数</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn-secondary ppt-page-btn active" data-pages="5" onclick="selectPPTPages(5)" style="border-color:var(--color-burnt-sienna);color:var(--color-burnt-sienna);">5页</button>
              <button class="btn-secondary ppt-page-btn" data-pages="8" onclick="selectPPTPages(8)">8页</button>
              <button class="btn-secondary ppt-page-btn" data-pages="10" onclick="selectPPTPages(10)">10页</button>
              <button class="btn-secondary ppt-page-btn" data-pages="15" onclick="selectPPTPages(15)">15页</button>
            </div>
          </div>
        </div>

        <!-- Generate Button -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
          <button class="btn-primary" onclick="generatePPTOutline()">生成大纲</button>
          <span class="points-badge">⭐ 消耗 20 积分</span>
        </div>

        <!-- Outline Preview -->
        <div id="ppt-outline" style="display:none;">
          <h2 style="font-size:18px;font-weight:600;margin:0 0 16px;">📑 大纲预览</h2>
          <div id="ppt-outline-content"></div>
          <div style="margin-top:16px;">
            <button class="btn-primary" onclick="previewSlides()">预览幻灯片</button>
          </div>
        </div>

        <!-- Slide Preview -->
        <div id="ppt-slides" style="display:none;margin-top:24px;">
          <h2 style="font-size:18px;font-weight:600;margin:0 0 16px;">🖥️ 幻灯片预览</h2>
          <div id="slide-container" style="background:#e8e0d4;border-radius:var(--radius-lg);padding:24px;">
            <div id="slide-view" class="slide-page"></div>
          </div>
          <div style="display:flex;justify-content:center;align-items:center;gap:16px;margin-top:16px;">
            <button class="btn btn-ghost btn-sm" onclick="prevSlide()"><span data-icon="chevronLeft" data-icon-size="16"></span> 上一页</button>
            <span id="slide-counter" style="font-size:14px;color:var(--color-grey-brown);"></span>
            <button class="btn btn-ghost btn-sm" onclick="nextSlide()">下一页 <span data-icon="chevronRight" data-icon-size="16"></span></button>
          </div>
          <!-- Share buttons -->
          <div id="ppt-share" style="display:flex;gap:8px;margin-top:16px;justify-content:center;">
            <button onclick="App.shareToCommunity('PPT')" style="padding:8px 16px;border:1px solid var(--color-primary);border-radius:20px;background:#fff;color:var(--color-primary);cursor:pointer;font-size:13px;font-weight:500;">📤 分享到社区</button>
            <button onclick="App.shareToWechat('PPT')" style="padding:8px 16px;border:1px solid #07c160;border-radius:20px;background:#fff;color:#07c160;cursor:pointer;font-size:13px;font-weight:500;">💬 分享到朋友圈</button>
          </div>
        </div>
      </div>

      <!-- ===== Tab 2: AI Excel Helper ===== -->
      <div id="tab-excel" class="tab-panel">
        <h2 style="font-size:18px;font-weight:600;margin:0 0 16px;">选择用途</h2>
        <div class="options-grid-4" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;">
          <div class="option-card" data-excel-type="income" onclick="selectExcelType('income')">
            <div style="font-size:36px;margin-bottom:8px;">💰</div>
            <div style="font-weight:600;font-size:14px;">家庭收支记录</div>
          </div>
          <div class="option-card" data-excel-type="study" onclick="selectExcelType('study')">
            <div style="font-size:36px;margin-bottom:8px;">📚</div>
            <div style="font-weight:600;font-size:14px;">孩子学习时间记录</div>
          </div>
          <div class="option-card" data-excel-type="ai-progress" onclick="selectExcelType('ai-progress')">
            <div style="font-size:36px;margin-bottom:8px;"><span data-icon="robot" data-icon-size="36" data-icon-fallback="settings"></span></div>
            <div style="font-weight:600;font-size:14px;">AI学习进度追踪表</div>
          </div>
          <div class="option-card" data-excel-type="family-plan" onclick="selectExcelType('family-plan')">
            <div style="font-size:36px;margin-bottom:8px;">📅</div>
            <div style="font-weight:600;font-size:14px;">家庭活动计划表</div>
          </div>
        </div>

        <!-- Generate Button -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
          <button class="btn-primary" onclick="generateExcelTable()">生成表格</button>
          <span class="points-badge">⭐ 消耗 10 积分</span>
        </div>

        <!-- Table Preview -->
        <div id="excel-preview" style="display:none;">
          <h2 class="section-title"><span data-icon="table" data-icon-size="20"></span> 表格预览 <span style="font-size:12px;color:var(--color-grey-brown);font-weight:400;">（点击单元格可编辑）</span></h2>
          <div style="overflow-x:auto;background:var(--surface-card);border-radius:var(--radius-lg);padding:16px;">
            <table id="excel-table" style="width:100%;border-collapse:collapse;font-size:14px;"></table>
          </div>
          <div style="margin-top:16px;display:flex;gap:12px;">
            <button class="btn-primary" onclick="exportCSV()">导出CSV</button>
            <button class="btn-secondary" onclick="generateExcelTable()">🔄 重新生成</button>
            <button onclick="App.shareToCommunity('PPT')" style="padding:8px 16px;border:1px solid var(--color-primary);border-radius:20px;background:#fff;color:var(--color-primary);cursor:pointer;font-size:13px;font-weight:500;">📤 分享到社区</button>
            <button onclick="App.shareToWechat('PPT')" style="padding:8px 16px;border:1px solid #07c160;border-radius:20px;background:#fff;color:#07c160;cursor:pointer;font-size:13px;font-weight:500;">💬 分享到朋友圈</button>
          </div>
        </div>
      </div>

      <!-- ===== Tab 3: Senior Mode ===== -->
      <div id="tab-senior" class="tab-panel senior-mode">
        <div style="text-align:center;margin-bottom:24px;">
          <div style="font-size:48px;margin-bottom:8px;"><span data-icon="heart" data-icon-size="48"></span></div>
          <h2 style="font-size:26px;font-weight:700;margin:0 0 8px;">长辈专区</h2>
          <p style="font-size:20px;color:var(--color-grey-brown);margin:0;">字体大，操作简单，免费使用</p>
        </div>

        <!-- Feature 1: AI Write Message -->
        <div class="option-card" style="margin-bottom:24px;text-align:left;cursor:default;">
          <div style="font-size:32px;margin-bottom:12px;"><span data-icon="edit" data-icon-size="32"></span></div>
          <h3 style="font-size:24px;font-weight:700;margin:0 0 12px;">AI帮你写消息</h3>
          <textarea id="senior-message-input" class="custom-input senior-mode" placeholder="输入你想说的话，AI帮你扩写成完整内容" style="min-height:120px;margin-bottom:16px;font-size:20px;"></textarea>
          <button class="btn-primary senior-big-btn" onclick="aiExpandMessage()">AI扩写</button>
          <div id="senior-message-output" style="display:none;background:#fffaf5;border-radius:var(--radius-lg);padding:20px;font-size:22px;line-height:1.8;margin-top:12px;"></div>
        </div>

        <!-- Feature 2: AI Photo Beautify -->
        <div class="option-card" style="margin-bottom:24px;text-align:center;">
          <div style="font-size:32px;margin-bottom:12px;"><span data-icon="camera" data-icon-size="32"></span></div>
          <h3 style="font-size:24px;font-weight:700;margin:0 0 12px;">AI照片美化</h3>
          <a href="photo-workshop.html" style="text-decoration:none;">
            <button class="btn-primary senior-big-btn" style="background:var(--color-amber-glow);">去照片工坊 →</button>
          </a>
        </div>

        <!-- Feature 3: AI Learn Something -->
        <div class="option-card" style="margin-bottom:24px;text-align:left;cursor:default;">
          <div style="font-size:32px;margin-bottom:12px;">📖</div>
          <h3 style="font-size:24px;font-weight:700;margin:0 0 12px;">AI学一学</h3>
          <div id="senior-news-content" class="senior-text-display" style="background:#fffaf5;border-radius:var(--radius-lg);padding:20px;"></div>
          <button class="btn-primary senior-big-btn" onclick="readAloud()" style="margin-top:12px;background:var(--color-sky-soft);">🔊 朗读</button>
          <button class="btn-secondary senior-big-btn" onclick="loadSeniorNews()" style="border-color:var(--color-sky-soft);color:var(--color-sky-soft);">换一条新闻</button>
        </div>
      </div>

    </div>
  </main>
  <div id="footer-container"></div>
  <div id="bottom-tab-container"></div>

  <script src="../js/app.js?v=11"></script>
  <script>
    // ---- V6 Auth Check ----
if (!App.isRegistered()) {
    document.body.innerHTML = App.renderAuthPage();
    window.onAuthSuccess = function() { location.reload(); };
} else {
  App.login();
  // Check onboarding for new users
  if (App.shouldShowOnboarding()) {
    window.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'onboarding-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,0.2);text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🎉</div>' +
        '<h2 style="font-family:var(--font-display);font-size:22px;color:var(--color-warm-cream);margin:0 0 8px;">欢迎加入AI家庭日！</h2>' +
        '<p style="color:var(--color-grey-brown);font-size:14px;margin:0 0 24px;">' + (App.getUser().nickname || '') + '，让我们开始你的家庭AI之旅吧！<br>只需3步即可开始：</p>' +
        '<div style="text-align:left;margin:0 0 24px;">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">1</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">创建你的家庭AI学习计划</div><div style="font-size:12px;color:var(--color-grey-brown);">AI为你定制专属12周学习路径</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-amber-glow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">2</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">选择你的AI伙伴</div><div style="font-size:12px;color:var(--color-grey-brown);">10个经典角色陪你学习</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-sky-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">3</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">开始探索和创作</div><div style="font-size:12px;color:var(--color-grey-brown);">聊天、漫画、3D、视频等你来玩</div></div></div>' +
        '</div>' +
        '<a href="family-plan.html" class="btn btn-primary" style="display:inline-block;padding:12px 32px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(200,68,0,0.3);">开始定制计划 →</a>' +
        '<button onclick="document.getElementById(\'onboarding-overlay\').remove();App.completeOnboarding();" style="display:block;margin:12px auto 0;background:none;border:none;color:var(--color-grey-brown);cursor:pointer;font-size:13px;">稍后再说</button>' +
        '</div>';
      document.body.appendChild(overlay);
    });
  }
    // ===================== Init =====================
    Icons.init();
    document.getElementById('nav-container').innerHTML = App.renderNav('create');
    document.getElementById('footer-container').innerHTML = App.renderFooter();
    document.getElementById('bottom-tab-container').innerHTML = App.renderBottomTab('create');
    updatePointsDisplay();

    function updatePointsDisplay() {
      var total = App.getTotalPoints();
      document.getElementById('points-display').innerHTML = '<span class="points-badge" style="font-size:15px;">当前积分: ' + total + ' ⭐</span>';
    }

    // ===================== Tab Switching =====================
    function switchMainTab(tab) {
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(function(t) { t.classList.remove('tab-btn--active'); });
      event.target.closest('.tab-btn').classList.add('tab-btn--active');
    }

    // ===================== PPT Helper =====================
    var selectedPPTType = null;
    var selectedPPTPages = 5;
    var currentSlideIndex = 0;
    var generatedOutline = [];

    function selectPPTType(type) {
      selectedPPTType = type;

    var slideColors = ['#c84400','#3d8aaa','#4a9a5a','#d48820','#c0505a','#8a7e72','#6c5ce7','#e17055','#00b894','#fdcb6e'];

    function previewSlides() {
      currentSlideIndex = 0;
      document.getElementById('ppt-slides').style.display = 'block';
      renderSlide();
    }

    function renderSlide() {
      if (!generatedOutline.length) return;
      var slide = generatedOutline[currentSlideIndex];
      var color = slideColors[currentSlideIndex % slideColors.length];
      var html = '<div style="margin-bottom:16px;font-size:12px;color:#999;">第 ' + (currentSlideIndex+1) + ' / ' + generatedOutline.length + ' 页</div>';
      html += '<h2 style="font-size:24px;font-weight:700;color:' + color + ';margin:0 0 24px;">' + slide.title + '</h2>';
      html += '<div style="text-align:left;max-width:500px;margin:0 auto;">';
      slide.points.forEach(function(pt) {
        html += '<div style="padding:10px 16px;margin-bottom:8px;background:#f8f5f0;border-radius:8px;font-size:15px;">• ' + pt + '</div>';
      });
      html += '</div>';
      document.getElementById('slide-view').innerHTML = html;
      document.getElementById('slide-counter').textContent = (currentSlideIndex+1) + ' / ' + generatedOutline.length;
    }

    function prevSlide() {
      if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); }
    }
    function nextSlide() {
      if (currentSlideIndex < generatedOutline.length - 1) { currentSlideIndex++; renderSlide(); }
    }

    function generateExcelTable() {
      if (!selectedExcelType) { App.showToast('请先选择用途'); return; }
      if (!App.spendPoints(10, 'AI Excel生成')) {
        App.showToast('积分不足！生成表格需要10积分');
        return;
      }
      updatePointsDisplay();

      var tmpl = excelTemplates[selectedExcelType];
      var table = document.getElementById('excel-table');
      var html = '<thead><tr>';
      tmpl.headers.forEach(function(h) {
        html += '<th style="background:var(--color-amber-glow);color:white;padding:10px 12px;text-align:left;font-weight:600;font-size:13px;white-space:nowrap;">' + h + '</th>';
      });
      html += '</tr></thead><tbody>';
      tmpl.rows.forEach(function(row) {
        html += '<tr>';
        row.forEach(function(cell, ci) {
          html += '<td class="editable-cell" contenteditable="true" data-col="' + ci + '">' + cell + '</td>';
        });
        html += '</tr>';
      });
      // Add empty rows for editing
      for (var i = 0; i < 2; i++) {
        html += '<tr>';
        tmpl.headers.forEach(function(h, ci) {
          html += '<td class="editable-cell" contenteditable="true" data-col="' + ci + '"></td>';
        });
        html += '</tr>';
      }
      html += '</tbody>';
      table.innerHTML = html;

      // Add row highlight on hover
      table.querySelectorAll('tr').forEach(function(tr) {
        tr.addEventListener('mouseenter', function() { tr.style.background = '#fffaf5'; });
        tr.addEventListener('mouseleave', function() { tr.style.background = ''; });
      });

      document.getElementById('excel-preview').style.display = 'block';
      App.showToast('表格生成成功！点击单元格可编辑');
    }

    function exportCSV() {
      var table = document.getElementById('excel-table');
      var csv = '';
      table.querySelectorAll('tr').forEach(function(tr) {
        var row = [];
        tr.querySelectorAll('td, th').forEach(function(cell) {
          var text = cell.textContent.replace(/"/g, '""');
          row.push('"' + text + '"');
        });
        csv += row.join(',') + '\n';
      });

      var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'AI家庭日_' + (excelTemplates[selectedExcelType] ? excelTemplates[selectedExcelType].title : '表格') + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      App.showToast('CSV文件已下载');
    }

    function readAloud() {
      var content = document.getElementById('senior-news-content').textContent;
      if (!content || !window.speechSynthesis) { App.showToast('朗读功能不可用'); return; }
      window.speechSynthesis.cancel();
      var utterance = new SpeechSynthesisUtterance(content);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.85;
      window.speechSynthesis.speak(utterance);
      App.showToast('正在朗读...');
    }
