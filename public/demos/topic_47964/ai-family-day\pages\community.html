<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭社区 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/design-tokens.css?v=5" rel="stylesheet">
  <link href="../css/components.css?v=5" rel="stylesheet">
  <script src="../css/icons.js?v=5"></script>
  <style>
    .section-card { background: var(--surface-card); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    /* Tab Content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Post Card */
    .post-card { background: var(--surface-card); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.3s; }
    .post-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .post-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; background: #f5f0eb; }
    .post-tag { display: inline-block; padding: 3px 10px; border-radius: 9999px; font-size: 12px; background: #f0ebe5; color: var(--color-grey-brown); margin-right: 6px; cursor: pointer; transition: all 0.2s; }
    .post-tag:hover, .post-tag.active { background: var(--color-amber-glow); color: #fff; }
    .post-actions { display: flex; gap: 20px; padding-top: 12px; border-top: 1px solid rgba(196,181,164,0.2); margin-top: 12px; }
    .post-action { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--color-grey-brown); cursor: pointer; transition: color 0.2s; padding: 4px 0; }
    .post-action:hover { color: var(--color-burnt-sienna); }
    .post-action.liked { color: var(--color-rose-bud); font-weight: 600; }

    /* Publish Area */
    .publish-area { background: var(--surface-card); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .publish-textarea { width: 100%; min-height: 80px; border: 2px solid #f0ebe5; border-radius: var(--radius-lg); padding: 12px 16px; font-size: 14px; font-family: var(--font-cn); resize: vertical; outline: none; transition: border-color 0.3s; background: var(--surface-canvas); color: var(--color-warm-cream); box-sizing: border-box; }
    .publish-textarea:focus { border-color: var(--color-amber-glow); }
    .publish-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; flex-wrap: wrap; gap: 8px; }

    /* Group Card */
    .group-card { background: var(--surface-card); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid var(--color-sky-soft); transition: all 0.3s; }
    .group-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .group-join-card { background: var(--surface-card); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }

    /* Ranking */
    .rank-item { display: flex; align-items: center; gap: 16px; padding: 14px 16px; border-radius: var(--radius-lg); margin-bottom: 8px; transition: all 0.3s; }
    .rank-item:hover { background: rgba(196,181,164,0.1); }
    .rank-num { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .rank-item:nth-child(1) .rank-num { background: linear-gradient(135deg, #ffd700, #ffb300); color: #fff; box-shadow: 0 2px 8px rgba(255,215,0,0.4); font-size: 18px; }
    .rank-item:nth-child(2) .rank-num { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #fff; box-shadow: 0 2px 8px rgba(192,192,192,0.4); }
    .rank-item:nth-child(3) .rank-num { background: linear-gradient(135deg, #cd7f32, #b8690e); color: #fff; box-shadow: 0 2px 8px rgba(205,127,50,0.4); }
    .rank-item:not(:nth-child(1)):not(:nth-child(2)):not(:nth-child(3)) .rank-num { background: #f0ebe5; color: var(--color-grey-brown); }
    .rank-item.me { background: rgba(200,68,0,0.06); border: 2px solid var(--color-amber-glow); }

    /* Share Card */
    .share-card-preview { width: 320px; background: linear-gradient(135deg, #fff5ee, #fff); border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    .share-card-header { padding: 20px 24px 16px; text-align: center; background: linear-gradient(135deg, var(--color-amber-glow), var(--color-burnt-sienna)); color: #fff; }
    .share-card-body { padding: 20px 24px; }
    .share-card-footer { padding: 16px 24px; text-align: center; border-top: 1px solid rgba(196,181,164,0.3); }

    .btn-danger { background: transparent; color: var(--color-rose-bud); border: 1px solid var(--color-rose-bud); padding: 6px 16px; border-radius: 9999px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-danger:hover { background: var(--color-rose-bud); color: #fff; }

    @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .dim-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
    .dim-tabs::-webkit-scrollbar { display: none; }
    .dim-tab { padding: 8px 16px; border-radius: 9999px; font-size: 13px; font-weight: 600; background: #f0ebe5; color: var(--color-grey-brown); cursor: pointer; white-space: nowrap; transition: all 0.3s; border: none; }
    .dim-tab.active { background: var(--color-amber-glow); color: #fff; }

    .scope-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .scope-tab { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; background: transparent; color: var(--color-grey-brown); cursor: pointer; transition: all 0.3s; border: 1px solid #e5e0db; }
    .scope-tab.active { background: var(--color-burnt-sienna); color: #fff; border-color: var(--color-burnt-sienna); }

    .my-empty { text-align: center; padding: 48px 24px; color: var(--color-grey-brown); }
    .my-empty-icon { font-size: 48px; margin-bottom: 12px; display: block; }

    @media (max-width: 768px) {
      .section-card { padding: 16px; }
      .post-card { padding: 16px; }
      .publish-area { padding: 16px; }
      .share-card-preview { width: 280px; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body class="page-wrapper">
  <div id="nav-container"></div>
  <div id="main-content" class="page-container" style="max-width:1100px;padding-top:72px;padding-bottom:80px;">

    <!-- Page Hero -->
    <div class="page-hero">
      <h1><span style="background: linear-gradient(135deg, var(--color-sky-soft), var(--color-burnt-sienna)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><span data-icon="users"></span> 家庭社区</span></h1>
      <p>分享AI学习成果，和身边的家庭一起成长</p>
    </div>

    <!-- Tab Header -->
    <div class="tab-group" id="tab-header">
      <button class="tab-btn tab-btn--active" onclick="switchTab('discover')">发现</button>
      <button class="tab-btn" onclick="switchTab('groups')">我的小组</button>
      <button class="tab-btn" onclick="switchTab('ranking')">排行榜</button>
      <button class="tab-btn" onclick="switchTab('mine')">我的</button>
    </div>

    <!-- Tab 1: Discover -->
    <div class="tab-content active" id="tab-discover">
      <div class="publish-area">
        <textarea class="publish-textarea" id="publish-textarea" placeholder="分享你的AI学习心得、创作成果..."></textarea>
        <div class="publish-actions">
          <div style="display:flex;align-items:center;gap:8px;">
            <select id="publish-target" style="padding:6px 12px;border-radius:8px;border:1px solid #e5e0db;font-size:13px;font-family:var(--font-cn);background:var(--surface-canvas);color:var(--color-warm-cream);outline:none;cursor:pointer;">
              <option value="all">发布到全站</option>
              <option value="group">发布到我的小组</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="publishPost()">发布</button>
        </div>
      </div>
      <div id="tag-filter" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;"></div>
      <div id="posts-list"></div>
    </div>

    <!-- Tab 2: My Groups -->
    <div class="tab-content" id="tab-groups">
      <div id="join-guide" style="display:none;">
        <div class="section-card card" style="text-align:center;">
          <div style="font-size:48px;margin-bottom:12px;"><span data-icon="users" data-icon-size="48"></span></div>
          <div style="font-size:18px;font-weight:700;margin-bottom:8px;">加入你的小组</div>
          <div style="color:var(--color-grey-brown);font-size:14px;margin-bottom:24px;">和身边的家庭一起学AI，互相鼓励，共同进步</div>
        </div>
        <div id="group-types" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;"></div>
        <div class="section-card">
          <h3 class="section-title"><span data-icon="star" data-icon-size="20"></span> 推荐小组</h3>
          <div id="example-groups"></div>
        </div>
      </div>
      <div id="joined-groups" style="display:none;"></div>
    </div>

    <!-- Tab 3: Ranking -->
    <div class="tab-content" id="tab-ranking">
      <div class="scope-tabs">
        <button class="scope-tab active" onclick="switchScope('all')">全站排行</button>
        <button class="scope-tab" onclick="switchScope('group')">小组排行</button>
      </div>
      <div class="dim-tabs">
        <button class="dim-tab active" onclick="switchDim('weekly_points')">本周积分</button>
        <button class="dim-tab" onclick="switchDim('monthly_points')">本月积分</button>
        <button class="dim-tab" onclick="switchDim('creations')">创作数量</button>
        <button class="dim-tab" onclick="switchDim('influence')">社区影响力</button>
      </div>
      <div class="section-card card">
        <div id="ranking-list"></div>
      </div>
    </div>

    <!-- Tab 4: Mine -->
    <div class="tab-content" id="tab-mine">
      <div class="section-card">
        <h3 class="section-title"><span data-icon="edit" data-icon-size="20"></span> 我的帖子</h3>
        <div id="my-posts"></div>
      </div>
      <div class="section-card">
        <h3 class="section-title"><span data-icon="palette" data-icon-size="20"></span> 我的作品</h3>
        <div id="my-works"></div>
      </div>
      <div class="section-card">
        <h3 class="section-title"><span data-icon="heart" data-icon-size="20"></span> 我的收藏</h3>
        <div id="my-favorites"></div>
      </div>
    </div>

  </div>

  <div id="bottom-tab-container"></div>
  <div id="footer-container"></div>

  <!-- Share Card Overlay -->
  <div class="overlay" id="share-overlay" onclick="closeShareCard(event)">
    <div class="share-card-preview" id="share-preview"></div>
    <div style="position:absolute;bottom:40px;text-align:center;color:rgba(255,255,255,0.9);font-size:14px;">
      长按保存图片分享到朋友圈
    </div>
  </div>

  <script src="../js/app.js?v=11"></script>
  <script>
    var currentTab = 'discover';
    var currentTag = '全部';
    var currentDim = 'weekly_points';
    var currentScope = 'all';
    var userPosts = [];
    var likedPosts = {};

    try { userPosts = JSON.parse(localStorage.getItem('ai_family_user_posts')) || []; } catch(e) { userPosts = []; }
    try { likedPosts = JSON.parse(localStorage.getItem('ai_family_liked_posts')) || {}; } catch(e) { likedPosts = {}; }

    // ---- V6 Auth Check ----
if (!App.isRegistered()) {
    document.body.innerHTML = App.renderAuthPage();
    window.onAuthSuccess = function() { location.reload(); };
} else {
  App.login();
  // Check onboarding for new users
  if (App.shouldShowOnboarding()) {
    window.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'onboarding-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,0.2);text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🎉</div>' +
        '<h2 style="font-family:var(--font-display);font-size:22px;color:var(--color-warm-cream);margin:0 0 8px;">欢迎加入AI家庭日！</h2>' +
        '<p style="color:var(--color-grey-brown);font-size:14px;margin:0 0 24px;">' + (App.getUser().nickname || '') + '，让我们开始你的家庭AI之旅吧！<br>只需3步即可开始：</p>' +
        '<div style="text-align:left;margin:0 0 24px;">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">1</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">创建你的家庭AI学习计划</div><div style="font-size:12px;color:var(--color-grey-brown);">AI为你定制专属12周学习路径</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-amber-glow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">2</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">选择你的AI伙伴</div><div style="font-size:12px;color:var(--color-grey-brown);">10个经典角色陪你学习</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-sky-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">3</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">开始探索和创作</div><div style="font-size:12px;color:var(--color-grey-brown);">聊天、漫画、3D、视频等你来玩</div></div></div>' +
        '</div>' +
        '<a href="family-plan.html" class="btn btn-primary" style="display:inline-block;padding:12px 32px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(200,68,0,0.3);">开始定制计划 →</a>' +
        '<button onclick="document.getElementById(\'onboarding-overlay\').remove();App.completeOnboarding();" style="display:block;margin:12px auto 0;background:none;border:none;color:var(--color-grey-brown);cursor:pointer;font-size:13px;">稍后再说</button>' +
        '</div>';
      document.body.appendChild(overlay);
    });
  }
    (function init() {
      Icons.init();
      document.getElementById('nav-container').innerHTML = App.renderNav('community');
      document.getElementById('bottom-tab-container').innerHTML = App.renderBottomTab('community');
      document.getElementById('footer-container').innerHTML = App.renderFooter();
      renderDiscover();
      renderGroups();
      renderRanking();
      renderMine();
    })();

    function switchTab(tab) {
      currentTab = tab;
      var btns = document.querySelectorAll('.tab-btn');
      var contents = document.querySelectorAll('.tab-content');
      var tabMap = { discover: 0, groups: 1, ranking: 2, mine: 3 };
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('tab-btn--active', i === tabMap[tab]);
      }
      for (var j = 0; j < contents.length; j++) {
        contents[j].classList.toggle('active', j === tabMap[tab]);
      }
      if (tab === 'groups') renderGroups();
      if (tab === 'ranking') renderRanking();
      if (tab === 'mine') renderMine();
    }

    function renderDiscover() {
      renderTagFilter();
      renderPostsList();
    }

    function renderTagFilter() {
      var allPosts = getAllPosts();
      var tagSet = {};
      for (var i = 0; i < allPosts.length; i++) {
        var tags = allPosts[i].tags || [];
        for (var j = 0; j < tags.length; j++) { tagSet[tags[j]] = true; }
      }
      var tags = ['全部'];
      var keys = Object.keys(tagSet);
      for (var k = 0; k < keys.length; k++) tags.push(keys[k]);
      var html = '';
      for (var t = 0; t < tags.length; t++) {
        html += '<span class="post-tag' + (currentTag === tags[t] ? ' active' : '') + '" onclick="filterByTag(\'' + tags[t] + '\')">' + tags[t] + '</span>';
      }
      document.getElementById('tag-filter').innerHTML = html;
    }

    function filterByTag(tag) { currentTag = tag; renderTagFilter(); renderPostsList(); }

    function getAllPosts() {
      var systemPosts = App.COMMUNITY_POSTS || [];
      // Merge user posts from localStorage (saved by shareToCommunity)
      var userCommunityPosts = [];
      try { userCommunityPosts = JSON.parse(localStorage.getItem('ai_family_community_posts')) || []; } catch(e) { userCommunityPosts = []; }
      var allPosts = userCommunityPosts.concat(userPosts, systemPosts);
      return allPosts;
    }

    function renderPostsList() {
      var allPosts = getAllPosts();
      var filtered = [];
      for (var i = 0; i < allPosts.length; i++) {
        var p = allPosts[i];
        if (currentTag === '全部' || (p.tags || []).indexOf(currentTag) !== -1) { filtered.push(p); }
      }
      var html = '';
      for (var j = 0; j < filtered.length; j++) {
        var post = filtered[j];
        var isLiked = likedPosts[post.id];
        html += '<div class="post-card card">';
        html += '<div style="display:flex;gap:12px;">';
        html += '<div class="post-avatar">' + (post.avatar || '') + '</div>';
        html += '<div style="flex:1;min-width:0;">';
        html += '<div style="display:flex;align-items:center;justify-content:space-between;">';
        html += '<span style="font-weight:600;font-size:14px;">' + (post.author || '我') + '</span>';
        html += '<span style="font-size:12px;color:var(--color-grey-brown);">' + (post.time || '刚刚') + '</span>';
        html += '</div>';
        html += '<p style="margin:8px 0 12px;font-size:14px;line-height:1.6;color:var(--color-warm-cream);">' + (post.content || '') + '</p>';
        if (post.tags && post.tags.length > 0) {
          html += '<div style="margin-bottom:8px;">';
          for (var t = 0; t < post.tags.length; t++) { html += '<span class="post-tag">' + post.tags[t] + '</span>'; }
          html += '</div>';
        }
        html += '<div class="post-actions">';
        html += '<div class="post-action btn btn-ghost btn-sm' + (isLiked ? ' liked' : '') + '" onclick="toggleLike(' + post.id + ')">' + Icons.heart(14) + ' <span>' + ((post.likes || 0) + (isLiked ? 1 : 0)) + '</span></div>';
        html += '<div class="post-action btn btn-ghost btn-sm" onclick="showComment(' + post.id + ')">' + Icons.messageCircle(14) + ' <span>' + (post.comments || 0) + '</span></div>';
        html += '<div class="post-action btn btn-ghost btn-sm" onclick="openShareCard(' + post.id + ')">' + Icons.share(14) + ' <span>分享</span></div>';
        html += '</div></div></div></div>';
      }
      if (filtered.length === 0) {
        html = '<div class="empty-state">' + Icons.users(48) + '<p>暂无相关帖子</p></div>';
      }
      document.getElementById('posts-list').innerHTML = html;
    }

    function toggleLike(postId) {
      if (likedPosts[postId]) { delete likedPosts[postId]; } else { likedPosts[postId] = true; }
      try { localStorage.setItem('ai_family_liked_posts', JSON.stringify(likedPosts)); } catch(e) {}
      renderPostsList();
    }

    function showComment(postId) {
      var comment = prompt('输入你的评论：');
      if (comment && comment.trim()) { App.showToast('评论已发送'); }
    }

    function publishPost() {
      var textarea = document.getElementById('publish-textarea');
      var text = (textarea.value || '').trim();
      if (!text) { App.showToast('请输入内容'); return; }
      var target = document.getElementById('publish-target').value;
      userPosts.unshift({ id: Date.now(), author: '我的家庭', avatar: '', content: text, likes: 0, comments: 0, time: '刚刚', tags: ['分享'], target: target });
      try { localStorage.setItem('ai_family_user_posts', JSON.stringify(userPosts)); } catch(e) {}
      textarea.value = '';
      App.addPoints('creative', 15, '分享到社区');
      renderPostsList();
      App.showToast('发布成功！+15积分');
    }

    function openShareCard(postId) {
      var allPosts = getAllPosts();
      var post = null;
      for (var i = 0; i < allPosts.length; i++) { if (allPosts[i].id === postId) { post = allPosts[i]; break; } }
      if (!post) return;
      var summary = (post.content || '').substring(0, 60) + (post.content.length > 60 ? '...' : '');
      var familyName = post.author || '我的家庭';
      var html = '';
      html += '<div class="share-card-header">';
      html += '<div style="font-size:20px;font-weight:700;">AI家庭日</div>';
      html += '<div style="font-size:12px;opacity:0.9;margin-top:4px;">让AI学习成为全家共享的创造之旅</div>';
      html += '</div>';
      html += '<div class="share-card-body">';
      html += '<p style="font-size:14px;line-height:1.7;color:var(--color-warm-cream);margin:0 0 16px;">"' + escapeHtml(summary) + '"</p>';
      html += '<div style="display:flex;align-items:center;gap:8px;">';
      html += '<div style="font-size:14px;font-weight:600;">' + escapeHtml(familyName) + '</div>';
      html += '<div style="font-size:12px;color:var(--color-grey-brown);">来AI家庭日一起学AI</div>';
      html += '</div></div>';
      html += '<div class="share-card-footer">';
      html += '<div style="font-size:11px;color:var(--color-grey-brown);">扫码加入AI家庭日</div>';
      html += '</div>';
      document.getElementById('share-preview').innerHTML = html;
      document.getElementById('share-overlay').classList.add('show');
    }

    function closeShareCard(e) {
      if (e.target === document.getElementById('share-overlay')) {
        document.getElementById('share-overlay').classList.remove('show');
      }
    }

    function escapeHtml(str) { var div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

    function renderGroups() {
      var groups = App.getUserGroups();
      if (groups.length === 0) {
        document.getElementById('join-guide').style.display = 'block';
        document.getElementById('joined-groups').style.display = 'none';
        renderGroupTypes(); renderExampleGroups();
      } else {
        document.getElementById('join-guide').style.display = 'none';
        document.getElementById('joined-groups').style.display = 'block';
        renderJoinedGroups(groups);
      }
    }

    function renderGroupTypes() {
      var types = App.GROUP_TYPES;
      var keys = Object.keys(types);
      var html = '';
      for (var i = 0; i < keys.length; i++) {
        var t = types[keys[i]];
        html += '<div class="group-join-card card">';
        html += '<div style="font-size:40px;margin-bottom:8px;">' + t.emoji + '</div>';
        html += '<div style="font-size:16px;font-weight:700;margin-bottom:4px;">' + t.label + '</div>';
        html += '<div style="font-size:13px;color:var(--color-grey-brown);margin-bottom:12px;">' + t.description + '</div>';
        html += '<input type="text" id="group-input-' + keys[i] + '" placeholder="输入小组名称" style="width:100%;padding:8px 12px;border:2px solid #e5e0db;border-radius:8px;font-size:13px;font-family:var(--font-cn);margin-bottom:8px;box-sizing:border-box;outline:none;background:var(--surface-canvas);color:var(--color-warm-cream);">';
        html += '<button class="btn btn-primary btn-sm" onclick="joinCustomGroup(\'' + keys[i] + '\')">加入</button>';
        html += '</div>';
      }
      document.getElementById('group-types').innerHTML = html;
    }

    function renderExampleGroups() {
      var groups = App.EXAMPLE_GROUPS || [];
      var types = App.GROUP_TYPES;
      var html = '';
      for (var i = 0; i < groups.length; i++) {
        var g = groups[i];
        var typeInfo = types[g.type] || {};
        html += '<div class="group-card card">';
        html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">';
        html += '<span style="font-size:32px;">' + (typeInfo.emoji || '') + '</span>';
        html += '<div>';
        html += '<div style="font-weight:600;font-size:15px;">' + g.name + '</div>';
        html += '<div style="font-size:12px;color:var(--color-grey-brown);">' + (typeInfo.label || '') + ' · ' + g.members + '人 · ' + g.posts + '帖</div>';
        html += '</div></div>';
        html += '<button class="btn btn-primary btn-sm" onclick="joinExampleGroup(\'' + g.id + '\')">加入小组</button>';
        html += '</div>';
      }
      document.getElementById('example-groups').innerHTML = html;
    }

    function joinCustomGroup(type) {
      var input = document.getElementById('group-input-' + type);
      var name = (input ? input.value : '').trim();
      if (!name) { App.showToast('请输入小组名称'); return; }
      App.joinGroup(type + '_' + Date.now());
      App.showToast('已加入「' + name + '」');
      App.addPoints('learning', 10, '加入小组');
      renderGroups();
    }

    function joinExampleGroup(id) {
      App.joinGroup(id);
      App.showToast('已加入小组！');
      App.addPoints('learning', 10, '加入小组');
      renderGroups();
    }

    function renderJoinedGroups(groups) {
      var types = App.GROUP_TYPES;
      var exampleGroups = App.EXAMPLE_GROUPS || [];
      var html = '';
      for (var i = 0; i < groups.length; i++) {
        var gid = groups[i];
        var gInfo = null;
        for (var j = 0; j < exampleGroups.length; j++) { if (exampleGroups[j].id === gid) { gInfo = exampleGroups[j]; break; } }
        var name = gInfo ? gInfo.name : gid;
        var type = gInfo ? gInfo.type : 'school';
        var typeInfo = types[type] || types.school;
        var members = gInfo ? gInfo.members : '--';
        var posts = gInfo ? gInfo.posts : '--';

        html += '<div class="section-card card">';
        html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">';
        html += '<div style="display:flex;align-items:center;gap:12px;">';
        html += '<span style="font-size:36px;">' + (typeInfo.emoji || '') + '</span>';
        html += '<div>';
        html += '<div style="font-size:18px;font-weight:700;">' + name + '</div>';
        html += '<div style="font-size:13px;color:var(--color-grey-brown);">' + typeInfo.label + ' · ' + members + '人 · ' + posts + '帖</div>';
        html += '</div></div>';
        html += '<button class="btn-danger" onclick="handleLeaveGroup(\'' + gid + '\')">退出小组</button>';
        html += '</div>';

        html += '<div style="margin-bottom:16px;">';
        html += '<div style="font-size:14px;font-weight:600;margin-bottom:8px;">小组动态</div>';
        var groupPosts = (App.COMMUNITY_POSTS || []).slice(0, 3);
        for (var p = 0; p < groupPosts.length; p++) {
          var post = groupPosts[p];
          html += '<div style="padding:10px 0;border-bottom:1px solid rgba(196,181,164,0.15);">';
          html += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">';
          html += '<span style="font-weight:600;font-size:13px;">' + post.author + '</span>';
          html += '<span style="font-size:11px;color:var(--color-grey-brown);">' + post.time + '</span>';
          html += '</div>';
          html += '<p style="font-size:13px;line-height:1.5;margin:0;color:var(--color-warm-cream);">' + post.content.substring(0, 80) + '...</p>';
          html += '</div>';
        }
        html += '</div>';

        html += '<div>';
        html += '<div style="font-size:14px;font-weight:600;margin-bottom:8px;">本周最活跃家庭 TOP5</div>';
        var mockRanking = ['小明家庭', '朵朵家', '星星探险队', '悠悠妈', 'AI小达人'];
        for (var r = 0; r < mockRanking.length; r++) {
          var rankColors = ['#ffd700', '#c0c0c0', '#cd7f32', 'var(--color-cork-shadow)', 'var(--color-cork-shadow)'];
          html += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;">';
          html += '<span style="width:24px;height:24px;border-radius:50%;background:' + rankColors[r] + ';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">' + (r + 1) + '</span>';
          html += '<span style="font-size:13px;">' + mockRanking[r] + '</span>';
          html += '</div>';
        }
        html += '</div></div>';
      }
      document.getElementById('joined-groups').innerHTML = html;
    }

    function handleLeaveGroup(gid) {
      if (!confirm('确定退出该小组吗？')) return;
      App.leaveGroup(gid);
      App.showToast('已退出小组');
      renderGroups();
    }

    function switchScope(scope) {
      currentScope = scope;
      var btns = document.querySelectorAll('.scope-tab');
      for (var i = 0; i < btns.length; i++) { btns[i].classList.toggle('active', i === (scope === 'all' ? 0 : 1)); }
      renderRanking();
    }

    function switchDim(dim) {
      currentDim = dim;
      var btns = document.querySelectorAll('.dim-tab');
      var dims = ['weekly_points', 'monthly_points', 'creations', 'influence'];
      for (var i = 0; i < btns.length; i++) { btns[i].classList.toggle('active', dims[i] === dim); }
      renderRanking();
    }

    function renderRanking() {
      var mockData = [
        { name: 'AI冠军队', avatar: '', value: 2680 },
        { name: '星星探险队', avatar: '', value: 2450 },
        { name: '智慧家庭', avatar: '', value: 2180 },
        { name: '朵朵家', avatar: '', value: 1960 },
        { name: '小明家庭', avatar: '', value: 1820 },
        { name: '悠悠妈', avatar: '', value: 1650 },
        { name: '乐乐家', avatar: '', value: 1520 },
        { name: 'AI小达人', avatar: '', value: 1380 },
        { name: '未来工程师', avatar: '', value: 1250 },
        { name: '创意家庭', avatar: '', value: 1100 }
      ];
      var dimLabels = { weekly_points: '本周积分', monthly_points: '本月积分', creations: '创作数量', influence: '影响力' };
      var html = '';
      for (var i = 0; i < mockData.length; i++) {
        var item = mockData[i];
        var isMe = item.name === '我的家庭';
        var val = item.value;
        if (currentDim === 'creations') val = Math.round(item.value / 50);
        if (currentDim === 'influence') val = Math.round(item.value / 30);
        html += '<div class="rank-item' + (isMe ? ' me' : '') + '">';
        html += '<div class="rank-num">' + (i + 1) + '</div>';
        html += '<div style="flex:1;"><div style="font-size:14px;font-weight:600;">' + item.name + (isMe ? ' (我)' : '') + '</div></div>';
        html += '<div style="font-size:16px;font-weight:700;color:var(--color-amber-glow);">' + val + ' <span style="font-size:12px;font-weight:400;color:var(--color-grey-brown);">' + dimLabels[currentDim] + '</span></div>';
        html += '</div>';
      }
      document.getElementById('ranking-list').innerHTML = html;
    }

    function renderMine() {
      var myPostsEl = document.getElementById('my-posts');
      if (userPosts.length > 0) {
        var postsHtml = '';
        for (var i = 0; i < userPosts.length; i++) {
          var p = userPosts[i];
          postsHtml += '<div class="post-card card"><p style="font-size:14px;line-height:1.6;margin:0 0 8px;">' + escapeHtml(p.content) + '</p>';
          postsHtml += '<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:12px;color:var(--color-grey-brown);">' + (p.time || '刚刚') + '</span>';
          if (p.tags) { for (var t = 0; t < p.tags.length; t++) { postsHtml += '<span class="post-tag">' + p.tags[t] + '</span>'; } }
          postsHtml += '</div></div>';
        }
        myPostsEl.innerHTML = postsHtml;
      } else {
        myPostsEl.innerHTML = '<div class="empty-state">' + Icons.edit(48) + '<p>还没有发过帖子</p><p>去"发现"tab发布第一条动态吧</p></div>';
      }

      var myWorksEl = document.getElementById('my-works');
      var gallery = App.getGallery();
      if (gallery.length > 0) {
        var worksHtml = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">';
        for (var w = 0; w < Math.min(gallery.length, 9); w++) {
          var item = gallery[w];
          var icon = item.type === 'comic' ? '' : item.type === 'model' ? '' : item.type === 'photo' ? '' : '';
          worksHtml += '<div class="card" style="padding:16px;text-align:center;">';
          worksHtml += '<div style="font-size:36px;margin-bottom:8px;">' + (icon || Icons.image(36)) + '</div>';
          worksHtml += '<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (item.title || '作品') + '</div>';
          worksHtml += '</div>';
        }
        worksHtml += '</div>';
        myWorksEl.innerHTML = worksHtml;
      } else {
        myWorksEl.innerHTML = '<div class="empty-state">' + Icons.palette(48) + '<p>还没有作品</p><p>快去创作中心创作你的第一个作品</p></div>';
      }

      var myFavsEl = document.getElementById('my-favorites');
      var favIds = Object.keys(likedPosts);
      if (favIds.length > 0) {
        var allPosts = App.COMMUNITY_POSTS || [];
        var favHtml = '';
        for (var f = 0; f < favIds.length; f++) {
          for (var a = 0; a < allPosts.length; a++) {
            if (allPosts[a].id == favIds[f]) {
              var fp = allPosts[a];
              favHtml += '<div class="post-card card">';
              favHtml += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">';
              favHtml += '<span style="font-weight:600;font-size:13px;">' + fp.author + '</span></div>';
              favHtml += '<p style="font-size:14px;line-height:1.5;margin:0;">' + fp.content.substring(0, 80) + '...</p>';
              favHtml += '</div>';
              break;
            }
          }
        }
        myFavsEl.innerHTML = favHtml || '<div class="empty-state">' + Icons.heart(48) + '<p>暂无收藏</p></div>';
      } else {
        myFavsEl.innerHTML = '<div class="empty-state">' + Icons.heart(48) + '<p>暂无收藏</p><p>点击帖子上的爱心来收藏</p></div>';
      }
    }
  } // end auth check else
</script>
</body>
</html>
