<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI漫画工坊 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/design-tokens.css?v=5">
  <link rel="stylesheet" href="../css/components.css?v=5">
  <script src="../css/icons.js?v=5"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <style>
    /* Theme Card - 独有 */
    .theme-card { transition: all 0.3s ease; cursor: pointer; }
    .theme-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .theme-card.selected { outline: 3px solid var(--color-burnt-sienna); outline-offset: 2px; }

    /* Comic Panel - 独有 */
    .comic-panel { border-radius: var(--radius-md); overflow: hidden; position: relative; min-height: 200px; }
    .comic-panel .panel-bg { position: absolute; inset: 0; }
    .comic-panel .panel-content { position: relative; z-index: 1; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
    .comic-panel .panel-emoji { font-size: 48px; text-align: center; padding: 12px 0; }
    .comic-panel .panel-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .comic-panel .panel-desc { font-size: 12px; opacity: 0.85; line-height: 1.5; }
    .refresh-btn { background: rgba(255,255,255,0.85); border: none; padding: 4px 12px; border-radius: var(--radius-full); font-size: 12px; cursor: pointer; font-family: var(--font-cn); transition: all 0.2s; }
    .refresh-btn:hover { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .color-bar { height: 6px; border-radius: var(--radius-full); transition: all 0.5s ease; }
    .custom-input { width: 100%; padding: 12px; border: 2px solid var(--color-cork-shadow); border-radius: var(--radius-md); font-size: 14px; font-family: var(--font-cn); background: var(--surface-card); resize: vertical; box-sizing: border-box; }
    .custom-input:focus { outline: none; border-color: var(--color-burnt-sienna); }
    @media (max-width: 768px) {
      .comic-grid { grid-template-columns: 1fr !important; }
      .theme-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <main class="page-wrapper">
    <div class="page-container" style="max-width:900px;">

      <!-- Page Hero -->
      <section class="page-hero">
        <h1>AI漫画工坊</h1>
        <p>选择主题，一键生成属于你的家庭AI故事漫画</p>
      </section>

      <!-- Theme Selection -->
      <div id="theme-section">
        <h2 class="section-title"><span data-icon="book"></span> 选择故事主题</h2>
        <div class="theme-grid" id="theme-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;"></div>
      </div>

      <!-- Custom Story Input -->
      <div id="custom-input-section" style="display:none;margin-top:20px;">
        <h2 class="section-title">自定义你的故事</h2>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <input class="custom-input" id="custom-panel-0" placeholder="第1格：故事开始..." maxlength="50">
          <input class="custom-input" id="custom-panel-1" placeholder="第2格：发生了什么..." maxlength="50">
          <input class="custom-input" id="custom-panel-2" placeholder="第3格：故事高潮..." maxlength="50">
          <input class="custom-input" id="custom-panel-3" placeholder="第4格：结局..." maxlength="50">
          <button onclick="applyCustomStory()" class="btn btn-primary" style="align-self:flex-start;">生成漫画</button>
        </div>
      </div>

      <!-- Color Preview Bar -->
      <div id="color-bar-section" style="margin-top:20px;display:none;">
        <div class="color-bar" id="color-bar"></div>
      </div>

      <!-- Comic Panels -->
      <div id="comic-section" style="margin-top:24px;display:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <h2 class="section-title" style="margin-bottom:0;">漫画预览</h2>
          <button onclick="refreshAllPanels()" class="btn btn-info btn-sm">
            <span data-icon="refreshCw" data-icon-size="14"></span> 全部刷新
          </button>
        </div>
        <div class="comic-grid" id="comic-panels" style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;"></div>
      </div>

      <!-- Action Buttons -->
      <div id="action-section" style="margin-top:24px;display:none;text-align:center;">
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button onclick="generateComic()" class="btn btn-primary" style="padding:14px 32px;font-size:16px;box-shadow:0 4px 16px rgba(200,68,0,0.3);">
            <span data-icon="sparkles" data-icon-size="18"></span> 生成漫画
          </button>
          <button onclick="saveToGallery()" class="btn btn-success" style="padding:14px 32px;font-size:16px;box-shadow:0 4px 16px rgba(74,154,90,0.3);">
            <span data-icon="save" data-icon-size="18"></span> 保存到作品集
          </button>
          <button onclick="App.shareToCommunity('COMIC')" class="btn btn-ghost" style="padding:14px 32px;font-size:16px;border:1px solid var(--color-cork-shadow);">
            <span data-icon="share" data-icon-size="18"></span> 分享到社区
          </button>
          <button onclick="App.shareToWechat('COMIC')" class="btn btn-ghost" style="padding:14px 32px;font-size:16px;border:1px solid #07c160;color:#07c160;">
            💬 分享到朋友圈
          </button>
        </div>
      </div>

    </div>
  </main>
  <div id="footer-container"></div>
  <div id="bottom-tab-container"></div>

  <script src="../js/app.js?v=11"></script>

        variants: [

            { title:'森林入口', desc:'一扇长满藤蔓的石门后，是AI魔法森林的入口。', bg:'linear-gradient(135deg,#1b5e20,#2e7d32)', emoji:'&#128682;' },
            { title:'精灵指引', desc:'一只发光的小精灵飞来，它说只有解开谜语才能继续前进。', bg:'linear-gradient(135deg,#4a148c,#7b1fa2)', emoji:'&#129718;' },
            { title:'魔法考验', desc:'AI施法帮助小明变出了一座彩虹桥，通往森林深处。', bg:'linear-gradient(135deg,#e65100,#f57c00)', emoji:'&#127752;' },
            { title:'森林之心', desc:'在森林中心找到了一棵会说话的古树，它保存着古老的智慧。', bg:'linear-gradient(135deg,#33691e,#558b2f)', emoji:'&#127795;' }
          ]},
          { panels: [
            { title:'蘑菇屋', desc:'巨大的蘑菇组成了一个小村庄，里面住着AI精灵家族。', bg:'linear-gradient(135deg,#e53935,#ef5350)', emoji:'&#127812;' },
            { title:'魔法药水', desc:'在AI炼金术士的实验室里，各种颜色的药水瓶闪闪发光。', bg:'linear-gradient(135deg,#6a1b9a,#8e24aa)', emoji:'&#129514;' },
            { title:'飞行扫帚', desc:'小明骑上了AI增强的飞行扫帚，在森林上空翱翔。', bg:'linear-gradient(135deg,#0277bd,#039be5)', emoji:'&#129517;' },
            { title:'友谊魔法', desc:'小明和新朋友们在星空下许愿，友谊的魔法让所有人都微笑了。', bg:'linear-gradient(135deg,#1a237e,#303f9f)', emoji:'&#11088;' }
          ]},
          { panels: [
            { title:'隐身斗篷', desc:'AI编织了一件隐身斗篷，穿上后可以悄悄观察森林里的秘密。', bg:'linear-gradient(135deg,#263238,#546e7a)', emoji:'&#128085;' },
            { title:'时间之花', desc:'一朵能让时间暂停的花，小明趁机观察到了花开的瞬间。', bg:'linear-gradient(135deg,#ad1457,#c2185b)', emoji:'&#127800;' },
            { title:'守护巨龙', desc:'一只温柔的巨龙守护着森林，它其实是一位AI变形术大师。', bg:'linear-gradient(135deg,#bf360c,#e64a19)', emoji:'&#128009;' },
            { title:'告别时刻', desc:'离开魔法森林时，古树送给小明一颗发光的种子作为纪念。', bg:'linear-gradient(135deg,#1b5e20,#66bb6a)', emoji:'&#127803;' }
          ]}
        ]
      },
      'future': {
        name: '未来城市', emoji: '&#127961;', color: '#c0505a',
        variants: [
          { panels: [
            { title:'城市天际线', desc:'2080年的城市，AI管理的飞行汽车在透明的空中公路上穿行。', bg:'linear-gradient(135deg,#1a237e,#283593)', emoji:'&#127747;' },
            { title:'智能学校', desc:'每个学生都有一个AI学习伙伴，课程根据个人兴趣自动定制。', bg:'linear-gradient(135deg,#00695c,#00897b)', emoji:'&#127979;' },
            { title:'机器人公园', desc:'公园里，机器人和人类一起散步、下棋、做运动。', bg:'linear-gradient(135deg,#2e7d32,#43a047)', emoji:'&#129302;' },
            { title:'全息影院', desc:'全息投影电影让观众仿佛身临其境，可以走进电影场景中。', bg:'linear-gradient(135deg,#4a148c,#7b1fa2)', emoji:'&#127916;' }
          ]},
          { panels: [
            { title:'AI超市', desc:'智能货架自动补货，AI营养师帮你搭配最健康的购物清单。', bg:'linear-gradient(135deg,#f57f17,#fbc02d)', emoji:'&#128722;' },
            { title:'空中花园', desc:'摩天大楼之间有空中花园，AI调控温度和湿度让四季如春。', bg:'linear-gradient(135deg,#1b5e20,#4caf50)', emoji:'&#127803;' },
            { title:'医疗奇迹', desc:'AI医生3秒就能诊断疾病，纳米机器人在体内精准治疗。', bg:'linear-gradient(135deg,#c62828,#e53935)', emoji:'&#127973;' },
            { title:'和谐家园', desc:'人与AI和谐共处，共同建设更美好的未来。', bg:'linear-gradient(135deg,#01579b,#29b6f6)', emoji:'&#127968;' }
          ]},
          { panels: [
            { title:'时间胶囊', desc:'小明在AI的带领下打开了一个100年前的时间胶囊。', bg:'linear-gradient(135deg,#4e342e,#6d4c41)', emoji:'&#128230;' },
            { title:'太空电梯', desc:'乘坐太空电梯到达轨道站，全程只需要30分钟。', bg:'linear-gradient(135deg,#0d47a1,#42a5f5)', emoji:'&#127970;' },
            { title:'意念控制', desc:'脑机接口让小明可以只用想法就控制家中的所有设备。', bg:'linear-gradient(135deg,#6a1b9a,#ab47bc)', emoji:'&#129504;' },
            { title:'星空承诺', desc:'在观景台上，小明许下心愿：未来要成为连接人类和AI的桥梁。', bg:'linear-gradient(135deg,#000051,#1a237e)', emoji:'&#127775;' }
          ]}
        ]
      },
      'custom': {
        name: '自定义故事', emoji: '&#9999;&#65039;', color: '#d48820', variants: []
      }
    };

    var currentTheme = null;
    var currentVariant = null;
    var currentPanels = [];

    /* ===== RENDER THEME GRID ===== */
    function renderThemes() {
      var grid = document.getElementById('theme-grid');
      var html = '';
      Object.keys(THEMES).forEach(function(key) {
        var t = THEMES[key];
        html += '<div class="card theme-card" onclick="selectTheme(\'' + key + '\')" id="theme-' + key + '">' +
          '<div style="font-size:36px;margin-bottom:8px;">' + t.emoji + '</div>' +
          '<div style="font-size:14px;font-weight:600;margin-bottom:4px;">' + t.name + '</div>' +
          '<div style="font-size:11px;color:var(--color-grey-brown);">' + (key === 'custom' ? '输入你自己的故事' : '3个故事变体') + '</div>' +
          '<div style="width:100%;height:4px;background:' + t.color + ';border-radius:var(--radius-full);margin-top:10px;"></div>' +
        '</div>';
      });
      grid.innerHTML = html;
    }

    function selectTheme(themeKey) {
      currentTheme = themeKey;
      document.querySelectorAll('.theme-card').forEach(function(el) { el.classList.remove('selected'); });
      document.getElementById('theme-' + themeKey).classList.add('selected');

      var barSection = document.getElementById('color-bar-section');
      var colorBar = document.getElementById('color-bar');
      barSection.style.display = 'block';
      colorBar.style.background = THEMES[themeKey].color;

      if (themeKey === 'custom') {
        document.getElementById('custom-input-section').style.display = 'block';
        document.getElementById('comic-section').style.display = 'none';
        document.getElementById('action-section').style.display = 'none';
        return;
      }

      document.getElementById('custom-input-section').style.display = 'none';
      var theme = THEMES[themeKey];
      currentVariant = Math.floor(Math.random() * theme.variants.length);
      currentPanels = theme.variants[currentVariant].panels.map(function(p) { return Object.assign({}, p); });
      renderPanels();
    }

    function applyCustomStory() {
      var inputs = [
        document.getElementById('custom-panel-0').value.trim(),
        document.getElementById('custom-panel-1').value.trim(),
        document.getElementById('custom-panel-2').value.trim(),
        document.getElementById('custom-panel-3').value.trim()
      ];
      if (inputs.some(function(v) { return !v; })) {
        App.showToast('请填写所有4个场景描述');
        return;
      }
      var customEmojis = ['&#10024;','&#127775;','&#128171;','&#11088;'];
      var customBgs = [
        'linear-gradient(135deg,#fff3e0,#ffe0b2)',
        'linear-gradient(135deg,#e8f5e9,#c8e6c9)',
        'linear-gradient(135deg,#e3f2fd,#90caf9)',
        'linear-gradient(135deg,#fce4ec,#f8bbd0)'
      ];
      currentPanels = inputs.map(function(desc, i) {
        return {
          title: '第' + (i+1) + '格',
          desc: desc,
          bg: customBgs[i],
          emoji: customEmojis[i]
        };
      });
      renderPanels();
    }

    function renderPanels() {
      var section = document.getElementById('comic-section');
      var container = document.getElementById('comic-panels');
      var actions = document.getElementById('action-section');
      section.style.display = 'block';
      actions.style.display = 'block';

      var html = '';
      currentPanels.forEach(function(panel, i) {
        html += '<div class="card comic-panel" id="panel-' + i + '">' +
          '<div class="panel-bg" style="background:' + panel.bg + ';"></div>' +
          '<div class="panel-content">' +
            '<div>' +
              '<div class="panel-title">' + panel.title + '</div>' +
              '<div class="panel-desc">' + panel.desc + '</div>' +
            '</div>' +
            '<div class="panel-emoji">' + panel.emoji + '</div>' +
            '<div style="text-align:right;"><button class="refresh-btn" onclick="refreshPanel(' + i + ')">换一个</button></div>' +
          '</div>' +
        '</div>';
      });
      container.innerHTML = html;
    }

    function refreshPanel(index) {
      if (!currentTheme || currentTheme === 'custom') return;
      var theme = THEMES[currentTheme];
      var newVariant = currentVariant;
      while (newVariant === currentVariant && theme.variants.length > 1) {
        newVariant = Math.floor(Math.random() * theme.variants.length);
      }
      currentVariant = newVariant;
      currentPanels[index] = Object.assign({}, theme.variants[newVariant].panels[index]);
      renderPanels();
    }

    function refreshAllPanels() {
      if (!currentTheme || currentTheme === 'custom') return;
      var theme = THEMES[currentTheme];
      currentVariant = Math.floor(Math.random() * theme.variants.length);
      currentPanels = theme.variants[currentVariant].panels.map(function(p) { return Object.assign({}, p); });
      renderPanels();
    }

    function generateComic() {
      if (!currentTheme || currentPanels.length === 0) {
        App.showToast('请先选择一个主题');
        return;
      }
      if (!App.spendPoints(20)) { App.showToast('积分不足！需要20积分，去完成任务赚积分吧', 'error'); return; }
      App.addPoints('creative', 30, '创作漫画');
      App.createConfetti();
      App.showToast('漫画生成成功! +30创作积分');

      // Enhanced comic result display
      var container = document.getElementById('comic-panels');
      var theme = THEMES[currentTheme];
      var selectedTheme = theme ? theme.name : '自定义';
      var themeColor = theme ? theme.color : '#d48820';

      // Add dialogue bubbles to each panel
      var bubbles = ['太棒了！', '哇！', '好厉害！', '真开心！'];
      var panels = container.querySelectorAll('.comic-panel');
      panels.forEach(function(panel, i) {
        var bubble = document.createElement('div');
        bubble.style.cssText = 'position:absolute;top:12px;right:12px;background:white;border-radius:16px;padding:6px 14px;font-size:12px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.12);z-index:5;opacity:0;transform:scale(0.5);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);color:' + themeColor + ';';
        bubble.textContent = bubbles[i % bubbles.length];
        panel.appendChild(bubble);
        setTimeout(function() {
          bubble.style.opacity = '1';
          bubble.style.transform = 'scale(1)';
        }, 200 + i * 150);
      });

      // Remove existing save button if any
      var existingSaveBtn = document.getElementById('comic-save-btn');
      if (existingSaveBtn) existingSaveBtn.remove();

      // Add save button after comic panels
      var saveBtn = document.createElement('button');
      saveBtn.id = 'comic-save-btn';
      saveBtn.textContent = '\uD83D\uDCBE 保存到作品集';
      saveBtn.style.cssText = 'margin-top:16px;padding:10px 24px;border:2px solid var(--color-primary);border-radius:20px;background:#fff;color:var(--color-primary);font-size:14px;font-weight:600;cursor:pointer;display:block;margin-left:auto;margin-right:auto;';
      saveBtn.onclick = function() {
        App.addToGallery({type:'comic', title: selectedTheme + '主题漫画', date: new Date().toLocaleDateString()});
        App.addPoints('creative', 10, '保存漫画到作品集');
        var st = App.getState();
        st.comicCount = (st.comicCount || 0) + 1;
        App.checkBadgeUnlocks();
        saveBtn.textContent = '\u2705 已保存';
        saveBtn.disabled = true;
        saveBtn.style.borderColor = '#4a9a5a';
        saveBtn.style.color = '#4a9a5a';
        App.showToast('漫画已保存到作品集！+10创作积分');
      };
      container.parentNode.insertBefore(saveBtn, container.nextSibling);
    }

    function saveToGallery() {
      if (!currentTheme || currentPanels.length === 0) {
        App.showToast('请先选择一个主题并生成漫画');
        return;
      }
      App.addToGallery({
        type: 'comic',
        title: 'AI漫画',
        data: THEMES[currentTheme].name
      });
      App.showToast('已保存到作品集!');
    }

    function shareToCommunity() {
      if (!currentTheme || currentPanels.length === 0) {
        App.showToast('请先选择一个主题并生成漫画');
        return;
      }
      App.showToast('已分享到社区!(Demo模式)');
    }

    // Init
    renderThemes();
  } // end auth check else
</script>
</body>
</html>
