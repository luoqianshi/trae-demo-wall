<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI照片工坊 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/design-tokens.css?v=5" rel="stylesheet">
  <link href="../css/components.css?v=5" rel="stylesheet">
  <script src="../css/icons.js?v=5"></script>
  <style>
    .btn-op { background: var(--surface-card); color: var(--color-warm-cream); border: 2px solid var(--color-cork-shadow); padding: 10px 18px; border-radius: var(--radius-lg); font-size: 13px; cursor: pointer; font-family: var(--font-cn); transition: all 0.2s; }
    .btn-op:hover { border-color: var(--color-burnt-sienna); background: #fff5ef; }
    .btn-op.active { border-color: var(--color-burnt-sienna); background: #fff5ef; font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .points-badge { display: inline-flex; align-items: center; gap: 4px; background: #fef3e0; color: var(--color-amber-glow); padding: 4px 12px; border-radius: var(--radius-full); font-size: 13px; font-weight: 600; }
    .upload-zone { border: 3px dashed var(--color-cork-shadow); border-radius: var(--radius-lg); padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.3s; background: var(--surface-card); }
    .upload-zone:hover { border-color: var(--color-burnt-sienna); background: #fffaf5; }
    .upload-zone.dragover { border-color: var(--color-burnt-sienna); background: #fff5ef; }
    .scene-thumb { width: 100%; aspect-ratio: 16/10; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; object-fit: cover; }
    .scene-thumb:hover, .scene-thumb.selected { border-color: var(--color-burnt-sienna); transform: scale(1.03); }
    .filter-card { position: relative; border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; aspect-ratio: 1; }
    .filter-card:hover, .filter-card.selected { border-color: var(--color-burnt-sienna); }
    .filter-card img { width: 100%; height: 100%; object-fit: cover; }
    .filter-card .filter-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px; text-align: center; font-size: 12px; font-weight: 600; color: white; background: linear-gradient(transparent, rgba(0,0,0,0.6)); }
    .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .slider-row label { font-size: 13px; font-weight: 600; min-width: 56px; }
    .slider-row input[type="range"] { flex: 1; accent-color: var(--color-burnt-sienna); }
    .slider-row .slider-val { font-size: 13px; color: var(--color-grey-brown); min-width: 36px; text-align: right; }
    .preview-area { background: var(--surface-card); border-radius: var(--radius-lg); overflow: hidden; position: relative; }
    .preview-area img { width: 100%; display: block; }
    .compare-container { display: flex; gap: 16px; }
    .compare-container > div { flex: 1; }
    .compare-label { text-align: center; font-size: 13px; font-weight: 600; color: var(--color-grey-brown); margin-bottom: 8px; }
    @media (max-width: 768px) {
      .tab-btn { font-size: 13px; padding: 8px 14px; }
      .scene-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .filter-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .compare-container { flex-direction: column; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body class="page-wrapper">
  <div id="nav-container"></div>
  <main>
    <div class="page-container" style="max-width:960px;">

      <!-- Header -->
      <div class="page-hero">
        <h1><span data-icon="camera"></span> AI照片工坊</h1>
        <p>上传照片，一键美化、换背景、加滤镜</p>
        <div style="margin-top:8px;" id="points-display"></div>
      </div>

      <!-- Step 1: Upload -->
      <div id="upload-section">
        <h2 class="section-title"><span data-icon="upload" data-icon-size="20" data-icon-fallback="plus"></span> 上传照片</h2>
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
          <div style="font-size:48px;margin-bottom:12px;"><span data-icon="image" data-icon-size="48"></span></div>
          <div style="font-size:16px;font-weight:600;margin-bottom:4px;">点击或拖拽上传照片</div>
          <div style="font-size:13px;color:var(--color-grey-brown);">支持 JPG、PNG、WEBP 格式</div>
          <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
        </div>
      </div>

      <!-- Preview + Controls (hidden until upload) -->
      <div id="editor-section" style="display:none;margin-top:24px;">

        <!-- Uploaded Image Preview -->
        <div style="text-align:center;margin-bottom:24px;">
          <img id="original-preview" style="max-width:100%;max-height:360px;border-radius:var(--radius-lg);object-fit:contain;box-shadow:0 4px 16px rgba(0,0,0,0.1);">
          <div style="margin-top:8px;">
            <button class="btn-secondary" onclick="resetUpload()" style="font-size:13px;">重新上传</button>
          </div>
        </div>

        <!-- Feature Tabs -->
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;">
          <button class="tab-btn tab-btn--active" onclick="switchFeatureTab('bg')">AI背景替换</button>
          <button class="tab-btn" onclick="switchFeatureTab('filter')">AI风格滤镜</button>
          <button class="tab-btn" onclick="switchFeatureTab('optimize')">智能优化（免费）</button>
        </div>

        <!-- ===== Tab 1: Background Replace ===== -->
        <div id="tab-bg" class="tab-panel active">
          <h3 style="font-size:16px;font-weight:600;margin:0 0 16px;">选择操作</h3>
          <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
            <button class="btn-op" id="btn-remove-bg" onclick="selectBgOp('remove')">去掉背景人物</button>
            <button class="btn-op" id="btn-replace-bg" onclick="selectBgOp('replace')">替换背景</button>
            <button class="btn-op" id="btn-blur-bg" onclick="selectBgOp('blur')">模糊背景</button>
          </div>

          <!-- Remove BG: Mask simulation -->
          <div id="bg-remove-preview" style="display:none;margin-bottom:20px;">
            <div class="preview-area" style="position:relative;">
              <img id="bg-remove-img" style="width:100%;display:block;">
              <div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(76,154,90,0.15),rgba(61,138,170,0.15));border-radius:var(--radius-lg);pointer-events:none;"></div>
              <div style="position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,0.6);color:white;padding:4px 12px;border-radius:var(--radius-full);font-size:12px;">模拟去除效果（蒙版预览）</div>
            </div>
          </div>

          <!-- Replace BG: Scene Selection -->
          <div id="bg-replace-section" style="display:none;">
            <h3 style="font-size:16px;font-weight:600;margin:0 0 12px;">选择场景背景</h3>
            <div class="scene-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;" id="scene-grid"></div>

            <!-- Preview with Scene -->
            <div id="scene-preview-area" style="display:none;margin-bottom:20px;">
              <h3 style="font-size:16px;font-weight:600;margin:0 0 12px;">实时预览</h3>
              <div class="preview-area" style="position:relative;overflow:hidden;">
                <img id="scene-bg-img" style="width:100%;display:block;object-fit:cover;">
                <img id="scene-fg-img" style="width:100%;display:block;position:absolute;inset:0;object-fit:contain;mix-blend-mode:normal;z-index:1;">
              </div>
            </div>
          </div>

          <!-- Blur BG -->
          <div id="bg-blur-preview" style="display:none;margin-bottom:20px;">
            <div class="preview-area" style="position:relative;">
              <img id="bg-blur-img" style="width:100%;display:block;filter:blur(8px);transform:scale(1.05);">
              <img id="bg-blur-fg" style="width:100%;display:block;position:absolute;inset:0;object-fit:contain;z-index:1;">
            </div>
          </div>

          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
            <button class="btn-primary" id="apply-bg-btn" onclick="applyBgEffect()" disabled>应用效果</button>
            <span class="points-badge">⭐ 消耗 20 积分</span>
          </div>

          <!-- Compare -->
          <div id="bg-compare" style="display:none;">
            <h3 style="font-size:16px;font-weight:600;margin:0 0 12px;">对比效果</h3>
            <div class="compare-container">
              <div>
                <div class="compare-label">原图</div>
                <div class="preview-area"><img id="compare-original-bg" style="width:100%;"></div>
              </div>
              <div>
                <div class="compare-label">效果图</div>
                <div class="preview-area"><img id="compare-effect-bg" style="width:100%;"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ===== Tab 2: Style Filters ===== -->
        <div id="tab-filter" class="tab-panel">
          <h3 style="font-size:16px;font-weight:600;margin:0 0 16px;">选择滤镜风格</h3>
          <div class="filter-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;" id="filter-grid"></div>

          <div style="margin-bottom:20px;">
            <h3 style="font-size:16px;font-weight:600;margin:0 0 12px;">滤镜预览</h3>
            <div class="preview-area" style="text-align:center;padding:16px;">
              <img id="filter-preview-img" style="max-width:100%;max-height:360px;object-fit:contain;">
            </div>
          </div>

          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
            <button class="btn-primary" id="apply-filter-btn" onclick="applyFilter()" disabled>应用滤镜</button>
            <span class="points-badge">⭐ 消耗 10 积分</span>
          </div>

          <!-- Compare -->
          <div id="filter-compare" style="display:none;">
            <h3 style="font-size:16px;font-weight:600;margin:0 0 12px;">对比效果</h3>
            <div class="compare-container">
              <div>
                <div class="compare-label">原图</div>
                <div class="preview-area"><img id="compare-original-filter" style="width:100%;"></div>
              </div>
              <div>
                <div class="compare-label">效果图</div>
                <div class="preview-area"><img id="compare-effect-filter" style="width:100%;"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ===== Tab 3: Smart Optimize ===== -->
        <div id="tab-optimize" class="tab-panel">
          <h3 style="font-size:16px;font-weight:600;margin:0 0 8px;">智能优化 <span style="font-size:12px;color:var(--color-mint-leaf);font-weight:400;">免费</span></h3>
          <p style="font-size:13px;color:var(--color-grey-brown);margin:0 0 16px;">自动调整照片参数，也可手动微调滑块</p>

          <div style="margin-bottom:20px;">
            <button class="btn-primary" onclick="autoEnhance()" style="background:var(--color-mint-leaf);">一键美化</button>
          </div>

          <div style="background:var(--surface-card);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;">
            <div class="slider-row">
              <label>亮度</label>
              <input type="range" id="slider-brightness" min="50" max="200" value="100" oninput="updateOptimizePreview()">
              <span class="slider-val" id="val-brightness">100%</span>
            </div>
            <div class="slider-row">
              <label>对比度</label>
              <input type="range" id="slider-contrast" min="50" max="200" value="100" oninput="updateOptimizePreview()">
              <span class="slider-val" id="val-contrast">100%</span>
            </div>
            <div class="slider-row">
              <label>饱和度</label>
              <input type="range" id="slider-saturate" min="0" max="300" value="100" oninput="updateOptimizePreview()">
              <span class="slider-val" id="val-saturate">100%</span>
            </div>
            <div class="slider-row">
              <label>色温</label>
              <input type="range" id="slider-hue" min="-30" max="30" value="0" oninput="updateOptimizePreview()">
              <span class="slider-val" id="val-hue">0°</span>
            </div>
          </div>

          <div style="margin-bottom:20px;">
            <h3 style="font-size:16px;font-weight:600;margin:0 0 12px;">实时预览</h3>
            <div class="preview-area" style="text-align:center;padding:16px;">
              <img id="optimize-preview-img" style="max-width:100%;max-height:360px;object-fit:contain;">
            </div>
          </div>

          <div style="display:flex;gap:12px;">
            <button class="btn-secondary" onclick="resetOptimize()">重置参数</button>
            <button class="btn-primary" onclick="saveOptimize()" style="background:var(--color-mint-leaf);">保存优化效果</button>
          </div>
        </div>

        <!-- ===== Save & Share ===== -->
        <div style="margin-top:32px;padding-top:24px;border-top:2px solid var(--color-cork-shadow);">
          <h3 style="font-size:18px;font-weight:600;margin:0 0 16px;">保存与分享</h3>
          <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <button class="btn-primary" onclick="saveToGallery()">保存到作品集</button>
            <button class="btn-secondary" onclick="downloadPhoto()">下载</button>
            <button class="btn-secondary" onclick="App.shareToCommunity('PHOTO')">📤 分享到社区</button>
            <button class="btn-secondary" onclick="App.shareToWechat('PHOTO')" style="border-color:#07c160;color:#07c160;">💬 分享到朋友圈</button>
          </div>
        </div>
      </div>

    </div>
  </main>
  <div id="footer-container"></div>
  <div id="bottom-tab-container"></div>

  <!-- Hidden canvas for export -->
  <canvas id="export-canvas" style="display:none;"></canvas>

  <script src="../js/app.js?v=11"></script>
  <script>
    // ---- V6 Auth Check ----
if (!App.isRegistered()) {
    document.body.innerHTML = App.renderAuthPage();
    window.onAuthSuccess = function() { location.reload(); };
} else {
  App.login();
  // Check onboarding for new users
  if (App.shouldShowOnboarding()) {
    window.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'onboarding-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,0.2);text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🎉</div>' +
        '<h2 style="font-family:var(--font-display);font-size:22px;color:var(--color-warm-cream);margin:0 0 8px;">欢迎加入AI家庭日！</h2>' +
        '<p style="color:var(--color-grey-brown);font-size:14px;margin:0 0 24px;">' + (App.getUser().nickname || '') + '，让我们开始你的家庭AI之旅吧！<br>只需3步即可开始：</p>' +
        '<div style="text-align:left;margin:0 0 24px;">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">1</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">创建你的家庭AI学习计划</div><div style="font-size:12px;color:var(--color-grey-brown);">AI为你定制专属12周学习路径</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-amber-glow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">2</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">选择你的AI伙伴</div><div style="font-size:12px;color:var(--color-grey-brown);">10个经典角色陪你学习</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-sky-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">3</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">开始探索和创作</div><div style="font-size:12px;color:var(--color-grey-brown);">聊天、漫画、3D、视频等你来玩</div></div></div>' +
        '</div>' +
        '<a href="family-plan.html" class="btn btn-primary" style="display:inline-block;padding:12px 32px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(200,68,0,0.3);">开始定制计划 →</a>' +
        '<button onclick="document.getElementById(\'onboarding-overlay\').remove();App.completeOnboarding();" style="display:block;margin:12px auto 0;background:none;border:none;color:var(--color-grey-brown);cursor:pointer;font-size:13px;">稍后再说</button>' +
        '</div>';
      document.body.appendChild(overlay);
    });
  }
    // ===================== Init =====================
    Icons.init();
    document.getElementById('nav-container').innerHTML = App.renderNav('create');
    document.getElementById('footer-container').innerHTML = App.renderFooter();
    document.getElementById('bottom-tab-container').innerHTML = App.renderBottomTab('create');
    updatePointsDisplay();

    function updatePointsDisplay() {
      var total = App.getTotalPoints();
      document.getElementById('points-display').innerHTML = '<span class="points-badge" style="font-size:15px;">当前积分: ' + total + ' ⭐</span>';
    }

    // ===================== Upload =====================
    var uploadedImageSrc = null;
    var uploadZone = document.getElementById('upload-zone');

    // Drag & drop
    uploadZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', function() {
      uploadZone.classList.remove('dragover');
    });
    uploadZone.addEventListener('drop', function(e) {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      var files = e.dataTransfer.files;
      if (files.length > 0 && files[0].type.startsWith('image/')) {
        loadImage(files[0]);
      }
    });

    function handleFileSelect(e) {
      if (e.target.files.length > 0) {
        loadImage(e.target.files[0]);
      }
    }

    function loadImage(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        uploadedImageSrc = e.target.result;
        document.getElementById('original-preview').src = uploadedImageSrc;
        document.getElementById('upload-section').style.display = 'none';
        document.getElementById('editor-section').style.display = 'block';
        initFilterGrid();
        initSceneGrid();
        initOptimizePreview();
        App.showToast('照片上传成功！');
      };
      reader.readAsDataURL(file);
    }

    function resetUpload() {
      uploadedImageSrc = null;
      document.getElementById('upload-section').style.display = 'block';
      document.getElementById('editor-section').style.display = 'none';
      document.getElementById('file-input').value = '';
      currentBgOp = null;
      currentFilter = null;
      currentScene = null;
      // Reset all previews
      document.querySelectorAll('#tab-bg .preview-area').forEach(function(el) { el.style.display = 'none'; });
      document.getElementById('bg-compare').style.display = 'none';
      document.getElementById('filter-compare').style.display = 'none';
    }

    // ===================== Feature Tab Switching =====================
    function switchFeatureTab(tab) {
      document.querySelectorAll('#editor-section > div > .tab-panel').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(function(t) { t.classList.remove('tab-btn--active'); });
      event.target.closest('.tab-btn').classList.add('tab-btn--active');
    }

    // ===================== Background Replace =====================
    var currentBgOp = null;
    var currentScene = null;

    var scenes = [
      { id: 'beach', name: '海边', color: '#4fc3f7', gradient: 'linear-gradient(180deg, #87CEEB 0%, #4fc3f7 40%, #f4d03f 70%, #e8c84a 100%)' },
      { id: 'space', name: '太空', color: '#1a1a3e', gradient: 'linear-gradient(180deg, #0d0d2b 0%, #1a1a3e 40%, #2d1b69 70%, #0d0d2b 100%)' },
      { id: 'castle', name: '城堡', color: '#8d6e63', gradient: 'linear-gradient(180deg, #b39ddb 0%, #8d6e63 50%, #a1887f 100%)' },
      { id: 'forest', name: '森林', color: '#2e7d32', gradient: 'linear-gradient(180deg, #81c784 0%, #388e3c 40%, #2e7d32 70%, #1b5e20 100%)' },
      { id: 'city', name: '城市', color: '#546e7a', gradient: 'linear-gradient(180deg, #b0bec5 0%, #78909c 30%, #546e7a 60%, #37474f 100%)' },
      { id: 'starry', name: '星空', color: '#1a237e', gradient: 'linear-gradient(180deg, #0d0d2b 0%, #1a237e 50%, #283593 70%, #0d0d2b 100%)' },
      { id: 'flower', name: '花田', color: '#e91e63', gradient: 'linear-gradient(180deg, #81d4fa 0%, #f48fb1 30%, #e91e63 60%, #f06292 80%, #81d4fa 100%)' },
      { id: 'snow', name: '雪山', color: '#e3f2fd', gradient: 'linear-gradient(180deg, #90caf9 0%, #e3f2fd 30%, #ffffff 50%, #e3f2fd 70%, #bbdefb 100%)' },
      { id: 'classroom', name: '教室', color: '#fff3e0', gradient: 'linear-gradient(180deg, #fff3e0 0%, #ffe0b2 30%, #ffcc80 60%, #fff3e0 100%)' },
      { id: 'park', name: '公园', color: '#66bb6a', gradient: 'linear-gradient(180deg, #a5d6a7 0%, #66bb6a 30%, #43a047 60%, #2e7d32 100%)' }
    ];

    function selectBgOp(op) {
      currentBgOp = op;
      // Update button states
      document.querySelectorAll('#tab-bg .btn-op').forEach(function(b) { b.classList.remove('active'); });
      if (op === 'remove') document.getElementById('btn-remove-bg').classList.add('active');
      if (op === 'replace') document.getElementById('btn-replace-bg').classList.add('active');
      if (op === 'blur') document.getElementById('btn-blur-bg').classList.add('active');

      // Show/hide sub-sections
      document.getElementById('bg-remove-preview').style.display = op === 'remove' ? 'block' : 'none';
      document.getElementById('bg-replace-section').style.display = op === 'replace' ? 'block' : 'none';
      document.getElementById('bg-blur-preview').style.display = op === 'blur' ? 'block' : 'none';

      if (op === 'remove') {
        document.getElementById('bg-remove-img').src = uploadedImageSrc;
      } else if (op === 'blur') {
        document.getElementById('bg-blur-img').src = uploadedImageSrc;
        document.getElementById('bg-blur-fg').src = uploadedImageSrc;
      }

      document.getElementById('apply-bg-btn').disabled = false;
      document.getElementById('bg-compare').style.display = 'none';
    }

    function initSceneGrid() {
      var grid = document.getElementById('scene-grid');
      var html = '';
      scenes.forEach(function(s) {
        html += '<div style="text-align:center;">';
        html += '<div style="width:100%;aspect-ratio:16/10;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:all 0.2s;background:' + s.gradient + ';" data-scene="' + s.id + '" onclick="selectScene(\'' + s.id + '\')"></div>';
        html += '<div style="font-size:12px;margin-top:4px;font-weight:600;">' + s.name + '</div>';
        html += '</div>';
      });
      grid.innerHTML = html;
    }

    function selectScene(id) {
      currentScene = scenes.find(function(s) { return s.id === id; });
      // Update visual
      document.querySelectorAll('#scene-grid [data-scene]').forEach(function(el) {
        el.style.borderColor = el.getAttribute('data-scene') === id ? 'var(--color-burnt-sienna)' : 'transparent';
      });
      // Show preview
      var bgImg = document.getElementById('scene-bg-img');
      var fgImg = document.getElementById('scene-fg-img');
      // Create a temporary canvas to render the scene as an image
      var canvas = document.createElement('canvas');
      canvas.width = 800;
      canvas.height = 500;
      var ctx = canvas.getContext('2d');
      // Parse gradient
      var grad = ctx.createLinearGradient(0, 0, 0, 500);
      var colors = extractGradientColors(currentScene.gradient);
      colors.forEach(function(c, i) {
        grad.addColorStop(i / (colors.length - 1), c.color);
      });
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 800, 500);
      // Draw scene emoji/icon
      ctx.font = '80px serif';
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.3;
      var emojis = { beach: '🏖️', space: '🚀', castle: '🏰', forest: '🌲', city: '🏙️', starry: '⭐', flower: '🌸', snow: '🏔️', classroom: '📚', park: '🌳' };
      ctx.fillText(emojis[id] || '🖼️', 400, 260);
      ctx.globalAlpha = 1;
      bgImg.src = canvas.toDataURL();
      fgImg.src = uploadedImageSrc;
      document.getElementById('scene-preview-area').style.display = 'block';
      document.getElementById('apply-bg-btn').disabled = false;
      document.getElementById('bg-compare').style.display = 'none';
    }

    function extractGradientColors(gradient) {
      var matches = gradient.match(/#[0-9a-fA-F]{6}/g) || ['#000', '#fff'];
      return matches.map(function(c) { return { color: c }; });
    }

    function applyBgEffect() {
      if (!currentBgOp) { App.showToast('请先选择操作'); return; }
      if (!App.spendPoints(15, 'AI背景处理')) { App.showToast('积分不足！需要15积分，去完成任务赚积分吧', 'error'); return; }
      updatePointsDisplay();

      // Render effect to compare
      var canvas = document.createElement('canvas');
      var img = new Image();
      img.onload = function() {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        var ctx = canvas.getContext('2d');

        if (currentBgOp === 'remove') {
          ctx.drawImage(img, 0, 0);
          ctx.fillStyle = 'rgba(76,154,90,0.15)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else if (currentBgOp === 'replace' && currentScene) {
          var grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
          var colors = extractGradientColors(currentScene.gradient);
          colors.forEach(function(c, i) {
            grad.addColorStop(i / (colors.length - 1), c.color);
          });
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.globalAlpha = 0.7;
          ctx.drawImage(img, 0, 0);
          ctx.globalAlpha = 1;
        } else if (currentBgOp === 'blur') {
          ctx.filter = 'blur(8px)';
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          ctx.filter = 'none';
          ctx.drawImage(img, 0, 0);
        }

        var effectSrc = canvas.toDataURL('image/png');
        document.getElementById('compare-original-bg').src = uploadedImageSrc;
        document.getElementById('compare-effect-bg').src = effectSrc;
        document.getElementById('bg-compare').style.display = 'block';

        // Update the main preview
        lastAppliedImageSrc = effectSrc;
        App.showToast('背景效果已应用！');
      };
      img.src = uploadedImageSrc;
    }

    // ===================== Style Filters =====================
    var currentFilter = null;

    var filters = [
      { id: 'oil', name: '油画风格', css: 'saturate(1.5) contrast(1.1)' },
      { id: 'watercolor', name: '水彩风格', css: 'brightness(1.1) saturate(0.8)' },
      { id: 'sketch', name: '素描风格', css: 'grayscale(1) contrast(2)' },
      { id: 'pixel', name: '像素风', css: 'none', pixelated: true },
      { id: 'film', name: '复古胶片', css: 'sepia(0.7) contrast(1.1)' },
      { id: 'comic', name: '漫画风格', css: 'saturate(1.8) contrast(1.3)' },
      { id: 'cyber', name: '赛博朋克', css: 'hue-rotate(180deg) saturate(2)' },
      { id: 'ink', name: '国风水墨', css: 'grayscale(0.5) brightness(1.2) contrast(1.5)' }
    ];

    function initFilterGrid() {
      var grid = document.getElementById('filter-grid');
      var html = '';
      filters.forEach(function(f) {
        var style = f.pixelated ? '' : 'filter:' + f.css + ';';
        html += '<div class="filter-card" data-filter="' + f.id + '" onclick="selectFilter(\'' + f.id + '\')">';
        html += '<img src="' + uploadedImageSrc + '" style="' + style + (f.pixelated ? 'image-rendering:pixelated;width:60px;height:60px;object-fit:cover;' : '') + '" alt="' + f.name + '">';
        html += '<div class="filter-label">' + f.name + '</div>';
        html += '</div>';
      });
      grid.innerHTML = html;
      document.getElementById('filter-preview-img').src = uploadedImageSrc;
    }

    function selectFilter(id) {
      currentFilter = filters.find(function(f) { return f.id === id; });
      // Update visual
      document.querySelectorAll('#filter-grid .filter-card').forEach(function(el) {
        el.classList.toggle('selected', el.getAttribute('data-filter') === id);
      });
      // Update preview
      var preview = document.getElementById('filter-preview-img');
      if (currentFilter.pixelated) {
        preview.style.imageRendering = 'pixelated';
        preview.style.width = '150px';
        preview.style.filter = '';
      } else {
        preview.style.imageRendering = '';
        preview.style.width = '';
        preview.style.filter = currentFilter.css;
      }
      document.getElementById('apply-filter-btn').disabled = false;
      document.getElementById('filter-compare').style.display = 'none';
    }

    function applyFilter() {
      if (!currentFilter) { App.showToast('请先选择滤镜'); return; }
      if (!App.spendPoints(10, 'AI滤镜应用')) {
        App.showToast('积分不足！应用滤镜需要10积分');
        return;
      }
      updatePointsDisplay();

      var canvas = document.createElement('canvas');
      var img = new Image();
      img.onload = function() {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        var ctx = canvas.getContext('2d');

        if (currentFilter.pixelated) {
          var sw = 80, sh = Math.round(img.naturalHeight * 80 / img.naturalWidth);
          ctx.imageSmoothingEnabled = false;
          // Draw small
          var tempCanvas = document.createElement('canvas');
          tempCanvas.width = sw;
          tempCanvas.height = sh;
          var tempCtx = tempCanvas.getContext('2d');
          tempCtx.drawImage(img, 0, 0, sw, sh);
          ctx.drawImage(tempCanvas, 0, 0, sw, sh, 0, 0, canvas.width, canvas.height);
        } else {
          ctx.filter = currentFilter.css;
          ctx.drawImage(img, 0, 0);
        }

        var effectSrc = canvas.toDataURL('image/png');
        document.getElementById('compare-original-filter').src = uploadedImageSrc;
        document.getElementById('compare-effect-filter').src = effectSrc;
        document.getElementById('filter-compare').style.display = 'block';

        lastAppliedImageSrc = effectSrc;
        App.showToast('滤镜已应用！');
      };
      img.src = uploadedImageSrc;
    }

    // ===================== Smart Optimize =====================
    function initOptimizePreview() {
      document.getElementById('optimize-preview-img').src = uploadedImageSrc;
    }

    function autoEnhance() {
      document.getElementById('slider-brightness').value = 110;
      document.getElementById('slider-contrast').value = 105;
      document.getElementById('slider-saturate').value = 110;
      document.getElementById('slider-hue').value = 0;
      updateOptimizePreview();
      App.showToast('一键美化已应用');
    }

    function updateOptimizePreview() {
      var b = document.getElementById('slider-brightness').value;
      var c = document.getElementById('slider-contrast').value;
      var s = document.getElementById('slider-saturate').value;
      var h = document.getElementById('slider-hue').value;

      document.getElementById('val-brightness').textContent = b + '%';
      document.getElementById('val-contrast').textContent = c + '%';
      document.getElementById('val-saturate').textContent = s + '%';
      document.getElementById('val-hue').textContent = h + '°';

      var filter = 'brightness(' + (b/100) + ') contrast(' + (c/100) + ') saturate(' + (s/100) + ') hue-rotate(' + h + 'deg)';
      document.getElementById('optimize-preview-img').style.filter = filter;
    }

    function resetOptimize() {
      document.getElementById('slider-brightness').value = 100;
      document.getElementById('slider-contrast').value = 100;
      document.getElementById('slider-saturate').value = 100;
      document.getElementById('slider-hue').value = 0;
      updateOptimizePreview();
      App.showToast('参数已重置');
    }

    function saveOptimize() {
      var b = document.getElementById('slider-brightness').value;
      var c = document.getElementById('slider-contrast').value;
      var s = document.getElementById('slider-saturate').value;
      var h = document.getElementById('slider-hue').value;
      var filter = 'brightness(' + (b/100) + ') contrast(' + (c/100) + ') saturate(' + (s/100) + ') hue-rotate(' + h + 'deg)';

      var canvas = document.createElement('canvas');
      var img = new Image();
      img.onload = function() {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        var ctx = canvas.getContext('2d');
        ctx.filter = filter;
        ctx.drawImage(img, 0, 0);
        lastAppliedImageSrc = canvas.toDataURL('image/png');
        App.showToast('优化效果已保存！');
      };
      img.src = uploadedImageSrc;
    }

    // ===================== Save & Share =====================
    var lastAppliedImageSrc = null;

    function saveToGallery() {
      var src = lastAppliedImageSrc || uploadedImageSrc;
      if (!src) { App.showToast('没有可保存的照片'); return; }
      App.addToGallery({
        type: 'photo',
        title: 'AI美化照片',
        data: src
      });
      App.addPoints('creative', 10, '保存照片到作品集');
      var st = App.getState();
      st.photoCount = (st.photoCount || 0) + 1;
      App.checkBadgeUnlocks();
      updatePointsDisplay();
      App.showToast('已保存到作品集！+10创作积分');
    }

    function downloadPhoto() {
      var src = lastAppliedImageSrc || uploadedImageSrc;
      if (!src) { App.showToast('没有可下载的照片'); return; }
      var a = document.createElement('a');
      a.href = src;
      a.download = 'AI家庭日_照片工坊_' + Date.now() + '.png';
      a.click();
      App.showToast('照片已下载');
    }

    function shareToCommunity() {
      App.showToast('分享功能即将上线，敬请期待！');
    }
  } // end auth check else
</script>
</body>
</html>
