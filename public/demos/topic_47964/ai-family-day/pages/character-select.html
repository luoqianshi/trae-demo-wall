<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择你的AI伙伴 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/design-tokens.css?v=5">
  <link rel="stylesheet" href="../css/components.css?v=5">
  <script src="../css/icons.js?v=5"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <style>
    /* Category tabs - 独有 */
    .category-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 16px 24px 24px;
    }

    /* Carousel - 独有 */
    .carousel-wrapper {
      position: relative;
      padding: 0 60px 24px;
    }
    .carousel-track {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      padding: 12px 4px 20px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .carousel-track::-webkit-scrollbar {
      display: none;
    }
    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--color-cork-shadow);
      background: var(--surface-card);
      color: var(--color-warm-cream);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      font-size: 18px;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      font-family: var(--font-cn);
    }
    .carousel-arrow:hover {
      background: var(--color-burnt-sienna);
      color: #fff;
      border-color: var(--color-burnt-sienna);
    }
    .carousel-arrow svg { width: 18px; height: 18px; }
    .carousel-arrow.left { left: 8px; }
    .carousel-arrow.right { right: 8px; }

    /* Dots - 独有 */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 0 24px 8px;
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-cork-shadow);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .carousel-dot.active {
      background: var(--color-burnt-sienna);
      width: 24px;
      border-radius: 4px;
    }

    /* Character Card - 独有 */
    .char-card {
      flex-shrink: 0;
      width: 220px;
      scroll-snap-align: center;
      background: var(--surface-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 2px solid transparent;
      transition: all 0.3s;
      animation: fadeInUp 0.5s ease forwards;
      opacity: 0;
      cursor: pointer;
    }
    .char-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .char-card.selected {
      border-color: var(--color-burnt-sienna);
      box-shadow: 0 4px 20px rgba(200,68,0,0.2);
    }
    .char-card-avatar {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--surface-canvas) 0%, #f0e8dc 100%);
      overflow: hidden;
    }
    .char-card-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .char-card-body {
      padding: 16px;
      text-align: center;
    }
    .char-card-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .char-card-desc {
      font-size: 12px;
      color: var(--color-grey-brown);
      line-height: 1.5;
      margin-bottom: 14px;
      min-height: 36px;
    }
    .char-card-cat {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 500;
      background: var(--surface-canvas);
      color: var(--color-grey-brown);
      margin-bottom: 12px;
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Selected Character Showcase - 独有 */
    .selected-showcase {
      max-width: 600px;
      margin: 32px auto;
      background: var(--surface-card);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(44,24,16,0.08);
      display: none;
    }
    .selected-showcase.visible {
      display: block;
      animation: fadeInUp 0.4s ease;
    }
    .selected-showcase .showcase-avatar {
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
      border-radius: 50%;
      overflow: hidden;
    }
    .selected-showcase .showcase-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .selected-showcase h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .selected-showcase .showcase-desc {
      color: var(--color-grey-brown);
      font-size: 15px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .carousel-wrapper { padding: 0 48px 16px; }
      .carousel-arrow { width: 34px; height: 34px; }
      .carousel-arrow svg { width: 15px; height: 15px; }
      .carousel-arrow.left { left: 4px; }
      .carousel-arrow.right { right: 4px; }
      .char-card { width: 180px; }
      .char-card-avatar { height: 140px; }
      .selected-showcase { margin: 24px 16px; padding: 24px 20px; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <main class="page-wrapper">
    <div class="page-container" style="max-width:1100px;">

      <!-- Page Hero -->
      <section class="page-hero">
        <h1>选择你的AI伙伴</h1>
        <p>每个角色都有独特的个性和知识领域</p>
      </section>

      <!-- Category Tabs -->
      <div class="category-tabs" id="category-tabs">
        <button class="tab-btn active" data-cat="all">全部</button>
        <button class="tab-btn" data-cat="影视IP">影视IP</button>
        <button class="tab-btn" data-cat="游戏世界">游戏世界</button>
      </div>

      <!-- Carousel -->
      <div class="carousel-wrapper">
        <button class="carousel-arrow left" id="arrow-left"><span data-icon="chevronLeft"></span></button>
        <div class="carousel-track" id="carousel-track"></div>
        <button class="carousel-arrow right" id="arrow-right"><span data-icon="chevronRight"></span></button>
      </div>

      <!-- Dots -->
      <div class="carousel-dots" id="carousel-dots"></div>

      <!-- Selected Showcase -->
      <div class="selected-showcase" id="selected-showcase">
        <div class="showcase-avatar" id="showcase-avatar"></div>
        <h2 id="showcase-name"></h2>
        <p class="showcase-desc" id="showcase-desc"></p>
        <a href="ai-chat.html" class="btn btn-primary">去和它聊天</a>
      </div>

    </div>
  </main>
  <div id="footer-container"></div>
  <div id="bottom-tab-container"></div>

  <script src="../js/app.js?v=11"></script>
  <script>
    // ---- V6 Auth Check ----
if (!App.isRegistered()) {
    document.body.innerHTML = App.renderAuthPage();
    window.onAuthSuccess = function() { location.reload(); };
} else {
  App.login();
  // Check onboarding for new users
  if (App.shouldShowOnboarding()) {
    window.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'onboarding-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,0.2);text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🎉</div>' +
        '<h2 style="font-family:var(--font-display);font-size:22px;color:var(--color-warm-cream);margin:0 0 8px;">欢迎加入AI家庭日！</h2>' +
        '<p style="color:var(--color-grey-brown);font-size:14px;margin:0 0 24px;">' + (App.getUser().nickname || '') + '，让我们开始你的家庭AI之旅吧！<br>只需3步即可开始：</p>' +
        '<div style="text-align:left;margin:0 0 24px;">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">1</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">创建你的家庭AI学习计划</div><div style="font-size:12px;color:var(--color-grey-brown);">AI为你定制专属12周学习路径</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-amber-glow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">2</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">选择你的AI伙伴</div><div style="font-size:12px;color:var(--color-grey-brown);">10个经典角色陪你学习</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-sky-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">3</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">开始探索和创作</div><div style="font-size:12px;color:var(--color-grey-brown);">聊天、漫画、3D、视频等你来玩</div></div></div>' +
        '</div>' +
        '<a href="family-plan.html" class="btn btn-primary" style="display:inline-block;padding:12px 32px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(200,68,0,0.3);">开始定制计划 →</a>' +
        '<button onclick="document.getElementById(\'onboarding-overlay\').remove();App.completeOnboarding();" style="display:block;margin:12px auto 0;background:none;border:none;color:var(--color-grey-brown);cursor:pointer;font-size:13px;">稍后再说</button>' +
        '</div>';
      document.body.appendChild(overlay);
    });
  }
    // ---- Render common UI ----
    Icons.init();
    document.getElementById('nav-container').innerHTML = App.renderNav('home');
    document.getElementById('footer-container').innerHTML = App.renderFooter();
    document.getElementById('bottom-tab-container').innerHTML = App.renderBottomTab('home');

    // ---- Category mapping ----
    var CATEGORY_MAP = {
      'doraemon': '影视IP',
      'frozen': '影视IP',
      'nemo': '影视IP',
      'harry': '影视IP',
      'transformers': '游戏世界',
      'delta': '游戏世界',
      'ittakes': '游戏世界',
      'minecraft': '游戏世界',
      'mario': '游戏世界',
      'eggy': '游戏世界'
    };

    // ---- Data from App API ----
    var characterIds = Object.keys(App.CHARACTERS);
    var selectedCharacter = App.getSelectedCharacter();
    var currentCat = 'all';

    // ---- Render Cards ----
    function getFilteredIds(cat) {
      return characterIds.filter(function(id) {
        if (cat === 'all') return true;
        return CATEGORY_MAP[id] === cat;
      });
    }

    function renderCards(cat) {
      var track = document.getElementById('carousel-track');
      track.innerHTML = '';
      var filtered = getFilteredIds(cat);
      filtered.forEach(function(id, idx) {
        var ch = App.CHARACTERS[id];
        var isSelected = selectedCharacter && selectedCharacter.id === id;
        var card = document.createElement('div');
        card.className = 'char-card' + (isSelected ? ' selected' : '');
        card.style.animationDelay = (idx * 0.06) + 's';
        card.dataset.id = id;
        card.innerHTML =
          '<div class="char-card-avatar"><img src="' + (ch.image || '../images/characters/' + id + '.png') + '" alt="' + ch.name + '"></div>' +
          '<div class="char-card-body">' +
            '<span class="char-card-cat">' + CATEGORY_MAP[id] + '</span>' +
            '<div class="char-card-name">' + ch.name + '</div>' +
            '<div class="char-card-desc">' + ch.description + '</div>' +
            '<button class="btn btn-primary btn-sm" data-id="' + id + '">选择</button>' +
          '</div>';
        track.appendChild(card);
      });
      renderDots(filtered.length);
      updateShowcase();
    }

    // ---- Dots ----
    function getCardWidth() {
      return window.innerWidth <= 768 ? 200 : 240;
    }

    function renderDots(count) {
      var dotsEl = document.getElementById('carousel-dots');
      dotsEl.innerHTML = '';
      var cardWidth = getCardWidth();
      var visibleCards = Math.max(1, Math.floor((window.innerWidth - 120) / cardWidth));
      var totalPages = Math.max(1, Math.ceil(count / visibleCards));
      for (var i = 0; i < totalPages; i++) {
        var dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.dataset.page = i;
        dot.addEventListener('click', function() {
          var track = document.getElementById('carousel-track');
          var pageW = visibleCards * cardWidth;
          track.scrollTo({ left: parseInt(this.dataset.page) * pageW, behavior: 'smooth' });
        });
        dotsEl.appendChild(dot);
      }
    }

    // ---- Scroll Arrows ----
    document.getElementById('arrow-left').addEventListener('click', function() {
      document.getElementById('carousel-track').scrollBy({ left: -260, behavior: 'smooth' });
    });
    document.getElementById('arrow-right').addEventListener('click', function() {
      document.getElementById('carousel-track').scrollBy({ left: 260, behavior: 'smooth' });
    });

    // ---- Scroll -> Dot update ----
    document.getElementById('carousel-track').addEventListener('scroll', function() {
      var cardWidth = getCardWidth();
      var visibleCards = Math.max(1, Math.floor((window.innerWidth - 120) / cardWidth));
      var pageW = visibleCards * cardWidth;
      var current = Math.round(this.scrollLeft / pageW);
      var dots = document.querySelectorAll('.carousel-dot');
      dots.forEach(function(d, i) {
        d.classList.toggle('active', i === current);
      });
    });

    // ---- Category Tabs ----
    document.querySelectorAll('.tab-btn').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        currentCat = this.dataset.cat;
        renderCards(currentCat);
      });
    });

    // ---- Select Character ----
    document.getElementById('carousel-track').addEventListener('click', function(e) {
      var btn = e.target.closest('[data-id]');
      if (!btn) return;
      var id = btn.dataset.id;
      var ch = App.CHARACTERS[id];

      App.selectCharacter(id);
      App.addPoints('learning', 10, '选择AI伙伴');
      App.showToast('已选择 ' + ch.name + '! +10学习积分');

      selectedCharacter = App.getSelectedCharacter();

      document.querySelectorAll('.char-card').forEach(function(c) {
        c.classList.toggle('selected', c.dataset.id === id);
      });
      updateShowcase();
    });

    // ---- Selected Showcase ----
    function updateShowcase() {
      var showcase = document.getElementById('selected-showcase');
      if (!selectedCharacter) {
        showcase.classList.remove('visible');
        return;
      }
      document.getElementById('showcase-avatar').innerHTML = '<img src="' + (selectedCharacter.image || '../images/characters/' + selectedCharacter.id + '.png') + '" alt="' + selectedCharacter.name + '">';
      document.getElementById('showcase-name').textContent = selectedCharacter.name;
      document.getElementById('showcase-desc').textContent = selectedCharacter.description;
      showcase.classList.add('visible');
    }

    // ---- Init ----
    renderCards('all');

    window.addEventListener('resize', function() {
      var filtered = getFilteredIds(currentCat);
      renderDots(filtered.length);
    });
  } // end auth check else
</script>
</body>
</html>
