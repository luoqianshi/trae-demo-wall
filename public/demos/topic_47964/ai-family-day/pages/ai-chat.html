<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI智能助手 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/design-tokens.css?v=5">
  <link rel="stylesheet" href="../css/components.css?v=5">
  <script src="../css/icons.js?v=5"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <style>
    body { padding-top: var(--nav-height); }

    /* Chat Layout - 独有 */
    .chat-layout {
      display: flex;
      height: calc(100vh - var(--nav-height));
      overflow: hidden;
    }

    /* Sidebar - 独有 */
    .chat-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface-card);
      border-right: 1px solid var(--color-cork-shadow);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px 20px;
      gap: 20px;
    }

    /* Character info in sidebar */
    .char-info-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 8px;
    }
    .char-info-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .char-info-name {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .char-info-desc {
      font-size: 13px;
      color: var(--color-grey-brown);
      text-align: center;
      line-height: 1.5;
    }

    /* Daily question in sidebar */
    .daily-q-text {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
      color: var(--color-sky-soft);
      font-weight: 500;
    }

    /* Quick topics */
    .topic-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Chat area - 独有 */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface-canvas);
      min-width: 0;
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      display: flex;
      gap: 10px;
      max-width: 75%;
      animation: msgFadeIn 0.3s ease;
    }
    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg.ai {
      align-self: flex-start;
    }
    @keyframes msgFadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface-canvas);
    }
    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .msg.user .msg-avatar {
      background: var(--color-sky-soft);
      color: #fff;
    }
    .msg-bubble {
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--color-sky-soft);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.ai .msg-bubble {
      background: var(--surface-card);
      color: var(--color-warm-cream);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(44,24,16,0.06);
    }

    /* Input bar */
    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      background: var(--surface-card);
      border-top: 1px solid var(--color-cork-shadow);
    }
    .chat-input {
      flex: 1;
      padding: 12px 18px;
      border: 1.5px solid var(--color-cork-shadow);
      border-radius: var(--radius-full);
      font-size: 14px;
      font-family: var(--font-cn);
      background: var(--surface-canvas);
      color: var(--color-warm-cream);
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus {
      border-color: var(--color-burnt-sienna);
    }
    .chat-input::placeholder {
      color: var(--color-cork-shadow);
    }
    .chat-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-family: var(--font-cn);
    }
    .chat-btn svg { width: 20px; height: 20px; }
    .mic-btn {
      background: var(--surface-canvas);
      color: var(--color-grey-brown);
      border: 1.5px solid var(--color-cork-shadow);
    }
    .mic-btn.recording {
      background: var(--color-rose-bud);
      color: #fff;
      border-color: var(--color-rose-bud);
      animation: pulseGlow 1s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192,80,90,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(192,80,90,0); }
    }
    .send-btn {
      background: var(--color-burnt-sienna);
      color: #fff;
    }
    .send-btn:hover {
      background: #b03a00;
    }
    .send-btn:disabled {
      background: var(--color-cork-shadow);
      cursor: default;
    }

    /* No character selected notice */
    .no-char-notice {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: var(--color-grey-brown);
      font-size: 16px;
      line-height: 1.8;
    }
    .no-char-notice a {
      color: var(--color-burnt-sienna);
      text-decoration: underline;
      font-weight: 600;
    }

    /* Mobile sidebar toggle */
    .sidebar-toggle {
      display: none;
      position: fixed;
      bottom: 70px;
      left: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--color-burnt-sienna);
      color: #fff;
      border: none;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 2px 12px rgba(200,68,0,0.3);
      align-items: center;
      justify-content: center;
    }
    .sidebar-toggle svg { width: 20px; height: 20px; }

    /* Responsive */
    @media (max-width: 768px) {
      .chat-sidebar {
        display: none;
      }
      .chat-sidebar.open {
        display: flex;
        position: fixed;
        top: var(--nav-height);
        left: 0;
        bottom: 0;
        width: 280px;
        z-index: 30;
        box-shadow: 4px 0 20px rgba(44,24,16,0.15);
      }
      .sidebar-toggle {
        display: flex;
      }
      .msg { max-width: 88%; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <main class="page-wrapper" style="padding-bottom:0;">

    <div class="chat-layout">
      <!-- ====== SIDEBAR ====== -->
      <aside class="chat-sidebar" id="chat-sidebar">
        <!-- Character Info -->
        <div class="card" id="sidebar-char"></div>

        <!-- Daily Question -->
        <div class="card">
          <h3 style="font-size:14px;font-weight:600;color:var(--color-grey-brown);margin:0 0 12px;">每日一问</h3>
          <p class="daily-q-text" id="sidebar-question"></p>
        </div>

        <!-- Quick Topics -->
        <div class="card">
          <h3 style="font-size:14px;font-weight:600;color:var(--color-grey-brown);margin:0 0 12px;">快捷话题</h3>
          <div class="topic-grid" id="topic-grid"></div>
        </div>

        <!-- Clear Chat -->
        <button class="btn btn-ghost" id="clear-chat-btn" style="width:100%;justify-content:center;border:1.5px solid var(--color-cork-shadow);">
          <span data-icon="trash" data-icon-size="16"></span> 清空聊天记录
        </button>
      </aside>

      <!-- ====== CHAT AREA ====== -->
      <div class="chat-area" id="chat-area">
        <!-- No character notice (shown if no character selected) -->
        <div class="no-char-notice" id="no-char-notice" style="display:none;">
          <div>
            <p style="font-size:48px;margin-bottom:16px;">&#129302;</p>
            <p>你还没有选择AI伙伴</p>
            <p>请先 <a href="character-select.html">选择一个AI伙伴</a> 再开始聊天</p>
          </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages"></div>

        <!-- Input Bar -->
        <div class="chat-input-bar" id="input-bar">
          <input type="text" class="chat-input" id="chat-input" placeholder="输入你想问的问题..." autocomplete="off">
          <button class="chat-btn mic-btn" id="mic-btn" title="语音输入"><span data-icon="mic"></span></button>
          <button class="chat-btn send-btn" id="send-btn" title="发送"><span data-icon="send"></span></button>
        </div>
      </div>
    </div>

  </main>
  <div id="bottom-tab-container"></div>

  <!-- Mobile sidebar toggle button -->
  <button class="sidebar-toggle" id="sidebar-toggle" title="侧栏"><span data-icon="menu"></span></button>

  <script src="../js/app.js?v=11"></script>
  <script>
    // ---- V6 Auth Check ----
if (!App.isRegistered()) {
    document.body.innerHTML = App.renderAuthPage();
    window.onAuthSuccess = function() { location.reload(); };
} else {
  App.login();
  // Check onboarding for new users
  if (App.shouldShowOnboarding()) {
    window.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'onboarding-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,0.2);text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🎉</div>' +
        '<h2 style="font-family:var(--font-display);font-size:22px;color:var(--color-warm-cream);margin:0 0 8px;">欢迎加入AI家庭日！</h2>' +
        '<p style="color:var(--color-grey-brown);font-size:14px;margin:0 0 24px;">' + (App.getUser().nickname || '') + '，让我们开始你的家庭AI之旅吧！<br>只需3步即可开始：</p>' +
        '<div style="text-align:left;margin:0 0 24px;">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">1</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">创建你的家庭AI学习计划</div><div style="font-size:12px;color:var(--color-grey-brown);">AI为你定制专属12周学习路径</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-amber-glow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">2</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">选择你的AI伙伴</div><div style="font-size:12px;color:var(--color-grey-brown);">10个经典角色陪你学习</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-sky-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">3</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">开始探索和创作</div><div style="font-size:12px;color:var(--color-grey-brown);">聊天、漫画、3D、视频等你来玩</div></div></div>' +
        '</div>' +
        '<a href="family-plan.html" class="btn btn-primary" style="display:inline-block;padding:12px 32px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(200,68,0,0.3);">开始定制计划 →</a>' +
        '<button onclick="document.getElementById(\'onboarding-overlay\').remove();App.completeOnboarding();" style="display:block;margin:12px auto 0;background:none;border:none;color:var(--color-grey-brown);cursor:pointer;font-size:13px;">稍后再说</button>' +
        '</div>';
      document.body.appendChild(overlay);
    });
  }
    // ---- Render common UI ----
    Icons.init();
    document.getElementById('nav-container').innerHTML = App.renderNav('home');
    document.getElementById('bottom-tab-container').innerHTML = App.renderBottomTab('home');

    // ---- References ----
    var messagesEl = document.getElementById('chat-messages');
    var inputEl = document.getElementById('chat-input');
    var sendBtn = document.getElementById('send-btn');
    var micBtn = document.getElementById('mic-btn');
    var clearBtn = document.getElementById('clear-chat-btn');
    var noCharNotice = document.getElementById('no-char-notice');
    var inputBar = document.getElementById('input-bar');

    // ---- Page-local chat history (no localStorage, just JS variable) ----
    var chatHistory = [];
    var recentUserMsgs = [];
    var isRecording = false;
    var recognition = null;
    var isSending = false;

    // ---- Character Info via App API ----
    var character = App.getSelectedCharacter();

    function renderSidebarChar() {
      var el = document.getElementById('sidebar-char');
      if (character) {
        el.innerHTML =
          '<div class="char-info-avatar"><img src="' + character.image + '" alt="' + character.name + '"></div>' +
          '<div class="char-info-name">' + character.name + '</div>' +
          '<div class="char-info-desc">' + character.description + '</div>';
        noCharNotice.style.display = 'none';
        inputBar.style.display = 'flex';
      } else {
        el.innerHTML = '<div class="char-info-avatar" style="background:var(--surface-canvas);display:flex;align-items:center;justify-content:center;font-size:48px;">&#129302;</div><div class="char-info-name" style="color:var(--color-grey-brown);">未选择伙伴</div><div class="char-info-desc"><a href="character-select.html" style="color:var(--color-burnt-sienna);text-decoration:none;font-weight:600;">去选择 &#8594;</a></div>';
        noCharNotice.style.display = 'flex';
        inputBar.style.display = 'none';
      }
    }
    renderSidebarChar();

    // ---- Daily Question via App API ----
    document.getElementById('sidebar-question').textContent = App.getDailyQuestion();

    // ---- Quick Topics (8 buttons) ----
    var topics = ['科学', '太空', '恐龙', '动物', '数学', 'AI', '手工', '魔法'];
    var topicGrid = document.getElementById('topic-grid');
    topics.forEach(function(topic) {
      var btn = document.createElement('button');
      btn.className = 'btn btn-ghost btn-sm';
      btn.textContent = topic;
      btn.addEventListener('click', function() {
        sendMessage('我想了解关于' + topic + '的知识');
        document.getElementById('chat-sidebar').classList.remove('open');
      });
      topicGrid.appendChild(btn);
    });

    // ---- Send Message ----
    function sendMessage(text) {
      if (!text || !text.trim() || isSending) return;
      text = text.trim();

      if (!character) {
        App.showToast('请先选择一个AI伙伴');
        return;
      }

      isSending = true;
      inputEl.value = '';

      // User message
      appendMessageDOM('user', text, true);
      chatHistory.push({ role: 'user', text: text });

      // Track recent user messages (last 3)
      recentUserMsgs.push(text);
      if (recentUserMsgs.length > 3) recentUserMsgs.shift();

      // Show typing indicator
      var typingEl = appendTypingIndicator();

      // Simulate AI typing delay, then call App API
      setTimeout(function() {
        typingEl.remove();

        var response = App.getAIResponse(text, recentUserMsgs);
        appendMessageDOM('ai', response, true);
        chatHistory.push({ role: 'ai', text: response });

        // Points check via App API
        if (App.canEarnChatPoints()) {
          App.addPoints('learning', 10, 'AI对话学习');
          App.showToast('+10 学习积分');
        }

        isSending = false;
        scrollChatBottom();
      }, 600 + Math.random() * 800);

      scrollChatBottom();
    }

    function appendMessageDOM(role, text, animate) {
      var msgDiv = document.createElement('div');
      msgDiv.className = 'msg ' + role;
      if (!animate) {
        msgDiv.style.animation = 'none';
        msgDiv.style.opacity = '1';
      }
      var avatarContent = role === 'user' ? '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--color-sky-soft);color:#fff;font-size:16px;font-weight:600;">&#25105;</div>' : (character ? '<img src="' + character.image + '" alt="' + character.name + '">' : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;">&#129302;</div>');
      msgDiv.innerHTML =
        '<div class="msg-avatar">' + avatarContent + '</div>' +
        '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
      messagesEl.appendChild(msgDiv);
      return msgDiv;
    }

    function appendTypingIndicator() {
      var msgDiv = document.createElement('div');
      msgDiv.className = 'msg ai';
      msgDiv.innerHTML =
        '<div class="msg-avatar">' + (character ? '<img src="' + character.image + '" alt="' + character.name + '">' : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;">&#129302;</div>') + '</div>' +
        '<div class="msg-bubble" style="color:var(--color-grey-brown);font-style:italic;">&#27441;&#25110;&#21160;&#20013;...</div>';
      messagesEl.appendChild(msgDiv);
      scrollChatBottom();
      return msgDiv;
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    function scrollChatBottom() {
      requestAnimationFrame(function() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    // ---- Send Button ----
    sendBtn.addEventListener('click', function() {
      sendMessage(inputEl.value);
    });
    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    // ---- Clear Chat ----
    clearBtn.addEventListener('click', function() {
      if (messagesEl.children.length === 0) return;
      chatHistory = [];
      recentUserMsgs = [];
      messagesEl.innerHTML = '';
      App.showToast('聊天记录已清空');
    });

    // ---- Voice Input (Web Speech API) ----
    (function() {
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        micBtn.style.display = 'none';
        return;
      }
      recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onresult = function(event) {
        var transcript = event.results[0][0].transcript;
        inputEl.value = transcript;
        stopRecording();
        setTimeout(function() {
          sendMessage(transcript);
        }, 300);
      };
      recognition.onerror = function() {
        stopRecording();
        App.showToast('语音识别失败，请重试');
      };
      recognition.onend = function() {
        stopRecording();
      };
    })();

    micBtn.addEventListener('click', function() {
      if (!recognition) {
        App.showToast('你的浏览器不支持语音识别');
        return;
      }
      if (isRecording) {
        recognition.stop();
        stopRecording();
      } else {
        try {
          recognition.start();
          isRecording = true;
          micBtn.classList.add('recording');
          micBtn.innerHTML = Icons.mic();
          App.showToast('正在录音...');
        } catch(e) {
          App.showToast('语音识别启动失败');
        }
      }
    });

    function stopRecording() {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.innerHTML = Icons.mic();
    }

    // ---- Mobile sidebar toggle ----
    document.getElementById('sidebar-toggle').addEventListener('click', function() {
      document.getElementById('chat-sidebar').classList.toggle('open');
    });
    document.addEventListener('click', function(e) {
      var sidebar = document.getElementById('chat-sidebar');
      var toggle = document.getElementById('sidebar-toggle');
      if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
        if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
          sidebar.classList.remove('open');
        }
      }
    });
  } // end auth check else
</script>
</body>
</html>
