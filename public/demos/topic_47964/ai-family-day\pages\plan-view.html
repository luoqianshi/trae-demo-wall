<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习计划 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/design-tokens.css?v=5" rel="stylesheet">
  <link href="../css/components.css?v=5" rel="stylesheet">
  <script src="../css/icons.js?v=5"></script>
  <style>

    .card-bg { background: var(--surface-card); border-radius: var(--radius-lg); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

    /* Progress bar segments */
    .progress-segment {
      transition: all 0.3s ease; cursor: pointer; flex: 1; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .progress-segment:hover { transform: scaleY(1.3); }
    .progress-segment.current {
      background-color: var(--color-amber-glow) !important;
      box-shadow: 0 0 8px rgba(212, 136, 32, 0.5);
      animation: pulse-segment 2s ease-in-out infinite;
    }
    .progress-segment.completed { background-color: var(--color-mint-leaf) !important; }
    .progress-segment.future { background-color: var(--color-cork-shadow) !important; opacity: 0.5; }

    @keyframes pulse-segment {
      0%, 100% { box-shadow: 0 0 6px rgba(212, 136, 32, 0.4); }
      50% { box-shadow: 0 0 14px rgba(212, 136, 32, 0.7); }
    }

    /* Session card */
    .session-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .session-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(44, 24, 16, 0.1); }

    /* Timeline */
    .timeline-row { transition: background-color 0.2s ease; cursor: pointer; }
    .timeline-row:hover { background-color: rgba(212, 136, 32, 0.05); }
    .timeline-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .timeline-detail.expanded { max-height: 300px; }

    /* Difficulty badge */
    .badge-easy { background-color: #e8f5e9; color: #2e7d32; }
    .badge-medium { background-color: #fff3e0; color: #e65100; }
    .badge-challenge { background-color: #fce4ec; color: #c62828; }
    .badge-advanced { background-color: #ede7f6; color: #6a1b9a; }

    /* Section divider */
    .section-divider {
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--color-amber-glow), var(--color-burnt-sienna), var(--color-amber-glow), transparent);
      margin: 2rem auto; width: 60%; border-radius: var(--radius-full);
    }

    /* Small action buttons */
    .btn-done { background: var(--color-mint-leaf); color: #fff; }
    .btn-mark { background: none; border: 1px solid var(--color-burnt-sienna); color: var(--color-burnt-sienna); }
    .btn-mark:hover { background: var(--color-burnt-sienna); color: #fff; }
    .btn-go { background: var(--color-sky-soft); color: #fff; }
    .btn-go:hover { opacity: 0.9; }

    @media (max-width: 768px) {
      .card-bg { padding: 12px !important; }
      #progress-bar { height: 24px; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body class="page-wrapper">
  <div id="nav-container"></div>
  <main>
    <div class="page-container" style="max-width:640px;">

      <!-- Page Title -->
      <div class="page-hero">
        <h1><span data-icon="calendar"></span> 学习计划</h1>
        <p id="plan-subtitle">你的12周AI学习之旅</p>
      </div>

      <!-- ===== Empty State ===== -->
      <div id="empty-state" class="empty-state" style="display:none;">
        <div style="text-align:center;padding:60px 20px;">
          <div style="font-size:64px;margin-bottom:16px;">📅</div>
          <h2 style="font-family:var(--font-display);font-size:24px;color:var(--color-warm-cream);margin:0 0 8px;">你还没有家庭计划</h2>
          <p style="color:var(--color-grey-brown);margin:0 0 8px;max-width:400px;margin-left:auto;margin-right:auto;">完成家庭评估，AI将为你生成专属的12周AI学习计划</p>
          <p style="color:var(--color-grey-brown);font-size:13px;margin:0 0 24px;">计划包含每周学习主题、推荐活动、积分目标</p>
          <a href="family-plan.html" class="btn btn-primary btn-lg" style="display:inline-block;padding:14px 36px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:16px;box-shadow:0 4px 16px rgba(200,68,0,0.3);">开始创建AI学习计划 →</a>
        </div>
      </div>

      <!-- ===== Plan Content (hidden by default) ===== -->
      <div id="plan-content" style="display:none;">

        <!-- Plan Header -->
        <div class="card card-bg" style="padding:16px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;">
          <div>
            <span style="font-size:13px;color:var(--color-grey-brown);" id="plan-family-name"></span>
            <h2 style="font-size:18px;font-weight:700;margin:4px 0 0;">12周AI学习之旅</h2>
          </div>
          <div style="text-align:right;">
            <span style="font-size:12px;color:var(--color-grey-brown);">创建于</span>
            <p style="font-size:14px;font-weight:500;margin:2px 0 0;" id="plan-date"></p>
          </div>
        </div>

        <!-- ===== 12-Week Progress Bar ===== -->
        <div class="card card-bg" style="padding:16px;margin-bottom:24px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <h3 class="section-title" style="font-size:14px;margin:0;"><span data-icon="barChart" data-icon-size="16"></span> 12周进度</h3>
            <span style="font-size:12px;color:var(--color-grey-brown);" id="progress-label"></span>
          </div>
          <div id="progress-bar" style="display:flex;gap:4px;border-radius:8px;overflow:hidden;height:32px;"></div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;">
            <span style="font-size:10px;color:var(--color-grey-brown);">第1周</span>
            <span style="font-size:10px;color:var(--color-grey-brown);">第12周</span>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- ===== Current Week Detail Card ===== -->
        <div id="current-week-card" style="margin-bottom:24px;"></div>

        <div class="section-divider"></div>

        <!-- ===== 12-Week Timeline ===== -->
        <div class="card card-bg" style="overflow:hidden;margin-bottom:24px;">
          <div style="padding:16px;display:flex;align-items:center;justify-content:space-between;">
            <h3 class="section-title" style="font-size:14px;margin:0;"><span data-icon="barChart" data-icon-size="16"></span> 12周时间线</h3>
            <button id="btn-expand-all" onclick="toggleExpandAll()" style="background:none;border:none;color:var(--color-burnt-sienna);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-cn);text-decoration:underline;">
              查看完整计划
            </button>
          </div>
          <div id="timeline" style="border-top:1px solid rgba(196,181,164,0.2);"></div>
        </div>

      </div><!-- /plan-content -->
    </div>
  </main>
  <div id="footer-container"></div>
  <div id="bottom-tab-container"></div>

  <script src="../js/app.js?v=11"></script>
  <script>
    // ---- V6 Auth Check ----
if (!App.isRegistered()) {
    document.body.innerHTML = App.renderAuthPage();
    window.onAuthSuccess = function() { location.reload(); };
} else {
  App.login();
  // Check onboarding for new users
  if (App.shouldShowOnboarding()) {
    window.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'onboarding-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,0.2);text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🎉</div>' +
        '<h2 style="font-family:var(--font-display);font-size:22px;color:var(--color-warm-cream);margin:0 0 8px;">欢迎加入AI家庭日！</h2>' +
        '<p style="color:var(--color-grey-brown);font-size:14px;margin:0 0 24px;">' + (App.getUser().nickname || '') + '，让我们开始你的家庭AI之旅吧！<br>只需3步即可开始：</p>' +
        '<div style="text-align:left;margin:0 0 24px;">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">1</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">创建你的家庭AI学习计划</div><div style="font-size:12px;color:var(--color-grey-brown);">AI为你定制专属12周学习路径</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-amber-glow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">2</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">选择你的AI伙伴</div><div style="font-size:12px;color:var(--color-grey-brown);">10个经典角色陪你学习</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-sky-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">3</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">开始探索和创作</div><div style="font-size:12px;color:var(--color-grey-brown);">聊天、漫画、3D、视频等你来玩</div></div></div>' +
        '</div>' +
        '<a href="family-plan.html" class="btn btn-primary" style="display:inline-block;padding:12px 32px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(200,68,0,0.3);">开始定制计划 →</a>' +
        '<button onclick="document.getElementById(\'onboarding-overlay\').remove();App.completeOnboarding();" style="display:block;margin:12px auto 0;background:none;border:none;color:var(--color-grey-brown);cursor:pointer;font-size:13px;">稍后再说</button>' +
        '</div>';
      document.body.appendChild(overlay);
    });
  }
    // Render nav/footer/bottom-tab via App API
    Icons.init();
    document.getElementById('nav-container').innerHTML = App.renderNav('plan');
    document.getElementById('footer-container').innerHTML = App.renderFooter();
    document.getElementById('bottom-tab-container').innerHTML = App.renderBottomTab('plan');

    /* ---- State ---- */
    var plan = null;
    var currentWeekIndex = 0;
    var allExpanded = false;
    var expandedWeeks = {};

    /* ---- Init ---- */
    (function init() {
      loadPlan();
    })();

    /* ---- Load Plan ---- */
    function loadPlan() {
      plan = App.getPlan();

      if (!plan || !plan.weeks || plan.weeks.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('plan-content').style.display = 'none';
        return;
      }

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('plan-content').style.display = 'block';

      currentWeekIndex = App.getCurrentWeekIndex();

      renderPlanHeader();
      renderProgressBar();
      renderCurrentWeek();
      renderTimeline();

      // Add weekly progress tracking summary at top
      if (plan && plan.weeks) {
        var completedSessions = 0;
        var totalSessions = 0;
        plan.weeks.forEach(function(w) {
          totalSessions += 2; // 2 sessions per week
          if (w.sessions) {
            w.sessions.forEach(function(s) {
              if (s.done) completedSessions++;
            });
          }
        });
        var progressPct = totalSessions > 0 ? Math.round(completedSessions / totalSessions * 100) : 0;
        var planContent = document.getElementById('plan-content');
        if (planContent) {
          var progressHtml = '<div style="background:var(--surface-card);border-radius:var(--radius-md);padding:16px;margin-bottom:20px;box-shadow:var(--shadow-sm);">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
            '<span style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">📋 学习进度</span>' +
            '<span style="font-size:13px;color:var(--color-primary);font-weight:600;">' + completedSessions + '/' + totalSessions + ' 节课 (' + progressPct + '%)</span></div>' +
            '<div style="height:8px;background:rgba(196,181,164,0.2);border-radius:4px;overflow:hidden;">' +
            '<div style="height:100%;width:' + progressPct + '%;background:linear-gradient(90deg,var(--color-primary),var(--color-amber-glow));border-radius:4px;transition:width 0.5s;"></div></div></div>';
          planContent.insertAdjacentHTML('afterbegin', progressHtml);
        }
      }
    }

    /* ---- Render Plan Header ---- */
    function renderPlanHeader() {
      var assessment = App.getAssessment();
      var name = assessment ? assessment.nickname : '我的家庭';
      document.getElementById('plan-family-name').textContent = name + ' 的学习计划';

      if (plan.created) {
        var d = new Date(plan.created);
        document.getElementById('plan-date').textContent = d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
      }
    }

    /* ---- Render Progress Bar ---- */
    function renderProgressBar() {
      var container = document.getElementById('progress-bar');
      var html = '';
      var completedCount = 0;

      for (var i = 0; i < 12; i++) {
        var week = plan.weeks[i];
        var status = 'future';
        var allDone = false;

        // Check if all sessions done
        if (week && week.sessions) {
          allDone = true;
          for (var s = 0; s < week.sessions.length; s++) {
            if (!App.isSessionDone(i, s)) { allDone = false; break; }
          }
        }

        if (allDone) {
          status = 'completed';
          completedCount++;
        } else if (i === currentWeekIndex) {
          status = 'current';
        } else if (i < currentWeekIndex) {
          status = 'completed';
          completedCount++;
        }

        html += '<div class="progress-segment ' + status + '" title="第' + (i + 1) + '周" onclick="scrollToWeek(' + i + ')" style="height:100%;">' +
          '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.85);">' + (i + 1) + '</div>' +
        '</div>';
      }

      container.innerHTML = html;
      document.getElementById('progress-label').textContent = '已完成 ' + completedCount + '/12 周';
    }

    /* ---- Render Current Week Detail ---- */
    function renderCurrentWeek() {
      var container = document.getElementById('current-week-card');
      var week = plan.weeks[currentWeekIndex];
      if (!week) return;

      // Theme comes from plan.weeks[i].theme which is {label, emoji, desc} from WEEK_THEMES
      var theme = week.theme || { label: '第' + (currentWeekIndex + 1) + '周', emoji: '&#x1F4C5;', desc: '' };
      var themeLabel = theme.emoji + ' ' + theme.label;

      var html = '';
      html += '<div class="card-bg" style="padding:20px;border:2px solid var(--color-amber-glow);box-shadow:0 4px 16px rgba(44,24,16,0.1);">';
      html += '  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">';
      html += '    <div>';
      html += '      <span style="font-size:12px;font-weight:700;color:var(--color-amber-glow);background:rgba(212,136,32,0.1);padding:2px 10px;border-radius:var(--radius-full);">当前周</span>';
      html += '      <h2 style="font-size:20px;font-weight:700;margin:4px 0 0;">第' + (currentWeekIndex + 1) + '周</h2>';
      html += '    </div>';
      html += '    <div style="font-size:32px;">' + theme.emoji + '</div>';
      html += '  </div>';
      html += '  <h3 style="font-size:17px;font-weight:600;color:var(--color-burnt-sienna);margin:0 0 4px;">' + themeLabel + '</h3>';
      if (theme.desc) {
        html += '  <p style="font-size:14px;color:var(--color-grey-brown);margin:0 0 16px;">' + escapeHtml(theme.desc) + '</p>';
      }

      // Session cards
      if (week.sessions && week.sessions.length > 0) {
        html += '  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
        for (var s = 0; s < week.sessions.length; s++) {
          var session = week.sessions[s];
          var done = App.isSessionDone(currentWeekIndex, s);
          var activity = session.activity || {};
          var diffBadge = getDifficultyBadge(activity.difficulty);

          html += '    <div class="session-card card-bg" style="padding:16px;">';
          html += '      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">';
          html += '        <h4 style="font-size:14px;font-weight:600;margin:0;">' + escapeHtml(activity.title || session.categoryLabel || '') + '</h4>';
          if (done) {
            html += '        <span style="font-size:12px;font-weight:700;color:var(--color-mint-leaf);">&#x2705; 已完成</span>';
          }
          html += '      </div>';
          html += '      <p style="font-size:12px;color:var(--color-grey-brown);margin:0 0 12px;">' + escapeHtml(activity.desc || '') + '</p>';
          html += '      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">';
          if (activity.duration) {
            html += '        <span style="font-size:10px;color:var(--color-grey-brown);background:var(--surface-canvas);padding:2px 8px;border-radius:var(--radius-full);">&#x23F1; ' + escapeHtml(activity.duration) + '</span>';
          }
          if (activity.difficulty) {
            html += '        <span class="badge btn-sm ' + diffBadge + '" style="cursor:default;">' + escapeHtml(activity.difficulty) + '</span>';
          }
          html += '      </div>';
          if (!done) {
            html += '      <div style="display:flex;gap:8px;">';
            html += '        <a href="ai-chat.html" class="btn btn-sm btn-go">去完成</a>';
            html += '        <button onclick="markComplete(' + currentWeekIndex + ', ' + s + ')" class="btn btn-sm btn-mark">标记完成</button>';
            html += '      </div>';
          }
          html += '    </div>';
        }
        html += '  </div>';
      }

      // Weekly courses
      var coursesForWeek = App.WEEKLY_COURSES.filter(function(c) { return c.week === currentWeekIndex; });
      // If no exact week match, fall back to phase match
      if (coursesForWeek.length === 0 && week.theme) {
        var weekInPhase = currentWeekIndex % 3;
        coursesForWeek = App.WEEKLY_COURSES.filter(function(c) { return c.week === currentWeekIndex - weekInPhase; });
      }
      if (coursesForWeek.length > 0 && coursesForWeek[0].courses) {
        var courses = coursesForWeek[0].courses;
        html += '  <div style="margin-top:20px;">';
        html += '    <h3 style="font-size:14px;font-weight:600;margin:0 0 12px;color:var(--color-brown);">&#x1F4DA; 推荐课程</h3>';
        html += '    <div style="display:flex;flex-direction:column;gap:8px;">';
        for (var c = 0; c < courses.length; c++) {
          var course = courses[c];
          var courseIcon = course.type === 'video' ? '🎬' : '📄';
          var courseTypeLabel = course.type === 'video' ? (course.duration || '') : (course.readTime || '');
          html += '      <div onclick="App.showToast(\'课程开发中，敬请期待！\')" style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface-card);border-radius:var(--radius-md);cursor:pointer;border:1px solid var(--color-grey-cloud);transition:transform 0.15s ease,box-shadow 0.15s ease;" onmouseenter="this.style.transform=\'translateY(-1px)\';this.style.boxShadow=\'0 4px 12px rgba(44,24,16,0.08)\';" onmouseleave="this.style.transform=\'none\';this.style.boxShadow=\'none\';">';
          html += '        <div style="width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;' + (course.type === 'video' ? 'background:linear-gradient(135deg,#FF6B6B,#FF8E53);' : 'background:linear-gradient(135deg,#4ECDC4,#556270);') + '">' + courseIcon + '</div>';
          html += '        <div style="flex:1;min-width:0;">';
          html += '          <div style="font-size:13px;font-weight:600;color:var(--color-brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(course.title) + '</div>';
          html += '          <div style="font-size:11px;color:var(--color-grey-brown);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(course.desc) + '</div>';
          html += '        </div>';
          html += '        <div style="text-align:right;flex-shrink:0;">';
          html += '          <span style="font-size:10px;color:var(--color-grey-brown);background:var(--surface-canvas);padding:2px 8px;border-radius:var(--radius-full);">' + escapeHtml(courseTypeLabel) + '</span>';
          html += '          <div style="font-size:10px;color:var(--color-grey-brown);margin-top:4px;">' + escapeHtml(course.source || 'AI家庭日') + '</div>';
          html += '        </div>';
          html += '      </div>';
        }
        html += '    </div>';
        html += '  </div>';
      }

      html += '</div>';
      container.innerHTML = html;
    }

    /* ---- Render Timeline ---- */
    function renderTimeline() {
      var container = document.getElementById('timeline');
      var html = '';

      for (var i = 0; i < plan.weeks.length; i++) {
        var week = plan.weeks[i];
        var theme = week.theme || { label: '第' + (i + 1) + '周', emoji: '&#x1F4C5;', desc: '' };
        var isCurrent = (i === currentWeekIndex);

        // Expand current and nearby weeks by default
        var shouldExpand = isCurrent || expandedWeeks[i];

        html += '<div class="timeline-row" onclick="toggleTimelineWeek(' + i + ')" style="border-bottom:1px solid rgba(196,181,164,0.2);">';
        html += '  <div style="padding:12px 16px;display:flex;align-items:center;gap:12px;">';

        // Week indicator dot
        if (isWeekCompleted(i)) {
          html += '    <span style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--color-mint-leaf);color:#fff;flex-shrink:0;">&#x2713;</span>';
        } else if (isCurrent) {
          html += '    <span style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--color-amber-glow);color:#fff;flex-shrink:0;">' + (i + 1) + '</span>';
        } else {
          html += '    <span style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(196,181,164,0.4);color:var(--color-grey-brown);flex-shrink:0;">' + (i + 1) + '</span>';
        }

        // Theme emoji and label
        html += '    <span style="font-size:18px;">' + theme.emoji + '</span>';
        html += '    <div style="flex:1;min-width:0;">';
        html += '      <p style="font-size:14px;font-weight:500;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(theme.label) + '</p>';

        // Session status
        if (week.sessions && week.sessions.length > 0) {
          var doneCount = 0;
          for (var s = 0; s < week.sessions.length; s++) {
            if (App.isSessionDone(i, s)) doneCount++;
          }
          html += '      <p style="font-size:11px;color:var(--color-grey-brown);margin:2px 0 0;">' + doneCount + '/' + week.sessions.length + ' 个活动已完成</p>';
        }
        html += '    </div>';

        // Expand arrow
        var arrow = shouldExpand ? '&#x25BC;' : '&#x25B6;';
        html += '    <span style="font-size:11px;color:var(--color-grey-brown);">' + arrow + '</span>';
        html += '  </div>';

        // Expandable detail
        html += '  <div class="timeline-detail ' + (shouldExpand ? 'expanded' : '') + '" id="timeline-detail-' + i + '">';
        html += '    <div style="padding:0 16px 12px 56px;">';
        if (week.sessions && week.sessions.length > 0) {
          for (var s = 0; s < week.sessions.length; s++) {
            var session = week.sessions[s];
            var done = App.isSessionDone(i, s);
            var actTitle = (session.activity && session.activity.title) || (session.categoryLabel || '活动 ' + (s + 1));
            html += '      <div style="display:flex;align-items:center;gap:8px;padding:4px 0;">';
            html += '        <span style="font-size:12px;color:' + (done ? 'var(--color-mint-leaf)' : 'var(--color-grey-brown)') + ';">' + (done ? '&#x2705;' : '&#x25CB;') + '</span>';
            html += '        <span style="font-size:13px;color:' + (done ? 'var(--color-grey-brown)' : 'var(--color-warm-cream)') + ';' + (done ? 'text-decoration:line-through;' : '') + '">' + escapeHtml(actTitle) + '</span>';
            if (!done) {
              html += '        <button onclick="event.stopPropagation(); markComplete(' + i + ', ' + s + ')" class="btn btn-sm btn-mark" style="margin-left:auto;">完成</button>';
            }
            html += '      </div>';
          }
        }
        if (theme.desc) {
          html += '      <p style="font-size:11px;color:var(--color-grey-brown);margin:4px 0 0;font-style:italic;">&#x1F3AF; ' + escapeHtml(theme.desc) + '</p>';
        }
        html += '    </div>';
        html += '  </div>';
        html += '</div>';
      }

      container.innerHTML = html;
    }

    /* ---- Toggle Timeline Week ---- */
    function toggleTimelineWeek(weekIdx) {
      expandedWeeks[weekIdx] = !expandedWeeks[weekIdx];
      renderTimeline();
    }

    /* ---- Toggle Expand All ---- */
    function toggleExpandAll() {
      allExpanded = !allExpanded;
      var btn = document.getElementById('btn-expand-all');
      if (allExpanded) {
        for (var i = 0; i < 12; i++) expandedWeeks[i] = true;
        btn.textContent = '收起完整计划';
      } else {
        for (var i = 0; i < 12; i++) expandedWeeks[i] = false;
        btn.textContent = '查看完整计划';
      }
      renderTimeline();
    }

    /* ---- Scroll to Week ---- */
    function scrollToWeek(weekIdx) {
      expandedWeeks[weekIdx] = true;
      renderTimeline();
      setTimeout(function() {
        var rows = document.querySelectorAll('.timeline-row');
        if (rows[weekIdx]) {
          rows[weekIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    }

    /* ---- Mark Session Complete ---- */
    function markComplete(weekIdx, sessionIdx) {
      App.completeSession(weekIdx, sessionIdx);
      App.addPoints('learning', 20, '完成活动');

      // Re-render all sections
      renderProgressBar();
      renderCurrentWeek();
      renderTimeline();
    }

    /* ---- Check if week is completed ---- */
    function isWeekCompleted(weekIdx) {
      var week = plan.weeks[weekIdx];
      if (!week || !week.sessions) return false;
      for (var s = 0; s < week.sessions.length; s++) {
        if (!App.isSessionDone(weekIdx, s)) return false;
      }
      return true;
    }

    /* ---- Helpers ---- */
    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getDifficultyBadge(difficulty) {
      switch ((difficulty || '').trim()) {
        case '入门': case '简单': return 'badge-easy';
        case '基础': case '中等': return 'badge-medium';
        case '进阶': case '挑战': return 'badge-challenge';
        case '高级': return 'badge-advanced';
        default: return 'badge-medium';
      }
    }
  } // end auth check else
</script>
</body>
</html>
