<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D模型工坊 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/design-tokens.css?v=5" rel="stylesheet">
  <link href="../css/components.css?v=5" rel="stylesheet">
  <script src="../css/icons.js?v=5"></script>
  <style>
    .model-thumb { width:80px;height:80px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-lg);cursor:pointer;transition:all 0.3s;border:3px solid transparent;background:var(--surface-card);font-size:36px;box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .model-thumb:hover { transform:scale(1.08);box-shadow:0 4px 16px rgba(0,0,0,0.12); }
    .model-thumb.selected { border-color:var(--color-burnt-sienna);background:rgba(200,68,0,0.08); }

    .cube-scene { perspective:800px;width:220px;height:220px;margin:0 auto; }
    .cube-container { width:200px;height:200px;position:relative;transform-style:preserve-3d;margin:10px auto;transition:transform 0.1s linear; }

    .cube-face { position:absolute;width:200px;height:200px;display:flex;align-items:center;justify-content:center;font-size:72px;border:2px solid rgba(0,0,0,0.1);backface-visibility:visible; }

    .control-btn { padding:8px 16px;border-radius:var(--radius-full);font-size:13px;cursor:pointer;font-family:var(--font-cn);border:2px solid var(--color-cork-shadow);background:var(--surface-card);color:var(--color-warm-cream);transition:all 0.2s; }
    .control-btn:hover { border-color:var(--color-burnt-sienna); }
    .control-btn.active { background:var(--color-burnt-sienna);color:white;border-color:var(--color-burnt-sienna); }

    .color-swatch { width:36px;height:36px;border-radius:50%;cursor:pointer;transition:all 0.2s;border:3px solid transparent; }
    .color-swatch:hover { transform:scale(1.15); }
    .color-swatch.selected { border-color:var(--color-warm-cream);box-shadow:0 0 0 2px var(--color-burnt-sienna); }

    .print-btn { background:var(--color-burnt-sienna);color:white;border:none;padding:16px 40px;border-radius:var(--radius-full);font-size:18px;font-weight:700;cursor:pointer;font-family:var(--font-cn);box-shadow:0 6px 24px rgba(200,68,0,0.35);transition:all 0.2s; }
    .print-btn:hover { transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,68,0,0.4); }
    .print-btn:disabled { opacity:0.6;cursor:not-allowed;transform:none; }

    @keyframes printPulse {
      0%,100% { box-shadow:0 0 0 0 rgba(200,68,0,0.4); }
      50% { box-shadow:0 0 0 12px rgba(200,68,0,0); }
    }
    .printing .cube-container { animation: printPulse 1s ease-in-out infinite; }

    .studio-layout { display:grid;grid-template-columns:200px 1fr 220px;gap:24px;align-items:start; }
    @media (max-width:768px) {
      .studio-layout { grid-template-columns:1fr; }
      .model-thumb { width:60px;height:60px;font-size:28px; }
      .cube-scene { width:180px;height:180px; }
      .cube-container { width:160px;height:160px; }
      .cube-face { width:160px;height:160px;font-size:56px; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body class="page-wrapper">
  <div id="nav-container"></div>
  <main>
    <div class="page-container" style="max-width:1000px;">

      <!-- Page Hero -->
      <div class="page-hero">
        <h1><span data-icon="box"></span> 3D模型工坊</h1>
        <p>选择模型、颜色和材质，体验3D打印的乐趣</p>
      </div>

      <!-- Studio Layout -->
      <div class="studio-layout">

        <!-- Left: Model Selection -->
        <div>
          <h3 class="section-title"><span data-icon="box" data-icon-size="16"></span> 选择模型</h3>
          <div id="model-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;"></div>
        </div>

        <!-- Center: 3D Preview -->
        <div style="text-align:center;">
          <h3 class="section-title"><span data-icon="eye" data-icon-size="16"></span> 3D预览</h3>
          <div class="card" style="padding:24px;">
            <div class="cube-scene" id="cube-scene">
              <div class="cube-container" id="cube">
                <div class="cube-face" id="face-front"  style="transform:rotateY(0deg) translateZ(100px);"></div>
                <div class="cube-face" id="face-back"   style="transform:rotateY(180deg) translateZ(100px);"></div>
                <div class="cube-face" id="face-right"  style="transform:rotateY(90deg) translateZ(100px);"></div>
                <div class="cube-face" id="face-left"   style="transform:rotateY(-90deg) translateZ(100px);"></div>
                <div class="cube-face" id="face-top"    style="transform:rotateX(90deg) translateZ(100px);"></div>
                <div class="cube-face" id="face-bottom" style="transform:rotateX(-90deg) translateZ(100px);"></div>
              </div>
            </div>
            <p style="font-size:12px;color:var(--color-grey-brown);margin:12px 0 0;">拖拽旋转模型</p>
          </div>
          <!-- Print Button -->
          <div style="margin-top:24px;">
            <button class="print-btn" id="print-btn" onclick="startPrint()"><span data-icon="zap" data-icon-size="16"></span> 一键3D打印</button>
            <div id="print-status" style="margin-top:12px;font-size:14px;color:var(--color-grey-brown);display:none;"></div>
            <div id="print-share" style="display:none;margin-top:12px;">
              <div style="display:flex;gap:8px;justify-content:center;">
                <button onclick="App.shareToCommunity('MODEL')" style="padding:8px 16px;border:1px solid var(--color-primary);border-radius:20px;background:#fff;color:var(--color-primary);cursor:pointer;font-size:13px;font-weight:500;">📤 分享到社区</button>
                <button onclick="App.shareToWechat('MODEL')" style="padding:8px 16px;border:1px solid #07c160;border-radius:20px;background:#fff;color:#07c160;cursor:pointer;font-size:13px;font-weight:500;">💬 分享到朋友圈</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Control Panel -->
        <div>
          <h3 class="section-title"><span data-icon="settings" data-icon-size="16"></span> 控制面板</h3>
          <div class="card">

            <!-- Color Selection -->
            <div style="margin-bottom:20px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:10px;"><span data-icon="palette" data-icon-size="16"></span> 颜色</div>
              <div id="color-options" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
            </div>

            <!-- Material Selection -->
            <div style="margin-bottom:20px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:10px;">材质</div>
              <div id="material-options" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
            </div>

            <!-- Size Selection -->
            <div style="margin-bottom:20px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:10px;">大小</div>
              <div id="size-options" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
            </div>

            <!-- Reset Button -->
            <button class="btn btn-ghost" onclick="resetSettings()" style="width:100%;color:var(--color-rose-bud);"><span data-icon="rotateCcw" data-icon-size="16"></span> 重置</button>

          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-container"></div>
  <div id="bottom-tab-container"></div>
  <script src="../js/app.js?v=11"></script>
  <script>
    // ---- V6 Auth Check ----
if (!App.isRegistered()) {
    document.body.innerHTML = App.renderAuthPage();
    window.onAuthSuccess = function() { location.reload(); };
} else {
  App.login();
  // Check onboarding for new users
  if (App.shouldShowOnboarding()) {
    window.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'onboarding-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,0.2);text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🎉</div>' +
        '<h2 style="font-family:var(--font-display);font-size:22px;color:var(--color-warm-cream);margin:0 0 8px;">欢迎加入AI家庭日！</h2>' +
        '<p style="color:var(--color-grey-brown);font-size:14px;margin:0 0 24px;">' + (App.getUser().nickname || '') + '，让我们开始你的家庭AI之旅吧！<br>只需3步即可开始：</p>' +
        '<div style="text-align:left;margin:0 0 24px;">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">1</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">创建你的家庭AI学习计划</div><div style="font-size:12px;color:var(--color-grey-brown);">AI为你定制专属12周学习路径</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-amber-glow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">2</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">选择你的AI伙伴</div><div style="font-size:12px;color:var(--color-grey-brown);">10个经典角色陪你学习</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-sky-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">3</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">开始探索和创作</div><div style="font-size:12px;color:var(--color-grey-brown);">聊天、漫画、3D、视频等你来玩</div></div></div>' +
        '</div>' +
        '<a href="family-plan.html" class="btn btn-primary" style="display:inline-block;padding:12px 32px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(200,68,0,0.3);">开始定制计划 →</a>' +
        '<button onclick="document.getElementById(\'onboarding-overlay\').remove();App.completeOnboarding();" style="display:block;margin:12px auto 0;background:none;border:none;color:var(--color-grey-brown);cursor:pointer;font-size:13px;">稍后再说</button>' +
        '</div>';
      document.body.appendChild(overlay);
    });
  }
    Icons.init();
        document.getElementById('nav-container').innerHTML = App.renderNav('create');
    document.getElementById('footer-container').innerHTML = App.renderFooter();
    document.getElementById('bottom-tab-container').innerHTML = App.renderBottomTab('create');

    /* ===== STATE ===== */
    var selectedModel = 0;
    var modelKeys = [];
    var selectedColor = '#c84400';
    var selectedMaterial = 'metal';
    var selectedSize = 'medium';
    var rotX = -25, rotY = 35;
    var isDragging = false, lastX = 0, lastY = 0;
    var isPrinting = false;

    var COLORS = [
      { id:'red', hex:'#c84400', name:'红色' },
      { id:'blue', hex:'#3d8aaa', name:'蓝色' },
      { id:'green', hex:'#4a9a5a', name:'绿色' },
      { id:'yellow', hex:'#d48820', name:'黄色' },
      { id:'purple', hex:'#9b59b6', name:'紫色' },
      { id:'white', hex:'#f5f0eb', name:'白色' },
    ];
    var MATERIALS = [
      { id:'metal', name:'金属', effect:'linear-gradient(135deg,#b0b0b0,#e0e0e0,#b0b0b0)' },
      { id:'wood', name:'木质', effect:'linear-gradient(135deg,#8B4513,#D2691E,#8B4513)' },
      { id:'matte', name:'磨砂', effect:'linear-gradient(135deg,#a0a0a0,#c0c0c0,#a0a0a0)' },
    ];
    var SIZES = [
      { id:'small', name:'小', scale:0.7 },
      { id:'medium', name:'中', scale:1.0 },
      { id:'large', name:'大', scale:1.3 },
    ];

    /* ===== INIT ===== */
    function init() {
      modelKeys = Object.keys(App.MODELS_3D);
      renderModelGrid();
      renderColorOptions();
      renderMaterialOptions();
      renderSizeOptions();
      updateCube();
      setupDrag();
    }

    function renderModelGrid() {
      var grid = document.getElementById('model-grid');
      var html = '';
      modelKeys.forEach(function(key, i) {
        var model = App.MODELS_3D[key];
        html += '<div class="model-thumb ' + (i === selectedModel ? 'selected' : '') + '" onclick="selectModel(' + i + ')" title="' + model.name + '">' + model.emoji + '</div>';
      });
      grid.innerHTML = html;
    }

    function renderColorOptions() {
      var container = document.getElementById('color-options');
      var html = '';
      COLORS.forEach(function(c) {
        html += '<div class="color-swatch ' + (c.hex === selectedColor ? 'selected' : '') + '" style="background:' + c.hex + ';" onclick="selectColor(\'' + c.hex + '\')" title="' + c.name + '"></div>';
      });
      container.innerHTML = html;
    }

    function renderMaterialOptions() {
      var container = document.getElementById('material-options');
      var html = '';
      MATERIALS.forEach(function(m) {
        html += '<button class="control-btn ' + (m.id === selectedMaterial ? 'active' : '') + '" onclick="selectMaterial(\'' + m.id + '\')">' + m.name + '</button>';
      });
      container.innerHTML = html;
    }

    function renderSizeOptions() {
      var container = document.getElementById('size-options');
      var html = '';
      SIZES.forEach(function(s) {
        html += '<button class="control-btn ' + (s.id === selectedSize ? 'active' : '') + '" onclick="selectSize(\'' + s.id + '\')">' + s.name + '</button>';
      });
      container.innerHTML = html;
    }

    /* ===== SELECTION ===== */
    function selectModel(index) {
      selectedModel = index;
      document.querySelectorAll('.model-thumb').forEach(function(el, i) { el.classList.toggle('selected', i === index); });
      updateCube();
    }
    function selectColor(hex) {
      selectedColor = hex;
      renderColorOptions();
      updateCube();
    }
    function selectMaterial(id) {
      selectedMaterial = id;
      renderMaterialOptions();
      updateCube();
    }
    function selectSize(id) {
      selectedSize = id;
      renderSizeOptions();
      updateCube();
    }
    function resetSettings() {
      selectedModel = 0; selectedColor = '#c84400'; selectedMaterial = 'metal'; selectedSize = 'medium';
      rotX = -25; rotY = 35;
      renderModelGrid(); renderColorOptions(); renderMaterialOptions(); renderSizeOptions();
      updateCube();
    }

    /* ===== CUBE RENDERING ===== */
    function updateCube() {
      var key = modelKeys[selectedModel];
      var model = App.MODELS_3D[key];
      var size = SIZES.find(function(s) { return s.id === selectedSize; });
      var cube = document.getElementById('cube');

      cube.style.transform = 'rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg) scale(' + size.scale + ')';
      cube.style.transition = 'transform 0.1s linear';

      var faces = document.querySelectorAll('.cube-face');
      faces.forEach(function(face) {
        face.style.background = 'linear-gradient(135deg, ' + selectedColor + '88, ' + selectedColor + 'cc, ' + selectedColor + '88)';
        face.textContent = model.emoji;
        face.style.boxShadow = selectedMaterial === 'metal' ? 'inset 0 0 30px rgba(255,255,255,0.3), inset 0 0 10px rgba(0,0,0,0.1)' : selectedMaterial === 'wood' ? 'inset 0 0 20px rgba(0,0,0,0.15)' : 'inset 0 0 10px rgba(0,0,0,0.08)';
      });
    }

    /* ===== DRAG ===== */
    function setupDrag() {
      var scene = document.getElementById('cube-scene');
      scene.addEventListener('mousedown', function(e) { isDragging = true; lastX = e.clientX; lastY = e.clientY; e.preventDefault(); });
      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        rotY += (e.clientX - lastX) * 0.5;
        rotX -= (e.clientY - lastY) * 0.5;
        lastX = e.clientX; lastY = e.clientY;
        updateCube();
      });
      document.addEventListener('mouseup', function() { isDragging = false; });

      scene.addEventListener('touchstart', function(e) { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; e.preventDefault(); }, {passive:false});
      document.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        rotY += (e.touches[0].clientX - lastX) * 0.5;
        rotX -= (e.touches[0].clientY - lastY) * 0.5;
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        updateCube();
      });
      document.addEventListener('touchend', function() { isDragging = false; });
    }

    /* ===== 3D PRINT ===== */
    function startPrint() {
      if (isPrinting) return;
      if (!App.spendPoints(25)) { App.showToast('积分不足！需要25积分，去完成任务赚积分吧', 'error'); return; }
      isPrinting = true;
      var btn = document.getElementById('print-btn');
      var status = document.getElementById('print-status');
      var scene = document.getElementById('cube-scene');

      btn.disabled = true;
      btn.innerHTML = Icons.loader(16) + ' 打印中...';
      status.style.display = 'block';
      scene.classList.add('printing');

      var progress = 0;
      var interval = setInterval(function() {
        progress += 1;
        var pct = Math.min(Math.round(progress / 4 * 100), 100);
        status.textContent = '正在打印... ' + pct + '%';
        if (progress >= 4) {
          clearInterval(interval);
          scene.classList.remove('printing');
          btn.disabled = false;
          btn.innerHTML = Icons.zap(16) + ' 一键3D打印';
          status.textContent = '打印完成！';
          status.style.color = 'var(--color-mint-leaf)';
          document.getElementById('print-share').style.display = 'block';
          App.addPoints('creative', 25, '3D打印完成');
          App.createConfetti();
          App.showToast('3D打印完成！+25创作积分');

          // Add save to gallery button
          var printShareDiv = document.getElementById('print-share');
          var existingSaveBtn = document.getElementById('print-save-btn');
          if (existingSaveBtn) existingSaveBtn.remove();
          var saveBtn = document.createElement('button');
          saveBtn.id = 'print-save-btn';
          saveBtn.textContent = '\uD83D\uDCBE 保存到作品集';
          saveBtn.style.cssText = 'margin-top:12px;padding:8px 20px;border:2px solid var(--color-primary);border-radius:20px;background:#fff;color:var(--color-primary);font-size:13px;font-weight:600;cursor:pointer;';
          saveBtn.onclick = function() {
            var key = modelKeys[selectedModel];
            var modelName = App.MODELS_3D[key] ? App.MODELS_3D[key].name : '3D模型';
            App.addToGallery({type:'model', title: modelName + ' 3D作品', date: new Date().toLocaleDateString()});
            App.addPoints('creative', 15, '保存3D模型到作品集');
            var st = App.getState();
            st.modelCount = (st.modelCount || 0) + 1;
            App.checkBadgeUnlocks();
            saveBtn.textContent = '\u2705 已保存';
            saveBtn.disabled = true;
            saveBtn.style.borderColor = '#4a9a5a';
            saveBtn.style.color = '#4a9a5a';
            App.showToast('3D模型已保存到作品集！+15创作积分');
          };
          printShareDiv.parentNode.insertBefore(saveBtn, printShareDiv.nextSibling);

          setTimeout(function() {
            status.style.display = 'none';
            status.style.color = 'var(--color-grey-brown)';
          }, 3000);
          isPrinting = false;
        }
      }, 1000);
    }

    init();
  } // end auth check else
</script>
</body>
</html>
