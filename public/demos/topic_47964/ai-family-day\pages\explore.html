<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI探索中心 — AI家庭日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/design-tokens.css?v=5">
  <link rel="stylesheet" href="../css/components.css?v=5">
  <script src="../css/icons.js?v=5"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <style>
    /* Explore Section - 独有 */
    .explore-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* News Card - 独有 */
    .news-card {
      background: var(--surface-card);
      border-radius: var(--radius-md);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      display: flex;
      gap: 20px;
      align-items: flex-start;
      transition: transform 0.2s;
    }
    .news-card:hover { transform: translateY(-3px); }
    .news-icon {
      font-size: 48px;
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-sky-soft), #5b5ea6);
      border-radius: 16px;
      color: #fff;
    }
    .news-body { flex: 1; }
    .news-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .news-content { font-size: 14px; color: var(--color-grey-brown); line-height: 1.7; margin-bottom: 12px; }
    .news-discussion {
      font-size: 14px;
      color: var(--color-sky-soft);
      font-weight: 600;
      padding: 10px 16px;
      background: rgba(61,138,170,0.06);
      border-radius: 8px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .news-discussion svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }
    .news-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    /* Scene Tags - 独有 */
    .scene-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    /* Knowledge Card - 独有 */
    .knowledge-card {
      background: var(--surface-card);
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: transform 0.2s;
    }
    .knowledge-card:hover { transform: translateY(-2px); }
    .knowledge-header {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .knowledge-header .k-arrow {
      transition: transform 0.3s;
      font-size: 12px;
      color: var(--color-grey-brown);
      flex-shrink: 0;
    }
    .knowledge-card.expanded .k-arrow { transform: rotate(90deg); }
    .knowledge-header .k-title { font-size: 15px; font-weight: 600; flex: 1; }
    .knowledge-header .k-desc-preview { font-size: 13px; color: var(--color-grey-brown); }
    .knowledge-body {
      padding: 0 20px 16px;
      display: none;
    }
    .knowledge-card.expanded .knowledge-body { display: block; }
    .knowledge-body .k-desc { font-size: 14px; color: var(--color-grey-brown); line-height: 1.7; margin-bottom: 12px; }
    .knowledge-body .k-activity {
      padding: 12px 16px;
      background: rgba(200,68,0,0.05);
      border-radius: 8px;
      border-left: 3px solid var(--color-amber-glow);
      font-size: 13px;
      color: var(--color-warm-cream);
      line-height: 1.6;
    }
    .knowledge-body .k-activity strong { color: var(--color-amber-glow); }

    /* Challenge Card - 独有 */
    .challenge-card {
      background: var(--surface-card);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .challenge-card:hover { transform: translateY(-3px); }
    .challenge-card.completed {
      opacity: 0.7;
    }
    .challenge-card.completed::after {
      content: '已完成';
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--color-mint-leaf);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: var(--radius-full);
    }
    .challenge-icon {
      font-size: 36px;
      flex-shrink: 0;
    }
    .challenge-body { flex: 1; }
    .challenge-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .challenge-desc { font-size: 13px; color: var(--color-grey-brown); line-height: 1.5; margin-bottom: 10px; }
    .challenge-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .challenge-tag {
      display: inline-block;
      padding: 3px 10px;
      background: rgba(200,68,0,0.08);
      color: var(--color-burnt-sienna);
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
    }
    .challenge-points {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-amber-glow);
    }

    /* Knowledge Map - 独有 */
    .knowledge-map {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .km-node {
      background: var(--surface-card);
      border-radius: var(--radius-md);
      padding: 20px 16px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
    }
    .km-node:hover { transform: translateY(-3px); }
    .km-node.unlocked {
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      box-shadow: 0 4px 16px rgba(74,154,90,0.2);
    }
    .km-node.unlocked::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--color-mint-leaf), #8bc34a);
      z-index: -1;
      opacity: 0.4;
      filter: blur(6px);
    }
    .km-node.locked {
      opacity: 0.55;
    }
    .km-emoji { font-size: 32px; margin-bottom: 8px; display: block; }
    .km-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .km-desc { font-size: 12px; color: var(--color-grey-brown); margin-bottom: 12px; line-height: 1.4; }

    /* Leaderboard banner - 独有 */
    .leaderboard-banner {
      text-align: center;
      padding: 16px;
      background: linear-gradient(135deg, rgba(212,136,32,0.08), rgba(200,68,0,0.06));
      border-radius: var(--radius-md);
      margin-top: 20px;
      font-size: 14px;
      color: var(--color-grey-brown);
    }
    .leaderboard-banner strong { color: var(--color-amber-glow); }

    /* Points earned badge - 独有 */
    .points-earned {
      display: inline-block;
      padding: 4px 12px;
      background: var(--color-mint-leaf);
      color: #fff;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      animation: pointsPop 0.4s ease;
    }
    @keyframes pointsPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .explore-section { padding: 28px 16px; }
      .news-card { flex-direction: column; text-align: center; }
      .knowledge-map { grid-template-columns: repeat(2, 1fr); }
      .scene-tags { gap: 8px; }
    }

    /* === Critical Layout: Nav, Tab, Footer === */
    html{scrollbar-gutter:stable}
    .app-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--surface-card);box-shadow:var(--shadow-sm);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);box-sizing:border-box}
    .app-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--color-warm-cream);flex-shrink:0}
    .app-nav-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;max-width:32px}
    .app-nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
    .app-nav-logo-main{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--color-warm-cream)}
    .app-nav-logo-main span{color:var(--color-primary)}
    .app-nav-logo-sub{font-size:10px;color:var(--color-grey-brown);letter-spacing:0.5px}
    .app-nav-links{display:flex;align-items:center;gap:2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-width:0}
    .app-nav-links::-webkit-scrollbar{display:none}
    .app-nav-link{padding:6px 14px;font-size:13px;font-weight:500;color:var(--color-grey-brown);text-decoration:none;border-radius:var(--radius-full);white-space:nowrap;transition:all var(--transition-fast)}
    .app-nav-link:hover{color:var(--color-warm-cream);background:rgba(196,181,164,0.15)}
    .app-nav-link--active{color:#fff;background:var(--color-primary);font-weight:600}
    .app-bottom-tab{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-tab-height);background:var(--surface-card);box-shadow:0 -1px 4px rgba(44,24,16,0.08);z-index:1000;display:none;align-items:center;justify-content:space-around;padding:0 8px;box-sizing:border-box}
    .app-tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 12px;text-decoration:none;color:var(--color-grey-brown);font-size:11px;font-weight:500;border-radius:var(--radius-md);transition:color var(--transition-fast);min-width:0}
    .app-tab-item:hover{color:var(--color-warm-cream)}
    .app-tab-item--active{color:var(--color-primary)}
    .app-tab-item--active .app-tab-icon svg{stroke:var(--color-primary)}
    .app-tab-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
    .app-tab-icon svg{width:20px;height:20px;stroke:currentColor}
    .app-tab-label{white-space:nowrap}
    .app-footer{text-align:center;padding:var(--space-xl) var(--content-padding);color:var(--color-grey-brown);font-size:var(--text-sm);line-height:1.8;border-top:1px solid rgba(196,181,164,0.2);margin-top:var(--space-2xl)}
    .app-footer p{margin:0}
    @media(max-width:768px){.app-nav-links{display:none}.app-bottom-tab{display:flex}.app-nav-logo-text{display:none}}
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <main class="page-wrapper">
    <div class="page-container" style="max-width:1100px;">

      <!-- Page Hero -->
      <section class="page-hero">
        <h1>AI探索中心</h1>
        <p>每天发现AI如何改变我们的生活</p>
      </section>

      <!-- Section 1: AI Daily News -->
      <section class="explore-section fade-up">
        <h2 class="section-title" id="title-news">AI每日快报</h2>
        <div id="news-container"></div>
      </section>

      <!-- Section 2: AI in Life -->
      <section class="explore-section fade-up">
        <h2 class="section-title" id="title-life">AI在生活中</h2>
        <div id="scene-tags-container" class="scene-tags"></div>
        <div id="scene-items-container"></div>
        <div id="scene-points-earned" style="margin-top:12px;"></div>
      </section>

      <!-- Section 3: AI Challenges -->
      <section class="explore-section fade-up">
        <h2 class="section-title" id="title-challenge">AI挑战赛</h2>
        <div id="challenges-container" style="display:flex;flex-direction:column;gap:16px;"></div>
        <div class="leaderboard-banner">本周已有 <strong>128</strong> 个家庭完成挑战</div>
      </section>

      <!-- Section 4: AI Knowledge Map -->
      <section class="explore-section fade-up">
        <h2 class="section-title" id="title-knowledge">AI知识图谱</h2>
        <div id="knowledge-map-container" class="knowledge-map"></div>
      </section>

    </div>
  </main>
  <div id="footer-container"></div>
  <div id="bottom-tab-container"></div>

  <script src="../js/app.js?v=11"></script>
  <script>
    // ---- V6 Auth Check ----
if (!App.isRegistered()) {
    document.body.innerHTML = App.renderAuthPage();
    window.onAuthSuccess = function() { location.reload(); };
} else {
  App.login();
  // Check onboarding for new users
  if (App.shouldShowOnboarding()) {
    window.addEventListener('DOMContentLoaded', function() {
      var overlay = document.createElement('div');
      overlay.id = 'onboarding-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = '<div style="background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,0.2);text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🎉</div>' +
        '<h2 style="font-family:var(--font-display);font-size:22px;color:var(--color-warm-cream);margin:0 0 8px;">欢迎加入AI家庭日！</h2>' +
        '<p style="color:var(--color-grey-brown);font-size:14px;margin:0 0 24px;">' + (App.getUser().nickname || '') + '，让我们开始你的家庭AI之旅吧！<br>只需3步即可开始：</p>' +
        '<div style="text-align:left;margin:0 0 24px;">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">1</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">创建你的家庭AI学习计划</div><div style="font-size:12px;color:var(--color-grey-brown);">AI为你定制专属12周学习路径</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-amber-glow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">2</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">选择你的AI伙伴</div><div style="font-size:12px;color:var(--color-grey-brown);">10个经典角色陪你学习</div></div></div>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--color-sky-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">3</div>' +
        '<div><div style="font-weight:600;font-size:14px;color:var(--color-warm-cream);">开始探索和创作</div><div style="font-size:12px;color:var(--color-grey-brown);">聊天、漫画、3D、视频等你来玩</div></div></div>' +
        '</div>' +
        '<a href="family-plan.html" class="btn btn-primary" style="display:inline-block;padding:12px 32px;border-radius:25px;background:var(--color-primary);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 12px rgba(200,68,0,0.3);">开始定制计划 →</a>' +
        '<button onclick="document.getElementById(\'onboarding-overlay\').remove();App.completeOnboarding();" style="display:block;margin:12px auto 0;background:none;border:none;color:var(--color-grey-brown);cursor:pointer;font-size:13px;">稍后再说</button>' +
        '</div>';
      document.body.appendChild(overlay);
    });
  }
    // ---- Render common UI ----
    Icons.init();
    document.getElementById('nav-container').innerHTML = App.renderNav('explore');
    document.getElementById('footer-container').innerHTML = App.renderFooter();
    document.getElementById('bottom-tab-container').innerHTML = App.renderBottomTab('explore');

    // ---- Set section title icons ----
    document.getElementById('title-news').innerHTML = Icons.sparkles() + 'AI每日快报';
    document.getElementById('title-life').innerHTML = Icons.map() + 'AI在生活中';
    document.getElementById('title-challenge').innerHTML = Icons.target() + 'AI挑战赛';
    document.getElementById('title-knowledge').innerHTML = Icons.award() + 'AI知识图谱';

    // ======== Section 1: AI Daily News ========
    (function() {
      var news = App.AI_NEWS;
      var today = new Date();
      var dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
      var newsIdx = dayOfYear % news.length;
      var newsItem = news[newsIdx];
      var currentIdx = newsIdx;

      var readNewsIds = JSON.parse(localStorage.getItem('ai_family_readNews') || '[]');

      function renderNews(idx) {
        var item = news[idx];
        var isRead = readNewsIds.indexOf(item.id) !== -1;
        var html =
          '<div class="news-card">' +
            '<div class="news-icon">' + item.icon + '</div>' +
            '<div class="news-body">' +
              '<div class="news-title">' + item.title + '</div>' +
              '<div class="news-content">' + item.content + '</div>' +
              '<div class="news-discussion">' + Icons.messageCircle(16) + ' 和家庭一起讨论：' + item.discussion + '</div>' +
              '<div class="news-actions">' +
                (isRead
                  ? '<span class="points-earned">&#10003; 已读 +5积分</span>'
                  : '<button class="btn btn-success btn-sm" id="news-read-btn">阅读完成 +5积分</button>') +
                '<button class="btn btn-secondary btn-sm" id="news-switch-btn">换一条</button>' +
              '</div>' +
            '</div>' +
          '</div>';
        document.getElementById('news-container').innerHTML = html;

        // Bind read button
        var readBtn = document.getElementById('news-read-btn');
        if (readBtn) {
          readBtn.addEventListener('click', function() {
            if (readNewsIds.indexOf(item.id) === -1) {
              readNewsIds.push(item.id);
              localStorage.setItem('ai_family_readNews', JSON.stringify(readNewsIds));
              App.addPoints('learning', 5, '阅读AI快报: ' + item.title);
              App.showToast('获得 +5 学习积分！');
            }
            renderNews(idx);
          });
        }

        // Bind switch button
        var switchBtn = document.getElementById('news-switch-btn');
        if (switchBtn) {
          switchBtn.addEventListener('click', function() {
            currentIdx = (currentIdx + 1) % news.length;
            renderNews(currentIdx);
          });
        }
      }

      renderNews(currentIdx);
    })();

    // ======== Section 2: AI in Life Scenes ========
    (function() {
      var scenes = App.AI_LIFE_SCENES;
      var readSceneIds = JSON.parse(localStorage.getItem('ai_family_readScenes') || '[]');
      var activeSceneId = scenes.length > 0 ? scenes[0].id : '';

      // Render scene tags
      var tagsHtml = '';
      scenes.forEach(function(scene) {
        var cls = scene.id === activeSceneId ? 'btn btn-ghost active' : 'btn btn-ghost';
        tagsHtml += '<button class="' + cls + '" data-scene="' + scene.id + '">' + scene.title + '</button>';
      });
      document.getElementById('scene-tags-container').innerHTML = tagsHtml;

      function renderSceneItems(sceneId) {
        var scene = null;
        for (var i = 0; i < scenes.length; i++) {
          if (scenes[i].id === sceneId) { scene = scenes[i]; break; }
        }
        if (!scene) return;

        // Update active tag
        var tags = document.querySelectorAll('#scene-tags-container button');
        tags.forEach(function(tag) {
          if (tag.getAttribute('data-scene') === sceneId) {
            tag.classList.add('active');
            tag.style.background = 'var(--color-burnt-sienna)';
            tag.style.color = '#fff';
            tag.style.borderColor = 'var(--color-burnt-sienna)';
          } else {
            tag.classList.remove('active');
            tag.style.background = '';
            tag.style.color = '';
            tag.style.borderColor = '';
          }
        });

        var html = '';
        (scene.knowledge || scene.items || []).forEach(function(item, idx) {
          html +=
            '<div class="knowledge-card" id="kc-' + sceneId + '-' + idx + '">' +
              '<div class="knowledge-header" onclick="toggleKnowledgeCard(\'' + sceneId + '-' + idx + '\')">' +
                '<span class="k-arrow">&#9654;</span>' +
                '<div style="flex:1;">' +
                  '<div class="k-title">' + item.title + '</div>' +
                  '<div class="k-desc-preview">' + item.desc.substring(0, 40) + '...</div>' +
                '</div>' +
              '</div>' +
              '<div class="knowledge-body">' +
                '<div class="k-desc">' + item.desc + '</div>' +
                '<div class="k-activity"><strong>' + Icons.lightbulb(14) + ' 和孩子一起做：</strong>' + item.activity + '</div>' +
              '</div>' +
            '</div>';
        });
        document.getElementById('scene-items-container').innerHTML = html;

        // Check if scene already read
        if (readSceneIds.indexOf(sceneId) !== -1) {
          document.getElementById('scene-points-earned').innerHTML = '<span class="points-earned">&#10003; 已阅读 +5积分</span>';
        } else {
          document.getElementById('scene-points-earned').innerHTML =
            '<button class="btn btn-success btn-sm" id="scene-read-btn">我已阅读本场景 +5积分</button>';
          document.getElementById('scene-read-btn').addEventListener('click', function() {
            if (readSceneIds.indexOf(sceneId) === -1) {
              readSceneIds.push(sceneId);
              localStorage.setItem('ai_family_readScenes', JSON.stringify(readSceneIds));
              App.addPoints('learning', 5, '阅读AI场景: ' + scene.title);
              App.showToast('获得 +5 学习积分！');
              document.getElementById('scene-points-earned').innerHTML = '<span class="points-earned">&#10003; 已阅读 +5积分</span>';
            }
          });
        }
      }

      // Bind tag clicks
      var tags = document.querySelectorAll('#scene-tags-container button');
      tags.forEach(function(tag) {
        tag.addEventListener('click', function() {
          var sid = this.getAttribute('data-scene');
          renderSceneItems(sid);
        });
      });

      // Render first scene
      renderSceneItems(activeSceneId);

      // Expose toggle function
      window.toggleKnowledgeCard = function(id) {
        var el = document.getElementById('kc-' + id);
        if (el) el.classList.toggle('expanded');
      };
    })();

    // ======== Section 3: AI Challenges ========
    (function() {
      var challenges = App.AI_CHALLENGES;
      var completed = App.getCompletedChallenges();

      var html = '';
      challenges.forEach(function(ch) {
        var isCompleted = completed.indexOf(ch.id) !== -1;
        html +=
          '<div class="challenge-card ' + (isCompleted ? 'completed' : '') + '">' +
            '<div class="challenge-icon">' + ch.icon + '</div>' +
            '<div class="challenge-body">' +
              '<div class="challenge-title">' + ch.title + '</div>' +
              '<div class="challenge-desc">' + ch.desc + '</div>' +
              '<div class="challenge-meta">' +
                '<span class="challenge-tag">' + ch.tag + '</span>' +
                '<span class="challenge-points">+' + ch.points + '积分</span>' +
              '</div>' +
              (isCompleted
                ? ''
                : '<button class="btn btn-success btn-sm" data-challenge-id="' + ch.id + '">完成挑战</button>') +
            '</div>' +
          '</div>';
      });
      document.getElementById('challenges-container').innerHTML = html;

      // Bind complete buttons
      var btns = document.querySelectorAll('[data-challenge-id]');
      btns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var chId = this.getAttribute('data-challenge-id');
          var success = App.completeChallenge(chId);
          if (success) {
            App.showToast('挑战完成！获得 +50 学习积分！');
          } else {
            App.showToast('你已完成这个挑战了');
          }
          // Re-render
          completed = App.getCompletedChallenges();
          btns.forEach(function(b) {
            var bid = b.getAttribute('data-challenge-id');
            if (completed.indexOf(bid) !== -1) {
              b.closest('.challenge-card').classList.add('completed');
              b.remove();
            }
          });
        });
      });
    })();

    // ======== Section 4: AI Knowledge Map ========
    (function() {
      var map = App.getKnowledgeMap();

      var html = '';
      map.forEach(function(node) {
        var cls = node.unlocked ? 'km-node unlocked' : 'km-node locked';
        var btnHtml = node.unlocked
          ? '<a href="ai-chat.html" class="btn btn-success btn-sm">去复习</a>'
          : '<a href="ai-chat.html" class="btn btn-ghost btn-sm">去探索</a>';
        html +=
          '<div class="' + cls + '">' +
            '<span class="km-emoji">' + node.emoji + '</span>' +
            '<div class="km-title">' + node.title + '</div>' +
            '<div class="km-desc">' + node.desc + '</div>' +
            btnHtml +
          '</div>';
      });
      document.getElementById('knowledge-map-container').innerHTML = html;
    })();

    // ---- IntersectionObserver fade-up ----
    (function() {
      var items = document.querySelectorAll('.fade-up');
      if (!('IntersectionObserver' in window)) {
        items.forEach(function(el) { el.classList.add('visible'); });
        return;
      }
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      items.forEach(function(el) { observer.observe(el); });
    })();
  } // end auth check else
</script>
</body>
</html>
