<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豆包生图小助手 · VOS-玄造</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --bg-elevated: #121215;
      --bg-input: #0c0c0e;
      --surface: #18181b;
      --surface-hover: #1f1f23;
      --border: rgba(255, 255, 255, 0.06);
      --border-medium: rgba(255, 255, 255, 0.10);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --amber: #fbbf24;
      --amber-hover: #fcd34d;
      --amber-soft: rgba(251, 191, 36, 0.10);
      --cyan: #22d3ee;
      --cyan-soft: rgba(34, 211, 238, 0.10);
      --emerald: #34d399;
      --emerald-soft: rgba(52, 211, 153, 0.10);
      --rose: #fb7185;
      --rose-soft: rgba(251, 113, 133, 0.10);
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      padding: 32px 16px 80px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.018;
      pointer-events: none;
      z-index: 1000;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .ambient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.22;
    }

    .ambient-orb:first-child {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, var(--amber) 0%, transparent 70%);
      top: -160px;
      right: -160px;
    }

    .ambient-orb:last-child {
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--bg-elevated);
    }

    .brand-dot {
      width: 5px;
      height: 5px;
      background: var(--amber);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--amber);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 400;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover { border-color: var(--border-medium); }

    .card-soft {
      background: var(--bg-elevated);
      border-color: var(--border);
    }

    /* Settings Toggle */
    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 2px;
    }

    .settings-toggle-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
    }

    .settings-toggle-icon {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      transition: transform 0.25s ease;
    }

    .settings-toggle.open .settings-toggle-icon { transform: rotate(180deg); }

    .settings-status {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 8px;
      border-radius: 100px;
      background: var(--bg-input);
      border: 1px solid var(--border);
    }

    .settings-status.ok {
      color: var(--emerald);
      border-color: rgba(52, 211, 153, 0.2);
      background: var(--emerald-soft);
    }

    .settings-body {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      animation: slideDown 0.25s ease;
    }

    .settings-body.open { display: block; }

    /* Form elements */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    input[type="text"], input[type="password"], textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      transition: all 0.2s;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--border-strong);
      box-shadow: 0 0 0 3px var(--amber-soft);
    }

    input::placeholder, textarea::placeholder { color: var(--text-muted); opacity: 0.7; }

    textarea {
      min-height: 90px;
      resize: vertical;
      line-height: 1.7;
    }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 15px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--amber);
      color: #181402;
      box-shadow: 0 4px 16px rgba(251, 191, 36, 0.18);
    }

    .btn-primary:hover {
      background: var(--amber-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(251, 191, 36, 0.28);
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: wait;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-medium);
    }

    .btn-secondary:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-soft);
    }

    .btn-cyan {
      background: var(--cyan-soft);
      color: var(--cyan);
      border: 1px solid rgba(34, 211, 238, 0.15);
    }

    .btn-cyan:hover {
      background: rgba(34, 211, 238, 0.14);
      border-color: rgba(34, 211, 238, 0.3);
    }

    .btn-cyan:disabled, .btn-secondary:disabled, .btn-ghost:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid transparent;
      padding: 7px 11px;
    }

    .btn-ghost:hover { color: var(--text); background: var(--border-medium); }

    .btn-verify {
      background: var(--emerald-soft);
      color: var(--emerald);
      border: 1px solid rgba(52, 211, 153, 0.18);
    }

    .btn-verify:hover { background: rgba(52, 211, 153, 0.14); }

    .btn-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .btn-row > * { flex: 1; }

    .btn-row .btn-verify { flex: 0 0 auto; }

    /* Main input area */
    .input-card { padding: 24px; }

    .input-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .input-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    .input-badge {
      font-size: 10px;
      color: var(--amber);
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 9px;
      border: 1px solid rgba(251, 191, 36, 0.2);
      border-radius: 100px;
      background: var(--amber-soft);
    }

    .input-area { position: relative; }

    .input-area textarea {
      min-height: 120px;
      font-size: 15px;
      padding: 16px;
      border-radius: var(--radius-lg);
      background: var(--bg-input);
    }

    .generate-btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px 24px;
      font-size: 15px;
      border-radius: var(--radius-lg);
    }

    .generate-btn.loading .spinner { display: inline-block; }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Result */
    .result {
      margin-top: 24px;
      display: none;
      animation: fadeInUp 0.45s ease;
    }

    .result.active { display: block; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .result-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .prompt-display {
      position: relative;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.85;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .btn-copy {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .btn-copy:hover {
      background: var(--amber-soft);
      border-color: rgba(251, 191, 36, 0.35);
      color: var(--amber);
    }

    .btn-copy.copied {
      background: var(--emerald-soft);
      color: var(--emerald);
      border-color: rgba(52, 211, 153, 0.35);
    }

    /* Workspace */
    .workspace {
      margin-top: 16px;
      display: none;
      animation: fadeInUp 0.45s ease 0.1s both;
    }

    .workspace.active { display: block; }

    .workspace-step {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
    }

    .workspace-step:last-child { margin-bottom: 0; }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .step-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .step-number {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      background: var(--amber-soft);
      color: var(--amber);
    }

    .step-number.cyan {
      background: var(--cyan-soft);
      color: var(--cyan);
    }

    /* Feature grid */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .feature-card {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: all 0.2s;
    }

    .feature-card:hover {
      border-color: var(--border-medium);
      background: rgba(255, 255, 255, 0.02);
    }

    .feature-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
      letter-spacing: 0.04em;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .feature-input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      min-height: 22px;
      font-family: 'Noto Sans SC', sans-serif;
      padding: 0;
    }

    .feature-input:focus { outline: none; }

    .feature-input::placeholder { color: var(--text-muted); opacity: 0.4; }

    .feature-empty { color: var(--text-muted); opacity: 0.5; }

    /* Modify panel */
    .modify-hints {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .modify-hint {
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modify-hint:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: var(--cyan-soft);
    }

    .modify-textarea {
      min-height: 64px;
      font-size: 14px;
      background: var(--bg-input);
    }

    .modify-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .modify-actions .btn { flex: 1; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      padding: 10px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border-medium);
      color: var(--text);
      box-shadow: var(--shadow-lg);
      animation: toastIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .toast.success {
      background: var(--emerald-soft);
      border-color: rgba(52, 211, 153, 0.2);
      color: var(--emerald);
    }

    .toast.error {
      background: var(--rose-soft);
      border-color: rgba(251, 113, 133, 0.2);
      color: var(--rose);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* History */
    .history-section { margin-top: 28px; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .history-title {
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
    }

    .history-count {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      padding: 2px 7px;
      background: var(--bg-elevated);
      border-radius: 100px;
      border: 1px solid var(--border);
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 8px;
      overflow: hidden;
      transition: all 0.2s;
    }

    .history-item:hover { border-color: var(--border-medium); }

    .history-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .history-chevron {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .history-item.open .history-chevron { transform: rotate(180deg); }

    .history-time {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .history-input {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .history-actions button {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .history-actions button:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-soft);
    }

    .history-actions button.delete:hover {
      border-color: var(--rose);
      color: var(--rose);
      background: var(--rose-soft);
    }

    .history-body {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
      animation: slideDown 0.2s ease;
    }

    .history-item.open .history-body { display: block; }

    .history-prompt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.8;
      color: var(--text-secondary);
      padding-top: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .history-empty {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 13px;
      background: var(--surface);
      border: 1px dashed var(--border-medium);
      border-radius: var(--radius-lg);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
    }

    .pagination button {
      min-width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .pagination button:hover:not(:disabled) {
      border-color: var(--amber);
      color: var(--amber);
    }

    .pagination button.active {
      background: var(--amber);
      border-color: var(--amber);
      color: #181402;
    }

    .pagination button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 40px;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    .icon { width: 15px; height: 15px; }
    .icon-sm { width: 13px; height: 13px; }

    /* Empty state helper */
    .empty-hint {
      text-align: center;
      padding: 28px;
      color: var(--text-muted);
      font-size: 13px;
      background: var(--bg-input);
      border: 1px dashed var(--border-medium);
      border-radius: var(--radius);
    }

    /* Responsive */
    @media (max-width: 640px) {
      body { padding: 24px 12px 60px; }
      h1 { font-size: 26px; }
      .input-card { padding: 18px; }
      .feature-grid { grid-template-columns: 1fr; }
      .history-summary { gap: 8px; }
      .history-time { display: none; }
      .workspace-step { padding: 14px; }
    }

    @media (max-width: 480px) {

  <!-- Toast Container -->

  <script>
    const SYSTEM_PROMPT = `你是 VOS-玄造 V3，一位专为 DiT 图像模型（Seedream/即梦/豆包）服务的视觉导演与提示词架构师。

你的任务：接收用户用自然语言描述的画面意图，输出一段高质量中文提示词（流式散文风格，情境化描述，保留少量必要的英文专业术语如摄影焦段、画种名称）。

核心原则：
- 审美先于细节：先判断画面整体风格（摄影真实 / 绘画插画 / 史诗概念 / 空间生态 / 氛围壁纸），并用该风格的视觉语言组织描述。
- 注意力金字塔：确保第一眼有强视觉锚点，第二眼有叙事张力，最后留下情绪记忆。
- 物理真实感：描述光学焦段、空间介质（雾气、尘埃、湿度）、材质摩擦（皮肤、织物、石材、金属）。
- 禁止使用 masterpiece、8k、hyperdetailed、ultra HD 等无效堆叠词。

直接输出提示词文本，不需要解释。`;

    const EXTRACTION_PROMPT = `你是图像提示词特征提取专家。请从下面这段提示词中提取各个视觉要素，按以下分类整理：

- 角色：人物/主体特征
- 背景：环境/场景
- 服装：衣物、服饰
- 发型：头发样式
- 特效：特殊视觉效果（光效、粒子、烟雾等）
- 气质/情绪：氛围、情绪、表情
- 风格：艺术风格、摄影风格、绘画风格
- 光影：光线、阴影、时间
- 构图：镜头、视角、构图方式
- 其他：不属于以上分类的内容

请严格按 JSON 格式返回，不存在的分类填空字符串""：
{
  "角色": "",
  "背景": "",
  "服装": "",
  "发型": "",
  "特效": "",
  "气质/情绪": "",
  "风格": "",
  "光影": "",
  "构图": "",
  "其他": ""
}`;

    const examples = {
      sea: "电影感 85mm 黄金时刻人像，一对年轻情侣在夏日黄昏的安静海边相依而立，侧脸转向彼此，海风轻轻拂起发丝掠过温暖肌肤，身后是缓缓下沉的橘色落日，海浪化作奶油般的虚化背景，潮湿的海盐雾气柔化所有边缘，棉麻衣物被暖风吹动，浪漫而略带忧伤，干净的负空间，琥珀色与青蓝色的色彩记忆，浅景深，真实的皮肤质感",
      night: "35mm 纪实闪光灯摄影，午夜时分一个孤独的女孩站在便利店门外，脸部被直闪硬光抓住成为视觉中心，潮湿的柏油路面反射着霓虹蓝与自动贩卖机的暖光，不完美偏心构图，疲惫的神情，一缕头发挡在一只眼睛前，都市孤独感， raw film grain，过曝的高光，真实皮肤纹理，浅景深",
      myth: "神圣东方神话史诗绘画，破碎的南天门以悲壮宏伟的姿态耸入风暴撕裂的天空，年轻的齐天大圣作为暗金色剪影立于画面下三分之一，猩红战袍被狂风卷起，手持金箍棒默默反抗，天宫废墟消融于无尽云海，浓雾弥散着噼啪作响的金色闪电，神圣悲悯，矿物颜料质感，厚涂笔触，强烈的大气透视",
      nature: "宁静的环境概念艺术，黎明时分一个孤独身影站在古老森林湖泊边缘，水面升起薄雾，巨大的苔藓覆盖树木框住画面，柔和的金色光线穿透树冠，漂浮的花粉颗粒捕捉光束，连贯的自然生态，大气深度，有机纹理，安静的沉思，冷暖色调平衡",
      default: "视觉冲击力强的画面，具有清晰剪影的主体，和谐的色彩 palette，电影感灯光，连贯的氛围，丰富的材质纹理，情绪共鸣，有意识的负空间平衡构图"
    };

    const featureKeywords = {
      '角色': ['人物', '角色', '女孩', '男孩', '情侣', '少女', '少年', '女性', '男性', '老人', '小孩', '大圣', '悟空', '人物主体', '主角', '人'],
      '背景': ['背景', '海边', '天空', '街道', '城市', '森林', '湖泊', '天宫', '废墟', '云海', '环境', '场景', '海面', '夜空'],
      '服装': ['服装', '衣服', '衣物', '战袍', '棉麻', '风衣', '汉服', '连衣裙', 'T恤', '衬衫', '外套', '裙子', '穿着'],
      '发型': ['发型', '头发', '发丝', '长发', '短发', '双马尾', '马尾', '卷发', '直发', '刘海'],
      '特效': ['特效', '光效', '闪电', '雾气', '烟雾', '粒子', '光束', '雨滴', '雪花', '火焰', '光晕', '霓虹', '反射'],
      '气质/情绪': ['情绪', '气质', '浪漫', '忧伤', '孤独', '疲惫', '神圣', '悲悯', '沉思', '安静', '温柔', '氛围'],
      '风格': ['风格', '电影感', '纪实', '摄影', '绘画', '插画', '史诗', '概念艺术', '厚涂', '油画', '水墨', '国风', '赛博朋克'],
      '光影': ['光影', '光线', '阴影', '逆光', '黄金时刻', '闪光灯', '背光', '侧光', '柔光', '硬光', '暖光', '冷光'],
      '构图': ['构图', '85mm', '35mm', '浅景深', '虚化', '负空间', '剪影', '特写', '广角', '人像', '对焦', '视角']
    };

    let currentInput = '';
    let currentPrompt = '';
    let currentFeatures = {};
    let historyPage = 1;
    const HISTORY_PER_PAGE = 5;

    function pick(input) {
      const s = input.toLowerCase();
      if (s.includes('海') || s.includes('beach') || s.includes('海边')) return 'sea';
      if (s.includes('夜') || s.includes('深夜') || s.includes('便利店') || s.includes('lonely')) return 'night';
      if (s.includes('神') || s.includes('大圣') || s.includes('天宫') || s.includes('神话')) return 'myth';
      if (s.includes('森') || s.includes('自然') || s.includes('山') || s.includes('湖')) return 'nature';
      return 'default';
    }

    function toggleSettings() {
      document.getElementById('settings').classList.toggle('open');
      document.getElementById('settingToggle').classList.toggle('open');
    }

    function showToast(type, message) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icon = type === 'success'
        ? '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>'
        : '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>';
      toast.innerHTML = `${icon}<span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(8px)';
        setTimeout(() => toast.remove(), 250);
      }, 2500);
    }

    function renderResult(prompt) {
      currentPrompt = prompt;
      document.getElementById('prompt').textContent = prompt;
      document.getElementById('result').classList.add('active');
      document.getElementById('workspace').classList.add('active');
      currentFeatures = {};
      renderFeatures({});
    }

    function extractFeaturesRuleBased(prompt) {
      const features = {};
      const segments = prompt.split(/[,，。;；]/).map(s => s.trim()).filter(s => s);

      for (const category of Object.keys(featureKeywords)) {
        const matched = [];
        for (const segment of segments) {
          if (featureKeywords[category].some(kw => segment.includes(kw))) {
            matched.push(segment);
          }
        }
        features[category] = matched.join('；');
      }

      const allUsed = new Set();
      for (const cat of Object.keys(features)) {
        features[cat].split('；').forEach(s => allUsed.add(s));
      }

      const others = segments.filter(s => !allUsed.has(s));
      features['其他'] = others.join('；');

      return features;
    }

    function renderFeatures(features) {
      currentFeatures = features;
      const grid = document.getElementById('featureGrid');
      const keys = Object.keys(featureKeywords).concat(['其他']);

      if (Object.keys(features).length === 0) {
        grid.innerHTML = '<div class="empty-hint">点击右上角「重新解析」提取提示词中的角色、背景、服装、发型等特征</div>';
        return;
      }

      grid.innerHTML = keys.map(key => {
        const value = features[key] || '';
        return `
          <div class="feature-card">
            <div class="feature-label">${key}</div>
            <textarea class="feature-input ${value ? '' : 'feature-empty'}" data-key="${key}" placeholder="无" rows="1" oninput="autoResize(this)">${value}</textarea>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.feature-input').forEach(el => autoResize(el));
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
      el.classList.toggle('feature-empty', !el.value.trim());
    }

    async function extractFeatures() {
      if (!currentPrompt) return;

      const btn = document.getElementById('extractBtn');
      btn.disabled = true;
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> 解析中...';

      const apiUrl = document.getElementById('apiUrl').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const modelName = document.getElementById('modelName').value.trim();

      let features = {};

      if (apiUrl && apiKey && modelName) {
        try {
          const response = await fetch(`${apiUrl.replace(/\/$/, '')}/chat/completions`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: modelName,
              messages: [
                { role: 'system', content: EXTRACTION_PROMPT },
                { role: 'user', content: currentPrompt }
              ],
              temperature: 0.3
            })
          });

          if (response.ok) {
            const data = await response.json();
            const content = data.choices?.[0]?.message?.content || '';
            const jsonMatch = content.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
              features = JSON.parse(jsonMatch[0]);
            }
          }
        } catch (err) {
          console.error('API extraction failed:', err);
        }
      }

      if (Object.keys(features).length === 0) {
        features = extractFeaturesRuleBased(currentPrompt);
      } else {
        const ruleBased = extractFeaturesRuleBased(currentPrompt);
        for (const key of Object.keys(ruleBased)) {
          if (!features[key] || features[key].trim() === '') {
            features[key] = ruleBased[key];
          }
        }
      }

      renderFeatures(features);
      btn.disabled = false;
      btn.innerHTML = originalHtml;
    }

    function setModify(text) {
      document.getElementById('modifyInput').value = text;
      document.getElementById('modifyInput').focus();
    }

    function getEditedFeatures() {
      const inputs = document.querySelectorAll('.feature-input');
      const features = {};
      inputs.forEach(input => {
        features[input.dataset.key] = input.value.trim();
      });
      return features;
    }

    function applyFeatureChanges() {
      currentFeatures = getEditedFeatures();
      showToast('success', '特征修改已应用');
    }

    async function regenerate() {
      const modification = document.getElementById('modifyInput').value.trim();
      if (!modification) {
        showToast('error', '请输入你想修改或增加的内容');
        return;
      }

      const btn = document.getElementById('regenerateBtn');
      const originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.classList.add('loading');
      document.getElementById('regenerateIcon').style.display = 'none';
      document.getElementById('regenerateText').textContent = '生成中...';

      const apiUrl = document.getElementById('apiUrl').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const modelName = document.getElementById('modelName').value.trim();

      if (!apiUrl || !apiKey || !modelName) {
        showToast('error', '修改重生成需要配置 API');
        btn.disabled = false;
        btn.classList.remove('loading');
        document.getElementById('regenerateIcon').style.display = 'inline';
        document.getElementById('regenerateText').textContent = '重新生成';
        return;
      }

      const features = getEditedFeatures();
      const featureText = Object.entries(features)
        .filter(([_, v]) => v)
        .map(([k, v]) => `${k}：${v}`)
        .join('\n');

      const modifyPrompt = `你是 VOS-玄造 V3，一位视觉导演与提示词架构师。

原提示词：
${currentPrompt}

当前画面特征：
${featureText}

用户的新需求：
${modification}

请在保持其他元素尽量不变的前提下，将用户的新需求合理融入画面。输出一段新的高质量中文提示词，保持流式散文风格、审美统一性和物理真实感。直接输出提示词文本，不需要解释。`;

      try {
        const response = await fetch(`${apiUrl.replace(/\/$/, '')}/chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: modelName,
            messages: [
              { role: 'system', content: 'You are VOS-玄造 V3, a visual director and prompt architect.' },
              { role: 'user', content: modifyPrompt }
            ],
            temperature: 0.7
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`API 错误 ${response.status}: ${errText}`);
        }

        const data = await response.json();
        const newPrompt = data.choices?.[0]?.message?.content?.trim() || '';

        currentPrompt = newPrompt;
        document.getElementById('prompt').textContent = newPrompt;
        document.getElementById('modifyInput').value = '';
        currentFeatures = {};
        renderFeatures({});
        saveHistory(currentInput + '（修改：' + modification + '）', newPrompt);
        showToast('success', '已根据你的需求重新生成');
      } catch (err) {
        showToast('error', `重新生成失败：${err.message}`);
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        document.getElementById('regenerateIcon').style.display = 'inline';
        document.getElementById('regenerateText').textContent = '重新生成';
      }
    }

    async function verifyConnection() {
      const apiUrl = document.getElementById('apiUrl').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const modelName = document.getElementById('modelName').value.trim();
      const btn = document.getElementById('verifyBtn');
      const statusEl = document.getElementById('verifyStatus');

      if (!apiUrl || !apiKey || !modelName) {
        showToast('error', '请先填写完整的 API 信息');
        return;
      }

      btn.disabled = true;
      btn.textContent = '验证中...';

      try {
        const response = await fetch(`${apiUrl.replace(/\/$/, '')}/chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: modelName,
            messages: [
              { role: 'system', content: 'You are a helpful assistant.' },
              { role: 'user', content: 'Hi' }
            ],
            max_tokens: 5
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`${response.status}: ${errText}`);
        }

        statusEl.textContent = '连接成功';
        statusEl.classList.add('ok');
        showToast('success', 'API 连接验证成功');
      } catch (err) {
        statusEl.textContent = '连接失败';
        statusEl.classList.remove('ok');
        showToast('error', `连接失败：${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = '验证连接';
      }
    }

    function saveHistory(input, prompt) {
      if (!input || !prompt) return;
      const list = JSON.parse(localStorage.getItem('xuanzao_history') || '[]');
      list.unshift({
        id: Date.now(),
        time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
        input,
        prompt
      });
      localStorage.setItem('xuanzao_history', JSON.stringify(list.slice(0, 200)));
      renderHistory();
    }

    function deleteHistoryItem(id) {
      const list = JSON.parse(localStorage.getItem('xuanzao_history') || '[]');
      const filtered = list.filter(item => item.id !== id);
      localStorage.setItem('xuanzao_history', JSON.stringify(filtered));
      const maxPage = Math.ceil(filtered.length / HISTORY_PER_PAGE) || 1;
      if (historyPage > maxPage) historyPage = maxPage;
      renderHistory();
    }

    function clearHistory() {
      if (!confirm('确定要清空所有历史记录吗？')) return;
      localStorage.removeItem('xuanzao_history');
      historyPage = 1;
      renderHistory();
    }

    function toggleHistoryItem(el) {
      const item = el.closest('.history-item');
      item.classList.toggle('open');
    }

    function loadHistoryItem(input, prompt) {
      document.getElementById('input').value = input.replace(/（修改：.*）/, '');
      currentInput = document.getElementById('input').value.trim();
      renderResult(prompt);
      showToast('success', '已加载到输入区');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderHistory() {
      const list = JSON.parse(localStorage.getItem('xuanzao_history') || '[]');
      const listEl = document.getElementById('historyList');
      const countEl = document.getElementById('historyCount');
      const paginationEl = document.getElementById('pagination');

      countEl.textContent = list.length > 0 ? `${list.length}` : '';

      if (list.length === 0) {
        listEl.innerHTML = '<div class="history-empty">暂无历史记录</div>';
        paginationEl.innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(list.length / HISTORY_PER_PAGE);
      if (historyPage > totalPages) historyPage = totalPages;

      const start = (historyPage - 1) * HISTORY_PER_PAGE;
      const pageItems = list.slice(start, start + HISTORY_PER_PAGE);

      listEl.innerHTML = pageItems.map(item => `
        <div class="history-item">
          <div class="history-summary" onclick="toggleHistoryItem(this)">
            <svg class="history-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 9l-7 7-7-7"/>
            </svg>
            <div class="history-time">${item.time}</div>
            <div class="history-input">${escapeHtml(item.input)}</div>
            <div class="history-actions">
              <button onclick="loadHistoryItem('${escapeHtml(item.input).replace(/'/g, "\\'")}', '${escapeHtml(item.prompt).replace(/'/g, "\\'")}')" title="加载到输入区">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
              </button>
              <button onclick="copyText('${escapeHtml(item.prompt).replace(/'/g, "\\'")}')" title="复制提示词">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path>
                </svg>
              </button>
              <button class="delete" onclick="deleteHistoryItem(${item.id})" title="删除">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="history-body">
            <div class="history-prompt">${escapeHtml(item.prompt)}</div>
          </div>
        </div>
      `).join('');

      // Prevent action buttons from toggling the history item
      listEl.querySelectorAll('.history-actions button').forEach(btn => {
        btn.addEventListener('click', e => e.stopPropagation());
      });

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const el = document.getElementById('pagination');
      if (totalPages <= 1) {
        el.innerHTML = '';
        return;
      }

      let html = `<button onclick="goToPage(${historyPage - 1})" ${historyPage === 1 ? 'disabled' : ''}>上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === historyPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      html += `<button onclick="goToPage(${historyPage + 1})" ${historyPage === totalPages ? 'disabled' : ''}>下一页</button>`;
      el.innerHTML = html;
    }

    function goToPage(page) {
      historyPage = page;
      renderHistory();
    }

    function fallbackDemo(input) {
      const key = pick(input);
      const prompt = examples[key];
      renderResult(prompt);
      saveHistory(input, prompt);
    }

    async function generate() {
      const input = document.getElementById('input').value.trim();
      currentInput = input;
      if (!input) return;

      const btn = document.getElementById('btn');
      const btnIcon = document.getElementById('btnIcon');
      const btnText = document.getElementById('btnText');
      btn.disabled = true;
      btn.classList.add('loading');
      btnIcon.style.display = 'none';
      btnText.textContent = '生成中...';

      const apiUrl = document.getElementById('apiUrl').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const modelName = document.getElementById('modelName').value.trim();

      if (!apiUrl || !apiKey || !modelName) {
        setTimeout(() => {
          fallbackDemo(input);
          btn.disabled = false;
          btn.classList.remove('loading');
          btnIcon.style.display = 'inline';
          btnText.textContent = '生成提示词';
          showToast('success', '已使用本地演示模式生成');
        }, 600);
        return;
      }

      try {
        const response = await fetch(`${apiUrl.replace(/\/$/, '')}/chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: modelName,
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              { role: 'user', content: input }
            ],
            temperature: 0.7
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`API 错误 ${response.status}: ${errText}`);
        }

        const data = await response.json();
        const prompt = data.choices?.[0]?.message?.content?.trim() || '';

        renderResult(prompt);
        saveHistory(input, prompt);
      } catch (err) {
        console.error(err);
        showToast('error', `调用失败：${err.message}。已切换到本地演示模式。`);
        fallbackDemo(input);
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btnIcon.style.display = 'inline';
        btnText.textContent = '生成提示词';
      }
    }

    function copyFromElement(id) {
      copyText(document.getElementById(id).textContent);
    }

    function copyText(text) {
      showToast('success', '提示词已复制');
      setTimeout(() => {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).catch(() => {});
          } else {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            textarea.style.pointerEvents = 'none';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
          }
        } catch (err) {}
      }, 0);
    }

    // Load history on page load
    renderHistory();
  </script>
</body>
</html>
