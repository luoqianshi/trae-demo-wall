// ===== 状态 =====
let currentFood = '';
let currentMethod = '';
let currentStep = 0;
let currentSteps = [];

// ===== 页面切换 =====
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');

  // 更新底部导航
  document.querySelectorAll('.bottom-nav .nav-item').forEach(item => item.classList.remove('active'));
  if (pageId === 'pageHome') {
    document.querySelectorAll('.bottom-nav .nav-item')[0].classList.add('active');
  } else if (pageId === 'pageCamera') {
    document.querySelectorAll('.bottom-nav .nav-item')[1].classList.add('active');
  }

  // 某些页面隐藏底部导航
  const hideNavPages = ['pageCamera', 'pageTutorial'];
  document.getElementById('bottomNav').style.display = hideNavPages.includes(pageId) ? 'none' : 'flex';

  window.scrollTo(0, 0);
}

// ===== 筛选食材 =====
function filterFood(category, el) {
  document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
  el.classList.add('active');

  document.querySelectorAll('.food-card').forEach(card => {
    if (category === 'all' || card.dataset.category === category) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });
}

// ===== 显示识别结果 =====
function showRecognition(name, emoji, tag, confidence) {
  currentFood = name;
  document.getElementById('resultName').textContent = name;
  document.getElementById('resultIcon').textContent = emoji;
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTag').textContent = tag;
  document.getElementById('resultConfidence').textContent = 'AI识别 ' + confidence + '%';

  // 生成切法卡片
  const methods = cutMethodsData[name] || cutMethodsData['土豆'];
  const container = document.getElementById('cutMethods');
  container.innerHTML = methods.map(m => `
    <div class="cut-card" onclick="showTutorial('${m.name}')">
      <span class="cut-emoji">${m.emoji}</span>
      <h4>${m.name}</h4>
      <p>${m.desc}</p>
    </div>
  `).join('');

  showPage('pageResult');
}

// ===== 模拟拍照 =====
function simulateCapture() {
  document.getElementById('loadingOverlay').classList.remove('hidden');
  setTimeout(() => {
    document.getElementById('loadingOverlay').classList.add('hidden');
    // 随机选择一个食材
    const foods = [
      { name: '土豆', emoji: '🥔', tag: '根茎类', confidence: 98 },
      { name: '胡萝卜', emoji: '🥕', tag: '根茎类', confidence: 96 },
      { name: '黄瓜', emoji: '🥒', tag: '瓜类', confidence: 97 }
    ];
    const food = foods[Math.floor(Math.random() * foods.length)];
    showRecognition(food.name, food.emoji, food.tag, food.confidence);
  }, 1500);
}

// ===== 显示教学 =====
function showTutorial(method) {
  currentMethod = method;
  currentStep = 0;
  currentSteps = tutorialSteps[method] || tutorialSteps['默认'];

  document.getElementById('tutorialTitle').textContent = currentFood + ' - ' + method;
  renderStep();
  showPage('pageTutorial');
}

function renderStep() {
  const step = currentSteps[currentStep];
  document.getElementById('stepBadge').textContent = (currentStep + 1) + '/' + currentSteps.length;
  document.getElementById('progressFill').style.width = ((currentStep + 1) / currentSteps.length * 100) + '%';
  document.getElementById('progressText').textContent = '第 ' + (currentStep + 1) + ' 步，共 ' + currentSteps.length + ' 步';

  document.getElementById('tutorialContent').innerHTML = `
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">${currentStep + 1}</div>
        <div class="step-title">${step.title}</div>
      </div>
      <div class="step-visual">${step.emoji}</div>
      <div class="step-desc">${step.desc}</div>
      <div class="tip-box">
        <strong>💡 小贴士：</strong>${step.tip}
      </div>
    </div>
  `;

  const nextBtn = document.getElementById('nextBtn');
  if (currentStep >= currentSteps.length - 1) {
    nextBtn.textContent = '完成';
    nextBtn.onclick = () => {
      alert('🎉 恭喜！你已学会「' + currentFood + ' - ' + currentMethod + '」\n\n继续练习，刀工会越来越熟练！');
      showPage('pageHome');
    };
  } else {
    nextBtn.textContent = '下一步';
    nextBtn.onclick = nextStep;
  }
}

function nextStep() {
  if (currentStep < currentSteps.length - 1) {
    currentStep++;
    renderStep();
  }
}
