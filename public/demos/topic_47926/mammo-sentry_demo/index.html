<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MammoSentry · 基于乳腺钼靶的乳腺癌智能检测平台</title>
  <meta name="description" content="Swin Transformer + ResNet-18 双阶段模型 · 乳腺钼靶影像AI辅助诊断平台" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- ECharts for charts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <link rel="stylesheet" href="./styles.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            sans: ['Geist', 'Manrope', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'Menlo', 'monospace'],
          },
          colors: {
            ink: {
              950: '#070A12',
              900: '#0B0F1A',
              850: '#0E1320',
              800: '#161C2E',
              700: '#1F2940',
              600: '#2E3A5C',
            },
            scan: {
              400: '#33EEEE',
              500: '#00E5E5',
              600: '#00BFC2',
            },
            coral: {
              400: '#FF8B97',
              500: '#FF6B7A',
              600: '#E64A5A',
            },
            amber: {
              400: '#FFC56F',
              500: '#FFB84D',
            },
            mint: {
              400: '#7DEFBA',
              500: '#5EE6A8',
            },
          },
        },
      },
    };
  </script>
</head>
<body class="bg-ink-950 text-ink-100 font-sans antialiased overflow-hidden">
  <div id="app" class="h-screen w-screen flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 shrink-0 border-r border-ink-700/60 bg-ink-900/80 flex flex-col">
      <!-- Brand -->
      <div class="px-6 pt-6 pb-8 border-b border-ink-700/40">
        <div class="flex items-center gap-3">
          <div class="relative w-9 h-9">
            <svg viewBox="0 0 40 40" class="w-full h-full">
              <circle cx="20" cy="20" r="18" fill="none" stroke="#00E5E5" stroke-width="1" opacity="0.5" />
              <circle cx="20" cy="20" r="12" fill="none" stroke="#00E5E5" stroke-width="1" />
              <line x1="20" y1="2" x2="20" y2="8" stroke="#00E5E5" stroke-width="1.2" />
              <line x1="20" y1="32" x2="20" y2="38" stroke="#00E5E5" stroke-width="1.2" />
              <line x1="2" y1="20" x2="8" y2="20" stroke="#00E5E5" stroke-width="1.2" />
              <line x1="32" y1="20" x2="38" y2="20" stroke="#00E5E5" stroke-width="1.2" />
              <circle cx="20" cy="20" r="3" fill="#00E5E5" />
            </svg>
            <span class="absolute inset-0 rounded-full animate-ping bg-scan-500/10"></span>
          </div>
          <div>
            <div class="font-display text-lg font-semibold leading-none tracking-tight">Mammo<span class="text-scan-500">Sentry</span></div>
            <div class="text-[10px] font-mono text-ink-100/40 mt-1 tracking-widest">MAMMOGRAPHY · AI</div>
          </div>
        </div>
      </div>

      <!-- Section label -->
      <div class="px-6 pt-6 pb-3">
        <div class="text-[10px] font-mono uppercase tracking-[0.2em] text-ink-100/30">// 工作流</div>
      </div>

      <!-- Nav -->
      <nav class="px-3 flex-1 space-y-1">
        <a href="#/dashboard" data-route="dashboard" class="nav-item">
          <span class="nav-num">01</span>
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
          <span class="nav-label">工作台</span>
          <span class="nav-dot"></span>
        </a>
        <a href="#/analysis" data-route="analysis" class="nav-item">
          <span class="nav-num">02</span>
          <i data-lucide="scan" class="w-4 h-4"></i>
          <span class="nav-label">影像分析</span>
        </a>
        <a href="#/results" data-route="results" class="nav-item">
          <span class="nav-num">03</span>
          <i data-lucide="file-search" class="w-4 h-4"></i>
          <span class="nav-label">检测结果</span>
        </a>
        <a href="#/models" data-route="models" class="nav-item">
          <span class="nav-num">04</span>
          <i data-lucide="network" class="w-4 h-4"></i>
          <span class="nav-label">模型中心</span>
        </a>
        <a href="#/dataset" data-route="dataset" class="nav-item">
          <span class="nav-num">05</span>
          <i data-lucide="database" class="w-4 h-4"></i>
          <span class="nav-label">数据集</span>
        </a>
      </nav>

      <!-- System status -->
      <div class="m-4 p-4 border border-ink-700/60 rounded-sm bg-ink-850/60">
        <div class="flex items-center justify-between mb-2">
          <span class="text-[10px] font-mono uppercase tracking-widest text-ink-100/40">系统状态</span>
          <span class="status-dot status-dot--ok"></span>
        </div>
        <div class="font-mono text-xs space-y-1.5">
          <div class="flex justify-between">
            <span class="text-ink-100/50">GPU</span>
            <span class="text-mint-500">A100 × 4</span>
          </div>
          <div class="flex justify-between">
            <span class="text-ink-100/50">推理队列</span>
            <span>14</span>
          </div>
          <div class="flex justify-between">
            <span class="text-ink-100/50">延迟 P95</span>
            <span>312ms</span>
          </div>
          <div class="flex justify-between">
            <span class="text-ink-100/50">运行时间</span>
            <span class="text-scan-500">42d 7h</span>
          </div>
        </div>
      </div>

      <!-- Version -->
      <div class="px-6 py-4 border-t border-ink-700/40 text-[10px] font-mono text-ink-100/30 flex justify-between">
        <span>v0.9.2-rc</span>
        <span>build 2614</span>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 flex flex-col min-w-0">
      <!-- Top bar -->
      <header class="h-16 shrink-0 border-b border-ink-700/60 bg-ink-900/60 flex items-center px-8 gap-6">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-3 text-sm">
          <span class="font-mono text-ink-100/40">/</span>
          <span id="crumb-section" class="text-ink-100/50">系统</span>
          <span class="font-mono text-ink-100/30">/</span>
          <span id="crumb-page" class="text-ink-100 font-medium">工作台</span>
        </div>

        <!-- Search -->
        <div class="ml-8 flex items-center gap-2 px-3 py-1.5 border border-ink-700/60 rounded-sm w-80 bg-ink-850/40">
          <i data-lucide="search" class="w-3.5 h-3.5 text-ink-100/40"></i>
          <input type="text" placeholder="搜索病例 / 模型 / 报告..." class="bg-transparent flex-1 outline-none text-xs placeholder:text-ink-100/30" />
          <span class="font-mono text-[10px] text-ink-100/30 px-1.5 py-0.5 border border-ink-700 rounded">⌘K</span>
        </div>

        <!-- Right cluster -->
        <div class="ml-auto flex items-center gap-5">
          <div class="flex items-center gap-2 text-xs font-mono">
            <span class="status-dot status-dot--scan"></span>
            <span class="text-ink-100/60">实时连接</span>
          </div>
          <div class="text-xs font-mono text-ink-100/60">
            <span id="topbar-time">--:--:--</span> <span class="text-ink-100/30">UTC+8</span>
          </div>
          <button class="relative p-2 hover:bg-ink-800 rounded-sm transition">
            <i data-lucide="bell" class="w-4 h-4"></i>
            <span class="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-coral-500 rounded-full"></span>
          </button>
          <div class="flex items-center gap-2 pl-5 border-l border-ink-700/60">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-scan-500/30 to-ink-700 border border-scan-500/40 flex items-center justify-center font-mono text-xs">DR</div>
            <div class="text-xs">
              <div class="font-medium">Dr. Chen</div>
              <div class="text-ink-100/40 text-[10px]">放射科 · 主治医师</div>
            </div>
          </div>
        </div>
      </header>

      <!-- Page content -->
      <div id="page-root" class="flex-1 overflow-y-auto"></div>
    </main>
  </div>

  <!-- Page templates -->
  <template id="tpl-dashboard">
    <!-- dashboard content injected via app.js -->
  </template>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
