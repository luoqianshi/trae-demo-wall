<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水墨古镇 · 侠客行</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'ZCOOL XiaoWei','Ma Shan Zheng','STKaiti','KaiTi','Microsoft YaHei','PingFang SC',serif; user-select: none; }
  canvas { display: block; }
  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

  #click-to-play {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #2C1810; font-size: 28px; text-align: center; pointer-events: auto; cursor: pointer;
    background: rgba(245,240,230,0.88); padding: 24px 48px; border-radius: 4px;
    border: 2px solid #8B7355; letter-spacing: 4px; transition: opacity 0.4s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  #click-to-play span { font-size: 13px; color: rgba(44,24,16,0.5); display: block; margin-top: 6px; letter-spacing: 2px; }

  #message {
    position: absolute; top: 18%; left: 50%; transform: translate(-50%,-50%);
    color: #C41E1E; font-size: 36px; font-weight: bold;
    text-shadow: 0 0 20px rgba(196,30,30,0.3),0 2px 4px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap;
    letter-spacing: 3px;
  }

  #player-health-bar { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); width: 220px; }
  #player-health-bar .health-label { color: #2C1810; font-size: 14px; margin-bottom: 5px; text-shadow: 0 0 4px rgba(255,255,255,0.5); letter-spacing: 2px; }
  #player-health-bar .health-bg { width: 100%; height: 12px; background: rgba(44,24,16,0.15); border-radius: 2px; overflow: hidden; border: 1px solid rgba(44,24,16,0.2); }
  #player-health-bar .health-fill { height: 100%; border-radius: 2px; transition: width 0.35s; background: linear-gradient(90deg,#C41E1E,#E85050); }

  #enemy-health-list { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 6px; }
  .enemy-health-item { width: 150px; }
  .enemy-health-item .health-label { color: #2C1810; font-size: 11px; margin-bottom: 2px; text-shadow: 0 0 4px rgba(255,255,255,0.5); }
  .enemy-health-item .health-bg { width: 100%; height: 8px; background: rgba(44,24,16,0.12); border-radius: 2px; overflow: hidden; border: 1px solid rgba(44,24,16,0.12); }
  .enemy-health-item .health-fill { height: 100%; border-radius: 2px; transition: width 0.3s; background: linear-gradient(90deg,#8B0000,#C41E1E); }

  #cooldown-row { position: absolute; bottom: 88px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; align-items: center; }
  .cd-indicator { width: 56px; height: 8px; background: rgba(44,24,16,0.1); border-radius: 4px; overflow: hidden; }
  .cd-indicator .cd-fill { height: 100%; border-radius: 2px; transition: width 0.05s linear; }
  #atk-cd .cd-fill { background: #C41E1E; }
  #dash-cd .cd-fill { background: #2C5F8A; }
  .cd-label { color: rgba(44,24,16,0.5); font-size: 10px; }

  #instructions { position: absolute; bottom: 108px; left: 50%; transform: translateX(-50%); color: rgba(44,24,16,0.5); font-size: 11px; text-align: center; letter-spacing: 0.5px; }

  #pause-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.72); z-index: 100; display: none; justify-content: center; align-items: center; pointer-events: auto; }
  #pause-menu.show { display: flex; }
  #pause-panel { background: rgba(245,240,230,0.96); border: 2px solid #8B7355; border-radius: 4px; padding: 32px 40px; min-width: 340px; color: #2C1810; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  #pause-panel h2 { text-align: center; font-size: 24px; margin-bottom: 24px; letter-spacing: 4px; }
  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(139,115,85,0.2); }
  .setting-row label { font-size: 14px; color: #2C1810; }
  .setting-row select, .setting-row input[type=range] { cursor: pointer; }
  .setting-row select { padding: 4px 8px; border-radius: 2px; background: rgba(255,255,255,0.8); color: #2C1810; border: 1px solid #8B7355; font-size: 13px; outline: none; font-family: inherit; }
  .setting-row select option { background: #F5F0E6; color: #2C1810; }
  .setting-row input[type=range] { width: 100px; accent-color: #8B7355; }
  .setting-row .range-val { font-size: 13px; color: #2C1810; min-width: 24px; text-align: center; }

  .toggle-switch { position: relative; width: 44px; height: 24px; cursor: pointer; }
  .toggle-switch input { display: none; }
  .toggle-slider { position: absolute; inset: 0; background: rgba(139,115,85,0.3); border-radius: 12px; transition: 0.3s; }
  .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #F5F0E6; border-radius: 50%; transition: 0.3s; }
  .toggle-switch input:checked + .toggle-slider { background: #8B7355; }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

  #pause-resume-btn, #restart-btn, #history-btn {
    display: block; width: 100%; margin-top: 24px; padding: 10px; border: 1px solid #8B7355;
    border-radius: 2px; background: rgba(139,115,85,0.1); color: #2C1810; font-size: 16px;
    cursor: pointer; letter-spacing: 2px; transition: background 0.2s; font-family: inherit;
  }
  #pause-resume-btn:hover, #restart-btn:hover, #history-btn:hover { background: rgba(139,115,85,0.25); }
  #restart-btn { margin-top: 8px; font-size: 14px; }
  #history-btn { margin-top: 8px; font-size: 13px; }

  #dash-ready { position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%); color: #2C5F8A; font-size: 13px; font-weight: bold; opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 10px rgba(44,95,138,0.3); }

  #score-board { position: absolute; top: 20px; left: 20px; color: #2C1810; font-size: 14px; text-shadow: 0 0 6px rgba(255,255,255,0.5); }
  #score-board .score-row { margin-bottom: 4px; }
  #score-board .score-val { color: #C41E1E; font-weight: bold; }

  #combo-text { position: absolute; top: 35%; left: 50%; transform: translate(-50%,-50%); font-size: 30px; font-weight: bold; opacity: 0; transition: opacity 0.15s; pointer-events: none; letter-spacing: 3px; }

  #history-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.78); z-index: 200; display: none; justify-content: center; align-items: center; pointer-events: auto; }
  #history-modal.show { display: flex; }
  #history-panel { background: rgba(245,240,230,0.97); border: 2px solid #8B7355; border-radius: 4px; padding: 28px 32px; min-width: 360px; max-height: 70vh; color: #2C1810; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  #history-panel h3 { text-align: center; font-size: 20px; margin-bottom: 16px; letter-spacing: 3px; }
  #history-list { max-height: 280px; overflow-y: auto; margin-bottom: 16px; }
  .history-item { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid rgba(139,115,85,0.15); font-size: 13px; }
  .history-item .hk { color: #C41E1E; font-weight: bold; }
  .history-item .hd { color: rgba(44,24,16,0.5); font-size: 11px; }
  .history-empty { text-align: center; color: rgba(44,24,16,0.4); padding: 20px; font-size: 13px; }
  #history-best { text-align: center; font-size: 15px; margin-bottom: 12px; color: #C41E1E; }
  #history-close-btn { display: block; width: 100%; padding: 8px; border: 1px solid #8B7355; border-radius: 2px; background: rgba(139,115,85,0.08); color: #2C1810; font-size: 14px; cursor: pointer; transition: background 0.2s; font-family: inherit; }
  #history-close-btn:hover { background: rgba(139,115,85,0.2); }

  /* 死亡菜单 */
  #death-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.82); z-index: 150; display: none; justify-content: center; align-items: center; pointer-events: auto; }
  #death-menu.show { display: flex; }
  #death-panel { background: rgba(245,240,230,0.95); border: 3px solid #C41E1E; border-radius: 4px; padding: 36px 48px; text-align: center; color: #2C1810; box-shadow: 0 8px 40px rgba(0,0,0,0.6); min-width: 320px; }
  #death-panel h2 { font-size: 32px; letter-spacing: 6px; margin-bottom: 8px; color: #C41E1E; }
  #death-panel .death-sub { font-size: 14px; color: rgba(44,24,16,0.6); margin-bottom: 20px; letter-spacing: 2px; }
  #death-panel .death-score { font-size: 18px; margin-bottom: 24px; letter-spacing: 2px; }
  #death-panel .death-score span { color: #C41E1E; font-size: 28px; font-weight: bold; }
  #death-restart-btn { display: inline-block; padding: 12px 40px; border: 2px solid #8B7355; border-radius: 2px; background: #8B7355; color: #F5F0E6; font-size: 18px; cursor: pointer; letter-spacing: 4px; transition: all 0.2s; font-family: inherit; }
  #death-restart-btn:hover { background: #6B5A45; border-color: #6B5A45; }

  /* 吸血提示 */
  #lifesteal-text { position: absolute; top: 42%; left: 50%; transform: translate(-50%,-50%); font-size: 16px; color: #4CAF50; font-weight: bold; opacity: 0; transition: opacity 0.15s; pointer-events: none; text-shadow: 0 0 10px rgba(76,175,80,0.4); }
</style>

<div id="ui">
  <div id="click-to-play"><span id="ctp-title">点击屏幕开始游戏</span><span id="ctp-sub">Click to Play</span></div>
  <div id="message"></div>
  <div id="player-health-bar">
    <div class="health-label" id="pl-label">侠客</div>
    <div class="health-bg"><div class="health-fill" style="width:100%"></div></div>
  </div>
  <div id="enemy-health-list"></div>
  <div id="cooldown-row">
    <span class="cd-label">招式</span><div class="cd-indicator" id="atk-cd"><div class="cd-fill"></div></div>
    <span class="cd-label">轻功</span><div class="cd-indicator" id="dash-cd"><div class="cd-fill"></div></div>
  </div>
  <div id="dash-ready">轻功就绪</div>
  <div id="instructions"></div>
  <div id="score-board">
    <div class="score-row"><span id="score-label-current">当前击杀</span>: <span class="score-val" id="score-current">0</span></div>
    <div class="score-row"><span id="score-label-best">最高纪录</span>: <span class="score-val" id="score-best">0</span></div>
  </div>
  <div id="combo-text"></div>
  <div id="lifesteal-text"></div>
</div>

<!-- 暂停菜单 -->
<div id="pause-menu">
  <div id="pause-panel">
    <h2 id="pause-title">暂停</h2>
    <div class="setting-row">
      <label id="set-monster-respawn">贼寇刷新</label>
      <label class="toggle-switch"><input type="checkbox" id="toggle-respawn" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="setting-row">
      <label id="set-monster-count">贼寇数量</label>
      <input type="range" id="range-count" min="1" max="8" value="3" step="1">
      <span class="range-val" id="val-count">3</span>
    </div>
    <div class="setting-row">
      <label id="set-language">语言</label>
      <select id="select-lang">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
    <button id="pause-resume-btn">继续游戏</button>
    <button id="restart-btn">重新开始</button>
    <button id="history-btn">侠客战绩</button>
  </div>
</div>

<!-- 历史记录弹窗 -->
<div id="history-modal">
  <div id="history-panel">
    <h3 id="history-title">侠客战绩</h3>
    <div id="history-best"></div>
    <div id="history-list"></div>
    <button id="history-close-btn">关闭</button>
  </div>
</div>

<!-- 死亡菜单 -->
<div id="death-menu">
  <div id="death-panel">
    <h2 id="death-title">侠客陨落</h2>
    <div class="death-sub" id="death-sub">胜败乃兵家常事</div>
    <div class="death-score"><span id="death-kills">0</span> <span id="death-label">击杀</span></div>
    <button id="death-restart-btn">重整旗鼓</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';

// ==================== i18n ====================
const LANG = {
  zh: {
    clickToPlay: '点击屏幕开始游戏', clickToPlaySub: '侠客行 · 水墨古镇',
    player: '侠客', enemy: '贼寇',
    hit: '命中！', defeated: '击败贼寇！', damaged: '受到攻击！',
    playerDefeated: '侠客陨落！', enemyRespawn: '贼寇重新出现！',
    dodged: '闪避！',
    instructions: 'W/A/S/D 移动 | 空格 跳跃 | 鼠标 视角 | 左键 出招 | Shift 轻功 | R 回城 | ESC 暂停',
    pauseTitle: '暂停', resume: '继续游戏',
    setMonsterRespawn: '贼寇刷新', setMonsterCount: '贼寇数量', setLanguage: '语言',
    dashReady: '轻功就绪',
    combo1: '横斩！', combo2: '上挑！', combo3: '重击！',
    currentKills: '当前击杀', bestRecord: '最高纪录',
    historyTitle: '侠客战绩', historyBtn: '侠客战绩',
    noHistory: '暂无战绩', close: '关闭',
    newRecord: '新纪录！',
    deathTitle: '侠客陨落', deathSub: '胜败乃兵家常事',
    deathKills: '击杀', deathRestart: '重整旗鼓',
    lifesteal: '吸血',
    crit: '暴击！',
    bossAppear: '头目出现！', bossDefeated: '头目被击败！',
    restart: '重新开始', restartBtn: '重新开始',
    unstuck: '回到出生点',
  },
  en: {
    clickToPlay: 'Click to Play', clickToPlaySub: 'Ink Dynasty',
    player: 'Warrior', enemy: 'Bandit',
    hit: 'Hit!', defeated: 'Bandit Defeated!', damaged: 'Damaged!',
    playerDefeated: 'You Died!', enemyRespawn: 'Bandit Respawned!',
    dodged: 'Dodged!',
    instructions: 'W/A/S/D Move | Space Jump | Mouse Look | L-Click Attack | Shift Dash | R Unstuck | ESC Pause',
    pauseTitle: 'Paused', resume: 'Resume',
    setMonsterRespawn: 'Bandit Respawn', setMonsterCount: 'Bandit Count', setLanguage: 'Language',
    dashReady: 'Dash Ready',
    combo1: 'Slash!', combo2: 'Uppercut!', combo3: 'Smash!',
    currentKills: 'Kills', bestRecord: 'Best',
    historyTitle: 'Records', historyBtn: 'Records',
    noHistory: 'No Records', close: 'Close',
    newRecord: 'New Record!',
    deathTitle: 'Fallen Warrior', deathSub: 'Defeat is not the end',
    deathKills: 'Kills', deathRestart: 'Rise Again',
    lifesteal: 'Lifesteal',
    crit: 'Crit!',
    bossAppear: 'Boss Appears!', bossDefeated: 'Boss Defeated!',
    restart: 'Restart', restartBtn: 'Restart',
    unstuck: 'Teleport to Spawn',
  }
};
let currentLang = 'zh';
function t(key) { return LANG[currentLang][key] || key; }

// ==================== 设置 ====================
const settings = {
  monsterRespawn: true,
  monsterCount: 3,
  language: 'zh',
};
try {
  const saved = JSON.parse(localStorage.getItem('gameSettings'));
  if (saved) Object.assign(settings, saved);
} catch(e) {}
currentLang = settings.language;

// ==================== 常量 ====================
const CITY_SIZE = 60;
const BOUNDARY = CITY_SIZE / 2 - 2;
const PLAYER_SPEED = 5;
const ENEMY_SPEED = 2.5;
const ENEMY_WANDER_SPEED = 1.2;
const ENEMY_ATTACK_RANGE = 1.8;
const ATTACK_RANGE = ENEMY_ATTACK_RANGE * 1.1;
const ATTACK_ANGLE = Math.PI / 3;
const ATTACK_COOLDOWN = 0.5;
const PLAYER_DAMAGE = 25;
const ENEMY_DAMAGE = 10;
const ENEMY_ATTACK_COOLDOWN = 1.5;
const ENEMY_ATTACK_WINDUP = 0.3;
const ENEMY_ATTACK_ANIM_DUR = 0.5;
const MAX_HEALTH = 100;
const LIFESTEAL_RATIO = 0.0025;
const ENEMY_CRIT_CHANCE = 0.05;
const ENEMY_CRIT_MULT = 1.5;
const BOSS_SPAWN_INTERVAL = 5;
const BOSS_SCALE = 0.05;
const ENEMY_RESPAWN_TIME = 4;
const ENEMY_DETECT_RANGE = 30;
const ENEMY_SPAWN_MIN = 12;
const ENEMY_SPAWN_MAX = 28;
const CAMERA_DISTANCE = 6;
const CAMERA_HEIGHT = 2.5;
const CAMERA_LERP = 8;
const MOUSE_SENSITIVITY = 0.002;
const JUMP_FORCE = 8;
const GRAVITY = 20;
const DASH_SPEED = 22;
const DASH_DURATION = 0.18;
const DASH_COOLDOWN = 3.0;
const HIT_INVINCIBLE = 0.5;
const SPAWN_POS = { x: 0, z: 5 };

// ==================== 纹理生成器（Canvas） ====================
function createCanvasTexture(w, h, drawFn) {
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  drawFn(ctx, w, h);
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// 石板路纹理
function createStoneGroundTex() {
  return createCanvasTexture(512, 512, (ctx, w, h) => {
    ctx.fillStyle = '#B8B0A0'; ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 80; i++) {
      const x = Math.random() * w, y = Math.random() * h;
      const s = 8 + Math.random() * 16;
      ctx.fillStyle = `rgba(${140+Math.random()*40},${130+Math.random()*40},${120+Math.random()*40},0.3)`;
      ctx.fillRect(x, y, s, s * (0.5 + Math.random()));
    }
    // 裂缝
    ctx.strokeStyle = 'rgba(100,90,80,0.15)'; ctx.lineWidth = 0.5;
    for (let i = 0; i < 15; i++) {
      ctx.beginPath(); ctx.moveTo(Math.random() * w, Math.random() * h);
      ctx.lineTo(Math.random() * w, Math.random() * h); ctx.stroke();
    }
  });
}

// 木纹纹理
function createWoodTex() {
  return createCanvasTexture(256, 256, (ctx, w, h) => {
    ctx.fillStyle = '#8B7355'; ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 40; i++) {
      ctx.strokeStyle = `rgba(${60+Math.random()*30},${40+Math.random()*30},${20+Math.random()*20},0.2)`;
      ctx.lineWidth = 1 + Math.random() * 2;
      ctx.beginPath(); ctx.moveTo(0, i * 7 + Math.random() * 5);
      for (let x = 0; x < w; x += 20) {
        ctx.lineTo(x, i * 7 + Math.sin(x * 0.02) * 4 + Math.random() * 2);
      }
      ctx.stroke();
    }
  });
}

// 石墙纹理
function createStoneWallTex() {
  return createCanvasTexture(256, 256, (ctx, w, h) => {
    ctx.fillStyle = '#6B6B6B'; ctx.fillRect(0, 0, w, h);
    const rows = 8, cols = 6;
    const cw = w / cols, ch = h / rows;
    for (let r = 0; r < rows; r++) {
      const offset = r % 2 === 0 ? 0 : cw / 2;
      for (let c = 0; c < cols + (r % 2 === 0 ? 0 : 1); c++) {
        ctx.fillStyle = `rgb(${90+Math.random()*40},${90+Math.random()*40},${90+Math.random()*40})`;
        ctx.fillRect(c * cw - offset + 1, r * ch + 1, cw - 2, ch - 2);
        ctx.strokeStyle = 'rgba(40,40,40,0.3)'; ctx.lineWidth = 1;
        ctx.strokeRect(c * cw - offset + 1, r * ch + 1, cw - 2, ch - 2);
      }
    }
  });
}

// 布料纹理
function createClothTex(baseHue) {
  return createCanvasTexture(128, 128, (ctx, w, h) => {
    const hsl = `hsl(${baseHue}, 30%, 65%)`;
    ctx.fillStyle = hsl; ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = `hsla(${baseHue}, 20%, 55%, 0.15)`;
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 20; i++) {
      ctx.beginPath(); ctx.moveTo(0, i * 7); ctx.lineTo(w, i * 7); ctx.stroke();
    }
    for (let i = 0; i < 20; i++) {
      ctx.beginPath(); ctx.moveTo(i * 7, 0); ctx.lineTo(i * 7, h); ctx.stroke();
    }
  });
}

// 脸部纹理（精美化）
function createFaceTex(skinHue, isPlayer) {
  return createCanvasTexture(128, 128, (ctx, w, h) => {
    // 皮肤底色
    const baseGrad = ctx.createRadialGradient(64, 50, 10, 64, 64, 80);
    baseGrad.addColorStop(0, `hsl(${skinHue}, 22%, 82%)`);
    baseGrad.addColorStop(0.6, `hsl(${skinHue}, 25%, 76%)`);
    baseGrad.addColorStop(1, `hsl(${skinHue}, 20%, 70%)`);
    ctx.fillStyle = baseGrad; ctx.fillRect(0, 0, w, h);

    // 眼白
    ctx.fillStyle = '#F8F8F8';
    ctx.beginPath(); ctx.ellipse(38, 52, 9, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(90, 52, 9, 10, 0, 0, Math.PI * 2); ctx.fill();

    // 虹膜
    const irisGrad = ctx.createRadialGradient(38, 52, 1, 38, 52, 7);

    ctx.fillStyle = irisGrad;
    ctx.beginPath(); ctx.arc(38, 52, 6.5, 0, Math.PI * 2); ctx.fill();
    const irisGrad2 = ctx.createRadialGradient(90, 52, 1, 90, 52, 7);
    irisGrad2.addColorStop(0, '#1A1A1A'); irisGrad2.addColorStop(0.7, '#3A2A1A'); irisGrad2.addColorStop(1, '#5A4A3A');
    ctx.fillStyle = irisGrad2;
    ctx.beginPath(); ctx.arc(90, 52, 6.5, 0, Math.PI * 2); ctx.fill();

    // 瞳孔
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(38, 52, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(90, 52, 3, 0, Math.PI * 2); ctx.fill();

    // 高光

    ctx.beginPath(); ctx.arc(88, 48, 1.8, 0, Math.PI * 2); ctx.fill();

    // 上眼睑阴影

    ctx.beginPath(); ctx.ellipse(38, 52, 9, 10, 0, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.ellipse(90, 52, 9, 10, 0, Math.PI, 0); ctx.fill();

    // 眉毛
    ctx.strokeStyle = '#2A2018'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(26, 38); ctx.quadraticCurveTo(38, 34, 48, 37); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(80, 37); ctx.quadraticCurveTo(90, 34, 102, 38); ctx.stroke();

    // 鼻子
    ctx.strokeStyle = `hsla(${skinHue}, 15%, 55%, 0.35)`; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(64, 52); ctx.quadraticCurveTo(60, 68, 64, 72); ctx.stroke();
    ctx.fillStyle = `hsla(${skinHue}, 10%, 72%, 0.2)`;
    ctx.beginPath(); ctx.ellipse(64, 72, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

    // 嘴唇
    ctx.fillStyle = isPlayer ? '#C47A6A' : '#A06050';
    ctx.beginPath(); ctx.moveTo(48, 82); ctx.quadraticCurveTo(64, 90, 80, 82);
    ctx.quadraticCurveTo(64, 84, 48, 82); ctx.fill();
    ctx.strokeStyle = isPlayer ? '#A06050' : '#804030'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(48, 82); ctx.quadraticCurveTo(64, 90, 80, 82); ctx.stroke();

    // 脸颊红晕
    ctx.fillStyle = 'rgba(220,130,120,0.18)';
    ctx.beginPath(); ctx.ellipse(24, 62, 9, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(104, 62, 9, 6, 0, 0, Math.PI * 2); ctx.fill();

    // 发际线（头顶阴影）
    const hairGrad = ctx.createLinearGradient(0, 0, 0, 40);
    hairGrad.addColorStop(0, isPlayer ? 'rgba(20,15,10,0.4)' : 'rgba(10,8,5,0.45)');
    hairGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = hairGrad; ctx.fillRect(8, 4, 112, 40);
  });
}

const COLLIDERS = [];
const PLAYER_RADIUS = 0.3;
const ENEMY_RADIUS = 0.3;

function addCollider(minX, maxX, minZ, maxZ, minY, maxY, type) {
  COLLIDERS.push({ minX, maxX, minZ, maxZ, minY, maxY, type });
}

function checkCollisionAt(x, z, y, radius) {
  for (let i = 0; i < COLLIDERS.length; i++) {
    const c = COLLIDERS[i];
    if (x + radius > c.minX && x - radius < c.maxX &&
        z + radius > c.minZ && z - radius < c.maxZ &&
        y + 1.5 > c.minY && y < c.maxY) {
      return true;
    }
  }
  return false;
}

const petals = [];
const MAX_PETALS = 35;
function spawnPetal() {
  const geo = new THREE.PlaneGeometry(0.08, 0.14);
  const hue = 0.07 + Math.random() * 0.06;
  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color().setHSL(hue, 0.5, 0.65 + Math.random() * 0.25),
    side: THREE.DoubleSide, transparent: true, opacity: 0.75, depthWrite: false
  });
  const petal = new THREE.Mesh(geo, mat);
  petal.position.set(
    (Math.random() - 0.5) * CITY_SIZE * 0.9,
    8 + Math.random() * 7,
    (Math.random() - 0.5) * CITY_SIZE * 0.9
  );
  petal.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  petal.userData = {
    velocity: new THREE.Vector3((Math.random() - 0.5) * 0.4, -0.25 - Math.random() * 0.5, (Math.random() - 0.5) * 0.4),
    rotSpeed: new THREE.Vector3((Math.random() - 0.5) * 2.5, (Math.random() - 0.5) * 2.5, (Math.random() - 0.5) * 2.5),
    life: 9 + Math.random() * 7, maxLife: 16
  };
  scene.add(petal);
  petals.push(petal);
}

function updatePetals(dt) {
  for (let i = petals.length - 1; i >= 0; i--) {
    const p = petals[i];
    p.userData.life -= dt;
    if (p.userData.life <= 0 || p.position.y < -1) {
      scene.remove(p); p.geometry.dispose(); p.material.dispose();
      petals.splice(i, 1);
    } else {
      p.position.x += p.userData.velocity.x * dt;
      p.position.y += p.userData.velocity.y * dt;
      p.position.z += p.userData.velocity.z * dt;
      p.rotation.x += p.userData.rotSpeed.x * dt;
      p.rotation.y += p.userData.rotSpeed.y * dt;
      p.rotation.z += p.userData.rotSpeed.z * dt;
      p.material.opacity = Math.min(0.75, p.userData.life / p.userData.maxLife * 0.75);
    }
  }
  while (petals.length < MAX_PETALS) spawnPetal();
}

function createWallSegment(x, z, w, d, h) {
  const wallMat = new THREE.MeshStandardMaterial({ map: texStoneWall, roughness: 0.7, metalness: 0.1, color: 0x6B6B6B });

  }
  return wall;
}

function createChineseRoof(w, d) {
  const roof = new THREE.Group();
  const roofMat = new THREE.MeshLambertMaterial({ color: 0x3A3A3A });
  const ridgeMat = new THREE.MeshLambertMaterial({ color: 0x2A2A2A });

  // 主屋顶（A字形）
  const leftSlope = new THREE.Mesh(new THREE.BoxGeometry(w / 2 + 0.3, 0.12, d + 0.8), roofMat);
  leftSlope.position.set(-w / 4, 0.15, 0);
  leftSlope.rotation.z = 0.45;
  leftSlope.castShadow = true;
  roof.add(leftSlope);

  const rightSlope = new THREE.Mesh(new THREE.BoxGeometry(w / 2 + 0.3, 0.12, d + 0.8), roofMat);
  rightSlope.position.set(w / 4, 0.15, 0);
  rightSlope.rotation.z = -0.45;
  rightSlope.castShadow = true;
  roof.add(rightSlope);

  // 屋脊
  const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, d + 0.8), ridgeMat);
  ridge.position.y = 0.55;
  ridge.castShadow = true;
  roof.add(ridge);

  // 飞檐翘角
  const eaveMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
  const eaveFront = new THREE.Mesh(new THREE.BoxGeometry(w + 0.6, 0.06, 0.3), eaveMat);
  eaveFront.position.set(0, 0.05, d / 2 + 0.3);
  roof.add(eaveFront);
  const eaveBack = new THREE.Mesh(new THREE.BoxGeometry(w + 0.6, 0.06, 0.3), eaveMat);
  eaveBack.position.set(0, 0.05, -d / 2 - 0.3);
  roof.add(eaveBack);

  return roof;
}

function createChineseBuilding(x, z, w, d, floorH, floors, rotateY = 0) {
  const building = new THREE.Group();
  const woodMat = new THREE.MeshStandardMaterial({ map: texWood, roughness: 0.6, metalness: 0.05, color: 0x8B7355 });
  // 不修改共享纹理的repeat，避免影响其他建筑
  const darkWoodMat = new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.1, color: 0x6B5A45 });
  const wallThick = 0.2;

  for (let f = 0; f < floors; f++) {
    const baseY = f * floorH;

    // 地板
    const floorGeo = new THREE.Mesh(new THREE.BoxGeometry(w, 0.1, d), new THREE.MeshLambertMaterial({ color: 0xA09080 }));
    floorGeo.position.y = baseY + 0.05;
    floorGeo.receiveShadow = true;
    building.add(floorGeo);

    // 后墙
    const backWall = new THREE.Mesh(new THREE.BoxGeometry(w, floorH, wallThick), woodMat);
    backWall.position.set(0, baseY + floorH / 2, -d / 2);
    backWall.castShadow = true; backWall.receiveShadow = true;
    building.add(backWall);

    // 左墙
    const leftWall = new THREE.Mesh(new THREE.BoxGeometry(wallThick, floorH, d), woodMat);
    leftWall.position.set(-w / 2, baseY + floorH / 2, 0);
    leftWall.castShadow = true; leftWall.receiveShadow = true;
    building.add(leftWall);

    // 右墙
    const rightWall = new THREE.Mesh(new THREE.BoxGeometry(wallThick, floorH, d), woodMat);
    rightWall.position.set(w / 2, baseY + floorH / 2, 0);
    rightWall.castShadow = true; rightWall.receiveShadow = true;
    building.add(rightWall);

    // 前墙（完整封闭）
    const frontWall = new THREE.Mesh(new THREE.BoxGeometry(w, floorH, wallThick), woodMat);
    frontWall.position.set(0, baseY + floorH / 2, d / 2);
    frontWall.castShadow = true; frontWall.receiveShadow = true;
    building.add(frontWall);

    // 楼层间横梁
    if (f < floors - 1) {
      const beam = new THREE.Mesh(new THREE.BoxGeometry(w, 0.15, d), darkWoodMat);
      beam.position.y = baseY + floorH;
      beam.castShadow = true;
      building.add(beam);
    }
  }

  // 屋顶
  const roof = createChineseRoof(w, d);
  roof.position.y = floors * floorH;
  building.add(roof);

  building.position.set(x, 0, z);
  building.rotation.y = rotateY;
  scene.add(building);

  // 注册碰撞体（实体建筑，不可进入）
  const hw = w / 2, hd = d / 2;
  const totalH = floors * floorH;
  addCollider(x - hw, x + hw, z - hd, z + hd, 0, totalH, 'building');

  return building;
}

function createInkTree(x, z, scale = 1) {

      (Math.random() - 0.5) * 0.3 * scale,
      0.8 * scale + i * 0.4 * scale,
      (Math.random() - 0.5) * 0.3 * scale
    );
    leaf.scale.set(1, 0.6, 1);
    leaf.castShadow = true;
    tree.add(leaf);
  }
  tree.position.set(x, 0, z);
  scene.add(tree);
  return tree;

  pole.position.y = y / 2 + 0.5; pole.castShadow = true; lantern.add(pole);
  lantern.position.set(x, 0, z);

// ==================== 角色创建（国风精美化 V2） ====================
function createCharacter(bodyColor, armorColor, weaponType, isBoss) {
  const group = new THREE.Group();
  const scale = isBoss ? 1.4 : 1.0;
  const isPlayer = weaponType === 'sword';
  const faceTex = isPlayer ? texFacePlayer : texFaceEnemy;
  const clothTex = isPlayer ? texClothPlayer : texClothEnemy;

  const mat = new THREE.MeshStandardMaterial({ roughness: 0.55, metalness: 0.02, color: bodyColor });
  const armorMat = new THREE.MeshStandardMaterial({ roughness: 0.35, metalness: 0.2, color: armorColor });
  const clothMat = new THREE.MeshStandardMaterial({ map: clothTex, roughness: 0.6, metalness: 0.02, color: bodyColor });
  const goldMat = new THREE.MeshStandardMaterial({ roughness: 0.2, metalness: 0.85, color: 0xD4A84B });
  const darkMetalMat = new THREE.MeshStandardMaterial({ roughness: 0.25, metalness: 0.75, color: 0x3A3A3A });
  clothTex.repeat.set(2, 2);

  // 头部（带脸纹理）
  const headGeo = new THREE.SphereGeometry(0.16 * scale, 16, 16);
  const head = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({ map: faceTex, roughness: 0.5, metalness: 0.01 }));
  head.position.y = 1.55 * scale; head.castShadow = true; group.add(head);

  // 头发（玩家专属）
  let hairGroup = null;
  if (isPlayer) {
    hairGroup = new THREE.Group();
    const hairMat = new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.02, color: 0x1A1210 });
    // 后脑勺头发
    const backHair = new THREE.Mesh(new THREE.SphereGeometry(0.17 * scale, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2), hairMat);
    backHair.position.set(0, 1.58 * scale, -0.06 * scale); backHair.scale.set(1, 0.7, 0.8);
    hairGroup.add(backHair);
    // 顶髻
    const topKnot = new THREE.Mesh(new THREE.CylinderGeometry(0.06 * scale, 0.08 * scale, 0.12 * scale, 10), hairMat);
    topKnot.position.y = 1.7 * scale; hairGroup.add(topKnot);
    const knotBall = new THREE.Mesh(new THREE.SphereGeometry(0.07 * scale, 8, 8), hairMat);
    knotBall.position.y = 1.78 * scale; hairGroup.add(knotBall);
    // 发簪
    const hairpin = new THREE.Mesh(
      new THREE.CylinderGeometry(0.015 * scale, 0.015 * scale, 0.2 * scale, 6),
      new THREE.MeshStandardMaterial({ roughness: 0.15, metalness: 0.9, color: 0xC0C0C0 })
    );
    hairpin.position.set(0.08 * scale, 1.74 * scale, 0);
    hairpin.rotation.z = Math.PI * 0.3;
    hairGroup.add(hairpin);
    // 两侧鬓发
    for (let s = -1; s <= 1; s += 2) {
      const sideHair = new THREE.Mesh(new THREE.BoxGeometry(0.04 * scale, 0.18 * scale, 0.03 * scale), hairMat);
      sideHair.position.set(s * 0.14 * scale, 1.5 * scale, 0.06 * scale);
      hairGroup.add(sideHair);
    }
    group.add(hairGroup);
  }

  // 脖子
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.04 * scale, 0.05 * scale, 0.12 * scale, 8), mat);
  neck.position.y = 1.35 * scale; group.add(neck);

  // 身体（长袍样式，带布料纹理）
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.28 * scale, 0.55 * scale, 0.22 * scale), clothMat);
  body.position.y = 1.08 * scale; body.castShadow = true; group.add(body);

  // 胸甲（装饰性）
  const chestPlate = new THREE.Mesh(new THREE.BoxGeometry(0.22 * scale, 0.2 * scale, 0.04 * scale), armorMat);
  chestPlate.position.set(0, 1.18 * scale, 0.13 * scale); chestPlate.castShadow = true; group.add(chestPlate);
  // 胸甲花纹（交叉线）
  const chestLine1 = new THREE.Mesh(new THREE.BoxGeometry(0.2 * scale, 0.02 * scale, 0.05 * scale), goldMat);
  chestLine1.position.set(0, 1.1 * scale, 0.15 * scale); chestLine1.rotation.z = 0.3; group.add(chestLine1);
  const chestLine2 = new THREE.Mesh(new THREE.BoxGeometry(0.2 * scale, 0.02 * scale, 0.05 * scale), goldMat);
  chestLine2.position.set(0, 1.26 * scale, 0.15 * scale); chestLine2.rotation.z = -0.3; group.add(chestLine2);

  // 腰带（更精致）
  const belt = new THREE.Mesh(new THREE.BoxGeometry(0.3 * scale, 0.06 * scale, 0.24 * scale), darkMetalMat);
  belt.position.y = 0.95 * scale; belt.castShadow = true; group.add(belt);
  // 腰带扣
  const buckle = new THREE.Mesh(new THREE.BoxGeometry(0.08 * scale, 0.08 * scale, 0.04 * scale), goldMat);
  buckle.position.set(0, 0.95 * scale, 0.13 * scale); group.add(buckle);
  // 腰带两侧坠饰
  for (let s = -1; s <= 1; s += 2) {
    const tasselBelt = new THREE.Mesh(new THREE.BoxGeometry(0.02 * scale, 0.1 * scale, 0.02 * scale),
      new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.05, color: 0xC41E1E }));
    tasselBelt.position.set(s * 0.1 * scale, 0.88 * scale, 0.14 * scale);
    group.add(tasselBelt);
  }

  // 护肩（左右，更精致）
  const shoulderGeo = new THREE.BoxGeometry(0.16 * scale, 0.08 * scale, 0.18 * scale);
  const lShoulder = new THREE.Mesh(shoulderGeo, armorMat);
  lShoulder.position.set(-0.22 * scale, 1.3 * scale, 0); lShoulder.castShadow = true; group.add(lShoulder);
  const rShoulder = new THREE.Mesh(shoulderGeo, armorMat);
  rShoulder.position.set(0.22 * scale, 1.3 * scale, 0); rShoulder.castShadow = true; group.add(rShoulder);
  // 护肩上的金色铆钉
  for (let s = -1; s <= 1; s += 2) {
    const stud = new THREE.Mesh(new THREE.SphereGeometry(0.025 * scale, 6, 6), goldMat);
    stud.position.set(s * 0.22 * scale, 1.34 * scale, 0.08 * scale); group.add(stud);
  }

  // 左上臂
  const laUpGrp = new THREE.Group(); laUpGrp.position.set(-0.2 * scale, 1.28 * scale, 0);
  const laUp = new THREE.Mesh(new THREE.BoxGeometry(0.07 * scale, 0.32 * scale, 0.07 * scale), mat);
  laUp.position.y = -0.16 * scale; laUp.castShadow = true; laUpGrp.add(laUp);
  // 护腕
  const lWristGuard = new THREE.Mesh(new THREE.BoxGeometry(0.08 * scale, 0.06 * scale, 0.08 * scale), armorMat);
  lWristGuard.position.set(0, -0.3 * scale, 0); laUpGrp.add(lWristGuard);
  group.add(laUpGrp);
  // 左前臂
  const laLo = new THREE.Mesh(new THREE.BoxGeometry(0.06 * scale, 0.28 * scale, 0.06 * scale), mat);
  laLo.position.set(-0.2 * scale, 0.7 * scale, 0); laLo.castShadow = true; group.add(laLo);

  // 右上臂
  const rightArmGrp = new THREE.Group(); rightArmGrp.position.set(0.2 * scale, 1.28 * scale, 0);
  const raUp = new THREE.Mesh(new THREE.BoxGeometry(0.07 * scale, 0.32 * scale, 0.07 * scale), mat);
  raUp.position.y = -0.16 * scale; raUp.castShadow = true; rightArmGrp.add(raUp);
  const rWristGuard = new THREE.Mesh(new THREE.BoxGeometry(0.08 * scale, 0.06 * scale, 0.08 * scale), armorMat);
  rWristGuard.position.set(0, -0.3 * scale, 0); rightArmGrp.add(rWristGuard);
  // 右前臂 + 武器
  const raLo = new THREE.Mesh(new THREE.BoxGeometry(0.06 * scale, 0.28 * scale, 0.06 * scale), mat);
  raLo.position.y = -0.44 * scale; raLo.castShadow = true; rightArmGrp.add(raLo);

  const weaponGrp = new THREE.Group(); weaponGrp.position.set(0, -0.6 * scale, 0);
  if (weaponType === 'sword') {
    // 剑柄
    weaponGrp.add(new THREE.Mesh(
      new THREE.CylinderGeometry(0.03 * scale, 0.035 * scale, 0.14 * scale, 8),
      new THREE.MeshStandardMaterial({ roughness: 0.4, metalness: 0.1, color: 0x4A2810 })
    )).position.y = 0.08 * scale;
    // 剑格（护手）
    weaponGrp.add(new THREE.Mesh(
      new THREE.BoxGeometry(0.12 * scale, 0.025 * scale, 0.06 * scale), goldMat
    )).position.y = 0.16 * scale;
    // 剑身（带寒光发光）
    const bladeMat = new THREE.MeshStandardMaterial({ roughness: 0.1, metalness: 0.9, color: 0xD0D8E0, emissive: 0x334466, emissiveIntensity: 0.15 });
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.045 * scale, 0.6 * scale, 0.02 * scale), bladeMat);
    blade.position.y = 0.48 * scale; blade.castShadow = true; weaponGrp.add(blade);
    // 剑尖
    const tip = new THREE.Mesh(
      new THREE.ConeGeometry(0.025 * scale, 0.08 * scale, 6),
      new THREE.MeshStandardMaterial({ roughness: 0.08, metalness: 0.95, color: 0xB0B8C8, emissive: 0x334466, emissiveIntensity: 0.2 })
    );
    tip.position.y = 0.82 * scale; weaponGrp.add(tip);
    // 剑穗
    const tassel = new THREE.Mesh(
      new THREE.BoxGeometry(0.02 * scale, 0.14 * scale, 0.02 * scale),
      new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.05, color: 0xC41E1E })
    );
    tassel.position.set(0, -0.02 * scale, 0.04 * scale); weaponGrp.add(tassel);
    // 剑刃中线（血槽装饰）
    const bloodGroove = new THREE.Mesh(
      new THREE.BoxGeometry(0.01 * scale, 0.5 * scale, 0.025 * scale),
      new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.01, color: 0x8899AA })
    );
    bloodGroove.position.set(0, 0.5 * scale, 0.015 * scale); weaponGrp.add(bloodGroove);
  } else if (weaponType === 'axe') {
    weaponGrp.add(new THREE.Mesh(
      new THREE.CylinderGeometry(0.035 * scale, 0.04 * scale, 0.55 * scale, 8),
      new THREE.MeshStandardMaterial({ roughness: 0.4, metalness: 0.1, color: 0x5A3A1A })
    )).position.y = 0.28 * scale;
    const axeBlade = new THREE.Mesh(
      new THREE.BoxGeometry(0.22 * scale, 0.07 * scale, 0.28 * scale),
      new THREE.MeshStandardMaterial({ roughness: 0.2, metalness: 0.8, color: 0x707070, emissive: 0x111111, emissiveIntensity: 0.1 })
    );
    axeBlade.position.y = 0.55 * scale; axeBlade.castShadow = true; weaponGrp.add(axeBlade);
    const axeSpike = new THREE.Mesh(
      new THREE.ConeGeometry(0.06 * scale, 0.1 * scale, 6),
      new THREE.MeshStandardMaterial({ roughness: 0.15, metalness: 0.85, color: 0x606060 })
    );
    axeSpike.position.set(0.12 * scale, 0.55 * scale, 0); axeSpike.rotation.z = -Math.PI / 2; weaponGrp.add(axeSpike);
  } else if (weaponType === 'boss_axe') {
    weaponGrp.add(new THREE.Mesh(
      new THREE.CylinderGeometry(0.05 * scale, 0.06 * scale, 0.7 * scale, 8),
      new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.15, color: 0x3A2010 })
    )).position.y = 0.35 * scale;
    const bossBlade = new THREE.Mesh(
      new THREE.BoxGeometry(0.3 * scale, 0.1 * scale, 0.38 * scale),
      new THREE.MeshStandardMaterial({ roughness: 0.1, metalness: 0.9, color: 0x404040, emissive: 0x220000, emissiveIntensity: 0.2 })
    );
    bossBlade.position.y = 0.7 * scale; bossBlade.castShadow = true; weaponGrp.add(bossBlade);
    for (let s = -1; s <= 1; s += 2) {
      const spike = new THREE.Mesh(
        new THREE.ConeGeometry(0.08 * scale, 0.14 * scale, 6),
        new THREE.MeshStandardMaterial({ roughness: 0.1, metalness: 0.9, color: 0x303030, emissive: 0x110000, emissiveIntensity: 0.15 })
      );
      spike.position.set(s * 0.16 * scale, 0.7 * scale, 0); spike.rotation.z = -s * Math.PI / 2; weaponGrp.add(spike);
    }
  }
  rightArmGrp.add(weaponGrp); group.add(rightArmGrp);

  // 左腿
  group.add(new THREE.Mesh(new THREE.BoxGeometry(0.09 * scale, 0.35 * scale, 0.09 * scale), mat)).position.set(-0.08 * scale, 0.62 * scale, 0);
  group.add(new THREE.Mesh(new THREE.BoxGeometry(0.08 * scale, 0.35 * scale, 0.08 * scale), mat)).position.set(-0.08 * scale, 0.27 * scale, 0);
  const lBoot = new THREE.Mesh(new THREE.BoxGeometry(0.1 * scale, 0.08 * scale, 0.12 * scale), armorMat);
  lBoot.position.set(-0.08 * scale, 0.08 * scale, -0.02 * scale); lBoot.castShadow = true; group.add(lBoot);

  // 右腿
  group.add(new THREE.Mesh(new THREE.BoxGeometry(0.09 * scale, 0.35 * scale, 0.09 * scale), mat)).position.set(0.08 * scale, 0.62 * scale, 0);
  group.add(new THREE.Mesh(new THREE.BoxGeometry(0.08 * scale, 0.35 * scale, 0.08 * scale), mat)).position.set(0.08 * scale, 0.27 * scale, 0);
  const rBoot = new THREE.Mesh(new THREE.BoxGeometry(0.1 * scale, 0.08 * scale, 0.12 * scale), armorMat);
  rBoot.position.set(0.08 * scale, 0.08 * scale, -0.02 * scale); rBoot.castShadow = true; group.add(rBoot);

  // 斗笠（玩家专属）
  if (isPlayer) {
    const hat = new THREE.Group();
    const hatCone = new THREE.Mesh(
      new THREE.ConeGeometry(0.25 * scale, 0.14 * scale, 12),
      new THREE.MeshStandardMaterial({ roughness: 0.4, metalness: 0.05, color: 0x8B7355 })
    );
    hatCone.position.y = 0.07 * scale; hatCone.castShadow = true; hat.add(hatCone);
    const hatRim = new THREE.Mesh(
      new THREE.CylinderGeometry(0.27 * scale, 0.27 * scale, 0.03 * scale, 16),
      new THREE.MeshStandardMaterial({ roughness: 0.35, metalness: 0.08, color: 0x6B5A45 })
    );
    hatRim.position.y = -0.01 * scale; hat.add(hatRim);
    // 斗笠帽绳
    const hatString = new THREE.Mesh(
      new THREE.BoxGeometry(0.015 * scale, 0.3 * scale, 0.015 * scale),
      new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.05, color: 0xC41E1E })
    );
    hatString.position.set(0, -0.15 * scale, 0.25 * scale);
    hat.add(hatString);
    hat.position.y = 1.65 * scale;
    group.add(hat);
  }

  // 头巾（敌人专属）
  if (weaponType === 'axe' || weaponType === 'boss_axe') {
    const headband = new THREE.Mesh(
      new THREE.TorusGeometry(0.17 * scale, 0.03 * scale, 8, 16),
      new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.05, color: isBoss ? 0x111111 : 0x4A0000 })
    );
    headband.position.y = 1.52 * scale; headband.rotation.x = Math.PI / 2; group.add(headband);
    if (isBoss) {
      const helm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.14 * scale, 0.18 * scale, 0.12 * scale, 8),
        new THREE.MeshStandardMaterial({ roughness: 0.2, metalness: 0.7, color: 0x2A2A2A })
      );
      helm.position.y = 1.7 * scale; helm.castShadow = true; group.add(helm);
      for (let s = -1; s <= 1; s += 2) {
        const horn = new THREE.Mesh(
          new THREE.ConeGeometry(0.04 * scale, 0.15 * scale, 6),
          new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.5, color: 0x3A3A3A })
        );
        horn.position.set(s * 0.1 * scale, 1.82 * scale, 0); group.add(horn);
      }
      // Boss额外装饰：面甲
      const faceMask = new THREE.Mesh(
        new THREE.BoxGeometry(0.14 * scale, 0.08 * scale, 0.02 * scale),
        new THREE.MeshStandardMaterial({ roughness: 0.2, metalness: 0.8, color: 0x1A1A1A })
      );
      faceMask.position.set(0, 1.5 * scale, 0.17 * scale); group.add(faceMask);
    }
  }

  return { group, rightArmGrp, weaponGrp, laUpGrp, mat, hairGroup };
}

function createEnemyState(isBoss, bossLevel) {
  const scale = isBoss ? (1 + bossLevel * BOSS_SCALE) : 1;
  return {
    health: MAX_HEALTH * scale, maxHealth: MAX_HEALTH * scale,
    attackCooldown: ENEMY_ATTACK_COOLDOWN * 0.5 + Math.random() * ENEMY_ATTACK_COOLDOWN,
    isAttacking: false, attackAnimTime: 0,
    isAlive: true, respawnTimer: 0, isMoving: false,
    pendingDamage: false, pendingDamageTimer: 0,
    wanderTimer: 1 + Math.random() * 3,
    wanderDir: (() => {
    const v = new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5);
    if (v.length() < 0.001) v.set(1, 0, 0);
    return v.normalize();
  })(),
    isBoss: isBoss || false,
    bossLevel: bossLevel || 0,
    scale: scale,
    critChance: ENEMY_CRIT_CHANCE,
    critMult: ENEMY_CRIT_MULT,
  };
}

// ==================== 计分系统 ====================
const scoreState = {
  currentKill: 0,
  history: [],
  best: 0,
};

function loadScoreHistory() {
  try {
    const saved = JSON.parse(localStorage.getItem('gameScores')) || [];
    scoreState.history = saved;
    scoreState.best = saved.reduce((max, item) => Math.max(max, item.kills), 0);
  } catch(e) { scoreState.history = []; scoreState.best = 0; }
}

function saveScoreHistory() {
  if (scoreState.currentKill > 0) {
    scoreState.history.unshift({ kills: scoreState.currentKill, date: new Date().toLocaleString() });
    if (scoreState.history.length > 10) scoreState.history.pop();
    scoreState.best = Math.max(scoreState.best, scoreState.currentKill);
    try { localStorage.setItem('gameScores', JSON.stringify(scoreState.history)); } catch(e) {}
  }
  scoreState.currentKill = 0;
}

function updateScoreDisplay() {
  document.getElementById('score-current').textContent = scoreState.currentKill;
  document.getElementById('score-best').textContent = scoreState.best;
}

loadScoreHistory();

const enemies = [];
let totalKillCount = 0;
let bossLevel = 0;
let pendingBossSpawn = false;
let bossSpawnTimer = 0;

function spawnEnemy(isBoss = false) {
  const level = isBoss ? bossLevel + 1 : 0;
  const data = isBoss
    ? createCharacter(0x3A1010, 0x1A1A1A, 'boss_axe', true)
    : createCharacter(0x8B0000, 0x4A2020, 'axe', false);
  const state = createEnemyState(isBoss, level);
  const pos = getValidSpawnPos(player.position.x, player.position.z, isBoss ? 12 : ENEMY_SPAWN_MIN, isBoss ? 20 : ENEMY_SPAWN_MAX);
  data.group.position.set(pos.x, 0, pos.z);
  data.group.rotation.y = Math.random() * Math.PI * 2;
  scene.add(data.group);
  const entry = { ...data, state, id: Date.now() + Math.random() };
  enemies.push(entry);
  if (isBoss) {
    showMessage(t('bossAppear'));
  }
  return entry;
}

function removeEnemy(entry) {
  scene.remove(entry.group);
  const idx = enemies.indexOf(entry);
  if (idx >= 0) enemies.splice(idx, 1);
  entry.group.traverse(child => {
    if (child.geometry && child.geometry !== entry.group.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
      else child.material.dispose();
    }
  });
}

function adjustEnemyCount(target) {
  const alive = enemies.filter(e => e.state.isAlive).length;
  if (alive < target) {
    for (let i = 0; i < target - alive; i++) spawnEnemy(false);
  } else if (alive > target) {
    let toRemove = alive - target;
    for (const e of enemies) {
      if (toRemove <= 0) break;
      if (e.state.isAlive) { e.state.isAlive = false; e.group.visible = false; toRemove--; }
    }
  }
}

for (let i = 0; i < settings.monsterCount; i++) spawnEnemy(false);

// ==================== 重新开始 / 脱离卡死 ====================
function restartGame() {
  // 保存当前分数
  if (scoreState.currentKill > 0) {
    const wasBest = scoreState.currentKill > scoreState.best;
    saveScoreHistory();
    if (wasBest) setTimeout(() => showMessage(t('newRecord')), 1200);
  }
  isPaused = false;
  document.getElementById('pause-menu').classList.remove('show');
  // 重置玩家
  playerState.health = playerState.maxHealth;
  player.position.set(SPAWN_POS.x, 0, SPAWN_POS.z);
  playerState.velocityY = 0;
  playerState.isOnGround = true;
  playerState.attackCooldown = 0;
  playerState.dashCooldown = 0;
  playerState.combo = 0;
  playerState.lastAttackTime = 0;
  playerState.isAttacking = false;
  playerState.isDashing = false;
  playerState.invincibleTimer = 0;
  playerData.rightArmGrp.rotation.set(0, 0, 0);
  playerData.laUpGrp.rotation.set(0, 0, 0);
  if (playerData.hairGroup) playerData.hairGroup.rotation.set(0, 0, 0);
  camTheta = 0; camPhi = Math.PI / 4;
  // 重置累计击杀和Boss等级
  totalKillCount = 0; bossLevel = 0;
  pendingBossSpawn = false; bossSpawnTimer = 0;
  // 清理死掉的Boss，重置普通敌人
  for (let i = enemies.length - 1; i >= 0; i--) {
    const enemy = enemies[i];
    if (enemy.state.isBoss) {
      scene.remove(enemy.group);
      enemy.group.traverse(child => {
        if (child.geometry && child.geometry !== enemy.group.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
      });
      enemies.splice(i, 1);
    } else {
      enemy.state.health = enemy.state.maxHealth;
      enemy.state.isAlive = true;
      enemy.state.attackCooldown = ENEMY_ATTACK_COOLDOWN * 0.5 + Math.random() * ENEMY_ATTACK_COOLDOWN;
      enemy.state.isAttacking = false;
      enemy.state.pendingDamage = false;
      enemy.group.visible = true;
      enemy.rightArmGrp.rotation.set(0, 0, 0);
      enemy.laUpGrp.rotation.set(0, 0, 0);
      const pos = getValidSpawnPos(player.position.x, player.position.z, ENEMY_SPAWN_MIN, ENEMY_SPAWN_MAX);
      enemy.group.position.set(pos.x, 0, pos.z);
    }
  }
  adjustEnemyCount(settings.monsterCount);
  isDead = false;
  document.getElementById('death-menu').classList.remove('show');
  document.getElementById('click-to-play').style.display = 'block';
  document.getElementById('ctp-title').textContent = t('clickToPlay');
  updateScoreDisplay();
  updateUI();
  showMessage(t('restart'));
}

function unstuckPlayer() {
  if (isDead) return;
  player.position.set(SPAWN_POS.x, 0, SPAWN_POS.z);
  playerState.velocityY = 0;
  playerState.isOnGround = true;
  playerState.isDashing = false;
  showMessage(t('unstuck'));
}

// ==================== 建筑内检测（防止怪物生成在房屋内） ====================
function isInsideBuilding(x, z) {
  for (const c of COLLIDERS) {
    if (c.type === 'building' && x > c.minX && x < c.maxX && z > c.minZ && z < c.maxZ) {
      return true;
    }
  }
  return false;
}

function getValidSpawnPos(baseX, baseZ, minDist, maxDist) {
  for (let attempt = 0; attempt < 30; attempt++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = minDist + Math.random() * (maxDist - minDist);
    const x = baseX + Math.cos(angle) * dist;
    const z = baseZ + Math.sin(angle) * dist;
    const cx = Math.max(-BOUNDARY, Math.min(BOUNDARY, x));
    const cz = Math.max(-BOUNDARY, Math.min(BOUNDARY, z));
    if (!isInsideBuilding(cx, cz) && !checkCollisionAt(cx, cz, 0, ENEMY_RADIUS)) {
      return { x: cx, z: cz };
    }
  }
  // 回退位置也做验证，确保不在建筑内
  for (let attempt = 0; attempt < 10; attempt++) {
    const fx = baseX + (Math.random() - 0.5) * 10;
    const fz = baseZ + (Math.random() - 0.5) * 10;
    const cfx = Math.max(-BOUNDARY, Math.min(BOUNDARY, fx));
    const cfz = Math.max(-BOUNDARY, Math.min(BOUNDARY, fz));
    if (!isInsideBuilding(cfx, cfz) && !checkCollisionAt(cfx, cfz, 0, ENEMY_RADIUS)) {
      return { x: cfx, z: cfz };
    }
  }
  return { x: baseX, z: baseZ + 5 }; // 最终回退
}

// ==================== 击中粒子 ====================
const hitParticles = [];
function spawnHitParticles(position) {
  const colors = [0xFFD700, 0xFFA500, 0xC41E1E, 0xFFFF00, 0xFF4500];
  const count = 8;
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.035, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)], transparent: true, opacity: 1 });
    const particle = new THREE.Mesh(geo, mat);
    particle.position.copy(position);
    particle.position.y += 0.8 + Math.random() * 0.3;
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 3;
    particle.userData = {
      velocity: new THREE.Vector3(Math.cos(angle) * speed, 2 + Math.random() * 3, Math.sin(angle) * speed),
      life: 0.35 + Math.random() * 0.2,
      maxLife: 0.35 + Math.random() * 0.2,
    };
    scene.add(particle);
    hitParticles.push(particle);
  }
}

function updateHitParticles(dt) {
  for (let i = hitParticles.length - 1; i >= 0; i--) {
    const p = hitParticles[i];
    p.userData.life -= dt;
    if (p.userData.life <= 0) {
      scene.remove(p); p.geometry.dispose(); p.material.dispose();
      hitParticles.splice(i, 1);
    } else {
      p.position.x += p.userData.velocity.x * dt;
      p.position.y += p.userData.velocity.y * dt;
      p.position.z += p.userData.velocity.z * dt;
      p.userData.velocity.y -= 12 * dt;
      const alpha = p.userData.life / p.userData.maxLife;
      p.material.opacity = alpha;
      p.scale.setScalar(alpha);
    }
  }
}

// ==================== 攻击（含吸血 0.25%） ====================
function tryPlayerAttack() {
  if (isPaused || isDead || playerState.attackCooldown > 0 || playerState.isAttacking) return;

  const now = gameTime;
  if (now - playerState.lastAttackTime < playerState.comboMaxTime) {
    playerState.combo = Math.min(playerState.combo + 1, 3);
  } else {
    playerState.combo = 1;
  }
  playerState.lastAttackTime = now;
  playerState.isAttacking = true;
  playerState.attackAnimTime = 0;

  let damage, animDuration, comboText, comboColor;
  switch (playerState.combo) {
    case 1:
      damage = PLAYER_DAMAGE; animDuration = 0.3;
      comboText = t('combo1'); comboColor = '#FFFFFF';
      playerState.attackType = 'slash';
      break;
    case 2:
      damage = PLAYER_DAMAGE * 1.3; animDuration = 0.35;
      comboText = t('combo2'); comboColor = '#42A5F5';
      playerState.attackType = 'uppercut';
      break;
    case 3:
      damage = PLAYER_DAMAGE * 1.8; animDuration = 0.45;
      comboText = t('combo3'); comboColor = '#FFD700';
      playerState.attackType = 'smash';
      break;
  }
  playerState.attackAnimDuration = animDuration;
  playerState.attackCooldown = ATTACK_COOLDOWN;

  showComboText(comboText, comboColor);

  const fwd = new THREE.Vector3(0, 0, 1).applyQuaternion(player.quaternion);
  playerState.lungeDir.copy(fwd);
  playerState.lungeTime = 0.15;

  let hitAny = false;
  for (const enemy of enemies) {
    if (!enemy.state.isAlive) continue;
    const toEnemy = enemy.group.position.clone().sub(player.position);
    const dist = toEnemy.length();
    if (dist > ATTACK_RANGE) continue;
    const dir = dist < 0.001 ? fwd.clone() : toEnemy.normalize();
    const dot = fwd.dot(dir);
    if (Math.acos(Math.max(-1, Math.min(dot, 1))) > ATTACK_ANGLE / 2) continue;

    enemy.state.health -= damage;
    hitAny = true;
    flashHit(enemy.mat, 0x8B0000);
    spawnHitParticles(enemy.group.position.clone());

    // 吸血：造成伤害的0.25%
    const healAmount = damage * LIFESTEAL_RATIO;
    if (playerState.health < playerState.maxHealth && healAmount > 0) {
      playerState.health = Math.min(playerState.health + healAmount, playerState.maxHealth);
      showLifesteal(healAmount);
    }

    if (enemy.state.health <= 0) {
      enemy.state.health = 0;
      const wasBoss = enemy.state.isBoss;
      enemy.state.isAlive = false;
      enemy.state.respawnTimer = ENEMY_RESPAWN_TIME;
      enemy.group.visible = false;
      showMessage(wasBoss ? t('bossDefeated') : t('defeated'));
      playerState.attackCooldown *= 0.5;
      playerState.dashCooldown *= 0.5;
      scoreState.currentKill++;
      totalKillCount++;
      updateScoreDisplay();
      // Boss击杀后升级
      if (wasBoss) {
        bossLevel++;
        totalKillCount = 0;
      }
      // Boss生成使用游戏计时器，避免setTimeout忽视暂停/死亡
      if (totalKillCount >= BOSS_SPAWN_INTERVAL && !wasBoss) {
        pendingBossSpawn = true;
        bossSpawnTimer = 0.5;
      }
    }
  }
  if (hitAny) showMessage(playerState.combo >= 3 ? t('combo3') : t('hit'));
}

// ==================== 跳跃 ====================
function tryJump() {
  if (isPaused || isDead || !playerState.isOnGround) return;
  playerState.velocityY = JUMP_FORCE;
  playerState.isOnGround = false;
}

// ==================== 闪现 ====================
function tryDash() {
  if (isPaused || isDead || playerState.isDashing || playerState.dashCooldown > 0) return;
  const camFwd = new THREE.Vector3();
  camera.getWorldDirection(camFwd);
  camFwd.y = 0; camFwd.normalize();
  const camRight = new THREE.Vector3().crossVectors(camFwd, new THREE.Vector3(0, 1, 0)).normalize();
  const dir = new THREE.Vector3();
  if (keys['w']) dir.add(camFwd);
  if (keys['s']) dir.sub(camFwd);
  if (keys['a']) dir.sub(camRight);
  if (keys['d']) dir.add(camRight);
  if (dir.length() < 0.01) dir.set(0, 0, 1).applyQuaternion(player.quaternion);
  dir.normalize();

  playerState.isDashing = true;
  playerState.dashTimer = DASH_DURATION;
  playerState.dashDir.copy(dir);
  playerState.dashCooldown = DASH_COOLDOWN;
  playerState.invincibleTimer = Math.max(playerState.invincibleTimer, DASH_DURATION + 0.05);

  for (const enemy of enemies) {
    if (enemy.state.pendingDamage && enemy.state.isAlive) {
      enemy.state.pendingDamage = false;
      enemy.state.isAttacking = false;
      enemy.rightArmGrp.rotation.set(0, 0, 0);
      enemy.laUpGrp.rotation.set(0, 0, 0);
      showMessage(t('dodged'));
    }
  }
}

// ==================== 敌人AI ====================
function updateEnemyAI(enemy, dt) {
  if (!enemy.state.isAlive) {
    if (settings.monsterRespawn) {
      enemy.state.respawnTimer -= dt;
      if (enemy.state.respawnTimer <= 0) respawnEnemy(enemy);
    }
    return;
  }
  if (enemy.state.attackCooldown > 0) enemy.state.attackCooldown -= dt;

  const toPlayer = player.position.clone().sub(enemy.group.position);
  const dist = toPlayer.length();
  const dir = dist < 0.001 ? new THREE.Vector3(0, 0, 1) : toPlayer.normalize();
  const atkRange = enemy.state.isBoss ? ENEMY_ATTACK_RANGE * enemy.state.scale : ENEMY_ATTACK_RANGE;
  const speed = enemy.state.isBoss ? ENEMY_SPEED * enemy.state.scale : ENEMY_SPEED;

  if (dist <= atkRange) {
    enemy.state.isMoving = false;
    enemy.group.rotation.y = Math.atan2(dir.x, dir.z);
    if (enemy.state.attackCooldown <= 0) {
      enemy.state.attackCooldown = ENEMY_ATTACK_COOLDOWN / Math.max(enemy.state.scale, 0.1);
      enemy.state.isAttacking = true;
      enemy.state.attackAnimTime = 0;
      enemy.state.pendingDamage = true;
      enemy.state.pendingDamageTimer = ENEMY_ATTACK_WINDUP;
    }
  } else if (dist <= ENEMY_DETECT_RANGE) {
    enemy.state.isMoving = true;
    const totalMove = dir.clone().multiplyScalar(speed * dt);
    const testX = enemy.group.position.x + totalMove.x;
    const testZ = enemy.group.position.z + totalMove.z;
    const ey = enemy.group.position.y;
    let newX = enemy.group.position.x, newZ = enemy.group.position.z;
    if (!checkCollisionAt(testX, enemy.group.position.z, ey, ENEMY_RADIUS)) newX = testX;
    if (!checkCollisionAt(newX, testZ, ey, ENEMY_RADIUS)) newZ = testZ;
    newX = Math.max(-BOUNDARY, Math.min(BOUNDARY, newX));
    newZ = Math.max(-BOUNDARY, Math.min(BOUNDARY, newZ));
    enemy.group.position.set(newX, ey, newZ);
    enemy.group.rotation.y = Math.atan2(dir.x, dir.z);
  } else {
    enemy.state.wanderTimer -= dt;
    if (enemy.state.wanderTimer <= 0) {
      enemy.state.wanderDir.set(Math.random() - 0.5, 0, Math.random() - 0.5);
      if (enemy.state.wanderDir.length() < 0.001) enemy.state.wanderDir.set(1, 0, 0);
      enemy.state.wanderDir.normalize();
      enemy.state.wanderTimer = 2 + Math.random() * 3;
    }
    const wMove = enemy.state.wanderDir.clone().multiplyScalar(ENEMY_WANDER_SPEED * dt);
    const wTestX = enemy.group.position.x + wMove.x;
    const wTestZ = enemy.group.position.z + wMove.z;
    const wey = enemy.group.position.y;
    let wNewX = enemy.group.position.x, wNewZ = enemy.group.position.z;
    if (!checkCollisionAt(wTestX, enemy.group.position.z, wey, ENEMY_RADIUS)) wNewX = wTestX;
    if (!checkCollisionAt(wNewX, wTestZ, wey, ENEMY_RADIUS)) wNewZ = wTestZ;
    wNewX = Math.max(-BOUNDARY, Math.min(BOUNDARY, wNewX));
    wNewZ = Math.max(-BOUNDARY, Math.min(BOUNDARY, wNewZ));
    enemy.group.position.set(wNewX, wey, wNewZ);
    enemy.group.rotation.y = Math.atan2(enemy.state.wanderDir.x, enemy.state.wanderDir.z);
    enemy.state.isMoving = true;
  }

  if (enemy.state.pendingDamage) {
    enemy.state.pendingDamageTimer -= dt;
    if (enemy.state.pendingDamageTimer <= 0) {
      const curDist = player.position.clone().sub(enemy.group.position).length();
      if (curDist <= atkRange && !isPlayerInvincible()) {
        // 暴击判定
        const isCrit = Math.random() < enemy.state.critChance;
        const damage = isCrit
          ? ENEMY_DAMAGE * enemy.state.scale * enemy.state.critMult
          : ENEMY_DAMAGE * enemy.state.scale;
        playerState.health -= Math.round(damage);
        showMessage(isCrit ? t('damaged') + ' ' + t('crit') : t('damaged'));
        flashHit(playerData.mat, 0xF5F0E6);
        playerState.invincibleTimer = Math.max(playerState.invincibleTimer, HIT_INVINCIBLE);
        if (playerState.health <= 0) {
          playerState.health = 0;
          isDead = true;
          showMessage(t('playerDefeated'));
          const finalKillCount = scoreState.currentKill;
          const wasBest = finalKillCount > 0 && finalKillCount > scoreState.best;
          saveScoreHistory();
          updateScoreDisplay();
          if (wasBest) setTimeout(() => { if (isDead) showMessage(t('newRecord')); }, 1200);
          // 显示死亡菜单
          setTimeout(() => { if (isDead) showDeathMenu(finalKillCount); }, 1500);
        }
      }
      enemy.state.pendingDamage = false;
    }
  }
}

function respawnEnemy(enemy) {
  // Boss不复活，延迟清理尸体
  if (enemy.state.isBoss) {
    setTimeout(() => {
      scene.remove(enemy.group);
      const idx = enemies.indexOf(enemy);
      if (idx >= 0) enemies.splice(idx, 1);
    }, ENEMY_RESPAWN_TIME * 1000);
    return;
  }
  enemy.state.health = enemy.state.maxHealth;
  enemy.state.isAlive = true;
  enemy.state.attackCooldown = ENEMY_ATTACK_COOLDOWN * 0.5 + Math.random() * ENEMY_ATTACK_COOLDOWN;
  enemy.state.pendingDamage = false;
  enemy.group.visible = true;
  const pos = getValidSpawnPos(player.position.x, player.position.z, ENEMY_SPAWN_MIN, ENEMY_SPAWN_MAX);
  enemy.group.position.set(pos.x, 0, pos.z);
  enemy.group.rotation.y = Math.random() * Math.PI * 2;
  showMessage(t('enemyRespawn'));
}

// ==================== 动画 ====================
function updatePlayerAttackAnimation(dt) {
  if (!playerState.isAttacking) return;
  playerState.attackAnimTime += dt;
  const p = Math.min(playerState.attackAnimTime / playerState.attackAnimDuration, 1);

  switch (playerState.attackType) {
    case 'slash': {
      const swing = Math.sin(p * Math.PI);
      playerData.rightArmGrp.rotation.z = swing * 1.6;
      playerData.rightArmGrp.rotation.x = -swing * 0.2;
      player.rotation.y += swing * 0.08 * dt * 10;
      break;
    }
    case 'uppercut': {
      const upSwing = p < 0.5 ? p * 2 : 2 - p * 2;
      playerData.rightArmGrp.rotation.x = -upSwing * Math.PI * 0.7;
      playerData.rightArmGrp.rotation.z = upSwing * 0.25;
      break;
    }
    case 'smash': {
      if (p < 0.35) {
        const r = p / 0.35;
        playerData.rightArmGrp.rotation.x = r * Math.PI * 0.85;
        playerData.rightArmGrp.rotation.z = -r * 0.15;
      } else if (p < 0.65) {
        const s = (p - 0.35) / 0.3;
        playerData.rightArmGrp.rotation.x = Math.PI * 0.85 - s * Math.PI * 1.4;
        playerData.rightArmGrp.rotation.z = -0.15 + s * 0.1;
        playerData.laUpGrp.rotation.x = -s * 0.3;
      } else {
        const r = (p - 0.65) / 0.35;
        playerData.rightArmGrp.rotation.x = -Math.PI * 0.55 * (1 - r) * r;
        playerData.rightArmGrp.rotation.z = -0.05 * (1 - r);
        playerData.laUpGrp.rotation.x *= (1 - r * 3);
      }
      break;
    }
  }

  if (playerState.lungeTime > 0) {
    playerState.lungeTime -= dt;
    const lungeP = Math.max(0, playerState.lungeTime / 0.15);
    const lungeSpeed = playerState.combo === 3 ? 3.5 : 2;
    const step = lungeSpeed * dt * lungeP;
    const nx = player.position.x + playerState.lungeDir.x * step;
    const nz = player.position.z + playerState.lungeDir.z * step;
    const ny = player.position.y;
    if (!checkCollisionAt(nx, nz, ny, PLAYER_RADIUS)) {
      player.position.x = Math.max(-BOUNDARY, Math.min(BOUNDARY, nx));
      player.position.z = Math.max(-BOUNDARY, Math.min(BOUNDARY, nz));
    }
  }

  if (p >= 1) {
    playerState.isAttacking = false;
    playerState.attackType = null;
    playerData.rightArmGrp.rotation.set(0, 0, 0);
    playerData.laUpGrp.rotation.set(0, 0, 0);
  }
}

function updateEnemyAttackAnimation(enemy, dt) {
  if (!enemy.state.isAttacking) return;
  enemy.state.attackAnimTime += dt;
  const p = Math.min(enemy.state.attackAnimTime / ENEMY_ATTACK_ANIM_DUR, 1);

  if (p < 0.35) {
    const r = p / 0.35;
    enemy.rightArmGrp.rotation.x = r * Math.PI * 0.9;
    enemy.rightArmGrp.rotation.z = -r * 0.2;
    enemy.laUpGrp.rotation.x = r * 0.5;
    enemy.laUpGrp.rotation.z = r * 0.1;
  } else if (p < 0.65) {
    const s = (p - 0.35) / 0.3;
    enemy.rightArmGrp.rotation.x = Math.PI * 0.9 - s * Math.PI * 1.5;
    enemy.rightArmGrp.rotation.z = -0.2 + s * 0.15;
    enemy.laUpGrp.rotation.x = 0.5 - s * 0.8;
    enemy.laUpGrp.rotation.z = 0.1 - s * 0.05;
  } else {
    const r = (p - 0.65) / 0.35;
    enemy.rightArmGrp.rotation.x = -Math.PI * 0.6 * (1 - r) * r;
    enemy.rightArmGrp.rotation.z = -0.05 * (1 - r);
    enemy.laUpGrp.rotation.x *= (1 - r * 3);
    enemy.laUpGrp.rotation.z *= (1 - r * 3);
  }

  if (p >= 1) {
    enemy.state.isAttacking = false;
    enemy.rightArmGrp.rotation.set(0, 0, 0);
    enemy.laUpGrp.rotation.set(0, 0, 0);
  }
}

function updateWalkAnimation(figureData, isMoving, isAttacking, time) {
  if (isAttacking) return;
  if (isMoving) {
    figureData.rightArmGrp.rotation.x = Math.sin(time * 10) * 0.35;
    figureData.laUpGrp.rotation.x = Math.sin(time * 10 + Math.PI) * 0.35;
  } else {
    figureData.rightArmGrp.rotation.x += (0 - figureData.rightArmGrp.rotation.x) * 0.15;
    figureData.laUpGrp.rotation.x += (0 - figureData.laUpGrp.rotation.x) * 0.15;
  }
}

// ==================== 游戏循环 ====================
const clock = new THREE.Clock();
let gameTime = 0;

function update() {
  const dt = Math.min(clock.getDelta(), 0.1);

  if (isPaused || isDead) {
    renderer.render(scene, camera);
    return;
  }

  gameTime += dt;

  // --- 玩家移动 ---
  if (!playerState.isDashing) {
    const camFwd = new THREE.Vector3();
    camera.getWorldDirection(camFwd);
    camFwd.y = 0; camFwd.normalize();
    const camRight = new THREE.Vector3().crossVectors(camFwd, new THREE.Vector3(0, 1, 0)).normalize();

    const move = new THREE.Vector3();
    let moving = false;
    if (keys['w']) { move.add(camFwd); moving = true; }
    if (keys['s']) { move.sub(camFwd); moving = true; }
    if (keys['a']) { move.sub(camRight); moving = true; }
    if (keys['d']) { move.add(camRight); moving = true; }
    playerState.isMoving = moving;

    if (moving) {
      move.normalize();
      const totalMove = move.clone().multiplyScalar(PLAYER_SPEED * dt);
      const py = player.position.y;
      // 分轴碰撞检测
      const testX = player.position.x + totalMove.x;
      const testZ = player.position.z + totalMove.z;
      let newX = player.position.x, newZ = player.position.z;
      if (!checkCollisionAt(testX, player.position.z, py, PLAYER_RADIUS)) newX = testX;
      if (!checkCollisionAt(newX, testZ, py, PLAYER_RADIUS)) newZ = testZ;
      // 边界限制
      newX = Math.max(-BOUNDARY, Math.min(BOUNDARY, newX));
      newZ = Math.max(-BOUNDARY, Math.min(BOUNDARY, newZ));
      player.position.x = newX;
      player.position.z = newZ;
      player.rotation.y = Math.atan2(move.x, move.z);
    }
  }

  // --- 跳跃物理 ---
  if (!playerState.isOnGround) {
    playerState.velocityY -= GRAVITY * dt;
    player.position.y += playerState.velocityY * dt;
    if (player.position.y <= 0) {
      player.position.y = 0;
      playerState.velocityY = 0;
      playerState.isOnGround = true;
    }
  }

  // --- 闪现（子步检测防穿透） ---
  if (playerState.isDashing) {
    playerState.dashTimer -= dt;
    const totalDist = DASH_SPEED * dt;
    const subSteps = Math.ceil(totalDist / 0.3); // 每步最多0.3单位，防止穿透
    const subDist = totalDist / subSteps;
    const dpy = player.position.y;
    for (let s = 0; s < subSteps; s++) {
      const dpx = player.position.x + playerState.dashDir.x * subDist;
      const dpz = player.position.z + playerState.dashDir.z * subDist;
      if (!checkCollisionAt(dpx, dpz, dpy, PLAYER_RADIUS)) {
        player.position.x = Math.max(-BOUNDARY, Math.min(BOUNDARY, dpx));
        player.position.z = Math.max(-BOUNDARY, Math.min(BOUNDARY, dpz));
      } else {
        break; // 撞墙停止
      }
    }
    player.rotation.y = Math.atan2(playerState.dashDir.x, playerState.dashDir.z);
    if (playerState.dashTimer <= 0) playerState.isDashing = false;
  }

  // --- 冷却 ---
  if (playerState.attackCooldown > 0) playerState.attackCooldown -= dt;
  if (playerState.invincibleTimer > 0) playerState.invincibleTimer -= dt;
  if (playerState.dashCooldown > 0) playerState.dashCooldown -= dt;

  // --- 连击超时 ---
  if (playerState.combo > 0 && gameTime - playerState.lastAttackTime > playerState.comboMaxTime) {
    playerState.combo = 0;
  }

  // --- 动画 ---
  if (playerState.isAttacking) updatePlayerAttackAnimation(dt);
  updateWalkAnimation(playerData, playerState.isMoving && playerState.isOnGround, playerState.isAttacking, gameTime);
  // 头发飘动
  if (playerData.hairGroup) {
    const hairSway = playerState.isMoving ? Math.sin(gameTime * 14) * 0.04 : Math.sin(gameTime * 4) * 0.015;
    playerData.hairGroup.rotation.z = hairSway;
    playerData.hairGroup.rotation.x = Math.sin(gameTime * 6) * 0.02;
  }

  // --- Boss生成计时器 ---
  if (pendingBossSpawn) {
    bossSpawnTimer -= dt;
    if (bossSpawnTimer <= 0) {
      pendingBossSpawn = false;
      spawnEnemy(true);
    }
  }

  // --- 敌人更新 ---
  for (const enemy of enemies) {
    updateEnemyAI(enemy, dt);
    if (enemy.state.isAttacking) updateEnemyAttackAnimation(enemy, dt);
    updateWalkAnimation(enemy, enemy.state.isMoving && enemy.state.isAlive, enemy.state.isAttacking, gameTime);
  }

  // --- 粒子 ---
  updateHitParticles(dt);
  updatePetals(dt);

  // --- 摄像头 ---
  if (isLocked) {
    camTheta -= mouseDX * MOUSE_SENSITIVITY;
    camPhi -= mouseDY * MOUSE_SENSITIVITY;
    mouseDX = 0; mouseDY = 0;
  }
  camPhi = Math.max(0.15, Math.min(Math.PI / 2 - 0.05, camPhi));

  const tgt = new THREE.Vector3(
    player.position.x + CAMERA_DISTANCE * Math.sin(camPhi) * Math.sin(camTheta),
    Math.max(0.5, player.position.y + CAMERA_DISTANCE * Math.cos(camPhi) + CAMERA_HEIGHT),
    player.position.z + CAMERA_DISTANCE * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.position.lerp(tgt, Math.min(CAMERA_LERP * dt, 1));
  camera.lookAt(player.position.x, player.position.y + 1.05, player.position.z);

  // --- UI ---
  updateUI();
  renderer.render(scene, camera);
}

function updateUI() {
  const pp = Math.max(0, playerState.health / playerState.maxHealth * 100);
  document.querySelector('#player-health-bar .health-fill').style.width = pp + '%';

  const container = document.getElementById('enemy-health-list');
  // 增量更新敌人血条，避免每帧全量重建DOM
  const aliveEnemies = enemies.filter(e => e.state.isAlive);
  const existingItems = container.children;
  let idx = 0;
  for (const enemy of aliveEnemies) {
    idx++;
    const ep = Math.max(0, enemy.state.health / enemy.state.maxHealth * 100);
    if (idx - 1 < existingItems.length) {
      // 复用已有DOM，只更新血量
      const fill = existingItems[idx - 1].querySelector('.health-fill');
      if (fill) fill.style.width = ep + '%';
      const label = existingItems[idx - 1].querySelector('.health-label');
      if (label && label.textContent !== t('enemy') + ' ' + idx) {
        label.textContent = t('enemy') + ' ' + idx;
      }
    } else {
      // 创建新DOM
      const item = document.createElement('div');
      item.className = 'enemy-health-item';
      item.innerHTML = `<div class="health-label">${t('enemy')} ${idx}</div>
        <div class="health-bg"><div class="health-fill" style="width:${ep}%"></div></div>`;
      container.appendChild(item);
    }
  }
  // 移除多余DOM
  while (existingItems.length > aliveEnemies.length) {
    container.removeChild(container.lastChild);
  }

  const atkCd = Math.max(0, playerState.attackCooldown / ATTACK_COOLDOWN * 100);
  document.querySelector('#atk-cd .cd-fill').style.width = (100 - atkCd) + '%';
  const dashCd = Math.max(0, playerState.dashCooldown / DASH_COOLDOWN * 100);
  document.querySelector('#dash-cd .cd-fill').style.width = (100 - dashCd) + '%';

  const dashReady = document.getElementById('dash-ready');
  if (playerState.dashCooldown <= 0 && !playerState.isDashing) {
    dashReady.style.opacity = '1';
    dashReady.textContent = t('dashReady');
  } else {
    dashReady.style.opacity = '0';
  }
}

function gameLoop() {
  requestAnimationFrame(gameLoop);
  update();
}
gameLoop();
