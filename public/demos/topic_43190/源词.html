<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>源词 - 爬虫需求翻译器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-start: #00b4d8;
      --primary-end: #0077b6;
      --bg-light: #f8fafc;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      min-height: 100vh;
    }

    .header {
      text-align: center;
      padding: 3rem 2rem;
      background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
      color: white;
      box-shadow: var(--shadow-md);
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: 0.05em;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.95;
      font-weight: 400;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .card {
      background: white;
      border-radius: 1rem;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .card-header {
      padding: 1.5rem;
      background: linear-gradient(135deg, rgba(0, 180, 216, 0.1) 0%, rgba(0, 119, 182, 0.1) 100%);
      border-bottom: 1px solid var(--border-color);
    }

    .card-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .card-header svg {
      width: 20px;
      height: 20px;
      color: var(--primary-start);
    }

    .card-body {
      padding: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: white;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary-start);
      box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.1);
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      width: 100%;
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
    }

    .result-container {
      min-height: 500px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      border-radius: 0.5rem;
      padding: 1.25rem;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .result-container.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-family: inherit;
      font-style: italic;
    }

    .result-container.empty .empty-content {
      text-align: center;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .result-container.highlight {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      font-size: 0.65rem;
      font-weight: 600;
      border-radius: 9999px;
      background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
      color: white;
      margin-left: 0.5rem;
    }

    .copy-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.375rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
    }

    .copy-btn.success {
      background: #10b981;
      border-color: #10b981;
    }

    .copy-btn.error {
      background: #ef4444;
      border-color: #ef4444;
    }

    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .required {
      color: #ef4444;
      margin-left: 0.25rem;
    }

    .form-group.error input,
    .form-group.error textarea {
      border-color: #ef4444;
      background-color: #fef2f2;
    }

    .form-group .error-message {
      color: #ef4444;
      font-size: 0.75rem;
      margin-top: 0.25rem;
      display: none;
    }

    .form-group.error .error-message {
      display: block;
    }

    .card-header {
      position: relative;
    }

    .char-count {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-align: right;
      margin-top: 0.25rem;
    }

    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    @media (max-width: 1024px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 1.75rem;
      }

      .header p {
        font-size: 0.95rem;
      }

      .container {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>源词</h1>
    <p>把你的爬虫需求，变成AI可执行的指令</p>
  </header>

  <div class="container">
    <div class="main-content">
      <div class="card">
        <div class="card-header">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            爬虫需求配置
            <span class="badge">AI 翻译</span>
          </h2>
        </div>
        <div class="card-body">
          <form id="crawlerForm">
            <div class="form-group">
              <label for="targetUrl">目标网址</label>
              <input type="url" id="targetUrl" placeholder="https://movie.douban.com/top250" value="https://movie.douban.com/top250">
            </div>

            <div class="form-group">
              <label for="paginationRule">翻页规则</label>
              <select id="paginationRule">
                <option value="page">URL参数翻页 (page=1,2,3...)</option>
                <option value="next">下一页按钮</option>
                <option value="scroll">无限滚动</option>
                <option value="none">无需翻页</option>
              </select>
            </div>

            <div class="form-group" id="sampleDataGroup">
              <label for="sampleData">原始数据样本 <span class="required">*</span></label>
              <textarea id="sampleData" placeholder="粘贴包含目标数据的HTML源码示例...">&lt;div class="item"&gt;
  &lt;div class="pic"&gt;
    &lt;a href="/subject/1292052/"&gt;
      &lt;img src="https://img3.doubanio.com/view/photo/s_ratio_poster/public/p480747492.jpg" alt="肖申克的救赎"&gt;
    &lt;/a&gt;
  &lt;/div&gt;
  &lt;div class="info"&gt;
    &lt;div class="hd"&gt;
      &lt;a href="/subject/1292052/" class="title"&gt;肖申克的救赎&lt;/a&gt;
      &lt;span class="title"&gt;The Shawshank Redemption&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class="bd"&gt;
      &lt;p class="quote"&gt;希望让人自由。&lt;/p&gt;
      &lt;div class="star"&gt;
        &lt;span class="rating_num"&gt;9.7&lt;/span&gt;
        &lt;span class="pl"&gt;1892345人评价&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;</textarea>
              <div class="error-message">请输入原始数据样本</div>
              <div class="char-count" id="sampleDataCount">0 字符</div>
            </div>

            <div class="form-group" id="fieldMappingGroup">
              <label for="fieldMapping">字段映射</label>
              <textarea id="fieldMapping" placeholder="例如：电影名称 → 取 class='title' 的第一个 span 的文本">电影名称 → 取 class="title" 的第一个 <span> 的文本
评分 → 取 class="rating_num" 的 <span> 的文本
短评 → 取 class="quote" 的 <p> 的文本
海报URL → 取 .pic img 的 src 属性
详情链接 → 取 .pic a 的 href 属性</textarea>
              <div class="char-count" id="fieldMappingCount">0 字符</div>
            </div>

            <div class="form-group">
              <label for="outputFormat">存储格式</label>
              <select id="outputFormat">
                <option value="csv">CSV</option>
                <option value="json">JSON</option>
                <option value="excel">Excel</option>
              </select>
            </div>

            <button type="button" class="btn btn-primary" id="generateBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
              </svg>
              生成提示词
            </button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
            <h2>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
              精准爬虫指令
              <span class="badge">AI 可执行</span>
            </h2>
            <button class="copy-btn" id="copyBtn" style="display: none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              复制
            </button>
          </div>
          <div class="card-body">
            <div id="result" class="result-container empty">
              <div class="empty-content">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.5;">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                  <line x1="16" y1="13" x2="8" y2="13"></line>
                  <line x1="16" y1="17" x2="8" y2="17"></line>
                  <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <p>点击「生成提示词」按钮，查看AI可执行的精准爬虫指令</p>
              </div>
            </div>
          </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>源词 · 让爬虫更简单</p>
  </footer>

  <script>
    const generateBtn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const sampleData = document.getElementById('sampleData');
    const fieldMapping = document.getElementById('fieldMapping');
    const sampleDataCount = document.getElementById('sampleDataCount');
    const fieldMappingCount = document.getElementById('fieldMappingCount');

    const updateCharCount = (textarea, countEl) => {
      countEl.textContent = `${textarea.value.length} 字符`;
    };

    sampleData.addEventListener('input', () => {
      updateCharCount(sampleData, sampleDataCount);
      document.getElementById('sampleDataGroup').classList.remove('error');
    });

    fieldMapping.addEventListener('input', () => {
      updateCharCount(fieldMapping, fieldMappingCount);
    });

    updateCharCount(sampleData, sampleDataCount);
    updateCharCount(fieldMapping, fieldMappingCount);

    const validateForm = () => {
      let isValid = true;
      const sampleDataGroup = document.getElementById('sampleDataGroup');

      if (!sampleData.value.trim()) {
        sampleDataGroup.classList.add('error');
        isValid = false;
      } else {
        sampleDataGroup.classList.remove('error');
      }

      return isValid;
    };

    const generatePrompt = () => {
      if (!validateForm()) {
        return;
      }

      const targetUrl = document.getElementById('targetUrl').value;
      const paginationRule = document.getElementById('paginationRule').value;
      const sampleDataVal = sampleData.value;
      const fieldMappingVal = fieldMapping.value;
      const outputFormat = document.getElementById('outputFormat').value;

      generateBtn.disabled = true;
      generateBtn.innerHTML = '<span class="loading-spinner"></span> 生成中...';

      setTimeout(() => {
        const paginationDesc = {
          'page': 'URL参数翻页，格式为 page=1,2,3...',
          'next': '点击"下一页"按钮进行翻页',
          'scroll': '无限滚动自动加载更多内容',
          'none': '单页数据，无需翻页'
        };

        const prompt = `==================================================
【源词 · 精准爬虫指令】
==================================================

## 一、目标信息

**起始URL**：${targetUrl}

**翻页策略**：${paginationDesc[paginationRule]}

## 二、请求配置【铁律】

请务必设置以下请求头，防止被反爬：
\`\`\`python
headers = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
    'Cookie': '如有登录态则填写',
    'Referer': '目标域名',
}
response.encoding = 'utf-8'  # 避免中文乱码
\`\`\`

## 三、原始数据样本【铁律】

以下是目标页面的HTML源码，请仔细分析定位数据：
\`\`\`html
${sampleDataVal}
\`\`\`

## 四、数据提取

**解析步骤**：
1. 先定位总容器，包裹所有目标数据的最外层标签
2. 在容器内循环提取每条记录
3. 对每条记录提取以下字段

**需提取的字段及定位规则**：
${fieldMappingVal}

## 五、附加要求

**数据处理**：
- 启用数据清洗：去除首尾空白、多余换行
- 数值字段仅保留数字和小数点
- 启用自动翻页：根据翻页规则循环抓取

## 六、存储格式

**导出格式**：${outputFormat.toUpperCase()}
**字段顺序**：按字段映射中的顺序导出

## 七、执行规范

- 设置请求间隔 time.sleep(1~2)，遵守 robots 规则
- 异常重试3次，记录失败条目
- 代码需包含完整 import 语句，可直接运行

==================================================
以上为完整爬虫指令，请据此编写 Python 代码。
==================================================`;

        result.textContent = prompt;
        result.classList.remove('empty');
        result.classList.add('highlight');
        copyBtn.style.display = 'flex';

        generateBtn.disabled = false;
        generateBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
        </svg>
        生成提示词`;
      }, 300);
    };

    const copyToClipboard = async () => {
      try {
        await navigator.clipboard.writeText(result.textContent);
        copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> 已复制';
        copyBtn.classList.add('success');
        copyBtn.classList.remove('error');

        setTimeout(() => {
          copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> 复制';
          copyBtn.classList.remove('success');
        }, 2000);
      } catch (err) {
        copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg> 复制失败';
        copyBtn.classList.add('error');

        setTimeout(() => {
          copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> 复制';
          copyBtn.classList.remove('error');
        }, 2000);
      }
    };

    generateBtn.addEventListener('click', generatePrompt);
    copyBtn.addEventListener('click', copyToClipboard);
  </script>
</body>
</html>
