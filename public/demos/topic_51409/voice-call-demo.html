<!-- Generated by Trae Work - TRAE AI 创造力大赛 Demo -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>声控来电 — AI语音通话助手 Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      overflow: hidden;
    }
    .phone {
      width: 360px;
      height: 720px;
      background: #000;
      border-radius: 40px;
      border: 8px solid #333;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0,0,0,0.6);
    }
    .screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 100%);
      position: relative;
      overflow: hidden;
    }
    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
    }
    /* Home Screen */
    .home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100% - 50px);
      padding: 30px;
      text-align: center;
    }
    .app-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #059669, #0d9488);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(5,150,105,0.4);
    }
    .home-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .home-subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 40px;
    }
    .simulate-btn {
      background: linear-gradient(135deg, #059669, #0d9488);
      border: none;
      color: #fff;
      padding: 16px 40px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(5,150,105,0.4);
    }
    .simulate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(5,150,105,0.6);
    }
    .simulate-btn:active {
      transform: scale(0.97);
    }
    .feature-list {
      margin-top: 30px;
      text-align: left;
      width: 100%;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      font-size: 14px;
      color: #cbd5e1;
    }
    .feature-item span {
      font-size: 20px;
    }
    /* Incoming Call Screen */
    .call-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100% - 50px);
      padding: 30px;
      text-align: center;
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .caller-avatar {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(59,130,246,0.4);
    }
    .caller-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .caller-number {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .incoming-label {
      font-size: 16px;
      color: #059669;
      margin-bottom: 40px;
      font-weight: 600;
    }
    .voice-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 30px;
      padding: 12px 20px;
      background: rgba(5,150,105,0.15);
      border-radius: 20px;
      border: 1px solid rgba(5,150,105,0.3);
    }
    .voice-indicator .dot {
      width: 8px;
      height: 8px;
      background: #059669;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    .voice-indicator .dot:nth-child(2) { animation-delay: 0.3s; }
    .voice-indicator .dot:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .voice-text {
      font-size: 14px;
      color: #059669;
    }
    .recognized-command {
      font-size: 20px;
      font-weight: 700;
      color: #fbbf24;
      min-height: 28px;
      margin-bottom: 20px;
    }
    .call-buttons {
      display: flex;
      gap: 40px;
      margin-top: 20px;
    }
    .call-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .call-btn.answer {
      background: linear-gradient(135deg, #059669, #0d9488);
      box-shadow: 0 4px 20px rgba(5,150,105,0.4);
    }
    .call-btn.decline {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      box-shadow: 0 4px 20px rgba(220,38,38,0.4);
    }
    .call-btn:active {
      transform: scale(0.92);
    }
    .btn-label {
      font-size: 14px;
      margin-top: 8px;
      color: #94a3b8;
    }
    /* Active Call Screen */
    .active-call-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100% - 50px);
      padding: 30px;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .call-status {
      font-size: 16px;
      color: #059669;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .call-timer {
      font-size: 48px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    .call-actions {
      display: flex;
      gap: 24px;
      margin-bottom: 40px;
    }
    .action-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .action-btn.active {
      background: rgba(251,191,36,0.2);
      color: #fbbf24;
    }
    .action-label {
      font-size: 12px;
      margin-top: 6px;
      color: #94a3b8;
    }
    .end-call-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: #fff;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(220,38,38,0.4);
    }
    .end-call-btn:active {
      transform: scale(0.92);
    }
    .voice-hint {
      margin-top: 30px;
      padding: 12px 20px;
      background: rgba(251,191,36,0.1);
      border-radius: 16px;
      border: 1px solid rgba(251,191,36,0.3);
      font-size: 14px;
      color: #fbbf24;
    }
    /* End Screen */
    .end-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100% - 50px);
      padding: 30px;
      text-align: center;
    }
    .end-icon {
      font-size: 80px;
      margin-bottom: 24px;
    }
    .end-text {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .end-subtext {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 40px;
    }
    .call-duration {
      font-size: 18px;
      color: #059669;
      margin-bottom: 40px;
      font-weight: 600;
    }
    .back-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 14px 36px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    /* Ripple effect for incoming call */
    .ripple {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(5,150,105,0.5);
      animation: ripple 2s infinite;
      pointer-events: none;
    }
    @keyframes ripple {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }
    /* Toast notification */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 1000;
      transition: transform 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    /* Notch */
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background: #000;
      border-radius: 0 0 20px 20px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <div class="status-bar">
        <span>9:41</span>
        <span>TRAE AI 创造力大赛</span>
      </div>

      <!-- Home Screen -->
      <div class="home-screen" id="homeScreen">
        <div class="app-icon">📞</div>
        <div class="home-title">声控来电</div>
        <div class="home-subtitle">AI语音无障碍通话助手</div>
        <button class="simulate-btn" onclick="simulateIncomingCall()">模拟来电</button>
        <div class="feature-list">
          <div class="feature-item"><span>🎙️</span> 语音控制接听 / 挂断</div>
          <div class="feature-item"><span>👴</span> 关爱视障与老年群体</div>
          <div class="feature-item"><span>🚗</span> 驾驶场景安全通话</div>
          <div class="feature-item"><span>🤖</span> 全程使用 TRAE 开发</div>
        </div>
      </div>

      <!-- Incoming Call Screen -->
      <div class="call-screen" id="callScreen">
        <div style="position: relative;">
          <div class="caller-avatar">👨</div>
          <div class="ripple"></div>
        </div>
        <div class="caller-name">张先生</div>
        <div class="caller-number">138 **** 8888</div>
        <div class="incoming-label">📲 来电中...</div>
        <div class="voice-indicator">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <span class="voice-text">正在监听语音指令...</span>
        </div>
        <div class="recognized-command" id="recognizedCommand"></div>
        <div class="call-buttons">
          <div style="text-align: center;">
            <button class="call-btn decline" onclick="declineCall()">📵</button>
            <div class="btn-label">挂断</div>
          </div>
          <div style="text-align: center;">
            <button class="call-btn answer" onclick="answerCall()">📞</button>
            <div class="btn-label">接听</div>
          </div>
        </div>
        <div style="margin-top: 24px; font-size: 13px; color: #64748b;">
          💡 试试说 "接听" 或 "挂断"
        </div>
      </div>

      <!-- Active Call Screen -->
      <div class="active-call-screen" id="activeCallScreen">
        <div class="caller-avatar" style="width: 100px; height: 100px; font-size: 50px;">👨</div>
        <div class="caller-name" style="margin-top: 16px;">张先生</div>
        <div class="call-status">通话中</div>
        <div class="call-timer" id="callTimer">00:00</div>
        <div class="call-actions">
          <div style="text-align: center;">
            <button class="action-btn active" id="muteBtn" onclick="toggleMute()">🔇</button>
            <div class="action-label">静音</div>
          </div>
          <div style="text-align: center;">
            <button class="action-btn" id="speakerBtn" onclick="toggleSpeaker()">🔊</button>
            <div class="action-label">免提</div>
          </div>
          <div style="text-align: center;">
            <button class="action-btn">🔤</button>
            <div class="action-label">拨号</div>
          </div>
        </div>
        <button class="end-call-btn" onclick="endCall()">📵</button>
        <div class="voice-hint">
          🎙️ 说 "挂断" 结束通话
        </div>
      </div>

      <!-- End Screen -->
      <div class="end-screen" id="endScreen">
        <div class="end-icon">✅</div>
        <div class="end-text">通话已结束</div>
        <div class="end-subtext">声控来电，让沟通无障碍</div>
        <div class="call-duration" id="callDuration">通话时长：00:00</div>
        <button class="back-btn" onclick="goHome()">返回首页</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let recognition = null;
    let callStartTime = null;
    let timerInterval = null;
    let isMuted = false;
    let isSpeakerOn = false;

    // Initialize speech recognition
    function initSpeechRecognition() {
      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = function(event) {
          const results = event.results;
          if (results.length > 0) {
            const transcript = results[results.length - 1][0].transcript.trim();
            document.getElementById('recognizedCommand').textContent = '🎤 "' + transcript + '"';

            if (transcript.includes('接听') || transcript.includes('接') || transcript.includes('好')) {
              showToast('🎤 识别到："' + transcript + '" → 接听电话');
              setTimeout(() => answerCall(), 800);
            } else if (transcript.includes('挂断') || transcript.includes('挂') || transcript.includes('拒接')) {
              showToast('🎤 识别到："' + transcript + '" → 挂断电话');
              setTimeout(() => declineCall(), 800);
            }
          }
        };

        recognition.onerror = function(event) {
          console.log('Speech recognition error:', event.error);
        };
      } else {
        showToast('⚠️ 您的浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器');
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function simulateIncomingCall() {
      document.getElementById('homeScreen').style.display = 'none';
      document.getElementById('callScreen').style.display = 'flex';
      document.getElementById('recognizedCommand').textContent = '';
      
      // Start speech recognition
      if (recognition) {
        try {
          recognition.start();
        } catch(e) {
          // Already started
        }
      } else {
        initSpeechRecognition();
        if (recognition) {
          setTimeout(() => {
            try { recognition.start(); } catch(e) {}
          }, 500);
        }
      }
      
      showToast('📲 模拟来电！请说 "接听" 或 "挂断"');
    }

    function answerCall() {
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }
      document.getElementById('callScreen').style.display = 'none';
      document.getElementById('activeCallScreen').style.display = 'flex';
      
      callStartTime = Date.now();
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
      
      // Restart recognition for "挂断" command
      if (recognition) {
        setTimeout(() => {
          try { recognition.start(); } catch(e) {}
        }, 500);
      }
      
      showToast('✅ 已接听！通话中...');
    }

    function declineCall() {
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }
      document.getElementById('callScreen').style.display = 'none';
      document.getElementById('endScreen').style.display = 'flex';
      document.getElementById('callDuration').textContent = '已拒接来电';
      showToast('❌ 已挂断来电');
    }

    function endCall() {
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      
      const duration = document.getElementById('callTimer').textContent;
      document.getElementById('activeCallScreen').style.display = 'none';
      document.getElementById('endScreen').style.display = 'flex';
      document.getElementById('callDuration').textContent = '通话时长：' + duration;
      showToast('📵 通话已结束');
    }

    function updateTimer() {
      if (!callStartTime) return;
      const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
      const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const seconds = (elapsed % 60).toString().padStart(2, '0');
      document.getElementById('callTimer').textContent = minutes + ':' + seconds;
    }

    function toggleMute() {
      isMuted = !isMuted;
      const btn = document.getElementById('muteBtn');
      if (isMuted) {
        btn.classList.add('active');
        btn.textContent = '🔇';
        showToast('🔇 已静音');
      } else {
        btn.classList.remove('active');
        btn.textContent = '🔊';
        showToast('🔊 已取消静音');
      }
    }

    function toggleSpeaker() {
      isSpeakerOn = !isSpeakerOn;
      const btn = document.getElementById('speakerBtn');
      if (isSpeakerOn) {
        btn.classList.add('active');
        showToast('🔊 免提已开启');
      } else {
        btn.classList.remove('active');
        showToast('📞 免提已关闭');
    }
    }

    function goHome() {
      document.getElementById('endScreen').style.display = 'none';
      document.getElementById('homeScreen').style.display = 'flex';
      callStartTime = null;
      document.getElementById('callTimer').textContent = '00:00';
    }

    // Initialize on page load
    window.onload = function() {
      initSpeechRecognition();
    };
  </script>
</body>
</html>
