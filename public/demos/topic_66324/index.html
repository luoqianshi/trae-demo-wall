<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecReport - 智能渗透测试报告生成器</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e0e4ec;
    --muted: #7c8396;
    --accent: #4f8ff7;
    --accent2: #7c5cfc;
    --critical: #ff4757;
    --high: #ff6b81;
    --medium: #ffa502;
    --low: #2ed573;
    --info: #1e90ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  
  /* ===== Header ===== */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 20px;
    font-weight: 700;
  }
  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .header-actions {
    display: flex;
    gap: 10px;
  }
  .btn {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(79, 143, 247, 0.35); }
  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
  }
  .btn-ghost:hover { color: var(--text); }
  .btn-danger {
    background: rgba(255, 71, 87, 0.15);
    color: var(--critical);
    border: 1px solid rgba(255, 71, 87, 0.3);
  }
  .btn-danger:hover { background: rgba(255, 71, 87, 0.25); }

  /* ===== Layout ===== */
  .app-container {
    display: flex;
    height: calc(100vh - 71px);
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .sidebar h3 {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-group textarea { min-height: 80px; }
  
  .risk-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .risk-critical { background: rgba(255,71,87,0.15); color: var(--critical); }
  .risk-high { background: rgba(255,107,129,0.15); color: var(--high); }
  .risk-medium { background: rgba(255,165,2,0.15); color: var(--medium); }
  .risk-low { background: rgba(46,213,115,0.15); color: var(--low); }
  .risk-info { background: rgba(30,144,255,0.15); color: var(--info); }

  .finding-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
  }
  .finding-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .finding-item:hover { border-color: var(--accent); }
  .finding-item.active { border-color: var(--accent); background: rgba(79,143,247,0.08); }
  .finding-item .delete-btn {
    margin-left: auto;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 16px;
    line-height: 1;
  }
  .finding-item .delete-btn:hover { color: var(--critical); background: rgba(255,71,87,0.1); }

  /* ===== Main Preview ===== */
  .preview-area {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
  }
  .report-paper {
    width: 210mm;
    max-width: 100%;
    margin: 0 auto;
    background: white;
    color: #2d3436;
    padding: 60px 55px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.4);
    font-size: 13px;
    line-height: 1.8;
    overflow-wrap: break-word;
    word-wrap: break-word;
    word-break: break-word;
    box-sizing: border-box;
  }
  .report-paper pre {
    white-space: pre-wrap;
    word-wrap: break-word;
    word-break: break-all;
    overflow: hidden;
    background: #2d3436;
    color: #dfe6e9;
    padding: 14px 18px;
    border-radius: 6px;
    font-size: 12px;
  }
  .report-paper code {
    word-break: break-all;
  }
  .report-paper h1 {
    font-size: 26px;
    text-align: center;
    margin-bottom: 8px;
    color: #1a1a2e;
  }
  .report-paper .subtitle {
    text-align: center;
    color: #636e72;
    font-size: 13px;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #dfe6e9;
  }
  .report-paper .meta-bar {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #636e72;
    margin-bottom: 30px;
    padding: 12px 16px;
    background: #f8f9fa;
    border-radius: 6px;
  }
  .report-paper h2 {
    font-size: 17px;
    color: #1a1a2e;
    margin: 28px 0 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid #dfe6e9;
  }
  .report-paper h3 {
    font-size: 14px;
    color: #2d3436;
    margin: 18px 0 8px;
  }
  .report-paper table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 12px;
  }
  .report-paper th {
    background: #f8f9fa;
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid #dfe6e9;
  }
  .report-paper td {
    padding: 8px 12px;
    border-bottom: 1px solid #f1f2f6;
  }
  .report-paper .risk-label {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .report-paper .rl-critical { background: #ffe0e3; color: #c0392b; }
  .report-paper .rl-high { background: #ffe0e3; color: #e74c3c; }
  .report-paper .rl-medium { background: #fff3e0; color: #e67e22; }
  .report-paper .rl-low { background: #e8f8f0; color: #27ae60; }

  .finding-detail {
    margin: 16px 0;
    padding: 16px 20px;
    border-left: 4px solid #dfe6e9;
    background: #ffffff;
    border-radius: 0 6px 6px 0;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .finding-detail pre {
    white-space: pre-wrap;
    word-break: break-all;
    overflow-x: hidden;
  }
  .finding-detail.risk-critical { border-left-color: #c0392b; background: #fef5f5; }
  .finding-detail.risk-high { border-left-color: #e74c3c; background: #fef8f6; }
  .finding-detail.risk-medium { border-left-color: #e67e22; background: #fefaf5; }
  .finding-detail.risk-low { border-left-color: #27ae60; background: #f5fdf8; }

  .report-paper .empty-state {
    text-align: center;
    color: #b2bec3;
    padding: 60px 0;
  }
  .report-paper .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .section-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    background: #f0f0f0;
    margin-right: 8px;
    color: #636e72;
  }

  code {
    background: #f1f2f6;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 12px;
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
  }

  pre {
    background: #2d3436;
    color: #dfe6e9;
    padding: 14px 18px;
    border-radius: 6px;
    font-size: 12px;
    overflow-x: auto;
    margin: 10px 0;
    line-height: 1.5;
  }

  /* ===== Print ===== */
  @media print {
    .sidebar, .header { display: none !important; }
    .preview-area { padding: 0; }
    .report-paper {
      box-shadow: none;
      width: 100%;
      min-height: auto;
      padding: 0;
    }
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 999;
    animation: slideIn 0.3s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s;
  }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 480px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-size: 18px;
    margin-bottom: 20px;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Responsive */
  @media (max-width: 1024px) {
    .app-container { flex-direction: column; }
    .sidebar { width: 100%; min-width: 100%; max-height: 45vh; }
    .preview-area { padding: 20px; }
    .report-paper { width: 100%; padding: 30px 24px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">&#x1F6E1;</div>
    <span>SecReport</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="loadDemo()">&#x1F4A1; 加载示例</button>
    <button class="btn btn-outline" onclick="resetAll()">&#x21BA; 重置</button>
    <button class="btn btn-outline" onclick="exportJSON()">&#x1F4E5; 导出JSON</button>
    <button class="btn btn-outline" onclick="document.getElementById('importInput').click()">&#x1F4E4; 导入</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importJSON(event)">
    <button class="btn btn-outline" onclick="window.print()">&#x1F5A8; 打印</button>
    <button class="btn btn-primary" onclick="exportHTML()">&#x1F4C4; 导出报告</button>
  </div>
</div>

<div class="app-container">
  <!-- Sidebar -->
  <div class="sidebar">
    <h3>&#x1F3AF; 报告信息</h3>
    <div class="form-group">
      <label>项目名称</label>
      <input type="text" id="projName" placeholder="例：XX系统安全评估" oninput="updatePreview()">
    </div>
    <div class="form-group">
      <label>测试目标</label>
      <input type="text" id="projTarget" placeholder="例：https://target.com" oninput="updatePreview()">
    </div>
    <div class="form-group">
      <label>测试日期</label>
      <input type="date" id="projDate" oninput="updatePreview()">
    </div>
    <div class="form-group">
      <label>测试人员</label>
      <input type="text" id="projTester" placeholder="测试团队/人员" oninput="updatePreview()">
    </div>

    <h3 style="margin-top:12px;">&#x1F50D; 添加发现</h3>
    <div class="form-group">
      <label>快速模板</label>
      <select id="vulnTemplate" onchange="applyTemplate()">
        <option value="">-- 选择模板自动填充 --</option>
        <option value="sqli_union">SQL注入 - UNION查询型</option>
        <option value="sqli_blind">SQL注入 - 布尔盲注</option>
        <option value="sqli_time">SQL注入 - 时间盲注</option>
        <option value="xss_stored">XSS - 存储型</option>
        <option value="xss_reflected">XSS - 反射型</option>
        <option value="xss_dom">XSS - DOM型</option>
        <option value="csrf">CSRF - 跨站请求伪造</option>
        <option value="ssrf">SSRF - 服务端请求伪造</option>
        <option value="file_upload">文件上传 - 任意文件上传</option>
        <option value="file_read">文件读取 - 路径穿越</option>
        <option value="idor">IDOR - 越权访问</option>
        <option value="privesc_v">越权 - 垂直越权</option>
        <option value="privesc_h">越权 - 水平越权</option>
        <option value="auth_bypass">认证绕过</option>
        <option value="weak_pwd">弱口令</option>
        <option value="info_leak">信息泄露</option>
        <option value="config_error">配置错误</option>
        <option value="deserialization">反序列化漏洞</option>
        <option value="logic_flaw">逻辑漏洞</option>
        <option value="weak_crypto">密码学缺陷</option>
        <option value="cmd_injection">命令注入</option>
        <option value="xxe">XXE - XML外部实体注入</option>
        <option value="open_redirect">开放重定向</option>
        <option value="cors">CORS 配置错误</option>
        <option value="jwt">JWT 安全缺陷</option>
        <option value="sensitive_api">未授权API访问</option>
      </select>
    </div>
    <div class="form-group">
      <label>漏洞名称</label>
      <input type="text" id="vulnName" placeholder="例：SQL注入漏洞">
    </div>
    <div class="form-group">
      <label>目标位置</label>
      <input type="text" id="vulnLocation" placeholder="例：POST /api/login">
    </div>
    <div class="form-group">
      <label>风险等级</label>
      <select id="vulnRisk">
        <option value="critical">严重 CRITICAL</option>
        <option value="high">高 HIGH</option>
        <option value="medium" selected>中 MEDIUM</option>
        <option value="low">低 LOW</option>
      </select>
    </div>
    <div class="form-group">
      <label>漏洞类型</label>
      <select id="vulnType">
        <option value="SQL注入">SQL注入</option>
        <option value="XSS跨站脚本">XSS跨站脚本</option>
        <option value="CSRF">CSRF跨站请求伪造</option>
        <option value="SSRF">SSRF服务端请求伪造</option>
        <option value="文件上传">文件上传漏洞</option>
        <option value="路径穿越">路径穿越</option>
        <option value="信息泄露" selected>信息泄露</option>
        <option value="失效的访问控制">失效的访问控制</option>
        <option value="身份认证缺陷">身份认证缺陷</option>
        <option value="密码学缺陷">密码学缺陷</option>
        <option value="反序列化">反序列化漏洞</option>
        <option value="逻辑漏洞">逻辑漏洞</option>
        <option value="配置错误">配置错误</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>漏洞描述</label>
      <textarea id="vulnDesc" placeholder="描述漏洞的具体情况..."></textarea>
    </div>
    <div class="form-group">
      <label>攻击证据/复现步骤</label>
      <textarea id="vulnEvidence" placeholder="复现步骤、Payload、截图说明..."></textarea>
    </div>
    <div class="form-group">
      <label>修复建议</label>
      <textarea id="vulnFix" placeholder="建议的修复方案..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="addFinding()" style="width:100%;justify-content:center;">
      + 添加发现
    </button>

    <h3 style="margin-top:8px;">&#x1F4CB; 发现列表 (<span id="findingCount">0</span>)</h3>
    <div class="finding-list" id="findingList">
      <div style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">
        点击左侧添加第一条发现
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-area" id="previewArea">
    <div class="report-paper" id="reportPaper">
      <!-- Dynamically rendered -->
    </div>
  </div>
</div>

<script>
// ===== State =====
let findings = JSON.parse(localStorage.getItem('secReport_findings') || '[]');
let editIndex = -1;

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('projDate').value = new Date().toISOString().split('T')[0];
  // Load saved state
  const saved = JSON.parse(localStorage.getItem('secReport_meta') || '{}');
  if (saved.projName) document.getElementById('projName').value = saved.projName;
  if (saved.projTarget) document.getElementById('projTarget').value = saved.projTarget;
  if (saved.projDate) document.getElementById('projDate').value = saved.projDate;
  if (saved.projTester) document.getElementById('projTester').value = saved.projTester;
  // First visit: auto-load demo
  if (findings.length === 0 && !localStorage.getItem('secReport_visited')) {
    localStorage.setItem('secReport_visited', '1');
    loadDemo();
    return;
  }
  localStorage.setItem('secReport_visited', '1');
  renderFindingList();
  updatePreview();
});

// ===== Save Meta =====
function saveMeta() {
  localStorage.setItem('secReport_meta', JSON.stringify({
    projName: document.getElementById('projName').value,
    projTarget: document.getElementById('projTarget').value,
    projDate: document.getElementById('projDate').value,
    projTester: document.getElementById('projTester').value,
  }));
}

// ===== Finding CRUD =====
function addFinding() {
  const name = document.getElementById('vulnName').value.trim();
  const location = document.getElementById('vulnLocation').value.trim();
  const risk = document.getElementById('vulnRisk').value;
  const type = document.getElementById('vulnType').value;
  const desc = document.getElementById('vulnDesc').value.trim();
  const evidence = document.getElementById('vulnEvidence').value.trim();
  const fix = document.getElementById('vulnFix').value.trim();

  if (!name) return showToast('请填写漏洞名称', 1);

  const finding = { id: Date.now(), name, location, risk, type, desc, evidence, fix };

  if (editIndex >= 0) {
    findings[editIndex] = finding;
    editIndex = -1;
    document.querySelector('.btn-primary').textContent = '+ 添加发现';
    showToast('发现已更新');
  } else {
    findings.push(finding);
    showToast('发现已添加');
  }

  localStorage.setItem('secReport_findings', JSON.stringify(findings));
  clearForm();
  renderFindingList();
  updatePreview();
}

function editFinding(idx) {
  const f = findings[idx];
  document.getElementById('vulnName').value = f.name;
  document.getElementById('vulnLocation').value = f.location;
  document.getElementById('vulnRisk').value = f.risk;
  document.getElementById('vulnType').value = f.type;
  document.getElementById('vulnDesc').value = f.desc;
  document.getElementById('vulnEvidence').value = f.evidence;
  document.getElementById('vulnFix').value = f.fix;
  editIndex = idx;
  document.querySelector('.sidebar .btn-primary').textContent = '更新发现';
  document.getElementById('vulnName').focus();
}

function deleteFinding(idx) {
  findings.splice(idx, 1);
  localStorage.setItem('secReport_findings', JSON.stringify(findings));
  renderFindingList();
  updatePreview();
  showToast('已删除');
}

function clearForm() {
  document.getElementById('vulnName').value = '';
  document.getElementById('vulnLocation').value = '';
  document.getElementById('vulnRisk').value = 'medium';
  document.getElementById('vulnType').value = '信息泄露';
  document.getElementById('vulnDesc').value = '';
  document.getElementById('vulnEvidence').value = '';
  document.getElementById('vulnFix').value = '';
}

function renderFindingList() {
  const container = document.getElementById('findingList');
  document.getElementById('findingCount').textContent = findings.length;

  if (findings.length === 0) {
    container.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">暂无发现，使用上方表单添加</div>';
    return;
  }

  container.innerHTML = findings.map((f, i) => {
    const riskClass = `risk-${f.risk}`;
    const riskLabel = { critical: '严重', high: '高', medium: '中', low: '低' }[f.risk];
    return `

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.meta) {
        document.getElementById('projName').value = data.meta.projName || '';
        document.getElementById('projTarget').value = data.meta.projTarget || '';
        document.getElementById('projDate').value = data.meta.projDate || '';
        document.getElementById('projTester').value = data.meta.projTester || '';
      }
      if (data.findings && Array.isArray(data.findings)) {
        findings = data.findings;
        localStorage.setItem('secReport_findings', JSON.stringify(findings));
        renderFindingList();
        updatePreview();
        showToast(`已导入 ${findings.length} 条发现`);
      }
    } catch (err) {
      showToast('文件格式错误', 1);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function applyTemplate() {
  const key = document.getElementById('vulnTemplate').value;
  if (!key) return;
  const t = VULN_TEMPLATES[key];
  if (!t) return;
  document.getElementById('vulnName').value = t.name;
  document.getElementById('vulnLocation').value = '';
  document.getElementById('vulnRisk').value = t.risk;
  document.getElementById('vulnType').value = t.type;
  document.getElementById('vulnDesc').value = t.desc;
  document.getElementById('vulnEvidence').value = t.evidence;
  document.getElementById('vulnFix').value = t.fix;
  document.getElementById('vulnName').focus();
  document.getElementById('vulnTemplate').value = '';
  showToast('模板已填充，请补充目标位置');
}

      fix: '1. 对 invokeTarget 做严格白名单校验，仅允许预定义的 Bean.方法\n2. 定时任务管理接口添加 @RequiresPermissions 注解\n3. 参数部分做正则校验，禁止字符串拼接注入'
    },
    {
      id: 4, name: '系统配置接口泄露明文密码', location: 'GET /prod-api/system/config/list',
      risk: 'medium', type: '信息泄露',
      desc: 'system/config/list 接口返回系统配置表全部内容，其中 sys.user.initPassword 字段值为 admin@123，即用户初始密码。攻击者可用此密码对系统用户进行密码喷洒攻击。',
      evidence: 'GET /prod-api/system/config/list\n\n响应中包含：\n{"configKey":"sys.user.initPassword","configValue":"admin@123"}\n\n同时泄露 captchaEnabled=false（验证码已关闭）、sys.user.initPassword 等敏感配置。',

    },
    {
      id: 5, name: 'RSA 512-bit 弱密钥用于登录加密', location: 'POST /prod-api/login',
      risk: 'low', type: '密码学缺陷',
      desc: '前端使用 jsencrypt 库对登录密码进行 RSA 加密，但公钥长度仅为 512-bit，可被快速分解因数还原私钥。同时公私钥对硬编码在前端 JS 中。',
      evidence: '前端 JS 中硬编码公钥：\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...（512-bit）\n\n使用 openssl 或 yafu 可在数小时内分解 512-bit RSA 密钥。',
      fix: '1. 升级 RSA 密钥长度至 2048-bit 以上\n2. 公私钥对不要硬编码在前端\n3. 考虑使用 HTTPS 传输代替前端 RSA 加密'
    },
    {
      id: 6, name: '验证码校验功能已关闭', location: 'POST /prod-api/login',
      risk: 'low', type: '配置错误',

      evidence: 'GET /prod-api/system/config/list 返回：\n{"configKey":"sys.account.captchaEnabled","configValue":"false"}\n\n登录请求仅需 username + password，无需 captchaCode。',

  ];

  localStorage.setItem('secReport_findings', JSON.stringify(findings));
  saveMeta();
  renderFindingList();
  updatePreview();
  showToast('示例数据已加载');
}

function resetAll() {
  if (!confirm('确定要清空所有数据吗？此操作不可撤销。')) return;
  findings = [];
  localStorage.removeItem('secReport_findings');
  localStorage.removeItem('secReport_meta');
  document.getElementById('projName').value = '';
  document.getElementById('projTarget').value = '';
  document.getElementById('projDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('projTester').value = '';
  clearForm();
  renderFindingList();
  updatePreview();
  showToast('已重置');
}

// ===== Utilities =====
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.cssText = type === 1 ? 'border-color:#ff4757;color:#ff6b81' : 'border-color:#2ed573;color:#2ed573';
  toast.textContent = (type === 1 ? '&#x26A0; ' : '&#x2705; ') + msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    exportHTML();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    addFinding();
  }
});
</script>
