        .privacy-settings-page {
          background: var(--color-background);
          min-height: 100vh;
        }

        .page-content {
          padding: var(--spacing-4);
        }

        .privacy-intro {
          display: flex;
          align-items: flex-start;
          gap: var(--spacing-3);
          padding: var(--spacing-4);
          background: var(--color-primary-50);
          border: 1px solid var(--color-primary-100);
          margin-bottom: var(--spacing-4);
        }

        .privacy-intro svg {
          color: var(--color-primary);
          flex-shrink: 0;
          margin-top: 2px;
        }

        .privacy-intro p {
          font-size: var(--font-size-sm);
          color: var(--color-graphite);
          margin: 0;
          line-height: 1.5;
        }

        .settings-card {
          margin-bottom: var(--spacing-4);
        }

        .section-title {
          font-size: var(--font-size-xs);
          color: var(--color-silver);
          text-transform: uppercase;
          letter-spacing: 1px;
          margin: 0 0 var(--spacing-3);
          padding: 0;
        }

        .setting-item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: var(--spacing-3) 0;
          border-bottom: 1px solid var(--color-mist);
          cursor: pointer;
        }

        .setting-item:last-child {
          border-bottom: none;
        }

        .setting-left {
          display: flex;
          align-items: center;
          gap: var(--spacing-3);
        }

        .setting-left svg {
          color: var(--color-graphite);
        }

        .setting-left span {
          font-size: var(--font-size-base);
          color: var(--color-ink);
        }

        .setting-right {
          display: flex;
          align-items: center;
          gap: var(--spacing-2);
        }

        .setting-value {
          font-size: var(--font-size-sm);
          color: var(--color-silver);
        }

        .chevron {
          color: var(--color-silver);
        }

        .link-item {
          cursor: pointer;
        }

        .toggle {
          position: relative;
          width: 52px;
          height: 32px;
        }

        .toggle input {
          opacity: 0;
          width: 0;
          height: 0;
        }

        .toggle-slider {
          position: absolute;
          cursor: pointer;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: var(--color-mist);
          border-radius: 16px;
          transition: all var(--duration-normal) var(--ease-out);
        }

        .toggle-slider::before {
          position: absolute;
          content: '';
          height: 28px;
          width: 28px;
          left: 2px;
          bottom: 2px;
          background: white;
          border-radius: 50%;
          transition: all var(--duration-normal) var(--ease-out);
          box-shadow: var(--shadow-sm);
        }

        .toggle input:checked + .toggle-slider {
          background: var(--color-primary);
        }

        .toggle input:checked + .toggle-slider::before {
          transform: translateX(20px);
        }

        .modal-overlay {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0,0,0,0.4);
          z-index: var(--z-index-modal);
          display: flex;
          align-items: flex-end;
          justify-content: center;
        }

        .bottom-sheet {
          width: 100%;
          max-width: 430px;
          background: var(--color-card);
          border-radius: var(--radius-xl) var(--radius-xl) 0 0;
          padding: var(--spacing-5);
          padding-bottom: calc(var(--spacing-5) + var(--safe-area-bottom));
        }

        .modal-title {
          font-size: var(--font-size-lg);
          font-weight: var(--font-weight-semibold);
          color: var(--color-ink);
          text-align: center;
          margin: 0 0 var(--spacing-1);
        }

        .modal-desc {
          font-size: var(--font-size-sm);
          color: var(--color-silver);
          text-align: center;
          margin: 0 0 var(--spacing-5);
        }

        .option-item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: var(--spacing-4);
          border-radius: var(--radius-md);
          cursor: pointer;
          transition: background var(--duration-fast) var(--ease-out);
          margin-bottom: var(--spacing-1);
        }

        .option-item span {
          font-size: var(--font-size-base);
          color: var(--color-ink);
        }

        .option-item.active {
          background: var(--color-primary-50);
        }

        .option-item.active svg {
          color: var(--color-primary);
        }

        .cancel-btn {
          width: 100%;

          padding: var(--spacing-4);
        }

          margin-bottom: var(--spacing-6);

          gap: var(--spacing-2);

          color: var(--color-silver);

          flex-wrap: wrap;
          gap: var(--spacing-2);
        }

          border: none;
          border-radius: var(--radius-full);
          font-size: var(--font-size-xs);
          color: var(--color-graphite);
          transition: all 0.2s;
        }

        .hot-tag:hover {
          background: var(--color-primary-50);
          color: var(--color-primary);
        }

          font-weight: 600;

          flex-wrap: wrap;
          gap: var(--spacing-2);
        }

          align-items: center;
          gap: var(--spacing-1);

          border: none;
          border-radius: var(--radius-full);
          font-size: var(--font-size-xs);
          color: var(--color-graphite);
        }

          display: flex;
          flex-direction: column;
          gap: var(--spacing-2);
        }

        .category-card {
          display: flex;
          align-items: center;
          gap: var(--spacing-3);
          padding: var(--spacing-4);
        }

        .category-icon {
          color: var(--color-primary-500);
        }

        .category-info {
          flex: 1;
        }

          color: var(--color-ink);

        }

          font-size: var(--font-size-xs);
          color: var(--color-silver);
        }

          padding: var(--spacing-4);
        }

          justify-content: space-between;

        }

          overflow-x: auto;

          border-radius: var(--radius-full);
          white-space: nowrap;

          color: var(--color-primary-500);

          color: var(--color-silver);

          color: var(--color-silver);

        }

        }

        .node-label {

          background: rgba(255, 165, 0, 0.1);
        }

        .stat-value {
          font-size: var(--font-size-xl);
          font-weight: var(--font-weight-bold);
          color: var(--color-ink);
        }

        .stat-item.upcoming .stat-value {
          color: #1677FF;
        }

        .stat-item.ongoing .stat-value {
          color: #4CAF50;
        }

        .stat-item.draft .stat-value {
          color: #FFA500;
        }

        .stat-label {
          font-size: var(--font-size-xs);
          color: var(--color-silver);
          margin-top: var(--spacing-1);
        }

        /* Filter Tabs */
        .filter-tabs {
          display: flex;
          gap: var(--spacing-2);
          padding: var(--spacing-3) var(--spacing-4);
          overflow-x: auto;
        }

        .filter-tab {
          display: flex;
          align-items: center;
          gap: var(--spacing-2);
          padding: var(--spacing-2) var(--spacing-3);
          background: var(--color-card);
          border: 1px solid var(--color-mist);
          border-radius: var(--radius-full);
          font-size: var(--font-size-sm);
          color: var(--color-graphite);
          white-space: nowrap;
        }

        .filter-tab.active {
          background: var(--color-primary-500);
          border-color: var(--color-primary-500);
          color: white;
        }

        .filter-count {
          padding: 2px 6px;
          background: var(--color-surface);
          border-radius: var(--radius-sm);
          font-size: var(--font-size-xs);
        }

        .filter-tab.active .filter-count {
          background: rgba(255, 255, 255, 0.2);
        }

        /* Activities List */
        .activities-list {
          padding: var(--spacing-4);
          display: flex;
          flex-direction: column;
          gap: var(--spacing-3);
        }

        .empty-state {
          text-align: center;
          padding: var(--spacing-10);
          color: var(--color-silver);
        }

        .empty-text {
          margin: var(--spacing-3) 0 var(--spacing-6);
          font-size: var(--font-size-sm);
        }

        /* Activity Item */
        .activity-item {
          display: flex;
          gap: var(--spacing-3);
          padding: var(--spacing-4);
        }

        .activity-cover {
          width: 80px;
          height: 80px;
          border-radius: var(--radius-md);
          overflow: hidden;
          flex-shrink: 0;
          position: relative;
        }

        .activity-cover img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        .cover-placeholder {
          width: 100%;
          height: 100%;
          background: var(--color-surface);
          display: flex;
          align-items: center;
          justify-content: center;
          color: var(--color-silver);
        }

        .status-tag {
          position: absolute;
          top: 4px;
          left: 4px;
          padding: 2px 6px;
          border-radius: var(--radius-sm);
          font-size: 10px;
        }

        .activity-info {
          flex: 1;
          min-width: 0;
        }

        .activity-title {
          font-size: var(--font-size-base);
          font-weight: var(--font-weight-semibold);
          color: var(--color-ink);
          margin: 0 0 var(--spacing-2);
        }

        .activity-meta {
          display: flex;
          flex-direction: column;
          gap: var(--spacing-1);
          margin-bottom: var(--spacing-2);
        }

        .meta-row {
          display: flex;
          align-items: center;
          gap: var(--spacing-1);
          font-size: var(--font-size-xs);
          color: var(--color-silver);
        }

        .activity-tags {
          display: flex;
          gap: var(--spacing-1);
          margin-bottom: var(--spacing-2);
        }

        .tag {
          padding: 2px 6px;
          background: var(--color-surface);
          border-radius: var(--radius-sm);
          font-size: var(--font-size-xs);
          color: var(--color-primary-500);
        }

        .activity-price {
          font-size: var(--font-size-sm);
          color: #E55A3A;
          font-weight: var(--font-weight-medium);
        }

        .activity-actions {
          display: flex;
          flex-direction: column;
          gap: var(--spacing-2);
          align-items: flex-end;
        }

        .delete-btn {
          padding: var(--spacing-2);
          background: none;
          border: 1px solid var(--color-mist);
          border-radius: var(--radius-sm);
          color: #E55A3A;
        }

        .view-btn {
          display: flex;
          align-items: center;
          gap: var(--spacing-1);
          padding: var(--spacing-3) var(--spacing-4);
          background: var(--color-card);
          border: 1px solid var(--color-mist);
          border-radius: var(--radius-md);
          font-size: var(--font-size-sm);
          color: var(--color-graphite);
          margin-top: var(--spacing-3);
        }

        /* Modal */
        .modal-overlay {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0, 0, 0, 0.5);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 100;
          padding: var(--spacing-4);
        }

        .modal-content {
          width: 100%;
          max-width: 500px;
          max-height: 90vh;
          background: var(--color-card);
          border-radius: var(--radius-lg);
          overflow: hidden;
          display: flex;
          flex-direction: column;
        }

        .modal-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: var(--spacing-4);
          border-bottom: 1px solid var(--color-ghost);
        }

        .modal-title {
          font-size: var(--font-size-lg);
          font-weight: var(--font-weight-bold);
          color: var(--color-ink);
          margin: 0;
        }

        .close-btn {
          background: none;
          border: none;
          padding: var(--spacing-2);
          color: var(--color-silver);
        }

        .modal-body {
          flex: 1;
          overflow-y: auto;
          padding: var(--spacing-4);
        }

        .form-group {
          margin-bottom: var(--spacing-4);
        }

        .form-label {
          display: flex;
          align-items: center;
          gap: var(--spacing-2);
          font-size: var(--font-size-sm);
          color: var(--color-ink);
          margin-bottom: var(--spacing-2);
          font-weight: var(--font-weight-medium);
        }

        /* Cover Upload */
        .cover-upload {
          width: 100%;
        }

        .cover-preview {
          position: relative;
          width: 100%;
          height: 120px;
          border-radius: var(--radius-md);
          overflow: hidden;
        }

        .cover-preview img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        .remove-cover {
          position: absolute;
          top: var(--spacing-2);
          right: var(--spacing-2);
          width: 24px;
          height: 24px;
          background: rgba(0, 0, 0, 0.5);
          border: none;
          border-radius: 50%;
          color: white;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .upload-area {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: var(--spacing-2);
          width: 100%;
          height: 120px;
          border: 2px dashed var(--color-mist);
          border-radius: var(--radius-md);
          color: var(--color-silver);
          cursor: pointer;
        }

        .upload-area input {
          display: none;
        }

        /* Number Input */
        .number-input {
          width: 100%;
          padding: var(--spacing-3);
          border: 1px solid var(--color-mist);
          border-radius: var(--radius-md);
          font-size: var(--font-size-base);
          background: var(--color-surface);
          color: var(--color-ink);
        }

        .price-input {
          display: flex;
          align-items: center;
          gap: var(--spacing-2);
        }

        .price-unit {
          font-size: var(--font-size-sm);
          color: var(--color-silver);
        }

        /* Tags Input */
        .tags-input {
          display: flex;
          flex-direction: column;
          gap: var(--spacing-2);
        }

        .tags-list {
          display: flex;
          gap: var(--spacing-2);
        }

        .tag-item {
          display: flex;
          align-items: center;
          gap: var(--spacing-1);
          padding: var(--spacing-2) var(--spacing-3);
          background: var(--color-primary-100);
          border-radius: var(--radius-full);
          font-size: var(--font-size-sm);
          color: var(--color-primary-500);
        }

        .tag-item button {
          background: none;
          border: none;
          padding: 0;
          color: var(--color-primary-500);
        }

        .tag-add {
          display: flex;
          gap: var(--spacing-2);
        }

        .tag-add input {
          flex: 1;
          padding: var(--spacing-2) var(--spacing-3);
          border: 1px solid var(--color-mist);
          border-radius: var(--radius-md);
          font-size: var(--font-size-sm);
          background: var(--color-surface);
        }

        .tag-add button {
          padding: var(--spacing-2);
          background: var(--color-primary-500);
          border: none;
          border-radius: var(--radius-md);
          color: white;
        }

        /* Description Input */
        .description-input {
          width: 100%;
          padding: var(--spacing-3);
          border: 1px solid var(--color-mist);
          border-radius: var(--radius-md);
          font-size: var(--font-size-sm);
          background: var(--color-surface);
          color: var(--color-ink);
          resize: none;
        }

        /* Status Select */
        .status-select {
          display: flex;
          gap: var(--spacing-2);
        }

        .status-option {
          padding: var(--spacing-2) var(--spacing-3);
          background: var(--color-surface);
          border: 2px solid transparent;
          border-radius: var(--radius-md);
          font-size: var(--font-size-sm);
        }

        .status-option.selected {
          background: var(--color-surface);
        }

        /* Modal Footer */
        .modal-footer {
          display: flex;
          gap: var(--spacing-3);
          padding: var(--spacing-4);
          border-top: 1px solid var(--color-ghost);
        }

        .modal-footer button {
          flex: 1;
        }

        .login-page {
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          background: linear-gradient(180deg, var(--color-primary-50) 0%, var(--color-background) 100%);
          padding-bottom: var(--safe-area-bottom);
          position: relative;
          overflow: hidden;
        }

        .login-decor-bg {
          position: absolute;
          top: -100px;
          left: -50px;
          width: 300px;
          height: 300px;
          background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
          border-radius: 50%;
        }

        .login-header {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 80px var(--spacing-5);
          padding-top: calc(80px + var(--safe-area-top));
          position: relative;
          z-index: 1;
        }

        .login-logo {
          margin-bottom: var(--spacing-4);
        }

        .login-title {
          font-size: var(--font-size-5xl);
          font-weight: var(--font-weight-bold);
          color: var(--color-ink);
          margin-bottom: var(--spacing-2);
        }

        .login-slogan {
          font-size: var(--font-size-base);
          color: var(--color-slate);
          letter-spacing: 2px;
        }

        .login-form-container {
          flex: 1;
          padding: 0 var(--spacing-5);
          padding-bottom: var(--spacing-10);
        }

        .login-card {
          border-radius: var(--radius-2xl) !important;
          box-shadow: 0 8px 32px rgba(147, 51, 234, 0.08) !important;
        }

        /* 优化错误提示样式 */
        .error-toast {
          display: flex;
          align-items: center;
          gap: var(--spacing-2);
          padding: var(--spacing-3) var(--spacing-4);
          background: rgba(239, 68, 68, 0.1);
          border: 1px solid rgba(239, 68, 68, 0.3);
          border-radius: var(--radius-md);
          margin-bottom: var(--spacing-5);
          animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
          from {
            opacity: 0;
            transform: translateY(-10px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .error-toast.mini {
          padding: var(--spacing-2) var(--spacing-3);
          font-size: var(--font-size-sm);
          margin-bottom: var(--spacing-3);
        }

        .error-icon {
          color: var(--color-error);
          flex-shrink: 0;
        }

        .error-text {
          color: var(--color-error);
          font-size: var(--font-size-sm);
          flex: 1;
        }

        .error-close {
          background: none;
          border: none;
          color: var(--color-error);
          padding: var(--spacing-1);
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .form-group {
          margin-bottom: var(--spacing-5);
        }

        .code-input-wrapper {
          display: flex;
          gap: var(--spacing-3);
        }

        .code-input-wrapper .ds-input-wrapper {
          flex: 1;
        }

        /* 忘记密码链接 */
        .forgot-password-link {
          text-align: right;
          margin-top: var(--spacing-2);
        }

        .forgot-link {
          font-size: var(--font-size-sm);
          color: var(--color-primary-500);
          background: none;
          border: none;
          cursor: pointer;
        }

        .other-login {
          margin-top: var(--spacing-6);
          text-align: center;
        }

        .other-text {
          font-size: var(--font-size-sm);
          color: var(--color-silver);
          display: block;
          margin-bottom: var(--spacing-4);
        }

        .social-buttons {
          display: flex;
          justify-content: center;
          gap: var(--spacing-4);
        }

        .social-btn {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: var(--spacing-2);
          padding: var(--spacing-4);
          background: var(--color-card);
          border-radius: var(--radius-lg);
          min-width: 100px;
          box-shadow: var(--shadow-card);
          transition: all var(--duration-normal) var(--ease-out);
          border: 2px solid transparent;
        }

        .social-btn:active {
          transform: scale(0.96);
          box-shadow: var(--shadow-sm);
        }

        .social-btn.wechat:hover {
          border-color: #07C160;
        }

        .social-btn.alipay:hover {
          border-color: #1677FF;
        }

        .social-icon-wrapper {
          width: 40px;
          height: 40px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .social-icon-wrapper.wechat {
          background: linear-gradient(135deg, #07C160 0%, #09BB07 100%);
        }

        .social-icon-wrapper.alipay {
          background: linear-gradient(135deg, #1677FF 0%, #0D47A1 100%);
        }

        .social-icon {
          font-size: 24px;
          color: white;
        }

        .social-label {
          font-size: var(--font-size-xs);
          color: var(--color-graphite);
          font-weight: var(--font-weight-medium);
        }

        .register-link {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: var(--spacing-2);
          margin-top: var(--spacing-8);
          font-size: var(--font-size-base);
          color: var(--color-graphite);
        }

        .register-btn {
          color: var(--color-primary-500);
          font-weight: var(--font-weight-semibold);
          font-size: var(--font-size-base);
        }

        .legal-links {
          display: flex;
          align-items: center;
          justify-content: center;
          flex-wrap: wrap;
          gap: var(--spacing-1);
          margin-top: var(--spacing-4);
          font-size: 12px;
          color: var(--color-silver);
        }

        .legal-link {
          color: var(--color-primary-500);
          background: none;
          border: none;
          padding: 0;
          font-size: 12px;
          cursor: pointer;
        }

        .legal-link:hover {
          text-decoration: underline;
        }

        /* 弹窗样式 */
        .modal-overlay {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0, 0, 0, 0.5);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 1000;
        }

        .forgot-password-modal {
          background: var(--color-card);
          border-radius: var(--radius-xl);
          padding: var(--spacing-6);
          width: 85%;
          max-width: 320px;
