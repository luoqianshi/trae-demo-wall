<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>药音通 - 首页总览</title>
  <link rel="stylesheet" href="css/offline.css">
  <style>
    /* 首页专属样式 */
    .logo-area {
      text-align: center;
      padding: var(--space-6) 0 var(--space-4);
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: var(--color-primary);
      border-radius: var(--radius-xl);
      margin-bottom: var(--space-3);
      box-shadow: 0 6px 20px rgba(54, 107, 158, 0.3);
    }
    .logo-icon svg {
      width: 44px;
      height: 44px;
      color: #FFFFFF;
    }
    .logo-title {
      font-size: var(--fs-3xl);
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: var(--space-1);
    }
    .logo-subtitle {
      font-size: var(--fs-sm);
      color: var(--text-sub);
    }
    .network-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-5);
      font-size: var(--fs-sm);
    }
    .network-bar.online {
      background: rgba(90, 158, 123, 0.12);
      color: var(--color-secondary);
    }
    .network-bar.offline {
      background: rgba(212, 160, 23, 0.12);
      color: var(--color-warning);
    }
    .network-bar svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .tutorial-section {
      margin-bottom: var(--space-5);
    }
    .tutorial-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-5);
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tutorial-header:active {
      transform: scale(0.98);
    }
    .tutorial-header-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .tutorial-header-left svg {
      width: 32px;
      height: 32px;
      color: var(--color-primary);
    }
    .tutorial-header-left span {
      font-size: var(--fs-lg);
      font-weight: 700;
    }
    .tutorial-header .toggle-icon {
      width: 32px;
      height: 32px;
      color: var(--text-sub);
      transition: transform 0.3s ease;
    }
    .tutorial-header .toggle-icon.expanded {
      transform: rotate(180deg);
    }
    .tutorial-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s ease;
    }
    .tutorial-body.open {
      max-height: 800px;
    }
    .tutorial-steps {
      padding: var(--space-4) var(--space-5);
      background: var(--bg-card);
      border-top: 2px solid var(--border-card);
    }
    .tutorial-step {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .tutorial-step:last-child {
      margin-bottom: 0;
    }
    .tutorial-step-num {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--fs-lg);
      flex-shrink: 0;
    }
    .tutorial-step-content {
      flex: 1;
      padding-top: var(--space-1);
    }
    .tutorial-step-title {
      font-size: var(--fs-base);
      font-weight: 700;
      margin-bottom: var(--space-1);
    }
    .tutorial-step-desc {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      line-height: 1.6;
    }
    .func-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    @media (min-width: 640px) {
      .func-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    .func-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-6) var(--space-4);
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: var(--text-main);
      min-height: 200px;
    }
    .func-card:active {
      transform: scale(0.96);
      box-shadow: var(--shadow-medium);
    }
    .func-card svg {
      width: 56px;
      height: 56px;
      margin-bottom: var(--space-3);
    }
    .func-card-title {
      font-size: var(--fs-xl);
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .func-card-desc {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      text-align: center;
    }
    .func-card.scan svg { color: var(--color-primary); }
    .func-card.analysis svg { color: var(--color-secondary); }
    .func-card.voice svg { color: var(--color-danger); }
    .footer-note {
      text-align: center;
      font-size: var(--fs-xs);
      color: var(--text-sub);
      padding: var(--space-4) 0;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="page-container">

    <!-- LOGO区域 -->
    <div class="logo-area">
      <div class="logo-icon">
        <!-- 心形+药丸组合图标 -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          <path d="M10.5 20.5l10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z" transform="translate(1,-2) scale(0.55) translate(5,5)" fill="currentColor" stroke="none" opacity="0.3"/>
        </svg>
      </div>
      <div class="logo-title">药音通</div>
      <div class="logo-subtitle">多方言适老化老年用药助手</div>
    </div>

    <!-- 联网/离线状态提示条 -->
    <div id="networkBar" class="network-bar online">
      <span id="networkIcon"></span>
      <span id="networkText">网络已连接</span>
    </div>

    <!-- 可折叠新手教程 -->
    <div class="tutorial-section">
      <div class="tutorial-header" id="tutorialToggle">
        <div class="tutorial-header-left">
          <span id="tutorialIcon"></span>
          <span>新手使用教程</span>
        </div>
        <span class="toggle-icon" id="toggleIcon"></span>
      </div>
      <div class="tutorial-body" id="tutorialBody">
        <div class="tutorial-steps">
          <div class="tutorial-step">
            <div class="tutorial-step-num">1</div>
            <div class="tutorial-step-content">
              <div class="tutorial-step-title">拍照识药</div>
              <div class="tutorial-step-desc">对准药盒拍一张照片，系统自动帮您认出是什么药</div>
            </div>
          </div>
          <div class="tutorial-step">
            <div class="tutorial-step-num">2</div>
            <div class="tutorial-step-content">
              <div class="tutorial-step-title">查看说明</div>
              <div class="tutorial-step-desc">用大白话告诉您这药是干啥的、怎么吃、吃多少</div>
            </div>
          </div>
          <div class="tutorial-step">
            <div class="tutorial-step-num">3</div>
            <div class="tutorial-step-content">
              <div class="tutorial-step-title">方言播报</div>
              <div class="tutorial-step-desc">用您的家乡话读给您听，听着亲切又明白</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 三大核心功能快捷入口 -->
    <div class="func-grid">
      <a href="scan.html" class="func-card scan">
        <span id="funcScanIcon"></span>
        <div class="func-card-title">拍照识药</div>
        <div class="func-card-desc">拍张照片<br>自动识别药品</div>
      </a>
      <a href="analysis.html" class="func-card analysis">
        <span id="funcAnalysisIcon"></span>
        <div class="func-card-title">药品解析</div>
        <div class="func-card-desc">看懂说明书<br>了解怎么用药</div>
      </a>
      <a href="voice-read.html" class="func-card voice">
        <span id="funcVoiceIcon"></span>
        <div class="func-card-title">方言朗读</div>
        <div class="func-card-desc">家乡话读给您听<br>亲切又明白</div>
      </a>
    </div>

    <!-- 底部公益说明 -->
    <div class="footer-note">
      药音通是一款面向老年朋友的公益用药辅助工具<br>
      仅供日常参考，不能替代医生的专业诊断和处方<br>
      用药有疑问请及时咨询医生或药师
    </div>

  </div>

  <script src="js/common.js"></script>
  <script>
    (function() {
      // 插入图标
      var iconSize = 'width:28px;height:28px;';
      var iconSizeLg = 'width:32px;height:32px;';

      // 网络状态图标
      var networkBar = document.getElementById('networkBar');
      var networkIcon = document.getElementById('networkIcon');
      var networkText = document.getElementById('networkText');

      function updateNetwork() {
        var online = navigator.onLine;
        if (online) {
          networkBar.className = 'network-bar online';
          networkIcon.innerHTML = YT_ICONS.wifi;
          networkIcon.querySelector('svg').style.cssText = iconSize;
          networkText.textContent = '网络已连接，功能可正常使用';
        } else {
          networkBar.className = 'network-bar offline';
          networkIcon.innerHTML = YT_ICONS.wifiOff;
          networkIcon.querySelector('svg').style.cssText = iconSize;
          networkText.textContent = '当前离线，核心功能仍可使用';
        }
      }
      updateNetwork();
      window.addEventListener('online', updateNetwork);
      window.addEventListener('offline', updateNetwork);

      // 教程图标
      var tutorialIconEl = document.getElementById('tutorialIcon');
      tutorialIconEl.innerHTML = YT_ICONS.book;
      tutorialIconEl.querySelector('svg').style.cssText = iconSizeLg;

      // 折叠/展开教程
      var toggleIcon = document.getElementById('toggleIcon');
      toggleIcon.innerHTML = YT_ICONS.chevronDown;
      toggleIcon.querySelector('svg').style.cssText = 'width:28px;height:28px;';

      var tutorialToggle = document.getElementById('tutorialToggle');
      var tutorialBody = document.getElementById('tutorialBody');
      var isOpen = false;

      tutorialToggle.addEventListener('click', function() {
        isOpen = !isOpen;
        if (isOpen) {
          tutorialBody.classList.add('open');
          toggleIcon.innerHTML = YT_ICONS.chevronUp;
        } else {
          tutorialBody.classList.remove('open');
          toggleIcon.innerHTML = YT_ICONS.chevronDown;
        }
        toggleIcon.querySelector('svg').style.cssText = 'width:28px;height:28px;';
      });

      // 功能卡片图标
      var funcScanIcon = document.getElementById('funcScanIcon');
      funcScanIcon.innerHTML = YT_ICONS.camera;
      funcScanIcon.querySelector('svg').style.cssText = 'width:56px;height:56px;';

      var funcAnalysisIcon = document.getElementById('funcAnalysisIcon');
      funcAnalysisIcon.innerHTML = YT_ICONS.pill;
      funcAnalysisIcon.querySelector('svg').style.cssText = 'width:56px;height:56px;';

      var funcVoiceIcon = document.getElementById('funcVoiceIcon');
      funcVoiceIcon.innerHTML = YT_ICONS.mic;
      funcVoiceIcon.querySelector('svg').style.cssText = 'width:56px;height:56px;';
    })();
  </script>
</body>
</html>
