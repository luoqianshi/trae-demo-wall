<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>药音通 - 子女监护</title>
  <link rel="stylesheet" href="css/offline.css">
  <style>
    .page-title {
      font-size: var(--fs-2xl);
      font-weight: 700;
      text-align: center;
      margin-bottom: var(--space-4);
      color: var(--text-main);
    }
    .page-title svg {
      width: 40px;
      height: 40px;
      vertical-align: middle;
      margin-right: var(--space-2);
      color: var(--color-primary);
    }
    .desc-card {
      background: rgba(54, 107, 158, 0.06);
      border: 2px solid rgba(54, 107, 158, 0.15);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-5);
      font-size: var(--fs-sm);
      color: var(--color-primary);
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      line-height: 1.6;
    }
    .desc-card svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    /* 统计概览 */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .overview-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      text-align: center;
      box-shadow: var(--shadow-soft);
    }
    .overview-card .ov-num {
      font-size: var(--fs-2xl);
      font-weight: 700;
      line-height: 1.2;
    }
    .overview-card .ov-label {
      font-size: var(--fs-xs);
      color: var(--text-sub);
      margin-top: var(--space-1);
    }
    .ov-total .ov-num { color: var(--color-primary); }
    .ov-taken .ov-num { color: var(--color-secondary); }
    .ov-missed .ov-num { color: var(--color-danger); }
    .ov-rate .ov-num { color: var(--color-warning); }
    /* 预警卡片 */
    .alert-card {
      background: rgba(194, 48, 48, 0.06);
      border: 2px solid rgba(194, 48, 48, 0.2);
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-5);
      margin-bottom: var(--space-4);
    }
    .alert-card-title {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--color-danger);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }
    .alert-card-title svg {
      width: 28px;
      height: 28px;
    }
    .alert-card-item {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-2);
      font-size: var(--fs-sm);
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .alert-card-item svg {
      width: 22px;
      height: 22px;
      color: var(--color-danger);
      flex-shrink: 0;
    }
    .no-alert {
      font-size: var(--fs-sm);
      color: var(--color-secondary);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .no-alert svg {
      width: 22px;
      height: 22px;
    }
    /* 漏服列表 */
    .missed-item {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-2);
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .missed-item .missed-date {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      flex-shrink: 0;
      min-width: 100px;
    }
    .missed-item .missed-drug {
      font-size: var(--fs-base);
      font-weight: 500;
      color: var(--text-main);
      flex: 1;
    }
    .missed-item .missed-time {
      font-size: var(--fs-sm);
      color: var(--color-danger);
      flex-shrink: 0;
    }
    /* 健康趋势 */
    .trend-section {
      margin-bottom: var(--space-4);
    }
    .trend-title {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .trend-title svg {
      width: 28px;
      height: 28px;
      color: var(--color-primary);
    }
    .trend-item {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-soft);
    }
    .trend-item .trend-date {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      min-width: 80px;
    }
    .trend-item .trend-value {
      font-size: var(--fs-base);
      font-weight: 500;
      color: var(--text-main);
    }
    .trend-item .trend-value.bp { color: var(--color-primary); }
    .trend-item .trend-value.bs { color: var(--color-secondary); }
    .trend-empty {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      text-align: center;
      padding: var(--space-3);
    }
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--space-6) var(--space-4);
      color: var(--text-sub);
    }
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: var(--space-4);
      opacity: 0.4;
    }
    .empty-state p {
      font-size: var(--fs-lg);
      margin-bottom: var(--space-3);
    }
    .section-title {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .section-title svg {
      width: 28px;
      height: 28px;
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  <div class="page-container">
    <!-- 页面标题 -->
    <div class="page-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      子女监护
    </div>

    <!-- 说明卡片 -->
    <div class="desc-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span>本功能在同一设备上查看老人用药健康数据，方便子女了解老人的服药情况和健康状况。</span>
    </div>

    <!-- 30天用药统计概览 -->
    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      近30天用药统计
    </div>
    <div class="overview-grid" id="overviewGrid">
      <div class="overview-card ov-total">
        <div class="ov-num" id="ovTotal">0</div>
        <div class="ov-label">应服药次数</div>
      </div>
      <div class="overview-card ov-taken">
        <div class="ov-num" id="ovTaken">0</div>
        <div class="ov-label">实际服药次数</div>
      </div>
      <div class="overview-card ov-missed">
        <div class="ov-num" id="ovMissed">0</div>
        <div class="ov-label">漏服次数</div>
      </div>
      <div class="overview-card ov-rate">
        <div class="ov-num" id="ovRate">0%</div>
        <div class="ov-label">服药率</div>
      </div>
    </div>

    <!-- 用药异常预警 -->
    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      用药异常预警
    </div>
    <div class="alert-card" id="alertCard">
      <div class="alert-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        预警信息
      </div>
      <div id="alertContent"></div>
    </div>

    <!-- 漏服记录 -->
    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      漏服记录
    </div>
    <div id="missedList"></div>

    <!-- 健康数据趋势 -->
    <div class="trend-section">
      <div class="trend-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        近7天健康数据
      </div>

      <div class="section-title" style="font-size:var(--fs-base);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        血压记录
      </div>
      <div id="bpTrend"></div>

      <div class="section-title mt-4" style="font-size:var(--fs-base);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
        血糖记录
      </div>
      <div id="bsTrend"></div>
    </div>

    <!-- 远程新增提醒按钮 -->
    <button class="yt-btn yt-btn-primary yt-btn-block mt-4" onclick="goToAddReminder()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:32px;height:32px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      帮老人添加服药提醒
    </button>
  </div>

  <script src="js/common.js"></script>
  <script>
    // HTML转义
    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // 获取数据
    function getRecords() { return Storage.get('records', []); }
    function getReminders() { return Storage.get('reminders', []); }

    // 计算30天统计
    function calc30DayStats() {
      var records = getRecords();
      var reminders = getReminders();
      var now = new Date();

      var totalExpected = 0;
      var totalTaken = 0;

      for (var d = 0; d < 30; d++) {
        var checkDate = new Date(now);
        checkDate.setDate(now.getDate() - d);
        if (checkDate > now) break;

        var dateStr = checkDate.getFullYear() + '-' + String(checkDate.getMonth() + 1).padStart(2, '0') + '-' + String(checkDate.getDate()).padStart(2, '0');

        reminders.forEach(function(rem) {
          if (!rem.enabled) return;
          totalExpected++;
          var hasRecord = records.some(function(rec) {
            return rec.date === dateStr && rec.drugName === rem.name && rec.time === rem.time;
          });
          if (hasRecord) totalTaken++;
        });
      }

      var missed = totalExpected - totalTaken;
      var rate = totalExpected > 0 ? Math.round((totalTaken / totalExpected) * 100) : 0;

      return { total: totalExpected, taken: totalTaken, missed: missed, rate: rate };
    }

    // 检测用药异常（连续漏服3天以上）
    function checkAnomalies() {
      var records = getRecords();
      var reminders = getReminders();
      var now = new Date();
      var anomalies = [];

      reminders.forEach(function(rem) {
        if (!rem.enabled) return;
        var consecutiveMissed = 0;

        for (var d = 0; d < 30; d++) {
          var checkDate = new Date(now);
          checkDate.setDate(now.getDate() - d);
          if (checkDate > now) break;

          var dateStr = checkDate.getFullYear() + '-' + String(checkDate.getMonth() + 1).padStart(2, '0') + '-' + String(checkDate.getDate()).padStart(2, '0');

          var hasRecord = records.some(function(rec) {
            return rec.date === dateStr && rec.drugName === rem.name && rec.time === rem.time;
          });

          if (hasRecord) {
            break;
          } else {
            consecutiveMissed++;
          }
        }

        if (consecutiveMissed >= 3) {
          anomalies.push({
            drugName: rem.name,
            days: consecutiveMissed,
            time: rem.time
          });
        }
      });

      return anomalies;
    }

    // 获取漏服记录（最近7天）
    function getMissedRecords() {
      var records = getRecords();
      var reminders = getReminders();
      var now = new Date();
      var missed = [];

      for (var d = 0; d < 7; d++) {
        var checkDate = new Date(now);
        checkDate.setDate(now.getDate() - d);
        if (checkDate > now) break;

        var dateStr = checkDate.getFullYear() + '-' + String(checkDate.getMonth() + 1).padStart(2, '0') + '-' + String(checkDate.getDate()).padStart(2, '0');

        reminders.forEach(function(rem) {
          if (!rem.enabled) return;
          var hasRecord = records.some(function(rec) {
            return rec.date === dateStr && rec.drugName === rem.name && rec.time === rem.time;
          });
          if (!hasRecord) {
            missed.push({
              date: dateStr,
              drugName: rem.name,
              time: rem.time
            });
          }
        });
      }

      return missed;
    }

    // 获取近7天健康数据
    function getHealthTrend() {
      var records = getRecords();
      var now = new Date();
      var bpData = [];
      var bsData = [];

      for (var d = 6; d >= 0; d--) {
        var checkDate = new Date(now);
        checkDate.setDate(now.getDate() - d);
        var dateStr = checkDate.getFullYear() + '-' + String(checkDate.getMonth() + 1).padStart(2, '0') + '-' + String(checkDate.getDate()).padStart(2, '0');
        var label = (checkDate.getMonth() + 1) + '/' + checkDate.getDate();

        var dayRecords = records.filter(function(r) { return r.date === dateStr; });

        // 取当天最后一次血压记录
        var bpRecord = null;
        for (var i = dayRecords.length - 1; i >= 0; i--) {
          if (dayRecords[i].bp) {
            bpRecord = dayRecords[i].bp;
            break;
          }
        }
        if (bpRecord) bpData.push({ date: label, value: bpRecord });

        // 取当天最后一次血糖记录
        var bsRecord = null;
        for (var j = dayRecords.length - 1; j >= 0; j--) {
          if (dayRecords[j].bs) {
            bsRecord = dayRecords[j].bs;
            break;
          }
        }
        if (bsRecord) bsData.push({ date: label, value: bsRecord });
      }

      return { bp: bpData, bs: bsData };
    }

    // 更新统计概览
    function updateOverview() {
      var stats = calc30DayStats();
      document.getElementById('ovTotal').textContent = stats.total;
      document.getElementById('ovTaken').textContent = stats.taken;
      document.getElementById('ovMissed').textContent = stats.missed;
      document.getElementById('ovRate').textContent = stats.rate + '%';
    }

    // 更新预警
    function updateAlerts() {
      var anomalies = checkAnomalies();
      var container = document.getElementById('alertContent');

      if (anomalies.length === 0) {
        container.innerHTML = '<div class="no-alert"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>目前没有异常，老人服药情况良好</div>';
        return;
      }

      var html = '';
      anomalies.forEach(function(a) {
        html += '<div class="alert-card-item">';
        html += '  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
        html += '  <span><strong>' + escapeHtml(a.drugName) + '</strong> 已连续漏服 <strong>' + a.days + '</strong> 天，请及时关注</span>';
        html += '</div>';
      });
      container.innerHTML = html;
    }

    // 更新漏服列表
    function updateMissedList() {
      var missed = getMissedRecords();
      var container = document.getElementById('missedList');

      if (missed.length === 0) {
        container.innerHTML = '<div class="trend-empty">近7天没有漏服记录，老人很棒！</div>';
        return;
      }

      var html = '';
      missed.forEach(function(m) {
        var dateLabel = m.date === getTodayStr() ? '今天' : formatDate(m.date);
        html += '<div class="missed-item">';
        html += '  <span class="missed-date">' + dateLabel + '</span>';
        html += '  <span class="missed-drug">' + escapeHtml(m.drugName) + '</span>';
        html += '  <span class="missed-time">' + escapeHtml(m.time) + '</span>';
        html += '</div>';
      });
      container.innerHTML = html;
    }

    // 更新健康趋势
    function updateHealthTrend() {
      var trend = getHealthTrend();

      // 血压趋势
      var bpContainer = document.getElementById('bpTrend');
      if (trend.bp.length === 0) {
        bpContainer.innerHTML = '<div class="trend-empty">暂无血压数据</div>';
      } else {
        var bpHtml = '';
        trend.bp.forEach(function(item) {
          bpHtml += '<div class="trend-item">';
          bpHtml += '  <span class="trend-date">' + item.date + '</span>';
          bpHtml += '  <span class="trend-value bp">' + escapeHtml(item.value) + ' mmHg</span>';
          bpHtml += '</div>';
        });
        bpContainer.innerHTML = bpHtml;
      }

      // 血糖趋势
      var bsContainer = document.getElementById('bsTrend');
      if (trend.bs.length === 0) {
        bsContainer.innerHTML = '<div class="trend-empty">暂无血糖数据</div>';
      } else {
        var bsHtml = '';
        trend.bs.forEach(function(item) {
          bsHtml += '<div class="trend-item">';
          bsHtml += '  <span class="trend-date">' + item.date + '</span>';
          bsHtml += '  <span class="trend-value bs">' + escapeHtml(item.value) + ' mmol/L</span>';
          bsHtml += '</div>';
        });
        bsContainer.innerHTML = bsHtml;
      }
    }

    // 跳转到提醒页面添加
    function goToAddReminder() {
      window.location.href = 'remind.html';
    }

    // 页面初始化
    document.addEventListener('DOMContentLoaded', function() {
      updateOverview();
      updateAlerts();
      updateMissedList();
      updateHealthTrend();
    });
  </script>
</body>
</html>
