<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptCraft 智提示 - AI提示词转换器</title>
    <meta name="description" content="将普通话语智能转换为专业AI提示词，支持绘画、写作、编程、对话、分析、视频等多种场景">
    <meta name="keywords" content="AI提示词,提示词生成器,Prompt工程,Midjourney提示词,ChatGPT提示词">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">PromptCraft</h1>
            <p class="tagline">智提示 - AI提示词转换器</p>
            <span class="subtitle">✨ 将普通话语转换为专业AI提示词 <span class="demo-badge">DEMO</span></span>
        </header>

        <div class="main-card">
            <div class="scene-selector">
                <p class="section-title">🎯 选择AI场景</p>
                <div class="scene-grid">
                    <button class="scene-btn active" data-scene="绘画">
                        <span class="scene-icon">🎨</span>
                        <span class="scene-name">绘画</span>
                    </button>
                    <button class="scene-btn" data-scene="写作">
                        <span class="scene-icon">✍️</span>
                        <span class="scene-name">写作</span>
                    </button>
                    <button class="scene-btn" data-scene="编程">
                        <span class="scene-icon">💻</span>
                        <span class="scene-name">编程</span>
                    </button>
                    <button class="scene-btn" data-scene="对话">
                        <span class="scene-icon">💬</span>
                        <span class="scene-name">对话</span>
                    </button>
                    <button class="scene-btn" data-scene="分析">
                        <span class="scene-icon">📊</span>
                        <span class="scene-name">分析</span>
                    </button>
                    <button class="scene-btn" data-scene="视频">
                        <span class="scene-icon">🎬</span>
                        <span class="scene-name">视频</span>
                    </button>
                </div>
            </div>

            <div class="input-section">
                <p class="section-title">💬 输入你的想法</p>
                <div class="input-wrapper">
                    <textarea
                        class="input-box"
                        id="userInput"
                        placeholder="例如：画一只穿着宇航服的可爱猫咪，在太空站里看着地球"
                        maxlength="500"
                    ></textarea>
                    <span class="char-count"><span id="charCount">0</span>/500</span>
                </div>
                <div class="quick-examples">
                    <span class="example-tag" data-example='{"text":"画一只太空猫","scene":"绘画"}'>画一只太空猫</span>
                    <span class="example-tag" data-example='{"text":"写一篇科技文章","scene":"写作"}'>写一篇科技文章</span>
                    <span class="example-tag" data-example='{"text":"写个Python爬虫","scene":"编程"}'>写个Python爬虫</span>
                    <span class="example-tag" data-example='{"text":"解释量子计算","scene":"对话"}'>解释量子计算</span>
                    <span class="example-tag" data-example='{"text":"分析市场趋势","scene":"分析"}'>分析市场趋势</span>
                    <span class="example-tag" data-example='{"text":"做个视频脚本","scene":"视频"}'>做个视频脚本</span>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn">
                🚀 生成提示词
            </button>

            <div class="output-section" id="outputSection">
                <div class="output-header">
                    <p class="section-title">✨ 生成的提示词</p>
                    <div class="output-actions">
                        <button class="copy-btn" id="copyBtn">
                            <span id="copyText">📋 复制</span>
                        </button>
                        <button class="regenerate-btn" id="regenerateBtn">
                            🔄 重新生成
                        </button>
                    </div>
                </div>
                <div class="output-box">
                    <span class="output-prompt" id="outputPrompt"></span>
                </div>
            </div>
        </div>

        <div class="feature-cards">
            <div class="feature-card">
                <div class="feature-icon">🎨</div>
                <div class="feature-title">多场景支持</div>
                <div class="feature-desc">覆盖绘画、写作、编程等6大AI场景，满足各种创作需求</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🚀</div>
                <div class="feature-title">智能转换</div>
                <div class="feature-desc">自动将自然语言转换为专业提示词，提升AI创作质量</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">💾</div>
                <div class="feature-title">历史记录</div>
                <div class="feature-desc">本地保存转换历史，一键复用之前的优秀提示词</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📱</div>
                <div class="feature-title">响应式设计</div>
                <div class="feature-desc">完美适配桌面端和移动端，随时随地高效创作</div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <p class="section-title">📜 转换历史</p>
                <button class="clear-btn" id="clearBtn">清空历史</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-history">
                    <div class="empty-history-icon">📝</div>
                    <p>暂无历史记录</p>
                    <p style="font-size: 0.85rem; margin-top: 8px; opacity: 0.7;">尝试生成一些提示词吧！</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">提示信息</div>

    <script src="js/app.js"></script>
</body>
</html>
