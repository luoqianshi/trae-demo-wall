<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLab 实验报告助手 - 独立版</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.5.0/dist/index.css">
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.5.0/dist/index.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            background: linear-gradient(135deg, #409eff 0%, #66b1ff 100%);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }
        .header-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 28px;
            color: white;
        }
        .title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .left-panel {
            width: 480px;
            background: white;
            border-right: 1px solid #e4e7ed;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .panel-content {
            padding: 20px;
        }
        .section-card {
            margin-bottom: 16px;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #303133;
        }
        .form-item {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            color: #606266;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .upload-area {
            width: 100%;
        }
        .code-preview {
            margin-top: 16px;
            background: #f5f7fa;
            border-radius: 6px;
            overflow: hidden;
        }
        .code-header {
            background: #e4e7ed;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .code-title {
            color: #606266;
            font-weight: 500;
        }
        .code-preview pre {
            margin: 0;
            padding: 12px;
            overflow-x: auto;
            max-height: 200px;
            overflow-y: auto;
        }
        .code-preview code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            color: #303133;
        }
        .action-buttons {
            margin-top: 8px;
        }
        .generate-btn {
            width: 100%;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .export-buttons {
            display: flex;
            gap: 12px;
        }
        .export-buttons .el-button {
            flex: 1;
        }
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
            overflow: hidden;
        }
        .panel-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid #e4e7ed;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #303133;
        }
        .preview-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #909399;
        }
        .empty-icon {
            margin-bottom: 16px;
            color: #c0c4cc;
        }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 24px;
        }
        .loading-icon {
            color: #409eff;
            animation: rotate 1.5s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .loading-text h3 {
            margin: 0 0 8px 0;
            color: #303133;
        }
        .loading-text p {
            margin: 0;
            color: #909399;
        }
        .report-preview {
            background: white;
            padding: 48px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
        }
        .report-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: #303133;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid #409eff;
        }
        .report-section {
            margin-bottom: 28px;
        }
        .report-section h2 {
            font-size: 18px;
            color: #303133;
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 4px solid #409eff;
        }
        .report-section :deep(p) {
            line-height: 1.8;
            color: #606266;
            margin-bottom: 12px;
        }
        .report-section :deep(ul),
        .report-section :deep(ol) {
            padding-left: 24px;
            margin-bottom: 12px;
        }
        .report-section :deep(li) {
            line-height: 1.8;
            color: #606266;
            margin-bottom: 6px;
        }
        .report-section :deep(pre) {
            background: #f5f7fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .report-section :deep(code) {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }
        .report-section :deep(h3) {
            font-size: 15px;
            color: #409eff;
            margin: 16px 0 10px 0;
        }
        .report-section :deep(h4) {
            font-size: 14px;
            color: #303133;
            margin: 12px 0 8px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <header class="app-header">
                <div class="header-content">
                    <el-icon class="logo-icon"><document /></el-icon>
                    <h1 class="title">CodeLab 实验报告助手 - 独立版</h1>
                </div>
            </header>
            <div class="main-content">
                <div class="left-panel">
                    <div class="panel-content">
                        <el-card class="section-card" shadow="never">
                            <template #header>
                                <div class="card-header">
                                    <el-icon><edit /></el-icon>
                                    <span>实验信息</span>
                                </div>
                            </template>
                            <div class="form-item">
                                <label class="form-label">实验题目</label>
                                <el-input 
                                    v-model="experimentTitle" 
                                    placeholder="请输入实验题目，如：实验七 查找算法"
                                    :rows="2"
                                    type="textarea"
                                    clearable
                                />
                            </div>
                            <div class="form-item">
                                <label class="form-label">实验指导书</label>
                                <el-input 
                                    v-model="experimentContent" 
                                    placeholder="请粘贴实验指导书文本内容..."
                                    :rows="6"
                                    type="textarea"
                                />
                            </div>
                        </el-card>

                        <el-card class="section-card" shadow="never">
                            <template #header>
                                <div class="card-header">
                                    <el-icon><upload /></el-icon>
                                    <span>代码上传</span>
                                </div>
                            </template>
                            <div class="form-item">
                                <label class="form-label">文件编码</label>
                                <el-select v-model="fileEncoding" style="width: 100%">
                                    <el-option label="UTF-8 (推荐)" value="utf-8" />
                                    <el-option label="GBK" value="gbk" />
                                    <el-option label="GB2312" value="gb2312" />
                                    <el-option label="自动检测" value="auto" />
                                </el-select>
                            </div>
                            <el-upload
                                class="upload-area"
                                drag
                                :auto-upload="false"
                                :on-change="handleFileChange"
                                :show-file-list="true"
                                accept=".c,.cpp,.py"
                            >
                                <el-icon class="el-icon--upload"><upload-filled /></el-icon>
                                <div class="el-upload__text">
                                    将文件拖到此处，或 <em>点击上传</em>
                                </div>
                                <template #tip>
                                    <div class="el-upload__tip">
                                        支持 C/C++/Python 源码文件
                                    </div>
                                </template>
                            </el-upload>
                            <div class="code-preview" v-if="codeContent">
                                <div class="code-header">
                                    <span class="code-title">{{ uploadedFileName }}</span>
                                    <el-button link type="danger" @click="clearCode">移除</el-button>
                                </div>
                                <pre><code>{{ codeContent }}</code></pre>
                            </div>
                        </el-card>

                        <el-card class="section-card" shadow="never">
                            <template #header>
                                <div class="card-header">
                                    <el-icon><setting /></el-icon>
                                    <span>模板设置</span>
                                </div>
                            </template>
                            <div class="form-item">
                                <label class="form-label">报告模板</label>
                                <el-select v-model="selectedTemplate" placeholder="请选择模板">
                                    <el-option label="高校通用标准模板" value="university_standard" />
                                    <el-option label="精简版模板" value="simple" />
                                    <el-option label="详细版模板" value="detailed" />
                                </el-select>
                            </div>
                        </el-card>

                        <div class="action-buttons">
                            <el-button 
                                type="primary" 
                                size="large" 
                                :loading="isGenerating"
                                :icon="isGenerating ? '' : magicStick"
                                @click="generateReport"
                                class="generate-btn"
                            >
                                {{ isGenerating ? '正在生成...' : '一键生成报告' }}
                            </el-button>
                            <div class="export-buttons">
                                <el-button 
                                    size="large" 
                                    :icon="download"
                                    :disabled="!reportData"
                                    @click="exportReport('docx')"
                                >
                                    导出 Word
                                </el-button>
                                <el-button 
                                    size="large" 
                                    :icon="document"
                                    :disabled="!reportData"
                                    @click="exportReport('pdf')"
                                >
                                    导出 PDF
                                </el-button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="right-panel">
                    <div class="panel-header">
                        <span class="panel-title">报告预览</span>
                        <el-tag v-if="reportData" type="success">已生成</el-tag>
                    </div>
                    <div class="preview-content">
                        <div v-if="isGenerating" class="loading-container">
                            <div class="loading-spinner">
                                <el-icon :size="60" class="loading-icon"><loading /></el-icon>
                            </div>
                            <div class="loading-text">
                                <h3>正在智能生成报告...</h3>
                                <p>{{ progressText }}</p>
                            </div>
                            <el-progress :percentage="progress" :stroke-width="8" />
                        </div>
                        <div v-else-if="reportData" class="report-preview">
                            <div class="report-title">{{ reportData.title || '实验报告' }}</div>
                            <div class="report-section">
                                <h2>一、实验目的</h2>
                                <div v-html="renderMarkdown(reportData.purpose)"></div>
                            </div>
                            <div class="report-section">
                                <h2>二、实验原理</h2>
                                <div v-html="renderMarkdown(reportData.principle)"></div>
                            </div>
                            <div class="report-section">
                                <h2>三、实验步骤</h2>
                                <div v-html="renderMarkdown(reportData.steps)"></div>
                            </div>
                            <div v-if="reportData.code_analysis" class="report-section">
                                <h2>四、代码分析</h2>
                                <div v-html="renderMarkdown(reportData.code_analysis)"></div>
                            </div>
                            <div class="report-section">
                                <h2>五、实验总结</h2>
                                <div v-html="renderMarkdown(reportData.summary)"></div>
                            </div>
                        </div>
                        <div v-else class="empty-state">
                            <el-icon :size="80" class="empty-icon"><document /></el-icon>
                            <p>请在左侧输入实验信息并点击「一键生成报告」</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        const app = createApp({
            setup() {
                const experimentTitle = ref('');
                const experimentContent = ref('');
                const codeContent = ref('');
                const uploadedFileName = ref('');
                const selectedTemplate = ref('university_standard');
                const isGenerating = ref(false);
                const progress = ref(0);
                const progressText = ref('正在解析实验内容...');
                const reportData = ref(null);
                const fileEncoding = ref('utf-8');

                const renderMarkdown = (text) => {
                    if (!text) return '';
                    return marked.parse(text);
                };

                const handleFileChange = (file) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        codeContent.value = e.target.result;
                        uploadedFileName.value = file.name;
                        ElementPlus.ElMessage.success(`已加载文件: ${file.name}`);
                    };
                    reader.onerror = () => {
                        ElementPlus.ElMessage.error('文件读取失败，请尝试选择其他编码');
                    };
                    reader.readAsText(file.raw, 'utf-8');
                };

                const clearCode = () => {
                    codeContent.value = '';
                    uploadedFileName.value = '';
                };

                const generatePurpose = (title, content, code) => {
                    const points = [
                        `掌握${title || '本次实验'}的基本原理和实现方法`
                    ];
                    if (code) {
                        points.push('能够独立完成代码编写与调试');
                    }
                    points.push('理解相关算法的时间复杂度和空间复杂度');
                    points.push('培养独立思考和问题解决能力');
                    points.push('学会分析实验结果并总结收获');
                    return points.map((p, i) => `${i + 1}. ${p}`).join('\n');
                };

                const generatePrinciple = (title, content, code) => {
                    const principles = [];
                    principles.push(`### ${title || '实验'}原理概述`);
                    principles.push('');
                    principles.push('本次实验涉及的核心原理包括算法设计思路、数据结构选择和复杂度分析。');
                    principles.push('');
                    principles.push('#### 核心知识点');
                    principles.push('- 算法的基本思想与设计思路');
                    principles.push('- 数据结构的选择与应用');
                    principles.push('- 时间复杂度分析（O(n)、O(nlogn)等）');
                    principles.push('- 空间复杂度优化策略');
                    return principles.join('\n');
                };

                const generateSteps = (title, content, code) => {
                    const steps = [];
                    steps.push('### 步骤1：环境准备');
                    steps.push('- 配置开发环境（IDE、编译器等）');
                    steps.push('- 创建项目目录结构');
                    steps.push('');
                    steps.push('### 步骤2：代码实现');
                    steps.push('- 按照实验要求编写核心代码');
                    steps.push('- 添加必要的注释说明');
                    steps.push('');
                    steps.push('### 步骤3：编译运行');
                    steps.push('- 编译源代码');
                    steps.push('- 运行测试用例');
                    steps.push('');
                    steps.push('### 步骤4：结果验证');
                    steps.push('- 检查输出结果是否正确');
                    steps.push('- 记录实验数据');
                    return steps.join('\n');
                };

                const generateCodeAnalysis = (code) => {
                    if (!code) return '';
                    const analysis = [];
                    analysis.push('### 代码说明');
                    analysis.push('');
                    analysis.push('以下是源代码实现：');
                    analysis.push('');
                    analysis.push('```');
                    analysis.push(code);
                    analysis.push('```');
                    analysis.push('');
                    analysis.push('#### 算法分析');
                    analysis.push('- 代码结构清晰，模块化设计');
                    analysis.push('- 包含必要的输入输出处理');
                    analysis.push('- 具有良好的可读性和可维护性');
                    return analysis.join('\n');
                };

                const generateSummary = (title, content, code) => {
                    const parts = [];
                    parts.push(`通过本次${title || '实验'}，我深入理解了相关算法的原理和实现方法。`);
                    parts.push('');
                    if (code) {
                        parts.push('在实验过程中，我完成了代码的编写与调试，掌握了实际的编程技巧。通过不断地调试和优化，对算法的理解也更加深刻。');
                        parts.push('');
                    }
                    parts.push('实验过程中遇到了一些问题，但通过查阅资料和调试代码，最终都得到了解决。这不仅提高了我的编程能力，也增强了问题解决能力。');
                    parts.push('');
                    parts.push('总的来说，本次实验收获颇丰，既巩固了理论知识，又锻炼了实践能力。');
                    return parts.join('');
                };

                const generateReport = async () => {
                    if (!experimentTitle.value.trim()) {
                        ElementPlus.ElMessage.warning('请输入实验题目');
                        return;
                    }
                    if (!experimentContent.value.trim() && !codeContent.value) {
                        ElementPlus.ElMessage.warning('请输入实验指导书或上传代码');
                        return;
                    }

                    isGenerating.value = true;
                    progress.value = 0;
                    reportData.value = null;

                    const steps = [
                        { text: '正在解析实验内容...', percent: 25 },
                        { text: '正在生成实验目的与原理...', percent: 50 },
                        { text: '正在分析代码结构...', percent: 75 },
                        { text: '正在完善报告内容...', percent: 100 }
                    ];

                    for (const step of steps) {
                        await new Promise(resolve => setTimeout(resolve, 400));
                        progress.value = step.percent;
                        progressText.value = step.text;
                    }

                    await new Promise(resolve => setTimeout(resolve, 500));

                    reportData.value = {
                        title: experimentTitle.value,
                        purpose: generatePurpose(experimentTitle.value, experimentContent.value, codeContent.value),
                        principle: generatePrinciple(experimentTitle.value, experimentContent.value, codeContent.value),
                        steps: generateSteps(experimentTitle.value, experimentContent.value, codeContent.value),
                        code_analysis: generateCodeAnalysis(codeContent.value),
                        summary: generateSummary(experimentTitle.value, experimentContent.value, codeContent.value),
                        template: selectedTemplate.value
                    };

                    isGenerating.value = false;
                    ElementPlus.ElMessage.success('报告生成成功！');
                };

                const exportReport = (format) => {
                    if (!reportData.value) {
                        ElementPlus.ElMessage.warning('请先生成报告');
                        return;
                    }

                    ElementPlus.ElMessage.info(`正在生成${format.toUpperCase()}文件...`);

                    setTimeout(() => {
                        const reportContent = `
${reportData.value.title || '实验报告'}

一、实验目的
${reportData.value.purpose}

二、实验原理
${reportData.value.principle}

三、实验步骤
${reportData.value.steps}

${reportData.value.code_analysis ? '四、代码分析\n' + reportData.value.code_analysis + '\n' : ''}

五、实验总结
${reportData.value.summary}

---
生成时间: ${new Date().toLocaleString()}
CodeLab 实验报告助手 - 独立版
                        `.trim();

                        const blob = new Blob([reportContent], { 
                            type: format === 'docx' 
                                ? 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' 
                                : 'text/plain' 
                        });
                        
                        const url = window.URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        
                        const filename = `${(reportData.value.title || '实验报告').replace(/[\\/:*?"<>|]/g, '_')}_${new Date().getTime()}.${format === 'docx' ? 'docx' : 'txt'}`;
                        link.setAttribute('download', filename);
                        
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        window.URL.revokeObjectURL(url);
                        
                        ElementPlus.ElMessage.success(`${format.toUpperCase()}文件已导出！（注：独立版导出为文本格式）`);
                    }, 1000);
                };

                return {
                    experimentTitle,
                    experimentContent,
                    codeContent,
                    uploadedFileName,
                    selectedTemplate,
                    isGenerating,
                    progress,
                    progressText,
                    reportData,
                    fileEncoding,
                    renderMarkdown,
                    handleFileChange,
                    clearCode,
                    generateReport,
                    exportReport
                };
            }
        });

        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
