、最终实现共产主义的学说，是关于无产阶级解放、全人类解放和每个人自由而全面发展的学说，是无产阶级政党和社会主义国家的指导思想，是指引人民创造美好生活的行动指南。马克思主义包括马克思主义哲学、马克思主义政治经济学和科学社会主义三个基本组成部分，它们是有机统一并共同构成了马克思主义理论的主体内容。马克思主义产生于19世纪40年代，创始人是马克思和恩格斯。马克思主义的产生具有深刻的社会根源、阶级基础和思想渊源。马克思恩格斯批判地继承了德国古典哲学、英国古典政治经济学和英法空想社会主义的合理成分，创立了唯物史观和剩余价值学说，把社会主义由空想变为科学，实现了人类思想史上的伟大革命。"},position:{x:100,y:200}},{id:"ch2",name:"毛泽东思想和中国特色社会主义理论体系",level:1,parentId:null,children:["k4","k5"],frequency:"high",score:"high",difficulty:"easy",mastery:"average",description:'马克思主义中国化的理论成果，包括毛泽东思想、邓小平理论、"三个代表"重要思想、科学发展观和习近平新时代中国特色社会主义思想。',source:{document:"毛泽东思想和中国特色社会主义理论体系概论.pdf",page:8,paragraph:2,excerpt:'马克思主义中国化是将马克思主义基本原理同中国具体实际相结合、同中华优秀传统文化相结合，运用马克思主义的立场、观点、方法，研究和解决中国革命、建设、改革中的实际问题，总结和提炼中国革命、建设、改革的实践经验，从而认识和掌握客观规律，为马克思主义理论宝库增添新的内容，运用中国人民喜闻乐见的民族语言来阐述马克思主义理论，使之成为具有中国特色、中国风格、中国气派的马克思主义。中国共产党在领导中国革命、建设和改革的长期实践中，实现了马克思主义同中国实际相结合的两次历史性飞跃，产生了两大理论成果。第一次飞跃的理论成果是毛泽东思想，是被实践证明了的关于中国革命和建设的正确的理论原则和经验总结。第二次飞跃的理论成果是中国特色社会主义理论体系，包括邓小平理论、"三个代表"重要思想、科学发展观和习近平新时代中国特色社会主义思想，是马克思主义中国化最新成果。'},position:{x:400,y:150}},{id:"ch3",name:"中国近现代史纲要",level:1,parentId:null,children:["k6","k7"],frequency:"medium",score:"medium",difficulty:"easy",mastery:"weak",description:"主要讲述从鸦片战争到改革开放的中国近现代历史发展进程，总结历史经验。",source:{document:"中国近现代史纲要.pdf",page:5,paragraph:1,excerpt:"中国近现代史是指1840年以来中国的历史。其中从1840年鸦片战争爆发到1949年中华人民共和国成立前夕的历史，是中国的近代史；1949年中华人民共和国成立以来的历史，是中国的现代史。中国近现代史，就其主流和本质来说，是中国一代又一代的人民群众和仁人志士为救亡图存而英勇奋斗、艰苦探索的历史；是中国各族人民在中国共产党的领导下，进行伟大的艰苦的斗争，经过新民主主义革命，赢得民族独立和人民解放的历史；是中国各族人民在中国共产党的领导下，经过社会主义革命、建设和改革，把一个极度贫弱的旧中国逐步变成一个初步繁荣昌盛、充满生机和活力的社会主义新中国的历史。学习中国近现代史，要了解近代以来中国的国史国情，深刻领会历史和人民是怎样选择了马克思主义，选择了中国共产党，选择了社会主义道路，选择了改革开放。"},position:{x:700,y:200}},{id:"ch4",name:"思想道德与法治",level:1,parentId:null,children:["k8"],frequency:"medium",score:"low",difficulty:"easy",mastery:"unstudied",description:"涵盖思想修养、道德教育和法律基础知识，培养正确的世界观、人生观、价值观。",source:{document:"思想道德与法治.pdf",page:3,paragraph:1,excerpt:"思想道德与法治是一门融思想性、政治性、科学性、理论性、实践性于一体的思想政治理论课，旨在帮助大学生提升思想道德素质和法治素养，成长为自觉担当民族复兴大任的时代新人。学习本课程，有助于大学生领悟人生真谛、把握人生方向，追求远大理想、坚定崇高信念，继承优良传统、弘扬中国精神，广泛践行社会主义核心价值观；有助于大学生遵守道德规范、锤炼道德品格，把正确的认知、自觉的养成、积极的实践紧密结合起来，提升自身的道德素质；有助于大学生增强法治观念、提升法治思维能力、遵守法律规则，行使法律权利与履行法律义务，做到尊法学法守法用法，从而具备优秀的思想道德素质和法治素养。青年兴则国家兴，青年强则国家强。青年一代有理想、有本领、有担当，国家就有前途，民族就有希望。大学生是国家宝贵的人才资源，肩负着人民的重托、历史的重任。"},position:{x:1e3,y:180}},{id:"k1",name:"马克思主义哲学",level:2,parentId:"ch1",children:["p1","p2","p3"],frequency:"high",score:"high",difficulty:"hard",mastery:"proficient",description:"包括辩证唯物主义和历史唯物主义，是科学的世界观和方法论。",source:{document:"马克思主义基本原理概论.pdf",page:25,paragraph:3,excerpt:"马克思主义哲学是无产阶级的科学世界观和方法论，包括辩证唯物主义和历史唯物主义，是整个马克思主义理论体系的哲学基础。辩证唯物主义是关于自然界、人类社会和思维发展的最一般规律的科学，它把唯物主义和辩证法有机地统一起来，建立了科学的实践观，实现了哲学史上的伟大变革。历史唯物主义是马克思一生最伟大的发现之一，它把辩证唯物主义贯彻到社会历史领域，揭示了人类社会发展的一般规律，结束了唯心主义在历史观中长期占统治地位的局面。马克思主义哲学的创立，为无产阶级和广大劳动人民认识世界和改造世界提供了锐利的思想武器。马克思主义哲学以科学的实践观为核心，正确解决了人与自然、人与社会即人与世界的关系问题，从而实现了唯物论和辩证法、唯物主义自然观和历史观的统一。"},position:{x:50,y:380}},{id:"k2",name:"马克思主义政治经济学",level:2,parentId:"ch1",children:["p4","p5"],frequency:"high",score:"high",difficulty:"hard",mastery:"average",description:"研究资本主义生产关系及其发展规律，揭示资本主义剥削的秘密。",source:{document:"马克思主义基本原理概论.pdf",page:145,paragraph:1,excerpt:"马克思主义政治经济学是研究社会生产关系及其发展规律的科学，是马克思主义理论的重要组成部分。马克思在批判地继承英国古典政治经济学的基础上，运用辩证唯物主义和历史唯物主义的世界观和方法论，对资本主义生产关系进行了深入的剖析，创立了剩余价值学说，揭示了资本主义剥削的秘密，阐明了资本主义产生、发展和必然灭亡的历史规律。马克思主义政治经济学从商品这个资本主义经济的细胞开始，分析了商品、货币、价值规律等基本范畴，进而深入到对资本主义生产过程的研究，揭示了剩余价值生产的秘密，分析了剩余价值的实现和分配过程，最后揭露了资本主义制度的内在矛盾，论证了资本主义必然被社会主义所代替的历史趋势。马克思主义政治经济学既揭示了资本主义经济运动的特殊规律，也揭示了社会化大生产和商品经济发展的一般规律，对于我们认识资本主义和建设社会主义都具有重要的指导意义。"},position:{x:150,y:380}},{id:"k3",name:"科学社会主义",level:2,parentId:"ch1",children:["p6"],frequency:"medium",score:"medium",difficulty:"medium",mastery:"weak",description:"阐述社会主义代替资本主义的历史必然性和无产阶级解放的道路。",source:{document:"马克思主义基本原理概论.pdf",page:220,paragraph:2,excerpt:"科学社会主义是关于无产阶级解放斗争的性质、条件和一般目的的学说，是马克思主义理论体系的核心和归宿。科学社会主义以马克思主义哲学和政治经济学为理论基础，研究无产阶级解放运动的发展规律，阐明社会主义代替资本主义的历史必然性，指明无产阶级实现自身解放和全人类解放的道路和条件。19世纪中叶，马克思恩格斯在唯物史观和剩余价值学说的基础上，批判地继承了空想社会主义的合理成分，使社会主义从空想发展成为科学。科学社会主义阐明了无产阶级的历史使命，论证了无产阶级革命和无产阶级专政是实现无产阶级解放的必由之路，描绘了共产主义社会的美好蓝图，指出了实现共产主义是人类历史发展的必然趋势。科学社会主义是无产阶级政党指导革命、建设和改革的强大思想武器，是行动中的马克思主义。"},position:{x:250,y:380}},{id:"k4",name:"毛泽东思想",level:2,parentId:"ch2",children:["p7","p8"],frequency:"high",score:"high",difficulty:"medium",mastery:"average",description:"马克思列宁主义在中国的运用和发展，是被实践证明了的关于中国革命和建设的正确理论原则和经验总结。",source:{document:"毛泽东思想和中国特色社会主义理论体系概论.pdf",page:35,paragraph:1,excerpt:"毛泽东思想是马克思主义中国化的第一个重大理论成果，是马克思列宁主义在中国的运用和发展，是被实践证明了的关于中国革命和建设的正确的理论原则和经验总结，是中国共产党集体智慧的结晶。毛泽东思想是在我国新民主主义革命、社会主义革命和社会主义建设的实践过程中，在总结我国革命和建设正反两方面历史经验的基础上，逐步形成和发展起来的。毛泽东思想紧紧围绕中国革命和建设的主题，提出了一系列相互关联的重要理论观点，构成了一个完整的科学思想体系，其主要内容包括：新民主主义革命理论、社会主义革命和社会主义建设理论、革命军队建设和军事战略的理论、政策和策略的理论、思想政治工作和文化工作的理论、党的建设理论等。毛泽东思想活的灵魂是贯穿于上述各个理论组成部分的立场、观点和方法，它们有三个基本方面，即实事求是、群众路线、独立自主。"},position:{x:380,y:350}},{id:"k5",name:"习近平新时代中国特色社会主义思想",level:2,parentId:"ch2",children:["p9","p10"],frequency:"high",score:"high",difficulty:"medium",mastery:"unstudied",description:"当代中国马克思主义、二十一世纪马克思主义，是中华文化和中国精神的时代精华。",source:{document:"毛泽东思想和中国特色社会主义理论体系概论.pdf",page:180,paragraph:1,excerpt:"习近平新时代中国特色社会主义思想是党和人民实践经验和集体智慧的结晶，是中国特色社会主义理论体系的重要组成部分，是全党全国人民为实现中华民族伟大复兴而奋斗的行动指南，是当代中国马克思主义、二十一世纪马克思主义，是中华文化和中国精神的时代精华，实现了马克思主义中国化时代化新的飞跃。习近平新时代中国特色社会主义思想，坚持把马克思主义基本原理同中国具体实际相结合、同中华优秀传统文化相结合，科学回答了新时代坚持和发展什么样的中国特色社会主义、怎样坚持和发展中国特色社会主义，建设什么样的社会主义现代化强国、怎样建设社会主义现代化强国，建设什么样的长期执政的马克思主义政党、怎样建设长期执政的马克思主义政党等重大时代课题。习近平新时代中国特色社会主义思想内容十分丰富，涵盖改革发展稳定、内政外交国防、治党治国治军等各个领域、各个方面，构成了一个系统完整、逻辑严密、内涵丰富、博大精深的科学理论体系。"},position:{x:480,y:350}},{id:"k6",name:"旧民主主义革命时期",level:2,parentId:"ch3",children:["p11"],frequency:"medium",score:"medium",difficulty:"easy",mastery:"weak",description:"1840-1919年，从鸦片战争到五四运动前的历史时期。",source:{document:"中国近现代史纲要.pdf",page:20,paragraph:2,excerpt:"旧民主主义革命是由资产阶级领导的，以建立资本主义社会和资产阶级专政的国家为目的、反对外国侵略和本国封建统治的革命。从1840年鸦片战争到1919年五四运动前的80年，是旧民主主义革命时期。这一时期，外国资本主义列强通过多次侵略战争，强迫中国政府签订了一系列不平等条约，使中国逐步沦为半殖民地半封建社会。帝国主义和中华民族的矛盾，封建主义和人民大众的矛盾，成为近代中国社会的主要矛盾。为了挽救民族危亡，中国人民进行了不屈不挠的英勇斗争，先后发动了太平天国农民运动、洋务运动、戊戌维新运动、义和团运动等。以孙中山为代表的资产阶级革命派领导的辛亥革命，是一次比较完全意义上的资产阶级民主革命，它推翻了清王朝的统治，结束了在中国延续两千多年的封建君主专制制度，但最终也以失败而告终。历史证明，资产阶级共和国的方案在中国行不通。"},position:{x:680,y:380}},{id:"k7",name:"新民主主义革命时期",level:2,parentId:"ch3",children:["p12"],frequency:"high",score:"high",difficulty:"medium",mastery:"average",description:"1919-1949年，无产阶级领导的人民大众的反帝反封建的革命时期。",source:{document:"中国近现代史纲要.pdf",page:80,paragraph:1,excerpt:"新民主主义革命是无产阶级领导的，人民大众的，反对帝国主义、封建主义和官僚资本主义的革命。从1919年五四运动到1949年中华人民共和国成立的30年，是新民主主义革命时期。1919年爆发的五四运动，是中国新民主主义革命的伟大开端，它促进了马克思主义在中国的广泛传播，为中国共产党的成立作了思想上和干部上的准备。1921年中国共产党成立，这是中国历史上开天辟地的大事变，从此中国革命的面貌焕然一新。中国共产党成立后，经历了国民革命、土地革命战争、抗日战争和解放战争四个阶段，领导中国人民经过28年艰苦卓绝的斗争，终于推翻了帝国主义、封建主义和官僚资本主义的反动统治，取得了新民主主义革命的伟大胜利，建立了中华人民共和国，实现了民族独立和人民解放，开创了中国历史的新纪元。"},position:{x:780,y:380}},{id:"k8",name:"社会主义核心价值观",level:2,parentId:"ch4",children:["p13"],frequency:"high",score:"low",difficulty:"easy",mastery:"unstudied",description:"富强、民主、文明、和谐；自由、平等、公正、法治；爱国、敬业、诚信、友善。",source:{document:"思想道德与法治.pdf",page:65,paragraph:2,excerpt:"社会主义核心价值观是当代中国精神的集中体现，凝结着全体人民共同的价值追求。党的十八大提出，要倡导富强、民主、文明、和谐，倡导自由、平等、公正、法治，倡导爱国、敬业、诚信、友善，积极培育和践行社会主义核心价值观。社会主义核心价值观把涉及国家、社会、公民的价值要求融为一体，既体现了社会主义本质要求，继承了中华优秀传统文化，也吸收了世界文明有益成果，体现了时代精神，回答了我们要建设什么样的国家、建设什么样的社会、培育什么样的公民的重大问题。富强、民主、文明、和谐是国家层面的价值要求，自由、平等、公正、法治是社会层面的价值要求，爱国、敬业、诚信、友善是公民层面的价值要求。这12个范畴相互联系、相互贯通，构成了一个有机统一的整体，为培育和践行社会主义核心价值观提供了基本遵循。"},position:{x:980,y:360}},{id:"p1",name:"物质与意识",level:3,parentId:"k1",frequency:"high",score:"high",difficulty:"medium",mastery:"proficient",description:"物质决定意识，意识对物质具有能动的反作用。物质是标志客观实在的哲学范畴。",source:{document:"马克思主义基本原理概论.pdf",page:30,paragraph:2,excerpt:'物质范畴是唯物主义哲学关于世界本原和统一性的最高抽象，是唯物主义世界观的基石。20世纪初，列宁对物质概念作了全面的科学的规定："物质是标志客观实在的哲学范畴，这种客观实在是人通过感觉感知的，它不依赖于我们的感觉而存在，为我们的感觉所复写、摄影、反映。"列宁的这一物质定义，坚持了物质的客观实在性原则，坚持了唯物主义一元论，同唯心主义一元论和二元论划清了界限；坚持了能动的反映论和可知论，有力地批判了不可知论；体现了唯物论和辩证法的统一；体现了唯物主义自然观与唯物主义历史观的统一，为彻底的唯物主义奠定了理论基础。物质的根本属性是运动，运动是标志一切事物和现象的变化及其过程的哲学范畴。物质世界的运动是绝对的，而物质在运动过程中又有某种相对的静止。时间和空间是物质运动的存在形式。物质、运动、时间、空间具有内在的统一性，它要求我们想问题、办事情，要一切以时间、地点、条件为转移。意识是物质世界长期发展的产物，是人脑的机能和属性，是客观世界的主观映象。物质决定意识，意识对物质具有能动的反作用，这种反作用主要表现在：意识活动具有目的性和计划性，意识活动具有创造性，意识具有指导实践改造客观世界的作用，意识具有调控人的行为和生理活动的作用。'}},{id:"p2",name:"对立统一规律",level:3,parentId:"k1",frequency:"high",score:"high",difficulty:"hard",mastery:"proficient",description:"对立统一规律是唯物辩证法的实质和核心，揭示了事物发展的源泉和动力。",source:{document:"马克思主义基本原理概论.pdf",page:42,paragraph:1,excerpt:"对立统一规律是唯物辩证法体系中的实质和核心，这是因为：对立统一规律揭示了事物普遍联系的根本内容和永恒发展的内在动力，从根本上回答了事物为什么会发展的问题；对立统一规律是贯穿质量互变规律、否定之否定规律以及唯物辩证法基本范畴的中心线索，也是理解这些规律和范畴的钥匙；对立统一规律提供了人们认识世界和改造世界的根本方法，即矛盾分析法。矛盾是反映事物内部和事物之间对立统一关系的哲学范畴，对立和统一分别体现了矛盾的两种基本属性，矛盾的对立属性又称斗争性，矛盾的统一属性又称同一性。矛盾的同一性是指矛盾双方相互依存、相互贯通的性质和趋势，它有两个方面的含义：一是矛盾着的对立面相互依存，互为存在的前提，并共处于一个统一体中；二是矛盾着的对立面相互贯通，在一定条件下相互转化。矛盾的斗争性是矛盾着的对立面相互排斥、相互分离的性质和趋势。矛盾的同一性和矛盾的斗争性是相互联结、相辅相成的，没有斗争性就没有同一性，斗争性寓于同一性之中，没有同一性也没有斗争性。矛盾的同一性和斗争性在事物发展中具有重要作用，矛盾是事物发展的动力，是指矛盾着的对立面又斗争、又同一，由此推动事物的发展，或者说有条件的相对的同一性和无条件的绝对的斗争性相结合，构成了事物的矛盾运动，推动着事物的发展。矛盾无处不在，无时不有，这是矛盾的普遍性。不同事物的矛盾又是具体的、特殊的，这是矛盾的特殊性。矛盾的普遍性和特殊性是辩证统一的关系，它们是共性和个性、一般和个别的关系，这是事物矛盾问题的精髓。"}},{id:"p3",name:"实践与认识",level:3,parentId:"k1",frequency:"high",score:"high",difficulty:"medium",mastery:"average",description:"实践是认识的基础，对认识具有决定作用；认识对实践具有指导作用。",source:{document:"马克思主义基本原理概论.pdf",page:58,paragraph:3,excerpt:"实践观点是马克思主义认识论的首要的和基本的观点。实践是人类能动地改造世界的社会性的物质活动，具有直接现实性、自觉能动性和社会历史性三个基本特征。实践的主体、客体和中介是实践活动的三项基本要素，三者的有机统一构成实践的基本结构。实践的形式是多种多样的，其中物质生产实践、社会政治实践和科学文化实践是实践的三种基本类型。实践是认识的基础，它对认识的决定作用主要表现在：第一，实践是认识的来源。认识是适应实践的需要而产生的，只有在实践中人们才能认识事物的本质和规律，一切真知都来源于实践。第二，实践是认识发展的动力。实践的需要推动认识的产生和发展，实践为认识发展提供必要的条件，实践锻炼和提高了主体的认识能力。第三，实践是认识的目的。认识世界的目的是为了改造世界，认识本身不是目的，改造世界才是认识的目的。第四，实践是检验认识真理性的唯一标准。人们在实践中形成的认识，是否正确地反映了客观事物的本质和规律，只有回到实践中去才能得到检验。认识的本质是主体在实践基础上对客体的能动反映，这种能动反映具有摹写性和创造性两个方面的特点。认识过程是一个在实践基础上不断深化的发展过程，首先是从实践到认识的过程，即在实践基础上由感性认识能动地飞跃到理性认识；然后是从认识到实践，这是认识过程的第二次能动飞跃；实践、认识、再实践、再认识，循环往复以至无穷，这是认识辩证运动发展的基本过程，也是认识运动的总规律。实践和认识的辩证关系原理，要求我们在实际工作中既要重视实践的决定作用，坚持一切从实际出发，又要重视认识的反作用，重视理论指导，把理论和实践结合起来，做到理论和实践的具体的历史的统一。"}},{id:"p4",name:"剩余价值理论",level:3,parentId:"k2",frequency:"high",score:"high",difficulty:"hard",mastery:"average",description:"剩余价值是由雇佣工人创造的、被资本家无偿占有的、超过劳动力价值的那部分价值。",source:{document:"马克思主义基本原理概论.pdf",page:175,paragraph:1,excerpt:"剩余价值是雇佣工人所创造的并被资本家无偿占有的超过劳动力价值的价值，它是雇佣工人剩余劳动的凝结，体现了资本家与雇佣工人之间剥削与被剥削的关系。资本主义生产的直接目的和决定性动机，就是无休止地获取尽可能多的剩余价值，这种不以人的意志为转移的客观必然性，就是剩余价值规律。为了获取剩余价值，资本家必须把购买到的生产资料和劳动力结合起来进行资本主义生产。资本主义生产过程是劳动过程和价值增殖过程的统一。在劳动过程中，工人通过具体劳动改变劳动对象的物质形态，生产出商品的使用价值，并把生产资料的价值转移到新产品中去；同时，工人的劳动作为抽象劳动，又凝结成新价值，形成商品价值的另一组成部分。价值增殖过程是剩余价值的生产过程，这是资本主义生产过程的主要方面。资本在生产过程中采取生产资料和劳动力两种形态，根据这两部分资本在剩余价值生产中所起的不同作用，可以将资本区分为不变资本和可变资本。不变资本是以生产资料形态存在的资本，它在生产过程中只转移自己的物质形态而不改变自己的价值量，不发生增殖。可变资本是用来购买劳动力的那部分资本，它的价值在生产过程中不是被转移到新产品中去，而是由工人的劳动再生产出来，在生产过程中，工人所创造的新价值，不仅包括相当于劳动力价值的价值，而且还包括一定量的剩余价值，因此这部分资本价值是一个可变的量。资本家提高对工人剥削程度的方法是多种多样的，最基本的方法有两种，即绝对剩余价值的生产和相对剩余价值的生产。绝对剩余价值是指在必要劳动时间不变的条件下，由于延长工作日的长度和提高劳动强度而生产的剩余价值。相对剩余价值是指在工作日长度不变的条件下，通过缩短必要劳动时间而相对延长剩余劳动时间所生产的剩余价值。剩余价值理论是马克思主义政治经济学的基石，它科学地揭示了资本主义剥削的秘密，阐明了无产阶级和资产阶级之间阶级对立的经济根源，为无产阶级革命提供了强大的思想武器。"}},{id:"p5",name:"商品二因素",level:3,parentId:"k2",frequency:"medium",score:"medium",difficulty:"medium",mastery:"weak",description:"商品具有使用价值和价值两个因素，是使用价值和价值的矛盾统一体。",source:{document:"马克思主义基本原理概论.pdf",page:148,paragraph:2,excerpt:"商品是用来交换的能满足人们某种需要的劳动产品，具有使用价值和价值两个因素或两种属性，是使用价值和价值的矛盾统一体。使用价值是指商品能满足人们某种需要的有用性，它反映的是人与自然之间的物质关系，是商品的自然属性，是一切劳动产品所共有的属性。使用价值构成社会财富的物质内容。商品的使用价值，不是用来满足生产者自身需要的，它是通过交换用来满足别人的、社会的需要的，因此它是交换价值的物质承担者。交换价值首先表现为一种使用价值同另一种使用价值相交换的量的关系或比例。决定商品交换比例的，不是商品的使用价值，而是价值。价值是凝结在商品中的无差别的一般人类劳动，即人类脑力和体力的耗费，它是商品所特有的社会属性，体现着商品生产者之间相互交换劳动的社会关系。价值是交换价值的基础，交换价值是价值的表现形式。商品的价值和使用价值之间是对立统一的关系。其对立性表现在：商品的使用价值和价值是相互排斥的，二者不可兼得。要获得商品的价值，就必须放弃商品的使用价值；要得到商品的使用价值，就不能得到商品的价值。其统一性表现在：作为商品，必须同时具有使用价值和价值两个因素。使用价值是价值的物质承担者，价值寓于使用价值之中。一种物品如果没有使用价值，就是无用之物，即使人们为它付出了大量的劳动，也没有价值；一种物品尽管具有使用价值，但如果不是劳动产品，也没有价值。商品是劳动产品，生产商品的劳动可区分为具体劳动和抽象劳动，这就是劳动的二重性。具体劳动是指生产一定使用价值的具体形式的劳动，它创造商品的使用价值。抽象劳动是指撇开一切具体形式的、无差别的一般人类劳动，即人的体力和脑力消耗，它形成商品的价值。具体劳动和抽象劳动是同一劳动的两种规定，劳动的二重性决定了商品的二因素。"}},{id:"p6",name:"共产主义理想",level:3,parentId:"k3",frequency:"medium",score:"medium",difficulty:"easy",mastery:"weak",description:"共产主义是人类最崇高的社会理想，实现共产主义是一个长期的历史过程。",source:{document:"马克思主义基本原理概论.pdf",page:265,paragraph:1,excerpt:"共产主义不仅是一种科学的理论和这种理论指导下的现实的运动，而且是一种未来的社会制度和社会形态。马克思主义经典作家揭示了共产主义社会的基本特征：第一，物质财富极大丰富，消费资料按需分配。生产力高度发展，产品极大丰富，是实现共产主义的必要条件，共产主义社会将彻底废除私有制，实行普遍的生产资料公有制，个人消费品的分配方式是各尽所能，按需分配。第二，社会关系高度和谐，人们精神境界极大提高。共产主义社会阶级将会消亡，国家也将消亡，战争也将不复存在，社会关系实现了高度和谐，工农之间、城乡之间、脑力劳动与体力劳动之间的差别也将消失，人们具有高度的思想觉悟和道德品质。第三，实现每个人自由而全面的发展，人类从必然王国向自由王国飞跃。实现人的自由而全面的发展，是马克思主义追求的根本价值目标，也是共产主义社会的根本特征。在共产主义社会，人的发展是自由而全面的发展，是建立在个体高度自由自觉基础上的全面发展，劳动不再是单纯的谋生手段，而成为生活的第一需要，人类将最终从支配他们生活和命运的异己力量中解放出来，实现从必然王国向自由王国的飞跃，开始自觉地创造自己的历史。共产主义理想是能够实现的社会理想，它是在对人类社会发展规律认识的基础上设立的社会发展目标，它的实现是靠社会的发展和进步，靠人民群众的实践。实现共产主义是一个长期的历史过程，它的实现需要经历许多发展阶段，需要一代代人付出艰苦的努力。我们要正确认识和把握共产主义远大理想与中国特色社会主义共同理想的关系，坚定理想信念，积极投身于中国特色社会主义建设事业，为实现共产主义远大理想而奋斗。"}},{id:"p7",name:"新民主主义革命总路线",level:3,parentId:"k4",frequency:"high",score:"high",difficulty:"medium",mastery:"average",description:"无产阶级领导的，人民大众的，反对帝国主义、封建主义和官僚资本主义的革命。",source:{document:"毛泽东思想和中国特色社会主义理论体系概论.pdf",page:52,paragraph:2,excerpt:"新民主主义革命总路线是新民主主义革命理论的集中体现，它是中国共产党在新民主主义革命时期的总路线，是在总结新民主主义革命实践经验的基础上制定的，它反映了中国革命的基本规律，指明了中国革命的对象、动力、领导力量。1948年，毛泽东在《在晋绥干部会议上的讲话》中完整地表述了总路线的内容，即无产阶级领导的，人民大众的，反对帝国主义、封建主义和官僚资本主义的革命。新民主主义革命的对象是帝国主义、封建主义和官僚资本主义，它们是压在中国人民头上的三座大山。帝国主义是中国革命的首要对象，是中国人民第一个和最凶恶的敌人，封建主义是中国革命的另一个主要对象，官僚资本主义是依靠帝国主义、勾结封建势力、利用国家政权力量而发展起来的买办的封建的国家垄断资本主义。新民主主义革命的动力包括无产阶级、农民阶级、城市小资产阶级和民族资产阶级，无产阶级是中国革命最基本的动力，农民是中国革命的主力军，是无产阶级最可靠的同盟军，城市小资产阶级是无产阶级的可靠同盟者，民族资产阶级也是中国革命的动力之一，但它是一个带有两面性的阶级。新民主主义革命的领导权问题是中国革命的中心问题，也是新民主主义革命理论的核心问题，无产阶级的领导权是中国革命的中心问题，也是新民主主义革命理论的核心问题，区别新旧两种不同范畴的民主主义革命，根本的标志是革命的领导权掌握在无产阶级手中还是掌握在资产阶级手中。中国无产阶级除了具有一般无产阶级的基本优点外，还具有自身的特点和优点，这些特点和优点，使它能够成为中国革命的领导力量。新民主主义革命的性质是资产阶级民主主义革命，但它已不是旧式的、一般的资产阶级民主主义的革命，而是新的民主主义革命，属于世界无产阶级社会主义革命的一部分。新民主主义革命的前途是社会主义，而不是资本主义，中国革命必须分两步走，第一步是民主主义革命，第二步是社会主义革命，民主主义革命是社会主义革命的必要准备，社会主义革命是民主主义革命的必然趋势。"}},{id:"p8",name:"社会主义改造理论",level:3,parentId:"k4",frequency:"medium",score:"medium",difficulty:"medium",mastery:"average",description:"对农业、手工业和资本主义工商业的社会主义改造，实现了中国历史上最深刻最伟大的社会变革。",source:{document:"毛泽东思想和中国特色社会主义理论体系概论.pdf",page:78,paragraph:1,excerpt:"从中华人民共和国成立到社会主义改造基本完成，这是一个过渡时期，党在这个过渡时期的总路线和总任务，是要在一个相当长的时期内，逐步实现国家的社会主义工业化，并逐步实现国家对农业、对手工业和对资本主义工商业的社会主义改造。这条总路线的主要内容可以概括为一化三改、一体两翼，一化即社会主义工业化，这是主体；三改即对个体农业、手工业和资本主义工商业的社会主义改造，这是两翼。两者相辅相成，相互促进，体现了社会主义工业化和社会主义改造的紧密结合，体现了解放生产力与发展生产力、变革生产关系与发展生产力的有机统一。农业社会主义改造大体上经历了互助组、初级农业生产合作社、高级农业生产合作社三个发展阶段，遵循自愿互利、典型示范和国家帮助的原则，逐步把个体农民的生产资料私有制改造成为社会主义的集体所有制。对手工业的社会主义改造，党和政府采取了积极领导、稳步前进的方针，在方法步骤上，从供销合作入手，逐步发展到走生产合作的道路，具体经历了手工业供销小组、手工业供销合作社、手工业生产合作社三个步骤。对资本主义工商业的社会主义改造，党和政府创造性地开辟了一条适合中国情况的对资本主义工商业进行社会主义改造的道路，用和平赎买的方法改造资本主义工商业，采取从低级到高级的国家资本主义的过渡形式，把资本主义工商业者改造成为自食其力的社会主义劳动者。到1956年底，我国对农业、手工业和资本主义工商业的社会主义改造基本完成，标志着中国历史上长达数千年的阶级剥削制度的结束，实现了由新民主主义向社会主义的转变，社会主义基本制度在我国初步确立，我国进入社会主义初级阶段。社会主义改造的胜利，为中国全面进行社会主义建设奠定了基础，开辟了道路，这是中国历史上最深刻最伟大的社会变革。"}},{id:"p9",name:"新时代社会主要矛盾",level:3,parentId:"k5",frequency:"high",score:"high",difficulty:"easy",mastery:"unstudied",description:"人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。",source:{document:"毛泽东思想和中国特色社会主义理论体系概论.pdf",page:185,paragraph:3,excerpt:"中国特色社会主义进入新时代，我国社会主要矛盾已经转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。这一重大政治论断，是党的十九大作出的，是对中国特色社会主义进入新时代的科学判断的重要依据。我国社会主要矛盾的变化是关系全局的历史性变化，它反映了我国社会发展的客观实际，明确了解决当代中国发展问题的根本着力点，对新时代党和国家工作提出了许多新要求。我们党对社会主要矛盾的认识是一个不断深化的过程，1956年党的八大指出，我国国内的主要矛盾，已经是人民对于建立先进的工业国的要求同落后的农业国的现实之间的矛盾，已经是人民对于经济文化迅速发展的需要同当前经济文化不能满足人民需要的状况之间的矛盾；1981年党的十一届六中全会对我国社会主要矛盾作了规范的表述，即在社会主义改造基本完成以后，我国所要解决的主要矛盾，是人民日益增长的物质文化需要同落后的社会生产之间的矛盾；进入新时代，我国稳定解决了十几亿人的温饱问题，总体上实现小康，不久将全面建成小康社会，人民美好生活需要日益广泛，不仅对物质文化生活提出了更高要求，而且在民主、法治、公平、正义、安全、环境等方面的要求日益增长，同时我国社会生产力水平总体上显著提高，社会生产能力在很多方面进入世界前列，更加突出的问题是发展不平衡不充分，这已经成为满足人民日益增长的美好生活需要的主要制约因素。必须认识到，我国社会主要矛盾的变化，没有改变我们对我国社会主义所处历史阶段的判断，我国仍处于并将长期处于社会主义初级阶段的基本国情没有变，我国是世界最大发展中国家的国际地位没有变。我们要在继续推动发展的基础上，着力解决好发展不平衡不充分问题，大力提升发展质量和效益，更好满足人民在经济、政治、文化、社会、生态等方面日益增长的需要，更好推动人的全面发展、社会全面进步。"}},{id:"p10",name:"中国式现代化",level:3,parentId:"k5",frequency:"high",score:"high",difficulty:"medium",mastery:"unstudied",description:"中国式现代化是人口规模巨大的现代化、全体人民共同富裕的现代化、物质文明和精神文明相协调的现代化、人与自然和谐共生的现代化、走和平发展道路的现代化。",source:{document:"毛泽东思想和中国特色社会主义理论体系概论.pdf",page:220,paragraph:1,excerpt:"中国式现代化是中国共产党领导的社会主义现代化，既有各国现代化的共同特征，更有基于自己国情的中国特色。党的二十大报告明确概括了中国式现代化五个方面的中国特色，深刻揭示了中国式现代化的科学内涵。第一，中国式现代化是人口规模巨大的现代化。我国十四亿多人口整体迈进现代化社会，规模超过现有发达国家人口的总和，艰巨性和复杂性前所未有，发展途径和推进方式也必然具有自己的特点。第二，中国式现代化是全体人民共同富裕的现代化。共同富裕是中国特色社会主义的本质要求，也是一个长期的历史过程，我们坚持把实现人民对美好生活的向往作为现代化建设的出发点和落脚点，着力维护和促进社会公平正义，着力促进全体人民共同富裕，坚决防止两极分化。第三，中国式现代化是物质文明和精神文明相协调的现代化。物质富足、精神富有是社会主义现代化的根本要求，我们不断促进物的全面丰富和人的全面发展。第四，中国式现代化是人与自然和谐共生的现代化。人与自然是生命共同体，我们坚持可持续发展，坚定不移走生产发展、生活富裕、生态良好的文明发展道路，实现中华民族永续发展。第五，中国式现代化是走和平发展道路的现代化。我们强调同世界各国互利共赢，推动构建人类命运共同体，努力为人类和平与发展作出贡献。中国式现代化的本质要求是：坚持中国共产党领导，坚持中国特色社会主义，实现高质量发展，发展全过程人民民主，丰富人民精神世界，实现全体人民共同富裕，促进人与自然和谐共生，推动构建人类命运共同体，创造人类文明新形态。中国式现代化是中国共产党和中国人民长期实践探索的成果，是一项伟大而艰巨的事业，我们要牢牢把握中国式现代化的本质要求，以中国式现代化全面推进中华民族伟大复兴。"}},{id:"p11",name:"鸦片战争",level:3,parentId:"k6",frequency:"medium",score:"medium",difficulty:"easy",mastery:"weak",description:"1840年鸦片战争爆发，是中国近代史的开端，中国开始沦为半殖民地半封建社会。",source:{document:"中国近现代史纲要.pdf",page:22,paragraph:1,excerpt:"1840年，英国发动了侵略中国的鸦片战争，这是中国近代史的开端。鸦片战争爆发前夕，中国正处于封建社会晚期，清王朝统治下的中国危机四伏，而西方资本主义国家先后完成工业革命，急需开辟新的商品市场和原料产地，英国成为世界上最强大的资本主义国家，为了打开中国市场，向中国大量走私鸦片，给中国社会带来严重危害。1839年林则徐虎门销烟，成为英国发动侵略战争的借口。1840年6月，英国侵华舰队抵达广东海面，封锁珠江口，鸦片战争正式爆发。战争中，尽管中国军民进行了英勇抵抗，但由于清政府的腐败无能和封建制度的落后，中国最终战败。1842年8月，清政府被迫与英国签订了中国近代史上第一个不平等条约《南京条约》，其主要内容包括：割香港岛给英国，赔款2100万银元，开放广州、厦门、福州、宁波、上海五处为通商口岸，英商进出口货物缴纳的税款中国须同英国商定。随后，美国、法国等西方列强趁火打劫，相继强迫清政府签订了《望厦条约》、《黄埔条约》等一系列不平等条约。鸦片战争及一系列不平等条约的签订，使中国社会开始发生根本性的变化：政治上，中国的领土主权、领海主权、关税主权、司法主权等开始遭到严重破坏，中国逐渐由一个独立自主的封建国家沦为半殖民地国家；经济上，中国自给自足的自然经济开始解体，中国逐渐被卷入资本主义世界市场，成为资本主义国家的商品市场和原料产地，封建经济逐步瓦解，中国开始沦为半封建社会；社会矛盾方面，中国社会的主要矛盾开始转变为外国资本主义和中华民族的矛盾、封建主义和人民大众的矛盾；革命任务方面，中国人民开始肩负起反对外国资本主义侵略和反对本国封建统治的双重革命任务。鸦片战争是中国历史的转折点，是中国近代史的开端，从此中国开始了屈辱、苦难、探索、斗争的历程。"}},{id:"p12",name:"中国共产党成立",level:3,parentId:"k7",frequency:"high",score:"high",difficulty:"easy",mastery:"average",description:"1921年7月，中国共产党第一次全国代表大会在上海召开，宣告了中国共产党的成立。",source:{document:"中国近现代史纲要.pdf",page:95,paragraph:2,excerpt:"中国共产党的成立，是中华民族发展史上一个开天辟地的大事变。中国共产党的成立是近代中国社会矛盾发展和人民斗争深入的必然结果，是马克思主义同中国工人运动相结合的产物。1917年俄国十月革命给中国送来了马克思列宁主义，使中国的先进分子找到了救国救民的真理。1919年爆发的五四运动，促进了马克思主义在中国的广泛传播，为中国共产党的成立作了思想上和干部上的准备。五四运动后，一批具有初步共产主义思想的知识分子深入工人群众，宣传马克思主义，开展工人运动，开始把马克思主义同中国工人运动结合起来。1920年初，李大钊、陈独秀等开始酝酿建党，随后各地共产主义小组相继成立，有组织地开展马克思主义宣传和工人运动，进一步促进了马克思主义同中国工人运动的结合，成立中国共产党的条件已经成熟。1921年7月23日，中国共产党第一次全国代表大会在上海法租界望志路106号开幕，由于会场受到暗探注意和法租界巡捕搜查，最后一天的会议转移到浙江嘉兴南湖的游船上举行。参加大会的有各地共产主义小组推举的代表共12人，他们代表全国50多名党员。大会确定党的名称为中国共产党，党的纲领是：以无产阶级革命军队推翻资产阶级，采用无产阶级专政以达到阶级斗争的目的，消灭阶级，废除资本私有制，以及联合第三国际等。大会选举产生了党的领导机构中央局，陈独秀为书记。党的一大宣告了中国共产党的正式成立。中国共产党是在特定的社会历史条件下成立的，它一开始就是一个以马克思列宁主义理论为基础的党，是一个区别于第二国际旧式社会改良党的新型工人阶级革命政党。中国共产党的成立，是中国历史上开天辟地的大事变，它给灾难深重的中国人民带来了光明和希望，中国人民从此有了一个先进的坚强的政党作为凝聚自己力量的领导核心，中国革命从此有了正确的前进方向，中国革命的面貌焕然一新。自从有了中国共产党，中国革命就有了新的领导力量，新的指导思想，新的革命方法，新的奋斗目标，中国人民踏上了争取民族独立、人民解放的光明道路，开启了实现国家富强、人民幸福的壮丽征程。"}},{id:"p13",name:"爱国主义",level:3,parentId:"k8",frequency:"high",score:"low",difficulty:"easy",mastery:"unstudied",description:"爱国主义是民族精神的核心，是调节个人与祖国之间关系的道德要求、政治原则和法律规范。",source:{document:"思想道德与法治.pdf",page:78,paragraph:2,excerpt:"爱国主义体现了人们对自己祖国的深厚感情，揭示了个人对祖国的依存关系，是人们对自己家园以及民族和文化的归属感、认同感、尊严感与荣誉感的统一，它是调节个人与祖国之间关系的道德要求、政治原则和法律规范，也是中华民族精神的核心。爱国主义是历史的、具体的，在不同的历史条件和文化背景下所形成的爱国主义，总是具有不同的内涵和特点，爱国主义的丰富性和生命力，正是通过它的历史性和具体性来表现的。新时代的爱国主义基本要求是：坚持爱国主义和社会主义相统一，维护祖国统一和民族团结，尊重和传承中华民族历史文化，坚持立足民族又面向世界。爱国主义和爱社会主义的统一是中国历史发展的必然结果，我国爱国主义始终围绕着实现民族富强、人民幸福而发展，最终汇流于中国特色社会主义，祖国的命运和党的命运、社会主义的命运是密不可分的，只有坚持爱国和爱党、爱社会主义相统一，爱国主义才是鲜活的、真实的，这是当代中国爱国主义精神最重要的体现。维护国家主权和领土完整，实现祖国完全统一，是全体中华儿女共同愿望，是中华民族根本利益所在，在新的时代条件下，弘扬爱国主义精神，必须把维护祖国统一和民族团结作为重要着力点和落脚点。对祖国悠久历史、深厚文化的理解和接受，是人们爱国主义情感培育和发展的重要条件，要尊重和传承中华民族历史和文化，推动中华优秀传统文化创造性转化和创新性发展，不断增强中华民族的归属感、认同感、尊严感、荣誉感。坚持新时代的爱国主义，要求我们正确处理好立足民族与面向世界的辩证统一关系，把弘扬爱国主义精神与扩大对外开放结合起来，既要尊重各国的历史特点、文化传统，尊重各国人民选择的发展道路，从不同文明中寻求智慧、汲取营养，增强中华文明生机活力，又要积极倡导求同存异、交流互鉴，共同推动人类文明发展进步。做忠诚的爱国者，就要维护和推进祖国统一，促进民族团结，增强国家安全意识，把国家的安全、荣誉和利益放在高于一切的地位，始终做到爱国的深厚情感、理性认识和实际行动相一致，与祖国同呼吸、共命运，以实际行动报效祖国。"}}],r5=[{id:"e1",source:"ch1",target:"k1",type:"contains",label:"包含"},{id:"e2",source:"ch1",target:"k2",type:"contains",label:"包含"},{id:"e3",source:"ch1",target:"k3",type:"contains",label:"包含"},{id:"e4",source:"ch2",target:"k4",type:"contains",label:"包含"},{id:"e5",source:"ch2",target:"k5",type:"contains",label:"包含"},{id:"e6",source:"ch3",target:"k6",type:"contains",label:"包含"},{id:"e7",source:"ch3",target:"k7",type:"contains",label:"包含"},{id:"e8",source:"ch4",target:"k8",type:"contains",label:"包含"},{id:"e9",source:"k1",target:"p1",type:"contains",label:"包含"},{id:"e10",source:"k1",target:"p2",type:"contains",label:"包含"},{id:"e11",source:"k1",target:"p3",type:"contains",label:"包含"},{id:"e12",source:"k2",target:"p4",type:"contains",label:"包含"},{id:"e13",source:"k2",target:"p5",type:"contains",label:"包含"},{id:"e14",source:"k3",target:"p6",type:"contains",label:"包含"},{id:"e15",source:"k4",target:"p7",type:"contains",label:"包含"},{id:"e16",source:"k4",target:"p8",type:"contains",label:"包含"},{id:"e17",source:"k5",target:"p9",type:"contains",label:"包含"},{id:"e18",source:"k5",target:"p10",type:"contains",label:"包含"},{id:"e19",source:"k6",target:"p11",type:"contains",label:"包含"},{id:"e20",source:"k7",target:"p12",type:"contains",label:"包含"},{id:"e21",source:"k8",target:"p13",type:"contains",label:"包含"},{id:"e22",source:"p4",target:"p5",type:"prerequisite",label:"前置知识"},{id:"e23",source:"p2",target:"p1",type:"prerequisite",label:"基础"},{id:"e24",source:"k6",target:"k7",type:"causal",label:"发展为"},{id:"e25",source:"p4",target:"p6",type:"causal",label:"推导至"},{id:"e26",source:"k4",target:"k5",type:"confusing",label:"继承发展"}],n5=[{id:"fc1",nodeId:"p1",type:"concept",front:"物质",back:"物质是标志客观实在的哲学范畴，这种客观实在是人通过感觉感知的，它不依赖于我们的感觉而存在，为我们的感觉所复写、摄影、反映。物质的唯一特性是客观实在性。",nextReviewDate:new Date().toISOString().split("T")[0],interval:1,easeFactor:2.5,repetitions:3},{id:"fc2",nodeId:"p1",type:"concept",front:"意识的能动作用",back:`意识的能动作用是人的意识所特有的积极反映世界与改造世界的能力和活动。主要表现在：
1. 意识活动具有目的性和计划性
2. 意识活动具有创造性
3. 意识具有指导实践改造客观世界的作用
4. 意识具有调控人的行为和生理活动的作用`,nextReviewDate:new Date().toISOString().split("T")[0],interval:2,easeFactor:2.5,repetitions:2},{id:"fc3",nodeId:"p2",type:"concept",front:"对立统一规律",back:"对立统一规律是唯物辩证法的实质和核心，揭示了事物发展的源泉和动力。矛盾是反映事物内部和事物之间对立统一关系的哲学范畴。矛盾的同一性和斗争性相互联结、相辅相成，共同推动事物的发展。",nextReviewDate:new Date().toISOString().split("T")[0],interval:1,easeFactor:2.3,repetitions:1},{id:"fc4",nodeId:"p2",type:"comparison",front:"矛盾的普遍性 vs 矛盾的特殊性",back:`【矛盾的普遍性】即矛盾无处不在、无时不有，是共性、无条件的、绝对的。
【矛盾的特殊性】指具体事物的矛盾及每一矛盾的各个方面都有其特点，是个性、有条件的、相对的。

第一节　${e}概述

一、${e}的概念

${e}，是指根据法律规定或当事人约定，在民事活动中形成的具有特定权利义务内容的法律关系。其基本含义包括以下几个方面：

第一，${t}。这是${e}最核心的特征，也是区别于其他相关概念的关键所在。

第二，${e}的成立必须符合法定的构成要件，包括主体适格、意思表示真实、内容合法、形式符合要求四个方面。主体适格是指行为人具有相应的民事行为能力；意思表示真实要求行为人的外在表示与其内心意愿相一致；内容合法是指不违反法律、行政法规的强制性规定，不违背公序良俗；形式符合要求是指法律、行政法规规定采用特定形式的，应当依照其规定。

第三，${e}一经成立，即在当事人之间产生特定的权利义务关系，并受法律保护。权利人有权要求义务人为或不为一定行为，义务人则负有相应的作为或不作为义务。

二、${e}的特征

${e}具有以下法律特征：

（一）主体具有平等性。${e}的各方当事人在法律地位上是平等的，不存在行政上的隶属关系或管理与被管理关系。

（二）内容具有财产性或人身性。${e}的内容既可能涉及财产关系，如物权关系、债权关系，也可能涉及人身关系，如人格权关系、身份权关系。

（三）产生具有法定性或意定性。${e}既可以基于法律规定直接产生，如侵权损害赔偿关系，也可以基于当事人的法律行为而产生，如合同关系。

（四）保障具有强制性。${e}受国家强制力保障，当义务人不履行义务时，权利人可以请求人民法院强制其履行或承担相应的民事责任。

三、${e}的分类

根据不同的标准，可以将${e}作如下分类：

1. 根据主体人数的不同，可以分为单一主体${e}和多数主体${e}。

2. 根据内容的不同，可以分为财产性${e}和人身性${e}。

3. 根据产生原因的不同，可以分为法定${e}和约定${e}。

第二节　${e}的构成要件

一、主体要件

主体是指参加${e}，享有民事权利、承担民事义务的人。这里的"人"包括自然人、法人和非法人组织。

（一）自然人。自然人从出生时起到死亡时止，具有民事权利能力，依法享有民事权利，承担民事义务。自然人的民事行为能力分为完全民事行为能力、限制民事行为能力和无民事行为能力三种。

（二）法人。法人是具有民事权利能力和民事行为能力，依法独立享有民事权利和承担民事义务的组织。法人应当依法成立，有自己的名称、组织机构、住所、财产或者经费。

（三）非法人组织。非法人组织是不具有法人资格，但是能够依法以自己的名义从事民事活动的组织，包括个人独资企业、合伙企业、不具有法人资格的专业服务机构等。

二、内容要件

内容是指${e}主体所享有的民事权利和承担的民事义务。

民事权利是指民事主体为实现某种利益而依法为某种行为或不为某种行为的可能性，具体包括：权利人依法直接享有某种利益或实施一定行为的可能性；权利人可以请求义务人为一定行为或不为一定行为，以保证其享有或实现某种利益的可能性；权利人在权利受到侵犯时，有权请求有关国家机关予以保护。

民事义务是指义务人为满足权利人的利益而为一定行为或不为一定行为的必要性，具体包括：义务人必须依据法律规定或合同约定，为一定行为或不为一定行为，以满足权利人的利益；义务人只承担法定或约定范围内的义务，不承担超出这些范围的义务；义务人必须履行其义务，否则将依法承担民事责任。
