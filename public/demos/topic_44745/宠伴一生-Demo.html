function handleAuth() {
  const name = document.getElementById('auth-name')?.value.trim();
  const password = document.getElementById('auth-password')?.value.trim();

  if (!name) {
    alert('请输入昵称');
    return;
  }
  if (!password || password.length < 6) {
    alert('请输入至少6位密码');
    return;
  }

  // 模拟登录/注册
  currentUser = {
    id: 'user_' + Date.now(),
    name: name,
    phone: authMode === 'register' ? document.getElementById('auth-phone')?.value.trim() : '',
    avatar: name.charAt(0).toUpperCase(),
    createdAt: Date.now()
  };

  // 初始化家庭数据
  if (!appData.family) {
    appData.family = {
      members: [
        { id: currentUser.id, name: currentUser.name, role: 'owner', avatar: currentUser.avatar }
      ],
      shareCode: generateShareCode()
    };
    saveData(appData);
  }

  localStorage.setItem('pet_companion_user', JSON.stringify(currentUser));
  showApp();
}

function skipAuth() {
  currentUser = {
    id: 'guest',
    name: '体验用户',
    avatar: '体',
    isGuest: true
  };

  if (!appData.family) {
    appData.family = {
      members: [
        { id: 'guest', name: '体验用户', role: 'owner', avatar: '体' },
        { id: 'm_1', name: '妈妈', role: 'member', avatar: '妈' },
        { id: 'm_2', name: '妹妹', role: 'member', avatar: '妹' }
      ],
      shareCode: generateShareCode()
    };
    saveData(appData);
  }

  showApp();
}

function logout() {
  localStorage.removeItem('pet_companion_user');
  currentUser = null;
  document.getElementById('auth-user-bar').style.display = 'none';
  showAuth();
}

function generateShareCode() {
  return Math.random().toString(36).substr(2, 6).toUpperCase();
}

/* ============================================
   11. 家庭成员共享模块
   ============================================ */
function updateFamilyCount() {
  const family = appData.family;
  if (family) {
    document.getElementById('family-count-text').textContent = `家庭(${family.members.length}人)`;
  }
}

function openFamilyModal() {
  const family = appData.family || { members: [], shareCode: '' };
  const avatarColors = ['#d4594a', '#42A5F5', '#66BB6A', '#AB47BC', '#FF9800', '#26C6DA'];

  const modal = document.getElementById('modal-content');
  modal.innerHTML = `
    <div class="modal-header">
      <h3>家庭成员</h3>
      <span class="modal-close" onclick="closeModal()"><svg class="icc" width="18" height="18"><use href="#c-close"/></svg></span>
    </div>
    <div class="modal-body">
      <div class="family-share-code">
        <div class="code-label">家庭分享码</div>
        <div class="code-value">${family.shareCode || '------'}</div>
        <div class="code-hint">将此码分享给家人，他们输入后即可加入家庭</div>
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
        <h4 style="font-size:15px; font-weight:600;">成员列表</h4>
        <span style="font-size:12px; color:var(--text-tertiary);">${family.members.length} 位成员</span>
      </div>
      <div id="family-members-list">
        ${family.members.map((m, idx) => `
          <div class="family-member-item">
            <div class="family-member-avatar" style="background:${avatarColors[idx % avatarColors.length]}">${m.avatar || m.name.charAt(0)}</div>
            <div class="family-member-info">
              <div class="family-member-name">${m.name}${m.id === currentUser?.id ? '（我）' : ''}</div>
              <div class="family-member-role ${m.role === 'owner' ? 'owner' : ''}">${m.role === 'owner' ? '管理员' : '家庭成员'}</div>
            </div>
            ${m.role === 'owner' && m.id !== currentUser?.id ? '' : m.role !== 'owner' ? `<div class="delete-btn" onclick="removeFamilyMember('${m.id}')"><svg class="icc" width="16" height="16"><use href="#c-trash"/></svg></div>` : ''}
          </div>
        `).join('')}
      </div>
      <button class="family-invite-btn" onclick="openInviteModal()">+ 邀请家庭成员</button>
      <button class="family-invite-btn" onclick="openJoinFamilyModal()" style="margin-top:8px; color:var(--primary-mid);">输入分享码加入家庭</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-block" onclick="closeModal()">关闭</button>
      ${currentUser && !currentUser.isGuest ? '<button class="btn btn-secondary btn-block" onclick="logout()">退出登录</button>' : ''}
    </div>
  `;
  openModal();
}

function openInviteModal() {
  const family = appData.family;
  const modal = document.getElementById('modal-content');
  modal.innerHTML = `
    <div class="modal-header">
      <h3>邀请家庭成员</h3>
      <span class="modal-close" onclick="openFamilyModal()"><svg class="icc" width="18" height="18"><use href="#c-close"/></svg></span>
    </div>
    <div class="modal-body">
      <div class="family-share-code">
        <div class="code-label">你的家庭分享码</div>
        <div class="code-value">${family.shareCode}</div>
        <div class="code-hint">将此码分享给家人，他们在注册后输入即可加入</div>
      </div>
      <div class="input-group">
        <label>或直接添加成员</label>
        <input type="text" id="invite-name" placeholder="输入家庭成员昵称">
      </div>
      <div class="input-group">
        <label>角色</label>
        <select id="invite-role">
          <option value="member">家庭成员</option>
          <option value="admin">管理员</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-block" onclick="openFamilyModal()">返回</button>
      <button class="btn btn-primary btn-block" onclick="addFamilyMember()">添加成员</button>
    </div>
  `;
  openModal();
}

function addFamilyMember() {
  const name = document.getElementById('invite-name').value.trim();
  if (!name) {
    alert('请输入成员昵称');
    return;
  }

  const role = document.getElementById('invite-role').value;
  const newMember = {
    id: 'm_' + Date.now(),
    name: name,
    role: role,
    avatar: name.charAt(0).toUpperCase()
  };

  appData.family.members.push(newMember);
  saveData(appData);
  updateFamilyCount();
  openFamilyModal();
}

function removeFamilyMember(memberId) {
  if (!confirm('确定移除该家庭成员吗？')) return;
  appData.family.members = appData.family.members.filter(m => m.id !== memberId);
  saveData(appData);
  updateFamilyCount();
  openFamilyModal();
}

function openJoinFamilyModal() {
  const modal = document.getElementById('modal-content');
  modal.innerHTML = `
    <div class="modal-header">
      <h3>加入家庭</h3>
      <span class="modal-close" onclick="openFamilyModal()"><svg class="icc" width="18" height="18"><use href="#c-close"/></svg></span>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <label>家庭分享码</label>
        <input type="text" id="join-code" placeholder="输入6位分享码" maxlength="6" style="text-align:center; font-size:20px; letter-spacing:4px;">
      </div>
      <div style="text-align:center; color:var(--text-tertiary); font-size:12px; margin-top:8px;">
        输入家人的分享码即可加入他们的家庭，<br>共同管理宠物档案
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-block" onclick="openFamilyModal()">返回</button>
      <button class="btn btn-primary btn-block" onclick="joinFamily()">加入</button>
    </div>
  `;
  openModal();
}

function joinFamily() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code || code.length !== 6) {
    alert('请输入6位分享码');
    return;
  }

  // 模拟加入家庭
  if (currentUser) {
    const existing = appData.family.members.find(m => m.id === currentUser.id);
    if (!existing) {
      appData.family.members.push({
        id: currentUser.id,
        name: currentUser.name,
        role: 'member',
        avatar: currentUser.avatar
      });
      saveData(appData);
      updateFamilyCount();
    }
  }

  alert('成功加入家庭！');
  closeModal();
}

/* ============================================
   12. 日记日期筛选模块
   ============================================ */

function filterDiary(type, el) {
  diaryFilter = type;
  diaryDateFilter = null;
  document.getElementById('diary-date-filter').value = '';
  document.getElementById('diary-filter-clear').classList.remove('show');

  document.querySelectorAll('.diary-filter-btn').forEach(btn => btn.classList.remove('active'));
  if (el) el.classList.add('active');

  renderGallery();
}

function filterDiaryByDate(dateStr) {
  if (dateStr) {
    diaryDateFilter = dateStr;
    diaryFilter = 'date';
    document.querySelectorAll('.diary-filter-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('diary-filter-clear').classList.add('show');
  } else {
    clearDiaryFilter();
  }
  renderGallery();
}

function clearDiaryFilter() {
  diaryFilter = 'all';
  diaryDateFilter = null;
  document.getElementById('diary-date-filter').value = '';
  document.getElementById('diary-filter-clear').classList.remove('show');
  document.querySelector('.diary-filter-btn').classList.add('active');
  document.querySelectorAll('.diary-filter-btn').forEach((btn, idx) => {
    btn.classList.toggle('active', idx === 0);
  });
  renderGallery();
}

function getFilteredDiaries(allDiaries) {
  const now = new Date();
  let filtered = allDiaries;

  if (diaryFilter === 'week') {
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay());
    weekStart.setHours(0, 0, 0, 0);
    filtered = allDiaries.filter(d => d.timestamp >= weekStart.getTime());
  } else if (diaryFilter === 'month') {
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    filtered = allDiaries.filter(d => d.timestamp >= monthStart.getTime());
  } else if (diaryFilter === 'date' && diaryDateFilter) {
    const filterDate = new Date(diaryDateFilter);
    const nextDay = new Date(diaryDateFilter);
    nextDay.setDate(nextDay.getDate() + 1);
    filtered = allDiaries.filter(d => {
      return d.timestamp >= filterDate.getTime() && d.timestamp < nextDay.getTime();
    });
  }

  return filtered;
}
</script>
