<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperLens - AI论文速读助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #07c160;
  --primary-light: #38d976;
  --primary-dark: #06ad56;
  --primary-bg: rgba(7,193,96,0.08);
  --primary-bg2: rgba(7,193,96,0.15);
  --bg: #ffffff;
  --bg2: #f7f8fa;
  --bg3: #eef0f3;
  --text: #1a1a2e;
  --text2: #555770;
  --text3: #8e8ea0;
  --border: #e5e6eb;
  --card: #ffffff;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 60px;
  --font: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
}
.dark {
  --primary: #38d976;
  --primary-light: #5ee890;
  --primary-dark: #07c160;
  --primary-bg: rgba(56,217,118,0.1);
  --primary-bg2: rgba(56,217,118,0.18);
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --text: #e8e8ef;
  --text2: #a0a0b8;
  --text3: #6c6c80;
  --border: #2a2a40;
  --card: #1e1e36;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  transition: background 0.3s, color 0.3s;
  padding-top: var(--nav-h);
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

/* NAV */
.nav {
  position: fixed; top:0; left:0; right:0; height: var(--nav-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  z-index: 1000;
  box-shadow: var(--shadow);
  transition: background 0.3s, border 0.3s;
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-size: 20px; font-weight: 700; color: var(--primary);
  text-decoration: none;
}
.nav-brand svg { width:28px; height:28px; }
.nav-tabs { display:flex; gap:4px; }
.nav-tab {
  padding: 8px 18px; border-radius: 20px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--text2);
  transition: all 0.25s; border: none; background: transparent;
  font-family: var(--font);
}
.nav-tab:hover { background: var(--primary-bg); color: var(--primary); }
.nav-tab.active { background: var(--primary); color: #fff; }
.nav-actions { display:flex; align-items:center; gap:12px; }
.theme-btn {
  width:36px; height:36px; border-radius:50%; border:1px solid var(--border);
  background: var(--bg2); cursor:pointer; display:flex; align-items:center;
  justify-content:center; font-size:18px; transition: all 0.3s;
}
.theme-btn:hover { border-color: var(--primary); background: var(--primary-bg); }

/* MAIN */
.main { max-width: 1200px; margin: 0 auto; padding: 24px; }
.tab-panel { display:none; animation: fadeIn 0.35s ease; }
.tab-panel.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* CARDS */
.card {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 24px;
  box-shadow: var(--shadow); transition: all 0.3s;
}
.card:hover { box-shadow: var(--shadow-lg); }
.card-title {
  font-size: 16px; font-weight: 700; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px; color: var(--text);
}
.card-title .icon { color: var(--primary); font-size: 18px; }

/* TEXTAREA */
.text-area-wrap { position:relative; }
.text-area {
  width:100%; min-height: 280px; padding:16px; border-radius: var(--radius-sm);
  border: 2px solid var(--border); background: var(--bg2); color: var(--text);
  font-family: var(--font); font-size: 14px; line-height: 1.8;
  resize: vertical; transition: border 0.3s;
}
.text-area:focus { outline:none; border-color: var(--primary); }
.text-area::placeholder { color: var(--text3); }
.char-count {
  position:absolute; bottom:12px; right:12px;
  font-size:12px; color: var(--text3); background: var(--bg);
  padding: 2px 8px; border-radius: 10px;
}

/* BUTTONS */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding: 10px 22px; border-radius: 20px; border:none;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  cursor:pointer; transition: all 0.25s;
}
.btn-primary { background: var(--primary); color:#fff; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(7,193,96,0.3); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.btn-outline { background:transparent; border:1.5px solid var(--primary); color: var(--primary); }
.btn-outline:hover { background: var(--primary-bg); }
.btn-ghost { background: var(--bg2); color: var(--text2); }
.btn-ghost:hover { background: var(--primary-bg); color: var(--primary); }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-group { display:flex; gap:8px; flex-wrap:wrap; }

/* SAMPLE PAPERS */
.sample-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap:12px; margin-top:12px; }
.sample-card {
  padding:14px; border-radius: var(--radius-sm); border:1.5px solid var(--border);
  cursor:pointer; transition: all 0.25s; background: var(--bg);
}
.sample-card:hover { border-color: var(--primary); background: var(--primary-bg); transform: translateY(-2px); }
.sample-card .title { font-size:13px; font-weight:600; color: var(--text); margin-bottom:4px; }
.sample-card .meta { font-size:11px; color: var(--text3); }

/* LOADING */
.loading-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4);
  z-index:2000; align-items:center; justify-content:center;
}
.loading-overlay.show { display:flex; }
.loading-box {
  background: var(--card); border-radius: var(--radius); padding:40px;
  text-align:center; box-shadow: var(--shadow-lg);
}
.spinner {
  width:48px; height:48px; border:3px solid var(--bg3);
  border-top-color: var(--primary); border-radius:50%;
  animation: spin 0.8s linear infinite; margin:0 auto 16px;
}
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { color: var(--text2); font-size:14px; }

/* RESULT */
.result-section { margin-top:20px; }
.result-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px; flex-wrap:wrap; gap:8px;
}
.result-title { font-size:22px; font-weight:900; color: var(--text); line-height:1.4; }
.result-meta { display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
.result-meta .tag {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 12px; border-radius:14px; font-size:12px; font-weight:500;
}
.tag-green { background: var(--primary-bg2); color: var(--primary-dark); }
.tag-blue { background: rgba(59,130,246,0.1); color: #3b82f6; }
.tag-orange { background: rgba(245,158,11,0.1); color: #f59e0b; }
.tag-purple { background: rgba(139,92,246,0.1); color: #8b5cf6; }
.dark .tag-green { color: var(--primary-light); }

.stat-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap:12px; margin:16px 0; }
.stat-item {
  text-align:center; padding:14px; border-radius: var(--radius-sm);
  background: var(--bg2); border:1px solid var(--border);
}
.stat-num { font-size:24px; font-weight:900; color: var(--primary); }
.stat-label { font-size:11px; color: var(--text3); margin-top:2px; }

.section-block { margin-bottom:16px; }
.section-block-title {
  font-size:15px; font-weight:700; color: var(--primary);
  margin-bottom:8px; display:flex; align-items:center; gap:6px;
}
.section-block-content {
  font-size:14px; color: var(--text2); line-height:1.9;
  padding:12px 16px; background: var(--bg2); border-radius: var(--radius-sm);
  border-left: 3px solid var(--primary);
}
.keyword-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.keyword-tag {
  padding:4px 12px; border-radius:14px; font-size:12px;
  background: var(--primary-bg); color: var(--primary-dark);
  border:1px solid rgba(7,193,96,0.2);
}
.dark .keyword-tag { color: var(--primary-light); }

/* SPEED CARD */
.speed-card {
  background: linear-gradient(135deg, var(--primary) 0%, #05a34e 100%);
  color:#fff; border-radius: var(--radius); padding:24px; margin-top:16px;
  position:relative; overflow:hidden;
}
.speed-card::before {
  content:''; position:absolute; top:-30px; right:-30px;
  width:120px; height:120px; border-radius:50%;
  background:rgba(255,255,255,0.1);
}
.speed-card h3 { font-size:16px; font-weight:700; margin-bottom:12px; }
.speed-card .sc-title { font-size:18px; font-weight:900; margin-bottom:8px; }
.speed-card .sc-meta { font-size:12px; opacity:0.85; margin-bottom:12px; }
.speed-card .sc-body { font-size:13px; line-height:1.8; opacity:0.95; }
.speed-card .sc-body p { margin-bottom:6px; }
.speed-card .sc-body strong { font-weight:700; }

/* COMPARE */
.compare-grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
.compare-col .text-area { min-height:180px; }
.compare-result { margin-top:20px; }
.compare-table {
  width:100%; border-collapse:collapse; font-size:13px;
}
.compare-table th {
  background: var(--primary-bg2); color: var(--primary-dark);
  padding:10px 14px; text-align:left; font-weight:600;
  border-bottom:2px solid var(--primary);
}
.dark .compare-table th { color: var(--primary-light); }
.compare-table td {
  padding:10px 14px; border-bottom:1px solid var(--border);
  color: var(--text2); vertical-align:top;
}
.compare-table tr:hover td { background: var(--primary-bg); }

/* HISTORY */
.history-item {
  display:flex; align-items:center; gap:16px; padding:16px;
  border-radius: var(--radius-sm); border:1px solid var(--border);
  margin-bottom:10px; transition: all 0.25s; cursor:pointer;
  background: var(--bg);
}
.history-item:hover { border-color: var(--primary); background: var(--primary-bg); }
.history-icon {
  width:42px; height:42px; border-radius:10px; background: var(--primary-bg2);
  display:flex; align-items:center; justify-content:center;
  color: var(--primary); font-size:18px; flex-shrink:0;
}
.history-info { flex:1; min-width:0; }
.history-info .h-title { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.history-info .h-date { font-size:12px; color:var(--text3); }
.history-actions { display:flex; gap:6px; }
.empty-state {
  text-align:center; padding:60px 20px; color: var(--text3);
}
.empty-state .icon { font-size:48px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* TOAST */
.toast-container { position:fixed; top:80px; right:24px; z-index:3000; }
.toast {
  padding:12px 20px; border-radius: var(--radius-sm);
  background: var(--card); border:1px solid var(--border);
  box-shadow: var(--shadow-lg); font-size:13px; color: var(--text);
  display:flex; align-items:center; gap:8px; margin-bottom:8px;
  animation: toastIn 0.3s ease;
  max-width:320px;
}
.toast.success { border-left:3px solid var(--primary); }
.toast.error { border-left:3px solid #ef4444; }
@keyframes toastIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

/* DIFFICULTY */
.diff-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 12px; border-radius:14px; font-size:12px; font-weight:600;
}
.diff-beginner { background:rgba(34,197,94,0.1); color:#16a34a; }
.diff-medium { background:rgba(245,158,11,0.1); color:#d97706; }
.diff-advanced { background:rgba(239,68,68,0.1); color:#dc2626; }
.dark .diff-beginner { color:#4ade80; }
.dark .diff-medium { color:#fbbf24; }
.dark .diff-advanced { color:#f87171; }

/* RESPONSIVE */
@media(max-width:768px) {
  .nav { padding:0 12px; }
  .nav-brand span { display:none; }
  .nav-tab { padding:6px 12px; font-size:12px; }
  .main { padding:16px; }
  .compare-grid { grid-template-columns:1fr; }
  .sample-grid { grid-template-columns:1fr; }
  .stat-grid { grid-template-columns: repeat(2,1fr); }
  .result-title { font-size:18px; }
}
@media(max-width:480px) {
  .nav-tabs { gap:2px; }
  .nav-tab { padding:5px 8px; font-size:11px; }
  .btn { padding:8px 14px; font-size:12px; }
}

/* ANIMATION UTILS */
.fade-up { animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.delay-1 { animation-delay:0.1s; }
.delay-2 { animation-delay:0.2s; }
.delay-3 { animation-delay:0.3s; }
.delay-4 { animation-delay:0.4s; }
</style>
</head>

<script>
// ============================================================
// PaperLens - AI论文速读助手
// ============================================================

// ---- 示例论文数据 ----
const SAMPLE_PAPERS = [
  {
    id: 'attention',
    title: 'Attention Is All You Need',
    authors: 'Ashish Vaswani, Noam Shazeer, Niki Parmar, Jakob Uszkoreit, Llion Jones, Aidan N. Gomez, Lukasz Kaiser, Illia Polosukhin',
    venue: 'NeurIPS 2017',
    year: 2017,
    text: `Attention Is All You Need
Ashish Vaswani, Noam Shazeer, Niki Parmar, Jakob Uszkoreit, Llion Jones, Aidan N. Gomez, Lukasz Kaiser, Illia Polosukhin
NeurIPS 2017

Abstract
The dominant sequence transduction models are based on complex recurrent or convolutional neural networks that include an encoder and a decoder. The best performing models also connect the encoder and decoder through an attention mechanism. We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely. Experiments on two machine translation tasks show these models to be superior in quality while being more parallelizable and requiring significantly less training time. Our model achieves 28.4 BLEU on the WMT 2014 English-to-German translation task, improving over the existing best results, including ensembles, by over 2 BLEU. On the WMT 2014 English-to-French translation task, our model establishes a new single-model state-of-the-art BLEU score of 41.8 after training for 3.5 days on eight GPUs, a small fraction of the training costs of the best models from the literature.

1 Introduction
Recurrent neural networks, particularly long short-term memory and gated recurrent neural networks, have been firmly established as state of the art approaches in sequence modeling and transduction problems such as language modeling and machine translation. Ever since their introduction, recurrent neural networks have been extended with attention mechanisms to capture the dependency between the encoder and decoder, and between different time steps of the decoder. Attention mechanisms have become an integral part of compelling sequence modeling and transduction models in various tasks, allowing modeling of dependencies without regard to their distance in the input or output sequences. However, recurrent models typically factor computation along the symbol positions of the input and output sequences. Aligning positions to steps in computation time, they generate a sequence of hidden states, and use the previous hidden state and the input at the current position to generate the next hidden state. This inherently sequential nature precludes parallelization within training examples, which becomes critical at longer sequence lengths, as memory constraints limit batching across examples. Recent work has achieved significant improvements in computational efficiency through factorization tricks and conditional computation, while also improving model performance in some cases. However, the fundamental constraint of sequential computation remains.

3 Model Architecture
Most competitive neural sequence transduction models have an encoder-decoder structure. Here, the encoder maps an input sequence of symbol representations to a sequence of continuous representations. Given a sequence of continuous representations, the decoder then generates an output sequence of symbols one element at a time. At each step the model is auto-regressive, consuming the previously generated symbols as additional input when generating the next. The Transformer follows this overall architecture using stacked self-attention and point-wise, fully connected layers for both the encoder and decoder. The encoder is composed of a stack of N=6 identical layers. Each layer has two sub-layers. The first is a multi-head self-attention mechanism, and the second is a simple, position-wise fully connected feed-forward network. We employ a residual connection around each of the two sub-layers, followed by layer normalization. The decoder is also composed of a stack of N=6 identical layers. In addition to the two sub-layers in each encoder layer, the decoder inserts a third sub-layer, which performs multi-head attention over the output of the encoder stack. Scaled Dot-Product Attention is computed as Attention(Q,K,V) = softmax(QK^T / sqrt(d_k))V. Multi-head attention allows the model to jointly attend to information from different representation subspaces at different positions. The Transformer model uses only attention mechanisms without any recurrent or convolutional layers, making it significantly more parallelizable and faster to train.

5 Training
We trained the Transformer on the standard WMT 2014 English-to-German dataset, which contains about 4.5 million sentence pairs. We used a byte-pair encoding vocabulary of 37000 tokens. For the English-to-French translation task, we used the significantly larger WMT 2014 English-French dataset consisting of 36 million sentences and a split vocabulary of 32000 word pieces. Sentence pairs were batched together by approximate sequence length. Each training batch contained a set of sentence pairs containing approximately 25000 source tokens and 25000 target tokens. We used the Adam optimizer with beta1=0.9, beta2=0.98, and epsilon=1e-9. We varied the learning rate over the course of training, increasing it linearly for the first warmup steps, then decreasing it proportionally to the inverse square root of the step number. We set warmup steps to 4000.

7 Results
On the WMT 2014 English-to-German translation task, the big transformer model outperforms the best previously reported models by over 2.0 BLEU, establishing a new state-of-the-art BLEU score of 28.4. Table 2 shows that the base model surpasses all previously reported models by over 0.5 BLEU at a fraction of the training cost. On the WMT 2014 English-to-French translation task, our model obtains a BLEU score of 41.0, outperforming all previously published single models, while training at a fraction of the cost of previous state-of-the-art models. Training the base model took 3.5 days on 8 GPUs. The big model took 3.5 days on 8 GPUs as well. We believe the Transformer architecture will enable further improvements in translation quality and generalization to other tasks.

References
[1] Bahdanau, D., Cho, K., and Bengio, Y. Neural machine translation by jointly learning to align and translate. ICLR 2015.
[2] Cho, K., Van Merrienboer, B., Gulcehre, C., et al. Learning phrase representations using RNN encoder-decoder for statistical machine translation. EMNLP 2014.
[3] Gehring, J., Auli, M., Dauphin, Y. N., et al. Convolutional sequence to sequence learning. ICML 2017.
[4] Vaswani, A., Shazeer, N., Parmar, N., et al. Attention is all you need. NeurIPS 2017.

    id: 'bert',
    title: 'BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding',
    authors: 'Jacob Devlin, Ming-Wei Chang, Kenton Lee, Kristina Toutanova',
    venue: 'NAACL 2019',
    year: 2019,
    text: `BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding
Jacob Devlin, Ming-Wei Chang, Kenton Lee, Kristina Toutanova
NAACL 2019

Abstract
We introduce a new language representation model called BERT, which stands for Bidirectional Encoder Representations from Transformers. Unlike recent language representation models, BERT is designed to pre-train deep bidirectional representations from unlabeled text by jointly conditioning on both left and right context in all layers. As a result, the pre-trained BERT model can be fine-tuned with just one additional output layer to create state-of-the-art models for a wide range of tasks, such as question answering and language inference, without substantial task-specific architecture modifications. BERT is conceptually simple and empirically powerful. It obtains new state-of-the-art results on eleven natural language processing tasks, including pushing the GLUE benchmark to 80.5%, the MultiNLI accuracy to 86.7%, and the SQuAD v1.1 question answering test F1 to 93.2.

1 Introduction
Language model pre-training has been shown to be effective for improving many natural language processing tasks. These include approaches such as feature-based methods and fine-tuning methods. Pre-trained word embeddings are an integral part of modern NLP systems, offering significant improvements over methods that learn embeddings from scratch. There are two existing strategies for applying pre-trained language representations to downstream tasks: feature-based and fine-tuning. The feature-based approach, such as ELMo, uses task-specific architectures that include the pre-trained representations as additional features. The fine-tuning approach, such as OpenAI GPT, introduces minimal task-specific parameters, and is trained on the downstream tasks by simply fine-tuning all pretrained parameters. The two approaches share the same objective function during pre-training, where they use unidirectional language models to learn general language representations. We argue that current techniques restrict the power of pre-trained representations, especially for the fine-tuning approach. The key limitation is that standard language models are unidirectional, and this restricts the architecture choice during pre-training. Every token is only conditioned on its left context. This restriction is sub-optimal for sentence-level tasks, and could be very harmful when applying fine-tuning based approaches to token-level tasks such as question answering, where it is crucial to incorporate context from both directions.

3 Methodology
BERT is designed to pre-train a deep bidirectional representation from unlabeled text. The model architecture is a multi-layer bidirectional Transformer encoder. BERT uses a multi-layer bidirectional Transformer encoder, which is identical to the encoder in the original Transformer. The number of layers (Transformer blocks) is denoted as L, the hidden size is H, and the number of self-attention heads is A. BERT has two pre-training tasks: Masked Language Model (MLM) and Next Sentence Prediction (NSP). For the MLM task, we randomly mask 15% of the input tokens, and the objective is to predict the original vocabulary id of the masked word based only on its context. Unlike previous methods, the MLM objective enables the representation to fuse left and right contexts, allowing us to pre-train a deep bidirectional Transformer. The NSP task is a binary classification task where the model predicts whether two sentences appear consecutively in the original text. For input representation, BERT uses WordPiece embeddings with a 30000 token vocabulary. The first token of every sequence is always a special classification token [CLS]. The final hidden state corresponding to this token is used as the aggregate sequence representation for classification tasks. Sentence pairs are packed together into a single sequence with special tokens [SEP] separating them.

5 Experiments
We evaluate BERT on the GLUE benchmark, SQuAD v1.1, and SQuAD v2.0. For the GLUE benchmark, BERT achieves 80.5% accuracy, an improvement of 7.7% over the previous state-of-the-art. On SQuAD v1.1, BERT achieves 93.2% F1 score, surpassing the previous best system by 1.5 points. On SQuAD v2.0, BERT achieves 83.1% F1 score. BERT-Base has 12 layers, 768 hidden units, and 12 attention heads, with 110 million parameters. BERT-Large has 24 layers, 1024 hidden units, and 16 attention heads, with 340 million parameters. BERT was pre-trained on BooksCorpus (800M words) and English Wikipedia (2,500M words).

7 Conclusion
We introduced BERT, a simple yet powerful pre-training approach for language understanding. BERT learns deep bidirectional representations from unlabeled text by jointly conditioning on both left and right context. BERT obtains new state-of-the-art results on eleven NLP tasks. The pre-trained BERT models can be effectively fine-tuned with just one additional output layer for a wide range of downstream tasks.

References
[1] Devlin, J., Chang, M.-W., Lee, K., and Toutanova, K. BERT: Pre-training of deep bidirectional transformers for language understanding. NAACL 2019.
[2] Peters, M., Neumann, M., Iyyer, M., et al. Deep contextualized word representations. NAACL 2018.
[3] Radford, A., Salakhutdinov, R. Improving language understanding by generative pre-training. OpenAI 2018.
[4] Rajpurkar, P., Zhang, J., Lopyrev, K., and Liang, P. SQuAD: 100,000+ questions for machine comprehension of text. EMNLP 2016.
[5] Williams, A., Nangia, N., and Bowman, S. A broad-coverage challenge corpus for sentence understanding through inference. NAACL 2018.`

    id: 'resnet',
    title: 'Deep Residual Learning for Image Recognition',
    authors: 'Kaiming He, Xiangyu Zhang, Shaoqing Ren, Jian Sun',
    venue: 'CVPR 2016',
    year: 2016,
    text: `Deep Residual Learning for Image Recognition
Kaiming He, Xiangyu Zhang, Shaoqing Ren, Jian Sun
CVPR 2016

Abstract
Deeper neural networks are more difficult to train. We present a residual learning framework to ease the training of networks that are substantially deeper than those used previously. We explicitly reformulate the layers as learning residual functions with reference to the layer inputs, instead of learning unreferenced functions. We provide comprehensive empirical evidence showing that these residual networks are easier to optimize, and can gain accuracy from considerably increased depth. On the ImageNet dataset we evaluate residual nets with a depth of up to 152 layers, which is 8 times deeper than VGG nets but still having lower complexity. An ensemble of these residual nets achieves 3.57% error on the ImageNet test set. This result won the first place on the ILSVRC 2015 classification task. We also present analysis on CIFAR-10 with 100 and 1000 layers. The depth of representations is of central importance for many visual recognition tasks. Solely due to the extremely deep representations, we obtain a 28% relative improvement on the COCO object detection dataset. Deep residual nets are foundations of our submissions to ILSVRC and COCO 2015 competitions, where we also won the 1st places on the tasks of ImageNet detection, ImageNet localization, COCO detection, and COCO segmentation.

1 Introduction
Deep networks naturally integrate low/mid/high-level features and classifiers in an end-to-end multi-layer fashion, and the levels of features can be enriched by stacking more layers. With the network depth increasing, accuracy gets saturated and then degrades rapidly. Unexpectedly, such degradation is not caused by overfitting, and adding more layers to a suitably deep model leads to higher training error. The degradation problem suggests that not all systems are similarly easy to optimize. Let us consider a shallower architecture and its deeper counterpart that adds more layers onto it. There exists a solution by construction to the deeper model: the added layers are identity mapping, and the other layers are copied from the learned shallower model. This identity mapping solution, while constructed, suggests that the deeper model should produce no worse training error than its shallower counterpart. However, experiments show that our current solvers are unable to find solutions that are comparably good or better than the constructed solution in practice.

3 Deep Residual Learning
We hypothesize that it is easier to optimize residual mappings than to optimize the original, unreferenced mappings. Formally, denoting the desired underlying mapping as H(x), we let the stacked nonlinear layers fit another mapping F(x) = H(x) - x. The original mapping is recast as F(x) + x. We hypothesize that it is easier to optimize the residual mapping F(x) than to optimize the original mapping H(x). If the identity mapping is optimal, it is easier to push the residual to zero than to fit an identity mapping by a stack of nonlinear layers. The formulation of F(x) + x can be realized by feedforward neural networks with shortcut connections. Shortcut connections are those skipping one or more layers. In our case, the shortcut connections simply perform identity mapping, and their outputs are added to the outputs of the stacked layers. Identity shortcut connections add neither extra parameter nor computational complexity. The entire network can still be trained end-to-end by SGD with backpropagation. We adopt residual learning to every few stacked layers. A building block is shown in Fig. 2. Formally, we consider a building block defined as y = F(x, Wi) + x, where x and y are the input and output vectors of the considered layers. The function F(x, Wi) represents the residual mapping to be learned. For the example in Fig. 2 that has two layers, F = W2 * sigma(W1 * x) in which sigma denotes ReLU. The dimensions of x and F must be equal in Eqn.(1). If this is not the case, we can perform a linear projection Ws by the shortcut connections to match the dimensions: y = F(x, Wi) + Ws * x.

5 Experiments
We evaluate our method on the ImageNet 2012 classification dataset, CIFAR-10, and CIFAR-100. On ImageNet, we evaluate residual nets with depths of 18, 34, 50, 101, and 152 layers. Plain networks of 18 and 34 layers are also evaluated for comparison. The 34-layer residual net has 3.6 billion FLOPs, which is only 18% more than that of the 18-layer plain net. The 152-layer residual net achieves a top-1 error rate of 4.49% on the ImageNet validation set, which is significantly better than all previous results. An ensemble of 152-layer residual nets achieves 3.57% top-5 error on the ImageNet test set, winning the 1st place in ILSVRC 2015. On CIFAR-10, a 100-layer residual net achieves 6.43% test error, and a 1000-layer residual net achieves 7.51% test error. These results demonstrate that depth is extremely important for visual recognition, and residual learning enables training of very deep networks.

7 Conclusion
We have presented a residual learning framework. Our comprehensive evaluations indicate that residual networks are easier to optimize and can gain accuracy from considerably increased depth. The depth of representations is of central importance for many visual recognition tasks. Deep residual nets with over 100 layers achieve state-of-the-art results on ImageNet classification, COCO detection, and other tasks. Our 152-layer residual network won the 1st place in ILSVRC 2015 with a top-5 error of 3.57%.

References

// ---- 分析引擎 ----
const PaperAnalyzer = {
  analyze(text) {
    if (!text || text.trim().length < 50) return null;
    const raw = text;

    // 1. 提取标题
    const title = this.extractTitle(raw);

    // 2. 提取作者
    const authors = this.extractAuthors(raw);

    // 3. 提取年份（优先从会议/期刊名匹配）
    const year = this.extractYear(raw);

    // 4. 提取发表信息
    const venue = this.extractVenue(raw);

    // 5. 提取各章节
    const sections = this.extractSections(raw);

    // 6. 提取摘要
    const abstract = sections.abstract || '';

    // 7. 中文摘要翻译
    const abstractCN = this.translateToCN(abstract);

    // 8. 研究背景
    const background = this.extractKeySentences(sections.introduction || '', 4);

    // 9. 研究方法
    const method = this.extractKeySentences(sections.methodology || '', 5);

    // 10. 核心结论
    const conclusion = this.extractKeySentences(sections.conclusion || sections.results || '', 4);

    // 11. 关键词
    const keywords = this.extractKeywords(raw);

    // 12. 统计信息
    const stats = this.computeStats(raw, authors);

    // 13. 难度评估
    const difficulty = this.assessDifficulty(raw, stats);

    return {
      title, authors, year, venue,
      abstract, abstractCN,
      background, method, conclusion,
      keywords, stats, difficulty,
      analyzedAt: new Date().toISOString()
    };
  },

  extractTitle(text) {
    // 尝试从第一行非空行提取
    const lines = text.split('\n').filter(l => l.trim().length > 0);
    if (lines.length > 0) {
      let title = lines[0].trim();
      // 去除可能的编号前缀
      title = title.replace(/^\d+[\.\)]\s*/, '');
      // 如果第一行太短，可能是标题
      if (title.length > 5 && title.length < 300) return title;
    }
    // 尝试匹配标题行模式
    const titleMatch = text.match(/^(?:Title[:\s]*)?(.{10,200})$/m);
    return titleMatch ? titleMatch[1].trim() : '未知标题';
  },

  extractAuthors(text) {
    // 尝试匹配作者行（通常在标题后）
    const lines = text.split('\n').filter(l => l.trim().length > 0);
    if (lines.length > 1) {
      // 查找包含逗号分隔的名字的行
      for (let i = 1; i < Math.min(lines.length, 5); i++) {
        const line = lines[i].trim();
        // 检查是否像作者列表（多个名字用逗号或"and"分隔）
        const nameCount = (line.match(/\b[A-Z][a-z]+\b/g) || []).length;
        if (nameCount >= 2 && nameCount <= 20 && line.length < 500) {
          return line.replace(/^Authors?[:\s]*/i, '').trim();
        }
      }
    }
    return '未知作者';
  },

  extractYear(text) {
    // 排除References区域，只在正文部分匹配
    const refIdx = text.search(/^(?:References|Bibliography|REFERENCES)\s*$/m);
    const bodyText = refIdx > 0 ? text.substring(0, refIdx) : text;

    // 优先级1：从已知会议/期刊名匹配年份（在正文中）
    const venuePatterns = [
      /(?:NeurIPS|NIPS|ICML|ICLR|CVPR|ECCV|ICCV|AAAI|IJCAI|NAACL|ACL|EMNLP|COLING|SIGIR|KDD|WWW|CHI)\s*(\d{4})/i,
      /(?:Conference|Workshop|Proceedings)\s+on\s+.*?(\d{4})/i,
      /(?:Advances in|Proceedings of)\s+.*?(\d{4})/i,
      /arXiv[:\s]*(\d{4})/,
      /IEEE\s+Trans(?:actions|\.?)\s+on\s+.*?(\d{4})/i
    ];
    for (const p of venuePatterns) {
      const m = bodyText.match(p);
      if (m) return parseInt(m[1]);
    }
    // 优先级2：从DOI匹配
    const doiMatch = text.match(/10\.\d{4,}\/[^\s]*?(\d{4})[^\s]*/);
    if (doiMatch) return parseInt(doiMatch[1]);
    // 优先级3：从Abstract和Introduction区域查找年份
    const abstractIntro = bodyText.match(/Abstract[\s\S]{0,3000}/i);
    if (abstractIntro) {
      const years = abstractIntro[0].match(/\b(19|20)\d{2}\b/g);
      if (years && years.length > 0) {
        const freq = {};
        years.forEach(y => freq[y] = (freq[y] || 0) + 1);
        return parseInt(Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0]);
      }
    }
    return null;
  },

  extractVenue(text) {
    const refIdx = text.search(/^(?:References|Bibliography|REFERENCES)\s*$/m);
    const bodyText = refIdx > 0 ? text.substring(0, refIdx) : text;
    const venuePatterns = [
      /(?:NeurIPS|NIPS)\s*\d{4}/i,
      /ICML\s*\d{4}/i,
      /ICLR\s*\d{4}/i,
      /CVPR\s*\d{4}/i,
      /ECCV\s*\d{4}/i,
      /ICCV\s*\d{4}/i,
      /AAAI\s*\d{4}/i,
      /IJCAI\s*\d{4}/i,
      /NAACL\s*\d{4}/i,
      /ACL\s*\d{4}/i,
      /EMNLP\s*\d{4}/i,
      /SIGIR\s*\d{4}/i,
      /KDD\s*\d{4}/i,
      /IEEE\s+Trans(?:actions|\.?)\s+on\s+[A-Z][A-Za-z]+/i
    ];
    for (const p of venuePatterns) {
      const m = bodyText.match(p);
      if (m) return m[0].trim();
    }
    return null;
  },

  extractSections(text) {
    const sections = {};
    // 提取Abstract
    const abstractMatch = text.match(/Abstract\s*\n([\s\S]*?)(?=\n\s*\d+\s)/i);
    if (abstractMatch) {
      sections.abstract = abstractMatch[1].trim();
    } else {
      // 备用：匹配Abstract到下一个章节
      const absMatch2 = text.match(/Abstract\s*\n([\s\S]*?)(?=\n\s*\d+\.\s+\w)/im);
      if (absMatch2) sections.abstract = absMatch2[1].trim();
    }

    // 定义章节标题模式
    const sectionPatterns = {
      introduction: /^(?:1|I)\s*\.?\s*(?:Introduction|Background|INTRODUCTION)$/im,
      methodology: /^(?:[234]\s*\.?\s*(?:Model|Method|Approach|Architecture|Framework|Methodology|METHOD)|3\s*\.?\s*(?:Model Architecture))/im,
      results: /^(?:[4567]\s*\.?\s*(?:Result|Experiment|Evaluation|RESULTS)|5\s*\.?\s*(?:Experiments)|7\s*\.?\s*(?:Results))/im,
      conclusion: /^(?:[6789]\s*\.?\s*(?:Conclusion|Discussion|Summary|CONCLUSION)|7\s*\.?\s*(?:Conclusion))/im
    };

    // 查找References位置
    const refMatch = text.match(/^(?:References|Bibliography|REFERENCES)\s*$/m);
    const refIndex = refMatch ? refMatch.index : text.length;

    // 提取各章节内容
    const lines = text.split('\n');
    let currentSection = null;
    let currentContent = [];

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const lineStart = text.indexOf(line);

      // 如果到达References区域，停止
      if (lineStart >= refIndex) break;

      // 检查是否是章节标题
      let matchedSection = null;
      for (const [key, pattern] of Object.entries(sectionPatterns)) {
        if (pattern.test(line.trim())) {
          matchedSection = key;
          break;
        }
      }

      if (matchedSection) {
        // 保存上一个章节
        if (currentSection) {
          sections[currentSection] = currentContent.join('\n').trim();
        }
        currentSection = matchedSection;
        currentContent = [];
      } else if (currentSection) {
        currentContent.push(line);
      }
    }
    // 保存最后一个章节
    if (currentSection) {
      sections[currentSection] = currentContent.join('\n').trim();
    }

    return sections;
  },

  extractKeySentences(sectionText, maxSentences) {
    if (!sectionText || sectionText.trim().length < 20) return [];

    // 分句
    const sentences = sectionText
      .replace(/\n+/g, ' ')
      .split(/(?<=[.!?])\s+/)
      .map(s => s.trim())
      .filter(s => s.length > 20 && s.length < 500);

    // 评分
    const scored = sentences.map(s => {
      let score = 0;
      const lower = s.toLowerCase();

      // 正面信号
      if (/we (propose|present|introduce|develop|design|show|demonstrate|achieve|find|discover|observe)/i.test(lower)) score += 3;
      if (/(state-of-the-art|novel|significant|important|key|crucial|essential|fundamental|remarkable|superior|outperform)/i.test(lower)) score += 2;
      if (/(improve|increase|reduce|achieve|obtain|gain|exceed|surpass)/i.test(lower)) score += 1;
      if (/\d+\.?\d*%/.test(s)) score += 1; // 包含数据
      if (/(result|finding|conclusion|evidence|experiment|evaluation)/i.test(lower)) score += 1;

      // 负面信号
      // 参考文献密集的句子（包含多个方括号引用）
      const refCount = (s.match(/\[\d+[,\-\d]*\]/g) || []).length;
      if (refCount >= 3) score -= 4;
      else if (refCount >= 2) score -= 2;
      else if (refCount === 1) score -= 0.5;

      // 太长的句子降分
      if (s.length > 300) score -= 1;

      // 太短降分
      if (s.length < 30) score -= 1;

      // 纯引用句降分
      if (/^(e\.g\.|for example|similarly|additionally|furthermore)\s/i.test(lower)) score -= 1;

      return { text: s, score };
    });

    // 排序取top
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, maxSentences).map(s => s.text);
  },

  translateToCN(text) {
    if (!text) return '';
    let result = text;
    // 按词典长度降序替换，避免短词先匹配
    const entries = Object.entries(TRANSLATE_DICT).sort((a, b) => b[0].length - a[0].length);
    for (const [en, cn] of entries) {
      const regex = new RegExp(en.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      result = result.replace(regex, cn);
    }
    return result;
  },

  extractKeywords(text) {
    const lower = text.toLowerCase();
    const found = [];
    // 从技术术语中提取
    for (const term of TECHNICAL_TERMS) {
      if (lower.includes(term) && !found.includes(term)) {
        found.push(term);
      }
    }
    // 也提取一些高频的有意义短语
    const phrasePatterns = [
      /(?:deep|deep) learning/i,
      /neural machine translation/i,
      /image recognition/i,
      /object detection/i,
      /language understanding/i,
      /question answering/i,
      /sequence to sequence/i,
      /pre-trained model/i,
      /transfer learning/i,
      /residual learning/i,
      /self-attention mechanism/i,
      /multi-head attention/i,
      /masked language model/i,
      /next sentence prediction/i,
      /bidirectional encoder/i,
      /convolutional neural network/i,
      /recurrent neural network/i,
      /state-of-the-art/i
    ];
    for (const p of phrasePatterns) {
      const m = text.match(p);
      if (m && !found.includes(m[0].toLowerCase())) {
        found.push(m[0].toLowerCase());
      }
    }
    return found.slice(0, 12);
  },

  computeStats(text, authors) {
    const words = text.split(/\s+/).filter(w => w.length > 0).length;
    const refCount = (text.match(/\[\d+\]/g) || []).length;
    const authorCount = authors && authors !== '未知作者'
      ? authors.split(/[,;]|\band\b/).filter(a => a.trim().length > 0).length
      : 0;
    const readTime = Math.max(1, Math.round(words / 275));
    return { words, refCount, authorCount, readTime };
  },

  assessDifficulty(text, stats) {
    let score = 0;
    const lower = text.toLowerCase();
    // 专业术语密度
    let techCount = 0;
    for (const term of TECHNICAL_TERMS) {
      const matches = lower.match(new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'));
      if (matches) techCount += matches.length;
    }
    const techDensity = techCount / Math.max(1, stats.words) * 1000;

    if (techDensity > 8) score += 2;
    else if (techDensity > 4) score += 1;

    // 参考文献数量
    if (stats.refCount > 50) score += 2;
    else if (stats.refCount > 25) score += 1;

    // 词数
    if (stats.words > 10000) score += 1;

    // 数学公式密度
    const mathDensity = (text.match(/[=+\-*/^{}]/g) || []).length / Math.max(1, stats.words) * 100;
    if (mathDensity > 3) score += 1;

    if (score >= 4) return { level: '进阶', cls: 'diff-advanced', icon: '&#128293;' };
    if (score >= 2) return { level: '中等', cls: 'diff-medium', icon: '&#128293;' };
    return { level: '入门', cls: 'diff-beginner', icon: '&#127793;' };
  }
};

  currentTab: 'analyze',

    this.bindEvents();

    document.getElementById('clearBtn').addEventListener('click', () => this.clearInput());

    // Textarea
    const input = document.getElementById('paperInput');

    });

    // Compare
    document.getElementById('compareBtn').addEventListener('click', () => this.compare());

    // History
    document.getElementById('clearHistoryBtn').addEventListener('click', () => this.clearHistory());

    // Theme
    document.getElementById('themeBtn').addEventListener('click', () => this.toggleTheme());

    this.currentTab = tab;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

    const grid = document.getElementById('sampleGrid');

        if (paper) {
          document.getElementById('paperInput').value = paper.text;

    const text = document.getElementById('paperInput').value;

      this.showToast('请输入至少50个字符的论文文本', 'error');
      return;
    }
    this.showLoading(true);

      const result = PaperAnalyzer.analyze(text);
      this.showLoading(false);
      if (!result) {

        return;

      `来源：${r.venue || '未知'} ${r.year || ''}`,
      `难度：${r.difficulty.level} | 阅读时间：约${r.stats.readTime}分钟`,
      '',
      '【英文摘要】',
      r.abstract,
      '',
      '【中文摘要】',
      r.abstractCN,
      '',
      '【研究背景】',
      r.background.join('\n'),
      '',
      '【研究方法】',
      r.method.join('\n'),
      '',
      '【核心结论】',
      r.conclusion.join('\n'),
      '',
      `【关键词】${r.keywords.join(', ')}`,

  copySpeedCard() {
    const card = document.getElementById('speedCard');
    if (!card) return;
    const text = card.innerText;
    this.copyToClipboard(text);
  },

  copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      this.showToast('已复制到剪贴板', 'success');
    }).catch(() => {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      this.showToast('已复制到剪贴板', 'success');
    });
  },

  compare() {
    const textA = document.getElementById('compareA').value;
    const textB = document.getElementById('compareB').value;
    if (textA.trim().length < 50 || textB.trim().length < 50) {
      this.showToast('请在两侧都输入至少50个字符的论文文本', 'error');
      return;
    }
    this.showLoading(true);
    setTimeout(() => {
      const rA = PaperAnalyzer.analyze(textA);
      const rB = PaperAnalyzer.analyze(textB);
      this.showLoading(false);
      this.renderCompare(rA, rB);
      this.showToast('对比分析完成！', 'success');
    }, 1000);
  },

  // History
  saveToHistory(result) {
    const history = JSON.parse(localStorage.getItem('paperlens_history') || '[]');
    history.unshift({
      title: result.title,
      venue: result.venue,
      year: result.year,
      difficulty: result.difficulty.level,
      keywords: result.keywords.slice(0, 5),
      date: result.analyzedAt,
      stats: result.stats
    });
    // 最多保存50条
    if (history.length > 50) history.length = 50;
    localStorage.setItem('paperlens_history', JSON.stringify(history));

    const history = JSON.parse(localStorage.getItem('paperlens_history') || '[]');

      list.innerHTML = `<div class="empty-state"><div class="icon">&#128214;</div><p>暂无分析历史</p><p style="font-size:12px; margin-top:4px;">分析论文后，记录将自动保存在这里</p></div>`;

  },

  esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
};

// Init
document.addEventListener('DOMContentLoaded', () => UI.init());
</script>
</body>
