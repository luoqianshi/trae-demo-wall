<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵魂系统 · NPC自主意识引擎</title>
<script>
// ── 代码保护：禁用右键 + F12 开发工具 ──
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
        e.preventDefault();
    }
});
console.clear();
console.log('%c灵魂系统 · NPC 自主意识引擎', 'color:#f0c27f;font-size:20px;font-weight:bold;');
console.log('%c引导式单页Demo · 6大核心系统', 'color:#e0d8c0;font-size:12px;');
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
    background:radial-gradient(ellipse at top,#1f1f3a 0%,#1a1a2e 50%,#0f0f1e 100%);
    font-family:'Microsoft YaHei',sans-serif;
    color:#e0d8c0;
}
body::before{
    content:'';position:fixed;top:0;left:0;width:100%;height:100%;
    background-image:radial-gradient(circle at 20% 30%,rgba(240,194,127,0.06) 0%,transparent 40%),
                     radial-gradient(circle at 80% 70%,rgba(189,147,249,0.05) 0%,transparent 40%);
    pointer-events:none;z-index:0;
}

#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}

/* ── 顶部标题栏 ── */
header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 24px;border-bottom:1px solid rgba(240,194,127,0.15);
    background:rgba(15,15,30,0.5);backdrop-filter:blur(8px);flex-shrink:0;
}
header h1{font-size:18px;color:#f0c27f;letter-spacing:3px;font-weight:normal}
header h1 span{color:#bd93f9;font-size:12px;letter-spacing:1px;margin-left:8px}
header .badge{
    padding:3px 12px;background:rgba(240,194,127,0.1);border:1px solid rgba(240,194,127,0.3);
    border-radius:12px;color:#f0c27f;font-size:10px;letter-spacing:2px;
}

/* ── 主体布局 ── */
main{display:flex;flex:1;overflow:hidden}

/* ── 左侧对话区 ── */
.dialogue-area{
    flex:1;display:flex;flex-direction:column;padding:16px;gap:10px;overflow:hidden;min-width:0;
}
.npc-card{
    background:rgba(22,33,62,0.6);border:1px solid rgba(240,194,127,0.2);border-radius:10px;
    padding:12px 16px;backdrop-filter:blur(8px);flex-shrink:0;
    display:flex;align-items:center;gap:12px;
}
.npc-avatar{font-size:32px;line-height:1;flex-shrink:0}
.npc-info{flex:1;min-width:0}
.npc-name{color:#f0c27f;font-size:15px;font-weight:bold;margin-bottom:2px}
.npc-type{color:#a0a0c0;font-size:10px;letter-spacing:1px}

/* ── 对话历史区（可滚动，保留所有记录）── */
.dialogue-history{
    flex:1;overflow-y:auto;padding:12px;
    background:rgba(22,33,62,0.4);border:1px solid rgba(240,194,127,0.15);border-radius:10px;
    backdrop-filter:blur(6px);min-height:120px;
    display:flex;flex-direction:column;gap:8px;
}
.dialogue-history:empty::before{
    content:'点击右侧系统按钮或下方NPC开始对话…';
    color:#6272a4;font-size:12px;text-align:center;margin:auto;
}

/* ── 对话条目样式 ── */
.dlg-entry{display:flex;gap:8px;animation:dlgFadeIn .3s ease;max-width:88%}
@keyframes dlgFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* NPC发言：金色边框，左对齐 */
.dlg-entry.dlg-npc{align-self:flex-start}
.dlg-entry.dlg-npc .dlg-avatar{font-size:22px;flex-shrink:0;line-height:1.4}
.dlg-entry.dlg-npc .dlg-bubble{
    background:rgba(22,33,62,0.6);border:1px solid rgba(240,194,127,0.35);border-radius:8px;
    padding:7px 12px;
}
.dlg-entry.dlg-npc .dlg-name{color:#f0c27f;font-size:11px;margin-bottom:2px;font-weight:bold}
.dlg-entry.dlg-npc .dlg-text{color:#e0d8c0;font-size:13px;line-height:1.6}

/* 玩家发言：紫色边框，右对齐 */
.dlg-entry.dlg-player{align-self:flex-end;flex-direction:row-reverse}
.dlg-entry.dlg-player .dlg-bubble{
    background:rgba(189,147,249,0.12);border:1px solid rgba(189,147,249,0.4);border-radius:8px;
    padding:7px 12px;
}
.dlg-entry.dlg-player .dlg-text{color:#e0d8c0;font-size:13px;line-height:1.6}

/* 系统提示：灰色小字居中 */
.dlg-entry.dlg-system{align-self:center;max-width:92%}
.dlg-entry.dlg-system .dlg-sys{
    color:#a0a0c0;font-size:11px;text-align:center;padding:3px 12px;
    background:rgba(15,15,30,0.5);border-radius:4px;line-height:1.5;
}
.dlg-entry.dlg-system .dlg-sys.warn{color:#ff5555}
.dlg-entry.dlg-system .dlg-sys.info{color:#8be9fd}
.dlg-entry.dlg-system .dlg-sys.ok{color:#50fa7b}
.dlg-entry.dlg-system .dlg-sys.gold{color:#f0c27f}

/* 对话分隔线 */
.dlg-separator{
    align-self:center;color:#6272a4;font-size:10px;letter-spacing:2px;
    padding:4px 0;width:100%;text-align:center;
}

/* ── 玩家选项 ── */
.options-area{flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.options-label{color:#a0a0c0;font-size:10px;letter-spacing:2px;margin-bottom:2px}
.options-list{display:flex;flex-direction:column;gap:5px}
.option-btn{
    text-align:left;padding:8px 14px;background:rgba(22,33,62,0.5);
    border:1px solid rgba(240,194,127,0.2);border-radius:6px;color:#e0d8c0;
    font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;
}
.option-btn:hover{border-color:rgba(240,194,127,0.6);background:rgba(30,45,80,0.6);transform:translateX(2px)}
.option-btn .opt-intent{color:#bd93f9;font-size:9px;margin-left:6px}
.option-btn.opt-end{border-color:rgba(100,100,140,0.3);color:#a0a0c0}
.option-btn.opt-end:hover{border-color:rgba(150,150,180,0.5)}
.option-btn.opt-followup{border-color:rgba(80,250,123,0.25)}
.option-btn.opt-followup:hover{border-color:rgba(80,250,123,0.6)}
.option-btn.btn-primary{
    background:rgba(240,194,127,0.15);border-color:#f0c27f;color:#f0c27f;text-align:center;
}

/* ── 状态栏 ── */
.status-bar{
    flex-shrink:0;display:flex;gap:16px;flex-wrap:wrap;
    padding:7px 14px;background:rgba(15,15,30,0.5);border:1px solid rgba(240,194,127,0.15);
    border-radius:6px;font-size:11px;backdrop-filter:blur(6px);
}
.status-item{display:flex;align-items:center;gap:4px}
.status-item .label{color:#a0a0c0}
.status-item .val{color:#f0c27f;font-weight:bold}
.status-item .val.anger{color:#ff5555}
.status-item .val.mood-low{color:#ff5555}
.status-item .val.mood-mid{color:#f1fa8c}
.status-item .val.mood-high{color:#50fa7b}

/* ── NPC切换 ── */
.npc-switcher{flex-shrink:0;display:flex;gap:6px;flex-wrap:wrap}
.npc-switcher .label{color:#a0a0c0;font-size:10px;letter-spacing:1px;width:100%;margin-bottom:2px}
.npc-btn{
    padding:5px 12px;background:rgba(22,33,62,0.5);border:1px solid rgba(240,194,127,0.2);
    border-radius:4px;color:#e0d8c0;font-size:11px;cursor:pointer;transition:all .2s;font-family:inherit;
}
.npc-btn:hover{border-color:rgba(240,194,127,0.5)}
.npc-btn.active{background:rgba(240,194,127,0.15);border-color:#f0c27f;color:#f0c27f}

/* ── 右侧系统面板 ── */
.systems-panel{
    width:340px;flex-shrink:0;padding:16px 16px 16px 0;overflow-y:auto;
    display:flex;flex-direction:column;gap:10px;
}
.systems-panel h2{
    color:#f0c27f;font-size:14px;letter-spacing:2px;margin-bottom:4px;
    padding-bottom:8px;border-bottom:1px solid rgba(240,194,127,0.15);
}
.sys-btn{
    text-align:left;padding:12px 14px;background:rgba(22,33,62,0.6);
    border:1px solid rgba(240,194,127,0.2);border-radius:8px;cursor:pointer;
    transition:all .25s;font-family:inherit;backdrop-filter:blur(8px);
    display:flex;align-items:flex-start;gap:10px;
}
.sys-btn:hover{border-color:rgba(240,194,127,0.6);background:rgba(30,45,80,0.7);transform:translateY(-1px)}
.sys-btn:active{transform:translateY(0)}
.sys-btn .sys-icon{font-size:22px;flex-shrink:0;line-height:1.2}
.sys-btn .sys-text{flex:1;min-width:0}
.sys-btn .sys-title{color:#f0c27f;font-size:13px;font-weight:bold;margin-bottom:3px;letter-spacing:1px}
.sys-btn .sys-desc{color:#a0a0c0;font-size:10px;line-height:1.5}
.sys-btn.sys-memory:hover{border-color:rgba(189,147,249,0.6)}
.sys-btn.sys-anger:hover{border-color:rgba(255,85,85,0.6)}
.sys-btn.sys-deceit:hover{border-color:rgba(255,184,108,0.6)}
.sys-btn.sys-rift:hover{border-color:rgba(255,121,198,0.6)}
.sys-btn.sys-contagion:hover{border-color:rgba(139,233,253,0.6)}
.sys-btn.sys-initiative:hover{border-color:rgba(80,250,123,0.6)}

/* ── 底部提示 ── */
.footer-hint{
    padding:6px 16px;text-align:center;color:#6272a4;font-size:9px;letter-spacing:1px;
    border-top:1px solid rgba(240,194,127,0.1);flex-shrink:0;
}

/* ── 响应式：窄屏改为上下布局 ── */
@media (max-width:768px){
    main{flex-direction:column}
    .systems-panel{width:100%;padding:8px 16px;max-height:42vh}
    .systems-panel h2{font-size:12px}
    .sys-btn{padding:8px 10px}
    .sys-btn .sys-icon{font-size:18px}
    .sys-btn .sys-title{font-size:11px}
    .sys-btn .sys-desc{font-size:9px}
    .dialogue-area{padding:10px}
    header h1{font-size:14px}
    header .badge{font-size:8px}
}

/* 滚动条样式 */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(15,15,30,0.3)}
::-webkit-scrollbar-thumb{background:rgba(240,194,127,0.3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(240,194,127,0.5)}

/* ═══════════════════════════════════════════════════════════
   系统全景仪表盘样式
   ═══════════════════════════════════════════════════════════ */

/* 展开按钮 */
.dashboard-btn{
    text-align:center;padding:11px 14px;
    background:linear-gradient(135deg,rgba(240,194,127,0.18),rgba(189,147,249,0.12));
    border:1px solid rgba(240,194,127,0.5);border-radius:8px;cursor:pointer;
    transition:all .25s;font-family:inherit;backdrop-filter:blur(8px);
    color:#f0c27f;font-size:13px;font-weight:bold;letter-spacing:2px;
    box-shadow:0 0 12px rgba(240,194,127,0.15);
}
.dashboard-btn:hover{
    border-color:#f0c27f;
    background:linear-gradient(135deg,rgba(240,194,127,0.28),rgba(189,147,249,0.18));
    box-shadow:0 0 20px rgba(240,194,127,0.35);transform:translateY(-1px);
}

/* 模态浮层 */
.dashboard-modal{
    position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;
    display:flex;align-items:center;justify-content:center;
    animation:dbFadeIn .3s ease;
}
.dashboard-modal.hidden{display:none}
@keyframes dbFadeIn{from{opacity:0}to{opacity:1}}
.dashboard-overlay{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.78);backdrop-filter:blur(4px);
}
.dashboard-content{
    position:relative;width:92%;max-width:1180px;max-height:90vh;overflow-y:auto;
    background:radial-gradient(ellipse at top,#1f1f3a 0%,#1a1a2e 50%,#0f0f1e 100%);
    border:1px solid rgba(240,194,127,0.4);border-radius:12px;
    padding:22px 26px;box-shadow:0 0 40px rgba(240,194,127,0.2);
    animation:dbSlideIn .35s ease;
}
@keyframes dbSlideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.dashboard-content h2{
    color:#f0c27f;font-size:18px;letter-spacing:3px;text-align:center;
    margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(240,194,127,0.2);
}
.dashboard-close{
    position:absolute;top:12px;right:14px;width:30px;height:30px;
    background:rgba(255,85,85,0.15);border:1px solid rgba(255,85,85,0.4);
    border-radius:50%;color:#ff5555;font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.dashboard-close:hover{background:rgba(255,85,85,0.3);transform:rotate(90deg)}

/* 2x2 网格布局 */
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dashboard-panel{
    background:rgba(22,33,62,0.6);border:1px solid rgba(240,194,127,0.2);
    border-radius:10px;padding:14px;backdrop-filter:blur(8px);
    min-height:250px;display:flex;flex-direction:column;
}
.dashboard-panel h3{
    color:#f0c27f;font-size:12px;letter-spacing:2px;margin-bottom:10px;
    padding-bottom:6px;border-bottom:1px solid rgba(240,194,127,0.15);
}

/* ── 面板1：时间天气 ── */
.tw-clock-wrap{display:flex;gap:14px;align-items:center;flex:1}
.tw-clock-svg{flex-shrink:0}
.tw-info{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.tw-row{display:flex;align-items:center;gap:8px;font-size:13px}
.tw-row .tw-label{color:#a0a0c0;font-size:11px;min-width:32px}
.tw-row .tw-val{color:#e0d8c0}
.tw-weather{font-size:26px;line-height:1}
.tw-season{font-size:20px;line-height:1}
.tw-date{color:#bd93f9;font-size:11px;margin-top:6px;line-height:1.5}

/* ── 面板2：NPC状态 ── */
.npc-status-list{display:flex;gap:8px;flex:1;overflow-x:auto;padding-bottom:4px}
.npc-status-card{
    flex:1;min-width:108px;background:rgba(15,15,30,0.4);
    border:1px solid rgba(240,194,127,0.15);border-radius:6px;
    padding:8px;display:flex;flex-direction:column;gap:4px;transition:all .2s;
}
.npc-status-card.active{
    border-color:#f0c27f;box-shadow:0 0 10px rgba(240,194,127,0.25);
    background:rgba(30,45,80,0.5);
}
.npc-status-head{display:flex;align-items:center;gap:4px}
.npc-status-head .emoji{font-size:18px;line-height:1}
.npc-status-head .name{color:#f0c27f;font-weight:bold;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.npc-status-loc{color:#8be9fd;font-size:9px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.npc-mood-bar{height:6px;background:rgba(15,15,30,0.6);border-radius:3px;overflow:hidden}
.npc-mood-fill{height:100%;border-radius:3px;transition:width .4s}
.npc-mood-label{display:flex;justify-content:space-between;font-size:9px;color:#a0a0c0}
.npc-status-meta{display:flex;justify-content:space-between;font-size:9px;margin-top:2px}
.npc-status-meta .rel{font-weight:bold}
.npc-status-meta .anger{color:#ff5555;font-weight:bold}

/* ── 面板3：关系图谱 ── */
.relation-svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:240px}
.relation-svg{max-width:100%;max-height:260px}
.rel-node-group{cursor:pointer}
.rel-node-circle{fill:rgba(22,33,62,0.85);stroke:rgba(240,194,127,0.6);stroke-width:1.5;transition:all .2s}
.rel-node-group:hover .rel-node-circle{stroke:#bd93f9;stroke-width:2.5}
.rel-node-group.active .rel-node-circle{fill:rgba(240,194,127,0.3);stroke:#f0c27f;stroke-width:2.5}
.rel-node-label{fill:#e0d8c0;font-size:10px;text-anchor:middle;pointer-events:none}
.rel-node-emoji{font-size:15px;text-anchor:middle;pointer-events:none;dominant-baseline:central}
.rel-line{transition:all .2s}
.rel-val-label{font-size:8px;text-anchor:middle;pointer-events:none}

/* ── 面板4：性格雷达 ── */
.radar-wrap{display:flex;gap:12px;flex:1;align-items:flex-start}
.radar-svg{flex-shrink:0}
.radar-needs{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.radar-npc-name{color:#f0c27f;font-size:12px;margin-bottom:6px;font-weight:bold}
.need-item{display:flex;flex-direction:column;gap:2px}
.need-label{display:flex;justify-content:space-between;font-size:10px;color:#a0a0c0}
.need-label .val{color:#f0c27f;font-weight:bold}
.need-bar{height:5px;background:rgba(15,15,30,0.6);border-radius:3px;overflow:hidden}
.need-fill{height:100%;border-radius:3px;transition:width .4s}

/* 仪表盘响应式 */
@media (max-width:768px){
    .dashboard-grid{grid-template-columns:1fr}
    .dashboard-content{width:96%;padding:14px;max-height:94vh}
    .npc-status-list{flex-direction:column}
    .radar-wrap{flex-direction:column;align-items:center}
    .tw-clock-wrap{flex-direction:column;text-align:center}
}
</style>
</head>
<body>
<div id="app">
    <header>
        <h1>灵魂系统<span>NPC自主意识引擎</span></h1>
        <div class="badge">引导式Demo</div>
    </header>
    <main>
        <!-- 左侧：对话历史区 -->
        <section class="dialogue-area">
            <div class="npc-card">
                <div class="npc-avatar" id="npc-avatar">🍵</div>
                <div class="npc-info">
                    <div class="npc-name" id="npc-name">老陈</div>
                    <div class="npc-type" id="npc-type">茶馆常客 · 社交高</div>
                </div>
            </div>
            <div class="dialogue-history" id="dialogue-history"></div>
            <div class="options-area">
                <div class="options-label">▶ 玩家选项</div>
                <div class="options-list" id="options-list"></div>
            </div>
            <div class="status-bar" id="status-bar">
                <div class="status-item"><span class="label">NPC:</span><span class="val" id="s-npc">老陈</span></div>
                <div class="status-item"><span class="label">心情:</span><span class="val" id="s-mood">50</span></div>
                <div class="status-item"><span class="label">关系:</span><span class="val" id="s-rel">30</span></div>
                <div class="status-item"><span class="label">愤怒:</span><span class="val anger" id="s-anger">0</span></div>
                <div class="status-item"><span class="label">时间:</span><span class="val" id="s-time">上午</span></div>
            </div>
            <div class="npc-switcher">
                <div class="label">▶ 切换NPC</div>
                <button class="npc-btn active" data-npc="lao_chen">🍵 老陈</button>
                <button class="npc-btn" data-npc="zhao_shen">🧣 赵婶</button>
                <button class="npc-btn" data-npc="tie_zhao">🔨 铁匠赵</button>
                <button class="npc-btn" data-npc="su_shijie">⚔️ 苏师姐</button>
                <button class="npc-btn" data-npc="du_xing">🗡️ 独行客</button>
            </div>
        </section>
        <!-- 右侧：6大系统体验 -->
        <aside class="systems-panel">
            <button class="dashboard-btn" onclick="toggleDashboard()">📊 系统全景</button>
            <h2>6大核心系统体验</h2>
            <button class="sys-btn sys-memory" onclick="triggerMemory()">
                <div class="sys-icon">🧠</div>
                <div class="sys-text">
                    <div class="sys-title">记忆系统</div>
                    <div class="sys-desc">写入玩家事件记忆，NPC次日开场主动追忆昨日事</div>
                </div>
            </button>
            <button class="sys-btn sys-anger" onclick="triggerAnger()">
                <div class="sys-icon">🔥</div>
                <div class="sys-text">
                    <div class="sys-title">愤怒机制</div>
                    <div class="sys-desc">激怒NPC（愤怒值+60），观察冷淡期反应与跨日衰减</div>
                </div>
            </button>
            <button class="sys-btn sys-deceit" onclick="triggerDeceit()">
                <div class="sys-icon">🎭</div>

<script>
// ═══════════════════════════════════════════════════════════
//  灵魂系统引导式Demo · 核心逻辑
//  修复：对话深度 + 双向结束 + 自然过渡 + 场景化展示
// ═══════════════════════════════════════════════════════════

// ── 全局状态 ──
var _currentNpcId = 'lao_chen';
var _relStore = {};
var _dlgCtx = null;                        // 对话上下文
var _dialogueEnded = false;                // 对话是否已结束
var _npcMeta = {
    lao_chen:    { emoji:'🍵', desc:'茶馆常客 · 社交高' },
    zhao_shen:   { emoji:'🧣', desc:'茶馆常客 · 热情' },
    tie_zhao:    { emoji:'🔨', desc:'手艺人 · 固执' },
    su_shijie:   { emoji:'⚔️', desc:'外门弟子 · 修炼' },
    du_xing:     { emoji:'🗡️', desc:'流浪者 · 话少' }
};

// ── 模拟全局函数（DailyEngine内部通过window.getRel调用）──
window.getRel = function(npcId) { return _relStore[npcId] !== undefined ? _relStore[npcId] : 30; };
window.adjRel = function(npcId, delta) {
    _relStore[npcId] = Math.max(0, Math.min(100, (_relStore[npcId] || 30) + delta));
};

// ── 工具函数 ──
function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    var div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
}
function getRelStr(rel) {
    return rel > 70 ? 'friend' : (rel > 40 ? 'acquaintance' : 'stranger');
}
function pickRand(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

// ═══════════════════════════════════════════════════════════
//  对话历史管理（核心修复：保留所有对话记录）
// ═══════════════════════════════════════════════════════════

// 追加一条对话到历史区（type: 'npc'|'player'|'system'）
function appendDialogue(type, text, opt) {
    var history = document.getElementById('dialogue-history');
    var div = document.createElement('div');
    div.className = 'dlg-entry dlg-' + type;

    if (type === 'npc') {
        var profile = DailyEngine.getNpcProfile(_currentNpcId);
        var meta = _npcMeta[_currentNpcId] || { emoji: '❓' };
        var name = (opt && opt.name) ? opt.name : (profile ? profile.name : _currentNpcId);
        var emoji = (opt && opt.emoji) ? opt.emoji : meta.emoji;
        div.innerHTML = '<span class="dlg-avatar">' + emoji + '</span>' +
                        '<div class="dlg-bubble">' +
                          '<div class="dlg-name">' + escapeHtml(name) + '</div>' +
                          '<div class="dlg-text">' + escapeHtml(text) + '</div>' +
                        '</div>';
    } else if (type === 'player') {
        div.innerHTML = '<div class="dlg-bubble"><div class="dlg-text">' + escapeHtml(text) + '</div></div>';
    } else { // system
        var cls = (opt && opt.level) ? 'dlg-sys ' + opt.level : 'dlg-sys';
        div.innerHTML = '<div class="' + cls + '">' + escapeHtml(text) + '</div>';
    }
    history.appendChild(div);
    // 自动滚动到最新
    history.scrollTop = history.scrollHeight;
}

// 清空对话历史
function clearDialogue() {
    document.getElementById('dialogue-history').innerHTML = '';
}

// 添加分隔线
function addSeparator(text) {
    var history = document.getElementById('dialogue-history');
    var div = document.createElement('div');
    div.className = 'dlg-separator';
    div.textContent = text || '──────────';
    history.appendChild(div);
    history.scrollTop = history.scrollHeight;
}

// ═══════════════════════════════════════════════════════════
//  双向结束机制（核心修复：NPC主动结束 + 玩家主动结束）
// ═══════════════════════════════════════════════════════════

// 对话结尾检测 - 基于语境的自然结束（非机械轮次概率）
// 三种自然结束信号：
//   1. NPC回复含结束信号词（"不说了""就这样吧""改天""下次再"等）
//   2. 话题自然收尾（连续2轮NPC回复无新话题词，话题已聊尽）
//   3. 玩家主动结束（始终可用，不限制轮次）
function shouldEndDialogue(npcId) {
    if (!_dlgCtx) return false;

    var state = DailyEngine.getDailyState(npcId);
    var mood = state ? state.mood : 50;
    var rel = window.getRel(npcId);
    var lastReply = _dlgCtx.lastNpcText || '';

    // ── 信号1：NPC回复含明确结束信号词 ──
    // 这些词出现在引擎模板中，表示NPC主动暗示要结束
    var endSignals = [
        '不说了', '就这样吧', '算了', '改天', '下次再', '没什么好说',
        '不聊了', '先这样', '忙去了', '走了', '不急这一时'
    ];
    for (var i = 0; i < endSignals.length; i++) {
        if (lastReply.indexOf(endSignals[i]) >= 0) {
            return true;  // NPC明确暗示结束，立即触发
        }
    }

    // ── 信号2：话题自然收尾 ──
    // 连续2轮NPC回复都没有新话题词（话题已聊尽）
    // 需要至少3轮对话后才判断，避免开场就结束
    if (_dlgCtx.turnCount >= 3) {
        var recentReplies = _dlgCtx.recentNpcReplies || [];
        if (recentReplies.length >= 2) {
            var lastReply1 = recentReplies[recentReplies.length - 1] || '';
            var lastReply2 = recentReplies[recentReplies.length - 2] || '';
            var topic1 = extractTopicFromText(lastReply1);
            var topic2 = extractTopicFromText(lastReply2);
            // 两轮都无具体话题词 → 话题已聊尽
            if (!topic1 && !topic2) {
                return true;
            }
        }
    }

    // ── 信号3：情绪极端时的自然结束（低概率，避免突兀） ──
    // 心情极差（<20）+ 好感低（<30）→ NPC不愿多说，但需至少2轮
    if (_dlgCtx.turnCount >= 2 && mood < 20 && rel < 30) {
        return Math.random() < 0.3;  // 30%概率，不是强制
    }

    return false;  // 默认不结束，让对话自然进行
}

// 从文本中提取话题词（用于判断话题是否收尾）
function extractTopicFromText(text) {
    if (!text || typeof text !== 'string') return '';
    // 复用引擎的_extractTopicObject逻辑（通过DailyEngine暴露）
    // 如果引擎没有暴露，用简单的关键词检测
    try {
        // 尝试调用引擎的提取逻辑
        var dlg = DailyEngine.generateContextDialogue(_currentNpcId, 30);
        // 简单方案：检测文本中是否有具体事物词
        var topicWords = ['货', '生意', '茶', '活', '功', '路', '事', '人', '钱', '家', '病', '儿', '妻', '友'];
        for (var i = 0; i < topicWords.length; i++) {
            if (text.indexOf(topicWords[i]) >= 0) return topicWords[i];
        }
    } catch (e) {}
    return '';
}

// ═══════════════════════════════════════════════════════════
// 对话连贯性增强（核心修复：解决"对话对不上"问题）
// ═══════════════════════════════════════════════════════════
// 问题根因：引擎generateFollowUpReply从身份模板池随机选回复，
//   不引用玩家选项内容，也不承接NPC上一句话的具体话题。
//   如NPC说"这批货颠簸坏了几件"，玩家选"然后呢？"，
//   引擎可能随机选"今天的生意比往常差了点"——话题从"货"跳到"生意"，对不上。
// 修复方案：
//   1. 检测追问意图（listen/probe/confirm）——玩家想继续当前话题
//   2. 提取NPC上一句话的话题词
//   3. 如果新回复不含上一句话题词，说明话题跳了，加过渡句承接
//   4. 过渡句如"对了，说起这个X……""那X啊，……"让话题转换自然
function enhanceDialogueCoherence(reply, playerOption, intent, lastNpcText) {
    if (!reply || typeof reply !== 'string') return reply;
    if (!lastNpcText || typeof lastNpcText !== 'string') return reply;

    // 只对追问类意图做增强（玩家想继续当前话题）
    var followUpIntents = ['listen', 'probe', 'confirm', 'agree', 'listen_memory'];
    var isFollowUp = false;
    for (var i = 0; i < followUpIntents.length; i++) {
        if (intent === followUpIntents[i]) { isFollowUp = true; break; }
    }
    if (!isFollowUp) return reply;

    // 提取NPC上一句话的话题词
    var lastTopic = extractTopicFromText(lastNpcText);
    if (!lastTopic) return reply;  // 上一句话无明确话题，无法增强

    // 如果新回复已包含上一句话题词，说明话题连贯，无需增强
    if (reply.indexOf(lastTopic) >= 0) return reply;

    // 话题跳了：新回复不含上一句话题词
    // 加过渡句，让话题转换自然（不生硬拼接）
    var transitions = [
        '对了，说起' + lastTopic + '，',
        '那' + lastTopic + '啊，',
        '至于' + lastTopic + '嘛，',
        lastTopic + '这事嘛，'
    ];
    var transition = transitions[Math.floor(Math.random() * transitions.length)];

    // 拼接过渡句+新回复
    // 注意：如果回复本身是短句（<15字），直接拼接；长句则用过渡句引出
    if (reply.length < 15) {
        return transition + reply;
    } else {
        // 长句：在回复前加过渡句，用句号分隔
        return transition + '另外，' + reply;
    }
}

// 显示对话结尾选项（NPC暗示要走了）
function showEndDialogueOptions(npcId) {
    var state = DailyEngine.getDailyState(npcId);
    var profile = DailyEngine.getNpcProfile(npcId);
    var name = profile ? profile.name : npcId;
    var mood = state ? state.mood : 50;
    var rel = window.getRel(npcId);

    // NPC结尾语（根据心情和好感度）
    var endText;
    if (mood < 30) {
        endText = pickRand([
            name + '看起来不想再说了……',
            name + '沉默了，似乎没什么想聊的了。'
        ]);
    } else if (rel >= 60) {
        endText = pickRand([
            name + '："今天聊得真开心！改天继续？"',
            name + '笑着说："差不多了，下次再聊！"'
        ]);
    } else {
        endText = pickRand([
            name + '："嗯……我还有事。"',
            name + '看了看别处，"那……先这样吧。"'
        ]);
    }
    appendDialogue('npc', endText);

    // 显示结束选项
    var choices = document.getElementById('options-list');
    choices.innerHTML = '';
    var b1 = document.createElement('button');
    b1.className = 'option-btn btn-primary';
    b1.textContent = '好的，再会';
    b1.onclick = function() { endDialogue(); };
    choices.appendChild(b1);
    var b2 = document.createElement('button');
    b2.className = 'option-btn';
    b2.textContent = '改天再聊';
    b2.onclick = function() { endDialogue(); };
    choices.appendChild(b2);
}

// 结束对话
function endDialogue() {
    _dialogueEnded = true;
    appendDialogue('system', '── 对话结束 ──', { level: 'gold' });
    var choices = document.getElementById('options-list');
    choices.innerHTML = '';
    var b = document.createElement('button');
    b.className = 'option-btn btn-primary';
    b.textContent = '重新开始对话';
    b.onclick = function() { startNewDialogue(); };
    choices.appendChild(b);
}

// 重新开始对话
function startNewDialogue() {
    _dialogueEnded = false;
    clearDialogue();
    loadNpc(_currentNpcId);
}

// ═══════════════════════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════════════════════
function initDemo() {
    try {
        if (window.GameTime) GameTime.init();

        var ids = DailyEngine.getAllNpcIds();
        for (var i = 0; i < ids.length; i++) {
            DailyEngine.generateDailyState(ids[i]);

        }

        if (window.SoulTick) SoulTick.init();
        if (window.EncounterSystem) EncounterSystem.init();

// ═══════════════════════════════════════════════════════════
//  加载NPC：初始化状态 + 生成开场白 + 生成选项
// ═══════════════════════════════════════════════════════════
function loadNpc(npcId) {
    try {
        _currentNpcId = npcId;
        _dialogueEnded = false;

        var state = DailyEngine.getDailyState(npcId);
        if (!state) {
            state = DailyEngine.generateDailyState(npcId);
        }

        // 更新NPC卡片
        var profile = DailyEngine.getNpcProfile(npcId);
        var meta = _npcMeta[npcId] || { emoji: profile ? profile.moodEmoji : '❓', desc: '' };
        document.getElementById('npc-avatar').textContent = meta.emoji;
        document.getElementById('npc-name').textContent = profile ? profile.name : npcId;
        document.getElementById('npc-type').textContent = meta.desc;

        // 生成开场白
        var rel = window.getRel(npcId);
        var relStr = getRelStr(rel);
        var dlg = DailyEngine.generateContextDialogue(npcId, relStr);
        var npcText = dlg ? dlg.fullDialogue : '……';

        // 初始化对话上下文
        _dlgCtx = {
            npcId: npcId,
            relStr: relStr,
            turnCount: 0,
            topicTurnCount: 0,
            recentUtterances: [],
            lastNpcText: npcText,
            currentTopic: dlg ? (dlg.topic || '') : '',
            sessionStart: Date.now(),
            currentScene: null
        };

        // 显示开场白（追加到历史）
        if (dlg && dlg.memory) {
            appendDialogue('system', '🧠 NPC追忆起昨日之事', { level: 'info' });
        }
        appendDialogue('npc', npcText);

        // 生成选项
        generateAndShowOptions(npcText, state, relStr);

        updateStatusBar();

        // 更新NPC切换按钮高亮
        var btns = document.querySelectorAll('.npc-btn');
        for (var i = 0; i < btns.length; i++) {
            btns[i].classList.toggle('active', btns[i].getAttribute('data-npc') === npcId);
        }
    } catch (e) {
        console.error('[loadNpc错误]', e);
        appendDialogue('system', '加载NPC失败：' + (e.message || '未知错误'), { level: 'warn' });
    }
}

// ═══════════════════════════════════════════════════════════
//  生成并显示玩家选项（含追问选项 + 结束选项）
// ═══════════════════════════════════════════════════════════
function generateAndShowOptions(npcText, state, relStr, lastPlayerOption) {
    var optionsList = document.getElementById('options-list');
    optionsList.innerHTML = '';

    try {
        var options = DailyEngine.generateLiveOptions(_currentNpcId, npcText, state, relStr, lastPlayerOption);
        if (!options || options.length === 0) {
            options = [{ playerOption: '再聊聊', intent: 'chat', category: 'chat', weight: 10 }];
        }

        // ── 追问选项池：保证对话深度，让玩家能追问细节 ──
        var followUpPool = [
            { playerOption: '然后呢？', intent: 'probe', category: 'followup', weight: 15 },
            { playerOption: '具体点？', intent: 'probe', category: 'followup', weight: 12 },
            { playerOption: '咋回事？', intent: 'probe', category: 'followup', weight: 12 },
            { playerOption: '后来咋样了？', intent: 'probe', category: 'followup', weight: 10 }
        ];
        // 随机选1个追问选项加入（避免与已有选项重复）
        var shuffled = followUpPool.slice().sort(function() { return Math.random() - 0.5; });
        for (var fi = 0; fi < shuffled.length; fi++) {
            var fu = shuffled[fi];
            var dup = false;
            for (var fj = 0; fj < options.length; fj++) {
                if (options[fj].playerOption === fu.playerOption) { dup = true; break; }
            }
            if (!dup) {
                options.push(fu);
                break;
            }
        }

        // ── 玩家主动结束选项：始终可用（不限制轮次，让玩家随时可结束） ──
        if (_dlgCtx) {
            options.push({ playerOption: '那先这样吧。', intent: 'end', category: 'end', weight: 3 });
        }

        // 渲染选项（最多5个）
        var maxShow = Math.min(options.length, 5);
        for (var i = 0; i < maxShow; i++) {
            (function(opt) {
                var btn = document.createElement('button');
                var cls = 'option-btn';
                if (opt.category === 'end') cls += ' opt-end';
                else if (opt.category === 'followup') cls += ' opt-followup';
                btn.className = cls;
                btn.innerHTML = escapeHtml(opt.playerOption) +
                    (opt.intent && opt.intent !== 'end' && opt.intent !== 'probe' ?
                        '<span class="opt-intent">[' + escapeHtml(opt.intent) + ']</span>' : '');
                btn.onclick = function() { handleOptionClick(opt.playerOption, opt.intent, opt); };
                optionsList.appendChild(btn);
            })(options[i]);
        }
    } catch (e) {
        console.error('[生成选项错误]', e);
        var errBtn = document.createElement('button');
        errBtn.className = 'option-btn';
        errBtn.textContent = '继续对话';
        errBtn.onclick = function() { loadNpc(_currentNpcId); };
        optionsList.appendChild(errBtn);
    }
}

// ═══════════════════════════════════════════════════════════
//  处理玩家点击选项（核心：多轮深入对话 + 双向结束检测）
// ═══════════════════════════════════════════════════════════
function handleOptionClick(playerOption, intent, opt) {
    try {
        if (!_dlgCtx || _dialogueEnded) return;

        // ── 玩家主动结束 ──
        if (intent === 'end') {
            appendDialogue('player', playerOption);
            endDialogue();
            return;
        }

        // 更新对话上下文
        _dlgCtx.turnCount++;
        _dlgCtx.topicTurnCount++;
        _dlgCtx.recentUtterances.push(playerOption);
        if (_dlgCtx.recentUtterances.length > 6) _dlgCtx.recentUtterances.shift();

        // 显示玩家选项
        appendDialogue('player', playerOption);

        // 玩家选选项，好感度+1
        window.adjRel(_currentNpcId, 1);

        // 生成NPC动态回复（引擎会承接上一句话语境，自然过渡）
        var dynamicReply = DailyEngine.generateFollowUpReply(_currentNpcId, playerOption, intent, _dlgCtx);

        // ── 对话连贯性增强（核心修复：解决"对话对不上"问题）──
        // 引擎generateFollowUpReply从身份模板池随机选回复，可能不承接NPC上一句话的具体话题
        // 这里在单页Demo层面做增强：检测追问意图，如果回复与上一句话题不相关，加过渡句
        dynamicReply = enhanceDialogueCoherence(dynamicReply, playerOption, intent, _dlgCtx.lastNpcText);

        // 更新对话上下文
        _dlgCtx.lastNpcText = dynamicReply;
        // 记录最近NPC回复，供shouldEndDialogue判断话题收尾
        if (!_dlgCtx.recentNpcReplies) _dlgCtx.recentNpcReplies = [];
        _dlgCtx.recentNpcReplies.push(dynamicReply);
        if (_dlgCtx.recentNpcReplies.length > 4) _dlgCtx.recentNpcReplies.shift();

        // 显示NPC回复（追加到历史）
        appendDialogue('npc', dynamicReply);

        // 如果愤怒值变化，显示系统提示
        var state = DailyEngine.getDailyState(_currentNpcId);
        if (state && state.angerLevel > 0) {
            var angerInfo = '⚠ 愤怒值: ' + state.angerLevel +
                            (state.coldTurns > 0 ? ' · 冷淡期剩余' + state.coldTurns + '轮' : '');
            appendDialogue('system', angerInfo, { level: 'warn' });
        }

        // ── NPC主动结束检测：3轮后按概率结束 ──
        if (shouldEndDialogue(_currentNpcId)) {
            showEndDialogueOptions(_currentNpcId);
            updateStatusBar();
            return;
        }

        // 基于NPC新回复重新生成选项（含追问+结束选项）
        var rel = window.getRel(_currentNpcId);
        var relStr = getRelStr(rel);
        generateAndShowOptions(dynamicReply, state, relStr, playerOption);

        updateStatusBar();
    } catch (e) {
        console.error('[选项处理错误]', e);
        appendDialogue('system', '⚠ 对话出错：' + (e.message || '未知错误'), { level: 'warn' });
    }
}

}

// 🌊 情绪传染场景：初始状态 → 应用传染 → 显示变化对比
function triggerContagion() {
    try {
        clearDialogue();
        addSeparator('🌊 情绪传染场景');

        appendDialogue('system', '🌊 情绪传染 · 群体心情收敛', { level: 'gold' });

        // 阶段1：初始状态
        appendDialogue('system', '阶段1：记录5个NPC的当前心情值', { level: 'info' });

        var allStates = DailyEngine.getAllDailyStates();
        var allIds = DailyEngine.getAllNpcIds();
        var beforeMoods = [];
        for (var i = 0; i < allIds.length; i++) {
            var s = allStates[allIds[i]];
            if (s) {
                var p = DailyEngine.getNpcProfile(allIds[i]);
                beforeMoods.push({
                    npcId: allIds[i],
                    name: p ? p.name : allIds[i],
                    emoji: p ? p.moodEmoji : '❓',
                    mood: s.mood || 50,
                    social: p && p.personality ? p.personality.social : 50,
                    anger: s.angerLevel || 0
                });
            }
        }

        // 显示初始心情
        var initStr = '';
        for (var bi = 0; bi < beforeMoods.length; bi++) {
            initStr += beforeMoods[bi].emoji + beforeMoods[bi].name + ':' + beforeMoods[bi].mood + ' ';
        }
        appendDialogue('system', initStr, { level: 'info' });

        // 阶段2：应用情绪传染
        appendDialogue('system', '阶段2：调用 applyEmotionContagion()', { level: 'info' });
        var result = DailyEngine.applyEmotionContagion();

        // 阶段3：显示变化对比
        appendDialogue('system', '阶段3：传染后心情对比', { level: 'info' });
        if (result && result.applied) {
            appendDialogue('system',
                '群体平均心情: ' + result.avgMood + ' · 受影响NPC: ' + result.adjustedCount + '/' + result.npcCount,
                { level: 'ok' });
        }

        // 逐个显示变化
        for (var ci = 0; ci < beforeMoods.length; ci++) {
            var before = beforeMoods[ci];
            var s2 = allStates[before.npcId];
            var afterMood = s2 ? (s2.mood || 50) : before.mood;
            var diff = afterMood - before.mood;
            var diffStr = diff > 0 ? ('+' + diff) : ('' + diff);
            var level = diff > 0 ? 'ok' : (diff < 0 ? 'warn' : 'info');
            var socialTag = before.social >= 60 ? '高社交' : (before.social <= 30 ? '低社交' : '中社交');
            var angerTag = before.anger > 50 ? ' [愤怒中·传染率降70%]' : '';
            appendDialogue('system',
                before.emoji + before.name + ': ' + before.mood + '→' + afterMood +
                ' (' + diffStr + ') ' + socialTag + angerTag,
                { level: level });
        }

        appendDialogue('system',
            '💡 高社交NPC传染率0.3 · 低社交0.1 · 愤怒中NPC传染率降70% · 群体心情向平均靠拢',
            { level: 'info' });

        // 添加继续按钮
        var optionsList = document.getElementById('options-list');
        optionsList.innerHTML = '';
        var contBtn = document.createElement('button');
        contBtn.className = 'option-btn btn-primary';
        contBtn.textContent = '继续对话';
        contBtn.onclick = function() {
            clearDialogue();
            loadNpc(_currentNpcId);
        };
        optionsList.appendChild(contBtn);

        updateStatusBar();
    } catch (e) {
        console.error('[情绪传染错误]', e);
        appendDialogue('system', '⚠ 情绪传染出错：' + (e.message || '未知错误'), { level: 'warn' });
    }
}

// 💬 主动话题场景：NPC主动发起 → 玩家选项 → NPC展开 → 玩家追问
function triggerInitiative() {
    try {
        clearDialogue();
        addSeparator('💬 主动话题场景');
        var npcId = _currentNpcId;
        var state = DailyEngine.getDailyState(npcId);
        var profile = DailyEngine.getNpcProfile(npcId);
        var name = profile ? profile.name : npcId;
        var rel = window.getRel(npcId);
        var relStr = getRelStr(rel);

        appendDialogue('system', '💬 主动话题 · NPC自主发起', { level: 'gold' });
        appendDialogue('system',

            ' · 愤怒: ' + (state ? state.angerLevel : 0) + ' · 关系: ' + rel,
            { level: 'info' });

        // 阶段1：NPC主动发起（循环调用直到触发主动话题）
        var dlg = null;
        for (var i = 0; i < 20; i++) {
            dlg = DailyEngine.generateContextDialogue(npcId, relStr);
            if (dlg && dlg.opening && dlg.fullDialogue === dlg.opening) break;
        }

        var npcText = dlg ? dlg.fullDialogue : '……';
        _dlgCtx = {
            npcId: npcId, relStr: relStr, turnCount: 0, topicTurnCount: 0,
            recentUtterances: [], lastNpcText: npcText,
            currentTopic: dlg ? (dlg.topic || '') : '',
            sessionStart: Date.now(), currentScene: 'initiative'
        };
        _dialogueEnded = false;

        appendDialogue('npc', npcText);
        appendDialogue('system',
            '💡 优先级: 愤怒余气 > 情绪倾诉 > 关系驱动 > 性格驱动',
            { level: 'info' });

        // 阶段2：玩家选项（含追问选项，引出NPC展开）
        var optionsList = document.getElementById('options-list');
        optionsList.innerHTML = '';

        var initOptions = [
            { playerOption: '咋了？', intent: 'probe', category: 'followup' },
            { playerOption: '听着呢', intent: 'listen', category: 'empathy' },
            { playerOption: '什么事？', intent: 'probe', category: 'followup' }
        ];
        for (var i = 0; i < initOptions.length; i++) {
            (function(opt) {
                var btn = document.createElement('button');
                var cls = 'option-btn';
                if (opt.category === 'followup') cls += ' opt-followup';
                btn.className = cls;
                btn.innerHTML = escapeHtml(opt.playerOption) +
                    '<span class="opt-intent">[' + escapeHtml(opt.intent) + ']</span>';
                btn.onclick = function() { handleInitiativeOptionClick(opt.playerOption, opt.intent, opt); };
                optionsList.appendChild(btn);
            })(initOptions[i]);
        }

    } catch (e) {
        console.error('[主动话题错误]', e);
        appendDialogue('system', '⚠ 主动话题出错：' + (e.message || '未知错误'), { level: 'warn' });
    }
}

// 主动话题场景选项处理（阶段3：NPC展开 → 阶段4：玩家追问）
function handleInitiativeOptionClick(playerOption, intent, opt) {
    try {
        if (!_dlgCtx || _dialogueEnded) return;
        _dlgCtx.turnCount++;
        _dlgCtx.topicTurnCount++;
        _dlgCtx.recentUtterances.push(playerOption);

        appendDialogue('player', playerOption);

        // 阶段3：NPC展开
        var reply = DailyEngine.generateFollowUpReply(_currentNpcId, playerOption, intent, _dlgCtx);
        _dlgCtx.lastNpcText = reply;
        appendDialogue('npc', reply);

        // 检查是否结束
        if (shouldEndDialogue(_currentNpcId)) {
            showEndDialogueOptions(_currentNpcId);
            updateStatusBar();
            return;
        }

        // 阶段4：玩家追问（回到通用选项生成，含追问+结束选项）
        var state = DailyEngine.getDailyState(_currentNpcId);
        var rel = window.getRel(_currentNpcId);
        var relStr = getRelStr(rel);
        generateAndShowOptions(reply, state, relStr, playerOption);
        updateStatusBar();
    } catch (e) {
        console.error('[主动话题选项处理错误]', e);
        appendDialogue('system', '⚠ 处理出错：' + (e.message || '未知错误'), { level: 'warn' });
    }
}

// ═══════════════════════════════════════════════════════════
//  系统全景仪表盘 · 4面板实时状态展示
//  面板1:时间天气(3s) 面板2:NPC状态(2s) 面板3:关系图谱(5s) 面板4:性格雷达(NPC切换时)
// ═══════════════════════════════════════════════════════════

var _dashboardOpen = false;
var _dashboardTimers = { time: null, npc: null, relation: null, radar: null };
var _dashboardLastNpc = null;
var _relNodePositions = null;  // 关系图节点位置（支持拖动记忆）

// 仪表盘展示的5个NPC（与主界面切换器一致）
var _dashNpcIds = ['lao_chen', 'zhao_shen', 'tie_zhao', 'su_shijie', 'du_xing'];

// 地点ID → 中文名映射
var _locationNames = {
    teahouse: '茶馆', market: '集市', home: '家中', east_street: '东街',
    west_street: '西街', south_street: '南街', north_street: '北街',
    work: '作坊', shelter: '避雨处', favorite: '常去之地',
    teahouse_main: '茶馆大厅', forge: '铁匠铺', sect: '门派', inn: '客栈',
    river: '河边', field: '田野', temple: '庙宇', square: '广场',
    south_gate: '南门', north_gate: '北门', east_gate: '东门', west_gate: '西门'
};

// 地点ID转中文名
function _locName(loc) {
    if (!loc) return '未知';
    if (_locationNames[loc]) return _locationNames[loc];
    return loc;
}

// 极坐标转直角坐标（angle=0时在顶部，顺时针递增）
function _polarToCart(cx, cy, r, angle) {
    var rad = (angle - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

// 生成扇形路径（饼图切片）
function _sectorPath(cx, cy, r, startAngle, endAngle) {
    var p1 = _polarToCart(cx, cy, r, startAngle);
    var p2 = _polarToCart(cx, cy, r, endAngle);
    var largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
    return 'M ' + cx + ' ' + cy + ' L ' + p1.x + ' ' + p1.y +
           ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + p2.x + ' ' + p2.y + ' Z';
}

// 生成弧线路径（不闭合，仅描边）
function _arcPath(cx, cy, r, startAngle, endAngle) {
    var p1 = _polarToCart(cx, cy, r, startAngle);
    var p2 = _polarToCart(cx, cy, r, endAngle);
    var largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
    return 'M ' + p1.x + ' ' + p1.y + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + p2.x + ' ' + p2.y;
}

// ── 仪表盘开关 ──
function toggleDashboard() {
    var modal = document.getElementById('dashboard-modal');
    if (_dashboardOpen) {
        closeDashboard();
    } else {
        modal.classList.remove('hidden');
        _dashboardOpen = true;
        // 立即渲染全部4个面板
        renderTimeWeatherPanel();
        renderNpcStatusPanel();
        renderRelationGraph();
        renderPersonalityRadar();
        // 启动定时刷新
        _startDashboardTimers();
    }
}

function closeDashboard() {
    var modal = document.getElementById('dashboard-modal');
    modal.classList.add('hidden');
    _dashboardOpen = false;
    _stopDashboardTimers();
}

// ── 定时刷新管理 ──
function _startDashboardTimers() {
    _stopDashboardTimers();
    _dashboardTimers.time = setInterval(renderTimeWeatherPanel, 3000);      // 时间天气：3秒
    _dashboardTimers.npc = setInterval(renderNpcStatusPanel, 2000);         // NPC状态：2秒
    _dashboardTimers.relation = setInterval(renderRelationGraph, 5000);     // 关系图谱：5秒
    // 性格雷达：每秒检查NPC是否切换，切换时刷新
    _dashboardTimers.radar = setInterval(function() {
        if (_dashboardLastNpc !== _currentNpcId) {
            renderPersonalityRadar();
        }
    }, 1000);
}

function _stopDashboardTimers() {
    for (var k in _dashboardTimers) {
        if (_dashboardTimers[k]) {
            clearInterval(_dashboardTimers[k]);
            _dashboardTimers[k] = null;
        }
    }
}

// ═══════════════════════════════════════════════════════════
//  面板1：时间天气 — 6时段圆形时钟 + 天气/季节/日期
// ═══════════════════════════════════════════════════════════
function renderTimeWeatherPanel() {
    if (!_dashboardOpen) return;
    var body = document.getElementById('panel-time-body');
    if (!body) return;
    try {
        var period = GameTime.getPeriod();
        var weather = GameTime.getWeather();
        var season = GameTime.getSeason();
        var day = GameTime.getDay();
        var month = GameTime.getMonth();
        var progress = GameTime.getPeriodProgress();
        var year = GameTime.getYear();
        var totalDays = GameTime.getTotalDays();

        // 6时段定义（与GameTime.PERIOD一致）
        var periods = [
            { id: 'dawn',      name: '黎明', emoji: '🌅' },
            { id: 'morning',   name: '上午', emoji: '☀️' },
            { id: 'noon',      name: '中午', emoji: '🌞' },
            { id: 'afternoon', name: '下午', emoji: '🌤' },
            { id: 'evening',   name: '傍晚', emoji: '🌇' },
            { id: 'night',     name: '夜晚', emoji: '🌙' }
        ];
        var currentIdx = 0;
        for (var i = 0; i < periods.length; i++) {
            if (periods[i].id === period.id) { currentIdx = i; break; }
        }

        // SVG圆形时钟
        var cx = 80, cy = 80, r = 58;
        var svg = '<svg class="tw-clock-svg" width="160" height="160" viewBox="0 0 160 160">';

        // 6个时段扇形（当前时段高亮）
        for (var i = 0; i < 6; i++) {
            var startA = i * 60;
            var endA = (i + 1) * 60;
            var isCurrent = (i === currentIdx);
            var fill = isCurrent ? 'rgba(240,194,127,0.35)' : 'rgba(15,15,30,0.5)';
            var stroke = isCurrent ? '#f0c27f' : 'rgba(240,194,127,0.15)';
            svg += '<path d="' + _sectorPath(cx, cy, r, startA, endA) +
                   '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="1"/>';
            // 时段emoji标签
            var midA = startA + 30;
            var labelPos = _polarToCart(cx, cy, r * 0.72, midA);
            svg += '<text x="' + labelPos.x + '" y="' + (labelPos.y + 5) +
                   '" text-anchor="middle" font-size="13" fill="' + (isCurrent ? '#f0c27f' : '#6272a4') + '">' +
                   periods[i].emoji + '</text>';
        }

        // 时段进度弧线（金色，外圈）
        var progStart = currentIdx * 60;
        var progEnd = progStart + 60 * progress;
        if (progress > 0.01) {
            svg += '<path d="' + _arcPath(cx, cy, r + 5, progStart, progEnd) +
                   '" fill="none" stroke="#f0c27f" stroke-width="3" stroke-linecap="round" opacity="0.9"/>';
        }

        // 中心圆 + 天气emoji + 时段名
        svg += '<circle cx="' + cx + '" cy="' + cy + '" r="26" fill="rgba(15,15,30,0.92)" stroke="#f0c27f" stroke-width="1"/>';
        svg += '<text x="' + cx + '" y="' + (cy - 1) + '" text-anchor="middle" font-size="20">' +
               (weather ? weather.emoji : '☀️') + '</text>';
        svg += '<text x="' + cx + '" y="' + (cy + 15) + '" text-anchor="middle" font-size="9" fill="#a0a0c0">' +
               (period ? period.name : '') + '</text>';
        svg += '</svg>';

        // 右侧信息区
        var html = '<div class="tw-clock-wrap">' + svg +
            '<div class="tw-info">' +
              '<div class="tw-row"><span class="tw-weather">' + (weather ? weather.emoji : '') +
              '</span><span class="tw-val">' + (weather ? weather.name : '未知') + '</span></div>' +
              '<div class="tw-row"><span class="tw-season">' + (season ? season.emoji : '') +
              '</span><span class="tw-label">季节</span><span class="tw-val">' + (season ? season.fullName : '') + '</span></div>' +
              '<div class="tw-row"><span class="tw-label">时段</span><span class="tw-val">' +
              (period ? period.name : '') + ' (' + Math.round(progress * 100) + '%)</span></div>' +
              '<div class="tw-date">第' + year + '年 · ' + (month ? month.name : '') + day + '日<br>游戏第' + (totalDays + 1) + '天</div>' +
            '</div></div>';
        body.innerHTML = html;
    } catch (e) {
        body.innerHTML = '<div style="color:#ff5555;font-size:11px">时间面板渲染失败: ' + escapeHtml(e.message || '') + '</div>';
    }
}

// ═══════════════════════════════════════════════════════════
//  面板3：关系图谱 — 5节点五边形布局 + 关系连线
//  连线颜色5档: cold灰虚/acquaintance灰实/familiar蓝实/friend绿实/best_friend金粗
// ═══════════════════════════════════════════════════════════
function renderRelationGraph() {
    if (!_dashboardOpen) return;
    var body = document.getElementById('panel-relation-body');
    if (!body) return;
    try {
        var W = 320, H = 260;
        var cx = W / 2, cy = H / 2;
        var r = 92;
        var n = _dashNpcIds.length;

        // 五边形节点位置（首次计算后缓存，支持拖动记忆）
        if (!_relNodePositions) {
            _relNodePositions = {};
            for (var i = 0; i < n; i++) {
                var angle = (i * 360 / n);  // 从顶部开始顺时针
                var pos = _polarToCart(cx, cy, r, angle);
                _relNodePositions[_dashNpcIds[i]] = { x: pos.x, y: pos.y };
            }
        }

        var svg = '<svg class="relation-svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">';

        // ── 先画所有连线（在节点下方）──
        for (var a = 0; a < n; a++) {
            for (var b = a + 1; b < n; b++) {
                var idA = _dashNpcIds[a];
                var idB = _dashNpcIds[b];
                var rel = EncounterSystem.getRelation(idA, idB);
                var relType = EncounterSystem.getRelationType(rel);
                var posA = _relNodePositions[idA];
                var posB = _relNodePositions[idB];

                // 关系5档配色与线宽
                var color, width, dash;
                switch (relType) {
                    case 'cold':         color = '#6272a4'; width = 1;   dash = '4,3'; break;  // 灰色虚线
                    case 'acquaintance': color = '#a0a0c0'; width = 1.2; dash = 'none'; break; // 灰色实线
                    case 'familiar':     color = '#8be9fd'; width = 1.8; dash = 'none'; break; // 蓝色实线
                    case 'friend':       color = '#50fa7b'; width = 2.5; dash = 'none'; break; // 绿色实线
                    case 'best_friend':  color = '#f0c27f'; width = 3.5; dash = 'none'; break; // 金色粗实线
                    default:             color = '#6272a4'; width = 1;   dash = 'none';
                }

                var midX = (posA.x + posB.x) / 2;
                var midY = (posA.y + posB.y) / 2;
                // 连线（带title悬停提示）
                svg += '<line class="rel-line" x1="' + posA.x + '" y1="' + posA.y +
                       '" x2="' + posB.x + '" y2="' + posB.y +
                       '" stroke="' + color + '" stroke-width="' + width +
                       '" stroke-dasharray="' + dash + '" stroke-opacity="0.75">' +
                       '<title>' + escapeHtml(relType) + ': ' + rel + '</title></line>';
                // 关系值标签
                svg += '<text class="rel-val-label" x="' + midX + '" y="' + (midY - 2) +
                       '" fill="' + color + '" opacity="0.85">' + rel + '</text>';
            }
        }

        // ── 画节点（圆形 + emoji + 名称）──
        for (var i = 0; i < n; i++) {
            var npcId = _dashNpcIds[i];
            var pos = _relNodePositions[npcId];
            var profile = DailyEngine.getNpcProfile(npcId);
            var meta = _npcMeta[npcId] || { emoji: '❓' };
            var name = profile ? profile.name : npcId;
            var isActive = (npcId === _currentNpcId);

            svg += '<g class="rel-node-group' + (isActive ? ' active' : '') + '" data-npc="' + npcId + '">';
            svg += '<circle class="rel-node-circle" cx="' + pos.x + '" cy="' + pos.y + '" r="19"/>';
            svg += '<text class="rel-node-emoji" x="' + pos.x + '" y="' + pos.y + '">' + meta.emoji + '</text>';
            svg += '<text class="rel-node-label" x="' + pos.x + '" y="' + (pos.y + 32) + '">' + escapeHtml(name) + '</text>';
            svg += '</g>';
        }

        svg += '</svg>';
        body.innerHTML = svg;

        // 绑定节点点击 → 切换主界面NPC
        var groups = body.querySelectorAll('.rel-node-group');
        for (var gi = 0; gi < groups.length; gi++) {
            groups[gi].addEventListener('click', function() {
                var nid = this.getAttribute('data-npc');
                if (nid && nid !== _currentNpcId) {
                    clearDialogue();
                    loadNpc(nid);
                    renderPersonalityRadar();
                    renderRelationGraph();  // 刷新高亮
                }
            });
        }
    } catch (e) {
        body.innerHTML = '<div style="color:#ff5555;font-size:11px">关系图谱渲染失败: ' + escapeHtml(e.message || '') + '</div>';
    }
}

// ═══════════════════════════════════════════════════════════
//  面板4：性格雷达 — 9维性格雷达图 + 4项需求进度条
//  9维: 社交/好奇/情感/勤奋/冒险/温暖/幽默/固执/谨慎
// ═══════════════════════════════════════════════════════════
function renderPersonalityRadar() {
    if (!_dashboardOpen) return;
    var body = document.getElementById('panel-personality-body');
    if (!body) return;
    _dashboardLastNpc = _currentNpcId;  // 记录当前展示的NPC
    try {
        var npcId = _currentNpcId;
        var profile = DailyEngine.getNpcProfile(npcId);
        var state = DailyEngine.getDailyState(npcId);
        var meta = _npcMeta[npcId] || { emoji: '❓' };
        var name = profile ? profile.name : npcId;

        if (!profile || !profile.personality) {
            body.innerHTML = '<div style="color:#a0a0c0;font-size:11px">无法获取' + escapeHtml(name) + '的性格数据</div>';
            return;
        }

        var p = profile.personality;
        // 9维性格定义
        var dims = [
            { key: 'social',      label: '社交' },
            { key: 'curiosity',   label: '好奇' },
            { key: 'emotion',     label: '情感' },
            { key: 'diligence',   label: '勤奋' },
            { key: 'adventure',   label: '冒险' },
            { key: 'warmth',      label: '温暖' },
            { key: 'humor',       label: '幽默' },
            { key: 'stubbornness',label: '固执' },
            { key: 'caution',     label: '谨慎' }
        ];

        var W = 220, H = 220;
        var cx = W / 2, cy = H / 2;
        var R = 78;
        var n = dims.length;

        var svg = '<svg class="radar-svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">';

        // 背景网格（4层同心多边形）
        for (var layer = 1; layer <= 4; layer++) {
            var lr = R * layer / 4;
            var pts = [];
            for (var i = 0; i < n; i++) {
                var angle = (i * 360 / n);
                var pos = _polarToCart(cx, cy, lr, angle);
                pts.push(pos.x.toFixed(1) + ',' + pos.y.toFixed(1));
            }
            svg += '<polygon points="' + pts.join(' ') + '" fill="none" stroke="rgba(240,194,127,0.12)" stroke-width="1"/>';
        }

        // 9条轴线
        for (var i = 0; i < n; i++) {
            var angle = (i * 360 / n);
            var pos = _polarToCart(cx, cy, R, angle);
            svg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + pos.x.toFixed(1) + '" y2="' + pos.y.toFixed(1) + '" stroke="rgba(240,194,127,0.15)" stroke-width="1"/>';
        }

        // 数据多边形（金色填充）
        var dataPts = [];
        for (var i = 0; i < n; i++) {
            var angle = (i * 360 / n);
            var val = p[dims[i].key] !== undefined ? p[dims[i].key] : 50;
            var rr = R * (Math.max(0, Math.min(100, val)) / 100);
            var pos = _polarToCart(cx, cy, rr, angle);
            dataPts.push(pos.x.toFixed(1) + ',' + pos.y.toFixed(1));
        }
        svg += '<polygon points="' + dataPts.join(' ') + '" fill="rgba(240,194,127,0.3)" stroke="#f0c27f" stroke-width="2"/>';

        // 数据点（金色圆点）
        for (var i = 0; i < n; i++) {
            var angle = (i * 360 / n);
            var val = p[dims[i].key] !== undefined ? p[dims[i].key] : 50;
            var rr = R * (Math.max(0, Math.min(100, val)) / 100);
            var pos = _polarToCart(cx, cy, rr, angle);
            svg += '<circle cx="' + pos.x.toFixed(1) + '" cy="' + pos.y.toFixed(1) + '" r="3" fill="#f0c27f"/>';
        }

        // 维度标签
        for (var i = 0; i < n; i++) {
            var angle = (i * 360 / n);
            var labelPos = _polarToCart(cx, cy, R + 15, angle);
            svg += '<text x="' + labelPos.x.toFixed(1) + '" y="' + (labelPos.y + 3).toFixed(1) +
                   '" text-anchor="middle" font-size="10" fill="#a0a0c0">' + dims[i].label + '</text>';
        }

        svg += '</svg>';

        // 需求值进度条（饥饿/疲劳/社交需求/探索欲望）
        var needs = [
            { label: '饥饿',     val: state ? (state.hunger || 0) : 0,       color: '#ff5555' },
            { label: '疲劳',     val: state ? (state.fatigue || 0) : 0,      color: '#bd93f9' },
            { label: '社交需求', val: state ? (state.socialNeed || 0) : 0,   color: '#8be9fd' },
            { label: '探索欲望', val: state ? (state.exploreDesire || 0) : 0,color: '#50fa7b' }
        ];

        var needsHtml = '<div class="radar-needs">';
        needsHtml += '<div class="radar-npc-name">' + meta.emoji + ' ' + escapeHtml(name) + ' · 性格雷达</div>';
        for (var i = 0; i < needs.length; i++) {
            var nd = needs[i];
            var pct = Math.max(0, Math.min(100, nd.val));
            needsHtml += '<div class="need-item">';
            needsHtml += '<div class="need-label"><span>' + nd.label + '</span><span class="val">' + Math.round(pct) + '</span></div>';
            needsHtml += '<div class="need-bar"><div class="need-fill" style="width:' + pct + '%;background:' + nd.color + '"></div></div>';
            needsHtml += '</div>';
        }
        needsHtml += '</div>';

        body.innerHTML = '<div class="radar-wrap">' + svg + needsHtml + '</div>';
    } catch (e) {
        body.innerHTML = '<div style="color:#ff5555;font-size:11px">性格雷达渲染失败: ' + escapeHtml(e.message || '') + '</div>';
    }
}
</script>
</body>
</html>
