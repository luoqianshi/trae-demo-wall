<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>惠生活 · 业务流程模拟器</title>
<script src="shared-data.js"></script>
<style>
:root {
  --c-color: #FF6B6B;
  --admin-color: #4ECDC4;
  --merchant-color: #FFB830;
  --sales-color: #A78BFA;
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a1f35;
  --bg-card-hover: #222845;
  --text-primary: #e8eaf6;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border-color: #2a3050;
  --glow-c: 0 0 20px rgba(255,107,107,0.4);
  --glow-admin: 0 0 20px rgba(78,205,196,0.4);
  --glow-merchant: 0 0 20px rgba(255,184,48,0.4);
  --glow-sales: 0 0 20px rgba(167,139,250,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== 背景装饰 ===== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(255,107,107,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(78,205,196,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(255,184,48,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(167,139,250,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ===== 顶部标题栏 ===== */
.header {
  position: relative;
  z-index: 10;
  padding: 20px 32px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
  background: linear-gradient(180deg, rgba(10,14,26,0.95), rgba(10,14,26,0.8));
  backdrop-filter: blur(10px);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--c-color), var(--admin-color), var(--merchant-color), var(--sales-color));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}

.logo-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-left: 4px;
}

.header-controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  padding: 8px 18px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}

.btn:hover {
  background: var(--bg-card-hover);
  border-color: var(--text-muted);
}

.btn.active {
  border-color: var(--admin-color);
  background: rgba(78,205,196,0.15);
  color: var(--admin-color);
}

.btn-reset {
  border-color: var(--c-color);
  color: var(--c-color);
}

.btn-reset:hover {
  background: rgba(255,107,107,0.15);
}

.btn-nav {
  min-width: 90px;
  justify-content: center;
}

.btn-nav:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* ===== 时间线 ===== */
.timeline-section {
  position: relative;
  z-index: 10;
  padding: 16px 32px 12px;
  background: rgba(17,24,39,0.6);
  border-bottom: 1px solid var(--border-color);
}

.step-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.step-label {
  font-size: 15px;
  font-weight: 600;
}

.step-label .step-num {
  color: var(--admin-color);
  margin-right: 6px;
}

.step-desc {
  font-size: 13px;
  color: var(--text-secondary);
}

.timeline-bar {
  position: relative;
  height: 6px;
  background: var(--bg-card);
  border-radius: 3px;
  overflow: visible;
}

.timeline-progress {
  height: 100%;
  background: linear-gradient(90deg, var(--c-color), var(--admin-color));
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}

.timeline-dots {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.timeline-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 2px solid var(--border-color);
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  z-index: 2;
}

.timeline-dot.completed {
  background: var(--admin-color);
  border-color: var(--admin-color);
}

.timeline-dot.current {
  background: var(--bg-primary);
  border-color: var(--admin-color);
  box-shadow: 0 0 12px rgba(78,205,196,0.6);
  transform: scale(1.3);
}

.timeline-dot:hover {
  transform: scale(1.4);
}

/* ===== 主面板区域 ===== */
.main-area {
  position: relative;
  z-index: 10;
  padding: 20px 32px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 16px;
  min-height: 340px;
}

.panel {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  overflow: hidden;
  transition: all 0.4s;
  position: relative;
}

.panel.active {
  transform: translateY(-2px);
}

.panel.active.panel-c { border-color: var(--c-color); box-shadow: var(--glow-c); }
.panel.active.panel-admin { border-color: var(--admin-color); box-shadow: var(--glow-admin); }
.panel.active.panel-merchant { border-color: var(--merchant-color); box-shadow: var(--glow-merchant); }
.panel.active.panel-sales { border-color: var(--sales-color); box-shadow: var(--glow-sales); }

.panel-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
}

.panel-c .panel-header { background: rgba(255,107,107,0.08); }
.panel-admin .panel-header { background: rgba(78,205,196,0.08); }
.panel-merchant .panel-header { background: rgba(255,184,48,0.08); }
.panel-sales .panel-header { background: rgba(167,139,250,0.08); }

.panel-title {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-c .panel-title { color: var(--c-color); }
.panel-admin .panel-title { color: var(--admin-color); }
.panel-merchant .panel-title { color: var(--merchant-color); }
.panel-sales .panel-title { color: var(--sales-color); }

.panel-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all 0.3s;
}

.panel.active .panel-indicator {
  animation: pulse-dot 1.2s infinite;
}

.panel-c.active .panel-indicator { background: var(--c-color); }
.panel-admin.active .panel-indicator { background: var(--admin-color); }
.panel-merchant.active .panel-indicator { background: var(--merchant-color); }
.panel-sales.active .panel-indicator { background: var(--sales-color); }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.5); }
}

.panel-body {
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.7;
  min-height: 240px;
  max-height: 280px;
  overflow-y: auto;
}

.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

.state-item {
  padding: 6px 0;
  border-bottom: 1px solid rgba(42,48,80,0.5);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.state-item:last-child { border-bottom: none; }

.state-key {
  color: var(--text-secondary);
  font-size: 12px;
}

.state-val {
  font-weight: 600;
  font-size: 13px;
}

.state-val.highlight {
  animation: val-flash 0.6s ease;
}

@keyframes val-flash {
  0% { color: #fff; text-shadow: 0 0 8px currentColor; }
  100% { text-shadow: none; }
}

.panel-c .state-val { color: var(--c-color); }
.panel-admin .state-val { color: var(--admin-color); }
.panel-merchant .state-val { color: var(--merchant-color); }
.panel-sales .state-val { color: var(--sales-color); }

.action-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 8px;
  animation: fadeSlideIn 0.4s ease;
}

.panel-c .action-badge { background: rgba(255,107,107,0.15); color: var(--c-color); }
.panel-admin .action-badge { background: rgba(78,205,196,0.15); color: var(--admin-color); }
.panel-merchant .action-badge { background: rgba(255,184,48,0.15); color: var(--merchant-color); }
.panel-sales .action-badge { background: rgba(167,139,250,0.15); color: var(--sales-color); }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== 数据流动画 SVG ===== */
.flow-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 20;
}

.flow-particle {
  r: 4;
  filter: url(#glow);
}

.flow-path {
  fill: none;
  stroke-width: 1.5;
  stroke-dasharray: 6 4;
  opacity: 0.4;
}

/* ===== 日志区域 ===== */
.log-section {
  position: relative;
  z-index: 10;
  margin: 0 32px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  overflow: hidden;
}

.log-header {
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 600;
  border-bottom: 1px solid var(--border-color);
  background: rgba(78,205,196,0.05);
  display: flex;
  align-items: center;
  gap: 8px;
}

.log-body {
  padding: 12px 16px;
  max-height: 160px;
  overflow-y: auto;
  font-size: 12px;
  line-height: 1.8;
}

.log-body::-webkit-scrollbar { width: 4px; }
.log-body::-webkit-scrollbar-track { background: transparent; }
.log-body::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

.log-entry {
  display: flex;
  gap: 12px;
  padding: 3px 0;
  animation: fadeSlideIn 0.3s ease;
}

.log-time {
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 52px;
}

.log-text {
  color: var(--text-secondary);
}

.log-entry .log-text strong {
  color: var(--text-primary);
  font-weight: 600;
}

/* ===== 资金流向区域 ===== */
.fund-section {
  position: relative;
  z-index: 10;
  margin: 16px 32px 24px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  overflow: hidden;
}

.fund-header {
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 600;
  border-bottom: 1px solid var(--border-color);
  background: rgba(255,184,48,0.05);
  display: flex;
  align-items: center;
  gap: 8px;
}

.fund-body {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  min-height: 80px;
}

.fund-node {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  min-width: 100px;
  position: relative;
}

.fund-node.consumer { background: rgba(255,107,107,0.15); color: var(--c-color); border: 1px solid rgba(255,107,107,0.3); }
.fund-node.platform { background: rgba(78,205,196,0.15); color: var(--admin-color); border: 1px solid rgba(78,205,196,0.3); }
.fund-node.merchant-node { background: rgba(255,184,48,0.15); color: var(--merchant-color); border: 1px solid rgba(255,184,48,0.3); }
.fund-node.sales-node { background: rgba(167,139,250,0.15); color: var(--sales-color); border: 1px solid rgba(167,139,250,0.3); }

.fund-amount {
  font-size: 18px;
  font-weight: 700;
  margin-top: 4px;
}

.fund-arrow {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 8px;
  color: var(--text-muted);
  font-size: 20px;
  min-width: 60px;
}

.fund-arrow-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.fund-split {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

/* ===== 数据流动画覆盖层 ===== */
#flow-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 100;
}

/* ===== 空状态 ===== */
.empty-state {
  color: var(--text-muted);
  text-align: center;
  padding: 40px 20px;
  font-size: 13px;
}

.empty-state .icon {
  font-size: 32px;
  margin-bottom: 8px;
  opacity: 0.4;
}

/* ===== 响应式 ===== */
@media (max-width: 1200px) {
  .main-area {
    grid-template-columns: 1fr 1fr;
  }
  .fund-body {
    flex-wrap: wrap;
  }
}

@media (max-width: 768px) {
  .main-area {
    grid-template-columns: 1fr;
  }
  .header {
    flex-direction: column;
    gap: 12px;
  }
}

/* ===== 动画辅助 ===== */
.typing-cursor::after {
  content: '|';
  animation: blink 0.8s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.animate-in {
  animation: fadeSlideIn 0.5s ease;
}

.count-up {
  transition: all 0.3s;
}

/* ===== 步骤描述面板 ===== */
.step-detail {
  position: relative;
  z-index: 10;
  margin: 0 32px 0;
  padding: 12px 20px;
  background: linear-gradient(135deg, rgba(78,205,196,0.08), rgba(167,139,250,0.08));
  border: 1px solid rgba(78,205,196,0.2);
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 12px;
}

.step-detail-icon {
  font-size: 20px;
}

.step-detail-text strong {
  color: var(--text-primary);
}
</style>
</head>
<body>

<!-- 数据流动画SVG覆盖层 -->
<svg id="flow-overlay" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>

<!-- 顶部标题栏 -->
<div class="header">
  <div class="header-left">
    <span class="logo">惠生活</span>
    <span class="logo-sub">· 业务流程模拟器</span>
  </div>
  <div class="header-controls">
    <button class="btn btn-nav" id="btn-prev" onclick="prevStep()" disabled>◀ 上一步</button>
    <button class="btn btn-nav" id="btn-next" onclick="nextStep()">下一步 ▶</button>
    <button class="btn" id="btn-auto" onclick="toggleAutoPlay()">▶ 自动播放</button>
    <button class="btn btn-reset" onclick="resetSimulator()">↺ 重置</button>
  </div>
</div>

<!-- 时间线 -->
<div class="timeline-section">
  <div class="step-info">
    <div>
      <span class="step-label"><span class="step-num" id="step-num">Step 0/10</span><span id="step-title">准备开始</span></span>
    </div>
    <div class="step-desc" id="step-desc">点击"下一步"开始模拟业务流程</div>
  </div>
  <div class="timeline-bar">
    <div class="timeline-progress" id="timeline-progress" style="width:0%"></div>
    <div class="timeline-dots" id="timeline-dots"></div>
  </div>
</div>

<!-- 步骤描述 -->
<div class="step-detail" id="step-detail" style="margin-top:12px;">
  <span class="step-detail-icon">💡</span>
  <span class="step-detail-text" id="step-detail-text">本模拟器将演示惠生活平台从商家入驻到月度复盘的完整业务流程，每一步都会调用 HuiLifeDB 进行真实数据操作。</span>
</div>

<!-- 主面板区域 -->
<div class="main-area" id="main-area">
  <!-- C端 -->
  <div class="panel panel-c" id="panel-c">
    <div class="panel-header">
      <span class="panel-title">📱 C端</span>
      <span class="panel-indicator"></span>
    </div>
    <div class="panel-body" id="panel-c-body">
      <div class="empty-state">
        <div class="icon">📱</div>
        等待流程开始...
      </div>
    </div>
  </div>

  <!-- 管理后台 -->
  <div class="panel panel-admin" id="panel-admin">
    <div class="panel-header">
      <span class="panel-title">🖥️ 管理后台</span>
      <span class="panel-indicator"></span>
    </div>
    <div class="panel-body" id="panel-admin-body">
      <div class="empty-state">
        <div class="icon">🖥️</div>
        等待流程开始...
      </div>
    </div>
  </div>

  <!-- 商家端 -->
  <div class="panel panel-merchant" id="panel-merchant">
    <div class="panel-header">
      <span class="panel-title">🏪 商家端</span>
      <span class="panel-indicator"></span>
    </div>
    <div class="panel-body" id="panel-merchant-body">
      <div class="empty-state">
        <div class="icon">🏪</div>
        等待流程开始...
      </div>
    </div>
  </div>

  <!-- 业务员端 -->
  <div class="panel panel-sales" id="panel-sales">

      <div class="empty-state">

</div>

<!-- 操作日志 -->
<div class="log-section">
  <div class="log-header">📋 操作日志</div>
  <div class="log-body" id="log-body">
    <div class="log-entry">
      <span class="log-time">--:--</span>
      <span class="log-text">模拟器已就绪，等待开始...</span>
    </div>
  </div>
</div>

<!-- 资金流向 -->
<div class="fund-section">
  <div class="fund-header">💰 资金流向</div>
  <div class="fund-body" id="fund-body">
    <div class="fund-node consumer">
      <div>消费者</div>
      <div class="fund-amount" id="fund-consumer">¥0</div>
    </div>
    <div class="fund-arrow">
      →<div class="fund-arrow-label" id="fund-arrow-1">支付</div>
    </div>
    <div class="fund-node platform">
      <div>平台</div>
      <div class="fund-amount" id="fund-platform">¥0</div>
    </div>
    <div class="fund-arrow">
      →<div class="fund-arrow-label" id="fund-arrow-2">结算</div>
    </div>
    <div class="fund-split">
      <div class="fund-node merchant-node">
        <div>商家</div>
        <div class="fund-amount" id="fund-merchant">¥0</div>
      </div>
      <div class="fund-node sales-node">
        <div>业务员佣金</div>
        <div class="fund-amount" id="fund-sales">¥0</div>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== 模拟器状态 ====================
var currentStep = 0;
var totalSteps = 10;
var autoPlayTimer = null;
var isAutoPlaying = false;
var logs = [];
var simData = {
  merchantAppId: null,

  merchantName: '老街火锅',

  userName1: '小美',
  userId2: 'U_SIM02',

  bloggerUserId: 'U002',

  salesCommission: 12,
  merchantIncome: 79.2,
  platformIncome: 19.8,
  totalRevenue: 0,
  totalOrders: 0,
  verifyRate: 0

// ==================== 步骤定义 ====================
var steps = [
  {
    title: '商家入驻申请',

// ==================== 初始化 ====================
function initSimulator() {
  // 生成时间线圆点
  var dotsContainer = document.getElementById('timeline-dots');
  dotsContainer.innerHTML = '';
  for (var i = 1; i <= totalSteps; i++) {
    var dot = document.createElement('div');
    dot.className = 'timeline-dot';
    dot.setAttribute('data-step', i);
    dot.title = 'Step ' + i + ': ' + steps[i-1].title;
    dot.onclick = (function(step) { return function() { goToStep(step); }; })(i);
    dotsContainer.appendChild(dot);
  }
  updateUI();
}

// ==================== UI 辅助函数 ====================

function setPanelContent(panelKey, items, actionText) {
  var body = document.getElementById('panel-' + panelKey + '-body');
  var html = '';
  for (var i = 0; i < items.length; i++) {
    html += '<div class="state-item animate-in" style="animation-delay:' + (i * 0.05) + 's">';
    html += '<span class="state-key">' + items[i].key + '</span>';
    html += '<span class="state-val highlight">' + items[i].val + '</span>';
    html += '</div>';
  }
  if (actionText) {
    html += '<div class="action-badge">' + actionText + '</div>';
  }
  body.innerHTML = html;
}

function addLog(text) {
  var now = new Date();
  var timeStr = ('0' + now.getHours()).slice(-2) + ':' + ('0' + now.getMinutes()).slice(-2);
  logs.push({ time: timeStr, text: text });

  var logBody = document.getElementById('log-body');
  var entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = '<span class="log-time">' + timeStr + '</span><span class="log-text">' + text + '</span>';
  logBody.appendChild(entry);
  logBody.scrollTop = logBody.scrollHeight;
}

function updateFundFlow(consumer, platform, merchant, sales) {
  animateNumber('fund-consumer', consumer, '¥');
  animateNumber('fund-platform', platform, '¥');
  animateNumber('fund-merchant', merchant, '¥');
  animateNumber('fund-sales', sales, '¥');
}

function animateNumber(elementId, target, prefix) {
  var el = document.getElementById(elementId);
  var current = parseFloat(el.textContent.replace(/[¥,]/g, '')) || 0;
  var diff = target - current;
  var steps = 30;
  var stepVal = diff / steps;
  var count = 0;

  var timer = setInterval(function() {
    count++;
    current += stepVal;
    if (count >= steps) {
      current = target;
      clearInterval(timer);
    }
    el.textContent = prefix + current.toFixed(current % 1 === 0 ? 0 : 1);
  }, 20);
}

// ==================== 数据流动画 ====================

function animateDataFlow(flows) {
  if (!flows || flows.length === 0) return;

  var mainArea = document.getElementById('main-area');
  var panels = {
    c: document.getElementById('panel-c'),
    admin: document.getElementById('panel-admin'),
    merchant: document.getElementById('panel-merchant'),
    sales: document.getElementById('panel-sales')
  };

  var colors = {
    c: '#FF6B6B',
    admin: '#4ECDC4',
    merchant: '#FFB830',
    sales: '#A78BFA'
  };

  var svg = document.getElementById('flow-overlay');

  flows.forEach(function(flow, flowIndex) {
    var fromPanel = panels[flow.from];
    var toPanel = panels[flow.to];
    if (!fromPanel || !toPanel) return;

    var fromRect = fromPanel.getBoundingClientRect();
    var toRect = toPanel.getBoundingClientRect();

    var fromX = fromRect.left + fromRect.width / 2;
    var fromY = fromRect.top + fromRect.height / 2;
    var toX = toRect.left + toRect.width / 2;
    var toY = toRect.top + toRect.height / 2;

    // 创建曲线路径
    var midX = (fromX + toX) / 2;
    var midY = Math.min(fromY, toY) - 40;

    var pathD = 'M ' + fromX + ' ' + fromY + ' Q ' + midX + ' ' + midY + ' ' + toX + ' ' + toY;
    var pathId = 'flow-path-' + flowIndex + '-' + Date.now();

    // 创建路径
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathD);
    path.setAttribute('id', pathId);
    path.setAttribute('class', 'flow-path');
    path.setAttribute('stroke', colors[flow.from]);
    svg.appendChild(path);

    // 创建粒子
    var particleCount = 5;
    for (var p = 0; p < particleCount; p++) {
      (function(index) {
        setTimeout(function() {
          var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('class', 'flow-particle');
          circle.setAttribute('fill', colors[flow.from]);
          circle.setAttribute('r', '5');
          circle.setAttribute('filter', 'url(#glow)');
          svg.appendChild(circle);

          var animMotion = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
          animMotion.setAttribute('dur', '1s');
          animMotion.setAttribute('repeatCount', '1');
          animMotion.setAttribute('fill', 'freeze');

          var mpath = document.createElementNS('http://www.w3.org/2000/svg', 'mpath');
          mpath.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', '#' + pathId);
          animMotion.appendChild(mpath);
          circle.appendChild(animMotion);

          // 粒子淡出
          setTimeout(function() {
            circle.style.transition = 'opacity 0.3s';
            circle.style.opacity = '0';
            setTimeout(function() {
              if (circle.parentNode) circle.parentNode.removeChild(circle);
            }, 300);
          }, 900);
        }, index * 150);
      })(p);
    }

    // 清理路径
    setTimeout(function() {
      path.style.transition = 'opacity 0.5s';
      path.style.opacity = '0';
      setTimeout(function() {
        if (path.parentNode) path.parentNode.removeChild(path);
      }, 500);
    }, 1500);
  });
}

// ==================== 导航控制 ====================

function goToStep(step) {
  if (step < 1 || step > totalSteps) return;
  if (step <= currentStep) return; // 不允许回退到已执行的步骤（除非重置）

  // 依次执行从 currentStep+1 到 step 的所有步骤
  for (var s = currentStep + 1; s <= step; s++) {
    currentStep = s;
    steps[s-1].execute();
  }

  updateUI();
  animateDataFlow(steps[currentStep - 1].flows);
}

function nextStep() {
  if (currentStep >= totalSteps) return;
  currentStep++;
  steps[currentStep - 1].execute();
  updateUI();

  // 延迟播放数据流动画
  setTimeout(function() {
    animateDataFlow(steps[currentStep - 1].flows);
  }, 200);
}

function prevStep() {
  // 回退需要重置并重新执行
  if (currentStep <= 1) return;
  var targetStep = currentStep - 1;
  resetSimulator();
  for (var s = 1; s <= targetStep; s++) {
    currentStep = s;
    steps[s-1].execute();
  }
  updateUI();
}

function toggleAutoPlay() {
  var btn = document.getElementById('btn-auto');
  if (isAutoPlaying) {
    clearInterval(autoPlayTimer);
    autoPlayTimer = null;
    isAutoPlaying = false;
    btn.textContent = '▶ 自动播放';
    btn.classList.remove('active');
  } else {
    isAutoPlaying = true;
    btn.textContent = '⏸ 暂停';
    btn.classList.add('active');
    autoPlayTimer = setInterval(function() {
      if (currentStep >= totalSteps) {
        toggleAutoPlay();
        return;
      }
      nextStep();
    }, 3000);
  }
}

function resetSimulator() {
  // 停止自动播放
  if (isAutoPlaying) {
    toggleAutoPlay();
  }

  currentStep = 0;
  logs = [];

  // 重置 HuiLifeDB
  HuiLifeDB.reset();

  // 重置模拟器数据
  simData.merchantAppId = null;
  simData.merchantId = null;
  simData.accountId = null;
  simData.accountUsername = '';
  simData.packageId = null;
  simData.orderId1 = null;
  simData.orderId2 = null;
  simData.taskId = null;
  simData.taskAppId = null;

  // 重置面板
  ['c', 'admin', 'merchant', 'sales'].forEach(function(key) {
    document.getElementById('panel-' + key + '-body').innerHTML =
      '<div class="empty-state"><div class="icon">' +
      ({c:'📱', admin:'🖥️', merchant:'🏪', sales:'💼'}[key]) +
      '</div>等待流程开始...</div>';
  });

  // 重置日志
  document.getElementById('log-body').innerHTML =
    '<div class="log-entry"><span class="log-time">--:--</span><span class="log-text">模拟器已重置，等待开始...</span></div>';

  // 重置资金流向
  document.getElementById('fund-consumer').textContent = '¥0';
  document.getElementById('fund-platform').textContent = '¥0';
  document.getElementById('fund-merchant').textContent = '¥0';
  document.getElementById('fund-sales').textContent = '¥0';

  updateUI();
}

function updateUI() {
  // 更新步骤信息
  document.getElementById('step-num').textContent = 'Step ' + currentStep + '/' + totalSteps;

  if (currentStep === 0) {
    document.getElementById('step-title').textContent = '准备开始';
    document.getElementById('step-desc').textContent = '点击"下一步"开始模拟业务流程';
    document.getElementById('step-detail-text').innerHTML = '本模拟器将演示惠生活平台从商家入驻到月度复盘的完整业务流程，每一步都会调用 HuiLifeDB 进行真实数据操作。';
    document.getElementById('step-detail').querySelector('.step-detail-icon').textContent = '💡';
  } else {
    var step = steps[currentStep - 1];
    document.getElementById('step-title').textContent = step.title;
    document.getElementById('step-desc').textContent = step.desc;
    document.getElementById('step-detail-text').innerHTML = step.detail;
    document.getElementById('step-detail').querySelector('.step-detail-icon').textContent = step.icon;
  }

  // 更新时间线进度
  var progress = currentStep === 0 ? 0 : ((currentStep - 0.5) / totalSteps) * 100;
  document.getElementById('timeline-progress').style.width = progress + '%';

  // 更新时间线圆点
  var dots = document.querySelectorAll('.timeline-dot');
  dots.forEach(function(dot, i) {
    dot.classList.remove('completed', 'current');
    if (i + 1 < currentStep) dot.classList.add('completed');
    if (i + 1 === currentStep) dot.classList.add('current');
  });

  // 更新面板激活状态
  var activePanels = currentStep > 0 ? steps[currentStep - 1].activePanels : [];
  ['c', 'admin', 'merchant', 'sales'].forEach(function(key) {
    var panel = document.getElementById('panel-' + key);
    if (activePanels.indexOf(key) >= 0) {
      panel.classList.add('active');
    } else {
      panel.classList.remove('active');
    }
  });

  // 更新按钮状态
  document.getElementById('btn-prev').disabled = currentStep <= 1;
  document.getElementById('btn-next').disabled = currentStep >= totalSteps;
}

});
