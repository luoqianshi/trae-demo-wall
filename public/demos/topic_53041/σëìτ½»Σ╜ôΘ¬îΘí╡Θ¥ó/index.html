<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi·Seven - 高动效语音助手</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>
    <!-- 动态背景光晕层 -->
    <div class="bg-aurora">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>

    <!-- 网格背景 -->
    <div class="bg-grid"></div>

    <!-- 星空背景画布 -->
    <canvas id="stars-canvas"></canvas>

    <!-- 颗粒动画画布 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 顶部状态栏 -->
    <header class="top-bar" id="top-bar">
        <div class="brand-area">
            <div class="brand">
                <div class="brand-dot"></div>
                <span class="brand-name">Hi_Seven</span>
                <span class="brand-sub">VOICE ASSISTANT</span>
            </div>
            <!-- 电脑运行状态显示框 -->
            <div class="sys-monitor" id="sys-monitor" hidden>
                <div class="sys-monitor-header">
                    <span class="sys-monitor-title">SYSTEM STATUS</span>
                    <span class="sys-monitor-led" id="sys-led"></span>
                </div>
                <div class="sys-monitor-body">
                    <div class="sys-item">
                        <div class="sys-item-head">
                            <span class="sys-label">CPU</span>
                            <span class="sys-value" id="sys-cpu-val">0%</span>
                        </div>
                        <div class="sys-bar"><div class="sys-bar-fill" id="sys-cpu-bar"></div></div>
                        <div class="sys-sub" id="sys-cpu-sub">-- cores</div>
                    </div>
                    <div class="sys-item">
                        <div class="sys-item-head">
                            <span class="sys-label">MEM</span>
                            <span class="sys-value" id="sys-mem-val">0%</span>
                        </div>
                        <div class="sys-bar"><div class="sys-bar-fill" id="sys-mem-bar"></div></div>
                        <div class="sys-sub" id="sys-mem-sub">-- / -- GB</div>
                    </div>
                    <div class="sys-item">
                        <div class="sys-item-head">
                            <span class="sys-label">DISK</span>
                            <span class="sys-value" id="sys-disk-val">0%</span>
                        </div>
                        <div class="sys-bar"><div class="sys-bar-fill" id="sys-disk-bar"></div></div>
                        <div class="sys-sub" id="sys-disk-sub">-- / -- GB</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="top-actions">
            <button class="icon-btn" id="devices-btn" title="设备管理" aria-label="设备管理">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4zm2 2v2H4v-2h2zm4 0v2H8v-2h2zm4 0v2h-2v-2h2zm4 0v2h-2v-2h2z"/></svg>
            </button>
            <button class="icon-btn" id="settings-btn" title="设置" aria-label="设置">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
            <button class="icon-btn" id="fullscreen-btn" title="全屏" aria-label="全屏">
                <svg id="fs-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
        </div>
    </header>

    <!-- 右上角智控设备面板（拖拽排序、显隐控制） -->
    <section class="device-panel" id="device-panel" aria-live="polite">
        <div class="device-panel-header">
            <span class="device-panel-title">智控设备</span>
            <span class="device-panel-count" id="device-panel-count">0</span>
            <div class="device-panel-actions">
                <button class="device-scan-btn" id="device-scan-btn" title="扫描设备">
                    <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12 4V2L8 6l4 4V8c3.31 0 6 2.69 6 6 0 1-.25 1.97-.7 2.8l1.46 1.46C19.54 17.03 20 15.57 20 14c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1 .25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v2l4-4-4-4v2z"/></svg>
                    扫描
                </button>
                <button class="device-toggle-btn" id="device-toggle-btn" title="收起/展开" aria-label="收起">
                    <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                </button>
            </div>
        </div>
        <div class="device-list" id="device-list"></div>
    </section>

    <!-- 中心交互区 -->
    <main class="stage">
        <!-- 机器面容状态指示 -->
        <div class="face-status" id="face-status">
            <span class="status-text" id="status-text">点击麦克风开始对话</span>
        </div>

        <!-- 麦克风主按钮 -->
        <div class="mic-wrap">
            <button class="mic-btn" id="mic-btn" aria-label="麦克风">
                <span class="mic-pulse"></span>
                <span class="mic-pulse mic-pulse-2"></span>
                <svg class="mic-icon" viewBox="0 0 24 24" width="32" height="32"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
            </button>
            <div class="mic-hint" id="mic-hint">点击开始</div>
        </div>

        <!-- 音量电平条 -->
        <div class="vu-meter" id="vu-meter">
            <span class="vu-bar"></span><span class="vu-bar"></span><span class="vu-bar"></span>
            <span class="vu-bar"></span><span class="vu-bar"></span><span class="vu-bar"></span>
            <span class="vu-bar"></span><span class="vu-bar"></span><span class="vu-bar"></span>
            <span class="vu-bar"></span><span class="vu-bar"></span><span class="vu-bar"></span>
        </div>
    </main>

    <!-- 配置面板 -->
    <aside class="config-panel" id="config-panel" aria-hidden="true">
        <div class="panel-header">
            <h2>模型配置</h2>
            <button class="close-btn" id="close-panel" aria-label="关闭">&times;</button>
        </div>
        <div class="panel-body">
            <div class="form-group">
                <label for="provider-select">模型服务商</label>
                <select id="provider-select">
                    <option value="deepseek">DeepSeek</option>
                    <option value="qwen">通义千问 (Qwen)</option>
                    <option value="glm">智谱 GLM</option>
                    <option value="moonshot">Moonshot (Kimi)</option>
                    <option value="doubao">豆包 (Doubao)</option>
                    <option value="custom">自定义 (OpenAI 兼容)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="api-key">API Key</label>
                <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
            </div>
            <div class="form-group">
                <label for="api-base">API Base URL</label>
                <input type="text" id="api-base" placeholder="https://api.example.com/v1">
            </div>
            <div class="form-group">
                <label for="model-name">模型名称</label>
                <input type="text" id="model-name" placeholder="deepseek-chat">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="temperature">温度 (0-2)</label>
                    <input type="number" id="temperature" min="0" max="2" step="0.1" value="0.7">
                </div>
                <div class="form-group">
                    <label for="max-tokens">最大 tokens</label>
                    <input type="number" id="max-tokens" min="64" max="8192" step="64" value="1024">
                </div>
            </div>
            <div class="form-group">
                <label for="system-prompt">系统提示词</label>
                <textarea id="system-prompt" rows="3" placeholder="你是 Seven，一个高动效语音助手...">你是 Seven，一个高动效语音助手。回答简洁、富有科技感。</textarea>
            </div>
            <div class="form-group form-toggle">
                <label for="tts-toggle">语音合成输出</label>
                <input type="checkbox" id="tts-toggle" checked>
            </div>
            <div class="form-group form-toggle">
                <label for="sys-stats-toggle">显示电脑运行状态</label>
                <input type="checkbox" id="sys-stats-toggle">
            </div>
            <div class="form-group form-toggle">
                <label for="wake-word-toggle">唤醒词检测（说 "Hi Seven" 或 "你好小七" 唤醒）</label>
                <input type="checkbox" id="wake-word-toggle" checked>
            </div>
            <div class="form-group">
                <label for="stt-lang">语音识别语言</label>
                <select id="stt-lang">
                    <option value="mixed">中英文混合（推荐，中文为主+英文识别）</option>
                    <option value="zh-CN">中文（纯中文场景）</option>
                    <option value="en-US">英文（纯英文场景）</option>
                </select>
            </div>
            <div class="form-group" id="voice-settings">
                <label for="tts-engine">语音引擎</label>
                <select id="tts-engine">
                    <option value="edge">Edge TTS 神经网络（免费·最自然·推荐）</option>
                    <option value="browser">浏览器本地 TTS（无需联网）</option>
                </select>
            </div>
            <div class="form-group" id="se-voice-settings">
                <label for="se-voice-select">在线音色</label>
                <select id="se-voice-select"></select>
            </div>
            <div class="form-group">
                <label>语音性别</label>
                <div class="voice-gender-group" role="radiogroup" aria-label="语音性别">
                    <label class="voice-gender-option">
                        <input type="radio" name="voice-gender" value="female" checked>
                        <span class="voice-gender-card">
                            <span class="voice-gender-icon female">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2a5 5 0 0 0-5 5v3a5 5 0 0 0 10 0V7a5 5 0 0 0-5-5zm-7 8a1 1 0 0 0-1 1 8 8 0 0 0 6 7.74V21a1 1 0 0 0 2 0v-2.26A8 8 0 0 0 18 11a1 1 0 0 0-2 0 6 6 0 0 1-12 0 1 1 0 0 0-1-1z"/></svg>
                            </span>
                            <span class="voice-gender-text">
                                <span class="voice-gender-name">女声</span>
                                <span class="voice-gender-desc">生动 · 拟人</span>
                            </span>
                        </span>
                    </label>
                    <label class="voice-gender-option">
                        <input type="radio" name="voice-gender" value="male">
                        <span class="voice-gender-card">
                            <span class="voice-gender-icon male">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M9 4a5 5 0 0 0-5 5v2a5 5 0 0 0 4 4.9V19a1 1 0 0 0 2 0v-3.1A5 5 0 0 0 14 11V9a5 5 0 0 0-5-5zm9.5 1.3a1 1 0 0 0-.7 1.7l1.3 1.3-1.3 1.3a1 1 0 1 0 1.4 1.4l2-2a1 1 0 0 0 0-1.4l-2-2a1 1 0 0 0-.7-.3z"/></svg>
                            </span>
                            <span class="voice-gender-text">
                                <span class="voice-gender-name">男声</span>
                                <span class="voice-gender-desc">沉稳 · 拟人</span>
                            </span>
                        </span>
                    </label>
                </div>
                <div class="voice-prosody">
                    <div class="prosody-item">
                        <label for="voice-rate">语速 <span id="voice-rate-val">1.0</span></label>
                        <input type="range" id="voice-rate" min="0.5" max="1.5" step="0.05" value="1.0">
                    </div>
                    <div class="prosody-item" id="pitch-item">
                        <label for="voice-pitch">音调 <span id="voice-pitch-val">1.0</span></label>
                        <input type="range" id="voice-pitch" min="0.5" max="1.5" step="0.05" value="1.0">
                    </div>
                </div>
            </div>
            <div class="panel-actions">
                <button class="btn-secondary" id="reset-config">恢复默认</button>
                <button class="btn-primary" id="save-config">保存配置</button>
            </div>
            <div class="panel-tip" id="panel-tip"></div>
        </div>
    </aside>
    <div class="mask" id="mask"></div>

    <!-- 左下角对话区（对话框 + 输入栏，统一容器确保相对定位） -->
    <div class="chat-zone" id="chat-zone">
        <section class="chat-box" id="chat-box" aria-live="polite">
            <div class="chat-header">
                <span class="chat-title">对话记录</span>
                <button class="chat-clear-btn" id="chat-clear-btn" title="清空记录">清空</button>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
        </section>

        <!-- 对话输入栏（位于对话框下方，带间距） -->
        <div class="chat-input-bar" id="chat-input-bar">
            <input type="text" id="chat-input" class="chat-input" placeholder="输入消息，回车发送..." autocomplete="off">
            <button id="chat-send-btn" class="chat-send-btn" title="发送" aria-label="发送">
                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
            </button>
        </div>
    </div>

    <!-- 提示 toast -->
    <div class="toast" id="toast"></div>

    <!-- 右下角统一内容展示区（指令/代码/图片/图表/文件） -->
    <section class="cmd-panel" id="cmd-panel" aria-live="polite">
        <div class="cmd-panel-header">
            <span class="cmd-panel-title">内容展示</span>
            <span class="cmd-agent-badge" id="cmd-agent-badge" aria-hidden="true"></span>
            <button class="cmd-clear-btn" id="cmd-clear-btn" title="清空">&times;</button>
        </div>
        <div class="cmd-list" id="cmd-list"></div>
    </section>

    <!-- 系统指令确认弹窗 -->
    <div class="cmd-confirm-modal" id="cmd-confirm-modal" aria-hidden="true">
        <div class="cmd-confirm-box">
            <div class="cmd-confirm-header">
                <svg class="cmd-confirm-icon" viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M12 2L1 21h22L12 2zm0 4l7.53 13H4.47L12 6zm-1 5v4h2v-4h-2zm0 5v2h2v-2h-2z"/></svg>
                <span class="cmd-confirm-title">系统操作确认</span>
            </div>
            <div class="cmd-confirm-body">
                <div class="cmd-confirm-hint" id="cmd-confirm-hint"></div>
                <div class="cmd-confirm-command" id="cmd-confirm-command"></div>
                <div class="cmd-confirm-voice-hint" id="cmd-confirm-voice-hint">请说"确认"或"取消"，或点击下方按钮</div>
            </div>
            <div class="cmd-confirm-actions">
                <button class="btn-secondary" id="cmd-cancel-btn">取消</button>
                <button class="btn-primary" id="cmd-confirm-btn">确认执行</button>
            </div>
        </div>
    </div>

    <!-- 智控设备管理弹窗（扫描/添加/编辑/删除） -->
    <div class="device-modal" id="device-modal" aria-hidden="true">
        <div class="device-modal-box">
            <div class="device-modal-header">
                <span class="device-modal-title">设备管理</span>
                <button class="close-btn" id="device-modal-close" aria-label="关闭">&times;</button>
            </div>
            <div class="device-modal-body">
                <!-- Tab 切换：本地设备 / 云平台 -->
                <div class="device-tab-nav">
                    <button class="device-tab-btn active" data-tab="local">本地设备</button>
                    <button class="device-tab-btn" data-tab="cloud">云平台</button>
                </div>

                <!-- Tab 1：本地设备（添加 + 列表） -->
                <div class="device-tab-content active" id="device-tab-local">
                    <!-- 添加自定义设备表单 -->
                    <div class="device-form-section">
                        <div class="device-form-title">添加自定义协议设备</div>
                        <div class="device-form-row">
                            <div class="device-form-group">
                                <label for="dev-name">设备名称</label>
                                <input type="text" id="dev-name" placeholder="如：客厅灯">
                            </div>
                            <div class="device-form-group">
                                <label for="dev-brand">品牌</label>
                                <input type="text" id="dev-brand" placeholder="如：小米（可选）">
                            </div>
                            <div class="device-form-group">
                                <label for="dev-type">设备类型</label>
                                <select id="dev-type">
                                    <option value="light">智能灯</option>
                                    <option value="switch">智能开关</option>
                                    <option value="speaker">智能音箱</option>
                                    <option value="tv">智能电视</option>
                                    <option value="sensor">传感器</option>
                                    <option value="generic">通用设备</option>
                                </select>
                            </div>
                        </div>
                        <div class="device-form-row">
                            <div class="device-form-group">
                                <label for="dev-ip">IP 地址</label>
                                <input type="text" id="dev-ip" placeholder="192.168.1.100">
                            </div>
                            <div class="device-form-group">
                                <label for="dev-port">端口</label>
                                <input type="number" id="dev-port" value="80" min="1" max="65535">
                            </div>
                            <div class="device-form-group">
                                <label for="dev-protocol">协议</label>
                                <select id="dev-protocol">
                                    <option value="http">HTTP</option>
                                    <option value="tcp">TCP</option>
                                    <option value="udp">UDP</option>
                                </select>
                            </div>
                        </div>
                        <!-- 自定义控制按钮：每行定义一个按钮（名称/端口/指令） -->
                        <div class="device-form-title" style="margin-top:14px">自定义控制按钮 <span style="font-size:11px;color:var(--text-dim)">（可选，留空则使用类型默认命令）</span></div>
                        <div class="device-cmd-editor" id="device-cmd-editor">
                            <div class="device-cmd-row">
                                <input type="text" class="cmd-name" placeholder="按钮名称（如：开灯）" maxlength="20">
                                <input type="number" class="cmd-port" placeholder="端口（空=默认）" min="1" max="65535">
                                <input type="text" class="cmd-payload" placeholder="指令内容（如：/on 或 OPEN_CMD）" maxlength="200">
                                <button type="button" class="cmd-remove-btn" title="删除此行">&times;</button>
                            </div>
                        </div>
                        <button type="button" class="btn-link" id="dev-add-cmd-btn">+ 添加按钮</button>
                        <div class="device-form-actions">
                            <button class="btn-secondary" id="dev-scan-modal-btn">重新扫描</button>
                            <button class="btn-primary" id="dev-add-btn">添加设备</button>
                        </div>
                    </div>
                    <!-- 设备列表（管理） -->
                    <div class="device-manage-list-wrap">
                        <div class="device-form-title">设备列表</div>
                        <div class="device-manage-list" id="device-manage-list"></div>
                    </div>
                </div>

                <!-- Tab 2：云平台（登录账号 + 同步设备） -->
                <div class="device-tab-content" id="device-tab-cloud">
                    <!-- 云平台选择与登录 -->
                    <div class="device-form-section">
                        <div class="device-form-title">接入云智能家居平台</div>
                        <div class="cloud-platform-desc">登录米家、涂鸦、Home Assistant 等开放平台，同步设备后统一管理</div>
                        <div class="device-form-row">
                            <div class="device-form-group">
                                <label for="cloud-platform-select">选择平台</label>
                                <select id="cloud-platform-select">
                                    <option value="">请选择平台...</option>
                                </select>
                            </div>
                        </div>
                        <!-- 动态凭证表单 -->
                        <div class="cloud-credential-form" id="cloud-credential-form"></div>
                        <div class="device-form-actions">
                            <button class="btn-primary" id="cloud-login-btn">登录并保存</button>
                        </div>
                    </div>

                    <!-- 已登录账号列表 -->
                    <div class="device-manage-list-wrap">
                        <div class="device-form-title">已登录账号</div>
                        <div class="cloud-account-list" id="cloud-account-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
