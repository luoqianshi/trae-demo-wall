<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记忆守护者 · Demo 体验版</title>
<style>
:root{
  --primary:#3B6FB6;
  --primary-deep:#274C82;
  --accent:#F5A65B;
  --accent-soft:#FCE4CB;
  --accent-deep:#C8531E;
  --warm:#E8746B;
  --bg:#F7F4EE;
  --card:#FFFFFF;
  --ink:#2A2A2A;
  --muted:#6B6B6B;
  --line:#E8E2D6;
  --soft-blue:#EAF1FA;
  --green:#3A9D6A;
  --green-soft:#E7F5EC;
  --purple:#7B5BC4;
  --purple-soft:#F0EAFB;
  --shadow:0 6px 20px rgba(39,76,130,.10);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

/* ===== App Shell ===== */
#app{min-height:100vh;display:flex;flex-direction:column}
.page{display:none;flex:1;padding-bottom:80px}
.page.active{display:block}

/* ===== Top Bar ===== */
.topbar{
  background:linear-gradient(135deg,var(--primary),var(--primary-deep));
  color:#fff;padding:20px 18px 16px;position:sticky;top:0;z-index:40;
}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.topbar .greet{font-size:13px;opacity:.85}
.topbar .name{font-size:20px;font-weight:700;margin-top:2px}
.topbar .role-badge{
  background:rgba(255,255,255,.18);padding:4px 12px;border-radius:999px;
  font-size:12px;font-weight:600;
}
.topbar .icon-btn{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;
}

/* ===== Bottom Nav ===== */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:#fff;border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:8px 0 20px;z-index:50;
}
.nav-item{
  text-align:center;font-size:11px;color:var(--muted);
  cursor:pointer;padding:4px 8px;border:none;background:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:color .2s;
}
.nav-item .ic{font-size:22px}
.nav-item.active{color:var(--primary)}
.nav-item.active .ic{transform:scale(1.1)}

/* ===== Cards ===== */
.card{
  background:#fff;border-radius:var(--radius);padding:16px;
  margin:12px 14px;box-shadow:0 2px 10px rgba(39,76,130,.05);
}
.card-title{
  font-size:13px;font-weight:700;color:var(--muted);
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
}
.card-title .more{font-size:12px;color:var(--primary);cursor:pointer;margin-left:auto}
.card-title .add-btn{
  font-size:12px;color:var(--accent);cursor:pointer;font-weight:700;
  background:var(--accent-soft);padding:2px 10px;border-radius:999px;
  margin-left:auto;transition:all .2s;
}
.card-title .add-btn:active{transform:scale(.95)}

/* ===== Tags ===== */
.tag{
  display:inline-block;font-size:11px;padding:2px 10px;border-radius:6px;
  font-weight:600;
}
.tag.med{background:var(--accent-soft);color:var(--accent)}
.tag.visit{background:var(--soft-blue);color:var(--primary)}
.tag.family{background:#FDE2E0;color:var(--warm)}
.tag.activity{background:var(--green-soft);color:var(--green)}
.tag.done{background:#eee;color:#999}

/* ===== Buttons ===== */
.btn{
  border:none;cursor:pointer;font-size:14px;font-weight:600;
  padding:12px 20px;border-radius:999px;transition:all .2s;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{background:var(--primary-deep)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:active{background:#E89540}
.btn-ghost{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
.btn-ghost:active{background:var(--soft-blue)}
.btn-sm{padding:6px 14px;font-size:12px;width:auto}

/* ===== Login ===== */
.login-page{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:40px 24px;text-align:center;
  background:linear-gradient(180deg,#FFF6EC 0%,#EAF1FA 100%);
}
.login-logo{
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:grid;place-items:center;font-size:36px;margin-bottom:20px;
  box-shadow:var(--shadow);
}
.login-title{font-size:26px;font-weight:800;color:var(--primary-deep);margin-bottom:8px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:36px;max-width:280px}
.role-list{width:100%;display:flex;flex-direction:column;gap:12px}
.role-card{
  background:#fff;border-radius:var(--radius);padding:18px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  border:2px solid transparent;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.04);
}
.role-card:active{border-color:var(--primary);transform:scale(.98)}
.role-avatar{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;font-size:24px;color:#fff;font-weight:700;
}
.role-avatar.elderly{background:linear-gradient(135deg,var(--accent),var(--warm))}
.role-avatar.family{background:linear-gradient(135deg,var(--primary),var(--accent))}
.role-avatar.doctor{background:linear-gradient(135deg,var(--green),var(--primary))}
.role-avatar.other{background:linear-gradient(135deg,#95a5a6,#7f8c8d)}
.role-avatar.caregiver{background:linear-gradient(135deg,var(--purple),var(--primary))}
.role-info{text-align:left;flex:1}
.role-info .rn{font-size:15px;font-weight:700;color:var(--ink)}
.role-info .rd{font-size:12px;color:var(--muted)}
.other-roles{display:none;flex-direction:column;gap:10px;padding-left:20px}
.other-roles.show{display:flex}
.role-card.sub{padding:14px;background:var(--bg);box-shadow:none;border:1.5px dashed var(--line)}
.role-card.sub:active{border-color:var(--primary)}
.expand-icon{font-size:16px;color:var(--muted);transition:transform .2s}
.expand-icon.open{transform:rotate(90deg)}
.login-tip{margin-top:24px;font-size:12px;color:var(--muted)}

/* ===== Home Page ===== */
.hero-card{
  margin:12px 14px;background:linear-gradient(135deg,#FFF6EC,var(--soft-blue));
  border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);
}
.hero-card .date{font-size:13px;color:var(--muted)}
.hero-card .hello{font-size:22px;font-weight:800;color:var(--primary-deep);margin:4px 0 12px}
.quick-stats{display:flex;gap:10px}
.qstat{
  flex:1;background:rgba(255,255,255,.7);border-radius:12px;padding:10px;text-align:center;
}
.qstat .num{font-size:20px;font-weight:800;color:var(--primary-deep)}
.qstat .lbl{font-size:11px;color:var(--muted)}

/* Record Button */
.record-section{margin:12px 14px}
.record-btn{
  width:100%;background:linear-gradient(135deg,var(--accent),var(--warm));
  color:#fff;border:none;border-radius:var(--radius);padding:18px;
  font-size:16px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 6px 20px rgba(232,116,107,.3);transition:all .2s;
}
.record-btn:active{transform:scale(.98)}
.record-btn.recording{background:linear-gradient(135deg,var(--warm),#c0392b);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 6px 20px rgba(192,57,43,.3)}50%{box-shadow:0 6px 30px rgba(192,57,43,.6)}}

/* Reminder Item */
.reminder-item{
  display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--line);
}
.reminder-item:last-child{border-bottom:none}
.reminder-check{
  width:24px;height:24px;border-radius:50%;border:2px solid var(--line);
  flex-shrink:0;cursor:pointer;display:grid;place-items:center;
  font-size:13px;color:#fff;transition:all .2s;
}
.reminder-check.done{background:var(--green);border-color:var(--green)}
.reminder-info{flex:1}
.reminder-info .rt{font-size:14px;font-weight:600;color:var(--ink)}
.reminder-info .rt.done{text-decoration:line-through;color:var(--muted)}
.reminder-info .rd{font-size:12px;color:var(--muted)}
.reminder-time{font-size:12px;color:var(--muted);font-weight:600}

/* Enhance Reminder Button */
.enhance-btn{
  background:linear-gradient(135deg,var(--warm),#d35400);
  color:#fff;border:none;padding:5px 12px;border-radius:999px;
  font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
  box-shadow:0 2px 8px rgba(232,116,107,.3);transition:all .2s;flex-shrink:0;
  animation:enhancePulse 2s infinite;
}
.enhance-btn:active{transform:scale(.92)}
@keyframes enhancePulse{
  0%,100%{box-shadow:0 2px 8px rgba(232,116,107,.3)}
  50%{box-shadow:0 2px 14px rgba(232,116,107,.6)}
}

/* Memory Item */
.memory-item{
  background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.memory-item .head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.memory-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--warm));
  display:grid;place-items:center;color:#fff;font-size:15px;font-weight:700;
}
.memory-item .content{font-size:14px;color:var(--ink);line-height:1.6}
.memory-item .content .kw{
  background:linear-gradient(180deg,transparent 55%,var(--accent-soft) 55%);
  font-weight:700;color:var(--accent-deep);
  border-radius:2px;padding:0 1px;
}
.memory-item .date{font-size:11px;color:var(--muted);margin-top:6px}

/* Mini Map */
.mini-map{
  background:linear-gradient(135deg,#e8f4f8,#e0eff6);
  border-radius:12px;padding:14px;margin:0 14px 14px;
  box-shadow:0 2px 8px rgba(0,0,0,.04);position:relative;overflow:hidden;
}
.mini-map-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mini-map svg{width:100%;height:140px}
.map-loc{cursor:pointer}
.map-loc circle.loc-dot{animation:locPulse 2s infinite}
.map-loc text{font-size:9px;fill:var(--ink);font-weight:600}
.map-route{stroke:var(--primary);stroke-width:2;stroke-dasharray:5 4;fill:none;animation:dashMove 1s linear infinite}
@keyframes locPulse{0%,100%{r:6;opacity:1}50%{r:8;opacity:.7}}
@keyframes dashMove{to{stroke-dashoffset:-9}}

/* Diary */
.diary-item{
  background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.04);border-left:3px solid var(--accent);
}
.diary-time{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px}
.diary-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px}
.diary-content{font-size:13px;color:var(--muted);line-height:1.5}
.diary-tag{
  display:inline-block;font-size:10px;padding:1px 8px;border-radius:4px;
  margin-right:4px;font-weight:600;
}
.diary-tag.care{background:var(--soft-blue);color:var(--primary)}
.diary-tag.med{background:#e8f5e9;color:var(--green)}
.diary-tag.health{background:var(--accent-soft);color:var(--accent)}
.diary-tag.note{background:#f3e5f5;color:var(--purple)}

/* Album / Photo Grid */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px}
.photo-card{
  aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;
  display:grid;place-items:center;font-size:28px;color:#fff;font-weight:700;
  transition:all .2s;
}
.photo-card:active{transform:scale(.95)}
.photo-card .photo-label{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.6));
  color:#fff;font-size:10px;padding:8px 6px 4px;font-weight:600;
}
.photo-card.video::after{
  content:'▶';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:24px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);
}
.photo-card.video::before{
  content:attr(data-duration);position:absolute;top:4px;right:4px;
  font-size:9px;color:#fff;background:rgba(0,0,0,.5);padding:1px 4px;border-radius:3px;
}
.upload-btn{
  aspect-ratio:1;border-radius:10px;border:2px dashed var(--line);
  display:grid;place-items:center;cursor:pointer;color:var(--muted);
  font-size:28px;transition:all .2s;
}
.upload-btn:active{border-color:var(--primary);color:var(--primary)}
.photo-viewer{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
  background:rgba(0,0,0,.9);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;
}
.photo-viewer img,.photo-viewer .pv-placeholder{
  max-width:100%;max-height:70vh;border-radius:12px;
}
.pv-placeholder{
  width:280px;height:280px;display:grid;place-items:center;
  font-size:64px;color:#fff;border-radius:12px;
}
.pv-close{
  position:absolute;top:16px;right:16px;
  background:rgba(255,255,255,.2);border:none;color:#fff;
  width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;
}
.pv-info{color:#fff;text-align:center;margin-top:14px}
.pv-info .pv-title{font-size:16px;font-weight:700}
.pv-info .pv-date{font-size:12px;opacity:.7;margin-top:4px}

/* Memory Statistics (Doctor) */
.mem-stat-card{
  background:#fff;border-radius:12px;padding:14px;margin:0 14px 10px;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.mem-stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.mem-stat-row:last-child{border-bottom:none}
.mem-stat-row .msr-lbl{font-size:13px;color:var(--muted)}
.mem-stat-row .msr-val{font-size:16px;font-weight:800;color:var(--primary-deep)}
.emotion-bar{display:flex;height:24px;border-radius:6px;overflow:hidden;margin-top:6px}
.emotion-bar .eb-seg{display:grid;place-items:center;font-size:10px;color:#fff;font-weight:600}

/* Family Member */
.family-item{
  display:flex;align-items:center;gap:14px;padding:14px 0;
  border-bottom:1px solid var(--line);
}
.family-item:last-child{border-bottom:none}
.family-avatar{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;color:#fff;font-size:20px;font-weight:700;
}
.family-info{flex:1}
.family-info .fn{font-size:15px;font-weight:700;color:var(--ink)}
.family-info .fr{font-size:12px;color:var(--muted)}
.family-info .fnote{font-size:12px;color:var(--accent);margin-top:2px}
.family-meet{font-size:11px;color:var(--muted);text-align:right}

/* Game */
.game-card{
  background:#fff;border-radius:var(--radius);padding:20px;margin:12px 14px;
  text-align:center;box-shadow:var(--shadow);
}
.game-card .icon{font-size:40px;margin-bottom:10px}
.game-card h3{font-size:17px;color:var(--primary-deep);margin-bottom:6px}
.game-card p{font-size:13px;color:var(--muted);margin-bottom:14px}
.game-question{
  background:var(--soft-blue);border-radius:12px;padding:16px;margin:14px 0;
  font-size:16px;font-weight:600;color:var(--primary-deep);text-align:center;
}
.game-options{display:flex;flex-direction:column;gap:10px}
.game-opt{
  background:#fff;border:2px solid var(--line);border-radius:12px;
  padding:14px;font-size:14px;cursor:pointer;text-align:left;
  transition:all .2s;
}
.game-opt:active{border-color:var(--primary)}
.game-opt.correct{border-color:var(--green);background:var(--green-soft)}
.game-opt.wrong{border-color:var(--warm);background:#FDE2E0}
.game-result{font-size:18px;font-weight:800;margin:14px 0}
.game-result.good{color:var(--green)}
.game-result.bad{color:var(--warm)}

/* Trend */
.trend-stat{
  display:flex;justify-content:space-between;padding:12px 0;
  border-bottom:1px solid var(--line);
}
.trend-stat:last-child{border-bottom:none}
.trend-stat .lbl{font-size:13px;color:var(--muted)}
.trend-stat .val{font-size:18px;font-weight:800;color:var(--primary-deep)}
.chart-bar{
  display:flex;align-items:flex-end;justify-content:space-between;
  height:120px;padding:10px 0;gap:6px;
}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;background:linear-gradient(180deg,var(--accent),var(--accent-soft));
  border-radius:6px 6px 0 0;min-height:4px;
  transform:scaleY(0);transform-origin:bottom;
  animation:growBar .8s ease-out forwards}
.bar.bar-blue{background:linear-gradient(180deg,var(--primary),var(--soft-blue))}
.bar-day{font-size:10px;color:var(--muted)}
@keyframes growBar{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.bar-value{font-size:11px;font-weight:700;opacity:0;animation:fadeIn .4s ease forwards;animation-delay:inherit}

/* Modal */
.modal-mask{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4);z-index:100;display:none;
  align-items:center;justify-content:center;padding:20px;
}
.modal-mask.show{display:flex}
.modal{
  background:#fff;border-radius:20px;padding:24px;width:100%;max-width:380px;
  max-height:80vh;overflow-y:auto;
}
.modal h3{font-size:18px;color:var(--primary-deep);margin-bottom:14px;text-align:center}
.modal textarea{
  width:100%;border:2px solid var(--line);border-radius:12px;
  padding:12px;font-size:15px;font-family:inherit;resize:none;
  min-height:100px;margin-bottom:12px;
}
.modal textarea:focus{border-color:var(--primary);outline:none}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{flex:1}
.extract-preview{
  background:var(--soft-blue);border-radius:12px;padding:12px;margin-bottom:12px;
  font-size:13px;
}
.extract-preview .et{font-weight:700;color:var(--primary-deep);margin-bottom:6px}
.extract-preview .ei{display:inline-block;margin:2px 4px 2px 0;
  background:#fff;padding:2px 8px;border-radius:6px;font-size:12px;color:var(--ink)}

/* Media Attach in Modal */
.media-attach{margin-bottom:12px}
.media-attach-btns{display:flex;gap:8px;margin-bottom:10px}
.media-attach-btn{
  flex:1;border:2px dashed var(--line);border-radius:12px;padding:10px;
  background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;
  font-family:inherit;
}
.media-attach-btn:active{transform:scale(.97)}
.media-attach-btn.photo:active{border-color:var(--accent);color:var(--accent)}
.media-attach-btn.video:active{border-color:var(--purple);color:var(--purple)}
.media-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.media-thumb{
  aspect-ratio:1;border-radius:8px;position:relative;overflow:hidden;
  display:grid;place-items:center;font-size:22px;color:#fff;font-weight:700;
}
.media-thumb.video::after{
  content:'▶';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:18px;text-shadow:0 2px 6px rgba(0,0,0,.5);pointer-events:none;
}
.media-thumb .remove-media{
  position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;border:none;font-size:12px;cursor:pointer;
  display:grid;place-items:center;line-height:1;padding:0;
}
.memory-media{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.memory-media .media-thumb{cursor:pointer;transition:transform .2s}
.memory-media .media-thumb:active{transform:scale(.92)}

/* Toast */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;
  border-radius:12px;font-size:14px;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.toast.show{opacity:1}

/* Section Title */
.sec-title{
  font-size:16px;font-weight:800;color:var(--primary-deep);
  padding:16px 14px 6px;display:flex;align-items:center;gap:8px;
}

  display:flex;align-items:center;gap:4px;

.switch-role:active{transform:scale(.95);box-shadow:0 2px 6px rgba(39,76,130,.3)}

}

.patient-avatar{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;

  display:grid;place-items:center;color:#fff;font-size:20px;font-weight:700;
}
.patient-info{flex:1}
.patient-name{font-size:16px;font-weight:700;color:var(--ink)}
.patient-age{font-size:12px;color:var(--muted);font-weight:400}
.patient-diag{font-size:12px;color:var(--accent);margin-top:2px}
.patient-risk{

}
.patient-stats{
  display:flex;justify-content:space-between;

}
.pstat{text-align:center;flex:1}
.pstat .pn{display:block;font-size:18px;font-weight:800;color:var(--primary-deep)}
.pstat .pl{font-size:11px;color:var(--muted)}
.patient-footer{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--muted);
}
.patient-arrow{color:var(--primary);font-weight:600}

.chat-contact{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:#fff;margin:0 14px 8px;border-radius:12px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.04);transition:all .2s;
}
.chat-contact:active{background:var(--soft-blue)}
.cc-avatar{

.chat-header{

.ch-name{font-size:15px;font-weight:700;color:var(--ink)}
.ch-status{font-size:11px;color:var(--green)}

.chat-messages{

.chat-msg{display:flex;gap:8px;margin-bottom:14px;align-items:flex-start}
.msg-me{flex-direction:row-reverse}
.msg-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;color:#fff;font-size:13px;font-weight:700;
}
.msg-content{max-width:72%}
.msg-me .msg-content{text-align:right}
.msg-bubble{

}
.msg-bubble.them{background:#fff;color:var(--ink);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.msg-bubble.me{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px}

.voice-wave:nth-child(2){animation-delay:.1s;height:20px}

.image-msg,.video-msg{padding:6px}

  box-shadow:0 -2px 10px rgba(0,0,0,.04);
}
.ci-btn{
  background:none;border:none;font-size:22px;cursor:pointer;
  padding:4px;flex-shrink:0;
}
.ci-text{
  flex:1;border:1.5px solid var(--line);border-radius:20px;
  padding:8px 14px;font-size:14px;font-family:inherit;min-width:0;
}
.ci-text:focus{border-color:var(--primary);outline:none}
.ci-voice-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--accent),var(--warm));
  color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;
  box-shadow:0 2px 8px rgba(232,116,107,.3);
}
.ci-voice-btn:active{transform:scale(.95)}
.ci-send{
  background:var(--primary);color:#fff;border:none;
  padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;
  cursor:pointer;flex-shrink:0;
}
.ci-send:active{background:var(--primary-deep)}

/* Collapsible Card */
.card-title{cursor:pointer;user-select:none}
.card-title .toggle{font-size:12px;color:var(--muted);transition:transform .2s;display:inline-block;margin-left:auto}
.card-title.collapsed .toggle{transform:rotate(-90deg)}
.card-body{overflow:hidden;max-height:2000px;transition:max-height .3s ease,opacity .2s ease}
.card-body.collapsed{max-height:0;opacity:0;margin-top:0}
.done-toggle{
  display:flex;align-items:center;gap:6px;padding:10px 0 0;
  font-size:12px;color:var(--muted);cursor:pointer;border-top:1px dashed var(--line);margin-top:8px;

.done-toggle .dt-icon{transition:transform .2s}
.done-toggle.open .dt-icon{transform:rotate(90deg)}
.done-items{overflow:hidden;max-height:0;transition:max-height .3s ease}
.done-items.open{max-height:500px}

// ===== AI Mock Extraction =====
function aiExtract(text) {
  const people = [];
  const places = [];
  const events = [];
  const items = [];
  let emotion = '平静';

  // 人物识别
  const namePatterns = ['朵朵','老李','王医生','小明','张奶奶','老张','阿姨','叔叔','医生','护士'];
  namePatterns.forEach(n => { if (text.includes(n)) people.push(n); });

  // 地点识别
  const placePatterns = ['公园','医院','社区','家里','超市','广场','学校','菜市场','药店','合唱团'];
  placePatterns.forEach(p => { if (text.includes(p)) places.push(p); });

  // 事件识别
  const eventPatterns = ['散步','吃饭','吃药','复诊','下棋','唱歌','串门','买菜','散步','送','通话','视频','排练'];
  eventPatterns.forEach(e => { if (text.includes(e)) events.push(e); });

  // 物品识别
  const itemPatterns = ['花','药','菜','礼物','棋','书','茶','饭'];
  itemPatterns.forEach(i => { if (text.includes(i)) items.push(i); });

  // 情绪识别
  if (/开心|高兴|快乐|喜欢|美好/.test(text)) emotion = '开心';
  else if (/难过|伤心|不舒服|疼|痛|累/.test(text)) emotion = '难过';
  else if (/担心|害怕|紧张/.test(text)) emotion = '担心';

  return {
    people: people.join('、') || '—',
    places: places.join('、') || '—',
    events: events.join('、') || '—',
    items: items.join('、') || '—',
    emotion,
  };
}

function renderPatientList() {
  // 获取医生关联的所有病人
  const doctorId = currentUser.id;
  const relations = MOCK.relations.filter(r => r.caregiverId === doctorId);
  const patients = relations.map(r => Object.values(MOCK.users).find(u => u.id === r.elderlyId)).filter(u => u);

  let html = '';

  // 汇总统计
  html += `
    <div class="hero-card">
      <div class="date">${formatDate()}</div>
      <div class="hello">共管理 ${patients.length} 位病人</div>
      <div class="quick-stats">

        <div class="qstat"><div class="num">${patients.filter(p => p.lastVisit.includes('周')).length}</div><div class="lbl">需随访</div></div>
      </div>
    </div>
  `;

  html += `<div class="sec-title"><span class="bar"></span>病人列表 · 点击查看详情</div>`;

  // 病人卡片列表
  patients.forEach(p => {
    const memCount = MOCK.memories.filter(m => m.userId === p.id).length;
    const remCount = MOCK.reminders.filter(r => r.userId === p.id).length;
    const remDone = MOCK.reminders.filter(r => r.userId === p.id && r.completed).length;
    const games = MOCK.games.filter(g => g.userId === p.id);
    const avgScore = games.length > 0 ? Math.round(games.reduce((s,g) => s+g.score, 0) / games.length) : 0;
    const adherence = remCount > 0 ? Math.round(remDone / remCount * 100) : 0;

    // 风险等级判断
    let riskLevel, riskColor, riskText;
    if (adherence < 50 || avgScore < 70) {
      riskLevel = 'high'; riskColor = 'var(--warm)'; riskText = '需关注';
    } else if (adherence < 80 || avgScore < 85) {
      riskLevel = 'mid'; riskColor = 'var(--accent)'; riskText = '一般';
    } else {
      riskLevel = 'low'; riskColor = 'var(--green)'; riskText = '良好';
    }

    html += `
      <div class="patient-card" onclick="selectPatient(${p.id})">
        <div class="patient-header">
          <div class="patient-avatar">${p.avatar}</div>
          <div class="patient-info">
            <div class="patient-name">${p.displayName} <span class="patient-age">${p.age}岁</span></div>
            <div class="patient-diag">${p.diagnosis}</div>
          </div>
          <div class="patient-risk" style="background:${riskColor}">${riskText}</div>
        </div>
        <div class="patient-stats">
          <div class="pstat"><span class="pn">${memCount}</span><span class="pl">记忆</span></div>
          <div class="pstat"><span class="pn" style="color:${adherence>=80?'var(--green)':'var(--warm)'}">${adherence}%</span><span class="pl">依从</span></div>
          <div class="pstat"><span class="pn">${avgScore}</span><span class="pl">训练分</span></div>
          <div class="pstat"><span class="pn">${games.length}</span><span class="pl">训练次</span></div>
        </div>
        <div class="patient-footer">
          <span class="patient-visit">上次复诊：${p.lastVisit}</span>
          <span class="patient-arrow">查看详情 →</span>
        </div>
      </div>
    `;
  });

  document.getElementById('pageContent').innerHTML = html;
}

function highlightKeywords(content, m) {
  let keywords = [];
  if (m.people && m.people !== '—') keywords.push(...m.people.split('、').filter(s => s.trim()));
  if (m.places && m.places !== '—') keywords.push(...m.places.split('、').filter(s => s.trim()));
  if (m.events && m.events !== '—') keywords.push(...m.events.split('、').filter(s => s.trim()));
  if (m.items && m.items !== '—') keywords.push(...m.items.split('、').filter(s => s.trim()));
  if (keywords.length === 0) return content;
  keywords = keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  keywords.sort((a, b) => b.length - a.length);
  const regex = new RegExp(`(${keywords.join('|')})`, 'g');
  return content.replace(regex, '<span class="kw">$1</span>');
}

function renderMemoryItem(m) {
  const avatar = (m.people && m.people !== '—') ? m.people[0] : '📝';

  return `

  `;
}

function renderMiniMap(locations) {
  // 模拟坐标映射
  const coordMap = {
    '中山公园': { x: 200, y: 50, icon: '🌳' },
    '社区医院': { x: 80, y: 90, icon: '🏥' },
    '家': { x: 150, y: 110, icon: '🏠' },
    '菜市场': { x: 260, y: 80, icon: '🥬' },
    '学校': { x: 60, y: 40, icon: '🏫' },
  };
  const defaultCoord = { x: 170, y: 70, icon: '📍' };

  // 加上"家"作为起点
  const route = [{ place: '家', date: '起点', emotion: '' }, ...locations];
  const points = route.map(loc => {
    const c = coordMap[loc.place] || defaultCoord;
    return { ...loc, ...c };
  });

  let routePath = '';
  points.forEach((p, i) => {
    if (i > 0) {
      const prev = points[i-1];
      routePath += `M${prev.x},${prev.y} L${p.x},${p.y} `;
    }
  });

  return `
    <div class="mini-map">
      <div class="mini-map-title">🗺️ 今日足迹路线</div>
      <svg viewBox="0 0 300 140" xmlns="http://www.w3.org/2000/svg">
        <!-- 背景网格 -->
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#d0e3ef" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="300" height="140" fill="url(#grid)"/>

        <!-- 路线 -->
        <path class="map-route" d="${routePath}"/>

        <!-- 位置点 -->
        ${points.map((p, i) => `
          <g class="map-loc" onclick="toast('${p.place} · ${p.date}')">
            <circle class="loc-dot" cx="${p.x}" cy="${p.y}" r="6" fill="${i===0?'var(--green)':'var(--accent)'}" stroke="#fff" stroke-width="2"/>
            <text x="${p.x}" y="${p.y - 12}" text-anchor="middle">${p.icon} ${p.place}</text>
            ${i > 0 ? `<text x="${p.x}" y="${p.y + 20}" text-anchor="middle" style="font-size:7px;fill:var(--muted)">${p.date}</text>` : ''}
          </g>
        `).join('')}
      </svg>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">
        共 ${locations.length} 个地点 · 点击圆点查看详情
      </div>
    </div>
  `;
}

function startGame() {
  const memories = MOCK.memories.filter(m => m.userId === viewTargetUserId);
  gameState.questions = [];
  memories.forEach(m => {
    if (m.people && m.people !== '—') {
      gameState.questions.push({
        q: `记忆中和"${m.people}"一起做了什么？`,
        options: [m.events, '吃饭', '看电视', '睡觉'],
        correct: 0,
      });
    }
    if (m.places && m.places !== '—') {
      gameState.questions.push({
        q: `"${m.places}"相关记忆中，和谁在一起？`,
        options: [m.people || '一个人', '老王', '邻居', '不记得了'],
        correct: 0,
      });
    }
    if (m.items && m.items !== '—') {
      gameState.questions.push({
        q: `记忆中提到的物品是？`,
        options: [m.items, '手机', '钥匙', '眼镜'],
        correct: 0,
      });
    }
  });

  // Shuffle options
  gameState.questions.forEach(q => {
    const correctAns = q.options[q.correct];
    q.options = q.options.sort(() => Math.random() - 0.5);
    q.correct = q.options.indexOf(correctAns);
  });

  gameState.current = 0;
  gameState.correct = 0;
  gameState.active = true;
  renderQuestion();
}

function renderQuestion() {
  const area = document.getElementById('gameArea');
  if (gameState.current >= gameState.questions.length) {
    const total = gameState.questions.length;
    const score = Math.round(gameState.correct / total * 100);
    const good = score >= 60;
    area.innerHTML = `
      <div class="game-card">
        <div class="icon">${good?'🎉':'💪'}</div>
        <h3>训练完成！</h3>
        <div class="game-result ${good?'good':'bad'}">${score}分</div>
        <p>答对 ${gameState.correct}/${total} 题<br>${good?'表现很棒，继续保持！':'别灰心，多练几次会更好的！'}</p>
        <button class="btn btn-primary" onclick="startGame()">再练一次</button>
      </div>
    `;
    // Save game record
    MOCK.games.unshift({
      id: Date.now(), userId: viewTargetUserId, type:'recall', difficulty:2, score,
      correct: gameState.correct, total, duration: 60,
      date: '刚刚',
    });
    gameState.active = false;
    return;
  }

  const q = gameState.questions[gameState.current];
  area.innerHTML = `
    <div class="game-card">
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px">
        第 ${gameState.current+1}/${gameState.questions.length} 题
      </div>
      <div class="game-question">${q.q}</div>
      <div class="game-options">
        ${q.options.map((opt, i) => `
          <div class="game-opt" onclick="answerQuestion(${i})">${opt}</div>
        `).join('')}
      </div>
    </div>
  `;
}

function answerQuestion(idx) {
  const q = gameState.questions[gameState.current];
  const opts = document.querySelectorAll('.game-opt');
  opts.forEach(o => o.style.pointerEvents = 'none');

  if (idx === q.correct) {
    opts[idx].classList.add('correct');
    gameState.correct++;
    toast('✓ 回答正确！');
  } else {
    opts[idx].classList.add('wrong');
    opts[q.correct].classList.add('correct');
    toast('✗ 正确答案：' + q.options[q.correct]);
  }

  setTimeout(() => {
    gameState.current++;
    renderQuestion();
  }, 1500);
}

  const targetName = chatTargetType === 'family'
    ? (FAMILY_CONTACTS[viewTargetUserId] || []).find(f => true)?.name || '家属'
    : targetUser?.displayName || '联系人';

  const targetAvatar = chatTargetType === 'family'
    ? (FAMILY_CONTACTS[viewTargetUserId] || [{}])[0]?.avatar || '家'
    : targetUser?.avatar || '?';
  const targetColor = chatTargetType === 'family'
    ? (FAMILY_CONTACTS[viewTargetUserId] || [{}])[0]?.color || 'var(--primary)'
    : 'linear-gradient(135deg,var(--accent),var(--warm))';

  let html = '';

  // 返回按钮（医生端）
  if (currentUser.role === 'DOCTOR') {
    html += `<div style="padding:8px 14px"><button class="btn btn-ghost btn-sm" onclick="backToChatList()">← 返回联系人</button></div>`;
  }

  // 聊天头部
  html += `
    <div class="chat-header">
      <div class="ch-avatar" style="background:${targetColor}">${targetAvatar}</div>
      <div class="ch-info">
        <div class="ch-name">${targetName}</div>
        <div class="ch-status">${chatTargetType === 'doctor' ? '医生 · 在线' : chatTargetType === 'family' ? '家属 · 在线' : '病人 · 在线'}</div>
      </div>
    </div>
  `;

  // 消息列表
  html += `<div class="chat-messages" id="chatMessages">`;
  if (messages.length === 0) {
    html += `<div class="empty" style="padding:30px">暂无消息，开始对话吧</div>`;
  } else {
    messages.forEach(m => {
      const isMe = m.from === currentUser.id;
      const senderUser = Object.values(MOCK.users).find(u => u.id === m.from);
      const senderAvatar = senderUser ? senderUser.avatar : '?';
      const senderColor = senderUser ? 'linear-gradient(135deg,var(--accent),var(--warm))' : 'var(--primary)';

      let msgContent = '';
      if (m.type === 'text') {
        msgContent = `<div class="msg-bubble ${isMe?'me':'them'}">${m.content}</div>`;
      } else if (m.type === 'voice') {
        msgContent = `<div class="msg-bubble ${isMe?'me':'them'} voice-msg" onclick="toast('▶ 播放语音 ${m.duration}秒')">
          <span class="voice-icon">🎤</span>
          <div class="voice-bar"><div class="voice-wave"></div><div class="voice-wave"></div><div class="voice-wave"></div><div class="voice-wave"></div><div class="voice-wave"></div></div>
          <span class="voice-dur">${m.duration}″</span>
        </div>`;
      } else if (m.type === 'image') {
        msgContent = `<div class="msg-bubble ${isMe?'me':'them'} image-msg" onclick="toast('查看图片')">
          <div class="img-placeholder">📷 ${m.content}<br><span style="font-size:11px;opacity:.7">点击查看大图</span></div>
        </div>`;
      } else if (m.type === 'video') {
        msgContent = `<div class="msg-bubble ${isMe?'me':'them'} video-msg" onclick="toast('播放视频')">
          <div class="video-placeholder">🎬 ${m.content}<br><span style="font-size:11px;opacity:.7">▶ 点击播放</span></div>
        </div>`;
      }

      html += `
        <div class="chat-msg ${isMe?'msg-me':'msg-them'}">
          ${!isMe ? `<div class="msg-avatar" style="background:${senderColor}">${senderAvatar}</div>` : ''}
          <div class="msg-content">
            ${msgContent}
            <div class="msg-time">${m.time}</div>
          </div>
          ${isMe ? `<div class="msg-avatar" style="background:linear-gradient(135deg,var(--primary),var(--primary-deep))">${currentUser.avatar}</div>` : ''}
        </div>
      `;
    });
  }
  html += `</div>`;

  // 输入区
  html += `
    <div class="chat-input-area">
      <button class="ci-btn" onclick="toast('选择图片发送')" title="发送图片">📷</button>
      <button class="ci-btn" onclick="toast('选择视频发送')" title="发送视频">🎬</button>
      <input type="text" class="ci-text" id="chatInput" placeholder="输入消息…" onkeydown="if(event.key==='Enter')sendChatText()">
      <button class="ci-voice-btn" onclick="startVoiceRecord()" title="按住说话">🎤</button>
      <button class="ci-send" onclick="sendChatText()">发送</button>
    </div>
  `;

  document.getElementById('pageContent').innerHTML = html;
  // 滚动到底部
  setTimeout(() => {
    const msgBox = document.getElementById('chatMessages');
    if (msgBox) msgBox.scrollTop = msgBox.scrollHeight;
  }, 50);
}

function backToChatList() {
  chatTargetId = null;
  chatTargetType = null;
  renderChatContacts();
}

function sendChatText() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  const chatKey = getChatKey(currentUser.id, chatTargetId);
  if (!MOCK_CHATS[chatKey]) MOCK_CHATS[chatKey] = [];
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  MOCK_CHATS[chatKey].push({ from: currentUser.id, type:'text', content:text, time });
  input.value = '';
  renderConversation();
  // 模拟对方回复
  setTimeout(() => {
    const replies = ['好的，收到', '我了解了', '谢谢告知', '好的，有什么问题随时联系我', '嗯嗯，注意休息'];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    MOCK_CHATS[chatKey].push({ from: chatTargetId, type:'text', content:reply, time });
    if (currentPage === 'chat') renderConversation();
  }, 1500);
}

function startVoiceRecord() {
  toast('🎤 录音中…（松开发送）');
  // 模拟录音3秒后发送
  setTimeout(() => {
    const chatKey = getChatKey(currentUser.id, chatTargetId);
    if (!MOCK_CHATS[chatKey]) MOCK_CHATS[chatKey] = [];
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    MOCK_CHATS[chatKey].push({ from: currentUser.id, type:'voice', content:'语音消息', duration:3, time });
    toast('✓ 语音已发送');
    if (currentPage === 'chat') renderConversation();
  }, 2000);
}

// ===== Modal & Actions =====
let attachedMedia = []; // 记录记忆时附件的图片/视频

// 模拟媒体素材库（实际应从相机/相册选取）
const MEDIA_POOL = [
  { type:'photo', icon:'🌸', bg:'linear-gradient(135deg,#FF9A9E,#FECFEF)' },
  { type:'photo', icon:'🌅', bg:'linear-gradient(135deg,#ffecd2,#fcb69f)' },
  { type:'photo', icon:'🌳', bg:'linear-gradient(135deg,#84fab0,#8fd3f4)' },
  { type:'photo', icon:'🍲', bg:'linear-gradient(135deg,#F6D365,#FDA085)' },
  { type:'photo', icon:'🐱', bg:'linear-gradient(135deg,#a8edea,#fed6e3)' },
  { type:'photo', icon:'🏠', bg:'linear-gradient(135deg,#fad0c4,#ffd1ff)' },
  { type:'photo', icon:'💐', bg:'linear-gradient(135deg,#fbc2eb,#a6c1ee)' },
  { type:'photo', icon:'🍵', bg:'linear-gradient(135deg,#d4fc79,#96e6a1)' },
  { type:'video', icon:'🎬', bg:'linear-gradient(135deg,#667eea,#764ba2)', duration:'0:12' },
  { type:'video', icon:'🎵', bg:'linear-gradient(135deg,#f093fb,#f5576c)', duration:'0:08' },
  { type:'video', icon:'💃', bg:'linear-gradient(135deg,#4facfe,#00f2fe)', duration:'0:15' },
  { type:'video', icon:'🎂', bg:'linear-gradient(135deg,#fdcbf1,#e6dee9)', duration:'0:06' },
];

function attachMedia(type) {
  const pool = MEDIA_POOL.filter(m => m.type === type);
  const pick = pool[Math.floor(Math.random() * pool.length)];
  attachedMedia.push({ ...pick });
  renderMediaPreview();
  toast(type === 'photo' ? '📷 已添加照片' : '🎬 已添加视频');
}

function removeMediaItem(index) {
  attachedMedia.splice(index, 1);
  renderMediaPreview();
}

function renderMediaPreview() {
  const el = document.getElementById('mediaPreview');
  if (!el) return;
  if (attachedMedia.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = attachedMedia.map((m, i) => `
    <div class="media-thumb ${m.type==='video'?'video':''}" style="background:${m.bg}">
      ${m.icon}
      <button class="remove-media" onclick="removeMediaItem(${i});event.stopPropagation();">×</button>
    </div>
  `).join('');
}

function viewMemoryMedia(memId, idx) {
  const m = MOCK.memories.find(x => x.id === memId);
  if (!m || !m.media || !m.media[idx]) return;
  const md = m.media[idx];
  const viewer = document.createElement('div');
  viewer.className = 'photo-viewer';
  viewer.onclick = () => viewer.remove();
  viewer.innerHTML = `
    <button class="pv-close">✕</button>
    <div class="pv-placeholder" style="background:${md.bg}">${md.icon}</div>
    <div class="pv-info">
      <div class="pv-title">${md.type==='video'?'记忆视频':'记忆照片'} ${md.type==='video'?'▶':''}</div>
      <div class="pv-date">${m.date} · ${m.content.slice(0, 20)}…</div>
    </div>
  `;
  document.body.appendChild(viewer);
}

function openRecordModal() {
  document.getElementById('memoryInput').value = '';
  document.getElementById('extractResult').style.display = 'none';
  attachedMedia = [];
  renderMediaPreview();
  document.getElementById('recordModal').classList.add('show');
  document.getElementById('memoryInput').focus();

  // Auto-extract on input
  document.getElementById('memoryInput').oninput = function() {
    const text = this.value.trim();
    if (text.length > 5) {
      const ext = aiExtract(text);
      const html = `
        <span class="ei">👤 ${ext.people}</span>
        <span class="ei">📍 ${ext.places}</span>
        <span class="ei">🎯 ${ext.events}</span>
        <span class="ei">🎁 ${ext.items}</span>
        <span class="ei">😊 ${ext.emotion}</span>
      `;
      document.getElementById('extractItems').innerHTML = html;
      document.getElementById('extractResult').style.display = 'block';
    } else {
      document.getElementById('extractResult').style.display = 'none';
    }
  };
}

function saveMemory() {
  const text = document.getElementById('memoryInput').value.trim();
  if (!text) { toast('请输入记忆内容'); return; }
  const ext = aiExtract(text);
  const newMemory = {
    id: Date.now(),
    userId: viewTargetUserId,
    content: text,
    people: ext.people,
    places: ext.places,
    events: ext.events,
    items: ext.items,
    emotion: ext.emotion,
    date: '刚刚',
    media: attachedMedia.slice(),
  };
  MOCK.memories.unshift(newMemory);
  attachedMedia = [];
  closeModal('recordModal');
  toast('✓ 记忆已保存');
  renderPage();
}

function openReminderModal() {
  document.getElementById('reminderTitle').value = '';
  document.getElementById('reminderTime').value = '';
  document.getElementById('reminderModal').classList.add('show');
}

function saveReminder() {
  const title = document.getElementById('reminderTitle').value.trim();
  const type = document.getElementById('reminderType').value;
  const time = document.getElementById('reminderTime').value;
  if (!title) { toast('请输入提醒标题'); return; }
  const typeLabels = { medication:'用药', visit:'复诊', family:'家人', activity:'活动' };
  const newReminder = {
    id: Date.now(),
    userId: viewTargetUserId,
    title,
    detail: currentUser.displayName + '远程添加',
    type,
    time: time ? time.replace('T', ' ').slice(5) : '待定',
    completed: false,
    createdBy: currentUser.id,
  };
  MOCK.reminders.push(newReminder);
  closeModal('reminderModal');
  toast('✓ 提醒已添加');
  renderPage();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function toggleReminder(id) {
  const r = MOCK.reminders.find(x => x.id === id);
  if (r) {
    r.completed = !r.completed;
    renderPage();
    toast(r.completed ? '✓ 已完成' : '已取消完成');
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function formatDate() {
  const d = new Date();
  const week = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getMonth()+1}月${d.getDate()}日 星期${week}`;
}

// ===== Init =====
render();
</script>
