<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>树洞 - 青芽</title>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --paper: #F5F7F4;
      --ink: #3A4538;
      --ink-soft: #5A6A58;
      --ink-muted: #A8B8A4;
      --moss: #5A8A5E;
      --moss-light: rgba(90, 138, 94, 0.12);
      --white: #FFFFFF;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #E5E5E5;
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      background: #1a1a1a;
      border-radius: 50px;
      padding: 12px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
      position: relative;
      flex-shrink: 0;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: #050a05;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-notch {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 150px; height: 34px;
      background: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 1000;
    }

    /* ===== SCENE ===== */
    .treehole-scene {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #050a05;
    }

    /* Tree background image */
    .tree-bg {
      position: absolute;
      inset: 0;
      background: url('assets/treehole-tree.jpg') center center / cover no-repeat;
      filter: brightness(0.85) contrast(1.05);
    }

    /* Vignette overlay */
    .tree-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 55%, transparent 30%, rgba(2,5,2,0.4) 70%, rgba(2,5,2,0.7) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Hole glow overlay - covers the entire tree hole area */
    .hole-glow-overlay {
      position: absolute;
      bottom: 210px;
      left: 50%;
      transform: translateX(-42%);
      width: 130px;
      height: 160px;
      pointer-events: none;
      z-index: 3;
    }

    .hole-glow-pulse {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,200,80,0.4) 0%, rgba(255,180,60,0.2) 30%, rgba(255,160,40,0.08) 60%, transparent 80%);
      border-radius: 50%;
      animation: holePulse 2.5s ease-in-out infinite;
    }

    .hole-glow-pulse:nth-child(2) {
      animation-delay: 0.8s;
      animation-duration: 3s;
    }

    .hole-glow-pulse:nth-child(3) {
      animation-delay: 1.5s;
      animation-duration: 2.2s;
    }

    @keyframes holePulse {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      30% { opacity: 0.8; transform: scale(1.05); }
      60% { opacity: 0.5; transform: scale(0.95); }
      80% { opacity: 0.9; transform: scale(1.1); }
    }

    /* Fireflies - twinkling and floating */
    .firefly {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,220,120,0.9);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,220,120,0.6), 0 0 16px rgba(255,200,80,0.3);
      pointer-events: none;
      z-index: 5;
    }

    /* ===== FLOATING WHISPERS ===== */
    .floating-item {
      position: absolute;
      cursor: pointer;
      z-index: 10;
      filter: drop-shadow(0 0 8px rgba(140,200,100,0.3));
      transition: filter 0.3s ease;
    }

    .floating-item:hover {
      filter: drop-shadow(0 0 16px rgba(140,200,100,0.6));
    }

    .floating-item .whisper-icon {
      display: block;
      font-size: 22px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(140,200,100,0.4)) drop-shadow(0 0 12px rgba(140,200,100,0.2));
      animation: emojiFloat 3s ease-in-out infinite;
    }

    @keyframes emojiFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.05); }
    }

    .floating-item .whisper-glow {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--orb-color, rgba(140,200,100,0.15)) 0%, transparent 70%);
      animation: whisperGlow 2s ease-in-out infinite;
    }

    @keyframes whisperGlow {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .floating-item.collected {
      animation: collectWhisper 1s ease forwards;
    }

    @keyframes collectWhisper {
      0% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 8px rgba(140,200,100,0.3)); }
      30% { transform: scale(1.4); opacity: 1; filter: drop-shadow(0 0 20px rgba(140,200,100,0.6)); }
      100% { transform: scale(0); opacity: 0; filter: drop-shadow(0 0 0 rgba(140,200,100,0)); }
    }

    /* ===== HEADER ===== */
    .scene-header {
      position: absolute;
      top: 44px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 30;
      pointer-events: none;
    }

    .scene-header > * {
      pointer-events: auto;
    }

    .scene-back {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .scene-title-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .scene-title {
      font-family: 'LXGW WenKai TC', serif;
      font-size: 18px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 4px;
      font-weight: 400;
    }

    .scene-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
    }

    /* Top right icons */
    .top-icons {
      display: flex;
      gap: 10px;
      position: relative;
      z-index: 25;
    }

    .top-icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      position: relative;
      z-index: 25;
      pointer-events: auto;
    }

    .top-icon-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .top-icon-btn.active {
      color: rgba(140,200,100,0.8);
      background: rgba(140,200,100,0.15);
      border-color: rgba(140,200,100,0.2);
    }

    /* Online stats bar */
    .online-stats-bar {
      position: absolute;
      top: 96px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      border-radius: 100px;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap;
    }

    .online-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .online-stat-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      animation: onlinePulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .online-stat-dot.green {
      background: rgba(140,200,100,0.9);
      box-shadow: 0 0 6px rgba(140,200,100,0.4);
    }

    .online-stat-dot.pink {
      background: rgba(255,150,150,0.9);
      box-shadow: 0 0 6px rgba(255,150,150,0.4);
    }

    .online-stat-dot.gold {
      background: rgba(255,200,80,0.9);
      box-shadow: 0 0 6px rgba(255,200,80,0.4);
    }

    @keyframes onlinePulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .online-stat-text {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
    }

    .online-stat-num {
      color: rgba(255,255,255,0.75);
      font-weight: 600;
      font-size: 12px;
    }



    /* Post button */
    .post-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 28px;
      background: rgba(90,138,94,0.15);
      border: 1px solid rgba(90,138,94,0.2);
      border-radius: 100px;
      color: rgba(140,200,100,0.8);
      font-size: 14px;
      cursor: pointer;
      z-index: 20;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .post-btn:hover {
      background: rgba(90,138,94,0.25);
      border-color: rgba(90,138,94,0.35);
    }

    /* ===== REVEAL MODAL ===== */
    .reveal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(2,5,2,0.85);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 40px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .reveal-overlay.show {
      display: flex;
      opacity: 1;
    }

    .reveal-card {
      background: linear-gradient(135deg, rgba(245,247,244,0.95), rgba(230,235,228,0.95));
      border: 1px solid rgba(90,138,94,0.15);
      border-radius: 20px;
      padding: 28px;
      max-width: 320px;
      width: 100%;
      transform: scale(0.85) translateY(20px);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .reveal-overlay.show .reveal-card {
      transform: scale(1) translateY(0);
    }

    .reveal-icon {
      font-size: 36px;
      text-align: center;
      margin-bottom: 12px;
    }

    .reveal-emotion {
      display: inline-block;
      padding: 3px 10px;
      background: var(--moss-light);
      color: var(--moss);
      border-radius: 100px;
      font-size: 11px;
      margin-bottom: 12px;
    }

    .reveal-text {
      font-size: 15px;
      color: var(--ink);
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .reveal-time {
      font-size: 11px;
      color: var(--ink-muted);
      margin-bottom: 16px;
    }

    .reveal-actions {
      display: flex;
      gap: 10px;
    }

    .reveal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.2s ease;
    }

    .reveal-btn-primary {
      background: linear-gradient(135deg, #5A8A5E, #7AAF7E);
      color: #fff;
    }

    .reveal-btn-secondary {
      background: rgba(90,138,94,0.06);
      color: var(--ink-soft);
      border: 1px solid rgba(90,138,94,0.12);
    }

    .reveal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.04);
      border: none;
      color: var(--ink-muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== POST MODAL ===== */
    .post-overlay {
      position: absolute;
      inset: 0;
      background: rgba(2,5,2,0.85);
      backdrop-filter: blur(16px);
      display: none;
      align-items: flex-end;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .post-overlay.show {
      display: flex;
      opacity: 1;
    }

    .post-sheet {
      background: linear-gradient(135deg, rgba(245,247,244,0.98), rgba(230,235,228,0.98));
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-height: 70%;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .post-overlay.show .post-sheet {
      transform: translateY(0);
    }

    .post-sheet-title {
      font-family: 'LXGW WenKai TC', serif;
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--ink);
    }

    .post-sheet-textarea {
      width: 100%;
      height: 120px;
      background: var(--white);
      border: 1px solid rgba(90,138,94,0.1);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      color: var(--ink);
      line-height: 1.7;
      font-family: inherit;
      resize: none;
      outline: none;
      margin-bottom: 12px;
    }

    .post-sheet-hint {
      font-size: 12px;
      color: var(--ink-muted);
      margin-bottom: 16px;
    }

    .post-sheet-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #5A8A5E, #7AAF7E);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    /* ===== HISTORY MODAL ===== */
    .history-overlay {
      position: absolute;
      inset: 0;
      background: rgba(2,5,2,0.85);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
      padding: 20px;
    }

    .history-overlay.show {
      display: flex;
      opacity: 1;
    }

    .history-sheet {
      background: linear-gradient(135deg, rgba(245,247,244,0.98), rgba(230,235,228,0.98));
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 320px;
      max-height: 70%;
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow-y: auto;
    }

    .history-overlay.show .history-sheet {
      transform: scale(1);
    }

    .history-sheet-title {
      font-family: 'LXGW WenKai TC', serif;
      font-size: 18px;
      margin-bottom: 16px;
      flex-shrink: 0;
      color: var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.06);
      border: none;
      color: var(--ink-muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* 青芽回应 */
    .respond-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2000;
      align-items: flex-end;
      justify-content: center;
    }
    .respond-overlay.show { display: flex; }
    .respond-sheet {
      background: #fff;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 400px;
      padding: 20px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .respond-overlay.show .respond-sheet {
      transform: translateY(0);
    }
    .respond-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .respond-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5A8A5E, #7AAF7E);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      font-family: 'LXGW WenKai TC', serif;
    }
    .respond-title {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
    }
    .respond-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.06);
      border: none;
      color: var(--ink-muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .respond-body { padding: 0 4px; }
    .respond-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--ink);
      margin-bottom: 20px;
    }
    .respond-actions {
      display: flex;
      gap: 10px;
    }
    .respond-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
    }
    .respond-btn-primary {
      background: linear-gradient(135deg, #5A8A5E, #7AAF7E);
      color: #fff;
      border: none;
    }

    /* Chat area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 4px;
      max-height: 200px;
      scrollbar-width: thin;
    }

    .chat-container::-webkit-scrollbar {
      width: 3px;
    }

    .chat-container::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.1);
      border-radius: 3px;
    }

    .chat-bubble-wrap {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
    }

    .chat-left {
      align-items: flex-start;
    }

    .chat-right {
      align-items: flex-end;
    }

    .chat-sender {
      font-size: 10px;
      color: var(--ink-muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .chat-bubble {
      max-width: 85%;
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word;
    }

    .chat-bubble-me {
      background: linear-gradient(135deg, #5A8A5E, #6B9E6F);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .chat-bubble-other {
      background: var(--moss-light);
      color: var(--ink-soft);
      border-bottom-left-radius: 4px;
    }

    .history-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-muted);
      font-size: 14px;
    }

    .history-item {
      padding: 14px 16px;
      background: var(--white);
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(90,138,94,0.08);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .history-item:hover {
      background: rgba(90,138,94,0.04);
      transform: translateY(-1px);
    }

    .history-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .history-item-icon {
      font-size: 18px;
    }

    .history-item-emotion {
      font-size: 11px;
      color: var(--moss);
      background: var(--moss-light);
      padding: 2px 8px;
      border-radius: 100px;
    }

    .history-item-time {
      font-size: 11px;
      color: var(--ink-muted);
      margin-left: auto;
    }

    .history-item-text {
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Particles */
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(140,200,100,0.6);
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 4px rgba(140,200,100,0.3);
      animation: particleFly 1s ease-out forwards;
    }

    @keyframes particleFly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* Post throw animation */
    .throw-emoji {
      position: absolute;
      font-size: 36px;
      z-index: 200;
      pointer-events: none;
      animation: throwIntoHole 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes throwIntoHole {
      0% { transform: scale(1) translateY(0); opacity: 1; }
      30% { transform: scale(1.2) translateY(-60px); opacity: 1; }
      60% { transform: scale(0.8) translateY(100px); opacity: 0.8; }
      80% { transform: scale(0.3) translateY(250px); opacity: 0.4; }
      100% { transform: scale(0) translateY(350px); opacity: 0; }
    }

    /* History tabs */
    .history-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      background: rgba(0,0,0,0.04);
      border-radius: 10px;
      padding: 3px;
    }

    .history-tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: 13px;
      color: var(--ink-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 8px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .history-tab.active {
      background: var(--white);
      color: var(--ink);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    /* Unread badge on card */
    .history-item {
      position: relative;
    }

    .card-unread-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 22px;
      height: 18px;
      padding: 0 5px;
      background: linear-gradient(135deg, #FF6B6B, #E85D5D);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(232,93,93,0.35);
      animation: badgePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 0.5px;
    }

    @keyframes badgePop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    /* Tab unread badge */
    .tab-unread-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 14px;
      padding: 0 4px;
      background: linear-gradient(135deg, #FF6B6B, #E85D5D);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      border-radius: 7px;
      margin-left: 4px;
      vertical-align: middle;
      box-shadow: 0 1px 4px rgba(232,93,93,0.3);
    }

    /* History icon badge */
    .icon-unread-badge {
      position: absolute;
      top: -3px;
      right: -3px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      background: linear-gradient(135deg, #FF6B6B, #E85D5D);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(232,93,93,0.4);
      animation: badgePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 26;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="phone-notch"></div>

      <div class="treehole-scene" id="treehole-scene">
        <!-- Tree background -->
        <div class="tree-bg"></div>
        <div class="tree-vignette"></div>

        <!-- Fireflies container -->
        <div id="fireflies"></div>

        <!-- Hole glow overlay -->
        <div class="hole-glow-overlay">
          <div class="hole-glow-pulse"></div>
          <div class="hole-glow-pulse"></div>
          <div class="hole-glow-pulse"></div>
        </div>

        <!-- Floating whispers -->
        <div id="floating-items"></div>

        <!-- Header -->
        <div class="scene-header">
          <button class="scene-back" id="scene-back">&#8592;</button>
          <div class="scene-title-wrap">
            <div class="scene-title">树 洞</div>
            <div class="scene-subtitle">每段倾诉，都值得鼓励</div>
          </div>
          <div class="top-icons">
            <button class="top-icon-btn" id="music-btn" title="背景音乐">&#127925;</button>
            <button class="top-icon-btn" id="history-btn" title="浏览记录">&#128220;</button>
          </div>
        </div>

        <!-- Online stats -->
        <div class="online-stats-bar">
          <div class="online-stat">
            <div class="online-stat-dot green"></div>
            <span class="online-stat-text"><span class="online-stat-num" id="online-count">1,247</span> 人在线</span>
          </div>
          <div class="online-stat">
            <div class="online-stat-dot pink"></div>
            <span class="online-stat-text">我帮助过 <span class="online-stat-num" id="help-count">0</span> 人</span>
          </div>
          <div class="online-stat">
            <div class="online-stat-dot gold"></div>
            <span class="online-stat-text"><span class="online-stat-num" id="encourage-count">0</span> 人鼓励我</span>
          </div>
        </div>

        <!-- Post button -->
        <button class="post-btn" id="post-btn">我也想说...</button>
      </div>

      <!-- Reveal Modal -->
      <div class="reveal-overlay" id="reveal-overlay">
        <div class="reveal-card">
          <button class="reveal-close" id="reveal-close">&#10005;</button>
          <div class="reveal-icon" id="reveal-icon">&#128220;</div>
          <div style="text-align: center;">
            <span class="reveal-emotion" id="reveal-emotion">平静</span>
          </div>
          <div class="reveal-text" id="reveal-text"></div>
          <div class="reveal-time" id="reveal-time"></div>
          <div class="reveal-actions">
            <button class="reveal-btn reveal-btn-secondary" id="reveal-comfort">&#128170; 加个油</button>
            <button class="reveal-btn reveal-btn-primary" id="reveal-hug">&#129303; 抱一抱</button>
          </div>
          <div style="text-align: center; margin-top: 10px;">
            <button class="reveal-btn reveal-btn-secondary" id="reveal-message" style="width: 100%;">&#128221; 留言鼓励</button>
          </div>
          <!-- Inline message form -->
          <div id="inline-message-form" style="display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.06);">
            <textarea id="inline-message-textarea" placeholder="告诉她，你很棒，很坚强，要加油..." maxlength="200" style="width: 100%; min-height: 70px; padding: 10px 12px; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; font-size: 14px; font-family: inherit; resize: none; background: rgba(255,255,255,0.6); outline: none; line-height: 1.6;"></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
              <span id="inline-message-hint" style="font-size: 11px; color: var(--ink-muted);">0/200</span>
              <button id="inline-message-send" style="padding: 8px 18px; border-radius: 10px; background: linear-gradient(135deg, #5A8A5E, #7AAF7E); color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit;">鼓励一下</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Post Modal -->
      <div class="post-overlay" id="post-overlay">
        <div class="post-sheet">
          <div class="post-sheet-title">把心事说给树洞听</div>
          <textarea class="post-sheet-textarea" id="post-sheet-textarea" placeholder="没有人会知道你是谁..." maxlength="500"></textarea>
          <div class="post-sheet-hint">0/500 · 匿名放入树洞</div>
          <button class="post-sheet-btn" id="post-sheet-btn">放入树洞</button>
        </div>
      </div>

      <!-- Message Modal -->
      <div class="post-overlay" id="message-overlay">
        <div class="post-sheet">
          <div class="post-sheet-title">留言鼓励</div>
          <div style="font-size: 13px; color: var(--ink-muted); margin-bottom: 12px;">告诉她，你很棒，很坚强，要加油...</div>
          <textarea class="post-sheet-textarea" id="message-textarea" placeholder="写下你想对她说的话..." maxlength="200"></textarea>
          <div class="post-sheet-hint">0/200 · 匿名发送</div>
          <button class="post-sheet-btn" id="message-send-btn">发送留言</button>
        </div>
      </div>

      <!-- Received Messages Modal -->
      <div class="history-overlay" id="received-overlay">
        <div class="history-sheet">
          <div class="history-sheet-title">
            <span>我收到的鼓励</span>
            <button class="history-close" id="received-close">&#10005;</button>
          </div>
          <div id="received-list"></div>
        </div>
      </div>

      <!-- History Modal -->
      <div class="history-overlay" id="history-overlay">
        <div class="history-sheet">
          <div class="history-sheet-title">
            <span>树洞记录</span>
            <button class="history-close" id="history-close">&#10005;</button>
          </div>
          <div class="history-tabs">
            <button class="history-tab active" id="history-tab-listened">我倾听的</button>
            <button class="history-tab" id="history-tab-secrets">我的秘密</button>
          </div>
          <div id="history-list"></div>
          <div id="secrets-list" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 青芽懂你回应 -->
  <div class="respond-overlay" id="respond-overlay">
    <div class="respond-sheet">
      <div class="respond-header">
        <div class="respond-avatar">芽</div>
        <div class="respond-title">青芽收到了你的心事</div>
        <button class="respond-close" id="respond-close">&#10005;</button>
      </div>
      <div class="respond-body">
        <p class="respond-text" id="respond-text"></p>
        <div class="respond-actions">
          <button class="respond-btn respond-btn-primary" id="respond-again">再说一件</button>
          <button class="respond-btn" id="respond-ok">我知道了</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Background music -->
  <audio id="bg-music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=soft-piano-100-bpm-121529.mp3" type="audio/mpeg">
  </audio>

  <script>
    var messages = [
      { id: 1, text: '今天取卵了，疼得直冒冷汗，但想到可能有一个小生命在等着我，就觉得一切都值得。', emotion: '坚强', icon: '&#128220;', time: '2小时前' },
      { id: 2, text: '移植后第5天，忍不住测了一下，大白板。心里好难受，但又不敢哭，怕影响着床。', emotion: '难过', icon: '&#128167;', time: '5小时前' },
      { id: 3, text: '促排第8天，肚子胀得像气球，走路都费劲。老公给我熬了冬瓜汤，突然觉得很幸福。', emotion: '温暖', icon: '&#127807;', time: '昨天' },
      { id: 4, text: '医生说卵泡长得不错，有希望取到10个以上！终于有个好消息了，加油！', emotion: '开心', icon: '&#127775;', time: '昨天' },
      { id: 5, text: '深夜睡不着，看着天花板发呆。这条路走了太久，有时候真的想放弃，但又舍不得。', emotion: '焦虑', icon: '&#127769;', time: '3天前' },
      { id: 6, text: '今天在医院的走廊上看到一个姐妹一个人蹲在角落哭，我也跟着哭了。我们都不容易。', emotion: '心疼', icon: '&#128148;', time: '4天前' },
      { id: 7, text: '第二次移植了，第一次失败了，这次特别害怕。但医生说成功率有60%，我要相信。', emotion: '忐忑', icon: '&#128562;', time: '5天前' },
      { id: 8, text: '打了十多天的针，肚子全是淤青，但每次看到群里姐妹们互相打气，就觉得还能坚持。', emotion: '坚持', icon: '&#128170;', time: '1周前' }
    ];

    var whisperIcons = ['&#128220;', '&#128167;', '&#127807;', '&#127775;', '&#127769;', '&#128148;', '&#128562;', '&#128170;'];
    var orbColors = ['rgba(255,200,80,0.9)', 'rgba(140,200,100,0.9)', 'rgba(255,150,150,0.9)', 'rgba(150,200,255,0.9)', 'rgba(200,150,255,0.9)', 'rgba(255,180,100,0.9)'];
    var hugCount = 0;
    var comfortCount = 0;
    var messageCount = 0;
    var receivedMessages = [];
    var viewedHistory = [];
    var mySecrets = [];

    // ===== FIREFLIES =====
    function createFirefly() {
      var container = document.getElementById('fireflies');
      var f = document.createElement('div');
      f.className = 'firefly';

      var startX = 20 + Math.random() * 60;
      var startY = 30 + Math.random() * 50;
      f.style.left = startX + '%';
      f.style.top = startY + '%';

      // Random float path
      var dx1 = (Math.random() - 0.5) * 60;
      var dy1 = (Math.random() - 0.5) * 40;
      var dx2 = (Math.random() - 0.5) * 80;
      var dy2 = (Math.random() - 0.5) * 50;
      var dx3 = (Math.random() - 0.5) * 50;
      var dy3 = (Math.random() - 0.5) * 30;

      var floatDuration = 8 + Math.random() * 6;
      var twinkleDuration = 1.5 + Math.random() * 2;

      f.style.animation = 'none';
      f.offsetHeight;

      f.style.animation = 'fireflyFloat ' + floatDuration + 's ease-in-out infinite, fireflyTwinkle ' + twinkleDuration + 's ease-in-out infinite';
      f.style.animationDelay = (Math.random() * 5) + 's, ' + (Math.random() * 3) + 's';

      // Use CSS custom properties for path
      f.style.setProperty('--dx1', dx1 + 'px');
      f.style.setProperty('--dy1', dy1 + 'px');
      f.style.setProperty('--dx2', dx2 + 'px');
      f.style.setProperty('--dy2', dy2 + 'px');
      f.style.setProperty('--dx3', dx3 + 'px');
      f.style.setProperty('--dy3', dy3 + 'px');

      container.appendChild(f);

      // Remove and recreate after some time
      setTimeout(function() {
        if (f.parentNode) f.remove();
        createFirefly();
      }, (floatDuration * 2 + Math.random() * 5) * 1000);
    }

    // Add firefly keyframes dynamically
    var fireflyStyle = document.createElement('style');
    fireflyStyle.textContent = `
      @keyframes fireflyFloat {
        0% { transform: translate(0, 0); }
        25% { transform: translate(var(--dx1), var(--dy1)); }
        50% { transform: translate(var(--dx2), var(--dy2)); }
        75% { transform: translate(var(--dx3), var(--dy3)); }
        100% { transform: translate(0, 0); }
      }
      @keyframes fireflyTwinkle {
        0%, 100% { opacity: 0.15; transform: scale(0.5); }
        25% { opacity: 1; transform: scale(1.3); }
        50% { opacity: 0.3; transform: scale(0.7); }
        75% { opacity: 0.8; transform: scale(1.1); }
      }
    `;
    document.head.appendChild(fireflyStyle);

    function generateFireflies() {
      for (var i = 0; i < 20; i++) {
        setTimeout(function() { createFirefly(); }, i * 300);
      }
    }

    // ===== SPAWN WHISPER =====
    function spawnWhisper() {
      var container = document.getElementById('floating-items');
      if (container.children.length >= 4) return;

      var item = document.createElement('div');
      item.className = 'floating-item';

      var color = orbColors[Math.floor(Math.random() * orbColors.length)];
      var icon = whisperIcons[Math.floor(Math.random() * whisperIcons.length)];
      item.style.setProperty('--orb-color', color);
      item.innerHTML = '<span class="whisper-glow"></span><span class="whisper-icon">' + icon + '</span>';

      // Spawn from tree hole area and float upward to middle-upper area
      // Random start position around tree hole (lower area)
      var startX = 120 + Math.random() * 140;
      var startY = 460 + Math.random() * 40;
      // End position: scattered in middle area, clearly visible
      var endY = 240 + Math.random() * 160;
      var endX = 60 + Math.random() * 270;

      item.style.left = startX + 'px';
      item.style.top = startY + 'px';
      item.style.opacity = '0';
      item.style.zIndex = '10';

      container.appendChild(item);

      // Force reflow
      item.offsetHeight;

      // Three-phase animation:
      // Phase 1 (0-4s): Float from hole to upper area
      // Phase 2 (4-14s): Hover with gentle drift (10s visible!)
      // Phase 3 (14-16s): Slowly fade out
      var startTime = Date.now();
      var ascendDuration = 4000;
      var hoverDuration = 10000;
      var totalDuration = ascendDuration + hoverDuration + 2000;

      function animate() {
        var elapsed = Date.now() - startTime;

        if (elapsed >= totalDuration) {
          item.style.opacity = '0';
          setTimeout(function() { if (item.parentNode) item.remove(); }, 500);
          return;
        }

        if (elapsed < ascendDuration) {
          // Phase 1: Float up
          var p = elapsed / ascendDuration;
          var ease = 1 - Math.pow(1 - p, 2);
          var y = startY + (endY - startY) * ease;
          var drift = Math.sin(p * Math.PI * 2) * 20;
          item.style.left = (startX + drift) + 'px';
          item.style.top = y + 'px';
          item.style.opacity = (p < 0.3 ? p / 0.3 : 1).toString();
        } else if (elapsed < ascendDuration + hoverDuration) {
          // Phase 2: Hover at top with gentle drift
          var hoverElapsed = elapsed - ascendDuration;
          var p2 = hoverElapsed / hoverDuration;
          var driftX = Math.sin(p2 * Math.PI * 2) * 25;
          var driftY = Math.sin(p2 * Math.PI * 1.3) * 8;
          item.style.left = (endX + driftX) + 'px';
          item.style.top = (endY + driftY) + 'px';
          item.style.opacity = '1';
        } else {
          // Phase 3: Fade out
          var fadeElapsed = elapsed - ascendDuration - hoverDuration;
          item.style.opacity = (1 - fadeElapsed / 2000).toString();
        }

        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);

      var msg = messages[Math.floor(Math.random() * messages.length)];

      item.addEventListener('click', function(e) {
        e.stopPropagation();
        collectWhisper(this, msg);
      });
    }

    function collectWhisper(item, msg) {
      // Add to history
      if (!viewedHistory.find(function(h) { return h.id === msg.id; })) {
        viewedHistory.unshift({ id: msg.id, text: msg.text, emotion: msg.emotion, icon: msg.icon, time: msg.time, viewedAt: new Date() });
      }

      var rect = item.getBoundingClientRect();
      var sceneRect = document.getElementById('treehole-scene').getBoundingClientRect();
      for (var i = 0; i < 10; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        p.style.left = (rect.left - sceneRect.left + 12) + 'px';
        p.style.top = (rect.top - sceneRect.top + 12) + 'px';
        var a = (Math.PI * 2 / 10) * i;
        p.style.setProperty('--tx', Math.cos(a) * 40 + 'px');
        p.style.setProperty('--ty', Math.sin(a) * 40 + 'px');
        document.getElementById('treehole-scene').appendChild(p);
        (function(el) { setTimeout(function() { el.remove(); }, 1000); })(p);
      }

      item.classList.add('collected');
      setTimeout(function() { item.remove(); }, 1000);

      setTimeout(function() {
        showReveal(msg);
      }, 500);
    }

    var currentMsg = null;

    function showReveal(msg) {
      currentMsg = msg;
      document.getElementById('reveal-icon').innerHTML = msg.icon;
      document.getElementById('reveal-emotion').textContent = msg.emotion;
      document.getElementById('reveal-text').textContent = msg.text;
      document.getElementById('reveal-time').textContent = msg.time + ' · 来自一位匿名姐妹';
      document.getElementById('reveal-overlay').classList.add('show');
    }

    function hideReveal() {
      document.getElementById('reveal-overlay').classList.remove('show');
      currentMsg = null;
    }

    function showPost() {
      document.getElementById('post-overlay').classList.add('show');
      setTimeout(function() {
        document.getElementById('post-sheet-textarea').focus();
      }, 400);
    }

    function hidePost() {
      document.getElementById('post-overlay').classList.remove('show');
      document.getElementById('post-sheet-textarea').value = '';
    }

    // Inline message form
    function toggleInlineMessage() {
      var form = document.getElementById('inline-message-form');
      if (form.style.display === 'none') {
        form.style.display = 'block';
        document.getElementById('inline-message-textarea').value = '';
        document.getElementById('inline-message-hint').textContent = '0/200';
        setTimeout(function() {
          document.getElementById('inline-message-textarea').focus();
        }, 100);
      } else {
        form.style.display = 'none';
      }
    }

    function sendInlineMessage() {
      var text = document.getElementById('inline-message-textarea').value.trim();
      if (!text) return;
      messageCount++;
      document.getElementById('help-count').textContent = hugCount + comfortCount + messageCount;

      // Hide inline form
      document.getElementById('inline-message-form').style.display = 'none';

      // Create throw animation emoji from card center
      var icons = ['&#128220;', '&#128167;', '&#127807;', '&#127775;', '&#127769;', '&#128148;', '&#128562;', '&#128170;'];
      var randomIcon = icons[Math.floor(Math.random() * icons.length)];

      var throwEl = document.createElement('div');
      throwEl.className = 'throw-emoji';
      throwEl.innerHTML = randomIcon;
      throwEl.style.left = '50%';
      throwEl.style.top = '40%';
      throwEl.style.transform = 'translateX(-50%)';
      document.getElementById('treehole-scene').appendChild(throwEl);

      // Hide reveal card
      hideReveal();

      // Remove throw element after animation
      setTimeout(function() { throwEl.remove(); }, 1500);

      // Simulate receiving a message back
      setTimeout(function() {
        receivedMessages.unshift({
          text: text,
          reply: '谢谢你，我会继续加油的！',
          time: '刚刚',
          from: '匿名姐妹'
        });
        document.getElementById('encourage-count').textContent = receivedMessages.length;
      }, 2000);
    }

    // Received messages
    function showReceivedMessages() {
      var list = document.getElementById('received-list');
      if (receivedMessages.length === 0) {
        list.innerHTML = '<div class="history-empty">还没有收到鼓励<br>去安慰其他姐妹吧，温暖会回流</div>';
      } else {
        list.innerHTML = receivedMessages.map(function(m, i) {
          return '<div class="history-item">' +
            '<div class="history-item-header">' +
              '<span class="history-item-emotion">留言</span>' +
              '<span class="history-item-time">' + m.time + '</span>' +
            '</div>' +
            '<div style="font-size: 12px; color: var(--ink-muted); margin-bottom: 4px;">我的留言：' + m.text + '</div>' +
            '<div style="font-size: 13px; color: var(--moss); background: var(--moss-light); padding: 8px 12px; border-radius: 8px; margin-top: 6px;">' +
              '<strong>回复：</strong>' + m.reply +
            '</div>' +
          '</div>';
        }).join('');
      }
      document.getElementById('received-overlay').classList.add('show');
    }

    function hideReceivedMessages() {
      document.getElementById('received-overlay').classList.remove('show');
    }

    // ===== HISTORY =====
    function showHistory() {
      renderListenedList();
      renderSecretsList();
      updateTotalUnread();
      document.getElementById('history-list').style.display = 'block';
      document.getElementById('secrets-list').style.display = 'none';
      document.getElementById('history-tab-listened').classList.add('active');
      document.getElementById('history-tab-secrets').classList.remove('active');
      document.getElementById('history-overlay').classList.add('show');
    }

    function renderListenedList() {
      var list = document.getElementById('history-list');
      if (viewedHistory.length === 0) {
        list.innerHTML = '<div class="history-empty">还没有倾听过任何心事<br>点击飘浮的光点，开始探索吧</div>';
      } else {
        list.innerHTML = viewedHistory.map(function(h, i) {
          var unreadBadge = h.unreadCount ? '<span class="card-unread-badge">+' + h.unreadCount + '</span>' : '';
          return '<div class="history-item" onclick="window.showRecordDetail(' + i + ', \'listened\')">' +
            unreadBadge +
            '<div class="history-item-header">' +
              '<span class="history-item-icon">' + h.icon + '</span>' +
              '<span class="history-item-emotion">' + h.emotion + '</span>' +
              '<span class="history-item-time">' + h.time + '</span>' +
            '</div>' +
            '<div class="history-item-text">' + h.text + '</div>' +
          '</div>';
        }).join('');
      }
    }

    function renderSecretsList() {
      var list = document.getElementById('secrets-list');
      if (mySecrets.length === 0) {
        list.innerHTML = '<div class="history-empty">还没有在树洞留下秘密<br>点击「我也想说...」开始倾诉</div>';
      } else {
        list.innerHTML = mySecrets.map(function(s, i) {
          var unreadBadge = s.unreadCount ? '<span class="card-unread-badge">+' + s.unreadCount + '</span>' : '';
          return '<div class="history-item" onclick="window.showRecordDetail(' + i + ', \'secret\')">' +
            unreadBadge +
            '<div class="history-item-header">' +
              '<span class="history-item-emotion">我的秘密</span>' +
              '<span class="history-item-time">' + s.time + '</span>' +
            '</div>' +
            '<div class="history-item-text">' + s.text + '</div>' +
          '</div>';
        }).join('');
      }
    }

    // Record detail view - exposed to window for onclick handlers
    window.showRecordDetail = function(index, type) {
      var data = type === 'listened' ? viewedHistory[index] : mySecrets[index];
      // Mark as read
      if (data.unreadCount) {
        data.unreadCount = 0;
        renderListenedList();
        renderSecretsList();
        updateTotalUnread();
      }

      var detailOverlay = document.createElement('div');
      detailOverlay.className = 'history-overlay';
      detailOverlay.style.display = 'flex';
      detailOverlay.style.opacity = '1';
      detailOverlay.style.zIndex = '999';
      detailOverlay.id = 'detail-overlay';

      // Build chat messages: include myMessage (first message) + all replies
      var chatMessages = [];
      if (data.myMessage) {
        chatMessages.push({ from: 'me', text: data.myMessage, time: data.time });
      }
      if (data.replies && data.replies.length > 0) {
        chatMessages = chatMessages.concat(data.replies);
      }

      var chatHtml = '';
      if (chatMessages.length > 0) {
        chatHtml = '<div class="chat-container">' +
          chatMessages.map(function(r) {
            var isMe = r.from === 'me';
            return '<div class="chat-bubble-wrap ' + (isMe ? 'chat-right' : 'chat-left') + '">' +
              '<div class="chat-sender">' + (isMe ? '我' : '匿名姐妹') + ' · ' + r.time + '</div>' +
              '<div class="chat-bubble ' + (isMe ? 'chat-bubble-me' : 'chat-bubble-other') + '">' + r.text + '</div>' +
            '</div>';
          }).join('') +
        '</div>';
      }

      detailOverlay.innerHTML =
        '<div class="history-sheet" style="transform: scale(1); display: flex; flex-direction: column; max-height: 70%;">' +
          '<div class="history-sheet-title">' +
            '<span>' + (type === 'listened' ? '倾诉详情' : '我的秘密') + '</span>' +
            '<button class="history-close" onclick="window.hideRecordDetail()">&#10005;</button>' +
          '</div>' +
          '<div style="padding: 4px 0; flex: 1; overflow: hidden; display: flex; flex-direction: column;">' +
            '<div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-shrink: 0;">' +
              '<span style="font-size: 22px;">' + (data.icon || '&#128220;') + '</span>' +
              '<span class="history-item-emotion">' + (data.emotion || '我的秘密') + '</span>' +
              '<span style="font-size: 12px; color: var(--ink-muted); margin-left: auto;">' + data.time + '</span>' +
            '</div>' +
            '<div style="font-size: 14px; color: var(--ink); line-height: 1.7; margin-bottom: 12px; padding: 12px; background: rgba(90,138,94,0.04); border-radius: 10px; flex-shrink: 0;">' + data.text + '</div>' +
            '<div style="font-size: 11px; color: var(--ink-muted); margin-bottom: 8px; flex-shrink: 0;">对话记录</div>' +
            (chatHtml || '<div class="chat-container" style="display: flex; align-items: center; justify-content: center; color: var(--ink-muted); font-size: 12px;">还没有对话，说点什么吧...</div>') +
            '<div style="padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.06); flex-shrink: 0;">' +
              '<textarea id="detail-reply-text" placeholder="继续对话..." maxlength="200" style="width: 100%; min-height: 50px; padding: 10px 12px; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; font-size: 14px; font-family: inherit; resize: none; background: rgba(255,255,255,0.6); outline: none; line-height: 1.6;"></textarea>' +
              '<div style="display: flex; justify-content: flex-end; margin-top: 8px;">' +
                '<button onclick="window.sendReply(' + index + ', \'' + type + '\')" style="padding: 8px 18px; border-radius: 10px; background: linear-gradient(135deg, #5A8A5E, #7AAF7E); color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit;">回复</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      document.getElementById('treehole-scene').appendChild(detailOverlay);
    };

    window.hideRecordDetail = function() {
      var el = document.getElementById('detail-overlay');
      if (el) el.remove();
    };

    window.sendReply = function(index, type) {
      var text = document.getElementById('detail-reply-text').value.trim();
      if (!text) return;

      var data = type === 'listened' ? viewedHistory[index] : mySecrets[index];
      if (!data.replies) data.replies = [];
      data.replies.push({ from: 'me', text: text, time: '刚刚' });

      // Simulate reply from other side with unread
      setTimeout(function() {
        data.replies.push({ from: 'other', text: '谢谢你愿意听我说，感觉好多了。', time: '刚刚' });
        if (!data.unreadCount) data.unreadCount = 0;
        data.unreadCount++;
        renderListenedList();
        renderSecretsList();
        updateTotalUnread();
        window.showRecordDetail(index, type);
      }, 1500);

      window.showRecordDetail(index, type);
    };

    function updateTotalUnread() {
      // Update tab badges
      var listenedUnread = 0;
      viewedHistory.forEach(function(h) { listenedUnread += (h.unreadCount || 0); });
      var secretsUnread = 0;
      mySecrets.forEach(function(s) { secretsUnread += (s.unreadCount || 0); });

      var listenedTab = document.getElementById('history-tab-listened');
      var secretsTab = document.getElementById('history-tab-secrets');

      // Remove old tab badges
      var oldListenedBadge = listenedTab.querySelector('.tab-unread-badge');
      if (oldListenedBadge) oldListenedBadge.remove();
      var oldSecretsBadge = secretsTab.querySelector('.tab-unread-badge');
      if (oldSecretsBadge) oldSecretsBadge.remove();

      if (listenedUnread > 0) {
        var lb = document.createElement('span');
        lb.className = 'tab-unread-badge';
        lb.textContent = '+' + listenedUnread;
        listenedTab.appendChild(lb);
      }
      if (secretsUnread > 0) {
        var sb = document.createElement('span');
        sb.className = 'tab-unread-badge';
        sb.textContent = '+' + secretsUnread;
        secretsTab.appendChild(sb);
      }

      // Update history icon badge
      var total = listenedUnread + secretsUnread;
      var badge = document.getElementById('history-badge');
      if (total > 0) {
        if (!badge) {
          badge = document.createElement('span');
          badge.id = 'history-badge';
          badge.className = 'icon-unread-badge';
          document.getElementById('history-btn').style.position = 'relative';
          document.getElementById('history-btn').appendChild(badge);
        }
        badge.textContent = '+' + (total > 99 ? '99' : total);
        badge.style.display = 'flex';
      } else if (badge) {
        badge.style.display = 'none';
      }
    }

    function switchHistoryTab(tab) {
      if (tab === 'listened') {
        document.getElementById('history-list').style.display = 'block';
        document.getElementById('secrets-list').style.display = 'none';
        document.getElementById('history-tab-listened').classList.add('active');
        document.getElementById('history-tab-secrets').classList.remove('active');
      } else {
        document.getElementById('history-list').style.display = 'none';
        document.getElementById('secrets-list').style.display = 'block';
        document.getElementById('history-tab-listened').classList.remove('active');
        document.getElementById('history-tab-secrets').classList.add('active');
      }
    }

    function hideHistory() {
      document.getElementById('history-overlay').classList.remove('show');
    }

    // ===== MUSIC =====
    var musicPlaying = false;
    var bgMusic = document.getElementById('bg-music');
    var musicBtn = document.getElementById('music-btn');

    function toggleMusic() {
      if (musicPlaying) {
        bgMusic.pause();
        musicPlaying = false;
        musicBtn.classList.remove('active');
        musicBtn.innerHTML = '&#127925;';
      } else {
        bgMusic.play().then(function() {
          musicPlaying = true;
          musicBtn.classList.add('active');
          musicBtn.innerHTML = '&#127926;';
        }).catch(function(e) {
          console.log('Music play failed:', e);
        });
      }
    }

    // Auto play music on first interaction
    function autoPlayMusic() {
      if (!musicPlaying) {
        bgMusic.volume = 0.3;
        toggleMusic();
      }
    }

    // ===== EVENTS =====
    document.getElementById('scene-back').addEventListener('click', function() {
      window.location.href = '/qingya/preview/index.html?tab=today';
    });

    document.getElementById('post-btn').addEventListener('click', showPost);
    document.getElementById('reveal-close').addEventListener('click', hideReveal);

    document.getElementById('reveal-hug').addEventListener('click', function() {
      hugCount++;
      document.getElementById('help-count').textContent = hugCount + comfortCount + messageCount;
      hideReveal();
    });

    document.getElementById('reveal-comfort').addEventListener('click', function() {
      comfortCount++;
      document.getElementById('help-count').textContent = hugCount + comfortCount + messageCount;
      hideReveal();
    });

    document.getElementById('reveal-message').addEventListener('click', toggleInlineMessage);

    document.getElementById('inline-message-textarea').addEventListener('input', function(e) {
      document.getElementById('inline-message-hint').textContent = e.target.value.length + '/200';
    });

    document.getElementById('inline-message-send').addEventListener('click', sendInlineMessage);

    document.getElementById('post-overlay').addEventListener('click', function(e) {
      if (e.target === this) hidePost();
    });

    document.getElementById('post-sheet-btn').addEventListener('click', function() {
      var text = document.getElementById('post-sheet-textarea').value.trim();
      if (!text) return;

      // Save to my secrets
      mySecrets.unshift({ text: text, time: '刚刚' });

      // Create throw animation emoji
      var icons = ['&#128220;', '&#128167;', '&#127807;', '&#127775;', '&#127769;', '&#128148;', '&#128562;', '&#128170;'];
      var randomIcon = icons[Math.floor(Math.random() * icons.length)];

      var throwEl = document.createElement('div');
      throwEl.className = 'throw-emoji';
      throwEl.innerHTML = randomIcon;
      throwEl.style.left = '50%';
      throwEl.style.top = '50%';
      throwEl.style.transform = 'translateX(-50%)';
      document.getElementById('treehole-scene').appendChild(throwEl);

      hidePost();

      // Remove throw element after animation
      setTimeout(function() { throwEl.remove(); }, 1500);

      // 青芽懂你回应
      setTimeout(function() {
        showTreeholeInsight(text);
      }, 1800);
    });

    // 树洞懂你回应系统
    function showTreeholeInsight(text) {
      var responds = [
        { pattern: /疼|痛|难受|不舒服|身体|肚子|腹胀/, text: '身体的不适，青芽都能感受到。但请相信，每一次不适都在为奇迹铺路。你的身体比你想象中更坚强，它正在全力以赴。' },
        { pattern: /老公|丈夫|伴侣|他|男朋友|男人/, text: '亲密关系中的不理解，是很多姐妹都会经历的。但请相信，他只是不知道怎么表达关心。试着告诉他你的需要，给他一个机会，让他学着成为你的后盾。' },
        { pattern: /婆婆|妈妈|家人|父母|亲戚/, text: '家人的关心有时候会变成压力，但出发点是爱。你不需要满足所有人的期待，只需要做对自己最好的选择。青芽支持你。' },
        { pattern: /失败|没成|又失败了|再一次|又一次/, text: '失败不是终点，只是路上的一个弯。很多姐妹在这个弯之后，遇到了更好的风景。你的坚持不会白费，青芽相信属于你的那一刻终会到来。' },
        { pattern: /钱|费用|贵|经济|花费|压力|负担/, text: '经济压力是很多姐妹都在面对的困难，你并不孤单。专注于当下能做的，一步一步来。这笔投入是为了一个珍贵的生命，它值得。' },
        { pattern: /孤单|孤独|没人理解|没人懂|一个人/, text: '你不是一个人。在青芽的树洞里，有很多和你走在同一段路上的姐妹。把你的感受说出来，你会发现：原来我不是唯一一个这样想的人。' },
        { pattern: /害怕|恐惧|担心|怕|焦虑|紧张/, text: '害怕是因为你在乎，这份在乎本身就是爱的力量。把害怕写下来，看着它，你会发现它没有想象中那么大。深呼吸，青芽陪着你。' },
        { pattern: /哭|眼泪|难过|伤心|委屈|想哭/, text: '想哭就哭吧，眼泪不是软弱，是身体在排毒。哭完了，记得抱抱自己。你已经很努力了，真的。' },
        { pattern: /坚强|坚持|加油|努力|不放弃/, text: '你的坚强让青芽深深敬佩。但请记住，坚强不等于不能脆弱。偶尔也需要被抱抱，也需要对自己说：我已经做得很好了。' }
      ];

      var matched = responds.find(function(r) { return r.pattern.test(text); });
      var respondText = matched ? matched.text : '青芽收到了你的心事。每一句倾诉都是对自己的温柔，每一次释放都是向前的力量。你不是一个人，树洞里的每一颗心，都和你一样在努力生长。';

      document.getElementById('respond-text').textContent = respondText;
      document.getElementById('respond-overlay').classList.add('show');
    }

    document.getElementById('respond-close').addEventListener('click', function() {
      document.getElementById('respond-overlay').classList.remove('show');
    });
    document.getElementById('respond-overlay').addEventListener('click', function(e) {
      if (e.target === this) document.getElementById('respond-overlay').classList.remove('show');
    });
    document.getElementById('respond-ok').addEventListener('click', function() {
      document.getElementById('respond-overlay').classList.remove('show');
    });
    document.getElementById('respond-again').addEventListener('click', function() {
      document.getElementById('respond-overlay').classList.remove('show');
      setTimeout(function() { showPost(); }, 300);
    });

    document.getElementById('history-btn').addEventListener('click', showHistory);
    document.getElementById('history-overlay').addEventListener('click', function(e) {
      if (e.target === this) hideHistory();
    });
    document.getElementById('history-close').addEventListener('click', hideHistory);
    document.getElementById('history-tab-listened').addEventListener('click', function() { switchHistoryTab('listened'); });
    document.getElementById('history-tab-secrets').addEventListener('click', function() { switchHistoryTab('secrets'); });

    document.getElementById('received-close').addEventListener('click', hideReceivedMessages);
    document.getElementById('received-overlay').addEventListener('click', function(e) {
      if (e.target === this) hideReceivedMessages();
    });

    // Click on encourage count to show received messages
    document.getElementById('encourage-count').addEventListener('click', showReceivedMessages);
    document.getElementById('encourage-count').style.cursor = 'pointer';

    document.getElementById('music-btn').addEventListener('click', toggleMusic);

    // Auto play on first click anywhere
    document.querySelector('.treehole-scene').addEventListener('click', function() {
      autoPlayMusic();
    }, { once: true });

    // Simulate online count fluctuation
    function updateOnlineCount() {
      var base = 1247;
      var fluctuation = Math.floor(Math.random() * 20) - 10;
      var count = base + fluctuation;
      document.getElementById('online-count').textContent = count.toLocaleString();
    }

    // ===== INIT =====
    generateFireflies();
    setInterval(updateOnlineCount, 5000);
    setInterval(spawnWhisper, 4000);
    spawnWhisper();
    spawnWhisper();
  </script>
</body>
</html>
