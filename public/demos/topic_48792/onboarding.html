<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>欢迎来到青芽</title>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F5F7F4;
      --ink: #3A4538;
      --ink-soft: #5A6A58;
      --ink-muted: #A8B8A4;
      --moss: #5A8A5E;
      --moss-light: rgba(90, 138, 94, 0.12);
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      background: #1a1a1a;
      border-radius: 50px;
      padding: 12px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative;
      flex-shrink: 0;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: var(--paper);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 34px;
      background: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 1000;
    }

    .phone-home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(0,0,0,0.2);
      border-radius: 3px;
      z-index: 1000;
    }

    .onboarding-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 32px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .onboarding-container::-webkit-scrollbar { display: none; }

    /* ===== Minimal Style ===== */

    /* Seed dot */
    .seed-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--moss);
      margin: 0 auto 40px;
      opacity: 0.6;
      animation: seedBreathe 3s ease-in-out infinite;
    }

    @keyframes seedBreathe {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.3); opacity: 0.9; }
    }

    .ob-title {
      font-family: 'LXGW WenKai TC', serif;
      font-size: 26px;
      color: var(--ink);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .ob-subtitle {
      font-size: 14px;
      color: var(--ink-muted);
      text-align: center;
      margin-bottom: 48px;
      letter-spacing: 0.5px;
    }

    /* Outline button */
    .btn-outline {
      display: block;
      width: fit-content;
      margin: 0 auto;
      padding: 12px 40px;
      border-radius: 100px;
      background: transparent;
      color: var(--ink-soft);
      font-size: 15px;
      font-family: inherit;
      border: 1px solid rgba(90,138,94,0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }

    .btn-outline:hover {
      background: var(--moss-light);
      color: var(--moss);
      border-color: var(--moss);
    }

    /* Primary button */
    .btn-primary {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #5A8A5E, #7AAF7E);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(90,138,94,0.3);
    }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      background: transparent;
      color: var(--ink-muted);
      font-size: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: rgba(0,0,0,0.02);
      color: var(--ink-soft);
    }

    /* Step dots */
    .step-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
    }

    .step-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(90,138,94,0.2);
      transition: all 0.3s ease;
    }

    .step-dot.active {
      background: var(--moss);
      width: 20px;
      border-radius: 3px;
    }

    /* Step content */
    .step-content {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .step-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stage selection */
    .stage-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .stage-option {
      background: var(--white);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 16px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 6px rgba(0,0,0,0.03);
    }

    .stage-option:hover {
      border-color: var(--moss);
      transform: translateY(-2px);
    }

    .stage-option.selected {
      border-color: var(--moss);
      background: var(--moss-light);
    }

    .stage-icon { font-size: 28px; margin-bottom: 6px; }
    .stage-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .stage-desc { font-size: 10px; color: var(--ink-muted); }

    /* Day input */
    .day-input-wrap {
      background: var(--white);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    .day-input {
      width: 80px;
      height: 52px;
      border: 2px solid var(--moss-light);
      border-radius: 12px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      color: var(--moss);
      font-family: inherit;
      outline: none;
      margin: 12px 0;
    }

    .day-input:focus { border-color: var(--moss); }

    .day-label {
      font-size: 13px;
      color: var(--ink-soft);
    }

    /* Seed input */
    .seed-input-wrap {
      text-align: center;
      margin-bottom: 32px;
    }

    .seed-input {
      width: 100%;
      padding: 16px;
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      font-size: 18px;
      font-family: 'LXGW WenKai TC', serif;
      text-align: center;
      outline: none;
      background: transparent;
      color: var(--ink);
      transition: border-color 0.3s ease;
    }

    .seed-input:focus {
      border-bottom-color: var(--moss);
    }

    .seed-input::placeholder {
      color: var(--ink-muted);
      font-family: 'LXGW WenKai TC', serif;
    }

    /* Guest entry */
    .guest-entry {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 12px;
      color: var(--ink-muted);
      cursor: pointer;
      z-index: 10;
      padding: 6px 14px;
      border-radius: 100px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.05);
      transition: all 0.2s ease;
    }

    .guest-entry:hover {
      color: var(--moss);
      background: var(--white);
    }

    /* Back button */
    .back-btn {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 20px;
      color: var(--ink-muted);
      cursor: pointer;
      z-index: 10;
      padding: 4px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.05);
      transition: all 0.2s ease;
    }

    .back-btn:hover { color: var(--moss); }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="phone-notch"></div>
      <div class="guest-entry" onclick="enterAsGuest()">免登录体验</div>

      <div class="onboarding-container" id="onboarding-container">
        <!-- Step 1: Welcome -->
        <div class="step-content active" id="step-1">
          <div class="seed-dot"></div>
          <h1 class="ob-title">种下一颗种子<br>陪TA慢慢长大</h1>
          <p class="ob-subtitle">青芽陪你，共赴征程</p>
          <button class="btn-outline" onclick="nextStep()">开启征程</button>
        </div>

        <!-- Step 2: Select Stage -->
        <div class="step-content" id="step-2">
          <div class="back-btn" onclick="prevStep()">&#10005;</div>
          <div class="step-dots">
            <div class="step-dot"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
          </div>
          <h1 class="ob-title" style="font-size:22px;margin-bottom:8px;">你目前处于哪个阶段？</h1>
          <p class="ob-subtitle" style="margin-bottom:28px;">选择当前阶段，我们会为你提供贴心的陪伴</p>
          <div class="stage-grid">
            <div class="stage-option" data-stage="pre" onclick="selectStage(this)">
              <div class="stage-icon">&#128203;</div>
              <div class="stage-name">准备期</div>
              <div class="stage-desc">建档/检查</div>
            </div>
            <div class="stage-option" data-stage="down" onclick="selectStage(this)">
              <div class="stage-icon">&#128137;</div>
              <div class="stage-name">降调期</div>
              <div class="stage-desc">调节激素</div>
            </div>
            <div class="stage-option" data-stage="stim" onclick="selectStage(this)">
              <div class="stage-icon">&#127807;</div>
              <div class="stage-name">促排期</div>
              <div class="stage-desc">卵泡发育</div>
            </div>
            <div class="stage-option" data-stage="trigger" onclick="selectStage(this)">
              <div class="stage-icon">&#9200;</div>
              <div class="stage-name">夜针期</div>
              <div class="stage-desc">准备取卵</div>
            </div>
            <div class="stage-option" data-stage="egg" onclick="selectStage(this)">
              <div class="stage-icon">&#129370;</div>
              <div class="stage-name">取卵期</div>
              <div class="stage-desc">手术当天</div>
            </div>
            <div class="stage-option" data-stage="fert" onclick="selectStage(this)">
              <div class="stage-icon">&#128300;</div>
              <div class="stage-name">受精期</div>
              <div class="stage-desc">胚胎培养</div>
            </div>
            <div class="stage-option" data-stage="transfer" onclick="selectStage(this)">
              <div class="stage-icon">&#127800;</div>
              <div class="stage-name">移植期</div>
              <div class="stage-desc">胚胎移植</div>
            </div>
            <div class="stage-option" data-stage="wait" onclick="selectStage(this)">
              <div class="stage-icon">&#129328;</div>
              <div class="stage-name">等待期</div>
              <div class="stage-desc">验孕等待</div>
            </div>
          </div>
          <button class="btn-primary" id="stage-next-btn" onclick="nextStep()" disabled>下一步</button>
        </div>

        <!-- Step 3: Day Input -->
        <div class="step-content" id="step-3">
          <div class="back-btn" onclick="prevStep()">&#10005;</div>
          <div class="step-dots">
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
          </div>
          <h1 class="ob-title" style="font-size:22px;margin-bottom:8px;">今天是第几天？</h1>
          <p class="ob-subtitle" style="margin-bottom:28px;">记录你的坚持，每一步都算数</p>
          <div class="day-input-wrap">
            <div class="day-label">当前阶段第</div>
            <input type="number" class="day-input" id="day-input" value="1" min="1" max="99">
            <div class="day-label">天</div>
          </div>
          <button class="btn-primary" onclick="nextStep()">下一步</button>
        </div>

        <!-- Step 4: Plant Seed -->
        <div class="step-content" id="step-4">
          <div class="back-btn" onclick="prevStep()">&#10005;</div>
          <div class="step-dots">
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot active"></div>
          </div>
          <div class="seed-dot" style="margin-bottom:32px;"></div>
          <h1 class="ob-title" style="font-size:22px;margin-bottom:8px;">种下一颗种子</h1>
          <p class="ob-subtitle" style="margin-bottom:32px;">给它取个名字，它会陪伴你度过这段旅程</p>
          <div class="seed-input-wrap">
            <input type="text" class="seed-input" id="seed-name" placeholder="例如：小希望" maxlength="10">
          </div>
          <button class="btn-primary" onclick="plantSeed()">种下种子</button>
        </div>
      </div>

      <div class="phone-home-bar"></div>
    </div>
  </div>

  <script>
    var currentStep = 1;
    var totalSteps = 4;
    var selectedStage = null;
    var selectedStageName = '';

    function nextStep() {
      if (currentStep < totalSteps) {
        document.getElementById('step-' + currentStep).classList.remove('active');
        currentStep++;
        document.getElementById('step-' + currentStep).classList.add('active');
      }
    }

    function prevStep() {
      if (currentStep > 1) {
        document.getElementById('step-' + currentStep).classList.remove('active');
        currentStep--;
        document.getElementById('step-' + currentStep).classList.add('active');
      }
    }

    function selectStage(el) {
      document.querySelectorAll('.stage-option').forEach(function(opt) {
        opt.classList.remove('selected');
      });
      el.classList.add('selected');
      selectedStage = el.dataset.stage;
      selectedStageName = el.querySelector('.stage-name').textContent;
      document.getElementById('stage-next-btn').disabled = false;
    }

    function plantSeed() {
      var seedName = document.getElementById('seed-name').value.trim() || '小希望';
      var day = document.getElementById('day-input').value || '1';
      localStorage.setItem('qingya_onboarded', 'true');
      localStorage.setItem('qingya_stage', selectedStage || 'stim');
      localStorage.setItem('qingya_stage_name', selectedStageName || '促排期');
      localStorage.setItem('qingya_stage_day', day);
      localStorage.setItem('qingya_seed_name', seedName);
      localStorage.setItem('qingya_join_date', new Date().toLocaleDateString('zh-CN', {month:'2-digit', day:'2-digit'}));
      localStorage.setItem('qingya_join_timestamp', Date.now());
      window.location.href = '/qingya/preview/index.html';
    }

    function enterAsGuest() {
      localStorage.setItem('qingya_onboarded', 'true');
      localStorage.setItem('qingya_guest', 'true');
      localStorage.setItem('qingya_stage', 'stim');
      localStorage.setItem('qingya_stage_name', '促排期');
      localStorage.setItem('qingya_stage_day', '5');
      localStorage.setItem('qingya_seed_name', '小芽');
      localStorage.setItem('qingya_join_date', new Date().toLocaleDateString('zh-CN', {month:'2-digit', day:'2-digit'}));
      localStorage.setItem('qingya_join_timestamp', Date.now());
      window.location.href = '/qingya/preview/index.html';
    }
  </script>
</body>
</html>
