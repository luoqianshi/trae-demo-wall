<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI时光影片 - 青芽</title>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #E5E5E5;
      color: #3A4538;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    :root {
      --paper: #F5F7F4;
      --ink: #3A4538;
      --ink-soft: #5A6A58;
      --ink-muted: #A8B8A4;
      --moss: #5A8A5E;
      --moss-light: rgba(90, 138, 94, 0.12);
      --white: #FFFFFF;
    }

    /* ===== PHONE SIMULATOR ===== */
    .phone-frame {
      width: 390px;
      height: 844px;
      background: #1a1a1a;
      border-radius: 50px;
      padding: 12px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative;
      flex-shrink: 0;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: var(--paper);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-notch {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 150px; height: 34px;
      background: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 1000;
    }

    .phone-home-bar {
      position: absolute;
      bottom: 8px; left: 50%;
      transform: translateX(-50%);
      width: 134px; height: 5px;
      background: rgba(0,0,0,0.3);
      border-radius: 3px;
      z-index: 1000;
    }

    /* ===== STEP 1: INTRO PAGE ===== */
    .v-intro {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      text-align: center;
    }

    .v-intro-icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .v-intro-title {
      font-family: 'LXGW WenKai TC', serif;
      font-size: 22px;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .v-intro-text {
      font-size: 14px;
      color: var(--ink-muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .v-intro-features {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
      width: 100%;
    }

    .v-intro-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--white);
      border-radius: 12px;
      font-size: 13px;
      color: var(--ink-soft);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .v-intro-feature .emoji {
      font-size: 20px;
    }

    .v-generate-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #5A8A5E, #7AAF7E);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(90,138,94,0.3);
    }

    .v-generate-hint {
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 10px;
    }

    /* ===== STEP 2: GENERATING ===== */
    .v-generating {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 28px;
      background: var(--paper);
    }

    .v-generating.show {
      display: flex;
    }

    .v-gen-animation {
      width: 100px;
      height: 100px;
      position: relative;
      margin-bottom: 28px;
    }

    .v-gen-ring {
      position: absolute;
      inset: 0;
      border: 3px solid rgba(90,138,94,0.15);
      border-top-color: var(--moss);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    .v-gen-ring:nth-child(2) {
      inset: 12px;
      border-color: rgba(90,138,94,0.1);
      border-bottom-color: #7AAF7E;
      animation-duration: 1.8s;
      animation-direction: reverse;
    }

    .v-gen-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .v-gen-title {
      font-family: 'LXGW WenKai TC', serif;
      font-size: 18px;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .v-gen-text {
      font-size: 13px;
      color: var(--ink-muted);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .v-gen-progress {
      width: 220px;
      height: 4px;
      background: rgba(90,138,94,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .v-gen-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5A8A5E, #8AB88E);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .v-gen-steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 220px;
    }

    .v-gen-step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--ink-muted);
      transition: color 0.3s ease;
    }

    .v-gen-step.active {
      color: var(--ink-soft);
    }

    .v-gen-step.done {
      color: var(--moss);
    }

    .v-gen-step-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      flex-shrink: 0;
    }

    .v-gen-step.done .v-gen-step-icon {
      background: var(--moss);
      border-color: var(--moss);
      color: #fff;
    }

    /* ===== STEP 3: PREVIEW ===== */
    .v-preview {
      display: none;
      flex-direction: column;
      flex: 1;
      background: var(--paper);
    }

    .v-preview.show {
      display: flex;
    }

    .v-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 50px 20px 12px;
    }

    .v-preview-title {
      font-family: 'LXGW WenKai TC', serif;
      font-size: 16px;
      color: var(--ink);
    }

    .v-preview-edit-btn {
      font-size: 13px;
      color: var(--moss);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    .v-preview-edit-btn:hover {
      background: var(--moss-light);
    }

    /* 16:9 video area */
    .v-preview-video {
      margin: 0 20px;
      aspect-ratio: 16 / 9;
      max-height: 220px;
      background: #000;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .v-preview-placeholder {
      text-align: center;
      padding: 20px;
    }

    .v-preview-placeholder .icon {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .v-preview-placeholder .title {
      font-family: 'LXGW WenKai TC', serif;
      font-size: 15px;
      color: #fff;
      margin-bottom: 4px;
    }

    .v-preview-placeholder .text {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }

    .v-preview-actions {
      padding: 20px;
    }

    .v-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
    }

    .v-btn-primary {
      background: linear-gradient(135deg, #5A8A5E, #7AAF7E);
      color: #fff;
    }

    .v-btn-secondary {
      background: var(--white);
      color: var(--ink-soft);
      border: 1px solid rgba(90,138,94,0.15);
    }

    .v-paywall-price {
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      color: var(--moss);
      margin-bottom: 4px;
    }

    .v-paywall-note {
      text-align: center;
      font-size: 11px;
      color: var(--ink-muted);
      margin-bottom: 16px;
    }

    /* ===== STEP 4: EDIT PANEL ===== */
    .v-edit {
      display: none;
      flex-direction: column;
      flex: 1;
      background: var(--paper);
    }

    .v-edit.show {
      display: flex;
    }

    .v-edit-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 50px 20px 12px;
    }

    .v-edit-back {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--white);
      border: none;
      color: var(--ink-soft);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .v-edit-title {
      font-family: 'LXGW WenKai TC', serif;
      font-size: 16px;
      color: var(--ink);
    }

    .v-edit-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 100px;
    }

    .v-edit-scroll::-webkit-scrollbar { display: none; }

    .v-section {
      margin-bottom: 20px;
    }

    .v-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .v-section-desc {
      font-size: 12px;
      color: var(--ink-muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .v-script-card {
      background: var(--white);
      border: 1px solid rgba(90,138,94,0.08);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    }

    .v-script-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .v-script-badge {
      font-size: 11px;
      padding: 2px 8px;
      background: var(--moss-light);
      color: var(--moss);
      border-radius: 100px;
    }

    .v-script-chapter {
      font-size: 12px;
      color: var(--ink-muted);
    }

    .v-script-textarea {
      width: 100%;
      background: var(--paper);
      border: 1px solid rgba(90,138,94,0.1);
      border-radius: 10px;
      padding: 10px;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.7;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 56px;
    }

    .v-script-textarea:focus {
      border-color: var(--moss);
    }

    .v-material-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .v-material-item {
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    }

    .v-material-item.selected {
      border-color: var(--moss);
    }

    .v-material-item .emoji {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .v-material-item .label {
      font-size: 10px;
      color: var(--ink-muted);
      text-align: center;
      line-height: 1.3;
    }

    .v-material-check {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--moss);
      color: #fff;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .v-material-item.selected .v-material-check {
      opacity: 1;
    }

    .v-music-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .v-music-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--white);
      border: 1px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    }

    .v-music-item.selected {
      border-color: var(--moss);
      background: var(--moss-light);
    }

    .v-music-cover {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, #5A8A5E, #3A6A3E);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .v-music-info {
      flex: 1;
    }

    .v-music-name {
      font-size: 13px;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .v-music-desc {
      font-size: 11px;
      color: var(--ink-muted);
    }

    .v-music-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--ink-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: transparent;
      transition: all 0.2s ease;
    }

    .v-music-item.selected .v-music-check {
      background: var(--moss);
      border-color: var(--moss);
      color: #fff;
    }

    .v-edit-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 20px 32px;
      background: linear-gradient(0deg, var(--paper) 0%, rgba(245,247,244,0.9) 60%, transparent 100%);
      z-index: 10;
    }

    .v-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(90,138,94,0.06);
    }

    .v-toggle-label {
      font-size: 13px;
      color: var(--ink-soft);
    }

    .v-toggle-switch {
      width: 44px;
      height: 24px;
      background: var(--ink-muted);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .v-toggle-switch.on {
      background: var(--moss);
    }

    .v-toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }

    .v-toggle-switch.on::after {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="phone-notch"></div>
      <div class="phone-home-bar"></div>

      <!-- STEP 1: INTRO -->
      <div class="v-intro" id="v-intro">
        <div style="position: absolute; top: 50px; left: 20px; z-index: 10;">
          <button class="v-edit-back" id="v-intro-back">&#8592;</button>
        </div>
        <div class="v-intro-icon">&#127909;</div>
        <div class="v-intro-title">AI时光影片</div>
        <div class="v-intro-text">让AI根据你的记录<br>生成一段专属的时光影片</div>
        <button class="v-generate-btn" id="v-start-generate">
          <span>&#127909;</span> 开始生成
        </button>
        <div class="v-generate-hint">预计需要 2-3 分钟</div>
      </div>

      <!-- STEP 2: GENERATING -->
      <div class="v-generating" id="v-generating">
        <div class="v-gen-animation">
          <div class="v-gen-ring"></div>
          <div class="v-gen-ring"></div>
          <div class="v-gen-icon">&#127909;</div>
        </div>
        <div class="v-gen-title">AI正在生成你的时光影片</div>
        <div class="v-gen-text" id="v-gen-text">正在分析你的记录素材...</div>
        <div class="v-gen-progress">
          <div class="v-gen-fill" id="v-gen-fill"></div>
        </div>
        <div class="v-gen-steps" id="v-gen-steps"></div>
      </div>

      <!-- STEP 3: PREVIEW -->
      <div class="v-preview" id="v-preview">
        <div class="v-preview-header">
          <button class="v-edit-back" id="v-preview-back">&#8592;</button>
          <div class="v-preview-title">影片预览</div>
          <button class="v-preview-edit-btn" id="v-preview-edit">&#9998; 编辑修改</button>
        </div>
        <div class="v-preview-video">
          <div class="v-preview-placeholder">
            <div class="icon">&#127909;</div>
            <div class="title">影片生成完成</div>
            <div class="text">AI已根据你的素材生成专属时光影片</div>
          </div>
        </div>
        <div class="v-preview-actions">
          <div class="v-paywall-price">&#165;9.9</div>
          <div class="v-paywall-note">保存高清视频到相册 &#183; 永久回顾</div>
          <button class="v-btn v-btn-primary" id="v-pay-download">&#128722; 解锁保存</button>
        </div>
      </div>

      <!-- STEP 4: EDIT -->
      <div class="v-edit" id="v-edit">
        <div class="v-edit-header">
          <button class="v-edit-back" id="v-edit-back">&#8592;</button>
          <div class="v-edit-title">编辑影片</div>
        </div>
        <div class="v-edit-scroll" id="v-edit-scroll">
          <div class="v-section">
            <div class="v-section-title">&#9997; AI串联脚本</div>
            <div class="v-section-desc">修改文字，AI会重新生成对应画面</div>
            <div id="v-edit-scripts"></div>
          </div>
          <div class="v-section">
            <div class="v-section-title">&#128230; 选择素材</div>
            <div class="v-section-desc">选择要加入影片的记录</div>
            <div class="v-material-grid" id="v-edit-materials"></div>
          </div>
          <div class="v-section">
            <div class="v-section-title">&#127925; 选择音乐</div>
            <div class="v-section-desc">为影片配上合适的背景音乐</div>
            <div class="v-music-list" id="v-edit-musics"></div>
          </div>
          <div class="v-section">
            <div class="v-section-title">&#9881; 高级选项</div>
            <div class="v-toggle">
              <span class="v-toggle-label">包含心情表情动画</span>
              <div class="v-toggle-switch on" id="toggle-emoji"></div>
            </div>
            <div class="v-toggle">
              <span class="v-toggle-label">显示日期水印</span>
              <div class="v-toggle-switch on" id="toggle-date"></div>
            </div>
            <div class="v-toggle">
              <span class="v-toggle-label">青芽成长动画结尾</span>
              <div class="v-toggle-switch on" id="toggle-sprout"></div>
            </div>
          </div>
        </div>
        <div class="v-edit-bar">
          <button class="v-generate-btn" id="v-regenerate">
            <span>&#127909;</span> 重新生成影片
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== DEMO DATA =====
    var demoRecords = [
      { id: 1, type: 'report', date: '2026-06-17', item: '激素检查', note: '促卵泡生成素FSH: 6.8 IU/L，促黄体生成素LH: 5.2 IU/L，医生说明天继续监测。', emoji: '📋', tags: ['促排第5天', '激素'] },
      { id: 2, type: 'mood', date: '2026-06-17', emotion: '平静', note: '今天去B超了，卵泡长得不错，心态好了很多。青芽也在慢慢长大呢。', emoji: '💭', tags: ['B超', '心情'] },
      { id: 3, type: 'med', date: '2026-06-17', name: '果纳芬', dose: '150IU', note: '今晚睡前注射，无明显不适。', emoji: '💉', tags: ['果纳芬', '促排'] },
      { id: 4, type: 'test', date: '2026-06-15', result: 'faint', note: '移植后第7天，意念灰，心里有点忐忑。但医生说还有希望，继续等待。', emoji: '🧪', tags: ['移植后第7天', '验孕'] },
      { id: 5, type: 'report', date: '2026-06-14', item: 'B超卵泡监测', note: '左侧卵巢卵泡最大18mm，右侧16mm，内膜厚度9mm，医生说快成熟了。', emoji: '📋', tags: ['卵泡监测'] },
      { id: 6, type: 'med', date: '2026-06-14', name: '黄体酮', dose: '2粒', note: '口服，有点头晕，但还能接受。为了宝宝，一切都值得。', emoji: '💉', tags: ['黄体酮'] },
      { id: 7, type: 'mood', date: '2026-06-13', emotion: '焦虑', note: '等待的日子好难熬，每天都在数日子。希望一切顺利。', emoji: '💭', tags: ['等待', '心情'] },
      { id: 8, type: 'report', date: '2026-06-12', item: '血常规', note: '白细胞正常，血红蛋白略低，医生让多吃红肉。', emoji: '📋', tags: ['血常规'] }
    ];

    var selectedMaterials = new Set([1, 2, 3, 4, 5, 6]);
    var selectedMusic = 'warm';
    var generatedScripts = [];

    // ===== AI SCRIPT GENERATION - BY STAGE =====
    function generateScript(records) {
      var sorted = records.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
      var scripts = [];
      var startDate = sorted.length > 0 ? sorted[0].date : '2026年6月';
      var startMonth = startDate.slice(0, 7).replace('-', '年') + '月';

      // Opening
      scripts.push({
        chapter: '开篇',
        chapterTitle: '启程',
        text: startMonth + '，你在这里种下一颗种子。\n从决定成为妈妈的那一刻起，\n你就已经是最勇敢的人。'
      });

      // Group records by stage based on tags and content
      var stages = [];
      var stageNames = {
        '促排': { title: '促排期间', icon: '🌱', desc: '卵泡在悄悄长大' },
        '取卵': { title: '取卵时刻', icon: '🥚', desc: '期待与忐忑交织' },
        '移植': { title: '移植之后', icon: '🌿', desc: '等待是最温柔的坚持' },
        '验孕': { title: '验孕之日', icon: '💫', desc: '心跳加速的时刻' }
      };

      // Detect stages from records
      var stageRecords = {};
      sorted.forEach(function(r) {
        var stage = '其他';
        var tags = r.tags || [];
        if (tags.some(function(t) { return t.indexOf('促排') !== -1 || t.indexOf('果纳芬') !== -1 || t.indexOf('卵泡') !== -1; })) {
          stage = '促排';
        } else if (tags.some(function(t) { return t.indexOf('取卵') !== -1; })) {
          stage = '取卵';
        } else if (tags.some(function(t) { return t.indexOf('移植') !== -1 || t.indexOf('黄体酮') !== -1; })) {
          stage = '移植';
        } else if (r.type === 'test' || tags.some(function(t) { return t.indexOf('验孕') !== -1; })) {
          stage = '验孕';
        }
        
        if (!stageRecords[stage]) stageRecords[stage] = [];
        stageRecords[stage].push(r);
      });

      // Generate stage chapters
      var stageOrder = ['促排', '取卵', '移植', '验孕'];
      var chapterIndex = 1;
      
      stageOrder.forEach(function(stageKey) {
        var recs = stageRecords[stageKey];
        if (!recs || recs.length === 0) return;
        
        var stageInfo = stageNames[stageKey] || { title: stageKey, icon: '📝', desc: '' };
        
        // Find representative records for this stage
        var moodRec = recs.find(function(r) { return r.type === 'mood'; });
        var reportRec = recs.find(function(r) { return r.type === 'report'; });
        var medRec = recs.find(function(r) { return r.type === 'med'; });
        var testRec = recs.find(function(r) { return r.type === 'test'; });
        
        // Build stage narrative
        var stageText = '';
        var dateRange = '';
        if (recs.length > 0) {
          var firstDate = recs[0].date;
          var lastDate = recs[recs.length - 1].date;
          dateRange = firstDate === lastDate ? firstDate : firstDate + ' ~ ' + lastDate;
        }
        
        // Stage header
        stageText += stageInfo.icon + ' ' + stageInfo.title + '\n';
        if (stageInfo.desc) stageText += stageInfo.desc + '\n\n';
        
        // Include key moments from this stage
        if (moodRec) {
          stageText += '那天你的心情是' + (moodRec.emotion || '复杂的') + '：\n' + (moodRec.note || '') + '\n\n';
        }
        if (reportRec) {
          stageText += (reportRec.item || '检查') + '：\n' + (reportRec.note || '') + '\n\n';
        }
        if (medRec) {
          stageText += '用药：' + (medRec.name || '') + ' ' + (medRec.dose || '') + '\n' + (medRec.note || '') + '\n\n';
        }
        if (testRec) {
          stageText += '验孕结果：' + (testRec.result === 'positive' ? '阳性' : testRec.result === 'faint' ? '意念灰' : '阴性') + '\n' + (testRec.note || '') + '\n\n';
        }
        
        scripts.push({
          chapter: '第' + chapterIndex + '章',
          chapterTitle: stageInfo.title,
          text: stageText.trim(),
          stage: stageKey
        });
        
        chapterIndex++;
      });

      // Ending - blessing
      var totalDays = sorted.length > 0 ? Math.ceil((new Date(sorted[sorted.length - 1].date) - new Date(sorted[0].date)) / (1000 * 60 * 60 * 24)) : 0;
      scripts.push({
        chapter: '结尾',
        chapterTitle: '祝福',
        text: '这' + (totalDays || 127) + '天里，你经历了促排、取卵、移植...\n每一个阶段，你都走得那么坚定。\n\n你比自己想象的更勇敢。\n愿你的青芽，早日长成参天大树。\n\n青芽陪你，共赴征程。'
      });

      return scripts;
    }

    // ===== RENDER EDIT PANEL =====
    function renderEditScripts() {
      var container = document.getElementById('v-edit-scripts');
      container.innerHTML = '';
      generatedScripts.forEach(function(s, i) {
        var card = document.createElement('div');
        card.className = 'v-script-card';
        card.innerHTML =
          '<div class="v-script-header">' +
            '<span class="v-script-badge">' + s.chapter + '</span>' +
            '<span class="v-script-chapter">' + s.chapterTitle + '</span>' +
          '</div>' +
          '<textarea class="v-script-textarea" data-index="' + i + '">' + s.text + '</textarea>';
        container.appendChild(card);
      });
    }

    function renderEditMaterials() {
      var container = document.getElementById('v-edit-materials');
      container.innerHTML = '';
      demoRecords.forEach(function(r) {
        var item = document.createElement('div');
        item.className = 'v-material-item' + (selectedMaterials.has(r.id) ? ' selected' : '');
        item.dataset.id = r.id;
        item.innerHTML =
          '<span class="emoji">' + r.emoji + '</span>' +
          '<span class="label">' + (r.date ? r.date.slice(5) + ' ' : '') + (r.type === 'report' ? r.item : r.type === 'mood' ? r.emotion : r.type === 'med' ? r.name : r.type === 'test' ? '验孕' : '日记') + '</span>' +
          '<span class="v-material-check">&#10003;</span>';
        item.addEventListener('click', function() {
          var id = parseInt(this.dataset.id);
          if (selectedMaterials.has(id)) {
            if (selectedMaterials.size > 1) {
              selectedMaterials.delete(id);
              this.classList.remove('selected');
            }
          } else {
            selectedMaterials.add(id);
            this.classList.add('selected');
          }
        });
        container.appendChild(item);
      });
    }

    var musicList = [
      { id: 'warm', name: '温暖陪伴', desc: '轻柔钢琴，温暖治愈', emoji: '🎹' },
      { id: 'hope', name: '希望之光', desc: '弦乐渐强，充满希望', emoji: '🎻' },
      { id: 'gentle', name: '温柔时光', desc: '吉他轻弹，岁月静好', emoji: '🎸' },
      { id: 'dream', name: '梦境花园', desc: '空灵氛围，如梦似幻', emoji: '🌙' }
    ];

    function renderEditMusic() {
      var container = document.getElementById('v-edit-musics');
      container.innerHTML = '';
      musicList.forEach(function(m) {
        var item = document.createElement('div');
        item.className = 'v-music-item' + (selectedMusic === m.id ? ' selected' : '');
        item.dataset.id = m.id;
        item.innerHTML =
          '<div class="v-music-cover">' + m.emoji + '</div>' +
          '<div class="v-music-info">' +
            '<div class="v-music-name">' + m.name + '</div>' +
            '<div class="v-music-desc">' + m.desc + '</div>' +
          '</div>' +
          '<div class="v-music-check">&#10003;</div>';
        item.addEventListener('click', function() {
          selectedMusic = this.dataset.id;
          renderEditMusic();
        });
        container.appendChild(item);
      });
    }

    // ===== GENERATE FLOW =====
    function startGenerating() {
      document.getElementById('v-intro').style.display = 'none';
      document.getElementById('v-generating').classList.add('show');

      // Generate scripts
      var selectedRecords = demoRecords.filter(function(r) { return selectedMaterials.has(r.id); });
      generatedScripts = generateScript(selectedRecords);

      var steps = [
        { text: '分析素材内容', time: 15 },
        { text: '生成AI叙事脚本', time: 30 },
        { text: '匹配画面与音乐', time: 50 },
        { text: '渲染视频片段', time: 75 },
        { text: '合成最终影片', time: 95 }
      ];

      var stepsContainer = document.getElementById('v-gen-steps');
      stepsContainer.innerHTML = '';
      steps.forEach(function(step, i) {
        var div = document.createElement('div');
        div.className = 'v-gen-step';
        div.id = 'gen-step-' + i;
        div.innerHTML = '<span class="v-gen-step-icon"></span><span>' + step.text + '</span>';
        stepsContainer.appendChild(div);
      });

      var progress = 0;
      var currentStep = 0;

      var interval = setInterval(function() {
        progress += Math.random() * 4 + 1;
        if (progress > 100) progress = 100;
        document.getElementById('v-gen-fill').style.width = progress + '%';

        for (var i = 0; i < steps.length; i++) {
          var stepEl = document.getElementById('gen-step-' + i);
          if (progress >= steps[i].time) {
            stepEl.classList.add('done');
            stepEl.querySelector('.v-gen-step-icon').textContent = '✓';
          } else if (progress >= steps[i].time - 10 && currentStep === i) {
            stepEl.classList.add('active');
            stepEl.querySelector('.v-gen-step-icon').textContent = '●';
            document.getElementById('v-gen-text').textContent = '正在' + steps[i].text + '...';
            currentStep++;
          }
        }

        if (progress >= 100) {
          clearInterval(interval);
          setTimeout(function() {
            showPreview();
          }, 800);
        }
      }, 200);
    }

    function showPreview() {
      document.getElementById('v-generating').classList.remove('show');
      document.getElementById('v-preview').classList.add('show');
    }

    function showEdit() {
      document.getElementById('v-preview').classList.remove('show');
      document.getElementById('v-edit').classList.add('show');
      renderEditScripts();
      renderEditMaterials();
      renderEditMusic();
    }

    function backToPreview() {
      document.getElementById('v-edit').classList.remove('show');
      document.getElementById('v-preview').classList.add('show');
    }

    // ===== EVENTS =====
    document.getElementById('v-start-generate').addEventListener('click', startGenerating);

    document.getElementById('v-intro-back').addEventListener('click', function() {
      window.location.href = 'index.html?tab=record';
    });

    document.getElementById('v-preview-edit').addEventListener('click', showEdit);

    document.getElementById('v-preview-back').addEventListener('click', function() {
      document.getElementById('v-preview').classList.remove('show');
      document.getElementById('v-intro').style.display = 'flex';
    });

    document.getElementById('v-edit-back').addEventListener('click', backToPreview);

    document.getElementById('v-regenerate').addEventListener('click', function() {
      document.getElementById('v-edit').classList.remove('show');
      document.getElementById('v-generating').classList.add('show');
      document.getElementById('v-gen-fill').style.width = '0%';
      startGenerating();
    });

    document.getElementById('v-pay-download').addEventListener('click', function() {
      alert('支付演示：解锁成功！视频已保存到相册。');
    });

    document.querySelectorAll('.v-toggle-switch').forEach(function(toggle) {
      toggle.addEventListener('click', function() {
        this.classList.toggle('on');
      });
    });
  </script>
</body>
</html>
