    <title>她·破墙 | 无限可能</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 50%, #9b59b6 100%);
            overflow: hidden;
            color: #fff;
            perspective: 1000px;
        }

        /* ===== 全局样式 ===== */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(30px) scale(0.95);
        }
        .page.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        /* ===== 主菜单 ===== */
        #menuPage {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10000;
        }
        
        /* 主菜单背景装饰 */
        .menu-bg-decor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .menu-decor-item {
            position: absolute;
            opacity: 0.1;
            animation: menuDecorFloat 15s ease-in-out infinite;
        }
        
        .menu-decor-item:nth-child(1) {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #fff, transparent);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        
        .menu-decor-item:nth-child(2) {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #f093fb, transparent);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
            animation-delay: 3s;
        }
        
        .menu-decor-item:nth-child(3) {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea, transparent);
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            top: 20%;
            right: 10%;
            animation-delay: 6s;
        }
        
        .menu-decor-item:nth-child(4) {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #764ba2, transparent);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            bottom: 25%;
            left: 8%;
            animation-delay: 9s;
        }
        
        .menu-decor-item:nth-child(5) {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #a8edea, transparent);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 12s;
        }
        
        @keyframes menuDecorFloat {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-30px) rotate(15deg) scale(1.1); }
            50% { transform: translateY(-15px) rotate(-10deg) scale(0.9); }
            75% { transform: translateY(-45px) rotate(20deg) scale(1.05); }
        }
        .menu-title {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleFloat 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }
        .menu-subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 4rem;
            letter-spacing: 0.2em;
        }
        .btn-start {
            padding: 1.2rem 4.5rem;
            font-size: 1.4rem;
            letter-spacing: 0.3em;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border-radius: 50px;
        }
        .btn-start::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }
        .btn-start:hover {
            border-color: #fff;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.4);
            transform: translateY(-5px) scale(1.05);
        }
        .btn-start:hover::before {
            left: 100%;
        }
        .menu-stats {
            position: absolute;
            bottom: 3rem;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.1);
            padding: 0.8rem 2rem;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        /* ===== 游戏场景 - 纪念碑谷风格 ===== */
        #gamePage {
            background: linear-gradient(180deg, 
                #1a1a2e 0%, 
                #2d3a4a 20%, 
                #3d4a5a 40%, 
                #4a5a6a 60%, 
                #5a6a7a 80%, 
                #6a7a8a 100%
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 纪念碑谷风格背景 */
        .monument-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(102, 126, 234, 0.4) 0%, rgba(118, 75, 162, 0.4) 50%, rgba(240, 147, 251, 0.3) 100%),
                radial-gradient(circle at 30% 40%, rgba(240, 147, 251, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(102, 126, 234, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(118, 75, 162, 0.2) 0%, transparent 40%);
            z-index: 0;
            animation: bgShift 20s ease-in-out infinite;
        }
        
        /* 几何建筑背景 */
        .geometry-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            perspective: 1000px;
            transform-style: preserve-3d;
        }
        
        .geo-shape {
            position: absolute;
            opacity: 0.15;
            animation: geoFloat 8s ease-in-out infinite;
            transform-style: preserve-3d;
        }
        
        .geo-shape:nth-child(1) {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
            --rx: 20deg;
            --ry: 10deg;
            transform: rotateX(20deg) rotateY(10deg);
        }
        
        .geo-shape:nth-child(2) {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            top: 60%;
            right: 15%;
            animation-delay: 2s;
            --rx: -15deg;
            --ry: 25deg;
            transform: rotateX(-15deg) rotateY(25deg);
        }
        
        .geo-shape:nth-child(3) {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            top: 20%;
            right: 20%;
            animation-delay: 4s;
            --rx: 10deg;
            --ry: -20deg;
            transform: rotateX(10deg) rotateY(-20deg);
        }
        
        .geo-shape:nth-child(4) {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            bottom: 15%;
            left: 20%;
            animation-delay: 1s;
            --rx: -10deg;
            --ry: 15deg;
            transform: rotateX(-10deg) rotateY(15deg);
        }
        
        .geo-shape:nth-child(5) {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            top: 35%;
            right: 8%;
            animation-delay: 3s;
            --rx: 25deg;
            --ry: -10deg;
            transform: rotateX(25deg) rotateY(-10deg);
        }
        
        .geo-shape:nth-child(6) {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            bottom: 25%;
            right: 25%;
            animation-delay: 5s;
            --rx: -20deg;
            --ry: 30deg;
            transform: rotateX(-20deg) rotateY(30deg);
        }

        .game-header {
            position: absolute;
            top: 2rem;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 3rem;
            z-index: 100;
        }
        .level-indicator {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.2em;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .progress-bar {
            width: 200px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            width: 0%;
            transition: width 0.5s ease;
            background-size: 200% 100%;
            animation: progressGradient 3s linear infinite;
        }
        .btn-hint {
            padding: 0.6rem 1.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .btn-hint:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: scale(1.05);
        }

        /* ===== 墙体系统 - 3D空间感 ===== */
        .wall-container {
            position: relative;
            width: 500px;
            height: 600px;
            perspective: 1200px;
            z-index: 50;
            transform-style: preserve-3d;
        }
        .wall {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                #5a6a7a 0%, 
                #4a5a6a 15%, 
                #5a6a7a 30%, 
                #4a5a6a 45%, 
                #5a6a7a 60%, 
                #4a5a6a 75%, 
                #5a6a7a 90%, 
                #3a4a5a 100%
            );
            border: 12px solid #2a3a4a;
            border-radius: 12px;
            box-shadow: 
                inset 0 0 100px rgba(0, 0, 0, 0.7),
                inset 0 0 50px rgba(102, 126, 234, 0.1),
                0 40px 100px rgba(0, 0, 0, 0.6),
                0 0 150px rgba(102, 126, 234, 0.3),
                0 0 200px rgba(118, 75, 162, 0.2);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            transform: rotateY(0deg) rotateX(0deg);
        }
        .wall::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05), transparent);
            border-radius: 12px 12px 0 0;
        }
        .wall::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3), transparent);
            border-radius: 0 0 12px 12px;
        }
        .wall.cracking {
            animation: wallShake 0.4s ease;
        }
        .wall.broken {
            transform: rotateX(45deg) rotateZ(15deg) scale(0.8) translateY(100px);
            opacity: 0;
            filter: blur(20px);
        }
        
        /* 墙体纹理 */
        .wall-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
            opacity: 0.3;
            pointer-events: none;
        }
        
        .wall-issue {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        .issue-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            animation: iconFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
        }
        .issue-title {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .issue-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.1em;
            max-width: 320px;
            line-height: 1.8;
        }

        /* ===== 裂痕系统 - 3D效果 ===== */
        .cracks-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            transform-style: preserve-3d;
        }
        .crack {
            position: absolute;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(102, 126, 234, 0.8) 50%, 
                transparent 100%
            );
            border-radius: 3px;
            transform-origin: left center;
            animation: crackGrow 0.8s ease forwards;
            box-shadow: 
                0 0 15px rgba(102, 126, 234, 0.8),
                0 0 30px rgba(118, 75, 162, 0.5);
        }
        .crack::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(240, 147, 251, 0.6) 50%, 
                transparent 100%
            );
            border-radius: 3px;
            filter: blur(3px);
        }
        .crack-branch {
            height: 3px !important;
            opacity: 0.8;
        }

        /* ===== 粒子系统 ===== */
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
        }
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: particleFloat 5s ease-in-out infinite;
            box-shadow: 
                0 0 10px currentColor,
                0 0 20px currentColor,
                0 0 30px currentColor;
        }
        .particle.pink {
            background: rgba(240, 147, 251, 0.9);
            color: rgba(240, 147, 251, 0.9);
        }
        .particle.purple {
            background: rgba(118, 75, 162, 0.9);
            color: rgba(118, 75, 162, 0.9);
        }
        .particle.blue {
            background: rgba(102, 126, 234, 0.9);
            color: rgba(102, 126, 234, 0.9);
        }
        .particle.gold {
            background: rgba(255, 215, 0, 0.9);
            color: rgba(255, 215, 0, 0.9);
        }

        /* ===== 挑战区域 ===== */
        .challenge-area {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            z-index: 50;
        }
        .challenge-btn {
            width: 100%;
            padding: 1.8rem;
            font-size: 1.3rem;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.2));
            border: 2px solid rgba(240, 147, 251, 0.5);
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        .challenge-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.4), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s ease;
        }
        .challenge-btn:hover {
            border-color: #f093fb;
            box-shadow: 0 0 60px rgba(240, 147, 251, 0.6);
            transform: scale(1.05) translateY(-3px);
        }
        .challenge-btn:hover::before {
            transform: translateX(0);
        }
        .challenge-btn:active {
            transform: scale(0.98);
        }

        /* ===== 挑战小游戏容器 ===== */
        .game-challenge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            padding: 2.5rem;
            background: rgba(26, 26, 46, 0.95);
            border: 2px solid rgba(240, 147, 251, 0.4);
            border-radius: 20px;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s ease;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 80px rgba(240, 147, 251, 0.3);
        }
        .game-challenge.active {
            opacity: 1;
            visibility: visible;
        }
        .challenge-title {
            font-size: 1.5rem;
            color: #f093fb;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 0.2em;
        }

        /* ===== 数学挑战 ===== */
        .math-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 1rem;
        }
        .math-btn {
            padding: 2rem;
            font-size: 1.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 15px;
        }
        .math-btn:hover {
            background: rgba(240, 147, 251, 0.2);
            border-color: rgba(240, 147, 251, 0.5);
            transform: scale(1.05);
        }
        .math-btn.correct {
            background: rgba(76, 175, 80, 0.4);
            border-color: #4caf50;
            color: #4caf50;
            animation: correctPulse 0.5s ease;
        }
        .math-btn.wrong {
            background: rgba(244, 67, 54, 0.4);
            border-color: #f44336;
            color: #f44336;
            animation: wrongShake 0.5s ease;
        }
        /* ===== 数独挑战 ===== */
        .sudoku-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .sudoku-grid {
            display: grid;
            gap: 2px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }
        .sudoku-cell {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
        }
        .sudoku-cell:hover {
            background: rgba(240, 147, 251, 0.2);
            border-color: rgba(240, 147, 251, 0.5);
        }
        .sudoku-cell.selected {
            background: rgba(102, 126, 234, 0.4);
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
        }
        .sudoku-cell.given {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            cursor: default;
        }
        .sudoku-cell.correct {
            background: rgba(46, 213, 115, 0.3);
            border-color: #2ed573;
            animation: correctPulse 0.5s ease;
        }
        .sudoku-cell.wrong {
            background: rgba(255, 71, 87, 0.3);
            border-color: #ff4757;
            animation: wrongShake 0.5s ease;
        }
        .sudoku-message {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
        }
        .number-picker {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid rgba(240, 147, 251, 0.5);
            z-index: 100;
        }
        .number-btn {
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .number-btn:hover {
            background: rgba(240, 147, 251, 0.3);
            border-color: #f093fb;
            transform: scale(1.1);
        }

        /* ===== 记忆挑战 ===== */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 1rem;

        .pipe {
            width: 40px;
            height: 40px;
            position: relative;
            transition: transform 0.3s ease;
        }
        .pipe::before, .pipe::after {
            content: '';
            position: absolute;
            background: #667eea;
            border-radius: 5px;
        }
        .pipe.straight::before {
            width: 8px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }
        .pipe.corner::before {
            width: 8px;
            height: 50%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }
        .pipe.corner::after {
            width: 50%;
            height: 8px;
            left: 50%;
            top: 50%;
            border-radius: 0 5px 5px 0;
        }
        .pipe.tee::before {
            width: 8px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }
        .pipe.tee::after {
            width: 50%;
            height: 8px;
            left: 50%;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 0 5px 5px 0;
        }
        .pipe.cross::before {
            width: 8px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }
        .pipe.cross::after {
            width: 100%;
            height: 8px;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        .pipe.start-pipe::before,
        .pipe.start-pipe::after,

                osc.start();

            function playInstrument(freq, type, volume, duration, startTime, detune = 0) {
                const osc = audioCtx.createOscillator();
                osc.type = type;
                osc.frequency.value = freq;
                if (detune !== 0) osc.detune.value = detune;
                
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(0, startTime);

                g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

                g.connect(bgmGain);
                osc.start(startTime);
                osc.stop(startTime + duration);
            }
            
            function playPercussion(volume, startTime) {
                const osc = audioCtx.createOscillator();
                osc.type = 'square';
                osc.frequency.value = 100;
                
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(volume, startTime);
                g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.1);
                
                osc.connect(g);
                g.connect(bgmGain);

            function playBar() {
                if (!isBgmPlaying) return;
                
                const now = audioCtx.currentTime;
                const currentSection = sections[sectionName];

                const chord = currentSection[beatCount % currentSection.length];

        function initSudokuChallenge() {
            // 创建一个简单的4x4数独（2x2子网格）
            const size = 4;
            const subgridSize = 2;
            
            // 生成完整的数独解
            const solution = generateSudokuSolution(size, subgridSize);
            
            // 移除一些数字创建谜题
            const puzzle = removeNumbers(solution, size, 6); // 移除6个数字
            
            const html = `
                <div class="sudoku-container">
                    <div class="sudoku-grid" id="sudokuGrid"></div>
                    <div class="sudoku-message">填入1-4的数字，每行、每列、每个2x2方格不能重复</div>
                </div>
            `;
            challengeContent.innerHTML = html;
            
            const sudokuGrid = document.getElementById('sudokuGrid');
            sudokuGrid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            // 渲染数独网格
            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.className = 'sudoku-cell';
                
                const row = Math.floor(i / size);
                const col = i % size;
                
                // 添加子网格边框

                    cell.style.borderLeft = '2px solid #fff';
                }
                if (row % subgridSize === 0 && row !== 0) {
                    cell.style.borderTop = '2px solid #fff';
                }
                
                if (puzzle[i] !== 0) {
                    cell.textContent = puzzle[i];
                    cell.classList.add('given');
                } else {
                    cell.dataset.index = i;
                    cell.addEventListener('click', () => handleSudokuCell(cell, solution[i]));
                }
                
                sudokuGrid.appendChild(cell);
            }
        }
        
        function generateSudokuSolution(size, subgridSize) {
            const grid = new Array(size * size).fill(0);
            solveSudoku(grid, size, subgridSize);
            return grid;
        }
        
        function solveSudoku(grid, size, subgridSize, index = 0) {
            if (index >= size * size) return true;
            
            if (grid[index] !== 0) {
                return solveSudoku(grid, size, subgridSize, index + 1);
            }
            
            const numbers = shuffleArray([1, 2, 3, 4]);
            const row = Math.floor(index / size);
            const col = index % size;
            
            for (const num of numbers) {
                if (isValidSudokuMove(grid, size, subgridSize, row, col, num)) {
                    grid[index] = num;
                    if (solveSudoku(grid, size, subgridSize, index + 1)) {
                        return true;
                    }
                    grid[index] = 0;
                }
            }
            
            return false;
        }
        
        function isValidSudokuMove(grid, size, subgridSize, row, col, num) {
            // 检查行
            for (let c = 0; c < size; c++) {
                if (grid[row * size + c] === num) return false;
            }
            
            // 检查列
            for (let r = 0; r < size; r++) {
                if (grid[r * size + col] === num) return false;
            }
            
            // 检查子网格
            const subgridRow = Math.floor(row / subgridSize) * subgridSize;
            const subgridCol = Math.floor(col / subgridSize) * subgridSize;
            for (let r = subgridRow; r < subgridRow + subgridSize; r++) {
                for (let c = subgridCol; c < subgridCol + subgridSize; c++) {
                    if (grid[r * size + c] === num) return false;
                }
            }
            
            return true;
        }
        
        function removeNumbers(solution, size, count) {
            const puzzle = [...solution];
            const indices = shuffleArray([...Array(size * size).keys()]);
            
            for (let i = 0; i < count && i < indices.length; i++) {
                puzzle[indices[i]] = 0;
            }
            
            return puzzle;
        }
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        let currentSudokuCell = null;
        let sudokuFilled = 0;
        let sudokuTotalEmpty = 6;
        
        function handleSudokuCell(cell, correctValue) {

        // ===== 消除游戏 =====
        function initPuzzleChallenge() {
            // 三消游戏 - 4x4网格
            const size = 4;
            const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a855f7'];
            
            // 生成游戏网格
            let grid = [];
            for (let i = 0; i < size; i++) {
                grid[i] = [];
                for (let j = 0; j < size; j++) {
                    grid[i][j] = colors[Math.floor(Math.random() * colors.length)];
                }
            }
            
            // 确保初始没有匹配
            while (findMatches(grid, size).length > 0) {
                for (let i = 0; i < size; i++) {
                    for (let j = 0; j < size; j++) {
                        grid[i][j] = colors[Math.floor(Math.random() * colors.length)];
                    }
                }
            }
            
            const html = `
                <div class="match3-container">
                    <div class="match3-grid" id="match3Grid"></div>
                    <div class="match3-message">点击相邻的两个方块交换位置，消除3个或更多相同颜色</div>
                    <div class="match3-controls">
                        <button class="match3-btn" id="match3Reset">🔄 重置</button>
                    </div>

            `;

            document.getElementById('match3Reset').addEventListener('click', () => {

        let match3Grid = [];
        let match3Selected = null;
        
        function renderMatch3(grid, size) {
            match3Grid = grid;
            const board = document.getElementById('match3Grid');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'match3-cell';
                    cell.style.background = grid[i][j];

        function handleMatch3Click(row, col, size) {
            playClick();
            
            if (!match3Selected) {
                match3Selected = { row, col };
                highlightCell(row, col, true);
            } else {
                const { row: prevRow, col: prevCol } = match3Selected;
                
                // 检查是否相邻
                const isAdjacent = (Math.abs(row - prevRow) === 1 && col === prevCol) ||
                                  (Math.abs(col - prevCol) === 1 && row === prevRow);
                
                if (isAdjacent) {
                    // 交换位置
                    swapCells(prevRow, prevCol, row, col);
                    
                    // 检查是否有匹配
                    const matches = findMatches(match3Grid, size);
                    
                    if (matches.length > 0) {
                        // 有匹配，消除并填充
                        removeMatches(matches, size);
                    } else {
                        // 无匹配，换回来
                        swapCells(prevRow, prevCol, row, col);
                        wall.classList.add('cracking');
                        setTimeout(() => wall.classList.remove('cracking'), 400);
                    }
                } else {
                    // 不相邻，选择新的方块
                    highlightCell(prevRow, prevCol, false);
                    match3Selected = { row, col };
                    highlightCell(row, col, true);
                    return;
                }
                
                highlightCell(prevRow, prevCol, false);
                match3Selected = null;
            }
        }
        
        function highlightCell(row, col, highlight) {
            const cells = document.querySelectorAll('.match3-cell');
            const index = row * 4 + col;
            if (highlight) {
                cells[index].classList.add('selected');
            } else {
                cells[index].classList.remove('selected');
            }
        }
        
        function swapCells(row1, col1, row2, col2) {
            const temp = match3Grid[row1][col1];
            match3Grid[row1][col1] = match3Grid[row2][col2];
            match3Grid[row2][col2] = temp;
            
            const cells = document.querySelectorAll('.match3-cell');
            cells[row1 * 4 + col1].style.background = match3Grid[row1][col1];
            cells[row2 * 4 + col2].style.background = match3Grid[row2][col2];
        }
        
        function findMatches(grid, size) {
            const matches = [];
            
            // 检查横向匹配
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size - 2; j++) {
                    if (grid[i][j] && grid[i][j] === grid[i][j + 1] && grid[i][j] === grid[i][j + 2]) {
                        matches.push({ row: i, col: j });
                        matches.push({ row: i, col: j + 1 });
                        matches.push({ row: i, col: j + 2 });
                        // 继续检查更长的匹配
                        let k = j + 3;
                        while (k < size && grid[i][j] === grid[i][k]) {
                            matches.push({ row: i, col: k });
                            k++;
                        }
                    }
                }
            }
            
            // 检查纵向匹配
            for (let j = 0; j < size; j++) {
                for (let i = 0; i < size - 2; i++) {
                    if (grid[i][j] && grid[i][j] === grid[i + 1][j] && grid[i][j] === grid[i + 2][j]) {
                        matches.push({ row: i, col: j });
                        matches.push({ row: i + 1, col: j });
                        matches.push({ row: i + 2, col: j });
                        // 继续检查更长的匹配
                        let k = i + 3;
                        while (k < size && grid[i][j] === grid[k][j]) {
                            matches.push({ row: k, col: j });
                            k++;
                        }
                    }
                }
            }
            
            // 去重
            return matches.filter((m, index, self) => 
                index === self.findIndex(t => t.row === m.row && t.col === m.col)
            );
        }
        
        function removeMatches(matches, size) {
            const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a855f7'];
            const cells = document.querySelectorAll('.match3-cell');
            
            // 标记消除的方块
            matches.forEach(m => {
                match3Grid[m.row][m.col] = null;
                cells[m.row * 4 + m.col].classList.add('removing');
            });
            
            setTimeout(() => {
                // 填充空位
                for (let j = 0; j < size; j++) {
                    let emptyRow = size - 1;
                    for (let i = size - 1; i >= 0; i--) {
                        if (match3Grid[i][j] !== null) {
                            if (i !== emptyRow) {
                                match3Grid[emptyRow][j] = match3Grid[i][j];
                                match3Grid[i][j] = null;
                                cells[emptyRow * 4 + j].style.background = match3Grid[emptyRow][j];
                                cells[i * 4 + j].style.background = '';
                            }
                            emptyRow--;
                        }
                    }
                    // 填充新方块
                    for (let i = emptyRow; i >= 0; i--) {
                        match3Grid[i][j] = colors[Math.floor(Math.random() * colors.length)];
                        cells[i * 4 + j].style.background = match3Grid[i][j];
                    }
                }
                
                // 清除消除动画类
                cells.forEach(c => c.classList.remove('removing', 'selected'));
                
                // 检查是否还有匹配（连锁反应）
                const newMatches = findMatches(match3Grid, size);
                if (newMatches.length > 0) {
                    setTimeout(() => removeMatches(newMatches, size), 300);
                } else {
                    // 检查是否完成（所有方块都已被消除过）
                    checkMatch3Complete();
                }
            }, 300);
        }
        
        let match3Score = 0;
        
        function checkMatch3Complete() {
            match3Score++;
            if (match3Score >= 5) {
                playSuccess();
                setTimeout(() => {
                    gameChallenge.classList.remove('active');
                    challengeActive = false;
                    breakWall();
                }, 500);
            }
        }

        // ===== 数字消除游戏 =====
        let mergeScore = 0;

        function initHuarongChallenge() {

        function initMergeGame() {
            const size = 4;

            for (let i = 0; i < size; i++) {
                grid[i] = [];

                        <div class="merge-tip">💡 使用方向键或点击相邻数字合并</div>
                    </div>

        }
        
        function addRandomTile(grid) {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) {
                        emptyCells.push({ r: i, c: j });
                    }
                }
            }
            
            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        function renderMergeGrid(grid) {
            const gridEl = document.getElementById('mergeGrid');
            gridEl.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'merge-cell';
                    cell.textContent = grid[i][j] === 0 ? '' : grid[i][j];
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    if (grid[i][j] !== 0) {
                        const colorClass = `merge-${Math.min(grid[i][j], 2048)}`;
                        cell.classList.add(colorClass);
                    }
                    
                    gridEl.appendChild(cell);
                }
            }
            
            document.getElementById('mergeScore').textContent = mergeScore;
        }
        
        function handleMergeClick(cell, grid) {
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            const value = grid[row][col];
            
            const directions = [
                { dr: -1, dc: 0 },
                { dr: 1, dc: 0 },
                { dr: 0, dc: -1 },
                { dr: 0, dc: 1 }
            ];
            
            for (const { dr, dc } of directions) {
                const newR = row + dr;
                const newC = col + dc;
                
                if (newR >= 0 && newR < 4 && newC >= 0 && newC < 4) {
                    if (grid[newR][newC] === value) {
                        grid[row][col] = 0;
                        grid[newR][newC] = value * 2;
                        mergeScore += value * 2;
                        playSuccess();
                        
                        addRandomTile(grid);
                        renderMergeGrid(grid);
                        checkMergeWin(grid);
                        return;
                    }
                }
            }
            
            playWrong();
        }
        
        function moveMerge(grid, direction) {
            let moved = false;
            const size = 4;
            
            if (direction === 'ArrowUp') {
                for (let c = 0; c < size; c++) {
                    for (let r = 1; r < size; r++) {
                        if (grid[r][c] !== 0) {
                            let newR = r;
                            while (newR > 0 && grid[newR - 1][c] === 0) {
                                grid[newR - 1][c] = grid[newR][c];
                                grid[newR][c] = 0;
                                newR--;
                                moved = true;
                            }
                            if (newR > 0 && grid[newR - 1][c] === grid[newR][c]) {
                                grid[newR - 1][c] *= 2;
                                mergeScore += grid[newR - 1][c];
                                grid[newR][c] = 0;
                                moved = true;
                            }
                        }
                    }
                }
            } else if (direction === 'ArrowDown') {
                for (let c = 0; c < size; c++) {
                    for (let r = size - 2; r >= 0; r--) {
                        if (grid[r][c] !== 0) {
                            let newR = r;
                            while (newR < size - 1 && grid[newR + 1][c] === 0) {
                                grid[newR + 1][c] = grid[newR][c];
                                grid[newR][c] = 0;
                                newR++;
                                moved = true;
                            }
                            if (newR < size - 1 && grid[newR + 1][c] === grid[newR][c]) {
                                grid[newR + 1][c] *= 2;
                                mergeScore += grid[newR + 1][c];
                                grid[newR][c] = 0;
                                moved = true;
                            }
                        }
                    }
                }
            } else if (direction === 'ArrowLeft') {
                for (let r = 0; r < size; r++) {
                    for (let c = 1; c < size; c++) {
                        if (grid[r][c] !== 0) {
                            let newC = c;
                            while (newC > 0 && grid[r][newC - 1] === 0) {
                                grid[r][newC - 1] = grid[r][newC];
                                grid[r][newC] = 0;
                                newC--;
                                moved = true;
                            }
                            if (newC > 0 && grid[r][newC - 1] === grid[r][newC]) {
                                grid[r][newC - 1] *= 2;
                                mergeScore += grid[r][newC - 1];
                                grid[r][newC] = 0;
                                moved = true;
                            }
                        }
                    }
                }
            } else if (direction === 'ArrowRight') {
                for (let r = 0; r < size; r++) {
                    for (let c = size - 2; c >= 0; c--) {
                        if (grid[r][c] !== 0) {
                            let newC = c;
                            while (newC < size - 1 && grid[r][newC + 1] === 0) {
                                grid[r][newC + 1] = grid[r][newC];
                                grid[r][newC] = 0;
                                newC++;
                                moved = true;
                            }
                            if (newC < size - 1 && grid[r][newC + 1] === grid[r][newC]) {
                                grid[r][newC + 1] *= 2;
                                mergeScore += grid[r][newC + 1];
                                grid[r][newC] = 0;
                                moved = true;
                            }
                        }
                    }
                }
            }
            
            if (moved) {
                addRandomTile(grid);
                renderMergeGrid(grid);
                checkMergeWin(grid);
            }
        }
        
        function checkMergeWin(grid) {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] >= mergeTarget) {
                        playSuccess();
                        setTimeout(() => {
                            gameChallenge.classList.remove('active');
                            challengeActive = false;
                            breakWall();
                        }, 500);
                        return;
                    }
                }
            }
        }

        // ===== 管道连接游戏 =====
        function initQuizChallenge() {
            const size = 4;
            const pipeTypes = ['straight', 'corner', 'tee', 'cross'];
            
            let grid = [];
            for (let i = 0; i < size; i++) {
                grid[i] = [];
                for (let j = 0; j < size; j++) {
                    grid[i][j] = {
                        type: pipeTypes[Math.floor(Math.random() * pipeTypes.length)],
                        rotation: Math.floor(Math.random() * 4) * 90,
                        isStart: i === 0 && j === 0,
                        isEnd: i === size - 1 && j === size - 1
                    };
                }
            }
            
            grid[0][0].type = 'corner';
            grid[0][0].rotation = 0;
            grid[size - 1][size - 1].type = 'corner';
            grid[size - 1][size - 1].rotation = 180;
            
            const html = `
                <div class="pipe-container">
                    <div class="pipe-grid" id="pipeGrid"></div>
                    <div class="pipe-message">点击管道旋转，连接起点到终点</div>
                </div>
            `;
            challengeContent.innerHTML = html;
            
            renderPipeGame(grid, size);
        }
        
        let pipeGridData = [];
        
        function renderPipeGame(grid, size) {
            pipeGridData = grid;
            const board = document.getElementById('pipeGrid');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'pipe-cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    const pipe = document.createElement('div');
                    pipe.className = `pipe ${pipeGridData[i][j].type}`;
                    pipe.style.transform = `rotate(${pipeGridData[i][j].rotation}deg)`;
                    
                    if (pipeGridData[i][j].isStart) {
                        cell.classList.add('start-cell');
                        pipe.classList.add('start-pipe');
                    }
                    if (pipeGridData[i][j].isEnd) {
                        cell.classList.add('end-cell');
                        pipe.classList.add('end-pipe');
                    }
                    
                    cell.appendChild(pipe);
                    cell.addEventListener('click', () => rotatePipe(i, j));
                    board.appendChild(cell);
                }
            }
        }
        
        function rotatePipe(row, col) {
            playClick();
            
            pipeGridData[row][col].rotation = (pipeGridData[row][col].rotation + 90) % 360;
            
            const cells = document.querySelectorAll('.pipe-cell');
            const index = row * 4 + col;
            const pipe = cells[index].querySelector('.pipe');
            pipe.style.transform = `rotate(${pipeGridData[row][col].rotation}deg)`;
            
            checkPipeConnection();
        }
        
        function getConnections(type, rotation) {
            const baseConnections = {
                straight: ['top', 'bottom'],
                corner: ['top', 'right'],
                tee: ['top', 'right', 'bottom'],
                cross: ['top', 'right', 'bottom', 'left']
            };
            
            const connections = baseConnections[type];
            const rotations = ['top', 'right', 'bottom', 'left'];
            const rotationIndex = rotation / 90;
            
            return connections.map(conn => {
                const connIndex = rotations.indexOf(conn);
                return rotations[(connIndex + rotationIndex) % 4];
            });
        }
        
        function checkPipeConnection() {
            const size = 4;
            const visited = new Set();
            const queue = [{ row: 0, col: 0 }];
            
            while (queue.length > 0) {
                const { row, col } = queue.shift();
                const key = `${row},${col}`;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                if (row === size - 1 && col === size - 1) {
                    playSuccess();
                    setTimeout(() => {
                        gameChallenge.classList.remove('active');
                        challengeActive = false;
                        breakWall();
                    }, 500);
                    return;
                }
                
                const pipe = pipeGridData[row][col];
                const connections = getConnections(pipe.type, pipe.rotation);
                
                connections.forEach(dir => {
                    let newRow = row;
                    let newCol = col;
                    let requiredDir = '';
                    
                    switch (dir) {
                        case 'top': newRow--; requiredDir = 'bottom'; break;
                        case 'bottom': newRow++; requiredDir = 'top'; break;
                        case 'left': newCol--; requiredDir = 'right'; break;
                        case 'right': newCol++; requiredDir = 'left'; break;
                    }
                    
                    if (newRow >= 0 && newRow < size && newCol >= 0 && newCol < size) {
                        const neighborPipe = pipeGridData[newRow][newCol];
                        const neighborConnections = getConnections(neighborPipe.type, neighborPipe.rotation);
                        
                        if (neighborConnections.includes(requiredDir)) {
                            queue.push({ row: newRow, col: newCol });
                        }
                    }
                });
            }
        }

        // ===== 找不同游戏 =====
        let findDiffLevel = 1;
        let findDiffTotal = 0;
        let findDiffFound = 0;
        
        function initSequenceChallenge() {
            findDiffLevel = 1;
            startFindDiffRound();
        }
        
        function startFindDiffRound() {
            findDiffFound = 0;
            // 提高难度：更多差异点，更大的网格
            const gridSize = 5;
            findDiffTotal = Math.min(findDiffLevel + 2, 8);
            
            const symbols = ['🌟', '💫', '✨', '⭐', '🌙', '☀️', '🔥', '💧', '🌺', '🌻', '🌹', '🌷', '🍀', '🌿', '🍎', '🍊', '🦋', '🐱', '🐶', '🦊'];
            
            let baseGrid = [];
            for (let i = 0; i < gridSize; i++) {
                baseGrid[i] = [];
                for (let j = 0; j < gridSize; j++) {
                    baseGrid[i][j] = symbols[Math.floor(Math.random() * symbols.length)];
                }
            }
            
            let diffGrid = baseGrid.map(row => [...row]);
            const diffPositions = [];
            
            while (diffPositions.length < findDiffTotal) {
                const r = Math.floor(Math.random() * gridSize);
                const c = Math.floor(Math.random() * gridSize);
                
                if (!diffPositions.some(p => p.r === r && p.c === c)) {
                    let newSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                    while (newSymbol === baseGrid[r][c]) {
                        newSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                    }
                    
                    diffGrid[r][c] = newSymbol;
                    diffPositions.push({ r, c });
                }
            }
            
            const html = `
                <div class="finddiff-container">
                    <div class="finddiff-header">
                        <div class="finddiff-title">🔍 发现差异：打破沉默</div>
                        <div class="finddiff-info">
                            <span class="finddiff-level">第 ${findDiffLevel} 关</span>
                            <span class="finddiff-counter">找到: ${findDiffFound} / ${findDiffTotal}</span>
                        </div>
                        <div class="finddiff-tip">💡 点击右侧图片中与左侧不同的位置（共${gridSize}x${gridSize}格子）</div>
                    </div>
                    <div class="finddiff-grids">
                        <div class="finddiff-grid-wrapper">
                            <div class="finddiff-grid-label">参考图</div>
                            <div class="finddiff-grid finddiff-5x5" id="findDiffBaseGrid"></div>
                        </div>
                        <div class="finddiff-grid-wrapper">
                            <div class="finddiff-grid-label">找不同</div>
                            <div class="finddiff-grid finddiff-5x5" id="findDiffDiffGrid"></div>
                        </div>
                    </div>
                    <div class="finddiff-status" id="findDiffStatus"></div>
                </div>
            `;
            challengeContent.innerHTML = html;
            
            renderFindDiffGrid('findDiffBaseGrid', baseGrid, false);
            renderFindDiffGrid('findDiffDiffGrid', diffGrid, true, diffPositions);
        }
        
        function renderFindDiffGrid(elementId, grid, isClickable, diffPositions = []) {
            const gridEl = document.getElementById(elementId);
            gridEl.innerHTML = '';
            
            grid.forEach((row, r) => {
                row.forEach((symbol, c) => {
                    const cell = document.createElement('div');
                    cell.className = 'finddiff-cell';
                    cell.textContent = symbol;
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    if (isClickable) {
                        cell.addEventListener('click', () => handleFindDiffClick(cell, r, c, diffPositions));
                    }
                    
                    gridEl.appendChild(cell);
                });
            });
        }
        
        function handleFindDiffClick(cell, r, c, diffPositions) {
            playClick();
            
            const isDiff = diffPositions.some(p => p.r === r && p.c === c);
            
            if (isDiff) {
                if (!cell.classList.contains('found')) {
                    cell.classList.add('found');
                    playSuccess();
                    findDiffFound++;
                    
                    const counter = document.querySelector('.finddiff-counter');
                    counter.textContent = `找到: ${findDiffFound} / ${findDiffTotal}`;
                    
                    if (findDiffFound === findDiffTotal) {
                        const status = document.getElementById('findDiffStatus');
                        status.textContent = '🎉 全部找到！';
                        
                        setTimeout(() => {
                            findDiffLevel++;
                            
                            if (findDiffLevel >= 4) {
                                setTimeout(() => {
                                    gameChallenge.classList.remove('active');
                                    challengeActive = false;
                                    breakWall();
                                }, 800);
                            } else {
                                setTimeout(() => startFindDiffRound(), 1200);
                            }
                        }, 800);
                    }
                }
            } else {
                cell.classList.add('wrong');
                playWrong();
                
                setTimeout(() => {
                    cell.classList.remove('wrong');
                }, 500);
            }
        }

        // ===== 记忆挑战 =====
        function initMemoryChallenge() {
            const symbols = ['🌟', '💫', '✨', '⭐', '🌙', '☀️', '🔥', '💧'];
            const pairs = [...symbols, ...symbols];
            
            // 打乱
            for (let i = pairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
            }

            memoryCards = pairs;
            memoryFlipped = [];
            memoryMatched = [];

            const html = `<div class="memory-grid" id="memoryGrid"></div>`;
            challengeContent.innerHTML = html;

            const memoryGrid = document.getElementById('memoryGrid');
            memoryCards.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = index;
                card.dataset.symbol = symbol;
                card.addEventListener('click', () => handleMemoryCard(card));
                memoryGrid.appendChild(card);
            });
        }

        function handleMemoryCard(card) {
            if (memoryFlipped.length >= 2 || 
                memoryFlipped.includes(card) || 
                memoryMatched.includes(card.dataset.index)) {
                return;
            }

            playClick();
            card.classList.add('flipped');
            card.textContent = card.dataset.symbol;
            memoryFlipped.push(card);

            if (memoryFlipped.length === 2) {
                setTimeout(checkMemoryMatch, 800);
            }
        }

        function checkMemoryMatch() {
            const [card1, card2] = memoryFlipped;
            
            if (card1.dataset.symbol === card2.dataset.symbol) {
                playMatch();
                card1.classList.add('matched');
                card2.classList.add('matched');
                memoryMatched.push(card1.dataset.index, card2.dataset.index);
                
                if (memoryMatched.length === memoryCards.length) {
                    setTimeout(() => {
                        gameChallenge.classList.remove('active');
                        challengeActive = false;
                        breakWall();
                    }, 500);
                }
            } else {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                card1.textContent = '';
                card2.textContent = '';
            }
            
            memoryFlipped = [];
        }

        // ===== 反应挑战 =====
        function initReactionChallenge() {
            reactionScore = 0;
            reactionTargets = [];
            
            const html = `
                <div class="reaction-instruction">点击出现的圆点，尽可能快！</div>
                <div class="reaction-area" id="reactionArea"></div>
                <div style="text-align: center; margin-top: 1rem; color: rgba(255,255,255,0.7);">
                    得分: <span id="reactionScore">0</span>/5
                </div>
            `;
            challengeContent.innerHTML = html;

            const reactionArea = document.getElementById('reactionArea');
            reactionArea.addEventListener('click', handleReactionClick);
            
            setTimeout(() => spawnReactionTarget(), 1000);
        }

        function spawnReactionTarget() {
            if (!challengeActive || reactionScore >= 5) return;
            
            const reactionArea = document.getElementById('reactionArea');
            if (!reactionArea) return;

            const target = document.createElement('div');
            target.className = 'reaction-target';
            
            const maxX = reactionArea.clientWidth - 60;
            const maxY = reactionArea.clientHeight - 60;
            
            target.style.left = Math.random() * maxX + 'px';
            target.style.top = Math.random() * maxY + 'px';
            
            target.addEventListener('click', (e) => {
                e.stopPropagation();
                handleReactionTargetClick(target);
            });
            
            reactionArea.appendChild(target);
            reactionTargets.push(target);

            // 3秒后消失
            setTimeout(() => {
                if (target.parentNode) {
                    target.remove();
                    reactionTargets = reactionTargets.filter(t => t !== target);
                }
            }, 3000);

            // 继续生成
            if (reactionScore < 5) {
                setTimeout(() => spawnReactionTarget(), 1500 + Math.random() * 1000);
            }
        }

        function handleReactionClick(e) {
            if (e.target.classList.contains('reaction-target')) return;
            // 点击空白处扣分
            wall.classList.add('cracking');
            setTimeout(() => wall.classList.remove('cracking'), 400);
        }

        function handleReactionTargetClick(target) {
            playClick();
            reactionScore++;
            document.getElementById('reactionScore').textContent = reactionScore;
            target.remove();
            reactionTargets = reactionTargets.filter(t => t !== target);

            if (reactionScore >= 5) {
                playSuccess();
                gamePage.classList.add('shake');
                setTimeout(() => gamePage.classList.remove('shake'), 400);
                
                setTimeout(() => {
                    gameChallenge.classList.remove('active');
                    challengeActive = false;
                    breakWall();
                }, 1000);
            }
        }

        // ===== 节奏挑战 =====
        function initRhythmChallenge() {
            rhythmSequence = [];
            rhythmPlayerSequence = [];
            
            // 生成节奏序列
            for (let i = 0; i < 5; i++) {
                rhythmSequence.push(Math.floor(Math.random() * 4));
            }

            const html = `
                <div class="rhythm-sequence" id="rhythmSequence">观察节奏...</div>
                <div class="rhythm-area" id="rhythmArea">
                    <button class="rhythm-btn" data-index="0">🎵</button>
                    <button class="rhythm-btn" data-index="1">🎶</button>
                    <button class="rhythm-btn" data-index="2">🎼</button>
                    <button class="rhythm-btn" data-index="3">🎹</button>
                </div>
                <div style="text-align: center; margin-top: 1rem; color: rgba(255,255,255,0.7);">
                    进度: <span id="rhythmProgress">0</span>/5
                </div>
            `;
            challengeContent.innerHTML = html;

            const rhythmArea = document.getElementById('rhythmArea');
            const buttons = rhythmArea.querySelectorAll('.rhythm-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => handleRhythmClick(btn));
            });

            // 播放序列
            setTimeout(() => playRhythmSequence(), 1000);
        }

        function playRhythmSequence() {
            const sequenceDisplay = document.getElementById('rhythmSequence');
            const buttons = document.querySelectorAll('.rhythm-btn');
            
            let index = 0;
            const interval = setInterval(() => {
                if (index >= rhythmSequence.length) {
                    clearInterval(interval);
                    sequenceDisplay.textContent = '重复节奏！';
                    return;
                }

                const btnIndex = rhythmSequence[index];
                buttons[btnIndex].classList.add('active');
                playRhythmTone(btnIndex);
                
                setTimeout(() => {
                    buttons[btnIndex].classList.remove('active');
                }, 500);

                index++;
            }, 800);
        }

        function handleRhythmClick(btn) {
            if (rhythmSequence.length === 0) return;
            
            playClick();
            const index = parseInt(btn.dataset.index);
            playRhythmTone(index);
            
            btn.classList.add('active');
            setTimeout(() => btn.classList.remove('active'), 200);

            rhythmPlayerSequence.push(index);
            document.getElementById('rhythmProgress').textContent = rhythmPlayerSequence.length;

            // 检查是否正确
            const currentIndex = rhythmPlayerSequence.length - 1;
            if (rhythmPlayerSequence[currentIndex] !== rhythmSequence[currentIndex]) {
                // 错误
                wall.classList.add('cracking');
                setTimeout(() => wall.classList.remove('cracking'), 400);
                rhythmPlayerSequence = [];
                document.getElementById('rhythmProgress').textContent = '0';
                setTimeout(() => playRhythmSequence(), 1000);
                return;
            }

            // 检查是否完成
            if (rhythmPlayerSequence.length === rhythmSequence.length) {
                playSuccess();
                gamePage.classList.add('shake');
                setTimeout(() => gamePage.classList.remove('shake'), 400);
                
                setTimeout(() => {
                    gameChallenge.classList.remove('active');
                    challengeActive = false;
                    breakWall();
                }, 1000);
            }
        }

        // ===== 破墙效果 - 增强版 =====
        function breakWall() {
            playBreak();
            
            // 闪光效果
            impactOverlay.classList.add('flash');
            setTimeout(() => impactOverlay.classList.remove('flash'), 500);

            // 碎片效果 - 3D物理
            debrisContainer.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'debris-piece';
                piece.style.left = (25 + Math.random() * 50) + '%';
                piece.style.top = (15 + Math.random() * 50) + '%';
                piece.style.width = (8 + Math.random() * 20) + 'px';
                piece.style.height = (8 + Math.random() * 20) + 'px';
                piece.style.animationDelay = Math.random() * 0.5 + 's';
                piece.style.animationDuration = (1.5 + Math.random() * 1) + 's';
                
                // 随机旋转角度
                const rotateX = Math.random() * 720;
                const rotateY = Math.random() * 540;
                const rotateZ = Math.random() * 360;
                piece.style.setProperty('--rotateX', rotateX + 'deg');
                piece.style.setProperty('--rotateY', rotateY + 'deg');
                piece.style.setProperty('--rotateZ', rotateZ + 'deg');
                
                debrisContainer.appendChild(piece);
            }

            // 墙体破碎 - 3D旋转
            wall.classList.add('broken');

            // 显示过渡页面
            setTimeout(() => {
                // 更新进度
                if (currentLevelIdx >= unlockedCount) {
                    unlockedCount = currentLevelIdx + 1;
                    localStorage.setItem('sheBreakWall_unlocked', unlockedCount.toString());
                }
                
                // 显示女性群像
                heroinesContainer.classList.add('active');
                revealHeroine(currentLevelIdx);

                // 更新过渡页面内容
                transitionIcon.textContent = LEVELS[currentLevelIdx].heroine;
                transitionTitle.textContent = LEVELS[currentLevelIdx].title;
                transitionSubtitle.textContent = `${LEVELS[currentLevelIdx].heroineName} 站在了她身后`;
                transitionProgress.textContent = unlockedCount;
                
                // 生成对应职业的女性形象
                renderTransitionHeroine(LEVELS[currentLevelIdx].heroineName.toLowerCase());
                
                levelTransition.classList.add('active');

                // 延迟后进入下一关
                setTimeout(() => {
                    levelTransition.classList.remove('active');
                    wall.classList.remove('broken');
                    cracksLayer.innerHTML = '';
                    cracks = [];
                    
                    currentLevelIdx++;
                    if (currentLevelIdx >= LEVELS.length) {
                        showPage('victoryPage');
                    } else {
                        loadLevel(currentLevelIdx);
                    }
                }, 3000);
            }, 2000);
        }

        // ===== 关卡加载 =====
        function loadLevel(index) {
            currentLevelIdx = index;
            const level = LEVELS[index];
            
            currentLevel.textContent = index + 1;
            issueIcon.textContent = level.icon;
            issueTitle.textContent = level.title;
            issueDesc.textContent = level.desc;
            
            updateProgress();
            initParticles();
        }

        // ===== 提示系统 =====
        function showHint() {
            playClick();
            const hints = {
                math: '💡 算出答案，点击正确的数字',
                memory: '💡 记住卡片位置，找出所有配对',
                reaction: '💡 快速点击出现的圆点，不要点空白',
                rhythm: '💡 观察并重复播放的节奏序列',
                default: '💡 每一次挑战，都是一次破墙的机会'
            };
            const level = LEVELS[currentLevelIdx];
            alert(hints[level.challenge] || hints.default);
        }

        // ===== 事件绑定 =====
        btnStart.addEventListener('click', () => {
            playClick();
            startBGM();
            loadLevel(Math.min(unlockedCount, LEVELS.length - 1));
            showPage('gamePage');
        });

        btnBack.addEventListener('click', () => {
            playClick();
            stopBGM();
            showPage('menuPage');
        });

        challengeBtn.addEventListener('click', startChallenge);

        btnHint.addEventListener('click', showHint);

        // ===== 测试模式控制 =====
        const btnSkip = $('#btnSkip');
        const btnNextLevel = $('#btnNextLevel');
        const btnReset = $('#btnReset');
        const btnCompleteAll = $('#btnCompleteAll');
        const testControls = $('#testControls');

        btnSkip.addEventListener('click', () => {
            playClick();
            gameChallenge.classList.remove('active');
            challengeActive = false;
            breakWall();
        });

        btnNextLevel.addEventListener('click', () => {
            playClick();
            gameChallenge.classList.remove('active');
            challengeActive = false;
            
            currentLevelIdx++;
            if (currentLevelIdx >= LEVELS.length) {
                showPage('victoryPage');
                testControls.style.display = 'none';
            } else {
                loadLevel(currentLevelIdx);
            }
        });

        btnReset.addEventListener('click', () => {
            playClick();
            localStorage.removeItem('sheBreakWall_unlocked');
            unlockedCount = 0;
            currentLevelIdx = 0;
            
            $$('.heroine-shape').forEach(h => h.classList.remove('revealed'));
            heroinesContainer.classList.remove('active');
            
            wall.classList.remove('broken');
            cracksLayer.innerHTML = '';
            cracks = [];
            
            loadLevel(0);
            updateProgress();
        });

        btnCompleteAll.addEventListener('click', () => {
            playClick();
            unlockedCount = LEVELS.length;
            localStorage.setItem('sheBreakWall_unlocked', unlockedCount.toString());
            
            $$('.heroine-shape').forEach(h => h.classList.add('revealed'));
            heroinesContainer.classList.add('active');
            
            showPage('victoryPage');
            testControls.style.display = 'none';
        });

        // ===== 初始化 =====
        updateProgress();

        // 如果有进度，显示群像
        if (unlockedCount > 0) {
            heroinesContainer.classList.add('active');
            for (let i = 0; i < unlockedCount && i < heroines.length; i++) {
                heroines[i].classList.add('revealed');
            }
        }

        console.log('✅ 她·破墙 沉浸式体验已加载');
        console.log(`📖 已突破 ${unlockedCount} / ${LEVELS.length} 道墙`);
    </script>

</body></html>
