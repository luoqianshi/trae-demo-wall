<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideCraft - 可视化 HTML 演示文稿编辑器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{--bg:#0f0f1a;--panel:#161624;--panel2:#1d1d2e;--line:#2a2a40;--txt:#e8e8f0;--mut:#8a8aa0;--pri:#6c5ce7;--pri2:#a29bfe;--acc:#00cec9;--danger:#ff6b6b}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{font-family:"Noto Sans SC",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;user-select:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit}
  .topbar{height:52px;display:flex;align-items:center;gap:6px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line);z-index:20}
  .brand{font-weight:900;font-size:16px;margin-right:14px;letter-spacing:-.5px}
  .brand b{background:linear-gradient(135deg,var(--pri),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .tbtn{height:32px;padding:0 12px;border-radius:7px;display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--txt);transition:.15s}
  .tbtn:hover{background:var(--panel2)}
  .tbtn.primary{background:linear-gradient(135deg,var(--pri),#5a4bd1);color:#fff}
  .tbtn.primary:hover{filter:brightness(1.1)}
  .tbtn.ghost{color:var(--mut)}
  .sep{width:1px;height:24px;background:var(--line);margin:0 6px}
  .spacer{flex:1}
  .menu-wrap{position:relative}
  .menu{position:absolute;top:38px;left:0;background:var(--panel2);border:1px solid var(--line);border-radius:8px;min-width:210px;padding:5px;z-index:30;box-shadow:0 10px 30px rgba(0,0,0,.4);display:none}
  .menu.open{display:block}
  .menu-item{padding:9px 12px;border-radius:6px;font-size:12.5px;display:flex;align-items:center;gap:8px;color:var(--txt)}
  .menu-item:hover{background:var(--pri)}
  .menu-item small{color:var(--mut);margin-left:auto}
  .menu-item:hover small{color:rgba(255,255,255,.7)}
  .main{display:flex;height:calc(100% - 52px)}
  .left{width:184px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
  .left-head{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
  .left-head h3{font-size:11px;letter-spacing:1px;color:var(--mut);text-transform:uppercase;font-weight:700}
  .add-page-btn{width:24px;height:24px;border-radius:6px;background:var(--pri);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center}
  .thumbs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
  .thumb{position:relative;border:2px solid transparent;border-radius:6px;overflow:hidden;cursor:pointer;background:#fff}
  .thumb.active{border-color:var(--pri);box-shadow:0 0 0 2px rgba(108,92,231,.25)}
  .thumb-num{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:1px 6px;border-radius:4px;z-index:2}
  .thumb-del{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:4px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;display:none;align-items:center;justify-content:center;z-index:2}
  .thumb:hover .thumb-del{display:flex}
  .thumb-del:hover{background:var(--danger)}
  .thumb-stage{width:160px;height:90px;position:relative;overflow:hidden}
  .thumb-stage .stage-inner{width:1280px;height:720px;transform-origin:top left;transform:scale(.125);position:absolute;top:0;left:0}
  .canvas-area{flex:1;position:relative;overflow:auto;background:#0a0a14;background-image:radial-gradient(circle,#1a1a2e 1px,transparent 1px);background-size:24px 24px;display:flex;align-items:center;justify-content:center;padding:24px}
  .stage-viewport{position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .stage{width:1280px;height:720px;position:relative;transform-origin:top left;background:#fff;overflow:hidden}
  .stage .el{position:absolute;box-sizing:border-box}
  .stage .el.el-text,.stage .el.el-image{cursor:move}
  .stage .el.selected{outline:2px solid var(--pri)}
  .stage .el .el-text-inner{width:100%;height:100%;overflow:hidden;word-break:break-word;white-space:pre-wrap;outline:none}
  .stage .el .el-text-inner[contenteditable="true"]{cursor:text;user-select:text}
  .stage .el img{pointer-events:none;-webkit-user-drag:none}
  .sel-box{position:absolute;border:1px solid var(--pri);pointer-events:none;z-index:9999;box-sizing:border-box}
  .handle{position:absolute;width:10px;height:10px;background:#fff;border:1.5px solid var(--pri);border-radius:2px;pointer-events:auto;transform:translate(-50%,-50%)}
  .handle.nw{top:0;left:0;cursor:nwse-resize}.handle.n{top:0;left:50%;cursor:ns-resize}.handle.ne{top:0;left:100%;cursor:nesw-resize}
  .handle.e{top:50%;left:100%;cursor:ew-resize}.handle.se{top:100%;left:100%;cursor:nwse-resize}.handle.s{top:100%;left:50%;cursor:ns-resize}
  .handle.sw{top:100%;left:0;cursor:nesw-resize}.handle.w{top:50%;left:0;cursor:ew-resize}
  .right{width:236px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .panel-sec{border-bottom:1px solid var(--line)}
  .panel-sec h3{font-size:11px;letter-spacing:1px;color:var(--mut);text-transform:uppercase;font-weight:700;padding:12px 14px 8px}
  .layers{max-height:220px;overflow-y:auto;padding:0 8px 10px}
  .layer-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px}
  .layer-row:hover{background:var(--panel2)}
  .layer-row.active{background:rgba(108,92,231,.18);color:#fff}
  .layer-row .lic{width:18px;text-align:center;font-size:13px}
  .layer-row .lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--mut)}
  .layer-row.active .lname{color:#fff}
  .layer-empty{padding:14px;text-align:center;color:var(--mut);font-size:12px}
  .layer-tools{display:flex;gap:4px;padding:0 10px 10px}
  .ltool{flex:1;height:28px;border-radius:6px;background:var(--panel2);font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--mut)}
  .ltool:hover{background:var(--pri);color:#fff}
  .props{flex:1;overflow-y:auto;padding:0 14px 14px}
  .prop-empty{padding:24px 14px;text-align:center;color:var(--mut);font-size:12px;line-height:1.7}
  .prop-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .prop-row label{width:54px;font-size:11px;color:var(--mut);flex-shrink:0}
  .prop-row input[type=number],.prop-row input[type=text],.prop-row select{flex:1;height:28px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:0 8px;font-size:12px;min-width:0}
  .prop-row input[type=color]{width:34px;height:28px;border:1px solid var(--line);border-radius:6px;background:none;padding:2px;cursor:pointer;flex-shrink:0}
  .prop-row input[type=range]{flex:1}
  .btns-row{display:flex;gap:6px;margin-top:6px}
  .pbtn{flex:1;height:30px;border-radius:6px;background:var(--panel2);font-size:12px;color:var(--txt);display:flex;align-items:center;justify-content:center;gap:5px}
  .pbtn:hover{background:var(--pri);color:#fff}
  .pbtn.danger:hover{background:var(--danger);color:#fff}
  .seg{display:flex;background:var(--panel2);border-radius:6px;padding:2px;flex:1}
  .seg button{flex:1;height:24px;border-radius:4px;font-size:12px;color:var(--mut)}
  .seg button.active{background:var(--pri);color:#fff}
  .prop-title{font-size:12px;font-weight:700;color:var(--txt);margin:14px 0 10px}
  .prop-divider{height:1px;background:var(--line);margin:12px 0}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:200}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal h2{font-size:15px;margin-bottom:14px}
  .modal label{font-size:12px;color:var(--mut);display:block;margin-bottom:6px}
  .modal input[type=text]{width:100%;height:34px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--txt);padding:0 10px;margin-bottom:12px;font-size:13px}
  .file-btn{display:flex;width:100%;height:60px;border:1.5px dashed var(--line);border-radius:8px;align-items:center;justify-content:center;color:var(--mut);font-size:12px;margin-bottom:12px;cursor:pointer}
  .file-btn:hover{border-color:var(--pri);color:var(--pri2)}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
  .modal-actions button{height:34px;padding:0 16px;border-radius:7px;font-size:13px;font-weight:500}
  .modal-actions .cancel{background:var(--panel2);color:var(--mut)}
  .modal-actions .ok{background:var(--pri);color:#fff}
  .img-preview{max-height:120px;max-width:100%;border-radius:6px;margin-bottom:10px;display:none}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:10px 18px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#3a3a52;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">Slide<b>Craft</b></div>
  <button class="tbtn" id="btnNew">新建</button>
  <button class="tbtn" id="btnImport">导入</button>
  <div class="menu-wrap">
    <button class="tbtn primary" id="btnExport">导出 ▾</button>
    <div class="menu" id="exportMenu">
      <div class="menu-item" data-act="single">单文件 HTML <small>所有页合一</small></div>
      <div class="menu-item" data-act="multi">多文件 HTML <small>zip 含索引</small></div>
    </div>
  </div>
  <div class="sep"></div>
  <button class="tbtn" id="btnAddPage">+ 新增页</button>
  <button class="tbtn" id="btnAddText">+ 文本框</button>
  <button class="tbtn" id="btnAddImage">+ 图片</button>
  <div class="spacer"></div>
  <span class="tbtn ghost" id="pageInfo">第 1 页</span>
</div>
<div class="main">
  <div class="left">
    <div class="left-head"><h3>页面</h3><button class="add-page-btn" id="btnAddPage2" title="新增页">+</button></div>
    <div class="thumbs" id="thumbs"></div>
  </div>
  <div class="canvas-area" id="canvasArea">
    <div class="stage-viewport" id="stageViewport"><div class="stage" id="stage"></div></div>
  </div>
  <div class="right">
    <div class="panel-sec">
      <h3>图层</h3>
      <div class="layers" id="layers"></div>
      <div class="layer-tools">
        <button class="ltool" id="ltTop" title="置于顶层">⤒</button>
        <button class="ltool" id="ltUp" title="上移">↑</button>
        <button class="ltool" id="ltDown" title="下移">↓</button>
        <button class="ltool" id="ltBottom" title="置于底层">⤓</button>
      </div>
    </div>
    <div class="panel-sec" style="flex:1;display:flex;flex-direction:column">
      <h3>属性</h3>
      <div class="props" id="props"></div>
    </div>
  </div>
</div>
<div class="modal-bg" id="imgModal">
  <div class="modal">
    <h2>添加图片</h2>
    <label>上传图片文件</label>
    <label class="file-btn" for="imgFile">点击选择图片</label>
    <input type="file" id="imgFile" accept="image/*" style="display:none">
    <img class="img-preview" id="imgPreview">
    <label>或输入图片 URL</label>
    <input type="text" id="imgUrl" placeholder="https://...">
    <div class="modal-actions">
      <button class="cancel" id="imgCancel">取消</button>
      <button class="ok" id="imgOk">添加</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
/* ===================== 常量与状态 ===================== */
const STAGE_W=1280,STAGE_H=720,MIN_W=20,MIN_H=20,DATA_TAG='slidecraft-data';
let state={version:1,pages:[]};
let curPageIdx=0, selElId=null, isEditing=false;
const uid=p=>p+Math.random().toString(36).slice(2,9);
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function nextZ(page){let m=0;page.elements.forEach(e=>{if(e.zIndex>m)m=e.zIndex;});return m+1;}
function curPage(){return state.pages[curPageIdx];}
function getEl(id){if(!id)return null;for(const p of state.pages)for(const e of p.elements)if(e.id===id)return e;return null;}
function elPage(id){for(const p of state.pages)if(p.elements.some(e=>e.id===id))return p;return null;}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}

/* ===================== 元素渲染 ===================== */
function elOuterStyle(el){return `left:${el.x}px;top:${el.y}px;width:${el.width}px;height:${el.height}px;z-index:${el.zIndex};background:${el.backgroundColor||'transparent'};opacity:${el.opacity!=null?el.opacity:1};`;}
function elInnerHTML(el){
  if(el.type==='text')return `<div class="el-text-inner" style="font-size:${el.fontSize}px;color:${el.color};font-weight:${el.fontWeight};font-style:${el.fontStyle};text-align:${el.textAlign};font-family:${el.fontFamily};line-height:${el.lineHeight};">${el.content||''}</div>`;
  return `<img src="${el.src||''}" style="width:100%;height:100%;object-fit:${el.objectFit||'contain'};display:block;" draggable="false">`;
}
function elHTML(el){return `<div class="el el-${el.type}" data-id="${el.id}" style="position:absolute;${elOuterStyle(el)}">${elInnerHTML(el)}</div>`;}

/* ===================== 渲染：缩略图 ===================== */
function renderThumbs(){
  const c=$('thumbs');c.innerHTML='';
  state.pages.forEach((p,i)=>{
    const t=document.createElement('div');
    t.className='thumb'+(i===curPageIdx?' active':'');
    t.dataset.idx=i;
    let inner='<div class="stage-inner" style="background:'+p.background+'">';
    [...p.elements].sort((a,b)=>a.zIndex-b.zIndex).forEach(e=>{inner+=elHTML(e);});
    inner+='</div>';
    t.innerHTML=`<div class="thumb-num">${i+1}</div><div class="thumb-del" data-del="${i}">×</div><div class="thumb-stage">${inner}</div>`;
    c.appendChild(t);
  });
}

/* ===================== 渲染：画布 ===================== */
function renderCanvas(){
  const st=$('stage');const p=curPage();if(!p)return;
  st.style.background=p.background;
  let html='';
  [...p.elements].sort((a,b)=>a.zIndex-b.zIndex).forEach(e=>{html+=elHTML(e);});
  st.innerHTML=html;
  renderSelBox();
}
function renderSelBox(){
  const st=$('stage');let box=st.querySelector('.sel-box');
  const el=getEl(selElId);
  if(!el||elPage(el.id)!==curPage()){if(box)box.remove();return;}
  if(!box){box=document.createElement('div');box.className='sel-box';box.innerHTML='<div class="handle nw" data-h="nw"></div><div class="handle n" data-h="n"></div><div class="handle ne" data-h="ne"></div><div class="handle e" data-h="e"></div><div class="handle se" data-h="se"></div><div class="handle s" data-h="s"></div><div class="handle sw" data-h="sw"></div><div class="handle w" data-h="w"></div>';st.appendChild(box);}
  box.style.cssText=`position:absolute;left:${el.x}px;top:${el.y}px;width:${el.width}px;height:${el.height}px;z-index:9999;pointer-events:none;border:1px solid var(--pri);box-sizing:border-box;`;
  box.querySelectorAll('.handle').forEach(h=>h.style.pointerEvents='auto');
}

/* ===================== 渲染：属性 ===================== */
function renderProps(){
  const c=$('props');const el=getEl(selElId);
  if(!el){
    const p=curPage();
    c.innerHTML=`<div class="prop-empty">未选中元素<br><br>选中元素以编辑属性<br>或设置当前页背景</div><div class="prop-title">页面设置</div><div class="prop-row"><label>背景</label><input type="color" id="pgBg" value="${p?p.background:'#ffffff'}"></div>`;
    const bg=$('pgBg');if(bg)bg.oninput=e=>{curPage().background=e.target.value;$('stage').style.background=e.target.value;renderThumbs();};
    return;
  }
  const isText=el.type==='text';
  c.innerHTML=`
    <div class="prop-title">${isText?'文本框':'图片'}</div>
    <div class="prop-row"><label>X</label><input type="number" id="pX" value="${Math.round(el.x)}"></div>
    <div class="prop-row"><label>Y</label><input type="number" id="pY" value="${Math.round(el.y)}"></div>
    <div class="prop-row"><label>宽</label><input type="number" id="pW" value="${Math.round(el.width)}"></div>
    <div class="prop-row"><label>高</label><input type="number" id="pH" value="${Math.round(el.height)}"></div>
    <div class="prop-row"><label>透明度</label><input type="range" id="pOpa" min="0" max="1" step="0.05" value="${el.opacity!=null?el.opacity:1}"></div>
    <div class="prop-row"><label>背景</label><input type="color" id="pBg" value="${el.backgroundColor&&el.backgroundColor!=='transparent'?el.backgroundColor:'#ffffff'}"><button class="pbtn" id="pBgClear" style="width:34px;flex:none;padding:0">无</button></div>
    <div class="prop-divider"></div>
    ${isText?`
      <div class="prop-row"><label>字号</label><input type="number" id="pFs" value="${el.fontSize}" min="6" max="300"></div>
      <div class="prop-row"><label>颜色</label><input type="color" id="pCol" value="${el.color}"></div>
      <div class="prop-row"><label>粗细</label><select id="pFw"><option value="300" ${el.fontWeight==='300'?'selected':''}>细</option><option value="400" ${el.fontWeight==='400'?'selected':''}>常规</option><option value="500" ${el.fontWeight==='500'?'selected':''}>中</option><option value="700" ${el.fontWeight==='700'?'selected':''}>粗</option><option value="900" ${el.fontWeight==='900'?'selected':''}>特粗</option></select></div>
      <div class="prop-row"><label>样式</label><div class="seg" id="pStyle"><button data-v="normal" ${el.fontStyle==='normal'?'class="active"':''}>正</button><button data-v="italic" ${el.fontStyle==='italic'?'class="active"':''}>斜</button></div></div>
      <div class="prop-row"><label>对齐</label><div class="seg" id="pAlign"><button data-v="left" ${el.textAlign==='left'?'class="active"':''}>左</button><button data-v="center" ${el.textAlign==='center'?'class="active"':''}>中</button><button data-v="right" ${el.textAlign==='right'?'class="active"':''}>右</button></div></div>
      <div class="prop-row"><label>行高</label><input type="number" id="pLh" value="${el.lineHeight}" min="0.8" max="4" step="0.1"></div>
    `:`
      <div class="prop-row"><label>填充</label><div class="seg" id="pFit"><button data-v="contain" ${el.objectFit==='contain'?'class="active"':''}>完整</button><button data-v="cover" ${el.objectFit==='cover'?'class="active"':''}>填充</button><button data-v="fill" ${el.objectFit==='fill'?'class="active"':''}>拉伸</button></div></div>
    `}
    <div class="prop-divider"></div>
    <div class="btns-row"><button class="pbtn" id="btnDup">复制</button><button class="pbtn danger" id="btnDel">删除</button></div>
  `;
  const bind=(id,fn)=>{const n=$(id);if(n)n.oninput=fn;};
  bind('pX',e=>{el.x=+e.target.value;updateElNode(el);renderSelBox();renderThumbs();});
  bind('pY',e=>{el.y=+e.target.value;updateElNode(el);renderSelBox();renderThumbs();});
  bind('pW',e=>{el.width=Math.max(MIN_W,+e.target.value);updateElNode(el);renderSelBox();renderThumbs();});
  bind('pH',e=>{el.height=Math.max(MIN_H,+e.target.value);updateElNode(el);renderSelBox();renderThumbs();});
  bind('pOpa',e=>{el.opacity=+e.target.value;updateElNode(el);renderThumbs();});
  bind('pBg',e=>{el.backgroundColor=e.target.value;updateElNode(el);renderThumbs();});
  const bgC=$('pBgClear');if(bgC)bgC.onclick=()=>{el.backgroundColor='transparent';renderProps();updateElNode(el);renderThumbs();};
  if(isText){
    bind('pFs',e=>{el.fontSize=+e.target.value;updateElNode(el);renderThumbs();});
    bind('pCol',e=>{el.color=e.target.value;updateElNode(el);renderThumbs();});
    bind('pFw',e=>{el.fontWeight=e.target.value;updateElNode(el);renderThumbs();});
    bind('pLh',e=>{el.lineHeight=+e.target.value;updateElNode(el);renderThumbs();});
    const stl=$('pStyle');if(stl)stl.querySelectorAll('button').forEach(b=>b.onclick=()=>{el.fontStyle=b.dataset.v;renderProps();updateElNode(el);renderThumbs();});
    const al=$('pAlign');if(al)al.querySelectorAll('button').forEach(b=>b.onclick=()=>{el.textAlign=b.dataset.v;renderProps();updateElNode(el);renderThumbs();});
  }else{
    const ft=$('pFit');if(ft)ft.querySelectorAll('button').forEach(b=>b.onclick=()=>{el.objectFit=b.dataset.v;renderProps();updateElNode(el);renderThumbs();});
  }
  const bd=$('btnDup');if(bd)bd.onclick=()=>duplicateEl();
  const bdel=$('btnDel');if(bdel)bdel.onclick=()=>deleteEl();
}

/* ===================== 渲染：图层 ===================== */
function renderLayers(){
  const c=$('layers');const p=curPage();if(!p){c.innerHTML='';return;}
  if(!p.elements.length){c.innerHTML='<div class="layer-empty">暂无元素</div>';return;}
  const sorted=[...p.elements].sort((a,b)=>b.zIndex-a.zIndex);
  c.innerHTML=sorted.map(e=>{
    const txt=e.type==='text'?(e.content.replace(/<[^>]+>/g,'').slice(0,14)||'空文本'):'图片元素';
    return `<div class="layer-row ${e.id===selElId?'active':''}" data-id="${e.id}"><span class="lic">${e.type==='text'?'T':'◧'}</span><span class="lname">${txt}</span></div>`;
  }).join('');
  c.querySelectorAll('.layer-row').forEach(r=>{r.onclick=()=>selectEl(r.dataset.id);});
}

function updateElNode(el){
  const node=$('stage').querySelector(`.el[data-id="${el.id}"]`);
  if(!node){renderCanvas();return;}
  node.style.cssText='position:absolute;'+elOuterStyle(el);
  if(el.type==='text'){
    const inner=node.querySelector('.el-text-inner');
    if(inner)inner.style.cssText=`font-size:${el.fontSize}px;color:${el.color};font-weight:${el.fontWeight};font-style:${el.fontStyle};text-align:${el.textAlign};font-family:${el.fontFamily};line-height:${el.lineHeight};`;
  }else{
    const img=node.querySelector('img');if(img){img.style.objectFit=el.objectFit||'contain';img.src=el.src||'';}
  }
}
function renderAll(){renderThumbs();renderCanvas();renderProps();renderLayers();fitStage();}

/* ===================== 画布适配 ===================== */
function fitStage(){
  const area=$('canvasArea'),vp=$('stageViewport'),st=$('stage');const pad=48;
  let scale=Math.min((area.clientWidth-pad)/STAGE_W,(area.clientHeight-pad)/STAGE_H);
  scale=clamp(scale,0.05,1);
  vp.style.width=(STAGE_W*scale)+'px';vp.style.height=(STAGE_H*scale)+'px';
  st.style.transform=`scale(${scale})`;
}
function stageScale(){const r=$('stage').getBoundingClientRect();return r.width/STAGE_W||1;}

/* ===================== 选择 ===================== */
function selectEl(id){
  if(selElId){const old=$('stage').querySelector(`.el[data-id="${selElId}"]`);if(old)old.classList.remove('selected');}
  selElId=id;
  if(id){const node=$('stage').querySelector(`.el[data-id="${id}"]`);if(node)node.classList.add('selected');}
  renderSelBox();renderProps();renderLayers();
}
function selectPage(i){if(i==null||isNaN(i)||i<0||i>=state.pages.length)return;curPageIdx=i;selElId=null;isEditing=false;$('pageInfo').textContent=`第 ${i+1} 页`;renderAll();}

/* ===================== 拖动与缩放 ===================== */
let drag=null;
$('stage').addEventListener('mousedown',e=>{
  if(isEditing)return;
  const handle=e.target.closest('.handle');
  if(handle){e.preventDefault();const el=getEl(selElId);if(!el)return;
    const rect=$('stage').getBoundingClientRect();const sc=rect.width/STAGE_W||1;
    drag={mode:'resize',dir:handle.dataset.h,sx:e.clientX,sy:e.clientY,ox:el.x,oy:el.y,ow:el.width,oh:el.height,
      smx:(e.clientX-rect.left)/sc,smy:(e.clientY-rect.top)/sc};
    return;}
  const elNode=e.target.closest('.el');
  if(elNode){const id=elNode.dataset.id;if(id!==selElId)selectEl(id);const el=getEl(id);drag={mode:'move',id,sx:e.clientX,sy:e.clientY,ox:el.x,oy:el.y};e.preventDefault();}
  else{selectEl(null);}
});
document.addEventListener('mousemove',e=>{
  if(!drag)return;const s=stageScale();const dx=(e.clientX-drag.sx)/s,dy=(e.clientY-drag.sy)/s;
  if(drag.mode==='move'){const el=getEl(drag.id);if(!el)return;el.x=drag.ox+dx;el.y=drag.oy+dy;updateElNode(el);renderSelBox();}
  else if(drag.mode==='resize'){
    const el=getEl(selElId);if(!el)return;
    let ox=drag.ox,oy=drag.oy,w=drag.ow,h=drag.oh;const d=drag.dir;
    // 图片保持原始比例
    let aspect=null;
    if(el.type==='image'){
      const img=$('stage').querySelector(`.el[data-id="${el.id}"] img`);
      if(img&&img.naturalWidth&&img.naturalHeight)aspect=img.naturalWidth/img.naturalHeight;
    }
    if(aspect){
      // 用鼠标绝对位置投影到对角线方向，避免主导方向切换导致突变
      const mx=drag.smx+dx,my=drag.smy+dy;
      if(d.length===2){ // 角点
        let Fx,Fy,sgnx,sgny; // 固定的对角点 + 移动方向符号
        if(d==='se'){Fx=drag.ox;Fy=drag.oy;sgnx=1;sgny=1;}
        else if(d==='nw'){Fx=drag.ox+drag.ow;Fy=drag.oy+drag.oh;sgnx=-1;sgny=-1;}
        else if(d==='ne'){Fx=drag.ox;Fy=drag.oy+drag.oh;sgnx=1;sgny=-1;}
        else /*sw*/{Fx=drag.ox+drag.ow;Fy=drag.oy;sgnx=-1;sgny=1;}
        const vx=(mx-Fx)*sgnx,vy=(my-Fy)*sgny; // 转到正方向
        const denom=aspect*aspect+1;
        let t=(vx*aspect+vy)/denom; // 沿 (aspect,1) 方向的投影长度
        if(t<MIN_W/aspect)t=MIN_W/aspect;
        w=t*aspect;h=t;
        if(sgnx<0)ox=Fx-w;else ox=Fx;
        if(sgny<0)oy=Fy-h;else oy=Fy;
      }else if(d==='e'||d==='w'){
        w=drag.ow+(d==='e'?dx:-dx);
        if(w<MIN_W)w=MIN_W;
        h=w/aspect;
        if(d==='w')ox=drag.ox+drag.ow-w;
      }else{ // n / s
        h=drag.oh+(d==='s'?dy:-dy);
        if(h<MIN_H)h=MIN_H;
        w=h*aspect;
        if(d==='n')oy=drag.oy+drag.oh-h;
      }
    }else{
      if(d.includes('e'))w=drag.ow+dx;
      if(d.includes('s'))h=drag.oh+dy;
      if(d.includes('w')){w=drag.ow-dx;ox=drag.ox+dx;}
      if(d.includes('n')){h=drag.oh-dy;oy=drag.oy+dy;}
      if(w<MIN_W){if(d.includes('w'))ox=drag.ox+drag.ow-MIN_W;w=MIN_W;}
      if(h<MIN_H){if(d.includes('n'))oy=drag.oy+drag.oh-MIN_H;h=MIN_H;}
    }
    el.x=ox;el.y=oy;el.width=w;el.height=h;updateElNode(el);renderSelBox();
  }
});
document.addEventListener('mouseup',()=>{if(drag){drag=null;renderProps();renderThumbs();}});

/* ===================== 内联文本编辑 ===================== */
$('stage').addEventListener('dblclick',e=>{
  const elNode=e.target.closest('.el.el-text');if(!elNode)return;
  const id=elNode.dataset.id;selectEl(id);const el=getEl(id);if(!el)return;
  const inner=elNode.querySelector('.el-text-inner');
  inner.setAttribute('contenteditable','true');inner.focus();
  const r=document.createRange();r.selectNodeContents(inner);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);
  isEditing=true;
  inner.addEventListener('blur',()=>{inner.removeAttribute('contenteditable');el.content=inner.innerHTML;isEditing=false;renderThumbs();renderLayers();},{once:true});
});

/* ===================== 键盘 ===================== */
document.addEventListener('keydown',e=>{
  if(isEditing)return;const el=getEl(selElId);
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='Delete'||e.key==='Backspace'){if(el){e.preventDefault();deleteEl();}}
  else if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='d'){if(el){e.preventDefault();duplicateEl();}}
  else if(e.key==='Escape'){selectEl(null);}
  else if(el&&e.key.startsWith('Arrow')){e.preventDefault();const step=e.shiftKey?10:1;
    if(e.key==='ArrowLeft')el.x-=step;if(e.key==='ArrowRight')el.x+=step;if(e.key==='ArrowUp')el.y-=step;if(e.key==='ArrowDown')el.y+=step;
    updateElNode(el);renderSelBox();renderProps();renderThumbs();}
});

/* ===================== 元素操作 ===================== */
function addText(){const p=curPage();const el={id:uid('e'),type:'text',x:480,y:300,width:320,height:90,zIndex:nextZ(p),content:'双击编辑文本',fontSize:32,color:'#2d3436',fontWeight:'400',fontStyle:'normal',textAlign:'center',fontFamily:'"Noto Sans SC",sans-serif',lineHeight:1.4,backgroundColor:'transparent',opacity:1};p.elements.push(el);selectEl(el.id);renderAll();toast('已添加文本框');}
function addImageEl(src){const p=curPage();const el={id:uid('e'),type:'image',x:490,y:240,width:300,height:200,zIndex:nextZ(p),src,objectFit:'contain',backgroundColor:'transparent',opacity:1};p.elements.push(el);selectEl(el.id);renderAll();toast('已添加图片');}
function deleteEl(){if(!selElId)return;const p=elPage(selElId);if(!p)return;p.elements=p.elements.filter(e=>e.id!==selElId);selElId=null;renderAll();toast('已删除');}
function duplicateEl(){const el=getEl(selElId);if(!el)return;const p=elPage(el.id);const copy=JSON.parse(JSON.stringify(el));copy.id=uid('e');copy.x+=20;copy.y+=20;copy.zIndex=nextZ(p);p.elements.push(copy);selectEl(copy.id);renderAll();toast('已复制');}
function changeLayer(act){const el=getEl(selElId);if(!el)return;const p=elPage(el.id);const sorted=[...p.elements].sort((a,b)=>a.zIndex-b.zIndex);const idx=sorted.findIndex(e=>e.id===el.id);
  if(act==='top')el.zIndex=nextZ(p);
  else if(act==='bottom'){const min=Math.min(...p.elements.map(e=>e.zIndex));el.zIndex=min-1;}
  else if(act==='up'&&idx<sorted.length-1){const n=sorted[idx+1];const t=el.zIndex;el.zIndex=n.zIndex;n.zIndex=t;}
  else if(act==='down'&&idx>0){const n=sorted[idx-1];const t=el.zIndex;el.zIndex=n.zIndex;n.zIndex=t;}
  renderAll();
}

/* ===================== 页面操作 ===================== */
function addPage(){state.pages.push({id:uid('p'),background:'#ffffff',elements:[]});selectPage(state.pages.length-1);toast('已新增页');}
function deletePage(i){if(state.pages.length<=1){toast('至少保留一页');return;}state.pages.splice(i,1);if(curPageIdx>=state.pages.length)curPageIdx=state.pages.length-1;selectPage(curPageIdx);}
function newPresentation(){state={version:1,pages:[{id:uid('p'),background:'#ffffff',elements:[]}]};curPageIdx=0;selElId=null;isEditing=false;$('pageInfo').textContent='第 1 页';renderAll();toast('已新建空白文稿');}

function viewerJS(){
  return 'var pages=document.querySelectorAll(".page"),cur=0,total=pages.length;'
    +'var dotsEl=document.getElementById("dots"),counter=document.getElementById("counter");'
    +'for(var i=0;i<total;i++){var d=document.createElement("div");d.className="dot"+(i===0?" active":"");d.onclick=function(x){return function(){go(x)}}(i);dotsEl.appendChild(d);}'
    +'function go(i){if(i<0||i>=total||i===cur)return;pages[cur].classList.remove("active");cur=i;pages[cur].classList.add("active");update()}'
    +'function update(){var ds=document.querySelectorAll(".dot");ds.forEach(function(d,x){d.classList.toggle("active",x===cur)});counter.textContent=(cur+1)+" / "+total;fit()}'

    });
  }
  var dotsEl=document.getElementById('pvDots');
  function buildDots(){dotsEl.innerHTML='';for(var i=0;i<total;i++){var d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.onclick=function(x){return function(){go(x)}}(i);dotsEl.appendChild(d);}}
  function go(i){if(i<0||i>=total||i===cur)return;var ps=document.querySelectorAll('#pvStage .page');ps[cur].classList.remove('active');cur=i;ps[cur].classList.add('active');update();}
  function update(){var ds=document.querySelectorAll('#pvDots .dot');ds.forEach(function(d,x){d.classList.toggle('active',x===cur)});document.getElementById('pvCounter').textContent=(cur+1)+' / '+total;fit();}
  function fit(){var sc=Math.min(window.innerWidth/1280,window.innerHeight/720);document.getElementById('pvStage').style.transform='scale('+sc+')';}
  function fitThumbs(){var ts=document.querySelectorAll('.thumb-canvas');ts.forEach(function(c){var w=c.parentElement.clientWidth;var sc=w/1280;c.style.transform='scale('+sc+')';c.parentElement.style.height=(w*720/1280)+'px';});}
  function open(){buildStage();buildDots();cur=0;document.getElementById('pv').classList.add('open');fit();}
  function close(){document.getElementById('pv').classList.remove('open');}
  document.getElementById('playBtn').onclick=open;
  document.getElementById('pvPrev').onclick=function(){go(cur-1)};
  document.getElementById('pvNext').onclick=function(){go(cur+1)};
  document.getElementById('pvClose').onclick=close;
  document.addEventListener('keydown',function(e){if(!document.getElementById('pv').classList.contains('open'))return;if(e.key==='ArrowRight'||e.key===' ')go(cur+1);else if(e.key==='ArrowLeft')go(cur-1);else if(e.key==='Escape')close();});
  window.addEventListener('resize',function(){fitThumbs();if(document.getElementById('pv').classList.contains('open'))fit();});
  fitThumbs();
})();
<\/script></body></html>`;
}

function download(filename,content,type){
  const blob=new Blob([content],{type:type||'text/html;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
}

function exportSingle(){
  if(!state.pages.length){toast('暂无页面');return;}
  download('slidecraft-presentation.html',buildSingleHTML());
  toast('已导出单文件 HTML');
}

function exportMulti(){
  if(!state.pages.length){toast('暂无页面');return;}
  if(typeof JSZip==='undefined'){toast('JSZip 未加载，无法打包');return;}
  const zip=new JSZip();
  zip.file('index.html',buildIndexHTML());
  state.pages.forEach((p,i)=>{zip.file(`page-${i+1}.html`,buildPageFileHTML(p,i,state.pages.length));});
  zip.generateAsync({type:'blob'}).then(blob=>{
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='slidecraft-multi.zip';document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},200);
    toast('已导出多文件 zip');
  });
}

/* ===================== 导入 ===================== */
function importFromFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    let text=reader.result;
    const m=text.match(new RegExp('<script id="'+DATA_TAG+'" type="application/json">([\\s\\S]*?)<\\/script>'));
    if(!m){toast('未发现 SlideCraft 数据，请选择本工具导出的文件');return;}
    let jsonStr=m[1].replace(/\\u003c/g,'<');
    try{
      const data=JSON.parse(jsonStr);
      if(!data||!Array.isArray(data.pages)||!data.pages.length){toast('数据格式无效');return;}
      state={version:1,pages:data.pages.map(p=>({id:p.id||uid('p'),background:p.background||'#ffffff',elements:(p.elements||[]).map(e=>({...e,id:e.id||uid('e')}))}))};
      curPageIdx=0;selElId=null;isEditing=false;
      $('pageInfo').textContent='第 1 页';
      renderAll();toast('已导入 '+(state.pages.length)+' 页');
    }catch(err){toast('解析失败：'+err.message);}
  };
  reader.readAsText(file);
}

/* ===================== 图片模态 ===================== */
let pendingImgSrc=null;
function openImgModal(){
  pendingImgSrc=null;
  $('imgUrl').value='';
  $('imgPreview').style.display='none';
  $('imgPreview').src='';
  $('imgFile').value='';
  $('imgModal').classList.add('open');
}
function closeImgModal(){ $('imgModal').classList.remove('open'); }
function confirmImg(){
  const src=$('imgUrl').value.trim() || pendingImgSrc;
  if(!src){ toast('请选择图片或输入 URL'); return; }
  closeImgModal(); addImageEl(src);
}

/* ===================== 事件绑定与初始化 ===================== */
function init(){
  // 顶栏
  $('btnNew').onclick=()=>{ if(confirm('新建将清空当前内容，确认？')) newPresentation(); };
  $('btnImport').onclick=()=>{ const inp=document.createElement('input');inp.type='file';inp.accept='.html,.htm';inp.onchange=()=>{if(inp.files[0])importFromFile(inp.files[0]);};inp.click(); };
  $('btnExport').onclick=e=>{e.stopPropagation();$('exportMenu').classList.toggle('open');};
  document.addEventListener('click',()=>$('exportMenu').classList.remove('open'));
  $('exportMenu').querySelectorAll('.menu-item').forEach(it=>{it.onclick=()=>{const a=it.dataset.act;$('exportMenu').classList.remove('open');a==='single'?exportSingle():exportMulti();};});
  $('btnAddPage').onclick=addPage;$('btnAddPage2').onclick=addPage;
  $('btnAddText').onclick=addText;
  $('btnAddImage').onclick=()=>openImgModal();
  // 图片模态
  $('imgCancel').onclick=closeImgModal;
  $('imgOk').onclick=confirmImg;
  $('imgModal').onclick=e=>{if(e.target===$('imgModal'))closeImgModal();};
  $('imgFile').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ pendingImgSrc=r.result; const pv=$('imgPreview'); pv.src=r.result; pv.style.display='block'; };
    r.readAsDataURL(f);
  };
  // 图层工具
  $('ltTop').onclick=()=>changeLayer('top');
  $('ltUp').onclick=()=>changeLayer('up');
  $('ltDown').onclick=()=>changeLayer('down');
  $('ltBottom').onclick=()=>changeLayer('bottom');
  // 缩略图委托
  $('thumbs').addEventListener('click',e=>{
    const del=e.target.closest('.thumb-del');
    if(del){e.stopPropagation();deletePage(+del.dataset.del);return;}
    const t=e.target.closest('.thumb');if(t)selectPage(+t.dataset.idx);
  });
  // 适配
  window.addEventListener('resize',fitStage);
  new ResizeObserver(fitStage).observe($('canvasArea'));

  newPresentation();
}
init();
</script>
