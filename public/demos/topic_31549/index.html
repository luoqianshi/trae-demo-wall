<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>日用有方 — AI 生活风险顾问</title>
<link rel="stylesheet" href="tailwind.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000; --bg-1:#1C1C1E; --bg-2:#2C2C2E; --bg-3:#3A3A3C; --bg-4:#48484A;
  --line:rgba(84,84,88,0.36); --line-2:rgba(84,84,88,0.55);
  --text:#FFFFFF; --t2:rgba(235,235,245,0.6); --t3:rgba(235,235,245,0.3);
  --danger:#FF453A; --warning:#FF9F0A; --success:#30D158; --info:#0A84FF; --accent:#FFD60A;
}
*{ -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
html,body{ margin:0; padding:0; background:#000; color:var(--text); font-family:-apple-system,'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
body{ overflow-x:hidden; min-height:100vh; display:flex; align-items:center; justify-content:center; }
::-webkit-scrollbar{ width:0; height:0; }

/* ===== iPhone Frame ===== */
.iphone{
  width:390px; height:844px; background:#000; border-radius:55px; position:relative; z-index:1;
  box-shadow:0 0 0 11px #1C1C1E, 0 0 0 12px #3A3A3C, 0 40px 80px -16px rgba(0,0,0,0.8);
  overflow:hidden; flex-shrink:0;
}
.iphone-screen{ width:100%; height:100%; overflow-y:auto; overflow-x:hidden; position:relative; background:var(--bg); }
.iphone-screen::-webkit-scrollbar{ width:0; }

/* Dynamic Island */
.island{ position:absolute; top:11px; left:50%; transform:translateX(-50%); width:120px; height:35px; background:#000; border-radius:20px; z-index:100; }

/* Status Bar */
.statusbar{ position:absolute; top:0; left:0; right:0; height:54px; z-index:90; display:flex; align-items:center; justify-content:space-between; padding:0 32px; padding-top:14px; }
.status-time{ font-size:15px; font-weight:600; color:var(--text); }
.status-icons{ display:flex; align-items:center; gap:6px; color:var(--text); }
.status-icons i{ font-size:13px; }
.battery{ width:24px; height:12px; border:1.5px solid var(--text); border-radius:3px; position:relative; padding:1px; }
.battery::after{ content:''; position:absolute; right:-3px; top:3px; width:2px; height:4px; background:var(--text); border-radius:0 1px 1px 0; }
.battery-fill{ width:80%; height:100%; background:var(--text); border-radius:1px; }

/* Home Indicator */
.home-indicator{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:var(--text); border-radius:3px; z-index:100; opacity:0.9; }

/* Content area */
.content{ padding-top:60px; padding-bottom:100px; min-height:100%; position:relative; }

/* ===== Bottom Nav ===== */
.bottomnav{
  position:absolute; bottom:0; left:0; right:0; height:83px; z-index:80;
  background:rgba(28,28,30,0.92); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:0.5px solid var(--line);
  display:flex; align-items:flex-start; justify-content:space-around; padding-top:7px;
}
.nav-item{ display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; padding:4px 12px; transition:opacity .15s; }
.nav-item i{ font-size:22px; color:var(--t3); }
.nav-item span{ font-size:10px; color:var(--t3); font-weight:500; }
.nav-item.active i{ color:var(--info); }
.nav-item.active span{ color:var(--info); }
.nav-item:active{ opacity:0.6; }

/* ===== Surfaces ===== */
.glass{ background:rgba(28,28,30,0.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
.card{ background:var(--bg-1); border-radius:12px; overflow:hidden; }
.card-2{ background:var(--bg-2); border-radius:10px; }
.card-group{ background:var(--bg-1); border-radius:12px; overflow:hidden; }
.card-alert{
  background:var(--bg-1); border-radius:12px; overflow:hidden;
  border-left:4px solid var(--danger);
}
.feature-row{
  display:flex; align-items:center; gap:14px; padding:14px 16px;
  background:var(--bg-1); transition:opacity .15s; width:100%; text-align:left;
  user-select:none; -webkit-user-select:none; cursor:pointer; border:0; color:inherit; font:inherit;
}
.feature-row:active{ opacity:0.7; }
.feature-row+.feature-row{ border-top:0.5px solid var(--line); }
.feature-icon{
  width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px;
}
.feature-icon-blue{ background:var(--info); color:#fff; }
.feature-icon-green{ background:var(--success); color:#fff; }
.section-title{ font-size:20px; font-weight:700; letter-spacing:-0.4px; }
.section-sub{ font-size:13px; color:var(--t2); font-weight:400; margin-top:2px; }
.card-title{ font-size:17px; font-weight:600; letter-spacing:-0.3px; }

/* ===== Risk ===== */
.risk-high{ background:rgba(255,69,58,0.18); color:#FF6961; font-weight:600; }
.risk-medium{ background:rgba(255,159,10,0.18); color:#FFB340; font-weight:600; }
.risk-low{ background:rgba(48,209,88,0.18); color:#4ADE80; font-weight:600; }
.tag{ display:inline-block; font-size:11px; padding:4px 10px; border-radius:6px; font-weight:500; }
.tip-tag{ font-size:11px; padding:5px 10px; border-radius:8px; background:var(--bg-2); color:var(--t2); }

/* Profile */
.user-avatar{
  border-radius:50%; flex-shrink:0; position:relative;
  background:linear-gradient(135deg,#0A84FF 0%,#30D158 100%);
  padding:2.5px; box-shadow:0 6px 20px rgba(10,132,255,0.28);
}
.user-avatar-inner{
  width:100%; height:100%; border-radius:50%;
  background:linear-gradient(160deg,#1A2F4A 0%,#0D1B2E 100%);
  display:flex; align-items:center; justify-content:center;
  color:#fff; border:1.5px solid rgba(255,255,255,0.12);
}
.level-pill{
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:600; color:var(--success);
  background:rgba(48,209,88,0.12); padding:5px 12px; border-radius:20px;
}
.profile-stats-grid{
  display:grid; grid-template-columns:repeat(3,1fr);
  border-top:0.5px solid var(--line); padding-top:16px; margin-top:4px;
}
.profile-stats-grid > div{ text-align:center; position:relative; }
.profile-stats-grid > div:not(:last-child)::after{
  content:''; position:absolute; right:0; top:15%; height:70%;
  width:0.5px; background:var(--line);
}

/* ===== Animations ===== */
@keyframes fadeUp{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn{ from{opacity:0} to{opacity:1} }
@keyframes scaleIn{ from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
@keyframes pulse{ 0%,100%{opacity:.4;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
@keyframes scan{ 0%{top:0;opacity:0} 8%{opacity:1} 92%{opacity:1} 100%{top:100%;opacity:0} }
@keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes shimmer{ 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:0} }
.ai-more > *{ opacity:0; transform:translateY(8px); transition:opacity .4s cubic-bezier(.22,1,.36,1), transform .4s cubic-bezier(.22,1,.36,1); }
.ai-more > *.ai-revealed{ opacity:1; transform:none; }
.ai-cursor{ display:inline-block; color:var(--info); animation:blink .9s infinite; margin-left:1px; }
.chat-user-enter{ animation:fadeUp .35s cubic-bezier(.22,1,.36,1) both; }
@keyframes glowPulse{ 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes cornerPulse{ 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes stepDone{ from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

.a-fadeUp{ animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both; }
.a-fadeIn{ animation:fadeIn .4s ease both; }
.a-scaleIn{ animation:scaleIn .4s cubic-bezier(.22,1,.36,1) both; }
.a-float{ animation:float 4s ease-in-out infinite; }
.stagger>*{ opacity:0; animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both; }
.stagger>*:nth-child(1){animation-delay:.03s} .stagger>*:nth-child(2){animation-delay:.06s}
.stagger>*:nth-child(3){animation-delay:.09s} .stagger>*:nth-child(4){animation-delay:.12s}
.stagger>*:nth-child(5){animation-delay:.15s} .stagger>*:nth-child(6){animation-delay:.18s}
.stagger>*:nth-child(7){animation-delay:.21s} .stagger>*:nth-child(8){animation-delay:.24s}

.skeleton{ background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 37%,rgba(255,255,255,.03) 63%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
.scan-line{ position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#30D158,transparent); box-shadow:0 0 16px #30D158; animation:scan 2.2s ease-in-out infinite; }
.scan-grid{ background-image:linear-gradient(rgba(50,215,75,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(50,215,75,.06) 1px,transparent 1px); background-size:24px 24px; }

.lift:active{ opacity:0.7; }

.num{ font-family:'JetBrains Mono',monospace; font-feature-settings:'tnum'; }
.display{ letter-spacing:-.03em; }
.tight{ letter-spacing:-.02em; }

/* Chat */
.chat-user{ background:var(--info); color:#fff; border-radius:18px 18px 4px 18px; }
.chat-ai{ background:var(--bg-1); border-radius:4px 18px 18px 18px; }
.chat-input-wrap{ background:var(--bg-1); border-radius:22px; }
.chat-input-wrap:focus-within{ outline:1px solid rgba(10,132,255,0.5); }
.send-btn{ background:var(--info); color:#fff; border-radius:50%; }
.send-btn:active{ opacity:0.7; }

/* Scan */
.scan-frame{ position:relative; }
.scan-corner{ position:absolute; width:20px; height:20px; border-color:var(--success); border-style:solid; animation:cornerPulse 2s ease-in-out infinite; }
.scan-corner-tl{ top:12px; left:12px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
.scan-corner-tr{ top:12px; right:12px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
.scan-corner-bl{ bottom:12px; left:12px; border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
.scan-corner-br{ bottom:12px; right:12px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

/* Stat */
.stat-card{ background:var(--bg-1); border-radius:12px; text-align:center; padding:14px; }

/* Primary btn */
.btn-primary{ background:var(--info); color:#fff; font-weight:600; border-radius:12px; }
.btn-primary:active{ opacity:0.7; }

/* Back btn */
.back-btn{ width:32px; height:32px; border-radius:50%; background:var(--bg-2); display:flex; align-items:center; justify-content:center; color:var(--info); flex-shrink:0; }
.back-btn:active{ opacity:0.6; }

/* Chat layout — fill screen, input pinned above bottom nav */
.iphone-screen-chat{ overflow:hidden; height:100%; }
.content-chat{
  padding-top:60px; padding-bottom:83px; height:100%; box-sizing:border-box;
  display:flex; flex-direction:column; min-height:0;
}
.chat-page{ flex:1; display:flex; flex-direction:column; min-height:0; }
.chat-scroll{ flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.chat-scroll.chat-preparing{ visibility:hidden; }
.chat-input-bar{
  flex-shrink:0; padding-top:10px; padding-bottom:4px;
  background:var(--bg); border-top:0.5px solid var(--line);
}

/* Typing dots */
.typing span{ display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--t2); margin:0 2px; animation:pulse 1s infinite; }
.typing span:nth-child(2){ animation-delay:.2s; } .typing span:nth-child(3){ animation-delay:.4s; }

/* Admin */
.admin-wrap{ width:100vw; height:100vh; background:var(--bg); display:flex; overflow:hidden; position:relative; z-index:1; }
.admin-wrap::before{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 80% 20%, rgba(10,132,255,0.06) 0%, transparent 50%);
}
.admin-side{ width:240px; flex-shrink:0; border-right:0.5px solid var(--line); background:var(--bg-1); display:flex; flex-direction:column; position:relative; z-index:1; }
.admin-main{ flex:1; overflow-y:auto; position:relative; z-index:1; }
.admin-card{ background:var(--bg-1); border-radius:12px; }
.admin-nav-active{ background:var(--bg-2) !important; }

/* Toggle */
.toggle{ width:44px; height:26px; border-radius:13px; position:relative; cursor:pointer; transition:background .2s; }
.toggle.on{ background:var(--text); } .toggle.off{ background:var(--bg-4); }
.toggle::after{ content:''; position:absolute; top:2px; width:22px; height:22px; border-radius:50%; background:var(--bg); transition:all .2s; }
.toggle.on::after{ right:2px; } .toggle.off::after{ left:2px; background:var(--t2); }

/* Progress */
.bar{ height:6px; background:rgba(255,255,255,.05); border-radius:3px; overflow:hidden; }
.bar-fill{ height:100%; border-radius:3px; transition:width 1.2s cubic-bezier(.22,1,.36,1); background:linear-gradient(90deg, var(--info), var(--accent)); }

/* No scrollbar */
.no-bar{ scrollbar-width:none; } .no-bar::-webkit-scrollbar{ display:none; }

/* Responsive: mobile fills screen */
@media(max-width:480px){
  body{ background:var(--bg); }
  .iphone{ width:100vw; height:100vh; height:100dvh; border-radius:0; box-shadow:none; }
  .island{ display:none; }
  .statusbar{ padding-top:10px; height:48px; }
  .home-indicator{ display:none; }
}
</style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script>
/* ============================================================
   日用有方 — 最终版
   ============================================================ */

/* ---------- Router & Navigation ---------- */
function clearImageState(){
  S.imgMode=null; S.imgResult=null; S.imgAnalyzing=false; S.imgCase=null; S.aidCase=null;
}
function imageDepth(){
  if(S.imgAnalyzing) return 5;
  if(S.imgResult) return 4;
  if(S.aidCase) return 3;
  if(S.imgMode) return 2;
  return 1;
}
function canGoBack(){
  return imageDepth()>1 || Router.stack.length>1;
}
function navBack(){
  if(S.imgAnalyzing){ S.imgAnalyzing=false; S.imgCase=null; render(); return; }
  if(S.imgResult){ S.imgResult=null; S.imgCase=null; render(); return; }
  if(S.aidCase){ S.aidCase=null; render(); return; }
  if(S.imgMode){ S.imgMode=null; render(); return; }
  if(Router.stack.length>1) Router.back();
}
function setImgMode(id){
  S.imgMode=id; S.aidCase=null; S.imgResult=null; S.imgAnalyzing=false; S.imgCase=null;
  render();
}
function setAidCase(id){
  S.aidCase=id; S.imgResult=null; S.imgAnalyzing=false;
  render();
}

const Router = {
  stack:[{page:'home',params:{}}],
  cur(){ return this.stack[this.stack.length-1]; },
  push(p,pr={}){
    if(this.cur().page!==p) clearImageState();
    this.stack.push({page:p,params:pr});
    render(); this.scrollTop();
  },
  back(){ if(this.stack.length>1){ this.stack.pop(); clearImageState(); render(); this.scrollTop(); } },
  reset(p='home',pr={}){
    if(this.cur().page!==p) clearImageState();
    this.stack=[{page:p,params:pr}];
    render(); this.scrollTop();
  },
  scrollTop(){
    if(this.cur().page==='chat') return;
    const s=document.querySelector('.iphone-screen,.admin-main');
    if(s) s.scrollTo({top:0,behavior:'instant'});
  }
};

/* ---------- State ---------- */
const S = {
  role:'user', adminTab:'dashboard',
  chat:[], imgMode:null, imgResult:null, imgAnalyzing:false, imgCase:null,
  aidCase:null, showGraph:true, _pendingAIAnim:false
};

/* ---------- Render ---------- */
function render(){
  document.getElementById('app').innerHTML = S.role==='admin' ? renderAdmin() : renderPhone();
  afterRender();
}

/* ============================================================
   iPhone Shell
   ============================================================ */
function renderPhone(){
  const pages={home:pHome,chat:pChat,image:pImage,archive:pArchive,me:pMe};
  const fn=pages[Router.cur().page]||pHome;
  const isChat=Router.cur().page==='chat';
  Object.assign(S,Router.cur().params);
  return `
  <div class="iphone">
    <div class="island"></div>
    <div class="statusbar">
      <span class="status-time">${clock()}</span>
      <div class="status-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>
    <div class="iphone-screen${isChat?' iphone-screen-chat':''}">
      <div class="content px-5${isChat?' content-chat':''}">
        ${isChat?fn():`<div class="a-fadeUp">${fn()}</div>`}
      </div>
    </div>
    ${renderBottomNav()}
    <div class="home-indicator"></div>
  </div>`;
}

function renderBottomNav(){
  const navs=[
    {id:'home',icon:'fa-house',label:'首页'},
    {id:'chat',icon:'fa-comments',label:'问答'},
    {id:'image',icon:'fa-camera',label:'识图'},
    {id:'archive',icon:'fa-chart-pie',label:'档案'},
    {id:'me',icon:'fa-user',label:'我的'},
  ];
  const cur=Router.cur().page;
  const show=['home','chat','image','archive','me'].includes(cur);
  if(!show) return '';
  return `<nav class="bottomnav">
    ${navs.map(n=>`<div class="nav-item ${cur===n.id?'active':''}" onclick="Router.reset('${n.id}')"><i class="fa-solid ${n.icon}"></i><span>${n.label}</span></div>`).join('')}
  </nav>`;
}

function backBtn(title,sub=''){
  if(!canGoBack()){
    return `<div class="mb-3 pt-1"><h1 class="text-[20px] font-bold tight">${title}</h1>${sub?`<p class="text-[12px] text-[var(--t2)] mt-1">${sub}</p>`:''}</div>`;
  }
  return `<div class="flex items-center gap-3 mb-5 a-fadeIn">
    <button onclick="navBack()" class="back-btn"><i class="fa-solid fa-chevron-left text-sm"></i></button>
    <div><h1 class="text-[17px] font-bold tight">${title}</h1>${sub?`<p class="text-[11px] text-[var(--t2)] mt-0.5">${sub}</p>`:''}</div>
  </div>`;
}

/* ============================================================
   首页
   ============================================================ */
function pHome(){
  const a=MOCK_DATA.todayAlert, hot=MOCK_DATA.hotQuestions, ev=MOCK_DATA.recentEvents;
  return `<div class="stagger">
    <div class="flex items-center justify-between mb-7 pt-1">
      <div>
        <p class="text-[13px] text-[var(--t2)] mb-0.5">${greeting()}</p>
        <h1 class="display text-[32px] font-bold leading-tight">日用有方</h1>
        <p class="text-[13px] text-[var(--t2)] mt-1">AI 生活风险顾问</p>
      </div>
      <button onclick="Router.push('me')" class="flex-shrink-0 border-0 bg-transparent p-0 cursor-pointer">${userAvatar(40)}</button>
    </div>

    <!-- 今日风险提醒 -->
    <div class="card-alert p-4 mb-6">
      <div class="flex items-center gap-2 mb-3">
        <span class="w-2 h-2 rounded-full bg-[var(--danger)]" style="animation:glowPulse 1.5s infinite"></span>
        <span class="text-[12px] font-semibold text-[var(--danger)]">今日风险提醒</span>
        <span class="text-[11px] text-[var(--t3)] ml-auto num">${a.time}</span>
      </div>
      <h3 class="text-[18px] font-bold mb-2 leading-snug">${a.title}</h3>
      <p class="text-[13px] text-[var(--t2)] leading-relaxed mb-4">${a.desc}</p>
      <div class="flex flex-wrap gap-2">${a.tips.map(t=>`<span class="tip-tag">${t}</span>`).join('')}</div>
    </div>

    <!-- AI 双入口 -->
    <div class="card-group mb-7">
      <button onclick="Router.push('chat')" class="feature-row">
        <div class="feature-icon feature-icon-blue"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        <div class="flex-1"><h3 class="text-[15px] font-semibold">问一问</h3><p class="text-[12px] text-[var(--t2)] mt-0.5">AI 风险顾问</p></div>
        <i class="fa-solid fa-chevron-right text-[var(--t3)] text-xs"></i>
      </button>
      <button onclick="Router.push('image')" class="feature-row">
        <div class="feature-icon feature-icon-green"><i class="fa-solid fa-camera"></i></div>
        <div class="flex-1"><h3 class="text-[15px] font-semibold">拍一拍</h3><p class="text-[12px] text-[var(--t2)] mt-0.5">识别安全隐患</p></div>
        <i class="fa-solid fa-chevron-right text-[var(--t3)] text-xs"></i>
      </button>
    </div>

    <!-- 热门风险 -->
    <div class="flex items-end justify-between mb-3">
      <h2 class="section-title">热门风险</h2>
      <button onclick="Router.push('chat')" class="text-[13px] text-[var(--info)] pb-0.5">全部</button>
    </div>
    <div class="card-group mb-7">
      ${hot.map((q,i)=>`<button onclick="goChat('${esc(q.q)}')" class="feature-row text-left ${i<hot.length-1?'':''}">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1.5">
            <span class="tag ${rk(q.risk)}">${rkl(q.risk)}</span>
            <span class="text-[11px] text-[var(--t3)] num ml-auto">${fmt(q.views)} 浏览</span>
          </div>

function renderAI(d, isNew){
  const avatar=`<div class="w-8 h-8 rounded-lg feature-icon feature-icon-blue flex-shrink-0" style="width:32px;height:32px;font-size:11px"><i class="fa-solid fa-wand-magic-sparkles"></i></div>`;

  }

    </div>
  </div>`;
}
function refreshChat(animateUser){
  if(Router.cur().page!=='chat'){ S._pendingAIAnim=false; render(); return; }
  const scroll=document.getElementById('chatScroll');
  if(!scroll){ S._pendingAIAnim=false; render(); return; }
  let body='';
  if(S.chat.length===0) body=emptyChatHTML();
  else body=S.chat.map((m,i)=>{
    if(m.type==='user'){
      const isLast=i===S.chat.length-1&&animateUser;
      return userBubbleHTML(m,isLast);
    }
    const isNew=i===S.chat.length-1&&S._pendingAIAnim;
    return renderAI(m.data,isNew);
  }).join('');
  scroll.innerHTML=`<div class="chat-msgs">${body}</div><div id="typingBox"></div>`;
  const pending=S._pendingAIAnim;
  S._pendingAIAnim=false;
  if(pending) requestAnimationFrame(()=>animateLastAI());
  scrollChat(!!animateUser);
  const ci=document.getElementById('chatInput'); if(ci) ci.focus();
}
function showTyping(){
  const box=document.getElementById('typingBox');
  if(box) box.innerHTML=`<div class="flex gap-2.5 mb-4 a-fadeIn">
    <div class="w-8 h-8 rounded-lg feature-icon feature-icon-blue flex-shrink-0" style="width:32px;height:32px;font-size:11px"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
    <div class="typing flex items-center py-2"><span></span><span></span><span></span></div>
  </div>`;
  scrollChat(true);
}
function typeText(el,text,onDone,speed=22){
  if(!el) return onDone&&onDone();
  el.textContent='';
  const cursor=document.createElement('span');
  cursor.className='ai-cursor'; cursor.textContent='▍';
  el.appendChild(cursor);
  let i=0;
  (function step(){
    if(i<text.length){
      el.insertBefore(document.createTextNode(text[i]),cursor);
      i++;
      if(i%3===0) scrollChat(true);
      setTimeout(step,speed+Math.random()*12);
    } else {
      cursor.remove();
      onDone&&onDone();
    }
  })();
}
function animateLastAI(){
  const last=S.chat[S.chat.length-1];
  if(!last||last.type!=='ai') return;
  const d=last.data;
  const msg=document.querySelector('.ai-msg-new');
  if(!msg) return;
  const answerEl=msg.querySelector('.ai-answer-text');
  const moreEl=msg.querySelector('.ai-more');
  typeText(answerEl,d.answer,()=>{
    moreEl.innerHTML=renderAIExtras(d);
    [...moreEl.children].forEach((sec,i)=>{
      setTimeout(()=>{ sec.classList.add('ai-revealed'); scrollChat(true); },i*200+80);
    });
    msg.classList.remove('ai-msg-new');
  });
}
function pChat(){
  const h=S.chat;
  S._pendingAIAnim=false;
  return `<div class="chat-page">
    ${backBtn('AI 风险顾问','基于 AI 的生活安全分析')}
    <div id="chatScroll" class="chat-scroll -mx-5 px-5 no-bar">
      <div class="chat-msgs">
        ${h.length===0?emptyChatHTML():h.map(m=>m.type==='user'?userBubbleHTML(m):renderAI(m.data)).join('')}
      </div>
      <div id="typingBox"></div>
    </div>
    <div class="chat-input-bar -mx-5 px-5">
      <div class="chat-input-wrap flex items-center gap-2 p-1.5">
        <input id="chatInput" type="text" placeholder="输入安全问题…" class="flex-1 bg-transparent px-3 py-2.5 text-[13px] placeholder:text-[var(--t3)] focus:outline-none" onkeypress="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()" class="w-9 h-9 flex items-center justify-center send-btn"><i class="fa-solid fa-arrow-up text-xs"></i></button>
      </div>
    </div>
  </div>`;
}

function sendChat(q){
  const inp=document.getElementById('chatInput');
  const msg=q||inp?.value?.trim(); if(!msg) return;
  if(inp) inp.value='';
  const onChat=Router.cur().page==='chat';
  S.chat.push({type:'user',content:msg});
  if(onChat && document.getElementById('chatScroll')) refreshChat(true);
  else render();
  setTimeout(showTyping, onChat?0:80);
  setTimeout(()=>{
    const r=MOCK_DATA.aiResponses[msg]||{answer:`关于「${msg}」，这是一个值得关注的日常安全问题。建议结合具体场景判断风险等级，采取相应预防措施。`,risk:'medium',riskLabel:'中风险',principle:'该问题涉及日常生活安全场景，需结合具体使用环境综合分析。',suggestions:['保持警惕，注意安全细节','查阅权威资料','咨询专业人士','定期复查安全知识'],related:['未知风险']};
    S.chat.push({type:'ai',data:r});
    S._pendingAIAnim=true;
    if(Router.cur().page==='chat' && document.getElementById('chatScroll')) refreshChat();
    else{ S._pendingAIAnim=false; render(); }
  },1400);
}
function scrollChat(smooth=false){
  const run=()=>{
    const s=document.getElementById('chatScroll'); if(!s) return;
    if(smooth) s.scrollTo({top:s.scrollHeight,behavior:'smooth'});
    else s.scrollTop=s.scrollHeight;
  };
  run();
  if(!smooth) requestAnimationFrame(run);
}
function goChat(q){
  if(Router.cur().page!=='chat') Router.push('chat');
  setTimeout(()=>sendChat(q), Router.cur().page==='chat'?50:300);
}

function initCharts(){
  const base={ backgroundColor:'transparent', textStyle:{color:'#9898A4',fontFamily:'Inter'} };
  const grid={ left:'2%',right:'4%',bottom:'8%',top:'12%',containLabel:true };
  const al={ show:false };
  const sl={ lineStyle:{color:'rgba(255,255,255,.04)'} };
  const tip={ backgroundColor:'rgba(30,30,38,0.95)',borderColor:'rgba(255,255,255,.08)',borderRadius:10,padding:[10,14],textStyle:{color:'#F4F4F8',fontSize:12},extraCssText:'box-shadow:0 8px 32px rgba(0,0,0,0.4);backdrop-filter:blur(12px)' };

  // Archive donut
  const ac=document.getElementById('archiveChart');
  if(ac){
    const c=echarts.init(ac);
    c.setOption({...base,tooltip:{trigger:'item',...tip,formatter:'{b}<br/>{c} 次 ({d}%)'},
      series:[{type:'pie',radius:['42%','70%'],center:['50%','50%'],
        itemStyle:{borderRadius:6,borderColor:'#000',borderWidth:3},
        label:{color:'#9898A4',fontSize:10,formatter:'{b}\n{d}%'},
        emphasis:{scale:true,scaleSize:6,itemStyle:{shadowBlur:20,shadowColor:'rgba(0,0,0,0.3)'}},
        data:MOCK_DATA.riskProfile.categories.map(d=>({value:d.count,name:d.name,itemStyle:{color:d.color}})),animationDuration:1200,animationEasing:'cubicOut'}]});
  }

  // Knowledge graph
  const gc=document.getElementById('graphChart');
  if(gc&&S.showGraph){
    const c=echarts.init(gc);
    c.setOption({...base,
      series:[{type:'graph',layout:'force',force:{repulsion:180,edgeLength:[40,80],gravity:0.08},roam:true,
        label:{show:true,color:'#F4F4F8',fontSize:10,fontWeight:500},
        edgeSymbol:['none','arrow'],edgeSymbolSize:6,
        lineStyle:{color:'rgba(255,255,255,.08)',width:1.5,curveness:0.15},
        emphasis:{focus:'adjacency',lineStyle:{width:2.5,color:'rgba(255,255,255,.2)'}},
        data:MOCK_DATA.riskProfile.knowledgeGraph.nodes.map(n=>({name:n.name,symbolSize:n.val,itemStyle:{color:n.color,shadowBlur:10,shadowColor:n.color+'40'},category:n.category})),
        links:MOCK_DATA.riskProfile.knowledgeGraph.links.map(l=>({source:l.source,target:l.target})),
        animationDuration:1500}]});
  }

  // Admin charts
  if(S.role==='admin'){
    const mk=(id,opt)=>{ const el=document.getElementById(id); if(el){ const c=echarts.init(el); c.setOption(opt); window.addEventListener('resize',()=>c.resize()); } };

    if(S.adminTab==='dashboard'){
      mk('aChart1',{...base,grid,tooltip:{trigger:'axis',...tip},xAxis:{type:'category',data:['1月','2月','3月','4月','5月','6月'],axisLine:al,axisLabel:{color:'#5C5C68',fontSize:10},axisTick:{show:false}},yAxis:{type:'value',axisLine:al,splitLine:sl,axisLabel:{color:'#5C5C68',fontSize:10},axisTick:{show:false}},series:[{data:MOCK_DATA.admin.trends.knowledge.filter((_,i)=>i%5===0).slice(0,6),type:'line',smooth:.4,symbol:'circle',symbolSize:6,lineStyle:{color:'#E8C87A',width:2.5},itemStyle:{color:'#E8C87A',borderColor:'#0B0B0F',borderWidth:2},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(232,200,122,.2)'},{offset:1,color:'rgba(232,200,122,0)'}]}},animationDuration:1400}]});
      mk('aChart2',{...base,grid,tooltip:{trigger:'axis',...tip},xAxis:{type:'category',data:['周一','周二','周三','周四','周五','周六','周日'],axisLine:al,axisLabel:{color:'#5C5C68',fontSize:10},axisTick:{show:false}},yAxis:{type:'value',axisLine:al,splitLine:sl,axisLabel:{color:'#5C5C68',fontSize:10},axisTick:{show:false}},series:[{data:[220,182,191,234,290,330,310],type:'bar',barWidth:'50%',itemStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'#0A84FF'},{offset:1,color:'rgba(10,132,255,.3)'}]},borderRadius:[6,6,0,0]},animationDuration:1000,animationDelay:i=>i*80}]});
    }
    if(S.adminTab==='hotwords'){
      const colors=['#FF6B6B','#FFD93D','#32D74B','#0A84FF','#9B59B6','#E67E22','#1ABC9C','#E8C87A'];
      mk('wordCloud',{...base,tooltip:{...tip},grid:{left:'5%',right:'5%',top:'5%',bottom:'5%'},xAxis:{show:false,min:0,max:100},yAxis:{show:false,min:0,max:100},
        series:[{type:'scatter',symbolSize:d=>Math.max(20,Math.min(70,d[2]/80)),
          data:MOCK_DATA.admin.hotWords.map((w,i)=>({value:[15+(i%3)*30,15+Math.floor(i/3)*22,w.count],name:w.word})),
          label:{show:true,formatter:p=>p.data.name,color:'#F4F4F8',fontSize:p=>Math.max(11,Math.min(20,p.data.value[2]/250)),fontWeight:500},
          itemStyle:{color:p=>colors[p.dataIndex%colors.length],opacity:.85,shadowBlur:8,shadowColor:'rgba(0,0,0,0.3)'},animationDuration:1200}]});

/* ============================================================
   Utils
   ============================================================ */
function clock(){ const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function greeting(){ const h=new Date().getHours(); return h<6?'凌晨好':h<12?'早上好':h<18?'下午好':'晚上好'; }
function rk(l){ return {high:'risk-high',medium:'risk-medium',low:'risk-low'}[l]||'risk-low'; }
function rkl(l){ return {high:'高风险',medium:'中风险',low:'低风险'}[l]||'低风险'; }
function fmt(n){ return n>=10000?(n/10000).toFixed(1)+'w':n>=1000?(n/1000).toFixed(1)+'k':n.toString(); }
function esc(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function userAvatar(sz=64){
  const icon=Math.round(sz*0.38);
  return `<div class="user-avatar" style="width:${sz}px;height:${sz}px"><div class="user-avatar-inner"><i class="fa-solid fa-shield-halved" style="font-size:${icon}px"></i></div></div>`;
}

function animateCount(el){
  const target=parseInt(el.dataset.count); if(isNaN(target)) return;
  const dur=1200, start=performance.now();
  function tick(now){ const p=Math.min((now-start)/dur,1); const e=1-Math.pow(1-p,3); el.textContent=Math.floor(target*e).toLocaleString(); if(p<1) requestAnimationFrame(tick); else el.textContent=target.toLocaleString(); }
  requestAnimationFrame(tick);
}

function afterRender(){
  document.querySelectorAll('[data-count]').forEach(animateCount);
  const ci=document.getElementById('chatInput'); if(ci) ci.focus();
  if(Router.cur().page==='chat' && S.chat.length>0){
    const el=document.getElementById('chatScroll');
    if(el){
      el.classList.add('chat-preparing');
      scrollChat(false);
      requestAnimationFrame(()=>{
        scrollChat(false);
        el.classList.remove('chat-preparing');
      });
    }
  }
  setTimeout(initCharts,80);
  const ct=document.querySelector('.status-time'); if(ct) ct.textContent=clock();
}

// Clock update
setInterval(()=>{ const ct=document.querySelector('.status-time'); if(ct) ct.textContent=clock(); },30000);

// Start
document.addEventListener('DOMContentLoaded',render);
</script>
