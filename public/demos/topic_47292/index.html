<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樱桃串收番茄生长模拟系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --greenhouse-1-bg: #c8eedd;
    --greenhouse-1-accent: #2d8b6a;
    --greenhouse-2-bg: #ffd6d6;
    --greenhouse-2-accent: #e85555;
    --greenhouse-3-bg: #f8d8f8;
    --greenhouse-3-accent: #d946d9;
    --greenhouse-4-bg: #fff3d6;
    --greenhouse-4-accent: #b8860b;
    --bg-main: #f0f7f4;
    --text-primary: #1a2e2a;
    --text-secondary: #5a7a72;
    --card-bg: #ffffff;
    --shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px;
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(45, 139, 106, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(232, 85, 85, 0.05) 0%, transparent 40%);
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    letter-spacing: 2px;
  }

  .header p {
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 300;
  }

  .control-panel {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px 28px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .control-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .btn {
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: 'Noto Sans SC', sans-serif;
  }

  .btn-primary {
    background: linear-gradient(135deg, #2d8b6a, #3aaf85);
    color: white;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(45, 139, 106, 0.3);
  }

  .btn-secondary {
    background: #e8f0ed;
    color: var(--text-primary);
  }

  .btn-secondary:hover {
    background: #d8e4df;
  }

  .week-slider {
    width: 200px;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #c8eedd, #2d8b6a);
    outline: none;
  }

  .week-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: white;
    border: 3px solid #2d8b6a;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: transform 0.2s;
  }

  .week-slider::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }

  .week-display {
    font-size: 20px;
    font-weight: 700;
    color: var(--greenhouse-1-accent);
    font-family: 'Noto Serif SC', serif;
    min-width: 80px;
    text-align: center;
  }

  .metric-selector {
    display: flex;
    background: #e8f0ed;
    border-radius: 10px;
    padding: 4px;
  }

  .metric-btn {
    border: none;
    background: transparent;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-secondary);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 500;
  }

  .metric-btn.active {
    background: white;
    color: var(--text-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .greenhouse-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 24px;
  }

  .greenhouse-card {
    border-radius: 18px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .greenhouse-card:hover {
    transform: translateY(-4px);
  }

  .greenhouse-1 {
    background: linear-gradient(180deg, var(--greenhouse-1-bg) 0%, #b0e0cb 100%);
  }
  .greenhouse-2 {
    background: linear-gradient(180deg, var(--greenhouse-2-bg) 0%, #ffc0c0 100%);
  }
  .greenhouse-3 {
    background: linear-gradient(180deg, var(--greenhouse-3-bg) 0%, #f0c0f0 100%);
  }
  .greenhouse-4 {
    background: linear-gradient(180deg, var(--greenhouse-4-bg) 0%, #ffe8b0 100%);
  }

  .greenhouse-title {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    font-family: 'Noto Serif SC', serif;
    margin-bottom: 12px;
  }

  .greenhouse-1 .greenhouse-title { color: var(--greenhouse-1-accent); }
  .greenhouse-2 .greenhouse-title { color: var(--greenhouse-2-accent); }
  .greenhouse-3 .greenhouse-title { color: var(--greenhouse-3-accent); }
  .greenhouse-4 .greenhouse-title { color: var(--greenhouse-4-accent); }

  .fruit-count-badge {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(4px);
    border-radius: 12px;
    padding: 8px 16px;
    text-align: center;
    margin-bottom: 12px;
  }

  .fruit-count-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }

  .fruit-count-value {
    font-size: 22px;
    font-weight: 700;
    font-family: 'Noto Serif SC', serif;
  }

  .greenhouse-1 .fruit-count-value { color: var(--greenhouse-1-accent); }
  .greenhouse-2 .fruit-count-value { color: var(--greenhouse-2-accent); }
  .greenhouse-3 .fruit-count-value { color: var(--greenhouse-3-accent); }
  .greenhouse-4 .fruit-count-value { color: var(--greenhouse-4-accent); }

  .plant-container {
    position: relative;
    width: 100%;
    height: 320px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .plant-svg {
    width: 100%;
    height: 100%;
  }

  .chart-section {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .chart-title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Noto Serif SC', serif;
  }

  .chart-unit {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .chart-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .chart-svg {
    width: 100%;
    height: 180px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 12px;
  }

  .stat-item {
    background: rgba(255,255,255,0.6);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Serif SC', serif;
  }

  .greenhouse-1 .stat-value { color: var(--greenhouse-1-accent); }
  .greenhouse-2 .stat-value { color: var(--greenhouse-2-accent); }
  .greenhouse-3 .stat-value { color: var(--greenhouse-3-accent); }
  .greenhouse-4 .stat-value { color: var(--greenhouse-4-accent); }

  @media (max-width: 1200px) {
    .greenhouse-grid, .chart-section {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 600px) {
    .greenhouse-grid, .chart-section {
      grid-template-columns: 1fr;
    }
    .control-panel {
      flex-direction: column;
    }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🍅 樱桃串收番茄生长模拟系统</h1>
  <p>基于温室种植数据的生长过程可视化 — 对照温室 · 11号温室 · 12号温室 · 13号温室</p>
</div>

<div class="control-panel">
  <div class="control-group">
    <button class="btn btn-primary" id="playBtn">▶ 播放生长</button>
    <button class="btn btn-secondary" id="resetBtn">⟲ 重置</button>
  </div>
  <div class="control-group">
    <span class="control-label">生长周数</span>
    <input type="range" class="week-slider" id="weekSlider" min="1" max="25" value="1" step="1">
    <span class="week-display" id="weekDisplay">第1周</span>
  </div>
  <div class="control-group">
    <span class="control-label">生长速度</span>
    <select id="speedSelect" class="btn btn-secondary">
      <option value="800">慢速</option>
      <option value="400" selected>正常</option>
      <option value="150">快速</option>
    </select>
  </div>
  <div class="control-group">
    <span class="control-label">指标曲线</span>
    <div class="metric-selector" id="metricSelector">
      <button class="metric-btn active" data-metric="height">株高</button>
      <button class="metric-btn" data-metric="leaves">叶片数</button>
      <button class="metric-btn" data-metric="clusters">果穗数</button>
      <button class="metric-btn" data-metric="flowers">开花数</button>
    </div>
  </div>
</div>

<div class="greenhouse-grid" id="greenhouseGrid"></div>

<div class="chart-section" id="chartSection"></div>

<script>
const greenhouses = [
  { id: 1, name: '对照温室', color: '#2d8b6a', bgClass: 'greenhouse-1', growthRate: 0.95 },
  { id: 2, name: '11号温室', color: '#e85555', bgClass: 'greenhouse-2', growthRate: 1.05 },
  { id: 3, name: '12号温室', color: '#d946d9', bgClass: 'greenhouse-3', growthRate: 1.02 },
  { id: 4, name: '13号温室', color: '#b8860b', bgClass: 'greenhouse-4', growthRate: 1.12 }
];

const TOTAL_WEEKS = 25;
let currentWeek = 1;
let isPlaying = false;
let playInterval = null;
let playSpeed = 400;
let currentMetric = 'height';

function calcGrowthData(growthRate) {
  const heightData = [];
  const leavesData = [];
  const clustersData = [];
  const flowersData = [];
  
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    const t = w / TOTAL_WEEKS;
    const sigmoid = 1 / (1 + Math.exp(-8 * (t - 0.4)));
    
    const height = Math.round(780 * sigmoid * growthRate * (1 + Math.sin(w * 0.5) * 0.02));
    const leaves = Math.round(22 * sigmoid * growthRate * (1 + Math.cos(w * 0.3) * 0.03));
    const clusters = Math.round(12 * sigmoid * growthRate * (1 + Math.sin(w * 0.4) * 0.02));
    const flowers = Math.round(60 * sigmoid * growthRate * (1 + Math.cos(w * 0.6) * 0.04));
    
    heightData.push(Math.max(5, height));
    leavesData.push(Math.max(2, leaves));
    clustersData.push(Math.max(0, clusters));
    flowersData.push(Math.max(0, flowers));
  }
  
  return { heightData, leavesData, clustersData, flowersData };
}

const greenhouseData = greenhouses.map(gh => ({
  ...gh,
  ...calcGrowthData(gh.growthRate)
}));

function getFruitCount(clustersCount) {
  return Math.round(clustersCount * 2.95);
}

function createPlantSVG(gh, weekIdx) {
  const height = gh.heightData[weekIdx];
  const leaves = gh.leavesData[weekIdx];
  const clusters = gh.clustersData[weekIdx];
  const flowers = gh.flowersData[weekIdx];
  
  const maxHeight = 280;
  const plantHeight = Math.min(maxHeight, (height / 800) * maxHeight);
  const stemBaseY = 300;
  const stemTopY = stemBaseY - plantHeight;
  
  let svg = `<svg class="plant-svg" viewBox="0 0 280 320" preserveAspectRatio="xMidYEnd meet">`;
  
  svg += `<ellipse cx="140" cy="308" rx="90" ry="14" fill="#5a3a2a" opacity="0.8"/>`;
  svg += `<path d="M60 308 Q70 295 90 300 Q110 290 140 300 Q170 290 190 300 Q210 295 220 308 Z" fill="#4a2e20"/>`;
  svg += `<ellipse cx="120" cy="302" rx="8" ry="3" fill="#6b4a3a" opacity="0.5"/>`;
  svg += `<ellipse cx="160" cy="305" rx="6" ry="2" fill="#6b4a3a" opacity="0.5"/>`;
  svg += `<ellipse cx="100" cy="306" rx="5" ry="2" fill="#3d2518" opacity="0.6"/>`;
  
  const stemColor = weekIdx < 5 ? '#7cb342' : '#558b2f';
  svg += `<path d="M140 ${stemBaseY} Q135 ${stemBaseY - plantHeight*0.5} 140 ${stemTopY}" 
    stroke="${stemColor}" stroke-width="${Math.max(3, plantHeight/60)}" fill="none" stroke-linecap="round"/>`;
  
  const leafPositions = [];
  const leafCount = Math.min(leaves, 22);
  for (let i = 0; i < leafCount; i++) {
    const t = (i + 0.5) / leafCount;
    const y = stemBaseY - t * plantHeight * 0.95 - 10;
    const side = i % 2 === 0 ? -1 : 1;
    const xOffset = 20 + (leafCount - i) * 1.5;
    const x = 140 + side * xOffset;
    const size = 12 + t * 18;
    leafPositions.push({ x, y, side, size, t });
    
    const leafColor = t < 0.3 ? '#8bc34a' : (t < 0.7 ? '#66bb6a' : '#43a047');
    const leafPath = side === 1 
      ? `M${140 + side*8} ${y} Q${x} ${y - size*0.6} ${x + size*0.3} ${y - size*0.3} Q${x + size*0.5} ${y} ${x + size*0.3} ${y + size*0.3} Q${x} ${y + size*0.6} ${140 + side*8} ${y}`
      : `M${140 + side*8} ${y} Q${x} ${y - size*0.6} ${x - size*0.3} ${y - size*0.3} Q${x - size*0.5} ${y} ${x - size*0.3} ${y + size*0.3} Q${x} ${y + size*0.6} ${140 + side*8} ${y}`;
    
    svg += `<path d="${leafPath}" fill="${leafColor}" opacity="0.9">
      <animate attributeName="opacity" values="0;0.9" dur="0.6s" fill="freeze"/>
    </path>`;
  }
  
  if (weekIdx >= 4) {
    const clusterCount = Math.min(clusters, 10);
    for (let i = 0; i < clusterCount; i++) {
      const t = 0.25 + (i / Math.max(clusterCount, 1)) * 0.65;
      const y = stemBaseY - t * plantHeight;
      const side = i % 2 === 0 ? 1 : -1;
      const clusterX = 140 + side * 35;
      
      const fruitCount = 5 + (i % 4);
      for (let f = 0; f < fruitCount; f++) {
        const angle = (f / fruitCount) * Math.PI * 0.8 - Math.PI * 0.4;
        const fx = clusterX + Math.sin(angle) * 12 * side;
        const fy = y + Math.cos(angle) * 10 - f * 2;
        const fruitSize = 4.5;
        
        const ripening = Math.min(1, Math.max(0, (weekIdx - 8 - i * 0.8) / 8));
        let fruitColor;
        if (ripening < 0.3) {
          fruitColor = '#aed581';
        } else if (ripening < 0.6) {
          fruitColor = '#fff176';
        } else if (ripening < 0.85) {
          fruitColor = '#ffb74d';
        } else {
          fruitColor = '#ff8a65';
        }
        
        svg += `<circle cx="${fx}" cy="${fy}" r="${fruitSize}" fill="${fruitColor}" opacity="0.95">
          <animate attributeName="r" values="0;${fruitSize}" dur="0.4s" fill="freeze"/>
        </circle>`;
        svg += `<ellipse cx="${fx - 1}" cy="${fy - 1}" rx="1.5" ry="1" fill="white" opacity="0.4"/>`;
      }
      
      svg += `<path d="M140 ${y + 2} Q${140 + side*15} ${y - 5} ${clusterX} ${y}" 
        stroke="#558b2f" stroke-width="1.5" fill="none"/>`;
    }
  }
  
  if (weekIdx >= 3 && weekIdx <= 14) {
    const flowerCount = Math.min(Math.floor(flowers / 8), 8);
    for (let i = 0; i < flowerCount; i++) {
      const t = 0.3 + (i / flowerCount) * 0.5;
      const y = stemBaseY - t * plantHeight - 20;
      const side = i % 2 === 0 ? -1 : 1;
      const fx = 140 + side * 28;
      
      for (let p = 0; p < 5; p++) {
        const petalAngle = (p / 5) * Math.PI * 2;
        const px = fx + Math.cos(petalAngle) * 4;
        const py = y + Math.sin(petalAngle) * 4;
        svg += `<ellipse cx="${px}" cy="${py}" rx="3" ry="2" fill="#ffeb3b" 
          transform="rotate(${petalAngle * 180 / Math.PI} ${px} ${py})" opacity="0.85"/>`;
      }
      svg += `<circle cx="${fx}" cy="${y}" r="2.5" fill="#ff9800"/>`;
    }
  }
  
  const topLeafSize = 10 + (plantHeight / maxHeight) * 8;
  svg += `<ellipse cx="140" cy="${stemTopY - 5}" rx="${topLeafSize * 0.6}" ry="${topLeafSize}" fill="#66bb6a" transform="rotate(-15 140 ${stemTopY - 5})"/>`;
  svg += `<ellipse cx="145" cy="${stemTopY - 3}" rx="${topLeafSize * 0.5}" ry="${topLeafSize * 0.8}" fill="#81c784" transform="rotate(20 145 ${stemTopY - 3})"/>`;
  
  svg += `</svg>`;
  return svg;
}

function createChart(gh, weekIdx, metric) {
  const data = gh[metric + 'Data'];
  const currentVal = data[weekIdx];
  
  const width = 240;
  const height = 160;
  const padding = { top: 10, right: 20, bottom: 25, left: 35 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;
  
  const maxVal = Math.max(...data) * 1.1;
  const minVal = 0;
  
  let pathD = '';
  let areaD = '';
  for (let i = 0; i <= weekIdx; i++) {
    const x = padding.left + (i / (TOTAL_WEEKS - 1)) * chartW;
    const y = padding.top + chartH - ((data[i] - minVal) / (maxVal - minVal)) * chartH;
    if (i === 0) {
      pathD += `M${x} ${y}`;
      areaD += `M${x} ${padding.top + chartH} L${x} ${y}`;
    } else {
      pathD += ` L${x} ${y}`;
      areaD += ` L${x} ${y}`;
    }
  }
  areaD += ` L${padding.left + (weekIdx / (TOTAL_WEEKS - 1)) * chartW} ${padding.top + chartH} Z`;
  
  const yTicks = 4;
  let yLabels = '';
  let yLines = '';
  for (let i = 0; i <= yTicks; i++) {
    const y = padding.top + chartH - (i / yTicks) * chartH;
    const val = Math.round(minVal + (i / yTicks) * (maxVal - minVal));
    yLabels += `<text x="${padding.left - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="#889994">${val}</text>`;
    yLines += `<line x1="${padding.left}" y1="${y}" x2="${padding.left + chartW}" y2="${y}" stroke="#e0ebe6" stroke-width="1"/>`;
  }
  
  const xTickCount = 5;
  let xLabels = '';
  for (let i = 0; i < xTickCount; i++) {
    const weekNum = Math.round((i / (xTickCount - 1)) * (TOTAL_WEEKS - 1)) + 1;
    const x = padding.left + (i / (xTickCount - 1)) * chartW;
    xLabels += `<text x="${x}" y="${height - 8}" text-anchor="middle" font-size="10" fill="#889994">第${weekNum}周</text>`;
  }
  
  const currentX = padding.left + (weekIdx / (TOTAL_WEEKS - 1)) * chartW;
  const currentY = padding.top + chartH - ((currentVal - minVal) / (maxVal - minVal)) * chartH;
  
  const color = gh.color;
  const gradientId = `grad-${gh.id}-${metric}`;
  
  return `
    <svg class="chart-svg" viewBox="0 0 ${width} ${height}">
      <defs>
        <linearGradient id="${gradientId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      ${yLines}
      ${yLabels}
      ${xLabels}
      <path d="${areaD}" fill="url(#${gradientId})"/>
      <path d="${pathD}" stroke="${color}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${currentX}" cy="${currentY}" r="5" fill="white" stroke="${color}" stroke-width="2.5"/>
      <line x1="${currentX}" y1="${padding.top}" x2="${currentX}" y2="${padding.top + chartH}" 
        stroke="${color}" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    </svg>
  `;
}

function getMetricLabel(metric) {
  const labels = {
    height: '株高',
    leaves: '叶片数',
    clusters: '果穗数',
    flowers: '开花数'
  };
  return labels[metric] || metric;
}

function getMetricUnit(metric) {
  const units = {
    height: 'cm',
    leaves: '片',
    clusters: '穗',
    flowers: '朵'
  };
  return units[metric] || '';
}

function render() {
  const weekIdx = currentWeek - 1;
  
  const grid = document.getElementById('greenhouseGrid');
  grid.innerHTML = greenhouseData.map(gh => {
    const currentClusters = gh.clustersData[weekIdx];
    const fruitCount = getFruitCount(currentClusters);
    return `
      <div class="greenhouse-card ${gh.bgClass}">
        <div class="greenhouse-title">${gh.name}</div>
        <div class="fruit-count-badge">
          <div class="fruit-count-label">单头累计坐果穗数</div>
          <div class="fruit-count-value">${(fruitCount / 10).toFixed(2)}</div>
        </div>
        <div class="plant-container">
          ${createPlantSVG(gh, weekIdx)}
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-label">株高</div>
            <div class="stat-value">${gh.heightData[weekIdx]} cm</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">叶片数</div>
            <div class="stat-value">${gh.leavesData[weekIdx]} 片</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">果穗数</div>
            <div class="stat-value">${gh.clustersData[weekIdx]} 穗</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">开花数</div>
            <div class="stat-value">${gh.flowersData[weekIdx]} 朵</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  
  const chartSection = document.getElementById('chartSection');
  chartSection.innerHTML = greenhouseData.map(gh => `
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title" style="color: ${gh.color}">
          ${gh.name} — ${getMetricLabel(currentMetric)}
        </div>
        <span class="chart-unit">单位：${getMetricUnit(currentMetric)}</span>
      </div>
      ${createChart(gh, weekIdx, currentMetric)}
    </div>
  `).join('');
  
  document.getElementById('weekDisplay').textContent = `第${currentWeek}周`;
  document.getElementById('weekSlider').value = currentWeek;
}

function togglePlay() {
  const btn = document.getElementById('playBtn');
  if (isPlaying) {
    clearInterval(playInterval);
    isPlaying = false;
    btn.textContent = '▶ 播放生长';
  } else {
    if (currentWeek >= TOTAL_WEEKS) {
      currentWeek = 1;
    }
    isPlaying = true;
    btn.textContent = '⏸ 暂停';
    playInterval = setInterval(() => {
      if (currentWeek >= TOTAL_WEEKS) {
        clearInterval(playInterval);
        isPlaying = false;
        btn.textContent = '▶ 播放生长';
        return;
      }
      currentWeek++;
      render();
    }, playSpeed);
  }
}

function reset() {
  if (isPlaying) {
    clearInterval(playInterval);
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ 播放生长';
  }
  currentWeek = 1;
  render();
}

document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('resetBtn').addEventListener('click', reset);

document.getElementById('weekSlider').addEventListener('input', (e) => {
  if (isPlaying) {
    clearInterval(playInterval);
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ 播放生长';
  }
  currentWeek = parseInt(e.target.value);
  render();
});

document.getElementById('speedSelect').addEventListener('change', (e) => {
  playSpeed = parseInt(e.target.value);
  if (isPlaying) {
    clearInterval(playInterval);
    const btn = document.getElementById('playBtn');
    playInterval = setInterval(() => {
      if (currentWeek >= TOTAL_WEEKS) {
        clearInterval(playInterval);
        isPlaying = false;
        btn.textContent = '▶ 播放生长';
        return;
      }
      currentWeek++;
      render();
    }, playSpeed);
  }
});

document.querySelectorAll('.metric-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentMetric = e.target.dataset.metric;
    render();
  });
});

render();
</script>
</body>
</html>
