<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格清洗工具 - 离线版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 20px; font-size: 24px; }
        .main-layout { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        .panel { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 20px; }
        .panel h3 { color: #333; margin-bottom: 15px; font-size: 16px; padding-bottom: 10px; border-bottom: 2px solid #e8f0fe; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; resize: vertical; font-family: monospace; font-size: 13px; line-height: 1.5; }
        .btn { display: inline-block; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: #1a73e8; color: #fff; }
        .btn-primary:hover { background: #1557b0; }
        .btn-success { background: #34a853; color: #fff; }
        .btn-success:hover { background: #2d8a4e; }
        .btn-danger { background: #ea4335; color: #fff; }
        .btn-danger:hover { background: #d93026; }
        .btn-secondary { background: #f5f5f5; color: #333; }
        .btn-secondary:hover { background: #e8e8e8; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .keyword-list { max-height: 150px; overflow-y: auto; margin-bottom: 10px; }
        .keyword-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #f8f9fa; border-radius: 6px; margin-bottom: 5px; }
        .keyword-item button { background: none; border: none; color: #999; cursor: pointer; padding: 4px; }
        .keyword-item button:hover { color: #ea4335; }
        .clean-options { margin-top: 15px; }
        .clean-options label { display: block; margin-bottom: 10px; cursor: pointer; }
        .clean-options input[type="radio"] { margin-right: 8px; }
        .clean-options input[type="text"] { padding: 8px; border: 1px solid #e0e0e0; border-radius: 6px; width: 180px; margin-left: 10px; }
        .check-box { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .check-box input { cursor: pointer; }
        .table-container { overflow: auto; max-height: 500px; border: 1px solid #e0e0e0; border-radius: 8px; margin-top: 10px; }
        table { border-collapse: collapse; min-width: 100%; }
        th, td { border: 1px solid #e0e0e0; padding: 8px 12px; text-align: left; font-size: 13px; }
        th { background: #f8f9fa; font-weight: 600; position: sticky; top: 0; z-index: 1; }
        tr:hover { background: #f5f7fa; }
        .highlight { background: #fff3cd !important; }
        .status-bar { margin-top: 15px; padding: 10px; background: #e8f0fe; border-radius: 8px; font-size: 13px; color: #1a73e8; }
        .info-box { background: #fff3cd; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 0 8px 8px 0; margin-bottom: 15px; font-size: 13px; color: #856404; }
        .info-box ul { margin-left: 20px; margin-top: 8px; }
        .info-box li { margin-bottom: 4px; }
        .file-input { display: none; }
        .file-label { padding: 8px 16px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .file-label:hover { background: #e8e8e8; }
        .version { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 表格清洗工具 (离线版 v1.1)</h1>
        
        <div class="info-box">
            <strong>使用说明：</strong>
            <ul>
                <li>1. 从WPS/Excel复制表格数据，粘贴到下方输入框</li>
                <li>2. 点击"解析数据"按钮导入表格</li>
                <li>3. 添加关键词并选择清洗模式</li>
                <li>4. 点击"执行清洗"，预览结果后导出</li>
            </ul>
        </div>

        <div class="main-layout">
            <div class="left-panel">
                <div class="panel">
                    <h3>📋 粘贴数据</h3>
                    <textarea id="inputData" placeholder="在此粘贴从WPS/Excel复制的表格数据..."></textarea>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="parseData()">解析数据</button>
                        <button class="btn btn-secondary" onclick="clearInput()">清空</button>
                    </div>
                </div>

                <div class="panel">
                    <h3>🔑 关键词管理</h3>
                    <input type="text" id="keywordInput" placeholder="输入关键词" style="width: 100%; padding: 8px; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 10px;">
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="addKeyword()">添加关键词</button>
                        <label class="file-label" for="keywordFile">批量导入TXT</label>
                        <input type="file" id="keywordFile" class="file-input" accept=".txt" onchange="importKeywords()">
                        <button class="btn btn-danger" onclick="clearKeywords()">清空全部</button>
                    </div>
                    <div class="keyword-list" id="keywordList"></div>
                </div>

                <div class="panel">
                    <h3>⚙️ 清洗设置</h3>
                    <div class="check-box">
                        <input type="checkbox" id="caseSensitive">
                        <label for="caseSensitive">区分大小写</label>
                    </div>
                    <div class="check-box">
                        <input type="checkbox" id="skipHeader">
                        <label for="skipHeader">跳过第一行表头</label>
                    </div>
                    
                    <div class="clean-options">
                        <label><input type="radio" name="cleanMode" value="deleteRow" checked> 删除匹配整行</label>
                        <label><input type="radio" name="cleanMode" value="removeText"> 清除单元格内关键词文字</label>
                        <label><input type="radio" name="cleanMode" value="highlight"> 高亮标记匹配单元格</label>
                        <label><input type="radio" name="cleanMode" value="replace"> 关键词替换为 
                            <input type="text" id="replaceText" placeholder="替换文本" value="***"></label>
                    </div>
                    
                    <button class="btn btn-success" onclick="cleanData()" style="width: 100%; margin-top: 15px; padding: 12px;">
                        ▶️ 执行清洗
                    </button>
                </div>

                <div class="panel">
                    <h3>📥 导出</h3>
                    <button class="btn btn-success" onclick="exportExcel()" style="width: 100%; padding: 12px; font-size: 16px;">
                        📥 导出Excel文件
                    </button>
                    <button class="btn btn-secondary" onclick="exportCSV()" style="width: 100%; padding: 10px; margin-top: 10px;">
                        📄 导出CSV文件
                    </button>
                </div>
            </div>

            <div class="right-panel">
                <div class="panel">
                    <h3>👁️ 表格预览</h3>
                    <div class="status-bar" id="statusBar">等待数据...</div>
                    <div class="table-container" id="tableContainer"></div>
                </div>
            </div>
        </div>

        <div class="version">
            版本: v1.1 | 完全离线运行 | 数据仅在浏览器内存中处理
        </div>
    </div>

    <script>
        var displayData = [];
        var originalData = [];
        var keywords = [];

        function parseData() {
            var input = document.getElementById('inputData').value.trim();
            if (!input) {
                alert('请先粘贴数据');
                return;
            }

            var lines = input.split(/\r\n|\n|\r/);
            var data = [];
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line) {
                    var cells = line.split('\t');
                    data.push(cells);
                }
            }

            if (data.length === 0) {
                alert('未解析到数据，请确保粘贴的是表格数据');
                return;
            }

            originalData = data.map(row => row.slice());
            displayData = data.map(row => row.slice());
            renderTable();
            updateStatus();
        }

        function clearInput() {
            document.getElementById('inputData').value = '';
            displayData = [];
            originalData = [];
            document.getElementById('tableContainer').innerHTML = '';
            updateStatus();
        }

        function addKeyword() {
            var input = document.getElementById('keywordInput');
            var keyword = input.value.trim();
            if (keyword && keywords.indexOf(keyword) === -1) {
                keywords.push(keyword);
                renderKeywordList();
            }
            input.value = '';
        }

        function importKeywords() {
            var fileInput = document.getElementById('keywordFile');
            var file = fileInput.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function(e) {
                var content = e.target.result;
                var lines = content.split(/\r\n|\n|\r/);
                for (var i = 0; i < lines.length; i++) {
                    var keyword = lines[i].trim();
                    if (keyword && keywords.indexOf(keyword) === -1) {
                        keywords.push(keyword);
                    }
                }
                renderKeywordList();
            };
            reader.readAsText(file, 'UTF-8');
            fileInput.value = '';
        }

        function removeKeyword(index) {
            keywords.splice(index, 1);
            renderKeywordList();
        }

        function clearKeywords() {
            if (confirm('确定清空所有关键词吗？')) {
                keywords = [];
                renderKeywordList();
            }
        }

        function renderKeywordList() {
            var list = document.getElementById('keywordList');
            if (keywords.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 10px;">暂无关键词</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < keywords.length; i++) {
                html += '<div class="keyword-item">' + 
                    '<span>' + escapeHtml(keywords[i]) + '</span>' + 
                    '<button onclick="removeKeyword(' + i + ')">×</button>' + 
                    '</div>';
            }
            list.innerHTML = html;
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function cleanData() {
            if (displayData.length === 0) {
                alert('请先导入数据');
                return;
            }
            if (keywords.length === 0) {
                alert('请先添加关键词');
                return;
            }

            displayData = originalData.map(row => row.slice());
            var mode = document.querySelector('input[name="cleanMode"]:checked').value;
            var caseSensitive = document.getElementById('caseSensitive').checked;
            var skipHeader = document.getElementById('skipHeader').checked;
            var replaceText = document.getElementById('replaceText').value;

            var startRow = skipHeader ? 1 : 0;
            var deleteIndices = [];

            for (var r = startRow; r < displayData.length; r++) {
                var row = displayData[r];
                var shouldDelete = false;

                for (var c = 0; c < row.length; c++) {
                    var cell = row[c] || '';
                    var cellText = caseSensitive ? cell : cell.toLowerCase();

                    for (var k = 0; k < keywords.length; k++) {
                        var keyword = caseSensitive ? keywords[k] : keywords[k].toLowerCase();
                        if (cellText.indexOf(keyword) !== -1) {
                            if (mode === 'deleteRow') {
                                shouldDelete = true;
                                break;
                            } else if (mode === 'removeText') {
                                var originalKeyword = keywords[k];
                                var regex = caseSensitive ? new RegExp(originalKeyword, 'g') : new RegExp(originalKeyword, 'gi');
                                row[c] = cell.replace(regex, '');
                            } else if (mode === 'highlight') {
                                row[c] = '<span class="highlight">' + escapeHtml(cell) + '</span>';
                            } else if (mode === 'replace') {
                                var originalKeyword = keywords[k];
                                var regex = caseSensitive ? new RegExp(originalKeyword, 'g') : new RegExp(originalKeyword, 'gi');
                                row[c] = cell.replace(regex, replaceText);
                            }
                        }
                    }
                    if (shouldDelete) break;
                }
                if (shouldDelete) deleteIndices.push(r);
            }

            for (var i = deleteIndices.length - 1; i >= 0; i--) {
                displayData.splice(deleteIndices[i], 1);
            }

            renderTable();
            updateStatus();
            alert('清洗完成！');
        }

        function renderTable() {
            var container = document.getElementById('tableContainer');
            if (displayData.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">暂无数据</div>';
                return;
            }

            var html = '<table><thead><tr>';
            for (var c = 0; c < displayData[0].length; c++) {
                html += '<th>列' + (c + 1) + '</th>';
            }
            html += '</tr></thead><tbody>';

            for (var r = 0; r < displayData.length; r++) {
                html += '<tr>';
                for (var c = 0; c < displayData[r].length; c++) {
                    var cell = displayData[r][c];
                    html += '<td>' + (cell || '') + '</td>';
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function updateStatus() {
            var status = document.getElementById('statusBar');
            if (displayData.length > 0) {
                var cols = displayData[0].length;
                status.innerHTML = `数据已导入：${displayData.length} 行 × ${cols} 列 | 关键词：${keywords.length} 个`;
            } else {
                status.innerHTML = '等待数据...';
            }
        }

        function exportCSV() {
            if (displayData.length === 0) {
                alert('没有数据可导出');
                return;
            }

            var maxCols = 0;
            for (var i = 0; i < displayData.length; i++) {
                if (displayData[i].length > maxCols) maxCols = displayData[i].length;
            }

            var BOM = '\uFEFF';
            var rows = [];
            for (var r = 0; r < displayData.length; r++) {
                var cells = [];
                for (var c = 0; c < maxCols; c++) {
                    var val = displayData[r][c];
                    if (val === null || val === undefined) val = '';
                    val = String(val).replace(/<[^>]*>/g, '');
                    if (val.indexOf('"') !== -1 || val.indexOf(',') !== -1 || val.indexOf('\n') !== -1) {
                        val = '"' + val.replace(/"/g, '""') + '"';
                    }
                    cells.push(val);
                }
                rows.push(cells.join(','));
            }

            var csv = BOM + rows.join('\r\n');
            downloadBlob(csv, '清洗结果_' + getTimestamp() + '.csv', 'text/csv;charset=utf-8');
        }

        function exportExcel() {
            if (displayData.length === 0) {
                alert('没有数据可导出');
                return;
            }

            var maxCols = 0;
            for (var i = 0; i < displayData.length; i++) {
                if (displayData[i].length > maxCols) maxCols = displayData[i].length;
            }

            var sheetData = [];
            for (var r = 0; r < displayData.length; r++) {
                var row = [];
                for (var c = 0; c < maxCols; c++) {
                    var val = displayData[r][c];
                    if (val === null || val === undefined) val = '';
                    val = String(val).replace(/<[^>]*>/g, '');
                    row.push(val);
                }
                sheetData.push(row);
            }

            try {
                var xlsxBuffer = createXLSX(sheetData);
                downloadBlob(xlsxBuffer, '清洗结果_' + getTimestamp() + '.xlsx', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
            } catch (e) {
                console.error('XLSX导出失败:', e);
                exportCSV();
                alert('已切换为CSV格式导出');
            }
        }

        function getTimestamp() {
            var now = new Date();
            var y = now.getFullYear();
            var m = now.getMonth() + 1;
            var d = now.getDate();
            var h = now.getHours();
            var min = now.getMinutes();
            var s = now.getSeconds();
            return y + (m < 10 ? '0' : '') + m + (d < 10 ? '0' : '') + d + '_' +
                   (h < 10 ? '0' : '') + h + (min < 10 ? '0' : '') + min + (s < 10 ? '0' : '') + s;
        }

        function downloadBlob(data, filename, mimeType) {
            var blob;
            if (data instanceof ArrayBuffer) {
                blob = new Blob([data], {type: mimeType});
            } else {
                blob = new Blob([data], {type: mimeType});
            }
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            setTimeout(function() {
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, 1000);
        }

        function createXLSX(data) {
            var rowCount = data.length;
            var colCount = rowCount > 0 ? data[0].length : 0;

            function colLetter(n) {
                var s = '';
                n++;
                while (n > 0) {
                    var r = (n - 1) % 26;
                    s = String.fromCharCode(65 + r) + s;
                    n = Math.floor((n - 1) / 26);
                }
                return s;
            }

            function xmlEsc(s) {
                return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
            }

            function numColLetter(n) {
                var s = '';
                n++;
                while (n > 0) {
                    var r = (n - 1) % 26;
                    s = String.fromCharCode(65 + r) + s;
                    n = Math.floor((n - 1) / 26);
                }
                return s;
            }

            var strings = [];
            var strMap = {};

            function getSSTIdx(s) {
                if (s === null || s === undefined) s = '';
                s = String(s);
                if (strMap[s] === undefined) {
                    strMap[s] = strings.length;
                    strings.push(s);
                }
                return strMap[s];
            }

            var sheetXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" ' +
                'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
                '<dimension ref="A1:' + colLetter(colCount - 1) + rowCount + '"/>' +
                '<sheetViews><sheetView workbookViewId="0"/></sheetViews>' +
                '<sheetFormatPr defaultRowHeight="15"/>' +
                '<sheetData>';

            for (var r = 0; r < rowCount; r++) {
                sheetXml += '<row r="' + (r + 1) + '">';
                for (var c = 0; c < colCount; c++) {
                    var v = data[r][c];
                    var ref = colLetter(c) + (r + 1);
                    var isNum = false;
                    if (v !== '' && v !== null && v !== undefined) {
                        var num = Number(v);
                        if (!isNaN(num) && /^\s*-?\d+(\.\d+)?\s*$/.test(String(v))) {
                            isNum = true;
                            sheetXml += '<c r="' + ref + '"><v>' + num + '</v></c>';
                        }
                    }
                    if (!isNum) {
                        sheetXml += '<c r="' + ref + '" t="s"><v>' + getSSTIdx(v) + '</v></c>';
                    }
                }
                sheetXml += '</row>';
            }
            sheetXml += '</sheetData>' +
                '<pageMargins left="0.7" right="0.7" top="0.75" bottom="0.75" header="0.3" footer="0.3"/>' +
                '</worksheet>';

            var sstXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" ' +
                'count="' + strings.length + '" uniqueCount="' + strings.length + '">';
            for (var i = 0; i < strings.length; i++) {
                sstXml += '<si><t xml:space="preserve">' + xmlEsc(strings[i]) + '</t></si>';
            }
            sstXml += '</sst>';

            var workbookXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" ' +
                'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
                '<sheets><sheet name="Sheet1" sheetId="1" r:id="rId1"/></sheets></workbook>';

            var stylesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">' +
                '<fonts count="1"><font><sz val="11"/><name val="Calibri"/></font></fonts>' +
                '<fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills>' +
                '<borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>' +
                '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>' +
                '<cellXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/></cellXfs>' +
                '<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>' +
                '<dxfs count="0"/><tableStyles count="0" defaultTableStyle="TableStyleMedium2" defaultPivotStyle="PivotStyleLight16"/>' +
                '</styleSheet>';

            var ctXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
                '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
                '<Default Extension="xml" ContentType="application/xml"/>' +
                '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>' +
                '<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>' +
                '<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>' +
                '<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>' +
                '</Types>';

            var rootRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
                '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>' +
                '</Relationships>';

            var wbRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
                '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>' +
                '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>' +
                '<Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>' +
                '</Relationships>';

            var fileList = [
                { name: '[Content_Types].xml', data: ctXml },
                { name: '_rels/.rels', data: rootRels },
                { name: 'xl/workbook.xml', data: workbookXml },
                { name: 'xl/_rels/workbook.xml.rels', data: wbRels },
                { name: 'xl/worksheets/sheet1.xml', data: sheetXml },
                { name: 'xl/sharedStrings.xml', data: sstXml },
                { name: 'xl/styles.xml', data: stylesXml }
            ];

            var crcTab = new Uint32Array(256);
            for (var n = 0; n < 256; n++) {
                var c = n;
                for (var k = 0; k < 8; k++) {
                    c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                }
                crcTab[n] = c >>> 0;
            }

            function crc32Of(buf) {
                var crc = 0xFFFFFFFF;
                for (var i = 0; i < buf.length; i++) {
                    crc = crcTab[(crc ^ buf[i]) & 0xFF] ^ (crc >>> 8);
                }
                return (crc ^ 0xFFFFFFFF) >>> 0;
            }

            function toUtf8Bytes(str) {
                var bytes = [];
                for (var i = 0; i < str.length; i++) {
                    var c = str.charCodeAt(i);
                    if (c < 0x80) {
                        bytes.push(c);
                    } else if (c < 0x800) {
                        bytes.push(0xC0 | (c >> 6));
                        bytes.push(0x80 | (c & 0x3F));
                    } else if (c < 0xD800 || c >= 0xE000) {
                        bytes.push(0xE0 | (c >> 12));
                        bytes.push(0x80 | ((c >> 6) & 0x3F));
                        bytes.push(0x80 | (c & 0x3F));
                    } else {
                        i++;
                        var c2 = str.charCodeAt(i);
                        var cp = 0x10000 + (((c & 0x3FF) << 10) | (c2 & 0x3FF));
                        bytes.push(0xF0 | (cp >> 18));
                        bytes.push(0x80 | ((cp >> 12) & 0x3F));
                        bytes.push(0x80 | ((cp >> 6) & 0x3F));
                        bytes.push(0x80 | (cp & 0x3F));
                    }
                }
                return bytes;
            }

            function w16(buf, off, v) {
                buf[off] = v & 0xFF;
                buf[off + 1] = (v >> 8) & 0xFF;
            }

            function w32(buf, off, v) {
                buf[off] = v & 0xFF;
                buf[off + 1] = (v >> 8) & 0xFF;
                buf[off + 2] = (v >> 16) & 0xFF;
                buf[off + 3] = (v >> 24) & 0xFF;
            }

            var parts = [];
            var totalLen = 0;

            for (var fi = 0; fi < fileList.length; fi++) {
                var file = fileList[fi];
                var nm = toUtf8Bytes(file.name);
                var content = toUtf8Bytes(file.data);
                var crc = crc32Of(content);
                var size = content.length;

                var localLen = 30 + nm.length + size;
                var local = new Uint8Array(localLen);
                
                local[0] = 0x50; local[1] = 0x4B; local[2] = 0x03; local[3] = 0x04;
                w16(local, 4, 20);
                w16(local, 6, 0);
                w16(local, 8, 0);
                w16(local, 10, 0);
                w16(local, 12, 0);
                w32(local, 14, crc);
                w32(local, 18, size);
                w32(local, 22, size);
                w16(local, 26, nm.length);
                w16(local, 28, 0);
                for (var j = 0; j < nm.length; j++) local[30 + j] = nm[j];
                for (var j = 0; j < content.length; j++) local[30 + nm.length + j] = content[j];

                var centralLen = 46 + nm.length;
                var central = new Uint8Array(centralLen);
                
                central[0] = 0x50; central[1] = 0x4B; central[2] = 0x01; central[3] = 0x02;
                w16(central, 4, 20);
                w16(central, 6, 20);
                w16(central, 8, 0);
                w16(central, 10, 0);
                w16(central, 12, 0);
                w16(central, 14, 0);
                w32(central, 16, crc);
                w32(central, 20, size);
                w32(central, 24, size);
                w16(central, 28, nm.length);
                w16(central, 30, 0);
                w16(central, 32, 0);
                w16(central, 34, 0);
                w16(central, 36, 0);
                w32(central, 38, 0);
                w32(central, 42, totalLen);
                for (var j = 0; j < nm.length; j++) central[46 + j] = nm[j];

                parts.push({ local: local, central: central });
                totalLen += localLen;
            }

            var centralStart = totalLen;
            var centralTotal = 0;
            for (var i = 0; i < parts.length; i++) {
                centralTotal += parts[i].central.length;
                totalLen += parts[i].central.length;
            }

            var eocdLen = 22;
            var eocd = new Uint8Array(eocdLen);
            eocd[0] = 0x50; eocd[1] = 0x4B; eocd[2] = 0x05; eocd[3] = 0x06;
            w16(eocd, 4, 0);
            w16(eocd, 6, 0);
            w16(eocd, 8, fileList.length);
            w16(eocd, 10, fileList.length);
            w32(eocd, 12, centralTotal);
            w32(eocd, 16, centralStart);
            w16(eocd, 20, 0);

            totalLen += eocdLen;
            var out = new Uint8Array(totalLen);
            var pos = 0;

            for (var i = 0; i < parts.length; i++) {
                out.set(parts[i].local, pos);
                pos += parts[i].local.length;
            }
            for (var i = 0; i < parts.length; i++) {
                out.set(parts[i].central, pos);
                pos += parts[i].central.length;
            }
            out.set(eocd, pos);

            return out.buffer;
        }
    </script>
