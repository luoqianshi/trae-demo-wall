<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>知识详情</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="knowledge.html">‹</a>
            <span id="navTitle">知识详情</span>
        </div>
        <div class="content">
            <div class="page" style="padding:16px">
                <div style="font-size:20px;font-weight:700;margin-bottom:12px" id="articleTitle">文章标题</div>
                <div style="font-size:13px;color:var(--text-secondary);margin-bottom:20px">萌宠智慧管家 · 养宠知识库</div>
                <div style="font-size:15px;line-height:1.8;color:#333" id="articleContent"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'knowledge.html' });
        const articles = {
            prep: { title: '养宠准备清单', content: '1. 准备食盆、水盆、猫粮/狗粮<br>2. 准备猫砂盆/尿垫<br>3. 预约体检和疫苗<br>4. 准备宠物身份证和牵引绳<br>5. 了解附近宠物医院位置' },
            pregnancy: { title: '孕期管理指南', content: '1. 孕前体检确认身体状况<br>2. 预产期计算与分娩准备<br>3. 孕期营养补充<br>4. 定期产检与胎动监测<br>5. 分娩后母宠与幼宠护理' },
            neutering: { title: '绝育指南', content: '1. 适龄绝育（通常6-9个月）<br>2. 术前禁食禁水8小时<br>3. 术前体检与麻醉评估<br>4. 术后伤口护理与伊丽莎白圈<br>5. 术后饮食与活动管理' },
            vaccine: { title: '疫苗驱虫时间表', content: '1. 幼犬6-8周接种第一针<br>2. 每隔3-4周接种后续疫苗<br>3. 狂犬疫苗通常在3月龄后<br>4. 体内驱虫每3个月一次<br>5. 体外驱虫每月一次' },
            health: { title: '健康护理常识', content: '1. 每日观察精神状态和食欲<br>2. 定期刷牙清洁口腔<br>3. 梳毛减少毛球和皮肤病<br>4. 注意耳道和眼部清洁<br>5. 发现异常及时就医' },
            diet: { title: '饮食营养指南', content: '1. 选择适合年龄段的宠粮<br>2. 避免喂食巧克力和洋葱<br>3. 控制零食摄入量<br>4. 保证充足饮水<br>5. 定期更换食盆清洁' },
            behavior: { title: '行为训练基础', content: '1. 定点排泄训练<br>2. 基础指令：坐下、握手<br>3. 社会化训练<br>4. 纠正咬人和拆家行为<br>5. 奖励正向行为' },
            passing: { title: '临终关怀', content: '1. 陪伴和安抚<br>2. 疼痛管理<br>3. 舒适的休息环境<br>4. 与兽医沟通安宁疗护<br>5. 妥善处理后事与纪念' }
        };
        const id = getParam('id') || 'prep';
        const article = articles[id.replace(/hot\d+/, 'prep')] || articles.prep;
        document.getElementById('articleTitle').textContent = article.title;
        document.getElementById('articleContent').innerHTML = article.content;
    </script>
</body>
</html>
