<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萌宠智慧管家</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span id="clock">9:41</span>
            <span>📶 5G 🔋</span>
        </div>
        <div class="nav-bar">
            <a class="nav-back" id="navBack" href="javascript:history.back()" style="display:none">‹</a>
            <span id="navTitle">萌宠智慧管家</span>
        </div>

        <div class="content">
            <div class="page">
                <div style="background: linear-gradient(180deg, #FFF5F0 0%, var(--bg) 200px); padding: 16px;">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
                        <div>
                            <div class="page-title" id="greeting">早上好</div>
                            <div class="page-desc" id="currentDate">2026年7月15日</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;background:#fff;padding:6px 12px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
                            <div style="width:28px;height:28px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:14px">👤</div>
                            <span style="font-size:13px">我</span>
                        </div>
                    </div>

                    <div class="card" style="margin-bottom:16px;">
                        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
                            <div class="pet-avatar-large" id="currentPetAvatar">🐕</div>
                            <div style="flex:1">
                                <div class="pet-name" style="font-size:20px" id="currentPetName">豆豆</div>
                                <div class="pet-type" id="currentPetMeta">柴犬 · 2岁3个月</div>
                                <div class="pet-tags" style="margin-top:8px">
                                    <span class="tag primary">♂</span>
                                    <span class="tag" id="currentPetWeight">8.5kg</span>
                                </div>
                            </div>
                            <a href="pet-detail.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;color:var(--text-secondary);text-decoration:none">
                                <span>📋</span>
                                <span>详情</span>
                            </a>
                        </div>
                        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
                            <div class="overview-item" style="background:var(--bg);border-radius:14px;padding:12px 8px;text-align:center">
                                <div style="font-size:22px;margin-bottom:6px">💉</div>
                                <span style="font-size:18px;font-weight:700;display:block" id="vaccineCount">0</span>
                                <span style="font-size:11px;color:var(--text-secondary)">疫苗</span>
                            </div>
                            <div class="overview-item" style="background:var(--bg);border-radius:14px;padding:12px 8px;text-align:center">
                                <div style="font-size:22px;margin-bottom:6px">💊</div>
                                <span style="font-size:18px;font-weight:700;display:block" id="dewormCount">0</span>
                                <span style="font-size:11px;color:var(--text-secondary)">驱虫</span>
                            </div>
                            <div class="overview-item" style="background:var(--bg);border-radius:14px;padding:12px 8px;text-align:center">
                                <div style="font-size:22px;margin-bottom:6px">🏥</div>
                                <span style="font-size:18px;font-weight:700;display:block" id="medicalCount">0</span>
                                <span style="font-size:11px;color:var(--text-secondary)">就医</span>
                            </div>
                            <div class="overview-item" style="background:var(--bg);border-radius:14px;padding:12px 8px;text-align:center">
                                <div style="font-size:22px;margin-bottom:6px">🛁</div>
                                <span style="font-size:18px;font-weight:700;display:block" id="hygieneCount">0</span>
                                <span style="font-size:11px;color:var(--text-secondary)">护理</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-header">
                        <span class="section-title">即将到期</span>
                        <a href="reminder.html" class="section-action">全部提醒</a>
                    </div>
                    <div class="card" id="reminderList"></div>
                </div>

                <div class="section">
                    <div class="section-header">
                        <span class="section-title">常用功能</span>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon" style="background:#4CAF5020">📝</div>
                            <span class="card-title">快速记录</span>
                            <span class="card-badge">6项</span>
                        </div>
                        <div class="feature-scroll">
                            <a href="record-add.html?type=vaccine" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#4CAF5020">💉</div>
                                <span class="feature-name">记疫苗</span>
                            </a>
                            <a href="record-add.html?type=deworm" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#FF980020">💊</div>
                                <span class="feature-name">记驱虫</span>
                            </a>
                            <a href="record-add.html?type=medical" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#F4433620">🏥</div>
                                <span class="feature-name">记就医</span>
                            </a>
                            <a href="record-add.html?type=weight" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#2196F320">⚖️</div>
                                <span class="feature-name">记体重</span>
                            </a>
                            <a href="hygiene-add.html" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#00BCD420">🛁</div>
                                <span class="feature-name">护理</span>
                            </a>
                            <a href="daily-expense.html" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#9C27B020">📝</div>
                                <span class="feature-name">手账</span>
                            </a>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon" style="background:#E91E6320">✨</div>
                            <span class="card-title">特殊管理</span>
                            <span class="card-badge">4项</span>
                        </div>
                        <div class="feature-grid">
                            <a href="placeholder.html?title=宠物求偶" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#E91E6320">💕</div>
                                <span class="feature-name">宠物求偶</span>
                            </a>
                            <a href="pregnancy.html" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#FF572220">🐾</div>
                                <span class="feature-name">孕期管理</span>
                            </a>
                            <a href="neutering.html" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#607D8B20">✂️</div>
                                <span class="feature-name">绝育管理</span>
                            </a>
                            <a href="placeholder.html?title=宠物寻回" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#79554820">🔍</div>
                                <span class="feature-name">宠物寻回</span>
                            </a>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon" style="background:#00BCD420">🧰</div>
                            <span class="card-title">辅助工具</span>
                            <span class="card-badge">5项</span>
                        </div>
                        <div class="feature-scroll">
                            <a href="emergency.html" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#F4433620">🆘</div>
                                <span class="feature-name">紧急救助</span>
                            </a>
                            <a href="symptom-check.html" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#FF980020">🔍</div>
                                <span class="feature-name">症状自查</span>
                            </a>
                            <a href="knowledge.html" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#4CAF5020">📖</div>
                                <span class="feature-name">新手指南</span>
                            </a>
                            <a href="placeholder.html?title=养宠预算" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#2196F320">💰</div>
                                <span class="feature-name">养宠预算</span>
                            </a>
                            <a href="placeholder.html?title=邀请管理" class="feature-item" style="text-decoration:none;color:inherit">
                                <div class="feature-icon-wrapper" style="background:#9C27B020">👥</div>
                                <span class="feature-name">邀请管理</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="desktop-hint">请在手机或浏览器开发者工具中查看最佳效果</div>

    <script src="js/app.js"></script>
    <script>
        initPage({ tab: 'home', back: false });

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const hour = now.getHours();
            let text = '晚上好';
            if (hour < 12) text = '早上好';
            else if (hour < 18) text = '下午好';
            document.getElementById('greeting').textContent = text;
            document.getElementById('currentDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
        }
        updateClock();

        function renderHome() {
            const pet = App.getCurrentPet();
            document.getElementById('currentPetName').textContent = pet.name;
            document.getElementById('currentPetMeta').textContent = `${pet.breed || App.getTypeName(pet.type)} · ${pet.ageText}`;
            document.getElementById('currentPetAvatar').textContent = pet.avatar;
            document.getElementById('currentPetWeight').textContent = pet.weight + 'kg';

            const counts = { vaccine: 0, deworm: 0, medical: 0, hygiene: 0 };
            App.getPetRecords(pet.id).forEach(r => {
                if (counts[r.type] !== undefined) counts[r.type]++;
            });
            document.getElementById('vaccineCount').textContent = counts.vaccine;
            document.getElementById('dewormCount').textContent = counts.deworm;
            document.getElementById('medicalCount').textContent = counts.medical;
            document.getElementById('hygieneCount').textContent = counts.hygiene;

            const list = document.getElementById('reminderList');
            if (App.data.reminders.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding:30px"><div class="empty-icon" style="font-size:40px">⏰</div><div class="empty-title">暂无提醒</div></div>';
            } else {
                list.innerHTML = App.data.reminders.slice(0, 3).map(r => `
                    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
                        <div style="width:40px;height:40px;border-radius:12px;background:#FFF0E6;display:flex;align-items:center;justify-content:center;font-size:20px">${App.getTypeIcon(r.type)}</div>
                        <div style="flex:1">
                            <div style="font-size:14px;font-weight:600">${r.title}</div>
                            <div style="font-size:12px;color:var(--text-secondary)">${pet.name}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-size:14px;font-weight:600;color:var(--danger)">${r.daysLeft}天后</div>
                            <div style="font-size:11px;color:var(--text-secondary)">${r.date}</div>
                        </div>
                    </div>
                `).join('');
            }
        }
        renderHome();
    </script>
</body>
</html>
