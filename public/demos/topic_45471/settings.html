<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设置</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="index.html">‹</a>
            <span id="navTitle">设置</span>
        </div>
        <div class="content">
            <div class="page">
                <div style="background:var(--primary);padding:30px 16px;text-align:center;color:#fff;margin-bottom:12px">
                    <div style="width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px">🐾</div>
                    <div style="font-size:18px;font-weight:700">萌宠智慧管家</div>
                    <div style="font-size:13px;opacity:0.9;margin-top:4px">v1.4.0 · 完全离线 · 隐私安全</div>
                </div>

                <div class="menu-group">
                    <div class="menu-title">通知设置</div>
                    <div class="menu-item">
                        <div class="menu-icon">🔔</div>
                        <span class="menu-text">接收通知</span>
                        <div class="switch active" data-field="notification" onclick="toggleSwitch(this)"></div>
                    </div>
                    <div class="menu-item">
                        <div class="menu-icon">🔊</div>
                        <span class="menu-text">声音提醒</span>
                        <div class="switch active" data-field="sound" onclick="toggleSwitch(this)"></div>
                    </div>
                    <div class="menu-item">
                        <div class="menu-icon">📳</div>
                        <span class="menu-text">振动提醒</span>
                        <div class="switch" data-field="vibration" onclick="toggleSwitch(this)"></div>
                    </div>
                </div>

                <div class="menu-group">
                    <a href="reminder.html" class="menu-item">
                        <div class="menu-icon">⏰</div>
                        <span class="menu-text">提醒管理</span>
                        <span class="menu-arrow">›</span>
                    </a>
                    <a href="placeholder.html?title=数据管理" class="menu-item">
                        <div class="menu-icon">💾</div>
                        <span class="menu-text">数据导出</span>
                        <span class="menu-arrow">›</span>
                    </a>
                    <a href="placeholder.html?title=隐私安全" class="menu-item">
                        <div class="menu-icon">🔒</div>
                        <span class="menu-text">隐私与安全</span>
                        <span class="menu-arrow">›</span>
                    </a>
                </div>

                <div class="menu-group">
                    <a href="about.html" class="menu-item">
                        <div class="menu-icon">ℹ️</div>
                        <span class="menu-text">关于我们</span>
                        <span class="menu-arrow">›</span>
                    </a>
                    <a href="placeholder.html?title=帮助中心" class="menu-item">
                        <div class="menu-icon">❓</div>
                        <span class="menu-text">帮助中心</span>
                        <span class="menu-arrow">›</span>
                    </a>
                    <a href="placeholder.html?title=意见反馈" class="menu-item">
                        <div class="menu-icon">💬</div>
                        <span class="menu-text">意见反馈</span>
                        <span class="menu-arrow">›</span>
                    </a>
                </div>

                <div style="text-align:center;padding:24px;color:var(--text-secondary);font-size:12px">
                    本 Demo 数据存储在浏览器本地
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ tab: 'settings', back: 'index.html' });
        function toggleSwitch(el) {
            el.classList.toggle('active');
            const field = el.dataset.field;
            App.updateSettings(field, el.classList.contains('active'));
        }
    </script>
</body>
</html>
