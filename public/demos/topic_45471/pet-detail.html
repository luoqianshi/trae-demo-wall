<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宠物详情</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="pets.html">‹</a>
            <span id="navTitle">宠物详情</span>
            <a class="nav-right" href="#" onclick="editPet()">编辑</a>
        </div>
        <div class="content">
            <div class="page">
                <div class="card" style="text-align:center;padding:24px 16px">
                    <div class="pet-avatar-large" style="margin:0 auto 12px" id="petAvatar">🐕</div>
                    <div class="pet-name" style="font-size:22px" id="petName">豆豆</div>
                    <div class="pet-type" id="petMeta">柴犬 · 2岁3个月</div>
                    <div style="margin-top:12px">
                        <span class="tag primary" id="petGender">♂</span>
                        <span class="tag" id="petWeight">8.5kg</span>
                        <span class="tag" id="petStatus">正常</span>
                    </div>
                </div>
                <div class="section">
                    <div class="section-header">
                        <span class="section-title">健康记录</span>
                        <a href="health-records.html" class="section-action">查看全部</a>
                    </div>
                    <div id="recordsList"></div>
                </div>
                <div class="section" style="padding:0 16px 24px">
                    <a href="record-add.html" class="btn-primary btn-block" style="margin-bottom:10px">添加健康记录</a>
                    <button class="btn-primary btn-block btn-outline" onclick="archivePet()">封存档案</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'pets.html' });
        const petId = parseInt(getParam('id')) || App.data.currentPetId;
        const pet = App.data.pets.find(p => p.id === petId) || App.getCurrentPet();

        document.getElementById('petAvatar').textContent = pet.avatar;
        document.getElementById('petName').textContent = pet.name;
        document.getElementById('petMeta').textContent = `${pet.breed || App.getTypeName(pet.type)} · ${pet.ageText}`;
        document.getElementById('petGender').textContent = pet.gender === 'male' ? '♂' : '♀';
        document.getElementById('petWeight').textContent = pet.weight + 'kg';
        document.getElementById('petStatus').textContent = pet.status === 'active' ? '正常' : '已封存';

        function editPet() {
            location.href = 'pet-edit.html?id=' + pet.id;
        }

        function archivePet() {
            App.updatePet(pet.id, { status: 'archived' });
            showToast('已封存');
            setTimeout(() => location.href = 'pets.html', 500);
        }

        const records = App.getPetRecords(pet.id).slice(0, 5);
        const list = document.getElementById('recordsList');
        if (records.length === 0) {
            list.innerHTML = '<div class="empty-state" style="padding:30px"><div class="empty-icon" style="font-size:40px">📋</div><div class="empty-title">暂无记录</div></div>';
        } else {
            list.innerHTML = records.map(r => `
                <div class="card" style="margin-bottom:10px">
                    <div style="display:flex;align-items:center;gap:12px">
                        ${renderRecordIcon(r.type)}
                        <div style="flex:1">
                            <div style="font-size:15px;font-weight:600">${r.title}</div>
                            <div style="font-size:12px;color:var(--text-secondary)">${r.date}</div>
                            <div style="font-size:12px;color:var(--text-secondary)">${r.note}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
