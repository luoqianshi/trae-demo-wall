<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>养宠知识库</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="index.html">‹</a>
            <span id="navTitle">养宠知识库</span>
        </div>
        <div class="content">
            <div class="page">
                <div class="page-header">
                    <div class="page-title">养宠知识库</div>
                    <div class="page-desc">科学养宠，从了解开始</div>
                </div>
                <div class="section">
                    <div style="background:var(--surface);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px">
                        <span style="font-size:18px">🔍</span>
                        <input type="text" placeholder="搜索知识、品种、问题..." style="border:none;outline:none;flex:1;font-size:14px;background:transparent">
                    </div>
                </div>
                <div class="section">
                    <div class="section-title">知识分类</div>
                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:12px">
                        <a href="knowledge-detail.html?id=prep" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#FF572220">🛒</div>
                            <span class="feature-name">养宠准备</span>
                        </a>
                        <a href="knowledge-detail.html?id=pregnancy" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#E91E6320">🐣</div>
                            <span class="feature-name">孕期管理</span>
                        </a>
                        <a href="knowledge-detail.html?id=neutering" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#607D8B20">✂️</div>
                            <span class="feature-name">绝育指南</span>
                        </a>
                        <a href="knowledge-detail.html?id=vaccine" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#4CAF5020">💉</div>
                            <span class="feature-name">疫苗驱虫</span>
                        </a>
                        <a href="knowledge-detail.html?id=health" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#F4433620">🏥</div>
                            <span class="feature-name">健康护理</span>
                        </a>
                        <a href="knowledge-detail.html?id=diet" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#FF980020">🍖</div>
                            <span class="feature-name">饮食营养</span>
                        </a>
                        <a href="knowledge-detail.html?id=behavior" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#2196F320">🎾</div>
                            <span class="feature-name">行为训练</span>
                        </a>
                        <a href="knowledge-detail.html?id=passing" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#9C27B020">🌈</div>
                            <span class="feature-name">临终关怀</span>
                        </a>
                    </div>
                </div>
                <div class="section">
                    <div class="section-header">
                        <span class="section-title">热门知识</span>
                    </div>
                    <div id="hotList"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'index.html' });
        const hotArticles = [
            { id: 1, title: '新手养狗必看：疫苗接种时间表', views: '1.2万', tag: '疫苗' },
            { id: 2, title: '猫咪驱虫多久做一次？', views: '8千', tag: '驱虫' },
            { id: 3, title: '宠物绝育前需要做哪些准备？', views: '6千', tag: '绝育' },
            { id: 4, title: '狗狗怀孕后的护理要点', views: '5千', tag: '孕期' },
            { id: 5, title: '如何判断宠物是否肥胖？', views: '4千', tag: '健康' }
        ];
        document.getElementById('hotList').innerHTML = hotArticles.map((a, i) => `
            <a href="knowledge-detail.html?id=hot${a.id}" class="list-item" style="text-decoration:none;color:inherit">
                <div style="width:28px;height:28px;border-radius:8px;background:${i < 3 ? 'var(--primary)' : 'var(--bg)'};color:${i < 3 ? '#fff' : 'var(--text-secondary)'};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700">${i+1}</div>
                <div class="list-content">
                    <div class="list-title">${a.title}</div>
                    <div class="list-desc">${a.views}阅读 · ${a.tag}</div>
                </div>
                <span class="list-arrow">›</span>
            </a>
        `).join('');
    </script>
</body>
</html>
