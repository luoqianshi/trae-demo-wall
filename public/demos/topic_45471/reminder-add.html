<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添加提醒</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="reminder.html">‹</a>
            <span id="navTitle">添加提醒</span>
        </div>
        <div class="content">
            <div class="page" style="padding:16px">
                <div class="form-group">
                    <label class="form-label">选择宠物</label>
                    <select class="form-select" id="reminderPet"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">提醒类型</label>
                    <select class="form-select" id="reminderType">
                        <option value="vaccine">疫苗</option>
                        <option value="deworm">驱虫</option>
                        <option value="checkup">体检</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">提醒标题</label>
                    <input type="text" class="form-input" id="reminderTitle" placeholder="例如：年度疫苗加强针">
                </div>
                <div class="form-group">
                    <label class="form-label">到期日期</label>
                    <input type="date" class="form-input" id="reminderDate">
                </div>
                <button class="btn-primary btn-block" onclick="saveReminder()">保存</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'reminder.html' });
        document.getElementById('reminderDate').value = new Date().toISOString().split('T')[0];
        const petSelect = document.getElementById('reminderPet');
        App.data.pets.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name;
            petSelect.appendChild(opt);
        });
        petSelect.value = App.data.currentPetId;

        function saveReminder() {
            const petId = parseInt(petSelect.value);
            const type = document.getElementById('reminderType').value;
            const title = document.getElementById('reminderTitle').value.trim();
            const date = document.getElementById('reminderDate').value;
            if (!title) { showToast('请输入标题'); return; }

            const daysLeft = Math.ceil((new Date(date) - new Date()) / (1000 * 60 * 60 * 24));
            App.addReminder({ petId, type, title, date, daysLeft });
            App.data.currentPetId = petId;
            App.save();
            showToast('添加成功');
            setTimeout(() => location.href = 'reminder.html', 500);
        }
    </script>
</body>
</html>
