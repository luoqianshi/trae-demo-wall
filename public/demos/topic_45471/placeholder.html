<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>功能页面</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="index.html">‹</a>
            <span id="navTitle">功能页面</span>
        </div>
        <div class="content">
            <div class="page">
                <div class="empty-state">
                    <div class="empty-icon">🚧</div>
                    <div class="empty-title" id="pageName">功能页面</div>
                    <div class="empty-desc">该功能在 Demo 中仅作入口展示<br>完整功能请体验微信小程序</div>
                    <a href="index.html" class="btn-primary">返回首页</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'index.html' });
        const title = decodeURIComponent(getParam('title') || '功能页面');
        document.getElementById('pageName').textContent = title;
        document.getElementById('navTitle').textContent = title;
    </script>
</body>
</html>
