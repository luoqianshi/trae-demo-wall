<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日常手账</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="index.html">‹</a>
            <span id="navTitle">日常手账</span>
        </div>
        <div class="content">
            <div class="page">
                <div class="page-header">
                    <div class="page-title">日常手账</div>
                    <div class="page-desc">记录宠物相关支出</div>
                </div>
                <div id="petSelector"></div>
                <div class="card" style="margin:0 16px 16px">
                    <div style="font-size:13px;color:var(--text-secondary)">总支出</div>
                    <div style="font-size:32px;font-weight:700;color:var(--primary)" id="totalExpense">¥0</div>
                </div>
                <div class="section">
                    <div class="section-header">
                        <span class="section-title">支出记录</span>
                    </div>
                    <div id="expenseList"></div>
                </div>
            </div>
        </div>
        <a href="record-add.html?type=expense" class="fab">+</a>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'index.html' });
        let currentPetId = App.data.currentPetId;

        function selectPet(id) {
            currentPetId = id;
            App.data.currentPetId = id;
            App.save();
            renderExpense();
        }

        function renderExpense() {
            const records = App.getPetRecords(currentPetId).filter(r => r.cost > 0);
            const total = records.reduce((sum, r) => sum + r.cost, 0);
            document.getElementById('totalExpense').textContent = '¥' + total;

            const list = document.getElementById('expenseList');
            if (records.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding:30px"><div class="empty-icon" style="font-size:48px">📝</div><div class="empty-title">暂无支出记录</div></div>';
            } else {
                list.innerHTML = records.map(r => `
                    <div class="card" style="margin-bottom:10px">
                        <div style="display:flex;justify-content:space-between;align-items:center">
                            <div>
                                <div style="font-size:15px;font-weight:600">${r.title}</div>
                                <div style="font-size:12px;color:var(--text-secondary)">${r.date}</div>
                                <div style="font-size:12px;color:var(--text-secondary)">${r.note}</div>
                            </div>
                            <div style="font-size:18px;font-weight:700;color:var(--primary)">¥${r.cost}</div>
                        </div>
                    </div>
                `).join('');
            }
            renderPetSelector('petSelector', 'selectPet');
        }
        renderExpense();
    </script>
</body>
</html>
