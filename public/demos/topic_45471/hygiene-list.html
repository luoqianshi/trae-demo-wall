<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卫生护理</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="content">
            <div class="page hygiene-page" style="padding:0">
                <!-- 蓝色头部 -->
                <div class="hygiene-header">
                    <a href="index.html" class="hygiene-back">‹</a>
                    <div class="hygiene-header-content">
                        <div class="hygiene-pet-avatar" id="headerAvatar">🐕</div>
                        <div class="hygiene-header-text">
                            <div class="hygiene-title">卫生护理</div>
                            <div class="hygiene-desc" id="headerDesc">豆豆的护理记录</div>
                        </div>
                    </div>
                </div>

                <!-- 宠物选择 -->
                <div class="hy-pet-selector">
                    <div class="hy-pet-list" id="petList"></div>
                </div>

                <!-- 统计卡片 -->
                <div class="hy-stats-card">
                    <div class="hy-stats-row">
                        <div class="hy-stats-item">
                            <span class="hy-stats-value" id="monthCount">0</span>
                            <span class="hy-stats-label">本月护理</span>
                        </div>
                        <div class="hy-stats-item">
                            <span class="hy-stats-value" id="upcomingCount">0</span>
                            <span class="hy-stats-label">待护理</span>
                        </div>
                        <div class="hy-stats-item">
                            <span class="hy-stats-value" id="lastDate">-</span>
                            <span class="hy-stats-label">上次护理</span>
                        </div>
                    </div>
                </div>

                <div style="padding:0 16px">
                    <!-- 添加护理记录 -->
                    <div class="hy-section">
                        <div class="hy-section-title">添加护理记录</div>
                        <div class="hy-type-grid" id="typeGrid"></div>
                    </div>

                    <!-- 护理提醒 -->
                    <div class="hy-section" id="upcomingSection" style="display:none">
                        <div class="hy-section-title">
                            <span>护理提醒</span>
                            <span class="subtitle" id="upcomingSubtitle">0项待处理</span>
                        </div>
                        <div class="hy-upcoming-list" id="upcomingList"></div>
                    </div>

                    <!-- 护理记录 -->
                    <div class="hy-section">
                        <div class="hy-section-title">
                            <span>护理记录</span>
                            <span class="subtitle" id="recordCount">0条</span>
                        </div>
                        <div id="recordList"></div>
                    </div>
                </div>
            </div>
        </div>
        <a href="hygiene-add.html" class="fab">+</a>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ tab: 'hygiene', back: 'index.html' });
        let currentPetId = App.data.currentPetId;

        const HYGIENE_CATEGORIES = {
            bath: { id: 'bath', name: '洗澡', icon: '🛁', color: '#4FC3F7', description: '清洁身体，保持卫生' },
            grooming: { id: 'grooming', name: '美容美毛', icon: '✂️', color: '#BA68C8', description: '修剪毛发，梳理被毛' },
            nailTrim: { id: 'nailTrim', name: '剪指甲', icon: '🐾', color: '#FFB74D', description: '修剪指甲，防止过长' },
            earClean: { id: 'earClean', name: '清洁耳朵', icon: '👂', color: '#FF8A65', description: '清洁耳道，预防耳螨' },
            teethBrush: { id: 'teethBrush', name: '刷牙', icon: '🦷', color: '#4DB6AC', description: '口腔清洁，预防牙病' },
            waterChange: { id: 'waterChange', name: '换水', icon: '💧', color: '#4FC3F7', description: '更换水体，保持水质' },
            tankClean: { id: 'tankClean', name: '清洁缸体', icon: '🧽', color: '#7986CB', description: '清洁容器，去除污垢' },
            sandBath: { id: 'sandBath', name: '沙浴', icon: '🏖️', color: '#FFD54F', description: '沙浴清洁，去除油脂' },
            cageClean: { id: 'cageClean', name: '清洁笼子', icon: '🧹', color: '#A1887F', description: '清理笼舍，更换垫料' },
            wingClip: { id: 'wingClip', name: '剪羽', icon: '✂️', color: '#E91E63', description: '修剪飞羽，防止飞逃' },
            other: { id: 'other', name: '其他护理', icon: '📋', color: '#90A4AE', description: '其他卫生护理项目' }
        };

        const PET_HYGIENE_TYPES = {
            dog: ['bath', 'grooming', 'nailTrim', 'earClean', 'teethBrush', 'other'],
            cat: ['bath', 'grooming', 'nailTrim', 'earClean', 'teethBrush', 'other'],
            rabbit: ['grooming', 'nailTrim', 'earClean', 'cageClean', 'other'],
            hamster: ['sandBath', 'cageClean', 'other'],
            guineaPig: ['bath', 'grooming', 'nailTrim', 'cageClean', 'other'],
            parakeet: ['bath', 'cageClean', 'nailTrim', 'wingClip', 'other'],
            turtle: ['waterChange', 'tankClean', 'other'],
            goldfish: ['waterChange', 'tankClean', 'other'],
            other: ['bath', 'grooming', 'nailTrim', 'other']
        };

        function selectPet(id) {
            currentPetId = id;
            App.data.currentPetId = id;
            App.save();
            renderHygiene();
        }

        function addRecord(type) {
            location.href = 'hygiene-add.html?type=' + type;
        }

        function formatDate(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function getPetHygieneTypes(petType) {
            const types = PET_HYGIENE_TYPES[petType] || PET_HYGIENE_TYPES['other'];
            return types.map(id => HYGIENE_CATEGORIES[id]);
        }

        function renderHygiene() {
            const pet = App.data.pets.find(p => p.id === currentPetId) || App.getCurrentPet();
            document.getElementById('headerAvatar').textContent = pet.avatar;
            document.getElementById('headerDesc').textContent = pet.name + '的护理记录';

            // 宠物选择器
            document.getElementById('petList').innerHTML = App.data.pets.map(p => `
                <div class="hy-pet-item ${p.id === currentPetId ? 'active' : ''}" onclick="selectPet(${p.id})">
                    <div class="hy-pet-avatar">${p.avatar}</div>
                    <span class="hy-pet-name">${p.name}</span>
                </div>
            `).join('');

            // 护理记录
            const records = App.getPetHygieneRecords(currentPetId);
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            const monthCount = records.filter(r => {
                const d = new Date(r.date);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            }).length;

            // 统计
            document.getElementById('monthCount').textContent = monthCount;
            document.getElementById('recordCount').textContent = records.length + '条';

            // 上次护理
            if (records.length > 0) {
                const last = records[0];
                const d = new Date(last.date);
                document.getElementById('lastDate').textContent = `${d.getMonth()+1}/${d.getDate()}`;
            } else {
                document.getElementById('lastDate').textContent = '-';
            }

            // 护理提醒（基于nextDate计算）
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const upcoming = records
                .filter(r => r.nextDate)
                .map(r => {
                    const next = new Date(r.nextDate);
                    next.setHours(0, 0, 0, 0);
                    const type = HYGIENE_CATEGORIES[r.type] || HYGIENE_CATEGORIES['other'];
                    const daysUntil = Math.ceil((next - today) / (1000 * 60 * 60 * 24));
                    return {
                        ...r,
                        ...type,
                        daysUntil,
                        isOverdue: daysUntil < 0,
                        isToday: daysUntil === 0,
                        isFirstRecord: false
                    };
                })
                .filter(r => r.daysUntil <= 14) // 只显示14天内到期的
                .sort((a, b) => a.daysUntil - b.daysUntil);

            // 对于没有记录的护理类型，显示"待首次记录"
            const hygieneTypes = getPetHygieneTypes(pet.type);
            const recordedTypes = new Set(records.map(r => r.type));
            hygieneTypes.forEach(type => {
                if (!recordedTypes.has(type.id)) {
                    upcoming.push({
                        ...type,
                        daysUntil: 0,
                        isOverdue: false,
                        isToday: false,
                        isFirstRecord: true,
                        type: type.id
                    });
                }
            });

            document.getElementById('upcomingCount').textContent = upcoming.length;
            document.getElementById('upcomingSubtitle').textContent = upcoming.length + '项待处理';

            const upcomingSection = document.getElementById('upcomingSection');
            if (upcoming.length === 0) {
                upcomingSection.style.display = 'none';
            } else {
                upcomingSection.style.display = 'block';
                document.getElementById('upcomingList').innerHTML = upcoming.map(item => {
                    let daysText, dateText;
                    if (item.isFirstRecord) {
                        daysText = '待首次';
                        dateText = '待首次记录';
                    } else if (item.isOverdue) {
                        daysText = `逾期${Math.abs(item.daysUntil)}天`;
                        dateText = '已逾期';
                    } else if (item.isToday) {
                        daysText = '今天';
                        dateText = '今天到期';
                    } else {
                        daysText = `还有${item.daysUntil}天`;
                        dateText = formatDate(item.nextDate);
                    }
                    return `
                        <div class="hy-upcoming-item ${item.isOverdue ? 'overdue' : ''} ${item.isFirstRecord ? 'first-record' : ''}">
                            <div class="hy-upcoming-icon" style="background:${item.color}20;color:${item.color}">${item.icon}</div>
                            <div class="hy-upcoming-info">
                                <span class="hy-upcoming-name">${item.name}</span>
                                <span class="hy-upcoming-date">${dateText}</span>
                            </div>
                            <div class="hy-upcoming-action">
                                <span class="hy-days-badge ${item.isOverdue ? 'overdue' : ''}">${daysText}</span>
                                <button class="hy-btn-add-small" onclick="addRecord('${item.type}')">记录</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // 护理类型入口
            document.getElementById('typeGrid').innerHTML = hygieneTypes.map(t => `
                <a href="hygiene-add.html?type=${t.id}" class="hy-type-item" style="text-decoration:none;color:inherit">
                    <div class="hy-type-icon" style="background:${t.color}20;color:${t.color}">${t.icon}</div>
                    <span class="hy-type-name">${t.name}</span>
                    <span class="hy-type-desc">${t.description}</span>
                </a>
            `).join('');

            // 护理记录列表
            const list = document.getElementById('recordList');
            if (records.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="padding:30px">
                        <div class="empty-icon" style="font-size:48px">🛁</div>
                        <div class="empty-title">暂无护理记录</div>
                        <div class="empty-desc">点击上方添加第一条护理记录</div>
                    </div>
                `;
            } else {
                list.innerHTML = records.map(r => {
                    const type = HYGIENE_CATEGORIES[r.type] || HYGIENE_CATEGORIES['other'];
                    return `
                        <div class="hy-record-item">
                            <div class="hy-record-icon" style="background:${type.color}20;color:${type.color}">${type.icon}</div>
                            <div class="hy-record-content">
                                <div class="hy-record-header">
                                    <span class="hy-record-type">${r.typeName || r.name}</span>
                                    <span class="hy-record-date">${formatDate(r.date)}</span>
                                </div>
                                ${r.cost ? `<div class="hy-record-detail"><span class="hy-detail-item cost">💰 ¥${Number(r.cost).toFixed(2)}</span></div>` : ''}
                                ${r.note ? `<div class="hy-record-note">${r.note}</div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }
        renderHygiene();
    </script>
</body>
</html>
