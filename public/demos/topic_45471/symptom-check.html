<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>症状自查</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="offline-tools.html">‹</a>
            <span id="navTitle">症状自查</span>
        </div>
        <div class="content">
            <div class="page" style="padding:16px">
                <div style="font-size:14px;color:var(--text-secondary);margin-bottom:16px">选择宠物出现的症状，获取初步建议（仅供参考，严重情况请及时就医）</div>
                <div id="symptomList"></div>
                <button class="btn-primary btn-block" onclick="checkSymptoms()" style="margin-top:20px">查看建议</button>
                <div id="result" style="margin-top:20px;display:none" class="card"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'offline-tools.html' });
        const symptoms = [
            { id: 'vomit', name: '呕吐', level: 'medium' },
            { id: 'diarrhea', name: '腹泻', level: 'medium' },
            { id: 'noEat', name: '食欲不振', level: 'low' },
            { id: 'lethargy', name: '精神萎靡', level: 'high' },
            { id: 'fever', name: '发热', level: 'high' },
            { id: 'cough', name: '咳嗽', level: 'medium' },
            { id: 'scratch', name: '频繁抓挠', level: 'low' },
            { id: 'limping', name: '跛行', level: 'medium' }
        ];
        const selected = new Set();

        document.getElementById('symptomList').innerHTML = symptoms.map(s => `
            <div class="symptom-item" data-id="${s.id}" onclick="toggleSymptom('${s.id}')" style="background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:2px solid transparent">
                <span style="font-size:15px">${s.name}</span>
                <span class="check" style="width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px">✓</span>
            </div>
        `).join('');

        function toggleSymptom(id) {
            const el = document.querySelector(`[data-id="${id}"]`);
            if (selected.has(id)) {
                selected.delete(id);
                el.style.borderColor = 'transparent';
                el.querySelector('.check').style.background = 'transparent';
                el.querySelector('.check').style.borderColor = 'var(--border)';
            } else {
                selected.add(id);
                el.style.borderColor = 'var(--primary)';
                el.querySelector('.check').style.background = 'var(--primary)';
                el.querySelector('.check').style.borderColor = 'var(--primary)';
            }
        }

        function checkSymptoms() {
            const result = document.getElementById('result');
            if (selected.size === 0) { showToast('请至少选择一个症状'); return; }
            const high = ['lethargy', 'fever'].some(id => selected.has(id));
            const text = high
                ? '检测到高风险症状，建议立即联系宠物医院或前往急诊。'
                : '症状较轻，可先观察 24 小时。如持续或加重，请及时就医。';
            result.style.display = 'block';
            result.innerHTML = `<div style="font-size:15px;font-weight:600;margin-bottom:8px;color:${high ? 'var(--danger)' : 'var(--warning)'}">自查结果</div><div style="font-size:14px;line-height:1.7;color:var(--text-secondary)">${text}</div><a href="emergency.html" class="btn-primary btn-block" style="margin-top:12px">查看急救指南</a>`;
        }
    </script>
</body>
</html>
