<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编辑宠物</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="pet-detail.html">‹</a>
            <span id="navTitle">编辑宠物</span>
        </div>
        <div class="content">
            <div class="page" style="padding:16px">
                <div class="form-group">
                    <label class="form-label">宠物名称</label>
                    <input type="text" class="form-input" id="petName">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">类型</label>
                        <select class="form-select" id="petType">
                            <option value="dog">狗狗</option>
                            <option value="cat">猫咪</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">品种</label>
                        <input type="text" class="form-input" id="petBreed">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">体重（kg）</label>
                        <input type="number" class="form-input" id="petWeight">
                    </div>
                    <div class="form-group">
                        <label class="form-label">年龄描述</label>
                        <input type="text" class="form-input" id="petAge">
                    </div>
                </div>
                <button class="btn-primary btn-block" onclick="savePet()">保存修改</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'pet-detail.html' });
        const petId = parseInt(getParam('id')) || App.data.currentPetId;
        const pet = App.data.pets.find(p => p.id === petId) || App.getCurrentPet();
        document.getElementById('petName').value = pet.name;
        document.getElementById('petType').value = pet.type;
        document.getElementById('petBreed').value = pet.breed || '';
        document.getElementById('petWeight').value = pet.weight;
        document.getElementById('petAge').value = pet.ageText;

        function savePet() {
            App.updatePet(pet.id, {
                name: document.getElementById('petName').value.trim(),
                type: document.getElementById('petType').value,
                breed: document.getElementById('petBreed').value.trim(),
                weight: parseFloat(document.getElementById('petWeight').value) || 0,
                ageText: document.getElementById('petAge').value.trim() || '未知年龄'
            });
            showToast('保存成功');
            setTimeout(() => location.href = 'pet-detail.html?id=' + pet.id, 500);
        }
    </script>
</body>
</html>
