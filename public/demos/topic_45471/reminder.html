<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康提醒</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="index.html">‹</a>
            <span id="navTitle">健康提醒</span>
        </div>
        <div class="content">
            <div class="page">
                <div class="page-header">
                    <div class="page-title">健康提醒</div>
                    <div class="page-desc">不错过每一个健康节点</div>
                </div>
                <div id="petSelector"></div>
                <div class="filter-tabs" style="padding:0 16px;margin-bottom:12px">
                    <div class="filter-tab active" data-rfilter="all" onclick="filterReminders('all')">全部</div>
                    <div class="filter-tab" data-rfilter="upcoming" onclick="filterReminders('upcoming')">即将到期</div>
                    <div class="filter-tab" data-rfilter="overdue" onclick="filterReminders('overdue')">已逾期</div>
                </div>
                <div id="reminderList"></div>
            </div>
        </div>
        <a href="reminder-add.html" class="fab">+</a>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'index.html' });
        let currentPetId = App.data.currentPetId;
        let currentFilter = 'all';

        function selectPet(id) {
            currentPetId = id;
            App.data.currentPetId = id;
            App.save();
            renderReminders();
        }

        function filterReminders(filter) {
            currentFilter = filter;
            document.querySelectorAll('[data-rfilter]').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-rfilter="${filter}"]`).classList.add('active');
            renderReminders();
        }

        function renderReminders() {
            const pet = App.data.pets.find(p => p.id === currentPetId) || App.getCurrentPet();
            let reminders = App.getPetReminders(currentPetId);
            if (currentFilter === 'upcoming') reminders = reminders.filter(r => r.daysLeft > 0 && !r.completed);
            if (currentFilter === 'overdue') reminders = reminders.filter(r => r.daysLeft <= 0 && !r.completed);

            const list = document.getElementById('reminderList');
            if (reminders.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">⏰</div><div class="empty-title">暂无提醒</div><div class="empty-desc">添加提醒，不错过重要的健康事项</div></div>';
            } else {
                list.innerHTML = reminders.map(r => `
                    <div class="card" style="margin:0 16px 10px">
                        <div style="display:flex;align-items:center;gap:12px">
                            <div style="width:44px;height:44px;border-radius:12px;background:#FFF0E6;display:flex;align-items:center;justify-content:center;font-size:22px">${App.getTypeIcon(r.type)}</div>
                            <div style="flex:1">
                                <div style="font-size:15px;font-weight:600">${r.title}</div>
                                <div style="font-size:12px;color:var(--text-secondary)">${pet.name} · ${r.date}</div>
                            </div>
                            <div style="text-align:right">
                                <div style="font-size:14px;font-weight:600;color:${r.daysLeft <= 0 ? 'var(--danger)' : 'var(--primary)'}" id="reminderDays-${r.id}">${r.daysLeft <= 0 ? '已逾期' : r.daysLeft + '天后'}</div>
                                ${!r.completed ? `<button class="btn-primary" style="padding:6px 12px;font-size:12px;margin-top:4px" onclick="completeReminder(${r.id})">完成</button>` : '<span style="font-size:12px;color:var(--success)">已完成</span>'}
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            renderPetSelector('petSelector', 'selectPet');
        }

        function completeReminder(id) {
            App.completeReminder(id);
            showToast('已完成');
            renderReminders();
        }
        renderReminders();
    </script>
</body>
</html>
