<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添加护理</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="hygiene-list.html">‹</a>
            <span id="navTitle">添加护理</span>
        </div>
        <div class="content">
            <div class="page" style="padding:16px">
                <div class="form-group">
                    <label class="form-label">护理类型</label>
                    <div class="radio-group">
                        <div class="radio-item active" onclick="selectRadio(this,'hygieneType','bath')">洗澡</div>
                        <div class="radio-item" onclick="selectRadio(this,'hygieneType','groom')">美容</div>
                        <div class="radio-item" onclick="selectRadio(this,'hygieneType','nail')">剪指甲</div>
                    </div>
                    <input type="hidden" id="hygieneType" value="bath">
                </div>
                <div class="form-group">
                    <label class="form-label">选择宠物</label>
                    <select class="form-select" id="hygienePet"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" class="form-input" id="hygieneDate">
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea class="form-textarea" id="hygieneNote" placeholder="补充说明..."></textarea>
                </div>
                <button class="btn-primary btn-block" onclick="saveHygiene()">保存</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'hygiene-list.html' });
        document.getElementById('hygieneDate').value = new Date().toISOString().split('T')[0];
        const petSelect = document.getElementById('hygienePet');
        App.data.pets.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name;
            petSelect.appendChild(opt);
        });
        petSelect.value = App.data.currentPetId;

        function selectRadio(el, name, value) {
            el.parentElement.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(name).value = value;
        }

        function saveHygiene() {
            const typeMap = { bath: '洗澡', groom: '美容', nail: '剪指甲' };
            const hType = document.getElementById('hygieneType').value;
            const petId = parseInt(petSelect.value);
            App.addRecord({
                petId,
                type: 'hygiene',
                title: typeMap[hType],
                date: document.getElementById('hygieneDate').value,
                note: document.getElementById('hygieneNote').value.trim(),
                cost: 0
            });
            App.data.currentPetId = petId;
            App.save();
            showToast('保存成功');
            setTimeout(() => location.href = 'hygiene-list.html', 500);
        }
    </script>
</body>
</html>
