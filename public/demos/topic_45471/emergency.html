<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紧急救助</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="offline-tools.html">‹</a>
            <span id="navTitle">紧急救助</span>
        </div>
        <div class="content">
            <div class="page" style="padding:16px">
                <div class="card" style="background:#FFEBEE;border:1px solid #FFCDD2;margin-bottom:16px">
                    <div style="display:flex;align-items:center;gap:12px">
                        <div style="font-size:36px">🚨</div>
                        <div>
                            <div style="font-size:16px;font-weight:700;color:var(--danger)">紧急情况下</div>
                            <div style="font-size:13px;color:var(--text-secondary)">请优先联系附近宠物医院</div>
                        </div>
                    </div>
                </div>
                <div id="emergencyList"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'offline-tools.html' });
        const emergencies = [
            { title: '窒息/呼吸困难', steps: '1. 检查口腔异物<br>2. 尝试哈姆立克急救法<br>3. 立即送医' },
            { title: '中暑', steps: '1. 转移到阴凉处<br>2. 用湿毛巾降温<br>3. 少量多次饮水<br>4. 尽快送医' },
            { title: '误食有毒物品', steps: '1. 保留包装或样本<br>2. 不要自行催吐<br>3. 立即联系宠物医院' },
            { title: '外伤出血', steps: '1. 用干净纱布按压止血<br>2. 包扎伤口<br>3. 尽快就医处理' },
            { title: '抽搐/癫痫', steps: '1. 移开周围危险物品<br>2. 不要强行按住<br>3. 记录发作时间<br>4. 发作后送医' }
        ];
        document.getElementById('emergencyList').innerHTML = emergencies.map(e => `
            <div class="card" style="margin-bottom:12px">
                <div style="font-size:15px;font-weight:600;margin-bottom:8px">${e.title}</div>
                <div style="font-size:13px;color:var(--text-secondary);line-height:1.7">${e.steps}</div>
            </div>
        `).join('');
    </script>
</body>
</html>
