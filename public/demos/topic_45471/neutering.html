<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绝育管理</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="index.html">‹</a>
            <span id="navTitle">绝育管理</span>
        </div>
        <div class="content">
            <div class="page">
                <div class="page-header">
                    <div class="page-title">绝育管理</div>
                    <div class="page-desc">科学绝育，安心恢复</div>
                </div>
                <div class="card" style="margin:0 16px 16px;background:linear-gradient(135deg,#E3F2FD 0%,#BBDEFB 100%)">
                    <div style="display:flex;align-items:center;gap:16px">
                        <div style="font-size:48px">✂️</div>
                        <div>
                            <div style="font-size:18px;font-weight:700">绝育评估</div>
                            <div style="font-size:14px;color:var(--text-secondary);margin-top:4px">根据年龄和健康状况评估最佳时机</div>
                            <button class="btn-primary" style="margin-top:12px;padding:8px 16px;font-size:13px">开始评估</button>
                        </div>
                    </div>
                </div>
                <div class="section">
                    <div class="section-title">绝育流程</div>
                    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px">
                        <a href="placeholder.html?title=术前准备" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#607D8B20">📋</div>
                            <span class="feature-name">术前准备</span>
                        </a>
                        <a href="placeholder.html?title=手术记录" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#F4433620">🏥</div>
                            <span class="feature-name">手术记录</span>
                        </a>
                        <a href="placeholder.html?title=术后恢复" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#4CAF5020">💊</div>
                            <span class="feature-name">术后恢复</span>
                        </a>
                        <a href="placeholder.html?title=伤口护理" class="feature-item" style="text-decoration:none;color:inherit">
                            <div class="feature-icon-wrapper" style="background:#FF980020">🩹</div>
                            <span class="feature-name">伤口护理</span>
                        </a>
                    </div>
                </div>
                <div class="section">
                    <div class="section-title">恢复进度</div>
                    <div class="card">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                            <span style="font-size:15px;font-weight:600">术后第 7 天</span>
                            <span style="font-size:13px;color:var(--success)">恢复良好</span>
                        </div>
                        <div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden">
                            <div style="height:100%;width:50%;background:var(--success);border-radius:4px"></div>
                        </div>
                        <div style="font-size:12px;color:var(--text-secondary);margin-top:8px">预计还有 7 天完成恢复</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>initPage({ back: 'index.html' });</script>
</body>
</html>
