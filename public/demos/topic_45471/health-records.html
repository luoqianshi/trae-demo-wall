<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康档案</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="index.html">‹</a>
            <span id="navTitle">健康档案</span>
        </div>
        <div class="content">
            <div class="page">
                <div class="page-header" style="padding-bottom:8px">
                    <div class="page-title">健康档案</div>
                    <div class="page-desc" id="pageDesc">豆豆的健康记录</div>
                </div>

                <div id="petSelector"></div>

                <div class="card" style="margin:0 16px 12px">
                    <div style="display:flex;justify-content:space-around;text-align:center">
                        <div><div style="font-size:24px;font-weight:700;color:var(--primary)" id="statVaccine">0</div><div style="font-size:12px;color:var(--text-secondary)">疫苗</div></div>
                        <div><div style="font-size:24px;font-weight:700;color:var(--primary)" id="statDeworm">0</div><div style="font-size:12px;color:var(--text-secondary)">驱虫</div></div>
                        <div><div style="font-size:24px;font-weight:700;color:var(--primary)" id="statMedical">0</div><div style="font-size:12px;color:var(--text-secondary)">就医</div></div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">添加健康记录</div>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px">
                        <a href="record-add.html?type=vaccine" style="background:var(--surface);border-radius:14px;padding:14px;text-align:center;text-decoration:none;color:inherit">
                            <div style="width:44px;height:44px;border-radius:12px;background:#E8F5E9;color:#4CAF50;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 8px">💉</div>
                            <div style="font-size:14px;font-weight:600">疫苗</div>
                            <div style="font-size:11px;color:var(--text-secondary)">预防疾病</div>
                        </a>
                        <a href="record-add.html?type=deworm" style="background:var(--surface);border-radius:14px;padding:14px;text-align:center;text-decoration:none;color:inherit">
                            <div style="width:44px;height:44px;border-radius:12px;background:#FFF3E0;color:#FF9800;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 8px">💊</div>
                            <div style="font-size:14px;font-weight:600">驱虫</div>
                            <div style="font-size:11px;color:var(--text-secondary)">体内外驱虫</div>
                        </a>
                        <a href="record-add.html?type=medical" style="background:var(--surface);border-radius:14px;padding:14px;text-align:center;text-decoration:none;color:inherit">
                            <div style="width:44px;height:44px;border-radius:12px;background:#FFEBEE;color:#F44336;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 8px">🏥</div>
                            <div style="font-size:14px;font-weight:600">就医</div>
                            <div style="font-size:11px;color:var(--text-secondary)">看病治疗</div>
                        </a>
                    </div>
                </div>

                <div class="filter-tabs" style="padding:0 16px;margin-bottom:12px">
                    <div class="filter-tab active" data-hfilter="all" onclick="filterRecords('all')">全部</div>
                    <div class="filter-tab" data-hfilter="vaccine" onclick="filterRecords('vaccine')">疫苗</div>
                    <div class="filter-tab" data-hfilter="deworm" onclick="filterRecords('deworm')">驱虫</div>
                    <div class="filter-tab" data-hfilter="medical" onclick="filterRecords('medical')">就医</div>
                </div>

                <div class="section" style="margin-bottom:80px">
                    <div class="section-header">
                        <span class="section-title" id="typeTitle">全部记录</span>
                        <span class="section-action" id="recordCount">0条</span>
                    </div>
                    <div id="recordsList"></div>
                </div>
            </div>
        </div>
        <a href="record-add.html" class="fab">+</a>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ tab: 'health', back: 'index.html' });
        let currentFilter = 'all';
        let currentPetId = App.data.currentPetId;

        function selectPet(id) {
            currentPetId = id;
            App.data.currentPetId = id;
            App.save();
            renderHealth();
        }

        function filterRecords(type) {
            currentFilter = type;
            document.querySelectorAll('[data-hfilter]').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-hfilter="${type}"]`).classList.add('active');
            renderHealth();
        }

        function renderHealth() {
            const pet = App.data.pets.find(p => p.id === currentPetId) || App.getCurrentPet();
            document.getElementById('pageDesc').textContent = `${pet.name}的健康记录`;
            document.getElementById('typeTitle').textContent = currentFilter === 'all' ? '全部记录' : App.getTypeName(currentFilter) + '记录';

            const records = App.getPetRecords(pet.id);
            const filtered = currentFilter === 'all' ? records : records.filter(r => r.type === currentFilter);
            document.getElementById('recordCount').textContent = filtered.length + '条';

            const counts = { vaccine: 0, deworm: 0, medical: 0 };
            records.forEach(r => { if (counts[r.type] !== undefined) counts[r.type]++; });
            document.getElementById('statVaccine').textContent = counts.vaccine;
            document.getElementById('statDeworm').textContent = counts.deworm;
            document.getElementById('statMedical').textContent = counts.medical;

            const list = document.getElementById('recordsList');
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding:40px 20px"><div class="empty-icon" style="font-size:48px">📋</div><div class="empty-title">暂无记录</div><div class="empty-desc">点击右下角添加第一条记录</div></div>';
            } else {
                list.innerHTML = filtered.map(r => `
                    <div class="card" style="margin-bottom:10px">
                        <div style="display:flex;align-items:center;gap:12px">
                            ${renderRecordIcon(r.type)}
                            <div style="flex:1">
                                <div style="display:flex;justify-content:space-between;align-items:center">
                                    <span style="font-size:15px;font-weight:600">${r.title}</span>
                                    <span style="font-size:12px;color:var(--text-secondary)">${r.date}</span>
                                </div>
                                <div style="font-size:12px;color:var(--text-secondary);margin-top:2px">${r.note}</div>
                                ${r.cost ? `<div style="font-size:12px;color:var(--primary);margin-top:2px">¥${r.cost}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Re-render selector to show active state
            renderPetSelector('petSelector', 'selectPet');
        }
        renderHealth();
    </script>
</body>
</html>
