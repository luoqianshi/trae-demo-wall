  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
(function() {
  // === GAME STATE ===
  var gameState = 'start';
  var score = 0, distance = 0, zongziCount = 0;
  var boatSpeed = 0, boatX = 0, boatZ = 0;
  var boatMaxSpeed = 18, boatAccel = 5, paddleAccel = 4, boatDecel = 5;
  var boatLateralSpeed = 15;
  var speedBoostTimer = 0, speedBoostFactor = 1;
  var hitWallTimer = 0, boatTilt = 0, boatTiltTarget = 0, noPaddleTimer = 0;
  var gameTime = 0;

  var ROAD_LENGTH = 500;
  var RIVER_WIDTH = 10;
  var BANK_WIDTH = 6;

  var keys = { left: false, right: false };
  var touchLeft = false, touchRight = false;

  // === THREE.JS SETUP ===
  var container = document.getElementById('game-container');
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1a2a);
  scene.fog = new THREE.Fog(0x0a1a2a, 15, 80);

  var camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 200);
  camera.position.set(0, 6, 6);
  camera.lookAt(0, 0, -5);

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  container.insertBefore(renderer.domElement, container.firstChild);

  // Lights
  var ambientLight = new THREE.AmbientLight(0x334466, 1.5);
  scene.add(ambientLight);

  var dirLight = new THREE.DirectionalLight(0xffeedd, 2);
  dirLight.position.set(5, 15, 10);
  dirLight.castShadow = true;
  dirLight.shadow.camera.near = 0.1;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -15;
  dirLight.shadow.camera.right = 15;
  dirLight.shadow.camera.top = 15;
  dirLight.shadow.camera.bottom = -15;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  scene.add(dirLight);

  var pointLight = new THREE.PointLight(0xff6633, 1, 30);
  pointLight.position.set(0, 3, 0);
  scene.add(pointLight);

  // === CREATE WORLD ===
  // Water plane (long strip)
  var waterGeo = new THREE.PlaneGeometry(RIVER_WIDTH * 2, ROAD_LENGTH, 32, 128);
  var waterMat = new THREE.MeshPhongMaterial({
    color: 0x0e3055, specular: 0x4488aa, shininess: 80, transparent: true, opacity: 0.9
  });
  var waterMesh = new THREE.Mesh(waterGeo, waterMat);
  waterMesh.rotation.x = -Math.PI / 2;
  waterMesh.position.set(0, -0.05, -ROAD_LENGTH / 2);
  waterMesh.receiveShadow = true;
  scene.add(waterMesh);

  // Banks
  var bankMat = new THREE.MeshPhongMaterial({ color: 0x1a5c2e });
  var bankEdgeMat = new THREE.MeshPhongMaterial({ color: 0x3d2b1f });
  var grassMat = new THREE.MeshPhongMaterial({ color: 0x2d7a3e });

  function createBank(xSign) {
    var group = new THREE.Group();
    var bankGeo = new THREE.BoxGeometry(BANK_WIDTH, 0.3, ROAD_LENGTH);
    var bank = new THREE.Mesh(bankGeo, bankMat);
    bank.position.set(xSign * (RIVER_WIDTH + BANK_WIDTH / 2), 0.15, -ROAD_LENGTH / 2);
    bank.receiveShadow = true;
    group.add(bank);
    var edgeGeo = new THREE.BoxGeometry(0.5, 0.5, ROAD_LENGTH);
    var edge = new THREE.Mesh(edgeGeo, bankEdgeMat);
    edge.position.set(xSign * (RIVER_WIDTH + 0.25), 0.25, -ROAD_LENGTH / 2);
    group.add(edge);
    var grassGeo = new THREE.BoxGeometry(BANK_WIDTH + 0.5, 0.15, ROAD_LENGTH);
    var grass = new THREE.Mesh(grassGeo, grassMat);
    grass.position.set(xSign * (RIVER_WIDTH + BANK_WIDTH / 2 + 0.25), 0.38, -ROAD_LENGTH / 2);
    group.add(grass);
    return group;
  }
  scene.add(createBank(-1));
  scene.add(createBank(1));

  // Scenery
  var sceneryObjects = [];
  function generateScenery() {
    for (var i = 0; i < sceneryObjects.length; i++) scene.remove(sceneryObjects[i]);
    sceneryObjects.length = 0;
    var rockMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
    var treeMat = new THREE.MeshPhongMaterial({ color: 0x0d3318 });
    var treeTopMat = new THREE.MeshPhongMaterial({ color: 0x1a5c2e });
    var buoyMat = new THREE.MeshPhongMaterial({ color: 0xe63946, emissive: 0x661111 });
    for (var z = 5; z < ROAD_LENGTH - 5; z += 2 + Math.random() * 3) {
      var side = Math.random() < 0.5 ? -1 : 1;
      var xOffset = RIVER_WIDTH + 0.5 + Math.random() * (BANK_WIDTH - 1);
      if (Math.random() < 0.3) {
        var rockGeo = new THREE.DodecahedronGeometry(0.4, 0);
        var rock = new THREE.Mesh(rockGeo, rockMat);
        rock.position.set(side * xOffset, 0.2, -z);
        rock.castShadow = true;
        rock.scale.set(0.5 + Math.random() * 0.8, 0.4 + Math.random() * 0.4, 0.5 + Math.random() * 0.8);
        scene.add(rock);
        sceneryObjects.push(rock);
      } else if (Math.random() < 0.4) {
        var treeGroup = new THREE.Group();
        var trunkGeo = new THREE.ConeGeometry(0.8, 2, 6);
        var trunk = new THREE.Mesh(trunkGeo, treeMat);
        trunk.position.set(0, 1, 0);
        treeGroup.add(trunk);
        var topGeo = new THREE.SphereGeometry(0.6, 6, 6);
        var top = new THREE.Mesh(topGeo, treeTopMat);
        top.position.set(0, 2.5, 0);
        treeGroup.add(top);
        treeGroup.position.set(side * (xOffset + 1), 0, -z);
        treeGroup.scale.set(0.6 + Math.random() * 0.5, 0.6 + Math.random() * 0.5, 0.6 + Math.random() * 0.5);
        scene.add(treeGroup);
        sceneryObjects.push(treeGroup);
      }
    }
    for (var bz = 3; bz < ROAD_LENGTH; bz += 6) {
      var sides = [-1, 1];
      for (var si = 0; si < sides.length; si++) {
        var buoyGeo = new THREE.SphereGeometry(0.25, 8, 8);
        var buoy = new THREE.Mesh(buoyGeo, buoyMat);
        buoy.position.set(sides[si] * (RIVER_WIDTH - 0.3), 0.3, -bz);
        scene.add(buoy);
        sceneryObjects.push(buoy);
      }
    }
  }
  generateScenery();

  // === BOAT (detailed dragon boat) ===
  var boatGroup = new THREE.Group();
  var hullMat = new THREE.MeshPhongMaterial({ color: 0xd92222, specular: 0x552200, shininess: 60 });
  var hullLightMat = new THREE.MeshPhongMaterial({ color: 0xffcc33, emissive: 0x332200, specular: 0xffaa00, shininess: 80 });
  var hullDarkMat = new THREE.MeshPhongMaterial({ color: 0x6b1111, specular: 0x220000, shininess: 40 });
  var headMat = new THREE.MeshPhongMaterial({ color: 0xd92222, emissive: 0x2a0808, specular: 0x552200, shininess: 70 });
  var goldMat = new THREE.MeshPhongMaterial({ color: 0xffcc33, emissive: 0x443300, specular: 0xffaa00, shininess: 100 });
  var whiteMat = new THREE.MeshPhongMaterial({ color: 0xfafafa, specular: 0x555555, shininess: 80 });
  var blackMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a, shininess: 50 });

  // === HULL: layered boat body ===
  var hullShape = new THREE.Shape();
  hullShape.moveTo(0, -2.5);
  hullShape.lineTo(0.85, -1.5);
  hullShape.lineTo(0.95, 0);
  hullShape.lineTo(0.85, 1.5);
  hullShape.lineTo(0.5, 2);
  hullShape.lineTo(-0.5, 2);
  hullShape.lineTo(-0.85, 1.5);
  hullShape.lineTo(-0.95, 0);
  hullShape.lineTo(-0.85, -1.5);
  hullShape.closePath();
  var hullGeo = new THREE.ExtrudeGeometry(hullShape, { depth: 0.5, bevelEnabled: true, bevelThickness: 0.08, bevelSize: 0.08 });
  var hull = new THREE.Mesh(hullGeo, hullMat);
  hull.position.z = -0.25;
  hull.castShadow = true;
  boatGroup.add(hull);

  // Gold top trim strip along gunwale
  var trimGeo = new THREE.BoxGeometry(1.85, 0.08, 4);
  var trim = new THREE.Mesh(trimGeo, goldMat);
  trim.position.set(0, 0.05, -0.25);
  trim.castShadow = true;
  boatGroup.add(trim);

  // Dark red lower hull band
  var bandGeo = new THREE.BoxGeometry(1.7, 0.18, 3.8);
  var band = new THREE.Mesh(bandGeo, hullDarkMat);
  band.position.set(0, -0.15, -0.25);
  boatGroup.add(band);

  // Decorative gold squares along the side
  for (var si = 0; si < 8; si++) {
    var sgGeo = new THREE.BoxGeometry(0.18, 0.08, 0.22);
    var sgL = new THREE.Mesh(sgGeo, hullLightMat);
    sgL.position.set(-0.93, 0.03, -1.7 + si * 0.45);
    boatGroup.add(sgL);
    var sgR = new THREE.Mesh(sgGeo, hullLightMat);
    sgR.position.set(0.93, 0.03, -1.7 + si * 0.45);
    boatGroup.add(sgR);
  }

  // Dragon scales on top deck - raised rounded segments
  for (var sc = 0; sc < 6; sc++) {
    var scaleGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.08, 6);
    var scaleMesh = new THREE.Mesh(scaleGeo, goldMat);
    scaleMesh.position.set(0, 0.12, -1.5 + sc * 0.5);
    boatGroup.add(scaleMesh);
  }

  // Decorative banners/flags at the bow
  var flagPoleGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.8, 6);
  var flagPoleL = new THREE.Mesh(flagPoleGeo, goldMat);
  flagPoleL.position.set(-0.4, 0.5, -1.8);
  boatGroup.add(flagPoleL);
  var flagPoleR = new THREE.Mesh(flagPoleGeo, goldMat);
  flagPoleR.position.set(0.4, 0.5, -1.8);
  boatGroup.add(flagPoleR);
  var flagGeo = new THREE.BoxGeometry(0.25, 0.35, 0.015);
  var flagL = new THREE.Mesh(flagGeo, new THREE.MeshPhongMaterial({ color: 0xffee55, emissive: 0x443300 }));
  flagL.position.set(-0.25, 0.75, -1.8);
  boatGroup.add(flagL);
  var flagR = new THREE.Mesh(flagGeo, new THREE.MeshPhongMaterial({ color: 0xff5533, emissive: 0x441100 }));
  flagR.position.set(0.25, 0.75, -1.8);
  boatGroup.add(flagR);

  // === DRAGON HEAD (detailed) ===
  var headGroup = new THREE.Group();
  var skullGeo = new THREE.SphereGeometry(0.45, 8, 6);
  var skull = new THREE.Mesh(skullGeo, headMat);
  skull.position.set(0, 0.7, -2.8);
  skull.scale.set(1, 0.9, 1.2);
  headGroup.add(skull);

  var snoutGeo = new THREE.SphereGeometry(0.28, 8, 6);
  var snout = new THREE.Mesh(snoutGeo, headMat);
  snout.position.set(0, 0.55, -3.25);
  snout.scale.set(1.1, 0.7, 1.3);
  headGroup.add(snout);

  var mouthGeo = new THREE.BoxGeometry(0.35, 0.05, 0.25);
  var mouth = new THREE.Mesh(mouthGeo, blackMat);
  mouth.position.set(0, 0.42, -3.3);
  headGroup.add(mouth);

  for (var ti = -1; ti <= 1; ti++) {
    var toothGeo = new THREE.ConeGeometry(0.03, 0.1, 4);
    var tooth = new THREE.Mesh(toothGeo, whiteMat);
    tooth.position.set(ti * 0.08, 0.5, -3.32);
    tooth.rotation.x = Math.PI;
    headGroup.add(tooth);
  }

  var eyeWhiteGeo = new THREE.SphereGeometry(0.1, 8, 8);
  var eyePupilMat = new THREE.MeshPhongMaterial({ color: 0xffaa00, emissive: 0x886600 });
  var eyeWhiteL = new THREE.Mesh(eyeWhiteGeo, whiteMat);
  eyeWhiteL.position.set(-0.22, 0.8, -2.65);
  headGroup.add(eyeWhiteL);
  var eyeWhiteR = new THREE.Mesh(eyeWhiteGeo, whiteMat);
  eyeWhiteR.position.set(0.22, 0.8, -2.65);
  headGroup.add(eyeWhiteR);
  var eyePupilGeo = new THREE.SphereGeometry(0.055, 8, 8);
  var eyePupilL = new THREE.Mesh(eyePupilGeo, eyePupilMat);
  eyePupilL.position.set(-0.25, 0.8, -2.7);
  headGroup.add(eyePupilL);
  var eyePupilR = new THREE.Mesh(eyePupilGeo, eyePupilMat);
  eyePupilR.position.set(0.25, 0.8, -2.7);
  headGroup.add(eyePupilR);

  var browGeo = new THREE.ConeGeometry(0.05, 0.25, 4);
  var browL = new THREE.Mesh(browGeo, goldMat);
  browL.position.set(-0.28, 1.0, -2.6);
  browL.rotation.z = -0.4;
  browL.rotation.x = 0.3;
  headGroup.add(browL);
  var browR = new THREE.Mesh(browGeo, goldMat);
  browR.position.set(0.28, 1.0, -2.6);
  browR.rotation.z = 0.4;
  browR.rotation.x = -0.3;
  headGroup.add(browR);

  var hornGeo = new THREE.ConeGeometry(0.05, 0.55, 4);
  var h1 = new THREE.Mesh(hornGeo, goldMat);
  h1.position.set(-0.18, 1.05, -2.5);
  h1.rotation.z = -0.3;
  headGroup.add(h1);
  var h2 = new THREE.Mesh(hornGeo, goldMat);
  h2.position.set(0.18, 1.05, -2.5);
  h2.rotation.z = 0.3;
  headGroup.add(h2);
  var hornSmallGeo = new THREE.ConeGeometry(0.035, 0.35, 4);
  var h3 = new THREE.Mesh(hornSmallGeo, goldMat);
  h3.position.set(-0.3, 0.95, -2.55);
  h3.rotation.z = -0.6;
  headGroup.add(h3);
  var h4 = new THREE.Mesh(hornSmallGeo, goldMat);
  h4.position.set(0.3, 0.95, -2.55);
  h4.rotation.z = 0.6;
  headGroup.add(h4);

  var whiskerGeo = new THREE.CylinderGeometry(0.012, 0.008, 1.2, 4);
  var whiskerX = [-0.2, 0.2, -0.35, 0.35];
  for (var wi = 0; wi < whiskerX.length; wi++) {
    var whisk = new THREE.Mesh(whiskerGeo, goldMat);
    whisk.position.set(whiskerX[wi] * 0.9, 0.3, -3.1);
    whisk.rotation.x = 0.9;
    whisk.rotation.z = whiskerX[wi] > 0 ? -0.25 : 0.25;
    headGroup.add(whisk);
  }

  var beardGeo = new THREE.SphereGeometry(0.08, 6, 5);
  var beard = new THREE.Mesh(beardGeo, goldMat);
  beard.position.set(0, 0.35, -3.15);
  beard.scale.set(1, 0.5, 1);
  headGroup.add(beard);

  var neckGeo = new THREE.CylinderGeometry(0.35, 0.45, 0.8, 6);
  var neck = new THREE.Mesh(neckGeo, headMat);
  neck.position.set(0, 0.55, -2.2);
  neck.rotation.x = 0.25;
  headGroup.add(neck);
  for (var ns = 0; ns < 3; ns++) {
    var neckRingGeo = new THREE.TorusGeometry(0.36 - ns * 0.02, 0.03, 5, 10);
    var neckRing = new THREE.Mesh(neckRingGeo, goldMat);
    neckRing.position.set(0, 0.65 - ns * 0.2, -2.1 + ns * 0.15);
    neckRing.rotation.x = Math.PI / 2;
    headGroup.add(neckRing);
  }
  boatGroup.add(headGroup);

  // === TAIL (segmented dragon tail) ===
  var tailGroup = new THREE.Group();
  for (var seg = 0; seg < 4; seg++) {
    var tSegGeo = new THREE.CylinderGeometry(0.28 - seg * 0.05, 0.32 - seg * 0.05, 0.35, 6);
    var tSeg = new THREE.Mesh(tSegGeo, headMat);
    tSeg.position.set(0, 0.25 + seg * 0.08, 1.5 + seg * 0.25);
    tSeg.rotation.x = -0.3 - seg * 0.1;
    tailGroup.add(tSeg);
    var tRingGeo = new THREE.TorusGeometry(0.3 - seg * 0.05, 0.02, 4, 8);
    var tRing = new THREE.Mesh(tRingGeo, goldMat);
    tRing.position.set(0, 0.25 + seg * 0.08, 1.5 + seg * 0.25);
    tRing.rotation.x = Math.PI / 2;
    tailGroup.add(tRing);
  }
  var tailTipGeo = new THREE.ConeGeometry(0.22, 0.6, 4);
  var tailTip = new THREE.Mesh(tailTipGeo, hullLightMat);
  tailTip.position.set(0, 0.55, 2.55);
  tailTip.rotation.x = -Math.PI / 2.5;
  tailGroup.add(tailTip);
  boatGroup.add(tailGroup);

  // Back spikes along the spine of the boat
  for (var sp = 0; sp < 5; sp++) {
    var spikeGeo = new THREE.ConeGeometry(0.08, 0.25, 4);
    var spike = new THREE.Mesh(spikeGeo, goldMat);
    spike.position.set(0, 0.32, -0.8 + sp * 0.55);
    boatGroup.add(spike);
  }

  // === Paddles ===
  var paddleGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.7, 6);
  var paddleMat = new THREE.MeshPhongMaterial({ color: 0xd4a574, specular: 0x443322, shininess: 40 });
  var paddleBladeGeo = new THREE.BoxGeometry(0.02, 0.5, 0.22);
  var paddleBladeMat = new THREE.MeshPhongMaterial({ color: 0x8B4513, specular: 0x221100, shininess: 60 });
  var paddleWrapMat = new THREE.MeshPhongMaterial({ color: 0xd92222 });

  var leftPaddles = [];
  var rightPaddles = [];
  var paddleZPositions = [-1.4, -0.4, 0.6];

  function buildPaddle() {
    var group = new THREE.Group();
    var handle = new THREE.Mesh(paddleGeo, paddleMat);
    handle.position.set(0, 0.35, 0);
    group.add(handle);
    var bandH = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.08, 6), paddleWrapMat);
    bandH.position.set(0, 0.65, 0);
    group.add(bandH);
    var blade = new THREE.Mesh(paddleBladeGeo, paddleBladeMat);
    blade.position.set(0, 0, -0.15);
    group.add(blade);
    var tipGeo = new THREE.BoxGeometry(0.03, 0.1, 0.15);
    var tip = new THREE.Mesh(tipGeo, goldMat);
    tip.position.set(0, -0.15, -0.15);
    group.add(tip);
    return group;
  }

  for (var pi = 0; pi < paddleZPositions.length; pi++) {
    var lp = buildPaddle();
    lp.position.set(-1.15, 0, paddleZPositions[pi]);
    boatGroup.add(lp);
    leftPaddles.push(lp);

    var rp = buildPaddle();
    rp.position.set(1.15, 0, paddleZPositions[pi]);
    boatGroup.add(rp);
    rightPaddles.push(rp);
  }

  boatGroup.position.set(0, 0.2, 0);
  scene.add(boatGroup);

  // === COLLECTIBLES ===
  var collectibles = [];
  var zongziGroup = new THREE.Group();
  var zongziMat = new THREE.MeshPhongMaterial({ color: 0x2a8a5e, emissive: 0x0a3a1e, specular: 0x44aa66, shininess: 40 });
  var zongziLeafMat = new THREE.MeshPhongMaterial({ color: 0xc9a227 });
  var zongziGeo = new THREE.ConeGeometry(0.35, 0.7, 4);
  var zongziLeafGeo = new THREE.BoxGeometry(0.02, 0.7, 0.02);
  var obstacleMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
  var obstacleGeo = new THREE.DodecahedronGeometry(0.35, 0);

  function generateCollectibles() {
    for (var ci = 0; ci < collectibles.length; ci++) {
      zongziGroup.remove(collectibles[ci].mesh);
    }
    collectibles.length = 0;

    for (var cz = 30; cz < ROAD_LENGTH - 10; cz += 2 + Math.random() * 3) {
      var type = Math.random() < 0.7 ? 'zongzi' : 'rock';
      var cx = (Math.random() - 0.5) * 7;

      var mesh;
      if (type === 'zongzi') {
        mesh = new THREE.Group();
        var body = new THREE.Mesh(zongziGeo, zongziMat);
        body.position.y = 0.5;
        mesh.add(body);
        var leaf1 = new THREE.Mesh(zongziLeafGeo, zongziLeafMat);
        leaf1.position.set(0.15, 0.5, 0);
        mesh.add(leaf1);
        var leaf2 = new THREE.Mesh(zongziLeafGeo, zongziLeafMat);
        leaf2.position.set(-0.15, 0.5, 0);
        leaf2.rotation.y = Math.PI / 2;
        mesh.add(leaf2);
        var glowGeo = new THREE.SphereGeometry(0.5, 8, 8);
        var glowMat = new THREE.MeshBasicMaterial({ color: 0x2a8a5e, transparent: true, opacity: 0.15 });
        var glow = new THREE.Mesh(glowGeo, glowMat);
        glow.position.y = 0.5;
        mesh.add(glow);
      } else {
        mesh = new THREE.Mesh(obstacleGeo, obstacleMat);
        mesh.position.y = 0.3;
        mesh.castShadow = true;
      }

      mesh.position.set(cx, 0, -cz);
      zongziGroup.add(mesh);
      collectibles.push({ type: type, x: cx, z: cz, mesh: mesh, active: true });
    }
  }
  generateCollectibles();
  scene.add(zongziGroup);

  // === STARS ===
  var starsGeo = new THREE.BufferGeometry();
  var starsPositions = [];
  for (var si = 0; si < 200; si++) {
    starsPositions.push(
      (Math.random() - 0.5) * 100,
      15 + Math.random() * 30,
      -50 - Math.random() * 80
    );
  }
  starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPositions, 3));
  var starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
  var stars = new THREE.Points(starsGeo, starsMat);
  scene.add(stars);

  // Moon
  var moonGeo = new THREE.SphereGeometry(3, 16, 16);
  var moonMat = new THREE.MeshBasicMaterial({ color: 0xf4e4bc });
  var moon = new THREE.Mesh(moonGeo, moonMat);
  moon.position.set(-20, 20, -80);
  scene.add(moon);

  // Mountains - placed on both sides, never blocking the river
  function createMountain(x, z, w, h) {
    var geo = new THREE.ConeGeometry(w, h, 4);
    var mat = new THREE.MeshPhongMaterial({ color: 0x0a1f35 });
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, h / 2 - 1, z);
    mesh.rotation.y = Math.random() * Math.PI;
    return mesh;
  }
  for (var mi = 0; mi < 40; mi++) {
    var side = Math.random() < 0.5 ? -1 : 1;
    var mx = side * (12 + Math.random() * 20);
    var mz = -10 - Math.random() * 450;
    var mw = 4 + Math.random() * 6;
    var mh = 4 + Math.random() * 10;
    scene.add(createMountain(mx, mz, mw, mh));
  }

  // === INPUT ===
  window.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  });
  window.addEventListener('keyup', function(e) {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
  });

  var touchControls = document.getElementById('touch-controls');
  var canvas = renderer.domElement;
  canvas.addEventListener('touchstart', function(e) {
    if (touchControls.classList.contains('active')) return;
    e.preventDefault();
    for (var ti = 0; ti < e.changedTouches.length; ti++) {
      var t = e.changedTouches[ti];
      if (t.clientX < canvas.width / 2) touchLeft = true;
      else touchRight = true;
    }
  }, { passive: false });
  canvas.addEventListener('touchend', function(e) {
    if (touchControls.classList.contains('active')) return;
    e.preventDefault();
    touchLeft = false; touchRight = false;
    for (var ti = 0; ti < e.touches.length; ti++) {
      var t = e.touches[ti];
      if (t.clientX < canvas.width / 2) touchLeft = true;
      else touchRight = true;
    }
  }, { passive: false });
  canvas.addEventListener('mousedown', function(e) {
    if (touchControls.classList.contains('active')) return;
    if (e.clientX < canvas.width / 2) touchLeft = true;
    else touchRight = true;
  });
  canvas.addEventListener('mouseup', function() { touchLeft = false; touchRight = false; });
  canvas.addEventListener('mouseleave', function() { touchLeft = false; touchRight = false; });

  // Touch buttons
  function setupTouchBtn(btn, side) {
    var startFn = function(e) {
      e.preventDefault();
      if (side === 'left') touchLeft = true; else touchRight = true;
      btn.classList.add('pressed');
    };
    var endFn = function(e) {
      e.preventDefault();
      if (side === 'left') touchLeft = false; else touchRight = false;
      btn.classList.remove('pressed');
    };
    btn.addEventListener('touchstart', startFn, { passive: false });
    btn.addEventListener('touchend', endFn, { passive: false });
    btn.addEventListener('touchcancel', endFn, { passive: false });
    btn.addEventListener('mousedown', startFn);
    btn.addEventListener('mouseup', endFn);
    btn.addEventListener('mouseleave', endFn);
  }
  setupTouchBtn(document.getElementById('touch-left'), 'left');
  setupTouchBtn(document.getElementById('touch-right'), 'right');

  // === RESIZE ===
  function resize() {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  }
  window.addEventListener('resize', resize);

  // === GAME LOGIC ===
  function startGame() {
    gameState = 'playing';
    score = 0; distance = 0; zongziCount = 0;
    boatSpeed = 6; boatX = 0; boatZ = 0;
    speedBoostTimer = 0; speedBoostFactor = 1;
    hitWallTimer = 0; boatTilt = 0; boatTiltTarget = 0; noPaddleTimer = 0;
    gameTime = 0;
    generateCollectibles();
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    touchControls.classList.add('active');
  }

  function endGame() {
    gameState = 'gameover';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-distance').textContent = distance + 'm';
    document.getElementById('final-zongzi').textContent = zongziCount;
    touchControls.classList.remove('active');
  }

  function update(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt * 0.001;

    if (speedBoostTimer > 0) { speedBoostTimer -= dt; if (speedBoostTimer <= 0) speedBoostFactor = 1; }
    if (hitWallTimer > 0) hitWallTimer -= dt;

    var left = keys.left || touchLeft;
    var right = keys.right || touchRight;
    var isPaddling = left || right;

    // Tilt
    if (left && !right) boatTiltTarget = -1;
    else if (right && !left) boatTiltTarget = 1;
    else boatTiltTarget = 0;

    // Lateral movement
    if (left && !right) boatX -= boatLateralSpeed * dt * 0.001;
    if (right && !left) boatX += boatLateralSpeed * dt * 0.001;
    boatX = Math.max(-3, Math.min(3, boatX));

    // Speed
    if (isPaddling) {
      noPaddleTimer = 0;
      var boost = (left && right) ? paddleAccel * 1.5 : paddleAccel;
      boatSpeed += (boatAccel + boost) * dt * 0.001;
    } else {
      noPaddleTimer += dt;
      boatSpeed -= boatDecel * dt * 0.001;
      if (noPaddleTimer > 2000) boatSpeed -= boatDecel * 0.5 * dt * 0.001;
    }
    boatSpeed = Math.max(2, Math.min(boatSpeed, boatMaxSpeed * speedBoostFactor));

    boatZ += boatSpeed * dt * 0.001;
    distance = Math.floor(boatZ);
    score += Math.floor(boatSpeed * dt * 0.01);

    // Wall collision
    var wallLimit = RIVER_WIDTH - 1;
    if (Math.abs(boatX) > wallLimit) {
      if (hitWallTimer <= 0) {
        boatSpeed *= 0.4;
        hitWallTimer = 600;
      }
      boatX = Math.sign(boatX) * wallLimit;
    }

    // Collectible collision
    for (var ci = 0; ci < collectibles.length; ci++) {
      var c = collectibles[ci];
      if (!c.active) continue;
      var dz = Math.abs(boatZ - c.z);
      if (dz < 1.2) {
        var dx = Math.abs(boatX - c.x);
        if (dx < 0.9) {
          if (c.type === 'zongzi') {
            c.active = false;
            c.mesh.visible = false;
            zongziCount++;
            score += 50;
            speedBoostTimer = 2000;
            speedBoostFactor = 1.5;
          } else {
            c.active = false;
            c.mesh.visible = false;
            boatSpeed *= 0.6;
            hitWallTimer = 500;
          }
        }
      }
    }

    // Recycle collectibles - move ones that have been passed far behind to ahead of the boat
    var furthestAhead = boatZ + 50;
    for (var ci2 = 0; ci2 < collectibles.length; ci2++) {
      var c2 = collectibles[ci2];
      if (c2.z < boatZ - 20) {
        c2.z = furthestAhead + Math.random() * 30;
        c2.x = (Math.random() - 0.5) * 7;
        c2.type = Math.random() < 0.65 ? 'zongzi' : 'rock';
        c2.active = true;
        c2.mesh.visible = true;
        c2.mesh.position.x = c2.x;
        c2.mesh.position.z = -c2.z;
        furthestAhead = c2.z;
      }
    }

    // End check
    if (boatZ >= ROAD_LENGTH - 5) { endGame(); return; }

    // HUD
    document.getElementById('score-display').textContent = score;
    document.getElementById('distance-display').textContent = distance + 'm';
    document.getElementById('speed-bar').style.width = Math.min(100, (boatSpeed / (boatMaxSpeed * 1.5)) * 100) + '%';
  }

  // === RENDER ===
  var lastTime = 0;

  function animate() {
    requestAnimationFrame(animate);

    var now = performance.now();
    var dt = Math.min(now - (lastTime || now), 50);
    lastTime = now;

    update(dt);

    // Update boat visual
    boatGroup.position.x = boatX;
    boatGroup.position.z = -boatZ;
    boatTilt += (boatTiltTarget - boatTilt) * 0.1;
    boatGroup.rotation.z = boatTilt * 0.15;

    // Bob on water
    boatGroup.position.y = 0.2 + Math.sin(gameTime * 3) * 0.05;

    // Paddle animation - exaggerated rowing effect triggered by buttons
    var left = keys.left || touchLeft;
    var right = keys.right || touchRight;
    var baseSpeed = 3;
    var leftSpeed = left ? 18 : baseSpeed;
    var rightSpeed = right ? 18 : baseSpeed;
    var leftAmp = left ? 1.3 : 0.2;
    var rightAmp = right ? 1.3 : 0.2;
    for (var pi2 = 0; pi2 < leftPaddles.length; pi2++) {
      var phase = pi2 * 0.8;
      var lpT = gameTime * leftSpeed + phase;
      leftPaddles[pi2].rotation.x = Math.sin(lpT) * leftAmp;
      leftPaddles[pi2].rotation.y = left ? Math.sin(lpT) * 0.5 : 0;
      leftPaddles[pi2].rotation.z = left ? Math.sin(lpT) * 0.35 - 0.2 : -0.1;
      var rpT = gameTime * rightSpeed + phase + Math.PI;
      rightPaddles[pi2].rotation.x = Math.sin(rpT) * rightAmp;
      rightPaddles[pi2].rotation.y = right ? Math.sin(rpT) * 0.5 : 0;
      rightPaddles[pi2].rotation.z = right ? -Math.sin(rpT) * 0.35 + 0.2 : 0.1;
    }
    // Slight boat roll/rock when pressing buttons
    var rollTarget = (left ? -0.05 : 0) + (right ? 0.05 : 0);
    boatGroup.rotation.x = (boatGroup.rotation.x || 0) * 0.85 + rollTarget * 0.15;

    // Flag wave animation
    flagL.rotation.z = Math.sin(gameTime * 4) * 0.15;
    flagR.rotation.z = Math.sin(gameTime * 4 + 1) * 0.15;

    // Head slight bob
    headGroup.rotation.x = Math.sin(gameTime * 2) * 0.03;

    // Camera follow - elevated three-quarter view
    var camTargetX = boatX * 0.2;
    var camTargetZ = -boatZ + 7;
    camera.position.x += (camTargetX - camera.position.x) * 0.05;
    camera.position.z += (camTargetZ - camera.position.z) * 0.08;
    camera.position.y = 7;
    camera.lookAt(boatX, 0.5, -boatZ - 2);

    // Point light follows boat
    pointLight.position.set(boatX, 3, -boatZ);

    // Animate collectibles
    for (var ci3 = 0; ci3 < collectibles.length; ci3++) {
      var c3 = collectibles[ci3];
      if (!c3.active) continue;
      if (c3.type === 'zongzi') {
        c3.mesh.position.y = 0.5 + Math.sin(gameTime * 2 + c3.z) * 0.15;
        c3.mesh.rotation.y += dt * 0.002;
      }
    }

    // Speed boost glow
    if (speedBoostTimer > 0) {
      hullMat.emissive.setHex(0x442200);
      dirLight.intensity = 3;
    } else {
      hullMat.emissive.setHex(0x000000);
      dirLight.intensity = 2;
    }

    // Hit wall flash
    if (hitWallTimer > 0) {
      hullMat.emissive.setHex(0x440000);
    } else if (speedBoostTimer <= 0) {
      hullMat.emissive.setHex(0x000000);
    }

    // Water animation
    var positions = waterGeo.attributes.position.array;
    for (var wi = 0; wi < positions.length; wi += 3) {
      positions[wi + 1] = Math.sin(positions[wi] * 0.5 + gameTime * 2) * 0.03;
    }
    waterGeo.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }

  // === BUTTONS ===
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', startGame);

  // Start render loop
  animate();
})();
  </script>
</body>
</html>
