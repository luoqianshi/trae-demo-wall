<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今天吃什么！Demo</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">AI 饮食推荐助手 Demo</p>
        <h1>今天吃什么！</h1>
        <p class="subtitle">输入你现在的状态，让 AI 根据天气、上一顿、饮食目标、预算和口味，推荐这顿真正适合吃什么。</p>
      </div>
      <div class="status-card">
        <span id="apiStatus" class="status-dot">检测中</span>
        <div class="model-config">
          <label>
            模型平台
            <select id="providerSelect">
              <option value="deepseek">DeepSeek</option>
              <option value="doubao">豆包</option>
              <option value="glm">GLM</option>
              <option value="kimi">Kimi</option>
              <option value="qwen">千问</option>
              <option value="chatgpt">ChatGPT</option>
            </select>
          </label>
          <label>
            模型
            <select id="modelSelect"></select>
          </label>
          <label>
            API Key
            <input id="apiKeyInput" type="password" autocomplete="off" placeholder="不填则使用演示模式">
          </label>
          <button type="button" id="validateKey">验证连通</button>
          <p id="configHint">不输入 Key 时，会使用预设回答演示完整流程。</p>
        </div>
      </div>
    </section>

    <section class="workspace">
      <form id="recommendForm" class="panel">
        <div class="panel-title">
          <h2>告诉我你的状态</h2>
          <button type="button" id="fillExample">填入示例</button>
        </div>

        <label>
          当前餐次
          <select name="mealTime">
            <option>午餐</option>
            <option>早餐</option>
            <option>晚餐</option>
            <option>夜宵</option>
          </select>
        </label>

        <div class="two-col">
          <label>
            城市/位置
            <input name="location" placeholder="例如：上海，公司附近">
          </label>
          <label>
            天气/温度
            <input name="weather" placeholder="例如：32℃，闷热，有点潮">
          </label>
        </div>

        <label>
          上一顿吃了什么
          <input name="lastMeal" placeholder="例如：昨晚吃了炸鸡和可乐">
        </label>

        <div class="two-col">
          <div class="field-group">
            <span class="field-label">饮食目标</span>
            <div class="option-grid">
              <label class="chip-option"><input type="checkbox" name="goal" value="正常吃" checked>正常吃</label>
              <label class="chip-option"><input type="checkbox" name="goal" value="清淡">清淡</label>
              <label class="chip-option"><input type="checkbox" name="goal" value="减脂">减脂</label>
              <label class="chip-option"><input type="checkbox" name="goal" value="增肌">增肌</label>
              <label class="chip-option"><input type="checkbox" name="goal" value="控糖">控糖</label>
              <label class="chip-option"><input type="checkbox" name="goal" value="养胃">养胃</label>
              <label class="chip-option"><input type="checkbox" name="goal" value="省钱">省钱</label>
            </div>
            <input name="goalCustom" placeholder="其他目标，例如：少盐、不吃碳水、想奖励自己">
          </div>
          <label>
            饥饿程度
            <select name="hunger">
              <option>有点饿</option>
              <option>很饿</option>
              <option>没什么胃口</option>
              <option>想吃点轻的</option>
            </select>
          </label>
        </div>

        <div class="two-col">
          <label>
            口味偏好
            <input name="taste" placeholder="例如：想吃辣，但不要太油">
          </label>
          <label>
            忌口/过敏
            <input name="restrictions" placeholder="例如：不吃香菜，乳糖不耐">
          </label>
        </div>

        <div class="two-col">
          <label>
            预算
            <input name="budget" placeholder="例如：30 元以内">
          </label>
          <label>
            时间限制
            <input name="timeLimit" placeholder="例如：20 分钟内能吃上">
          </label>
        </div>

        <label>
          当前心情或补充
          <textarea name="mood" placeholder="例如：下午要开会，不想吃完犯困；但今天有点想奖励自己"></textarea>
        </label>

        <button id="submitBtn" class="primary" type="submit">让 AI 推荐这一顿</button>
      </form>

      <section class="result panel">
        <h2>推荐结果</h2>
        <div id="emptyState" class="empty">
          填写左侧信息后，AI 会在这里给出推荐、理由、备选方案和调整建议。
        </div>
        <div id="loading" class="loading hidden">
          正在结合你的状态思考这一顿吃什么……
        </div>
        <div id="resultContent" class="hidden"></div>
      </section>
    </section>

    <section class="memory panel">
      <div class="panel-title">
        <h2>个人记录后台</h2>
        <button type="button" id="refreshHistory">刷新记录</button>
      </div>
      <div class="memory-grid">
        <div>
          <h3>最近选择</h3>
          <div id="choiceHistory" class="history-list empty-list">还没有选择记录。</div>
        </div>
        <div>
          <h3>提问历史</h3>
          <div id="chatHistory" class="history-list empty-list">还没有提问历史。</div>
        </div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
