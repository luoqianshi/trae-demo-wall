            return this.selectedCar && !this.selectedCar.isEV;
        },

        // 计算档位边界速度（基于真实齿比序列）
        // 每个档位在红线RPM下能达到的最高速度 = maxSpeed * (最高档齿比 / 该档齿比)
        // 换挡点 = 该档位最高速度 * SHIFT_RPM_RATIO（全油门95%红线时换挡）
        // 1→2档换挡点额外提升（1档齿比大、易打滑，需更高转速）
        // 返回 shiftCount-1 个边界点，将速度区间划分为 shiftCount 个档位
        getGearBoundaries() {
            const car = this.selectedCar;
            if (!car || car.isEV) return null;
            const shiftCount = car.shiftCount || 0;
            if (shiftCount <= 1) return null; // CVT/混动：无离散档位

            // 获取齿比序列
            const ratios = CONSTANTS.GEAR_RATIOS[shiftCount];
            if (!ratios || ratios.length < shiftCount) return null;

            const topGearRatio = ratios[shiftCount - 1]; // 最高档齿比（最小）
            const shiftRpmRatio = CONSTANTS.SHIFT_RPM_RATIO;

            const boundaries = [];
            for (let i = 0; i < shiftCount - 1; i++) {
                // 档位i在红线RPM下能达到的最高速度
                const gearMaxSpeed = car.maxSpeed * (topGearRatio / ratios[i]);
                // 换挡点 = 该档位最高速度 * 换挡RPM比例
                let shiftPoint = gearMaxSpeed * shiftRpmRatio;
                // 1→2档（i=0）换挡点额外提升，模拟全油门1档拉高转速
                if (i === 0) {
                    shiftPoint = gearMaxSpeed * Math.min(0.98, shiftRpmRatio + CONSTANTS.SHIFT_1TO2_BONUS);
                }
                boundaries.push(shiftPoint);
            }
            return boundaries;
        },

        // 计算当前 RPM（基于档位和速度，稳态值，不含换挡过渡）
        // 传统AT/MT：每个档位内 RPM 从 GEAR_MIN_RPM 线性升至 REDLINE_RPM
        // CVT/混动（shiftCount=1）：RPM 平滑变化，模拟 e-CVT 保持高效区间
        // 电动车：返回 0（不显示转速）
        calculateRPM(speed, gearIndex) {
            const car = this.selectedCar;
            if (!car) return CONSTANTS.IDLE_RPM;
            if (car.isEV) return 0;
            if (speed <= 0) return CONSTANTS.IDLE_RPM;

            const shiftCount = car.shiftCount || 0;

            // CVT/混动（单档）：RPM 平滑曲线
            if (shiftCount <= 1) {
                const speedRatio = speed / car.maxSpeed;
                // 起步阶段 RPM 快速上升至 4500，之后缓慢上升
                if (speedRatio < 0.25) {
                    const t = speedRatio / 0.25;
                    return CONSTANTS.IDLE_RPM + t * (4500 - CONSTANTS.IDLE_RPM);
                } else {
                    const t = (speedRatio - 0.25) / 0.75;
                    return 4500 + t * 1500; // 4500 → 6000
                }
            }

            // 传统 AT/MT：基于档位边界计算
            const boundaries = this.gearBoundaries;
            if (!boundaries) return CONSTANTS.IDLE_RPM;

            const gearStart = gearIndex === 0 ? 0 : boundaries[gearIndex - 1];
            const gearEnd = gearIndex >= shiftCount - 1 ? car.maxSpeed : boundaries[gearIndex];
            const range = gearEnd - gearStart;
            if (range <= 0) return CONSTANTS.IDLE_RPM;

            const ratio = Math.max(0, Math.min(1, (speed - gearStart) / range));
            return CONSTANTS.GEAR_MIN_RPM + ratio * (CONSTANTS.REDLINE_RPM - CONSTANTS.GEAR_MIN_RPM);
        },

        // 根据速度、当前档位、操作类型确定目标档位（带滞回）
        // 加速时用升档边界，减速时用降档边界（更低），刹车时更积极降档
        // 降档点基于转速下限计算：当当前档位转速降至 DOWNSHIFT_RPM_RATIO * 红线 时降档
        determineGear(speed, currentGear, isDecelerating, isBraking) {
            const car = this.selectedCar;
            if (!car) return 0;
            if (car.isEV) return 0;       // 电动车：无档位
            if (speed <= 0) return 0;     // 静止：1档

            const shiftCount = car.shiftCount || 0;
            if (shiftCount <= 1) return 0; // CVT/混动：单档

            const boundaries = this.gearBoundaries;
            if (!boundaries) return 0;

            // 滞回量：降档点比升档点低
            const hysteresis = car.maxSpeed * CONSTANTS.SHIFT_HYSTERESIS_RATIO;
            // 刹车时额外降档偏移（更积极降档以利用发动机制动）
            const brakeBonus = isBraking ? car.maxSpeed * CONSTANTS.BRAKE_DOWNSHIFT_BONUS : 0;

            let newGear = currentGear;

            // 升档：从当前档位向上检查
            if (!isDecelerating) {
                for (let i = currentGear; i < shiftCount - 1; i++) {
                    if (speed >= boundaries[i]) {
                        newGear = i + 1;
                    } else {
                        break;
                    }
                }
            }

            // 降档：从当前档位向下检查
            // 降档点 = 升档边界[i] - 滞回 - 刹车偏移
            // 刹车时更积极降档（偏移更大），模拟跟趾降档利用发动机制动
            if (isDecelerating) {
                for (let i = currentGear - 1; i >= 0; i--) {
                    const downshiftPoint = boundaries[i] - hysteresis - brakeBonus;
                    if (speed < downshiftPoint) {
                        newGear = i;
                    } else {
                        break;
                    }
                }
            }

            return newGear;
        },

        // 更新RPM和档位（核心逻辑：换挡状态机 + 发动机制动）
        // 加速：RPM随速度上升 → 升挡 → RPM骤降
        // 刹车：RPM因发动机制动下降 → 降档 → RPM跳升（低档高转速）→ 继续下降
        // 滑行：类似刹车但更温和
        updateRPMAndGear(speed, deltaTime) {
            const car = this.selectedCar;
            if (!car) return;
            if (car.isEV) { this.rpm = 0; this.currentGearIndex = 0; return; }

            // 判断加减速趋势
            const speedDelta = speed - this.lastSpeed;
            this.lastSpeed = speed;
            const isDecelerating = speedDelta < -0.05 || this.isBraking;
            const isAccelerating = speedDelta > 0.05 || this.isAccelerating;

            // === 换挡状态机 ===
            if (this.isShifting) {
                // 换挡过渡中：推进计时器，插值RPM
                this.shiftTimer -= deltaTime;
                const progress = 1 - Math.max(0, this.shiftTimer / this.shiftDuration);

                if (this.shiftDirection > 0) {
                    // 升挡过渡：RPM从高位平滑下降到新档位目标值
                    // 使用 ease-out 曲线（先快降后缓降）
                    const eased = 1 - Math.pow(1 - progress, 2);
                    this.rpm = this.shiftStartRpm + (this.shiftTargetRpm - this.shiftStartRpm) * eased;
                } else {
                    // 降挡过渡：RPM先降（离合分离），再跳升到新档位目标值（低档高转速）
                    // 前半段下降，后半段跳升
                    if (progress < 0.4) {
                        // 前段：RPM下降（离合分离，发动机失去负载）
                        const p = progress / 0.4;
                        const dipRpm = this.shiftStartRpm - (this.shiftStartRpm - this.shiftTargetRpm * 0.6) * 0.3;
                        this.rpm = this.shiftStartRpm + (dipRpm - this.shiftStartRpm) * p;
                    } else {
                        // 后段：RPM跳升到新档位目标值（转速同步）
                        const p = (progress - 0.4) / 0.6;
                        const dipRpm = this.shiftStartRpm - (this.shiftStartRpm - this.shiftTargetRpm * 0.6) * 0.3;
                        const eased = 1 - Math.pow(1 - p, 2);
                        this.rpm = dipRpm + (this.shiftTargetRpm - dipRpm) * eased;
                    }
                }

                if (this.shiftTimer <= 0) {
                    this.isShifting = false;
                    this.shiftDirection = 0;
                    this.rpm = this.shiftTargetRpm;
                }
                // 换挡中不改变档位，RPM由过渡控制
                this.targetRpm = this.rpm;
                return;
            }

            // === 非换挡状态：确定目标档位 ===
            const newGear = this.determineGear(speed, this.currentGearIndex, isDecelerating, this.isBraking);

            // 检测换挡触发
            if (newGear !== this.currentGearIndex && speed > 0) {
                this.isShifting = true;
                this.shiftDirection = newGear > this.currentGearIndex ? 1 : -1;
                this.shiftDuration = this.shiftDirection > 0
                    ? CONSTANTS.SHIFT_UP_DURATION
                    : CONSTANTS.SHIFT_DOWN_DURATION;
                this.shiftTimer = this.shiftDuration;
                this.shiftStartRpm = this.rpm;
                // 换挡结束时的目标RPM = 新档位在当前速度下的稳态RPM
                this.shiftTargetRpm = this.calculateRPM(speed, newGear);
                this.currentGearIndex = newGear;
                return;
            }

            // === 稳态：RPM跟随速度变化 ===
            // 目标RPM计算：低速区间平滑过渡到怠速，避免速度归零时目标跳变
            let targetRpm;
            if (speed <= 0) {
                // 速度归零：目标为怠速（RPM会以专用速率缓慢回落，不跳变）
                targetRpm = CONSTANTS.IDLE_RPM;
            } else {
                targetRpm = this.calculateRPM(speed, this.currentGearIndex);
                // 低速混合：速度低于阈值时，目标RPM从档位RPM平滑过渡到怠速
                // 消除 calculateRPM 在 speed→0 时从 GEAR_MIN_RPM 跳到 IDLE_RPM 的不连续
                if (speed < CONSTANTS.LOW_SPEED_RPM_BLEND) {
                    const t = this.smoothstep(speed / CONSTANTS.LOW_SPEED_RPM_BLEND);
                    targetRpm = CONSTANTS.IDLE_RPM + (targetRpm - CONSTANTS.IDLE_RPM) * t;
                }
            }

            // RPM变化速率根据状态调整
            let rpmChangeRate;
            if (isAccelerating && !this.isBraking) {
                rpmChangeRate = 8000;  // 加速时RPM快速上升
            } else if (this.isBraking) {
                // 刹车时发动机制动：低档位制动更强
                // 档位越低（currentGearIndex越小），制动越强
                const gearBrakeBonus = (car.shiftCount - this.currentGearIndex) * CONSTANTS.ENGINE_BRAKE_GEAR_FACTOR;
                rpmChangeRate = CONSTANTS.ENGINE_BRAKE_BASE + gearBrakeBonus;
            } else if (isDecelerating) {
                // 滑行减速时：发动机制动使RPM下降，档位越低越强
                const gearBrakeBonus = (car.shiftCount - this.currentGearIndex) * (CONSTANTS.ENGINE_BRAKE_GEAR_FACTOR * 0.5);
                rpmChangeRate = CONSTANTS.ENGINE_BRAKE_BASE * 0.6 + gearBrakeBonus;
            } else if (speed <= 0) {
                // 停车后RPM回落到怠速：使用专用较慢速率（真实发动机停车后转速缓慢回落）
                rpmChangeRate = CONSTANTS.IDLE_RETURN_RATE;
            } else {
                rpmChangeRate = 2500;  // 稳态时RPM缓慢变化
            }

            this.targetRpm = Math.max(CONSTANTS.IDLE_RPM, targetRpm);

            const rpmDiff = this.targetRpm - this.rpm;
            if (Math.abs(rpmDiff) < 10) {
                this.rpm = this.targetRpm;
            } else {
                const maxChange = rpmChangeRate * deltaTime;
                if (rpmDiff > 0) {
                    this.rpm = Math.min(this.rpm + maxChange, this.targetRpm);
                } else {
                    this.rpm = Math.max(this.rpm - maxChange, this.targetRpm);
                }
            }

            // 确保RPM不低于怠速
            this.rpm = Math.max(CONSTANTS.IDLE_RPM, this.rpm);
        },

        // 获取档位显示文本
        getGearDisplay() {
            const car = this.selectedCar;
            if (!car) return 'N';
            if (car.isEV) return (this.isAccelerating || this.speed > 0) ? 'D' : 'N';
            const shiftCount = car.shiftCount || 0;
            if (shiftCount <= 1) {
                // CVT/混动
                return (this.isAccelerating || this.speed > 0) ? 'E' : 'N';
            }
            // 传统 AT/MT
            if (this.speed <= 0 && !this.isAccelerating) return 'N';
            if (this.speed <= 0) return '1';
            return String(this.currentGearIndex + 1);
        },

        // smoothstep 辅助函数：平滑插值
        smoothstep(x) {
            const t = Math.max(0, Math.min(1, x));
            return t * t * (3 - 2 * t);
        },

        // 计算扭矩因子（共享方法，供 calculateAcceleration 和 simulate0to100 使用）
        // 返回 0-1 之间的值，表示当前速度下的扭矩输出比例
        calculateTorqueFactor(speed) {
            if (!this.selectedCar) return 0;
            const car = this.selectedCar;
            const maxSpeed = car.maxSpeed;
            const speedMs = speed / 3.6;
            const maxSpeedMs = maxSpeed / 3.6;
            const speedRatio = speedMs / maxSpeedMs;

            let torqueFactor;

            if (car.isEV) {
                // === 电动车加速模型 ===
                // 1. 起步牵引力建立（0-15 km/h）：最小值不低于 0.85
                let tractionRamp = 1;
                if (speed < 15) {
                    const s = this.smoothstep(speed / 15);
                    tractionRamp = 0.85 + 0.15 * s;
                }

                // 2. 扭矩曲线：flat 类型使用 1 - speedRatio^1.5（更慢的衰减）
                const baseTorque = 1 - Math.pow(speedRatio, 1.5);

                torqueFactor = baseTorque * tractionRamp;

            } else {
                // === 燃油车加速模型 ===
                // 1. 离合器接合（0-30 km/h）：最小值不低于 0.70
                let clutchFactor;
                if (speed < 30) {
                    const s = this.smoothstep(speed / 30);
                    clutchFactor = 0.70 + 0.30 * s;
                } else {
                    clutchFactor = 1.0;
                }

                // 2. 换挡扭矩波动：使用齿比计算的换挡点（与 getGearBoundaries 对齐）
                let gearShiftFactor = 1.0;
                const shiftCount = car.shiftCount || 0;
                if (shiftCount > 1 && this.gearBoundaries) {
                    const shiftHalfWidth = 5; // km/h，换挡凹陷半宽
                    for (let i = 0; i < shiftCount - 1; i++) {
                        const shiftSpeed = this.gearBoundaries[i];
                        if (speed > shiftSpeed - shiftHalfWidth && speed < shiftSpeed + shiftHalfWidth) {
                            const dist = Math.abs(speed - shiftSpeed) / shiftHalfWidth;
                            const dip = car.shiftIntensity * (1 + Math.cos(dist * Math.PI)) / 2;
                            gearShiftFactor = Math.min(gearShiftFactor, 1 - dip);
                        }
                    }
                }

                // 3. 发动机扭矩曲线：根据 torqueCurve 参数
                let engineTorque;
                if (car.torqueCurve === "peaky") {
                    // 涡轮增压：起步 0.92，快速升到 1.0，宽平台到 0.55，然后 smoothstep 下降到 0
                    if (speedRatio < 0.12) {
                        const t = speedRatio / 0.12;
                        engineTorque = 0.92 + 0.08 * this.smoothstep(t);
                    } else if (speedRatio < 0.55) {
                        engineTorque = 1.0;
                    } else {
                        const t = (speedRatio - 0.55) / 0.45;
                        engineTorque = 1.0 - this.smoothstep(t);
                    }
                } else {
                    // linear (自然吸气)：起步 0.92，宽平台到 0.35，然后 smoothstep 下降到 0
                    if (speedRatio < 0.10) {
                        const t = speedRatio / 0.10;
                        engineTorque = 0.92 + 0.08 * this.smoothstep(t);
                    } else if (speedRatio < 0.35) {
                        engineTorque = 1.0;
                    } else {
                        const t = (speedRatio - 0.35) / 0.65;
                        engineTorque = 1.0 - this.smoothstep(t);
                    }
                }

                torqueFactor = clutchFactor * gearShiftFactor * engineTorque;
            }

            return torqueFactor;
        },

        // 计算加速度（km/h/s），考虑空气阻力、滚动阻力和换挡扭矩中断
        calculateAcceleration(speed) {
            if (!this.selectedCar) return 0;
            const baseAccelMs2 = (100 / this.selectedCar.acceleration) * this.accelScale;
            const maxSpeed = this.selectedCar.maxSpeed;
            const speedMs = speed / 3.6;
            const maxSpeedMs = maxSpeed / 3.6;
            const speedRatio = speedMs / maxSpeedMs;

            // 使用共享的扭矩因子计算方法
            const torqueFactor = this.calculateTorqueFactor(speed);

            // 换挡扭矩中断：换挡期间（离合器分离）驱动力大幅降低
            // 真实换挡时动力短暂中断，加速度骤降甚至为0
            let torqueCutFactor = 1.0;
            if (this.isShifting) {
                torqueCutFactor = CONSTANTS.SHIFT_TORQUE_CUT;
            }

            // 软限速因子：速度接近maxSpeed时平滑衰减至0
            // 使用 smoothstep 在 speedRatio 0.85~1.0 区间从1过渡到0
            let speedLimiter = 1.0;
            if (speedRatio > 0.85) {
                const t = Math.min(1, (speedRatio - 0.85) / 0.15);
                speedLimiter = 1 - t * t * (3 - 2 * t); // smoothstep反转
            }

            // 空气阻力（与速度平方成正比）
            const airCoeff = this.airDragCoeff || CONSTANTS.AIR_RESISTANCE_COEFF;
            const airDrag = airCoeff * speedMs * speedMs;
            // 滚动阻力
            const rollingDrag = CONSTANTS.ROLLING_RESISTANCE;
            // 净加速度 m/s²
            // torqueCutFactor 确保换挡期间驱动力大幅降低
            // speedLimiter 确保在 speedRatio→1 时驱动力趋近0
            // 同时空气阻力也在增大，双重作用确保速度渐近收敛到maxSpeed
            const netAccelMs2 = baseAccelMs2 * torqueFactor * torqueCutFactor * speedLimiter - airDrag - rollingDrag;
            return Math.max(0, netAccelMs2 * 3.6); // 转换为 km/h/s
        },

        // 模拟0-100加速（用于校准），返回达到100km/h所需时间
        // 完整模拟换挡状态机：换挡期间应用扭矩中断，与实际驾驶逻辑一致
        // 这样校准出的 accelScale 会补偿换挡中断带来的时间损失，确保破百时间匹配车型数据
        // dt 与实际驾驶帧率一致（60fps ≈ 0.0167s），确保换挡触发时机与实际驾驶吻合
        simulate0to100(scale) {
            const dt = 0.0167; // 60fps 帧间隔，与 updateAcceleration 的 deltaTime 一致
            let speed = 0;
            let time = 0;
            const car = this.selectedCar;
            const maxSpeed = car.maxSpeed;
            const baseAccelMs2 = (100 / car.acceleration) * scale;
            const boundaries = this.gearBoundaries;
            const shiftCount = car.shiftCount || 0;
            const hasDiscreteGears = !car.isEV && shiftCount > 1 && boundaries;

            // 换挡状态机（与实际驾驶 updateRPMAndGear 逻辑一致）
            let currentGear = 0;
            let isShifting = false;
            let shiftTimer = 0;
            let shiftDuration = 0;

            while (speed < 100 && time < 30) {
                const speedMs = speed / 3.6;
                const maxSpeedMs = maxSpeed / 3.6;
                const speedRatio = speedMs / maxSpeedMs;

                // 使用共享的扭矩因子计算方法
                const torqueFactor = this.calculateTorqueFactor(speed);

                // 换挡扭矩中断：换挡期间驱动力降低（与 calculateAcceleration 一致）
                let torqueCutFactor = 1.0;
                if (isShifting) {
                    torqueCutFactor = CONSTANTS.SHIFT_TORQUE_CUT;
                    // 推进换挡计时器
                    shiftTimer -= dt;
                    if (shiftTimer <= 0) {
                        isShifting = false;
                    }
                } else if (hasDiscreteGears && speed > 0) {
                    // 非换挡状态：检查是否触发换挡（仅升档，加速场景）
                    let newGear = currentGear;
                    for (let i = currentGear; i < shiftCount - 1; i++) {
                        if (speed >= boundaries[i]) {
                            newGear = i + 1;
                        } else {
                            break;
                        }
                    }
                    if (newGear !== currentGear) {
                        isShifting = true;
                        shiftDuration = CONSTANTS.SHIFT_UP_DURATION;
                        shiftTimer = shiftDuration;
                        currentGear = newGear;
                        // 与实际驾驶一致：换挡触发帧即应用扭矩中断
                        torqueCutFactor = CONSTANTS.SHIFT_TORQUE_CUT;
                    }
                }

                // 软限速因子
                let speedLimiter = 1.0;
                if (speedRatio > 0.85) {
                    const t = Math.min(1, (speedRatio - 0.85) / 0.15);
                    speedLimiter = 1 - t * t * (3 - 2 * t);
                }

                const airCoeff = this.airDragCoeff || CONSTANTS.AIR_RESISTANCE_COEFF;
                const airDrag = airCoeff * speedMs * speedMs;
                const rollingDrag = CONSTANTS.ROLLING_RESISTANCE;
                const netAccelMs2 = baseAccelMs2 * torqueFactor * torqueCutFactor * speedLimiter - airDrag - rollingDrag;
                speed += Math.max(0, netAccelMs2 * 3.6) * dt;
                time += dt;
            }
            return time;
        },

        // 校准加速度缩放系数和空气阻力系数
        // 确保0-100加速时间和最高车速都严格匹配车型数据
        calibrateAcceleration() {
            if (!this.selectedCar) return;
            const targetTime = this.selectedCar.acceleration;
            const targetMaxSpeed = this.selectedCar.maxSpeed;

            // 第一步：在无空气阻力下校准accelScale，确保0-100时间匹配
            let low = 0.3, high = 8.0;
            for (let i = 0; i < 30; i++) {
                const mid = (low + high) / 2;
                // 临时将airDragCoeff设为0进行0-100校准
                const savedAir = this.airDragCoeff;
                this.airDragCoeff = 0;
                const simTime = this.simulate0to100(mid);
                this.airDragCoeff = savedAir;
                if (simTime < targetTime) {
                    high = mid;
                } else {
                    low = mid;
                }
            }
            this.accelScale = (low + high) / 2;

            // 第二步：校准空气阻力系数，确保最高车速匹配
            // airDragCoeff越小→最高车速越高，越大→最高车速越低
            let airLow = 0.00005, airHigh = 0.08;
            for (let i = 0; i < 40; i++) {
                const mid = (airLow + airHigh) / 2;
                this.airDragCoeff = mid;
                // 模拟最高车速
                const simMax = this.simulateMaxSpeed();
                if (simMax > targetMaxSpeed) {
                    airLow = mid; // 最高车速太高，增大阻力
                } else {
                    airHigh = mid; // 最高车速太低，减小阻力
                }
            }
            this.airDragCoeff = (airLow + airHigh) / 2;

            // 第三步：重新校准accelScale，补偿空气阻力对0-100的影响
            // 扩大搜索范围确保能充分补偿
            low = this.accelScale * 0.70;
            high = this.accelScale * 1.50;
            for (let i = 0; i < 40; i++) {
                const mid = (low + high) / 2;
                const simTime = this.simulate0to100(mid);
                if (simTime < targetTime) {
                    high = mid;
                } else {
                    low = mid;
                }
            }
            this.accelScale = (low + high) / 2;

            // 第四步：最终验证，如果误差仍超过0.05秒则再次微调
            const finalTime = this.simulate0to100(this.accelScale);
            if (Math.abs(finalTime - targetTime) > 0.02) {
                low = this.accelScale * 0.95;
                high = this.accelScale * 1.05;
                for (let i = 0; i < 50; i++) {
                    const mid = (low + high) / 2;
                    const simTime = this.simulate0to100(mid);
                    if (simTime < targetTime) {
                        high = mid;
                    } else {
                        low = mid;
                    }
                }
                this.accelScale = (low + high) / 2;
            }
        },

        // 模拟最高车速（用于校准），返回能达到的稳态最高速度
        simulateMaxSpeed() {
            const dt = 0.01;
            let speed = 0;
            const maxSpeed = this.selectedCar.maxSpeed;
            const baseAccelMs2 = (100 / this.selectedCar.acceleration) * this.accelScale;

            for (let i = 0; i < 20000; i++) {
                const accel = this.calculateAcceleration(speed);
                speed += accel * dt;
                if (accel < 0.01 && speed > 50) break;
            }
            return speed;
        },

        // 计算刹车减速度（km/h/s）
        // 真实刹车特性：基础减速度由刹车距离决定，叠加速度相关曲线和发动机制动
        // 1. 速度相关：中高速减速度较高，接近停车时ABS介入使减速度降低（避免轮胎锁死）
        // 2. 发动机制动：燃油车刹车时叠加发动机制动（档位越低越强），电动车叠加动能回收
        // 3. 真实上限：轮胎抓地力极限约 11-12 m/s²（40-43 km/h/s）
        calculateBrakeDeceleration() {
            if (!this.selectedCar) return 0;
            const car = this.selectedCar;
            // 基础刹车减速度：由100-0刹车距离反推
            // brakePerformance 是100-0km/h刹车距离（米），v²=2as → a=v²/(2s)
            // 100km/h = 27.78 m/s，a = 27.78² / (2 * brakePerformance) m/s²
            const baseBrakeMs2 = (27.78 * 27.78) / (2 * car.brakePerformance);
            let baseDecel = baseBrakeMs2 * 3.6; // 转换为 km/h/s

            // 速度相关曲线：接近停车时ABS介入，减速度降低
            // 低速区间（< BRAKE_LOW_SPEED_THRESHOLD）平滑衰减到 BRAKE_DECEL_LOW_SPEED_FACTOR
            let speedFactor = 1.0;
            if (this.speed < CONSTANTS.BRAKE_LOW_SPEED_THRESHOLD) {
                const t = this.smoothstep(this.speed / CONSTANTS.BRAKE_LOW_SPEED_THRESHOLD);
                speedFactor = CONSTANTS.BRAKE_DECEL_LOW_SPEED_FACTOR + (1 - CONSTANTS.BRAKE_DECEL_LOW_SPEED_FACTOR) * t;
            }
            baseDecel *= speedFactor;

            // 叠加发动机制动减速度（燃油车）或动能回收减速度（电动车）
            let engineBrakeDecel = 0;
            if (car.isEV) {
                // 电动车动能回收：高速时更强，低速时减弱
                const speedRatio = this.speed / car.maxSpeed;
                const regenFactor = 1 + CONSTANTS.REGEN_DECEL_HIGH_SPEED_FACTOR * speedRatio;
                engineBrakeDecel = CONSTANTS.REGEN_DECEL_BASE * regenFactor;
            } else {
                // 燃油车发动机制动：档位越低越强
                const shiftCount = car.shiftCount || 1;
                const gearFactor = (shiftCount - this.currentGearIndex) * CONSTANTS.ENGINE_BRAKE_DECEL_GEAR_FACTOR;
                engineBrakeDecel = CONSTANTS.ENGINE_BRAKE_DECEL_BASE + gearFactor;
            }

            const totalDecel = baseDecel + engineBrakeDecel;
            // 真实上限：轮胎抓地力极限
            return Math.min(totalDecel, CONSTANTS.BRAKE_DECEL_MAX);
        },

        // 更新加速模拟
        // 执行顺序与 simulate0to100 一致：先更新档位状态机（可能触发换挡），
        // 再用更新后的 isShifting 状态计算加速度，确保换挡触发与扭矩中断在同一帧生效
        updateAcceleration(timestamp) {
            if (!this.isAccelerating) return;

            const deltaTime = Math.min((timestamp - this.lastTimestamp) / 1000, 0.05); // 限制最大 delta 防止跳帧
            this.lastTimestamp = timestamp;
            this.elapsedTime = (timestamp - this.startTime) / 1000;

            // 1. 先更新档位和 RPM（可能触发换挡，设置 isShifting）
            this.updateRPMAndGear(this.speed, deltaTime);

            // 2. 再用更新后的 isShifting 状态计算加速度（换挡触发与扭矩中断同帧生效）
            const accel = this.calculateAcceleration(this.speed);
            this.speed = Math.max(0, this.speed + accel * deltaTime);

            this.gear = this.getGearDisplay();

            // 更新距离
            this.totalDistance += (this.speed / 3.6) * deltaTime;

            // 记录速度数据（限长）
            this.speedData.push({ time: this.elapsedTime, speed: this.speed });
            if (this.speedData.length > CONSTANTS.MAX_SPEED_DATA_POINTS) {
                this.speedData = this.speedData.slice(-CONSTANTS.MAX_SPEED_DATA_POINTS);
            }

            this.animationFrame = requestAnimationFrame((t) => this.updateAcceleration(t));
        },

        // 更新刹车模拟
        updateBraking(timestamp) {
            if (!this.isBraking) return;

            const deltaTime = Math.min((timestamp - this.lastTimestamp) / 1000, 0.05);
            this.lastTimestamp = timestamp;

            const decel = this.calculateBrakeDeceleration();
            this.speed = Math.max(0, this.speed - decel * deltaTime);

            // 更新档位和 RPM（刹车时降档更积极，RPM有发动机制动+降档跳升）
            this.updateRPMAndGear(this.speed, deltaTime);
            this.gear = this.getGearDisplay();

            // 更新距离
            this.totalDistance += (this.speed / 3.6) * deltaTime;

            // 速度为0时自动停止
            if (this.speed <= 0) {
                this.stopBraking();
                return;
            }

            this.animationFrame = requestAnimationFrame((t) => this.updateBraking(t));
        },

        // 自然减速（滑行）
        // 真实滑行特性：松开油门后驱动力消失，车辆受阻力自然减速
        // 1. 燃油车：滚动阻力 + 空气阻力 + 发动机制动（档位越低越强，模拟发动机牵引制动）
        // 2. 电动车：滚动阻力 + 空气阻力 + 动能回收（速度相关，高速更强）
        updateCoasting(timestamp) {
            if (this.isAccelerating || this.isBraking || this.speed <= 0) {
                this.stopCoasting();
                return;
            }

            const deltaTime = Math.min((timestamp - this.lastTimestamp) / 1000, 0.05);
            this.lastTimestamp = timestamp;

            const car = this.selectedCar;
            const speedMs = this.speed / 3.6;

            // 基础阻力：滚动阻力 + 空气阻力
            const coastAirDrag = 0.003 * speedMs * speedMs; // 滑行空气阻力系数
            let totalDecel = CONSTANTS.NATURAL_DECEL + coastAirDrag * 3.6;

            // 叠加发动机制动（燃油车）或动能回收（电动车）
            if (car) {
                if (car.isEV) {
                    // 电动车动能回收：松油门后电机反拖，高速时更强
                    const speedRatio = this.speed / car.maxSpeed;
                    const regenFactor = 1 + CONSTANTS.REGEN_DECEL_HIGH_SPEED_FACTOR * speedRatio;
                    totalDecel += CONSTANTS.REGEN_DECEL_BASE * regenFactor;
                } else {
                    // 燃油车发动机制动：档位越低制动越强
                    const shiftCount = car.shiftCount || 1;
                    const gearFactor = (shiftCount - this.currentGearIndex) * CONSTANTS.ENGINE_BRAKE_DECEL_GEAR_FACTOR;
                    const engineBrake = CONSTANTS.ENGINE_BRAKE_DECEL_BASE + gearFactor;
                    // 发动机制动随速度降低而减弱（转速下降）
                    const speedFactor = Math.max(0.3, this.speed / 60);
                    totalDecel += engineBrake * speedFactor;
                }
            }

            this.speed = Math.max(0, this.speed - totalDecel * deltaTime);

            // 更新档位和 RPM（滑行时温和降档）
            this.updateRPMAndGear(this.speed, deltaTime);
            this.gear = this.getGearDisplay();

            if (this.speed <= 0) {
                this.stopCoasting();
                // 速度为0但RPM仍高于怠速：启动怠速回落循环
                if (this.rpm > CONSTANTS.IDLE_RPM) {
                    this.lastTimestamp = performance.now();
                    this.animationFrame = requestAnimationFrame((t) => this.updateIdleReturn(t));
                }
                return;
            }

            this.animationFrame = requestAnimationFrame((t) => this.updateCoasting(t));
        },

        startAcceleration() {
            if (!this.selectedCar || this.isAccelerating) return;
            this.isAccelerating = true;
            this.isBraking = false;
            this.stopCoasting();

            if (this.speed === 0) {
                this.startTime = performance.now();
                this.elapsedTime = 0;
                this.totalDistance = 0;
                this.speedData = [];
            }

            this.lastTimestamp = performance.now();
            this.animationFrame = requestAnimationFrame((t) => this.updateAcceleration(t));
        },

        stopAcceleration() {
            if (!this.isAccelerating) return;
            this.isAccelerating = false;
            if (this.animationFrame) {
                cancelAnimationFrame(this.animationFrame);
                this.animationFrame = null;
            }
            // 如果还有速度，启动滑行减速
            if (this.speed > 0) {
                this.lastTimestamp = performance.now();
                this.animationFrame = requestAnimationFrame((t) => this.updateCoasting(t));
            }
        },

        startBraking() {
            if (!this.selectedCar || this.isBraking) return;
            this.isBraking = true;
            this.isAccelerating = false;
            this.stopCoasting();

            if (this.animationFrame) {
                cancelAnimationFrame(this.animationFrame);
                this.animationFrame = null;
            }

            this.lastTimestamp = performance.now();
            this.animationFrame = requestAnimationFrame((t) => this.updateBraking(t));
        },

        stopBraking() {
            if (!this.isBraking) return;
            this.isBraking = false;
            if (this.animationFrame) {
                cancelAnimationFrame(this.animationFrame);
                this.animationFrame = null;
            }
            // 如果还有速度，启动滑行减速
            if (this.speed > 0) {
                this.lastTimestamp = performance.now();
                this.animationFrame = requestAnimationFrame((t) => this.updateCoasting(t));
            } else if (this.rpm > CONSTANTS.IDLE_RPM) {
                // 速度已为0但RPM仍高于怠速：启动怠速回落循环
                this.lastTimestamp = performance.now();
                this.animationFrame = requestAnimationFrame((t) => this.updateIdleReturn(t));
            }
        },

        // 怠速回落：停车后RPM缓慢回落到怠速
        // 真实发动机停车后，曲轴由于惯性继续旋转，转速缓慢下降至怠速
        updateIdleReturn(timestamp) {
            // 若有新的操作介入（加速/刹车/滑行），则退出怠速回落
            if (this.isAccelerating || this.isBraking || this.speed > 0) {
                return;
            }

            const deltaTime = Math.min((timestamp - this.lastTimestamp) / 1000, 0.05);
            this.lastTimestamp = timestamp;

            // 调用 updateRPMAndGear 推进 RPM 回落（速度为0时使用 IDLE_RETURN_RATE）
            this.updateRPMAndGear(0, deltaTime);
            this.gear = this.getGearDisplay();

            // RPM 已回落到怠速附近，结束循环
            if (this.rpm <= CONSTANTS.IDLE_RPM + 10) {
                this.rpm = CONSTANTS.IDLE_RPM;
                this.animationFrame = null;
                return;
            }

            this.animationFrame = requestAnimationFrame((t) => this.updateIdleReturn(t));
        },

        stopCoasting() {
            if (this.animationFrame && !this.isAccelerating && !this.isBraking) {
                cancelAnimationFrame(this.animationFrame);
                this.animationFrame = null;
            }
        },

        reset() {
            this.stopAcceleration();
            this.stopBraking();
            this.stopCoasting();
            this.speed = 0;
            this.rpm = CONSTANTS.IDLE_RPM;  // 怠速
            this.targetRpm = CONSTANTS.IDLE_RPM;
            this.gear = 'N';
            this.currentGearIndex = 0;
            this.isShifting = false;
            this.shiftTimer = 0;
            this.shiftDirection = 0;
            this.shiftStartRpm = 0;
            this.shiftTargetRpm = 0;
            this.lastSpeed = 0;
            this.elapsedTime = 0;
            this.totalDistance = 0;
            this.speedData = [];
        },

        selectCar(car) {
            this.selectedCar = car;
            // 动态调整速度表量程（向上取整到最近的40的倍数，且至少240）
            this.speedometerMax = Math.max(240, Math.ceil(car.maxSpeed / 40) * 40);
            // 计算档位边界（与物理模型换挡点对齐）
            this.gearBoundaries = this.getGearBoundaries();
            // 重置档位/RPM状态
            this.currentGearIndex = 0;
            this.isShifting = false;
            this.shiftTimer = 0;
            this.shiftDirection = 0;
            this.shiftStartRpm = 0;
            this.shiftTargetRpm = 0;
            this.lastSpeed = 0;
            this.rpm = CONSTANTS.IDLE_RPM;
            this.targetRpm = CONSTANTS.IDLE_RPM;
            this.gear = 'N';
            // 校准加速度缩放系数，确保0-100时间严格匹配车型数据
            this.calibrateAcceleration();
        }
    };

    // ============================================================
    // UI 层 - DOM 操作与渲染
    // ============================================================
    const UI = {
        // DOM 缓存
        elements: {},

        // 图表离屏 Canvas（网格层）
        chartGridCanvas: null,

        // 仪表盘离屏 Canvas（静态层：底面+刻度）
        speedometerStaticCanvas: null,

        // 仪表盘绘制参数（基于800x800 Canvas，拟物风格）
        SP: {
            cx: 400, cy: 400,           // 中心
            outerR: 395,                 // 最外圈半径
            bezelOuterR: 390,            // 金属边框外半径
            bezelInnerR: 370,            // 金属边框内半径
            faceR: 365,                  // 表盘面半径
            tickOuterR: 325,             // 刻度线外端
            majorTickLen: 28,            // 大刻度线长度
            minorTickLen: 14,            // 小刻度线长度
            labelR: 270,                 // 数字标注半径
            innerRingR: 215,             // 内圈装饰环
            needleLen: 310,              // 指针长度
            needleTailLen: 20,           // 指针尾部
            needleBaseW: 14,              // 指针底部宽度
            capR: 15,                    // 中心帽半径
            infoBoxTop: 450,             // 信息框顶部位置
            infoBoxH: 110,               // 信息框高度
            // 转速表（内环）布局参数
            tachOuterR: 205,             // 转速弧外半径
            tachInnerR: 180,             // 转速弧内半径
            tachTickR: 210,              // 转速刻度线外端
            tachMajorTickLen: 12,        // 转速大刻度线长度
            tachMinorTickLen: 6,         // 转速小刻度线长度
            tachLabelR: 162,             // 转速数字标注半径
            tachFillWidth: 14,           // RPM填充弧宽度
            tachBezelOuterR: 212,        // 转速表金属外圈半径
            tachBezelInnerR: 174,        // 转速表金属内圈半径
            tachLedSegmentStep: 250,     // LED分段步长（RPM）
            tachLedGapDeg: 0.35,         // LED段间间隙（度）
            tachIdleMarkR: 168,          // 怠速标记半径
        },

        // 初始化 DOM 引用
        cacheElements() {
            const ids = [
                'brandSelect', 'modelSelect', 'carInfo', 'carName', 'carYear',
                'accelerationTime', 'maxSpeed',
                'speedometerCanvas',
                'accelerateBtn', 'brakeBtn',
                'accelerateBtnMobile', 'brakeBtnMobile'
            ];
            ids.forEach(id => {
                this.elements[id] = document.getElementById(id);
            });
        },

        // 填充品牌下拉
        populateBrandSelect() {
            const brandSelect = this.elements.brandSelect;
            for (const brand in carData) {
                const option = document.createElement('option');
                option.value = brand;
                option.textContent = brand;
                brandSelect.appendChild(option);
            }
        },

        // ============================================================
        // Canvas 仪表盘绘制
        // ============================================================

        // 角度辅助：将速度值映射到弧度（0点在12点方向，顺时针为正）
        speedToAngle(speed, maxSpeed) {
            const startDeg = CONSTANTS.SPEEDOMETER_START_ANGLE; // -135
            const rangeDeg = CONSTANTS.SPEEDOMETER_ANGLE_RANGE; // 270
            const deg = startDeg + (speed / maxSpeed) * rangeDeg;
            return (deg - 90) * Math.PI / 180; // 转为标准数学角度（0=右，逆时针），-90让0点在上方
        },

        // 角度辅助：将 RPM 值映射到弧度（与速度表同范围 -135°~135°）
        rpmToAngle(rpm) {
            const startDeg = CONSTANTS.SPEEDOMETER_START_ANGLE;
            const rangeDeg = CONSTANTS.SPEEDOMETER_ANGLE_RANGE;
            const ratio = Math.max(0, Math.min(1, rpm / CONSTANTS.MAX_RPM));
            const deg = startDeg + ratio * rangeDeg;
            return (deg - 90) * Math.PI / 180;
        },

        // 圆角矩形辅助函数
        roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        },

        // 绘制仪表盘静态层（拟物风格，多层光影质感）
        drawSpeedometerStatic(maxSpeed) {
            const sp = this.SP;
            const size = 800;

            if (!this.speedometerStaticCanvas) {
                this.speedometerStaticCanvas = document.createElement('canvas');
            }
            this.speedometerStaticCanvas.width = size;
            this.speedometerStaticCanvas.height = size;
            const ctx = this.speedometerStaticCanvas.getContext('2d');

            ctx.clearRect(0, 0, size, size);

            // === 1. 最外层投影（Canvas 外阴影） ===
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 25;
            ctx.shadowOffsetY = 5;
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.outerR, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.restore();

            // === 2. 金属外圈（暖色多层渐变，模拟玫瑰金拉丝金属） ===
            // 外圈底色
            const outerBase = ctx.createRadialGradient(sp.cx, sp.cy, sp.outerR - 30, sp.cx, sp.cy, sp.outerR);
            outerBase.addColorStop(0, '#2a2a2e');
            outerBase.addColorStop(0.5, '#1a1a1e');
            outerBase.addColorStop(1, '#0e0e12');
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.outerR, 0, Math.PI * 2);
            ctx.fillStyle = outerBase;
            ctx.fill();

            // 外圈顶部弧光（模拟上方光源照射金属外缘，暖色调）
            ctx.save();
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.outerR, 0, Math.PI * 2);
            ctx.clip();
            const outerTopLight = ctx.createLinearGradient(sp.cx, sp.cy - sp.outerR, sp.cx, sp.cy - sp.outerR * 0.4);
            outerTopLight.addColorStop(0, 'rgba(220,225,235,0.18)');
            outerTopLight.addColorStop(1, 'rgba(220,225,235,0)');
            ctx.fillStyle = outerTopLight;
            ctx.fillRect(sp.cx - sp.outerR, sp.cy - sp.outerR, sp.outerR * 2, sp.outerR * 0.6);
            ctx.restore();

            // 外圈底部暗面（暖色调）
            ctx.save();
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.outerR, 0, Math.PI * 2);
            ctx.clip();
            const outerBottomDark = ctx.createLinearGradient(sp.cx, sp.cy + sp.outerR * 0.5, sp.cx, sp.cy + sp.outerR);
            outerBottomDark.addColorStop(0, 'rgba(0,0,0,0)');
            outerBottomDark.addColorStop(1, 'rgba(0,0,0,0.35)');
            ctx.fillStyle = outerBottomDark;
            ctx.fillRect(sp.cx - sp.outerR, sp.cy, sp.outerR * 2, sp.outerR);
            ctx.restore();

            // === 3. 玫瑰金金属边框环（拉丝质感 + 多层渐变） ===
            ctx.save();
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.bezelOuterR, 0, Math.PI * 2);
            ctx.arc(sp.cx, sp.cy, sp.bezelInnerR, 0, Math.PI * 2, true);
            // 主渐变：上亮下暗（玫瑰金）
            const bezelGrad = ctx.createLinearGradient(sp.cx, sp.cy - sp.bezelOuterR, sp.cx, sp.cy + sp.bezelOuterR);
            bezelGrad.addColorStop(0, '#e8e8ec');
            bezelGrad.addColorStop(0.15, '#c8c8d0');
            bezelGrad.addColorStop(0.35, '#a8a8b2');
            bezelGrad.addColorStop(0.5, '#d8d8e0');
            bezelGrad.addColorStop(0.65, '#9898a2');
            bezelGrad.addColorStop(0.85, '#808088');
            bezelGrad.addColorStop(1, '#606068');
            ctx.fillStyle = bezelGrad;
            ctx.fill();

            // 边框环顶部高光（模拟金属反光）
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.bezelOuterR - 1, -Math.PI * 0.85, -Math.PI * 0.15);
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 边框环底部暗线
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.bezelOuterR - 1, Math.PI * 0.15, Math.PI * 0.85);
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 边框内缘暗线（与表盘分界）
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.bezelInnerR + 0.5, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0,0,0,0.4)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 边框外缘细高光
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.bezelOuterR - 0.5, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 0.8;
            ctx.stroke();
            ctx.restore();

            // === 4. 表盘底色（暗色调，带顶部微光 + 径向渐变） ===
            const faceGrad = ctx.createRadialGradient(sp.cx, sp.cy - 80, 20, sp.cx, sp.cy + 30, sp.faceR);
            faceGrad.addColorStop(0, '#2a2a30');
            faceGrad.addColorStop(0.2, '#222228');
            faceGrad.addColorStop(0.5, '#1c1c22');
            faceGrad.addColorStop(0.75, '#18181e');
            faceGrad.addColorStop(1, '#141418');
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.faceR, 0, Math.PI * 2);
            ctx.fillStyle = faceGrad;
            ctx.fill();

            // 表盘顶部大面积弧形微光（模拟光源从上方照射）
            ctx.save();
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.faceR - 2, 0, Math.PI * 2);
            ctx.clip();
            const highlightGrad = ctx.createLinearGradient(sp.cx, sp.cy - sp.faceR, sp.cx, sp.cy - sp.faceR * 0.1);
            highlightGrad.addColorStop(0, 'rgba(255,255,255,0.06)');
            highlightGrad.addColorStop(0.3, 'rgba(255,255,255,0.02)');
            highlightGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = highlightGrad;
            ctx.fillRect(sp.cx - sp.faceR, sp.cy - sp.faceR, sp.faceR * 2, sp.faceR * 0.9);
            ctx.restore();

            // 表盘底部微暗（模拟下方阴影）
            ctx.save();
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.faceR - 2, 0, Math.PI * 2);
            ctx.clip();
            const faceBottom = ctx.createLinearGradient(sp.cx, sp.cy + sp.faceR * 0.3, sp.cx, sp.cy + sp.faceR);
            faceBottom.addColorStop(0, 'rgba(0,0,0,0)');
            faceBottom.addColorStop(1, 'rgba(0,0,0,0.15)');
            ctx.fillStyle = faceBottom;
            ctx.fillRect(sp.cx - sp.faceR, sp.cy, sp.faceR * 2, sp.faceR);
            ctx.restore();

            // 表盘内圈细暗线（装饰环）
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.tickOuterR + 12, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.innerRingR, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 0.6;
            ctx.stroke();

            // --- 3. (黑色圆形装饰已移除) ---
            // --- 5. (右侧扇形装饰图案已移除) ---

            // === 6. 刻度线和数字（三层绘制：阴影+主体+高光，凸起质感） ===
            const majorStep = 20;
            const minorStep = 10;
            const tickCount = maxSpeed / minorStep;

            for (let i = 0; i <= tickCount; i++) {
                const speedVal = i * minorStep;
                const angle = this.speedToAngle(speedVal, maxSpeed);
                const isMajor = speedVal % majorStep === 0;

                const tickLen = isMajor ? sp.majorTickLen : sp.minorTickLen;
                const outerR = sp.tickOuterR;
                const innerR = outerR - tickLen;

                const x1 = sp.cx + Math.cos(angle) * outerR;
                const y1 = sp.cy + Math.sin(angle) * outerR;
                const x2 = sp.cx + Math.cos(angle) * innerR;
                const y2 = sp.cy + Math.sin(angle) * innerR;

                // 第一层：右下阴影（凸起投影）
                ctx.beginPath();
                ctx.moveTo(x1 + 1, y1 + 1.2);
                ctx.lineTo(x2 + 1, y2 + 1.2);
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = isMajor ? 5 : 2.8;
                ctx.lineCap = 'butt';
                ctx.stroke();

                // 第二层：刻度线主体（浅灰色，暗色表盘上清晰可见）
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = 'rgba(220,220,230,0.85)';
                ctx.lineWidth = isMajor ? 3.5 : 1.5;
                ctx.lineCap = 'butt';
                ctx.stroke();

                // 第三层：左上高光（凸起顶部反光）
                ctx.beginPath();
                ctx.moveTo(x1 - 0.8, y1 - 0.8);
                ctx.lineTo(x2 - 0.8, y2 - 0.8);
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = isMajor ? 1.2 : 0.5;
                ctx.lineCap = 'butt';
                ctx.stroke();

                // 大刻度数字标注
                if (isMajor) {
                    const labelX = sp.cx + Math.cos(angle) * sp.labelR;
                    const labelY = sp.cy + Math.sin(angle) * sp.labelR;

                    // 数字投影（右下偏移）
                    ctx.save();
                    ctx.translate(labelX + 1, labelY + 1.2);
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.font = '600 28px "Helvetica Neue", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(String(speedVal), 0, 0);
                    ctx.restore();

                    // 数字主体（浅色，暗色表盘上清晰可见）
                    ctx.save();
                    ctx.translate(labelX, labelY);
                    ctx.fillStyle = 'rgba(220,220,230,0.9)';
                    ctx.font = '600 28px "Helvetica Neue", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(String(speedVal), 0, 0);
                    ctx.restore();
                }
            }

            // === 7. 表盘边缘暖色内圈线 ===
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.faceR - 4, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // === 8. 玻璃罩反光效果（暖色调多层） ===
            ctx.save();
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, sp.faceR - 6, 0, Math.PI * 2);
            ctx.clip();

            // 主反光：上方大面积弧形渐变（暖白）
            const glassGrad = ctx.createLinearGradient(sp.cx, sp.cy - sp.faceR, sp.cx, sp.cy - sp.faceR * 0.15);
            glassGrad.addColorStop(0, 'rgba(255,255,255,0.25)');
            glassGrad.addColorStop(0.3, 'rgba(255,255,255,0.1)');
            glassGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = glassGrad;
            ctx.fillRect(sp.cx - sp.faceR, sp.cy - sp.faceR, sp.faceR * 2, sp.faceR * 0.85);
            ctx.restore();

            // === 8b. 表盘内 "km/h" 标识（位于中心帽上方，数字显示下方） ===
            ctx.save();
            ctx.font = '500 11px "Helvetica Neue", Arial, sans-serif';
            ctx.fillStyle = 'rgba(180,180,190,0.5)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('km/h', sp.cx, sp.cy + 68);
            ctx.restore();

            // === 9. 转速表静态层（仅燃油车绘制） ===
            if (SimulationEngine.hasTachometer()) {
                this.drawTachometerStatic(ctx);
            }
        },

        // 绘制转速表静态层（RPM弧刻度、红线区、数字标注）
        drawTachometerStatic(ctx) {
            const sp = this.SP;
            const maxRpm = CONSTANTS.MAX_RPM;
            const redlineRpm = CONSTANTS.REDLINE_RPM;
            const idleRpm = CONSTANTS.IDLE_RPM;
            const startA = this.rpmToAngle(0);
            const endA = this.rpmToAngle(maxRpm);

            // === 9d. RPM 刻度线（金属质感渐变，红线区刻度发红光） ===
            const rpmMajorStep = 2000;
            const rpmMinorStep = 1000;
            for (let rpm = 0; rpm <= maxRpm; rpm += rpmMinorStep) {
                const angle = this.rpmToAngle(rpm);
                const isMajor = rpm % rpmMajorStep === 0;
                const isRedline = rpm >= redlineRpm;

                const tickLen = isMajor ? sp.tachMajorTickLen : sp.tachMinorTickLen;
                const outerR = sp.tachTickR;
                const innerR = outerR - tickLen;

                const x1 = sp.cx + Math.cos(angle) * outerR;
                const y1 = sp.cy + Math.sin(angle) * outerR;
                const x2 = sp.cx + Math.cos(angle) * innerR;
                const y2 = sp.cy + Math.sin(angle) * innerR;

                ctx.save();
                if (isRedline) {
                    // 红线区刻度：发红光
                    ctx.shadowColor = 'rgba(255,60,40,0.8)';
                    ctx.shadowBlur = 4;
                    ctx.strokeStyle = 'rgba(220,50,35,0.95)';
                    ctx.lineWidth = isMajor ? 2.2 : 1.3;
                } else {
                    // 普通刻度：暖色金属质感渐变
                    const tickGrad = ctx.createLinearGradient(x1, y1, x2, y2);
                    tickGrad.addColorStop(0, 'rgba(40,40,50,0.85)');
                    tickGrad.addColorStop(0.5, 'rgba(100,100,110,0.9)');
                    tickGrad.addColorStop(1, 'rgba(60,60,70,0.85)');
                    ctx.strokeStyle = tickGrad;
                    ctx.lineWidth = isMajor ? 2 : 1;
                }
                ctx.lineCap = 'butt';
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                ctx.restore();
            }

            // === 9e. RPM 数字标注（Fraunces 衬线，红线区发红光） ===
            ctx.save();
            ctx.font = '600 16px "Helvetica Neue", Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let rpm = 0; rpm <= maxRpm; rpm += rpmMajorStep) {
                const angle = this.rpmToAngle(rpm);
                const labelX = sp.cx + Math.cos(angle) * sp.tachLabelR;
                const labelY = sp.cy + Math.sin(angle) * sp.tachLabelR;
                const isRedline = rpm >= redlineRpm;

                if (isRedline) {
                    ctx.shadowColor = 'rgba(255,60,40,0.9)';
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = 'rgba(230,60,45,0.95)';
                } else {
                    // 普通数字：暖色带细微浮雕
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 1;
                    ctx.shadowOffsetY = 1;
                    ctx.fillStyle = 'rgba(180,180,190,0.85)';
                }
                ctx.fillText(String(rpm / 1000), labelX, labelY);
            }
            ctx.restore();

            // === 9f. "x1000 r/min" 单位标注（暖色金属质感） ===
            ctx.save();
            ctx.font = '500 9px "Helvetica Neue", Arial, sans-serif';
            ctx.fillStyle = 'rgba(130,130,140,0.7)';
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = 1;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('x1000  r/min', sp.cx, sp.cy - sp.tachLabelR + 14);
            ctx.restore();

            // === 9g. 怠速标记（800 RPM 处的小三角警示） ===
            const idleAngle = this.rpmToAngle(idleRpm);
            ctx.save();
            ctx.translate(sp.cx, sp.cy);
            ctx.rotate(idleAngle + Math.PI / 2);
            ctx.translate(0, -sp.tachIdleMarkR);
            ctx.fillStyle = 'rgba(100,180,255,0.7)';
            ctx.shadowColor = 'rgba(100,180,255,0.5)';
            ctx.shadowBlur = 3;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-3, -5);
            ctx.lineTo(3, -5);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // === 9h. 红线区警示符号（"!"三角，位于红线区中部外侧） ===
            const warnAngle = this.rpmToAngle((redlineRpm + maxRpm) / 2);
            const warnX = sp.cx + Math.cos(warnAngle) * (sp.tachBezelOuterR + 8);
            const warnY = sp.cy + Math.sin(warnAngle) * (sp.tachBezelOuterR + 8);
            ctx.save();
            ctx.translate(warnX, warnY);
            ctx.rotate(warnAngle + Math.PI / 2);
            ctx.fillStyle = 'rgba(220,50,35,0.9)';
            ctx.shadowColor = 'rgba(255,60,40,0.7)';
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.moveTo(0, -5);
            ctx.lineTo(-4.5, 3);
            ctx.lineTo(4.5, 3);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.font = '700 7px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('!', 0, 0);
            ctx.restore();
        },

        // 绘制转速表动态层（老式LED灯珠阵列）
        // 每个灯珠独立绘制：未点亮=暗色底，点亮=明亮发光
        drawTachometerDynamic(ctx, rpm) {
            // 绘制LED灯珠（RPM为0时也绘制暗色灯珠底）
            this.drawLedSegments(ctx, Math.max(0, rpm));
        },

        // 根据RPM获取颜色：低暖绿、中暖黄、高暖橙、红线红
        getRpmColor(rpm) {
            const redlineRpm = CONSTANTS.REDLINE_RPM;
            let r, g, b;
            if (rpm < redlineRpm * 0.5) {
                const t = rpm / (redlineRpm * 0.5);
                r = Math.floor(60 + t * 140);
                g = Math.floor(180 - t * 20);
                b = Math.floor(50 - t * 10);
            } else if (rpm < redlineRpm * 0.8) {
                const t = (rpm - redlineRpm * 0.5) / (redlineRpm * 0.3);
                r = 200 + Math.floor(t * 55);
                g = Math.floor(160 - t * 60);
                b = Math.floor(40 - t * 20);
            } else if (rpm < redlineRpm) {
                const t = (rpm - redlineRpm * 0.8) / (redlineRpm * 0.2);
                r = 255;
                g = Math.floor(100 - t * 50);
                b = Math.floor(20 + t * 10);
            } else {
                r = 255; g = 50; b = 35;
            }
            return { r, g, b };
        },

        // 绘制转速LED灯珠阵列（灯珠样式与速度点阵一致）
        drawLedSegments(ctx, rpm) {
            const sp = this.SP;
            const maxRpm = CONSTANTS.MAX_RPM;
            const startAngle = this.rpmToAngle(0);
            const endAngle = this.rpmToAngle(maxRpm);
            const arcR = (sp.tachOuterR + sp.tachInnerR) / 2;
            const fillW = sp.tachFillWidth;
            const totalAngle = endAngle - startAngle;

            // 灯珠参数
            const totalLeds = 48;
            const dotR = fillW * 0.38;
            const segAngle = totalAngle / totalLeds;
            const litCount = (rpm / maxRpm) * totalLeds;
            const litFull = Math.floor(litCount);
            const litPartial = litCount - litFull;

            for (let i = 0; i < totalLeds; i++) {
                const angle = startAngle + (i + 0.5) * segAngle;
                const x = sp.cx + Math.cos(angle) * arcR;
                const y = sp.cy + Math.sin(angle) * arcR;
                const col = { r: 255, g: 140, b: 50 }; // 与速度点阵统一的琥珀色
                const isLit = i < litFull;
                const isPartial = i === litFull;

                if (isLit) {
                    // === 点亮灯珠（与drawDotMatrixChar一致的4层渲染） ===
                    // 层1：外发光晕
                    ctx.save();
                    ctx.shadowColor = `rgba(${col.r},${col.g},${col.b},0.6)`;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(x, y, dotR * 1.05, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},0.2)`;
                    ctx.fill();
                    ctx.restore();

                    // 层2：灯珠主体（径向渐变）
                    ctx.beginPath();
                    ctx.arc(x, y, dotR, 0, Math.PI * 2);
                    const ledGrad = ctx.createRadialGradient(x - dotR * 0.2, y - dotR * 0.2, 0, x, y, dotR);
                    ledGrad.addColorStop(0, `rgba(${Math.min(255, col.r + 80)},${Math.min(255, col.g + 80)},${Math.min(255, col.b + 60)},0.95)`);
                    ledGrad.addColorStop(0.5, `rgba(${col.r},${col.g},${col.b},0.9)`);
                    ledGrad.addColorStop(1, `rgba(${Math.floor(col.r * 0.7)},${Math.floor(col.g * 0.6)},${Math.floor(col.b * 0.5)},0.85)`);
                    ctx.fillStyle = ledGrad;
                    ctx.fill();

                    // 层3：内核高亮
                    ctx.beginPath();
                    ctx.arc(x, y, dotR * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${Math.min(255, col.r + 120)},${Math.min(255, col.g + 120)},${Math.min(255, col.b + 100)},0.7)`;
                    ctx.fill();

                    // 层4：玻璃罩高光
                    ctx.beginPath();
                    ctx.arc(x - dotR * 0.25, y - dotR * 0.25, dotR * 0.25, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,240,0.2)`;
                    ctx.fill();

                } else if (isPartial) {
                    // === 部分点亮 ===
                    const p = litPartial;
                    ctx.save();
                    ctx.shadowColor = `rgba(${col.r},${col.g},${col.b},${0.5 * p})`;
                    ctx.shadowBlur = 5 * p;
                    ctx.beginPath();
                    ctx.arc(x, y, dotR * (0.8 + 0.2 * p), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},${0.3 + 0.6 * p})`;
                    ctx.fill();
                    if (p > 0.4) {
                        ctx.shadowBlur = 0;
                        ctx.beginPath();
                        ctx.arc(x, y, dotR * 0.4, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${Math.min(255, col.r + 100)},${Math.min(255, col.g + 100)},${col.b},${0.6 * p})`;
                        ctx.fill();
                    }
                    ctx.restore();

                } else {
                    // === 未点亮（与drawDotMatrixChar一致的暗灯珠） ===
                    ctx.beginPath();
                    ctx.arc(x, y, dotR * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${Math.floor(col.r * 0.08)},${Math.floor(col.g * 0.08)},${Math.floor(col.b * 0.08)},0.5)`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x, y, dotR * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${Math.floor(col.r * 0.04)},${Math.floor(col.g * 0.04)},${Math.floor(col.b * 0.04)},0.4)`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x, y, dotR * 0.8, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(${Math.floor(col.r * 0.12)},${Math.floor(col.g * 0.12)},${Math.floor(col.b * 0.12)},0.25)`;
                    ctx.lineWidth = 0.4;
                    ctx.stroke();
                }
            }
        },

        // 绘制指针（经典豪华车风格：细长锥形 + 红色尖端 + 金属杆身）
        drawNeedle(ctx, speed, maxSpeed) {
            const sp = this.SP;
            const angle = this.speedToAngle(speed, maxSpeed);

            ctx.save();
            ctx.translate(sp.cx, sp.cy);
            ctx.rotate(angle + Math.PI / 2);

            const len = sp.needleLen;
            const tailLen = 35; // 配重尾端长度
            const tipW = 3;     // 顶端宽度
            const midW = 10;    // 中段最宽处
            const baseW = 14;   // 底部（转轴处）宽度

            // === 投影 ===
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 4;

            // 指针轮廓：从配重尾端 → 底部 → 锥形收窄 → 尖端
            ctx.beginPath();
            // 配重尾端（左）
            ctx.moveTo(-baseW / 2, tailLen);
            // 底部左侧弧线到中段
            ctx.quadraticCurveTo(-midW / 2 - 1, tailLen * 0.3, -midW / 2, -len * 0.15);
            // 中段到顶端（左边缘，平滑收窄）
            ctx.quadraticCurveTo(-tipW, -len * 0.6, -tipW / 2, -len);
            // 顶端
            ctx.lineTo(tipW / 2, -len);
            // 右边缘（顶端到底部）
            ctx.quadraticCurveTo(tipW, -len * 0.6, midW / 2, -len * 0.15);
            // 底部右侧弧线到配重尾端
            ctx.quadraticCurveTo(midW / 2 + 1, tailLen * 0.3, baseW / 2, tailLen);
            ctx.closePath();

            // 金属杆身渐变（深灰到亮银，模拟抛光金属）
            const bodyGrad = ctx.createLinearGradient(-midW / 2, 0, midW / 2, 0);
            bodyGrad.addColorStop(0, '#2a2a30');
            bodyGrad.addColorStop(0.2, '#4a4a52');
            bodyGrad.addColorStop(0.4, '#8a8a92');
            bodyGrad.addColorStop(0.5, '#a0a0a8');
            bodyGrad.addColorStop(0.6, '#8a8a92');
            bodyGrad.addColorStop(0.8, '#4a4a52');
            bodyGrad.addColorStop(1, '#2a2a30');
            ctx.fillStyle = bodyGrad;
            ctx.fill();
            ctx.restore();

            // === 红色尖端（覆盖指针前1/3，经典跑车风格） ===
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(-midW / 2, -len * 0.15);
            ctx.quadraticCurveTo(-tipW, -len * 0.6, -tipW / 2, -len);
            ctx.lineTo(tipW / 2, -len);
            ctx.quadraticCurveTo(tipW, -len * 0.6, midW / 2, -len * 0.15);
            ctx.closePath();
            const redGrad = ctx.createLinearGradient(-midW / 2, -len * 0.15, midW / 2, -len * 0.15);
            redGrad.addColorStop(0, '#8a1010');
            redGrad.addColorStop(0.2, '#c41818');
            redGrad.addColorStop(0.4, '#e02020');
            redGrad.addColorStop(0.5, '#e82828');
            redGrad.addColorStop(0.6, '#e02020');
            redGrad.addColorStop(0.8, '#c41818');
            redGrad.addColorStop(1, '#8a1010');
            ctx.fillStyle = redGrad;
            ctx.fill();
            ctx.restore();

            // === 中心高光条（金属反光） ===
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(0.5, tailLen - 5);
            ctx.lineTo(1, -len * 0.15);
            ctx.lineTo(0.5, -len + 2);
            ctx.lineTo(-0.5, -len + 2);
            ctx.lineTo(-1, -len * 0.15);
            ctx.lineTo(-0.5, tailLen - 5);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.fill();
            ctx.restore();

            // === 配重尾端（加宽的圆形配重） ===
            ctx.save();
            ctx.beginPath();
            ctx.ellipse(0, tailLen - 2, baseW / 2 + 1, 6, 0, 0, Math.PI * 2);
            const counterGrad = ctx.createRadialGradient(-1, tailLen - 3, 0, 0, tailLen - 2, baseW / 2 + 1);
            counterGrad.addColorStop(0, '#6a6a72');
            counterGrad.addColorStop(0.5, '#4a4a52');
            counterGrad.addColorStop(1, '#2a2a30');
            ctx.fillStyle = counterGrad;
            ctx.fill();
            // 配重高光
            ctx.beginPath();
            ctx.ellipse(-1, tailLen - 4, 2, 1.5, -0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fill();
            ctx.restore();

            ctx.restore();
        },

        // 绘制中心帽（抛光金属轮毂盖风格）
        drawCenterCap(ctx) {
            const sp = this.SP;
            const capR = 18;

            ctx.save();

            // 1. 最外层阴影圈
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, capR + 2, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a0e';
            ctx.fill();

            // 2. 外环（深色金属环，模拟轮毂盖边缘）
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, capR, 0, Math.PI * 2);
            const outerRing = ctx.createLinearGradient(sp.cx - capR, sp.cy - capR, sp.cx + capR, sp.cy + capR);
            outerRing.addColorStop(0, '#505058');
            outerRing.addColorStop(0.3, '#3a3a42');
            outerRing.addColorStop(0.5, '#2a2a32');
            outerRing.addColorStop(0.7, '#3a3a42');
            outerRing.addColorStop(1, '#505058');
            ctx.fillStyle = outerRing;
            ctx.fill();

            // 3. 主凸面（抛光金属，上亮下暗）
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, capR - 2, 0, Math.PI * 2);
            const mainFace = ctx.createRadialGradient(sp.cx - 3, sp.cy - 4, 2, sp.cx, sp.cy + 2, capR - 2);
            mainFace.addColorStop(0, '#e8e8f0');
            mainFace.addColorStop(0.2, '#d0d0d8');
            mainFace.addColorStop(0.5, '#b0b0b8');
            mainFace.addColorStop(0.75, '#808088');
            mainFace.addColorStop(1, '#505058');
            ctx.fillStyle = mainFace;
            ctx.fill();

            // 4. 同心圆装饰纹（模拟抛光金属纹理）
            for (let r = capR * 0.3; r < capR - 3; r += 3) {
                ctx.beginPath();
                ctx.arc(sp.cx, sp.cy, r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,255,255,${0.04 + (capR - r) / capR * 0.06})`;
                ctx.lineWidth = 0.4;
                ctx.stroke();
            }

            // 5. 顶部弧形高光（凸面受光）
            ctx.beginPath();
            ctx.arc(sp.cx - 1, sp.cy - 2, capR * 0.6, -Math.PI * 0.9, -Math.PI * 0.1);
            ctx.strokeStyle = 'rgba(255,255,255,0.35)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 6. 内圈凹陷（中心螺丝/标识区域）
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, capR * 0.35, 0, Math.PI * 2);
            const innerGrad = ctx.createRadialGradient(sp.cx, sp.cy - 1, 0, sp.cx, sp.cy, capR * 0.35);
            innerGrad.addColorStop(0, '#1a1a20');
            innerGrad.addColorStop(0.7, '#141418');
            innerGrad.addColorStop(1, '#2a2a32');
            ctx.fillStyle = innerGrad;
            ctx.fill();

            // 7. 内圈边缘高光
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, capR * 0.35, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(200,200,210,0.2)';
            ctx.lineWidth = 0.6;
            ctx.stroke();

            // 8. 中心小点
            ctx.beginPath();
            ctx.arc(sp.cx, sp.cy, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a0e';
            ctx.fill();

            ctx.restore();
        },
