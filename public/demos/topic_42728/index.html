<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEDAL</title>
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'light-bg': 'rgba(255,255,255,0.06)',
                        'light-card': 'rgba(255,255,255,0.04)',
                        'dark-text': '#e0ddd8',
                        'medium-text': '#8a8a90',
                        'light-text': '#b0b0b8',
                        'accent-red': '#ff3b30',
                        'accent-gold': '#d4a853',
                        'warm-bg': 'rgba(255,255,255,0.05)',
                        'warm-card': 'rgba(255,255,255,0.03)',
                        'warm-border': 'rgba(255,255,255,0.08)',
                        'warm-muted': '#6a6a70',
                    },
                    fontFamily: {
                        'display': ['Fraunces', 'Georgia', 'serif'],
                        'body': ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0e0e12;
            color: #e0ddd8;
            overflow-x: hidden;
            letter-spacing: 0.01em;
        }

        .card {
            background-color: rgba(255,255,255,0.04);
            border-radius: 2rem;
            box-shadow: 0 2px 4px 0 rgba(0,0,0,0.00), 0 1px 2px -1px rgba(0,0,0,0.00), 0 4px 6px -1px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .speedometer {
            position: relative;
            width: min(420px, 80vw);
            height: min(420px, 80vw);
            border-radius: 50%;
            overflow: hidden;
        }

        @media (max-width: 640px) {
            .speedometer {
                width: min(320px, 75vw);
                height: min(320px, 75vw);
            }
        }

        #speedometerCanvas {
            display: block;
        }

        .control-btn {
            transition: all 0.15s ease;
            border-radius: 1rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            background: none;
            border: none;
            box-shadow: none;
            padding: 8px;
        }

        .control-btn:active:not(:disabled),
        .control-btn.is-pressed {
            transform: translateY(4px);
            box-shadow: none;
        }

        .acceleration-btn {
            background: none;
            color: #8a8a90;
        }

        .acceleration-btn:active:not(:disabled),
        .acceleration-btn.is-pressed {
            color: #e0ddd8;
        }

        .brake-btn {
            background: none;
            color: #8a8a90;
        }

        .brake-btn:active:not(:disabled),
        .brake-btn.is-pressed {
            color: #ff3b30;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .info-card {
            transition: all 0.2s ease;
            border-radius: 1.5rem;
            background-color: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238a8a90' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1rem;
        }

        select option {
            background-color: #1a1a1e;
            color: #e0ddd8;
        }

        /* 桌面端：三列布局 */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media (min-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr 1.4fr 1fr;
                gap: 1.5rem;
            }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            .main-layout {
                grid-template-columns: 1fr 1.4fr;
                gap: 1.25rem;
            }
            .main-layout .left-panel {
                grid-column: 1;
                grid-row: 1;
            }
            .main-layout .center-panel {
                grid-column: 2;
                grid-row: 1 / 3;
            }
            .main-layout .right-panel {
                grid-column: 1;
                grid-row: 2;
            }
        }

        /* 手机端：车型选择折叠 */
        @media (max-width: 767px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            .left-panel .card {
                padding: 1rem;
            }
            .left-panel .car-info-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
            }
            .center-panel .card {
                padding: 1rem;
            }
        }

        /* 手机端底部固定控制按钮 */
        @media (max-width: 767px) {
            .mobile-controls {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(14,14,18,0.9);
                padding: 12px 16px;
                padding-bottom: max(12px, env(safe-area-inset-bottom));
                z-index: 100;
                display: flex;
                gap: 12px;
            }
            .mobile-controls button {
                flex: 1;
                min-height: 56px;
            }
            body {
                padding-bottom: 90px;
            }
        }

        @media (min-width: 768px) {
            .mobile-controls {
                display: none;
            }
        }

        /* 桌面端隐藏移动端按钮区 */
        .desktop-controls {
            display: flex;
        }
        @media (max-width: 767px) {
            .desktop-controls {
                display: none;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .key-hint {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            margin-left: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="min-h-screen p-3 sm:p-4 md:p-6 lg:p-8 pb-32 md:pb-8">

                                <line x1="18" y1="30" x2="42" y2="30" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
                                <line x1="18" y1="40" x2="42" y2="40" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
                                <line x1="18" y1="50" x2="42" y2="50" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
                                <line x1="18" y1="60" x2="42" y2="60" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>

                        </button>
                        <button id="accelerateBtn" class="acceleration-btn control-btn flex items-center justify-center" disabled aria-label="油门加速">
                            <svg viewBox="0 0 50 80" class="h-20 md:h-24" fill="currentColor" stroke="none">
                                <!-- 油门踏板：窄长，略微倾斜的楔形 -->
                                <path d="M 14 6 Q 14 2 18 2 L 36 2 Q 40 2 40 6 L 42 68 Q 42 76 36 78 L 18 78 Q 12 76 10 68 Z"/>
                                <!-- 踏板表面纹理线 -->
                                <line x1="18" y1="16" x2="34" y2="16" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
                                <line x1="18" y1="26" x2="34" y2="26" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
                                <line x1="18" y1="36" x2="34" y2="36" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
                                <line x1="18" y1="46" x2="34" y2="46" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
                                <line x1="18" y1="56" x2="34" y2="56" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
                                <line x1="18" y1="66" x2="34" y2="66" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
                            </svg>
                        </button>
                    </div>

                </div>
            </div>

            <!-- Right Panel (placeholder for future content) -->
            <div class="right-panel">
            </div>

        </div>

    </div>

    <!-- Mobile Fixed Controls -->
    <div class="mobile-controls md:hidden fixed bottom-0 left-0 right-0 p-3 z-50" style="background: rgba(14,14,18,0.95); padding-bottom: max(12px, env(safe-area-inset-bottom));">
        <div class="flex gap-8 max-w-7xl mx-auto justify-center items-end">
            <button id="brakeBtnMobile" class="brake-btn control-btn flex items-center justify-center" disabled aria-label="刹车减速">
                <svg viewBox="0 0 60 80" class="h-16" fill="currentColor" stroke="none">
                    <path d="M 10 8 Q 10 4 14 4 L 46 4 Q 50 4 50 8 L 52 70 Q 52 76 46 76 L 14 76 Q 8 76 8 70 Z"/>
                    <line x1="18" y1="20" x2="42" y2="20" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
                    <line x1="18" y1="30" x2="42" y2="30" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
                    <line x1="18" y1="40" x2="42" y2="40" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
                    <line x1="18" y1="50" x2="42" y2="50" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
                    <line x1="18" y1="60" x2="42" y2="60" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>

            </button>
            <button id="accelerateBtnMobile" class="acceleration-btn control-btn flex items-center justify-center" disabled aria-label="油门加速">
                <svg viewBox="0 0 50 80" class="h-16" fill="currentColor" stroke="none">
                    <path d="M 14 6 Q 14 2 18 2 L 36 2 Q 40 2 40 6 L 42 68 Q 42 76 36 78 L 18 78 Q 12 76 10 68 Z"/>
                    <line x1="18" y1="16" x2="34" y2="16" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
                    <line x1="18" y1="26" x2="34" y2="26" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
                    <line x1="18" y1="36" x2="34" y2="36" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
                    <line x1="18" y1="46" x2="34" y2="46" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
                    <line x1="18" y1="56" x2="34" y2="56" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
                    <line x1="18" y1="66" x2="34" y2="66" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>

        </div>
    </div>

    <script>
    // ============================================================
    // 常量定义
    // ============================================================
    const CONSTANTS = {
        SPEEDOMETER_START_ANGLE: -135,    // 速度表起始角度
        SPEEDOMETER_END_ANGLE: 135,       // 速度表结束角度
        SPEEDOMETER_ANGLE_RANGE: 270,     // 速度表角度范围
        IDLE_RPM: 800,                    // 怠速 RPM
        IDLE_RETURN_RATE: 2000,           // 停车后RPM回落到怠速的速率（rpm/s，缓慢回落）
        LOW_SPEED_RPM_BLEND: 10,          // 低速RPM混合阈值（km/h，低于此速度目标RPM向怠速平滑过渡）
        MAX_RPM: 8000,                    // 转速表量程上限
        REDLINE_RPM: 7000,                // 红线 RPM（红线区起始）
        GEAR_MIN_RPM: 2500,               // 换挡后最低 RPM（显示用）
        NATURAL_DECEL: 3.6,              // 自然减速 km/h/s（约1 m/s²）
        AIR_RESISTANCE_COEFF: 0.0005,    // 空气阻力系数
        ROLLING_RESISTANCE: 0.3,         // 滚动阻力 km/h/s
        MAX_SPEED_DATA_POINTS: 600,      // 速度数据最大采样点（约10秒@60fps）
        CHART_MAX_TIME: 10,              // 图表最大时间轴（秒）
        // 换挡策略：基于真实齿比序列计算换挡点
        // 每个档位在红线RPM下能达到的最高速度 = maxSpeed * (最高档齿比 / 该档齿比)
        // 换挡点 = 该档位最高速度 * SHIFT_RPM_RATIO（全油门在95%红线时换挡）
        SHIFT_RPM_RATIO: 0.95,           // 全油门换挡RPM比例（95%红线，约6650 RPM）
        SHIFT_1TO2_BONUS: 0.03,          // 1→2档换挡点额外提升（1档齿比大、易打滑，需更高转速）
        DOWNSHIFT_RPM_RATIO: 0.30,       // 降档转速比例（转速降至30%红线区间时降档，约2100 RPM）
        // 真实变速箱齿比序列（参考ZF 8HP、Aisin 6AT、Getrag 7DCT等）
        GEAR_RATIOS: {
            5: [3.50, 2.10, 1.40, 1.00, 0.80],           // 5MT
            6: [3.60, 2.10, 1.40, 1.00, 0.80, 0.70],     // 6AT/6MT
            7: [4.30, 2.90, 2.10, 1.60, 1.20, 1.00, 0.80], // 7DCT
            8: [4.71, 3.14, 2.10, 1.67, 1.29, 1.00, 0.84, 0.67], // ZF 8HP
            9: [4.71, 3.14, 2.10, 1.67, 1.29, 1.00, 0.84, 0.67, 0.58], // ZF 9HP
        },
        // 档位滞回（Hysteresis）：降档点比升档点低，避免频繁换挡
        SHIFT_HYSTERESIS_RATIO: 0.06,    // 降档滞回比例（相对 maxSpeed）
        BRAKE_DOWNSHIFT_BONUS: 0.08,     // 刹车时额外降档偏移（相对 maxSpeed，更积极降档）
        // 换挡过渡时长（秒）
        SHIFT_UP_DURATION: 0.30,         // 升挡过渡（RPM骤降）
        SHIFT_DOWN_DURATION: 0.45,       // 降挡过渡（RPM先降后升，更长）
        // 换挡期间扭矩中断（模拟离合器分离）
        // AT变速箱液力变矩器有缓冲，扭矩中断较轻；DCT稍明显但仍有限
        SHIFT_TORQUE_CUT: 0.60,          // 换挡期间驱动力保留比例（60%，轻微顿挫）
        // 发动机制动：刹车时RPM下降速率随档位变化（低档更强）
        ENGINE_BRAKE_BASE: 3500,         // 基础发动机制动RPM下降速率
        ENGINE_BRAKE_GEAR_FACTOR: 600,   // 每低一档额外的制动强度
        // 制动系统参数（真实车辆刹车特性）
        BRAKE_DECEL_MAX: 42,             // 最大刹车减速度上限 km/h/s（约11.7 m/s²，轮胎抓地力极限）
        BRAKE_DECEL_LOW_SPEED_FACTOR: 0.7, // 低速时刹车效率因子（ABS接近停车时降低）
        BRAKE_LOW_SPEED_THRESHOLD: 20,   // 低速刹车效率下降阈值 km/h
        // 发动机制动减速度（km/h/s，燃油车松油门/刹车时叠加）
        ENGINE_BRAKE_DECEL_BASE: 3.0,    // 基础发动机制动减速度
        ENGINE_BRAKE_DECEL_GEAR_FACTOR: 1.5, // 每低一档额外的发动机制动减速度
        // 电动车动能回收减速度（km/h/s）
        REGEN_DECEL_BASE: 5.0,           // 基础动能回收减速度
        REGEN_DECEL_HIGH_SPEED_FACTOR: 1.5, // 高速时动能回收增强因子
    };

    // ============================================================
    // 数据层 - 车型数据
    // ============================================================
const carData = {
    "BMW": [
        { model: "325Li", year: 2023, acceleration: 7.9, maxSpeed: 233, engine: "2.0L 涡轮增压直四", power: "184马力", brakePerformance: 37, isEV: false, shiftCount: 8, shiftIntensity: 0.10, torqueCurve: "peaky", tractionBuildup: 0.6 },
