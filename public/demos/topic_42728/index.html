        // 绘制 LED 点阵字符
        drawDotMatrixChar(ctx, char, x, y, dotSpacing, dotRadius, brightness, color) {
            const font = this.DOT_MATRIX_FONT[char];
            if (!font) return;
            const r = color.r, g = color.g, b = color.b;
            for (let row = 0; row < 7; row++) {
                for (let col = 0; col < 5; col++) {
                    const cx = x + col * dotSpacing;
                    const cy = y + row * dotSpacing;
                    const isOn = font[row][col] === 1;
                    if (isOn) {
                        // 外发光晕
                        ctx.save();
                        ctx.shadowColor = `rgba(${r},${g},${b},${0.6 * brightness})`;
                        ctx.shadowBlur = 6;
                        ctx.beginPath();
                        ctx.arc(cx, cy, dotRadius * 1.05, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${r},${g},${b},${0.2 * brightness})`;
                        ctx.fill();
                        ctx.restore();
                        // 灯珠主体（径向渐变）
                        ctx.beginPath();
                        ctx.arc(cx, cy, dotRadius, 0, Math.PI * 2);
                        const ledGrad = ctx.createRadialGradient(cx - dotRadius * 0.2, cy - dotRadius * 0.2, 0, cx, cy, dotRadius);
                        ledGrad.addColorStop(0, `rgba(${Math.min(255, r + 80)},${Math.min(255, g + 80)},${Math.min(255, b + 60)},${0.95 * brightness})`);
                        ledGrad.addColorStop(0.5, `rgba(${r},${g},${b},${0.9 * brightness})`);
                        ledGrad.addColorStop(1, `rgba(${Math.floor(r * 0.7)},${Math.floor(g * 0.6)},${Math.floor(b * 0.5)},${0.85 * brightness})`);
                        ctx.fillStyle = ledGrad;
                        ctx.fill();
                        // 内核高亮
                        ctx.beginPath();
                        ctx.arc(cx, cy, dotRadius * 0.4, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${Math.min(255, r + 120)},${Math.min(255, g + 120)},${Math.min(255, b + 100)},${0.7 * brightness})`;
                        ctx.fill();
                        // 玻璃罩高光
                        ctx.beginPath();
                        ctx.arc(cx - dotRadius * 0.25, cy - dotRadius * 0.25, dotRadius * 0.25, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,255,240,${0.2 * brightness})`;
                        ctx.fill();
                    } else {
                        // 暗色凹槽
                        ctx.beginPath();
                        ctx.arc(cx, cy, dotRadius * 0.8, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${Math.floor(r * 0.08)},${Math.floor(g * 0.08)},${Math.floor(b * 0.08)},0.5)`;
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(cx, cy, dotRadius * 0.4, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${Math.floor(r * 0.04)},${Math.floor(g * 0.04)},${Math.floor(b * 0.04)},0.4)`;
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(cx, cy, dotRadius * 0.8, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(${Math.floor(r * 0.12)},${Math.floor(g * 0.12)},${Math.floor(b * 0.12)},0.25)`;
                        ctx.lineWidth = 0.4;
                        ctx.stroke();
                    }
                }
            }
        },

        // 绘制7段LED数字车速显示（真实汽车仪表盘质感）
        drawDigitalSpeed(ctx, speed) {
            const sp = this.SP;
            const digitW = 30;     // 单数字宽度
            const digitH = 48;     // 单数字高度
            const gap = 5;         // 数字间距
            const totalW = digitW * 3 + gap * 2;
            const startX = sp.cx - totalW / 2;
            const startY = sp.cy + 95; // 中心帽下方

            // 速度转字符串（右对齐，补零到3位）
            const speedInt = Math.max(0, Math.min(999, Math.round(speed)));
            const speedStr = speedInt.toString().padStart(3, '0');

            // 背景凹槽尺寸
            const padX = 14, padY = 10;
            const bgW = totalW + padX * 2;
            const bgH = digitH + padY * 2;
            const bgX = startX - padX;
            const bgY = startY - padY;

            // 统一圆角参数（与档位框协调，小圆角保持质感）
            const bezelR = 8;   // 外金属边圆角
            const innerR = 6;   // 内面板圆角

            // === 1. 外框金属边（玫瑰金金属质感） ===
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 3;
            UI.roundRect(ctx, bgX - 2, bgY - 2, bgW + 4, bgH + 4, bezelR);
            const bezelGrad = ctx.createLinearGradient(bgX, bgY, bgX, bgY + bgH);
            bezelGrad.addColorStop(0, '#b0b0b8');
            bezelGrad.addColorStop(0.15, '#c0c0c8');
            bezelGrad.addColorStop(0.3, '#9898a0');
            bezelGrad.addColorStop(0.7, '#707078');
            bezelGrad.addColorStop(0.85, '#808088');
            bezelGrad.addColorStop(1, '#505058');
            ctx.fillStyle = bezelGrad;
            ctx.fill();
            ctx.restore();

            // 确保阴影状态完全清除
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            // === 2. 金属边框内缘高光 ===
            UI.roundRect(ctx, bgX - 1, bgY - 1, bgW + 2, bgH + 2, bezelR - 1);
            ctx.strokeStyle = 'rgba(200,200,210,0.3)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // === 3. 深色显示面板（内凹，暖色调） ===
            UI.roundRect(ctx, bgX, bgY, bgW, bgH, innerR);
            const panelGrad = ctx.createRadialGradient(
                sp.cx, bgY + bgH * 0.3, bgW * 0.2,
                sp.cx, bgY + bgH * 0.5, bgW * 0.8
            );
            panelGrad.addColorStop(0, '#141418');
            panelGrad.addColorStop(0.5, '#101014');
            panelGrad.addColorStop(1, '#080810');
            ctx.fillStyle = panelGrad;
            ctx.fill();

            // === 4. 内凹阴影（上边缘暗、下边缘亮，模拟凹陷，暖色调） ===
            ctx.save();
            ctx.beginPath();
            UI.roundRect(ctx, bgX, bgY, bgW, bgH, innerR);
            ctx.clip();
            // 上边缘暗影
            const topShadow = ctx.createLinearGradient(bgX, bgY, bgX, bgY + 8);
            topShadow.addColorStop(0, 'rgba(0,0,0,0.5)');
            topShadow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = topShadow;
            ctx.fillRect(bgX, bgY, bgW, 8);
            // 下边缘微亮
            const bottomLight = ctx.createLinearGradient(bgX, bgY + bgH - 6, bgX, bgY + bgH);
            bottomLight.addColorStop(0, 'rgba(200,200,210,0)');
            bottomLight.addColorStop(1, 'rgba(200,200,210,0.04)');
            ctx.fillStyle = bottomLight;
            ctx.fillRect(bgX, bgY + bgH - 6, bgW, 6);
            ctx.restore();

            // === 5. 绘制3个LED点阵数字 ===
            const brightness = 1;
            const dotSpacing = 6.5;
            const dotRadius = 2.2;
            const charW = 4 * dotSpacing; // 5列，间距4段
            const charH = 6 * dotSpacing; // 7行，间距6段
            const charGap = 8;
            const totalCharW = charW * 3 + charGap * 2;
            const charStartX = sp.cx - totalCharW / 2;
            const charStartY = startY + (digitH - charH) / 2;

            const ledColor = { r: 255, g: 140, b: 50 };
            for (let i = 0; i < 3; i++) {
                const cx = charStartX + i * (charW + charGap);
                this.drawDotMatrixChar(ctx, speedStr[i], cx, charStartY, dotSpacing, dotRadius, brightness, ledColor);
            }

            // === 6. LED 整体辉光（暖色琥珀光叠加层） ===
            ctx.save();
            ctx.beginPath();
            UI.roundRect(ctx, bgX + 2, bgY + 2, bgW - 4, bgH - 4, innerR - 1);
            ctx.clip();
            ctx.globalCompositeOperation = 'screen';
            ctx.globalAlpha = 0.1 * brightness;
            const glowGrad = ctx.createRadialGradient(sp.cx, startY + digitH / 2, 5, sp.cx, startY + digitH / 2, bgW * 0.6);
            glowGrad.addColorStop(0, 'rgba(255,160,60,1)');
            glowGrad.addColorStop(1, 'rgba(255,100,30,0)');
            ctx.fillStyle = glowGrad;
            ctx.fillRect(bgX, bgY, bgW, bgH);
            ctx.restore();

            // === 7. 玻璃罩反光（上半部分弧形高光，暖色调） ===
            ctx.save();
            ctx.beginPath();
            UI.roundRect(ctx, bgX, bgY, bgW, bgH, innerR);
            ctx.clip();
            // 主反光
            const glassGrad = ctx.createLinearGradient(bgX, bgY, bgX, bgY + bgH * 0.5);
            glassGrad.addColorStop(0, 'rgba(255,255,255,0.1)');
            glassGrad.addColorStop(0.5, 'rgba(255,255,255,0.03)');
            glassGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = glassGrad;
            ctx.fillRect(bgX, bgY, bgW, bgH * 0.5);
            // 左上角小亮点
            const spotGrad = ctx.createRadialGradient(bgX + bgW * 0.15, bgY + 4, 0, bgX + bgW * 0.15, bgY + 4, bgW * 0.3);
            spotGrad.addColorStop(0, 'rgba(255,255,255,0.08)');
            spotGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = spotGrad;
            ctx.fillRect(bgX, bgY, bgW * 0.5, bgH * 0.4);
            ctx.restore();

            // === 8. km/h 单位标注 ===
            ctx.save();
            ctx.font = '500 9px "Helvetica Neue", Arial, sans-serif';
            ctx.fillStyle = 'rgba(130,130,140,0.5)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('km/h', sp.cx, bgY + bgH + 5);
            ctx.restore();
        },

        // 绘制档位指示器（与车速LED风格统一：7段LED + 金属边框）
        drawGearIndicator(ctx, gearText) {
            const sp = this.SP;
            // 档位框尺寸
            const boxW = 60;
            const boxH = 72;
            const boxX = sp.cx - boxW / 2;
            const boxY = sp.cy + 95 + 48 + 10 + 12 + 8;

            const bezelR = 10;
            const innerR = 8;

            // === 1. 外框金属边（玫瑰金金属质感） ===
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 2;
            UI.roundRect(ctx, boxX - 2, boxY - 2, boxW + 4, boxH + 4, bezelR);
            const bezelGrad = ctx.createLinearGradient(boxX, boxY, boxX, boxY + boxH);
            bezelGrad.addColorStop(0, '#b0b0b8');
            bezelGrad.addColorStop(0.15, '#c0c0c8');
            bezelGrad.addColorStop(0.3, '#9898a0');
            bezelGrad.addColorStop(0.7, '#707078');
            bezelGrad.addColorStop(0.85, '#808088');
            bezelGrad.addColorStop(1, '#505058');
            ctx.fillStyle = bezelGrad;
            ctx.fill();
            ctx.restore();

            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            // === 2. 金属边框内缘高光 ===
            UI.roundRect(ctx, boxX - 1, boxY - 1, boxW + 2, boxH + 2, bezelR - 1);
            ctx.strokeStyle = 'rgba(200,200,210,0.3)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // === 3. 深色显示面板（内凹，暖色调） ===
            UI.roundRect(ctx, boxX, boxY, boxW, boxH, innerR);
            const panelGrad = ctx.createRadialGradient(
                sp.cx, boxY + boxH * 0.3, boxW * 0.2,
                sp.cx, boxY + boxH * 0.5, boxW * 0.8
            );
            panelGrad.addColorStop(0, '#141418');
            panelGrad.addColorStop(0.5, '#101014');
            panelGrad.addColorStop(1, '#080810');
            ctx.fillStyle = panelGrad;
            ctx.fill();

            // === 4. 内凹阴影（暖色调） ===
            ctx.save();
            ctx.beginPath();
            UI.roundRect(ctx, boxX, boxY, boxW, boxH, innerR);
            ctx.clip();
            const topShadow = ctx.createLinearGradient(boxX, boxY, boxX, boxY + 6);
            topShadow.addColorStop(0, 'rgba(0,0,0,0.5)');
            topShadow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = topShadow;
            ctx.fillRect(boxX, boxY, boxW, 6);
            const bottomLight = ctx.createLinearGradient(boxX, boxY + boxH - 5, boxX, boxY + boxH);
            bottomLight.addColorStop(0, 'rgba(200,200,210,0)');
            bottomLight.addColorStop(1, 'rgba(200,200,210,0.04)');
            ctx.fillStyle = bottomLight;
            ctx.fillRect(boxX, boxY + boxH - 5, boxW, 5);
            ctx.restore();

            // === 5. LED 点阵档位显示 ===
            const dotSpacing = 7;
            const dotRadius = 2.8;
            const charW = 4 * dotSpacing;
            const charH = 6 * dotSpacing;
            const charX = sp.cx - charW / 2;
            const charY = boxY + (boxH - charH) / 2;

            const gearColor = { r: 255, g: 140, b: 50 };
            this.drawDotMatrixChar(ctx, gearText, charX, charY, dotSpacing, dotRadius, 1, gearColor);

            // === 6. 玻璃罩反光（暖色调） ===
            ctx.save();
            ctx.beginPath();
            UI.roundRect(ctx, boxX, boxY, boxW, boxH, innerR);
            ctx.clip();
            const glassGrad = ctx.createLinearGradient(boxX, boxY, boxX, boxY + boxH * 0.5);
            glassGrad.addColorStop(0, 'rgba(255,255,255,0.1)');
            glassGrad.addColorStop(0.5, 'rgba(255,255,255,0.03)');
            glassGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = glassGrad;
            ctx.fillRect(boxX, boxY, boxW, boxH * 0.5);
            ctx.restore();

            // === 7. "GEAR" 小标注 ===
            ctx.save();
            ctx.font = '500 7px "Fraunces", Georgia, serif';
            ctx.fillStyle = 'rgba(130,130,140,0.4)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('GEAR', sp.cx, boxY + boxH + 3);
            ctx.restore();
        },

        // 完整渲染仪表盘
        renderSpeedometer() {
            const canvas = this.elements.speedometerCanvas;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const eng = SimulationEngine;
            const maxSpeed = eng.speedometerMax;

            // 绘制静态层（量程变化或车型类型变化时重绘）
            const hasTach = eng.hasTachometer();
            if (!this.speedometerStaticCanvas ||
                this._lastStaticMaxSpeed !== maxSpeed ||
                this._lastHasTach !== hasTach) {
                this.drawSpeedometerStatic(maxSpeed);
                this._lastStaticMaxSpeed = maxSpeed;
                this._lastHasTach = hasTach;
            }

            // 清空并绘制静态层
            ctx.clearRect(0, 0, 800, 800);
            ctx.drawImage(this.speedometerStaticCanvas, 0, 0);

            // 绘制转速表动态层（仅燃油车）
            if (hasTach) {
                this.drawTachometerDynamic(ctx, eng.rpm);
            }

            // 绘制指针
            this.drawNeedle(ctx, eng.speed, maxSpeed);

            // 绘制7段LED数字车速
            this.drawDigitalSpeed(ctx, eng.speed);

            // 绘制档位指示器
            this.drawGearIndicator(ctx, eng.getGearDisplay());

            // 绘制中心帽
            this.drawCenterCap(ctx);
        },

        // 更新速度表显示
        updateSpeedometer() {
            // Canvas 渲染仪表盘
            this.renderSpeedometer();
        },

        // 更新统计信息
        updateStats() {
            // 性能数据面板已移除
        },

        // 更新状态指示器
        setStatus(className, text) {
            // 状态指示器已移除
        },

        // 更新车型信息
        updateCarInfo(brand, car) {
            this.elements.carName.textContent = `${brand} ${car.model}`;
            this.elements.carYear.textContent = car.year;
            this.elements.accelerationTime.textContent = `${car.acceleration}秒`;
            this.elements.maxSpeed.textContent = `${car.maxSpeed} km/h`;

            this.elements.carInfo.classList.remove('hidden');
        },

        // 初始化图表（绘制网格到离屏 Canvas）
        initChart() {
            // 速度曲线图表已移除
        },

        // 更新图表曲线
        updateChart() {
            // 速度曲线图表已移除
        },

        // 重置 UI
        resetUI() {
            this.updateSpeedometer();
            this.setStatus('bg-green-500', '准备就绪');
        }
    };

    // ============================================================
    // 控制器 - 事件绑定与协调
    // ============================================================
    const Controller = {
        // 渲染循环 ID
        renderFrame: null,

        init() {
            UI.cacheElements();
            UI.populateBrandSelect();
            // 初始渲染仪表盘（空状态）
            UI.renderSpeedometer();

            this.bindEvents();
        },

        bindEvents() {
            const el = UI.elements;

            // 品牌选择
            el.brandSelect.addEventListener('change', () => this.handleBrandChange());

            // 车型选择
            el.modelSelect.addEventListener('change', () => this.handleModelChange());

            // 油门按钮
            el.accelerateBtn.addEventListener('mousedown', (e) => { e.preventDefault(); this.startAcceleration(); UI.elements.accelerateBtn.classList.add('is-pressed'); });
            el.accelerateBtn.addEventListener('mouseup', () => { this.stopAcceleration(); UI.elements.accelerateBtn.classList.remove('is-pressed'); });
            el.accelerateBtn.addEventListener('mouseleave', () => { this.stopAcceleration(); UI.elements.accelerateBtn.classList.remove('is-pressed'); });
            el.accelerateBtn.addEventListener('touchstart', (e) => { e.preventDefault(); this.startAcceleration(); UI.elements.accelerateBtn.classList.add('is-pressed'); });
            el.accelerateBtn.addEventListener('touchend', () => { this.stopAcceleration(); UI.elements.accelerateBtn.classList.remove('is-pressed'); });

            // 刹车按钮
            el.brakeBtn.addEventListener('mousedown', (e) => { e.preventDefault(); this.startBraking(); UI.elements.brakeBtn.classList.add('is-pressed'); });
            el.brakeBtn.addEventListener('mouseup', () => { this.stopBraking(); UI.elements.brakeBtn.classList.remove('is-pressed'); });
            el.brakeBtn.addEventListener('mouseleave', () => { this.stopBraking(); UI.elements.brakeBtn.classList.remove('is-pressed'); });
            el.brakeBtn.addEventListener('touchstart', (e) => { e.preventDefault(); this.startBraking(); UI.elements.brakeBtn.classList.add('is-pressed'); });
            el.brakeBtn.addEventListener('touchend', () => { this.stopBraking(); UI.elements.brakeBtn.classList.remove('is-pressed'); });

            // 移动端油门按钮
            el.accelerateBtnMobile.addEventListener('touchstart', (e) => { e.preventDefault(); this.startAcceleration(); UI.elements.accelerateBtnMobile.classList.add('is-pressed'); });
            el.accelerateBtnMobile.addEventListener('touchend', () => { this.stopAcceleration(); UI.elements.accelerateBtnMobile.classList.remove('is-pressed'); });
            el.accelerateBtnMobile.addEventListener('mousedown', (e) => { e.preventDefault(); this.startAcceleration(); UI.elements.accelerateBtnMobile.classList.add('is-pressed'); });
            el.accelerateBtnMobile.addEventListener('mouseup', () => { this.stopAcceleration(); UI.elements.accelerateBtnMobile.classList.remove('is-pressed'); });

            // 移动端刹车按钮
            el.brakeBtnMobile.addEventListener('touchstart', (e) => { e.preventDefault(); this.startBraking(); UI.elements.brakeBtnMobile.classList.add('is-pressed'); });
            el.brakeBtnMobile.addEventListener('touchend', () => { this.stopBraking(); UI.elements.brakeBtnMobile.classList.remove('is-pressed'); });
            el.brakeBtnMobile.addEventListener('mousedown', (e) => { e.preventDefault(); this.startBraking(); UI.elements.brakeBtnMobile.classList.add('is-pressed'); });
            el.brakeBtnMobile.addEventListener('mouseup', () => { this.stopBraking(); UI.elements.brakeBtnMobile.classList.remove('is-pressed'); });

            // 键盘控制
            document.addEventListener('keydown', (e) => this.handleKeyDown(e));
            document.addEventListener('keyup', (e) => this.handleKeyUp(e));
        },

        handleBrandChange() {
            const brand = UI.elements.brandSelect.value;
            const modelSelect = UI.elements.modelSelect;
            modelSelect.innerHTML = '<option value="">选择车型</option>';

            if (brand) {
                modelSelect.disabled = false;
                carData[brand].forEach((car, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = car.model;
                    modelSelect.appendChild(option);
                });
            } else {
                modelSelect.disabled = true;
            }

            UI.elements.carInfo.classList.add('hidden');
            SimulationEngine.selectedCar = null;
            UI.elements.accelerateBtn.disabled = true;
            UI.elements.brakeBtn.disabled = true;
            UI.elements.accelerateBtnMobile.disabled = true;
            UI.elements.brakeBtnMobile.disabled = true;
            UI.setStatus('bg-gray-400', '请选择车型');
        },

        handleModelChange() {
            const brand = UI.elements.brandSelect.value;
            const modelIndex = UI.elements.modelSelect.value;

            if (brand && modelIndex !== '') {
                const car = carData[brand][modelIndex];
                SimulationEngine.selectCar(car);
                UI.updateCarInfo(brand, car);
                // 仪表盘静态层会在renderSpeedometer中自动重绘（量程变化时）
                UI.renderSpeedometer();

                UI.elements.accelerateBtn.disabled = false;
                UI.elements.brakeBtn.disabled = false;
                UI.elements.accelerateBtnMobile.disabled = false;
                UI.elements.brakeBtnMobile.disabled = false;
                UI.setStatus('bg-green-500', '准备就绪');
            } else {
                UI.elements.carInfo.classList.add('hidden');
                SimulationEngine.selectedCar = null;
                UI.elements.accelerateBtn.disabled = true;
                UI.elements.brakeBtn.disabled = true;
                UI.elements.accelerateBtnMobile.disabled = true;
                UI.elements.brakeBtnMobile.disabled = true;
                UI.setStatus('bg-gray-400', '请选择车型');
            }
        },

        startAcceleration() {
            SimulationEngine.startAcceleration();
            UI.setStatus('bg-red-500', '加速中...');
            this.startRenderLoop();
        },

        stopAcceleration() {
            SimulationEngine.stopAcceleration();
            if (SimulationEngine.speed > 0) {
                UI.setStatus('bg-yellow-500', '滑行中...');
            } else {
                UI.setStatus('bg-green-500', '准备就绪');
                this.stopRenderLoop();
            }
        },

        startBraking() {
            SimulationEngine.startBraking();
            UI.setStatus('bg-yellow-500', '刹车中...');
            this.startRenderLoop();
        },

        stopBraking() {
            SimulationEngine.stopBraking();
            if (SimulationEngine.speed > 0) {
                UI.setStatus('bg-yellow-500', '滑行中...');
            } else {
                UI.setStatus('bg-green-500', '准备就绪');
                this.stopRenderLoop();
            }
        },

        resetSimulation() {
            SimulationEngine.reset();
            this.stopRenderLoop();
            UI.resetUI();
        },

        // 键盘控制
        handleKeyDown(e) {
            if (e.repeat) return;
            const key = e.key.toLowerCase();

            if ((key === 'w' || key === 'arrowup') && !SimulationEngine.isAccelerating) {
                if (SimulationEngine.selectedCar) {
                    this.startAcceleration();
                    UI.elements.accelerateBtn?.classList.add('is-pressed');
                    UI.elements.accelerateBtnMobile?.classList.add('is-pressed');
                }
            } else if ((key === 's' || key === 'arrowdown') && !SimulationEngine.isBraking) {
                if (SimulationEngine.selectedCar && SimulationEngine.speed > 0) {
                    this.startBraking();
                    UI.elements.brakeBtn?.classList.add('is-pressed');
                    UI.elements.brakeBtnMobile?.classList.add('is-pressed');
                }
            }
        },

        handleKeyUp(e) {
            const key = e.key.toLowerCase();

            if (key === 'w' || key === 'arrowup') {
                this.stopAcceleration();
                UI.elements.accelerateBtn?.classList.remove('is-pressed');
                UI.elements.accelerateBtnMobile?.classList.remove('is-pressed');
            } else if (key === 's' || key === 'arrowdown') {
                this.stopBraking();
                UI.elements.brakeBtn?.classList.remove('is-pressed');
                UI.elements.brakeBtnMobile?.classList.remove('is-pressed');
            }
        },

        // 按需渲染循环
        startRenderLoop() {
            if (this.renderFrame) return;
            const render = () => {
                UI.updateSpeedometer();
                if (SimulationEngine.speed > 0 || SimulationEngine.isAccelerating || SimulationEngine.isBraking) {
                    this.renderFrame = requestAnimationFrame(render);
                } else {
                    this.renderFrame = null;
                }
            };
            this.renderFrame = requestAnimationFrame(render);
        },

        stopRenderLoop() {
            if (this.renderFrame) {
                cancelAnimationFrame(this.renderFrame);
                this.renderFrame = null;
            }
            // 最终更新一次确保 UI 一致
            UI.updateSpeedometer();
        }
    };

    // ============================================================
    // 启动
    // ============================================================
    Controller.init();
    </script>
    <div style="text-align:center; padding: 12px 0; font-size: 12px; color: #555; font-family: 'Inter', 'Noto Sans SC', sans-serif;">pedal.abetterplace2.live</div>
</body>
