<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的宇宙</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section id="identityScreen" class="identity-screen">
    <canvas id="identityCanvas" class="scene-canvas" aria-hidden="true"></canvas>
    <div class="identity-panel">
      <p class="eyebrow">PRIVATE CONSTELLATION</p>
      <h1>我们的宇宙</h1>
      <p class="identity-copy">请输入你的姓名，进入这片只属于回忆的星空。</p>
      <div class="identity-form">
        <input id="nameInput" type="text" autocomplete="off" maxlength="20" placeholder="你的姓名">
        <button id="enterBtn" type="button" aria-label="进入">进入</button>
      </div>
      <button id="guestEnterBtn" class="guest-enter-btn" type="button">直接进入查看</button>
      <p id="identityTip" class="identity-tip">填写姓名，进入我们的宇宙。</p>
    </div>
  </section>

  <main id="app" class="app is-hidden">
    <canvas id="spaceCanvas" class="scene-canvas" aria-hidden="true"></canvas>
    <div class="nebula nebula-a" aria-hidden="true"></div>
    <div class="nebula nebula-b" aria-hidden="true"></div>
    <div class="planet planet-primary" aria-hidden="true"></div>
    <div class="planet planet-ringed" aria-hidden="true"></div>
    <div class="planet planet-distant" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <strong>我们的宇宙</strong>
          <span id="daysTogether">把这一刻放进星尘里</span>
        </div>
      </div>
      <nav class="actions">
        <span id="modeBadge" class="mode-badge">访客模式</span>
        <button id="importPhotoBtn" class="icon-btn editor-only" type="button" title="导入照片">导入照片</button>
        <button id="manageMusicBtn" class="icon-btn editor-only" type="button" title="管理音乐">音乐</button>
        <button id="exportBtn" class="icon-btn editor-only" type="button" title="导出备份">导出</button>
        <button id="restoreBtn" class="icon-btn editor-only" type="button" title="恢复备份">恢复</button>
      </nav>
    </header>

    <section id="emptyState" class="empty-state">
      <p class="eyebrow">NO MEMORY YET</p>
      <h2>这片宇宙还很安静</h2>
      <p>导入第一张照片，让它成为这里的第一颗光。</p>
      <button id="emptyImportBtn" class="primary-btn editor-only" type="button">导入第一张照片</button>
      <p class="visitor-only">等主人放入新的记忆后，你会在这里看到它们。</p>
    </section>

    <section id="gallery" class="gallery" aria-label="照片宇宙"></section>

    <aside class="player" id="player">
      <button id="prevBtn" type="button">⏮</button><button id="playBtn" class="player-toggle" type="button" aria-label="播放或暂停">
        <span id="playIcon">播放</span>
      </button>
      <div class="player-info">
        <span id="musicName">未导入音乐</span>
        <div class="progress" id="progressTrack">
          <span id="progressFill"></span>
        </div>
      </div>
      <button id="nextBtn" type="button">⏭</button><span id="timeLabel" class="time-label">0:00</span>
    </aside>
  </main>

  <div id="photoModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="photoModal"></div>
    <article class="photo-detail">
      <button class="close-btn" type="button" data-close="photoModal">关闭</button>
      <img id="detailImage" alt="">
      <div class="detail-copy">
        <p id="detailTags" class="tag-line"></p>
        <h2 id="detailTitle"></h2>
        <dl class="meta-list">
          <div><dt>日期</dt><dd id="detailTime"></dd></div>
          <div><dt>具体时间</dt><dd id="detailExactTime"></dd></div>
          <div><dt>地点</dt><dd id="detailLocation"></dd></div>
          <div><dt>天气</dt><dd id="detailWeather"></dd></div>
          <div><dt>心情</dt><dd id="detailMood"></dd></div>
        </dl>
        <p id="detailEvent" class="event-text"></p>
        <div class="detail-actions editor-only">
          <button id="editPhotoBtn" class="secondary-btn" type="button">编辑</button>
          <button id="deletePhotoBtn" class="danger-btn" type="button">删除</button>
        </div>
      </div>
    </article>
  </div>

  <div id="editModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="editModal"></div>
    <form id="editForm" class="edit-panel">
      <div class="panel-head">
        <h2 id="editHeading">编辑照片</h2>
        <button class="close-btn" type="button" data-close="editModal">关闭</button>
      </div>
      <div id="editPreview" class="edit-preview"></div>
      <label>标题<input id="photoTitle" type="text" placeholder="给这张照片一个名字"></label>
      <div class="field-row">
        <label>日期<input id="photoTime" type="date"></label>
        <label>具体时间<input id="photoExactTime" type="time"></label>
      </div>
      <div class="field-row">
        <label>地点<input id="photoLocation" type="text" placeholder="在哪里拍的"></label>
        <label>天气<input id="photoWeather" type="text" placeholder="晴天，阴天，小雨"></label>
      </div>
      <label>心情<input id="photoMood" type="text" placeholder="这一刻的心情"></label>
      <label>标签<input id="photoTags" type="text" placeholder="旅行，生日，日常"></label>
      <label>事件<textarea id="photoEvent" rows="4" placeholder="写下这张照片背后的故事"></textarea></label>
      <div class="panel-actions">
        <button class="secondary-btn" type="button" data-close="editModal">取消</button>
        <button class="primary-btn" type="submit">保存</button>
      </div>
    </form>
  </div>

  <div id="importModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="importModal"></div>
    <section class="import-panel">
      <div class="panel-head">
        <h2>导入照片</h2>
        <button class="close-btn" type="button" data-close="importModal">关闭</button>
      </div>
      <label id="dropZone" class="drop-zone">
        <input id="photoInput" type="file" accept="image/jpeg,image/png,image/webp" multiple>
        <strong>选择或拖入照片</strong>
        <span>支持 JPG、PNG、WEBP。大图会自动压缩。</span>
      </label>
      <div id="importList" class="import-list"></div>
      <div id="importProgress" class="import-progress" style="display:none;">
        <div class="import-progress-bar">
          <span id="importProgressFill" class="import-progress-fill"></span>
        </div>
        <span id="importProgressText" class="import-progress-text">0 / 0</span>
      </div>
      <div class="panel-actions">
        <button id="clearAllPhotosBtn" class="danger-btn editor-only" type="button" style="margin-right: auto;">清空全部照片</button>
        <button class="secondary-btn" type="button" data-close="importModal">取消</button>
        <button id="confirmImportBtn" class="primary-btn" type="button" disabled>开始导入</button>
      </div>
    </section>
  </div>

  <div id="musicModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="musicModal"></div>
    <section class="music-panel">
      <div class="panel-head">
        <h2>音乐管理</h2>
        <button class="close-btn" type="button" data-close="musicModal">关闭</button>
      </div>
      <p id="currentMusic">当前没有音乐</p>
      <label class="file-btn">
        导入本地音乐
        <input id="musicInput" type="file" accept="audio/*" multiple>
      </label>
      <div class="playlist-section">
        <div class="playlist-header">
          <span>播放列表</span>
          <button id="clearAllMusicBtn" class="danger-btn editor-only" type="button">清空歌单</button>
        </div>
        <div id="playlistContainer" class="playlist-container"></div>
      </div>
      <button id="deleteMusicBtn" class="danger-btn" type="button" style="margin-top: 12px;">删除当前歌曲</button>
    </section>
  </div>

  <input id="restoreInput" type="file" accept="application/json,.json" hidden>
  <div id="toast" class="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
