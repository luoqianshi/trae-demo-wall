<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>购物决策助手 - 30秒锁定最优选</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1A2B4C;
      --primary-light: #2A4070;
      --accent: #FF6B35;
      --accent-light: #FF8F66;
      --bg: #F7F8FA;
      --card: #FFFFFF;
      --text: #1A2B4C;
      --text-secondary: #6B7280;
      --text-light: #9CA3AF;
      --border: #E5E7EB;
      --success: #10B981;
      --shadow: 0 4px 24px rgba(26, 43, 76, 0.08);
      --shadow-lg: 0 8px 40px rgba(26, 43, 76, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 页面容器 */
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
    }

    /* 顶部导航 */
    .header {
      background: var(--primary);
      padding: 20px 24px;
      color: white;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .header-logo svg {
      width: 32px;
      height: 32px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
    }

    .header-subtitle {
      font-size: 13px;
      opacity: 0.8;
    }

    /* 页面 */
    .page {
      display: none;
      padding: 24px;
      padding-bottom: 100px;
      animation: fadeIn 0.3s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 首页 */
    .hero-text {
      text-align: center;
      margin-bottom: 32px;
    }

    .hero-text h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .hero-text p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* 输入模式切换 */
    .input-tabs {
      display: flex;
      background: var(--card);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .input-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }

    .input-tab.active {
      background: var(--primary);
      color: white;
    }

    /* 语音输入区 */
    .voice-section {
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .voice-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
    }

    .voice-btn:hover {
      transform: scale(1.05);
    }

    .voice-btn.recording {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4); }
      50% { box-shadow: 0 4px 40px rgba(255, 107, 53, 0.8); }
    }

    .voice-btn svg {
      width: 32px;
      height: 32px;
      color: white;
    }

    .voice-hint {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .voice-wave {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 40px;
      margin-bottom: 16px;
    }

    .voice-wave span {
      width: 4px;
      height: 20px;
      background: var(--accent);
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }

    .voice-wave span:nth-child(2) { animation-delay: 0.1s; }
    .voice-wave span:nth-child(3) { animation-delay: 0.2s; }
    .voice-wave span:nth-child(4) { animation-delay: 0.3s; }
    .voice-wave span:nth-child(5) { animation-delay: 0.4s; }

    @keyframes wave {
      0%, 100% { height: 20px; }
      50% { height: 40px; }
    }

    /* 文字输入 */
    .text-input-section {
      display: none;
    }

    .text-input-section.active {
      display: block;
    }

    .text-input-wrapper {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .text-input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      height: 100px;
      transition: border-color 0.2s;
    }

    .text-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .text-input::placeholder {
      color: var(--text-light);
    }

    /* 标签选择 */
    .tag-section {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .tag-section h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--primary);
    }

    .tags-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      padding: 8px 16px;
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tag.selected {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* 类别选择 */
    .category-section {
      margin-bottom: 24px;
    }

    .category-section h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--primary);
    }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .category-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .category-card:hover {
      border-color: var(--accent);
    }

    .category-card.selected {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(255,107,53,0.05));
    }

    .category-card svg {
      width: 32px;
      height: 32px;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .category-card.selected svg {
      color: var(--accent);
    }

    .category-card span {
      display: block;
      font-size: 14px;
      font-weight: 500;
    }

    /* 开始决策按钮 */
    .start-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(255, 107, 53, 0.5);
    }

    .start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* 结果页 */
    .results-header {
      margin-bottom: 24px;
    }

    .results-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-chip {
      padding: 6px 12px;
      background: var(--primary);
      color: white;
      border-radius: 16px;
      font-size: 12px;
    }

    /* 产品卡片 */
    .product-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .product-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .product-card.top {
      border-color: var(--accent);
    }

    .product-card.top::before {
      content: '最优选';
      display: inline-block;
      padding: 4px 8px;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .product-top {
      display: flex;
      gap: 12px;
    }

    .product-img {
      width: 80px;
      height: 80px;
      background: var(--bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .product-img svg {
      width: 40px;
      height: 40px;
      color: var(--text-light);
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-brand {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .product-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .product-tag {
      padding: 2px 8px;
      background: var(--bg);
      border-radius: 4px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .product-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .product-rating svg {
      width: 14px;
      height: 14px;
      color: #FBBF24;
    }

    .product-score {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: var(--success);
      color: white;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }

    /* 权重调整面板 */
    .weight-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      box-shadow: 0 -4px 40px rgba(26, 43, 76, 0.15);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      max-width: 430px;
      margin: 0 auto;
      z-index: 100;
    }

    .weight-panel.open {
      transform: translateY(0);
    }

    .weight-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .weight-panel-header h3 {
      font-size: 16px;
      font-weight: 600;
    }

    .weight-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .weight-close svg {
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
    }

    .weight-slider {
      margin-bottom: 16px;
    }

    .weight-slider-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .weight-slider-label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .weight-slider-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
    }

    .weight-slider input {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      background: var(--bg);
      border-radius: 4px;
      outline: none;
    }

    .weight-slider input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 107, 53, 0.4);
    }

    /* 对比页 */
    .compare-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--card);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }

    .compare-header h2 {
      font-size: 18px;
      font-weight: 700;
    }

    /* 对比表格 */
    .compare-table {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: 100px 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .compare-row:last-child {
      border-bottom: none;
    }

    .compare-cell {
      padding: 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
    }

    .compare-cell:first-child {
      background: var(--bg);
      font-weight: 600;
      color: var(--text-secondary);
    }

    .compare-cell:not(:first-child) {
      color: var(--text);
    }

    .compare-cell.highlight {
      color: var(--accent);
      font-weight: 600;
    }

    /* 评论区域 */
    .comments-section {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .comments-section h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .comment-item {
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .comment-item:last-child {
      margin-bottom: 0;
    }

    /* 购买按钮 */
    .buy-btn {
      width: 100%;
      padding: 16px;
      background: var(--success);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
    }

    .buy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(16, 185, 129, 0.5);
    }

    .buy-btn svg {
      width: 20px;
      height: 20px;
    }

    /* 底部操作栏 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      box-shadow: 0 -4px 20px rgba(26, 43, 76, 0.1);
      max-width: 430px;
      margin: 0 auto;
      z-index: 50;
    }

    .bottom-bar.hidden {
      display: none;
    }

    .adjust-btn {
      flex: 1;
      padding: 14px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .adjust-btn:hover {
      border-color: var(--primary);
    }

    .adjust-btn svg {
      width: 18px;
      height: 18px;
    }

    .compare-btn {
      flex: 1;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .compare-btn:hover {
      background: var(--primary-light);
    }

    .compare-btn svg {
      width: 18px;
      height: 18px;
    }

    /* 遮罩 */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      max-width: 430px;
      margin: 0 auto;
      z-index: 99;
    }

    .overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(26, 43, 76, 0.95);
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      color: var(--text-light);
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        <span class="header-title">购物决策助手</span>
      </div>
      <p class="header-subtitle">30秒内锁定最优选择</p>
    </header>

    <!-- 首页 -->
    <div id="page-home" class="page active">
      <div class="hero-text">
        <h2>说出你的需求</h2>
        <p>语音、文字或标签，告诉我们你想买什么</p>
      </div>

      <!-- 输入模式切换 -->
      <div class="input-tabs">
        <button class="input-tab active" data-mode="voice">🎤 语音</button>
        <button class="input-tab" data-mode="text">⌨️ 文字</button>
      </div>

      <!-- 语音输入 -->
      <div id="voice-section" class="voice-section">
        <div id="voice-wave" class="voice-wave" style="display: none;">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <button id="voice-btn" class="voice-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <p id="voice-hint" class="voice-hint">长按说话，松开结束</p>
      </div>

      <!-- 文字输入 -->
      <div id="text-input-section" class="text-input-section">
        <div class="text-input-wrapper">
          <textarea id="text-input" class="text-input" placeholder="例如：想要一款续航好的无线耳机，预算500元左右"></textarea>
        </div>
      </div>

      <!-- 标签选择 -->
      <div class="tag-section">
        <h3>快速标签（可选）</h3>
        <div class="tags-grid">
          <span class="tag" data-tag="续航长">续航长</span>
          <span class="tag" data-tag="音质好">音质好</span>
          <span class="tag" data-tag="便宜">便宜</span>

      pages.forEach(p => p.classList.remove('active'));

      tab.addEventListener('click', () => {
        inputTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        state.inputMode = tab.dataset.mode;

        if (state.inputMode === 'voice') {
          voiceSection.style.display = 'block';
          textInputSection.classList.remove('active');
        } else {
          voiceSection.style.display = 'none';
          textInputSection.classList.add('active');
        }
      });
    });

    // 语音输入
    let isRecording = false;
    let recognition = null;

    function initSpeechRecognition() {
      if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'zh-CN';

        recognition.onstart = () => {
          isRecording = true;
          voiceBtn.classList.add('recording');
          voiceWave.style.display = 'flex';
          voiceHint.textContent = '正在聆听...';
        };

        recognition.onresult = (event) => {
          let transcript = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
          }
          textInput.value = transcript;
          state.textInput = transcript;
        };

        recognition.onend = () => {
          isRecording = false;
          voiceBtn.classList.remove('recording');
          voiceWave.style.display = 'none';
          voiceHint.textContent = '长按说话，松开结束';
        };

        recognition.onerror = (event) => {
          isRecording = false;
          voiceBtn.classList.remove('recording');
          voiceWave.style.display = 'none';
          voiceHint.textContent = '长按说话，松开结束';
          showToast('语音识别不可用，请使用文字输入');
        };
      }
    }

        showToast('语音识别不可用，请使用文字输入');

    voiceBtn.addEventListener('touchstart', (e) => {

    function updateTagsByCategory(category) {
      const tagsGrid = document.querySelector('.tags-grid');
      const tags = categoryTags[category] || [];

      tagsGrid.innerHTML = tags.map(tag =>

      ).join('');

      // 渲染结果
      renderResults();

      // 切换页面
      showPage('results');

    // 解析需求
    function parseRequirements(text, tags) {
      const filters = {
        category: state.selectedCategory,
        tags: [...tags],
        priceRange: [0, Infinity]
      };

      // 简单关键词解析
      if (text.includes('便宜') || text.includes('预算') || text.includes('低价')) {
        filters.priceRange = [0, 500];
        filters.tags.push('便宜');
      }

      if (text.includes('续航') || text.includes('电池')) {
        filters.tags.push('续航长');
      }

      if (text.includes('音质') || text.includes('音乐')) {
        filters.tags.push('音质好');
      }

      if (text.includes('降噪')) {
        filters.tags.push('降噪');
      }

      if (text.includes('品牌') || text.includes('大牌')) {
        filters.tags.push('品牌好');
      }

      // 提取价格
      const priceMatch = text.match(/(\d+)[元块]/);
      if (priceMatch) {
        const price = parseInt(priceMatch[1]);
        filters.priceRange = [price * 0.8, price * 1.2];
      }

      return filters;
    }

    // 筛选和排序
    function filterAndSort(filters) {
      const { weights } = state;

      // 筛选
      let filtered = mockProducts.filter(p => {
        if (p.category !== filters.category) return false;
        if (p.price < filters.priceRange[0] || p.price > filters.priceRange[1]) return false;
        return true;
      });

      // 计算得分
      filtered = filtered.map(p => {
        let score = 0;

        // 价格分（越便宜分数越高）
        const minPrice = Math.min(...filtered.map(x => x.price));
        const maxPrice = Math.max(...filtered.map(x => x.price));
        const priceScore = maxPrice === minPrice ? 100 : ((maxPrice - p.price) / (maxPrice - minPrice)) * 100;

        // 评分分
        const ratingScore = (p.rating / 5) * 100;

        // 销量分
        const maxSales = Math.max(...filtered.map(x => x.sales));
        const salesScore = (p.sales / maxSales) * 100;

        // 标签匹配分
        let tagScore = 0;
        if (filters.tags.length > 0) {
          const matchCount = p.tags.filter(t => filters.tags.includes(t)).length;
          tagScore = (matchCount / filters.tags.length) * 100;
        }

        // 加权求和
        score = (weights.price / 100) * priceScore +
                (weights.rating / 100) * ratingScore +
                (weights.sales / 100) * salesScore +
                (weights.tag / 100) * tagScore;

        return { ...p, score };
      });

      // 排序
      filtered.sort((a, b) => b.score - a.score);

      // 返回前3
      return filtered.slice(0, 3);
    }

        </div>
      `).join('');
    }

        </div>
        <div class="compare-row">
          <div class="compare-cell">品牌</div>
          <div class="compare-cell">${selectedProduct.brand}</div>
        </div>
        <div class="compare-row">
          <div class="compare-cell">价格</div>
          <div class="compare-cell highlight">¥${selectedProduct.price}</div>
        </div>
        <div class="compare-row">
          <div class="compare-cell">评分</div>
          <div class="compare-cell">${selectedProduct.rating} ⭐</div>
        </div>
        <div class="compare-row">
          <div class="compare-cell">销量</div>
          <div class="compare-cell">${selectedProduct.sales.toLocaleString()}</div>
        </div>
      `;

      // 添加规格
      for (const [key, value] of Object.entries(specs)) {
        tableHTML += `
          <div class="compare-row">
            <div class="compare-cell">${key}</div>
            <div class="compare-cell">${value}</div>
          </div>
        `;
      }

      compareTable.innerHTML = tableHTML;

      // 渲染评论
      const commentsList = document.getElementById('comments-list');
      commentsList.innerHTML = selectedProduct.comments.map(c =>
        `<div class="comment-item">"${c}"</div>`
      ).join('');
    }

    // 权重面板
    function toggleWeightPanel() {
      weightPanel.classList.toggle('open');
      overlay.classList.toggle('visible');
    }

    // 滑块值更新
    ['price', 'rating', 'sales', 'tag'].forEach(type => {
      const slider = document.getElementById(`${type}-weight`);
      const valueDisplay = document.getElementById(`${type}-value`);

      slider.addEventListener('input', () => {
        valueDisplay.textContent = slider.value;
        state.weights[type] = parseInt(slider.value);
      });
    });

    // 应用权重
    function applyWeights() {
      // 重新筛选排序
      const filters = parseRequirements(state.textInput, state.selectedTags);
      state.products = filterAndSort(filters);
      renderResults();

      toggleWeightPanel();
      showToast('已更新推荐结果');
    }

    // 购买按钮
    document.getElementById('buy-btn').addEventListener('click', () => {
      if (selectedProduct) {
        showToast('即将跳转到购买页面...');
        setTimeout(() => {
          window.open(selectedProduct.link, '_blank');
        }, 1000);
      }
    });

    // Toast
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 初始化
    initSpeechRecognition();
  </script>
</body>
</html>
