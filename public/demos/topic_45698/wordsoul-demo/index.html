<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordSoul 词语灵魂</title>
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-soul-bg text-soul-text min-h-screen">
  <!-- 顶部导航 -->
  <nav class="bg-soul-surface border-b border-soul-border sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-soul-primary to-soul-secondary flex items-center justify-center">
          <span class="text-white font-bold text-sm">W</span>
        </div>
        <span class="font-bold text-lg">WordSoul</span>
        <span class="text-xs text-soul-muted bg-soul-elevated px-2 py-0.5 rounded-full">词语灵魂</span>
      </div>
      <div class="flex items-center gap-1">
        <button onclick="router.navigate('iter')" id="nav-iter" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-all">
          自我迭代
        </button>
        <button onclick="router.navigate('battle')" id="nav-battle" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-all">
          AI 对战
        </button>
        <button onclick="router.navigate('profile')" id="nav-profile" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-all">
          个人资料
        </button>
        <button onclick="router.navigate('settings')" id="nav-settings" class="nav-btn px-3 py-2 rounded-lg text-sm transition-all" title="AI 裁判配置">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main id="app" class="max-w-5xl mx-auto px-4 py-6">
    <!-- 视图由 JS 动态渲染 -->
  </main>

  <!-- 底部 -->
  <footer class="border-t border-soul-border mt-12 py-6 text-center text-soul-muted text-sm">
    <p>WordSoul 词语灵魂 — TRAE AI 创造力大赛参赛作品</p>
    <p class="mt-1 text-xs">基于心理学外化技术与价值观澄清方法的 AI 驱动自我探索游戏</p>
  </footer>

  <!-- 加载脚本 -->
  <script src="js/storage.js"></script>
  <script src="js/ai-judge.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ai-battle.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
