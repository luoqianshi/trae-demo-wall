<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>非遗共创展台 · 微展内容生成器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="非遗共创展台工作台">
        <aside class="panel input-panel">
          <header class="brand">
            <span class="brand-mark" id="brandMark">染</span>
            <div>
              <h1>非遗共创展台</h1>
              <p>把非遗项目生成可讲、可玩、可传播的微展内容。</p>
            </div>
          </header>

          <div class="preset-row" role="tablist" aria-label="样例切换">
            <button type="button" class="preset-chip is-active" data-preset="blueprint" role="tab" aria-selected="true">蓝印花布</button>
            <button type="button" class="preset-chip" data-preset="shadow" role="tab" aria-selected="false">皮影戏</button>
            <button type="button" class="preset-chip" data-preset="fan" role="tab" aria-selected="false">漆扇</button>
          </div>

          <form id="heritageForm" class="form-grid" autocomplete="off">
            <label>
              <span>项目名称</span>
              <input name="name" value="蓝印花布" required />
            </label>
            <label>
              <span>地域</span>
              <input name="region" value="江苏南通" required />
            </label>
            <label>
              <span>核心材料</span>
              <input name="materials" value="棉布、蓼蓝、刻花版、防染浆" />
            </label>
            <label>
              <span>工艺步骤</span>
              <textarea name="steps" rows="4">刻版、刮浆、防染、浸染、晾晒、刮灰、清洗</textarea>
            </label>
            <label>
              <span>目标观众</span>
              <select name="audience">
                <option>社区亲子家庭</option>
                <option>小学研学团队</option>
                <option>文旅志愿者</option>
                <option>城市游客</option>
                <option>校园社团</option>
              </select>
            </label>
            <label>
              <span>内容语气</span>
              <select name="tone">
                <option value="warm">温润亲和</option>
                <option value="rigorous">严谨讲解</option>
                <option value="lively">活泼趣味</option>
              </select>
            </label>

            <div class="action-row">
              <button type="submit" class="primary-btn" id="generateBtn">
                <span class="btn-label">生成微展内容</span>
                <span class="btn-spinner" aria-hidden="true"></span>
              </button>
              <button type="button" class="ghost-btn" id="demoBtn" title="自动演示生成流程">演示模式</button>
            </div>
            <p class="form-hint" id="generateStatus">已就绪：点击「生成微展内容」即可刷新右侧内容包。</p>
          </form>
        </aside>

        <section class="panel output-panel" aria-live="polite">
          <header class="section-heading">
            <div class="section-title">
              <span>AI 内容包</span>
              <small id="contentSubtitle" class="subtitle">按样例与目标观众生成的可直接使用文本</small>
            </div>
            <div class="section-tools">
              <button type="button" class="mini-btn" id="copyAllBtn" title="复制全部内容">复制全部</button>
              <strong id="contentBadge" class="badge">已生成 9 项</strong>
            </div>
          </header>
          <div id="contentCards" class="content-grid"></div>
        </section>

        <aside class="panel preview-panel">
          <header class="section-heading">
            <div class="section-title">
              <span>扫码微展预览</span>
              <small class="subtitle">面向现场观众的迷你展卡</small>
            </div>
            <strong class="badge tone-teal">社会服务</strong>
          </header>
          <article class="mini-exhibit" id="miniExhibit">
            <div class="exhibit-hero" id="exhibitHero">
              <span class="chip" id="previewRegion">江苏南通</span>
              <h2 id="previewTitle">蓝印花布</h2>
              <p id="previewStory">一块布从白到蓝，要经过刻版、防染、浸染和晾晒。每一道手工痕迹，都是生活审美的留存。</p>
            </div>
            <div class="step-list" id="previewSteps" aria-label="关键工艺"></div>
            <div class="quiz-box">
              <span class="chip tone-clay">互动小测</span>
              <p id="previewQuiz">为什么蓝印花布能留下白色花纹？</p>
            </div>
            <div class="poster-copy">
              <span class="chip tone-leaf">海报文案</span>
              <p id="previewPoster">来摸一摸蓝白之间的手工温度，把一块布里的江南故事带回家。</p>
            </div>
            <footer class="exhibit-foot">
              <button type="button" class="ghost-btn small" id="copyExhibitBtn">复制展卡文本</button>
              <span class="foot-meta" id="exhibitMeta">目标观众：社区亲子家庭</span>
            </footer>
          </article>
        </aside>
      </section>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
