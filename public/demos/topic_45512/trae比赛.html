<!doctype html>
<!-- TRAE submission standalone build: CSS, JS, and default schedule data are embedded for offline review. -->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef5ff">
  <title>课程表</title>

  <style>
@import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap");

:root {
  --font-body: "Noto Sans SC", "Microsoft YaHei UI", "PingFang SC", sans-serif;
  --font-display: "Noto Serif SC", "Songti SC", "SimSun", serif;
  --ink: #17212b;
  --ink-soft: #4f6171;
  --ink-muted: #7a8a98;
  --paper: #f7fafc;
  --glass: rgba(255, 255, 255, .58);
  --glass-strong: rgba(255, 255, 255, .76);
  --glass-faint: rgba(255, 255, 255, .34);
  --line: rgba(90, 112, 130, .22);
  --shadow: 0 22px 64px rgba(40, 67, 86, .16);
  --shadow-soft: 0 10px 32px rgba(40, 67, 86, .10);
  --blue: #2477d4;
  --blue-soft: rgba(36, 119, 212, .16);
  --teal: #0f8f8a;
  --teal-soft: rgba(15, 143, 138, .16);
  --amber: #bd7418;
  --amber-soft: rgba(189, 116, 24, .17);
  --rose: #c95050;
  --rose-soft: rgba(201, 80, 80, .15);
  --green: #2d8e54;
  --green-soft: rgba(45, 142, 84, .15);
  --cell-height: 72px;
  --cell-radius: 8px;
  --cell-gap: 6px;
  --course-opacity: .92;
  --card-opacity: .42;
  --effective-blur: 12px;
  --glass-blur: 30px;
  --field-blur: 16px;
  --mobile-field-blur: 12px;
  --card-alpha-outer: .42;
  --card-alpha-panel: .42;
  --card-alpha-panel-mobile: .42;
  --card-alpha-panel-strong-mobile: .42;
  --card-alpha-grid: .42;
  --card-alpha-chip: .315;
  --card-alpha-control: .315;
  --card-alpha-tab: .42;
  --card-alpha-field: .315;
  --course-color-alpha: .92;
  --page-overlay-alpha: .08;
  --bg-image-opacity: .88;
  --time-rail-width: 78px;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --radius-xl: 30px;
  --blur: 22px;
  color-scheme: light;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: #dfeef4;
  -webkit-text-size-adjust: 100%;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: var(--font-body);
  color: var(--ink);
  background:
    radial-gradient(circle at 12% 8%, rgba(116, 188, 221, .42), transparent 30%),
    radial-gradient(circle at 90% 14%, rgba(255, 203, 126, .34), transparent 28%),
    radial-gradient(circle at 78% 86%, rgba(109, 194, 167, .30), transparent 31%),
    linear-gradient(135deg, #f6fbfd 0%, #dfeef4 48%, #f7f2e8 100%);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    linear-gradient(rgba(255, 255, 255, .30) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, .28) 1px, transparent 1px);
  background-size: 34px 34px;
  mask-image: linear-gradient(to bottom, rgba(23, 33, 43, .58), transparent 72%);
  pointer-events: none;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background: rgba(var(--panel-rgb), var(--page-overlay-alpha));
  backdrop-filter: blur(calc(var(--blur) * .04));
  -webkit-backdrop-filter: blur(calc(var(--blur) * .04));
  pointer-events: none;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

a {
  color: var(--blue);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.app,
#app,
.container,
main {
  width: min(1180px, calc(100% - 28px));
  margin-inline: auto;
}

.app,
#app {
  padding: clamp(18px, 4vw, 36px) 0 calc(28px + env(safe-area-inset-bottom));
}

header,
.app-header,
.topbar,
.toolbar,
.panel,
.card,
.course-card,
.lesson-card,
.schedule-card,
.settings-panel,
.modal,
.dialog,
.toast {
  position: relative;
  border: 1px solid rgba(255, 255, 255, .68);
  background:
    linear-gradient(145deg, rgba(255, 255, 255, .78), rgba(255, 255, 255, .42)),
    radial-gradient(circle at 16% 0%, rgba(255, 255, 255, .72), transparent 38%);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(var(--blur)) saturate(170%);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(170%);
}

header::before,
.app-header::before,
.topbar::before,
.toolbar::before,
.panel::before,
.card::before,
.course-card::before,
.lesson-card::before,
.schedule-card::before,
.settings-panel::before,
.modal::before,
.dialog::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255, 255, 255, .62), transparent 36%, rgba(255, 255, 255, .18));
  pointer-events: none;
}

header,
.app-header,
.topbar {
  display: grid;
  gap: 14px;
  align-items: center;
  margin-bottom: clamp(18px, 4vw, 30px);
  padding: clamp(16px, 3vw, 24px);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
}

header h1,
.app-title,
h1 {
  margin: 0;
  font-family: var(--font-display);
  font-size: clamp(28px, 7vw, 58px);
  line-height: 1.08;
  letter-spacing: 0;
  color: var(--ink);
}

header p,
.subtitle,
.description {
  max-width: 68ch;
  margin: 0;
  color: var(--ink-soft);
  font-size: clamp(14px, 2.4vw, 17px);
  line-height: 1.7;
}

.toolbar,
.controls,
.actions,
.week-controls,
.view-switcher {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.toolbar {
  margin-bottom: 18px;
  padding: 12px;
  border-radius: var(--radius-lg);
}

button,
.btn,
[role="button"],
input[type="button"],
input[type="submit"],
input[type="reset"] {
  min-height: 42px;
  border: 1px solid rgba(255, 255, 255, .70);
  border-radius: 999px;
  padding: 10px 16px;
  color: var(--ink);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, .80), rgba(255, 255, 255, .46)),
    rgba(255, 255, 255, .50);
  box-shadow: 0 8px 22px rgba(41, 74, 96, .12), inset 0 1px 0 rgba(255, 255, 255, .72);
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
  -webkit-tap-highlight-color: transparent;
}

button:hover,
.btn:hover,
[role="button"]:hover {
  border-color: rgba(36, 119, 212, .30);
  box-shadow: 0 12px 28px rgba(41, 74, 96, .16), inset 0 1px 0 rgba(255, 255, 255, .80);
  transform: translateY(-1px);
}

button:active,
.btn:active,
[role="button"]:active {
  transform: translateY(1px) scale(.98);
}

button.primary,
.btn-primary,
button.active,
.app-tabs button.active,
.days button.active,
[aria-current="true"] {
  color: #f7fbff;
  border-color: rgba(27, 94, 168, .26);
  background:
    linear-gradient(135deg, rgba(36, 119, 212, .95), rgba(15, 143, 138, .88)),
    #2477d4;
  box-shadow: 0 14px 34px rgba(36, 119, 212, .26), inset 0 1px 0 rgba(255, 255, 255, .34);
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 11px 13px;
  color: var(--ink);
  background: rgba(var(--panel-rgb), .62);
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .65);
  transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
}

textarea {
  min-height: 112px;
  resize: vertical;
}

input:focus,
select:focus,
textarea:focus {
  border-color: rgba(36, 119, 212, .62);
  background: rgba(var(--panel-rgb), .80);
  box-shadow: 0 0 0 4px rgba(36, 119, 212, .14), inset 0 1px 0 rgba(255, 255, 255, .72);
}

label {
  display: grid;
  gap: 6px;
  color: var(--ink-soft);
  font-size: 14px;
  font-weight: 600;
}

.grid,
.dashboard,
.content-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: clamp(14px, 3vw, 22px);
}

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: -3;
  background-position: center;
  background-size: cover;
  opacity: .42;
  filter: saturate(1.05);
}

.shell {
  padding: clamp(18px, 4vw, 36px) 0 calc(28px + env(safe-area-inset-bottom));
}

.hero {
  grid-template-columns: minmax(0, 1fr) auto;
}

.week-switcher {
  display: flex;
  align-items: center;
  gap: 10px;
}

.eyebrow,
.section-title p {
  margin: 0 0 4px;
  color: var(--teal);
  font-size: 13px;
  font-weight: 800;
}

.daily-poem {
  width: fit-content;
  max-width: min(72vw, 520px);
  margin: 10px 0 0;
  border: 1px solid rgba(255, 255, 255, .46);
  border-radius: 999px;
  padding: 8px 12px;
  color: var(--ink-soft);
  background: rgba(var(--panel-rgb), .30);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .48);
  font-size: clamp(12px, 2vw, 14px);
  font-weight: 800;
  line-height: 1.35;
}

.week-chip {
  display: grid;
  gap: 2px;
  min-width: 116px;
  border: 1px solid rgba(255, 255, 255, .62);
  border-radius: 999px;
  padding: 8px 14px;
  text-align: center;
  background: rgba(var(--panel-rgb), .48);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .60);
}

.week-chip span {
  font-weight: 800;
}

.week-chip small {
  color: var(--ink-muted);
  font-size: 11px;
}

.icon-button {
  width: 46px;
  min-width: 46px;
  padding: 0;
  font-size: 28px;
  line-height: 1;
}

.today-jump {
  min-width: 58px;
  padding-inline: 14px;
}

.file-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  border: 1px solid rgba(255, 255, 255, .70);
  border-radius: 999px;
  padding: 10px 16px;
  color: var(--ink);
  background: rgba(var(--panel-rgb), .50);
  box-shadow: 0 8px 22px rgba(41, 74, 96, .12);
  cursor: pointer;
}

.file-button input {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

.wide {
  flex: 999 1 320px;
}

.section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}

.schedule-panel {
  min-width: 0;
}

.editor-panel {
  align-self: start;
}

.course-card {
  display: grid;
  grid-template-columns: minmax(86px, .28fr) minmax(0, 1fr) auto;
  align-items: center;
}

.course-time {
  color: var(--blue);
  font-weight: 800;
}

.course-main {
  min-width: 0;
}

.course-place {
  margin: 6px 0 0;
  color: var(--ink-soft);
}

.edit-button {
  min-width: 66px;
}

.app-tabs {
  position: sticky;
  top: 10px;
  z-index: 20;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 16px;
  padding: 6px;
  border: 1px solid rgba(255, 255, 255, .68);
  border-radius: 999px;
  background: rgba(var(--panel-rgb), .46);
  backdrop-filter: blur(var(--blur)) saturate(160%);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(160%);
  box-shadow: var(--shadow-soft);
}

.app-tabs button {
  min-height: 44px;
}

.page {
  display: none;
  opacity: 0;
  transform: translateY(10px);
}

.page.active {
  display: block;
  animation: page-enter .42s cubic-bezier(.2, .8, .2, 1) both;
}

#schedulePage {
  min-height: calc(100vh - 230px);
}

#schedulePage .schedule-panel {
  min-height: calc(100vh - 330px);
}

#schedulePage .course-list {
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
}

#schedulePage .course-card {
  min-height: clamp(150px, 22vh, 240px);
  padding: clamp(18px, 3vw, 28px);
}

#schedulePage .course-time {
  align-self: start;
  padding-top: 3px;
  font-size: clamp(15px, 2vw, 20px);
}

#schedulePage h3 {
  font-size: clamp(22px, 3vw, 34px);
}

#editPage .editor-panel,
#settingsPage .settings-panel {
  width: min(760px, 100%);
  margin-inline: auto;
}

.settings-stack,
.settings-actions {
  display: grid;
  gap: 12px;
}

.settings-actions {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.panel,
.card,
.settings-panel {
  border-radius: var(--radius-lg);
  padding: clamp(14px, 3vw, 22px);
}

.week-strip,
.days,
.day-tabs {
  display: grid;
  grid-template-columns: repeat(7, minmax(74px, 1fr));
  gap: 8px;
  overflow-x: auto;
  padding: 4px 2px 10px;
  scrollbar-width: thin;
}

.day,
.day-tab,
.weekday,
.days button {
  min-height: 64px;
  border: 1px solid rgba(255, 255, 255, .68);
  border-radius: var(--radius-md);
  padding: 9px;
  color: var(--ink-soft);
  background: rgba(var(--panel-rgb), .44);
  text-align: center;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .62);
}

.day.active,
.day-tab.active,
.weekday.active,
.days button.active,
.today {
  color: #f8fcff;
  background: linear-gradient(135deg, rgba(15, 143, 138, .92), rgba(36, 119, 212, .86));
  border-color: rgba(255, 255, 255, .72);
}

.schedule,
.timetable,
.course-list,
.lesson-list {
  display: grid;
  gap: 12px;
}

#schedulePage .schedule-panel {
  overflow: hidden;
}

#schedulePage .section-title {
  position: sticky;
  left: 0;
  z-index: 5;
}

#schedulePage .course-list {
  position: relative;
  display: grid;
  grid-template-columns: var(--time-rail-width) minmax(0, 1fr);
  grid-auto-rows: minmax(var(--cell-height), auto);
  gap: var(--cell-gap);
  min-width: min(100%, 520px);
  min-height: calc(
    var(--cell-height) + var(--cell-height) + var(--cell-height) + var(--cell-height) +
    var(--cell-height) + var(--cell-height) + var(--cell-height) + var(--cell-height) +
    var(--cell-height) + var(--cell-height) + var(--cell-height) + var(--cell-height) +
    var(--cell-gap) + var(--cell-gap) + var(--cell-gap) + var(--cell-gap) +
    var(--cell-gap) + var(--cell-gap) + var(--cell-gap) + var(--cell-gap) +
    var(--cell-gap) + var(--cell-gap) + var(--cell-gap)
  );
  padding: 0 0 4px;
  isolation: isolate;
}

#schedulePage .course-list::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 1px solid rgba(96, 119, 136, .20);
  border-radius: var(--cell-radius);
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255, 255, 255, .44) 0,
      rgba(255, 255, 255, .44) var(--cell-height),
      rgba(93, 116, 135, .22) var(--cell-height),
      rgba(93, 116, 135, .22) calc(var(--cell-height) + 1px),
      transparent calc(var(--cell-height) + 1px),
      transparent calc(var(--cell-height) + var(--cell-gap))
    ),
    linear-gradient(90deg, rgba(229, 239, 245, .82), rgba(255, 255, 255, .28));
  pointer-events: none;
  z-index: 0;
}

#schedulePage .course-list::after {
  content: "1\A 08:00\A\A 2\A 08:55\A\A 3\A 10:10\A\A 4\A 11:05\A\A 5\A 14:00\A\A 6\A 14:55\A\A 7\A 16:10\A\A 8\A 17:05\A\A 9\A 19:00\A\A 10\A 19:55\A\A 11\A 20:50\A\A 12\A 21:45";
  position: absolute;
  inset: 0 auto 0 0;
  width: var(--time-rail-width);
  padding: 10px 8px;
  color: var(--ink-muted);
  font-size: 12px;
  font-weight: 800;
  line-height: calc((var(--cell-height) + var(--cell-gap)) / 2);
  white-space: pre-line;
  text-align: center;
  pointer-events: none;
  z-index: 1;
}

#schedulePage #courseList.timetable::before,
#schedulePage #courseList.timetable::after {
  display: none;
}

#schedulePage .course-list > .empty {
  grid-column: 1 / -1;
  min-height: calc(var(--cell-height) + var(--cell-height) + var(--cell-height));
  position: relative;
  z-index: 2;
}

#schedulePage .course-list > .course-card {
  grid-column: 2;
  min-height: calc(var(--cell-height) + var(--cell-height) + var(--cell-gap));
  border-radius: var(--cell-radius);
  opacity: var(--course-opacity);
  align-self: stretch;
  position: relative;
  z-index: 2;
}

#schedulePage .course-list > .course-card .course-time {
  align-self: start;
  border-radius: calc(var(--cell-radius) - 2px);
}

.schedule-grid,
.timetable-grid {
  display: grid;
  grid-template-columns: minmax(70px, .42fr) repeat(7, minmax(0, 1fr));
  grid-auto-rows: var(--cell-height);
  gap: var(--cell-gap);
  overflow: hidden;
  padding-bottom: 10px;
}

.timetable-grid,
.schedule-grid {
  --day-count: 7;
  --visible-day-count: 7;
  min-width: 0;
  width: 100%;
  grid-template-columns: var(--time-rail-width) repeat(var(--day-count), minmax(0, 1fr));
  align-items: stretch;
}

.timetable-grid.weekdays-only,
.schedule-grid.weekdays-only,
[data-weekends="hidden"] .timetable-grid,
[data-weekends="hidden"] .schedule-grid {
  --day-count: 5;
  --visible-day-count: 5;
}

.timetable-grid.weekends-hidden > [data-day="6"],
.timetable-grid.weekends-hidden > [data-day="7"],
.schedule-grid.weekends-hidden > [data-day="6"],
.schedule-grid.weekends-hidden > [data-day="7"],
[data-weekends="hidden"] .timetable-grid > [data-day="6"],
[data-weekends="hidden"] .timetable-grid > [data-day="7"],
[data-weekends="hidden"] .schedule-grid > [data-day="6"],
[data-weekends="hidden"] .schedule-grid > [data-day="7"] {
  display: none;
}

.timetable-grid > [data-day],
.schedule-grid > [data-day],
.timetable-grid > .weekday,
.schedule-grid > .weekday {
  grid-column: calc(var(--day, 1) + 1);
}

.timetable-grid > [data-day="1"],
.schedule-grid > [data-day="1"] { --day: 1; }
.timetable-grid > [data-day="2"],
.schedule-grid > [data-day="2"] { --day: 2; }
.timetable-grid > [data-day="3"],
.schedule-grid > [data-day="3"] { --day: 3; }
.timetable-grid > [data-day="4"],
.schedule-grid > [data-day="4"] { --day: 4; }
.timetable-grid > [data-day="5"],
.schedule-grid > [data-day="5"] { --day: 5; }
.timetable-grid > [data-day="6"],
.schedule-grid > [data-day="6"] { --day: 6; }
.timetable-grid > [data-day="7"],
.schedule-grid > [data-day="7"] { --day: 7; }

.timetable-grid > [data-start],
.schedule-grid > [data-start] {
  grid-row: var(--start) / span var(--span, 1);
  min-height: 0;
  opacity: var(--course-opacity);
  border-radius: var(--cell-radius);
}

.timetable-grid > [data-start="1"],
.schedule-grid > [data-start="1"] { --start: 2; }
.timetable-grid > [data-start="2"],
.schedule-grid > [data-start="2"] { --start: 3; }
.timetable-grid > [data-start="3"],
.schedule-grid > [data-start="3"] { --start: 4; }
.timetable-grid > [data-start="4"],
.schedule-grid > [data-start="4"] { --start: 5; }
.timetable-grid > [data-start="5"],
.schedule-grid > [data-start="5"] { --start: 6; }
.timetable-grid > [data-start="6"],
.schedule-grid > [data-start="6"] { --start: 7; }
.timetable-grid > [data-start="7"],
.schedule-grid > [data-start="7"] { --start: 8; }
.timetable-grid > [data-start="8"],
.schedule-grid > [data-start="8"] { --start: 9; }
.timetable-grid > [data-start="9"],
.schedule-grid > [data-start="9"] { --start: 10; }
.timetable-grid > [data-start="10"],
.schedule-grid > [data-start="10"] { --start: 11; }
.timetable-grid > [data-start="11"],
.schedule-grid > [data-start="11"] { --start: 12; }
.timetable-grid > [data-start="12"],
.schedule-grid > [data-start="12"] { --start: 13; }

.timetable-grid > [data-span="1"],
.schedule-grid > [data-span="1"] { --span: 1; }
.timetable-grid > [data-span="2"],
.schedule-grid > [data-span="2"] { --span: 2; }
.timetable-grid > [data-span="3"],
.schedule-grid > [data-span="3"] { --span: 3; }
.timetable-grid > [data-span="4"],
.schedule-grid > [data-span="4"] { --span: 4; }
.timetable-grid > [data-span="5"],

.time-cell,
.period,
.period-cell {
  display: grid;
  align-content: center;
  min-height: 88px;
  border-radius: var(--radius-md);
  padding: 10px;
  color: var(--ink-muted);
  background: rgba(var(--panel-rgb), .36);
  border: 1px solid rgba(255, 255, 255, .58);
}

.course-card,
.lesson-card,
.schedule-card,
.course-item,
.lesson-item {
  display: grid;
  gap: 9px;
  min-height: 112px;
  border-radius: var(--radius-lg);
  padding: 14px;
  overflow: hidden;
  transition:
    transform .28s cubic-bezier(.2, .8, .2, 1),
    box-shadow .28s cubic-bezier(.2, .8, .2, 1),
    border-color .22s ease,
    background .28s ease;
}

.course-card:hover,
.lesson-card:hover,
.schedule-card:hover,
.course-item:hover,
.lesson-item:hover {
  transform: translateY(-2px);
  border-color: rgba(36, 119, 212, .34);
  box-shadow: var(--shadow);
}

.course-title,
.lesson-title,
.subject,
.name,
h2,
h3 {
  margin: 0;
  font-weight: 800;
  line-height: 1.25;
  color: var(--ink);
  letter-spacing: 0;
}

h2 {
  font-size: clamp(20px, 4vw, 32px);
}

h3,
.course-title,
.lesson-title,
.subject {
  font-size: clamp(17px, 3vw, 22px);
}

.meta,
.course-meta,
.lesson-meta,
.teacher,
.location,
.time,
.empty,
.hint {
  color: var(--ink-soft);
  line-height: 1.55;
}

.meta,
.course-meta,
.lesson-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  font-size: 13px;
}

.badge,
.tag,
.pill,
.course-meta span,
.lesson-meta span {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  min-height: 26px;
  border-radius: 999px;
  padding: 4px 9px;
  color: var(--ink-soft);
  background: rgba(var(--panel-rgb), .52);
  border: 1px solid rgba(255, 255, 255, .62);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .58);
  white-space: nowrap;
}

.course-card:nth-of-type(5n + 1),
.lesson-card:nth-of-type(5n + 1),
.course-item:nth-of-type(5n + 1) {
  background: linear-gradient(145deg, rgba(255, 255, 255, .78), rgba(227, 242, 255, .48));
}

.course-card:nth-of-type(5n + 2),
.lesson-card:nth-of-type(5n + 2),
.course-item:nth-of-type(5n + 2) {
  background: linear-gradient(145deg, rgba(255, 255, 255, .78), rgba(226, 247, 242, .52));
}

.course-card:nth-of-type(5n + 3),
.lesson-card:nth-of-type(5n + 3),
.course-item:nth-of-type(5n + 3) {
  background: linear-gradient(145deg, rgba(255, 255, 255, .78), rgba(255, 241, 218, .55));
}

.course-card:nth-of-type(5n + 4),
.lesson-card:nth-of-type(5n + 4),
.course-item:nth-of-type(5n + 4) {
  background: linear-gradient(145deg, rgba(255, 255, 255, .78), rgba(235, 244, 229, .54));
}

.course-card:nth-of-type(5n),
.lesson-card:nth-of-type(5n),
.course-item:nth-of-type(5n) {
  background: linear-gradient(145deg, rgba(255, 255, 255, .78), rgba(255, 232, 232, .48));
}

.empty,
.loading,
.error {
  display: grid;
  place-items: center;
  min-height: 180px;
  border: 1px dashed rgba(90, 112, 130, .30);
  border-radius: var(--radius-lg);
  padding: 24px;
  text-align: center;
  background: rgba(var(--panel-rgb), .35);
}

.error {
  color: var(--rose);
  background: var(--rose-soft);
}

.success {
  color: var(--green);
  background: var(--green-soft);
}

.modal-backdrop,
.overlay,
.dialog-backdrop {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: grid;
  place-items: center;
  padding: 18px;
  background: rgba(43, 62, 77, .34);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.modal,
.dialog {
  z-index: 50;
  width: min(560px, 100%);
  max-height: min(780px, calc(100vh - 36px));
  overflow: auto;
  border-radius: var(--radius-xl);
  padding: clamp(18px, 4vw, 28px);
  box-shadow: 0 24px 80px rgba(31, 54, 71, .26);
}

.toast {
  position: fixed;
  left: 50%;
  bottom: calc(18px + env(safe-area-inset-bottom));
  z-index: 70;
  max-width: min(420px, calc(100% - 28px));
  transform: translateX(-50%);
  border-radius: 999px;
  padding: 12px 16px;
  color: var(--ink);
}

::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-track {
  background: rgba(var(--panel-rgb), .24);
}

::-webkit-scrollbar-thumb {
  background: rgba(74, 105, 127, .28);
  border: 3px solid rgba(255, 255, 255, .42);
  border-radius: 999px;
}

@media (min-width: 760px) {
  header,
  .app-header,
  .topbar {
    grid-template-columns: minmax(0, 1fr) auto;
  }

  .grid,
  .dashboard,
  .content-grid {
    grid-template-columns: minmax(260px, .34fr) minmax(0, 1fr);
  }

  .course-list,
  .lesson-list {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (min-width: 1080px) {
  .course-list,
  .lesson-list {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 640px) {
  :root {
    --cell-height: 64px;
    --cell-gap: 5px;
    --time-rail-width: 62px;
  }

  .app,
  #app,
  .container,
  main {
    width: min(100% - 18px, 1180px);
  }

  header,
  .app-header,
  .topbar {
    border-radius: 24px;
  }

  .shell {
    padding-bottom: calc(124px + env(safe-area-inset-bottom));
  }

  .page {
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }

  .hero {
    grid-template-columns: minmax(0, 1fr);
  }

  .week-switcher {
    justify-content: space-between;
  }

  .week-chip {
    flex: 1;
  }

  .app-tabs {
    position: fixed;
    top: auto;
    right: 10px;
    bottom: calc(10px + env(safe-area-inset-bottom));
    left: 10px;
    margin: 0;
  }

  .days {
    grid-template-columns: repeat(7, minmax(58px, 1fr));
    margin-inline: -4px;
  }

  .days button {
    min-height: 54px;
    padding-inline: 6px;
  }

  #schedulePage .schedule-panel {
    min-height: calc(100vh - 300px);
    overflow-x: auto;
    padding-inline: 10px;
    scroll-padding-bottom: calc(116px + env(safe-area-inset-bottom));
  }

  #schedulePage .course-list {
    grid-template-columns: var(--time-rail-width) minmax(188px, 1fr);
    min-width: 300px;
  }

  #schedulePage .course-card,
  .course-card {
    grid-template-columns: minmax(0, 1fr);
    align-items: start;
    min-height: 158px;
  }

  .course-time {
    width: fit-content;
    border-radius: 999px;
    padding: 6px 10px;
    background: var(--blue-soft);
  }

  .edit-button {
    width: 100%;
  }

  .form-row,
  .settings-actions {
    grid-template-columns: minmax(0, 1fr);
  }

  .toolbar,
  .controls,
  .actions,
  .week-controls,
  .view-switcher {
    align-items: stretch;
  }

  .toolbar > *,
  .controls > *,
  .actions > *,
  .week-controls > * {
    flex: 1 1 auto;
  }

  button,
  .btn,
  [role="button"] {
    min-width: 0;
    padding-inline: 13px;
  }

  .schedule-grid,
  .timetable-grid {
    --days-width: 896px;
    width: max-content;
    min-width: calc(var(--time-rail-width) + var(--days-width));
    grid-template-columns: var(--time-rail-width) repeat(var(--day-count, 7), minmax(128px, 1fr));
    padding-bottom: calc(18px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
  }

  .timetable-grid.weekdays-only,
  .schedule-grid.weekdays-only,
  [data-weekends="hidden"] .timetable-grid,
  [data-weekends="hidden"] .schedule-grid {
    --days-width: 640px;
  }

  .course-card,
  .lesson-card,
  .schedule-card,
  .course-item,
  .lesson-item {
    min-height: 96px;
  }
}

/* Final product polish */
.hero,
.panel,
.settings-group,
.today-course,
#courseList .timetable-grid,
.app-tabs {
  border-color: rgba(255, 255, 255, .56);
  background:
    radial-gradient(circle at 16% 0%, rgba(255, 255, 255, calc(var(--card-opacity) + .22)), transparent 42%),
    linear-gradient(145deg, rgba(255, 255, 255, var(--card-opacity)), rgba(255, 255, 255, calc(var(--card-opacity) * .38)));
  box-shadow:
    0 18px 56px rgba(40, 67, 86, .14),
    inset 0 1px 0 rgba(255, 255, 255, .62);
}

button,
.file-button {
  min-height: 44px;
  border-radius: 999px;
  font-weight: 800;
  letter-spacing: 0;
}

button.primary,
.app-tabs button.active {
  background:
    radial-gradient(circle at 24% 0%, rgba(255, 255, 255, .34), transparent 44%),
    linear-gradient(135deg, rgba(35, 119, 211, .94), rgba(15, 143, 138, .90));
}

.settings-stack {
  display: grid;
  gap: 14px;
}

.settings-group {
  display: grid;
  gap: 14px;
  border-radius: 24px;
  padding: clamp(15px, 3vw, 22px);
}

.settings-group .section-title {
  margin: 0;
  padding: 0 0 10px;
}

.settings-divider {
  display: none;
}

#settingsPage .settings-stack > .field:nth-child(1)::before,
#settingsPage .settings-stack > .form-row:nth-child(5)::before,
#settingsPage .settings-stack > .settings-fieldset::before,
#settingsPage .settings-stack > fieldset::before,
#settingsPage .settings-stack > .form-row:nth-child(8)::before {
  content: none;
}

#todayPage .today-panel {
  min-height: calc(100vh - 250px);
}

.today-course-list {
  display: grid;
  gap: 12px;
}

.today-course {
  display: grid;
  grid-template-columns: minmax(92px, .24fr) minmax(0, 1fr);
  gap: 14px;
  align-items: center;
  border: 1px solid rgba(255, 255, 255, .58);
  border-radius: 22px;
  padding: clamp(14px, 3vw, 20px);
  cursor: pointer;
}

.today-time {
  display: grid;
  place-items: center;
  min-height: 54px;
  border-radius: 18px;
  color: var(--blue);
  background: rgba(var(--panel-rgb), .38);
  font-weight: 900;
}

.today-main {
  min-width: 0;
}

.today-main h3,
#courseList .timetable-course h3 {
  color: var(--ink);
  font-weight: 900;
}

.today-main p {
  margin: 5px 0;
  color: var(--ink-soft);
}

.today-main span {
  display: inline-flex;
  border-radius: 999px;
  padding: 5px 9px;
  color: var(--teal);
  background: rgba(var(--panel-rgb), .42);
  font-size: 12px;
  font-weight: 800;
}

#courseList .timetable-course {
  display: grid;
  gap: 7px;
  border-width: 1px;
  animation: course-rise .46s cubic-bezier(.2, .8, .2, 1) both;
  animation-delay: calc(var(--course-index, 0) * 34ms);
  transform-origin: center top;
  will-change: transform, opacity;
}

#courseList .timetable-course .course-meta span {
  border-radius: 999px;
}

#courseList .timetable-course:active,
.today-course:active {
  transform: scale(.985) translateY(1px);
  box-shadow:
    0 8px 22px rgba(34, 74, 94, .12),
    inset 0 1px 0 rgba(255, 255, 255, .68);
}

@keyframes page-enter {
  from {
    opacity: 0;
    transform: translateY(12px) scale(.992);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes course-rise {
  from {
    opacity: 0;
    transform: translateY(12px) scale(.975);
  }
  to {
    opacity: var(--course-visual-opacity, var(--course-opacity));
    transform: translateY(0) scale(1);
  }
}

.field input,
.field select {
  min-height: 46px;
}

@media (max-width: 640px) {
  .today-course {
    grid-template-columns: minmax(0, 1fr);
  }

  .today-time {
    width: fit-content;
    padding-inline: 12px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    transition-duration: .01ms !important;
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
  }
}

/* Big-tech productivity pass: Notion/Linear/Airtable inspired, not glass-first. */
:root {
  --ink: #1f2328;
  --ink-soft: #59636e;
  --ink-muted: #8b949e;
  --paper: #f7f6f2;
  --canvas: #ffffff;
  --surface: #fbfaf8;
  --surface-strong: #f0eee9;
  --line: #dedbd4;
  --line-soft: #ece8df;
  --brand: #5645d4;
  --brand-pressed: #4636bb;
  --blue: #2563eb;
  --teal: #0f766e;
  --amber: #b45309;
  --rose: #be123c;
  --green: #15803d;
  --shadow: 0 16px 36px rgba(31, 35, 40, .08);
  --shadow-soft: 0 4px 14px rgba(31, 35, 40, .06);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --blur: 0px;
  --panel-rgb: 255, 255, 255;
}

/* ===== Dark theme ===== */
html[data-theme="dark"] {
  --ink: #e6edf3;
  --ink-soft: #c9d1d9;
  --ink-muted: #8b949e;
  --paper: #0d1117;
  --canvas: #161b22;
  --surface: #161b22;
  --surface-strong: #1c232c;
  --line: #2a323c;
  --line-soft: #21262d;
  --brand: #8b7bff;
  --brand-pressed: #a99dff;
  --blue: #4a90e2;
  --teal: #2bb3a3;
  --amber: #e0a84a;
  --rose: #e5707e;
  --green: #4caf6f;
  --shadow: 0 16px 36px rgba(0, 0, 0, .42);
  --shadow-soft: 0 4px 14px rgba(0, 0, 0, .34);
  --panel-rgb: 22, 27, 34;
  --app-ink: #e6edf3;
  --app-ink-rgb: 230, 237, 243;
  --app-ink-soft: #c9d1d9;
  --app-surface: rgba(22, 27, 34, .94);
  --app-surface-soft: rgba(22, 27, 34, .78);
  --app-control-alpha: .72;
  --app-panel-border-alpha: .18;
  color-scheme: dark;
}

html[data-theme="dark"],
[data-theme="dark"] body {
  background:
    radial-gradient(circle at 12% 8%, rgba(56, 139, 196, .16), transparent 30%),
    radial-gradient(circle at 90% 14%, rgba(205, 167, 92, .12), transparent 28%),
    radial-gradient(circle at 78% 86%, rgba(64, 145, 120, .12), transparent 31%),
    linear-gradient(180deg, #0d1117 0%, #11161d 100%) !important;
}

[data-theme="dark"] body::before {
  background:
    linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
}

[data-theme="dark"] .bg-layer {
  opacity: .22;
  filter: saturate(.8) contrast(.95) brightness(.85);
}

[data-theme="dark"] header::before,
[data-theme="dark"] .app-header::before,
[data-theme="dark"] .topbar::before,
[data-theme="dark"] .toolbar::before,
[data-theme="dark"] .panel::before,
[data-theme="dark"] .card::before,
[data-theme="dark"] .course-card::before,
[data-theme="dark"] .lesson-card::before,
[data-theme="dark"] .schedule-card::before,
[data-theme="dark"] .settings-panel::before,
[data-theme="dark"] .modal::before,
[data-theme="dark"] .dialog::before {
  background: linear-gradient(135deg, rgba(255, 255, 255, .06), transparent 36%, rgba(255, 255, 255, .02));
}

/* Course blocks: dark-tinted backgrounds with light text */
[data-theme="dark"] #courseList .timetable-course,
[data-theme="dark"] #schedulePage .course-list > .course-card,
[data-theme="dark"] #courseList .timetable-course:nth-of-type(5n + 1),
[data-theme="dark"] #schedulePage .course-list > .course-card:nth-of-type(5n + 1) {

}
[data-theme="dark"] #courseList .timetable-course:nth-of-type(5n + 2),
[data-theme="dark"] #schedulePage .course-list > .course-card:nth-of-type(5n + 2) {
  background: rgba(45, 142, 84, .36) !important;
}
[data-theme="dark"] #courseList .timetable-course:nth-of-type(5n + 3),
[data-theme="dark"] #schedulePage .course-list > .course-card:nth-of-type(5n + 3) {
  background: rgba(189, 116, 24, .38) !important;
}
[data-theme="dark"] #courseList .timetable-course:nth-of-type(5n + 4),
[data-theme="dark"] #schedulePage .course-list > .course-card:nth-of-type(5n + 4) {

}
[data-theme="dark"] #courseList .timetable-course:nth-of-type(5n),
[data-theme="dark"] #schedulePage .course-list > .course-card:nth-of-type(5n) {

}
[data-theme="dark"] #courseList .timetable-course h3,
[data-theme="dark"] #schedulePage .course-list > .course-card h3 {

}
[data-theme="dark"] #courseList .timetable-course .course-meta,
[data-theme="dark"] #courseList .timetable-course .course-place,
[data-theme="dark"] #schedulePage .course-list > .course-card .course-meta {

}
[data-theme="dark"] #courseList .timetable-course .course-meta span {
  background: rgba(0, 0, 0, .22) !important;

/* Dark mode: remove opacity dimming on text (app-ink is already calibrated) */
[data-theme="dark"] .hero .eyebrow,
[data-theme="dark"] .section-title p,
[data-theme="dark"] #activeDayText,
[data-theme="dark"] .field span,
[data-theme="dark"] .settings-fieldset legend {

[data-theme="dark"] .today-main h3,
[data-theme="dark"] .today-main p,
[data-theme="dark"] .today-main span,
[data-theme="dark"] .hint,
[data-theme="dark"] .empty {

}

[data-theme="dark"] .hero h1,
[data-theme="dark"] .section-title h2,
[data-theme="dark"] #courseCount,
[data-theme="dark"] #todaySummary,

[data-theme="dark"] .hero .week-chip span,

[data-theme="dark"] .option-picker-list button.is-active {

}

[data-theme="dark"] .timetable-cell,

}

[data-theme="dark"] .timetable-grid .grid-header,

}

[data-theme="dark"] .slot-number,
[data-theme="dark"] .time-cell span,

  color: var(--app-ink-soft) !important;
}

[data-theme="dark"] input::placeholder,
[data-theme="dark"] textarea::placeholder {
  color: rgba(var(--app-ink-rgb), .45) !important;
  opacity: 1 !important;
}

[data-theme="dark"] input,
[data-theme="dark"] select,
[data-theme="dark"] textarea {

}

[data-theme="dark"] .field input,
[data-theme="dark"] .field select,
[data-theme="dark"] .field textarea,
[data-theme="dark"] .picker-row input[type="date"],
[data-theme="dark"] .picker-row input[type="time"] {

}

[data-theme="dark"] .field input:focus,
[data-theme="dark"] .field select:focus,
[data-theme="dark"] .field textarea:focus {
  border-color: var(--brand) !important;

}

[data-theme="dark"] .field span,
[data-theme="dark"] .settings-fieldset legend,
[data-theme="dark"] .section-title p,
[data-theme="dark"] .hero .eyebrow {
  color: var(--app-ink-soft) !important;
}

[data-theme="dark"] .hero .week-chip small,
[data-theme="dark"] #dateRange {
  color: var(--app-ink-soft) !important;
  opacity: 1 !important;
}

[data-theme="dark"] .app-tabs button:not(.active) {
  color: var(--app-ink-soft) !important;
  opacity: 1 !important;
}

[data-theme="dark"] .data-actions > .data-control,
[data-theme="dark"] .data-actions button,
[data-theme="dark"] .data-actions .file-button {
  color: var(--app-ink) !important;
}

[data-theme="dark"] .option-picker-heading,
[data-theme="dark"] .option-picker-list button {
  color: var(--app-ink) !important;
}

[data-theme="dark"] .search-result-title {
  color: #f0f6fc !important;
}

[data-theme="dark"] .search-result-meta {
  color: var(--app-ink-soft) !important;
}

html {
  background: var(--paper);
}

body {
  color: var(--ink);
  background:
    linear-gradient(180deg, #fbfaf7 0%, #f4f2ed 100%);
}

body::before {
  background:
    radial-gradient(circle at 12% 8%, rgba(86, 69, 212, .06), transparent 30%),
    radial-gradient(circle at 86% 10%, rgba(15, 118, 110, .06), transparent 28%);
  background-size: auto;
  mask-image: none;
}

body::after {
  display: none;
}

.bg-layer {
  opacity: .34;
  filter: saturate(.92) contrast(.96);
}

.shell {
  width: min(1180px, calc(100% - 28px));
}

header,
.app-header,
.topbar,
.toolbar,
.panel,
.card,
.course-card,
.lesson-card,
.schedule-card,
.settings-panel,
.settings-group,
.modal,
.dialog,
.toast,
.today-course,
#courseList .timetable-grid,
.app-tabs {
  border: 1px solid var(--line);
  background: rgba(var(--panel-rgb), calc(var(--card-opacity) * .86)) !important;
  box-shadow: var(--shadow-soft);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

header::before,
.app-header::before,
.topbar::before,
.toolbar::before,
.panel::before,
.card::before,
.course-card::before,
.lesson-card::before,
.schedule-card::before,
.settings-panel::before,
.settings-group::before,
.modal::before,
.dialog::before,
.today-course::before,
.app-tabs::before {
  display: none;
}

.hero {
  grid-template-columns: minmax(0, 1fr) auto;
  border-radius: 16px;
  padding: clamp(16px, 3vw, 22px);
  background:
    linear-gradient(135deg, rgba(255, 255, 255, .96), rgba(247, 245, 240, .94)) !important;
}

.hero h1,
h1 {
  font-family: var(--font-body);
  font-size: clamp(30px, 6vw, 52px);
  font-weight: 800;
  color: var(--ink);
  text-shadow: none;
}

.eyebrow,
.section-title p {
  color: var(--brand);
  font-size: 12px;
  font-weight: 700;
}

.daily-poem {
  max-width: min(760px, 100%);
  border-color: var(--line-soft);
  border-radius: 8px;
  color: var(--ink-soft);
  background: var(--surface) !important;
  box-shadow: none;
}

button,
.btn,
[role="button"],
input[type="button"],
input[type="submit"],
input[type="reset"],
.file-button {
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 14px;
  color: var(--ink);
  background: rgb(var(--panel-rgb)) !important;
  box-shadow: 0 1px 1px rgba(31, 35, 40, .04);
  font-weight: 650;
}

button:hover,
.btn:hover,
[role="button"]:hover,
.file-button:hover {
  border-color: #c9c4ba;
  background: var(--surface) !important;
  box-shadow: var(--shadow-soft);
  transform: translateY(-1px);
}

button:active,
.btn:active,
[role="button"]:active,
.file-button:active {
  transform: scale(.97);
}

button.primary,
.btn-primary,
button.active,
.app-tabs button.active,
.days button.active,
[aria-current="true"] {
  color: #ffffff;
  border-color: var(--brand);
  background: var(--brand) !important;
  box-shadow: 0 6px 14px rgba(86, 69, 212, .18);
}

input,
select,
textarea {
  border-color: var(--line);
  border-radius: 8px;
  background: rgb(var(--panel-rgb));
  box-shadow: none;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--brand);
  background: rgb(var(--panel-rgb));
  box-shadow: 0 0 0 3px rgba(86, 69, 212, .14);
}

.app-tabs {
  border-radius: 12px;
  padding: 4px;
  gap: 4px;
  background: rgba(var(--panel-rgb), .92) !important;
}

.app-tabs button {
  border: 0;
  border-radius: 8px;
  background: transparent !important;
  box-shadow: none;
  color: var(--ink-soft);
}

.app-tabs button.active {
  color: #ffffff;
  background: var(--ink) !important;
  box-shadow: 0 4px 10px rgba(31, 35, 40, .14);
}

.panel,
.settings-panel,
.settings-group {
  border-radius: 14px;
}

.section-title {
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line-soft);
}

.section-title h2,
h2 {
  font-family: var(--font-body);
  font-size: clamp(20px, 4vw, 30px);
  font-weight: 750;
}

#schedulePage .schedule-panel {
  padding: clamp(10px, 2vw, 18px);
}

#courseList .timetable-grid {
  border-radius: 12px;
  padding: 8px;
  background: rgb(var(--panel-rgb)) !important;
  box-shadow: 0 1px 2px rgba(31, 35, 40, .04);
}

#courseList .timetable-header,
#courseList .timetable-cell,
#courseList .time-cell {
  border-color: transparent !important;
  background: rgba(247, 246, 242, .55) !important;
  box-shadow: none !important;
}

#courseList .timetable-header {
  min-height: 38px;
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 750;
  background: transparent !important;
}

#courseList .timetable-cell {
  opacity: .58;
}

#courseList .time-cell {
  color: var(--ink-muted);
  background: transparent !important;
}

#courseList .time-cell strong {
  color: var(--ink);
}

#courseList .timetable-course,
#schedulePage .course-list > .course-card {
  border: 1px solid rgba(31, 35, 40, .07);
  box-shadow: 0 2px 7px rgba(31, 35, 40, .07);
  background: #dcecfa !important;
}

#courseList .timetable-course:nth-of-type(5n + 1) {
  background: #dcecfa !important;
}

#courseList .timetable-course:nth-of-type(5n + 2) {
  background: #d9f3e1 !important;
}

#courseList .timetable-course:nth-of-type(5n + 3) {
  background: #ffe8d4 !important;
}

#courseList .timetable-course:nth-of-type(5n + 4) {
  background: #e6e0f5 !important;
}

#courseList .timetable-course:nth-of-type(5n) {
  background: #fef7d6 !important;
}

#courseList .timetable-course h3 {
  color: var(--app-ink);
  font-weight: 800;
}

#courseList .timetable-course .course-meta {
  color: var(--app-ink-soft, #4f5b66);
}

#courseList .timetable-course .course-meta span {
  border: 1px solid rgba(31, 35, 40, .08);
  border-radius: 6px;
  background: rgba(var(--panel-rgb), .48) !important;
  box-shadow: none;
}

.today-course {
  border-radius: 12px;
  background: rgb(var(--panel-rgb)) !important;
}

.today-time {
  border: 1px solid var(--line-soft);
  border-radius: 8px;
  color: var(--brand);
  background: var(--surface) !important;
}

.settings-fieldset label,
#visibleFields label,
.hint,
.week-chip {
  border-color: var(--line-soft);
  border-radius: 8px;
  background: var(--surface) !important;
  box-shadow: none;
}

@media (max-width: 640px) {
  .shell {
    width: min(100% - 12px, 1180px);
    padding-bottom: calc(92px + env(safe-area-inset-bottom));
  }

  .hero {
    gap: 12px;
    border-radius: 14px;
  }

  .hero h1 {
    font-size: 32px;
  }

  .daily-poem {
    font-size: 12px;
  }

  .week-switcher {
    gap: 6px;
  }

  .icon-button {
    width: 38px;
    min-width: 38px;
    border-radius: 8px;
  }

  .app-tabs {
    bottom: calc(10px + env(safe-area-inset-bottom));
    border-radius: 14px;
    background: rgba(var(--panel-rgb), .96) !important;
    box-shadow: 0 12px 30px rgba(31, 35, 40, .16);
  }

  .app-tabs button {
    min-height: 40px;
    border-radius: 10px;
    font-size: 13px;
  }

  .app-tabs button.active {
    background: var(--ink) !important;
  }

  #schedulePage .schedule-panel {
    padding: 7px;
  }

  #courseList .timetable-grid {
    gap: 3px !important;
    padding: 5px;
  }

  #courseList .timetable-header,
  #courseList .time-cell,
  #courseList .timetable-cell {
    border-radius: 6px;
    background: transparent !important;
  }

  #courseList .timetable-course {
    border-radius: 7px;
    box-shadow: 0 1px 4px rgba(31, 35, 40, .08);
  }

  #courseList .timetable-course .course-meta span {
    border: 0;
    background: transparent !important;
  }
}

/* iOS liquid glass polish */
:root {
  --ink: #162635;
  --ink-soft: #526678;
  --ink-muted: #7f91a1;
  --paper: #eef6f8;
  --glass: rgba(255, 255, 255, .42);
  --glass-strong: rgba(255, 255, 255, .64);
  --glass-faint: rgba(255, 255, 255, .24);
  --line: rgba(93, 120, 139, .20);
  --shadow: 0 24px 76px rgba(35, 68, 86, .18);
  --shadow-soft: 0 12px 38px rgba(35, 68, 86, .12);
  --blue: #1e78c8;
  --teal: #11877f;
  --amber: #b06d1d;
  --radius-lg: 24px;
  --radius-xl: 34px;
}

html {
  background: #e5f0f3;
}

body {
  background: transparent;
}

body::before {
  z-index: -3;
  background:
    radial-gradient(circle at 10% 7%, rgba(90, 170, 211, .54), transparent 28%),
    radial-gradient(circle at 84% 9%, rgba(247, 184, 92, .42), transparent 26%),
    radial-gradient(circle at 76% 88%, rgba(88, 181, 149, .36), transparent 30%),
    linear-gradient(145deg, rgba(247, 252, 253, .92), rgba(221, 238, 244, .84) 48%, rgba(248, 240, 226, .72));
  mask-image: none;
}

body::after {
  z-index: -1;
  background:
    linear-gradient(rgba(255, 255, 255, .18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, .16) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255, 255, 255, .18), rgba(255, 255, 255, .05));
  background-size: 36px 36px, 36px 36px, auto;
  backdrop-filter: blur(.7px) saturate(112%);
  -webkit-backdrop-filter: blur(.7px) saturate(112%);
}

.bg-layer {
  z-index: -2;
  opacity: .72;
  background-position: center;
  background-size: cover;
  filter: saturate(1.12) contrast(1.03);
}

header,
.app-header,
.topbar,
.toolbar,
.panel,
.card,
.course-card,
.lesson-card,
.schedule-card,
.settings-panel,
.modal,
.dialog,
.toast {
  border-color: rgba(255, 255, 255, .56);
  background:
    radial-gradient(circle at 18% 0%, rgba(255, 255, 255, .66), transparent 42%),
    radial-gradient(circle at 100% 105%, rgba(158, 219, 224, .22), transparent 34%),
    linear-gradient(145deg, rgba(255, 255, 255, .62), rgba(255, 255, 255, .25));
  box-shadow:
    0 22px 70px rgba(36, 66, 84, .14),
    inset 0 1px 0 rgba(255, 255, 255, .62),
    inset 0 -1px 0 rgba(255, 255, 255, .18);
  backdrop-filter: blur(var(--blur)) saturate(185%) contrast(1.03);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(185%) contrast(1.03);
}

header::before,
.app-header::before,
.topbar::before,
.toolbar::before,
.panel::before,
.card::before,
.course-card::before,
.lesson-card::before,
.schedule-card::before,
.settings-panel::before,
.modal::before,
.dialog::before {
  background:
    linear-gradient(115deg, rgba(255, 255, 255, .76), transparent 32%, rgba(255, 255, 255, .20) 68%, rgba(255, 255, 255, .44)),
    linear-gradient(180deg, rgba(255, 255, 255, .20), transparent 44%);
  opacity: .72;
}

.hero {
  overflow: hidden;
}

.hero h1 {
  text-shadow: 0 1px 0 rgba(255, 255, 255, .70);
}

.week-switcher,
.section-title,
.form-actions {
  position: relative;
  z-index: 1;
}

.app-tabs {
  grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
  gap: 5px;
  padding: 5px;
  border-color: rgba(255, 255, 255, .58);
  background:
    radial-gradient(circle at 50% 0%, rgba(255, 255, 255, .58), transparent 52%),
    linear-gradient(145deg, rgba(255, 255, 255, .44), rgba(255, 255, 255, .20));
  box-shadow:
    0 14px 44px rgba(38, 67, 83, .14),
    inset 0 1px 0 rgba(255, 255, 255, .70);
  backdrop-filter: blur(var(--blur)) saturate(190%);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(190%);
}

.app-tabs button {
  min-height: 46px;
  border-color: transparent;
  background: transparent;
  box-shadow: none;
  font-weight: 800;
}

.app-tabs button.active,
.app-tabs [aria-current="true"] {
  color: #f7fbff;
  background:
    radial-gradient(circle at 30% 0%, rgba(255, 255, 255, .36), transparent 44%),
    linear-gradient(135deg, rgba(30, 120, 200, .94), rgba(17, 135, 127, .88));
  box-shadow:
    0 10px 24px rgba(30, 120, 200, .24),
    inset 0 1px 0 rgba(255, 255, 255, .42);
}

button,
.btn,
[role="button"],
input[type="button"],
input[type="submit"],
input[type="reset"],
.file-button {
  border-color: rgba(255, 255, 255, .64);
  background:
    radial-gradient(circle at 24% 0%, rgba(255, 255, 255, .70), transparent 48%),
    linear-gradient(180deg, rgba(255, 255, 255, .56), rgba(255, 255, 255, .30));
  box-shadow:
    0 9px 24px rgba(34, 67, 88, .12),
    inset 0 1px 0 rgba(255, 255, 255, .72);
}

input,
select,
textarea {
  border-color: rgba(96, 122, 141, .20);
  background: rgba(var(--panel-rgb), .50);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, .66),
    0 1px 0 rgba(255, 255, 255, .30);
}

input:focus,
select:focus,
textarea:focus {
  border-color: rgba(30, 120, 200, .58);
  background: rgba(var(--panel-rgb), .68);
  box-shadow:
    0 0 0 4px rgba(30, 120, 200, .13),
    inset 0 1px 0 rgba(255, 255, 255, .76);
}

}

.panel::before,
.card::before,
.settings-panel::before,
.settings-group::before,
.today-course::before,
.app-tabs::before {

/* Motion and mobile polish inspired by the iOS glass notes in UI.md. */
:root {
  --ease-glass: cubic-bezier(.34, 1.18, .64, 1);
  --ease-quiet: cubic-bezier(.25, .8, .25, 1);
}

.page {
  transform: translate3d(0, 6px, 0);
}

.page.active {
  animation: page-enter .24s var(--ease-quiet) both;
}

#courseList .timetable-course {
  animation: course-rise .24s var(--ease-quiet) both;
  animation-delay: 0ms;
  transition:
    transform .16s var(--ease-glass),
    box-shadow .18s ease,
    border-color .18s ease,
    background .22s ease;
  will-change: auto;
}

.today-course,
.app-tabs button,
button,
.file-button {
  transition:
    transform .16s var(--ease-glass),
    box-shadow .18s ease,
    background .18s ease,
    border-color .18s ease;
}

button:active,
.file-button:active,
.app-tabs button:active {
  transform: scale(.94) translateZ(0);
}

#courseList .timetable-course:active,
.today-course:active {
  transform: scale(.97) translateY(1px) translateZ(0);
}

@keyframes page-enter {
  from {
    opacity: 0;
    transform: translate3d(0, 8px, 0) scale(.995);
  }
  to {
    opacity: 1;
    transform: translate3d(0, 0, 0) scale(1);
  }
}

@keyframes course-rise {
  from {
    opacity: 0;
    transform: translate3d(0, 6px, 0) scale(.992);
  }
  to {
    opacity: var(--course-visual-opacity, var(--course-opacity));
    transform: translate3d(0, 0, 0) scale(1);
  }
}

@media (hover: hover) and (min-width: 641px) {
  #courseList .timetable-course:hover,
  .today-course:hover {
    transform: translateY(-2px) translateZ(0);
  }
}

/* ===== GPU rendering acceleration ===== */
/* Promote animated/scroll layers to compositor threads */
body {
  /* Hardware-accelerate the fixed background layers */
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body::before,
body::after,
.bg-layer {
  transform: translateZ(0);
  will-change: transform;
  backface-visibility: hidden;
}

/* Page transitions: keep on GPU */
.page.active {
  will-change: opacity, transform;
  transform: translateZ(0);
}

/* Course grid: isolate layout to avoid full-page reflow */
.schedule-grid,
.timetable-grid,
.course-list {
  contain: layout style paint;
  transform: translateZ(0);
}

/* Individual course cards: promote to own layer for hover/animation */
.course-card,
.today-course {
  will-change: transform;
  transform: translateZ(0);
}

/* Floating nav: keep composited for sticky positioning */
.app-tabs {
  will-change: transform !important;
  transform: translateX(-50%) translateZ(0) !important;
}

/* Panels with backdrop-filter: isolate to avoid repaint bleed */
.today-panel,
.schedule-panel,
.editor-panel,
.settings-panel,
.settings-group,
#todayCourseList,
.today-course-list {
  contain: layout style paint;
  transform: translateZ(0);
}

/* Share code modal: GPU-accelerate backdrop fade */
.sharecode-backdrop {
  will-change: opacity;
  transform: translateZ(0);
}

.sharecode-panel {
  will-change: transform, opacity;
  transform: translateZ(0);
}

/* Scrolling containers: promote to avoid jank */
.schedule-panel,
.editor-panel,
.settings-panel,
.sharecode-body {
  -webkit-overflow-scrolling: touch;
}

function migrateLegacyStorage() {
  Object.entries(LEGACY_STORAGE_KEYS).forEach(([targetKey, legacyKeys]) => {
    migrateStorageKey(targetKey, legacyKeys);
  });
}

function migrateStorageKey(targetKey, legacyKeys) {
  try {
    if (localStorage.getItem(targetKey) != null) return;
  } catch {
    return;
  }

  for (const legacyKey of legacyKeys) {
    try {
      const value = localStorage.getItem(legacyKey);
      if (value != null) {
        localStorage.setItem(targetKey, value);
        localStorage.removeItem(legacyKey);
        return;
      }
    } catch {
      // Keep trying other legacy keys.
    }
  }
}

function loadSchedule() {
  try {
    const cached = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (cached && Array.isArray(cached.courses)) return normalizeSchedule(cached);
  } catch {
    localStorage.removeItem(STORAGE_KEY);
  }
  return normalizeSchedule(fallbackSchedule);
}

function loadSettings(schedule) {
  let stored = {};
  try {
    stored = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
  } catch {
    localStorage.removeItem(SETTINGS_KEY);
  }
  const hasStoredStart = Object.prototype.hasOwnProperty.call(stored, 'semesterStart') && stored.semesterStart;
  const hasStoredWeeks = Object.prototype.hasOwnProperty.call(stored, 'semesterWeeks');

  const normalized = {
    ...DEFAULT_SETTINGS,
    ...stored,
    visibleFields: Array.isArray(stored.visibleFields) ? stored.visibleFields : DEFAULT_SETTINGS.visibleFields
  };
  if (!hasStoredStart) normalized.semesterStart = getScheduleStart(schedule);
  normalized.semesterWeeks = hasStoredWeeks
    ? toPositiveInt(normalized.semesterWeeks, getScheduleWeeks(schedule))
    : getScheduleWeeks(schedule);
  normalized.cellHeight = toPositiveInt(normalized.cellHeight, DEFAULT_SETTINGS.cellHeight);
  normalized.cellRadius = toPositiveInt(normalized.cellRadius, DEFAULT_SETTINGS.cellRadius);
  normalized.cellGap = toPositiveInt(normalized.cellGap, DEFAULT_SETTINGS.cellGap);
  normalized.courseOpacity = clampNumber(Number(normalized.courseOpacity), 0.2, 1, DEFAULT_SETTINGS.courseOpacity);
  normalized.cardOpacity = clampNumber(Number(normalized.cardOpacity), 0, 1, DEFAULT_SETTINGS.cardOpacity);
  normalized.languageMode = LANGUAGE_MODES.includes(normalized.languageMode) ? normalized.languageMode : DEFAULT_SETTINGS.languageMode;
  normalized.themeMode = THEME_MODES.includes(normalized.themeMode) ? normalized.themeMode : DEFAULT_SETTINGS.themeMode;
  return normalized;
}

function normalizeSchedule(schedule) {
  const timeSlots = normalizeTimeSlots(schedule.timeSlots);
  const semesterStart = getScheduleStart(schedule);
  const semesterWeeks = getScheduleWeeks(schedule);

  return {
    semesterStart,
    semesterWeeks,
    timeSlots,
    config: {
      ...(schedule.config || {}),
      semesterStartDate: semesterStart,
      semesterTotalWeeks: semesterWeeks
    },
    courses: (schedule.courses || []).map((course) => normalizeCourse(course, timeSlots))
  };
}

function normalizeCourse(course, timeSlots) {
  const [timeStart, timeEnd] = String(course.time || '').split('-').map((part) => part.trim());
  const customStart = course.customStartTime || course.startTime || timeStart || '';
  const customEnd = course.customEndTime || course.endTime || timeEnd || '';
  const inferredStart = findSlotByTime(timeSlots, customStart, 'startTime') || 1;
  const inferredEnd = findSlotByTime(timeSlots, customEnd, 'endTime') || inferredStart;
  const startSection = Number(course.startSection || course.startPeriod || course.sectionStart || inferredStart);
  const endSection = Number(course.endSection || course.endPeriod || course.sectionEnd || inferredEnd || startSection);
  const startSlot = timeSlots.find((slot) => slot.number === startSection);
  const endSlot = timeSlots.find((slot) => slot.number === endSection);
  const normalized = {
    id: course.id || '',
    name: course.name || course.courseName || '未命名课程',
    teacher: course.teacher || '未填写老师',
    location: course.location || course.position || course.room || '未填写地点',
    dayOfWeek: normalizeDay(course.dayOfWeek || course.weekday || course.day || 1),
    weeks: normalizeWeeks(course.weeks || course.weekText || '1-16'),
    weekParity: normalizeWeekParity(course.weekParity || course.parity || course.repeat || 'all'),
    startSection,
    endSection,
    startTime: customStart || startSlot?.startTime || '',
    endTime: customEnd || endSlot?.endTime || ''
  };
  normalized.customTimeEnabled = Boolean(course.customTimeEnabled || course.customTime)
    || normalized.startTime !== (startSlot?.startTime || '')
    || normalized.endTime !== (endSlot?.endTime || '');
  normalized.id = normalized.id || createCourseId(normalized);
  return normalized;
}

function findSlotByTime(timeSlots, time, key) {
  if (!time) return null;
  const exact = timeSlots.find((slot) => slot[key] === time);
  if (exact) return exact.number;
  const target = timeToMinutes(time);
  if (!Number.isFinite(target)) return null;
  const scored = timeSlots
    .map((slot) => ({ slot, distance: Math.abs(timeToMinutes(slot[key]) - target) }))
    .filter((item) => Number.isFinite(item.distance))
    .sort((a, b) => a.distance - b.distance);
  return scored[0]?.slot.number || null;
}

function timeToMinutes(time) {
  const [hour, minute] = String(time).split(':').map(Number);
  if (!Number.isFinite(hour) || !Number.isFinite(minute)) return NaN;
  return hour * 60 + minute;
}

function getScheduleStart(schedule) {
  return schedule.semesterStart
    || schedule.weekStartDate
    || schedule.config?.semesterStartDate
    || fallbackSchedule.semesterStart
    || formatDateInput(startOfWeek(new Date()));
}

function getScheduleWeeks(schedule) {
  return toPositiveInt(schedule.semesterWeeks || schedule.totalWeeks || schedule.config?.semesterTotalWeeks, fallbackSchedule.semesterWeeks);
}

function normalizeTimeSlots(slots) {
  const source = Array.isArray(slots) && slots.length ? slots : DEFAULT_TIME_SLOTS;
  return source
    .map((slot, index) => ({
      number: Number(slot.number || slot.section || slot.period || index + 1),
      startTime: slot.startTime || slot.start || '',
      endTime: slot.endTime || slot.end || ''
    }))
    .filter((slot) => Number.isFinite(slot.number))
    .sort((a, b) => a.number - b.number);
}

function normalizeDay(value) {
  const day = Number(value);
  return day >= 1 && day <= 7 ? day : 1;
}

function normalizeWeeks(weeks) {
  if (Array.isArray(weeks)) return weeks.join(',');
  return String(weeks)
    .replace(/[第周]/g, '')
    .replace(/\s+/g, '');
}

function normalizeWeekParity(value) {
  const text = String(value || 'all').toLowerCase();
  if (['odd', 'single', 'dan', '单', '单周'].includes(text)) return 'odd';
  if (['even', 'double', 'shuang', '双', '双周'].includes(text)) return 'even';
  return 'all';
}

function saveCourse(event) {
  event.preventDefault();
  const useCustomTime = Boolean(els.fields.customTimeEnabled?.checked);
  let startSection;
  let endSection;
  let startTime;
  let endTime;

  if (useCustomTime) {
    startTime = els.fields.startTime.value;
    endTime = els.fields.endTime.value;
    if (!startTime || !endTime) {
      showStatus(t('customTimeRequired'));
      return;
    }
    if (timeToMinutes(endTime) <= timeToMinutes(startTime)) {
      showStatus(t('endTimeAfterStart'));
      return;
    }
    startSection = findSlotByTime(state.timeSlots, startTime, 'startTime') || 1;
    endSection = findSlotByTime(state.timeSlots, endTime, 'endTime') || startSection;
    if (endSection < startSection) endSection = startSection;
  } else {
    startSection = Number(els.fields.startSection.value);
    endSection = Number(els.fields.endSection.value);
    if (endSection < startSection) {
      showStatus(t('endSectionAfterStart'));
      return;
    }
    startTime = getSlotTime(startSection, 'startTime') || els.fields.startTime.value;
    endTime = getSlotTime(endSection, 'endTime') || els.fields.endTime.value;
  }

  const course = {
    id: els.fields.id.value || createId(),
    name: els.fields.name.value.trim(),
    teacher: els.fields.teacher.value.trim(),
    location: els.fields.location.value.trim(),
    dayOfWeek: Number(els.fields.dayOfWeek.value),
    weeks: els.fields.weeks.value.trim(),
    weekParity: normalizeWeekParity(els.fields.weekParity?.value || 'all'),
    startSection,
    endSection,
    customTimeEnabled: useCustomTime,
    startTime,
    endTime
  };

  const existingIndex = state.courses.findIndex((item) => item.id === course.id);
  if (existingIndex >= 0) state.courses[existingIndex] = course;
  else state.courses.push(course);

  removeDeletedId(course.id);
  activeDay = course.dayOfWeek;
  persist();
  renderDayTabs();
  renderTimetable();
  renderToday();
  fillForm(course);
  showPage('schedulePage');
  showStatus(t('savedLocal'));
}
