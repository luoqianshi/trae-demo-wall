<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code大富翁 - Python编程闯关游戏</title>
<style>
/* ============ 设计变量 ============ */
:root{
  --bg:#FFFBF5;
  --bg2:#FFF3E6;
  --ink:#2D2A26;
  --muted:#7A7568;
  --rule:#E8E0D4;
  --accent:#FF6B35;     /* 橙 - 答题格 */
  --accent2:#2ECC71;    /* 绿 - 代码格 */
  --accent3:#F1C40F;    /* 黄 - 幸运格 */
  --danger:#E74C3C;     /* 红 - 陷阱格 */
  --purple:#9B59B6;     /* 紫 - 起点终点 */
  --font:'WorkSans','PingFang SC','Microsoft YaHei',sans-serif;
  --font-display:'BigShoulders','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono:'JetBrainsMono','Consolas',monospace;
  --radius:12px;
  --shadow:0 4px 24px rgba(45,42,38,0.08);
  --shadow-lg:0 8px 32px rgba(45,42,38,0.15);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font);
  color:var(--ink);
  background:var(--bg);
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}

/* ============ 开始界面 ============ */
.start-screen{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#FF6B35 0%,#FF8C42 40%,#F1C40F 100%);
  padding:1.5rem;
}
.start-screen::before{
  content:'';position:absolute;inset:0;
  background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80"><circle cx="40" cy="40" r="2" fill="rgba(255,255,255,0.15)"/></svg>') repeat;
  background-size:40px 40px;
}
.start-card{
  position:relative;z-index:2;
  background:#fff;border-radius:20px;
  padding:2.5rem 2rem;max-width:560px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
  text-align:center;
  animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.start-badge{
  display:inline-block;background:rgba(255,107,53,0.1);color:var(--accent);
  font-size:0.75rem;font-weight:700;letter-spacing:0.1em;
  padding:0.35rem 1rem;border-radius:20px;margin-bottom:1rem;
}
.start-card h1{
  font-family:var(--font-display);font-size:2.6rem;line-height:1.1;
  color:var(--ink);margin-bottom:0.5rem;
}
.start-card h1 span{display:block;font-size:1.1rem;font-weight:400;color:var(--muted);margin-top:0.3rem}
.start-desc{color:var(--muted);font-size:0.95rem;margin:1rem 0 1.5rem}
.char-label{font-weight:700;font-size:0.95rem;margin-bottom:0.8rem;color:var(--ink)}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.8rem;margin-bottom:1.5rem}
.char-option{
  cursor:pointer;border:3px solid var(--rule);border-radius:14px;
  padding:0.6rem;background:#fff;transition:all 0.2s;position:relative;
}
.char-option:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.char-option.selected{border-color:var(--accent);background:rgba(255,107,53,0.05);transform:translateY(-3px)}
.char-option img{width:100%;aspect-ratio:1;border-radius:10px;display:block;object-fit:cover}
.char-name{font-size:0.75rem;font-weight:600;margin-top:0.4rem;color:var(--ink)}
.char-check{
  position:absolute;top:-8px;right:-8px;width:24px;height:24px;
  background:var(--accent);color:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:0.8rem;
  opacity:0;transition:opacity 0.2s;
}
.char-option.selected .char-check{opacity:1}
.btn-start{
  width:100%;background:var(--accent);color:#fff;border:none;
  padding:0.9rem 1.5rem;font-size:1.05rem;font-weight:700;
  border-radius:12px;cursor:pointer;transition:all 0.2s;
  font-family:var(--font);letter-spacing:0.03em;
}
.btn-start:hover{background:#E55A2B;transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,0.4)}
.btn-start:active{transform:translateY(0)}
.btn-start:disabled{background:var(--rule);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}

/* ============ 游戏主界面 ============ */
.game-screen{display:none;min-height:100vh;padding:1.2rem;max-width:1600px;margin:0 auto}
.game-screen.active{display:block}

/* 顶部状态栏样式（已移入右侧信息栏） */
.topbar-title{font-family:var(--font-display);font-size:1.6rem;color:var(--ink);margin-bottom:0.6rem}
.topbar-title span{color:var(--accent)}
.stats-card{padding-bottom:0.8rem}
/* 状态项用2列网格，每项宽度充足不挤压 */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.stat-item{
  display:flex;align-items:center;gap:0.4rem;
  background:var(--bg2);padding:0.5rem 0.7rem;border-radius:8px;
  font-size:0.9rem;font-weight:600;
  white-space:nowrap;overflow:hidden;
}
.stat-icon{font-size:1.1rem;flex-shrink:0}
.stat-value{color:var(--accent);font-weight:700;font-size:1.05rem;margin-left:auto;flex-shrink:0}
.stat-value.green{color:var(--accent2)}
.stat-value.yellow{color:var(--accent3)}

/* 游戏主体布局 - 左右两部分：左棋盘 + 右信息栏 */
.game-main{
  display:grid;
  grid-template-columns:minmax(0,1fr) 320px;
  gap:1rem;align-items:start;
}
@media(max-width:1100px){.game-main{grid-template-columns:1fr}}

/* 棋盘容器 - 高度增加，等比放大 */
.board-wrap{
  background:#fff;border-radius:var(--radius);padding:1.2rem;
  box-shadow:var(--shadow);position:relative;
  display:flex;justify-content:center;align-items:center;
  min-height:calc(100vh - 3rem);
}
.board{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  grid-template-rows:repeat(7,1fr);
  gap:5px;width:100%;max-width:760px;aspect-ratio:1;
  background:var(--bg2);padding:10px;border-radius:14px;
}
.cell{
  background:#fff;border-radius:9px;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:5px;cursor:default;transition:all 0.3s;
  border:2px solid transparent;min-height:88px;
}
.cell.start{background:linear-gradient(135deg,#9B59B6,#8E44AD);color:#fff}
.cell.end{background:linear-gradient(135deg,#F1C40F,#FF6B35);color:#fff}
.cell.question{background:linear-gradient(135deg,#FF6B35,#FF8C42);color:#fff}
.cell.code{background:linear-gradient(135deg,#2ECC71,#27AE60);color:#fff}
.cell.lucky{background:linear-gradient(135deg,#F1C40F,#F39C12);color:var(--ink)}
.cell.trap{background:linear-gradient(135deg,#E74C3C,#C0392B);color:#fff}
.cell.current{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(255,107,53,0.35);
  transform:scale(1.06);z-index:5;
}
.cell-icon{font-size:1.9rem;line-height:1}
.cell-name{font-size:0.8rem;font-weight:700;text-align:center;line-height:1.2;margin-top:4px}
.cell-num{
  position:absolute;top:4px;left:6px;font-size:0.68rem;
  opacity:0.85;font-weight:700;
}
/* 玩家棋子 - 适配放大后的格子 */
.player-token{
  position:absolute;width:46px;height:46px;border-radius:50%;
  border:3px solid #fff;
  box-shadow:0 3px 12px rgba(0,0,0,0.4),0 0 0 2px var(--accent);
  background-size:cover;background-position:center;
  z-index:10;transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.player-token.moving{animation:tokenBounce 0.3s}
@keyframes tokenBounce{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}

/* 棋盘中心 */
.board-center{
  grid-column:2/7;grid-row:2/7;
  background:linear-gradient(135deg,rgba(255,107,53,0.05),rgba(46,204,113,0.05));
  border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:1rem;
  position:relative;overflow:hidden;
}
.center-logo{
  font-family:var(--font-display);font-size:2.2rem;color:var(--accent);
  text-align:center;line-height:1.1;margin-bottom:0.8rem;
}
.center-logo span{display:block;font-size:1rem;color:var(--muted);font-family:var(--font)}
.center-dice-area{
  display:flex;flex-direction:column;align-items:center;gap:0.9rem;
}
.dice{
  width:88px;height:88px;background:#fff;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;font-weight:700;color:var(--accent);
  box-shadow:0 7px 24px rgba(0,0,0,0.16);cursor:pointer;
  transition:all 0.2s;user-select:none;
  border:3px solid var(--accent);
}
.dice:hover:not(.rolling){transform:translateY(-3px);box-shadow:0 11px 30px rgba(255,107,53,0.32)}
.dice.rolling{animation:diceRoll 0.6s linear infinite;cursor:wait}
@keyframes diceRoll{
  0%{transform:rotate(0) scale(1)}
  25%{transform:rotate(90deg) scale(1.1)}
  50%{transform:rotate(180deg) scale(1)}
  75%{transform:rotate(270deg) scale(1.1)}
  100%{transform:rotate(360deg) scale(1)}
}
.btn-roll{
  background:var(--accent);color:#fff;border:none;
  padding:0.75rem 1.9rem;font-size:1.1rem;font-weight:700;
  border-radius:11px;cursor:pointer;transition:all 0.2s;
  font-family:var(--font);letter-spacing:0.03em;
}
.btn-roll:hover{background:#E55A2B;transform:translateY(-2px)}
.btn-roll:disabled{background:var(--rule);color:var(--muted);cursor:not-allowed;transform:none}
.center-hint{font-size:0.9rem;color:var(--muted);text-align:center;margin-top:0.5rem;font-weight:600}

/* 右侧信息面板 - 纵向单列 */
.side-panel{display:flex;flex-direction:column;gap:0.8rem}
.panel-card{
  background:#fff;border-radius:var(--radius);padding:0.9rem 1.1rem;
  box-shadow:var(--shadow);
}
.panel-title{
  font-family:var(--font-display);font-size:1rem;color:var(--ink);
  margin-bottom:0.6rem;padding-bottom:0.4rem;
  border-bottom:2px solid var(--accent);
}
.player-info{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.5rem}
.player-avatar{
  width:48px;height:48px;border-radius:50%;border:3px solid var(--accent);
  background-size:cover;background-position:center;flex-shrink:0;
  box-shadow:0 3px 10px rgba(255,107,53,0.3);
}
.player-details{flex:1;min-width:0}
.player-name{font-weight:700;font-size:0.98rem}
.player-pos{font-size:0.78rem;color:var(--muted)}
.progress-bar{
  height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;
  margin-top:0.4rem;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));
  border-radius:4px;transition:width 0.5s;
}
.log-list{
  max-height:280px;overflow-y:auto;font-size:0.78rem;
}
.log-item{
  padding:0.4rem 0.5rem;border-bottom:1px solid var(--rule);
  color:var(--muted);
}
.log-item:last-child{border-bottom:none}
.log-item .log-time{font-size:0.7rem;color:var(--accent);font-weight:700}
.log-item.correct{color:var(--accent2)}
.log-item.wrong{color:var(--danger)}
.log-item.lucky{color:var(--accent3)}
.log-item.trap{color:var(--danger)}

/* 图例 */
.legend{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;font-size:0.75rem}
.legend-item{display:flex;align-items:center;gap:0.3rem}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* ============ 答题弹窗 ============ */
.modal-mask{
  position:fixed;inset:0;background:rgba(45,42,38,0.6);
  display:none;align-items:center;justify-content:center;
  z-index:200;padding:1rem;backdrop-filter:blur(4px);
}
.modal-mask.active{display:flex;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:#fff;border-radius:16px;max-width:560px;width:100%;
  max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn{from{opacity:0;transform:translateY(40px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{
  padding:1.2rem 1.5rem;border-bottom:2px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-family:var(--font-display);font-size:1.3rem;color:var(--ink)}
.modal-title span{color:var(--accent)}
.modal-badge{
  font-size:0.7rem;font-weight:700;padding:0.25rem 0.7rem;
  border-radius:12px;background:rgba(255,107,53,0.1);color:var(--accent);
}
.modal-body{padding:1.8rem}
.question-text{font-size:1.2rem;font-weight:600;margin-bottom:1rem;line-height:1.7}
.code-block{
  background:#2D2A26;color:#E8E0D4;border-radius:10px;
  padding:1.1rem 1.3rem;font-family:var(--font-mono);font-size:1rem;
  line-height:1.8;margin:0.8rem 0;overflow-x:auto;white-space:pre;
}
.code-block .kw{color:#FF6B35}
.code-block .str{color:#2ECC71}
.code-block .cm{color:#7A7568}
.code-block .fn{color:#F1C40F}
.code-block .num{color:#9B59B6}
.options{display:flex;flex-direction:column;gap:0.8rem;margin-top:1.2rem}
.option{
  display:flex;align-items:center;gap:1rem;
  padding:1rem 1.2rem;border:2px solid var(--rule);border-radius:12px;
  cursor:pointer;transition:all 0.2s;background:#fff;
}
.option:hover{border-color:var(--accent);background:rgba(255,107,53,0.03)}
.option.selected{border-color:var(--accent);background:rgba(255,107,53,0.08)}
.option.correct{border-color:var(--accent2);background:rgba(46,204,113,0.1)}
.option.wrong{border-color:var(--danger);background:rgba(231,76,60,0.1)}
.option-letter{
  width:36px;height:36px;border-radius:50%;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:1.05rem;color:var(--ink);flex-shrink:0;
}
.option.selected .option-letter{background:var(--accent);color:#fff}
.option.correct .option-letter{background:var(--accent2);color:#fff}
.option.wrong .option-letter{background:var(--danger);color:#fff}
.option-text{flex:1;font-size:1.05rem;font-family:var(--font-mono)}
.modal-footer{
  padding:1rem 1.5rem;border-top:2px solid var(--rule);
  display:flex;justify-content:flex-end;gap:0.6rem;
}
.btn{
  padding:0.6rem 1.3rem;font-size:0.9rem;font-weight:700;
  border-radius:8px;cursor:pointer;transition:all 0.2s;
  font-family:var(--font);border:none;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#E55A2B}
.btn-primary:disabled{background:var(--rule);color:var(--muted);cursor:not-allowed}
.btn-secondary{background:var(--bg2);color:var(--ink)}
.btn-secondary:hover{background:var(--rule)}

/* ============ 结果反馈 ============ */
.result-icon{font-size:3rem;text-align:center;margin-bottom:0.5rem}
.result-title{text-align:center;font-family:var(--font-display);font-size:1.5rem;margin-bottom:0.5rem}
.result-title.correct{color:var(--accent2)}
.result-title.wrong{color:var(--danger)}
.result-answer{
  background:var(--bg2);border-radius:8px;padding:0.8rem 1rem;
  margin:0.8rem 0;font-size:0.9rem;
}
.result-answer strong{color:var(--accent)}
.result-explain{
  font-size:0.85rem;color:var(--muted);line-height:1.6;
  margin:0.5rem 0;padding:0.6rem;border-left:3px solid var(--accent3);
  background:rgba(241,196,15,0.05);
}
.result-reward{
  display:flex;justify-content:center;gap:1rem;margin-top:0.8rem;
  font-size:0.9rem;font-weight:700;
}
.reward-item{display:flex;align-items:center;gap:0.3rem}
.reward-item.plus{color:var(--accent2)}
.reward-item.minus{color:var(--danger)}

/* ============ 事件弹窗（幸运/陷阱） ============ */
.event-modal{text-align:center}
.event-icon{font-size:3.5rem;margin-bottom:0.5rem;animation:eventPop 0.5s}
@keyframes eventPop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.event-title{font-family:var(--font-display);font-size:1.6rem;margin-bottom:0.5rem}
.event-title.lucky{color:var(--accent3)}
.event-title.trap{color:var(--danger)}
.event-desc{font-size:0.95rem;color:var(--muted);margin-bottom:1rem;line-height:1.6}

/* ============ 胜利界面 ============ */
.win-screen{
  position:fixed;inset:0;z-index:300;display:none;
  align-items:center;justify-content:center;
  background:linear-gradient(135deg,#F1C40F 0%,#FF6B35 50%,#2ECC71 100%);
  padding:1.5rem;
}
.win-screen.active{display:flex;animation:fadeIn 0.5s}
.win-screen::before{
  content:'';position:absolute;inset:0;
  background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="3" fill="rgba(255,255,255,0.2)"/></svg>') repeat;
  background-size:50px 50px;
}
.win-card{
  position:relative;z-index:2;background:#fff;border-radius:20px;
  padding:2.5rem 2rem;max-width:480px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.win-trophy{font-size:4rem;animation:trophyBounce 1s ease infinite}
@keyframes trophyBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.win-card h2{font-family:var(--font-display);font-size:2.2rem;color:var(--accent);margin:0.5rem 0}
.win-card p{color:var(--muted);margin-bottom:1rem}
.win-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:0.8rem;
  margin:1.2rem 0;padding:1rem;background:var(--bg2);border-radius:12px;
}
.win-stat-num{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--accent)}
.win-stat-label{font-size:0.75rem;color:var(--muted);font-weight:600}
.confetti{
  position:absolute;width:10px;height:10px;background:var(--accent3);
  animation:confettiFall 3s linear infinite;
}
@keyframes confettiFall{0%{transform:translateY(-100vh) rotate(0)}100%{transform:translateY(100vh) rotate(720deg)}}

/* ============ 响应式 ============ */
@media(max-width:1100px){
  .board{max-width:620px}
  .cell{min-height:72px}
  .cell-icon{font-size:1.5rem}
  .cell-name{font-size:0.68rem}
  .player-token{width:36px;height:36px}
  .center-logo{font-size:1.7rem}
  .center-logo span{font-size:0.85rem}
  .dice{width:70px;height:70px;font-size:2.2rem}
  .board-wrap{min-height:auto}
}
@media(max-width:640px){
  .start-card h1{font-size:2rem}
  .start-card h1 span{font-size:0.95rem}
  .char-grid{grid-template-columns:repeat(2,1fr)}
  .board{max-width:100%}
  .cell{min-height:54px;padding:3px}
  .cell-icon{font-size:1.1rem}
  .cell-name{font-size:0.52rem}
  .cell-num{font-size:0.5rem}
  .player-token{width:26px;height:26px;border-width:2px}
  .center-logo{font-size:1.2rem}
  .center-logo span{font-size:0.7rem}
  .dice{width:52px;height:52px;font-size:1.7rem}
  .btn-roll{padding:0.5rem 1.2rem;font-size:0.9rem}
  .question-text{font-size:1rem}
  .option-text{font-size:0.9rem}
}
</style>
</head>
<body>

<!-- ============ 开始界面 ============ -->
<div class="start-screen" id="startScreen">
  <div class="start-card">
    <div class="start-badge">TRAE AI 创造力大赛 · 学习工作赛道</div>
    <h1>Code大富翁<span>用大富翁玩转 Python 编程入门</span></h1>

/* ============ 初始化 ============ */
function init(){
  renderCharGrid();
  document.getElementById('btnStart').addEventListener('click', startGame);
}

/* 渲染角色选择 */
function renderCharGrid(){
  const grid = document.getElementById('charGrid');
  grid.innerHTML = CHARACTERS.map(c => `
    <div class="char-option" data-id="${c.id}" onclick="selectChar(${c.id})">
      <div class="char-check">✓</div>
      <img src="${c.img}" alt="${c.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23FF6B35%22/><text x=%2250%22 y=%2255%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22white%22>${c.name[0]}</text></svg>'">
      <div class="char-name">${c.name}</div>
    </div>
  `).join('');
}

/* 选择角色 */
function selectChar(id){
  game.selectedChar = id;
  document.querySelectorAll('.char-option').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.id) === id);
  });
  document.getElementById('btnStart').disabled = false;
}

/* 开始游戏 */
function startGame(){
  const char = CHARACTERS[game.selectedChar];
  document.getElementById('playerAvatar').style.backgroundImage = `url('${char.img}')`;
  document.getElementById('playerName').textContent = char.name;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('active');
  renderBoard();
  updateStats();
  addLog('游戏开始！选择角色：' + char.name, '');
}

function renderBoard(){
  const board = document.getElementById('board');
  // 24格环形布局：7列x7行，外圈一圈
  // 布局：底行(7格) + 右列(5格) + 顶行(7格) + 左列(5格) = 24格
  const positions = generateBoardPositions();
  let html = '';
  for(let i = 0; i < 24; i++){
    const cell = BOARD_CELLS[i];
    const pos = positions[i];
    const isCurrent = i === game.position;
    html += `<div class="cell ${cell.type} ${isCurrent ? 'current' : ''}"
      style="grid-column:${pos.col}/span 1;grid-row:${pos.row}/span 1"
      data-index="${i}">
      <div class="cell-num">${i}</div>
      <div class="cell-icon">${cell.icon}</div>
      <div class="cell-name">${cell.name}</div>
      ${isCurrent ? `<div class="player-token" id="playerToken" style="background-image:url('${CHARACTERS[game.selectedChar].img}')"></div>` : ''}
    </div>`;
  }
  // 中心区域
  html += `<div class="board-center">
    <div class="center-logo">Code大富翁<span>Python编程闯关</span></div>
    <div class="center-dice-area">
      <div class="dice" id="dice" onclick="rollDice()">🎲</div>
      <button class="btn-roll" id="btnRoll" onclick="rollDice()">掷骰子</button>
      <div class="center-hint" id="centerHint">点击掷骰子开始冒险</div>
    </div>
  </div>`;
  board.innerHTML = html;
}

/* 生成棋盘格子位置（7x7网格，外圈环形） */
function generateBoardPositions(){
  // 底行：0-6 (col 1-7, row 7)
  // 右列：7-11 (col 7, row 6-2)
  // 顶行：12-18 (col 7-1, row 1)  注意反向
  // 左列：19-23 (col 1, row 2-6)
  const positions = [];
  // 底行 0-6
  for(let c = 1; c <= 7; c++) positions.push({row:7, col:c});
  // 右列 7-11
  for(let r = 6; r >= 2; r--) positions.push({row:r, col:7});
  // 顶行 12-18 (从右到左)
  for(let c = 7; c >= 1; c--) positions.push({row:1, col:c});
  // 左列 19-23 (从上到下)
  for(let r = 2; r <= 6; r++) positions.push({row:r, col:1});
  return positions;
}

/* ============ 掷骰子 ============ */
function rollDice(){
  if(!game.canRoll || game.isRolling || game.isMoving) return;
  if(game.skipNextRound){
    addLog('本回合被跳过（陷阱惩罚）', 'trap');
    game.skipNextRound = false;
    game.round++;
    updateStats();
    return;
  }
  game.isRolling = true;
  game.canRoll = false;
  const dice = document.getElementById('dice');
  const btnRoll = document.getElementById('btnRoll');
  dice.classList.add('rolling');
  btnRoll.disabled = true;
  document.getElementById('centerHint').textContent = '骰子滚动中...';

  // 动画过程中显示随机数字
  const rollAnim = setInterval(() => {
    dice.textContent = Math.floor(Math.random() * 6) + 1;
  }, 80);

  setTimeout(() => {
    clearInterval(rollAnim);
    const result = Math.floor(Math.random() * 6) + 1;
    dice.textContent = ['','⚀','⚁','⚂','⚃','⚄','⚅'][result];
    dice.classList.remove('rolling');
    game.isRolling = false;
    addLog(`掷出骰子：${result} 点`, '');
    document.getElementById('centerHint').textContent = `前进 ${result} 格`;
    movePlayer(result);
  }, 800);
}

/* ============ 玩家移动 ============ */
async function movePlayer(steps){
  game.isMoving = true;
  for(let i = 0; i < steps; i++){
    game.position = (game.position + 1) % game.totalCells;
    // 如果经过起点不算，只在到达终点时判定
    if(game.position === 0 && i < steps - 1){
      // 经过起点继续走
    }
    renderBoard();
    updateStats();
    await sleep(300);
  }
  game.isMoving = false;
  // 触发格子事件
  await triggerCellEvent();
}

/* 触发格子事件 */
async function triggerCellEvent(){
  const cell = BOARD_CELLS[game.position];
  addLog(`到达：${cell.name}`, '');

  if(cell.type === 'end'){
    // 到达终点，胜利
    showWinScreen();
    return;
  }

  if(cell.type === 'question' || cell.type === 'code'){
    // 答题
    showQuestion(cell.type === 'code' ? '代码格' : '答题格');
  } else if(cell.type === 'lucky'){
    // 幸运事件
    const event = LUCKY_EVENTS[Math.floor(Math.random() * LUCKY_EVENTS.length)];
    showEvent('lucky', event);
  } else if(cell.type === 'trap'){
    // 陷阱事件
    const event = TRAP_EVENTS[Math.floor(Math.random() * TRAP_EVENTS.length)];
    showEvent('trap', event);
  } else if(cell.type === 'start'){
    // 回到起点，继续
    finishRound();
  } else {
    finishRound();
  }
}

/* ============ 答题弹窗 ============ */
function showQuestion(badge){
  // 随机抽题（不重复）
  let available = QUESTIONS.filter(q => !game.askedQuestions.includes(q.id));
  if(available.length === 0){
    // 题库用完，重置
    game.askedQuestions = [];
    available = QUESTIONS;
  }
  const q = available[Math.floor(Math.random() * available.length)];
  game.askedQuestions.push(q.id);
  game.currentQuestion = q;

  document.getElementById('questionBadge').textContent = `${badge} · ${q.difficulty}级`;

  const body = document.getElementById('questionBody');
  let html = `
    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.5rem">知识点：${q.category}</div>
    <div class="question-text">${q.question}</div>`;
  if(q.code){
    html += `<div class="code-block">${highlightCode(q.code)}</div>`;
  }
  html += `<div class="options" id="optionsList">`;
  q.options.forEach((opt, i) => {
    html += `<div class="option" onclick="selectOption(${i})" data-index="${i}">
      <div class="option-letter">${String.fromCharCode(65 + i)}</div>
      <div class="option-text">${opt}</div>
    </div>`;
  });
  html += `</div>`;
  body.innerHTML = html;

  document.getElementById('questionFooter').innerHTML = `
    <button class="btn btn-primary" id="btnSubmit" onclick="submitAnswer()" disabled>提交答案</button>
  `;
  document.getElementById('questionModal').classList.add('active');
}

/* 代码高亮 */
function highlightCode(code){
  return code
    .replace(/\b(if|else|elif|for|while|in|and|or|not|True|False|None)\b/g, '<span class="kw">$1</span>')
    .replace(/("[^"]*"|'[^']*')/g, '<span class="str">$1</span>')
    .replace(/(#[^\n]*)/g, '<span class="cm">$1</span>')
    .replace(/\b(print|input|range|len|int|str|float|type)\b/g, '<span class="fn">$1</span>')
    .replace(/\b(\d+)\b/g, '<span class="num">$1</span>');
}

/* 选择选项 */
let selectedOption = -1;
function selectOption(idx){
  selectedOption = idx;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('btnSubmit').disabled = false;
}

/* 提交答案 */
function submitAnswer(){
  const q = game.currentQuestion;
  const correct = selectedOption === q.answer;
  game.totalAnswered++;
  if(correct) game.correctCount++;

  // 标记选项
  document.querySelectorAll('.option').forEach((el, i) => {
    if(i === q.answer) el.classList.add('correct');
    else if(i === selectedOption) el.classList.add('wrong');
    el.style.pointerEvents = 'none';
  });

  document.getElementById('btnSubmit').style.display = 'none';

  // 显示结果
  setTimeout(() => {
    showResult(correct, q);
  }, 1000);
}

/* 显示答题结果 - 一轮只走一次骰子的步数，答题不奖励移动 */
function showResult(correct, q){
  const body = document.getElementById('questionBody');
  const isBonus = game.isBonusQuestion;
  if(correct){
    const reward = isBonus ? 30 : 20;
    game.score += reward;
    addLog(isBonus ? `白送题答对了！+${reward}分` : `答对了！+${reward}分（位置不变）`, 'correct');
    body.innerHTML += `<div class="result-reward">
      <div class="reward-item plus">⭐ +${reward}分</div>
      ${isBonus ? '<div class="reward-item plus">🎁 白送题奖励</div>' : ''}
    </div>`;
    document.getElementById('questionFooter').innerHTML = `
      <button class="btn btn-primary" onclick="closeQuestion()">继续游戏</button>
    `;
  } else {
    if(isBonus){
      // 白送题答错不扣分
      addLog('白送题答错了，没关系不扣分（位置不变）', 'wrong');
      body.innerHTML += `<div class="result-reward">
        <div class="reward-item" style="color:var(--muted)">🎁 白送题不扣分</div>
      </div>`;
    } else {
      game.score = Math.max(0, game.score - 10);
      addLog('答错了！-10分（位置不变）', 'wrong');
      body.innerHTML += `<div class="result-reward">
        <div class="reward-item minus">⭐ -10分</div>
      </div>`;
    }
    document.getElementById('questionFooter').innerHTML = `
      <button class="btn btn-primary" onclick="closeQuestion()">继续游戏</button>
    `;
  }
  game.isBonusQuestion = false;  // 重置标志
  updateStats();
}

/* 关闭答题弹窗 - 直接结束本轮，不移动不触发新事件 */
function closeQuestion(){
  document.getElementById('questionModal').classList.remove('active');
  selectedOption = -1;
  game.isBonusQuestion = false;
  finishRound();
}

/* 向前移动 - triggerEvent为false时不触发新格子事件（避免连续答题） */
async function movePlayerForward(steps, triggerEvent){
  game.isMoving = true;
  for(let i = 0; i < steps; i++){
    game.position = (game.position + 1) % game.totalCells;
    renderBoard();
    updateStats();
    await sleep(300);
    if(game.position === game.totalCells - 1){
      // 到达终点
      showWinScreen();
      return;
    }
  }
  game.isMoving = false;
  if(triggerEvent){
    await triggerCellEvent();
  } else {
    finishRound();
  }
}

/* 向后移动 - triggerEvent为false时不触发新格子事件 */
async function movePlayerBackward(steps, triggerEvent){
  game.isMoving = true;
  for(let i = 0; i < steps; i++){
    game.position = (game.position - 1 + game.totalCells) % game.totalCells;
    renderBoard();
    updateStats();
    await sleep(300);
  }
  game.isMoving = false;
  if(triggerEvent){
    await triggerCellEvent();
  } else {
    finishRound();
  }
}

/* ============ 事件弹窗 ============ */
function showEvent(type, event){
  const body = document.getElementById('eventBody');
  // 幸运格 - 入门题白送
  if(event.type === 'bonus_question'){
    body.innerHTML = `
      <div class="event-icon">🎁</div>
      <div class="event-title lucky">Python 小锦囊！</div>
      <div class="event-desc">${event.desc}</div>
      <button class="btn btn-primary" style="margin-top:1rem" onclick="openBonusQuestion()">开始答题（白送）</button>
    `;
    document.getElementById('eventModal').classList.add('active');
    addLog('触发幸运事件：Python 小锦囊', 'lucky');
    return;
  }
  // 幸运格 - 纯加分
  if(event.type === 'score'){
    body.innerHTML = `
      <div class="event-icon">🍀</div>
      <div class="event-title lucky">幸运降临！</div>
      <div class="event-desc">${event.desc}</div>
      <div class="result-reward">
        <div class="reward-item plus">⭐ +${event.score}分</div>
      </div>
      <button class="btn btn-primary" style="margin-top:1rem" onclick="closeEvent(${event.score})">继续游戏</button>
    `;
    document.getElementById('eventModal').classList.add('active');
    addLog(`幸运！+${event.score}分`, 'lucky');
    return;
  }
  // 陷阱格 - 小贴士+扣分
  if(event.type === 'tip'){
    body.innerHTML = `
      <div class="event-icon">💡</div>
      <div class="event-title trap">小贴士</div>
      <div class="event-desc">${event.desc}</div>
      <div class="result-reward">
        <div class="reward-item ${event.score >= 0 ? 'plus' : 'minus'}">⭐ ${event.score >= 0 ? '+' : ''}${event.score}分</div>
      </div>
      <button class="btn btn-primary" style="margin-top:1rem" onclick="closeEvent(${event.score})">记住了！</button>
    `;
    document.getElementById('eventModal').classList.add('active');
    addLog(`小贴士：${event.tip}（${event.score >= 0 ? '+' : ''}${event.score}分）`, 'trap');
    return;
  }
}

/* 幸运格 - 打开白送题目（只抽入门级） */
function openBonusQuestion(){
  document.getElementById('eventModal').classList.remove('active');
  // 抽取入门级题目
  const easyQs = QUESTIONS.filter(q => q.difficulty === '入门' && !game.askedQuestions.includes(q.id));
  let pool = easyQs.length > 0 ? easyQs : QUESTIONS.filter(q => q.difficulty === '入门');
  const q = pool[Math.floor(Math.random() * pool.length)];
  game.askedQuestions.push(q.id);
  game.currentQuestion = q;
  game.isBonusQuestion = true;  // 标记为白送题

  document.getElementById('questionBadge').textContent = `幸运格 · 白送入门题`;
  const body = document.getElementById('questionBody');
  let html = `
    <div style="font-size:0.75rem;color:var(--accent3);margin-bottom:0.5rem;font-weight:700">🎁 这是白送题！答对+30分，答错也不扣分</div>
    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.5rem">知识点：${q.category}</div>
    <div class="question-text">${q.question}</div>`;
  if(q.code){
    html += `<div class="code-block">${highlightCode(q.code)}</div>`;
  }
  html += `<div class="options" id="optionsList">`;
  q.options.forEach((opt, i) => {
    html += `<div class="option" onclick="selectOption(${i})" data-index="${i}">
      <div class="option-letter">${String.fromCharCode(65 + i)}</div>
      <div class="option-text">${opt}</div>
    </div>`;
  });
  html += `</div>`;
  body.innerHTML = html;
  document.getElementById('questionFooter').innerHTML = `
    <button class="btn btn-primary" id="btnSubmit" onclick="submitAnswer()" disabled>提交答案</button>
  `;
  document.getElementById('questionModal').classList.add('active');
}

/* 关闭事件并应用分数效果 - 纯分数，不移动 */
function closeEvent(score){
  document.getElementById('eventModal').classList.remove('active');
  game.score = Math.max(0, game.score + score);
  updateStats();
  finishRound();
}

/* ============ 结束回合 ============ */
function finishRound(){
  game.round++;
  game.canRoll = true;
  updateStats();
  document.getElementById('btnRoll').disabled = false;
  document.getElementById('centerHint').textContent = '点击掷骰子继续';
}

/* ============ 更新状态显示 ============ */
function updateStats(){
  document.getElementById('statPos').textContent = game.position;
  document.getElementById('statScore').textContent = game.score;
  const progress = Math.round((game.position / (game.totalCells - 1)) * 100);
  document.getElementById('statProgress').textContent = progress + '%';
  document.getElementById('statRound').textContent = game.round;

  const cell = BOARD_CELLS[game.position];
  document.getElementById('playerPosText').textContent = `第${game.position}格 · ${cell.name}`;
  document.getElementById('progressFill').style.width = progress + '%';
}

/* ============ 游戏日志 ============ */
function addLog(text, type){
  const logList = document.getElementById('logList');
  const time = `R${game.round}`;
  const item = document.createElement('div');
  item.className = `log-item ${type}`;
  item.innerHTML = `<span class="log-time">[${time}]</span> ${text}`;
  logList.appendChild(item);
  logList.scrollTop = logList.scrollHeight;
}

/* ============ 胜利界面 ============ */
function showWinScreen(){
  document.getElementById('winScore').textContent = game.score;
  document.getElementById('winRounds').textContent = game.round;
  const accuracy = game.totalAnswered > 0 ? Math.round((game.correctCount / game.totalAnswered) * 100) : 0;
  document.getElementById('winAccuracy').textContent = accuracy + '%';
  document.getElementById('winScreen').classList.add('active');
  addLog('🎉 到达终点，游戏胜利！', 'correct');
  // 生成彩纸效果
  for(let i = 0; i < 30; i++){
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.background = ['#FF6B35','#2ECC71','#F1C40F','#E74C3C','#9B59B6'][Math.floor(Math.random()*5)];
    confetti.style.animationDelay = Math.random() * 3 + 's';
    confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
    document.getElementById('winScreen').appendChild(confetti);
  }
}

/* ============ 工具函数 ============ */
function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

/* 启动 */
init();
</script>
