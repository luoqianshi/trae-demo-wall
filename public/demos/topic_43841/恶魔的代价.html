/* ============================================
   恶魔的代价 - 动画样式表
   ============================================ */

/* --- 淡入动画 --- */
@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* --- 从右侧滑入 --- */
@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(30px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* --- 脉冲效果 --- */
@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(1.05);
    opacity: 0.8;
  }
}

/* --- 血迹扩散效果 --- */
@keyframes bloodSpread {
  from {
    transform: scale(0);
    opacity: 0.8;
  }
  to {
    transform: scale(1);
    opacity: 0.3;
  }
}

/* --- 翻页效果 --- */
@keyframes pageFlip {
  from {
    opacity: 0;
    transform: rotateY(-10deg);
  }
  to {
    opacity: 1;
    transform: rotateY(0);
  }
}

/* --- 动画工具类 --- */
.animate-fade-in {
  animation: fadeIn 0.5s ease-out;
}

.animate-slide-in {
  animation: slideInRight 0.4s ease-out;
}

.animate-pulse {
  animation: pulse 2s ease-in-out infinite;
}

.animate-blood-spread {
  animation: bloodSpread 1.5s ease-out;
}

.animate-page-flip {
  animation: pageFlip 0.6s ease-out;
}

/* --- 延迟动画 --- */
.animate-delay-1 {
  animation-delay: 0.1s;
  animation-fill-mode: both;
}

.animate-delay-2 {
  animation-delay: 0.2s;
  animation-fill-mode: both;
}

.animate-delay-3 {
  animation-delay: 0.3s;
  animation-fill-mode: both;
}

.animate-delay-4 {
  animation-delay: 0.4s;
  animation-fill-mode: both;
}

// ============================================
// 前端验证逻辑（替代后端 API）
// ============================================

function validateConnect(ev1, ev2, foundEvidences, connections) {
    // 检查是否已关联
    const alreadyConnected = connections.some(([a, b]) =>
        (a === ev1 && b === ev2) || (a === ev2 && b === ev1)
    )
    if (alreadyConnected) {
        return { exists: true, message: '这两条线索已经关联过了。' }
    }

    // 检查双向 related
    const ev1Data = EVIDENCES[ev1]
    const ev2Data = EVIDENCES[ev2]
    if (!ev1Data || !ev2Data) {
        return { success: false, message: '无效的线索。' }
    }

    const related = ev1Data.related && ev1Data.related.includes(ev2) && ev2Data.related && ev2Data.related.includes(ev1)

    // 查找关联结果（正序和反序都试）
    const key1 = ev1 + '+' + ev2
    const key2 = ev2 + '+' + ev1
    const result = CONNECTION_RESULTS[key1] || CONNECTION_RESULTS[key2]

    if (result) {
        return { success: true, message: result }
    }

    return { success: false, message: '这两条线索之间没有明显的关联。' }
}

function validateAccuse(suspectName, foundEvidences, connections) {
    // 检查是否收集了足够的证据
    const hasAllEvidences = ACCUSE_REQUIREMENTS.required_evidences.every(e => foundEvidences.includes(e))
    if (!hasAllEvidences) {
        return { correct: false, message: '你发现了证据，但还没有理清它们之间的关系。试着在证据板上关联线索。' }
    }

    // 检查是否建立了足够的关联
    const hasRequiredConnection = ACCUSE_REQUIREMENTS.required_connections.some(([a, b]) =>
        connections.some(([x, y]) =>
            (x === a && y === b) || (x === b && y === a)
        )
    )
    if (!hasRequiredConnection) {
        return { correct: false, message: '发现了新的关联，但还需要更多线索。' }
    }

    // 检查是否指认了正确的凶手
    const killer = Object.entries(SUSPECTS).find(([id, s]) => s.is_killer)
    if (killer && killer[1].name === suspectName) {
        return { correct: true, message: '没错！怪盗就是凶手。被勒索的愤怒，加上对张保安虚伪的厌恶，让他冲动杀人。' }
    }

    return { correct: false, message: '指认错误，这个人不是凶手。请重新审视证据。' }
}

// ============================================
// 音效系统（Web Audio API）
// ============================================

let audioCtx = null
let muted = false

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  }
  return audioCtx
}

function playDiscovery() {
  if (muted) return
  try {
    const ctx = getAudioContext()
    const osc = ctx.createOscillator()
    const gain = ctx.createGain()
    osc.connect(gain)
    gain.connect(ctx.destination)
    osc.type = 'sine'
    osc.frequency.setValueAtTime(440, ctx.currentTime)
    osc.frequency.linearRampToValueAtTime(880, ctx.currentTime + 0.15)
    gain.gain.setValueAtTime(0.3, ctx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3)
    osc.start(ctx.currentTime)
    osc.stop(ctx.currentTime + 0.3)
  } catch (e) {}
}

function playConnect() {
  if (muted) return
  try {
    const ctx = getAudioContext()
    const frequencies = [523, 659, 784]
    frequencies.forEach((freq, i) => {
      const osc = ctx.createOscillator()
      const gain = ctx.createGain()
      osc.connect(gain)
      gain.connect(ctx.destination)
      osc.type = 'sine'
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1)
      gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.1)
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.1 + 0.4)
      osc.start(ctx.currentTime + i * 0.1)
      osc.stop(ctx.currentTime + i * 0.1 + 0.4)
    })
  } catch (e) {}
}

function playError() {
  if (muted) return
  try {
    const ctx = getAudioContext()
    const osc = ctx.createOscillator()
    const gain = ctx.createGain()
    osc.connect(gain)
    gain.connect(ctx.destination)
    osc.type = 'sawtooth'
    osc.frequency.setValueAtTime(300, ctx.currentTime)
    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3)
    gain.gain.setValueAtTime(0.2, ctx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4)
    osc.start(ctx.currentTime)
    osc.stop(ctx.currentTime + 0.4)
  } catch (e) {}
}

function toggleMute() {
  muted = !muted
  return muted
}

  currentSuspect: null,
  message: '',
  gameOver: false,
  introPage: 0,
  endingPage: 0,
  hasSave: false,
  showSaveModal: false,
})

const gameData = reactive({
  evidences: { ...EVIDENCES },
  suspects: { ...SUSPECTS },
  connectionResults: { ...CONNECTION_RESULTS },
  scenes: { ...SCENES },
  introPages: [...INTRO_PAGES],
  endingPages: [...ENDING_PAGES],
  accuseRequirements: { ...ACCUSE_REQUIREMENTS },
  loaded: true,
})

function investigateEvidence(evId) {
  if (!gameState.foundEvidences.includes(evId)) {
    gameState.foundEvidences.push(evId)
    gameState.message = `【发现线索】${gameData.evidences[evId].name}: ${gameData.evidences[evId].description}`
  } else {
    gameState.message = `你已经调查过${gameData.evidences[evId].name}了。`
  }
}

function useDialog(suspectId, topic) {
  const key = `${suspectId}_${topic}`
  gameState.usedDialogs[key] = true
  const dialog = gameData.suspects[suspectId].dialogs[topic]
  gameState.message = dialog.content
}

function isTopicAvailable(suspectId, topic) {
  const key = `${suspectId}_${topic}`
  if (gameState.usedDialogs[key]) return 'used'
  const dialog = gameData.suspects[suspectId].dialogs[topic]
  const unlock = dialog.unlock
  if (unlock === null) return 'available'
  if (Array.isArray(unlock)) {
    return unlock.every(e => gameState.foundEvidences.includes(e)) ? 'available' : 'locked'
  }
  return gameState.foundEvidences.includes(unlock) ? 'available' : 'locked'
}

function saveGame() {
  const data = {
    foundEvidences: [...gameState.foundEvidences],
    connections: gameState.connections.map(c => [...c]),
    usedDialogs: { ...gameState.usedDialogs },
    currentScene: gameState.currentScene,
    gameOver: gameState.gameOver,
    timestamp: Date.now()
  }
  localStorage.setItem('demon_cost_save', JSON.stringify(data))
  gameState.hasSave = true
  gameState.showSaveModal = false
  gameState.message = '游戏已保存。'
}

function loadGame() {
  const raw = localStorage.getItem('demon_cost_save')
  if (!raw) return false
  const data = JSON.parse(raw)
  gameState.foundEvidences = data.foundEvidences || []
  gameState.connections = data.connections || []
  gameState.usedDialogs = data.usedDialogs || {}
  gameState.currentScene = data.currentScene || 'crime_scene'
  gameState.gameOver = data.gameOver || false
  gameState.hasSave = true
  gameState.showSaveModal = false
  return true
}

function deleteSave() {
  localStorage.removeItem('demon_cost_save')
  gameState.hasSave = false
  gameState.showSaveModal = false
}

function resetGame() {
  gameState.currentView = 'title'
  gameState.currentScene = 'crime_scene'
  gameState.foundEvidences = []
  gameState.connections = []
  gameState.usedDialogs = {}
  gameState.currentSuspect = null
  gameState.message = ''
  gameState.gameOver = false
  gameState.introPage = 0
  gameState.endingPage = 0
}

function checkSaveExists() {
  gameState.hasSave = !!localStorage.getItem('demon_cost_save')
}

      if (isLastPage.value) {
        gameState.currentView = 'game'
      } else {
        gameState.introPage++
      }
    }
    return { gameState, gameData, currentPageText, isLastPage, nextPage }
  }
}

const EndingScene = {
  name: 'EndingScene',
  template: `
    <div class="story-screen animate-page-flip" :key="gameState.endingPage">
      <h2 class="scene-title">案件真相</h2>
      <div class="story-text">{{ currentPageText }}</div>
      <div class="action-buttons">
        <button class="btn btn-primary" @click="nextPage">
          {{ isLastPage ? '重新开始' : '继续' }}
        </button>
      </div>
      <p class="page-indicator">{{ gameState.endingPage + 1 }} / {{ gameData.endingPages.length }}</p>
    </div>
  `,
  setup() {
    const currentPageText = computed(() => {
      if (gameData.endingPages.length === 0) return '正在加载结局...'
      return gameData.endingPages[gameState.endingPage] || ''
    })
    const isLastPage = computed(() => {
      return gameState.endingPage >= gameData.endingPages.length - 1
    })
    function nextPage() {
      if (isLastPage.value) {
        resetGame()
      } else {
        gameState.endingPage++
      }
    }
    return { gameState, gameData, currentPageText, isLastPage, nextPage }
  }
}

  name: 'CrimeScene',
  components: { SceneIllustration },
  props: {
    location: { type: String, required: true }
  },
  template: `
    <div class="section animate-fade-in">
      <scene-illustration :location="location"></scene-illustration>
      <h2 class="scene-title">{{ sceneName }}</h2>
      <div class="message-box" v-if="gameState.message">{{ gameState.message }}</div>
      <div class="evidence-grid">
        <button
          v-for="ev in sceneEvidences"
          :key="ev.id"
          class="btn"
          :class="isFound(ev.id) ? 'btn-found' : ''"
          @click="investigate(ev.id)"
        >
          {{ isFound(ev.id) ? '✓ ' : '' }}{{ ev.name }}
        </button>
      </div>
      <p v-if="sceneEvidences.length === 0 && gameData.loaded" style="text-align:center; margin-top:20px;">
        这里暂时没有可调查的线索。
      </p>
    </div>
  `,
  setup(props) {
    const sceneName = computed(() => {
      const scene = gameData.scenes[props.location]
      return scene ? scene.name : props.location
    })
    const sceneEvidences = computed(() => {
      return Object.entries(gameData.evidences)
        .filter(([id, ev]) => ev.location === props.location)
        .map(([id, ev]) => ({ id, ...ev }))
    })
    function isFound(evId) {
      return gameState.foundEvidences.includes(evId)
    }
    function investigate(evId) {
      if (!isFound(evId)) {
        playDiscovery()
      }
      investigateEvidence(evId)
    }
    return { gameState, gameData, sceneName, sceneEvidences, isFound, investigate }
  }
}

const DialogPanel = {
  name: 'DialogPanel',
  template: `
    <div class="dialog-panel animate-slide-in">
      <div class="dialog-title">审问：{{ suspect.name }}</div>
      <div class="message-box" v-if="gameState.message">{{ gameState.message }}</div>
      <div class="topic-buttons">
        <button
          v-for="(dialog, topic) in suspect.dialogs"
          :key="topic"
          class="btn btn-small"
          :class="topicClass(topic)"
          @click="askTopic(topic)"
          :disabled="topicStatus(topic) !== 'available'"
        >
          {{ topic }}
          <span v-if="topicStatus(topic) === 'locked'">（未解锁）</span>
          <span v-if="topicStatus(topic) === 'used'">（已询问）</span>
        </button>
      </div>
    </div>
  `,
  setup() {
    const suspect = computed(() => {
      if (!gameState.currentSuspect) return { name: '', dialogs: {} }
      return gameData.suspects[gameState.currentSuspect] || { name: '', dialogs: {} }
    })
    function topicStatus(topic) {
      if (!gameState.currentSuspect) return 'locked'
      return isTopicAvailable(gameState.currentSuspect, topic)
    }
    function topicClass(topic) {
      const status = topicStatus(topic)
      if (status === 'used') return 'btn-disabled'
      if (status === 'locked') return 'btn-disabled'
      return ''
    }
    function askTopic(topic) {
      if (topicStatus(topic) !== 'available') return
      useDialog(gameState.currentSuspect, topic)
    }
    return { gameState, suspect, topicStatus, topicClass, askTopic }
  }
}

const ConnectPanel = {
  name: 'ConnectPanel',
  template: `
    <div class="connect-panel">
      <select v-model="selectedEv1" @change="onSelectionChange">
        <option value="">-- 选择第一条线索 --</option>
        <option v-for="ev in foundEvidences" :key="ev.id" :value="ev.id">
          {{ ev.name }}
        </option>
      </select>
      <select v-model="selectedEv2" @change="onSelectionChange">
        <option value="">-- 选择第二条线索 --</option>
        <option v-for="ev in foundEvidences" :key="ev.id" :value="ev.id">
          {{ ev.name }}
        </option>
      </select>
      <div v-if="previewEv1" class="ev-desc-preview">
        <strong>{{ previewEv1.name }}：</strong>{{ previewEv1.description }}
      </div>
      <div v-if="previewEv2" class="ev-desc-preview">
        <strong>{{ previewEv2.name }}：</strong>{{ previewEv2.description }}
      </div>
      <div class="action-buttons">
        <button
          class="btn btn-primary btn-small"
          :disabled="!canConnect"
          @click="connect"
        >
          建立关联
        </button>
      </div>
      <div v-if="connectResult" class="connection-result" :class="connectResult.type">
        {{ connectResult.message }}
      </div>
      <div v-if="connectionsList.length > 0" class="connections-list">
        <div class="section-title" style="margin-top:16px;">已建立的关联 ({{ connectionsList.length }})</div>
        <div v-for="(conn, index) in connectionsList" :key="index" class="connection-item">
          <span>{{ conn.ev1Name }}</span> ↔ <span>{{ conn.ev2Name }}</span>
        </div>
      </div>
    </div>
  `,
  setup() {
    const selectedEv1 = ref('')
    const selectedEv2 = ref('')
    const connectResult = ref(null)

    const foundEvidences = computed(() => {
      return gameState.foundEvidences.map(evId => {
        const ev = gameData.evidences[evId]
        return ev ? { id: evId, name: ev.name, description: ev.description } : { id: evId, name: evId, description: '' }
      })
    })

    const previewEv1 = computed(() => {
      if (!selectedEv1.value) return null
      return foundEvidences.value.find(e => e.id === selectedEv1.value) || null
    })

    const previewEv2 = computed(() => {
      if (!selectedEv2.value) return null
      return foundEvidences.value.find(e => e.id === selectedEv2.value) || null
    })

    const canConnect = computed(() => {
      return selectedEv1.value && selectedEv2.value && selectedEv1.value !== selectedEv2.value
    })

    const connectionsList = computed(() => {
      return gameState.connections.map(([ev1, ev2]) => {
        const name1 = gameData.evidences[ev1] ? gameData.evidences[ev1].name : ev1
        const name2 = gameData.evidences[ev2] ? gameData.evidences[ev2].name : ev2
        return { ev1, ev2, ev1Name: name1, ev2Name: name2 }
      })
    })

    function onSelectionChange() {
      connectResult.value = null
    }

    function connect() {
      if (!canConnect.value) return

      const result = validateConnect(
        selectedEv1.value,
        selectedEv2.value,
        gameState.foundEvidences,
        gameState.connections
      )

      if (result.success) {
        gameState.connections.push([selectedEv1.value, selectedEv2.value])
        connectResult.value = { type: 'success', message: result.message || '关联建立成功！' }
        playConnect()
        selectedEv1.value = ''
        selectedEv2.value = ''
      } else if (result.exists) {
        connectResult.value = { type: 'exists', message: result.message || '这两条线索已经关联过了。' }
      } else {
        connectResult.value = { type: 'failure', message: result.message || '这两条线索之间没有明显的关联。' }
        playError()
      }
    }

    return {
      selectedEv1, selectedEv2, connectResult,
      foundEvidences, previewEv1, previewEv2,
      canConnect, connectionsList,
      onSelectionChange, connect,
    }
  }
}

const AccusePanel = {
  name: 'AccusePanel',
  template: `
    <div class="accuse-panel">
      <p style="color: var(--text-secondary); margin-bottom: 12px;">
        你认为谁是凶手？选择一名嫌疑人进行指认。
      </p>
      <div class="action-buttons" style="justify-content: flex-start;">
        <button
          v-for="suspect in suspectList"
          :key="suspect.id"
          class="btn btn-danger btn-small"
          @click="accuse(suspect)"
          :disabled="accusing"
        >
          指认 {{ suspect.name }}
        </button>
      </div>
      <div v-if="accuseResult" class="accuse-result" :class="accuseResult.type">
        {{ accuseResult.message }}
      </div>
    </div>
  `,
  setup() {
    const accuseResult = ref(null)
    const accusing = ref(false)
    const suspectList = ref([])

    function updateSuspectList() {
      suspectList.value = Object.entries(gameData.suspects).map(([id, data]) => ({
        id,
        name: data.name,
      }))
    }
    updateSuspectList()

    function accuse(suspect) {
      if (accusing.value) return
      accusing.value = true
      accuseResult.value = null

      const result = validateAccuse(
        suspect.name,
        gameState.foundEvidences,
        gameState.connections
      )

      if (result.correct) {
        accuseResult.value = { type: 'success', message: result.message || '恭喜你，指认正确！' }
        playConnect()
        setTimeout(() => {
          gameState.gameOver = true
          gameState.currentView = 'ending'
        }, 2000)
      } else {
        accuseResult.value = { type: 'failure', message: result.message || '指认错误，请重新思考。' }
        playError()
      }
      accusing.value = false
    }

    return { accuseResult, accusing, suspectList, accuse }
  }
}

        </div>

const SaveLoadModal = {
  name: 'SaveLoadModal',
  template: `
    <div class="modal-overlay" @click.self="close">
      <div class="modal-content animate-fade-in">
        <h3>存档管理</h3>
        <div class="modal-actions">
          <button class="btn btn-primary" @click="save">保存游戏</button>

            class="btn btn-gold"

          <button

            :disabled="!gameState.hasSave"
            @click="removeSave"

            删除存档

          <button class="btn" @click="close">关闭</button>

        <p v-if="!gameState.hasSave" style="color:#666; margin-top:12px; font-size:0.85rem;">

        </p>

    </div>
  `,
  setup() {
    function save() { saveGame() }
    function load() {
      const success = loadGame()

    function close() { gameState.showSaveModal = false }
    return { gameState, save, load, removeSave, close }
  }
}
