<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恶魔的代价 - 破案游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #8B0000;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 2.5em;
            color: #c41e3a;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .scene-title {
            font-size: 1.5em;
            color: #c41e3a;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(139, 0, 0, 0.1);
            border-left: 4px solid #8B0000;
        }
        
        .message-box {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 80px;
            line-height: 1.6;
        }
        
        .message-box .label {
            color: #c41e3a;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: 1px solid #555;
            background: rgba(40, 40, 40, 0.9);
            color: #e0e0e0;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.95em;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn:hover {
            background: rgba(139, 0, 0, 0.3);
            border-color: #8B0000;
        }
        
        .btn.primary {
            background: rgba(139, 0, 0, 0.2);
            border-color: #8B0000;
        }
        
        .btn.primary:hover {
            background: rgba(139, 0, 0, 0.4);
        }
        
        .btn.found {
            border-color: #2e8b57;
            color: #90EE90;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .section {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section h3 {
            color: #c41e3a;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .evidence-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
        }
        
        .evidence-item {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .evidence-item:hover {
            border-color: #8B0000;
            background: rgba(139, 0, 0, 0.1);
        }
        
        .evidence-item.found {
            border-color: #2e8b57;
        }
        
        .evidence-item .name {
            font-weight: bold;
            color: #e0e0e0;
            margin-bottom: 5px;
        }
        
        .evidence-item .desc {
            font-size: 0.85em;
            color: #999;
            line-height: 1.4;
        }
        
        .suspect-card {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .suspect-card:hover {
            border-color: #8B0000;
            background: rgba(139, 0, 0, 0.1);
        }
        
        .suspect-card .name {
            font-size: 1.1em;
            font-weight: bold;
            color: #e0e0e0;
            margin-bottom: 5px;
        }
        
        .suspect-card .role {
            color: #c41e3a;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .suspect-card .desc {
            font-size: 0.85em;
            color: #999;
        }
        
        .dialog-content {
            background: rgba(40, 40, 40, 0.9);
            border-left: 3px solid #c41e3a;
            padding: 15px;
            margin: 15px 0;
            line-height: 1.6;
            font-style: italic;
        }
        
        .connection-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .connection-item {
            background: rgba(139, 0, 0, 0.2);
            border: 1px solid #8B0000;
            border-radius: 5px;
            padding: 10px 15px;
            font-size: 0.9em;
        }
        
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .hidden {
            display: none;
        }
        
        .intro-text {
            text-align: center;
            line-height: 2;
            font-size: 1.1em;
            padding: 40px 20px;
        }
        
        .intro-text p {
            margin-bottom: 20px;
        }
        
        .ending-text {
            text-align: center;
            line-height: 2;
            font-size: 1.1em;
            padding: 40px 20px;
        }
        
        .ending-text p {
            margin-bottom: 20px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(30, 30, 30, 0.9);
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        
        .status-bar span {
            color: #c41e3a;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>恶魔的代价</h1>
            <div class="subtitle">一桩激情杀人的谜案</div>
        </div>
        
        <!-- 标题画面 -->
        <div id="scene-title" class="scene">
            <div class="intro-text">
                <p style="font-size: 1.3em; color: #c41e3a; margin-bottom: 30px;">
                    城郊一栋老旧别墅中发生了一起命案
                </p>
                <p>受害者张保安，被人发现死在别墅客厅中</p>
                <p>现场凌乱，血迹分布不均，墙上留有血字"活该"</p>
                <p style="margin-top: 30px;">嫌疑人就在四人之中</p>
                <p style="margin-top: 30px;">
                    <button class="btn primary" onclick="startGame()" style="font-size: 1.2em; padding: 15px 40px;">
                        开始调查
                    </button>
                </p>
            </div>
        </div>
        
        <!-- 游戏主界面 -->
        <div id="scene-game" class="scene hidden">
            <div class="status-bar">
                <div>已发现线索: <span id="evidence-count">0</span></div>
                <div>已建立关联: <span id="connection-count">0</span></div>
                <div>当前位置: <span id="current-location">案发现场</span></div>
            </div>
            
            <div class="scene-title" id="scene-name">案发现场 - 别墅客厅</div>
            
            <div class="message-box">
                <div class="label">调查记录</div>
                <div id="game-message">你来到了案发现场。空气中弥漫着血腥味。</div>
            </div>
            
            <div class="nav-bar">
                <button class="btn" onclick="showScene('crime_scene')">案发现场</button>
                <button class="btn" onclick="showScene('basement')">地下室</button>
                <button class="btn" onclick="showScene('study')">书房</button>
                <button class="btn" onclick="showScene('office')">物业办公室</button>
                <button class="btn primary" onclick="showScene('interview')">审问嫌疑人</button>
                <button class="btn primary" onclick="showScene('board')">证据板</button>
            </div>
            
            <!-- 案发现场 -->
            <div id="location-crime_scene" class="location-section">
                <div class="section">
                    <h3>现场线索</h3>
                    <div class="action-buttons" id="crime-evidences"></div>
                </div>
            </div>
            
            <!-- 地下室 -->
            <div id="location-basement" class="location-section hidden">
                <div class="section">
                    <h3>地下室线索</h3>
                    <div class="action-buttons" id="basement-evidences"></div>
                </div>
            </div>
            
            <!-- 书房 -->
            <div id="location-study" class="location-section hidden">
                <div class="section">
                    <h3>书房线索</h3>
                    <div class="action-buttons" id="study-evidences"></div>
                </div>
            </div>
            
            <!-- 物业办公室 -->
            <div id="location-office" class="location-section hidden">
                <div class="section">
                    <h3>办公室线索</h3>
                    <div class="action-buttons" id="office-evidences"></div>
                </div>
            </div>
            
            <!-- 审问嫌疑人 -->
            <div id="location-interview" class="location-section hidden">
                <div class="section">
                    <h3>嫌疑人列表</h3>
                    <div id="suspect-list"></div>
                </div>
                <div id="dialog-section" class="section hidden">
                    <h3 id="dialog-suspect-name"></h3>
                    <div class="dialog-content" id="dialog-content"></div>
                    <div class="action-buttons" id="topic-list"></div>
                </div>
            </div>
            
            <!-- 证据板 -->
            <div id="location-board" class="location-section hidden">
                <div class="section">
                    <h3>已发现的线索</h3>
                    <div class="evidence-list" id="board-evidences"></div>
                </div>
                <div class="section">
                    <h3>关联线索</h3>
                    <div id="connect-section">
                        <p style="margin-bottom: 15px; color: #999;">选择两个线索进行关联推理：</p>
                        <div class="action-buttons" id="connect-ev1"></div>
                        <p style="margin: 10px 0; color: #c41e3a;">+</p>
                        <div class="action-buttons" id="connect-ev2"></div>
                        <button class="btn primary" onclick="connectEvidence()" style="margin-top: 15px;">建立关联</button>
                    </div>
                    <div id="connection-result" style="margin-top: 15px; padding: 10px; background: rgba(139, 0, 0, 0.1); border-radius: 5px;"></div>
                </div>
                <div class="section">
                    <h3>已建立的关联</h3>
                    <div class="connection-list" id="connection-list"></div>
                </div>
                <div class="section">
                    <h3>指认凶手</h3>
                    <div class="action-buttons">
                        <button class="btn" onclick="accuse('怪盗')">指认怪盗</button>
                        <button class="btn" onclick="accuse('张老板')">指认张老板</button>
                        <button class="btn" onclick="accuse('李记者')">指认李记者</button>
                        <button class="btn" onclick="accuse('王医生')">指认王医生</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 结局画面 -->
        <div id="scene-ending" class="scene hidden">
            <div class="ending-text">
                <p style="font-size: 1.5em; color: #c41e3a; margin-bottom: 30px;">真相大白</p>
                <p id="ending-message"></p>
                <p style="margin-top: 30px;">
                    <button class="btn primary" onclick="resetGame()" style="font-size: 1.1em; padding: 12px 30px;">
                        重新开始
                    </button>
                </p>
            </div>
        </div>
    </div>
    
    <script>
        let gameState = {};
        let selectedEv1 = null;
        let selectedEv2 = null;
        let currentSuspect = null;
        
        // 场景名称映射
        const sceneNames = {
            'crime_scene': '案发现场 - 别墅客厅',
            'basement': '地下室',
            'study': '书房',
            'office': '物业办公室',
            'interview': '审问嫌疑人',
            'board': '证据板'
        };
        
        // 开始游戏
        async function startGame() {
            await fetch('/api/reset', { method: 'POST' });
            document.getElementById('scene-title').classList.add('hidden');
            document.getElementById('scene-game').classList.remove('hidden');
            await updateState();
            showScene('crime_scene');
        }
        
        // 更新游戏状态
        async function updateState() {
            const response = await fetch('/api/state');
            gameState = await response.json();
            
            document.getElementById('evidence-count').textContent = gameState.found_evidences.length;
            document.getElementById('connection-count').textContent = gameState.connections.length;
            
            if (gameState.message) {
                document.getElementById('game-message').textContent = gameState.message;
            }
            
            if (gameState.game_over) {
                showEnding(gameState.message);
            }
        }
        
        // 显示场景
        async function showScene(sceneName) {
            // 更新场景标题
            document.getElementById('scene-name').textContent = sceneNames[sceneName] || sceneName;
            document.getElementById('current-location').textContent = sceneNames[sceneName] || sceneName;
            
            // 隐藏所有地点
            document.querySelectorAll('.location-section').forEach(el => el.classList.add('hidden'));
            
            // 显示当前地点
            const locationEl = document.getElementById(`location-${sceneName}`);
            if (locationEl) {
                locationEl.classList.remove('hidden');
            }
            
            // 加载对应内容
            if (sceneName === 'crime_scene' || sceneName === 'basement' || sceneName === 'study' || sceneName === 'office') {
                await loadEvidences(sceneName);
            } else if (sceneName === 'interview') {
                await loadSuspects();
            } else if (sceneName === 'board') {
                await loadBoard();
            }
            
            await fetch(`/api/scene/${sceneName}`);
        }
        
        // 加载线索
        async function loadEvidences(location) {
            const response = await fetch(`/api/evidences/${location}`);
            const data = await response.json();
            
            const container = document.getElementById(`${location}-evidences`);
            container.innerHTML = '';
            
            data.evidences.forEach(ev => {
                const btn = document.createElement('button');
                btn.className = `btn ${ev.found ? 'found' : ''}`;
                btn.textContent = ev.found ? `${ev.name} ✓` : ev.name;
                btn.onclick = () => investigateEvidence(ev.id, location);
                container.appendChild(btn);
            });
        }
        
        // 调查线索
        async function investigateEvidence(evId, location) {
            const response = await fetch('/api/investigate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ evidence_id: evId, location: location, action: 'look' })
            });
            
            const data = await response.json();
            await updateState();
            await loadEvidences(location);
        }
        
        // 加载嫌疑人
        async function loadSuspects() {
            const response = await fetch('/api/suspects');
            const data = await response.json();
            
            const container = document.getElementById('suspect-list');
            container.innerHTML = '';
            
            data.suspects.forEach(suspect => {
                const card = document.createElement('div');
                card.className = 'suspect-card';
                card.innerHTML = `
                    <div class="name">${suspect.name}</div>
                    <div class="role">${suspect.role}</div>
                    <div class="desc">${suspect.description}</div>
                `;
                card.onclick = () => selectSuspect(suspect.id);
                container.appendChild(card);
            });
            
            document.getElementById('dialog-section').classList.add('hidden');
        }
        
        // 选择嫌疑人
        async function selectSuspect(suspectId) {
            currentSuspect = suspectId;
            const response = await fetch(`/api/suspect/${suspectId}/topics`);
            const data = await response.json();
            
            const suspect = (await (await fetch('/api/suspects')).json()).suspects.find(s => s.id === suspectId);
            
            document.getElementById('dialog-suspect-name').textContent = `与 ${suspect.name} 对话`;
            document.getElementById('dialog-content').textContent = '选择一个话题进行询问...';
            document.getElementById('dialog-section').classList.remove('hidden');
            
            const topicList = document.getElementById('topic-list');
            topicList.innerHTML = '';
            
            data.topics.forEach(topic => {
                const btn = document.createElement('button');
                btn.className = `btn ${topic.available ? '' : 'disabled'}`;
                btn.textContent = topic.available ? topic.topic : `${topic.topic} (未解锁)`;
                btn.disabled = !topic.available;
                btn.onclick = () => talkTopic(suspectId, topic.topic);
                topicList.appendChild(btn);
            });
        }
        
        // 对话
        async function talkTopic(suspectId, topic) {
            const response = await fetch(`/api/suspect/${suspectId}/talk`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic: topic })
            });
            
            const data = await response.json();
            
            if (data.status === 'ok') {
                document.getElementById('dialog-content').textContent = data.content;
                await updateState();
                await selectSuspect(suspectId);
            } else {
                document.getElementById('dialog-content').textContent = data.message;
            }
        }
        
        // 加载证据板
        async function loadBoard() {
            const response = await fetch('/api/state');
            const state = await response.json();
            
            // 显示已发现的线索
            const evidencesContainer = document.getElementById('board-evidences');
            evidencesContainer.innerHTML = '';
            
            for (const evId of state.found_evidences) {
                // 简化处理，直接显示
                const item = document.createElement('div');
                item.className = 'evidence-item found';
                item.innerHTML = `<div class="name">${evId}</div>`;
                evidencesContainer.appendChild(item);
            }
            
            // 加载关联选择
            await loadConnectOptions();
            
            // 显示已建立的关联
            const connectionList = document.getElementById('connection-list');
            connectionList.innerHTML = '';
            
            state.connections.forEach(conn => {
                const item = document.createElement('div');
                item.className = 'connection-item';
                item.textContent = `${conn[0]} + ${conn[1]}`;
                connectionList.appendChild(item);
            });
        }
        
        // 加载关联选项
        async function loadConnectOptions() {
            const response = await fetch('/api/state');
            const state = await response.json();
            
            const ev1Container = document.getElementById('connect-ev1');
            const ev2Container = document.getElementById('connect-ev2');
            ev1Container.innerHTML = '';
            ev2Container.innerHTML = '';
            
            state.found_evidences.forEach((evId, index) => {
                const btn1 = document.createElement('button');
                btn1.className = `btn ${selectedEv1 === evId ? 'primary' : ''}`;
                btn1.textContent = evId;
                btn1.onclick = () => { selectedEv1 = evId; loadConnectOptions(); };
                ev1Container.appendChild(btn1);
                
                const btn2 = document.createElement('button');
                btn2.className = `btn ${selectedEv2 === evId ? 'primary' : ''}`;
                btn2.textContent = evId;
                btn2.onclick = () => { selectedEv2 = evId; loadConnectOptions(); };
                ev2Container.appendChild(btn2);
            });
        }
        
        // 关联线索
        async function connectEvidence() {
            if (!selectedEv1 || !selectedEv2) {
                document.getElementById('connection-result').textContent = '请先选择两个线索';
                return;
            }
            
            const response = await fetch('/api/connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ev1: selectedEv1, ev2: selectedEv2 })
            });
            
            const data = await response.json();
            document.getElementById('connection-result').textContent = data.message;
            
            if (data.status === 'ok') {
                selectedEv1 = null;
                selectedEv2 = null;
                await updateState();
                await loadBoard();
            }
        }
        
        // 指认凶手
        async function accuse(suspectName) {
            const response = await fetch('/api/accuse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ suspect: suspectName })
            });
            
            const data = await response.json();
            await updateState();
            
            if (data.game_over) {
                showEnding(data.message);
            } else {
                document.getElementById('game-message').textContent = data.message;
            }
        }
        
        // 显示结局
        function showEnding(message) {
            document.getElementById('scene-game').classList.add('hidden');
            document.getElementById('scene-ending').classList.remove('hidden');
            document.getElementById('ending-message').textContent = message;
        }
        
        // 重置游戏
        async function resetGame() {
            await fetch('/api/reset', { method: 'POST' });
            document.getElementById('scene-ending').classList.add('hidden');
            document.getElementById('scene-title').classList.remove('hidden');
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 游戏已准备好
        });
    </script>
</body>
</html>
