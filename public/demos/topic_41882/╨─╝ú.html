<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心迹</title>
<style>
:root {
  --bg: #FAF7F2;
  --bg2: #F0EBE3;
  --ink: #2D2A26;
  --muted: #8C857C;
  --rule: #E0D8CE;
  --accent: #C4956A;
  --accent2: #7BA59A;
  --accent3: #A890B8;
  --danger: #C46A6A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  color: var(--ink);
  background: var(--bg);
  line-height: 1.6;
  display: flex;
  flex-direction: column;
}

/* === Header === */
.header {
  background: #fff;
  border-bottom: 1px solid var(--rule);
  padding: 0.6rem 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 0.6rem; }
.header-brand {
  font-family: 'Georgia', 'Songti SC', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--accent);
}
.header-streak {
  font-size: 0.75rem;
  color: var(--muted);
  background: var(--bg2);
  padding: 0.2rem 0.6rem;
  border-radius: 100px;
}
.header-right { display: flex; gap: 0.5rem; }
.header-btn {
  background: none;
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 0.35rem 0.7rem;
  font-size: 0.8rem;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}
.header-btn:hover { border-color: var(--accent); color: var(--accent); }
.header-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* === Main Layout === */
.main { flex: 1; display: flex; overflow: hidden; position: relative; }

/* === Chat Panel === */
.chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }

.msg { display: flex; gap: 0.6rem; max-width: 80%; animation: fadeIn 0.3s ease; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }
.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700;
  flex-shrink: 0;
}
.msg.bot .msg-avatar { background: transparent; color: #fff; display: flex; align-items: center; justify-content: center; }
.msg.user .msg-avatar { background: var(--accent2); color: #fff; }
.msg-bubble {
  padding: 0.7rem 1rem;
  border-radius: 16px;
  font-size: 0.95rem;
  line-height: 1.7;
  word-break: break-word;
  white-space: pre-wrap;
}
.msg.bot .msg-bubble { background: #fff; border: 1px solid var(--rule); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--accent2); color: #fff; border-bottom-right-radius: 4px; }

/* Crisis resource in chat */
.msg-bubble .crisis-inline {
  margin-top: 0.6rem;
  padding: 0.6rem 0.8rem;
  background: rgba(196,106,106,0.08);
  border: 1px solid rgba(196,106,106,0.2);
  border-radius: 8px;
  font-size: 0.85rem;
  color: var(--danger);
  line-height: 1.6;
}

/* Typing indicator */
.typing { display: flex; gap: 0.6rem; align-self: flex-start; }
.typing .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
.typing-dots { display: flex; gap: 4px; padding: 0.8rem 1rem; background: #fff; border: 1px solid var(--rule); border-radius: 16px; border-bottom-left-radius: 4px; }
.typing-dots span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: blink 1.4s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

/* === Input Area === */
.input-area {
  padding: 0.8rem 1.2rem;
  background: #fff;
  border-top: 1px solid var(--rule);
  display: flex;
  gap: 0.6rem;
  flex-shrink: 0;
}
.input-area textarea {
  flex: 1;
  padding: 0.7rem 1rem;
  border: 1px solid var(--rule);
  border-radius: 24px;
  font-size: 0.95rem;
  outline: none;
  background: var(--bg);
  transition: border-color 0.2s;
  resize: none;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  max-height: 120px;
  overflow-y: auto;
  line-height: 1.5;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--muted); }
.send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s;
  flex-shrink: 0;
}
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* === Timeline Panel === */
.timeline-panel {
  width: 0;
  overflow: hidden;
  background: var(--bg2);
  border-left: 1px solid var(--rule);
  transition: width 0.3s ease;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.timeline-panel.open { width: 340px; }
.timeline-header {
  padding: 1rem 1.2rem;
  border-bottom: 1px solid var(--rule);
  font-weight: 700;
  font-size: 1rem;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.timeline-header .close-btn {
  background: none; border: none; font-size: 1.2rem; color: var(--muted); cursor: pointer;
}
.timeline-list {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}
.timeline-empty {
  text-align: center;
  color: var(--muted);
  font-size: 0.9rem;
  padding: 2rem 1rem;
  line-height: 1.8;
}

/* === Timeline Empty State (with ink illustration) === */
.timeline-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
  position: relative;
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
}
.timeline-empty-state .empty-illustration {
  width: 100%;
  max-width: 280px;
  display: block;
  /* 底部渐隐：顶部不透明 → 底部透明，柔和融进米色背景 */
  mask-image: linear-gradient(to bottom, #000 0%, #000 55%, rgba(0,0,0,0.5) 80%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 55%, rgba(0,0,0,0.5) 80%, transparent 100%);
}
.timeline-empty-state .empty-text {
  margin-top: -2rem;
  text-align: center;
  color: var(--ink);
  font-size: 0.9rem;
  line-height: 1.8;
  opacity: 0.85;
  padding: 0 0.5rem;
}
.timeline-empty-state .empty-text strong {
  display: block;
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 0.2rem;
}
.timeline-empty-state .start-chat-btn {
  margin-top: 0.8rem;
  padding: 0.45rem 1.1rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  text-decoration: none;
  display: inline-block;
}
.timeline-empty-state .start-chat-btn:hover {
  opacity: 0.88;
}
.crystal-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 1rem;
  animation: fadeIn 0.3s ease;
}
.crystal-card .crystal-date {
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 0.3rem;
}
.crystal-card .crystal-mood {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.15rem 0.5rem;
  border-radius: 100px;
  background: rgba(196,149,106,0.1);
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.crystal-card .crystal-text {
  font-size: 0.92rem;
  line-height: 1.7;
  color: var(--ink);
  margin-bottom: 0.5rem;
}
.crystal-card .crystal-tag {
  font-size: 0.75rem;
  color: var(--accent2);
  font-weight: 500;
}

/* === Settings Modal === */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(45,42,38,0.4);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border-radius: 16px;
  padding: 2rem;
  width: 90%;
  max-width: 480px;
  box-shadow: 0 20px 60px rgba(45,42,38,0.15);
}
.modal h3 {
  font-size: 1.1rem;
  margin-bottom: 1.2rem;
  color: var(--ink);
}
.modal label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 0.3rem;
  margin-top: 1rem;
}
.modal input {
  width: 100%;
  padding: 0.6rem 0.8rem;
  border: 1px solid var(--rule);
  border-radius: 8px;
  font-size: 0.9rem;
  outline: none;
  background: var(--bg);
}
.modal input:focus { border-color: var(--accent); }
.modal-actions {
  display: flex;
  gap: 0.8rem;
  margin-top: 1.5rem;
  justify-content: flex-end;
}
.modal-actions button {
  padding: 0.5rem 1.2rem;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  border: 1px solid var(--rule);
  background: #fff;
  color: var(--ink);
  transition: all 0.2s;
}
.modal-actions .save-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-actions .save-btn:hover { opacity: 0.9; }

/* === Help Resource Banner === */
/* === Help Entry (discreet) === */
.help-btn {
  background: none;
  border: none;
  padding: 0.35rem 0.55rem;
  font-size: 0.78rem;
  color: var(--muted);
  opacity: 0.55;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
}
.help-btn:hover, .help-btn:focus, .help-btn.active {
  opacity: 1;
  color: var(--danger);
  background: rgba(196,106,106,0.06);
  outline: none;
}
.help-popover {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  right: 1.2rem;
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  padding: 0.9rem 1rem;
  min-width: 240px;
  max-width: 320px;
  z-index: 50;
  font-size: 0.82rem;
  line-height: 1.7;
  color: var(--ink);
}
.help-popover.open { display: block; }
.help-popover-title {
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--danger);
  margin-bottom: 0.3rem;
}
.help-popover-text strong a {
  color: var(--danger);
  text-decoration: none;
  font-weight: 600;
}
.help-popover-text strong a:hover { text-decoration: underline; }

/* === New Chat Button === */
.new-chat-btn {
  display: none;
  margin: 0.5rem 1.2rem 0;
  padding: 0.5rem 1rem;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 8px;
  font-size: 0.82rem;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  align-self: flex-start;
}
.new-chat-btn.visible { display: block; }
.new-chat-btn:hover { border-color: var(--accent); color: var(--accent); }

/* === Timeline card clickable === */
.crystal-card--clickable {
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.crystal-card--clickable:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.crystal-card--clickable:focus {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* === Crystal Conversation Modal */
.crystal-modal {
  max-width: 560px;
  display: flex;
  flex-direction: column;
}
.crystal-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.8rem;
}
.crystal-modal-header .crystal-modal-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
}
.crystal-modal-header .close-btn {
  background: none;
  border: none;
  font-size: 1.4rem;
  color: var(--muted);
  cursor: pointer;
  line-height: 1;
}
.crystal-modal-line {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 0.8rem 1rem;
  margin-bottom: 1rem;
}
.crystal-modal-line-date {
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 0.3rem;
}
.crystal-modal-line-mood {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.15rem 0.5rem;
  border-radius: 100px;
  background: rgba(196,149,106,0.1);
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.crystal-modal-line-text {
  font-size: 0.95rem;
  color: var(--ink);
  margin-bottom: 0.5rem;
  line-height: 1.6;
}
.crystal-modal-line-tag {
  font-size: 0.75rem;
  color: var(--accent2);
}
.crystal-modal-body {
  max-height: 60vh;
  overflow-y: auto;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

/* === Typing: bot avatar keeps same shape, now transparent so SVG fills it */
.typing .msg-avatar {
  background: transparent !important;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === Responsive === */
@media (max-width: 600px) {
  .timeline-panel.open { width: 100%; position: absolute; top: 0; right: 0; bottom: 0; z-index: 20; }
  .msg { max-width: 88%; }
  .crystal-modal { width: 92%; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="header-brand">心迹</span>
    <span class="header-streak" id="streak"></span>
  </div>
  <div class="header-right">
    <button class="header-btn" id="timelineToggle" title="成长时间线">时间线</button>
    <button class="header-btn" id="settingsBtn" title="设置">设置</button>
    <button class="help-btn" id="helpBtn" title="求助资源" aria-label="打开求助资源" tabindex="0">需要帮助</button>
  </div>
</div>

<!-- Help Popover -->
<div class="help-popover" id="helpPopover" role="dialog" aria-label="求助资源" aria-hidden="true">
  <div class="help-popover-body">
    <div class="help-popover-title">求助资源</div>
    <div class="help-popover-text">
      全国心理援助热线 <strong><a href="tel:12356">12356</a></strong>（24 小时）<br>
      紧急情况请拨打 <strong><a href="tel:110">110</a></strong> / <strong><a href="tel:120">120</a></strong> 或联系身边信任的大人。
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages"></div>
    <button class="new-chat-btn" id="newChatBtn">开始新的对话</button>
    <div class="input-area">
      <textarea id="userInput" placeholder="说说今天发生了什么……" autocomplete="off" rows="1"></textarea>
      <button class="send-btn" id="sendBtn">&#10148;</button>
    </div>
  </div>

  <!-- Timeline Panel -->
  <div class="timeline-panel" id="timelinePanel">
    <div class="timeline-header">
      <span>成长时间线</span>
      <button class="close-btn" id="timelineClose">&times;</button>
    </div>
    <div class="timeline-list" id="timelineList"></div>
  </div>
</div>

<!-- Crystal Conversation Modal -->
<div class="modal-overlay" id="crystalModal">
  <div class="modal crystal-modal">
    <div class="crystal-modal-header">
      <div class="crystal-modal-title">当时那段对话</div>
      <button class="close-btn" id="crystalModalClose">&times;</button>
    </div>
    <div class="crystal-modal-line" id="crystalModalLine"></div>
    <div class="crystal-modal-body" id="crystalModalBody"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>API 设置</h3>
    <label for="cfgApiUrl">API 地址</label>
    <input type="text" id="cfgApiUrl" placeholder="例：https://api.deepseek.com/v1/chat/completions">
    <label for="cfgApiKey">API 密钥</label>
    <input type="password" id="cfgApiKey" placeholder="sk-...">
    <label for="cfgModel">模型名称</label>
    <input type="text" id="cfgModel" placeholder="例：deepseek-chat">
    <div class="modal-actions">
      <button id="settingsCancel">取消</button>
      <button class="save-btn" id="settingsSave">保存</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 心迹 MVP Demo — 全部逻辑
// ============================================================

// ============================================================
// 默认 API 配置（留空则用用户在设置里填的）
// 你可以把 DeepSeek 密钥手动填在下面的 apiKey，
// 没填的评委仍可走右上角"设置"手动覆盖。
// ============================================================
var DEFAULT_API_CONFIG = {
  apiUrl: 'https://api.deepseek.com/v1/chat/completions',
  apiKey: 'YOUR_API_KEY_HERE',
  model: 'deepseek-v4-pro'
};
var FALLBACK_TIP = '连接出了点问题，可以在右上角"设置"里换成你自己的 API 再试。';

// "迹"的水墨一笔头像（SVG 自带宣纸底色的圆），替换掉原本写"迹"字的圆

  // ---- Help Popover ----
  function toggleHelpPopover(forceState) {
    var willOpen = typeof forceState === 'boolean' ? forceState : !helpPopover.classList.contains('open');
    if (willOpen) {
      helpPopover.classList.add('open');
      helpPopover.setAttribute('aria-hidden', 'false');
      helpBtn.classList.add('active');
    } else {
      helpPopover.classList.remove('open');
      helpPopover.setAttribute('aria-hidden', 'true');
      helpBtn.classList.remove('active');
    }
  }

  var chatHistory = []; // { role: 'user'|'assistant', content: '' } —— 发给模型的完整文本（含标记）
  var displaySession = []; // { role: 'user'|'bot', text: '' } —— 用户实际看到的版本（不含 <结晶>/<求助/>），用于结晶卡片里的对话回看
  var isWaiting = false;

  // ---- Local Storage Helpers ----
  function load(key, fallback) {
    try { var v = localStorage.getItem('xinji_' + key); return v !== null ? JSON.parse(v) : fallback; }
    catch(e) { return fallback; }
  }
  function save(key, val) {
    try { localStorage.setItem('xinji_' + key, JSON.stringify(val)); } catch(e) {}
  }

  // ---- API Config ----
  // 取配置的逻辑：用户在"设置"里填了就用用户的，没填就回退到 DEFAULT_API_CONFIG
  function isUserConfigFilled(cfg) {
    return !!(cfg && cfg.apiUrl && cfg.apiKey && cfg.model);
  }
  function isDefaultConfigUsable() {
    return !!(
      DEFAULT_API_CONFIG &&
      DEFAULT_API_CONFIG.apiUrl &&
      DEFAULT_API_CONFIG.apiKey &&
      DEFAULT_API_CONFIG.apiKey !== '在这里填入我的 DeepSeek 密钥' &&
      DEFAULT_API_CONFIG.model
    );
  }
  function getApiConfig() {
    var userCfg = load('apiConfig', { apiUrl: '', apiKey: '', model: '' });
    if (isUserConfigFilled(userCfg)) return userCfg;
    if (isDefaultConfigUsable()) return {
      apiUrl: DEFAULT_API_CONFIG.apiUrl,
      apiKey: DEFAULT_API_CONFIG.apiKey,
      model: DEFAULT_API_CONFIG.model
    };
    // 两者都没配，就返回用户那个（可能是空的），调用方会看到缺少配置提示
    return userCfg;
  }
  function apiIsConfigured() {
    var cfg = getApiConfig();
    return !!(cfg && cfg.apiUrl && cfg.apiKey && cfg.model);
  }

  // ---- Streak ----
  function updateStreak() {
    var today = new Date().toISOString().slice(0, 10);
    var data = load('streak', { lastDate: null, count: 0 });
    if (data.lastDate === today) {
      // same day
    } else {
      var yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      if (data.lastDate === yesterday) {
        data.count++;
      } else {
        data.count = 1;
      }
      data.lastDate = today;
      save('streak', data);
    }
    streakEl.textContent = '连续 ' + data.count + ' 天';
  }

  // ---- Crystals (Timeline) ----
  function getCrystals() {
    return load('crystals', []);
  }
  function addCrystal(crystal) {
    var crystals = getCrystals();
    crystals.unshift(crystal);
    save('crystals', crystals);
    renderTimeline();
  }
  function renderTimeline() {
    var crystals = getCrystals();
    if (crystals.length === 0) {
      // 空状态：水墨插画 + 温柔文案 + 开始复盘按钮
      timelineList.innerHTML =
        '<div class="timeline-empty-state">' +
          '<img class="empty-illustration" src="' + EMPTY_ILLUSTRATION + '" alt="还没有结晶">' +
          '<div class="empty-text">' +
            '<strong>还没有心迹</strong>' +
            '今天，想聊点什么？' +
          '</div>' +
          '<button class="start-chat-btn" id="startChatBtn">开始今天的复盘</button>' +
        '</div>';
      var btn = document.getElementById('startChatBtn');
      if (btn) btn.addEventListener('click', function() {
        // 点击空状态入口 → 焦点回到输入框并清除旧会话，让"迹"重新开场
        startNewChat();
      });
      return;
    }
    timelineList.innerHTML = crystals.map(function(c, idx) {
      return '<div class="crystal-card crystal-card--clickable" data-idx="' + idx + '" tabindex="0" role="button" aria-label="回看当时那段对话">' +
        '<div class="crystal-date">' + escHtml(c['日期'] || '') + '</div>' +
        '<div class="crystal-mood">' + escHtml(c['情绪'] || '') + '</div>' +
        '<div class="crystal-text">' + escHtml(c['一句话'] || '') + '</div>' +
        '<div class="crystal-tag">' + escHtml(c['标签'] || '') + '</div>' +
      '</div>';
    }).join('');
    // 绑定点击事件，点卡片时弹出当时那段对话
    var cards = timelineList.querySelectorAll('.crystal-card--clickable');
    for (var i = 0; i < cards.length; i++) {
      (function(idx) {
        function handleOpen() {
          openCrystalDialog(idx);
        }
        cards[idx].addEventListener('click', handleOpen);
        cards[idx].addEventListener('keydown', function(ev) {
          if (ev.key === 'Enter' || ev.key === ' ') {
            ev.preventDefault();
            handleOpen();
          }
        });
      })(parseInt(cards[i].getAttribute('data-idx'), 10));
    }
  }

  // ---- 打开结晶对应的整段对话弹窗 ----
  function openCrystalDialog(idx) {
    var crystals = getCrystals();
    var c = crystals[idx];
    if (!c) return;
    // 顶部先放这颗结晶的那句话（带情绪+标签）
    crystalModalLine.innerHTML =
      '<div class="crystal-modal-line-date">' + escHtml(c['日期'] || '') + '</div>' +
      '<div class="crystal-modal-line-mood">' + escHtml(c['情绪'] || '') + '</div>' +
      '<div class="crystal-modal-line-text">' + escHtml(c['一句话'] || '') + '</div>' +
      '<div class="crystal-modal-line-tag">' + escHtml(c['标签'] || '') + '</div>';
    // 主体：气泡复刻当时那段对话
    var dialogue = (c['对话'] && Array.isArray(c['对话'])) ? c['对话'] : [];
    if (dialogue.length === 0) {
      crystalModalBody.innerHTML = '<div class="timeline-empty">当时那段对话没有保留下来。</div>';
    } else {
      crystalModalBody.innerHTML = '';
      for (var i = 0; i < dialogue.length; i++) {
        var item = dialogue[i];
        var role = item.role === 'user' ? 'user' : 'bot';
        var div = document.createElement('div');
        div.className = 'msg ' + role;
        var avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        if (role === 'bot') {

        } else {
          avatar.textContent = '我';
        }
        var bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.innerHTML = escHtml(item.text || '');
        div.appendChild(avatar);
        div.appendChild(bubble);

      crystalModalBody.scrollTop = 0;

  // ---- Build context with past crystals ----
  function buildCrystalContext() {
    var crystals = getCrystals();
    if (crystals.length === 0) return '';
    // Take up to 5 most recent
    var recent = crystals.slice(0, 5);
    var lines = recent.map(function(c) {
      return '  - ' + c['日期'] + ' | 情绪:' + c['情绪'] + ' | ' + c['一句话'] + ' ' + c['标签'];
    });
    return '\n\n以下是 ta 过去的结晶记录（供你参考，克制使用）：\n' + lines.join('\n');
  }

  // ---- Parse crystal block from model output ----
  function parseCrystal(text) {
    var match = text.match(/<结晶>\s*([\s\S]*?)\s*<\/结晶>/);
    if (!match) return null;
    try {
      var json = JSON.parse(match[1].trim());
      return json;
    } catch(e) {
      return null;
    }
  }

  // ---- Detect crisis: model raises flag <求助/> ----
  function hasHelpFlag(text) {
    return /<求助\/>/.test(text);
  }

  // ---- Detect crisis: scan user input for high-risk expressions ----
  var USER_CRISIS_PATTERNS = /不想活|活不下去|想死|自杀|伤害自己|结束自己|撑不下去/;
  function isUserCrisisInput(text) {
    return USER_CRISIS_PATTERNS.test(text);
  }

  // ---- Strip hidden markers and code fences from display text ----
  function stripForDisplay(text) {
    // Remove <结晶>...</结晶>
    text = text.replace(/<结晶>[\s\S]*?<\/结晶>/g, '');
    // Remove <求助/>
    text = text.replace(/<求助\/>/g, '');
    // Remove orphaned ``` fence lines (standalone lines with only ```)
    text = text.replace(/\n```\s*\n/g, '\n');
    text = text.replace(/^```\s*\n?/g, '');
    text = text.replace(/\n?```\s*$/g, '');
    return text.trim();
  }

  // ---- Escape HTML ----
  function escHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

      avatar.textContent = '我';
    }

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = escHtml(text);

    // If crisis response (model raised flag or user input triggered it), inject resource inline
    if (role === 'bot' && opts.isCrisis) {
      var crisisHtml = document.createElement('div');
      crisisHtml.className = 'crisis-inline';
      crisisHtml.innerHTML = '如果你现在需要帮助，请拨打 <strong>12356</strong>（24小时心理援助热线），或联系身边信任的大人。紧急情况请拨打 <strong>110</strong> / <strong>120</strong>。';
      bubble.appendChild(crisisHtml);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;

  // ---- Call LLM API ----
  async function callLLM(messages) {
    if (!apiIsConfigured()) {
      return { error: true, msg: '还没配好 API 呢。可以在右上角"设置"里填入你的 API 地址、密钥和模型名称，再试试看。' };
    }
    var config = getApiConfig();

    var body = {
      model: config.model,
      messages: messages,
      max_tokens: 1024,
      temperature: 0.7
    };

    try {
      var resp = await fetch(config.apiUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + config.apiKey
        },
        body: JSON.stringify(body)
      });

      if (!resp.ok) {
        return { error: true, msg: FALLBACK_TIP };
      }

      var data = await resp.json();
      var content = '';
      if (data.choices && data.choices[0] && data.choices[0].message) {
        content = data.choices[0].message.content || '';
      } else if (data.response) {
        content = data.response;
      } else if (data.content) {
        content = data.content;
      }
      if (!content) {
        return { error: true, msg: FALLBACK_TIP };
      }
      return { error: false, content: content };
    } catch (e) {
      return { error: true, msg: FALLBACK_TIP };
    }
  }

  // ---- Send message ----
  async function sendMessage(text) {
    if (!text.trim() || isWaiting) return;
    isWaiting = true;
    sendBtn.disabled = true;
    userInput.disabled = true;

    // Add user message to UI
    var trimmed = text.trim();
    addMessage('user', trimmed);
    chatHistory.push({ role: 'user', content: trimmed });
    displaySession.push({ role: 'user', text: trimmed });

    // Build messages array for API
    var crystalContext = buildCrystalContext();
    var systemContent = SYSTEM_PROMPT + crystalContext;
    var apiMessages = [
      { role: 'system', content: systemContent }
    ];
    // Add history (limit to last 20 messages for context window)
    var historySlice = chatHistory.slice(-20);
    for (var i = 0; i < historySlice.length; i++) {
      apiMessages.push({ role: historySlice[i].role, content: historySlice[i].content });
    }

    showTyping();

    var result = await callLLM(apiMessages);

    hideTyping();

    if (result.error) {
      addMessage('bot', result.msg);
      isWaiting = false;
      sendBtn.disabled = false;
      userInput.disabled = false;
      return;
    }

    var rawContent = result.content;

    // Determine crisis state: model flag OR user input high-risk
    var modelHasHelpFlag = hasHelpFlag(rawContent);
    var userInputWasCrisis = isUserCrisisInput(text.trim());
    var isCrisis = modelHasHelpFlag || userInputWasCrisis;

    // Parse crystal block (only if not crisis)
    var crystal = isCrisis ? null : parseCrystal(rawContent);

    // Strip hidden markers for display
    var displayContent = stripForDisplay(rawContent);

    // Add bot message to UI (without hidden markers)
    addMessage('bot', displayContent, { isCrisis: isCrisis });

    // Store raw in history (with markers, for context continuity)
    chatHistory.push({ role: 'assistant', content: rawContent });
    // 同时把"展示版文本"记下来，这样结晶卡片回看时能看到当时那段对话
    if (displayContent && displayContent.trim()) {
      displaySession.push({ role: 'bot', text: displayContent });
    }

    // Handle crystal
    if (crystal && !isCrisis) {
      var today = new Date().toISOString().slice(0, 10);
      // 拷贝一份当时对话（展示版），绑到这颗结晶上
      var snapDialogue = displaySession.slice();
      var crystalData = {
        '日期': today,
        '情绪': crystal['情绪'] || '',
        '一句话': crystal['一句话'] || '',
        '标签': crystal['标签'] || '',
        '对话': snapDialogue
      };
      addCrystal(crystalData);
      hasCrystalThisSession = true;
      newChatBtn.classList.add('visible');
    } else if (isCrisis) {
      // Crisis: no crystal, don't show new chat button immediately
      newChatBtn.classList.remove('visible');
    }

    isWaiting = false;
    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
  }

  // ---- New Chat ----
  function startNewChat() {
    chatHistory = [];
    displaySession = [];
    chatMessages.innerHTML = '';
    hasCrystalThisSession = false;
    newChatBtn.classList.remove('visible');
    triggerGreeting();
  }

  // ---- Daily Greeting ----
  function triggerGreeting() {
    // Build greeting with crystal context
    var crystalContext = buildCrystalContext();
    var systemContent = SYSTEM_PROMPT + crystalContext;
    var apiMessages = [
      { role: 'system', content: systemContent },
      { role: 'user', content: '[用户刚打开了心迹，请按第四节的"开场"规则，温柔地打个招呼。]' }
    ];

    isWaiting = true;
    sendBtn.disabled = true;
    userInput.disabled = true;
    showTyping();

    callLLM(apiMessages).then(function(result) {
      hideTyping();
      if (result.error) {
        addMessage('bot', result.msg);
      } else {
        var raw = result.content;
        var display = stripForDisplay(raw);
        addMessage('bot', display);
        chatHistory.push({ role: 'user', content: '[用户刚打开了心迹]' });
        chatHistory.push({ role: 'assistant', content: raw });
        if (display && display.trim()) {
          displaySession.push({ role: 'bot', text: display });
        }
      }
      isWaiting = false;
      sendBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();
    });
  }

  // ---- Settings ----
  function openSettings() {
    var config = getApiConfig();
    cfgApiUrl.value = config.apiUrl || '';
    cfgApiKey.value = config.apiKey || '';
    cfgModel.value = config.model || '';
    settingsModal.classList.add('open');
  }
  function closeSettings() {
    settingsModal.classList.remove('open');
  }
  function saveSettings() {
    save('apiConfig', {
      apiUrl: cfgApiUrl.value.trim(),
      apiKey: cfgApiKey.value.trim(),
      model: cfgModel.value.trim()
    });
    closeSettings();
  }

  // ---- Timeline toggle ----
  function toggleTimeline() {
    timelinePanel.classList.toggle('open');
    timelineToggle.classList.toggle('active');
  }

  // ---- Event Listeners ----
  sendBtn.addEventListener('click', function() {
    sendMessage(userInput.value);
    userInput.value = '';
  });
  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(userInput.value);
      userInput.value = '';
      userInput.style.height = 'auto';
    }
  });
  userInput.addEventListener('input', function(e) {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  });
  newChatBtn.addEventListener('click', startNewChat);
  timelineToggle.addEventListener('click', toggleTimeline);
  timelineClose.addEventListener('click', toggleTimeline);
  settingsBtn.addEventListener('click', openSettings);
  settingsCancel.addEventListener('click', closeSettings);
  settingsSave.addEventListener('click', saveSettings);
  settingsModal.addEventListener('click', function(e) {
    if (e.target === settingsModal) closeSettings();
  });

  // 求助资源浮层：按钮点击、键盘、点击外部关闭
  helpBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleHelpPopover();
  });
  helpBtn.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleHelpPopover();
    }
  });
  document.addEventListener('click', function(e) {
    if (!helpPopover.classList.contains('open')) return;
    if (helpPopover.contains(e.target) || e.target === helpBtn) return;
    closeHelpPopover();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && helpPopover.classList.contains('open')) closeHelpPopover();
  });

  // 结晶对话弹窗：关闭按钮 + 点击遮罩关闭
  crystalModalClose.addEventListener('click', closeCrystalDialog);
  crystalModal.addEventListener('click', function(e) {
    if (e.target === crystalModal) closeCrystalDialog();
  });

  // ---- Init ----
  updateStreak();
  renderTimeline();

  // Check if API is configured
  if (!apiIsConfigured()) {
    addMessage('bot', '你好，我是"迹"。还没配好 API 呢——右上角有"设置"，在里面填入你的 API 地址、密钥和模型名称，我们就能开始聊了。');
  } else {
    triggerGreeting();
  }

})();
</script>
</body>
</html>
