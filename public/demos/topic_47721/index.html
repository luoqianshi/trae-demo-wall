<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>肠识地图</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
    margin: 0; padding: 20px; min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { text-align: center; color: #5d4e37; font-size: 2.2em; margin-bottom: 30px; text-shadow: 2px 2px 0 rgba(255,255,255,0.5); }
  .panel { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 8px 32px rgba(93,78,55,0.15); margin-bottom: 20px; }
  .panel h2 { color: #6b5b45; margin-top: 0; border-bottom: 2px solid #ffeaa7; padding-bottom: 10px; }
  .food-category { margin-bottom: 12px; }
  .category-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px;
    background: linear-gradient(135deg, #f5e6d3 0%, #fff8e7 100%);
    cursor: pointer; transition: all 0.2s;
    border: 2px solid transparent;
  }
  .category-header:hover { border-color: #d4a574; }
  .category-header.expanded { border-color: #8b6914; background: linear-gradient(135deg, #fff0d6 0%, #fff8e7 100%); }
  .cat-emoji { font-size: 1.5em; }
  .cat-title { font-weight: bold; color: #5d4e37; flex: 1; }
  .cat-count { font-size: 0.85em; color: #8b6914; background: #ffeaa7; padding: 2px 10px; border-radius: 12px; }
  .cat-toggle { font-size: 1.2em; color: #8b6914; transition: transform 0.2s; }
  .category-header.expanded .cat-toggle { transform: rotate(45deg); }
  .food-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 8px; padding: 12px 4px; }
  .food-grid.expanded { display: grid; }
  .food-item {
    background: #fff8e7; border: 2px solid #e8dcc0; border-radius: 10px;
    padding: 8px; cursor: pointer; transition: all 0.2s; user-select: none; text-align: center;
  }
  .food-item:hover { background: #fff0d0; border-color: #d4a574; transform: translateY(-2px); }
  .food-item.selected { background: #d4a574; border-color: #8b6914; box-shadow: 0 3px 8px rgba(139,105,20,0.3); color: white; }
  .food-item .food-emoji { font-size: 1.6em; display: block; margin-bottom: 4px; }
  .food-item .food-name { font-size: 0.85em; font-weight: bold; }

  .pie-chart-section {
    margin-top: 20px; padding: 20px;
    background: linear-gradient(135deg, #fff8e7 0%, #fff0d0 100%);
    border-radius: 14px; border: 2px dashed #d4a574;
  }
  .pie-chart-section h3 {
    margin: 0 0 15px 0; color: #5d4e37; text-align: center; font-size: 1.1em;
  }
  .pie-chart-container {
    display: flex; gap: 30px; align-items: center; justify-content: center; flex-wrap: wrap;
  }
  .pie-svg-container { position: relative; width: 300px; height: 300px; flex-shrink: 0; }
  .pie-svg { width: 100%; height: 100%; }
  .pie-slice { cursor: default; transition: filter 0.15s; }
  .pie-slice:hover { filter: brightness(1.05); }
  .pie-label { pointer-events: none; font-size: 13px; font-weight: bold; fill: white; text-anchor: middle; alignment-baseline: middle; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

  .pie-food-list {
    flex: 1; min-width: 280px; max-height: 320px; overflow-y: auto; padding-right: 10px;
  }
  .pie-food-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; margin-bottom: 8px;
    background: white; border-radius: 12px; border: 2px solid #e8dcc0; transition: all 0.15s;
  }
  .pie-food-row:hover { border-color: #d4a574; }
  .pie-food-color { width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.2); flex-shrink: 0; }
  .pie-food-emoji { font-size: 1.3em; }
  .pie-food-name { flex: 1; font-size: 0.95em; font-weight: bold; color: #5d4e37; min-width: 60px; }
  .pie-food-controls { display: flex; align-items: center; gap: 6px; }
  .pie-btn {
    width: 32px; height: 32px; border: none; border-radius: 8px;
    font-size: 1.2em; font-weight: bold; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .pie-btn-minus {
    background: linear-gradient(135deg, #ffd6d6 0%, #ffb8b8 100%);
    color: #8b3a3a;
  }
  .pie-btn-minus:hover { background: #ff8080; color: white; transform: scale(1.1); }
  .pie-btn-plus {
    background: linear-gradient(135deg, #d4f4d4 0%, #a8e6a8 100%);
    color: #2d6b2d;
  }
  .pie-btn-plus:hover { background: #4caf50; color: white; transform: scale(1.1); }
  .pie-food-pct {
    font-weight: bold; color: #8b6914; font-size: 1.1em; min-width: 42px; text-align: center;
  }
  .pie-food-remove {
    background: #ffd6d6; border: none; color: #8b3a3a;
    padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 0.85em; font-weight: bold;
    margin-left: 4px;
  }
  .pie-food-remove:hover { background: #ff8080; color: white; }

  .pie-empty { text-align: center; padding: 40px; color: #8b6914; font-size: 1em; }
  .pie-empty .big-emoji { font-size: 3.5em; display: block; margin-bottom: 10px; }

  .pie-total { text-align: center; margin-top: 12px; font-size: 0.95em; color: #5d4e37; font-weight: bold; }
  .pie-total .num { color: #8b6914; font-size: 1.3em; }
  .pie-total.warn { color: #c94444; }

  .pie-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  .btn-confirm, .btn-reset {
    padding: 12px 28px; border: none; border-radius: 10px;
    font-size: 1em; font-weight: bold; cursor: pointer; transition: all 0.15s;
  }
  .btn-confirm {
    background: linear-gradient(135deg, #8b6914 0%, #5d4e37 100%);
    color: white; box-shadow: 0 4px 12px rgba(93,78,55,0.35);
  }
  .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(93,78,55,0.45); }
  .btn-reset { background: white; color: #8b6914; border: 2px solid #d4a574; }
  .btn-reset:hover { background: #ffeaa7; border-color: #8b6914; }

  .slider-group { display: flex; align-items: center; gap: 15px; }
  .slider-group input[type="range"] {
    flex: 1; height: 8px; border-radius: 4px; background: #ffeaa7;
    outline: none; -webkit-appearance: none;
  }
  .slider-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px;
    background: #8b6914; border-radius: 50%; cursor: pointer;
    border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .slider-value { font-weight: bold; color: #8b6914; font-size: 1.05em; min-width: 80px; text-align: right; }
  .param-note { font-size: 0.83em; color: #a89070; margin-top: 4px; }
  .control-row { margin-bottom: 18px; }
  .control-row label { display: block; font-weight: bold; color: #5d4e37; margin-bottom: 8px; font-size: 1.02em; }

  #generate-btn {
    display: block; width: 100%; padding: 16px;
    font-size: 1.25em; font-weight: bold;
    background: linear-gradient(135deg, #8b6914 0%, #5d4e37 100%);
    color: white; border: none; border-radius: 14px;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 18px rgba(93,78,55,0.35);
  }
  #generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(93,78,55,0.5); }

  .result-area { text-align: center; padding: 20px 0; }
  .poop-display {
    width: 320px; height: 280px; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle, #f5f0e1 0%, #e8dcc0 100%);
    border-radius: 20px; border: 3px dashed #c9a96e;
  }
  .poop-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; text-align: left; }
  .info-card { background: #fff8e7; padding: 14px; border-radius: 12px; border-left: 4px solid #8b6914; }
  .info-card .label { font-size: 0.82em; color: #8b6914; text-transform: uppercase; letter-spacing: 1px; }
  .info-card .value { font-size: 1.2em; font-weight: bold; color: #5d4e37; margin-top: 4px; }
  .info-card .desc { font-size: 0.88em; color: #7a6b55; margin-top: 5px; line-height: 1.4; }
  .color-swatch { display: inline-block; width: 26px; height: 26px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); vertical-align: middle; margin-right: 8px; }
  .warning-box { margin-top: 18px; padding: 14px; background: #fff5d6; border-left: 5px solid #f39c12; border-radius: 8px; font-size: 0.93em; color: #7d5a22; line-height: 1.6; text-align: left; }
  .fade-in { animation: fadeIn 0.6s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .shimmer { animation: shimmer 2s infinite; }
  @keyframes shimmer { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.08); } }
  @media (max-width: 768px) { .poop-info { grid-template-columns: 1fr; } }
  .pie-food-list::-webkit-scrollbar { width: 8px; }
  .pie-food-list::-webkit-scrollbar-track { background: #fff8e7; border-radius: 4px; }
  .pie-food-list::-webkit-scrollbar-thumb { background: #d4a574; border-radius: 4px; }
  .pie-food-list::-webkit-scrollbar-thumb:hover { background: #8b6914; }
</style>
</head>

<div class="container">
  <h1>肠识地图</h1>

  <div class="panel">
    <h2>1. 今日饮食（选择食物后在下方用 ± 按钮调整占比）</h2>
    <div id="food-categories"></div>
    <div class="pie-chart-section">
      <h3>饮食占比分配 - 点击 ± 按钮调整（自动保持总和100%）</h3>
      <div class="pie-chart-container">
        <div class="pie-svg-container">
          <svg class="pie-svg" viewBox="0 0 300 300" id="pie-svg"></svg>
        </div>
        <div class="pie-food-list" id="pie-food-list">
          <div class="pie-empty"><span class="big-emoji">...</span>先从上方选择今日吃的食物<br>展开各类别点击食物即可添加</div>
        </div>
      </div>
      <div class="pie-total" id="pie-total">已选 0 种食物 - 总占比 <span class="num">0%</span></div>
      <div class="pie-buttons">
        <button class="btn-reset" id="btn-reset">重制（平均分配）</button>
        <button class="btn-confirm" id="btn-confirm">确定占比</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>2. 生活习惯与身体状态</h2>
    <div class="control-row"><label>在肠道中停留的天数</label>
      <div class="slider-group"><input type="range" id="transit" min="0.5" max="7" step="0.5" value="2"><span class="slider-value" id="transit-value">2.0 天</span></div>
      <div class="param-note">正常传输约1-3天。超过3天=便秘倾向，低于1天=腹泻倾向</div>
    </div>
    <div class="control-row"><label>今日饮水量</label>
      <div class="slider-group"><input type="range" id="hydration" min="0" max="100" value="60"><span class="slider-value" id="hydration-value">60%</span></div>
      <div class="param-note">饮水越少-大肠吸水越多-大便越干硬</div>
    </div>
    <div class="control-row"><label>今日运动量</label>
      <div class="slider-group"><input type="range" id="exercise" min="0" max="100" value="40"><span class="slider-value" id="exercise-value">40%</span></div>
      <div class="param-note">运动促进肠蠕动</div>
    </div>
    <div class="control-row"><label>压力/焦虑水平</label>
      <div class="slider-group"><input type="range" id="stress" min="0" max="100" value="30"><span class="slider-value" id="stress-value">30%</span></div>
    </div>
    <div class="control-row"><label>昨晚睡眠质量</label>
      <div class="slider-group"><input type="range" id="sleep" min="0" max="100" value="70"><span class="slider-value" id="sleep-value">70%</span></div>
    </div>
    <div class="control-row"><label>服用药物/补充剂</label>
      <div class="slider-group"><input type="range" id="meds" min="0" max="100" value="0"><span class="slider-value" id="meds-value">无</span></div>
    </div>
    <div class="control-row"><label>屁的气味</label>
      <div class="slider-group"><input type="range" id="fart" min="0" max="100" value="20"><span class="slider-value" id="fart-value">清香</span></div>
    </div>
    <div class="control-row"><label>咖啡因摄入</label>
      <div class="slider-group"><input type="range" id="caffeine" min="0" max="100" value="30"><span class="slider-value" id="caffeine-value">30%</span></div>
    </div>
  </div>

  <button id="generate-btn">让我们看看会拉出什么</button>

  <div class="panel result-area" id="result-panel" style="display:none;">
    <h2 style="text-align:center;">你的今日屎相</h2>
    <div class="poop-display"><svg id="poop-svg" width="220" height="220" viewBox="0 0 220 220"></svg></div>
    <div class="poop-info" id="poop-info"></div>
    <div class="warning-box" id="poop-warning"></div>
  </div>
</div>

// 自动归一化百分比总和为100
function normalizePercentages() {
  const names = Object.keys(selectedFoods);
  if (names.length === 0) return;

  const total = names.reduce((s,n)=>s+selectedFoods[n],0);
  if (total === 100) return;

  // 按当前比例重新分配
  names.forEach(n => {
    selectedFoods[n] = Math.round(selectedFoods[n] * 100 / total);
  });

  // 修正余数
  const newTotal = names.reduce((s,n)=>s+selectedFoods[n],0);
  if (newTotal !== 100) {
    const maxIdx = names.reduce((max,n,i) => selectedFoods[n]>selectedFoods[names[max]]?i:max, 0);
    selectedFoods[names[maxIdx]] += (100 - newTotal);
  }
}

// 纯显示版扇形图（无拖动交互）
function renderSvgOnly(names, total) {
  if (names.length === 1) {
    const n = names[0];
    const color = COLORS[Object.keys(FOODS).indexOf(n) % COLORS.length];
    pieSvg.innerHTML = `<circle cx="150" cy="150" r="100" fill="${color}" stroke="white" stroke-width="3"/><circle cx="150" cy="150" r="55" fill="white" opacity="0.85"/><text x="150" y="138" text-anchor="middle" font-size="32">${getEmoji(n)}</text><text x="150" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#5d4e37">${n}</text><text x="150" y="185" text-anchor="middle" font-size="13" fill="#8b6914" font-weight="bold">100%</text>`;
    return;
  }

  let startAngle = -Math.PI/2;
  let slices = '';
  let labels = '';

  names.forEach((name, idx) => {
    const pct = selectedFoods[name];
    const color = COLORS[Object.keys(FOODS).indexOf(name) % COLORS.length];
    const angle = (pct/100)*Math.PI*2;
    const endAngle = startAngle + angle;
    const largeArc = angle > Math.PI ? 1 : 0;

    const x1 = 150 + 100*Math.cos(startAngle);
    const y1 = 150 + 100*Math.sin(startAngle);
    const x2 = 150 + 100*Math.cos(endAngle);
    const y2 = 150 + 100*Math.sin(endAngle);

    slices += `<path class="pie-slice" d="M 150 150 L ${x1} ${y1} A 100 100 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${color}" stroke="white" stroke-width="3"/>`;

    // 标签（只在扇形足够大时显示）
    if (pct >= 8) {
      const midA = startAngle + angle/2;
      const lx = 150 + 65*Math.cos(midA);
      const ly = 150 + 65*Math.sin(midA);
      labels += `<text class="pie-label" x="${lx}" y="${ly-7}">${getEmoji(name)}</text>`;
      labels += `<text class="pie-label" x="${lx}" y="${ly+9}" style="font-size:11px">${pct}%</text>`;
    }
    startAngle = endAngle;
  });

  pieSvg.innerHTML = slices + labels;
}

// 调整百分比（核心稳定逻辑）
function adjustPercent(foodName, delta) {
  const names = Object.keys(selectedFoods);
  if (names.length === 0) return;

  const others = names.filter(n => n !== foodName);
  if (others.length === 0) {
    // 只有一种食物，始终100%
    selectedFoods[foodName] = 100;
    updatePie();
    return;
  }

  // 计算新值，约束在合理范围
  const minPct = 5;  // 每种食物最少5%
  const maxPct = 100 - others.length * minPct;  // 最多不超过这个值

  let newVal = selectedFoods[foodName] + delta;
  newVal = Math.max(minPct, Math.min(maxPct, newVal));

  const actualDelta = newVal - selectedFoods[foodName];
  if (actualDelta === 0) return;  // 无法调整

  // 更新当前食物
  selectedFoods[foodName] = newVal;

  // 其他食物按比例分摊变化（稳定算法）
  const othersTotal = others.reduce((s,n)=>s+selectedFoods[n],0);
  if (actualDelta > 0) {
    // 当前食物增加了，需要从其他食物扣除
    let needToReduce = actualDelta;
    // 按比例从每个食物扣除，但保证每个至少保留minPct
    for (const n of others) {
      const canReduce = selectedFoods[n] - minPct;
      if (canReduce <= 0) continue;
      const reduceAmt = Math.min(canReduce, Math.round(needToReduce * selectedFoods[n] / othersTotal));
      selectedFoods[n] -= reduceAmt;
      needToReduce -= reduceAmt;
    }
    // 如果还有剩余需要扣除，从最大的那个扣除
    if (needToReduce > 0) {
      const richest = others.reduce((a,b) => selectedFoods[a] > selectedFoods[b] ? a : b);
      selectedFoods[richest] = Math.max(minPct, selectedFoods[richest] - needToReduce);
    }
  } else {
    // 当前食物减少了，需要分给其他食物
    const needToAdd = -actualDelta;
    for (const n of others) {
      const addAmt = Math.round(needToAdd * selectedFoods[n] / othersTotal);
      selectedFoods[n] += addAmt;
    }
  }

  // 强制归一化，确保总和精确为100
  normalizePercentages();
  updatePie();
}

        selectedFoods[remain[0]] += 100 - avg*remain.length;
      }
      updatePie();
    };
  });
}

// ===== 模拟计算 + 渲染 =====
function simulate() {
  if (Object.keys(selectedFoods).length === 0) { alert('先选点吃的吧！肚子空空拉不出来的~'); return; }
  const total = Object.values(selectedFoods).reduce((s,v)=>s+v,0);
  if (total !== 100) { alert('当前总占比为 '+total+'%，请调整到100%后再生成。'); return; }

  const transit = parseFloat(document.getElementById('transit').value);
  const hydration = parseInt(document.getElementById('hydration').value);
  const exercise = parseInt(document.getElementById('exercise').value);
  const stress = parseInt(document.getElementById('stress').value);
  const sleep = parseInt(document.getElementById('sleep').value);
  const meds = parseInt(document.getElementById('meds').value);
  const fart = parseInt(document.getElementById('fart').value);
  const caffeine = parseInt(document.getElementById('caffeine').value);

  // 加权汇总食物因子
  let r=0,g=0,b=0,water=0,fiber=0,fat=0,protein=0,irritant=0,ferment=0;
  Object.entries(selectedFoods).forEach(([name,pct]) => {
    const f = FOODS[name];
    const w = pct/total;
    r += f.color[0]*w; g += f.color[1]*w; b += f.color[2]*w;
    water += f.waterAbsorb*w; fiber += f.fiber*w; fat += f.fat*w;
    protein += f.protein*w; irritant += f.irritant*w; ferment += f.ferment*w;
  });

  // Bristol评分
  let bristol = 4.0;
  bristol += (transit - 2.0) * -0.55;      // 停留久-干硬
  bristol += (hydration - 50)/50 * 1.5;      // 喝水多-湿软
  bristol += (exercise - 40)/60 * 0.6;       // 运动多-蠕动快
  bristol += (stress - 30)/100 * 1.0;        // 压力大-紊乱
  bristol += (sleep - 70)/70 * 0.4;          // 睡眠差-节律乱
  bristol += (fart - 20)/80 * 1.2;            // 屁臭-发酵多
  bristol += caffeine/100 * 0.9;              // 咖啡因-刺激
  bristol += fat/25 * 0.8;
  bristol += fiber/30 * 0.5;
  bristol += (protein - 15)/30 * -0.4;
  bristol += irritant/20 * 0.8;
  if (meds > 70) bristol += 2.0; // 泻药
  else if (meds > 40) bristol -= 1.5; // 止泻药

  bristol = Math.max(1, Math.min(7, bristol));
  const bristolInt = Math.round(bristol);

  // 颜色：肠道停留越久越深暗
  const shift = (transit - 2) * -6;
  r += shift*0.8; g += shift*0.6; b += shift*0.4;
  if (hydration < 30) { r-=12; g-=10; b-=6; }
  r = Math.max(15, Math.min(245, Math.round(r)));
  g = Math.max(10, Math.min(200, Math.round(g)));
  b = Math.max(10, Math.min(160, Math.round(b)));

  const hex = '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');

  // 描述
  const bristolMap = {
    1:['硬球状','严重便秘！肠道传输极慢，水分被过度吸收'],
    2:['硬香肠状','凹凸不平，需用力排出，便秘状态'],
    3:['裂纹香肠状','轻微便秘边缘，多喝水多吃菜'],
    4:['光滑香肠状','标准健康大便！继续保持'],
    5:['软块状','略微软烂，纤维稍多或水喝多了'],
    6:['糊状','拉肚子前兆！辣/油/刺激食物吃得太多'],
    7:['水状/腹泻','急性腹泻！肠胃被严重刺激，请补水并就医'],
  };

  const warnings = [];
  if (bristolInt === 7) warnings.push('严重腹泻！请立即大量补充盐水，必要时就医！');
  if (bristolInt === 1 || bristolInt === 2) warnings.push('严重便秘！增加纤维食物（蔬菜/全谷物）并多喝水。');
  if (transit > 4) warnings.push('传输时间过长（'+transit+'天），小心毒素重吸收！');
  if (transit < 1) warnings.push('传输过快（'+transit+'天），营养吸收不良且容易腹泻。');
  if (hydration < 25) warnings.push('严重脱水！水分摄入过低。');
  if (irritant > 18) warnings.push('刺激性食物过多，小心肛门抗议！');
  if (fat > 30) warnings.push('脂肪摄入过多。');
  if (stress > 70) warnings.push('高压状态，肠脑轴紊乱，建议放松减压。');
  if (fart > 70) warnings.push('屁味过重，肠道发酵过度，减少高蛋白食物。');
  if (sleep < 30) warnings.push('睡眠严重不足，肠道节律紊乱。');

  // 显示结果
  const panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  panel.classList.remove('fade-in'); void panel.offsetWidth; panel.classList.add('fade-in');

  renderPoopSvg(hex, bristolInt, Object.keys(selectedFoods).length);

  const info = document.getElementById('poop-info');
  info.innerHTML = `
    <div class="info-card"><div class="label">颜色</div><div class="value"><span class="color-swatch" style="background:${hex}"></span>RGB(${r},${g},${b})</div><div class="desc">受食物色素+停留时间+水分综合影响</div></div>
    <div class="info-card"><div class="label">形态(Bristol)</div><div class="value">${bristol.toFixed(1)}型 - ${bristolMap[bristolInt][0]}</div><div class="desc">${bristolMap[bristolInt][1]}</div></div>
    <div class="info-card"><div class="label">数量</div><div class="value">${Object.keys(selectedFoods).length} 种食物</div><div class="desc">纤维 ${fiber.toFixed(0)} | 脂肪 ${fat.toFixed(0)} | 刺激 ${irritant.toFixed(0)}</div></div>
    <div class="info-card"><div class="label">肠道参数</div><div class="value">停留${transit.toFixed(1)}天</div><div class="desc">饮水${hydration}% | 运动${exercise}% | 睡眠${sleep}%</div></div>
  `;

  const warnBox = document.getElementById('poop-warning');
  if (warnings.length > 0) {
    warnBox.innerHTML = '<strong>健康提示：</strong><br>'+warnings.map(w=>' - '+w).join('<br>');
    warnBox.style.background='#fff5d6'; warnBox.style.borderLeftColor='#f39c12'; warnBox.style.color='#7d5a22';
  } else {
    warnBox.innerHTML = '便便形态非常健康！继续保持均衡饮食与良好作息~';
    warnBox.style.background='#e8f5e9'; warnBox.style.borderLeftColor='#2e7d32'; warnBox.style.color='#2e7d32';
  }
}

function renderPoopSvg(hex, bristol, count) {
  const svg = document.getElementById('poop-svg');
  const lighter = '#'+[Math.min(255,r=parseInt(hex.substr(1,2),16)+30),Math.min(255,g=parseInt(hex.substr(3,2),16)+30),Math.min(255,b=parseInt(hex.substr(5,2),16)+30)].map(v=>v.toString(16).padStart(2,'0')).join('');
  const darker = '#'+[Math.round(r*0.55),Math.round(g*0.55),Math.round(b*0.55)].map(v=>v.toString(16).padStart(2,'0')).join('');

  if (bristol >= 7) {
    svg.innerHTML = `<circle cx="110" cy="150" r="90" fill="${hex}" opacity="0.9"/><ellipse cx="85" cy="138" rx="18" ry="6" fill="${lighter}" opacity="0.5"/><circle cx="55" cy="90" r="9" fill="${hex}" opacity="0.7"/><circle cx="170" cy="85" r="7" fill="${hex}" opacity="0.6"/><text x="110" y="210" font-size="16" text-anchor="middle" fill="#8b6914" font-weight="bold">哗啦啦</text>`;
    return;
  }
  if (bristol >= 6) {
    svg.innerHTML = `<path d="M 40,150 Q 25,105 65,90 Q 90,70 120,78 Q 160,72 180,100 Q 200,125 182,158 Q 175,188 135,182 Q 90,192 68,172 Q 32,168 40,150 Z" fill="${hex}" stroke="${darker}" stroke-width="2"/><text x="110" y="215" font-size="16" text-anchor="middle" fill="#8b6914" font-weight="bold">一滩烂泥</text>`;
    return;
  }

  // 经典一坨
  let content = `<ellipse cx="110" cy="195" rx="85" ry="8" fill="rgba(0,0,0,0.12)"/>`;
  const layers = Math.min(5, 2+Math.min(3,count));
  for (let i=0;i<layers;i++) {
    const y = 140+(layers-1-i)*17 - (layers-1-i)*15 + 15*i;
    const rx = (55-i*6); const ry = (32-i*3);
    content += `<ellipse cx="110" cy="${140+(layers-1-i)*17}" rx="${rx}" ry="${ry}" fill="${hex}" stroke="${darker}" stroke-width="2"/>`;
    if (i>0) content += `<ellipse cx="95" cy="${135+(layers-1-i)*17}" rx="${rx*0.25}" ry="${ry*0.25}" fill="${lighter}" opacity="0.4"/>`;
  }
  content += `<circle cx="110" cy="${140-15*layers+40}" r="10" fill="${hex}" stroke="${darker}" stroke-width="2"/>`;
  // 眼睛
  content += `<circle cx="105" cy="${140-15*layers+38}" r="3" fill="white"/><circle cx="115" cy="${140-15*layers+38}" r="3" fill="white"/><circle cx="105" cy="${140-15*layers+38}" r="1.5" fill="#333"/><circle cx="115" cy="${140-15*layers+38}" r="1.5" fill="#333"/>`;
  svg.innerHTML = content;
}

document.getElementById('generate-btn').onclick = simulate;

// 初始化空状态
updatePie();
</script>
