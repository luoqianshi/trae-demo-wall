<!-- Generated by Trae Work -->
{% extends "theater/base.html" %}
{% block title %}AI 非遗小剧场 — 作品卡片{% endblock %}
{% block body %}
{% load static %}

<nav class="top-nav">
  <div class="container">
    <a class="nav-logo" href="{% url 'index' %}">🏮 AI 非遗小剧场</a>
    <ul class="nav-links">
      <li><a href="{% url 'index' %}">首页</a></li>
      <li><a href="{% url 'themes' %}">选择主题</a></li>
      <li><a href="{% url 'about' %}">关于</a></li>
    </ul>
  </div>
</nav>

<div class="card-wrapper" id="cardContent">
  <div style="text-align:center;padding:3rem 1rem;color:var(--muted);">
    <div style="font-size:3rem;margin-bottom:1rem;">✨</div>
    <p>AI 正在生成你的专属卡片…</p>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <p>AI 非遗小剧场 · 把非遗故事变成可互动的短剧体验</p>
    <p style="margin-top:0.5rem;">© 2026 AI 非遗小剧场 | 非遗创新创意开发</p>
  </div>
</footer>

<script>
(function() {
  'use strict';

  var themeId = '{{ theme.slug }}';
  var pathKey = '{{ path_key }}';
  var summary = '{{ summary|escapejs }}';
  var themeName = '{{ theme.name }}';
  var themeEmoji = '{{ theme.emoji }}';
  var themeImage = '{{ theme.image }}';
  var themeDuration = '{{ theme.duration }}';
  var cardTitle = '{{ theme.card_title }}';

  function shareCard() {
    var shareUrl = window.location.origin + '/card/' + themeId + '/?path=' + encodeURIComponent(pathKey) + '&summary=' + encodeURIComponent(summary);
    var shareText = '🏮 AI 非遗小剧场 · ' + themeName + '\n\n"' + summary + '"\n\n来 AI 非遗小剧场，体验更多非遗互动短剧！';

    if (navigator.share) {
      navigator.share({
        title: 'AI 非遗小剧场 · ' + themeName,
        text: shareText,
        url: shareUrl
      }).catch(function() {});
    } else {
      navigator.clipboard.writeText(shareText).then(function() {
        showToast('✅ 已复制分享文案到剪贴板');
      }).catch(function() {
        showToast('📤 请截图分享你的作品卡片');
      });
    }
  }

  function showToast(msg) {
    var existing = document.querySelector('.toast');
    if (existing) existing.remove();
    var toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 2500);
  }

  window.shareCard = shareCard;

  var now = new Date();
  var dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';

  setTimeout(function() {
    document.getElementById('cardContent').innerHTML =
      '<div class="card-preview">' +
      '<div class="card-title">' + cardTitle + '</div>' +
      '<div class="card-subtitle">AI 非遗小剧场 · ' + themeName + '体验</div>' +
      '<img class="card-img" src="{% static theme.image %}" alt="{{ theme.name }}">' +
      '<div class="card-info">' +
      '<span>{{ theme.emoji }} {{ theme.name }}</span>' +
      '<span>⏱️ {{ theme.duration }}</span>' +
      '<span>📅 ' + dateStr + '</span>' +
      '</div>' +
      '<p class="card-summary">\"' + summary + '\"</p>' +
      '<div class="card-actions">' +
      '<button class="btn btn-primary" onclick="shareCard()">📤 分享作品</button>' +
      '<a class="btn btn-outline" href="{% url "drama" theme.slug %}">🔄 重新体验</a>' +
      '<a class="btn btn-gold" href="{% url "themes" %}">🎭 探索更多主题</a>' +
      '</div>' +
      '</div>';
  }, 800);

})();
</script>
{% endblock %}
