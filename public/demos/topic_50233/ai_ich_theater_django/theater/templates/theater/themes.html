{% extends "theater/base.html" %}
{% block title %}AI 非遗小剧场 — 选择主题{% endblock %}
{% block content %}
{% load static %}

<div class="container">
  <div class="theme-header">
    <h2>🎭 选择非遗主题</h2>
    <p>挑选一个你感兴趣的非遗项目，AI 将为你生成专属互动短剧</p>
  </div>
  <div class="theme-grid" id="themeGrid">
    {% for t in theme_list %}
    <a class="theme-card" href="{% url 'drama' t.slug %}">
      <img class="theme-card-img" src="{% static t.image %}" alt="{{ t.name }}" loading="lazy">
      <div class="theme-card-body">
        <span class="theme-tag">{{ t.tag }}</span>
        <h3>{{ t.emoji }} {{ t.name }}</h3>
        <p>{{ t.desc }}</p>
        <div class="theme-meta"><span>⏱️ {{ t.duration }}</span><span>🎬 互动短剧</span></div>
      </div>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
