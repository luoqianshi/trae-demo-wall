<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>是该富了 - iPhone 演示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #c5c5c5;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* iPhone Frame */
.iphone {
  position: relative;
  width: 390px;
  height: 844px;
  background: #000;
  border-radius: 54px;
  padding: 12px;
  box-shadow:
    0 0 0 2px #3a3a3c,
    0 0 0 5px #1c1c1e,
    0 25px 80px rgba(0,0,0,0.4),
    0 10px 30px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

.iphone::before {
  content: '';
  position: absolute;
  background: #2c2c2e;
  border-radius: 2px 0 0 2px;
  left: -3px;
  top: 140px;
  width: 3px;
  height: 60px;
}

.iphone::after {
  content: '';
  position: absolute;
  background: #2c2c2e;
  border-radius: 2px 0 0 2px;
  left: -3px;
  top: 210px;
  width: 3px;
  height: 60px;
}

.side-btn {
  position: absolute;
  background: #2c2c2e;
  border-radius: 0 2px 2px 0;
}

.side-btn.power {
  right: -3px;
  top: 190px;
  width: 3px;
  height: 80px;
}

/* Screen */
.screen {
  position: relative;
  width: 100%;
  height: 100%;
  background: #000;
  border-radius: 42px;
  overflow: hidden;
}

/* Status Bar - Simple, clean, all icons on same baseline */
.status-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 54px;
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 24px 4px 28px;
  pointer-events: none;
}

.status-left {
  font-size: 15px;
  font-weight: 600;
  color: #000;
  letter-spacing: 0.2px;
  line-height: 20px;
}

.status-right {
  display: flex;
  align-items: flex-end;
  gap: 5px;
  line-height: 20px;
}

/* Signal Bars */
.signal-bars {
  display: flex;
  align-items: flex-end;
  gap: 1.5px;
  height: 12px;
  margin-bottom: 4px;
}

.signal-bar {
  width: 3px;
  background: #000;
  border-radius: 0.5px;
}

.signal-bar:nth-child(1) { height: 4px; }
.signal-bar:nth-child(2) { height: 6px; }
.signal-bar:nth-child(3) { height: 8px; }
.signal-bar:nth-child(4) { height: 11px; }

/* WiFi - Simple filled icon */
.wifi-icon {
  width: 16px;
  height: 13px;
  margin-bottom: 3px;
}

/* Battery */
.battery {
  width: 25px;
  height: 12px;
  border: 1.5px solid #000;
  border-radius: 3.5px;
  position: relative;
  padding: 1.5px;
  margin-bottom: 4px;
}

.battery::after {
  content: '';
  position: absolute;
  right: -3.5px;
  top: 50%;
  transform: translateY(-50%);
  width: 2px;
  height: 5px;
  background: #000;
  border-radius: 0 1px 1px 0;
}

.battery-fill {
  width: 80%;
  height: 100%;
  background: #000;
  border-radius: 1.5px;
}

/* Dynamic Island */
.dynamic-island {
  position: absolute;
  top: 11px;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 37px;
  background: #000;
  border-radius: 20px;
  z-index: 1001;
}

/* Home Indicator */
.home-indicator {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  background: rgba(0,0,0,0.2);
  border-radius: 3px;
  z-index: 1000;
}

/* iframe wrapper - physically hides any scrollbar */
.iframe-wrapper {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border-radius: 42px;
}

.app-iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  background: #f5f5f5;
  overflow: hidden;
}

/* Screen subtle reflection */
.screen::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border-radius: 42px;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.03);
  pointer-events: none;
  z-index: 998;
}

/* Responsive */
@media (max-height: 900px) { .iphone { transform: scale(0.92); } }
@media (max-height: 800px) { .iphone { transform: scale(0.82); } }
@media (max-width: 420px) { .iphone { transform: scale(0.78); } }
@media (max-width: 380px) { .iphone { transform: scale(0.72); } }
</style>
</head>
