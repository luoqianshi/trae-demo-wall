<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas绘图工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <div class="toolbar-header">
                <h2>绘图工具</h2>
            </div>
            
            <div class="mode-section">
                <h3>绘制模式</h3>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="select">选择</button>
                    <button class="mode-btn" data-mode="triangle">三角形</button>
                    <button class="mode-btn" data-mode="quadrilateral">四边形</button>
                    <button class="mode-btn" data-mode="custom">自定义</button>
                </div>
            </div>

            <div class="scale-section">
                <h3>缩放控制</h3>
                <div class="scale-controls">
                    <button class="scale-btn" data-scale="0.5">50%</button>
                    <button class="scale-btn" data-scale="0.75">75%</button>
                    <button class="scale-btn active" data-scale="1">100%</button>
                    <button class="scale-btn" data-scale="1.25">125%</button>
                    <button class="scale-btn" data-scale="1.5">150%</button>
                    <button class="scale-btn" data-scale="2">200%</button>
                </div>
                <div class="scale-slider-container">
                    <input type="range" id="scale-slider" min="0.25" max="3" step="0.05" value="1">
                    <span id="scale-value">100%</span>
                </div>
            </div>

            <div class="action-section">
                <h3>操作</h3>
                <button class="action-btn" id="clear-btn">清除所有</button>
                <button class="action-btn" id="delete-btn">删除选中</button>
            </div>

            <div class="status-section">
                <h3>状态</h3>
                <div class="status-info">
                    <p>当前模式: <span id="current-mode">选择</span></p>
                    <p>图形数量: <span id="shape-count">0</span></p>
                    <p>选中图形: <span id="selected-shape">无</span></p>
                </div>
            </div>

            <div class="help-section">
                <h3>使用说明</h3>
                <ul>
                    <li>选择模式：单击选中图形，拖动移动</li>
                    <li>选中后：拖拽控制点可改变形状</li>
                    <li>三角形：点击3个点绘制</li>
                    <li>四边形：点击4个点绘制</li>
                    <li>自定义：点击多个点，双击完成</li>
                </ul>
            </div>
        </div>

        <div class="canvas-container">
            <div class="canvas-wrapper">
                <canvas id="drawing-canvas" width="500" height="500"></canvas>
            </div>
            <div class="canvas-info">
                <span>画布大小: 1000 x 1000</span>
            </div>
        </div>
    </div>

    <div class="json-container">
        <div class="json-header">
            <h3>图形数据 (JSON)</h3>
            <button class="apply-json-btn" id="apply-json-btn">应用修改</button>
        </div>
        <textarea id="json-textarea" spellcheck="false"></textarea>
        <div class="json-tips">
            <span>提示：修改JSON中的坐标值，点击"应用修改"可更新图形位置</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
