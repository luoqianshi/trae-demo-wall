                8: [
                    { id: 'hist8_1', title: '第一单元 中国开始沦为半殖民地半封建社会', content: `
                        <h3>第1课 鸦片战争</h3>
                        <h4>鸦片走私与林则徐禁烟</h4>
                        <ul>
                            <li>鸦片战争前，英国向中国大量走私鸦片</li>
                            <li>鸦片走私给中华民族带来深重灾难：白银大量外流、政治腐败、军队战斗力削弱</li>
                            <li>1838年底，道光帝派林则徐前往广东查禁鸦片</li>
                            <li>1839年6月，林则徐在虎门海滩当众销毁收缴的鸦片（虎门销烟）</li>
                            <li>虎门销烟是中国人民禁烟斗争的伟大胜利，显示了中华民族反抗外来侵略的坚强意志</li>
                        </ul>
                        <h4>英国发动侵略战争</h4>
                        <ul>
                            <li>根本原因：英国为打开中国市场，推销工业品，掠夺原料</li>
                            <li>直接原因（导火线）：林则徐虎门销烟</li>
                            <li>时间：1840年6月-1842年8月</li>
                            <li>英军封锁珠江口后，北上攻陷浙江定海，直趋天津</li>
                            <li>1841年初，英军强占香港岛</li>
                            <li>广东水师提督关天培、江南提督陈化成等战死</li>
                        </ul>
                        <h4>《南京条约》的签订</h4>
                        <ul>
                            <li>1842年8月，清政府被迫与英国签订《南京条约》</li>
                            <li>《南京条约》内容：割香港岛给英国；赔款2100万银元；开放广州、厦门、福州、宁波、上海五处为通商口岸；协定关税</li>
                            <li>1843年，英国又强迫清政府签订《虎门条约》</li>
                            <li>1844年，清政府被迫与美国签订《望厦条约》，与法国签订《黄埔条约》</li>
                            <li>影响：中国开始沦为半殖民地半封建社会，是中国近代史的开端</li>
                        </ul>
                        <h4>不平等条约对比表</h4>
                        <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;text-align:center;margin-bottom:12px;">
                            <tr style="background:#f0f0ff;"><th>条约</th><th>时间</th><th>签订国家</th><th>主要内容</th><th>影响</th></tr>
                            <tr><td><strong>《南京条约》</strong></td><td>1842年</td><td>中英</td><td>割香港岛、赔款、五口通商、协定关税</td><td>中国开始沦为半殖民地半封建社会</td></tr>
                            <tr><td>《虎门条约》</td><td>1843年</td><td>中英</td><td>领事裁判权、片面最惠国待遇</td><td>破坏中国司法主权</td></tr>
                            <tr><td>《天津条约》</td><td>1858年</td><td>俄美英法</td><td>外国公使驻京、增开十口通商、外国商船长江航行</td><td>侵略势力深入内地</td></tr>
                            <tr><td><strong>《北京条约》</strong></td><td>1860年</td><td>中英中法</td><td>割九龙司、增开天津为商埠、赔款</td><td>半殖民地化程度加深</td></tr>
                            <tr><td>《马关条约》</td><td>1895年</td><td>中日</td><td>割台澎、赔款2亿两、开四口、允许设厂</td><td>大大加深半殖民地化</td></tr>
                            <tr><td><strong>《辛丑条约》</strong></td><td>1901年</td><td>八国</td><td>赔款4.5亿两、拆炮台、设使馆界、禁止反帝</td><td>完全沦为半殖民地半封建社会</td></tr>
                        </table>
                        <p>口诀：<strong>鸦片战争南京约，割赔通商协关税；甲午马关割台澎，设厂赔款两亿两；八国联军辛丑约，赔款最多主权丧</strong></p>
                        <h3>第2课 第二次鸦片战争</h3>
                        <h4>英法再次发动侵华战争</h4>
                        <ul>
                            <li>根本原因：西方列强企图进一步打开中国市场，扩大侵略权益</li>
                            <li>直接原因："亚罗号事件"和"马神甫事件"</li>
                            <li>时间：1856年-1860年</li>
                            <li>1856年10月，英军炮轰广州，挑起战争</li>
                            <li>1857年，英法联军攻陷广州；1858年，攻陷大沽炮台，逼近天津</li>
                            <li>1858年，清政府被迫与俄、美、英、法签订《天津条约》</li>
                        </ul>
                        <h4>火烧圆明园与《北京条约》的签订</h4>
                        <ul>
                            <li>1860年，英法联军占领天津，进逼北京</li>
                            <li>英法联军火烧圆明园（人类文明的浩劫）</li>
                            <li>1860年，清政府被迫签订中英、中法《北京条约》</li>
                            <li>第二次鸦片战争使中国丧失更多主权，西方侵略势力由东南沿海深入到长江中下游地区</li>
                        </ul>
                        <h4>沙俄侵占中国北方大片领土</h4>
                        <ul>
                            <li>第二次鸦片战争前后，沙俄强迫清政府签订一系列不平等条约</li>
                            <li>共割占中国东北和西北领土150多万平方千米</li>
                            <li>是近代侵占中国领土最多的国家</li>
                        </ul>
                        <h3>第3课 太平天国运动</h3>
                        <h4>洪秀全与金田起义</h4>
                        <ul>
                            <li>1851年1月11日，洪秀全在广西桂平县金田村发动起义，建号太平天国</li>
                            <li>起义军称"太平军"</li>
                        </ul>
                        <h4>定都天京</h4>
                        <ul>
                            <li>1853年3月，太平军攻占南京，改名为天京，作为都城</li>
                            <li>颁布《天朝田亩制度》，规定不分男女，按人口和年龄平均分配土地</li>
                            <li>《天朝田亩制度》反映了千百年来农民要求得到土地的强烈愿望</li>
                        </ul>
                        <h4>天京陷落</h4>
                        <ul>
                            <li>1856年，天京事变，太平天国由盛转衰</li>
                            <li>洪仁玕写成《资政新篇》，提出向西方学习、改革内政等主张</li>
                            <li>1864年，天京陷落，太平天国运动失败</li>
                            <li>太平天国运动是中国历史上规模最宏大的一次农民战争</li>
                            <li>沉重打击了清朝的统治和外国侵略势力</li>
                        </ul>
                    ` },
                    { id: 'hist8_2', title: '第二单元 近代化的早期探索与民族危机的加剧', content: `
                        <h3>第4课 洋务运动</h3>
                        <h4>洋务运动的兴起</h4>
                        <ul>
                            <li>时间：19世纪60年代-90年代中期</li>
                            <li>代表人物：奕訢、曾国藩、李鸿章、左宗棠、张之洞等</li>
                            <li>主张：利用西方先进技术，强兵富国，维护清王朝的统治</li>
                        </ul>
                        <h4>创办近代军事和民用企业</h4>
                        <ul>
                            <li>口号："自强""求富"</li>
                            <li>口诀：<strong>洋务运动两口号，自强求富记心间；军事工业先起步，安庆江南和福州；民用企业随后办，轮船开平和汉阳</strong></li>
                            <li>创办近代军事工业：安庆内军械所、江南制造总局、福州船政局等</li>
                            <li>创办近代民用企业：轮船招商局、开平煤矿、汉阳铁厂、湖北织布局等</li>
                            <li>新式海陆军：组建新式洋枪队；建成南洋、北洋和福建、广东四支海军</li>
                        </ul>
                        <h4>新式教育</h4>
                        <ul>
                            <li>兴办新式学校（京师同文馆），培养翻译和军事人才</li>
                            <li>设立翻译馆，翻译外国科技书籍</li>
                            <li>派遣留学生出国深造</li>
                        </ul>
                        <h4>洋务运动的评价</h4>
                        <ul>

                            <li>客观上促进了中国民族资本主义的产生</li>
                            <li>对外国资本的入侵起了一定的抵制作用</li>
                            <li>洋务运动的根本目的是维护和巩固清政府的统治，加上其内部的腐败和外国势力的挤压，它没有使中国走上富强的道路</li>
                        </ul>
                        <h3>第5课 甲午中日战争与瓜分中国狂潮</h3>
                        <h4>甲午中日战争</h4>
                        <ul>
                            <li>时间：1894年-1895年（1894年是农历甲午年）</li>
                            <li>平壤战役：左宝贵牺牲</li>
                            <li>黄海海战：邓世昌壮烈殉国，北洋舰队损失较大，但主力尚存</li>
                            <li>辽东战役：日军占领大连、旅顺，制造旅顺大屠杀</li>
                            <li>威海卫战役：北洋舰队全军覆没</li>
                        </ul>
                        <h4>《马关条约》的签订</h4>
                        <ul>
                            <li>1895年春，李鸿章赴日本马关签订《马关条约》</li>
                            <li>内容：清政府割辽东半岛、台湾全岛及所有附属各岛屿、澎湖列岛给日本；赔偿日本兵费白银2亿两；开放沙市、重庆、苏州、杭州为商埠；允许日本在通商口岸开设工厂等</li>
                            <li>影响：使外国侵略势力进一步深入中国腹地，大大加深了中国的半殖民地化程度</li>
                        </ul>
                        <h4>瓜分中国狂潮</h4>
                        <ul>
                            <li>三国干涉还辽：俄国、法国、德国迫使日本放弃辽东半岛</li>
                            <li>列强在中国抢夺利权、强租海港、划分"势力范围"</li>
                            <li>美国提出"门户开放"政策</li>
                        </ul>
                        <h3>第6课 戊戌变法</h3>
                        <h4>康有为与公车上书</h4>
                        <ul>
                            <li>1895年春，《马关条约》签订的消息传到北京，康有为、梁启超等发起"公车上书"</li>
                            <li>"公车上书"揭开变法维新运动的序幕</li>
                            <li>维新人士创办报刊，组织学会，宣传变法</li>
                            <li>影响最大的报刊是上海的《时务报》和天津的《国闻报》</li>
                        </ul>
                        <h4>百日维新</h4>
                        <ul>
                            <li>1898年6月11日，光绪帝颁布"明定国是"诏书，宣布实行变法</li>
                            <li>因历时103天，又称"百日维新"</li>
                            <li>变法内容：裁撤冗官冗员，允许官民上书言事；鼓励私人兴办工矿企业；改革财政，编制国家预算；废除八股，改试策论，开办新式学堂；裁减绿营，训练新式军队等</li>
                        </ul>
                        <h4>戊戌政变</h4>
                        <ul>
                            <li>1898年9月21日，慈禧太后等发动政变，囚禁光绪帝，搜捕维新人士</li>
                            <li>谭嗣同、刘光第、林旭、杨锐、杨深秀、康广仁六人被捕遇害，史称"戊戌六君子"</li>
                            <li>戊戌变法失败</li>
                            <li>意义：在思想文化方面产生了广泛而持久的影响，起到思想启蒙的作用</li>
                        </ul>
                        <h4>戊戌变法要点</h4>
                        <ul>
                            <li>口诀：<strong>戊戌变法百日期，光绪下诏要维新；政治经济和文化，军事教育都有新；慈禧政变六君子，思想启蒙意义深</strong></li>
                            <li><strong>戊戌变法性质：</strong>资产阶级改良运动</li>
                            <li><strong>失败原因：</strong>资产阶级软弱性、封建势力强大、缺乏群众基础</li>
                            <li><strong>历史意义：</strong>思想启蒙作用，促进民族觉醒</li>
                        </ul>
                        <h3>第7课 八国联军侵华与《辛丑条约》签订</h3>
                        <h4>义和团运动</h4>
                        <ul>
                            <li>义和团运动兴起于山东、直隶一带，是一场反帝爱国运动</li>
                            <li>口号："扶清灭洋"</li>
                            <li>义和团运动沉重打击了帝国主义瓜分中国的野心</li>
                        </ul>
                        <h4>八国联军侵华</h4>
                        <ul>
                            <li>1900年6月，英、美、俄、日、法、德、意、奥八国组织联军发动侵华战争</li>
                            <li>义和团和清军在北京围攻西什库教堂和东交民巷使馆区</li>
                            <li>天津保卫战，聂士成壮烈殉国</li>
                            <li>8月，八国联军攻陷北京，慈禧太后携光绪帝西逃</li>
                        </ul>
                        <h4>《辛丑条约》的签订</h4>
                        <ul>
                            <li>1901年，清政府被迫同英、美、俄、日、法、德、意、奥、比、荷、西11国签订《辛丑条约》</li>
                            <li>内容：清政府赔款白银4.5亿两；清政府保证严禁人民参加各种形式的反帝活动；清政府拆毁大沽炮台，允许外国军队驻扎在从北京到山海关的铁路沿线要地；划定北京东交民巷为使馆界，允许各国派兵驻守，不准中国人居住；改总理衙门为外务部，班列六部之前</li>
                            <li>影响：中国完全陷入半殖民地半封建社会的深渊</li>
                        </ul>
                    ` },
                    { id: 'hist8_3', title: '第三单元 资产阶级民主革命与中华民国的建立', content: `
                        <h3>第8课 革命先行者孙中山</h3>
                        <h4>孙中山早年的革命活动</h4>
                        <ul>
                            <li>1894年11月，孙中山在檀香山成立兴中会，提出"振兴中华"的宗旨</li>
                            <li>1895年，准备在广州发动武装起义，失败后流亡海外</li>
                        </ul>
                        <h4>同盟会与三民主义</h4>
                        <ul>
                            <li>1905年8月，孙中山在日本东京成立中国同盟会</li>
                            <li>同盟会是第一个全国规模的、统一的资产阶级革命政党</li>
                            <li>政治纲领："驱除鞑虏，恢复中华，创立民国，平均地权"</li>
                            <li>机关报：《民报》</li>
                            <li>三民主义：民族、民权、民生，成为孙中山领导资产阶级革命的指导思想</li>
                            <li>口诀：<strong>三民主义三大纲，民族民权和民生；驱除鞑虏复中华，创立民国平地权</strong></li>
                        </ul>
                        <h3>第9课 辛亥革命</h3>
                        <h4>革命过程时间轴</h4>
                        <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;text-align:center;margin-bottom:12px;">
                            <tr style="background:#f0f0ff;"><th>时间</th><th>事件</th><th>意义</th></tr>
                            <tr><td>1894年</td><td>兴中会成立</td><td>第一个资产阶级革命团体</td></tr>
                            <tr><td>1905年</td><td>同盟会成立</td><td>第一个全国规模的资产阶级革命政党</td></tr>
                            <tr><td>1911年4月</td><td>黄花岗起义</td><td>七十二烈士，鼓舞人心</td></tr>
                            <tr><td><strong>1911年10月10日</strong></td><td><strong>武昌起义</strong></td><td>辛亥革命爆发</td></tr>
                            <tr><td>1912年1月1日</td><td>中华民国成立</td><td>孙中山任临时大总统</td></tr>
                            <tr><td>1912年2月12日</td><td>清帝退位</td><td>清朝统治结束</td></tr>
                            <tr><td>1912年3月</td><td>《临时约法》颁布</td><td>第一部资产阶级共和国宪法</td></tr>
                        </table>
                        <h4>革命志士的奋斗</h4>
                        <ul>
                            <li>萍浏醴起义：同盟会成立后领导的第一次武装起义</li>
                            <li>安庆起义：徐锡麟、秋瑾牺牲</li>
                            <li>广西起义：孙中山、黄兴领导</li>
                            <li>黄花岗起义：1911年4月，黄兴领导，七十二烈士</li>
                        </ul>
                        <h4>武昌起义</h4>
                        <ul>
                            <li>1911年10月10日，武昌起义爆发（辛亥革命）</li>
                            <li>10月11日，起义军成立湖北军政府，黎元洪为都督</li>
                            <li>到11月下旬，全国已有一半以上的省份宣布独立</li>
                        </ul>
                        <h3>第10课 中华民国的创建</h3>
                        <h4>中华民国的建立</h4>
                        <ul>
                            <li>1912年1月1日，中华民国临时政府在南京成立，孙中山任临时大总统</li>
                            <li>以1912年为民国元年，改用公历</li>
                            <li>南京临时政府的成立是孙中山领导的资产阶级民主革命的重要成果</li>
                        </ul>
                        <h4>袁世凯窃取革命果实</h4>
                        <ul>
                            <li>武昌起义后，袁世凯出任内阁总理大臣</li>
                            <li>在袁世凯软硬兼施的逼迫下，宣统帝下诏退位</li>
                            <li>1912年2月12日，清朝统治结束</li>
                            <li>袁世凯就任临时大总统，辛亥革命的胜利果实被袁世凯窃取</li>
                        </ul>
                        <h4>《中华民国临时约法》</h4>
                        <ul>
                            <li>1912年3月11日，孙中山颁布《中华民国临时约法》</li>
                            <li>内容：中华民国的主权属于全体国民；国民不分种族、阶级、宗教信仰，一律平等；国民有人身、居住、言论、出版、集会、结社、宗教信仰及请愿、考试、选举、参政等自由和权利；参议院行使立法权，国务员辅佐临时大总统行使行政权并负其责任，司法独立等</li>
                            <li>性质：中国历史上第一部资产阶级共和国宪法性质的重要文件</li>
                            <li>肯定了资产阶级民主共和制度和民主自由原则，是辛亥革命的重要成果</li>
                        </ul>
                        <h3>第11课 北洋政府的统治与军阀割据</h3>
                        <h4>二次革命</h4>
                        <ul>
                            <li>宋教仁遇刺案（1913年春）</li>
                            <li>"二次革命"：孙中山和黄兴等号召南方各省起来反袁</li>
                            <li>由于国民党力量涣散，二次革命很快被袁世凯镇压下去</li>
                        </ul>
                        <h4>袁世凯复辟帝制</h4>
                        <ul>
                            <li>袁世凯强迫国会选举他为正式大总统</li>
                            <li>解散国民党和国会，废除《中华民国临时约法》</li>
                            <li>接受日本旨在灭亡中国的"二十一条"的大部分内容</li>
                            <li>1915年末，袁世凯下令以1916年为"中华帝国洪宪元年"，准备元旦登基</li>
                        </ul>
                        <h4>护国战争</h4>
                        <ul>
                            <li>孙中山发表《讨袁檄文》，号召爱国豪杰共同奋起，维护共和制度</li>
                            <li>1915年底，蔡锷、李烈钧、唐继尧在云南宣告独立，组织护国军北上讨袁</li>
                            <li>1916年3月，袁世凯被迫宣布取消帝制，6月在绝望中死去</li>
                        </ul>
                        <h4>军阀割据</h4>
                        <ul>
                            <li>袁世凯死后，北洋军阀分裂</li>
                            <li>直系（冯国璋、曹锟）、皖系（段祺瑞）、奉系（张作霖）</li>
                            <li>大小军阀连年混战，中国陷入了军阀割据纷争的动乱之中</li>
                        </ul>
                    ` },
                    { id: 'hist8_4', title: '第四单元 新民主主义革命的开始', content: `
                        <h3>第12课 新文化运动</h3>
                        <h4>新文化运动的兴起</h4>
                        <ul>
                            <li>开始标志：1915年，陈独秀在上海创办《青年杂志》（后改名《新青年》）</li>
                            <li>代表人物：陈独秀、胡适、李大钊、鲁迅等</li>
                            <li>主要阵地：《新青年》和北京大学</li>
                        </ul>
                        <h4>新文化运动的内容与意义</h4>
                        <ul>
                            <li>口诀：<strong>新文化运动两口号，民主科学要记牢；反对旧道德旧文化，文学革命白话好</strong></li>
                            <li>口号："民主"与"科学"</li>
                            <li>内容：抨击旧道德和旧文化；提倡民主与科学；提倡文学革命（主张用白话文代替文言文）</li>
                            <li>鲁迅发表白话小说《狂人日记》，以新文学的形式深刻揭露了封建礼教的吃人本质</li>
                            <li>胡适发表《文学改良刍议》，主张以白话文作为新文学的语言</li>
                            <li>陈独秀发表《文学革命论》，主张推倒旧文学，建设新文学</li>
                            <li>意义：新文化运动动摇了封建道德礼教的统治地位，使中国人民接受了一次民主与科学的洗礼，为随后爆发的五四运动起了思想宣传和铺垫的作用</li>
                            <li>局限性：对于中国传统文化的看法带有一定的片面性</li>
                        </ul>
                        <h3>第13课 五四运动</h3>
                        <h4>五四运动的爆发</h4>

        function backToSubject() {
            showPage('subject-page');
        }

        function backToKnowledge() {
            showPage('knowledge-page');
        }

        // ==================== 练习功能 ====================
        function startQuiz() {
            const quizData = quizzes[currentChapter.id];
            if (!quizData) {
                alert('该章节暂无练习题');
                return;
            }
            // 从题库中随机抽取10道不重复的题
            const shuffled = [...quizData].sort(() => Math.random() - 0.5);
            currentQuiz = shuffled.slice(0, 10);
            currentQuestion = 0;
            userAnswers = [];
            renderQuestion();
            showPage('quiz-page');
        }

        function renderQuestion() {
            const q = currentQuiz[currentQuestion];
            document.getElementById('quiz-progress').textContent = `${currentQuestion + 1}/${currentQuiz.length}`;
            document.getElementById('quiz-progress-bar').style.width = `${((currentQuestion + 1) / currentQuiz.length) * 100}%`;

            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <div class="question-card">
                    <h4>${currentQuestion + 1}. ${q.q}</h4>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${i})" data-index="${i}">${String.fromCharCode(65+i)}. ${opt}</div>
                        `).join('')}
                    </div>
                </div>
                <button class="btn-primary" id="next-btn" onclick="nextQuestion()" disabled>下一题</button>
            `;
        }

        function selectOption(index) {
            const options = document.querySelectorAll('.option');
            options.forEach(o => o.classList.remove('selected'));
            options[index].classList.add('selected');
            document.getElementById('next-btn').disabled = false;
            userAnswers[currentQuestion] = index;
        }

        function nextQuestion() {
            if (currentQuestion < currentQuiz.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            let correct = 0;
            const errors = [];
            currentQuiz.forEach((q, i) => {
                if (userAnswers[i] === q.answer) {
                    correct++;
                } else {
                    errors.push({
                        subject: subjects[currentSubject].name,
                        chapter: currentChapter.title,
                        question: q.q,
                        knowledge: q.knowledge,
                        date: new Date().toLocaleDateString()
                    });
                }
            });

            // 记录错题
            errorRecords = [...errorRecords, ...errors];
            localStorage.setItem('errorRecords', JSON.stringify(errorRecords));

            document.getElementById('score-display').textContent = correct;
            document.getElementById('score-detail').textContent = `共${currentQuiz.length}题，答对${correct}题，正确率${Math.round(correct/currentQuiz.length*100)}%`;

            const errorList = document.getElementById('error-list');
            if (errors.length > 0) {
                errorList.innerHTML = '<h3 style="margin-bottom: 12px;">错题知识点：</h3>' + errors.map(e => `
                    <div class="error-record">
                        <strong>题目：</strong>${e.question}<br>
                        <strong>对应知识点：</strong>${e.knowledge}
                    </div>
                `).join('');
            } else {
                errorList.innerHTML = '<p style="color: #4caf50;">太棒了！全部答对！</p>';
            }

            showPage('result-page');
        }

        // ==================== 错题记录 ====================
        let currentErrorFilter = 'all';

        function showErrors() {
            currentErrorFilter = 'all';
            updateErrorTabs();
            renderErrors();
            showPage('errors-page');
        }

        function filterErrors(subject) {
            currentErrorFilter = subject;
            updateErrorTabs();
            renderErrors();
        }

        function updateErrorTabs() {
            const tabs = ['all', 'geo', 'bio', 'moral', 'hist'];
            const subjects_map = { 'all': '全部', 'geo': '地理', 'bio': '生物', 'moral': '道德与法治', 'hist': '历史' };
            tabs.forEach(tab => {
                const el = document.getElementById('error-tab-' + tab);
                if (el) {
                    el.classList.toggle('active', currentErrorFilter === subjects_map[tab] || (tab === 'all' && currentErrorFilter === 'all'));
                }
            });
        }

        function renderErrors() {
            const list = document.getElementById('errors-list');
            if (errorRecords.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #666;">暂无错题记录</p>';
                return;
            }

            // 按当前筛选条件过滤
            let filtered = errorRecords;
            if (currentErrorFilter !== 'all') {
                filtered = errorRecords.filter(e => e.subject === currentErrorFilter);
            }

            if (filtered.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #666;">该学科暂无错题记录</p>';
                return;
            }

            // 按知识点去重
            const uniqueErrors = [];
            const seen = new Set();
            [...filtered].reverse().forEach(e => {
                if (!seen.has(e.question)) {
                    seen.add(e.question);
                    uniqueErrors.push(e);
                }
            });

            list.innerHTML = uniqueErrors.map(e => `
                <div class="error-record">
                    <span class="badge">${e.subject}</span>
                    <span class="badge" style="background: #764ba2;">${e.chapter}</span>
                    <div style="margin-top: 8px;"><strong>题目：</strong>${e.question}</div>
                    <div style="margin-top: 4px; color: #666;"><strong>知识点：</strong>${e.knowledge}</div>
                    <div style="margin-top: 4px; font-size: 12px; color: #999;">${e.date}</div>
                </div>
            `).join('');
        }

        // ==================== 初始化 ====================
        showHome();
    
</script>
</body>
</html>
