<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>初中学习助手 - 小四门</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 20px;
        }
        .subject-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 16px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .subject-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .subject-card .icon { font-size: 36px; margin-bottom: 8px; }
        .subject-card h3 { font-size: 18px; margin-bottom: 4px; }
        .subject-card p { font-size: 12px; opacity: 0.9; }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4a5568;
            background: #edf2f7;
            cursor: pointer;
            margin-bottom: 16px;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid #cbd5e0;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: #e2e8f0;
            color: #2d3748;
            border-color: #a0aec0;
        }
        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chapter-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid #667eea;
        }
        .chapter-item:hover { background: #e9ecef; }
        .chapter-item h4 { font-size: 16px; margin-bottom: 4px; }
        .chapter-item p { font-size: 13px; color: #666; }
        .knowledge-content {
            line-height: 1.8;
            font-size: 15px;
        }
        .knowledge-content h3 {
            color: #667eea;
            margin: 16px 0 8px;
            font-size: 18px;
        }
        .knowledge-content h4 {
            color: #764ba2;
            margin: 12px 0 6px;
            font-size: 16px;
        }
        .knowledge-content ul {
            margin-left: 20px;
            margin-bottom: 12px;
        }
        .knowledge-content li { margin-bottom: 6px; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; }
        .quiz-container { margin-top: 20px; }
        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .question-card h4 { margin-bottom: 12px; font-size: 16px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover { border-color: #667eea; }
        .option.selected { border-color: #667eea; background: #f0f0ff; }
        .option.correct { border-color: #4caf50; background: #e8f5e9; }
        .option.wrong { border-color: #f44336; background: #ffebee; }
        .result-card {
            text-align: center;
            padding: 30px;
        }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            margin: 0 auto 20px;
        }
        .error-record {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: white;
            border-radius: 12px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .hidden { display: none !important; }
        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
        }
        @media (max-width: 480px) {
            .container { padding: 12px; }
            .header h1 { font-size: 24px; }
            .subject-grid { gap: 12px; }
            .subject-card { padding: 18px 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>初中学习助手</h1>
            <p>地理 · 生物 · 道德与法治 · 历史</p>
        </div>

        <!-- 首页 -->
        <div id="home-page">
            <div class="card">
                <h3 style="margin-bottom: 8px;">选择学科</h3>
                <p style="color: #666; font-size: 14px;">点击学科查看知识点和练习</p>
                <div class="subject-grid">
                    <div class="subject-card" onclick="showSubject('geo')">
                        <div class="icon">🌍</div>
                        <h3>地理</h3>
                        <p>湘教版</p>
                    </div>
                    <div class="subject-card" onclick="showSubject('bio')">
                        <div class="icon">🔬</div>
                        <h3>生物</h3>
                        <p>苏教版</p>
                    </div>
                    <div class="subject-card" onclick="showSubject('moral')">
                        <div class="icon">📖</div>
                        <h3>道德与法治</h3>
                        <p>人教版</p>
                    </div>
                    <div class="subject-card" onclick="showSubject('hist')">
                        <div class="icon">🏛️</div>
                        <h3>历史</h3>
                        <p>人教版</p>
                    </div>
                </div>
            </div>
            <div class="card" onclick="showErrors()" style="cursor: pointer;">
                <h3>📋 错题知识点记录</h3>
                <p style="color: #666; font-size: 14px; margin-top: 8px;">查看练习中做错的题目和对应知识点</p>
            </div>
        </div>

        <!-- 学科页面 -->
        <div id="subject-page" class="hidden">
            <div class="back-btn" onclick="showHome()">
                <span>←</span> 返回首页
            </div>
            <div class="card">
                <h2 id="subject-title"></h2>
                <div class="tab-bar">
                    <div class="tab active" onclick="switchGrade(7)" id="tab-7">七年级</div>
                    <div class="tab" onclick="switchGrade(8)" id="tab-8">八年级</div>
                </div>
                <div id="chapter-list" class="chapter-list"></div>
            </div>
        </div>

        <!-- 知识点页面 -->
        <div id="knowledge-page" class="hidden">
            <div class="back-btn" onclick="backToSubject()">
                <span>←</span> 返回章节列表
            </div>
            <div class="card">
                <h2 id="chapter-title"></h2>
                <div class="progress-bar"><div class="progress-fill" style="width: 0%"></div></div>
                <div id="knowledge-content" class="knowledge-content"></div>
                <button class="btn-primary" onclick="startQuiz()">开始练习 (10道题)</button>
            </div>
        </div>

        <!-- 练习页面 -->
        <div id="quiz-page" class="hidden">
            <div class="back-btn" onclick="backToKnowledge()">
                <span>←</span> 返回知识点
            </div>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3>练习题</h3>
                    <span id="quiz-progress">1/10</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="quiz-progress-bar" style="width: 10%"></div>
                </div>
                <div id="quiz-container" class="quiz-container"></div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-page" class="hidden">
            <div class="back-btn" onclick="showHome()">
                <span>←</span> 返回首页
            </div>
            <div class="card result-card">
                <div class="score-circle" id="score-display">0</div>
                <h2>练习完成!</h2>
                <p id="score-detail" style="margin: 12px 0; color: #666;"></p>
                <div id="error-list" style="text-align: left; margin-top: 20px;"></div>
                <button class="btn-primary" onclick="showHome()" style="margin-top: 20px;">返回首页</button>
            </div>
        </div>

        <!-- 错题记录页面 -->
        <div id="errors-page" class="hidden">
            <div class="back-btn" onclick="showHome()">
                <span>←</span> 返回首页
            </div>
            <div class="card">
                <h2>错题知识点记录</h2>
                <div class="tab-bar" style="margin-top: 16px;">
                    <div class="tab active" onclick="filterErrors('all')" id="error-tab-all">全部</div>
                    <div class="tab" onclick="filterErrors('地理')" id="error-tab-geo">地理</div>
                    <div class="tab" onclick="filterErrors('生物')" id="error-tab-bio">生物</div>
                    <div class="tab" onclick="filterErrors('道德与法治')" id="error-tab-moral">道法</div>
                    <div class="tab" onclick="filterErrors('历史')" id="error-tab-hist">历史</div>
                </div>
                <div id="errors-list" style="margin-top: 16px;"></div>
            </div>
        </div>
    </div>

    <script>

        // ==================== 数据 ====================
        const subjects = {
            geo: { name: '地理', publisher: '人教版' },
            bio: { name: '生物', publisher: '苏教版' },
            moral: { name: '道德与法治', publisher: '人教版' },
            hist: { name: '历史', publisher: '人教版' }
        };

        const chapters = {
            geo: {
                7: [
                    { id: 'geo7_1', title: '第一章 让我们走进地理', content: `
                        <h3>第一节 我们身边的地理知识</h3>
                        <ul>
                            <li>"地理"一词最早出现在先秦时期的《周易·系辞上》</li>
                            <li>在西方，古希腊学者埃拉托色尼第一次提出"地理"一词，并写出专著《地理学》</li>
                            <li>以风车而著名的国家是荷兰</li>
                            <li>阿拉伯人的传统服装多是身穿白色长袍，头戴头巾，原因是反射阳光、抵挡风沙</li>
                            <li>地理与日常生活：天气预报指导穿衣出行；地图帮助我们选择最佳路线</li>
                            <li>地理与生产建设：荷兰风车用于排水造陆；意大利威尼斯"水城"因地制宜发展水上交通</li>
                            <li>地理与风土人情：因纽特人住冰屋（适应严寒）；东南亚高脚屋（防潮防虫）；黄土高原窑洞（冬暖夏凉）</li>
                        </ul>
                        <h3>第二节 我们怎样学地理</h3>
                        <h4>地图三要素</h4>
                        <ul>
                            <li><strong>方向：</strong>有指向标的地图，指向标箭头一般指向北方；没有指向标的地图采用"上北下南，左西右东"；经纬网地图上，经线指示南北方向，纬线指示东西方向</li>
                            <li><strong>比例尺：</strong>比例尺=图上距离/实地距离。比例尺越大，所示范围越小，内容越详细；比例尺越小，所示范围越大，内容越简略</li>
                            <li><strong>图例和注记：</strong>图例是地理事物的符号表示；注记是地图上的文字和数字说明</li>
                        </ul>
                        <h4>比例尺的三种表示方式</h4>
                        <ul>
                            <li>数字式：如1:100000</li>
                            <li>文字式："图上1厘米等于实地距离1千米"</li>
                            <li>线段式：用线段表示实地距离</li>
                        </ul>
                        <h4>地图的分类</h4>
                        <ul>
                            <li>自然地图：地形图、气候图、水文图、植被图等</li>
                            <li>社会经济地图：工业图、农业图、商业图、交通图、人口分布图等</li>
                            <li>现代地图：电子地图、遥感影像地图、GIS地图等</li>
                        </ul>
                        <h4>学习地理的方法</h4>
                        <ul>
                            <li>善于观察，发现问题；学会读图、用图、绘图</li>
                            <li>联系实际，勤于实践；归纳总结，构建知识体系</li>
                            <li>口诀记忆：地图方向三种定，指向标北经纬网；上北下南左西东，无标无网用此章</li>
                        </ul>
                    ` },
                    { id: 'geo7_2', title: '第二章 认识地球', content: `
                        <h3>第一节 地球与地球仪</h3>
                        <ul>
                            <li>地球是太阳系八颗行星之一，是目前已知唯一存在高级智慧生命的天体</li>
                            <li>太阳系八大行星：水星、金星、地球、火星、木星、土星、天王星、海王星（口诀：水金地火木土天海）</li>
                            <li>小行星带位于火星和木星之间</li>
                            <li>地球是一个两极稍扁、赤道略鼓的不规则球体</li>
                            <li>麦哲伦船队的环球航行第一次证明地球是圆的</li>
                            <li>地球平均半径约6371千米，赤道周长约4万千米，表面积约5.1亿平方千米</li>
                            <li>地球形状的认识过程：天圆地方→天如斗笠地如覆盘→麦哲伦环球航行→地球卫星照片</li>
                            <li>能证明地球是球体的证据：海边看船先见桅杆后见船身；月食时地球影子是圆形；登高望远；卫星照片</li>
                        </ul>
                        <h3>第二节 地球的运动</h3>
                        <ul>
                            <li><strong>自转：</strong>地球绕地轴自西向东旋转，周期约24小时（一天），产生昼夜交替现象、日月星辰东升西落、地方时差异</li>
                            <li><strong>公转：</strong>地球绕太阳自西向东运行，周期约365天（一年），产生四季变化、昼夜长短变化、五带划分、正午太阳高度变化</li>
                            <li>地球公转时，地轴与公转轨道面成66.5°的固定倾角，且北极始终指向北极星附近</li>
                            <li>春分（3月21日前后）：太阳直射赤道，全球昼夜平分</li>
                            <li>夏至（6月22日前后）：太阳直射北回归线，北半球昼最长夜最短</li>
                            <li>秋分（9月23日前后）：太阳直射赤道，全球昼夜平分</li>
                            <li>冬至（12月22日前后）：太阳直射南回归线，北半球昼最短夜最长</li>
                            <li>口诀：春分秋分赤道站，夏至冬至两边换；夏北冬南各一线，昼夜长短随之变</li>
                        </ul>
                        <h3>第三节 经纬网</h3>
                        <ul>
                            <li><strong>纬线：</strong>与赤道平行的圆圈，指示东西方向，赤道是最长的纬线，由赤道向两极逐渐缩短</li>
                            <li><strong>经线：</strong>连接南北两极的半圆，指示南北方向，所有经线长度相等</li>
                            <li>赤道纬度为0°，向北为北纬(N)，向南为南纬(S)，最大90°（南北极点）</li>
                            <li>本初子午线经度为0°，向东为东经(E)，向西为西经(W)，最大180°</li>
                            <li>低纬度：0°-30°；中纬度：30°-60°；高纬度：60°-90°</li>
                            <li>南北半球分界线：赤道（0°纬线）；东西半球分界线：20°W和160°E组成的经线圈</li>
                            <li>经线圈特点：两条相对的经线经度之和为180°，东西经相反（如20°W与160°E）</li>
                            <li>重要纬线：赤道（0°）、北回归线（23.5°N）、南回归线（23.5°S）、北极圈（66.5°N）、南极圈（66.5°S）</li>
                            <li>五带划分：热带（南北回归线之间）、北温带、南温带、北寒带、南寒带</li>
                            <li>口诀：纬线东西圆，经线南北半；赤道分南北，回归极圈划五带</li>
                        </ul>
                    ` },
                    { id: 'geo7_3', title: '第三章 世界的海陆分布', content: `
                        <h3>第一节 世界的海陆分布</h3>
                        <ul>
                            <li>地球表面71%是海洋，29%是陆地，"七分海洋，三分陆地"</li>
                            <li>陆地主要集中在北半球和东半球，海洋主要集中在南半球和西半球</li>
                            <li>任一半球都是海洋面积大于陆地面积</li>
                            <li>七大洲（按面积从大到小）：亚洲、非洲、北美洲、南美洲、南极洲、欧洲、大洋洲（口诀：亚非北南美，南极欧大洋）</li>
                            <li>四大洋（按面积从大到小）：太平洋、大西洋、印度洋、北冰洋</li>
                            <li>亚洲面积最大（约4400万平方千米），大洋洲面积最小</li>
                            <li>太平洋面积最大、最深，约占世界海洋总面积的一半；北冰洋面积最小、最浅、最冷</li>
                            <li>亚欧大陆是世界上最大的大陆，澳大利亚大陆是最小的大陆</li>
                            <li>重要分界线：亚欧——乌拉尔山-乌拉尔河-里海-大高加索山-黑海-土耳其海峡；亚非——苏伊士运河；南北美洲——巴拿马运河；亚洲与北美洲——白令海峡</li>
                            <li>赤道穿过的大洲：非洲、亚洲、大洋洲、南美洲（口诀：非亚大洋南美，赤道穿四洲）</li>
                        </ul>
                        <h3>第二节 世界的地形</h3>
                        <ul>
                            <li><strong>陆地地形：</strong>平原、高原、山地、丘陵、盆地</li>
                            <li><strong>海底地形：</strong>大陆架、大陆坡、大洋中脊、海沟</li>
                            <li>世界最高的高原：青藏高原（"世界屋脊"，平均海拔4000米以上）</li>
                            <li>世界最大的平原：亚马孙平原（约560万平方千米，位于南美洲）</li>
                            <li>世界最长的山脉：安第斯山脉（约9000千米，位于南美洲）</li>
                            <li>世界最高峰：珠穆朗玛峰（海拔8848.86米）</li>
                            <li>世界最大的盆地：刚果盆地</li>
                            <li>世界最深的海沟：马里亚纳海沟（深约11034米）</li>
                            <li>地形特征描述：海拔高低、地面起伏、地形种类及分布</li>
                            <li>等高线地形图：等高线密集表示坡度陡，稀疏表示坡度缓；等高线闭合，数值中间高四周低为山顶，反之则为盆地</li>
                        </ul>
                    ` },
                    { id: 'geo7_4', title: '第四章 世界的气候', content: `
                        <h3>第一节 天气与气候</h3>
                        <ul>
                            <li><strong>天气：</strong>一个地方短时间内的大气状况，多变（如：今天晴转多云）</li>
                            <li><strong>气候：</strong>一个地方多年的天气平均状况，相对稳定（如：四季如春）</li>
                            <li>气温的测量工具是温度计，一天中最高气温出现在14时左右，最低气温出现在日出前后</li>
                            <li>气温日较差=日最高气温-日最低气温；气温年较差=最热月平均气温-最冷月平均气温</li>
                            <li>天气预报符号：晴、多云、阴、小雨、中雨、大雨、雷阵雨、雪等</li>
                            <li>空气质量指数（AQI）：0-50优，51-100良，101-150轻度污染，151-200中度污染，201-300重度污染，>300严重污染</li>
                        </ul>
                        <h3>第二节 气温和降水</h3>
                        <ul>
                            <li>世界年平均气温分布规律：从赤道向两极逐渐降低（由低纬向高纬递减）</li>
                            <li>同纬度地区，夏季陆地气温高，海洋气温低；冬季相反（海陆热力性质差异）</li>
                            <li>世界降水分布规律：赤道地区多，两极地区少；回归线附近大陆东岸多，西岸少；中纬度沿海多，内陆少</li>
                            <li>降水的主要类型：对流雨（赤道地区）、地形雨（山地迎风坡）、锋面雨（中纬度地区）</li>
                            <li>世界"雨极"：印度乞拉朋齐（地形雨）；世界"干极"：智利阿塔卡马沙漠</li>
                            <li>等温线：气温相同的点连成的线，密集表示温差大，稀疏表示温差小</li>
                        </ul>
                        <h3>第三节 影响气候的主要因素</h3>
                        <ul>
                            <li><strong>纬度因素：</strong>纬度越低，太阳高度角越大，获得太阳辐射越多，气温越高（最基本因素）</li>
                            <li><strong>海陆因素：</strong>沿海地区温差小，内陆地区温差大；沿海降水多，内陆降水少</li>
                            <li><strong>地形因素：</strong>海拔每升高100米，气温约下降0.6℃；山地迎风坡降水多，背风坡降水少（雨影区）</li>
                            <li><strong>洋流因素：</strong>暖流增温增湿，寒流降温减湿</li>
                            <li><strong>人类活动：</strong>温室效应、热岛效应、修建水库等</li>
                        </ul>
                        <h3>第四节 世界主要气候类型</h3>
                        <ul>
                            <li><strong>热带气候：</strong>热带雨林（赤道附近，全年高温多雨）、热带草原（干湿两季）、热带季风（旱雨两季）、热带沙漠（全年炎热干燥）</li>
                            <li><strong>亚热带气候：</strong>亚热带季风（夏季高温多雨，冬季温和少雨）、地中海气候（夏季炎热干燥，冬季温和多雨）</li>
                            <li><strong>温带气候：</strong>温带季风（夏季高温多雨，冬季寒冷干燥）、温带海洋性（全年温和湿润）、温带大陆性（冬冷夏热，降水少）</li>
                            <li><strong>寒带气候：</strong>苔原气候、冰原气候（全年严寒）</li>
                            <li><strong>高原山地气候：</strong>垂直变化明显</li>
                            <li>口诀判断：以温定带，以水定型；全年高温在热带，最冷月15℃是热带；最冷月0-15℃是亚热带或温带海洋；最冷月<0℃是温带</li>
                        </ul>
                    ` },
                    { id: 'geo7_5', title: '第五章 亚洲', content: `
                        <h3>第一节 自然环境</h3>
                        <h4>地理位置</h4>
                        <ul>
                            <li><strong>半球位置：</strong>主要位于东半球和北半球</li>
                            <li><strong>纬度位置：</strong>跨寒、温、热三带，大部分在北温带</li>
                            <li><strong>海陆位置：</strong>北临北冰洋，东临太平洋，南临印度洋，西与欧洲相连，西南与非洲为邻</li>
                        </ul>
                        <h4>大洲分界线</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">分界线</th><th style="padding:6px;border:1px solid #ddd">分隔的大洲</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">乌拉尔山脉-乌拉尔河-里海-大高加索山脉-黑海-土耳其海峡</td><td style="padding:6px;border:1px solid #ddd;text-align:center">亚洲与欧洲</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">苏伊士运河</td><td style="padding:6px;border:1px solid #ddd;text-align:center">亚洲与非洲</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">白令海峡</td><td style="padding:6px;border:1px solid #ddd;text-align:center">亚洲与北美洲</td></tr>
                        </table>
                        <h4>地理分区与面积</h4>
                        <ul>
                            <li>六大分区：<strong>东亚、东南亚、南亚、西亚、中亚、北亚</strong></li>
                            <li>面积约<strong>4400万平方千米</strong>，面积最大、跨纬度最广、东西距离最长</li>
                        </ul>
                        <h4>亚洲之最</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">之最</th><th style="padding:6px;border:1px solid #ddd">名称</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd">最高峰</td><td style="padding:6px;border:1px solid #ddd">珠穆朗玛峰（8848.86米）</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd">陆地最低点</td><td style="padding:6px;border:1px solid #ddd">死海（湖面海拔约-430.5米）</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd">最大半岛</td><td style="padding:6px;border:1px solid #ddd">阿拉伯半岛</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd">最大群岛</td><td style="padding:6px;border:1px solid #ddd">马来群岛</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd">最大湖泊（咸水）</td><td style="padding:6px;border:1px solid #ddd">里海</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd">最深湖泊（淡水）</td><td style="padding:6px;border:1px solid #ddd">贝加尔湖</td></tr>
                        </table>
                        <h4>地势与地形</h4>
                        <ul>
                            <li><strong>地势特点：</strong>中部高，四周低，河流呈放射状流向四周</li>
                            <li><strong>沿30°N纬线地势变化：</strong>西低（帕米尔高原）→中高（青藏高原）→东低（长江中下游平原），呈"<strong>低-高-低</strong>"变化</li>
                        </ul>
                        <h4>主要河流流向</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">河流</th><th style="padding:6px;border:1px solid #ddd">流向</th><th style="padding:6px;border:1px solid #ddd">注入海洋</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">鄂毕河、叶尼塞河、勒拿河</td><td style="padding:6px;border:1px solid #ddd;text-align:center">自南向北</td><td style="padding:6px;border:1px solid #ddd;text-align:center">北冰洋</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">黄河、长江</td><td style="padding:6px;border:1px solid #ddd;text-align:center">自西向东</td><td style="padding:6px;border:1px solid #ddd;text-align:center">太平洋</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">恒河、印度河</td><td style="padding:6px;border:1px solid #ddd;text-align:center">自北向南</td><td style="padding:6px;border:1px solid #ddd;text-align:center">印度洋</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">湄公河（澜沧江）</td><td style="padding:6px;border:1px solid #ddd;text-align:center">自北向南</td><td style="padding:6px;border:1px solid #ddd;text-align:center">太平洋</td></tr>
                        </table>
                        <h4>气候特点</h4>
                        <ul>
                            <li><strong>三大特点：</strong>气候复杂多样、大陆性气候分布广、季风气候显著</li>
                            <li>亚洲东部和南部季风最强盛、最典型、影响范围最广</li>
                        </ul>
                        <h3>第二节 人文环境</h3>
                        <h4>人口</h4>
                        <ul>
                            <li>亚洲是世界上<strong>人口最多的大洲</strong>，人口约<strong>46.4亿</strong>（占世界一半以上）</li>
                            <li>世界上人口超过1亿的国家有<strong>7个</strong>在亚洲：中国、印度、印度尼西亚、巴基斯坦、孟加拉国、日本、菲律宾</li>
                            <li>人口分布不均：东部沿海地区人口稠密，内陆和干旱地区人口稀疏</li>
                        </ul>
                        <h4>经济发展差异</h4>
                        <ul>
                            <li><strong>发达国家：</strong>日本、韩国等，经济发达，高新技术产业领先</li>
                            <li><strong>新兴工业化国家：</strong>中国、印度等，经济发展迅速</li>
                            <li><strong>石油出口国：</strong>沙特阿拉伯、伊朗、伊拉克等西亚国家，依靠石油出口致富</li>
                            <li>各国经济发展差异大，部分国家经济仍较落后</li>
                        </ul>
                        <h4>居民生活的差异</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">居民</th><th style="padding:6px;border:1px solid #ddd">分布地区</th><th style="padding:6px;border:1px solid #ddd">气候</th><th style="padding:6px;border:1px solid #ddd">生活方式</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">孟加拉人</td><td style="padding:6px;border:1px solid #ddd;text-align:center">南亚恒河三角洲</td><td style="padding:6px;border:1px solid #ddd;text-align:center">热带季风</td><td style="padding:6px;border:1px solid #ddd;text-align:center">以船为交通工具，住高脚屋</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">贝都因人</td><td style="padding:6px;border:1px solid #ddd;text-align:center">西亚阿拉伯半岛</td><td style="padding:6px;border:1px solid #ddd;text-align:center">热带沙漠</td><td style="padding:6px;border:1px solid #ddd;text-align:center">白色长袍，头巾，游牧生活</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">雅库特人</td><td style="padding:6px;border:1px solid #ddd;text-align:center">北亚西伯利亚</td><td style="padding:6px;border:1px solid #ddd;text-align:center">寒带气候</td><td style="padding:6px;border:1px solid #ddd;text-align:center">住木屋，毛皮服装，狗拉雪橇</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">加里曼丹人</td><td style="padding:6px;border:1px solid #ddd;text-align:center">东南亚热带雨林</td><td style="padding:6px;border:1px solid #ddd;text-align:center">热带雨林</td><td style="padding:6px;border:1px solid #ddd;text-align:center">高脚屋，短衣短裤</td></tr>
                        </table>
                    ` },
                    { id: 'geo7_6', title: '第六章 日本、东南亚与印度', content: `
                        <h3>第一节 日本</h3>
                        <h4>自然环境</h4>
                        <ul>
                            <li><strong>位置：</strong>太平洋西北部，亚洲东部岛国</li>
                            <li><strong>组成：</strong>北海道、本州、四国、九州四大岛（本州最大）及附近小岛</li>
                            <li><strong>地形：</strong>山地丘陵为主（占3/4以上），平原狭小（关东平原最大）</li>
                            <li><strong>海岸线：</strong>曲折漫长，多优良港湾</li>
                            <li><strong>气候：</strong>温带季风和亚热带季风为主，海洋性特征明显</li>
                            <li><strong>多火山地震：</strong>位于<strong>亚欧板块与太平洋板块交界处</strong>，全球约<strong>1/5的强震</strong>发生在日本，富士山是活火山</li>
                        </ul>
                        <h4>防震减灾</h4>
                        <ul>
                            <li>传统民居采用轻质材料；防震演习普及；建筑采用抗震技术</li>
                        </ul>
                        <h4>经济与文化</h4>
                        <ul>
                            <li><strong>工业：</strong>集中在太平洋沿岸和濑户内海沿岸</li>
                            <li><strong>经济特征：</strong>对外依赖性强（进口原料→加工→出口）</li>
                            <li><strong>渔业：</strong>北海道渔场是世界四大渔场之一</li>
                            <li><strong>文化：</strong>东西方兼容（和服与西装并存）</li>
                        </ul>
                        <h4>人口问题</h4>
                        <ul>
                            <li>日本<strong>老龄化程度全球第一</strong>（65岁以上人口约占<strong>28%</strong>）</li>
                            <li><strong>应对措施：</strong>鼓励生育、延迟退休、引进外籍劳工、发展机器人产业</li>
                        </ul>
                        <h3>第二节 东南亚</h3>
                        <h4>地理位置</h4>
                        <ul>
                            <li><strong>"十字路口"位置：</strong>位于亚洲东南部，地处亚洲与大洋洲、太平洋与印度洋之间的"十字路口"</li>
                            <li><strong>马六甲海峡：</strong>位于马来半岛和苏门答腊岛之间，连接太平洋与印度洋，被称为"<strong>海上生命线</strong>"</li>
                        </ul>
                        <h4>地形与河流</h4>
                        <ul>
                            <li><strong>中南半岛：</strong>山河相间、纵列分布，北部地势高峻，南部地势低平</li>
                            <li><strong>五大河流：</strong>红河（中国境内元江）、湄公河（中国境内澜沧江）、湄南河、萨尔温江（中国境内怒江）、伊洛瓦底江</li>
                            <li>河流上游水能丰富，下游形成冲积平原和三角洲</li>
                        </ul>
                        <h4>气候与农业生产</h4>
                        <ul>
                            <li><strong>热带气候为主：</strong>热带季风气候和中南半岛，热带雨林气候在马来群岛</li>
                            <li><strong>主要农产品：</strong>天然橡胶（泰国产量最大）、棕榈油（马来西亚、印度尼西亚）、水稻（泰国、越南是世界重要稻米出口国）</li>
                            <li>东南亚是世界重要的热带经济作物产区</li>
                        </ul>
                        <h4>华人华侨</h4>
                        <ul>
                            <li>东南亚是海外华人华侨最集中的地区，华人华侨总数超过<strong>3000万</strong></li>
                            <li>华人华侨对东南亚的开发和建设做出了巨大贡献</li>
                        </ul>
                        <h3>第三节 印度</h3>
                        <h4>自然环境</h4>
                        <ul>
                            <li><strong>位置：</strong>亚洲南部，印度洋北岸</li>
                            <li><strong>地形：</strong>北部喜马拉雅山脉，中部恒河平原，南部德干高原</li>
                            <li><strong>气候：</strong>热带季风气候为主，全年高温，分旱雨两季</li>
                        </ul>
                        <h4>季风与降水</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">季节</th><th style="padding:6px;border:1px solid #ddd">时间</th><th style="padding:6px;border:1px solid #ddd">风向</th><th style="padding:6px;border:1px solid #ddd">降水</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">雨季</td><td style="padding:6px;border:1px solid #ddd;text-align:center">6~9月</td><td style="padding:6px;border:1px solid #ddd;text-align:center">西南季风（海洋）</td><td style="padding:6px;border:1px solid #ddd;text-align:center">丰沛</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">旱季</td><td style="padding:6px;border:1px solid #ddd;text-align:center">10月~次年5月</td><td style="padding:6px;border:1px solid #ddd;text-align:center">东北季风（陆地）</td><td style="padding:6px;border:1px solid #ddd;text-align:center">稀少</td></tr>
                        </table>
                        <ul>
                            <li><strong>水旱灾害：</strong>西南季风来得早退得晚→洪涝；来得晚退得早→干旱</li>
                        </ul>
                        <h4>人口与经济</h4>
                        <ul>
                            <li>人口世界<strong>第一位</strong>，增长快</li>
                            <li><strong>人口红利优势：</strong>0-14岁人口占<strong>26%</strong>，劳动力资源丰富，人口红利明显</li>
                            <li><strong>粮食作物：</strong>水稻（东北部、西部沿海）和小麦（西北部）</li>
                            <li><strong>稻米出口：</strong>印度稻米出口量占世界约<strong>1/4</strong></li>
                            <li><strong>绿色革命：</strong>推广良种、改进灌溉，提高粮食产量</li>
                            <li><strong>服务外包产业：</strong>印度服务外包产业占世界<strong>一半以上</strong>，被形象地称为"世界办公室"</li>
                            <li><strong>软件产业：</strong>软件出口占全国出口总额的<strong>53%</strong>，班加罗尔是发源地，"印度硅谷"</li>
                        </ul>
                    ` },
                    { id: 'geo7_7', title: '第七章 俄罗斯与欧洲西部', content: `
                        <h3>第一节 俄罗斯</h3>
                        <h4>自然环境</h4>
                        <ul>
                            <li><strong>位置：</strong>横跨亚欧两洲，世界面积最大（1709万km²）</li>
                            <li><strong>首都：</strong>莫斯科（最大城市）</li>
                            <li><strong>地形：</strong>西部平原（东欧平原、西西伯利亚平原），东部高原，南部山地</li>
                            <li><strong>地势：</strong>东高西低</li>
                            <li><strong>河流：</strong>伏尔加河（欧洲最长）、鄂毕河、叶尼塞河、勒拿河</li>
                            <li><strong>湖泊：</strong>贝加尔湖（世界最深淡水湖）</li>
                            <li><strong>气候：</strong>温带大陆性为主，冬季漫长寒冷</li>
                        </ul>
                        <h4>人口与国家属性</h4>
                        <ul>
                            <li><strong>亚洲部分占3/4</strong>领土，但<strong>3/4人口集中在欧洲部分</strong></li>
                            <li>俄罗斯传统上是一个<strong>欧洲国家</strong>（政治、经济、文化中心在欧洲）</li>
                        </ul>
                        <h4>自然资源</h4>
                        <ul>
                            <li><strong>石油天然气：</strong>储量丰富，被称为"世界加油站"</li>
                            <li><strong>天然气：</strong>储量占世界<strong>20%</strong>，产量占<strong>17%</strong>，出口量占<strong>25%</strong></li>
                            <li><strong>耕地：</strong>耕地面积世界<strong>第三</strong>（仅次于美国、印度），主要分布在东欧平原南部和西西伯利亚南部</li>
                        </ul>
                        <h4>社会经济</h4>
                        <ul>
                            <li><strong>工业：</strong>重工业发达，轻工业薄弱</li>
                            <li><strong>交通：</strong>铁路为主，西伯利亚大铁路（世界最长）</li>
                        </ul>
                        <h3>第二节 欧洲西部</h3>
                        <h4>自然环境</h4>
                        <ul>
                            <li><strong>位置：</strong>欧洲的西半部，北临北冰洋、西临大西洋、南临地中海</li>
                            <li><strong>半岛众多：</strong>斯堪的纳维亚半岛、伊比利亚半岛、亚平宁半岛、巴尔干半岛</li>
                            <li><strong>地势：</strong><strong>南北高、中部低</strong>，北部斯堪的纳维亚山脉，南部阿尔卑斯山脉，中部平原</li>
                            <li><strong>阿尔卑斯山脉：</strong>最高峰<strong>勃朗峰</strong>（4810米），是欧洲最高峰</li>
                            <li><strong>气候：</strong>温带海洋性为主，全年温和湿润</li>
                            <li><strong>河流：</strong>多瑙河（流经国家最多）、莱茵河（航运繁忙）</li>
                        </ul>
                        <h4>畜牧业</h4>
                        <ul>
                            <li>畜牧业发达，牧草被称为"<strong>绿色金子</strong>"</li>
                            <li>温带海洋性气候适合多汁牧草生长，乳畜业发达</li>
                        </ul>
                        <h4>农业</h4>
                        <ul>
                            <li><strong>巴黎盆地</strong>是欧洲西部最大的种植业区</li>
                            <li>地中海沿岸盛产<strong>油橄榄</strong>、葡萄、柑橘等</li>
                        </ul>
                        <h4>经济与旅游</h4>
                        <ul>
                            <li>发达国家集中，多数国家使用欧元</li>
                            <li>旅游资源丰富</li>
                            <li><strong>申根协定：</strong>成员国之间取消边境检查，人员自由通行</li>
                        </ul>
                        <h3>第三节 法国</h3>
                        <ul>
                            <li>地势东南高西北低；巴黎盆地产小麦，地中海沿岸盛产葡萄</li>
                            <li>工业：汽车、航空、医药、化妆品发达</li>
                            <li>旅游：巴黎（埃菲尔铁塔、卢浮宫、凯旋门）、地中海沙滩、阿尔卑斯山滑雪</li>
                        </ul>
                    ` },
                    { id: 'geo7_8', title: '第八章 西亚、非洲与埃及', content: `
                        <h3>第一节 西亚</h3>
                        <h4>地理位置</h4>
                        <ul>
                            <li><strong>"三洲五海之地"：</strong>地处亚洲、非洲、欧洲三洲交界，毗邻阿拉伯海、红海、地中海、黑海、里海（湖）</li>
                            <li>自古就是东西方交通要道，古代"丝绸之路"的必经之地</li>
                        </ul>
                        <h4>自然环境</h4>
                        <ul>
                            <li><strong>地形：</strong>以高原为主，平原面积狭小</li>
                            <li><strong>死海：</strong>世界陆地最低点（湖面海拔约-430.5米），湖水含盐量极高</li>
                            <li><strong>气候：</strong>以热带沙漠气候为主，干旱少雨</li>
                        </ul>
                        <h4>石油资源</h4>
                        <ul>
                            <li>西亚是"<strong>世界石油宝库</strong>"：石油储量占世界<strong>48%</strong>，产量占<strong>31%</strong>，出口量占<strong>34%</strong></li>
                            <li>主要产油国：沙特阿拉伯、伊朗、伊拉克、科威特、阿拉伯联合酋长国等</li>
                            <li><strong>波斯湾石油外运三条航线：</strong></li>
                        </ul>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">航线</th><th style="padding:6px;border:1px solid #ddd">经过海峡/运河</th><th style="padding:6px;border:1px solid #ddd">目的地</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">航线A</td><td style="padding:6px;border:1px solid #ddd;text-align:center">霍尔木兹海峡→阿拉伯海→红海→苏伊士运河→地中海</td><td style="padding:6px;border:1px solid #ddd;text-align:center">欧洲西部、北美洲</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">航线B</td><td style="padding:6px;border:1px solid #ddd;text-align:center">霍尔木兹海峡→印度洋→好望角→大西洋</td><td style="padding:6px;border:1px solid #ddd;text-align:center">欧洲西部、北美洲</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">航线C</td><td style="padding:6px;border:1px solid #ddd;text-align:center">霍尔木兹海峡→印度洋→马六甲海峡→南海</td><td style="padding:6px;border:1px solid #ddd;text-align:center">东亚（日本、中国等）</td></tr>
                        </table>
                        <h4>水资源匮乏</h4>
                        <ul>
                            <li>西亚水资源极为匮乏，许多国家没有河流</li>
                            <li><strong>应对措施：</strong>海水淡化、滴灌技术、修建水利工程、跨流域调水</li>
                        </ul>
                        <h4>世界宗教发源地</h4>
                        <ul>
                            <li>西亚是<strong>基督教、伊斯兰教、犹太教</strong>的发源地</li>
                            <li>耶路撒冷是三大宗教的圣城</li>
                        </ul>
                        <h3>第二节 撒哈拉以南非洲</h3>
                        <h4>三大称号</h4>
                        <ul>
                            <li><strong>"热带大陆"</strong>——绝大部分位于热带，3/4面积在南、北回归线之间</li>
                            <li><strong>"高原大陆"</strong>——以高原为主，平均海拔较高</li>
                            <li><strong>"黑非洲"</strong>——90%以上是黑种人，是黑种人的故乡</li>
                        </ul>
                        <h4>自然环境</h4>
                        <ul>
                            <li><strong>位置：</strong>撒哈拉沙漠以南的非洲地区</li>
                            <li><strong>地形：</strong>以高原为主，东南高西北低</li>
                            <li><strong>东非大裂谷：</strong>世界最长的裂谷带，南起赞比西河口，北经红海一直延伸到西亚</li>
                            <li><strong>刚果盆地：</strong>世界最大的盆地，位于非洲中部</li>
                        </ul>
                        <h4>气候分布（由赤道向南北）</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">纬度带</th><th style="padding:6px;border:1px solid #ddd">气候类型</th><th style="padding:6px;border:1px solid #ddd">特征</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">赤道附近</td><td style="padding:6px;border:1px solid #ddd;text-align:center">热带雨林气候</td><td style="padding:6px;border:1px solid #ddd;text-align:center">全年高温多雨</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">南北两侧</td><td style="padding:6px;border:1px solid #ddd;text-align:center">热带草原气候</td><td style="padding:6px;border:1px solid #ddd;text-align:center">全年高温，干湿两季（最广）</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">回归线附近</td><td style="padding:6px;border:1px solid #ddd;text-align:center">热带沙漠气候</td><td style="padding:6px;border:1px solid #ddd;text-align:center">全年炎热干燥</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">南北两端</td><td style="padding:6px;border:1px solid #ddd;text-align:center">地中海气候</td><td style="padding:6px;border:1px solid #ddd;text-align:center">夏干冬雨</td></tr>
                        </table>
                        <h4>河流与景观</h4>
                        <ul>
                            <li><strong>尼罗河：</strong>世界最长，自南向北注入地中海</li>
                            <li><strong>刚果河：</strong>流量世界<strong>第二</strong>（仅次于亚马孙河），流经热带雨林区，水量丰富</li>
                            <li><strong>维多利亚瀑布：</strong>世界三大瀑布之一，位于赞比西河上</li>
                            <li>矿产资源丰富（黄金、金刚石、石油），"富饶的大陆"</li>
                        </ul>
                        <h4>经济与社会</h4>
                        <ul>
                            <li><strong>"单一商品经济"：</strong>许多国家依赖一两种初级产品出口，在国际贸易中处于不利地位</li>
                            <li><strong>加纳经济转型案例：</strong>加纳原为可可出口国，经济结构单一，后发展多样化经济，减少对单一商品的依赖</li>
                            <li>人口增长最快的大洲，粮食短缺</li>
                            <li><strong>人口-粮食-环境恶性循环：</strong>人口增长→粮食需求增加→过度开垦放牧→土地荒漠化→粮食产量下降→更加缺粮</li>
                        </ul>
                        <h4>特色风土</h4>
                        <ul>
                            <li><strong>猴面包树：</strong>树干粗壮，储存大量水分，是热带草原的标志性植物</li>
                            <li><strong>茅草屋：</strong>当地传统民居，用树枝和茅草搭建，适合热带草原气候</li>
                        </ul>
                        <h3>第三节 埃及</h3>
                        <ul>
                            <li><strong>位置：</strong>非洲东北部，地跨亚非两洲（西奈半岛在亚洲）</li>
                            <li><strong>气候：</strong>热带沙漠为主，终年炎热干燥</li>
                            <li><strong>农业：</strong>尼罗河谷地和三角洲，盛产<strong>长绒棉</strong></li>
                            <li><strong>经济：</strong>旅游业（金字塔、狮身人面像）、石油、苏伊士运河</li>
                            <li><strong>首都：</strong>开罗</li>
                        </ul>
                    ` },
                    { id: 'geo7_9', title: '第九章 澳大利亚', content: `
                        <h3>第一节 自然环境</h3>
                        <ul>
                            <li><strong>位置：</strong>南半球，独占整个澳大利亚大陆</li>
                            <li><strong>组成：</strong>澳大利亚大陆、<strong>塔斯马尼亚岛</strong>及附近小岛</li>
                            <li><strong>地形：</strong>东部大分水岭（山地），中部大自流盆地，西部低矮高原</li>
                            <li><strong>地势：</strong>东西高，中部低</li>
                            <li><strong>气候：</strong>呈<strong>半环状</strong>分布，热带沙漠气候分布最广</li>
                            <li><strong>最大河流：</strong>墨累河（注入印度洋）</li>
                            <li><strong>大堡礁：</strong>世界最大的珊瑚礁群，位于东北海岸，被称为"海上花园"</li>
                        </ul>
                        <h3>第二节 特有生物</h3>
                        <ul>
                            <li><strong>代表生物：</strong>袋鼠、考拉、鸭嘴兽、鸸鹋等古老生物，"世界活化石博物馆"</li>
                            <li><strong>特有生物众多的原因（4个）：</strong></li>
                            <li>1. 澳大利亚大陆很早与其他大陆分离，长期孤立于南半球海洋上</li>
                            <li>2. 自然条件相对单一，生物进化速度缓慢</li>
                            <li>3. 没有大型食肉动物，动物演化不受威胁</li>
                            <li>4. 人类活动影响较小，自然环境保护较好</li>
                        </ul>
                        <h3>第三节 社会经济</h3>
                        <h4>三大牧羊带</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">牧羊带</th><th style="padding:6px;border:1px solid #ddd">分布</th><th style="padding:6px;border:1px solid #ddd">特征</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">羊牛与经济作物混合经营带</td><td style="padding:6px;border:1px solid #ddd;text-align:center">东南部</td><td style="padding:6px;border:1px solid #ddd;text-align:center">集约化程度高</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">绵羊与小麦混合经营带</td><td style="padding:6px;border:1px solid #ddd;text-align:center">南部墨累-达令盆地</td><td style="padding:6px;border:1px solid #ddd;text-align:center">机械化程度高</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">粗放牧羊带</td><td style="padding:6px;border:1px solid #ddd;text-align:center">西部、北部</td><td style="padding:6px;border:1px solid #ddd;text-align:center">利用天然牧场</td></tr>
                        </table>
                        <h4>绵羊-小麦混合经营农事安排</h4>
                        <ul>
                            <li><strong>播种小麦：</strong>秋季（3-5月），利用绵羊粪作肥料</li>
                            <li><strong>小麦生长：</strong>冬季（6-8月），同时放牧绵羊</li>
                            <li><strong>收割小麦：</strong>春季（9-11月），收割后麦茬可放牧绵羊</li>
                            <li>农场成为一个良性的农业生态系统</li>
                        </ul>
                        <h4>矿产与城市</h4>
                        <ul>
                            <li>"坐在矿车上的国家"：铁矿石、煤炭、铝土矿丰富</li>
                            <li><strong>羊毛出口量世界第一</strong>，占世界羊毛贸易的约<strong>58%</strong></li>
                            <li>修建<strong>专用铁路</strong>运输矿产资源到港口出口</li>
                            <li><strong>服务业成为经济支柱</strong>，超过农牧业和工矿业</li>
                            <li>人口城市集中在<strong>东南沿海</strong></li>
                            <li><strong>首都：</strong>堪培拉；<strong>最大城市：</strong>悉尼</li>
                        </ul>
                    ` },
                    { id: 'geo7_10', title: '第十章 美洲与美国', content: `
                        <h3>第一节 美洲概述</h3>
                        <ul>
                            <li>分界线：<strong>巴拿马运河</strong></li>
                            <li>北美洲地形：三大纵列带——西部高山、中部平原、东部低缓山地</li>
                            <li>南美洲：最湿润的大洲，"世界人种大熔炉"</li>
                        </ul>
                        <h3>第二节 美国</h3>
                        <h4>自然环境</h4>
                        <ul>
                            <li><strong>领土：</strong>本土48州 + 阿拉斯加 + 夏威夷</li>
                            <li><strong>面积：</strong>世界第四（仅次于俄、加、中）</li>
                            <li><strong>地形：</strong>西部落基山脉（属<strong>科迪勒拉山系</strong>），中部大平原（占本土<strong>1/2</strong>），东部阿巴拉契亚山脉</li>
                            <li><strong>气候：</strong>温带大陆性为主</li>
                            <li><strong>河流湖泊：</strong>密西西比河（世界第四长河，被称为"<strong>黄金水道</strong>"）；五大湖（最大淡水湖群）</li>
                        </ul>
                        <h4>自然灾害</h4>
                        <ul>
                            <li><strong>龙卷风：</strong>中部大平原频发，美国是世界上龙卷风最多的国家</li>
                            <li><strong>飓风：</strong>墨西哥湾沿岸和东南沿海受飓风影响较大</li>
                        </ul>
                        <h4>主要农业带</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">农业带</th><th style="padding:6px;border:1px solid #ddd">分布</th><th style="padding:6px;border:1px solid #ddd">原因</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">乳畜带</td><td style="padding:6px;border:1px solid #ddd;text-align:center">东北部五大湖附近</td><td style="padding:6px;border:1px solid #ddd;text-align:center">气候冷湿，城市密集需求大</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">玉米带</td><td style="padding:6px;border:1px solid #ddd;text-align:center">乳畜带以南</td><td style="padding:6px;border:1px solid #ddd;text-align:center">温带，地势平坦，土壤肥沃，降水适中</td></tr>

                8: [
                    { id: 'geo8_1', title: '第一章 中国的疆域和人口', content: `
                        <h3>第一节 中国的疆域</h3>
                        <ul>
                            <li><strong>地理位置：</strong>位于东半球、北半球；亚洲东部，太平洋西岸，海陆兼备</li>

                            <li>陆上国界线2.2万多千米，陆上邻国14个：朝鲜、俄罗斯、蒙古、哈萨克斯坦、吉尔吉斯斯坦、塔吉克斯坦、阿富汗、巴基斯坦、印度、尼泊尔、不丹、缅甸、老挝、越南</li>
                            <li>大陆海岸线1.8万多千米，隔海相望国家6个：日本、韩国、菲律宾、马来西亚、文莱、印度尼西亚</li>
                            <li>四至点：最北端——漠河以北黑龙江主航道中心（53°N）；最南端——曾母暗沙（4°N）；最东端——黑龙江与乌苏里江主航道中心线汇合处（135°E）；最西端——帕米尔高原（73°E）</li>
                            <li>我国东西跨经度约62°，时差约4小时；南北跨纬度约49°，气候差异大</li>
                            <li>濒临的海洋（自北向南）：渤海、黄海、东海、南海，台湾岛东岸直接濒临太平洋</li>
                            <li>主要岛屿：台湾岛（最大）、海南岛、崇明岛；主要半岛：辽东半岛、山东半岛、雷州半岛</li>
                            <li>内海：渤海、琼州海峡</li>

                        <h3>第二节 中国的行政区划</h3>

                            <li>省级行政区简称口诀：京津沪渝直辖市，蒙宁新藏桂自治；一国两制台港澳，东北三省黑吉辽；冀晋鲁归华北，苏浙皖赣在华东；湘鄂豫归华中，华南粤闽琼；川滇黔归西南，西北陕甘青</li>
                            <li>特殊简称：冀-石家庄、晋-太原、皖-合肥、闽-福州、赣-南昌、鲁-济南、豫-郑州、鄂-武汉、湘-长沙、粤-广州、桂-南宁、琼-海口、川/蜀-成都、贵/黔-贵阳、云/滇-昆明、陕/秦-西安、甘/陇-兰州</li>

                    { id: 'geo8_2', title: '第二章 中国的自然环境', content: `
                        <h3>第一节 中国的地形</h3>
                        <ul>
                            <li>我国地形特点：地形复杂多样，山区面积广大（山地、丘陵和崎岖高原合称山区，约占全国总面积的2/3）</li>
                            <li>地势特点：西高东低，呈三级阶梯状分布</li>
                            <li>第一阶梯：青藏高原（"世界屋脊"），平均海拔4000米以上，主要地形区有青藏高原、柴达木盆地</li>
                            <li>第二阶梯：高原和盆地，海拔1000-2000米，主要地形区有内蒙古高原、黄土高原、云贵高原、塔里木盆地、准噶尔盆地、四川盆地</li>
                            <li>第三阶梯：平原和丘陵，海拔500米以下，主要地形区有东北平原、华北平原、长江中下游平原、东南丘陵</li>
                            <li>地势阶梯分界线：第一、二级——昆仑山-祁连山-横断山脉；第二、三级——大兴安岭-太行山-巫山-雪峰山</li>
                            <li>主要山脉：东西走向（天山-阴山、昆仑山-秦岭、南岭）；东北-西南走向（大兴安岭-太行山-巫山-雪峰山、长白山-武夷山、台湾山脉）；南北走向（横断山脉）；弧形山脉（喜马拉雅山脉）</li>
                            <li>口诀：西高东低三阶梯，昆仑横断一二齐；大兴太行巫雪峰，二三阶梯分界线</li>
                        </ul>
                        <h3>第二节 中国的气候</h3>
                        <ul>
                            <li>我国气候特征：气候复杂多样，季风气候显著</li>
                            <li>冬季南北温差大（纬度因素+冬季风），夏季普遍高温（除青藏高原外）</li>
                            <li>1月0℃等温线大致沿秦岭-淮河一线分布</li>
                            <li>季风区与非季风区分界线：大兴安岭-阴山-贺兰山-巴颜喀拉山-冈底斯山</li>
                            <li>我国降水时空分布：夏秋多、冬春少；从东南沿海向西北内陆递减</li>
                            <li>800毫米年等降水量线大致沿秦岭-淮河一线</li>
                            <li>400毫米年等降水量线大致沿大兴安岭-张家口-兰州-拉萨一线</li>
                            <li>夏季风：来自太平洋的东南季风和来自印度洋的西南季风，温暖湿润</li>
                            <li>冬季风：来自西伯利亚和蒙古的西北季风，寒冷干燥</li>
                            <li>特殊天气：寒潮（冬半年）、梅雨（夏初江淮地区）、台风（夏秋东南沿海）、沙尘暴（春季北方）</li>
                        </ul>
                        <h3>第三节 中国的河流</h3>
                        <ul>
                            <li>外流河：最终流入海洋的河流，主要分布在东部季风区，占全国河流总水量的95%以上</li>
                            <li>内流河：最终未流入海洋的河流，主要分布在西北内陆，塔里木河是我国最大的内流河</li>
                            <li>长江：我国第一大河，世界第三长河（6300千米），发源于青藏高原唐古拉山脉，注入东海；上游水能丰富（"水能宝库"），中下游航运发达（"黄金水道"）；三峡工程是世界上最大的水利枢纽工程</li>
                            <li>黄河：我国第二长河（5464千米），发源于青藏高原巴颜喀拉山脉，注入渤海；中游流经黄土高原，水土流失严重，含沙量世界最大；下游形成"地上河"；治理关键是治沙，加强中游黄土高原的水土保持</li>
                            <li>京杭大运河：世界上开凿最早、最长的人工运河，北起北京，南至杭州，沟通五大水系</li>
                            <li>湖泊：青海湖（最大咸水湖、最大湖泊）、鄱阳湖（最大淡水湖）、洞庭湖、太湖、洪泽湖、巢湖（五大淡水湖）</li>
                        </ul>
                    ` },
                    { id: 'geo8_3', title: '第三章 中国的自然资源', content: `
                        <h3>第一节 自然资源概况</h3>
                        <ul>
                            <li>自然资源：存在于自然界中，能为人类提供福利的物质和能量</li>
                            <li>分类：可再生资源（土地、水、森林、太阳能、风能等）和非可再生资源（矿产、煤炭、石油、天然气等）</li>
                            <li>我国自然资源特点：总量丰富（资源大国），人均不足（人均资源占有量远低于世界平均水平）</li>
                            <li>矿产资源：煤、石油、天然气、铁、铜、铝土矿等；煤炭储量居世界前列，石油需大量进口</li>
                            <li>新能源：太阳能、风能、地热能、潮汐能、生物质能等，清洁可再生</li>
                        </ul>
                        <h3>第二节 中国的土地资源</h3>
                        <ul>
                            <li>我国土地资源特点：类型齐全（耕地、林地、草地、建设用地等），耕地比重小（约占12.68%），地区分布不均</li>
                            <li>耕地主要分布在东部季风区的平原、盆地和低缓丘陵（如东北平原、华北平原、长江中下游平原、四川盆地）</li>
                            <li>林地主要分布在东北、西南的天然林区和东南的人工林区</li>
                            <li>草地主要分布在西部和北部的高原、山地（内蒙古高原东部、青藏高原东部和南部）</li>
                            <li>难以利用的土地分布在新疆、内蒙古干旱荒漠和青藏高原高寒荒漠</li>
                            <li>我国基本国策：十分珍惜、合理利用土地和切实保护耕地（"18亿亩耕地红线"）</li>
                            <li>土地利用问题：水土流失、土地荒漠化、乱占耕地、土地污染等</li>
                        </ul>
                        <h3>第三节 中国的水资源</h3>
                        <ul>
                            <li>我国水资源总量丰富（居世界第六位），但人均占有量仅为世界平均水平的1/4</li>
                            <li>时空分布不均：南多北少，东多西少；夏秋多，冬春少，年际变化大</li>
                            <li>解决水资源空间分布不均：跨流域调水——南水北调工程（东线、中线、西线）、引滦入津、引黄济青等</li>
                            <li>解决水资源时间分布不均：修建水库（三峡、小浪底等）</li>
                            <li>节约用水、保护水资源是解决我国缺水问题的重要途径</li>
                            <li>节水措施：农业推广喷灌滴灌、培育耐旱作物；工业循环利用；生活一水多用、使用节水器具</li>
                            <li>水污染来源：工业废水、农业化肥农药、生活污水；防治措施：污水处理达标排放、减少农药化肥使用</li>
                        </ul>
                        <h3>第四节 中国的海洋资源</h3>
                        <ul>
                            <li>我国是海洋大国，大陆海岸线1.8万多千米，管辖海域面积约300万平方千米</li>
                            <li>海洋资源类型：海洋生物资源（四大渔场：黄渤海渔场、舟山渔场、南海沿岸渔场、北部湾渔场）、海洋矿产资源（石油、天然气、锰结核）、海洋化学资源（海盐）、海洋能源（潮汐能、波浪能）</li>
                            <li>最大的渔场：舟山渔场（位于东海，长江入海口附近，寒暖流交汇）</li>
                            <li>主要盐场：长芦盐场（最大，位于渤海西岸）、莺歌海盐场、布袋盐场</li>
                            <li>海洋保护：防止海洋污染、禁止过度捕捞、建立海洋自然保护区、伏季休渔制度</li>
                        </ul>
                    ` },
                    { id: 'geo8_4', title: '第四章 中国的主要产业', content: `
                        <h3>第一节 农业</h3>
                        <ul>
                            <li>农业是国民经济的基础产业，包括种植业、畜牧业、林业、渔业等部门</li>
                            <li>我国农业分布：东部季风区以种植业为主，西部以畜牧业为主（400毫米年等降水量线为界）</li>

                            <li>四大牧区：内蒙古牧区（三河牛、三河马）、新疆牧区（细毛羊）、青海牧区、西藏牧区（牦牛）</li>
                            <li>农业发展原则：因地制宜——宜农则农、宜牧则牧、宜林则林、宜渔则渔</li>

                        <h3>第二节 工业</h3>

                            <li>高新技术产业以电子和信息类产业为"龙头"，产品科技含量高，更新换代快</li>

                            <li>其他重要高新区：上海张江、深圳南山、武汉光谷、西安杨凌等</li>
                            <li>能源工业：煤炭（第一大能源，山西、内蒙古、陕西）、石油（第二大能源，大庆、胜利、塔里木）、电力（火电、水电、核电、风电、太阳能发电）</li>
                            <li>钢铁工业：鞍本、京津唐、上海、武汉、攀枝花、包头等基地</li>

                        <h3>第三节 交通运输业</h3>

                            <li>现代运输方式：铁路运输、公路运输、水路运输、航空运输、管道运输</li>

                    ` }
