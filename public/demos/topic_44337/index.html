            bio: {
                7: [
                    { id: 'bio7_1', title: '第1章 认识生命现象', content: `
                        <h3>第一节 生物的基本特征</h3>
                        <ul>
                            <li>生物是指有生命的物体，包括植物、动物和微生物</li>
                            <li><strong>生物的基本特征：</strong>
                                <ul>
                                    <li>除病毒外，生物都由细胞构成</li>
                                    <li>生物能生长、发育</li>
                                    <li>生物能呼吸和排泄</li>
                                    <li>生物需要营养物质和能量</li>
                                    <li>生物能繁殖，具有遗传和变异现象</li>
                                    <li>生物对外界刺激能作出反应（应激性）</li>
                                    <li>生物能适应环境，也能影响环境</li>
                                </ul>
                            </li>
                            <li>口诀：<strong>生物特征七句话，呼吸排泄生长大；繁殖遗传和变异，应激适应不离它；除病毒外有细胞，生命现象靠观察</strong></li>
                            <li>生物学是研究生命现象和生命活动规律的科学</li>
                            <li>科学探究的基本方法：观察法、实验法、调查法、测量法等</li>
                        </ul>
                        <h3>第二节 显微镜的结构和使用</h3>
                        <ul>
                            <li>显微镜的结构：目镜、物镜、粗准焦螺旋、细准焦螺旋、转换器、遮光器、反光镜等</li>
                            <li>目镜越长，放大倍数越小；物镜越长，放大倍数越大</li>
                            <li>显微镜放大倍数=目镜放大倍数×物镜放大倍数</li>
                            <li>显微镜成倒像，物像偏哪就向哪移动玻片</li>
                            <li>光线强时用平面镜和小光圈；光线弱时用凹面镜和大光圈</li>
                            <li>使用显微镜步骤：取镜和安放→对光→放置玻片标本→观察→收镜</li>
                            <li>口诀：<strong>显微镜使用五步走，取镜安放对光后；放置标本来观察，最后收镜要记熟；强光平镜小光圈，弱光凹镜大光圈；物像偏哪向哪移，低倍找到高倍瞅</strong></li>
                            <li>对光时，左眼注视目镜，右眼睁开，双手调节反光镜和遮光器，直到视野明亮均匀</li>
                            <li>观察时先用低倍物镜，找到物像后再换高倍物镜观察</li>
                            <li>低倍镜换高倍镜后，视野变暗，细胞数目变少，细胞体积变大</li>
                        </ul>
                        <h3>第三节 科学探究的基本过程</h3>
                        <ul>
                            <li>科学探究的一般过程：提出问题→作出假设→制定计划→实施计划→得出结论→表达交流</li>
                            <li>口诀：<strong>科学探究六步走，提出假设定计划；实施计划得结论，表达交流不能差</strong></li>
                            <li>对照实验：在研究一种条件对研究对象的影响时，所进行的除了这种条件不同以外，其他条件都相同的实验</li>
                            <li>对照实验中，不同的条件就是实验变量，变量应唯一</li>
                            <li>重复实验和设置多个实验对象可以减少实验误差，提高实验结果的可信度</li>
                        </ul>
                    ` },
                    { id: 'bio7_2', title: '第2章 生物与环境', content: `
                        <h3>第一节 生物与环境的关系</h3>
                        <ul>
                            <li>生态因素分为非生物因素（水、空气、阳光、温度、土壤等）和生物因素</li>
                            <li>生物与环境的关系：生物依赖环境、生物影响环境、生物适应环境</li>
                            <li>生物对环境的适应具有普遍性，也具有相对性</li>
                            <li>保护色、拟态、警戒色是动物适应环境的特例</li>
                            <li>非生物因素对生物的影响：光照影响植物的光合作用和开花时间；温度影响生物的分布和生长；水分影响陆生生物的分布</li>
                            <li>生物因素包括影响该生物生活的其他生物，同种生物之间存在种内互助和种内斗争，不同种生物之间存在捕食、竞争、寄生、共生等关系</li>
                        </ul>
                        <h3>第二节 生态系统</h3>
                        <ul>
                            <li>生态系统：在一定区域内，所有生物和非生物环境组成的统一整体</li>
                            <li><strong>生态系统组成：非生物成分+生物成分（生产者、消费者、分解者）</strong></li>
                            <li>口诀：<strong>生态系统三成分，生产者、消费者、分解者要记清；绿色植物是生产，动物消费靠后行；细菌真菌分解者，非生物环境莫忘情</strong></li>
                            <li>生产者：绿色植物，为消费者和分解者提供食物和能量</li>
                            <li>消费者：人和动物，直接或间接以植物为食</li>
                            <li>分解者：细菌和真菌，将有机物分解为无机物</li>
                            <li>生态系统的类型：森林生态系统、草原生态系统、海洋生态系统、淡水生态系统、湿地生态系统、农田生态系统、城市生态系统等</li>
                            <li>生物圈是地球上最大的生态系统，包括大气圈的下层、水圈和岩石圈的上层</li>
                        </ul>
                        <h3>第三节 食物链和食物网</h3>
                        <ul>
                            <li>食物链：不同生物之间由于吃与被吃关系形成的链状结构</li>
                            <li>食物链特点：由绿色植物开始，包含3-5个环节</li>
                            <li><strong>食物链写法规则：</strong>生产者→初级消费者→次级消费者→三级消费者</li>
                            <li>口诀：<strong>食物链写法有规则，生产开头箭头指；被捕食者在前头，捕食者在后头；能量递减单方向，有害物质往上走</strong></li>
                            <li>食物网：多条食物链相互交错连接形成的复杂营养关系网络</li>
                            <li>能量流动：从绿色植物开始，单向流动，逐级递减</li>
                            <li>能量传递效率约为10%-20%，营养级越高，获得的能量越少</li>
                            <li>有害物质沿食物链积累，营养级越高积累越多，称为生物富集</li>
                        </ul>
                        <h3>第四节 生态系统的稳定性</h3>
                        <ul>
                            <li>生态系统具有一定的自动调节能力，使生态系统保持相对稳定</li>
                            <li>生态系统的稳定性与生物种类多少和营养结构复杂程度有关</li>
                            <li>生物种类越多，营养结构越复杂，自动调节能力越强，稳定性越高</li>
                            <li>生态系统的自动调节能力是有一定限度的，超过限度生态系统就会遭到破坏</li>
                        </ul>
                    ` },
                    { id: 'bio7_3', title: '第3章 生物体的结构层次', content: `
                        <h3>第一节 细胞是生命活动的基本单位</h3>
                        <ul>
                            <li>细胞是生物体结构和功能的基本单位</li>
                            <li>口诀：<strong>细胞结构要记牢，植物六样动物三；壁膜质核泡叶绿，动物没有壁和泡</strong></li>
                            <li>植物细胞结构：细胞壁、细胞膜、细胞质、细胞核、液泡、叶绿体</li>
                            <li>动物细胞结构：细胞膜、细胞质、细胞核</li>
                            <li>细胞壁：保护和支持细胞；细胞膜：控制物质进出</li>
                            <li>细胞核：含有遗传物质，是细胞的控制中心</li>
                            <li>叶绿体：光合作用的场所；线粒体：呼吸作用的场所</li>
                            <li>液泡：内含细胞液，与细胞的吸水和失水有关</li>
                            <li>细胞质：细胞膜以内、细胞核以外的部分，是细胞代谢的主要场所</li>
                            <li>动植物细胞共有的结构：细胞膜、细胞质、细胞核、线粒体</li>
                            <li>制作临时装片的基本步骤：擦→滴→取→展（涂）→盖→染→吸</li>
                        </ul>
                        <h4>动植物细胞结构对比表</h4>
                        <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;text-align:center;margin-bottom:12px;">
                            <tr style="background:#f0f0ff;"><th>结构</th><th>植物细胞</th><th>动物细胞</th></tr>
                            <tr><td>细胞壁</td><td><strong>有</strong></td><td>无</td></tr>
                            <tr><td>细胞膜</td><td>有</td><td>有</td></tr>
                            <tr><td>细胞质</td><td>有</td><td>有</td></tr>
                            <tr><td>细胞核</td><td>有</td><td>有</td></tr>
                            <tr><td>液泡</td><td><strong>有（大液泡）</strong></td><td>无或很小</td></tr>
                            <tr><td>叶绿体</td><td><strong>绿色部分有</strong></td><td>无</td></tr>
                            <tr><td>线粒体</td><td>有</td><td>有</td></tr>
                        </table>
                        <h3>第二节 细胞的分裂和分化</h3>
                        <ul>
                            <li>细胞分裂：一个细胞分裂成两个细胞，使细胞数目增多</li>
                            <li>细胞分裂过程：细胞核先分裂，然后细胞质分裂，最后形成新的细胞膜（植物细胞还形成细胞壁）</li>
                            <li>细胞分裂过程中，染色体的变化最明显：先复制加倍，再平均分配到两个新细胞中</li>
                            <li>新细胞与原细胞所含的遗传物质相同</li>
                            <li>细胞生长：细胞体积由小变大，但不能无限长大</li>
                            <li>细胞分化：细胞在形态、结构和功能上发生差异性变化，形成组织</li>
                            <li>细胞分化的结果是形成不同的组织</li>
                            <li>植物组织：保护组织、营养组织、输导组织、分生组织、机械组织</li>
                            <li>动物组织：上皮组织、肌肉组织、结缔组织、神经组织</li>
                        </ul>
                        <h3>第三节 生物体的结构层次</h3>
                        <ul>
                            <li>植物体结构层次：细胞→组织→器官→植物体</li>
                            <li>动物体结构层次：细胞→组织→器官→系统→动物体</li>
                            <li>口诀：<strong>植物层次少一级，没有系统直接到；动物多了个系统，八大系统协调好</strong></li>
                            <li>绿色开花植物的六大器官：根、茎、叶（营养器官）；花、果实、种子（生殖器官）</li>
                            <li>人体八大系统：运动系统、消化系统、呼吸系统、循环系统、泌尿系统、神经系统、内分泌系统、生殖系统</li>
                            <li>各系统在神经系统和内分泌系统的调节下，协调配合，共同完成生命活动</li>
                        </ul>
                    ` },
                    { id: 'bio7_4', title: '第4章 绿色植物的一生', content: `
                        <h3>第一节 种子的萌发</h3>
                        <ul>
                            <li>种子结构：种皮、胚（胚芽、胚轴、胚根、子叶）</li>
                            <li>双子叶植物种子（如菜豆）有两片子叶，营养物质储存在子叶中</li>
                            <li>单子叶植物种子（如玉米）有一片子叶，营养物质储存在胚乳中</li>
                            <li><strong>种子萌发条件：适宜的温度、一定的水分、充足的空气</strong></li>
                            <li>口诀：<strong>种子萌发三条件，温度水分和空气；自身条件也重要，完整胚儿有活力，休眠已过才能起</strong></li>
                            <li>种子萌发时，胚根最先突破种皮发育成根，胚芽发育成茎和叶，胚轴发育成连接根和茎的部分</li>
                            <li>种子萌发需要自身条件：具有完整的、有生命力的胚，且不在休眠期</li>
                        </ul>
                        <h3>第二节 植株的生长</h3>
                        <ul>
                            <li>根尖结构：根冠、分生区、伸长区、成熟区</li>
                            <li>根冠：保护分生区；分生区：细胞分裂旺盛；伸长区：细胞迅速伸长；成熟区：生有大量根毛，是吸收水分和无机盐的主要部位</li>
                            <li>芽发育成枝条：芽轴发育成茎，芽原基发育成芽，幼叶发育成叶</li>
                            <li>植物生长需要量最多的是含氮、磷、钾的无机盐</li>
                            <li>口诀：<strong>氮磷钾，三要素；氮长枝叶磷促花，钾使茎秆更健壮</strong></li>
                            <li>含氮的无机盐促进枝叶生长；含磷的无机盐促进开花结实；含钾的无机盐使茎秆健壮</li>
                        </ul>
                        <h3>第三节 绿色植物的光合作用</h3>
                        <h4>光合作用概念</h4>
                        <ul>
                            <li>绿色植物利用光能，在<strong>叶绿体</strong>中，把<strong>二氧化碳</strong>和<strong>水</strong>转化成储存能量的<strong>有机物</strong>（如淀粉），并释放出<strong>氧气</strong>的过程</li>
                        </ul>
                        <h4>光合作用公式（必背）</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">原料</th><th style="padding:6px;border:1px solid #ddd">条件</th><th style="padding:6px;border:1px solid #ddd">场所</th><th style="padding:6px;border:1px solid #ddd">产物</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">二氧化碳 + 水</td><td style="padding:6px;border:1px solid #ddd;text-align:center">光能</td><td style="padding:6px;border:1px solid #ddd;text-align:center">叶绿体</td><td style="padding:6px;border:1px solid #ddd;text-align:center">有机物（储存能量）+ 氧气</td></tr>
                        </table>
                        <h4>光合作用的意义</h4>
                        <ul>
                            <li><strong>制造有机物：</strong>植物通过光合作用制造有机物，是食物链的基础</li>
                            <li><strong>储存能量：</strong>将光能转化为化学能储存在有机物中</li>
                            <li><strong>维持碳-氧平衡：</strong>吸收二氧化碳，释放氧气，维持大气中碳-氧平衡</li>
                        </ul>
                        <h4>绿叶在光下制造淀粉的实验（经典实验）</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">步骤</th><th style="padding:6px;border:1px solid #ddd">操作</th><th style="padding:6px;border:1px solid #ddd">目的</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">1.暗处理</td><td style="padding:6px;border:1px solid #ddd;text-align:center">将天竺葵放在黑暗处一昼夜</td><td style="padding:6px;border:1px solid #ddd;text-align:center">耗尽叶片中原有的淀粉</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">2.部分遮光</td><td style="padding:6px;border:1px solid #ddd;text-align:center">用黑纸片遮盖叶片一部分</td><td style="padding:6px;border:1px solid #ddd;text-align:center">设置对照（遮光部分vs见光部分）</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">3.光照</td><td style="padding:6px;border:1px solid #ddd;text-align:center">光照数小时后摘下叶片</td><td style="padding:6px;border:1px solid #ddd;text-align:center">让叶片进行光合作用</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">4.脱色</td><td style="padding:6px;border:1px solid #ddd;text-align:center">放入酒精中水浴加热</td><td style="padding:6px;border:1px solid #ddd;text-align:center">溶解叶绿素，便于观察颜色变化</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">5.漂洗染色</td><td style="padding:6px;border:1px solid #ddd;text-align:center">清水漂洗后滴加碘液</td><td style="padding:6px;border:1px solid #ddd;text-align:center">检验是否有淀粉产生</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">6.观察</td><td style="padding:6px;border:1px solid #ddd;text-align:center">见光部分变蓝，遮光部分不变蓝</td><td style="padding:6px;border:1px solid #ddd;text-align:center">证明光合作用需要光，产物有淀粉</td></tr>
                        </table>
                        <h4>农业生产中的应用</h4>
                        <ul>
                            <li><strong>合理密植：</strong>充分利用光照，提高光合作用效率</li>
                            <li><strong>间作套种：</strong>充分利用土地和光照资源</li>
                            <li><strong>增加二氧化碳浓度：</strong>温室中施用气肥，提高产量</li>
                            <li><strong>避免过度密植：</strong>过度密植会导致叶片互相遮挡，降低光合效率</li>
                        </ul>
                        <h4>口诀记忆</h4>
                        <ul>
                            <li><strong>光合作用要记牢，二氧化碳加水好；光能叶绿体帮忙，有机物和氧气产</strong></li>
                        </ul>
                        <h3>第四节 绿色植物的呼吸作用</h3>
                        <h4>呼吸作用概念</h4>
                        <ul>
                            <li>植物细胞利用<strong>氧</strong>，将<strong>有机物</strong>分解成<strong>二氧化碳</strong>和<strong>水</strong>，并且将储存在有机物中的<strong>能量释放</strong>出来，供给生命活动的需要</li>
                        </ul>
                        <h4>呼吸作用公式（必背）</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">原料</th><th style="padding:6px;border:1px solid #ddd">场所</th><th style="padding:6px;border:1px solid #ddd">产物</th><th style="padding:6px;border:1px solid #ddd">条件</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">有机物 + 氧气</td><td style="padding:6px;border:1px solid #ddd;text-align:center">线粒体（所有活细胞）</td><td style="padding:6px;border:1px solid #ddd;text-align:center">二氧化碳 + 水 + 能量</td><td style="padding:6px;border:1px solid #ddd;text-align:center">有光无光都能进行</td></tr>
                        </table>
                        <h4>呼吸作用的重要特征</h4>
                        <ul>
                            <li>在<strong>所有活细胞</strong>中<strong>时刻</strong>进行（白天和夜晚都在进行）</li>
                            <li><strong>有光无光</strong>都能进行（与光合作用不同）</li>
                            <li>释放的能量一部分用于<strong>生命活动</strong>，一部分以<strong>热能</strong>形式散失</li>
                        </ul>
                        <h4>光合作用 vs 呼吸作用（考试重点对比）</h4>
                        <table style="width:100%;border-collapse:collapse;margin:8px 0">
                            <tr style="background:#4a90d9;color:white"><th style="padding:6px;border:1px solid #ddd">比较项目</th><th style="padding:6px;border:1px solid #ddd">光合作用</th><th style="padding:6px;border:1px solid #ddd">呼吸作用</th></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">场所</td><td style="padding:6px;border:1px solid #ddd;text-align:center">叶绿体</td><td style="padding:6px;border:1px solid #ddd;text-align:center">线粒体（所有活细胞）</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">条件</td><td style="padding:6px;border:1px solid #ddd;text-align:center">必须有光</td><td style="padding:6px;border:1px solid #ddd;text-align:center">有光无光都进行</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">原料</td><td style="padding:6px;border:1px solid #ddd;text-align:center">二氧化碳、水</td><td style="padding:6px;border:1px solid #ddd;text-align:center">有机物、氧气</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">产物</td><td style="padding:6px;border:1px solid #ddd;text-align:center">有机物、氧气</td><td style="padding:6px;border:1px solid #ddd;text-align:center">二氧化碳、水、能量</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">物质变化</td><td style="padding:6px;border:1px solid #ddd;text-align:center">合成有机物（储存能量）</td><td style="padding:6px;border:1px solid #ddd;text-align:center">分解有机物（释放能量）</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">能量变化</td><td style="padding:6px;border:1px solid #ddd;text-align:center">光能→化学能（储能）</td><td style="padding:6px;border:1px solid #ddd;text-align:center">化学能→热能+生命活动能（放能）</td></tr>
                            <tr><td style="padding:6px;border:1px solid #ddd;text-align:center">发生时间</td><td style="padding:6px;border:1px solid #ddd;text-align:center">白天有光时</td><td style="padding:6px;border:1px solid #ddd;text-align:center">白天和夜晚都进行</td></tr>
                        </table>
                        <h4>呼吸作用在生活中的应用</h4>
                        <ul>
                            <li><strong>粮食储存：</strong>降低温度、减少氧气（真空包装、充氮气），抑制呼吸作用，减少有机物消耗</li>
                            <li><strong>水果蔬菜保鲜：</strong>低温、低氧、适当湿度，降低呼吸强度</li>
                            <li><strong>农田松土：</strong>增加土壤中空气含量，促进根部细胞呼吸作用，有利于根对无机盐的吸收</li>
                            <li><strong>温室种植：</strong>适当降低夜间温度，减弱呼吸作用，减少有机物消耗</li>
                            <li><strong>涝灾排涝：</strong>水淹后及时排涝，防止根部缺氧无法进行呼吸作用而烂根</li>
                        </ul>
                        <h4>口诀记忆</h4>
                        <ul>
                            <li><strong>光合储能量，呼吸放能量；光合叶绿体，呼吸线粒体；光合需光照，呼吸昼夜忙</strong></li>
                        </ul>
                        <h3>第五节 蒸腾作用与水分运输</h3>
                        <ul>
                            <li>蒸腾作用：水分以气体状态从植物体内散失到体外的过程，主要通过叶片的气孔进行</li>
                            <li>气孔由一对保卫细胞构成，是气体交换和水分散失的门户</li>
                            <li>蒸腾作用意义：促进水分和无机盐的运输；降低叶片温度；增加大气湿度</li>
                            <li>移栽植物时去掉部分枝叶、阴天移栽等措施可降低蒸腾作用，提高成活率</li>
                        </ul>
                    ` },
                    { id: 'bio7_5', title: '第八章 人的生殖和发育', content: `
    <h3>第一节 精卵结合孕育新的生命</h3>
    <h4>男女生殖系统</h4>
    <ul>
        <li><strong>睾丸</strong>：产生精子、分泌雄性激素——男性主要生殖器官</li>
        <li><strong>卵巢</strong>：产生卵子、分泌雌性激素——女性主要生殖器官</li>
        <li>附睾：贮存和输送精子；输精管：输送精子</li>
        <li><strong>输卵管</strong>：输送卵子，<strong>受精的场所</strong></li>
        <li><strong>子宫</strong>：胚胎和胎儿发育的场所</li>
        <li>阴道：精子进入和胎儿产出的通道</li>
    </ul>
    <h4>受精与胚胎发育</h4>
    <ul>
        <li><strong>受精</strong>：精子与卵子在<strong>输卵管</strong>中结合形成<strong>受精卵</strong></li>
        <li><strong>受精卵是新生命的起点</strong></li>
        <li>受精卵经输卵管进入子宫，不断进行<strong>细胞分裂和分化</strong></li>
        <li>第8周末胚胎初现人形，称为<strong>胎儿</strong></li>
        <li>胎儿通过<strong>胎盘</strong>与母体进行物质交换（获取营养和氧气，排出废物）</li>
        <li>孕期约<strong>280天</strong>（"十月怀胎，一朝分娩"）</li>
    </ul>
    <h3>第二节 人的生长发育和青春期</h3>
    <h4>青春期发育</h4>
    <ul>
        <li>青春期启动：男孩<strong>10~14岁</strong>，女孩<strong>10~12岁</strong></li>
        <li>青春期发育表现：<strong>形态发育</strong>（身高体重突增）、<strong>功能发育</strong>、<strong>性发育</strong></li>
        <li>女生进入青春期比男生<strong>早约2年</strong></li>
        <li><strong>第二性征</strong>：男性——长胡须、喉结突出、声调变低；女性——骨盆变宽、乳房增大、声调变高</li>
        <li>第二性征由<strong>性激素</strong>引起</li>
    </ul>
    <h4>青春期卫生</h4>
    <ul>
        <li>男性：<strong>遗精</strong>是正常生理现象，注意个人卫生</li>
        <li>女性：<strong>月经</strong>周期约28天，每次持续4~5天，出血量30~100mL</li>
        <li>月经形成：卵子未受精→子宫内膜脱落→经阴道排出</li>
        <li>注意经期卫生、避免剧烈运动、注意保暖</li>
    </ul>
    <h3>第三节 人体概述</h3>
    <h4>人体的结构层次</h4>
    <ul>
        <li>结构层次：<strong>细胞→组织→器官→系统→人体</strong></li>
        <li>四种基本组织：<strong>上皮组织、结缔组织、肌肉组织、神经组织</strong></li>
    </ul>
    <h4>骨的结构与成分</h4>
    <ul>
        <li>长骨结构：<strong>骨膜</strong>（含成骨细胞，使骨长粗）、<strong>骨密质</strong>、<strong>骨松质</strong>、<strong>骨髓</strong>（造血）、<strong>软骨层</strong>（使骨长长）</li>
        <li>骨的成分：<strong>无机物</strong>（钙盐，使骨硬脆）+<strong>有机物</strong>（蛋白质，使骨柔韧）</li>
        <li>儿童少年：有机物多于1/3，弹性大易变形；成年人：约各占2/3和1/3</li>
        <li>经常参加体育锻炼可促进骨骼生长</li>
    </ul>
` },
                    { id: 'bio7_6', title: '第九章 人的食物来自环境', content: `
    <h3>第一节 人体需要的主要营养物质</h3>
    <h4>六大营养物质</h4>
    <ul>
        <li>有机物：<strong>蛋白质、糖类、脂肪、维生素</strong>；无机物：<strong>水、无机盐</strong></li>
        <li><strong>蛋白质</strong>：构成细胞的基本物质，参与生长发育和受损细胞修复</li>
        <li><strong>糖类</strong>：人体最重要的<strong>供能物质</strong>（米、面等）</li>
        <li><strong>脂肪</strong>：<strong>备用能源物质</strong>，维持体温恒定，保护内脏</li>
    </ul>
    <h4>维生素和无机盐</h4>
    <ul>
        <li><strong>维生素A</strong>：动物肝脏、胡萝卜→缺乏→<strong>夜盲症</strong></li>
        <li><strong>维生素B₁</strong>：糙米、豆类→缺乏→<strong>脚气病</strong></li>
        <li><strong>维生素C</strong>：新鲜蔬果→缺乏→<strong>坏血病</strong></li>
        <li><strong>维生素D</strong>：鱼肝油→促进钙磷吸收→缺乏→<strong>佝偻病</strong></li>
        <li><strong>钙</strong>→缺乏→佝偻病/骨质疏松；<strong>铁</strong>→缺乏→贫血；<strong>碘</strong>→缺乏→甲状腺肿</li>
    </ul>
    <h3>第二节 人体的消化与吸收</h3>
    <h4>消化系统</h4>
    <ul>
        <li>消化道：口腔→咽→食道→胃→<strong>小肠</strong>（5~7米）→大肠→肛门</li>
        <li>消化腺：唾液腺、胃腺、<strong>肝脏</strong>（最大消化腺，分泌胆汁）、胰腺、肠腺</li>
        <li><strong>胆汁不含消化酶</strong>，但能<strong>乳化脂肪</strong></li>
    </ul>
    <h4>食物的消化</h4>
    <ul>
        <li>物理性消化：咀嚼、搅拌、蠕动</li>
        <li>化学性消化：消化酶分解大分子物质</li>
        <li>淀粉→<strong>葡萄糖</strong>（口腔开始）；蛋白质→<strong>氨基酸</strong>（胃开始）；脂肪→<strong>甘油和脂肪酸</strong>（小肠）</li>
    </ul>
    <h4>营养物质的吸收</h4>
    <ul>
        <li><strong>小肠是消化和吸收的主要器官</strong></li>
        <li>小肠特点：长、有环形皱襞、小肠绒毛、壁薄、毛细血管丰富</li>
        <li>小肠内表面积扩大约<strong>600倍</strong></li>
        <li>胃吸收少量水和酒精；大肠吸收少量水、无机盐和部分维生素</li>
    </ul>
    <h3>第三节 膳食指南与食品安全</h3>
    <ul>
        <li>三餐能量分配：<strong>早餐30%、午餐40%、晚餐30%</strong></li>
        <li>膳食指南：食物多样谷类为主、多吃蔬果、每天吃奶类豆制品、吃适量鱼禽蛋瘦肉</li>
        <li>食品安全：注意保质期、不买三无产品、关注QS标志和绿色食品标志</li>
        <li>发霉食品不能食用（含黄曲霉素，致癌）</li>
    </ul>
` },
                    { id: 'bio7_7', title: '第十章 人体内的物质运输和能量供给', content: `
    <h3>第一节 血液和血型</h3>
    <h4>血液的组成</h4>
    <ul>
        <li>血液分层：<strong>血浆</strong>（上层，55%）→白细胞和血小板（中层）→<strong>红细胞</strong>（下层，45%）</li>
        <li><strong>血浆</strong>：90%以上是水，含蛋白质、葡萄糖、无机盐等，运载血细胞和物质</li>
        <li><strong>红细胞</strong>：两面凹圆饼状，无核，含<strong>血红蛋白</strong>（含铁），运输O₂和部分CO₂</li>
        <li><strong>白细胞</strong>：有核，最大，<strong>吞噬病菌</strong>，有炎症时增多</li>
        <li><strong>血小板</strong>：最小，无核，<strong>止血和加速凝血</strong></li>
    </ul>
    <h4>血型与输血</h4>
    <ul>
        <li>ABO血型：<strong>A型、B型、AB型、O型</strong></li>
        <li>输血原则：<strong>同型输血</strong>为主</li>
        <li>O型血→"万能供血者"；AB型血→"万能受血者"</li>
        <li>成年人血量约为体重的<strong>7%~8%</strong>，一次失血不超过10%可恢复</li>
        <li>提倡18~55周岁健康公民自愿献血，每次<strong>200~400mL</strong></li>
    </ul>
    <h3>第二节 人体的血液循环</h3>
    <h4>血管和心脏</h4>
    <ul>
        <li><strong>动脉</strong>：壁厚弹性大，血流快，将血液从心脏送到全身</li>
        <li><strong>静脉</strong>：壁薄弹性小，有<strong>静脉瓣</strong>，将血液送回心脏</li>
        <li><strong>毛细血管</strong>：壁最薄（一层细胞），最细，血流最慢，是<strong>物质交换的场所</strong></li>
        <li>心脏四腔：<strong>左心房、左心室、右心房、右心室</strong></li>
        <li><strong>左心室壁最厚</strong>（体循环路径长）</li>
        <li>房室瓣保证血液单向流动（心房→心室）</li>
    </ul>
    <h4>血液循环路径</h4>
    <ul>
        <li><strong>体循环</strong>：左心室→主动脉→全身毛细血管→上下腔静脉→右心房（动脉血→静脉血）</li>
        <li><strong>肺循环</strong>：右心室→肺动脉→肺部毛细血管→肺静脉→左心房（静脉血→动脉血）</li>
        <li><strong>动脉血</strong>：含氧丰富，鲜红；<strong>静脉血</strong>：含氧少，暗红</li>
        <li>注意：肺动脉中是静脉血，肺静脉中是动脉血</li>
    </ul>
    <h3>第三节 人体和外界环境的气体交换</h3>
    <h4>呼吸系统</h4>
    <ul>
        <li>呼吸道：<strong>鼻腔→咽→喉→气管→支气管</strong></li>
        <li>鼻腔：温暖、湿润、清洁吸入的空气</li>
        <li>咽：消化道和呼吸道的<strong>共同通道</strong></li>
        <li><strong>肺</strong>是呼吸系统的主要器官，<strong>肺泡</strong>是气体交换的场所</li>
        <li>肺泡特点：数量多（约3亿个）、壁薄（一层细胞）、外绕毛细血管</li>
    </ul>
    <h4>呼吸运动与气体交换</h4>
    <ul>
        <li><strong>吸气</strong>：膈肌收缩→胸腔扩大→肺扩张→外界气体进入肺</li>
        <li><strong>呼气</strong>：膈肌舒张→胸腔缩小→肺回缩→肺内气体排出</li>
        <li>吸入气O₂约21%，呼出气O₂约16%；呼出气CO₂约4%（增加最多）</li>
        <li>肺泡气体交换：O₂进入血液，CO₂进入肺泡（静脉血→动脉血）</li>
        <li>组织气体交换：O₂进入组织细胞，CO₂进入血液（动脉血→静脉血）</li>
    </ul>
` },
                    { id: 'bio7_8', title: '第十一章 人体内的废物排入环境', content: `
    <h3>第一节 人体泌尿系统的组成</h3>
    <h4>泌尿系统</h4>
    <ul>
        <li>泌尿系统组成：<strong>肾脏</strong>（形成尿液）→<strong>输尿管</strong>（输送）→<strong>膀胱</strong>（暂时贮存）→<strong>尿道</strong>（排出）</li>
        <li><strong>肾脏</strong>是泌尿系统的主要器官，形似蚕豆</li>
        <li>肾脏内部结构：<strong>肾皮质</strong>（外层，色深）、<strong>肾髓质</strong>（内层，色浅）、<strong>肾盂</strong>（中央，漏斗状）</li>
    </ul>
    <h4>肾单位</h4>
    <ul>
        <li>每个肾脏含约<strong>100万个肾单位</strong>，是肾脏的结构和功能单位</li>
        <li>肾单位组成：<strong>肾小球</strong>（毛细血管球）+<strong>肾小囊</strong>（包裹肾小球）+<strong>肾小管</strong>（细长弯曲管道）</li>
        <li>肾小球+肾小囊 = <strong>肾小体</strong>（位于肾皮质）</li>
        <li>血液路径：入球小动脉→肾小球→出球小动脉→包绕肾小管的毛细血管网→肾静脉</li>
    </ul>
    <h3>第二节 人体废物的排出</h3>
    <h4>尿液的形成</h4>
    <ul>
        <li>第一阶段：<strong>肾小球的过滤作用</strong>（形成原尿）</li>
        <li>血液流经肾小球时，水、无机盐、葡萄糖、尿素等小分子物质滤过到肾小囊</li>
        <li>大分子<strong>蛋白质和血细胞</strong>不能滤过</li>
        <li>第二阶段：<strong>肾小管的重吸收作用</strong>（形成终尿）</li>
        <li>全部葡萄糖、大部分水和部分无机盐被重吸收回血液</li>
        <li>每天形成原尿约<strong>150L</strong>，排出终尿约<strong>1~1.5L</strong>（重吸收约99%）</li>
    </ul>
    <h4>排泄途径</h4>
    <ul>
        <li><strong>肾脏</strong>：排出尿素、多余的水和无机盐（尿液）</li>
        <li><strong>皮肤</strong>：排出部分水、无机盐和尿素（汗液）</li>
        <li><strong>肺</strong>：排出二氧化碳和少量水（气体形式）</li>
        <li><strong>排泄≠排遗</strong>：粪便不是代谢产物，排出粪便属于排遗</li>
    </ul>
` },
                    { id: 'bio7_9', title: '第十二章 人体生命活动的调节', content: `
    <h3>第一节 人体的激素调节</h3>
    <h4>内分泌腺与激素</h4>
    <ul>
        <li><strong>激素</strong>：由内分泌腺分泌，量极少但作用重要</li>
        <li>内分泌腺<strong>无导管</strong>，分泌物直接进入血液；外分泌腺有导管</li>
        <li><strong>垂体</strong>：分泌生长激素→过多→巨人症；过少→侏儒症</li>
        <li><strong>甲状腺</strong>：分泌甲状腺激素→促进生长发育、促进代谢、提高神经兴奋性</li>
        <li>缺碘→甲状腺激素合成减少→<strong>地方性甲状腺肿</strong>（大脖子病）</li>
        <li>幼年甲状腺激素不足→<strong>呆小症</strong>（智力低下+骨生长停滞）</li>
        <li><strong>胰岛</strong>：分泌<strong>胰岛素</strong>→调节糖代谢，降低血糖</li>
        <li>胰岛素分泌不足→<strong>糖尿病</strong>（尿液中含葡萄糖）</li>
        <li><strong>肾上腺</strong>：分泌肾上腺素→促使心跳加快、心肌收缩力增强</li>
    </ul>
    <h3>第二节 神经调节</h3>
    <h4>神经元与神经系统</h4>
    <ul>
        <li><strong>神经元</strong>是神经系统的结构和功能基本单位</li>
        <li>神经元结构：<strong>细胞体</strong>+<strong>树突</strong>（接收冲动）+<strong>轴突</strong>（传导冲动）</li>
        <li><strong>灰质</strong>：神经元的细胞体集中处；<strong>白质</strong>：神经纤维集中处</li>
        <li>脑：大脑（最高级中枢）、小脑（维持平衡协调运动）、脑干（呼吸心跳等基本生命中枢）</li>
    </ul>
    <h4>反射</h4>
    <ul>
        <li><strong>反射</strong>：通过神经系统对外界刺激作出的反应，是神经调节的基本方式</li>
        <li><strong>非条件反射</strong>（先天性）：如眨眼、吮吸、膝跳反射，神经中枢在脊髓</li>
        <li><strong>条件反射</strong>（后天性）：通过学习建立，需要大脑参与</li>
        <li>条件反射不强化会<strong>消退</strong></li>
        <li>人类特有的条件反射：对<strong>语言、文字</strong>等抽象信号的反应</li>
    </ul>
    <h3>第三节 人体感知信息</h3>
    <h4>眼和视觉</h4>
    <ul>
        <li>眼球结构：角膜（聚光）→瞳孔（光线通道）→晶状体（折射，如双凸透镜）→玻璃体→<strong>视网膜</strong>（感光）→视神经→大脑</li>
        <li><strong>近视</strong>：晶状体凸度过大或眼球前后径过长，成像在视网膜前方</li>
        <li>近视矫正：佩戴<strong>凹透镜</strong></li>
    </ul>
    <h4>耳和听觉</h4>
    <ul>
        <li>耳的结构：<strong>外耳</strong>（耳廓、外耳道）→<strong>中耳</strong>（鼓膜、听小骨）→<strong>内耳</strong>（耳蜗）</li>
        <li>听觉形成：声波→耳廓→外耳道→鼓膜振动→听小骨放大→耳蜗→听觉神经→大脑</li>
        <li><strong>咽鼓管</strong>连通鼓室与咽部，平衡鼓膜内外压力</li>
    </ul>
    <h4>皮肤感觉</h4>
    <ul>
        <li>四种基本感觉：<strong>触压觉、痛觉、冷觉、热觉</strong></li>
        <li>指尖触压觉感受器密集→特别敏感</li>
    </ul>
` },
                    { id: 'bio7_10', title: '第十三章 人是生物圈中的一员', content: `
    <h3>第一节 关注生物圈——环境在恶化</h3>
    <h4>人口增长与环境问题</h4>
    <ul>
        <li>世界人口从1804年10亿增长到2011年70亿，预计2026年达80亿</li>
        <li>人口增长过快→给生物圈造成巨大压力</li>
        <li>生物圈的承载能力是<strong>有限的</strong></li>
    </ul>
    <h4>环境问题</h4>
    <ul>
        <li><strong>酸雨</strong>：pH < 5.6，由SO₂和NOₓ引起，危害人体健康、农作物、水生生态、建筑</li>
        <li><strong>臭氧层破坏</strong>：离地面20~30km，吸收紫外线，破坏后皮肤癌增加</li>
        <li><strong>温室效应</strong>：CO₂等气体阻挡热量辐射，导致气候变暖</li>
        <li><strong>水污染</strong>：工业废水、农业废水、生活废水</li>
        <li><strong>噪声污染</strong>：交通、工厂、施工、社会活动</li>
        <li><strong>土壤污染</strong>：农药残留，如DDT在南极土壤中被检出</li>
    </ul>
    <h3>第二节 保护生物圈——从自身做起</h3>
    <ul>
        <li>人类活动对生物圈有重要影响，保护生物圈要从<strong>自身做起</strong></li>
        <li><strong>垃圾分类</strong>：可回收垃圾（废纸、废金属）、有害垃圾（废电池）、厨余垃圾</li>
        <li>1979年《环境保护法》→环保进入<strong>法治阶段</strong></li>
        <li>环境保护是国家的一项<strong>基本国策</strong></li>
        <li>减少污染、节约资源、增强环保意识</li>
    </ul>
` }
                ],
                8: [
                    { id: 'bio8_1', title: '第14章 生物的生殖与发育', content: `
                        <h3>第一节 生物的无性生殖</h3>
                        <ul>
                            <li>无性生殖：不经过两性生殖细胞的结合，由母体直接产生新个体</li>
                            <li>无性生殖方式：出芽生殖（酵母菌、水螅）、营养生殖（扦插、嫁接、压条）、分裂生殖（细菌、草履虫）、孢子生殖（蕨类、真菌）</li>
                            <li>嫁接时接穗和砧木的形成层要紧密结合，提高成活率</li>
                            <li>嫁接分为枝接和芽接，嫁接后果实性状与接穗一致</li>
                            <li>植物组织培养：在无菌条件下培养植物的细胞、组织或器官，属于无性生殖</li>
                            <li>无性生殖的优点：繁殖速度快，能保持亲本的优良性状</li>
                            <li>无性生殖的缺点：后代适应环境变化的能力较弱</li>
                        </ul>
                        <h4>有性生殖与无性生殖对比表</h4>
                        <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;text-align:center;margin-bottom:12px;">
                            <tr style="background:#f0f0ff;"><th>比较项目</th><th>有性生殖</th><th>无性生殖</th></tr>
                            <tr><td>生殖细胞</td><td><strong>需要两性生殖细胞结合</strong></td><td>不需要两性生殖细胞</td></tr>
                            <tr><td>新个体来源</td><td>受精卵发育</td><td>母体直接产生</td></tr>
                            <tr><td>优点</td><td>后代具有双亲遗传特性，变异性大</td><td><strong>繁殖快，保持亲本性状</strong></td></tr>
                            <tr><td>缺点</td><td>繁殖速度较慢</td><td>后代适应环境能力弱</td></tr>
                            <tr><td>实例</td><td>种子繁殖、胎生</td><td>扦插、嫁接、组织培养</td></tr>
                        </table>
                        <h3>第二节 植物的有性生殖</h3>
                        <ul>
                            <li>有性生殖：亲代产生生殖细胞，通过两性生殖细胞结合成受精卵发育成新个体</li>
                            <li>花的结构：花柄、花托、花萼、花瓣、雄蕊（花药和花丝）、雌蕊（柱头、花柱和子房）</li>
                            <li>传粉：花粉从花药传到柱头上的过程，分为自花传粉和异花传粉</li>
                            <li>异花传粉需要媒介：风媒花（玉米、小麦）和虫媒花（桃花、油菜花）</li>
                            <li>受精：花粉管中的精子与胚珠中的卵细胞结合形成受精卵的过程</li>
                            <li>双受精是被子植物特有的现象：一个精子与卵细胞结合形成受精卵，另一个精子与极核结合形成受精极核</li>
                            <li>受精后：受精卵发育成胚，胚珠发育成种子，子房发育成果实，子房壁发育成果皮</li>
                            <li>果实和种子的形成与花结构的对应关系</li>
                        </ul>
                        <h3>第三节 昆虫的生殖与发育</h3>
                        <ul>
                            <li>完全变态发育：卵→幼虫→蛹→成虫（如蝴蝶、蜜蜂、蚕、蚊子、苍蝇）</li>
                            <li>不完全变态发育：卵→若虫→成虫（如蝗虫、蟋蟀、螳螂、蝉）</li>
                            <li>口诀：<strong>完全变态四阶段，卵幼虫蛹和成虫；不完全变态三阶段，卵若虫后成虫来</strong></li>
                            <li>完全变态发育的幼虫和成虫在形态结构和生活习性上差异很大</li>
                            <li>不完全变态发育的若虫和成虫在形态结构和生活习性上相似</li>
                            <li>家蚕的发育过程：卵→幼虫→蛹→成虫，幼虫期吐丝结茧</li>
                            <li>蝗虫的若虫经过5次蜕皮后发育为成虫，有蜕皮现象是因为外骨骼不能随身体生长而生长</li>
                        </ul>
                        <h3>第四节 两栖动物的生殖与发育</h3>
                        <ul>
                            <li>两栖动物的生殖特点：体外受精、卵生，生殖和发育离不开水</li>
                            <li>青蛙的发育过程：受精卵→蝌蚪→幼蛙→成蛙，属于变态发育</li>
                            <li>蝌蚪用鳃呼吸，有尾无四肢；成蛙用肺呼吸，皮肤辅助呼吸，无尾有四肢</li>
                            <li>两栖动物是从水生向陆生过渡的类群</li>
                        </ul>
                        <h3>第五节 鸟的生殖与发育</h3>
                        <ul>
                            <li>鸟卵的结构：卵壳、卵壳膜、卵白、卵黄、胚盘、系带、气室</li>
                            <li>卵黄是主要营养部分，胚盘含有细胞核，是胚胎发育的部位</li>
                            <li>鸟的生殖特点：体内受精、卵生，有筑巢、求偶、交配、产卵、孵卵、育雏等繁殖行为</li>
                            <li>早成鸟（鸡、鸭）出壳后眼睛睁开，全身有稠密绒羽，能跟随亲鸟觅食</li>

                    { id: 'bio8_2', title: '第15章 生物的遗传和变异', content: `
                        <h3>第一节 DNA是主要的遗传物质</h3>
                        <ul>
                            <li>遗传：生物亲代与子代之间相似的现象</li>
                            <li>变异：生物亲代与子代之间以及子代个体之间的差异</li>
                            <li>染色体由DNA和蛋白质组成，DNA是主要的遗传物质</li>
                            <li>基因是有遗传效应的DNA片段，控制生物的性状</li>
                            <li>体细胞中染色体成对存在，基因也成对存在</li>
                            <li>每种生物体细胞内染色体的形态和数目是一定的</li>
                            <li>人的体细胞中有23对染色体，其中22对常染色体，1对性染色体（XX或XY）</li>
                            <li>女性体细胞染色体组成：22对+XX；男性体细胞染色体组成：22对+XY</li>
                        </ul>
                        <h4>遗传图解记忆方法</h4>
                        <ul>
                            <li>口诀：<strong>遗传图解要画清，亲代基因写上方；配子基因中间放，子代基因下方藏；显性隐性要标出，表现型别忘标注</strong></li>
                            <li>画遗传图解步骤：写亲代基因型→画配子→写子代基因型→标注表现型→计算比例</li>
                        </ul>
                        <h3>第二节 人的性状和遗传</h3>
                        <ul>
                            <li>性状：生物体的形态特征和生理特征</li>
                            <li>相对性状：同种生物同一性状的不同表现类型</li>
                            <li>显性基因（大写字母）控制显性性状，隐性基因（小写字母）控制隐性性状</li>
                            <li>当显性基因和隐性基因同时存在时，表现显性性状</li>
                            <li>基因型：生物体的基因组成，如AA、Aa、aa</li>
                            <li>表现型：生物体表现出来的性状，表现型由基因型决定，也受环境影响</li>
                            <li>纯合体：基因组成相同的个体（AA或aa）；杂合体：基因组成不同的个体（Aa）</li>
                        </ul>
                        <h3>第三节 人的性别决定</h3>
                        <ul>
                            <li>人的性别由性染色体决定</li>
                            <li>口诀：<strong>性别决定看性染，女XX来男XY；卵细胞只含X，精子X或Y各一半；生男生女看精子，机会均等各占半</strong></li>
                            <li>女性产生含X染色体的卵细胞；男性产生含X或Y染色体的精子，比例约为1:1</li>
                            <li>受精时，含X的精子与卵细胞结合发育为女性（XX），含Y的精子与卵细胞结合发育为男性（XY）</li>
                            <li>生男生女机会均等，各占50%，取决于与卵细胞结合的精子类型</li>
                        </ul>
                        <h3>第四节 遗传病和优生优育</h3>
                        <ul>
                            <li>遗传病：由遗传物质改变引起的疾病，如色盲、血友病、白化病、先天性愚型</li>
                            <li>近亲结婚后代患遗传病的概率大大增加，因为近亲携带相同隐性致病基因的概率大</li>
                            <li>我国婚姻法规定：直系血亲和三代以内的旁系血亲禁止结婚</li>
                            <li>优生优育措施：禁止近亲结婚、遗传咨询、产前诊断、适龄生育</li>
                        </ul>
                        <h3>第五节 生物的变异</h3>
                        <ul>
                            <li>可遗传的变异：由遗传物质改变引起的变异，能遗传给后代</li>
                            <li>不可遗传的变异：仅由环境因素引起的变异，遗传物质没有改变，不能遗传给后代</li>
                            <li>变异在生物进化上的意义：为生物进化提供原始材料</li>
                            <li>遗传育种在实践上的应用：杂交育种、诱变育种、转基因技术等</li>
                        </ul>
                    ` },
                    { id: 'bio8_3', title: '第16章 动物的运动和行为', content: `
                        <h3>第一节 动物的运动</h3>
                        <ul>

                            <li>口诀：<strong>关节结构三部分，关节面囊和关节腔；软骨滑液使灵活，囊和韧带保牢固</strong></li>
                            <li>关节软骨和关节腔内的滑液使关节运动灵活；关节囊和韧带使关节牢固</li>
                            <li>骨骼肌由肌腱和肌腹组成，骨骼肌只能收缩牵拉骨而不能推开骨</li>

                            <li>屈肘时，肱二头肌收缩，肱三头肌舒张；伸肘时相反</li>

                        <h3>第二节 动物的行为</h3>
                        <ul>
                            <li>先天性行为：生来就有，由遗传物质决定（如蜘蛛结网、蜜蜂采蜜、鸟类迁徙）</li>
                            <li>学习行为：在遗传因素基础上，通过环境因素作用，由生活经验和学习获得</li>
                            <li>学习行为使动物更好地适应复杂环境的变化</li>

                            <li>蚂蚁通过气味传递信息，蜜蜂通过舞蹈传递蜜源信息</li>

                            <li>动物行为在环境保护中的应用：利用生物防治减少农药使用</li>
                        </ul>
                    ` },
                    { id: 'bio8_4', title: '第17章 生物的进化', content: `
                        <h3>第一节 生物进化的证据</h3>
                        <ul>
                            <li>化石是生物进化的直接证据</li>
                            <li>化石在地层中的分布规律：越古老的地层中，生物越简单、越低等；越晚近的地层中，生物越复杂、越高等</li>
                            <li>同源器官证明不同生物之间存在亲缘关系，如鲸的鳍、鸟的翼、蝙蝠的翼手、人的上肢</li>
                            <li>胚胎学证据：不同脊椎动物的早期胚胎都很相似，说明它们有共同的祖先</li>
                            <li>分子生物学证据：不同生物的细胞色素c的氨基酸序列差异越小，亲缘关系越近</li>
                        </ul>
                        <h3>第二节 生物进化的历程</h3>
                        <ul>
                            <li>生物进化的总体趋势：从简单到复杂、从低等到高等、从水生到陆生</li>
                            <li>口诀：<strong>进化趋势三方向，简单到复杂；低等到高等来变化，水生到陆生忙</strong></li>
                            <li>植物进化历程：原始藻类→原始苔藓植物和原始蕨类植物→原始种子植物</li>
                            <li>动物进化历程：原始单细胞动物→原始无脊椎动物→原始脊椎动物（鱼类→两栖类→爬行类→鸟类和哺乳类）</li>
                            <li>脊椎动物的进化：古代鱼类→古代两栖类→古代爬行类→古代鸟类和哺乳类</li>
                        </ul>
                        <h3>第三节 生物进化的学说</h3>
                        <ul>
                            <li>达尔文自然选择学说：
                                <ul>
                                    <li>过度繁殖：生物具有很强的繁殖能力</li>
                                    <li>生存斗争：生物为生存资源而斗争</li>
                                    <li>遗传变异：生物存在可遗传的变异</li>
                                    <li>适者生存：适应环境的个体生存下来，不适应者被淘汰</li>

                            <li>自然选择是定向的，它决定着生物进化的方向</li>
                            <li>变异是不定向的，为生物进化提供原材料</li>

                    { id: 'moral7_1', title: '第一单元 少年有梦', content: `
                        <h3>第一课 开启初中生活</h3>

                    { id: 'moral7_2', title: '第二单元 成长的时空', content: `

                    { id: 'moral7_3', title: '第三单元 珍爱我们的生命', content: `
                        <h3>第七课 生命可贵</h3>

                            <li>爱护身体，应当积极、主动、科学地锻炼身体</li>
                            <li>爱护身体，应当磨炼意志，增强生命韧性</li>

                        <h4>9.3 绽放生命之花</h4>
                        <ul>

                            <li>口诀：<strong>面对挫折不气馁，发掘力量增勇气；寻求帮助找方法，意志坚强战胜它</strong></li>

                            <li>当我们将个体生命和他人的、集体的、民族的、国家的甚至人类的命运联系在一起时，生命便会从平凡中闪耀出伟大</li>

                    { id: 'moral7_4', title: '第四单元 追求美好人生', content: `
                        <h3>第十课 确立人生目标</h3>
                        <h4>10.1 探问人生目标</h4>
                        <ul>
                            <li>人生目标体现着人在社会实践中对未来的向往和追求</li>
                            <li>正确的人生目标会带来稳定而持久的内在激励</li>
                            <li>人生目标可以分为长远目标和近期目标</li>
                            <li>只有分阶段实现一个个近期目标，才能实现长远目标</li>
                            <li>口诀：<strong>人生目标分两段，长远近期都要看；近期目标一步步，长远目标终实现</strong></li>
                        </ul>
                        <h4>10.2 树立正确的人生目标</h4>
                        <ul>
                            <li>正确认识个人与社会的关系，是我们树立人生目标的必要前提</li>
                            <li>树立人生目标，应当从自身实际出发</li>
                            <li>树立人生目标，应当与国家、民族和人民的利益相结合</li>
                            <li>树立人生目标，应当与人类的福祉相统一</li>
                        </ul>
                        <h3>第十一课 端正人生态度</h3>
                        <h4>11.1 拥有积极的人生态度</h4>
                        <ul>
                            <li>人生态度是人在生活实践中形成的看待生活、对待人生的心理和行为倾向</li>
                            <li>积极的人生态度会令人看到事物好的一面，从而热爱生活，对未来充满信心</li>
                            <li>乐观豁达、积极向上的人生态度，能够让我们变得更加自信和从容</li>
                            <li>认真务实的人生态度，往往会对事情有自己独到的见解</li>
                            <li>勤奋进取是一种全力以赴、坚持不懈、努力前行的勇毅品格</li>
                            <li>口诀：<strong>积极心态四品质，乐观向上要认真；务实进取不放弃，热爱生活有信心</strong></li>
                        </ul>
                        <h4>11.2 正确对待顺境和逆境</h4>
                        <ul>
                            <li>顺境和逆境是人生历程中两种不同的境遇</li>
                            <li>顺境不骄，顺境中的有利因素，使我们更容易接近和实现目标</li>
                            <li>逆境不馁，在青少年时期经历一些挫折和考验，有助于我们走好人生路</li>
                            <li>顺境和逆境在一定条件下可以相互转化</li>
                        </ul>
                        <h3>第十二课 实现人生价值</h3>
                        <h4>12.1 在劳动中创造人生价值</h4>
                        <ul>
                            <li>人生价值是指人的生命及其实践活动对于社会和个人所具有的作用和意义</li>
                            <li>一个人对他人和社会的贡献是衡量其人生价值的尺度</li>
                            <li>劳动创造价值，奉献成就人生</li>
                            <li>人世间的一切美好生活都是通过劳动来创造的</li>
                        </ul>
                        <h4>12.2 在奉献中成就精彩人生</h4>
                        <ul>
                            <li>每个人都有自己的人生追求，也会从事各种不同的工作</li>
                            <li>任何一项工作都是社会存在和发展的需要，没有高低贵贱之分</li>
                            <li>在奉献中成就精彩人生，在踏实奋进中绽放人生光彩</li>
                            <li>只有把自己的小我融入时代、祖国和人民的大我之中，才能更好地实现人生价值</li>
                        </ul>
                    ` },
                    { id: 'moral7_5', title: '第一单元 珍惜青春时光', content: `
    <h3>第1课 青春正当时</h3>
    <h4>青春的邀约</h4>
    <ul>

        <li>青春期的基本特征：<strong>生理层面</strong>身体逐渐发育成熟；<strong>心理层面</strong>心理发生巨大变化；<strong>社会层面</strong>开始为适应成年人角色作准备</li>

    <h4>学会管理情绪</h4>

                    { id: 'moral7_6', title: '第二单元 焕发青春活力', content: `
    <h3>第3课 人贵自尊</h3>
    <h4>人须有自尊</h4>
    <ul>
        <li><strong>自尊</strong>是对自我价值的肯定，包括<strong>自我尊重</strong>和<strong>赢得他人的尊重</strong></li>
        <li>自尊的表现：注重仪容仪表和言谈举止、考虑自己行为的影响、希望赢得他人认可</li>
        <li>自尊的人的品格特征：</li>
        <li>①<strong>能认可自己</strong>：看到优缺点，肯定自我价值，积极表现自己</li>
        <li>②<strong>知廉耻、明是非</strong>：做到<strong>"行己有耻"</strong>，自觉约束自己的行为</li>
        <li>③<strong>不爱慕虚荣</strong>：不为名利所惑，不过分追求表面荣耀</li>
        <li>口诀：<strong>"自尊三特征：认可自己知廉耻，不慕虚荣明是非"</strong></li>
    </ul>
    <h4>做自尊的人</h4>
    <ul>
        <li><strong>维护人格尊严</strong>：恪守为人之德，坚持人格独立，不做有损人格的事</li>
        <li>面对批评：<strong>"有则改之，无则加勉"</strong>；面对侮辱诋毁：必要时运用<strong>法律武器</strong>保护自己</li>
        <li>法律保障：《宪法》第38条公民人格尊严不受侵犯；《民法典》第995条；《刑法》第246条</li>
        <li><strong>不断提升自己</strong>：真正的自尊来自努力、拼搏和进取</li>
        <li><strong>尊重他人</strong>：尊重他人才能赢得他人尊重，尊重他人隐私和人格，不取笑歧视侮辱他人</li>
    </ul>
    <h3>第4课 自信给人力量</h3>
    <h4>人要有自信</h4>
    <ul>
        <li><strong>自信</strong>就是相信自己，是对自身能力的肯定、彰显和精神风貌的体现</li>
        <li>自信是一种<strong>"我能行"</strong>的信念——思想上相信、行动上表现、情感上体验</li>
        <li>自信让人<strong>乐观坚定</strong>，面对困难和失败不轻言放弃</li>
        <li>三种心理对比：<strong>自负</strong>（过高估计自己）vs <strong>自信</strong>（实事求是）vs <strong>自卑</strong>（轻视自己）</li>
        <li>自信来源：个人积累的实力、他人肯定、国家繁荣富强带来的<strong>安全感和自豪感</strong></li>
    </ul>
    <h4>做自信的人</h4>
    <ul>
        <li><strong>找准定位，扬长避短</strong>：客观认识自己，充分发挥优势，认清不足</li>
        <li><strong>专注当下，积极行动</strong>：明确目标，心无旁骛，全力以赴</li>
        <li><strong>勇于探索，增强底气</strong>：直面挑战，大胆应对新问题，在解决问题中提升能力</li>
        <li>青春自信体现在<strong>个人成长</strong>和<strong>为民族振兴奋斗</strong>之中</li>
        <li>收获自信方法：<strong>关注优点、确定恰当目标、积极心理暗示</strong></li>
        <li>名言：<strong>"长风破浪会有时，直挂云帆济沧海"——李白</strong></li>
    </ul>
    <h3>第5课 人生当自强</h3>
    <h4>人要自强</h4>
    <ul>
        <li><strong>自强</strong>是自我勉励、发愤图强，是一种<strong>奋发进取的精神状态</strong>，是不断完善自我、超越自我的人生追求</li>
        <li>自强的意义：使人<strong>自主自立</strong>（克己自胜）、使人<strong>奋发向上</strong>（锲而不舍）</li>
        <li>自强不仅关系个人成长，而且关系<strong>民族的命运和国家的未来</strong></li>
        <li>名言：<strong>"天行健，君子以自强不息"——《周易》</strong></li>
    </ul>
    <h4>做自强不息的中国人</h4>
    <ul>
        <li>传承<strong>自强不息的民族精神</strong>，手握历史的接力棒</li>
        <li><strong>树立远大理想</strong>：把个人命运与祖国发展结合起来</li>
        <li><strong>求得真学问，练就真本领</strong>：勤学好问、夯实基础、关注现实问题</li>
        <li><strong>在苦干实干中磨砺成长</strong>：不怕吃苦、努力耕耘、脚踏实地</li>
        <li>口诀：<strong>"自强四步走：立志报国、求真学问、苦干实干、磨砺成长"</strong></li>
    </ul>
` },
                    { id: 'moral7_7', title: '第三单元 传承中华优秀传统文化', content: `

    <h4>历久弥新的思想理念</h4>
    <ul>
        <li>中华优秀传统文化思想理念<strong>深邃博大</strong>，<strong>潜移默化</strong>影响中国人思维方式和行为方式</li>

                            <li>责任来自对他人的承诺、职业要求、道德规范、法律规定等</li>
                            <li>每一种角色都意味着承担相应的责任</li>
                            <li>只有对自己负责的人，才能使自己的潜能得到充分挖掘和发挥</li>
                            <li>很多人在为我们的成长和幸福生活承担着责任</li>
                        </ul>
                        <h4>责任类型对比表</h4>
                        <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;text-align:center;margin-bottom:12px;">
                            <tr style="background:#f0f0ff;"><th>责任来源</th><th>具体说明</th><th>举例</th></tr>
                            <tr><td>对他人的承诺</td><td>答应别人的事情</td><td>答应帮同学补习</td></tr>
                            <tr><td>职业要求</td><td>从事职业应尽的职责</td><td>教师教书育人</td></tr>
                            <tr><td>道德规范</td><td>社会道德要求</td><td>见义勇为、助人为乐</td></tr>
                            <tr><td>法律规定</td><td>法律规定的义务</td><td>赡养父母、纳税</td></tr>
                        </table>
                        <h4>6.2 做负责任的人</h4>
                        <ul>
                            <li>承担责任要不言代价与回报，做到我承担、我无悔</li>
                            <li>我们既然选择了自立自强的人生，就应该有勇气凭借自己的经验和智慧，对承担责任的代价与回报作出正确的评估</li>
                            <li>无论怎样，我们一旦作出选择，就应该义无反顾地担当起应负的责任</li>
                            <li>有些应该做的事情不是我们自愿选择的，但是我们仍然应该自觉承担相应的责任</li>
                            <li>努力提升自身素质，增强履行责任的能力，勇于承担责任</li>
                        </ul>
                        <h3>第七课 积极奉献社会</h3>
                        <h4>7.1 关爱他人</h4>
                        <ul>
                            <li>关爱他人是一种幸福，传递美好情感，给人带来温暖和希望</li>
                            <li>口诀：<strong>关爱他人三要点，心怀善意尽所能；讲究策略要注意，保护自己帮助他人</strong></li>
                            <li>关爱是社会和谐稳定的润滑剂和正能量</li>
                            <li>关爱他人，收获幸福</li>
                            <li>关爱他人要心怀善意、尽己所能、讲究策略</li>
                        </ul>
                        <h4>7.2 服务社会</h4>
                        <ul>
                            <li>服务社会体现人生价值，能够促进我们全面发展</li>
                            <li>服务和奉献社会：积极参与社会公益活动、热爱劳动爱岗敬业</li>
                            <li>我们要努力学习，增强劳动观念，培养敬业精神</li>
                        </ul>
                    ` },
                    { id: 'moral8_4', title: '第四单元 维护国家利益', content: `
                        <h3>第八课 国家利益至上</h3>
                        <h4>8.1 国家好 大家才会好</h4>
                        <ul>
                            <li>国家利益是一个主权国家在国际社会中生存需求和发展需求的总和</li>
                            <li>国家利益涉及政治、经济、文化、社会、军事等领域</li>
                            <li>国家核心利益包括：国家主权、国家安全、领土完整、国家统一、宪法确立的国家政治制度和社会大局稳定、经济社会可持续发展的基本保障</li>
                            <li>国家利益至上，人民利益高于一切，二者相辅相成、高度统一</li>
                        </ul>
                        <h4>8.2 坚持国家利益至上</h4>
                        <ul>
                            <li>口诀：<strong>国家利益要至上，心怀爱国之情长；危机防范意识强，捍卫尊严勇担当</strong></li>
                            <li>坚持国家利益至上，要心怀爱国之情，牢固树立国家利益至上观念</li>
                            <li>树立和增强危机意识和防范意识</li>
                            <li>增强维护国家利益的责任感和使命感</li>
                            <li>以国家利益为重，把国家利益放在第一位</li>
                            <li>为了国家利益，有时不仅需要放弃个人利益，甚至要献出自己的生命</li>
                            <li>捍卫国家尊严，坚决同一切损害国家利益的行为作斗争</li>
                        </ul>
                        <h3>第九课 树立总体国家安全观</h3>
                        <h4>9.1 认识总体国家安全观</h4>
                        <ul>
                            <li>国家安全是国家生存与发展的重要保障，是人民幸福安康的前提</li>
                            <li>口诀：<strong>国家安全要记牢，人民安全是宗旨；政治安全是根本，经济安全做基础</strong></li>
                            <li>总体国家安全观：以人民安全为宗旨，以政治安全为根本，以经济安全为基础，以军事、文化、社会安全为保障，以促进国际安全为依托</li>
                            <li>今天，我国国家安全的内涵和外延比历史上任何时候都更丰富</li>
                        </ul>
                        <h4>9.2 维护国家安全</h4>
                        <ul>
                            <li>维护国家安全，人人可为，是我们的共同责任</li>
                            <li>维护国家安全，人人有责，我们可以通过各种方式为维护国家安全贡献智慧和力量</li>
                            <li>认真学习有关国家安全和保密工作的法律法规、规章制度</li>
                            <li>严格遵守有关国家安全的法律规定，积极履行维护国家安全的法定义务</li>
                        </ul>
                        <h3>第十课 建设美好祖国</h3>
                        <h4>10.1 关心国家发展</h4>
                        <ul>
                            <li>我国发展取得巨大成就：经济增长、民主法治建设、文化建设、科技创新、社会保障、国防军队改革、综合国力提升</li>
                            <li>我国发展也面临一些问题：人均国内生产总值世界排名不高，发展不平衡、不协调、不可持续问题仍然突出</li>
                            <li>国家正在采取各种积极措施，着力解决发展中的问题</li>
                        </ul>
                        <h4>10.2 天下兴亡 匹夫有责</h4>
                        <ul>
                            <li>劳动是财富的源泉，也是幸福的源泉</li>
                            <li>每个人所处的岗位不同，从事不同的劳动，但都在为国家和社会发展作出贡献</li>
                            <li>无论是脑力劳动者还是体力劳动者，都是国家的建设者，都值得我们尊敬和学习</li>
                            <li>发扬实干精神，用劳动创造新的辉煌</li>
                            <li>把中国梦变成现实，需要一代代人埋头苦干和接力奋斗</li>
                            <li>青少年要努力学习，积极探索，勇做走在时代前列的学习者、劳动者、奉献者</li>
                        </ul>
                    ` }

                    { id: 'hist7_1', title: '第一单元 史前时期：原始社会与中华文明的起源', content: `
                        <h3>第1课 远古时期的人类活动</h3>
                        <h4>我国境内的早期人类</h4>
                        <ul>
                            <li>我国是世界上发现古人类化石和旧石器时代遗址最多的国家之一</li>
                            <li>元谋人：距今约170万年，我国境内目前已确认的最早的古人类，能够制作工具，知道使用火</li>
                            <li>蓝田人：距今约160万年</li>
                            <li>郧县人：距今约100万年</li>
                        </ul>
                        <h4>原始人类对比表</h4>
                        <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;text-align:center;margin-bottom:12px;">
                            <tr style="background:#f0f0ff;"><th>原始人类</th><th>距今时间</th><th>发现地点</th><th>主要特征</th></tr>
                            <tr><td><strong>元谋人</strong></td><td>约170万年</td><td>云南元谋</td><td>我国境内最早，会制作工具、用火</td></tr>
                            <tr><td>蓝田人</td><td>约160万年</td><td>陕西蓝田</td><td>早期直立人</td></tr>
                            <tr><td>郧县人</td><td>约100万年</td><td>湖北郧阳</td><td>头骨化石保存完整</td></tr>
                            <tr><td><strong>北京人</strong></td><td>约70-20万年</td><td>北京周口店</td><td>使用天然火，打制石器</td></tr>
                            <tr><td>山顶洞人</td><td>约3万年</td><td>北京周口店</td><td>磨光钻孔技术，人工取火</td></tr>
                        </table>
                        <h4>北京人</h4>
                        <ul>
                            <li>北京人遗址位于北京西南周口店龙骨山上</li>
                            <li>距今约70万-20万年，使用打制石器（旧石器时代）</li>
                            <li>使用天然火，用火烧烤食物、防寒、照明、驱兽</li>
                            <li>北京人遗址是迄今所知世界上内涵最丰富、材料最齐全的直立人遗址之一</li>

                        <h3>第2课 原始农业与史前社会</h3>
                        <h4>农业的起源与定居生活</h4>

                            <li>我国原始农业兴起于距今约1万年左右，进入新石器时代</li>
                            <li>主要栽培作物：水稻、粟、黍</li>
                            <li>原始农业兴起和发展的重要标志：农作物种植、家畜饲养的出现以及聚落、磨制石器的发展</li>
                            <li>原始农业为古代文明社会的形成奠定了重要的物质基础</li>
                        </ul>
                        <h4>河姆渡人与稻作农业</h4>
                        <ul>

                            <li>长江流域，气候温暖湿润，种植水稻</li>
                            <li>住干栏式房屋，通风防潮</li>

                        <h4>河姆渡与半坡对比表</h4>

                            <tr><td>距今时间</td><td>约7000年</td><td>约6000年</td></tr>
                            <tr><td>地理位置</td><td>长江流域（浙江）</td><td>黄河流域（陕西）</td></tr>
                            <tr><td>主要作物</td><td><strong>水稻</strong></td><td><strong>粟、黍</strong></td></tr>
                            <tr><td>房屋样式</td><td><strong>干栏式房屋</strong>（通风防潮）</td><td><strong>半地穴式房屋</strong>（防风保暖）</td></tr>
                            <tr><td>陶器特点</td><td>黑陶</td><td><strong>彩陶</strong>（人面鱼纹盆）</td></tr>
                            <tr><td>气候环境</td><td>温暖湿润</td><td>干旱寒冷</td></tr>
                        </table>
                        <p>口诀：<strong>河姆渡人种水稻，干栏房屋来防潮；半坡居民种粟黍，半地穴房彩陶好</strong></p>
                        <h4>仰韶文化和大汶口文化</h4>
                        <ul>
                            <li>仰韶文化：距今约7000-5000年，主要分布在黄河中游地区，彩陶是重要特征</li>
                            <li>大汶口文化：距今约5900-4400年，主要分布在黄河下游和淮河中下游地区</li>
                            <li>大汶口文化晚期，制陶技术有较大发展，出现蛋壳黑陶</li>
                        </ul>
                        <h3>第3课 中华文明的起源</h3>
                        <h4>早期国家和文明的起源</h4>
                        <ul>
                            <li>私有制、阶级和国家的产生是人类进入文明社会的重要标志</li>
                            <li>大约5000多年前，我国原始农业和畜牧业有了较大发展，人口显著增长</li>
                            <li>社会分化加剧，早期城市逐步形成</li>
                        </ul>
                        <h4>良渚古城与陶寺都城</h4>

                            <li>良渚古城遗址位于浙江余杭，距今约5300-4300年</li>

                            <li>陶寺古城遗址位于山西襄汾，距今约4300-4000年</li>
                            <li>陶寺古城有宫殿建筑、天文观象台、墓葬区，阶级分化严重</li>

                        <h4>远古的传说</h4>
                        <ul>

                        </ul>
                    ` },
                    { id: 'hist7_2', title: '第二单元 夏商周时期：奴隶制王朝的更替和向封建社会的过渡', content: `
                        <h3>第4课 夏商西周王朝的更替</h3>
                        <h4>夏朝的建立与"家天下"</h4>
                        <ul>
                            <li>约公元前2070年，禹建立夏朝，这是我国历史上第一个奴隶制王朝</li>
                            <li>夏朝建立标志中国早期国家的产生</li>
                            <li>启继承王位，世袭制代替禅让制，"公天下"变为"家天下"</li>
                            <li>二里头遗址：大型宫殿建筑群、大型墓葬和手工业作坊，反映了夏朝时期的文明发展水平</li>
                            <li>夏桀是历史上有名的暴君，约公元前1600年商汤灭夏</li>
                        </ul>
                        <h4>商朝的统治</h4>
                        <ul>
                            <li>商朝：约公元前1600年建立，商汤灭夏</li>
                            <li>盘庚迁殷（今河南安阳），此后保持了相对的稳定</li>
                            <li>甲骨文是商朝的文字，刻写在龟甲和牛、羊等兽骨上</li>
                            <li>甲骨文是中国已发现的古代文字中年代最早、体系较为完整的文字</li>
                            <li>我国有文字可考的历史从商朝开始</li>
                            <li>商朝有日趋成熟的青铜铸造业，司母戊鼎（后母戊鼎）是迄今世界上出土的最重的青铜器</li>
                            <li>商纣王是暴君，公元前1046年武王伐纣，商朝灭亡</li>
                        </ul>
                        <h4>西周的兴衰</h4>
                        <ul>
                            <li>西周：公元前1046年建立，周武王伐纣，牧野之战</li>
                            <li>定都镐京（今陕西西安），实行分封制，巩固统治</li>
                            <li>分封对象：宗亲、功臣等</li>
                            <li>分封制的作用：保证了周王朝对地方的控制，稳定了政局，扩大了统治范围</li>
                            <li>公元前841年，"国人暴动"，周厉王逃亡</li>
                            <li>公元前771年，犬戎攻破镐京，西周灭亡</li>
                        </ul>
                        <p>口诀：<strong>夏商西周朝代更，夏禹商汤周武王；夏桀商纣是暴君，商汤灭夏武王伐纣兴</strong></p>
                        <h3>第5课 动荡变化中的春秋时期</h3>
                        <h4>王室衰微</h4>
                        <ul>
                            <li>公元前770年，周平王东迁洛邑，史称东周，分为春秋和战国两个时期</li>
                            <li>春秋时期：公元前770年-公元前476年</li>
                            <li>周王室衰微，诸侯势力崛起，竞相称霸</li>
                            <li>分封制逐步瓦解，诸侯国不再听从王命</li>
                        </ul>
                        <h4>诸侯争霸</h4>
                        <ul>
                            <li>春秋五霸：齐桓公、晋文公、楚庄王、吴王阖闾、越王勾践</li>
                            <li>口诀：<strong>春秋五霸要记清，齐桓晋文楚庄王；吴王阖闾和勾践，尊王攘夷首霸强</strong></li>
                            <li>齐桓公首霸，任用管仲为相，改革内政，发展生产，训练军队</li>
                            <li>齐桓公提出"尊王攘夷"口号，成为春秋时期第一个霸主</li>
                            <li>晋文公通过城濮之战大败楚军，成为中原霸主</li>
                            <li>楚庄王"问鼎中原"，成为霸主</li>
                            <li>越王勾践"卧薪尝胆"，灭吴称霸</li>
                            <li>春秋争霸的影响：有的诸侯国被灭掉，一些强大的诸侯国的疆域不断扩展；出现了大规模的民族交融</li>
                        </ul>
                        <h3>第6课 战国时期的社会变革</h3>
                        <h4>战国七雄</h4>
                        <ul>
                            <li>战国时期：公元前475年-公元前221年</li>
                            <li>口诀：<strong>战国七雄齐楚燕，韩赵魏秦在中间；东南西北到中间，齐楚秦燕赵魏韩</strong></li>
                            <li>战国七雄：齐、楚、燕、韩、赵、魏、秦</li>
                            <li>著名战役：桂陵之战（围魏救赵）、马陵之战、长平之战</li>
                            <li>长平之战：秦国大败赵国，从此东方六国再也无力抵御秦军的进攻</li>
                        </ul>
                        <h4>商鞅变法</h4>
                        <ul>
                            <li>公元前356年，秦孝公支持商鞅变法</li>
                            <li>政治方面：确立县制，由国君直接派官吏治理；废除贵族的世袭特权；改革户籍制度，加强对人民的管理；严明法度，禁止私斗</li>
                            <li>经济方面：废除井田制，允许土地自由买卖；鼓励耕织，生产粮食、布帛多的人可免除徭役；统一度量衡</li>
                            <li>军事方面：奖励军功，对有军功者授予爵位并赏赐土地</li>
                            <li>影响：使秦国的国力大为增强，提高了军队的战斗力，一跃成为最强盛的诸侯国，为以后秦国统一全国奠定了基础</li>
                        </ul>
                        <h4>战国时期的经济发展</h4>
                        <ul>
                            <li>战国时期，铁制工具和牛耕的使用进一步推广</li>
                            <li>都江堰：秦国蜀郡郡守李冰主持修建，使成都平原成为"天府之国"</li>
                            <li>都江堰由渠首和灌溉网两大系统工程构成，渠首分为鱼嘴、宝瓶口和飞沙堰三个主体工程</li>
                        </ul>
                        <h3>第7课 百家争鸣</h3>
                        <h4>老子与道家</h4>
                        <ul>
                            <li>老子：春秋后期楚国人，道家学派创始人，学说集中在《道德经》一书</li>
                            <li>主张"无为而治"，人们与世无争，天下就能太平</li>
                            <li>认为世间的事物都有其对立面，对立的双方是可以相互转化的</li>
                        </ul>
                        <h4>孔子与儒家</h4>
                        <ul>
                            <li>孔子：春秋后期鲁国人，儒家学派创始人，核心思想是"仁"</li>
                            <li>提出"仁者爱人"，主张"为政以德"</li>
                            <li>反对苛政，主张以德治国</li>
                            <li>教育方面：创办私学，主张"有教无类"；注重道德教育和文化知识教育；提出一系列教学原则和方法</li>
                            <li>孔子晚年精心整理古代重要的文献资料，对传承中国古代文化经典和学术思想作出巨大贡献</li>
                            <li>孔子的思想后来由其弟子整理成《论语》一书</li>
                        </ul>
                        <h4>百家争鸣</h4>
                        <ul>
                            <li>战国时期，旧的社会制度进一步瓦解，新的社会制度逐步确立</li>
                            <li><strong>儒家：</strong>孟子主张实行"仁政"，提出"民为贵，社稷次之，君为轻"的思想；荀子主张实行"礼治"</li>
                            <li><strong>道家：</strong>庄子强调治国要顺应自然和民心；人生应追求精神自由</li>
                            <li><strong>墨家：</strong>墨子主张"兼爱""非攻"，选贤能的人治理国家，提倡节俭</li>
                            <li><strong>法家：</strong>韩非主张改革，提倡法治，建立君主专制中央集权的封建国家</li>
                            <li><strong>兵家：</strong>孙武著有《孙子兵法》，"知己知彼，百战不殆"</li>
                            <li>百家争鸣促进了思想和学术的繁荣，成为中国古代第一次思想文化发展的高峰</li>
                        </ul>
                        <h4>百家争鸣对比表</h4>
                        <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;text-align:center;margin-bottom:12px;">
                            <tr style="background:#f0f0ff;"><th>学派</th><th>代表人物</th><th>主要主张</th><th>著作</th></tr>
                            <tr><td><strong>儒家</strong></td><td>孔子、孟子、荀子</td><td>仁、仁政、礼治</td><td>《论语》《孟子》</td></tr>
                            <tr><td><strong>道家</strong></td><td>老子、庄子</td><td>无为而治、顺应自然</td><td>《道德经》《庄子》</td></tr>
                            <tr><td><strong>墨家</strong></td><td>墨子</td><td>兼爱、非攻、节俭</td><td>《墨子》</td></tr>
                            <tr><td><strong>法家</strong></td><td>韩非</td><td>法治、中央集权</td><td>《韩非子》</td></tr>
                            <tr><td><strong>兵家</strong></td><td>孙武</td><td>知己知彼，百战不殆</td><td>《孙子兵法》</td></tr>
                        </table>

                    { id: 'hist7_3', title: '第三单元 秦汉时期：统一多民族封建国家的建立和巩固', content: `
                        <h3>第9课 秦统一中国</h3>
                        <h4>秦灭六国</h4>
                        <ul>
                            <li>公元前221年，秦始皇嬴政统一六国，建立秦朝，定都咸阳</li>
                            <li>秦朝是我国历史上第一个统一的多民族的封建国家</li>
                            <li>秦的统一，结束了春秋战国以来长期争战混乱的局面，建立起我国历史上第一个统一的多民族的封建国家</li>
                        </ul>
                        <h4>确立中央集权制度</h4>
                        <ul>
                            <li>政治上：建立中央集权制度</li>
                            <li>皇帝制度：国家的最高统治者称为皇帝，总揽全国的一切军政大权</li>
                            <li>中央政权机构：设丞相、太尉、御史大夫，分别掌管行政、军事和监察事务</li>
                            <li>地方制度：废除分封制，建立由中央直接管辖的郡县制，郡县的长官都由朝廷直接任免</li>
                            <li>郡县制的实行，开创了此后我国历代王朝地方行政的基本模式</li>
                        </ul>
                        <h4>巩固统一的措施</h4>
                        <ul>
                            <li>口诀：<strong>秦始皇统一六国后，文字货币度量衡；车同轨来书同文，修长城来击匈奴</strong></li>
                            <li>文化上：统一文字，制定笔画规整的小篆作为通用文字颁行全国</li>
                            <li>经济上：统一货币（圆形方孔半两钱）、统一度量衡制度</li>
                            <li>交通上：统一车辆和道路的宽窄，修筑贯通全国的道路；开凿灵渠，沟通湘江和漓江</li>
                            <li>军事上：北击匈奴，修筑长城（西起临洮，东到辽东）</li>
                            <li>秦朝的疆域：东至东海，西到陇西，北至长城一带，南达南海</li>
                        </ul>
                        <h3>第10课 秦末农民大起义</h3>
                        <h4>秦的暴政</h4>
                        <ul>
                            <li>秦始皇的统治具有急于求成和暴虐的特点</li>
                            <li>赋税沉重，徭役和兵役繁重</li>
                            <li>法律严苛，刑罚残酷</li>
                            <li>秦二世更加残暴</li>
                        </ul>
                        <h4>陈胜、吴广起义</h4>
                        <ul>
                            <li>公元前209年，陈胜、吴广在大泽乡起义，提出"王侯将相宁有种乎"的口号</li>
                            <li>陈胜、吴广起义是中国历史上第一次大规模农民起义</li>
                            <li>起义虽然失败，但反秦的浪潮并没有因此平息</li>
                        </ul>
                        <h4>秦朝的灭亡</h4>
                        <ul>
                            <li>项羽在巨鹿之战中以少胜多，歼灭秦军主力（破釜沉舟）</li>
                            <li>刘邦率军直抵咸阳，秦朝统治者投降，公元前207年秦朝灭亡</li>
                        </ul>
                        <h3>第11课 西汉建立和"文景之治"</h3>
                        <h4>西汉的建立</h4>
                        <ul>
                            <li>公元前202年，刘邦建立汉朝，定都长安，史称西汉，刘邦就是汉高祖</li>
                            <li>汉初社会生产遭到严重破坏，经济萧条</li>
                        </ul>
                        <h4>休养生息政策</h4>
                        <ul>
                            <li>汉初实行休养生息政策</li>
                            <li>措施：兵皆罢归家；释放奴婢；轻徭薄赋，减轻农民的赋税，减免徭役和兵役</li>
                        </ul>
                        <h4>"文景之治"</h4>
                        <ul>
                            <li>文景之治：汉文帝、汉景帝时期，社会安定，经济发展</li>
                            <li>措施：注重农业生产，提倡以农为本；进一步减轻赋税和徭役；重视"以德化民"，废除一些严刑峻法；提倡勤俭治国</li>
                            <li>文景时期，政治清明，经济发展，人民生活安定，国力增强，国库充盈</li>
                        </ul>
                        <h3>第12课 汉武帝巩固大一统王朝</h3>
                        <h4>"推恩令"的实施</h4>
                        <ul>
                            <li>汉武帝采纳主父偃的"推恩"建议，下诏规定诸侯王除以嫡长子继承王位外，可将封地再次分封给其子弟作为侯国</li>
                            <li>这样，侯国越来越多，诸侯王的封地和势力越来越小</li>
                            <li>汉武帝还建立刺史制度，监视州部内的地方官吏、豪强及其子弟</li>
                        </ul>
                        <h4>"罢黜百家，独尊儒术"</h4>
                        <ul>
                            <li>汉武帝接受董仲舒"罢黜百家，独尊儒术"的建议，把儒家学说立为正统思想</li>
                            <li>在长安兴办太学，以儒家经典作为教材，培养统治阶级需要的儒学人才</li>
                            <li>从此，儒学居于主导地位，为历代王朝所推崇，影响深远</li>
                        </ul>
                        <h4>盐铁专卖</h4>
                        <ul>
                            <li>经济上：把铸币权收归中央，统一铸造五铢钱</li>
                            <li>实行盐铁官营、专卖</li>
                            <li>在全国范围内统一调配物资，平抑物价</li>
                            <li>使国家的财政状况有了很大改善，为汉武帝许多政策的推行奠定了经济基础</li>
                        </ul>
                        <h4>北击匈奴</h4>
                        <ul>
                            <li>汉武帝派卫青、霍去病北击匈奴</li>
                            <li>公元前119年的漠北战役，卫青、霍去病分兵大败匈奴</li>
                            <li>汉武帝从政治、思想、经济和军事等方面巩固了大一统的局面，使西汉王朝开始进入鼎盛时期</li>
                        </ul>
                        <h4>秦始皇与汉武帝对比表</h4>
                        <table border="1" cellpadding="6" style="border-collapse:collapse;width:100%;text-align:center;margin-bottom:12px;">
                            <tr style="background:#f0f0ff;"><th>比较项目</th><th>秦始皇</th><th>汉武帝</th></tr>
                            <tr><td>政治</td><td>建立中央集权，郡县制</td><td><strong>推恩令，刺史制度</strong></td></tr>
                            <tr><td>思想</td><td>焚书坑儒</td><td><strong>罢黜百家，独尊儒术</strong></td></tr>
                            <tr><td>经济</td><td>统一货币、度量衡</td><td><strong>盐铁专卖，统一铸币</strong></td></tr>
                            <tr><td>军事</td><td>北击匈奴，修长城</td><td><strong>派卫青、霍去病北击匈奴</strong></td></tr>
                            <tr><td>文化</td><td>统一文字（小篆）</td><td>兴办太学，推崇儒学</td></tr>
                            <tr><td>影响</td><td>建立第一个统一多民族封建国家</td><td>巩固大一统，西汉进入鼎盛</td></tr>
                        </table>
                        <h3>第14课 丝绸之路的开通与经营西域</h3>
                        <h4>张骞通西域</h4>
                        <ul>
                            <li>西域：汉代人把今天甘肃阳关、玉门关以西，也就是现在新疆和更远的广大地区称作西域</li>
                            <li>张骞两次出使西域：公元前138年和公元前119年</li>
                            <li>张骞通西域促进了汉朝与西域各国之间的相互了解与往来</li>
                        </ul>
                        <h4>丝绸之路</h4>
                        <ul>
                            <li>丝绸之路路线：长安→河西走廊→西域→中亚、西亚→欧洲（大秦）</li>
                            <li>通过丝绸之路，汉朝的丝绸、漆器等物品，以及开渠、凿井、铸铁等技术传到西域</li>
                            <li>西域的核桃、葡萄、石榴、苜蓿、良种马、香料、玻璃、宝石等传入中原</li>
                            <li>丝绸之路是古代东西方往来的大动脉，对于中国同其他国家和地区的贸易与文化交流，起到了极大的促进作用</li>
                        </ul>
                        <h4>对西域的管理</h4>
                        <ul>
                            <li>公元前60年，西汉朝廷设置西域都护，作为管理西域的最高长官</li>
                            <li>西域都护的设置，标志着西域正式归属中央政权</li>
                            <li>东汉明帝时，派班超出使西域，班超经营西域30多年</li>
                        </ul>
                    ` },
                    { id: 'hist7_4', title: '第四单元 三国两晋南北朝时期：政权分立与民族交融', content: `
                        <h3>第16课 三国鼎立</h3>
                        <h4>官渡之战</h4>
                        <ul>
                            <li>东汉末年，军阀割据混战</li>
                            <li>官渡之战：200年，曹操大败袁绍，为统一北方奠定基础</li>
                            <li>曹操取胜原因：政治上"挟天子以令诸侯"，重用人才；经济上实行屯田</li>
                        </ul>
                        <h4>赤壁之战</h4>
                        <ul>
                            <li>208年，孙刘联军大败曹操</li>
                            <li>赤壁之战为三国鼎立局面的形成奠定了基础</li>
                        </ul>
                        <h4>三国鼎立</h4>
                        <ul>
                            <li>口诀：<strong>三国建立记心间，魏蜀吴三国鼎立；曹丕洛阳建魏国，刘备成都蜀汉立；孙权建业吴国建，三国时期由此起</strong></li>
                            <li>220年，曹丕建魏，定都洛阳</li>
                            <li>221年，刘备建蜀（汉），定都成都</li>
                            <li>229年，孙权建吴，定都建业（今南京）</li>
                            <li>三国时期：魏、蜀、吴三国鼎立</li>
                            <li>三国都重视发展生产：魏国兴修水利，蜀国发展蜀锦，吴国发展造船业，派卫温到达夷洲（今台湾）</li>
                        </ul>
                        <h3>第18课 东晋南朝政治和江南地区开发</h3>
                        <h4>东晋的兴亡</h4>
                        <ul>
                            <li>316年，内迁的匈奴人灭掉西晋</li>
                            <li>317年，司马睿建立东晋，定都建康（今南京）</li>
                            <li>司马睿当皇帝，得益于王导为首的南北大贵族的拥戴，时称"王与马，共天下"</li>
                        </ul>
                        <h4>南朝的政治</h4>
                        <ul>
                            <li>420年，东晋灭亡</li>
                            <li>南朝：宋、齐、梁、陈四个王朝，都城都在建康</li>
                            <li>口诀：<strong>南朝更替宋齐梁陈，四个王朝都建康；宋疆域最大，陈最小记心上</strong></li>
                            <li>宋是南朝疆域最大的朝代</li>
                        </ul>
                        <h4>江南地区的开发</h4>
                        <ul>
                            <li>江南地区开发原因：北方人口南迁带来劳动力和先进技术；南方自然条件优越；社会相对安定；南北方人民的共同努力</li>
                            <li>江南地区开发表现：大量荒地被开垦，耕地面积增加；兴修很多水利工程；农业技术有很大改进；发展种桑养蚕、培植果树、种植药材等</li>
                            <li>江南地区的开发，为经济重心的逐渐南移奠定了基础</li>
                        </ul>
                        <h3>第19课 北朝政治和北方民族大交融</h3>
                        <h4>淝水之战</h4>
                        <ul>
                            <li>4世纪后期，氐族苻氏建立的前秦逐渐强盛，统一了黄河流域</li>
                            <li>383年，前秦苻坚率军攻打东晋，在淝水之战中大败</li>
                            <li>淝水之战后，前秦很快土崩瓦解，北方再度陷入分裂和混战的状态</li>
                        </ul>
                        <h4>北魏孝文帝改革</h4>
                        <ul>
                            <li>439年，鲜卑族拓跋部建立的北魏统一北方，结束了十六国以来分裂割据的局面</li>
                            <li>孝文帝迁都洛阳</li>
                            <li>改革措施：规定官员在朝廷中必须使用汉语，禁用鲜卑语；以汉服代替鲜卑服；改鲜卑姓为汉姓；鼓励鲜卑贵族与汉人贵族联姻</li>
                            <li>作用：促进了民族交融，也增强了北魏的实力</li>
                        </ul>
                        <h4>北方地区的民族交融</h4>
                        <ul>
                            <li>民族交融的表现：内迁各族人民向汉族人民学习农业技艺；汉族人民向北方各族人民学习畜牧经验；汉族吸收了少数民族的食物、服装、用具等</li>
                            <li>民族交融为中华民族的发展注入了新的活力，进一步丰富了中华民族的物质文化和精神文化</li>
                        </ul>
                        <h3>第20课 魏晋南北朝的科技与文化</h3>
                        <h4>贾思勰和《齐民要术》</h4>
                        <ul>
                            <li>贾思勰：北朝著名农学家</li>
                            <li>《齐民要术》：我国现存最早的一部完整的农书</li>
                            <li>总结了农、林、牧、副、渔等方面的生产技术</li>
                        </ul>
                        <h4>科学家祖冲之</h4>
                        <ul>
                            <li>祖冲之：南朝著名科学家，在数学、天文历法和机械制造方面都有重大成就</li>
                            <li>把圆周率精确到小数点后第七位，即3.1415926和3.1415927之间，领先世界近千年</li>
                            <li>创制出当时最先进的历法《大明历》</li>
                        </ul>
                        <h4>书法、绘画与雕塑</h4>
                        <ul>
                            <li>书法：锺繇和胡昭是曹魏时的书法名家；王羲之：东晋书法家，"书圣"，代表作《兰亭集序》，被称为"天下第一行书"</li>
                            <li>绘画：顾恺之：东晋画家，代表作《女史箴图》《洛神赋图》</li>
                            <li>雕塑：山西大同的云冈石窟和河南洛阳的龙门石窟</li>
                        </ul>
                    ` },
                    { id: 'hist7_5', title: '第一单元 隋唐时期：繁荣与开放的时代', content: `
                        <h3>第1课 隋朝统一与灭亡</h3>
                        <h4>隋朝的建立与统一</h4>
                        <ul>
                            <li>581年，杨坚（隋文帝）建立隋朝，定都长安</li>
                            <li>589年，隋灭陈，统一全国，结束了长期分裂的局面</li>
                        </ul>
                        <h4>隋朝大运河</h4>
                        <ul>
                            <li>605年起，隋炀帝开凿大运河</li>
                            <li>以洛阳为中心，北抵涿郡（今北京），南至余杭（今杭州）</li>
                            <li>连接海河、黄河、淮河、长江、钱塘江五大水系</li>
                            <li>全长2700多千米，是古代世界上最长的运河</li>
                        </ul>
                        <h4>科举制的创立</h4>
                        <ul>
                            <li>隋文帝初步建立起通过考试选拔人才的制度</li>
                            <li>隋炀帝时设进士科，标志着科举制的正式确立</li>
                            <li>科举制加强了朝廷选官的权力，扩大了统治基础</li>
                        </ul>
                        <h4>隋朝的灭亡</h4>
                        <ul>
                            <li>隋炀帝暴政：大兴土木、征发繁重、三次征讨高丽</li>
                            <li>引发大规模农民起义，隋朝迅速灭亡</li>
                        </ul>
                        <h3>第2课 唐朝建立与贞观之治</h3>
                        <h4>唐朝的建立</h4>
                        <ul>
                            <li>618年，李渊（唐高祖）建立唐朝，定都长安</li>
                        </ul>
                        <h4>贞观之治</h4>
                        <ul>
                            <li>唐太宗李世民开创"贞观之治"</li>
                            <li>政治上：虚心纳谏（魏征），广纳人才（房玄龄、杜如晦），完善三省六部制</li>
                            <li>思想上："水能载舟，亦能覆舟"</li>
                        </ul>
                        <h4>武则天</h4>
                        <ul>
                            <li>中国历史上唯一的女皇帝</li>
                            <li>创立殿试、武举，重视人才选拔</li>
                            <li>社会经济持续发展，为开元盛世奠定基础</li>
                        </ul>
                        <h3>第3课 开元盛世</h3>
                        <h4>开元盛世</h4>
                        <ul>
                            <li>唐玄宗前期励精图治，政治稳定、经济繁荣、国库充盈、民众生活安定</li>
                            <li>贤相姚崇、宋璟</li>
                            <li>唐玄宗统治前期被誉为"开元盛世"，唐朝进入鼎盛时期</li>
                        </ul>
                        <h4>经济发展</h4>
                        <ul>
                            <li>农业：茶圣陆羽《茶经》、曲辕犁、筒车</li>
                            <li>手工业：越窑青瓷、邢窑白瓷、唐三彩</li>
                            <li>商业：长安城人口百万，坊市制，既是政治中心又是经济文化中心</li>
                        </ul>
                        <h3>第4课 安史之乱与唐朝衰亡</h3>
                        <h4>安史之乱</h4>
                        <ul>
                            <li>755年，安禄山、史思明发动叛乱</li>
                            <li>763年平定，历时8年</li>
                            <li>唐朝由盛转衰的转折点</li>
                        </ul>
                        <h4>藩镇割据与黄巢起义</h4>
                        <ul>
                            <li>安史之乱后，形成藩镇割据局面</li>
                            <li>唐末黄巢起义，给唐朝统治以致命打击</li>
                            <li>907年，朱温建立后梁，唐朝灭亡</li>
                            <li>此后进入五代十国时期</li>
                        </ul>
                        <h3>第5课 民族交往与交融</h3>
                        <ul>
                            <li>文成公主入藏（641年）：带去蔬菜种子、茶叶、丝绸等，促进汉藏交流</li>
                            <li>松赞干布统一青藏高原，建立吐蕃政权</li>
                            <li>唐太宗击败东突厥，被尊为"天可汗"</li>
                            <li>设安西都护府和北庭都护府管辖西域</li>
                        </ul>
                        <h3>第6课 中外文化交流</h3>
                        <ul>
                            <li>遣唐使：日本多次派遣唐使来中国学习制度文化</li>
                            <li>鉴真东渡：历经6次东渡（前5次失败），到达日本，修建唐招提寺</li>
                            <li>玄奘西行：前往天竺取经，著《大唐西域记》</li>
                            <li>与新罗（朝鲜）和大食（阿拉伯）友好交往</li>
                        </ul>
                        <h3>第7课 科技与文化</h3>
                        <h4>科技成就</h4>
                        <ul>
                            <li>雕版印刷术：唐朝出现，现存最早雕版印刷品《金刚经》</li>
                            <li>赵州桥：隋朝李春设计建造，世界上现存最古老的石拱桥</li>
                        </ul>
                        <h4>文学艺术</h4>
                        <ul>
                            <li>李白：诗仙，代表作《早发白帝城》《蜀道难》</li>
                            <li>杜甫：诗圣、诗史，代表作"三吏""三别"</li>
                            <li>白居易：代表作《长恨歌》《琵琶行》</li>
                            <li>书法：颜真卿（颜体）、柳公权（柳体）</li>
                            <li>敦煌莫高窟：世界艺术宝库</li>
                        </ul>
                    ` },
                    { id: 'hist7_6', title: '第二单元 辽宋夏金元时期：民族关系发展和社会变化', content: `
                        <h3>第8课 北宋的政治</h3>
                        <h4>北宋的建立</h4>
                        <ul>
                            <li>960年，赵匡胤（宋太祖）发动陈桥兵变，建立北宋，定都开封（东京）</li>
                            <li>"杯酒释兵权"：解除禁军高级将领兵权</li>
                        </ul>
                        <h4>重文轻武</h4>
                        <ul>
                            <li>北宋实行重文轻武政策</li>
                            <li>抑制武将，提升文官地位</li>
                            <li>科举制度进一步完善</li>
                        </ul>
                        <h4>王安石变法</h4>
                        <ul>
                            <li>目的：摆脱统治危机</li>
                            <li>措施：青苗法（政府贷款给农民）、募役法（以钱代役）等</li>

                            <li>1038年，元昊建立西夏（党项）</li>
                            <li>1005年，澶渊之盟：宋辽约为兄弟之国，宋每年给辽"岁币"</li>

                        </ul>
                        <h3>第10课 金与南宋对峙</h3>
                        <ul>
                            <li>1115年，完颜阿骨打建立金（女真）</li>
                            <li>1125年金灭辽，1127年金灭北宋（靖康之变）</li>
                            <li>南宋建立，赵构（宋高宗）定都临安（今杭州）</li>

                        <h3>第11课 元朝建立与统一</h3>

                            <li>1206年，铁木真（成吉思汗）统一蒙古草原</li>

                            <li>马可波罗来华，著《马可波罗行纪》</li>
                        </ul>
                        <h3>第14课 科技与文化</h3>
                        <h4>科技成就</h4>
                        <ul>
                            <li>毕昇发明活字印刷术</li>

                        <h4>文学艺术</h4>
                        <ul>
                            <li>宋词：苏轼（豪放派）、李清照（婉约派）、辛弃疾（豪放派）</li>
                            <li>元曲：关汉卿《窦娥冤》</li>
                            <li>史学：司马光《资治通鉴》（编年体通史）</li>
                            <li>绘画：张择端《清明上河图》</li>
                        </ul>
                    ` },
                    { id: 'hist7_7', title: '第三单元 明清时期：统一多民族封建国家的巩固与发展', content: `
                        <h3>第15课 明朝统治</h3>
                        <h4>明朝的建立</h4>
                        <ul>
                            <li>1368年，朱元璋（明太祖）建立明朝，定都南京</li>
                            <li>政治上：废除丞相制度，权分六部</li>
                            <li>特务机构：锦衣卫（朱元璋设）、东厂（明成祖设），由皇帝直接指挥</li>

                        <h3>第16课 对外关系</h3>
