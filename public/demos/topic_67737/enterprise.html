            <p class="text-xs text-gray-500 mt-0.5">AI 智能分析劳动合同文本，识别 9 类风险点（试用期/工资/社保/竞业/违约金等），保护劳动者权益与企业合规</p>
          </div>
        </div>
      </div>

      <!-- 输入区 -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
        <div class="flex items-center justify-between mb-3">
          <label class="text-xs text-gray-500">粘贴劳动合同文本（至少 20 字）</label>
          <button id="btn-sample" class="text-xs text-amber-600 hover:underline">载入示例合同</button>
        </div>
        <textarea id="contract-input" rows="8" placeholder="请将劳动合同全文粘贴到此处，AI 将自动检测其中的风险点..." class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm font-mono leading-relaxed focus:outline-none focus:border-amber-400"></textarea>
        <div class="flex items-center justify-between mt-3 flex-wrap gap-2">
          <div class="text-[10px] text-gray-400">提示：建议粘贴完整合同文本，AI 将从 9 个维度进行风险扫描</div>
          <button id="btn-check" class="px-5 py-2 bg-amber-500 text-white rounded-lg text-sm font-medium hover:bg-amber-600 active:scale-95 transition flex items-center gap-2">
            <span>🤖</span><span>开始 AI 检测</span>
          </button>
        </div>
      </div>

      <!-- 检测结果 -->
      <div id="check-result" class="bg-white rounded-xl border border-gray-100 shadow-sm p-8 text-center min-h-[200px] flex flex-col items-center justify-center">
        <div class="text-5xl mb-3 opacity-40">🛡️</div>
        <div class="text-sm text-gray-400">粘贴合同文本并点击"开始 AI 检测"</div>
        <div class="text-xs text-gray-400 mt-1">AI 将逐项分析 9 类风险维度</div>
      </div>

      <!-- 9 维度说明 -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
        <h4 class="font-semibold text-gray-800 text-sm mb-4 flex items-center gap-2"><span>📐</span>9 类风险检测维度</h4>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
          ${RISK_DIMENSIONS.map((d) => `
            <div class="flex items-start gap-2 p-3 rounded-lg bg-gray-50 hover:bg-amber-50 transition-colors">
              <span class="text-lg">${d.icon}</span>
              <div class="flex-1 min-w-0">
                <div class="text-xs font-medium text-gray-700">${d.key}</div>
                <div class="text-[10px] text-gray-400 leading-snug mt-0.5">${d.desc}</div>
              </div>
            </div>`).join("")}
        </div>
      </div>
    </div>
  `;
  let checking = false;
  document.getElementById("btn-sample").onclick = () => {
    document.getElementById("contract-input").value = SAMPLE_CONTRACT;
    toast("已载入示例合同（含多处风险点）", "info");
  };
  document.getElementById("btn-check").onclick = async () => {
    if (checking) return;
    const text = document.getElementById("contract-input").value.trim();
    if (text.length < 20) {
      toast("请粘贴完整的合同文本（至少 20 字）", "warning");
      return;
    }
    checking = true;
    const btn = document.getElementById("btn-check");
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="animate-pulse">🤖 检测中...</span>';
    const output = document.getElementById("check-result");
    output.innerHTML = `
      <div class="w-full">
        <div class="flex items-center gap-2 mb-3 text-xs text-amber-600"><span class="animate-pulse">🤖 AI 正在逐项分析 9 类风险维度...</span></div>
        <div id="typewriter-text" class="text-sm text-gray-700 leading-relaxed whitespace-pre-line text-left bg-amber-50/50 rounded-lg p-4 border border-amber-100"></div>
      </div>`;
    const textEl = document.getElementById("typewriter-text");
    let full = "";
    try {
      if (AI_ENABLED) {
        full = await aiContractCheck(text, {
          onChunk: (delta) => {
            full += delta;
            textEl.textContent = full;
          }
        });
        if (!full) full = await aiContractCheck(text);
      }
      logAction("AI合同风险检测", `检测合同 ${text.length} 字`, "成功");
      toast("AI 风险检测完成", "success");
      const footer = document.createElement("div");
      footer.className = "mt-4 pt-4 border-t border-amber-100 text-[11px] text-gray-500 leading-relaxed";
      footer.innerHTML = `<span class="text-amber-600">ⓘ</span> 完整检测共覆盖 9 类风险维度。建议结合具体风险点修改合同条款后再行签署；如涉及重大权益，建议咨询专业劳动法律师。`;
      output.querySelector(".w-full").appendChild(footer);
    } catch (e) {
      output.innerHTML = `<div class="text-center text-sm text-red-500 py-12">AI 检测失败：${escapeHtml(e.message)}<br/><span class="text-xs text-gray-400">请检查网络或 API Key 配置</span></div>`;
      console.error(e);
    } finally {
      checking = false;
      btn.disabled = false;
      btn.innerHTML = orig;
    }
  };
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  })[c]);
}
function renderEntInfo(el) {
  const session = getSession();
  const ent = getAll(TABLES.enterprises).find((e) => e.id === session.enterpriseId);
  el.innerHTML = `
    <div class="max-w-2xl space-y-5">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
        <div class="flex items-center justify-between mb-5">
          <h3 class="font-semibold text-gray-800 text-sm">企业基本信息</h3>
          ${statusBadge(ent == null ? void 0 : ent.status)}
        </div>
        <form id="ent-form" class="space-y-3">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div><label class="block text-xs text-gray-400 mb-1">企业名称</label><input name="name" data-rules="required" value="${(ent == null ? void 0 : ent.name) || ""}" class="w-full px-3 py-2 rounded border border-gray-200 text-sm" /></div>
            <div><label class="block text-xs text-gray-400 mb-1">营业执照号</label><input name="license" data-rules="required|license" value="${(ent == null ? void 0 : ent.license) || ""}" class="w-full px-3 py-2 rounded border border-gray-200 text-sm" /></div>
            <div><label class="block text-xs text-gray-400 mb-1">所属行业</label><input name="industry" data-rules="required" value="${(ent == null ? void 0 : ent.industry) || ""}" class="w-full px-3 py-2 rounded border border-gray-200 text-sm" /></div>
            <div><label class="block text-xs text-gray-400 mb-1">企业规模</label><input name="scale" value="${(ent == null ? void 0 : ent.scale) || ""}" class="w-full px-3 py-2 rounded border border-gray-200 text-sm" /></div>
            <div><label class="block text-xs text-gray-400 mb-1">联系人</label><input name="contact" data-rules="required" value="${(ent == null ? void 0 : ent.contact) || ""}" class="w-full px-3 py-2 rounded border border-gray-200 text-sm" /></div>
            <div><label class="block text-xs text-gray-400 mb-1">联系电话</label><input name="phone" data-rules="required|phone" value="${(ent == null ? void 0 : ent.phone) || ""}" class="w-full px-3 py-2 rounded border border-gray-200 text-sm" /></div>
          </div>
          <div><label class="block text-xs text-gray-400 mb-1">企业简介</label><textarea name="intro" rows="3" class="w-full px-3 py-2 rounded border border-gray-200 text-sm">${(ent == null ? void 0 : ent.intro) || ""}</textarea></div>
          <div class="text-xs text-amber-500 bg-amber-50 p-2 rounded">提示：修改后需重新提交监狱审核</div>
          <div class="flex justify-end"><button type="submit" class="px-4 py-2 bg-[#d97706] text-white rounded text-sm hover:bg-[#b45309] active:scale-95 transition">保存修改</button></div>
        </form>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
        <h3 class="font-semibold text-gray-800 text-sm mb-3">合规承诺</h3>
        <div class="space-y-2 text-xs text-gray-500">
          <div class="flex items-start gap-2"><span class="text-emerald-500">✓</span> 承诺不歧视身份，不差别待遇</div>
          <div class="flex items-start gap-2"><span class="text-emerald-500">✓</span> 保障劳动者合法权益，依法签订劳动合同</div>
          <div class="flex items-start gap-2"><span class="text-emerald-500">✓</span> 按规定缴纳社会保险</div>
          <div class="flex items-start gap-2"><span class="text-emerald-500">✓</span> 严格保密服刑人员信息，仅用于就业匹配</div>
        </div>
      </div>
    </div>
  `;
  const entForm = document.getElementById("ent-form");
  const validator = attachValidation(entForm);
  entForm.addEventListener("submit", (e) => {
    e.preventDefault();
    if (!validator.validateAll()) {
      toast("请完善必填项", "warning");
      return;
    }
    const data = Object.fromEntries(new FormData(e.target));
    update(TABLES.enterprises, ent.id, { ...data, status: "审核中" });
    logAction("修改企业信息", ent.id, "成功");
    toast("信息已提交，等待重新审核", "success");
  });
}
initStore();
const theme = {
  primary: "#d97706",
  primaryDark: "#b45309",
  sidebar: "#78350f",
  sidebarActive: "#d97706"
};
const menus = [
  { key: "dashboard", label: "工作台", icon: "📊" },
  { key: "jobs", label: "岗位管理", icon: "💼" },
  { key: "candidates", label: "候选人库", icon: "🔍" },

  { key: "intentions", label: "意向管理", icon: "📝" },
  { key: "csr", label: "社会责任档案", icon: "🤝" },
  { key: "contractcheck", label: "合同风险检测", icon: "📋" },

}
