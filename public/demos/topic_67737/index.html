`;
document.querySelectorAll(".policy-card").forEach((card) => {
  card.onclick = () => {
    const mask = document.createElement("div");
    mask.className = "fixed inset-0 bg-black/40 z-[9998] flex items-center justify-center p-4";
    mask.innerHTML = `
      <div class="bg-white rounded-xl shadow-2xl w-full max-w-[480px] overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
          <h3 class="font-semibold text-gray-800">${card.dataset.title}</h3>
          <button class="text-gray-400 hover:text-gray-600 text-xl leading-none" onclick="this.closest('.fixed').remove()">×</button>
        </div>
        <div class="px-6 py-5 text-sm text-gray-600 leading-relaxed">${card.dataset.content}</div>
      </div>`;
    mask.onclick = (e) => {
      if (e.target === mask) mask.remove();
    };
    document.body.appendChild(mask);
  };
});
