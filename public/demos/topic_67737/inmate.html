function startScene(sceneId, session) {
  const scene = scenes.find((s) => s.id === sceneId);
  if (!scene) return;
  const existing = getAll(TABLES.vrRecords).find((r) => r.inmateId === session.inmateId && r.scene === scene.name);
  if (existing) {
    toast(`您已完成「${scene.name}」场景，可重复体验但不再加分`, "info");
  }
  openModal(`${scene.icon} ${scene.name} · VR模拟`, `
    <div id="vr-progress" class="space-y-4">
      <div class="bg-gradient-to-br from-teal-50 to-emerald-50 rounded-lg p-4 text-center">
        <div class="text-5xl mb-3">${scene.icon}</div>
        <div class="text-sm font-medium text-gray-800 mb-1">${scene.name}</div>
        <div class="text-xs text-gray-500">${scene.desc}</div>
      </div>
      <div class="text-xs text-gray-500 mb-2">模拟任务流程：</div>
      <div id="vr-tasks" class="space-y-2">
        ${scene.tasks.map((t, idx) => `
          <div class="flex items-center gap-3 p-2 rounded-lg border border-gray-100 task-step" data-idx="${idx}">
            <div class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs text-gray-400 task-num">${idx + 1}</div>
            <span class="text-sm text-gray-600">${t}</span>
            <span class="ml-auto text-xs task-status text-gray-400">待执行</span>
          </div>`).join("")}
      </div>
      <div class="bg-gray-50 rounded-lg p-3">
        <div class="flex justify-between text-xs text-gray-500 mb-1">
          <span>总进度</span>
          <span id="vr-pct">0%</span>
        </div>
        <div class="bg-gray-200 rounded-full h-1.5">
          <div id="vr-bar" class="bg-teal-500 h-1.5 rounded-full transition-all" style="width:0"></div>
        </div>
      </div>
      <button id="vr-start" class="w-full py-2.5 bg-[#0d9488] text-white rounded-lg text-sm font-medium hover:bg-[#0a766c] active:scale-95 transition">🥽 开始模拟</button>
    </div>
  `, { width: "480px" });
  const startBtn = document.getElementById("vr-start");
  if (!startBtn) return;
  startBtn.onclick = () => runSimulation(scene, session, startBtn);
}
function runSimulation(scene, session, btn) {
  btn.disabled = true;
  btn.textContent = "🤖 模拟进行中...";
  btn.classList.add("opacity-50", "cursor-not-allowed");
  const taskEls = document.querySelectorAll(".task-step");
  const total = taskEls.length;
  let current = 0;
  const timer = setInterval(() => {
    if (current >= total) {
      clearInterval(timer);
      finishSimulation(scene, session);
      return;
    }
    const el = taskEls[current];
    el.querySelector(".task-num").className = "w-6 h-6 rounded-full bg-emerald-500 flex items-center justify-center text-xs text-white task-num";
    el.querySelector(".task-status").textContent = "✓ 完成";
    el.querySelector(".task-status").className = "ml-auto text-xs task-status text-emerald-600";
    el.classList.add("bg-emerald-50/50");
    current++;
    const pct = Math.round(current / total * 100);
    document.getElementById("vr-bar").style.width = pct + "%";
    document.getElementById("vr-pct").textContent = pct + "%";
  }, 800);
}
function finishSimulation(scene, session) {
  const score = 75 + Math.floor(Math.random() * 25);
  const existing = getAll(TABLES.vrRecords).find((r) => r.inmateId === session.inmateId && r.scene === scene.name);
  if (!existing) {
    insert(TABLES.vrRecords, {
      id: genId("VR"),
      inmateId: session.inmateId,
      scene: scene.name,
      duration: 8 + Math.floor(Math.random() * 20) + "分钟",
      completedAt: (/* @__PURE__ */ new Date()).toISOString().slice(0, 10),
      score
    });
    const inmate = getAll(TABLES.inmates).find((i) => i.id === session.inmateId);
    if (inmate) {
      update(TABLES.inmates, inmate.id, { points: (inmate.points || 0) + 5 });
    }
    logAction("VR模拟完成", `${scene.name} 得${score}分`, "成功");
  } else {
    logAction("VR重复体验", scene.name, "成功");
  }
  const startBtn = document.getElementById("vr-start");
  if (startBtn) {
    startBtn.textContent = `✅ 完成！得分 ${score}`;
    startBtn.classList.remove("opacity-50", "cursor-not-allowed");
    startBtn.disabled = false;
    startBtn.onclick = () => {
      const mask = document.querySelector(".fixed.inset-0.bg-black\\/40:last-child");
      if (mask) mask.remove();
      toast(`「${scene.name}」模拟完成，获得 ${score} 分`, "success");
      setTimeout(() => location.reload(), 800);
    };
  }
}
