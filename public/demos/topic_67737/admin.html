            <th class="px-4 py-3 text-left">结果</th>
          </tr></thead>
          <tbody id="log-tbody" class="divide-y divide-gray-50"></tbody>
        </table>
        </div>
      </div>
    </div>
  `;
  function load() {
    const kw = document.getElementById("log-search").value.trim().toLowerCase();
    const role = document.getElementById("log-role").value;
    const dateStart = document.getElementById("log-date-start").value;
    const dateEnd = document.getElementById("log-date-end").value;
    let list = getAll(TABLES.logs);
    if (kw) list = list.filter((l) => l.user.toLowerCase().includes(kw) || l.action.toLowerCase().includes(kw) || l.target.toLowerCase().includes(kw));
    if (role) list = list.filter((l) => l.role === role);
    if (dateStart) list = list.filter((l) => l.time.slice(0, 10) >= dateStart);
    if (dateEnd) list = list.filter((l) => l.time.slice(0, 10) <= dateEnd);
    list = list.reverse();
    document.getElementById("log-count").textContent = list.length;
    document.getElementById("log-tbody").innerHTML = list.length ? list.map((l) => `
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-3 text-gray-500 text-xs">${l.time}</td>
        <td class="px-4 py-3 font-medium text-gray-800">${l.user}</td>
        <td class="px-4 py-3"><span class="text-xs px-2 py-0.5 rounded ${l.role === "监狱管理人员" ? "bg-sky-50 text-sky-600" : l.role === "企业招聘专员" ? "bg-amber-50 text-amber-600" : "bg-teal-50 text-teal-600"}">${l.role}</span></td>
        <td class="px-4 py-3 text-gray-600">${l.action}</td>
        <td class="px-4 py-3 text-gray-500 text-xs">${l.target}</td>
        <td class="px-4 py-3 text-gray-400 text-xs font-mono">${l.ip}</td>
        <td class="px-4 py-3">${statusBadge(l.result)}</td>
      </tr>`).join("") : '<tr><td colspan="7" class="px-4 py-10 text-center text-gray-400">暂无日志</td></tr>';
  }
  document.getElementById("log-search").addEventListener("input", load);
  document.getElementById("log-role").addEventListener("change", load);
  document.getElementById("log-date-start").addEventListener("change", load);
  document.getElementById("log-date-end").addEventListener("change", load);
  document.getElementById("log-export").onclick = () => {
    const rows = [["操作时间", "操作人", "角色", "操作动作", "操作对象", "IP地址", "结果"]];
    document.querySelectorAll("#log-tbody tr").forEach((tr) => {
      const tds = tr.querySelectorAll("td");
      if (tds.length === 7) rows.push([tds[0].textContent.trim(), tds[1].textContent.trim(), tds[2].textContent.trim(), tds[3].textContent.trim(), tds[4].textContent.trim(), tds[5].textContent.trim(), tds[6].textContent.trim()]);
    });
    const csv = "\uFEFF" + rows.map((r) => r.map((c) => `"${c.replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `操作日志_${(/* @__PURE__ */ new Date()).toISOString().slice(0, 10)}.csv`;
    a.click();
    logAction("导出日志", `${rows.length - 1}条`, "成功");
  };
  load();
}
