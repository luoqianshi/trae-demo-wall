<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节点小宝</title>
    <style>
        * {
            font-family: "Microsoft Yahei", "微软雅黑", Avenir, Helvetica, Arial, sans-serif;
            padding: 0;
            margin: 0;
            border: 0;
            outline: 0;
        }

        html{
            width: 100vw;
        }
        .host-wrap {
            width: 500px;
            height: 139px;
            box-shadow: 0px 6px 20px 0px #E7EAEE;
            border-radius: 16px;
            margin: 0 auto;
            margin-top: 100px;
            text-align: center;
            padding-top: 1px;
        }

        .host-title {
            font-size: 24px;
            color: #1D2129;
            margin-top: 29px;
            height: 35px;
            line-height: 35px;
        }

        .host-value {
            font-size: 24px;
            color: #4E4CFF;
            height: 30px;
            line-height: 30px;
            margin-top: 12px;
        }

        .qrcode-wrap {
            width: 500px;
            height: 480px;
            box-shadow: 0px 6px 20px 0px #E7EAEE;
            border-radius: 16px;
            margin: 0 auto;
            margin-top: 25px;
            text-align: center;
            padding-top: 1px;
        }

        .qrcode-title {
            font-size: 24px;
            font-weight: bold;
            color: #1D2129;
            margin-top: 35px;
        }

        .qrcode-body {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }

        #qrcode-iframe {
            margin-top: 11px;
            width: 400px;
            zoom: 0.5 \0;
            -ms-transform: scale(0.75) \0;
            -webkit-transform: scale(0.75);
            transform: scale(0.75);
            -ms-transform-origin: left top;
            transform-origin: left top;
            height: 400px;
            position: absolute;
            left: -50px;
            top: -50px;
        }



        .line{
            position: relative;
            margin: 0 auto;
            margin-top: 30px;
            color: #17171B;
            width: 362px;
            text-align: center;
            line-height: 20px;
            font-size: 14px;
        }
        .line:before{
            position: absolute;
            left: 0;
            top: 10px;
            content: "";
            width: 160px;
            height: 1px;
            background-color: #D8D8E8;
        }
        .line:after{
            position: absolute;
            right: 0;
            top: 10px;
            content: "";
            width: 160px;
            height: 1px;
            background-color: #D8D8E8;
        }
        .auth-title{
            margin-top: 20px;
            margin-bottom: 20px;
            color: #17171B;
            font-size: 20px;
            font-weight: 700;
            line-height: 30px;
        }

        .password{
            padding-left: 14px;
            width: 240px;
            height: 44px;
            background-color: #F1F2F4;
            border-radius: 4px;
            vertical-align: top;
        }
        input::placeholder {
            font-size: 16px;
        }
        input:-ms-input-placeholder {
            font-size: 16px !important;
        }
        .auth-btn{
            margin-left: 12px;
            width: 88px;
            height: 44px;
            border-radius: 4px;
            background-color: #4E4CFF;
            color: #ffffff;
            font-size: 16px;
            line-height: 44px;
            cursor: pointer;
        }
        .qrcode-tips{
            margin: 0 auto;
            margin-bottom: 100px;
            margin-top: 32px;
            width: 500px;
            color: #81818F;
            font-size: 14px;
            text-align: center;
        }

        .prompt{
            position: fixed;
            display: none;
            right: 0;
            top: 5%;
            width: 240px;
            height: 48px;
            line-height: 48px;
            background-color: #E3F5E6;
            border-radius: 3px;
            text-align: left;
            font-weight: 700;
            font-size: 12px;
            overflow: hidden;
            box-shadow: 2px 4px 4px rgba(0,0,0,0.15);
        }
        .prompt::before{
            position: absolute;
            left: 0;
            top: 0;
            content: "";
            width: 3px;
            height: 48px;
            background-color: #6ACA7E;
        }
        .prompt-fail{
            background-color: #FFE6DF;
        }
        .prompt-fail::before{
            background-color: #FF855E;
        }
        .icon{
            display: inline-block;
            margin-left: 19px;
            margin-top: 16px;
            margin-right: 12px;
            vertical-align: top;
            width: 14px;
            height: 14px;
        }

    </style>
</head>

<body>
    <div class="host-wrap">
        <div class="host-title">您正在访问的域名是</div>
        <div id="host-value" class="host-value"></div>
    </div>
    <div class="qrcode-wrap">
        <div class="qrcode-title">请使用域名创建人微信扫码验证身份</div>
        <div class="qrcode-body">
            <iframe id="qrcode-iframe" sandbox="allow-scripts allow-top-navigation allow-same-origin"></iframe>
        </div>


        <div class="line">
            或
        </div>

        <div class="auth-title">密码认证</div>

        <form onsubmit="event.preventDefault(); submitForm();">
            <input class="password" type="password" placeholder="请输入认证密码" name="authpwd" id="authpwd" required>
            <button class="auth-btn" type="submit">认证</button>
        </form>
    </div>
    <div id="prompt" class="qrcode-tips">
        为了避免域名滥用等违法行为以及保证您的数据安全和使用稳定，<br />存在风险时需要域名所属账号进行验证才可继续访问。
    </div>
    <div id="prompt-success" class="prompt">
        <svg class="icon" width="13.959686" height="13.959717" viewBox="0 0 13.9597 13.9597" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            <desc>
                Created with Pixso.
            </desc>
            <defs/>
            <path id="path" d="M6.97 0C3.12 0 0 3.12 0 6.97C0 10.83 3.12 13.95 6.97 13.95C10.83 13.95 13.95 10.83 13.95 6.97C13.95 3.12 10.83 0 6.97 0ZM10.79 5.32L6.24 9.87C6.14 9.97 5.96 9.97 5.86 9.87L3.16 7.17C3.05 7.06 3.05 6.89 3.16 6.78L4.01 5.93C4.11 5.83 4.28 5.83 4.39 5.93L6.05 7.59L9.56 4.08C9.66 3.98 9.84 3.98 9.94 4.08L10.79 4.93C10.9 5.04 10.9 5.21 10.79 5.32Z" fill="#6ACA7E" fill-opacity="1.000000" fill-rule="nonzero"/>
        </svg>

        认证成功
    </div>
    <div id="prompt-fail" class="prompt prompt-fail">
        <svg class="icon" width="13.959656" height="13.959717" viewBox="0 0 13.9597 13.9597" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            <desc>
                Created with Pixso.
            </desc>
            <defs/>
            <path id="path" d="M6.97 0C3.12 0 0 3.12 0 6.97C0 10.83 3.12 13.95 6.97 13.95C10.83 13.95 13.95 10.83 13.95 6.97C13.95 3.12 10.83 0 6.97 0ZM10.18 8.94C10.28 9.05 10.28 9.22 10.18 9.33L9.33 10.18C9.22 10.28 9.05 10.28 8.94 10.18L6.97 8.21L5.01 10.18C4.9 10.28 4.73 10.28 4.62 10.18L3.77 9.33C3.67 9.22 3.67 9.05 3.77 8.94L5.74 6.97L3.77 5.01C3.67 4.9 3.67 4.73 3.77 4.62L4.62 3.77C4.73 3.67 4.9 3.67 5.01 3.77L6.97 5.74L8.94 3.77C9.05 3.67 9.22 3.67 9.33 3.77L10.18 4.62C10.28 4.73 10.28 4.9 10.18 5.01L8.21 6.97L10.18 8.94Z" fill="#FF8259" fill-opacity="1.000000" fill-rule="nonzero"/>
        </svg>
        认证失败
    </div>
    <div id="prompt-fail2" class="prompt prompt-fail">
        <svg class="icon" width="13.959656" height="13.959717" viewBox="0 0 13.9597 13.9597" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            <desc>
                Created with Pixso.
            </desc>
            <defs/>
            <path id="path" d="M6.97 0C3.12 0 0 3.12 0 6.97C0 10.83 3.12 13.95 6.97 13.95C10.83 13.95 13.95 10.83 13.95 6.97C13.95 3.12 10.83 0 6.97 0ZM10.18 8.94C10.28 9.05 10.28 9.22 10.18 9.33L9.33 10.18C9.22 10.28 9.05 10.28 8.94 10.18L6.97 8.21L5.01 10.18C4.9 10.28 4.73 10.28 4.62 10.18L3.77 9.33C3.67 9.22 3.67 9.05 3.77 8.94L5.74 6.97L3.77 5.01C3.67 4.9 3.67 4.73 3.77 4.62L4.62 3.77C4.73 3.67 4.9 3.67 5.01 3.77L6.97 5.74L8.94 3.77C9.05 3.67 9.22 3.67 9.33 3.77L10.18 4.62C10.28 4.73 10.28 4.9 10.18 5.01L8.21 6.97L10.18 8.94Z" fill="#FF8259" fill-opacity="1.000000" fill-rule="nonzero"/>
        </svg>
        密码错误
    </div>
    <script>
         function prompt(id,time) {
             var p = document.getElementById(id);
             p.style.display = "block";
             setTimeout(function () {
                 p.style.display = "none";
             }, time);
         }
         function submitForm() {
            let src = window.location.href;
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/wwpwdcode", true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var response = JSON.parse(xhr.responseText);
                    if (response.rtn === 0) {
                        prompt('prompt-success',1000);
                        setTimeout(function () {
                            window.location.href = src;
                        }, 1000);
                    } else {
                        prompt('prompt-fail',2000);
                    }
                } else if (xhr.readyState == 4) {
                    prompt('prompt-fail2',2000);
                }
            };
            var pwd = document.getElementById("authpwd").value;
            xhr.send("wwpwdcode=" + encodeURIComponent(pwd));
        }

        document.getElementById("host-value").textContent = window.location.origin;
        document.getElementById("qrcode-iframe").src = loginSrc();

        function loginSrc() {
            let src = window.location.href;
            let href = getQueryString("link");
            if (href) {
                src = href;
            }
            var redirect_uri = encodeURIComponent(
                "http://www.ionewu.com/wx_login.html?url=" + encodeURIComponent(src)
            );
            return (
                "https://open.weixin.qq.com/connect/qrconnect?appid=wxa64ad1d6cb625050&redirect_uri=" +
                redirect_uri +
                "&response_type=code&scope=snsapi_login&state=#wechat_redirect"
            );
        }

        function getQueryString(name) {
            var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)', 'i');
            var r = window.location.search.substr(1).match(reg);
            if (r != null) {
                return unescape(r[2]);
            }
            return null;
        }

    </script>
</body>

</html>
