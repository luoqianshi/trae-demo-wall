<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeScope - 代码架构可视化工具 Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;overflow:hidden;height:100vh;background:#f8f9fb;color:#1e293b}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* ===== Layout ===== */
.app{display:flex;height:100vh;position:relative}
.sidebar{width:340px;min-width:340px;height:100%;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;transition:margin-left .3s ease;overflow:hidden}
#sidebarContent{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.sidebar.collapsed{margin-left:-340px}
.sidebar-toggle{position:absolute;top:50%;transform:translateY(-50%);z-index:20;width:20px;height:40px;background:#fff;border:1px solid #e2e8f0;border-left:none;border-radius:0 8px 8px 0;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:2px 0 4px rgba(0,0,0,.05);transition:left .3s ease;color:#94a3b8;font-size:14px}
.sidebar-toggle:hover{background:#f8fafc;color:#475569}
.main{flex:1;position:relative;overflow:hidden}

/* ===== Sidebar Header ===== */
.sb-header{padding:16px;border-bottom:1px solid #f1f5f9}
.sb-logo{display:flex;align-items:center;gap:8px}
.sb-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.sb-logo h1{font-size:14px;font-weight:700;color:#1e293b}
.sb-logo p{font-size:10px;color:#94a3b8}

/* ===== Input Area ===== */
.sb-input{padding:16px;border-bottom:1px solid #f1f5f9}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:11px;font-weight:500;color:#64748b;margin-bottom:4px}
.input-group input{width:100%;padding:8px 12px;font-size:12px;border:1px solid #e2e8f0;border-radius:8px;outline:none;transition:all .2s}
.input-group input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.config-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-analyze{width:100%;padding:8px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.btn-analyze:hover{background:linear-gradient(135deg,#4f46e5,#2563eb);box-shadow:0 4px 12px rgba(99,102,241,.4)}
.btn-analyze:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed;box-shadow:none}
.btn-config-toggle{width:100%;background:none;border:none;font-size:11px;color:#94a3b8;cursor:pointer;padding:4px;margin-top:4px}
.btn-config-toggle:hover{color:#475569}

/* ===== Project Info ===== */
.sb-project{padding:12px 16px;border-bottom:1px solid #f1f5f9;background:linear-gradient(90deg,rgba(99,102,241,.04),rgba(59,130,246,.04))}
.sb-project h2{font-size:12px;font-weight:700;color:#334155}
.sb-project .framework{font-size:10px;color:#64748b;margin-top:2px}
.sb-project .summary{font-size:10px;color:#94a3b8;margin-top:4px;line-height:1.5}
.sb-stats{display:flex;gap:12px;margin-top:8px}
.sb-stat{text-align:center}
.sb-stat .num{font-size:14px;font-weight:700}
.sb-stat .label{font-size:9px;color:#94a3b8}

/* ===== Tabs ===== */
.panel-section{display:flex;flex-direction:column;border-bottom:1px solid #f1f5f9;flex:1;min-height:0;transition:flex .3s ease}
.panel-section:last-child{border-bottom:none}
.panel-section.collapsed{flex:0 0 auto;min-height:auto}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fafbfc;border-bottom:1px solid #f1f5f9;flex-shrink:0;cursor:pointer;user-select:none;transition:background .15s}
.panel-header:hover{background:#f1f5f9}
.panel-title{font-size:11px;font-weight:600;color:#475569;display:flex;align-items:center;gap:6px}
.panel-arrow{font-size:10px;color:#94a3b8;transition:transform .25s ease;flex-shrink:0}
.panel-section.collapsed .panel-arrow{transform:rotate(-90deg)}
.panel-count{padding:1px 7px;font-size:10px;font-weight:600;color:#6366f1;background:#eef2ff;border-radius:10px}
.panel-left{display:flex;align-items:center;gap:8px}
.panel-list{flex:1;overflow-y:auto;min-height:0;transition:opacity .2s ease}
.panel-section.collapsed .panel-list{display:none}
.tab-badge{display:inline-block;margin-left:4px;padding:1px 6px;font-size:9px;font-weight:700;color:#fff;background:#ef4444;border-radius:10px;vertical-align:middle}

/* ===== List Items ===== */
.sb-list{flex:1;overflow-y:auto;padding:8px 0}
.list-item{padding:10px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.list-item:hover{background:#f1f5f9}
.ep-method{display:inline-flex;align-items:center;justify-content:center;width:44px;height:20px;border-radius:4px;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.m-GET{background:#10b981}.m-POST{background:#3b82f6}.m-PUT{background:#f59e0b}.m-DELETE{background:#ef4444}
.ep-path{font-size:11px;font-family:monospace;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-ctrl{font-size:10px;color:#94a3b8;margin-top:2px}
.ep-ds{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.ep-ds span{padding:1px 6px;font-size:9px;background:#f1f5f9;color:#64748b;border-radius:3px}
.alert-item{margin:4px 8px;padding:10px;border-radius:8px;cursor:pointer;transition:filter .15s}
.alert-item:hover{filter:brightness(.97)}
.sev-critical{background:#fef2f2;border-left:3px solid #ef4444}
.sev-warning{background:#fffbeb;border-left:3px solid #f59e0b}
.sev-info{background:#eff6ff;border-left:3px solid #3b82f6}
.alert-title{font-size:11px;font-weight:600;color:#334155;line-height:1.3}
.alert-meta{display:flex;gap:8px;margin-top:4px}
.alert-type{font-size:9px;font-weight:500}
.alert-sev{font-size:9px;color:#94a3b8}

/* ===== Empty State ===== */
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.empty-state .icon{width:64px;height:64px;margin:0 auto 12px;border-radius:16px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0);display:flex;align-items:center;justify-content:center}
.empty-state p{font-size:11px;color:#94a3b8;text-align:center}
.empty-state .sub{font-size:10px;color:#cbd5e1;margin-top:4px}

/* ===== Canvas ===== */
.canvas-bg{position:absolute;inset:0;background:#f8f9fb;background-image:radial-gradient(circle,#dce0e8 1.5px,transparent 1.5px);background-size:24px 24px}
.canvas-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5}
.overlay-content{text-align:center}
.overlay-icon{width:96px;height:96px;margin:0 auto 20px;border-radius:24px;background:linear-gradient(135deg,#dbeafe,#c7d2fe);border:1px solid rgba(99,102,241,.15);box-shadow:0 8px 24px rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center}
.overlay-content p{font-size:13px;color:#94a3b8;font-weight:500}
.overlay-content .sub{font-size:11px;color:#cbd5e1;margin-top:4px}

/* Loading */
.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:10}
.spinner{width:64px;height:64px;border:4px solid #e0e7ff;border-top-color:#6366f1;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{font-size:14px;font-weight:500;color:#475569}
.loading-overlay .sub{font-size:12px;color:#94a3b8;margin-top:8px}
.loading-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%,20%{content:''}40%{content:'.'}60%{content:'..'}80%,100%{content:'...'}}

/* ===== SVG Graph ===== */
.graph-svg{position:absolute;inset:0;width:100%;height:100%;cursor:grab}
.graph-svg:active{cursor:grabbing}
.graph-group{transition:opacity .3s ease}
.node-rect{transition:opacity .3s ease}
.node-rect:hover{filter:drop-shadow(0 4px 12px rgba(0,0,0,.12))}
.edge-path{fill:none;stroke-width:2;transition:opacity .3s ease}
.edge-label{font-size:9px;fill:#94a3b8;font-weight:500}
.edge-label-bg{fill:#fff;rx:3;ry:3}

/* Controls */
.canvas-controls{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:2px;background:#fff;border:1px solid #f1f5f9;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.08);overflow:hidden;z-index:10}
.ctrl-btn{width:32px;height:32px;border:none;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#64748b;transition:background .15s}
.ctrl-btn:hover{background:#f8fafc}
.ctrl-btn:not(:last-child){border-bottom:1px solid #f1f5f9}
.canvas-reset{position:absolute;top:16px;right:16px;padding:6px 12px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);z-index:10;transition:all .2s}
.canvas-reset:hover{background:#fff;color:#334155}

/* MiniMap */
.minimap{position:absolute;bottom:16px;left:16px;width:180px;height:120px;background:#fff;border:1px solid #f1f5f9;border-radius:12px;box-shadow:0 8px 16px rgba(0,0,0,.08);overflow:hidden;z-index:10}

/* ===== Drawer ===== */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:40;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:380px;background:#fff;z-index:50;transform:translateX(100%);transition:transform .3s;box-shadow:-4px 0 20px rgba(0,0,0,.1);overflow-y:auto}
.drawer.open{transform:translateX(0)}
.drawer.open.collapsed{transform:translateX(calc(100% - 20px))}
.drawer-toggle{position:absolute;top:50%;left:-20px;transform:translateY(-50%);width:20px;height:48px;background:#fff;border:1px solid #e2e8f0;border-right:none;border-radius:8px 0 0 8px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:-2px 0 6px rgba(0,0,0,.06);transition:all .2s;color:#94a3b8;font-size:12px;z-index:51}
.drawer-toggle:hover{background:#f8fafc;color:#475569}
.drawer.open.collapsed .drawer-toggle{left:0}
.drawer.collapsed .drawer-content{opacity:0;pointer-events:none;transition:opacity .15s}
.drawer .drawer-content{opacity:1;transition:opacity .2s .1s}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid #f1f5f9}
.drawer-node-info{display:flex;align-items:center;gap:12px}
.drawer-node-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.drawer-node-name{font-size:16px;font-weight:700;color:#1e293b}
.drawer-node-type{display:inline-block;padding:2px 8px;font-size:10px;font-weight:500;border-radius:4px;margin-top:4px;text-transform:uppercase;letter-spacing:.3px}
.drawer-close{width:28px;height:28px;border-radius:8px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#94a3b8;transition:all .15s}
.drawer-close:hover{background:#f1f5f9;color:#475569}
.drawer-body{padding:20px}
.drawer-section{margin-bottom:20px}
.drawer-section h3{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.drawer-section .desc{font-size:12px;color:#475569;line-height:1.6}
.drawer-section .filepath{background:#f8fafc;border:1px solid #f1f5f9;border-radius:8px;padding:10px;font-family:monospace;font-size:10px;color:#475569;word-break:break-all}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-card{background:#f8fafc;border:1px solid #f1f5f9;border-radius:8px;padding:12px;text-align:center}
.metric-val{font-size:18px;font-weight:700}
.metric-label{font-size:10px;color:#94a3b8;margin-top:2px}
.rel-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;font-size:12px;transition:background .15s}
.rel-item:hover{background:#f8fafc}
.rel-arrow{color:#94a3b8}
.rel-name{color:#334155;font-weight:500}
.rel-badge{margin-left:auto;padding:2px 6px;font-size:9px;border-radius:3px}
.alert-card{padding:10px;border-radius:8px;margin-bottom:8px}
.alert-card .a-title{font-size:11px;font-weight:600;color:#334155;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.alert-card .a-desc{font-size:10px;color:#64748b;line-height:1.5}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">
        <div class="sb-logo-icon">C</div>
        <div>
          <h1>CodeScope</h1>
          <p>代码架构可视化工具</p>
        </div>
      </div>
    </div>
    <div class="sb-input">
      <div class="input-group">
        <label>项目路径</label>
        <input type="text" id="projectPath" value="" placeholder="输入本地项目路径...">
      </div>
      <div id="configArea" style="display:none">
        <div class="input-group">
          <label>API Key</label>
          <input type="password" id="apiKey" value="" placeholder="sk-...">
        </div>
        <div class="config-row">
          <div class="input-group">
            <label>API 地址</label>
            <input type="text" value="" placeholder="例如: https://api.deepseek.com">
          </div>
          <div class="input-group">
            <label>模型</label>
            <input type="text" value="" placeholder="例如: deepseek-v4-flash">
          </div>
        </div>
      </div>
      <div style="padding:8px 12px;background:linear-gradient(90deg,rgba(251,191,36,.1),rgba(245,158,11,.1));border:1px solid rgba(251,191,36,.3);border-radius:8px;margin-bottom:12px">
        <div style="display:flex;align-items:flex-start;gap:6px">
          <span style="font-size:13px">ℹ️</span>
          <div>
            <p style="font-size:10px;font-weight:600;color:#b45309;margin:0">纯前端静态演示</p>
            <p style="font-size:9px;color:#d97706;margin-top:2px;line-height:1.4">使用预设 mock 数据，未调用 AI，仅用于交互展示</p>
          </div>
        </div>
      </div>
      <button class="btn-analyze" id="btnAnalyze">分析demo项目</button>
      <button class="btn-config-toggle" id="btnConfig">展开配置 ▼</button>
    </div>
    <div id="sidebarContent">
      <div class="empty-state">
        <div>
          <div class="icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>
            </svg>
          </div>
          <p>点击「分析demo项目」</p>
          <p class="sub">查看静态演示数据</p>
        </div>
      </div>
    </div>
  </aside>

  <div class="sidebar-toggle" id="sidebarToggle" style="left:340px">‹</div>

  <!-- Main Canvas -->
  <main class="main" id="main">
    <div class="canvas-bg"></div>
    <div class="canvas-overlay" id="canvasOverlay">
      <div class="overlay-content">
        <div class="overlay-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>
          </svg>
        </div>
        <p>在左侧点击「分析demo项目」</p>
        <p class="sub">查看纯前端静态演示的代码架构拓扑图</p>
      </div>
    </div>
    <svg class="graph-svg" id="graphSvg" style="display:none">
      <g id="graphGroup"></g>
    </svg>
    <div class="canvas-controls" id="canvasControls" style="display:none">
      <button class="ctrl-btn" onclick="zoomIn()" title="放大">+</button>
      <button class="ctrl-btn" onclick="zoomOut()" title="缩小">−</button>
      <button class="ctrl-btn" onclick="fitView()" title="适应视图">⊡</button>
    </div>
    <button class="canvas-reset" id="btnReset" style="display:none" onclick="resetView()">⟲ 重置视图</button>
    <svg class="minimap" id="minimap" style="display:none"></svg>
  </main>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-toggle" id="drawerToggle" onclick="toggleDrawerCollapse()" title="折叠/展开">‹</div>
  <div class="drawer-content">
    <div id="drawerContent"></div>
  </div>
</div>

<script>
// ====== Data ======
var mockData = {
  projectInfo: {
    name: 'FlashSale Platform',
    language: 'Java 17 + TypeScript',
    framework: 'Spring Boot 3.2 + React 18',
    summary: '企业级高并发秒杀平台，采用微服务架构设计，集成 Redis 缓存、RabbitMQ 异步削峰、分布式锁与 Sentinel 熔断降级，支撑万级 TPS 秒杀场景。'
  },
  architecture: {
    nodes: [
      {id:'api-gateway',type:'middleware',label:'API Gateway',filePath:'gateway/src/main/java/com/flashsale/gateway/',description:'Spring Cloud Gateway 统一入口，动态路由、限流熔断、跨域处理、请求日志与鉴权拦截',metrics:{files:12,linesOfCode:980}},
      {id:'sentinel',type:'middleware',label:'Sentinel Dashboard',filePath:'infra/sentinel/',description:'阿里 Sentinel 流量防卫兵，实时监控接口 QPS、线程数，配置熔断降级与热点限流规则',metrics:{files:8,linesOfCode:720}},
      {id:'auth-filter',type:'middleware',label:'JWT Auth Filter',filePath:'gateway/src/main/java/com/flashsale/gateway/filter/',description:'JWT 令牌解析与校验过滤器，白名单放行登录/注册接口，注入用户上下文到请求头',metrics:{files:5,linesOfCode:380}},
      {id:'rate-limiter',type:'middleware',label:'Rate Limiter',filePath:'gateway/src/main/java/com/flashsale/gateway/limiter/',description:'分布式令牌桶限流器，基于 Redis + Lua 脚本实现秒级/分钟级多维度限流',metrics:{files:6,linesOfCode:520}},
      {id:'flash-order-ctrl',type:'controller',label:'FlashOrderController',filePath:'order/controller/FlashOrderController.java',description:'秒杀订单控制器，提供创建订单、查询订单列表、取消订单 REST 接口，处理秒杀请求入口',metrics:{files:3,linesOfCode:340}},
      {id:'product-ctrl',type:'controller',label:'ProductController',filePath:'product/controller/ProductController.java',description:'商品控制器，商品 CRUD、分页查询、详情展示、秒杀商品预热与库存查询接口',metrics:{files:4,linesOfCode:420}},
      {id:'user-ctrl',type:'controller',label:'UserController',filePath:'user/controller/UserController.java',description:'用户控制器，注册、登录、个人信息管理、收货地址管理接口',metrics:{files:4,linesOfCode:390}},
      {id:'payment-ctrl',type:'controller',label:'PaymentController',filePath:'payment/controller/PaymentController.java',description:'支付控制器，统一下单、支付回调通知、退款、账单查询接口',metrics:{files:3,linesOfCode:360}},

// ====== Layout (simple layered LR) ======
function computeLayout(nodes, edges) {
  // Build adjacency
  var adj = {};
  var inDeg = {};
  nodes.forEach(function(n) {
    adj[n.id] = [];
    inDeg[n.id] = 0;
  });
  edges.forEach(function(e) {
    if (adj[e.source]) { adj[e.source].push(e.target); }
    if (inDeg[e.target] !== undefined) { inDeg[e.target]++; }
  });

  // Topological sort with levels
  var level = {};
  var queue = [];
  nodes.forEach(function(n) {
    if (inDeg[n.id] === 0) { queue.push(n.id); level[n.id] = 0; }
  });
  var processed = 0;
  while (queue.length > 0) {
    var id = queue.shift();
    processed++;
    if (adj[id]) {
      adj[id].forEach(function(t) {
        var newLevel = (level[id] || 0) + 1;
        if (level[t] === undefined || level[t] < newLevel) {
          level[t] = newLevel;
        }
        inDeg[t]--;
        if (inDeg[t] === 0) { queue.push(t); }
      });
    }
  }
  // Handle cycles - assign level 0 to unprocessed
  nodes.forEach(function(n) {
    if (level[n.id] === undefined) { level[n.id] = 0; }
  });

  // Group by level
  var levels = {};
  var maxLevel = 0;
  nodes.forEach(function(n) {
    var l = level[n.id];
    if (!levels[l]) { levels[l] = []; }
    levels[l].push(n.id);
    if (l > maxLevel) { maxLevel = l; }
  });

  // Position nodes
  var positions = {};
  var xSpacing = 240;
  var ySpacing = 90;
  var nodeWidth = 180;
  var nodeHeight = 72;
  var startX = 40;
  var startY = 40;

  for (var l = 0; l <= maxLevel; l++) {
    var ids = levels[l] || [];
    var totalHeight = ids.length * ySpacing;
    var centerOffset = totalHeight / 2;
    ids.forEach(function(id, i) {
      positions[id] = {
        x: startX + l * xSpacing,
        y: startY + i * ySpacing
      };
    });
  }

  return positions;
}

// ====== Rendering ======
function getNodeById(id) {
  if (!state.data) return null;
  return state.data.architecture.nodes.find(function(n) { return n.id === id; });
}

function renderGraph() {
  var svg = document.getElementById('graphSvg');
  var group = document.getElementById('graphGroup');
  group.innerHTML = '';

  var nodes = state.data.architecture.nodes;
  var edges = state.data.architecture.edges;
  var positions = state.nodePositions;

  var highlightedSet = new Set(state.highlightedNodes);
  var hasHighlight = highlightedSet.size > 0;

  // Draw edges first (behind nodes)
  edges.forEach(function(e, idx) {
    var sPos = positions[e.source];
    var tPos = positions[e.target];
    if (!sPos || !tPos) return;

    var sNode = getNodeById(e.source);
    var tNode = getNodeById(e.target);
    var sW = 180, sH = 72;
    var tW = 180, tH = 72;

    // Start from right edge of source, end at left edge of target
    var x1 = sPos.x + sW;
    var y1 = sPos.y + sH / 2;
    var x2 = tPos.x;
    var y2 = tPos.y + tH / 2;

    // Bezier curve
    var midX = (x1 + x2) / 2;
    var path = 'M ' + x1 + ' ' + y1 + ' C ' + midX + ' ' + y1 + ', ' + midX + ' ' + y2 + ', ' + x2 + ' ' + y2;

    var color = relationColors[e.relation] || '#94a3b8';
    var opacity = 1;
    var animated = false;

    if (hasHighlight) {
      if (highlightedSet.has(e.source) && highlightedSet.has(e.target)) {
        opacity = 1;
        animated = true;
      } else {
        opacity = 0.12;
      }
    }

    // Edge path
    var pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pathEl.setAttribute('d', path);
    pathEl.setAttribute('class', 'edge-path');
    pathEl.setAttribute('stroke', color);
    pathEl.setAttribute('opacity', opacity);
    pathEl.setAttribute('fill', 'none');
    if (animated) {
      pathEl.setAttribute('stroke-dasharray', '6 3');
      pathEl.style.animation = 'dashflow 0.8s linear infinite';
    }
    group.appendChild(pathEl);

    // Arrow marker
    var arrowEl = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    var ax = x2, ay = y2;
    arrowEl.setAttribute('points', (ax-8)+','+(ay-4)+' '+(ax-8)+','+(ay+4)+' '+ax+','+ay);
    arrowEl.setAttribute('fill', color);
    arrowEl.setAttribute('opacity', opacity);
    group.appendChild(arrowEl);

    // Edge label
    var labelX = midX;
    var labelY = (y1 + y2) / 2;
    var labelBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    var labelText = e.relation;
    var labelWidth = labelText.length * 6 + 8;
    labelBg.setAttribute('x', labelX - labelWidth/2);
    labelBg.setAttribute('y', labelY - 7);
    labelBg.setAttribute('width', labelWidth);
    labelBg.setAttribute('height', 14);
    labelBg.setAttribute('rx', 3);
    labelBg.setAttribute('fill', '#fff');
    labelBg.setAttribute('opacity', opacity * 0.9);
    group.appendChild(labelBg);

    var labelEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    labelEl.setAttribute('x', labelX);
    labelEl.setAttribute('y', labelY + 3);
    labelEl.setAttribute('text-anchor', 'middle');
    labelEl.setAttribute('class', 'edge-label');
    labelEl.setAttribute('fill', '#94a3b8');
    labelEl.setAttribute('opacity', opacity);
    labelEl.textContent = labelText;
    group.appendChild(labelEl);
  });

  // Draw nodes
  nodes.forEach(function(n) {
    var pos = positions[n.id];
    if (!pos) return;

    var color = nodeTypeColors[n.type] || '#94a3b8';
    var bgColor = nodeTypeBgColors[n.type] || '#f1f5f9';
    var icon = nodeTypeIcons[n.type] || '❓';
    var isSelected = state.selectedNodeId === n.id;

    var opacity = 1;
    if (hasHighlight) {
      opacity = highlightedSet.has(n.id) ? 1 : 0.2;
    }

    var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'node-rect');
    g.setAttribute('opacity', opacity);
    g.style.cursor = 'pointer';
    g.setAttribute('data-node-id', n.id);

    // Shadow
    var shadow = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    shadow.setAttribute('x', pos.x + 1);
    shadow.setAttribute('y', pos.y + 2);
    shadow.setAttribute('width', 180);
    shadow.setAttribute('height', 72);
    shadow.setAttribute('rx', 10);
    shadow.setAttribute('fill', 'rgba(0,0,0,0.06)');
    g.appendChild(shadow);

    // Main rect
    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', pos.x);
    rect.setAttribute('y', pos.y);
    rect.setAttribute('width', 180);
    rect.setAttribute('height', 72);
    rect.setAttribute('rx', 10);
    rect.setAttribute('fill', '#fff');
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-width', isSelected ? 3 : 2);
    if (isSelected) {
      rect.style.filter = 'drop-shadow(0 0 6px rgba(99,102,241,0.3))';
    }
    g.appendChild(rect);

    // Icon
    var iconText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    iconText.setAttribute('x', pos.x + 14);
    iconText.setAttribute('y', pos.y + 24);
    iconText.setAttribute('font-size', 16);
    iconText.textContent = icon;
    g.appendChild(iconText);

    // Label
    var labelText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    labelText.setAttribute('x', pos.x + 34);
    labelText.setAttribute('y', pos.y + 24);
    labelText.setAttribute('font-size', 12);
    labelText.setAttribute('font-weight', 600);
    labelText.setAttribute('fill', '#1e293b');
    // Truncate if too long
    var label = n.label;
    if (label.length > 18) label = label.substring(0, 17) + '…';
    labelText.textContent = label;
    g.appendChild(labelText);

    // Type badge
    var badgeBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    badgeBg.setAttribute('x', pos.x + 14);
    badgeBg.setAttribute('y', pos.y + 34);
    badgeBg.setAttribute('width', n.type.length * 7 + 12);
    badgeBg.setAttribute('height', 16);
    badgeBg.setAttribute('rx', 4);
    badgeBg.setAttribute('fill', bgColor);
    g.appendChild(badgeBg);

    var badgeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    badgeText.setAttribute('x', pos.x + 14 + (n.type.length * 7 + 12) / 2);
    badgeText.setAttribute('y', pos.y + 46);
    badgeText.setAttribute('text-anchor', 'middle');
    badgeText.setAttribute('font-size', 10);
    badgeText.setAttribute('font-weight', 500);
    badgeText.setAttribute('fill', color);
    badgeText.setAttribute('text-transform', 'uppercase');
    badgeText.textContent = n.type;
    g.appendChild(badgeText);

    // Metrics
    if (n.metrics && n.metrics.files > 0) {
      var metricsText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      metricsText.setAttribute('x', pos.x + 14);
      metricsText.setAttribute('y', pos.y + 64);
      metricsText.setAttribute('font-size', 10);
      metricsText.setAttribute('fill', '#94a3b8');
      metricsText.textContent = n.metrics.files + ' 个文件 · ' + n.metrics.linesOfCode.toLocaleString() + ' 行';
      g.appendChild(metricsText);
    }

    // Click handler
    g.addEventListener('click', function(e) {
      e.stopPropagation();
      onNodeClick(n.id);
    });

    group.appendChild(g);
  });

  applyTransform();
}

function applyTransform() {
  var group = document.getElementById('graphGroup');
  group.setAttribute('transform', 'translate(' + state.translateX + ',' + state.translateY + ') scale(' + state.scale + ')');
  renderMinimap();
}

function renderMinimap() {
  var mm = document.getElementById('minimap');
  if (!state.data) { mm.style.display = 'none'; return; }
  mm.style.display = 'block';
  mm.innerHTML = '';

  var positions = state.nodePositions;
  var nodes = state.data.architecture.nodes;

  // Compute bounds
  var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(function(n) {
    var p = positions[n.id];
    if (!p) return;
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x + 180 > maxX) maxX = p.x + 180;
    if (p.y + 72 > maxY) maxY = p.y + 72;
  });
  var w = maxX - minX || 1;
  var h = maxY - minY || 1;

  var mmW = 180, mmH = 120;
  var scale = Math.min(mmW / w, mmH / h) * 0.9;
  var offsetX = (mmW - w * scale) / 2 - minX * scale;
  var offsetY = (mmH - h * scale) / 2 - minY * scale;

  // Background
  var bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', mmW);
  bg.setAttribute('height', mmH);
  bg.setAttribute('fill', '#fafbfc');
  mm.appendChild(bg);

  // Nodes
  var highlightedSet = new Set(state.highlightedNodes);
  nodes.forEach(function(n) {
    var p = positions[n.id];
    if (!p) return;
    var r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', p.x * scale + offsetX);
    r.setAttribute('y', p.y * scale + offsetY);
    r.setAttribute('width', 180 * scale);
    r.setAttribute('height', 72 * scale);
    r.setAttribute('rx', 2);
    r.setAttribute('fill', nodeTypeColors[n.type] || '#94a3b8');
    r.setAttribute('opacity', highlightedSet.size > 0 && !highlightedSet.has(n.id) ? 0.2 : 0.7);
    mm.appendChild(r);
  });

  // Viewport rect
  var main = document.getElementById('main');
  var vw = main.offsetWidth / state.scale;
  var vh = main.offsetHeight / state.scale;
  var vx = -state.translateX / state.scale;
  var vy = -state.translateY / state.scale;
  var vp = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  vp.setAttribute('x', vx * scale + offsetX);
  vp.setAttribute('y', vy * scale + offsetY);
  vp.setAttribute('width', vw * scale);
  vp.setAttribute('height', vh * scale);
  vp.setAttribute('fill', 'none');
  vp.setAttribute('stroke', '#6366f1');
  vp.setAttribute('stroke-width', 1.5);
  vp.setAttribute('rx', 2);
  mm.appendChild(vp);
}

// ====== Interaction ======
function onNodeClick(id) {
  state.selectedNodeId = id;
  var connected = new Set([id]);
  (state.data.architecture.edges || []).forEach(function(e) {
    if (e.source === id) connected.add(e.target);
    if (e.target === id) connected.add(e.source);
  });
  state.highlightedNodes = Array.from(connected);
  renderGraph();
  openDrawer(id);
}

function onPaneClick() {
  state.selectedNodeId = null;
  state.highlightedNodes = [];
  renderGraph();
  closeDrawer();
}

function highlightCallChain(chain) {
  state.highlightedNodes = chain.slice();
  state.selectedNodeId = null;
  renderGraph();
  fitViewToNodes(chain);
  closeDrawer();
}

function focusOnNode(id) {
  state.highlightedNodes = [id];
  state.selectedNodeId = id;
  renderGraph();
  fitViewToNodes([id]);
  openDrawer(id);
}

function fitViewToNodes(ids) {
  var positions = state.nodePositions;
  var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  ids.forEach(function(id) {
    var p = positions[id];
    if (!p) return;
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x + 180 > maxX) maxX = p.x + 180;
    if (p.y + 72 > maxY) maxY = p.y + 72;
  });
  if (minX === Infinity) return;

  var main = document.getElementById('main');
  var w = main.offsetWidth;
  var h = main.offsetHeight;
  var nodesW = maxX - minX;
  var nodesH = maxY - minY;
  var padding = 80;
  var scaleX = (w - padding * 2) / nodesW;
  var scaleY = (h - padding * 2) / nodesH;
  var newScale = Math.min(scaleX, scaleY, 1.5);
  if (newScale < 0.25) newScale = 0.25;

  state.scale = newScale;
  state.translateX = (w - nodesW * newScale) / 2 - minX * newScale;
  state.translateY = (h - nodesH * newScale) / 2 - minY * newScale;
  applyTransform();
}

function fitView() {
  if (!state.data) return;
  var allIds = state.data.architecture.nodes.map(function(n) { return n.id; });
  fitViewToNodes(allIds);
}

function resetView() {
  state.highlightedNodes = [];
  state.selectedNodeId = null;
  renderGraph();
  fitView();
  closeDrawer();
}

function zoomIn() {
  state.scale = Math.min(state.scale * 1.2, 2.5);
  applyTransform();
}
function zoomOut() {
  state.scale = Math.max(state.scale / 1.2, 0.25);
  applyTransform();
}

// Pan & Zoom
function initPanZoom() {
  var svg = document.getElementById('graphSvg');

  svg.addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'g' && e.target.getAttribute('data-node-id')) return;
    state.isDragging = true;
    state.dragStartX = e.clientX;
    state.dragStartY = e.clientY;
    state.dragStartTX = state.translateX;
    state.dragStartTY = state.translateY;
  });

  document.addEventListener('mousemove', function(e) {
    if (!state.isDragging) return;
    state.translateX = state.dragStartTX + (e.clientX - state.dragStartX);
    state.translateY = state.dragStartTY + (e.clientY - state.dragStartY);
    applyTransform();
  });

  document.addEventListener('mouseup', function() {
    state.isDragging = false;
  });

  svg.addEventListener('click', function(e) {
    if (e.target === svg || e.target.tagName === 'rect' && e.target.getAttribute('fill') === 'rgba(0,0,0,0.06)') {
      // Clicked on background
    }
    if (e.target === svg) {
      onPaneClick();
    }
  });

  svg.addEventListener('wheel', function(e) {
    e.preventDefault();
    var delta = e.deltaY > 0 ? 0.9 : 1.1;
    var newScale = state.scale * delta;
    if (newScale < 0.25) newScale = 0.25;
    if (newScale > 2.5) newScale = 2.5;

    var rect = svg.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;

    state.translateX = mx - (mx - state.translateX) * (newScale / state.scale);
    state.translateY = my - (my - state.translateY) * (newScale / state.scale);
    state.scale = newScale;
    applyTransform();
  }, { passive: false });
}

// ====== Drawer ======
function openDrawer(id) {
  var node = getNodeById(id);
  if (!node) return;

  var drawer = document.getElementById('drawer');
  var overlay = document.getElementById('drawerOverlay');
  var content = document.getElementById('drawerContent');

  var color = nodeTypeColors[node.type];
  var bgColor = nodeTypeBgColors[node.type];
  var icon = nodeTypeIcons[node.type];

  // Find related edges
  var incoming = state.data.architecture.edges.filter(function(e) { return e.target === id; });
  var outgoing = state.data.architecture.edges.filter(function(e) { return e.source === id; });
  var relatedAlerts = state.data.alerts.filter(function(a) { return a.targetNode === id; });

  function getNodeLabel(nid) {
    var n = getNodeById(nid);
    return n ? n.label : nid;
  }

  var html = '<div class="drawer-header">';
  html += '<div class="drawer-node-info">';
  html += '<div class="drawer-node-icon" style="background:' + bgColor + '">' + icon + '</div>';
  html += '<div><div class="drawer-node-name">' + node.label + '</div>';
  html += '<span class="drawer-node-type" style="background:' + bgColor + ';color:' + color + '">' + node.type.toUpperCase() + '</span></div>';
  html += '</div>';
  html += '<button class="drawer-close" onclick="closeDrawer()">✕</button>';
  html += '</div>';

  html += '<div class="drawer-body">';

  // Description
  html += '<div class="drawer-section"><h3>描述</h3><p class="desc">' + node.description + '</p></div>';

  // File path
  html += '<div class="drawer-section"><h3>文件路径</h3><div class="filepath">' + node.filePath + '</div></div>';

  // Metrics
  if (node.metrics) {
    html += '<div class="drawer-section"><h3>指标</h3><div class="metrics-grid">';
    html += '<div class="metric-card"><div class="metric-val" style="color:#6366f1">' + node.metrics.files + '</div><div class="metric-label">文件数</div></div>';
    html += '<div class="metric-card"><div class="metric-val" style="color:#10b981">' + node.metrics.linesOfCode.toLocaleString() + '</div><div class="metric-label">代码行数</div></div>';
    html += '</div></div>';
  }

  // Alerts
  if (relatedAlerts.length > 0) {
    html += '<div class="drawer-section"><h3>相关告警 (' + relatedAlerts.length + ')</h3>';
    relatedAlerts.forEach(function(a) {
      html += '<div class="alert-card sev-' + a.severity + '">';
      html += '<div class="a-title"><span style="width:6px;height:6px;border-radius:50%;background:' + alertTypeColors[a.type] + ';display:inline-block"></span>' + a.title + '</div>';
      html += '<p class="a-desc">' + a.description + '</p>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Incoming relations
  if (incoming.length > 0) {
    html += '<div class="drawer-section"><h3>入站关系 (' + incoming.length + ')</h3>';
    incoming.forEach(function(e) {
      var rc = relationColors[e.relation] || '#94a3b8';
      html += '<div class="rel-item"><span class="rel-arrow">←</span><span class="rel-name">' + getNodeLabel(e.source) + '</span><span class="rel-badge" style="background:' + rc + '20;color:' + rc + '">' + e.relation + '</span></div>';
    });
    html += '</div>';
  }

  // Outgoing relations
  if (outgoing.length > 0) {
    html += '<div class="drawer-section"><h3>出站关系 (' + outgoing.length + ')</h3>';
    outgoing.forEach(function(e) {
      var rc = relationColors[e.relation] || '#94a3b8';
      html += '<div class="rel-item"><span class="rel-arrow">→</span><span class="rel-name">' + getNodeLabel(e.target) + '</span><span class="rel-badge" style="background:' + rc + '20;color:' + rc + '">' + e.relation + '</span></div>';
    });
    html += '</div>';
  }

  html += '</div>';

  content.innerHTML = html;
  drawer.classList.add('open');
  drawer.classList.remove('collapsed');
  document.getElementById('drawerToggle').textContent = '‹';
  overlay.classList.add('open');
}

function toggleDrawerCollapse() {
  var drawer = document.getElementById('drawer');
  var toggle = document.getElementById('drawerToggle');
  if (drawer.classList.contains('collapsed')) {
    drawer.classList.remove('collapsed');
    toggle.textContent = '‹';
  } else {
    drawer.classList.add('collapsed');
    toggle.textContent = '›';
  }
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer').classList.remove('collapsed');
  document.getElementById('drawerToggle').textContent = '‹';
  document.getElementById('drawerOverlay').classList.remove('open');
  state.selectedNodeId = null;
}

// ====== Sidebar Rendering ======
function renderSidebarContent() {
  var container = document.getElementById('sidebarContent');
  if (!state.data) {
    container.innerHTML = '<div class="empty-state"><div><div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/></svg></div><p>点击「分析demo项目」</p><p class="sub">查看静态演示数据</p></div></div>';
    return;
  }

  var d = state.data;
  var criticalCount = d.alerts.filter(function(a) { return a.severity === 'critical'; }).length;

  var html = '';

  // Project info
  html += '<div class="sb-project">';
  html += '<h2>' + d.projectInfo.name + '</h2>';
  html += '<p class="framework">' + d.projectInfo.framework + '</p>';
  html += '<p class="summary">' + d.projectInfo.summary + '</p>';
  html += '<div class="sb-stats">';
  html += '<div class="sb-stat"><div class="num" style="color:#6366f1">' + d.architecture.nodes.length + '</div><div class="label">节点</div></div>';
  html += '<div class="sb-stat"><div class="num" style="color:#3b82f6">' + d.architecture.edges.length + '</div><div class="label">关系</div></div>';
  html += '<div class="sb-stat"><div class="num" style="color:#10b981">' + d.apiEndpoints.length + '</div><div class="label">API</div></div>';
  html += '<div class="sb-stat"><div class="num" style="color:#f59e0b">' + d.alerts.length + '</div><div class="label">告警</div></div>';
  html += '</div></div>';

  // Panels - endpoints + alerts stacked vertically
  html += '<div style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">';

  // API endpoints panel
  html += '<div class="panel-section' + (state.panelEndpointsCollapsed ? ' collapsed' : '') + '">';
  html += '<div class="panel-header" onclick="togglePanel(\'endpoints\')">';
  html += '<span class="panel-left"><span class="panel-arrow">▼</span><span class="panel-title">🔌 API 端点</span></span>';
  html += '<span class="panel-count">' + d.apiEndpoints.length + '</span>';
  html += '</div>';
  html += '<div class="panel-list">';
  d.apiEndpoints.forEach(function(ep, idx) {
    html += '<div class="list-item" onclick="highlightCallChain(' + JSON.stringify(ep.callChain).replace(/"/g, '&quot;') + ')">';
    html += '<div style="display:flex;align-items:flex-start;gap:8px">';
    html += '<span class="ep-method m-' + ep.method + '">' + ep.method + '</span>';
    html += '<div style="flex:1;min-width:0">';
    html += '<div class="ep-path">' + ep.path + '</div>';
    html += '<div class="ep-ctrl">' + ep.controller + '</div>';
    html += '<div class="ep-ds">';
    ep.dataSources.forEach(function(ds) {
      html += '<span>' + ds + '</span>';
    });
    html += '</div></div></div></div>';
  });
  html += '</div></div>';

  // Alerts panel
  html += '<div class="panel-section' + (state.panelAlertsCollapsed ? ' collapsed' : '') + '">';
  html += '<div class="panel-header" onclick="togglePanel(\'alerts\')">';
  html += '<span class="panel-left"><span class="panel-arrow">▼</span><span class="panel-title">⚠️ 告警</span></span>';
  html += '<span class="panel-count" style="color:#ef4444;background:#fef2f2">' + d.alerts.length + (criticalCount > 0 ? ' 严重' + criticalCount : '') + '</span>';
  html += '</div>';
  html += '<div class="panel-list">';
  d.alerts.forEach(function(a, idx) {
    html += '<div class="alert-item sev-' + a.severity + '" onclick="focusOnNode(\'' + a.targetNode + '\')">';
    html += '<div style="display:flex;align-items:flex-start;gap:8px">';
    html += '<span style="margin-top:4px;width:8px;height:8px;border-radius:50%;flex-shrink:0;background:' + alertTypeColors[a.type] + '"></span>';
    html += '<div style="flex:1;min-width:0">';
    html += '<div class="alert-title">' + a.title + '</div>';
    html += '<div class="alert-meta">';
    html += '<span class="alert-type" style="color:' + alertTypeColors[a.type] + '">' + alertTypeLabels[a.type] + '</span>';
    html += '<span class="alert-sev">' + (a.severity === 'critical' ? '严重' : a.severity === 'warning' ? '警告' : '提示') + '</span>';
    html += '</div></div></div></div>';
  });
  html += '</div></div>';

  html += '</div>';

  container.innerHTML = html;
}

function switchTab(tab) {
  state.activeTab = tab;
  renderSidebarContent();
}

function togglePanel(panel) {
  if (panel === 'endpoints') {
    state.panelEndpointsCollapsed = !state.panelEndpointsCollapsed;
  } else if (panel === 'alerts') {
    state.panelAlertsCollapsed = !state.panelAlertsCollapsed;
  }
  renderSidebarContent();
}

// ====== Analyze ======
function handleAnalyze() {
  if (state.isAnalyzing) return;
  state.isAnalyzing = true;

  var btn = document.getElementById('btnAnalyze');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots">AI 分析中</span>';

  // Show loading overlay
  var overlay = document.getElementById('canvasOverlay');
  overlay.innerHTML = '<div class="loading-overlay" style="position:relative;inset:auto"><div><div class="spinner"></div><p>AI 正在分析项目架构<span class="loading-dots"></span></p><p class="sub">扫描文件 · 识别节点 · 构建关系 · 检测问题</p></div></div>';
  overlay.style.pointerEvents = 'auto';

  setTimeout(function() {
    state.data = mockData;
    state.isAnalyzing = false;
    state.nodePositions = computeLayout(mockData.architecture.nodes, mockData.architecture.edges);

    btn.disabled = false;
    btn.innerHTML = '分析demo项目';

    // Hide overlay
    overlay.style.display = 'none';
    overlay.style.pointerEvents = 'none';

    // Show graph
    document.getElementById('graphSvg').style.display = 'block';
    document.getElementById('canvasControls').style.display = 'flex';
    document.getElementById('btnReset').style.display = 'block';

    renderSidebarContent();
    renderGraph();

    // Fit view
    setTimeout(function() {
      fitView();
    }, 50);
  }, 2000);
}

// ====== Init ======
function init() {
  document.getElementById('btnAnalyze').addEventListener('click', handleAnalyze);

  document.getElementById('btnConfig').addEventListener('click', function() {
    state.showConfig = !state.showConfig;
    document.getElementById('configArea').style.display = state.showConfig ? 'block' : 'none';
    this.textContent = state.showConfig ? '收起配置 ▲' : '展开配置 ▼';
  });

  document.getElementById('sidebarToggle').addEventListener('click', function() {
    state.sidebarCollapsed = !state.sidebarCollapsed;
    var sidebar = document.getElementById('sidebar');
    if (state.sidebarCollapsed) {
      sidebar.classList.add('collapsed');
      this.style.left = '0';
      this.textContent = '›';
    } else {
      sidebar.classList.remove('collapsed');
      this.style.left = '340px';
      this.textContent = '‹';
    }
  });

  document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

  initPanZoom();
  renderSidebarContent();
}

// Add dash flow animation
var style = document.createElement('style');
style.textContent = '@keyframes dashflow { to { stroke-dashoffset: -18; } }';
document.head.appendChild(style);

init();
</script>
