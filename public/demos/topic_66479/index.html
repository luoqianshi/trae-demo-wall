<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智分桶 - 3D智能垃圾桶</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0f1a; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,15,26,0.95); backdrop-filter: blur(12px); padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        nav .nav-content { max-width: 1800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        nav .logo { display: flex; align-items: center; gap: 12px; }
        nav .logo-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #4ade80, #16a34a); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        nav .logo-text { font-weight: 700; font-size: 20px; background: linear-gradient(135deg, #4ade80, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav .tag { margin-left: 8px; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.1); font-size: 12px; color: #9ca3af; }
        nav .status { display: flex; align-items: center; gap: 12px; }
        nav .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
        nav .status-text { font-size: 14px; color: #d1d5db; }
        .main-content { flex: 1; display: flex; margin-top: 72px; }
        .left-panel { width: 280px; background: rgba(10,15,26,0.85); border-right: 1px solid rgba(255,255,255,0.05); padding: 20px; display: flex; flex-direction: column; z-index: 50; }
        .left-panel h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #e5e7eb; }
        .trash-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .trash-btn { display: flex; align-items: center; gap: 14px; padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.3s; }
        .trash-btn:hover { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); }
        .trash-btn.active { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.5); }
        .trash-btn .trash-emoji { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
        .trash-btn .trash-name { font-size: 13px; font-weight: 500; color: white; }
        .trash-btn .trash-category { font-size: 11px; color: #9ca3af; }
        .control-section { margin-top: auto; }
        .control-section h3 { font-size: 13px; color: #9ca3af; margin-bottom: 10px; }
        .control-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .control-btn { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .control-btn:hover { background: rgba(255,255,255,0.1); }
        .control-btn.active { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.5); }
        .center-panel { flex: 1; position: relative; background: radial-gradient(circle at 50% 50%, rgba(34,197,94,0.03) 0%, transparent 50%); }
        #canvas-container { width: 100%; height: 100%; }
        .scene-controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 8px; background: rgba(10,15,26,0.8); padding: 8px; border-radius: 12px; z-index: 50; }
        .scene-controls button { padding: 8px 14px; border: none; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-size: 11px; transition: all 0.2s; }
        .scene-controls button:hover { background: rgba(255,255,255,0.2); }
        .scene-controls button.active { background: rgba(34,197,94,0.3); color: #4ade80; }
        .right-panel { width: 320px; background: rgba(10,15,26,0.85); border-left: 1px solid rgba(255,255,255,0.05); padding: 20px; display: flex; flex-direction: column; z-index: 50; }
        .right-panel h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #e5e7eb; }
        .status-card { padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 14px; }
        .status-card .label { font-size: 12px; color: #9ca3af; }
        .status-card .value { font-size: 14px; font-weight: 600; color: #4ade80; }
        .status-card .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 6px; }
        .status-card .progress-fill { height: 100%; background: linear-gradient(90deg, #4ade80, #22c55e); border-radius: 3px; }
        .bin-status-section h3 { font-size: 13px; color: #9ca3af; margin-bottom: 10px; }
        .bin-status-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .bin-status-item { padding: 10px; border-radius: 10px; }
        .bin-status-item.blue { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); }
        .bin-status-item.red { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }
        .bin-status-item.green { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); }
        .bin-status-item.gray { background: rgba(107,114,128,0.1); border: 1px solid rgba(107,114,128,0.2); }
        .bin-status-item .name { font-size: 11px; font-weight: 500; }
        .bin-status-item.blue .name { color: #60a5fa; }
        .bin-status-item.red .name { color: #f87171; }
        .bin-status-item.green .name { color: #4ade80; }
        .bin-status-item.gray .name { color: #9ca3af; }
        .bin-status-item .count { font-size: 11px; color: #9ca3af; }
        .bin-status-item .bin-progress { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .bin-fill { height: 100%; border-radius: 2px; }
        .bin-status-item.blue .bin-fill { background: #60a5fa; }
        .bin-status-item.red .bin-fill { background: #f87171; }
        .bin-status-item.green .bin-fill { background: #4ade80; }
        .bin-status-item.gray .bin-fill { background: #9ca3af; }
        .log-section { margin-top: auto; }
        .log-section h3 { font-size: 13px; color: #9ca3af; margin-bottom: 10px; }
        .log-container { height: 120px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; overflow-y: auto; font-size: 11px; }
        .log-item { margin-bottom: 5px; color: #9ca3af; }
        .log-item.success { color: #4ade80; }
        .log-item.warning { color: #fbbf24; }
        .log-item.info { color: #60a5fa; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <div class="logo">
                <div class="logo-icon">AI</div>
                <span class="logo-text">AI智分桶</span>
                <span class="tag">3D智能垃圾桶</span>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span class="status-text">系统正常运行中</span>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="left-panel">
            <h2>投放垃圾</h2>
            <div class="trash-grid">
                <button class="trash-btn" onclick="selectTrash('bottle')"><div class="trash-emoji" style="background:rgba(59,130,246,0.2)">🍾</div><div><div class="trash-name">塑料瓶</div><div class="trash-category">可回收物</div></div></button>
                <button class="trash-btn" onclick="selectTrash('battery')"><div class="trash-emoji" style="background:rgba(239,68,68,0.2)">🔋</div><div><div class="trash-name">废电池</div><div class="trash-category">有害垃圾</div></div></button>
                <button class="trash-btn" onclick="selectTrash('apple')"><div class="trash-emoji" style="background:rgba(34,197,94,0.2)">🍎</div><div><div class="trash-name">苹果核</div><div class="trash-category">厨余垃圾</div></div></button>
                <button class="trash-btn" onclick="selectTrash('tissue')"><div class="trash-emoji" style="background:rgba(107,114,128,0.2)">🧻</div><div><div class="trash-name">用过的纸巾</div><div class="trash-category">其他垃圾</div></div></button>
                <button class="trash-btn" onclick="selectTrash('can')"><div class="trash-emoji" style="background:rgba(59,130,246,0.2)">🥫</div><div><div class="trash-name">易拉罐</div><div class="trash-category">可回收物</div></div></button>
                <button class="trash-btn" onclick="selectTrash('lightbulb')"><div class="trash-emoji" style="background:rgba(239,68,68,0.2)">💡</div><div><div class="trash-name">废灯泡</div><div class="trash-category">有害垃圾</div></div></button>
            </div>
            <div class="control-section">
                <h3>系统控制</h3>
                <div class="control-buttons">
                    <button class="control-btn" onclick="resetSimulation()">重置</button>
                    <button class="control-btn" onclick="toggleAutoMode()" id="auto-mode-btn">自动模式</button>
                </div>
            </div>
        </div>

        <div class="center-panel">
            <div id="canvas-container"></div>
            <div class="scene-controls">
                <button onclick="resetCamera()">重置视角</button>
                <button onclick="toggleRotation()" id="rotate-btn">自动旋转</button>
                <button onclick="toggleSectionView()" id="section-btn">剖面视图</button>
            </div>
        </div>

        <div class="right-panel">
            <h2>实时状态</h2>
            <div class="status-card">
                <div style="display:flex;justify-content:space-between"><span class="label">太阳能电量</span><span class="value" id="power-text">85%</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:85%" id="power-bar"></div></div>
            </div>
            <div class="status-card">
                <div style="display:flex;justify-content:space-between"><span class="label">AI识别准确率</span><span class="value">98.5%</span></div>
            </div>
            <div class="bin-status-section">
                <h3>分类仓状态</h3>
                <div class="bin-status-list">
                    <div class="bin-status-item blue"><div style="display:flex;justify-content:space-between"><span class="name">可回收物仓</span><span class="count" id="blue-count">0/50</span></div><div class="bin-progress"><div class="bin-fill" id="blue-bar"></div></div></div>
                    <div class="bin-status-item red"><div style="display:flex;justify-content:space-between"><span class="name">有害垃圾仓</span><span class="count" id="red-count">0/20</span></div><div class="bin-progress"><div class="bin-fill" id="red-bar"></div></div></div>
                    <div class="bin-status-item green"><div style="display:flex;justify-content:space-between"><span class="name">厨余垃圾仓</span><span class="count" id="green-count">0/80</span></div><div class="bin-progress"><div class="bin-fill" id="green-bar"></div></div></div>
                    <div class="bin-status-item gray"><div style="display:flex;justify-content:space-between"><span class="name">其他垃圾仓</span><span class="count" id="gray-count">0/60</span></div><div class="bin-progress"><div class="bin-fill" id="gray-bar"></div></div></div>
                </div>
            </div>
            <div class="log-section">
                <h3>识别日志</h3>
                <div class="log-container" id="log-container">
                    <div class="log-item">系统启动完成</div>
                    <div class="log-item">3D智能垃圾桶模型加载</div>
                    <div class="log-item info">传送带系统就绪</div>
                    <div class="log-item success">等待垃圾投放...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const trashData = {
            bottle: { name: '塑料瓶', category: '可回收物', color: 'blue', maxCount: 50, meshColor: 0x3b82f6 },
            battery: { name: '废电池', category: '有害垃圾', color: 'red', maxCount: 20, meshColor: 0xef4444 },
            apple: { name: '苹果核', category: '厨余垃圾', color: 'green', maxCount: 80, meshColor: 0x22c55e },
            tissue: { name: '用过的纸巾', category: '其他垃圾', color: 'gray', maxCount: 60, meshColor: 0x6b7280 },
            can: { name: '易拉罐', category: '可回收物', color: 'blue', maxCount: 50, meshColor: 0x60a5fa },
            lightbulb: { name: '废灯泡', category: '有害垃圾', color: 'red', maxCount: 20, meshColor: 0xfbbf24 }
        };

        const binCounts = { blue: 0, red: 0, green: 0, gray: 0 };
        let selectedTrash = null;
        let isProcessing = false;
        let autoMode = false;
        let autoRotate = false;
        let sectionView = false;

        let scene, camera, renderer, controls;
        let binGroup, solarPanel, lidMesh, trashMesh;
        let scanLine, conveyorBelt;
        let compartments = [];
        let animationId;
        let displayScreen, displayCanvas, displayCtx, displayTexture;

        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0f1a);
            scene.fog = new THREE.Fog(0x0a0f1a, 10, 40);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(5, 4, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 4;
            controls.maxDistance = 20;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 15, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x4ade80, 0.4);
            pointLight.position.set(0, 3, 0);
            scene.add(pointLight);

            createFloor();
            createBin();
            createSolarPanel();
            createConveyorSystem();
            createCompartmentLabels();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createFloor() {
            const geometry = new THREE.CircleGeometry(12, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.8 });
            const floor = new THREE.Mesh(geometry, material);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -0.1;
            floor.receiveShadow = true;
            scene.add(floor);

            const gridHelper = new THREE.GridHelper(24, 24, 0x1f2937, 0x0f172a);
            gridHelper.position.y = -0.09;
            scene.add(gridHelper);
        }

        function createBin() {
            binGroup = new THREE.Group();

            const bodyGeometry = new THREE.BoxGeometry(1.8, 2.5, 2.2);
            const bodyMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x374151, 
                roughness: 0.5,
                opacity: 0.85,
                transparent: true
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 1.25;
            body.castShadow = true;
            body.receiveShadow = true;
            binGroup.add(body);

            const frameGeometry = new THREE.BoxGeometry(1.9, 2.6, 2.3);
            const frameMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x4b5563,
                wireframe: true,
                opacity: 0.3
            });
            const frame = new THREE.Mesh(frameGeometry, frameMaterial);
            frame.position.y = 1.3;
            binGroup.add(frame);

            const openingHeight = 0.8;
            const openingWidth = 1.0;
            const openingDepth = 0.35;
            const openingY = 1.2;

            const openingFrameGeometry = new THREE.BoxGeometry(openingWidth + 0.08, openingHeight + 0.08, 0.05);
            const openingFrameMaterial = new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.3 });
            const openingFrame = new THREE.Mesh(openingFrameGeometry, openingFrameMaterial);
            openingFrame.position.set(0, openingY, 1.02);
            openingFrame.castShadow = true;
            binGroup.add(openingFrame);

            const openingGeometry = new THREE.BoxGeometry(openingWidth, openingHeight, openingDepth);
            const openingMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x0f172a, 
                roughness: 0.9 
            });
            const opening = new THREE.Mesh(openingGeometry, openingMaterial);
            opening.position.set(0, openingY, 1.05);
            binGroup.add(opening);

            const openingLightGeometry = new THREE.BoxGeometry(openingWidth - 0.1, 0.03, 0.1);
            const openingLightMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x4ade80,
                transparent: true,
                opacity: 0.8
            });
            const openingLight = new THREE.Mesh(openingLightGeometry, openingLightMaterial);
            openingLight.position.set(0, openingY + openingHeight / 2 - 0.02, 1.08);
            binGroup.add(openingLight);

            const openingEdgeGeometry = new THREE.BoxGeometry(openingWidth + 0.05, 0.05, openingDepth + 0.1);
            const openingEdgeMaterial = new THREE.MeshBasicMaterial({ color: 0xfbbf24 });
            const openingTopEdge = new THREE.Mesh(openingEdgeGeometry, openingEdgeMaterial);
            openingTopEdge.position.set(0, openingY + openingHeight / 2 + 0.02, 1.05);
            binGroup.add(openingTopEdge);

            const openingLeftEdge = new THREE.Mesh(
                new THREE.BoxGeometry(0.05, openingHeight + 0.05, openingDepth + 0.1),
                openingEdgeMaterial
            );
            openingLeftEdge.position.set(-openingWidth / 2 - 0.02, openingY, 1.05);
            binGroup.add(openingLeftEdge);

            const openingRightEdge = new THREE.Mesh(
                new THREE.BoxGeometry(0.05, openingHeight + 0.05, openingDepth + 0.1),
                openingEdgeMaterial
            );
            openingRightEdge.position.set(openingWidth / 2 + 0.02, openingY, 1.05);
            binGroup.add(openingRightEdge);

            const lidGeometry = new THREE.BoxGeometry(openingWidth + 0.1, 0.15, openingDepth + 0.1);
            const lidMaterial = new THREE.MeshStandardMaterial({ color: 0x4b5563, roughness: 0.4 });
            lidMesh = new THREE.Mesh(lidGeometry, lidMaterial);
            lidMesh.position.set(0, openingY + openingHeight / 2 + 0.075, 1.05);
            lidMesh.castShadow = true;
            lidMesh.name = 'lid';
            binGroup.add(lidMesh);

            const handleGeometry = new THREE.CylinderGeometry(0.03, 0.03, 0.3, 16);
            const handleMaterial = new THREE.MeshStandardMaterial({ color: 0x60a5fa });
            const handle = new THREE.Mesh(handleGeometry, handleMaterial);
            handle.rotation.z = Math.PI / 2;
            handle.position.set(0, openingY + openingHeight / 2 + 0.2, 1.15);
            handle.castShadow = true;
            lidMesh.add(handle);

            const lipGeometry = new THREE.BoxGeometry(1.9, 0.1, 2.3);
            const lipMaterial = new THREE.MeshStandardMaterial({ color: 0x4b5563, roughness: 0.3 });
            const lip = new THREE.Mesh(lipGeometry, lipMaterial);
            lip.position.set(0, 2.55, 0);
            lip.castShadow = true;
            binGroup.add(lip);

            const bottomGeometry = new THREE.BoxGeometry(1.9, 0.1, 2.3);
            const bottomMaterial = new THREE.MeshStandardMaterial({ color: 0x374151, roughness: 0.6 });
            const bottom = new THREE.Mesh(bottomGeometry, bottomMaterial);
            bottom.position.set(0, 0.05, 0);
            bottom.receiveShadow = true;
            binGroup.add(bottom);

            createDisplayScreen();

            scene.add(binGroup);
        }

        function createDisplayScreen() {
            displayCanvas = document.createElement('canvas');
            displayCanvas.width = 256;
            displayCanvas.height = 192;
            displayCtx = displayCanvas.getContext('2d');

            displayTexture = new THREE.CanvasTexture(displayCanvas);
            displayTexture.needsUpdate = true;

            const displayGeometry = new THREE.PlaneGeometry(0.8, 0.6);
            const displayMaterial = new THREE.MeshBasicMaterial({ 
                map: displayTexture, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.95
            });
            displayScreen = new THREE.Mesh(displayGeometry, displayMaterial);
            displayScreen.position.set(0, 2.1, 1.15);
            displayScreen.rotation.y = Math.PI;
            binGroup.add(displayScreen);

            const displayFrameGeometry = new THREE.BoxGeometry(0.85, 0.65, 0.03);
            const displayFrameMaterial = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.6 });
            const displayFrame = new THREE.Mesh(displayFrameGeometry, displayFrameMaterial);
            displayFrame.position.set(0, 2.1, 1.135);
            displayFrame.rotation.y = Math.PI;
            binGroup.add(displayFrame);

            updateDisplay('idle');
        }

        function updateDisplay(state, data = null) {
            displayCtx.fillStyle = '#000000';
            displayCtx.fillRect(0, 0, 256, 192);

            displayCtx.save();
            displayCtx.scale(-1, 1);
            displayCtx.translate(-256, 0);

            displayCtx.fillStyle = '#ffffff';
            displayCtx.font = 'bold 18px Arial';
            displayCtx.textAlign = 'center';
            displayCtx.fillText('AI智分桶', 128, 25);

            if (state === 'idle') {
                displayCtx.fillStyle = '#4ade80';
                displayCtx.font = '16px Arial';
                displayCtx.fillText('等待投放', 128, 55);
                
                displayCtx.fillStyle = '#9ca3af';
                displayCtx.font = '12px Arial';
                displayCtx.fillText('电量: 85%', 128, 80);
                displayCtx.fillText('准确率: 98.5%', 128, 100);
            } else if (state === 'receiving') {
                displayCtx.fillStyle = '#60a5fa';
                displayCtx.font = '16px Arial';
                displayCtx.fillText('正在接收...', 128, 55);
                
                displayCtx.fillStyle = '#fbbf24';
                displayCtx.font = '14px Arial';
                displayCtx.fillText('盖子已打开', 128, 85);
            } else if (state === 'scanning') {
                displayCtx.fillStyle = '#ef4444';
                displayCtx.font = '16px Arial';
                displayCtx.fillText('红外线扫描', 128, 50);
                
                const scanProgress = Math.sin(Date.now() * 0.01) * 0.5 + 0.5;
                displayCtx.fillStyle = '#ef4444';
                displayCtx.fillRect(30, 70, 196 * scanProgress, 12);
                displayCtx.fillStyle = '#ffffff';
                displayCtx.font = '12px Arial';
                displayCtx.fillText(Math.round(scanProgress * 100) + '%', 128, 95);
            } else if (state === 'identifying') {
                displayCtx.fillStyle = '#fbbf24';
                displayCtx.font = '16px Arial';
                displayCtx.fillText('AI识别中', 128, 50);
                
                displayCtx.fillStyle = '#fbbf24';
                displayCtx.font = '20px Arial';
                const dots = '.'.repeat(Math.floor(Date.now() * 0.003) % 4);
                displayCtx.fillText(`AI${dots}`, 128, 85);
            } else if (state === 'sorting') {
                displayCtx.fillStyle = '#60a5fa';
                displayCtx.font = '16px Arial';
                displayCtx.fillText(`传送: ${data.category}`, 128, 50);
                
                displayCtx.fillStyle = '#ffffff';
                displayCtx.font = '18px Arial';
                displayCtx.fillText(data.name, 128, 85);
            } else if (state === 'complete') {
                displayCtx.fillStyle = '#4ade80';
                displayCtx.font = 'bold 18px Arial';
                displayCtx.fillText('分类成功!', 128, 35);
                
                displayCtx.fillStyle = '#ffffff';
                displayCtx.font = '14px Arial';
                displayCtx.fillText(`名称: ${data.name}`, 128, 60);
                displayCtx.fillText(`分类: ${data.category}`, 128, 80);

                displayCtx.fillStyle = '#9ca3af';
                displayCtx.font = '11px Arial';
                displayCtx.fillText('--- 容量 ---', 128, 100);
                
                const categories = [
                    { name: '可回收', color: '#60a5fa', key: 'blue' },
                    { name: '有害', color: '#f87171', key: 'red' },
                    { name: '厨余', color: '#4ade80', key: 'green' },
                    { name: '其他', color: '#9ca3af', key: 'gray' }
                ];
                
                categories.forEach((cat, i) => {
                    const max = trashData[Object.keys(trashData).find(k => trashData[k].color === cat.key)].maxCount;
                    const count = binCounts[cat.key];
                    const percent = Math.min((count / max) * 100, 100);
                    
                    displayCtx.fillStyle = cat.color;
                    displayCtx.font = '11px Arial';
                    displayCtx.textAlign = 'left';
                    displayCtx.fillText(`${cat.name}: ${count}/${max}`, 20, 140 + i * 12);
                    displayCtx.fillRect(130, 137 + i * 12, percent * 0.9, 6);
                });
            }

            displayCtx.restore();
            displayTexture.needsUpdate = true;
        }

        function createSolarPanel() {
            const panelGroup = new THREE.Group();
            panelGroup.position.set(0, 2.7, 0);

            const panelGeometry = new THREE.BoxGeometry(1.3, 0.05, 0.8);
            const panelMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x0f172a, 
                roughness: 0.2,
                metalness: 0.8
            });
            const panel = new THREE.Mesh(panelGeometry, panelMaterial);
            panel.rotation.x = -0.15;
            panel.castShadow = true;
            panelGroup.add(panel);

            for (let i = 0; i < 6; i++) {
                for (let j = 0; j < 4; j++) {
                    const cellGeometry = new THREE.BoxGeometry(0.18, 0.03, 0.16);
                    const cellMaterial = new THREE.MeshStandardMaterial({ 
                        color: 0x3b82f6, 
                        roughness: 0.1,
                        metalness: 0.6,
                        opacity: 0.8,
                        transparent: true
                    });
                    const cell = new THREE.Mesh(cellGeometry, cellMaterial);
                    cell.position.set((i - 2.5) * 0.2, 0.01, (j - 1.5) * 0.2);
                    panelGroup.add(cell);
                }
            }

            const frameGeometry = new THREE.BoxGeometry(1.35, 0.08, 0.85);
            const frameMaterial = new THREE.MeshBasicMaterial({ color: 0x6b7280, wireframe: true });
            const frame = new THREE.Mesh(frameGeometry, frameMaterial);
            frame.rotation.x = -0.15;
            panelGroup.add(frame);

            const supportGeometry = new THREE.BoxGeometry(0.05, 0.3, 0.6);
            const supportMaterial = new THREE.MeshStandardMaterial({ color: 0x4b5563 });
            const support = new THREE.Mesh(supportGeometry, supportMaterial);
            support.position.set(0, -0.15, 0);
            panelGroup.add(support);

            scene.add(panelGroup);
            solarPanel = panelGroup;
        }

        function createConveyorSystem() {
            const conveyorGroup = new THREE.Group();
            conveyorGroup.position.y = 0.8;

            const platformGeometry = new THREE.BoxGeometry(0.6, 0.05, 0.6);
            const platformMaterial = new THREE.MeshStandardMaterial({ color: 0x6b7280, roughness: 0.5 });
            const platform = new THREE.Mesh(platformGeometry, platformMaterial);
            platform.position.set(0, 0, 0.3);
            platform.receiveShadow = true;
            conveyorGroup.add(platform);

            const scanFrameGeometry = new THREE.BoxGeometry(0.7, 0.4, 0.7);
            const scanFrameMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x9ca3af,
                wireframe: true,
                opacity: 0.5
            });
            const scanFrame = new THREE.Mesh(scanFrameGeometry, scanFrameMaterial);
            scanFrame.position.set(0, 0.2, 0.3);
            conveyorGroup.add(scanFrame);

            const scanLineGeometry = new THREE.BoxGeometry(0.5, 0.02, 0.5);
            const scanLineMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xef4444,
                transparent: true,
                opacity: 0.8
            });
            scanLine = new THREE.Mesh(scanLineGeometry, scanLineMaterial);
            scanLine.position.set(0, 0.35, 0.3);
            scanLine.visible = false;
            conveyorGroup.add(scanLine);

            const conveyorGeometry = new THREE.BoxGeometry(0.5, 0.08, 1.5);
            const conveyorMaterial = new THREE.MeshStandardMaterial({ color: 0x4b5563, roughness: 0.6 });

            const belts = [
                { pos: [-0.6, 0, -0.3], rot: 0, color: 0x3b82f6, name: 'blue' },
                { pos: [0.6, 0, -0.3], rot: 0, color: 0xef4444, name: 'red' },
                { pos: [-0.2, 0, -0.3], rot: 0, color: 0x22c55e, name: 'green' },
                { pos: [0.2, 0, -0.3], rot: 0, color: 0x6b7280, name: 'gray' }
            ];

            belts.forEach(belt => {
                const beltMesh = new THREE.Mesh(conveyorGeometry, conveyorMaterial.clone());
                beltMesh.position.set(belt.pos[0], belt.pos[1], belt.pos[2]);
                beltMesh.rotation.y = belt.rot;
                beltMesh.receiveShadow = true;
                beltMesh.name = `conveyor-${belt.name}`;
                conveyorGroup.add(beltMesh);

                const beltLineGeometry = new THREE.BoxGeometry(0.45, 0.06, 0.1);
                const beltLineMaterial = new THREE.MeshStandardMaterial({ color: belt.color });
                for (let i = 0; i < 6; i++) {
                    const line = new THREE.Mesh(beltLineGeometry, beltLineMaterial.clone());
                    line.position.set(belt.pos[0], belt.pos[1] + 0.02, belt.pos[2] - 0.6 + i * 0.25);
                    line.rotation.y = belt.rot;
                    conveyorGroup.add(line);
                }
            });

            const compartmentColors = [0x3b82f6, 0xef4444, 0x22c55e, 0x6b7280];
            const compartmentPositions = [
                [-0.6, 0, -1.0], [0.6, 0, -1.0],
                [-0.2, 0, -1.0], [0.2, 0, -1.0]
            ];

            compartmentColors.forEach((color, index) => {
                const compGeometry = new THREE.BoxGeometry(0.55, 1.2, 0.55);
                const compMaterial = new THREE.MeshStandardMaterial({ 
                    color: color, 
                    opacity: 0.5, 
                    transparent: true,
                    roughness: 0.6 
                });
                const comp = new THREE.Mesh(compGeometry, compMaterial);
                comp.position.set(compartmentPositions[index][0], -0.2, compartmentPositions[index][2]);
                comp.receiveShadow = true;
                conveyorGroup.add(comp);

                const levelGeometry = new THREE.BoxGeometry(0.5, 0.05, 0.5);
                const levelMaterial = new THREE.MeshStandardMaterial({ color: color });
                const level = new THREE.Mesh(levelGeometry, levelMaterial);
                level.position.set(compartmentPositions[index][0], -0.8, compartmentPositions[index][2]);
                level.name = `level-${['blue', 'red', 'green', 'gray'][index]}`;
                level.scale.y = 0;
                conveyorGroup.add(level);
                compartments.push(level);
            });

            scene.add(conveyorGroup);
            conveyorBelt = conveyorGroup;
        }

        function createCompartmentLabels() {
            const names = ['可回收', '有害', '厨余', '其他'];
            const positions = [
                [-0.6, 0.5, -1.4], [0.6, 0.5, -1.4],
                [-0.2, 0.5, -1.4], [0.2, 0.5, -1.4]
            ];

            names.forEach((name, index) => {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 128, 64);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(name, 64, 40);
                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(material);
                sprite.position.set(positions[index][0], positions[index][1], positions[index][2]);
                sprite.scale.set(0.5, 0.25, 1);
                binGroup.add(sprite);
            });
        }

        function createTrash(type) {
            if (trashMesh) scene.remove(trashMesh);

            const data = trashData[type];
            let geometry;
            
            if (type === 'bottle') {
                geometry = new THREE.CylinderGeometry(0.08, 0.06, 0.25, 16);
            } else if (type === 'can') {
                geometry = new THREE.CylinderGeometry(0.06, 0.06, 0.18, 16);
            } else if (type === 'battery') {
                geometry = new THREE.BoxGeometry(0.04, 0.2, 0.08);
            } else if (type === 'apple') {
                geometry = new THREE.SphereGeometry(0.1, 16, 16);
            } else if (type === 'lightbulb') {
                geometry = new THREE.SphereGeometry(0.08, 16, 16);
            } else {
                geometry = new THREE.BoxGeometry(0.15, 0.06, 0.12);
            }

            const material = new THREE.MeshStandardMaterial({ color: data.meshColor });
            trashMesh = new THREE.Mesh(geometry, material);
            trashMesh.position.set(0, 2.5, 0.5);
            trashMesh.castShadow = true;
            scene.add(trashMesh);
        }

        function updateLid(open) {
            if (!lidMesh) return;
            const targetY = open ? 1.6 : 1.4;
            const duration = 300;
            const startY = lidMesh.position.y;
            const startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                lidMesh.position.y = startY + (targetY - startY) * progress;
                
                if (progress < 1) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        function updateCompartmentLevel(color, percentage) {
            const level = conveyorBelt.getObjectByName(`level-${color}`);
            if (level) {
                level.scale.y = Math.min(percentage / 100 * 10, 10);
                level.position.y = -0.8 + (level.scale.y * 0.06);
            }
        }

        function toggleSectionView() {
            sectionView = !sectionView;
            const btn = document.getElementById('section-btn');
            btn.classList.toggle('active', sectionView);
            
            if (sectionView) {
                scene.remove(binGroup);
            } else {
                scene.add(binGroup);
            }
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            controls.update();

            if (autoRotate) {
                if (binGroup) binGroup.rotation.y += 0.005;
                if (conveyorBelt) conveyorBelt.rotation.y += 0.005;
                if (solarPanel) solarPanel.rotation.y += 0.005;
            }

            renderer.render(scene, camera);
        }

        function resetCamera() {
            camera.position.set(5, 4, 6);
            controls.target.set(0, 1.5, 0);
            controls.update();
        }

        function toggleRotation() {
            autoRotate = !autoRotate;
            const btn = document.getElementById('rotate-btn');
            btn.classList.toggle('active', autoRotate);
        }

        function selectTrash(type) {
            if (isProcessing) return;
            selectedTrash = type;
            document.querySelectorAll('.trash-btn').forEach(btn => btn.classList.remove('active'));
            if (event) event.currentTarget.classList.add('active');
            setTimeout(startProcessing, 500);
        }

        function startProcessing() {
            if (!selectedTrash || isProcessing) return;
            isProcessing = true;
            const data = trashData[selectedTrash];
            
            addLog(`检测到垃圾: ${data.name}`, 'info');
            createTrash(selectedTrash);
            updateLid(true);
            updateDisplay('receiving');
            
            setTimeout(() => {
                let dropY = 2.5;
                const dropDuration = 800;
                const dropStart = Date.now();
                
                function dropTrash() {
                    const elapsed = Date.now() - dropStart;
                    const progress = Math.min(elapsed / dropDuration, 1);
                    dropY = 2.5 - (1.5 * progress);
                    trashMesh.position.y = dropY;
                    
                    if (progress < 1) requestAnimationFrame(dropTrash);
                    else {
                        addLog('垃圾到达扫描平台', 'info');
                        startIRScan();
                    }
                }
                requestAnimationFrame(dropTrash);
            }, 400);
        }

        function startIRScan() {
            addLog('红外线扫描开始...', 'info');
            scanLine.visible = true;
            updateDisplay('scanning');
            
            let scanY = 0.35;
            const scanDuration = 1500;
            const scanStart = Date.now();
            
            let lastScanUpdate = Date.now();
            
            function scan() {
                const elapsed = Date.now() - scanStart;
                const progress = Math.min(elapsed / scanDuration, 1);
                scanY = 0.35 - (0.5 * progress);
                scanLine.position.y = scanY;
                
                if (progress < 1) {
                    const now = Date.now();
                    if (now - lastScanUpdate > 100) {
                        updateDisplay('scanning');
                        lastScanUpdate = now;
                    }
                    requestAnimationFrame(scan);
                } else {
                    scanLine.visible = false;
                    addLog('扫描完成，AI识别中...', 'warning');
                    updateDisplay('identifying');
                    setTimeout(() => {
                        const data = trashData[selectedTrash];
                        addLog(`识别结果: ${data.category}`, 'success');
                        moveToConveyor();
                    }, 1000);
                }
            }
            requestAnimationFrame(scan);
        }

        function moveToConveyor() {
            const data = trashData[selectedTrash];
            let targetPos = { x: 0, z: 0 };
            
            switch(data.color) {
                case 'blue': targetPos = { x: -0.6, z: -1.0 }; break;
                case 'red': targetPos = { x: 0.6, z: -1.0 }; break;
                case 'green': targetPos = { x: -0.2, z: -1.0 }; break;
                case 'gray': targetPos = { x: 0.2, z: -1.0 }; break;
            }
            
            updateDisplay('sorting', data);
            
            const moveDuration = 1500;
            const moveStart = Date.now();
            const startX = trashMesh.position.x;
            const startZ = trashMesh.position.z;
            
            trashMesh.position.y = 0.85;
            
            function move() {
                const elapsed = Date.now() - moveStart;
                const progress = Math.min(elapsed / moveDuration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                
                trashMesh.position.x = startX + (targetPos.x - startX) * eased;
                trashMesh.position.z = startZ + (targetPos.z - startZ) * eased;
                
                if (progress < 1) requestAnimationFrame(move);
                else {
                    dropIntoBin(data.color);
                }
            }
            requestAnimationFrame(move);
        }

        function dropIntoBin(color) {
            const data = trashData[selectedTrash];
            const dropDuration = 500;
            const dropStart = Date.now();
            const startY = trashMesh.position.y;
            
            function drop() {
                const elapsed = Date.now() - dropStart;
                const progress = Math.min(elapsed / dropDuration, 1);
                trashMesh.position.y = startY - (1.2 * progress);
                
                if (progress < 1) requestAnimationFrame(drop);
                else {
                    scene.remove(trashMesh);
                    
                    binCounts[color]++;
                    const percentage = Math.min((binCounts[color] / data.maxCount) * 100, 100);
                    updateCompartmentLevel(color, percentage);
                    updateBinDisplay(color, data.maxCount);
                    
                    addLog(`已投放至${data.category}仓`, 'success');
                    updateDisplay('complete', data);
                    
                    setTimeout(() => {
                        updateLid(false);
                        isProcessing = false;
                        selectedTrash = null;
                        document.querySelectorAll('.trash-btn').forEach(btn => btn.classList.remove('active'));
                        
                        setTimeout(() => {
                            updateDisplay('idle');
                        }, 2000);
                        
                        if (autoMode) {
                            setTimeout(() => {
                                const types = Object.keys(trashData);
                                const randomType = types[Math.floor(Math.random() * types.length)];
                                selectedTrash = randomType;
                                setTimeout(startProcessing, 500);
                            }, 1500);
                        }
                    }, 300);
                }
            }
            requestAnimationFrame(drop);
        }

        function updateBinDisplay(color, maxCount) {
            const count = binCounts[color];
            const percentage = Math.min((count / maxCount) * 100, 100);
            document.getElementById(`${color}-count`).textContent = `${count}/${maxCount}`;
            document.getElementById(`${color}-bar`).style.width = percentage + '%';
        }

        function addLog(message, type = '') {
            const container = document.getElementById('log-container');
            const item = document.createElement('div');
            item.className = 'log-item' + (type === 'success' ? ' success' : type === 'warning' ? ' warning' : type === 'info' ? ' info' : '');
            item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.appendChild(item);
            container.scrollTop = container.scrollHeight;
            if (container.children.length > 20) container.removeChild(container.firstChild);
        }

        function resetSimulation() {
            if (isProcessing) return;
            binCounts.blue = binCounts.red = binCounts.green = binCounts.gray = 0;
            
            ['blue', 'red', 'green', 'gray'].forEach(color => {
                updateCompartmentLevel(color, 0);
                updateBinDisplay(color, trashData[Object.keys(trashData).find(k => trashData[k].color === color)].maxCount);
            });
            
            if (trashMesh) scene.remove(trashMesh);
            updateLid(false);
            addLog('系统已重置');
        }

        function toggleAutoMode() {
            autoMode = !autoMode;
            const btn = document.getElementById('auto-mode-btn');
            btn.classList.toggle('active', autoMode);
            addLog(autoMode ? '自动模式已开启' : '自动模式已关闭');
            
            if (autoMode) {
                const types = Object.keys(trashData);
                setTimeout(() => {
                    const btn = document.querySelector(`.trash-btn[onclick="selectTrash('${types[Math.floor(Math.random() * types.length)]}')"]`);
                    if (btn) btn.click();
                }, 500);
            }
        }

        initThreeJS();
    </script>
</body>
</html>
