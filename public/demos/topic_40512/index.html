<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能生活倒计时 - Demo</title>
    <style>
        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --ink: #f1f5f9;
            --muted: #94a3b8;
            --rule: #334155;
            --accent: #f59e0b;
            --accent2: #06b6d4;
            --danger: #ef4444;
            --success: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        
        /* Header */
        .header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid var(--rule);
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .header p { color: var(--muted); }
        
        /* Nav Tabs */
        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-tab {
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--rule);
            border-radius: 8px;
            background: var(--bg2);
            color: var(--muted);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .nav-tab:hover, .nav-tab.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(245,158,11,0.1);
        }
        
        /* Section */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Card */
        .card {
            background: var(--bg2);
            border: 1px solid var(--rule);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-size: 1.25rem;
            color: var(--accent2);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Life Progress */
        .life-visual {
            text-align: center;
            padding: 2rem;
        }
        .life-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(var(--accent) var(--progress), var(--rule) var(--progress));
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .life-circle::before {
            content: '';
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--bg2);
        }
        .life-circle-inner {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .life-circle-inner .percent { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
        .life-circle-inner .label { font-size: 0.875rem; color: var(--muted); }
        .life-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .life-stat {
            text-align: center;
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
        }
        .life-stat .number { font-size: 1.5rem; font-weight: 700; color: var(--accent2); }
        .life-stat .label { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }
        
        /* Input Group */
        .input-group {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .input-group label { color: var(--muted); font-size: 0.9rem; min-width: 80px; }
        .input-group input, .input-group select {
            flex: 1;
            min-width: 150px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--rule);
            border-radius: 8px;
            background: var(--bg);
            color: var(--ink);
            font-size: 1rem;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: var(--bg);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary {
            background: var(--bg);
            border: 1px solid var(--rule);
            color: var(--ink);
        }
        
        /* Countdown List */
        .countdown-list { display: flex; flex-direction: column; gap: 1rem; }
        .countdown-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }
        .countdown-item .emoji { font-size: 2rem; }
        .countdown-item .info { flex: 1; }
        .countdown-item .info h4 { color: var(--ink); margin-bottom: 0.25rem; }
        .countdown-item .info p { color: var(--muted); font-size: 0.875rem; }
        .countdown-item .days {
            text-align: right;
            min-width: 80px;
        }
        .countdown-item .days .num {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent);
        }
        .countdown-item .days .unit { font-size: 0.75rem; color: var(--muted); }
        .countdown-item.urgent { border-left-color: var(--danger); }
        .countdown-item.urgent .days .num { color: var(--danger); }
        .countdown-item.soon { border-left-color: var(--success); }
        .countdown-item.soon .days .num { color: var(--success); }
        
        /* Goal Tracker */
        .goal-item {
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .goal-item h4 { color: var(--ink); margin-bottom: 0.5rem; }
        .goal-item p { color: var(--muted); font-size: 0.875rem; margin-bottom: 0.75rem; }
        .progress-bar {
            height: 8px;
            background: var(--rule);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 4px;
            transition: width 0.5s;
        }
        .goal-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--muted);
        }
        
        /* Daily Advice */
        .advice-card {
            background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(6,182,212,0.1));
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
        }
        .advice-card .icon { font-size: 3rem; margin-bottom: 1rem; }
        .advice-card h3 { color: var(--accent); margin-bottom: 1rem; }
        .advice-card p { color: var(--muted); font-size: 1.1rem; line-height: 1.8; }
        .advice-card .date { color: var(--muted); font-size: 0.875rem; margin-top: 1rem; }
        
        /* Add Button */
        .add-btn {
            width: 100%;
            padding: 1rem;
            border: 2px dashed var(--rule);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .add-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg2);
            border: 1px solid var(--rule);
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 { color: var(--ink); margin-bottom: 1.5rem; }
        .modal .form-group { margin-bottom: 1rem; }
        .modal .form-group label { display: block; color: var(--muted); margin-bottom: 0.5rem; font-size: 0.9rem; }
        .modal .form-group input, .modal .form-group select, .modal .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--rule);
            border-radius: 8px;
            background: var(--bg);
            color: var(--ink);
            font-size: 1rem;
        }
        .modal .form-group textarea { min-height: 80px; resize: vertical; }
        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .life-stats { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.5rem; }
            .nav-tab { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
        
        /* Delete btn */
        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .delete-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>智能生活倒计时</h1>
            <p>让每一个重要时刻，都被温柔以待</p>
        </div>
        
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showSection('life')">&#127744; 生命历程</button>
            <button class="nav-tab" onclick="showSection('countdown')">&#9200; 纪念日</button>
            <button class="nav-tab" onclick="showSection('goals')">&#127942; 目标追踪</button>
            <button class="nav-tab" onclick="showSection('advice')">&#128161; 每日建议</button>
        </div>
        
        <!-- Life Section -->
        <div id="life" class="section active">
            <div class="card">
                <h2>&#127744; 你的生命历程</h2>
                <div class="input-group">
                    <label>出生日期</label>
                    <input type="date" id="birthDate" value="1995-01-01">
                </div>
                <div class="input-group">
                    <label>预期寿命</label>
                    <select id="lifeExpectancy">
                        <option value="75">75 岁</option>
                        <option value="80" selected>80 岁</option>
                        <option value="85">85 岁</option>
                        <option value="90">90 岁</option>
                    </select>
                    <button class="btn" onclick="updateLife()">更新</button>
                </div>
                <div class="life-visual">
                    <div class="life-circle" id="lifeCircle" style="--progress: 0%">
                        <div class="life-circle-inner">
                            <div class="percent" id="lifePercent">0%</div>
                            <div class="label">人生进度</div>
                        </div>
                    </div>
                    <div class="life-stats">
                        <div class="life-stat">
                            <div class="number" id="livedDays">0</div>
                            <div class="label">已度过天数</div>
                        </div>
                        <div class="life-stat">
                            <div class="number" id="remainDays">0</div>
                            <div class="label">剩余天数</div>
                        </div>
                        <div class="life-stat">
                            <div class="number" id="livedYears">0</div>
                            <div class="label">已度过年数</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Countdown Section -->
        <div id="countdown" class="section">
            <div class="card">
                <h2>&#9200; 重要纪念日</h2>
                <div class="countdown-list" id="countdownList"></div>
                <button class="add-btn" onclick="openModal('countdown')">+ 添加纪念日</button>
            </div>
        </div>
        
        <!-- Goals Section -->
        <div id="goals" class="section">
            <div class="card">
                <h2>&#127942; 目标追踪</h2>
                <div id="goalsList"></div>
                <button class="add-btn" onclick="openModal('goal')">+ 添加目标</button>
            </div>
        </div>
        
        <!-- Advice Section -->
        <div id="advice" class="section">
            <div class="card">
                <h2>&#128161; 今日智能建议</h2>
                <div class="advice-card">
                    <div class="icon">&#127775;</div>
                    <h3 id="adviceTitle">今日生活建议</h3>
                    <p id="adviceContent">正在生成今日建议...</p>
                    <div class="date" id="adviceDate"></div>
                </div>
                <button class="btn" style="width:100%;margin-top:1.5rem;" onclick="generateAdvice()">&#128260; 换一条建议</button>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal" id="modalContent"></div>
    </div>
    
    <script>
        // Data storage
        let countdowns = JSON.parse(localStorage.getItem('countdowns')) || [
            { id: 1, name: '2027 新年', date: '2027-01-01', emoji: '&#127881;' },
            { id: 2, name: '春节', date: '2027-02-06', emoji: '&#127885;' },
            { id: 3, name: '我的生日', date: '2027-01-01', emoji: '&#127874;' }
        ];
        let goals = JSON.parse(localStorage.getItem('goals')) || [
            { id: 1, name: '读完 12 本书', current: 5, target: 12, unit: '本' },
            { id: 2, name: '减重 10 公斤', current: 3, target: 10, unit: 'kg' },
            { id: 3, name: '学习一门新语言', current: 30, target: 100, unit: '%' }
        ];
        
        const advices = [
            { title: '联系一位老朋友', content: '今天给一位许久未联系的朋友发条消息吧。真正的友谊不需要天天联系，但偶尔的问候会让彼此的心更近。' },
            { title: '记录今日三件好事', content: '心理学研究表明，每天记录三件让你感恩或开心的小事，能显著提升幸福感。今晚睡前试试吧。' },
            { title: '尝试一件新事物', content: '走出舒适区，今天尝试一件你从未做过的小事——一道新菜、一条新路线、一本新类型的书。' },
            { title: '给自己 15 分钟独处', content: '在忙碌的生活中，给自己 15 分钟完全独处的时间。闭上眼睛，深呼吸，感受当下的宁静。' },
            { title: '整理一个角落', content: '选择一个你经常看到的角落（书桌、床头柜），花 10 分钟整理它。整洁的环境会带来清晰的思绪。' },
            { title: '写一封给未来的信', content: '给一年后的自己写一封信，记录下此刻的心情、目标和期待。封存起来，明年今日打开。' },
            { title: '做一件让身体开心的事', content: '去散步、做瑜伽、跳舞，或者只是伸展一下身体。身体是你最忠实的伙伴，值得被善待。' },
            { title: '学习一个新知识', content: '花 20 分钟学习一个你感兴趣但从未了解过的知识点。保持好奇心，是年轻的秘诀。' }
        ];
        
        // Show section
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            if (id === 'countdown') renderCountdowns();
            if (id === 'goals') renderGoals();
            if (id === 'advice') generateAdvice();
        }
        
        // Life calculation
        function updateLife() {
            const birthDate = new Date(document.getElementById('birthDate').value);
            const lifeExpectancy = parseInt(document.getElementById('lifeExpectancy').value);
            const today = new Date();
            const totalDays = lifeExpectancy * 365.25;
            const livedDays = Math.floor((today - birthDate) / (1000 * 60 * 60 * 24));
            const remainDays = Math.floor(totalDays - livedDays);
            const livedYears = (livedDays / 365.25).toFixed(1);
            const percent = Math.min((livedDays / totalDays * 100).toFixed(1), 100);
            
            document.getElementById('lifeCircle').style.setProperty('--progress', percent + '%');
            document.getElementById('lifePercent').textContent = percent + '%';
            document.getElementById('livedDays').textContent = livedDays.toLocaleString();
            document.getElementById('remainDays').textContent = remainDays.toLocaleString();
            document.getElementById('livedYears').textContent = livedYears;
        }
        
        // Countdown
        function renderCountdowns() {
            const list = document.getElementById('countdownList');
            list.innerHTML = '';
            const today = new Date();
            today.setHours(0,0,0,0);
            
            countdowns.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            countdowns.forEach(item => {
                const target = new Date(item.date);
                target.setHours(0,0,0,0);
                const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                let cls = '';
                if (diff <= 7) cls = 'urgent';
                else if (diff <= 30) cls = 'soon';
                
                const div = document.createElement('div');
                div.className = 'countdown-item ' + cls;
                div.innerHTML = `
                    <div class="emoji">${item.emoji}</div>
                    <div class="info">
                        <h4>${item.name}</h4>
                        <p>${item.date}</p>
                    </div>
                    <div class="days">
                        <div class="num">${diff}</div>
                        <div class="unit">天后</div>
                    </div>
                    <button class="delete-btn" onclick="deleteCountdown(${item.id})">&#10005;</button>
                `;
                list.appendChild(div);
            });
        }
        
        function deleteCountdown(id) {
            countdowns = countdowns.filter(c => c.id !== id);
            localStorage.setItem('countdowns', JSON.stringify(countdowns));
            renderCountdowns();
        }
        
        // Goals
        function renderGoals() {
            const list = document.getElementById('goalsList');
            list.innerHTML = '';
            
            goals.forEach(goal => {
                const percent = Math.min((goal.current / goal.target * 100).toFixed(0), 100);
                const div = document.createElement('div');
                div.className = 'goal-item';
                div.innerHTML = `
                    <h4>${goal.name}</h4>
                    <p>当前进度: ${goal.current} / ${goal.target} ${goal.unit}</p>
                    <div class="progress-bar"><div class="fill" style="width:${percent}%"></div></div>
                    <div class="goal-meta">
                        <span>${percent}% 完成</span>
                        <span>${goal.target - goal.current} ${goal.unit} 剩余</span>
                    </div>
                    <div style="margin-top:0.75rem;display:flex;gap:0.5rem;">
                        <button class="btn btn-secondary" style="padding:0.5rem 1rem;font-size:0.8rem;" onclick="updateGoal(${goal.id}, -1)">-</button>
                        <button class="btn" style="padding:0.5rem 1rem;font-size:0.8rem;" onclick="updateGoal(${goal.id}, 1)">+</button>
                        <button class="delete-btn" style="margin-left:auto;" onclick="deleteGoal(${goal.id})">&#10005;</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }
        
        function updateGoal(id, delta) {
            const goal = goals.find(g => g.id === id);
            if (goal) {
                goal.current = Math.max(0, Math.min(goal.current + delta, goal.target));
                localStorage.setItem('goals', JSON.stringify(goals));
                renderGoals();
            }
        }
        
        function deleteGoal(id) {
            goals = goals.filter(g => g.id !== id);
            localStorage.setItem('goals', JSON.stringify(goals));
            renderGoals();
        }
        
        // Advice
        function generateAdvice() {
            const advice = advices[Math.floor(Math.random() * advices.length)];
            document.getElementById('adviceTitle').textContent = advice.title;
            document.getElementById('adviceContent').textContent = advice.content;
            document.getElementById('adviceDate').textContent = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        
        // Modal
        function openModal(type) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            if (type === 'countdown') {
                content.innerHTML = `
                    <h3>添加纪念日</h3>
                    <div class="form-group">
                        <label>名称</label>
                        <input type="text" id="cdName" placeholder="例如：妈妈生日">
                    </div>
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="cdDate">
                    </div>
                    <div class="form-group">
                        <label>图标</label>
                        <select id="cdEmoji">
                            <option value="&#127874;">&#127874; 生日</option>
                            <option value="&#127881;">&#127881; 庆祝</option>
                            <option value="&#127885;">&#127885; 节日</option>
                            <option value="&#128149;">&#128149; 纪念日</option>
                            <option value="&#127758;">&#127758; 旅行</option>
                            <option value="&#127891;">&#127891; 毕业</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                        <button class="btn" onclick="addCountdown()">添加</button>
                    </div>
                `;
            } else if (type === 'goal') {
                content.innerHTML = `
                    <h3>添加目标</h3>
                    <div class="form-group">
                        <label>目标名称</label>
                        <input type="text" id="goalName" placeholder="例如：读完 10 本书">
                    </div>
                    <div class="form-group">
                        <label>目标值</label>
                        <input type="number" id="goalTarget" placeholder="10">
                    </div>
                    <div class="form-group">
                        <label>单位</label>
                        <input type="text" id="goalUnit" placeholder="本">
                    </div>
                    <div class="modal-actions">
                        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                        <button class="btn" onclick="addGoal()">添加</button>
                    </div>
                `;
            }
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function addCountdown() {
            const name = document.getElementById('cdName').value;
            const date = document.getElementById('cdDate').value;
            const emoji = document.getElementById('cdEmoji').value;
            if (name && date) {
                countdowns.push({ id: Date.now(), name, date, emoji });
                localStorage.setItem('countdowns', JSON.stringify(countdowns));
                closeModal();
                renderCountdowns();
            }
        }
        
        function addGoal() {
            const name = document.getElementById('goalName').value;
            const target = parseInt(document.getElementById('goalTarget').value);
            const unit = document.getElementById('goalUnit').value || '个';
            if (name && target) {
                goals.push({ id: Date.now(), name, current: 0, target, unit });
                localStorage.setItem('goals', JSON.stringify(goals));
                closeModal();
                renderGoals();
            }
        }
        
        // Close modal on overlay click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // Initialize
        updateLife();
        renderCountdowns();
        renderGoals();
        generateAdvice();
    </script>
</body>
</html>
