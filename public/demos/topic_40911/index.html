<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭食材管理与菜谱推荐</title>
<style>
/* ============================================================
   家庭食材管理与菜谱推荐 — 温馨家庭版
   ============================================================ */
* { margin:0; padding:0; box-sizing:border-box; }

/* 全局变量：温馨暖色调 */
:root {
  --primary:     #c4784a;
  --primary-dark:#a8623a;
  --primary-light:#faf3ed;
  --bg:          #faf7f4;
  --card-bg:     #ffffff;
  --text:        #3d3530;
  --text-light:  #8a7e74;
  --red:         #c45c5c;
  --red-bg:      #fdf2f2;
  --green:       #5a9e6f;
  --green-bg:    #f0f7f2;
  --border:      #e8ddd2;
  --radius:      10px;
  --gap:         14px;
}

html { font-size:17px; }
body {
  font-family: "PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

/* ===== 头部 ===== */
.header {
  background: var(--primary);
  color: #fff;
  text-align: center;
  padding: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size:1.4rem; font-weight:600; letter-spacing:1px; }
.header .header-back {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  display: none;
}
.header .btn-back {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  font-size: 0.9rem;
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 500;
  transition: background 0.15s;
}
.header .btn-back:hover { background: rgba(255,255,255,0.25); }

/* ===== 主容器 ===== */
.main-wrap {
  max-width: 700px;
  margin: 0 auto;
  padding: 18px;
  min-height: 60vh;
}

/* ===== 页面视图 ===== */
.page { display:none; position:relative; }
.page.active { display:block; }
.page.slide-in { animation: pageSlideIn 0.35s ease forwards; }
@keyframes pageSlideIn {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}

/* ===== 底部导航 ===== */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--border);
  justify-content: space-around;
  padding: 4px 0 env(safe-area-inset-bottom,4px);
  z-index: 90;
}
.bottom-nav button {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  background: none;
  border: none;
  color: var(--text-light);
  font-size: 0.6rem;
  cursor: pointer;
  padding: 5px 8px;
  border-radius: 6px;
  transition: all 0.2s;
}
.bottom-nav button .nav-icon { font-size: 1.1rem; }
.bottom-nav button.active { color: var(--primary); }

/* 设置按钮 */
.settings-float {
  position: fixed;
  bottom: 80px;
  right: 16px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(0,0,0,0.15);
  z-index: 80;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.settings-float:hover { background: var(--primary-dark); }

/* 全屏烹饪模式 */
.fullscreen-cook {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #1a1a2e;
  color: #fff;
  z-index: 1000;
  padding: 40px 20px;
  overflow-y: auto;
  flex-direction: column;
}
.fullscreen-cook.active { display: flex; }
.fullscreen-cook .fs-step {
  padding: 20px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 1.1rem;
  line-height: 1.7;
  display: flex;
  align-items: flex-start;
  gap: 16px;
}
.fullscreen-cook .fs-step-num {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 600;
  flex-shrink: 0;
}
.fullscreen-cook .fs-close {
  position: fixed;
  top: 16px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  z-index: 1001;
}

/* 计时器 */
.timer-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-left: 8px;
  padding: 4px 10px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.timer-badge:hover { background: var(--primary-dark); }
.timer-badge.running {
  background: var(--red);
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }

/* 偏好设置弹窗 */
.pref-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
  background: #fff;
  transition: all 0.2s;
  user-select: none;
}
.pref-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* 菜谱搜索 */
.recipe-search {
  margin-bottom: 10px;
}
.recipe-search input {
  width: 100%;
  height: 40px;
  padding: 0 14px;
  font-size: 0.9rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  outline: none;
  background: #fff;
  transition: border-color 0.2s;
}
.recipe-search input:focus { border-color: var(--primary); }

/* 知识小贴士 */
.tips-card {
  background: #fffef5;
  border: 1px solid #e8d8a0;
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 12px;
  font-size: 0.85rem;
  color: var(--text-light);
  line-height: 1.6;
}
.tips-card strong { color: var(--primary-dark); }

/* ===== 移动端响应式 ===== */

/* ===== 区块卡片 ===== */
.section-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: var(--gap);
  border: 1px solid var(--border);
}
.section-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--primary-dark);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* ===== 食材添加表单 ===== */
.add-form { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.add-form input, .add-form select {
  height: 44px;
  padding: 0 12px;
  font-size: 0.95rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  background: #fff;
  transition: border-color 0.2s;
}
.add-form input:focus, .add-form select:focus { border-color: var(--primary); }
.add-form input { flex:2; min-width:120px; }
.add-form select { flex:1; min-width:90px; }
.btn-add {
  height: 44px;
  padding: 0 18px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-add:hover { background: var(--primary-dark); }

/* ===== 食材列表 ===== */
.ingredient-list { display:flex; flex-direction:column; gap:6px; }
.ingredient-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--primary-light);
  border-radius: 8px;
  border: 1px solid var(--border);
  gap: 8px;
  flex-wrap: wrap;
}
.ingredient-item.expiring {
  background: var(--red-bg);
  border-color: #f0c8c8;
}
.ingredient-item .ing-info { flex:1; min-width:0; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.ingredient-item .ing-name { font-size:1rem; font-weight:600; }
.ingredient-item .ing-cat {
  font-size:0.75rem;
  padding: 2px 8px;
  border-radius: 4px;
  color: #fff;
}
.cat-vegetable { background:#5a9e6f; }
.cat-meat      { background:#c4784a; }
.cat-dairy     { background:#d4a843; }
.cat-staple    { background:#a89070; }
.cat-seasoning { background:#8a7e74; }
.ingredient-item .ing-expiry {
  font-size:0.8rem;
  color: var(--text-light);
  white-space: nowrap;
}
.ingredient-item .ing-expiry.warn {
  color: var(--red);
  font-weight: 600;
}
.btn-del {
  height: 32px;
  width: 32px;
  background: #fff;
  color: #bbb;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-del:hover { color: var(--red); border-color: var(--red); }

/* ===== 一键匹配按钮 ===== */
.match-btn-wrap { text-align:center; margin-bottom:16px; }
.btn-match {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.15s;
}
.btn-match:hover { background: var(--primary-dark); }

/* ===== 分类筛选标签 ===== */
.filter-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.filter-tab {
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  background: #fff;
  color: var(--text-light);
  transition: all 0.15s;
}
.filter-tab:hover { border-color: var(--primary); color: var(--primary); }
.filter-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

/* ===== 菜谱卡片网格 ===== */
.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.recipe-card {
  background: #fff;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: border-color 0.15s;
}
.recipe-card:hover { border-color: var(--primary); }

/* 菜品示意图 */
.recipe-img {
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  font-weight: 600;
  color: #fff;
  position: relative;
}
.recipe-img .match-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  color: #fff;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
}
.match-high { background: var(--green); }
.match-mid  { background: var(--primary); }
.match-low  { background: #aaa; }
.recipe-info { padding: 10px 12px; }
.recipe-info .r-name { font-size:1rem; font-weight:600; margin-bottom:3px; }
.recipe-info .r-meta {
  font-size:0.75rem;
  color: var(--text-light);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.recipe-info .r-match {
  margin-top: 4px;
  font-size:0.75rem;
}
.recipe-info .r-match .have { color: var(--green); font-weight:600; }
.recipe-info .r-match .miss { color: var(--red); font-weight:600; }

/* ===== 菜谱详情页 ===== */
.detail-top {
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  text-align: center;
}
.detail-top h3 { font-size:1.3rem; margin-bottom:6px; font-weight:600; }
.detail-top .d-meta {
  display: flex;
  justify-content: center;
  gap: 16px;
  font-size: 0.85rem;
  opacity: 0.9;
}
.detail-block {
  background: #fff;
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.detail-block h4 {
  font-size: 1rem;
  color: var(--primary-dark);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}

/* 食材匹配列表 */
.ing-match-list { display:flex; flex-wrap:wrap; gap:6px; }
.ing-match-tag {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 500;
}
.ing-match-tag.have {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid #c8e0d0;
}
.ing-match-tag.miss {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid #f0c8c8;
}

/* 烹饪步骤 */
.step-list { list-style:none; }
.step-list li {
  position: relative;
  padding: 6px 0 6px 36px;
  font-size: 0.9rem;
  line-height: 1.7;
  border-left: 2px solid var(--border);
  margin-left: 12px;
  padding-bottom: 14px;
}
.step-list li:last-child { border-left-color: transparent; padding-bottom:0; }
.step-list li::before {
  content: attr(data-step);
  position: absolute;
  left: -13px;
  top: 6px;
  width: 24px;
  height: 24px;
  line-height: 24px;
  text-align: center;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  font-size: 0.75rem;
  font-weight: 600;
}

/* ===== 空状态 ===== */
.empty-state {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-light);
}
.empty-state .empty-icon {
  width: 48px;
  height: 48px;
  margin: 0 auto 10px;
  border: 2px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: var(--border);
}
.empty-state p { font-size:0.95rem; }
.empty-state .sub { font-size:0.8rem; color:#bbb; margin-top:4px; }

/* ===== 页脚 ===== */
.footer {
  text-align: center;
  padding: 20px;
  color: #bbb;
  font-size: 0.75rem;
}

/* ===== 首页 ===== */
/* 欢迎卡片 */
.welcome-card {
  background: linear-gradient(135deg, #faf3ed 0%, #fdf6f0 100%);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 14px;
  border: 1px solid var(--border);
}
.welcome-emoji { font-size: 2rem; margin-bottom: 8px; }
.welcome-card h2 { font-size: 1.2rem; color: var(--text); font-weight: 600; margin-bottom: 4px; }
.welcome-card p { font-size: 0.85rem; color: var(--text-light); }

/* 即将过期预警 */
.expiry-warning {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff5f5;
  border: 2px solid #f0c8c8;
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.warning-icon { font-size: 1.4rem; flex-shrink: 0; }
.warning-text { flex: 1; min-width: 0; font-size: 0.85rem; }
.warning-text strong { color: var(--red); }
.warning-text span { color: var(--text-light); display: block; margin-top: 2px; }
.warning-btn {
  padding: 6px 14px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s;
}
.warning-btn:hover { background: #a34a4a; }

/* 统计卡片 */
.stats-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}
.stat-card {
  flex: 1;
  background: #fff;
  border-radius: var(--radius);
  padding: 14px 10px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-card.warn { background: #fff5f5; border-color: #f0c8c8; }
.stat-card.ok { background: #f0f7f2; border-color: #c8e0d0; }
.stat-icon { font-size: 1.5rem; margin-bottom: 4px; }
.stat-num { font-size: 1.5rem; font-weight: 700; color: var(--primary-dark); }
.stat-card.warn .stat-num { color: var(--red); }
.stat-card.ok .stat-num { color: var(--green); }
.stat-label { font-size: 0.72rem; color: var(--text-light); margin-top: 2px; }

/* 食材分类图表 */
.cat-chart {
  background: #fff;
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
}
.chart-title { font-size: 0.9rem; font-weight: 600; color: var(--primary-dark); margin-bottom: 10px; }
.chart-bars { display: flex; flex-direction: column; gap: 6px; }
.chart-bar-row { display: flex; align-items: center; gap: 8px; }
.chart-bar-label { font-size: 0.78rem; width: 36px; color: var(--text-light); flex-shrink: 0; }
.chart-bar-track { flex: 1; height: 14px; background: #f0f0f0; border-radius: 7px; overflow: hidden; }
.chart-bar-fill { height: 100%; border-radius: 7px; transition: width 0.5s ease; }
.chart-bar-num { font-size: 0.75rem; color: var(--text-light); width: 28px; text-align: right; flex-shrink: 0; }

/* 购物清单按钮 */
.btn-match.secondary {
  background: #fff;
  color: var(--primary);
  border: 1.5px solid var(--primary);
  font-size: 0.9rem;
  padding: 10px 20px;
}
.btn-match.secondary:hover { background: var(--primary-light); }
.match-btn-wrap { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* 只差一点 */
.almost-there {
  background: #fffef5;
  border: 1px solid #e8d8a0;
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 14px;
}
.almost-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 0.85rem;
  border-bottom: 1px solid #f5f0d8;
  cursor: pointer;
  flex-wrap: wrap;
  gap: 6px;
}
.almost-item:last-child { border-bottom: none; }
.almost-item:hover { color: var(--primary); }
.almost-miss { color: var(--red); font-size: 0.78rem; }

/* 进度条 */
.progress-bar-mini {
  width: 60px;
  height: 6px;
  background: #e8e8e8;
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
}
.progress-bar-mini-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s;
}

/* 购物清单弹窗 */
.shopping-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 0.9rem;
}
.shopping-item:last-child { border-bottom: none; }
.shopping-check {
  width: 20px; height: 20px;
  border: 2px solid #ccc;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  flex-shrink: 0;
  margin-right: 8px;
}
.shopping-check.checked { background: var(--green); border-color: var(--green); color: #fff; }
.shopping-item .item-name { flex: 1; }
.shopping-item .item-for { font-size: 0.75rem; color: var(--text-light); }

/* 语音按钮 */
.btn-voice {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 8px 16px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}
.btn-voice:hover { background: var(--primary-dark); }
.btn-voice.speaking { background: var(--red); }

/* 营养标签 */
.nutrition-bar {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.nutrition-tag {
  padding: 4px 10px;
  background: #f5f5f5;
  border-radius: 12px;
  font-size: 0.75rem;
  color: var(--text-light);
}
.nutrition-tag.protein { background: #e8f0fe; color: #4a7ab5; }
.nutrition-tag.carb { background: #fef6e8; color: #c4784a; }
.nutrition-tag.fat { background: #fde8e8; color: #c45c5c; }

/* ===== 季节时令食材 ===== */
.seasonal-card {
  background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
  border-radius: var(--radius);

<script>
/* ================================================================

/* ==================== 食材管理 ==================== */

function getIngredients() {
  try { return JSON.parse(localStorage.getItem('pantryIngredients')||'[]'); }
  catch(e) { return []; }
}

function saveIngredients(arr) {
  try { localStorage.setItem('pantryIngredients', JSON.stringify(arr)); }
  catch(e) {}
  renderIngredients();
}

function catClass(cat) {
  var map = {'蔬菜':'vegetable','肉类':'meat','蛋奶':'dairy','主食':'staple','调料':'seasoning'};
  return 'cat-'+ (map[cat]||'seasoning');
}

function daysLeft(ing) {
  var add = new Date(ing.addDate);
  var expire = new Date(add.getTime() + ing.shelf*24*60*60*1000);
  var now = new Date();
  return Math.ceil((expire - now)/(24*60*60*1000));
}

function addIngredient() {
  var name = document.getElementById('ingName').value.trim();
  var cat = document.getElementById('ingCat').value;
  var shelf = parseInt(document.getElementById('ingShelf').value);
  if (!name) return;
  var list = getIngredients();
  list.push({ name:name, cat:cat, shelf:shelf, addDate:new Date().toISOString() });
  sortIngredients(list);
  saveIngredients(list);
  document.getElementById('ingName').value = '';
  matchRecipes();
}

function delIngredient(idx) {
  var list = getIngredients();
  list.splice(idx, 1);
  sortIngredients(list);
  saveIngredients(list);
  matchRecipes();
}

function sortIngredients(list) {
  list.sort(function(a,b){ return daysLeft(a) - daysLeft(b); });
}

function renderIngredients() {
  var list = getIngredients();
  document.getElementById('ingCount').textContent = list.length;
  var html = '';
  if (list.length===0) {
    html = '<div class="empty-state"><div class="empty-icon">食</div><p>食材库还是空的</p><p class="sub">在上方添加家里的食材吧</p></div>';
  } else {
    for (var i=0; i<list.length; i++) {
      var ing = list[i];
      var d = daysLeft(ing);
      var warnClass = (d<=3) ? ' expiring' : '';
      var warnText = (d<=0) ? '<span class="ing-expiry warn">已过期</span>'
                   : (d<=3) ? '<span class="ing-expiry warn">即将过期（剩'+d+'天）</span>'
                   : '<span class="ing-expiry">剩'+d+'天</span>';
      html += '<div class="ingredient-item'+warnClass+'">'
            + '<div class="ing-info">'
            + '<span class="ing-name">'+escHtml(ing.name)+'</span>'
            + '<span class="ing-cat '+catClass(ing.cat)+'">'+ing.cat+'</span>'
            + warnText
            + '</div>'
            + '<button class="btn-del" onclick="delIngredient('+i+')">删</button>'
            + '</div>';
    }
  }
  document.getElementById('ingList').innerHTML = html;
}

/* ==================== 菜谱匹配逻辑 ==================== */

var currentFilter = 'all';
var matchResults = [];

function matchRecipes() {
  var pantry = getIngredients();
  var pantryNames = {};
  for (var i=0; i<pantry.length; i++) { pantryNames[pantry[i].name] = true; }
  var prefs = getPreferences();
  var isVegan = prefs.indexOf('素食') >= 0;
  var isNoSpicy = prefs.indexOf('不吃辣') >= 0;
  var results = [];
  for (var j=0; j<allRecipes.length; j++) {
    var r = allRecipes[j];
    var have=[], miss=[];
    for (var k=0; k<r.ingredients.length; k++) {
      if (pantryNames[r.ingredients[k]]) { have.push(r.ingredients[k]); }
      else { miss.push(r.ingredients[k]); }
    }
    var score = have.length / r.ingredients.length;
    // 偏好调整
    if (isVegan && (r.ingredients.indexOf('猪肉')>=0 || r.ingredients.indexOf('鸡肉')>=0 || r.ingredients.indexOf('虾')>=0 || r.ingredients.indexOf('鱼')>=0 || r.ingredients.indexOf('排骨')>=0 || r.ingredients.indexOf('鸡胸肉')>=0 || r.ingredients.indexOf('鲈鱼')>=0 || r.ingredients.indexOf('鱼块')>=0)) score -= 0.5;
    if (isNoSpicy && (r.ingredients.indexOf('豆瓣酱')>=0 || r.ingredients.indexOf('辣椒')>=0)) score -= 0.3;
    results.push({ recipe:r, score:score, have:have, miss:miss });
  }
  results.sort(function(a,b){
    if (b.score !== a.score) return b.score - a.score;
    return a.miss.length - b.miss.length;
  });
  matchResults = results;
  updateStats();
  renderRecipes(currentFilter);
  renderAlmostThere();
  var canDo = results.filter(function(r){ return r.score >= 1; }).length;
  document.getElementById('btnShoppingList').style.display = canDo > 0 ? '' : 'none';
}

function updateStats() {
  var pantry = getIngredients();
  var expiring = pantry.filter(function(ing){ return daysLeft(ing) <= 3 && daysLeft(ing) >= 0; });
  var canDo = matchResults.filter(function(r){ return r.score >= 1; }).length;
  document.getElementById('statTotal').textContent = pantry.length;
  document.getElementById('statExpiring').textContent = expiring.length;
  document.getElementById('statRecipes').textContent = canDo;
  updateExpiryWarning();
  updateCatChart();
}

function updateExpiryWarning() {
  var pantry = getIngredients();
  var expiring = pantry.filter(function(ing){ return daysLeft(ing) <= 3 && daysLeft(ing) >= 0; });
  var warn = document.getElementById('expiryWarning');
  if (expiring.length === 0) { warn.style.display = 'none'; return; }
  warn.style.display = 'flex';
  document.getElementById('expiryCount').textContent = expiring.length;
  var names = expiring.map(function(ing){ return ing.name; }).join('、');
  document.getElementById('expiryNames').textContent = names;
}

function matchExpiring() {
  var pantry = getIngredients();
  var expiring = pantry.filter(function(ing){ return daysLeft(ing) <= 3 && daysLeft(ing) >= 0; });
  var expiringNames = {};
  for (var i=0; i<expiring.length; i++) { expiringNames[expiring[i].name] = true; }
  // 筛选出包含即将过期食材的菜谱
  var filtered = matchResults.filter(function(r){
    return r.have.some(function(h){ return expiringNames[h]; });
  });
  if (filtered.length === 0) {
    alert('暂无优先消耗即将过期食材的菜谱');
    return;
  }
  matchResults = filtered;
  renderRecipes(currentFilter);
  renderAlmostThere();
}

function renderAlmostThere() {
  var almost = matchResults.filter(function(r){
    return r.score < 1 && r.score >= 0.5 && r.miss.length <= 2;
  });
  var container = document.getElementById('almostThere');
  var list = document.getElementById('almostList');
  if (almost.length === 0) { container.style.display = 'none'; return; }
  container.style.display = 'block';
  var html = '';
  for (var i=0; i<Math.min(5, almost.length); i++) {
    var item = almost[i];
    html += '<div class="almost-item" onclick="openDetail(\''+item.recipe.id+'\')">'
      + '<span>'+item.recipe.icon+' '+escHtml(item.recipe.name)+'</span>'
      + '<span class="almost-miss">缺：'+item.miss.join('、')+'</span>'
      + '</div>';
  }
  list.innerHTML = html;
}

function showShoppingList() {
  var allMiss = {};
  for (var i=0; i<matchResults.length; i++) {
    var r = matchResults[i];
    if (r.score >= 0.75) { // 只收集匹配度高的菜谱缺少的食材
      for (var j=0; j<r.miss.length; j++) {
        var m = r.miss[j];
        if (!allMiss[m]) allMiss[m] = [];
        allMiss[m].push(r.recipe.name);
      }
    }
  }
  var keys = Object.keys(allMiss);
  if (keys.length === 0) {
    alert('食材都齐了，不需要购物！');
    return;
  }
  var html = '<h3 style="color:var(--primary-dark);margin-bottom:12px;">购物清单</h3>'
    + '<div style="max-height:350px;overflow-y:auto;">';
  for (var k=0; k<keys.length; k++) {
    var name = keys[k];
    var forRecipes = allMiss[name].slice(0, 3).join('、');
    html += '<div class="shopping-item">'
      + '<div class="shopping-check" onclick="this.classList.toggle(\'checked\');this.textContent=this.classList.contains(\'checked\')?\'✓\':\'\'">'
      + '</div>'
      + '<span class="item-name">'+escHtml(name)+'</span>'
      + '<span class="item-for">用于：'+escHtml(forRecipes)+'</span>'
      + '</div>';
  }
  html += '</div>'
    + '<button class="btn-match" onclick="copyShoppingList()" style="width:100%;margin-top:12px;">复制清单</button>'
    + '<button class="btn-match secondary" onclick="document.getElementById(\'shoppingOverlay\').style.display=\'none\'" style="width:100%;margin-top:8px;">关闭</button>';
  var overlay = document.getElementById('shoppingOverlay');
  overlay.querySelector('.shopping-content').innerHTML = html;
  overlay.style.display = 'flex';
}

function copyShoppingList() {
  var items = document.querySelectorAll('.shopping-item .item-name');
  var list = [];
  for (var i=0; i<items.length; i++) { list.push(items[i].textContent); }
  var text = '购物清单：\n' + list.map(function(n,i){ return (i+1)+'. '+n; }).join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){ alert('购物清单已复制到剪贴板'); });
  } else {
    prompt('请复制以下清单：', text);
  }
}

function addMissingToCart(recipeId) {
  var item = null;
  for (var i=0; i<matchResults.length; i++) {
    if (matchResults[i].recipe.id === recipeId) { item = matchResults[i]; break; }
  }
  if (!item || item.miss.length === 0) {
    alert('该菜谱食材已齐全，无需采购！');
    return;
  }
  var html = '<h3 style="color:var(--primary-dark);margin-bottom:12px;">'+item.recipe.icon+' '+escHtml(item.recipe.name)+' — 需采购</h3>'
    + '<div style="max-height:350px;overflow-y:auto;">';
  for (var m=0; m<item.miss.length; m++) {
    var sub = getSubstitute(item.miss[m]);
    var subTip = sub ? '（可替代：'+sub.sub+'）' : '';
    html += '<div class="shopping-item">'
      + '<div class="shopping-check" onclick="this.classList.toggle(\'checked\');this.textContent=this.classList.contains(\'checked\')?\'✓\':\'\'"></div>'
      + '<span class="item-name">'+escHtml(item.miss[m])+'</span>'
      + '<span class="item-for">'+escHtml(subTip)+'</span>'
      + '</div>';
  }
  html += '</div>'
    + '<button class="btn-match" onclick="copyShoppingList()" style="width:100%;margin-top:12px;">复制清单</button>'
    + '<button class="btn-match secondary" onclick="document.getElementById(\'shoppingOverlay\').style.display=\'none\'" style="width:100%;margin-top:8px;">关闭</button>';
  var overlay = document.getElementById('shoppingOverlay');
  overlay.querySelector('.shopping-content').innerHTML = html;
  overlay.style.display = 'flex';
}

function updateCatChart() {
  var pantry = getIngredients();
  var cats = { '蔬菜':0, '肉类':0, '蛋奶':0, '主食':0, '调料':0 };
  for (var i=0; i<pantry.length; i++) {
    var c = pantry[i].cat;
    if (cats[c] !== undefined) cats[c]++;
  }
  var chart = document.getElementById('catChart');
  var total = pantry.length;
  if (total === 0) { chart.style.display = 'none'; return; }
  chart.style.display = 'block';
  var colors = { '蔬菜':'#5a9e6f', '肉类':'#c4784a', '蛋奶':'#d4a843', '主食':'#a89070', '调料':'#8a7e74' };
  var html = '';
  var keys = Object.keys(cats);
  for (var j=0; j<keys.length; j++) {
    var pct = Math.round(cats[keys[j]] / total * 100);
    html += '<div class="chart-bar-row">'
      + '<span class="chart-bar-label">'+keys[j]+'</span>'
      + '<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:'+colors[keys[j]]+';"></div></div>'
      + '<span class="chart-bar-num">'+cats[keys[j]]+'</span>'
      + '</div>';
  }
  document.getElementById('chartBars').innerHTML = html;
}

function filterRecipes(cat, el) {
  currentFilter = cat;
  var tabs = document.querySelectorAll('#filterTabs .filter-tab');
  for (var i=0; i<tabs.length; i++) tabs[i].classList.remove('active');
  if (el) el.classList.add('active');
  renderRecipes(cat);
}

function renderRecipes(cat) {
  var results = matchResults;
  var grid = document.getElementById('recipeGrid');
  if (results.length===0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">菜</div><p>点击上方按钮看看能做什么</p><p class="sub">根据您家里的食材推荐菜品</p></div>';
    return;
  }
  var filtered = (cat==='all') ? results : results.filter(function(r){ return r.recipe.cat===cat; });
  if (filtered.length===0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">无</div><p>当前分类下暂无匹配的菜谱</p></div>';
    return;
  }
  var html = '';
  for (var i=0; i<filtered.length; i++) {
    var item = filtered[i];
    var r = item.recipe;
    var scorePct = Math.round(item.score*100);
    var badgeClass = scorePct>=75 ? 'match-high' : (scorePct>=40 ? 'match-mid' : 'match-low');
    var badgeText = scorePct>=75 ? '食材齐全' : (scorePct>=40 ? '部分有' : '缺料多');
    var fillColor = scorePct>=75 ? '#5a9e6f' : (scorePct>=40 ? '#c4784a' : '#aaa');
    var idx = parseInt(r.id.replace('r',''))-1;
    var bg = recipeColors[idx % recipeColors.length];
    html += '<div class="recipe-card" onclick="openDetail(\''+r.id+'\')">'
          + '<div class="recipe-img" style="background:'+bg+';">'
          + '<span style="font-size:2rem;">'+r.icon+'</span>'
          + '<span class="match-badge '+badgeClass+'">'+badgeText+'</span>'
          + '</div>'
          + '<div class="recipe-info">'
          + '<div class="r-name">'+escHtml(r.name)+'</div>'
          + '<div class="r-meta"><span>'+r.time+'</span><span>'+r.cal+'千卡</span></div>'
          + '<div style="display:flex;align-items:center;gap:6px;margin-top:4px;">'
          + '<div class="progress-bar-mini"><div class="progress-bar-mini-fill" style="width:'+scorePct+'%;background:'+fillColor+';"></div></div>'
          + '<span style="font-size:0.72rem;color:'+fillColor+';font-weight:600;">'+scorePct+'%</span>'
          + '</div>'
          + '<div class="r-match">'
          + '<span class="have">有'+item.have.length+'种</span>'
          + (item.miss.length>0 ? ' · <span class="miss">缺'+item.miss.length+'种</span>' : ' · <span style="color:var(--green);">全部有</span>')
          + '</div>'
          + '</div>'
          + '</div>';
  }
  grid.innerHTML = html;
}

/* ==================== 菜谱详情 ==================== */

function openDetail(recipeId) {
  var recipe = null;
  for (var i=0; i<allRecipes.length; i++) { if (allRecipes[i].id===recipeId) { recipe=allRecipes[i]; break; } }
  if (!recipe) return;
  var matchItem = null;
  for (var j=0; j<matchResults.length; j++) { if (matchResults[j].recipe.id===recipeId) { matchItem=matchResults[j]; break; } }
  var pantry = getIngredients();
  var pantryMap = {};
  for (var k=0; k<pantry.length; k++) { pantryMap[pantry[k].name] = true; }
  var ingTags = '';
  for (var m=0; m<recipe.ingredients.length; m++) {
    var ing = recipe.ingredients[m];
    var have = !!pantryMap[ing];
    ingTags += '<span class="ing-match-tag '+(have?'have':'miss')+'">'+escHtml(ing)+(have?'（有）':'（缺）')+'</span>';
  }
  var stepsHtml = '';
  for (var s=0; s<recipe.steps.length; s++) {
    stepsHtml += '<li data-step="'+(s+1)+'">'+escHtml(recipe.steps[s])+'</li>';
  }
  var scorePct = matchItem ? Math.round(matchItem.score*100) : 0;
  var matchTip = scorePct>=100 ? '食材都齐了，可以开做啦'
               : (scorePct>=75 ? '大部分食材都有，挺方便的'
               : (scorePct>=40 ? '还差几样，买齐就能做'
               : '缺的食材比较多，建议先采购'));
  var have = matchItem ? matchItem.have : [];
  var miss = matchItem ? matchItem.miss : recipe.ingredients.filter(function(ing){ return !pantryMap[ing]; });
  var idx = parseInt(recipeId.replace('r',''))-1;
  var bg = recipeColors[idx % recipeColors.length];

  // 食材替换建议
  var subHtml = '';
  for (var m=0; m<miss.length; m++) {
    var sub = getSubstitute(miss[m]);
    if (sub) {
      subHtml += '<div class="highlight-warn" style="margin-top:6px;background:#fffef5;border-color:#e8d8a0;">'
        + '💡 <strong>缺「'+escHtml(miss[m])+'」</strong> → 可用 <strong>'+escHtml(sub.sub)+'</strong> 替代'
        + '<br><span style="font-size:0.8rem;">'+escHtml(sub.tip)+'</span>'
        + '</div>';
    } else {
      subHtml += '<div class="highlight-warn" style="margin-top:4px;">⚠ 缺少 <strong>'+escHtml(miss[m])+'</strong></div>';
    }
  }

  // 知识小贴士
  var tip = getRandomTip();

  document.getElementById('detailContent').innerHTML =
    '<div class="detail-top" style="background:'+bg+';">'
    + '<div style="font-size:2.5rem;margin-bottom:6px;">'+recipe.icon+'</div>'
    + '<h3>'+escHtml(recipe.name)+'</h3>'
    + '<div class="d-meta"><span>'+escHtml(recipe.time)+'</span><span>'+escHtml(recipe.cal)+'千卡</span><span>匹配度 '+scorePct+'%</span></div>'
    + '<div class="nutrition-bar" style="justify-content:center;margin-top:6px;">'
    + '<span class="nutrition-tag protein">蛋白质 '+escHtml(recipe.protein)+'</span>'
    + '<span class="nutrition-tag carb">碳水 '+escHtml(recipe.carb)+'</span>'
    + '<span class="nutrition-tag fat">脂肪 '+escHtml(recipe.fat)+'</span>'
    + '</div>'
    + '<div style="margin-top:8px;font-size:0.85rem;opacity:0.9;">'+matchTip+'</div>'
    + '<div style="margin-top:8px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">'
    + '<button class="btn-voice" onclick="speakRecipe(\''+recipeId+'\')" id="btnVoiceDetail">🔊 语音播报</button>'
    + '<button class="btn-voice" style="background:var(--green);" onclick="startFullscreenCook(\''+recipeId+'\')">🍳 全屏烹饪</button>'
    + '<button class="btn-voice" style="background:#c4784a;" onclick="addMissingToCart(\''+recipeId+'\')">🛒 加入购物清单</button>'
    + '<button class="btn-voice" style="background:#8a7e74;" onclick="exportRecipeText(\''+recipeId+'\')">📋 复制菜谱</button>'
    + '<button class="btn-voice" style="background:#5a7e9f;" onclick="printRecipe()">🖨 打印菜谱</button>'
    + '</div>'
    + '</div>'

    + (subHtml ? '<div class="section-card" style="margin-top:12px;"><div class="section-title">食材替换建议</div>'+subHtml+'</div>' : '')

    + '<div class="detail-block">'
    + '<h4>所需食材</h4>'
    + '<div class="ing-match-list">'+ingTags+'</div>'
    + '</div>'

    + '<div class="detail-block">'
    + '<h4>烹饪步骤</h4>'
    + '<ol class="step-list">'+stepsHtml+'</ol>'
    + '</div>'

    + '<div class="detail-block">'

  showPage('detail');
}

/* ==================== 语音播报 ==================== */
var isSpeaking = false;
var speakUtterance = null;

function speakRecipe(recipeId) {
  var recipe = null;
  for (var i=0; i<allRecipes.length; i++) { if (allRecipes[i].id===recipeId) { recipe=allRecipes[i]; break; } }
  if (!recipe) return;
  var btn = document.getElementById('btnVoiceDetail');
  if (isSpeaking) {
    if (speakUtterance) speechSynthesis.cancel();
    isSpeaking = false;
    if (btn) { btn.textContent = '🔊 语音播报步骤'; btn.classList.remove('speaking'); }
    return;
  }
  var text = '现在开始烹饪' + recipe.name + '。';
  for (var s=0; s<recipe.steps.length; s++) {
    text += '第'+(s+1)+'步，'+recipe.steps[s]+'。';
  }
  text += '烹饪完成，祝您用餐愉快。';
  speakUtterance = new SpeechSynthesisUtterance(text);
  speakUtterance.lang = 'zh-CN';
  speakUtterance.rate = 0.9;
  speakUtterance.onstart = function() {
    isSpeaking = true;
    if (btn) { btn.textContent = '⏹ 停止播报'; btn.classList.add('speaking'); }
  };
  speakUtterance.onend = function() {
    isSpeaking = false;
    if (btn) { btn.textContent = '🔊 语音播报步骤'; btn.classList.remove('speaking'); }
  };
  speechSynthesis.speak(speakUtterance);
}

/* ==================== 周菜谱计划 ==================== */
function generateWeeklyPlan() {
  var pantry = getIngredients();
  var pantryNames = {};
  for (var i=0; i<pantry.length; i++) { pantryNames[pantry[i].name] = true; }
  var prefs = getPreferences();
  var isVegan = prefs.indexOf('素食') >= 0;
  var isNoSpicy = prefs.indexOf('不吃辣') >= 0;

  // 筛选合适的菜谱并计算匹配度
  var scored = allRecipes.map(function(r){
    var have=0, miss=0;
    for (var k=0; k<r.ingredients.length; k++) {
      if (pantryNames[r.ingredients[k]]) have++; else miss++;
    }
    var score = have / r.ingredients.length;
    // 偏好调整
    if (isVegan && (r.ingredients.indexOf('猪肉')>=0 || r.ingredients.indexOf('鸡肉')>=0 || r.ingredients.indexOf('虾')>=0 || r.ingredients.indexOf('鱼')>=0 || r.ingredients.indexOf('排骨')>=0 || r.ingredients.indexOf('鸡胸肉')>=0 || r.ingredients.indexOf('鲈鱼')>=0 || r.ingredients.indexOf('鱼块')>=0)) score -= 0.5;
    if (isNoSpicy && (r.ingredients.indexOf('豆瓣酱')>=0 || r.ingredients.indexOf('辣椒')>=0)) score -= 0.3;
    return { recipe:r, score:score, have:have, miss:miss };
  });

  scored.sort(function(a,b){ return b.score - a.score; });

  var days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
  var used = {};
  var plan = [];
  for (var d=0; d<days.length; d++) {
    for (var j=0; j<scored.length; j++) {
      if (!used[scored[j].recipe.id]) {
        plan.push({ day: days[d], recipe: scored[j].recipe, score: scored[j].score, miss: scored[j].miss });
        used[scored[j].recipe.id] = true;
        break;
      }
    }
  }

  var container = document.getElementById('weeklyPlanContent');
  if (plan.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>食材不足，无法生成周计划</p><p class="sub">请先添加更多食材</p></div>';
    return;
  }
  var html = '';
  for (var p=0; p<plan.length; p++) {
    var item = plan[p];
    var r = item.recipe;
    var scorePct = Math.round(item.score*100);
    html += '<div class="consult-item" style="margin-bottom:10px;cursor:pointer;" onclick="openDetail(\''+r.id+'\')">'
      + '<div style="display:flex;align-items:center;gap:10px;">'
      + '<span style="font-size:1.5rem;">'+r.icon+'</span>'
      + '<div style="flex:1;">'
      + '<div style="font-weight:500;">'+item.day+'：'+escHtml(r.name)+'</div>'
      + '<div style="font-size:0.8rem;color:var(--text-light);">'+r.time+' · '+r.cal+'千卡 · 匹配'+scorePct+'%</div>'
      + (item.miss.length>0 ? '<div style="font-size:0.75rem;color:var(--red);">需采购：'+item.miss.join('、')+'</div>' : '<div style="font-size:0.75rem;color:var(--green);">食材齐全</div>')
      + '</div></div></div>';
  }
  container.innerHTML = html;
}

var substituteMap = {
  '猪肉': { sub:'鸡胸肉', tip:'口感略不同，但蛋白质含量相近，适合炒菜' },
  '鸡胸肉': { sub:'豆腐', tip:'素食替代，口感嫩滑，适合减脂' },
  '牛肉': { sub:'猪肉', tip:'口感有差异，建议切薄片腌制' },
  '鸡蛋': { sub:'豆腐', tip:'素食替代，口感差异大，适合汤羹' },
  '牛奶': { sub:'豆浆', tip:'乳糖不耐受人群的好选择' },
  '虾仁': { sub:'豆腐', tip:'素食替代，鲜味用蘑菇提' },
  '鲈鱼': { sub:'鸡胸肉', tip:'清蒸替换为清蒸鸡胸' },
  '鱼块': { sub:'豆腐', tip:'炖鱼替换为炖豆腐' },
  '豆瓣酱': { sub:'酱油', tip:'不吃辣时用酱油替代，风味有差异' },
  '排骨': { sub:'鸡腿', tip:'炖汤替换，时间可缩短' },
  '虾': { sub:'鸡蛋', tip:'蒸蛋替代蒸虾，营养均衡' },
};

function getSubstitute(ingredient) {
  var result = substituteMap[ingredient];
  if (result) return result;
  // 模糊匹配
  var keys = Object.keys(substituteMap);
  for (var i=0; i<keys.length; i++) {
    if (ingredient.indexOf(keys[i]) >= 0 || keys[i].indexOf(ingredient) >= 0) {
      return substituteMap[keys[i]];
    }
  }
  return null;
}

/* ==================== 烹饪计时器 ==================== */
var activeTimers = {};

function startTimer(stepIdx, seconds, btn) {
  if (activeTimers[stepIdx]) {
    clearInterval(activeTimers[stepIdx]);
    delete activeTimers[stepIdx];
    btn.classList.remove('running');
    btn.textContent = '⏱ 计时';
    return;
  }
  var remaining = seconds;
  btn.classList.add('running');
  btn.textContent = formatTime(remaining);
  activeTimers[stepIdx] = setInterval(function(){
    remaining--;
    btn.textContent = formatTime(remaining);
    if (remaining <= 0) {
      clearInterval(activeTimers[stepIdx]);
      delete activeTimers[stepIdx];
      btn.classList.remove('running');
      btn.textContent = '✅ 完成';
      if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
        new Notification('计时结束', { body: '步骤完成，请继续下一步！' });
      }
    }
  }, 1000);
}

function formatTime(sec) {
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  return (m>0 ? m+'分' : '') + s + '秒';
}

/* ==================== 全屏烹饪模式 ==================== */
function startFullscreenCook(recipeId) {
  var recipe = null;
  for (var i=0; i<allRecipes.length; i++) { if (allRecipes[i].id===recipeId) { recipe=allRecipes[i]; break; } }
  if (!recipe) return;
  var html = '<h2 style="text-align:center;margin-bottom:20px;">'+recipe.icon+' '+escHtml(recipe.name)+'</h2>';
  for (var s=0; s<recipe.steps.length; s++) {
    var timeMatch = recipe.steps[s].match(/(\d+)\s*分钟/);
    var timerHtml = timeMatch ? '<button class="timer-badge" onclick="startTimer('+s+','+(parseInt(timeMatch[1])*60)+',this)">⏱ '+timeMatch[1]+'分钟</button>' : '';
    html += '<div class="fs-step">'
      + '<div class="fs-step-num">'+(s+1)+'</div>'
      + '<div style="flex:1;">'+escHtml(recipe.steps[s])+timerHtml+'</div>'
      + '</div>';
  }
  document.getElementById('fsContent').innerHTML = html;
  document.getElementById('fullscreenCook').classList.add('active');
  if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function closeFullscreenCook() {
  for (var key in activeTimers) { clearInterval(activeTimers[key]); }
  activeTimers = {};
  document.getElementById('fullscreenCook').classList.remove('active');
}

/* ==================== 语音输入食材 ==================== */
function voiceInputIngredient() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('您的浏览器不支持语音输入，请使用Chrome浏览器');
    return;
  }
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.interimResults = false;
  var btn = document.getElementById('voiceIngBtn');
  if (btn) { btn.textContent = '🎤 聆听中...'; btn.style.background = 'var(--red)'; }
  recognition.start();
  recognition.onresult = function(event) {
    var text = event.results[0][0].transcript;
    document.getElementById('ingName').value = text;
    if (btn) { btn.textContent = '🎤'; btn.style.background = ''; }
  };
  recognition.onerror = function() {
    if (btn) { btn.textContent = '🎤'; btn.style.background = ''; }
  };
  recognition.onend = function() {
    if (btn) { btn.textContent = '🎤'; btn.style.background = ''; }
  };
}

function renderSeasonal() {
  var now = new Date();
  var month = now.getMonth() + 1;
  var data = seasonalData[month];
  document.getElementById('seasonalMonth').textContent = data.icon + ' ' + data.name;
  var html = '';
  for (var i=0; i<data.items.length; i++) {
    html += '<span class="seasonal-tag" onclick="quickAddSeasonal(\''+data.items[i]+'\')">'+data.items[i]+'</span>';
  }
  document.getElementById('seasonalTags').innerHTML = html;
}

function quickAddSeasonal(name) {
  document.getElementById('ingName').value = name;
  window.scrollTo({top: document.getElementById('ingName').offsetTop - 80, behavior:'smooth'});
}

/* ==================== 打印/导出菜谱 ==================== */
function printRecipe() {
  window.print();
}

function exportRecipeText(recipeId) {
  var recipe = null;
  for (var i=0; i<allRecipes.length; i++) { if (allRecipes[i].id===recipeId) { recipe=allRecipes[i]; break; } }
  if (!recipe) return;
  var text = '【'+recipe.name+'】\n'
    + '时间：'+recipe.time+' | 热量：'+recipe.cal+'千卡\n'
    + '营养：蛋白质 '+recipe.protein+' / 碳水 '+recipe.carb+' / 脂肪 '+recipe.fat+'\n'
    + '食材：'+recipe.ingredients.join('、')+'\n\n'
    + '烹饪步骤：\n';
  for (var s=0; s<recipe.steps.length; s++) {
    text += (s+1)+'. '+recipe.steps[s]+'\n';
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){ alert('菜谱已复制到剪贴板，可粘贴到备忘录或微信'); });
  } else {
    prompt('请复制菜谱文本：', text);
  }
}
