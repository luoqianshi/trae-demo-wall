<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>雪解 · AI助教 - 建辰智慧校园</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #22c55e; --primary-hover: #16a34a; --primary-light: #f0fdf4;
      --primary-border: #bbf7d0; --primary-dark: #166534; --bg: #f0fdf4;
      --text: #1f2937; --text2: #6b7280; --text3: #9ca3af; --border: #e5e7eb;
      --radius: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #e8f5e9; color: var(--text); height: 100vh; overflow: hidden;
    }

    /* ===== 顶部导航栏 ===== */
    .topbar {
      height: 48px; background: #fff; display: flex; align-items: center; padding: 0 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06); z-index: 10; position: relative;
    }
    .topbar .logo { font-size: 16px; font-weight: 700; color: var(--primary-dark); }
    .topbar .logo span { color: var(--primary); margin-right: 4px; }
    .topbar .user { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
    .topbar .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; }

    /* ===== 主体布局 ===== */
    .main-wrap {
      display: flex; height: calc(100vh - 48px); position: relative;
    }

    /* ===== 左侧面板 - 知识库 ===== */
    .left-panel {
      width: 280px; background: #fff; display: flex; flex-direction: column; flex-shrink: 0;
      border-right: 1px solid var(--border); transition: transform 0.3s;
    }
    .left-panel.hidden { transform: translateX(-100%); position: absolute; left: 0; z-index: 5; height: 100%; }
    .lp-header {
      padding: 16px 16px 0; font-size: 15px; font-weight: 600; color: var(--primary-dark);
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .lp-header .settings-btn { font-size: 18px; cursor: pointer; color: var(--text3); background: none; border: none; }
    .lp-body { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
    .lp-body::-webkit-scrollbar { width: 3px; }
    .lp-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    .upload-zone {
      border: 2px dashed var(--primary-border); border-radius: var(--radius); padding: 20px 12px;
      text-align: center; cursor: pointer; color: var(--primary); transition: all 0.2s;
    }
    .upload-zone:hover { background: var(--primary-light); border-color: var(--primary); }
    .upload-zone .icon { font-size: 28px; margin-bottom: 4px; }
    .upload-zone .text { font-size: 13px; font-weight: 500; }
    .upload-zone .hint { font-size: 10px; color: var(--text3); margin-top: 3px; }

    .upload-types { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .type-btn {
      padding: 7px 0; border: 1px solid var(--primary); color: var(--primary-dark); background: #fff;
      border-radius: 8px; cursor: pointer; font-size: 11px; text-align: center; transition: all 0.15s;
    }
    .type-btn:hover { background: var(--primary-light); }

    .category-list { display: flex; flex-direction: column; gap: 3px; }
    .category-item {
      display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 8px;
      cursor: pointer; font-size: 12px; color: var(--text); transition: all 0.15s;
    }
    .category-item:hover { background: var(--primary-light); }
    .category-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .category-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .category-count { margin-left: auto; font-size: 10px; color: var(--text3); background: #f3f4f6; padding: 2px 7px; border-radius: 10px; }

    /* ===== 右侧面板 - 聊天 ===== */
    .right-panel { flex: 1; background: #fff; display: flex; flex-direction: column; min-width: 0; }
    .rp-header {
      padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .rp-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #22c55e, #4ade80); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; flex-shrink: 0; }
    .rp-name h4 { font-size: 15px; color: var(--text); font-weight: 600; }
    .rp-name p { font-size: 11px; color: var(--text2); }
    .rp-actions { margin-left: auto; display: flex; gap: 6px; }
    .rp-action-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text2); transition: all 0.15s; }
    .rp-action-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary-border); }
    .menu-toggle { display: none; }

    .quick-funcs { display: flex; gap: 6px; padding: 10px 16px; flex-shrink: 0; overflow-x: auto; }
    .quick-funcs::-webkit-scrollbar { display: none; }
    .quick-func { padding: 5px 12px; border: 1px solid var(--primary-border); border-radius: 14px; font-size: 11px; color: var(--primary-dark); cursor: pointer; background: #fff; white-space: nowrap; transition: all 0.15s; }
    .quick-func:hover { background: var(--primary-light); }

    .func-tabs { display: flex; gap: 16px; padding: 0 16px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; }
    .func-tabs::-webkit-scrollbar { display: none; }
    .func-tab { font-size: 12px; color: var(--text2); cursor: pointer; padding-bottom: 8px; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: all 0.15s; }
    .func-tab:hover { color: var(--text); }
    .func-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

    .chat-area { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }
    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    .msg-row { display: flex; align-items: flex-start; gap: 8px; }
    .msg-row.ai { justify-content: flex-start; }
    .msg-row.user { justify-content: flex-end; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; overflow: hidden; }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-avatar.ai-avatar { background: linear-gradient(135deg, #22c55e, #4ade80); color: #fff; }
    .msg-avatar.user-avatar { background: #e5e7eb; color: #6b7280; }
    .ai-bubble { background: var(--primary-light); color: var(--primary-dark); padding: 10px 14px; border-radius: 0 14px 14px 14px; max-width: 75%; font-size: 13px; line-height: 1.6; word-break: break-word; }
    .user-bubble { background: #f3f4f6; color: #333; padding: 10px 14px; border-radius: 14px 0 14px 14px; max-width: 75%; font-size: 13px; line-height: 1.6; word-break: break-word; }
    .typing-dots { display: flex; gap: 4px; padding: 12px 14px; background: var(--primary-light); border-radius: 0 14px 14px 14px; width: fit-content; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: #86efac; animation: dot 1.4s infinite; display: inline-block; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }

    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; color: var(--text3); }
    .chat-empty .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.6; }

    .chat-img { max-width: 180px; max-height: 180px; border-radius: 8px; margin-top: 6px; cursor: pointer; object-fit: contain; }
    .chat-img.expanded { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; max-width: 90vw; max-height: 90vh; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .img-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1999; }

    .tts-section { padding: 10px 16px; background: var(--primary-light); border-top: 1px solid var(--primary-border); flex-shrink: 0; display: none; }
    .tts-voice-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .tts-voice-label { font-size: 12px; color: var(--primary-dark); flex-shrink: 0; }
    .tts-voice-select { height: 30px; border: 1px solid var(--primary-border); border-radius: 6px; padding: 0 6px; font-size: 12px; outline: none; background: #fff; color: var(--text); }
    .tts-input-wrap { position: relative; margin-bottom: 8px; }
    .tts-textarea { width: 100%; height: 54px; border: 1px solid var(--primary-border); border-radius: 8px; padding: 8px 10px; font-size: 12px; outline: none; resize: none; font-family: inherit; }
    .tts-textarea:focus { border-color: var(--primary); }
    .tts-char-count { position: absolute; bottom: 4px; right: 8px; font-size: 10px; color: var(--text3); }
    .tts-actions-row { display: flex; gap: 8px; align-items: center; }
    .tts-btn { padding: 6px 16px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .tts-btn:hover { background: var(--primary-hover); }
    .tts-btn.disabled { background: #d1d5db; cursor: not-allowed; }
    .tts-result { margin-top: 8px; }
    .tts-result .tts-label { font-size: 11px; color: var(--primary-dark); }
    .tts-progress { margin: 6px 0; }
    .tts-progress-bar-wrap { height: 6px; background: #d1fae5; border-radius: 3px; overflow: hidden; }
    .tts-progress-bar-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; width: 0%; }
    .tts-progress-text { font-size: 10px; color: var(--text3); text-align: right; margin-top: 2px; }
    .tts-result-actions { display: flex; gap: 6px; margin-top: 4px; }
    .tts-result-btn { padding: 3px 10px; border: 1px solid var(--primary-border); border-radius: 6px; font-size: 11px; cursor: pointer; color: var(--primary-dark); background: #fff; }
    .tts-result-btn:hover { background: var(--primary-light); }
    .tts-result-btn.close { color: #ef4444; border-color: #fecaca; }
    .tts-result-btn.close:hover { background: #fef2f2; }

    .media-preview { padding: 8px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; border-top: 1px solid var(--border); display: none; }
    .media-preview-item { position: relative; width: 56px; height: 56px; border-radius: 6px; overflow: hidden; border: 1px solid var(--primary-border); flex-shrink: 0; }
    .media-preview-item img, .media-preview-item video { width: 100%; height: 100%; object-fit: cover; }
    .media-preview-item .media-remove { position: absolute; top: 1px; right: 1px; width: 16px; height: 16px; border-radius: 50%; background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; line-height: 1; }

    .input-area { flex-shrink: 0; padding: 10px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .chat-input { flex: 1; height: 38px; border: 1px solid var(--primary-border); border-radius: 10px; padding: 0 12px; font-size: 13px; outline: none; font-family: inherit; }
    .chat-input:focus { border-color: var(--primary); }
    .input-btn { width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer; background: var(--primary-light); color: var(--primary); font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .input-btn:hover { background: var(--primary-border); }
    .send-btn { background: var(--primary); color: #fff; font-size: 16px; }
    .send-btn:hover { background: var(--primary-hover); }
    .send-btn:disabled { background: #d1d5db; cursor: not-allowed; }
    .hidden-input { display: none; }

    /* 弹窗 */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-overlay.hidden { display: none; }
    .modal { background: #fff; border-radius: 14px; width: 90%; max-width: 420px; max-height: 70vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-size: 15px; color: var(--text); }
    .modal-close { width: 28px; height: 28px; border: none; background: none; cursor: pointer; font-size: 16px; color: var(--text3); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: #f3f4f6; }
    .modal-body { padding: 14px 20px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 6px; }
    .btn-primary { padding: 7px 16px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { padding: 7px 16px; background: #fff; color: var(--text); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-danger { padding: 7px 16px; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-danger:hover { background: #fee2e2; }

    .cat-form-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .cat-form-row input { flex: 1; height: 34px; border: 1px solid var(--border); border-radius: 6px; padding: 0 10px; font-size: 12px; outline: none; }
    .cat-form-row input:focus { border-color: var(--primary); }
    .cat-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
    .cat-row:last-child { border-bottom: none; }
    .cat-row .cat-info { flex: 1; display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .cat-row .cat-actions { display: flex; gap: 3px; }
    .cat-row .cat-actions button { width: 24px; height: 24px; border: none; background: none; cursor: pointer; border-radius: 4px; font-size: 12px; display: flex; align-items: center; justify-content: center; color: var(--text3); }
    .cat-row .cat-actions button:hover { background: #f3f4f6; }
    .cat-row .cat-actions button.del:hover { color: #dc2626; background: #fef2f2; }

    .upload-toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 13px; z-index: 3000; animation: fadeInUp 0.3s, fadeOut 0.3s 1.7s; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

    /* 响应式: 移动端隐藏左侧面板 */
    @media (max-width: 768px) {
      .left-panel { position: absolute; left: 0; top: 0; z-index: 5; height: 100%; transform: translateX(-100%); transition: transform 0.3s; box-shadow: 4px 0 16px rgba(0,0,0,0.1); }
      .left-panel.show { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .right-panel { width: 100%; }
      .overlay-mobile { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 4; }
      .overlay-mobile.hidden { display: none; }
    }
    @media (min-width: 769px) {
      .left-panel.hidden { transform: none; position: relative; }
      .overlay-mobile { display: none; }
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="topbar">
    <button class="input-btn menu-toggle" onclick="toggleLeftPanel()" style="margin-right:8px;">☰</button>
    <div class="logo"><span>🏫</span>建辰智慧校园</div>
    <div class="user">
      <span>张老师</span>
      <div class="user-avatar">张</div>
    </div>
  </div>

  <!-- 移动端遮罩 -->
  <div class="overlay-mobile hidden" id="mobileOverlay" onclick="toggleLeftPanel()"></div>

  <!-- 主体 -->
  <div class="main-wrap">
    <!-- 左侧：知识库 -->
    <div class="left-panel" id="leftPanel">
      <div class="lp-header">
        知识库
        <button class="settings-btn" onclick="openCategorySettings()" title="分类设置">⋯</button>
      </div>
      <div class="lp-body">
        <div class="upload-zone" onclick="document.getElementById('kbFileInput').click()">
          <div class="icon">📤</div>
          <div class="text">拖拽文件到此处上传</div>
          <div class="hint">支持 文本 / 图片 / 视频 / 音频 / PDF / Word</div>
        </div>
        <input type="file" id="kbFileInput" style="display:none" accept=".txt,.jpg,.jpeg,.png,.gif,.mp4,.avi,.mov,.mp3,.wav,.pdf,.doc,.docx" onchange="kbUploadFile(event)" multiple>

        <div class="upload-types">
          <button class="type-btn" onclick="document.getElementById('kbFileInput').click()">文本</button>
          <button class="type-btn" onclick="document.getElementById('kbFileInput').click()">图片</button>
          <button class="type-btn" onclick="document.getElementById('kbFileInput').click()">视频</button>
          <button class="type-btn" onclick="document.getElementById('kbFileInput').click()">音频</button>
        </div>

        <div class="category-list" id="categoryList"></div>
      </div>
    </div>

    <!-- 右侧：聊天 -->
    <div class="right-panel">
      <div class="rp-header">
        <div class="rp-avatar"><img src="aitutor-avatar.png" alt="雪解" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
        <div class="rp-name">
          <h4>雪解</h4>
          <p>温婉知性 · AI智能助教</p>
        </div>
        <div class="rp-actions">
          <button class="rp-action-btn" onclick="newChat()">+</button>
          <button class="rp-action-btn" title="清屏" onclick="clearMsgs()">🗑</button>
        </div>
      </div>

      <div class="quick-funcs">
        <span class="quick-func" onclick="quickAsk('请帮我总结知识库中的要点')">智能总结</span>
        <span class="quick-func" onclick="quickAsk('请解析我上传的PDF文档')">PDF解析</span>
        <span class="quick-func" onclick="quickAsk('请深度精读知识库内容')">8K精读</span>
        <span class="quick-func" onclick="switchFunc('image', event.target)">文生图</span>
        <span class="quick-func" onclick="switchFunc('tts', event.target)">配音</span>
      </div>

      <div class="func-tabs" id="funcTabs">
        <div class="func-tab active" data-func="general" onclick="switchFunc('general', this)">综合</div>
        <div class="func-tab" data-func="qa" onclick="switchFunc('qa', this)">智能答疑</div>
        <div class="func-tab" data-func="lesson" onclick="switchFunc('lesson', this)">课件生成</div>
        <div class="func-tab" data-func="exam" onclick="switchFunc('exam', this)">出题批阅</div>
        <div class="func-tab" data-func="analysis" onclick="switchFunc('analysis', this)">学情分析</div>
        <div class="func-tab" data-func="image" onclick="switchFunc('image', this)">文生图</div>
        <div class="func-tab" data-func="tts" onclick="switchFunc('tts', this)">配音</div>
      </div>

      <div class="chat-area" id="chatArea">
        <div class="chat-empty" id="chatEmpty">
          <div class="empty-icon">💬</div>
          <p>你好，我是助教雪解，有什么教学相关问题可以问我~</p>
        </div>
      </div>

      <div class="tts-section" id="ttsSection">
        <div class="tts-voice-row">
          <span class="tts-voice-label">角色</span>
          <select class="tts-voice-select" id="ttsVoice">
            <option value="Cherry">Cherry (女·阳光)</option>
            <option value="Serena">Serena (女·温柔)</option>
            <option value="Ethan">Ethan (男·活力)</option>
            <option value="Momo">Momo (女·活泼)</option>
            <option value="Maia">Maia (女·知性)</option>
          </select>
        </div>
        <div class="tts-input-wrap">
          <textarea class="tts-textarea" id="ttsText" placeholder="输入要转为语音的文字..." maxlength="500" oninput="updateTtsCount()"></textarea>
          <span class="tts-char-count" id="ttsCount">0/500</span>
        </div>
        <div class="tts-actions-row">
          <button class="tts-btn" id="ttsGenBtn" onclick="doTTS()">生成语音</button>
        </div>
        <div class="tts-result" id="ttsResult" style="display:none;">
          <span class="tts-label">语音已生成</span>
          <div class="tts-progress" id="ttsProgress" style="display:none;">
            <div class="tts-progress-bar-wrap"><div class="tts-progress-bar-fill" id="ttsProgressFill"></div></div>
            <span class="tts-progress-text" id="ttsProgressTime">0:00 / 0:00</span>
          </div>
          <div class="tts-result-actions">
            <button class="tts-result-btn" id="ttsPlayBtn" onclick="playTTS()">播放</button>
            <button class="tts-result-btn" onclick="downloadTTS()">下载</button>
            <button class="tts-result-btn close" onclick="stopTTS()">关闭</button>
          </div>
        </div>
      </div>

      <div class="media-preview" id="mediaPreview"></div>

      <div class="input-area">
        <input class="chat-input" type="text" id="chatInput" placeholder="输入内容..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="input-btn" title="上传图片" onclick="document.getElementById('imageInput').click()">🖼</button>

    // 生成模拟文生图URL（使用占位图服务）
    function getMockImageUrl(text) {
      const colors = ['22c55e', '16a34a', '4ade80', '86efac', '166534'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      return `https://placehold.co/600x400/${color}/white?text=${encodeURIComponent(text.slice(0, 20))}`;
    }

    // 模拟延迟
    function delay(ms) { return new Promise(r => setTimeout(r, ms || 800 + Math.random() * 1200)); }

    // 获取模拟回复
    function getMockReply(func, msg) {
      const pool = mockResponses[func] || mockResponses.general;
      for (const [key, reply] of Object.entries(pool)) {
        if (msg.includes(key)) return reply;
      }
      // 默认回复
      if (func === 'qa') return '这是一个很好的问题！让我来帮你解答：\n\n关于"' + msg + '"，根据我的知识库，这个问题涉及多个方面。建议你提供更具体的上下文，我可以给出更精准的回答。';
      if (func === 'lesson') return '好的，我来帮你生成关于"' + msg + '"的教案内容：\n\n**教学目标**\n1. 理解核心概念\n2. 掌握关键技能\n3. 培养应用能力\n\n需要我详细展开某个部分吗？';
      if (func === 'exam') return '我已根据"' + msg + '"生成了相关试题：\n\n**选择题**\n1. 关于该知识点，以下说法正确的是（ ）\n   A. 选项A  B. 选项B  C. 选项C  D. 选项D\n\n**简答题**\n请简要说明该知识点的核心内容。';
      if (func === 'analysis') return '学情分析结果：\n\n根据当前数据，班级整体学习情况良好。建议重点关注以下方面：\n1. 加强薄弱环节的辅导\n2. 鼓励优秀学生带动整体\n3. 定期进行学习效果评估';
      return '收到你的问题"' + msg + '"。作为AI助教雪解，我来帮你分析：\n\n这个问题可以从以下几个角度来看：\n1. **理论基础**：相关概念的定义和原理\n2. **实践应用**：在实际场景中的运用\n3. **扩展思考**：可以进一步探索的方向\n\n需要我详细展开哪个方面呢？';

    // ==================== 左侧面板切换 ====================
    function toggleLeftPanel() {
      const panel = document.getElementById('leftPanel');
      const overlay = document.getElementById('mobileOverlay');
      panel.classList.toggle('show');
      overlay.classList.toggle('hidden');
    }

    // ==================== 知识库 ====================
    let currentCategory = 'COURSE';
    let categories = [
      { id: 'COURSE', icon: '📖', name: '课程知识', count: 15 },
      { id: 'RULE', icon: '📜', name: '规章制度', count: 8 },
      { id: 'FAQ', icon: '💬', name: '常见问题', count: 23 },
      { id: 'NOTICE', icon: '📢', name: '通知公告', count: 5 },
      { id: 'RESOURCE', icon: '📚', name: '教学资源', count: 12 },
      { id: 'EXAM', icon: '📝', name: '考试题库', count: 30 }
    ];

    function renderCategories() {
      const el = document.getElementById('categoryList');
      el.innerHTML = categories.map(c =>
        '<div class="category-item' + (c.id === currentCategory ? ' active' : '') + '" onclick="selectCategory(this, \'' + c.id + '\')">' +
        '<span class="category-icon">' + c.icon + '</span> ' + c.name +
        ' <span class="category-count">' + c.count + '</span></div>'
      ).join('');
    }

    function renderCatList() {
      const el = document.getElementById('catList');
      el.innerHTML = categories.map((c, i) =>
        '<div class="cat-row">' +
        '<div class="cat-info"><span style="font-size:16px;">' + c.icon + '</span>' + c.name + '</div>' +
        '<div class="cat-actions">' +
        '<button onclick="editCategory(' + i + ')" title="编辑">✎</button>' +
        '<button class="del" onclick="deleteCategory(' + i + ')" title="删除">✕</button>' +
        '</div></div>'
      ).join('');
    }

    function selectCategory(el, category) {
      currentCategory = category;
      document.querySelectorAll('.category-item').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    }

    function kbUploadFile(e) {
      const files = e.target.files;
      if (!files.length) return;
      const names = Array.from(files).map(f => f.name).join(', ');
      // 模拟上传
      const cat = categories.find(c => c.id === currentCategory);
      if (cat) cat.count += files.length;
      renderCategories();
      showToast('上传成功！' + names + ' 已添加到' + (cat ? cat.name : '知识库'));
      e.target.value = '';
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'upload-toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // ==================== 分类设置弹窗 ====================
    let editingIndex = -1;

    function openCategorySettings() {
      document.getElementById('categoryModal').classList.remove('hidden');
      renderCatList();
    }

    function closeCategorySettings() {
      document.getElementById('categoryModal').classList.add('hidden');
      editingIndex = -1;
      document.getElementById('catIcon').value = '';
      document.getElementById('catName').value = '';
    }

    function addCategory() {
      const icon = document.getElementById('catIcon').value.trim();
      const name = document.getElementById('catName').value.trim();
      if (!icon || !name) { showToast('请填写图标和名称'); return; }
      if (editingIndex >= 0) {
        categories[editingIndex].icon = icon;
        categories[editingIndex].name = name;
        editingIndex = -1;
      } else {
        categories.push({ id: 'CAT_' + Date.now(), icon, name, count: 0 });
      }
      document.getElementById('catIcon').value = '';
      document.getElementById('catName').value = '';
      renderCategories();
      renderCatList();
    }

    function editCategory(index) {
      editingIndex = index;
      document.getElementById('catIcon').value = categories[index].icon;
      document.getElementById('catName').value = categories[index].name;
    }

    function deleteCategory(index) {
      if (!confirm('确定删除分类"' + categories[index].name + '"？')) return;
      if (currentCategory === categories[index].id) {
        currentCategory = categories[0] ? categories[0].id : '';
      }
      categories.splice(index, 1);
      if (editingIndex === index) editingIndex = -1;
      renderCategories();
      renderCatList();
    }

    // ==================== 功能Tab ====================
    function switchFunc(func, el) {
      currentFunc = func;
      document.querySelectorAll('.func-tab').forEach(t => t.classList.remove('active'));
      if (el) el.classList.add('active');
      else {
        const tab = document.querySelector('.func-tab[data-func="' + func + '"]');
        if (tab) tab.classList.add('active');
      }
      document.getElementById('ttsSection').style.display = (func === 'tts') ? 'block' : 'none';
      document.getElementById('chatInput').placeholder = getPlaceholder(func);
      document.getElementById('chatInput').focus();
    }

    function getPlaceholder(func) {
      const map = {
        general: '输入内容...', qa: '输入你的问题...', lesson: '输入课件主题...',
        exam: '输入出题要求...', analysis: '输入分析需求...', image: '输入图片描述...',
        tts: '输入要转为语音的文字...'
      };
      return map[func] || '输入内容...';
    }

    // ==================== TTS配音 ====================
    function updateTtsCount() {
      const text = document.getElementById('ttsText').value;
      document.getElementById('ttsCount').textContent = text.length + '/500';
    }

    async function doTTS() {
      const text = document.getElementById('ttsText').value.trim();
      if (!text || ttsLoading) return;
      ttsLoading = true;
      const genBtn = document.getElementById('ttsGenBtn');
      genBtn.textContent = '合成中...';
      genBtn.classList.add('disabled');

      // 模拟TTS生成
      await delay(1500);
      ttsAudioUrl = '#mock-tts-' + Date.now();
      document.getElementById('ttsResult').style.display = 'block';
      document.getElementById('ttsProgress').style.display = 'none';
      document.getElementById('ttsPlayBtn').textContent = '播放';
      showToast('语音合成完成！');

      ttsLoading = false;
      genBtn.textContent = '生成语音';
      genBtn.classList.remove('disabled');
    }

    function playTTS() {
      if (!ttsAudioUrl) return;
      if (ttsPlaying) {
        // 模拟暂停
        ttsPlaying = false;
        document.getElementById('ttsPlayBtn').textContent = '播放';
        document.getElementById('ttsProgress').style.display = 'none';
        return;
      }
      // 模拟播放
      ttsPlaying = true;
      document.getElementById('ttsPlayBtn').textContent = '暂停';
      document.getElementById('ttsProgress').style.display = 'block';

      let progress = 0;
      const fill = document.getElementById('ttsProgressFill');
      const timeLabel = document.getElementById('ttsProgressTime');
      const totalDuration = 5; // 模拟5秒音频

      const interval = setInterval(() => {
        if (!ttsPlaying) { clearInterval(interval); return; }
        progress += 2;
        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
          ttsPlaying = false;
          document.getElementById('ttsPlayBtn').textContent = '播放';
          fill.style.width = '0%';
          timeLabel.textContent = '0:00 / 0:00';
          return;
        }
        fill.style.width = progress + '%';
        const current = Math.floor(progress / 100 * totalDuration);
        timeLabel.textContent = formatTime(current) + ' / ' + formatTime(totalDuration);
      }, 100);
    }

    function stopTTS() {
      ttsPlaying = false;
      ttsAudioUrl = null;
      document.getElementById('ttsResult').style.display = 'none';
      document.getElementById('ttsProgress').style.display = 'none';
      document.getElementById('ttsProgressFill').style.width = '0%';
      document.getElementById('ttsProgressTime').textContent = '0:00 / 0:00';
      document.getElementById('ttsPlayBtn').textContent = '播放';
    }

    function downloadTTS() {
      showToast('模拟下载：配音文件已保存到本地');
    }

    function formatTime(s) {
      if (!s || s <= 0) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    // ==================== 媒体预览 ====================
    function handleMediaSelect(e, type) {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      pendingMedia.push({ type, file, url, name: file.name });
      renderMediaPreview();
      e.target.value = '';
    }

    function renderMediaPreview() {
      const container = document.getElementById('mediaPreview');
      if (pendingMedia.length === 0) {
        container.style.display = 'none';
        container.innerHTML = '';
        return;
      }
      container.style.display = 'flex';
      container.innerHTML = pendingMedia.map((m, i) => {
        let inner = '';
        if (m.type === 'image') inner = '<img src="' + m.url + '" alt="预览">';
        else if (m.type === 'video') inner = '<video src="' + m.url + '"></video>';
        else if (m.type === 'audio') inner = '<span style="font-size:28px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">🎵</span>';
        return '<div class="media-preview-item">' + inner +
          '<span class="media-remove" onclick="removeMedia(' + i + ')">✕</span></div>';
      }).join('');
    }

    function removeMedia(index) {
      const m = pendingMedia[index];
      if (m && m.url) URL.revokeObjectURL(m.url);
      pendingMedia.splice(index, 1);
      renderMediaPreview();
    }

    // ==================== 聊天 ====================
    function quickAsk(text) {
      document.getElementById('chatInput').value = text;
      sendMsg();
    }

    function isImageRequest(msg) {
      const keywords = ['生成图片', '生成一张图', '画一张', '画个', '帮我画', '帮我生成',
        '画图', '文生图', '绘制', '生成一幅', '生成一张', '帮我生成图片', '生成插图', '配图'];
      return keywords.some(k => msg.toLowerCase().includes(k));
    }

    function toggleImgSize(img) {
      if (img.classList.contains('expanded')) {
        img.classList.remove('expanded');
        const overlay = document.querySelector('.img-overlay');
        if (overlay) overlay.remove();
      } else {
        const overlay = document.createElement('div');
        overlay.className = 'img-overlay';
        overlay.onclick = () => toggleImgSize(img);
        document.body.appendChild(overlay);
        img.classList.add('expanded');
      }
    }

    async function sendMsg() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();

      // 配音模式
      if (currentFunc === 'tts') {
        if (!msg) return;
        document.getElementById('ttsText').value = msg;
        updateTtsCount();
        addMsg('user', msg);
        doTTS();
        input.value = '';
        return;
      }

      // 综合模式下检测配音关键词
      if (currentFunc === 'general' && msg) {
        const ttsKeywords = ['配音', '语音合成', '文字转语音', '生成语音', '读出来', '朗读', '念出来', '说出来'];
        if (ttsKeywords.some(k => msg.includes(k))) {
          let ttsText = msg;
          ttsKeywords.forEach(k => { ttsText = ttsText.replace(k, ''); });
          ttsText = ttsText.trim();
          addMsg('user', msg);
          input.value = '';
          if (ttsText) {
            switchFunc('tts');
            document.getElementById('ttsText').value = ttsText;
            updateTtsCount();
            doTTS();
          } else {
            switchFunc('tts');
            addMsg('ai', '请输入要转为语音的文字~');
          }
          return;
        }
      }

      // 有媒体文件
      if (pendingMedia.length > 0) {
        const prompt = msg || '请分析这个内容';
        addMsg('user', prompt);
        input.value = '';
        const typing = addTyping();
        await delay(1200);
        typing.remove();
        pendingMedia.forEach(m => {
          if (m.type === 'image') {
            addMsg('ai', '图片分析完成。从图片中我识别到了以下内容：\n\n这是一张与"计算机科学"相关的图片，包含了课程知识点和教学素材。如果你需要提取图片中的文字信息，请使用"图片文字提取"功能。');
          } else if (m.type === 'video') {
            addMsg('ai', '视频分析完成！\n\n视频内容摘要：该视频主要讲解了相关知识点，包含多个关键概念和实际案例演示。建议结合课程资料进行深入学习。');
          } else if (m.type === 'audio') {
            addMsg('ai', '音频转写完成！\n\n音频内容已识别，主要讨论内容包括：\n1. 课程重点回顾\n2. 常见问题解答\n3. 学习建议\n\n需要我进一步分析具体内容吗？');
          }
        });
        pendingMedia.forEach(m => URL.revokeObjectURL(m.url));
        pendingMedia = [];
        renderMediaPreview();
        input.focus();
        return;
      }

      if (!msg) return;
      addMsg('user', msg);
      input.value = '';
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;

      // 文生图模式
      if (currentFunc === 'image' || (currentFunc === 'general' && isImageRequest(msg))) {
        const typing = addTyping();
        await delay(1500);
        typing.remove();
        const imgUrl = getMockImageUrl(msg);
        addMsg('ai', '已根据你的描述生成图片：<br><img src="' + imgUrl + '" class="chat-img" onclick="toggleImgSize(this)">');
        sendBtn.disabled = false;
        input.focus();
        return;
      }

      // 流式模拟
      const typing = addTyping();
      await delay(600);
      typing.remove();
      const reply = getMockReply(currentFunc, msg);
      addMsg('ai', reply);
      sendBtn.disabled = false;
      input.focus();
    }

    function addMsg(role, text) {
      const empty = document.getElementById('chatEmpty');
      if (empty) empty.style.display = 'none';
      const area = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = 'msg-row ' + role;
      if (role === 'user') {
        div.innerHTML = '<div class="user-bubble">' + text.replace(/\n/g, '<br>') + '</div>' +
          '<div class="msg-avatar user-avatar">👤</div>';
      } else {
        div.innerHTML = '<div class="msg-avatar ai-avatar"><img src="aitutor-avatar.png" alt="雪解" style="width:100%;height:100%;object-fit:cover;"></div>' +
          '<div class="ai-bubble">' + text.replace(/\n/g, '<br>') + '</div>';
      }
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
    }

    function addTyping() {
      const empty = document.getElementById('chatEmpty');
      if (empty) empty.style.display = 'none';
      const area = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = 'msg-row ai';
      div.innerHTML = '<div class="msg-avatar ai-avatar"><img src="aitutor-avatar.png" alt="雪解" style="width:100%;height:100%;object-fit:cover;"></div><div class="typing-dots"><span></span><span></span><span></span></div>';
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
      return { remove: () => div.remove() };
    }

    function clearMsgs() {
      document.getElementById('chatArea').innerHTML = '<div class="chat-empty" id="chatEmpty"><div class="empty-icon">💬</div><p>你好，我是助教雪解，有什么教学相关问题可以问我~</p></div>';
      convId = null;
      stopTTS();
      clearPendingMedia();
    }

    function newChat() {
      clearMsgs();
      document.getElementById('chatInput').value = '';
      document.getElementById('chatInput').focus();
    }

    function clearPendingMedia() {
      pendingMedia.forEach(m => URL.revokeObjectURL(m.url));
      pendingMedia = [];
      renderMediaPreview();
    }

    // ==================== 初始化 ====================
    renderCategories();

    // 演示：载入示例对话
    function loadDemo() {
      addMsg('ai', '你好！我是雪解，你的AI智能助教。我可以帮你：\n\n📖 **智能答疑**：回答教学相关问题\n📝 **课件生成**：自动生成教案和课件大纲\n✍️ **出题批阅**：生成试题、批改作业\n📊 **学情分析**：分析班级学习数据\n🎨 **文生图**：根据描述生成图片\n🔊 **配音**：文字转语音\n\n请在下方输入你的问题，或点击快捷功能开始体验吧~');
    }
    setTimeout(loadDemo, 500);
  </script>
</body>
</html>
