<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小乐适老智能电视系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }
        #guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }
        #guide-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .guide-step {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .guide-step.active {
            display: flex;
        }
        .gesture-icon {
            width: 240px;
            height: 240px;
            margin-bottom: 50px;
            position: relative;
        }
        .guide-text {
            font-size: 56px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 6px;
        }
        .step-indicator {
            position: absolute;
            bottom: 120px;
            display: flex;
            gap: 25px;
        }
        .step-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }
        .step-dot.active {
            background: #fff;
            transform: scale(1.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        #main-content {
            display: none;
            width: 100%;
            height: 100%;
            background: #000;
            padding-top: 100px;
            padding-bottom: 60px;
            box-sizing: border-box;
        }
        #main-content.visible {
            display: flex;
            flex-direction: column;
        }
        .category-list {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            flex: 1;
            gap: 15px;
            padding: 15px;
            min-height: 0;
        }
        .category-card {
            width: 85%;
            height: 220px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .category-card:not(.selected) {
            background: rgba(255, 255, 255, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.15);
        }
        .category-card.selected {
            background: rgba(0, 180, 0, 0.35);
            border: 5px solid #00ff00;
            box-shadow: 0 0 60px rgba(0, 255, 0, 0.4), 0 0 100px rgba(0, 255, 0, 0.2), inset 0 0 50px rgba(0, 255, 0, 0.15);
            align-items: stretch;
        }
        .category-title {
            font-size: 64px;
            font-weight: bold;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .category-card.selected .category-title {
            display: none;
        }
        .cat-icon {
            width: 70px;
            height: 70px;
            display: inline-block;
        }
        .sub-options {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: space-around;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            box-sizing: border-box;
        }
        .category-card.selected .sub-options {
            display: flex;
        }
        .sub-option {
            flex: 1;
            height: 140px;
            margin: 0 8px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
            position: relative;
            gap: 8px;
            padding: 10px 8px;
            box-sizing: border-box;
        }
        .sub-option.selected {
            background: #009900;
            border: 4px solid #fff;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.7), 0 8px 30px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.3);
            animation: breathing 2s ease-in-out infinite;
            height: 126px;
        }
        @keyframes breathing {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 0 0 40px rgba(0, 255, 0, 0.7), 0 8px 30px rgba(0, 0, 0, 0.5); 
            }
            50% { 
                transform: scale(1.03); 
                box-shadow: 0 0 60px rgba(0, 255, 0, 0.9), 0 12px 40px rgba(0, 0, 0, 0.6); 
            }
        }
        .sub-icon {
            width: 44px;
            height: 44px;
            display: inline-block;
        }
        #standby-mode {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 900;
        }
        #standby-mode.active {
            display: block;
        }
        .standby-indicator {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
        }
        #alert-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(139, 0, 0, 0.96);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #alert-modal.active {
            display: flex;
        }
        .alert-title {
            font-size: 84px;
            font-weight: bold;
            color: #fff;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.9);
        }
        .alert-subtitle {
            font-size: 44px;
            color: #fff;
            text-align: center;
            margin-bottom: 50px;
        }
        .alert-countdown {
            font-size: 56px;
            font-weight: bold;
            color: #ff0;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
        }
        .rescue-status {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            padding: 20px;
        }
        .rescue-level {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 12px 25px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            min-width: 350px;
            transition: all 0.5s ease;
            background: rgba(0, 0, 0, 0.3);
        }
        .rescue-level.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            animation: pulse 1s infinite;
        }
        .rescue-level.completed {
            color: #00ff88;
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
        }
        .top-btn {
            position: fixed;
            bottom: 80px;
            z-index: 600;
            padding: 22px 40px;
            font-size: 30px;
            font-weight: bold;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #demo-toggle {
            right: 30px;
            background: rgba(255, 0, 0, 0.7);
        }
        #demo-toggle:hover {
            background: rgba(255, 0, 0, 0.9);
            transform: scale(1.05);
        }
        #demo-toggle.active {
            background: rgba(0, 200, 0, 0.7);
        }
        #demo-toggle.active:hover {
            background: rgba(0, 200, 0, 0.9);
        }
        #simulate-fall {
            left: 30px;
            background: rgba(255, 165, 0, 0.7);
        }
        #simulate-fall:hover {
            background: rgba(255, 165, 0, 0.9);
            transform: scale(1.05);
        }

        .privacy-notice {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            z-index: 500;
            text-align: center;
            max-width: 90%;
        }
        canvas {
            position: fixed;
            bottom: 50px;
            right: 30px;
            width: 180px;
            height: 135px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            z-index: 600;
            display: none;
            transform: scaleX(-1);
        }
        canvas.show {
            display: block;
        }
        .hand-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawPath 1s ease-out forwards;
        }
        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>

    <script>
        const categories = ['健康服务', '娱乐陪伴', '紧急求助', '生活服务'];
        const guideSteps = 4;
        let currentStep = 1;
        let guideTimer = null;
        let isGuideComplete = false;
        let currentCategory = 0;
        let currentOption = 0;
        let isDemoMode = false;
        let isStandbyMode = false;
        let isAlertActive = false;
        let alertRound = 0;
        let alertTimer = null;
        let rescueTimer = null;
        let fallStartTime = null;
        let lastHandY = null;
        let lastHandX = null;
        let doubleTapCount = 0;
        let lastTapTime = 0;
        let speechEnabled = true;
        let useKeyboardFallback = false;
        let poseDetectionEnabled = false;
        let audioContext = null;
        let analyser = null;
        let backgroundNoise = 0;
        let videoDevices = [];
        let selectedCameraId = null;

        function speak(text) {
            if (!speechEnabled) return;
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                utterance.pitch = 1;
                utterance.volume = 0.8;
                window.speechSynthesis.speak(utterance);
            } catch (e) {
                console.log('Speech synthesis not available');
            }
        }

        function nextGuideStep() {
            if (isGuideComplete) return;
            
            document.querySelector('.guide-step.active').classList.remove('active');
            document.querySelector('.step-dot.active').classList.remove('active');
            
            currentStep++;
            if (currentStep > guideSteps) {
                completeGuide();
                return;
            }
            
            document.querySelector(`.guide-step[data-step="${currentStep}"]`).classList.add('active');
            document.querySelector(`.step-dot[data-step="${currentStep}"]`).classList.add('active');
            
            const texts = [
                '上下滑动，切换主类目',
                '左右滑动，选择功能',
                '拍两下，确认进入',
                '左下滑动，进入待机'
            ];

        function exitStandby() {
            document.getElementById('standby-mode').classList.remove('active');

        function startLifeMonitoring() {
            poseDetectionEnabled = true;
            if (audioContext && !analyser) {
                startAudioDetection();
            }
        }

        function startAudioDetection() {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    const source = audioContext.createMediaStreamSource(stream);
                    analyser = audioContext.createAnalyser();
                    source.connect(analyser);
                    analyser.fftSize = 256;
                    
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);
                    
                    let backgroundSamples = 0;
                    const maxBackgroundSamples = 30;
                    
                    function detectSound() {
                        if (!isStandbyMode || !analyser) return;
                        
                        analyser.getByteFrequencyData(dataArray);
                        const average = dataArray.reduce((a, b) => a + b) / bufferLength;
                        
                        if (backgroundSamples < maxBackgroundSamples) {
                            backgroundNoise = (backgroundNoise * backgroundSamples + average) / (backgroundSamples + 1);
                            backgroundSamples++;
                        } else {
                            if (average > backgroundNoise * 3) {
                                triggerAlert('检测到异常声音');
                                return;
                            }
                        }
                        
                        requestAnimationFrame(detectSound);
                    }
                    detectSound();
                })
                .catch(() => {
                    console.log('Audio not available');
                });
        }

        function triggerAlert(reason) {
            if (isAlertActive) return;
            
            isAlertActive = true;
            alertRound = 0;
            exitStandby();
            
            const modal = document.getElementById('alert-modal');
            modal.classList.add('active');
            document.getElementById('alert-reason').textContent = reason;
            
            speak('检测到异常情况，请确认是否需要帮助');
            
            startAlertLoop();
        }

        function startAlertLoop() {
            const interval = isDemoMode ? 3000 : 10000;
            const totalRounds = 3;
            let timeLeft = interval / 1000;
            
            const countdown = document.getElementById('alert-countdown');
            
            function updateCountdown() {
                if (!isAlertActive) return;
                
                countdown.textContent = `${timeLeft}秒后进入下一轮`;
                timeLeft--;
                
                if (timeLeft <= 0) {
                    alertRound++;
                    if (alertRound >= totalRounds) {
                        startRescueProcess();
                        return;
                    }
                    speak(`第${alertRound + 1}轮询问，是否需要帮助？`);
                    timeLeft = interval / 1000;
                }
                
                alertTimer = setTimeout(updateCountdown, 1000);
            }
            
            speak('第一轮询问，是否需要帮助？请拍手确认');
            updateCountdown();
        }

        function handleHandMovement(deltaY, deltaX) {
            if (isAlertActive) return;
            
            const sensitivity = 20;
            
            if (Math.abs(deltaY) > Math.abs(deltaX)) {
                if (deltaY > sensitivity) {
                    selectCategory(currentCategory - 1);
                } else if (deltaY < -sensitivity) {
                    selectCategory(currentCategory + 1);
                }
            } else {
                if (deltaX > sensitivity) {
                    selectOption(currentOption + 1);
                } else if (deltaX < -sensitivity) {
                    selectOption(currentOption - 1);
                }
            }
        }

        function handleDiagonalSwipe(deltaY, deltaX) {
            if (deltaY > 35 && deltaX < -35) {
                enterStandby();
            }
        }

        function setupHandsDetection() {
            console.log('=== 初始化手势检测模块 ===');
            
            const videoElement = document.createElement('video');
            videoElement.style.display = 'none';
            videoElement.style.transform = 'scaleX(-1)';
            
            console.log('=== 创建 Hands 对象 ===');
            const hands = new Hands({locateFile: (file) => {
                const url = `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`;
                console.log(`=== 加载资源: ${url} ===`);
                return url;
            }});
            
            console.log('=== 设置 Hands 参数 ===');
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 0,
                minDetectionConfidence: 0.3,
                minTrackingConfidence: 0.2
            });
            
            console.log('=== Hands 初始化完成 ===');
            
            hands.onResults((results) => {
                if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                    return;
                }
                
                const hand = results.multiHandLandmarks[0];
                const wrist = hand[0];
                const currentY = wrist.y;
                const currentX = wrist.x;
                
                if (lastHandY !== null) {
                    const deltaY = lastHandY - currentY;
                    const deltaX = currentX - lastHandX;
                    
                    const movementThreshold = 0.025;
                    
                    if (Math.abs(deltaY) > movementThreshold || Math.abs(deltaX) > movementThreshold) {
                        if (Math.abs(deltaY) > Math.abs(deltaX) * 1.2) {
                            handleHandMovement(deltaY * 100, 0);
                        } else if (Math.abs(deltaX) > Math.abs(deltaY) * 1.2) {
                            handleHandMovement(0, deltaX * 100);
                        } else if (deltaY > 0.018 && deltaX < -0.018) {
                            handleDiagonalSwipe(deltaY * 100, deltaX * 100);
                        }
                        
                        lastHandY = currentY;
                        lastHandX = currentX;
                    }
                } else {
                    lastHandY = currentY;
                    lastHandX = currentX;
                }
                
                const handCount = results.multiHandLandmarks.length;
                if (handCount >= 2) {
                    const now = Date.now();
                    if (now - lastTapTime < 800) {
                        doubleTapCount++;
                        if (doubleTapCount >= 2) {
                            if (!isGuideComplete) {
                                completeGuide();
                            } else if (!isStandbyMode && !isAlertActive) {
                                confirmSelection();
                            } else if (isAlertActive) {
                                cancelAlert();
                            }
                            doubleTapCount = 0;
                        }
                    } else {
                        doubleTapCount = 1;
                    }
                    lastTapTime = now;
                }
            });
            
            let attemptCount = 0;
            const maxAttempts = 2;
            
            function tryStartCamera(deviceId = null) {
                attemptCount++;
                console.log(`=== 尝试启动摄像头，第 ${attemptCount} 次 ===`);
                console.log(`=== 目标设备ID: ${deviceId || selectedCameraId || '默认'} ===`);
                
                const videoConstraints = {
                    width: { ideal: 640, max: 640 },
                    height: { ideal: 480, max: 480 }
                };
                
                if (deviceId) {
                    videoConstraints.deviceId = { exact: deviceId };
                    console.log(`=== 使用指定设备: ${deviceId} ===`);
                } else if (selectedCameraId) {
                    videoConstraints.deviceId = { exact: selectedCameraId };
                    console.log(`=== 使用预选设备: ${selectedCameraId} ===`);
                } else {
                    console.log('=== 使用默认设备 ===');
                }
                
                console.log(`=== 请求摄像头权限，参数: ${JSON.stringify(videoConstraints)} ===`);
                
                navigator.mediaDevices.getUserMedia({ video: videoConstraints })
                    .then(async (stream) => {
                        console.log('=== 摄像头权限获取成功 ===');
                        console.log(`=== 视频流信息: ${stream.getVideoTracks().length} 条视频轨道 ===`);
                        
                        videoElement.srcObject = stream;
                        
                        videoElement.onloadedmetadata = async () => {
                            console.log('=== 视频元数据加载完成 ===');
                            await videoElement.play().catch((e) => console.log('=== 视频播放忽略错误:', e));
                            
                            const canvas = document.getElementById('camera-preview');
                            canvas.classList.add('show');
                            console.log('=== 摄像头预览已显示 ===');
                            
                            console.log('=== 创建 Camera 对象 ===');
                            const camera = new Camera(videoElement, {
                                onFrame: async () => {
                                    await hands.send({ image: videoElement });
                                },
                                width: 640,
                                height: 480
                            });
                            console.log('=== 启动 Camera ===');
                            camera.start();
                            console.log('=== 手势识别已启动 ===');
                        };
                        
                        if (videoElement.readyState >= 2) {
                            await videoElement.play().catch((e) => console.log('=== 视频播放忽略错误:', e));
                            
                            const canvas = document.getElementById('camera-preview');
                            canvas.classList.add('show');
                            
                            const camera = new Camera(videoElement, {
                                onFrame: async () => {
                                    await hands.send({ image: videoElement });
                                },
                                width: 640,
                                height: 480
                            });
                            camera.start();
                        }
                    })
                    .catch((error) => {
                        console.error('=== 摄像头启动失败 ===');
                        console.error('错误类型:', error.name);
                        console.error('错误消息:', error.message);
                        console.error('错误详情:', error);
                        
                        const errorMessages = {
                            'NotAllowedError': '权限被拒绝 - 用户拒绝了摄像头权限请求',
                            'NotFoundError': '未找到设备 - 系统中未检测到可用的摄像头设备',
                            'NotReadableError': '设备不可读 - 摄像头被其他应用占用或设备故障',
                            'OverconstrainedError': '约束冲突 - 请求的分辨率或设备约束无法满足',
                            'SecurityError': '安全错误 - 当前页面协议不支持摄像头访问'
                        };
                        
                        console.error('=== 错误原因分析:', errorMessages[error.name] || '未知错误');
                        
                        if (attemptCount < maxAttempts && videoDevices.length > 0) {
                            const nextDeviceIndex = attemptCount % videoDevices.length;
                            const nextDeviceId = videoDevices[nextDeviceIndex].deviceId;
                            if (nextDeviceId !== deviceId) {
                                console.log(`=== 尝试切换到下一个设备: ${nextDeviceId} ===`);
                                setTimeout(() => tryStartCamera(nextDeviceId), 1000);
                                return;
                            }
                        }
                        
                        console.error('=== 所有尝试均失败，切换到键盘操作模式 ===');
                        if (!useKeyboardFallback) {
                            enableKeyboardFallback();
                            showStatusMessage('摄像头未启用，可使用键盘操作', 'warning');
                        }
                    });
            }
            
            tryStartCamera();
        }

        function setupPoseDetection() {
            const videoElement = document.createElement('video');
            videoElement.style.display = 'none';
            videoElement.style.transform = 'scaleX(-1)';
            
            const pose = new Pose({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.4.1675469240/${file}`;
            }});
            
            pose.setOptions({
                modelComplexity: 0,
                smoothLandmarks: true,
                enableSegmentation: false,
                smoothSegmentation: true,
                minDetectionConfidence: 0.3,
                minTrackingConfidence: 0.2
            });
            
            pose.onResults((results) => {
                if (!isStandbyMode || !poseDetectionEnabled) return;
                
                if (!results.poseLandmarks) return;
                
                const landmarks = results.poseLandmarks;
                const leftShoulder = landmarks[11];
                const rightShoulder = landmarks[12];
                const leftHip = landmarks[23];
                const rightHip = landmarks[24];
                
                if (!leftShoulder || !rightShoulder || !leftHip || !rightHip) return;
                
                const shoulderY = (leftShoulder.y + rightShoulder.y) / 2;
                const hipY = (leftHip.y + rightHip.y) / 2;
                
                const isLying = Math.abs(shoulderY - hipY) < 0.15;
                
                if (isLying) {
                    if (!fallStartTime) {
                        fallStartTime = Date.now();
                    } else if (Date.now() - fallStartTime > 5000) {
                        triggerAlert('检测到疑似跌倒姿势');
                        fallStartTime = null;
                    }
                } else {
                    fallStartTime = null;
                }
            });
            
            const videoConstraints = {
                width: { ideal: 640, max: 640 },
                height: { ideal: 480, max: 480 }
            };
            
            if (selectedCameraId) {
                videoConstraints.deviceId = { exact: selectedCameraId };
            }
            
            navigator.mediaDevices.getUserMedia({ video: videoConstraints })
                .then(async (stream) => {
                    videoElement.srcObject = stream;
                    
                    videoElement.onloadedmetadata = async () => {
                        await videoElement.play().catch(() => {});
                        
                        const camera = new Camera(videoElement, {
                            onFrame: async () => {
                                await pose.send({ image: videoElement });
                            },
                            width: 640,
                            height: 480
                        });
                        camera.start();
                    };
                    
                    if (videoElement.readyState >= 2) {
                        await videoElement.play().catch(() => {});
                        
                        const camera = new Camera(videoElement, {
                            onFrame: async () => {
                                await pose.send({ image: videoElement });
                            },
                            width: 640,
                            height: 480
                        });
                        camera.start();
                    }
                })
                .catch(() => {});
        }

        document.addEventListener('keydown', function handleKeyDown(e) {
            if (!isGuideComplete) return;
            
            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    selectCategory(currentCategory - 1);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    selectCategory(currentCategory + 1);
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    selectOption(currentOption - 1);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    selectOption(currentOption + 1);
                    break;
                case ' ':
                case 'Enter':
                    e.preventDefault();
                    if (!isAlertActive) {
                        confirmSelection();
                    } else {
                        cancelAlert();
                    }
                    break;
                case 'Escape':
                    e.preventDefault();
                    if (!isAlertActive) {
                        const demoModal = document.getElementById('demo-modal');
                        if (demoModal) {
                            demoModal.remove();
                            speak('返回主菜单');
                            return;
                        }
                        if (isStandbyMode) {
                            exitStandby();
                        } else {
                            enterStandby();
                        }
                    } else {
                        cancelAlert();
                    }
                    break;
            }
        });

        document.getElementById('demo-toggle').addEventListener('click', () => {
            isDemoMode = !isDemoMode;
            const btn = document.getElementById('demo-toggle');
            btn.classList.toggle('active');
            btn.textContent = isDemoMode ? '演示模式(开)' : '演示模式(关)';
            speak(isDemoMode ? '演示模式已开启' : '演示模式已关闭');
        });

        document.getElementById('simulate-fall').addEventListener('click', () => {
            triggerAlert('模拟跌倒演示');
        });

        function checkProtocol() {
            if (window.location.protocol === 'file:') {
                useKeyboardFallback = true;
                return true;
            }
            return false;
        }

        function showStatusMessage(message, type = 'success') {
            const existingToast = document.getElementById('status-toast');
            if (existingToast) {
                existingToast.remove();
            }
            
            const toast = document.createElement('div');
            toast.id = 'status-toast';
            toast.style.cssText = `
                position: fixed;
                top: 130px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 30px;
                border-radius: 8px;
                font-size: 28px;
                font-weight: bold;
                z-index: 1000;
                opacity: 0;
                transition: opacity 0.3s ease;
                color: #fff;
                ${type === 'success' ? 'background: rgba(0, 180, 0, 0.7);' : type === 'error' ? 'background: rgba(255, 80, 80, 0.7);' : 'background: rgba(255, 165, 0, 0.7);'}
                max-width: 80%;
                text-align: center;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '1';
            }, 50);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 300);
            }, 3000);
        }

        async function enumerateVideoDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                for (const device of videoDevices) {
                    if (device.label.toLowerCase().includes('usb') || 
                        device.label.toLowerCase().includes('external') ||
                        device.label.toLowerCase().includes('camera')) {
                        selectedCameraId = device.deviceId;
                        break;
                    }
                }
                
                if (!selectedCameraId && videoDevices.length > 0) {
                    selectedCameraId = videoDevices[0].deviceId;
                }
                
                console.log('Available cameras:', videoDevices);
                console.log('Selected camera:', selectedCameraId);
                
                return videoDevices.length > 0;
            } catch (e) {
                console.log('Failed to enumerate devices:', e);
                return false;
            }
        }

        async function checkLocalFiles() {
            const requiredFiles = [
                './libs/hands.min.js',
                './libs/camera_utils.min.js',
                './libs/pose.min.js',
                './libs/hands_solution_simd_wasm_bin.wasm',
                './libs/hands_landmark_lite.tflite',
                './libs/hands_recrop.tflite',
                './libs/pose_solution_simd_wasm_bin.wasm',
                './libs/pose_landmark_lite.tflite'
            ];
            
            console.log('=== 检查本地模型文件 ===');
            let allExists = true;
            
            for (const file of requiredFiles) {
                try {
                    const response = await fetch(file, { method: 'HEAD' });
                    if (!response.ok) {
                        console.log(`=== 缺失文件: ${file} ===`);
                        allExists = false;
                    } else {
                        console.log(`=== 已找到: ${file} ===`);
                    }
                } catch (e) {
                    console.log(`=== 检查失败: ${file} ===`, e);
                    allExists = false;
                }
            }
            
            return allExists;
        }
        
        async function initSensors() {
            if (window.location.protocol === 'file:') {
                useKeyboardFallback = true;
                return;
            }
            
            showStatusMessage('正在检测摄像头设备...', 'info');
            
            try {
                const hasDevices = await enumerateVideoDevices();
                
                if (!hasDevices || videoDevices.length === 0) {
                    showStatusMessage('未检测到可用摄像头设备，请检查设备连接与驱动', 'error');
                    useKeyboardFallback = true;
                    return;
                }
                
                if (!selectedCameraId && videoDevices.length > 0) {
                    selectedCameraId = videoDevices[0].deviceId;
                }
                
                if (selectedCameraId) {
                    showStatusMessage('检测到摄像头设备', 'success');
                }
                
                showStatusMessage('正在申请权限...', 'info');
                
                const videoConstraints = {
                    width: { ideal: 640, max: 640 },
                    height: { ideal: 480, max: 480 },
                    deviceId: { exact: selectedCameraId }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: videoConstraints
                });
                
                stream.getTracks().forEach(track => track.stop());
                
                showStatusMessage('摄像头已启动', 'success');
                
                initGestureRecognition();
                
            } catch (error) {
                console.error('Camera initialization failed:', error);
                
                if (error.name === 'NotAllowedError') {
                    showStatusMessage('摄像头权限被拒绝，请点击浏览器地址栏右侧摄像头图标设置允许', 'error');
                } else if (error.name === 'NotFoundError') {
                    showStatusMessage('未检测到可用摄像头设备，请检查设备连接与驱动', 'error');
                } else if (error.name === 'NotReadableError') {
                    showStatusMessage('摄像头被其他应用占用，请关闭其他使用摄像头的软件', 'error');
                } else {
                    showStatusMessage('摄像头启动失败：' + error.message, 'error');
                }
                
                useKeyboardFallback = true;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkProtocol();
            
            speak('欢迎使用小乐适老智能电视系统');
            
            speak('上下滑动，切换主类目');
            
            guideTimer = setTimeout(nextGuideStep, 2500);
            
            document.addEventListener('click', initAudioContext, { once: true });
            document.addEventListener('keydown', initAudioContext, { once: true });
        });
    </script>
