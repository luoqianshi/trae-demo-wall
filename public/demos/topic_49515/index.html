        };
        
        async function loadData() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);
            
            try {
                const response = await fetch('https://console.authing.cn/webhook/2fd05435-b258-44f7-b5ae-760565ff646a', {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error('HTTP error');
                const responseData = await response.json();
                
                let content = responseData;
                if (responseData.data && responseData.data.output && responseData.data.output.data) {
                    content = responseData.data.output.data;
                    if (content.data && content.data.content) {
                        content = content.data.content;
                    }
                }
                
                if (typeof content === 'string') {
                    try {
                        content = JSON.parse(content);
                    } catch (e) {
                        console.error('JSON parse failed:', e);
                        content = parseContentData(content);
                    }
                }
                
                if (content && (content.industries || content.stocks || content.themes)) {
                    industries = (content.industries || []).map(i => ({
                        name: i.name || i.name_en || '',
                        color: i.color || '#00d4ff'
                    }));
                    themes = (content.themes || []).map(t => ({
                        name: t.name || t.name_en || '',
                        color: t.color || '#7b61ff'
                    }));
                    allData = (content.stocks || []).map(s => ({
                        name: s.name || s.sname || '',
                        code: s.code || s.scode || '',
                        industry: s.industry || '',
                        theme: s.theme || '',
                        marketCap: parseFloat(s.market_cap || s.marketCap || 0),
                        pe: parseFloat(s.pe || 0),
                        pb: parseFloat(s.pb || 0),
                        roe: parseFloat(s.roe || 0),
                        revenue: parseFloat(s.revenue || 0),
                        profit: parseFloat(s.profit || 0),
                        change: parseFloat(s.change || 0),
                        dividend: parseFloat(s.dividend || 0),
                        debt: parseFloat(s.debt || 0),
                        volume: parseFloat(s.volume || 0),
                        price: parseFloat(s.price || 0)
                    }));
                    currentData = [...allData];
                    selectedIndustries = new Set(industries.map(i => i.name));
                    return true;
                }
                console.log('API data invalid, falling back to local data');
                loadLocalData();
                return true;
            } catch (error) {
                clearTimeout(timeoutId);
                console.warn('API fetch failed:', error);
                console.log('Falling back to local data');
                loadLocalData();
                return true;
            }
        }
        
        function parseContentData(content) {
            try {
                if (content.includes('industries:') && content.includes('stocks:')) {
                    const industriesMatch = content.match(/industries:\s*\[([\s\S]*?)\]/);
                    const themesMatch = content.match(/themes:\s*\[([\s\S]*?)\]/);
                    const stocksMatch = content.match(/stocks:\s*\[([\s\S]*?)\]/);
                    
                    if (industriesMatch || themesMatch || stocksMatch) {
                        const industries = industriesMatch ? parseArrayData(industriesMatch[1]) : [];
                        const themes = themesMatch ? parseArrayData(themesMatch[1]) : [];
                        const stocks = stocksMatch ? parseStockData(stocksMatch[1]) : [];
                        return { industries, themes, stocks };
                    }
                }
                return null;
            } catch (e) {
                console.error('Failed to parse content:', e);
                return null;
            }
        }
        
        function parseArrayData(str) {
            const items = [];
            const regex = /\{\s*name:\s*'([^']+)',\s*color:\s*'([^']+)'\s*\}/g;
            let match;
            while ((match = regex.exec(str)) !== null) {
                items.push({ name: match[1], color: match[2] });
            }
            return items;
        }
        
        function parseStockData(str) {
            try {
                const cleanStr = str.replace(/\s+/g, ' ');
                const stockObjects = cleanStr.match(/\{[^}]+\}/g);
                const stocks = [];
                
                for (const obj of stockObjects) {
                    try {
                        const jsonStr = obj.replace(/(\w+):/g, '"$1":');
                        const stock = JSON.parse(jsonStr);
                        stocks.push(stock);
                    } catch (e) {
                        continue;
                    }
                }
                
                return stocks;
            } catch (e) {
                console.error('Failed to parse stock data:', e);
                return [];
            }
        }

        function initChart() {
            const chartDom = document.getElementById('chart');
            myChart = echarts.init(chartDom, 'dark');
            
            window.addEventListener('resize', () => {
                myChart.resize();
            });
            
            myChart.on('click', function(params) {
                if (params.componentType === 'series') {
                    showStockDetail(params.data);
                }
            });
            
            updateChart();
        }
        
        function getColorByGroup(item) {
            if (currentTheme === 'industry') {
                const ind = industries.find(i => i.name === item.industry);
                return ind ? ind.color : '#999';
            } else {
                const theme = themes.find(t => t.name === item.theme);
                return theme ? theme.color : '#999';
            }
        }
        
        function updateChart() {
            if (!myChart) return;
            
            const xKey = document.getElementById('xAxis').value;
            const yKey = document.getElementById('yAxis').value;
            const sizeKey = document.getElementById('bubbleSize').value;
            const minCap = parseInt(document.getElementById('minCap').value);
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            
            // 过滤数据
            currentData = allData.filter(item => {
                if (item.marketCap < minCap) return false;
                if (!selectedIndustries.has(item.industry)) return false;
                if (searchTerm && !item.name.includes(searchTerm) && !item.code.toLowerCase().includes(searchTerm)) return false;
                return true;
            });
            
            updateStats();
            
            const groups = {};
            currentData.forEach(item => {
                const key = currentTheme === 'industry' ? item.industry : item.theme;
                if (!groups[key]) groups[key] = [];
                groups[key].push(item);
            });
            
            const series = Object.keys(groups).map(key => {
                const color = currentTheme === 'industry' 
                    ? industries.find(i => i.name === key)?.color 
                    : themes.find(t => t.name === key)?.color;
                
                return {
                    name: key,
                    type: 'scatter',
                    data: groups[key].map(item => {
                        const size = Math.sqrt(item[sizeKey]) || 10;
                        const normalizedSize = Math.max(8, Math.min(60, size / 3));
                        
                        return {
                            value: [
                                item[xKey],
                                item[yKey],
                                normalizedSize,
                                item.name,
                                item.code,
                                item.industry,
                                item.marketCap,
                                item.pe,
                                item.change,
                                item.price
                            ],
                            itemStyle: {
                                color: color,
                                opacity: 0.8,
                                shadowBlur: 10,
                                shadowColor: color + '40'
                            }
                        };
                    }),
                    symbolSize: function(data) {
                        return data[2];
                    },
                    emphasis: {
                        focus: 'series',
                        itemStyle: {
                            opacity: 1,
                            borderColor: '#fff',
                            borderWidth: 2,
                            shadowBlur: 20,
                            shadowColor: 'rgba(255,255,255,0.3)'
                        }
                    }
                };
            });
            
            const option = {
                backgroundColor: 'transparent',
                grid: {
                    left: '8%',
                    right: '15%',
                    top: '10%',
                    bottom: '10%'
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(17, 22, 32, 0.95)',
                    borderColor: '#2a3441',
                    borderWidth: 1,
                    padding: [15, 20],
                    textStyle: {
                        color: '#e0e6ed'
                    },
                    extraCssText: 'box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 10px;',
                    formatter: function(params) {
                        const d = params.data;
                        const color = params.color;
                        return `
                            <div style="font-weight:700;font-size:16px;margin-bottom:10px;color:${color}">
                                ${d.value[3]} <span style="font-size:12px;color:#8899aa;font-weight:400">${d.value[4]}</span>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;font-size:13px;line-height:1.8">
                                <div><span style="color:#8899aa">行业:</span> ${d.value[5]}</div>
                                <div><span style="color:#8899aa">股价:</span> ¥${d.value[9]}</div>
                                <div><span style="color:#8899aa">市值:</span> ${d.value[6]}亿</div>
                                <div><span style="color:#8899aa">PE:</span> ${d.value[7]}</div>
                                <div><span style="color:#8899aa">涨幅:</span> <span style="color:${d.value[8] >= 0 ? '#00d4aa' : '#ff4757'}">${d.value[8] >= 0 ? '+' : ''}${d.value[8]}%</span></div>
                                <div><span style="color:#8899aa">${dimensionLabels[xKey]}:</span> ${d.value[0]}</div>
                                <div><span style="color:#8899aa">${dimensionLabels[yKey]}:</span> ${d.value[1]}</div>
                            </div>
                        `;
                    }
                },
                xAxis: {
                    name: dimensionLabels[xKey],
                    nameLocation: 'middle',
                    nameGap: 35,
                    type: 'value',
                    scale: true,
                    splitLine: {
                        lineStyle: {
                            color: '#1e2530',
                            type: 'dashed'
                        }
                    },
                    axisLine: {
                        lineStyle: { color: '#2a3441' }
                    },
                    axisLabel: {
                        color: '#8899aa'
                    },

                        color: '#ccd6e0',

                    }

                yAxis: {

                            color: '#1e2530',

                        }

                    axisLine: {

                    },
                    axisLabel: {
                        color: '#8899aa'
                    },

                        color: '#ccd6e0',

                },
                legend: {

                        color: '#8899aa',

                    pageIconColor: '#00d4ff',
                    pageTextStyle: {
                        color: '#8899aa'
                    }
                },
                series: series,
                animationDuration: 1000,
                animationEasing: 'cubicOut'
            };
            
            myChart.setOption(option, true);
        }
        
        function updateStats() {
            const count = currentData.length;
            const avgChange = count > 0 ? (currentData.reduce((a, b) => a + b.change, 0) / count).toFixed(2) : 0;
            const avgPE = count > 0 ? (currentData.reduce((a, b) => a + b.pe, 0) / count).toFixed(2) : 0;
            const avgCap = count > 0 ? Math.round(currentData.reduce((a, b) => a + b.marketCap, 0) / count) : 0;
            
            document.getElementById('totalCount').textContent = count;
            document.getElementById('avgChange').textContent = (avgChange > 0 ? '+' : '') + avgChange + '%';
            document.getElementById('avgChange').className = 'stat-value ' + (avgChange >= 0 ? 'positive' : 'negative');
            document.getElementById('avgPE').textContent = avgPE;
            document.getElementById('avgCap').textContent = avgCap + '亿';
        }

        function initIndustryTags() {
            const container = document.getElementById('industryTags');
            container.innerHTML = '';
            
            const items = currentTheme === 'industry' ? industries : themes;
            
            items.forEach(item => {
                const tag = document.createElement('div');
                tag.className = 'tag active';
                tag.textContent = item.name;
                tag.style.borderColor = item.color;
                tag.dataset.name = item.name;
                tag.addEventListener('click', function() {
                    this.classList.toggle('active');
                    const name = this.dataset.name;
                    if (selectedIndustries.has(name)) {
                        selectedIndustries.delete(name);
                    } else {
                        selectedIndustries.add(name);
                    }
                    updateChart();
                });
                container.appendChild(tag);
            });
        }

        document.getElementById('xAxis').addEventListener('change', updateChart);
        document.getElementById('yAxis').addEventListener('change', updateChart);
        document.getElementById('bubbleSize').addEventListener('change', updateChart);
        
        document.getElementById('minCap').addEventListener('input', function() {
            document.getElementById('minCapVal').textContent = this.value + '亿';
            updateChart();
        });
        
        document.getElementById('searchBox').addEventListener('input', updateChart);
        
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTheme = this.dataset.theme;
                selectedIndustries = new Set((currentTheme === 'industry' ? industries : themes).map(i => i.name));
                initIndustryTags();
                updateChart();
            });
        });

        function switchLang(lang) {
            const t = translations[lang];
            document.getElementById('page-title').textContent = t.pageTitle;
            document.getElementById('nav-home').textContent = t.navHome;
            document.getElementById('nav-map').textContent = t.navMap;
            document.getElementById('nav-simback').textContent = t.navSimback;
            document.getElementById('nav-me').textContent = t.navMe;
            document.getElementById('nav-factor').textContent = t.navFactor;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
            
            localStorage.setItem('ebi-lang', lang);
            dimensionLabels = t.dimensionLabels;
            
            updateSelectOptions('xAxis', t.dimensionLabels);
            updateSelectOptions('yAxis', t.dimensionLabels);
            updateBubbleOptions(t.bubbleOptions);
            
            document.querySelector('label[for="xAxis"], .control-group:nth-child(1) label').textContent = t.xAxisLabel;
            document.querySelector('.control-group:nth-child(2) label').textContent = t.yAxisLabel;
            document.querySelector('.control-group:nth-child(3) label').textContent = t.bubbleSizeLabel;
            document.querySelector('.control-group:nth-child(4) label').textContent = t.minCapLabel;
            
            document.querySelectorAll('.filter-title')[0].textContent = t.filterIndustry;
            document.querySelectorAll('.filter-title')[1].textContent = t.filterOverview;
            document.querySelectorAll('.filter-title')[2].textContent = t.filterDetail;
            
            document.querySelectorAll('.stat-label')[0].textContent = t.statTotal;
            document.querySelectorAll('.stat-label')[1].textContent = t.statAvgChange;
            document.querySelectorAll('.stat-label')[2].textContent = t.statAvgPE;
            document.querySelectorAll('.stat-label')[3].textContent = t.statAvgCap;
            
            document.querySelectorAll('.theme-btn')[0].textContent = t.themeIndustry;
            document.querySelectorAll('.theme-btn')[1].textContent = t.themeConcept;
            
            document.getElementById('searchBox').placeholder = t.searchPlaceholder;
            document.getElementById('selectedStock').textContent = t.clickToView;
            
            updateChart();
        }

        function updateSelectOptions(id, labels) {
            const select = document.getElementById(id);
            const currentValue = select.value;
            select.innerHTML = '';
            const keys = ['pe', 'pb', 'roe', 'marketCap', 'revenue', 'profit', 'change', 'dividend', 'debt'];
            keys.forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = labels[key];
                if (key === currentValue) option.selected = true;
                select.appendChild(option);
            });
        }

        function updateBubbleOptions(options) {
            const select = document.getElementById('bubbleSize');
            const currentValue = select.value;
            const keys = ['marketCap', 'revenue', 'profit', 'volume', 'pe'];
            select.innerHTML = '';
            keys.forEach((key, index) => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = options[index];
                if (key === currentValue) option.selected = true;
                select.appendChild(option);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 语言设置将在 window.load 事件中应用
        });
    </script>
