<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>久坐提醒</title>
    <style>
      :root {
        /* Linear 设计令牌 */
        --canvas: #010102;
        --surface-1: #0f1011;
        --surface-2: #141516;
        --surface-3: #18191a;
        --hairline: #23252a;
        --hairline-strong: #34343a;
        --ink: #f7f8f8;
        --ink-muted: #d0d6e0;
        --ink-subtle: #8a8f98;
        --ink-tertiary: #62666d;
        --primary: #5e6ad2;
        --primary-hover: #828fff;
        --primary-focus: #5e69d1;
        --success: #27a644;
        --warning: #d4a72c;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          'SF Pro Display',
          'Microsoft YaHei',
          system-ui,
          sans-serif;
        background: var(--canvas);
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 28px;
        text-align: center;
        -webkit-font-smoothing: antialiased;
        letter-spacing: -0.01em;
        position: relative;
        overflow-y: auto;
      }

      /* 背景柔光 —— Linear 极简氛围 */
      body::before {
        content: '';
        position: absolute;
        top: -20%;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 400px;
        background: radial-gradient(ellipse at center, rgba(94, 106, 210, 0.08), transparent 70%);
        pointer-events: none;
        z-index: 0;
        transition: background 0.4s;
      }
      /* 休息状态 —— 柔光转为成功色绿调 */
      body.resting::before {
        background: radial-gradient(ellipse at center, rgba(39, 166, 68, 0.07), transparent 70%);
      }

      .content {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 顶部品牌徽标 —— Linear brand mark */
      .brand-mark {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 12px 5px 8px;
        background: var(--surface-1);
        border: 1px solid var(--hairline);
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 500;
        color: var(--ink-subtle);
        letter-spacing: 0.01em;
        margin-bottom: 18px;
      }
      .brand-mark .dot {
        width: 8px;
        height: 8px;
        border-radius: 2px;
        background: var(--primary);
        box-shadow: 0 0 8px rgba(94, 106, 210, 0.6);
      }

      .icon {
        font-size: 44px;
        margin-bottom: 14px;
        line-height: 1;
        filter: drop-shadow(0 4px 12px rgba(94, 106, 210, 0.2));
      }

      .eyebrow {
        font-size: 12px;
        font-weight: 500;
        color: var(--primary-hover);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      h1 {
        font-size: 26px;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 8px;
        letter-spacing: -0.03em;
        line-height: 1.15;
      }

      .subtitle {
        font-size: 14px;
        color: var(--ink-subtle);
        margin-bottom: 10px;
        line-height: 1.6;
        max-width: 380px;
      }

      .countdown {
        font-size: 44px;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 16px;
        min-height: 52px;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.04em;
        line-height: 1.1;
      }
      .countdown.rest {
        color: var(--primary-hover);
      }

      /* 按钮组 —— Linear button 系统，单列垂直排列 */
      .buttons {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        width: 100%;
        max-width: 380px;
      }
      button {
        font-family: inherit;
        padding: 11px 16px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid var(--hairline);
        border-radius: 8px;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s,
          transform 0.05s;
        color: var(--ink);
        background: var(--surface-1);
        letter-spacing: -0.01em;
        width: 100%;
        text-align: center;
      }
      button:hover {
        background: var(--surface-2);
        border-color: var(--hairline-strong);
      }
      button:active {
        transform: translateY(0.5px);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      /* 主操作 —— Linear button-primary 薰衣草蓝 */
      .btn-rest {
        background: var(--primary);
        color: #fff;
        border-color: transparent;
      }
      .btn-rest:hover {
        background: var(--primary-hover);
        border-color: transparent;
      }

      /* 休息结束按钮 —— 成功色，表示积极完成 */
      body.resting .btn-rest {
        background: var(--success);
      }
      body.resting .btn-rest:hover {
        background: #2fc25a;
      }

      /* 次级操作 —— Linear button-secondary */
      .btn-snooze,
      .btn-false {
        background: var(--surface-1);
        color: var(--ink-muted);
      }

      /* 弱化操作 —— Linear button-tertiary */
      .btn-dismiss {
        background: transparent;
        color: var(--ink-subtle);
        border-color: var(--hairline);
      }
      .btn-dismiss:hover {
        color: var(--ink-muted);
        background: var(--surface-1);
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <div class="brand-mark">
        <span class="dot"></span>
        <span>久坐提醒</span>
      </div>

      <div class="icon" id="icon">⏰</div>
      <div class="eyebrow" id="eyebrow">Time to move</div>
      <h1 id="title">该站起来活动一下了</h1>
      <p class="subtitle" id="subtitle">你已经连续工作 45 分钟，建议起身休息 5 分钟。</p>

      <div class="countdown" id="countdown"></div>

      <div class="buttons" id="actionButtons">
        <button class="btn-rest" id="btnRest">开始休息 · 5 分钟</button>
        <button class="btn-snooze" id="btnSnooze">再等 10 分钟</button>
        <button class="btn-false" id="btnFalse">刚才休息过了</button>
        <button class="btn-dismiss" id="btnDismiss">现在很忙，免打扰</button>
      </div>

      <div class="buttons hidden" id="restingButtons">
        <button class="btn-rest" id="btnEndRest">结束休息，开始工作</button>
      </div>
    </div>

    <script src="reminder.js"></script>
  </body>
</html>
