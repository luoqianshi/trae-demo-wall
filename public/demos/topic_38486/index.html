<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>情绪星球 - 青少年心理疗愈互动游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0e27;
    --bg2: #12183a;
    --ink: #e8ecf4;
    --muted: #8b95a8;
    --accent: #6b8dd8;
    --accent2: #7bc8a0;
    --accent3: #d484b8;
    --accent4: #e8a87c;
    --happy: #FFD93D;
    --calm: #6B8DD8;
    --anxious: #9B7ED9;
    --sad: #7BA8C8;
    --angry: #E8A87C;
    --excited: #7BC8A0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  .screen {
    display: none;
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }
  .screen.active { display: flex; flex-direction: column; }

  /* Starfield background */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* UI Layer */
  .ui-layer {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 1.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .star-count {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.9rem;
    color: var(--happy);
  }
  .star-count::before {
    content: '✦';
    font-size: 1.1rem;
  }

  /* Navigation */
  .nav-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 8px 0;
    flex-shrink: 0;
  }
  .nav-btn {
    background: rgba(107,141,216,0.15);
    border: 1px solid rgba(107,141,216,0.3);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .nav-btn:hover, .nav-btn.active {
    background: rgba(107,141,216,0.3);
    color: var(--ink);
    border-color: var(--accent);
  }

  /* Planet Grid */
  .planet-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 20px 0;
    flex: 1;
    align-content: center;
    justify-items: center;
  }
  @media (max-width: 480px) {
    .planet-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .planet-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.3s;
    padding: 10px;
  }
  .planet-item:hover { transform: scale(1.08); }
  .planet-item:hover .planet-orb { animation: planetPulse 1.5s ease-in-out infinite; }

  @keyframes planetPulse {
    0%, 100% { box-shadow: 0 0 20px currentColor; }
    50% { box-shadow: 0 0 40px currentColor, 0 0 60px currentColor; }
  }

  .planet-orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    position: relative;
    margin-bottom: 10px;
    transition: box-shadow 0.3s;
  }
  .planet-orb::after {
    content: '';
    position: absolute;
    top: 15%; left: 20%;
    width: 25%; height: 20%;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
  }

  .planet-happy { background: linear-gradient(135deg, #FFD93D, #F5A623); color: #FFD93D; }
  .planet-calm { background: linear-gradient(135deg, #6B8DD8, #4A6FC7); color: #6B8DD8; }
  .planet-anxious { background: linear-gradient(135deg, #9B7ED9, #7B5FC7); color: #9B7ED9; }
  .planet-sad { background: linear-gradient(135deg, #7BA8C8, #5A8DB0); color: #7BA8C8; }
  .planet-angry { background: linear-gradient(135deg, #E8A87C, #D4846A); color: #E8A87C; }
  .planet-excited { background: linear-gradient(135deg, #7BC8A0, #5AB080); color: #7BC8A0; }

  .planet-name {
    font-size: 0.9rem;
    color: var(--ink);
    text-align: center;
  }
  .planet-desc {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    margin-top: 2px;
  }

  /* Planet Detail Screen */
  .planet-detail {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .planet-detail-orb {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 20px;
    position: relative;
    animation: planetFloat 3s ease-in-out infinite;
  }
  @keyframes planetFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .planet-detail h2 {
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  .planet-detail p {
    color: var(--muted);
    text-align: center;
    max-width: 400px;
    margin-bottom: 24px;
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .activity-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 400px;
  }
  .activity-btn {
    background: rgba(107,141,216,0.15);
    border: 1px solid rgba(107,141,216,0.3);
    color: var(--ink);
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.3s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .activity-btn:hover {
    background: rgba(107,141,216,0.3);
    border-color: var(--accent);
    transform: translateX(5px);
  }
  .activity-btn .icon {
    font-size: 1.3rem;
  }

  .back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--ink);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    z-index: 20;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  /* Breathing Exercise */
  .breathing-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .breathing-orb {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(107,141,216,0.8), rgba(107,141,216,0.3));
    box-shadow: 0 0 60px rgba(107,141,216,0.4);
    transition: all 4s ease-in-out;
  }
  .breathing-orb.inhale {
    transform: scale(1.5);
    box-shadow: 0 0 100px rgba(107,141,216,0.6);
  }
  .breathing-text {
    margin-top: 40px;
    font-size: 1.3rem;
    color: var(--accent);
    text-align: center;
  }
  .breathing-timer {
    margin-top: 10px;
    font-size: 2rem;
    color: var(--ink);
    font-weight: 300;
  }
  .breathing-instruction {
    margin-top: 20px;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    max-width: 300px;
  }

  /* Diary Screen */
  .diary-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 0;
    overflow-y: auto;
  }
  .mood-selector {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 15px 0;
    flex-wrap: wrap;
  }
  .mood-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: var(--bg2);
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mood-btn:hover { transform: scale(1.15); }
  .mood-btn.selected {
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(107,141,216,0.4);
  }

  .diary-textarea {
    background: var(--bg2);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 15px;
    color: var(--ink);
    font-size: 0.95rem;
    resize: none;
    min-height: 100px;
    margin: 10px 0;
    font-family: inherit;
  }
  .diary-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .diary-textarea::placeholder { color: var(--muted); }

  .save-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    padding: 12px 30px;
    border-radius: 25px;
    font-size: 1rem;
    cursor: pointer;
    align-self: center;
    margin: 10px 0;
    transition: transform 0.3s;
  }
  .save-btn:hover { transform: scale(1.05); }

  .diary-entries {
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .diary-entry {
    background: var(--bg2);
    border-radius: 10px;
    padding: 12px 15px;
    border-left: 3px solid var(--accent);
  }
  .diary-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .diary-entry-date {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .diary-entry-mood {
    font-size: 1.2rem;
  }
  .diary-entry-text {
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.5;
  }

  /* Garden Screen */
  .garden-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .garden-canvas {
    width: 100%;
    max-width: 400px;
    height: 300px;
    background: linear-gradient(to bottom, #1a2342, #0f1729);
    border-radius: 16px;
    border: 1px solid var(--rule);
    position: relative;
    overflow: hidden;
  }
  .garden-item {
    position: absolute;
    font-size: 2rem;
    animation: gardenFloat 4s ease-in-out infinite;
  }
  @keyframes gardenFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(5deg); }
  }
  .garden-stats {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  .garden-stat {
    text-align: center;
  }
  .garden-stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--happy);
  }
  .garden-stat-label {
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* Welcome Screen */
  .welcome-screen {
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .welcome-title {
    font-size: 2.5rem;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome-subtitle {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 40px;
  }
  .start-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    padding: 16px 50px;
    border-radius: 30px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(107,141,216,0.3);
  }
  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 30px rgba(107,141,216,0.5);
  }
  .welcome-planet {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    margin-bottom: 30px;
    animation: welcomeFloat 4s ease-in-out infinite;
    position: relative;
  }
  .welcome-planet::after {
    content: '';
    position: absolute;
    top: 20%; left: 25%;
    width: 30%; height: 25%;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
  }
  @keyframes welcomeFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }

  /* Achievement popup */
  .achievement-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: var(--bg2);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    z-index: 100;
    transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    max-width: 300px;
    width: 90%;
  }
  .achievement-popup.show {
    transform: translate(-50%, -50%) scale(1);
  }
  .achievement-popup .badge {
    font-size: 3rem;
    margin-bottom: 10px;
  }
  .achievement-popup h3 {
    color: var(--happy);
    margin-bottom: 8px;
  }
  .achievement-popup p {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .achievement-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    display: none;
  }
  .achievement-overlay.show { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Responsive */
  @media (max-width: 380px) {
    .planet-orb { width: 65px; height: 65px; }
    .planet-name { font-size: 0.8rem; }
    .welcome-title { font-size: 2rem; }
  }
</style>
</head>
<body>

<!-- Starfield Canvas -->
<canvas id="starfield"></canvas>

<!-- Achievement Popup -->
<div class="achievement-overlay" id="achievementOverlay"></div>
<div class="achievement-popup" id="achievementPopup">
  <div class="badge" id="achievementBadge">🏆</div>
  <h3 id="achievementTitle">获得成就</h3>
  <p id="achievementDesc">描述</p>
</div>

<!-- Welcome Screen -->
<div class="screen welcome-screen active" id="welcomeScreen">
  <div class="ui-layer" style="justify-content: center; align-items: center;">
    <div class="welcome-planet"></div>
    <h1 class="welcome-title">情绪星球</h1>
    <p class="welcome-subtitle">探索你的情绪宇宙，找到内心的平静</p>
    <button class="start-btn" onclick="showScreen('homeScreen')">开始探索</button>
  </div>
</div>

<!-- Home Screen -->
<div class="screen" id="homeScreen">
  <div class="ui-layer">
    <div class="header">
      <h1>情绪星系</h1>
      <div class="star-count" id="starCount">0</div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn active" onclick="showScreen('homeScreen')">星球</button>
      <button class="nav-btn" onclick="showScreen('diaryScreen')">日记</button>
      <button class="nav-btn" onclick="showScreen('gardenScreen')">花园</button>
    </div>
    <div class="planet-grid">
      <div class="planet-item" onclick="showPlanetDetail('happy')">
        <div class="planet-orb planet-happy"></div>
        <div class="planet-name">快乐星</div>
        <div class="planet-desc">收集快乐</div>
      </div>
      <div class="planet-item" onclick="showPlanetDetail('calm')">
        <div class="planet-orb planet-calm"></div>
        <div class="planet-name">平静星</div>
        <div class="planet-desc">呼吸练习</div>
      </div>
      <div class="planet-item" onclick="showPlanetDetail('anxious')">
        <div class="planet-orb planet-anxious"></div>
        <div class="planet-name">焦虑星</div>
        <div class="planet-desc">拆解担忧</div>
      </div>
      <div class="planet-item" onclick="showPlanetDetail('sad')">
        <div class="planet-orb planet-sad"></div>
        <div class="planet-name">忧伤星</div>
        <div class="planet-desc">情绪释放</div>
      </div>
      <div class="planet-item" onclick="showPlanetDetail('angry')">
        <div class="planet-orb planet-angry"></div>
        <div class="planet-name">愤怒星</div>
        <div class="planet-desc">能量转化</div>
      </div>
      <div class="planet-item" onclick="showPlanetDetail('excited')">
        <div class="planet-orb planet-excited"></div>
        <div class="planet-name">兴奋星</div>
        <div class="planet-desc">能量引导</div>
      </div>
    </div>
  </div>
</div>

<!-- Planet Detail Screen -->
<div class="screen" id="planetDetailScreen">
  <button class="back-btn" onclick="showScreen('homeScreen')">← 返回</button>
  <div class="ui-layer" style="justify-content: center;">
    <div class="planet-detail" id="planetDetailContent">
      <!-- Dynamic content -->
    </div>
  </div>
</div>

<!-- Breathing Exercise Screen -->
<div class="screen" id="breathingScreen">
  <button class="back-btn" onclick="stopBreathing(); showScreen('planetDetailScreen')">← 返回</button>
  <div class="ui-layer" style="justify-content: center;">
    <div class="breathing-container">
      <div class="breathing-orb" id="breathingOrb"></div>
      <div class="breathing-text" id="breathingText">准备开始</div>
      <div class="breathing-timer" id="breathingTimer">4</div>
      <div class="breathing-instruction" id="breathingInstruction">点击开始，跟随光球的节奏呼吸</div>
      <button class="save-btn" id="breathingBtn" onclick="toggleBreathing()" style="margin-top:30px;">开始练习</button>
    </div>
  </div>
</div>

<!-- Diary Screen -->
<div class="screen" id="diaryScreen">
  <div class="ui-layer">
    <div class="header">
      <h1>情绪日记</h1>
      <div class="star-count" id="starCountDiary">0</div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn" onclick="showScreen('homeScreen')">星球</button>
      <button class="nav-btn active" onclick="showScreen('diaryScreen')">日记</button>
      <button class="nav-btn" onclick="showScreen('gardenScreen')">花园</button>
    </div>
    <div class="diary-container">
      <div style="color: var(--muted); font-size: 0.85rem; margin-bottom: 5px;">今天感觉如何？</div>
      <div class="mood-selector">
        <button class="mood-btn" data-mood="happy" onclick="selectMood(this)">😊</button>
        <button class="mood-btn" data-mood="calm" onclick="selectMood(this)">😌</button>
        <button class="mood-btn" data-mood="excited" onclick="selectMood(this)">🤩</button>
        <button class="mood-btn" data-mood="anxious" onclick="selectMood(this)">😰</button>
        <button class="mood-btn" data-mood="sad" onclick="selectMood(this)">😢</button>
        <button class="mood-btn" data-mood="angry" onclick="selectMood(this)">😠</button>
      </div>
      <textarea class="diary-textarea" id="diaryInput" placeholder="写下你今天的感受...（可选）"></textarea>
      <button class="save-btn" onclick="saveDiary()">记录心情</button>
      <div class="diary-entries" id="diaryEntries"></div>
    </div>
  </div>
</div>

<!-- Garden Screen -->
<div class="screen" id="gardenScreen">
  <div class="ui-layer">
    <div class="header">
      <h1>心灵花园</h1>
      <div class="star-count" id="starCountGarden">0</div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn" onclick="showScreen('homeScreen')">星球</button>
      <button class="nav-btn" onclick="showScreen('diaryScreen')">日记</button>
      <button class="nav-btn active" onclick="showScreen('gardenScreen')">花园</button>
    </div>
    <div class="garden-container">
      <div class="garden-canvas" id="gardenCanvas">
        <!-- Garden items will be added here -->
      </div>
      <div class="garden-stats">
        <div class="garden-stat">
          <div class="garden-stat-value" id="gardenStars">0</div>
          <div class="garden-stat-label">星光值</div>
        </div>
        <div class="garden-stat">
          <div class="garden-stat-value" id="gardenEntries">0</div>
          <div class="garden-stat-label">日记数</div>
        </div>
        <div class="garden-stat">
          <div class="garden-stat-value" id="gardenBadges">0</div>
          <div class="garden-stat-label">成就数</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== Data & State ====================
const planets = {
  happy: {
    name: '快乐星',
    color: 'planet-happy',
    gradient: 'linear-gradient(135deg, #FFD93D, #F5A623)',
    desc: '在这里收集快乐碎片，记录生活中的美好瞬间。快乐是一种选择，也是一种练习。',
    activities: [
      { icon: '✨', name: '快乐收集器', desc: '记录今日三件开心的小事' },

// ==================== Screen Management ====================
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  updateStarCount();
  if (screenId === 'diaryScreen') renderDiaryEntries();
  if (screenId === 'gardenScreen') renderGarden();
}

function showPlanetDetail(planetKey) {
  const planet = planets[planetKey];
  const content = document.getElementById('planetDetailContent');
  content.innerHTML = `
    <div class="planet-detail-orb ${planet.color}"></div>
    <h2>${planet.name}</h2>
    <p>${planet.desc}</p>
    <div class="activity-list">
      ${planet.activities.map((a, i) => `
        <button class="activity-btn" onclick="startActivity('${planetKey}', ${i})">
          <span class="icon">${a.icon}</span>
          <div>
            <div style="font-weight:600;">${a.name}</div>
            <div style="font-size:0.8rem;color:var(--muted);">${a.desc}</div>
          </div>
        </button>
      `).join('')}

  `;
  showScreen('planetDetailScreen');
}

function startActivity(planetKey, activityIndex) {
  if (planetKey === 'calm' && activityIndex === 0) {
    showScreen('breathingScreen');
  } else {
    // Generic activity completion
    addStars(10);
    showAchievement('活动完成', `你完成了${planets[planetKey].activities[activityIndex].name}！`, '✨');
  }
}

// ==================== Starfield Animation ====================
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function initStarfield() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.5 + 0.1,
      opacity: Math.random() * 0.8 + 0.2
    });
  }
}

function animateStarfield() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
    ctx.fill();
    star.y += star.speed;
    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }
    star.opacity += (Math.random() - 0.5) * 0.02;
    star.opacity = Math.max(0.2, Math.min(1, star.opacity));
  });
  requestAnimationFrame(animateStarfield);
}

// ==================== Breathing Exercise ====================
function toggleBreathing() {
  if (state.breathingActive) {
    stopBreathing();
  } else {
    startBreathing();
  }
}

function startBreathing() {
  state.breathingActive = true;
  const btn = document.getElementById('breathingBtn');
  const orb = document.getElementById('breathingOrb');
  const text = document.getElementById('breathingText');
  const timer = document.getElementById('breathingTimer');
  const instruction = document.getElementById('breathingInstruction');

  btn.textContent = '停止练习';
  instruction.textContent = '跟随光球的节奏，吸气...呼气...';

  let phase = 'inhale'; // inhale, hold, exhale, hold
  let count = 4;

  function breatheCycle() {
    if (!state.breathingActive) return;

    if (phase === 'inhale') {
      orb.classList.add('inhale');
      text.textContent = '吸气';
      timer.textContent = count;
      count--;
      if (count < 0) {
        phase = 'hold';
        count = 4;
      }
    } else if (phase === 'hold') {
      text.textContent = '保持';
      timer.textContent = count;
      count--;
      if (count < 0) {
        phase = 'exhale';
        count = 4;
      }
    } else if (phase === 'exhale') {
      orb.classList.remove('inhale');
      text.textContent = '呼气';
      timer.textContent = count;
      count--;
      if (count < 0) {
        phase = 'hold2';
        count = 4;
      }
    } else if (phase === 'hold2') {
      text.textContent = '保持';
      timer.textContent = count;
      count--;
      if (count < 0) {
        phase = 'inhale';
        count = 4;
        // Complete one cycle
        addStars(5);
      }
    }
  }

  breatheCycle();
  state.breathingInterval = setInterval(breatheCycle, 1000);
}

function stopBreathing() {
  state.breathingActive = false;
  clearInterval(state.breathingInterval);
  const btn = document.getElementById('breathingBtn');
  const orb = document.getElementById('breathingOrb');
  const text = document.getElementById('breathingText');
  const timer = document.getElementById('breathingTimer');
  const instruction = document.getElementById('breathingInstruction');

  btn.textContent = '开始练习';
  orb.classList.remove('inhale');
  text.textContent = '准备开始';
  timer.textContent = '4';
  instruction.textContent = '点击开始，跟随光球的节奏呼吸';
}

// ==================== Diary ====================
function selectMood(btn) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.selectedMood = btn.dataset.mood;
}

function saveDiary() {
  if (!state.selectedMood) {
    alert('请先选择一个心情图标');
    return;
  }

  const text = document.getElementById('diaryInput').value.trim();
  const entry = {
    id: Date.now(),
    mood: state.selectedMood,
    text: text,
    date: new Date().toLocaleString('zh-CN')
  };

  state.diary.unshift(entry);
  localStorage.setItem('ep_diary', JSON.stringify(state.diary));

  // Reset form
  document.getElementById('diaryInput').value = '';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  state.selectedMood = null;

  addStars(15);
  renderDiaryEntries();

  // Check first diary badge
  if (state.diary.length === 1) {
    unlockBadge('first_diary');
  }
}

function renderDiaryEntries() {
  const container = document.getElementById('diaryEntries');
  if (state.diary.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">还没有日记记录，开始记录你的第一条心情吧！</div>';
    return;
  }

  container.innerHTML = state.diary.slice(0, 10).map(entry => `
    <div class="diary-entry" style="border-left-color: ${moodColors[entry.mood]}">
      <div class="diary-entry-header">
        <span class="diary-entry-date">${entry.date}</span>
        <span class="diary-entry-mood">${moodEmojis[entry.mood]}</span>
      </div>
      <div class="diary-entry-text">${entry.text || '（无文字记录）'}</div>
    </div>
  `).join('');
}

// ==================== Garden ====================
function renderGarden() {
  const canvas = document.getElementById('gardenCanvas');
  canvas.innerHTML = '';

  // Add base items
  const items = ['🌱', '🌿', '🌸', '✨', '💫'];
  const count = Math.min(state.diary.length + Math.floor(state.stars / 20), 15);

  for (let i = 0; i < count; i++) {
    const item = document.createElement('div');
    item.className = 'garden-item';
    item.textContent = items[i % items.length];
    item.style.left = `${15 + Math.random() * 70}%`;
    item.style.top = `${20 + Math.random() * 60}%`;
    item.style.animationDelay = `${Math.random() * 4}s`;
    canvas.appendChild(item);
  }

  document.getElementById('gardenStars').textContent = state.stars;
  document.getElementById('gardenEntries').textContent = state.diary.length;
  document.getElementById('gardenBadges').textContent = state.badges.length;
}

// ==================== Stars & Achievements ====================
function addStars(amount) {
  state.stars += amount;
  localStorage.setItem('ep_stars', state.stars);
  updateStarCount();

  // Check badges
  if (state.stars >= 50 && !state.badges.includes('star_50')) {
    unlockBadge('star_50');
  }
  if (state.stars >= 100 && !state.badges.includes('star_100')) {
    unlockBadge('star_100');
  }
}

function updateStarCount() {
  document.querySelectorAll('[id^="starCount"]').forEach(el => {
    el.textContent = state.stars;
  });
}

const badgeDefs = {
  first_diary: { title: '初次记录', desc: '写下你的第一条情绪日记', icon: '📝' },
  star_50: { title: '星光初现', desc: '累计获得50点星光值', icon: '⭐' },
  star_100: { title: '星光闪耀', desc: '累计获得100点星光值', icon: '🌟' },
  breathing_master: { title: '呼吸大师', desc: '完成10次呼吸练习', icon: '🫁' }
};

function unlockBadge(badgeId) {
  if (state.badges.includes(badgeId)) return;
  state.badges.push(badgeId);
  localStorage.setItem('ep_badges', JSON.stringify(state.badges));

  const badge = badgeDefs[badgeId];
  if (badge) {
    showAchievement(badge.title, badge.desc, badge.icon);
  }
}

function showAchievement(title, desc, icon) {
  const overlay = document.getElementById('achievementOverlay');
  const popup = document.getElementById('achievementPopup');
  document.getElementById('achievementTitle').textContent = title;
  document.getElementById('achievementDesc').textContent = desc;
  document.getElementById('achievementBadge').textContent = icon;

  overlay.classList.add('show');
  popup.classList.add('show');

  setTimeout(() => {
    overlay.classList.remove('show');
    popup.classList.remove('show');
  }, 3000);
}

// ==================== Initialization ====================
window.addEventListener('resize', initStarfield);

window.addEventListener('DOMContentLoaded', () => {
  initStarfield();
  animateStarfield();
  updateStarCount();

  // Check first visit
  if (!localStorage.getItem('ep_visited')) {
    localStorage.setItem('ep_visited', 'true');
  }
});
</script>
