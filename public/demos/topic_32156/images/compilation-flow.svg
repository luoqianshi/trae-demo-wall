<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#ff006e"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 箭头标记 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#667eea" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="900" height="280" fill="#0a0a0f"/>
  <rect x="0" y="0" width="900" height="280" fill="url(#grid)"/>
  
  <!-- 顶部装饰线 -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#667eea" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#grad1)" text-anchor="middle" filter="url(#glow)">LLVM COMPILATION FLOW</text>
  
  <!-- Source Code Box -->
  <g filter="url(#glow)">
    <rect x="30" y="80" width="100" height="60" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
    <rect x="30" y="80" width="100" height="20" rx="4" fill="#667eea" opacity="0.3"/>
    <text x="80" y="100" font-family="'Consolas', monospace" font-size="11" fill="#00d4ff" text-anchor="middle">Source</text>
    <text x="80" y="118" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">源代码</text>
    <text x="80" y="132" font-family="monospace" font-size="8" fill="#667eea" text-anchor="middle">*.c, *.cpp</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="135" y1="110" x2="170" y2="110" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  
  <!-- Frontend Box -->
  <g filter="url(#glow)">
    <rect x="175" y="80" width="100" height="60" rx="4" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
    <rect x="175" y="80" width="100" height="20" rx="4" fill="#764ba2" opacity="0.3"/>
    <text x="225" y="100" font-family="'Segoe UI', sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle">Frontend</text>
    <text x="225" y="118" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">前端</text>
    <text x="225" y="132" font-family="monospace" font-size="8" fill="#764ba2" text-anchor="middle">clang</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="280" y1="110" x2="315" y2="110" stroke="#764ba2" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  
  <!-- LLVM IR Box -->
  <g filter="url(#glow)">
    <rect x="320" y="80" width="100" height="60" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5"/>
    <rect x="320" y="80" width="100" height="20" rx="4" fill="#00d4ff" opacity="0.3"/>
    <text x="370" y="100" font-family="'Consolas', monospace" font-size="11" fill="#00d4ff" text-anchor="middle">LLVM IR</text>
    <text x="370" y="118" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">中间表示</text>
    <text x="370" y="132" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle">%1 = add</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="425" y1="110" x2="460" y2="110" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  
  <!-- llc (SelectionDAG) Box - Highlighted -->
  <g filter="url(#glowStrong)">
    <rect x="465" y="75" width="140" height="70" rx="6" fill="#1a1a2e" stroke="#ff006e" stroke-width="2"/>
    <rect x="465" y="75" width="140" height="25" rx="6" fill="#ff006e" opacity="0.4"/>
    <text x="535" y="93" font-family="'Consolas', monospace" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">llc</text>
    <text x="535" y="115" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ff006e" text-anchor="middle">SelectionDAG</text>
    <text x="535" y="130" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">目标代码生成</text>
  </g>
  
  <!-- Arrow 4 -->
  <line x1="610" y1="110" x2="645" y2="110" stroke="#ff006e" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  
  <!-- Assembly/Machine Code Box -->
  <g filter="url(#glow)">
    <rect x="650" y="80" width="120" height="60" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
    <rect x="650" y="80" width="120" height="20" rx="4" fill="#667eea" opacity="0.3"/>
    <text x="710" y="100" font-family="'Consolas', monospace" font-size="10" fill="#00d4ff" text-anchor="middle">Machine Code</text>
    <text x="710" y="118" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">机器码</text>
    <text x="710" y="132" font-family="monospace" font-size="8" fill="#667eea" text-anchor="middle">*.s, *.o</text>
  </g>
  
  <!-- SelectionDAG 放大区域 -->
  <g filter="url(#glow)">
    <rect x="465" y="160" width="140" height="80" rx="6" fill="none" stroke="#ff006e" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
    <text x="535" y="180" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ff006e" text-anchor="middle" opacity="0.8">SelectionDAG</text>
    
    <!-- 内部流程 -->
    <rect x="480" y="190" width="50" height="18" rx="2" fill="#1a1a2e" stroke="#00d4ff" stroke-width="0.5"/>
    <text x="505" y="203" font-family="'Segoe UI', sans-serif" font-size="7" fill="#00d4ff" text-anchor="middle">Legalize</text>
    
    <rect x="540" y="190" width="50" height="18" rx="2" fill="#1a1a2e" stroke="#667eea" stroke-width="0.5"/>
    <text x="565" y="203" font-family="'Segoe UI', sans-serif" font-size="7" fill="#667eea" text-anchor="middle">Combine</text>
    
    <line x1="530" y1="199" x2="540" y2="199" stroke="#667eea" stroke-width="0.5"/>
  </g>
  
  <!-- 连接线 -->
  <line x1="535" y1="145" x2="535" y2="160" stroke="#ff006e" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  
  <!-- Description -->
  <text x="450" y="255" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">SelectionDAG is used in the llc compiler backend for instruction selection and optimization</text>
  
  <!-- 装饰粒子 -->
  <g filter="url(#glow)" opacity="0.6">
    <circle cx="100" cy="60" r="1.5" fill="#667eea"/>
    <circle cx="300" cy="55" r="1" fill="#00d4ff"/>
    <circle cx="500" cy="50" r="2" fill="#ff006e"/>
    <circle cx="700" cy="60" r="1" fill="#667eea"/>
    <circle cx="850" cy="55" r="1.5" fill="#00d4ff"/>
  </g>
</svg>