<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="wf_grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#ff006e"/>
    </linearGradient>
    <linearGradient id="wf_grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
    <linearGradient id="wf_grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#ff006e"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="wf_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wf_glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 箭头 -->
    <marker id="wf_arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#667eea"/>
    </marker>
    <marker id="wf_arrow2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
    </marker>
    
    <!-- 网格图案 -->
    <pattern id="wf_grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#667eea" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="900" height="320" fill="#0a0a0f"/>
  <rect x="0" y="0" width="900" height="320" fill="url(#wf_grid)"/>
  
  <!-- 标题 -->
  <text x="450" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#wf_grad1)" text-anchor="middle" filter="url(#wf_glow)">SELECTIONDAG WORKFLOW</text>
  
  <!-- 阶段 1: LLVM IR -->
  <g filter="url(#wf_glow)">
    <rect x="40" y="70" width="100" height="50" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
    <text x="90" y="90" font-family="'Consolas', monospace" font-size="11" fill="#fff" text-anchor="middle">LLVM IR</text>
    <text x="90" y="108" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">中间表示</text>
  </g>
  <line x1="145" y1="95" x2="175" y2="95" stroke="#667eea" stroke-width="2" marker-end="url(#wf_arrow)" filter="url(#wf_glow)"/>
  
  <!-- 阶段 2: SelectionDAG Construction -->
  <g filter="url(#wf_glow)">
    <rect x="180" y="70" width="120" height="50" rx="4" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
    <text x="240" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#fff" text-anchor="middle">DAG Construction</text>
    <text x="240" y="108" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">DAG 构建</text>
  </g>
  <line x1="305" y1="95" x2="335" y2="95" stroke="#764ba2" stroke-width="2" marker-end="url(#wf_arrow)" filter="url(#wf_glow)"/>
  
  <!-- 阶段 3: Type Legalization -->
  <g filter="url(#wf_glow)">
    <rect x="340" y="70" width="100" height="50" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="390" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle">Type Legal</text>
    <text x="390" y="108" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">类型合法化</text>
  </g>
  <line x1="445" y1="95" x2="475" y2="95" stroke="#00d4ff" stroke-width="2" marker-end="url(#wf_arrow)" filter="url(#wf_glow)"/>
  
  <!-- 阶段 4: Operation Legalization -->
  <g filter="url(#wf_glow)">
    <rect x="480" y="70" width="100" height="50" rx="4" fill="#1a1a2e" stroke="#ff006e" stroke-width="1.5"/>
    <text x="530" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ff006e" text-anchor="middle">Op Legal</text>
    <text x="530" y="108" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">操作合法化</text>
  </g>
  <line x1="585" y1="95" x2="615" y2="95" stroke="#ff006e" stroke-width="2" marker-end="url(#wf_arrow)" filter="url(#wf_glow)"/>
  
  <!-- 阶段 5: DAG Combiner -->
  <g filter="url(#wf_glow)">
    <rect x="620" y="70" width="100" height="50" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
    <text x="670" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#667eea" text-anchor="middle">DAG Combiner</text>
    <text x="670" y="108" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">DAG 优化</text>
  </g>
  <line x1="725" y1="95" x2="755" y2="95" stroke="#667eea" stroke-width="2" marker-end="url(#wf_arrow)" filter="url(#wf_glow)"/>
  
  <!-- 阶段 6: Instruction Selection -->
  <g filter="url(#wf_glow)">
    <rect x="760" y="70" width="100" height="50" rx="4" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
    <text x="810" y="90" font-family="'Segoe UI', sans-serif" font-size="10" fill="#fff" text-anchor="middle">Instr Select</text>
    <text x="810" y="108" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">指令选择</text>
  </g>
  
  <!-- 循环箭头 (DAG Combiner loop) -->
  <path d="M 670 125 L 670 155 L 240 155 L 240 125" fill="none" stroke="#667eea" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="455" y="170" font-family="'Segoe UI', sans-serif" font-size="9" fill="#667eea" text-anchor="middle">← DAG Combine Loop</text>
  
  <!-- 向下箭头 -->
  <line x1="810" y1="125" x2="810" y2="145" stroke="#764ba2" stroke-width="2" marker-end="url(#wf_arrow2)" filter="url(#wf_glow)"/>
  
  <!-- 阶段 7: Instruction Scheduling -->
  <g filter="url(#wf_glow)">
    <rect x="760" y="150" width="100" height="50" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="810" y="170" font-family="'Segoe UI', sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle">Instr Sched</text>
    <text x="810" y="188" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">指令调度</text>
  </g>
  
  <!-- 向下箭头到 MachineIR -->
  <line x1="810" y1="205" x2="810" y2="225" stroke="#00d4ff" stroke-width="2" marker-end="url(#wf_arrow2)" filter="url(#wf_glow)"/>
  
  <!-- 最终输出: MachineIR -->
  <g filter="url(#wf_glowStrong)">
    <rect x="760" y="230" width="100" height="50" rx="4" fill="#1a1a2e" stroke="#ff006e" stroke-width="2"/>
    <rect x="760" y="230" width="100" height="18" rx="4" fill="#ff006e" opacity="0.3"/>
    <text x="810" y="248" font-family="'Consolas', monospace" font-size="11" fill="#fff" text-anchor="middle">MachineIR</text>
    <text x="810" y="268" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">机器指令</text>
  </g>
  
  <!-- 侧边说明 -->
  <g filter="url(#wf_glow)" opacity="0.8">
    <text x="50" y="180" font-family="'Segoe UI', sans-serif" font-size="10" fill="#667eea">ISD::ADD</text>
    <text x="50" y="195" font-family="'Segoe UI', sans-serif" font-size="10" fill="#764ba2">ISD::MUL</text>
    <text x="50" y="210" font-family="'Segoe UI', sans-serif" font-size="10" fill="#00d4ff">ISD::LOAD</text>
    <text x="50" y="225" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ff006e">ISD::BR</text>
  </g>
  
  <!-- 问题标记 -->
  <g filter="url(#wf_glow)">
    <rect x="40" y="250" width="180" height="50" rx="4" fill="#1a1a2e" stroke="#ff006e" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
    <text x="130" y="270" font-family="'Segoe UI', sans-serif" font-size="9" fill="#ff006e" text-anchor="middle">通用表达</text>
    <text x="130" y="285" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">→ 目标机器能接受的表达</text>
  </g>
  
  <!-- 装饰粒子 -->
  <g filter="url(#wf_glow)" opacity="0.5">
    <circle cx="90" cy="55" r="2" fill="#667eea"/>
    <circle cx="240" cy="50" r="1.5" fill="#764ba2"/>
    <circle cx="390" cy="55" r="2" fill="#00d4ff"/>
    <circle cx="530" cy="50" r="1.5" fill="#ff006e"/>
    <circle cx="670" cy="55" r="2" fill="#667eea"/>
    <circle cx="810" cy="50" r="1.5" fill="#764ba2"/>
  </g>
</svg>