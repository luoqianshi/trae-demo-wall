<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#ff006e"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff006e"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#667eea" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- 背景网格 -->
  <rect x="0" y="0" width="400" height="320" fill="#0a0a0f"/>
  <rect x="0" y="0" width="400" height="320" fill="url(#grid)"/>
  
  <!-- 装饰线条 -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#667eea" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="280" x2="400" y2="280" stroke="#667eea" stroke-width="1" opacity="0.5"/>
  
  <!-- 龙的身体 - 霓虹发光效果 -->
  <g filter="url(#glowStrong)">
    <!-- 主身体曲线 -->
    <path d="M30,220 Q60,180 90,190 Q120,200 150,170 Q180,140 210,150 Q240,160 270,130 Q300,100 330,110 Q360,120 380,90" 
          fill="none" stroke="url(#neonPurple)" stroke-width="8" stroke-linecap="round"/>
    <!-- 发光描边 -->
    <path d="M30,220 Q60,180 90,190 Q120,200 150,170 Q180,140 210,150 Q240,160 270,130 Q300,100 330,110 Q360,120 380,90" 
          fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>
  
  <!-- 龙的头部 -->
  <g filter="url(#glow)">
    <ellipse cx="385" cy="85" rx="22" ry="18" fill="url(#neonCyan)"/>
    <ellipse cx="385" cy="85" rx="18" ry="14" fill="#0a0a0f" opacity="0.5"/>
  </g>
  
  <!-- 龙的眼睛 - 发光效果 -->
  <circle cx="392" cy="80" r="4" fill="#ff006e" filter="url(#glow)"/>
  <circle cx="392" cy="80" r="2" fill="#fff"/>
  
  <!-- 龙角 -->
  <g filter="url(#glow)">
    <path d="M370,68 Q365,50 358,35" fill="none" stroke="url(#neonPink)" stroke-width="5" stroke-linecap="round"/>
    <path d="M378,65 Q375,45 370,30" fill="none" stroke="url(#neonPink)" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- 龙的下颌/胡须 -->
  <g filter="url(#glow)">
    <path d="M395,98 Q405,108 398,120" fill="none" stroke="url(#neonCyan)" stroke-width="3" stroke-linecap="round"/>
    <path d="M400,100 Q415,105 410,122" fill="none" stroke="url(#neonCyan)" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- 身体纹理/鳞片 - 霓虹线条 -->
  <g filter="url(#glow)" opacity="0.9">
    <path d="M70,195 Q80,205 70,215" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <path d="M120,185 Q130,195 120,205" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <path d="M180,155 Q190,165 180,175" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <path d="M240,145 Q250,155 240,165" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <path d="M300,115 Q310,125 300,135" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <path d="M350,105 Q360,115 350,125" fill="none" stroke="#00d4ff" stroke-width="2"/>
  </g>
  
  <!-- 装饰粒子 -->
  <g filter="url(#glow)">
    <circle cx="50" cy="150" r="2" fill="#667eea"/>
    <circle cx="100" cy="120" r="1.5" fill="#00d4ff"/>
    <circle cx="200" cy="100" r="2" fill="#ff006e"/>
    <circle cx="320" cy="70" r="1.5" fill="#667eea"/>
    <circle cx="150" cy="200" r="1" fill="#00d4ff"/>
    <circle cx="280" cy="180" r="2" fill="#ff006e"/>
  </g>
  
  <!-- LLVM 文字 -->
  <g filter="url(#glowStrong)">
    <text x="200" y="265" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#neonPurple)" text-anchor="middle">
      LLVM
    </text>
  </g>
  
  <!-- SelectionDAG 副标题 -->
  <text x="200" y="295" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#00d4ff" text-anchor="middle" letter-spacing="4">
    SELECTION DAG
  </text>
  
  <!-- 版本装饰线 -->
  <line x1="120" y1="310" x2="280" y2="310" stroke="url(#neonCyan)" stroke-width="1" opacity="0.6"/>
</svg>