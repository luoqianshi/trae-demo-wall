<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="is_grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#ff006e"/>
    </linearGradient>
    <linearGradient id="is_grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="is_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="is_glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 箭头 -->
    <marker id="is_arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#667eea"/>
    </marker>
    
    <!-- 网格图案 -->
    <pattern id="is_grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#667eea" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="850" height="300" fill="#0a0a0f"/>
  <rect x="0" y="0" width="850" height="300" fill="url(#is_grid)"/>
  
  <!-- 标题 -->
  <text x="425" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#is_grad1)" text-anchor="middle" filter="url(#is_glow)">INSTRUCTION SELECTION PROCESS</text>
  
  <!-- 左侧: 通用 SDNode -->
  <g filter="url(#is_glow)">
    <rect x="40" y="70" width="180" height="80" rx="6" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>
    <rect x="40" y="70" width="180" height="22" rx="6" fill="#667eea" opacity="0.3"/>
    <text x="130" y="90" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Generic SDNode</text>
    <text x="130" y="118" font-family="'Consolas', monospace" font-size="10" fill="#00d4ff" text-anchor="middle">ISD::ADD</text>
    <text x="130" y="136" font-family="'Consolas', monospace" font-size="10" fill="#00d4ff" text-anchor="middle">ISD::MUL</text>
  </g>
  
  <!-- 箭头 -->
  <line x1="225" y1="110" x2="280" y2="110" stroke="#667eea" stroke-width="2" marker-end="url(#is_arrow)" filter="url(#is_glow)"/>
  
  <!-- 中间: TableGen -->
  <g filter="url(#is_glowStrong)">
    <rect x="290" y="70" width="180" height="80" rx="6" fill="#1a1a2e" stroke="#764ba2" stroke-width="2"/>
    <rect x="290" y="70" width="180" height="22" rx="6" fill="#764ba2" opacity="0.4"/>
    <text x="380" y="90" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">TableGen</text>
    <text x="380" y="118" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">Pattern Matching</text>
    <text x="380" y="136" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">*.td → *Gen.inc</text>
  </g>
  
  <!-- 箭头 -->
  <line x1="475" y1="110" x2="530" y2="110" stroke="#764ba2" stroke-width="2" marker-end="url(#is_arrow)" filter="url(#is_glow)"/>
  
  <!-- 右侧: Machine Node -->
  <g filter="url(#is_glow)">
    <rect x="540" y="70" width="180" height="80" rx="6" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
    <rect x="540" y="70" width="180" height="22" rx="6" fill="#00d4ff" opacity="0.3"/>
    <text x="630" y="90" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Machine Node</text>
    <text x="630" y="118" font-family="'Consolas', monospace" font-size="10" fill="#00d4ff" text-anchor="middle">NVPTX::ADDi32rr</text>
    <text x="630" y="136" font-family="'Consolas', monospace" font-size="10" fill="#00d4ff" text-anchor="middle">X86::ADD32rr</text>
  </g>
  
  <!-- 箭头到最终指令 -->
  <line x1="630" y1="155" x2="630" y2="185" stroke="#00d4ff" stroke-width="2" marker-end="url(#is_arrow)" filter="url(#is_glow)"/>
  
  <!-- 最终: 机器指令 -->
  <g filter="url(#is_glowStrong)">
    <rect x="540" y="190" width="180" height="50" rx="4" fill="#1a1a2e" stroke="#ff006e" stroke-width="2"/>
    <rect x="540" y="190" width="180" height="18" rx="4" fill="#ff006e" opacity="0.3"/>
    <text x="630" y="210" font-family="'Consolas', monospace" font-size="11" fill="#fff" text-anchor="middle">MachineInstr</text>
    <text x="630" y="228" font-family="'Consolas', monospace" font-size="9" fill="#a0a0b0" text-anchor="middle">add.s32 dst, a, b</text>
  </g>
  
  <!-- TableGen 匹配示例 -->
  <g filter="url(#is_glow)">
    <rect x="40" y="180" width="220" height="90" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1"/>
    <text x="150" y="200" font-family="'Segoe UI', sans-serif" font-size="10" fill="#667eea" text-anchor="middle">DAG Pattern</text>
    <text x="150" y="220" font-family="'Consolas', monospace" font-size="8" fill="#00d4ff" text-anchor="middle">(add (i32 $a), (i32 $b))</text>
    <text x="150" y="240" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">↓</text>
    <text x="150" y="258" font-family="'Consolas', monospace" font-size="8" fill="#764ba2" text-anchor="middle">(ADDi32rr $dst, $a, $b)</text>
  </g>
  
  <!-- 匹配过程箭头 -->
  <line x1="260" y1="225" x2="285" y2="225" stroke="#667eea" stroke-width="1" stroke-dasharray="3,3" filter="url(#is_glow)"/>
  
  <!-- SelectCode 分发 -->
  <g filter="url(#is_glow)">
    <rect x="290" y="190" width="180" height="50" rx="4" fill="#1a1a2e" stroke="#764ba2" stroke-width="1"/>
    <text x="380" y="210" font-family="'Segoe UI', sans-serif" font-size="10" fill="#764ba2" text-anchor="middle">SelectCode(N)</text>
    <text x="380" y="228" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">TableGen Generated</text>
  </g>
  
  <!-- 说明 -->
  <g filter="url(#is_glow)" opacity="0.7">
    <text x="425" y="275" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">每個目標後端實現 Select() 方法，TableGen 自動生成匹配代碼</text>
  </g>
  
  <!-- 装饰粒子 -->
  <g filter="url(#is_glow)" opacity="0.5">
    <circle cx="760" cy="50" r="2" fill="#667eea"/>
    <circle cx="800" cy="80" r="1.5" fill="#00d4ff"/>
    <circle cx="780" cy="120" r="1" fill="#ff006e"/>
  </g>
</svg>