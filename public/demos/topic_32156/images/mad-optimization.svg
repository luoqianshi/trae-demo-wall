<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="mad_grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#ff006e"/>
    </linearGradient>
    <linearGradient id="mad_grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="mad_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="mad_glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 箭头 -->
    <marker id="mad_arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#667eea"/>
    </marker>
    <marker id="mad_arrow2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff006e"/>
    </marker>
    
    <!-- 网格图案 -->
    <pattern id="mad_grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#667eea" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="850" height="350" fill="#0a0a0f"/>
  <rect x="0" y="0" width="850" height="350" fill="url(#mad_grid)"/>
  
  <!-- 标题 -->
  <text x="425" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#mad_grad1)" text-anchor="middle" filter="url(#mad_glow)">MAD INSTRUCTION OPTIMIZATION FLOW</text>
  
  <!-- LLVM IR -->
  <g filter="url(#mad_glow)">
    <rect x="30" y="60" width="150" height="60" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
    <text x="105" y="85" font-family="'Segoe UI', sans-serif" font-size="10" fill="#667eea" text-anchor="middle">LLVM IR</text>
    <text x="105" y="105" font-family="'Consolas', monospace" font-size="9" fill="#a0a0b0" text-anchor="middle">add(mul(a,b), c)</text>
  </g>
  <line x1="185" y1="90" x2="220" y2="90" stroke="#667eea" stroke-width="2" marker-end="url(#mad_arrow)" filter="url(#mad_glow)"/>
  
  <!-- SelectionDAG Construction -->
  <g filter="url(#mad_glow)">
    <rect x="225" y="60" width="150" height="60" rx="4" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
    <text x="300" y="85" font-family="'Segoe UI', sans-serif" font-size="10" fill="#764ba2" text-anchor="middle">DAG Construction</text>
    <text x="300" y="105" font-family="'Consolas', monospace" font-size="9" fill="#a0a0b0" text-anchor="middle">ISD::ADD(ISD::MUL)</text>
  </g>
  <line x1="380" y1="90" x2="415" y2="90" stroke="#764ba2" stroke-width="2" marker-end="url(#mad_arrow)" filter="url(#mad_glow)"/>
  
  <!-- DAG Combine - 关键步骤 -->
  <g filter="url(#mad_glowStrong)">
    <rect x="420" y="55" width="180" height="70" rx="6" fill="#1a1a2e" stroke="#ff006e" stroke-width="2"/>
    <rect x="420" y="55" width="180" height="22" rx="6" fill="#ff006e" opacity="0.4"/>
    <text x="510" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">DAG Combine</text>
    <text x="510" y="100" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff" text-anchor="middle">ISD::ADD(ISD::MUL(a,b),c)</text>
    <text x="510" y="118" font-family="'Consolas', monospace" font-size="9" fill="#ff006e" text-anchor="middle">→ NVPTXISD::IMAD</text>
  </g>
  
  <!-- 向下 Combine 结果 -->
  <line x1="510" y1="130" x2="510" y2="160" stroke="#ff006e" stroke-width="2" marker-end="url(#mad_arrow2)" filter="url(#mad_glow)"/>
  
  <!-- IMAD 节点 -->
  <g filter="url(#mad_glow)">
    <rect x="420" y="165" width="180" height="45" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
    <text x="510" y="190" font-family="'Consolas', monospace" font-size="12" fill="#00d4ff" text-anchor="middle">NVPTXISD::IMAD</text>
  </g>
  <line x1="510" y1="215" x2="510" y2="235" stroke="#00d4ff" stroke-width="2" marker-end="url(#mad_arrow)" filter="url(#mad_glow)"/>
  
  <!-- Instruction Selection -->
  <g filter="url(#mad_glow)">
    <rect x="420" y="240" width="180" height="45" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
    <text x="510" y="265" font-family="'Segoe UI', sans-serif" font-size="10" fill="#667eea" text-anchor="middle">Instruction Selection</text>
  </g>
  <line x1="605" y1="262" x2="660" y2="262" stroke="#667eea" stroke-width="2" marker-end="url(#mad_arrow)" filter="url(#mad_glow)"/>
  
  <!-- 最终 PTX -->
  <g filter="url(#mad_glowStrong)">
    <rect x="665" y="240" width="150" height="45" rx="4" fill="#1a1a2e" stroke="#764ba2" stroke-width="2"/>
    <rect x="665" y="240" width="150" height="16" rx="4" fill="#764ba2" opacity="0.3"/>
    <text x="740" y="258" font-family="'Consolas', monospace" font-size="11" fill="#fff" text-anchor="middle">MAD32rrr</text>
    <text x="740" y="275" font-family="'Consolas', monospace" font-size="9" fill="#a0a0b0" text-anchor="middle">PTX 指令</text>
  </g>
  
  <!-- 右侧: 代码示例 -->
  <g filter="url(#mad_glow)">
    <rect x="30" y="150" width="350" height="180" rx="6" fill="#1a1a2e" stroke="#667eea" stroke-width="1"/>
    
    <!-- 代码标题 -->
    <rect x="30" y="150" width="350" height="22" rx="6" fill="#667eea" opacity="0.2"/>
    <text x="50" y="166" font-family="'Consolas', monospace" font-size="10" fill="#667eea">PTX Example</text>
    
    <!-- 代码内容 -->
    <text x="50" y="195" font-family="'Consolas', monospace" font-size="9" fill="#a0a0b0">// LLVM IR</text>
    <text x="50" y="212" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff">%mul = mul i32 %a, %b</text>
    <text x="50" y="229" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff">%add = add i32 %mul, %c</text>
    
    <text x="50" y="252" font-family="'Consolas', monospace" font-size="9" fill="#a0a0b0">// PTX (after optimization)</text>
    <text x="50" y="269" font-family="'Consolas', monospace" font-size="9" fill="#ff006e">mad.lo.s32 %rd, %r1, %r2, %r3;</text>
    
    <text x="50" y="292" font-family="'Segoe UI', sans-serif" font-size="8" fill="#764ba2">// mad(a,b,c) = a*b + c</text>
    <text x="50" y="308" font-family="'Segoe UI', sans-serif" font-size="8" fill="#667eea">// Single instruction, lower latency</text>
  </g>
  
  <!-- 底部说明 -->
  <g filter="url(#mad_glow)" opacity="0.7">
    <rect x="420" y="295" width="395" height="40" rx="4" fill="#1a1a2e" stroke="#ff006e" stroke-width="1" opacity="0.5"/>
    <text x="617" y="315" font-family="'Segoe UI', sans-serif" font-size="9" fill="#ff006e" text-anchor="middle">DAG Combine: PerformADDCombine() → getNode(NVPTXISD::IMAD)</text>
    <text x="617" y="330" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">TableGen Pattern: imad → MAD32rrr</text>
  </g>
</svg>