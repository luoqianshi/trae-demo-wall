<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超星登录回调 - 数字智能产教云平台</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    .callback-card {
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 3rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .callback-card h2 {
      font-family: 'Outfit', sans-serif;
      margin-bottom: 1rem;
      color: var(--ink);
    }
    .callback-card p {
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    .success-icon {
      font-size: 3rem;
      color: var(--accent2);
      margin-bottom: 1rem;
    }
    .error-icon {
      font-size: 3rem;
      color: #ef4444;
      margin-bottom: 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="callback-card">
    <div id="loading">
      <div class="spinner"></div>
      <h2>正在登录...</h2>
      <p>正在通过超星泛雅验证您的身份，请稍候</p>
    </div>
    <div id="success" style="display:none;">
      <div class="success-icon">&#10004;</div>
      <h2>登录成功</h2>
      <p>正在跳转至平台首页...</p>
    </div>
    <div id="error" style="display:none;">
      <div class="error-icon">&#10008;</div>
      <h2>登录失败</h2>
      <p id="errorMsg">无法完成登录，请重试</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:1rem;">返回首页</a>
    </div>
  </div>

  <script src="assets/chaoxing-auth.js"></script>
  <script>
    (function() {
      // 解析URL参数
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var state = params.get('state');
      var error = params.get('error');

      var loadingEl = document.getElementById('loading');
      var successEl = document.getElementById('success');
      var errorEl = document.getElementById('error');
      var errorMsgEl = document.getElementById('errorMsg');

      function show(el) {
        loadingEl.style.display = 'none';
        successEl.style.display = 'none';
        errorEl.style.display = 'none';
        el.style.display = 'block';
      }

      if (error) {
        show(errorEl);
        errorMsgEl.textContent = '超星授权被拒绝: ' + error;
        return;
      }

      if (!code) {
        show(errorEl);
        errorMsgEl.textContent = '缺少授权码，请重新登录';
        return;
      }

      // 处理回调
      handleChaoxingCallback(code, state)
        .then(function(result) {
          show(successEl);
          // 根据用户角色跳转到对应页面
          setTimeout(function() {
            if (result.user && result.user.role === 'student') {
              window.location.href = 'student.html';
            } else if (result.user && result.user.role === 'teacher') {
              window.location.href = 'school.html';
            } else if (result.user && result.user.role === 'enterprise') {
              window.location.href = 'enterprise.html';
            } else {
              window.location.href = 'index.html';
            }
          }, 1500);
        })
        .catch(function(err) {
          show(errorEl);
          errorMsgEl.textContent = err.message || '登录处理失败，请重试';
        });
    })();
  </script>
</body>
</html>
