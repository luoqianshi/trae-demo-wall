<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>超级准确的测试</title>
  <style>
    :root {
      --bg-1: #fff7ed;
      --bg-2: #ffe4e6;
      --card: rgba(255, 255, 255, 0.88);
      --text: #3f2a1d;
      --muted: #7c5b4a;
      --accent: #f97316;
      --accent-dark: #c2410c;
      --shadow: 0 24px 60px rgba(194, 65, 12, 0.18);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(251, 146, 60, 0.34), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(244, 114, 182, 0.26), transparent 32%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(960px, 100%);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      position: relative;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, rgba(255,255,255,0.45), transparent 42%);
      pointer-events: none;
    }

    header {
      padding: 42px 44px 22px;
      position: relative;
      z-index: 1;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #ffedd5;
      color: var(--accent-dark);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.05;
      letter-spacing: -1.5px;
    }

    .subtitle {
      max-width: 620px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
      margin: 18px 0 0;
    }

    main {
      padding: 22px 44px 44px;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 28px;
    }

    .start-area {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
      align-items: center;
    }

    .food-cloud {
      min-height: 220px;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255, 237, 213, 0.78), rgba(254, 205, 211, 0.64));
      display: grid;
      place-items: center;
      padding: 22px;
      font-size: 56px;
      letter-spacing: 8px;
      text-align: center;
    }

    button {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 22px;
      padding: 16px 26px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fb923c, #f43f5e);
      color: white;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(244, 63, 94, 0.24);
    }

    .primary-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .primary-btn:hover,
    .food-card:hover {
      transform: translateY(-3px);
    }

    .progress-wrap {
      margin-bottom: 22px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .progress {
      height: 12px;
      background: #ffedd5;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #fb923c, #f43f5e);
      border-radius: inherit;
      transition: width 0.35s ease;
    }

    .question {
      font-size: clamp(24px, 4vw, 36px);
      margin: 0 0 20px;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .food-card {
      min-height: 190px;
      border-radius: 24px;
      background: white;
      box-shadow: 0 14px 28px rgba(124, 91, 74, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }

    .food-card.selected {
      outline: 4px solid rgba(249, 115, 22, 0.35);
      background: #fff7ed;
      box-shadow: 0 16px 34px rgba(249, 115, 22, 0.2);
      transform: translateY(-3px);
    }

    .food-card.uncollected-highlight {
      border-color: #f97316;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.18), 0 16px 34px rgba(249, 115, 22, 0.16);
    }

    .emoji {
      font-size: 62px;
      margin-bottom: 14px;
    }

    .food-name {
      font-size: 22px;
      font-weight: 900;
    }

    .category-badge {
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #ffedd5;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 900;
    }

    .category-summary {
      display: grid;
      gap: 16px;
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(135deg, #fff7ed, #ffe4e6);
    }

    .category-summary h3 {
      margin: 0;
      font-size: 24px;
    }

    .pie-layout {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 20px;
      align-items: center;
    }

    .pie-chart {
      width: 180px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #ffedd5;
      box-shadow: inset 0 0 0 14px rgba(255, 255, 255, 0.72);
    }

    .legend {
      display: grid;
      gap: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .summary-text {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }

    .slider-card {
      grid-column: 1 / -1;
      background: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 14px 28px rgba(124, 91, 74, 0.1);
    }

    .slider-value {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 86px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #ffedd5;
      color: var(--accent-dark);
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 18px;
    }

    .round-slider {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
      margin: 16px 0 10px;
    }

    .slider-scale {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
    }

    .setting-list {
      display: grid;
      gap: 18px;
    }

    .setting-card {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(254, 215, 170, 0.9);
      border-radius: 22px;
      padding: 20px;
      display: grid;
      gap: 12px;
    }

    .setting-card label {
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .setting-card select {
      width: 100%;
      border: 2px solid #fed7aa;
      border-radius: 16px;
      background: white;
      color: var(--text);
      font: inherit;
      font-weight: 800;
      padding: 12px 14px;
      outline: none;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .switch input {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }

    .result {
      display: grid;
      gap: 18px;
    }

    .result-title {
      font-size: clamp(28px, 4vw, 44px);
      margin: 0;
    }

    .chosen-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 4px 0 0;
      padding: 0;
      list-style: none;
    }

    .chosen-list li {
      padding: 10px 14px;
      border-radius: 999px;
      background: #ffedd5;
      color: var(--accent-dark);
      font-weight: 800;
    }

    .chosen-list .category-badge {
      margin: 0 0 0 6px;
      background: rgba(255, 255, 255, 0.72);
    }

    .secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 13px 20px;
      border-radius: 999px;
      background: #fff7ed;
      color: var(--accent-dark);
      border: 2px solid #fed7aa;
      font-size: 16px;
      font-weight: 900;
    }

    .secondary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(194, 65, 12, 0.12);
    }

    .details {
      display: grid;
      gap: 12px;
    }

    .detail-card {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(254, 215, 170, 0.9);
      border-radius: 20px;
      padding: 16px 18px;
      line-height: 1.7;
    }

    .detail-card strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin-bottom: 4px;
    }

    .collection-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .collection-card {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(254, 215, 170, 0.9);
      border-radius: 20px;
      padding: 16px 18px;
      line-height: 1.7;
    }

    .collection-card strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin-bottom: 4px;
    }

    .category-pack {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(254, 215, 170, 0.9);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(124, 91, 74, 0.08);
    }

    .category-pack.locked {
      background: linear-gradient(135deg, rgba(255, 237, 213, 0.72), rgba(255, 255, 255, 0.72));
      opacity: 0.82;
    }

    .category-pack-header {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
    }

    .category-pack-title {
      display: grid;
      gap: 4px;
    }

    .category-pack-title strong {
      font-size: 20px;
      font-weight: 900;
    }

    .category-pack-title span,
    .category-pack-status {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .mystery-mark {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #ffedd5;
      color: var(--accent-dark);
      font-size: 28px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .category-pack-body {
      display: grid;
      gap: 10px;
      padding: 0 18px 18px;
    }

    .empty-collection {
      padding: 28px;
      border-radius: 22px;
      background: #fff7ed;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.8;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      header,
      main {
        padding-left: 22px;
        padding-right: 22px;
      }

      .start-area,
      .options,
      .pie-layout,
      .collection-grid,
      .setting-row {
        grid-template-columns: 1fr;
      }

      .food-cloud {
        min-height: 150px;
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <section class="app" aria-live="polite">
    <header>
      <div class="tag">🍽️ 食物测试研究所</div>
      <h1>超级准确的测试</h1>
      <p class="subtitle">点击开始后，先选择性别和年龄，再进行 8 轮单选食物题。题库里混入了不同分类的奇特选项，完成后系统会总结你的选择。</p>
    </header>

    <main>
      <section id="startScreen" class="panel start-area">
        <div>
          <h2 class="question">准备好开始测试了吗？</h2>
          <p class="subtitle">不用纠结太久，凭第一感觉选择就好。你的胃，可能比你更了解你自己。</p>
          <button id="startBtn" class="primary-btn" type="button">开始测试 →</button>
          <button id="collectionBtn" class="secondary-btn" type="button">查看图鉴</button>
          <button id="settingsBtn" class="secondary-btn" type="button">设置</button>
        </div>
        <div class="food-cloud" aria-hidden="true">🍕 🍜 🍰 🍣 🥗 🍔</div>
      </section>

      <section id="settingsScreen" class="panel hidden">
        <div class="collection-head">
          <div>
            <h2 class="question">测试设置</h2>
            <p class="subtitle">调整选择时的音效、音量和播放开关。</p>
          </div>
          <button id="settingsBackBtn" class="primary-btn" type="button">回到开始界面</button>
        </div>
        <div class="setting-list">
          <div class="setting-card">
            <div class="setting-row">
              <label class="switch" for="soundEnabled">
                <input id="soundEnabled" type="checkbox" checked />
                开启选择音效
              </label>
              <button id="testSoundBtn" class="secondary-btn" type="button">试听</button>
            </div>
          </div>
          <div class="setting-card">
            <label for="soundType">音效类型</label>
            <select id="soundType">
              <option value="bling">音效 1</option>
              <option value="meow">音效 2</option>
              <option value="error">音效 3</option>
              <option value="horse">音效 4</option>
            </select>
          </div>
          <div class="setting-card">
            <div class="setting-row">
              <label for="volumeSlider">音量</label>
              <span><span id="volumeValue">80</span>%</span>
            </div>
            <input id="volumeSlider" class="round-slider" type="range" min="0" max="100" value="80" step="1" />
          </div>
          <div class="setting-card">
            <label class="switch" for="showUnselectedFoods">
              <input id="showUnselectedFoods" type="checkbox" />
              显示未选择的食物
            </label>
            <p class="subtitle">开启后，测试过程中未收集过的食物会用高亮边框提示。</p>
          </div>
        </div>
      </section>

      <section id="collectionScreen" class="panel hidden">
        <div class="collection-head">
          <div>
            <h2 class="question">我的食物图鉴</h2>
            <p id="collectionIntro" class="subtitle">这里会记录你已经选过的选项和对应评价。</p>
          </div>
          <button id="collectionBackBtn" class="primary-btn" type="button">回到开始界面</button>
        </div>
        <div id="collectionList" class="collection-grid"></div>
      </section>

      <section id="quizScreen" class="panel hidden">
        <div class="progress-wrap">
          <div class="progress-top">
            <span id="roundText">第 1 / 10 题</span>
            <span id="stepHint">先选择基础信息</span>
          </div>
          <div class="progress">
            <div id="bar" class="bar"></div>
          </div>
        </div>
        <h2 id="questionTitle" class="question">请选择你的性别</h2>
        <div id="options" class="options"></div>
        <button id="nextBtn" class="primary-btn hidden" type="button" disabled>进入下一题 →</button>
      </section>

      <section id="resultScreen" class="panel result hidden">
        <h2 id="resultTitle" class="result-title">测试完成</h2>
        <div>
          <p id="resultIntro" class="subtitle">你最喜欢吃这些食物：</p>
          <ul id="chosenList" class="chosen-list"></ul>
        </div>
        <div id="categoryPanel" class="category-summary hidden">
          <h3>分类占比</h3>
          <div class="pie-layout">
            <div id="pieChart" class="pie-chart" aria-label="分类占比饼状图"></div>
            <div id="categoryLegend" class="legend"></div>
          </div>
          <p id="categorySummary" class="summary-text"></p>
        </div>
        <button id="detailBtn" class="secondary-btn hidden" type="button">查看详情</button>
        <div id="detailPanel" class="details hidden"></div>
        <button id="restartBtn" class="primary-btn" type="button">再测一次 →</button>
        <button id="backStartBtn" class="primary-btn" type="button">回到开始界面</button>
      </section>
    </main>
  </section>

  <script>
    const profileSteps = [
      {
        key: "gender",
        question: "请选择你的性别",
        hint: "选择性别",
        options: [

      [

    function updateHiddenPreferenceValues(food) {
      if (food.name === "都不喜欢") {
        decreaseVisibleFoodPreferenceValues();
        return;

      const typeKey = isWeirdFood(food) ? "weird" : "normal";
      hiddenPreferenceValues[typeKey] += 1;
      hiddenPreferenceValues.categories[food.category] = (hiddenPreferenceValues.categories[food.category] || 0) + 1;
    }

    function decreaseVisibleFoodPreferenceValues() {
      currentVisibleFoods.forEach(food => {
        const typeKey = isWeirdFood(food) ? "weird" : "normal";
        hiddenPreferenceValues[typeKey] = Math.max(-3, hiddenPreferenceValues[typeKey] - 0.6);
        hiddenPreferenceValues.categories[food.category] = Math.max(
          -3,
          (hiddenPreferenceValues.categories[food.category] || 0) - 1
        );
      });
    }

    function getFoodWeight(food) {
      const isWeird = isWeirdFood(food);
      const typeScore = isWeird ? hiddenPreferenceValues.weird : hiddenPreferenceValues.normal;
      const categoryScore = hiddenPreferenceValues.categories[food.category] || 0;
      const baseWeight = isWeird ? 1 : 3;

      return Math.max(0.2, baseWeight + typeScore * 1.2 + categoryScore * 1.6);
    }

    function getWeightedRandomItems(items, count) {
      const pool = [...items];
      const selected = [];

      while (pool.length && selected.length < count) {
        const totalWeight = pool.reduce((sum, item) => sum + getFoodWeight(item), 0);
        let random = Math.random() * totalWeight;
        const index = pool.findIndex(item => {
          random -= getFoodWeight(item);
          return random <= 0;
        });
        const safeIndex = index >= 0 ? index : pool.length - 1;
        selected.push(pool.splice(safeIndex, 1)[0]);
      }

      return selected;
    }

    function getAdaptiveFoodOptions(pool, count = 3) {
      return getWeightedRandomItems(pool, count);

    function playBlingSound() {
      if (!soundSettings.enabled || soundSettings.volume <= 0) return;

      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const audioCtx = playBlingSound.audioCtx || new AudioContext();
      playBlingSound.audioCtx = audioCtx;

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      const now = audioCtx.currentTime;
      const volume = Math.max(0.0001, soundSettings.volume);

      function playTone({ frequency, delay, duration, type, endFrequency, peak = 0.22, detune = 0 }) {
        const oscillator = audioCtx.createOscillator();
        const noteGain = audioCtx.createGain();
        const start = now + delay;
        const end = start + duration;

        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, start);
        oscillator.detune.setValueAtTime(detune, start);
        if (endFrequency) {
          oscillator.frequency.exponentialRampToValueAtTime(endFrequency, end);
        }

        noteGain.gain.setValueAtTime(0.0001, start);
        noteGain.gain.exponentialRampToValueAtTime(peak * volume, start + 0.012);
        noteGain.gain.exponentialRampToValueAtTime(0.0001, end);
        oscillator.connect(noteGain);
        noteGain.connect(audioCtx.destination);
        oscillator.start(start);
        oscillator.stop(end);
      }

      function playNoiseClick(delay, duration, peak = 0.24) {
        const sampleRate = audioCtx.sampleRate;
        const buffer = audioCtx.createBuffer(1, Math.max(1, Math.floor(sampleRate * duration)), sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
        }

        const source = audioCtx.createBufferSource();
        const filter = audioCtx.createBiquadFilter();
        const clickGain = audioCtx.createGain();
        const start = now + delay;

        filter.type = "bandpass";
        filter.frequency.setValueAtTime(520, start);
        filter.Q.setValueAtTime(6, start);
        clickGain.gain.setValueAtTime(peak * volume, start);
        clickGain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        source.buffer = buffer;
        source.connect(filter);
        filter.connect(clickGain);
        clickGain.connect(audioCtx.destination);
        source.start(start);
      }

      if (soundSettings.type === "meow") {
        playTone({ frequency: 620, endFrequency: 980, delay: 0, duration: 0.18, type: "sawtooth", peak: 0.11 });
        playTone({ frequency: 980, endFrequency: 460, delay: 0.13, duration: 0.32, type: "triangle", peak: 0.18 });
        return;
      }

      if (soundSettings.type === "horse") {
        [
          { frequency: 392, endFrequency: 988, delay: 0, duration: 0.42, type: "sine", peak: 0.08, detune: -8 },
          { frequency: 523, endFrequency: 1318, delay: 0.05, duration: 0.46, type: "triangle", peak: 0.07, detune: 12 },
          { frequency: 784, endFrequency: 1568, delay: 0.16, duration: 0.34, type: "sine", peak: 0.05, detune: 18 },
          { frequency: 1175, endFrequency: 659, delay: 0.28, duration: 0.32, type: "triangle", peak: 0.045, detune: -16 }
        ].forEach(note => playTone(note));

        [0.04, 0.18, 0.32].forEach(delay => {
          playNoiseClick(delay, 0.03, 0.035);
        });
        return;
      }

      const soundMap = {
        bling: [
          { frequency: 880, delay: 0, duration: 0.22, type: "sine", peak: 0.18 },
          { frequency: 1320, delay: 0.055, duration: 0.22, type: "sine", peak: 0.16 },
          { frequency: 1760, delay: 0.11, duration: 0.22, type: "sine", peak: 0.14 }
        ],
        error: [
          { frequency: 220, delay: 0, duration: 0.12, type: "square", peak: 0.12 },
          { frequency: 165, delay: 0.14, duration: 0.16, type: "square", peak: 0.12 }
        ]
      };

      (soundMap[soundSettings.type] || soundMap.bling).forEach(note => {
        playTone(note);
      });
    }

    function getCollectedFoodNames() {
      try {
        return JSON.parse(localStorage.getItem(collectionStorageKey) || "[]");
      } catch {
        return [];
      }
    }

    function saveCollectedFoodNames(names) {
      localStorage.setItem(collectionStorageKey, JSON.stringify([...new Set(names)]));
    }

    function addFoodToCollection(food) {
      if (food.name === "都不喜欢") return;

      const collectedNames = getCollectedFoodNames();
      if (!collectedNames.includes(food.name)) {
        collectedNames.push(food.name);
        saveCollectedFoodNames(collectedNames);
      }
    }

    function renderCollection() {
      const collectedNames = getCollectedFoodNames();
      const collectedFoods = collectedNames
        .map(name => allFoodItems.find(food => food.name === name))
        .filter(Boolean);
      const categories = [...new Set(allFoodItems.map(food => food.category))];

      collectionIntro.textContent = `已收集 ${collectedFoods.length} / ${allFoodItems.length} 个选项，已解锁 ${new Set(collectedFoods.map(food => food.category)).size} / ${categories.length} 个标签。点击已解锁标签查看内部详情。`;
      collectionList.innerHTML = "";

      categories.forEach(category => {
        const categoryFoods = allFoodItems.filter(food => food.category === category);
        const collectedInCategory = categoryFoods.filter(food => collectedNames.includes(food.name));
        const isUnlocked = collectedInCategory.length > 0;
        const pack = document.createElement("div");
        pack.className = `category-pack${isUnlocked ? "" : " locked"}`;
        pack.innerHTML = `
          <button class="category-pack-header" type="button" ${isUnlocked ? "" : "disabled"}>
            <div class="category-pack-title">
              <strong>${isUnlocked ? category : "？？？"}</strong>
              <span>${isUnlocked ? `已收集 ${collectedInCategory.length} / ${categoryFoods.length}` : "未解锁标签，继续测试看看它是什么"}</span>
            </div>
            <div class="mystery-mark">${isUnlocked ? "⌄" : "?"}</div>
          </button>
          <div class="category-pack-body hidden"></div>
        `;
        collectionList.appendChild(pack);

        if (!isUnlocked) return;

        const header = pack.querySelector(".category-pack-header");
        const body = pack.querySelector(".category-pack-body");
        const mark = pack.querySelector(".mystery-mark");

        header.addEventListener("click", () => {
          const shouldOpen = body.classList.contains("hidden");
          body.classList.toggle("hidden", !shouldOpen);
          mark.textContent = shouldOpen ? "⌃" : "⌄";

          if (!shouldOpen || body.children.length) return;

          collectedInCategory.forEach(food => {
            const item = document.createElement("div");
            item.className = "collection-card";
            item.innerHTML = `
              <strong>${food.emoji} ${food.name}</strong>
              <span>${getFoodComment(food)}</span>
            `;
            body.appendChild(item);
          });
        });
      });
    }

    function openCollection() {
      renderCollection();
      showScreen(collectionScreen);
    }

    function renderDetails() {
      detailPanel.innerHTML = "";

      currentLikedFoods.forEach(food => {
        const item = document.createElement("div");
        item.className = "detail-card";
        item.innerHTML = `
          <strong>${food.emoji} ${food.name} · ${food.category}</strong>
          <span>${getFoodComment(food)}</span>
        `;
        detailPanel.appendChild(item);
      });
    }

    function toggleDetails() {
      const shouldShow = detailPanel.classList.contains("hidden");

      if (shouldShow) {
        renderDetails();
        detailPanel.classList.remove("hidden");
        detailBtn.textContent = "收起详情";
      } else {
        detailPanel.classList.add("hidden");
        detailBtn.textContent = "查看详情";
      }
    }

    function getCategoryStats(foods) {
      return foods.reduce((stats, food) => {
        stats[food.category] = (stats[food.category] || 0) + 1;
        return stats;
      }, {});
    }

    function getCategoryColor(category, index) {
      const colors = {
        "食物类": "#fb923c",
        "生物类": "#22c55e",
        "文具类": "#3b82f6",
        "材料类": "#64748b",
        "生活用品类": "#ec4899",
        "天体类": "#a855f7",
        "数码类": "#06b6d4",
        "家具类": "#f59e0b",
        "植物类": "#84cc16",
        "自然现象类": "#38bdf8",
        "家电类": "#6366f1",
        "交通工具类": "#ef4444"
      };
      const fallback = ["#fb7185", "#14b8a6", "#eab308", "#8b5cf6", "#f97316"];
      return colors[category] || fallback[index % fallback.length];
    }

    function renderCategoryChart(foods) {
      const stats = getCategoryStats(foods);
      const entries = Object.entries(stats).sort((a, b) => b[1] - a[1]);
      const total = foods.length;
      let start = 0;

      pieChart.style.background = entries.length
        ? `conic-gradient(${entries.map(([category, count], index) => {
            const degrees = (count / total) * 360;
            const end = start + degrees;
            const segment = `${getCategoryColor(category, index)} ${start}deg ${end}deg`;
            start = end;
            return segment;
          }).join(", ")})`
        : "#ffedd5";

      categoryLegend.innerHTML = "";
      entries.forEach(([category, count], index) => {
        const percent = Math.round((count / total) * 100);
        const item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = `
          <span class="legend-color" style="background:${getCategoryColor(category, index)}"></span>
          <span>${category}：${count} 个，占 ${percent}%</span>
        `;
        categoryLegend.appendChild(item);
      });

      categorySummary.textContent = `${getCategorySummary(entries, total)} ${getIdentitySummary(foods)} ${getAgeCareSummary(foods)}`;
    }

    function getAgeCareSummary(foods) {
      const exactAge = Number(profile.age);
      const ageGroup = getAgeGroup();

      if (exactAge <= 3) {
        return `你才 ${exactAge} 岁就能完成这套测试，系统已经开始怀疑屏幕背后是不是有一位天才宝宝、代答家长，或者偷偷成精的奶瓶。`;
      }

      if (exactAge >= 100) {
        return `你已经 ${exactAge} 岁还在认真选择火锅、月亮和钢筋混凝土，系统肃然起敬：这不是普通测试，这是跨世纪级别的胃口考古。`;
      }

      if (!["child", "senior"].includes(ageGroup)) {
        return "";
      }

      const foodCount = foods.filter(food => food.category === "食物类").length;
      const weirdCount = foods.length - foodCount;
      const weirdRatio = foods.length ? weirdCount / foods.length : 0;

      if (ageGroup === "child") {
        if (foods.length === 0) {
          return "小朋友如果暂时都不想选也没关系，真正吃饭时记得多听家里人的建议，先把身体长高高。";
        }

        if (weirdRatio >= 0.5) {
          return "小朋友的想象力已经冲出餐桌了，不过猫、月亮、钢筋混凝土这类选项只适合开玩笑，真正入口还是要选安全、干净、营养的食物。";
        }

        return "小朋友的选择整体还算乖，喜欢好吃的同时，也要记得蔬菜水果和正餐一起安排。";
      }

      if (foods.length === 0) {
        return "年纪大一点也可以有自己的口味，不想选就慢慢来，真正吃饭时舒服、清淡、好消化最重要。";
      }

      if (weirdRatio >= 0.5) {
        return "资深玩家的菜单很有想象力，不过身体比梗更重要，真正吃饭时还是建议选温和、好消化、少折腾的食物。";
      }

      return "这份选择看起来挺会照顾自己，继续保持轻松的心情，吃得舒服比吃得猎奇更重要。";
    }

    function getIdentitySummary(foods) {
      const foodCount = foods.filter(food => food.category === "食物类").length;
      const weirdCount = foods.length - foodCount;
      const weirdRatio = weirdCount / foods.length;
      const title = getUserTitle();

      if (profile.gender === "alien") {
        return `作为${title}，你能同时消化地球美食和奇怪物件，外星朋友的胃口果然值得尊敬。`;
      }

      if (profile.gender === "helicopter") {
        return `作为${title}，你的选择路线非常飘逸，系统怀疑你是一边悬停一边点餐，驾驶技术相当稳定。`;
      }

      if (profile.gender === "bag") {
        return `作为${title}，你装下了这么多选择，系统只担心最后会不会真的拿不动。`;
      }

      if (profile.gender === "talkingFridge") {
        return `作为${title}，你不是在选择食物，你是在思考哪些东西值得被冷藏。`;
      }

      if (profile.gender === "noneOfAbove") {
        return `作为${title}，你已经超出了普通分类学范围，系统选择先鼓掌，再慢慢理解。`;
      }

      if (["male", "female"].includes(profile.gender) && weirdRatio >= 0.5) {
        return `不过你明明选择了正常性别，却挑了这么多奇特选项，系统开始认真怀疑你的人类身份。`;
      }

      if (["male", "female"].includes(profile.gender)) {
        return `整体来看，你的人类身份暂时安全，虽然菜单里偶尔出现了一点离谱小火花。`;
      }

      return `你的身份和口味都很难预测，系统认为这份结果非常有研究价值。`;
    }

    function getCategorySummary(entries, total) {
      const [topCategory, topCount] = entries[0];
      const topPercent = Math.round((topCount / total) * 100);
      const foodCount = entries.find(([category]) => category === "食物类")?.[1] || 0;
      const weirdCount = total - foodCount;
      const isCategoryOverSelected = topCount >= 3 && topCount / total >= 0.4;
      const isDiverseMenu = entries.length >= 5 && topCount / total < 0.4;
      const specialSummaries = {
        "食物类": `你的选择里有 ${topPercent}% 都是正经食物，系统非常欣慰：你不是来拆菜单的，你是真的来吃饭的。`,
        "生物类": `你的选择里${topCategory}特别多，系统建议你先确认它们愿不愿意成为晚餐，这份口味有点野性但很有生命力。`,
        "文具类": `你的${topCategory}占比高达 ${topPercent}%，看得出来你很爱学习，只是学习资料不一定适合蘸酱吃。`,
        "材料类": `你的${topCategory}选择明显偏多，系统判断你不是饿了，你可能是准备承包一个工地。`,
        "生活用品类": `你的${topCategory}占比很高，居家感直接拉满，但这些东西通常负责服务生活，不负责成为夜宵。`,
        "天体类": `你的${topCategory}选择特别突出，别人点餐看菜单，你点餐看星图，想象力已经进入太空轨道。`,
        "数码类": `你的${topCategory}偏好很明显，科技感很强，但请记住：胃不支持 USB-C 输入。`,
        "家具类": `你的${topCategory}占比很高，系统认为你可能不是想吃东西，而是想找个舒服地方躺下。`,
        "植物类": `你的${topCategory}特别突出，整体很自然，但建议先区分“可食用”和“看起来很绿色”。`,
        "自然现象类": `你的${topCategory}选择偏多，口味非常诗意，就是厨师可能不知道怎么把天气端上桌。`,
        "家电类": `你的${topCategory}占比很高，这说明你格局很大，已经不满足于吃食物，而是想吃保存食物的设备。`,
        "交通工具类": `你的${topCategory}特别多，这顿饭可能还没开吃，已经准备出发了。`
      };

      if (isCategoryOverSelected) {
        return specialSummaries[topCategory] || `你的选择有 ${topPercent}% 集中在${topCategory}，这个偏好非常明显，系统已经记在小本本上了。`;
      }

      if (isDiverseMenu) {
        const categoryNames = entries.map(([category]) => category).join("、");
        return `你的食谱横跨${categoryNames}，多样性高到像在举办“万物皆可入口”博览会。系统很难判断你是胃口广，还是单纯不想让任何分类感到被冷落。`;
      }

      if (weirdCount === 0) {
        return `你的选择 ${topPercent}% 集中在${topCategory}，整体非常靠谱，是一个认真吃饭、快乐生活的优秀样本。`;
      }

      if (foodCount === 0) {
        return `你的选择完全避开了传统食物，系统怀疑你不是来点餐的，而是来给宇宙万物重新分类的。`;
      }

      if (weirdCount > foodCount) {
        return `你的奇特选项比正常食物还多，主打一个“胃口不一定大，但想象力一定很大”。`;
      }

      return `你的选择以${topCategory}为主，同时混入了 ${weirdCount} 个奇特选项，说明你既懂得享受美食，也愿意让菜单保持一点离谱的幽默感。`;
    }

    function showResult() {
      bar.style.width = "100%";
      chosenList.innerHTML = "";
      categoryLegend.innerHTML = "";
      categorySummary.textContent = "";
      detailPanel.innerHTML = "";
      detailPanel.classList.add("hidden");
      detailBtn.textContent = "查看详情";
      const likedFoods = choices.filter(food => food.name !== "都不喜欢");
      currentLikedFoods = likedFoods;
      const userTitle = getUserTitle();
      const yellowFace = getRandomYellowFace();

      if (likedFoods.length === 0) {
        resultTitle.textContent = `你是一个挑食的${userTitle} ${yellowFace}`;
        const careSummary = getAgeCareSummary([]);
        if (careSummary) {
          resultIntro.textContent = careSummary;
          resultIntro.classList.remove("hidden");
        } else {
          resultIntro.classList.add("hidden");
        }
        chosenList.classList.add("hidden");
        categoryPanel.classList.add("hidden");
        detailBtn.classList.add("hidden");
        showScreen(resultScreen);
        return;
      }

      const likedFoodNames = likedFoods.map(food => food.name).join("、");
      resultTitle.textContent = `你是一个喜欢${likedFoodNames}的${userTitle} ${yellowFace}`;
      resultIntro.textContent = "你最喜欢吃这些食物：";
      resultIntro.classList.remove("hidden");
      chosenList.classList.remove("hidden");
      categoryPanel.classList.remove("hidden");
      detailBtn.classList.remove("hidden");
      renderCategoryChart(likedFoods);

      likedFoods.forEach(food => {
        const item = document.createElement("li");
        item.textContent = `${food.emoji} ${food.name}`;
        chosenList.appendChild(item);
      });

      showScreen(resultScreen);
    }

    function startQuiz() {
      currentStep = 0;
      choices = [];
      currentLikedFoods = [];
      categoryPanel.classList.add("hidden");
      genderOtherExpanded = false;
      displayedFoodNames = new Set();
      extraRoundsRemaining = 0;
      requestedExtraRounds = 0;
      currentVisibleFoods = [];
      hiddenPreferenceValues = {
        normal: 0,
        weird: 0,
        categories: {}
      };
      profile = {
        gender: "male",
        age: 18
      };
      showScreen(quizScreen);
      renderStep();
    }

    function backToStart() {
      currentStep = 0;
      choices = [];
      currentLikedFoods = [];
      genderOtherExpanded = false;
      displayedFoodNames = new Set();
      extraRoundsRemaining = 0;
      requestedExtraRounds = 0;
      currentVisibleFoods = [];
      hiddenPreferenceValues = {
        normal: 0,
        weird: 0,
        categories: {}
      };
      detailPanel.innerHTML = "";
      detailPanel.classList.add("hidden");
      detailBtn.textContent = "查看详情";
      categoryPanel.classList.add("hidden");
      showScreen(startScreen);
    }

    loadSoundSettings();
    syncSoundSettingsUI();

    soundEnabled.addEventListener("change", () => {
      soundSettings.enabled = soundEnabled.checked;
      saveSoundSettings();
    });

    soundType.addEventListener("change", () => {
      soundSettings.type = soundType.value;
      saveSoundSettings();
      playBlingSound();
    });

    volumeSlider.addEventListener("input", () => {
      volumeValue.textContent = volumeSlider.value;
      soundSettings.volume = Number(volumeSlider.value) / 100;
      saveSoundSettings();
    });

    showUnselectedFoods.addEventListener("change", () => {
      soundSettings.showUnselectedFoods = showUnselectedFoods.checked;
      saveSoundSettings();
    });

    testSoundBtn.addEventListener("click", playBlingSound);
    startBtn.addEventListener("click", startQuiz);
    collectionBtn.addEventListener("click", openCollection);
    settingsBtn.addEventListener("click", openSettings);
    settingsBackBtn.addEventListener("click", backToStart);
    collectionBackBtn.addEventListener("click", backToStart);
    detailBtn.addEventListener("click", toggleDetails);
    restartBtn.addEventListener("click", startQuiz);
    backStartBtn.addEventListener("click", backToStart);
  </script>
</body>
</html>
