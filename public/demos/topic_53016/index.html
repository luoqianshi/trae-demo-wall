<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老板今天几点走</title>
<style>
:root{
  --bg:#0f1117;--card:#1a1d28;--card2:#222639;--border:#2e3348;
  --text:#e8eaf0;--text2:#9498ad;--accent:#ff6b35;--accent2:#ff9f1c;
  --green:#2ec4b6;--red:#e71d36;--blue:#4895ef;--purple:#9b5de5;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.6}
.app{max-width:560px;margin:0 auto;padding:16px 16px 60px}
.header{text-align:center;padding:20px 0 4px}
.header h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text2);font-size:12px;margin-top:2px}
.header-sub{font-size:16px;font-weight:600;color:var(--accent2);letter-spacing:2px;margin-top:4px}
.summary-box{text-align:center;padding:18px 16px;background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px}
.summary-box .summary-text{font-size:20px;font-weight:800;color:var(--text);line-height:1.3}

.tabs{display:flex;gap:4px;margin:14px 0;background:var(--card);border-radius:10px;padding:3px}
.tab{flex:1;padding:9px 0;text-align:center;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);transition:all .2s;border:none;background:transparent}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.tab:hover:not(.active){color:var(--text)}
.tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:3px;vertical-align:middle;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.section{display:none}.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;animation:fi .25s ease}
.card-title{font-size:13px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;font-weight:600}

.hero-pred{text-align:center;padding:24px 16px;background:linear-gradient(145deg,var(--card),var(--card2));border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;position:relative;overflow:hidden}
.hero-pred::before{content:'';position:absolute;top:-50px;right:-50px;width:120px;height:120px;border-radius:50%;background:rgba(255,107,53,.06)}
.hero-pred .date{font-size:13px;color:var(--text2);margin-bottom:4px}
.hero-pred .time{font-size:52px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.hero-pred .conf{margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.conf-bar{width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--accent2));transition:width .5s}
.conf-text{font-size:12px;font-weight:600;color:var(--text2)}
.factor-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;justify-content:center}
.factor-tag{padding:2px 8px;border-radius:10px;font-size:10px;background:rgba(255,107,53,.1);color:var(--accent);border:1px solid rgba(255,107,53,.15)}
.fun-phrase{text-align:center;font-size:11px;color:var(--text2);margin:6px 0 2px;font-style:italic}

.form-group{margin-bottom:12px}
.form-label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500}
.form-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.form-row{display:flex;gap:8px}.form-row .form-input{flex:1}

.tag-sel{display:flex;flex-wrap:wrap;gap:5px}
.tag-opt{padding:4px 10px;border-radius:12px;font-size:11px;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:transparent;color:var(--text2);user-select:none}
.tag-opt.on{background:rgba(255,107,53,.15);border-color:var(--accent);color:var(--accent)}
.tag-opt:hover{border-color:var(--accent)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-pri{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,107,53,.25)}
.btn-sec{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-sec:hover{border-color:var(--accent)}
.btn-blk{width:100%}.btn-sm{padding:6px 12px;font-size:11px}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:6px}
.wk-cell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;transition:all .2s;min-height:60px}
.wk-cell:hover{border-color:var(--accent)}
.wk-cell.today{border-color:var(--accent);box-shadow:0 0 10px rgba(255,107,53,.12)}
.wk-cell.past{opacity:.55}
.wk-cell.off{background:var(--card2);opacity:.4;cursor:default}
.wk-cell .wd{font-size:10px;color:var(--text2)}
.wk-cell .wt{font-size:14px;font-weight:700;margin:2px 0 1px}
.wk-cell .ws{font-size:9px;color:var(--text2)}
.hist-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 0 4px;gap:8px}
.hist-nav .nav-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;color:var(--text);font-size:13px;transition:all .15s;line-height:1}
.hist-nav .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.hist-nav .nav-btn:disabled{opacity:.3;cursor:default;border-color:var(--border);color:var(--text2)}
.hist-nav .nav-label{font-size:13px;font-weight:600;color:var(--text2);text-align:center;flex:1}
.hist-nav .nav-label span{color:var(--accent)}
.hist-grid{opacity:.7}

.rec-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.rec-item:last-child{border-bottom:none}
.rec-date{min-width:56px;font-size:12px;color:var(--text2)}
.rec-time{font-size:16px;font-weight:700;min-width:48px}
.rec-tags{display:flex;gap:3px;flex-wrap:wrap;flex:1}
.rec-tag{font-size:9px;padding:1px 6px;border-radius:6px;background:rgba(255,159,28,.1);color:var(--accent2)}
.rec-del{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:4px}
.rec-del:hover{color:var(--red)}

.stat-r{display:flex;gap:8px;margin-bottom:8px}
.stat-b{flex:1;background:var(--card2);border-radius:10px;padding:12px;text-align:center}
.stat-b .sv{font-size:20px;font-weight:800;color:var(--accent);line-height:1}
.stat-b .sl{font-size:10px;color:var(--text2);margin-top:3px}

.rule-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card2);border-radius:8px;margin-bottom:6px}
.rule-name{font-size:12px;font-weight:600}
.rule-detail{font-size:10px;color:var(--text2);margin-top:1px}

/* Attendance config */
.att-card{background:var(--card2);border-radius:10px;padding:14px;margin-bottom:10px}
.att-card .att-title{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px}
.att-card .att-desc{font-size:10px;color:var(--text2);margin-bottom:6px}
.att-summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.att-chip{font-size:10px;padding:3px 8px;border-radius:8px;background:rgba(72,149,239,.1);color:var(--blue)}

/* Day buttons row */
.day-btns{display:flex;gap:4px;margin-top:6px}
.day-btn{flex:1;padding:6px 0;border-radius:6px;text-align:center;font-size:10px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:transparent;color:var(--text2)}
.day-btn.on{background:rgba(255,107,53,.15);border-color:var(--accent);color:var(--accent)}
.day-btn:hover{border-color:var(--accent)}

/* Banner */
.setup-banner{background:linear-gradient(135deg,rgba(255,107,53,.12),rgba(255,159,28,.08));border:1px solid rgba(255,107,53,.2);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.setup-banner:hover{border-color:var(--accent)}
.setup-banner .banner-icon{font-size:28px;flex-shrink:0}
.setup-banner .banner-text{flex:1}
.setup-banner .banner-text h4{font-size:14px;margin-bottom:2px;color:var(--accent)}
.setup-banner .banner-text p{font-size:11px;color:var(--text2)}

.file-hid{display:none}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:12px;z-index:100;transition:transform .3s;box-shadow:0 6px 20px rgba(0,0,0,.4);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.mod-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:50;align-items:center;justify-content:center;padding:16px}
.mod-overlay.on{display:flex}
.mod{background:var(--card);border-radius:var(--radius);padding:20px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid var(--border)}
.mod h3{margin-bottom:4px;font-size:16px}
.mod .mod-desc{font-size:12px;color:var(--text2);margin-bottom:14px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:400px){
  .app{padding:12px 12px 50px}
  .hero-pred .time{font-size:42px}
  .wk-cell{min-height:52px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🐟 老板今天几点走</h1>
    <p class="header-sub">科学预测 · 精准摸鱼</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="home" onclick="switchTab('home')">🎯 今日</button>
    <button class="tab" data-tab="record" onclick="switchTab('record')">📝 记录</button>
    <button class="tab" data-tab="week" onclick="switchTab('week')">📅 本周</button>
    <button class="tab" data-tab="settings" onclick="switchTab('settings')">⚙️ 考勤</button>
  </div>

  <!-- HOME -->
  <div class="section active" id="sec-home">
    <div id="setupBanner"></div>
    <div class="hero-pred">
      <div class="date" id="todayDate"></div>
      <div class="time" id="todayTime">--:--</div>
      <div class="conf">
        <span class="conf-text">置信度</span>
        <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
        <span class="conf-text" id="confText">0%</span>
      </div>
      <div class="factor-tags" id="factorTags"></div>
    </div>
    <div class="summary-box">
      <div class="summary-text" id="funPhrase">数据不足，全凭直觉</div>
    </div>
    <div class="card" id="corrCard" style="display:none">
      <div class="card-title">✅ 预测校准</div>
      <div id="corrBody"></div>
    </div>
  </div>

  <!-- RECORD -->
  <div class="section" id="sec-record">
    <div class="card">
      <div class="card-title">📝 记录下班时间</div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input type="date" class="form-input" id="rDate">
      </div>
      <div class="form-group">
        <label class="form-label">时间</label>
        <input type="time" class="form-input" id="rTime">
      </div>
      <div class="form-group">
        <label class="form-label">标签（可多选）</label>
        <div class="tag-sel" id="tagSel"></div>
      </div>
      <div class="form-group">
        <label class="form-label">备注</label>
        <input type="text" class="form-input" id="rNote" placeholder="今天老板心情不错...">
      </div>
      <button class="btn btn-pri btn-blk" onclick="saveRec()">💾 保存记录</button>
    </div>
    <div class="card">
      <div class="card-title">📋 历史记录</div>
      <div id="recList"></div>
    </div>
  </div>

  <!-- WEEK -->
  <div class="section" id="sec-week">
    <div class="card">
      <div class="card-title">📅 本周概览</div>
      <div id="attSummaryBar" style="font-size:11px;color:var(--text2);margin-bottom:6px"></div>
      <div class="week-grid" id="weekGrid"></div>
    </div>
    <div class="card" id="histCard" style="display:none">
      <div class="card-title">📊 历史周查看</div>
      <div class="hist-nav">
        <button class="nav-btn" id="histPrev" onclick="histNav(-1)">◀</button>
        <div class="nav-label" id="histLabel"></div>
        <button class="nav-btn" id="histNext" onclick="histNav(1)">▶</button>
      </div>
      <div class="week-grid hist-grid" id="histGrid"></div>
      <div id="histSummary" style="text-align:center;font-size:11px;color:var(--text2);margin-top:6px"></div>
    </div>
    <div class="card">
      <div class="card-title">⚙️ 自定义规则（优先匹配）</div>
      <div id="ruleList"></div>
      <button class="btn btn-sec btn-sm btn-blk" onclick="openRuleModal()" style="margin-top:8px">➕ 添加规则</button>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="section" id="sec-settings">
    <div class="card" id="attConfigCard"></div>
    <div class="card">
      <div class="card-title">💾 数据管理</div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px">数据自动保存在浏览器中。导出 JSON 可备份，导入 JSON 可恢复。</p>
      <button class="btn btn-pri btn-blk" onclick="exportData()">📤 导出 JSON 备份</button>
      <button class="btn btn-sec btn-blk" onclick="document.getElementById('jsonFile').click()" style="margin-top:8px">📥 从 JSON 恢复</button>
      <input type="file" id="jsonFile" class="file-hid" accept=".json" onchange="importData(this)">
      <button class="btn btn-sec btn-sm btn-blk" onclick="clearData()" style="margin-top:10px">🗑️ 清空所有数据</button>
    </div>
    <div class="card">
      <div class="card-title">📊 数据统计</div>
      <div class="stat-r">
        <div class="stat-b"><div class="sv" id="stTotal">0</div><div class="sl">总记录</div></div>
        <div class="stat-b"><div class="sv" id="stAcc">--</div><div class="sl">准确率</div></div>
        <div class="stat-b"><div class="sv" id="stAvg">--</div><div class="sl">平均下班</div></div>
      </div>
      <div class="stat-r">
        <div class="stat-b"><div class="sv" id="stEar">--</div><div class="sl">最早</div></div>
        <div class="stat-b"><div class="sv" id="stLat">--</div><div class="sl">最晚</div></div>
        <div class="stat-b"><div class="sv" id="stStr">0</div><div class="sl">连续命中</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Rule Modal -->
<div class="mod-overlay" id="ruleModal" onclick="if(event.target===this)closeRuleModal()">
  <div class="mod">
    <h3>添加自定义规则</h3>
    <p class="mod-desc">设置固定模式后，预测时会优先匹配（置信度95%）</p>
    <div class="form-group">
      <label class="form-label">规则类型</label>
      <select class="form-input" id="rlType" onchange="onRuleTypeChange()">
        <option value="weekly">每周（如每周五）</option>
        <option value="weekOfMonth">每月第N周（如每月第2周周五）</option>
        <option value="dayOfMonth">每月几号（如每月15号）</option>
      </select>
    </div>
    <div id="rlWeekRow">
      <div class="form-group">
        <label class="form-label">周次（仅"每月第N周"模式需要）</label>
        <select class="form-input" id="rlWom">
          <option value="0">不限（每周）</option>
          <option value="1">第1周</option>
          <option value="2">第2周</option>
          <option value="3">第3周</option>
          <option value="4">第4周</option>
          <option value="5">第5周</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">星期</label>
        <select class="form-input" id="rlDow">
          <option value="1">周一</option><option value="2">周二</option><option value="3">周三</option>
          <option value="4">周四</option><option value="5">周五</option><option value="6">周六</option><option value="0">周日</option>
        </select>
      </div>
    </div>
    <div id="rlDayRow" style="display:none">
      <div class="form-group">
        <label class="form-label">每月几号</label>
        <select class="form-input" id="rlDom">
          <option value="1">1号</option><option value="2">2号</option><option value="3">3号</option><option value="4">4号</option><option value="5">5号</option>
          <option value="6">6号</option><option value="7">7号</option><option value="8">8号</option><option value="9">9号</option><option value="10">10号</option>
          <option value="11">11号</option><option value="12">12号</option><option value="13">13号</option><option value="14">14号</option><option value="15">15号</option>
          <option value="16">16号</option><option value="17">17号</option><option value="18">18号</option><option value="19">19号</option><option value="20">20号</option>
          <option value="21">21号</option><option value="22">22号</option><option value="23">23号</option><option value="24">24号</option><option value="25">25号</option>
          <option value="26">26号</option><option value="27">27号</option><option value="28">28号</option><option value="29">29号</option><option value="30">30号</option><option value="31">31号</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">时间</label>
      <input type="time" class="form-input" id="rlTime" value="16:00">
    </div>
    <div class="form-group">
      <label class="form-label">标签</label>
      <select class="form-input" id="rlTag">
        <option value="">无</option>
        <option value="应酬">应酬</option><option value="开会">开会</option><option value="出差">出差</option><option value="加班">加班</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">描述</label>
      <input type="text" class="form-input" id="rlDesc" placeholder="如：每月第二周周五应酬">
    </div>
    <div class="form-row">
      <button class="btn btn-pri btn-blk" onclick="addRule()">✅ 保存规则</button>
      <button class="btn btn-sec btn-blk" onclick="closeRuleModal()">取消</button>
    </div>
  </div>
</div>

<!-- Day Modal -->
<div class="mod-overlay" id="dayModal" onclick="if(event.target===this)closeDayModal()">
  <div class="mod" id="dayModContent"></div>
</div>

<!-- Setup Wizard Modal -->
<div class="mod-overlay" id="setupModal" onclick="if(event.target===this)closeSetupModal()">
  <div class="mod" id="setupModContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const TAGS=[{id:'应酬',icon:'🥂'},{id:'开会',icon:'📢'},{id:'出差',icon:'✈️'},{id:'加班',icon:'🔥'},{id:'摸鱼',icon:'🐟'},{id:'发薪日',icon:'💰'},{id:'月末',icon:'📋'},{id:'节前',icon:'🎉'},{id:'天气差',icon:'🌧️'},{id:'大客户',icon:'🤝'}];
const FUN={early:['老板今天有约？摸鱼人狂喜！','提前下班预警！准备好冲刺了吗？','看来今天运气不错~'],normal:['稳如泰山，正常节奏','一如既往的稳定输出','按部按班的一天'],late:['做好加班准备...','今晚别约饭了','自求多福吧各位'],unknown:['数据不足，全凭直觉','新手上路，多记录更准哦','再多记几天就能预测了']};
const STORE_KEY='boss_time_v2';
const WORK_SYSTEMS={'5':{name:'每周5天',days:[1,2,3,4,5]},'6':{name:'每周6天',days:[1,2,3,4,5,6]},'6b':{name:'大小周（单休）',days:null},'5b':{name:'大小周（双休）',days:null},'1':{name:'单休',days:[7]}};

let DB;

// ===================== 工具函数 =====================
function today(){return new Date().toISOString().slice(0,10)}
function parseD(s){const d=new Date(s);d.setHours(0,0,0,0);return d}
function dow(s){return parseD(s).getDay()}
function wom(s){return Math.ceil(parseD(s).getDate()/7)}
function wn(s){const d=parseD(s);const st=new Date(d.getFullYear(),0,1);return Math.ceil(((d-st)/864e5+st.getDay()+1)/7)}
function isME(s){return parseD(s).getDate()>=26}
function isQE(s){const m=parseD(s).getMonth()+1;return [3,6,9,12].includes(m)&&parseD(s).getDate()>=26}
function t2m(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m}
function m2t(m){m=Math.max(0,Math.min(1440,m));const h=Math.floor(m/60);const mi=m%60;return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')}
function dn(d){return '日一二三四五六'[d]}
function fd(s){const d=parseD(s);return (d.getMonth()+1)+'/'+d.getDate()}

function getDefaultAtt(){
  return {endTime:'18:00',workSystem:'5',flexEnabled:false,flexEarly:0,flexLate:0,overtimeDays:[],activityDays:[]};
}

// ===================== 数据层 =====================
function loadDB(){
  try{const raw=localStorage.getItem(STORE_KEY);if(raw){DB=JSON.parse(raw);if(!DB.attendance)DB.attendance=getDefaultAtt();return;}}catch(e){}
  DB={records:[],rules:[],weights:{sameWeekday:.30,weekOfMonth:.25,recentTrend:.20,biweekly:.15,tagInfluence:.10},attendance:getDefaultAtt()};
}
function saveDB(){localStorage.setItem(STORE_KEY,JSON.stringify(DB));}

function allRecs(){return DB.records;}
function allRules(){return DB.rules;}
function recByDate(d){return DB.records.find(r=>r.date===d)||null;}
function ruleByDate(d){
  const dv=dow(d),wv=wom(d),dayVal=parseD(d).getDate();
  return DB.rules.find(r=>{
    if(r.type==='dayOfMonth'&&dayVal===r.dayOfMonth)return true;
    if(r.type==='weekOfMonth'&&r.dayOfWeek===dv&&(r.weekOfMonth===0||r.weekOfMonth===wv))return true;
    if(r.type==='weekOfYear'){
      const wNum=wn(d),wFromStart=Math.ceil(dayVal/7);
      return r.dayOfWeek===dv&&(r.weekOfMonth===0||r.weekOfMonth===wFromStart||r.weekOfMonth===wNum);
    }
    return r.dayOfWeek===dv&&(r.weekOfMonth===0||r.weekOfMonth===wv);
  })||null;
}

function getAtt(){return DB.attendance||getDefaultAtt();}

// 判断某天是否工作日
function isWorkday(ds){
  const att=getAtt(),d=dow(ds);
  if(att.workSystem==='5')return d>=1&&d<=5;
  if(att.workSystem==='6')return d>=1&&d<=6;
  if(att.workSystem==='5b'||att.workSystem==='6b'){
    const par=wn(ds)%2;
    if(att.workSystem==='6b')return par===0?(d>=1&&d<=6):(d>=1&&d<=5);
    return par===0?(d>=1&&d<=5):(d===7?false:true);
  }
  return true;
}

// 获取考勤基准下班时间
function getBaseEndTime(ds){
  const att=getAtt();
  let base=t2m(att.endTime||'18:00');
  // 弹性工时：上下浮动
  if(att.flexEnabled){
    if(att.flexEarly)base-=att.flexEarly;
    if(att.flexLate)base+=att.flexLate;
  }
  return base;
}

// 判断是否固定加班日
function isOvertimeDay(ds){
  const att=getAtt(),d=dow(ds);
  return (att.overtimeDays||[]).includes(d);
}

// 判断是否活动日
function isActivityDay(ds){
  const att=getAtt(),d=dow(ds);
  return (att.activityDays||[]).includes(d);
}

// ===================== 预测引擎 =====================
function predict(ds,preTags){
  const d=dow(ds),w=wom(ds);
  const weights=DB.weights;
  const rule=ruleByDate(ds);
  if(rule)return{time:rule.time,conf:95,factors:[{name:'自定义规则',eff:'hit',desc:rule.desc||`${rule.time}固定模式`}],src:'rule'};

  const baseMin=getBaseEndTime(ds);
  let comps=[];

  const sameDay=DB.records.filter(r=>dow(r.date)===d);
  if(sameDay.length)comps.push({key:'sameWeekday',val:avgTime(sameDay),w:weights.sameWeekday,label:'同星期均值',n:sameDay.length});

  const womRecs=DB.records.filter(r=>dow(r.date)===d&&wom(r.date)===w);
  if(womRecs.length)comps.push({key:'weekOfMonth',val:avgTime(womRecs),w:weights.weekOfMonth,label:'同月同周',n:womRecs.length});

  const recent=[...DB.records].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7);
  if(recent.length>=2){
    let ts=0,div=0;
    recent.forEach((r,i)=>{const f=1-i*.1;ts+=t2m(r.time)*f;div+=f;});
    comps.push({key:'recentTrend',val:Math.round(ts/div),w:weights.recentTrend,label:'近期趋势',n:recent.length});
  }

  const par=wn(ds)%2;
  const bi=DB.records.filter(r=>wn(r.date)%2===par);
  if(bi.length>=2)comps.push({key:'biweekly',val:avgTime(bi),w:weights.biweekly,label:par?'双周模式':'单周模式',n:bi.length});

  if(preTags&&preTags.length){
    const tagRecs=DB.records.filter(r=>r.tags&&r.tags.some(t=>preTags.includes(t)));
    if(tagRecs.length)comps.push({key:'tagInfluence',val:avgTime(tagRecs),w:weights.tagInfluence,label:preTags.join('+'),n:tagRecs.length});
  }

  const extras=[];
  if(isOvertimeDay(ds))extras.push({name:'固定加班日',eff:'up'});
  if(isActivityDay(ds))extras.push({name:'活动日',eff:'down'});
  if(d===5)extras.push({name:'周五效应',eff:'down'});
  if(isME(ds))extras.push({name:'月末效应',eff:'up'});
  if(isQE(ds))extras.push({name:'季末冲刺',eff:'up'});
  if(d===1)extras.push({name:'周一综合征',eff:'up'});
  if(preTags&&preTags.includes('节前'))extras.push({name:'节前效应',eff:'down'});
  if(preTags&&preTags.includes('应酬'))extras.push({name:'应酬效应',eff:'down'});

  // 无数据时以考勤基准 + 因素修正（不允许预测早于基准，除非匹配到自定义规则）
  if(!comps.length){
    let predMin=baseMin;
    extras.forEach(f=>{if(f.eff==='down')predMin-=15;if(f.eff==='up')predMin+=20;});
    predMin=Math.max(predMin,baseMin);
    return{time:m2t(predMin),conf:15,factors:extras.length?extras:[{name:'基准时间',eff:'none'}],src:'default'};
  }

  let tw=0,ws=0;
  comps.forEach(c=>{ws+=c.val*c.w;tw+=c.w;});
  let predMin=Math.round(ws/tw);

  // 数据量少时，与基准时间做平滑混合
  const totalRecs=comps.reduce((s,c)=>s+c.n,0);
  if(totalRecs<5){
    const blend=0.3+totalRecs*0.14;
    predMin=Math.round(predMin*blend+baseMin*(1-blend));
  }

  extras.forEach(f=>{if(f.eff==='down')predMin-=15;if(f.eff==='up')predMin+=20;});

  // 默认不允许预测早于基准时间，除非历史记录中有早于基准的记录
  const hasEarlyRecs=DB.records.some(r=>t2m(r.time)<baseMin);
  if(!hasEarlyRecs)predMin=Math.max(predMin,baseMin);

  let conf=Math.min(95,Math.round(20+totalRecs*5+comps.length*8));
  if(extras.length)conf=Math.min(95,conf+5);
  if(totalRecs<3)conf=Math.min(conf,40);

  const factors=comps.map(c=>({name:c.label,eff:c.val>predMin?'up':'down',desc:`基于${c.n}条`})).concat(extras);
  return{time:m2t(predMin),conf,factors,src:'calculated'};
}

function avgTime(recs){if(!recs.length)return 0;return Math.round(recs.reduce((s,r)=>s+t2m(r.time),0)/recs.length)}

function renderHome(){
  const d=today();
  document.getElementById('todayDate').textContent=d+' 周'+dn(dow(d));
  const p=predict(d);
  document.getElementById('todayTime').textContent=p.time;
  document.getElementById('confFill').style.width=p.conf+'%';
  document.getElementById('confText').textContent=p.conf+'%';
  document.getElementById('factorTags').innerHTML=p.factors.map(f=>`<span class="factor-tag">${f.name}</span>`).join('');

  const tm=t2m(p.time);
  const base=getBaseEndTime(d);
  let k='unknown';
  if(p.src!=='default')k=tm<base-30?'early':tm<base+30?'normal':'late';
  const arr=FUN[k];
  document.getElementById('funPhrase').textContent=arr[Math.floor(Math.random()*arr.length)];

  const card=document.getElementById('corrCard');
  const body=document.getElementById('corrBody');
  let html='';
  for(let i=1;i<=3;i++){
    const dd=new Date();dd.setDate(dd.getDate()-i);
    const s=dd.toISOString().slice(0,10);
    const r=recByDate(s);
    if(r){
      const pr=predict(s,r.tags||[]);
      const diff=Math.abs(t2m(r.time)-t2m(pr.time));
      if(diff>15){
        const dir=t2m(r.time)>t2m(pr.time)?'晚':'早';
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
          <span style="color:var(--text2)">${fd(s)}</span>
          <span>预测${pr.time}，实际${dir}${diff}分钟</span>
          <span style="color:var(--accent2);font-size:11px">已学习</span>
        </div>`;
      }
    }
  }
  if(html){card.style.display='block';body.innerHTML=html;}
  else{card.style.display='none';}
}

let histOffset=1;

function renderWeekTab(){

  const ws=WORK_SYSTEMS[att.workSystem];

    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const isToday=ds===today();
    const isPast=d<new Date(new Date().setHours(0,0,0,0));
    const workday=isWorkday(ds);

    html+=`<div class="wk-cell ${isToday?'today':''}${offCls}${pastCls}" ${workday?`onclick="openDay('${ds}')"`:''}>
      <div class="wd">周${dn(d.getDay())}</div>
      <div class="wt">${workday?tm:'--'}</div>
      <div class="ws">${!workday?'休息':rec?'实际':'预测'}</div>
    </div>`;
  }
  document.getElementById('weekGrid').innerHTML=html;

  const rules=DB.rules;
  const rl=document.getElementById('ruleList');
  if(!rules.length){rl.innerHTML='<p style="text-align:center;color:var(--text2);padding:8px;font-size:12px">暂无规则</p>';}
  rl.innerHTML=rules.map((r,i)=>`<div class="rule-item">
    <div><div class="rule-name">${r.time} ${r.tag||''}</div><div class="rule-detail">${r.desc||''}</div></div>
    <button class="rec-del" onclick="delRule(${i})">✕</button>
  </div>`).join('');

  // 历史周
  const hasData=DB.records.length>0;
  const hc=document.getElementById('histCard');
  if(hasData){
    hc.style.display='block';
    // 修正offset使其指向最近一个有记录的历史周
    if(histOffset===1){
      const thisWeekEnd=new Date(mon);thisWeekEnd.setDate(mon.getDate()+6);
      const lastRec=[...DB.records].sort((a,b)=>b.date.localeCompare(a.date))[0];
      if(recByDate(today()))histOffset=1;
    }
    renderHistWeek();
  }else{hc.style.display='none';}
}

function renderHistWeek(){
  const now=new Date();const day=now.getDay();
  const thisMon=new Date(now);thisMon.setDate(now.getDate()-(day===0?6:day-1));
  const targetMon=new Date(thisMon);
  targetMon.setDate(thisMon.getDate()-histOffset*7);

  const y=targetMon.getFullYear();
  const m=targetMon.getMonth()+1;
  document.getElementById('histLabel').innerHTML=`<span>${y}年${m}月</span> 第${histOffset}周前`;

  let html='';
  let hasAny=false;
  for(let i=0;i<7;i++){
    const d=new Date(targetMon);d.setDate(targetMon.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const workday=isWorkday(ds);
    const rec=recByDate(ds);
    const offCls=workday?'':' off';
    const dimStyle=rec?'':'opacity:.5';
    if(rec)hasAny=true;
    html+=`<div class="wk-cell ${offCls}" style="${dimStyle}" ${rec?`onclick="openDay('${ds}')"`:''}>
      <div class="wd">${m}/${d.getDate()}</div>
      <div class="wd" style="font-size:8px">周${dn(d.getDay())}</div>
      <div class="wt">${rec?rec.time:'--'}</div>
      <div class="ws">${rec?'实际':'无记录'}</div>
    </div>`;
  }
  document.getElementById('histGrid').innerHTML=html;

  // 该周统计摘要
  const recs=[];
  for(let i=0;i<7;i++){
    const d=new Date(targetMon);d.setDate(targetMon.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const r=recByDate(ds);
    if(r)recs.push(r);
  }
  const sm=document.getElementById('histSummary');
  if(recs.length){
    const avg=avgTime(recs);
    sm.textContent=`该周 ${recs.length}条记录 · 平均${m2t(avg)}`;
  }else{sm.textContent='该周暂无记录';}

  // 边界控制
  document.getElementById('histPrev').disabled=histOffset>=52;
  // 找最早记录的日期，计算最大可翻页数
  const sorted=[...DB.records].sort((a,b)=>a.date.localeCompare(b.date));
  const earliest=sorted.length?sorted[0].date:today();
  const earliestMon=new Date(parseD(earliest));
  earliestMon.setDate(earliestMon.getDate()-(earliestMon.getDay()===0?6:earliestMon.getDay()-1));
  const maxOff=Math.floor((thisMon-earliestMon)/604800000);
  document.getElementById('histNext').disabled=histOffset>=Math.max(1,maxOff);
}

function histNav(dir){
  histOffset=Math.max(1,histOffset+dir);
  renderHistWeek();
}

function toggleOtDay(el){
  const att=getAtt();if(!att.overtimeDays)att.overtimeDays=[];
  const d=parseInt(el.dataset.d);
  const idx=att.overtimeDays.indexOf(d);
  if(idx>=0){att.overtimeDays.splice(idx,1);el.classList.remove('on');}
  else{att.overtimeDays.push(d);el.classList.add('on');}
  DB.attendance=att;saveDB();renderAttSummary();
}

function toggleActDay(el){
  const att=getAtt();if(!att.activityDays)att.activityDays=[];
  const d=parseInt(el.dataset.d);
  const idx=att.activityDays.indexOf(d);
  if(idx>=0){att.activityDays.splice(idx,1);el.classList.remove('on');}
  else{att.activityDays.push(d);el.classList.add('on');}
  DB.attendance=att;saveDB();renderAttSummary();
}

// ===================== 统计 =====================
function renderStats(){
  const recs=DB.records;
  document.getElementById('stTotal').textContent=recs.length;
  if(!recs.length){
    ['stAcc','stAvg','stEar','stLat'].forEach(id=>document.getElementById(id).textContent='--');
    document.getElementById('stStr').textContent='0';
    return;
  }
  const times=recs.map(r=>t2m(r.time));
  document.getElementById('stAvg').textContent=m2t(Math.round(times.reduce((a,b)=>a+b)/times.length));
  document.getElementById('stEar').textContent=m2t(Math.min(...times));
  document.getElementById('stLat').textContent=m2t(Math.max(...times));

  let hits=0,total=0;
  recs.forEach(r=>{
    const pr=predict(r.date,r.tags||[]);
    if(pr.src!=='default'){total++;if(Math.abs(t2m(r.time)-t2m(pr.time))<=30)hits++;}
  });
  document.getElementById('stAcc').textContent=total?Math.round(hits/total*100)+'%':'--';

  const sorted=[...recs].sort((a,b)=>b.date.localeCompare(a.date));
  let streak=0;
  for(const r of sorted){
    const pr=predict(r.date,r.tags||[]);
    if(pr.src==='default')break;
    if(Math.abs(t2m(r.time)-t2m(pr.time))<=30)streak++;else break;
  }
  document.getElementById('stStr').textContent=streak;
}

// ===================== 操作 =====================
function getSelTags(){return [...document.querySelectorAll('#tagSel .tag-opt.on')].map(e=>e.dataset.t);}

function saveRec(){
  const date=document.getElementById('rDate').value;
  const time=document.getElementById('rTime').value;
  const tags=getSelTags();
  const note=document.getElementById('rNote').value.trim();
  if(!date||!time){toast('请填写日期和时间');return;}
  const idx=DB.records.findIndex(r=>r.date===date);
  const rec={date,time,tags,note};
  if(idx>=0)DB.records[idx]=rec;else DB.records.push(rec);
  saveDB();
  document.querySelectorAll('#tagSel .tag-opt').forEach(e=>e.classList.remove('on'));
  document.getElementById('rNote').value='';
  toast('✅ 已保存');
  refreshAll();
}

function delRec(date){DB.records=DB.records.filter(r=>r.date!==date);saveDB();refreshAll();}
function openRuleModal(){document.getElementById('ruleModal').classList.add('on');}
function closeRuleModal(){document.getElementById('ruleModal').classList.remove('on');}
function closeSetupModal(){document.getElementById('setupModal').classList.remove('on');}

function onRuleTypeChange(){
  const t=document.getElementById('rlType').value;
  document.getElementById('rlWeekRow').style.display=(t==='dayOfMonth')?'none':'block';
  document.getElementById('rlDayRow').style.display=(t==='dayOfMonth')?'block':'none';
  document.getElementById('rlWom').disabled=(t==='weekly');
}

function addRule(){
  const type=document.getElementById('rlType').value;
  const time=document.getElementById('rlTime').value;
  const tag=document.getElementById('rlTag').value;
  let rule,desc='';
  if(type==='dayOfMonth'){
    const dom=parseInt(document.getElementById('rlDom').value);
    desc=document.getElementById('rlDesc').value.trim()||`每月${dom}号 ${time}${tag?' '+tag:''}`;
    rule={type:'dayOfMonth',dayOfMonth:dom,time,tag,desc};
  }else{
    const womVal=parseInt(document.getElementById('rlWom').value);
    const dowVal=parseInt(document.getElementById('rlDow').value);
    if(type==='weekly'){
      desc=document.getElementById('rlDesc').value.trim()||`每周${dn(dowVal)} ${time}${tag?' '+tag:''}`;
    }else{
      desc=document.getElementById('rlDesc').value.trim()||`每月第${womVal||'每'}周${dn(dowVal)} ${time}${tag?' '+tag:''}`;
    }
    rule={type:type==='weekly'?'weekly':'weekOfMonth',weekOfMonth:womVal,dayOfWeek:dowVal,time,tag,desc};
  }
  DB.rules.push(rule);
  saveDB();closeRuleModal();
  document.getElementById('rlDesc').value='';
  toast('✅ 规则已添加');refreshAll();
}

function delRule(idx){DB.rules.splice(idx,1);saveDB();refreshAll();}

// ===================== 导入导出 =====================
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='boss-time-data.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('✅ 已导出');
}

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.records||!Array.isArray(data.records)){toast('❌ 文件格式错误');return;}
      if(!data.attendance)data.attendance=getDefaultAtt();
      DB=data;saveDB();refreshAll();toast('✅ 数据已恢复：'+file.name);
    }catch(err){toast('❌ 导入失败：'+err.message);}
  };
  reader.readAsText(file);input.value='';
}

function clearData(){
  if(!confirm('确定清空所有数据？不可恢复！'))return;
  DB={records:[],rules:[],weights:{sameWeekday:.30,weekOfMonth:.25,recentTrend:.20,biweekly:.15,tagInfluence:.10},attendance:getDefaultAtt()};
  saveDB();toast('🗑️ 已清空');refreshAll();
}

// ===================== Day Modal =====================
function openDay(ds){
  const d=parseD(ds);
  const pred=predict(ds);
  const rec=recByDate(ds);
  const rule=ruleByDate(ds);
  const isPast=d<new Date(new Date().setHours(0,0,0,0));

  let html=`<h3>${ds} 周${dn(dow(ds))} · 第${wom(ds)}周${isME(ds)?' · 月末':''}${isQE(ds)?' · 季末':''}</h3>
    <div style="text-align:center;margin:14px 0">
      <div style="font-size:32px;font-weight:800;color:var(--accent)">${rec?rec.time:pred.time}</div>
      <div style="font-size:11px;color:var(--text2)">${rec?'实际记录':'预测时间'} · 置信度 ${pred.conf}%${!isWorkday(ds)?' · 非工作日':''}</div>
    </div>
    <div style="margin-bottom:10px;font-size:12px;font-weight:600">影响因素：</div>
    <div class="factor-tags" style="justify-content:flex-start;margin-bottom:14px">${pred.factors.map(f=>`<span class="factor-tag">${f.name}</span>`).join('')}</div>`;

  if(rule)html+=`<div style="padding:6px 10px;background:rgba(155,93,229,.08);border-radius:6px;font-size:11px;color:var(--purple);margin-bottom:10px">📌 匹配规则：${rule.desc}</div>`;
  if(isOvertimeDay(ds))html+=`<div style="padding:6px 10px;background:rgba(231,29,54,.06);border-radius:6px;font-size:11px;color:var(--red);margin-bottom:10px">🔥 固定加班日</div>`;
  if(isActivityDay(ds))html+=`<div style="padding:6px 10px;background:rgba(46,196,182,.06);border-radius:6px;font-size:11px;color:var(--green);margin-bottom:10px">🎉 活动日</div>`;

  if(!rec&&isPast&&isWorkday(ds)){
    html+=`<div style="border-top:1px solid var(--border);padding-top:10px">
      <p style="font-size:12px;margin-bottom:6px">补录 ${ds} 的下班时间：</p>
      <div class="form-row">
        <input type="time" class="form-input" id="modTime" value="${pred.time}">
        <button class="btn btn-pri btn-sm" onclick="quickSave('${ds}')">保存</button>
      </div>
    </div>`;
  }else if(rec){
    html+=`<div style="border-top:1px solid var(--border);padding-top:10px;font-size:12px;color:var(--text2)">
      <div>标签：${(rec.tags||[]).join('、')||'无'}</div>
      ${rec.note?`<div style="margin-top:4px">备注：${rec.note}</div>`:''}
    </div>`;
  }

  document.getElementById('dayModContent').innerHTML=html;
  document.getElementById('dayModal').classList.add('on');
}

function quickSave(ds){
  const time=document.getElementById('modTime').value;if(!time)return;
  const idx=DB.records.findIndex(r=>r.date===ds);
  const rec={date:ds,time,tags:[],note:'补录'};
  if(idx>=0)DB.records[idx]=rec;else DB.records.push(rec);
  saveDB();closeDayModal();refreshAll();toast('✅ 已补录');
}
function closeDayModal(){document.getElementById('dayModal').classList.remove('on');}

// ===================== Toast =====================
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
}

loadDB();
refreshAll();

        <select class="form-input" id="wizSys">
          <option value="5">每周5天</option>
          <option value="6">每周6天</option>

function finishWizard(){
  const att=getAtt();
  att.endTime=document.getElementById('wizTime').value;
  att.workSystem=document.getElementById('wizSys').value;
  att._setupDone=true;
  DB.attendance=att;saveDB();
  closeSetupModal();
  refreshAll();
  toast('✅ 考勤配置完成');
}
