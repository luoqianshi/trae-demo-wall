<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 780" width="600" height="780">
  <defs>
    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="inkBleed">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
    <pattern id="ruledLines" x="0" y="0" width="600" height="32" patternUnits="userSpaceOnUse">
      <rect width="600" height="32" fill="#fbf9f3"/>
      <line x1="0" y1="31.5" x2="600" y2="31.5" stroke="rgba(27,42,78,0.08)" stroke-width="1"/>
    </pattern>
    <linearGradient id="redMark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D94F4F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D94F4F" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#D94F4F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 纸张背景 -->
  <rect width="600" height="780" fill="url(#ruledLines)"/>
  <rect width="600" height="780" fill="#fbf9f3" opacity="0.3" filter="url(#paperTexture)"/>

  <!-- 装订孔 -->
  <circle cx="25" cy="120" r="6" fill="#E0D5B8" opacity="0.6"/>
  <circle cx="25" cy="390" r="6" fill="#E0D5B8" opacity="0.6"/>
  <circle cx="25" cy="660" r="6" fill="#E0D5B8" opacity="0.6"/>

  <!-- 试卷头部 -->
  <text x="60" y="50" font-family="'Fraunces', 'Songti SC', Georgia, serif" font-size="22" font-weight="700" fill="#1B2A4E" filter="url(#inkBleed)">初三年级 · 期中数学试卷</text>
  <text x="60" y="75" font-family="'PingFang SC', sans-serif" font-size="13" fill="#6B7FA8">姓名:________  班级:初三(2)班  日期:2026.04.18</text>
  <line x1="60" y1="88" x2="560" y2="88" stroke="#1B2A4E" stroke-width="1.5" opacity="0.7"/>

  <!-- 题号 -->
  <text x="60" y="135" font-family="'Fraunces', Georgia, serif" font-size="20" font-weight="700" fill="#D94F4F" filter="url(#inkBleed)">15.</text>

  <!-- 题干内容 (手写风格) -->
  <text x="95" y="135" font-family="'Songti SC', 'SimSun', serif" font-size="17" fill="#1B2A4E" filter="url(#inkBleed)">已知函数</text>
  <text x="175" y="135" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="17" font-weight="600" fill="#1B2A4E" filter="url(#inkBleed)">f(x) = x² - 2ax + 3</text>
  <text x="335" y="135" font-family="'Songti SC', serif" font-size="17" fill="#1B2A4E" filter="url(#inkBleed)">,若</text>
  <text x="365" y="135" font-family="'JetBrains Mono', monospace" font-size="17" font-weight="600" fill="#1B2A4E" filter="url(#inkBleed)">f(x)</text>
  <text x="405" y="135" font-family="'Songti SC', serif" font-size="17" fill="#1B2A4E" filter="url(#inkBleed)">在区间</text>

  <!-- 区间 [1, 2] 带高亮 -->
  <rect x="465" y="120" width="55" height="22" fill="#FFE066" opacity="0.5" rx="2"/>
  <text x="470" y="135" font-family="'JetBrains Mono', monospace" font-size="17" font-weight="600" fill="#1B2A4E" filter="url(#inkBleed)">[1, 2]</text>

  <text x="525" y="135" font-family="'Songti SC', serif" font-size="17" fill="#1B2A4E" filter="url(#inkBleed)">上</text>

  <text x="95" y="167" font-family="'Songti SC', serif" font-size="17" fill="#1B2A4E" filter="url(#inkBleed)">单调递增,求实数</text>
  <text x="235" y="167" font-family="'JetBrains Mono', monospace" font-size="17" font-weight="600" fill="#1B2A4E" filter="url(#inkBleed)">a</text>
  <text x="252" y="167" font-family="'Songti SC', serif" font-size="17" fill="#1B2A4E" filter="url(#inkBleed)">的取值范围。</text>

  <!-- 学生作答过程 -->
  <text x="75" y="215" font-family="'Songti SC', serif" font-size="14" fill="#2F446B" opacity="0.85">解: f(x) 开口向上,对称轴 x = a</text>
  <text x="75" y="247" font-family="'Songti SC', serif" font-size="14" fill="#2F446B" opacity="0.85">∵ f(x) 在 [1,2] 单调递增</text>
  <text x="75" y="279" font-family="'Songti SC', serif" font-size="14" fill="#2F446B" opacity="0.85">∴ 对称轴 a ≤ 1</text>
  <text x="75" y="311" font-family="'Songti SC', serif" font-size="14" fill="#2F446B" opacity="0.85">∴ a ∈ (-∞, 1]</text>

  <!-- 红色批改标记 -->
  <rect x="70" y="295" width="180" height="24" fill="url(#redMark)" opacity="0.6"/>
  <text x="270" y="311" font-family="'Fraunces', Georgia, serif" font-size="16" font-weight="700" fill="#D94F4F" filter="url(#inkBleed)">✗</text>
  <text x="295" y="311" font-family="'Songti SC', serif" font-size="13" fill="#D94F4F" filter="url(#inkBleed)">考虑不全面!</text>

  <!-- 教师批注 -->
  <text x="75" y="360" font-family="'Songti SC', serif" font-size="13" fill="#D94F4F" opacity="0.9" font-style="italic">批注:对称轴在区间左侧只是充分条件之一,</text>
  <text x="75" y="382" font-family="'Songti SC', serif" font-size="13" fill="#D94F4F" opacity="0.9" font-style="italic">还需考虑对称轴在区间内部的情况。</text>

  <!-- 分隔线 -->
  <line x1="60" y1="420" x2="560" y2="420" stroke="#E0D5B8" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- 下一题题号 -->
  <text x="60" y="465" font-family="'Fraunces', Georgia, serif" font-size="20" font-weight="700" fill="#1B2A4E" filter="url(#inkBleed)">16.</text>
  <text x="95" y="465" font-family="'Songti SC', serif" font-size="17" fill="#1B2A4E" opacity="0.5" filter="url(#inkBleed)">在△ABC 中,已知 a=2, b=√3, A=60°...</text>

  <!-- 模糊的下一题内容 (表示未完整拍摄) -->
  <rect x="60" y="480" width="500" height="80" fill="#EDE6D3" opacity="0.4"/>
  <text x="75" y="510" font-family="'Songti SC', serif" font-size="14" fill="#6B7FA8" opacity="0.3">求角 B 的大小及边 c 的长度。</text>
  <text x="75" y="540" font-family="'Songti SC', serif" font-size="13" fill="#6B7FA8" opacity="0.25">解:由正弦定理得 sinB/b = sinA/a...</text>

  <!-- 底部页码 -->
  <text x="300" y="730" font-family="'PingFang SC', sans-serif" font-size="11" fill="#6B7FA8" opacity="0.6" text-anchor="middle">第 3 页 共 8 页</text>

  <!-- 轻微阴影/折痕效果 -->
  <rect x="0" y="0" width="600" height="780" fill="url(#ruledLines)" opacity="0.15"/>
  <polygon points="0,0 40,0 0,40" fill="#E0D5B8" opacity="0.3"/>
  <polygon points="560,780 600,780 600,740" fill="#E0D5B8" opacity="0.3"/>
</svg>
