    function bindTap(el, handler) {
        if (!el) return;
        var lastFire = 0;
        var lastTouchTime = 0;
        el.addEventListener("touchstart", function(ev) {
            lastTouchTime = Date.now();
        }, { passive: true });
        el.addEventListener("touchend", function(ev) {
            var now = Date.now();
            if (now - lastFire < 500) {
                try { ev.preventDefault(); } catch(e2) {}
                return;
            }
            lastFire = now;
            lastTouchTime = now;
            try {
                if (ev.preventDefault) { try { ev.preventDefault(); } catch(e2) {} }
                handler(ev);
            } catch(e) { console.error("handler error:", e); }
        }, { passive: false });
        el.addEventListener("click", function(ev) {
            var now = Date.now();
            if (now - lastTouchTime < 700) return;
            if (now - lastFire < 500) return;
            lastFire = now;
            try { handler(ev); } catch(e) { console.error("handler error:", e); }
        });
    }

    function speakText(text, btn) {
        try {
            if (!("speechSynthesis" in window)) {
                showError("symptom-result", "您的浏览器不支持语音朗读功能，请换一个浏览器试试。");
                return;
            }
            var synth = window.speechSynthesis;
            if (btn && btn.getAttribute("data-speaking") === "1") {
                synth.cancel();
                btn.setAttribute("data-speaking", "0");
                btn.innerHTML = "🔊 朗读给医生听";
                return;
            }
            synth.cancel();
            var utter = new SpeechSynthesisUtterance(text);
            utter.lang = "zh-CN";
            utter.rate = 0.95;
            utter.pitch = 1;
            try {
                var voices = synth.getVoices();
                for (var i = 0; i < voices.length; i++) {
                    var v = voices[i];
                    if (v.lang && (v.lang.indexOf("zh") === 0 || v.lang.indexOf("cmn") === 0 || v.lang.indexOf("Chinese") !== -1 || v.lang.indexOf("Mandarin") !== -1)) {
                        utter.voice = v;
                        break;
                    }
                }
            } catch (e) {
                console.error("voice select error:", e);
            }
            if (btn) {
                utter.onstart = function() {
                    btn.setAttribute("data-speaking", "1");
                    btn.innerHTML = "⏹ 停止朗读";
                };
                utter.onend = function() {
                    btn.setAttribute("data-speaking", "0");
                    btn.innerHTML = "🔊 朗读给医生听";
                };
                utter.onerror = function() {
                    btn.setAttribute("data-speaking", "0");
                    btn.innerHTML = "🔊 朗读给医生听";
                };
            }
            synth.speak(utter);
        } catch (e) {
            console.error("speakText error:", e);
            showError("symptom-result", "语音朗读失败，请您直接把下面的内容读给医生听。");
        }
    }

    function initApp() {
        try {
            // tab switching
            var tabBtns = document.querySelectorAll(".tab-btn");
            for (var t = 0; t < tabBtns.length; t++) {
                (function(btn) {
                    bindTap(btn, function() {
                    try {
                        var tabName = btn.getAttribute("data-tab");
                        for (var i = 0; i < tabBtns.length; i++) {
                            tabBtns[i].classList.remove("active");
                        }
                        btn.classList.add("active");
                        var panels = document.querySelectorAll(".tab-panel");
                        for (var j = 0; j < panels.length; j++) {
                            panels[j].classList.remove("active");
                        }
                        var targetPanel = document.getElementById("panel-" + tabName);
                        if (targetPanel) targetPanel.classList.add("active");
                    } catch (e) {
                        console.error("tab switch error:", e);
                    }
                });
            })(tabBtns[t]);
            }

            // symptom quick options - multi-select with localStorage
            var symptomQuick = document.getElementById("symptom-quick");
            var symptomInput = document.getElementById("symptom-input");
            var symptomBtn = document.getElementById("symptom-btn");

            try {
                var storedStr = localStorage.getItem("yf_symptom_selected");
                var storedArr = [];
                if (storedStr) {
                    try {
                        storedArr = JSON.parse(storedStr);
                    } catch (pe) {
                        storedArr = [];
                    }
                }
                var symQuickBtns = symptomQuick.querySelectorAll(".quick-btn");
                var symSelectedSet = {};
                for (var s = 0; s < symQuickBtns.length; s++) {
                    var sqBtn = symQuickBtns[s];
                    var sqVal = sqBtn.getAttribute("data-value");
                    for (var k = 0; k < storedArr.length; k++) {
                        if (storedArr[k] === sqVal) {
                            sqBtn.classList.add("selected");
                            symSelectedSet[sqVal] = true;
                            break;
                        }
                    }
                    (function(b) {
                        bindTap(b, function() {
                            try {
                                var v = b.getAttribute("data-value");
                                if (b.classList.contains("selected")) {
                                    b.classList.remove("selected");
                                    delete symSelectedSet[v];
                                } else {
                                    b.classList.add("selected");
                                    symSelectedSet[v] = true;
                                }
                                var selectedVals = [];
                                for (var key in symSelectedSet) {
                                    if (symSelectedSet.hasOwnProperty(key)) {
                                        selectedVals.push(key);
                                    }
                                }
                                symptomInput.value = selectedVals.join("、");
                                try {
                                    localStorage.setItem("yf_symptom_selected", JSON.stringify(selectedVals));
                                } catch (le) {
                                    console.error("localStorage error:", le);
                                }
                            } catch (e) {
                                console.error("symptom quick click error:", e);
                            }
                        });
                    })(sqBtn);
                }
                if (storedArr.length > 0) { symptomInput.value = storedArr.join("、"); }
            } catch (e) {
                console.error("symptom quick init error:", e);
            }

            // report quick options - single select
            var reportQuick = document.getElementById("report-quick");
            var reportInput = document.getElementById("report-input");
            var reportBtn = document.getElementById("report-btn");
            try {
                var rqBtns = reportQuick.querySelectorAll(".quick-btn");
                for (var r = 0; r < rqBtns.length; r++) {
                    (function(b) {
                        bindTap(b, function() {
                            try {
                                for (var i = 0; i < rqBtns.length; i++) {
                                    rqBtns[i].classList.remove("selected");
                                }
                                b.classList.add("selected");
                                reportInput.value = b.getAttribute("data-value");
                            } catch (e) {
                                console.error("report quick click error:", e);
                            }
                        });
                    })(rqBtns[r]);
                }
            } catch (e) {
                console.error("report quick init error:", e);
            }

            // medicine quick options - single select
            var medicineQuick = document.getElementById("medicine-quick");
            var medicineInput = document.getElementById("medicine-input");
            var medicineBtn = document.getElementById("medicine-btn");
            try {
                var mqBtns = medicineQuick.querySelectorAll(".quick-btn");
                for (var m = 0; m < mqBtns.length; m++) {
                    (function(b) {
                        bindTap(b, function() {
                            try {
                                for (var i = 0; i < mqBtns.length; i++) {
                                    mqBtns[i].classList.remove("selected");
                                }
                                b.classList.add("selected");
                                medicineInput.value = b.getAttribute("data-value");
                            } catch (e) {
                                console.error("medicine quick click error:", e);
                            }
                        });
                    })(mqBtns[m]);
                }
            } catch (e) {
                console.error("medicine quick init error:", e);
            }

            // symptom button
            if (symptomBtn) {
                bindTap(symptomBtn, function() {
                    try {
                        var input = (symptomInput.value || "").trim();
                        if (!input) {
                            showError("symptom-result", "请先选择或输入您哪里不舒服。");
                            return;
                        }
                        symptomBtn.disabled = true;
                        showLoading("symptom-result");
                        setTimeout(function() {
                            try {
                                symptomBtn.disabled = false;
                                var matched = null;
                                var matchedList = [];
                                for (var i = 0; i < SYMPTOM_RULES.length; i++) {
                                    if (input.indexOf(SYMPTOM_RULES[i].keyword) !== -1) {
                                        matchedList.push(SYMPTOM_RULES[i]);
                                    }
                                }
                                var primary = matchedList.length > 0 ? matchedList[0] : null;
                                var data = primary || SYMPTOM_DEFAULT;
                                var urgencyText = "";
                                var urgencyLabel = "";
                                if (data.urgency === "red") {
                                    urgencyText = "建议尽快就医，不要拖延";
                                    urgencyLabel = "紧急，建议尽快";
                                } else if (data.urgency === "yellow") {
                                    urgencyText = "建议及时就医";
                                    urgencyLabel = "建议就医";
                                } else {
                                    urgencyText = "建议就医咨询";
                                    urgencyLabel = "建议就医";
                                }
                                var formalText = "";
                                if (matchedList.length > 0) {
                                    for (var j = 0; j < matchedList.length; j++) {
                                        formalText = formalText + matchedList[j].formal + " ";
                                    }
                                } else {
                                    formalText = data.formal + " " + input;
                                }
                                var allTips = [];
                                for (var k = 0; k < matchedList.length; k++) {
                                    for (var l = 0; l < matchedList[k].tips.length; l++) {
                                        allTips.push(matchedList[k].tips[l]);
                                    }
                                }
                                if (allTips.length === 0) {
                                    allTips = data.tips;
                                }
                                var deptText = "";
                                for (var m = 0; m < matchedList.length; m++) {
                                    if (deptText.indexOf(matchedList[m].dept) === -1) {
                                        if (deptText) deptText = deptText + "、";
                                        deptText = deptText + matchedList[m].dept;
                                    }
                                }
                                if (!deptText) deptText = data.dept;
                                var highestUrgency = "blue";
                                for (var n = 0; n < matchedList.length; n++) {
                                    if (matchedList[n].urgency === "red") { highestUrgency = "red"; break; }
                                    if (matchedList[n].urgency === "yellow" && highestUrgency !== "red") { highestUrgency = "yellow"; }
                                }
                                if (matchedList.length === 0) highestUrgency = data.urgency;
                                var urgencyClass = "tag-" + highestUrgency;
                                var resultHtml = '<div class="card" style="margin-bottom:0;">' +
                                    '<div class="section-title">📝 医生，我想这样说给您听：</div>' +
                                    '<div class="note-box" style="font-size:20px;">' + formalText + '</div>' +
                                    '<button class="secondary-btn speak-btn" style="margin-top:12px;width:auto;">🔊 朗读给医生听</button>' +
                                    '<div class="section-title" style="margin-top:20px;">🏥 建议就诊科室：</div>' +
                                    '<span class="tag tag-blue">' + deptText + '</span>' +
                                    '<div class="section-title" style="margin-top:20px;">⚠️ 紧急程度：</div>' +
                                    '<span class="tag ' + urgencyClass + '">' + urgencyLabel + '</span>' +
                                    '<div class="section-title" style="margin-top:20px;">💡 温馨提示：</div>' +
                                    '<ul class="info-list">';
                                for (var p = 0; p < allTips.length; p++) {
                                    resultHtml = resultHtml + '<li>• ' + allTips[p] + '</li>';
                                }
                                resultHtml = resultHtml + '</ul>' +
                                    '<div class="tip-box">💝 如果症状持续加重、或者您感觉很不舒服，请立即拨打 120 或让家人送您去医院。不要硬撑。</div>' +
                                    '</div>';
                                showResult("symptom-result", resultHtml);
                                var speakBtn = document.querySelector("#symptom-result .speak-btn");
                                if (speakBtn) {
                                    bindTap(speakBtn, function() {
                                        speakText(formalText, speakBtn);
                                    });
                                }
                            } catch (e) {
                                console.error("symptom setTimeout error:", e);
                                showError("symptom-result", "分析时出现问题，请您再试一次。");
                                symptomBtn.disabled = false;
                            }
                        }, 800);
                    } catch (e) {
                        console.error("symptom btn error:", e);
                        symptomBtn.disabled = false;
                    }
                });
            }

            // report button
            if (reportBtn) {
                bindTap(reportBtn, function() {
                    try {
                        var input = (reportInput.value || "").trim();
                        if (!input) {
                            showError("report-result", "请选择或输入您的检查指标和数值。");
                            return;
                        }
                        reportBtn.disabled = true;
                        showLoading("report-result");
                        setTimeout(function() {
                            try {
                                reportBtn.disabled = false;
                                var matchedKey = null;
                                for (var key in REPORT_RULES) {
                                    if (REPORT_RULES.hasOwnProperty(key) && input.indexOf(key) !== -1) {
                                        matchedKey = key;
                                        break;
                                    }
                                }
                                if (!matchedKey) {
                                    showError("report-result", "抱歉，暂时没有这个指标的解读信息。请输入：血糖、血压、胆固醇 或 尿酸。");
                                    return;
                                }
                                var rule = REPORT_RULES[matchedKey];
                                var unit = rule.unit;
                                var num1 = null;
                                var num2 = null;
                                if (matchedKey === "血压") {
                                    var bpMatch = input.match(/(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)/);
                                    if (bpMatch) {
                                        num1 = parseFloat(bpMatch[1]);
                                        num2 = parseFloat(bpMatch[2]);
                                    } else {
                                        var nums = input.match(/\d+(?:\.\d+)?/g);
                                        if (nums && nums.length >= 2) {
                                            num1 = parseFloat(nums[0]);
                                            num2 = parseFloat(nums[1]);
                                        } else if (nums && nums.length === 1) {
                                            num1 = parseFloat(nums[0]);
                                        }
                                    }
                                } else {
                                    var numMatch = input.match(/\d+(?:\.\d+)?/);
                                    if (numMatch) num1 = parseFloat(numMatch[0]);
                                }
                                if (num1 === null || isNaN(num1)) {
                                    showError("report-result", "没有找到数值，请在指标后面写上具体数字，例如：血糖 7.5");
                                    return;
                                }
                                var matchedLevel = null;
                                if (matchedKey === "血压") {
                                    for (var i = 0; i < rule.levels.length; i++) {
                                        var lv = rule.levels[i];
                                        var sysOk = num1 <= lv.maxSystolic;
                                        var diaOk = (num2 === null || num2 <= lv.maxDiastolic);
                                        if (sysOk && diaOk) {
                                            matchedLevel = lv;
                                            break;
                                        }
                                    }
                                    if (!matchedLevel) matchedLevel = rule.levels[rule.levels.length - 1];
                                } else {
                                    for (var j = 0; j < rule.levels.length; j++) {
                                        if (num1 <= rule.levels[j].max) {
                                            matchedLevel = rule.levels[j];
                                            break;
                                        }
                                    }
                                    if (!matchedLevel) matchedLevel = rule.levels[rule.levels.length - 1];
                                }
                                var valueText = "";
                                if (matchedKey === "血压" && num2 !== null && !isNaN(num2)) {
                                    valueText = num1 + "/" + num2 + " " + unit;
                                } else {
                                    valueText = num1 + " " + unit;
                                }
                                var referenceText = "";
                                if (matchedKey === "血糖") {
                                    referenceText = "空腹血糖正常参考范围：3.9 - 6.1 mmol/L";
                                } else if (matchedKey === "血压") {
                                    referenceText = "正常血压参考范围：收缩压 < 120 mmHg，舒张压 < 80 mmHg";
                                } else if (matchedKey === "胆固醇") {
                                    referenceText = "总胆固醇正常参考范围：< 5.2 mmol/L";
                                } else if (matchedKey === "尿酸") {
                                    referenceText = "尿酸正常参考范围：男性 208-428 μmol/L，女性 155-357 μmol/L（不同医院参考值略有差异，以报告单为准）";
                                }
                                var resultHtml = '<div class="card" style="margin-bottom:0;">' +
                                    '<div class="section-title">📊 您的检查指标：</div>' +
                                    '<div style="font-size:22px;font-weight:700;margin:12px 0;">' + matchedKey + '：' + valueText + '</div>' +
                                    '<span class="tag tag-' + matchedLevel.color + '">' + matchedLevel.label + '</span>' +
                                    '<div class="section-title" style="margin-top:20px;">🩺 医生建议：</div>' +
                                    '<div class="note-box" style="font-size:19px;">' + matchedLevel.advice + '</div>' +
                                    '<div class="section-title" style="margin-top:20px;">📖 参考范围：</div>' +
                                    '<div class="tip-box">' + referenceText + '</div>' +
                                    '<div class="tip-box" style="background:#fef3c7;">💝 温馨提示：以上解读仅供参考，具体诊断和治疗请以医生判断为准。如果指标异常，建议尽快到相应科室就诊。</div>' +
                                    '</div>';
                                showResult("report-result", resultHtml);
                            } catch (e) {
                                console.error("report setTimeout error:", e);
                                showError("report-result", "解读时出现问题，请您再试一次。");
                                reportBtn.disabled = false;
                            }
                        }, 800);
                    } catch (e) {
                        console.error("report btn error:", e);
                        reportBtn.disabled = false;
                    }
                });
            }

            // medicine button
            if (medicineBtn) {
                bindTap(medicineBtn, function() {
                    try {
                        var input = (medicineInput.value || "").trim();
                        if (!input) {
                            showError("medicine-result", "请选择或输入药品名称。");
                            return;
                        }
                        medicineBtn.disabled = true;
                        showLoading("medicine-result");
                        setTimeout(function() {
                            try {
                                medicineBtn.disabled = false;
                                var matchedKey = null;
                                for (var key in MEDICINE_DATA) {
                                    if (MEDICINE_DATA.hasOwnProperty(key) && input.indexOf(key) !== -1) {
                                        matchedKey = key;
                                        break;
                                    }
                                }
                                var data = matchedKey ? MEDICINE_DATA[matchedKey] : MEDICINE_DEFAULT;
                                var titleName = matchedKey || input;
                                var resultHtml = '<div class="card" style="margin-bottom:0;">' +
                                    '<div class="section-title">💊 ' + titleName + '</div>' +
                                    '<div class="section-title" style="font-size:20px;">🎯 这个药是做什么的：</div>' +
                                    '<div class="note-box">' + data.purpose + '</div>' +
                                    '<div class="section-title" style="font-size:20px;">💊 怎么吃：</div>' +
                                    '<div class="note-box">' + data.usage + '</div>' +
                                    '<div class="section-title" style="font-size:20px;">🕐 什么时候吃：</div>' +
                                    '<div class="note-box">' + data.when + '</div>' +
                                    '<div class="section-title" style="font-size:20px;">⚠️ 要注意什么：</div>' +
                                    '<div class="tip-box">' + data.caution + '</div>' +
                                    '<div class="section-title" style="font-size:20px;">📦 怎么保存：</div>' +
                                    '<div class="note-box">' + data.storage + '</div>' +
                                    '<div class="section-title" style="font-size:20px;">💡 小提示：</div>' +
                                    '<div class="tip-box">' + data.tip + '</div>' +
                                    '<div class="tip-box" style="background:#fee2e2;">💝 温馨提示：以上说明仅供参考，具体用药请遵医嘱。不要自己随便加减药量或停药。如果服药期间有任何不适，请及时告诉医生。</div>' +
                                    '</div>';
                                showResult("medicine-result", resultHtml);
                            } catch (e) {
                                console.error("medicine setTimeout error:", e);
                                showError("medicine-result", "解读时出现问题，请您再试一次。");
                                medicineBtn.disabled = false;
                            }
                        }, 800);
                    } catch (e) {
                        console.error("medicine btn error:", e);
                        medicineBtn.disabled = false;
                    }
                });
            }

            // checklist button
            var checklistDept = document.getElementById("checklist-dept");
            var checklistNote = document.getElementById("checklist-note");
            var checklistBtn = document.getElementById("checklist-btn");
            if (checklistBtn) {
                bindTap(checklistBtn, function() {
                    try {
                        var dept = (checklistDept.value || "").trim();
                        if (!dept) {
                            showError("checklist-result", "请选择您要去的科室。");
                            return;
                        }
                        checklistBtn.disabled = true;
                        showLoading("checklist-result");
                        var note = (checklistNote.value || "").trim();
                        setTimeout(function() {
                            try {
                                checklistBtn.disabled = false;
                                var data = CHECKLIST_DATA[dept] || CHECKLIST_DATA["全科"];
                                var essentialHtml = "";
                                for (var i = 0; i < data.essential.length; i++) {
                                    essentialHtml = essentialHtml + '<label><input type="checkbox"><span>' + data.essential[i] + '</span></label>';
                                }
                                var specialHtml = "";
                                for (var j = 0; j < data.special.length; j++) {
                                    specialHtml = specialHtml + '<label><input type="checkbox"><span>' + data.special[j] + '</span></label>';
                                }
                                var tipsHtml = "";
                                for (var k = 0; k < data.tips.length; k++) {
                                    tipsHtml = tipsHtml + '<li>• ' + data.tips[k] + '</li>';
                                }
                                var noteHtml = "";
                                if (note) {
                                    noteHtml = '<div class="section-title" style="margin-top:20px;">📝 您想告诉医生的话：</div><div class="note-box" style="font-size:19px;">' + note + '</div>';
                                }
                                var resultHtml = '<div class="card" style="margin-bottom:0;">' +
                                    '<div class="section-title">📋 您的 ' + dept + ' 就医清单</div>' +
                                    '<div class="section-title" style="font-size:20px;">✅ 一定要带的东西：</div>' +
                                    '<div class="check-list">' + essentialHtml + '</div>' +
                                    '<div class="section-title" style="font-size:20px;">💬 要告诉医生的事：</div>' +
                                    '<div class="check-list">' + specialHtml + '</div>' +
                                    noteHtml +
                                    '<div class="section-title" style="font-size:20px;">💡 温馨小贴士：</div>' +
                                    '<ul class="info-list">' + tipsHtml + '</ul>' +
                                    '<div class="tip-box">💝 打印或截图保存这份清单，看病前逐一打勾，准备好一样勾一样，就不会落下啦。</div>' +
                                    '</div>';
                                showResult("checklist-result", resultHtml);
                            } catch (e) {
                                console.error("checklist setTimeout error:", e);
                                showError("checklist-result", "生成时出现问题，请您再试一次。");
                                checklistBtn.disabled = false;
                            }
                        }, 800);
                    } catch (e) {
                        console.error("checklist btn error:", e);
                        checklistBtn.disabled = false;
                    }
                });
            }

        } catch (e) {
            console.error("initApp error:", e);
            try {
                var bodyEl = document.querySelector(".container");
                if (bodyEl) {
                    var errDiv = document.createElement("div");
                    errDiv.className = "card";
                    errDiv.innerHTML = '<div class="error-box">⚠️ 页面初始化出现问题，请刷新页面重试。</div>';
                    bodyEl.insertBefore(errDiv, bodyEl.firstChild);
                }
            } catch (fe) {}
        }
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initApp);
    } else {
        initApp();
    }

})();
</script>
</body>
