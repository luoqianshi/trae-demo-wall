<body>
    <div id="app"></div>
    <script>
    // 学习内容数据
    const CourseContent = {
        1: {
            title: '论语', author: '孔子', dyn: '春秋',
            chapters: [
                { title: '学而第一', original: '子曰："学而时习之，不亦说乎？有朋自远方来，不亦乐乎？人不知而不愠，不亦君子乎？"',
                  translation: '孔子说："学习并且按时复习，不是很愉快吗？有志同道合的朋友从远方来，不是很快乐吗？别人不了解我，我却不抱怨，不也是君子吗？"',
                  note: '"时习"指按时温习；"说"通"悦"，愉悦之意；"愠"指恼怒。本章讲述了学习的乐趣与君子的胸怀。',
                  question: '思考：为什么孔子把"有朋自远方来"看作人生乐事？这反映了什么思想？' },
                { title: '为政第二', original: '子曰："为政以德，譬如北辰，居其所而众星共之。"',
                  translation: '孔子说："以道德教化来治理政事，就像北极星一样，处在自己的位置上，群星都环绕着它。"',
                  note: '"北辰"即北极星；"共"通"拱"，环绕之意。本章强调以德治国的政治理念。',
                  question: '思考："为政以德"与"以法治国"各有什么利弊？请举例说明。' },
                { title: '八佾第三', original: '子曰："人而不仁，如礼何？人而不仁，如乐何？"',
                  translation: '孔子说："一个人如果没有仁德，他怎么能行礼呢？一个人如果没有仁德，他怎么能奏乐呢？"',

    function getCourseContent(course) {
        if (CourseContent[course.id]) return CourseContent[course.id];
        const chapters = [];
        const count = course.chapters || 5;
        for (let i = 1; i <= count; i++) {
            chapters.push({
                title: `第${i}章 ${course.title}选读`,
                original: `《${course.title}》第${i}章原文。\n\n本书为用户自定义添加的内容，您可以在此编辑完善学习资料。`,
                translation: `本章为《${course.title}》的第${i}章内容。在真实学习中，此处应展示古籍原文及现代汉语译文。`,
                note: '提示：用户可在管理后台为该课程添加更详细的学习内容。',
                question: `请思考：《${course.title}》的核心思想是什么？`
            });
        }
        return { title: course.title, author: '佚名', dyn: '古代', chapters };
    }

        loadStoredData() {
            try {
                const stored = localStorage.getItem('gujitong-data');
                if (stored) {
                    const data = JSON.parse(stored);
                    if (data.courses && data.courses.length > 0) {
                        this.state.allCourses = data.courses;
                        this.state.courses = [...data.courses];
                    }
                    if (data.bookmarks) this.state.bookmarks = data.bookmarks;
                    if (data.notes) this.state.notes = data.notes;
                }
            } catch (e) { console.warn('Failed to load stored data', e); }
        },

            try {
                localStorage.setItem('gujitong-data', JSON.stringify({
                    courses: this.state.allCourses,
                    bookmarks: this.state.bookmarks,
                    notes: this.state.notes
                }));
            } catch (e) { console.warn('Failed to save data', e); }

        initFabDrag() {
            const fab = document.getElementById('fabBtn');
            if (!fab) return;
            const app = document.getElementById('app');
            const stored = localStorage.getItem('gujitong-fab-pos');
            if (stored) {
                const pos = JSON.parse(stored);
                fab.style.right = 'auto';
                fab.style.left = pos.x + 'px';
                fab.style.top = pos.y + 'px';
                fab.style.bottom = 'auto';
            }
            let isDragging = false;
            let startX, startY, startLeft, startTop;
            let hasMoved = false;
            const onStart = (clientX, clientY) => {
                isDragging = true;
                hasMoved = false;
                const rect = fab.getBoundingClientRect();
                const appRect = app.getBoundingClientRect();
                startX = clientX;
                startY = clientY;
                startLeft = rect.left - appRect.left;
                startTop = rect.top - appRect.top;
                fab.style.right = 'auto';
                fab.style.bottom = 'auto';
                fab.style.zIndex = '200';
                fab.style.transition = 'transform 0.1s';
                fab.style.transform = 'scale(1.1)';
            };
            const onMove = (clientX, clientY) => {
                if (!isDragging) return;
                const dx = clientX - startX;
                const dy = clientY - startY;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
                const appRect = app.getBoundingClientRect();
                let newLeft = startLeft + dx;
                let newTop = startTop + dy;
                const btnW = fab.offsetWidth;
                const btnH = fab.offsetHeight;
                newLeft = Math.max(8, Math.min(newLeft, appRect.width - btnW - 8));
                newTop = Math.max(60, Math.min(newTop, appRect.height - btnH - 80));
                fab.style.left = newLeft + 'px';
                fab.style.top = newTop + 'px';
            };
            const onEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                fab.style.transform = '';
                fab.style.zIndex = '';
                fab.style.transition = '';
                if (hasMoved) {
                    const appRect = app.getBoundingClientRect();
                    const rect = fab.getBoundingClientRect();
                    localStorage.setItem('gujitong-fab-pos', JSON.stringify({
                        x: rect.left - appRect.left,
                        y: rect.top - appRect.top
                    }));
                } else {
                    this.openAddModal();
                }
            };
            fab.addEventListener('mousedown', (e) => {
                e.preventDefault();
                onStart(e.clientX, e.clientY);
            });
            document.addEventListener('mousemove', (e) => {
                onMove(e.clientX, e.clientY);
            });
            document.addEventListener('mouseup', onEnd);
            fab.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                onStart(t.clientX, t.clientY);
            }, { passive: true });
            fab.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                onMove(t.clientX, t.clientY);
            }, { passive: true });
            fab.addEventListener('touchend', onEnd);
        },

        renderProgressTab() {
            if (this.state.courses.length === 0) {

            }
            return `
                <div style="margin-top:12px;">

                        const content = getCourseContent(course);
                        const totalCh = content.chapters.length;
                        const completed = content.chapters.filter((_, i) => this.state.notes[`${course.id}-${i}`]?.completed).length;
                        const percent = totalCh > 0 ? Math.round(completed / totalCh * 100) : 0;
                        course.progress = percent;
                        return `
                            <div style="background:white;margin:0 16px 10px;border-radius:12px;padding:14px;" onclick="App.showCourseDetail(${course.id})">
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">

                                </div>
                                <div style="font-size:11px;color:#999;margin-top:6px;">共 ${totalCh} 章 · 已学 ${completed} 章</div>
                            </div>

            `;
        },

                                <div class="history-time">${h.time}</div>

            if (this.state.showRegisterModal) html += this.renderRegisterModal();
            if (this.state.showPostModal) html += this.renderPostModal();
            if (this.state.toolModal) html += this.renderToolModal();
            return html;

            return `

        renderCourseDetailModal() {
            const course = this.state.detailCourse;
            if (!course) return '';
            const levelMap = { beginner: '入门', intermediate: '进阶', advanced: '高级' };
            const content = getCourseContent(course);
            const chapters = content.chapters;
            const done = chapters.filter((_, i) => this.state.notes[`${course.id}-${i}`]?.completed).length;
            const percent = chapters.length > 0 ? Math.round(done / chapters.length * 100) : 0;
            return `
                <div class="modal-mask" style="align-items:flex-end;background:rgba(0,0,0,0.3);padding:0;" onclick="App.closeCourseDetail()">
                    <div class="detail-modal" onclick="event.stopPropagation()">

                        <div style="height:120px;background:linear-gradient(135deg,#2c3e50,#34495e);display:flex;align-items:center;justify-content:center;">

                        </div>
                        <div style="padding:16px 20px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                                <h2 style="font-size:20px;font-weight:700;margin:0;">${course.title}</h2>
                                <span class="course-level level-${course.level}" style="font-size:12px;padding:3px 10px;border-radius:10px;">${levelMap[course.level]}</span>
                            </div>
                            <p style="font-size:13px;color:#666;margin:0 0 8px 0;line-height:1.6;">${course.description}</p>
                            <div style="font-size:12px;color:#999;margin-bottom:12px;">📜 ${content.author} · ${content.dyn}</div>
                            <div style="display:flex;gap:20px;font-size:12px;color:#999;margin-bottom:14px;">
                                <span>📖 ${chapters.length} 章节</span>
                                <span>✅ ${done} 已完成</span>
                            </div>
                            <div class="progress-bar" style="height:6px;margin-bottom:4px;">
                                <div class="progress-fill" style="width:${percent}%"></div>
                            </div>
                            <div style="font-size:11px;color:#999;text-align:right;margin-bottom:16px;">${percent}%</div>
                            <div style="font-size:15px;font-weight:700;margin-bottom:10px;">课程章节</div>
                            <div style="max-height:240px;overflow-y:auto;">
                                ${chapters.map((ch, i) => {
                                    const isDone = this.state.notes[`${course.id}-${i}`]?.completed;
                                    const isBookmarked = this.state.bookmarks.some(b => b.courseId === course.id && b.chapterIdx === i);
                                    return `
                                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f5f5f5;cursor:pointer;" onclick="App.startLearning(${course.id}, ${i})">
                                        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
                                            <div style="width:28px;height:28px;border-radius:50%;background:${isDone ? '#c0392b' : '#eee'};color:${isDone ? 'white' : '#999'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;">${isDone ? '✓' : (i + 1)}</div>
                                            <div style="min-width:0;flex:1;">
                                                <div style="font-size:13px;color:#333;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ch.title}</div>
                                            </div>
                                        </div>
                                        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
                                            ${isBookmarked ? '<span style="color:#c0392b;">★</span>' : ''}
                                            <span style="font-size:12px;color:${isDone ? '#16a34a' : '#ccc'};">${isDone ? '已完成' : '未学习'}</span>
                                        </div>
                                    </div>
                                `}).join('')}
                            </div>
                            <button class="primary-btn" style="margin-top:16px;" onclick="App.startLearning(${course.id}, 0)">${done > 0 ? '继续学习' : '开始学习'}</button>
                        </div>
                    </div>
                </div>
            `;
        },

                content = `

                        ${this.state.ocrResult ? `
                            <div style="background:#f9f7f2;border-radius:10px;padding:14px;text-align:left;">
                                <div style="font-size:13px;font-weight:600;margin-bottom:8px;">📝 识别结果</div>
                                <div style="font-size:14px;color:#333;line-height:1.7;">${this.state.ocrResult}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            } else if (tool === 'translate') {
                content = `
                    <div>
                        <textarea id="translate-input" class="form-textarea" rows="4" placeholder="请输入文言文..."></textarea>
                        <button class="primary-btn" style="margin-top:14px;" onclick="App.handleTranslate()">翻译</button>
                        ${this.state.translateResult ? `
                            <div style="background:#f9f7f2;border-radius:10px;padding:14px;margin-top:14px;">
                                <div style="font-size:13px;font-weight:600;margin-bottom:8px;">✨ 翻译结果</div>
                                <div style="font-size:14px;color:#333;line-height:1.7;">${this.state.translateResult}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            } else if (tool === 'allusion') {
                content = `
                    <div>
                        <input type="text" id="allusion-input" class="form-input" placeholder="请输入典故名称，如：三顾茅庐">
                        <button class="primary-btn" style="margin-top:14px;" onclick="App.handleAllusion()">搜索典故</button>
                        ${this.state.allusionResult ? `
                            <div style="background:#f9f7f2;border-radius:10px;padding:14px;margin-top:14px;">
                                <div style="font-size:15px;font-weight:700;margin-bottom:6px;">${this.state.allusionResult.title}</div>
                                <div style="font-size:12px;color:#c0392b;margin-bottom:8px;">出处：${this.state.allusionResult.source}</div>
                                <div style="font-size:13px;color:#555;line-height:1.6;">${this.state.allusionResult.description}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            } else if (tool === 'memory') {
                const cards = this.state.memoryCards.slice(this.state.memoryCardIndex * 4, this.state.memoryCardIndex * 4 + 4);
                const totalSets = Math.ceil(this.state.memoryCards.length / 4);
                content = `
                    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
                        ${cards.map((card, idx) => `
                            <div class="memory-card-flip" onclick="App.flipCard(${this.state.memoryCardIndex * 4 + idx})">
                                <div class="memory-card-inner ${card.flipped ? 'flipped' : ''}">
                                    <div class="memory-card-front"><span style="font-size:13px;font-weight:600;">${card.front}</span></div>
                                    <div class="memory-card-back"><span style="font-size:13px;font-weight:600;">${card.back}</span></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div style="text-align:center;margin-top:16px;">
                        <button class="secondary-btn" style="width:auto;padding:0 24px;height:36px;font-size:13px;display:inline-flex;" onclick="App.nextMemorySet()">下一组 →</button>
                    </div>
                    <div style="text-align:center;font-size:12px;color:#999;margin-top:8px;">点击卡片翻转 · 第 ${this.state.memoryCardIndex + 1} / ${totalSets} 组</div>
                `;
            }
            const titleMap = { ocr: '拍照识字', translate: '文言翻译', allusion: '典故讲解', memory: '古籍记忆' };
            return `
                <div class="modal-mask" onclick="App.closeToolModal()">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                            <h3 style="font-size:18px;font-weight:700;margin:0;">${titleMap[tool]}</h3>
                            <span style="font-size:20px;color:#999;cursor:pointer;" onclick="App.closeToolModal()">✕</span>
                        </div>
                        ${content}
                    </div>
                </div>
            `;
        },

        // === 交互方法 ===
        switchTab(tab) {
            this.state.currentTab = tab;
            this.state.showAddModal = false;
            this.state.detailCourse = null;
            this.state.showLoginModal = false;
            this.state.showRegisterModal = false;
            this.state.showPostModal = false;
            this.state.toolModal = null;
            if (tab !== 'courses') {
                this.state.searchKeyword = '';
                this.state.activeLevel = 'all';
            }
            this.render();
        },

        handleSearch(keyword) {
            this.state.searchKeyword = keyword;
            this.render();
            const input = document.getElementById('course-search');
            if (input) {
                input.focus();
                input.setSelectionRange(keyword.length, keyword.length);
            }
        },

        filterByLevel(level) {
            this.state.activeLevel = level;
            this.render();
        },

        openAddModal() { this.state.showAddModal = true; this.render(); },
        closeAddModal() { this.state.showAddModal = false; this.render(); },

        addCourse() {
            const title = document.getElementById('add-title').value.trim();
            const level = document.getElementById('add-level').value;
            const desc = document.getElementById('add-desc').value.trim();
            if (!title) {
                this.showToast('请输入古籍名称');
                return;
            }
            const newCourse = {
                id: Date.now(),
                title,
                level,
                progress: 0,
                description: desc || '自定义添加的古籍',
                cover: '',
                isCustom: true
            };
            this.state.allCourses.unshift(newCourse);
            this.state.courses = [...this.state.allCourses];
            this.state.showAddModal = false;
            this.saveStoredData();
            this.showToast('添加成功！');
            this.render();
        },

        showCourseDetail(id) {
            const course = this.state.allCourses.find(c => c.id === id);
            if (course) {
                this.state.detailCourse = course;
                this.render();
            }
        },
        closeCourseDetail() { this.state.detailCourse = null; this.render(); },

        startLearning(courseId, chapterIdx = 0) {
            const course = this.state.allCourses.find(c => c.id === courseId);
            if (!course) return;
            this.state.learningCourse = course;
            this.state.learningChapterIdx = chapterIdx;
            this.state.chapterContentTab = 'content';
            this.state.detailCourse = null;
            this.render();
        },

        exitLearning() {
            this.saveCurrentNote();
            this.state.learningCourse = null;
            this.state.learningChapterIdx = 0;
            this.render();
        },

        setChapterTab(tab) {
            if (this.state.chapterContentTab === 'question') {
                this.saveCurrentNote();
            }
            this.state.chapterContentTab = tab;
            this.render();
        },

        saveCurrentNote() {
            if (!this.state.learningCourse) return;
            const input = document.getElementById('chapter-note-input');
            if (input) {
                const key = `${this.state.learningCourse.id}-${this.state.learningChapterIdx}`;
                const existing = this.state.notes[key] || {};
                this.state.notes[key] = { ...existing, text: input.value };
                this.saveStoredData();
            }
        },

        prevChapter() {
            this.saveCurrentNote();
            if (this.state.learningChapterIdx > 0) {
                this.state.learningChapterIdx--;
                this.render();
            }
        },

        nextChapter() {
            this.saveCurrentNote();
            const course = this.state.learningCourse;
            const content = getCourseContent(course);
            if (this.state.learningChapterIdx < content.chapters.length - 1) {
                this.state.learningChapterIdx++;
                this.render();
            }
        },

        completeChapter() {
            const course = this.state.learningCourse;
            const key = `${course.id}-${this.state.learningChapterIdx}`;
            const existing = this.state.notes[key] || {};
            this.state.notes[key] = { ...existing, completed: true, completedAt: new Date().toISOString() };
            course.progress = this.calculateCourseProgress(course);
            this.state.currentUser.points += 5;
            this.saveStoredData();
            this.showToast('已完成本章 +5积分');
            this.render();
        },

        calculateCourseProgress(course) {
            const content = getCourseContent(course);
            const completed = content.chapters.filter((_, i) => this.state.notes[`${course.id}-${i}`]?.completed).length;
            return content.chapters.length > 0 ? Math.round(completed / content.chapters.length * 100) : 0;
        },

        toggleBookmark() {
            const course = this.state.learningCourse;
            const idx = this.state.learningChapterIdx;
            const content = getCourseContent(course);
            const chapter = content.chapters[idx];
            const existingIdx = this.state.bookmarks.findIndex(b => b.courseId === course.id && b.chapterIdx === idx);
            if (existingIdx >= 0) {
                this.state.bookmarks.splice(existingIdx, 1);
                this.showToast('已取消收藏');
            } else {
                this.state.bookmarks.unshift({
                    id: Date.now(),
                    courseId: course.id,
                    chapterIdx: idx,
                    courseTitle: course.title,
                    chapterTitle: chapter.title,
                    time: new Date().toLocaleString('zh-CN')
                });
                this.showToast('已收藏');
            }
            this.saveStoredData();
            this.render();
        },

        openBookmark(courseId, chapterIdx) {
            this.startLearning(courseId, chapterIdx);
        },

        showPostModal() {
            this.state.showPostModal = true;
            this.render();
        },
        closePostModal() { this.state.showPostModal = false; this.render(); },

        showLoginModal() { this.state.showLoginModal = true; this.render(); },
        closeLoginModal() { this.state.showLoginModal = false; this.render(); },
        showRegisterModal() { this.state.showRegisterModal = true; this.render(); },
        closeRegisterModal() { this.state.showRegisterModal = false; this.render(); },

        login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if (email && password) {
                const name = email.split('@')[0];
                this.loginRealUser({ name, email, level: 1, points: 100, joinedAt: new Date().toLocaleDateString('zh-CN') });
                this.state.showLoginModal = false;
                this.showToast('登录成功！');
                this.render();
            } else {
                this.showToast('请填写完整信息');
            }
        },

        register() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            if (name && email && password) {
                if (password.length < 6) {
                    this.showToast('密码至少6位');
                    return;
                }
                this.loginRealUser({ name, email, level: 1, points: 0, joinedAt: new Date().toLocaleDateString('zh-CN') });
                this.state.showRegisterModal = false;
                this.showToast('注册成功，欢迎加入！');
                this.render();
            } else {
                this.showToast('请填写完整信息');
            }
        },

        logout() {
            this.createGuestUser();
            this.showToast('已退出登录');
            this.render();
        },

        createPost() {
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();
            if (title && content) {
                this.state.posts.unshift({
                    id: Date.now(),
                    author: this.state.currentUser.name,
                    avatar: this.state.currentUser.avatar || '👤',
                    content: `${title}\n${content}`,
                    likes: 0,
                    comments: 0,
                    time: '刚刚'
                });
                this.state.showPostModal = false;
                this.showToast('发布成功！');
                this.render();
            } else {
                this.showToast('请填写完整信息');
            }
        },

        likePost(id) {
            const post = this.state.posts.find(p => p.id === id);
            if (post) {
                post.likes++;
                this.render();
            }
        },

        openTool(tool) {
            this.state.toolModal = tool;
            this.state.ocrResult = null;
            this.state.translateResult = null;
            this.state.allusionResult = null;
            this.render();
        },
        closeToolModal() { this.state.toolModal = null; this.render(); },

        handleOcr(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    this.state.ocrResult = '学而时习之，不亦说乎？有朋自远方来，不亦乐乎？人不知而不愠，不亦君子乎？';
                    this.addSearchHistory('ocr', '古籍图片识别');
                    this.showToast('识别完成');
                    this.render();
                };
                reader.readAsDataURL(file);
            }
        },

        handleTranslate() {
            const input = document.getElementById('translate-input').value.trim();
            if (input) {
                this.state.translateResult = '学习并且按时复习，不是很愉快吗？有志同道合的朋友从远方来，不是很快乐吗？人家不了解我，我却不怨恨，不也是君子吗？';
                this.addSearchHistory('translate', input.substring(0, 15));
                this.showToast('翻译完成');
                this.render();
            } else {
                this.showToast('请输入文言文');
            }
        },

        handleAllusion() {
            const input = document.getElementById('allusion-input').value.trim();
            if (input) {
                this.state.allusionResult = {
                    title: '三顾茅庐',
                    source: '《三国志·诸葛亮传》',
                    description: '比喻真心诚意，一再邀请。刘备三次到隆中请诸葛亮出山辅佐自己，最终感动诸葛亮，成为一段佳话。这个典故体现了求贤若渴的诚意和对人才的尊重。'
                };
                this.addSearchHistory('allusion', input);
                this.showToast('查询完成');
                this.render();
            } else {
                this.showToast('请输入典故名称');
            }
        },

        flipCard(index) {
            const card = this.state.memoryCards[index];
            if (card) {
                card.flipped = !card.flipped;
                this.render();
            }
        },

        nextMemorySet() {
            const totalSets = Math.ceil(this.state.memoryCards.length / 4);
            this.state.memoryCardIndex = (this.state.memoryCardIndex + 1) % totalSets;
            this.render();
        },

        setProfileTab(tab) {
            this.state.profileTab = tab;
            this.render();
        },

        addSearchHistory(type, keyword) {
            const exists = this.state.searchHistory.some(h => h.keyword === keyword && h.type === type);
            if (!exists) {
                this.state.searchHistory.unshift({
                    id: Date.now(),
                    type,
                    keyword,
                    time: '刚刚'
                });
                if (this.state.searchHistory.length > 20) {
                    this.state.searchHistory = this.state.searchHistory.slice(0, 20);
                }
            }
        },

        clearHistory() {
            this.state.searchHistory = [];
            this.showToast('已清空历史');
            this.render();
        },

        showAbout() {
            this.showToast('古籍通 v1.0 · 让古籍智慧触手可及');
        },

        showFeedback() {
            this.showToast('感谢您的反馈！请发送邮件至 feedback@gujitong.com');
        },
    };

    App.init();
    </script>
</body>
</html>
