<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智造通 —— 火星基地 第一人称沉浸式HUD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
:root{--m1:#ff6b35;--m2:#c1440e;--m3:#8b3a1a;--hud:#00ffcc;--hud2:#00d4ff;--hud3:#5eff7e;--hud4:#ff3366;--hudw:#ffaa00;--bg:#000;--panel:rgba(0,255,204,.04);--pb:rgba(0,255,204,.15);--pg:0 0 15px rgba(0,255,204,.2);--tf:'Rajdhani',sans-serif;--th:'Orbitron',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--tf);color:#e0f0ee;cursor:crosshair}
/* HELMET VISOR */
.visor{position:fixed;inset:0;pointer-events:none;z-index:1000}
.visor-frame{position:absolute;inset:0;border:3px solid rgba(0,255,204,.08);border-radius:30px;box-shadow:inset 0 0 80px rgba(0,255,204,.03),inset 0 0 200px rgba(0,0,0,.5)}
.visor-scanline{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,204,.008) 2px,rgba(0,255,204,.008) 4px);pointer-events:none;animation:scanmove 8s linear infinite}
@keyframes scanmove{0%{transform:translateY(0)}100%{transform:translateY(4px)}}
.visor-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.6) 100%)}
.visor-glare{position:absolute;top:-20%;right:-10%;width:60%;height:60%;background:radial-gradient(ellipse at center,rgba(0,255,204,.02) 0%,transparent 70%);transform:rotate(-15deg)}
.visor-corner{position:absolute;width:40px;height:40px;border-color:rgba(0,255,204,.2);border-style:solid}
.visor-corner.tl{top:12px;left:12px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}.visor-corner.tr{top:12px;right:12px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}.visor-corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}.visor-corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}
/* WARNING FLASH */
.visor-warn{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .3s}
.visor-warn.active{animation:warnFlash 1s infinite}
.visor-warn.danger{border:4px solid rgba(255,51,102,.4);box-shadow:inset 0 0 60px rgba(255,51,102,.15)}
.visor-warn.caution{border:4px solid rgba(255,170,0,.3);box-shadow:inset 0 0 60px rgba(255,170,0,.1)}
@keyframes warnFlash{0%,100%{opacity:0}50%{opacity:1}}
/* HUD LAYOUT */
.hud{position:fixed;inset:0;display:grid;grid-template-rows:48px 1fr 56px;grid-template-columns:260px 1fr 260px;gap:0;z-index:10;padding:8px}
/* TOP BAR */
.hud-top{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:linear-gradient(180deg,rgba(0,255,204,.04),transparent);border-bottom:1px solid rgba(0,255,204,.06)}
.hud-logo{font-family:var(--th);font-size:13px;font-weight:700;color:var(--hud);letter-spacing:3px;text-shadow:var(--pg)}
.hud-time{font-family:var(--th);font-size:11px;color:rgba(0,255,204,.5);letter-spacing:2px}
.hud-vitals{display:flex;gap:20px;align-items:center}
.vital{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--th)}
.vital .icon{font-size:13px}.vital .val{color:var(--hud);font-weight:700;min-width:50px}.vital .val.warn{color:var(--hudw)}.vital .val.danger{color:var(--hud4)}
.vital-bar{width:60px;height:3px;background:rgba(0,255,204,.1);border-radius:2px;overflow:hidden}
.vital-bar .fill{height:100%;border-radius:2px;transition:width .5s}
/* LEFT PANEL */
.hud-left{display:flex;flex-direction:column;gap:6px;overflow-y:auto;padding:6px 2px;scrollbar-width:none}
.hud-left::-webkit-scrollbar{display:none}
/* CENTER VIEWPORT */
.hud-center{position:relative;display:flex;flex-direction:column;overflow:hidden}
.viewport{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.viewport-scene{position:absolute;inset:0;overflow:hidden}
.viewport-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-family:var(--th);font-size:9px;color:rgba(0,255,204,.3);letter-spacing:4px;text-transform:uppercase}
/* RIGHT PANEL */
.hud-right{display:flex;flex-direction:column;gap:6px;overflow-y:auto;padding:6px 2px;scrollbar-width:none}
.hud-right::-webkit-scrollbar{display:none}
/* BOTTOM BAR */
.hud-bottom{grid-column:1/-1;display:flex;align-items:center;gap:6px;padding:0 8px;overflow-x:auto;scrollbar-width:none}
.hud-bottom::-webkit-scrollbar{display:none}
/* HUD PANELS */
.hpanel{background:var(--panel);border:1px solid var(--pb);border-radius:6px;padding:8px;position:relative;backdrop-filter:blur(4px);transition:all .3s}
.hpanel:hover{border-color:rgba(0,255,204,.25);box-shadow:var(--pg)}
.hpanel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--hud),transparent);opacity:.3}
.hpanel-title{font-family:var(--th);font-size:9px;color:var(--hud);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.hpanel-title .dot{width:5px;height:5px;border-radius:50%;background:var(--hud);box-shadow:0 0 6px var(--hud)}
.hpanel-title .dot.warn{background:var(--hudw);box-shadow:0 0 6px var(--hudw)}.hpanel-title .dot.danger{background:var(--hud4);box-shadow:0 0 6px var(--hud4)}
/* NAV BUTTONS */
.nav-btn{flex-shrink:0;padding:6px 14px;background:rgba(0,255,204,.04);border:1px solid rgba(0,255,204,.1);border-radius:4px;color:rgba(0,255,204,.6);font-family:var(--th);font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .25s;text-transform:uppercase;white-space:nowrap}
.nav-btn:hover{background:rgba(0,255,204,.08);border-color:rgba(0,255,204,.25);color:var(--hud);box-shadow:var(--pg)}
.nav-btn.active{background:rgba(0,255,204,.1);border-color:var(--hud);color:var(--hud);box-shadow:var(--pg)}
.nav-btn.alert{border-color:rgba(255,51,102,.3);color:var(--hud4);animation:navPulse 2s infinite}
@keyframes navPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px rgba(255,51,102,.2)}}
/* HOLOGRAPHIC TEXT */
.htext{font-size:10px;line-height:1.5;color:rgba(224,240,238,.7)}
.htext .label{color:rgba(0,255,204,.4);font-size:9px}.htext .value{color:var(--hud);font-weight:700;font-family:var(--th)}
.htext .value.warn{color:var(--hudw)}.htext .value.danger{color:var(--hud4)}
/* RING GAUGE */
.ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring svg{transform:rotate(-90deg)}.ring .ring-val{position:absolute;font-family:var(--th);font-size:11px;font-weight:700;color:var(--hud)}
/* ZONE STATUS */
.zones{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.zone{padding:5px 6px;background:rgba(0,255,204,.02);border:1px solid rgba(0,255,204,.06);border-radius:3px;cursor:pointer;transition:all .2s;font-size:9px}
.zone:hover{background:rgba(0,255,204,.06);border-color:rgba(0,255,204,.15)}
.zone .zname{color:rgba(0,255,204,.4);font-size:8px;letter-spacing:1px}.zone .zval{font-family:var(--th);font-weight:700;font-size:11px}
.zone.ok .zval{color:var(--hud3)}.zone.warn .zval{color:var(--hudw)}.zone.danger .zval{color:var(--hud4)}
.zone.danger{border-color:rgba(255,51,102,.2);animation:zoneFlash 1.5s infinite}
@keyframes zoneFlash{0%,100%{background:rgba(255,51,102,.02)}50%{background:rgba(255,51,102,.06)}}
/* AI ASSISTANT */
.ai-holo{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:90%;max-width:600px;z-index:100}
.ai-orb{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(0,255,204,.3),rgba(0,255,204,.05));border:1px solid rgba(0,255,204,.2);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(0,255,204,.15);cursor:pointer;transition:all .3s;margin:0 auto 8px}
.ai-orb:hover{box-shadow:0 0 30px rgba(0,255,204,.3);transform:scale(1.1)}
.ai-orb.listening{border-color:rgba(0,255,204,.5);box-shadow:0 0 30px rgba(0,255,204,.3);animation:orbPulse 1s infinite}
@keyframes orbPulse{0%,100%{transform:scale(1);box-shadow:0 0 20px rgba(0,255,204,.2)}50%{transform:scale(1.15);box-shadow:0 0 40px rgba(0,255,204,.4)}}
.ai-chat-box{background:rgba(0,10,8,.85);border:1px solid rgba(0,255,204,.1);border-radius:8px;backdrop-filter:blur(10px);overflow:hidden;max-height:0;opacity:0;transition:all .4s}
.ai-chat-box.open{max-height:300px;opacity:1}
.ai-msgs{max-height:180px;overflow-y:auto;padding:8px 10px;scrollbar-width:none}.ai-msgs::-webkit-scrollbar{display:none}
.ai-msg{margin-bottom:6px;font-size:10px;line-height:1.5;animation:msgIn .3s}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ai-msg.bot{color:var(--hud)}.ai-msg.user{color:rgba(255,170,0,.8);text-align:right}
.ai-input-row{display:flex;gap:4px;padding:6px;border-top:1px solid rgba(0,255,204,.06)}
.ai-input{flex:1;background:rgba(0,255,204,.04);border:1px solid rgba(0,255,204,.1);border-radius:4px;padding:4px 8px;color:var(--hud);font-family:var(--tf);font-size:10px;outline:none}
.ai-input:focus{border-color:rgba(0,255,204,.3)}
.ai-input::placeholder{color:rgba(0,255,204,.2)}
.ai-mic{width:28px;height:28px;border-radius:50%;background:rgba(0,255,204,.06);border:1px solid rgba(0,255,204,.1);color:var(--hud);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.ai-mic:hover{background:rgba(0,255,204,.12)}.ai-mic.listening{background:rgba(0,255,204,.15);border-color:rgba(0,255,204,.3);animation:orbPulse 1s infinite}
.ai-send{width:28px;height:28px;border-radius:50%;background:rgba(0,255,204,.08);border:1px solid rgba(0,255,204,.15);color:var(--hud);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s}
.ai-send:hover{background:rgba(0,255,204,.15)}
/* QUICK CMDS */
.ai-qcmds{display:flex;gap:4px;padding:4px 8px;flex-wrap:wrap}
.ai-qcmd{padding:3px 8px;background:rgba(0,255,204,.04);border:1px solid rgba(0,255,204,.08);border-radius:3px;font-size:8px;color:rgba(0,255,204,.5);cursor:pointer;transition:all .2s;letter-spacing:.5px;font-family:var(--th)}
.ai-qcmd:hover{background:rgba(0,255,204,.08);color:var(--hud);border-color:rgba(0,255,204,.2)}
.ai-qcmd.danger{border-color:rgba(255,51,102,.15);color:rgba(255,51,102,.5)}.ai-qcmd.danger:hover{background:rgba(255,51,102,.08);color:var(--hud4);border-color:rgba(255,51,102,.3)}
/* CENTER CONTENT */
.center-panel{position:absolute;inset:0;padding:10px;overflow-y:auto;scrollbar-width:none;display:none}.center-panel::-webkit-scrollbar{display:none}
.center-panel.active{display:block}
.cp-title{font-family:var(--th);font-size:14px;color:var(--hud);letter-spacing:3px;margin-bottom:10px;text-shadow:var(--pg)}
.cp-grid{display:grid;gap:8px}
.cp-grid.g2{grid-template-columns:1fr 1fr}.cp-grid.g3{grid-template-columns:1fr 1fr 1fr}.cp-grid.g4{grid-template-columns:repeat(4,1fr)}
.cp-card{background:rgba(0,255,204,.03);border:1px solid rgba(0,255,204,.08);border-radius:6px;padding:10px;position:relative}
.cp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,204,.2),transparent)}
.cp-label{font-size:8px;color:rgba(0,255,204,.4);letter-spacing:1px;font-family:var(--th);text-transform:uppercase;margin-bottom:4px}
.cp-value{font-family:var(--th);font-size:20px;font-weight:700;color:var(--hud)}.cp-value.warn{color:var(--hudw)}.cp-value.danger{color:var(--hud4)}
.cp-unit{font-size:9px;color:rgba(0,255,204,.3);margin-left:2px}
.cp-sub{font-size:9px;color:rgba(0,255,204,.4);margin-top:2px}
.cp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(0,255,204,.04);font-size:10px}
.cp-row:last-child{border-bottom:none}
.cp-row .rl{color:rgba(0,255,204,.35)}.cp-row .rv{font-family:var(--th);font-weight:600}
.cp-btn{padding:4px 10px;background:rgba(0,255,204,.06);border:1px solid rgba(0,255,204,.12);border-radius:3px;color:var(--hud);font-family:var(--th);font-size:8px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.cp-btn:hover{background:rgba(0,255,204,.12);box-shadow:0 0 8px rgba(0,255,204,.15)}
.cp-btn.danger{border-color:rgba(255,51,102,.2);color:var(--hud4)}.cp-btn.danger:hover{background:rgba(255,51,102,.08)}
.cp-table{width:100%;border-collapse:collapse;font-size:9px}
.cp-table th{text-align:left;padding:4px 6px;color:rgba(0,255,204,.35);font-weight:600;border-bottom:1px solid rgba(0,255,204,.08);font-family:var(--th);letter-spacing:1px}
.cp-table td{padding:4px 6px;border-bottom:1px solid rgba(0,255,204,.04)}
.cp-table tr:hover{background:rgba(0,255,204,.02)}
/* ALERT BANNER */
.alert-banner{padding:6px 12px;border-radius:4px;font-family:var(--th);font-size:10px;letter-spacing:1px;margin-bottom:6px;animation:alertPulse 2s infinite;cursor:pointer}
.alert-banner.critical{background:rgba(255,51,102,.08);border:1px solid rgba(255,51,102,.2);color:var(--hud4)}
.alert-banner.warning{background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.15);color:var(--hudw)}
.alert-banner.ok{background:rgba(94,255,126,.04);border:1px solid rgba(94,255,126,.1);color:var(--hud3)}
@keyframes alertPulse{0%,100%{opacity:.8}50%{opacity:1}}
/* BREATHING */
.breath{position:absolute;bottom:70px;right:16px;z-index:50;pointer-events:none}
.breath-ring{width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,255,204,.15);animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(.9);border-color:rgba(0,255,204,.1)}50%{transform:scale(1.1);border-color:rgba(0,255,204,.25)}}
.breath-label{font-family:var(--th);font-size:7px;color:rgba(0,255,204,.2);text-align:center;margin-top:2px;letter-spacing:2px}
/* TOAST */
.toast-box{position:fixed;top:60px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:6px}
.toast{padding:8px 14px;background:rgba(0,10,8,.9);border:1px solid rgba(0,255,204,.15);border-radius:4px;font-size:10px;color:var(--hud);backdrop-filter:blur(8px);animation:toastIn .3s;display:flex;align-items:center;gap:6px;font-family:var(--tf)}
.toast.critical{border-color:rgba(255,51,102,.3);color:var(--hud4)}.toast.warning{border-color:rgba(255,170,0,.3);color:var(--hudw)}.toast.success{border-color:rgba(94,255,126,.3);color:var(--hud3)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
/* CANVAS BG */
#marsbg,#dustc{position:fixed;inset:0;z-index:0;pointer-events:none}
#dustc{z-index:5}
/* RESPONSIVE */
@media(max-width:900px){.hud{grid-template-columns:1fr;grid-template-rows:40px 1fr 50px}.hud-left,.hud-right{display:none}.cp-grid.g3,.cp-grid.g4{grid-template-columns:1fr 1fr}}
</style>
</head><body>
<canvas id="marsbg"></canvas>
<canvas id="dustc"></canvas>
<div class="toast-box" id="toasts"></div>
<!-- VISOR -->
<div class="visor">
  <div class="visor-frame"></div>
  <div class="visor-scanline"></div>
  <div class="visor-vignette"></div>
  <div class="visor-glare"></div>
  <div class="visor-corner tl"></div><div class="visor-corner tr"></div><div class="visor-corner bl"></div><div class="visor-corner br"></div>
  <div class="visor-warn" id="visorWarn"></div>
</div>
<!-- BREATHING -->
<div class="breath"><div class="breath-ring"></div><div class="breath-label">BREATH</div></div>
<!-- HUD -->
<div class="hud">
  <!-- TOP -->
  <div class="hud-top">
    <div class="hud-logo">MARS COLONY</div>
    <div class="hud-time" id="hudTime">SOL 1247 | 14:32 MST</div>
    <div class="hud-vitals">
      <div class="vital"><span class="icon">🫁</span><span class="val" id="vO2">21.0%</span><div class="vital-bar"><div class="fill" id="vO2b" style="width:95%;background:var(--hud3)"></div></div></div>
      <div class="vital"><span class="icon">🌡️</span><span class="val" id="vTemp">-23°C</span></div>
      <div class="vital"><span class="icon">☢️</span><span class="val" id="vRad">0.12</span></div>
      <div class="vital"><span class="icon">⚡</span><span class="val" id="vPwr">43.5kW</span></div>
    </div>
  </div>
  <!-- LEFT -->
  <div class="hud-left" id="hudLeft">
    <div class="hpanel"><div class="hpanel-title"><span class="dot" id="gDot"></span>BASE STATUS</div><div id="leftStatus"></div></div>
    <div class="hpanel"><div class="hpanel-title"><span class="dot"></span>ZONES</div><div class="zones" id="leftZones"></div></div>
    <div class="hpanel"><div class="hpanel-title"><span class="dot"></span>EVENTS</div><div id="leftEvents" style="max-height:120px;overflow-y:auto;scrollbar-width:none"></div></div>
  </div>
  <!-- CENTER -->
  <div class="hud-center">
    <div class="viewport">
      <div class="viewport-scene" id="vpScene"></div>
      <div class="viewport-label" id="vpLabel">MARS BASE ALPHA — COMMAND CENTER</div>
      <div class="center-panel active" id="cp-ai"></div>
      <div class="center-panel" id="cp-prod"></div>
      <div class="center-panel" id="cp-env"></div>
      <div class="center-panel" id="cp-food"></div>
      <div class="center-panel" id="cp-water"></div>
      <div class="center-panel" id="cp-habitat"></div>
      <div class="center-panel" id="cp-power"></div>
      <div class="center-panel" id="cp-trans"></div>
      <div class="center-panel" id="cp-supply"></div>
      <div class="center-panel" id="cp-danger"></div>
      <div class="center-panel" id="cp-maint"></div>
      <div class="center-panel" id="cp-drill"></div>
      <div class="center-panel" id="cp-report"></div>
    </div>
    <!-- AI ASSISTANT -->
    <div class="ai-holo" id="aiHolo">
      <div class="ai-orb" id="aiOrb" title="AI助手">🤖</div>
      <div class="ai-chat-box" id="aiChatBox">
        <div class="ai-qcmds" id="aiQcmds"></div>
        <div class="ai-msgs" id="aiMsgs"></div>

          <input class="ai-input" id="aiInput" placeholder="输入指令...">
          <button class="ai-mic" id="aiMic" title="语音">🎤</button>
          <button class="ai-send" id="aiSend">▶</button>
        </div>
      </div>
    </div>
  </div>
  <!-- RIGHT -->
  <div class="hud-right" id="hudRight">
    <div class="hpanel"><div class="hpanel-title"><span class="dot"></span>ENVIRONMENT</div><div id="rightEnv"></div></div>
    <div class="hpanel"><div class="hpanel-title"><span class="dot"></span>RESOURCES</div><div id="rightRes"></div></div>
    <div class="hpanel"><div class="hpanel-title"><span class="dot"></span>ENERGY</div><div id="rightEnergy"></div></div>
  </div>
  <!-- BOTTOM NAV -->
  <div class="hud-bottom" id="hudNav"></div>
</div>
<script>
/* ===== MARS STATE ===== */
var MS={o2:21.0,co2:0.04,temp:-23,humidity:38,pressure:101.3,radiation:0.12,dustLevel:1,alertLevel:0,leakActive:false,dustStorm:false,repairStep:0,events:[],currentPage:'ai',chatOpen:false,listening:false};
