<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹弹珠 · 无尽幻境 | TRAE Work 创意作品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            aspect-ratio: 600 / 900;
            height: min(90vh, calc(100vw * 1.5));
            width: auto;
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(100, 255, 255, 0.3), 0 0 100px rgba(150, 100, 255, 0.2);
            display: block;
        }

        #ui-overlay {
            position: absolute;
            top: clamp(10px, 2vh, 25px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: clamp(10px, 2vw, 40px);
            z-index: 10;
            pointer-events: none;
        }

        .ui-panel {
            background: rgba(20, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: clamp(8px, 1vh, 15px) clamp(12px, 2vw, 30px);
            border-radius: 15px;
            border: 2px solid rgba(100, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(100, 255, 255, 0.2);
            min-width: clamp(70px, 10vw, 110px);
            text-align: center;
        }

        .ui-label {
            color: #888;
            font-size: clamp(10px, 1.2vh, 14px);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 3px;
        }

        .ui-value {
            color: #00ffff;
            font-size: clamp(18px, 3.5vh, 36px);
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff;
            line-height: 1;
        }

        .ui-value.lives {
            color: #ff6b6b;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .ui-value.high-score {
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
        }

        #level-panel {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
            padding: 20px;
            text-align: center;
        }

        #game-over-screen {
            display: none;
        }

        .screen-title {
            font-size: clamp(32px, 6vw, 80px);
            font-weight: bold;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00, #00ffff);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            margin-bottom: clamp(15px, 3vh, 35px);
            text-shadow: none;
        }

        .screen-subtitle {
            font-size: clamp(14px, 2vw, 28px);
            color: #aaa;
            margin-bottom: clamp(20px, 4vh, 50px);
        }

        .level-info {
            font-size: clamp(12px, 1.6vw, 22px);
            color: #ff00ff;
            margin-bottom: clamp(15px, 3vh, 30px);
            text-shadow: 0 0 8px #ff00ff;
        }

        .btn {
            padding: clamp(10px, 1.5vh, 18px) clamp(30px, 6vw, 70px);
            font-size: clamp(16px, 2.5vw, 28px);
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 100%);
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            -webkit-appearance: none;
            appearance: none;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        #controls-hint {
            position: absolute;
            bottom: clamp(10px, 2vh, 30px);
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: clamp(10px, 1.4vh, 16px);
            text-align: center;
            z-index: 10;
            line-height: 1.8;
            width: 90%;
            max-width: 600px;
        }

        #controls-hint span {
            color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 15px;
            margin: 0 3px;
            display: inline-block;
        }

        #mobile-controls {
            display: none;
            position: absolute;
            bottom: clamp(60px, 10vh, 120px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            gap: 40px;
            pointer-events: none;
        }

        .mobile-btn {
            width: clamp(60px, 12vw, 90px);
            height: clamp(60px, 12vw, 90px);
            border-radius: 50%;
            background: rgba(255, 255, 0, 0.15);
            border: 3px solid rgba(255, 255, 0, 0.6);
            color: #ffff00;
            font-size: clamp(14px, 2vw, 20px);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.3);
        }

        .mobile-btn:active {
            background: rgba(255, 255, 0, 0.4);
            transform: scale(0.95);
        }

        #launch-mobile {
            position: absolute;
            bottom: clamp(60px, 10vh, 120px);
            right: clamp(15px, 3vw, 40px);
            width: clamp(70px, 15vw, 110px);
            height: clamp(70px, 15vw, 110px);
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.15);
            border: 3px solid rgba(0, 255, 255, 0.6);
            color: #00ffff;
            font-size: clamp(12px, 1.8vw, 18px);
            font-weight: bold;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            line-height: 1.2;
        }

        #launch-mobile.charging {
            background: rgba(255, 0, 255, 0.3);
            border-color: rgba(255, 0, 255, 0.8);
            color: #ff00ff;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.5);
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes shine {
            to {
                background-position: 300% center;
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        #launch-power {
            position: absolute;
            bottom: clamp(120px, 18vh, 180px);
            right: clamp(15px, 3vw, 50px);
            width: clamp(15px, 2vw, 22px);
            height: clamp(100px, 15vh, 160px);
            background: rgba(20, 20, 40, 0.8);
            border-radius: 10px;
            border: 2px solid rgba(100, 255, 255, 0.3);
            overflow: hidden;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #power-bar {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #ff0000, #ffff00, #00ffff);
            transition: height 0.05s;
        }

        #power-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: clamp(10px, 1.2vh, 14px);
            white-space: nowrap;
            text-align: center;
        }

        @media (max-width: 1024px) {
            canvas {
                height: 85vh;
            }
        }

        @media (max-width: 768px) {
            canvas {
                height: 78vh;
                border-radius: 15px;
            }

            #ui-overlay {
                gap: 8px;
            }

            .ui-panel {
                padding: 6px 10px;
                min-width: 60px;
            }

            .ui-value {
                font-size: 22px;
            }

            .ui-label {
                font-size: 9px;
                letter-spacing: 1px;
            }

            #launch-power {
                display: none;
            }

            #mobile-controls {
                display: flex;
            }

            #launch-mobile {
                display: flex;
            }

            #controls-hint {
                font-size: 12px;
                bottom: 15px;
            }
        }

        @media (max-width: 480px) {
            canvas {
                height: 72vh;
            }

            .screen-title {
                font-size: 32px;
            }

            .screen-subtitle {
                font-size: 14px;
            }

            .btn {
                padding: 12px 35px;
                font-size: 18px;
            }

            #controls-hint {
                font-size: 10px;
                bottom: 10px;
            }

            #controls-hint span {
                padding: 2px 8px;
                margin: 0 2px;
            }

            .ui-panel {
                padding: 5px 8px;
                min-width: 55px;
            }

            .ui-value {
                font-size: 18px;
            }

            .ui-label {
                font-size: 8px;
                margin-bottom: 2px;
            }
        }

        @media (pointer: coarse) {
            .btn:hover {
                transform: none;
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div class="ui-panel">
                <div class="ui-label">分数</div>
                <div class="ui-value" id="score-display">0</div>
            </div>
            <div class="ui-panel">
                <div class="ui-label">生命</div>
                <div class="ui-value lives" id="lives-display">3</div>
            </div>
            <div class="ui-panel">
                <div class="ui-label">最高分</div>
                <div class="ui-value high-score" id="high-score-display">0</div>
            </div>
        </div>

        <div id="mobile-controls">
            <div class="mobile-btn" id="left-flipper-btn">左</div>
            <div class="mobile-btn" id="right-flipper-btn">右</div>
        </div>

        <div id="launch-mobile">发射<br>(按住)</div>

        <div id="launch-power">
            <div id="power-bar"></div>
            <div id="power-label">力度</div>
        </div>

        <div id="controls-hint">
            <span>空格键</span> 蓄力发射 |
            <span>Z / ←</span> 左挡板 |
            <span>/ / →</span> 右挡板
        </div>

        <div id="start-screen">
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:10px;">
                <span style="font-size:clamp(10px,1.5vw,14px);color:#00ffff;letter-spacing:4px;text-transform:uppercase;border:1px solid rgba(0,255,255,0.5);padding:4px 16px;border-radius:20px;text-shadow:0 0 6px rgba(0,255,255,0.5);">互动娱乐赛道 · 参赛作品</span>
            </div>
            <h1 class="screen-title">霓虹弹珠 · 无尽幻境</h1>
            <p class="screen-subtitle">每一次弹射都是全新的挑战</p>
            <div class="level-info" id="level-preview">随机关卡 · 无限挑战</div>
            <button class="btn" id="start-btn">开始游戏</button>
            <div style="font-size:clamp(10px,1.4vw,14px);color:#666;margin-top:clamp(10px,2vh,25px);text-align:center;line-height:1.8;">
                🎮 空格键蓄力发射 &nbsp;|&nbsp; Z/← 左挡板 &nbsp;|&nbsp; /→ 右挡板<br/>
                <span style="font-size:clamp(9px,1.1vw,12px);color:#555;">TRAE Work AI 生成 · 真实物理引擎 · 随机关卡 · 粒子特效 · 连击系统</span>
            </div>
        </div>

        <div id="game-over-screen">
            <h1 class="screen-title">游戏结束</h1>
            <p class="screen-subtitle" id="final-subtitle">精彩的表现！</p>
            <div class="ui-value" style="font-size: clamp(32px, 5vw, 72px); margin-bottom: clamp(10px, 2vh, 20px);" id="final-score">0</div>
            <div style="font-size:clamp(14px,2vw,22px);color:#ffd700;margin-bottom:6px;text-shadow:0 0 10px #ffd700;" id="final-combo"></div>
            <div class="level-info" id="final-level-info">第 1 关</div>
            <div style="font-size:clamp(11px,1.4vw,16px);color:#888;margin-bottom:clamp(10px,2vh,20px);line-height:1.6;" id="final-stats"></div>
            <button class="btn" id="restart-btn" style="margin-top: 20px;">再来一局（新关卡）</button>
        </div>
    </div>

    <script>
        // ========================================================
        //  游戏常量与配置
        // ========================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreDisplay = document.getElementById('final-score');
        const finalLevelInfo = document.getElementById('final-level-info');
        const finalSubtitle = document.getElementById('final-subtitle');
        const powerBar = document.getElementById('power-bar');
        const levelPreview = document.getElementById('level-preview');
        const leftFlipperBtn = document.getElementById('left-flipper-btn');
        const rightFlipperBtn = document.getElementById('right-flipper-btn');
        const launchMobileBtn = document.getElementById('launch-mobile');

        const BASE_WIDTH = 600;
        const BASE_HEIGHT = 900;
        canvas.width = BASE_WIDTH;
        canvas.height = BASE_HEIGHT;

        // —— 物理参数（更真实的弹珠物理）
        const GRAVITY = 0.25;          // 每帧向下加速度
        const AIR_FRICTION = 0.9995;   // 空气阻力
        const WALL_BOUNCE = 0.6;       // 墙壁反弹，保留 60% 能量
        const BUMPER_BOUNCE_BASE = 1.1; // 弹射器基础弹力系数
        const BUMPER_MIN_KICK = 6;     // 弹射器最小推力
        const FLIPPER_ACTIVE_POWER = 14; // 挡板激活时向上击打力
        const FLIPPER_PASSIVE_POWER = 5; // 挡板静止时反弹
        const MAX_SPEED = 28;          // 球速上限
        const MAX_LAUNCH_POWER = 15;   // 发射器最大蓄力

        // 主题配色池（随机关卡从中挑选）
        const THEMES = [
            { bg: '#0a0a1a', accent: '#00ffff', bumper: ['#ff00ff', '#00ffff', '#ffff00', '#ff6b6b', '#00ff88'] },
            { bg: '#1a0a1a', accent: '#ff00ff', bumper: ['#ff44ff', '#ffaa00', '#00ffaa', '#ff6666', '#44aaff'] },
            { bg: '#0a1a0a', accent: '#00ff88', bumper: ['#00ff88', '#ffff00', '#ff8800', '#ff3366', '#00aaff'] },
            { bg: '#0a0a2a', accent: '#8888ff', bumper: ['#8888ff', '#ff88ff', '#ffff88', '#88ffff', '#ff8888'] },
            { bg: '#2a0a1a', accent: '#ff4488', bumper: ['#ff4488', '#ffaa00', '#44ffaa', '#aa44ff', '#ffdd00'] },
            { bg: '#0a1a2a', accent: '#44ddff', bumper: ['#44ddff', '#ffaa44', '#ff44aa', '#44ff99', '#aa44ff'] }
        ];

        let animationId;
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        let highScore = parseInt(localStorage.getItem('pinballHighScore')) || 0;
        let launchPower = 0;
        let isCharging = false;
        let isLaunchCharging = false;
        let currentTheme = THEMES[0];

        // 连击系统
        let comboCount = 0;
        let comboTimer = 0;
        let maxCombo = 0;
        let totalBumps = 0;
        let floatingTexts = [];
        let screenShake = 0;

        // ========================================================
        //  工具函数
        // ========================================================
        function rand(min, max) {
            return Math.random() * (max - min) + min;
        }
        function randInt(min, max) {
            return Math.floor(rand(min, max + 1));
        }
        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }
        function pick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // ========================================================
        //  粒子系统（火花 + 爆炸 + 尾迹）
        // ========================================================
        class Particle {
            constructor(x, y, color, velocity, life, size) {
                this.x = x; this.y = y; this.color = color;
                this.vx = velocity.x + (Math.random() - 0.5) * 2;
                this.vy = velocity.y + (Math.random() - 0.5) * 2;
                this.life = life; this.maxLife = life;
                this.size = size || 3;
                this.decay = Math.random() * 0.03 + 0.025;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += 0.08; this.vx *= 0.97; this.vy *= 0.97;
                this.life -= this.decay;
                this.size *= 0.97;
            }
            draw(ctx) {
                const alpha = Math.max(0, this.life / this.maxLife);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class SparkParticle extends Particle {
            constructor(x, y, color) {
                super(x, y, color, {
                    x: (Math.random() - 0.5) * 6,
                    y: (Math.random() - 0.5) * 6
                }, 1, 2.5);
                this.decay = Math.random() * 0.04 + 0.04;
            }
        }

        class TrailParticle extends Particle {
            constructor(x, y, color) {
                super(x, y, color, { x: 0, y: 0 }, 0.6, 3.5);
                this.decay = 0.07;
            }
        }

        // 浮动分数文字
        class FloatingText {
            constructor(x, y, text, color, size) {
                this.x = x; this.y = y;
                this.text = text;
                this.color = color;
                this.size = size || 18;
                this.life = 1;
                this.decay = 0.018;
                this.vy = -2.5;
            }
            update() {
                this.y += this.vy;
                this.vy *= 0.96;
                this.life -= this.decay;
                this.size *= 0.995;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.font = 'bold ' + this.size + 'px Arial';
                ctx.textAlign = 'center';
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
            get dead() { return this.life <= 0; }
        }

        // ========================================================
        //  弹珠 Ball - 改进的物理
        // ========================================================
        class Ball {
            constructor() { this.reset(); }
            reset() {
                this.x = BASE_WIDTH - 35;
                this.y = BASE_HEIGHT - 80;
                this.vx = 0; this.vy = 0;
                this.radius = 12;
                this.active = false;
                this.inLauncher = true;
                this.trail = [];
                this.launchBoost = 0;
            }
            launch(power) {
                this.vx = -(power * 0.5 + 5);
                this.vy = -(power * 2.2 + 18);
                this.active = true;
                this.inLauncher = true;
                this.launchBoost = 4;
                for (let i = 0; i < 20; i++) {
                    particles.push(new SparkParticle(this.x, this.y, currentTheme.accent));
                }
            }
            // 限制速度上限
            capSpeed() {
                if (this.launchBoost > 0) { this.launchBoost--; return; }
                const sp = Math.hypot(this.vx, this.vy);
                if (sp > MAX_SPEED) {
                    const ratio = MAX_SPEED / sp;
                    this.vx *= ratio; this.vy *= ratio;
                }
            }
            update() {
                if (!this.active) return;

                // 尾迹
                this.trail.push(new TrailParticle(this.x, this.y, currentTheme.accent));
                if (this.trail.length > 12) this.trail.shift();

                // 基本物理：先更新速度，再移动，再检查边界
                this.vy += GRAVITY;
                this.vx *= AIR_FRICTION;
                this.vy *= AIR_FRICTION;

                // 先做位置更新
                this.x += this.vx;
                this.y += this.vy;
                this.capSpeed();

                // 检查是否需要离开通道（基于新位置）
                if (this.inLauncher && this.y < 450) {
                    this.inLauncher = false;
                    this.vx = -Math.abs(this.vx) - 4; // 给一个向左的推动进入游戏
                    createSparks(this.x, this.y, currentTheme.accent);
                }

                if (this.inLauncher) {
                    // 发射通道内：左右边界 550~590，顶部 y=50
                    if (this.x - this.radius < BASE_WIDTH - 50) {
                        this.x = BASE_WIDTH - 50 + this.radius;
                        this.vx = Math.abs(this.vx) * 0.35;
                    }
                    if (this.x + this.radius > BASE_WIDTH - 10) {
                        this.x = BASE_WIDTH - 10 - this.radius;
                        this.vx = -Math.abs(this.vx) * 0.35;
                    }
                    if (this.y - this.radius < 50) {
                        this.y = 50 + this.radius;
                        this.vy = Math.abs(this.vy) * 0.5;
                        this.inLauncher = false;
                        this.vx = -Math.abs(this.vx) - 5;
                        createSparks(this.x, this.y, currentTheme.accent);
                    }
                } else {
                    // 主游戏区墙壁碰撞
                    if (this.x - this.radius < 30) {
                        this.x = 30 + this.radius;
                        this.vx = Math.abs(this.vx) * WALL_BOUNCE;
                        createSparks(this.x, this.y, currentTheme.accent);
                    }
                    if (this.x + this.radius > BASE_WIDTH - 50) {
                        this.x = BASE_WIDTH - 50 - this.radius;
                        this.vx = -Math.abs(this.vx) * WALL_BOUNCE;
                        createSparks(this.x, this.y, currentTheme.accent);
                    }
                    if (this.y - this.radius < 50) {
                        this.y = 50 + this.radius;
                        this.vy = Math.abs(this.vy) * WALL_BOUNCE;
                        createSparks(this.x, this.y, currentTheme.accent);
                    }
                }

                // 出界（落到底部）
                if (this.y > BASE_HEIGHT + 50) {
                    lives--;
                    livesDisplay.textContent = lives;
                    createExplosion(this.x, BASE_HEIGHT - 20, '#ff0000', 25);
                    if (lives <= 0) {
                        gameOver();
                    } else {
                        this.reset();
                    }
                }
            }
            draw(ctx) {
                // 尾迹
                this.trail.forEach(p => { p.update(); p.draw(ctx); });

                // 弹珠主体 - 金属霓虹感
                const g = ctx.createRadialGradient(
                    this.x - 4, this.y - 4, 0,
                    this.x, this.y, this.radius
                );
                g.addColorStop(0, '#ffffff');
                g.addColorStop(0.3, currentTheme.accent);
                g.addColorStop(1, '#001122');

                ctx.save();
                ctx.shadowColor = currentTheme.accent;
                ctx.shadowBlur = 18;
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // 高光小点
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.beginPath();
                ctx.arc(this.x - 4, this.y - 4, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ========================================================
        //  圆形弹射器 Bumper - 改进反射物理
        // ========================================================
        class Bumper {
            constructor(x, y, radius, color, points) {
                this.x = x; this.y = y;
                this.radius = radius;
                this.color = color;
                this.points = points;
                this.hit = false;
                this.hitTime = 0;
                this.hitCooldown = 0; // 防止同一帧多次触发
            }
            checkCollision(ball) {
                if (this.hitCooldown > 0) { this.hitCooldown--; return false; }
                const dx = ball.x - this.x, dy = ball.y - this.y;
                const dist = Math.hypot(dx, dy);
                const minDist = this.radius + ball.radius;
                if (dist < minDist && dist > 0) {
                    // 法向量（从 bump 指向 ball）
                    const nx = dx / dist, ny = dy / dist;
                    // 球当前速度在法向量上的分量
                    const vDotN = ball.vx * nx + ball.vy * ny;
                    // 反射公式：v' = v - 2*(v·n)*n + 额外推力
                    const kick = Math.max(Math.abs(vDotN) * BUMPER_BOUNCE_BASE, BUMPER_MIN_KICK);
                    ball.vx = ball.vx - 2 * vDotN * nx + nx * kick;
                    ball.vy = ball.vy - 2 * vDotN * ny + ny * kick;
                    // 位置修正，避免卡入 bumper
                    const overlap = minDist - dist + 1;
                    ball.x += nx * overlap;
                    ball.y += ny * overlap;

                    this.hit = true;
                    this.hitTime = Date.now();
                    this.hitCooldown = 8;
                    // 连击系统
                    comboCount++;
                    comboTimer = 60;
                    if (comboCount > maxCombo) maxCombo = comboCount;
                    totalBumps++;
                    const comboMult = Math.min(comboCount, 10);
                    const finalPoints = this.points * comboMult;
                    score += finalPoints;
                    scoreDisplay.textContent = score;
                    // 浮动分数
                    floatingTexts.push(new FloatingText(this.x, this.y - 5,
                        '+' + finalPoints + (comboCount > 1 ? ' x' + comboCount : ''),
                        this.color, 14 + Math.min(comboCount * 2, 24)));
                    if (comboCount >= 3) screenShake = Math.max(screenShake, comboCount * 1.5);
                    createSparks(this.x + nx * this.radius, this.y + ny * this.radius, this.color);
                    createExplosion(this.x + nx * this.radius, this.y + ny * this.radius, this.color, 8);
                    return true;
                }
                return false;
            }
            update() {
                if (this.hit && Date.now() - this.hitTime > 120) this.hit = false;
            }
            draw(ctx) {
                const scale = this.hit ? 1.15 : 1.0;
                const r = this.radius * scale;
                ctx.save();
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 25;

                // 外发光圆
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
                g.addColorStop(0, '#ffffff');
                g.addColorStop(0.25, this.color);
                g.addColorStop(1, '#000011');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                ctx.fill();

                // 描边
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.stroke();

                // 分值
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 0;
                ctx.fillText(this.points, this.x, this.y);
                ctx.restore();
            }
        }

        // ========================================================
        //  矩形目标（可旋转 / 普通）
        // ========================================================
        class Target {
            constructor(x, y, width, height, color, points, type) {
                this.x = x; this.y = y;
                this.w = width; this.h = height;
                this.color = color;
                this.points = points;
                this.type = type;
                this.active = true;
                this.rotation = rand(0, Math.PI);
                this.hitCooldown = 0;
            }
            checkCollision(ball) {
                if (!this.active || this.hitCooldown > 0) { this.hitCooldown--; return false; }
                // 简化为 AABB（即使 rotating 也按不旋转检测，为视觉效果）
                if (ball.x + ball.radius > this.x - this.w / 2 &&
                    ball.x - ball.radius < this.x + this.w / 2 &&
                    ball.y + ball.radius > this.y - this.h / 2 &&
                    ball.y - ball.radius < this.y + this.h / 2) {
                    // 判断从哪边撞入
                    const overlapLeft = (ball.x + ball.radius) - (this.x - this.w / 2);
                    const overlapRight = (this.x + this.w / 2) - (ball.x - ball.radius);
                    const overlapTop = (ball.y + ball.radius) - (this.y - this.h / 2);
                    const overlapBottom = (this.y + this.h / 2) - (ball.y - ball.radius);
                    const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
                    if (minOverlap === overlapLeft) {
                        ball.vx = Math.abs(ball.vx) * WALL_BOUNCE + 1.5;
                        ball.x = this.x - this.w / 2 - ball.radius - 1;
                    } else if (minOverlap === overlapRight) {
                        ball.vx = -Math.abs(ball.vx) * WALL_BOUNCE - 1.5;
                        ball.x = this.x + this.w / 2 + ball.radius + 1;
                    } else if (minOverlap === overlapTop) {
                        ball.vy = Math.abs(ball.vy) * WALL_BOUNCE + 1.5;
                        ball.y = this.y - this.h / 2 - ball.radius - 1;
                    } else {
                        ball.vy = -Math.abs(ball.vy) * WALL_BOUNCE - 1.5;
                        ball.y = this.y + this.h / 2 + ball.radius + 1;
                    }
                    this.active = false;
                    this.hitCooldown = 60;
                    // 连击系统
                    comboCount++;
                    comboTimer = 60;
                    if (comboCount > maxCombo) maxCombo = comboCount;
                    totalBumps++;
                    const comboMult = Math.min(comboCount, 10);
                    const finalPoints = this.points * comboMult;
                    score += finalPoints;
                    scoreDisplay.textContent = score;
                    floatingTexts.push(new FloatingText(this.x, this.y - 5,
                        '+' + finalPoints + (comboCount > 1 ? ' x' + comboCount : ''),
                        this.color, 14 + Math.min(comboCount * 2, 24)));
                    if (comboCount >= 3) screenShake = Math.max(screenShake, comboCount * 1.5);
                    createSparks(this.x, this.y, this.color);
                    createExplosion(this.x, this.y, this.color, 10);
                    setTimeout(() => { this.active = true; }, 1500 + Math.random() * 1000);
                    return true;
                }
                return false;
            }
            update() {
                if (this.type === 'spinning') this.rotation += 0.02;
                if (this.hitCooldown > 0) this.hitCooldown--;
            }
            draw(ctx) {
                if (!this.active) {
                    // 未激活：暗淡显示
                    ctx.save();
                    ctx.globalAlpha = 0.35;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1;
                    ctx.strokeRect(-this.w / 2, -this.h / 2, this.w, this.h);
                    ctx.restore();
                    return;
                }
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 12;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.35;
                ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2.5;
                ctx.globalAlpha = 1;
                ctx.strokeRect(-this.w / 2, -this.h / 2, this.w, this.h);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 0;
                ctx.fillText(this.points, 0, 0);
                ctx.restore();
            }
        }

        // ========================================================
        //  三角斜挡板 Triangle Slingshot（新增元素）
        // ========================================================
        class TriangleBumper {
            constructor(x, y, size, color, points, facing) {
                this.x = x; this.y = y;
                this.size = size;
                this.color = color;
                this.points = points;
                this.facing = facing; // 'left-top' | 'right-top' | 'left-bottom' | 'right-bottom'
                this.hit = false; this.hitTime = 0;
                this.hitCooldown = 0;
            }
            // 三条线段构成三角形
            getLines() {
                const s = this.size;
                let pts;
                if (this.facing === 'right-top') {
                    pts = [[-s, -s], [s, -s], [-s, s]]; // 直角在左上，斜面向右下
                } else if (this.facing === 'left-top') {
                    pts = [[-s, -s], [s, -s], [s, s]]; // 直角在右上，斜面向左下
                } else if (this.facing === 'right-bottom') {
                    pts = [[-s, s], [s, s], [-s, -s]];
                } else {
                    pts = [[-s, s], [s, s], [s, -s]];
                }
                return [
                    [this.x + pts[0][0], this.y + pts[0][1], this.x + pts[1][0], this.y + pts[1][1]],
                    [this.x + pts[1][0], this.y + pts[1][1], this.x + pts[2][0], this.y + pts[2][1]],
                    [this.x + pts[2][0], this.y + pts[2][1], this.x + pts[0][0], this.y + pts[0][1]]
                ];
            }
            pointInTriangle(px, py) {
                const s = this.size;
                let pts;
                if (this.facing === 'right-top') pts = [[-s, -s], [s, -s], [-s, s]];
                else if (this.facing === 'left-top') pts = [[-s, -s], [s, -s], [s, s]];
                else if (this.facing === 'right-bottom') pts = [[-s, s], [s, s], [-s, -s]];
                else pts = [[-s, s], [s, s], [s, -s]];
                const [x1, y1] = [this.x + pts[0][0], this.y + pts[0][1]];
                const [x2, y2] = [this.x + pts[1][0], this.y + pts[1][1]];
                const [x3, y3] = [this.x + pts[2][0], this.y + pts[2][1]];
                const d1 = (px - x2) * (y1 - y2) - (x1 - x2) * (py - y2);
                const d2 = (px - x3) * (y2 - y3) - (x2 - x3) * (py - y3);
                const d3 = (px - x1) * (y3 - y1) - (x3 - x1) * (py - y1);
                const hasNeg = (d1 < 0) || (d2 < 0) || (d3 < 0);
                const hasPos = (d1 > 0) || (d2 > 0) || (d3 > 0);
                return !(hasNeg && hasPos);
            }
            closestPointOnSegment(px, py, x1, y1, x2, y2) {
                const dx = x2 - x1, dy = y2 - y1;
                const l2 = dx * dx + dy * dy;
                if (l2 === 0) return [x1, y1];
                let t = ((px - x1) * dx + (py - y1) * dy) / l2;
                t = Math.max(0, Math.min(1, t));
                return [x1 + t * dx, y1 + t * dy];
            }
            checkCollision(ball) {
                if (this.hitCooldown > 0) { this.hitCooldown--; return false; }
                // 球与三角形边的碰撞
                const lines = this.getLines();
                let bestDist = Infinity, bestNx = 0, bestNy = 0, bestCx = 0, bestCy = 0;
                for (const [x1, y1, x2, y2] of lines) {
                    const [cx, cy] = this.closestPointOnSegment(ball.x, ball.y, x1, y1, x2, y2);
                    const dx = ball.x - cx, dy = ball.y - cy;
                    const dist = Math.hypot(dx, dy);
                    if (dist < bestDist) {
                        bestDist = dist; bestCx = cx; bestCy = cy;
                        if (dist > 0) { bestNx = dx / dist; bestNy = dy / dist; }
                    }
                }
                // 检查球是否在三角形内部
                const inside = this.pointInTriangle(ball.x, ball.y);
                if (bestDist < ball.radius || inside) {
                    let nx = bestNx, ny = bestNy;
                    if (inside) {
                        // 在内部时，朝最近的边推出
                        const dx = ball.x - this.x, dy = ball.y - this.y;
                        const d = Math.hypot(dx, dy);
                        if (d > 0) { nx = dx / d; ny = dy / d; }
                    }
                    // 反射 + 推力
                    const vDotN = ball.vx * nx + ball.vy * ny;
                    const kick = Math.max(Math.abs(vDotN) * 1.0, 5);
                    ball.vx = ball.vx - 2 * vDotN * nx + nx * kick;
                    ball.vy = ball.vy - 2 * vDotN * ny + ny * kick;
                    const overlap = ball.radius - bestDist + 1;
                    ball.x += nx * Math.max(overlap, ball.radius);
                    ball.y += ny * Math.max(overlap, ball.radius);
                    this.hit = true; this.hitTime = Date.now(); this.hitCooldown = 10;
                    comboCount++;
                    comboTimer = 60;
                    if (comboCount > maxCombo) maxCombo = comboCount;
                    totalBumps++;
                    const comboMult = Math.min(comboCount, 10);
                    const finalPoints = this.points * comboMult;
                    score += finalPoints;
                    scoreDisplay.textContent = score;
                    floatingTexts.push(new FloatingText(bestCx, bestCy - 5,
                        '+' + finalPoints + (comboCount > 1 ? ' x' + comboCount : ''),
                        this.color, 14 + Math.min(comboCount * 2, 24)));
                    createSparks(bestCx, bestCy, this.color);
                    createExplosion(bestCx, bestCy, this.color, 8);
                    return true;
                }
                return false;
            }
            update() {
                if (this.hit && Date.now() - this.hitTime > 120) this.hit = false;
            }
            draw(ctx) {
                const lines = this.getLines();
                ctx.save();
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.25;
                ctx.beginPath();
                ctx.moveTo(lines[0][0], lines[0][1]);
                for (let i = 1; i < lines.length; i++) ctx.lineTo(lines[i][0], lines[i][1]);
                ctx.closePath();
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.hit ? 5 : 3;
                ctx.beginPath();
                ctx.moveTo(lines[0][0], lines[0][1]);
                for (let i = 1; i < lines.length; i++) ctx.lineTo(lines[i][0], lines[i][1]);
                ctx.closePath();
                ctx.stroke();
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 0;
                ctx.fillText(this.points, this.x, this.y);
                ctx.restore();
            }
        }

        // ========================================================
        //  弹跳弹簧 Spring（在底部附近的小强力弹射器）
        // ========================================================
        class Spring {
            constructor(x, y, height, color, points) {
                this.x = x; this.y = y;
                this.h = height;
                this.color = color;
                this.points = points;
                this.hitCooldown = 0;
                this.compress = 0;
            }
            checkCollision(ball) {
                if (this.hitCooldown > 0) { this.hitCooldown--; return false; }
                const topY = this.y - this.h / 2;
                if (ball.x > this.x - 25 && ball.x < this.x + 25 &&
                    ball.y + ball.radius > topY && ball.y < this.y) {
                    // 强力向上推
                    ball.vy = -(Math.abs(ball.vy) * 0.5 + 11);
                    ball.vx += (ball.x - this.x) * 0.08;
                    ball.y = topY - ball.radius - 1;
                    this.hitCooldown = 12;
                    this.compress = 1;
                    comboCount++;
                    comboTimer = 60;
                    if (comboCount > maxCombo) maxCombo = comboCount;
                    totalBumps++;
                    const comboMult = Math.min(comboCount, 10);
                    const finalPoints = this.points * comboMult;
                    score += finalPoints;
                    scoreDisplay.textContent = score;
                    floatingTexts.push(new FloatingText(ball.x, topY - 5,
                        '+' + finalPoints + (comboCount > 1 ? ' x' + comboCount : ''),
                        this.color, 14 + Math.min(comboCount * 2, 24)));
                    createSparks(ball.x, topY, this.color);
                    createExplosion(ball.x, topY, this.color, 12);
                    return true;
                }
                return false;
            }
            update() {
                if (this.hitCooldown > 0) this.hitCooldown--;
                this.compress *= 0.85;
            }
            draw(ctx) {
                const c = this.compress * 8;
                ctx.save();
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                // 画几段弹簧线
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const y = this.y + c + i * ((this.h - c) / 4);
                    ctx.moveTo(this.x - 15, y);
                    ctx.lineTo(this.x + 15, y);
                }
                ctx.stroke();
                // 顶部的撞击板
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - 22, this.y - this.h / 2 + c - 3, 44, 6);
                ctx.restore();
            }
        }

        // ========================================================
        //  挡板 Flipper - 改进物理
        // ========================================================
        class Flipper {
            constructor(x, y, length, side) {
                this.x = x; this.y = y; this.length = length; this.side = side;
                this.angle = side === 'left' ? 0.4 : Math.PI - 0.4;
                this.targetAngle = this.angle;
                this.maxAngle = side === 'left' ? -0.7 : Math.PI + 0.7;
                this.minAngle = side === 'left' ? 0.4 : Math.PI - 0.4;
                this.active = false;
                this.lastAngle = this.angle;
                this.angularVel = 0;
            }
            activate() { this.targetAngle = this.maxAngle; this.active = true; }
            deactivate() { this.targetAngle = this.minAngle; this.active = false; }
            update() {
                this.lastAngle = this.angle;
                const diff = this.targetAngle - this.angle;
                this.angle += diff * 0.4; // 快速响应
                this.angularVel = this.angle - this.lastAngle;
            }
            getEndPoint() {
                return [this.x + Math.cos(this.angle) * this.length,
                        this.y + Math.sin(this.angle) * this.length];
            }
            checkCollision(ball) {
                const [ex, ey] = this.getEndPoint();
                // 计算球到线段的最近点
                const dx = ex - this.x, dy = ey - this.y;
                const len = Math.hypot(dx, dy);
                const nx = dx / len, ny = dy / len;
                const bx = ball.x - this.x, by = ball.y - this.y;
                let proj = bx * nx + by * ny;
                proj = Math.max(0, Math.min(len, proj));
                const closestX = this.x + nx * proj;
                const closestY = this.y + ny * proj;
                const distX = ball.x - closestX, distY = ball.y - closestY;
                const distance = Math.hypot(distX, distY);
                const minDist = ball.radius + 7;

                if (distance < minDist && distance > 0) {
                    // 法向量（从挡板指向球）
                    let nX = distX / distance, nY = distY / distance;
                    // 确保法线向上（球应该被弹向上方）
                    if (nY > 0) { nY = -nY; nX = -nX; }
                    // 计算击球速度 = 挡板角速度带来的线速度 + 弹性
                    const hitPos = proj / len; // 0 到 1
                    const tangentialSpeed = this.angularVel * this.length * hitPos * 15;
                    const power = this.active ? FLIPPER_ACTIVE_POWER : FLIPPER_PASSIVE_POWER;
                    ball.vx = nX * (power + Math.abs(tangentialSpeed) * 0.3) +
                              (this.side === 'left' ? -2 : 2);
                    ball.vy = nY * (power + Math.abs(tangentialSpeed) * 0.3) - power * 0.8;
                    const overlap = minDist - distance + 1;
                    ball.x += nX * overlap;
                    ball.y += nY * overlap;
                    createSparks(closestX, closestY, '#ffff00');
                    return true;
                }
                return false;
            }
            draw(ctx) {
                const [ex, ey] = this.getEndPoint();
                ctx.save();
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 16;
                ctx.lineCap = 'round';
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = 22;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(ex, ey);
                ctx.stroke();
                // 内芯
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 8;
                ctx.stroke();
                // 枢轴点
                ctx.fillStyle = '#ffffaa';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ========================================================
        //  发射器 / 发射通道绘制
        // ========================================================
        class Launcher {
            constructor() { this.position = 0; }
            draw(ctx) {
                ctx.save();
                ctx.strokeStyle = currentTheme.accent;
                ctx.lineWidth = 3;
                ctx.shadowColor = currentTheme.accent;
                ctx.shadowBlur = 15;
                // 通道左竖线（从底部到上部斜入）
                ctx.beginPath();
                ctx.moveTo(BASE_WIDTH - 50, 50);
                ctx.lineTo(BASE_WIDTH - 50, BASE_HEIGHT);
                ctx.stroke();
                // 通道右竖线（画布右边缘）
                ctx.beginPath();
                ctx.moveTo(BASE_WIDTH - 10, 50);
                ctx.lineTo(BASE_WIDTH - 10, BASE_HEIGHT);
                ctx.stroke();
                // 底部小平台（球待发位置）
                ctx.fillStyle = currentTheme.accent;
                ctx.fillRect(BASE_WIDTH - 60, BASE_HEIGHT - 65, 55, 4);
                ctx.restore();
            }
        }

        // ========================================================
        //  关卡生成（随机）
        // ========================================================
        function generateLevel(lvl) {
            currentTheme = THEMES[(lvl - 1) % THEMES.length];
            const bumpers = [];
            const targets = [];
            const triangles = [];
            const springs = [];

            // 基础尺寸和难度
            const difficulty = Math.min(1 + (lvl - 1) * 0.12, 2.2);

            // —— 上部中央大 bumper ——
            const bigBumperR = randInt(38, 50);
            bumpers.push(new Bumper(
                randInt(250, 350), randInt(160, 220),
                bigBumperR, currentTheme.bumper[0], Math.floor(150 * difficulty)
            ));

            // —— 上排 2~3 个中等 bumpers ——
            const upperCount = randInt(2, 3);
            for (let i = 0; i < upperCount; i++) {
                const x = 120 + i * (360 / (upperCount - 1 || 1)) + randInt(-20, 20);
                const r = randInt(28, 36);
                bumpers.push(new Bumper(
                    x, randInt(250, 320), r,
                    currentTheme.bumper[(i + 1) % currentTheme.bumper.length],
                    Math.floor(75 * difficulty)
                ));
            }

            // —— 中部 3~4 个 bumpers 随机散布 ——
            const midCount = randInt(3, 4);
            for (let i = 0; i < midCount; i++) {
                const x = randInt(80, 460);
                const y = randInt(380, 520);
                // 避免太靠近
                let tooClose = false;
                for (const b of bumpers) {
                    if (Math.hypot(b.x - x, b.y - y) < b.radius + 45) { tooClose = true; break; }
                }
                if (!tooClose) {
                    const r = randInt(22, 32);
                    bumpers.push(new Bumper(
                        x, y, r,
                        currentTheme.bumper[(i + 2) % currentTheme.bumper.length],
                        Math.floor(50 * difficulty)
                    ));
                }
            }

            // —— 左右墙区域的 target（静态） ——
            const targetColors = currentTheme.bumper.filter(c => c !== '#ffff00');
            // 左上
            targets.push(new Target(
                randInt(80, 140), randInt(350, 450),
                randInt(45, 65), randInt(10, 18),
                pick(targetColors), Math.floor(60 * difficulty), 'static'
            ));
            // 右上
            targets.push(new Target(
                randInt(420, 480), randInt(350, 450),
                randInt(45, 65), randInt(10, 18),
                pick(targetColors), Math.floor(60 * difficulty), 'static'
            ));

            // —— 旋转目标 ——
            const spinCount = randInt(1, 2);
            for (let i = 0; i < spinCount; i++) {
                targets.push(new Target(
                    randInt(200, 400), randInt(300, 400),
                    randInt(28, 40), randInt(28, 40),
                    pick(currentTheme.bumper),
                    Math.floor(100 * difficulty), 'spinning'
                ));
            }

            // —— 三角形斜挡板（一对，位于中下侧区域左右） ——
            if (lvl >= 1) {
                triangles.push(new TriangleBumper(
                    130, 650, 50,
                    currentTheme.bumper[1], Math.floor(50 * difficulty),
                    'right-top'
                ));
                triangles.push(new TriangleBumper(
                    470, 650, 50,
                    currentTheme.bumper[1], Math.floor(50 * difficulty),
                    'left-top'
                ));
            }

            // —— 弹簧（中下部可选一个） ——
            if (lvl >= 2 && Math.random() < 0.7) {
                springs.push(new Spring(
                    randInt(250, 350), randInt(680, 730),
                    45,
                    pick(currentTheme.bumper),
                    Math.floor(80 * difficulty)
                ));
            }

            // —— 额外的中部斜挡板（高级关卡） ——
            if (lvl >= 3) {
                triangles.push(new TriangleBumper(
                    randInt(200, 400), randInt(550, 600), 40,
                    pick(currentTheme.bumper),
                    Math.floor(40 * difficulty),
                    Math.random() < 0.5 ? 'right-bottom' : 'left-bottom'
                ));
            }

            return { bumpers, targets, triangles, springs };
        }

        // ========================================================
        //  全局对象
        // ========================================================
        let particles = [];
        let ball;
        let bumpers = [];
        let targets = [];
        let triangles = [];
        let springs = [];
        let leftFlipper;
        let rightFlipper;
        let launcher;

        function createSparks(x, y, color) {
            for (let i = 0; i < 12; i++) particles.push(new SparkParticle(x, y, color));
        }
        function createExplosion(x, y, color, count = 18) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + rand(-0.2, 0.2);
                const speed = rand(2, 6);
                particles.push(new Particle(
                    x, y, color,
                    { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                    rand(0.8, 1.3), rand(2, 4)
                ));
            }
        }

        // ========================================================
        //  游戏初始化与渲染
        // ========================================================
        function initGame() {
            particles = [];
            floatingTexts = [];
            score = 0;
            lives = 3;
            launchPower = 0;
            isCharging = false;
            isLaunchCharging = false;
            comboCount = 0;
            comboTimer = 0;
            maxCombo = 0;
            totalBumps = 0;
            scoreDisplay.textContent = score;
            livesDisplay.textContent = lives;
            highScoreDisplay.textContent = highScore;

            ball = new Ball();
            launcher = new Launcher();

            const lvl = generateLevel(level);
            bumpers = lvl.bumpers;
            targets = lvl.targets;
            triangles = lvl.triangles;
            springs = lvl.springs;

            leftFlipper = new Flipper(180, BASE_HEIGHT - 90, 95, 'left');
            rightFlipper = new Flipper(420, BASE_HEIGHT - 90, 95, 'right');
        }

        function drawBackground() {
            // 渐变底色
            const g = ctx.createLinearGradient(0, 0, 0, BASE_HEIGHT);
            g.addColorStop(0, currentTheme.bg);
            g.addColorStop(0.5, '#111125');
            g.addColorStop(1, currentTheme.bg);
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

            // 网格装饰
            ctx.strokeStyle = 'rgba(100, 255, 255, 0.08)';
            ctx.lineWidth = 1;
            for (let i = 0; i < BASE_WIDTH; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, BASE_HEIGHT); ctx.stroke();
            }
            for (let i = 0; i < BASE_HEIGHT; i += 40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(BASE_WIDTH, i); ctx.stroke();
            }

            // 主边框 - 左上
            ctx.strokeStyle = currentTheme.accent;
            ctx.lineWidth = 4;
            ctx.shadowColor = currentTheme.accent;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(30, 50);
            ctx.lineTo(30, BASE_HEIGHT - 120);
            // 底部弧形向左挡板过渡
            ctx.quadraticCurveTo(30, BASE_HEIGHT - 80, 80, BASE_HEIGHT - 80);
            ctx.lineTo(140, BASE_HEIGHT - 80);
            ctx.stroke();

            // 主边框 - 右
            ctx.beginPath();
            ctx.moveTo(BASE_WIDTH - 80, 50);
            ctx.lineTo(BASE_WIDTH - 80, BASE_HEIGHT - 120);
            ctx.quadraticCurveTo(BASE_WIDTH - 80, BASE_HEIGHT - 80, BASE_WIDTH - 130, BASE_HEIGHT - 80);
            ctx.lineTo(BASE_WIDTH - 180, BASE_HEIGHT - 80);
            ctx.stroke();

            // 顶部
            ctx.beginPath();
            ctx.moveTo(30, 50);
            ctx.lineTo(BASE_WIDTH - 80, 50);
            ctx.stroke();

            // 底部中间的"V"形导向槽，让球掉入左右之间
            ctx.beginPath();
            ctx.moveTo(200, BASE_HEIGHT - 30);
            ctx.lineTo(300, BASE_HEIGHT + 40);
            ctx.lineTo(400, BASE_HEIGHT - 30);
            ctx.stroke();

            ctx.shadowBlur = 0;
        }

        function update() {
            if (!gameRunning) return;

            if ((isCharging || isLaunchCharging) && !ball.active) {
                launchPower = Math.min(MAX_LAUNCH_POWER, launchPower + 0.35);
                powerBar.style.height = (launchPower / MAX_LAUNCH_POWER * 100) + '%';
            }

            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // 更新浮动文字
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].update();
                if (floatingTexts[i].dead) floatingTexts.splice(i, 1);
            }

            // 连击计时器衰减
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer === 0) comboCount = 0;
            }

            // 屏幕震动衰减
            if (screenShake > 0) screenShake *= 0.85;
            if (screenShake < 0.1) screenShake = 0;

            ball.update();

            // 各障碍物检测
            for (const b of bumpers) { b.update(); b.checkCollision(ball); }
            for (const t of targets) { t.update(); t.checkCollision(ball); }
            for (const t of triangles) { t.update(); t.checkCollision(ball); }
            for (const s of springs) { s.update(); s.checkCollision(ball); }

            leftFlipper.update();
            rightFlipper.update();
            leftFlipper.checkCollision(ball);
        }

        function draw() {
            ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

            // 屏幕震动
            if (screenShake > 0) {
                ctx.save();
                ctx.translate(
                    (Math.random() - 0.5) * screenShake * 2,
                    (Math.random() - 0.5) * screenShake * 2
                );
            }

            drawBackground();

            // 层级：弹簧 -> 三角 -> bumpers -> targets -> 挡板 -> 发射器 -> 球 -> 粒子
            springs.forEach(s => s.draw(ctx));
            triangles.forEach(t => t.draw(ctx));
            targets.forEach(t => t.draw(ctx));
            bumpers.forEach(b => b.draw(ctx));
            leftFlipper.draw(ctx);
            rightFlipper.draw(ctx);
            launcher.draw(ctx);
            ball.draw(ctx);
            particles.forEach(p => p.draw(ctx));

            // 浮动分数文字
            floatingTexts.forEach(ft => ft.draw(ctx));

            // 连击显示
            if (comboCount > 1 && comboTimer > 0) {
                ctx.save();
                const alpha = Math.min(1, comboTimer / 30);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 22px Arial';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 15;
                ctx.fillText('COMBO x' + comboCount, BASE_WIDTH / 2, 105);
                ctx.restore();
            }

            // 蓄力显示（屏幕右侧底部的力度条）
            if (!ball.active && gameRunning && (isCharging || isLaunchCharging)) {
                const pct = launchPower / MAX_LAUNCH_POWER;
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(BASE_WIDTH - 45, BASE_HEIGHT - 130, 30, 100);
                const grd = ctx.createLinearGradient(0, BASE_HEIGHT - 30, 0, BASE_HEIGHT - 130);
                grd.addColorStop(0, '#ff0000');
                grd.addColorStop(0.5, '#ffff00');
                grd.addColorStop(1, currentTheme.accent);
                ctx.fillStyle = grd;
                ctx.fillRect(BASE_WIDTH - 43, BASE_HEIGHT - 30 - 96 * pct, 26, 96 * pct);
                ctx.restore();
            }

            // 等待发射提示
            if (!ball.active && gameRunning) {
                ctx.save();
                ctx.fillStyle = currentTheme.accent;
                ctx.shadowColor = currentTheme.accent;
                ctx.shadowBlur = 12;
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                const pulse = 0.7 + Math.sin(Date.now() / 300) * 0.3;
                ctx.globalAlpha = pulse;
                ctx.fillText('按住 空格 蓄力发射', BASE_WIDTH / 2, 870);
                ctx.restore();
            }

            // 关卡提示（顶部）
            ctx.save();
            ctx.fillStyle = currentTheme.accent;
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.shadowColor = currentTheme.accent;
            ctx.shadowBlur = 8;
            ctx.fillText('第 ' + level + ' 关', BASE_WIDTH / 2, 75);
            ctx.restore();

            // 恢复屏幕震动
            if (screenShake > 0) { ctx.restore(); }

            animationId = requestAnimationFrame(() => { update(); draw(); });
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameRunning = true;
            initGame();
            update();
            draw();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('pinballHighScore', highScore);
                finalSubtitle.textContent = '新纪录！';
            } else {
                finalSubtitle.textContent = '精彩的表现！';
            }
            finalScoreDisplay.textContent = score;
            const finalCombo = document.getElementById('final-combo');
            const finalStats = document.getElementById('final-stats');
            if (maxCombo > 1) {
                finalCombo.textContent = '最高连击 x' + maxCombo + ' | 总计碰撞 ' + totalBumps + ' 次';
            } else {
                finalCombo.textContent = '总计碰撞 ' + totalBumps + ' 次';
            }
            finalStats.textContent = '第 ' + level + ' 关 · 最高分 ' + highScore;
            finalLevelInfo.textContent = '下一关将是全新的随机布局';
            gameOverScreen.style.display = 'flex';
            level++;
            levelPreview.textContent = '第 ' + level + ' 关 · 随机关卡';
        }

        function releaseLaunch() {
            if ((isCharging || isLaunchCharging) && !ball.active) {
                isCharging = false;
                isLaunchCharging = false;
                ball.launch(launchPower);
                launchPower = 0;
                powerBar.style.height = '0%';
                launchMobileBtn.classList.remove('charging');
            }
        }

        function handleKeyDown(e) {
            if (!gameRunning) return;
            switch (e.code) {
                case 'Space':
                    e.preventDefault();
                    if (!ball.active) isCharging = true;
                    break;
                case 'KeyZ':
                case 'ArrowLeft':
                    leftFlipper.activate();
                    break;
                case 'Slash':
                case 'ArrowRight':
                    rightFlipper.activate();
                    break;
            }
        }

        function handleKeyUp(e) {
            if (!gameRunning) return;
            switch (e.code) {
                case 'Space':
                    e.preventDefault();
                    releaseLaunch();
                    break;
                case 'KeyZ':
                case 'ArrowLeft':
                    leftFlipper.deactivate();
                    break;
                case 'Slash':
                case 'ArrowRight':
                    rightFlipper.deactivate();
                    break;
            }
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        window.addEventListener('blur', () => {
            isCharging = false;
            isLaunchCharging = false;
            leftFlipper && leftFlipper.deactivate();
            rightFlipper && rightFlipper.deactivate();
        });

        // 移动端按钮
        if (leftFlipperBtn) {
            leftFlipperBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameRunning) leftFlipper.activate();
            });
            leftFlipperBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (gameRunning) leftFlipper.deactivate();
            });
            leftFlipperBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (gameRunning) leftFlipper.activate();
            });
            leftFlipperBtn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                if (gameRunning) leftFlipper.deactivate();
            });
            leftFlipperBtn.addEventListener('mouseleave', () => {
                if (gameRunning) leftFlipper.deactivate();
            });
        }

        if (rightFlipperBtn) {
            rightFlipperBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameRunning) rightFlipper.activate();
            });
            rightFlipperBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (gameRunning) rightFlipper.deactivate();
            });
            rightFlipperBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (gameRunning) rightFlipper.activate();
            });
            rightFlipperBtn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                if (gameRunning) rightFlipper.deactivate();
            });
            rightFlipperBtn.addEventListener('mouseleave', () => {
                if (gameRunning) rightFlipper.deactivate();
            });
        }

        if (launchMobileBtn) {
            launchMobileBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameRunning && !ball.active) {
                    isLaunchCharging = true;
                    launchMobileBtn.classList.add('charging');
                }
            });
            launchMobileBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                releaseLaunch();
            });
            launchMobileBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (gameRunning && !ball.active) {
                    isLaunchCharging = true;
                    launchMobileBtn.classList.add('charging');
                }
            });
            launchMobileBtn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                releaseLaunch();
            });
            launchMobileBtn.addEventListener('mouseleave', () => {
                releaseLaunch();
            });
        }

        // 防止页面滚动（移动端）
        function preventTouchScroll(e) {
            if (e.target.tagName !== 'BUTTON') e.preventDefault();
        }
        document.addEventListener('touchmove', preventTouchScroll, { passive: false });

        // 启动预览关卡展示
        levelPreview.textContent = '第 1 关 · 随机关卡';
        // 初始化静态展示
        initGame();
        draw();
    </script>
</body>
</html>
