                                '</div>';
                        }

                        const commentClass = comment.commentType === 'resonance' ? 'resonance-comment' : '';

                        return `
                            <div class="comment-item ${commentClass}">
                                <div class="comment-content">
                                    <div class="comment-text">
                                        <span class="commenter-name">${comment.commenterName}</span>
                                        ${comment.content}
                                        <span class="comment-badge ${badgeClass}">${badgeText}</span>
                                    </div>
                                    <div class="comment-time">${comment.time}</div>
                                    ${repliesHtml}
                                </div>
                            </div>
                        `;
                    }).join('');

                    let aiCommentHtml = '';
                    if (aiComment) {
                        aiCommentHtml = `
                            <div class="comment-item">
                                <div class="comment-content">
                                    <div class="comment-text">
                                        <span class="commenter-name">${aiComment.commenterName}</span>
                                        ${aiComment.content}
                                        <span class="comment-badge">AI赏析</span>
                                    </div>
                                    <div class="comment-time">${aiComment.time}</div>
                                </div>
                            </div>
                        `;
                    }

                    commentsHtml = regularCommentsHtml + aiCommentHtml;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <div class="avatar"><img src="${poet.avatar}" alt="${poet.name}"></div>
                        <div class="poet-info">
                            <div class="poet-name">${poet.name}<span class="dynasty-badge">${poet.dynasty}</span></div>
                            <div class="post-time">${feed.time}</div>
                        </div>
                        <span class="more-btn">⋯</span>
                    </div>
                    <div class="card-content">
                        <div class="moment-text">${feed.content}</div>
                        ${poemHtml}
                        ${imageHtml}
                        ${locationHtml}
                        ${topicsHtml}
                    </div>
                    ${likesHtml}
                    <div class="card-actions">
                        <div class="action-item" onclick="toggleLike(this)">
                            <span class="heart-icon">♡</span> 赞
                        </div>
                        <div class="action-item" onclick="toggleComment(this, '${feed.id}')">
                            <span>💬</span> 评论
                        </div>
                        <div class="action-item" onclick="toggleShare(this)">
                            <span>🔗</span> 分享
                        </div>
                    </div>
                    <div class="comments-section" id="comments-${feed.id}">
                        ${commentsHtml}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function toggleLike(btn) {
            btn.classList.toggle('liked');
            const heartIcon = btn.querySelector('.heart-icon');
            if (btn.classList.contains('liked')) {
                heartIcon.textContent = '❤️';
                heartIcon.style.color = '#e74c3c';
                
                const rect = btn.getBoundingClientRect();
                const likeAnim = document.createElement('span');
                likeAnim.className = 'like-animation';
                likeAnim.textContent = '❤️';
                likeAnim.style.left = (rect.left + rect.width / 2 - 10) + 'px';
                likeAnim.style.top = (rect.top - 20) + 'px';
                document.body.appendChild(likeAnim);
                setTimeout(() => likeAnim.remove(), 600);
            } else {
                heartIcon.textContent = '♡';
                heartIcon.style.color = '#999';
            }
        }

        function toggleComment(btn, momentId) {
            currentMomentId = momentId;
            const inputBox = document.getElementById('global-input');
            inputBox.focus();
            inputBox.placeholder = '评论 ' + poets[getFeedById(momentId).poetId].name + '...';
        }

        function getFeedById(id) {
            return mockFeeds.find(f => f.id === id);
        }

        function checkInput() {
            const inputBox = document.getElementById('global-input');
            const sendBtn = document.getElementById('global-send');
            if (inputBox.value.trim()) {
                sendBtn.classList.remove('disabled');
            } else {
                sendBtn.classList.add('disabled');
            }
        }

        function sendComment() {
            const inputBox = document.getElementById('global-input');
            const sendBtn = document.getElementById('global-send');
            
            if (sendBtn.classList.contains('disabled')) return;
            
            const content = inputBox.value.trim();
            if (!content || !currentMomentId) return;

            const feed = getFeedById(currentMomentId);
            const newComment = {
                id: 'c' + Date.now(),
                commenterId: 'current_user',
                commenterName: '我',
                content: content,
                commentType: 'friend',
                time: '刚刚'
            };

            if (!feed.comments) feed.comments = [];
            feed.comments.push(newComment);
            feed.commentCount++;

            renderFeed(mockFeeds);
            
            inputBox.value = '';
            inputBox.placeholder = '发表评论...';
            sendBtn.classList.add('disabled');
            
            setTimeout(() => {
                const commentSection = document.getElementById('comments-' + currentMomentId);
                if (commentSection) {
                    commentSection.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }
            }, 100);
        }

        function toggleShare(btn) {
            alert('分享功能已触发');
        }

        document.getElementById('global-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendComment();
            }
        });
