<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockAI - 智能股票分析系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #0a0e17; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ===== 顶栏 ===== */
.top-bar { background: #111827; border-bottom: 1px solid #1e293b; padding: 0 12px; height: 48px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.index-ticker { flex: 1; overflow: hidden; display: flex; gap: 24px; font-size: 12px; }
.index-item { display: flex; align-items: center; gap: 8px; white-space: nowrap; cursor: pointer; border-radius: 4px; padding: 2px 6px; transition: background 0.15s; }
.index-item:hover { background: #1e293b; }
.index-item.active { background: #1e293b; border: 1px solid #3b82f6; }
.index-name { color: #94a3b8; }
.index-price { font-weight: 600; font-family: 'Consolas', monospace; }
.index-change { font-family: 'Consolas', monospace; }
.up { color: #ef4444; }
.down { color: #22c55e; }
.top-actions { display: flex; gap: 6px; align-items: center; }
.top-actions button { padding: 5px 10px; background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; font-size: 11px; cursor: pointer; white-space: nowrap; }
.top-actions button:hover { border-color: #3b82f6; color: #e2e8f0; }
.top-actions button.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
.refresh-tag { font-size: 11px; color: #64748b; white-space: nowrap; }
#conn-status { font-size: 11px; padding: 3px 8px; border-radius: 10px; }
#conn-status.on { color: #22c55e; background: #052e16; }
#conn-status.off { color: #ef4444; background: #450a0a; }

/* ===== 主体 ===== */
.main-body { flex: 1; display: flex; overflow: hidden; }

/* ===== 左侧面板 ===== */
.left-panel { width: 280px; background: #111827; border-right: 1px solid #1e293b; display: flex; flex-direction: column; flex-shrink: 0; }
.panel-section { padding: 10px; }
.panel-section h3 { font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
.stock-search-row { display: flex; gap: 4px; }
.stock-search-row input { flex: 1; padding: 7px 10px; background: #0a0e17; border: 1px solid #1e293b; border-radius: 4px; color: #e2e8f0; font-size: 12px; outline: none; }
.stock-search-row input:focus { border-color: #3b82f6; }
.stock-search-row button { padding: 7px 12px; background: #3b82f6; border: none; border-radius: 4px; color: #fff; font-size: 12px; cursor: pointer; }
#search-results { max-height: 180px; overflow-y: auto; margin-top: 6px; }
.search-item { padding: 7px 10px; background: #0a0e17; border: 1px solid #1e293b; border-radius: 4px; margin-bottom: 3px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
.search-item:hover { border-color: #3b82f6; }
.search-item .s-name { font-weight: 500; }
.search-item .s-code { color: #64748b; font-size: 11px; }
.divider { border-top: 1px solid #1e293b; margin: 0 10px; }

/* 自选股列表 */
#watchlist { flex: 1; overflow-y: auto; padding: 6px 10px; }
.watch-item { padding: 8px 10px; background: #0a0e17; border: 1px solid #1e293b; border-radius: 4px; margin-bottom: 3px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; transition: all 0.15s; }
.watch-item:hover { border-color: #3b82f6; }
.watch-item.active { border-color: #3b82f6; background: #0f1a2e; }
.watch-item .w-info { display: flex; flex-direction: column; gap: 2px; }
.watch-item .w-name { font-weight: 500; }
.watch-item .w-code { color: #64748b; font-size: 11px; }
.watch-item .w-price { text-align: right; }
.watch-item .w-current { font-weight: 600; font-size: 14px; font-family: 'Consolas', monospace; }
.watch-item .w-change { font-size: 11px; font-family: 'Consolas', monospace; }
.watch-item .w-del { color: #ef4444; font-size: 14px; padding: 2px 6px; cursor: pointer; opacity: 0; transition: opacity 0.15s; }
.watch-item:hover .w-del { opacity: 1; }
.watch-empty { text-align: center; color: #475569; font-size: 12px; padding: 20px; }
.watch-section-title { padding: 8px 10px 4px; font-size: 11px; color: #64748b; }

/* ===== 右侧主区域 ===== */
.right-panel { flex: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }

/* 个股详情 */
.stock-detail { background: #111827; border-bottom: 1px solid #1e293b; padding: 10px 16px; flex-shrink: 0; }
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.detail-header .stock-title { font-size: 18px; font-weight: 700; }
.detail-header .stock-code-text { font-size: 13px; color: #64748b; }
.detail-stats { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
.stat-item { text-align: center; }
.stat-label { font-size: 10px; color: #64748b; margin-bottom: 2px; }
.stat-value { font-size: 13px; font-weight: 600; font-family: 'Consolas', monospace; }
.stat-item.up .stat-value { color: #ef4444; }
.stat-item.down .stat-value { color: #22c55e; }

/* 图表区域 */
.chart-area { flex-shrink: 0; display: flex; flex-direction: column; padding: 8px 12px; height: 420px; min-height: 280px; }
.chart-tabs { display: flex; gap: 2px; margin-bottom: 6px; }
.chart-tab { padding: 5px 14px; background: #111827; border: 1px solid #1a2332; border-radius: 6px; color: #64748b; font-size: 11px; cursor: pointer; font-weight: 500; letter-spacing: 0.5px; }
.chart-tab:hover { border-color: #3b82f6; color: #e2e8f0; }
.chart-tab.active { background: #1a2744; border-color: #3b82f6; color: #93c5fd; box-shadow: 0 0 12px rgba(59,130,246,0.15); }
.chart-container { flex: 1; background: #0a0e14; border: 1px solid #1a2332; border-radius: 8px; position: relative; min-height: 250px; overflow: hidden; }
.chart-container canvas { width: 100%; height: 100%; display: block; }

/* 价格闪烁 */
@keyframes price-flash-up { 0% { background: transparent; } 50% { background: rgba(239, 68, 68, 0.2); } 100% { background: transparent; } }
@keyframes price-flash-down { 0% { background: transparent; } 50% { background: rgba(34, 197, 94, 0.2); } 100% { background: transparent; } }
.price-flash-up { animation: price-flash-up 0.6s ease-out; }
.price-flash-down { animation: price-flash-down 0.6s ease-out; }

button { transition: transform 0.1s ease, opacity 0.15s ease, border-color 0.15s ease, background 0.15s ease; }
button:active { transform: scale(0.95); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #0a0e17; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

/* ===== AI 标签页布局 ===== */
.ai-tab-container { display: flex; background: #111827; border-top: 2px solid #3b82f6; flex-shrink: 0; min-height: 140px; }
.ai-tab-buttons { width: 140px; display: flex; flex-direction: column; padding: 8px; gap: 4px; border-right: 1px solid #1e293b; flex-shrink: 0; }
.ai-tab-btn { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: transparent; border: 1px solid transparent; border-radius: 6px; color: #94a3b8; font-size: 12px; cursor: pointer; text-align: left; transition: all 0.15s; }
.ai-tab-btn:hover { background: #1e293b; color: #e2e8f0; border-color: #334155; }
.ai-tab-btn.active { background: #0f1a2e; border-color: #3b82f6; color: #93c5fd; }
.ai-tab-btn .ai-tab-icon { font-size: 14px; flex-shrink: 0; }
.ai-tab-content { flex: 1; overflow-y: auto; max-height: 380px; min-width: 0; }
.ai-tab-pane { display: none; padding: 12px 14px; }
.ai-tab-pane.active { display: block; }

/* AI选股/辩论面板 */
.ai-pick-loading { display: none; align-items: center; gap: 8px; padding: 20px; color: #64748b; font-size: 13px; }
.ai-pick-loading.show { display: flex; }
.pick-loading-dot { width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; animation: pick-pulse 1s infinite; }
@keyframes pick-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.5); } }
.pick-placeholder { text-align: center; color: #475569; font-size: 13px; padding: 30px; }

.ai-pick-results { max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.pick-result-card { background: #0a0e17; border: 1px solid #1e293b; border-left: 3px solid #3b82f6; border-radius: 6px; padding: 10px 12px; font-size: 12px; }
.pick-result-card .pr-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.pick-result-card .pr-name { font-weight: 700; font-size: 14px; }
.pick-result-card .pr-code { color: #64748b; font-size: 11px; }
.pick-result-card .pr-price { font-weight: 600; font-family: Consolas, monospace; font-size: 14px; }
.pick-result-card .pr-change { font-family: Consolas, monospace; font-size: 12px; }
.pick-result-card .pr-reason { color: #94a3b8; line-height: 1.6; margin-top: 6px; padding-top: 6px; border-top: 1px solid #1e293b; }
.pick-result-card .pr-add { padding: 3px 10px; background: #3b82f6; border: none; border-radius: 3px; color: #fff; font-size: 11px; cursor: pointer; }
.pick-result-card .pr-add:hover { background: #2563eb; }
.pick-result-card .pr-add.added { background: #1e293b; color: #64748b; cursor: default; }

/* 辩论 */
.debate-current-stock { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 10px; background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(59,130,246,0.06)); border: 1px solid rgba(124,58,237,0.2); border-radius: 8px; }
.debate-stock-badge { padding: 3px 10px; background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); border-radius: 12px; font-size: 10px; color: #c4b5fd; font-weight: 600; white-space: nowrap; }
.debate-stock-name { color: #64748b; font-size: 12px; }
#debate-stock-name { color: #e2e8f0; font-weight: 600; font-size: 13px; }
.debate-intro { font-size: 11px; color: #64748b; line-height: 1.8; background: linear-gradient(135deg, #0f1720, #111827); border: 1px solid #1e293b; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
.debate-intro strong { color: #94a3b8; }
.debate-btn-row { display: flex; gap: 10px; margin-bottom: 8px; }
.debate-start-btn { flex: 1; padding: 10px 0; background: linear-gradient(135deg, #7c3aed, #6d28d9); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
.debate-start-btn:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); transform: translateY(-1px); }
.debate-start-btn:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; transform: none; }
.debate-progress { margin: 8px 0 6px; display: none; }
.debate-progress.active { display: block; }
.debate-progress-steps { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.debate-step { padding: 6px 14px; background: #0f1720; border: 1px solid #1e293b; border-radius: 20px; font-size: 11px; color: #475569; transition: all 0.3s; display: flex; align-items: center; gap: 5px; }
.debate-step .step-dot { width: 6px; height: 6px; border-radius: 50%; background: #334155; transition: all 0.3s; }
.debate-step.running { border-color: #7c3aed; color: #c4b5fd; background: rgba(124,58,237,0.08); }
.debate-step.running .step-dot { background: #a78bfa; animation: pulse-dot 1.2s infinite; }
.debate-step.done { border-color: #22c55e; color: #86efac; background: rgba(34,197,94,0.06); }
.debate-step.done .step-dot { background: #4ade80; }
@keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.6); } }

.debate-agent-card { background: linear-gradient(135deg, #0f1720, #111827); border: 1px solid #1e293b; border-radius: 10px; margin-bottom: 8px; overflow: hidden; transition: all 0.2s; }
.debate-agent-card:hover { border-color: #334155; }
.debate-agent-card.role-bull { border-left: 3px solid #22c55e; }
.debate-agent-card.role-bear { border-left: 3px solid #ef4444; }
.debate-agent-card.role-neutral { border-left: 3px solid #f59e0b; }
.debate-agent-card.role-holistic { border-left: 3px solid #3b82f6; }
.debate-agent-card.role-decision { border-left: 3px solid #7c3aed; background: linear-gradient(135deg, rgba(124,58,237,0.06), rgba(59,130,246,0.04)); border-color: rgba(124,58,237,0.3); }
.debate-agent-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }
.debate-agent-header:hover { background: rgba(30,41,59,0.6); }
.debate-agent-icon { font-size: 20px; flex-shrink: 0; }
.debate-agent-name { font-weight: 600; font-size: 13px; flex: 1; }
.role-bull .debate-agent-name { color: #86efac; }
.role-bear .debate-agent-name { color: #fca5a5; }
.role-neutral .debate-agent-name { color: #fcd34d; }
.role-holistic .debate-agent-name { color: #93c5fd; }
.role-decision .debate-agent-name { color: #c4b5fd; }
.debate-agent-badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.role-bull .debate-agent-badge { background: rgba(34,197,94,0.1); color: #4ade80; }
.role-bear .debate-agent-badge { background: rgba(239,68,68,0.1); color: #f87171; }
.role-neutral .debate-agent-badge { background: rgba(245,158,11,0.1); color: #fbbf24; }
.role-holistic .debate-agent-badge { background: rgba(59,130,246,0.1); color: #60a5fa; }
.role-decision .debate-agent-badge { background: rgba(124,58,237,0.15); color: #a78bfa; }
.debate-agent-toggle { color: #64748b; font-size: 12px; transition: transform 0.25s; flex-shrink: 0; }
.debate-agent-card.open .debate-agent-toggle { transform: rotate(180deg); }
.debate-agent-body { display: none; padding: 14px; font-size: 12px; color: #cbd5e1; line-height: 1.8; max-height: 350px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; border-top: 1px solid #1e293b; background: rgba(0,0,0,0.15); }
.debate-agent-card.open .debate-agent-body { display: block; }
.debate-agent-body::-webkit-scrollbar { width: 4px; }
.debate-agent-body::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

.debate-decision-card { background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(59,130,246,0.06)); border: 1px solid rgba(124,58,237,0.35); border-radius: 12px; padding: 18px 20px; margin-top: 4px; }
.debate-decision-card .dd-header { font-size: 15px; font-weight: 700; color: #c4b5fd; margin-bottom: 14px; text-align: center; }
.debate-decision-card .dd-verdict { text-align: center; font-size: 14px; font-weight: 700; padding: 8px 20px; border-radius: 20px; display: inline-block; margin-bottom: 14px; }
.dd-verdict.bullish { background: rgba(34,197,94,0.12); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
.dd-verdict.bearish { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
.dd-verdict.neutral { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
.debate-decision-card .dd-prob-row { display: flex; gap: 10px; margin-bottom: 14px; }
.debate-decision-card .dd-prob-item { flex: 1; background: rgba(0,0,0,0.25); border: 1px solid #1e293b; border-radius: 8px; padding: 12px; text-align: center; }
.debate-decision-card .dd-prob-item:hover { border-color: #334155; }
.dd-prob-item .dd-prob-label { font-size: 11px; color: #64748b; font-weight: 500; }
.dd-prob-item .dd-prob-value { font-size: 20px; font-weight: 700; font-family: Consolas, monospace; margin-top: 4px; }
.dd-prob-item.up .dd-prob-value { color: #22c55e; }
.dd-prob-item.down .dd-prob-value { color: #ef4444; }
.dd-prob-item.flat .dd-prob-value { color: #f59e0b; }
.debate-decision-card .dd-section { margin-bottom: 12px; }
.debate-decision-card .dd-section-title { font-size: 12px; font-weight: 600; color: #93c5fd; margin-bottom: 6px; }
.debate-decision-card .dd-section-text { font-size: 12px; color: #cbd5e1; line-height: 1.7; white-space: pre-wrap; }

/* 回测 */
.metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
.metric-card { background: #0a0e17; border: 1px solid #1e293b; border-radius: 8px; padding: 12px; text-align: center; }
.metric-label { font-size: 10px; color: #64748b; margin-bottom: 4px; }
.metric-value { font-size: 1.3em; font-weight: 700; }
.metric-up { color: #ef4444; }
.metric-down { color: #22c55e; }

/* 弹窗 */
.key-popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
.key-popup-overlay.show { display: flex; }
.key-popup { background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 20px 24px; width: 420px; max-width: 90vw; }
.key-popup-title { font-size: 14px; color: #e2e8f0; margin-bottom: 14px; }
.key-popup-title span { color: #93c5fd; font-weight: 600; }
.key-popup input { width: 100%; padding: 8px 10px; background: #0a0e17; border: 1px solid #334155; border-radius: 5px; color: #e2e8f0; font-size: 13px; box-sizing: border-box; }
.key-popup input:focus { outline: none; border-color: #3b82f6; }
.key-popup-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
.key-popup-clear { margin-right: auto; padding: 7px 14px; background: transparent; border: 1px solid #ef4444; border-radius: 4px; color: #ef4444; cursor: pointer; font-size: 12px; }
.key-popup-clear:hover { background: rgba(239,68,68,0.1); }
.key-popup-save { padding: 7px 18px; background: #3b82f6; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 12px; font-weight: 600; }
.key-popup-save:hover { background: #2563eb; }
.key-popup-cancel { padding: 7px 14px; background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; cursor: pointer; font-size: 12px; }
.key-popup-cancel:hover { border-color: #64748b; color: #e2e8f0; }

/* 策略编辑 */
.config-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.config-field-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; }
#ai-tab-config select { width: 100%; padding: 9px 12px; background: #0a0e17; border: 1px solid #1e293b; border-radius: 6px; color: #e2e8f0; font-size: 13px; outline: none; cursor: pointer; }
#ai-tab-config select:focus { border-color: #3b82f6; }
.pick-key-btn { padding: 6px 10px; background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #93c5fd; cursor: pointer; font-size: 12px; white-space: nowrap; }
.pick-key-btn:hover { border-color: #3b82f6; }
.pick-key-btn.has-key { border-color: #22c55e; color: #86efac; }
.config-key-row { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: #0a0e17; border: 1px solid #1e293b; border-radius: 6px; }
.config-key-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
.config-key-dot.set { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.config-key-status { font-size: 13px; color: #64748b; flex: 1; }
.config-key-status.set { color: #86efac; }

.strategy-list-wrap { display: flex; gap: 8px; align-items: flex-start; }
.strategy-list { flex: 1; display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
.strategy-row { display: flex; align-items: center; gap: 4px; background: #0a0e17; border: 1px solid #1e293b; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
.strategy-row:hover { border-color: #334155; }
.strategy-row.selected { border-color: #3b82f6; }
.strategy-row .s-radio { width: 12px; height: 12px; border: 2px solid #334155; border-radius: 50%; flex-shrink: 0; position: relative; }
.strategy-row.selected .s-radio { border-color: #3b82f6; }
.strategy-row.selected .s-radio::after { content: ''; width: 5px; height: 5px; background: #3b82f6; border-radius: 50%; position: absolute; top: 1.5px; left: 1.5px; }
.strategy-row .s-name { flex: 1; font-size: 12px; font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.strategy-row.selected .s-name { color: #93c5fd; }
.strategy-row .s-edit { font-size: 11px; padding: 3px 6px; background: #1e293b; border: 1px solid #334155; border-radius: 3px; color: #94a3b8; cursor: pointer; white-space: nowrap; }
.strategy-row .s-edit:hover { border-color: #3b82f6; color: #e2e8f0; }
.strategy-row .s-edit.has-content { border-color: #22c55e; color: #86efac; }
.strategy-row .s-del { color: #64748b; font-size: 14px; padding: 0 4px; cursor: pointer; border: none; background: transparent; opacity: 0; }
.strategy-row:hover .s-del { opacity: 1; }

function generateStockData() {
  const now = new Date();
  const seed = (now.getHours()*60+now.getMinutes())*7 + now.getSeconds()*3;
  function prng(s) { let x = Math.sin(s*9301+49297)*49297; return x - Math.floor(x); }

  stockData = {};
  STOCK_POOL.forEach((s, i) => {
    const r = prng(seed+i);
    const change = (r-0.48)*s.vol*100;
    const pct = (change/s.base*100);
    const current = s.base+change;
    stockData[s.code] = {
      ...s,
      current: Math.round(current*100)/100,
      open: Math.round((s.base+change*prng(seed+i+100))*100)/100,
      prev_close: s.base,
      high: Math.round((current+Math.abs(change)*prng(seed+i+200))*100)/100,
      low: Math.round((current-Math.abs(change)*prng(seed+i+300))*100)/100,
      change: Math.round(change*100)/100,
      change_pct: Math.round(pct*100)/100,
      volume: Math.floor((5000000+Math.abs(change)*2000000)*prng(seed+i+400)),
      amount: Math.round(current*(5000000+Math.abs(change)*2000000)*prng(seed+i+400)/10000),
      turnover: Math.round(prng(seed+i+500)*8*100)/100,
      pe: Math.round((s.base/2.5+prng(seed+i)*20)*100)/100,
      pb: Math.round((1.5+prng(seed+i+600)*5)*100)/100,
    };
  });

  stockData._indices = INDICES.map((ix, i) => {
    const r = prng(seed+1000+i);
    const change = (r-0.48)*ix.vol*100;
    const current = ix.base+change;
    return {
      ...ix,
      current: Math.round(current*100)/100,
      change: Math.round(change*100)/100,
      change_pct: Math.round((change/ix.base*100)*100)/100,
    };
  });
}

// ==================== 图表 ====================
function generateKlineData(code, period, count) {
  const s = STOCK_POOL.find(x => x.code === code);
  if (!s) return [];
  let price = s.base;
  const data = [];
  const now = new Date();

  for (let i = count; i >= 0; i--) {
    let d = new Date(now);
    if (period === 'day') d.setDate(d.getDate() - i);
    else if (period === 'week') d.setDate(d.getDate() - i * 7);
    else if (period === 'month') d.setMonth(d.getMonth() - i);

    const r = Math.sin(i * 0.3) * s.vol * s.base * 0.5 + (Math.random() - 0.48) * s.vol * s.base * 0.8;
    const open = price;
    const close = price + r;
    const high = Math.max(open, close) + Math.abs(r) * Math.random() * 0.5;
    const low = Math.min(open, close) - Math.abs(r) * Math.random() * 0.5;
    const v = Math.floor((5000000 + Math.abs(r) * 100000) * Math.random());

    data.push({
      date: d.toISOString().slice(0, 10),
      open: Math.round(Math.max(open, 1) * 100) / 100,
      close: Math.round(Math.max(close, 1) * 100) / 100,
      high: Math.round(Math.max(high, 1) * 100) / 100,
      low: Math.round(Math.max(low, 1) * 100) / 100,
      volume: v,
      amount: Math.round(v * close / 10000),
    });
    price = close;
  }
  return data;
}

function generateMinuteData(code) {
  const s = STOCK_POOL.find(x => x.code === code);
  if (!s) return [];
  const data = [];
  let price = s.base;
  const now = new Date();

  for (let i = 0; i <= 240; i++) {
    const t = new Date(now);
    t.setHours(9, 30, 0, 0);
    t.setMinutes(t.getMinutes() + i);
    if (t.getHours() === 11 && t.getMinutes() > 30) { t.setHours(13, 0, 0, 0); t.setMinutes(t.getMinutes() + i - 120); }

    const r = (Math.random() - 0.48) * s.vol * s.base * 0.08;
    price += r;
    const vol = Math.floor((50000 + Math.abs(r) * 5000) * Math.random());
    const avgPrice = Math.round(price * 100) / 100;

    data.push({
      time: t.toTimeString().slice(0, 5),
      price: avgPrice,
      volume: vol,
      avg_price: avgPrice,
    });
  }
  return data;
}

function calcMA(data, n) {
  return data.map((_, i) => {
    if (i < n - 1) return null;
    let sum = 0;
    for (let j = i - n + 1; j <= i; j++) sum += data[j].close;
    return Math.round(sum / n * 100) / 100;
  });
}

function drawMinuteChart(data) {
  const canvas = document.getElementById('chart-canvas');
  const container = document.getElementById('chart-container');
  const W = canvas.width = container.clientWidth * 2;
  const H = canvas.height = (container.clientHeight - 2) * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const cw = W / 2;
  const ch = H / 2;
  const pad = { top: 15, right: 60, bottom: 30, left: 55 };
  const pw = cw - pad.left - pad.right;
  const ph = (ch - 48) - pad.top - pad.bottom;

  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, cw, ch);

  if (!data || data.length === 0) return;

  const prices = data.map(d => d.price);
  const yMin = Math.min(...prices) * 0.998;
  const yMax = Math.max(...prices) * 1.002;
  const volMax = Math.max(...data.map(d => d.volume));
  const prevClose = data[0]?.price || prices[0];

  const xScale = i => pad.left + (i / (data.length - 1)) * pw;
  const yScale = p => pad.top + (1 - (p - yMin) / (yMax - yMin)) * ph;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * ph;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(cw - pad.right, y); ctx.stroke();
  }

  // Prev close line
  const pcY = yScale(prevClose);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad.left, pcY); ctx.lineTo(cw - pad.right, pcY); ctx.stroke();
  ctx.setLineDash([]);

  // Area fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ph);
  grad.addColorStop(0, 'rgba(245, 166, 35, 0.2)');
  grad.addColorStop(1, 'rgba(245, 166, 35, 0.02)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(xScale(0), pad.top + ph);
  data.forEach((d, i) => ctx.lineTo(xScale(i), yScale(d.price)));
  ctx.lineTo(xScale(data.length - 1), pad.top + ph);
  ctx.closePath();
  ctx.fill();

  // Price line
  ctx.strokeStyle = '#f5a623';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  data.forEach((d, i) => {
    i === 0 ? ctx.moveTo(xScale(i), yScale(d.price)) : ctx.lineTo(xScale(i), yScale(d.price));
  });
  ctx.stroke();

  // Volume bars
  const volH = 40;
  const volTop = pad.top + ph + 10;
  data.forEach((d, i) => {
    const barW = Math.max(0.5, pw / data.length * 0.8);
    const h = (d.volume / volMax) * volH;
    const x = xScale(i);
    ctx.fillStyle = d.price >= prevClose ? 'rgba(239,68,68,0.5)' : 'rgba(34,197,94,0.5)';
    ctx.fillRect(x - barW / 2, volTop - h, barW, h);
  });

  // Y-axis labels
  ctx.fillStyle = '#64748b';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = yMin + (i / 4) * (yMax - yMin);
    const y = pad.top + (1 - i / 4) * ph;
    ctx.fillText(val.toFixed(2), pad.left - 6, y + 3);
  }

  // X-axis time labels
  ctx.textAlign = 'center';
  const hourMarks = ['09:30', '10:30', '11:30', '14:00', '15:00'];
  hourMarks.forEach(t => {
    const idx = data.findIndex(d => d.time >= t);
    if (idx >= 0) {
      ctx.fillText(t, xScale(idx), pad.top + ph + 26);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.beginPath(); ctx.moveTo(xScale(idx), pad.top); ctx.lineTo(xScale(idx), pad.top + ph); ctx.stroke();
    }
  });
}

function drawKlineChart(klines, mode) {
  const canvas = document.getElementById('chart-canvas');
  const container = document.getElementById('chart-container');
  const W = canvas.width = container.clientWidth * 2;
  const H = canvas.height = (container.clientHeight - 2) * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const cw = W / 2;
  const ch = H / 2;
  const pad = { top: 15, right: 60, bottom: 30, left: 55 };
  const pw = cw - pad.left - pad.right;
  const ph = (ch - 48) - pad.top - pad.bottom;

  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, cw, ch);

  if (!klines || klines.length === 0) return;

  const highs = klines.map(d => d.high);
  const lows = klines.map(d => d.low);
  const yMin = Math.min(...lows) * 0.995;
  const yMax = Math.max(...highs) * 1.005;
  const volMax = Math.max(...klines.map(d => d.volume));

  const xScale = i => pad.left + (i / (klines.length - 1)) * pw;
  const yScale = p => pad.top + (1 - (p - yMin) / (yMax - yMin)) * ph;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * ph;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(cw - pad.right, y); ctx.stroke();
  }

  // MA lines
  const ma5 = calcMA(klines, 5);
  const ma10 = calcMA(klines, 10);
  const ma20 = calcMA(klines, 20);
  function drawMA(ma, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    let started = false;
    klines.forEach((d, i) => {
      if (ma[i] === null) return;
      const x = xScale(i), y = yScale(ma[i]);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }
  drawMA(ma5, '#3b82f6');
  drawMA(ma10, '#8b5cf6');
  drawMA(ma20, '#f59e0b');

  // Candles
  const candleW = Math.max(1, Math.min(pw / klines.length * 0.7, 8));
  klines.forEach((d, i) => {
    const x = xScale(i);
    const isUp = d.close >= d.open;
    const color = isUp ? '#ef4444' : '#22c55e';

    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, yScale(d.high));
    ctx.lineTo(x, yScale(d.low));
    ctx.stroke();

    const y1 = yScale(d.open), y2 = yScale(d.close);
    const bodyH = Math.max(1, Math.abs(y2 - y1));
    if (isUp) {
      ctx.fillStyle = color;
      ctx.fillRect(x - candleW / 2, y2, candleW, bodyH);
    } else {
      ctx.fillStyle = 'transparent';
      ctx.strokeRect(x - candleW / 2, y1, candleW, bodyH);
    }
  });

  // Volume bars
  const volH = 40;
  const volTop = pad.top + ph + 10;
  klines.forEach((d, i) => {
    const x = xScale(i);
    const isUp = d.close >= d.open;
    const h = (d.volume / volMax) * volH;
    ctx.fillStyle = isUp ? 'rgba(239,68,68,0.4)' : 'rgba(34,197,94,0.4)';
    ctx.fillRect(x - candleW / 2, volTop - h, candleW, h);
  });

  // Y-axis labels
  ctx.fillStyle = '#64748b';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = yMin + (i / 4) * (yMax - yMin);
    const y = pad.top + (1 - i / 4) * ph;
    ctx.fillText(val.toFixed(2), pad.left - 6, y + 3);
  }

  // X-axis labels
  ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(klines.length / 6));
  klines.forEach((d, i) => {
    if (i % step === 0 || i === klines.length - 1) {
      ctx.fillText(d.date.slice(5), xScale(i), pad.top + ph + 26);
    }
  });
}

function refreshChart() {
  if (!currentStock) return;
  const canvas = document.getElementById('chart-canvas');
  if (!canvas) return;

  if (chartMode === 'minute') {
    const data = generateMinuteData(currentStock.code);
    drawMinuteChart(data);
  } else {
    const count = chartMode === 'day' ? 60 : chartMode === 'week' ? 52 : 24;
    const data = generateKlineData(currentStock.code, chartMode, count);
    drawKlineChart(data, chartMode);
  }
}

}

  refreshTimer = setInterval(() => {
    countdown--;

    if (countdown <= 0) {
      refreshAll();
      countdown = 5;
    }
  }, 1000);
}

function renderStrategies() {
  const el = document.getElementById('strategy-list');
  if (strategies.length === 0) {
    strategies.push({ name: '默认策略', text: '找出近期走势稳健、成交量放大、且市盈率较低的优质蓝筹股' });
    saveStrategies();
  }

  el.innerHTML = strategies.map((s, i) => {
    const hasContent = s.text && s.text.trim().length > 0;
    const selected = currentStrategyIdx === i ? ' selected' : '';
    return `<div class="strategy-row${selected}" onclick="selectStrategy(${i})">
      <div class="s-radio"></div>
      <span class="s-name">${s.name}</span>
      <button class="s-edit${hasContent ? ' has-content' : ''}" onclick="event.stopPropagation();openStrategyPopup(${i})">编辑</button>
      <button class="s-del" onclick="event.stopPropagation();deleteStrategy(${i})">&times;</button>
    </div>`;
  }).join('') + `<div class="strategy-add-btn" onclick="addStrategy()">+ 添加策略</div>`;

  if (currentStrategyIdx === null && strategies.length > 0) {
    selectStrategy(0);
  }
}

function selectStrategy(idx) {
  currentStrategyIdx = idx;
  renderStrategies();
}

function addStrategy() {
  strategies.push({ name: `策略 ${strategies.length + 1}`, text: '' });
  currentStrategyIdx = strategies.length - 1;
  saveStrategies();
  renderStrategies();
}

function deleteStrategy(idx) {
  if (strategies.length <= 1) return;
  strategies.splice(idx, 1);
  if (currentStrategyIdx >= strategies.length) currentStrategyIdx = strategies.length - 1;
  if (currentStrategyIdx < 0) currentStrategyIdx = 0;
  saveStrategies();
  renderStrategies();
}

function saveStrategies() {
  localStorage.setItem('stockai-strategies', JSON.stringify(strategies));
}

function openStrategyPopup(idx) {
  currentStrategyIdx = idx;
  document.getElementById('strategy-popup-textarea').value = strategies[idx]?.text || '';
  document.getElementById('strategy-popup-overlay').classList.add('show');
}

function closeStrategyPopup() {
  document.getElementById('strategy-popup-overlay').classList.remove('show');
}

function saveStrategy() {
  const text = document.getElementById('strategy-popup-textarea').value;
  if (currentStrategyIdx !== null && strategies[currentStrategyIdx]) {
    strategies[currentStrategyIdx].text = text;
    saveStrategies();
    renderStrategies();
  }
  closeStrategyPopup();
}

function clearStrategy() {
  document.getElementById('strategy-popup-textarea').value = '';
}

function startAiPick() {
  const strategy = strategies[currentStrategyIdx];
  const strategyText = strategy?.text || '';

  const loading = document.getElementById('ai-pick-loading');
  const results = document.getElementById('ai-pick-results');
  const btn = document.getElementById('btn-ai-pick');

  loading.classList.add('show');
  results.innerHTML = '';
  btn.disabled = true;
  btn.textContent = '分析中...';

  setTimeout(() => {
    const allStocks = STOCK_POOL.map(sp => stockData[sp.code]).filter(Boolean);
    const scored = allStocks.map(s => {
      let score = Math.random() * 100;
      if (strategyText.includes('市盈率') || strategyText.includes('PE')) score += (30 - s.pe) * 2;
      if (strategyText.includes('放量') || strategyText.includes('成交量')) score += s.turnover * 5;
      if (strategyText.includes('蓝筹') || strategyText.includes('优质')) score += (s.base > 50 ? 20 : 0);
      if (strategyText.includes('稳健') || strategyText.includes('走势')) score += s.change_pct > 0 ? 15 : -5;
      if (strategyText.includes('银行')) score += s.name.includes('银行') ? 50 : 0;
      if (strategyText.includes('龙头')) score += (s.base > 100 ? 25 : 0);
      return { ...s, score };
    });
    scored.sort((a, b) => b.score - a.score);
    const picks = scored.slice(0, 6);

    const reasons = [
      '市盈率处于历史低位，估值安全边际充足',
      '近期成交量持续放大，资金关注度高',
      '走势稳健，均线多头排列，趋势向好',
      '基本面优秀，ROE连续多年保持高位',
      '行业龙头地位稳固，市场占有率领先',
      '技术面突破关键压力位，上涨空间打开',
    ];

    results.innerHTML = picks.map((p, i) => {
      const cls = p.change >= 0 ? 'up' : 'down';
      const sign = p.change >= 0 ? '+' : '';
      const added = watchlist.some(w => w.code === p.code);
      return `<div class="pick-result-card">
        <div class="pr-header">
          <div>
            <span class="pr-name">${p.name}</span>
            <span class="pr-code">${p.code}</span>
          </div>
          <div>
            <span class="pr-price">${p.current.toFixed(2)}</span>
            <span class="pr-change ${cls}">${sign}${p.change_pct}%</span>
          </div>
        </div>
        <div class="pr-reason">${reasons[i]}</div>
        <div style="text-align:right;margin-top:6px">
          <button class="pr-add${added ? ' added' : ''}" onclick="event.stopPropagation();${added ? '' : `addToWatchlist('${p.code}','${p.name}')`}">${added ? '已添加' : '+ 加入自选'}</button>
        </div>
      </div>`;
    }).join('');

    loading.classList.remove('show');
    btn.disabled = false;
    btn.textContent = '🔍 开始选股';
  }, 2000);
}

      text: `【明日趋势综合判定】\n${s.name}(${s.code})：震荡偏强，短期看多但需谨慎追高\n\n【量化概率结果】\n- 明日上涨概率：48.5%\n- 明日下跌概率：32.0%\n- 明日横盘震荡概率：19.5%\n\n【核心看多逻辑】\n1. 技术面均线金叉+多方炮形态，短期趋势偏多\n2. 估值处于合理区间，基本面支撑当前价格\n3. 成交量放大表明市场关注度提升\n\n【核心看空风险】\n1. 放量滞涨信号需警惕，防止主力借机出货\n2. 板块轮动加快，追高风险较大\n3. 大盘环境方向不明，系统性风险不可忽视\n\n【明日关键价位】\n- 支撑位：${(s.current*0.97).toFixed(2)}（20日均线附近）\n- 压力位：${(s.current*1.05).toFixed(2)}（前高压力区）` },
  ];

  let roundIdx = 0;
  function renderRound() {
    if (roundIdx >= rounds.length) {
      btn.disabled = false;
      btn.textContent = '🚀 开始辩论';
      return;
    }

    // Update progress
    for (let i = 0; i < steps.length; i++) {
      const stepEl = document.getElementById(`debate-step-${i}`);
      if (i < roundIdx) stepEl.className = 'debate-step done';
      else if (i === roundIdx) stepEl.className = 'debate-step running';
    }

    const r = rounds[roundIdx];
    if (r.role === 'decision') {
      // Decision card
      results.innerHTML += `<div class="debate-decision-card">
        <div class="dd-header">${r.icon} ${r.agent}</div>
        <div style="text-align:center"><span class="dd-verdict bullish">震荡偏强</span></div>
        <div class="dd-prob-row">
          <div class="dd-prob-item up"><div class="dd-prob-label">上涨</div><div class="dd-prob-value">48.5%</div></div>
          <div class="dd-prob-item down"><div class="dd-prob-label">下跌</div><div class="dd-prob-value">32.0%</div></div>
          <div class="dd-prob-item flat"><div class="dd-prob-label">震荡</div><div class="dd-prob-value">19.5%</div></div>
        </div>
        <div class="dd-section">
          <div class="dd-section-title">核心看多逻辑</div>
          <div class="dd-section-text">1. 技术面均线金叉+多方炮形态，短期趋势偏多\n2. 估值处于合理区间，基本面支撑当前价格\n3. 成交量放大表明市场关注度提升</div>
        </div>
        <div class="dd-section">
          <div class="dd-section-title">核心看空风险</div>
          <div class="dd-section-text">1. 放量滞涨信号需警惕\n2. 板块轮动加快，追高风险较大\n3. 大盘环境方向不明</div>
        </div>
        <div class="dd-section">
          <div class="dd-section-title">关键价位</div>
          <div class="dd-section-text">支撑位：${(s.current*0.97).toFixed(2)} | 压力位：${(s.current*1.05).toFixed(2)}</div>
        </div>
      </div>`;
    } else {
      results.innerHTML += `<div class="debate-agent-card role-${r.role}">
        <div class="debate-agent-header">
          <span class="debate-agent-icon">${r.icon}</span>
          <span class="debate-agent-name">${r.agent}</span>
          <span class="debate-agent-badge">${r.role === 'bull' ? '多头' : r.role === 'bear' ? '空头' : r.role === 'neutral' ? '中立' : '全局'}</span>
        </div>
        <div class="debate-agent-body" style="display:block">${r.text}</div>
      </div>`;
    }

    // Mark step done
    const stepEl = document.getElementById(`debate-step-${roundIdx}`);
    if (stepEl) stepEl.className = 'debate-step done';

    roundIdx++;
    if (roundIdx < rounds.length) {
      setTimeout(renderRound, 1500);
    } else {
      btn.disabled = false;
      btn.textContent = '🚀 开始辩论';
    }
  }

  setTimeout(renderRound, 1500);
}

// ==================== 策略回测 ====================
function startBacktest() {
  const strategy = document.getElementById('bt-strategy').value;
  const capital = parseFloat(document.getElementById('bt-capital').value) || 1000000;
  const freq = document.getElementById('bt-freq').value;
  const btn = document.getElementById('btn-backtest');
  const results = document.getElementById('backtest-results');

  btn.disabled = true;
  btn.textContent = '回测中...';
  results.innerHTML = '<div class="ai-pick-loading show"><span class="pick-loading-dot"></span> 正在计算回测指标...</div>';

  setTimeout(() => {
    const strategyResults = {
      low_pe: { total: 45.2, annual: 12.8, sharpe: 1.35, dd: -18.5, win: 58.3, trades: 240 },
      low_pb: { total: 38.7, annual: 10.5, sharpe: 1.12, dd: -22.1, win: 55.7, trades: 240 },
      rsi_oversold: { total: 52.6, annual: 15.1, sharpe: 1.48, dd: -15.2, win: 61.2, trades: 180 },
      ma_bullish: { total: 58.9, annual: 16.8, sharpe: 1.62, dd: -12.8, win: 63.5, trades: 150 },
    };
    const m = strategyResults[strategy] || strategyResults.low_pe;
    const finalValue = capital * (1 + m.total / 100);
    const benchmarkReturn = 28.5;

    results.innerHTML = `
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-label">总收益率</div>
          <div class="metric-value metric-up">+${m.total}%</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">年化收益率</div>
          <div class="metric-value metric-up">+${m.annual}%</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">夏普比率</div>
          <div class="metric-value">${m.sharpe}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">最大回撤</div>
          <div class="metric-value metric-down">${m.dd}%</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">胜率</div>
          <div class="metric-value">${m.win}%</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">总交易次数</div>
          <div class="metric-value">${m.trades}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">最终权益</div>
          <div class="metric-value metric-up">${(finalValue/10000).toFixed(0)}万</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">超额收益(vs基准)</div>
          <div class="metric-value metric-up">+${(m.total-benchmarkReturn).toFixed(1)}%</div>
        </div>
      </div>
      <div style="background:#0a0e17;border:1px solid #1e293b;border-radius:8px;padding:12px;font-size:12px;color:#64748b;">
        <span style="color:#93c5fd;">回测区间：2020-01-01 ~ 2023-12-31</span> | 
        ${freq === 'monthly' ? '月频调仓' : freq === 'weekly' ? '周频调仓' : '日频调仓'} | 
        股票池：32只 | 初始资金：${(capital/10000).toFixed(0)}万<br>
        ⚠️ 本演示数据为模拟结果，不构成投资建议。
      </div>
    `;
    btn.disabled = false;
    btn.textContent = '▶ 运行回测';
  }, 2000);
}
