<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思板 - 轻量实时协作白板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    #canvas { cursor: crosshair; }
    .tool-btn { 
      display: flex; align-items: center; gap: 8px; 
      padding: 10px 12px; border-radius: 8px; 
      transition: all 0.2s; cursor: pointer; 
      background: transparent; border: none;
      width: 100%; justify-content: flex-start;
    }
    .tool-btn:hover { background-color: #f3f4f6; }
    .tool-btn.active { background-color: #10B981; color: white; }
    .tool-btn.active:hover { background-color: #059669; }
    .tool-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .tool-btn.active svg { fill: white; stroke: white; }
    .tool-btn span { font-size: 14px; }
    .cursor-grab { cursor: grab; }
    .cursor-grabbing { cursor: grabbing; }
    .hidden { display: none !important; }
    .sticky-input { position: absolute; padding: 15px; border-radius: 4px; font-size: 14px; resize: none; border: none; outline: none; font-family: inherit; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="home-page" class="flex flex-col items-center justify-center h-screen bg-gradient-to-br from-emerald-500 to-teal-600">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
      <div class="text-center mb-6">
        <div class="text-6xl mb-4">📋</div>
        <h1 class="text-2xl font-bold text-gray-800">思板</h1>
        <p class="text-gray-500">轻量实时协作白板</p>
      </div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">房间 ID</label>
        <div class="flex gap-2">
          <input type="text" id="room-input" placeholder="输入房间号或留空新建" 
                 class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
          <button onclick="createRoom()" class="px-4 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-colors">
            新建
          </button>
        </div>
      </div>
      
      <button onclick="joinRoom()" class="w-full py-3 bg-emerald-500 text-white rounded-lg font-medium hover:bg-emerald-600 transition-colors">
        进入白板
      </button>
      
      <div class="mt-4 text-center text-xs text-gray-500">
        <p>免费版房间有效期：1小时</p>
        <p>会员可无限使用</p>
      </div>
    </div>
  </div>

  <div id="whiteboard-page" class="hidden w-full h-screen relative">
    <div class="absolute top-4 left-4 z-50 flex flex-col gap-2">
      <div class="bg-white rounded-xl shadow-lg p-2 flex flex-col gap-1">
        <button class="tool-btn active" onclick="setTool('select', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 16V8a2 2 0 0 0-2-2h-6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2z"/>
            <circle cx="9" cy="13" r="1"/>
            <circle cx="15" cy="13" r="1"/>
          </svg>
          <span>选择</span>
        </button>
        <button class="tool-btn" onclick="setTool('pan', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 8l-8-8-8 8"/>
            <path d="M4 16l8 8 8-8"/>
            <path d="M14 4l4 4"/>
            <path d="M10 20l-4-4"/>
          </svg>
          <span>拖拽</span>
        </button>
        <button class="tool-btn" onclick="setTool('sticky', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="4" y="3" width="16" height="18" rx="2"/>
            <path d="M10 3v4"/>
            <path d="M14 3v4"/>
            <path d="M4 9h16"/>
          </svg>
          <span>便利贴</span>
        </button>
        <button class="tool-btn" onclick="setTool('text', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7h16"/>
            <path d="M4 12h16"/>
            <path d="M4 17h16"/>
          </svg>
          <span>文字</span>
        </button>
        <button class="tool-btn" onclick="setTool('brush', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20v-8"/>
            <path d="M8 20v-8"/>
            <path d="M16 20v-8"/>
            <path d="M20 14v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6"/>
          </svg>
          <span>画笔</span>
        </button>
        <button class="tool-btn" onclick="setTool('arrow', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19V5"/>
            <path d="M5 12l7-7 7 7"/>
          </svg>
          <span>箭头</span>
        </button>
        <button class="tool-btn" onclick="setTool('rectangle', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          <span>矩形</span>
        </button>
        <button class="tool-btn" onclick="setTool('eraser', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 20H7L3 16"/>
            <path d="M20 7L15 2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9z"/>
            <path d="M8 8h8"/>
            <path d="M10 10h4"/>
          </svg>
          <span>橡皮擦</span>
        </button>
      </div>
      
      <div class="bg-white rounded-xl shadow-lg p-2 flex flex-col gap-1">
        <button class="tool-btn" onclick="zoomIn()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4"/>
            <path d="M8 12h4"/>
          </svg>
          <span>放大</span>
        </button>
        <button class="tool-btn" onclick="zoomOut()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 12h8"/>
          </svg>
          <span>缩小</span>
        </button>
        <button class="tool-btn" onclick="resetView()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          <span>重置</span>
        </button>
        <button class="tool-btn" onclick="exportImage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>导出</span>
        </button>
      </div>
    </div>
    
    <div class="absolute top-4 right-4 z-50 bg-white rounded-xl shadow-lg px-4 py-2 flex items-center gap-3">
      <div class="flex items-center gap-2">
        <div id="connection-status" class="w-3 h-3 rounded-full bg-red-500"></div>
        <span class="text-sm text-gray-600" id="connection-text">未连接</span>
      </div>
      <div class="w-px h-6 bg-gray-200"></div>
      <div class="flex items-center gap-2">
        <svg viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" width="18" height="18">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span class="text-sm text-gray-600" id="online-count">1 人在线</span>
      </div>
      <div class="w-px h-6 bg-gray-200"></div>
      <div class="text-sm text-gray-500">房间: <span id="current-room" class="font-medium"></span></div>
      <div class="w-px h-6 bg-gray-200"></div>
      <div class="flex items-center gap-2">
        <svg viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" width="18" height="18">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="text-sm text-gray-600" id="expire-time">剩余 1小时</span>
      </div>
    </div>
    
    <div id="canvas-container" class="w-full h-full overflow-hidden bg-gray-50">
      <canvas id="canvas" class="absolute top-0 left-0"></canvas>
    </div>
  </div>

  <script>
    const colors = ['#FDE047', '#F87171', '#60A5FA', '#34D399', '#F472B6', '#A78BFA', '#FB923C', '#6EE7B7'];
    
    let canvas, ctx;
    let elements = [];
    let activeTool = 'select';
    let selectedElementId = null;
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let isDrawing = false;
    let isPanning = false;
    let brushPoints = [];
    let newElement = null;
    let lastMousePos = { x: 0, y: 0 };
    let currentRoom = '';
    let ws = null;
    let isConnected = false;
    let onlineCount = 1;
    let editingElementId = null;
    let expiresAt = 0;
    let expireTimer = null;
    
    function init() {
      canvas = document.getElementById('canvas');
      ctx = canvas.getContext('2d');
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      
      canvas.addEventListener('mousedown', handleMouseDown);
      canvas.addEventListener('mousemove', handleMouseMove);
      canvas.addEventListener('mouseup', handleMouseUp);
      canvas.addEventListener('mouseleave', handleMouseUp);
      canvas.addEventListener('wheel', handleWheel);
      canvas.addEventListener('dblclick', handleDoubleClick);
    }
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drawCanvas();
    }
    
    function getCanvasCoordinates(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left - offsetX) / scale,
        y: (e.clientY - rect.top - offsetY) / scale,
      };
    }
    
    function getScreenCoordinates(e) {
      return { x: e.clientX, y: e.clientY };
    }
    
    function handleMouseDown(e) {
      if (editingElementId) return;
      
      const coords = getCanvasCoordinates(e);
      const screenCoords = getScreenCoordinates(e);
      
      if (activeTool === 'pan') {
        isPanning = true;
        lastMousePos = screenCoords;
        return;
      }
      
      if (activeTool === 'brush') {
        isDrawing = true;
        brushPoints = [{ ...coords }];
        drawCanvas();
        return;
      }
      
      if (activeTool === 'eraser') {
        isDrawing = true;
        eraseAt(coords.x, coords.y);
        return;
      }
      
      if (activeTool === 'arrow') {
        isDrawing = true;
        brushPoints = [{ ...coords }];
        drawCanvas();
        return;
      }
      
      if (activeTool === 'select') {
        const clicked = findElementAt(coords.x, coords.y);
        if (clicked) {
          selectedElementId = clicked.id;
        } else {
          selectedElementId = null;
        }
        drawCanvas();
        return;
      }
      
      if (activeTool === 'sticky') {
        const sticky = {
          id: `sticky-${Date.now()}`,
          type: 'sticky',
          x: coords.x - 100,
          y: coords.y - 75,
          width: 200,
          height: 150,
          content: '双击编辑内容',
          color: colors[Math.floor(Math.random() * colors.length)],
        };
        addElement(sticky);
      }
      
      if (activeTool === 'text') {
        const text = {
          id: `text-${Date.now()}`,
          type: 'text',
          x: coords.x,
          y: coords.y,
          content: '双击编辑文字',
          fontSize: 16,
          color: '#1F2937',
        };
        addElement(text);
      }
      
      if (activeTool === 'rectangle') {
        newElement = {
          id: `rect-${Date.now()}`,
          type: 'rectangle',
          x: coords.x,
          y: coords.y,
          width: 0,
          height: 0,
          strokeColor: '#1F2937',
          strokeWidth: 2,
        };
        isDrawing = true;
        drawCanvas();
      }
    }
    
    function handleMouseMove(e) {
      if (editingElementId) return;
      
      const coords = getCanvasCoordinates(e);
      const screenCoords = getScreenCoordinates(e);
      
      if (activeTool === 'pan' && isPanning) {
        const dx = screenCoords.x - lastMousePos.x;
        const dy = screenCoords.y - lastMousePos.y;
        offsetX += dx;
        offsetY += dy;
        lastMousePos = screenCoords;
        drawCanvas();
        return;
      }
      
      if (activeTool === 'brush' && isDrawing) {
        brushPoints.push({ ...coords });
        drawCanvas();
        return;
      }
      
      if (activeTool === 'eraser' && isDrawing) {
        eraseAt(coords.x, coords.y);
        drawCanvas();
        return;
      }
      
      if (activeTool === 'arrow' && isDrawing) {
        brushPoints = [brushPoints[0], { ...coords }];
        drawCanvas();
        return;
      }
      
      if (activeTool === 'rectangle' && isDrawing && newElement) {
        newElement.width = coords.x - newElement.x;
        newElement.height = coords.y - newElement.y;
        drawCanvas();
      }
    }
    
    function handleMouseUp() {
      if (isPanning) {
        isPanning = false;
        return;
      }
      
      if (!isDrawing) return;
      isDrawing = false;
      
      if (activeTool === 'brush' && brushPoints.length > 1) {
        const line = {
          id: `brush-${Date.now()}`,
          type: 'line',
          x: brushPoints[0].x,
          y: brushPoints[0].y,
          points: brushPoints,
          strokeColor: '#1F2937',
          strokeWidth: 3,
        };
        addElement(line);
      }
      
      if (activeTool === 'arrow' && brushPoints.length === 2) {
        const arrow = {
          id: `arrow-${Date.now()}`,
          type: 'arrow',
          x: brushPoints[0].x,
          y: brushPoints[0].y,
          points: brushPoints,
          strokeColor: '#1F2937',
          strokeWidth: 2,
        };
        addElement(arrow);
      }
      
      if (activeTool === 'rectangle' && newElement) {
        if (Math.abs(newElement.width) > 5 && Math.abs(newElement.height) > 5) {
          addElement(newElement);
        }
        newElement = null;
      }
      
      brushPoints = [];
      drawCanvas();
    }
    
    function handleDoubleClick(e) {
      const coords = getCanvasCoordinates(e);
      const clicked = findElementAt(coords.x, coords.y);
      
      if (clicked && (clicked.type === 'sticky' || clicked.type === 'text')) {
        editElement(clicked);
      }
    }
    
    function editElement(el) {
      editingElementId = el.id;
      
      const rect = canvas.getBoundingClientRect();
      const input = document.createElement('textarea');
      input.className = 'sticky-input';
      input.value = el.content || '';
      input.style.left = `${el.x * scale + offsetX}px`;
      input.style.top = `${el.y * scale + offsetY}px`;
      input.style.width = `${(el.width || 200) * scale}px`;
      input.style.height = `${(el.height || 150) * scale}px`;
      input.style.backgroundColor = el.type === 'sticky' ? el.color : 'transparent';
      input.style.color = '#1F2937';
      input.style.fontSize = `${(el.fontSize || 14) * scale}px`;
      
      input.addEventListener('blur', () => {
        if (input.value !== el.content) {
          updateElement(el.id, { content: input.value });
        }
        editingElementId = null;
        input.remove();
        drawCanvas();
      });
      
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) {
          input.blur();
        }
      });
      
      document.body.appendChild(input);
      input.focus();
      input.select();
    }
    
    function handleWheel(e) {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.max(0.25, Math.min(3, scale * delta));
      drawCanvas();
    }
    
    function findElementAt(x, y) {
      for (let i = elements.length - 1; i >= 0; i--) {
        const el = elements[i];
        if (el.type === 'line' || el.type === 'arrow') {
          if (el.points) {
            for (let j = 0; j < el.points.length - 1; j++) {
              const p1 = el.points[j];
              const p2 = el.points[j + 1];
              if (isPointNearLine(x, y, p1.x, p1.y, p2.x, p2.y, 10)) {
                return el;
              }
            }
          }
        } else {
          const w = el.width || 200;
          const h = el.height || 20;
          if (x >= el.x && x <= el.x + w && y >= el.y && y <= el.y + h) {
            return el;
          }
        }
      }
      return null;
    }
    
    function isPointNearLine(px, py, x1, y1, x2, y2, threshold) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const length = Math.sqrt(dx * dx + dy * dy);
      const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (length * length)));
      const nx = x1 + t * dx;
      const ny = y1 + t * dy;
      return Math.sqrt((px - nx) ** 2 + (py - ny) ** 2) <= threshold;
    }
    
    function eraseAt(x, y) {
      const toDelete = [];
      elements.forEach(el => {
        if (el.type === 'line' || el.type === 'arrow') {
          el.points?.forEach(p => {
            if (Math.sqrt((x - p.x) ** 2 + (y - p.y) ** 2) < 20) {
              toDelete.push(el.id);
            }
          });
        } else {
          const w = el.width || 200;
          const h = el.height || 20;
          if (x >= el.x - 10 && x <= el.x + w + 10 && y >= el.y - 10 && y <= el.y + h + 10) {
            toDelete.push(el.id);
          }
        }
      });
      
      if (toDelete.length > 0) {
        toDelete.forEach(id => deleteElement(id));
      }
    }
    
    function drawCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);
      
      drawGrid();
      
      elements.forEach(el => drawElement(el));
      
      if (isDrawing && brushPoints.length > 1) {
        ctx.beginPath();
        ctx.moveTo(brushPoints[0].x, brushPoints[0].y);
        brushPoints.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = activeTool === 'eraser' ? '#FFFFFF' : '#1F2937';
        ctx.lineWidth = activeTool === 'eraser' ? 20 : 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
      }
      
      if (newElement) {
        drawElement(newElement);
      }
      
      ctx.restore();
    }
    
    function drawGrid() {
      ctx.strokeStyle = '#E5E7EB';
      ctx.lineWidth = 1;
      const gridSize = 50;
      for (let x = 0; x < 2000; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, 2000);
        ctx.stroke();
      }
      for (let y = 0; y < 2000; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(2000, y);
        ctx.stroke();
      }
    }
    
    function drawElement(el) {
      ctx.save();
      
      if (el.type === 'sticky') {
        ctx.fillStyle = el.color || '#FDE047';
        ctx.fillRect(el.x, el.y, el.width || 200, el.height || 150);
        ctx.strokeStyle = '#D97706';
        ctx.lineWidth = 2;
        ctx.strokeRect(el.x, el.y, el.width || 200, el.height || 150);
        ctx.fillStyle = '#1F2937';
        ctx.font = '14px sans-serif';
        const lines = (el.content || '').split('\n');
        let lineY = el.y + 15;
        lines.forEach(line => {
          ctx.fillText(line, el.x + 15, lineY);
          lineY += 20;
        });
      }
      
      if (el.type === 'text') {
        ctx.fillStyle = el.color || '#1F2937';
        ctx.font = `${el.fontSize || 16}px sans-serif`;
        ctx.fillText(el.content || '', el.x, el.y);
      }
      
      if (el.type === 'line' || el.type === 'arrow') {
        if (!el.points || el.points.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(el.points[0].x, el.points[0].y);
        el.points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = el.strokeColor || '#1F2937';
        ctx.lineWidth = el.strokeWidth || 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        
        if (el.type === 'arrow') {
          const last = el.points[el.points.length - 1];
          const prev = el.points[el.points.length - 2];
          const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
          ctx.beginPath();
          ctx.moveTo(last.x, last.y);
          ctx.lineTo(last.x - 15 * Math.cos(angle - Math.PI / 6), last.y - 15 * Math.sin(angle - Math.PI / 6));
          ctx.moveTo(last.x, last.y);
          ctx.lineTo(last.x - 15 * Math.cos(angle + Math.PI / 6), last.y - 15 * Math.sin(angle + Math.PI / 6));
          ctx.stroke();
        }
      }
      
      if (el.type === 'rectangle') {
        ctx.strokeStyle = el.strokeColor || '#1F2937';
        ctx.lineWidth = el.strokeWidth || 2;
        ctx.strokeRect(el.x, el.y, el.width || 0, el.height || 0);
      }
      
      if (selectedElementId === el.id && editingElementId !== el.id) {
        ctx.strokeStyle = '#10B981';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        if (el.type === 'line' || el.type === 'arrow') {
          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          el.points?.forEach(p => {
            minX = Math.min(minX, p.x);
            minY = Math.min(minY, p.y);
            maxX = Math.max(maxX, p.x);
            maxY = Math.max(maxY, p.y);
          });
          ctx.strokeRect(minX - 10, minY - 10, maxX - minX + 20, maxY - minY + 20);
        } else {
          ctx.strokeRect(el.x - 5, el.y - 5, (el.width || 200) + 10, (el.height || 20) + 10);
        }
        ctx.setLineDash([]);
      }
      
      ctx.restore();
    }
    
    function addElement(element) {
      console.log('[Store] 添加元素:', element.type, element.id);
      elements.push(element);
      drawCanvas();
      
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'add',
          roomId: currentRoom,
          element,
        }));
      }
    }
    
    function updateElement(id, updates) {
      const index = elements.findIndex(el => el.id === id);
      if (index !== -1) {
        elements[index] = { ...elements[index], ...updates };
        drawCanvas();
        
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'update',
            roomId: currentRoom,
            id,
            updates,
          }));
        }
      }
    }
    
    function deleteElement(id) {
      console.log('[Store] 删除元素:', id);
      elements = elements.filter(el => el.id !== id);
      drawCanvas();
      
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'delete',
          roomId: currentRoom,
          id,
        }));
      }
    }
    
    function setTool(tool, btn) {
      activeTool = tool;
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      if (tool === 'pan') {
        canvas.style.cursor = 'grab';
      } else {
        canvas.style.cursor = 'crosshair';
      }
    }
    
    function zoomIn() { scale = Math.min(3, scale * 1.2); drawCanvas(); }
    function zoomOut() { scale = Math.max(0.25, scale / 1.2); drawCanvas(); }
    function resetView() { scale = 1; offsetX = 0; offsetY = 0; drawCanvas(); }
    
    function exportImage() {
      const link = document.createElement('a');
      link.download = `思板-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      console.log('[Export] 截图已导出');
    }
    
    function createRoom() {
      fetch('/api/room/create')
        .then(res => res.json())
        .then(data => {
          document.getElementById('room-input').value = data.roomId;
        });
    }
    
    function startExpireTimer() {
      if (expireTimer) clearInterval(expireTimer);
      
      function updateExpireTime() {
        const now = Date.now();
        const remaining = expiresAt - now;
        
        if (remaining <= 0) {
          document.getElementById('expire-time').textContent = '已过期';
          document.getElementById('expire-time').className = 'text-sm text-red-500';
          clearInterval(expireTimer);
          return;
        }
        
        const hours = Math.floor(remaining / (1000 * 60 * 60));
        const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
        
        if (hours > 0) {
          document.getElementById('expire-time').textContent = `剩余 ${hours}小时${minutes}分`;
        } else if (minutes > 0) {
          document.getElementById('expire-time').textContent = `剩余 ${minutes}分${seconds}秒`;
        } else {
          document.getElementById('expire-time').textContent = `剩余 ${seconds}秒`;
          document.getElementById('expire-time').className = 'text-sm text-red-500';
        }
      }
      
      updateExpireTime();
      expireTimer = setInterval(updateExpireTime, 1000);
    }
    
    function joinRoom() {
      const roomId = document.getElementById('room-input').value.trim() || 'room-' + Math.random().toString(36).substring(2, 10);
      currentRoom = roomId;
      
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('whiteboard-page').classList.remove('hidden');
      document.getElementById('current-room').textContent = roomId;
      
      init();
      connectWebSocket(roomId);
    }
    
    function connectWebSocket(roomId) {
      const wsUrl = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${wsUrl}//${window.location.host}`);
      
      ws.onopen = () => {
        console.log('[WS] 连接已建立');
        isConnected = true;
        updateConnectionStatus();
        ws.send(JSON.stringify({ type: 'join', roomId }));
      };
      
      ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        console.log('[WS] 收到消息:', message.type);
        
        switch (message.type) {
          case 'joined':
            elements = message.elements || [];
            onlineCount = message.clientCount || 1;
            expiresAt = message.expiresAt || Date.now() + 60 * 60 * 1000;
            document.getElementById('online-count').textContent = `${onlineCount} 人在线`;
            startExpireTimer();
            drawCanvas();
            break;
          case 'clientCount':
            onlineCount = message.count || 1;
            document.getElementById('online-count').textContent = `${onlineCount} 人在线`;
            console.log('[WS] 在线人数更新:', onlineCount);
            break;
          case 'added':
            elements.push(message.element);
            drawCanvas();
            break;
          case 'updated':
            const idx = elements.findIndex(el => el.id === message.id);
            if (idx !== -1) {
              elements[idx] = { ...elements[idx], ...message.updates };
              drawCanvas();
            }
            break;
          case 'deleted':
            elements = elements.filter(el => el.id !== message.id);
            drawCanvas();
            break;
          case 'expired':
            elements = [];
            drawCanvas();
            alert('房间已过期，请创建新房间！');
            break;
        }
      };
      
      ws.onerror = () => {
        isConnected = false;
        updateConnectionStatus();
      };
      
      ws.onclose = () => {
        isConnected = false;
        updateConnectionStatus();
        setTimeout(() => connectWebSocket(roomId), 3000);
      };
    }
    
    function updateConnectionStatus() {
      const status = document.getElementById('connection-status');
      const text = document.getElementById('connection-text');
      if (isConnected) {
        status.className = 'w-3 h-3 rounded-full bg-green-500';
        text.textContent = '实时同步中';
      } else {
        status.className = 'w-3 h-3 rounded-full bg-red-500';
        text.textContent = '未连接';
      }
    }
  </script>
</body>
</html>
