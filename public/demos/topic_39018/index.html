<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 旅行规划引擎 | 输入参数，一键生成专属路书</title>
<style>
:root{
  --bg:#faf8f5;--bg2:#f0ece6;--bg3:#e8e2d8;--ink:#2c2416;--muted:#7a6e5e;
  --rule:#d4c9b8;--accent:#c47a3a;--accent2:#3a6b8c;--accent3:#8b5e3c;
  --danger:#c0392b;--safe:#27ae60;--gold:#b8860b;--sky:#5b9bd5;
  --grad1:linear-gradient(135deg,#c47a3a 0%,#8b5e3c 100%);
  --grad2:linear-gradient(135deg,#3a6b8c 0%,#2c5278 100%);
  --grad3:linear-gradient(135deg,#b8860b 0%,#8b6508 100%);
  --shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.75;overflow-x:hidden}
.container{max-width:1140px;margin:0 auto;padding:0 2rem}

/* ── Hero ── */
.hero{position:relative;width:100%;height:60vh;min-height:420px;overflow:hidden;background:var(--grad1);display:flex;align-items:center;justify-content:center}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-text{position:relative;text-align:center;color:#fff;width:90%;max-width:800px}
.hero-text h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:700;margin-bottom:.6rem;text-shadow:0 2px 16px rgba(0,0,0,.3)}
.hero-text .sub{font-size:1.1rem;opacity:.9;margin-bottom:1.5rem}
.hero-badge{display:inline-block;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);padding:.4rem 1rem;border-radius:20px;font-size:.8rem;margin:0 .3rem}

/* ── Wizard ── */
.wizard{background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);margin:-3rem auto 3rem;max-width:900px;padding:2rem;position:relative;z-index:10}
.wizard h2{font-size:1.4rem;margin-bottom:1.5rem;color:var(--ink)}
.wizard h2 span{color:var(--accent)}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.2rem;margin-bottom:1.5rem}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select{width:100%;padding:.7rem 1rem;border:2px solid var(--rule);border-radius:8px;font-size:1rem;font-family:inherit;background:#fff;transition:border-color .2s,color .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.form-group input[type="date"]{color:var(--ink)}

.route-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;margin:1.5rem 0}
.route-card{border:2px solid var(--rule);border-radius:12px;padding:1.2rem;cursor:pointer;transition:all .2s;background:#fff}
.route-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.route-card.selected{border-color:var(--accent);background:linear-gradient(135deg,rgba(196,122,58,.05) 0%,rgba(139,94,60,.05) 100%)}
.route-card h4{font-size:1.1rem;color:var(--ink);margin-bottom:.3rem}
.route-card .meta{font-size:.8rem;color:var(--muted);margin-bottom:.5rem}
.route-card .tags{display:flex;gap:.4rem;flex-wrap:wrap}
.route-card .tag{font-size:.7rem;padding:2px 8px;border-radius:4px;background:var(--bg2);color:var(--muted)}
.route-card .tag.highlight{background:var(--accent);color:#fff}

.interest-tags{display:flex;gap:.5rem;flex-wrap:wrap;margin:.5rem 0}
.interest-tag{display:inline-block;padding:.4rem .9rem;border:2px solid var(--rule);border-radius:20px;font-size:.85rem;cursor:pointer;transition:all .2s;background:#fff}
.interest-tag:hover{border-color:var(--accent);color:var(--accent)}
.interest-tag.active{background:var(--accent);border-color:var(--accent);color:#fff}

.btn-primary{display:inline-block;background:var(--grad1);color:#fff;padding:.9rem 2.5rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── Generated Report ── */
#report{display:none}
#report.show{display:block;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── Sticky Nav ── */
nav.toc{background:rgba(250,248,245,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:100;padding:.5rem 0;box-shadow:var(--shadow)}
nav.toc .container{display:flex;gap:.8rem;flex-wrap:nowrap;white-space:nowrap;overflow-x:auto;scrollbar-width:thin}
nav.toc a{color:var(--muted);text-decoration:none;font-size:.78rem;font-weight:600;padding:.3rem .7rem;border-radius:6px;transition:all .2s;flex-shrink:0}
nav.toc a:hover{color:var(--accent);background:var(--bg2)}
nav.toc a.active{color:#fff;background:var(--accent)}

/* ── Sections ── */
section{padding:3rem 0}
section.full-bleed{background:var(--bg2);margin:2rem 0;padding:3rem 0}
h2{font-size:1.8rem;font-weight:700;margin-bottom:1.2rem;color:var(--ink);position:relative;padding-bottom:.5rem}
h2::after{content:'';position:absolute;bottom:0;left:0;width:60px;height:4px;background:var(--grad1);border-radius:2px}
h3{font-size:1.25rem;font-weight:700;margin:1.5rem 0 .6rem;color:var(--accent)}
h4{font-size:1rem;font-weight:700;margin:1rem 0 .4rem;color:var(--ink)}
mark.key{background:none;color:var(--accent);font-weight:600}

/* ── Stat Cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;margin:1.5rem 0}
.stat-card{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:1rem;text-align:center;transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.stat-card .icon{font-size:1.8rem;margin-bottom:.4rem}
.stat-card .value{font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:.75rem;color:var(--muted);margin-top:.2rem}

/* ── Cards ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;margin:1.5rem 0}
.card{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:1.2rem;transition:all .2s}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card h4{margin-top:0;color:var(--accent);font-size:1rem}
.card ul{margin:.4rem 0 0 1.2rem;font-size:.88rem;color:var(--muted)}
.card ul li{margin-bottom:.25rem}
.badge{display:inline-block;font-size:.65rem;padding:2px 7px;border-radius:4px;margin-right:3px;font-weight:700;color:#fff}
.badge.red{background:var(--danger)}.badge.green{background:var(--safe)}
.badge.blue{background:var(--accent2)}.badge.gold{background:var(--gold)}
.badge.accent{background:var(--accent)}

/* ── Collapsible Day Cards ── */
.day-card{background:#fff;border:1px solid var(--rule);border-radius:12px;margin:1rem 0;overflow:hidden;box-shadow:var(--shadow)}
.day-header{background:var(--grad1);color:#fff;padding:.8rem 1.2rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;transition:filter .2s;user-select:none}
.day-header:hover{filter:brightness(1.08)}
.day-header h3{color:#fff;margin:0;font-size:1rem}
.day-header .day-meta{font-size:.75rem;opacity:.85}
.day-header .toggle{font-size:1.1rem;transition:transform .3s}
.day-card.open .day-header .toggle{transform:rotate(180deg)}
.day-body{max-height:0;overflow:hidden;transition:max-height .4s ease;padding:0 1.2rem}
.day-card.open .day-body{max-height:3000px;padding:1.2rem}
.day-body .timeline{border-left:3px solid var(--rule);padding-left:1.2rem;margin:.8rem 0}
.timeline-item{position:relative;margin-bottom:1rem;padding:.2rem 0 .2rem .8rem}
.timeline-item::before{content:'';position:absolute;left:-1.7rem;top:.6rem;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:0 0 0 2px var(--accent)}
.timeline-time{font-family:monospace;font-size:.75rem;color:var(--accent);font-weight:700}
.timeline-desc{font-size:.88rem;margin-top:.15rem}

/* ── Tabs ── */
.tabs{margin:1.5rem 0}
.tab-headers{display:flex;gap:.4rem;flex-wrap:wrap;border-bottom:2px solid var(--rule);margin-bottom:1rem}
.tab-header{padding:.5rem 1rem;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-2px}
.tab-header:hover{color:var(--accent)}
.tab-header.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block;animation:tabFade .3s ease}
@keyframes tabFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Info Boxes ── */
.info-box{border-left:4px solid var(--accent);background:var(--bg2);padding:.8rem 1.2rem;border-radius:0 8px 8px 0;margin:1rem 0}
.info-box.warn{border-left-color:var(--danger);background:#fef5f0}
.info-box.tip{border-left-color:var(--safe);background:#f0faf5}
.info-box.star{border-left-color:var(--gold);background:#fefcf0}

/* ── Tables ── */
.table-wrap{overflow-x:auto;margin:1rem 0;border-radius:8px;box-shadow:var(--shadow)}
.price-table{width:100%;border-collapse:collapse;font-size:.85rem}
.price-table th{background:var(--grad1);color:#fff;padding:.6rem .7rem;text-align:left;font-weight:600}
.price-table td{padding:.45rem .7rem;border-bottom:1px solid var(--rule)}
.price-table tr:nth-child(even) td{background:var(--bg2)}
.price-table tr:hover td{background:var(--bg3)}

/* ── Charts ── */
.chart-figure{margin:1.5rem 0}
.chart-figure figcaption{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:.5rem}

/* ── Route Map SVG ── */
.route-map{width:100%;height:auto;margin:1.5rem 0}

/* ── Moon Calendar ── */
.moon-cal{display:flex;gap:8px;flex-wrap:wrap;margin:1rem 0}
.moon-day{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff;font-weight:700}
.moon-day.bad{background:#444}.moon-day.ok{background:var(--accent2)}.moon-day.great{background:var(--safe)}
.moon-label{text-align:center;font-size:.6rem;color:var(--muted);margin-top:.2rem}

.stars{color:var(--gold);font-size:1rem;letter-spacing:2px}

/* ── Footer ── */
footer{border-top:1px solid var(--rule);padding:2rem 0;margin-top:2rem;background:var(--bg2)}
footer .sources h2{font-size:1.1rem;margin-bottom:.8rem}
footer .sources ol{padding-left:1.2rem;font-size:.78rem;color:var(--muted)}
footer .sources li{margin-bottom:.4rem}

/* ── Responsive ── */
@media(max-width:768px){
  .container{padding:0 1rem}
  .wizard{margin:-2rem 1rem 2rem;padding:1.2rem}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .card-grid{grid-template-columns:1fr}
}
@media print{nav.toc,.hero,.wizard{display:none}body{font-size:14px}.container{max-width:100%}.day-body{max-height:none!important}}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-text">
    <h1>AI 旅行规划引擎</h1>
    <p class="sub">输入你的出行参数，一键生成专属深度路书</p>
    <div>
      <span class="hero-badge">3条经典路线</span>
      <span class="hero-badge">实时预算计算</span>
      <span class="hero-badge">避坑指南</span>
      <span class="hero-badge">银河观测</span>
    </div>
  </div>
</div>

<!-- Wizard -->
<div class="wizard" id="wizard">
  <h2>Step 1: 选择<span>路线模板</span></h2>
  <div class="route-cards" id="routeCards"></div>

  <h2>Step 2: 填写<span>出行参数</span></h2>
  <div class="form-grid">
    <div class="form-group">
      <label>出发日期</label>
      <input type="date" id="startDate">
    </div>
    <div class="form-group">
      <label>出行天数</label>
      <input type="number" id="days" min="5" max="20" value="10">
    </div>
    <div class="form-group">
      <label>出行人数</label>
      <select id="people">
        <option value="1">1人</option><option value="2">2人</option>
        <option value="3">3人</option><option value="4">4人</option>
        <option value="5" selected>5人</option><option value="6">6人</option>
      </select>
    </div>
    <div class="form-group">
      <label>车型</label>
      <select id="carType">
        <option value="轿车">轿车</option>
        <option value="SUV" selected>SUV</option>
        <option value="MPV">MPV</option>
        <option value="房车">房车</option>
      </select>
    </div>
    <div class="form-group">
      <label>预算偏好</label>
      <select id="budgetLevel">
        <option value="经济">经济型</option>
        <option value="舒适" selected>舒适型</option>
        <option value="豪华">豪华型</option>
      </select>
    </div>
    <div class="form-group">
      <label>兴趣标签（多选）</label>
      <div class="interest-tags" id="interestTags">
        <span class="interest-tag" data-value="自然风光">自然风光</span>
        <span class="interest-tag" data-value="人文历史">人文历史</span>
        <span class="interest-tag" data-value="美食探店">美食探店</span>
        <span class="interest-tag active" data-value="星空摄影">星空摄影</span>
        <span class="interest-tag" data-value="自驾越野">自驾越野</span>
        <span class="interest-tag" data-value="亲子休闲">亲子休闲</span>
      </div>
    </div>
  </div>

  <div style="text-align:center">
    <button class="btn-primary" id="generateBtn" onclick="generatePlan()">生成我的专属路书</button>
  </div>
</div>

<!-- Generated Report -->
<div id="report"></div>

<script src="data/routes.js"></script>
<script src="js/generator.js"></script>
<script src="js/charts.js"></script>
<script>
// ── Init ──
document.getElementById('startDate').value = new Date().toISOString().split('T')[0];

// ── Render Route Cards ──
const routeCards = document.getElementById('routeCards');
let selectedRoute = 'xinjiang';

Object.values(ROUTE_TEMPLATES).forEach(r => {
  const card = document.createElement('div');
  card.className = 'route-card' + (r.id === selectedRoute ? ' selected' : '');
  card.dataset.id = r.id;
  card.innerHTML = `
    <h4>${r.name}</h4>
    <div class="meta">${r.subtitle} · ${r.totalKm}km · ${r.defaultDays}天</div>
    <div class="tags">
      <span class="tag highlight">${r.region}</span>
      ${r.highlights.slice(0,3).map(h => `<span class="tag">${h}</span>`).join('')}
    </div>
  `;
  card.onclick = () => {
    document.querySelectorAll('.route-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedRoute = r.id;
    document.getElementById('days').value = r.defaultDays;
    document.getElementById('days').min = r.minDays;
    document.getElementById('days').max = r.maxDays;
  };
  routeCards.appendChild(card);
});

// ── Interest Tags ──
document.querySelectorAll('.interest-tag').forEach(tag => {
  tag.onclick = () => tag.classList.toggle('active');
});

// ── Generate ──
function generatePlan() {
  const params = {
    routeId: selectedRoute,
    startDate: document.getElementById('startDate').value,
    days: parseInt(document.getElementById('days').value),
    people: parseInt(document.getElementById('people').value),
    carType: document.getElementById('carType').value,
    budgetLevel: document.getElementById('budgetLevel').value,
    interests: Array.from(document.querySelectorAll('.interest-tag.active')).map(t => t.dataset.value)
  };

  if(!params.startDate){alert('请选择出发日期');return;}

  const report = generateReport(params);
  document.getElementById('report').innerHTML = report;
  document.getElementById('report').classList.add('show');
  document.getElementById('wizard').style.display = 'none';

  // Init charts after DOM ready
  setTimeout(() => {
    if(typeof initCharts === 'function') initCharts(params);
    initNavHighlight();
  }, 100);

  // Scroll to report
  document.getElementById('report').scrollIntoView({behavior:'smooth'});
}

// ── Nav Highlight ──
function initNavHighlight() {
  const tocLinks = document.querySelectorAll('nav.toc a');
  const sections = document.querySelectorAll('section[id]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        tocLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + entry.target.id));
      }
    });
  }, {rootMargin:'-20% 0px -70% 0px'});
  sections.forEach(s => observer.observe(s));
}
</script>
</body>
</html>
