      var total = r.data.total || 0;
      if (!txns.length) { listEl.innerHTML = emptyState('暂无交易记录'); return; }
      var typeText = { earn_download: '下载收益', spend_download: '下载消耗', purchase: '积分充值', admin_adjust: '管理员调整' };
      var html = '<div class="table-wrap"><table class="data-table">' +
        '<thead><tr><th>时间</th><th>类型</th><th>说明</th><th>变动</th><th>余额</th></tr></thead><tbody>';
      txns.forEach(function (t) {
        var amt = Number(t.amount || 0);
        var positive = amt >= 0;
        var tt = typeText[t.type] || (t.type || '变动');
        var bal = t.balance_after != null ? t.balance_after : t.after_balance;
        html +=
          '<tr>' +
            '<td class="cell-muted">' + formatTime(t.created_at || t.time) + '</td>' +
            '<td><span class="badge ' + (positive ? 'badge-success' : 'badge-danger') + '">' + tt + '</span></td>' +
            '<td class="text-ellipsis" style="max-width:300px" title="' + escapeHTML(t.description || tt) + '">' + escapeHTML(t.description || tt) + '</td>' +
            '<td style="color:' + (positive ? '#16a34a' : '#dc2626') + ';font-weight:600">' + (positive ? '+' : '') + formatPoints(amt) + '</td>' +
            '<td class="cell-points">' + formatPoints(bal) + '</td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
      html += paginationHTML(txnState.page, txnState.pageSize, total);
      listEl.innerHTML = html;
      attachPagination(listEl, function (p) { txnState.page = p; loadTransactions(); });
    } else {
      listEl.innerHTML = emptyState((r && r.message) || '暂无交易记录');
    }
  }

  function renderPointsPurchase() {
    var el = document.getElementById('points-content');
    if (el) {
      el.innerHTML =
        '<div class="card" style="max-width:560px">' +
          '<div class="card-body">' +
            '<div style="text-align:center;margin-bottom:20px">' +
              '<div style="font-size:13px;color:#94a3b8">当前积分余额</div>' +
              '<div style="font-size:36px;font-weight:700;color:#2563eb">' + formatPoints(state.balance) + '</div>' +
            '</div>' +
            '<form id="purchase-form">' +
              '<div class="form-group">' +
                '<label class="form-label">购买积分数量<span class="required">*</span></label>' +
                '<div class="sub-tabs" style="margin-bottom:12px">' +
                  '<button class="sub-tab" type="button" data-amount="100">100 积分</button>' +
                  '<button class="sub-tab" type="button" data-amount="300">300 积分</button>' +
                  '<button class="sub-tab" type="button" data-amount="500">500 积分</button>' +
                  '<button class="sub-tab" type="button" data-amount="1000">1000 积分</button>' +
                '</div>' +
                '<input class="form-control" id="purchase-amount" type="number" min="1" step="1" value="100" placeholder="请输入购买积分数量" />' +
                '<div class="form-hint">兑换比例：1 元 = 10 积分</div>' +
              '</div>' +
              '<div class="detail-box" id="purchase-preview">' +
                '<div class="detail-row"><div class="detail-label">购买积分</div><div class="detail-value" id="pp-points">100 积分</div></div>' +
                '<div class="detail-row"><div class="detail-label">支付金额</div><div class="detail-value" style="color:#dc2626;font-weight:600" id="pp-cost">10.00 元</div></div>' +
              '</div>' +
              '<button class="btn btn-primary btn-block btn-lg" id="purchase-btn" type="submit" style="margin-top:16px">确认购买</button>' +
            '</form>' +
          '</div>' +
        '</div>';
      var amountInput = document.getElementById('purchase-amount');
      var updatePreview = function () {
        var amt = Number(amountInput.value) || 0;
        var pp = document.getElementById('pp-points');
        var pc = document.getElementById('pp-cost');
        if (pp) pp.textContent = formatPoints(amt) + ' 积分';
        if (pc) pc.textContent = (amt / 10).toFixed(2) + ' 元';
      };
      amountInput.addEventListener('input', updatePreview);
      document.querySelectorAll('#purchase-form .sub-tab[data-amount]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          amountInput.value = btn.getAttribute('data-amount');
          updatePreview();
        });
      });
      document.getElementById('purchase-form').addEventListener('submit', handlePurchase);
    }
  }

  async function handlePurchase(e) {
    e.preventDefault();
    var amount = Number(document.getElementById('purchase-amount').value);
    if (!amount || amount <= 0) { showToast('请输入有效的积分数量', 'warning'); return; }
    var ok = await confirmDialog({
      title: '确认购买',
      message: '确定购买 <strong style="color:#2563eb">' + formatPoints(amount) + '</strong> 积分，支付 <strong style="color:#dc2626">' + (amount / 10).toFixed(2) + '</strong> 元？',
      confirmText: '确认支付',
      danger: true
    });
    if (!ok) return;
    var btn = document.getElementById('purchase-btn');
    btn.disabled = true;
    btn.textContent = '处理中...';
    showLoading();
    try {
      var r = await api('/points/purchase', { method: 'POST', body: { points: amount } });
      hideLoading();
      btn.disabled = false;
      btn.textContent = '确认购买';
      if (r && r.success) {
        showToast('购买成功，获得 ' + formatPoints(amount) + ' 积分', 'success');
        loadBalance();
        renderPointsPurchase();
      } else {
        showToast((r && r.message) || '购买失败', 'error');
      }
    } catch (err) {
      hideLoading();
      btn.disabled = false;
      btn.textContent = '确认购买';
      showToast('网络错误，购买失败', 'error');
    }
  }

  async function renderPointsLeaderboard() {
    var el = document.getElementById('points-content');
    if (el) el.innerHTML = inlineLoading();
    var results = await Promise.all([
      api('/points/leaderboard/uploads').catch(function () { return {}; }),
      api('/points/leaderboard/earned').catch(function () { return {}; })
    ]);
    var uploads = (results[0].success && Array.isArray(results[0].data)) ? (results[0].data.users || results[0].data) : [];
    var earned = (results[1].success && Array.isArray(results[1].data)) ? (results[1].data.users || results[1].data) : [];
    if (el) {
      el.innerHTML =
        '<div class="form-row" style="align-items:stretch">' +
          '<div class="card" style="flex:1;margin:0">' +
            '<div class="card-header"><div class="card-title">🏆 上传数量榜</div></div>' +
            '<div class="card-body flush"><ul class="rank-list" id="lb-uploads"></ul></div>' +
          '</div>' +
          '<div class="card" style="flex:1;margin:0">' +
            '<div class="card-header"><div class="card-title">💰 积分贡献榜</div></div>' +
            '<div class="card-body flush"><ul class="rank-list" id="lb-earned"></ul></div>' +
          '</div>' +
        '</div>';
      var upEl = document.getElementById('lb-uploads');
      var erEl = document.getElementById('lb-earned');
      if (upEl) {
        if (!uploads.length) upEl.innerHTML = '<li style="padding:30px;text-align:center;color:#94a3b8">暂无数据</li>';
        else upEl.innerHTML = renderRankList(uploads, 'upload_count', '份资料');
      }
      if (erEl) {
        if (!earned.length) erEl.innerHTML = '<li style="padding:30px;text-align:center;color:#94a3b8">暂无数据</li>';
        else erEl.innerHTML = renderRankList(earned, 'earned_points', '积分');
      }
    }
  }

  function renderRankList(list, valueKey, unit) {
    var html = '';
    list.forEach(function (item, idx) {
      var rank = idx + 1;
      var cls = rank === 1 ? 'top1' : (rank === 2 ? 'top2' : (rank === 3 ? 'top3' : ''));
      var uid = item.user_id || item.id || item.userId;
      var isMe = String(uid) === String(state.user.id || state.user.user_id);
      var value = pick(item, [valueKey, 'uploads', 'uploadCount', 'count', 'earned', 'earnedPoints', 'total_earned'], 0);
      var name = item.name || item.username || ('用户' + uid);
      html +=
        '<li class="rank-item"' + (isMe ? ' style="background:#eff6ff"' : '') + '>' +
          '<div class="rank-no ' + cls + '">' + rank + '</div>' +
          '<div class="rank-name">' + escapeHTML(name) +
            (isMe ? ' <span style="font-size:11px;color:#2563eb">(我)</span>' : '') +
            ' <span style="font-size:12px;color:#94a3b8;margin-left:6px">' + (ROLE_NAMES[item.role] || item.role || '') + '</span>' +
          '</div>' +
          '<div class="rank-value">' + formatPoints(value) + ' <span style="font-size:12px;color:#94a3b8;font-weight:400">' + unit + '</span></div>' +
        '</li>';
    });
    return html;
  }

  /* ========================================================
   * 页面：用户管理（admin）
   * ====================================================== */
  function renderAdminUsers() {
    setContent(
      '<div class="page-header"><div class="page-title">用户管理</div>' +
        '<div class="page-desc">管理平台用户账号、角色与状态</div></div>' +
      '<div class="card">' +
        '<div class="card-header"><div class="card-title">用户列表</div>' +
          '<button class="btn btn-primary btn-sm" id="user-add" type="button">+ 新增用户</button></div>' +
        '<div class="card-body flush" id="user-list">' + inlineLoading() + '</div>' +
      '</div>'
    );
    document.getElementById('user-add').addEventListener('click', function () { openUserFormModal(null); });
    loadUsers();
  }

  async function loadUsers() {
    var listEl = document.getElementById('user-list');
    if (listEl) listEl.innerHTML = inlineLoading();
    var r = await api('/admin/users');
    if (!listEl) return;
    if (r && r.success && r.data) {
      var users = r.data.users || r.data || [];
      renderUserTable(users, listEl);
    } else {
      listEl.innerHTML = emptyState((r && r.message) || '暂无用户');
    }
  }

  function renderUserTable(users, container) {
    if (!users.length) { container.innerHTML = emptyState('暂无用户'); return; }
    var html = '<div class="table-wrap"><table class="data-table">' +
      '<thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>积分余额</th><th>累计获得</th><th>上传资料</th><th>状态</th><th style="text-align:right">操作</th></tr></thead><tbody>';
    users.forEach(function (u) {
      var isSelf = String(u.id || u.user_id) === String(state.user.id || state.user.user_id);
      html +=
        '<tr>' +
          '<td class="cell-title">' + escapeHTML(u.username) + (isSelf ? ' <span style="font-size:11px;color:#2563eb">(我)</span>' : '') + '</td>' +
          '<td>' + escapeHTML(u.name) + '</td>' +
          '<td><span class="badge badge-info">' + (ROLE_NAMES[u.role] || u.role) + '</span></td>' +
          '<td class="cell-points">' + formatPoints(u.balance || u.points || 0) + '</td>' +
          '<td>' + formatPoints(u.total_earned || u.earned_points || 0) + '</td>' +
          '<td>' + formatPoints(u.upload_count || u.uploads || 0) + '</td>' +
          '<td>' + statusBadge(u.status) + '</td>' +
          '<td style="text-align:right"><div class="row-actions" style="justify-content:flex-end">' +
            '<button class="btn btn-sm btn-secondary" data-edit="' + (u.id || u.user_id) + '" type="button">编辑</button>' +
            (isSelf ? '' : '<button class="btn btn-sm btn-danger" data-del="' + (u.id || u.user_id) + '" type="button">删除</button>') +
          '</div></td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';
    container.innerHTML = html;
    container.querySelectorAll('[data-edit]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-edit');
        var user = users.find(function (x) { return String(x.id || x.user_id) === String(id); });
        if (user) openUserFormModal(user);
      });
    });
    container.querySelectorAll('[data-del]').forEach(function (btn) {
      btn.addEventListener('click', async function () {
        var id = btn.getAttribute('data-del');
        var user = users.find(function (x) { return String(x.id || x.user_id) === String(id); });
        var ok = await confirmDialog({
          title: '删除用户',
          message: '确定删除用户 <strong style="color:#1a2332">' + escapeHTML(user ? (user.name || user.username) : ('#' + id)) + '</strong> 吗？此操作不可恢复。',
          confirmText: '确认删除',
          danger: true
        });
        if (!ok) return;
        showLoading();
        var r = await api('/admin/users/' + id, { method: 'DELETE' });
        hideLoading();
        if (r && r.success) { showToast('用户已删除', 'success'); loadUsers(); }
        else showToast((r && r.message) || '删除失败', 'error');
      });
    });
  }

  function openUserFormModal(user) {
    var isEdit = !!user;
    var body =
      '<form id="user-form">' +
        '<div class="form-group">' +
          '<label class="form-label">用户名<span class="required">*</span></label>' +
          '<input class="form-control" id="uf-username" type="text" value="' + escapeHTML(user ? user.username : '') + '" ' + (isEdit ? 'readonly' : 'placeholder="请输入用户名"') + ' />' +
          (isEdit ? '<div class="form-hint">用户名创建后不可修改</div>' : '') +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">姓名<span class="required">*</span></label>' +
          '<input class="form-control" id="uf-name" type="text" value="' + escapeHTML(user ? user.name : '') + '" placeholder="请输入姓名" />' +
        '</div>' +
        (isEdit ? '' :
          '<div class="form-group">' +
            '<label class="form-label">密码<span class="required">*</span></label>' +
            '<input class="form-control" id="uf-password" type="text" value="123456" placeholder="请输入初始密码" />' +
          '</div>'
        ) +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">角色<span class="required">*</span></label>' +
            '<select class="form-control" id="uf-role">' +
              '<option value="employee"' + (user && user.role === 'employee' ? ' selected' : '') + '>普通员工</option>' +
              '<option value="reviewer"' + (user && user.role === 'reviewer' ? ' selected' : '') + '>审核员</option>' +
              '<option value="admin"' + (user && user.role === 'admin' ? ' selected' : '') + '>管理员</option>' +
            '</select>' +
          '</div>' +
          (isEdit ?
            '<div class="form-group">' +
              '<label class="form-label">状态</label>' +
              '<select class="form-control" id="uf-status">' +
                '<option value="active"' + (user && user.status === 'active' ? ' selected' : '') + '>正常</option>' +
                '<option value="disabled"' + (user && user.status === 'disabled' ? ' selected' : '') + '>禁用</option>' +
              '</select>' +
            '</div>' : ''
          ) +
        '</div>' +
      '</form>';
    var ref = openModal({
      title: isEdit ? '编辑用户' : '新增用户', body: body, size: 'lg',
      footer: '<button class="btn btn-secondary" id="uf-cancel" type="button">取消</button>' +
        '<button class="btn btn-primary" id="uf-save" type="button">' + (isEdit ? '保存修改' : '创建用户') + '</button>'
    });
    ref.overlay.querySelector('#uf-cancel').addEventListener('click', function () { ref.close(); });
    ref.overlay.querySelector('#uf-save').addEventListener('click', function () { saveUser(user, ref); });
  }

  async function saveUser(user, modalRef) {
    var isEdit = !!user;
    var data = {
      username: document.getElementById('uf-username').value.trim(),
      name: document.getElementById('uf-name').value.trim(),
      role: document.getElementById('uf-role').value
    };
    if (!isEdit) data.password = document.getElementById('uf-password').value;
    else data.status = document.getElementById('uf-status').value;
    if (!data.name) { showToast('请输入姓名', 'warning'); return; }
    if (!isEdit && (!data.username || !data.password)) { showToast('请填写用户名和密码', 'warning'); return; }
    showLoading();
    try {
      var r = isEdit
        ? await api('/admin/users/' + (user.id || user.user_id), { method: 'PUT', body: data })
        : await api('/admin/users', { method: 'POST', body: data });
      hideLoading();
      if (r && r.success) {
        showToast(isEdit ? '用户更新成功' : '用户创建成功', 'success');
        if (modalRef) modalRef.close();
        loadUsers();
      } else {
        showToast((r && r.message) || '操作失败', 'error');
      }
    } catch (e) {
      hideLoading();
      showToast('网络错误，操作失败', 'error');
    }
  }

  /* ========================================================
   * 启动
   * ====================================================== */
  async function init() {
    MockAPI._init();
    window.addEventListener('hashchange', handleRoute);
    var saved = null;
    try { saved = localStorage.getItem('sessionId'); } catch (e) {}
    if (saved) {
      try {
        var r = await api('/auth/me');
        if (r && r.success && r.data) state.user = r.data;
      } catch (e) {}
    }
    if (state.user) {
      enterApp();
    } else {
      renderLogin();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
