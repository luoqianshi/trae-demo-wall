                        <i class="fas fa-calendar-alt"></i>

                    </label>

                </div>
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-wallet"></i>

                    </label>

                        <option value="中档" selected>💴 中档（500-800元/天）</option>
                        <option value="高端">💎 高端（800-1500元/天）</option>
                    </select>
                </div>

                <i class="fas fa-magic"></i>
                生成专属行程
            </button>
        </section>

        </div>

            if (weatherLower.includes('晴')) return '☀️';
            if (weatherLower.includes('多云')) return '⛅';
            if (weatherLower.includes('阴')) return '☁️';

            if (weatherLower.includes('雷')) return '⛈️';

            };
            const base = mockData[city] || { temp: 28, weather: '多云', wind: '东南风', power: '2级' };
            const forecasts = [];
            const weathers = ['晴', '多云', '阴', '小雨', '多云', '晴'];
            const temps = [base.temp, base.temp + 1, base.temp - 1, base.temp + 2, base.temp, base.temp - 2];
            for (let i = 0; i < 6; i++) {
                forecasts.push({
                    dayweather: weathers[i],
                    daytemp: temps[i],
                    daywind: base.wind,
                    daypower: base.power
                });
            }
            return { casts: forecasts };
        }

        // ==================== 渲染天气到DOM ====================
        function renderWeather(forecastData) {
            const weatherCurrent = document.getElementById('weather-current');
            const weatherContent = document.getElementById('weather-content');
            const casts = forecastData.casts;

            if (casts && casts.length > 0) {
                const today = casts[0];
                const weatherIcon = getWeatherIcon(today.dayweather);

                weatherCurrent.innerHTML = `
                    <div class="weather-current-icon">${weatherIcon}</div>
                    <div class="weather-current-info">
                        <div class="weather-current-temp">${today.daytemp}°C</div>
                        <div class="weather-current-desc">${today.dayweather}</div>
                        <div class="weather-current-details">风力: ${today.daywind} ${today.daypower}</div>
                    </div>
                `;

                let forecastHtml = '';
                const days = ['今天', '明天', '后天', '第三天', '第四天', '第五天'];
                casts.slice(0, 6).forEach((cast, index) => {
                    const icon = getWeatherIcon(cast.dayweather);
                    forecastHtml += `
                        <div class="weather-day">
                            <div class="weather-day-name">${days[index]}</div>

        // ==================== 查询天气 ====================
        async function fetchWeather(city) {
            const weatherCurrent = document.getElementById('weather-current');
            const weatherContent = document.getElementById('weather-content');

            weatherCurrent.innerHTML = `
                <div class="weather-current-icon">⏳</div>
                <div class="weather-current-info">
                    <div class="weather-current-temp">--°C</div>
                    <div class="weather-current-desc">正在查询天气...</div>
                    <div class="weather-current-details">请稍候</div>
                </div>
            `;

            const cityCode = cityCodes[city];
            if (!cityCode) {
                renderWeather(getMockWeather(city));
                return;
            }

            try {
                const url = `/api/weather?cityCode=${cityCode}`;
                console.log('天气API请求:', url);
                const response = await fetch(url);
                const result = await response.json();
                console.log('天气API响应:', result);

                if (result.success && result.data && result.data.status === '1' && result.data.forecasts && result.data.forecasts.length > 0) {
                    const data = result.data;
                    const forecast = data.forecasts[0];
                    renderWeather(forecast);
                } else {
                    console.warn('API返回失败，使用模拟数据:', result);
                    renderWeather(getMockWeather(city));
                }
            } catch (error) {
                console.error('天气查询失败，使用模拟数据:', error);
                renderWeather(getMockWeather(city));
            }
        }

        // ==================== 生成行程规划 ====================
        function generateItinerary(city, days, budget) {
            const budgetRanges = {
                '平价': { min: 300, max: 500, accommodation: '经济型酒店/青年旅舍', tips: ['选择经济实惠的餐馆', '利用公共交通', '自带水和小零食'] },
                '中档': { min: 500, max: 800, accommodation: '三星级酒店/精品民宿', tips: ['尝试当地特色餐厅', '打车+公交结合', '购买纪念品'] },
                '高端': { min: 800, max: 1500, accommodation: '四星/五星酒店/特色度假酒店', tips: ['米其林/当地顶级餐厅', '包车出行', '享受特色体验项目'] }
            };

            const budgetInfo = budgetRanges[budget] || budgetRanges['中档'];
            const cityAttractions = attractions[city];
            const cityFoods = foods[city];

            // 避免景点重复：循环使用景点列表
            const dailyPlans = [];
            for (let i = 0; i < days; i++) {
                // 使用不同的索引确保上午下午景点不同
                const morningIdx = (i * 2) % cityAttractions.length;
                const afternoonIdx = (i * 2 + 1) % cityAttractions.length;
                
                // 如果景点数量只有1个，上午下午使用同一个
                const morningAttraction = cityAttractions[morningIdx];
                const afternoonAttraction = cityAttractions.length > 1 
                    ? cityAttractions[afternoonIdx !== morningIdx ? afternoonIdx : (afternoonIdx + 1) % cityAttractions.length]
                    : cityAttractions[0];

                // 美食也循环使用，避免重复
                const lunchIdx = (i * 2) % cityFoods.length;
                const dinnerIdx = (i * 2 + 1) % cityFoods.length;

                dailyPlans.push({
                    day: i + 1,
                    morning: morningAttraction,
                    lunch: cityFoods[lunchIdx],
                    afternoon: afternoonAttraction,
                    dinner: cityFoods[dinnerIdx],
                    accommodation: budgetInfo.accommodation,
                    tips: budgetInfo.tips
                });
            }

            return {
                city,
                days,
                budget,
                budgetRange: `${budgetInfo.min}-${budgetInfo.max}元/天`,
                transport: getTransportSuggestion(city),
                dailyPlans,
                mustTryFoods: cityFoods.slice(0, 5),
                moneySavingTips: [
                    '提前网上购票可能有优惠',
                    '学生记得带学生证',
                    '当地小吃街性价比高',
                    '避开节假日出行更省钱'
                ]
            };
        }

                content.style.transition = 'max-height 0.3s ease-out';
                arrow.textContent = '▶';
            } else {
                content.style.maxHeight = 'none';
                content.style.overflow = 'visible';
                arrow.textContent = '▼';
            }
        }

        // ==================== 显示时间计划 ====================
        function displayTimeline(data) {
            const timelineContainer = document.getElementById('timeline-container');
            
            const timePlan = {
                morning: '08:30 - 12:00',
                lunch: '12:00 - 13:30',
                afternoon: '14:00 - 17:30',
                dinner: '18:00 - 20:00'
            };

            const icons = {
                morning: 'sunrise',
                lunch: 'utensils',
                afternoon: 'sun',
                dinner: 'moon'
            };

            let html = '';

            data.dailyPlans.forEach(day => {
                html += `<div class="timeline-day-header">Day ${day.day}</div>`;

                html += `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-time">${timePlan.morning}</div>
                        <div class="timeline-content">
                            <div class="timeline-title">
                                <i class="fas fa-${icons.morning}"></i>
                                ${day.morning.name}
                            </div>
                            <div class="timeline-desc">
                                📍 ${day.morning.address}
                            </div>
                        </div>
                    </div>
                `;

                html += `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-time">${timePlan.lunch}</div>
                        <div class="timeline-content">
                            <div class="timeline-title">
                                <i class="fas fa-${icons.lunch}"></i>
                                ${day.lunch.name}
                            </div>
                            <div class="timeline-desc">
                                ${day.lunch.desc} · 💰 预估：${day.lunch.price}
                            </div>
                        </div>
                    </div>
                `;

                html += `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-time">${timePlan.afternoon}</div>
                        <div class="timeline-content">
                            <div class="timeline-title">
                                <i class="fas fa-${icons.afternoon}"></i>
                                ${day.afternoon.name}
                            </div>
                            <div class="timeline-desc">
                                📍 ${day.afternoon.address}
                            </div>
                        </div>
                    </div>
                `;

                html += `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-time">${timePlan.dinner}</div>
                        <div class="timeline-content">
                            <div class="timeline-title">
                                <i class="fas fa-${icons.dinner}"></i>
                                ${day.dinner.name}
                            </div>
                            <div class="timeline-desc">
                                ${day.dinner.desc} · 💰 预估：${day.dinner.price}
                            </div>
                        </div>
                    </div>
                `;
            });

            timelineContainer.innerHTML = html;
        }

        // ==================== 初始化地图 ====================
        function initMap(data) {
            try {
                markersData = {};

                const centerPoints = {
                    '自贡': [104.77, 29.34],
                    '宜宾': [104.62, 28.76],
                    '泸州': [105.35, 28.88],
                    '内江': [105.05, 29.57],
                    '乐山': [103.76, 29.56]
                };
                const center = centerPoints[data.city] || [104.77, 29.34];

                if (currentMap) {
                    currentMap.destroy();
                }

                const map = new AMap.Map('map-container', {
                    zoom: 11,
                    center: center,
                    viewMode: '2D'
                });

                currentMap = map;

                const mapData = [];
                data.dailyPlans.forEach(day => {
                    mapData.push({ name: day.morning.name, city: data.city });
                    mapData.push({ name: day.afternoon.name, city: data.city });
                });

                let markersAdded = 0;
                const totalMarkers = mapData.length;

                mapData.forEach((place) => {
                    AMap.plugin('AMap.PlaceSearch', function() {
                        const placeSearch = new AMap.PlaceSearch({
                            city: place.city,
                            pageSize: 1
                        });

                        placeSearch.search(place.name, function(status, result) {
                            if (status === 'complete' && result.poiList && result.poiList.pois.length > 0) {
                                const location = result.poiList.pois[0].location;
                                const details = attractions[place.city].find(a => a.name === place.name) || {};

                                const marker = new AMap.Marker({
                                    position: location,
                                    map: map,
                                    title: place.name,
                                    animation: AMap.Animation.DROP
                                });

                                const infoWindow = new AMap.InfoWindow({
                                    content: `<div style="padding:20px; font-family:'Noto Sans SC',sans-serif; max-width:300px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 15px;">
<h4 style="margin:0 0 15px; font-size: 1.3em; font-weight: 700;">${place.name}</h4>
${details.address ? `<p style="margin:8px 0; font-size: 0.9em;"><i class="fas fa-map-marker-alt"></i> ${details.address}</p>` : ''}
${details.ticket ? `<p style="margin:8px 0; font-size: 0.9em;"><i class="fas fa-ticket-alt"></i> 票价：${details.ticket}</p>` : ''}
${details.openTime ? `<p style="margin:8px 0; font-size: 0.9em;"><i class="fas fa-clock"></i> ${details.openTime}</p>` : ''}
${details.description ? `<p style="margin:15px 0 0; font-size: 0.85em; opacity: 0.9;">${details.description}</p>` : ''}
</div>`,
                                    offset: new AMap.Pixel(0, -30)
                                });

                                marker.on('click', function() {
                                    infoWindow.open(map, marker.getPosition());
                                });

                                markersData[place.name] = {
                                    marker: marker,
                                    infoWindow: infoWindow,
                                    location: location
                                };

                                markersAdded++;
                                if (markersAdded === totalMarkers) {
                                    map.setFitView();
                                }
                            }
                        });
                    });
                });
            } catch (error) {
                console.error('地图初始化失败:', error);
            }
        }

        // ==================== 页面加载完成 ====================
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            loadAmapScript();
            initMagneticButtons();
            initScrollAnimations();
            initCustomCursor();
        });

        // ==================== 磁吸按钮效果 ====================
        function initMagneticButtons() {
            const buttons = document.querySelectorAll('.submit-btn');
            buttons.forEach(btn => {
                btn.addEventListener('mousemove', function(e) {
                    const rect = this.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    
                    this.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px) scale(1.02)`;
                    this.style.transition = 'transform 0.1s ease-out';
                });

                btn.addEventListener('mouseleave', function() {
                    this.style.transform = 'translate(0, 0) scale(1)';
                    this.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
                });
            });
        }

        // ==================== 自定义光标效果 ====================
        function initCustomCursor() {
            const cursor = document.createElement('div');
            cursor.className = 'custom-cursor';
            cursor.style.cssText = `
                position: fixed;
                width: 20px;
                height: 20px;
                border: 2px solid rgba(168, 85, 247, 0.6);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease, border-width 0.3s ease;
                mix-blend-mode: difference;
            `;
            
            const cursorDot = document.createElement('div');
            cursorDot.className = 'custom-cursor-dot';
            cursorDot.style.cssText = `
                position: fixed;
                width: 6px;
                height: 6px;
                background: rgba(168, 85, 247, 0.8);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition: background 0.3s ease;
            `;

            document.body.appendChild(cursor);
            document.body.appendChild(cursorDot);

            let isHovering = false;

            document.addEventListener('mousemove', function(e) {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                cursorDot.style.left = e.clientX + 'px';
                cursorDot.style.top = e.clientY + 'px';
            });

            const hoverElements = document.querySelectorAll('button, a, .feature-tag, .day-header, .attraction-item, .food-tag');
            hoverElements.forEach(el => {
                el.addEventListener('mouseenter', function() {
                    isHovering = true;
                    cursor.style.width = '40px';
                    cursor.style.height = '40px';
                    cursor.style.borderColor = 'rgba(6, 182, 212, 0.8)';
                    cursor.style.borderWidth = '3px';
                    cursorDot.style.background = 'rgba(6, 182, 212, 1)';
                    this.style.cursor = 'none';
                });

                el.addEventListener('mouseleave', function() {
                    isHovering = false;
                    cursor.style.width = '20px';
                    cursor.style.height = '20px';
                    cursor.style.borderColor = 'rgba(168, 85, 247, 0.6)';
                    cursor.style.borderWidth = '2px';
                    cursorDot.style.background = 'rgba(168, 85, 247, 0.8)';
                    this.style.cursor = 'pointer';
                });
            });

            document.addEventListener('mouseleave', function() {
                cursor.style.opacity = '0';
                cursorDot.style.opacity = '0';
            });

            document.addEventListener('mouseenter', function() {
                cursor.style.opacity = '1';
                cursorDot.style.opacity = '1';
            });
        }

        // ==================== 滚动驱动动画 ====================
        function initScrollAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);

            const animatedElements = document.querySelectorAll('.result-card, .weather-card, .feature-tag, .form-group');
            animatedElements.forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(30px)';
                el.style.transition = 'opacity 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                observer.observe(el);
            });
        }

        // ==================== 星空背景 ====================
        function createStars() {
            const starsContainer = document.getElementById('stars');
            if (!starsContainer) return;
            
            const starCount = 100;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (3 + Math.random() * 4) + 's';
                starsContainer.appendChild(star);
            }
        }

        // ==================== 粒子效果 ====================
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;

            createStars();

            const particleCount = 20;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (5 + Math.random() * 15) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (10 + Math.random() * 15) + 's';
                
                const style = document.createElement('style');
                style.textContent = `
                    .particle:nth-child(${i + 1}) {
                        animation: particleFloat ${10 + Math.random() * 15}s linear infinite;
                        animation-delay: ${Math.random() * 10}s;
                    }
                `;
                document.head.appendChild(style);
                
                container.appendChild(particle);
            }
        }
    </script>
</body>
