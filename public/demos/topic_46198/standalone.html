<script>
/* ============================================







 * app.js - 主应用控制器







 * 路由、导航、模块调度、全局初始化







 * ============================================ */















window.App = (function () {















  /* ---------- 普通用户导航 ---------- */







  const USER_TABS = [







    { id: 'home', label: '首页', icon: '🏠' },







    { id: 'health', label: '健康', icon: '💓' },







    { id: 'emergency', label: '求助', icon: '🆘' },







    { id: 'assistant', label: '助手', icon: '🤖' },







    { id: 'service', label: '服务', icon: '🛎️' },







    { id: 'scenarios', label: '场景', icon: '🎭' },







    { id: 'profile', label: '我的', icon: '👤' }







  ];















  /* ---------- 管理员导航 ---------- */







  const ADMIN_TABS = [







    { id: 'admin', label: '后台', icon: '🛠️' },







    { id: 'scenarios', label: '场景', icon: '🎭' },







    { id: 'profile', label: '我的', icon: '👤' }







  ];















  let currentTab = 'home';

  // 场景模式来源：记录发起切换的原始管理员ID
  // - 管理员切换到用户时设置，返回管理员时清除
  // - 普通用户直接登录时为 null，禁止任何切换
  let scenarioOriginId = null;

  function getScenarioOriginId() { return scenarioOriginId; }







  let appContainer = null;







  let tabbarContainer = null;







  let desktopNavContainer = null;















  /* ---------- 初始化 ---------- */







  function init() {







    appContainer = document.getElementById('app');







    tabbarContainer = document.getElementById('tabbar');







    desktopNavContainer = document.getElementById('desktopNav');







    // 恢复个性化设置

    try {

      const fontSize = localStorage.getItem('pref_fontSize');

      if (fontSize) {

        const sizeMap = { small: '14px', normal: '16px', large: '18px', xlarge: '20px' };

        document.documentElement.style.fontSize = sizeMap[fontSize] || '16px';

      }

      if (localStorage.getItem('pref_highContrast') === 'true') {

        document.body.classList.add('high-contrast');

      }

    } catch (e) {}







    // 帮助按钮







    document.getElementById('btnHelp').addEventListener('click', () => {







      const user = Auth.getCurrentUser();







      if (user) {







        navigate('guide');







      } else {







        Guide.showOnboard();







      }







    });















    // 检查会话







    const user = Auth.getCurrentUser();







    if (user) {







      showMainApp(user);







    } else {







      showLogin();







    }







  }















  /* ---------- 显示登录页 ---------- */







  function showLogin() {







    tabbarContainer.innerHTML = '';







    desktopNavContainer.innerHTML = '';







    document.getElementById('userChip').classList.add('hidden');







    Auth.renderLogin(appContainer, (user) => {







      // 直接登录时重置场景模式来源
      scenarioOriginId = null;
      showMainApp(user);







    });







  }















  /* ---------- 用户通知接收 ---------- */

  // 记录已提示过的通知 ID，避免重复提示

  const _notifiedIds = new Set();



  function checkAndNotifyUnreadNotifications(user) {

    if (!DB || !DB.getUserNotifications) return;

    const notifs = DB.getUserNotifications(user.id);

    const unread = notifs.filter(function(n) { return !n.read && !_notifiedIds.has(n.id); });

    if (unread.length === 0) return;

    // 标记已提示

    unread.forEach(function(n) { _notifiedIds.add(n.id); });

    // 震动提醒（支持的设备生效）

    if (UI.vibrate) UI.vibrate([200, 100, 200, 100, 200]);

    // 视觉通知

    if (unread.length === 1) {

      const n = unread[0];

      const typeLabel = {info:'通知', medication:'用药提醒', health:'健康提醒', care:'关怀问候', emergency:'紧急通知'}[n.type] || '通知';

      const toastType = n.type === 'emergency' ? 'error' : (n.type === 'medication' || n.type === 'health' ? 'warning' : 'info');

      UI.toast('【' + typeLabel + '】' + (n.title || ''), toastType, 6000);

      if (n.content) {

        setTimeout(function() { UI.toast(n.content, toastType, 6000); }, 800);

      }

    } else {

      const hasEmergency = unread.some(function(n) { return n.type === 'emergency'; });

      const type = hasEmergency ? 'error' : 'warning';

      UI.toast('您有 ' + unread.length + ' 条新通知，请前往“我的”页面查看', type, 6000);

    }

  }



  /* ---------- 显示主应用 ---------- */







  function showMainApp(user) {



    Auth.renderUserChip(document.getElementById('userChip'));



    renderNavigation(user);



    currentTab = user.tier === 'admin' ? 'admin' : 'home';



    navigate(currentTab);



    // 启动用药提醒引擎（非管理员用户）

    if (user.tier !== 'admin' && window.MedReminder) {

      MedReminder.start(user);

      // 登录后推送待服用提醒

      MedReminder.pushPendingOnLogin(user);

    } else if (window.MedReminder) {

      MedReminder.stop();

    }

    // 非管理员用户：检查未读管理员通知并提示

    if (user.tier !== 'admin') {

      checkAndNotifyUnreadNotifications(user);

      // 启动定时轮询（每 30 秒检查一次新通知）

      if (window._notifPollTimer) clearInterval(window._notifPollTimer);

      window._notifPollTimer = setInterval(function() {

        const u = Auth.getCurrentUser();

        if (u && u.tier !== 'admin') checkAndNotifyUnreadNotifications(u);

      }, 30000);

    }



  }















  /* ---------- 渲染导航 ---------- */







  function renderNavigation(user) {







    const tabs = user.tier === 'admin' ? ADMIN_TABS : USER_TABS;















    // 底部导航（移动端）







    tabbarContainer.innerHTML = tabs.map(t => `







      <button data-tab="${t.id}" class="${t.id === currentTab ? 'active' : ''}">







        <span class="tab-icon">${t.icon}</span>







        <span>${t.label}</span>







      </button>







    `).join('');







    tabbarContainer.querySelectorAll('button').forEach(btn => {







      btn.addEventListener('click', () => navigate(btn.dataset.tab));







    });















    // 桌面导航







    desktopNavContainer.innerHTML = tabs.map(t => `







      <a href="#" data-tab="${t.id}" class="${t.id === currentTab ? 'active' : ''}">${t.icon} ${t.label}</a>







    `).join('');







    desktopNavContainer.querySelectorAll('a').forEach(a => {







      a.addEventListener('click', e => {







        e.preventDefault();







        navigate(a.dataset.tab);







      });







    });







  }















  /* ---------- 路由导航 ---------- */



  function navigate(tabId) {



    const user = Auth.getCurrentUser();



    if (!user) { showLogin(); return; }







    // 权限校验：普通用户禁止访问管理员界面

    if (tabId === 'admin' && user.tier !== 'admin') {

      UI.toast('权限不足：普通用户无法访问管理后台', 'warning', 3000);

      return;

    }



    // 权限校验：管理员在场景模式下（以其他用户身份体验）时，

    // 允许访问用户界面，但禁止直接访问其他用户界面（通过场景切换）

    // 该限制在 switchUser 函数中处理



    currentTab = tabId;



    // 记录用户活动（用于管理员实时监测）

    if (DB.recordUserActivity) DB.recordUserActivity(user.id, tabId);



    // 更新导航高亮



    document.querySelectorAll('#tabbar button').forEach(b => {



      b.classList.toggle('active', b.dataset.tab === tabId);



    });



    document.querySelectorAll('#desktopNav a').forEach(a => {



      a.classList.toggle('active', a.dataset.tab === tabId);



    });







    // 关闭所有模态框



    UI.closeAllModals();







    // 滚动到顶部



    window.scrollTo(0, 0);







    // 渲染对应模块



    try {



      switch (tabId) {



        case 'home':



          renderHome(user);



          break;



        case 'health':



          Health.render(appContainer, user);



          break;



        case 'emergency':



          Emergency.render(appContainer, user);



          break;



        case 'assistant':



          Assistant.render(appContainer, user);



          break;



        case 'service':



          Service.render(appContainer, user);



          break;



        case 'admin':



          Admin.render(appContainer, user);



          break;







        case 'scenarios':







          Scenarios.render(appContainer, user);







          break;







        case 'profile':







          Auth.renderProfile(appContainer);







          break;







        case 'guide':







          Guide.render(appContainer, user);







          break;







        default:







          renderHome(user);







      }







    } catch (e) {







      console.error('导航错误:', e);







      appContainer.innerHTML = UI.emptyState('⚠️', '页面加载失败：' + e.message);







    }







  }















  /* ---------- 渲染首页 ---------- */







  function renderHome(user) {







    const hour = new Date().getHours();







    let greeting = '您好';







    if (hour < 6) greeting = '凌晨好';







    else if (hour < 12) greeting = '早上好';







    else if (hour < 14) greeting = '中午好';







    else if (hour < 18) greeting = '下午好';







    else greeting = '晚上好';















    // 健康摘要







    const healthData = DB.getHealthData(user.id);







    let healthSummary = '暂无健康数据';







    let alertCount = 0;







    if (healthData) {







      alertCount = healthData.metrics.filter(m => m.status !== 'normal').length;







      if (alertCount === 0) healthSummary = '各项指标正常，请继续保持';







      else healthSummary = '检测到 ' + alertCount + ' 项指标异常，请关注';







    }















    // 待办事项







    const meds = DB.getMedications(user.id);







    const pendingMeds = meds.filter(m => !m.taken);







    const schedules = DB.getSchedules(user.id);















    appContainer.innerHTML = `







      <div class="scenario-bar">







        <span class="label">👋 ${greeting}，${UI.esc(user.name)}！</span>







        <span class="badge badge-blue">${UI.esc(user.groupLabel)}</span>







      </div>















      ${alertCount > 0 ? `







        <div class="alert alert-warning">







          <span class="ic">⚠️</span>



          <div><strong>健康提醒</strong>：${UI.esc(healthSummary)}，<a href="#" id="alertLink" style="color:inherit;text-decoration:underline;">查看详情</a></div>







        </div>







      ` : `







        <div class="alert alert-success">







          <span class="ic">✅</span>



          <div><strong>健康状态良好</strong>：${UI.esc(healthSummary)}</div>







        </div>







      `}















      <div class="card">







        <div class="card-title"><span class="ic">⚡</span><h3>快捷功能</h3></div>







        <div class="grid grid-3">







          <button class="btn btn-ghost" style="flex-direction:column;padding:16px;" data-quick="health">



            <span style="font-size:32px;">💓</span>







            <span>健康监测</span>







          </button>







          <button class="btn btn-ghost" style="flex-direction:column;padding:16px;" data-quick="emergency">



            <span style="font-size:32px;">🆘</span>







            <span>紧急求助</span>







          </button>







          <button class="btn btn-ghost" style="flex-direction:column;padding:16px;" data-quick="assistant">



            <span style="font-size:32px;">🤖</span>







            <span>生活助手</span>







          </button>







          <button class="btn btn-ghost" style="flex-direction:column;padding:16px;" data-quick="service">



            <span style="font-size:32px;">🛎️</span>







            <span>服务预约</span>







          </button>







          <button class="btn btn-ghost" style="flex-direction:column;padding:16px;" data-quick="scenarios">



            <span style="font-size:32px;">🎭</span>







            <span>场景模拟</span>







          </button>







          <button class="btn btn-ghost" style="flex-direction:column;padding:16px;" data-quick="profile">



            <span style="font-size:32px;">👤</span>







            <span>个人中心</span>







          </button>







        </div>







      </div>















      <div class="card">







        <div class="card-title"><span class="ic">📋</span><h3>今日待办</h3></div>







        ${pendingMeds.length ? `







          <div class="list-item">







            <div class="li-icon">💊</div>







            <div class="li-body">







              <div class="li-title">待服药 ${pendingMeds.length} 项</div>







              <div class="li-sub">${UI.esc(pendingMeds.map(m => m.name).join('、'))}</div>







            </div>







            <div class="li-actions">







              <button class="btn btn-sm btn-primary" data-quick="assistant">查看</button>







            </div>







          </div>







        ` : '<div class="empty-state"><div class="emoji">📭</div><p>暂无待办事项</p></div>'}







        ${schedules.length ? `







          <div class="list-item">







            <div class="li-icon">📅</div>







            <div class="li-body">







              <div class="li-title">今日日程 ${schedules.length} 项</div>







              <div class="li-sub">${UI.esc(schedules.map(s => s.time + ' ' + s.title).join('；'))}</div>







            </div>







            <div class="li-actions">







              <button class="btn btn-sm btn-outline" data-quick="assistant">查看</button>







            </div>







          </div>







        ` : ''}







      </div>















      <div class="card">







        <div class="card-title"><span class="ic">💓</span><h3>健康摘要</h3></div>







        ${healthData ? `







          <div class="metric-grid">







            ${healthData.metrics.slice(0, 4).map(m => `







              <div class="metric-card">







                <div class="mc-icon">${m.icon}</div>







                <div class="mc-body">







                  <div class="mc-label">${UI.esc(m.label)}</div>







                  <div><span class="mc-value">${UI.esc(m.value)}</span><span class="mc-unit">${UI.esc(m.unit)}</span></div>







                  <div class="mc-status ${m.status === 'normal' ? 'text-success' : (m.status === 'warning' ? 'text-warning' : 'text-danger')}">${UI.esc(m.statusText)}</div>







                </div>







              </div>







            `).join('')}







          </div>







          <button class="btn btn-outline btn-block mt-2" data-quick="health">查看完整健康数据</button>







        ` : UI.emptyState('📊', '暂无健康数据')}







      </div>















      <div class="card">







        <div class="card-title"><span class="ic">🛎️</span><h3>推荐服务</h3></div>







        ${renderHomeServices(user)}







      </div>







    `;















    // 绑定快捷入口







    appContainer.querySelectorAll('[data-quick]').forEach(btn => {







      btn.addEventListener('click', () => navigate(btn.dataset.quick));







    });















    // 健康预警链接







    const alertLink = appContainer.querySelector('#alertLink');







    if (alertLink) {







      alertLink.addEventListener('click', e => {







        e.preventDefault();







        navigate('health');







      });







    }







  }















  /* ---------- 首页推荐服务 ---------- */







  function renderHomeServices(user) {







    const services = DB.getServices(user.ageGroup).slice(0, 3);







    if (!services.length) return UI.emptyState('📭', '暂无推荐服务');;







    return services.map(s => `







      <div class="list-item">







        <div class="li-icon">${s.icon}</div>







        <div class="li-body">







          <div class="li-title">${UI.esc(s.name)}</div>







          <div class="li-sub">${UI.esc(s.desc)} · ${UI.esc(s.price)}</div>







        </div>







        <div class="li-actions">







          <button class="btn btn-sm btn-outline" data-quick="service">预约</button>







        </div>







      </div>







    `).join('');







  }















  /* ---------- 切换用户（场景模拟用） ---------- */

  function switchUser(targetUser) {
    const currentUser = Auth.getCurrentUser();
    if (!currentUser) {
      UI.toast('请先登录', 'warning', 2000);
      return;
    }

    const isCurrentAdmin = currentUser.tier === 'admin';
    const isTargetAdmin = targetUser.tier === 'admin';

    // ===== 严格的权限校验 =====
    // 规则：
    //   1. 管理员（原始登录）→ 可切换到任意用户
    //   2. 管理员切换后的用户（scenarioOriginId 存在）→ 仅可返回管理员
    //   3. 普通用户（直接登录，无 scenarioOriginId）→ 禁止任何切换

    if (isCurrentAdmin) {
      // 管理员发起切换：记录来源
      if (!isTargetAdmin) {
        scenarioOriginId = currentUser.id;
      } else {
        scenarioOriginId = null;
      }
    } else {
      // 当前是非管理员
      if (!isTargetAdmin) {
        // 非管理员 → 非管理员：严禁
        UI.toast('权限不足：禁止用户之间直接切换', 'warning', 3000);
        return;
      }
      // 非管理员 → 管理员：仅允许在场景模式下返回原始管理员
      if (!scenarioOriginId) {
        UI.toast('权限不足：普通用户无法切换至管理员界面', 'warning', 3000);
        return;
      }
      if (targetUser.id !== scenarioOriginId) {
        UI.toast('权限不足：仅可返回原始管理员账号', 'warning', 3000);
        return;
      }
      // 返回原始管理员，清除场景来源
      scenarioOriginId = null;
    }

    // 记录切换操作日志
    if (DB.addOperationLog) {
      DB.addOperationLog({
        type: 'user_switch',
        userId: currentUser.id,
        userName: currentUser.name,
        detail: '从 ' + currentUser.name + ' 切换至 ' + targetUser.name,
        status: 'success'
      });
    }

    if (window._notifPollTimer) { clearInterval(window._notifPollTimer); window._notifPollTimer = null; }

    _notifiedIds.clear();

    Auth.logout();
    DB.setSession(targetUser);
    Auth.login(targetUser.phone, targetUser.password);

    // 停止旧的用药提醒引擎
    if (window.MedReminder) MedReminder.stop();

    UI.toast('已切换为：' + targetUser.name, 'success', 2000);
    showMainApp(targetUser);
  }















  /* ---------- 公共 API ---------- */







  return { init, navigate, switchUser, getScenarioOriginId };







})();















/* ---------- 启动应用 ---------- */







document.addEventListener('DOMContentLoaded', function () {







  App.init();







});








</script>
