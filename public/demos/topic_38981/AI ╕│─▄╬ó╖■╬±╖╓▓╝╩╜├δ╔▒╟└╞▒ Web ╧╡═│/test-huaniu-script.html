<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI风控测试 - 黄牛模拟演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; padding: 30px; }
        .container { max-width: 1200px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.2rem; color: #fff; margin-bottom: 10px; }
        .header .tagline { color: #94a3b8; font-size: 1.1rem; }
        .header .warning { display: inline-block; margin-top: 15px; padding: 10px 25px; background: rgba(239, 68, 68, 0.2); color: #f87171; border-radius: 8px; font-weight: 500; }

        .demo-section { background: #1e293b; border-radius: 16px; padding: 30px; margin-bottom: 30px; }
        .demo-section h2 { color: #fff; font-size: 1.3rem; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .demo-section h2 .icon { font-size: 1.5rem; }

        .test-buttons { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        .test-btn { padding: 15px 30px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
        .test-btn.small { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .test-btn.small:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
        .test-btn.medium { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
        .test-btn.medium:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4); }
        .test-btn.large { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .test-btn.large:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4); }
        .test-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .login-panel { background: #0f172a; border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .login-panel input { padding: 12px 15px; border: 1px solid #334155; border-radius: 8px; background: #1e293b; color: #fff; font-size: 0.95rem; margin-right: 10px; width: 200px; }
        .login-panel button { padding: 12px 25px; background: #667eea; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; }
        .login-panel span { color: #94a3b8; margin-left: 15px; }
        .login-panel .logged-in { color: #22c55e; }

        .results-section { background: #1e293b; border-radius: 16px; padding: 30px; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .results-header h2 { color: #fff; font-size: 1.3rem; }
        .results-header .stats { display: flex; gap: 25px; }
        .stat-item { text-align: center; }
        .stat-item .value { font-size: 1.8rem; font-weight: 700; }
        .stat-item .label { font-size: 0.85rem; color: #94a3b8; }
        .stat-item.success .value { color: #22c55e; }
        .stat-item.blocked .value { color: #ef4444; }
        .stat-item.rate .value { color: #f97316; }

        .results-container { max-height: 400px; overflow-y: auto; }
        .results-list { display: flex; flex-wrap: wrap; gap: 12px; }
        .result-item { width: 60px; height: 60px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; transition: all 0.3s; }
        .result-item.success { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 2px solid #22c55e; }
        .result-item.blocked { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 2px solid #ef4444; }
        .result-item.pending { background: rgba(100, 116, 139, 0.2); color: #64748b; border: 2px solid #64748b; }

        .logs-section { background: #0f172a; border-radius: 12px; padding: 20px; margin-top: 25px; max-height: 200px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 0.85rem; line-height: 1.6; color: #94a3b8; }
        .logs-section .log-time { color: #64748b; margin-right: 10px; }
        .logs-section .log-success { color: #22c55e; }
        .logs-section .log-blocked { color: #ef4444; }
        .logs-section .log-info { color: #3b82f6; }

        .risk-status { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 12px; padding: 20px; margin-top: 25px; display: flex; justify-content: space-between; align-items: center; }
        .risk-status .status-text { color: #94a3b8; }
        .risk-status .risk-score { font-size: 2rem; font-weight: 700; }
        .risk-status.normal .risk-score { color: #22c55e; }
        .risk-status.warning .risk-score { color: #f97316; }
        .risk-status.danger .risk-score { color: #ef4444; }

        .product-selector { margin-bottom: 25px; }
        .product-selector label { color: #94a3b8; margin-right: 10px; }
        .product-selector select { padding: 10px 15px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 0.95rem; cursor: pointer; }

        .clear-btn { padding: 10px 20px; background: #334155; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .clear-btn:hover { background: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ AI风控防黄牛测试演示</h1>
            <p class="tagline">模拟黄牛脚本高频抢购行为，验证AI风控拦截效果</p>
            <div class="warning">⚠️ 此页面用于演示目的，请勿用于真实抢购场景</div>
        </div>

        <div class="demo-section">
            <h2><span class="icon">🔐</span>用户登录</h2>
            <div class="login-panel">
                <input type="text" id="loginUsername" placeholder="用户名" value="testuser">
                <input type="password" id="loginPassword" placeholder="密码" value="123456">
                <button onclick="handleLogin()">登录</button>
                <span id="loginStatus">未登录</span>
            </div>

            <h2><span class="icon">🎯</span>选择测试商品</h2>
            <div class="product-selector">
                <label>目标商品：</label>
                <select id="productSelector">
                    <option value="">请选择商品</option>
                </select>
            </div>

            <h2><span class="icon">⚡</span>批量抢购测试</h2>
            <div class="test-buttons">
                <button class="test-btn small" onclick="runTest(10)" id="btn10">
                    <span>🔢</span> 发起10次请求
                </button>
                <button class="test-btn medium" onclick="runTest(50)" id="btn50">
                    <span>📊</span> 发起50次请求
                </button>
                <button class="test-btn large" onclick="runTest(100)" id="btn100">
                    <span>💥</span> 发起100次请求
                </button>
            </div>
            <button class="clear-btn" onclick="clearResults()">清除结果</button>
        </div>

        <div class="results-section">
            <div class="results-header">
                <h2>📈 测试结果统计</h2>
                <div class="stats">
                    <div class="stat-item success">
                        <div class="value" id="successCount">0</div>
                        <div class="label">成功</div>
                    </div>
                    <div class="stat-item blocked">
                        <div class="value" id="blockedCount">0</div>
                        <div class="label">被拦截</div>
                    </div>
                    <div class="stat-item rate">
                        <div class="value" id="blockRate">0%</div>
                        <div class="label">拦截率</div>
                    </div>
                </div>
            </div>

            <div class="results-container">
                <div class="results-list" id="resultsList"></div>
            </div>

            <div class="logs-section" id="logsContainer">
                <div class="log-time">[系统]</div><span class="log-info">准备就绪，请先登录并选择商品</span>
            </div>

            <div class="risk-status" id="riskStatus">
                <div class="status-text">当前风控状态：</div>
                <div class="risk-score">--</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let token = localStorage.getItem('seckill_token');
        let userId = '';
        let products = [];
        let results = [];
        let isTesting = false;

        function request(url, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            return fetch(`${API_BASE}${url}`, { ...options, headers }).then(res => res.json());
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const res = await request('/users/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });

            if (res.code === 200) {
                token = res.data.token;
                userId = res.data.id;
                localStorage.setItem('seckill_token', token);
                document.getElementById('loginStatus').textContent = `已登录: ${res.data.username}`;
                document.getElementById('loginStatus').className = 'logged-in';
                loadProducts();
                loadRiskStatus();
            } else {
                alert('登录失败: ' + res.message);
            }
        }

        async function loadProducts() {
            const res = await request('/products');
            if (res.code === 200) {
                products = res.data.filter(p => p.status === 'active');
                const selector = document.getElementById('productSelector');
                selector.innerHTML = '<option value="">请选择商品</option>';
                products.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    selector.appendChild(opt);
                });
            }
        }

        async function loadRiskStatus() {
            const res = await request('/risk/status');
            if (res.code === 200) {
                updateRiskStatus(res.data.riskScore);
            }
        }

        function updateRiskStatus(score) {
            const statusEl = document.getElementById('riskStatus');
            const scoreEl = statusEl.querySelector('.risk-score');
            
            scoreEl.textContent = score;
            statusEl.className = 'risk-status ' + (score >= 80 ? 'danger' : score > 50 ? 'warning' : 'normal');
        }

        async function runTest(count) {
            if (!token) {
                alert('请先登录');
                return;
            }

            const productId = document.getElementById('productSelector').value;
            if (!productId) {
                alert('请选择测试商品');
                return;
            }

            if (isTesting) {
                alert('测试进行中，请等待完成');
                return;
            }

            isTesting = true;
            disableButtons(true);
            clearResults();

            addLog(`开始模拟黄牛行为，发起 ${count} 次抢购请求...`, 'info');

            for (let i = 0; i < count; i++) {
                await sendRequest(productId, i + 1);
                await delay(50 + Math.random() * 100);
            }

            isTesting = false;
            disableButtons(false);
            updateStats();
            addLog(`测试完成！成功: ${results.filter(r => r.success).length}, 拦截: ${results.filter(r => !r.success).length}`, 'info');
            loadRiskStatus();
        }

        async function sendRequest(productId, requestNum) {
            const resultEl = createResultItem(requestNum, 'pending');
            results.push({ requestNum, success: false, blocked: false });

            try {
                const res = await request('/orders/seckill', {
                    method: 'POST',
                    body: JSON.stringify({ productId })
                });

                if (res.code === 200) {
                    results[results.length - 1].success = true;
                    resultEl.className = 'result-item success';
                    resultEl.textContent = requestNum;
                    addLog(`请求 #${requestNum}: ✅ 抢购成功`, 'success');
                } else {
                    results[results.length - 1].blocked = true;
                    resultEl.className = 'result-item blocked';
                    resultEl.textContent = requestNum;
                    addLog(`请求 #${requestNum}: ❌ 被AI风控拦截 - ${res.message}`, 'blocked');
                }
            } catch (err) {
                results[results.length - 1].blocked = true;
                resultEl.className = 'result-item blocked';
                resultEl.textContent = requestNum;
                addLog(`请求 #${requestNum}: ❌ 请求失败`, 'blocked');
            }
        }

        function createResultItem(num, status) {
            const item = document.createElement('div');
            item.className = 'result-item ' + status;
            item.textContent = status === 'pending' ? '...' : num;
            document.getElementById('resultsList').appendChild(item);
            return item;
        }

        function updateStats() {
            const success = results.filter(r => r.success).length;
            const blocked = results.filter(r => r.blocked).length;
            const total = results.length;
            const rate = total > 0 ? Math.round((blocked / total) * 100) : 0;

            document.getElementById('successCount').textContent = success;
            document.getElementById('blockedCount').textContent = blocked;
            document.getElementById('blockRate').textContent = rate + '%';
        }

        function clearResults() {
            results = [];
            document.getElementById('resultsList').innerHTML = '';
            document.getElementById('logsContainer').innerHTML = '';
            document.getElementById('successCount').textContent = '0';
            document.getElementById('blockedCount').textContent = '0';
            document.getElementById('blockRate').textContent = '0%';
            addLog('已清除所有测试结果', 'info');
        }

        function addLog(message, type = 'info') {
            const logs = document.getElementById('logsContainer');
            const now = new Date();
            const timeStr = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
            logs.innerHTML += `<br><div class="log-time">${timeStr}</div><span class="log-${type}">${message}</span>`;
            logs.scrollTop = logs.scrollHeight;
        }

        function disableButtons(disabled) {
            document.getElementById('btn10').disabled = disabled;
            document.getElementById('btn50').disabled = disabled;
            document.getElementById('btn100').disabled = disabled;
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                request('/users/me').then(res => {
                    if (res.code === 200) {
                        userId = res.data.id;
                        document.getElementById('loginStatus').textContent = `已登录: ${res.data.username}`;
                        document.getElementById('loginStatus').className = 'logged-in';
                        loadProducts();
                        loadRiskStatus();
                    }
                });
            }
        });
    </script>
</body>
</html>
