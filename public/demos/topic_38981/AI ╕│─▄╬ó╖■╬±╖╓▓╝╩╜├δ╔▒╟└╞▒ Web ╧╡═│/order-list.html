<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - AI秒杀系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; color: #e2e8f0; }
        
        .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.4rem; color: white; }
        .header .nav { display: flex; gap: 20px; }
        .header .nav a { color: rgba(255,255,255,0.9); text-decoration: none; padding: 8px 16px; border-radius: 20px; transition: all 0.3s; }
        .header .nav a:hover { background: rgba(255,255,255,0.2); }
        .header .nav a.active { background: rgba(255,255,255,0.2); }
        .header .user-info { display: flex; align-items: center; gap: 15px; }
        .header .user-info span { color: rgba(255,255,255,0.9); }
        .header .btn-logout { padding: 8px 16px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 6px; cursor: pointer; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        .page-title { margin-bottom: 30px; }
        .page-title h2 { font-size: 1.5rem; }
        .page-title p { color: #94a3b8; margin-top: 5px; }

        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .filter-btn { padding: 10px 20px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #94a3b8; cursor: pointer; transition: all 0.3s; }
        .filter-btn.active { background: #667eea; border-color: #667eea; color: white; }
        .filter-btn:hover { border-color: #667eea; }

        .order-list { display: grid; gap: 20px; }
        
        .order-card { background: #1e293b; border-radius: 12px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .order-card:hover { box-shadow: 0 6px 30px rgba(0,0,0,0.3); }
        
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #334155; }
        .order-header .order-id { font-size: 0.9rem; color: #94a3b8; }
        .order-header .order-id span { color: #667eea; font-weight: 600; }
        .order-header .status { padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: 500; }
        .status.success { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status.pending { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .status.failed { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status.paid { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .product-item { display: flex; gap: 20px; }
        .product-image { width: 120px; height: 120px; border-radius: 10px; background: linear-gradient(135deg, #334155, #475569); display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .product-info { flex: 1; }
        .product-info h3 { font-size: 1.1rem; margin-bottom: 8px; }
        .product-info .type { display: inline-block; padding: 3px 8px; background: #334155; border-radius: 4px; font-size: 0.7rem; margin-bottom: 8px; }
        .product-info .desc { color: #94a3b8; font-size: 0.85rem; margin-bottom: 12px; }
        .product-info .price { font-size: 1.3rem; color: #f97316; }

        .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #334155; }
        .order-footer .time { color: #94a3b8; font-size: 0.85rem; }
        .order-footer .actions { display: flex; gap: 10px; }
        .action-btn { padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; border: none; transition: all 0.3s; }
        .action-btn.primary { background: #667eea; color: white; }
        .action-btn.primary:hover { background: #5a67d8; }
        .action-btn.success { background: #22c55e; color: white; }
        .action-btn.success:hover { background: #16a34a; }
        .action-btn:disabled { background: #475569; cursor: not-allowed; }

        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
        .empty-state h3 { color: #94a3b8; margin-bottom: 10px; }
        .empty-state p { color: #64748b; margin-bottom: 20px; }
        .empty-state a { display: inline-block; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <h1>🎯 AI秒杀系统</h1>
            <a href="seckill-frontend.html">抢购首页</a>
            <a href="order-list.html" class="active">我的订单</a>
        </div>
        <div class="user-info">
            <span id="userName">用户</span>
            <button class="btn-logout" onclick="handleLogout()">退出登录</button>
        </div>
    </div>

    <div class="container">
        <div class="page-title">
            <h2>我的订单</h2>
            <p>查看您的所有秒杀订单</p>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterOrders('all')">全部订单</button>
            <button class="filter-btn" onclick="filterOrders('pending')">待支付</button>
            <button class="filter-btn" onclick="filterOrders('paid')">已支付</button>
            <button class="filter-btn" onclick="filterOrders('success')">抢购成功</button>
            <button class="filter-btn" onclick="filterOrders('failed')">抢购失败</button>
        </div>

        <div class="order-list" id="orderList">
            <div class="empty-state">
                <div class="icon">📦</div>
                <h3>暂无订单</h3>
                <p>快去抢购心仪的商品吧！</p>
                <a href="seckill-frontend.html">去抢购</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let token = localStorage.getItem('token');
        let orders = [];
        let currentFilter = 'all';

        async function request(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            
            return fetch(API_BASE + url, {
                ...options,
                headers
            }).then(res => res.json());
        }

        async function loadOrders() {
            const res = await request('/orders/my');
            if (res.code === 200) {
                orders = res.data;
                renderOrders();
            }
        }

        function filterOrders(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderOrders();
        }

        function renderOrders() {
            const filteredOrders = currentFilter === 'all' 
                ? orders 
                : orders.filter(o => o.status === currentFilter);

            const container = document.getElementById('orderList');

            if (filteredOrders.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📦</div><h3>暂无' + (currentFilter === 'all' ? '' : getFilterText(currentFilter)) + '订单</h3><p>快去抢购心仪的商品吧！</p><a href="seckill-frontend.html">去抢购</a></div>';
                return;
            }

            container.innerHTML = filteredOrders.map(order => {
                const statusText = {
                    success: '抢购成功',
                    pending: '待支付',
                    paid: '已支付',
                    failed: '抢购失败'
                };

                const statusClass = {
                    success: 'success',
                    pending: 'pending',
                    paid: 'paid',
                    failed: 'failed'
                };

                return '<div class="order-card"><div class="order-header"><div class="order-id">订单号：<span>' + order.id + '</span></div><div class="status ' + statusClass[order.status] + '">' + statusText[order.status] + '</div></div><div class="product-item"><div class="product-image">' + (order.productImage ? '<img src="' + order.productImage + '" alt="' + order.productName + '">' : '🎁') + '</div><div class="product-info"><h3>' + order.productName + '</h3><span class="type">' + (order.productType === 'ticket' ? '演唱会门票' : '普通商品') + '</span><p class="desc">¥' + order.amount.toFixed(2) + '</p><div class="price">订单金额：¥' + order.amount.toFixed(2) + '</div></div></div><div class="order-footer"><div class="time">下单时间：' + new Date(order.createdAt).toLocaleString('zh-CN') + '</div><div class="actions"><button class="action-btn primary" onclick="viewOrder(\'' + order.id + '\')">查看详情</button>' + (order.status === 'pending' ? '<button class="action-btn success" onclick="payOrder(\'' + order.id + '\')">立即支付</button>' : '') + '</div></div></div>';
            }).join('');
        }

        function getFilterText(filter) {
            const texts = { pending: '待支付', paid: '已支付', success: '抢购成功', failed: '抢购失败' };
            return texts[filter] || '';
        }

        function viewOrder(orderId) {
            window.location.href = 'order-detail.html?id=' + orderId;
        }

        function payOrder(orderId) {
            window.location.href = 'order-detail.html?id=' + orderId;
        }

        async function checkAuth() {
            const res = await request('/users/me');
            if (res.code !== 200) {
                window.location.href = 'seckill-frontend.html';
                return false;
            }
            document.getElementById('userName').textContent = res.data.username;
            return true;
        }

        function handleLogout() {
            localStorage.removeItem('token');
            window.location.href = 'seckill-frontend.html';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                await loadOrders();
            }
        });
    </script>
</body>
</html>
