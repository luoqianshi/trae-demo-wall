<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 用户管理 - AI风控后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px; border-radius: 12px; margin-bottom: 30px; 
        }
        .header h1 { font-size: 1.8rem; color: #fff; }
        .header p { color: rgba(255,255,255,0.8); margin-top: 5px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-card h3 { color: #94a3b8; font-size: 0.9rem; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: #667eea; margin-top: 10px; }
        .stat-card.green .value { color: #22c55e; }
        .stat-card.red .value { color: #ef4444; }
        .stat-card.orange .value { color: #f97316; }
        
        .filters { 
            background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px;
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        .filters select, .filters input { 
            padding: 10px 15px; border: 1px solid #334155; border-radius: 8px;
            background: #0f172a; color: #fff; font-size: 0.9rem;
        }
        .filters input { flex: 1; }
        .btn { 
            padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; 
            font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5568d3; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-secondary { background: #334155; color: #fff; }
        .btn-secondary:hover { background: #475569; }
        .btn-orange { background: #f97316; color: #fff; }
        .btn-orange:hover { background: #ea580c; }
        
        .table-container { background: #1e293b; border-radius: 12px; overflow: hidden; }
        .table-header { 
            padding: 20px; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #94a3b8; font-weight: 600; font-size: 0.9rem; }
        tr:hover { background: rgba(102, 126, 234, 0.1); }
        .badge { 
            padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
        }
        .badge.online { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .badge.offline { background: rgba(100, 116, 139, 0.2); color: #64748b; }
        .badge.banned { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge.admin { background: rgba(102, 126, 234, 0.2); color: #667eea; }
        
        .risk-score { 
            display: inline-flex; align-items: center; gap: 8px;
            padding: 4px 12px; border-radius: 20px; font-size: 0.85rem;
        }
        .risk-score.low { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .risk-score.medium { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .risk-score.high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .risk-bar { width: 60px; height: 6px; background: #334155; border-radius: 3px; }
        .risk-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .risk-bar-fill.low { background: #22c55e; }
        .risk-bar-fill.medium { background: #f97316; }
        .risk-bar-fill.high { background: #ef4444; }
        
        .actions { display: flex; gap: 8px; }
        .actions button { padding: 6px 12px; font-size: 0.8rem; }
        
        .modal { 
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: #1e293b; padding: 30px; border-radius: 12px; 
            max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .modal h2 { margin-bottom: 20px; color: #fff; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; }
        .form-group textarea { 
            width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px;
            background: #0f172a; color: #fff; font-size: 0.9rem; resize: vertical; min-height: 80px;
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        
        .detail-section { background: #0f172a; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .detail-section h3 { margin-bottom: 15px; color: #667eea; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .detail-item { }
        .detail-item label { color: #64748b; font-size: 0.85rem; }
        .detail-item span { display: block; margin-top: 4px; color: #fff; }
        
        .history-list { max-height: 200px; overflow-y: auto; }
        .history-item { 
            padding: 10px; background: #1e293b; border-radius: 6px; margin-bottom: 8px;
            font-size: 0.85rem; display: flex; justify-content: space-between;
        }
        .history-item.risk { border-left: 3px solid #ef4444; }
        .history-item.order { border-left: 3px solid #22c55e; }
        
        .empty-state { text-align: center; padding: 60px; color: #64748b; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 15px; }
        
        .online-indicator { 
            width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px;
        }
        .online-indicator.online { background: #22c55e; animation: pulse 2s infinite; }
        .online-indicator.offline { background: #64748b; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 用户管理系统</h1>
            <p>管理用户账号、查看黄牛行为、封禁违规账号</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总用户数</h3>
                <div class="value" id="totalUsers">0</div>
            </div>
            <div class="stat-card green">
                <h3>在线用户</h3>
                <div class="value" id="onlineUsers">0</div>
            </div>
            <div class="stat-card red">
                <h3>已封禁账号</h3>
                <div class="value" id="bannedUsers">0</div>
            </div>
            <div class="stat-card orange">
                <h3>风险用户</h3>
                <div class="value" id="riskyUsers">0</div>
            </div>
        </div>
        
        <div class="filters">
            <select id="statusFilter" onchange="loadUsers()">
                <option value="">全部状态</option>
                <option value="active">正常用户</option>
                <option value="banned">已封禁</option>
            </select>
            <select id="roleFilter" onchange="loadUsers()">
                <option value="">全部角色</option>
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜索用户名..." onkeyup="handleSearch()">
            <button class="btn btn-secondary" onclick="loadUsers()">🔍 搜索</button>
            <button class="btn btn-primary" onclick="refreshData()">🔄 刷新</button>
            <button class="btn btn-danger" onclick="selectAllUsers()">全选</button>
            <button class="btn btn-danger" onclick="batchBan()">🚫 批量封禁选中</button>
            <button class="btn btn-orange" onclick="autoBan()">⚡ 自动封禁高风险用户</button>
            <button class="btn btn-danger" onclick="batchDelete()">🗑️ 批量注销选中</button>
        </div>
        
        <div class="table-container">
            <div class="table-header">
                <h3>用户列表</h3>
                <div>
                    <span id="userCount" style="color: #94a3b8;">共 0 个用户</span>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                        <th>用户</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>风险评分</th>
                        <th>操作统计</th>
                        <th>在线状态</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>
    </div>
    
    <div class="modal" id="userDetailModal">
        <div class="modal-content">
            <h2>👤 用户详情</h2>
            <div class="detail-section" id="userDetailContent"></div>
            <div class="detail-section">
                <h3>⚠️ 风险操作记录</h3>
                <div class="history-list" id="riskHistoryList"></div>
            </div>
            <div class="detail-section">
                <h3>📦 订单记录</h3>
                <div class="history-list" id="orderHistoryList"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
                <button class="btn btn-danger" id="banButton" onclick="toggleBan()">封禁账号</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="banModal">
        <div class="modal-content">
            <h2>🚫 封禁用户</h2>
            <div class="form-group">
                <label>封禁原因</label>
                <textarea id="banReason" placeholder="请输入封禁原因..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeBanModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmBan()">确认封禁</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentUser = null;
        let token = localStorage.getItem('admin_token');
        
        if (!token) {
            window.location.href = 'monitor-admin.html';
        }
        
        async function request(url, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(`${API_BASE}${url}`, { ...options, headers });
            return res.json();
        }
        
        async function loadUsers() {
            const statusFilter = document.getElementById('statusFilter').value;
            const roleFilter = document.getElementById('roleFilter').value;
            const searchInput = document.getElementById('searchInput').value;
            
            const res = await request('/users/list');
            if (res.code === 200) {
                let users = res.data;
                
                if (statusFilter) {
                    users = users.filter(u => u.status === statusFilter);
                }
                if (roleFilter) {
                    users = users.filter(u => u.role === roleFilter);
                }
                if (searchInput) {
                    users = users.filter(u => u.username.includes(searchInput));
                }
                
                renderUsers(users);
                updateStats(users);
            }
        }
        
        function updateStats(users) {
            const total = users.length;
            const online = users.filter(u => u.stats && u.stats.isOnline).length;
            const banned = users.filter(u => u.status === 'banned').length;
            const risky = users.filter(u => u.stats && u.stats.riskScore >= 30).length;
            
            document.getElementById('totalUsers').textContent = total;
            document.getElementById('onlineUsers').textContent = online;
            document.getElementById('bannedUsers').textContent = banned;
            document.getElementById('riskyUsers').textContent = risky;
            document.getElementById('userCount').textContent = `共 ${total} 个用户`;
        }
        
        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><div class="icon">👥</div>暂无用户</td></tr>';
                return;
            }
            
            users.forEach(user => {
                const riskLevel = user.stats && user.stats.riskScore >= 50 ? 'high' : 
                                 user.stats && user.stats.riskScore >= 20 ? 'medium' : 'low';
                const riskPercent = (user.stats && user.stats.riskScore) || 0;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="checkbox" class="user-checkbox" value="${user.id}" ${user.role === 'admin' ? 'disabled' : ''}></td>
                    <td><strong>${user.username}</strong></td>
                    <td><span class="badge ${user.role === 'admin' ? 'admin' : ''}">${user.role === 'admin' ? '管理员' : '用户'}</span></td>
                    <td><span class="badge ${user.status === 'banned' ? 'banned' : user.status === 'active' ? 'online' : ''}">${getStatusText(user.status)}</span></td>
                    <td>
                        <div class="risk-score ${riskLevel}">
                            <span>${riskPercent}分</span>
                            <div class="risk-bar">
                                <div class="risk-bar-fill ${riskLevel}" style="width: ${riskPercent}%"></div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <small style="color: #64748b;">
                            操作: ${user.stats ? user.stats.totalActions : 0} | 
                            拦截: ${user.stats ? user.stats.riskLogs : 0} | 
                            订单: ${user.stats ? user.stats.totalOrders : 0}
                        </small>
                    </td>
                    <td>
                        <span class="online-indicator ${user.stats && user.stats.isOnline ? 'online' : 'offline'}"></span>
                        ${user.stats && user.stats.isOnline ? '<span style="color: #22c55e;">在线</span>' : '<span style="color: #64748b;">离线</span>'}
                    </td>
                    <td><small style="color: #64748b;">${formatDate(user.createdAt)}</small></td>
                    <td class="actions">
                        <button class="btn btn-secondary" onclick="viewUserDetail('${user.id}')">详情</button>
                        ${user.role !== 'admin' ? `
                            <button class="btn ${user.status === 'banned' ? 'btn-success' : 'btn-danger'}" onclick="toggleUserBan('${user.id}', '${user.status}')">
                                ${user.status === 'banned' ? '解封' : '封禁'}
                            </button>
                            <button class="btn btn-orange" onclick="deleteUser('${user.id}', '${user.username}')">注销</button>
                        ` : ''}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function getStatusText(status) {
            const map = { active: '正常', banned: '已封禁' };
            return map[status] || status;
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }
        
        async function viewUserDetail(userId) {
            const res = await request(`/users/${userId}`);
            if (res.code === 200) {
                currentUser = res.data;
                showUserDetailModal(res.data);
            }
        }
        
        function showUserDetailModal(user) {
            const banButton = document.getElementById('banButton');
            if (user.role === 'admin') {
                banButton.style.display = 'none';
            } else {
                banButton.style.display = 'block';
                banButton.textContent = user.status === 'banned' ? '解封账号' : '封禁账号';
                banButton.className = user.status === 'banned' ? 'btn btn-success' : 'btn btn-danger';
            }
            
            document.getElementById('userDetailContent').innerHTML = `
                <h3>基本信息</h3>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>用户名</label>
                        <span>${user.username}</span>
                    </div>
                    <div class="detail-item">
                        <label>角色</label>
                        <span>${user.role === 'admin' ? '管理员' : '普通用户'}</span>
                    </div>
                    <div class="detail-item">
                        <label>状态</label>
                        <span style="color: ${user.status === 'banned' ? '#ef4444' : '#22c55e'};">${getStatusText(user.status)}</span>
                    </div>
                    <div class="detail-item">
                        <label>风险评分</label>
                        <span style="color: ${user.stats.riskScore >= 50 ? '#ef4444' : user.stats.riskScore >= 20 ? '#f97316' : '#22c55e'};">${user.stats.riskScore}分</span>
                    </div>
                    <div class="detail-item">
                        <label>在线状态</label>
                        <span style="color: ${user.stats.isOnline ? '#22c55e' : '#64748b'};">${user.stats.isOnline ? '在线' : '离线'}</span>
                    </div>
                    <div class="detail-item">
                        <label>注册时间</label>
                        <span>${formatDate(user.createdAt)}</span>
                    </div>
                    ${user.status === 'banned' ? `
                        <div class="detail-item">
                            <label>封禁时间</label>
                            <span style="color: #ef4444;">${formatDate(user.bannedAt)}</span>
                        </div>
                        <div class="detail-item">
                            <label>封禁原因</label>
                            <span style="color: #ef4444;">${user.bannedReason || '违反用户协议'}</span>
                        </div>
                    ` : ''}
                </div>
                <h3 style="margin-top: 20px;">统计数据</h3>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>总操作次数</label>
                        <span>${user.stats.totalActions}</span>
                    </div>
                    <div class="detail-item">
                        <label>被拦截次数</label>
                        <span style="color: ${user.stats.riskLogs > 0 ? '#ef4444' : 'inherit'};">${user.stats.riskLogs}</span>
                    </div>
                    <div class="detail-item">
                        <label>成功订单数</label>
                        <span style="color: #22c55e;">${user.stats.totalOrders}</span>
                    </div>
                </div>
            `;
            
            const riskList = document.getElementById('riskHistoryList');
            if (user.riskLogs && user.riskLogs.length > 0) {
                riskList.innerHTML = user.riskLogs.slice(0, 10).map(log => `
                    <div class="history-item risk">
                        <span>${log.reason || '异常操作'}</span>
                        <small style="color: #64748b;">${formatDate(log.timestamp)}</small>
                    </div>
                `).join('');
            } else {
                riskList.innerHTML = '<div style="color: #64748b; text-align: center; padding: 20px;">暂无风险记录</div>';
            }
            
            const orderList = document.getElementById('orderHistoryList');
            if (user.orders && user.orders.length > 0) {
                orderList.innerHTML = user.orders.slice(0, 10).map(order => `
                    <div class="history-item order">
                        <span>${order.productName} - ¥${order.price}</span>
                        <small style="color: #64748b;">${formatDate(order.createdAt)}</small>
                    </div>
                `).join('');
            } else {
                orderList.innerHTML = '<div style="color: #64748b; text-align: center; padding: 20px;">暂无订单记录</div>';
            }
            
            document.getElementById('userDetailModal').classList.add('active');
        }
        
        function toggleUserBan(userId, currentStatus) {
            currentUser = { id: userId, status: currentStatus };
            if (currentStatus === 'banned') {
                confirmUnban();
            } else {
                document.getElementById('banModal').classList.add('active');
            }
        }
        
        function toggleBan() {
            if (currentUser.status === 'banned') {
                confirmUnban();
            } else {
                document.getElementById('banModal').classList.add('active');
            }
        }
        
        async function confirmBan() {
            const reason = document.getElementById('banReason').value;
            const res = await request(`/users/${currentUser.id}/status`, {
                method: 'PUT',
                body: JSON.stringify({ status: 'banned', reason })
            });
            
            if (res.code === 200) {
                alert('用户已被封禁');
                closeBanModal();
                closeModal();
                loadUsers();
            } else {
                alert(res.message || '操作失败');
            }
        }
        
        async function confirmUnban() {
            const res = await request(`/users/${currentUser.id}/status`, {
                method: 'PUT',
                body: JSON.stringify({ status: 'active' })
            });
            
            if (res.code === 200) {
                alert('用户已解封');
                closeModal();
                loadUsers();
            } else {
                alert(res.message || '操作失败');
            }
        }
        
        function closeModal() {
            document.getElementById('userDetailModal').classList.remove('active');
            currentUser = null;
        }
        
        function closeBanModal() {
            document.getElementById('banModal').classList.remove('active');
            document.getElementById('banReason').value = '';
        }
        
        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.user-checkbox');
            const selectAll = document.getElementById('selectAll');
            checkboxes.forEach(cb => {
                if (!cb.disabled) {
                    cb.checked = selectAll.checked;
                }
            });
        }
        
        function selectAllUsers() {
            document.getElementById('selectAll').checked = true;
            toggleSelectAll();
        }
        
        async function batchBan() {
            const checkboxes = document.querySelectorAll('.user-checkbox');
            const checkedBoxes = Array.from(checkboxes).filter(cb => cb.checked);
            const userIds = checkedBoxes.map(cb => cb.value);
            
            console.log('选中的用户ID:', userIds);
            
            if (userIds.length === 0) {
                alert('请先选择要封禁的用户');
                return;
            }
            
            const reason = prompt('请输入封禁原因：', '批量封禁：检测到异常行为');
            if (!reason) return;
            
            try {
                const res = await request('/users/batch-ban', {
                    method: 'POST',
                    body: JSON.stringify({ userIds, reason })
                });
                
                console.log('API响应:', res);
                
                if (res.code === 200) {
                    alert(res.message);
                    document.getElementById('selectAll').checked = false;
                    loadUsers();
                } else {
                    alert(res.message || '操作失败');
                }
            } catch (error) {
                console.error('请求错误:', error);
                alert('网络请求失败，请检查控制台');
            }
        }
        
        async function autoBan() {
            const threshold = prompt('请输入风险评分阈值（默认60分）：', '60');
            if (!threshold) return;
            
            const res = await request('/users/auto-ban', {
                method: 'POST',
                body: JSON.stringify({ threshold: parseInt(threshold) })
            });
            
            if (res.code === 200) {
                alert(res.message);
                loadUsers();
            } else {
                alert(res.message || '操作失败');
            }
        }
        
        function handleSearch() {
            if (event.key === 'Enter') {
                loadUsers();
            }
        }
        
        async function refreshData() {
            await loadUsers();
        }
        
        async function deleteUser(userId, username) {
            if (!confirm(`确定要注销用户「${username}」吗？此操作不可撤销！`)) {
                return;
            }
            
            const res = await request(`/users/${userId}`, {
                method: 'DELETE'
            });
            
            if (res.code === 200) {
                alert('用户已注销');
                loadUsers();
            } else {
                alert(res.message || '操作失败');
            }
        }
        
        async function batchDelete() {
            const checkboxes = document.querySelectorAll('.user-checkbox');
            const checkedBoxes = Array.from(checkboxes).filter(cb => cb.checked);
            const userIds = checkedBoxes.map(cb => cb.value);
            
            console.log('选中的用户ID:', userIds);
            
            if (userIds.length === 0) {
                alert('请先选择要注销的用户');
                return;
            }
            
            if (!confirm(`确定要注销选中的 ${userIds.length} 个用户吗？此操作不可撤销！`)) {
                return;
            }
            
            try {
                const res = await request('/users/batch-delete', {
                    method: 'POST',
                    body: JSON.stringify({ userIds })
                });
                
                console.log('API响应:', res);
                
                if (res.code === 200) {
                    alert(res.message);
                    document.getElementById('selectAll').checked = false;
                    loadUsers();
                } else {
                    alert(res.message || '操作失败');
                }
            } catch (error) {
                console.error('请求错误:', error);
                alert('网络请求失败，请检查控制台');
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadUsers);
        
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
