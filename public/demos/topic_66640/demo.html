<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 互联网嘴替 - Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-cyan: #00f5d4;
      --neon-pink: #ff006e;
      --neon-purple: #8338ec;
      --neon-amber: #fbbf24;
      --bg-dark: #0a0a0f;
      --bg-card: rgba(18, 18, 26, 0.7);
      --text-primary: #e0e0e0;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border: rgba(255, 255, 255, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans SC", system-ui, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at top, rgba(131, 56, 236, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(255, 0, 110, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at bottom left, rgba(0, 245, 212, 0.06) 0%, transparent 50%),
        var(--bg-dark);
      background-attachment: fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(0, 245, 212, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 212, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #12121a; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 245, 212, 0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0, 245, 212, 0.5); }
    ::selection { background: rgba(0, 245, 212, 0.3); color: #fff; }

    .container {
      max-width: 896px;
      margin: 0 auto;
      padding: 32px 16px;
      position: relative;
      z-index: 1;
    }

    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .gradient-text {
      font-family: "Orbitron", "Noto Sans SC", sans-serif;
      background: linear-gradient(135deg, #00f5d4 0%, #8338ec 50%, #ff006e 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 4s ease infinite;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .fade-in { animation: fade-in 0.6s ease forwards; opacity: 0; }

    header {
      text-align: center;
      margin-bottom: 48px;
      padding-top: 32px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 9999px;
      background: rgba(30, 30, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--neon-cyan);
      animation: blink 2s ease infinite;
    }

    h1 {
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 900;
      font-family: "Orbitron", "Noto Sans SC", sans-serif;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: clamp(16px, 3vw, 20px);
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .desc {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 512px;
      margin: 0 auto;
      line-height: 1.6;
    }

    section {
      margin-bottom: 32px;
    }

    .input-section {
      padding: 24px;
    }

    .input-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      background: rgba(10, 10, 15, 0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.7;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: rgba(0, 245, 212, 0.3);
      box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.1);
    }

    textarea::placeholder { color: var(--text-muted); }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .example-tag {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 9999px;
      background: rgba(0, 245, 212, 0.08);
      border: 1px solid rgba(0, 245, 212, 0.15);
      color: var(--neon-cyan);
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-tag:hover {
      background: rgba(0, 245, 212, 0.15);
      border-color: rgba(0, 245, 212, 0.3);
    }

    .style-section { padding: 24px; }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .style-btn {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(10, 10, 15, 0.4);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .style-btn:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text-primary);
    }

    .style-btn.active {
      border-color: var(--neon-cyan);
      background: rgba(0, 245, 212, 0.1);
      color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 245, 212, 0.15);
    }

    .style-btn .emoji { margin-right: 4px; }

    .generate-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
      background-size: 200% 200%;
      color: #0a0a0f;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .generate-btn:hover:not(:disabled) {
      background-position: 100% 50%;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(0, 245, 212, 0.2);
    }

    .generate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .generate-btn .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(10, 10, 15, 0.3);
      border-top-color: var(--bg-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
    }

    .output-section {
      padding-top: 16px;
    }

    .output-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .output-header svg { color: var(--neon-cyan); }

    .output-header h2 {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
    }

    .analysis-bubble {
      padding: 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(0, 245, 212, 0.06), rgba(131, 56, 236, 0.06));
      border: 1px solid rgba(0, 245, 212, 0.15);
      margin-bottom: 24px;
      position: relative;
    }

    .analysis-bubble::before {
      content: "💡 AI 分析";
      font-size: 12px;
      font-weight: 500;
      color: var(--neon-cyan);
      display: block;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .analysis-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-primary);
    }

    .cursor::after {
      content: "|";
      color: var(--neon-cyan);
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }

    .replies-title {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .reply-card {
      padding: 20px;
      border-radius: 12px;
      background: rgba(10, 10, 15, 0.5);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .reply-card:hover {
      border-color: rgba(0, 245, 212, 0.2);
    }

    .reply-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .reply-index {
      font-size: 12px;
      font-weight: 700;
      color: var(--neon-cyan);
      background: rgba(0, 245, 212, 0.1);
      padding: 2px 10px;
      border-radius: 9999px;
    }

    .copy-btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      color: var(--neon-cyan);
      border-color: rgba(0, 245, 212, 0.3);
    }

    .copy-btn.copied {
      color: var(--neon-cyan);
      border-color: var(--neon-cyan);
    }

    .reply-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-primary);
    }

    .loading-state {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
    }

    .loading-spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(0, 245, 212, 0.2);
      border-top-color: var(--neon-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    footer {
      margin-top: 80px;
      padding-bottom: 32px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .tech-stack {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 12px;
    }

    .tech-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .tech-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: blink 2s ease infinite;
    }

    .tech-dot.cyan { background: var(--neon-cyan); }
    .tech-dot.pink { background: var(--neon-pink); }
    .tech-dot.purple { background: var(--neon-purple); }
  </style>
</head>
<body>
  <div class="container">
    <header class="fade-in">
      <div class="badge">
        <span class="dot"></span>
        <span>AI 驱动 · 秒级生成</span>
        <span style="width:1px;height:12px;background:rgba(255,255,255,0.2)"></span>
        <span style="color: var(--neon-amber)">演示模式</span>
      </div>
      <h1 class="gradient-text">AI 互联网嘴替</h1>
      <p class="subtitle">把说不出口的话，交给 AI 来说</p>
      <p class="desc">不知道怎么回消息？粘贴聊天记录，选择风格，瞬间生成高情商回复</p>
    </header>

    <main>
      <section class="glass-card input-section fade-in" style="animation-delay: 100ms">
        <label class="input-label">📝 粘贴聊天记录</label>
        <textarea id="chatInput" placeholder="粘贴你不知道怎么回的消息...&#10;&#10;例如：&#10;领导：周末来加个班，项目紧急，公司不会亏待你的&#10;&#10;或者：&#10;三姑：有对象了吗？什么时候结婚？"></textarea>
        <div class="examples">
          <span class="example-tag" data-text="领导：周末来加个班，项目紧急，公司不会亏待你的">领导加班画饼</span>
          <span class="example-tag" data-text="兄弟：在吗？借我2000块钱，下个月就还你">朋友借钱</span>
          <span class="example-tag" data-text="三姑：有对象了吗？什么时候结婚？阿姨给你介绍一个">三姑催婚</span>
          <span class="example-tag" data-text="同事：这个bug是你那边的问题吧，我这边是好的">同事甩锅</span>
          <span class="example-tag" data-text="小李：我喜欢你很久了，做我女朋友好不好">表白</span>
          <span class="example-tag" data-text="销售：您好我们这边有个非常适合您的产品了解一下">推销电话</span>
        </div>
      </section>

      <section class="glass-card style-section fade-in" style="animation-delay: 200ms">
        <label class="input-label">🎭 选择回复风格</label>
        <div class="style-grid">
          <button class="style-btn" data-style="emotional-intelligence">
            <span class="emoji">🧠</span>高情商
          </button>
          <button class="style-btn" data-style="sarcastic">
            <span class="emoji">😏</span>阴阳怪气
          </button>
          <button class="style-btn" data-style="assertive">
            <span class="emoji">💪</span>刚硬回怼
          </button>
          <button class="style-btn" data-style="gentle-refusal">
            <span class="emoji">🤝</span>委婉拒绝
          </button>
          <button class="style-btn" data-style="workplace-jargon">
            <span class="emoji">💼</span>职场黑话
          </button>
        </div>
      </section>

      <section class="fade-in" style="animation-delay: 300ms">
        <button class="generate-btn" id="generateBtn" disabled>
          <span id="btnText">✨ 生成神回复</span>
        </button>
        <p class="hint" id="hint">👆 请先粘贴聊天记录并选择风格</p>
      </section>

      <section class="output-section" id="outputSection" style="display: none">
        <div class="output-header">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <h2>AI 嘴替上线</h2>
        </div>

        <div class="analysis-bubble" id="analysisBubble" style="display: none">
          <div class="analysis-text" id="analysisText"></div>
        </div>

        <div id="repliesContainer"></div>

        <div class="loading-state" id="loadingState" style="display: none">
          <div class="loading-spinner"></div>
          <p style="font-size: 14px">AI 正在构思神回复...</p>
        </div>
      </section>
    </main>

    <footer class="fade-in" style="animation-delay: 500ms">
      <div class="tech-stack">
        <span class="tech-item"><span class="tech-dot cyan"></span>纯前端</span>
        <span class="tech-item"><span class="tech-dot pink"></span>零依赖</span>
        <span class="tech-item"><span class="tech-dot purple"></span>16种场景识别</span>
      </div>
      <p>把最难的「怎么回」，交给最会说话的 AI</p>
    </footer>
  </div>

  <script>
    const ROLE_PATTERNS = {
      leader: ["领导", "老板", "经理", "主管", "总监", "CEO", "上司", "boss"],
      colleague: ["同事", "队友", "搭档", "对接", "partner"],
      family: ["妈", "爸", "爹", "娘", "三姑", "六婆", "大姨", "二叔", "舅舅", "阿姨", "奶奶", "爷爷", "外婆", "外公", "亲戚", "家人", "父母"],
      friend: ["朋友", "兄弟", "姐妹", "哥们", "闺蜜", "伙计", "老铁", "老王", "老张", "小李", "同学", "小张", "室友"],
      partner: ["男朋友", "女朋友", "对象", "老公", "老婆", "爱人", "宝贝", "亲爱的", "男神", "女神", "crush"],
      stranger: ["客服", "销售", "推销", "陌生", "不认识"],
      customer: ["客户", "甲方", "业主", "用户"],
      subordinate: ["下属", "员工", "组员"],
    };

    const ROLE_TITLES = {
      leader: "领导", colleague: "同事", family: "家人", friend: "朋友",
      partner: "对象", stranger: "对方", customer: "客户", subordinate: "下属", unknown: "对方",
    };

    const TOPIC_DEFS = [
      { key: "加班要求", keywords: ["加班", "周末来", "996", "晚上留下", "辛苦一下"], patterns: [/加班/, /周末.*(来|加)/, /996/, /晚上.*(留|加)/, /辛苦.*(一)?下/] },
      { key: "画饼承诺", keywords: ["上市", "期权", "不会亏待", "以后有好处", "好好干", "提拔", "加薪", "涨薪"], patterns: [/上市/, /期权/, /不会亏待/, /以后.*(好处|机会)/, /好好干.*(以后|将来)/, /提拔/, /加薪|涨薪/] },
      { key: "借钱请求", keywords: ["借", "借钱", "转我", "周转", "手头紧", "方便吗", "急用"], patterns: [/借.*(钱|我|点|给)/, /转.*(我|给)/, /周转/, /手头.*(紧|不宽裕)/, /方便.*(借|转|给)/, /急用/] },
      { key: "催婚催生", keywords: ["有对象", "结婚", "什么时候", "生孩子", "单身", "介绍一个", "年纪不小了"], patterns: [/有对象/, /结婚/, /什么时候.*(结|生|谈)/, /生孩子/, /单身/, /介绍.*(一)?个/, /年纪.*(不小|大了)/] },
      { key: "推卸责任", keywords: ["你的问题", "你那边", "不是我", "跟我没关系", "你负责的", "你的锅"], patterns: [/你的.*(问题|错|锅)/, /你那边/, /不是我/, /跟我.*(没关系|无关)/, /你.*(负责|做的)/, /你.*(背锅|背锅)/] },
      { key: "工作安排", keywords: ["任务", "项目", "进度", "截止", "deadline", "汇报", "开会", "方案", "需求", "下周", "明天", "尽快", "赶紧做", "处理一下", "跟进"], patterns: [/任务/, /项目.*(做|交|给|完)/, /进度/, /截止/, /汇报/, /开会/, /方案/, /需求/, /尽快/, /赶紧/, /处理.*(下|完)/, /跟进/, /明天.*(前|要|交)/, /下周.*(要|前|交)/] },
      { key: "推销骚扰", keywords: ["推荐", "办卡", "会员", "优惠", "活动", "免费体验", "产品介绍", "套餐", "限时", "打折", "促销", "了解一下", "兴趣吗", "我们这里"], patterns: [/办卡/, /会员/, /优惠.*活动/, /免费.*体验/, /套餐/, /限时/, /打折/, /促销/, /了解.*(一)?下/, /兴趣.*(吗|嘛)/, /我们(这|公司|店)/] },

    function detectRole(text) {
      for (const [role, keywords] of Object.entries(ROLE_PATTERNS)) {
        for (const kw of keywords) {
          if (text.includes(kw)) return role;
        }
      }
      return "unknown";
    }

    function getSpeakerTitle(role) {
      return ROLE_TITLES[role] || "对方";
    }

    function detectTopic(allText) {
      let bestMatch = "";
      let bestScore = 0;
      for (const def of TOPIC_DEFS) {
        let score = 0;
        for (const pattern of def.patterns) {
          if (pattern.test(allText)) score += 2;
        }
        for (const kw of def.keywords) {
          if (allText.includes(kw)) score += 1;
        }
        if (def.key === "批评指责" && (/重做|太差|气死|怎么回事|失望|不负责任/.test(allText))) {
          score += 3;
        }
        if (score > bestScore) {
          bestScore = score;
          bestMatch = def.key;
        }
      }
      return bestMatch || "未明确话题";
    }

    function parseChat(text) {
      const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
      let speakers = [];
      let lastMessage = "";
      let keyQuotes = [];
      const speakerPattern = /^([^：:]{1,15})[：:](.+)$/;
      for (const line of lines) {
        const m = line.match(speakerPattern);
        if (m) {
          const name = m[1].trim();
          const msg = m[2].trim();
          if (!speakers.includes(name)) speakers.push(name);
          lastMessage = msg;
          if (msg.length > 5) keyQuotes.push(msg.length > 30 ? msg.substring(0, 30) + "..." : msg);
        } else {
          lastMessage = line;
          if (line.length > 5) keyQuotes.push(line.length > 30 ? line.substring(0, 30) + "..." : line);
        }
      }
      const allText = text;
      const role = detectRole(allText);
      const mainSpeaker = speakers[speakers.length - 1] || "";
      const who = speakers.length > 0 ? mainSpeaker : getSpeakerTitle(role);
      const topic = detectTopic(allText);
      return {
        speakers, mainSpeaker: who, role, topic,
        keyQuotes: keyQuotes.slice(0, 2),
        lastMessage, allText,
      };
    }

    let loading = false;

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function typeText(element, text, speed = 18) {
      element.textContent = "";
      element.classList.add("cursor");
      for (let i = 0; i < text.length; i++) {
        element.textContent += text[i];
        await sleep(speed);
      }
      element.classList.remove("cursor");
    }

    generateBtn.addEventListener("click", async () => {
      if (loading) return;
      const text = chatInput.value.trim();
      if (!text || !selectedStyle) return;

      loading = true;
      generateBtn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>AI 正在思考...';
      hint.textContent = "";

      outputSection.style.display = "block";
      analysisBubble.style.display = "none";
      repliesContainer.innerHTML = "";
      loadingState.style.display = "block";

      await sleep(800);

      const parsed = parseChat(text);
      const analysis = getAnalysis(parsed, selectedStyle);
      const replies = getReplies(parsed, selectedStyle);

      loadingState.style.display = "none";
      analysisBubble.style.display = "block";
      await typeText(analysisText, analysis, 15);

      await sleep(400);

      for (let i = 0; i < replies.length; i++) {
        const card = document.createElement("div");
        card.className = "reply-card";
        card.innerHTML = `
          <div class="reply-header">
            <span class="reply-index">回复 ${i + 1}</span>
            <button class="copy-btn">复制</button>
          </div>
          <div class="reply-text"></div>
        `;
        repliesContainer.appendChild(card);
        const replyEl = card.querySelector(".reply-text");
        const copyBtn = card.querySelector(".copy-btn");
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(replies[i]).then(() => {
            copyBtn.textContent = "已复制 ✓";
            copyBtn.classList.add("copied");
            setTimeout(() => {
              copyBtn.textContent = "复制";
              copyBtn.classList.remove("copied");
            }, 2000);
          });
        });
        await typeText(replyEl, replies[i], 20);
        await sleep(200);
      }

      loading = false;
      btnText.textContent = "✨ 重新生成";
      generateBtn.disabled = false;
    });
