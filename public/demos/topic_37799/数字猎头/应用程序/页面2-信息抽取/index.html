<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字猎头 · 信息抽取</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/page2.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="logo" href="../index.html">
        <span class="logo-mark">◆</span>
        <span class="logo-text">数字猎头</span>
      </a>
      <nav class="steps">
        <div class="step active">
          <span class="step-num">1</span>
          <span class="step-label">信息输入</span>
        </div>
        <div class="step-line active-line"></div>
        <div class="step active">
          <span class="step-num">2</span>
          <span class="step-label">信息抽取</span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <span class="step-num">3</span>
          <span class="step-label">职位检索</span>
        </div>
      </nav>
    </header>

    <main class="app-main">
      <section class="hero">
        <h1>关键信息抽取</h1>
        <p class="hero-sub">系统基于 TRAE Auto Model 智能识别你简历中的核心技能与关键词，并补充岗位常用能力。</p>
      </section>

      <!-- 输入摘要 -->
      <section class="card input-summary" id="inputSummary">
        <div class="card-header">
          <h2>输入摘要</h2>
          <button class="btn btn-ghost" id="btnToggleInput">展开详情</button>
        </div>
        <div class="summary-meta">
          <div class="meta-item">
            <span class="meta-label">个人介绍</span>
            <span class="meta-value" id="introMeta">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">简历内容</span>
            <span class="meta-value" id="resumeMeta">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">上传文件</span>
            <span class="meta-value" id="fileMeta">—</span>
          </div>
        </div>
        <div class="input-detail" id="inputDetail" style="display:none;">
          <div class="detail-block">
            <div class="detail-title">个人介绍</div>
            <div class="detail-text" id="introDetail">—</div>
          </div>
          <div class="detail-block">
            <div class="detail-title">简历内容</div>
            <div class="detail-text" id="resumeDetail">—</div>
          </div>
        </div>
      </section>

      <!-- 生成过程 -->
      <section class="card process-card" id="processCard">
        <div class="card-header">
          <h2>
            <span class="pulse-dot" id="pulseDot"></span>
            TRAE Auto Model · 生成过程
          </h2>
          <span class="badge badge-soft" id="processStatus">待开始</span>
        </div>
        <div class="process-log" id="processLog">
          <div class="process-hint">点击下方「开始分析」按钮，查看模型推理的详细过程。</div>
        </div>
        <div class="process-actions">
          <button class="btn btn-primary" id="btnRunModel">开始分析</button>
          <button class="btn btn-ghost" id="btnReset">重置</button>
        </div>
      </section>

      <!-- 用户技能 -->
      <section class="card tag-card" id="skillsCard" style="display:none;">
        <div class="card-header">
          <h2>用户技能 <span class="hint">（可编辑 · 自动标注来源）</span></h2>
          <span class="badge badge-count" id="skillCount">0 项</span>
        </div>
        <div class="tag-group" id="skillTagGroup"></div>
        <div class="tag-add-row">
          <input type="text" class="tag-input" id="skillInput" placeholder="输入自定义技能，回车添加" />
          <button class="btn btn-outline" id="skillAddBtn">添加</button>
        </div>
      </section>

      <!-- 关键词 -->
      <section class="card tag-card" id="keywordCard" style="display:none;">
        <div class="card-header">
          <h2>信息关键词 <span class="hint">（与技能不重复）</span></h2>
          <span class="badge badge-count" id="keywordCount">0 项</span>
        </div>
        <div class="tag-group keyword-group" id="keywordTagGroup"></div>
        <div class="tag-add-row">
          <input type="text" class="tag-input" id="keywordInput" placeholder="输入自定义关键词，回车添加" />
          <button class="btn btn-outline" id="keywordAddBtn">添加</button>
        </div>
      </section>

      <section class="action-bar">
        <button class="btn btn-ghost" onclick="location.href='../index.html'">← 返回上一步</button>
        <button class="btn btn-primary btn-large" id="btnNext">下一步 · 职位检索 →</button>
      </section>
    </main>

    <footer class="app-footer">
      <span>© 数字猎头 Demo · 所有信息仅本地留存</span>
    </footer>
  </div>

  <!-- 编辑技能/关键词弹窗 -->
  <div class="modal" id="editModal" aria-hidden="true">
    <div class="modal-mask" data-close></div>
    <div class="modal-dialog" style="width:min(420px,92vw);">
      <div class="modal-header">
        <h3 id="editTitle">编辑</h3>
        <button class="icon-btn" data-close aria-label="关闭">✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="editInput" class="tag-input" style="width:100%;" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close>取消</button>
        <button class="btn btn-primary" id="editConfirm">确认</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" aria-hidden="true"></div>

  <script src="../assets/js/page2.js"></script>
</body>
</html>
