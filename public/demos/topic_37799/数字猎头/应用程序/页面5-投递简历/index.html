<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字猎头 · 投递简历</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/page5.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="logo" href="../index.html">
        <span class="logo-mark">◆</span>
        <span class="logo-text">数字猎头</span>
      </a>
      <nav class="steps">
        <div class="step active"><span class="step-num">3</span><span class="step-label">职位检索</span></div>
        <div class="step-line active-line"></div>
        <div class="step active"><span class="step-num">4</span><span class="step-label">简历生成</span></div>
        <div class="step-line active-line"></div>
        <div class="step active"><span class="step-num">5</span><span class="step-label">投递简历</span></div>
      </nav>
    </header>

    <main class="app-main">
      <section class="hero">
        <h1>准备投递</h1>
        <p class="hero-sub">检查你的基本信息和目标岗位，确认无误后一键投递。</p>
      </section>

      <!-- 用户基本信息 -->
      <section class="card">
        <div class="card-header">
          <h2>基本信息</h2>
        </div>
        <div class="form-grid">
          <div class="form-item">
            <label>姓名 <span class="req">*</span></label>
            <input type="text" id="userName" placeholder="请输入你的姓名" />
          </div>
          <div class="form-item">
            <label>手机 <span class="req">*</span></label>
            <input type="tel" id="userPhone" placeholder="请输入手机号" />
          </div>
          <div class="form-item">
            <label>邮箱 <span class="req">*</span></label>
            <input type="email" id="userEmail" placeholder="请输入邮箱" />
          </div>
          <div class="form-item">
            <label>所在城市</label>
            <input type="text" id="userCity" placeholder="如：上海" />
          </div>
          <div class="form-item">
            <label>性别</label>
            <select id="userGender">
              <option value="">请选择</option>
              <option>男</option>
              <option>女</option>
              <option>不便透露</option>
            </select>
          </div>
          <div class="form-item">
            <label>工作年限</label>
            <select id="userYears">
              <option value="">请选择</option>
              <option>应届</option>
              <option>1-3 年</option>
              <option>3-5 年</option>
              <option>5-10 年</option>
              <option>10 年以上</option>
            </select>
          </div>
        </div>
      </section>

      <!-- 简历摘要 -->
      <section class="card" id="resumeSummary">
        <div class="card-header">
          <h2>简历摘要</h2>
        </div>
        <div class="resume-preview" id="resumePreview">
          <div class="resume-placeholder">（从简历生成页读取）</div>
        </div>
      </section>

      <!-- 目标岗位 -->
      <section class="card" id="targets">
        <div class="card-header">
          <h2>即将投递的岗位</h2>
          <span class="badge badge-soft" id="applyCount">0 个岗位</span>
        </div>
        <div class="apply-list" id="applyList"></div>
      </section>

      <!-- 过程日志 -->
      <section class="card process-card" id="processCard" style="display:none;">
        <div class="card-header">
          <h2><span class="pulse-dot running" id="processDot"></span>投递中...</h2>
          <span class="badge badge-soft" id="processStatus">0%</span>
        </div>
        <div class="process-log" id="processLog"></div>
      </section>

      <!-- 投递按钮 -->
      <section class="action-bar" id="actionBar">
        <div class="action-info">
          <span id="actionHint">请先填写基本信息</span>
        </div>
        <div class="action-buttons">
          <button class="btn btn-ghost" id="btnBack">← 返回上一步</button>
          <button class="btn btn-primary" id="btnApply">一键投递到所有岗位</button>
        </div>
      </section>

      <!-- 投递完成 -->
      <section class="card done-card" id="doneCard" style="display:none;">
        <div class="done-hero">
          <div class="done-icon">✓</div>
          <h2>投递成功！</h2>
          <p>你的简历已发送到 <span id="finalCount">0</span> 家目标公司的招聘邮箱。HR 通常会在 1-2 周内回复，请耐心等待。</p>
        </div>
        <div class="done-summary" id="doneSummary"></div>
        <div class="done-actions">
          <button class="btn btn-ghost" onclick="location.href='../index.html'">返回首页</button>
          <button class="btn btn-primary" onclick="location.href='../页面3-职位检索/index.html'">查看其他岗位</button>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span>© 数字猎头 Demo · 所有信息仅本地留存</span>
    </footer>
  </div>

  <div class="toast" id="toast" aria-hidden="true"></div>

  <script src="../assets/js/page5.js"></script>
</body>
</html>
