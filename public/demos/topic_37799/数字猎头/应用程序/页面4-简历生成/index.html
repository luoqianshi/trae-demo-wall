<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字猎头 · 简历生成</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/page2.css" />
  <link rel="stylesheet" href="../assets/css/page4.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="logo" href="../页面3-职位检索/index.html">
        <span class="logo-mark">◆</span>
        <span class="logo-text">数字猎头</span>
      </a>
      <nav class="steps">
        <div class="step active"><span class="step-num">3</span><span class="step-label">职位检索</span></div>
        <div class="step-line active-line"></div>
        <div class="step active"><span class="step-num">4</span><span class="step-label">简历生成</span></div>
      </nav>
    </header>

    <main class="app-main">
      <section class="hero">
        <h1>根据职位生成简历</h1>
        <p class="hero-sub">系统将分析 <span id="targetCount">0</span> 个目标岗位的要求，与你的原始简历进行智能融合，生成适配版简历。AI 生成部分将以特殊标记展示，便于你校对修改。</p>
      </section>

      <!-- 目标岗位展示 -->
      <section class="card" id="targetCard">
        <div class="card-header">
          <h2>目标岗位 <span class="hint">(选中的岗位)</span></h2>
        </div>
        <div class="target-list" id="targetList"></div>
      </section>

      <!-- 生成过程 -->
      <section class="card process-card" id="processCard">
        <div class="card-header">
          <h2><span class="pulse-dot running" id="processDot"></span>TRAE Auto Model · 简历智能生成</h2>
          <span class="badge badge-soft" id="processStatus">分析中...</span>
        </div>
        <div class="process-log" id="processLog"></div>
      </section>

      <!-- 操作按钮 -->
      <section class="action-bar" id="actionBar" style="display:none;">
        <div class="action-info">
          <span>简历已生成，AI 部分请务必审阅修改</span>
        </div>
        <div class="action-buttons">
          <button class="btn btn-ghost" id="btnRegenerate">重新生成</button>
          <button class="btn btn-primary" id="btnDownload">下载 TXT</button>
          <button class="btn btn-primary" id="btnCopy">复制到剪贴板</button>
        </div>
      </section>

      <!-- 生成的简历内容 -->
      <section class="card resume-card" id="resumeCard" style="display:none;">
        <div class="card-header">
          <h2>适配后的简历 <span class="hint">(<span style="color:#4f6bff;">蓝色标记</span>为 AI 生成内容，建议修改)</h2>
        </div>
        <div class="resume-editor" id="resumeEditor" contenteditable="true"></div>
      </section>

      <section class="action-bar" id="actionBar2" style="display:none;">
        <button class="btn btn-ghost" onclick="location.href='../页面3-职位检索/index.html'">← 返回修改选择</button>
        <button class="btn btn-primary" id="btnApply">前往投递简历</button>
      </section>
    </main>

    <footer class="app-footer">
      <span>© 数字猎头 Demo · 所有信息仅本地留存</span>
    </footer>
  </div>

  <div class="toast" id="toast" aria-hidden="true"></div>

  <script src="../assets/js/page4.js"></script>
</body>
</html>
