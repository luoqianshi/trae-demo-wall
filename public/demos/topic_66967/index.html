<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoClear · 极简待办清单</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #1f2330;
    --muted: #8a8f9c;
    --line: #ecedf1;
    --brand: #5b8def;
    --brand-soft: #eaf0fe;
    --done: #c8ccd6;
    --danger: #ef5b5b;
    --warn: #f5a623;
    --ok: #37c08a;
    --radius: 14px;
    --shadow: 0 6px 24px rgba(31,35,48,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161c;
      --card: #1d2029;
      --text: #eef0f5;
      --muted: #8b909e;
      --line: #2a2e3a;
      --brand: #6c9bff;
      --brand-soft: #233049;
      --done: #5a6070;
      --shadow: 0 6px 24px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    width: 100%;
    max-width: 560px;
  }
  header { margin-bottom: 22px; }
  header h1 {
    font-size: 26px;
    margin: 0 0 6px;
    letter-spacing: .5px;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  .stats {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .chip {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: var(--shadow);
  }
  .chip .num {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .chip .lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }
  .chip.active .num { color: var(--brand); }
  .chip.done .num { color: var(--ok); }
  .chip.left .num { color: var(--warn); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .input-row {
    display: flex;
    gap: 10px;
    padding: 16px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .input-row input[type="text"] {
    flex: 1 1 200px;
    min-width: 0;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: transparent;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .input-row input[type="text"]:focus { border-color: var(--brand); }
  .input-row select {
    padding: 12px 10px;
    font-size: 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }
  .input-row input[type="date"] {
    padding: 12px 10px;
    font-size: 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: transparent;
    color: var(--text);
  }
  .btn-add {
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--brand);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: filter .15s, transform .05s;
  }
  .btn-add:hover { filter: brightness(1.05); }
  .btn-add:active { transform: translateY(1px); }

  .filters {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }
  .filters button {
    flex: 1;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--muted);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .filters button:hover { color: var(--text); }
  .filters button.on {
    color: var(--brand);
    background: var(--brand-soft);
  }

  .todo-list { list-style: none; margin: 0; padding: 0; }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    transition: background .12s;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-item:hover { background: var(--bg); }
  .todo-item.done .text { color: var(--done); text-decoration: line-through; }
  .checkbox {
    width: 22px; height: 22px;
    flex: none;
    border: 2px solid var(--line);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .checkbox:hover { border-color: var(--brand); }
  .todo-item.done .checkbox {
    background: var(--brand);
    border-color: var(--brand);
  }
  .checkbox svg { opacity: 0; transition: opacity .12s; }
  .todo-item.done .checkbox svg { opacity: 1; }
  .main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .text {
    font-size: 15px;
    word-break: break-word;
    background: transparent;
    border: none;
    color: var(--text);
    outline: none;
    padding: 2px 0;
  }
  .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
  }
  .tag {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag.high { background: rgba(239,91,91,.14); color: var(--danger); }
  .tag.mid  { background: rgba(245,166,35,.16); color: var(--warn); }
  .tag.low  { background: rgba(55,192,138,.16); color: var(--ok); }
  .meta .due.overdue { color: var(--danger); }

  .del {
    flex: none;
    width: 30px; height: 30px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: all .15s;
  }
  .todo-item:hover .del { opacity: 1; }
  .del:hover { background: rgba(239,91,91,.12); color: var(--danger); }

  .empty {
    padding: 48px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .btn-clear {
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .btn-clear:hover { color: var(--danger); }
  .foot-note {
    margin-top: 14px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>📋 DoClear</h1>
      <p>把脑子里的事清空，专注当下这一件。</p>
    </header>

    <div class="stats">
      <div class="chip active"><div class="num" id="s-total">0</div><div class="lbl">全部任务</div></div>
      <div class="chip left"><div class="num" id="s-left">0</div><div class="lbl">待办</div></div>
      <div class="chip done"><div class="num" id="s-done">0</div><div class="lbl">已完成</div></div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="input-row">
        <input type="text" id="new-todo" placeholder="想做的事… 按 Enter 添加" autocomplete="off">
        <select id="new-priority">
          <option value="low">低</option>
          <option value="mid" selected>中</option>
          <option value="high">高</option>
        </select>
        <input type="date" id="new-due">
        <button class="btn-add" id="add-btn">添加</button>
      </div>

      <div class="filters">
        <button class="on" data-filter="all">全部</button>
        <button data-filter="active">进行中</button>
        <button data-filter="done">已完成</button>
      </div>

      <ul class="todo-list" id="list"></ul>

      <div class="footer">
        <span id="count-text">0 项任务</span>
        <button class="btn-clear" id="clear-done">清除已完成</button>
      </div>
    </div>

    <p class="foot-note">数据保存在本地浏览器，刷新不丢失 · 双击文字可编辑</p>
  </div>

<script>
(function () {
  const KEY = 'doclear_todos_v1';
  const $ = (s) => document.querySelector(s);
  const list = $('#list');
  const input = $('#new-todo');
  const prioritySel = $('#new-priority');
  const dueInput = $('#new-due');
  let todos = JSON.parse(localStorage.getItem(KEY) || '[]');
  let filter = 'all';

  const PR_LABEL = { high: '高', mid: '中', low: '低' };

  const save = () => localStorage.setItem(KEY, JSON.stringify(todos));

  function render() {
    const shown = todos.filter(t =>
      filter === 'all' ? true :
      filter === 'active' ? !t.done : t.done
    );

    list.innerHTML = '';
    if (shown.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent =
        filter === 'done' ? '还没有完成的任务' :
        filter === 'active' ? '太棒了，没有进行中的任务 🎉' :
        '清单空空，添加第一个任务吧';
      list.appendChild(empty);
    } else {
      shown.forEach(t => list.appendChild(item(t)));
    }

    const done = todos.filter(t => t.done).length;
    $('#s-total').textContent = todos.length;
    $('#s-left').textContent = todos.length - done;
    $('#s-done').textContent = done;
    $('#count-text').textContent = `${todos.length - done} 项待办 · 共 ${todos.length} 项`;
  }

  function item(t) {
    const li = document.createElement('li');
    li.className = 'todo-item' + (t.done ? ' done' : '');
    li.dataset.id = t.id;

    const box = document.createElement('div');
    box.className = 'checkbox';
    box.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    box.onclick = () => toggle(t.id);

    const main = document.createElement('div');
    main.className = 'main';

    const text = document.createElement('div');
    text.className = 'text';
    text.textContent = t.title;
    text.title = '双击编辑';
    text.onclick = () => editTitle(text, t);

    const meta = document.createElement('div');
    meta.className = 'meta';
    const tag = document.createElement('span');
    tag.className = 'tag ' + t.priority;
    tag.textContent = PR_LABEL[t.priority];
    meta.appendChild(tag);
    if (t.due) {
      const due = document.createElement('span');
      const overdue = !t.done && new Date(t.due + 'T23:59:59') < new Date();
      due.className = 'due' + (overdue ? ' overdue' : '');
      due.textContent = '📅 ' + t.due + (overdue ? ' · 已逾期' : '');
      meta.appendChild(due);
    }

    main.appendChild(text);
    main.appendChild(meta);

    const del = document.createElement('button');
    del.className = 'del';
    del.title = '删除';
    del.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
    del.onclick = () => remove(t.id);

    li.appendChild(box);
    li.appendChild(main);
    li.appendChild(del);
    return li;
  }

  function editTitle(el, t) {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'text';
    inp.value = t.title;
    el.replaceWith(inp);
    inp.focus();
    inp.select();
    const commit = () => {
      const v = inp.value.trim();
      if (v) t.title = v;
      save();
      render();
    };
    inp.onblur = commit;
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') render();
    };
  }

  function add() {
    const title = input.value.trim();
    if (!title) return;
    todos.unshift({
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      title,
      priority: prioritySel.value,
      due: dueInput.value || '',
      done: false,
      created: Date.now()
    });
    input.value = '';
    dueInput.value = '';
    prioritySel.value = 'mid';
    save();
    render();
  }

  function toggle(id) {
    const t = todos.find(x => x.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    todos = todos.filter(x => x.id !== id);
    save();
    render();
  }

  $('#add-btn').onclick = add;
  input.onkeydown = (e) => { if (e.key === 'Enter') add(); };
  document.querySelectorAll('.filters button').forEach(b =>
    b.onclick = () => {
      filter = b.dataset.filter;
      document.querySelectorAll('.filters button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      render();
    }
  );
  $('#clear-done').onclick = () => {
    todos = todos.filter(t => !t.done);
    save();
    render();
  };

  render();
})();
</script>
</body>
</html>
