<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>『 星月智能 』模型浏览</title>
    <!-- 标准样式库 -->
    <link rel="stylesheet" href="/file/read/package/standard_dependency/styles.css">
    <!-- 标准脚本库 -->
    <script src="/file/read/package/standard_dependency/script.js"></script>
    <!-- 项目私有样式 -->
    <link rel="stylesheet" href="styles.css">
    <!-- 项目私有脚本 -->
    <script defer src="script.js"></script>
</head>

<body>
    <!-- 背景层 -->
    <div class="bg-layer"></div>

    <!-- 主容器 -->
    <div class="app-container">
        <!-- 顶部导航 -->
        <nav class="top-nav">
            <div class="nav-brand">
                <i class="fas fa-cube nav-icon"></i>
                <h1>星月智能 · 模型浏览</h1>
            </div>
            <div class="nav-right">
                <div class="nav-status" id="nav-status">
                    <span class="status-dot status-dot-inactive"></span>
                    <span class="status-text">未连接</span>
                </div>
                <button class="btn-glass btn-glass-dark btn-sm" id="btn-theme" title="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </nav>

        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" data-page="connect">
                <i class="fas fa-plug"></i> 连接配置
            </button>
            <button class="nav-tab" data-page="models">
                <i class="fas fa-cubes"></i> 模型列表
                <span class="tab-badge" id="tab-model-count" style="display:none;">0</span>
            </button>
            <button class="nav-tab" data-page="chat">
                <i class="fas fa-comments"></i> 模型对话
            </button>
        </div>

        <!-- 页面内容 -->
        <div class="page-container">
            <!-- 连接配置页 -->
            <div class="app-page active" data-page="connect">
                <div class="glass-panel connect-panel">
                    <div class="panel-section">
                        <h3 class="section-title"><i class="fas fa-cloud"></i> 云端模型配置</h3>
                        <p class="section-desc">从配置文件自动读取云端模型参数，无需手动输入</p>
                        <div class="config-status-card" id="config-status-card">
                            <div class="config-status-row">
                                <span class="config-label"><i class="fas fa-link"></i> API 地址</span>
                                <span class="config-value" id="config-url">加载中...</span>
                            </div>
                            <div class="config-status-row">
                                <span class="config-label"><i class="fas fa-key"></i> API 密钥</span>
                                <span class="config-value" id="config-key">加载中...</span>
                            </div>
                            <div class="config-status-row">
                                <span class="config-label"><i class="fas fa-eye"></i> 多模态模型</span>
                                <span class="config-value" id="config-multimodal">加载中...</span>
                            </div>
                            <div class="config-status-row">
                                <span class="config-label"><i class="fas fa-layer-group"></i> 嵌入模型</span>
                                <span class="config-value" id="config-embedding">加载中...</span>
                            </div>
                        </div>
                    </div>

                    <div class="panel-section">
                        <h3 class="section-title"><i class="fas fa-sliders-h"></i> 自定义连接</h3>
                        <p class="section-desc">手动指定 API 地址和密钥，将覆盖云端配置</p>
                        <div class="form-grid">
                            <div class="form-group form-group-wide">
                                <label for="api-base-url"><i class="fas fa-link"></i> API 基础地址</label>
                                <input type="url" id="api-base-url" class="glass-input"
                                    placeholder="例如: https://ark.cn-beijing.volces.com/api/v3">
                            </div>
                            <div class="form-group form-group-wide">
                                <label for="api-key"><i class="fas fa-key"></i> API 密钥</label>
                                <div class="input-with-action">
                                    <input type="password" id="api-key" class="glass-input"
                                        placeholder="输入 API Key...">
                                    <button type="button" id="toggle-key-visibility" class="btn-glass btn-glass-dark btn-sm" title="显示/隐藏">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="request-timeout"><i class="fas fa-clock"></i> 请求超时 (秒)</label>
                                <input type="number" id="request-timeout" class="glass-input"
                                    min="5" max="120" value="30">
                            </div>
                            <div class="form-group">
                                <label for="max-retries"><i class="fas fa-redo"></i> 重试次数</label>
                                <input type="number" id="max-retries" class="glass-input"
                                    min="0" max="5" value="1">
                            </div>
                        </div>
                    </div>

                    <div class="panel-actions">
                        <button id="test-connection-btn" class="btn-glass btn-glass-primary">
                            <i class="fas fa-paper-plane"></i> 测试连接
                        </button>
                        <button id="query-models-btn" class="btn-glass btn-glass-accent">
                            <i class="fas fa-search"></i> 查询模型
                        </button>
                        <button id="reset-form-btn" class="btn-glass btn-glass-light">
                            <i class="fas fa-undo"></i> 重置
                        </button>
                    </div>
                </div>
            </div>

            <!-- 模型列表页 -->
            <div class="app-page" data-page="models">
                <div class="glass-panel models-panel">
                    <div class="models-header">
                        <div class="models-header-left">
                            <h3><i class="fas fa-cubes"></i> 可用模型</h3>
                            <span class="model-count-badge" id="model-count">0 个模型</span>
                        </div>
                        <div class="models-header-right">
                            <button id="filter-toggle-btn" class="btn-glass btn-glass-dark btn-sm">
                                <i class="fas fa-filter"></i> 筛选
                            </button>
                            <button id="export-json-btn" class="btn-glass btn-glass-dark btn-sm">
                                <i class="fas fa-download"></i> 导出
                            </button>
                        </div>
                    </div>

                    <!-- 筛选栏 -->
                    <div class="filter-bar" id="filter-bar">
                        <div class="filter-group">
                            <div class="filter-input-wrapper">
                                <i class="fas fa-search filter-icon"></i>
                                <input type="text" id="model-search-input" class="glass-input filter-input"
                                    placeholder="搜索模型名称或 ID...">
                            </div>
                            <select id="model-owner-filter" class="glass-input filter-select">
                                <option value="">全部所有者</option>
                            </select>
                            <select id="model-sort-select" class="glass-input filter-select">
                                <option value="id-asc">ID 升序</option>
                                <option value="id-desc">ID 降序</option>
                                <option value="owner-asc">所有者升序</option>
                                <option value="owner-desc">所有者降序</option>
                            </select>
                        </div>
                    </div>

                    <!-- 模型列表 -->
                    <div id="model-list-container" class="model-list-container">
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-cubes"></i></div>
                            <h3>暂无模型数据</h3>
                            <p>请先在「连接配置」页配置 API 并查询模型</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 模型对话页 -->
            <div class="app-page" data-page="chat">
                <div class="glass-panel chat-panel">
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <h3><i class="fas fa-comments"></i> 模型对话</h3>
                            <select id="chat-model-select" class="glass-input chat-model-select">
                                <option value="">选择模型...</option>
                            </select>
                        </div>
                        <div class="chat-header-right">
                            <button id="clear-chat-btn" class="btn-glass btn-glass-dark btn-sm" title="清空对话">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>

                    <div id="chat-messages-container" class="chat-messages-container">
                        <div class="chat-welcome">
                            <div class="chat-welcome-icon"><i class="fas fa-robot"></i></div>
                            <h3>开始对话</h3>
                            <p>选择一个模型，然后发送消息开始对话</p>
                        </div>
                    </div>

                    <div class="chat-input-area">
                        <textarea id="chat-input" class="glass-input chat-input"
                            placeholder="输入消息... (Enter 发送，Shift+Enter 换行)" rows="2"></textarea>
                        <button id="chat-send-btn" class="btn-glass btn-glass-primary chat-send-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹窗消息提示容器 -->
    <div id="toast-container" class="toast-container"></div>
</body>

</html>
