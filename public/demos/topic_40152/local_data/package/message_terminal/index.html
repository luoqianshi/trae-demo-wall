<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>『 星月智能 』星图-琉璃</title>
    <!-- 标准样式库 -->
    <link rel="stylesheet" href="/file/read/package/standard_dependency/styles.css">
    <!-- 项目私有样式 -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="table.css">
</head>

<body>
    <div class="app-container" id="appContainer">
        <!-- 优雅头部 -->
        <div class="glass-header">
            <div class="brand">
                <i class="fas fa-comment-dots brand-icon"></i>
                <span>星月智能 · 消息终端</span>
            </div>
            <div class="header-actions">
                <button class="theme-toggle-btn" id="themeToggle" title="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">未连接</span>
                </div>
            </div>
        </div>

        <!-- 消息展示区 -->
        <main class="message-area" id="messageArea" role="log" aria-live="polite">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">
                    <i class="fas fa-cloud-moon"></i>
                </div>
                <p class="empty-state-text">等待消息</p>
                <p class="empty-state-subtext">WebSocket 连接后将显示推送内容</p>
            </div>
            <!-- 动态消息列表 -->
        </main>

        <!-- 底部输入栏 -->
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" class="message-input" placeholder="输入需要渲染的文本… (Enter 执行渲染, Shift+Enter 换行)"
                    rows="1"></textarea>
                <button id="sendButton" class="send-button" title="执行渲染（仅本地展示）">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>

        <!-- 通知容器 -->
        <div class="toast-container" id="toastContainer" aria-live="assertive"></div>
        <!-- 拖拽遮罩 -->
        <div class="drag-overlay" id="dragOverlay" aria-hidden="true">
            <div class="drag-overlay-content">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>释放文件到消息列表</p>
            </div>
        </div>
    </div>
    <!-- 标准脚本库 -->
    <script src="/file/read/package/standard_dependency/script.js"></script>
    <!-- Mermaid 流程图库 -->
    <script src="/file/read/package/mermaid.min.js"></script>
    <!-- 项目私有脚本 -->
    <script defer src="script.js"></script>
</body>

</html>
