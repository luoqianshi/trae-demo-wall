<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>『 星月智能 』星图-琉璃</title>
    <!-- 标准样式库 -->
    <link rel="stylesheet" href="/file/read/package/standard_dependency/styles.css">
    <!-- 标准脚本库 -->
    <script src="/file/read/package/standard_dependency/script.js"></script>
    <!-- 项目私有样式 -->
    <link rel="stylesheet" href="styles.css">
    <!-- 项目私有脚本 -->
    <script defer src="script.js"></script>
    <!-- 标准脚本引用 -->
</head>

<body>
    <div class="bg-image" id="bgImage"></div>
    <div class="bg-overlay"></div>

    <div class="app-container" id="appContainer">
        <!-- 截图标注主面板 -->
        <div class="screenshot-panel glass-panel" id="mainPanel">
            <div class="panel-header">
                <h2 class="panel-title">
                    <i class="fas fa-crop-alt"></i>星月智能 · 截图标注
                </h2>
                <span class="status-badge" id="connectionStatus">
                    <i class="fas fa-circle"></i> 就绪
                </span>
            </div>

            <div class="screenshot-body">
                <!-- 画布区域 -->
                <div class="canvas-wrapper glass-inset" id="canvasWrapper">
                    <canvas id="canvas"></canvas>
                    <canvas id="drawCanvas"></canvas>
                    <canvas id="previewCanvas"></canvas>
                    <div class="canvas-placeholder" id="canvasPlaceholder">
                        <i class="fas fa-camera-retro" style="font-size: 48px; opacity: 0.4;"></i>
                        <p>点击 <b>“捕捉画面”</b> 或 <b>粘贴图片</b> (Ctrl+V)</p>
                    </div>
                </div>

                <!-- 区域控制滑块 -->
                <div class="continuous-controls">
                    <div class="slider-item">
                        <label>X:</label>
                        <input type="range" id="regionX" min="0" max="3840" value="0" step="10">
                        <span class="slider-value">0</span>
                    </div>
                    <div class="slider-item">
                        <label>Y:</label>
                        <input type="range" id="regionY" min="0" max="2160" value="0" step="10">
                        <span class="slider-value">0</span>
                    </div>
                    <div class="slider-item">
                        <label>宽:</label>
                        <input type="range" id="regionWidth" min="256" max="3840" value="3840" step="8">
                        <span class="slider-value">3840</span>
                    </div>
                    <div class="slider-item">
                        <label>高:</label>
                        <input type="range" id="regionHeight" min="256" max="2160" value="2160" step="8">
                        <span class="slider-value">2160</span>
                    </div>
                    <div class="slider-item">
                        <label>间隔:</label>
                        <input type="range" id="captureInterval" min="500" max="5000" value="1000" step="100">
                        <span id="intervalValue" class="slider-value">1000ms</span>
                    </div>
                    <div class="slider-item">
                        <label>缩放:</label>
                        <input type="range" id="scaleSlider" min="0.1" max="3.0" value="1.0" step="0.1">
                        <span id="scaleValue" class="slider-value">1.0x</span>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="horizontal-layout-panel">
                    <button id="captureSceneButton" class="glass-btn">
                        <i class="fas fa-camera"></i> 捕捉画面
                    </button>
                    <button id="continuousCaptureButton" class="glass-btn">
                        <i class="fas fa-play"></i> 持续捕捉
                    </button>
                    <button id="downloadSceneButton" class="glass-btn">
                        <i class="fas fa-download"></i> 下载图片
                    </button>
                </div>

                <!-- 绘图工具 -->
                <div class="horizontal-layout-panel">
                    <button id="rectTool" class="tool-btn" title="矩形"><i class="fas fa-vector-square"></i></button>
                    <button id="drawTool" class="tool-btn" title="画笔"><i class="fas fa-pencil-alt"></i></button>
                    <button id="lineTool" class="tool-btn" title="直线"><i
                            class="fas fa-grip-lines-vertical"></i></button>
                    <button id="circleTool" class="tool-btn" title="圆形"><i class="far fa-circle"></i></button>
                    <button id="textTool" class="tool-btn" title="文本"><i class="fas fa-font"></i></button>
                    <button id="arrowTool" class="tool-btn" title="箭头"><i
                            class="fas fa-long-arrow-alt-right"></i></button>
                    <button id="undoDrawButton" class="tool-btn" title="撤销" disabled><i
                            class="fas fa-undo"></i></button>
                </div>

                <!-- 颜色选择 -->
                <div class="horizontal-layout-panel">
                    <div class="line-color tool-btn" style="background-color:#e74c3c;" data-color="#e74c3c"></div>
                    <div class="line-color tool-btn" style="background-color:#3498db;" data-color="#3498db"></div>
                    <div class="line-color tool-btn" style="background-color:#2ecc71;" data-color="#2ecc71"></div>
                    <div class="line-color tool-btn" style="background-color:#f1c40f;" data-color="#f1c40f"></div>
                    <div class="line-color tool-btn" style="background-color:#9b59b6;" data-color="#9b59b6"></div>
                    <div class="line-color tool-btn" style="background-color:#000000;" data-color="#000000"></div>
                </div>

                <!-- 线宽选择 -->
                <div class="horizontal-layout-panel">
                    <div class="line-size tool-btn" data-size="4">S</div>
                    <div class="line-size tool-btn" data-size="8">M</div>
                    <div class="line-size tool-btn" data-size="16">L</div>
                    <div class="line-size tool-btn" data-size="24">XL</div>
                    <div class="line-size tool-btn" data-size="32">XXL</div>
                </div>

                <!-- 发送消息区域 -->
                <div class="send-area">
                    <textarea id="messageInput" class="glass-input" placeholder="关于这幅画面, 想和月华讨论什么? (Enter发送)"
                        rows="2"></textarea>
                    <button id="sendMessageBtn" class="send-btn glass-btn-primary">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
</body>

</html>
