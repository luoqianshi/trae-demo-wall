<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>净滩鹰 — 海滩场景</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --ink:#f4f7fa;--muted:#8aa0b4;--faint:#5a6f82;
    --accent:#13b388;--accent-d:#0e8a6e;--amber:#f5a623;
    --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
    --glass:rgba(8,16,26,.62);--glass2:rgba(8,16,26,.78);
    --font:'PingFang SC','Microsoft YaHei',sans-serif;
    --mono:'SF Mono','JetBrains Mono',ui-monospace,monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--font);background:#050a12;color:var(--ink);-webkit-font-smoothing:antialiased}
  #c{display:block;position:fixed;inset:0;width:100%;height:100%}
  header{position:fixed;top:0;left:0;right:0;height:58px;z-index:10;display:flex;align-items:center;gap:14px;padding:0 22px;
    background:linear-gradient(180deg,rgba(5,10,18,.88),rgba(5,10,18,.55) 70%,transparent);
    backdrop-filter:blur(6px)}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-d));
    display:grid;place-items:center;font-weight:800;color:#fff;font-size:17px;
    box-shadow:0 0 0 1px rgba(19,179,136,.3),0 4px 14px rgba(19,179,136,.35)}
  .brand .name{font-weight:800;font-size:19px;letter-spacing:.5px;line-height:1}
  .brand .name b{color:var(--accent)}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.18em;text-transform:uppercase}
  .top-sep{flex:1}
  .status{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
  .dot.ready{background:var(--accent);box-shadow:0 0 10px var(--accent)}
  .dot.run{background:var(--amber);box-shadow:0 0 10px var(--amber);animation:bl 1.1s infinite}
  .dot.done{background:var(--accent);box-shadow:0 0 10px var(--accent)}
  @keyframes bl{50%{opacity:.25}}
  .hint{position:fixed;left:50%;top:70px;transform:translateX(-50%);z-index:9;font-size:11px;color:var(--muted);
    font-family:var(--mono);letter-spacing:.08em;background:var(--glass);padding:6px 14px;border-radius:14px;
    border:1px solid var(--line);backdrop-filter:blur(8px);pointer-events:none}
  .hint b{color:var(--accent);font-weight:600}
  .modebar{position:fixed;left:22px;bottom:22px;z-index:10;display:flex;gap:8px}
  .mbtn{cursor:pointer;font-size:12px;font-weight:600;padding:9px 18px;border-radius:20px;border:1px solid var(--line2);
    background:var(--glass2);color:var(--muted);backdrop-filter:blur(10px);transition:.18s;letter-spacing:.04em}
  .mbtn:hover{color:var(--ink);border-color:var(--accent)}
  .mbtn.on{background:var(--accent);color:#04130d;border-color:var(--accent);box-shadow:0 0 16px rgba(19,179,136,.4)}
  .mbtn.amber.on{background:var(--amber);border-color:var(--amber);color:#1a1000;box-shadow:0 0 16px rgba(245,166,35,.4)}
  aside{position:fixed;right:0;top:0;bottom:0;width:360px;z-index:9;
    background:linear-gradient(180deg,rgba(5,10,18,.92),rgba(5,10,18,.86));
    border-left:1px solid var(--line);display:flex;flex-direction:column;padding-top:58px;backdrop-filter:blur(14px);
    overflow-y:auto;overflow-x:hidden}
  aside::-webkit-scrollbar{width:6px}
  aside::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
  aside::-webkit-scrollbar-thumb:hover{background:var(--accent)}
  .sec{padding:18px 22px;border-bottom:1px solid var(--line)}
  .sec-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin-bottom:14px;font-weight:600;
    display:flex;align-items:center;gap:8px}
  .sec-label::before{content:'';width:14px;height:1px;background:var(--accent)}
  .telemetry{display:grid;grid-template-columns:1fr 1fr;gap:18px 14px}
  .tm .n{font-size:30px;font-weight:800;line-height:1;font-family:var(--mono);letter-spacing:-.01em}
  .tm .n.g{color:var(--accent)}.tm .n.a{color:var(--amber)}
  .tm .l{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:.06em}
  .feed{max-height:140px;overflow:auto;margin:-4px -6px;padding:4px 6px}
  .feed::-webkit-scrollbar{width:4px}.feed::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
  .feed-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px}
  .feed-item:last-child{border:none}
  .feed-item .tag{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);flex-shrink:0}
  .feed-item .type{flex:1;color:var(--ink)}
  .feed-item .conf{color:var(--muted);font-family:var(--mono);font-variant-numeric:tabular-nums}
  .feed-item .conf b{color:var(--accent);font-weight:600}
  .feed-empty{font-size:12px;color:var(--faint);text-align:center;padding:14px 0;letter-spacing:.04em}
  .map-wrap{background:rgba(10,20,30,.6);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  #minimap{width:100%;height:220px;background:#0a1620;z-index:1}
  .map-info{padding:10px 12px;border-top:1px solid var(--line);font-size:11px}
  .map-place{display:flex;align-items:center;gap:6px;color:var(--ink);margin-bottom:5px}
  .map-place b{font-weight:600}
  .map-place .mpi{font-size:13px}
  .map-place .mpi-coord{margin-left:auto;color:var(--muted);font-family:var(--mono);font-size:10px}
  .map-drone{color:var(--muted);font-family:var(--mono);font-size:10.5px;letter-spacing:.03em}
  .map-drone b{color:var(--accent)}
  /* Leaflet 暗色适配 */
  .leaflet-container{background:#0a1620!important;font-family:var(--mono)!important}
  .leaflet-control-attribution{font-size:8px!important;background:rgba(5,10,18,.6)!important;color:var(--muted)!important}
  .leaflet-control-attribution a{color:var(--accent)!important}
  .leaflet-control-zoom a{background:rgba(5,10,18,.85)!important;color:var(--ink)!important;border-color:var(--line2)!important}
  .ctrls{display:flex;flex-direction:column;gap:10px}
  .btn{cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;padding:12px 14px;border-radius:8px;
    border:1px solid var(--line2);background:transparent;color:var(--ink);transition:.16s;letter-spacing:.04em}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#04130d}
  .btn.primary:hover{background:#1fc99a;box-shadow:0 0 18px rgba(19,179,136,.4)}
  .btn.warn{border-color:rgba(245,166,35,.5);color:var(--amber)}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .speed{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--muted);letter-spacing:.06em;margin-top:2px}
  .speed input{flex:1;accent-color:var(--accent)}
  .speed b{color:var(--ink);width:42px;text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  .log-wrap{height:200px;flex-shrink:0;overflow:hidden;display:flex;flex-direction:column;min-height:0}
  .log{flex:1;overflow:auto;padding:14px 22px;font-size:11.5px;line-height:1.85;font-family:var(--mono)}
  .log::-webkit-scrollbar{width:4px}.log::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
  .log .ln{display:flex;gap:10px;color:var(--muted)}
  .log .t{color:var(--accent);flex-shrink:0;opacity:.8}
  .log .ln b{color:var(--ink);font-weight:600}
  .log .ln.star b{color:var(--accent)}
  .toast{position:fixed;top:50%;left:calc(50% - 180px);transform:translate(-50%,-50%) scale(.92);
    background:rgba(19,179,136,.96);color:#04130d;padding:16px 30px;border-radius:12px;
    font-weight:800;font-size:16px;letter-spacing:.04em;opacity:0;pointer-events:none;transition:.3s;
    box-shadow:0 14px 50px rgba(0,0,0,.55),0 0 40px rgba(19,179,136,.4);z-index:20}
  .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  @media (max-width:860px){aside{width:100%;height:48vh;top:auto;bottom:0;border-left:none;border-top:1px solid var(--line);padding-top:14px}.modebar{top:70px;bottom:auto}}
</style>
</head>
<body>

<header>
  <div class="brand"><div class="mark">鹰</div><div><div class="name">净滩<b>鹰</b></div><div class="sub">Aerial Cleanup System</div></div></div>
  <div class="top-sep"></div>
  <div class="status"><span class="dot ready" id="sysDot"></span><span id="sysTxt">系统就绪</span></div>
</header>

<canvas id="c"></canvas>
<div class="hint">拖拽旋转 · 滚轮缩放 · <b>手动模式</b>点击垃圾下达指令</div>

<div class="modebar">
  <div class="mbtn on" id="btnAuto">自动巡航</div>
  <div class="mbtn amber" id="btnMan">手动点选</div>
</div>

<aside>
  <div class="sec"><div class="sec-label">任务遥测</div>
    <div class="telemetry">
      <div class="tm"><div class="n g" id="sGot">0</div><div class="l">已拾取</div></div>
      <div class="tm"><div class="n a" id="sLeft">0</div><div class="l">剩余目标</div></div>
      <div class="tm"><div class="n" id="sTime">00:00</div><div class="l">飞行时长</div></div>
      <div class="tm"><div class="n" id="sEff">0.0</div><div class="l">件 / 分钟</div></div>
    </div>
  </div>
  <div class="sec"><div class="sec-label">AI 视觉识别</div><div class="feed" id="feed"><div class="feed-empty">未检测到目标</div></div></div>
  <div class="sec"><div class="sec-label">实时监控地图</div>
    <div class="map-wrap">
      <div id="minimap"></div>
      <div class="map-info">
        <div class="map-place"><span class="mpi">📍</span><b>大梅沙海滨公园</b><span class="mpi-coord">22.5933°N, 114.2973°E</span></div>
        <div class="map-drone" id="mapDroneInfo">无人机：待机中</div>
      </div>
    </div>
  </div>
  <div class="sec"><div class="sec-label">控制台</div>
    <div class="ctrls">
      <button class="btn primary" id="btnStart">启动巡航</button>
      <div class="btn-row"><button class="btn" id="btnPause">暂停</button><button class="btn warn" id="btnReset">重置</button></div>
      <div class="speed">飞行速度<input type="range" id="spd" min="40" max="220" value="120"><b id="spdV">1.1x</b></div>
    </div>
  </div>
  <div class="log-wrap"><div class="log" id="log"></div></div>
</aside>

<div class="toast" id="toast">任务完成</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.95;

const scene=new THREE.Scene();

// ============ 噪声 ============
function hash(x,z){const s=Math.sin(x*12.9898+z*78.233)*43758.5453;return s-Math.floor(s);}
function noise(x,z){const xi=Math.floor(x),zi=Math.floor(z);const xf=x-xi,zf=z-zi;
  const a=hash(xi,zi),b=hash(xi+1,zi),c=hash(xi,zi+1),d=hash(xi+1,zi+1);
  const u=xf*xf*(3-2*xf),v=zf*zf*(3-2*zf);
  return a*(1-u)*(1-v)+b*u*(1-v)+c*(1-u)*v+d*u*v;}
function fbm(x,z){let v=0,a=1,f=1,s=0;for(let i=0;i<4;i++){v+=a*noise(x*f,z*f);s+=a;a*=0.5;f*=2.1;}return v/s;}

// ============ 天空 ============
const sky=new THREE.Mesh(
  new THREE.SphereGeometry(500,32,16),
  new THREE.ShaderMaterial({
    side:THREE.BackSide,depthWrite:false,
    uniforms:{top:{value:new THREE.Color(0x4a90c4)},mid:{value:new THREE.Color(0xa8d4ec)},bot:{value:new THREE.Color(0xe8eef0)},sunDir:{value:new THREE.Vector3(0.5,0.6,-0.3).normalize()}},
    vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vP;uniform vec3 top,mid,bot,sunDir;
      void main(){vec3 d=normalize(vP);float h=clamp(d.y*0.5+0.5,0.0,1.0);
        vec3 c=mix(bot,mid,smoothstep(0.0,0.45,h));c=mix(c,top,smoothstep(0.35,0.95,h));
        float s=pow(max(dot(d,sunDir),0.0),32.0);c+=vec3(1.0,0.95,0.8)*s*0.4;
        gl_FragColor=vec4(c,1.0);}`
  })
);
scene.add(sky);
scene.fog=new THREE.FogExp2(0xc8e0e8,0.0045);

// ============ 相机 ============
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,1000);
camera.position.set(40,38,52);
const controls=new OrbitControls(camera,canvas);
controls.target.set(0,2,0);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.maxPolarAngle=Math.PI*0.46;
controls.minDistance=22;controls.maxDistance=130;

// ============ 灯光 ============
scene.add(new THREE.HemisphereLight(0xdceaf2,0xc9b487,0.7));
const sun=new THREE.DirectionalLight(0xfff4e0,2.0);
sun.position.set(50,80,20);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-80;sun.shadow.camera.right=80;
sun.shadow.camera.top=80;sun.shadow.camera.bottom=-80;
sun.shadow.camera.near=1;sun.shadow.camera.far=250;
sun.shadow.bias=-0.0004;sun.shadow.normalBias=0.02;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff,0.18));

// ============ 程序化沙粒纹理（Canvas 生成，提升沙滩质感）============
function makeSandTexture(){
  const c=document.createElement('canvas');c.width=c.height=512;
  const g=c.getContext('2d');
  // 基底沙色
  g.fillStyle='#d9b87a';g.fillRect(0,0,512,512);
  // 大量细沙粒（随机点）
  for(let i=0;i<8000;i++){
    const x=Math.random()*512,y=Math.random()*512;
    const r=Math.random();
    // 沙粒颜色：浅金/深褐/白/黑点
    if(r<0.35) g.fillStyle='rgba(232,200,140,'+(0.3+Math.random()*0.4)+')';
    else if(r<0.65) g.fillStyle='rgba(180,140,80,'+(0.25+Math.random()*0.35)+')';
    else if(r<0.85) g.fillStyle='rgba(245,225,180,'+(0.3+Math.random()*0.4)+')';
    else if(r<0.95) g.fillStyle='rgba(120,90,50,'+(0.2+Math.random()*0.3)+')';
    else g.fillStyle='rgba(60,45,30,'+(0.3+Math.random()*0.4)+')';
    const sz=Math.random()*2+0.5;
    g.fillRect(x,y,sz,sz);
  }
  // 沙纹（轻微的波纹线）
  g.strokeStyle='rgba(150,110,60,0.15)';g.lineWidth=1;
  for(let i=0;i<30;i++){
    g.beginPath();
    const y=Math.random()*512;
    g.moveTo(0,y);
    for(let x=0;x<512;x+=10){
      g.lineTo(x,y+Math.sin(x*0.1+i)*3+Math.random()*2);
    }
    g.stroke();
  }
  const t=new THREE.CanvasTexture(c);
  t.colorSpace=THREE.SRGBColorSpace;
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
// 沙粒法线贴图（凹凸感）
function makeSandNormal(){
  const c=document.createElement('canvas');c.width=c.height=256;
  const g=c.getContext('2d');
  g.fillStyle='rgb(128,128,255)';g.fillRect(0,0,256,256); // 中性法线
  // 随机凹凸点
  for(let i=0;i<3000;i++){
    const x=Math.random()*256,y=Math.random()*256;
    const r=Math.random();
    const dx=(Math.random()-0.5)*60,dy=(Math.random()-0.5)*60;
    g.fillStyle=`rgb(${128+dx|0},${128+dy|0},255)`;
    g.fillRect(x,y,1.5,1.5);
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
const sandTex=makeSandTexture();
sandTex.repeat.set(40,40);
const sandNormalTex=makeSandNormal();
sandNormalTex.repeat.set(60,60);

// ============ 沙滩地形 ============
const SAND=200, SEG=180;
const sandGeo=new THREE.PlaneGeometry(SAND,SAND,SEG,SEG);
sandGeo.rotateX(-Math.PI/2);
const sPos=sandGeo.attributes.position;
const sandCol=new Float32Array(sPos.count*3);
for(let i=0;i<sPos.count;i++){
  const x=sPos.getX(i),z=sPos.getZ(i);
  const h=fbm(x*0.05,z*0.05)*1.0+fbm(x*0.18+10,z*0.18-5)*0.3+Math.random()*0.04;
  sPos.setY(i,h);
  const wet=THREE.MathUtils.clamp((z+50)/100,0,1);
  const shade=THREE.MathUtils.clamp(h*0.4+0.5,0,1);
  const grain=(Math.random()-0.5)*0.06;
  const c=new THREE.Color().setHSL(0.10,0.45+grain*0.3,THREE.MathUtils.clamp(0.55+wet*0.18+shade*0.12+grain,0.3,0.82));
  sandCol[i*3]=c.r;sandCol[i*3+1]=c.g;sandCol[i*3+2]=c.b;
}
sandGeo.setAttribute('color',new THREE.BufferAttribute(sandCol,3));
sandGeo.computeVertexNormals();
const sand=new THREE.Mesh(sandGeo,new THREE.MeshStandardMaterial({
  vertexColors:true,
  flatShading:true,
  roughness:1.0,metalness:0
}));
sand.receiveShadow=true;
scene.add(sand);

// 沙粒细节（low poly 棱角小石子）
for(let i=0;i<900;i++){
  const x=(Math.random()-0.5)*180,z=(Math.random()-0.5)*180;
  if(z<-40) continue;
  const dot=new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.06+Math.random()*0.08,0),
    new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.10,0.35,0.45+Math.random()*0.25),roughness:1,metalness:0,flatShading:true})
  );
  dot.position.set(x,fbm(x*0.05,z*0.05)*1.0+0.05,z);
  dot.scale.y=0.5;
  dot.castShadow=true;
  scene.add(dot);
}

// ============ 海水（远处延伸到地平线，与天空衔接）============
// 大海：宽度覆盖整个视野，长度一直延伸到远处地平线
const oceanW=SAND*2.2, oceanL=400;
const waterGeo=new THREE.PlaneGeometry(oceanW,oceanL,140,80);
waterGeo.rotateX(-Math.PI/2);
const wBase=waterGeo.attributes.position.array.slice();
const water=new THREE.Mesh(waterGeo,new THREE.MeshStandardMaterial({
  color:0x2c6e96,roughness:1,metalness:0,flatShading:true,side:THREE.DoubleSide
}));
// 海平面位置：z 从 -40(海岸线) 一直延伸到 -440(地平线)
water.position.set(0,-0.3,-240);
scene.add(water);

// 远处海平线雾化色带（让海天自然衔接）
const horizonStrip=new THREE.Mesh(
  new THREE.PlaneGeometry(oceanW,30),
  new THREE.MeshBasicMaterial({color:0xa8c8d8,transparent:true,opacity:0.5,depthWrite:false,fog:false})
);
horizonStrip.position.set(0,8,-430);
scene.add(horizonStrip);

// 海岸浪花
for(let i=0;i<120;i++){
  const x=-110+i*1.8+Math.sin(i*0.5)*0.4;
  const foam=new THREE.Mesh(
    new THREE.SphereGeometry(0.4+Math.random()*0.4,8,6),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.7})
  );
  foam.position.set(x,0.05,-40+Math.random()*1.2);
  foam.scale.y=0.3;
  scene.add(foam);
}

// ============ 内陆绿草坪 + 潟湖 ============
const grassGeo=new THREE.PlaneGeometry(120,140,30,30);
grassGeo.rotateX(-Math.PI/2);
const gp=grassGeo.attributes.position;
const gCol=new Float32Array(gp.count*3);
for(let i=0;i<gp.count;i++){
  const x=gp.getX(i),z=gp.getZ(i);

// 多块岩石堆叠成"礁石群"形态，深色风化质感 + 苔藓 + 部分浸水
function buildWeatheredRock(size){
  const g=new THREE.Group();
  // 主体：用 IcosahedronGeometry 细分 + 强扰动，做风化不规则
  const geo=new THREE.IcosahedronGeometry(size,2);
  const p=geo.attributes.position;
  for(let i=0;i<p.count;i++){
    const fx=p.getX(i),fy=p.getY(i),fz=p.getZ(i);
    // 多频扰动（模拟风化凹凸）
    const n=fbm(fx*0.3+100,fz*0.3+100)*0.4+fbm(fx*1.2,fz*1.2)*0.15;
    const len=Math.sqrt(fx*fx+fy*fy+fz*fz);
    const k=1+(n-0.3)*0.5;
    p.setX(i,fx*k);p.setY(i,fy*k*0.55);p.setZ(i,fz*k); // 压扁Y
  }
  geo.computeVertexNormals();
  // 顶点色：底深顶浅 + 局部苔藓绿
  const colors=new Float32Array(p.count*3);
  for(let i=0;i<p.count;i++){
    const y=p.getY(i);
    const c=new THREE.Color();
    if(Math.random()<0.08){ // 局部苔藓
      c.setHSL(0.28,0.5,0.25+Math.random()*0.08);
    } else {
      const t=THREE.MathUtils.clamp((y+size*0.3)/(size*0.6),0,1);
      c.setHSL(0.07,0.10,0.18+t*0.18+Math.random()*0.05); // 深灰褐到浅灰
    }
    colors[i*3]=c.r;colors[i*3+1]=c.g;colors[i*3+2]=c.b;
  }
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  const rock=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:1,metalness:0,flatShading:true}));
  rock.castShadow=true;rock.receiveShadow=true;
  g.add(rock);
  return g;
}
// 堆叠礁石群（多块组合）
function buildRockCluster(cx,cz,baseSize){
  const g=new THREE.Group();
  // 1块大主岩 + 2-3块副岩堆叠
  const main=buildWeatheredRock(baseSize);
  main.position.set(0,baseSize*0.4,0);
  g.add(main);
  const subCount=2+Math.floor(Math.random()*2);
  for(let i=0;i<subCount;i++){
    const sub=buildWeatheredRock(baseSize*(0.45+Math.random()*0.25));
    const a=Math.random()*Math.PI*2;
    const r=baseSize*0.7;
    sub.position.set(Math.cos(a)*r,baseSize*0.3+Math.random()*baseSize*0.3,Math.sin(a)*r);
    sub.rotation.set(Math.random()*0.3,Math.random()*Math.PI*2,Math.random()*0.3);
    g.add(sub);
  }
  // 周围散落碎石
  for(let i=0;i<5;i++){
    const pebble=buildWeatheredRock(baseSize*0.15);
    const a=Math.random()*Math.PI*2;

    pebble.rotation.y=Math.random()*Math.PI;

  }
  g.position.set(cx,0,cz);
  return g;
}

// ============ 远处山脉（单座完整立体矮山，无雪顶）============
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function buildMountains(){
  const g=new THREE.Group();
  // 单座完整立体矮山：位于海滩后方远处
  const cx=20, cz=180, baseH=34, baseR=70;
  // 高分段圆柱（顶部半径 0 = 圆锥状，但圆周/高度分段高，便于噪声扰动）
  const radSeg=72, heightSeg=48;
  const geo=new THREE.CylinderGeometry(baseR*0.08, baseR, baseH, radSeg, heightSeg, false);
  const pos=geo.attributes.position;
  const col=new Float32Array(pos.count*3);
  const cRock=new THREE.Color(0x7a8478);
  const cGrass=new THREE.Color(0x4a6a3a);
  const cDirt=new THREE.Color(0x6b5638);
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
    // 圆柱局部坐标：y 从 -baseH/2（底）到 +baseH/2（顶）
    const yNorm=(y+baseH/2)/baseH;        // 0 底 → 1 顶
    const r=Math.sqrt(x*x+z*z);            // 当前点到中轴距离
    const rNorm=r/baseR;                   // 0 中心 → 1 边缘
    // 山形包络：中心高、边缘低（径向衰减），yNorm 控制高度比例
    const mask=Math.pow(Math.max(0,1-rNorm), 1.4);
    // 多层 FBM 让山脊不规则起伏
    const n1=fbm(x*0.035+5.1, z*0.035+2.3);
    const n2=fbm(x*0.11+1.7, z*0.11+3.9)*0.45;
    const ridge=mask*(0.55+n1*0.95+n2);
    // 水平方向扰动（让侧坡不规则）
    const sideNoise=fbm(x*0.06+0.7, z*0.06+1.3);
    const sideOffset=(0.6+sideNoise*1.2)*(1-yNorm)*rNorm; // 越靠下、越靠边缘扰动越大
    const ang=Math.atan2(z,x);
    const newX=x+Math.cos(ang)*sideOffset;
    const newZ=z+Math.sin(ang)*sideOffset;
    // 高度：底部贴地（y=-baseH/2），山顶由 ridge 抬升
    const newY=-baseH/2 + baseH*ridge*(0.4+yNorm*0.6+yNorm*ridge*0.5);
    pos.setXYZ(i, newX, newY, newZ);
    // 顶点色：按归一化高度（0 草地 → 0.5 泥土 → 1 岩石）
    const t=clamp(ridge*0.9+yNorm*0.2, 0, 1);
    const c=new THREE.Color();
    if(t<0.35){
      c.copy(cGrass).lerp(cDirt, t/0.35);
    } else if(t<0.72){
      c.copy(cDirt).lerp(cRock, (t-0.35)/0.37);
    } else {
      c.copy(cRock);
    }
    const v=0.92+Math.random()*0.14;
    col[i*3]=c.r*v; col[i*3+1]=c.g*v; col[i*3+2]=c.b*v;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  geo.computeVertexNormals();
  const m=new THREE.Mesh(geo, new THREE.MeshStandardMaterial({vertexColors:true,roughness:1,metalness:0,flatShading:true}));
  m.position.set(cx, baseH/2, cz);  // 底部贴地
  m.castShadow=true; m.receiveShadow=true;
  g.add(m);
  return g;
}
scene.add(buildMountains());

// ============ 步行道（连续铺面，无断缝，哑光棕色木材）============
function buildBoardwalk(path,wid=2.4){
  const g=new THREE.Group();
  const boardMat=new THREE.MeshStandardMaterial({color:0xa07a4a,roughness:1,metalness:0,flatShading:true});
  const lineMat=new THREE.MeshStandardMaterial({color:0x6b4a26,roughness:1,metalness:0,flatShading:true});
  for(let i=0;i<path.length-1;i++){
    const a=path[i],b=path[i+1];
    const dir=new THREE.Vector3().subVectors(b,a);
    const d=dir.length();
    if(d<0.01) continue;
    const mid=new THREE.Vector3().addVectors(a,b).multiplyScalar(0.5);
    // 用方向向量算 yaw（避免 lookAt 导致的接缝）
    const yaw=Math.atan2(dir.x,dir.z);
    // 连续长板（不再分短段，消除断缝）
    const board=new THREE.Mesh(new THREE.BoxGeometry(wid,0.18,d),boardMat);
    board.position.copy(mid);board.position.y=0.22;
    board.rotation.y=yaw;
    board.castShadow=true;board.receiveShadow=true;
    g.add(board);
    // 木板缝线（横向，沿长度均匀分布）
    const lineCount=Math.max(2,Math.floor(d/1.2));
    for(let k=0;k<=lineCount;k++){
      const tt=k/lineCount;
      const off=new THREE.Vector3().subVectors(b,a).multiplyScalar(tt);
      const line=new THREE.Mesh(new THREE.BoxGeometry(wid*0.98,0.02,0.06),lineMat);
      line.position.set(a.x+off.x,0.32,a.z+off.z);
      line.rotation.y=yaw;
      g.add(line);
    }
  }
  // 转角补连接圆盘（消除折线转角空隙）
  for(let i=1;i<path.length-1;i++){
    const c=path[i];
    const corner=new THREE.Mesh(new THREE.CylinderGeometry(wid*0.55,wid*0.55,0.18,16),boardMat);
    corner.position.set(c.x,0.22,c.z);
    corner.castShadow=true;corner.receiveShadow=true;
    g.add(corner);
  }
  // 栈桥支柱（每段下方）
  for(let i=0;i<path.length;i++){
    const p=path[i];
    for(const dx of [-wid*0.4,wid*0.4]){
      const post=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.6,0.18),lineMat);
      post.position.set(p.x+dx,0,p.z);
      g.add(post);
    }
  }
  return g;
}

function buildPalmLeaf(length,width){
  const seg=10;const positions=[],uvs=[],indices=[];
  const spine=[];
  for(let i=0;i<=seg;i++){const t=i/seg;spine.push(new THREE.Vector3(t*length,-Math.pow(t,1.5)*length*0.35,0));}
  const halfThick=0.04;
  for(let i=0;i<=seg;i++){
    const t=i/seg;const w=Math.sin(t*Math.PI)*width*0.5;const x=spine[i].x,y=spine[i].y;
    positions.push(x,y+halfThick,-w,x,y+halfThick,w,x,y-halfThick,-w,x,y-halfThick,w);
    uvs.push(t,0,t,1,t,0,t,1);
  }
  for(let i=0;i<seg;i++){const b=i*4;
    indices.push(b,b+4,b+5,b,b+5,b+1,b+2,b+7,b+6,b+2,b+3,b+7,b,b+6,b+4,b,b+2,b+6,b+1,b+5,b+7,b+1,b+7,b+3);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(indices);geo.computeVertexNormals();return geo;
}

  new THREE.MeshBasicMaterial({color:0xff7a1a,transparent:true,opacity:0.0,side:THREE.DoubleSide,depthWrite:false})

dropMarker.rotation.x=-Math.PI/2;
dropMarker.position.set(BIN_X+4,2.6,BIN_Z);
scene.add(dropMarker);

// 抓取成功光圈（无人机下方，抓取瞬间出现）
const grabFlash=new THREE.Mesh(
  new THREE.RingGeometry(0.8,1.4,32),
  new THREE.MeshBasicMaterial({color:0x13b388,transparent:true,opacity:0.0,side:THREE.DoubleSide,depthWrite:false})
);
grabFlash.rotation.x=-Math.PI/2;
scene.add(grabFlash);

// 投放成功光圈（垃圾桶口，投放瞬间出现）
const dropFlash=new THREE.Mesh(
  new THREE.RingGeometry(0.8,1.6,32),
  new THREE.MeshBasicMaterial({color:0x13b388,transparent:true,opacity:0.0,side:THREE.DoubleSide,depthWrite:false})
);
dropFlash.rotation.x=-Math.PI/2;
dropFlash.position.set(BIN_X,2.5,BIN_Z);
scene.add(dropFlash);

// 找到第一个垃圾桶对象（用于投放时弹跳动画）
let binMesh=null;
scene.traverse(o=>{if(o.position && o.position.x===BIN_X && o.position.z===BIN_Z && o.children && o.children.length>5)binMesh=o;});
let binBounceT=0; // 桶弹跳计时

// ============ 状态机 ============
let mode='auto',running=false,paused=false,speed=1.1;
let startTime=0,elapsed=0,gotCount=0,feed=[];let toastTimer=null;
const DETECT_R=14;
const droneState={state:'idle',target:null,holding:null,clawOpen:1,tClawOpen:1,cruiseT:0};

function chooseTarget(){const a=items.filter(i=>!i.collected);if(!a.length)return null;let best=null,bd=1e9;for(const it of a){const d=it.group.position.distanceTo(drone.position);if(d<bd){bd=d;best=it;}}return best;}
function detect(){const act=[];for(const it of items){if(it.collected)continue;const d=it.group.position.distanceTo(drone.position);if(d<DETECT_R){it.det=Math.min(1,it.det+0.08);it.conf=Math.min(0.97,0.6+(DETECT_R-d)/DETECT_R*0.4);act.push(it);}else{it.det=Math.max(0,it.det-0.05);}}feed=act.sort((a,b)=>b.conf-a.conf).slice(0,5);}
function moveTowards(target,dt){const v=speed*12*dt;const dir=new THREE.Vector3().subVectors(target,drone.position);dir.y=0;const dh=dir.length();if(dh>0.01){const step=Math.min(v,dh);dir.normalize().multiplyScalar(step);drone.position.x+=dir.x;drone.position.z+=dir.z;const tr=Math.atan2(dir.x,dir.z);drone.rotation.y+=(tr-drone.rotation.y)*Math.min(1,6*dt);}drone.position.y+=(target.y-drone.position.y)*Math.min(1,3*dt);}
function arriveAt(target){return drone.position.distanceTo(target)<1.0;}

function step(dt){
  if(!running||paused)return;
  elapsed=(performance.now()-startTime)/1000;
  detect();droneState.cruiseT+=dt;
  drone.userData.rotors.forEach(r=>r.g.rotation.y+=dt*45*speed*r.dir);
  droneState.clawOpen+=(droneState.tClawOpen-droneState.clawOpen)*Math.min(1,8*dt);
  const ang=(1-droneState.clawOpen)*0.7;
  drone.userData.fingerL.rotation.z=ang;drone.userData.fingerR.rotation.z=-ang;
  marker.position.x=drone.position.x;marker.position.z=drone.position.z;
  const hoverY=7,grabY=1.4;
  switch(droneState.state){
    case 'idle':{if(mode==='auto'){const tg=chooseTarget();if(tg){droneState.target=tg;droneState.state='approach';log('锁定 <b>'+tg.type.label+'</b> · 置信 '+(tg.conf*100|0)+'%');}else{const px=Math.cos(droneState.cruiseT*0.3)*25,pz=Math.sin(droneState.cruiseT*0.25)*20;moveTowards(new THREE.Vector3(px,hoverY,pz),dt);}}else{drone.position.y=hoverY+Math.sin(performance.now()*0.001)*0.3;}break;}
    case 'approach':{const t=droneState.target.group.position;moveTowards(new THREE.Vector3(t.x,hoverY,t.z),dt);if(arriveAt(new THREE.Vector3(t.x,hoverY,t.z)))droneState.state='descend';break;}
    case 'descend':{const t=droneState.target.group.position;moveTowards(new THREE.Vector3(t.x,grabY,t.z),dt);if(arriveAt(new THREE.Vector3(t.x,grabY,t.z))){droneState.state='grab';droneState.tClawOpen=0;log('下降到位 · 机械爪闭合');}break;}
    case 'grab':{if(droneState.clawOpen<0.15){droneState.holding={type:droneState.target.type};droneState.target.collected=true;scene.remove(droneState.target.group);gotCount++;log('抓取 <b>'+droneState.holding.type.label+'</b> · 飞往收集点');droneState.state='tobin';grabFlash.material.opacity=0.9;grabFlash.scale.setScalar(0.5);}break;}
    case 'tobin':{moveTowards(new THREE.Vector3(BIN_X+4,hoverY,BIN_Z),dt);if(arriveAt(new THREE.Vector3(BIN_X+4,hoverY,BIN_Z))){droneState.state='drop';droneState.tClawOpen=1;}break;}
    case 'drop':{if(droneState.clawOpen>0.85){droneState.holding=null;log('投放完成 · 返回巡航');droneState.state='return';dropFlash.material.opacity=0.9;dropFlash.scale.setScalar(0.5);binBounceT=0.4;}break;}
    case 'return':{moveTowards(new THREE.Vector3(0,hoverY,5),dt);if(arriveAt(new THREE.Vector3(0,hoverY,5))){const left=items.filter(i=>!i.collected).length;if(left===0){droneState.state='done';finish();}else droneState.state='idle';}break;}
  }
  if(droneState.holding){if(!drone.userData.heldMesh){const hm=buildTrash(droneState.holding.type);hm.scale.setScalar(0.7);hm.position.y=-2.2;drone.add(hm);drone.userData.heldMesh=hm;}}else if(drone.userData.heldMesh){drone.remove(drone.userData.heldMesh);drone.userData.heldMesh=null;}

  // 抓取光圈：跟随无人机下方，快速扩散+衰减
  if(grabFlash.material.opacity>0.01){
    grabFlash.material.opacity-=dt*1.8;
    grabFlash.scale.x+=dt*4;grabFlash.scale.y+=dt*4;grabFlash.scale.z+=dt*4;
    grabFlash.position.set(drone.position.x,0.15,drone.position.z);
  } else {grabFlash.material.opacity=0;grabFlash.scale.setScalar(1);}

  // 投放标记圈：无人机带着垃圾飞向垃圾桶时显示
  if(droneState.state==='tobin'||droneState.state==='drop'){
    dropMarker.material.opacity=Math.min(0.7,dropMarker.material.opacity+dt*2);
    dropMarker.scale.x=1+Math.sin(performance.now()*0.005)*0.08;
    dropMarker.scale.z=1+Math.sin(performance.now()*0.005)*0.08;
  } else {
    dropMarker.material.opacity=Math.max(0,dropMarker.material.opacity-dt*2);
  }

  // 投放成功光圈：扩散+衰减
  if(dropFlash.material.opacity>0.01){
    dropFlash.material.opacity-=dt*1.5;
    dropFlash.scale.x+=dt*3.5;dropFlash.scale.y+=dt*3.5;dropFlash.scale.z+=dt*3.5;
  } else {dropFlash.material.opacity=0;dropFlash.scale.setScalar(1);}

  // 垃圾桶弹跳（投放瞬间）
  if(binBounceT>0 && binMesh){
    binBounceT-=dt;
    binMesh.position.y=Math.sin(binBounceT*20)*0.15*Math.max(0,binBounceT/0.4);
  } else if(binMesh){
    binMesh.position.y=0;
  }

  updateUI();renderFeed();
}
function finish(){running=false;setSys('done','任务完成');toast('全部 '+gotCount+' 件清理完成');log('★ 任务完成 · 共拾取 <b>'+gotCount+'</b> 件 · 用时 '+fmt(elapsed),'star');}

function updateUI(){const left=items.filter(i=>!i.collected).length;document.getElementById('sGot').textContent=gotCount;document.getElementById('sLeft').textContent=left;document.getElementById('sTime').textContent=fmt(elapsed);document.getElementById('sEff').textContent=elapsed>0?(gotCount/elapsed*60).toFixed(1):'0.0';}
function fmt(s){const m=Math.floor(s/60),x=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');}
function renderFeed(){const f=document.getElementById('feed');if(!feed.length){f.innerHTML='<div class="feed-empty">未检测到目标</div>';return;}f.innerHTML=feed.map(it=>`<div class="feed-item"><span class="tag"></span><span class="type">${it.type.label}</span><span class="conf"><b>${(it.conf*100|0)}%</b></span></div>`).join('');}
function log(msg,cls){const el=document.getElementById('log');const t=new Date();const ts=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');const d=document.createElement('div');d.className='ln'+(cls?' '+cls:'');d.innerHTML='<span class="t">'+ts+'</span><span>'+msg+'</span>';el.appendChild(d);el.scrollTop=el.scrollHeight;while(el.children.length>80)el.removeChild(el.firstChild);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}
function setSys(st,txt){document.getElementById('sysDot').className='dot'+(st?' '+st:'');document.getElementById('sysTxt').textContent=txt;}

document.getElementById('btnAuto').onclick=()=>{mode='auto';document.getElementById('btnAuto').classList.add('on');document.getElementById('btnMan').classList.remove('on');log('切换 <b>自动巡航</b>');};
document.getElementById('btnMan').onclick=()=>{mode='manual';document.getElementById('btnMan').classList.add('on');document.getElementById('btnAuto').classList.remove('on');log('切换 <b>手动点选</b>');};
document.getElementById('btnStart').onclick=()=>{if(droneState.state==='done')reset();if(!running){running=true;paused=false;if(!startTime)startTime=performance.now()-elapsed*1000;setSys('run','作业中');log('启动巡航任务');document.getElementById('btnStart').textContent='继续';}else{paused=false;setSys('run','作业中');}};
document.getElementById('btnPause').onclick=()=>{if(running){paused=!paused;setSys(paused?'ready':'run',paused?'已暂停':'作业中');log(paused?'暂停':'继续');}};
document.getElementById('btnReset').onclick=()=>reset();
document.getElementById('spd').oninput=e=>{speed=e.target.value/110;document.getElementById('spdV').textContent=speed.toFixed(1)+'x';};

const raycaster=new THREE.Raycaster();const mouse=new THREE.Vector2();
canvas.addEventListener('click',e=>{
  if(mode!=='manual'||!running||paused)return;
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const meshes=items.filter(i=>!i.collected).flatMap(i=>i.group.children);
  const hits=raycaster.intersectObjects(meshes,true);
  if(hits.length){let obj=hits[0].object;while(obj.parent&&!items.find(i=>i.group===obj))obj=obj.parent;const it=items.find(i=>i.group===obj);if(it){droneState.target=it;droneState.state='approach';log('手动锁定 <b>'+it.type.label+'</b>');}}
});

function reset(){
  if(drone.userData.heldMesh){drone.remove(drone.userData.heldMesh);drone.userData.heldMesh=null;}
  spawnTrash();
  drone.position.set(0,9,5);drone.rotation.set(0,0,0);
  droneState.state='idle';droneState.target=null;droneState.holding=null;droneState.clawOpen=1;droneState.tClawOpen=1;
  gotCount=0;elapsed=0;startTime=0;feed=[];running=false;paused=false;
  setSys('ready','系统就绪');document.getElementById('btnStart').textContent='启动巡航';
  updateUI();renderFeed();
  log('就绪 · '+items.length+' 个目标待清理');
}

let last=performance.now();
function animateWater(t){
  const p=water.geometry.attributes.position;
  for(let i=0;i<p.count;i++){
    const x=wBase[i*3],z=wBase[i*3+2];
    // 多频波浪：近处小波 + 远处大涌浪
    p.setY(i,
      Math.sin(x*0.2+t*1.0)*0.3+
      Math.cos(z*0.3+t*0.8)*0.2+
      Math.sin(x*0.05+z*0.04+t*0.5)*0.6
    );
  }
  p.needsUpdate=true;water.geometry.computeVertexNormals();

  // 海浪拍打岩石：浪花环起伏 + 透明度脉动（模拟潮涌拍击）
  rockSplashes.forEach((sp,si)=>{
    // 整体潮涌节奏（每块岩石相位错开）
    const surge=0.5+0.5*Math.sin(t*1.3+si*1.1);
    sp.group.children.forEach((foam,fi)=>{
      const pt=sp.particles[fi];
      // 半径随潮涌外扩/内收
      const rad=pt.rad+surge*0.8;
      foam.position.x=Math.cos(pt.a)*rad;
      foam.position.z=Math.sin(pt.a)*rad;
      // 高度起伏 + 飞溅感
      foam.position.y=0.1+Math.max(0,Math.sin(t*2.5+pt.phase))*0.4*(0.5+surge);
      // 透明度随潮涌
      foam.material.opacity=0.4+surge*0.5;
    });
  });
}
// ============ 真实地理定位地图（Leaflet + OpenStreetMap）============
// 大梅沙海滨公园中心坐标
const BEACH_LAT=22.5933, BEACH_LNG=114.2973;
// 世界坐标 → 经纬度映射（1 单位 ≈ 1 米，1°≈111000m）
const LAT_PER_UNIT=1/111000, LNG_PER_UNIT=1/(111000*Math.cos(BEACH_LAT*Math.PI/180));
function w2latlng(x,z){
  // 场景 x→经度，z→纬度（z 正向朝北/内陆）
  return [BEACH_LAT+z*LAT_PER_UNIT, BEACH_LNG+x*LNG_PER_UNIT];
}

// 初始化 Leaflet 地图
const realMap=L.map('minimap',{zoomControl:true,attributionControl:true}).setView([BEACH_LAT,BEACH_LNG],16);
// 暗色地图瓦片（CartoDB Dark Matter，免费）
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CartoDB',
  subdomains:'abcd',maxZoom:19
}).addTo(realMap);

// 大梅沙海滩中心标记
L.circleMarker([BEACH_LAT,BEACH_LNG],{
  radius:8,color:'#13b388',fillColor:'#13b388',fillOpacity:0.6,weight:2
}).addTo(realMap).bindPopup('<b>大梅沙海滨公园</b><br>无人机作业区域中心');

// 标记作业区域范围（场景 ±100 米 → 约 ±0.0009°）
const areaBounds=[
  w2latlng(-100,-100),w2latlng(100,-100),w2latlng(100,100),w2latlng(-100,100)
];
L.polygon(areaBounds,{color:'#13b388',weight:1,opacity:0.5,fillOpacity:0.05,dashArray:'4,3'}).addTo(realMap);

// 垃圾桶标记（绿）
const binMarkers=BIN_POSITIONS.map(b=>{
  const [la,lo]=w2latlng(b.x,b.z);
  return L.circleMarker([la,lo],{radius:5,color:'#0e8a6e',fillColor:'#13b388',fillOpacity:0.9,weight:1.5})
    .addTo(realMap).bindPopup('回收垃圾桶');
});

// 垃圾标记组（红，动态更新）
let trashLayerGroup=L.layerGroup().addTo(realMap);
// 无人机标记（琥珀，动态更新位置）
const droneIcon=L.divIcon({className:'drone-map-icon',html:'<div style="width:14px;height:14px;background:#f5a623;border:2px solid #fff;border-radius:50%;box-shadow:0 0 8px #f5a623"></div>',iconSize:[14,14],iconAnchor:[7,7]});
const droneMapMarker=L.marker([BEACH_LAT,BEACH_LNG],{icon:droneIcon}).addTo(realMap);
// 无人机探测圈
const droneDetectCircle=L.circle([BEACH_LAT,BEACH_LNG],{radius:14,color:'#13b388',weight:1,opacity:0.5,fillOpacity:0.08,dashArray:'3,3'}).addTo(realMap);

function drawMap(){
  // 更新无人机位置
  const [dla,dlo]=w2latlng(drone.position.x,drone.position.z);
  droneMapMarker.setLatLng([dla,dlo]);
  droneDetectCircle.setLatLng([dla,dlo]);
  // 更新无人机信息
  const stateText={
    idle:'待机巡航',approach:'接近目标',descend:'下降中',
    grab:'抓取中',tobin:'运送垃圾',drop:'投放中',return:'返回中',done:'任务完成'
  }[droneState.state]||'待机';
  const di=document.getElementById('mapDroneInfo');
  if(di){
    di.innerHTML=`无人机：<b>${stateText}</b> · ${dla.toFixed(5)}°N, ${dlo.toFixed(5)}°E`+
      (droneState.holding?` · <b style="color:#f5a623">载有${droneState.holding.type.label}</b>`:'');
  }
  // 更新垃圾标记（清除重建）
  trashLayerGroup.clearLayers();
  items.forEach(it=>{
    if(it.collected)return;
    const [la,lo]=w2latlng(it.group.position.x,it.group.position.z);
    const hot=it.det>0.3;
    L.circleMarker([la,lo],{
      radius:hot?4:3,color:'#e94555',fillColor:hot?'#ff5555':'#e94555',fillOpacity:0.9,weight:1
    }).addTo(trashLayerGroup);
  });
}
function loop(now){const dt=Math.min(0.05,(now-last)/1000);last=now;step(dt);animateWater(now*0.001);drawMap();controls.update();renderer.render(scene,camera);requestAnimationFrame(loop);}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
reset();requestAnimationFrame(loop);
</script>
