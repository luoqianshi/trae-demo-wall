<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGuard AI - 智能代码审查助手 Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        .header { background: linear-gradient(90deg, #161b22, #21262d); padding: 20px 30px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 28px; }
        .logo-text { font-size: 1.4em; font-weight: bold; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; gap: 12px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(90deg, #00d9ff, #00ff88); color: #0d1117; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
        .btn-secondary:hover { background: #30363d; }
        .main-container { display: flex; height: calc(100vh - 65px); }
        .editor-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #30363d; }
        .panel-header { background: #161b22; padding: 12px 16px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; }
        .tab { padding: 6px 12px; background: #0d1117; border-radius: 6px 6px 0 0; font-size: 13px; color: #8b949e; }
        .tab.active { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-bottom: none; }
        .editor-content { flex: 1; padding: 16px; overflow: auto; }
        .code-input { width: 100%; height: 100%; background: transparent; border: none; color: #c9d1d9; font-family: inherit; font-size: 14px; line-height: 1.6; resize: none; outline: none; }
        .results-panel { width: 450px; background: #161b22; display: flex; flex-direction: column; }
        .results-header { padding: 16px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .results-title { font-size: 1.1em; font-weight: 600; }
        .results-stats { display: flex; gap: 16px; }
        .stat { display: flex; align-items: center; gap: 6px; }
        .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .stat-dot.error { background: #f85149; }
        .stat-dot.warning { background: #d29922; }
        .stat-dot.info { background: #58a6ff; }
        .results-content { flex: 1; overflow: auto; padding: 12px; }
        .issue-card { background: #21262d; border-radius: 8px; margin-bottom: 12px; border-left: 3px solid; overflow: hidden; }
        .issue-card.error { border-left-color: #f85149; }
        .issue-card.warning { border-left-color: #d29922; }
        .issue-card.info { border-left-color: #58a6ff; }
        .issue-header { padding: 12px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .issue-header:hover { background: rgba(255,255,255,0.03); }
        .issue-title { display: flex; align-items: center; gap: 10px; }
        .issue-icon { font-size: 16px; }
        .issue-name { font-weight: 500; }
        .issue-severity { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.1); }
        .issue-body { padding: 0 14px 14px; display: none; }
        .issue-body.show { display: block; }
        .issue-location { background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; color: #8b949e; }
        .issue-description { font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
        .fix-section { background: rgba(0,0,0,0.2); border-radius: 6px; padding: 12px; }
        .fix-title { font-size: 12px; color: #00ff88; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .fix-code { background: #0d1117; padding: 10px; border-radius: 4px; font-size: 12px; white-space: pre-wrap; color: #00ff88; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #8b949e; text-align: center; padding: 20px; }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .sample-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
        .sample-btn { padding: 6px 12px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .sample-btn:hover { background: #30363d; border-color: #00d9ff; }
        .loading { display: none; align-items: center; gap: 10px; padding: 20px; justify-content: center; }
        .loading.show { display: flex; }
        .spinner { width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #00d9ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #21262d; border: 1px solid #30363d; padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .analysis-summary { padding: 12px; background: rgba(0,217,255,0.1); border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
        .analysis-summary strong { color: #00d9ff; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span class="logo-icon">🛡️</span><span class="logo-text">CodeGuard AI</span></div>
        <div class="header-actions"><button class="btn btn-secondary" onclick="clearCode()">清空</button><button class="btn btn-primary" onclick="analyzeCode()">🔍 开始审查</button></div>
    </div>
    <div class="main-container">
        <div class="editor-panel">
            <div class="panel-header"><span class="tab active">index.js</span><span style="margin-left:auto;font-size:12px;color:#8b949e;">粘贴或输入需要审查的代码</span></div>
            <div class="editor-content"><textarea id="codeInput" class="code-input" placeholder="// 在此粘贴您的 JavaScript/TypeScript 代码...&#10;// 或点击下方示例代码加载演示"></textarea></div>
        </div>
        <div class="results-panel">
            <div class="results-header"><span class="results-title">审查结果</span><div class="results-stats" id="stats">
                <span class="stat"><span class="stat-dot error"></span><span id="errorCount">0</span></span>
                <span class="stat"><span class="stat-dot warning"></span><span id="warningCount">0</span></span>
                <span class="stat"><span class="stat-dot info"></span><span id="infoCount">0</span></span></div></div>
            <div class="loading" id="loading"><div class="spinner"></div><span>AI 正在分析代码...</span></div>
            <div class="results-content" id="resultsContent">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🔍</div>
                    <p style="font-size:14px;margin-bottom:16px;">CodeGuard AI 演示</p>
                    <p style="font-size:12px;margin-bottom:16px;">点击"开始审查"分析上方代码<br>或选择一个示例代码体验</p>
                    <div class="sample-btns">
                        <button class="sample-btn" onclick="loadSample('bug')">🐛 Bug 示例</button>
                        <button class="sample-btn" onclick="loadSample('security')">🔒 安全漏洞</button>
                        <button class="sample-btn" onclick="loadSample('performance')">⚡ 性能问题</button>
                        <button class="sample-btn" onclick="loadSample('good')">✅ 良好代码</button>
                    </div>
                </div>
                <div id="issuesList"></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast" style="display:none;"><span>✅</span><span id="toastMsg">分析完成</span></div>
    <script>
        const sampleCodes = {
            bug: `// Promise 未等待 + 闭包陷阱 + 空值校验缺失
async function getUserData(userId) {
    const response = await fetch('/api/user/' + userId);
    const data = response.json(); // 缺少 await
    return data;
}

function processOrder(order) {
    if (order.status === 'pending') { // 缺少 order 空值判断
        order.items.forEach(item => { item.price *= 1.1; });
    }
}

for (var i = 0; i < 5; i++) { // 使用 var 导致闭包问题
    setTimeout(() => { console.log(i); }, i * 100);
}`,
            security: `// SQL 注入 + XSS + 敏感信息硬编码
function search(query) {
    const sql = "SELECT * FROM products WHERE name LIKE '%" + query + "%'"; // SQL 注入
    db.execute(sql);
}

function renderComment(text) {
    document.getElementById('comments').innerHTML = text; // XSS 漏洞
}

const SECRET_KEY = 'sk-1234567890abcdef'; // 硬编码密钥`,
            performance: `// N+1 查询 + 内存泄漏 + 重复渲染
async function loadUsers(userIds) {
    const users = [];
    for (const id of userIds) { // N+1 查询
        users.push(await db.query('SELECT * FROM users WHERE id = ?', id));
    }
    return users;
}

const cache = {}; // 无上限缓存
function getCache(key) { cache[key] = cache[key] || expensiveOperation(); return cache[key]; }

function renderList(items) {
    const container = document.getElementById('list');
    container.innerHTML = '';
    items.forEach(item => {
        const div = document.createElement('div');
        div.innerHTML = item.name;
        div.onclick = () => handleClick(item); // 每次重新绑定
        container.appendChild(div);
    });
}`,
            good: `// 良好实践代码示例
async function getUserData(userId) {
    if (!userId) throw new Error('userId is required');
    const response = await fetch(\`/api/user/\${userId}\`);
    if (!response.ok) throw new Error(\`HTTP \${response.status}\`);
    return await response.json();
}

function debounce(fn, delay) {
    let timer = null;
    return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}

const MAX_CACHE_SIZE = 100;
const cache = new Map();
function getCached(key, factory) {
    if (cache.has(key)) return cache.get(key);
    const value = factory();
    if (cache.size >= MAX_CACHE_SIZE) cache.delete(cache.keys().next().value);
    cache.set(key, value);
    return value;
}`
        };

        const rules = {
            invalidCode: {
                type: 'info',
                severity: '提示',
                name: '无效代码输入',
                description: '输入内容不是有效的 JavaScript/TypeScript 代码，请检查输入。',
                fix: '请输入有效的代码进行审查。'
            },
            syntaxError: {
                type: 'error',
                severity: '高危',
                name: '语法错误',
                description: '代码存在语法错误，请修复后再进行审查。',
                fix: '检查括号配对、分号、关键字拼写等语法问题。'
            },
            promiseWithoutAwait: {
                pattern: /(^|[^\w])response\.(json|text|blob)\(\)/,
                exclude: /await\s+response\.(json|text|blob)\(\)/,
                type: 'error',
                severity: '高危',
                name: 'Promise 未等待',
                description: 'fetch() 返回的是 Promise，需要使用 await 等待结果。直接调用 .json() 会在数据就绪前执行。',
                fix: 'async function getData() {\n    const response = await fetch(url);\n    const data = await response.json(); // 添加 await\n    return data;\n}'
            },
            closureTrap: {
                pattern: /for\s*\(\s*var\s+\w+\s*=\s*0/,
                type: 'error',
                severity: '高危',
                name: '循环闭包陷阱',
                description: '使用 var 声明的变量在异步回调中会产生闭包问题，所有回调共享最终值。',
                fix: 'for (let i = 0; i < arr.length; i++) { // 使用 let 替代 var\n    setTimeout(() => console.log(i), 100);\n}'
            },
            sqlInjection: {
                pattern: /sql\s*=\s*["'].*\+\s*\w+\s*\+.*["']/i,
                type: 'error',
                severity: '高危',
                name: 'SQL 注入漏洞',
                description: '直接拼接用户输入到 SQL 查询中，攻击者可注入恶意 SQL 语句。',
                fix: 'const sql = "SELECT * FROM users WHERE id = ?";\ndb.execute(sql, [userId]); // 使用参数化查询'
            },
            xssVulnerability: {
                pattern: /innerHTML\s*=\s*\w+\./,
                type: 'error',
                severity: '高危',
                name: 'XSS 跨站脚本漏洞',
                description: '使用 innerHTML 直接插入用户输入，可能导致脚本注入攻击。',
                fix: 'element.textContent = userInput; // 使用 textContent\n// 或使用模板引擎自动转义'
            },
            hardcodedSecret: {
                pattern: /(SECRET|API_KEY|TOKEN|PASSWORD)\s*=\s*['"][a-zA-Z0-9_-]{10,}['"]/,
                type: 'error',
                severity: '高危',
                name: '敏感信息硬编码',
                description: 'API 密钥或密码硬编码在代码中，存在安全泄露风险。',
                fix: 'const API_KEY = process.env.API_KEY; // 使用环境变量\n// 或使用密钥管理服务'
            },
            nPlusOneQuery: {
                pattern: /for\s*\([^)]+\)\s*\{[\s\S]*await\s+\w+\.query\(/,
                type: 'error',
                severity: '高危',
                name: 'N+1 查询问题',
                description: '在循环中执行数据库查询会导致严重性能问题。',
                fix: 'const ids = [1, 2, 3];\nconst users = await db.query(\n    `SELECT * FROM users WHERE id IN (${ids.map(() => "?").join(",")})`,\n    ids\n);'
            },
            noNullCheck: {
                pattern: /if\s*\(\s*(\w+)\s*\.\s*\w+\s*===/,
                type: 'warning',
                severity: '中危',
                name: '缺少空值校验',
                description: '直接访问对象属性前未检查对象是否为 null/undefined。',
                fix: 'if (obj && obj.property === value) {\n    // 先检查 obj 是否存在\n}'
            },
            noDefaultCase: {
                check: (code) => {
                    const hasSwitch = /switch\s*\([^)]+\)\s*\{/.test(code);
                    const hasDefault = /default\s*[:]/.test(code);
                    return hasSwitch && !hasDefault;
                },
                type: 'warning',
                severity: '中危',
                name: 'switch 缺少 default 分支',
                description: '状态处理缺少 default 分支，可能导致未处理的边缘情况。',
                fix: 'switch (status) {\n    case "pending": break;\n    case "done": break;\n    default: // 添加 default 处理\n        throw new Error("Unknown status");\n}'
            },
            unboundedCache: {
                pattern: /const\s+cache\s*=\s*\{/,
                type: 'warning',
                severity: '中危',
                name: '缓存无上限',
                description: '普通对象作为缓存没有大小限制，可能导致内存泄漏。',
                fix: 'const cache = new Map();\nconst MAX_SIZE = 100;\n// 达到上限时移除最早的条目'
            }
        };

        function isCodeValid(code) {
            code = code.trim();
            if (!code) return false;
            if (/^[\s\w\u4e00-\u9fa5]+$/.test(code) && !/[{}();=+\-*/<>[\]]/.test(code)) return false;
            try { new Function(code); return true; }
            catch { return false; }
        }

        function detectIssues(code) {
            const detected = [];
            for (const [ruleName, rule] of Object.entries(rules)) {
                if (ruleName === 'invalidCode' || ruleName === 'syntaxError') continue;
                
                let shouldAdd = false;
                
                if (rule.check) {
                    shouldAdd = rule.check(code);
                } else if (rule.pattern) {
                    const match = code.match(rule.pattern);
                    shouldAdd = (match && !rule.invert) || (!match && rule.invert);
                    
                    if (shouldAdd && rule.exclude) {
                        if (code.match(rule.exclude)) {
                            shouldAdd = false;
                        }
                    }
                }
                
                if (shouldAdd) {
                    detected.push({ ...rule, ruleName, location: '自动检测' });
                }
            }
            return detected;
        }

        function loadSample(type) { document.getElementById('codeInput').value = sampleCodes[type]; showToast('示例代码已加载'); }

        function clearCode() {
            document.getElementById('codeInput').value = '';
            document.getElementById('issuesList').innerHTML = '';
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('errorCount').textContent = '0';
            document.getElementById('warningCount').textContent = '0';
            document.getElementById('infoCount').textContent = '0';
        }

        function analyzeCode() {
            const code = document.getElementById('codeInput').value.trim();
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('emptyState');
            const issuesList = document.getElementById('issuesList');

            loading.classList.add('show');
            emptyState.style.display = 'none';
            issuesList.innerHTML = '';

            setTimeout(() => {
                loading.classList.remove('show');
                let detectedIssues = [];

                if (!code) {
                    detectedIssues = [{ ...rules.invalidCode, location: '整段代码' }];
                } else if (!isCodeValid(code)) {
                    detectedIssues = [{ ...rules.syntaxError, location: '整段代码' }];
                } else {
                    detectedIssues = detectIssues(code);
                }

                const errorCount = detectedIssues.filter(i => i.type === 'error').length;
                const warningCount = detectedIssues.filter(i => i.type === 'warning').length;
                const infoCount = detectedIssues.filter(i => i.type === 'info').length;
                document.getElementById('errorCount').textContent = errorCount;
                document.getElementById('warningCount').textContent = warningCount;
                document.getElementById('infoCount').textContent = infoCount;

                if (detectedIssues.length === 0) {
                    issuesList.innerHTML = `
                        <div class="analysis-summary">
                            <strong>📊 分析摘要：</strong>代码结构良好，未检测到明显的 Bug、安全漏洞或性能问题。
                        </div>
                        <div class="empty-state">
                            <div class="empty-icon" style="font-size:36px;">✅</div>
                            <p style="font-size:14px;color:#00ff88;">代码审查通过！</p>
                            <p style="font-size:12px;margin-top:8px;">建议继续保持良好的编码习惯</p>
                        </div>`;
                    showToast('代码审查通过');
                } else {
                    issuesList.innerHTML = `
                        <div class="analysis-summary">
                            <strong>📊 分析摘要：</strong>检测到 ${detectedIssues.length} 个问题（${errorCount} 个错误，${warningCount} 个警告，${infoCount} 个提示）。
                        </div>`;
                    detectedIssues.forEach((issue, index) => {
                        const card = document.createElement('div');
                        card.className = 'issue-card ' + issue.type;
                        card.innerHTML = `
                            <div class="issue-header" onclick="toggleIssue(${index})">
                                <div class="issue-title">
                                    <span class="issue-icon">${issue.type === 'error' ? '❌' : issue.type === 'warning' ? '⚠️' : 'ℹ️'}</span>
                                    <span class="issue-name">${issue.name}</span>
                                </div>
                                <span class="issue-severity">${issue.severity}</span>
                            </div>
                            <div class="issue-body" id="issue-${index}">
                                <div class="issue-location">📍 ${issue.location}</div>
                                <div class="issue-description">${issue.description}</div>
                                <div class="fix-section">
                                    <div class="fix-title">✨ 修复建议</div>
                                    <div class="fix-code">${issue.fix}</div>
                                </div>
                            </div>`;
                        issuesList.appendChild(card);
                    });
                    showToast(`发现 ${detectedIssues.length} 个问题`);
                }
            }, 1500);
        }

        function toggleIssue(index) { document.getElementById('issue-' + index).classList.toggle('show'); }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
