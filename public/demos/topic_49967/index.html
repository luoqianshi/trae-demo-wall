<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>拾光 · 小确幸手账</title>
    <base href="/" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="css/themes.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
                   background: linear-gradient(145deg,#fdf6ec,#fce4d6,#f5d9e0,#e8d4e8); color: #7d5a6f;
                   font-family: Georgia, serif; z-index: 9999; }
        #loading .spin { width: 40px; height: 40px; border: 3px solid rgba(212,165,116,0.3);
                         border-top-color: #d4a574; border-radius: 50%; animation: sp 1s linear infinite; margin: 0 auto; }
        @keyframes sp { to { transform: rotate(360deg); } }
        #blazor-error-ui { background: #fff; color: #333; padding: 12px; }
    </style>
</head>
<body>
    <div id="loading"><div style="text-align:center"><div class="spin"></div><p style="margin-top:12px">拾光加载中…</p></div></div>
    <div id="app">Loading...</div>
    <div id="blazor-error-ui" style="display:none">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        // 拾光 本地存储抽象层：必须在 Blazor 启动前就绪，故 inline 定义
        // 避免冷启动时外部 storage.js 未加载导致 shiguangStorage undefined
        window.shiguangStorage = {
            getItem: function (key) { return localStorage.getItem(key); },
            setItem: function (key, value) { localStorage.setItem(key, value); },
            removeItem: function (key) { localStorage.removeItem(key); },
            estimateBytes: function () {
                var total = 0;
                for (var i = 0; i < localStorage.length; i++) {
                    var k = localStorage.key(i);
                    if (k && k.indexOf("shiguang:") === 0) {
                        total += (k.length + (localStorage.getItem(k) || "").length) * 2;
                    }
                }
                return total;
            },
            getAllShiguang: function () {
                var result = {};
                for (var i = 0; i < localStorage.length; i++) {
                    var k = localStorage.key(i);
                    if (k && k.indexOf("shiguang:") === 0) result[k] = localStorage.getItem(k);
                }
                return result;
            }
        };
    </script>
    <script src="js/storage.js"></script>
    <script src="js/online.js"></script>
    <script>
        // 开发阶段不注册 Service Worker，避免缓存干扰；发布时启用
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
                regs.forEach(function (r) { r.unregister(); });
            });
        }
        // 拾光：通用工具方法
        window.shiguang = {
            // 下载文本文件（替代 eval，更安全高效）
            downloadText: function (text, fileName, mime) {
                var blob = new Blob([text], { type: mime || 'text/plain' });
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
