{% extends "base.html" %}
{% block title %}智能流水线 - TimeForge X{% endblock %}

{% block content %}

<!-- 页面标题 -->
<div class="page-header">
    <h1 class="page-title">
        <span class="gradient-text">智能流水线模式</span>
    </h1>
    <p class="page-subtitle">选择一种模式，AI自动完成全流程规划</p>
</div>

<!-- 模式选择区域 -->
<div class="card mb-4">
    <div class="card-header">
        <span><i class="bi bi-diagram-3 me-2"></i>选择流水线模式</span>
    </div>
    <div class="card-body">
        <div class="row g-3" id="pipelineModeCards">
            <!-- 动态加载 -->
        </div>
    </div>
</div>

<!-- 输入区域 -->
<div class="card mb-4" id="inputSection" style="display: none;">
    <div class="card-header">
        <span><i class="bi bi-pencil-square me-2"></i>输入项目信息</span>
    </div>
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-lg-8">
                <label class="form-label" for="pipelineInput">你的目标 / 项目名称</label>
                <input type="text" class="form-control" id="pipelineInput"
                       placeholder="例如：基于深度学习的图像识别论文、全国大学生数学建模竞赛..." />
            </div>
            <div class="col-lg-4">
                <button class="btn btn-primary w-100" id="startPipelineBtn" onclick="executePipeline()">
                    <i class="bi bi-play-fill me-2"></i>开始规划
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 加载状态 -->
<div class="text-center py-5" id="pipelineLoading" style="display: none;">
    <div class="loading-spinner mb-3"></div>
    <p class="text-muted">AI正在规划您的流水线，请稍候...</p>
</div>

<!-- 结果展示区 -->
<div id="pipelineResults" style="display: none;">
    <!-- 进度条 -->
    <div class="card mb-4">
        <div class="card-header">
            <span><i class="bi bi-bar-chart-steps me-2"></i>流水线总进度</span>
        </div>
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="text-muted">整体完成度</span>
                <span class="fw-bold" id="overallProgressText">0%</span>
            </div>
            <div class="progress" style="height: 16px;">
                <div class="progress-bar" id="overallProgressBar" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <!-- 阶段卡片 -->
    <h5 class="mb-3"><i class="bi bi-stack me-2"></i>阶段详情</h5>
    <div id="phaseCards">
        <!-- 动态加载 -->
    </div>

    <!-- 总结卡片 -->
    <div class="card mb-4">
        <div class="card-header">
            <span><i class="bi bi-clipboard-data me-2"></i>流水线总结</span>
        </div>
        <div class="card-body">
            <div class="row g-4" id="pipelineSummary">
                <!-- 动态加载 -->
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_scripts %}

<script>
// ============================================================
// 智能流水线 - 主逻辑
// ============================================================
const BASE_URL = window.location.origin;
let selectedMode = null;
let pipelineModes = [];

document.addEventListener('DOMContentLoaded', function() {
    loadPipelineModes();
});

// --- 加载流水线模式列表 ---
async function loadPipelineModes() {
    try {
        const resp = await fetch(BASE_URL + '/api/pipeline/modes');
        const data = await resp.json();
        if (data && data.success && data.modes) {
            pipelineModes = data.modes;
            renderModeCards(pipelineModes);
        } else {
            // 使用默认模式
            pipelineModes = getDefaultModes();
            renderModeCards(pipelineModes);
        }
    } catch (err) {
        console.error('加载流水线模式失败:', err);
        pipelineModes = getDefaultModes();
        renderModeCards(pipelineModes);
    }
}

// --- 默认流水线模式数据 ---
function getDefaultModes() {
    return [
        {
            id: 'paper',
            name: '论文模式',
            icon: '📄',
            desc: '学术论文全流程辅助',
            stages: ['需求分析', '文献调研', '方案制定', '实验设计', '数据分析', '论文撰写', '修改润色', '最终定稿']
        },
        {
            id: 'course_design',
            name: '课程设计模式',
            icon: '💻',
            desc: '课程设计项目全流程',
            stages: ['需求分析', '技术选型', '系统设计', '编码实现', '测试调试', '文档撰写', '演示准备', '提交答辩']
        },
        {
            id: 'competition',
            name: '竞赛模式',
            icon: '🏆',
            desc: '学科竞赛备战全流程',
            stages: ['赛题分析', '知识储备', '方案设计', '模型构建', '实验验证', '结果优化', '报告撰写', '答辩准备']
        },
        {
            id: 'postgraduate',
            name: '考研模式',
            icon: '🎓',
            desc: '考研备考全流程规划',
            stages: ['目标定位', '资料收集', '基础复习', '强化训练', '真题演练', '查漏补缺', '模拟冲刺', '考前准备']
        },
        {
            id: 'startup',
            name: '创业模式',
            icon: '🚀',
            desc: '创业项目全流程指导',
            stages: ['市场调研', '商业计划', '团队组建', '产品开发', '测试验证', '营销推广', '融资对接', '正式运营']
        }
    ];
}

// --- 渲染模式选择卡片 ---
function renderModeCards(modes) {
    const container = document.getElementById('pipelineModeCards');
    if (!container) return;

    container.innerHTML = modes.map((mode, idx) => `
        <div class="col-md-4 col-lg">
            <div class="pipeline-mode-card" data-mode-id="${mode.id}" onclick="selectMode('${mode.id}')">
                <span class="mode-icon">${escapeHtml(mode.icon)}</span>
                <div class="mode-name">${escapeHtml(mode.name)}</div>
                <div class="mode-desc">${escapeHtml(mode.desc)}</div>
                <div class="mode-stages">
                    ${(mode.stages || []).map(s => `<span class="stage-badge">${escapeHtml(s)}</span>`).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

// --- 选择模式 ---
function selectMode(modeId) {
    selectedMode = modeId;

    // 更新选中样式
    document.querySelectorAll('.pipeline-mode-card').forEach(card => {
        card.classList.toggle('selected', card.dataset.modeId === modeId);
    });

    // 显示输入区域
    const inputSection = document.getElementById('inputSection');
    if (inputSection) {
        inputSection.style.display = 'block';
        inputSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 聚焦输入框
    setTimeout(() => {
        const input = document.getElementById('pipelineInput');
        if (input) input.focus();
    }, 300);
}

// --- 执行流水线规划 ---
async function executePipeline() {
    const input = document.getElementById('pipelineInput');
    const projectName = input ? input.value.trim() : '';

    if (!selectedMode) {
        showToast('请先选择一种流水线模式', 'warning');
        return;
    }
    if (!projectName) {
        showToast('请输入你的目标或项目名称', 'warning');
        return;
    }

    // 显示加载状态
    const loadingEl = document.getElementById('pipelineLoading');
    const resultsEl = document.getElementById('pipelineResults');
    if (loadingEl) loadingEl.style.display = 'block';
    if (resultsEl) resultsEl.style.display = 'none';

    try {
        const resp = await fetch(BASE_URL + '/api/pipeline/execute', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                mode: selectedMode,
                project_name: projectName
            })
        });
        const data = await resp.json();

        if (loadingEl) loadingEl.style.display = 'none';

        if (data && data.success) {
            renderPipelineResults(data);
        } else {
            // 使用模拟数据展示
            renderPipelineResults(getMockPipelineResult(selectedMode, projectName));
            showToast('使用模拟数据展示（后端API未返回数据）', 'info');
        }
    } catch (err) {
        console.error('执行流水线规划失败:', err);
        if (loadingEl) loadingEl.style.display = 'none';
        // 使用模拟数据
        renderPipelineResults(getMockPipelineResult(selectedMode, projectName));
        showToast('使用模拟数据展示（后端API暂不可用）', 'info');
    }
}

// --- 渲染流水线结果 ---
function renderPipelineResults(data) {
    const resultsEl = document.getElementById('pipelineResults');
    if (!resultsEl) return;
    resultsEl.style.display = 'block';
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const phases = data.phases || [];
    const totalDays = data.total_days || phases.reduce((sum, p) => sum + (p.estimated_days || 0), 0);
    const totalWeeks = (totalDays / 7).toFixed(1);
    const suggestion = data.suggestion || '建议按照流水线顺序逐步推进，每个阶段完成后再进入下一阶段，确保每个环节质量。';

    // 更新进度条
    const progress = data.overall_progress || 0;
    document.getElementById('overallProgressText').textContent = progress + '%';
    document.getElementById('overallProgressBar').style.width = progress + '%';

    // 渲染阶段卡片
    renderPhaseCards(phases);

    // 渲染总结
    renderSummary(phases.length, totalDays, totalWeeks, suggestion);
}

// --- 渲染阶段卡片 ---
function renderPhaseCards(phases) {
    const container = document.getElementById('phaseCards');
    if (!container) return;

    const agentColors = [
        'agent-time', 'agent-learn', 'agent-exam', 'agent-career',
        'agent-psych', 'agent-efficiency', 'agent-creative', 'agent-time'
    ];

    container.innerHTML = phases.map((phase, idx) => {
        const agentClass = agentColors[idx % agentColors.length];
        const agentName = phase.agent_name || 'AI智能体';
        const agentInitial = (agentName || 'AI').charAt(0).toUpperCase();
        return `
            <div class="phase-detail-card">
                <div class="phase-header">
                    <div class="phase-number-badge">${idx + 1}</div>
                    <div class="phase-info">
                        <div class="phase-name">${escapeHtml(phase.name || '阶段 ' + (idx + 1))}</div>
                        <div class="phase-days">
                            <i class="bi bi-clock me-1"></i>预计 ${phase.estimated_days || 0} 天
                        </div>
                    </div>
                </div>
                <div class="phase-agent">
                    <div class="agent-avatar agent-sm ${agentClass}">${agentInitial}</div>
                    <div>
                        <div style="font-weight: 600; font-size: 14px; color: var(--color-text);">${escapeHtml(agentName)}</div>
                        <div style="font-size: 12px; color: var(--color-text-muted);">负责阶段</div>
                    </div>
                </div>
                <div class="phase-content-text">
                    ${escapeHtml(phase.content || phase.description || 'AI将根据您输入的项目信息，自动分析并生成该阶段的详细执行计划。')}
                </div>
            </div>
        `;
    }).join('');
}

// --- 渲染总结 ---
function renderSummary(totalPhases, totalDays, totalWeeks, suggestion) {
    const container = document.getElementById('pipelineSummary');
    if (!container) return;

    container.innerHTML = `
        <div class="col-md-4">
            <div class="summary-item">
                <div class="summary-value">${totalPhases}</div>
                <div class="summary-label">总阶段数</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="summary-item">
                <div class="summary-value">${totalDays}<span style="font-size: 16px;">天</span></div>
                <div class="summary-label">预计总天数 / 约 ${totalWeeks} 周</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="summary-item">
                <div style="font-size: 14px; font-weight: 600; color: var(--color-text); margin-bottom: 8px;">
                    <i class="bi bi-lightbulb me-1" style="color: var(--color-warning);"></i>建议
                </div>
                <div class="summary-suggestion">${escapeHtml(suggestion)}</div>
            </div>
        </div>
    `;
}

// --- 模拟流水线结果 ---

                { name: '文献调研', estimated_days: 5, agent_name: '学习导师', content: '系统检索相关领域文献，使用知网、Google Scholar、Web of Science等数据库，整理文献综述，识别研究空白和创新点。' },

// --- 工具函数 ---
function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
}

// 使用全局 showToast（来自 base.html / dashboard.js）
function showToast(message, type, duration) {
    if (typeof window._showToast === 'function') {
        window._showToast(message, type, duration);
    } else if (typeof window.showToast === 'function') {
        window.showToast(message, type, duration);
    } else {
        // fallback
        const container = document.getElementById('toastContainer');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = 'toast-custom ' + (type || 'info');
        toast.innerHTML = '<div class="d-flex align-items-center justify-content-between"><span>' + message + '</span><button class="btn-close btn-close-white ms-3" style="font-size:10px;" onclick="this.parentElement.parentElement.remove()"></button></div>';
        container.appendChild(toast);
        setTimeout(function() {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(function() { toast.remove(); }, 300);
        }, duration || 3000);
    }
}
