{% extends "base.html" %}
{% block title %}注册 - TimeForge X{% endblock %}

{% block extra_head %}
<style>
/* ============================================================
   注册页专属样式 - 隐藏侧边栏，全屏居中布局
   ============================================================ */
.sidebar { display: none !important; }
.sidebar-backdrop { display: none !important; }
.main-wrapper { margin-left: 0 !important; }
.topbar { display: none !important; }
.content-area {
    padding: 0 !important;
    min-height: 100vh !important;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 注册页容器 */
.auth-wrapper {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0B1120 100%);
    position: relative;
    overflow: hidden;
}

/* 背景装饰 */
.auth-wrapper::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(16, 185, 129, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
    animation: bgFloat 15s ease-in-out infinite;
    z-index: 0;
}

@keyframes bgFloat {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(30px, -30px); }
    66% { transform: translate(-20px, 20px); }
}

/* 玻璃拟态卡片 */
.auth-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 20px;
    padding: 36px 36px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(99, 102, 241, 0.08);
    margin: 20px;
}

/* Logo区域 */
.auth-logo {
    text-align: center;
    margin-bottom: 28px;
}
.auth-logo .logo-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
}
.auth-logo h2 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--color-primary-light), var(--color-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0;
}
.auth-logo p {
    color: var(--color-text-muted);
    font-size: 13px;
    margin-top: 4px;
}

/* 注册方式切换 */
.register-type-tabs {
    display: flex;
    background: var(--bg-primary);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
}
.register-type-tab {
    flex: 1;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--color-text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
}
.register-type-tab.active {
    background: var(--color-primary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
}
.register-type-tab:hover:not(.active) {
    color: var(--color-text);
    background: rgba(99, 102, 241, 0.1);
}

/* 表单样式 */
.auth-form .form-group {
    margin-bottom: 16px;
}
.auth-form .form-group label {
    display: block;
    color: var(--color-text-muted);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
}
.auth-form .input-group {
    position: relative;
    display: flex;
    align-items: center;
}
.auth-form .input-group .input-icon {
    position: absolute;
    left: 14px;
    color: var(--color-text-dim);
    font-size: 16px;
    z-index: 2;
    pointer-events: none;
}
.auth-form .form-control {
    width: 100%;
    padding: 12px 14px 12px 42px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.6);
    border-radius: 10px;
    color: var(--color-text);
    font-size: 14px;
    transition: all 0.3s ease;
}
.auth-form .form-control:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    background: rgba(15, 23, 42, 0.8);
}
.auth-form .form-control::placeholder {
    color: var(--color-text-dim);
}
.auth-form .form-control.error {
    border-color: var(--color-danger);
}
.auth-form .error-msg {
    color: var(--color-danger);
    font-size: 11px;
    margin-top: 4px;
    display: none;
}

/* 密码强度指示器 */
.password-strength {
    margin-top: 6px;
}
.password-strength .strength-bar {
    height: 4px;
    border-radius: 2px;
    transition: all 0.3s ease;
    background: var(--color-border);
    margin-top: 4px;
}
.password-strength .strength-bar.weak { background: var(--color-danger); width: 33%; }
.password-strength .strength-bar.medium { background: var(--color-warning); width: 66%; }
.password-strength .strength-bar.strong { background: var(--color-secondary); width: 100%; }
.password-strength .strength-text {
    font-size: 11px;
    margin-top: 2px;
}
.password-strength .strength-text.weak { color: var(--color-danger); }
.password-strength .strength-text.medium { color: var(--color-warning); }
.password-strength .strength-text.strong { color: var(--color-secondary); }

/* 协议复选框 */
.agreement-group {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--color-text-muted);
}
.agreement-group input[type="checkbox"] {
    accent-color: var(--color-primary);
    margin-top: 2px;
    cursor: pointer;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
}
.agreement-group a {
    color: var(--color-primary-light);
    text-decoration: none;
}
.agreement-group a:hover {
    color: var(--color-primary);
}
.agreement-error {
    color: var(--color-danger);
    font-size: 11px;
    margin-top: 4px;
    display: none;
}

/* 注册按钮 */
.btn-register {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}
.btn-register:hover {
    background: linear-gradient(135deg, var(--color-primary-light), #34D399);
    box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
    transform: translateY(-1px);
}
.btn-register:active {
    transform: translateY(0);
}
.btn-register:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}
.btn-register .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
}
.btn-register.loading .spinner {
    display: inline-block;
}
.btn-register.loading .btn-text {
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* 底部链接 */
.auth-footer {
    text-align: center;
    margin-top: 24px;
    color: var(--color-text-muted);
    font-size: 13px;
}
.auth-footer a {
    color: var(--color-primary-light);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s;
}
.auth-footer a:hover {
    color: var(--color-primary);
}

/* 响应式 */
@media (max-width: 480px) {
    .auth-card {
        padding: 24px 18px;
        margin: 12px;
        border-radius: 16px;
    }
    .auth-logo .logo-icon {
        width: 42px;
        height: 42px;
        font-size: 20px;
    }
    .auth-logo h2 {
        font-size: 20px;
    }
    .register-type-tab {
        font-size: 12px;
        padding: 6px 8px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">TF</div>
            <h2>创建账号</h2>
            <p>加入 TimeForge X，开启AI人生规划之旅</p>
        </div>

        <!-- 注册方式切换 -->
        <div class="register-type-tabs" id="registerTypeTabs">
            <button class="register-type-tab active" data-type="username">用户名注册</button>
            <button class="register-type-tab" data-type="email">邮箱注册</button>
            <button class="register-type-tab" data-type="phone">手机号注册</button>
        </div>

        <!-- 注册表单 -->
        <form class="auth-form" id="registerForm" novalidate>
            <!-- 用户名输入 (用户名模式显示) -->
            <div class="form-group" id="regUsernameGroup">
                <label>用户名</label>
                <div class="input-group">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" class="form-control" id="regUsername" placeholder="3-20位，支持中英文数字下划线" autocomplete="username">
                </div>
                <div class="error-msg" id="regUsernameError"></div>
            </div>

            <!-- 邮箱输入 -->
            <div class="form-group" id="regEmailGroup" style="display: none;">
                <label>邮箱</label>
                <div class="input-group">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" class="form-control" id="regEmail" placeholder="请输入邮箱地址" autocomplete="email">
                </div>
                <div class="error-msg" id="regEmailError"></div>
            </div>

            <!-- 手机号输入 -->
            <div class="form-group" id="regPhoneGroup" style="display: none;">
                <label>手机号</label>
                <div class="input-group">
                    <i class="bi bi-phone input-icon"></i>
                    <input type="tel" class="form-control" id="regPhone" placeholder="请输入手机号" autocomplete="tel">
                </div>
                <div class="error-msg" id="regPhoneError"></div>
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label>密码</label>
                <div class="input-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" class="form-control" id="regPassword" placeholder="至少6位密码" autocomplete="new-password">
                    <i class="bi bi-eye-slash input-icon" id="toggleRegPassword" style="left: auto; right: 14px; cursor: pointer; pointer-events: auto;"></i>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar" id="strengthBar"></div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
                <div class="error-msg" id="regPasswordError"></div>
            </div>

            <!-- 确认密码 -->
            <div class="form-group">
                <label>确认密码</label>
                <div class="input-group">
                    <i class="bi bi-lock-fill input-icon"></i>
                    <input type="password" class="form-control" id="regConfirmPassword" placeholder="请再次输入密码" autocomplete="new-password">
                    <i class="bi bi-eye-slash input-icon" id="toggleRegConfirm" style="left: auto; right: 14px; cursor: pointer; pointer-events: auto;"></i>
                </div>
                <div class="error-msg" id="regConfirmError"></div>
            </div>

            <!-- 同意协议 -->
            <div class="agreement-group">
                <input type="checkbox" id="agreeTerms">
                <div>
                    我已阅读并同意
                    <a href="javascript:void(0)" onclick="showToast('用户协议页面开发中', 'info')">《用户协议》</a>
                    和
                    <a href="javascript:void(0)" onclick="showToast('隐私政策页面开发中', 'info')">《隐私政策》</a>
                </div>
            </div>
            <div class="error-msg" id="agreeError" style="margin-top: -12px; margin-bottom: 16px;">请先同意用户协议和隐私政策</div>

            <!-- 注册按钮 -->
            <button type="submit" class="btn-register" id="registerBtn">
                <span class="spinner"></span>
                <span class="btn-text">注 册</span>
            </button>
        </form>

        <!-- 底部 -->
        <div class="auth-footer">
            已有账号？<a href="/login">立即登录</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// ============================================================
// 注册页逻辑
// ============================================================
const BASE_URL = window.location.origin;
let currentRegisterType = 'username';

document.addEventListener('DOMContentLoaded', function() {
    initRegisterTabs();
    initPasswordToggles();
    initPasswordStrength();
    initFormSubmit();
});

// ============================================================
// 注册方式切换
// ============================================================
function initRegisterTabs() {
    const tabs = document.querySelectorAll('#registerTypeTabs .register-type-tab');
    tabs.forEach(tab => {
        tab.addEventListener('click', function() {
            tabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentRegisterType = this.dataset.type;
            switchRegisterType(currentRegisterType);
        });
    });
}

function switchRegisterType(type) {
    const usernameGroup = document.getElementById('regUsernameGroup');
    const emailGroup = document.getElementById('regEmailGroup');
    const phoneGroup = document.getElementById('regPhoneGroup');

    usernameGroup.style.display = 'none';
    emailGroup.style.display = 'none';
    phoneGroup.style.display = 'none';

    if (type === 'username') {
        usernameGroup.style.display = 'block';
    } else if (type === 'email') {
        emailGroup.style.display = 'block';
    } else {
        phoneGroup.style.display = 'block';
    }

    clearErrors();
}

// ============================================================
// 密码显示切换
// ============================================================
function initPasswordToggles() {
    setupPasswordToggle('toggleRegPassword', 'regPassword');
    setupPasswordToggle('toggleRegConfirm', 'regConfirmPassword');
}

function setupPasswordToggle(toggleId, inputId) {
    const toggleBtn = document.getElementById(toggleId);
    const input = document.getElementById(inputId);
    if (!toggleBtn || !input) return;

    toggleBtn.addEventListener('click', function() {
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        this.className = isPassword ? 'bi bi-eye input-icon' : 'bi bi-eye-slash input-icon';
        this.style.left = 'auto';
        this.style.right = '14px';
        this.style.cursor = 'pointer';
        this.style.pointerEvents = 'auto';
    });
}

// ============================================================
// 密码强度检测
// ============================================================
function initPasswordStrength() {
    const passwordInput = document.getElementById('regPassword');
    if (!passwordInput) return;

    passwordInput.addEventListener('input', function() {
        const password = this.value;
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        if (!password) {
            strengthBar.className = 'strength-bar';
            strengthText.textContent = '';
            strengthText.className = 'strength-text';
            return;
        }

        let strength = 0;
        // 长度
        if (password.length >= 6) strength += 1;
        if (password.length >= 10) strength += 1;
        // 包含数字
        if (/\d/.test(password)) strength += 1;
        // 包含小写字母
        if (/[a-z]/.test(password)) strength += 1;
        // 包含大写字母
        if (/[A-Z]/.test(password)) strength += 1;
        // 包含特殊字符
        if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength += 1;

        if (strength <= 2) {
            strengthBar.className = 'strength-bar weak';
            strengthText.textContent = '弱 - 建议增加长度和复杂度';
            strengthText.className = 'strength-text weak';
        } else if (strength <= 4) {
            strengthBar.className = 'strength-bar medium';
            strengthText.textContent = '中等 - 还可以更强';
            strengthText.className = 'strength-text medium';
        } else {
            strengthBar.className = 'strength-bar strong';
            strengthText.textContent = '强 - 密码强度优秀';
            strengthText.className = 'strength-text strong';
        }
    });
}

// ============================================================
// 表单验证
// ============================================================
function validateRegisterForm() {
    let isValid = true;
    clearErrors();

    // 验证账号
    if (currentRegisterType === 'username') {
        const username = document.getElementById('regUsername').value.trim();
        const usernameRegex = /^[\w\u4e00-\u9fa5]{3,20}$/;
        if (!username) {
            showError('regUsernameError', '请输入用户名');
            isValid = false;
        } else if (!usernameRegex.test(username)) {
            showError('regUsernameError', '用户名3-20位，支持中英文数字下划线');
            isValid = false;
        }
    } else if (currentRegisterType === 'email') {
        const email = document.getElementById('regEmail').value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) {
            showError('regEmailError', '请输入邮箱');
            isValid = false;
        } else if (!emailRegex.test(email)) {
            showError('regEmailError', '邮箱格式不正确');
            isValid = false;
        }
    } else if (currentRegisterType === 'phone') {
        const phone = document.getElementById('regPhone').value.trim();
        const phoneRegex = /^1[3-9]\d{9}$/;
        if (!phone) {
            showError('regPhoneError', '请输入手机号');
            isValid = false;
        } else if (!phoneRegex.test(phone)) {
            showError('regPhoneError', '手机号格式不正确');
            isValid = false;
        }
    }

    // 验证密码
    const password = document.getElementById('regPassword').value;
    if (!password) {
        showError('regPasswordError', '请输入密码');
        isValid = false;
    } else if (password.length < 6) {
        showError('regPasswordError', '密码至少6位');
        isValid = false;
    }

    // 验证确认密码
    const confirmPassword = document.getElementById('regConfirmPassword').value;
    if (!confirmPassword) {
        showError('regConfirmError', '请确认密码');
        isValid = false;
    } else if (password !== confirmPassword) {
        showError('regConfirmError', '两次输入的密码不一致');
        isValid = false;
    }

    // 验证协议
    const agreeTerms = document.getElementById('agreeTerms');
    if (!agreeTerms.checked) {
        const agreeError = document.getElementById('agreeError');
        if (agreeError) agreeError.style.display = 'block';
        isValid = false;
    } else {
        const agreeError = document.getElementById('agreeError');
        if (agreeError) agreeError.style.display = 'none';
    }

    return isValid;
}

function showError(id, msg) {
    const el = document.getElementById(id);
    if (el) {
        el.textContent = msg;
        el.style.display = 'block';
    }
    // 高亮对应的输入框
    const inputMap = {
        'regUsernameError': 'regUsername',
        'regEmailError': 'regEmail',
        'regPhoneError': 'regPhone',
        'regPasswordError': 'regPassword',
        'regConfirmError': 'regConfirmPassword',
    };
    const inputId = inputMap[id];
    if (inputId) {
        const input = document.getElementById(inputId);
        if (input) input.classList.add('error');
    }
}

function clearErrors() {
    document.querySelectorAll('#registerForm .error-msg').forEach(el => {
        el.textContent = '';
        el.style.display = 'none';
    });
    document.querySelectorAll('#registerForm .form-control.error').forEach(el => {
        el.classList.remove('error');
    });
    const agreeError = document.getElementById('agreeError');
    if (agreeError) agreeError.style.display = 'none';
}

// ============================================================
// 表单提交
// ============================================================
function initFormSubmit() {
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!validateRegisterForm()) return;

        const registerBtn = document.getElementById('registerBtn');
        registerBtn.classList.add('loading');
        registerBtn.disabled = true;

        const payload = {
            type: currentRegisterType,
            password: document.getElementById('regPassword').value,
        };

        if (currentRegisterType === 'username') {
            payload.username = document.getElementById('regUsername').value.trim();
        } else if (currentRegisterType === 'email') {
            payload.email = document.getElementById('regEmail').value.trim();
        } else {
            payload.phone = document.getElementById('regPhone').value.trim();
        }

        try {
            const resp = await fetch(BASE_URL + '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const result = await resp.json();

            if (result && result.success) {
                // 注册成功，自动登录
                localStorage.setItem('timeforge_token', result.token);
                if (result.user) {
                    localStorage.setItem('timeforge_user', JSON.stringify(result.user));
                }
                showToast('注册成功！欢迎加入 TimeForge X', 'success');
                // 跳转到仪表盘
                setTimeout(() => {
                    window.location.href = '/';
                }, 800);
            } else {
                showToast(result.message || '注册失败', 'error');
            }
        } catch (err) {
            showToast('网络错误，请稍后重试', 'error');
        } finally {
            registerBtn.classList.remove('loading');
            registerBtn.disabled = false;
        }
    });
}

// ============================================================
// Toast 通知 (复用全局函数)
// ============================================================
if (typeof showToast === 'undefined') {
    window.showToast = function(message, type, duration) {
        duration = duration || 3000;
        const container = document.getElementById('toastContainer');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = 'toast-custom ' + (type || 'info');
        toast.innerHTML = `
            <div class="d-flex align-items-center justify-content-between">
                <span>${message}</span>
                <button class="btn-close btn-close-white ms-3" style="font-size: 10px;" onclick="this.parentElement.parentElement.remove()"></button>
            </div>
        `;
        container.appendChild(toast);

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    };
}
</script>
{% endblock %}
