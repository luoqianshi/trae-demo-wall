<!DOCTYPE html>
<html lang="zh-CN"  class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出海智研助手 - 首页</title>
    <style id="theme-vars">
:root {
  /* Brand Colors — Apple-inspired light blue */
  --brand-primary: #007aff;
  --brand-primary-hover: #0064d6;
  --brand-primary-light: rgba(0, 122, 255, 0.08);
  --brand-primary-muted: rgba(0, 122, 255, 0.04);
  --brand-background: #ffffff;
  --brand-foreground: #1d1d1f;

  /* Backgrounds — clean white / soft gray */
  --bg-root: #f5f5f7;
  --bg-surface: #ffffff;
  --bg-surface-raised: #ffffff;
  --bg-surface-overlay: #ffffff;
  --bg-surface-hover: #f2f2f7;

  /* Borders — subtle gray */
  --border-default: rgba(0, 0, 0, 0.08);
  --border-subtle: rgba(0, 0, 0, 0.04);
  --border-strong: rgba(0, 0, 0, 0.14);
  --border-brand: rgba(0, 122, 255, 0.25);

  /* Text — Apple HIG label colors */
  --text-primary: #1d1d1f;
  --text-muted: #6e6e73;
  --text-tertiary: #aeaeb2;
  --text-brand: #007aff;

  /* State Colors — Apple system colors */
  --state-success: #34c759;
  --state-success-bg: rgba(52, 199, 89, 0.08);
  --state-warning: #ff9500;
  --state-warning-bg: rgba(255, 149, 0, 0.08);
  --state-error: #ff3b30;
  --state-error-bg: rgba(255, 59, 48, 0.08);
  --state-info: #007aff;
  --state-info-bg: rgba(0, 122, 255, 0.08);

  /* Radius — Apple 1.2rem global */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* Shadows — Apple quiet elevation */
  --shadow-static: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-glow-brand: 0 0 20px rgba(0, 122, 255, 0.06);

  /* Typography — DM Sans + JetBrains Mono */
  --font-sans: 'DM Sans', ui-sans-serif, -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* Layout */
  --content-max-width: 1400px;
  --sidebar-width: 260px;
  --header-height: 56px;
}

/* Typography Classes */
.cz-heading-1 {
  font-family: var(--font-sans);
  font-size: 2rem;
  font-weight: 600;
  line-height: 1.2;
  color: var(--text-primary);
  letter-spacing: -0.03em;
}

.cz-heading-2 {
  font-family: var(--font-sans);
  font-size: 1.5rem;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

.cz-heading-3 {
  font-family: var(--font-sans);
  font-size: 1.125rem;
  font-weight: 600;
  line-height: 1.4;
  color: var(--text-primary);
}

.cz-body {
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 400;
  line-height: 1.55;
  color: var(--text-muted);
}

.cz-body-sm {
  font-family: var(--font-sans);
  font-size: 0.75rem;
  font-weight: 400;
  line-height: 1.5;
  color: var(--text-tertiary);
}

.cz-mono {
  font-family: var(--font-mono);
  font-size: 0.8125rem;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text-brand);
}

.cz-label {
  font-family: var(--font-sans);
  font-size: 0.6875rem;
  font-weight: 500;
  line-height: 1.4;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--brand-background);
    --color-foreground: var(--brand-foreground);
    --color-primary: var(--brand-primary);
  }
  @layer base {
    body { background: var(--brand-background); color: var(--brand-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Fixed Top Header -->
      <header class="fixed top-0 left-0 right-0 z-50 h-14 flex items-center border-b" style="height: var(--header-height); background: var(--bg-surface); border-color: var(--border-default);">
        <div class="w-full max-w-[1400px] mx-auto px-8 flex items-center justify-between">
          <!-- Brand Logo -->
          <a href="#" class="flex items-center gap-2 shrink-0" data-dom-id="nav-home">
            <svg class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="var(--brand-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="10" cy="10" r="8"/>
              <polygon points="8,6.5 13,10 8,13.5" fill="var(--brand-primary)" stroke="none"/>
            </svg>
            <span class="text-sm font-semibold whitespace-nowrap" style="color: var(--text-primary); font-family: var(--font-sans);">出海智研助手</span>
          </a>
          <!-- Navigation Tabs -->
          <nav class="flex items-center gap-1">
            <a href="#" class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium whitespace-nowrap" style="color: var(--brand-primary); background: var(--brand-primary-light); border-radius: var(--radius-full);" data-dom-id="nav-home" data-active="true">首页</a>
            <a href="#" class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors duration-150" style="color: var(--text-muted); border-radius: var(--radius-full);" data-dom-id="nav-survey">出海调研</a>
            <a href="#" class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors duration-150" style="color: var(--text-muted); border-radius: var(--radius-full);" data-dom-id="nav-simulator">实战模拟</a>
            <a href="#" class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors duration-150" style="color: var(--text-muted); border-radius: var(--radius-full);" data-dom-id="nav-risk">出海风控</a>
          </nav>
        </div>
      </header>

      <!-- Main Content Area -->
      <div class="pt-14" style="padding-top: var(--header-height);">

        <!-- Hero Section -->
        <section class="py-16 px-8 text-center" style="background: var(--bg-root);">
          <div class="max-w-[640px] mx-auto">
            <h1 class="text-3xl font-bold mb-4" style="color: var(--text-primary); font-family: var(--font-sans); line-height: 1.2; letter-spacing: -0.02em; text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">出海智研助手</h1>
            <p class="text-sm leading-relaxed max-w-[480px] mx-auto" style="color: var(--text-muted); font-family: var(--font-sans);">AI 驱动的外贸市场调研工具，助力中国制造扬帆出海</p>
          </div>
        </section>

        <!-- Feature Cards Section -->
        <section class="px-8 pb-12" style="background: var(--bg-root);">
          <div class="max-w-[1400px] mx-auto grid grid-cols-3 gap-4">
            <!-- Card 1: 出海调研 -->
            <a href="#" class="group flex flex-col p-5 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="card-survey">
              <div class="flex items-center gap-3 mb-3">
                <div class="inline-flex items-center justify-center w-8 h-8 shrink-0" style="background: var(--brand-primary-light); border-radius: var(--radius-md);">
                  <i data-lucide="search" class="w-4 h-4" style="color: var(--brand-primary);"></i>
                </div>
                <h3 class="text-sm font-semibold whitespace-nowrap" style="color: var(--text-primary); font-family: var(--font-sans);">出海调研</h3>
              </div>
              <p class="text-xs leading-relaxed" style="color: var(--text-muted); font-family: var(--font-sans);">10 个维度深度分析目标市场</p>
            </a>

            <!-- Card 2: 实战模拟 -->
            <a href="#" class="group flex flex-col p-5 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="card-simulator">
              <div class="flex items-center gap-3 mb-3">
                <div class="inline-flex items-center justify-center w-8 h-8 shrink-0" style="background: var(--brand-primary-light); border-radius: var(--radius-md);">
                  <i data-lucide="play" class="w-4 h-4" style="color: var(--brand-primary);"></i>
                </div>
                <h3 class="text-sm font-semibold whitespace-nowrap" style="color: var(--text-primary); font-family: var(--font-sans);">实战模拟</h3>
              </div>
              <p class="text-xs leading-relaxed" style="color: var(--text-muted); font-family: var(--font-sans);">模拟真实外贸开发流程</p>
            </a>

            <!-- Card 3: 出海风控 -->
            <a href="#" class="group flex flex-col p-5 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="card-risk">
              <div class="flex items-center gap-3 mb-3">
                <div class="inline-flex items-center justify-center w-8 h-8 shrink-0" style="background: var(--brand-primary-light); border-radius: var(--radius-md);">
                  <i data-lucide="shield" class="w-4 h-4" style="color: var(--brand-primary);"></i>
                </div>
                <h3 class="text-sm font-semibold whitespace-nowrap" style="color: var(--text-primary); font-family: var(--font-sans);">出海风控</h3>
              </div>
              <p class="text-xs leading-relaxed" style="color: var(--text-muted); font-family: var(--font-sans);">外贸骗局图鉴、成本计算器和风险雷达</p>
            </a>
          </div>
        </section>

        <!-- Market Selector Section -->
        <section class="px-8 pb-16" style="background: var(--bg-root);">
          <div class="max-w-[1400px] mx-auto">
            <h2 class="text-base font-semibold mb-4" style="color: var(--text-primary); font-family: var(--font-sans); letter-spacing: -0.01em;">目标市场</h2>
            <div class="grid grid-cols-4 gap-3">
              <!-- 越南 -->
              <a href="#" class="flex flex-col items-center justify-center p-4 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="map-point-survey">
                <span class="text-sm font-semibold mb-1" style="color: var(--text-primary); font-family: var(--font-sans);">越南</span>
                <span class="text-xs" style="color: var(--text-tertiary); font-family: var(--font-sans);">东南亚</span>
              </a>
              <!-- 泰国 -->
              <a href="#" class="flex flex-col items-center justify-center p-4 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="map-point-thailand">
                <span class="text-sm font-semibold mb-1" style="color: var(--text-primary); font-family: var(--font-sans);">泰国</span>
                <span class="text-xs" style="color: var(--text-tertiary); font-family: var(--font-sans);">东南亚</span>
              </a>
              <!-- 马来西亚 -->
              <a href="#" class="flex flex-col items-center justify-center p-4 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="map-point-malaysia">
                <span class="text-sm font-semibold mb-1" style="color: var(--text-primary); font-family: var(--font-sans);">马来西亚</span>
                <span class="text-xs" style="color: var(--text-tertiary); font-family: var(--font-sans);">东南亚</span>
              </a>
              <!-- 印尼 -->
              <a href="#" class="flex flex-col items-center justify-center p-4 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="map-point-indonesia">
                <span class="text-sm font-semibold mb-1" style="color: var(--text-primary); font-family: var(--font-sans);">印尼</span>
                <span class="text-xs" style="color: var(--text-tertiary); font-family: var(--font-sans);">东南亚</span>
              </a>
              <!-- 菲律宾 -->
              <a href="#" class="flex flex-col items-center justify-center p-4 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="map-point-philippines">
                <span class="text-sm font-semibold mb-1" style="color: var(--text-primary); font-family: var(--font-sans);">菲律宾</span>
                <span class="text-xs" style="color: var(--text-tertiary); font-family: var(--font-sans);">东南亚</span>
              </a>
              <!-- 沙特 -->
              <a href="#" class="flex flex-col items-center justify-center p-4 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="map-point-saudi">
                <span class="text-sm font-semibold mb-1" style="color: var(--text-primary); font-family: var(--font-sans);">沙特</span>
                <span class="text-xs" style="color: var(--text-tertiary); font-family: var(--font-sans);">中东</span>
              </a>
              <!-- 尼日利亚 -->
              <a href="#" class="flex flex-col items-center justify-center p-4 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="map-point-nigeria">
                <span class="text-sm font-semibold mb-1" style="color: var(--text-primary); font-family: var(--font-sans);">尼日利亚</span>
                <span class="text-xs" style="color: var(--text-tertiary); font-family: var(--font-sans);">非洲</span>
              </a>
              <!-- 巴西 -->
              <a href="#" class="flex flex-col items-center justify-center p-4 border transition-colors duration-150 cursor-pointer" style="background: var(--bg-surface); border-color: var(--border-default); border-radius: var(--radius-lg);" data-dom-id="map-point-brazil">
                <span class="text-sm font-semibold mb-1" style="color: var(--text-primary); font-family: var(--font-sans);">巴西</span>
                <span class="text-xs" style="color: var(--text-tertiary); font-family: var(--font-sans);">南美</span>
              </a>
            </div>
          </div>
        </section>

      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
