<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实战模拟 - 外贸出口全流程演练</title>
    <style>
:root {
  --brand-primary: #007aff;
  --brand-primary-hover: #0064d6;
  --brand-primary-light: rgba(0, 122, 255, 0.08);
  --brand-primary-muted: rgba(0, 122, 255, 0.04);
  --brand-green: #1d6b5f;
  --brand-green-light: rgba(29, 107, 95, 0.08);
  --bg-root: #f5f5f7;
  --bg-surface: #ffffff;
  --bg-surface-hover: #f2f2f7;
  --border-default: rgba(0, 0, 0, 0.08);
  --border-subtle: rgba(0, 0, 0, 0.04);
  --text-primary: #1d1d1f;
  --text-muted: #6e6e73;
  --text-tertiary: #aeaeb2;
  --state-success: #34c759;
  --state-warning: #ff9500;
  --state-error: #ff3b30;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;
  --font-sans: 'DM Sans', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --header-height: 56px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--bg-root); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
a { text-decoration: none; color: inherit; }
button { border: none; background: none; cursor: pointer; font-family: inherit; }
.cz-h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.03em; line-height: 1.2; }
.cz-h2 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; }
.cz-h3 { font-size: 1.125rem; font-weight: 600; line-height: 1.4; }
.cz-body { font-size: 0.875rem; color: var(--text-muted); line-height: 1.6; }
.cz-body-sm { font-size: 0.75rem; color: var(--text-tertiary); line-height: 1.5; }
.cz-mono { font-family: var(--font-mono); font-size: 0.875rem; font-weight: 500; }
input, select, textarea {
  font-family: inherit; font-size: 14px;
}
.input-field {
  width: 100%;
  padding: 9px 12px;
  font-size: 14px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
  color: var(--text-primary);
  transition: all 150ms ease;
  outline: none;
}
.input-field:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 3px var(--brand-primary-light); }

.btn-primary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; font-size: 13px; font-weight: 600;
  background: var(--brand-primary); color: white;
  border-radius: var(--radius-full);
  transition: all 200ms ease;
}
.btn-primary:hover { background: var(--brand-primary-hover); }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; font-size: 13px; font-weight: 500;
  background: white; color: var(--text-primary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-full);
  transition: all 200ms ease;
}
.btn-secondary:hover { border-color: var(--brand-primary); color: var(--brand-primary); }
@media (max-width: 768px) {
  .cz-h1 { font-size: 1.5rem; }
  .cz-h2 { font-size: 1.25rem; }
}

/* Step Nav */
.step-nav { display: flex; flex-direction: column; gap: 4px; }
.step-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 150ms ease;
  border: 1px solid transparent;
}
.step-item:hover { background: var(--bg-surface-hover); }
.step-item.active {
  background: var(--brand-primary-light);
  border-color: var(--brand-primary-light);
}
.step-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  background: var(--bg-surface-hover);
  color: var(--text-muted);
  flex-shrink: 0;
  font-family: var(--font-mono);
}
.step-item.active .step-num {
  background: var(--brand-primary);
  color: white;
}
.step-item.completed .step-num {
  background: var(--state-success);
  color: white;
}
.step-label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
.step-item.active .step-label { color: var(--brand-primary); font-weight: 600; }

/* Card */
.card {
  background: white;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: 24px;
}

/* Customer type card */
.type-card {
  padding: 18px;
  border: 2px solid var(--border-default);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 200ms ease;
  background: white;
}
.type-card:hover { border-color: var(--brand-primary); transform: translateY(-2px); }
.type-card.selected {
  border-color: var(--brand-primary);
  background: var(--brand-primary-light);
}

/* Channel chip */
.channel-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 13px;
  background: white;
  transition: all 150ms ease;
}
.channel-chip:hover { border-color: var(--brand-primary); }
.channel-chip.active { background: var(--brand-primary); color: white; border-color: var(--brand-primary); }

/* Timeline */
.timeline-item {
  position: relative;
  padding-left: 36px;
  padding-bottom: 24px;
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: 10px; top: 24px; bottom: -4px;
  width: 2px;
  background: var(--border-default);
}
.timeline-item:last-child::before { display: none; }
.timeline-dot {
  position: absolute;
  left: 0; top: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--brand-primary);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  font-family: var(--font-mono);
}

/* Exchange rate table */
.rate-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}
.rate-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border-subtle);
}
.rate-table td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border-subtle);
}
.rate-table tr:last-child td { border-bottom: none; }
.rate-table tr:hover td { background: var(--bg-surface-hover); }
</style>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <script src="data/countries.js"></script>
</head>
<body style="padding-top: var(--header-height);">

    <!-- Header -->
    <header style="position: fixed; top: 0; left: 0; right: 0; z-index: 50; height: var(--header-height); background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-default);">
      <div style="max-width: 1400px; margin: 0 auto; padding: 0 24px; height: 100%; display: flex; align-items: center; justify-content: space-between;">
        <a href="home.html" style="display: flex; align-items: center; gap: 8px;">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="var(--brand-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="8"/>
            <polygon points="8,6.5 13,10 8,13.5" fill="var(--brand-primary)" stroke="none"/>
          </svg>
          <span style="font-size: 14px; font-weight: 600;">出海智研助手</span>
        </a>
        <nav style="display: flex; align-items: center; gap: 4px;">
          <a href="home.html" style="padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--text-muted); border-radius: var(--radius-full);" onmouseover="this.style.background='var(--bg-surface-hover)'" onmouseout="this.style.background='transparent'">首页</a>
          <a href="survey.html" style="padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--text-muted); border-radius: var(--radius-full);" onmouseover="this.style.background='var(--bg-surface-hover)'" onmouseout="this.style.background='transparent'">出海调研</a>
          <a href="simulator.html" style="padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--brand-primary); background: var(--brand-primary-light); border-radius: var(--radius-full);">实战模拟</a>
          <a href="risk.html" style="padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--text-muted); border-radius: var(--radius-full);" onmouseover="this.style.background='var(--bg-surface-hover)'" onmouseout="this.style.background='transparent'">出海风控</a>
          <a href="tools.html" style="padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--text-muted); border-radius: var(--radius-full);" onmouseover="this.style.background='var(--bg-surface-hover)'" onmouseout="this.style.background='transparent'">出海工具</a>
        </nav>
        <div style="display: flex; align-items: center; gap: 8px;">
          <a href="#" style="padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--text-muted); border-radius: var(--radius-full);" onmouseover="this.style.color='var(--brand-primary)'" onmouseout="this.style.color='var(--text-muted)'">登录</a>
          <a href="#" style="padding: 6px 12px; font-size: 12px; font-weight: 600; background: var(--brand-primary); color: white; border-radius: var(--radius-full);">免费注册</a>
        </div>
      </div>
    </header>

    <main style="max-width: 1400px; margin: 0 auto; padding: 32px 24px 64px;">

      <!-- Page Header -->
      <div style="display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;">
        <div style="width: 44px; height: 44px; border-radius: var(--radius-md); background: var(--brand-primary-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i data-lucide="play-circle" style="width: 22px; height: 22px; color: var(--brand-primary);"></i>
        </div>
        <div style="flex: 1; min-width: 280px;">
          <h1 class="cz-h1" style="margin-bottom: 6px;">实战模拟中心</h1>
          <p class="cz-body">8 步模拟真实外贸出口全流程：从产品录入到后期复购跟进，一站式体验</p>
        </div>
      </div>

      <div style="display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--state-warning-bg); color: var(--state-warning); border-radius: var(--radius-sm); font-size: 12px; margin-bottom: 20px;">
        <i data-lucide="info" style="width: 12px; height: 12px;"></i>
        <span>本工具所有数据为模拟演示用途，汇率为非实时数据，仅作演练参考</span>
      </div>

      <!-- Top Config Bar (产品信息录入 / 目标市场 / 客户类型 默认值) -->
      <div class="card" style="margin-bottom: 20px; padding: 20px;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 14px;">
          <i data-lucide="settings-2" style="width: 16px; height: 16px; color: var(--brand-primary);"></i>
          <h3 style="font-size: 14px; font-weight: 600;">基础配置（产品 / 市场 / 客户）</h3>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px;">
          <div>
            <label style="display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;">产品品类</label>
            <input id="cfg-category" class="input-field" placeholder="如：智能家居 / 服装 / 3C 数码" value="智能家居">
          </div>
          <div>
            <label style="display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;">产品名称（自定义）</label>
            <input id="cfg-product" class="input-field" placeholder="输入具体产品名称" value="便携式智能音箱">
          </div>
          <div>
            <label style="display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;">出厂价（CNY）</label>
            <input id="cfg-factory" class="input-field" type="number" value="80">
          </div>
          <div>
            <label style="display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;">MOQ（最小起订量）</label>
            <input id="cfg-moq" class="input-field" type="number" value="500">
          </div>
          <div>
            <label style="display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;">目标市场（联动调研）</label>
            <select id="cfg-country" class="input-field"></select>
          </div>
          <div>
            <label style="display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;">主攻客户类型</label>
            <select id="cfg-customer" class="input-field">
              <option value="wholesale">批发分销商</option>
              <option value="ecommerce">电商卖家</option>
              <option value="brand">品牌进口商</option>
            </select>
          </div>
        </div>
        <div style="margin-top: 14px; display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--radius-sm); background: var(--brand-primary-muted);">
          <i data-lucide="trending-up" style="width: 16px; height: 16px; color: var(--brand-primary);"></i>
          <div style="flex: 1; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
            <span style="font-size: 12px; color: var(--text-muted);">当前汇率</span>
            <span id="cfg-rate-display" class="cz-mono" style="color: var(--brand-primary); font-weight: 700;">1 CNY = --</span>
            <span style="font-size: 11px; color: var(--text-tertiary);">（非实时数据）</span>
          </div>
        </div>
      </div>

      <!-- Step Nav + Step Content -->
      <div style="display: grid; grid-template-columns: 220px 1fr; gap: 20px; align-items: start;" class="sim-grid">

        <!-- Step Nav -->
        <div class="card" style="padding: 12px; position: sticky; top: calc(var(--header-height) + 16px);">
          <div class="step-nav" id="step-nav">
            <div class="step-item active" data-step="1"><span class="step-num">1</span><span class="step-label">产品信息录入</span></div>
            <div class="step-item" data-step="2"><span class="step-num">2</span><span class="step-label">目标市场选择</span></div>
            <div class="step-item" data-step="3"><span class="step-num">3</span><span class="step-label">选择客户类型</span></div>
            <div class="step-item" data-step="4"><span class="step-num">4</span><span class="step-label">客户开发</span></div>
            <div class="step-item" data-step="5"><span class="step-num">5</span><span class="step-label">报价策略</span></div>
            <div class="step-item" data-step="6"><span class="step-num">6</span><span class="step-label">跟进节奏</span></div>
            <div class="step-item" data-step="7"><span class="step-num">7</span><span class="step-label">合同与交付</span></div>
            <div class="step-item" data-step="8"><span class="step-num">8</span><span class="step-label">后期维系</span></div>
          </div>
        </div>

        <!-- Step Content -->
        <div class="card" id="step-content">
          <!-- Dynamic by JS -->
        </div>

      </div>

    </main>

    <!-- Footer -->
    <footer style="background: white; border-top: 1px solid var(--border-default); margin-top: 40px;">
      <div style="max-width: 1400px; margin: 0 auto; padding: 32px 24px;">
        <div style="padding-top: 24px; border-top: 1px solid var(--border-default); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
          <p style="font-size: 12px; color: var(--text-tertiary);">© 2026 出海智研助手. 版权所有 · 数据仅供参考，决策需谨慎</p>
          <span style="font-size: 12px; color: var(--text-tertiary);">数据更新时间：2026 Q2</span>
        </div>
      </div>
    </footer>

    <script>
      var currentStep = 1;
      var state = {
        customerType: 'wholesale',
        channel: 'email',
        pricing: 'fob',
        payment: 'tt',
        shipping: 'sea',
        strategy: 'direct',
        leadStatus: 'new'
      };

      function getCnyRate(countryKey) {
        var c = getCountryByKey(countryKey);
        if (c && c.exchangeRate) return c.exchangeRate;
        var l = window.LIGHT_COUNTRY_DATA[countryKey];
        if (l && l.exchangeRate) return l.exchangeRate;
        return 1;
      }
      function getCountry(countryKey) {
        var c = getCountryByKey(countryKey);
        if (c) return c;
        var l = window.LIGHT_COUNTRY_DATA[countryKey];
        if (l) return { name: l.name, flag: l.flag, continent: l.continent, currency: l.currency, exchangeRate: l.exchangeRate, summary: l.summary || '基础国家信息' };
        return null;
      }

      function populateCountrySelect() {
        var sel = document.getElementById('cfg-country');
        var continents = ['亚洲', '欧洲', '北美洲', '南美洲', '非洲', '大洋洲'];
        var html = '';
        continents.forEach(function(cont) {
          var list = window.getAllCountriesByContinent(cont);
          if (!list || !list.length) return;
          html += '<optgroup label="—— ' + cont + '（' + list.length + '国） ——">';
          list.forEach(function(c) {
            html += '<option value="' + c.key + '">' + c.flag + ' ' + c.name + '</option>';
          });
          html += '</optgroup>';
        });
        sel.innerHTML = html;
        updateRateDisplay();
      }

      function updateRateDisplay() {
        var countryKey = document.getElementById('cfg-country').value;
        var rate = getCnyRate(countryKey);
        var c = getCountry(countryKey);
        var display = document.getElementById('cfg-rate-display');
        if (c && c.currency) {
          if (rate >= 1000) {
            display.textContent = '1 CNY = ' + rate.toLocaleString('zh-CN', { maximumFractionDigits: 0 }) + ' ' + c.currency;
          } else if (rate >= 10) {
            display.textContent = '1 CNY = ' + rate.toFixed(2) + ' ' + c.currency;
          } else {
            display.textContent = '1 CNY = ' + rate.toFixed(3) + ' ' + c.currency;
          }
        } else {
          display.textContent = '1 CNY = ' + rate + '（未知币种）';
        }
      }

      // ============== 8 步内容渲染 ==============

      function renderStep1() {
        var countryKey = document.getElementById('cfg-country').value;
        var country = getCountry(countryKey);
        var factoryPrice = parseFloat(document.getElementById('cfg-factory').value) || 0;
        var moq = parseInt(document.getElementById('cfg-moq').value) || 0;
        var category = document.getElementById('cfg-category').value;
        var product = document.getElementById('cfg-product').value;

        var suggestPrice = (factoryPrice * 1.5).toFixed(2);
        var minPrice = (factoryPrice * 1.2).toFixed(2);

        return '<div>' +
          '<div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">' +
            '<span style="width: 24px; height: 24px; border-radius: 50%; background: var(--brand-primary); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; font-family: var(--font-mono);">1</span>' +
            '<h2 class="cz-h2">产品信息录入</h2>' +
          '</div>' +
          '<p class="cz-body" style="margin-bottom: 20px;">填写你的自有产品（品类、名称、出厂价、MOQ），系统将基于目标市场推荐定价</p>' +
          '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 20px;">' +
            '<div style="padding: 16px; border-radius: var(--radius-md); background: var(--brand-primary-light);">' +
              '<div style="font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">产品品类</div>' +
              '<div style="font-size: 15px; font-weight: 600;">' + category + '</div>' +
            '</div>' +
            '<div style="padding: 16px; border-radius: var(--radius-md); background: var(--brand-primary-light);">' +
              '<div style="font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">产品名称</div>' +
              '<div style="font-size: 15px; font-weight: 600;">' + product + '</div>' +
            '</div>' +
            '<div style="padding: 16px; border-radius: var(--radius-md); background: var(--brand-primary-light);">' +
              '<div style="font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">出厂价（CNY）</div>' +
              '<div style="font-size: 15px; font-weight: 600; font-family: var(--font-mono);">¥ ' + factoryPrice.toFixed(2) + '</div>' +
            '</div>' +
            '<div style="padding: 16px; border-radius: var(--radius-md); background: var(--brand-primary-light);">' +
              '<div style="font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">MOQ（最小起订量）</div>' +
              '<div style="font-size: 15px; font-weight: 600; font-family: var(--font-mono);">' + moq.toLocaleString() + ' 件</div>' +
            '</div>' +
          '</div>' +
          '<div style="border-top: 1px solid var(--border-subtle); padding-top: 18px;">' +
            '<h3 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">📊 定价建议（基于 ' + (country ? country.flag + ' ' + country.name : '目标市场') + '）</h3>' +
            '<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">' +

            '<div style="font-size: 11px; color: var(--text-tertiary); padding: 4px 8px; background: var(--brand-primary-muted); border-radius: 4px; display: inline-block;">💡 ' + it.tip + '</div>' +
          '</div>';
        });
        html += '</div></div>';
        return html;
      }

      function renderStep7() {
        var payments = [

        var shippings = [
          { key: 'sea', name: '海运 FCL/LCL', icon: 'ship', desc: '成本低，25-40 天', risk: '低' },

          { key: 'express', name: '国际快递', icon: 'package', desc: 'DHL/FedEx，3-5 天样品', risk: '中' },
          { key: 'rail', name: '中欧班列', icon: 'train', desc: '15-20 天，陆路去欧洲', risk: '低' }
        ];
        var ph = '';
        payments.forEach(function(p) {
          var active = state.payment === p.key ? 'background: var(--brand-primary); color: white; border-color: var(--brand-primary);' : '';
          ph += '<button class="channel-chip" data-payment="' + p.key + '" style="' + active + '">' +
            '<i data-lucide="' + p.icon + '" style="width: 12px; height: 12px;"></i>' +
            '<span style="font-weight: 600;">' + p.name + '</span>' +
            '<span style="font-size: 10px; opacity: 0.7;">· ' + p.desc + '</span>' +
          '</button>';
        });
        var sh = '';
        shippings.forEach(function(s) {
          var active = state.shipping === s.key ? 'background: var(--brand-primary); color: white; border-color: var(--brand-primary);' : '';
          sh += '<button class="channel-chip" data-shipping="' + s.key + '" style="' + active + '">' +
            '<i data-lucide="' + s.icon + '" style="width: 12px; height: 12px;"></i>' +
            '<span style="font-weight: 600;">' + s.name + '</span>' +
            '<span style="font-size: 10px; opacity: 0.7;">· ' + s.desc + '</span>' +
          '</button>';
        });

        return '<div>' +
          '<div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">' +
            '<span style="width: 24px; height: 24px; border-radius: 50%; background: var(--brand-primary); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; font-family: var(--font-mono);">7</span>' +
            '<h2 class="cz-h2">合同与交付</h2>' +
          '</div>' +
          '<p class="cz-body" style="margin-bottom: 18px;">付款方式 + 物流方案选择</p>' +
          '<h3 style="font-size: 13px; font-weight: 600; margin-bottom: 10px;">💰 付款方式</h3>' +
          '<div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px;">' + ph + '</div>' +
          '<h3 style="font-size: 13px; font-weight: 600; margin-bottom: 10px;">📦 物流方案</h3>' +
          '<div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px;">' + sh + '</div>' +
          '<div style="padding: 16px; border-radius: var(--radius-md); background: var(--brand-primary-light); border: 1px dashed var(--brand-primary);">' +
            '<h3 style="font-size: 13px; font-weight: 600; margin-bottom: 8px;">📋 合同模板（自动生成）</h3>' +
            '<div style="font-size: 12px; line-height: 1.7; color: var(--text-primary);">' +
              '<div>商品：<strong>' + document.getElementById('cfg-product').value + '</strong></div>' +
              '<div>数量：<strong>' + document.getElementById('cfg-moq').value + ' 件</strong></div>' +
              '<div>目的国：<strong>' + (getCountry(document.getElementById('cfg-country').value) ? getCountry(document.getElementById('cfg-country').value).name : '--') + '</strong></div>' +
              '<div>付款方式：<strong>' + payments.find(function(p){return p.key === state.payment}).name + '</strong></div>' +
              '<div>物流方案：<strong>' + shippings.find(function(s){return s.key === state.shipping}).name + '</strong></div>' +
              '<div>贸易术语：<strong>FOB Shenzhen（深圳离岸价）</strong></div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }

      function renderStep8() {
        var country = getCountry(document.getElementById('cfg-country').value);
        var tactics = [
          { icon: 'gift', title: '节日问候与礼物', desc: '海外重大节日（圣诞/开斋节/排灯节）寄送定制化礼物' },
          { icon: 'refresh-cw', title: '定期新品推送', desc: '每月推送 2-3 款新品 + 季节性爆款推荐' },
          { icon: 'trending-up', title: '数据共享', desc: '共享当地市场趋势、竞品动态、消费者洞察' },
          { icon: 'percent', title: '阶梯返利政策', desc: '年订单 50 万+ 享 3% 返利，100 万+ 享 5% 返利' },
          { icon: 'users', title: '联合营销', desc: '与客户共投 Google/Facebook 广告，共享线索' },
          { icon: 'trophy', title: 'VIP 客户答谢', desc: '年订单 TOP 客户邀请来华考察 + 工厂参观' }
        ];
        var html = '<div>' +
          '<div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">' +
            '<span style="width: 24px; height: 24px; border-radius: 50%; background: var(--brand-primary); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; font-family: var(--font-mono);">8</span>' +
            '<h2 class="cz-h2">后期维系（增加复购）</h2>' +
          '</div>' +
          '<p class="cz-body" style="margin-bottom: 18px;">成交只是开始，6 大复购策略助你把新客变老客</p>' +
          '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px;">';
        tactics.forEach(function(t) {
          html += '<div style="padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-default); background: white;">' +
            '<div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">' +
              '<div style="width: 32px; height: 32px; border-radius: 50%; background: var(--brand-primary-light); display: flex; align-items: center; justify-content: center;">' +
                '<i data-lucide="' + t.icon + '" style="width: 16px; height: 16px; color: var(--brand-primary);"></i>' +
              '</div>' +
              '<h4 style="font-size: 13px; font-weight: 600;">' + t.title + '</h4>' +
            '</div>' +
            '<p style="font-size: 12px; color: var(--text-muted); line-height: 1.55;">' + t.desc + '</p>' +
          '</div>';
        });
        html += '</div>';
        html += '<div style="margin-top: 20px; padding: 18px; border-radius: var(--radius-md); background: linear-gradient(135deg, var(--brand-primary-light), white); border: 1px solid var(--brand-primary);">' +
          '<div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">' +
            '<i data-lucide="check-circle-2" style="width: 22px; height: 22px; color: var(--brand-primary);"></i>' +
            '<h3 style="font-size: 16px; font-weight: 700;">🎉 完整 8 步流程已演练</h3>' +
          '</div>' +
          '<p style="font-size: 13px; color: var(--text-muted); line-height: 1.6;">从 <strong>' + (country ? country.flag + ' ' + country.name : '目标市场') + '</strong> 出口 <strong>' + document.getElementById('cfg-product').value + '</strong> 的全流程已演练完成。点击「重新演练」可重置参数或更换市场。</p>' +
          '<div style="display: flex; gap: 8px; margin-top: 14px;">' +
            '<button class="btn-primary" onclick="location.reload()"><i data-lucide="rotate-ccw" style="width: 13px; height: 13px;"></i> 重新演练</button>' +
            '<a href="risk.html" class="btn-secondary"><i data-lucide="shield-alert" style="width: 13px; height: 13px;"></i> 测算风险</a>' +
            '<a href="survey.html" class="btn-secondary"><i data-lucide="bar-chart-3" style="width: 13px; height: 13px;"></i> 查看调研</a>' +
          '</div>' +
        '</div>';
        html += '</div>';
        return html;
      }

      function renderStep() {
        var fn = [null, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5, renderStep6, renderStep7, renderStep8];
        document.getElementById('step-content').innerHTML = fn[currentStep]();
        // update step nav state
        document.querySelectorAll('.step-item').forEach(function(item) {
          var s = parseInt(item.getAttribute('data-step'));
          item.classList.remove('active', 'completed');
          if (s === currentStep) item.classList.add('active');
          else if (s < currentStep) item.classList.add('completed');
        });
        // 步骤 2 单独注入国家下拉
        if (currentStep === 2) {
          var s2 = document.getElementById('step2-country');
          if (s2) {
            var continents = ['亚洲', '欧洲', '北美洲', '南美洲', '非洲', '大洋洲'];
            var html = '';
            continents.forEach(function(cont) {
              var list = window.getAllCountriesByContinent(cont);
              if (!list || !list.length) return;
              html += '<optgroup label="—— ' + cont + '（' + list.length + '国） ——">';
              list.forEach(function(c) {
                html += '<option value="' + c.key + '" ' + (c.key === document.getElementById('cfg-country').value ? 'selected' : '') + '>' + c.flag + ' ' + c.name + '</option>';
              });
              html += '</optgroup>';
            });
            s2.innerHTML = html;
            s2.addEventListener('change', function() {
              document.getElementById('cfg-country').value = s2.value;
              updateRateDisplay();
              renderStep();
            });
          }
          // 绑定 hot chip
          document.querySelectorAll('[data-country]').forEach(function(chip) {
            chip.addEventListener('click', function() {
              var k = this.getAttribute('data-country');
              document.getElementById('cfg-country').value = k;
              updateRateDisplay();
              renderStep();
            });
          });
        }
        if (currentStep === 3) {
          document.querySelectorAll('[data-customer]').forEach(function(card) {
            card.addEventListener('click', function() {
              state.customerType = this.getAttribute('data-customer');
              document.getElementById('cfg-customer').value = state.customerType;
              renderStep();
            });
          });
        }
        if (currentStep === 4) {
          document.querySelectorAll('[data-channel]').forEach(function(chip) {
            chip.addEventListener('click', function() {
              state.channel = this.getAttribute('data-channel');
              renderStep();
            });
          });
        }
        if (currentStep === 5) {
          var slider = document.getElementById('rate-fluctuation');
          if (slider) {
            slider.addEventListener('input', function() {
              var pct = parseFloat(slider.value) || 0;
              var countryKey = document.getElementById('cfg-country').value;
              var baseRate = getCnyRate(countryKey);
              var simRate = baseRate * (1 + pct / 100);
              var factoryPrice = parseFloat(document.getElementById('cfg-factory').value) || 0;
              var moq = parseInt(document.getElementById('cfg-moq').value) || 0;
              var suggest = factoryPrice * moq * 1.5;
              var country = getCountry(countryKey);
              var label = document.getElementById('rate-float-label');
              if (pct === 0) {
                label.textContent = '基准 0%';
                label.style.color = 'var(--text-muted)';
              } else {
                var sign = pct > 0 ? '+' : '';
                label.textContent = '浮动 ' + sign + pct + '%';
                label.style.color = pct > 0 ? 'var(--state-success)' : 'var(--state-error)';
              }
              var foreign = document.getElementById('sim-quote-foreign');
              if (country) {
                if (simRate >= 1000) {
                  foreign.textContent = country.currency + ' ' + Math.round(suggest * simRate / 10000 * 10000).toLocaleString();
                } else {
                  foreign.textContent = country.currency + ' ' + Math.round(suggest * simRate).toLocaleString();
                }
              }
              // 利润影响（简化：本币贬值 = 收到更多人民币）
              var profitEl = document.getElementById('sim-profit');
              var freight = Math.max(factoryPrice * moq * 0.05, 800);
              var insurance = factoryPrice * moq * 0.003;
              var tariff = factoryPrice * moq * 0.1;
              var vat = (factoryPrice * moq + tariff) * 0.1;
              var totalCostCNY = factoryPrice * moq + freight + insurance + tariff + vat;
              var baseProfit = suggest - totalCostCNY;
              // 假设客户按 USD 报价支付，浮动影响 USD/CNY 折算
              // 这里简化：人民币升值（-%）→ 客户付的 USD 折成更少 CNY → 利润减少
              var newRate = 7.2 * (1 - pct / 100);
              var usdQuote = suggest / 7.2;
              var profitUSD = usdQuote * newRate - totalCostCNY;
              profitEl.textContent = '¥ ' + Math.round(profitUSD).toLocaleString();
              profitEl.style.color = profitUSD >= baseProfit * 0.95 ? 'var(--state-success)' : 'var(--state-error)';
            });
          }
        }
        if (currentStep === 7) {
          document.querySelectorAll('[data-payment]').forEach(function(chip) {
            chip.addEventListener('click', function() {
              state.payment = this.getAttribute('data-payment');
              renderStep();
            });
          });
          document.querySelectorAll('[data-shipping]').forEach(function(chip) {
            chip.addEventListener('click', function() {
              state.shipping = this.getAttribute('data-shipping');
              renderStep();
            });
          });
        }
        lucide.createIcons();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // Step Nav Click
      document.querySelectorAll('.step-item').forEach(function(item) {
        item.addEventListener('click', function() {
          currentStep = parseInt(this.getAttribute('data-step'));
          renderStep();
        });
      });

      // 顶部配置变化时同步
      ['cfg-country', 'cfg-customer', 'cfg-product', 'cfg-category', 'cfg-factory', 'cfg-moq'].forEach(function(id) {
        var el = document.getElementById(id);
        el.addEventListener('change', updateRateDisplay);
        el.addEventListener('input', updateRateDisplay);
      });

      populateCountrySelect();
      renderStep();
    </script>
</body>
