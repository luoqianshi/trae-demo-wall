<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思绪折叠 MindFold</title>
<style>
/* ===== CSS Reset & Variables ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0f0f1a;
  --bg-secondary:rgba(255,255,255,0.04);
  --glass-bg:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.12);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.3);
  --text-primary:rgba(255,255,255,0.92);
  --text-secondary:rgba(255,255,255,0.55);
  --accent:#7c6fff;
  --accent-glow:rgba(124,111,255,0.35);
  --tag-bg:rgba(124,111,255,0.2);
  --tag-text:#b8afff;
  --positive:#4ecdc4;
  --anxious:#ff6b9d;
  --calm:#a8e6cf;
  --energy:#ffd93d;
  --radius:16px;
  --radius-sm:10px;
  --transition:0.35s cubic-bezier(0.4,0,0.2,1);
  --spring:0.5s cubic-bezier(0.34,1.56,0.64,1);
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans CJK SC',system-ui,sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  transition:background 1.5s ease;
}
body.mood-positive{--bg-primary:#0a1a1a;--glass-bg:rgba(78,205,196,0.06)}
body.mood-anxious{--bg-primary:#1a0f18;--glass-bg:rgba(255,107,157,0.06)}
body.mood-calm{--bg-primary:#0f1a14;--glass-bg:rgba(168,230,207,0.06)}
body.mood-energy{--bg-primary:#1a180f;--glass-bg:rgba(255,217,61,0.06)}

/* ===== Ambient Background ===== */
.ambient-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  overflow:hidden;
}
.ambient-orb{
  position:absolute;border-radius:50%;
  filter:blur(100px);opacity:0.15;
  animation:orbFloat 20s ease-in-out infinite;
  transition:background 3s ease;
}
.ambient-orb:nth-child(1){width:500px;height:500px;top:-10%;left:-5%;background:var(--accent);animation-delay:0s}
.ambient-orb:nth-child(2){width:400px;height:400px;bottom:-10%;right:-5%;background:var(--anxious);animation-delay:-7s}
.ambient-orb:nth-child(3){width:350px;height:350px;top:40%;left:50%;background:var(--positive);animation-delay:-14s}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(40px,-30px) scale(1.1)}
  66%{transform:translate(-30px,40px) scale(0.9)}
}

/* ===== Layout ===== */
.app-container{
  position:relative;z-index:1;
  max-width:720px;margin:0 auto;
  padding:40px 20px 80px;
}

/* ===== Header ===== */
.app-header{
  text-align:center;margin-bottom:40px;
  transition:opacity var(--transition),transform var(--transition);
}
.app-header.hidden{opacity:0;transform:translateY(-20px);pointer-events:none}
.app-title{
  font-size:2rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--positive));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
  margin-bottom:6px;
}
.app-subtitle{font-size:0.85rem;color:var(--text-secondary);letter-spacing:4px}

/* ===== Input Area ===== */
.input-area{
  position:relative;margin-bottom:32px;
  transition:opacity var(--transition),transform var(--transition);
}
.input-area.hidden{opacity:0;transform:translateY(-20px);pointer-events:none}
.input-wrapper{
  position:relative;
  background:var(--glass-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:var(--glass-shadow);
  overflow:hidden;
  transition:border-color var(--transition),box-shadow var(--transition);
}
.input-wrapper:focus-within{
  border-color:var(--accent);
  box-shadow:var(--glass-shadow),0 0 0 3px var(--accent-glow);
}
.input-field{
  width:100%;padding:18px 60px 18px 22px;
  background:transparent;border:none;outline:none;
  color:var(--text-primary);font-size:1rem;
  font-family:inherit;resize:none;
  line-height:1.6;
}
.input-field::placeholder{color:var(--text-secondary)}
.input-submit{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;
  font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform var(--spring),background var(--transition);
}
.input-submit:hover{transform:translateY(-50%) scale(1.1)}
.input-submit:active{transform:translateY(-50%) scale(0.95)}
.input-hint{
  text-align:right;padding:6px 18px 0;
  font-size:0.72rem;color:var(--text-secondary);opacity:0.6;
}

/* ===== Toolbar ===== */
.toolbar{
  display:flex;gap:10px;flex-wrap:wrap;
  margin-bottom:28px;align-items:center;
  transition:opacity var(--transition),transform var(--transition);
}
.toolbar.hidden{opacity:0;transform:translateY(-20px);pointer-events:none}
.toolbar-btn{
  padding:8px 16px;border-radius:var(--radius-sm);
  background:var(--glass-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  color:var(--text-secondary);font-size:0.8rem;
  cursor:pointer;font-family:inherit;
  transition:all var(--transition);
  display:flex;align-items:center;gap:6px;
}
.toolbar-btn:hover{
  background:rgba(255,255,255,0.12);
  color:var(--text-primary);
  transform:translateY(-1px);
}
.toolbar-btn:active{transform:translateY(0) scale(0.97)}
.toolbar-btn.danger{color:var(--anxious);border-color:rgba(255,107,157,0.2)}
.toolbar-btn.danger:hover{background:rgba(255,107,157,0.12)}
.toolbar-spacer{flex:1}

/* ===== Mood Weather Station ===== */
.mood-station{
  position:fixed;top:20px;right:20px;z-index:100;
  background:var(--glass-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:14px 18px;min-width:140px;
  box-shadow:var(--glass-shadow);
  transition:all var(--transition);
  opacity:0;transform:translateX(20px);
}
.mood-station.visible{opacity:1;transform:translateX(0)}
.mood-station-label{font-size:0.7rem;color:var(--text-secondary);margin-bottom:6px;letter-spacing:1px}
.mood-icon{font-size:1.6rem;display:block;margin-bottom:4px;transition:all 0.5s ease}
.mood-text{font-size:0.78rem;color:var(--text-primary);font-weight:500}
.mood-bar{
  margin-top:8px;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.08);overflow:hidden;
}
.mood-bar-fill{
  height:100%;border-radius:2px;
  transition:width 1s ease,background 1s ease;
}

/* ===== Cards Container ===== */
.cards-container{
  display:flex;flex-direction:column;gap:16px;
}

/* ===== Thought Card ===== */
.thought-card{
  background:var(--glass-bg);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:18px 20px;
  box-shadow:var(--glass-shadow);
  transition:all var(--transition);
  animation:cardIn var(--spring) both;
  cursor:default;
}
.thought-card:hover{
  transform:translateY(-2px);
  box-shadow:var(--glass-shadow),0 12px 40px rgba(0,0,0,0.2);
  border-color:rgba(255,255,255,0.18);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(0.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.thought-card.removing{
  animation:cardOut 0.5s cubic-bezier(0.55,0,1,0.45) forwards;
}
@keyframes cardOut{
  to{opacity:0;transform:translateY(-30px) scale(0.9) rotateX(10deg)}
}
.thought-card-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.thought-time{font-size:0.72rem;color:var(--text-secondary)}
.thought-mood-dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;margin-left:8px;
  transition:background var(--transition);
}
.thought-text{
  font-size:0.95rem;line-height:1.7;
  color:var(--text-primary);
  word-break:break-word;
}
.thought-text .tag{
  display:inline;
  color:var(--tag-text);
  background:var(--tag-bg);
  padding:2px 8px;border-radius:6px;
  font-size:0.82rem;
  font-weight:500;
  margin:0 2px;
}
.thought-tags{
  display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;
}
.thought-tag{
  font-size:0.72rem;padding:3px 10px;
  border-radius:20px;
  background:var(--tag-bg);
  color:var(--tag-text);
  border:1px solid rgba(124,111,255,0.15);
}
.thought-card-footer{
  display:flex;gap:8px;margin-top:12px;
  justify-content:flex-end;
}
.card-action{
  font-size:0.72rem;padding:4px 10px;
  border-radius:6px;border:none;
  background:transparent;color:var(--text-secondary);
  cursor:pointer;font-family:inherit;
  transition:all var(--transition);
}
.card-action:hover{background:rgba(255,255,255,0.08);color:var(--text-primary)}
.card-action.delete:hover{color:var(--anxious);background:rgba(255,107,157,0.1)}

/* ===== Group Card ===== */
.group-card{
  background:var(--glass-bg);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--glass-shadow);
  margin-bottom:8px;
  transition:all var(--transition);
}
.group-card:hover{border-color:rgba(255,255,255,0.18)}
.group-header{
  padding:14px 20px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:background var(--transition);
}
.group-header:hover{background:rgba(255,255,255,0.04)}
.group-icon{
  width:28px;height:28px;border-radius:8px;
  background:var(--tag-bg);
  display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;color:var(--tag-text);
  flex-shrink:0;
}
.group-name{font-size:0.9rem;font-weight:600;color:var(--text-primary)}
.group-count{
  font-size:0.7rem;color:var(--text-secondary);
  background:rgba(255,255,255,0.06);
  padding:2px 8px;border-radius:10px;margin-left:auto;
}
.group-chevron{
  color:var(--text-secondary);font-size:0.7rem;
  transition:transform var(--transition);
}
.group-card.collapsed .group-chevron{transform:rotate(-90deg)}
.group-body{
  padding:0 20px 16px;
  display:flex;flex-direction:column;gap:10px;
  max-height:800px;overflow:hidden;
  transition:max-height 0.5s ease,padding 0.5s ease,opacity 0.3s ease;
}
.group-card.collapsed .group-body{max-height:0;padding-top:0;padding-bottom:0;opacity:0}

/* ===== Shredder Animation ===== */
.shred-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,0.85);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s ease;
}
.shred-overlay.active{opacity:1;pointer-events:all}
.shred-particle{
  position:absolute;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:3px;
  font-size:0.6rem;color:var(--text-secondary);
  padding:4px 8px;
  white-space:nowrap;
  pointer-events:none;
}

/* ===== Focus Mode ===== */
body.focus-mode .toolbar,
body.focus-mode .app-header,
body.focus-mode .mood-station,
body.focus-mode .thought-card-footer,
body.focus-mode .group-header .group-count,
body.focus-mode .group-header .group-chevron{
  opacity:0 !important;
  pointer-events:none !important;
  transform:translateY(-10px);
  transition:opacity 0.4s ease,transform 0.4s ease;
}
body.focus-mode .app-container{max-width:600px}
body.focus-mode .thought-card,
body.focus-mode .group-card{
  box-shadow:none;border-color:rgba(255,255,255,0.06);
}
body.focus-mode .ambient-orb{opacity:0.08}

/* ===== White Noise Panel ===== */
.noise-panel{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);
  z-index:100;
  background:var(--glass-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:20px 24px;
  box-shadow:var(--glass-shadow);
  display:flex;gap:16px;align-items:center;
  transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s ease;
  opacity:0;
}
.noise-panel.visible{transform:translateX(-50%) translateY(0);opacity:1}
.noise-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:10px 16px;border-radius:var(--radius-sm);
  background:transparent;border:1px solid transparent;
  color:var(--text-secondary);cursor:pointer;
  font-family:inherit;font-size:0.75rem;
  transition:all var(--transition);
}
.noise-btn:hover{background:rgba(255,255,255,0.06);color:var(--text-primary)}
.noise-btn.active{
  background:var(--tag-bg);color:var(--tag-text);
  border-color:rgba(124,111,255,0.2);
}
.noise-btn-icon{font-size:1.4rem}
.noise-volume{
  display:flex;align-items:center;gap:8px;
  margin-left:8px;padding-left:16px;
  border-left:1px solid var(--glass-border);
}
.noise-volume input[type=range]{
  width:80px;height:4px;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,0.12);border-radius:2px;outline:none;
}
.noise-volume input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);cursor:pointer;
}

/* ===== Export Dropdown ===== */
.export-dropdown{
  position:relative;
}
.export-menu{
  position:absolute;top:100%;left:0;margin-top:6px;
  background:var(--glass-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  box-shadow:var(--glass-shadow);
  padding:6px;min-width:140px;
  opacity:0;transform:translateY(-8px);pointer-events:none;
  transition:all var(--transition);
  z-index:50;
}
.export-menu.open{opacity:1;transform:translateY(0);pointer-events:all}
.export-option{
  display:block;width:100%;padding:8px 12px;
  border:none;background:transparent;
  color:var(--text-secondary);font-size:0.8rem;
  text-align:left;cursor:pointer;border-radius:6px;
  font-family:inherit;
  transition:all var(--transition);
}
.export-option:hover{background:rgba(255,255,255,0.08);color:var(--text-primary)}

/* ===== Empty State ===== */
.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--text-secondary);
}
.empty-icon{font-size:3rem;margin-bottom:16px;opacity:0.3}
.empty-text{font-size:0.9rem;line-height:1.8}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--glass-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  padding:10px 20px;font-size:0.82rem;
  color:var(--text-primary);
  box-shadow:var(--glass-shadow);
  opacity:0;pointer-events:none;
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index:200;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* ===== Responsive ===== */
@media(max-width:600px){
  .app-container{padding:24px 16px 100px}
  .app-title{font-size:1.5rem}
  .mood-station{top:10px;right:10px;padding:10px 14px;min-width:120px}
  .noise-panel{flex-wrap:wrap;justify-content:center;padding:16px;gap:10px}
  .noise-volume{margin-left:0;padding-left:0;border-left:none;border-top:1px solid var(--glass-border);padding-top:12px;width:100%;justify-content:center}
}
</style>
</head>
<body>

<!-- Ambient Background -->
<div class="ambient-bg">
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>
</div>

<!-- Mood Weather Station -->
<div class="mood-station" id="moodStation">
  <div class="mood-station-label">情绪气象站</div>
  <span class="mood-icon" id="moodIcon">☁️</span>
  <div class="mood-text" id="moodText">平静</div>
  <div class="mood-bar"><div class="mood-bar-fill" id="moodBar" style="width:0%;background:var(--accent)"></div></div>
</div>

<!-- Shred Overlay -->
<div class="shred-overlay" id="shredOverlay"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Noise Panel -->
<div class="noise-panel" id="noisePanel">
  <button class="noise-btn" data-noise="rain" onclick="toggleNoise('rain')">
    <span class="noise-btn-icon">🌧️</span>
    <span>雨声</span>
  </button>
  <button class="noise-btn" data-noise="fire" onclick="toggleNoise('fire')">
    <span class="noise-btn-icon">🔥</span>
    <span>篝火</span>
  </button>
  <button class="noise-btn" data-noise="cafe" onclick="toggleNoise('cafe')">
    <span class="noise-btn-icon">☕</span>
    <span>咖啡馆</span>
  </button>
  <div class="noise-volume">
    <span style="font-size:0.75rem;color:var(--text-secondary)">🔊</span>
    <input type="range" min="0" max="100" value="40" id="noiseVolume" oninput="setNoiseVolume(this.value)">
  </div>
</div>

<!-- Main App -->
<div class="app-container">
  <header class="app-header" id="appHeader">
    <h1 class="app-title">思绪折叠</h1>
    <p class="app-subtitle">M I N D F O L D</p>
  </header>

  <div class="input-area" id="inputArea">
    <div class="input-wrapper">
      <textarea class="input-field" id="inputField" placeholder="记录此刻的思绪...  (支持 #标签)" rows="1"></textarea>
      <button class="input-submit" id="submitBtn" title="添加">↵</button>
    </div>
    <div class="input-hint">Enter 添加 · Shift+Enter 换行</div>
  </div>

  <div class="toolbar" id="toolbar">
    <button class="toolbar-btn" onclick="toggleFocusMode()" id="focusBtn">🧘 专注</button>
    <button class="toolbar-btn" onclick="toggleNoisePanel()" id="noiseToggle">🎵 白噪音</button>
    <div class="export-dropdown">
      <button class="toolbar-btn" onclick="toggleExportMenu()">📦 导出</button>
      <div class="export-menu" id="exportMenu">
        <button class="export-option" onclick="exportAs('md')">导出为 Markdown (.md)</button>
        <button class="export-option" onclick="exportAs('json')">导出为 JSON (.json)</button>
      </div>
    </div>
    <span class="toolbar-spacer"></span>
    <button class="toolbar-btn danger" onclick="activateShredder()">🗑️ 数字碎纸机</button>
  </div>

  <div class="cards-container" id="cardsContainer"></div>
</div>

<script>
/* ===================================================================
   思绪折叠 MindFold — 纯前端思维记录工具
   所有数据存储于 LocalStorage，断网可用
   =================================================================== */

(function() {
'use strict';

/* ---------- Storage ---------- */
const STORAGE_KEY = 'mindfold_thoughts';
const SETTINGS_KEY = 'mindfold_settings';

function loadThoughts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { return []; }
}
function saveThoughts(thoughts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(thoughts));
}
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveSettings(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

/* ---------- State ---------- */
let thoughts = loadThoughts();
let settings = loadSettings();
let currentMood = { type: 'neutral', score: 0, label: '平静', icon: '☁️', color: 'var(--accent)' };
let focusMode = false;
let noisePanelOpen = false;
let exportMenuOpen = false;
let activeNoise = null;
let noiseGain = null;
let noiseCtx = null;

/* ---------- DOM Refs ---------- */
const $ = id => document.getElementById(id);
const inputField = $('inputField');
const submitBtn = $('submitBtn');
const cardsContainer = $('cardsContainer');
const moodStation = $('moodStation');
const moodIcon = $('moodIcon');
const moodText = $('moodText');
const moodBar = $('moodBar');
const shredOverlay = $('shredOverlay');
const toastEl = $('toast');
const noisePanel = $('noisePanel');

/* ---------- Auto-resize textarea ---------- */
inputField.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

/* ---------- Auto-focus ---------- */
window.addEventListener('load', () => {
  setTimeout(() => inputField.focus(), 100);
  renderAll();
  if (thoughts.length > 0) updateMoodStation();
});

/* ---------- Add Thought ---------- */
function addThought() {
  const text = inputField.value.trim();
  if (!text) return;

  const thought = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    text: text,
    tags: extractTags(text),
    mood: analyzeMood(text),
    time: new Date().toISOString()
  };

  thoughts.unshift(thought);
  saveThoughts(thoughts);

  inputField.value = '';
  inputField.style.height = 'auto';
  inputField.focus();

  renderAll();
  updateMoodStation();
  showToast('思绪已记录');
}

/* ---------- Tag Extraction ---------- */
function extractTags(text) {
  const matches = text.match(/#([\u4e00-\u9fa5a-zA-Z0-9_]+)/g);
  return matches ? matches.map(t => t.slice(1)) : [];
}

/* ---------- Highlight Tags in Text ---------- */
function highlightTags(text) {
  return text.replace(/#([\u4e00-\u9fa5a-zA-Z0-9_]+)/g, '<span class="tag">#$1</span>');
}

function analyzeMood(text) {
  const lower = text.toLowerCase();
  let scores = { positive: 0, anxious: 0, calm: 0, energy: 0 };

  for (const [mood, data] of Object.entries(moodKeywords)) {
    for (const word of data.words) {
      if (lower.includes(word.toLowerCase())) {
        scores[mood] += data.score;
      }
    }
  }

  // Exclamation marks boost
  const excl = (text.match(/[!！]{2,}/g) || []).length;
  if (excl > 0) {
    if (scores.anxious > scores.positive) scores.anxious += excl;
    else scores.positive += excl;
  }

  // Question marks slight anxiety
  const ques = (text.match(/[?？]{2,}/g) || []).length;
  if (ques > 0) scores.anxious += ques * 0.5;

  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  if (total === 0) return { type: 'neutral', score: 0 };

  const max = Math.max(...Object.values(scores));
  const type = Object.keys(scores).find(k => scores[k] === max);
  return { type, score: max / total };
}

const moodMeta = {
  positive: { label: '晴朗', icon: '☀️', color: 'var(--positive)' },
  anxious:  { label: '阴云', icon: '⛈️', color: 'var(--anxious)' },
  calm:     { label: '微风', icon: '🍃', color: 'var(--calm)' },
  energy:   { label: '雷暴', icon: '⚡', color: 'var(--energy)' },
  neutral:  { label: '平静', icon: '☁️', color: 'var(--accent)' }
};

function updateMoodStation() {
  if (thoughts.length === 0) {
    moodStation.classList.remove('visible');
    document.body.className = '';
    return;
  }

  // Aggregate mood from recent thoughts (last 20)
  const recent = thoughts.slice(0, 20);
  let agg = { positive: 0, anxious: 0, calm: 0, energy: 0, neutral: 0 };
  for (const t of recent) {
    agg[t.mood.type] = (agg[t.mood.type] || 0) + (t.mood.score || 0.3);
  }

  const total = Object.values(agg).reduce((a, b) => a + b, 0);
  let dominant = 'neutral';
  let maxScore = 0;
  for (const [k, v] of Object.entries(agg)) {
    if (v > maxScore) { maxScore = v; dominant = k; }
  }

  const meta = moodMeta[dominant] || moodMeta.neutral;
  currentMood = { ...meta, type: dominant, score: maxScore / total };

  moodIcon.textContent = meta.icon;
  moodText.textContent = meta.label;
  moodBar.style.width = Math.round(currentMood.score * 100) + '%';
  moodBar.style.background = meta.color;

  moodStation.classList.add('visible');

  // Dynamic background
  document.body.className = dominant !== 'neutral' ? 'mood-' + dominant : '';
}

/* ---------- Grouping Logic ---------- */
function groupThoughts(list) {
  if (list.length === 0) return { ungrouped: [], groups: [] };

  const tagMap = {};
  for (const t of list) {
    for (const tag of t.tags) {
      if (!tagMap[tag]) tagMap[tag] = [];
      tagMap[tag].push(t);
    }
  }

  // Only group tags with 2+ items
  const groups = [];
  const grouped = new Set();

  for (const [tag, items] of Object.entries(tagMap)) {
    if (items.length >= 2) {
      groups.push({ tag, items: items.sort((a, b) => new Date(b.time) - new Date(a.time)) });
      for (const item of items) grouped.add(item.id);
    }
  }

  const ungrouped = list.filter(t => !grouped.has(t.id));
  return { ungrouped, groups };
}

/* ---------- Render ---------- */
function renderAll() {
  const { ungrouped, groups } = groupThoughts(thoughts);
  let html = '';

  // Ungrouped cards
  for (const t of ungrouped) {
    html += renderCard(t);
  }

  // Grouped cards
  for (const g of groups) {
    html += renderGroup(g);
  }

  // Empty state
  if (thoughts.length === 0) {
    html = `
      <div class="empty-state">
        <div class="empty-icon">🧠</div>
        <div class="empty-text">
          这里还没有思绪<br>
          在上方输入框记录你的第一个想法吧
        </div>
      </div>`;
  }

  cardsContainer.innerHTML = html;
}

function renderCard(t) {
  const time = formatTime(t.time);
  const moodColor = moodMeta[t.mood.type]?.color || 'var(--accent)';
  const highlighted = highlightTags(escapeHtml(t.text));
  const tagsHtml = t.tags.map(tag => `<span class="thought-tag">#${escapeHtml(tag)}</span>`).join('');

  return `
    <div class="thought-card" data-id="${t.id}">
      <div class="thought-card-header">
        <span class="thought-time">${time}</span>
        <span class="thought-mood-dot" style="background:${moodColor}"></span>
      </div>
      <div class="thought-text">${highlighted}</div>
      ${tagsHtml ? `<div class="thought-tags">${tagsHtml}</div>` : ''}
      <div class="thought-card-footer">
        <button class="card-action delete" onclick="MindFold.deleteThought('${t.id}')">删除</button>
      </div>
    </div>`;
}

function renderGroup(g) {
  const cardsHtml = g.items.map(t => renderCard(t)).join('');
  return `
    <div class="group-card">
      <div class="group-header" onclick="MindFold.toggleGroup(this)">
        <div class="group-icon">#</div>
        <span class="group-name">${escapeHtml(g.tag)}</span>
        <span class="group-count">${g.items.length} 条</span>
        <span class="group-chevron">▼</span>
      </div>
      <div class="group-body">${cardsHtml}</div>
    </div>`;
}

/* ---------- Time Formatting ---------- */
function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;

  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
  if (diff < 604800000) return Math.floor(diff / 86400000) + ' 天前';

  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${mm}-${dd} ${hh}:${mi}`;
}

/* ---------- HTML Escape ---------- */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

  if (format === 'md') {
    content = '# 思绪折叠 MindFold 导出\n\n';

    for (const t of thoughts) {
      const time = new Date(t.time).toLocaleString('zh-CN');
      const tags = t.tags.length ? ' ' + t.tags.map(tag => `#${tag}`).join(' ') : '';
      content += `## ${time}${tags}\n\n${t.text}\n\n---\n\n`;
    }
    filename = `MindFold_${formatDate()}.md`;
    mime = 'text/markdown;charset=utf-8';
  } else {
    const data = {
      app: 'MindFold',
      version: '1.0',
      exported: new Date().toISOString(),
      thoughts: thoughts
    };
    content = JSON.stringify(data, null, 2);
    filename = `MindFold_${formatDate()}.json`;
    mime = 'application/json;charset=utf-8';
  }

  downloadFile(content, filename, mime);
  showToast('导出成功: ' + filename);
}

function downloadFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function formatDate() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

/* ---------- Digital Shredder ---------- */
MindFold.activateShredder = function() {
  if (thoughts.length === 0) {
    showToast('没有可清除的思绪');
    return;
  }

  // Build particles from thought texts
  const particles = [];
  for (const t of thoughts) {
    const words = t.text.split('');
    const chunkSize = Math.max(3, Math.ceil(words.length / 8));
    for (let i = 0; i < words.length; i += chunkSize) {
      particles.push(words.slice(i, i + chunkSize).join(''));
    }
  }

  shredOverlay.innerHTML = '';
  shredOverlay.classList.add('active');

  // Create particle elements
  const particleEls = [];
  particles.forEach((text, i) => {
    const el = document.createElement('div');
    el.className = 'shred-particle';
    el.textContent = text;
    el.style.left = (20 + Math.random() * 60) + '%';
    el.style.top = (10 + Math.random() * 30) + '%';
    el.style.fontSize = (0.5 + Math.random() * 0.5) + 'rem';
    el.style.opacity = '1';
    el.style.transition = `all ${1 + Math.random() * 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
    el.style.transitionDelay = (Math.random() * 0.8) + 's';
    shredOverlay.appendChild(el);
    particleEls.push(el);
  });

  // Animate
  requestAnimationFrame(() => {
    particleEls.forEach(el => {
      el.style.top = (70 + Math.random() * 30) + '%';
      el.style.left = (Math.random() * 100) + '%';
      el.style.opacity = '0';
      el.style.transform = `rotate(${(Math.random() - 0.5) * 720}deg) scale(0.3)`;
    });
  });

  // Clear data after animation
  setTimeout(() => {
    thoughts = [];
    saveThoughts(thoughts);
    localStorage.removeItem(STORAGE_KEY);
    renderAll();
    updateMoodStation();
    shredOverlay.classList.remove('active');
    showToast('所有思绪已彻底清除');
  }, 3000);
};
window.activateShredder = MindFold.activateShredder;

/* ---------- White Noise Engine (Web Audio API) ---------- */
function getAudioCtx() {
  if (!noiseCtx) {
    noiseCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (noiseCtx.state === 'suspended') noiseCtx.resume();
  return noiseCtx;
}

function createNoiseBuffer(ctx, type) {
  const sampleRate = ctx.sampleRate;
  const length = sampleRate * 4; // 4 seconds, looped
  const buffer = ctx.createBuffer(2, length, sampleRate);

  for (let ch = 0; ch < 2; ch++) {
    const data = buffer.getChannelData(ch);

    if (type === 'rain') {
      // Brown noise + occasional pops for rain
      let last = 0;
      for (let i = 0; i < length; i++) {
        const white = Math.random() * 2 - 1;
        last = (last + 0.02 * white) / 1.02;
        data[i] = last * 3.5;
        // Rain drops
        if (Math.random() < 0.0003) {
          const freq = 2000 + Math.random() * 4000;
          const t = i / sampleRate;
          data[i] += Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * 30) * 0.15;
        }
      }
    } else if (type === 'fire') {
      // Crackling fire: filtered noise with bursts
      let last = 0;
      for (let i = 0; i < length; i++) {
        const white = Math.random() * 2 - 1;
        last = (last + 0.04 * white) / 1.04;
        data[i] = last * 2.5;
        // Crackles
        if (Math.random() < 0.00015) {
          const burstLen = Math.floor(sampleRate * (0.005 + Math.random() * 0.015));
          for (let j = 0; j < burstLen && (i + j) < length; j++) {
            data[i + j] += (Math.random() * 2 - 1) * Math.exp(-j / (burstLen * 0.3)) * 0.4;
          }
        }
      }
    } else if (type === 'cafe') {
      // Pink noise + murmur simulation
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < length; i++) {
        const white = Math.random() * 2 - 1;
        b0 = 0.99886*b0 + white*0.0555179;
        b1 = 0.99332*b1 + white*0.0750759;
        b2 = 0.96900*b2 + white*0.1538520;
        b3 = 0.86650*b3 + white*0.3104856;
        b4 = 0.55000*b4 + white*0.5329522;
        b5 = -0.7616*b5 - white*0.0168980;
        data[i] = (b0+b1+b2+b3+b4+b5+b6+white*0.5362) * 0.08;
        b6 = white * 0.115926;
        // Murmur modulation
        data[i] *= 0.7 + 0.3 * Math.sin(2 * Math.PI * (0.3 + Math.random() * 0.2) * i / sampleRate);
      }
    }
  }
  return buffer;
}

let noiseSource = null;
let noiseGainNode = null;

function toggleNoise(type) {
  const ctx = getAudioCtx();

  if (activeNoise === type) {
    // Stop
    if (noiseSource) { noiseSource.stop(); noiseSource = null; }
    activeNoise = null;
    document.querySelectorAll('.noise-btn').forEach(b => b.classList.remove('active'));
    return;
  }

  // Stop previous
  if (noiseSource) { noiseSource.stop(); noiseSource = null; }

  activeNoise = type;
  document.querySelectorAll('.noise-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.noise === type);
  });

  const buffer = createNoiseBuffer(ctx, type);
  noiseSource = ctx.createBufferSource();
  noiseSource.buffer = buffer;
  noiseSource.loop = true;

  noiseGainNode = ctx.createGain();
  const vol = parseInt($('noiseVolume').value) / 100;
  noiseGainNode.gain.value = vol * 0.5;

  noiseSource.connect(noiseGainNode);
  noiseGainNode.connect(ctx.destination);
  noiseSource.start();
}
window.toggleNoise = toggleNoise;

function setNoiseVolume(val) {
  if (noiseGainNode) {
    noiseGainNode.gain.value = (parseInt(val) / 100) * 0.5;
  }
}
window.setNoiseVolume = setNoiseVolume;

function toggleNoisePanel() {
  noisePanelOpen = !noisePanelOpen;
  noisePanel.classList.toggle('visible', noisePanelOpen);
  if (exportMenuOpen) { exportMenuOpen = false; $('exportMenu').classList.remove('open'); }
}
window.toggleNoisePanel = toggleNoisePanel;

/* ---------- Click blank to focus mode ---------- */
document.addEventListener('click', function(e) {
  if (focusMode && !e.target.closest('.input-area') && !e.target.closest('.thought-card') && !e.target.closest('.group-card')) {
    // In focus mode, clicking blank does nothing extra
    return;
  }
});

/* ---------- Keyboard Shortcuts ---------- */
document.addEventListener('keydown', function(e) {
  // Escape to exit focus mode
  if (e.key === 'Escape' && focusMode) {
    MindFold.toggleFocusMode();
  }
  // Ctrl/Cmd + Enter to toggle focus
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    MindFold.toggleFocusMode();
  }
});

/* ---------- Drag to reorder (bonus) ---------- */
let dragSrcId = null;
cardsContainer.addEventListener('dragstart', function(e) {
  const card = e.target.closest('.thought-card');
  if (!card) return;
  dragSrcId = card.dataset.id;
  card.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
});
cardsContainer.addEventListener('dragend', function(e) {
  const card = e.target.closest('.thought-card');
  if (card) card.style.opacity = '1';
  dragSrcId = null;
});
cardsContainer.addEventListener('dragover', function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
});
cardsContainer.addEventListener('drop', function(e) {
  e.preventDefault();
  const card = e.target.closest('.thought-card');
  if (!card || !dragSrcId || card.dataset.id === dragSrcId) return;

  const fromIdx = thoughts.findIndex(t => t.id === dragSrcId);
  const toIdx = thoughts.findIndex(t => t.id === card.dataset.id);
  if (fromIdx < 0 || toIdx < 0) return;

  const [moved] = thoughts.splice(fromIdx, 1);
  thoughts.splice(toIdx, 0, moved);
  saveThoughts(thoughts);
  renderAll();
});

// Make cards draggable
const observer = new MutationObserver(() => {
  document.querySelectorAll('.thought-card').forEach(c => c.setAttribute('draggable', 'true'));
});
observer.observe(cardsContainer, { childList: true, subtree: true });

})();
</script>
