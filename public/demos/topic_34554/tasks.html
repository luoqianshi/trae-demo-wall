<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵伴成长 - 选择任务</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8F3;
      --bg2: #FFF0E6;
      --ink: #2D2A32;
      --muted: #7A7580;
      --rule: #E8DDD5;
      --accent: #FF6B6B;
      --accent2: #4ECDC4;
      --accent3: #FFE66D;
      --accent4: #A8E6CF;
      --font: 'Noto Sans SC', -apple-system, sans-serif;
      --radius: 24px;
      --radius-sm: 16px;
      --shadow: 0 4px 20px rgba(45, 42, 50, 0.08);
      --shadow-lg: 0 8px 40px rgba(45, 42, 50, 0.12);
      --shadow-xl: 0 12px 60px rgba(45, 42, 50, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg) 0%, #E8F5E9 50%, var(--bg2) 100%);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
      padding-bottom: 120px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      animation: fadeInDown 0.8s ease;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
      text-decoration: none;
      color: var(--ink);
      box-shadow: var(--shadow);
    }
    .back-btn:hover {
      border-color: var(--accent);
      transform: translateX(-4px) scale(1.1);
      box-shadow: var(--shadow-lg);
    }
    .header-title {
      font-size: 1.4rem;
      font-weight: 900;
    }

    /* 任务类型标签 */
    .task-type-tabs {
      display: flex;
      gap: 0.5rem;
      margin: 1rem 0;
      overflow-x: auto;
      padding: 0.5rem 0;
      animation: fadeInUp 0.8s ease 0.2s both;
    }
    .type-tab {
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid var(--rule);
      background: #fff;
      white-space: nowrap;
      color: var(--muted);
    }
    .type-tab:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .type-tab.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
    }

    /* Task Grid */
    .task-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.8rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.8s ease 0.3s both;
    }
    .task-title {
      font-size: 1.2rem;
      font-weight: 900;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .task-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
    }
    .task-item {
      background: linear-gradient(135deg, var(--bg), #fff);
      border: 3px solid var(--rule);
      border-radius: var(--radius-sm);
      padding: 1.8rem 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }
    .task-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .task-item:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--accent);
      box-shadow: var(--shadow-xl);
    }
    .task-item:hover::before {
      opacity: 1;
    }
    .task-item.selected {
      border-color: var(--accent);
      background: linear-gradient(135deg, #FFF5F5, #FFF0E6);
      box-shadow: 0 8px 30px rgba(255, 107, 107, 0.25);
      transform: translateY(-4px) scale(1.02);
    }
    .task-item.selected::after {
      content: '✓';
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 900;
      animation: checkPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes checkPop {
      0% { transform: scale(0); }
      70% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .task-icon {
      font-size: 3rem;
      margin-bottom: 0.6rem;
      display: block;
      transition: all 0.3s;
    }
    .task-item:hover .task-icon {
      transform: scale(1.2) rotate(-5deg);
    }
    .task-name {
      font-weight: 900;
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
    }
    .task-xp {
      font-size: 0.95rem;
      color: var(--accent);
      font-weight: 900;
      background: linear-gradient(135deg, #FFF5F5, #FFF0E6);
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 10px;
      margin-bottom: 0.5rem;
    }
    .task-desc {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.5rem;
      line-height: 1.5;
    }
    /* 难度标签 */
    .task-difficulty {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.75rem;
      margin-top: 0.5rem;
      font-weight: 500;
    }
    .difficulty-easy { color: #4ECDC4; }
    .difficulty-medium { color: #FFA500; }
    .difficulty-hard { color: #FF6B6B; }

    /* 推荐卡片 */
    .recommend-card {
      background: linear-gradient(135deg, #F0FFFD, #FFF8F3);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1rem 0;
      border: 2px dashed var(--accent2);
      animation: fadeInUp 0.8s ease 0.4s both;
      position: relative;
      overflow: hidden;
    }
    .recommend-card::before {
      content: '✨';
      position: absolute;
      top: -10px;
      right: 10px;
      font-size: 3rem;
      opacity: 0.2;
      animation: float 3s ease-in-out infinite;
    }
    .recommend-title {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .recommend-text {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .recommend-text strong {
      color: var(--accent);
    }
    .recommend-btn {
      margin-top: 1rem;
      padding: 0.7rem 1.5rem;
      background: linear-gradient(135deg, var(--accent2), var(--accent4));
      color: var(--ink);
      border: none;
      border-radius: 12px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .recommend-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    /* 成就进度 */
    .achievement-progress {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.8s ease 0.5s both;
    }
    .achievement-progress-title {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .achievement-track {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .achievement-node {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      background: var(--bg2);
      border: 3px solid var(--rule);
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .achievement-node.completed {
      background: linear-gradient(135deg, var(--accent3), var(--accent4));
      border-color: var(--accent3);
      animation: nodePop 0.5s ease;
    }
    @keyframes nodePop {
      0% { transform: scale(0); }
      70% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .achievement-line {
      flex: 1;
      height: 4px;
      background: var(--rule);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .achievement-line-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--accent3), var(--accent4));
      border-radius: 2px;
      transition: width 1s ease;
    }
    .achievement-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Selected Task Bar */
    .selected-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #fff, var(--bg));
      border-top: 2px solid var(--rule);
      padding: 1rem 1.5rem;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      z-index: 100;
      backdrop-filter: blur(10px);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .selected-bar.show {
      display: flex;
    }
    .selected-info {
      flex: 1;
    }
    .selected-label {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .selected-task {
      font-weight: 900;
      color: var(--accent);
      font-size: 1.1rem;
    }
    .next-btn {
      padding: 0.9rem 2.2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: var(--font);
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
      animation: btnPulse 2s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3); }
      50% { box-shadow: 0 4px 30px rgba(255, 107, 107, 0.45); }
    }
    .next-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 30px rgba(255, 107, 107, 0.4);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .task-grid { grid-template-columns: 1fr; }
      .task-item { padding: 1.5rem 1rem; }
      .achievement-track { gap: 0.3rem; }
      .achievement-node { width: 32px; height: 32px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="back-btn">←</a>
      <div class="header-title">选择学习任务</div>
    </div>

    <div class="task-type-tabs">
      <button class="type-tab active" onclick="filterTasks('all')">全部</button>
      <button class="type-tab" onclick="filterTasks('reading')">📖 阅读</button>
      <button class="type-tab" onclick="filterTasks('math')">🔢 数学</button>
      <button class="type-tab" onclick="filterTasks('writing')">✏️ 书写</button>
      <button class="type-tab" onclick="filterTasks('art')">🎨 创意</button>
    </div>

    <div class="task-card">
      <div class="task-title">📝 今天想学什么？</div>
      <div class="task-grid" id="taskGrid">
        <div class="task-item" data-type="reading" onclick="selectTask(this)">
          <div class="task-icon">📖</div>
          <div class="task-name">阅读打卡</div>
          <div class="task-xp">+30 XP</div>
          <div class="task-desc">上传阅读的书本或笔记</div>
          <div class="task-difficulty difficulty-easy">⭐ 简单</div>
        </div>
        <div class="task-item" data-type="math" onclick="selectTask(this)">
          <div class="task-icon">🔢</div>
          <div class="task-name">数学练习</div>
          <div class="task-xp">+25 XP</div>
          <div class="task-desc">上传数学作业或练习</div>
          <div class="task-difficulty difficulty-medium">⭐⭐ 中等</div>
        </div>
        <div class="task-item" data-type="writing" onclick="selectTask(this)">
          <div class="task-icon">✏️</div>
          <div class="task-name">书写作业</div>
          <div class="task-xp">+20 XP</div>
          <div class="task-desc">上传写字或作文作业</div>
          <div class="task-difficulty difficulty-easy">⭐ 简单</div>
        </div>
        <div class="task-item" data-type="art" onclick="selectTask(this)">
          <div class="task-icon">🎨</div>
          <div class="task-name">创意手工</div>
          <div class="task-xp">+35 XP</div>
          <div class="task-desc">上传绘画或手工作品</div>
          <div class="task-difficulty difficulty-medium">⭐⭐ 中等</div>
        </div>
      </div>
    </div>

    <div class="recommend-card" id="smartRecommend">
      <div class="recommend-title">💡 智能推荐</div>
      <div class="recommend-text">
        分析你最近的学习记录中...
      </div>
      <button class="recommend-btn" onclick="selectRecommended()">🎯 接受推荐</button>
    </div>

    <div class="achievement-progress">
      <div class="achievement-progress-title">🏆 今日挑战进度</div>
      <div class="achievement-track">
        <div class="achievement-node completed">📖</div>
        <div class="achievement-line">
          <div class="achievement-line-fill" style="width: 50%"></div>
        </div>
        <div class="achievement-node">🔢</div>
        <div class="achievement-line">
          <div class="achievement-line-fill" style="width: 0%"></div>
        </div>
        <div class="achievement-node">✏️</div>
        <div class="achievement-line">
          <div class="achievement-line-fill" style="width: 0%"></div>
        </div>
        <div class="achievement-node">🎨</div>
        <div class="achievement-line">
          <div class="achievement-line-fill" style="width: 0%"></div>
        </div>
        <div class="achievement-node">🏆</div>
      </div>
      <div class="achievement-labels">
        <span>阅读</span>
        <span>数学</span>
        <span>书写</span>
        <span>创意</span>
        <span>全勤奖</span>
      </div>
    </div>
  </div>

  <div class="selected-bar" id="selectedBar">
    <div class="selected-info">
      <div class="selected-label">已选择</div>
      <div class="selected-task" id="selectedTaskName">阅读打卡</div>
    </div>
    <a href="upload.html" class="next-btn" id="nextBtn">下一步 →</a>
  </div>

  <script src="js/core.js"></script>
  <script>
    let selectedType = '';
    let recommendedType = '';

    // 加载智能推荐
    const data = MemorySystem.getData();
    const recentTypes = data.taskHistory.slice(0, 5).map(t => t.type);
    const allTypes = Object.keys(SPIRIT_CONFIG.taskTypes);
    const missing = allTypes.find(t => !recentTypes.includes(t));
    
    const recommendEl = document.getElementById('smartRecommend');
    if (missing) {
      recommendedType = missing;
      const task = SPIRIT_CONFIG.taskTypes[missing];
      recommendEl.querySelector('.recommend-text').innerHTML = `
        <strong>🎯 推荐尝试：</strong>你最近做了很多${recentTypes.map(t => SPIRIT_CONFIG.taskTypes[t].name).join('、')}，<br>
        要不要试试<strong>${task.name}</strong>？完成可获得<strong>${task.baseXP}</strong>点经验值！
      `;
    } else {
      recommendEl.querySelector('.recommend-text').innerHTML = `
        <strong>🌟 太棒了！</strong>你最近学习很全面，所有类型的任务都尝试过了。<br>
        继续加油，让精灵快点进化吧！
      `;
      recommendEl.querySelector('.recommend-btn').style.display = 'none';
    }

    function selectRecommended() {
      if (recommendedType) {
        const item = document.querySelector(`[data-type="${recommendedType}"]`);
        if (item) selectTask(item);
      }
    }

    function selectTask(el) {
      document.querySelectorAll('.task-item').forEach(item => item.classList.remove('selected'));
      el.classList.add('selected');
      selectedType = el.dataset.type;
      
      const task = SPIRIT_CONFIG.taskTypes[selectedType];
      document.getElementById('selectedTaskName').textContent = `${task.name} (+${task.baseXP} XP)`;
      document.getElementById('selectedBar').classList.add('show');
      
      // 保存选择到 sessionStorage
      sessionStorage.setItem('selectedTask', selectedType);
    }

    function filterTasks(type) {
      document.querySelectorAll('.type-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      
      document.querySelectorAll('.task-item').forEach(item => {
        if (type === 'all' || item.dataset.type === type) {
          item.style.display = 'block';
          item.style.animation = 'fadeInUp 0.5s ease both';
        } else {
          item.style.display = 'none';
        }
      });
    }

    // 下一步按钮
    document.getElementById('nextBtn').addEventListener('click', (e) => {
      if (!selectedType) {
        e.preventDefault();
        alert('请先选择一个任务类型！');
      }
    });
  </script>
</body>
</html>
