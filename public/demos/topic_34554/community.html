<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵伴成长 - 社区</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8F3;
      --bg2: #FFF0E6;
      --ink: #2D2A32;
      --muted: #7A7580;
      --rule: #E8DDD5;
      --accent: #FF6B6B;
      --accent2: #4ECDC4;
      --accent3: #FFE66D;
      --accent4: #A8E6CF;
      --font: 'Noto Sans SC', -apple-system, sans-serif;
      --radius: 24px;
      --radius-sm: 16px;
      --shadow: 0 4px 20px rgba(45, 42, 50, 0.08);
      --shadow-lg: 0 8px 40px rgba(45, 42, 50, 0.12);
      --shadow-xl: 0 12px 60px rgba(45, 42, 50, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg) 0%, #FCE4EC 50%, var(--bg2) 100%);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      animation: fadeInDown 0.8s ease;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
      text-decoration: none;
      color: var(--ink);
      box-shadow: var(--shadow);
    }
    .back-btn:hover {
      border-color: var(--accent);
      transform: translateX(-4px) scale(1.1);
      box-shadow: var(--shadow-lg);
    }
    .header-title {
      font-size: 1.4rem;
      font-weight: 900;
    }

    /* 故事栏 */
    .stories-bar {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding: 1rem 0;
      margin-bottom: 0.5rem;
      animation: fadeInUp 0.8s ease 0.2s both;
    }
    .story-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      min-width: 70px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .story-item:hover {
      transform: scale(1.1);
    }
    .story-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: 3px solid #fff;
      box-shadow: var(--shadow);
      position: relative;
    }
    .story-avatar::after {
      content: '';
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 14px;
      height: 14px;
      background: #07C160;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .story-name {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }
    .story-item.my-story .story-avatar {
      background: linear-gradient(135deg, var(--accent3), var(--accent4));
      border: 3px dashed var(--accent);
    }
    .story-item.my-story .story-avatar::after {
      content: '+';
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 900;
    }

    /* Post Input */
    .post-input-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.8s ease 0.3s both;
    }
    .post-input {
      width: 100%;
      padding: 1rem;
      border: 2px solid var(--rule);
      border-radius: 16px;
      font-family: var(--font);
      font-size: 1rem;
      resize: none;
      outline: none;
      transition: all 0.3s;
      font-weight: 500;
    }
    .post-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
    }
    .post-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
    }
    .post-hint {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }
    .post-btn {
      padding: 0.8rem 2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
      animation: btnPulse 2s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3); }
      50% { box-shadow: 0 4px 30px rgba(255, 107, 107, 0.45); }
    }
    .post-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 30px rgba(255, 107, 107, 0.4);
    }

    /* Posts Feed */
    .posts-feed {
      margin: 1rem 0;
    }
    .post-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      animation: fadeInUp 0.8s ease both;
    }
    .post-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    .post-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .post-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      background: var(--bg2);
      border: 2px solid var(--rule);
      transition: all 0.3s;
    }
    .post-card:hover .post-avatar {
      transform: scale(1.1);
      border-color: var(--accent2);
    }
    .post-info {
      flex: 1;
    }
    .post-user {
      font-weight: 900;
      font-size: 1rem;
    }
    .post-meta {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
    }
    .post-spirit {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: linear-gradient(135deg, var(--bg2), var(--bg));
      padding: 0.2rem 0.6rem;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .wechat-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      background: linear-gradient(135deg, #07C160, #05a350);
      color: #fff;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 900;
    }
    .post-content {
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 1rem;
      padding-left: 64px;
      font-weight: 500;
    }
    .post-image {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 1rem;
      margin-left: 64px;
      max-width: calc(100% - 64px);
      box-shadow: var(--shadow);
      transition: all 0.3s;
    }
    .post-image:hover {
      transform: scale(1.02);
      box-shadow: var(--shadow-lg);
    }
    .post-xp {
      display: inline-block;
      background: linear-gradient(135deg, #FFF5F5, #FFF0E6);
      color: var(--accent);
      padding: 0.3rem 0.8rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 900;
      margin-bottom: 1rem;
      margin-left: 64px;
    }
    .post-actions-bar {
      display: flex;
      gap: 1rem;
      padding-left: 64px;
      border-top: 1px solid var(--rule);
      padding-top: 1rem;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--muted);
      font-weight: 500;
    }
    .action-btn:hover {
      background: var(--bg);
      transform: translateY(-2px);
    }
    .action-btn.liked {
      color: var(--accent);
      background: #FFF5F5;
      animation: likePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes likePop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .action-btn .icon {
      font-size: 1.2rem;
      transition: all 0.3s;
    }
    .action-btn:hover .icon {
      transform: scale(1.2);
    }
    .action-btn .count {
      font-weight: 900;
    }

    /* Points Toast */
    .points-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      padding: 1rem 2rem;
      border-radius: 14px;
      font-weight: 900;
      font-size: 1.1rem;
      box-shadow: var(--shadow-xl);
      z-index: 1000;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .points-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 热门话题 */
    .trending-topics {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.8s ease 0.4s both;
    }
    .topics-title {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .topic-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .topic-tag {
      padding: 0.4rem 1rem;
      background: var(--bg);
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid var(--rule);
    }
    .topic-tag:hover {
      border-color: var(--accent);
      background: #FFF5F5;
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .post-content, .post-xp, .post-actions-bar, .post-image {
        padding-left: 0;
        margin-left: 0;
        max-width: 100%;
      }
      .story-avatar { width: 50px; height: 50px; font-size: 1.5rem; }
    }
  </style>
</head>

    const data = MemorySystem.getData();
    // 合并模拟数据
    if (!data.communityPosts || data.communityPosts.length < 6) {
      data.communityPosts = demoPosts;
      MemorySystem.saveData(data);
    }
    const postsFeed = document.getElementById('postsFeed');

    function renderPosts() {
      postsFeed.innerHTML = '';
      
      data.communityPosts.forEach((post, index) => {
        const postCard = document.createElement('div');
        postCard.className = 'post-card';
        postCard.style.animationDelay = `${index * 0.1}s`;
        
        let imageHtml = '';
        if (post.image) {
          imageHtml = `<img class="post-image" src="${post.image}" alt="学习成果">`;
        }
        
        postCard.innerHTML = `
          <div class="post-header">
            <div class="post-avatar">${post.avatar}</div>
            <div class="post-info">
              <div class="post-user">${post.user} ${post.isWechatFriend ? '<span class="wechat-badge">💬 微信好友</span>' : ''}</div>
              <div class="post-meta">
                <span class="post-spirit">${post.spirit}</span>
                <span>${post.time}</span>
              </div>
            </div>
          </div>
          <div class="post-content">${post.content}</div>
          ${imageHtml}
          <div class="post-xp">+${post.xp} XP</div>
          <div class="post-actions-bar">
            <button class="action-btn ${post.liked ? 'liked' : ''}" onclick="likePost(${post.id})" ${post.liked ? 'disabled' : ''}>

            </button>

            </button>
            <button class="action-btn">

            </button>
          </div>
        `;
        
        postsFeed.appendChild(postCard);

    function likePost(postId) {
      const result = MemorySystem.likePost(postId);
      
      if (result.success) {
        // Show toast
        const toast = document.getElementById('pointsToast');
        toast.textContent = `+${result.points} 积分！+${result.xp} 精灵经验！`;
        toast.classList.add('show');
        
        setTimeout(() => {
          toast.classList.remove('show');
        }, 2000);
        
        // Re-render
        renderPosts();
      }
    }

    function publishPost() {
      const content = document.getElementById('postInput').value.trim();
      if (!content) {
        alert('请输入内容！');
        return;
      }

      const newPost = {
        id: Date.now(),
        user: data.userProfile.nickname || '我',
        avatar: '👤',
        spirit: data.spirit.name,
        content: content,
        xp: 0,
        likes: 0,
        liked: false,
        time: '刚刚',
        image: null
      };

      data.communityPosts.unshift(newPost);
      MemorySystem.saveData(data);
      
      document.getElementById('postInput').value = '';
      renderPosts();
      
      // Show toast
      const toast = document.getElementById('pointsToast');
      toast.textContent = '发布成功！';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Initial render
    renderPosts();
  </script>
</body>
</html>
