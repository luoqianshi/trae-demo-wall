<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵伴成长 - 个人中心</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8F3;
      --bg2: #FFF0E6;
      --ink: #2D2A32;
      --muted: #7A7580;
      --rule: #E8DDD5;
      --accent: #FF6B6B;
      --accent2: #4ECDC4;
      --accent3: #FFE66D;
      --accent4: #A8E6CF;
      --font: 'Noto Sans SC', -apple-system, sans-serif;
      --radius: 24px;
      --radius-sm: 16px;
      --shadow: 0 4px 20px rgba(45, 42, 50, 0.08);
      --shadow-lg: 0 8px 40px rgba(45, 42, 50, 0.12);
      --shadow-xl: 0 12px 60px rgba(45, 42, 50, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg) 0%, #E3F2FD 50%, var(--bg2) 100%);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      animation: fadeInDown 0.8s ease;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
      text-decoration: none;
      color: var(--ink);
      box-shadow: var(--shadow);
    }
    .back-btn:hover {
      border-color: var(--accent);
      transform: translateX(-4px) scale(1.1);
      box-shadow: var(--shadow-lg);
    }
    .header-title {
      font-size: 1.4rem;
      font-weight: 900;
    }

    /* Profile Card */
    .profile-card {
      background: linear-gradient(135deg, #fff, var(--bg));
      border-radius: var(--radius);
      padding: 2.5rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-xl);
      text-align: center;
      animation: fadeInUp 0.8s ease 0.2s both;
      position: relative;
      overflow: hidden;
    }
    .profile-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,107,107,0.05) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      margin: 0 auto 1rem;
      box-shadow: 0 6px 25px rgba(255, 107, 107, 0.35);
      position: relative;
      z-index: 1;
      animation: avatarPulse 3s ease-in-out infinite;
    }
    @keyframes avatarPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 6px 25px rgba(255, 107, 107, 0.35); }
      50% { transform: scale(1.05); box-shadow: 0 8px 35px rgba(255, 107, 107, 0.5); }
    }
    .nickname {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      position: relative;
      z-index: 1;
    }
    .user-id {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
      font-weight: 500;
    }
    .points-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--accent3), var(--accent4));
      padding: 0.6rem 1.5rem;
      border-radius: 25px;
      font-weight: 900;
      font-size: 1.1rem;
      position: relative;
      z-index: 1;
      box-shadow: var(--shadow);
      animation: badgeBounce 2s ease-in-out infinite;
    }
    @keyframes badgeBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 1rem 0;
    }
    .stat-card {
      background: #fff;
      border-radius: var(--radius-sm);
      padding: 1.4rem;
      text-align: center;
      box-shadow: var(--shadow-lg);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s ease both;
    }
    .stat-card:nth-child(1) { animation-delay: 0.3s; }
    .stat-card:nth-child(2) { animation-delay: 0.4s; }
    .stat-card:nth-child(3) { animation-delay: 0.5s; }
    .stat-card:nth-child(4) { animation-delay: 0.6s; }
    .stat-card:nth-child(5) { animation-delay: 0.7s; }
    .stat-card:nth-child(6) { animation-delay: 0.8s; }
    .stat-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: var(--shadow-xl);
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .stat-card:hover::before {
      opacity: 1;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      display: block;
      animation: countUp 0.8s ease;
    }
    @keyframes countUp {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .stat-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.4rem;
      font-weight: 500;
    }

    /* 数据可视化 - 周学习趋势 */
    .chart-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.8rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.8s ease 0.9s both;
    }
    .chart-title {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chart-container {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 0.8rem;
      height: 180px;
      padding: 1rem 0;
    }
    .chart-bar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .chart-bar {
      width: 100%;
      max-width: 50px;
      border-radius: 10px 10px 0 0;
      background: linear-gradient(to top, var(--accent), var(--accent2));
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      min-height: 4px;
    }
    .chart-bar:hover {
      filter: brightness(1.1);
      transform: scaleX(1.1);
    }
    .chart-bar-value {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      font-weight: 900;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .chart-bar:hover .chart-bar-value {
      opacity: 1;
    }
    .chart-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
    }
    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    /* Achievements */
    .achievement-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.8rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.8s ease 1s both;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .achievement-item {
      text-align: center;
      padding: 1.2rem;
      background: var(--bg);
      border-radius: var(--radius-sm);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }
    .achievement-item:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: var(--shadow);
    }
    .achievement-item.unlocked {
      background: linear-gradient(135deg, #FFF5F5, #FFF8F3);
      border: 2px solid var(--accent);
    }
    .achievement-item.unlocked::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .achievement-icon {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      display: block;
      transition: all 0.3s;
    }
    .achievement-item:hover .achievement-icon {
      transform: scale(1.2) rotate(-10deg);
    }
    .achievement-name {
      font-size: 0.85rem;
      font-weight: 700;
    }
    .achievement-item.locked {
      opacity: 0.5;
      filter: grayscale(1);
    }
    .achievement-item.locked .achievement-icon {
      filter: grayscale(1);
    }

    /* Settings */
    .settings-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.8rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.8s ease 1.1s both;
    }
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .setting-item:last-child {
      border-bottom: none;
    }
    .setting-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .setting-value {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .btn {
      padding: 0.7rem 1.4rem;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-danger {
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
    }
    .btn-danger:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }
    .name-input-inline {
      padding: 0.6rem 1rem;
      border: 2px solid var(--rule);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
      width: 150px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .name-input-inline:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
    }
    .wechat-card {
      background: linear-gradient(135deg, #fff, #f0fff4);
      border-radius: var(--radius);
      padding: 1.8rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-lg);
      border: 2px solid #e8f5e9;
      animation: fadeInUp 0.8s ease 1.2s both;
    }
    .wechat-status {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .wechat-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #07C160, #05a350);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #fff;
      box-shadow: var(--shadow);
    }
    .wechat-info {
      flex: 1;
    }
    .wechat-name {
      font-weight: 900;
      font-size: 1.05rem;
    }
    .wechat-bind {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }
    .friend-list {
      display: flex;
      gap: 0.8rem;
      overflow-x: auto;
      padding: 0.5rem 0;
    }
    .friend-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      min-width: 60px;
      transition: all 0.3s;
    }
    .friend-item:hover {
      transform: translateY(-4px);
    }
    .friend-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: var(--bg2);
      border: 2px solid var(--rule);
      transition: all 0.3s;
    }
    .friend-item:hover .friend-avatar {
      border-color: var(--accent2);
      transform: scale(1.1);
    }
    .friend-name {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .achievement-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-container { height: 150px; }
      .chart-bar { max-width: 35px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="back-btn">←</a>
      <div class="header-title">个人中心</div>
    </div>

    <div class="profile-card">
      <div class="avatar" id="userAvatar">👤</div>
      <div class="nickname" id="userNickname">小朋友</div>
      <div class="user-id">ID: SB_2024_001</div>
      <div class="points-badge">
        <span>💎</span>
        <span id="userPoints">100 积分</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-number" id="totalTasks">12</span>
        <span class="stat-label">完成任务</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="totalXP">355</span>
        <span class="stat-label">累计 XP</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="totalLikes">0</span>
        <span class="stat-label">获得点赞</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="streakDays">3</span>
        <span class="stat-label">连续打卡</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="unlockedSpirits">1</span>
        <span class="stat-label">解锁精灵</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="chatSessions">0</span>
        <span class="stat-label">对话次数</span>
      </div>
    </div>

    <!-- 数据可视化 - 周学习趋势 -->
    <div class="chart-card">
      <div class="chart-title">📊 本周学习趋势</div>
      <div class="chart-container" id="chartContainer">
        <!-- 柱状图由JS生成 -->
      </div>
      <div class="chart-legend">
        <div class="legend-item">
          <div class="legend-dot"></div>
          <span>获得经验值 (XP)</span>
        </div>
      </div>
    </div>

    <div class="wechat-card">
      <div class="card-title">💬 微信关联</div>
      <div class="wechat-status" id="wechatStatus">
        <div class="wechat-icon">💬</div>
        <div class="wechat-info">
          <div class="wechat-name" id="wechatName">未绑定微信</div>
          <div class="wechat-bind" id="wechatBind">绑定微信后，可与微信好友一起学习</div>
        </div>
        <button class="btn btn-primary" id="wechatBtn" onclick="bindWechat()">绑定微信</button>
      </div>
      <div id="friendSection" style="display:none;">
        <div style="font-size: 0.9rem; font-weight: 900; margin-bottom: 0.5rem;">微信好友也在学</div>
        <div class="friend-list" id="friendList">
          <div class="friend-item">
            <div class="friend-avatar">👦</div>
            <div class="friend-name">小明</div>
          </div>
          <div class="friend-item">
            <div class="friend-avatar">👧</div>
            <div class="friend-name">小红</div>
          </div>
          <div class="friend-item">
            <div class="friend-avatar">👦</div>
            <div class="friend-name">小刚</div>
          </div>
          <div class="friend-item">
            <div class="friend-avatar">👧</div>
            <div class="friend-name">小美</div>
          </div>
          <div class="friend-item">
            <div class="friend-avatar">👦</div>
            <div class="friend-name">小华</div>
          </div>
        </div>
      </div>
    </div>

    <div class="achievement-card">
      <div class="card-title">🏆 成就徽章</div>
      <div class="achievement-grid" id="achievementGrid">
        <div class="achievement-item unlocked">
          <div class="achievement-icon">🌱</div>
          <div class="achievement-name">初次萌芽</div>
        </div>
        <div class="achievement-item unlocked">
          <div class="achievement-icon">📖</div>
          <div class="achievement-name">阅读达人</div>
        </div>
        <div class="achievement-item locked">
          <div class="achievement-icon">🔥</div>
          <div class="achievement-name">火焰使者</div>
        </div>
        <div class="achievement-item locked">
          <div class="achievement-icon">⭐</div>
          <div class="achievement-name">星光璀璨</div>
        </div>
        <div class="achievement-item locked">
          <div class="achievement-icon">🌟</div>
          <div class="achievement-name">连续7天</div>
        </div>
        <div class="achievement-item locked">
          <div class="achievement-icon">👑</div>
          <div class="achievement-name">精灵王者</div>
        </div>
      </div>
    </div>

    <div class="settings-card">
      <div class="card-title">⚙️ 设置</div>
      <div class="setting-item">
        <span class="setting-label">👤 昵称</span>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <input type="text" class="name-input-inline" id="nicknameInput" value="小朋友" maxlength="10">
          <button class="btn btn-primary" onclick="saveNickname()">保存</button>
        </div>
      </div>
      <div class="setting-item">
        <span class="setting-label">🎵 音效</span>
        <span class="setting-value">开启</span>
      </div>
      <div class="setting-item">
        <span class="setting-label">🔔 通知</span>
        <span class="setting-value">开启</span>
      </div>
      <div class="setting-item">
        <span class="setting-label">🌙 夜间模式</span>
        <span class="setting-value">关闭</span>
      </div>
      <div class="setting-item">
        <span class="setting-label">🗑️ 重置数据</span>
        <button class="btn btn-danger" onclick="resetData()">重置</button>
      </div>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    const data = MemorySystem.getData();
    
    // Update profile
    document.getElementById('userNickname').textContent = data.userProfile.nickname || '小朋友';
    document.getElementById('userPoints').textContent = `${data.points} 积分`;
    
    // Update stats
    document.getElementById('totalTasks').textContent = data.stats.totalTasks;
    document.getElementById('totalXP').textContent = data.stats.weeklyXP.reduce((a, b) => a + b, 0);
    document.getElementById('streakDays').textContent = data.stats.streakDays;
    document.getElementById('unlockedSpirits').textContent = data.unlockedSpirits.length;
    document.getElementById('chatSessions').textContent = data.userProfile.totalSessions;
    
    // Calculate total likes received
    const totalLikes = data.communityPosts.reduce((sum, post) => sum + post.likes, 0);
    document.getElementById('totalLikes').textContent = totalLikes;

    // Update nickname input
    document.getElementById('nicknameInput').value = data.userProfile.nickname || '小朋友';

    // 生成周学习趋势柱状图
    function renderChart() {
      const container = document.getElementById('chartContainer');
      const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
      const values = data.stats.weeklyXP || [30, 50, 45, 60, 40, 80, 50];
      const maxValue = Math.max(...values, 100);
      
      container.innerHTML = '';
      
      days.forEach((day, index) => {
        const heightPercent = (values[index] / maxValue) * 100;
        const barWrapper = document.createElement('div');
        barWrapper.className = 'chart-bar-wrapper';
        barWrapper.innerHTML = `
          <div class="chart-bar" style="height: 0%;" data-height="${heightPercent}%">
            <span class="chart-bar-value">${values[index]}</span>
          </div>
          <div class="chart-label">${day}</div>
        `;
        container.appendChild(barWrapper);
        
        // 动画延迟显示
        setTimeout(() => {
          barWrapper.querySelector('.chart-bar').style.height = `${heightPercent}%`;
        }, 100 + index * 100);
      });
    }
    renderChart();

    function saveNickname() {
      const newName = document.getElementById('nicknameInput').value.trim();
      if (newName) {
        data.userProfile.nickname = newName;
        MemorySystem.saveData(data);
        document.getElementById('userNickname').textContent = newName;
        
        // 显示成功提示
        const toast = document.createElement('div');
        toast.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: linear-gradient(135deg, var(--accent2), var(--accent4));
          color: #fff;
          padding: 1rem 2rem;
          border-radius: 14px;
          font-weight: 900;
          box-shadow: var(--shadow-xl);
          z-index: 10000;
          animation: badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        `;
        toast.textContent = '✅ 昵称已保存！';
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.style.animation = 'fadeOut 0.3s ease forwards';
          setTimeout(() => toast.remove(), 300);
        }, 1500);
      }
    }

    function resetData() {
      if (confirm('确定要重置所有数据吗？此操作不可恢复！')) {
        Storage.reset();
        
        // 显示重置提示
        const toast = document.createElement('div');
        toast.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: linear-gradient(135deg, var(--accent), #ee5a5a);
          color: #fff;
          padding: 1rem 2rem;
          border-radius: 14px;
          font-weight: 900;
          box-shadow: var(--shadow-xl);
          z-index: 10000;
          animation: badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        `;
        toast.textContent = '🗑️ 数据已重置！';
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.style.animation = 'fadeOut 0.3s ease forwards';
          setTimeout(() => toast.remove(), 300);
        }, 1500);
        
        setTimeout(() => location.reload(), 1800);
      }
    }

    // WeChat binding
    let wechatBound = false;
    function bindWechat() {
      if (!wechatBound) {
        document.getElementById('wechatName').textContent = '微信用户_小明';
        document.getElementById('wechatBind').textContent = '已绑定微信，社区好友已同步';
        document.getElementById('wechatBtn').textContent = '已绑定';
        document.getElementById('wechatBtn').disabled = true;
        document.getElementById('friendSection').style.display = 'block';
        wechatBound = true;
        
        // 显示绑定成功提示
        const toast = document.createElement('div');
        toast.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: linear-gradient(135deg, #07C160, #05a350);
          color: #fff;
          padding: 1rem 2rem;
          border-radius: 14px;
          font-weight: 900;
          box-shadow: var(--shadow-xl);
          z-index: 10000;
          animation: badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        `;
        toast.textContent = '💬 微信绑定成功！';
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.style.animation = 'fadeOut 0.3s ease forwards';
          setTimeout(() => toast.remove(), 300);
        }, 1500);
      }
    }
  </script>
</body>
