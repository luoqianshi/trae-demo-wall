<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兰州市选民登记指挥大屏 v3</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
/* ========== Tailwind 主题配置（蓝色科技风格） ========== */
tailwind.config = {
  theme: {
    extend: {
      colors: {
        screen: { bg: '#03142A', panel: '#0A1F3E', panel2: '#0E2A4E', border: '#1A4070' },
        tech: { blue: '#168bff', blue2: '#1b8fff', cyan: '#29e0be', purple: '#7c4dff', yellow: '#f4c84a', orange: '#ff7a36', green: '#58d86b' }
      }
    }
  }
}
</script>
<style>
* { font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif; box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #03142A; color: #fff; overflow: hidden; }

/* ========== 大屏容器（1920×1080 缩放适配，独立缩放填满全屏） ========== */
.screen-container { width: 1920px; height: 1080px; margin: 0; position: relative; transform-origin: top left; background: radial-gradient(ellipse at top, #0A2A5C 0%, #03142A 50%, #021028 100%); }

/* ========== 顶部标题栏 ========== */
.screen-header { height: 72px; background: linear-gradient(180deg, rgba(22,139,255,0.18) 0%, rgba(3,20,42,0.95) 100%); border-bottom: 1px solid rgba(22,139,255,0.35); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: relative; }
.screen-header::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 50%; height: 2px; background: linear-gradient(90deg, transparent, #168bff 30%, #29e0be 50%, #168bff 70%, transparent); box-shadow: 0 0 12px rgba(22,139,255,0.8); }
.header-left, .header-right { flex: 1; display: flex; align-items: center; gap: 16px; }
.header-right { justify-content: flex-end; }
.header-center { flex: 0 0 auto; text-align: center; }
.screen-title { font-size: 30px; font-weight: 700; color: #fff; letter-spacing: 6px; text-shadow: 0 0 20px rgba(22,139,255,0.8); margin: 0; line-height: 1.2; }
.screen-subtitle { font-size: 13px; color: #8FB8E8; margin: 2px 0 0; letter-spacing: 3px; }
.clock-box { display: flex; flex-direction: column; align-items: flex-start; }
.clock-time { font-size: 22px; font-weight: 700; color: #168bff; text-shadow: 0 0 10px rgba(22,139,255,0.5); line-height: 1; }
.clock-date { font-size: 12px; color: #8FB8E8; margin-top: 4px; }
.refresh-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(22,139,255,0.15); border: 1px solid rgba(22,139,255,0.4); border-radius: 4px; color: #168bff; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.refresh-btn:hover { background: rgba(22,139,255,0.3); box-shadow: 0 0 12px rgba(22,139,255,0.4); }
.update-info { font-size: 12px; color: #8FB8E8; }

/* ========== 指标卡片条 ========== */
.metric-strip { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; padding: 14px 24px 10px; }
.metric-card { background: linear-gradient(135deg, rgba(22,139,255,0.15) 0%, rgba(10,31,62,0.9) 100%); border: 1px solid rgba(22,139,255,0.35); border-radius: 4px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: relative; overflow: hidden; transition: all 0.3s; box-shadow: 0 0 10px rgba(22,139,255,0.1); }
.metric-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: #168bff; box-shadow: 0 0 10px rgba(22,139,255,0.8); }
.metric-card::after { content: ''; position: absolute; top: -50%; right: -20%; width: 80px; height: 80px; background: radial-gradient(circle, rgba(22,139,255,0.2) 0%, transparent 70%); border-radius: 50%; }
.metric-card:hover { border-color: #168bff; box-shadow: 0 0 20px rgba(22,139,255,0.3); transform: translateY(-2px); }
.metric-card__icon { width: 42px; height: 42px; background: rgba(22,139,255,0.15); border: 1px solid rgba(22,139,255,0.4); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #168bff; flex-shrink: 0; }
.metric-card__content { flex: 1; min-width: 0; }
.metric-card__label { font-size: 12px; color: #8FB8E8; line-height: 18px; }
.metric-card__value { font-size: 24px; font-weight: 700; color: #fff; line-height: 32px; text-shadow: 0 0 8px rgba(22,139,255,0.3); }
.metric-card__value small { font-size: 12px; color: #8FB8E8; font-weight: 400; margin-left: 3px; }
.metric-card--success::before { background: #58d86b; box-shadow: 0 0 8px rgba(88,216,107,0.6); }
.metric-card--success .metric-card__icon { color: #58d86b; background: rgba(88,216,107,0.15); border-color: rgba(88,216,107,0.4); }
.metric-card--warning::before { background: #f4c84a; box-shadow: 0 0 8px rgba(244,200,74,0.6); }
.metric-card--warning .metric-card__icon { color: #f4c84a; background: rgba(244,200,74,0.15); border-color: rgba(244,200,74,0.4); }
.metric-card--danger::before { background: #ff7a36; box-shadow: 0 0 8px rgba(255,122,54,0.6); }
.metric-card--danger .metric-card__icon { color: #ff7a36; background: rgba(255,122,54,0.15); border-color: rgba(255,122,54,0.4); }

/* ========== 面板卡片 ========== */
.panel-card { background: linear-gradient(180deg, rgba(16,53,99,0.4) 0%, rgba(10,31,62,0.85) 100%); border: 1px solid #1A4070; border-radius: 4px; overflow: hidden; position: relative; box-shadow: 0 0 12px rgba(22,139,255,0.08) inset; min-height: 0; display: flex; flex-direction: column; }
.panel-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(22,139,255,0.7), transparent); z-index: 2; }
.panel-card::after { content: ''; position: absolute; top: 0; left: 0; width: 12px; height: 12px; border-top: 2px solid #168bff; border-left: 2px solid #168bff; pointer-events: none; z-index: 2; }
.panel-card__header { height: 38px; min-height: 38px; padding: 0 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(26,64,112,0.6); background: linear-gradient(180deg, rgba(22,139,255,0.12) 0%, transparent 100%); }
.panel-card__title { font-size: 14px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }
.panel-card__title::before { content: ''; width: 3px; height: 12px; background: linear-gradient(180deg, #168bff, #29e0be); border-radius: 2px; box-shadow: 0 0 6px rgba(22,139,255,0.8); }
.panel-card__extra { font-size: 12px; color: #168bff; cursor: pointer; }
.panel-card__extra:hover { text-shadow: 0 0 6px rgba(22,139,255,0.6); }
.panel-card__body { padding: 12px 14px; flex: 1; min-height: 0; overflow: hidden; }

/* ========== 三栏主布局 ========== */
.command-layout { display: grid; grid-template-columns: 440px 1fr 440px; gap: 14px; padding: 0 24px; height: 680px; }
.command-column { display: flex; flex-direction: column; gap: 14px; min-height: 0; }
.command-center { display: flex; flex-direction: column; gap: 14px; min-height: 0; }

/* ========== 底部布局 ========== */
.bottom-layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; padding: 14px 24px 0; height: 180px; }

/* ========== 环形进度 ========== */
.rate-ring { width: 110px; height: 110px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
.rate-ring::after { content: ''; position: absolute; inset: 6px; background: #0A1F3E; border-radius: 50%; }
.rate-ring__inner { position: relative; z-index: 1; text-align: center; }
.rate-ring__inner strong { display: block; font-size: 24px; font-weight: 700; color: #168bff; line-height: 30px; text-shadow: 0 0 10px rgba(22,139,255,0.6); }
.rate-ring__inner span { font-size: 11px; color: #8FB8E8; }

/* ========== 核心指标列表 ========== */
.core-list { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.core-list__item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px dashed rgba(26,64,112,0.6); }
.core-list__item:last-child { border-bottom: none; }
.core-list__item i { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.core-list__item span { flex: 1; font-size: 12px; color: #8FB8E8; }
.core-list__item strong { font-size: 15px; font-weight: 700; color: #fff; }

/* ========== 排名列表 ========== */
.ranking-list { display: flex; flex-direction: column; gap: 5px; overflow: hidden; }
.ranking-list__row { display: grid; grid-template-columns: 26px 70px 1fr 55px; align-items: center; gap: 8px; padding: 5px 8px; background: rgba(26,64,112,0.3); border-radius: 2px; transition: all 0.2s; }
.ranking-list__row:hover { background: rgba(22,139,255,0.15); }
.ranking-list__row em { width: 26px; height: 26px; background: rgba(22,139,255,0.2); color: #168bff; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-style: normal; }
.ranking-list__row:nth-child(1) em { background: #168bff; color: #fff; box-shadow: 0 0 8px rgba(22,139,255,0.6); }
.ranking-list__row:nth-child(2) em { background: #1b8fff; color: #fff; }
.ranking-list__row:nth-child(3) em { background: #29e0be; color: #fff; }
.ranking-list__row span { font-size: 12px; color: #fff; }
.ranking-list__row i { display: block; height: 6px; background: rgba(26,64,112,0.5); border-radius: 3px; overflow: hidden; }
.ranking-list__row i b { display: block; height: 100%; background: linear-gradient(90deg, #168bff, #29e0be); border-radius: 3px; transition: width 0.8s ease; box-shadow: 0 0 6px rgba(22,139,255,0.4); }
.ranking-list__row strong { font-size: 13px; font-weight: 700; color: #168bff; text-align: right; }

/* ========== 进度总览 ========== */
.progress-summary { display: flex; align-items: center; gap: 16px; height: 100%; }
.progress-summary__stats { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.progress-summary__stats > div { display: flex; align-items: center; gap: 6px; padding: 6px 8px; background: rgba(26,64,112,0.3); border-radius: 2px; border-left: 2px solid #168bff; }
.progress-summary__stats > div.is-success { border-left-color: #58d86b; }
.progress-summary__stats > div.is-warning { border-left-color: #f4c84a; }
.progress-summary__stats > div.is-muted { border-left-color: #8FB8E8; }
.progress-summary__stats i { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.progress-summary__stats span { flex: 1; font-size: 11px; color: #8FB8E8; }
.progress-summary__stats strong { font-size: 13px; font-weight: 700; color: #fff; }

/* ========== 环形图图例 ========== */
.donut-section { display: flex; align-items: center; gap: 14px; height: 100%; }
.donut-legend { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.donut-legend > div { display: grid; grid-template-columns: 10px 1fr auto; align-items: center; gap: 8px; padding: 3px 0; }
.donut-legend i { width: 8px; height: 8px; border-radius: 2px; }
.donut-legend span { font-size: 12px; color: #8FB8E8; }
.donut-legend strong { font-size: 12px; font-weight: 700; color: #fff; }

/* ========== 选民结构标签切换 ========== */
.structure-tabs { display: flex; gap: 4px; }
.structure-tab { font-size: 11px; padding: 2px 10px; border-radius: 10px; background: rgba(26,64,112,0.5); color: #8FB8E8; cursor: pointer; transition: all 0.2s; }
.structure-tab:hover { color: #168bff; }
.structure-tab.is-active { background: linear-gradient(135deg, #168bff, #29e0be); color: #fff; box-shadow: 0 0 8px rgba(22,139,255,0.5); }

/* ========== 当选代表结构分析 ========== */
.elected-structure { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 14px; height: 100%; }
.elected-structure__item { display: flex; flex-direction: column; gap: 4px; }
.elected-structure__item-title { font-size: 11px; color: #8FB8E8; display: flex; align-items: center; gap: 4px; }
.elected-structure__item-title::before { content: ''; width: 3px; height: 8px; background: #168bff; border-radius: 2px; }
.elected-structure__bars { display: flex; flex-direction: column; gap: 3px; }
.elected-structure__bar { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.elected-structure__bar-label { width: 56px; color: #B0CFFF; flex-shrink: 0; }
.elected-structure__bar-track { flex: 1; height: 8px; background: rgba(26,64,112,0.4); border-radius: 4px; overflow: hidden; }
.elected-structure__bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.elected-structure__bar-value { width: 40px; text-align: right; color: #fff; font-weight: 700; flex-shrink: 0; }

/* ========== 质量列表 ========== */
.quality-list { display: flex; flex-direction: column; gap: 6px; }
.quality-list > div { display: grid; grid-template-columns: 90px 1fr 45px; align-items: center; gap: 10px; padding: 4px 0; }
.quality-list span { font-size: 12px; color: #8FB8E8; }
.quality-list i { display: block; height: 7px; background: rgba(26,64,112,0.5); border-radius: 4px; overflow: hidden; }
.quality-list i b { display: block; height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.quality-list strong { font-size: 12px; font-weight: 700; color: #fff; text-align: right; }

/* ========== 导出网格 ========== */
.export-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.export-grid button { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: rgba(26,64,112,0.3); border: 1px solid #1A4070; border-radius: 4px; cursor: pointer; transition: all 0.2s; text-align: left; }
.export-grid button:hover { border-color: #168bff; background: rgba(22,139,255,0.15); box-shadow: 0 0 10px rgba(22,139,255,0.3); }
.export-grid button .icon { color: #168bff; flex-shrink: 0; }
.export-grid button .info { flex: 1; min-width: 0; }
.export-grid button .name { font-size: 12px; color: #fff; display: block; }
.export-grid button .format { font-size: 10px; color: #8FB8E8; }

/* ========== 区域筛选 chips ========== */
.region-filter { display: flex; flex-wrap: wrap; gap: 5px; }
.region-filter button { padding: 3px 8px; font-size: 11px; border-radius: 2px; border: 1px solid #1A4070; background: rgba(26,64,112,0.3); color: #8FB8E8; cursor: pointer; transition: all 0.2s; }
.region-filter button:hover { border-color: #168bff; color: #168bff; }
.region-filter button.is-danger { border-color: #ff7a36; color: #ff7a36; background: rgba(255,122,54,0.1); }
.region-filter button.is-warning { border-color: #f4c84a; color: #f4c84a; background: rgba(244,200,74,0.1); }
.region-filter button.is-info { border-color: #168bff; color: #168bff; background: rgba(22,139,255,0.1); }
.region-legend { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: #8FB8E8; }
.region-legend span { display: flex; align-items: center; gap: 4px; }
.region-legend i { width: 8px; height: 8px; border-radius: 2px; }

/* ========== 滚动动画 ========== */
@keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
.auto-scroll { animation: scrollUp 25s linear infinite; height: 100%; overflow: hidden; }
.auto-scroll:hover { animation-play-state: paused; }

/* ========== 数字滚动动画 ========== */
@keyframes numberPulse { 0%, 100% { text-shadow: 0 0 8px rgba(22,139,255,0.3); } 50% { text-shadow: 0 0 16px rgba(22,139,255,0.6); } }
.metric-card__value { animation: numberPulse 3s ease-in-out infinite; }

/* ========== 滚动条 ========== */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1A4070; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: #168bff; }

/* ========== 底部版权 ========== */
.screen-footer { height: 28px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #8FB8E8; border-top: 1px solid rgba(22,139,255,0.2); margin-top: 8px; background: linear-gradient(180deg, transparent, rgba(22,139,255,0.05)); }

/* ========== 地图容器 ========== */
.map-container { position: relative; width: 100%; height: 100%; }
.map-legend { position: absolute; bottom: 8px; right: 8px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: #8FB8E8; z-index: 10; }
.map-legend .gradient-bar { width: 100px; height: 6px; background: linear-gradient(90deg, #0A1F3E, #168bff, #29e0be); border-radius: 3px; box-shadow: 0 0 6px rgba(22,139,255,0.4); }

/* ========== 下钻弹窗 ========== */
.drill-mask { position: fixed; inset: 0; background: rgba(3,20,42,0.85); backdrop-filter: blur(4px); z-index: 9998; display: none; }
.drill-mask.is-show { display: block; }
.drill-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 880px; max-height: 80vh; background: linear-gradient(180deg, #0A2A5C 0%, #03142A 100%); border: 1px solid #168bff; border-radius: 6px; box-shadow: 0 0 40px rgba(22,139,255,0.5), 0 0 80px rgba(22,139,255,0.2); z-index: 9999; display: none; overflow: hidden; opacity: 0; transition: all 0.3s; }
.drill-modal.is-show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
.drill-modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #168bff, #29e0be, #168bff, transparent); box-shadow: 0 0 10px rgba(22,139,255,0.8); }
.drill-modal__header { height: 52px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(26,64,112,0.6); background: linear-gradient(180deg, rgba(22,139,255,0.12), transparent); }
.drill-modal__title { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; letter-spacing: 1px; }
.drill-modal__title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #168bff, #29e0be); border-radius: 2px; box-shadow: 0 0 6px rgba(22,139,255,0.8); }
.drill-modal__title small { font-size: 12px; color: #8FB8E8; font-weight: 400; }
.drill-modal__close { width: 28px; height: 28px; background: rgba(255,122,54,0.15); border: 1px solid rgba(255,122,54,0.4); border-radius: 4px; color: #ff7a36; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.drill-modal__close:hover { background: rgba(255,122,54,0.3); box-shadow: 0 0 8px rgba(255,122,54,0.4); }
.drill-modal__body { padding: 18px 20px; max-height: calc(80vh - 52px); overflow-y: auto; }
.drill-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.drill-stats__item { background: rgba(26,64,112,0.3); border: 1px solid #1A4070; border-left: 3px solid #168bff; border-radius: 4px; padding: 10px 14px; }
.drill-stats__item.is-success { border-left-color: #58d86b; }
.drill-stats__item.is-warning { border-left-color: #f4c84a; }
.drill-stats__item.is-danger { border-left-color: #ff7a36; }
.drill-stats__label { font-size: 12px; color: #8FB8E8; margin-bottom: 4px; }
.drill-stats__value { font-size: 22px; font-weight: 700; color: #fff; text-shadow: 0 0 8px rgba(22,139,255,0.4); }
.drill-stats__value small { font-size: 12px; color: #8FB8E8; font-weight: 400; margin-left: 3px; }
.drill-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.drill-table th { background: rgba(22,139,255,0.15); border: 1px solid #1A4070; padding: 8px 10px; font-size: 12px; color: #168bff; font-weight: 700; text-align: left; }
.drill-table td { border: 1px solid #1A4070; padding: 7px 10px; font-size: 12px; color: #fff; }
.drill-table tr:nth-child(even) td { background: rgba(26,64,112,0.2); }
.drill-table tr:hover td { background: rgba(22,139,255,0.1); }
.drill-chart { width: 100%; height: 220px; margin-top: 12px; }
.drill-section-title { font-size: 13px; font-weight: 700; color: #fff; margin: 14px 0 6px; display: flex; align-items: center; gap: 8px; }
.drill-section-title::before { content: ''; width: 3px; height: 12px; background: #168bff; border-radius: 2px; }

/* ========== 可点击元素光标 ========== */
.metric-card, .ranking-list__row { cursor: pointer; }
.metric-card { position: relative; }
.metric-card .clickable-hint { position: absolute; top: 4px; right: 8px; font-size: 9px; color: #168bff; opacity: 0.5; }
</style>
</head>
<body>

<div class="screen-container" id="screenContainer">

<!-- ========== 顶部标题栏 ========== -->
<header class="screen-header">
  <div class="header-left">
    <div class="clock-box">
      <div class="clock-time" id="currentTime">--:--:--</div>
      <div class="clock-date" id="currentDate">----</div>
    </div>
  </div>
  <div class="header-center">
    <h1 class="screen-title">兰州市选民登记指挥大屏</h1>
    <p class="screen-subtitle">全市选民登记态势实时监测</p>
  </div>
  <div class="header-right">
    <span class="update-info">数据更新：<span id="updateTime">--</span></span>
    <button class="refresh-btn" onclick="refreshData(event)">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      刷新数据
    </button>

/* ========== 工具函数 ========== */
function fmt(n) { return Number(n).toLocaleString('zh-CN'); }
function pct(n) { return Number(n).toFixed(2) + '%'; }

/* ========== 数字滚动动画 ========== */
function animateNumber(element, target, duration, formatter) {
  var start = 0;
  var startTime = null;
  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    var progress = Math.min((timestamp - startTime) / duration, 1);
    var current = Math.floor(start + (target - start) * progress);
    element.textContent = formatter ? formatter(current) : current;
    if (progress < 1) requestAnimationFrame(step);
    else element.textContent = formatter ? formatter(target) : target;
  }
  requestAnimationFrame(step);
}

/* ========== 时钟更新 ========== */
function updateClock() {
  var now = new Date();
  document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
  var week = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][now.getDay()];
  document.getElementById('currentDate').textContent = now.toISOString().slice(0, 10) + ' ' + week;
  document.getElementById('updateTime').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
}

/* ========== 大屏缩放适配（独立缩放填满全屏） ========== */
function scaleScreen() {
  var container = document.getElementById('screenContainer');
  var scaleX = window.innerWidth / 1920;
  var scaleY = window.innerHeight / 1080;
  /* 独立缩放，确保填满全屏（轻微变形可接受） */
  container.style.transform = 'scale(' + scaleX + ', ' + scaleY + ')';
  container.style.transformOrigin = 'top left';
  container.style.position = 'absolute';
  container.style.left = '0';
  container.style.top = '0';
}

/* ========== 渲染所有组件 ========== */
function renderAll() {
  renderMetricStrip();
  renderCoreMetrics();
  renderTrendChart();
  renderMapChart();
  renderCandidateFunnel();
  renderRankingList();
  renderRegionFilter();
  renderStructureChart('age');
  renderChannelChart();
  renderQualityList();
  renderElectedStructure();
}

/* ========== 窗口大小变化时重绘图表 ========== */
function handleResize() {
  scaleScreen();
  if (trendChartInstance) trendChartInstance.resize();
  if (mapChartInstance) mapChartInstance.resize();
  if (candidateFunnelChart) candidateFunnelChart.resize();
}

/* ========== 初始化 ========== */
function init() {
  updateClock();
  setInterval(updateClock, 1000);
  scaleScreen();
  window.addEventListener('resize', handleResize);
  renderAll();

  /* ESC键关闭下钻弹窗 */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' || e.keyCode === 27) closeDrill();
  });

  /* 每30秒自动刷新数据（模拟实时更新） */
  setInterval(function() {
    /* 微调数据，模拟实时变化 */
    MOCK.topMetrics.registeredVoters += Math.floor(Math.random() * 10);
    MOCK.progress.totalRegistered = MOCK.topMetrics.registeredVoters;
    renderMetricStrip();
  }, 30000);
}

/* 等待DOM和依赖加载完成 */
window.addEventListener('load', init);
</script>
</body>
</html>
