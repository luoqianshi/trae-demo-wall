<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<title>CodeKids</title>
	<link rel="icon" type="image/png" href="icon_512x512.png">
	<link rel="apple-touch-icon" href="icon_512x512.png">
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="CodeKids.icon.png" />
<link rel="apple-touch-icon" href="CodeKids.apple-touch-icon.png"/>

	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: radial-gradient(ellipse at center, #0f1830 0%, #050810 100%);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		}

		canvas {
			display: block;
			width: 100%;
			height: 100%;
		}

		#godot-loading-screen {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			z-index: 100;
			background: radial-gradient(ellipse at center, #0f1830 0%, #050810 100%);
			transition: opacity 0.5s ease;
		}

		#godot-loading-screen.hidden {
			opacity: 0;
			pointer-events: none;
		}

		#godot-loading-icon {
			width: 128px;
			height: 128px;
			margin-bottom: 24px;
			animation: pulse 2s ease-in-out infinite;
		}

		@keyframes pulse {
			0%, 100% { transform: scale(1); opacity: 1; }
			50% { transform: scale(1.05); opacity: 0.9; }
		}

		#godot-loading-text {
			color: #ffffff;
			font-size: 20px;
			font-weight: 500;
			margin-bottom: 24px;
			letter-spacing: 2px;
		}

		#godot-loading-text::after {
			content: '...';
			animation: dots 1.5s steps(4, end) infinite;
			display: inline-block;
			width: 24px;
		}

		@keyframes dots {
			0%, 20% { content: ''; }
			40% { content: '.'; }
			60% { content: '..'; }
			80%, 100% { content: '...'; }
		}

		#godot-progress-container {
			width: 300px;
			height: 8px;
			background-color: rgba(255, 255, 255, 0.1);
			border-radius: 4px;
			overflow: hidden;
		}

		#godot-progress-bar {
			height: 100%;
			width: 0%;
			background: linear-gradient(90deg, #38bcf7 0%, #22d3ee 100%);
			border-radius: 4px;
			transition: width 0.3s ease;
			box-shadow: 0 0 10px rgba(56, 188, 247, 0.5);
		}

		#godot-progress-percent {
			color: rgba(255, 255, 255, 0.6);
			font-size: 14px;
			margin-top: 12px;
		}

		#godot-status {
			color: rgba(255, 255, 255, 0.6);
			font-size: 13px;
			margin-top: 16px;
			text-align: center;
			max-width: 400px;
			display: none;
		}

		#godot-status.error {
			color: #ff6b6b;
			display: block;
		}
	</style>
</head>
<body>
	<div id="godot-loading-screen">
		<img id="godot-loading-icon" src="icon_512x512.png" alt="CodeKids">
		<div id="godot-loading-text">CodeKids编程星球加载中</div>
		<div id="godot-progress-container">
			<div id="godot-progress-bar"></div>
		</div>
		<div id="godot-progress-percent">0%</div>
		<div id="godot-status"></div>
	</div>
	<canvas id="canvas"></canvas>
	<script>
		// 解压 gzip 数据的函数
		async function gunzip(arrayBuffer) {
			const ds = new DecompressionStream('gzip');
			const writer = ds.writable.getWriter();
			writer.write(arrayBuffer);
			writer.close();
			const result = await new Response(ds.readable).arrayBuffer();
			return result;
		}

		// 保存原始 fetch 函数
		const originalFetch = window.fetch;

		// 拦截 fetch 请求，将 .wasm 请求重定向到 .wasm.gz
		window.fetch = async function(input, init) {
			let url = typeof input === 'string' ? input : input.url;
			
			// 只对 .wasm 文件使用 gzip 预压缩
			if (url && url.endsWith('.wasm')) {
				const gzUrl = url + '.gz';
				console.log('Fetching gzip compressed wasm:', gzUrl);
				
				try {
					const response = await originalFetch(gzUrl, init);
					if (response.ok) {
						// 解压 gzip 数据
						const arrayBuffer = await response.arrayBuffer();
						const decompressed = await gunzip(arrayBuffer);
						
						// 返回一个假的 Response 对象，包含解压后的 wasm 数据
						return new Response(decompressed, {
							status: 200,
							statusText: 'OK',
							headers: new Headers({
								'Content-Type': 'application/wasm'
							})
						});
					} else {
						// 如果 .wasm.gz 不存在，尝试原始的 .wasm 文件
						console.log('Gzip wasm not found, falling back to original:', url);
						return originalFetch(url, init);
					}
				} catch (e) {
					console.error('Failed to load gzip wasm:', e);
					// 如果失败，尝试原始文件
					return originalFetch(url, init);
				}
			}
			
			// 其他请求使用原始 fetch
			return originalFetch(input, init);
		};
	</script>
	<script src="CodeKids.js"></script>
	<script>
		const loadingScreen = document.getElementById('godot-loading-screen');
		const progressBar = document.getElementById('godot-progress-bar');
		const progressPercent = document.getElementById('godot-progress-percent');
		const statusDiv = document.getElementById('godot-status');

		function setProgress(percent) {
			percent = Math.min(100, Math.max(0, percent));
			progressBar.style.width = percent + '%';
			progressPercent.textContent = Math.round(percent) + '%';
		}

		function setStatus(text, isError) {
			statusDiv.textContent = text;
			if (isError) {
				statusDiv.classList.add('error');
			}
		}

		function hideLoadingScreen() {
			loadingScreen.classList.add('hidden');
			setTimeout(() => {
				loadingScreen.style.display = 'none';
			}, 500);
		}

		const config = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"CodeKids","experimentalVK":false,"fileSizes":{"CodeKids.pck":13069164,"CodeKids.wasm":37700666},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
		config.onProgress = function(current, total) {
			if (total > 0) {
				setProgress(current / total * 100);
			}
		};

		const engine = new Engine(config);
		engine.startGame().then(() => {
			setProgress(100);
			setTimeout(hideLoadingScreen, 300);
		}).catch((err) => {
			setStatus('加载失败: ' + err.message, true);
		});
	</script>
</body>
</html>
