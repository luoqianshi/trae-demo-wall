<script>
// ===================== MOCK DATA ENGINE =====================
(function(){
"use strict";

var WORKSHOPS=['冲压车间','焊装车间','涂装车间','总装车间'];
var WORKSHOP_CODES=['CY-01','HJ-02','TZ-03','ZZ-04'];
var MONTHS=['2025-01','2025-02','2025-03','2025-04','2025-05','2025-06','2025-07','2025-08','2025-09','2025-10','2025-11','2025-12'];
var PRODUCTS=[{model:'A3L',name:'A3L 轿车',category:'轿车'},{model:'A4L',name:'A4L 轿车',category:'轿车'},{model:'Q5',name:'Q5 SUV',category:'SUV'},{model:'Q7',name:'Q7 SUV',category:'SUV'},{model:'A6L',name:'A6L 轿车',category:'轿车'},{model:'e-tron',name:'e-tron 纯电',category:'新能源'},{model:'Q4 e-tron',name:'Q4 e-tron 纯电',category:'新能源'}];
var LINES=['冲压A线','冲压B线','焊装主线','焊装侧围线','焊装地板线','涂装电泳线','涂装中涂线','涂装面漆线','总装内饰线','总装底盘线','总装最终线','总装检测线'];
var DEFECT_TYPES=['焊点虚焊','焊缝裂纹','尺寸超差','漆面气泡','漆面流挂','漆面色差','装配松动','零件缺失','密封不良','功能异常'];
var EQ_STATUS=['运行中','待机','维修中','保养中','故障停机'];

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function rf(a,b,d){return parseFloat((Math.random()*(b-a)+a).toFixed(d||2))}
function rItem(a){return a[Math.floor(Math.random()*a.length)]}
function gId(){return 'ID-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substr(2,6).toUpperCase()}
function getWS(l){if(l.includes('冲压'))return'冲压车间';if(l.includes('焊装'))return'焊装车间';if(l.includes('涂装'))return'涂装车间';if(l.includes('总装'))return'总装车间';return'未知车间'}

function genWorkshop(){
  var d=[];WORKSHOPS.forEach(function(w,i){MONTHS.forEach(function(m){
    var pq=ri(8000,15000),aq=ri(Math.floor(pq*.88),Math.floor(pq*1.05)),qq=Math.floor(aq*rf(.95,.998));
    d.push({workshop_code:WORKSHOP_CODES[i],workshop_name:w,month:m,plan_quantity:pq,actual_quantity:aq,qualified_quantity:qq,defect_quantity:aq-qq,yield_rate:parseFloat((qq/aq*100).toFixed(2)),overtime_hours:rf(20,180),equipment_utilization:rf(.72,.96),energy_consumption:ri(50000,200000),cost_per_unit:rf(120,380)});
  })});return d;
}
function genProduct(){
  var d=[];PRODUCTS.forEach(function(p){MONTHS.forEach(function(m){
    var pq=ri(2000,6000),aq=ri(Math.floor(pq*.85),Math.floor(pq*1.02)),qq=Math.floor(aq*rf(.96,.999));
    d.push({product_model:p.model,product_name:p.name,product_category:p.category,month:m,plan_quantity:pq,actual_quantity:aq,qualified_quantity:qq,yield_rate:parseFloat((qq/aq*100).toFixed(2)),cycle_time:rf(45,180),first_pass_yield:rf(.92,.99),wip_inventory:ri(100,800),delivery_rate:rf(.88,.99)});
  })});return d;
}
function genLine(){
  var d=[];LINES.forEach(function(l){var s=rItem(EQ_STATUS);d.push({line_name:l,workshop_name:getWS(l),status:s,current_speed:s==='运行中'?ri(15,60):0,target_speed:ri(40,65),today_output:ri(200,1200),today_target:ri(800,1400),cumulative_output:ri(5000,50000),defect_count:ri(0,15),uptime_rate:rf(.75,.98),changeover_time:ri(10,45),operator_count:ri(8,35)});});return d;
}
function genDefect(){
  var d=[],sd=new Date('2025-01-01'),descs={'焊点虚焊':'焊接电流不稳定导致焊点强度不足','焊缝裂纹':'焊缝处出现微小裂纹','尺寸超差':'零件装配尺寸超出公差范围','漆面气泡':'喷涂过程中混入空气','漆面流挂':'涂料过量导致流挂','漆面色差':'与标准色板存在可辨识色差','装配松动':'螺栓扭矩未达到标准值','零件缺失':'装配过程中发现零件漏装','密封不良':'密封条装配不到位','功能异常':'电气功能检测未通过'};
  for(var i=0;i<200;i++){var dt=new Date(sd.getTime()+ri(0,180)*864e5);var tp=rItem(DEFECT_TYPES);d.push({defect_id:gId(),defect_date:dt.toISOString().split('T')[0],workshop_name:rItem(WORKSHOPS),line_name:rItem(LINES),defect_type:tp,severity:rItem(['轻微','一般','严重','致命']),product_model:rItem(PRODUCTS).model,station:'工位 '+ri(10,120),operator:'OP-'+ri(100,999),description:descs[tp]||'质量异常',is_resolved:Math.random()>.3,resolve_time:ri(10,480),root_cause:rItem(['设备异常','物料不良','工艺偏差','操作失误','环境因素'])});}return d;
}

// Cache generated data so repeated queries return same data
var dataCache={};
function getData(table){
  if(!dataCache[table]) dataCache[table]=TABLES[table].gen();
  return dataCache[table];
}

function executeQuery(sql){
  var ns=sql.toUpperCase().trim();
  var tableName=null;
  var keys=Object.keys(TABLES);
  for(var i=0;i<keys.length;i++){if(ns.includes(keys[i].toUpperCase())){tableName=keys[i];break}}
  if(!tableName){
    if(ns.includes('车间')||ns.includes('WORKSHOP'))tableName='workshop_monthly';
    else if(ns.includes('产品')||ns.includes('PRODUCT'))tableName='product_model';
    else if(ns.includes('产线')||ns.includes('LINE'))tableName='line_realtime';
    else if(ns.includes('缺陷')||ns.includes('质量')||ns.includes('DEFECT'))tableName='defect';
    else if(ns.includes('设备')||ns.includes('EQUIPMENT'))tableName='equipment';
    else if(ns.includes('工单')||ns.includes('ORDER'))tableName='work_order';
    else if(ns.includes('人员')||ns.includes('员工')||ns.includes('PERSON'))tableName='personnel';
    else if(ns.includes('物料')||ns.includes('MATERIAL'))tableName='material';
    else tableName='workshop_monthly';
  }
  // Invalidate cache each query for fresh random data
  dataCache[tableName]=null;
  var data=getData(tableName);
  // Apply LIMIT
  var lm=sql.match(/LIMIT\s+(\d+)/i)||sql.match(/TOP\s+(\d+)/i);
  if(lm)data=data.slice(0,parseInt(lm[1]));
  var cols=Object.keys(data[0]||{});
  return {success:true,data:data,columns:cols,rowCount:data.length,tableName:tableName,executionTime:ri(15,200)};
}

// --- Run query ---
function runQuery(){
  var sql=document.getElementById('sqlEditor').value.trim();
  if(!sql){toast('请输入 SQL 查询语句','error');return}
  var btn=document.getElementById('btnRun');
  btn.textContent='执行中...';btn.disabled=true;
  // Show table tab
  switchResultTab('table');
  setTimeout(function(){
    var t0=performance.now();
    var res=executeQuery(sql);
    var elapsed=Math.round(performance.now()-t0);
    btn.textContent='执行查询';btn.disabled=false;
    currentData=res;
    renderTable(res);
    renderMessage(res,elapsed);
    // Auto-chart
    setTimeout(function(){switchResultTab('chart');renderChart(res)},100);
  },ri(80,300));
}
document.getElementById('btnRun').addEventListener('click',runQuery);
document.getElementById('sqlEditor').addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runQuery()}
});

// --- Render table ---
function renderTable(res){
  if(!res.data.length){document.getElementById('resultTable').innerHTML='<div class="result-msg">查询返回 0 行数据</div>';return}
  var maxRows=100;var show=res.data.slice(0,maxRows);
  var h='<table class="result-table fade-in"><thead><tr><th>#</th>';
  res.columns.forEach(function(c){h+='<th>'+c+'</th>'});
  h+='</tr></thead><tbody>';
  show.forEach(function(row,i){
    h+='<tr><td style="color:var(--muted)">'+(i+1)+'</td>';
    res.columns.forEach(function(c){
      var v=row[c];
      if(v===true)v='<span style="color:var(--green)">是</span>';
      else if(v===false)v='<span style="color:var(--red)">否</span>';
      else if(typeof v==='number'&&v>1000)v=v.toLocaleString();
      h+='<td>'+v+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  if(res.rowCount>maxRows)h+='<div style="padding:8px 14px;font-size:.78rem;color:var(--muted)">仅显示前 '+maxRows+' 行，共 '+res.rowCount+' 行</div>';
  document.getElementById('resultTable').innerHTML=h;
}

// --- Render message ---
function renderMessage(res,elapsed){
  var h='<div class="result-msg">';
  h+='<p><span class="ok">&#10003;</span> 查询执行成功</p>';
  h+='<p>返回 <span class="info">'+res.rowCount+'</span> 行数据，耗时 <span class="info">'+res.executionTime+'ms</span>（渲染 '+elapsed+'ms）</p>';
  h+='<p>数据表：<span class="info">'+res.tableName+'</span></p>';
  h+='<p style="margin-top:8px">SQL: <span style="color:var(--accent)">'+document.getElementById('sqlEditor').value.replace(/</g,'&lt;')+'</span></p>';
  h+='</div>';
  document.getElementById('resultMsg').innerHTML=h;
}

// --- Chart rendering ---
function renderChart(res){
  var box=document.getElementById('chartBox');
  if(!box){box=document.createElement('div');box.className='chart-container';box.id='chartBox';document.getElementById('resultChart').innerHTML='';document.getElementById('resultChart').appendChild(box)}
  if(chartInstance){chartInstance.dispose();chartInstance=null}
  if(!res||!res.data.length){box.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">暂无数据</div>';return}
  chartInstance=echarts.init(box,null,{renderer:'svg'});
  var cols=res.columns;
  // Detect chart type
  var catCol=null,numCols=[];
  var sample=res.data[0];
  cols.forEach(function(c){
    if(typeof sample[c]==='string') catCol=c;
    else if(typeof sample[c]==='number') numCols.push(c);
  });
  // If no string col found, use first col as category
  if(!catCol)catCol=cols[0];

  var categories=[];var seen={};
  res.data.forEach(function(r){var v=r[catCol];if(!seen[v]){seen[v]=1;categories.push(v)}});
  if(categories.length>30)categories=categories.slice(0,30);
  var numCol=numCols[0]||cols[1]||'value';

  var palette=['#22d3ee','#a78bfa','#34d399','#fbbf24','#f87171','#fb923c','#38bdf8','#c084fc','#4ade80','#facc15'];
  var series=[];
  numCols.slice(0,4).forEach(function(nc,si){
    var vals=[];res.data.forEach(function(r){vals.push(r[nc])});
    // Aggregate by category
    var agg={},order=0;
    categories.forEach(function(cat,i){
      var found=res.data.find(function(r){return r[catCol]===cat});
      agg[cat]=found?found[nc]:0;
    });
    var sData=categories.map(function(c){return agg[c]});
    series.push({name:nc,type:categories.length<=8?'bar':'line',data:sData,itemStyle:{color:palette[si%palette.length]||palette[0]},lineStyle:{width:2}});
  });

  var option={
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',backgroundColor:'#1a2236',borderColor:'#253045',textStyle:{color:'#e8ecf4',fontSize:12}},
    legend:{data:numCols.slice(0,4),textStyle:{color:'#6b7a94',fontSize:11},top:4,right:10,itemWidth:14,itemHeight:8},
    grid:{left:60,right:20,top:50,bottom:40},
    xAxis:{type:'category',data:categories,axisLabel:{color:'#6b7a94',fontSize:10,rotate:categories.length>10?30:0},axisLine:{lineStyle:{color:'#253045'}},splitLine:{show:false}},
    yAxis:{type:'value',axisLabel:{color:'#6b7a94',fontSize:10,formatter:function(v){return v>=10000?(v/10000)+'w':v>=1000?(v/1000)+'k':v}},splitLine:{lineStyle:{color:'#1a2236'}}},
    series:series,
    animation:false
  };
  chartInstance.setOption(option);
  window.addEventListener('resize',function(){if(chartInstance)chartInstance.resize()});
}

      var btn=this;btn.textContent='连接中...';btn.disabled=true;
      setTimeout(function(){btn.textContent='连接成功';btn.style.color='var(--green)';btn.style.borderColor='var(--green)';toast('连接测试成功','success');setTimeout(function(){btn.textContent='测试连接';btn.style.color='';btn.style.borderColor='';btn.disabled=false},2000)},ri(500,1500));
    });
  });
})();

// --- Reports page ---
var savedReports=[
  {id:1,name:'各车间月度产量对比',desc:'展示冲压、焊装、涂装、总装四大车间的计划与实际产量对比分析',tags:['MES','产量'],sql:'SELECT * FROM workshop_monthly LIMIT 50',fav:true,date:'2025-06-28'},
  {id:2,name:'产线实时运行状态',desc:'12条产线的实时运行状态、产量完成率和缺陷统计',tags:['实时','产线'],sql:'SELECT * FROM line_realtime',fav:false,date:'2025-06-27'},
  {id:3,name:'质量缺陷类型分布',desc:'按缺陷类型统计质量缺陷数量和严重程度分布',tags:['质量','缺陷'],sql:'SELECT * FROM defect LIMIT 100',fav:true,date:'2025-06-26'},
  {id:4,name:'产品型号合格率趋势',desc:'7个产品型号的月度合格率趋势变化',tags:['产品','质量'],sql:'SELECT * FROM product_model LIMIT 50',fav:false,date:'2025-06-25'},
  {id:5,name:'设备运行状态监控',desc:'各类设备的运行状态、MTBF和维修次数统计',tags:['设备','运维'],sql:'SELECT * FROM equipment',fav:false,date:'2025-06-24'}
];
var reportFilter='all';

function renderReports(filter,search){
  var grid=document.getElementById('reportGrid');
  var list=savedReports.slice();
  if(filter==='fav')list=list.filter(function(r){return r.fav});
  if(filter==='recent')list=list.slice(0,3);
  if(search){var s=search.toLowerCase();list=list.filter(function(r){return r.name.toLowerCase().includes(s)||r.desc.toLowerCase().includes(s)||r.tags.some(function(t){return t.toLowerCase().includes(s)})})}

  if(!list.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">暂无匹配的报表</div>';return}
  var html='';
  list.forEach(function(r){
    html+='<div class="report-card fade-in" data-rid="'+r.id+'"><div class="report-card-thumb"><canvas class="report-thumb" data-sql=\''+r.sql.replace(/'/g,'&#39;')+'\'></canvas></div>';
    html+='<div class="report-card-body"><h4>'+r.name+'</h4><div class="desc">'+r.desc+'</div><div class="tags">';
    r.tags.forEach(function(t){html+='<span class="tag">'+t+'</span>'});
    if(r.fav)html+='<span class="tag" style="color:var(--yellow)">&#9733; 收藏</span>';
    html+='</div></div></div>';
  });
  grid.innerHTML=html;
  // Draw mini charts on canvases
  grid.querySelectorAll('.report-thumb').forEach(function(canvas){
    var sql=canvas.dataset.sql;
    var res=executeQuery(sql);
    try{
      var ec=echarts.init(canvas,null,{renderer:'canvas'});
      var cols=res.columns;var catCol=null,numCols=[];
      var sample=res.data[0];cols.forEach(function(c){if(typeof sample[c]==='string')catCol=c;else if(typeof sample[c]==='number')numCols.push(c)});
      if(!catCol)catCol=cols[0];
      var cats=[],seen={};res.data.forEach(function(r){var v=r[catCol];if(!seen[v]){seen[v]=1;cats.push(v)}});
      if(cats.length>10)cats=cats.slice(0,10);
      var nc=numCols[0]||cols[1];
      var vals=[];cats.forEach(function(c){var f=res.data.find(function(r){return r[catCol]===c});vals.push(f?f[nc]:0)});
      ec.setOption({backgroundColor:'transparent',grid:{left:40,right:10,top:15,bottom:25},xAxis:{type:'category',data:cats,axisLabel:{color:'#6b7a94',fontSize:9,rotate:20},axisLine:{lineStyle:{color:'#253045'}},splitLine:{show:false}},yAxis:{type:'value',axisLabel:{color:'#6b7a94',fontSize:9},splitLine:{lineStyle:{color:'#1a2236'}}},series:[{type:'bar',data:vals,itemStyle:{color:'#22d3ee',borderRadius:[3,3,0,0]}}],tooltip:{show:false},animation:false});
      window.addEventListener('resize',function(){ec.resize()});
    }catch(e){}
  });
  // Click to open viewer
  grid.querySelectorAll('.report-card').forEach(function(card){
    card.addEventListener('click',function(){
      var rid=parseInt(this.dataset.rid);
      var report=savedReports.find(function(r){return r.id===rid});
      if(report)openViewer(report);
    });
  });
}

renderReports('all','');
document.getElementById('reportSearch').addEventListener('input',function(){renderReports(reportFilter,this.value)});
document.querySelectorAll('.filter-tag').forEach(function(tag){
  tag.addEventListener('click',function(){
    document.querySelectorAll('.filter-tag').forEach(function(t){t.classList.remove('active')});
    this.classList.add('active');
    reportFilter=this.dataset.filter;
    renderReports(reportFilter,document.getElementById('reportSearch').value);
  });
});

// --- Viewer Modal ---
function openViewer(report){
  var overlay=document.getElementById('viewerOverlay');
  overlay.classList.add('open');
  document.getElementById('viewerTitle').textContent=report.name;
  document.getElementById('viewerSql').textContent=report.sql;
  document.getElementById('viewerMeta').textContent='创建日期: '+report.date+'  |  标签: '+report.tags.join(', ');
  var res=executeQuery(report.sql);
  var box=document.getElementById('viewerChart');
  if(chartInstance){chartInstance.dispose();chartInstance=null}
  chartInstance=echarts.init(box,null,{renderer:'svg'});
  var cols=res.columns;var catCol=null,numCols=[];
  var sample=res.data[0];cols.forEach(function(c){if(typeof sample[c]==='string')catCol=c;else if(typeof sample[c]==='number')numCols.push(c)});
  if(!catCol)catCol=cols[0];
  var cats=[],seen={};res.data.forEach(function(r){var v=r[catCol];if(!seen[v]){seen[v]=1;cats.push(v)}});
  if(cats.length>20)cats=cats.slice(0,20);
  var palette=['#22d3ee','#a78bfa','#34d399','#fbbf24','#f87171'];
  var series=[];
  numCols.slice(0,3).forEach(function(nc,si){
    var vals=[];cats.forEach(function(c){var f=res.data.find(function(r){return r[catCol]===c});vals.push(f?f[nc]:0)});
    series.push({name:nc,type:'bar',data:vals,itemStyle:{color:palette[si]},barMaxWidth:30});
  });
  chartInstance.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:'#1a2236',borderColor:'#253045',textStyle:{color:'#e8ecf4'}},legend:{data:numCols.slice(0,3),textStyle:{color:'#6b7a94'},top:4},grid:{left:60,right:20,top:50,bottom:50},xAxis:{type:'category',data:cats,axisLabel:{color:'#6b7a94',fontSize:11,rotate:cats.length>10?25:0}},yAxis:{type:'value',axisLabel:{color:'#6b7a94'}} ,series:series,animation:false});
}
document.getElementById('viewerClose').addEventListener('click',function(){document.getElementById('viewerOverlay').classList.remove('open')});
document.getElementById('viewerOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});
document.getElementById('viewerRefresh').addEventListener('click',function(){
  var title=document.getElementById('viewerTitle').textContent;
  var report=savedReports.find(function(r){return r.name===title});
  if(report)openViewer(report);
  toast('数据已刷新','info');
});

// --- Toast ---
function toast(msg,type){
  var c=document.getElementById('toastContainer');
  var el=document.createElement('div');
  el.className='toast '+((type||'info'));
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(function(){el.remove()},300)},2500);
}

// --- Auto-run a sample query on load ---
document.getElementById('sqlEditor').value='SELECT * FROM workshop_monthly LIMIT 50';
setTimeout(runQuery,400);

})();
</script>
