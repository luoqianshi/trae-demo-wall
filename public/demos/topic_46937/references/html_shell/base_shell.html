<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    /* Google Fonts Optional Integration */
    {{remote_font_import}}

    /* Dynamic Theme CSS Injection */
    {{style_profile_css}}

    /* 💥 High-frequency word replacement indicator styles (Rich Aesthetics) */
    .pdh-replaced-term {
      position: relative;
      border-bottom: 2px dashed #d97706; /* 暖橙色波浪/虚线 */
      cursor: help;
      background-color: rgba(217, 119, 6, 0.05);
      padding: 0 2px;
      border-radius: 2px;
      transition: all 0.2s ease;
      font-weight: 500;
    }
    .pdh-replaced-term:hover {
      background-color: rgba(217, 119, 6, 0.15);
      color: #b45309;
    }

    /* 悬浮气泡框样式 */
    .pdh-tooltip {
      position: absolute;
      z-index: 10000;
      background: #ffffff;
      color: #1f2937;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      padding: 12px;
      width: 240px;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: auto;
      display: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      animation: pdhFadeIn 0.2s ease-out;
    }
    @keyframes pdhFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pdh-tooltip h4 {
      margin: 0 0 6px 0;
      font-size: 13px;
      color: #d97706;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pdh-tooltip p {
      margin: 0 0 8px 0;
      color: #4b5563;
    }
    .pdh-tooltip .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .pdh-tooltip button {
      flex: 1;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      color: #374151;
      font-weight: 500;
    /* 纯 CSS 悬浮提示框 (Tooltip) */
    .pdh-replaced-term {
      position: relative;
      text-decoration: underline dotted var(--brand-color, #CF6B46);
      cursor: help;
      font-weight: 500;
    }
    .pdh-replaced-term::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #2b2b2b;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
      z-index: 1000;
    }
    .pdh-replaced-term:hover::after {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>目录</h2>
    <ul class="toc-list">
      {{toc_items}}
    </ul>
  </div>

  <div class="content-area">
    <!-- Hero Banner -->
    <div class="hero-banner">
      <!-- 商品数字身份信息 -->
      <span class="hero-badge">Product Digital Identity</span>
      <h1>{{sku_title}}</h1>
      <p>商品数字身份手册 · {{style_profile_name}}</p>
    </div>

    <div class="main-body">
      {{main_body}}
    </div>
  </div>

  <!-- No JavaScript to guarantee safety and compliance with security rules -->
</body>
</html>
