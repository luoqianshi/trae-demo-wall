<!-- container -->
<div class="pdh-table-container size_table_gradient" style="overflow-x: auto; border-radius: 12px; box-shadow: var(--card-shadow); border: var(--card-border); margin: 18px 0;">
  <table style="width: 100%; border-collapse: collapse; background: #fff;">
    <thead>
      <tr style="background: linear-gradient(135deg, var(--brand-color) 0%, #1D1D1F 100%); color: #fff;">
        {{headers}}
      </tr>
    </thead>
    <tbody>
      {{rows}}
    </tbody>
  </table>
</div>
<!-- /container -->

<!-- header_cell -->
<th style="padding: 14px 16px; font-weight: 700; font-size: 14px; border-bottom: 2px solid var(--brand-color); text-align: center; white-space: nowrap;">{{name}}</th>
<!-- /header_cell -->

<!-- row_item -->
<tr style="background: {{row_bg}}; border-bottom: 1px solid rgba(0,0,0,0.06);">
  {{cells}}
</tr>
<!-- /row_item -->

<!-- cell_item -->
<td style="padding: 12px 16px; font-size: 13px; color: #333; text-align: center; {{cell_style}}">{{value}}</td>
<!-- /cell_item -->
