<!-- container -->
<div class="pdh-marketing-section" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin: 18px 0;">
  {{items}}
</div>
<!-- /container -->

<!-- item -->
<div class="pdh-marketing-card" style="border-radius: 14px; padding: 20px; background: var(--card-bg); border: var(--card-border); box-shadow: var(--card-shadow); border-left: var(--accent-border); display: flex; flex-direction: column; justify-content: space-between;">
  <div>
    <div style="display: flex; align-items: center; margin: 0 0 12px 0;">
      <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--icon-bg); color: #fff; display: flex; align-items: center; justify-content: center; margin: 0 12px 0 0; font-size: 20px;">{{icon}}</div>
      <div style="font-weight: 700; font-size: 16px; color: #1d1d1f;">{{平台}}</div>
    </div>
    <div style="font-size: 13px; color: #444; line-height: 1.7;">
      <strong>运营侧重点：</strong>{{内容侧重点}}
    </div>
  </div>
  {{optional_style}}
</div>
<!-- /item -->

<!-- optional_style -->
<div style="margin-top: 12px; color: #666; font-size: 12px; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 8px;">
  <strong>视觉风格：</strong>{{视觉风格}}
</div>
<!-- /optional_style -->
