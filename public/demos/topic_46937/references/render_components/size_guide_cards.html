<!-- container -->
<div class="pdh-guide-section size_guide_cards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin: 16px 0;">
  {{items}}
</div>
<!-- /container -->

<!-- item -->
<div class="pdh-guide-card" style="border-radius: 12px; padding: 18px; background: var(--card-bg); border: var(--card-border); box-shadow: var(--card-shadow); text-align: center; display: flex; flex-direction: column; justify-content: space-between;">
  <div>
    <div style="font-size: 32px; margin-bottom: 8px;">{{icon}}</div>
    <div style="font-weight: 700; font-size: 15px; color: var(--brand-color); margin-bottom: 8px;">{{建议维度}}</div>
    <div style="font-size: 13px; color: #444; line-height: 1.6; text-align: left; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.02);">{{具体内容说明}}</div>
  </div>
</div>
<!-- /item -->
