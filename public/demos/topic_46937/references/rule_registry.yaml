P0-VAL-001:
  title: 图片确认链完整性校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
    - validate
  fix_hint: 请在 image_selection_plan.json 中补充完整的图片确认链字段：confirmed_by_original_image=true, review_basis="original_image", original_path, visual_judgement。
  next_action:
    - validate-plan

P0-VAL-002:
  title: 视觉评审文本描述质量校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
    - validate
  fix_hint: 重新补充 visual_judgement 字段，用不少于 12 个中文字符详细描述该图片中的视觉元素、背景或姿势，拒绝使用空泛短词。
  next_action:
    - validate-plan

P0-VAL-003:
  title: 候选池归属一致性校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
  fix_hint: 检查 image_selection_plan.json 中报错图片的 ID 及其 original_path，确保它存在于 image_candidates.json 的对应章节候选池中。如果属于提取漏图，需重新运行 image-candidates；否则应修正 plan 将图片归于正确章节。
  next_action:
    - validate-plan

P0-VAL-004:
  title: 5.1 颜色候选非空展示校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
  fix_hint: 5.1 颜色候选池有图，但 plan 中没有选取任何颜色图。请至少选择 1 张有效颜色图，或全选有效颜色图，将其加入 5.1 items 中。
  next_action:
    - validate-plan

P0-VAL-005:
  title: 5.2/5.3 候选池覆盖与排除项完整性校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
  fix_hint: 检查 5.2/5.3 章节是否漏掉了候选池中的图片审查。请将未选用的图片 ID 全量补充到 excluded_candidates 数组中，并提供 review_decision="excluded"、exclude_reason 和确认链。
  next_action:
    - validate-plan

P0-VAL-006:
  title: 5.2/5.3 多视图拼接与合成图拦截
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
  fix_hint: 检查 5.2/5.3 中被判定为合成/拼图的图片，如果是合成图，必须移入 excluded_candidates 并标注 exclude_reason="multi_view_collage"。如果是单人单角度的误判，请填报 override 字段进行人工纠偏。
  next_action:
    - validate-plan

P0-VAL-007:
  title: 5.2/5.3 风险图 Override 规程校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
  fix_hint: 该图片包含拼接风险，请在 plan 中额外提供 override_system_flag_reason 字段，并将 confirmed_single_subject_single_angle 设置为 true，同时在 visual_judgement 描述中明确强调该图不是拼接合成图。
  next_action:
    - validate-plan

P0-VAL-008:
  title: 5.4 搭配候选组覆盖与一物一图原则校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
  fix_hint: 1）确保该搭配组内所有候选图片都已全部评价；2）检查是否在一套搭配里重复展示了同一个物品的多个角度，如果是，请只保留 1 张展示，把其余的移入 excluded_candidates 并标注 exclude_reason="duplicate_item_other_angle"。
  next_action:
    - validate-plan

P0-VAL-009:
  title: 5.4 搭配效果图 visual_type 校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
  fix_hint: 请为 5.4 搭配效果图 effect_image 提供合法的 visual_type 属性。如果是单张模特全身照，请设置 visual_type="single_outfit_photo" 并添加 confirmed_no_collage=true。
  next_action:
    - validate-plan

P0-VAL-010:
  title: 8.1 面料专属 visual_type 校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - image_selection_plan.json
  validators:
    - validate-plan
  fix_hint: 检查 8.1 中所选图片是否是模特穿着图，面料部分严禁模特全身穿着图进入。请补充有效的 visual_type（如 fabric_swatch / texture_closeup ），对于工艺特写必须提供 confirmed_craft_or_material_detail=true 确认字段。
  next_action:
    - validate-plan

P0-VAL-011:
  title: 4.1/4.2 表格第一列 CSS 硬契约校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - parts/part_02_audience_scene_emotion.md
    - final_handbook.md
  validators:
    - validate-parts
    - validate
  fix_hint: 检查并修复手册或部件中的 4.1 痛点表或 4.2 转化表，确保第一列所有的 <th> 和 <td> 样式属性中完全包含 "width: 100px; min-width: 100px; white-space: nowrap; text-align: center;"。
  next_action:
    - validate-parts
    - assemble
    - validate

P0-VAL-012:
  title: 5.1/5.2/5.3/5.4 图片 HTML snippet 渲染一致性校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - parts/part_03_product_gallery.md
    - final_handbook.md
  validators:
    - validate
  fix_hint: 严禁 AI 手写 HTML 的第5章图片！请删除 part_03_product_gallery.md 中 AI 手拼的图片 HTML，完全复制 snippets/gallery.md 覆盖 part_03，然后重新进行 assemble 与 validate。
  next_action:
    - assemble
    - validate

P0-VAL-013:
  title: 临时与开发敏感路径拦截校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - parts/*.md
    - final_handbook.md
  validators:
    - validate-parts
    - validate
  fix_hint: 请清除手册或对应 part 部件中的开发敏感/临时文件夹前缀（.uploads/、scratch/、.trae/、temp/）。图片必须使用正确的相对商品目录根目录的路径。
  next_action:
    - validate-parts
    - assemble
    - validate

P0-VAL-014:
  title: 内容质量门校验与占位符拦截
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - parts/*.md
    - final_handbook.md
  validators:
    - validate-parts
    - validate
  fix_hint: 检查并修复内容质量。禁止出现 xxx、待填写、搭配说明待补充 等占位符，或 AI 可生成章节中的“待补充”字眼。空表格核心单元格必须填满。
  next_action:
    - validate-parts
    - assemble

P0-VAL-015:
  title: 设计师卖点原文真实性校验
  severity: P0
  source_of_truth: workflow_rules.md
  applies_to:
    - parts/part_01_intro_selling_points.md
    - final_handbook.md
  validators:
    - validate-parts
    - validate
  fix_hint: 当商品资料中未检测到设计师原始卖点文档时，1.2 设计师卖点原文小节必须显示“待补充”警告卡片，严禁 AI 编造任何设计师原话或设计陈述。
  next_action:
    - validate-parts
    - assemble
