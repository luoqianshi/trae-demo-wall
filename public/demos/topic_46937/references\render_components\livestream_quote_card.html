<!-- container -->
<div class="pdh-livestream-section" style="margin: 16px 0;">
  {{items}}
</div>
<!-- /container -->

<!-- item -->
<div class="pdh-quote-card" style="border-radius: 12px; padding: 18px; background: var(--card-bg); border: var(--card-border); margin: 0 0 12px 0; box-shadow: var(--card-shadow); display: flex; align-items: flex-start; justify-content: space-between;">
  <div style="width: 25%; font-weight: 700; color: var(--brand-color); font-size: 14px; border-right: 2px solid var(--brand-color); padding-right: 12px; margin-right: 12px;">
    <div style="font-size: 15px;">⏱️ {{时间}}</div>
    <div style="font-size: 12px; color: #666; font-weight: 400; margin-top: 6px; background: rgba(0,0,0,0.04); padding: 2px 6px; border-radius: 4px; display: inline-block;">{{环节}}</div>
  </div>
  <div style="width: 75%; font-size: 13px; color: #333; line-height: 1.6;">
    <div style="font-weight: 500; font-size: 13.5px; color: #1D1D1F; background: rgba(140, 115, 85, 0.04); padding: 12px 14px; border-radius: 8px; border-left: none; margin-bottom: 10px; line-height: 1.6;">
      {{话术内容}}
    </div>
    {{optional_action}}
    {{optional_emotion}}
  </div>
</div>
<!-- /item -->

<!-- optional_action -->
<div style="background: rgba(255,255,255,0.7); border-radius: 6px; padding: 10px; margin-bottom: 8px; border: 1px solid rgba(0,0,0,0.03);">
  <strong>动作/画面建议：</strong>{{核心动作}}
</div>
<!-- /optional_action -->

<!-- optional_emotion -->
<div style="font-style: italic; color: #666; background: rgba(0,0,0,0.02); padding: 8px; border-radius: 6px; display: inline-block;">
  <strong>话术调性：</strong>{{情绪调性}}
</div>
<!-- /optional_emotion -->
