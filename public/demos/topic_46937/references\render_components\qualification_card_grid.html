<!-- container -->
<div class="pdh-qualification-section" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; margin: 16px 0;">
  {{items}}
</div>
<!-- /container -->

<!-- item -->
<div class="pdh-qualification-card" style="border-radius: 12px; padding: 18px; background: var(--card-bg); border: var(--card-border); box-shadow: var(--card-shadow); border-top: var(--accent-border); display: flex; flex-direction: column; justify-content: space-between;">
  <div>
    <div style="font-weight: 700; font-size: 15px; color: var(--brand-color); margin: 0 0 10px 0;">📋 {{资质/认证/检测项目}}</div>
    <div style="font-size: 13px; color: #444; line-height: 1.6; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 8px;">{{标准与结论说明}}</div>
  </div>
</div>
<!-- /item -->
