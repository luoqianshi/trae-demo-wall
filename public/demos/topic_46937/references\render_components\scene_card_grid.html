<!-- container -->
<div class="pdh-scene-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin: 16px 0;">
  {{items}}
</div>
<!-- /container -->

<!-- item -->
<div class="pdh-scene-card" style="padding: 20px; background: var(--card-bg); border-radius: 12px; border: var(--card-border); box-shadow: var(--card-shadow); transition: transform 0.2s; display: flex; flex-direction: column;">
  <div style="font-size: 32px; margin: 0 0 10px 0; text-align: center;">{{icon}}</div>
  <div style="font-weight: 700; font-size: 15px; color: #1d1d1f; margin: 0 0 8px 0; border-bottom: 2px solid var(--brand-color); display: inline-block; padding-bottom: 4px; text-align: center;">{{category_display}}{{具体场景}}</div>
  <div style="font-size: 13px; color: #555; line-height: 1.6; margin: 0; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 8px;"><strong>痛点与需求：</strong>{{痛点需求}}</div>
</div>
<!-- /item -->
