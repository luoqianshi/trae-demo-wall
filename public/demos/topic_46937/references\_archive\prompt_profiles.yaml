# v2.3 多风格调性配置文件 (Prompt Profiles)
# 允许用户及运营人员自主修改，由 PipelineEngine 动态加载解析

luxury:
  name: "💎 奢华高级感 (Luxury & Premium)"
  tone: "克制、叙事、注重剪裁美学与面料肌理的诗意传达。严禁任何口水话与促销导购语调。"
  anti_repetition_guidelines: "去重复词写作指南：在编写各小节内容时，严禁重复连用核心形容词（如修身、显瘦、舒适、百搭）。请必须深度查阅 references/synonym_dictionary.md 并在写作中动态循环使用同义平替词，保持单章节内同一形容词出现次数不超过2次。"
  allowed_vocab:
    - "流线垂感"
    - "雕塑感廓形"
    - "精工细作"
    - "静奢"
    - "纱线骨感"
    - "折射微光"
    - "从容张力"
    - "肌理深度"
  cliche_blacklist:
    - "十分好看"
    - "非常推荐"
    - "性价比极高"
    - "快来抢购"
    - "爆款推荐"
    - "买到就是赚到"
    - "一定要入手"
  style_attributes:
    line_spacing: "1.8"
    font_weight_base: "300"
    color_accents: "#000000"

