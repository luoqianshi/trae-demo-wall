<!-- container -->
<div class="pdh-persona-section" style="margin: 18px 0;">
  {{items}}
</div>
<!-- /container -->

<!-- item_rich -->
<div class="pdh-persona-card" style="border-radius: 18px; padding: 24px; background: var(--card-bg); border: var(--card-border); margin: 0 0 16px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.04);">
  <div style="display: flex; align-items: center; margin: 0 0 16px 0;">
    <div style="width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; margin: 0 14px 0 0; font-size: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">{{icon}}</div>
    <div>
      <div style="font-weight: 700; font-size: 17px; color: #1d1d1f; margin: 0 0 3px 0;">{{人群}}</div>
      <div style="font-size: 12.5px; color: #666; margin: 0;">{{meta}}</div>
    </div>
  </div>
  <div class="pdh-persona-inner" style="background: rgba(255,255,255,0.65); border-radius: 12px; padding: 16px 18px; font-size: 13px; color: #333; line-height: 1.8; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);">
    <p style="margin: 0 0 8px 0;"><strong>画像描述：</strong>{{画像描述}}</p>
    <p style="margin: 0 0 8px 0;"><strong>消费动机：</strong>{{消费动机}}</p>
    <p style="margin: 0;"><strong>决策关键词：</strong>{{决策关键词}}</p>
  </div>
</div>
<!-- /item_rich -->

<!-- item_simple -->
<div class="pdh-behavior-table-wrap" style="margin: 0 0 10px 0;">
  <table class="pdh-behavior-table" style="width: 100%; border-collapse: separate; border-spacing: 0;">
    {{behavior_header}}
    {{behavior_rows}}
  </table>
</div>
<!-- /item_simple -->

<!-- behavior_header -->
<thead>
  <tr>
    <th class="pdh-bt-head pdh-bt-head-dim" style="font-weight: 700; font-size: 14px; padding: 14px 20px; text-align: left; width: 22%;">维度</th>
    <th class="pdh-bt-head pdh-bt-head-desc" style="font-weight: 700; font-size: 14px; padding: 14px 20px; text-align: left;">特征描述</th>
  </tr>
</thead>
<!-- /behavior_header -->

<!-- behavior_row -->
<tr class="pdh-bt-row" style="background: {{row_bg}};">
  <td style="padding: 14px 20px; border-bottom: 1px solid rgba(0,0,0,0.04); vertical-align: middle;">
    <span class="pdh-dim-pill pdh-dim-pill-{{idx}}" style="display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; background: {{pill_bg}}; color: {{pill_color}};">{{维度}}</span>
  </td>
  <td style="padding: 14px 20px; font-size: 13.5px; color: #333; line-height: 1.6; border-bottom: 1px solid rgba(0,0,0,0.04);">{{描述}}</td>
</tr>
<!-- /behavior_row -->
