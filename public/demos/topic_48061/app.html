<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>HEAL CARD · 工位回血</title>
    <meta name="description" content="把每一次工位上的小动作，做成一张张可收集的回血卡牌。" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <script>
        (function () {
            try {
                var t = localStorage.getItem('heal-theme');
                if (t !== 'light' && t !== 'dark' && t !== 'auto') t = 'auto';
                var html = document.documentElement;
                html.setAttribute('data-theme', t);
                if (t === 'auto' && window.matchMedia) {
                    var m = window.matchMedia('(prefers-color-scheme: light)');
                    html.classList.toggle('is-light-system', m.matches);
                    html.classList.toggle('is-dark-system', !m.matches);
                }
            } catch (e) { }
        })();
    </script>

    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="styles/today.css" />
    <link rel="stylesheet" href="styles/library.css" />
    <link rel="stylesheet" href="styles/history.css" />
    <link rel="stylesheet" href="styles/me.css" />
    <link rel="stylesheet" href="styles/animations.css" />
    <link rel="stylesheet" href="styles/theme.css" />
</head>

<body class="app">

    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-logo">⚡</span>
                <div>
                    <div class="brand-name">HEAL CARD</div>
                    <div class="brand-sub">v1.0 · 工位回血</div>
                </div>
            </div>

            <nav class="nav-list">
                <a class="nav-item" data-tab="today" href="#today"> <span
                        class="nav-icon">🎴</span><span>今日回血</span></a>
                <a class="nav-item" data-tab="library" href="#library"><span
                        class="nav-icon">📚</span><span>卡牌图鉴</span></a>
                <a class="nav-item" data-tab="history" href="#history"><span class="nav-icon">📈</span><span>历史 &
                        周报</span></a>
                <a class="nav-item" data-tab="me" href="#me"> <span class="nav-icon">👤</span><span>我的</span></a>
            </nav>

            <div class="sidebar-foot">
                <strong>HEAL CARD</strong><br />
                把日常变成游戏。<br />
                <a href="intro.html" target="_blank" rel="noopener" style="color:var(--mint)">了解更多 →</a>
            </div>
        </aside>

        <!-- Topbar -->
        <header class="topbar">
            <div class="top-title-group">
                <div id="topTitle" class="top-title">今日回血</div>
                <div id="topDate" class="top-date">—</div>
            </div>
            <div class="top-meta">
                <div class="top-meta-card">
                    <div class="label">连签</div>
                    <div class="value"><span id="topStreak">0</span></div>
                </div>
                <div class="top-meta-card">
                    <div class="label">本轮</div>
                    <div class="value"><span id="topRound">0</span></div>
                </div>
                <div class="top-meta-card">
                    <div class="label">今日抽卡</div>
                    <div class="value"><span id="topDrawn">0</span></div>
                </div>
                <div class="top-meta-card is-mint">
                    <div class="label">总 HP</div>
                    <div class="value"><span id="topHp">0</span></div>
                </div>
            </div>
            <div id="themeSeg" class="theme-seg" role="group" aria-label="主题切换">
                <button class="theme-seg-btn" type="button" data-theme="auto" title="跟随系统" aria-label="跟随系统">
                    <span class="ts-icon">🌗</span>
                    <span class="ts-label">跟随系统</span>
                </button>
                <button class="theme-seg-btn" type="button" data-theme="light" title="浅色" aria-label="浅色">
                    <span class="ts-icon">☀️</span>
                    <span class="ts-label">浅色</span>
                </button>
                <button class="theme-seg-btn" type="button" data-theme="dark" title="深色" aria-label="深色">
                    <span class="ts-icon">🌙</span>
                    <span class="ts-label">深色</span>
                </button>
            </div>
        </header>

        <!-- Main -->
        <main class="main">
            <section id="viewRoot" class="view-root"><!-- router 注入 --></section>
        </main>
    </div>

    <!-- ====== 模板：今日 ====== -->
    <template id="tpl-today">
        <!-- HP -->
        <section class="panel hp-panel fade-in">
            <div class="hp-row">
                <div class="hp-label">今日 HP</div>
                <div class="hp-value"><span id="hpVal">0</span><span class="hp-max">/100</span></div>
                <div class="hp-tip">每张卡 HP 累加到上限 100</div>
            </div>
            <div class="progress is-fat">
                <div id="hpFill" class="progress-fill" style="width:0%"></div>
            </div>
        </section>

        <!-- Mood -->
        <section class="panel mood-panel rise-in">
            <div class="panel-head">
                <span class="step">STEP 1</span>
                <h2>当前是什么状态？</h2>
                <span class="sub">可多选 · 也可不选</span>
            </div>
            <div id="moodChips" class="chip-row"></div>
        </section>

        <!-- Draw CTA -->
        <section class="panel draw-panel rise-in">
            <div class="draw-info">
                <h3>STEP 2 · 抽 3 张今日卡</h3>
                <div id="drawHint" class="draw-hint">点击抽 3 张今日卡牌</div>
            </div>
            <button id="drawBtn" class="btn btn-primary btn-large draw-btn">🎲 开始抽卡 →</button>
        </section>

        <!-- Cards -->
        <section id="cardsPanel" class="panel today-stack hide rise-in">
            <!-- 1. 进度 -->
            <div class="today-section">
                <div class="progress-head">
                    <span id="todayProgressBadge" class="progress-badge">0 / 3</span>
                    <span id="todayProgressMeta" class="progress-meta">—</span>
                </div>
                <div class="progress">
                    <div id="todayProgressFill" class="progress-fill" style="width:0%"></div>
                </div>
            </div>

            <!-- 2. 卡牌网格 -->
            <div class="today-section">
                <div id="cardGrid" class="card-grid"></div>
                <div id="allDoneBox" class="all-done hide"></div>
            </div>

            <!-- 3. 行动 -->
            <div class="today-section">
                <div class="action-row">
                    <div id="todayActionsSummary" class="action-summary">—</div>
                    <button id="flipAllBtn" class="btn btn-secondary">全部翻开</button>
                    <button id="redrawBtn" class="btn btn-ghost">重抽本批</button>
                </div>
            </div>
        </section>
    </template>

    <!-- ====== 模板：图鉴 ====== -->
    <template id="tpl-library">
        <section class="panel lib-hero fade-in">
            <div id="libRingWrap" class="lib-ring"></div>
            <div class="lib-info">
                <h2>卡牌图鉴</h2>
                <p class="lead">每抽到 1 次即解锁，再次抽到累加次数。坚持就有满图鉴的那一天 ✨</p>
                <div id="libStats" class="lib-stats"></div>
            </div>
        </section>

        <section class="panel rise-in">
            <div class="panel-head">
                <h2>按稀有度筛选</h2>
            </div>
            <div id="libFilter" class="lib-filter"></div>
            <div id="libGrid" class="lib-grid"></div>
        </section>
    </template>

    <!-- ====== 模板：历史 ====== -->
    <template id="tpl-history">
        <section class="panel fade-in">
            <div class="panel-head">
                <h2>最近 4 周热力图</h2>
                <span class="sub">颜色越深当天回血越多</span>
            </div>
            <div id="hxCal" class="heatmap"></div>
            <div class="heat-legend">
                <span>少</span>
                <span class="swatch" style="background:rgba(255,255,255,0.04)"></span>
                <span class="swatch" style="background:rgba(124,255,178,0.18)"></span>
                <span class="swatch" style="background:rgba(124,255,178,0.36)"></span>
                <span class="swatch" style="background:rgba(124,255,178,0.58)"></span>
                <span class="swatch" style="background:var(--mint)"></span>
                <span>多</span>
            </div>
        </section>

        <section class="panel rise-in">
            <div class="panel-head">
                <h2>本周每日 HP</h2>
            </div>
            <div id="hxChartWrap" class="week-chart"></div>
        </section>

        <section class="panel rise-in">
            <div class="panel-head">
                <h2>本周周报</h2>
            </div>
            <div id="hxReportWrap"></div>
        </section>
    </template>

    <!-- ====== 模板：我的 ====== -->
    <template id="tpl-me">
        <section class="panel me-hero fade-in">
            <div id="meAvatar" class="avatar">🌱</div>
            <div>
                <div class="me-title">HEAL CARD 用户</div>
                <div id="meSub" class="me-sub">—</div>
                <div class="me-stats">
                    <div class="me-stat">
                        <div class="k">总 HP</div>
                        <div class="v"><span id="meHp">0</span></div>
                    </div>
                    <div class="me-stat">
                        <div class="k">连签</div>
                        <div class="v"><span id="meStreak">0</span></div>
                    </div>
                    <div class="me-stat">
                        <div class="k">完成卡牌</div>
                        <div class="v"><span id="meCards">0</span></div>
                    </div>
                    <div class="me-stat">
                        <div class="k">图鉴</div>
                        <div class="v"><span id="meCollect">0/128</span></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel rise-in me-section">
            <div class="panel-head">
                <h2>每日提醒</h2>
            </div>
            <div class="row">
                <div class="row-text">
                    <div class="t">开启浏览器通知</div>
                    <div class="d">页面打开期间生效（不会后台运行）</div>
                </div>
                <div class="row-action">
                    <label class="switch">
                        <input id="meRemindOn" type="checkbox">
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>
            <div class="row">
                <div class="row-text">
                    <div class="t">提醒时间</div>
                    <div class="d">每天到点提醒来抽张卡</div>
                </div>
                <div class="row-action">
                    <input id="meRemindTime" type="time" class="input" value="14:30" />
                </div>
            </div>
        </section>

        <section class="panel rise-in me-section">
            <div class="panel-head">
                <h2>卡池偏好</h2>
                <span class="sub">关掉的标签将从抽卡池里排除</span>
            </div>
            <div class="row">
                <div class="row-text">
                    <div class="t">仅饭点出现「饭点卡」</div>
                    <div class="d">关闭后饭点限定卡随时可抽</div>
                </div>
                <div class="row-action">
                    <label class="switch">
                        <input id="meHourLimit" type="checkbox">
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>
            <div style="margin-top:12px">
                <div id="meTagChips" class="chip-row"></div>
                <div class="d" style="color:var(--fg-3);font-size:var(--fs-sm);margin-top:8px">
                    共 <span id="meTagAllN">10</span> 类标签，灰色为已禁用
                </div>
            </div>
        </section>

        <section class="panel rise-in me-section">
            <div class="panel-head">
                <h2>外观主题</h2>
                <span class="sub">选「跟随系统」会自动随 macOS / Windows 外观切换</span>
            </div>
            <div class="row">
                <div class="row-text">
                    <div class="t">主题</div>
                    <div class="d">浅色 · 深色 · 跟随系统</div>
                </div>
            </div>
            <div id="meThemeRow" class="theme-row" style="margin-top:8px">
                <button class="theme-chip" data-theme="auto"><span class="tc-icon">🌗</span>跟随系统</button>
                <button class="theme-chip" data-theme="light"><span class="tc-icon">☀️</span>浅色</button>
                <button class="theme-chip" data-theme="dark"><span class="tc-icon">🌙</span>深色</button>
            </div>
        </section>

        <section class="panel rise-in me-section">
            <div class="panel-head">
                <h2>数据管理</h2>
            </div>
            <div class="data-actions">
                <button id="meExportBtn" class="btn btn-secondary">📤 导出 JSON 备份</button>
                <button id="meImportBtn" class="btn btn-secondary">📥 导入 JSON（覆盖）</button>
                <input id="meImportFile" type="file" accept="application/json,.json" hidden />
                <button id="meResetBtn" class="btn btn-danger">🗑 重置所有数据</button>
            </div>
        </section>

        <section class="panel rise-in me-section">
            <div class="panel-head">
                <h2>关于</h2>
            </div>
            <div id="meAbout"></div>
        </section>
    </template>

    <script type="module" src="scripts/main.js"></script>
</body>

</html>
