  let clueFound = null;
  
  // Check for clue triggers
  const npcId = Object.keys(npcData).find(function(k) { return npcData[k] === npc; });
  if (npcId && clueTriggers[npcId]) {
    const triggers = clueTriggers[npcId];
    for (var key in triggers) {
      if (input.includes(key)) {
        clueFound = triggers[key];
        break;
      }
    }
  }
  
  if (match) {
    chatContext.push({ speaker: 'player', text: input });
    if (match.knowledge) {
      addJournalEntry(match.knowledge, npc.name);
    }
    chatContext.push({ speaker: 'npc', text: match.resp });
    return { text: match.resp, knowledge: match.knowledge, clue: clueFound };
  }
  const defaults = npc.defaults || ['...'];
  const resp = defaults[Math.floor(Math.random() * defaults.length)];
  chatContext.push({ speaker: 'player', text: input });
  chatContext.push({ speaker: 'npc', text: resp });
  return { text: resp, knowledge: null, clue: clueFound };
}

function getSuggestions(npc) {
  if (!npc.topics) return [];
  // Pick 3 random topic keywords as suggestions
  const suggestions = [];
  npc.topics.forEach(function(t) {
    if (t.keys && t.keys.length > 0 && !t.keys[0].includes('你好')) {
      suggestions.push(t.keys[0]);
    }
  });
  // Shuffle and take 4
  return suggestions.sort(() => Math.random() - 0.5).slice(0, 4);
}

// ===================== JOURNAL SYSTEM =====================
function addJournalEntry(knowledge, source) {
  // Check if already added
  const exists = journal.find(function(j) { return j.title === knowledge.title; });
  if (exists) return false;

  journal.push({
    title: knowledge.title,
    cat: knowledge.cat,
    content: knowledge.content,
    source: source || '探索发现',
    time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
  });
  updateJournalBadge();
  return true;
}

function updateJournalBadge() {
  const badge = document.getElementById('journalBadge');
  if (journal.length > 0) {
    badge.textContent = '(' + journal.length + ')';
  } else {
    badge.textContent = '';
  }
}

function renderJournal() {
  const list = document.getElementById('journalList');
  document.getElementById('journalCount').textContent = journal.length + ' 条记录';
  if (journal.length === 0) {
    list.innerHTML = '<div class="journal-empty">尚未发现任何知识。<br>去和历史人物对话，探索各个地点，<br>知识会自然涌现。</div>';
    return;
  }
  list.innerHTML = '';
  journal.slice().reverse().forEach(function(entry) {
    const div = document.createElement('div');
    div.className = 'journal-entry';
    div.innerHTML = '<div class="je-cat">' + entry.cat + '</div>' +
      '<div class="je-title">' + entry.title + '</div>' +
      '<div class="je-content">' + entry.content + '</div>' +
      '<div class="je-source">— 来源：' + entry.source + ' · ' + entry.time + '</div>';
    list.appendChild(div);
  });
}

function toggleJournal() {
  var panel = $('journalPanel');
  $('questPanel').classList.remove('open');
  $('cluePanel').classList.remove('open');
  $('graphPanel').classList.remove('open');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderJournal();
}

function $(id) { return document.getElementById(id); }

function showStart() {

  $('mapView').style.display = 'none';
  $('locView').style.display = 'none';
  $('chatView').style.display = 'none';
  $('startScreen').style.display = 'flex';

  // 主菜单使用金色粒子
  updateParticleColor();
}

function renderStartScreen() {

  container.innerHTML = '';

    card.className = 'sc-card' + ((completedScenarios || []).includes(sc.id) ? ' completed' : '');

      '<div class="sc-icon">' + sc.icon + '</div>' +

function startScenario(scId) {
  currentScenario = scenarios[scId];
  // 根据场景类型切换粒子颜色
  updateParticleColor(scId);
  visitedLocations = [];
  chatContext = [];
  clues = [];
  quests = [];
  completedQuests = [];
  insights = [];
  dayCount = 1;
  maxDays = currentScenario.maxDays || 1;
  actionCount = 0;
  
  // Start initial quest
  if (currentScenario.startQuest) {
    startQuest(currentScenario.startQuest);
  }
  
  updateAllBadges();
  updateTimeDisplay();
  $('topbar').style.display = 'flex';
  $('topTitle').textContent = currentScenario.name;
  $('startScreen').style.display = 'none';

}

function showMap() {
  $('locView').style.display = 'none';
  $('chatView').style.display = 'none';
  $('mapView').style.display = 'flex';
  applyTransition($('mapView'), 'fade-in');
  $('topLoc').textContent = '';

  const intro = $('mapIntro');
  intro.innerHTML = '<h2>' + currentScenario.mapTitle + '</h2>' + currentScenario.mapIntro;

  const grid = $('mapGrid');
  grid.innerHTML = '';
  currentScenario.locations.forEach(function(loc) {
    const card = document.createElement('div');
    card.className = 'loc-card' + (visitedLocations.includes(loc.id) ? ' visited' : '');
    card.innerHTML = '<div class="loc-icon">' + loc.icon + '</div>' +
      '<div class="loc-name">' + loc.name + '</div>' +
      '<div class="loc-desc">' + loc.desc + '</div>' +
      '<div class="loc-tag">' + loc.tag + '</div>';
    card.onclick = function() { visitLocation(loc); };
    grid.appendChild(card);
  });
}

function visitLocation(loc) {
  currentLocation = loc;
  if (!visitedLocations.includes(loc.id)) visitedLocations.push(loc.id);
  advanceTime();
  showLocationView(loc);
  applyTransition($('locView'), 'fade-in');
}

function showLocationView(loc) {
  $('mapView').style.display = 'none';
  $('locView').style.display = 'flex';
  $('topLoc').textContent = '· ' + loc.name;
  $('locTitle').textContent = loc.icon + ' ' + loc.name;

  const scene = $('locScene');
  let html = '<div class="scene-text">' + loc.scene + '</div>';
  html += '<div class="interact-section">';

  // NPCs
  if (loc.npcs && loc.npcs.length > 0) {
    html += '<div class="interact-label">可以交谈的人</div><div class="npc-list">';
    loc.npcs.forEach(function(npcId) {
      const npc = npcData[npcId];
      if (npc) {
        html += '<div class="npc-chip" onclick="startChat(\'' + npcId + '\')">' +
          '<div class="npc-avatar" style="background:' + npc.avatar.bg + ';color:' + npc.avatar.color + '">' + npc.avatar.text + '</div>' +
          '<div><div class="npc-name">' + npc.name + '</div><div class="npc-title">' + npc.title + '</div></div>' +
          '</div>';
      }
    });
    html += '</div>';
  }

  // Objects
  if (loc.objects && loc.objects.length > 0) {
    html += '<div class="interact-label">可以查看的物品</div><div class="object-list">';
    loc.objects.forEach(function(objName) {
      html += '<div class="obj-chip" onclick="examineObject(\'' + objName.replace(/'/g, "\\'") + '\')">' + objName + '</div>';
    });
    html += '</div>';
  }

  html += '</div>';
  scene.innerHTML = html;
}

function examineObject(objName) {
  const obj = objectData[objName];
  if (!obj) return;

  // Add a system message to the location scene
  const scene = $('locScene');
  const div = document.createElement('div');
  div.className = 'scene-text';
  div.style.borderLeft = '3px solid var(--info)';
  div.style.paddingLeft = '14px';
  div.style.marginTop = '12px';
  div.innerHTML = '<em>🔎 ' + objName + '</em><br>' + obj.desc;

  if (obj.knowledge) {
    addJournalEntry(obj.knowledge, '调查「' + objName + '」');
    div.innerHTML += '<div style="margin-top:8px;font-size:11px;color:var(--accent);">📖 知识已记录到日志</div>';
  }

  // Check for object clue triggers
  if (objectClueTriggers[objName]) {
    var clueId = objectClueTriggers[objName];
    var clue = clueData[clueId];
    if (clue && !clues.find(function(c) { return c.id === clueId; })) {
      clues.push(clue);
      updateClueBadge();
      triggerClueFlash();
      div.innerHTML += '<div style="margin-top:8px;font-size:11px;color:var(--info);">🧩 发现线索：' + clue.title + ' — 已记录到线索面板</div>';
      checkQuestProgress();
      checkInsights();
      addSystemNotification('🧩 发现线索：' + clue.title, 'clue');
    }
  }

  scene.appendChild(div);
  scene.scrollTop = scene.scrollHeight;
}

// ===================== CHAT SYSTEM =====================
function startChat(npcId) {
  currentNPC = npcData[npcId];
  chatContext = [];

  $('locView').style.display = 'none';
  $('chatView').style.display = 'flex';
  applyTransition($('chatView'), 'fade-in');
  $('topLoc').textContent = '· 与' + currentNPC.name + '对话';

  // Render header
  $('chatHeader').innerHTML = '<button class="back-btn" onclick="endChat()">← 返回</button>' +
    '<div class="chat-avatar" style="background:' + currentNPC.avatar.bg + ';color:' + currentNPC.avatar.color + '">' + currentNPC.avatar.text + '</div>' +
    '<div class="chat-info"><div class="chat-name">' + currentNPC.name + '</div><div class="chat-title">' + currentNPC.title + ' · ' + (currentNPC.location || '') + '</div></div>';

  // Clear log
  $('chatLog').innerHTML = '';

  // Add greeting
  addChatMessage('npc', currentNPC.greeting);

  // Show suggestions
  renderSuggestions();

  // Focus input
  $('chatInput').value = '';
  $('chatInput').focus();
}

function addChatMessage(type, text, knowledge) {
  const log = $('chatLog');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + type;
  div.textContent = text;
  if (knowledge) {
    const kDiv = document.createElement('div');
    kDiv.className = 'knowledge-found';
    kDiv.textContent = '📖 新知识已记录：' + knowledge.title;
    div.appendChild(kDiv);
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function renderSuggestions() {
  const container = $('chatSuggestions');
  container.innerHTML = '';
  if (!currentNPC) return;
  const suggestions = getSuggestions(currentNPC);
  suggestions.forEach(function(s) {
    const chip = document.createElement('button');
    chip.className = 'sugg-chip';
    chip.textContent = s;
    chip.onclick = function() {
      $('chatInput').value = s;
      sendChat();
    };
    container.appendChild(chip);
  });
}

function sendChat() {
  var input = $('chatInput').value.trim();
  if (!input || !currentNPC) return;

  addChatMessage('player', input);
  $('chatInput').value = '';

  setTimeout(function() {
    var result = getNPCResponse(currentNPC, input);
    addChatMessage('npc', result.text, result.knowledge);
    
    // Handle clue discovery
    if (result.clue) {
      var clue = clueData[result.clue];
      if (clue && !clues.find(function(c) { return c.id === result.clue; })) {
        clues.push(clue);
        updateClueBadge();
        triggerClueFlash();
        // Show clue popup in chat
        var log = $('chatLog');
        var popup = document.createElement('div');
        popup.className = 'chat-msg system';
        popup.innerHTML = '🧩 发现线索：<strong style="color:var(--info)">' + clue.title + '</strong> — 已记录到线索面板';
        log.appendChild(popup);
        log.scrollTop = log.scrollHeight;
        // Check quest progress
        checkQuestProgress();
        // Check for new insights
        checkInsights();
      }
    }
    
    renderSuggestions();
  }, 400 + Math.random() * 400);
}

function endChat() {
  currentNPC = null;
  $('chatView').style.display = 'none';
  if (currentLocation) {
    showLocationView(currentLocation);
  } else {
    showMap();
  }
}

// ===================== TIME SYSTEM =====================
function advanceTime() {
  actionCount++;
  // Every 3 actions = 1 day
  if (actionCount >= 3) {
    actionCount = 0;
    dayCount++;
    if (dayCount > maxDays) dayCount = maxDays;
    if (dayCount >= maxDays) {
      addSystemNotification('⏰ 时间将尽！第' + maxDays + '天——最后的探索机会。');
    } else {
      addSystemNotification('第' + dayCount + '天开始了。');
    }
  }
  updateTimeDisplay();
}

function updateTimeDisplay() {
  var el = $('timeDisplay');
  if (!el) return;
  if (maxDays > 1) {
    el.textContent = '第' + dayCount + '/' + maxDays + '天';
    el.classList.toggle('urgent', dayCount >= maxDays);
  } else {
    el.textContent = '';
    el.classList.remove('urgent');
  }
}

function addSystemNotification(text, type) {
  var container = $('toastContainer');
  if (!container) return;
  var toast = document.createElement('div');
  toast.className = 'toast' + (type ? ' ' + type : '');
  toast.textContent = text;
  container.appendChild(toast);
  setTimeout(function() {
    toast.style.animation = 'toastOut 0.4s ease forwards';
    setTimeout(function() { toast.remove(); }, 400);
  }, 3500);
}

// ===================== QUEST SYSTEM =====================
function startQuest(questId) {
  var q = questData[questId];
  if (!q) return;
  quests.push(q);
  updateQuestBadge();
  // Show quest start notification
  addSystemNotification('🔍 新任务：' + q.title, 'quest');
}

function checkQuestProgress() {
  quests.forEach(function(q) {
    if (completedQuests.includes(q.id)) return;
    var collected = 0;
    q.targetClues.forEach(function(clueId) {
      if (clues.find(function(c) { return c.id === clueId; })) collected++;
    });
    if (collected >= q.minClues) {
      completeQuest(q);
    }
  });
}

function completeQuest(q) {
  completedQuests.push(q.id);
  quests = quests.filter(function(item) { return item.id !== q.id; });
  updateQuestBadge();
  
  // Give rewards
  if (q.reward) {
    if (q.reward.clues) {
      q.reward.clues.forEach(function(clueId) {
        var clue = clueData[clueId];
        if (clue && !clues.find(function(c) { return c.id === clueId; })) {
          clues.push(clue);
          triggerClueFlash();
        }
      });
    }
    if (q.reward.insight) {
      unlockInsight(q.reward.insight);
    }
  }
  
  // Show completion notification
  addSystemNotification('✅ 任务完成：' + q.title, 'quest');
  updateAllBadges();
  
  // Start next quest
  if (q.nextQuest) {
    setTimeout(function() { startQuest(q.nextQuest); }, 2000);
  }
}

function renderQuests() {
  var list = $('questList');
  var count = quests.length + completedQuests.length;
  $('questCount').textContent = count + ' 个任务';
  
  if (count === 0) {
    list.innerHTML = '<div class="journal-empty">暂无任务。<br>去探索世界，与NPC对话，<br>任务会自然出现。</div>';
    return;
  }
  
  list.innerHTML = '';
  // Active quests
  quests.forEach(function(q) {
    var collected = 0;
    q.targetClues.forEach(function(clueId) {
      if (clues.find(function(c) { return c.id === clueId; })) collected++;
    });
    var pct = Math.round((collected / q.minClues) * 100);
    
    var div = document.createElement('div');
    div.className = 'quest-card';
    div.innerHTML = '<div class="quest-title">🔍 ' + q.title + '</div>' +
      '<div class="quest-desc">' + q.desc + '</div>' +
      '<div class="quest-progress">进度：' + collected + '/' + q.minClues + ' 条线索</div>' +
      '<div class="quest-bar"><div class="quest-bar-fill" style="width:' + pct + '%"></div></div>';
    list.appendChild(div);
  });
  
  // Completed quests
  completedQuests.forEach(function(qid) {
    var q = questData[qid];
    if (!q) return;
    var div = document.createElement('div');
    div.className = 'quest-card done';
    div.innerHTML = '<div class="quest-title">✅ ' + q.title + '</div>' +
      '<div class="quest-desc">' + q.onComplete + '</div>';
    list.appendChild(div);
  });
}

function toggleQuest() {
  var panel = $('questPanel');
  // Close other panels
  $('journalPanel').classList.remove('open');
  $('cluePanel').classList.remove('open');
  $('graphPanel').classList.remove('open');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderQuests();
}

// ===================== CLUE & INSIGHT SYSTEM =====================
function checkInsights() {
  for (var insId in insightData) {
    var ins = insightData[insId];
    if (insights.find(function(i) { return i.id === insId; })) continue;
    var hasAll = ins.requires.every(function(clueId) {
      return clues.find(function(c) { return c.id === clueId; });
    });
    if (hasAll) {
      unlockInsight(insId);
    }
  }
}

function unlockInsight(insId) {
  var ins = insightData[insId];
  if (!ins || insights.find(function(i) { return i.id === insId; })) return;
  insights.push(ins);
  addSystemNotification('💡 洞察解锁：' + ins.title, 'insight');
  updateAllBadges();
}

function renderClues() {
  var list = $('clueList');
  $('clueCount').textContent = clues.length + ' 条线索 · ' + insights.length + ' 个洞察';
  
  if (clues.length === 0 && insights.length === 0) {
    list.innerHTML = '<div class="journal-empty">尚未发现任何线索。<br>与NPC对话时聊到关键话题，<br>线索会自然浮现。</div>';
    return;
  }
  
  list.innerHTML = '';
  
  // Insights first
  insights.forEach(function(ins) {
    var div = document.createElement('div');
    div.className = 'insight-card';
    div.innerHTML = '<div class="insight-badge">💡 洞察</div>' +
      '<div class="insight-title">' + ins.title + '</div>' +
      '<div class="insight-content">' + ins.content + '</div>';
    list.appendChild(div);
  });
  
  // Then clues
  clues.slice().reverse().forEach(function(clue) {
    var div = document.createElement('div');
    div.className = 'clue-card';
    div.innerHTML = '<div class="clue-title">🧩 ' + clue.title + '</div>' +
      '<div class="clue-desc">' + clue.desc + '</div>' +
      '<div class="clue-source">来源：' + clue.source + '</div>';
    list.appendChild(div);
  });
}

function toggleClues() {
  var panel = $('cluePanel');
  $('journalPanel').classList.remove('open');
  $('questPanel').classList.remove('open');
  $('graphPanel').classList.remove('open');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderClues();
}

// ===================== EXPLORATION GRAPH =====================
var _graphNodes = []; // 缓存节点位置，供鼠标悬停命中检测

function toggleGraph() {
  var panel = $('graphPanel');
  $('journalPanel').classList.remove('open');
  $('questPanel').classList.remove('open');
  $('cluePanel').classList.remove('open');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderGraph();
}

function renderGraph() {
  var canvas = $('graphCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (!currentScenario) {
    _graphNodes = [];
    ctx.fillStyle = '#6a6a78';
    ctx.font = '13px Georgia,serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('请先选择一个历史场景开始探索', W / 2, H / 2);
    return;
  }

  var scenario = currentScenario;

  // ---- 构建节点集合 ----
  var locNodes = scenario.locations.map(function(l) {
    return { type:'loc', id:l.id, label:l.name, discovered: visitedLocations.indexOf(l.id) >= 0 };
  });
  var npcIdSet = {};
  scenario.locations.forEach(function(l) { (l.npcs || []).forEach(function(n) { npcIdSet[n] = true; }); });
  var npcNodes = Object.keys(npcIdSet).map(function(nid) {
    var nd = npcData[nid] || { name: nid };
    return { type:'npc', id:nid, label:nd.name || nid, discovered: metNPCs.indexOf(nid) >= 0 };
  });
  // 通过场景NPC可达的线索
  var clueIdSet = {};
  Object.keys(npcIdSet).forEach(function(nid) {
    var trigs = clueTriggers[nid];
    if (trigs) Object.keys(trigs).forEach(function(k) { clueIdSet[trigs[k]] = true; });
  });
  var clueNodes = Object.keys(clueIdSet).map(function(cid) {
    var cd = clueData[cid] || { title:'?' };
    var found = clues.find(function(c) { return c.id === cid; });
    return { type:'clue', id:cid, label: found ? cd.title : '？？？', realLabel: cd.title, discovered: !!found };
  });
  // 与本场景相关的洞察（所需线索均属于本场景线索集）
  var insNodes = [];
  Object.keys(insightData).forEach(function(iid) {
    var ins = insightData[iid];
    var relevant = ins.requires.every(function(c) { return clueIdSet[c]; });
    if (!relevant) return;
    var found = insights.find(function(x) { return x.id === iid; });
    insNodes.push({ type:'insight', id:iid, label: found ? ins.title : '？？？', realLabel: ins.title, discovered: !!found });
  });

  // ---- 同心圆布局：中心=场景，地点内圈，NPC次圈，线索再次，洞察外圈 ----
  var cx = W / 2, cy = H / 2;
  var squash = 0.62; // 横向压缩以适配画布宽高比
  function ringPos(count, i, rx, ry, rotate) {
    var a = (i / Math.max(count, 1)) * Math.PI * 2 - Math.PI / 2 + (rotate || 0);
    return { x: cx + Math.cos(a) * rx, y: cy + Math.sin(a) * ry };
  }

  var nodes = [];
  nodes.push({ type:'center', id:'__center', label: scenario.name, icon: scenario.icon, discovered:true, x:cx, y:cy, r:18 });
  locNodes.forEach(function(n, i) { var p = ringPos(locNodes.length, i, 70 * squash, 70); n.x = p.x; n.y = p.y; n.r = 12; nodes.push(n); });
  npcNodes.forEach(function(n, i) { var p = ringPos(npcNodes.length, i, 125 * squash, 125, 0.15); n.x = p.x; n.y = p.y; n.r = 10; nodes.push(n); });
  clueNodes.forEach(function(n, i) { var p = ringPos(clueNodes.length, i, 175 * squash, 175, 0.30); n.x = p.x; n.y = p.y; n.r = 8; nodes.push(n); });
  insNodes.forEach(function(n, i) { var p = ringPos(insNodes.length, i, 220 * squash, 220, 0.45); n.x = p.x; n.y = p.y; n.r = 11; nodes.push(n); });

  // ---- 构建连线 ----
  var edges = [];
  scenario.locations.forEach(function(l) {
    (l.npcs || []).forEach(function(nid) { edges.push({ from:l.id, to:nid, kind:'loc-npc' }); });
  });
  Object.keys(npcIdSet).forEach(function(nid) {
    var trigs = clueTriggers[nid];
    if (!trigs) return;
    Object.keys(trigs).forEach(function(k) { edges.push({ from:nid, to:trigs[k], kind:'npc-clue' }); });
  });
  insNodes.forEach(function(ins) {
    var def = insightData[ins.id];
    (def.requires || []).forEach(function(cid) { if (clueIdSet[cid]) edges.push({ from:cid, to:ins.id, kind:'clue-insight' }); });
  });

  var byId = {};
  nodes.forEach(function(n) { byId[n.id] = n; });

  // ---- 先绘制连线 ----
  edges.forEach(function(e) {
    var a = byId[e.from], b = byId[e.to];
    if (!a || !b) return;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    if (e.kind === 'loc-npc') {
      ctx.strokeStyle = 'rgba(106,106,120,0.32)'; ctx.lineWidth = 1; ctx.setLineDash([]);
    } else if (e.kind === 'npc-clue') {
      ctx.strokeStyle = 'rgba(106,154,201,0.30)'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    } else {
      ctx.strokeStyle = 'rgba(201,168,76,0.45)'; ctx.lineWidth = 1.2; ctx.setLineDash([]);
    }
    ctx.stroke();
  });
  ctx.setLineDash([]);

  // ---- 绘制节点 ----
  nodes.forEach(function(n) { drawGraphNode(ctx, n); });

  // ---- 绘制标签 ----
  ctx.font = '10px Georgia,serif'; ctx.textBaseline = 'middle';
  nodes.forEach(function(n) {
    if (n.type === 'center') {
      ctx.fillStyle = '#c9a84c'; ctx.font = 'bold 12px Georgia,serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(n.label, n.x, n.y + n.r + 4);
      ctx.textBaseline = 'middle'; ctx.font = '10px Georgia,serif';
      return;
    }
    var dx = n.x - cx, dy = n.y - cy;
    var ang = (Math.abs(dx) < 1 && Math.abs(dy) < 1) ? 0 : Math.atan2(dy, dx);
    var tx = n.x + Math.cos(ang) * (n.r + 5);
    var ty = n.y + Math.sin(ang) * (n.r + 5);
    var maxW = tx >= cx ? (W - tx - 2) : (tx - 2);
    ctx.fillStyle = n.discovered ? 'rgba(232,230,224,0.92)' : 'rgba(106,106,120,0.85)';
    ctx.textAlign = tx >= cx ? 'left' : 'right';
    ctx.fillText(fitText(ctx, n.label, maxW), tx, ty);
  });

  _graphNodes = nodes;
}

function fitText(ctx, text, maxW) {
  if (maxW <= 6) return text.slice(0, 2);
  if (ctx.measureText(text).width <= maxW) return text;
  var t = text;
  while (t.length > 1 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
  return t.length > 0 ? t + '…' : '';
}

function drawGraphNode(ctx, n) {
  var gold = '#c9a84c', greyFill = '#2e2e3a';
  ctx.save();
  ctx.translate(n.x, n.y);
  ctx.fillStyle = n.discovered ? gold : greyFill;
  ctx.strokeStyle = n.discovered ? '#ffffff' : '#1a1a26';
  ctx.lineWidth = n.discovered ? 1.5 : 1;
  if (n.discovered) { ctx.shadowColor = 'rgba(201,168,76,0.6)'; ctx.shadowBlur = 6; }
  ctx.beginPath();
  if (n.type === 'center' || n.type === 'loc') {
    ctx.arc(0, 0, n.r, 0, Math.PI * 2);
  } else if (n.type === 'npc') { // 菱形
    ctx.moveTo(0, -n.r); ctx.lineTo(n.r, 0); ctx.lineTo(0, n.r); ctx.lineTo(-n.r, 0); ctx.closePath();
  } else if (n.type === 'clue') { // 三角形
    ctx.moveTo(0, -n.r); ctx.lineTo(n.r * 0.92, n.r * 0.7); ctx.lineTo(-n.r * 0.92, n.r * 0.7); ctx.closePath();
  } else if (n.type === 'insight') { // 星形
    drawStar(ctx, 0, 0, 5, n.r, n.r * 0.45);
  }
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  // 中心节点内放场景图标
  if (n.type === 'center') {
    ctx.fillStyle = '#0a0a0f';
    ctx.font = '15px Georgia,serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(n.icon || '★', 0, 1);
  }
  ctx.restore();
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  var rot = -Math.PI / 2, step = Math.PI / spikes;
  ctx.moveTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
  for (var i = 0; i < spikes; i++) {
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
  }
  ctx.closePath();
}

function initGraphInteraction() {
  var canvas = $('graphCanvas');
  var tip = $('graphTooltip');
  if (!canvas || !tip) return;
  canvas.addEventListener('mousemove', function(e) {
    var rect = canvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    var my = (e.clientY - rect.top) * (canvas.height / rect.height);
    var hit = null;
    for (var i = _graphNodes.length - 1; i >= 0; i--) {
      var n = _graphNodes[i];
      if (Math.hypot(mx - n.x, my - n.y) <= n.r + 3) { hit = n; break; }
    }
    if (hit) {
      var typeLabel = { center:'场景', loc:'地点', npc:'人物', clue:'线索', insight:'洞察' }[hit.type];
      var status = hit.type === 'center' ? '' : (hit.discovered ? '已探索' : '未探索');
      var name;
      if (hit.type === 'center') name = hit.label;
      else if (hit.discovered) name = hit.realLabel || hit.label;
      else name = (hit.type === 'clue' || hit.type === 'insight') ? '未发现 · 继续探索' : hit.label;
      tip.innerHTML = '<div class="gt-type">' + typeLabel + (status ? ' · ' + status : '') + '</div>' +
                      '<div>' + name + '</div>';
      tip.style.display = 'block';
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top = (e.clientY + 14) + 'px';
      canvas.style.cursor = 'pointer';
    } else {
      tip.style.display = 'none';
      canvas.style.cursor = 'default';
    }
  });
  canvas.addEventListener('mouseleave', function() { tip.style.display = 'none'; });
}
initGraphInteraction();

// ===================== ENDING RADAR CHART =====================
function renderRadarChart() {
  var canvas = document.getElementById('radarCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  var cx = W / 2, cy = H / 2;
  var R = Math.min(W, H) / 2 - 50;

  var dims = [
    { name: '知识广度', val: Math.min(journal.length / 15, 1) },
    { name: '线索收集', val: Math.min(clues.length / 8, 1) },
    { name: '洞察深度', val: Math.min(insights.length / 2, 1) },
    { name: '任务完成', val: Math.min(completedQuests.length / 2, 1) },
    { name: '地点探索', val: Math.min(visitedLocations.length / 7, 1) },
    { name: '社交互动', val: Math.min(metNPCs.length / 8, 1) }
  ];
  var n = dims.length;
  var angle = function(i) { return -Math.PI / 2 + i * 2 * Math.PI / n; };

  // 六边形网格背景（3层）
  ctx.strokeStyle = 'rgba(106,106,120,0.25)'; ctx.lineWidth = 1;
  for (var layer = 1; layer <= 3; layer++) {
    var rr = R * layer / 3;
    ctx.beginPath();
    for (var i = 0; i < n; i++) {
      var a = angle(i);
      var x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.stroke();
  }

  // 轴线
  ctx.strokeStyle = 'rgba(106,106,120,0.20)';
  for (var i = 0; i < n; i++) {
    var a = angle(i);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R); ctx.stroke();
  }

  // 数据多边形
  ctx.beginPath();
  for (var i = 0; i < n; i++) {
    var a = angle(i);
    var rr = R * dims[i].val;
    var x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(201,168,76,0.25)'; ctx.fill();
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2; ctx.stroke();

  // 顶点
  ctx.fillStyle = '#c9a84c';
  for (var i = 0; i < n; i++) {
    var a = angle(i); var rr = R * dims[i].val;
    var x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
  }

  // 轴标签
  ctx.fillStyle = '#e8e6e0'; ctx.font = '10px Georgia,serif'; ctx.textBaseline = 'middle';
  for (var i = 0; i < n; i++) {
    var a = angle(i);
    var lx = cx + Math.cos(a) * (R + 22), ly = cy + Math.sin(a) * (R + 22);
    ctx.textAlign = Math.abs(Math.cos(a)) < 0.1 ? 'center' : (Math.cos(a) > 0 ? 'left' : 'right');
    ctx.fillText(dims[i].name, lx, ly);
  }
}

// 场景过渡动画辅助函数：为元素添加过渡类，动画结束后移除
function applyTransition(el, cls) {
  if (!el) return;
  cls = cls || 'fade-in';
  el.classList.remove(cls);
  // 强制 reflow 以便重复触发动画
  void el.offsetWidth;
  el.classList.add(cls);
  var dur = cls === 'fade-in' ? 500 : 400;
  setTimeout(function() { el.classList.remove(cls); }, dur + 50);
}

// 根据当前场景类型更新粒子颜色
var PARTICLE_COLORS = {
  'ming': '#c9a84c',
  'socrates': '#e8e6e0',
  'spy': '#c96a5a',
  'necro': '#6a9ac9'
};

  }

// 粒子背景系统（低性能消耗：仅用 transform/opacity 思路，固定数量，单层 canvas）
(function() {
  var canvas = document.getElementById('bgCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var particles = [];
  var color = '#c9a84c';
  var W = 0, H = 0;
  var COUNT = 40; // 30-50 之间
  var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function createParticle() {
    return {
      x: rand(0, W),
      y: rand(0, H),
      r: rand(1, 3),
      vx: rand(-0.15, 0.15),
      vy: rand(-0.22, -0.04),
      alpha: rand(0.2, 0.6),
      twinkle: rand(0, Math.PI * 2),
      twinkleSpeed: rand(0.008, 0.025)
    };
  }
  for (var i = 0; i < COUNT; i++) particles.push(createParticle());

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.twinkle += p.twinkleSpeed;
      // 边界环绕
      if (p.y < -10) { p.y = H + 10; p.x = rand(0, W); }
      if (p.y > H + 10) { p.y = -10; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      var a = p.alpha * (0.55 + 0.45 * Math.sin(p.twinkle));
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  // 暴露颜色更新接口
  window._setParticleColor = function(c) { color = c; };

  if (reduced) {
    // 尊重系统的“减少动态效果”设置：只绘制静态一帧
    draw = function() {
      ctx.clearRect(0, 0, W, H);
      ctx.save();
      ctx.shadowBlur = 8;
      ctx.shadowColor = color;
      ctx.fillStyle = color;
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        ctx.globalAlpha = p.alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    };
    draw();
  } else {
    draw();
  }
})();

// ===================== 新手引导系统 =====================
var onboardingStep = 0;
var ONBOARD_KEY = 'jiaruXXX_onboarded';

function showOnboarding() {
  onboardingStep = 0;
  var overlay = document.getElementById('onboardingOverlay');
  if (overlay) {
    overlay.style.display = 'flex';
    renderOnboardingStep();
  }
}

function renderOnboardingStep() {
  var card = document.getElementById('onboardingCard');
  if (!card) return;
  var steps = [
    {

      body: '<p style="font-size:14px;line-height:2;color:var(--muted);margin:14px 0 22px;">在这里，你将穿越到历史的十字路口。<br><br>你可以<strong style="color:var(--accent);">自由探索</strong>各个地点，与历史人物<strong style="color:var(--accent);">对话</strong>，收集散落的<strong style="color:var(--accent);">线索</strong>，最终揭开隐藏在时间深处的<strong style="color:var(--accent);">真相</strong>。</p>',
      btn: '下一步'
    },
    {
      title: '操作指南',
      body: '<div style="text-align:left;font-size:13px;line-height:2.2;color:var(--ink);margin:14px 0 22px;">' +
            '<div style="margin-bottom:8px;">🗺️ <strong style="color:var(--accent);">点击地图地点</strong>前往探索</div>' +
            '<div style="margin-bottom:8px;">💬 与NPC<strong style="color:var(--accent);">自由对话</strong>，输入关键词触发回应</div>' +
            '<div style="margin-bottom:8px;">🔎 <strong style="color:var(--accent);">查看物品</strong>获取历史知识</div>' +
            '<div>⚔️ 完成<strong style="color:var(--accent);">调查任务</strong>解锁最终真相</div>' +
            '</div>',
      btn: '下一步'
    },
    {
      title: '选择场景',
      body: '<p style="font-size:15px;line-height:2;color:var(--ink);margin:14px 0 22px;">选择一个历史场景<br>开始你的探索之旅</p>',
      btn: '开始体验'
    }
  ];
  var s = steps[onboardingStep];
  // 进度指示器 ●○○ → ○●○ → ○○●
  var dots = '';
  for (var i = 0; i < 3; i++) {
    dots += (i === onboardingStep)
      ? '<span style="color:var(--accent);">●</span>'
      : '<span style="color:var(--muted);">○</span>';
    if (i < 2) dots += '  ';
  }
  card.innerHTML =
    '<div style="font-size:14px;letter-spacing:4px;margin-bottom:10px;">' + dots + '</div>' +
    '<div style="font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px;">' + s.title + '</div>' +
    s.body +
    '<button class="ob-btn" onclick="nextOnboarding()">' + s.btn + '</button>' +
    '<button class="ob-skip" onclick="closeOnboarding()">跳过引导</button>';
}

function nextOnboarding() {
  onboardingStep++;
  if (onboardingStep >= 3) {
    closeOnboarding();
  } else {
    renderOnboardingStep();
  }
}

function closeOnboarding() {
  var overlay = document.getElementById('onboardingOverlay');
  if (overlay) overlay.style.display = 'none';
  try { localStorage.setItem(ONBOARD_KEY, '1'); } catch(e) {}
}

function closeShareModal() {
  var modal = document.getElementById('shareModal');
  if (modal) modal.classList.remove('show');
}

function copyShareText() {
  var ta = document.getElementById('shareTextarea');
  var status = document.getElementById('shareStatus');
  if (!ta) return;
  var text = ta.value;

  var showStatus = function(msg, color) {
    if (status) {
      status.textContent = msg;
      status.style.color = color || 'var(--success)';
      setTimeout(function() { if (status) status.textContent = ''; }, 2500);
    }
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showStatus('✓ 已复制到剪贴板', 'var(--success)');
    }).catch(function() {
      if (fallbackCopy(ta)) showStatus('✓ 已复制到剪贴板', 'var(--success)');
      else showStatus('复制失败，请手动选择文本复制', 'var(--danger)');
    });
  } else {
    if (fallbackCopy(ta)) showStatus('✓ 已复制到剪贴板', 'var(--success)');
    else showStatus('复制失败，请手动选择文本复制', 'var(--danger)');
  }
}

function fallbackCopy(ta) {
  try {
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    var ok = document.execCommand('copy');
    return ok;
  } catch(e) {
    return false;
  }
}
