<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>假如你是XXX · 历史沉浸体验</title>
<style>
:root {
  --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a26; --bg4: #22222e;
  --ink: #e8e6e0; --muted: #6a6a78; --rule: #2a2a38;
  --accent: #c9a84c; --accent-dim: #8a7430;
  --info: #6a9ac9; --success: #6aa878; --danger: #c96a5a; --wisdom: #9a8acc;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'Georgia','Noto Serif SC','STSong','SimSun',serif;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ===== 顶栏 ===== */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; background: var(--bg2); border-bottom: 1px solid var(--rule);
  z-index: 10; flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-title { font-size: 16px; font-weight: 700; color: var(--accent); }
.topbar-loc { font-size: 12px; color: var(--muted); }
.topbar-right { display: flex; gap: 8px; }
.tb-btn {
  padding: 6px 14px; background: var(--bg3); border: 1px solid var(--rule);
  border-radius: 8px; color: var(--ink); font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all 0.2s ease;
}
.tb-btn:hover { border-color: var(--accent); color: var(--accent); }
.tb-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.tb-time {
  font-size: 12px; color: var(--accent); padding: 4px 10px;
  background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2);
  border-radius: 8px; font-variant-numeric: tabular-nums;
}
.tb-time.urgent { color: var(--danger); border-color: var(--danger); animation: timerShake 0.5s infinite; }
@keyframes timerShake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-1px); } 75% { transform: translateX(1px); } }

/* 任务卡片 */
.quest-card {
  padding: 14px; margin-bottom: 10px; background: var(--bg3); border-radius: 10px;
  border-left: 3px solid var(--accent); animation: msgIn 0.4s ease;
}
.quest-card.done { border-left-color: var(--success); opacity: 0.7; }
.quest-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.quest-desc { font-size: 12px; line-height: 1.7; color: var(--muted); margin-bottom: 8px; }
.quest-progress { font-size: 11px; color: var(--accent); }
.quest-bar { height: 4px; background: var(--bg4); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.quest-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }

/* 线索卡片 */
.clue-card {
  padding: 12px; margin-bottom: 8px; background: var(--bg3); border-radius: 10px;
  border-left: 3px solid var(--info); animation: msgIn 0.4s ease;
}
.clue-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.clue-desc { font-size: 12px; line-height: 1.7; color: var(--muted); }
.clue-source { font-size: 10px; color: var(--muted); margin-top: 4px; font-style: italic; }

/* 洞察卡片 */
.insight-card {
  padding: 14px; margin-bottom: 10px; background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.02));
  border-radius: 10px; border: 1px solid rgba(201,168,76,0.3); animation: msgIn 0.4s ease;
}
.insight-badge { font-size: 10px; color: var(--accent); margin-bottom: 4px; letter-spacing: 1px; }
.insight-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
.insight-content { font-size: 12px; line-height: 1.8; color: var(--ink); }

/* 对话中的线索提示 */
.clue-popup {
  margin-top: 8px; padding: 6px 10px; background: rgba(106,154,201,0.1);
  border: 1px solid rgba(106,154,201,0.3); border-radius: 8px;
  font-size: 11px; color: var(--info);
}

/* ===== 主区域 ===== */
.main { flex: 1; position: relative; overflow: hidden; }

/* ===== 地图视图 ===== */
.map-view {
  position: absolute; inset: 0; overflow-y: auto;
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px;
}
.map-intro {
  max-width: 560px; text-align: center; margin-bottom: 20px;
  font-size: 13px; line-height: 1.9; color: var(--muted);
}
.map-intro h2 { font-size: 18px; color: var(--accent); margin-bottom: 8px; }
.map-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px; max-width: 720px; width: 100%;
}
.loc-card {
  background: var(--bg2); border: 1px solid var(--rule); border-radius: 12px;
  padding: 16px; cursor: pointer; transition: all 0.3s ease;
  position: relative; overflow: hidden;
}
.loc-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent-dim); opacity: 0; transition: opacity 0.3s;
}
.loc-card:hover {
  border-color: var(--accent); transform: translateY(-3px);
  box-shadow: var(--shadow);
}
.loc-card:hover::before { opacity: 1; }
.loc-card.visited { border-color: var(--accent-dim); opacity: 0.85; }
.loc-icon { font-size: 24px; margin-bottom: 8px; }
.loc-name { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.loc-desc { font-size: 11px; color: var(--muted); line-height: 1.6; }
.loc-tag {
  display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 6px;
  background: rgba(201,168,76,0.1); color: var(--accent); margin-top: 6px;
}

/* ===== 地点详情视图 ===== */
.loc-view {
  position: absolute; inset: 0; display: none; flex-direction: column;
}
.loc-header {
  padding: 14px 20px; background: var(--bg2); border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
}
.loc-header-left { display: flex; align-items: center; gap: 10px; }
.loc-header h3 { font-size: 16px; color: var(--accent); }
.back-btn {
  padding: 4px 12px; background: var(--bg3); border: 1px solid var(--rule);
  border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.back-btn:hover { color: var(--accent); border-color: var(--accent); }

.loc-scene {
  padding: 20px; overflow-y: auto; flex: 1;
}
.scene-text {
  max-width: 640px; margin: 0 auto 20px; font-size: 13px; line-height: 2;
  color: var(--ink); text-align: justify;
}
.scene-text em { color: var(--accent); font-style: normal; }

.interact-section { max-width: 640px; margin: 0 auto; }
.interact-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
.npc-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.npc-chip {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px;
  background: var(--bg3); border: 1px solid var(--rule); border-radius: 20px;
  cursor: pointer; transition: all 0.2s; font-size: 12px;
}
.npc-chip:hover { border-color: var(--accent); background: var(--bg4); }
.npc-avatar {
  width: 24px; height: 24px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
}
.npc-name { color: var(--ink); }
.npc-title { color: var(--muted); font-size: 10px; }

.object-list { display: flex; flex-wrap: wrap; gap: 8px; }
.obj-chip {
  padding: 6px 12px; background: var(--bg3); border: 1px solid var(--rule);
  border-radius: 8px; cursor: pointer; font-size: 12px; color: var(--ink);
  transition: all 0.2s;
}
.obj-chip:hover { border-color: var(--info); color: var(--info); }

/* ===== 对话视图 ===== */
.chat-view {
  position: absolute; inset: 0; display: none; flex-direction: column;
}
.chat-header {
  padding: 12px 20px; background: var(--bg2); border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; gap: 10px;
}
.chat-avatar {
  width: 36px; height: 36px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 14px; font-weight: 700;
}
.chat-info { flex: 1; }
.chat-name { font-size: 14px; font-weight: 700; color: var(--ink); }
.chat-title { font-size: 11px; color: var(--muted); }

.chat-log {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 10px;
}
.chat-msg {
  max-width: 78%; padding: 10px 14px; border-radius: 14px;
  font-size: 13px; line-height: 1.8; animation: msgIn 0.3s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.chat-msg.npc {
  align-self: flex-start; background: var(--bg3); border: 1px solid var(--rule);
  border-bottom-left-radius: 4px;
}
.chat-msg.player {
  align-self: flex-end; background: var(--accent-dim); color: var(--ink);
  border-bottom-right-radius: 4px;
}
.chat-msg.system {
  align-self: center; background: transparent; color: var(--muted);
  font-size: 11px; font-style: italic; text-align: center; max-width: 90%;
}
.chat-msg .knowledge-found {
  margin-top: 8px; padding: 6px 10px; background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2); border-radius: 8px;
  font-size: 11px; color: var(--accent);
}

.chat-suggestions {
  padding: 6px 16px; display: flex; flex-wrap: wrap; gap: 6px;
  border-top: 1px solid var(--rule);
}
.sugg-chip {
  padding: 4px 10px; background: var(--bg3); border: 1px solid var(--rule);
  border-radius: 12px; font-size: 11px; color: var(--muted); cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.sugg-chip:hover { color: var(--accent); border-color: var(--accent); }

.chat-input-area {
  padding: 10px 16px; display: flex; gap: 8px; background: var(--bg2);
  border-top: 1px solid var(--rule);
}
.chat-input {
  flex: 1; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--rule);
  border-radius: 10px; color: var(--ink); font-size: 13px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send {
  padding: 10px 18px; background: var(--accent); border: none; border-radius: 10px;
  color: var(--bg); font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.chat-send:hover { opacity: 0.85; }
.chat-end {
  padding: 6px 12px; background: transparent; border: 1px solid var(--rule);
  border-radius: 8px; color: var(--muted); font-size: 11px; cursor: pointer;
  font-family: inherit;
}
.chat-end:hover { color: var(--danger); border-color: var(--danger); }

/* ===== 日志面板 ===== */
.journal-panel {
  position: fixed; top: 0; right: -400px; width: 380px; height: 100vh;
  background: var(--bg2); border-left: 1px solid var(--rule); z-index: 100;
  transition: right 0.3s ease; display: flex; flex-direction: column;
  box-shadow: -4px 0 20px rgba(0,0,0,0.3);
}
.journal-panel.open { right: 0; }
.journal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
}
.journal-title { font-size: 16px; font-weight: 700; color: var(--accent); }
.journal-count { font-size: 11px; color: var(--muted); }
.journal-close {
  background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer;
}
.journal-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.journal-empty { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; line-height: 1.8; }
.journal-entry {
  padding: 12px; margin-bottom: 10px; background: var(--bg3); border-radius: 10px;
  border-left: 3px solid var(--accent); animation: msgIn 0.4s ease;
}
.je-cat { font-size: 10px; color: var(--info); margin-bottom: 4px; }
.je-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.je-content { font-size: 12px; line-height: 1.7; color: var(--muted); }
.je-source { font-size: 10px; color: var(--muted); margin-top: 6px; font-style: italic; }

/* ===== 开场选择 ===== */
.start-screen {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 20px;
  background: transparent; /* 透明，让金色粒子背景透出 */
}
.start-title { font-size: 28px; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
.start-sub { font-size: 13px; color: var(--muted); margin-bottom: 30px; text-align: center; line-height: 1.8; }
.scenario-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.sc-card {
  width: 200px; padding: 20px; background: var(--bg2); border: 1px solid var(--rule);
  border-radius: 14px; cursor: pointer; transition: all 0.3s; text-align: center;
}
.sc-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: var(--shadow); }
.sc-icon { font-size: 32px; margin-bottom: 10px; }
.sc-name { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.sc-desc { font-size: 11px; color: var(--muted); line-height: 1.7; }
.sc-era { font-size: 10px; color: var(--accent); margin-top: 8px; }

/* 滚动条 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

/* 结局画面 */
.ending-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95); z-index: 10000; display: none;
  overflow-y: auto; animation: fadeIn 0.8s ease;
}
.ending-overlay.show { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
.ending-card {
  max-width: 700px; width: 100%; background: var(--bg2);
  border: 1px solid var(--rule); border-radius: 16px; padding: 40px;
  margin-bottom: 24px; animation: msgIn 0.6s ease;
}
.ending-title { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 8px; }
.ending-subtitle { font-size: 14px; text-align: center; color: var(--muted); margin-bottom: 24px; }
.ending-text { font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 16px; }
.ending-stats { display: flex; gap: 16px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
.ending-stat { text-align: center; }
.ending-stat-num { font-size: 24px; font-weight: 700; color: var(--accent); }
.ending-stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.ending-section-title { font-size: 16px; font-weight: 600; color: var(--accent); margin: 20px 0 10px; border-bottom: 1px solid var(--rule); padding-bottom: 6px; }
.ending-knowledge-card { background: var(--bg3); border-radius: 10px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
.ending-knowledge-card .k-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.ending-knowledge-card .k-cat { font-size: 10px; color: var(--muted); display: inline-block; padding: 2px 8px; background: var(--bg); border-radius: 8px; margin-left: 6px; }
.ending-knowledge-card .k-content { font-size: 12px; line-height: 1.6; color: var(--muted); margin-top: 6px; }
.ending-insight-card { background: var(--bg3); border-radius: 10px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--wisdom); }
.ending-insight-card .i-title { font-size: 13px; font-weight: 600; color: var(--wisdom); margin-bottom: 4px; }
.ending-insight-card .i-content { font-size: 12px; line-height: 1.6; color: var(--muted); margin-top: 6px; }
.ending-achievement { display: flex; align-items: center; gap: 10px; background: var(--bg3); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
.ending-achievement .a-icon { font-size: 20px; }
.ending-achievement .a-name { font-size: 13px; font-weight: 600; }
.ending-achievement .a-desc { font-size: 11px; color: var(--muted); }
.ending-btn { display: block; width: 100%; padding: 14px; margin-top: 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.ending-btn:hover { opacity: 0.85; }
.scenario-card.completed::after {
  content: '✓ 已通关'; position: absolute; top: 8px; right: 8px;
  font-size: 10px; color: var(--success); background: rgba(0,255,136,0.1);
  padding: 2px 8px; border-radius: 6px;
}

/* 全局通知 */
.toast-container {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 8px;
  pointer-events: none; max-width: 90%;
}
.toast {
  padding: 10px 20px; background: var(--bg3); border: 1px solid var(--accent);
  border-radius: 10px; font-size: 12px; color: var(--accent); text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: toastIn 0.4s ease;
  pointer-events: auto;
}
.toast.insight { border-color: var(--wisdom); color: var(--wisdom); }
.toast.clue { border-color: var(--info); color: var(--info); }
.toast.quest { border-color: var(--success); color: var(--success); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }

/* ===== 电影级视觉氛围系统 ===== */
/* 粒子背景画布 */
#bgCanvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1; pointer-events: none;
}
/* 线索发现全屏闪光层 */
#clueFlash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9998; opacity: 0;
  box-shadow: inset 0 0 100px rgba(201,168,76,0);
}
#clueFlash.flash { animation: clueFlashAnim 0.6s ease-out; }
@keyframes clueFlashAnim {
  0% { opacity: 0; box-shadow: inset 0 0 0 rgba(201,168,76,0); }
  35% { opacity: 1; box-shadow: inset 0 0 100px rgba(201,168,76,0.3); }
  100% { opacity: 0; box-shadow: inset 0 0 100px rgba(201,168,76,0); }
}

/* 场景过渡动画 */
.fade-in { animation: fadeInUp 0.5s ease both; }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.slide-in-right { animation: slideInRight 0.4s ease both; }
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* 地点卡片 hover 光效（增强） */
.loc-card {
  transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}
.loc-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(201,168,76,0.15), var(--shadow);
}

/* NPC 对话气泡滑入动画 */
.chat-msg.npc { animation: npcSlideIn 0.3s ease both; }
@keyframes npcSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== 探索图谱面板 ===== */
.side-panel {
  position: fixed; top: 0; right: -400px; width: 380px; height: 100vh;
  background: var(--bg2); border-left: 1px solid var(--rule); z-index: 100;
  transition: right 0.3s ease; display: flex; flex-direction: column;
  box-shadow: -4px 0 20px rgba(0,0,0,0.3);
}
.side-panel.open { right: 0; }
.panel-header {
  padding: 16px 20px; border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.panel-title { font-size: 16px; font-weight: 700; color: var(--accent); }
.panel-close {
  background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer;
  font-family: inherit; transition: color 0.2s;
}
.panel-close:hover { color: var(--accent); }
.panel-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; }
#graphCanvas { display: block; max-width: 100%; }
.graph-tooltip {
  position: fixed; pointer-events: none; z-index: 200; display: none;
  background: var(--bg4); border: 1px solid var(--accent); border-radius: 8px;
  padding: 6px 10px; font-size: 11px; color: var(--ink); max-width: 210px;
  line-height: 1.5; box-shadow: 0 4px 14px rgba(0,0,0,0.6);
}
.graph-tooltip .gt-type { color: var(--accent); font-size: 10px; margin-bottom: 2px; }
.graph-tooltip .gt-status { color: var(--muted); font-size: 10px; }

/* 雷达图 */
#radarCanvas { display: block; margin: 8px auto 4px; background: transparent; }

/* ===== 新手引导层 ===== */
.ob-btn {
  display: block; width: 100%; padding: 12px; margin-top: 8px;
  background: var(--accent); color: var(--bg); border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: opacity 0.2s;
}
.ob-btn:hover { opacity: 0.85; }

.share-btn:hover { opacity: 0.85; }

<body>

<!-- 粒子背景画布 -->
<canvas id="bgCanvas"></canvas>
<!-- 线索发现全屏闪光层 -->
<div id="clueFlash"></div>

<!-- 全局通知容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- ===== 结局画面 ===== -->
<div class="ending-overlay" id="endingOverlay"></div>

<!-- ===== 新手引导覆盖层 ===== -->
<div id="onboardingOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;justify-content:center;align-items:center;">
  <div id="onboardingCard" style="max-width:500px;background:var(--bg2);border:1px solid var(--accent);border-radius:16px;padding:30px;text-align:center;animation:msgIn 0.5s ease;">
    <!-- 内容动态填充 -->
  </div>
</div>

<!-- ===== 探索成果分享面板 ===== -->
<div class="share-modal" id="shareModal">
  <div class="share-card">
    <div class="share-title">📤 分享我的探索</div>
    <textarea class="share-textarea" id="shareTextarea" readonly></textarea>
    <div id="shareStatus" style="text-align:center;font-size:12px;min-height:18px;margin-top:8px;"></div>
    <div class="share-actions">
      <button class="share-btn primary" onclick="copyShareText()">复制到剪贴板</button>
      <button class="share-btn secondary" onclick="closeShareModal()">关闭</button>
    </div>
  </div>
</div>

<!-- ===== 顶栏 ===== -->
<div class="topbar" id="topbar" style="display:none;">
  <div class="topbar-left">
    <span class="topbar-title" id="topTitle">假如你是XXX</span>
    <span class="topbar-loc" id="topLoc"></span>
  </div>

    <span class="tb-time" id="timeDisplay"></span>

    <button class="tb-btn" onclick="toggleClues()">🧩 线索 <span id="clueBadge"></span></button>
    <button class="tb-btn" onclick="toggleGraph()">🕸️ 图谱</button>
    <button class="tb-btn" onclick="showStart()">🏠 返回</button>
  </div>
</div>

<!-- ===== 主区域 ===== -->
<div class="main" id="main">

  <!-- 开场选择 -->
  <div class="start-screen" id="startScreen">
    <div class="start-title">假如你是XXX</div>
    <div class="start-sub">穿越到历史的十字路口，自由探索，与历史人物对话，<br>在行走中理解那些改变世界的抉择。</div>
    <div class="scenario-cards" id="scenarioCards"></div>
    <button class="onboard-menu-btn" onclick="showOnboarding()">📖 新手引导</button>
  </div>

  <!-- 地图视图 -->
  <div class="map-view" id="mapView" style="display:none;">
    <div class="map-intro" id="mapIntro"></div>
    <div class="map-grid" id="mapGrid"></div>
  </div>

  <!-- 地点详情 -->
  <div class="loc-view" id="locView">
    <div class="loc-header">
      <div class="loc-header-left">
        <button class="back-btn" onclick="showMap()">← 返回地图</button>
        <h3 id="locTitle"></h3>
      </div>
    </div>
    <div class="loc-scene" id="locScene"></div>
  </div>

  <!-- 对话视图 -->
  <div class="chat-view" id="chatView">
    <div class="chat-header" id="chatHeader"></div>
    <div class="chat-log" id="chatLog"></div>
    <div class="chat-suggestions" id="chatSuggestions"></div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="输入你想说的话..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">发送</button>
      <button class="chat-end" onclick="endChat()">结束对话</button>
    </div>
  </div>

</div>

<!-- ===== 日志面板 ===== -->
<div class="journal-panel" id="journalPanel">
  <div class="journal-header">
    <div>
      <div class="journal-title">📜 探索日志</div>
      <div class="journal-count" id="journalCount">0 条记录</div>
    </div>
    <button class="journal-close" onclick="toggleJournal()">✕</button>
  </div>
  <div class="journal-list" id="journalList">
    <div class="journal-empty">尚未发现任何知识。<br>去和历史人物对话，探索各个地点，<br>知识会自然涌现。</div>
  </div>
</div>

<!-- ===== 任务面板 ===== -->
<div class="journal-panel" id="questPanel">
  <div class="journal-header">
    <div>
      <div class="journal-title">🔍 调查任务</div>
      <div class="journal-count" id="questCount">0 个任务</div>
    </div>
    <button class="journal-close" onclick="toggleQuest()">✕</button>
  </div>
  <div class="journal-list" id="questList"></div>
</div>

<!-- ===== 线索面板 ===== -->
<div class="journal-panel" id="cluePanel">
  <div class="journal-header">
    <div>
      <div class="journal-title">🧩 线索与洞察</div>
      <div class="journal-count" id="clueCount">0 条线索 · 0 个洞察</div>
    </div>
    <button class="journal-close" onclick="toggleClues()">✕</button>
  </div>
  <div class="journal-list" id="clueList"></div>
</div>

<!-- ===== 探索图谱面板 ===== -->
<div class="side-panel" id="graphPanel">
  <div class="panel-header">
    <span class="panel-title">🕸️ 探索图谱</span>

  </div>
</div>
<div class="graph-tooltip" id="graphTooltip"></div>

      { keys:['陛下','皇上','嘉靖','修道','西苑'], resp:'陛下在西苑修道，已经二十年不上朝了。但你不要以为陛下昏庸——他通过控制内阁来掌握朝政，严嵩不过是他手里的一枚棋子。一旦陛下觉得严嵩不好用了...', knowledge:{title:'嘉靖帝与修道',cat:'帝王行为',content:'嘉靖帝朱厚熜20余年不上朝，在西苑修道求仙。但他并非昏庸——通过控制内阁首辅人选、利用太监监视百官，嘉靖始终掌握皇权。这是"无为而治"到极致的帝王心术。'} },
      { keys:['弹劾','上疏','奏折','怎么扳倒'], resp:'弹劾严嵩？不是不可以，但要等待时机。杨继盛太急了，他直接上疏弹劾严嵩十大罪，结果被反咬一口。要扳倒严嵩，得先找到他真正的弱点——不是贪腐，而是让陛下对他失去信任。', knowledge:{title:'言官弹劾制度',cat:'政治制度',content:'明代都察院设十三道监察御史，品秩仅七品，但有"风闻言事"之权，可直接弹劾一品大员。杨继盛弹劾严嵩十大罪五奸，被廷杖一百后入狱三年遇害，成为明代言官殉道的典型。'} },
      { keys:['徐阶','你','你自己','隐忍'], resp:'（苦笑）你想知道老夫为什么不去弹劾严嵩？因为我看过太多人因此送命。沈炼死了，杨继盛死了。我要活着，等到时机成熟的那一天。这不是懦弱，是——隐忍。', knowledge:{title:'徐阶的隐忍策略',cat:'历史人物',content:'徐阶在严嵩当权期间隐忍十余年，表面恭顺，暗中联络清流。1562年，他抓住严嵩因请立太子之事触怒嘉靖的契机，联合御史邹应龙上疏弹劾，最终扳倒严嵩——这是中国历史上"以柔克刚"的经典政治案例。'} },
      { keys:['证据','罪证','把柄','搜集'], resp:'你在搜集严嵩的罪证？...（沉默片刻）好。老夫告诉你一个方向：严世蕃。严嵩的儿子比他父亲更贪婪，他在南昌私建王府，勾结汪直进行海贸走私。如果你能找到这方面的证据...但此事绝不能让东厂知道。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'年轻人，在这紫禁城里，谨言慎行。如果你还有什么想了解的，随时来找我。' },
      { keys:['杨继盛','沈炼','死','遇害'], resp:'杨继盛...他弹劾严嵩十大罪，被廷杖一百。廷杖的时候，我站在午门外，听见竹板打在血肉上的声音。一百下，一下都没少。他在狱中三年，腿都烂了，还用碎碗片自己刮去腐肉。最后被严嵩秘密处死。沈炼更惨——流放到保安州后，严嵩党羽直接派人暗杀了他。', knowledge:{title:'杨继盛与沈炼之死',cat:'历史人物',content:'杨继盛弹劾严嵩十大罪五奸，被廷杖一百后入狱三年。在狱中他用碎碗片刮去腿上腐肉，令人动容。1555年被秘密处死，年仅40岁。沈炼弹劾严嵩后被流放保安州，1557年被严嵩党羽暗杀。两人成为明代言官殉道的象征。'} }
    ],
    defaults:['这个问题...老夫不太方便明说。你要自己去体会。','朝堂上的事，不是一句话能说清的。','你还年轻，有些事以后自然会明白。','（徐阶看了看你的眼神，没有说话）']
  },

  yan_song: {
    name:'严嵩', title:'内阁首辅', avatar:{text:'严',bg:'#8a4a3a',color:'#fff'},
    location:'文渊阁',
    greeting:'哦？新来的御史。老夫严嵩，忝为首辅。你有什么事吗？年轻人，在这朝堂上，要懂得审时度势。',
    topics:[
      { keys:['严嵩','你','首辅','执政'], resp:'老夫辅佐陛下二十一年，不敢说有功，但至少兢兢业业。有人说老夫专权？呵，内阁首辅本就是替陛下分忧，何来专权之说？陛下信任老夫，老夫便尽忠职守，仅此而已。' },
      { keys:['弹劾','御史','言官','攻击'], resp:'（眼神一冷）御史弹劾？老夫见得多了。沈炼弹劾老夫，结果如何？杨继盛弹劾老夫，结果又如何？年轻人，弹劾之前，最好想清楚后果。言官的笔，有时候比刀还快——但刀，也可以更快。' },
      { keys:['严世蕃','儿子','公子'], resp:'世蕃？他帮老夫处理一些政务而已。他才学过人，过目不忘，人称"大小丞相"...（顿了顿）不过年轻人的事，老夫有时候也管不了。你若有事找他，可以去东厂附近问问。' },
      { keys:['陛下','皇上','嘉靖'], resp:'陛下是圣天子，修道不过是修身养性。朝政之事，陛下自有决断，老夫不过代为执行罢了。你以为老夫能左右陛下的意志？天真。', knowledge:{title:'严嵩与嘉靖的关系',cat:'权力结构',content:'严嵩之所以能专权21年，核心在于嘉靖的信任。严嵩擅长写"青词"（道教祭文），深得修道中的嘉靖欢心。但一旦嘉靖对严嵩失去信任（如因请立太子事件），严嵩的权力大厦就会瞬间崩塌。'} },
      { keys:['贪腐','卖官','贿赂','银子'], resp:'（脸上闪过一丝不自然）贪腐？你是听谁说的？朝中俸禄微薄，大家都有难处。老夫一生清贫，你可以去我府上看看——有什么值钱的东西？至于别人怎么说，老夫管不了。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'去吧，年轻人。记住老夫一句话——在这紫禁城里，站对队伍比什么都重要。' },
      { keys:['青词','修道','斋醮'], resp:'（得意地笑了）青词？那是老夫的看家本领。陛下修道斋醮，需要青词告天。老夫写的青词，字字珠玑，陛下龙颜大悦。你以为靠的是什么？靠的就是这份本事。在这朝堂上，得陛下欢心者得天下。', knowledge:{title:'青词政治',cat:'政治文化',content:'青词是道教斋醮时献给上天的奏章祝文，用朱砂写在青藤纸上。嘉靖帝痴迷修道，需要大量青词，由此产生了"青词宰相"——严嵩、夏言、袁炜等人皆因善写青词而入阁。这是明代政治独特的文化现象。'} }
    ],
    defaults:['（严嵩意味深长地看了你一眼）你问这个做什么？','年轻人，有些事不该问。','老夫还有很多政务要处理。','你以为你能套老夫的话？']
  },

  dao_shi: {
    name:'陶仲文', title:'道士·真人', avatar:{text:'陶',bg:'#6a5a8a',color:'#fff'},
    location:'乾清宫',
    greeting:'无量天尊。施主是来...求道？还是求权？在这乾清宫中，道法与权术，本就是一体。',
    topics:[
      { keys:['修道','炼丹','长生','成仙'], resp:'陛下修道，非为长生，而是求"无为而治"之道。天地之道，在于以静制动、以柔克刚。陛下二十年不上朝，却能掌控天下，这本身就是最高的道。', knowledge:{title:'嘉靖帝的修道政治',cat:'帝王行为',content:'嘉靖帝修道不仅是个人信仰，更是一种政治策略。通过"不上朝"制造信息不对称，让百官无法预判他的意图；通过控制内阁和司礼监实现远程执政。这种"无为而治"实际是高度集权的体现。'} },
      { keys:['丹药','仙丹','红铅','秋石'], resp:'（低声）陛下服用的丹药...以红铅、秋石为引。红铅取自少女初潮之血，秋石取自童子尿。此二物经九蒸九晒，可炼成延年益寿之丹。但...长期服用，只怕伤身。', knowledge:{title:'明代炼丹术',cat:'科技史',content:'嘉靖时期宫中炼丹成风，主要原料"红铅"（少女经血）和"秋石"（童子尿提取物）。嘉靖为此多次采选少女入宫，1542年爆发"壬寅宫变"——宫女杨金英等人因不堪折磨试图勒死嘉靖帝，虽未成功，但反映了炼丹政治的残酷。'} },
      { keys:['严嵩','首辅','朝政'], resp:'严嵩？他写的青词确实好，陛下喜欢。但严嵩不懂道——他以为权力来自陛下，其实权力来自"势"。势变了，权力就变了。贫道观严嵩面相，他的气运...已经在走下坡路了。' },
      { keys:['陶仲文','你','道士','真人'], resp:'贫道陶仲文，封号"神霄保国弘烈宣教振法通真忠孝秉一真人"。陛下赐贫道礼部尚书衔，以道士之身列九卿——前无古人。但你不要以为贫道只是个方士。在这宫里，知道天机的人，往往比知道人事的人走得更远。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'天机不可泄，施主好自为之。无量天尊。' }
    ],
    defaults:['施主所问之事，非道所能解。','天机不可泄。','贫道要去做法事了。','（陶仲文闭目不语）']
  },

  eunuch_wang: {
    name:'王太监', title:'乾清宫近侍', avatar:{text:'王',bg:'#5a5a5a',color:'#fff'},
    location:'乾清宫',
    greeting:'嘘——小声点。陛下发完脾气刚睡下。你是新来的御史？有什么事快说，别让陛下醒了。',
    topics:[
      { keys:['陛下','皇上','嘉靖','脾气'], resp:'陛下最近脾气大着呢。前天因为一道青词写得不好，直接把纸摔在了严阁老脸上。严阁老七十多了，跪在地上一个时辰不敢起来。你以为当首辅容易？在陛下眼里，首辅和奴才没什么区别。' },
      { keys:['严嵩','首辅','严阁老'], resp:'严阁老...他对我们太监倒是客客气气的。每次来乾清宫，都给我们塞银子。但谁不知道？他那是怕我们在陛下耳边吹风。在这宫里，太监的嘴比御史的笔还厉害——因为我们是陛下最亲近的人。' },
      { keys:['太监','宫女','内廷','壬寅'], resp:'（突然紧张起来）壬寅宫变的事？你怎么知道的？那是十年前的事了...杨金英她们差点把陛下勒死。之后陛下就搬到西苑去了，再也不在乾清宫过夜。你现在站的地方，其实已经不算是陛下的寝宫了。', knowledge:{title:'壬寅宫变（1542年）',cat:'历史事件',content:'1542年（壬寅年），宫女杨金英等十余人趁嘉靖帝熟睡时试图用丝绳勒死他。原因是嘉靖为炼丹大量采选少女入宫，残酷折磨。事变虽失败，但嘉靖此后搬离乾清宫移居西苑，加速了他不上朝的进程。这是中国历史上罕见的宫女起义。'} },
      { keys:['你好','再见','告辞','谢谢'], resp:'快走吧，别让人看见你在这里。' }
    ],
    defaults:['这个...奴才不太清楚。','你别为难我，我就是个伺候人的。','（王太监紧张地看了看四周）','陛下要醒了，你快走。']
  },

  jin_yiwei: {
    name:'陆炳', title:'锦衣卫指挥使', avatar:{text:'陆',bg:'#3a3a5a',color:'#fff'},
    location:'午门',
    greeting:'（一身飞鱼服的壮汉靠在墙边，打量着你）新面孔？御史台的？午门可不是好地方——上个月刚廷杖了三个，血还没洗干净。你来这做什么？',
    topics:[
      { keys:['廷杖','刑罚','打','午门'], resp:'廷杖？那是我们的家常便饭。竹板打屁股，听着简单，但里面有学问。轻打和重打，看着一样，结果天差地别。打轻的，皮开肉绽但养几天就好；打重的，外表看不出来，内腑已经碎了——三天内必死。怎么打，全看上面谁发了话。', knowledge:{title:'廷杖制度',cat:'刑罚制度',content:'廷杖是明代特有的朝堂刑罚，在午门外执行。锦衣卫用竹板杖打大臣臀部。表面看是体罚，实际暗藏杀机——"外重内轻"则皮开肉绽但可救，"外轻内重"则外表无伤但内脏碎裂。许多大臣表面杖责，实则被活活打死。'} },
      { keys:['杨继盛','沈炼','被打'], resp:'杨继盛？那是我亲手执行的。上面发了话，要"外轻内重"。一百杖，每一杖我都用了内力。他在地上打滚，血溅了我一脸。但说实话...我心里是佩服他的。一个七品官，弹劾一品首辅，不怕死——这种人，比我们锦衣卫有骨气。' },
      { keys:['锦衣卫','飞鱼服','东厂','特务'], resp:'锦衣卫和东厂？我们都干脏活，但不一样。锦衣卫是陛下的亲军，正经的官职；东厂是太监管的，不入流。但东厂有陛下直接撑腰，我们有时候也得让他们三分。你要是在朝中混，记住——锦衣卫可以得罪，东厂不能得罪。' },
      { keys:['严嵩','首辅','严阁老'], resp:'严嵩？他跟我们锦衣卫关系不错。严世蕃更是——经常来我们这里"做客"。但你别多问，上面的事，我不方便说。你只要知道，在这紫禁城里，锦衣卫的眼睛，比东厂的还多。' },
      { keys:['陆炳','你','指挥使','锦衣卫头'], resp:'我陆炳，三品锦衣卫指挥使。别看品秩不高，满朝文武见了我都得绕道走。为什么？因为他们每个人的把柄都在我手里。这是陛下的安排——用锦衣卫制衡文官，用东厂制衡锦衣卫，用司礼监制衡东厂。环环相扣，谁也翻不了天。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'走吧，别在午门逗留太久。血腥气重，对你这种读书人不好。' }
    ],
    defaults:['（陆炳冷冷地看着你）你问这个做什么？','有些事不该你知道。','（沉默不语）','去忙你的吧。']
  },

  dongchang_head: {
    name:'冯保', title:'东厂提督太监', avatar:{text:'冯',bg:'#4a2a2a',color:'#fff'},
    location:'东厂',
    greeting:'（一个面白无须的中年人坐在暗室里，手里翻着一份档案）御史？来东厂做什么？这里可不是你该来的地方。不过既然来了，坐下说吧——我的耳朵很长，你想知道什么，也许我能告诉你。',
    topics:[
      { keys:['东厂','监视','特务','密探'], resp:'东厂监视百官？这是陛下的旨意。每个官员——从一品到九品——我们都有档案。你今天见了谁、说了什么、吃了什么酒，第二天陛下的案头就有记录。你以为朝堂上那些人是在自由发言？他们每一句话，都在我们的监控之下。', knowledge:{title:'东厂与特务政治',cat:'政治制度',content:'东厂成立于明成祖时期，由太监掌管，直接对皇帝负责。东厂拥有独立的侦查、审讯、羁押权力，不受司法机构约束。与锦衣卫合称"厂卫"，构成明代特务政治的核心。百官的言行举止皆在监视之下，造成"道路以目"的政治氛围。'} },
      { keys:['严嵩','严世蕃','首辅'], resp:'严世蕃？他跟东厂的关系...不简单。他帮我们搞掉过几个政敌，我们也帮他处理过几个麻烦。互利互惠。但你别以为严家真的只手遮天——东厂的档案里，严世蕃的"事迹"记了厚厚一叠。时机到了，这些东西就是催命符。' },
      { keys:['档案','记录','我的档案'], resp:'你想看自己的档案？（冷笑）好，我给你透露一点——"新任御史，来历清白，与徐阶有过两次私下交谈。未发现异常。"这是昨天的记录。你看，你的一举一动，我们比你自己还清楚。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'走吧。记住，东厂的门口，进来容易，出去难。今天我心情好，不跟你计较。' }
    ],
    defaults:['这个问题超出你的权限了。','（冯保意味深长地笑了笑）','你想知道？先问问你自己够不够格。','东厂不回答无用的问题。']
  },

  tai_yi: {
    name:'李太医', title:'太医院院判', avatar:{text:'李',bg:'#5a7a4a',color:'#fff'},
    location:'太医院',
    greeting:'（一位白发老者正在碾药，抬头看了你一眼）御史大人？身体不适？还是...来打听消息的？太医院虽然不起眼，但宫里的事，我们看得比谁都清楚。',
    topics:[
      { keys:['丹药','仙丹','红铅','秋石','副作用'], resp:'（叹气）陛下服的丹药...以贫医的专业来看，有毒。红铅和秋石都是燥热之物，长期服用会导致性情暴躁、内火攻心。陛下这两年脾气越来越大，跟丹药脱不了关系。但陶真人说这是"排毒反应"...贫医不敢反驳。', knowledge:{title:'丹药的毒理学',cat:'医学史',content:'明代丹药中的红铅（经血提取物）含高浓度雌激素，秋石（尿液提取物）含性激素。长期服用会导致内分泌紊乱、重金属中毒。嘉靖晚年性情暴躁、身体虚弱，与长期服用丹药密切相关。太医院虽知情，但慑于皇权不敢进言。'} },
      { keys:['杨继盛','伤','治疗','廷杖'], resp:'杨继盛廷杖后，是贫医去处理的。一百杖...屁股上的肉都打烂了，骨头都露出来了。但他不肯用麻药，说"死都不怕，怕疼？"后来在狱中，腿伤溃烂，他让家人送来碎碗片，自己刮去腐肉。贫医行医四十年，从未见过如此硬骨头。' },
      { keys:['李时珍','本草纲目','药材'], resp:'李时珍？他以前也在太医院待过，后来辞官走了。他正在写一本大书，叫《本草纲目》，把天下药材都收录进去。贫医觉得他比我们这些宫里的太医强多了——他追求的是真学问，不是揣摩圣意。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'保重身体，大人。在这宫里，身体好才能活得久。' }
    ],
    defaults:['这个...贫医不太清楚。','医者不自医，也不乱议政。','贫医要去给陛下送药了。','（李太医继续低头碾药）']
  },

  eunuch_li: {
    name:'李太监', title:'司礼监秉笔太监', avatar:{text:'李',bg:'#5a4a2a',color:'#fff'},
    location:'司礼监',
    greeting:'（一个精瘦的太监正在用朱笔批阅奏折，头也不抬）有事？说。司礼监掌管批红，天下奏折都从这里过。你要是来求我办事的，先看看自己够不够分量。',
    topics:[
      { keys:['批红','朱笔','奏折','权力'], resp:'批红？就是代陛下用朱笔批示奏折。你以为这权力小？内阁的"票拟"只是建议，最终决定权在批红。司礼监说"可"，就是可；说"不可"，内阁也没办法。所以你记住——在这宫里，太监的朱笔，比御史的奏疏管用。', knowledge:{title:'批红与票拟制度',cat:'政治制度',content:'明代政务流程：大臣奏折先由内阁给出处理建议（票拟），再由司礼监代皇帝用红笔做最终批示（批红）。批红权名义上属于皇帝，实际由司礼监太监代行。这使得司礼监成为与内阁并立的权力中心，形成了明代独特的"内廷外朝"双轨制。'} },
      { keys:['严嵩','首辅','内阁'], resp:'严嵩的票拟，到了司礼监这里，陛下说批就批，说不批就不批。严嵩为什么能专权？不只是因为他会写青词，更因为司礼监一直配合他。但一旦陛下改变了主意...司礼监的朱笔就会变成严嵩的催命符。' },
      { keys:['太监','内廷','权力','冯保'], resp:'你问太监为什么有权？因为我们从早到晚都在陛下身边。陛下吃什么、穿什么、见什么人、说什么话，我们都知道。信息就是权力，而我们掌握着最大的信息源。东厂的冯保？他管特务，我管批红，各管一摊，互不干涉。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'忙你的去吧。这些奏折今天批不完，陛下又要发脾气。' }
    ],
    defaults:['这个问题不归司礼监管。','你问多了。','（李太监继续低头批奏折）','不要打扰我办事。']
  },

  // ===== 雅典城 NPC =====
  socrates: {
    name:'苏格拉底', title:'哲学家', avatar:{text:'苏',bg:'#c9a84c',color:'#000'},
    location:'监狱',
    greeting:'（苏格拉底坐在草席上，脚镣叮当作响。他看到你，露出了温和的微笑）你来了。我知道你会来。坐下吧，我的学生——在我离开之前，我们还有时间聊聊。',
    topics:[
      { keys:['死','死亡','怕','害怕','毒堇'], resp:'死亡？你怕我害怕死亡？（微笑）死亡只有两种可能：要么是无梦的安眠——那比任何夜晚都安宁；要么是灵魂去了另一个世界，与荷马、奥德修斯对话——那比任何旅程都精彩。无论哪种，都不值得恐惧。', knowledge:{title:'苏格拉底论死亡',cat:'哲学',content:'苏格拉底在《斐多篇》中论证死亡不可怕：要么是无梦的安眠，要么是灵魂去往另一个世界与先哲对话。他认为哲学就是"练习死亡"——逐渐摆脱肉体束缚，让灵魂接近真理。这一观点深刻影响了西方哲学对生死的理解。'} },
      { keys:['为什么不跑','越狱','逃','离开'], resp:'你问为什么不越狱？克利托已经安排好了一切——狱卒被买通，船明天到比雷埃夫斯港。但我不能走。你知道为什么吗？因为我一生都在教导人们遵守法律。如果我越狱了，我的全部哲学就变成了谎言。一个人不能用行动否定自己一生的信念。', knowledge:{title:'苏格拉底拒绝越狱',cat:'哲学',content:'苏格拉底在《克里同篇》中论证：公民不应违反法律，即便法律不公。因为接受法律保护的同时，就意味着接受了法律的约束。逃跑就是承认有罪，就是否定自己一生教导的"正义"——这是苏格拉底最后的哲学实践。'} },
      { keys:['审判','法庭','不公','冤枉'], resp:'审判不公？不，程序是公正的——501人陪审团，按雅典法律投票。问题不在于程序，而在于民主本身。当多数人可以凭投票决定真理时，智者反而成为受害者。这不是审判的失败，是民主的失败。', knowledge:{title:'雅典民主的局限',cat:'政治哲学',content:'处死苏格拉底的是雅典"直接民主"——501人陪审团凭多数票定罪。这揭示了"多数人的暴政"：当真理由投票决定时，智者反而成为受害者。柏拉图因此在《理想国》中对民主制进行了深刻批判，影响了整个西方政治哲学。'} },
      { keys:['哲学','思考','智慧','无知'], resp:'哲学？我不是在教哲学，我是在"接生"——帮助你自己生出思想。我母亲是产婆，我也是。我只是提问，让你自己发现你其实什么都不知道。这就是智慧的开端——承认无知。我唯一知道的，就是我一无所知。', knowledge:{title:'苏格拉底方法（产婆术）',cat:'哲学方法',content:'苏格拉底从不直接传授知识，而是通过提问让对方发现自己的无知。这种方法（Elenchus）的步骤：提出定义→反驳定义→修正定义→再次反驳→承认无知。他自称是"思想的产婆"，帮助他人"生出"自己的思想，而非灌输。这奠定了西方辩证法的基础。'} },
      { keys:['神','敬神','不敬','宗教'], resp:'他们说我"不敬城邦之神"。但你想过没有——我每天听到的那个"内在声音"，那个阻止我做错事的声音，难道不是神的声音吗？我只是在用理性去理解神意，而不是盲目祭祀。这不是不敬，是更深的敬。', knowledge:{title:'苏格拉底的"内在声音"',cat:'哲学',content:'苏格拉底常提到一个"内在声音"（daimonion），在他即将犯错时阻止他。这不是传统意义上的神谕，而是理性的直觉。他将个人良知置于城邦宗教之上，被视为"不敬神"——这成为他被起诉的主要罪名之一。'} },
      { keys:['美德','善','正义','好'], resp:'美德即知识。没有人会自愿作恶——作恶只是因为无知，不知道什么是真正的善。所以教育的目的不是灌输知识，而是唤醒灵魂中本有的对善的追求。你不需要别人教你什么是正义，你只需要自己去"想起"它。' },
      { keys:['最后','遗言','遗嘱','交代'], resp:'最后的交代？...（端起毒堇汁，看了看杯中暗绿色的液体）克里同，我们欠阿斯克勒庇俄斯一只公鸡，别忘了还这个愿。阿斯克勒庇俄斯是医药之神——死亡，就是痊愈。这具病了很久的身体，终于可以安息了。', knowledge:{title:'苏格拉底的最后遗言',cat:'哲学',content:'苏格拉底最后的话是："克里同，我们欠阿斯克勒庇俄斯一只公鸡，别忘了还愿。"阿斯克勒庇俄斯是希腊医药之神，病人痊愈后要献祭公鸡。苏格拉底将死亡视为"痊愈"——灵魂终于摆脱了肉体的疾病。这一遗言被记录在柏拉图《斐多篇》末尾。'} },
      { keys:['你好','再见','告辞','老师','谢谢'], resp:'不要悲伤，我的学生。死亡不是终点，而是另一段旅程的开始。记住我说的话——未经审视的人生，不值得过。去审视你的人生吧。' }
    ],
    defaults:['（苏格拉底沉思片刻）你问了一个好问题。但与其让我回答，不如你自己想想——你怎么看？','这个问题值得深入探讨。但时间不多了...','你说呢？你觉得答案是什么？','（苏格拉底微笑着看着你，等待你自己思考）']
  },

  plato: {
    name:'柏拉图', title:'哲学家·苏格拉底的学生', avatar:{text:'柏',bg:'#6a9ac9',color:'#fff'},
    location:'阿卡德米学园',
    greeting:'（一个气质沉郁的中年人坐在橄榄树下，手中拿着一卷纸草）你来了。老师的事...我很难过。但我正在做一件事——把老师的话记录下来，让后人知道他想过什么、说过什么。',
    topics:[
      { keys:['苏格拉底','老师','记录','对话录'], resp:'我在写一系列对话录，把老师的思想用对话的形式记录下来。因为我发现——老师的思想不能被"总结"，只能在对话中展现。他从不给你答案，他只给你问题。所以我写的不是论文，是对话。', knowledge:{title:'柏拉图对话录',cat:'文献',content:'柏拉图以对话体记录苏格拉底的思想，包括《申辩篇》（审判）、《克里同篇》（越狱）、《斐多篇》（论灵魂与死亡）、《理想国》（论正义）等。苏格拉底本人未留下任何著作，我们对他的了解几乎全部来自柏拉图——这使得"历史上的苏格拉底"与"柏拉图笔下的苏格拉底"难以区分。'} },
      { keys:['理想国','正义','城邦','哲学王'], resp:'我在构思一部作品，叫《理想国》。我在思考：什么是正义？如果正义存在于个人灵魂中，那它也必须存在于城邦中。理想的城邦应该由哲学家统治——因为只有追求真理的人才不会被权力腐蚀。', knowledge:{title:'柏拉图《理想国》',cat:'哲学著作',content:'《理想国》是柏拉图的代表作，探讨"什么是正义"。他提出理想城邦应由"哲学王"统治，将社会分为三个阶层：统治者（理性）、护卫者（激情）、生产者（欲望）。这一"哲学王"概念深刻影响了后世政治哲学，但也被视为精英主义的源头。'} },
      { keys:['理念','形式','洞穴','影子'], resp:'你看过洞穴的比喻吗？想象一群人被绑在洞穴里，只能看到墙上的影子。他们以为影子就是真实。但如果有人挣脱锁链，转过身来看到火光，再走出洞穴看到太阳——他就会知道，之前的一切都是幻影。这就是哲学——从影子走向真实。' },
      { keys:['学园','阿卡德米','教学'], resp:'我创办了这个学园，是为了延续老师的精神。但我不像老师那样在广场上拦人辩论——我更喜欢在这里安静地思考和写作。学园门口刻着一句话："不懂几何者不得入内"——因为数学训练的是纯粹的理性思维。' },
      { keys:['民主','雅典','政治','制度'], resp:'民主杀死了老师。我不能原谅它。但我也知道，僭主制更糟——老师在世时，三十僭主曾试图拉拢他，被他拒绝后迫害他的朋友。民主有缺陷，但并非一无是处。问题在于：当多数人不具备理性判断力时，民主就会变成暴政。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'如果你有时间，来学园听我讲课吧。老师虽然走了，但哲学不会死。' }
    ],
    defaults:['这个问题我还在思考。也许等对话录写完，我会给你一个答案。','老师的死让我开始重新思考很多问题。','你去问老师吧，他的回答比我好。','（柏拉图沉思着看着远方的橄榄树）']
  },

  meletus: {
    name:'梅勒图斯', title:'起诉苏格拉底的人', avatar:{text:'梅',bg:'#8a4a4a',color:'#fff'},
    location:'法庭',
    greeting:'（一个年轻人看到你，警觉地皱眉）你是苏格拉底的学生？来质问我的？说吧。我不后悔起诉他——他腐蚀了雅典的青年，这是事实。',
    topics:[
      { keys:['为什么','起诉','控告','理由'], resp:'我起诉他，因为他说"我不敬城邦之神"——他引入了新的神灵。他还说"我不相信传统的神"，教唆青年质疑一切权威。你知道阿尔西比亚德斯吗？他就是苏格拉底的学生，后来叛逃斯巴达，出卖了雅典！这就是苏格拉底"教育"的成果！' },
      { keys:['不敬神','神灵','宗教','信仰'], resp:'他说他听到一个"内在声音"。这是什么？如果是神，为什么不是城邦公认的神？如果是他自己的声音，那就是狂妄——他把自己当成了神！雅典的信仰是城邦的根基，动摇信仰就是动摇城邦。' },
      { keys:['腐蚀青年','学生','教育'], resp:'他把年轻人教得对一切都提出质疑——质疑神灵、质疑长辈、质疑民主。年轻人变得傲慢无礼，不再尊重传统。这不是教育，是破坏！一个社会如果没有共同信仰，还能存在吗？' },
      { keys:['审判','投票','死刑','公正'], resp:'501人陪审团，280:221，是雅典公民的合法投票。程序完全公正。如果他不死，就会有更多青年被他带坏。我做的不是为了自己，是为了雅典。你可以恨我，但历史会证明我是对的。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'你想说什么就说吧。但我不会改变立场。' }
    ],
    defaults:['你用苏格拉底的方法质问我？我不会上当的。','这个...与我无关。','不要试图说服我。','（梅勒图斯固执地别过头）']
  },

  xanthippe: {
    name:'克桑提佩', title:'苏格拉底的妻子', avatar:{text:'克',bg:'#8a6a5a',color:'#fff'},
    location:'苏格拉底的家',
    greeting:'（一个疲惫的中年女人正在收拾简陋的屋子，眼睛红肿）你是他的学生？他...他什么时候回来？（声音哽咽）我知道他不会回来了。他选择了他的哲学，没有选择我们。',
    topics:[
      { keys:['苏格拉底','丈夫','他','家里'], resp:'他一辈子就知道去广场跟人辩论，家里的事什么都不管。三个孩子，全是我一个人拉扯大的。别人说我泼辣、凶悍——你以为我不想温柔吗？可如果我不凶，这个家早就散了。', knowledge:{title:'克桑提佩：被妖魔化的哲学家之妻',cat:'历史人物',content:'克桑提佩在历史上被描绘为"悍妇"，但近年的研究认为这是对她的不公。她独自抚养三个孩子，丈夫整日在外辩论不事生产。她的"泼辣"其实是生存所迫。苏格拉底临终前叮嘱学生们照顾好克桑提佩和孩子，说明他并非不关心家庭。'} },
      { keys:['孩子','儿子','家庭'], resp:'最小的儿子拉姆普罗克勒斯才几岁...他还不懂什么是死亡。苏格拉底最后回家那天，抱着小儿子坐了很久，什么都没说。我以为他终于要改了...没想到第二天就被抓走了。' },
      { keys:['为什么不劝','越狱','逃跑'], resp:'劝？我劝了他一辈子！让他少管闲事，不要得罪人，好好教书挣钱。他不听。他说"克桑提佩，你关心的是明天吃什么，我关心的是人应该怎样活"。我比他俗气，但我的俗气养活了这个家。越狱？他不会走的。他宁愿死，也不愿承认自己错了。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'谢谢你来看他。如果他...如果最后那天你见到他，告诉他——孩子们我会照顾好。让他安心走。' }
    ],
    defaults:['（克桑提佩擦了擦眼泪）','这些事我不想再提了。','你问他吧，他的道理比我多。','（她沉默地继续收拾屋子）']
  },

  citizen: {
    name:'雅典公民', title:'普通市民', avatar:{text:'民',bg:'#6a6a6a',color:'#fff'},
    location:'雅典广场',
    greeting:'（一个穿着粗布长袍的中年人正在广场上闲逛）你是苏格拉底的学生？我认识他——他经常在这里拦住人问问题。烦是烦了点，但说实话，被他问过之后，确实会想很多。',
    topics:[
      { keys:['苏格拉底','辩论','广场','提问'], resp:'苏格拉底啊，他老是在广场上拦住人问"什么是正义""什么是勇敢"。你以为他真的不知道？他知道，他就是想让你知道你不知道。被他问过的人，有的觉得开窍了，有的觉得自己像个傻子——然后就开始恨他。', knowledge:{title:'苏格拉底在雅典广场',cat:'历史背景',content:'苏格拉底每天在雅典广场（Agora）与人辩论，不收学费，不写著作。他的方法被称为"电击式对话"——通过不断追问揭示对方的无知。这种方法让他赢得了一批年轻追随者，但也得罪了许多被当众揭短的权贵，为后来的审判埋下了伏笔。'} },
      { keys:['审判','投票','有罪','该死'], resp:'说实话，我投了有罪票。不是因为我恨他，是因为他说的话确实让年轻人不安分。我儿子跟他聊了一次，回来就质疑我"你怎么知道神存在？"——我打了 他一顿。但苏格拉底说得对，我确实答不上来。不过...判死刑是重了。我后来有点后悔。' },
      { keys:['民主','投票','公民','制度'], resp:'民主？就是我们每个人都能投票决定国家大事。好的时候很好，坏的时候很坏——比如这次。501个人投票，多数说了算。但多数人就一定对吗？苏格拉底说得对，有时候真理在少数人手里。可我们总不能让少数人说了算吧？这就矛盾了。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'别太难过。苏格拉底虽然死了，但他让我们学会了一件事——多想想自己到底知道什么。' }
    ],
    defaults:['这个我不太懂，我就是个普通老百姓。','你去问那些有学问的人吧。','（他挠了挠头）说实话我没想过这个。','广场上人多，我去看看热闹。']
  },

  merchant: {
    name:'商人', title:'雅典广场商贩', avatar:{text:'商',bg:'#7a6a3a',color:'#fff'},
    location:'雅典广场',
    greeting:'（一个黝黑的商贩正在整理摊位上的陶器和橄榄油）你要买点什么？橄榄、蜂蜜、陶罐都有。哦，你不是来买东西的？那站着聊会儿也行——生意淡的时候，我就喜欢看广场上那些人辩论。',
    topics:[
      { keys:['苏格拉底','辩论','广场'], resp:'苏格拉底？他经常在我摊位前面拦人辩论，搞得我生意都受影响——顾客光顾着听他说话了。但说实话，他从不偷东西，也不骗人。有些人说他腐蚀青年，可我看那些青年跟了他之后，反倒不撒谎了。腐蚀？我看是教好了。' },
      { keys:['贸易','商品','橄榄油','生意'], resp:'雅典的贸易全靠比雷埃夫斯港。粮食从黑海运来，木材从马其顿来，橄榄油和陶器是我们出口的大宗。伯罗奔尼撒战争之后，生意不好做了——斯巴达人把我们的航道搅得一塌糊涂。现在好不容易恢复了点，又赶上苏格拉底的审判...人心惶惶的。', knowledge:{title:'雅典的经济与贸易',cat:'经济史',content:'公元前5世纪的雅典是地中海贸易中心，比雷埃夫斯港是当时最繁忙的港口之一。雅典出口橄榄油、陶器、银器，进口粮食（尤其依赖黑海地区）、木材和金属。伯罗奔尼撒战争（前431-前404年）严重破坏了雅典的贸易网络，战后经济衰退是社会矛盾加剧的背景之一。'} },
      { keys:['审判','死刑','投票'], resp:'审判那天我去了。501个人投票，我因为生意忙没参与。但后来听说了结果——死刑。说实话，有点过了。苏格拉底不就是爱问问题吗？问问题也该死？但我也理解那些投有罪的人——他们怕年轻人学了他那套，不再尊重传统。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'慢走。如果想要好橄榄油，来找我——苏格拉底都说我家的油好。' }
    ],
    defaults:['做生意的事我不懂什么大道理。','你买点什么吧，我给你便宜。','（商人继续整理他的摊位）','广场上的事，我看看热闹就行。']
  },

  judge: {
    name:'法官', title:'法庭陪审官', avatar:{text:'法',bg:'#4a5a7a',color:'#fff'},
    location:'法庭',
    greeting:'（一个穿着正式长袍的中年人坐在法庭的石阶上休息）你是来看法庭的？苏格拉底的审判刚结束不久。我是那501名陪审员之一——是的，我投了什么票，这是秘密。',
    topics:[
      { keys:['审判','程序','法庭','陪审'], resp:'审判程序是完全合法的。雅典的法庭由501名公民组成陪审团，原告和被告各有时间陈述。苏格拉底的辩护...说实话，他很聪明，但他太傲慢了。他不但不求情，还说自己是雅典的"牛虻"，是神赐给城邦的礼物。这让很多人更生气了。', knowledge:{title:'雅典法庭制度',cat:'政治制度',content:'雅典法庭由公民抽签组成陪审团，人数通常为201、401或501人。审判中原告和被告各有权陈述，然后陪审团立即投票表决——没有法官、没有律师、没有上诉。苏格拉底的审判中，定罪票280:无罪票221，差距仅59票。但在量刑投票中，差距拉大——苏格拉底拒绝提出替代刑罚，激怒了更多陪审员。'} },
      { keys:['苏格拉底','辩护','申辩'], resp:'苏格拉底的申辩...他一开始就说"你们听到原告的指控，我差点忘了自己是谁"——这是在嘲讽。然后他说自己是最智慧的人，因为"我知道我一无所知"。陪审团里有不少人本来只是想给他个教训，但他的态度把中间派推向了有罪。', knowledge:{title:'苏格拉底的申辩策略',cat:'历史事件',content:'苏格拉底在法庭上拒绝低声下气地求情，反而以挑衅的姿态为自己辩护。他称自己是雅典的"牛虻"——叮咬懒惰的马匹使其精神焕发。他还提议自己应该被供养在普律塔涅翁（英雄享用的公餐），而非受罚。这种傲慢态度使原本可能投无罪的陪审员转向有罪。'} },
      { keys:['死刑','毒堇','量刑'], resp:'量刑的时候，原告建议死刑，苏格拉底本可以提出流放或罚款作为替代。但他先是提议"免费供餐"，然后勉强提出一个很小的罚款数额。陪审团在死刑和他的替代方案之间投票——更多人选了死刑。如果他能低个头，结果可能完全不同。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'法律就是法律。不管你同不同意，陪审团的决定就是最终判决。' }
    ],
    defaults:['法律的细节，你不需要知道太多。','我投了什么票，这是我与城邦之间的秘密。','（法官沉默地看着空荡荡的法庭）','审判已经结束了，没什么好说的。']
  },

  guard: {
    name:'狱卒', title:'雅典监狱守卫', avatar:{text:'守',bg:'#5a5a4a',color:'#fff'},
    location:'监狱',
    greeting:'（一个疲惫的守卫靠在牢门边，腰间挂着钥匙串）你是来看苏格拉底的？进去吧，他不会跑的。我守了这么多年监狱，从没见过这样的犯人——不哭不闹，还跟来看他的人聊哲学。',
    topics:[
      { keys:['苏格拉底','犯人','表现'], resp:'苏格拉底？他是我见过最平静的犯人。别人被判死刑，不是哭就是闹，要么想办法越狱。他倒好，每天有人来看他，他就跟人聊天——聊什么灵魂、真理、死亡...我不懂，但看得出来，他不怕死。', knowledge:{title:'苏格拉底在狱中',cat:'历史背景',content:'苏格拉底被判死刑后，在雅典监狱中等候处刑。由于当时正值德里洛节（Delian mission）期间，按法律不能执行死刑，所以他实际上在狱中度过了约一个月。这段时间他接待了众多访客，进行了大量哲学对话。柏拉图的《斐多篇》《克里同篇》都记录了这段狱中对话。'} },
      { keys:['越狱','逃跑','克利托','贿赂'], resp:'越狱？说实话，克利托来找我谈过了——他愿意出钱贿赂我，帮苏格拉底逃走。我也同意了。但苏格拉底自己不走。他说"逃避法律就是否定自己一生的信念"。我一个大老粗不懂什么哲学，但我觉得...他是个有骨气的人。' },
      { keys:['毒堇','执行','死刑','死法'], resp:'毒堇汁的执行，我见过好几次。犯人喝下后，先是脚发麻，然后腿、身体，最后是胸口。整个过程中人都是清醒的。苏格拉底到时候也会这样。不过...他走的时候会很平静，我看得出来。', knowledge:{title:'毒堇汁的执行过程',cat:'历史事件',content:'雅典执行死刑的方式是让犯人饮下毒堇汁（含有毒芹碱）。毒发从下肢开始向上蔓延，最终因呼吸肌麻痹致死，全程意识清醒。柏拉图《斐多篇》详细记录了苏格拉底饮毒后的过程：他平静地端起杯子饮尽，躺下后感觉逐渐麻木，最后对克利托说"我们欠阿斯克勒庇俄斯一只公鸡"。'} },
      { keys:['你好','再见','告辞','谢谢'], resp:'你可以多待一会儿。但别太晚——日落前监狱要关门。' }
    ],
    defaults:['我只是个看门的，不懂什么大道理。','（狱卒打了个哈欠）','犯人的事，我不方便多说。','你去找他聊吧，我在这守着。']
  },

  student: {
    name:'学园学生', title:'阿卡德米学园学员', avatar:{text:'学',bg:'#5a8a9a',color:'#fff'},
    location:'阿卡德米学园',
    greeting:'（一个年轻人正在橄榄树下用树枝在沙地上画几何图形）哦，你好！你是柏拉图老师的朋友吗？老师在里面整理手稿。我正在练习几何——老师说不懂几何的人不能入学园。',
    topics:[
      { keys:['柏拉图','老师','学园','教学'], resp:'柏拉图老师可厉害了。他不像苏格拉底那样在广场上拦人辩论——他更喜欢在这里安静地思考和教学。他说苏格拉底死后，他明白了写作的重要性——因为人死了，但文字可以流传。所以他在写对话录，把苏格拉底的话记下来。' },
      { keys:['苏格拉底','师爷','老师的学生'], resp:'我没见过苏格拉底，但我听柏拉图老师说了很多。老师说，苏格拉底从不告诉学生"答案"，只问问题。他像一个接生婆——不替你生孩子，只是帮你自己生出来。我一开始不懂，后来试了一下他的方法...确实，自己想出来的答案，比别人告诉你的深刻多了。' },
      { keys:['几何','数学','图形','学习'], resp:'几何是学园最重要的课程。柏拉图老师说，几何训练的是纯粹的理性——不用看实物，只在脑子里想象。他说我们看到的世界是"影子"，真正的"理念"世界要靠理性去理解。就像这个圆——（指着沙地上的圆）现实中没有完美的圆，但我们的脑子知道它应该是什么样。', knowledge:{title:'柏拉图的理念论',cat:'哲学',content:'柏拉图提出"理念论"（Theory of Forms）：我们所见的物质世界是不完美的"影子"，真正的实在是"理念"（Forms）。例如现实中没有完美的圆，但"圆的理念"是真实存在的。几何学之所以重要，是因为它训练人从物质世界的影子中超脱，去认识纯粹的理念。这一理论深刻影响了整个西方哲学。'} },
      { keys:['洞穴','理念','形式'], resp:'老师讲过一个洞穴的比喻——想象一群人被绑在洞里，只能看到墙上的影子，以为那就是真实。哲学家就是那个挣脱锁链、走出洞穴看到太阳的人。但他回到洞里告诉别人"你们看到的都是假的"，没人信他。苏格拉底就是那个回到洞里的人...然后被杀了。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'如果你想学几何，我可以教你基础。老师说得对——数学是通往真理的第一步。' }
    ],
    defaults:['这个...我还在学，不太确定。','你去问柏拉图老师吧，他比我懂多了。','（学生继续低头画几何图形）','等我学完今天的功课再聊吧。']
  },

  priest: {
    name:'祭司', title:'卫城神庙守卫者', avatar:{text:'祭',bg:'#8a7a4a',color:'#fff'},
    location:'卫城',
    greeting:'（一位身着白色祭袍的老人正在擦拭帕特农神庙的柱子）愿雅典娜保佑你。你是来祈求什么？还是...来问苏格拉底的事？他的审判，我一直在关注。',
    topics:[
      { keys:['苏格拉底','不敬神','指控'], resp:'苏格拉底被控"不敬城邦之神"。说实话，这个问题很复杂。他确实不参加某些祭祀仪式——但那不是因为不敬，而是因为他认为真正的虔诚不是杀羊献祭。他说"真正的虔诚是做一个正义的人"。从某种角度看，他比我们这些天天杀羊的人更虔诚。', knowledge:{title:'苏格拉底的宗教观',cat:'哲学',content:'苏格拉底被起诉的罪名之一是"不敬城邦之神"。他确实不盲从传统祭祀，但他声称自己有一个"内在声音"（daimonion）在指导他。他认为真正的虔诚不是外在仪式，而是内在的道德追求。这一立场既被视为"引入新神"，也被视为对传统宗教的挑战——尽管苏格拉底本人并不否认神的存在。'} },
      { keys:['神','雅典娜','信仰','宗教'], resp:'雅典娜是雅典的守护神，帕特农神庙就是为她建的。每年泛雅典娜节，全城的人都会来卫城献祭。但你要知道——信仰不仅仅是仪式。苏格拉底说得对，如果你杀了人、偷了东西，然后来献祭一头羊，神会原谅你吗？不会。真正的信仰是活出正义。', knowledge:{title:'雅典娜与泛雅典娜节',cat:'宗教文化',content:'雅典娜是雅典城邦的守护神，帕特农神庙是她的主神庙。每年举行的泛雅典娜节是雅典最重要的宗教节日，包括献祭、游行、竞技比赛等。苏格拉底虽然尊重神灵，但质疑将信仰简化为外在仪式的做法——他认为真正的虔诚是内心的正义，而非外在的献祭。'} },
      { keys:['德尔斐','神谕','智慧'], resp:'德尔斐神谕说"没有人比苏格拉底更智慧"。我听到这个的时候很惊讶——苏格拉底又不是祭司，也不解梦，也不预言。但后来我想明白了：智慧不是知道很多，而是知道自己的无知。苏格拉底至少知道"我不知道"，而我们这些自以为知道的人，反而不智慧。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'愿雅典娜指引你的道路。记住——真正的虔诚不在祭品，而在内心。' }
    ],
    defaults:['神灵的事，凡人不该妄议。','（祭司继续擦拭神庙的柱子）','你去德尔斐吧，那里有真正的神谕。','信仰需要用心去体会，不是用嘴说的。']
  },

  sailor: {
    name:'水手', title:'比雷埃夫斯港船员', avatar:{text:'水',bg:'#3a6a7a',color:'#fff'},
    location:'比雷埃夫斯港',
    greeting:'（一个晒得黝黑的水手正在整理缆绳，海风吹乱了他的头发）嘿！小心脚下，甲板上有水。你要出海？还是来找苏格拉底那档子事的？我听说克利托想从这里安排他逃跑。',
    topics:[
      { keys:['逃跑','越狱','苏格拉底','克利托'], resp:'克利托来过这里，找船长打听航线。从比雷埃夫斯到墨伽拉，一天就到。到那里就安全了——墨伽拉跟雅典没有引渡协议。船长都准备好了，但苏格拉底不走。说实话，我理解他——我是水手，我靠风和海活着，但他靠信念活着。风可以逆，信念不能逆。' },
      { keys:['航海','贸易','港口','船'], resp:'比雷埃夫斯港是雅典的命脉。粮食从黑海运来，木材从色雷斯来，葡萄酒和橄榄油从这里出口。我跑了二十年海路，到过西西里、埃及、腓尼基...但雅典的港口始终是最热闹的。没有这个港口，雅典撑不过一个月。', knowledge:{title:'比雷埃夫斯港',cat:'经济地理',content:'比雷埃夫斯港是雅典的主要港口，距离雅典城约8公里。公元前5世纪，它是地中海最繁忙的港口之一。雅典的粮食供应严重依赖从黑海地区经海路进口，因此该港口是雅典的生死命脉。伯罗奔尼撒战争期间，斯巴达多次试图封锁该港口，最终在羊角河战役后，雅典的海军被摧毁，港口被封锁，雅典被迫投降。'} },
      { keys:['目的地','墨伽拉','底比斯','逃去哪'], resp:'如果苏格拉底要逃，最近的是墨伽拉——一天航程。稍远一点是底比斯或者科林斯。再远可以去西西里或者意大利南部，那里有很多希腊城邦。克利托说都安排好了，狱卒也买通了。但苏格拉底说不行——他说如果他逃了，他一生的哲学就全白费了。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'一路顺风，朋友。海上的风永远欢迎自由的人——可惜苏格拉底选择了不自由。' }
    ],
    defaults:['海上的事你不懂。','（水手继续整理缆绳）','你要是想出海，去找船长谈。','海风里有盐，故事里有泪，这就是水手的生活。']
  }
};

const objectData = {
  '奏折堆': { desc:'一堆未批阅的奏折。你翻看几份，发现多与边关军饷、赈灾银两有关——但严嵩的票拟都建议"暂缓处理"。', knowledge:{title:'明代奏折制度',cat:'政治制度',content:'明代奏折从地方到中央需经多道程序：地方官员上奏→通政使司接收→内阁票拟建议→司礼监批红→六部执行。严嵩通过控制票拟权，将不利于自己的奏折"暂缓"或"留中"，实现了对信息流的控制。'} },
  '邸报': { desc:'朝廷发行的报纸，记录政令和人事变动。最近一期上，严世蕃被提拔为尚宝司少卿——一个肥缺。', knowledge:{title:'邸报：世界上最早的报纸',cat:'传媒史',content:'邸报是明代官方发行的新闻公报，内容为政令、人事任免、赏罚等。它起源于汉代，到明代已形成定期发行制度，是世界上最早的官方报纸。邸报让各地官员了解朝廷动态，但也是政治宣传的工具。'} },
  '龙涎香': { desc:'乾清宫里弥漫的龙涎香，据说是严嵩从海外商人手中购来献给嘉靖的。一小盒就值千金。', knowledge:null },
  '青词稿': { desc:'一叠写满华丽辞藻的青词草稿。笔迹是严嵩的——他每天都要写新的青词献给上天，这也是他讨好嘉靖的手段。', knowledge:{title:'青词政治',cat:'政治文化',content:'青词是道教斋醮时献给上天的奏章祝文。嘉靖帝痴迷修道，需要大量青词，由此产生了"青词宰相"——严嵩、夏言等人皆因善写青词而入阁。严嵩的青词辞藻华美，深得嘉靖欢心，是他专权的重要资本。'} },
  '廷杖': { desc:'一根包着铁皮的竹板，表面有暗红色的痕迹。这就是廷杖——打在官员屁股上，轻则皮开肉绽，重则当场毙命。', knowledge:{title:'廷杖制度',cat:'刑罚制度',content:'廷杖是明代特有刑罚，在午门外执行。锦衣卫用包铁竹板杖打大臣。"外重内轻"则皮开肉绽但可救，"外轻内重"则外表无伤但内脏碎裂。许多大臣被活活打死，廷杖成为明代皇权羞辱士大夫的象征。'} },
  '鸣冤鼓': { desc:'午门外的一面大鼓，百姓可以击鼓鸣冤。但此刻鼓面上积满了灰尘——已经很久没有人敢敲了。', knowledge:null },
  '监视档案': { desc:'一份厚厚的档案，记录着某位官员每日的行踪、会面、言谈。你翻到最后一页，看到了一行小字："此人与徐阶有私交，需密切关注。"', knowledge:{title:'东厂监视档案',cat:'政治制度',content:'东厂对百官进行系统监视，档案记录官员的日常行踪、人际交往、言论观点。这些档案既是情报，也是要挟工具。东厂可直接向皇帝汇报，不受任何司法约束，形成了对文官集团的强大威慑。'} },
  '密探名册': { desc:'一本名册，记录着东厂在各衙门安插的密探代号和位置。你认出了几个名字——他们都是各衙门的普通吏员。', knowledge:null },
  '本草纲目': { desc:'一部厚厚的手稿，扉页写着"李时珍编"。你翻了几页，发现里面详细记载了上千种药材的形态、功效和用法，配着精细的手绘插图。', knowledge:{title:'《本草纲目》',cat:'医学著作',content:'《本草纲目》是明代李时珍历时27年编成的药学巨著，记载药物1892种、方剂11096条。它纠正了前人诸多错误，被誉为"东方药学巨典"。李时珍曾任职太医院，后辞官专心著书，1593年完成此书，1596年出版时他已去世。'} },
  '药方': { desc:'一张太医院开的药方，上面写着"红铅丹"的配方。你注意到剂量栏被涂改过——原来的剂量被加大了。', knowledge:null },
  '朱砂笔': { desc:'司礼监用来批红的朱砂笔。笔杆是象牙做的，笔尖沾着干涸的红色朱砂。这支笔代天子行事，一笔可决人生死。', knowledge:{title:'批红权',cat:'政治制度',content:'批红是皇帝用朱砂笔批示奏折的权力，明代由司礼监太监代行。朱砂笔虽小，却掌握着最终决策权——内阁的票拟只是建议，批红才是命令。这使得司礼监成为与内阁并立的权力中心。'} },
  '批红奏折': { desc:'一份已经批红的奏折，上面用朱笔写着"知道了"三个字。这是嘉靖最常用的批示——既不同意也不拒绝，让臣子自己去猜。', knowledge:null },
  '太祖遗训': { desc:'太庙中供奉的《皇明祖训》，朱元璋亲手所写。你翻开其中一页，看到："内臣不得干预政事，预者斩。"——然而此刻太监干政已是不争的事实。', knowledge:{title:'朱元璋的祖训',cat:'历史文献',content:'《皇明祖训》是朱元璋制定的明朝家法，其中明确规定"内臣不得干预政事"。但讽刺的是，明代正是太监干政最严重的朝代——东厂、司礼监、秉笔太监的权力远超朱元璋的想象。祖训沦为了一纸空文。'} },
  '祭祀礼器': { desc:'太庙中的青铜礼器，刻着云雷纹和兽面纹。这些器物已经使用了二百多年，承载着大明王朝对祖先的敬畏和对天命的信仰。', knowledge:null },
  '告示板': { desc:'广场上的告示板，贴着苏格拉底审判的判决书。旁边有人用木炭写了一行字："一个好人被杀死了。"另一个人在下面回复："好人不一定是对的。"', knowledge:{title:'苏格拉底审判的公告',cat:'历史事件',content:'公元前399年，苏格拉底被雅典法庭以"不敬城邦之神"和"腐蚀青年"罪名起诉。501人陪审团以280:221的票数定罪，再以更大的票数差距判处死刑。判决书被公示在雅典广场，成为雅典民主史上最具争议的事件。'} },
  '投票陶片': { desc:'一块陶片，上面刻着一个人的名字——这是"陶片放逐法"用的投票工具。雅典公民用这种方式放逐他们认为威胁民主的人。', knowledge:{title:'陶片放逐法',cat:'政治制度',content:'陶片放逐法（Ostracism）是雅典民主的制度：公民在陶片上写下他们认为威胁民主的人名，得票最多者被放逐10年。这一制度初衷是防止僭主，但后来常被用于党争。苏格拉底的审判虽然不是陶片放逐，但反映了类似的"多数人暴政"问题。'} },
  '起诉书': { desc:'法庭上保留的起诉书副本。上面写着："梅勒图斯诉苏格拉底：一、不敬城邦之神；二、引入新神灵；三、腐蚀青年。"措辞简洁而致命。', knowledge:{title:'苏格拉底的三项罪名',cat:'历史文献',content:'苏格拉底被起诉的三项罪名：不敬城邦之神、引入新神灵（指他的"内在声音"）、腐蚀青年。这些罪名看似宗教性的，实际带有强烈的政治色彩——苏格拉底的学生阿尔西比亚德斯叛逃斯巴达，被视为"腐蚀青年"的佐证。'} },
  '投票罐': { desc:'法庭上用的投票罐，陪审员将铜片投入罐中——一个有罪，一个无罪。罐子已经空了，但你可以想象那天280块"有罪"铜片落入的声音。', knowledge:null },
  '毒堇汁': { desc:'一个粗糙的陶杯，里面盛着暗绿色的液体。这就是毒堇汁——苏格拉底将喝下它死去。你闻了闻，有一股苦杏仁的味道。', knowledge:{title:'毒堇（铁杉）的毒理学',cat:'科学',content:'毒堇（Conium maculatum）含有毒芹碱，是一种神经毒素。中毒后从下肢开始麻痹，逐渐上升，最终因呼吸肌麻痹窒息而死——意识全程清醒。苏格拉底在毒发过程中还能与学生对话，直到感觉麻痹到胸口才平静死去。柏拉图《斐多篇》详细记录了这一过程。'} },
  '脚镣': { desc:'苏格拉底脚上的铁镣，上面有新磨过的痕迹——克利托刚为他擦过药，镣铐暂时被取下。铁镣不重，但足以困住一个不愿离开的人。', knowledge:null },
  '柏拉图手稿': { desc:'一卷写满希腊文的纸草纸，标题是"申辩篇"——柏拉图正在记录苏格拉底在法庭上的最后陈词。你看到其中一行："未经审视的人生，不值得过。"', knowledge:{title:'《申辩篇》',cat:'哲学文献',content:'《申辩篇》是柏拉图记录的苏格拉底在法庭上的辩护词。苏格拉底不为自己求情，反而论证自己的哲学使命是神赐的礼物。他最后说："未经审视的人生不值得过""现在是分手的时候了——我去死，你们去活，谁的路更好，只有神知道。"'} },
  '几何图形': { desc:'石凳上刻着的几何图形——一个圆内接五角星。旁边写着"黄金分割"几个字。学园门口的铭文是"不懂几何者不得入内"。', knowledge:{title:'柏拉图与几何学',cat:'数学史',content:'柏拉图学园门口刻着"不懂几何者不得入内"。柏拉图认为几何学训练的是纯粹的理性思维，是理解"理念世界"的阶梯。他虽然不是数学家，但对几何学的推崇深刻影响了希腊数学的发展。欧几里得《几何原本》的编写传统与柏拉图学园密切相关。'} },
  '手杖': { desc:'苏格拉底的旧手杖，木柄已经磨得光滑。他每天拄着这根手杖去广场，一走就是一天。手杖靠在墙角，像是在等一个不会再回来的主人。', knowledge:null },
  '陶罐': { desc:'厨房里的陶罐，装着橄榄油和粗粮。这就是苏格拉底一家全部的食物储备——简朴到了极致。', knowledge:null },
  '神谕石': { desc:'卫城上的一块刻有德尔斐神谕的石头："在所有人中，苏格拉底是最智慧的。"苏格拉底对此的回应是："因为我唯一知道的，就是我一无所知。"', knowledge:{title:'德尔斐神谕',cat:'历史文献',content:'德尔斐神庙的女祭司宣称"没有人比苏格拉底更智慧"。苏格拉底对此困惑不解，因为他认为自己一无所知。他走访了政治家、诗人、工匠，发现他们自以为知道很多，实际并不知道——而苏格拉底至少知道自己不知道。由此他理解了神谕的含义：真正的智慧在于承认无知。'} },
  '祭品': { desc:'卫城上的祭品——一只刚宰杀的羊，血还滴在祭台上。雅典人用这样的方式取悦神灵，但苏格拉底说："真正的虔诚不是杀羊，而是做一个正义的人。"', knowledge:null },
  '商船': { desc:'一艘即将起航的商船。如果你劝苏格拉底越狱，这艘船可以带他去墨伽拉。但此刻甲板上空无一人——他在等你的回答，而答案已经是"不"。', knowledge:null },
  '航海图': { desc:'一张画着爱琴海航线的航海图。从比雷埃夫斯到墨伽拉只需要一天的航程。苏格拉底本可以走这条路——但他选择了留下。', knowledge:null }
};

  // 舞女小红（实为夜莺）
  xiao_hong: {

    location:'百乐门舞厅',
    greeting:'（一个穿旗袍的女子向你走来，笑容里带着几分疲倦）先生跳支舞吗？今晚的曲子可真好。你是新来的吧？我小红，在这百乐门也跳了好几年了。',
    topics:[
      { keys:['跳舞','舞','舞女','跳支舞'], resp:'先生是来跳舞的还是来说话的？我陪舞陪笑，腿都站酸了。不过今夜的萨克斯吹得真好，是《夜上海》的调子。先生说跳舞，那我就陪您转两圈——但丑话说前头，小红的舞步金贵着呢，不陪醉鬼。', knowledge:{title:'百乐门与上海夜生活',cat:'社会生活',content:'百乐门舞厅1933年开业于静安寺路（今南京西路），号称"远东第一乐府"。舞厅配备弹簧地板和冷气设备，有职业舞女陪舞。1937年淞沪会战后，大批难民和富豪涌入租界，舞厅生意不降反升，纸醉金迷的表象下掩藏着各方势力的暗战。'} },
      { keys:['夜莺','接头','暗号','同志'], resp:'（小红的脚步顿了一下，眼睛飞快地扫过你的脸，又恢复笑容）先生说什么夜莺？百乐门只有黄莺般的歌声。不过……（她凑近你耳边，压低声音）如果您是想听夜莺唱歌，不妨说说，今夜的月色如何？', knowledge:{title:'地下党接头暗号',cat:'情报工作',content:'中共地下党接头采用双暗号制度：先由联络员说出"引语"，对方须以约定的"答语"回应，双方确认后方可交接。常见的接头地点选在人多嘈杂的公共场所（如舞厅、茶馆、影院），便于隐蔽身份和紧急撤离。暗号内容多为看似平常的对话，如讨论天气、时事等。'} },
      { keys:['月色','月亮','孤岛','今夜'], resp:'（你低声说"今夜月色真美"，小红眼波一转，嘴唇微动）可惜孤岛无月……先生，您终于来了。我等这一刻，等了整整三个月。组织上说会有同志来接头，可我不知道是谁，长什么样。这三个月，我每天在舞池里转，眼睛却盯着每一张陌生的脸。', knowledge:{title:'孤岛时期的中共地下工作',cat:'历史事件',content:'1937年11月上海华界沦陷后，租界沦为"孤岛"。中共江苏省委留守上海，在租界建立地下组织，开展情报、宣传、统战工作。地下党员以各种职业为掩护——舞女、报童、工人、教师，潜伏在敌人眼皮底下。这一时期被称为"孤岛抗战"，持续到1941年太平洋战争爆发租界沦陷。'} },
      { keys:['局势','战争','打仗','淞沪','会战'], resp:'（小红脸上的笑容淡了）先生还不知道吧？淞沪会战打了三个月，国军撤了，华界全丢了。可你信不信，四行仓库那八百壮士——其实是四百多人，硬是挡了日军四天四夜。全上海的人都看见了，苏州河这边是租界，那边就是战场。我们在百乐门跳舞的时候，河对岸在拼命。', knowledge:{title:'四行仓库保卫战与八百壮士',cat:'历史事件',content:'1937年10月26日至11月1日，谢晋元率领第88师524团一营452名官兵（对外宣称800人）死守四行仓库，与日军激战四昼夜。仓库紧邻苏州河南岸，对岸即是公共租界，中外民众亲眼目睹了中国军队的英勇抵抗。女童子军杨惠敏冒死泅渡苏州河，献上一面国旗，成为抗战史上的传奇一幕。'} },
      { keys:['情报','消息','传递','组织','任务'], resp:'先生既有暗号，那我也不藏着了。情报在我这儿——用密写术写在一张舞曲乐谱的背面，要用碘酒显影才能看见。内容是日军下一步进攻南京的兵力部署。这情报太重要了，关系到南京的防御。组织让我等"影子"来取，可这三个月，特高课的狗鼻子越凑越近了。' },
      { keys:['特高课','日本人','危险','安全'], resp:'（小红环顾四周）别提了。特高课最近在租界里安插了不少眼线，百乐门就有。那个姓田中的"商人"，你以为我看不出？他天天来喝咖啡，眼睛却不在舞女身上。我传情报只能见缝插针，稍有不慎就是掉脑袋的事。先生，您接头之后，撤退路线想好了吗？' },
      { keys:['撤退','走','离开','路线','码头'], resp:'撤退？组织安排了码头那条线。黄浦江边有个老陈，是咱们的交通员，专门护送同志往苏北根据地撤。您拿到情报后，从百乐门后门走，别走正门——那里有盯梢的。到了码头找老陈，对上暗号就能上船。记住，暗号是"今夜潮水如何"。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'先生保重。小红还得回去陪客，不然金老板要骂的。在这百乐门，笑是职业，泪只能往肚里咽。咱们后会有期——希望是在胜利的那一天。' }
    ],
    defaults:['先生问这个做什么？小红只是个跳舞的。','（小红笑了笑，眼神却很警惕）这舞厅里耳朵多，说话小心。','先生，有些事不该小红知道。','（小红低头整理旗袍，没有接话）']

    location:'百乐门舞厅',
    greeting:'（一个胖胖的中年人坐在吧台后面，手里转着一根雪茄）哟，新面孔？欢迎欢迎，百乐门什么都有——好酒、好舞、好姑娘。金某开门做生意，不论来路，只认钞票。先生想找乐子，找我就对了。',
    topics:[
      { keys:['生意','赚钱','舞厅','经营'], resp:'生意？嘿，这年头做生意的都是傻子。华界一沦陷，难民涌进来，倒是租界的生意好做了。百乐门每晚客满，达官贵人、洋人买办、青帮大亨，什么人都有。他们来跳舞？笑话，他们是来谈生意、躲清静、换消息的。我这舞厅，一半是销金窟，一半是消息铺。', knowledge:{title:'孤岛时期的畸形繁荣',cat:'社会生活',content:'1937年11月后，上海租界因大量难民和资本涌入，出现"畸形繁荣"。人口激增带动了消费业——舞厅、赌场、妓院生意兴隆。据记载，1938-1941年间租界舞厅数量不降反增，百乐门、仙乐斯等夜夜笙歌。这种繁华建立在沦陷的痛苦之上，被时人称为"商女不知亡国恨"。'} },
      { keys:['日本人','特高课','汉奸','日伪'], resp:'（金老板压低声音）嘘——日本人？这舞厅里天天有。那个姓田中的，自称日侨商人，可那双眼睛跟鹰似的，我看得出来。还有几个翻译官，狗仗人势的主儿。我开门做生意，不能得罪他们，但也绝不当汉奸。金某再浑，这点底线还是有的。' },
      { keys:['舞女','小红','姑娘'], resp:'舞女？小红啊……那姑娘不简单。她来百乐门两年了，手脚勤快，嘴又甜，客人喜欢。可我总觉得她身上有股子劲儿，不像寻常舞女。有时候半夜收工，别人都累瘫了，她倒精神得很，眼睛亮得吓人。不过我也懒得管——在这上海滩，谁还没点秘密呢？' },
      { keys:['黑市','走私','货','渠道'], resp:'先生是想找门路？黑市的东西我这儿有渠道——洋烟、西药、盘尼西林，要什么有什么。这年头，有货就是爷。不过先生要是想找别的"门路"，比如跑路、藏人什么的……金某虽不做这买卖，但能给您指条道。码头上有个老陈，神通广大，专帮人办"难办的事"。' },
      { keys:['租界','安全','法租界','警察'], resp:'租界安全？看怎么说。法国人管着巡捕房，表面上维持秩序，其实对咱们睁一只眼闭一只眼。日本人不敢明着进租界抓人——至少现在不敢。可暗地里，特高课的眼线无处不在。您要是有什么见不得光的事，在租界里做，比华界强，但也别太托大。' },
      { keys:['局势','战争','打仗','国军'], resp:'打仗？金某不懂打仗，只懂生意。不过四行仓库那一仗，我是亲眼见的。苏州河对岸，八百壮士死守，枪炮声响了四天四夜。我们这边的人隔着河看，有人哭，有人喊。金某虽是生意人，那几天也红了眼眶。这仗……总得有人打下去吧。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'先生慢走，改日再来。百乐门的门永远开着——只要这租界还在一天，只要金某还活着一天。这世道乱，先生多保重，有什么需要尽管来找我，金某别的没有，路子还是有一些的。' }
    ],
    defaults:['先生，这个金某不便说。','做生意的，不该问的别问。','（金老板吐了个烟圈，笑而不语）','先生要是消费，请便；要是打探消息，可得看分量。']
  },

  // 犹太难民亚伯拉罕
  youtai_nanmin: {
    name:'亚伯拉罕', title:'犹太难民', avatar:{text:'亚',bg:'#5a6a8a',color:'#fff'},
    location:'霞飞路咖啡馆',
    greeting:'（一个金发碧眼的外国人坐在角落，面前放着一杯凉透的咖啡，手里捏着一张皱巴巴的证件）Entschuldigung...啊，对不起，您是？我是亚伯拉罕·科恩，从维也纳来的。会说德语吗？英语也行？中文……我只学了一点。',
    topics:[
      { keys:['犹太','难民','维也纳','来','从哪'], resp:'我是从维也纳逃出来的犹太人。今年三月，德国吞并了奥地利，纳粹开始抓犹太人。我的书店被砸了，妻子……（声音哽咽）她没逃出来。我一个人辗转坐船到了上海——听说上海是唯一不需要签证就能上岸的地方。上海救了我的命。', knowledge:{title:'犹太难民与上海',cat:'历史事件',content:'1933年希特勒上台后，欧洲犹太人开始大规模逃亡。1937年后约2万名犹太难民涌入上海，因上海租界无需签证即可入境，成为犹太难民的重要避难所。他们主要聚居在虹口提篮桥一带，被称为"上海犹太人"。上海市民在自身遭受战乱的同时，对犹太难民给予了宽容和帮助。'} },
      { keys:['德国','纳粹','希特勒','迫害'], resp:'纳粹……您不知道那是什么。他们把我们像牲口一样登记、编号，逼我们戴上黄星。水晶之夜，全维也纳的犹太店铺被砸， synagogue（犹太会堂）被烧。我的邻居，一个八十岁的老人，被拖到街上打死了。德国人说我们是"劣等种族"——就因为我们的血统。所以先生，别相信任何以种族划分人的鬼话。', knowledge:{title:'水晶之夜与犹太迫害',cat:'历史事件',content:'1938年11月9日至10日的"水晶之夜"（Kristallnacht），纳粹党徒在全德国及奥地利境内袭击犹太人，砸毁犹太店铺、焚烧犹太会堂，约91名犹太人被杀，3万人被捕关入集中营。这一事件标志着纳粹对犹太人的迫害从歧视转向系统性暴力，是 Holocaust（大屠杀）的前奏。'} },
      { keys:['上海','生活','谋生','工作'], resp:'在上海？我在虹口提篮桥开了个小铺子，卖点香烟和面包。上海人对我很好，虽然语言不通，但人心是相通的。隔壁的中国阿婆，常给我送热粥。她说她也是逃难来的——从闸北，日本人炸了她的家。我们都是无家可归的人，在这个孤岛上互相取暖。' },
      { keys:['护照','签证','证件','身份'], resp:'（举起那张皱巴巴的证件）这是我仅有的身份证明——一张从维也纳出发的船票存根。上海不需要签证，但我听说，日本占领当局开始对虹口的犹太人设限了。有个叫何凤山的中国领事，在维也纳给犹太人发签证，救了好几千人。他是我们的恩人。', knowledge:{title:'何凤山与"生命签证"',cat:'历史人物',content:'何凤山（1901-1997），中国驻维也纳总领事。1938年至1940年间，他顶住纳粹压力，向数千名犹太人签发前往上海的签证，被称为"中国的辛德勒"。据估计他签发的签证至少救了数千犹太人。2001年，以色列政府授予他"国际义人"称号。'} },
      { keys:['情报','消息','战争','日本人'], resp:'情报？我一个难民，哪有什么情报。不过……我在虹口常看到日本兵，他们最近调动很频繁。还有，码头上半夜总有船偷偷开走，不知道运的什么。先生如果对这些感兴趣，咖啡馆里的消息最灵通——但也要小心，这里不是每个人都像看上去那么简单。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'再见了，朋友。愿上帝保佑您，也保佑上海这座收留了我的城市。我希望它也能挺过这场战争——我知道它会的，因为这里有像您这样的好人。Shalom，愿和平早日降临这片土地。' }
    ],
    defaults:['Verzeihung...对不起，我不太明白。','我的中文还不太好，先生。','（亚伯拉罕茫然地摇摇头）','这个……我不知道。']
  },

  // 日本特高课便衣田中
  tegao: {
    name:'田中', title:'日侨商人', avatar:{text:'田',bg:'#4a3a3a',color:'#fff'},
    location:'霞飞路咖啡馆',
    greeting:'（一个穿西装的日本人坐在窗边，手里端着咖啡，目光在你身上停留了一瞬）阁下好。鄙人田中一郎，做丝绸生意的。上海这地方，什么人都有，什么生意都能做。阁下请坐，喝一杯？',
    topics:[
      { keys:['生意','丝绸','贸易','商'], resp:'丝绸？那是我的"正经"生意。上海产的丝绸运到日本，再转卖到欧美，利润不错。不过说实话，这年头做什么生意都离不开局势。华界被皇军——不，被日本军队占领后，物资管控严了。但租界里嘛，法国人管不到日本人的生意，所以我还算自在。', knowledge:{title:'日本在华经济侵略',cat:'经济史',content:'1937年日军占领上海华界后，通过"兴亚院"等机构实施经济掠夺，控制棉花、丝绸、煤炭等战略物资。日本商人借军方势力垄断贸易，同时特务机关以商社为掩护从事情报活动。租界内的日侨商人成为日军情报网络的重要一环，许多人实为特高课线人。'} },
      { keys:['战争','打仗','皇军','日军','军队'], resp:'战争？阁下是担心战争？大日本帝国和支那的冲突，很快就会结束了。皇军所向披靡，三个月就够了——哦，已经过了三个月，但大局已定。上海是东亚的明珠，我们不能让它落入混乱。阁下是聪明人，应该懂得顺应时势。', knowledge:{title:'日本"三个月灭亡中国"的狂言',cat:'历史事件',content:'1937年七七事变后，日本军部扬言"三个月灭亡中国"。然而淞沪会战一役，中国军队坚守三个月，粉碎了日军的速胜企图。日军虽占领上海华界，但付出了惨重代价。此后日军进攻南京，制造了南京大屠杀。中国的抵抗使日本陷入长期战争的泥潭。'} },
      { keys:['特高课','间谍','情报','便衣','监视'], resp:'（田中的笑容僵了一瞬，随即恢复）特高课？阁下听谁说的？我是商人，不是警察。不过……上海这地方确实不太平，各种势力都有。听说有些"不安分的人"在租界里搞小动作，散布谣言，扰乱秩序。这种人，迟早会被清理掉的。阁下要是知道什么，告诉我也是好事——我不咬人的。', knowledge:{title:'日本特高课在华活动',cat:'情报史',content:'特高课（特别高等警察）是日本内务省的秘密警察机构，负责反间谍和政治镇压。1937年后特高课在上海租界大量安插便衣，监视中国抗日人士和英美情报活动。他们与宪兵队、汪伪特工总部（76号）勾结，在租界制造暗杀、绑架事件，臭名昭著。'} },
      { keys:['中国人','支那','本地人','抗日'], resp:'中国人？我接触的中国人不少。做生意的、当差的、跳舞的……大多数人只想过日子，不想惹事。但总有一小撮人，被什么"主义"洗了脑，搞暗杀、搞破坏。这种人最可恨——他们害的不是皇军，是普通百姓。阁下若见过这种人，不妨提醒我。皇军对良民是友好的。' },
      { keys:['租界','法国','法租界','法律'], resp:'租界？法国人那套"法治"，呵，不过是面子工程。他们嘴上说租界中立，可暗地里什么人都有。不过日本和法国还没撕破脸，所以我们在租界里还算客气。但阁下应该知道，这"客气"是有期限的——等时机到了，一切都会改变的。' },
      { keys:['百乐门','舞厅','舞女','小红'], resp:'百乐门？我常去。那里的舞女……有一个叫小红的，倒是挺机灵。不过太机灵的女人，反倒让人不放心。我盯着她有一阵子了——她认识的人太杂，消息太灵，不像是单纯的舞女。阁下要是也对她感兴趣，咱们可以"交流交流"。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'阁下慢走。田某在上海的生意还长着呢，咱们后会有期。哦，提醒一句——在这上海滩，最好别做让皇军不高兴的事。' }
    ],
    defaults:['阁下的问题，田某不太方便回答。','做生意的人，不该管的不管。','（田中端起咖啡，眼神却很锐利）','阁下要是没别的事，田某还有生意要谈。']
  },

  // 法国巡捕杜邦
  fabing: {
    name:'杜邦', title:'法租界巡捕', avatar:{text:'杜',bg:'#3a5a7a',color:'#fff'},
    location:'法租界巡捕房',
    greeting:'（一个穿制服的法国人靠在办公桌边，叼着烟斗）Bonjour. 您有事？我是杜邦，法租界巡捕房的督察。华人？没关系，我会说中文。这年头，不会说中文没法在租界混。您说吧，什么事？',
    topics:[
      { keys:['租界','法租界','法律','管辖'], resp:'法租界？归法国领事馆管，巡捕房负责治安。简单说，华界发生的事我们管不着，但进了租界这道门槛，就得守法国的规矩。中日开战后，大量难民涌进来，治安压力大增。走私、黑市、暗杀……什么乱七八糟的事都有。我们巡捕房就这点人，管不过来。', knowledge:{title:'上海法租界的法律地位',cat:'历史制度',content:'上海法租界设立于1849年，由法国领事馆管辖，设有公董局和巡捕房。租界享有治外法权，中国法律在租界内无效。1937年淞沪会战后，租界宣布"中立"，拒绝日军进入。但实际上租界成为各方势力博弈的灰色地带，日本通过政治施压不断侵蚀租界的"中立"地位，直至1943年租界被交还。'} },
      { keys:['日本人','特高课','日伪','压力'], resp:'日本人？咳，别提了。他们嘴上尊重租界中立，暗地里天天施压。要求我们配合抓"抗日分子"，交出政治犯。法国政府现在自顾不暇——欧洲那边希特勒磨刀霍霍，我们哪有精力跟日本人硬碰硬？所以很多事，我们只能睁一只眼闭一只眼。这是政治，不是警察该操心的。' },
      { keys:['难民','华人','移民','人口'], resp:'难民？华界沦陷后，几十万难民涌进租界，虹口、提篮桥挤满了人。还有犹太人，从欧洲逃来的，也有两万。人多了，治安就乱。但我们法国的原则是——只要你不在租界里闹事，我们就不管你从哪来、干过什么。这也是为什么很多人往租界跑。' },
      { keys:['通缉','通缉令','抓人','罪犯'], resp:'通缉令？墙上贴的那些，一半是华界日军要我们发的，一半是租界自己要抓的。日军通缉的"罪犯"，很多不过是抗日人士——这种令我们执行起来很为难。抓了吧，昧良心；不抓吧，日本人闹。所以我常跟手下说：抓人的时候，动作慢一点，给人家留条跑的道。嘘，这话别往外说。', knowledge:{title:'租界与中国抗日人士',cat:'历史事件',content:'孤岛时期，法租界和公共租界成为抗日人士的重要庇护所。租界当局在日方压力下，有时不得不配合搜捕，但许多巡捕暗中放水。1939年后日伪特工总部（76号）在租界制造多起暗杀案，针对抗日人士和报人，租界治安急剧恶化，被称为"恐怖的孤岛"。'} },
      { keys:['安全','保护','藏','危险'], resp:'您想求保护？巡捕房不是慈善机构，但只要您没犯法，在租界里就是安全的——至少目前是。不过您要是惹了日本人或者汉奸，那我也保不了您。我的建议是：别出头，别惹事，老老实实过日子。这乱世，活着就是本事。' },
      { keys:['四行仓库','八百壮士','谢晋元','战争'], resp:'四行仓库？那场仗……我是亲眼见的。苏州河南岸是租界，北岸就是战场。谢晋元的兵在仓库里死守，枪弹横飞，我们站在河这边看着，什么忙也帮不上。那面国旗升起来的时候，河这边的人都疯了，欢呼的、流泪的。那是我到上海十年，见过最震撼的一幕。中国军人，是值得敬佩的。', knowledge:{title:'谢晋元与八百壮士',cat:'历史人物',content:'谢晋元（1905-1941），广东蕉岭人，黄埔四期毕业。淞沪会战末期率524团一营452人（对外称800人）死守四行仓库，升旗表明中国军队仍在抵抗。撤入租界后被租界当局扣押软禁4年，1941年被叛徒刺杀身亡，年仅36岁。毛泽东誉其为"民族革命典型"。'} },
      { keys:['你好','再见','告辞','谢谢'], resp:'Au revoir，再见。在租界里小心点，先生。这地方看着太平，暗地里水深得很——法国人、日本人、青帮、还有各路说不清的人，全在底下较劲。您要是有什么事，尽管来巡捕房找我，能帮的我帮，帮不了的我提醒您。' }
    ],
    defaults:['这个……我不好多说。','巡捕只管抓贼，不管别的。','（杜邦吐了口烟，耸耸肩）','您的问题超出我的职责范围了。']
  },

  // 码头工人老陈（地下交通员）
  matou_gongren: {
    name:'老陈', title:'码头工人', avatar:{text:'陈',bg:'#6a5a3a',color:'#fff'},
    location:'码头仓库',
    greeting:'（一个皮肤黝黑的中年人靠在货箱上，叼着旱烟，眼神却精明得很）找老陈？码头上的事，没有我不知道的。您是要扛货还是……办别的事？先把话说清楚，码头不是乱来的地方。',
    topics:[
      { keys:['潮水','今夜潮水','暗号','接头'], resp:'（老陈的烟杆停在嘴边，眼神一亮）今夜潮水……合该顺风顺水。同志，您可算来了。老陈在这码头扛了三年麻袋，等的就是这个暗号。组织上说"影子"会来，我天天盼着。您是不是带着要紧的东西？要往根据地里送？', knowledge:{title:'地下交通线',cat:'情报工作',content:'中共在上海沦陷后建立多条秘密交通线，经水路、陆路将人员和物资送往苏北、苏南等抗日根据地。码头工人、船工、黄包车夫是交通线的重要环节。交通员以苦力身份掩护，利用货物夹带情报和人员，在日军眼皮底下穿越封锁线。每条交通线都有固定的接头暗号和备用路线。'} },
      { keys:['撤退','走','离开','上船','根据地'], resp:'撤退的船，今晚后半夜有一班，停在3号泊位，船老大是自己人。您上了船，顺黄浦江出吴淞口，再转内河，三天能到苏北盐城——那边是新四军的地盘。不过您得抓紧，这条线用一次少一次，日本人查得越来越紧了。', knowledge:{title:'苏北抗日根据地',cat:'历史事件',content:'苏北抗日根据地由新四军开辟，以盐城、阜宁为中心。1940年黄桥战役后巩固。根据地是上海地下党撤往解放区的重要通道，大量人员、物资、情报经此交通线往来。1941年皖南事变后，新四军军部重建于盐城，苏北根据地成为华中抗战的指挥中心。'} },
      { keys:['码头','货物','工作','扛货'], resp:'码头？我在这扛了十几年麻袋了。白天扛货，晚上办"正事"。这码头是上海的命脉，什么货都走——粮食、棉纱、军火、药品。日本人盯着，青帮也盯着，各种眼线盯着。但码头工人有码头的规矩，外人想插手，没那么容易。我混在里面，比谁都方便。' },
      { keys:['情报','消息','送','传递'], resp:'送情报？我在码头上送过的东西，比扛过的麻袋还多。信件、密码本、药品、电台零件，都藏在货里偷运。有一次我把密写情报塞在咸鱼肚子里，日本兵捏着鼻子翻了一遍，愣是没发现。这行干久了，胆子就大了——但也越干越怕，怕连累同志。' },
      { keys:['日本人','盘查','搜查','危险'], resp:'日本人在码头设了关卡，货都要过检。但您知道吗，检查的兵也是人，看见金银会眼开，闻到臭味会皱眉。我们就是钻这些空子。不过最近来了个新的宪兵队长，精得很，查得特别细。这条线还能用多久，我也说不准。同志，要办的事趁早办。' },
      { keys:['八百壮士','四行仓库','谢晋元','抗战'], resp:'八百壮士？我亲眼见的。那时候我在苏州河边扛货，对岸就是四行仓库。谢团长的兵在楼上打，我们在楼下看。有个女童子军，叫杨惠敏，半夜游过苏州河送了一面国旗。第二天国旗升起来，我们这边的人都疯了。后来谢团长撤进租界，被洋人扣了——呸，什么"中立"，分明是帮日本人。', knowledge:{title:'杨惠敏献旗',cat:'历史事件',content:'1937年10月28日，22岁的女童子军杨惠敏将一面国旗裹在身上，冒着枪林弹雨泅渡苏州河，送入四行仓库。次日国旗在仓库楼顶升起，隔河观战的上海市民欢呼雷动。此举极大振奋了抗战军民的士气，杨惠敏成为抗战英雄，后经香港辗转大后方。'} },
      { keys:['你好','再见','告辞','谢谢'], resp:'同志保重。码头随时有船，只要老陈还在，这条路就通。咱们根据地里见——等赶走了鬼子，我请您喝自家酿的米酒，那滋味比上海滩什么酒都香。记住，天黑之前到3号泊位，别误了时辰。' }
    ],
    defaults:['同志，这话不方便说。','码头上人多眼杂，说话小心。','（老陈吧嗒吧嗒抽着烟，没吱声）','您问的，老陈不知道。']
  },

  // 报馆编辑沈编辑
  bianji: {
    name:'沈编辑', title:'申报编辑', avatar:{text:'沈',bg:'#5a4a6a',color:'#fff'},
    location:'申报报馆',
    greeting:'（一个戴眼镜的中年人从稿纸堆里抬起头，手指上沾着墨水）您找谁？哦，看看报馆？我是沈某，《申报》编辑。这年头当编辑，比当兵的还危险——当兵的挨枪子儿，我们挨的是审查和暗杀。您有什么事？',
    topics:[
      { keys:['新闻','报纸','申报','报道'], resp:'新闻？这年头哪有什么新闻，全是审查过的。日本人占了华界，租界的报纸还得小心翼翼——不能骂日军，不能喊抗日，连"侵略"两个字都要换成"冲突"。但有些真话，我们藏在字里行间。读者看得懂的自然看得懂，看不懂的，我们也无奈。这就是孤岛的报人。', knowledge:{title:'孤岛时期的新闻界',cat:'传媒史',content:'孤岛时期，租界中文报刊在日方压力和租界审查下艰难生存。《申报》《大公报》等坚持报道抗战消息，采用"曲笔"——以隐晦措辞传递信息。1938年后《文汇报》《译报》等坚持抗日立场的报刊遭日伪投弹、暗杀，多名报人殉职，史称"报人之殇"。报刊成为没有硝烟的战场。'} },
      { keys:['审查','新闻检查','删','禁'], resp:'审查？两道关。先是租界工部局的新闻检查处，后是日伪的恐吓。租界不许登"刺激日军"的内容，日伪则直接投弹、杀人。《社会日报》的蔡钓徒，被76号砍了头挂在电线杆上。《大美晚报》的朱惺公，公开拒绝附逆，被暗杀在街头。当报人，得有送命的觉悟。' },
      { keys:['四行仓库','八百壮士','报道','谢晋元'], resp:'四行仓库那几天，是我们报人最热血也最心痛的日子。谢团长他们在仓库死守，我们隔河看着，发号外、写通讯，一天出三版。八百壮士的故事，是全上海记者用命换来的——有个记者差点被流弹打死。后来谢团长撤进租界被扣押，我们想报道，却被压下来。这口气，憋了四年了。', knowledge:{title:'《申报》与抗战报道',cat:'传媒史',content:'《申报》创刊于1872年，是中国历史最悠久的中文报纸之一。淞沪会战期间，《申报》坚持在前线报道战况，四行仓库保卫战期间连续发布号外，极大鼓舞了民心士气。1937年底《申报》因拒绝日方检查一度停刊，后迁往租界以《申报》汉口版、香港版继续出版，坚持抗日立场。'} },
      { keys:['舆论','宣传','民心','影响'], resp:'舆论？您以为报纸只是印字？在孤岛，报纸就是枪。日本人为什么杀报人？因为一支笔能唤醒千万人。我们写一篇社论，第二天全上海都在传。这就是力量。日本人可以占领土地，但占领不了人心——只要还有人在说真话，这孤岛就不是死岛。' },
      { keys:['局势','战争','抗战','前途'], resp:'前途？说实话，看不清。华界丢了，南京也快了——听说日军正向南京推进，一路上杀人如麻。但我不信中国会亡。四万万人的国家，亡不了。谢晋元四百人能挡四天，四万万人能挡多少年？这仗，是熬出来的。我们报人能做的，就是不让老百姓忘了——我们在打仗，我们在抵抗。' },
      { keys:['消息','线索','情报','打听'], resp:'您要打听消息？报馆是消息的集散地，前线来的电报、租界的传闻、国际的电讯，都往这儿汇。但我得提醒您——报馆里也不干净，有日本人的眼线混在里头。您要是有什么要紧的事，最好别在这儿说。霞飞路的咖啡馆、百乐门的后厅，都比这儿安全。' },
      { keys:['你好','再见','告辞','谢谢'], resp:'您慢走。沈某还得赶稿子——明天的社论，得写到天亮。在这孤岛，笔就是命，命就是笔。先生若也是同道中人，咱们心照不宣。保重，盼着胜利那天，再一起喝杯庆功酒。' }
    ],
    defaults:['这个……沈某不方便说。','您是外人，有些事不能讲。','（沈编辑推了推眼镜，低头继续写稿）','报馆里人多嘴杂，您懂的。']
  },

  // 卖报童阿毛
  maibaotong: {
    name:'阿毛', title:'卖报童', avatar:{text:'毛',bg:'#7a6a4a',color:'#fff'},
    location:'申报报馆',
    greeting:'（一个十来岁的男孩抱着一摞报纸，蹲在报馆门口）卖报卖报！今天的《申报》！八百壮士死守四行仓库！先生买份报吧？一分钱一份，阿毛给您送到家都行！',
    topics:[
      { keys:['卖报','报纸','买报','申报'], resp:'卖报？阿毛卖了三年报了。从闸北卖到租界——日本人炸了闸北，爹娘没了，阿毛就靠卖报活命。一天卖一百份，赚几分钱，买个馒头就着自来水吃。不过阿毛卖报不光为钱，报上有消息，阿毛看了能跟人讲，讲得好人家多给一个铜板。', knowledge:{title:'上海的报童',cat:'社会生活',content:'民国上海有大量报童，多为贫苦家庭或战争孤儿。他们凌晨到报馆取报，沿街叫卖，收入微薄。报童虽社会地位低下，却是信息传播的末梢神经——街头巷尾的新闻多由报童口口相传。著名报童出身的报人、作家不乏其人，报童群体是上海都市底层社会的缩影。'} },
      { keys:['消息','新闻','听说','消息灵'], resp:'消息？阿毛的消息可灵了！满上海跑，什么都能听见。日本人今天在哪抓人了，码头今晚哪条船要开，百乐门来了什么新客人——阿毛全知道。先生要打听什么？不过阿毛的消息也不是白给的，得换点实惠的。一个铜板一条，怎么样？' },
      { keys:['四行仓库','八百壮士','谢晋元'], resp:'八百壮士！阿毛最佩服他们了！那时候阿毛还在闸北，亲眼看见河对岸的仓库升起了国旗。阿毛喊哑了嗓子，给人家送号外。后来谢团长被洋人扣在租界，阿毛天天去送报，隔着铁丝网喊"谢团长好"。谢团长还冲阿毛笑过呢。阿毛长大也要当兵，打鬼子！', knowledge:{title:'八百壮士的孤军营',cat:'历史事件',content:'四行仓库守军撤入公共租界后，被租界当局解除武装，扣押在胶州路孤军营，长达4年。谢晋元率部在营中坚持升旗、操练，成为孤岛时期的精神象征。上海市民纷纷前往探望慰问。1941年4月，谢晋元被叛兵刺杀身亡，数十万市民送葬。太平洋战争后孤军营被日军接管，士兵被分散关押。'} },
      { keys:['日本人','鬼子','坏','欺负'], resp:'日本人？坏透了！炸了阿毛的家，杀了阿毛的爹娘。阿毛亲眼看见的——飞机扔炸弹，一条街全没了。阿毛躲在水缸里才活下来。现在租界里也有日本人的狗腿子，专欺负小孩。阿毛学精了，看见穿黄皮的就绕着走。先生，您可别跟他们一伙儿啊。' },
      { keys:['租界','法租界','安全','跑'], resp:'租界？比华界强，至少日本兵不敢明着进来抓人。但租界也不太平，阿毛见过有人大白天被抓走——穿着便衣的人，不知是哪路的。阿毛腿快，一有事就跑。先生要是觉得不安全，法租界比公共租界强一点，法国人跟日本人还没穿一条裤子。' },
      { keys:['百乐门','舞厅','小红','夜莺'], resp:'百乐门？阿毛在那儿卖过晚报。里面有个舞女姐姐，叫小红，对阿毛可好了，常给阿毛塞点心。不过阿毛觉得她跟别的舞女不一样——她的眼神有时好尖好尖，像是在找什么人。还有，阿毛看见她半夜从后门走，不是回家，是往码头方向去。先生，她是不是也是好人？' },
      { keys:['你好','再见','告辞','谢谢'], resp:'先生再见！阿毛还得卖报呢，不然今天没饭吃。买份报吧，一分钱——阿毛给您留着明天的号外！先生要是还想知道什么消息，来找阿毛准没错，满上海就数阿毛腿最快、耳朵最尖！' }
    ],
    defaults:['阿毛不知道这个。','先生问别的吧，阿毛只管卖报。','（阿毛挠挠头，一脸茫然）','先生，阿毛得去卖报了，不然今天没饭吃。']
  }

});

Object.assign(objectData, {
  '留声机': { desc:'一台百乐门的留声机，正在播放《夜上海》。你注意到唱片底下压着一张乐谱，背面隐约有字迹——像是密写过的痕迹，需要显影剂才能看清。', knowledge:{title:'密写术',cat:'情报工作',content:'密写术是地下情报工作的基本技能。常用密写材料包括柠檬汁、牛奶、明矾水等，书写后无色透明，需加热或用化学试剂（如碘酒）显影。1930年代中共地下党广泛使用密写术传递情报，将密写字迹藏在书报、乐谱、衣物等日常物品上，避开敌人检查。'} },
  '舞厅账本': { desc:'一本厚厚的账本，记录着百乐门的进出账目。你翻到最近几页，发现某些日期旁边画着小记号——像是某种暗记，标记着特殊客人的到访时间。', knowledge:{title:'情报传递的暗记系统',cat:'情报工作',content:'地下党使用暗记系统标记情报交接。常见方式包括在书页折角、账本画符、报纸圈字等，约定不同符号代表不同含义。这种"死信箱"式的静态交接避免了接头风险，是孤岛时期最常用的情报传递方式之一。'} },
  '报纸架': { desc:'咖啡馆里的报纸架，放着中英文报纸。你发现今天的《申报》第三版有一则寻人启事，措辞奇怪——"寻找夜莺，月下有约"。这分明是一条暗语广告。', knowledge:{title:'报纸暗语广告',cat:'情报工作',content:'孤岛时期，地下党常利用报纸的分类广告传递情报。以寻人、启事、商业广告为掩护，用约定暗语传递接头时间、地点和指令。这种方式隐蔽性强，即使被截获也难以破译。日伪情报机关为此专门设立"广告检查"岗，但难以完全封堵。'} },
  '通缉令': { desc:'巡捕房墙上的一张通缉令，上面印着一个模糊的照片，写着"通缉抗日分子，代号不详"。下面附注："此人可能化名活动于租界各娱乐场所。"你看不出是谁，但"娱乐场所"几个字让你心头一动。', knowledge:{title:'日伪通缉与租界配合',cat:'历史事件',content:'日军占领华界后，通过租界当局发布大量通缉令，针对抗日人士和地下党员。通缉令往往只有模糊描述，甚至以"代号"指代。租界巡捕房在日方压力下被迫配合，但执行时常消极怠工。许多被通缉者借助租界的灰色地带长期潜伏，与日伪展开隐蔽斗争。'} },
  '货箱': { desc:'码头上一只半开的货箱，里面装着棉纱。你拨开棉纱，发现箱底藏着一个油布包——打开一看，是几份油印的传单和一本密码本。这显然是地下交通线运送的物资。', knowledge:{title:'物资夹带与地下运输',cat:'情报工作',content:'地下交通线常用货物夹带方式运送物资。将电台零件、密码本、药品、传单藏在棉纱、粮食、咸鱼等货物中，利用码头货物吞吐量大的特点避开检查。交通员与船老大、码头工人配合，形成完整的运输链条，是将物资送往抗日根据地的重要渠道。'} },
  '稿样': { desc:'报馆编辑桌上的一份未刊稿样，标题是《孤岛之光》。内容写的是四行仓库保卫战，但多处被红笔删改——审查痕迹明显。你在页脚发现一行小字："夜莺已至，速接头。"', knowledge:{title:'新闻审查与暗语传讯',cat:'传媒史',content:'孤岛时期报馆稿件须经租界工部局新闻检查处审核，涉及抗日内容的会被删改。报人常在审查后的清样页脚、版面角落藏写暗语，向同志传递信息。报馆编辑室本身也是地下党的联络点之一，编辑身份成为情报传递的天然掩护。'} },
  '密码本': { desc:'你公寓桌上的一本密码本，封面伪装成《唐诗三百首》。翻开内页，某些字的旁边有极细的针刺痕迹——这是"针刺密写"标记，对应着一段待破译的情报。', knowledge:{title:'书籍密码',cat:'情报工作',content:'书籍密码是经典加密方式：双方约定同一本书，以"页码-行数-字数"定位明文字符。1930年代中共地下党常用《唐诗三百首》《三字经》等通俗书籍作为密本。接收方需持有相同版本才能破译，安全性较高。针刺标记则用于标注关键字符，便于快速定位。'} },
  '传单': { desc:'地下印刷所里刚印好的传单——《告上海同胞书》，号召市民坚持抗战、不当顺民。油墨还没干透，字迹遒劲有力。传单背面印着一首打油诗，首字连起来是"夜莺在百乐门"。', knowledge:{title:'地下印刷与抗日宣传',cat:'历史事件',content:'孤岛时期，中共地下党设立秘密印刷所，印制传单、报刊、小册子，鼓舞民众抗日意志。印刷所多设在弄堂深处，以裁缝铺、杂货店为掩护。印好的宣传品由交通员散发或夹入报纸投递。1939年后日伪加紧搜查，多座印刷所被破坏，但新的据点不断建立，形成"野火烧不尽"之势。'} }
});

    { keys:['艾琳娜','爱人','她'], resp:'艾琳娜……她是艾德温的一切。温柔、善良，笑起来像春天的阳光。她病了很久，艾德温四处求医，但没有人能救她。她死的那天，艾德温在教堂里哭了一整夜。第二天他就不一样了——眼睛里没有了光，只有一种可怕的决心。如果艾琳娜没有死……也许一切都会不同。但她死了，而艾德温无法接受。这就是一切悲剧的起点。' },
    { keys:['诅咒','仪式','那天'], resp:'那天晚上……我永远忘不了。天空突然裂开了一道口子，绿色的光倾泻而下，像毒液一样渗入大地。所有亡灵都"醒"了——包括我。我感到一股巨大的力量将我固定在这里，无法离开。我听到灵魂之井的方向传来一声尖叫——那不是恐惧的尖叫，而是悲伤的。后来我才知道，那是艾琳娜的灵魂。她没有复活——她成了诅咒的锚点，被永远困在井里。' },
    { keys:['教堂','上帝','信仰'], resp:'上帝？我已经很久没有感受到上帝的存在了。也许他放弃了这片土地，也许他看不到被诅咒的地方。但我仍然留在这里——不是因为信仰，而是因为习惯。四十年的习惯，三百年也改不了。而且……有人在哭。我听得到灵魂之井里传来的哭声。我虽然帮不了什么，但至少可以在这里陪着。陪伴不需要信仰，只需要善良。', knowledge:{title:'信仰的崩塌与坚守',cat:'灵魂学说',content:'诅咒对信仰体系造成了双重打击：一方面，圣骑士艾德温的堕落证明了信仰在极端情感面前的脆弱性；另一方面，诅咒的存在本身质疑了神圣之力的有效性。'} },
    { keys:['你好','再见','告辞','谢谢'], resp:'愿你的灵魂找到归途。在这里，这是最大的祝福。' }
  ],
  defaults:['这个问题……我可能无法回答。','（修女的眼中流下无声的泪）有些事情，知道得越多越痛苦。','你可以去问巫妖，他知道得比我多。','在诅咒中困了三百年，有些记忆已经模糊了。']
};

npcData.witch = {
  name:'沼泽女巫', title:'腐烂沼泽的炼药师', avatar:{text:'巫',bg:'#3a5a3a',color:'#a0d0a0'},
  location:'necro_swamp',
  greeting:'（一个佝偻的老妇人蹲在沼泽边，用一根骨头搅拌着面前冒泡的黑色坩埚。她抬起头，独眼闪着贪婪的光）呵，活人。稀客。我是莫尔甘娜，这片沼泽的女巫——别跑，我不吃人，我只吃灵魂……开玩笑的。你来对地方了，整片墓园只有我懂诅咒的魔法原理。想知道什么？',
  topics:[
    { keys:['诅咒','原理','魔法'], resp:'诅咒的魔法原理？你问对人了。这个诅咒不是普通的黑魔法——它是一种"灵魂锚定术"的变体。正常情况下，灵魂在肉体死亡后会自然游离，前往彼岸。但这个诅咒在墓园上空编织了一张巨大的灵魂之网，把所有灵魂都网住了。灵魂无法离开，无法消散，也无法真正"活着"——它们被固定在生与死之间。而维持这张网的，需要一个"锚点"——一个足够强大的灵魂作为网的中心。', knowledge:{title:'灵魂锚定术的魔法原理',cat:'亡灵魔法',content:'灵魂锚定术是一种将灵魂固定在特定区域的禁术。其原理是在目标区域上空编织灵魂之网，以强大灵魂作为锚点维持网的稳定。墓园诅咒即为此术的变体。'} },
    { keys:['艾德温','仪式','逆转'], resp:'艾德温使用的仪式？我从沼泽的魔力残留中分析过。他用了一把刻有逆转符文的匕首，在灵魂之井旁画了法阵。法阵的目的是撕开生死屏障。但法阵出了问题——法阵成功了，但范围远超预期——整个墓园的屏障被撕开了。艾琳娜的灵魂确实被拉了回来，但它不是"复活"，而是被"锚定"在了井里——成了诅咒的核心。', knowledge:{title:'逆转仪式的细节',cat:'诅咒研究',content:'诅咒仪式在灵魂之井旁举行，使用刻有逆转符文的仪式匕首和《逆转之书》。法阵成功撕开了生死屏障，但范围远超预期。巫妖故意向艾德温提供了残缺版《逆转之书》，是诅咒的幕后推手。'} },
    { keys:['解除','解咒','方法'], resp:'解除？巫妖说有三种方法：摧毁锚点灵魂、找到完整的《逆转之书》进行反向仪式、或者让艾德温自愿放下执念。但三种都不靠谱。摧毁艾琳娜的灵魂？她是无辜的。完整的《逆转之书》？从来就不存在完整版。让艾德温放下执念？三百年来他都没有做到。不过……也许还有第四种方法，但那需要你自己去发现。' },
    { keys:['巫妖','老怪物','塔'], resp:'巫妖？那个老怪物住在西北角的塔里。他是这片墓园最古老的存在——比诅咒还要古老。他喜欢用谜语和半真半假的话来考验人。而且……我怀疑他对诅咒的诞生并非毫无责任。他太了解诅咒了，了解得不正常。就好像……他早就知道会发生这一切。', knowledge:{title:'巫妖与诅咒的隐秘关联',cat:'人物志',content:'远古巫妖是墓园中最古老的存在。女巫怀疑巫妖对诅咒的诞生负有间接责任——他对诅咒的了解过于深入。巫妖可能事先知晓艾德温的仪式计划，甚至可能暗中推动了诅咒的诞生。'} },
    { keys:['你好','再见','告辞','谢谢'], resp:'信息换信息，这是沼泽的规矩。没有白吃的午餐——即使在这里。' }
  ],
  defaults:['（女巫继续搅拌坩埚）这个……不在我的知识范围内。','你去问那个老怪物巫妖吧。','沼泽里的事我只管沼泽。','没有代价就没有答案。']
};

npcData.lich = {
  name:'远古巫妖', title:'塔中的不朽智者', avatar:{text:'妖',bg:'#1a1a3a',color:'#8080ff'},
  location:'necro_tower',
  greeting:'（塔顶的黑暗中，一个漂浮的骷髅头散发着幽蓝的光芒。它的眼中燃烧着两簇冰冷的灵魂之火，周围环绕着无数飘浮的书页）又一个学徒？你的导师也来过——他没能离开。我是赫尔墨斯，这片墓园最古老的居民。你想知道什么？知识是我的货币，而我有的是时间——永恒的时间。',
  topics:[
    { keys:['诅咒','真相','本质'], resp:'诅咒的真相？你准备好了吗？这个诅咒的制造者，是三百年前的圣骑士艾德温。他为复活死去的妻子，使用了《逆转之书》中的禁忌仪式，撕开了生死屏障。但仪式失控了——不仅他的妻子没有复活，整个墓园的灵魂都被锚定在了生死之间。你的导师来调查这件事，试图解除诅咒，但他太鲁莽了——他试图用自己的灵魂去填补锚点，结果被吞噬了。', knowledge:{title:'诅咒的完整真相',cat:'诅咒研究',content:'诅咒由圣骑士艾德温三百年前制造。艾德温为复活病逝的爱人艾琳娜，使用禁忌仪式撕裂生死屏障。学徒的导师在试图以自身灵魂填补锚点时被吞噬。巫妖因与诅咒存在因果联系，无法直接干涉解咒。'} },
    { keys:['巫妖','你','自己'], resp:'我？我是赫尔墨斯，生前是远古帝国的宫廷法师。巫妖之路——将自己的灵魂封入特殊容器，实现永生。我在这座塔里待了上千年。诅咒对我没有太大影响——我的灵魂不在墓园的系统里，而是在我的容器中。但我无法离开塔太远，也无法直接干涉诅咒。因果律的束缚——我参与了《逆转之书》的编写，所以诅咒与我有因果联系，我不能亲手解除它。', knowledge:{title:'巫妖的因果束缚',cat:'亡灵魔法',content:'巫妖赫尔墨斯因生前参与编写《逆转之书》，与诅咒存在因果联系，受因果律束缚无法直接干涉解咒。因果律束缚是高阶魔法的基本法则：与某事件有因果联系的实体，不能直接逆转该事件。'} },
    { keys:['解除','方法','途径'], resp:'解除诅咒的方法？三种理论上可行的方法。第一种：摧毁锚点灵魂——艾琳娜。但她是无辜的。第二种：使用完整的《逆转之书》进行反向仪式。但完整的版本从来就不存在。第三种：让艾德温自愿放下执念。但三百年来他都没有做到。也许还有第四种方法……但那不是我能告诉你的。你需要自己去发现。', knowledge:{title:'解除诅咒的三种途径',cat:'诅咒研究',content:'解除诅咒的三种理论途径：一、摧毁锚点灵魂艾琳娜；二、使用完整《逆转之书》进行反向仪式；三、让艾德温自愿放下执念。巫妖暗示存在第四种途径，但受因果律束缚无法明说。'} },
    { keys:['导师','学徒','失踪'], resp:'你的导师……是的，他来过。一个聪明但太急切的年轻人——和你一样。他了解诅咒的原理后，决定用自己的灵魂去填补锚点，试图"替换"艾琳娜。但他错了。锚点不是容器，而是锁——你无法用另一把钥匙替换它，你只会被锁住。他的灵魂被吞噬了，成为了诅咒的一部分。如果你不想重蹈覆辙，就不要试图英雄主义。' },
    { keys:['你好','再见','告辞','谢谢'], resp:'知识是唯一的永恒。带着你得到的离开吧——但记住，有些真相知道了就无法忘记。' }
  ],
  defaults:['这个问题……超出了你目前需要知道的范畴。','（巫妖的灵魂之火闪烁了一下）自己去想。','我给了你足够的线索，剩下的路要你自己走。','因果律束缚着我，有些事我不能直说。']
};

npcData.zombie_servant = {
  name:'僵尸仆人', title:'保留记忆的亡灵仆从', avatar:{text:'仆',bg:'#4a3a2a',color:'#c0b090'},
  location:'necro_catacomb',
  greeting:'（一个动作迟缓的僵尸正在擦拭地下墓穴的骨灰缸。它穿着破旧的仆人制服，半边脸已经腐烂。它缓缓转过头，浑浊的眼中闪过一丝清明）老爷……不，你不是老爷。老爷在井边。我是托马斯，艾德温老爷的仆人。虽然我已经死了，但我还记得一些事情。你想知道什么？',
  topics:[
    { keys:['艾德温','老爷','主人'], resp:'老爷……他是个好人，真的。他收留了我——一个孤儿，给我吃住，教我识字。他爱艾琳娜小姐，爱得发狂。小姐死后，老爷整个人都变了。他开始读那些可怕的书，在半夜画法阵。我劝过他，但他不听。后来他让我帮忙……我帮了。诅咒那天晚上，我就在旁边。是我点的蜡烛，是我递的匕首。如果……如果我当时不帮忙……也许……', knowledge:{title:'诅咒之夜的目击者证词',cat:'诅咒研究',content:'僵尸仆人托马斯是诅咒仪式的目击者和参与者。他证实艾德温在爱人艾琳娜病逝后精神崩溃，开始研究禁忌术法。托马斯在仪式中负责点蜡烛和递匕首，对诅咒的诞生负有间接责任。'} },
    { keys:['仪式','那天','晚上'], resp:'那天晚上……月亮是红色的。老爷在灵魂之井旁画了一个大法阵，用的就是那把刻着符文的匕首。他让我站在法阵外，不要动。然后他开始念咒语——那种声音，不像人话，像是从地底深处传上来的。法阵亮了起来，先是蓝色，然后变成绿色，然后……天空裂开了。我听到小姐的声音——她在哭。然后一切都结束了。老爷倒在地上，法阵消失了，但诅咒没有消失。它留了下来。' },
    { keys:['艾琳娜','小姐','她'], resp:'小姐……她是那么好的一个人。她总是给我留吃的，冬天给我旧衣服。她病了很久，老爷四处求医，但没人治得好。她死的那天，老爷抱着她哭了三天三夜。然后他就开始变了。如果小姐没有死……老爷不会变成这样。诅咒不会发生。但"如果"有什么用呢？人死不能复生——老爷不明白这个道理。', knowledge:{title:'艾琳娜的生平与诅咒的根源',cat:'人物志',content:'艾琳娜是圣骑士艾德温的爱人，性格善良温柔。她病逝后，艾德温精神崩溃并开始研究禁忌术法，最终导致诅咒。艾琳娜并非自愿成为锚点——她是被艾德温的仪式强行拖入的。'} },
    { keys:['记忆','保留','为什么'], resp:'为什么我保留了记忆？我也不知道。也许是诅咒的副作用——每个亡灵保留的程度不同。骷髅守卫保留了职责，修女保留了信仰，我保留了记忆。但保留记忆是最大的惩罚——因为我记得一切。我记得小姐的笑，记得老爷的善良，记得诅咒那天晚上的一切。如果我忘了，也许会好过一些。但诅咒不让你忘——它让你记住一切，永远记住。' },
    { keys:['你好','再见','告辞','谢谢'], resp:'如果你能解除诅咒……请让小姐安息。她不配受这样的苦。至于老爷……他也值得同情。' }
  ],
  defaults:['这个……我记不太清了。三百年过去了，有些记忆已经模糊。','（僵尸的眼中闪过一丝痛苦）有些事情我不想回忆。','你去问老爷吧。','我只是个仆人，大人物的事我不懂。']
};

npcData.soul_merchant = {
  name:'灵魂商人', title:'交易记忆的幽灵', avatar:{text:'魂',bg:'#3a3a5a',color:'#a0a0d0'},
  location:'necro_plaza',
  greeting:'（一个半透明的身影坐在广场的白骨堆上，面前摆着几个发光的水晶球。它的面容模糊，但声音圆滑而低沉）欢迎，欢迎！我是灵魂商人——买卖记忆、秘密和灵魂碎片的商人。你是新来的？你的灵魂还是完整的，没有被诅咒侵蚀。这很稀有。想买点什么？还是想卖点什么？',
  topics:[
    { keys:['记忆','交易','买卖'], resp:'记忆是我的商品。在这个墓园里，记忆比灵魂更珍贵——因为诅咒会侵蚀记忆，但不会侵蚀灵魂。很多亡灵来找我，用他们仅剩的记忆换取安宁——忘掉痛苦，忘掉身份，忘掉一切。我收集这些记忆，整理、分类，然后卖给需要的人。你想要什么记忆？某个亡灵的生前？诅咒的细节？还是……你导师的最后一刻？', knowledge:{title:'记忆交易与灵魂碎片',cat:'灵魂学说',content:'在诅咒墓园中，记忆比灵魂更珍贵。灵魂商人收集亡灵失去的记忆作为商品交易。记忆交易存在估值体系：快乐记忆因稀有而价值高于悲伤记忆；秘密因具有力量而价值最高。'} },
    { keys:['导师','记忆','碎片'], resp:'你的导师？我确实有一些属于他的记忆碎片。他来墓园之后，灵魂开始被诅咒侵蚀，记忆碎片开始脱落。我收集了一些。给你看一段——免费的，算是开业酬宾。这段记忆：你的导师站在灵魂之井旁边，面对着一个光芒四射的灵魂，他说"艾琳娜，我必须这么做，为了所有人"。然后记忆就断了。你自己想想这意味着什么。', knowledge:{title:'导师的最后记忆碎片',cat:'人物志',content:'灵魂商人持有学徒导师的记忆碎片。关键碎片显示：导师曾在灵魂之井旁面对艾琳娜的灵魂，并说"艾琳娜，我必须这么做，为了所有人"。导师的失踪与其对艾琳娜灵魂的直接接触密切相关。'} },
    { keys:['灵魂之井','井','镜子'], resp:'灵魂之井？井底有一面镜子——灵魂之镜。它映照的不是你的面容，而是你的灵魂最真实的模样。有人看到天使，有人看到恶魔。井里的东西很饿。它想吃灵魂，任何灵魂。你的导师大概就是被它吃了。如果你一定要去，带上修女的圣水，也许能护住你的灵魂。' },
    { keys:['秘密','信息','知道'], resp:'秘密？我有很多。比如——墓园看门狗的骨头是谁的？是艾德温的。他把爱犬的骨头做成了亡灵守卫。再比如——灵魂之井的底部不是深渊，是一面镜子。所有被吸入井中的灵魂都会在镜子里看到自己最真实的模样。艾德温看到的是什么？他没有告诉任何人。' },
    { keys:['你好','再见','告辞','谢谢'], resp:'记忆是唯一能证明"你曾经活过"的东西。珍惜你的记忆——在墓园里，它们比灵魂更脆弱。' }
  ],
  defaults:['商人模糊的面容似乎在微笑："这个信息……我需要评估一下它的市场价值。"','他摊开透明的双手："没有什么是真正免费的。"','灵魂商人飘忽不定地移动着："有些秘密太重了。"']
};

npcData.graveyard_dog = {
  name:'墓园看门狗', title:'会说话的骷髅犬', avatar:{text:'犬',bg:'#3a3a1a',color:'#d0d0a0'},
  location:'necro_plaza',
  greeting:'（一堆白色的骨头从广场的阴影中跑出来，拼凑成一条犬的形状。它的尾巴骨欢快地摇晃着）汪！不对，我已经不需要汪了。你好，两脚兽！好久没有活人跟我说话了。你身上有肉的味道……别担心，我不吃人，我只是想念肉的味道而已。',
  topics:[
    { keys:['看门','巡逻','守卫'], resp:'我的工作？巡逻墓园，跟以前一样。老爷——就是艾德温——把我做成这样的时候说"托马斯，继续看门"。老爷生前我是一条真狗，死后他舍不得我，就用亡灵魔法把我的骨头拼了起来。没想到诅咒给了我说话的能力。所以你看，诅咒也不全是坏事，至少我现在能抱怨了。', knowledge:{title:'亡灵守卫的动物转化',cat:'亡灵魔法',content:'墓园看门狗原为圣骑士艾德温的爱犬托马斯，死后被艾德温用亡灵魔法将骨骼转化为亡灵守卫。诅咒赋予其语言能力，这在动物亡灵中极为罕见。'} },
    { keys:['气味','追踪','鼻子'], resp:'气味？我的鼻子可灵了，虽然只剩骨头。整个墓园的气味我都记得：大门是铁锈味，地下墓穴是霉味，沼泽是臭鸡蛋味，教堂是旧蜡烛味，巫妖之塔是臭氧味。但灵魂之井的气味变了——以前是泥土味，后来变成了"悲伤"的味道。是的，悲伤是有味道的，像咸咸的泪水混着腐烂的花。最近那股味道越来越浓了。' },
    { keys:['主人','老爷','艾德温'], resp:'老爷……我每天都在想老爷。他以前经常摸我的头。老爷变成现在这样，我很难过。他以前身上是阳光的味道，后来变成了黑暗的味道，像烧焦的东西。但他还是我的老爷。我有时候会跑去灵魂之井看他，他就坐在井边，一动不动。我叫他，他也不理我。但我不会放弃的，狗从来不放弃主人。' },
    { keys:['灵魂','井','危险'], resp:'灵魂之井？两脚兽，那地方危险。我上次靠近的时候，感觉自己的灵魂被往井里拽。井里的东西很饿。它想吃灵魂，任何灵魂。你的导师大概就是被它吃了。如果你一定要去，带上那个修女的圣水，也许能护住你的灵魂。这是我的忠告，免费的，因为你是好人——我闻得出来。' },
    { keys:['五天','时间','感觉'], resp:'五天？我感觉得到。空气里的味道在变，越来越酸，越来越重。诅咒的"呼吸"要来了。五天之后，这股力量会爆发，把墓园里所有的灵魂——包括你的——全部吸入井中。所以，两脚兽，如果你能做什么，请快点做。' }

  defaults:['骷髅犬歪着颅骨："这个……我的鼻骨闻不出答案的味道。"','它趴下来："两脚兽的问题真多。"','看门狗突然竖起耳骨，然后又放松了："没事，只是风声。"']

  name:'堕落的圣骑士', title:'诅咒的根源·悔恨的亡魂', avatar:{text:'堕',bg:'#1a0a0a',color:'#ff8080'},
  location:'necro_well',
  greeting:'（灵魂之井旁，一个曾经高大如今佝偻的身影坐在冰冷的地面上。他的铠甲锈蚀斑斑，手中的圣剑断成两截搁在膝上。他缓缓抬起头，眼中残留着一丝光芒——那是悔恨的光芒）又来了一个。你是来审判我的吗？审判者来得够多了，但没有一个有资格。不过……如果你是来听故事的，我可以告诉你一切。',
  topics:[
    { keys:['诅咒','真相','我做的'], resp:'是的，诅咒是我造成的。艾琳娜死后，她的灵魂无法安息。我找到了《逆转之书》，上面记载着逆转死亡的仪式。我以为只要做那个仪式，就能让艾琳娜回来。我准备了匕首、法阵、一切需要的东西。托马斯帮我。但仪式开始后，我才知道我做了什么——我撕开了生与死之间的屏障，把整个墓园的灵魂都拖入了深渊。艾琳娜没有回来。她成了诅咒的锚点，被永远困在灵魂之井里。这一切，都是我的错。', knowledge:{title:'诅咒起源的完整自述',cat:'诅咒研究',content:'圣骑士艾德温亲口承认：诅咒由他亲手造成。他在爱人艾琳娜死后，使用《逆转之书》中的逆转死亡仪式试图复活她，结果撕裂了生死屏障。艾琳娜非但未被复活，反而成为诅咒的锚点灵魂。'} },
    { keys:['艾琳娜','爱','她'], resp:'艾琳娜……她是我的一切。她在井里。她是那么好的一个人——温柔、善良、笑起来像春天的阳光。是我害了她。如果我没有做那个仪式，她也许早就安息了。但现在，她被困在井里，日复一日地哭泣。她不是因为诅咒而哭——她是为我哭。即使被困在深渊里，她想的还是我。而我……我连死都不敢，因为我死了，就没人守着她了。', knowledge:{title:'艾琳娜与艾德温的羁绊',cat:'灵魂学说',content:'艾琳娜与艾德温之间存在极深的情感羁绊。艾德温的执念与艾琳娜的悲伤形成了自我强化的情感闭环，这是诅咒维持的情感基础。'} },
    { keys:['解除','救赎','方法'], resp:'解除诅咒？巫妖告诉你的吧。他说了三种方法？让我告诉你第四种——也是唯一真正可行的方法。你无法摧毁艾琳娜的灵魂，她是无辜的。至于让我"放下执念"……三百年都没做到的事，你几天之内就能做到吗？但有一种方法——让艾琳娜自己选择。她是锚点，只有她有权决定是否解除。如果你能下到井底，见到她的灵魂，问她一个问题：你愿意安息吗？如果她说愿意，诅咒就会解除。', knowledge:{title:'解除诅咒的第四种途径',cat:'诅咒研究',content:'解除诅咒的第四种途径：让锚点灵魂艾琳娜自己做出选择。方法是下至灵魂之井底部，直接询问她是否愿意安息。关键在于尊重锚点灵魂的自主意志。'} },
    { keys:['导师','学徒','你'], resp:'你让我想起年轻时的自己。你的导师也来过。他下到了井里，想和艾琳娜对话。但他犯了一个错误——他试图用自己的灵魂去"交换"艾琳娜的自由。锚点灵魂会吞噬接近者的灵魂来维持自身，你的导师被吸进去了。你和他不同吗？不要试图英雄主义。你只需要问艾琳娜一个问题。但那个问题，必须由一个真心想知道答案的人来问。' },
    { keys:['井底','镜子','灵魂之井'], resp:'井底？是的，井底有一面镜子——灵魂之镜。它映照的不是你的面容，而是你的灵魂最真实的模样。穿过黑暗之后，你会看到镜子。如果你看到的是光明，说明你的灵魂足够纯净，可以接近艾琳娜。如果你看到的是黑暗……那你就会像你的导师一样，被井吞噬。', knowledge:{title:'灵魂之井的内部结构',cat:'灵魂学说',content:'灵魂之井内部结构分三层：上层为灵魂碎片区，中层为绝对黑暗区，底层为灵魂之镜。灵魂之镜映照灵魂的真实本质——光明代表灵魂纯净，可以安全接近锚点灵魂。'} },

function matchTopic(input, npc) {
  if (!npc.topics) return null;
  let bestMatch = null;
  let bestScore = 0;

  npc.topics.forEach(function(topic) {
    let score = 0;
    topic.keys.forEach(function(key) {
      if (input.includes(key)) score += key.length; // 长关键词权重高
    });
    if (score > bestScore) { bestScore = score; bestMatch = topic; }
  });

  return bestMatch;
}
