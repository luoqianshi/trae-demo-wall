<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoCompete 赛事报名管理系统</title>
  <link rel="stylesheet" href="./libs/element-plus.min.css">
  <style>
    :root {
      --primary: #0891B2;
      --primary-light: #06B6D4;
      --primary-dark: #0E7490;
      --secondary: #22D3EE;
      --cta: #22C55E;
      --cta-dark: #16A34A;
      --bg: #ECFEFF;
      --bg-card: #FFFFFF;
      --text: #164E63;
      --text-light: #64748B;
      --border: #CFFAFE;
      --shadow: 0 4px 24px rgba(8, 145, 178, 0.08);
      --shadow-hover: 0 8px 32px rgba(8, 145, 178, 0.16);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app { height: 100%; }
    body {
      font-family: 'Source Sans 3', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: var(--primary); }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(8,145,178,0.25); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ===== Element Plus 主题覆盖 ===== */
    .el-button--primary {
      --el-button-bg-color: var(--primary);
      --el-button-border-color: var(--primary);
      --el-button-hover-bg-color: var(--primary-light);
      --el-button-hover-border-color: var(--primary-light);
      --el-button-active-bg-color: var(--primary-dark);
      --el-button-active-border-color: var(--primary-dark);
    }
    .el-button--success {
      --el-button-bg-color: var(--cta);
      --el-button-border-color: var(--cta);
      --el-button-hover-bg-color: var(--cta-dark);
      --el-button-hover-border-color: var(--cta-dark);
    }
    .el-menu { border-right: none !important; }
    .el-card { border-radius: var(--radius); border: none; box-shadow: var(--shadow); }
    .el-tag { border-radius: 6px; }
    .el-tabs__item.is-active { color: var(--primary); }
    .el-tabs__active-bar { background-color: var(--primary); }
    .el-input__wrapper.is-focus, .el-textarea__inner:focus { box-shadow: 0 0 0 1px var(--primary) inset !important; }
    .el-switch.is-checked .el-switch__core { border-color: var(--primary); background-color: var(--primary); }
    .el-checkbox__input.is-checked .el-checkbox__inner { background-color: var(--primary); border-color: var(--primary); }
    .el-checkbox__input.is-checked + .el-checkbox__label { color: var(--primary); }
    .el-radio__input.is-checked .el-radio__inner { background-color: var(--primary); border-color: var(--primary); }
    .el-radio__input.is-checked + .el-radio__label { color: var(--primary); }
    .el-pagination.is-background .el-pager li.is-active { background-color: var(--primary); }
    .el-loading-spinner .circular { stroke: var(--primary); }

    /* ===== 通用 ===== */
    .page-container { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .page-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .page-title::before { content: ''; width: 5px; height: 24px; background: linear-gradient(var(--primary), var(--secondary)); border-radius: 3px; }
    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
    .mb-16 { margin-bottom: 16px; } .mb-24 { margin-bottom: 24px; }
    .text-center { text-align: center; }
    .empty-tip { padding: 60px 20px; text-align: center; color: var(--text-light); }

    /* ===== Auth 布局 ===== */
    .auth-wrapper { display: flex; min-height: 100vh; }
    .auth-brand {
      flex: 1; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: #fff; padding: 60px; position: relative; overflow: hidden;
    }
    .auth-brand::before, .auth-brand::after {
      content: ''; position: absolute; border-radius: 50%; background: rgba(255,255,255,0.06);
    }
    .auth-brand::before { width: 500px; height: 500px; top: -150px; right: -150px; }
    .auth-brand::after { width: 360px; height: 360px; bottom: -120px; left: -120px; }
    .auth-brand-inner { position: relative; z-index: 1; text-align: center; max-width: 420px; }
    .auth-logo { font-size: 48px; font-weight: 800; letter-spacing: -1px; margin-bottom: 16px; }
    .auth-slogan { font-size: 18px; opacity: 0.9; margin-bottom: 40px; line-height: 1.6; }
    .auth-features { display: flex; flex-direction: column; gap: 14px; text-align: left; }
    .auth-feature { display: flex; align-items: center; gap: 12px; font-size: 15px; opacity: 0.92; }
    .auth-feature-dot { width: 8px; height: 8px; background: var(--secondary); border-radius: 50%; flex-shrink: 0; }
    .auth-form-side { width: 480px; display: flex; align-items: center; justify-content: center; padding: 40px; background: #fff; }
    .auth-form-box { width: 100%; max-width: 360px; }
    .auth-form-title { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .auth-form-sub { color: var(--text-light); margin-bottom: 32px; font-size: 14px; }
    .demo-accounts { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-top: 20px; font-size: 13px; }
    .demo-accounts strong { color: var(--primary); }
    .demo-account-row { display: flex; justify-content: space-between; padding: 3px 0; color: var(--text-light); }

    /* ===== Contest 布局 ===== */
    .contest-layout { display: flex; min-height: 100vh; }
    .contest-sidebar {
      width: 240px; background: #fff; box-shadow: 2px 0 12px rgba(0,0,0,0.04);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    }
    .sidebar-logo { padding: 22px 20px; font-size: 22px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; }
    .sidebar-logo .logo-dot { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
    .contest-menu { flex: 1; padding: 8px 12px; overflow-y: auto; }
    .contest-menu .el-menu-item { border-radius: 10px; margin-bottom: 4px; height: 46px; line-height: 46px; }
    .contest-menu .el-menu-item.is-active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; }
    .contest-menu .el-menu-item.is-active .el-icon { color: #fff; }
    .sidebar-footer { padding: 16px; border-top: 1px solid #f0f0f0; }
    .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 10px; cursor: pointer; transition: background .2s; }
    .sidebar-user:hover { background: var(--bg); }
    .sidebar-user .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
    .sidebar-user .info { overflow: hidden; }
    .sidebar-user .name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-user .role { font-size: 12px; color: var(--text-light); }
    .contest-main { flex: 1; margin-left: 240px; display: flex; flex-direction: column; min-width: 0; }
    .contest-topbar { height: 60px; background: #fff; box-shadow: 0 1px 8px rgba(0,0,0,0.04); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 90; }
    .breadcrumb-bar { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-light); }
    .breadcrumb-bar .cur { color: var(--text); font-weight: 600; }
    .contest-content { flex: 1; padding: 24px; }

    /* ===== Admin 布局 ===== */
    .admin-layout { display: flex; flex-direction: column; min-height: 100vh; }
    .admin-header { height: 60px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
    .admin-header-left { display: flex; align-items: center; gap: 16px; }
    .admin-header .logo { font-size: 20px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .admin-header .logo .logo-dot { width: 30px; height: 30px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; }
    .admin-header .badge { background: var(--bg); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .admin-body { display: flex; flex: 1; }
    .admin-sidebar { width: 220px; background: #fff; border-right: 1px solid #f0f0f0; padding: 12px; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
    .admin-sidebar .el-menu-item { border-radius: 10px; margin-bottom: 4px; height: 46px; line-height: 46px; }
    .admin-sidebar .el-menu-item.is-active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; }
    .admin-content { flex: 1; padding: 24px; min-width: 0; }

    /* ===== 赛事卡片 ===== */
    .notice-card { background: linear-gradient(135deg, #fff 0%, var(--bg) 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
    .notice-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; flex-shrink: 0; }
    .notice-text { flex: 1; }
    .notice-text .t { font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .notice-text .c { font-size: 14px; color: var(--text-light); line-height: 1.5; }

    .filter-bar { background: #fff; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; box-shadow: var(--shadow); }
    .contest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .contest-card { background: #fff; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: all .3s; border: 1px solid transparent; }
    .contest-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-4px); border-color: var(--secondary); }
    .contest-cover { height: 120px; display: flex; align-items: flex-end; padding: 16px; position: relative; }
    .contest-cover .cover-name { color: #fff; font-size: 18px; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.2); position: relative; z-index: 1; }
    .contest-cover .cover-type { position: absolute; top: 12px; right: 12px; }
    .contest-card-body { padding: 18px; }
    .contest-card-body .name { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 12px; line-height: 1.4; }
    .contest-card-meta { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: var(--text-light); }
    .contest-card-meta .row { display: flex; align-items: center; gap: 6px; }
    .contest-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid #f5f5f5; }

    /* ===== 详情页 Banner ===== */
    .detail-banner { height: 200px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: #fff; margin-bottom: 24px; position: relative; overflow: hidden; }
    .detail-banner::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.15), transparent 60%); }
    .detail-banner .banner-text { font-size: 32px; font-weight: 800; letter-spacing: 1px; z-index: 1; text-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    .detail-body { display: flex; gap: 24px; align-items: flex-start; }
    .detail-main { flex: 1; min-width: 0; }
    .detail-aside { width: 340px; flex-shrink: 0; }
    .info-card-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
    .info-card-item:last-child { border-bottom: none; }
    .info-card-item .label { color: var(--text-light); }
    .info-card-item .value { color: var(--text); font-weight: 500; }

    /* ===== Markdown 渲染 ===== */
    .md-content { line-height: 1.8; font-size: 15px; }
    .md-content h2 { font-size: 20px; margin: 20px 0 12px; color: var(--text); font-weight: 700; }
    .md-content h3 { font-size: 17px; margin: 18px 0 10px; color: var(--primary); font-weight: 600; }
    .md-content h4 { font-size: 15px; margin: 14px 0 8px; font-weight: 600; }
    .md-content p { margin: 8px 0; }
    .md-content ul, .md-content ol { padding-left: 24px; margin: 8px 0; }
    .md-content li { margin: 4px 0; }
    .md-content strong { color: var(--text); }

    /* ===== 报名页 ===== */
    .apply-bar { position: sticky; bottom: 0; background: #fff; padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; border-radius: 0 0 var(--radius) var(--radius); }

    /* ===== 响应式 ===== */
    @media (max-width: 992px) {
      .auth-brand { display: none; }
      .auth-form-side { width: 100%; }
      .detail-body { flex-direction: column; }
      .detail-aside { width: 100%; }
    }
    @media (max-width: 768px) {
      .contest-sidebar { transform: translateX(-100%); transition: transform .3s; }
      .contest-sidebar.open { transform: translateX(0); }
      .contest-main { margin-left: 0; }
      .contest-grid { grid-template-columns: 1fr; }
      .page-container, .contest-content, .admin-content { padding: 16px; }
      .mobile-menu-btn { display: flex !important; }
    }
    .mobile-menu-btn { display: none; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 10px; background: var(--bg); cursor: pointer; font-size: 18px; color: var(--primary); border: none; }

    .stat-card { background: #fff; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; }
    .stat-card .icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; }
    .stat-card .num { font-size: 28px; font-weight: 800; color: var(--text); }
    .stat-card .label { font-size: 13px; color: var(--text-light); }
  </style>
</head>
<body>
  <div id="app">
    <router-view></router-view>
  </div>
  <script src="./libs/vue.global.prod.min.js"></script>
  <script src="./libs/vue-router.global.prod.min.js"></script>
  <script src="./libs/element-plus.full.min.js"></script>
  <script src="./libs/element-plus-icons.iife.min.js"></script>
  <script src="./mock-data.js"></script>
  <script>
    const { createApp, reactive, ref, computed, onMounted, watch, nextTick, h } = Vue;
    const { createRouter, createWebHashHistory } = VueRouter;
    const EP = ElementPlus;
    const ElMessage = EP.ElMessage;
    const ElMessageBox = EP.ElMessageBox;
    const ElNotification = EP.ElNotification;

    /* ===== 全局 Store ===== */
    const store = reactive({
      currentUser: DB.get('current_user'),
      settings: MockAPI.getSettings().data,
      sidebarOpen: false,
      refreshUser() {
        this.currentUser = DB.get('current_user');
      },
      refreshSettings() {
        this.settings = MockAPI.getSettings().data;
      },
      get systemName() {
        return this.settings.system_name || 'GoCompete';
      }
    });

    /* ===== 工具函数 ===== */
    function renderMarkdown(text) {
      if (!text) return '<p class="text-center" style="color:#999">暂无内容</p>';
      let html = text;
      html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // 列表处理
      const lines = html.split('\n');
      let result = [];
      let inUl = false, inOl = false;
      lines.forEach(line => {
        if (/^<h[234]>/.test(line)) {
          if (inUl) { result.push('</ul>'); inUl = false; }
          if (inOl) { result.push('</ol>'); inOl = false; }
          result.push(line);
        } else if (/^\d+\.\s(.+)/.test(line)) {
          if (inUl) { result.push('</ul>'); inUl = false; }
          if (!inOl) { result.push('<ol>'); inOl = true; }
          result.push('<li>' + line.replace(/^\d+\.\s/, '') + '</li>');
        } else if (/^-\s(.+)/.test(line)) {
          if (inOl) { result.push('</ol>'); inOl = false; }
          if (!inUl) { result.push('<ul>'); inUl = true; }
          result.push('<li>' + line.replace(/^-\s/, '') + '</li>');
        } else if (line.trim() === '') {
          if (inUl) { result.push('</ul>'); inUl = false; }
          if (inOl) { result.push('</ol>'); inOl = false; }
          result.push('');
        } else {
          if (inUl) { result.push('</ul>'); inUl = false; }
          if (inOl) { result.push('</ol>'); inOl = false; }
          result.push('<p>' + line + '</p>');
        }
      });
      if (inUl) result.push('</ul>');
      if (inOl) result.push('</ol>');
      return result.join('\n');
    }

    function gradientColor(color) {
      // 生成基于主色的渐变
      return 'linear-gradient(135deg, ' + color + ' 0%, ' + shadeColor(color, -20) + ' 100%)';
    }
    function shadeColor(color, percent) {
      let R = parseInt(color.substring(1,3),16);
      let G = parseInt(color.substring(3,5),16);
      let B = parseInt(color.substring(5,7),16);
      R = Math.max(0, Math.min(255, R + Math.round(R * percent / 100)));
      G = Math.max(0, Math.min(255, G + Math.round(G * percent / 100)));
      B = Math.max(0, Math.min(255, B + Math.round(B * percent / 100)));
      return '#' + R.toString(16).padStart(2,'0') + G.toString(16).padStart(2,'0') + B.toString(16).padStart(2,'0');
    }

    function getApplicantCount(contestId) {
      return MockAPI.getApplicantCount(contestId).data.count;
    }

    /* ============================== */
    /* ===== Auth Layout ========== */
    /* ============================== */
    const AuthLayout = {
      template: `
        <div class="auth-wrapper">
          <div class="auth-brand">
            <div class="auth-brand-inner">
              <div class="auth-logo">{{ store.systemName }}</div>
              <div class="auth-slogan">企业级赛事报名管理平台<br>让每一场竞赛都井然有序</div>
              <div class="auth-features">
                <div class="auth-feature"><span class="auth-feature-dot"></span>一站式赛事发布与报名管理</div>
                <div class="auth-feature"><span class="auth-feature-dot"></span>多角色协作审核与评分体系</div>
                <div class="auth-feature"><span class="auth-feature-dot"></span>实时数据统计与结果公布</div>
                <div class="auth-feature"><span class="auth-feature-dot"></span>支持个人赛与团体赛灵活配置</div>
              </div>
            </div>
          </div>
          <div class="auth-form-side">
            <div class="auth-form-box">
              <router-view></router-view>
            </div>
          </div>
        </div>
      `,
      setup() {
        return { store };
      }
    };

    /* ============================== */
    /* ===== Contest Layout ======= */
    /* ============================== */
    const ContestLayout = {
      template: `
        <div class="contest-layout">
          <div class="contest-sidebar" :class="{ open: store.sidebarOpen }">
            <div class="sidebar-logo">
              <span class="logo-dot">G</span>
              <span>{{ store.systemName }}</span>
            </div>
            <el-menu :default-active="activeMenu" router class="contest-menu" @select="store.sidebarOpen=false">
              <el-menu-item index="/contest">
                <el-icon><HomeFilled /></el-icon>
                <span>赛事大厅</span>
              </el-menu-item>
              <el-menu-item index="/user/dashboard" v-if="store.currentUser">
                <el-icon><Document /></el-icon>
                <span>我的报名</span>
              </el-menu-item>
              <el-menu-item index="/user/profile" v-if="store.currentUser">
                <el-icon><User /></el-icon>
                <span>个人中心</span>
              </el-menu-item>
              <el-menu-item index="/admin/contest" v-if="store.currentUser && store.currentUser.role === 'admin'">
                <el-icon><Setting /></el-icon>
                <span>管理后台</span>
              </el-menu-item>
              <el-menu-item index="/admin/audit" v-if="store.currentUser && (store.currentUser.role === 'committee')">
                <el-icon><Checked /></el-icon>
                <span>审核/评分</span>
              </el-menu-item>
            </el-menu>
            <div class="sidebar-footer" v-if="store.currentUser">
              <div class="sidebar-user" @click="$router.push('/user/profile')">
                <div class="avatar">{{ store.currentUser.real_name.charAt(0) }}</div>
                <div class="info">
                  <div class="name">{{ store.currentUser.real_name }}</div>
                  <div class="role">{{ roleText(store.currentUser.role) }}</div>
                </div>
              </div>
            </div>
            <div class="sidebar-footer" v-else>
              <el-button type="primary" style="width:100%" @click="$router.push('/auth/login')">登录 / 注册</el-button>
            </div>
          </div>
          <div class="contest-main">
            <div class="contest-topbar">
              <div class="flex gap-12" style="align-items:center">
                <button class="mobile-menu-btn" @click="store.sidebarOpen = !store.sidebarOpen">≡</button>
                <div class="breadcrumb-bar">
                  <span>首页</span>
                  <span>/</span>
                  <span class="cur">{{ pageTitle }}</span>
                </div>
              </div>
              <div v-if="store.currentUser">
                <el-button text @click="handleLogout">退出登录</el-button>

          <el-card class="mb-24" v-if="contest.type === 'team'">

                <el-button type="primary" size="small" @click="addMember" :disabled="form.team_members.length >= maxMembers">添加成员（{{ form.team_members.length }}/{{ maxMembers }}）</el-button>
              </div>
            </template>
            <el-form-item label="团队名称" label-width="120px" style="margin-bottom:16px">
              <el-input v-model="form.team_name" placeholder="请输入团队名称" style="max-width:400px" />
            </el-form-item>
            <el-table :data="form.team_members" border>
              <el-table-column type="index" label="序号" width="70" />
              <el-table-column label="姓名" min-width="120">
                <template #default="{ row }"><el-input v-model="row.name" placeholder="姓名" /></template>
              </el-table-column>
              <el-table-column label="部门" min-width="140">
                <template #default="{ row }"><el-input v-model="row.dept" placeholder="部门" /></template>
              </el-table-column>
              <el-table-column label="职务" min-width="120">
                <template #default="{ row }"><el-input v-model="row.role" placeholder="职务" /></template>
              </el-table-column>
              <el-table-column label="联系方式" min-width="150">
                <template #default="{ row }"><el-input v-model="row.phone" placeholder="联系方式" /></template>
              </el-table-column>
              <el-table-column label="操作" width="80" align="center">
                <template #default="{ $index }">
                  <el-button type="danger" text size="small" @click="removeMember($index)">删除</el-button>
                </template>

            </el-table>
          </el-card>

          <el-card class="mb-24">
            <template #header><div style="font-weight:700">申报材料</div></template>
            <el-form label-width="120px">
              <el-form-item label="作品简介">
                <el-input v-model="form.description" type="textarea" :rows="4" placeholder="请输入作品简介" />
              </el-form-item>
              <el-form-item label="附件上传">
                <el-upload
                  :http-request="handleUpload"
                  :on-remove="handleRemove"
                  :file-list="fileList"
                  multiple
                  drag
                >
                  <el-icon style="font-size:32px;color:var(--primary)"><UploadFilled /></el-icon>
                  <div style="font-size:14px;color:var(--text-light);margin-top:8px">将文件拖到此处，或点击上传</div>
                  <template #tip>
                    <div style="font-size:12px;color:#999">支持上传多个文件，单文件不超过 {{ store.settings.file_size_limit }}MB</div>
                  </template>
                </el-upload>
              </el-form-item>
            </el-form>
          </el-card>

          <div class="apply-bar">
            <el-button @click="$router.back()">取消</el-button>
            <el-button @click="handleSubmit('draft')">保存草稿</el-button>
            <el-button type="primary" @click="handleSubmit('pending')">提交报名</el-button>
          </div>
        </div>
      `,
      setup() {
        const route = VueRouter.useRoute();
        const loading = ref(false);
        const contest = ref(null);
        const fileList = ref([]);
        const isEdit = ref(false);
        const existingApp = ref(null);

        const basicInfo = reactive({ name: '', dept: '', phone: '', email: '' });
        const form = reactive({
          team_name: '',
          team_members: [],
          description: '',
          files: [],
        });

        const maxMembers = computed(() => {
          if (!contest.value) return 5;
          return contest.value.team_size || 5;
        });

        const loadContest = () => {
          const res = MockAPI.getContest(route.params.id);
          if (res.data) {
            contest.value = res.data;
            loadBasicInfo();
            checkExisting();
          }
        };

        const loadBasicInfo = () => {
          if (store.currentUser) {
            basicInfo.name = store.currentUser.real_name;
            basicInfo.dept = store.currentUser.department;
            basicInfo.phone = store.currentUser.phone;
            basicInfo.email = store.currentUser.email;
          }
        };

        const checkExisting = () => {
          const appId = route.query.app_id;
          if (appId) {
            const res = MockAPI.getApplication(appId);
            if (res.data) {
              existingApp.value = res.data;
              isEdit.value = true;
              form.team_name = res.data.team_name || '';
              form.team_members = res.data.team_members || [];
              form.description = res.data.description || '';
              form.files = res.data.files || [];
              fileList.value = form.files.map(f => ({ name: f.name, url: '', status: 'success' }));
            }
          } else {
            // 检查是否已有报名
            const userApps = MockAPI.getApplications({ contest_id: route.params.id }).data
              .filter(a => a.user_id === store.currentUser.id);
            const editable = userApps.find(a => a.status !== 'approved');
            if (editable) {
              existingApp.value = editable;
              isEdit.value = true;
              form.team_name = editable.team_name || '';
              form.team_members = editable.team_members || [];
              form.description = editable.description || '';
              form.files = editable.files || [];
              fileList.value = form.files.map(f => ({ name: f.name, url: '', status: 'success' }));
            }
          }
        };

        const addMember = () => {
          form.team_members.push({ name: '', dept: '', role: '队员', phone: '' });
        };
        const removeMember = (idx) => { form.team_members.splice(idx, 1); };

        const handleUpload = (options) => {
          const { file, onProgress, onSuccess } = options;
          MockAPI.uploadFile(file, (p) => onProgress({ percent: p })).then(res => {
            form.files.push(res);
            onSuccess(res);
          });
        };
        const handleRemove = (file) => {
          const idx = form.files.findIndex(f => f.name === file.name);
          if (idx > -1) form.files.splice(idx, 1);
        };

        const handleSubmit = (status) => {
          if (status === 'pending') {
            if (!form.description || !form.description.trim()) {
              ElMessage.warning('请填写作品简介');
              return;
            }
            if (contest.value.type === 'team') {
              if (!form.team_name || !form.team_name.trim()) {
                ElMessage.warning('请填写团队名称');
                return;
              }
              if (form.team_members.length === 0) {
                ElMessage.warning('请至少添加一名团队成员');
                return;
              }
              for (const m of form.team_members) {
                if (!m.name || !m.dept || !m.phone) {
                  ElMessage.warning('请完善团队成员信息');
                  return;
                }
              }
            }
          }

          const data = {
            contest_id: parseInt(route.params.id),
            team_name: contest.value.type === 'team' ? form.team_name : null,
            team_members: contest.value.type === 'team' ? form.team_members : [],
            description: form.description,
            files: form.files,
            status,
          };

          if (existingApp.value) {
            const res = MockAPI.updateApplication(existingApp.value.id, data);
            if (res.error) { ElMessage.error(res.error); return; }
          } else {
            const res = MockAPI.createApplication(data);
            if (res.error) { ElMessage.error(res.error); return; }
            existingApp.value = res.data;
          }

          ElMessage.success(status === 'draft' ? '草稿已保存' : '报名已提交，等待审核');
          location.hash = '#/user/dashboard';
        };

        onMounted(() => { loadContest(); });

        return { store, contest, loading, form, basicInfo, fileList, isEdit, maxMembers, addMember, removeMember, handleUpload, handleRemove, handleSubmit };
      }
    };

    /* ============================== */
    /* ===== My Applications ====== */
    /* ============================== */
    const MyApplications = {
      template: `
        <div class="page-container">
          <div class="page-title">我的报名</div>

              <el-table-column label="赛事信息" min-width="200">
                <template #default="{ row }">

                    <template #reference><el-button text type="danger" size="small">删除</el-button></template>

              <div class="info-card-item"><span class="label">部门</span><span class="value">{{ currentApp.user_dept }}</span></div>
              <div class="info-card-item" v-if="currentApp.team_name"><span class="label">团队名称</span><span class="value">{{ currentApp.team_name }}</span></div>

              <div style="margin-top:12px"><strong>作品简介：</strong><p style="margin-top:6px;color:var(--text-light)">{{ currentApp.description }}</p></div>
              <div v-if="currentApp.files && currentApp.files.length" style="margin-top:12px">
                <strong>附件：</strong>
                <div v-for="f in currentApp.files" :key="f.name" style="font-size:13px;color:var(--primary);margin-top:4px">{{ f.name }} ({{ Utils.formatSize(f.size) }})</div>
              </div>
              <div v-if="currentApp.team_members && currentApp.team_members.length" style="margin-top:12px">
                <strong>团队成员：</strong>
                <el-table :data="currentApp.team_members" border size="small" style="margin-top:8px">
                  <el-table-column prop="name" label="姓名" />
                  <el-table-column prop="dept" label="部门" />
                  <el-table-column prop="role" label="职务" />
                  <el-table-column prop="phone" label="联系方式" />
                </el-table>
              </div>
            </div>
          </el-dialog>

          <el-dialog v-model="workVisible" title="提交作品" width="560px">
            <el-form :model="workForm" label-width="100px">
              <el-form-item label="作品名称" required>
                <el-input v-model="workForm.work_name" placeholder="请输入作品名称" />
              </el-form-item>
              <el-form-item label="提交方式" required>
                <el-radio-group v-model="workForm.work_submit_method">
                  <el-radio value="online">线上提交</el-radio>
                  <el-radio value="offline">线下提交</el-radio>
                </el-radio-group>
              </el-form-item>
              <el-form-item label="作品简介">
                <el-input v-model="workForm.work_desc" type="textarea" :rows="3" placeholder="请输入作品简介" />
              </el-form-item>
              <el-form-item label="备注">
                <el-input v-model="workForm.work_note" type="textarea" :rows="2" placeholder="补充说明" />
              </el-form-item>
              <el-form-item label="附件上传">
                <el-upload :http-request="handleWorkUpload" :on-remove="handleWorkRemove" :file-list="workFileList" multiple>
                  <el-button size="small">点击上传</el-button>
                </el-upload>
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="workVisible = false">取消</el-button>
              <el-button type="primary" @click="submitWork">确认提交</el-button>
            </template>
          </el-dialog>
        </div>
      `,
      setup() {
        const loading = ref(false);
        const apps = ref([]);
        const contestsMap = ref({});
        const detailVisible = ref(false);
        const currentApp = ref(null);
        const workVisible = ref(false);
        const workFileList = ref([]);
        const workForm = reactive({ work_name: '', work_submit_method: 'online', work_desc: '', work_note: '', work_files: [] });
        let currentWorkApp = null;

        const loadApps = () => {
          loading.value = true;
          const res = MockAPI.getMyApplications();
          apps.value = res.data;
          const contests = MockAPI.getContests().data;
          contestsMap.value = {};
          contests.forEach(c => contestsMap.value[c.id] = c);
          loading.value = false;
        };

        const getContestName = (id) => contestsMap.value[id]?.name || '未知赛事';
        const getContestType = (id) => contestsMap.value[id]?.type || '';
        const getStatusInfo = (app) => Utils.getStatusText(app.status, contestsMap.value[app.contest_id]);
        const canSubmitWork = (app) => {
          if (app.status !== 'approved') return false;
          const contest = contestsMap.value[app.contest_id];
          if (!contest) return false;
          const st = Utils.getContestStatus(contest);
          return st.value === 'contesting';
        };

        const viewDetail = (row) => { currentApp.value = row; detailVisible.value = true; };
        const editApp = (row) => { location.hash = '#/contest/' + row.contest_id + '/apply?app_id=' + row.id; };
        const deleteApp = (row) => {
          MockAPI.deleteApplication(row.id);
          ElMessage.success('已删除');
          loadApps();
        };

        const openWorkDialog = (row) => {
          currentWorkApp = row;
          workForm.work_name = row.work_name || '';
          workForm.work_submit_method = row.work_submit_method || 'online';
          workForm.work_desc = row.work_desc || '';
          workForm.work_note = row.work_note || '';
          workForm.work_files = row.work_files || [];
          workFileList.value = workForm.work_files.map(f => ({ name: f.name, url: '', status: 'success' }));
          workVisible.value = true;
        };

        const handleWorkUpload = (options) => {
          const { file, onProgress, onSuccess } = options;
          MockAPI.uploadFile(file, (p) => onProgress({ percent: p })).then(res => {
            workForm.work_files.push(res);
            onSuccess(res);
          });
        };
        const handleWorkRemove = (file) => {
          const idx = workForm.work_files.findIndex(f => f.name === file.name);
          if (idx > -1) workForm.work_files.splice(idx, 1);
        };

        const submitWork = () => {
          if (!workForm.work_name) { ElMessage.warning('请填写作品名称'); return; }
          MockAPI.submitWork(currentWorkApp.id, { ...workForm });
          ElMessage.success('作品已提交');
          workVisible.value = false;
          loadApps();
        };

        onMounted(() => { loadApps(); });

        return { store, apps, loading, detailVisible, currentApp, workVisible, workForm, workFileList, getContestName, getContestType, getStatusInfo, canSubmitWork, viewDetail, editApp, deleteApp, openWorkDialog, handleWorkUpload, handleWorkRemove, submitWork, Utils };
      }
    };

              </el-card>
            </el-col>
          </el-row>
        </div>
      `,
      setup() {
        const infoRef = ref(null);

        const pwdForm = reactive({ password: '', confirm: '' });

        const infoRules = {
          username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
          department: [{ required: true, message: '请输入部门', trigger: 'blur' }],
          phone: [{ required: true, message: '请输入手机号', trigger: 'blur' }, { pattern: /^1[3-9]\d{9}$/, message: '手机号格式不正确', trigger: 'blur' }],
          email: [{ type: 'email', message: '邮箱格式不正确', trigger: 'blur' }],
        };
        const pwdRules = {
          password: [{ required: true, message: '请输入新密码', trigger: 'blur' }, { min: 6, message: '密码至少6位', trigger: 'blur' }],
          confirm: [{ required: true, message: '请确认密码', trigger: 'blur' }, { validator: (r,v,cb) => v === pwdForm.password ? cb() : cb(new Error('两次密码不一致')), trigger: 'blur' }],

        const loadInfo = () => {

          if (u) {
            infoForm.username = u.username;
            infoForm.real_name = u.real_name;
            infoForm.department = u.department;

            infoForm.email = u.email;

            pwdForm.password = ''; pwdForm.confirm = '';

          });

        onMounted(() => { loadInfo(); });

        return { store, infoRef, pwdRef, infoForm, pwdForm, infoRules, pwdRules, saveInfo, savePassword, Utils };
      }
    };

    const AdminContest = {
      template: `

              form.rules = c.rules || '';

              team_size: form.type === 'team' ? form.team_size : null,
              location: form.location,

            </div>
            <template #footer>
              <el-button @click="scoreVisible = false">取消</el-button>
              <el-button type="primary" @click="confirmScore">确认评分</el-button>
            </template>
          </el-dialog>

          <el-dialog v-model="workVisible" title="作品详情" width="600px">
            <div v-if="currentApp">
              <div class="info-card-item"><span class="label">参赛者</span><span class="value">{{ currentApp.user_name }}</span></div>
              <div class="info-card-item"><span class="label">作品名称</span><span class="value">{{ currentApp.work_name || '未命名' }}</span></div>
              <div class="info-card-item"><span class="label">提交方式</span><span class="value">{{ currentApp.work_submit_method === 'online' ? '线上提交' : '线下提交' }}</span></div>
              <div class="info-card-item" v-if="currentApp.score !== null"><span class="label">当前得分</span><span class="value" style="color:var(--cta);font-weight:700">{{ currentApp.score }} 分</span></div>
              <div style="margin-top:12px"><strong>作品简介：</strong><p style="margin-top:6px;color:var(--text-light)">{{ currentApp.work_desc || '无' }}</p></div>
              <div v-if="currentApp.work_note" style="margin-top:8px"><strong>备注：</strong><span style="color:var(--text-light)">{{ currentApp.work_note }}</span></div>
              <div v-if="currentApp.work_files && currentApp.work_files.length" style="margin-top:12px">
                <strong>作品附件：</strong>
                <div v-for="f in currentApp.work_files" :key="f.name" style="font-size:13px;color:var(--primary);margin-top:4px">{{ f.name }} ({{ Utils.formatSize(f.size) }})</div>
              </div>
              <div style="margin-top:12px"><strong>报名简介：</strong><p style="margin-top:6px;color:var(--text-light)">{{ currentApp.description }}</p></div>
            </div>
          </el-dialog>

          <el-dialog v-model="publishVisible" title="公布比赛成绩" width="520px">
            <el-form label-position="top">
              <el-form-item label="公布内容（勾选将在赛事详情页展示的字段）">
                <el-checkbox-group v-model="publishForm.settings">
                  <el-checkbox value="submitter">提交人</el-checkbox>
                  <el-checkbox value="team_name" v-if="selectedContest && selectedContest.type === 'team'">团队名称</el-checkbox>
                  <el-checkbox value="score">得分</el-checkbox>
                  <el-checkbox value="rank">排名</el-checkbox>
                  <el-checkbox value="work_name">作品名称</el-checkbox>
                  <el-checkbox value="work_desc">作品简介</el-checkbox>
                </el-checkbox-group>
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="publishVisible = false">取消</el-button>
              <el-button type="primary" @click="confirmPublish">确认公布</el-button>
            </template>
          </el-dialog>
        </div>
      `,
      setup() {
        const selectedContest = ref(null);
        const contests = ref([]);
        const apps = ref([]);
        const activeTab = ref('all');
        const scoreVisible = ref(false);
        const scoreValue = ref(80);
        const workVisible = ref(false);
        const currentApp = ref(null);
        const publishVisible = ref(false);
        const publishForm = reactive({ settings: ['submitter', 'score', 'rank', 'work_name'] });

        const loadContests = () => {
          let list = MockAPI.getContests().data;
          if (store.currentUser.role === 'committee') {
            list = list.filter(c => c.committee_ids && c.committee_ids.includes(store.currentUser.id));
          }
          contests.value = list;
        };

        const getApprovedCount = (contestId) => {
          return MockAPI.getApplications({ contest_id: contestId, status: 'approved' }).data.length;
        };

        const selectContest = (c) => {
          selectedContest.value = c;
          activeTab.value = 'all';
          loadApps();
        };

        const loadApps = () => {
          let list = MockAPI.getApplications({ contest_id: selectedContest.value.id, status: 'approved' }).data;
          if (activeTab.value === 'unscored') list = list.filter(a => a.score === null);
          else if (activeTab.value === 'scored') list = list.filter(a => a.score !== null);
          apps.value = list;
        };

        const sortedApps = computed(() => {
          return [...apps.value].sort((a, b) => (b.score || 0) - (a.score || 0));
        });

        const hasScored = computed(() => apps.value.some(a => a.score !== null));

        const openScore = (row) => {
          currentApp.value = row;
          scoreValue.value = row.score !== null ? row.score : 80;
          scoreVisible.value = true;
        };

        const confirmScore = () => {
          MockAPI.updateApplicationStatus(currentApp.value.id, { score: scoreValue.value });
          ElMessage.success('评分已保存');
          scoreVisible.value = false;
          loadApps();
        };

        const viewWork = (row) => {
          currentApp.value = row;
          workVisible.value = true;
        };

        const publishResults = () => {
          publishVisible.value = true;
        };

        const confirmPublish = () => {
          if (publishForm.settings.length === 0) {
            ElMessage.warning('请至少选择一项公布内容');
            return;
          }
          MockAPI.publishResults(selectedContest.value.id, publishForm.settings);
          ElMessage.success('成绩已公布，可在赛事详情页查看');
          publishVisible.value = false;
        };

        onMounted(() => { loadContests(); });

        return { store, selectedContest, contests, apps, sortedApps, activeTab, scoreVisible, scoreValue, workVisible, currentApp, publishVisible, publishForm, hasScored, loadContests, getApprovedCount, selectContest, loadApps, openScore, confirmScore, viewWork, publishResults, confirmPublish, Utils, gradientColor };
      }
    };

    /* ============================== */
    /* ===== Admin Users ========== */
    /* ============================== */
    const AdminUsers = {
      template: `
        <div class="page-container">
          <div class="flex-between mb-24">
            <div class="page-title" style="margin-bottom:0">用户管理</div>
            <el-button type="primary" @click="openDialog()">新增用户</el-button>
          </div>
          <el-card>
            <div style="margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
              <el-input v-model="search" placeholder="搜索用户名或姓名" style="width:240px" clearable @input="loadUsers" prefix-icon="Search" />
              <el-select v-model="roleFilter" placeholder="角色筛选" style="width:140px" clearable @change="loadUsers">
                <el-option label="参赛者" value="user" />
                <el-option label="组委会" value="committee" />
                <el-option label="管理员" value="admin" />
              </el-select>
            </div>
            <el-table :data="users" stripe>
              <el-table-column prop="id" label="ID" width="60" />
              <el-table-column prop="username" label="用户名" width="120" />
              <el-table-column prop="real_name" label="姓名" width="100" />
              <el-table-column prop="department" label="部门" width="120" />
              <el-table-column prop="email" label="邮箱" min-width="180" />
              <el-table-column prop="phone" label="手机号" width="130" />
              <el-table-column label="角色" width="100" align="center">
                <template #default="{ row }">
                  <el-tag :type="Utils.roleType(row.role)" size="small">{{ Utils.roleText(row.role) }}</el-tag>
                </template>
              </el-table-column>
              <el-table-column label="状态" width="100" align="center">
                <template #default="{ row }">
                  <el-switch :model-value="row.is_active === 1" @change="(v) => toggleStatus(row, v)" />
                </template>
              </el-table-column>
              <el-table-column label="操作" width="140" align="center">
                <template #default="{ row }">
                  <el-button text type="primary" size="small" @click="openDialog(row)">编辑</el-button>
                  <el-popconfirm v-if="row.role !== 'admin'" title="确定删除该用户？" @confirm="deleteUser(row)">
                    <template #reference><el-button text type="danger" size="small">删除</el-button></template>
                  </el-popconfirm>
                </template>
              </el-table-column>
            </el-table>
          </el-card>

          <el-dialog v-model="dialogVisible" :title="editingUser ? '编辑用户' : '新增用户'" width="520px">
            <el-form ref="formRef" :model="form" :rules="rules" label-width="90px">
              <el-form-item label="用户名" prop="username">
                <el-input v-model="form.username" :disabled="!!editingUser" />
              </el-form-item>
              <el-form-item label="姓名" prop="real_name">
                <el-input v-model="form.real_name" />
              </el-form-item>
              <el-form-item label="部门" prop="department">
                <el-input v-model="form.department" />
              </el-form-item>
              <el-form-item label="手机号" prop="phone">
                <el-input v-model="form.phone" />
              </el-form-item>
              <el-form-item label="邮箱" prop="email">
                <el-input v-model="form.email" />
              </el-form-item>
              <el-form-item label="角色" prop="role">
                <el-select v-model="form.role" style="width:100%">
                  <el-option label="参赛者" value="user" />
                  <el-option label="组委会" value="committee" />
                  <el-option label="管理员" value="admin" />
                </el-select>
              </el-form-item>
              <el-form-item label="密码" :prop="editingUser ? '' : 'password'" v-if="!editingUser">
                <el-input v-model="form.password" type="password" show-password placeholder="初始密码" />
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="dialogVisible = false">取消</el-button>
              <el-button type="primary" @click="handleSave">保存</el-button>
            </template>
          </el-dialog>
        </div>
      `,
      setup() {
        const users = ref([]);
        const search = ref('');
        const roleFilter = ref('');
        const dialogVisible = ref(false);
        const editingUser = ref(null);
        const formRef = ref(null);
        const form = reactive({ username: '', real_name: '', department: '', phone: '', email: '', role: 'user', password: '' });
        const rules = {
          username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
          real_name: [{ required: true, message: '请输入姓名', trigger: 'blur' }],
          department: [{ required: true, message: '请输入部门', trigger: 'blur' }],
          phone: [{ required: true, message: '请输入手机号', trigger: 'blur' }, { pattern: /^1[3-9]\d{9}$/, message: '手机号格式不正确', trigger: 'blur' }],
          email: [{ type: 'email', message: '邮箱格式不正确', trigger: 'blur' }],
          role: [{ required: true, message: '请选择角色', trigger: 'change' }],
          password: [{ required: true, message: '请输入密码', trigger: 'blur' }],
        };

        const loadUsers = () => {
          const params = {};
          if (search.value) params.search = search.value;
          if (roleFilter.value) params.role = roleFilter.value;
          users.value = MockAPI.getUsers(params).data;
        };

        const openDialog = (row) => {
          editingUser.value = row;
          if (row) {
            form.username = row.username;
            form.real_name = row.real_name;
            form.department = row.department;
            form.phone = row.phone;
            form.email = row.email;
            form.role = row.role;
          } else {
            Object.assign(form, { username: '', real_name: '', department: '', phone: '', email: '', role: 'user', password: '' });
          }
          dialogVisible.value = true;
        };

        const handleSave = () => {
          formRef.value.validate((valid) => {
            if (!valid) return;
            if (editingUser.value) {
              const res = MockAPI.updateUser(editingUser.value.id, {
                real_name: form.real_name, department: form.department, phone: form.phone, email: form.email, role: form.role,
              });
              if (res.error) { ElMessage.error(res.error); return; }
              ElMessage.success('已更新');
            } else {
              const res = MockAPI.createUser({ ...form });
              if (res.error) { ElMessage.error(res.error); return; }
              ElMessage.success('已创建');
            }
            dialogVisible.value = false;
            loadUsers();
          });
        };

        const toggleStatus = (row, v) => {
          MockAPI.updateUser(row.id, { is_active: v ? 1 : 0 });
          ElMessage.success(v ? '已启用' : '已禁用');
          loadUsers();
        };

        const deleteUser = (row) => {
          const res = MockAPI.deleteUser(row.id);
          if (res.error) { ElMessage.error(res.error); return; }
          ElMessage.success('已删除');
          loadUsers();
        };

        onMounted(() => { loadUsers(); });

        return { users, search, roleFilter, dialogVisible, editingUser, form, rules, formRef, loadUsers, openDialog, handleSave, toggleStatus, deleteUser, Utils };
      }
    };

    /* ============================== */
    /* ===== Admin Settings ======= */
    /* ============================== */
    const AdminSettings = {
      template: `
        <div class="page-container">
          <div class="page-title">系统设置</div>
          <el-card style="max-width:760px">
            <el-form ref="formRef" :model="form" :rules="rules" label-width="140px">
              <el-form-item label="系统名称" prop="system_name">
                <el-input v-model="form.system_name" placeholder="请输入系统名称" />
              </el-form-item>
              <el-form-item label="文件上传限制" prop="file_size_limit">
                <el-input-number v-model="form.file_size_limit" :min="10" :max="2048" /> <span style="margin-left:8px;color:var(--text-light)">MB</span>
              </el-form-item>
              <el-form-item label="允许的附件类型">
                <el-checkbox-group v-model="form.file_types">
                  <el-checkbox value="pdf">PDF文档</el-checkbox>
                  <el-checkbox value="doc">Word文档</el-checkbox>
                  <el-checkbox value="xls">Excel表格</el-checkbox>
                  <el-checkbox value="ppt">PPT演示</el-checkbox>
                  <el-checkbox value="zip">压缩文件</el-checkbox>
                  <el-checkbox value="video">视频文件</el-checkbox>
                  <el-checkbox value="image">图片文件</el-checkbox>
                </el-checkbox-group>
              </el-form-item>
              <el-form-item label="系统公告">
                <el-switch v-model="form.enable_notice" />
              </el-form-item>
              <el-form-item label="公告内容" v-if="form.enable_notice">
                <el-input v-model="form.notice_content" type="textarea" :rows="3" placeholder="请输入公告内容" />
              </el-form-item>
              <el-form-item>
                <el-button type="primary" @click="handleSave">保存设置</el-button>
                <el-button @click="handleReset">重置演示数据</el-button>
              </el-form-item>
            </el-form>
          </el-card>
        </div>
      `,
      setup() {
        const formRef = ref(null);
        const form = reactive({
          system_name: '', file_size_limit: 500, file_types: [],
          enable_notice: true, notice_content: '',
        });
        const rules = {
          system_name: [{ required: true, message: '请输入系统名称', trigger: 'blur' }],
          file_size_limit: [{ required: true, message: '请输入文件大小限制', trigger: 'blur' }],
        };

        const loadSettings = () => {
          const s = MockAPI.getSettings().data;
          form.system_name = s.system_name;
          form.file_size_limit = s.file_size_limit;
          form.file_types = s.file_types || [];
          form.enable_notice = s.enable_notice;
          form.notice_content = s.notice_content;
        };

        const handleSave = () => {
          formRef.value.validate((valid) => {
            if (!valid) return;
            MockAPI.updateSettings({ ...form });
            store.refreshSettings();
            ElMessage.success('设置已保存');
          });
        };

        const handleReset = () => {
          ElMessageBox.confirm('重置后所有演示数据将恢复初始状态，确定？', '危险操作', { type: 'warning' }).then(() => {
            DB.reset();
            store.refreshUser();
            store.refreshSettings();
            ElMessage.success('数据已重置');
            location.hash = '#/auth/login';
          }).catch(() => {});
        };

        onMounted(() => { loadSettings(); });

        return { formRef, form, rules, handleSave, handleReset, store };
      }
    };

    /* ===== 路由配置 ===== */
    const routes = [
      { path: '/auth', component: AuthLayout, children: [
        { path: 'login', component: LoginPage },
        { path: 'register', component: RegisterPage },
      ]},
      { path: '/', component: ContestLayout, children: [
        { path: '', redirect: 'contest' },
        { path: 'contest', component: ContestHall },
        { path: 'contest/:id', component: ContestDetail },
        { path: 'contest/:id/apply', component: ContestApply, meta: { requiresAuth: true } },
        { path: 'user/dashboard', component: MyApplications, meta: { requiresAuth: true } },
        { path: 'user/profile', component: Profile, meta: { requiresAuth: true } },
      ]},
      { path: '/admin', component: AdminLayout, meta: { requiresAuth: true }, children: [
        { path: 'contest', component: AdminContest, meta: { requiresAdmin: true } },
        { path: 'contest/create', component: ContestEdit, meta: { requiresAdmin: true } },
        { path: 'contest/:id/edit', component: ContestEdit, meta: { requiresAdmin: true } },
        { path: 'audit', component: AdminAudit, meta: { requiresStaff: true } },
        { path: 'score', component: AdminScore, meta: { requiresStaff: true } },
        { path: 'users', component: AdminUsers, meta: { requiresAdmin: true } },
        { path: 'settings', component: AdminSettings, meta: { requiresAdmin: true } },
      ]},
    ];

    const router = createRouter({
      history: createWebHashHistory(),
      routes,
    });

    router.beforeEach((to, from, next) => {
      const user = DB.get('current_user');
      const isLoggedIn = !!user;

      if (to.meta.requiresAuth && !isLoggedIn) {
        next('/auth/login');
        return;
      }
      if (to.meta.requiresAdmin && user.role !== 'admin') {
        ElMessage.error('无权限访问');
        next('/contest');
        return;
      }
      if (to.meta.requiresStaff && !['admin', 'committee'].includes(user.role)) {
        ElMessage.error('无权限访问');
        next('/contest');
        return;
      }
      // 已登录用户访问登录页，跳转大厅
      if (to.path === '/auth/login' && isLoggedIn) {
        next('/contest');
        return;
      }
      next();
    });

    /* ===== 应用挂载 ===== */
    const app = createApp({
      setup() {
        return { store };
      }
    });
    app.use(router);
    app.use(ElementPlus);

    // 注册 Element Plus 图标
    for (const [iconName, iconComp] of Object.entries(ElementPlusIconsVue)) {
      app.component(iconName, iconComp);
    }

    app.mount('#app');
  </script>
</body>
</html>
