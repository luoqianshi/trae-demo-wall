<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>去哪玩 · 中国好景好味指南（V2 交互预览）</title>
<style>
  :root{
    --bg:#FAF6EE; --bg2:#F0EDE5; --wood:#E8DCC4; --surface:#FFFFFF;
    --ink:#2B2520; --muted:#7A7268; --rule:#E6DFD0;
    --vermilion:#C45A3F; --bamboo:#5D7A5C; --gold:#C9A86A; --orange:#D88A4A;
    /* V3 语义色 */
    --indigo:#4A6FA5; --indigo-light:rgba(74,111,165,.12);   /* 非遗 */
    --ai:#2D4A3E; --ai-light:rgba(45,74,62,.1); --ai-glow:rgba(45,74,62,.15);  /* AI */
    --route:#5D7A5C; --route-light:rgba(93,122,92,.12);  /* 路线 */
    --radius-sm:8px; --radius-md:12px; --radius-lg:24px;
    --shadow-sm:0 1px 3px rgba(43,37,32,.05);
    --shadow-md:0 4px 12px rgba(43,37,32,.08);
    --shadow-lg:0 12px 32px rgba(43,37,32,.14);
    --serif:"Songti SC","STSong","Source Han Serif SC",serif;
    --sans:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    --mono:"SF Mono","Menlo",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);background:#ECE6D8;color:var(--ink);line-height:1.65;font-size:15px;-webkit-font-smoothing:antialiased}

  /* ===== 桌面展示台 ===== */
  .stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:26px 16px 60px;
    background:
      radial-gradient(1200px 600px at 20% -10%, #F4EFE2 0%, rgba(244,239,226,0) 60%),
      radial-gradient(900px 500px at 100% 0%, #E7DFCD 0%, rgba(231,223,205,0) 55%),
      #ECE6D8;
  }
  .stage-head{text-align:center;margin-bottom:22px;max-width:720px}
  .stage-head .brand{font-family:var(--serif);font-size:1.7rem;font-weight:700;letter-spacing:.12em;color:var(--ink)}
  .stage-head .brand b{color:var(--vermilion)}
  .stage-head p{color:var(--muted);font-size:.86rem;margin-top:6px}
  .stage-head .v2chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
  .stage-head .v2chips span{font-size:.72rem;background:#fff;border:1px solid var(--rule);color:var(--muted);padding:3px 11px;border-radius:20px}
  .stage-head .v2chips b{color:var(--vermilion)}

  /* ===== 手机框 ===== */
  .phone{width:390px;max-width:100%;background:#1a1614;border-radius:46px;padding:11px;
    box-shadow:0 30px 70px rgba(43,37,32,.26),0 0 0 1px rgba(0,0,0,.12);position:relative}
  .phone-screen{background:var(--bg);border-radius:37px;overflow:hidden;position:relative;height:820px;display:flex;flex-direction:column}
  .ps-notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:128px;height:30px;background:#1a1614;border-radius:18px;z-index:60}
  .ps-status{height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 7px;font-size:14px;font-weight:600;color:var(--ink);position:relative;z-index:55;flex-shrink:0}
  .ps-status .icons{display:flex;gap:5px;align-items:center}
  .ps-status .icons i{display:inline-block;height:11px;background:var(--ink);border-radius:2px;opacity:.85}
  .ps-status .icons i:nth-child(1){width:17px}
  .ps-status .icons i:nth-child(2){width:13px;-webkit-mask:radial-gradient(circle at 70% 30%,#000 28%,transparent 30%) center/contain no-repeat;background:var(--ink)}
  .ps-status .icons i:nth-child(3){width:22px;border-radius:3px;position:relative}
  .ps-status .icons i:nth-child(3)::after{content:"";position:absolute;inset:2px;border:1.4px solid var(--ink);border-radius:1px}

  .screen-scroll{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch}
  .screen-scroll::-webkit-scrollbar{width:0}

  /* ===== 顶部栏 ===== */
  .home-topbar{display:flex;align-items:center;gap:.6rem;padding:.45rem 1rem .8rem;background:var(--bg);position:sticky;top:0;z-index:30}
  .home-logo{font-family:var(--serif);font-weight:700;font-size:1.25rem;color:var(--vermilion);white-space:nowrap;letter-spacing:.04em}
  .home-search{flex:1;background:var(--surface);border:1px solid var(--rule);border-radius:20px;padding:.45rem .85rem;font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:.35rem}
  .home-search .ic{font-size:1rem;line-height:1}

  .block-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 1rem;margin-bottom:.7rem}
  .block-head h3{font-family:var(--serif);font-size:1.18rem;margin:0;font-weight:700}
  .block-head .more{font-size:.78rem;color:var(--muted)}

  /* 热门搜索词 优化① */
  .v2-hot-search{display:flex;gap:.4rem;padding:.1rem 1rem .65rem;overflow-x:auto}
  .v2-hot-search::-webkit-scrollbar{display:none}
  .v2-hot-search .hs{flex-shrink:0;font-size:.72rem;color:var(--muted);background:var(--bg2);padding:3px 11px;border-radius:11px;cursor:pointer;transition:.18s}
  .v2-hot-search .hs.hot{color:var(--vermilion);font-weight:600;background:rgba(196,90,63,.1)}

  /* Hero */
  .home-hero{margin:0 1rem 1.2rem;border-radius:var(--radius-md);overflow:hidden;position:relative;height:200px;box-shadow:var(--shadow-md);cursor:pointer}
  .home-hero img{width:100%;height:100%;object-fit:cover;display:block}
  .home-hero .hero-overlay{position:absolute;bottom:0;left:0;right:0;padding:1rem;background:linear-gradient(180deg,transparent,rgba(0,0,0,.62));color:#fff}
  .home-hero .hero-overlay .tag{font-size:.68rem;background:var(--vermilion);padding:2px 9px;border-radius:8px;margin-bottom:.3rem;display:inline-block;font-weight:600}
  .home-hero .hero-overlay h3{color:#fff;font-size:1.3rem;margin:0;font-family:var(--serif)}
  .home-hero .hero-overlay p{margin:0;font-size:.78rem;opacity:.92}
  .home-hero .hero-dots{position:absolute;bottom:.6rem;right:.85rem;display:flex;gap:4px}
  .home-hero .hero-dots i{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5)}
  .home-hero .hero-dots i.on{background:#fff;width:14px;border-radius:3px}

  /* 收藏角标 优化② */
  .v2-fav-corner{position:absolute;top:10px;right:10px;width:30px;height:30px;background:rgba(255,255,255,.94);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;z-index:2;color:var(--muted);cursor:pointer;box-shadow:var(--shadow-sm)}
  .v2-fav-corner.on{color:var(--vermilion)}

  /* 横滑通用 */
  .hscroll{display:flex;gap:.7rem;padding:0 1rem;overflow-x:auto;padding-bottom:.3rem}
  .hscroll::-webkit-scrollbar{display:none}
  .rank-card{flex-shrink:0;width:136px;cursor:pointer}
  .rank-card .cover{width:136px;height:94px;border-radius:9px;margin-bottom:.4rem;overflow:hidden;position:relative;background:var(--wood)}
  .rank-card .cover img{width:100%;height:100%;object-fit:cover}
  .rank-card .t{font-size:.82rem;font-weight:700}
  .rank-card .n{font-size:.72rem;color:var(--muted)}

  .v2-rank-badge{position:absolute;top:6px;left:6px;min-width:24px;height:23px;padding:0 6px;background:rgba(43,37,32,.82);color:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:.78rem;z-index:2}
  .v2-rank-badge.solid{background:var(--vermilion);color:#fff}

  /* 路线卡片 优化③ */
  .route-card{margin:0 1rem .8rem;display:flex;gap:.85rem;background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-md);padding:.7rem;align-items:center;cursor:pointer;transition:.2s}
  .route-card:active{transform:scale(.99)}
  .route-card .thumb{width:92px;height:68px;border-radius:9px;flex-shrink:0;overflow:hidden;background:var(--wood)}
  .route-card .thumb img{width:100%;height:100%;object-fit:cover}
  .route-card .info{flex:1;min-width:0}
  .route-card .info .t{font-weight:700;font-size:.92rem;margin-bottom:.2rem;font-family:var(--serif)}
  .route-card .info .meta{font-size:.74rem;color:var(--muted);display:flex;gap:.55rem;align-items:center}
  .route-card .info .price{color:var(--vermilion);font-weight:700}
  .v2-route-chips{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.3rem}
  .v2-route-chips .chip{font-size:.64rem;color:var(--muted);background:var(--bg2);padding:1px 7px;border-radius:8px}

  /* AI Banner */
  .ai-banner{margin:0 1rem 1rem;background:linear-gradient(135deg,#2B2520,#5D7A5C);border-radius:var(--radius-md);padding:1rem;color:#fff;display:flex;align-items:center;gap:.85rem;cursor:pointer}
  .ai-banner .ai-icon{width:42px;height:42px;background:rgba(255,255,255,.16);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
  .ai-banner .ai-txt{flex:1}
  .ai-banner .ai-txt b{font-family:var(--serif);font-size:1.05rem;display:block}
  .ai-banner .ai-txt small{font-size:.74rem;opacity:.82}
  .ai-banner .ai-go{color:#fff;font-size:1.3rem}

  /* Tab Bar 优化④ */
  .tabbar{height:64px;background:var(--surface);border-top:1px solid var(--rule);display:flex;padding-bottom:8px;flex-shrink:0;position:relative;z-index:40}
  .tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:.66rem;color:var(--muted);cursor:pointer}
  .tabbar .tab .ic{width:22px;height:22px;border-radius:6px;background:var(--rule);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem}
  .tabbar .tab.active{color:var(--vermilion)}
  .tabbar .tab.active .ic{background:var(--vermilion)}
  .v2-tabbar .v2-raise-slot{position:relative}
  .v2-tabbar .v2-raise{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:48px;height:48px;background:var(--vermilion);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.6rem;box-shadow:0 5px 14px rgba(196,90,63,.42);border:3px solid var(--surface);line-height:1;cursor:pointer}

  /* ===== V3 双悬浮 dock（玩/吃） ===== */
  .float-dock{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(8px + 8px);z-index:45;display:flex;gap:.7rem;padding:6px;background:rgba(255,255,255,.62);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);border-radius:30px;box-shadow:0 8px 26px rgba(43,37,32,.16);border:1px solid rgba(255,255,255,.7)}
  .float-dock .fd-btn{display:flex;align-items:center;gap:.4rem;padding:.5rem 1.15rem;border-radius:24px;font-size:.86rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .25s;font-family:var(--serif)}
  .float-dock .fd-btn .ic{font-size:1.05rem;line-height:1}
  .float-dock .fd-btn.wan.on{background:linear-gradient(135deg,var(--bamboo),#4a6b49);color:#fff;box-shadow:0 4px 12px rgba(93,122,92,.4)}
  .float-dock .fd-btn.chi.on{background:linear-gradient(135deg,var(--vermilion),#a8472f);color:#fff;box-shadow:0 4px 12px rgba(196,90,63,.4)}
  .float-dock .fd-btn:not(.on):active{background:rgba(0,0,0,.05)}

  /* ===== 顶部图标条 ===== */
  .top-bar{display:flex;justify-content:space-around;padding:.55rem .5rem .35rem;background:var(--bg);position:sticky;top:0;z-index:25;border-bottom:1px solid var(--rule)}
  .top-bar .tb{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.62rem;color:var(--muted);cursor:pointer}
  .top-bar .tb .ic{width:34px;height:34px;border-radius:11px;background:var(--surface);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
  .top-bar .tb:active .ic{transform:scale(.92)}
  .top-bar .tb.dice .ic{background:linear-gradient(135deg,var(--gold),#b8923f);color:#fff;border:none}

  /* ===== 摇骰子盲盒 ===== */
  .dice-wrap{padding:1.2rem 1rem}
  .dice-arena{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 2.4rem}
  .dice-cube{width:96px;height:96px;border-radius:22px;background:linear-gradient(145deg,#fff,var(--bg2));display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 12px 30px rgba(45,74,62,.22),inset 0 2px 6px rgba(255,255,255,.8);transition:transform .3s}
  .dice-cube.rolling{animation:diceRoll .9s cubic-bezier(.3,.1,.3,1)}
  @keyframes diceRoll{0%{transform:rotate(0) scale(1)}30%{transform:rotate(360deg) scale(1.12)}60%{transform:rotate(680deg) scale(.94)}100%{transform:rotate(720deg) scale(1)}}
  .dice-tag{margin-top:1rem;font-size:.72rem;color:var(--muted);letter-spacing:1px}
  .dice-res{margin:1.2rem 0 0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--rule);background:var(--surface)}
  .dice-res .cover{height:150px;position:relative}
  .dice-res .cover img{width:100%;height:100%;object-fit:cover}
  .dice-res .cover .why{position:absolute;left:0;right:0;bottom:0;padding:.7rem .9rem;background:linear-gradient(180deg,transparent,rgba(0,0,0,.7));color:#fff}
  .dice-res .cover .why b{font-family:var(--serif);font-size:1.05rem;display:block}
  .dice-res .cover .why small{font-size:.74rem;opacity:.92}
  .dice-res .body{padding:.7rem .9rem;display:flex;align-items:center;gap:.6rem}
  .dice-res .body .meta{flex:1;font-size:.74rem;color:var(--muted)}
  .dice-roll-btn{margin:.9rem 1rem 0;width:calc(100% - 2rem);background:linear-gradient(135deg,var(--bamboo),#4a6b49);color:#fff;border:none;border-radius:24px;padding:.75rem;font-size:.92rem;font-weight:700;box-shadow:0 5px 16px rgba(93,122,92,.35);cursor:pointer}


  /* ===== 城市页 ===== */
  .city-hero{position:relative;height:250px;overflow:hidden}
  .city-hero img{width:100%;height:100%;object-fit:cover}
  .city-hero .city-overlay{position:absolute;bottom:0;left:0;right:0;padding:1.2rem;background:linear-gradient(180deg,transparent,rgba(0,0,0,.62));color:#fff}
  .city-hero .city-overlay h1{font-family:var(--serif);font-size:2.3rem;margin:0;font-weight:700}
  .city-hero .city-overlay p{margin:.2rem 0 0;font-size:.86rem;opacity:.92}
  .city-back{position:absolute;top:54px;left:1rem;width:34px;height:34px;background:rgba(255,255,255,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;z-index:5;cursor:pointer;box-shadow:var(--shadow-sm)}
  .v2-season-tag{position:absolute;top:54px;right:1rem;background:rgba(255,255,255,.94);border-radius:14px;padding:4px 11px;font-size:.7rem;font-weight:600;color:var(--bamboo);z-index:5;display:flex;align-items:center;gap:3px;box-shadow:var(--shadow-sm)}

  .city-intro{padding:1rem}
  .city-intro p{font-size:.86rem;color:var(--ink);margin-bottom:.6rem}
  .v2-city-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin:.5rem 0 .7rem}
  .v2-city-tags .ct{font-size:.72rem;color:var(--bamboo);background:rgba(93,122,92,.1);padding:2px 10px;border-radius:11px}
  .city-stats{display:flex;gap:.7rem;margin-top:.2rem}
  .city-stats .s{flex:1;background:var(--bg2);border-radius:9px;padding:.55rem .4rem;text-align:center}
  .city-stats .s .v{font-family:var(--mono);font-weight:700;font-size:.92rem;color:var(--vermilion)}
  .city-stats .s .l{font-size:.66rem;color:var(--muted);margin-top:1px}

  .filter-row{display:flex;gap:.4rem;padding:0 1rem .65rem;overflow-x:auto}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-row .f{flex-shrink:0;font-size:.76rem;padding:.32rem .85rem;border-radius:14px;background:var(--surface);border:1px solid var(--rule);color:var(--muted);cursor:pointer;transition:.18s}
  .filter-row .f.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .spot-card-h{display:flex;gap:.65rem;padding:0 1rem .75rem;cursor:pointer}
  .spot-card-h .thumb{width:104px;height:78px;border-radius:9px;flex-shrink:0;overflow:hidden;position:relative;background:var(--wood)}
  .spot-card-h .thumb img{width:100%;height:100%;object-fit:cover}
  .spot-card-h .info{flex:1;min-width:0;padding-top:1px}
  .spot-card-h .info .t{font-weight:700;font-size:.9rem;margin-bottom:.18rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
  .spot-card-h .info .desc{font-size:.74rem;color:var(--muted);margin-bottom:.32rem;line-height:1.4}
  .spot-card-h .info .meta{font-size:.72rem;color:var(--muted);display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
  .v2-dist{font-size:.66rem;color:var(--gold);background:rgba(201,168,106,.16);padding:1px 7px;border-radius:8px;white-space:nowrap}

  .badge{display:inline-flex;align-items:center;gap:.2rem;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
  .badge-gold{background:rgba(201,168,106,.2);color:#9a7f3f}
  .badge-red{background:rgba(196,90,63,.15);color:var(--vermilion)}
  .badge-orange{background:rgba(216,138,74,.2);color:var(--orange)}
  .badge-green{background:rgba(93,122,92,.18);color:var(--bamboo)}

  .stars{--p:100%;letter-spacing:1px;font-size:.85rem;background:linear-gradient(90deg,var(--gold) var(--p),var(--rule) var(--p));-webkit-background-clip:text;background-clip:text;color:transparent}

  .v2-view-all{display:block;text-align:center;padding:.5rem;margin:.3rem 1rem .8rem;border:1px dashed var(--rule);border-radius:var(--radius-md);font-size:.78rem;color:var(--ink);font-weight:600;cursor:pointer}

  /* ===== 详情页 ===== */
  .detail-gallery{position:relative;height:300px;overflow:hidden;background:var(--wood)}
  .detail-gallery .track{display:flex;height:100%;transition:transform .32s cubic-bezier(.22,.61,.36,1)}
  .detail-gallery .slide{min-width:100%;height:100%}
  .detail-gallery .slide img{width:100%;height:100%;object-fit:cover}
  .detail-gallery .count{position:absolute;bottom:50px;right:.7rem;background:rgba(0,0,0,.52);color:#fff;font-size:.72rem;padding:2px 9px;border-radius:11px}
  .gallery-tap{position:absolute;top:0;bottom:0;width:35%;z-index:3}
  .gallery-tap.left{left:0}.gallery-tap.right{right:0}
  .v2-thumb-strip{display:flex;gap:3px;padding:.45rem 1rem .55rem;overflow-x:auto;background:var(--ink)}
  .v2-thumb-strip::-webkit-scrollbar{display:none}
  .v2-thumb-strip .th{width:38px;height:26px;border-radius:3px;flex-shrink:0;opacity:.55;overflow:hidden;cursor:pointer;background:var(--muted)}
  .v2-thumb-strip .th img{width:100%;height:100%;object-fit:cover}
  .v2-thumb-strip .th.on{opacity:1;box-shadow:0 0 0 2px var(--vermilion)}

  .detail-body{background:var(--surface);border-radius:22px 22px 0 0;margin-top:-18px;position:relative;padding:1.2rem 1rem 0;z-index:2}
  .detail-name{font-family:var(--serif);font-size:1.55rem;font-weight:700}
  .detail-sub{display:flex;align-items:center;gap:.4rem;margin:.32rem 0 .85rem;flex-wrap:wrap}
  .detail-sub .typ{font-size:.78rem;color:var(--muted)}
  .detail-info-row{display:flex;gap:.5rem;padding:.5rem 0;border-bottom:1px solid var(--rule);font-size:.82rem}
  .detail-info-row .k{width:60px;color:var(--muted);flex-shrink:0}
  .detail-info-row .v{color:var(--ink);flex:1}
  .detail-info-row .v.price{color:var(--vermilion);font-weight:700}
  .detail-desc{font-size:.85rem;line-height:1.75;margin:.85rem 0;color:var(--ink)}

  .v2-review-summary{display:flex;align-items:center;gap:.7rem;padding:.6rem .85rem;background:var(--bg2);border-radius:9px;margin-bottom:.55rem}
  .v2-review-summary .score{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--vermilion);line-height:1}
  .v2-review-summary .breakdown{flex:1}
  .v2-review-summary .breakdown .lbl{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.3rem}
  .v2-review-summary .breakdown .bar-bg{height:5px;border-radius:3px;background:var(--rule);margin-top:4px;overflow:hidden}
  .v2-review-summary .breakdown .bar{height:100%;background:var(--gold);border-radius:3px}
  .v2-review-summary .breakdown .sub{font-size:.66rem;color:var(--muted);margin-top:3px}

  .detail-review{background:var(--bg2);border-radius:9px;padding:.8rem;margin:.5rem 0}
  .detail-review .u{display:flex;align-items:center;gap:.45rem;margin-bottom:.35rem}
  .detail-review .u .av{width:26px;height:26px;border-radius:50%;background:var(--wood);background-size:cover;background-position:center}
  .detail-review .u b{font-size:.82rem}
  .detail-review .u .badge{margin-left:auto}
  .detail-review p{font-size:.8rem;color:var(--ink);margin:0;line-height:1.6}
  .v2-useful{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;color:var(--muted);margin-top:.45rem;padding:2px 9px;border:1px solid var(--rule);border-radius:10px;cursor:pointer;transition:.18s;background:transparent}
  .v2-useful.on{color:var(--vermilion);border-color:var(--vermilion);background:rgba(196,90,63,.06)}

  .nearby-scroll{display:flex;gap:.6rem;padding:0 0 .6rem;overflow-x:auto}
  .nearby-scroll::-webkit-scrollbar{display:none}
  .nearby-card{flex-shrink:0;width:94px;cursor:pointer}
  .nearby-card .thumb{width:94px;height:66px;border-radius:7px;margin-bottom:.3rem;overflow:hidden;background:var(--wood)}
  .nearby-card .thumb img{width:100%;height:100%;object-fit:cover}
  .nearby-card .t{font-size:.74rem;font-weight:600}
  .nearby-card .d{font-size:.66rem;color:var(--muted)}

  .detail-map{height:108px;border-radius:9px;margin:.65rem 0;overflow:hidden;position:relative;background:linear-gradient(135deg,#d8e0d0,#c0ccb8)}
  .detail-map .mapgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(93,122,92,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(93,122,92,.18) 1px,transparent 1px);background-size:26px 26px}
  .detail-map .pin{position:absolute;top:42%;left:46%;transform:translate(-50%,-100%);font-size:1.6rem}
  .detail-map .road{position:absolute;background:rgba(255,255,255,.7)}
  .detail-map .nav-btn{position:absolute;bottom:.55rem;right:.55rem;background:var(--vermilion);color:#fff;font-size:.76rem;padding:.34rem .8rem;border-radius:15px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm)}

  .detail-action{height:70px;background:var(--surface);border-top:1px solid var(--rule);padding:.55rem 1rem calc(.55rem + 8px);display:flex;gap:.55rem;align-items:center;flex-shrink:0}
  .detail-action .icon-btn{display:flex;flex-direction:column;align-items:center;font-size:.62rem;color:var(--muted);gap:2px;cursor:pointer}
  .detail-action .icon-btn .ic{width:26px;height:26px;border:1.5px solid var(--muted);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
  .detail-action .icon-btn.fav{color:var(--vermilion)}
  .detail-action .icon-btn.fav .ic{border-color:var(--vermilion);background:var(--vermilion);color:#fff}
  .v2-write-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:.6rem;color:var(--vermilion);cursor:pointer}
  .v2-write-btn .ic{width:26px;height:26px;border:1.5px solid var(--vermilion);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem}
  .detail-action .cta{flex:1}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;border:none;cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:600;transition:all .2s}
  .btn-primary{background:var(--vermilion);color:#fff;padding:.62rem 1.5rem;border-radius:24px}
  .btn-primary:active{transform:scale(.97)}
  .btn-outline{background:transparent;color:var(--vermilion);border:1.5px solid var(--vermilion);padding:.6rem 1.5rem;border-radius:24px}
  .btn-ghost{background:var(--bg2);color:var(--ink);padding:.5rem 1.1rem;border-radius:20px;font-size:.84rem}

  /* ===== 通用 view 容器 ===== */
  .view-pad{padding:0 0 90px}
  .page-title{font-family:var(--serif);font-size:1.5rem;font-weight:700;padding:1.2rem 1rem .4rem}
  .page-sub{padding:0 1rem;color:var(--muted);font-size:.84rem;margin-bottom:1rem}
  .sec-card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-md);margin:0 1rem .9rem;overflow:hidden}

  /* 上传三入口 */
  .upload-entry{display:flex;gap:.85rem;align-items:center;padding:1rem;background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-md);margin:0 1rem .8rem;cursor:pointer;transition:.2s}
  .upload-entry:active{transform:scale(.99)}
  .upload-entry .emoji{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
  .upload-entry .et b{font-family:var(--serif);font-size:1rem;display:block}
  .upload-entry .et small{font-size:.74rem;color:var(--muted)}

  .audit-status{display:flex;align-items:center;gap:.6rem;padding:.7rem .9rem;background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-md);margin:0 1rem .7rem}
  .audit-status .dot{width:8px;height:8px;border-radius:50%}
  .audit-status .dot.pending{background:var(--orange)}
  .audit-status .dot.approved{background:var(--bamboo)}
  .audit-status .stxt{flex:1}
  .audit-status .stxt b{font-size:.82rem;display:block}
  .audit-status .stxt small{font-size:.7rem;color:var(--muted)}

  /* AI 规划器表单 */
  .ai-form{padding:0 1rem}
  .field{margin-bottom:1rem}
  .field label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:.4rem;font-weight:600}
  .stepper{display:flex;gap:.5rem;align-items:center}
  .stepper button{width:34px;height:34px;border-radius:10px;border:1px solid var(--rule);background:var(--surface);font-size:1.1rem;color:var(--ink);cursor:pointer}
  .stepper .val{font-family:var(--mono);font-weight:700;font-size:1.1rem;min-width:60px;text-align:center}
  .tagpick{display:flex;flex-wrap:wrap;gap:.4rem}
  .tagpick span{font-size:.76rem;padding:.36rem .85rem;border-radius:16px;background:var(--surface);border:1px solid var(--rule);color:var(--muted);cursor:pointer}
  .tagpick span.on{background:var(--vermilion);color:#fff;border-color:var(--vermilion)}
  .range-out{font-family:var(--mono);font-weight:700;color:var(--vermilion);font-size:.9rem;margin-bottom:.3rem}
  input[type=range]{width:100%;accent-color:var(--vermilion)}
  .text-in{width:100%;background:var(--surface);border:1px solid var(--rule);border-radius:10px;padding:.6rem .8rem;font-family:inherit;font-size:.84rem;color:var(--ink)}

  .itin-day{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-md);margin:0 1rem .9rem;overflow:hidden}
  .itin-day .dh{padding:.7rem .9rem;background:var(--bg2);font-family:var(--serif);font-weight:700;font-size:.95rem;display:flex;justify-content:space-between;align-items:center}
  .itin-day .dh .tag{font-size:.66rem;background:var(--vermilion);color:#fff;padding:1px 8px;border-radius:8px;font-family:var(--sans);font-weight:600}
  .itin-slot{display:flex;gap:.7rem;padding:.7rem .9rem;border-top:1px solid var(--rule)}
  .itin-slot .stime{font-size:.66rem;color:var(--muted);width:42px;flex-shrink:0;padding-top:2px;font-weight:600}
  .itin-slot .sbody{flex:1}
  .itin-slot .sbody b{font-size:.82rem}
  .itin-slot .sbody small{display:block;font-size:.7rem;color:var(--muted);margin-top:1px}

  /* 我的 */
  .mine-head{padding:1.4rem 1rem;background:linear-gradient(135deg,#2B2520,#5D7A5C);color:#fff;border-radius:0 0 20px 20px}
  .mine-head .row{display:flex;align-items:center;gap:.8rem}
  .mine-head .av{width:58px;height:58px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1.3rem;color:#fff}
  .mine-head .nm{font-family:var(--serif);font-size:1.2rem}
  .mine-head .role{font-size:.72rem;background:rgba(255,255,255,.18);padding:2px 9px;border-radius:10px;display:inline-block;margin-top:3px}
  .mine-head .stats{display:flex;gap:1.4rem;margin-top:1rem}
  .mine-head .stats .n{font-family:var(--mono);font-size:1.2rem;font-weight:700}
  .mine-head .stats .l{font-size:.68rem;opacity:.8}
  .footprint{position:relative;height:150px;border-radius:var(--radius-md);margin:0 1rem;overflow:hidden;background:linear-gradient(160deg,#E8DCC4,#F0EDE5)}
  .fp-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--vermilion);box-shadow:0 0 0 4px rgba(196,90,63,.2);cursor:pointer}
  .fp-dot.muted{background:var(--muted);box-shadow:0 0 0 4px rgba(122,114,104,.18)}
  .fp-dot .lbl{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:.6rem;white-space:nowrap;background:var(--ink);color:#fff;padding:1px 5px;border-radius:5px;opacity:0;transition:.18s}
  .fp-dot:hover .lbl,.fp-dot.on .lbl{opacity:1}
  .menu-row{display:flex;align-items:center;gap:.7rem;padding:.85rem 1rem;border-bottom:1px solid var(--rule);cursor:pointer}
  .menu-row .mi{width:34px;height:34px;border-radius:9px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1rem}
  .menu-row .mt{flex:1;font-size:.86rem}
  .menu-row .arr{color:var(--muted)}

  .empty{padding:2.5rem 1.5rem;text-align:center;color:var(--muted)}
  .empty .big{font-size:2.4rem;margin-bottom:.5rem}
  .empty p{font-size:.82rem}
  .coming-hero{position:relative;height:230px;overflow:hidden}
  .coming-hero img{width:100%;height:100%;object-fit:cover;filter:saturate(.9)}
  .coming-hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.6));display:flex;flex-direction:column;justify-content:flex-end;padding:1.2rem;color:#fff}
  .coming-hero .ov h1{font-family:var(--serif);font-size:2rem;margin:0}

  /* Toast & Modal */
  .toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(43,37,32,.92);color:#fff;padding:.7rem 1.3rem;border-radius:14px;font-size:.82rem;z-index:200;opacity:0;transition:.22s;pointer-events:none;max-width:80%;text-align:center;line-height:1.5}
  .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .sheet-mask{position:absolute;inset:0;background:rgba(43,37,32,.45);z-index:90;opacity:0;transition:.25s;pointer-events:none}
  .sheet-mask.show{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--bg);border-radius:20px 20px 0 0;z-index:91;transform:translateY(100%);transition:.28s cubic-bezier(.22,.61,.36,1);max-height:86%;overflow-y:auto;padding:1.1rem 1rem calc(1.1rem + 20px)}
  .sheet.show{transform:translateY(0)}
  .sheet .grab{width:38px;height:4px;border-radius:2px;background:var(--rule);margin:0 auto .9rem}
  .sheet h3{font-family:var(--serif);font-size:1.2rem;margin-bottom:.3rem}
  .sheet .s-desc{color:var(--muted);font-size:.8rem;margin-bottom:1rem}

  .step-bar{display:flex;gap:.4rem;margin-bottom:1rem}
  .step-bar .stp{flex:1;height:4px;border-radius:2px;background:var(--rule)}
  .step-bar .stp.on{background:var(--vermilion)}
  .upload-drop{border:1.5px dashed var(--rule);border-radius:var(--radius-md);padding:1.3rem;text-align:center;color:var(--muted);font-size:.78rem;background:var(--surface);cursor:pointer}
  .form-row{margin-bottom:.8rem}
  .form-row label{font-size:.76rem;color:var(--muted);display:block;margin-bottom:.3rem;font-weight:600}
  .form-row input,.form-row select,.form-row textarea{width:100%;background:var(--surface);border:1px solid var(--rule);border-radius:10px;padding:.55rem .75rem;font-family:inherit;font-size:.82rem;color:var(--ink)}
  .form-row textarea{min-height:74px;resize:vertical}
  .char-count{font-size:.66rem;color:var(--muted);text-align:right;margin-top:2px}

  /* 搜索页 */
  .search-topbar{display:flex;align-items:center;gap:.6rem;padding:.5rem 1rem;background:var(--bg);position:sticky;top:0;z-index:30}
  .search-input{flex:1;background:var(--surface);border:1px solid var(--rule);border-radius:20px;padding:.5rem .9rem;font-size:.82rem;display:flex;align-items:center;gap:.35rem}
  .search-input input{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:.82rem;color:var(--ink)}
  .search-cancel{font-size:.82rem;color:var(--vermilion);cursor:pointer}
  .search-section{padding:.8rem 1rem}
  .search-section h4{font-size:.78rem;color:var(--muted);margin-bottom:.6rem;font-weight:600}
  .guess-card{display:flex;gap:.65rem;padding:.7rem;background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-md);margin-bottom:.55rem;cursor:pointer}
  .guess-card .thumb{width:60px;height:46px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--wood)}
  .guess-card .thumb img{width:100%;height:100%;object-fit:cover}
  .guess-card .gi b{font-size:.84rem}
  .guess-card .gi small{display:block;font-size:.7rem;color:var(--muted)}

  /* ===== 非遗体验模块（V3 靛蓝语义） ===== */
  .v3-ich-badge{display:inline-flex;align-items:center;gap:3px;font-size:.7rem;font-weight:700;color:var(--indigo);background:var(--indigo-light);padding:2px 9px;border-radius:10px}
  /* 首页非遗入口（靛蓝渐变横幅） */
  .v3-ich-entry{margin:.6rem 1rem 0;background:linear-gradient(135deg,var(--indigo),#3a5a8a);border-radius:var(--radius-md);padding:.9rem 1rem;color:#fff;display:flex;align-items:center;gap:.8rem;cursor:pointer;transition:.2s}
  .v3-ich-entry:active{transform:scale(.99)}
  .v3-ich-entry .icon{width:36px;height:36px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
  .v3-ich-entry .txt{flex:1}
  .v3-ich-entry .txt b{font-family:var(--serif);font-size:1rem;display:block}
  .v3-ich-entry .txt small{font-size:.72rem;opacity:.85}
  .v3-ich-entry .go{color:#fff;font-size:1.2rem}
  /* 非遗横向卡片（城市页/列表页） */
  .v3-ich-card{margin:0 1rem .7rem;display:flex;gap:.7rem;background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-md);padding:.7rem;align-items:center;position:relative;cursor:pointer;transition:.2s}
  .v3-ich-card:active{transform:scale(.99)}
  .v3-ich-card .cover{width:72px;height:72px;border-radius:8px;flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,var(--indigo),#3a5a8a)}
  .v3-ich-card .cover img{width:100%;height:100%;object-fit:cover}
  .v3-ich-card .info{flex:1;min-width:0}
  .v3-ich-card .info .t{font-weight:700;font-size:.88rem;margin-bottom:.15rem;display:flex;align-items:center;gap:.3rem}
  .v3-ich-card .info .desc{font-size:.74rem;color:var(--muted);margin-bottom:.3rem;line-height:1.4}
  .v3-ich-card .info .meta{font-size:.72rem;color:var(--muted);display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
  .v3-ich-card .book-btn{font-size:.72rem;font-weight:600;color:var(--indigo);background:var(--indigo-light);padding:.25rem .7rem;border-radius:10px;white-space:nowrap;cursor:pointer}
  /* 非遗详情页组件 */
  .v3-ich-detail-header{display:flex;align-items:center;gap:.5rem;margin:.3rem 0 .6rem;flex-wrap:wrap}
  .v3-ich-time{font-size:.78rem;color:var(--ink);background:var(--bg2);padding:.4rem .8rem;border-radius:8px;margin:.3rem 0}
  .v3-ich-time b{color:var(--indigo)}
  .v3-status{font-size:.66rem;padding:1px 7px;border-radius:8px;font-weight:600}
  .v3-status-open{color:var(--bamboo);background:rgba(93,122,92,.12)}
  .v3-status-full{color:var(--vermilion);background:rgba(196,90,63,.1)}
  .v3-master-tag{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;color:var(--indigo);background:var(--indigo-light);padding:1px 7px;border-radius:8px}
  /* 传承人卡片 */
  .exp-master-row{display:flex;align-items:center;gap:.6rem;padding:.7rem .85rem;background:var(--indigo-light);border:1px solid rgba(74,111,165,.18);border-radius:10px;margin:.7rem 0}
  .exp-master-row .av{width:44px;height:44px;border-radius:50%;background-size:cover;background-position:center;flex-shrink:0;background-color:var(--indigo)}
  .exp-master-row .mb b{font-size:.86rem;display:block}
  .exp-master-row .mb small{font-size:.7rem;color:var(--muted)}
  .exp-master-row .verify{margin-left:auto;font-size:.64rem;color:var(--indigo);background:rgba(255,255,255,.6);padding:2px 8px;border-radius:9px;font-weight:600}
  /* 体验流程（靛蓝编号） */
  .exp-steps{margin:.6rem 0;padding:0 .2rem}
  .exp-step{display:flex;gap:.5rem;margin-bottom:.4rem;font-size:.82rem;line-height:1.7;color:var(--ink)}
  .exp-step .num{color:var(--indigo);font-weight:700;flex-shrink:0}
  /* 场次预约 */
  .slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin:.5rem 0}
  .slot-grid .slot{padding:.45rem 0;text-align:center;border:1px solid var(--rule);border-radius:8px;font-size:.72rem;color:var(--ink);background:var(--surface);cursor:pointer;transition:.15s}
  .slot-grid .slot.full{color:var(--muted);text-decoration:line-through;background:var(--bg2);cursor:not-allowed}
  .slot-grid .slot.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}

  /* ===== AI 导览 & 聊天 ===== */
  .ai-guide-btn{position:sticky;bottom:80px;display:flex;align-items:center;gap:.5rem;margin:.8rem 1rem 0;padding:.7rem .95rem;background:linear-gradient(135deg,var(--ai),#1f3a2e);color:#fff;border-radius:14px;cursor:pointer;box-shadow:0 6px 18px var(--ai-glow)}
  .ai-guide-btn .ag-ic{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:1rem}
  .ai-guide-btn b{font-size:.86rem}
  .ai-guide-btn small{font-size:.66rem;opacity:.8;display:block}

  .chat-view{display:flex;flex-direction:column;height:100%}
  .chat-top{display:flex;align-items:center;gap:.6rem;padding:.5rem 1rem;border-bottom:1px solid var(--rule);background:var(--bg);flex-shrink:0}
  .chat-top .ct-back{font-size:1.3rem;color:var(--ink);cursor:pointer}
  .chat-top .ct-t b{font-size:.88rem;display:block;color:var(--ai)}
  .chat-top .ct-t small{font-size:.66rem;color:var(--muted)}
  .chat-body{flex:1;overflow-y:auto;padding:.9rem;background:var(--bg2)}
  .msg{display:flex;margin-bottom:.7rem;max-width:88%}
  .msg.ai{align-self:flex-start}
  .msg.me{align-self:flex-end;margin-left:auto;flex-direction:row-reverse}
  .msg .av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem}
  .msg.ai .av{background:var(--ai);color:var(--gold);margin-right:.5rem}
  .msg.me .av{background:var(--vermilion);color:#fff;margin-left:.5rem}
  .msg .bub{padding:.55rem .8rem;border-radius:14px;font-size:.8rem;line-height:1.55}
  .msg.ai .bub{background:var(--surface);border:1px solid var(--rule);border-top-left-radius:4px}
  .msg.me .bub{background:var(--vermilion);color:#fff;border-top-right-radius:4px}
  .chat-quick{display:flex;gap:.4rem;padding:.5rem .9rem;overflow-x:auto;flex-shrink:0;background:var(--bg)}
  .chat-quick::-webkit-scrollbar{display:none}
  .chat-quick span{flex-shrink:0;font-size:.72rem;padding:.32rem .75rem;border-radius:14px;background:var(--surface);border:1px solid var(--rule);color:var(--ai);cursor:pointer}
  .chat-input{display:flex;gap:.5rem;padding:.55rem .9rem calc(.55rem + 8px);border-top:1px solid var(--rule);background:var(--surface);flex-shrink:0}
  .chat-input input{flex:1;background:var(--bg2);border:none;border-radius:18px;padding:.5rem .85rem;font-family:inherit;font-size:.8rem;outline:none}
  .chat-input button{background:var(--ai);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:1rem;cursor:pointer;flex-shrink:0}

  .guide-sheet-body{padding:.2rem 0}
  .guide-sheet-body .seg{margin-bottom:.8rem}
  .guide-sheet-body .seg .sh{font-family:var(--serif);font-weight:700;font-size:.92rem;color:var(--ai);margin-bottom:.25rem;display:flex;align-items:center;gap:.3rem}
  .guide-sheet-body .seg p{font-size:.82rem;color:var(--ink);line-height:1.7;margin:0}
  .voice-bar{display:flex;align-items:center;gap:.7rem;background:var(--ai);color:#fff;padding:.7rem .9rem;border-radius:12px;margin:.6rem 0}
  .voice-bar .play{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;flex-shrink:0}
  .voice-bar .wave{flex:1;display:flex;gap:2px;align-items:center;height:22px}
  .voice-bar .wave i{flex:1;background:rgba(255,255,255,.4);border-radius:1px}
  .voice-bar small{font-size:.66rem;opacity:.8}

  /* ===== 路线时间轴布局 ===== */
  .route-detail-hero{position:relative;height:210px;overflow:hidden}

   故美食统一用高保真 SVG 主题占位，确保稳定可见 */
function foodEmoji(s){
  const t=((s&&(s.name||''))+(s&&(s.type||''))+(s&&(s.desc||''))+(s&&(s.ctype||'')));
  if(/面|粉|糊|馄|线/.test(t))return '🍜';
  if(/鱼|鳜|鲈/.test(t))return '🐟';
  if(/煎|包|饺|烧卖|烧麦/.test(t))return '🥟';
  if(/糕|团|酥|饼|甜|糖|芋/.test(t))return '🍡';
  if(/牛|肉|羹|鸡|鸭|烧|卤/.test(t))return '🍖';
  if(/冻|豆腐|豆花/.test(t))return '🍮';
  if(/茶/.test(t))return '🍵';
  if(/饭|粥/.test(t))return '🍚';
  if(/蟹|虾|蚝|蚵|蛎|海鲜/.test(t))return '🦐';
  if(/汤/.test(t))return '🥣';
  return '🍽️';
}

}

/* 图片加载失败统一兜底：先重试一次（应对 API 限流/并发），再降级为渐变占位 + emoji */
function imgFallback(img){
  const src=img.src;
  if(!img.dataset.try){
    img.dataset.try='1';img.onerror=null;
    setTimeout(()=>{img.src=src+(src.includes('?')?'&':'?')+'_r=1';},400);
    setTimeout(()=>{
      if(img.dataset.ok!=='1'){
        img.onerror=null;img.dataset.fb='1';
        const palettes=[['#E8DCC4','#C9B68F'],['#C9D9C6','#9FB89A'],['#F0D9C0','#DDB58E'],['#D6CDB8','#B5A784'],['#DCE4DA','#B6C4BB'],['#EAD9C7','#D0B49A']];
        const p=palettes[Math.floor(Math.random()*palettes.length)];
        const emojis=['🏞','🌅','🍃','🍜','🏯','⛰','🌊','🎏','⛺'];
        const e=emojis[Math.floor(Math.random()*emojis.length)];
        img.src='data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" preserveAspectRatio="xMidYMid slice"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="'+p[0]+'"/><stop offset="1" stop-color="'+p[1]+'"/></linearGradient></defs><rect width="400" height="300" fill="url(#g)"/><text x="200" y="165" font-size="58" text-anchor="middle">'+e+'</text></svg>');
      }
    },7000);
    img.onload=()=>{img.dataset.ok='1';img.classList.add('loaded');};
  }
}

function enhanceScroll(){
  document.querySelectorAll('.hscroll,.v2-hot-search,.filter-row,.nearby-scroll,.chat-quick,.route-list-filter').forEach(el=>{
    if(el._wheelBound)return;el._wheelBound=true;
    el.addEventListener('wheel',e=>{
      if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){e.preventDefault();el.scrollLeft+=e.deltaY;}

  });
}

function galleryGo(i){
  const track=$('#galleryTrack');if(!track)return;

  $('#galleryCount').textContent=`${detailGalleryIdx+1} / ${slides}`;
  $('#thumbStrip').querySelectorAll('.th').forEach((t,idx)=>t.classList.toggle('on',idx===detailGalleryIdx));
  const ts=$('#thumbStrip');const th=ts.children[detailGalleryIdx];if(th)th.scrollIntoView({inline:'center',block:'nearest'});
}

function toggleUseful(id,i,el){
  const k=id+'_'+i;const on=!(useful[k]>0);
  useful[k]=on?1:0;localStorage.setItem('qnw_useful',JSON.stringify(useful));
  el.classList.toggle('on',on);

  toast(on?'感谢反馈，已标记为有用':'已取消');
}

function aiSwapSlot(di,si){
  const day=aiState.plan[di];const slot=day.slots[si];
  const c=CITY[aiState.city==='苏州'?'suzhou':'quanzhou'];
  let pool;
  if(slot.kind==='spot')pool=c.spots;
  else if(slot.kind==='food')pool=c.shops;
  else pool=(CITY_HERITAGE[aiState.city]||[]).map(id=>HERITAGE[id]).filter(Boolean);
  const used=day.slots.map(s=>s.title);
  const cand=pool.filter(x=>!used.includes(x.name)&&x.name!==slot.title);
  if(!cand.length){toast('已是当前最佳推荐');return;}
  const pick=cand[Math.floor(Math.random()*cand.length)];
  if(slot.kind==='spot'){slot.title=pick.name;slot.desc=`${pick.type} · ${pick.desc}`;slot.img=pick.img;}
  else if(slot.kind==='food'){slot.title=pick.name;slot.desc=`地道美食 · 人均${pick.price}`;slot.img=pick.img;}
  else{slot.title=pick.name;slot.desc=`非遗体验 · ${pick.price}`;slot.img=pick.img;}
  toast('已为你换一个推荐 ✓');
  render('ai',{});
}

function buildPlan(c,days){
  const spots=c.spots.slice();const shops=c.shops.slice();
  const ichIds=CITY_HERITAGE[c===CITY.suzhou?'苏州':'泉州']||[];
  const ichList=ichIds.map(id=>HERITAGE[id]).filter(Boolean);
  const themes=['经典打卡 · 古城初探','深度漫游 · 文化寻味','悠闲收官 · 慢享时光'];
  const plan=[];
  for(let d=0;d<days;d++){
    const day={theme:themes[d%3],cost:'¥'+Math.round(aiState.budget/days)+'/人',costNum:Math.round(aiState.budget/days),slots:[]};
    const s1=spots[d%spots.length];const s2=shops[d%shops.length];
    day.slots.push({time:'上午',title:s1.name,desc:`${s1.type} · ${s1.desc}`,img:s1.img,kind:'spot',swappable:true});
    day.slots.push({time:'中午',title:s2.name,desc:`地道午餐 · 人均${s2.price}`,img:s2.img,kind:'food',swappable:true});
    if(ichList.length&&d===0){
      const ic=ichList[0];
      day.slots.push({time:'下午',title:ic.name,desc:`非遗体验 · ${ic.price}`,img:ic.img,kind:'ich',swappable:true});
    }else{
      const s3=spots[(d+1)%spots.length];
      day.slots.push({time:'下午',title:s3.name,desc:`${s3.type} · ${s3.desc}`,img:s3.img,kind:'spot',swappable:true});
    }
    const s4=shops[(d+1)%shops.length];
    day.slots.push({time:'晚上',title:s4.name,desc:`晚餐寻味 · 人均${s4.price}`,img:s4.img,kind:'food',swappable:true});
    plan.push(day);
  }
  return plan;
}

function goDetailOrHeritage(to){
  if(to.type==='heritage')go('experience',{id:to.id});
  else go('detail',{type:to.type,id:to.id});
}

function render(view,params){
  const map={home:renderWan,wan:renderWan,chi:renderChi,dice:renderDice,
    city:()=>renderCity(params),detail:()=>renderDetail(params),
    upload:renderUpload,ai:renderAI,routes:renderRoutes,mine:renderMine,search:renderSearch,
    heritage:()=>renderHeritage(params),experience:()=>renderExperience(params),
    routedetail:()=>renderRouteDetail(params),aichat:renderAIChat};
  const fn=map[view];screen.innerHTML=fn?fn():'<div class="empty">页面走丢了</div>';
  const isTab=DOCK_VIEWS.includes(view);
  tabbar.style.display=isTab?'flex':'none';
  if(isTab){activeTab=view;setTabActive();}
  if(view==='wan'||view==='chi'||view==='home')startHero();
  enhanceScroll();
  screen.querySelectorAll('img:not([loading])').forEach(im=>im.setAttribute('loading','lazy'));
  screen.querySelectorAll('img').forEach(im=>{
    if(im.complete&&im.naturalWidth>0){im.classList.add('loaded');}
    else if(im.complete&&im.naturalWidth===0){imgFallback(im);}
    else if(!im.dataset.bh){
      im.dataset.bh='1';
      im.addEventListener('load',()=>im.classList.add('loaded'));
      im.addEventListener('error',()=>imgFallback(im));
    }
  });
}

function toggleFave(type,id,el){
  const k=faveKey(type,id);const on=!faves[k];
  if(on)faves[k]=1;else delete faves[k];
  localStorage.setItem('qnw_faves',JSON.stringify(faves));
  if(el){
    el.classList.toggle('on',on);
    if(el.classList.contains('v2-fav-corner'))el.textContent=on?'♥':'♡';
    else{const ic=el.querySelector('.ic');if(ic)ic.textContent=on?'♥':'♡';el.classList.toggle('fav',on);}
  }
  toast(on?'已加入收藏':'已取消收藏');
}
function hotSearch(q){
  const cid={苏州:'suzhou',泉州:'quanzhou',徽州:'huizhou',大理:'dali',平遥:'pingyao'}[q];
  if(cid){go('city',{id:cid});return;}
  if(['拙政园','留园','面线糊','簪花围'].includes(q)){
    const map={'拙政园':['spot','zhuozhengyuan'],'留园':['spot','liuyuan'],

function openWriteReview(name){
  openSheet(`
    <h3>为「${name}」写评价</h3>
    <div class="s-desc">真实有用的评价会帮助更多旅人。</div>
    <div class="form-row"><label>你的评分</label>
      <div style="font-size:1.6rem;letter-spacing:6px;color:var(--gold)" id="rvStars">
        ${[1,2,3,4,5].map(i=>`<span data-i="${i}" onclick="pickStar(${i})" style="cursor:pointer">★</span>`).join('')}
      </div></div>
    <div class="form-row"><label>分享你的体验 *</label><textarea id="rvText" placeholder="说说你的真实感受、最佳到访时间、避坑建议…" maxlength="200" style="min-height:90px"></textarea>
      <div class="char-count"><span id="rv_cc">0</span>/200</div></div>
    <button class="btn btn-primary" style="width:100%;padding:.8rem" onclick="submitReview()">发布评价</button>
  `);
  const t=document.getElementById('rvText');
  t.addEventListener('input',e=>{document.getElementById('rv_cc').textContent=e.target.value.length;});
  pickStar(5);
}
let rvStar=5;
function pickStar(i){
  rvStar=i;
  document.querySelectorAll('#rvStars span').forEach((s,idx)=>{s.style.opacity=idx<i?'1':'.3';});
}
function submitReview(){
  const t=document.getElementById('rvText');
  if(!t||!t.value.trim()){toast('请写几句你的体验');return;}
  closeSheet();setTimeout(()=>toast('✅ 评价已提交，审核通过后将展示'),250);
}

function openFavList(){
  const favs=Object.keys(faves).filter(k=>!k.startsWith('trip_'));
  if(!favs.length){toast('还没有收藏，去逛逛吧');return;}
  openSheet(`<h3>我的收藏</h3><div class="s-desc">共 ${favs.length} 项</div>
    ${favs.map(k=>{const[type,id]=k.split('_');const it=findItem(type,id);if(!it)return'';const city=type==='city'?CITY[id]:null;
      return `<div class="guess-card" style="margin-bottom:.55rem" onclick="closeSheet();${type==='city'?`go('city',{id:'${id}'})`:`go('detail',{type:'${type}',id:'${id}'})`}">
        <div class="thumb"><img src="${city?city.hero:it.img}" alt=""></div>
        <div class="gi"><b>${city?city.name:it.name}</b><small>${city?city.slogan:(it.desc||'')}</small></div></div>`;}).join('')}
    <button class="btn btn-outline" style="width:100%;margin-top:.6rem" onclick="clearFav()">清空收藏</button>`);
}
function clearFav(){Object.keys(faves).filter(k=>!k.startsWith('trip_')).forEach(k=>delete faves[k]);localStorage.setItem('qnw_faves',JSON.stringify(faves));closeSheet();toast('已清空收藏');}

/* ---------- 初始化 ---------- */
function tickClock(){const d=new Date();$('#clock').textContent=`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}
function init(){
  tickClock();setInterval(tickClock,30000);
  stack=[{view:'wan',params:{}}];go('wan',{},true);
}
init();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}
@keyframes imgPulse{0%,100%{opacity:.55}50%{opacity:1}}
.rank-card .cover img,.route-card .thumb img,.home-hero img,.dice-res .cover img,.v3-ich-card .cover img{animation:imgPulse 1.8s ease-in-out infinite}
.rank-card .cover img.loaded,.route-card .thumb img.loaded,.home-hero img.loaded,.dice-res .cover img.loaded{animation:none}</style>
</body>
