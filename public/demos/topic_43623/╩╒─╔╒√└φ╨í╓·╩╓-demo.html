<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>收纳整理助手 - 交互Demo</title>
<style>
:root {
  --green: #00B578;
  --green-light: #E8F5E9;
  --green-dark: #009963;
  --bg: #F0F9F4;
  --white: #FFFFFF;
  --text: #333333;
  --text-light: #999999;
  --text-mid: #666666;
  --border: #E8E8E8;
  --orange: #FF9800;
  --red: #FF4D4F;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --radius: 12px;
  --radius-sm: 8px;
  --nav-height: 56px;
  --status-height: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Phone Frame */
.phone-frame {
  width: 375px;
  height: 812px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3), inset 0 0 0 2px #1a1a1a;
}
@media (max-width: 420px) {
  .phone-frame { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
}

/* Status Bar */
.status-bar {
  height: var(--status-height);
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  font-size: 12px;
  color: white;
  position: relative;
  z-index: 100;
}
.status-bar .time { font-weight: 600; }
.status-bar .icons { display: flex; gap: 4px; align-items: center; }
.status-bar .icons span { font-size: 11px; }

/* Nav Bar */
.nav-bar {
  height: 44px;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 100;
  padding: 0 12px;
}
.nav-bar .title {
  color: white;
  font-size: 17px;
  font-weight: 600;
}
.nav-bar .back {
  position: absolute;
  left: 12px;
  color: white;
  font-size: 20px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.nav-bar .menu {
  position: absolute;
  right: 12px;
  color: white;
  font-size: 18px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.nav-bar .menu span {
  cursor: pointer;
  background: none;
  border: none;
  color: white;
  font-size: 18px;
}

/* Page Container */
.page-container {
  height: calc(812px - var(--status-height) - 44px - var(--nav-height));
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  position: relative;
}
@media (max-width: 420px) {
  .page-container { height: calc(100vh - var(--status-height) - 44px - var(--nav-height)); }
}

/* Bottom Navigation */
.bottom-nav {
  height: var(--nav-height);
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: space-around;
  border-top: 1px solid var(--border);
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.bottom-nav .nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px 12px;
  position: relative;
}
.bottom-nav .nav-item .icon {
  font-size: 22px;
  line-height: 1;
}
.bottom-nav .nav-item .label {
  font-size: 10px;
  color: var(--text-light);
}
.bottom-nav .nav-item.active .label {
  color: var(--green);
  font-weight: 600;
}
.bottom-nav .nav-item.active .icon {
  color: var(--green);
}
.bottom-nav .nav-add {
  width: 48px;
  height: 48px;
  background: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: white;
  cursor: pointer;
  border: none;
  margin-top: -20px;
  box-shadow: 0 4px 12px rgba(0,181,120,0.4);
  transition: transform 0.2s;
}
.bottom-nav .nav-add:active { transform: scale(0.92); }
.bottom-nav .badge {
  position: absolute;
  top: 0;
  right: 6px;
  width: 8px;
  height: 8px;
  background: var(--red);
  border-radius: 50%;
}

/* Page transitions */
.page { display: none; position: relative; }
.page.active { display: block; }
.page-slide-in {
  animation: slideIn 0.3s ease-out;
}
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes slideOut {
  from { transform: translateX(0); opacity: 1; }
  to { transform: translateX(100%); opacity: 0; }
}

/* ========== HOME PAGE ========== */
.home-header {
  background: var(--white);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.search-bar {
  flex: 1;
  height: 36px;
  background: #F5F5F5;
  border-radius: 18px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 6px;
}
.search-bar .search-icon { font-size: 16px; color: var(--text-light); }
.search-bar input {
  border: none;
  background: none;
  outline: none;
  font-size: 14px;
  color: var(--text);
  width: 100%;
}
.search-bar input::placeholder { color: #bbb; }
.home-header .filter-btn {
  width: 36px;
  height: 36px;
  background: #F5F5F5;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  cursor: pointer;
  border: none;
}

/* Category Tabs */
.category-tabs {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  background: var(--white);
  border-bottom: 1px solid var(--border);
}
.category-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 6px 14px;
  border-radius: 16px;
  font-size: 13px;
  white-space: nowrap;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--text-mid);
  transition: all 0.2s;
}
.cat-tab.active {
  background: var(--green);
  color: white;
  border-color: var(--green);
}

/* Item List */
.item-list { padding: 8px 16px 80px; }
.item-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s;
}
.item-card:active { transform: scale(0.98); }
.item-thumb {
  width: 60px;
  height: 60px;
  border-radius: var(--radius-sm);
  background: var(--green-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  overflow: hidden;
}
.item-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.item-info { flex: 1; min-width: 0; }
.item-info .name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-info .meta {
  font-size: 12px;
  color: var(--text-light);
  display: flex;
  gap: 8px;
  align-items: center;
}
.item-info .meta .tag {
  background: var(--green-light);
  color: var(--green);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
}
.item-info .location {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ========== LOCATION PAGE ========== */
.location-header {
  background: var(--white);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.location-header .title-section h3 {
  font-size: 16px;
  font-weight: 600;
}
.location-header .title-section p {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}
.location-header .actions {
  display: flex;
  gap: 8px;
}
.loc-btn {
  padding: 6px 14px;
  border-radius: 16px;
  font-size: 13px;
  cursor: pointer;
  border: none;
}
.loc-btn.outline {
  background: var(--white);
  border: 1px solid var(--border);
  color: var(--text-mid);
}
.loc-btn.primary {
  background: var(--green);
  color: white;
}

.location-list { padding: 8px 16px 80px; }
.location-group {
  margin-bottom: 12px;
}
.location-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 4px;
  cursor: pointer;
}
.location-group-header .room-icon {
  font-size: 20px;
}
.location-group-header .room-name {
  font-size: 15px;
  font-weight: 600;
  flex: 1;
}
.location-group-header .count {
  font-size: 12px;
  color: var(--text-light);
  background: #F5F5F5;
  padding: 2px 8px;
  border-radius: 10px;
}
.location-group-header .arrow {
  font-size: 12px;
  color: var(--text-light);
  transition: transform 0.2s;
}
.location-group-header .arrow.open {
  transform: rotate(90deg);
}
.location-items {
  padding-left: 28px;
  display: none;
}
.location-items.open { display: block; }
.loc-item {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.loc-item .emoji { font-size: 22px; }
.loc-item .loc-name { font-size: 14px; flex: 1; }
.loc-item .loc-count { font-size: 12px; color: var(--text-light); }

/* ========== ADD ITEM PAGE ========== */
.add-form { padding: 16px 16px 80px; }
.form-section {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.form-section-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.form-section-title .add-btn {
  width: 24px;
  height: 24px;
  background: var(--green-light);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--green);
  cursor: pointer;
  border: none;
}

/* Image Upload */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s;
}
.upload-area:hover { border-color: var(--green); }
.upload-area .cam-icon { font-size: 36px; margin-bottom: 8px; }
.upload-area .upload-text { font-size: 14px; color: var(--text-mid); }
.upload-area .upload-hint { font-size: 12px; color: var(--text-light); margin-top: 4px; }
.upload-preview {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.upload-preview .thumb {
  width: 72px;
  height: 72px;
  border-radius: var(--radius-sm);
  background: var(--green-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  position: relative;
}
.upload-preview .thumb .remove {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 20px;
  height: 20px;
  background: var(--red);
  color: white;
  border-radius: 50%;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 2px solid white;
}

/* Input */
.form-input {
  width: 100%;
  height: 44px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 14px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  background: var(--white);
}
.form-input:focus { border-color: var(--green); }
.form-input::placeholder { color: #ccc; }

/* Chip Grid */
.chip-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip {
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--text-mid);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all 0.2s;
}
.chip:active { transform: scale(0.95); }
.chip.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: var(--green);
  font-weight: 500;
}
.chip .chip-icon { font-size: 15px; }

/* Save Button */
.save-btn-wrap {
  position: absolute;
  bottom: var(--nav-height);
  left: 0;
  right: 0;
  padding: 10px 16px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0));
  background: transparent;
  z-index: 150;
}
.save-btn {
  width: 100%;
  height: 44px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: block;
  letter-spacing: 2px;
}
.save-btn:active { transform: scale(0.97); background: var(--green-dark); }

/* ========== CATEGORY PAGE ========== */
.cat-page-header {
  background: var(--white);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cat-page-header .info h3 { font-size: 16px; font-weight: 600; }
.cat-page-header .info p { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.cat-page-header .actions { display: flex; gap: 8px; }

.cat-tabs {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--border);
}
.cat-tab-btn {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 14px;
  color: var(--text-light);
  cursor: pointer;
  border: none;
  background: none;
  position: relative;
}
.cat-tab-btn.active {
  color: var(--text);
  font-weight: 600;
}
.cat-tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  background: var(--orange);
  border-radius: 2px;
}

.cat-list { padding: 8px 16px 80px; }
.cat-item {
  background: var(--white);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow);
}
.cat-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.cat-info { flex: 1; }
.cat-info .cat-name { font-size: 15px; font-weight: 600; }
.cat-info .cat-count { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.cat-actions { display: flex; gap: 12px; }
.cat-actions button {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  color: var(--text-light);
}
.cat-actions button:active { color: var(--text); }
.cat-actions .delete-btn:active { color: var(--red); }

/* ========== MY PAGE ========== */
.my-page { padding: 16px 16px 80px; }
.my-profile-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 16px;
}
.my-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--green-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.my-info .my-name { font-size: 18px; font-weight: 700; }
.my-info .my-id { font-size: 12px; color: var(--text-light); margin-top: 4px; }

.my-stats {
  display: flex;
  gap: 0;
  background: var(--white);
  border-radius: var(--radius);
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.stat-item {
  flex: 1;
  padding: 16px;
  text-align: center;
  border-right: 1px solid var(--border);
}
.stat-item:last-child { border-right: none; }
.stat-item .stat-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--green);
}
.stat-item .stat-label {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 4px;
}

.my-menu { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); }
.menu-item {
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #F5F5F5;
  cursor: pointer;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: #FAFAFA; }
.menu-item .menu-icon { font-size: 20px; }
.menu-item .menu-text { flex: 1; font-size: 15px; }
.menu-item .menu-arrow { font-size: 14px; color: var(--text-light); }

/* ========== ITEM DETAIL MODAL ========== */
.modal-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-content {
  background: var(--white);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 70%;
  overflow-y: auto;
  padding: 20px 16px 40px;
  animation: slideUp 0.3s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.detail-images {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  overflow-x: auto;
}
.detail-img {
  width: 100px;
  height: 100px;
  border-radius: var(--radius-sm);
  background: var(--green-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  flex-shrink: 0;
}
.detail-name {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}
.detail-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid #F5F5F5;
  font-size: 14px;
}
.detail-row .label { color: var(--text-light); min-width: 60px; }
.detail-row .value { color: var(--text); }
.detail-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}
.detail-actions button {
  flex: 1;
  height: 44px;
  border-radius: 22px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.detail-actions .edit-btn { background: var(--green-light); color: var(--green); }
.detail-actions .del-btn { background: #FFF0F0; color: var(--red); }

/* Toast */
.toast {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 999;
  display: none;
  text-align: center;
}
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut {
  0% { opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { opacity: 0; }
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .empty-text { font-size: 14px; }

/* Scrollbar hide */
.page-container::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div class="phone-frame" id="app">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time" id="statusTime">16:36</span>
    <div class="icons">
      <span>📶</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar" id="navBar">
    <button class="back" id="navBack" style="display:none;" onclick="goBack()">&lt;</button>
    <span class="title" id="navTitle">收纳整理助手</span>
  </div>

  <!-- Page Container -->
  <div class="page-container" id="pageContainer">

    <!-- HOME PAGE -->
    <div class="page active" id="page-home">
      <div class="home-header">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="搜索物品名称" id="searchInput" oninput="filterItems()">
        </div>
        <button class="filter-btn" onclick="toggleFilter()">☰</button>
      </div>
      <div class="category-tabs" id="categoryTabs">
        <span class="cat-tab active" data-cat="all" onclick="selectCat(this)">全部</span>
        <span class="cat-tab" data-cat="家居用品" onclick="selectCat(this)">🏠 家居用品</span>
        <span class="cat-tab" data-cat="电子设备" onclick="selectCat(this)">📱 电子设备</span>
        <span class="cat-tab" data-cat="书籍文件" onclick="selectCat(this)">📚 书籍文件</span>
        <span class="cat-tab" data-cat="游戏娱乐" onclick="selectCat(this)">🎮 游戏娱乐</span>
        <span class="cat-tab" data-cat="食品零食" onclick="selectCat(this)">🍰 食品零食</span>
        <span class="cat-tab" data-cat="服装鞋帽" onclick="selectCat(this)">👕 服装鞋帽</span>
      </div>
      <div class="item-list" id="itemList"></div>
    </div>

    <!-- LOCATION PAGE -->
    <div class="page" id="page-location">
      <div class="location-header">
        <div class="title-section">
          <h3>我的位置</h3>
          <p>共5个房间</p>
        </div>
        <div class="actions">
          <button class="loc-btn outline">排序</button>
          <button class="loc-btn primary">添加</button>
        </div>
      </div>
      <div class="location-list" id="locationList"></div>
    </div>

    <!-- ADD ITEM PAGE -->
    <div class="page" id="page-add">
      <div style="height:0"></div>
      <div class="add-form">
        <div class="form-section">
          <div class="upload-area" id="uploadArea" onclick="simulateUpload()">
            <div class="cam-icon">📷</div>
            <div class="upload-text">点击上传图片</div>
            <div class="upload-hint">最多可上传9张图片</div>
          </div>
          <div class="upload-preview" id="uploadPreview"></div>
        </div>

        <div class="form-section">
          <input type="text" class="form-input" id="itemNameInput" placeholder="请输入物品名称">
        </div>

        <div class="form-section">
          <div class="form-section-title">
            选择分类
            <button class="add-btn" onclick="showToast('添加新分类')">+</button>
          </div>
          <div class="chip-grid" id="categoryChips"></div>
        </div>

        <div class="form-section">
          <div class="form-section-title">
            选择位置
            <button class="add-btn" onclick="showToast('添加新位置')">+</button>
          </div>
          <div class="chip-grid" id="locationChips"></div>
        </div>
      </div>
    </div>

    <!-- CATEGORY PAGE -->
    <div class="page" id="page-category">
      <div class="cat-page-header">
        <div class="info">
          <h3>我的分类</h3>
          <p>共19个分类</p>
        </div>
        <div class="actions">
          <button class="loc-btn outline">排序</button>
          <button class="loc-btn primary">添加</button>
        </div>
      </div>
      <div class="cat-tabs">
        <button class="cat-tab-btn active" onclick="switchCatTab(this, 'cat')">分类</button>
        <button class="cat-tab-btn" onclick="switchCatTab(this, 'tag')">标签</button>
      </div>
      <div class="cat-list" id="catList"></div>
    </div>

    <!-- MY PAGE -->
    <div class="page" id="page-my">
      <div class="my-page">
        <div class="my-profile-card">
          <div class="my-avatar">👤</div>
          <div class="my-info">
            <div class="my-name">收纳达人</div>
            <div class="my-id">ID: SN20260624</div>
          </div>
        </div>
        <div class="my-stats">
          <div class="stat-item">
            <div class="stat-num" id="totalItems">0</div>
            <div class="stat-label">物品总数</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="totalCats">19</div>
            <div class="stat-label">分类数</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="totalLocs">5</div>
            <div class="stat-label">位置数</div>
          </div>
        </div>
        <div class="my-menu">
          <div class="menu-item" onclick="showToast('物品统计')">
            <span class="menu-icon">📊</span>
            <span class="menu-text">物品统计</span>
            <span class="menu-arrow">›</span>
          </div>
          <div class="menu-item" onclick="showToast('数据导出')">
            <span class="menu-icon">📤</span>
            <span class="menu-text">数据导出</span>
            <span class="menu-arrow">›</span>
          </div>
          <div class="menu-item" onclick="showToast('使用帮助')">
            <span class="menu-icon">❓</span>
            <span class="menu-text">使用帮助</span>
            <span class="menu-arrow">›</span>
          </div>
          <div class="menu-item" onclick="showToast('意见反馈')">
            <span class="menu-icon">💬</span>
            <span class="menu-text">意见反馈</span>
            <span class="menu-arrow">›</span>
          </div>
          <div class="menu-item" onclick="showToast('关于我们')">
            <span class="menu-icon">ℹ️</span>
            <span class="menu-text">关于我们</span>
            <span class="menu-arrow">›</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-page="home" onclick="switchPage('home')">
      <span class="icon">🏠</span>
      <span class="label">首页</span>
    </button>
    <button class="nav-item" data-page="location" onclick="switchPage('location')">
      <span class="icon">📍</span>
      <span class="label">位置</span>
      <span class="badge"></span>
    </button>
    <button class="nav-add" onclick="switchPage('add')">+</button>
    <button class="nav-item" data-page="category" onclick="switchPage('category')">
      <span class="icon">📁</span>
      <span class="label">分类</span>
    </button>
    <button class="nav-item" data-page="my" onclick="switchPage('my')">
      <span class="icon">👤</span>
      <span class="label">我的</span>
    </button>
  </div>

  <!-- Save Button (fixed at bottom, only shown on add page) -->
  <div class="save-btn-wrap" id="saveBtnWrap" style="display:none;">
    <button class="save-btn" onclick="saveItem()">保存</button>
  </div>

  <!-- Item Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-content" id="detailContent"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<script>
// ========== DATA ==========
const categories = [
  { name: '游戏娱乐', icon: '🎮', color: '#E8F5E9', count: 3 },
  { name: '家居用品', icon: '🏠', color: '#E8F5E9', count: 12 },
  { name: '模型玩具', icon: '✈️', color: '#FFEBEE', count: 2 },
  { name: '家用电器', icon: '📺', color: '#F3E5F5', count: 7 },
  { name: '宠物用品', icon: '🐾', color: '#E0F2F1', count: 0 },
  { name: '食品零食', icon: '🍰', color: '#FFF3E0', count: 1 },
  { name: '电子设备', icon: '📱', color: '#FFEBEE', count: 2 },
  { name: '书籍文件', icon: '📚', color: '#F3E5F5', count: 1 },
  { name: '服装鞋帽', icon: '👕', color: '#FFF3E0', count: 2 },
  { name: '日用品', icon: '🧴', color: '#E0F2F1', count: 3 },
  { name: '衣物鞋帽', icon: '👔', color: '#EFEBE9', count: 2 },
  { name: '厨房用品', icon: '🍳', color: '#E0F2F1', count: 0 },
  { name: '收藏品', icon: '💎', color: '#FFF3E0', count: 1 },
  { name: '摄影器材', icon: '📷', color: '#F5F5F5', count: 0 },
  { name: '汽车用品', icon: '🚗', color: '#F5F5F5', count: 2 },
  { name: '绘画工具', icon: '🎨', color: '#FFF3E0', count: 0 },
];

const locations = [
  { room: '书房', icon: '📚', sub: [
    { name: '书房/抽屉', icon: '📦', items: 3 },
    { name: '书房/书桌', icon: '🖥️', items: 5 },
    { name: '书房/书桌/第一个抽屉', icon: '📁', items: 2 },
    { name: '书房/书柜', icon: '📚', items: 4 },
  ]},
  { room: '卧室', icon: '🛏️', sub: [
    { name: '卧室/衣柜', icon: '👔', items: 6 },
    { name: '卧室/床头柜', icon: '🗃️', items: 3 },
    { name: '卧室/梳妆台', icon: '🪞', items: 2 },
  ]},
  { room: '客厅', icon: '🛋️', sub: [
    { name: '客厅/电视柜', icon: '📺', items: 4 },
    { name: '客厅/茶几', icon: '🫖', items: 2 },
    { name: '客厅/沙发', icon: '🛋️', items: 1 },
  ]},
  { room: '厨房', icon: '🍳', sub: [
    { name: '厨房/橱柜', icon: '🗄️', items: 5 },
    { name: '厨房/冰箱', icon: '🧊', items: 3 },
  ]},
  { room: '卫生间', icon: '🚿', sub: [
    { name: '卫生间/镜柜', icon: '🪞', items: 2 },
    { name: '卫生间/置物架', icon: '🧴', items: 4 },
  ]},
];

let items = [
  { id: 1, name: '无线蓝牙耳机', emoji: '🎧', cat: '电子设备', loc: '书房/书桌/第一个抽屉', images: ['🎧'] },
  { id: 2, name: '护照', emoji: '📕', cat: '书籍文件', loc: '书房/书柜', images: ['📕'] },
  { id: 3, name: 'Switch游戏机', emoji: '🎮', cat: '游戏娱乐', loc: '客厅/电视柜', images: ['🎮'] },
  { id: 4, name: '充电宝', emoji: '🔋', cat: '电子设备', loc: '卧室/床头柜', images: ['🔋'] },
  { id: 5, name: '螺丝刀套装', emoji: '🔧', cat: '家居用品', loc: '书房/抽屉', images: ['🔧'] },
  { id: 6, name: '血压计', emoji: '🩺', cat: '家居用品', loc: '客厅/茶几', images: ['🩺'] },
  { id: 7, name: '乐高积木套装', emoji: '🧱', cat: '模型玩具', loc: '书房/书桌', images: ['🧱'] },
  { id: 8, name: '夏季T恤', emoji: '👕', cat: '服装鞋帽', loc: '卧室/衣柜', images: ['👕'] },
  { id: 9, name: '猫粮', emoji: '🐟', cat: '宠物用品', loc: '厨房/橱柜', images: ['🐟'] },
  { id: 10, name: '充电线', emoji: '🔌', cat: '电子设备', loc: '卧室/床头柜', images: ['🔌'] },
  { id: 11, name: '指甲剪', emoji: '✂️', cat: '日用品', loc: '卫生间/置物架', images: ['✂️'] },
  { id: 12, name: '高考准考证', emoji: '📝', cat: '书籍文件', loc: '书房/书桌/第一个抽屉', images: ['📝'] },
];

let selectedCat = null;
let selectedLoc = null;
let uploadedImages = [];
let currentCat = 'all';
let nextId = 13;

// ========== INIT ==========
function init() {
  updateTime();
  setInterval(updateTime, 60000);
  renderItemList();
  renderLocationList();
  renderCategoryList();
  renderCategoryChips();
  renderLocationChips();
  updateStats();
}

function updateTime() {
  const now = new Date();
  document.getElementById('statusTime').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

// ========== PAGE SWITCHING ==========
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('page-' + page).classList.add('page-slide-in');
  setTimeout(() => document.getElementById('page-' + page).classList.remove('page-slide-in'), 300);

  document.querySelectorAll('.bottom-nav .nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`.bottom-nav .nav-item[data-page="${page}"]`);
  if (navItem) navItem.classList.add('active');

  const titles = { home: '收纳整理助手', location: '位置管理', add: '添加物品', category: '分类管理', my: '我的' };
  document.getElementById('navTitle').textContent = titles[page] || '收纳整理助手';

  // Show/hide nav bar, bottom nav, save button and back button for add page
  const bottomNav = document.getElementById('bottomNav');
  const saveBtnWrap = document.getElementById('saveBtnWrap');
  const navBack = document.getElementById('navBack');
  if (page === 'add') {
    bottomNav.style.display = 'none';
    saveBtnWrap.style.display = 'block';
    navBack.style.display = 'block';
  } else {
    bottomNav.style.display = 'flex';
    saveBtnWrap.style.display = 'none';
    navBack.style.display = 'none';
  }

  if (page === 'home') renderItemList();
  if (page === 'my') updateStats();
}

// ========== GO BACK ==========
function goBack() {
  switchPage('home');
}

// ========== HOME PAGE ==========
function renderItemList() {
  const list = document.getElementById('itemList');
  const search = document.getElementById('searchInput') ? document.getElementById('searchInput').value.toLowerCase() : '';
  let filtered = items;
  if (currentCat !== 'all') filtered = filtered.filter(i => i.cat === currentCat);
  if (search) filtered = filtered.filter(i => i.name.toLowerCase().includes(search) || i.loc.toLowerCase().includes(search));

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">暂无物品</div></div>';
    return;
  }
  list.innerHTML = filtered.map(item => `
    <div class="item-card" onclick="showDetail(${item.id})">
      <div class="item-thumb">${item.emoji}</div>
      <div class="item-info">
        <div class="name">${item.name}</div>
        <div class="meta">
          <span class="tag">${getCatIcon(item.cat)} ${item.cat}</span>
        </div>
        <div class="location">📍 ${item.loc}</div>
      </div>
    </div>
  `).join('');
}

function getCatIcon(cat) {
  const c = categories.find(c => c.name === cat);
  return c ? c.icon : '📦';
}

function selectCat(el) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = el.dataset.cat;
  renderItemList();
}

function filterItems() { renderItemList(); }

// ========== ITEM DETAIL ==========
function showDetail(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const modal = document.getElementById('detailModal');
  document.getElementById('detailContent').innerHTML = `
    <div class="modal-handle"></div>
    <div class="detail-images">
      ${item.images.map(img => `<div class="detail-img">${img}</div>`).join('')}
    </div>
    <div class="detail-name">${item.emoji} ${item.name}</div>
    <div class="detail-row"><span class="label">分类</span><span class="value">${getCatIcon(item.cat)} ${item.cat}</span></div>
    <div class="detail-row"><span class="label">位置</span><span class="value">📍 ${item.loc}</span></div>
    <div class="detail-row"><span class="label">图片</span><span class="value">${item.images.length}张</span></div>
    <div class="detail-actions">
      <button class="edit-btn" onclick="editItem(${item.id})">编辑</button>
      <button class="del-btn" onclick="deleteItem(${item.id})">删除</button>
    </div>
  `;
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('show');
}
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function editItem(id) {
  closeModal();
  const item = items.find(i => i.id === id);
  if (!item) return;
  switchPage('add');
  document.getElementById('itemNameInput').value = item.name;
  selectedCat = item.cat;
  selectedLoc = item.loc;
  renderCategoryChips();
  renderLocationChips();
  showToast('编辑模式：' + item.name);
}

function deleteItem(id) {
  closeModal();
  items = items.filter(i => i.id !== id);
  renderItemList();
  updateStats();
  showToast('已删除');
}

// ========== LOCATION PAGE ==========
function renderLocationList() {
  const list = document.getElementById('locationList');
  list.innerHTML = locations.map((loc, i) => {
    const totalItems = loc.sub.reduce((s, sub) => s + sub.items, 0);
    return `
      <div class="location-group">
        <div class="location-group-header" onclick="toggleLocationGroup(this)">
          <span class="room-icon">${loc.icon}</span>
          <span class="room-name">${loc.room}</span>
          <span class="count">${totalItems}件</span>
          <span class="arrow">›</span>
        </div>
        <div class="location-items">
          ${loc.sub.map(sub => `
            <div class="loc-item">
              <span class="emoji">${sub.icon}</span>
              <span class="loc-name">${sub.name}</span>
              <span class="loc-count">${sub.items}件</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleLocationGroup(header) {
  const items = header.nextElementSibling;
  const arrow = header.querySelector('.arrow');
  items.classList.toggle('open');
  arrow.classList.toggle('open');
}

// ========== ADD ITEM PAGE ==========
function renderCategoryChips() {
  const grid = document.getElementById('categoryChips');
  grid.innerHTML = categories.map(c => `
    <span class="chip ${selectedCat === c.name ? 'selected' : ''}" onclick="selectCategoryChip('${c.name}')">
      <span class="chip-icon">${c.icon}</span>${c.name}
    </span>
  `).join('');
}

function renderLocationChips() {
  const grid = document.getElementById('locationChips');
  const allLocs = [];
  locations.forEach(loc => {
    allLocs.push({ name: loc.room, icon: loc.icon });
    loc.sub.forEach(sub => allLocs.push({ name: sub.name, icon: sub.icon }));
  });
  grid.innerHTML = allLocs.map(l => `
    <span class="chip ${selectedLoc === l.name ? 'selected' : ''}" onclick="selectLocationChip('${l.name}')">
      <span class="chip-icon">${l.icon}</span>${l.name}
    </span>
  `).join('');
}

function selectCategoryChip(name) {
  selectedCat = selectedCat === name ? null : name;
  renderCategoryChips();
}

function selectLocationChip(name) {
  selectedLoc = selectedLoc === name ? null : name;
  renderLocationChips();
}

function simulateUpload() {
  if (uploadedImages.length >= 9) { showToast('最多上传9张图片'); return; }
  const emojis = ['📷','🖼️','📦','🎮','📱','🔧','📚','👕','🍳'];
  uploadedImages.push(emojis[uploadedImages.length % emojis.length]);
  renderUploadPreview();
}

function renderUploadPreview() {
  const preview = document.getElementById('uploadPreview');
  preview.innerHTML = uploadedImages.map((img, i) => `
    <div class="thumb">
      ${img}
      <span class="remove" onclick="removeUpload(${i})">×</span>
    </div>
  `).join('');
}

function removeUpload(index) {
  uploadedImages.splice(index, 1);
  renderUploadPreview();
}

function saveItem() {
  const name = document.getElementById('itemNameInput').value.trim();
  if (!name) { showToast('请输入物品名称'); return; }
  if (!selectedCat) { showToast('请选择分类'); return; }
  if (!selectedLoc) { showToast('请选择位置'); return; }

  const catObj = categories.find(c => c.name === selectedCat);
  items.unshift({
    id: nextId++,
    name: name,
    emoji: catObj ? catObj.icon : '📦',
    cat: selectedCat,
    loc: selectedLoc,
    images: uploadedImages.length > 0 ? [...uploadedImages] : ['📦']
  });

  // Reset form
  document.getElementById('itemNameInput').value = '';
  selectedCat = null;
  selectedLoc = null;
  uploadedImages = [];
  renderUploadPreview();
  renderCategoryChips();
  renderLocationChips();

  showToast('保存成功！');
  updateStats();
  setTimeout(() => switchPage('home'), 800);
}

// ========== CATEGORY PAGE ==========
function renderCategoryList() {
  const list = document.getElementById('catList');
  list.innerHTML = categories.map(c => `
    <div class="cat-item">
      <div class="cat-icon" style="background:${c.color}">${c.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
        <div class="cat-count">${c.count}件物品</div>
      </div>
      <div class="cat-actions">
        <button onclick="showToast('编辑分类')">✏️</button>
        <button class="delete-btn" onclick="showToast('删除分类')">🗑️</button>
      </div>
    </div>
  `).join('');
}

function switchCatTab(btn, type) {
  document.querySelectorAll('.cat-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'tag') {
    document.getElementById('catList').innerHTML = `
      <div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-text">暂无标签</div></div>
    `;
  } else {
    renderCategoryList();
  }
}

// ========== MY PAGE ==========
function updateStats() {
  document.getElementById('totalItems').textContent = items.length;
}

// ========== UTILS ==========
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show';
  setTimeout(() => toast.className = 'toast', 2000);
}

function toggleFilter() {
  showToast('筛选功能');
}

// ========== START ==========
init();
</script>
</body>
</html>
