html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}

.nav-tab{position:relative;cursor:pointer;padding:6px 16px;border-radius:6px;font-size:14px;color:#94a3b8;transition:all .2s}
.nav-tab:hover{color:#e2e8f0;background:rgba(255,255,255,.06)}

.sub-menu-item{padding:8px 16px 8px 28px;font-size:13px;color:#64748b;cursor:pointer;border-radius:6px;transition:all .15s}
.sub-menu-item:hover{background:#f1f5f9;color:#334155}
.sub-menu-item.active{background:#e0f2fe;color:#0284c7;font-weight:600}
.card{border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.gantt-bar{height:26px;border-radius:4px;position:absolute;cursor:pointer;display:flex;align-items:center;padding:0 8px;font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:filter .15s,transform .15s}
.gantt-bar:hover{filter:brightness(1.12);transform:scaleY(1.15);z-index:10}
.gantt-bar.maintenance{background:repeating-linear-gradient(45deg,#94a3b8,#94a3b8 4px,#b0bec5 4px,#b0bec5 8px)!important;color:#fff}
.tooltip{position:fixed;background:#1e293b;color:#f1f5f9;padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.6;z-index:9999;pointer-events:none;max-width:300px;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.step-pill{padding:6px 20px;border-radius:999px;font-size:13px;font-weight:500;border:2px solid #e2e8f0;color:#94a3b8;transition:all .25s}
.step-pill.active{border-color:#8b5cf6;background:#8b5cf6;color:#fff;box-shadow:0 2px 8px rgba(139,92,246,.35)}
.step-pill.done{border-color:#a78bfa;background:#ede9fe;color:#7c3aed}
.fade-in{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hatch-pattern{background:repeating-linear-gradient(45deg,#94a3b8,#94a3b8 3px,#b0bec5 3px,#b0bec5 6px)}
</style>

function renderNav() {

      <svg class="w-4 h-4 inline -mt-0.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="${t.icon}"/></svg>
      ${t.label}
    </div>
  `).join('');
}

function renderSideMenu() {
  const menu = document.getElementById('sideMenu');

  menu.innerHTML = `
    <div class="text-xs text-slate-400 font-semibold uppercase tracking-wider px-3 mb-2">${NAV_TABS.find(t=>t.id===currentPage)?.label||''}</div>

  `;
}

function renderContent() {
  const main = document.getElementById('mainContent');

function initGanttChart() {
  const container = document.getElementById('ganttChart');
  if(!container) return;
  const rowH = 50, headerH = 40, dayW = 36;
  const startDay = new Date('2026-07-01');
  const totalDays = 31;
  const width = totalDays * dayW + 120;

  let html = `<div style="position:relative;width:${width}px;min-height:${PROCESSES.length*rowH+headerH+20}px">`;

  // 时间轴头部
  html += `<div style="position:sticky;top:0;z-index:5;background:#f8fafc;height:${headerH}px;display:flex;align-items:center">`;
  html += `<div style="width:120px;flex-shrink:0;padding:0 8px;font-size:12px;font-weight:600;color:#64748b">工序</div>`;
  for(let d=0;d<totalDays;d++){
    const dt = new Date(startDay); dt.setDate(dt.getDate()+d);
    const day = dt.getDate();
    const isWeekend = dt.getDay()===0||dt.getDay()===6;
    const bg = isWeekend ? '#fef3c7' : '#f8fafc';
    html += `<div style="width:${dayW}px;flex-shrink:0;text-align:center;font-size:10px;color:${isWeekend?'#b45309':'#94a3b8'};background:${bg};line-height:${headerH}px">${day}</div>`;
  }
  html += `</div>`;

  // 工序行
  PROCESSES.forEach((proc, pi) => {
    const y = pi * rowH + headerH;
    html += `<div style="display:flex;position:relative;height:${rowH}px;border-top:1px solid #f1f5f9">`;
    html += `<div style="width:120px;flex-shrink:0;padding:0 12px;font-size:13px;font-weight:500;color:#334155;display:flex;align-items:center;background:#fafbfc">${proc}</div>`;
    html += `<div style="position:relative;flex:1;height:${rowH}px">`;
    // 网格线
    for(let d=0;d<totalDays;d++){
      const dt = new Date(startDay); dt.setDate(dt.getDate()+d);
      const isWeekend = dt.getDay()===0||dt.getDay()===6;
      html += `<div style="position:absolute;left:${d*dayW}px;top:0;width:${dayW}px;height:${rowH}px;border-left:1px solid ${isWeekend?'#fde68a':'#f1f5f9'};background:${isWeekend?'#fffbeb':'transparent'}"></div>`;
    }
    // 工单条
    WORK_ORDERS.filter(w => w.process === proc).forEach(w => {
      const dStart = Math.floor((new Date(w.start) - startDay) / 86400000);
      let dEnd = Math.floor((new Date(w.end) - startDay) / 86400000);
      if(w.isMaintenance) {
        const hours = w.mEnd - w.mStart;
        const frac = hours / 24;
        const x = dStart * dayW + (w.mStart/24)*dayW;
        const w_ = frac * dayW;
        html += `<div class="gantt-bar maintenance" style="left:${x}px;top:12px;width:${w_}px;font-size:10px" data-wid="${w.id}" onmouseenter="showGanttTip(event,'${w.id}')" onmouseleave="hideTip()" onclick="selectWO('${w.id}')">检修</div>`;
      } else {
        const x = dStart * dayW;
        const w_ = (dEnd - dStart + 1) * dayW;
        const color = STEEL_COLORS[w.steel] || '#64748b';
        html += `<div class="gantt-bar" style="left:${x}px;top:12px;width:${w_}px;background:${color}" data-wid="${w.id}" onmouseenter="showGanttTip(event,'${w.id}')" onmouseleave="hideTip()" onclick="selectWO('${w.id}')">${w.steel} ${w.spec} ${w.period}</div>`;
      }
    });
    html += `</div></div>`;
  });

  html += `</div>`;
  container.innerHTML = html;
}

function showGanttTip(e, wid) {
  const w = WORK_ORDERS.find(x=>x.id===wid);
  if(!w) return;
  const tip = document.getElementById('tooltip');
  if(w.isMaintenance) {
    tip.innerHTML = `<b>${w.id}</b> 检修工单<br>工序：${w.process}<br>时间：${w.start.slice(5)} ${String(w.mStart).padStart(2,'0')}:00 ~ ${String(w.mEnd).padStart(2,'0')}:00`;
  } else {
    tip.innerHTML = `<b>${w.id}</b><br>钢种：${w.steel} | 规格：${w.spec}<br>旬：${w.period} | 资源量：${w.resource}t<br>计划：${w.start.slice(5)} ~ ${w.end.slice(5)}`;
  }
  tip.style.left = (e.clientX+12)+'px';
  tip.style.top = (e.clientY-10)+'px';
  tip.classList.remove('hidden');
}

function hideTip() {
  document.getElementById('tooltip').classList.add('hidden');
}

function selectWO(wid) {
  const w = WORK_ORDERS.find(x=>x.id===wid);
  if(!w) return;
  selectedWorkOrder = w;
  const detail = document.getElementById('ganttDetail');
  const content = document.getElementById('ganttDetailContent');
  detail.style.display = 'block';
  if(w.isMaintenance) {
    content.innerHTML = `<div class="grid grid-cols-2 gap-3 text-sm">

      <div><span class="text-slate-400">钢种：</span>${w.steel}</div>

      <div><span class="text-slate-400">工序：</span>${w.process}</div>
      <div><span class="text-slate-400">资源量：</span>${w.resource}t</div>
      <div><span class="text-slate-400">开始：</span>${w.start}</div>
      <div><span class="text-slate-400">结束：</span>${w.end}</div>

  }
}

const GROUP_COLORS = {'G1':'#f43f5e','G2':'#8b5cf6','G3':'#0ea5e9'};
const WO_GROUPS = {W101:'G1',W201:'G1',W301:'G1',W401:'G1',W501:'G1',W601:'G1',W102:'G2',W202:'G2',W203:'G2',W302:'G2',W402:'G2',W502:'G2',W103:'G3',W204:'G3'};

function initResourceChart() {
  const container = document.getElementById('resourceChart');
  if(!container) return;
  const rowH = 70, headerH = 40, dayW = 36;
  const startDay = new Date('2026-07-01');
  const totalDays = 31;
  const width = totalDays * dayW + 120;
  const showHist = document.getElementById('showHistogram')?.checked;

  let html = `<div style="position:relative;width:${width}px;min-height:${PROCESSES.length*rowH+headerH+20}px">`;

  // 时间轴
  html += `<div style="position:sticky;top:0;z-index:5;background:#f8fafc;height:${headerH}px;display:flex;align-items:center">`;
  html += `<div style="width:120px;flex-shrink:0;padding:0 8px;font-size:12px;font-weight:600;color:#64748b">工序</div>`;
  for(let d=0;d<totalDays;d++){
    const dt=new Date(startDay);dt.setDate(dt.getDate()+d);
    const isWeekend=dt.getDay()===0||dt.getDay()===6;
    html+=`<div style="width:${dayW}px;flex-shrink:0;text-align:center;font-size:10px;color:${isWeekend?'#b45309':'#94a3b8'};background:${isWeekend?'#fef3c7':'#f8fafc'};line-height:${headerH}px">${dt.getDate()}</div>`;
  }
  html += `</div>`;

  PROCESSES.forEach((proc, pi) => {
    html += `<div style="display:flex;position:relative;height:${rowH}px;border-top:1px solid #f1f5f9">`;
    html += `<div style="width:120px;flex-shrink:0;padding:0 12px;font-size:13px;font-weight:500;color:#334155;display:flex;align-items:center;background:#fafbfc">${proc}</div>`;
    html += `<div style="position:relative;flex:1;height:${rowH}px">`;
    for(let d=0;d<totalDays;d++){
      const dt=new Date(startDay);dt.setDate(dt.getDate()+d);
      const isWeekend=dt.getDay()===0||dt.getDay()===6;
      html+=`<div style="position:absolute;left:${d*dayW}px;top:0;width:${dayW}px;height:${rowH}px;border-left:1px solid ${isWeekend?'#fde68a':'#f1f5f9'};background:${isWeekend?'#fffbeb':'transparent'}"></div>`;
    }
    // 工单条
    WORK_ORDERS.filter(w=>w.process===proc).forEach(w=>{
      const dStart=Math.floor((new Date(w.start)-startDay)/86400000);
      let dEnd=Math.floor((new Date(w.end)-startDay)/86400000);
      if(w.isMaintenance){
        const x=dStart*dayW+(w.mStart/24)*dayW;
        const w_=(w.mEnd-w.mStart)/24*dayW;
        html+=`<div class="gantt-bar maintenance" style="left:${x}px;top:6px;width:${w_}px;font-size:10px" onclick="highlightGroup(null)">检修</div>`;
      } else {
        const x=dStart*dayW;
        const w_=(dEnd-dStart+1)*dayW;
        const color = colorMode==='steel'?(STEEL_COLORS[w.steel]||'#64748b'):(GROUP_COLORS[WO_GROUPS[w.id]]||'#64748b');
        html+=`<div class="gantt-bar" style="left:${x}px;top:6px;width:${w_}px;background:${color}" onclick="highlightGroup('${WO_GROUPS[w.id]||''}')">${w.steel} ${w.spec}</div>`;
      }
    });
    // 资源直方图
    if(showHist){
      const dailyRes = new Array(totalDays).fill(0);
      WORK_ORDERS.filter(w=>w.process===proc&&!w.isMaintenance).forEach(w=>{
        const dStart=Math.floor((new Date(w.start)-startDay)/86400000);
        const dEnd=Math.floor((new Date(w.end)-startDay)/86400000);
        for(let d=dStart;d<=dEnd&&d<totalDays;d++) dailyRes[d]+=w.resource/(dEnd-dStart+1);
      });
      const maxR=Math.max(...dailyRes,1);
      const histH=18, histTop=38;
      for(let d=0;d<totalDays;d++){
        if(dailyRes[d]>0){
          const h=Math.max(2,(dailyRes[d]/maxR)*histH);
          html+=`<div style="position:absolute;left:${d*dayW+2}px;top:${histTop+histH-h}px;width:${dayW-4}px;height:${h}px;background:rgba(59,130,246,0.35);border-radius:2px 2px 0 0" title="${dailyRes[d].toFixed(0)}t"></div>`;
        }
      }
    }
    html += `</div></div>`;
  });

  html += `</div>`;
  container.innerHTML = html;
}

function highlightGroup(gid) {
  const detail = document.getElementById('resDetail');

  if(!gid) { detail.style.display='none'; return; }
  detail.style.display = 'block';

  content.innerHTML = `<table class="w-full text-sm"><thead><tr class="bg-slate-50"><th class="p-2 text-left">工单</th><th class="p-2">钢种</th><th class="p-2">规格</th><th class="p-2">工序</th><th class="p-2">资源量</th><th class="p-2">开始</th><th class="p-2">结束</th></tr></thead><tbody>${groupWOs.map((w,i)=>`<tr class="${i%2?'bg-slate-50':''}"><td class="p-2 text-center font-medium text-sky-600">${w.id}</td><td class="p-2 text-center">${w.steel}</td><td class="p-2 text-center">${w.spec}</td><td class="p-2 text-center">${w.process}</td><td class="p-2 text-center">${w.resource}t</td><td class="p-2 text-center">${w.start.slice(5)}</td><td class="p-2 text-center">${w.end.slice(5)}</td></tr>`).join('')}</tbody></table>`;
}

function renderMiniGantt(adjusted) {
  const procs = ['精炼','连铸','轧钢'];
  const dayW = 28, rowH = 32;
  const bars = adjusted ? [
    {proc:'精炼',start:2.9,end:3.9,steel:'HRB400',label:'W301'},
    {proc:'连铸',start:3.75,end:5.75,steel:'HRB400',label:'W401'},
    {proc:'轧钢',start:5.5,end:7.5,steel:'HRB400',label:'W501'}
  ] : [
    {proc:'精炼',start:3,end:4,steel:'HRB400',label:'W301'},
    {proc:'连铸',start:4,end:6,steel:'HRB400',label:'W401'},
    {proc:'轧钢',start:6,end:8,steel:'HRB400',label:'W501'}
  ];
  let html = `<div style="position:relative">`;
  procs.forEach((p,pi)=>{
    html += `<div style="display:flex;align-items:center;height:${rowH}px;border-bottom:1px solid #f1f5f9">
      <div style="width:36px;flex-shrink:0;font-size:11px;color:#64748b;text-align:center">${p}</div>
      <div style="position:relative;flex:1;height:${rowH}px">`;
    for(let d=0;d<10;d++){
      html+=`<div style="position:absolute;left:${d*dayW}px;top:8px;width:${dayW}px;height:16px;border-left:1px solid #f1f5f9"></div>`;
    }
    bars.filter(b=>b.proc===p).forEach(b=>{
      const x=b.start*dayW;
      const w_=(b.end-b.start)*dayW;
      html+=`<div class="gantt-bar" style="left:${x}px;top:8px;width:${w_}px;background:${STEEL_COLORS[b.steel]};font-size:10px">${b.label}</div>`;
    });
    html += `</div></div>`;
  });
  // 时间标签
  html += `<div style="display:flex;margin-left:36px">`;
  for(let d=1;d<=10;d++){
    html+=`<div style="width:${dayW}px;text-align:center;font-size:9px;color:#94a3b8">7/${d}</div>`;
  }
  html += `</div></div>`;
  return html;
}

function initBaseData() {

}

function renderBDPanel() {
  const container = document.getElementById('bdContent');

  const data = BASE_DATA[baseDataTab];
  if(!data) return;

  const lList = data.L;
  const selectedL = bdL || lList[0]?.id;
  const mList = data.M?.[selectedL] || [];
  const selectedM = bdM || mList[0]?.id;
  const sList = data.S?.[selectedM] || [];
  const selectedS = bdS || sList[0]?.id;
  const dList = data.D?.[selectedS] || [];

  container.innerHTML = `
    <div class="flex" style="min-height:360px">
      <!-- L 级 -->
      <div class="w-56 border-r border-slate-100">
        <div class="p-3 bg-slate-50 text-xs font-semibold text-slate-400 uppercase tracking-wider">L 级分类</div>

      </div>
      <!-- M 级 -->
      <div class="w-56 border-r border-slate-100">
        <div class="p-3 bg-slate-50 text-xs font-semibold text-slate-400 uppercase tracking-wider">M 级分类</div>
        ${mList.length?mList.map(m=>`<div class="px-4 py-2.5 cursor-pointer text-sm transition hover:bg-sky-50 ${m.id===selectedM?'bg-sky-50 text-sky-600 font-medium border-r-2 border-sky-500':'text-slate-600'}" onclick="bdM='${m.id}';bdS=null;renderBDPanel()">${m.id} ${m.name}</div>`).join(''):'<div class="p-4 text-sm text-slate-300">暂无数据</div>'}
      </div>
      <!-- S 级 -->
      <div class="w-56 border-r border-slate-100">
        <div class="p-3 bg-slate-50 text-xs font-semibold text-slate-400 uppercase tracking-wider">S 级分类</div>
        ${sList.length?sList.map(s=>`<div class="px-4 py-2.5 cursor-pointer text-sm transition hover:bg-sky-50 ${s.id===selectedS?'bg-sky-50 text-sky-600 font-medium border-r-2 border-sky-500':'text-slate-600'}" onclick="bdS='${s.id}';renderBDPanel()">${s.id} ${s.name}</div>`).join(''):'<div class="p-4 text-sm text-slate-300">暂无数据</div>'}
      </div>
      <!-- 主档 -->
      <div class="flex-1">
        <div class="p-3 bg-slate-50 text-xs font-semibold text-slate-400 uppercase tracking-wider">主档列表</div>
        ${dList.length?`<table class="w-full text-sm"><thead><tr class="bg-slate-50"><th class="p-2 text-left text-slate-500">编码</th><th class="p-2 text-left text-slate-500">名称</th>${baseDataTab==='product'?'<th class="p-2 text-left text-slate-500">规格</th>':''}</tr></thead><tbody>${dList.map((d,i)=>`<tr class="${i%2?'bg-slate-50':''}"><td class="p-2 font-mono text-xs">${d.id}</td><td class="p-2">${d.name}</td>${baseDataTab==='product'?`<td class="p-2 text-slate-500">${d.spec||''}</td>`:''}</tr>`).join('')}</tbody></table>`:'<div class="p-4 text-sm text-slate-300">暂无数据</div>'}
      </div>
    </div>
  `;
}

window.addEventListener('hashchange', () => {
  const hash = window.location.hash.slice(1);
  if(hash && NAV_TABS.find(t=>t.id===hash)) {

    renderAll();
  }
});

window.addEventListener('DOMContentLoaded', () => {
  const hash = window.location.hash.slice(1);
  if(hash && NAV_TABS.find(t=>t.id===hash)) currentPage = hash;
  renderAll();
});

// 鼠标移动更新tooltip位置
document.addEventListener('mousemove', (e) => {
  const tip = document.getElementById('tooltip');
  if(!tip.classList.contains('hidden')) {
    tip.style.left = (e.clientX+12)+'px';
    tip.style.top = (e.clientY-10)+'px';
  }
});
