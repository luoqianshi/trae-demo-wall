  <script>
    // ===== State =====
    const state = {
      cameraActive: false,
      isListening: false,
      isSpeaking: false,
      history: [],
      aiInterval: null,
      recognition: null,
      stream: null,
      sceneIndex: 0,
      detectTimer: null
    };

    // ===== DOM =====
    const $ = id => document.getElementById(id);
    const video = $('cameraVideo');
    const sceneImage = $('sceneImage');
    const statusDot = $('statusDot');
    const statusText = $('statusText');
    const aiPanel = $('aiPanel');
    const aiMessage = $('aiMessage');
    const aiLabel = $('aiLabel');
    const aiContent = $('aiContent');
    const historyBtn = $('historyBtn');
    const historyOverlay = $('historyOverlay');
    const historyPanel = $('historyPanel');
    const historyClose = $('historyClose');
    const historyList = $('historyList');
    const sosBtn = $('sosBtn');
    const sosOverlay = $('sosOverlay');
    const sosCancel = $('sosCancel');
    const sosConfirm = $('sosConfirm');
    const toast = $('toast');
    const detectLabel1 = $('detectLabel1');
    const detectLabel2 = $('detectLabel2');
    const detectLabel3 = $('detectLabel3');
    const statusBarDot = $('statusBarDot');
    const statusBarText = $('statusBarText');

    // ===== Toast =====
    function showToast(msg, dur = 2000) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), dur);
    }

    // ===== Speech Synthesis =====
    function speak(text, onEnd) {
      if (!('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-CN'; u.rate = 1.05; u.pitch = 1.0; u.volume = 1.0;
      const voices = window.speechSynthesis.getVoices();
      const zhVoice = voices.find(v => v.lang.startsWith('zh'));
      if (zhVoice) u.voice = zhVoice;
      u.onend = () => { state.isSpeaking = false; if (onEnd) onEnd(); };
      u.onerror = () => { state.isSpeaking = false; if (onEnd) onEnd(); };
      state.isSpeaking = true;
      window.speechSynthesis.speak(u);
    }
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // ===== Speech Recognition (always-on) =====
    function initRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { return; } // Silent fail - demo works without it
      const rec = new SR();
      rec.lang = 'zh-CN';
      rec.continuous = true;
      rec.interimResults = false;
      rec.maxAlternatives = 1;

      rec.onstart = () => {
        statusBarDot.classList.add('listening');
        statusBarText.innerHTML = '<span class="highlight">聆听中</span> · 直接说话即可';
      };

      rec.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript;
        statusBarText.innerHTML = `识别到: <span class="highlight">"${text}"</span>`;
        handleUserInput(text);
      };

      rec.onend = () => {
        // Auto-restart for always-on listening
        statusBarText.innerHTML = '<span class="highlight">明途</span> 已就绪 · 音纹已识别 · 直接说话即可';
        statusBarDot.classList.remove('listening');
        // Restart after a short delay
        setTimeout(() => {
          try { rec.start(); } catch(e) {}
        }, 500);
      };

      rec.onerror = (e) => {
        if (e.error === 'no-speech' || e.error === 'aborted') return; // Ignore silent errors
        console.warn('Speech error:', e.error);
      };

      state.recognition = rec;
    }

    // ===== Camera =====
    async function startCamera() {
      try {
        state.stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = state.stream;
        state.cameraActive = true;
        startScreen.classList.add('hidden');
        statusDot.classList.add('active');
        statusText.textContent = 'AI 感知中';
        aiPanel.style.display = 'block';

        speak('明途已启动，正在为您感知周围环境。', () => startAIAnalysis());
        addHistory('系统', '明途出行伴侣已启动');
      } catch (err) {
        console.error('Camera error:', err);
        // Fallback: start demo mode without camera
        startDemoMode();
      }
    }

    // ===== Demo Mode (auto-start) =====
    function startDemoMode() {
      state.cameraActive = true;
      statusDot.classList.add('active');
      statusText.textContent = 'AI 感知中';
      aiPanel.style.display = 'block';

      // Load first scene image immediately
      sceneImage.src = sceneImages[0];
      sceneImage.style.opacity = '1';

      speak('明途已启动，正在为您感知周围环境。', () => startAIAnalysis());
      addHistory('系统', '明途出行伴侣已启动');
    }

    // ===== AI Scene Analysis =====
    const sceneImages = [
      'scene_street.jpg',
      'scene_obstacle.jpg',
      'scene_crossroad.jpg',
      'scene_street.jpg',
      'scene_street.jpg',
      'scene_obstacle.jpg',
      'scene_busstop.jpg',
      'scene_street.jpg',
      'scene_street.jpg',
      'scene_indoor.jpg',
      'scene_busstop.jpg',
      'scene_crossroad.jpg'
    ];

    const scenes = [
      {
        message: '前方道路平坦，人行道宽度约 2 米，可以安全通行。右侧有一排行道树。',
        type: 'normal',
        labels: [
          { id: 'detectLabel1', text: '人行道', danger: false },
          { id: 'detectLabel3', text: '行道树', danger: false }
        ]
      },
      {
        message: '注意！左侧 3 米处有共享单车停放，占用了部分人行道，建议靠右侧行走。',
        type: 'danger',
        labels: [
          { id: 'detectLabel1', text: '共享单车', danger: true },
          { id: 'detectLabel2', text: '建议绕行', danger: true }
        ]
      },
      {
        message: '前方 5 米有台阶，共 3 级，高度约 15 厘米。请减速慢行，注意脚下。',
        type: 'danger',
        labels: [
          { id: 'detectLabel1', text: '台阶 x3', danger: true }
        ]
      },
      {
        message: '前方路口红绿灯为绿灯，剩余约 15 秒。斑马线清晰，可以安全通过。',
        type: 'normal',
        labels: [
          { id: 'detectLabel1', text: '绿灯 15s', danger: false },
          { id: 'detectLabel2', text: '斑马线', danger: false }
        ]
      },
      {
        message: '右侧有一家便利店，招牌上写着"全家便利"。门口有 1 级台阶，有自动门。',
        type: 'normal',
        labels: [
          { id: 'detectLabel2', text: '全家便利', danger: false },
          { id: 'detectLabel3', text: '台阶 x1', danger: false }
        ]
      },
      {
        message: '警告！右侧有施工围挡，占用人行道约 1 米。围挡上有"注意安全"标识。建议绕行左侧。',
        type: 'danger',
        labels: [
          { id: 'detectLabel1', text: '施工围挡', danger: true },
          { id: 'detectLabel2', text: '注意安全', danger: true }
        ]
      },
      {
        message: '前方 10 米是公交车站，42 路公交车即将到站。有 3 位乘客在等候。',
        type: 'normal',
        labels: [
          { id: 'detectLabel1', text: '公交站', danger: false },
          { id: 'detectLabel2', text: '42路 进站', danger: false },
          { id: 'detectLabel3', text: '乘客 x3', danger: false }
        ]
      },
      {
        message: '注意！左侧有电动车快速驶来，距离约 8 米。请立即停下等待！',
        type: 'danger',
        labels: [
          { id: 'detectLabel1', text: '电动车靠近!', danger: true }
        ]
      },
      {
        message: '路面有少量积水，宽度约 0.5 米，不影响通行。左侧地面有减速带。',
        type: 'normal',
        labels: [
          { id: 'detectLabel3', text: '积水', danger: false },
          { id: 'detectLabel1', text: '减速带', danger: false }
        ]
      },
      {
        message: '前方进入室内区域，光线变暗。地面平整，铺设瓷砖。左侧有电梯，右侧有洗手间标识。',
        type: 'normal',
        labels: [
          { id: 'detectLabel1', text: '电梯', danger: false },
          { id: 'detectLabel2', text: '洗手间', danger: false }
        ]
      },
      {
        message: '检测到公交站牌，上面写着：42 路，开往火车站方向，首班 06:00，末班 22:30。',
        type: 'normal',
        labels: [
          { id: 'detectLabel1', text: '42路公交站牌', danger: false },
          { id: 'detectLabel2', text: '火车站方向', danger: false }
        ]
      },
      {
        message: '前方十字路口，交通信号灯为红灯。请耐心等待，预计 30 秒后变绿。',
        type: 'normal',
        labels: [
          { id: 'detectLabel1', text: '红灯', danger: true },
          { id: 'detectLabel2', text: '等待 30s', danger: false }
        ]
      }
    ];

    function startAIAnalysis() {
      runScene();
    }

    function runScene() {
      if (!state.cameraActive) return;

      const idx = state.sceneIndex % scenes.length;
      const scene = scenes[idx];
      state.sceneIndex++;

      // Switch scene image with fade transition
      const imgFile = sceneImages[idx];
      if (imgFile) {
        sceneImage.style.opacity = '0';
        setTimeout(() => {
          sceneImage.src = imgFile;
          sceneImage.style.opacity = '1';
        }, 400);
      }

      // Show detection labels
      clearLabels();
      scene.labels.forEach((label, i) => {
        const el = $(label.id);
        if (el) {
          el.textContent = label.text;
          el.className = 'detect-label show' + (label.danger ? ' danger' : '');
          // Stagger appearance
          setTimeout(() => el.classList.add('show'), i * 300);
        }
      });

      // Show AI message
      setAIMessage(scene.message, scene.type);
      addHistory(scene.type === 'danger' ? '安全警告' : '环境播报', scene.message, scene.type === 'danger');

      // Speak, then wait for speech to finish before scheduling next scene
      speak(scene.message, () => {
        // After speech ends, wait a bit then show next scene
        const pause = scene.type === 'danger' ? 2000 : (2000 + Math.random() * 2000);
        state.aiInterval = setTimeout(runScene, pause);
      });
    }

    function clearLabels() {
      [detectLabel1, detectLabel2, detectLabel3].forEach(el => {
        el.classList.remove('show');
      });
    }

    function setAIMessage(text, type = 'normal') {
      aiContent.textContent = text;
      aiMessage.className = 'ai-message' + (type === 'danger' ? ' danger' : '');
      aiLabel.textContent = type === 'danger' ? '安全警告' : '明途助手';
    }

    // ===== User Q&A =====
    const qaMap = {
      '前面': '您前方约 5 米道路平坦，人行道清晰可见，可以安全通行。',
      '什么': '根据当前画面分析，您正走在城市人行道上，周围有商铺和行道树，环境安全。',
      '安全': '当前环境安全，道路平坦无障碍物。左侧有行人正常通行，右侧无车辆。',
      '红绿灯': '前方约 8 米处有交通信号灯，当前为绿灯，剩余约 12 秒，可以通行。',
      '有没有座位': '前方 5 米右侧有公共长椅，目前无人使用。',
      '在哪': '根据环境分析，您位于城市商业区人行道上。',
      '地铁': '沿当前方向直行约 200 米，在第一个路口右转，再直行 100 米即可到达地铁站入口。',
      '附近': '您附近有一家便利店、一个公交车站，以及一个十字路口。',
      '公交车': '前方 10 米有公交车站，42 路即将到站，开往火车站方向。',
      '商店': '右侧 3 米有一家便利店"全家便利"，门口有自动门和 1 级台阶。',
    };

    function handleUserInput(text) {
      addHistory('您', text);
      let response = null;
      const clean = text.replace(/[？?。，,！!的了吗呢吧啊哦]/g, '');
      for (const [key, val] of Object.entries(qaMap)) {
        if (clean.includes(key) || key.includes(clean)) { response = val; break; }
      }
      if (!response) {
        const generic = [
          `关于"${text}"，根据当前环境分析，前方道路状况良好，建议继续前行。`,
          `我听到了"${text}"。您当前所在区域安全，我会持续为您播报环境变化。`,
          `好的，关于"${text}"，目前周围没有发现相关标识。继续前行到下一个路口后我会提供更多信息。`,
        ];
        response = generic[Math.floor(Math.random() * generic.length)];
      }
      setAIMessage(response);
      speak(response);
      addHistory('明途', response);
    }

    // ===== History =====
    function addHistory(type, text, isDanger = false) {
      const now = new Date();
      const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      state.history.unshift({ type, text, time, isDanger });
      if (state.history.length > 50) state.history.pop();
      renderHistory();
    }

    function renderHistory() {
      if (!state.history.length) {
        historyList.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px;">暂无记录</div>';
        return;
      }
      historyList.innerHTML = state.history.map(i => `
        <div class="history-item ${i.isDanger ? 'danger' : ''}">
          <div class="history-item-time">${i.time} · ${i.type}</div>
          <div class="history-item-text">${i.text}</div>
        </div>
      `).join('');
    }

    // ===== Event Listeners =====
    historyBtn.addEventListener('click', () => {
      historyOverlay.classList.add('show');
      historyPanel.classList.add('show');
    });
    function closeHistory() {
      historyOverlay.classList.remove('show');
      historyPanel.classList.remove('show');
    }
    historyOverlay.addEventListener('click', closeHistory);
    historyClose.addEventListener('click', closeHistory);

    sosBtn.addEventListener('click', () => sosOverlay.classList.add('show'));
    sosCancel.addEventListener('click', () => sosOverlay.classList.remove('show'));
    sosConfirm.addEventListener('click', () => {
      sosOverlay.classList.remove('show');
      sosBtn.classList.add('active');
      speak('紧急求助已发送！正在向紧急联系人发送位置，高频播报已开启。请保持冷静。');
      addHistory('紧急求助', '已发送位置信息，高频播报模式已开启', true);
      showToast('紧急求助已发送');
      setTimeout(() => sosBtn.classList.remove('active'), 10000);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { sosOverlay.classList.remove('show'); closeHistory(); }
    });

    // ===== Init: auto-start =====
    initRecognition();
    // Auto-start demo mode after a brief delay
    setTimeout(startDemoMode, 800);
    // Start always-on voice recognition after demo begins
    setTimeout(() => {
      if (state.recognition) {
        try { state.recognition.start(); } catch(e) {}
      }
    }, 2000);
  </script>
