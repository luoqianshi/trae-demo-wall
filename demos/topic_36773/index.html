<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能家居 Pro - 控制中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#6c5ce7;--primary-light:#a29bfe;
            --secondary:#00cec9;--accent:#fd79a8;
            --bg:#0a0a1a;--bg2:#12122a;--card:#1a1a35;--card-hover:#222245;
            --text:#f0f0f5;--text2:#8888aa;--text3:#555577;
            --success:#00b894;--warning:#fdcb6e;--danger:#e17055;
            --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.4);
            --glow:0 0 20px rgba(108,92,231,.3);
        }
        html{scroll-behavior:smooth}
        body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

        /* === Background === */
        .bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:orbFloat 25s ease-in-out infinite}
        .bg .orb:nth-child(1){width:500px;height:500px;background:var(--primary);top:-10%;left:-5%;animation-delay:0s}
        .bg .orb:nth-child(2){width:400px;height:400px;background:var(--secondary);bottom:-10%;right:-5%;animation-delay:-8s}
        .bg .orb:nth-child(3){width:300px;height:300px;background:var(--accent);top:40%;left:50%;animation-delay:-16s}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.1)}66%{transform:translate(-30px,40px) scale(.9)}}

        /* === Layout === */
        .app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 24px 60px}

        /* === Top Bar === */
        .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0;flex-wrap:wrap;gap:16px}
        .topbar .logo{display:flex;align-items:center;gap:12px}
        .topbar .logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--glow)}
        .topbar .logo-text{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--primary-light),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .topbar .meta{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
        .topbar .weather{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:.9rem}
        .topbar .weather .temp{color:var(--warning);font-weight:700;font-size:1.1rem}
        .topbar .clock{font-size:1.8rem;font-weight:300;letter-spacing:2px;color:var(--text)}
        .topbar .clock span{font-size:.9rem;color:var(--text2);margin-left:6px}

        /* === Nav Tabs === */
        .nav{display:flex;gap:6px;padding:4px;background:var(--bg2);border-radius:14px;margin-bottom:32px;overflow-x:auto;-webkit-overflow-scrolling:touch}
        .nav button{flex:1;min-width:100px;padding:12px 20px;border:none;border-radius:12px;background:transparent;color:var(--text2);font-size:.95rem;font-weight:500;cursor:pointer;transition:all .3s;font-family:inherit;white-space:nowrap}
        .nav button.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;box-shadow:var(--glow)}
        .nav button:hover:not(.active){color:var(--text);background:rgba(255,255,255,.05)}

        /* === Tab Content === */
        .tab-content{display:none;animation:fadeUp .4s ease}
        .tab-content.active{display:block}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        /* === Stats Row === */
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
        .stat{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:20px;transition:all .3s}
        .stat:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:rgba(108,92,231,.2)}
        .stat .stat-icon{font-size:28px;margin-bottom:10px}
        .stat .stat-val{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--primary-light),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .stat .stat-label{color:var(--text2);font-size:.85rem;margin-top:4px}

        /* === Room Cards === */
        .rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-bottom:32px}
        .room{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
        .room::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(108,92,231,.08));pointer-events:none}
        .room:hover{transform:translateY(-6px);box-shadow:var(--shadow);border-color:rgba(108,92,231,.25)}
        .room .room-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
        .room .room-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;background:linear-gradient(135deg,rgba(108,92,231,.2),rgba(0,206,201,.2));border:1px solid rgba(108,92,231,.15)}
        .room .room-count{background:var(--bg2);padding:4px 12px;border-radius:20px;font-size:.8rem;color:var(--text2)}
        .room .room-name{font-size:1.2rem;font-weight:600;margin-bottom:6px}
        .room .room-devices{display:flex;flex-wrap:wrap;gap:6px}
        .room .device-tag{padding:4px 10px;border-radius:8px;font-size:.75rem;background:rgba(255,255,255,.05);color:var(--text2);display:flex;align-items:center;gap:4px;transition:all .2s}
        .room .device-tag.on{background:rgba(0,184,148,.15);color:var(--success);border:1px solid rgba(0,184,148,.2)}
        .room .device-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
        .room .device-tag.on .dot{background:var(--success);box-shadow:0 0 6px var(--success)}

        /* === Toggle === */
        .toggle{position:relative;width:56px;height:30px;flex-shrink:0}
        .toggle input{opacity:0;width:0;height:0;position:absolute}
        .toggle .slider{position:absolute;inset:0;background:#2a2a4a;border-radius:30px;cursor:pointer;transition:.35s}
        .toggle .slider::before{content:'';position:absolute;width:22px;height:22px;left:4px;bottom:4px;background:#fff;border-radius:50%;transition:.35s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
        .toggle input:checked+.slider{background:linear-gradient(135deg,var(--primary),var(--secondary))}
        .toggle input:checked+.slider::before{transform:translateX(26px)}

        /* === Device Grid === */
        .device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .device-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:24px;transition:all .3s}
        .device-card:hover{border-color:rgba(108,92,231,.2);box-shadow:0 4px 20px rgba(0,0,0,.2)}
        .device-card.on{border-color:rgba(108,92,231,.3);box-shadow:var(--glow)}
        .device-card .dc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .device-card .dc-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(108,92,231,.1);border:1px solid rgba(108,92,231,.15);transition:all .3s}
        .device-card.on .dc-icon{background:linear-gradient(135deg,var(--primary),var(--secondary));box-shadow:var(--glow)}
        .device-card .dc-name{font-size:1.05rem;font-weight:600;margin-bottom:4px}
        .device-card .dc-status{font-size:.8rem;color:var(--text2);display:flex;align-items:center;gap:6px}
        .device-card .dc-status .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:all .3s}
        .device-card.on .dc-status .dot{background:var(--success);box-shadow:0 0 8px var(--success)}

        /* === Slider === */
        .slider-group{margin-top:16px}
        .slider-label{display:flex;justify-content:space-between;font-size:.85rem;color:var(--text2);margin-bottom:8px}
        .slider-label .val{color:var(--primary-light);font-weight:600}
        input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#2a2a4a;outline:none}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));cursor:pointer;box-shadow:0 2px 10px rgba(108,92,231,.4);transition:.2s}
        input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
        input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));cursor:pointer;border:none}

        /* === Temp Control === */
        .temp-box{text-align:center;padding:24px;background:rgba(108,92,231,.08);border-radius:14px;margin-top:16px;border:1px solid rgba(108,92,231,.12)}
        .temp-box .temp-num{font-size:4rem;font-weight:900;background:linear-gradient(135deg,var(--primary-light),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
        .temp-box .temp-unit{font-size:1.2rem;color:var(--text2)}
        .temp-box .temp-btns{display:flex;justify-content:center;gap:16px;margin-top:16px}
        .temp-box .t-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--primary);background:transparent;color:var(--primary);font-size:22px;cursor:pointer;transition:all .2s;font-family:inherit}
        .temp-box .t-btn:hover{background:var(--primary);color:#fff;transform:scale(1.1)}

        /* === Scene Cards === */
        .scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
        .scene-card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:28px;text-align:center;cursor:pointer;transition:all .35s;position:relative;overflow:hidden}
        .scene-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));opacity:0;transition:.3s}
        .scene-card:hover{transform:translateY(-6px);box-shadow:var(--shadow);border-color:rgba(108,92,231,.25)}
        .scene-card:hover::before,.scene-card.active::before{opacity:1}
        .scene-card.active{border-color:var(--primary);box-shadow:var(--glow)}
        .scene-card .scene-icon{font-size:48px;margin-bottom:16px;display:block}
        .scene-card .scene-name{font-size:1.15rem;font-weight:600;margin-bottom:8px}
        .scene-card .scene-desc{font-size:.85rem;color:var(--text2);line-height:1.5}
        .scene-card .scene-badge{position:absolute;top:16px;right:16px;width:10px;height:10px;border-radius:50%;background:var(--success);box-shadow:0 0 10px var(--success);display:none}
        .scene-card.active .scene-badge{display:block}

        /* === Energy Chart === */
        .energy-section{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:32px}
        .energy-chart{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:28px}
        .energy-chart h3{font-size:1.2rem;font-weight:600;margin-bottom:20px}
        .chart-canvas{width:100%;height:220px;position:relative}
        .chart-bars{display:flex;align-items:flex-end;justify-content:space-around;height:180px;padding-top:20px}
        .chart-bar{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
        .chart-bar .bar{width:32px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--primary),var(--secondary));transition:height .6s cubic-bezier(.4,0,.2,1);position:relative;min-height:4px}
        .chart-bar .bar:hover{opacity:.8}
        .chart-bar .bar-val{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--text2);white-space:nowrap}
        .chart-bar .bar-label{font-size:.75rem;color:var(--text3)}
        .energy-breakdown{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:28px}
        .energy-breakdown h3{font-size:1.2rem;font-weight:600;margin-bottom:20px}
        .breakdown-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
        .breakdown-item:last-child{border:none}
        .breakdown-item .bi-icon{font-size:20px;width:36px;text-align:center}
        .breakdown-item .bi-info{flex:1}
        .breakdown-item .bi-name{font-size:.9rem;margin-bottom:4px}
        .breakdown-item .bi-bar{height:6px;border-radius:3px;background:#2a2a4a;overflow:hidden}
        .breakdown-item .bi-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
        .breakdown-item .bi-val{font-size:.9rem;font-weight:600;color:var(--primary-light);min-width:50px;text-align:right}

        /* === Schedule === */
        .schedule-list{display:flex;flex-direction:column;gap:12px}
        .schedule-item{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:20px 24px;display:flex;align-items:center;gap:16px;transition:all .3s}
        .schedule-item:hover{border-color:rgba(108,92,231,.2)}
        .schedule-item .sch-time{font-size:1.3rem;font-weight:700;color:var(--primary-light);min-width:70px}
        .schedule-item .sch-info{flex:1}
        .schedule-item .sch-name{font-weight:600;margin-bottom:2px}
        .schedule-item .sch-desc{font-size:.8rem;color:var(--text2)}
        .schedule-item .sch-days{display:flex;gap:4px;margin-top:6px}
        .schedule-item .sch-day{padding:2px 8px;border-radius:6px;font-size:.7rem;background:rgba(108,92,231,.1);color:var(--primary-light)}
        .schedule-item .sch-day.inactive{background:rgba(255,255,255,.03);color:var(--text3)}

        /* === Toast === */
        .toast-container{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
        .toast{padding:14px 24px;border-radius:12px;background:var(--card);border:1px solid rgba(255,255,255,.1);color:var(--text);font-size:.9rem;box-shadow:0 10px 40px rgba(0,0,0,.5);animation:toastIn .4s ease;display:flex;align-items:center;gap:10px;max-width:360px}
        .toast.success{border-color:rgba(0,184,148,.3)}
        .toast.info{border-color:rgba(108,92,231,.3)}
        @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}

        /* === Add Device Button === */
        .add-device{background:var(--bg2);border:2px dashed rgba(255,255,255,.1);border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .3s;min-height:180px;color:var(--text3)}
        .add-device:hover{border-color:var(--primary);color:var(--primary);background:rgba(108,92,231,.05)}
        .add-device .plus{font-size:36px;font-weight:300}

        /* === Modal === */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .modal-overlay.show{display:flex}
        .modal{background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px;max-width:480px;width:90%;animation:fadeUp .3s ease}
        .modal h3{font-size:1.3rem;font-weight:700;margin-bottom:20px}
        .modal .form-group{margin-bottom:16px}
        .modal label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px}
        .modal input,.modal select{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:var(--bg2);color:var(--text);font-size:.95rem;font-family:inherit;outline:none;transition:border .2s}
        .modal input:focus,.modal select:focus{border-color:var(--primary)}
        .modal select option{background:var(--card);color:var(--text)}
        .modal .modal-actions{display:flex;gap:12px;margin-top:24px}
        .modal .modal-actions button{flex:1;padding:12px;border-radius:10px;border:none;font-size:.95rem;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}
        .modal .btn-cancel{background:var(--bg2);color:var(--text2);border:1px solid rgba(255,255,255,.1)}
        .modal .btn-confirm{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;box-shadow:var(--glow)}
        .modal .btn-confirm:hover{transform:translateY(-2px)}

        /* === Retrofit Tab Styles === */
        .finder{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:32px;margin-bottom:32px}
        .finder h2{font-size:1.3rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
        .finder h2 .icon{font-size:1.5rem}
        .finder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
        .finder-item{padding:16px 12px;border-radius:12px;background:var(--bg2);border:2px solid transparent;text-align:center;cursor:pointer;transition:all .3s}
        .finder-item:hover{border-color:var(--primary);transform:translateY(-3px)}
        .finder-item.active{border-color:var(--primary);background:rgba(108,92,231,.1)}
        .finder-item .fi-icon{font-size:32px;margin-bottom:8px;display:block}
        .finder-item .fi-name{font-size:.85rem;font-weight:500}
        .finder-item .fi-tag{font-size:.7rem;color:var(--text3);margin-top:4px}

        .result-panel{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:32px;margin-bottom:32px;display:none;animation:fadeInUp .5s ease}
        .result-panel.show{display:block}
        .result-panel h3{font-size:1.2rem;font-weight:700;margin-bottom:16px}
        .result-panel .rp-desc{color:var(--text2);margin-bottom:20px;line-height:1.7}

        .method-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
        .method-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:24px;transition:all .35s;position:relative;overflow:hidden}
        .method-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));opacity:0;transition:.3s}
        .method-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:rgba(108,92,231,.2)}
        .method-card:hover::before{opacity:1}
        .method-card .mc-tag{position:absolute;top:14px;right:14px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
        .method-card .mc-tag.easy{background:rgba(0,184,148,.15);color:var(--success)}
        .method-card .mc-tag.medium{background:rgba(253,203,110,.15);color:var(--warning)}
        .method-card .mc-tag.hard{background:rgba(225,112,85,.15);color:var(--danger)}
        .method-card .mc-icon{font-size:36px;margin-bottom:12px}
        .method-card .mc-name{font-size:1.05rem;font-weight:700;margin-bottom:6px}
        .method-card .mc-desc{color:var(--text2);font-size:.85rem;line-height:1.6;margin-bottom:12px}
        .method-card .mc-price{font-size:1.2rem;font-weight:700;color:var(--primary);margin-bottom:10px}
        .method-card .mc-price span{font-size:.75rem;color:var(--text2);font-weight:400}
        .method-card .mc-features{display:flex;flex-direction:column;gap:6px}
        .method-card .mc-feature{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text2)}
        .method-card .mc-feature .check{color:var(--success)}
        .method-card .mc-feature .cross{color:var(--danger)}
        .method-card .mc-btn{width:100%;margin-top:14px;padding:10px;border-radius:10px;border:1px solid var(--primary);background:transparent;color:var(--primary);cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:500;transition:all .2s}
        .method-card .mc-btn:hover{background:var(--primary);color:#fff}

        .calc-section{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:32px;margin-bottom:32px}
        .calc-section h2{font-size:1.3rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
        .calc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
        .calc-item{display:flex;flex-direction:column;gap:8px}
        .calc-item label{font-size:.85rem;color:var(--text2)}
        .calc-item input,.calc-item select{padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:var(--bg2);color:var(--text);font-family:inherit;font-size:.9rem;outline:none}
        .calc-item input:focus,.calc-item select:focus{border-color:var(--primary)}
        .calc-result{background:var(--bg2);border-radius:12px;padding:20px;text-align:center}
        .calc-result .cr-label{color:var(--text2);font-size:.9rem;margin-bottom:8px}
        .calc-result .cr-value{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--primary-light),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .calc-result .cr-note{color:var(--text2);font-size:.8rem;margin-top:8px}

        .tip-box{background:rgba(0,206,201,.08);border:1px solid rgba(0,206,201,.15);border-radius:12px;padding:16px 20px;margin-top:16px;font-size:.85rem;color:var(--secondary);line-height:1.6}
        .tip-box strong{color:var(--secondary)}
        .warn-box{background:rgba(225,112,85,.08);border:1px solid rgba(225,112,85,.15);border-radius:12px;padding:16px 20px;margin-top:16px;font-size:.85rem;color:var(--danger);line-height:1.6}

const PRICES = { socket: 40, ir: 60, switch: 25, diy: 15 };

// ===================== STATE =====================
let devices = JSON.parse(localStorage.getItem('sh_devices')) || JSON.parse(JSON.stringify(DEFAULT_DEVICES));
let activeScene = localStorage.getItem('sh_scene') || null;
let deviceIdCounter = devices.length + 1;

function save(){
    localStorage.setItem('sh_devices', JSON.stringify(devices));
    localStorage.setItem('sh_scene', activeScene || '');
}

// ===================== TOAST =====================
function toast(msg, type='info'){
    const c = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = (type==='success'?'✅':'ℹ️') + ' ' + msg;
    c.appendChild(t);
    setTimeout(()=>{ t.style.animation='toastOut .3s ease forwards'; setTimeout(()=>t.remove(),300) }, 2500);
}

// ===================== CLOCK =====================
function updateClock(){
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const days = ['日','一','二','三','四','五','六'];
    document.getElementById('clock').innerHTML = h+':'+m+'<span> 周'+days[now.getDay()]+'</span>';
}
setInterval(updateClock, 1000);
updateClock();

// ===================== TABS =====================
function switchTab(id){
    document.querySelectorAll('.nav button').forEach((b,i)=>{
        b.classList.toggle('active', b.textContent.includes(
            {dashboard:'总览',devices:'设备',scenes:'场景',energy:'能耗',schedule:'定时',retrofit:'改造'}[id]
        ));
    });
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    if(id==='energy') renderEnergy();
    if(id==='schedule') renderSchedule();
    if(id==='retrofit') renderFinder();
}

// ===================== ROOMS =====================
function renderRooms(){
    const el = document.getElementById('roomList');
    let html = '';
    for(const [rid, rmeta] of Object.entries(ROOM_META)){
        const rdevs = devices.filter(d=>d.room===rid);
        const onCount = rdevs.filter(d=>d.on).length;
        html += `<div class="room" onclick="switchTab('devices');document.getElementById('roomFilter').value='${rid}';renderDevices()">
            <div class="room-top">
                <div class="room-icon">${rmeta.icon}</div>
                <div class="room-count">${onCount}/${rdevs.length} 开启</div>
            </div>
            <div class="room-name">${rmeta.name}</div>
            <div class="room-devices">${rdevs.map(d=>{
                const tm = TYPE_META[d.type];
                return `<span class="device-tag ${d.on?'on':''}"><span class="dot"></span>${tm.icon} ${d.name}</span>`;
            }).join('')}</div>
        </div>`;
    }
    el.innerHTML = html;
}

// ===================== DEVICES =====================
function renderDevices(){
    const filter = document.getElementById('roomFilter').value;
    const list = filter==='all' ? devices : devices.filter(d=>d.room===filter);
    const grid = document.getElementById('deviceGrid');
    let html = '';
    list.forEach(d=>{
        const tm = TYPE_META[d.type];
        let controls = '';
        if(d.type==='light'){
            controls = `<div class="slider-group"><div class="slider-label"><span>亮度</span><span class="val">${d.brightness||0}%</span></div><input type="range" min="0" max="100" value="${d.brightness||0}" ${d.on?'':'disabled'} oninput="setProp('${d.id}','brightness',+this.value);this.previousElementSibling.querySelector('.val').textContent=this.value+'%'"></div>`;
        }
        if(d.type==='ac'){
            controls = `<div class="temp-box"><div class="temp-num">${d.temp||24}</div><div class="temp-unit">°C · ${d.mode==='cool'?'制冷':'制热'}</div><div class="temp-btns"><button class="t-btn" onclick="adjustTemp('${d.id}',-1)">−</button><button class="t-btn" onclick="adjustTemp('${d.id}',1)">+</button></div></div>`;
        }
        if(d.type==='tv' || d.type==='speaker'){
            controls = `<div class="slider-group"><div class="slider-label"><span>音量</span><span class="val">${d.volume||0}%</span></div><input type="range" min="0" max="100" value="${d.volume||0}" ${d.on?'':'disabled'} oninput="setProp('${d.id}','volume',+this.value);this.previousElementSibling.querySelector('.val').textContent=this.value+'%'"></div>`;
        }
        if(d.type==='curtain'){
            controls = `<div class="slider-group"><div class="slider-label"><span>开合度</span><span class="val">${d.openPercent||0}%</span></div><input type="range" min="0" max="100" value="${d.openPercent||0}" ${d.on?'':'disabled'} oninput="setProp('${d.id}','openPercent',+this.value);this.previousElementSibling.querySelector('.val').textContent=this.value+'%'"></div>`;
        }
        html += `<div class="device-card ${d.on?'on':''}" id="card-${d.id}">
            <div class="dc-top">
                <div class="dc-icon">${tm.icon}</div>
                <label class="toggle"><input type="checkbox" ${d.on?'checked':''} onchange="toggleDevice('${d.id}',this.checked)"><span class="slider"></span></label>
            </div>
            <div class="dc-name">${d.name}</div>
            <div class="dc-status"><span class="dot"></span>${d.on?'在线 · 运行中':'离线 · 已关闭'} · ${ROOM_META[d.room]?.name||d.room}</div>
            ${controls}
        </div>`;
    });
    html += `<div class="add-device" onclick="openModal()"><div class="plus">+</div><div>添加新设备</div></div>`;
    grid.innerHTML = html;
}

function toggleDevice(id, on){
    const d = devices.find(x=>x.id===id);
    if(d){ d.on = on; save(); renderAll(); toast(`${d.name} 已${on?'开启':'关闭'}`, on?'success':'info'); }
}

function setProp(id, prop, val){
    const d = devices.find(x=>x.id===id);
    if(d){ d[prop] = val; save(); updateStats(); }
}

function adjustTemp(id, delta){
    const d = devices.find(x=>x.id===id);
    if(d){
        d.temp = Math.max(16, Math.min(32, (d.temp||24)+delta));
        save(); renderDevices(); updateStats();
    }
}

// ===================== ADD DEVICE =====================
function openModal(){ document.getElementById('addModal').classList.add('show'); }
function closeModal(){ document.getElementById('addModal').classList.remove('show'); }

function addDevice(){
    const name = document.getElementById('newDeviceName').value.trim();
    const type = document.getElementById('newDeviceType').value;
    const room = document.getElementById('newDeviceRoom').value;
    if(!name){ toast('请输入设备名称','info'); return; }
    const base = { id:'d'+(deviceIdCounter++), name, type, room, on:false };
    if(type==='light') base.brightness = 60;
    if(type==='ac') base.temp = 26; base.mode = 'cool';
    if(type==='tv'||type==='speaker') base.volume = 30;
    if(type==='curtain') base.openPercent = 0;
    devices.push(base);
    save(); renderAll(); closeModal();
    document.getElementById('newDeviceName').value = '';
    toast(`设备 "${name}" 添加成功！`, 'success');
}

// ===================== SCENES =====================
function renderScenes(){
    const el = document.getElementById('sceneGrid');
    el.innerHTML = SCENES.map(s=>`
        <div class="scene-card ${activeScene===s.id?'active':''}" onclick="activateScene('${s.id}')">
            <div class="scene-badge"></div>
            <span class="scene-icon">${s.name.split(' ')[0]}</span>
            <div class="scene-name">${s.name.split(' ').slice(1).join(' ')}</div>
            <div class="scene-desc">${s.desc}</div>
        </div>
    `).join('');
}

function activateScene(id){
    const scene = SCENES.find(s=>s.id===id);
    if(!scene) return;
    activeScene = activeScene===id ? null : id;
    if(activeScene){
        for(const [did, props] of Object.entries(scene.actions)){
            const d = devices.find(x=>x.id===did);
            if(d) Object.assign(d, props);
        }
        toast(`场景 "${scene.name.split(' ').slice(1).join(' ')}" 已激活`, 'success');
    } else {
        toast('场景已取消', 'info');
    }
    save(); renderAll();
}

// ===================== ENERGY =====================
function renderEnergy(){
    const weekData = [12.5, 14.2, 11.8, 15.6, 13.1, 18.4, 16.2];
    const days = ['周一','周二','周三','周四','周五','周六','周日'];
    const maxVal = Math.max(...weekData);
    document.getElementById('chartBars').innerHTML = weekData.map((v,i)=>`
        <div class="chart-bar">
            <div class="bar" style="height:${(v/maxVal)*150}px"><span class="bar-val">${v}</span></div>
            <span class="bar-label">${days[i]}</span>
        </div>
    `).join('');

    const typePower = {};
    devices.forEach(d=>{
        if(d.on){
            const base = TYPE_META[d.type]?.power || 10;
            let factor = 1;
            if(d.type==='light') factor = (d.brightness||60)/100;
            if(d.type==='ac') factor = 0.7 + (d.temp||24)/30;
            typePower[d.type] = (typePower[d.type]||0) + base * factor;
        }
    });
    const total = Object.values(typePower).reduce((a,b)=>a+b, 0) || 1;
    const colors = { light:'#6c5ce7', ac:'#00cec9', tv:'#fd79a8', curtain:'#fdcb6e', fan:'#00b894', speaker:'#e17055', humidifier:'#74b9ff', purifier:'#a29bfe', lock:'#636e72', camera:'#dfe6e9', heater:'#ff6b6b', waterheater:'#74b9ff', waterdispenser:'#00cec9', ricecooker:'#fdcb6e', robot:'#a29bfe', dehumidifier:'#00b894' };
    document.getElementById('breakdownList').innerHTML = Object.entries(typePower).sort((a,b)=>b[1]-a[1]).map(([type, power])=>{
        const tm = TYPE_META[type];
        const pct = (power/total*100).toFixed(1);
        return `<div class="breakdown-item">
            <div class="bi-icon">${tm.icon}</div>
            <div class="bi-info"><div class="bi-name">${tm.name}</div><div class="bi-bar"><div class="bi-bar-fill" style="width:${pct}%;background:${colors[type]||'var(--primary)'}"></div></div></div>
            <div class="bi-val">${power.toFixed(0)}W</div>
        </div>`;
    }).join('');
}

// ===================== SCHEDULE =====================
function renderSchedule(){
    document.getElementById('scheduleList').innerHTML = SCHEDULES.map(s=>{
        const allDays = ['一','二','三','四','五','六','日'];
        return `<div class="schedule-item">
            <div class="sch-time">${s.time}</div>
            <div class="sch-info">
                <div class="sch-name">${s.name}</div>
                <div class="sch-desc">${s.desc}</div>
                <div class="sch-days">${allDays.map(d=>`<span class="sch-day ${s.days.includes(d)?'':'inactive'}">${d}</span>`).join('')}</div>
            </div>
            <label class="toggle"><input type="checkbox" ${s.active?'checked':''} onchange="toggleSchedule('${s.name}',this.checked)"><span class="slider"></span></label>
        </div>`;
    }).join('');
}

function toggleSchedule(name, on){
    const s = SCHEDULES.find(x=>x.name===name);
    if(s){ s.active = on; renderSchedule(); toast(`定时任务 "${name}" 已${on?'启用':'停用'}`, on?'success':'info'); }
}

// ===================== STATS =====================
function updateStats(){
    const total = devices.length;
    const online = devices.filter(d=>d.on).length;
    let power = 0;
    devices.forEach(d=>{
        if(d.on){
            const base = TYPE_META[d.type]?.power || 10;
            let factor = 1;
            if(d.type==='light') factor = (d.brightness||60)/100;
            if(d.type==='ac') factor = 0.7 + (d.temp||24)/30;
            power += base * factor;
        }
    });
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-online').textContent = online;
    document.getElementById('s-power').textContent = Math.round(power);
    const sceneName = activeScene ? SCENES.find(s=>s.id===activeScene)?.name?.split(' ').slice(1).join(' ') || '--' : '--';
    document.getElementById('s-scene').textContent = sceneName;
}

// ===================== ROOM FILTER =====================
function initRoomFilter(){
    const sel = document.getElementById('roomFilter');
    sel.innerHTML = '<option value="all">全部房间</option>' + Object.entries(ROOM_META).map(([k,v])=>`<option value="${k}">${v.icon} ${v.name}</option>`).join('');
}

// ===================== RETROFIT =====================
function renderFinder(){
    const grid = document.getElementById('finderGrid');
    grid.innerHTML = RETROFIT_DEVICES.map(d=>`
        <div class="finder-item" onclick="selectRetrofitDevice('${d.id}')">
            <span class="fi-icon">${d.icon}</span>
            <div class="fi-name">${d.name}</div>
            ${d.tag ? `<div class="fi-tag">${d.tag}</div>` : ''}
        </div>
    `).join('');
}

function selectRetrofitDevice(type){
    document.querySelectorAll('.finder-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    const data = RETROFIT_DATA[type];
    if (!data) return;
    
    document.getElementById('resultTitle').textContent = data.title;
    document.getElementById('resultDesc').textContent = data.desc;
    
    const grid = document.getElementById('methodGrid');
    grid.innerHTML = data.methods.map((m, idx) => `
        <div class="method-card">
            <div class="mc-tag ${m.tag}">${m.tagText}</div>
            <div class="mc-icon">${m.icon}</div>
            <div class="mc-name">${m.name}</div>
            <div class="mc-price">${m.price}<span> / 套</span></div>
            <div class="mc-desc">${m.desc}</div>
            <div class="mc-features">
                ${m.features.map(f => `<div class="mc-feature"><span class="${f.ok ? 'check' : 'cross'}">${f.ok ? '✓' : '✗'}</span> ${f.text}</div>`).join('')}
            </div>
            <button class="mc-btn" onclick="addRetrofitDevice('${type}', ${idx})">添加到我的设备</button>
        </div>
    `).join('');
    
    document.getElementById('resultPanel').classList.add('show');
    document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function addRetrofitDevice(type, methodIdx){
    const data = RETROFIT_DATA[type];
    if(!data) return;
    const method = data.methods[methodIdx];
    
    // Map retrofit type to device type
    const typeMap = {
        fan: 'fan', ac: 'ac', lamp: 'light', tv: 'tv', heater: 'heater',
        humidifier: 'humidifier', purifier: 'purifier', waterheater: 'waterheater',
        switch: 'light', curtain: 'curtain', waterdispenser: 'waterdispenser',
        ricecooker: 'ricecooker', robot: 'robot', dehumidifier: 'dehumidifier'
    };
    
    const deviceType = typeMap[type] || 'light';
    const name = data.title.split(' ')[1] || '智能设备';
    const base = { id:'d'+(deviceIdCounter++), name: name + '(' + method.name + ')', type: deviceType, room:'living', on:false };
    
    if(deviceType==='light') base.brightness = 60;
    if(deviceType==='ac') base.temp = 26; base.mode = 'cool';
    if(deviceType==='tv'||deviceType==='speaker') base.volume = 30;
    if(deviceType==='curtain') base.openPercent = 0;
    
    devices.push(base);
    save(); renderAll();
    toast(`已添加 "${base.name}" 到设备列表！`, 'success');
}

function calcCost(){
    const count = parseInt(document.getElementById('calcCount').value) || 1;
    const method = document.getElementById('calcMethod').value;
    const needGateway = document.getElementById('calcGateway').value === 'yes';
    
    const unitPrice = PRICES[method] || 40;
    let total = count * unitPrice;
    if (needGateway) total += 99;
    
    document.getElementById('calcTotal').textContent = '¥' + total;
}

// ===================== RENDER ALL =====================
function renderAll(){
    renderRooms();
    renderDevices();
    renderScenes();
    updateStats();
}

// ===================== INIT =====================
initRoomFilter();
renderAll();
calcCost();
</script>
