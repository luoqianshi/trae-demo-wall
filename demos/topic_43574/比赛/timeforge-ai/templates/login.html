{% extends "base.html" %}
{% block title %}登录 - TimeForge X{% endblock %}

{% block extra_head %}
<style>
/* ============================================================
   登录页专属样式 - 隐藏侧边栏，全屏居中布局
   ============================================================ */
.sidebar { display: none !important; }
.sidebar-backdrop { display: none !important; }
.main-wrapper { margin-left: 0 !important; }
.topbar { display: none !important; }
.content-area {
    padding: 0 !important;
    min-height: 100vh !important;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 登录页容器 */
.auth-wrapper {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0B1120 100%);
    position: relative;
    overflow: hidden;
}

/* 背景装饰 */
.auth-wrapper::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(16, 185, 129, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
    animation: bgFloat 15s ease-in-out infinite;
    z-index: 0;
}

@keyframes bgFloat {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(30px, -30px); }
    66% { transform: translate(-20px, 20px); }
}

/* 玻璃拟态卡片 */
.auth-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(99, 102, 241, 0.08);
    margin: 20px;
}

/* Logo区域 */
.auth-logo {
    text-align: center;
    margin-bottom: 32px;
}
.auth-logo .logo-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
}
.auth-logo h2 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--color-primary-light), var(--color-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0;
}
.auth-logo p {
    color: var(--color-text-muted);
    font-size: 13px;
    margin-top: 4px;
}

/* 登录方式切换 */
.login-type-tabs {
    display: flex;
    background: var(--bg-primary);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
}
.login-type-tab {
    flex: 1;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--color-text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
}
.login-type-tab.active {
    background: var(--color-primary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
}
.login-type-tab:hover:not(.active) {
    color: var(--color-text);
    background: rgba(99, 102, 241, 0.1);
}

/* 密码/验证码切换 */
.login-mode-tabs {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    font-size: 13px;
}
.login-mode-tab {
    color: var(--color-text-muted);
    cursor: pointer;
    padding-bottom: 4px;
    border-bottom: 2px solid transparent;
    transition: all 0.3s ease;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
}
.login-mode-tab.active {
    color: var(--color-primary-light);
    border-bottom-color: var(--color-primary);
}

/* 表单样式 */
.auth-form .form-group {
    margin-bottom: 18px;
}
.auth-form .form-group label {
    display: block;
    color: var(--color-text-muted);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
}
.auth-form .input-group {
    position: relative;
    display: flex;
    align-items: center;
}
.auth-form .input-group .input-icon {
    position: absolute;
    left: 14px;
    color: var(--color-text-dim);
    font-size: 16px;
    z-index: 2;
    pointer-events: none;
}
.auth-form .form-control {
    width: 100%;
    padding: 12px 14px 12px 42px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.6);
    border-radius: 10px;
    color: var(--color-text);
    font-size: 14px;
    transition: all 0.3s ease;
}
.auth-form .form-control:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    background: rgba(15, 23, 42, 0.8);
}
.auth-form .form-control::placeholder {
    color: var(--color-text-dim);
}
.auth-form .form-control.error {
    border-color: var(--color-danger);
}
.auth-form .error-msg {
    color: var(--color-danger);
    font-size: 11px;
    margin-top: 4px;
    display: none;
}

/* 验证码行 */
.code-row {
    display: flex;
    gap: 10px;
}
.code-row .form-control {
    flex: 1;
}
.send-code-btn {
    white-space: nowrap;
    padding: 12px 16px;
    background: rgba(99, 102, 241, 0.15);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 10px;
    color: var(--color-primary-light);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    min-width: 110px;
}
.send-code-btn:hover:not(:disabled) {
    background: rgba(99, 102, 241, 0.25);
    border-color: var(--color-primary);
}
.send-code-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* 忘记密码 + 记住我 */
.auth-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 13px;
}
.auth-options .remember-me {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--color-text-muted);
    cursor: pointer;
}
.auth-options .remember-me input[type="checkbox"] {
    accent-color: var(--color-primary);
    cursor: pointer;
}
.auth-options .forgot-link {
    color: var(--color-primary-light);
    text-decoration: none;
    transition: color 0.3s;
}
.auth-options .forgot-link:hover {
    color: var(--color-primary);
}

/* 登录按钮 */
.btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}
.btn-login:hover {
    background: linear-gradient(135deg, var(--color-primary-light), var(--color-primary));
    box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
    transform: translateY(-1px);
}
.btn-login:active {
    transform: translateY(0);
}
.btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}
.btn-login .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
}
.btn-login.loading .spinner {
    display: inline-block;
}
.btn-login.loading .btn-text {
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* 底部链接 */
.auth-footer {
    text-align: center;
    margin-top: 24px;
    color: var(--color-text-muted);
    font-size: 13px;
}
.auth-footer a {
    color: var(--color-primary-light);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s;
}
.auth-footer a:hover {
    color: var(--color-primary);
}

/* 响应式 */
@media (max-width: 480px) {
    .auth-card {
        padding: 28px 20px;
        margin: 12px;
        border-radius: 16px;
    }
    .auth-logo .logo-icon {
        width: 44px;
        height: 44px;
        font-size: 22px;
    }
    .auth-logo h2 {
        font-size: 20px;
    }
    .login-type-tab {
        font-size: 12px;
        padding: 6px 8px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">TF</div>
            <h2>TimeForge X</h2>
            <p>AI人生规划指挥中心</p>
        </div>

        <!-- 登录方式切换 -->
        <div class="login-type-tabs" id="loginTypeTabs">
            <button class="login-type-tab active" data-type="username">用户名</button>
            <button class="login-type-tab" data-type="email">邮箱</button>
            <button class="login-type-tab" data-type="phone">手机号</button>
        </div>

        <!-- 密码/验证码切换 -->
        <div class="login-mode-tabs" id="loginModeTabs" style="display: none;">
            <button class="login-mode-tab active" data-mode="password">密码登录</button>
            <button class="login-mode-tab" data-mode="code">验证码登录</button>
        </div>

        <!-- 登录表单 -->
        <form class="auth-form" id="loginForm" novalidate>
            <!-- 用户名输入 -->
            <div class="form-group" id="usernameGroup">
                <label>用户名</label>
                <div class="input-group">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" class="form-control" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="error-msg" id="usernameError"></div>
            </div>

            <!-- 邮箱输入 -->
            <div class="form-group" id="emailGroup" style="display: none;">
                <label>邮箱</label>
                <div class="input-group">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" class="form-control" id="loginEmail" placeholder="请输入邮箱地址" autocomplete="email">
                </div>
                <div class="error-msg" id="emailError"></div>
            </div>

            <!-- 手机号输入 -->
            <div class="form-group" id="phoneGroup" style="display: none;">
                <label>手机号</label>
                <div class="input-group">
                    <i class="bi bi-phone input-icon"></i>
                    <input type="tel" class="form-control" id="loginPhone" placeholder="请输入手机号" autocomplete="tel">
                </div>
                <div class="error-msg" id="phoneError"></div>
            </div>

            <!-- 密码输入 -->
            <div class="form-group" id="passwordGroup">
                <label>密码</label>
                <div class="input-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" class="form-control" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                    <i class="bi bi-eye-slash input-icon" id="togglePassword" style="left: auto; right: 14px; cursor: pointer; pointer-events: auto;"></i>
                </div>
                <div class="error-msg" id="passwordError"></div>
            </div>

            <!-- 验证码输入 -->
            <div class="form-group" id="codeGroup" style="display: none;">
                <label>验证码</label>
                <div class="code-row">
                    <div class="input-group" style="flex: 1;">
                        <i class="bi bi-shield-check input-icon"></i>
                        <input type="text" class="form-control" id="loginCode" placeholder="请输入验证码" maxlength="6" autocomplete="off">
                    </div>
                    <button type="button" class="send-code-btn" id="sendCodeBtn" disabled>发送验证码</button>
                </div>
                <div class="error-msg" id="codeError"></div>
            </div>

            <!-- 记住我 / 忘记密码 (仅密码模式) -->
            <div class="auth-options" id="authOptions">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>记住我</span>
                </label>
                <a href="javascript:void(0)" class="forgot-link" onclick="handleForgotPassword()">忘记密码？</a>
            </div>

            <!-- 登录按钮 -->
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text">登 录</span>
            </button>
        </form>

        <!-- 底部 -->
        <div class="auth-footer">
            还没有账号？<a href="/register">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// ============================================================
// 登录页逻辑
// ============================================================
const BASE_URL = window.location.origin;
let currentLoginType = 'username';
let currentLoginMode = 'password';
let codeCountdown = 0;
let countdownTimer = null;

document.addEventListener('DOMContentLoaded', function() {
    initLoginTabs();
    initPasswordToggle();
    initFormSubmit();
});

// ============================================================
// 登录方式切换
// ============================================================
function initLoginTabs() {
    const typeTabs = document.querySelectorAll('#loginTypeTabs .login-type-tab');
    const modeTabs = document.querySelectorAll('#loginModeTabs .login-mode-tab');

    typeTabs.forEach(tab => {
        tab.addEventListener('click', function() {
            typeTabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentLoginType = this.dataset.type;
            switchLoginType(currentLoginType);
        });
    });

    modeTabs.forEach(tab => {
        tab.addEventListener('click', function() {
            modeTabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentLoginMode = this.dataset.mode;
            switchLoginMode(currentLoginMode);
        });
    });
}

function switchLoginType(type) {
    const usernameGroup = document.getElementById('usernameGroup');
    const emailGroup = document.getElementById('emailGroup');
    const phoneGroup = document.getElementById('phoneGroup');
    const modeTabs = document.getElementById('loginModeTabs');

    usernameGroup.style.display = 'none';
    emailGroup.style.display = 'none';
    phoneGroup.style.display = 'none';

    if (type === 'username') {
        usernameGroup.style.display = 'block';
        modeTabs.style.display = 'none';
        // 用户名只能用密码
        switchLoginMode('password');
    } else {
        if (type === 'email') {
            emailGroup.style.display = 'block';
        } else {
            phoneGroup.style.display = 'block';
        }
        modeTabs.style.display = 'flex';
        // 重置为密码模式
        const modeTabsEls = document.querySelectorAll('#loginModeTabs .login-mode-tab');
        modeTabsEls.forEach(t => t.classList.remove('active'));
        modeTabsEls[0].classList.add('active');
        currentLoginMode = 'password';
        switchLoginMode('password');
    }

    clearErrors();
    clearInputs();
}

function switchLoginMode(mode) {
    const passwordGroup = document.getElementById('passwordGroup');
    const codeGroup = document.getElementById('codeGroup');
    const authOptions = document.getElementById('authOptions');

    if (mode === 'password') {
        passwordGroup.style.display = 'block';
        codeGroup.style.display = 'none';
        authOptions.style.display = 'flex';
    } else {
        passwordGroup.style.display = 'none';
        codeGroup.style.display = 'block';
        authOptions.style.display = 'none';
        updateSendCodeBtn();
    }

    clearErrors();
}

// ============================================================
// 密码显示切换
// ============================================================
function initPasswordToggle() {
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('loginPassword');

    toggleBtn.addEventListener('click', function() {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        this.className = isPassword ? 'bi bi-eye input-icon' : 'bi bi-eye-slash input-icon';
        this.style.left = 'auto';
        this.style.right = '14px';
        this.style.cursor = 'pointer';
        this.style.pointerEvents = 'auto';
    });
}

// ============================================================
// 发送验证码
// ============================================================
function updateSendCodeBtn() {
    const btn = document.getElementById('sendCodeBtn');
    if (!btn) return;

    if (codeCountdown > 0) {
        btn.disabled = true;
        btn.textContent = codeCountdown + 's 后重发';
    } else {
        const hasTarget = getLoginTarget();
        btn.disabled = !hasTarget;
        btn.textContent = '发送验证码';
    }
}

function getLoginTarget() {
    if (currentLoginType === 'email') {
        return document.getElementById('loginEmail').value.trim();
    } else if (currentLoginType === 'phone') {
        return document.getElementById('loginPhone').value.trim();
    }
    return '';
}

async function sendVerificationCode() {
    const target = getLoginTarget();
    if (!target) {
        showError(currentLoginType === 'email' ? 'emailError' : 'phoneError', '请先输入' + (currentLoginType === 'email' ? '邮箱' : '手机号'));
        return;
    }

    // 验证格式
    if (currentLoginType === 'email') {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(target)) {
            showError('emailError', '邮箱格式不正确');
            return;
        }
    } else if (currentLoginType === 'phone') {
        const phoneRegex = /^1[3-9]\d{9}$/;
        if (!phoneRegex.test(target)) {
            showError('phoneError', '手机号格式不正确');
            return;
        }
    }

    try {
        const resp = await fetch(BASE_URL + '/api/auth/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target: target, type: 'login' }),
        });
        const result = await resp.json();

        if (result && result.success) {
            showToast(result.message || '验证码已发送', 'success');
            // 开发环境显示验证码
            if (result.code) {
                console.log('验证码:', result.code);
            }
            startCountdown();
        } else {
            showToast(result.message || '发送失败', 'error');
        }
    } catch (err) {
        showToast('发送失败，请稍后重试', 'error');
    }
}

function startCountdown() {
    codeCountdown = 60;
    updateSendCodeBtn();
    countdownTimer = setInterval(() => {
        codeCountdown--;
        updateSendCodeBtn();
        if (codeCountdown <= 0) {
            clearInterval(countdownTimer);
            countdownTimer = null;
        }
    }, 1000);
}

// 绑定发送验证码按钮
document.addEventListener('DOMContentLoaded', function() {
    const sendBtn = document.getElementById('sendCodeBtn');
    if (sendBtn) {
        sendBtn.addEventListener('click', sendVerificationCode);
    }
    // 监听邮箱/手机号输入变化
    const emailInput = document.getElementById('loginEmail');
    const phoneInput = document.getElementById('loginPhone');
    if (emailInput) emailInput.addEventListener('input', updateSendCodeBtn);
    if (phoneInput) phoneInput.addEventListener('input', updateSendCodeBtn);
});

// ============================================================
// 表单验证
// ============================================================
function validateForm() {
    let isValid = true;
    clearErrors();

    // 验证账号
    if (currentLoginType === 'username') {
        const username = document.getElementById('loginUsername').value.trim();
        if (!username) {
            showError('usernameError', '请输入用户名');
            isValid = false;
        }
    } else if (currentLoginType === 'email') {
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) {
            showError('emailError', '请输入邮箱');
            isValid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError('emailError', '邮箱格式不正确');
            isValid = false;
        }
    } else if (currentLoginType === 'phone') {
        const phone = document.getElementById('loginPhone').value.trim();
        if (!phone) {
            showError('phoneError', '请输入手机号');
            isValid = false;
        } else if (!/^1[3-9]\d{9}$/.test(phone)) {
            showError('phoneError', '手机号格式不正确');
            isValid = false;
        }
    }

    // 密码模式验证密码
    if (currentLoginMode === 'password') {
        const password = document.getElementById('loginPassword').value;
        if (!password) {
            showError('passwordError', '请输入密码');
            isValid = false;
        } else if (password.length < 6) {
            showError('passwordError', '密码至少6位');
            isValid = false;
        }
    } else {
        // 验证码模式
        const code = document.getElementById('loginCode').value.trim();
        if (!code) {
            showError('codeError', '请输入验证码');
            isValid = false;
        } else if (code.length < 4) {
            showError('codeError', '验证码至少4位');
            isValid = false;
        }
    }

    return isValid;
}

function showError(id, msg) {
    const el = document.getElementById(id);
    if (el) {
        el.textContent = msg;
        el.style.display = 'block';
    }
    // 高亮对应的输入框
    const inputMap = {
        'usernameError': 'loginUsername',
        'emailError': 'loginEmail',
        'phoneError': 'loginPhone',
        'passwordError': 'loginPassword',
        'codeError': 'loginCode',
    };
    const inputId = inputMap[id];
    if (inputId) {
        const input = document.getElementById(inputId);
        if (input) input.classList.add('error');
    }
}

function clearErrors() {
    document.querySelectorAll('.error-msg').forEach(el => {
        el.textContent = '';
        el.style.display = 'none';
    });
    document.querySelectorAll('.form-control.error').forEach(el => {
        el.classList.remove('error');
    });
}

function clearInputs() {
    document.querySelectorAll('#loginForm .form-control').forEach(input => {
        input.value = '';
    });
    document.getElementById('loginCode') && (document.getElementById('loginCode').value = '');
}

// ============================================================
// 表单提交
// ============================================================
function initFormSubmit() {
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!validateForm()) return;

        const loginBtn = document.getElementById('loginBtn');
        loginBtn.classList.add('loading');
        loginBtn.disabled = true;

        const payload = {
            type: currentLoginType,
        };

        if (currentLoginType === 'username') {
            payload.account = document.getElementById('loginUsername').value.trim();
        } else if (currentLoginType === 'email') {
            payload.account = document.getElementById('loginEmail').value.trim();
            payload.email = payload.account;
        } else {
            payload.account = document.getElementById('loginPhone').value.trim();
            payload.phone = payload.account;
        }

        if (currentLoginMode === 'password') {
            payload.password = document.getElementById('loginPassword').value;
        } else {
            payload.code = document.getElementById('loginCode').value.trim();
        }

        try {
            const resp = await fetch(BASE_URL + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const result = await resp.json();

            if (result && result.success) {
                // 存储token
                localStorage.setItem('timeforge_token', result.token);
                if (result.user) {
                    localStorage.setItem('timeforge_user', JSON.stringify(result.user));
                }
                // 记住我
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('timeforge_remember', '1');
                }
                showToast('登录成功！欢迎回来', 'success');
                // 跳转到仪表盘
                setTimeout(() => {
                    window.location.href = '/';
                }, 500);
            } else {
                showToast(result.message || '登录失败', 'error');
            }
        } catch (err) {
            showToast('网络错误，请稍后重试', 'error');
        } finally {
            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;
        }
    });
}

// ============================================================
// 忘记密码
// ============================================================
async function handleForgotPassword() {
    if (currentLoginType !== 'email') {
        showToast('请先切换到邮箱登录方式', 'warning');
        // 自动切换
        const typeTabs = document.querySelectorAll('#loginTypeTabs .login-type-tab');
        typeTabs.forEach(t => t.classList.remove('active'));
        const emailTab = document.querySelector('#loginTypeTabs .login-type-tab[data-type="email"]');
        if (emailTab) {
            emailTab.classList.add('active');
            currentLoginType = 'email';
            switchLoginType('email');
        }
        return;
    }

    const email = document.getElementById('loginEmail').value.trim();
    if (!email) {
        showError('emailError', '请先输入邮箱地址');
        return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('emailError', '邮箱格式不正确');
        return;
    }

    try {
        const resp = await fetch(BASE_URL + '/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email }),
        });
        const result = await resp.json();
        if (result && result.success) {
            showToast('密码重置链接已发送到您的邮箱', 'success');
        } else {
            showToast(result.message || '操作失败', 'error');
        }
    } catch (err) {
        showToast('网络错误，请稍后重试', 'error');
    }
}

// ============================================================
// Toast 通知 (复用全局函数)
// ============================================================
// 如果全局 showToast 不可用，则使用内置实现
if (typeof showToast === 'undefined') {
    window.showToast = function(message, type, duration) {
        duration = duration || 3000;
        const container = document.getElementById('toastContainer');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = 'toast-custom ' + (type || 'info');
        toast.innerHTML = `
            <div class="d-flex align-items-center justify-content-between">
                <span>${message}</span>
                <button class="btn-close btn-close-white ms-3" style="font-size: 10px;" onclick="this.parentElement.parentElement.remove()"></button>
            </div>
        `;
        container.appendChild(toast);

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    };
}
</script>
