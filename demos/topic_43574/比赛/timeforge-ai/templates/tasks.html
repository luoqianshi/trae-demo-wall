{% extends "base.html" %}
{% block title %}任务管理 - TimeForge X{% endblock %}

{% block extra_head %}
<style>
  .tasks-layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    min-height: calc(100vh - 60px);
  }
  .tasks-main {
    padding: 32px 40px;
    overflow-y: auto;
  }
  .tasks-panel {
    background: var(--color-bg-secondary);
    border-left: 1px solid rgba(255,255,255,0.04);
    padding: 32px 24px;
    overflow-y: auto;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-header h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-text-muted);
    margin: 0;
  }
  .section-header .count {
    font-size: 12px;
    color: rgba(148,163,184,0.5);
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
  }
  .filter-tab {
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .filter-tab:hover { color: var(--color-text); background: rgba(255,255,255,0.04); }
  .filter-tab.active { color: #fff; background: var(--color-primary); }

  /* Task rows */
  .task-rows {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    overflow: hidden;
  }
  .task-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: var(--color-bg-secondary);
    transition: background 0.2s ease;
    cursor: pointer;
  }
  .task-row:hover { background: rgba(99,102,241,0.03); }
  .task-row .task-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .task-row .task-dot.in-progress { background: var(--color-primary); }
  .task-row .task-dot.done { background: var(--color-secondary); }
  .task-row .task-dot.delayed { background: #EF4444; }
  .task-row .task-info { flex: 1; min-width: 0; }
  .task-row .task-title { font-size: 14px; font-weight: 500; color: var(--color-text); }
  .task-row .task-type {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 100px;
    background: rgba(99,102,241,0.12);
    color: var(--color-primary-light);
    display: inline-block;
    margin-top: 4px;
  }
  .task-row .task-meta-row {
    display: flex;
    gap: 16px;
    margin-top: 4px;
    font-size: 12px;
    color: var(--color-text-muted);
  }
  .task-row .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .task-row .task-actions .btn-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
    background: transparent;
    color: var(--color-text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 14px;
  }
  .task-row .task-actions .btn-icon:hover {
    background: rgba(255,255,255,0.05);
    color: var(--color-text);
    border-color: rgba(255,255,255,0.12);
  }
  .task-row .task-actions .btn-icon.danger:hover { color: #EF4444; border-color: rgba(239,68,68,0.3); }

  /* Progress bar */
  .task-progress-mini {
    width: 64px;
    flex-shrink: 0;
  }
  .task-progress-mini .progress-bar-inner {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
  }
  .task-progress-mini .progress-fill {
    height: 100%;
    background: var(--color-primary);
    border-radius: 4px;
  }
  .task-progress-mini .progress-text {
    font-size: 11px;
    color: var(--color-text-muted);
    text-align: right;
    margin-top: 2px;
  }

  /* Create form */
  .create-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .form-field label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-text-muted);
    margin-bottom: 6px;
    display: block;
  }
  .form-field input,
  .form-field select,
  .form-field textarea {
    width: 100%;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--color-text);
    font-size: 14px;
    transition: all 0.2s ease;
    outline: none;
  }
  .form-field input:focus,
  .form-field select:focus,
  .form-field textarea:focus {
    border-color: var(--color-primary);
    background: rgba(99,102,241,0.04);
  }
  .form-field select { cursor: pointer; }
  .form-field select option { background: var(--color-bg-secondary); color: var(--color-text); }
  .btn-create {
    width: 100%;
    padding: 12px;
    background: var(--gradient-accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn-create:hover { box-shadow: 0 4px 20px rgba(99,102,241,0.35); transform: translateY(-1px); }
  .btn-create:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Subtask inputs */
  .subtask-inputs {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .subtask-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .subtask-row input {
    flex: 1;
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: var(--color-text);
    font-size: 13px;
    outline: none;
  }
  .subtask-row input:focus { border-color: var(--color-primary); }
  .subtask-row .btn-remove {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid rgba(239,68,68,0.2);
    background: transparent;
    color: #EF4444;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .btn-add-subtask {
    padding: 6px 14px;
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 6px;
    background: transparent;
    color: var(--color-text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    align-self: flex-start;
  }
  .btn-add-subtask:hover { border-color: var(--color-primary); color: var(--color-primary-light); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--color-text-muted);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state .empty-text { font-size: 15px; }

  /* Responsive */
  @media (max-width: 992px) {
    .tasks-layout { grid-template-columns: 1fr; }
    .tasks-panel { border-left: none; border-top: 1px solid rgba(255,255,255,0.04); }
  }
  @media (max-width: 768px) {
    .tasks-main { padding: 20px 16px; }
    .task-row { flex-wrap: wrap; }
    .task-row .task-progress-mini { width: 100%; order: 3; }
    .task-row .task-actions { order: 2; }
  }
</style>
{% endblock %}

{% block content %}
<div class="tasks-layout">

  <!-- ════════════════════════════════
       MAIN: Task List
       ════════════════════════════════ -->
  <div class="tasks-main">
    <div class="section-header">
      <h2>任务列表</h2>
      <span class="count" id="taskCount">-- 项</span>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterTasks('all')">全部</button>
      <button class="filter-tab" onclick="filterTasks('进行中')">进行中</button>
      <button class="filter-tab" onclick="filterTasks('已完成')">已完成</button>
      <button class="filter-tab" onclick="filterTasks('已延期')">已延期</button>
    </div>

    <!-- Task rows -->
    <div class="task-rows" id="taskRows">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">加载中...</div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════
       PANEL: Create Task
       ════════════════════════════════ -->
  <div class="tasks-panel">
    <div class="section-header" style="margin-bottom:20px;">
      <h2>添加任务</h2>
    </div>

    <form class="create-form" id="createForm" onsubmit="createTask(event)">
      <div class="form-field">
        <label>任务名称 *</label>
        <input type="text" id="taskTitle" placeholder="例如：数据结构实验报告" required>
      </div>
      <div class="form-field">
        <label>任务类型</label>
        <select id="taskType">
          <option value="课程设计">课程设计</option>
          <option value="实验报告">实验报告</option>
          <option value="考试复习">考试复习</option>
          <option value="考研复习">考研复习</option>
          <option value="竞赛项目">竞赛项目</option>
          <option value="英语四级">英语四级</option>
          <option value="创业项目">创业项目</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-field">
        <label>截止日期 *</label>
        <input type="date" id="taskDeadline" required>
      </div>
      <div class="form-field">
        <label>难度 (1-5)</label>
        <input type="range" id="taskDifficulty" min="1" max="5" value="3" style="width:100%;">
        <small style="color:var(--color-text-muted);" id="diffLabel">难度: 3</small>
      </div>
      <div class="form-field">
        <label>预计工时 (小时)</label>
        <input type="number" id="taskHours" value="20" min="1" max="500">
      </div>
      <div class="form-field">
        <label>子任务</label>
        <div class="subtask-inputs" id="subtaskList">
          <div class="subtask-row">
            <input type="text" placeholder="子任务名称" value="需求分析">
            <button type="button" class="btn-remove" onclick="removeSubtask(this)">×</button>
          </div>
          <div class="subtask-row">
            <input type="text" placeholder="子任务名称" value="设计">
            <button type="button" class="btn-remove" onclick="removeSubtask(this)">×</button>
          </div>
          <div class="subtask-row">
            <input type="text" placeholder="子任务名称" value="实现">
            <button type="button" class="btn-remove" onclick="removeSubtask(this)">×</button>
          </div>
          <div class="subtask-row">
            <input type="text" placeholder="子任务名称" value="测试">
            <button type="button" class="btn-remove" onclick="removeSubtask(this)">×</button>
          </div>
          <div class="subtask-row">
            <input type="text" placeholder="子任务名称" value="文档">
            <button type="button" class="btn-remove" onclick="removeSubtask(this)">×</button>
          </div>
        </div>
        <button type="button" class="btn-add-subtask" onclick="addSubtask()">+ 添加子任务</button>
      </div>
      <button type="submit" class="btn-create" id="createBtn">
        <i class="bi bi-plus-lg me-1"></i> 创建任务
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  let allTasks = [];
  let currentFilter = 'all';

  // Load tasks
  async function loadTasks() {
    try {
      const token = localStorage.getItem('timeforge_token');
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;

      const resp = await fetch('/api/tasks', { headers });
      const data = await resp.json();
      allTasks = data.tasks || [];
      document.getElementById('taskCount').textContent = allTasks.length + ' 项';
      renderTasks();
    } catch (err) {
      console.error('加载任务失败:', err);
    }
  }

  // Render tasks
  function renderTasks() {
    const container = document.getElementById('taskRows');
    let tasks = allTasks;
    if (currentFilter !== 'all') {
      tasks = allTasks.filter(t => t.status === currentFilter);
    }

    if (tasks.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-text">${currentFilter === 'all' ? '暂无任务，在右侧创建第一个任务' : '没有' + currentFilter + '的任务'}</div>
        </div>`;
      return;
    }

    container.innerHTML = tasks.map(t => {
      const subs = t.subtasks || [];
      const done = subs.filter(s => s.completed).length;
      const pct = subs.length ? Math.round(done / subs.length * 100) : 0;
      const statusClass = t.status === '已完成' ? 'done' : t.status === '已延期' ? 'delayed' : 'in-progress';

      return `
        <div class="task-row">
          <div class="task-dot ${statusClass}"></div>
          <div class="task-info">
            <div class="task-title">${escapeHtml(t.title)}</div>
            <span class="task-type">${escapeHtml(t.type)}</span>
            <div class="task-meta-row">
              <span>📅 ${t.deadline || '--'}</span>
              <span>⭐ 难度 ${t.difficulty}</span>
              <span>⏱ ${t.estimated_hours}h</span>
            </div>
          </div>
          <div class="task-progress-mini">
            <div class="progress-bar-inner"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="progress-text">${done}/${subs.length}</div>
          </div>
          <div class="task-actions">
            <button class="btn-icon" title="完成子任务" onclick="event.stopPropagation();completeSubtask(${t.id})">
              <i class="bi bi-check-lg"></i>
            </button>
            <button class="btn-icon danger" title="删除" onclick="event.stopPropagation();deleteTask(${t.id})">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>`;
    }).join('');
  }

  // Filter
  function filterTasks(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach((tab, i) => {
      tab.classList.toggle('active', (['all','进行中','已完成','已延期'][i] || 'all') === filter);
    });
    renderTasks();
  }

  // Create task
  async function createTask(e) {
    e.preventDefault();
    const btn = document.getElementById('createBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>创建中...';

    const title = document.getElementById('taskTitle').value.trim();
    const type = document.getElementById('taskType').value;
    const deadline = document.getElementById('taskDeadline').value;
    const difficulty = parseInt(document.getElementById('taskDifficulty').value);
    const estimatedHours = parseFloat(document.getElementById('taskHours').value);

    const subtaskInputs = document.querySelectorAll('#subtaskList input');
    const subtasks = [];
    subtaskInputs.forEach(input => {
      const val = input.value.trim();
      if (val) {
        subtasks.push({
          title: val,
          completed: false,
          estimated_hours: Math.round(estimatedHours / subtaskInputs.length * 10) / 10,
        });
      }
    });

    try {
      const token = localStorage.getItem('timeforge_token');
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;

      const resp = await fetch('/api/tasks', {
        method: 'POST',
        headers,
        body: JSON.stringify({ title, type, deadline, difficulty, estimated_hours: estimatedHours, subtasks }),
      });
      const data = await resp.json();

      if (data.success) {
        alert('任务创建成功！');
        document.getElementById('createForm').reset();
        document.getElementById('taskDeadline').value = new Date(Date.now() + 7*86400000).toISOString().split('T')[0];
        document.getElementById('taskDifficulty').value = 3;
        document.getElementById('diffLabel').textContent = '难度: 3';
        loadTasks();
      } else {
        alert(data.message || '创建失败');
      }
    } catch (err) {
      console.error('创建任务失败:', err);
      alert('创建失败，请检查网络');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-plus-lg me-1"></i> 创建任务';
    }
  }

  // Complete subtask
  async function completeSubtask(taskId) {
    const task = allTasks.find(t => t.id === taskId);
    if (!task) return;
    const subs = task.subtasks || [];
    const nextIdx = subs.findIndex(s => !s.completed);
    if (nextIdx === -1) { alert('所有子任务已完成！'); return; }

    try {
      const token = localStorage.getItem('timeforge_token');
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;

      const resp = await fetch(`/api/tasks/${taskId}/complete`, {
        method: 'POST',
        headers,
        body: JSON.stringify({ subtask_index: nextIdx }),
      });
      const data = await resp.json();
      if (data.success) {
        alert(data.message);
        loadTasks();
        // Also refresh dashboard area
        if (window.refreshDashboard) window.refreshDashboard();
      }
    } catch (err) {
      console.error('完成子任务失败:', err);
    }
  }

  // Delete task
  async function deleteTask(taskId) {
    if (!confirm('确定要删除这个任务吗？')) return;
    try {
      const token = localStorage.getItem('timeforge_token');
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;

      const resp = await fetch(`/api/tasks/${taskId}`, { method: 'DELETE', headers });
      const data = await resp.json();
      if (data.success) {
        alert('任务已删除');
        loadTasks();
      } else {
        alert(data.message || '删除失败');
      }
    } catch (err) {
      console.error('删除任务失败:', err);
    }
  }

  // Add subtask input
  function addSubtask() {
    const container = document.getElementById('subtaskList');
    const row = document.createElement('div');
    row.className = 'subtask-row';
    row.innerHTML = `
      <input type="text" placeholder="子任务名称">
      <button type="button" class="btn-remove" onclick="removeSubtask(this)">×</button>
    `;
    container.appendChild(row);
    row.querySelector('input').focus();
  }

  // Remove subtask input
  function removeSubtask(btn) {
    const rows = document.querySelectorAll('#subtaskList .subtask-row');
    if (rows.length <= 1) return;
    btn.closest('.subtask-row').remove();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Init
  document.addEventListener('DOMContentLoaded', () => {
    // Set default deadline to 7 days from now
    document.getElementById('taskDeadline').value = new Date(Date.now() + 7*86400000).toISOString().split('T')[0];
    document.getElementById('taskDifficulty').addEventListener('input', function() {
      document.getElementById('diffLabel').textContent = '难度: ' + this.value;
    });
    loadTasks();
  });
</script>
{% endblock %}
