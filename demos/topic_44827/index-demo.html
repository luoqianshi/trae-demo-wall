/* ==========================================================
   急救侠 · 急救课堂
   ========================================================== */
(function () {
  const { el, ICONS, formatDate, toast, showSheet } = window.UTIL;
  const MOCK = window.MOCK;

  let state = {
    tab: 'all',     // all | CPR | 海姆立克 | 止血包扎 | 其他
    view: 'feed',   // feed | demand | detail
    articleId: null
  };

  const TABS = [
    { k: 'all', t: '全部' },
    { k: 'CPR', t: 'CPR' },
    { k: '海姆立克', t: '海姆立克' },
    { k: '止血包扎', t: '止血包扎' },
    { k: '其他', t: '其他' }
  ];

  function filtered() {
    if (state.tab === 'all') return MOCK.ARTICLES;
    return MOCK.ARTICLES.filter(a => a.category === state.tab);
  }

  function buildArticleCard(a) {
    const card = el('div', { class: 'article-card', onclick: () => { state.view = 'detail'; state.articleId = a.id; window.app.refresh(); } });
    card.innerHTML = `
      <div class="article-cover" style="background:${a.cover};">
        <div style="font-size:34px;">${a.emoji}</div>
        ${a.videoUrl ? '<div class="play">' + ICONS.play + '</div>' : ''}
      </div>
      <div class="article-info">
        <div class="t">${a.title}</div>
        <div class="s">${a.summary}</div>
        <div class="m">
          <span class="chip">${a.category}</span>
          <span style="color:var(--text-3);">·</span>
          <span>${a.readMinutes} 分钟</span>
          <span style="color:var(--text-3);">·</span>
          <span>${formatDate(a.publishedAt)}</span>
        </div>
      </div>
    `;
    return card;
  }

  function buildTabs() {
    const wrap = el('div', { class: 'class-tabs' });
    TABS.forEach(t => {
      const b = el('button', { class: 'class-tab' + (state.tab === t.k ? ' on' : ''), onclick: () => { state.tab = t.k; window.app.refresh(); } });
      b.textContent = t.t;
      wrap.appendChild(b);
    });
    return wrap;
  }

  function buildSwitcher() {
    const wrap = el('div', { style: 'display:flex;gap:8px;margin-bottom:12px;' });
    [
      { k: 'feed', t: '知识库' },
      { k: 'demand', t: '培训供需' }
    ].forEach(s => {
      const b = el('button', { class: 'btn btn-sm ' + (state.view === s.k ? 'btn-primary' : 'btn-secondary'), onclick: () => { state.view = s.k; window.app.refresh(); } });
      b.textContent = s.t;
      wrap.appendChild(b);
    });
    const sp = el('div', { class: 'spacer' });
    wrap.appendChild(sp);
    return wrap;
  }

  function publishDemand() {
    const sheet = showSheet(el('div', {}, [
      el('div', { class: 'sheet-grabber' }),
      el('div', { class: 'sheet-tt' }, '发布培训需求'),
      el('div', { class: 'sheet-sub' }, '有资质的医院或培训点可在线承接'),
      (() => {
        const wrap = el('div', { style: 'display:flex;flex-direction:column;gap:10px;' });
        const fields = [
          { k: 'org', t: '组织名称', v: '请输入单位名称' },
          { k: 'contact', t: '联系人', v: '请输入联系人' },
          { k: 'phone', t: '联系电话', v: '请输入手机号' },
          { k: 'topic', t: '培训主题', v: '如：CPR + AED 培训' },
          { k: 'scale', t: '参训人数', v: '如：50' }
        ];
        fields.forEach(f => {
          const row = el('div', { style: 'display:flex;align-items:center;gap:10px;background:var(--bg-2);padding:10px 12px;border-radius:10px;' });
          row.innerHTML = `<div style="font-size:12px;color:var(--text-2);width:60px;flex-shrink:0;">${f.t}</div>`;
          const inp = el('input', { placeholder: f.v, style: 'flex:1;background:transparent;border:none;outline:none;color:var(--text-0);font-size:13px;' });
          row.appendChild(inp);
          wrap.appendChild(row);
        });
        return wrap;
      })(),
      (() => {
        const acts = el('div', { class: 'sheet-actions' });
        const cancel = el('button', { class: 'btn btn-secondary', onclick: () => sheet.close() });
        cancel.textContent = '取消';
        const ok = el('button', { class: 'btn btn-primary', onclick: () => { sheet.close(); toast('已发布培训需求，将自动匹配', 'success', 'check'); } });
        ok.innerHTML = ICONS.send + ' 提交';
        acts.appendChild(cancel);
        acts.appendChild(ok);
        return acts;
      })()
    ]));
  }

  function buildDemandCard(d) {
    const card = el('div', { class: 'training-card' });
    card.innerHTML = `
      <div class="hd">
        <div class="tt">${d.topic}</div>
        <span class="chip ${d.status === '招募中' ? 'chip-green' : d.status === '已确认' ? 'chip-blue' : 'chip'}">${d.status}</span>
      </div>
      <div class="meta">
        <span class="chip">${d.orgName}</span>
        <span class="chip">${d.city}</span>
        <span class="chip">${d.scale} 人</span>
      </div>
      <div class="desc">联系人：${d.contact} · ${d.phone}<br/>时间：${new Date(d.scheduledAt).toLocaleString()}</div>
      <div class="ft">
        <div class="spacer"></div>
        ${d.status === '招募中' ? '<button class="btn btn-sm btn-primary">立即承接</button>' : '<button class="btn btn-sm btn-secondary" disabled>不可承接</button>'}
      </div>
    `;
    return card;
  }

  function renderDetail() {
    const a = MOCK.ARTICLES.find(x => x.id === state.articleId);
    if (!a) {
      state.view = 'feed';
      return render();
    }
    const page = el('div', { class: 'page' });
    const head = el('div', { class: 'app-header' });
    head.innerHTML = `<button class="back">${ICONS.back}</button><div class="title">${a.title}</div><div class="spacer"></div><button class="action">${ICONS.share}</button>`;
    head.querySelector('.back').addEventListener('click', () => { state.view = 'feed'; window.app.refresh(); });
    head.querySelector('.action').addEventListener('click', () => toast('已复制分享链接', 'success', 'check'));
    page.appendChild(head);

    // 封面
    const cover = el('div', { style: `height:200px;border-radius:18px;background:${a.cover};display:grid;place-items:center;font-size:80px;margin-bottom:14px;position:relative;overflow:hidden;` });
    cover.innerHTML = `<div style="font-size:80px;">${a.emoji}</div>`;
    if (a.videoUrl) {
      const play = el('div', { style: 'position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:rgba(0,0,0,0.4);display:grid;place-items:center;color:#fff;backdrop-filter:blur(8px);' });
      play.innerHTML = ICONS.play;
      cover.appendChild(play);
    }
    page.appendChild(cover);

    // 标签
    const meta = el('div', { style: 'display:flex;gap:8px;margin-bottom:14px;' });
    meta.innerHTML = `<span class="chip">${a.category}</span><span class="chip">${a.readMinutes} 分钟阅读</span><span class="chip">${formatDate(a.publishedAt)}</span>`;
    page.appendChild(meta);

    // 摘要
    const sum = el('div', { class: 'card' });
    sum.innerHTML = `<div style="font-size:13px;color:var(--text-1);line-height:1.7;">${a.summary}</div>`;
    page.appendChild(sum);

    // 模拟正文
    const body = el('div', { class: 'card', style: 'margin-top:10px;' });
    body.innerHTML = `
      <h3 style="margin:0 0 10px;font-size:15px;font-weight:700;">一、识别与判断</h3>
      <p style="margin:0 0 12px;font-size:13px;line-height:1.8;color:var(--text-1);">当发现有人突然倒地时，首先应轻拍双肩并在两侧耳旁大声呼喊，判断意识是否清醒。同时观察胸廓起伏，判断呼吸情况。如果患者无意识、无呼吸或仅有濒死叹息样呼吸，应立即开始心肺复苏。</p>
      <h3 style="margin:0 0 10px;font-size:15px;font-weight:700;">二、关键步骤</h3>
      <p style="margin:0 0 12px;font-size:13px;line-height:1.8;color:var(--text-1);">1. 立即呼叫120，告知准确位置。<br/>2. 胸外按压：双手交叉，掌根对准两乳头连线中点，深度 5-6cm，频率 100-120次/分。<br/>3. 开放气道，仰头举颏法。<br/>4. 人工呼吸 2 次，每次 1 秒。<br/>5. 持续 30:2 的按压通气比。</p>
      <h3 style="margin:0 0 10px;font-size:15px;font-weight:700;">三、注意事项</h3>
      <p style="margin:0;font-size:13px;line-height:1.8;color:var(--text-1);">按压时手臂伸直、肩肘腕保持垂直，让掌根发力，避免肋骨骨折。如现场有 AED，应尽早除颤。</p>
    `;
    page.appendChild(body);

    return page;
  }

  function render() {
    if (state.view === 'detail') return renderDetail();

    const page = el('div', { class: 'page' });
    const { appHeader } = window.COMP;
    page.appendChild(appHeader({ title: '急救课堂' }).header);

    page.appendChild(buildSwitcher());
    page.appendChild(buildTabs());

    if (state.view === 'feed') {
      const list = el('div');
      filtered().forEach(a => list.appendChild(buildArticleCard(a)));
      page.appendChild(list);
    } else {
      page.appendChild(el('div', { class: 'card', style: 'background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.3);' },
        (() => {
          const wrap = el('div', { style: 'display:flex;align-items:center;gap:10px;' });
          wrap.innerHTML = `<div style="width:36px;height:36px;border-radius:10px;background:rgba(124,58,237,.2);color:#B499F4;display:grid;place-items:center;">${ICONS.trophy}</div><div><div style="font-size:13px;font-weight:600;">培训供需大厅</div><div style="font-size:11px;color:var(--text-2);margin-top:2px;">有资质的医院/培训机构可承接需求</div></div>`;
          return wrap;
        })()
      ));
      MOCK.DEMANDS.forEach(d => page.appendChild(buildDemandCard(d)));
    }

    return page;
  }

  function onBack() {
    if (state.view === 'detail') {
      state.view = 'feed';
      window.app.refresh();
      return true;
    }
    return false;
  }

  window.ClassPage = { render, onBack };
})();

  function addContact() {

      { k: 'name', t: '姓名', v: '请输入姓名' },
      { k: 'phone', t: '手机号', v: '请输入手机号' },

      row.innerHTML = `<div style="font-size:12px;color:var(--text-2);width:60px;flex-shrink:0;">${f.t}</div>`;

    content.appendChild(acts);

  function buildCert() {

})();

/* ===== src\js\app.js ===== */
/* ==========================================================
   急救侠 · 应用主入口
   路由 + 渲染 + 状态管理
   ========================================================== */
(function () {
  const PAGES = {
    home: () => window.HomePage.render(),
    map: () => window.MapPage.render(),
    assess: () => window.AssessPage.render(),
    sos: () => window.SOSPage.render(),
    class: () => window.ClassPage.render(),
    card: () => window.CardPage.render(),
    honor: () => window.HonorPage.render()
  };

  // 路由与 Tab 映射
  const TAB_TO_ROUTE = { home: 'home', map: 'map', sos: 'sos', assess: 'assess', card: 'card' };
  const ROUTE_TO_TAB = { home: 'home', map: 'map', sos: 'sos', assess: 'assess', card: 'card' };

  let currentRoute = 'home';
  let historyStack = ['home'];

  function goBack() {
    if (historyStack.length > 1) {
      historyStack.pop();
      currentRoute = historyStack[historyStack.length - 1];
      render();
    }
  }

  window.addEventListener('popstate', () => {
    goBack();
  });

  function render() {
    const screen = document.getElementById('screen');
    const fn = PAGES[currentRoute] || PAGES.home;
    screen.innerHTML = '';
    const page = fn();
    if (page) screen.appendChild(page);
    // 滚动到顶
    screen.scrollTop = 0;
    // 更新 tab 状态
    const tab = ROUTE_TO_TAB[currentRoute];
    document.querySelectorAll('.tab-item').forEach(t => {
      t.classList.toggle('active', t.dataset.route === tab);
    });
  }

  function navigate(route, params) {
    if (!PAGES[route]) return;
    // Tab 栏页面切换不 push 历史（替换当前），非 Tab 页面才 push
    const isTab = !!TAB_TO_ROUTE[route];
    if (isTab) {
      // Tab 切换：找到栈中最后一个 Tab 页面，替换它
      while (historyStack.length > 0 && !TAB_TO_ROUTE[historyStack[historyStack.length - 1]]) {
        historyStack.pop();
      }
      if (historyStack.length === 0) historyStack.push(route);
      else historyStack[historyStack.length - 1] = route;
    } else if (route !== historyStack[historyStack.length - 1]) {
      historyStack.push(route);
    }
    currentRoute = route;
    if (params && route === 'honor' && params.tab) {
      // honor 子 tab 切换通过 module state 控制
      const ev = new CustomEvent('honor:tab', { detail: params });
      window.dispatchEvent(ev);
    }
    render();
  }

  function refresh() { render(); }

  function goBack() {
    // 先尝试当前页面的内部返回（如详情→列表）
    const pageName = currentRoute.charAt(0).toUpperCase() + currentRoute.slice(1) + 'Page';
    const pageObj = window[pageName];
    if (pageObj && typeof pageObj.onBack === 'function') {
      if (pageObj.onBack()) return; // 返回 true 表示已处理内部返回
    }
    // 否则路由级返回
    if (historyStack.length > 1) {
      historyStack.pop();
      currentRoute = historyStack[historyStack.length - 1];
      render();
    } else if (TAB_TO_ROUTE[currentRoute] && currentRoute !== 'home') {
      // Tab 页面栈底时，返回首页
      currentRoute = 'home';
      historyStack = ['home'];
      render();
    }
  }

  // 全局委托：所有返回按钮统一处理
  document.getElementById('screen').addEventListener('click', (e) => {
    const btn = e.target.closest('.back');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    goBack();
  }, true);

  // 绑定 tab
  document.querySelectorAll('.tab-item').forEach(t => {
    t.addEventListener('click', () => {
      const r = t.dataset.route;
      if (r) navigate(r);
    });
  });

  // 状态栏时间
  function updateClock() {
    const t = new Date();
    const hh = String(t.getHours()).padStart(2, '0');
    const mm = String(t.getMinutes()).padStart(2, '0');
    const el = document.getElementById('statusTime');
    if (el) el.textContent = `${hh}:${mm}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // 启动
  window.app = { navigate, refresh, goBack };
  render();
})();

</script>
</body>
</html>
