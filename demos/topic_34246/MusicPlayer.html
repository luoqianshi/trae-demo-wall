<script>
const audio = document.getElementById('bgMusic');
const playBtn = document.getElementById('playBtn');
const musicFolder = './Music/';
let musicFiles = [];
let currentIndex = 0;

// 读取 JSON 文件
fetch(musicFolder + 'musicList.json')
    .then(res => res.json())
    .then(data => {
        musicFiles = data;
        console.log('获取音乐列表成功:', musicFiles);
    })
    .catch(err => console.error('读取 musicList.json 出错:', err));

// 点击播放
playBtn.addEventListener('click', async () => {
    if(musicFiles.length === 0) {
        alert("音乐列表为空或尚未加载完成！");
        return;
    }

    audio.src = musicFolder + musicFiles[currentIndex];
    try { await audio.play(); console.log('音乐播放成功:', musicFiles[currentIndex]); }
    catch(e){ console.log('播放被阻止，需要用户交互', e); }

    playBtn.disabled = true;
    playBtn.style.opacity = 0.5;

    // 自动播放下一首
    audio.onended = () => {
        currentIndex = (currentIndex + 1) % musicFiles.length;
        audio.src = musicFolder + musicFiles[currentIndex];
        audio.play();
    };
});
</script>
