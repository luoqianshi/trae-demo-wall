<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵伴成长 - 家长报告</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8F3;
      --bg2: #FFF0E6;
      --ink: #2D2A32;
      --muted: #7A7580;
      --rule: #E8DDD5;
      --accent: #FF6B6B;
      --accent2: #4ECDC4;
      --accent3: #FFE66D;
      --accent4: #A8E6CF;
      --font: 'Noto Sans SC', -apple-system, sans-serif;
      --radius: 20px;
      --shadow: 0 4px 20px rgba(45, 42, 50, 0.08);
      --shadow-lg: 0 8px 40px rgba(45, 42, 50, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg) 0%, #E8EAF6 50%, var(--bg2) 100%);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
      text-decoration: none;
      color: var(--ink);
    }
    .back-btn:hover {
      border-color: var(--accent);
      transform: translateX(-2px);
    }
    .header-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    /* Cards */
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1rem 0;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Chart */
    .chart-container {
      height: 200px;
      position: relative;
      margin: 1rem 0;
    }
    .chart-bars {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      height: 160px;
      padding: 0 0.5rem;
    }
    .chart-bar {
      width: 40px;
      border-radius: 8px 8px 0 0;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      transition: height 1s ease;
      position: relative;
    }
    .chart-bar:hover {
      opacity: 0.8;
    }
    .chart-label {
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .chart-value {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    .stat-card {
      background: linear-gradient(135deg, var(--bg), #fff);
      border-radius: 16px;
      padding: 1.2rem;
      text-align: center;
      border: 2px solid var(--rule);
      transition: all 0.3s;
    }
    .stat-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      display: block;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* Report Items */
    .report-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .report-item:last-child {
      border-bottom: none;
    }
    .report-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
    }
    .report-value {
      font-weight: 700;
      font-size: 1rem;
    }
    .report-value.good {
      color: var(--accent2);
    }
    .report-value.warning {
      color: var(--accent);
    }

    /* AI Advice */
    .advice-card {
      background: linear-gradient(135deg, #FFF8F3, #F0FFFD);
      border-radius: 16px;
      padding: 1.2rem;
      margin-top: 1rem;
    }
    .advice-item {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    .advice-item:last-child {
      margin-bottom: 0;
    }
    .advice-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .advice-content {
      flex: 1;
    }
    .advice-title {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.3rem;
    }
    .advice-text {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Task Distribution */
    .task-dist {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .dist-bar {
      flex: 1;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      transition: all 0.3s;
    }
    .dist-bar:hover {
      transform: scaleY(1.1);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
      .chart-bar { width: 30px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="back-btn">←</a>
      <div class="header-title">📈 家长报告</div>
    </div>

    <div class="card">
      <div class="card-title">📊 本周学习趋势</div>
      <div class="chart-container">
        <div class="chart-bars" id="chartBars">
          <!-- Bars will be generated by JS -->
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 本周数据概览</div>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-number" id="statTasks">85%</span>
          <span class="stat-label">任务完成率</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="statXP">355</span>
          <span class="stat-label">本周总 XP</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="statStreak">3</span>
          <span class="stat-label">连续打卡(天)</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="statTotal">12</span>
          <span class="stat-label">累计任务</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📚 任务分布</div>
      <div class="task-dist" id="taskDist">
        <!-- Distribution bars will be generated by JS -->
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 详细报告</div>
      <div class="report-item">
        <span class="report-label">📖 阅读时长</span>
        <span class="report-value">5.5 小时</span>
      </div>
      <div class="report-item">
        <span class="report-label">🔢 数学练习</span>
        <span class="report-value">120 道题</span>
      </div>
      <div class="report-item">
        <span class="report-label">✏️ 书写作业</span>
        <span class="report-value">8 次</span>
      </div>
      <div class="report-item">
        <span class="report-label">🎨 创意手工</span>
        <span class="report-value">3 次</span>
      </div>
      <div class="report-item">
        <span class="report-label">🎯 平均每日 XP</span>
        <span class="report-value good">50.7</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💡 AI 成长建议</div>
      <div class="advice-card" id="adviceCard">
        <div class="advice-item">
          <div class="advice-icon">🌟</div>
          <div class="advice-content">
            <div class="advice-title">本周亮点</div>
            <div class="advice-text">阅读表现优秀，连续 3 天完成阅读打卡，专注力有明显提升。</div>
          </div>
        </div>
        <div class="advice-item">
          <div class="advice-icon">📌</div>
          <div class="advice-content">
            <div class="advice-title">改进建议</div>
            <div class="advice-text">数学练习频率偏低，建议每天增加 15-20 分钟数学练习时间。</div>
          </div>
        </div>
        <div class="advice-item">
          <div class="advice-icon">🎯</div>
          <div class="advice-content">
            <div class="advice-title">下周目标</div>
            <div class="advice-text">保持阅读好习惯，尝试挑战更高难度的数学题目，争取精灵升级！</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    const data = MemorySystem.getData();
    const stats = data.stats;

    // 渲染图表
    const weekDays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
    const chartBars = document.getElementById('chartBars');
    const maxXP = Math.max(...stats.weeklyXP);

    stats.weeklyXP.forEach((xp, i) => {
      const height = (xp / maxXP) * 140;
      const bar = document.createElement('div');
      bar.className = 'chart-bar';
      bar.style.height = '0px';
      bar.innerHTML = `
        <span class="chart-value">${xp}</span>
        <span class="chart-label">${weekDays[i]}</span>
      `;
      chartBars.appendChild(bar);

      // Animate height
      setTimeout(() => {
        bar.style.height = `${height}px`;
      }, 100 + i * 100);
    });

    // 更新统计数据
    document.getElementById('statTasks').textContent = `${Math.floor((stats.todayTasks / 5) * 100)}%`;
    document.getElementById('statXP').textContent = stats.weeklyXP.reduce((a, b) => a + b, 0);
    document.getElementById('statStreak').textContent = stats.streakDays;
    document.getElementById('statTotal').textContent = stats.totalTasks;

    // 任务分布
    const taskCounts = {};
    data.taskHistory.forEach(t => {
      taskCounts[t.type] = (taskCounts[t.type] || 0) + 1;
    });

    const taskDist = document.getElementById('taskDist');
    const totalTasks = Object.values(taskCounts).reduce((a, b) => a + b, 0);
    const taskColors = {
      reading: '#FF8FAB',
      math: '#4ECDC4',
      writing: '#A8E6CF',
      art: '#FFD93D'
    };

    Object.entries(taskCounts).forEach(([type, count]) => {
      const percentage = (count / totalTasks) * 100;
      const bar = document.createElement('div');
      bar.className = 'dist-bar';
      bar.style.width = `${percentage}%`;
      bar.style.background = taskColors[type] || '#ccc';
      bar.textContent = `${SPIRIT_CONFIG.taskTypes[type]?.name || type} ${Math.floor(percentage)}%`;
      taskDist.appendChild(bar);
    });

    // 生成个性化建议
    function generateAdvice() {
      const recentTypes = data.taskHistory.slice(0, 5).map(t => t.type);
      const allTypes = Object.keys(SPIRIT_CONFIG.taskTypes);
      const missing = allTypes.find(t => !recentTypes.includes(t));
      
      const adviceCard = document.getElementById('adviceCard');
      
      if (missing) {
        const taskName = SPIRIT_CONFIG.taskTypes[missing].name;
        adviceCard.innerHTML += `
          <div class="advice-item">
            <div class="advice-icon">💡</div>
            <div class="advice-content">
              <div class="advice-title">智能推荐</div>
              <div class="advice-text">最近缺少${taskName}，建议尝试，可获得${SPIRIT_CONFIG.taskTypes[missing].baseXP}点经验值。</div>
            </div>
          </div>
        `;
      }
    }

    generateAdvice();
  </script>
</body>
</html>
