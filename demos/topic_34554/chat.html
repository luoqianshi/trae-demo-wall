<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵伴成长 - 和精灵聊天</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8F3;
      --bg2: #FFF0E6;
      --ink: #2D2A32;
      --muted: #7A7580;
      --rule: #E8DDD5;
      --accent: #FF6B6B;
      --accent2: #4ECDC4;
      --accent3: #FFE66D;
      --accent4: #A8E6CF;
      --font: 'Noto Sans SC', -apple-system, sans-serif;
      --radius: 24px;
      --radius-sm: 16px;
      --shadow: 0 4px 20px rgba(45, 42, 50, 0.08);
      --shadow-lg: 0 8px 40px rgba(45, 42, 50, 0.12);
      --shadow-xl: 0 12px 60px rgba(45, 42, 50, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg) 0%, #F3E5F5 50%, var(--bg2) 100%);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
      animation: fadeInDown 0.8s ease;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
      text-decoration: none;
      color: var(--ink);
      box-shadow: var(--shadow);
    }
    .back-btn:hover {
      border-color: var(--accent);
      transform: translateX(-4px) scale(1.1);
      box-shadow: var(--shadow-lg);
    }
    .header-info {
      flex: 1;
    }
    .header-title {
      font-size: 1.2rem;
      font-weight: 900;
    }
    .header-status {
      font-size: 0.85rem;
      color: var(--accent2);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 500;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--accent2);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }
    .header-spirit {
      width: 44px;
      height: 44px;
      animation: spiritFloat 3s ease-in-out infinite;
    }
    @keyframes spiritFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Chat Container */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    .chat-welcome {
      text-align: center;
      padding: 2rem 0;
      animation: fadeInUp 0.8s ease;
    }
    .welcome-spirit {
      width: 120px;
      height: 120px;
      margin: 0 auto 1rem;
      animation: welcomeFloat 3s ease-in-out infinite;
    }
    @keyframes welcomeFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
    }
    .welcome-text {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.8;
      font-weight: 500;
    }

    /* Messages */
    .message {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      flex-direction: row-reverse;
    }
    .message-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: var(--bg2);
      transition: all 0.3s;
      box-shadow: var(--shadow);
    }
    .message:hover .message-avatar {
      transform: scale(1.1);
    }
    .message.user .message-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
    }
    .message-bubble {
      max-width: 70%;
      padding: 1rem 1.3rem;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.7;
      position: relative;
      transition: all 0.3s;
    }
    .message.spirit .message-bubble {
      background: #fff;
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }
    .message.user .message-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.25);
    }
    .message-time {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.3rem;
      text-align: right;
      font-weight: 500;
    }
    .message.user .message-time {
      text-align: left;
    }
    .memory-tag {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent3), var(--accent4));
      color: var(--ink);
      padding: 0.25rem 0.6rem;
      border-radius: 10px;
      font-size: 0.75rem;
      margin-bottom: 0.4rem;
      font-weight: 700;
      animation: tagPop 0.5s ease;
    }
    @keyframes tagPop {
      0% { transform: scale(0); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    /* 精灵表情 */
    .spirit-expression {
      font-size: 1.2rem;
      margin-left: 0.3rem;
      display: inline-block;
      animation: expressionBounce 1s ease-in-out infinite;
    }
    @keyframes expressionBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-3px) scale(1.2); }
    }

    /* Typing Indicator */
    .typing {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 1.3rem;
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow);
      width: fit-content;
      margin-bottom: 1.5rem;
      border-bottom-left-radius: 4px;
    }
    .typing.active {
      display: flex;
      animation: fadeInUp 0.3s ease;
    }
    .typing-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      animation: typing 1.4s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* Input Area */
    .input-area {
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--rule);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
    }
    .input-container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      padding: 1rem 1.3rem;
      border: 2px solid var(--rule);
      border-radius: 24px;
      font-family: var(--font);
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
      background: #fff;
      font-weight: 500;
    }
    .chat-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
    }
    .send-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
      animation: btnPulse 2s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3); }
      50% { box-shadow: 0 4px 25px rgba(255, 107, 107, 0.45); }
    }
    .send-btn:hover {
      transform: scale(1.1);
    }
    .send-btn:active {
      transform: scale(0.95);
    }
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      animation: none;
      box-shadow: none;
    }

    /* Quick Replies */
    .quick-replies {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 0.5rem 0;
      margin-bottom: 0.5rem;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .quick-reply {
      padding: 0.6rem 1.2rem;
      background: #fff;
      border: 2px solid var(--rule);
      border-radius: 20px;
      font-family: var(--font);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      color: var(--ink);
      font-weight: 500;
    }
    .quick-reply:hover {
      border-color: var(--accent);
      background: #FFF5F5;
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .quick-reply:active {
      transform: translateY(0) scale(0.98);
    }

    /* Name Input Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
      animation: fadeIn 0.5s ease;
    }
    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 2.5rem;
      max-width: 400px;
      width: 90%;
      box-shadow: var(--shadow-xl);
      text-align: center;
      animation: modalPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalPop {
      0% { transform: scale(0.8) rotate(-3deg); opacity: 0; }
      70% { transform: scale(1.02) rotate(1deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .modal-title {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 1rem;
    }
    .modal-text {
      color: var(--muted);
      margin-bottom: 1.5rem;
      line-height: 1.6;
      font-weight: 500;
    }
    .name-input {
      width: 100%;
      padding: 1rem 1.2rem;
      border: 2px solid var(--rule);
      border-radius: 14px;
      font-family: var(--font);
      font-size: 1.1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: all 0.3s;
      font-weight: 500;
    }
    .name-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
    }
    .modal-btn {
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
      animation: btnPulse 2s ease-in-out infinite;
    }
    .modal-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 30px rgba(255, 107, 107, 0.4);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .message-bubble { max-width: 80%; font-size: 0.9rem; }
      .chat-container { padding: 1rem; }
      .welcome-spirit { width: 100px; height: 100px; }
      .header-spirit { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">←</a>
    <div class="header-info">
      <div class="header-title">💬 和精灵聊天</div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span>AI 记忆系统在线</span>
      </div>
    </div>
    <div class="header-spirit" id="headerSpirit"></div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="chat-welcome" id="welcomeArea">
      <div class="welcome-spirit" id="welcomeSpirit"></div>
      <div class="welcome-text" id="welcomeText">
        你好呀！我是小芽芽，你的学习伙伴。<br>
        我会记住我们的每一次对话，陪你一起成长！
      </div>
    </div>
    <div id="messages"></div>
    <div class="typing" id="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="quick-replies" id="quickReplies">
      <button class="quick-reply" onclick="sendQuick('你好')">👋 你好</button>
      <button class="quick-reply" onclick="sendQuick('我今天学了什么')">📚 今天学了什么</button>
      <button class="quick-reply" onclick="sendQuick('我现在多少级')">⭐ 我现在多少级</button>
      <button class="quick-reply" onclick="sendQuick('推荐一个任务')">🎯 推荐任务</button>
      <button class="quick-reply" onclick="sendQuick('给我讲个笑话')">😄 讲个笑话</button>
    </div>
    <div class="input-container">
      <input type="text" class="chat-input" id="chatInput" placeholder="和精灵说点什么..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">→</button>
    </div>
  </div>

  <!-- Name Input Modal -->
  <div class="modal-overlay" id="nameModal" style="display:none;">
    <div class="modal">
      <div class="modal-title">🌟 第一次见面！</div>
      <div class="modal-text">
        嗨！我是你的精灵伙伴！<br>
        你还没有设置名字，告诉我怎么称呼你吧！<br>
        <small style="color:#999;">（之后可以在个人中心修改）</small>
      </div>
      <input type="text" class="name-input" id="nameInput" placeholder="输入你的名字..." maxlength="10">
      <button class="modal-btn" onclick="saveName()">我们开始吧！</button>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    const data = MemorySystem.getData();
    const stage = MemorySystem.getSpiritStage();
    const chatContainer = document.getElementById('chatContainer');
    const messagesEl = document.getElementById('messages');
    const typingEl = document.getElementById('typing');
    const inputEl = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const nameModal = document.getElementById('nameModal');
    const nameInput = document.getElementById('nameInput');

    // Check if user has a name
    if (!data.userProfile.nickname || data.userProfile.nickname === '小朋友') {
      nameModal.style.display = 'flex';
    }

    function saveName() {
      const name = nameInput.value.trim();
      if (name) {
        data.userProfile.nickname = name;
        MemorySystem.saveData(data);
        nameModal.style.display = 'none';
        
        // Welcome message with name
        setTimeout(() => {
          const welcomeMsg = `哇！${name}！这个名字真好听！我是${data.spirit.name}，以后就是你的学习伙伴啦！\n\n我会记住你的喜好，陪你一起学习。今天想聊聊什么？`;
          addMessage('spirit', welcomeMsg, true);
          MemorySystem.addChat('spirit', welcomeMsg);
        }, 500);
      }
    }

    // 渲染欢迎精灵和头部精灵
    document.getElementById('welcomeSpirit').innerHTML = Utils.createSpiritSVG(data.spirit.level, 120);
    document.getElementById('headerSpirit').innerHTML = Utils.createSpiritSVG(data.spirit.level, 44);
    document.getElementById('welcomeText').innerHTML = 
      `你好呀！我是${data.spirit.name}，你的学习伙伴。<br>` +
      `我已经陪伴你完成了${data.stats.totalTasks}个任务，<br>` +
      `我会记住我们的每一次对话，陪你一起成长！`;

    // 加载历史对话
    if (data.chatHistory.length > 0) {
      document.getElementById('welcomeArea').style.display = 'none';
      data.chatHistory.forEach(chat => {
        addMessage(chat.role, chat.message, false);
      });
    }

    function sendQuick(text) {
      inputEl.value = text;
      sendMessage();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      // 隐藏欢迎区域
      document.getElementById('welcomeArea').style.display = 'none';

      // 添加用户消息
      addMessage('user', text, true);
      inputEl.value = '';
      sendBtn.disabled = true;

      // 显示输入中
      typingEl.classList.add('active');
      scrollToBottom();

      // 模拟思考延迟
      await new Promise(r => setTimeout(r, 1000 + Math.random() * 1000));

      // 生成回复
      const response = ChatEngine.generateResponse(text);

      // 隐藏输入中，添加精灵回复
      typingEl.classList.remove('active');
      addMessage('spirit', response, true);

      // 保存对话
      MemorySystem.addChat('user', text);
      MemorySystem.addChat('spirit', response);

      sendBtn.disabled = false;
      scrollToBottom();
    }

    function addMessage(role, text, animate) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (animate) div.style.animation = 'fadeInUp 0.4s ease';

      const isSpirit = role === 'spirit';
      const hasMemory = isSpirit && text.includes(data.userProfile.nickname || '小伙伴');
      
      // 精灵表情
      const expressions = ['✨', '🌟', '💫', '😊', '🎉'];
      const expression = isSpirit ? `<span class="spirit-expression">${expressions[Math.floor(Math.random() * expressions.length)]}</span>` : '';
      
      div.innerHTML = `
        <div class="message-avatar">${isSpirit ? '🌱' : '👤'}</div>
        <div>
          ${hasMemory ? '<div class="memory-tag">🧠 记忆唤醒</div>' : ''}
          <div class="message-bubble">${escapeHtml(text)}${expression}</div>
          <div class="message-time">${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}</div>
        </div>
      `;

      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
