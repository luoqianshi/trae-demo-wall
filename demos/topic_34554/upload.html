<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵伴成长 - 上传验证</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8F3;
      --bg2: #FFF0E6;
      --ink: #2D2A32;
      --muted: #7A7580;
      --rule: #E8DDD5;
      --accent: #FF6B6B;
      --accent2: #4ECDC4;
      --accent3: #FFE66D;
      --accent4: #A8E6CF;
      --font: 'Noto Sans SC', -apple-system, sans-serif;
      --radius: 24px;
      --radius-sm: 16px;
      --shadow: 0 4px 20px rgba(45, 42, 50, 0.08);
      --shadow-lg: 0 8px 40px rgba(45, 42, 50, 0.12);
      --shadow-xl: 0 12px 60px rgba(45, 42, 50, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg) 0%, #E3F2FD 50%, var(--bg2) 100%);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      animation: fadeInDown 0.8s ease;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
      text-decoration: none;
      color: var(--ink);
      box-shadow: var(--shadow);
    }
    .back-btn:hover {
      border-color: var(--accent);
      transform: translateX(-4px) scale(1.1);
      box-shadow: var(--shadow-lg);
    }
    .header-title {
      font-size: 1.4rem;
      font-weight: 900;
    }

    /* Upload Card */
    .upload-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 2rem;
      margin: 1rem 0;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.8s ease 0.2s both;
    }
    .upload-title {
      font-size: 1.2rem;
      font-weight: 900;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .upload-area {
      border: 3px dashed var(--rule);
      border-radius: var(--radius);
      padding: 3.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .upload-area:hover {
      border-color: var(--accent);
      background: #FFF5F5;
      transform: scale(1.02);
      box-shadow: var(--shadow-lg);
    }
    .upload-area.dragover {
      border-color: var(--accent2);
      background: #F0FFFD;
      transform: scale(1.05);
      box-shadow: var(--shadow-xl);
    }
    .upload-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
      animation: cameraBounce 2s ease-in-out infinite;
    }
    @keyframes cameraBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-3deg); }
      75% { transform: translateY(-8px) rotate(3deg); }
    }
    .upload-text {
      font-size: 1.2rem;
      color: var(--ink);
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .upload-hint {
      font-size: 0.9rem;
      color: var(--muted);
    }
    #fileInput { display: none; }

    /* Preview */
    .preview-area {
      display: none;
      margin-top: 1.5rem;
      text-align: center;
      position: relative;
    }
    .preview-area.show {
      display: block;
      animation: fadeIn 0.5s ease;
    }
    .preview-img {
      max-width: 100%;
      max-height: 300px;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-xl);
      animation: previewPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes previewPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .preview-badge {
      position: absolute;
      top: -10px;
      right: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 900;
      box-shadow: var(--shadow-lg);
      animation: badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
    }
    @keyframes badgePop {
      0% { transform: scale(0); }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* AI Verification - 酷炫版 */
    .ai-verify {
      display: none;
      text-align: center;
      padding: 2rem 0;
    }
    .ai-verify.active {
      display: block;
      animation: fadeIn 0.5s ease;
    }
    /* AI机器人动画 */
    .ai-robot-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
    }
    .ai-robot {
      font-size: 4rem;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: robotFloat 2s ease-in-out infinite;
    }
    @keyframes robotFloat {
      0%, 100% { transform: translate(-50%, -50%) translateY(0); }
      50% { transform: translate(-50%, -50%) translateY(-12px); }
    }
    .ai-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 3px solid var(--accent2);
      border-radius: 50%;
      opacity: 0.3;
      animation: ringExpand 2s ease-out infinite;
    }
    .ai-ring:nth-child(2) { animation-delay: 0.5s; }
    .ai-ring:nth-child(3) { animation-delay: 1s; }
    @keyframes ringExpand {
      0% { width: 60px; height: 60px; opacity: 0.5; }
      100% { width: 140px; height: 140px; opacity: 0; }
    }
    .ai-scan-line {
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, var(--accent2), transparent);
      transform: translateX(-50%);
      animation: scanMove 2s ease-in-out infinite;
      opacity: 0.6;
    }
    @keyframes scanMove {
      0%, 100% { top: 0; opacity: 0; }
      50% { top: 100%; opacity: 0.8; }
    }
    .ai-text {
      font-size: 1.2rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      font-weight: 700;
    }
    .ai-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* Steps */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 340px;
      margin: 0 auto;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      background: var(--bg);
      border-radius: 14px;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }
    .step::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      background: linear-gradient(90deg, var(--accent2), var(--accent4));
      transition: width 0.5s ease;
      opacity: 0.1;
    }
    .step.active {
      background: linear-gradient(135deg, #F0FFFD, #FFF8F3);
      border: 2px solid var(--accent2);
      transform: translateX(8px) scale(1.02);
      box-shadow: var(--shadow);
    }
    .step.active::before {
      width: 100%;
    }
    .step.done {
      background: linear-gradient(135deg, #E8F5E9, #FFF8F3);
      border: 2px solid var(--accent4);
      transform: translateX(4px);
    }
    .step-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      transition: all 0.4s ease;
      background: var(--bg2);
      border: 2px solid var(--rule);
    }
    .step.active .step-icon {
      background: linear-gradient(135deg, var(--accent2), var(--accent4));
      border-color: var(--accent2);
      color: #fff;
      animation: iconPulse 1s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .step.done .step-icon {
      background: linear-gradient(135deg, var(--accent4), var(--accent3));
      border-color: var(--accent4);
      color: #fff;
      animation: iconDone 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes iconDone {
      0% { transform: scale(0) rotate(-180deg); }
      70% { transform: scale(1.2) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .step-text {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 500;
      transition: all 0.3s;
    }
    .step.active .step-text {
      color: var(--ink);
      font-weight: 700;
    }
    .step.done .step-text {
      color: var(--accent2);
      font-weight: 700;
    }
    /* 进度条 */
    .step-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--rule);
      border-radius: 0 0 14px 14px;
      overflow: hidden;
    }
    .step-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent4));
      border-radius: 0 0 14px 14px;
      transition: width 0.5s ease;
      width: 0;
    }
    .step.active .step-progress-fill {
      animation: progressFill 2s ease-in-out infinite;
    }
    @keyframes progressFill {
      0% { width: 0; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    /* Result */
    .result-card {
      display: none;
      background: linear-gradient(135deg, #F0FFFD, #FFF8F3);
      border: 2px solid var(--accent2);
      border-radius: var(--radius);
      padding: 2.5rem;
      margin-top: 1rem;
      text-align: center;
      animation: resultPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--shadow-xl);
    }
    @keyframes resultPop {
      0% { opacity: 0; transform: translateY(30px) scale(0.9); }
      70% { transform: translateY(-5px) scale(1.02); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .result-card.show {
      display: block;
    }
    .result-icon {
      font-size: 4rem;
      margin-bottom: 0.5rem;
      animation: trophyBounce 1s ease-in-out infinite;
    }
    @keyframes trophyBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-5deg); }
      75% { transform: translateY(-8px) rotate(5deg); }
    }
    .result-title {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--accent2);
      margin-bottom: 0.5rem;
    }
    .result-xp {
      font-size: 2rem;
      color: var(--accent);
      font-weight: 900;
      margin-bottom: 1.2rem;
      animation: xpGlow 2s ease-in-out infinite;
    }
    @keyframes xpGlow {
      0%, 100% { text-shadow: 0 0 0px rgba(255,107,107,0); }
      50% { text-shadow: 0 0 20px rgba(255,107,107,0.4); }
    }
    .result-detail {
      background: #fff;
      border-radius: var(--radius-sm);
      padding: 1.2rem;
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.8;
      box-shadow: var(--shadow);
    }
    .result-detail p {
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .result-detail strong {
      color: var(--accent);
      font-weight: 700;
    }
    .result-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .btn {
      flex: 1;
      padding: 1.1rem;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
      animation: btnPulse 2s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3); }
      50% { box-shadow: 0 4px 30px rgba(255, 107, 107, 0.45); }
    }
    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 6px 30px rgba(255, 107, 107, 0.4);
    }
    .btn-secondary {
      background: #fff;
      color: var(--ink);
      border: 2px solid var(--rule);
    }
    .btn-secondary:hover {
      border-color: var(--accent2);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    /* 粒子特效画布 */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .result-actions { flex-direction: column; }
      .upload-area { padding: 2.5rem 1.5rem; }
      .ai-robot-container { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <div class="container">
    <div class="header">
      <a href="tasks.html" class="back-btn">←</a>
      <div class="header-title">上传学习成果</div>
    </div>

    <div class="upload-card">
      <div class="upload-title">📷 拍照或上传照片</div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📷</div>
        <div class="upload-text">点击或拖拽上传学习成果</div>
        <div class="upload-hint">AI 将自动识别内容并评分</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">

      <div class="preview-area" id="previewArea">
        <div class="preview-badge" id="previewBadge">✨ 已上传</div>
        <img class="preview-img" id="previewImg" alt="预览">
      </div>
    </div>

    <div class="upload-card">
      <div class="ai-verify" id="aiVerify">
        <div class="ai-robot-container">
          <div class="ai-ring"></div>
          <div class="ai-ring"></div>
          <div class="ai-ring"></div>
          <div class="ai-scan-line"></div>
          <div class="ai-robot">🤖</div>
        </div>
        <div class="ai-text">AI 正在分析学习成果<span class="ai-dots"></span></div>
        <div class="steps" id="steps">
          <div class="step" data-step="1">
            <div class="step-icon">🔍</div>
            <div class="step-text">识别图像内容</div>
            <div class="step-progress"><div class="step-progress-fill"></div></div>
          </div>
          <div class="step" data-step="2">
            <div class="step-icon">📊</div>
            <div class="step-text">分析学习成果</div>
            <div class="step-progress"><div class="step-progress-fill"></div></div>
          </div>
          <div class="step" data-step="3">
            <div class="step-icon">✅</div>
            <div class="step-text">验证完成情况</div>
            <div class="step-progress"><div class="step-progress-fill"></div></div>
          </div>
          <div class="step" data-step="4">
            <div class="step-icon">🎨</div>
            <div class="step-text">生成个性化反馈</div>
            <div class="step-progress"><div class="step-progress-fill"></div></div>
          </div>
        </div>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result-icon">🎉</div>
        <div class="result-title">验证成功！</div>
        <div class="result-xp" id="resultXP">+30 XP</div>
        <div class="result-detail" id="resultDetail">
          <p><strong>📋 识别结果：</strong><span id="resultType">阅读打卡</span></p>
          <p><strong>🎯 置信度：</strong><span id="resultConfidence">85%</span></p>
          <p><strong>💬 AI 反馈：</strong><span id="resultFeedback">太棒了！你完成了今天的阅读任务！</span></p>
        </div>
        <div class="result-actions">
          <a href="result.html" class="btn btn-primary">🎊 查看结果 →</a>
          <a href="tasks.html" class="btn btn-secondary">📝 再做一题</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script>
    const selectedTask = sessionStorage.getItem('selectedTask') || 'reading';
    let analyzedResult = null;

    // 拖拽上传
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        const input = document.getElementById('fileInput');
        input.files = files;
        handleFile(input);
      }
    });

    async function handleFile(input) {
      if (!input.files || !input.files[0]) return;
      
      const file = input.files[0];
      
      // 显示预览
      const previewArea = document.getElementById('previewArea');
      const previewImg = document.getElementById('previewImg');
      previewImg.src = URL.createObjectURL(file);
      previewArea.classList.add('show');
      
      // 隐藏上传区域
      uploadArea.style.display = 'none';
      
      // 显示 AI 验证
      document.getElementById('aiVerify').classList.add('active');
      document.getElementById('resultCard').classList.remove('show');
      
      // 分析图片
      analyzedResult = await ImageAnalyzer.analyze(file);
      
      // 模拟验证步骤
      const steps = document.querySelectorAll('.step');
      const stepTexts = [
        `识别图像内容：${analyzedResult.reason}`,
        `分析学习成果：检测到${SPIRIT_CONFIG.taskTypes[analyzedResult.type].name}特征`,
        `验证完成情况：内容完整，符合要求`,
        `生成个性化反馈...`
      ];
      
      for (let i = 0; i < steps.length; i++) {
        await new Promise(r => setTimeout(r, 1200));
        steps[i].classList.add('active');
        steps[i].querySelector('.step-text').textContent = stepTexts[i];
        
        if (i > 0) {
          steps[i - 1].classList.remove('active');
          steps[i - 1].classList.add('done');
          steps[i - 1].querySelector('.step-icon').textContent = '✓';
        }
      }
      
      await new Promise(r => setTimeout(r, 600));
      steps[steps.length - 1].classList.remove('active');
      steps[steps.length - 1].classList.add('done');
      steps[steps.length - 1].querySelector('.step-icon').textContent = '✓';
      
      // 计算 XP
      const xp = ImageAnalyzer.calculateXP(analyzedResult.type, analyzedResult.confidence);
      
      // 保存结果到 sessionStorage
      const result = {
        type: analyzedResult.type,
        confidence: analyzedResult.confidence,
        xp: xp,
        title: `${SPIRIT_CONFIG.taskTypes[analyzedResult.type].name}：完成学习任务`,
        feedback: generateFeedback(analyzedResult.type, analyzedResult.confidence)
      };
      sessionStorage.setItem('lastResult', JSON.stringify(result));
      
      // 显示结果
      document.getElementById('aiVerify').classList.remove('active');
      document.getElementById('resultCard').classList.add('show');
      document.getElementById('resultXP').textContent = `+${xp} XP`;
      document.getElementById('resultType').textContent = SPIRIT_CONFIG.taskTypes[analyzedResult.type].name;
      document.getElementById('resultConfidence').textContent = `${Math.floor(analyzedResult.confidence * 100)}%`;
      document.getElementById('resultFeedback').textContent = result.feedback;
      
      // 触发粒子特效
      startParticles();
    }

    function generateFeedback(type, confidence) {
      const feedbacks = {
        reading: ['太棒了！你认真阅读了书本内容，继续保持！', '阅读是学习的基础，你做得很好！', '爱阅读的孩子最聪明，加油！'],
        math: ['数学小达人！这些题目你都做对了！', '计算能力越来越强了，真厉害！', '逻辑思维很棒，继续保持！'],
        writing: ['字迹越来越工整了，真漂亮！', '书写很认真，态度决定一切！', '文笔越来越好了，继续加油！'],
        art: ['创意无限！这幅作品很有想象力！', '色彩搭配很棒，小小艺术家！', '手工做得很精致，动手能力很强！']
      };
      
      const list = feedbacks[type] || feedbacks.reading;
      return list[Math.floor(Math.random() * list.length)];
    }

    // 粒子特效
    function startParticles() {
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = [];
      const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#A8E6CF', '#FF8FAB', '#C77DFF'];

      for (let i = 0; i < 120; i++) {
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: (Math.random() - 0.5) * 12,
          vy: (Math.random() - 0.5) * 12 - 6,
          size: Math.random() * 10 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 1,
          decay: Math.random() * 0.008 + 0.004,
          shape: Math.random() > 0.5 ? 'circle' : 'star'
        });
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        particles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.life -= p.decay;
          p.size *= 0.995;

          if (p.life > 0) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            if (p.shape === 'circle') {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              ctx.fill();
            } else {
              // 画星星
              drawStar(ctx, p.x, p.y, 5, p.size, p.size / 2);
            }
          }
        });

        if (particles.some(p => p.life > 0)) {
          requestAnimationFrame(animate);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
        let rot = Math.PI / 2 * 3;
        let x = cx;
        let y = cy;
        let step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);
        for (let i = 0; i < spikes; i++) {
          x = cx + Math.cos(rot) * outerRadius;
          y = cy + Math.sin(rot) * outerRadius;
          ctx.lineTo(x, y);
          rot += step;
          x = cx + Math.cos(rot) * innerRadius;
          y = cy + Math.sin(rot) * innerRadius;
          ctx.lineTo(x, y);
          rot += step;
        }
        ctx.lineTo(cx, cy - outerRadius);
        ctx.closePath();
        ctx.fill();
      }

      animate();
    }
  </script>
