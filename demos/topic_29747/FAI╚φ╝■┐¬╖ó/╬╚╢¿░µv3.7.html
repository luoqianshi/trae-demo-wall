<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGIT FAI v3.7</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root{--bg:#0b0d13;--s1:#12151e;--s2:#191d2a;--s3:#1f2436;--bd:#282e42;--ac:#ff3c3c;--ac2:#ff5555;--acd:#8b1a1a;--acg:rgba(255,60,60,.08);--ok:#4af0c0;--okd:#1e6b52;--okg:rgba(74,240,192,.08);--warn:#f0a04a;--info:#5b9aff;--t1:#e2e5ed;--t2:#a0a6b8;--t3:#5c6380}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;user-select:none;font-size:13px}
.app{display:grid;grid-template-rows:44px 1fr 0px 24px;grid-template-columns:188px 1fr 272px;height:100vh}
.app.open{grid-template-rows:44px 1fr 210px 24px}
.hdr{grid-column:1/-1;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:6px;z-index:50}
.brand{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;color:var(--bg);background:var(--ac);padding:2px 7px;border-radius:3px}
.bsub{font-size:11px;color:var(--t3);margin-left:2px}
.tbar{display:flex;gap:3px;align-items:center;flex:1;margin-left:10px}
.sep{width:1px;height:20px;background:var(--bd);margin:0 3px}
.b{font-family:'Noto Sans SC',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border:1px solid var(--bd);border-radius:4px;background:var(--s2);color:var(--t1);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.b:hover{border-color:var(--acd);background:var(--acg)}.b:active{transform:scale(.97)}.b:disabled{opacity:.3;pointer-events:none}
.ba{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}.ba:hover{background:var(--ac2)}
.bs{padding:3px 7px;font-size:10px}.bd{border-color:var(--ac);color:var(--ac)}.bd:hover{background:var(--acg)}
.bok{background:var(--ok);color:var(--bg);border-color:var(--ok);font-weight:600}
#fileInput,#projectInput{display:none}
.lp{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.lps{padding:8px 10px;border-bottom:1px solid var(--bd)}
.lpt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:6px}
.lpsc{flex:1;overflow-y:auto;padding:8px 10px}
.pg-item{padding:4px 7px;border:1px solid transparent;border-radius:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--t2);transition:all .12s}
.pg-item:hover{border-color:var(--bd);color:var(--t1)}.pg-item.on{border-color:var(--acd);background:var(--acg);color:var(--ac)}
.pg-n{font-family:'JetBrains Mono',monospace;font-size:9px;min-width:16px}
.tl-item{padding:5px 7px;border:1px solid transparent;border-radius:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--t2);transition:all .12s}
.tl-item:hover{border-color:var(--bd);color:var(--t1)}.tl-item.on{border-color:var(--acd);background:var(--acg);color:var(--ac)}
.tl-i{font-size:14px;width:18px;text-align:center}
.region-item{display:flex;align-items:center;justify-content:space-between;padding:3px 6px;background:var(--bg);border:1px solid var(--bd);border-radius:3px;margin-bottom:3px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--info)}
.region-item .rdel{cursor:pointer;color:var(--t3);font-size:12px;background:none;border:none;padding:0 2px}.rdel:hover{color:var(--ac)}
.va{position:relative;overflow:hidden;background:var(--bg)}
.vs{width:100%;height:100%;overflow:auto;position:relative}
.vw{position:relative;display:inline-block;box-shadow:0 2px 30px rgba(0,0,0,.5);flex-shrink:0;margin:20px}
#pdfCanvas{display:block}
#bubbleSvg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
#bubbleSvg .bg{pointer-events:all;cursor:move}
#bubbleSvg .bg:hover .bc{stroke-width:2.5}
#bubbleSvg .sf,#bubbleSvg .ll,#bubbleSvg .cd,#bubbleSvg .region-rect{pointer-events:none}
.sel-rect{position:absolute;border:1.5px solid var(--ac);background:rgba(255,60,60,.06);pointer-events:none;display:none;z-index:10}
.sel-rect.on{display:block}
.sel-rect .sh{position:absolute;width:6px;height:6px;background:var(--ac);border:1px solid var(--bg);border-radius:1px}
.sel-rect .sh.tl{top:-3px;left:-3px}.sel-rect .sh.tr{top:-3px;right:-3px}.sel-rect .sh.bl{bottom:-3px;left:-3px}.sel-rect .sh.br{bottom:-3px;right:-3px}
.zb{position:absolute;bottom:10px;left:10px;display:none;gap:2px;background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:2px;z-index:20}
.zb.show{display:flex}
.zb button{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--t1);cursor:pointer;border-radius:3px;font-size:13px;font-family:'JetBrains Mono',monospace}
.zb button:hover{background:var(--s2)}
.zb span{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);padding:0 5px;display:flex;align-items:center;min-width:36px;justify-content:center}
.drop-ov{position:absolute;inset:0;background:rgba(255,60,60,.04);border:2px dashed var(--ac);display:none;align-items:center;justify-content:center;z-index:100}
.drop-ov.on{display:flex}.drop-ov span{font-size:14px;color:var(--ac);font-weight:500}
.emp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);text-align:center;z-index:5}
.emp.hid{display:none}
.emp .ei{width:50px;height:50px;border:2px dashed var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;opacity:.4}
.emp h2{font-size:14px;font-weight:500;margin-bottom:6px;color:var(--t1)}.emp p{font-size:11px;line-height:1.6}
.rp{background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.rps{padding:8px 10px;border-bottom:1px solid var(--bd)}
.rpt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:6px}
.pr{display:flex;align-items:center;justify-content:space-between;padding:2px 0;gap:3px}
.pr label{font-size:10px;color:var(--t3);flex-shrink:0;min-width:48px}
.pr input,.pr select{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);border:1px solid var(--bd);color:var(--t1);padding:2px 5px;border-radius:3px;outline:none}
.pr input:focus,.pr select:focus{border-color:var(--acd)}
.pr .ocr-btn{width:22px;height:22px;padding:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd);border-radius:3px;background:var(--s2);color:var(--t3);cursor:pointer;font-size:11px;flex-shrink:0}
.pr .ocr-btn:hover{border-color:var(--ok);color:var(--ok);background:var(--okg)}
.pr .ocr-btn.active{border-color:var(--ac);color:var(--ac);background:var(--acg)}
.opv{width:100%;min-height:50px;max-height:120px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.opv img{max-width:100%;max-height:120px;object-fit:contain;display:block}
.opv .ph{font-size:10px;color:var(--t3);opacity:.5}
.ocr-val{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--ok);min-height:22px;font-weight:700;margin-top:4px}
.ocr-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:2px}
.rg{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:5px}
.rb{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 0;border:1px solid var(--bd);border-radius:3px;background:var(--bg);color:var(--t3);cursor:pointer;text-align:center;transition:all .12s;line-height:1.2}
.rb:hover{border-color:var(--acd);color:var(--t1)}.rb.on{border-color:var(--ok);background:var(--okg);color:var(--ok)}
.rb .ri{display:block;font-size:12px;margin-bottom:1px}
.bt{grid-column:1/-1;background:var(--s1);border-top:1px solid var(--bd);overflow:hidden;display:flex;flex-direction:column}
.dth{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.dth .dtt{font-size:10px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:6px}
.dtc{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ok);background:var(--okg);border:1px solid var(--okd);padding:1px 5px;border-radius:2px}
.dta{display:flex;gap:3px}.dts{flex:1;overflow:auto}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{position:sticky;top:0;background:var(--s2);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);padding:4px 6px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;z-index:2}
table.dt td{padding:3px 6px;border-bottom:1px solid var(--bd);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap;cursor:pointer}
table.dt tr:hover td{background:var(--acg)}table.dt tr.sel td{background:rgba(255,60,60,.08)}
table.dt td[contenteditable]{outline:none}table.dt td[contenteditable]:focus{background:var(--s3);box-shadow:inset 0 0 0 1px var(--acd)}
.dn{color:var(--ac);font-weight:700;text-align:center;min-width:24px}.dv{color:var(--t1);font-weight:600}.dt2{color:var(--warn)}
.dte{text-align:center;padding:20px;color:var(--t3);font-size:11px}
.sbar{grid-column:1/-1;background:var(--s2);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:12px;font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.sd{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.sd.g{background:var(--ok)}.sd.y{background:var(--warn);animation:bl 1s infinite}.sd.r{background:var(--ac)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s2);border:1px solid var(--okd);color:var(--ok);font-size:11px;padding:6px 16px;border-radius:5px;z-index:300;opacity:0;transition:all .2s;pointer-events:none;font-family:'JetBrains Mono',monospace}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:18px;min-width:340px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.modal h3{font-size:13px;font-weight:600;margin-bottom:12px}
.modal .mr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;gap:8px}
.modal .mr label{font-size:12px;color:var(--t2)}
.modal .mr select{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--bd);color:var(--t1);padding:4px 8px;border-radius:3px;width:160px}
.modal .ma{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}
.corr-bar{display:flex;gap:4px;margin-top:4px;align-items:center}
.corr-bar input{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg);border:1px solid var(--bd);color:var(--ok);padding:3px 6px;border-radius:3px;width:80px;outline:none}
.corr-bar .b{padding:3px 8px;font-size:10px}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="hdr">
    <span class="brand">DIGIT FAI</span><span class="bsub">v3.7</span>
    <div class="tbar">
      <button class="b" id="btnOpen"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> 打开</button>
      <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp"/>
      <div class="sep"></div>
      <button class="b ba" id="btnAuto" disabled>⚡ 自动气泡</button>
      <div class="sep"></div>
      <button class="b" id="btnTable" disabled>📊 尺寸表</button>
      <button class="b" id="btnExport" disabled>↓ 导出</button>
      <div class="sep"></div>
      <button class="b" id="btnSave">💾</button>
      <button class="b" id="btnLoad">📂</button>
      <input type="file" id="projectInput" accept=".json"/>
    </div>
  </header>
  <aside class="lp">
    <div class="lps"><div class="lpt">页面</div><div id="pgList"><div style="color:var(--t3);font-size:10px;padding:4px 0">未加载</div></div></div>
    <div class="lpsc">
      <div class="lpt">工具</div>
      <div id="tlList">
        <div class="tl-item on" data-t="select"><span class="tl-i">↖</span>选择/移动</div>
        <div class="tl-item" data-t="ocr"><span class="tl-i">🔍</span>框选识别+气泡</div>
        <div class="tl-item" data-t="region"><span class="tl-i">▭</span>识别区域</div>
        <div class="tl-item" data-t="manual"><span class="tl-i">✏</span>手动添加气泡</div>
      </div>
      <div style="margin-top:10px"><div class="lpt">识别区域</div><div id="regionList"><div style="color:var(--t3);font-size:10px">使用「识别区域」工具框选</div></div></div>
      <div style="margin-top:10px">
        <div class="lpt">OCR 预览</div>
        <div class="opv" id="ocrPrev"><span class="ph">框选后显示</span></div>
        <div class="ocr-val" id="ocrVal"></div>
        <div class="ocr-meta" id="ocrMeta"></div>
        <div class="corr-bar" id="corrBar" style="display:none">
          <span style="font-size:10px;color:var(--t3)">修正:</span>
          <input id="corrInput" placeholder="正确值"/>
          <button class="b bs ba" onclick="A.applyCorrection()">确认</button>
        </div>
      </div>
      <div style="margin-top:10px">
        <div class="lpt">OCR 设置 <span style="color:var(--ok);cursor:pointer;margin-left:4px" id="btnResetSet">↻</span></div>
        <div class="pr"><label>分段</label><select id="sPSM"><option value="7">单行</option><option value="8">单词</option><option value="13" selected>原始行</option></select></div>
        <div class="pr"><label>放大</label><select id="sScale"><option value="1">1x</option><option value="2" selected>2x</option><option value="3">3x</option><option value="4">4x</option></select></div>
        <div class="pr"><label>二值化</label><input type="number" id="sThresh" value="200" min="0" max="255" step="5" style="width:50px"/></div>
        <div class="pr"><label>反色</label><select id="sInvert"><option value="0" selected>关</option><option value="1">开</option></select></div>
        <div class="pr"><label>多通道</label><select id="sMulti"><option value="1" selected>开</option><option value="0">关</option></select></div>
        <div class="pr"><label>自适应</label><select id="sAdapt"><option value="1" selected>开</option><option value="0">关</option></select></div>
        <div class="pr"><label>混淆校正</label><select id="sConfuse"><option value="1" selected>开</option><option value="0">关</option></select></div>
        <div style="margin-top:4px"><div class="lpt">扫描框设置</div></div>
        <div class="pr"><label>框宽</label><input type="number" id="sCellW" value="100" min="30" max="300" style="width:50px"/></div>
        <div class="pr"><label>框高</label><input type="number" id="sCellH" value="36" min="15" max="100" style="width:50px"/></div>
        <div class="pr"><label>X偏移</label><input type="number" id="sOXOff" value="0" step="1" style="width:50px"/></div>
        <div class="pr"><label>Y偏移</label><input type="number" id="sOYOff" value="0" step="1" style="width:50px"/></div>
        <div style="margin-top:4px"><div class="lpt">自动模式</div></div>
        <div class="pr"><label>扫描</label><select id="sAutoMode"><option value="quick" selected>快捷0°+90°</option><option value="pro">专业0°~270°</option></select></div>
        <div style="margin-top:4px"><div class="lpt">方向</div></div>
        <div class="rg" id="rotG">
          <div class="rb on" data-r="auto"><span class="ri">◎</span>自动</div>
          <div class="rb" data-r="0"><span class="ri">→</span>0°</div>
          <div class="rb" data-r="90"><span class="ri">↑</span>90°</div>
          <div class="rb" data-r="180"><span class="ri">←</span>180°</div>
          <div class="rb" data-r="270"><span class="ri">↓</span>270°</div>
        </div>
        <div style="margin-top:4px"><div class="lpt">语言</div></div>
        <div class="pr"><label>语言</label><select id="sLang"><option value="eng" selected>English</option><option value="chi_sim">中文</option><option value="jpn">日本語</option><option value="deu">Deutsch</option><option value="kor">한국어</option><option value="ara">العربية</option></select></div>
      </div>
    </div>
  </aside>
  <div class="va" id="dropZone">
    <div class="drop-ov" id="dropOv"><span>释放文件</span></div>
    <div class="emp" id="empSt"><div class="ei">📐</div><h2>打开工程图纸</h2><p>拖放 PDF / 图片到此处</p></div>
    <div class="vs" id="vs" style="display:none">
      <div class="vw" id="vw">
        <canvas id="pdfCanvas"></canvas>
        <svg id="bubbleSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="sel-rect" id="selRect"><div class="sh tl"></div><div class="sh tr"></div><div class="sh bl"></div><div class="sh br"></div></div>
      </div>
    </div>
    <div class="zb" id="zBar"><button onclick="A.zoomBy(-.15)">−</button><span id="zLv">100%</span><button onclick="A.zoomBy(.15)">+</button><button onclick="A.zoomFit()">⊡</button></div>
  </div>
  <aside class="rp">
    <div class="rps">
      <div class="rpt">零件信息</div>
      <div class="pr"><label>供方</label><input id="iSupplier" list="supplierList" value="青岛海立泰新型复合材料有限公司" style="width:130px;font-size:9px"/><datalist id="supplierList"><option value="青岛海立泰新型复合材料有限公司"/></datalist></div>
      <div class="pr"><label>产品名</label><input id="iProdName" style="width:90px"/><button class="ocr-btn" onclick="A.startTextOCR('iProdName')" title="框选识别中文">🔍</button></div>
      <div class="pr"><label>图号</label><input id="iDW" style="width:90px"/><button class="ocr-btn" onclick="A.startTextOCR('iDW')" title="框选识别文字">🔍</button></div>
      <div class="pr"><label>版本</label><input id="iRV" style="width:50px"/></div>
      <div class="pr"><label>未注公差</label><input id="iTolStd" value="GB/T 1804-m" style="width:110px;font-size:9px"/></div>
      <div class="pr"><label>重要度</label><select id="iImportance" style="width:110px"><option value="A">A级(重要)</option><option value="B" selected>B级(一般)</option><option value="C">C级(次要)</option></select></div>
    </div>
    <div class="rps" id="bpPanel" style="display:none"><div class="rpt">气泡属性</div>
      <div class="pr"><label>编号</label><input id="bpN" type="number" style="width:46px" onchange="A.updBubble()"/></div>
      <div class="pr"><label>标准尺寸</label><input id="bpV" onchange="A.updBubble()" style="width:90px"/></div>
      <div class="pr"><label>公差等级</label><select id="bpTol" onchange="A.updBubble()" style="width:90px"><option value="">无</option><option value="f">f(精密)</option><option value="m">m(中等)</option><option value="c">c(粗糙)</option><option value="v">v(最粗)</option></select></div>
      <div class="pr"><label>上差</label><input id="bpU" onchange="A.updBubble()" style="width:60px"/></div>
      <div class="pr"><label>下差</label><input id="bpL" onchange="A.updBubble()" style="width:60px"/></div>

<div class="toast" id="toast"></div>
<script>
'use strict';
var E=function(id){return document.getElementById(id)};
var NS='http://www.w3.org/2000/svg';
function svgEl(t,a,txt){var e=document.createElementNS(NS,t);if(a)Object.keys(a).forEach(function(k){e.setAttribute(k,a[k])});if(txt!==undefined)e.textContent=txt;return e}

/* ===== GB/T 1804 ===== */
var TOL_GB={linear:{f:[[.5,3,.05],[3,6,.05],[6,30,.1],[30,120,.15],[120,400,.2],[400,1e3,.3],[1e3,2e3,.5]],m:[[.5,3,.1],[3,6,.1],[6,30,.2],[30,120,.3],[120,400,.5],[400,1e3,.8],[1e3,2e3,1.2],[2e3,4e3,2]],c:[[.5,3,.2],[3,6,.3],[6,30,.5],[30,120,.8],[120,400,1.2],[400,1e3,2],[1e3,2e3,3],[2e3,4e3,4]],v:[[3,6,.5],[6,30,1],[30,120,1.5],[120,400,2.5],[400,1e3,4],[1e3,2e3,6],[2e3,4e3,8]]},radius:{f:[[.5,3,.2],[3,6,.5],[6,30,1],[30,1e4,2]],m:[[.5,3,.4],[3,6,1],[6,30,2],[30,1e4,4]]}};
function lookupGB(nom,grade,isR){var n=parseFloat(nom);if(isNaN(n)||n<=0)return null;var tbl=isR?TOL_GB.radius[grade]:TOL_GB.linear[grade];if(!tbl)return null;for(var i=0;i<tbl.length;i++){if(n>tbl[i][0]&&n<=tbl[i][1])return tbl[i][2]}return null}
function parseStdGrade(){var m=E('iTolStd').value.match(/1804[-\s]*([fmvc])/i);return m?m[1].toLowerCase():'m'}
function fmtLim(nomS,tolS){if(!tolS||tolS==='0')return nomS;var n=parseFloat(nomS),t=parseFloat(tolS);if(isNaN(n)||isNaN(t))return tolS;return parseFloat((n+t).toFixed(4)).toString()}
/* ★ FIX7: 检测设备自动判定 ★ */
function getEquip(type,nom){var n=parseFloat(nom);if(type==='angle')return'角度尺';if(type==='radius'||type==='chamfer')return'R规';if((type==='linear'||type==='diameter')&&!isNaN(n)&&n>30)return'卷尺';return'游标卡尺'}

var DEF={psm:'13',scale:'2',thresh:200,invert:'0',multi:'1',adapt:'1',confuse:'1',lang:'eng',rot:'auto',autoMode:'quick',cellW:100,cellH:36,oxOff:0,oyOff:0};

var A={
  pdf:null,isImg:false,imgEl:null,pg:1,total:0,scale:1.0,tool:'select',rot:'auto',autoMode:'quick',
  ocrBusy:false,selecting:false,selS:null,selE:null,regions:[],dims:[],selId:null,nextN:1,recycled:[],
  textItems:[],lastOCR:null,lastDimId:null,panSt:null,cv:null,cx:null,sr:null,textOcrTarget:null,

  init:function(){
    this.cv=E('pdfCanvas');this.cx=this.cv.getContext('2d',{willReadFrequently:true});this.sr=E('selRect');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    this.loadSets();this.bindEvts();this.log('v3.7 — bbox定位+手动气泡+检测设备+中文强化');
  },
  loadSets:function(){var s={};try{s=JSON.parse(localStorage.getItem('digiFAI_v37'))||{}}catch(e){}var v=function(k){return s[k]!==undefined?s[k]:DEF[k]};E('sPSM').value=v('psm');E('sScale').value=v('scale');E('sThresh').value=v('thresh');E('sInvert').value=v('invert');E('sMulti').value=v('multi');E('sAdapt').value=v('adapt');E('sConfuse').value=v('confuse');E('sLang').value=v('lang');E('sAutoMode').value=v('autoMode');E('sCellW').value=v('cellW');E('sCellH').value=v('cellH');E('sOXOff').value=v('oxOff');E('sOYOff').value=v('oyOff');this.rot=v('rot');this.autoMode=v('autoMode');E('rotG').querySelectorAll('.rb').forEach(function(b){b.classList.toggle('on',b.dataset.r===A.rot)});if(s.supplier)E('iSupplier').value=s.supplier;if(s.tolStd)E('iTolStd').value=s.tolStd},
  saveSets:function(){var s={psm:E('sPSM').value,scale:E('sScale').value,thresh:+E('sThresh').value,invert:E('sInvert').value,multi:E('sMulti').value,adapt:E('sAdapt').value,confuse:E('sConfuse').value,lang:E('sLang').value,rot:this.rot,autoMode:this.autoMode,cellW:+E('sCellW').value,cellH:+E('sCellH').value,oxOff:+E('sOXOff').value,oyOff:+E('sOYOff').value,supplier:E('iSupplier').value,tolStd:E('iTolStd').value};localStorage.setItem('digiFAI_v37',JSON.stringify(s))},

  bindEvts:function(){var self=this;
    E('btnOpen').onclick=function(){E('fileInput').click()};E('fileInput').addEventListener('change',function(e){if(e.target.files[0])self.loadFile(e.target.files[0])});
    E('btnAuto').onclick=function(){self.autoBubble()};E('btnTable').onclick=function(){E('app').classList.toggle('open')};E('btnExport').onclick=function(){E('expM').classList.add('show')};E('btnSave').onclick=function(){self.saveProj()};E('btnLoad').onclick=function(){E('projectInput').click()};
    E('projectInput').addEventListener('change',function(e){if(e.target.files[0])self.loadProj(e.target.files[0])});E('btnResetSet').onclick=function(){localStorage.removeItem('digiFAI_v37');self.loadSets();self.toast('已恢复默认')};
    ['sPSM','sScale','sThresh','sInvert','sMulti','sAdapt','sConfuse','sLang','sAutoMode','sCellW','sCellH','sOXOff','sOYOff'].forEach(function(id){E(id).addEventListener('change',function(){if(id==='sAutoMode')self.autoMode=E('sAutoMode').value;self.saveSets()})});
    E('iSupplier').addEventListener('change',function(){self.saveSets()});E('iTolStd').addEventListener('change',function(){self.saveSets()});
    var dz=E('dropZone'),dc=0;dz.addEventListener('dragenter',function(e){e.preventDefault();dc++;E('dropOv').classList.add('on')});dz.addEventListener('dragleave',function(e){e.preventDefault();dc--;if(dc<=0){dc=0;E('dropOv').classList.remove('on')}});dz.addEventListener('dragover',function(e){e.preventDefault()});dz.addEventListener('drop',function(e){e.preventDefault();dc=0;E('dropOv').classList.remove('on');if(e.dataTransfer.files[0])self.loadFile(e.dataTransfer.files[0])});
    E('tlList').addEventListener('click',function(e){var el=e.target.closest('.tl-item');if(el)self.setTool(el.dataset.t)});
    E('rotG').addEventListener('click',function(e){var b=e.target.closest('.rb');if(!b)return;E('rotG').querySelectorAll('.rb').forEach(function(x){x.classList.remove('on')});b.classList.add('on');self.rot=b.dataset.r;self.saveSets()});
    this.cv.addEventListener('mousedown',function(e){self.onCvDown(e)});this.cv.addEventListener('mousemove',function(e){self.onCvMove(e)});this.cv.addEventListener('mouseup',function(e){self.onCvUp(e)});this.cv.addEventListener('contextmenu',function(e){e.preventDefault();self.cancelSel()});
    document.getElementById('bubbleSvg').addEventListener('mousedown',function(e){self.onBubDown(e)});document.addEventListener('mousemove',function(e){self.onBubMove(e)});document.addEventListener('mouseup',function(e){self.onBubUp(e)});
    var vs=E('vs');vs.addEventListener('wheel',function(e){e.preventDefault();if(!self.pdf&&!self.isImg)return;var o=self.scale;self.scale=Math.max(.15,Math.min(8,self.scale+(e.deltaY>0?-.12:.12)));var r=self.scale/o,rt=vs.getBoundingClientRect();var mx=e.clientX-rt.left+vs.scrollLeft,my=e.clientY-rt.top+vs.scrollTop;self.renderPage().then(function(){vs.scrollLeft=mx*r-(e.clientX-rt.left);vs.scrollTop=my*r-(e.clientY-rt.top)})},{passive:false});
    vs.addEventListener('mousedown',function(e){if(e.button===1||(e.button===0&&e.altKey)){e.preventDefault();self.panSt={x:e.clientX,y:e.clientY,sl:vs.scrollLeft,st:vs.scrollTop};vs.style.cursor='grabbing'}});
    document.addEventListener('mousemove',function(e){if(!self.panSt)return;vs.scrollLeft=self.panSt.sl-(e.clientX-self.panSt.x);vs.scrollTop=self.panSt.st-(e.clientY-self.panSt.y)});document.addEventListener('mouseup',function(){if(self.panSt){self.panSt=null;E('vs').style.cursor=''}});
    document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.isContentEditable)return;if(e.key==='Escape'){self.cancelSel();self.deselBub();self.cancelTextOCR()}if((e.key==='Backspace'||e.key==='Delete')&&self.selId!==null){e.preventDefault();self.delSel()}if(e.key==='+'||e.key==='='){e.preventDefault();self.zoomBy(.15)}if(e.key==='-'){e.preventDefault();self.zoomBy(-.15)}});
    document.addEventListener('dragover',function(e){e.preventDefault()});document.addEventListener('drop',function(e){e.preventDefault()});
  },

  /* ★ FIX4: 中文OCR强化 ★ */
  startTextOCR:function(fieldId){this.textOcrTarget=fieldId;this.setTool('textocr');this.toast('在图纸上框选文字');document.querySelectorAll('.ocr-btn').forEach(function(b){b.classList.remove('active')});var btn=E(fieldId).parentElement.querySelector('.ocr-btn');if(btn)btn.classList.add('active')},
  cancelTextOCR:function(){this.textOcrTarget=null;document.querySelectorAll('.ocr-btn').forEach(function(b){b.classList.remove('active')})},
  performTextOCR:function(){if(!this.textOcrTarget||this.ocrBusy)return;var self=this,target=self.textOcrTarget;self.ocrBusy=true;self.setStatus('y','文字识别...');
    var proc=self.cropAndProc(0,undefined,'global');var isCN=(target==='iProdName');
    var opts={tessedit_pageseg_mode:isCN?'6':'7'};if(!isCN)opts.tessedit_char_whitelist='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_. /()\uFF08\uFF09';
    Tesseract.recognize(proc,isCN?'chi_sim+eng':'eng',opts).then(function(res){
      var text=(res.data.text||'').trim().replace(/[\n\r]+/g,' ');
      text=text.replace(/([\u4e00-\u9fff\u3000-\u303f\uff00-\uffef])\s+([\u4e00-\u9fff\u3000-\u303f\uff00-\uffef])/g,'$1$2');
      text=text.replace(/([\u4e00-\u9fff\u3000-\u303f\uff00-\uffef])\s+([\u4e00-\u9fff\u3000-\u303f\uff00-\uffef])/g,'$1$2');
      E(target).value=text;self.log('文字: "'+text+'"','ok');self.toast('已识别: '+text);
      self.setStatus('g','完成');self.ocrBusy=false;self.cancelSel();self.cancelTextOCR();self.setTool('select');
    }).catch(function(e){self.log('文字识别失败','err');self.ocrBusy=false;self.setStatus('r','错误');self.cancelTextOCR()})},

  loadFile:function(f){var n=f.name.toLowerCase();if(n.endsWith('.pdf'))this.loadPDF(f);else if(/\.(png|jpe?g|tif{1,2}|bmp)$/.test(n))this.loadImg(f);else this.toast('不支持')},
  loadPDF:function(f){var self=this;self.setStatus('y','加载中...');f.arrayBuffer().then(function(b){return pdfjsLib.getDocument({data:b}).promise}).then(function(p){self.pdf=p;self.total=p.numPages;self.pg=1;self.isImg=false;self.showView();self.renderPgList();return self.renderPage()}).then(function(){self.log(self.total+'页','ok');self.setStatus('g','就绪');self.enableBtns()}).catch(function(e){self.setStatus('r','错误')})},
  loadImg:function(f){var self=this;var img=new Image(),url=URL.createObjectURL(f);img.onload=function(){self.pdf=null;self.isImg=true;self.imgEl=img;self.total=1;self.pg=1;self.showView();self.renderPgList();self.renderPage().then(function(){self.setStatus('g','就绪');self.enableBtns();URL.revokeObjectURL(url)})};img.src=url},
  showView:function(){E('empSt').classList.add('hid');E('vs').style.display='';E('zBar').classList.add('show');E('app').classList.add('open')},
  enableBtns:function(){E('btnAuto').disabled=false;E('btnTable').disabled=false;E('btnExport').disabled=false},

  renderPage:function(){var self=this;if(self.isImg)return self.renderImgPage();if(!self.pdf)return Promise.resolve();return self.pdf.getPage(self.pg).then(function(page){var vp=page.getViewport({scale:self.scale});var dpr=window.devicePixelRatio||1;self.cv.width=vp.width*dpr;self.cv.height=vp.height*dpr;self.cv.style.width=vp.width+'px';self.cv.style.height=vp.height+'px';self.cx.setTransform(dpr,0,0,dpr,0,0);return page.render({canvasContext:self.cx,viewport:vp}).promise.then(function(){self.cx.setTransform(1,0,0,1,0,0);self.updOverlay(vp.width,vp.height);return self.extractText()})})},
  renderImgPage:function(){var self=this,img=self.imgEl,w=img.width*self.scale,h=img.height*self.scale,dpr=window.devicePixelRatio||1;self.cv.width=w*dpr;self.cv.height=h*dpr;self.cv.style.width=w+'px';self.cv.style.height=h+'px';self.cx.setTransform(dpr,0,0,dpr,0,0);self.cx.imageSmoothingEnabled=true;self.cx.imageSmoothingQuality='high';self.cx.drawImage(img,0,0,w,h);self.cx.setTransform(1,0,0,1,0,0);self.updOverlay(w,h);self.textItems=[];return Promise.resolve()},
  updOverlay:function(w,h){var svg=document.getElementById('bubbleSvg');svg.setAttribute('width',w);svg.setAttribute('height',h);svg.setAttribute('viewBox','0 0 '+w+' '+h);this.renderRegions();this.renderBubbles();this.cancelSel();E('zLv').textContent=Math.round(this.scale*100)+'%';this.updStatus()},
  renderPgList:function(){var el=E('pgList'),self=this;el.innerHTML='';for(var i=1;i<=self.total;i++){(function(p){var d=document.createElement('div');d.className='pg-item'+(p===self.pg?' on':'');d.innerHTML='<span class="pg-n">'+p+'</span>第'+p+'页';d.onclick=function(){self.pg=p;self.renderPage();self.renderPgList()};el.appendChild(d)})(i)}},
  extractText:function(){var self=this;self.textItems=[];if(!self.pdf)return Promise.resolve();return self.pdf.getPage(self.pg).then(function(page){return page.getTextContent().then(function(tc){var s=self.scale,vp=page.getViewport({scale:1});self.textItems=tc.items.filter(function(i){return i.str.trim()}).map(function(item){return{text:item.str.trim(),x:item.transform[4]*s,y:(vp.height-item.transform[5])*s,w:item.width*s,h:(item.height||Math.abs(item.transform[3]))*s}})})}).catch(function(){})},

  zoomBy:function(d){this.scale=Math.max(.15,Math.min(8,this.scale+d));this.renderPage()},
  zoomFit:function(){var self=this,vs=E('vs');if(!self.pdf&&!self.isImg)return;if(self.isImg){var s=Math.min((vs.clientWidth-40)/self.imgEl.width,(vs.clientHeight-40)/self.imgEl.height,4);self.scale=s;self.renderPage()}else{self.pdf.getPage(self.pg).then(function(p){var vp=p.getViewport({scale:1});var s=Math.min((vs.clientWidth-40)/vp.width,(vs.clientHeight-40)/vp.height,4);self.scale=s;self.renderPage()})}},
  setTool:function(t){this.tool=t;E('tlList').querySelectorAll('.tl-item').forEach(function(el){el.classList.toggle('on',el.dataset.t===t)});this.cv.style.cursor=(t==='select')?'default':'crosshair'},

  addRegion:function(x,y,w,h){var r={id:Date.now()+Math.random(),x:x/this.scale,y:y/this.scale,w:w/this.scale,h:h/this.scale,pg:this.pg};this.regions.push(r);this.renderRegions();this.renderRegionList();this.log('区域#'+this.regions.length,'ok')},
  delRegion:function(id){this.regions=this.regions.filter(function(r){return r.id!==id});this.renderRegions();this.renderRegionList()},
  renderRegions:function(){var svg=document.getElementById('bubbleSvg');svg.querySelectorAll('.region-rect').forEach(function(e){e.remove()});var s=this.scale,self=this;this.regions.filter(function(r){return r.pg===self.pg}).forEach(function(r){var rect=svgEl('rect',{class:'region-rect',x:r.x*s,y:r.y*s,width:r.w*s,height:r.h*s,fill:'rgba(91,154,255,.06)',stroke:'#5b9aff','stroke-width':'1.5','stroke-dasharray':'6,3',rx:'2'});svg.insertBefore(rect,svg.firstChild)})},
  renderRegionList:function(){var el=E('regionList'),self=this;var pgR=this.regions.filter(function(r){return r.pg===self.pg});if(!pgR.length){el.innerHTML='<div style="color:var(--t3);font-size:10px">使用「识别区域」工具框选</div>';return}el.innerHTML=pgR.map(function(r,i){return '<div class="region-item"><span>区域'+(i+1)+': '+Math.round(r.w)+'×'+Math.round(r.h)+'</span><button class="rdel" onclick="A.delRegion('+r.id+')">×</button></div>'}).join('')},

  getPos:function(e){var r=this.cv.getBoundingClientRect();return{x:Math.max(0,Math.min(r.width,e.clientX-r.left)),y:Math.max(0,Math.min(r.height,e.clientY-r.top))}},
  onCvDown:function(e){if(!this.pdf&&!this.isImg||this.ocrBusy||this.panSt||e.button!==0)return;var p=this.getPos(e);if(this.tool==='region'||this.tool==='ocr'||this.tool==='textocr'||this.tool==='manual'){this.selecting=true;this.selS=p;this.selE={x:p.x,y:p.y};this.sr.classList.add('on');this.updSelUI()}},
  onCvMove:function(e){if(!this.selecting)return;this.selE=this.getPos(e);this.updSelUI()},
  onCvUp:function(){if(!this.selecting)return;this.selecting=false;var w=Math.abs(this.selE.x-this.selS.x),h=Math.abs(this.selE.y-this.selS.y);if(w<4||h<4){this.cancelSel();return}
    if(this.tool==='region'){this.addRegion(Math.min(this.selS.x,this.selE.x),Math.min(this.selS.y,this.selE.y),w,h);this.cancelSel()}
    else if(this.tool==='ocr'){this.performOCR()}

  autoBubble:function(){if(!this.pdf&&!this.isImg)return;var self=this;var pgR=this.regions.filter(function(r){return r.pg===self.pg});if(!pgR.length){self.toast('请先创建识别区域');return}self.setStatus('y','自动识别...');self.log('自动气泡...','info');var t0=performance.now(),added=0,ri=0;

  autoFromOCR:function(region){
    var self=this,s=this.scale,dpr=window.devicePixelRatio||1,sc=parseInt(E('sScale').value),f=dpr*sc;

    var cellW=Math.min(parseInt(E('sCellW').value)||100,rw),cellH=parseInt(E('sCellH').value)||36;
    var stepX=Math.max(cellW-15,20),stepY=Math.max(cellH-16,10);
    var results=[],origSS=this.selS,origSE=this.selE,psm=E('sPSM').value,lang=E('sLang').value;
    var oxOff=parseFloat(E('sOXOff').value)||0,oyOff=parseFloat(E('sOYOff').value)||0;
    var cells=[];for(var cy=ry;cy<ry+rh-cellH;cy+=stepY)for(var cx=rx;cx<rx+rw-cellW;cx+=stepX)cells.push({x:cx,y:cy});
    var cellHit={};

    var processAngle=function(angle){
      var promises=[];
      cells.forEach(function(cell,idx){
        if(angle!==0&&cellHit[idx])return;
        self.selS={x:cell.x,y:cell.y};self.selE={x:cell.x+cellW,y:cell.y+cellH};
        var proc=self.cropAndProc(angle,undefined,'global');

          /* ★ 使用word bbox定位 ★ */

          var adjX,adjY,adjW,adjH;
          if(bb){
            if(angle===0){adjX=(cell.x+bb.x0/f+oxOff)/s;adjY=(cell.y+bb.y0/f+oyOff)/s;adjW=Math.max((bb.x1-bb.x0)/f/s,1);adjH=Math.max((bb.y1-bb.y0)/f/s,1)}
            else{var oW=proc.width;adjX=(cell.x+bb.y0/f+oxOff)/s;adjY=(cell.y+(oW-bb.x1)/f+oyOff)/s;adjW=Math.max((bb.y1-bb.y0)/f/s,1);adjH=Math.max((bb.x1-bb.x0)/f/s,1)}
          }else{

              if(angle===0){adjX=(cell.x+bx0/f+oxOff)/s;adjY=(cell.y+by0/f+oyOff)/s;adjW=Math.max(bw/f/s,1);adjH=Math.max(bh/f/s,1)}
              else{var oW=proc.width;adjX=(cell.x+by0/f+oxOff)/s;adjY=(cell.y+(oW-bx0-bw)/f+oyOff)/s;adjW=Math.max(bh/f/s,1);adjH=Math.max(bw/f/s,1)}
            }else{adjX=(cell.x+oxOff)/s;adjY=(cell.y+oyOff)/s;adjW=cellW/s;adjH=cellH/s}
          }
          results.push({nom:parsed.nom,up:parsed.up,lo:parsed.lo,type:parsed.type,x:adjX,y:adjY,w:adjW,h:adjH,conf:r.confidence,angle:angle});
          if(angle===0)cellHit[idx]=true;
        }).catch(function(){})});
      return Promise.all(promises)};

        var deduped=[];results.forEach(function(r){var dup=deduped.some(function(d){return d.nom===r.nom&&Math.abs(d.x+d.w/2-r.x-r.w/2)<Math.max(d.w,r.w)&&Math.abs(d.y+d.h/2-r.y-r.h/2)<Math.max(d.h,r.h)});if(!dup)deduped.push(r)});
        return deduped})})},

  buildExportCanvas:function(){var dpr=window.devicePixelRatio||1,cw=this.cv.width,ch=this.cv.height;var ec=document.createElement('canvas');ec.width=cw;ec.height=ch;var ex=ec.getContext('2d');ex.drawImage(this.cv,0,0);var s=this.scale*dpr;this.dims.filter(function(d){return d.pg===A.pg}).forEach(function(d){var bx=d.bubX*s,by=d.bubY*s,sx=d.selX*s,sy=d.selY*s,sw=d.selW*s,sh=d.selH*s;var corners=[{x:sx,y:sy},{x:sx+sw,y:sy},{x:sx,y:sy+sh},{x:sx+sw,y:sy+sh}];var nc=corners[0],minD=1e9;corners.forEach(function(c){var dist=Math.hypot(bx-c.x,by-c.y);if(dist<minD){minD=dist;nc=c}});ex.strokeStyle='#ff3c3c';ex.lineWidth=1.5*dpr;ex.setLineDash([5*dpr,3*dpr]);ex.strokeRect(sx,sy,sw,sh);ex.setLineDash([]);ex.beginPath();ex.moveTo(bx,by);ex.lineTo(nc.x,nc.y);ex.strokeStyle='#ff3c3c';ex.lineWidth=1.2*dpr;ex.stroke();ex.beginPath();ex.arc(nc.x,nc.y,3*dpr,0,Math.PI*2);ex.fillStyle='#ff3c3c';ex.fill();ex.beginPath();ex.arc(bx,by,14*dpr,0,Math.PI*2);ex.fillStyle='rgba(255,255,255,0.95)';ex.fill();ex.strokeStyle='#ff3c3c';ex.lineWidth=2*dpr;ex.stroke();ex.fillStyle='#ff3c3c';ex.font='700 '+(11*dpr)+'px JetBrains Mono,monospace';ex.textAlign='center';ex.textBaseline='middle';ex.fillText(d.num.toString(),bx,by+dpr)});return ec},
  expCSV:function(){if(!this.dims.length){this.toast('无数据');return}var csv='\uFEFF序号,标准尺寸,标准公差,上差,下差,类型,GD&T,实测值,判定,备注,检测设备\n';this.dims.forEach(function(d){var p=d.measured?(A.chkPass(d)?'PASS':'FAIL'):'';csv+=d.num+','+d.nominal+','+(d.tolDisplay||'')+','+fmtLim(d.nominal,d.upperTol)+','+fmtLim(d.nominal,d.lowerTol)+','+d.type+','+d.gdt+','+d.measured+','+p+','+d.notes+','+(d.equipment||'')+'\n'});this.dl(csv,this.getExportName()+'.csv','text/csv;charset=utf-8');this.toast('CSV已导出')},
  expXLS:function(){if(!this.dims.length){this.toast('无数据');return}var wb=XLSX.utils.book_new();var hd=[['FAI 首件检验报告'],[],['供方名称',E('iSupplier').value,'','产品名称',E('iProdName').value],['图号',E('iDW').value,'','版本',E('iRV').value],['未注公差',E('iTolStd').value,'','重要度',E('iImportance').value],['日期',new Date().toLocaleDateString('zh-CN')],[],['序号','标准尺寸','标准公差','上差','下差','类型','GD&T','实测值','判定','备注','检测设备']];this.dims.forEach(function(d){hd.push([d.num,d.nominal,d.tolDisplay||'',fmtLim(d.nominal,d.upperTol),fmtLim(d.nominal,d.lowerTol),d.type,d.gdt,d.measured,d.measured?(A.chkPass(d)?'PASS':'FAIL'):'',d.notes,d.equipment||''])});var ws=XLSX.utils.aoa_to_sheet(hd);ws['!cols']=[{wch:8},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:8},{wch:12},{wch:8},{wch:15},{wch:10}];ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:10}}];XLSX.utils.book_append_sheet(wb,ws,'FAI');XLSX.writeFile(wb,this.getExportName()+'.xlsx');this.toast('Excel已导出')},
  expPDF:function(){if(!this.pdf&&!this.isImg){this.toast('请先加载图纸');return}var ec=this.buildExportCanvas(),imgData=ec.toDataURL('image/jpeg',.95),cw=parseFloat(this.cv.style.width),ch=parseFloat(this.cv.style.height),pwmm=cw*.264583,phmm=ch*.264583,orient=pwmm>phmm?'landscape':'portrait';var pdf=new jspdf.jsPDF({orientation:orient,unit:'mm',format:[pwmm,phmm]});pdf.addImage(imgData,'JPEG',0,0,pwmm,phmm);pdf.save(this.getExportName()+'.pdf');this.toast('PDF已导出')},
  expImg:function(){if(!this.pdf&&!this.isImg){this.toast('请先加载图纸');return}var fmt=E('eFmt').value,ec=this.buildExportCanvas(),name=this.getExportName();ec.toBlob(function(blob){var u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name+'.'+fmt;a.click();URL.revokeObjectURL(u)},fmt==='jpeg'?'image/jpeg':'image/png',.95);this.toast('图片已导出')},

  saveProj:function(){var data={v:'3.7',date:new Date().toISOString(),info:{supplier:E('iSupplier').value,prodName:E('iProdName').value,dw:E('iDW').value,rv:E('iRV').value,tolStd:E('iTolStd').value,importance:E('iImportance').value},dims:this.dims,regions:this.regions,nextN:this.nextN,recycled:this.recycled};this.dl(JSON.stringify(data,null,2),this.getExportName()+'.json','application/json');this.toast('已保存')},
  loadProj:function(f){var self=this;f.text().then(function(t){var d=JSON.parse(t);var info=d.info||{};E('iSupplier').value=info.supplier||'';E('iProdName').value=info.prodName||'';E('iDW').value=info.dw||'';E('iRV').value=info.rv||'';E('iTolStd').value=info.tolStd||'GB/T 1804-m';E('iImportance').value=info.importance||'B';self.dims=(d.dims||[]).map(function(dim){if(!dim.equipment)dim.equipment=getEquip(dim.type,dim.nominal);return dim});self.regions=d.regions||[];self.nextN=d.nextN||(self.dims.length+1);self.recycled=d.recycled||[];if(self.pdf||self.isImg){self.renderRegions();self.renderBubbles();self.renderRegionList()}self.renderTable();self.toast('已载入');self.log('载入'+self.dims.length+'尺寸','ok')}).catch(function(){self.toast('载入失败')})},

  log:function(m,t){var el=E('logA'),d=document.createElement('div');d.style.color=t==='ok'?'var(--ok)':t==='err'?'var(--ac)':t==='warn'?'var(--warn)':t==='info'?'var(--info)':'var(--t3)';d.textContent='['+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'] '+m;el.appendChild(d);el.scrollTop=el.scrollHeight},
  setStatus:function(c,t){E('sDot').className='sd '+c;E('sTxt').textContent=t},
  updStatus:function(){E('stP').textContent='页'+this.pg+'/'+this.total;E('stZ').textContent=Math.round(this.scale*100)+'%';E('stB').textContent='气泡:'+this.dims.filter(function(d){return d.pg===A.pg}).length},
  toast:function(m){var el=E('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show')},2000)}
};
document.addEventListener('DOMContentLoaded',function(){A.init()});
