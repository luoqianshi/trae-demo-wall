<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>药音通 - 服药提醒</title>
  <link rel="stylesheet" href="css/offline.css">
  <style>
    .page-title {
      font-size: var(--fs-2xl);
      font-weight: 700;
      text-align: center;
      margin-bottom: var(--space-4);
      color: var(--text-main);
    }
    .page-title svg {
      width: 40px;
      height: 40px;
      vertical-align: middle;
      margin-right: var(--space-2);
      color: var(--color-primary);
    }
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-sub);
    }
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: var(--space-4);
      opacity: 0.4;
    }
    .empty-state p {
      font-size: var(--fs-lg);
      margin-bottom: var(--space-3);
    }
    .reminder-item {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-5);
      margin-bottom: var(--space-3);
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s ease;
    }
    .reminder-item:active {
      transform: scale(0.98);
    }
    .reminder-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    .reminder-name {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--text-main);
    }
    .reminder-actions {
      display: flex;
      gap: var(--space-2);
    }
    .reminder-actions button {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .reminder-actions button svg {
      width: 24px;
      height: 24px;
    }
    .btn-edit {
      background: rgba(54, 107, 158, 0.1);
      color: var(--color-primary);
    }
    .btn-edit:active {
      background: rgba(54, 107, 158, 0.2);
    }
    .btn-delete {
      background: rgba(194, 48, 48, 0.1);
      color: var(--color-danger);
    }
    .btn-delete:active {
      background: rgba(194, 48, 48, 0.2);
    }
    .reminder-info {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2) var(--space-4);
      font-size: var(--fs-sm);
      color: var(--text-sub);
    }
    .reminder-info span {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
    .reminder-info svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .reminder-note {
      margin-top: var(--space-2);
      font-size: var(--fs-xs);
      color: var(--text-sub);
      padding-top: var(--space-2);
      border-top: 1px dashed var(--border-card);
    }
    .form-group {
      margin-bottom: var(--space-4);
    }
    .form-group label {
      display: block;
      font-size: var(--fs-base);
      font-weight: 500;
      margin-bottom: var(--space-2);
      color: var(--text-main);
    }
    .form-group input,
    .form-group textarea {
      font-size: var(--fs-base);
    }
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    .modal-buttons {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-5);
    }
    .modal-buttons .yt-btn {
      flex: 1;
    }
    .alert-modal .modal-content {
      text-align: center;
      max-width: 420px;
    }
    .alert-modal .modal-content .alert-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto var(--space-4);
      background: rgba(194, 48, 48, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .alert-modal .modal-content .alert-icon svg {
      width: 56px;
      height: 56px;
      color: var(--color-danger);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .alert-drug-name {
      font-size: var(--fs-2xl);
      font-weight: 700;
      color: var(--color-danger);
      margin-bottom: var(--space-2);
    }
    .alert-drug-info {
      font-size: var(--fs-lg);
      color: var(--text-main);
      margin-bottom: var(--space-4);
    }
    .alert-drug-note {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      margin-bottom: var(--space-5);
    }
    .footer-tip {
      text-align: center;
      padding: var(--space-5) var(--space-4);
      font-size: var(--fs-sm);
      color: var(--text-sub);
      background: rgba(54, 107, 158, 0.06);
      border-radius: var(--radius-lg);
      margin-top: var(--space-4);
    }
    .footer-tip svg {
      width: 24px;
      height: 24px;
      vertical-align: middle;
      margin-right: var(--space-1);
    }
    .reminder-count {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      text-align: center;
      margin-bottom: var(--space-3);
    }
  </style>
</head>
<body>
  <div class="page-container">
    <!-- 页面标题 -->
    <div class="page-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      服药提醒
    </div>

    <!-- 提醒数量 -->
    <div class="reminder-count" id="reminderCount"></div>

    <!-- 提醒列表 -->
    <div id="reminderList"></div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      <p>还没有设置服药提醒</p>
      <p>点击下面的按钮，添加您的第一个提醒</p>
    </div>

    <!-- 添加提醒按钮 -->
    <button class="yt-btn yt-btn-primary yt-btn-block mt-4" onclick="openAddModal()" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:32px;height:32px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      添加提醒
    </button>

    <!-- 底部提示 -->
    <div class="footer-tip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      提醒功能在页面打开时生效，请保持页面在后台运行
    </div>
  </div>

  <!-- 添加/编辑提醒弹窗 -->
  <div class="modal-overlay" id="addModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">添加服药提醒</div>
      <div class="form-group">
        <label>药品名称</label>
        <input type="text" id="drugName" placeholder="例如：阿司匹林" maxlength="50">
      </div>
      <div class="form-group">
        <label>服药时间</label>
        <input type="time" id="drugTime">
      </div>
      <div class="form-group">
        <label>服药剂量</label>
        <input type="text" id="drugDose" placeholder="例如：1片、2粒" maxlength="30">
      </div>
      <div class="form-group">
        <label>备注（选填）</label>
        <textarea id="drugNote" placeholder="例如：饭后服用、不能和牛奶一起吃"></textarea>
      </div>
      <div class="modal-buttons">
        <button class="yt-btn yt-btn-outline" onclick="closeModal('addModal')">取消</button>
        <button class="yt-btn yt-btn-primary" onclick="saveReminder()" id="saveBtn">确认添加</button>
      </div>
    </div>
  </div>

  <!-- 服药提醒弹窗（全屏） -->
  <div class="modal-overlay alert-modal" id="alertModal">
    <div class="modal-content">
      <div class="alert-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      </div>
      <div class="alert-drug-name" id="alertDrugName"></div>
      <div class="alert-drug-info" id="alertDrugInfo"></div>
      <div class="alert-drug-note" id="alertDrugNote"></div>
      <div class="modal-buttons" style="justify-content:center;">
        <button class="yt-btn yt-btn-primary" onclick="closeAlertModal()" style="min-width:200px;">我知道了，去吃药</button>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    // 当前编辑的提醒ID
    let editingId = null;
    // 已提醒的时间记录（避免重复提醒）
    let alertedTimes = {};

    // 从localStorage读取提醒列表
    function getReminders() {
      return Storage.get('reminders', []);
    }

    // 保存提醒列表到localStorage
    function saveReminders(list) {
      Storage.set('reminders', list);
    }

    // 渲染提醒列表
    function renderReminders() {
      var list = getReminders();
      var container = document.getElementById('reminderList');
      var emptyState = document.getElementById('emptyState');
      var countEl = document.getElementById('reminderCount');

      if (list.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        countEl.textContent = '';
        return;
      }

      emptyState.style.display = 'none';
      countEl.textContent = '共 ' + list.length + ' 个提醒';

      var html = '';
      list.forEach(function(item) {
        html += '<div class="reminder-item" data-id="' + item.id + '">';
        html += '  <div class="reminder-header">';
        html += '    <span class="reminder-name">' + escapeHtml(item.name) + '</span>';
        html += '    <div class="reminder-actions">';
        html += '      <button class="btn-edit" onclick="editReminder(\'' + item.id + '\')" title="编辑">';
        html += '        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
        html += '      </button>';
        html += '      <button class="btn-delete" onclick="deleteReminder(\'' + item.id + '\')" title="删除">';
        html += '        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
        html += '      </button>';
        html += '    </div>';
        html += '  </div>';
        html += '  <div class="reminder-info">';
        html += '    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + escapeHtml(item.time) + '</span>';
        html += '    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.5 20.5l10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>' + escapeHtml(item.dose) + '</span>';
        html += '  </div>';
        if (item.note) {
          html += '  <div class="reminder-note">' + escapeHtml(item.note) + '</div>';
        }
        html += '</div>';
      });

      container.innerHTML = html;
    }

    // HTML转义
    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // 打开添加弹窗
    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = '添加服药提醒';
      document.getElementById('saveBtn').textContent = '确认添加';
      document.getElementById('drugName').value = '';
      document.getElementById('drugTime').value = '';
      document.getElementById('drugDose').value = '';
      document.getElementById('drugNote').value = '';
      showModal('addModal');
    }

    // 编辑提醒
    function editReminder(id) {
      var list = getReminders();
      var item = list.find(function(r) { return r.id === id; });
      if (!item) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = '修改服药提醒';
      document.getElementById('saveBtn').textContent = '保存修改';
      document.getElementById('drugName').value = item.name;
      document.getElementById('drugTime').value = item.time;
      document.getElementById('drugDose').value = item.dose;
      document.getElementById('drugNote').value = item.note || '';
      showModal('addModal');
    }

    // 保存提醒
    function saveReminder() {
      var name = document.getElementById('drugName').value.trim();
      var time = document.getElementById('drugTime').value;
      var dose = document.getElementById('drugDose').value.trim();
      var note = document.getElementById('drugNote').value.trim();

      if (!name) {
        showToast('请输入药品名称');
        return;
      }
      if (!time) {
        showToast('请选择服药时间');
        return;
      }
      if (!dose) {
        showToast('请输入服药剂量');
        return;
      }

      var list = getReminders();

      if (editingId) {
        // 编辑模式
        var idx = list.findIndex(function(r) { return r.id === editingId; });
        if (idx !== -1) {
          list[idx].name = name;
          list[idx].time = time;
          list[idx].dose = dose;
          list[idx].note = note;
        }
        showToast('提醒已修改');
      } else {
        // 添加模式
        list.push({
          id: 'r_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
          name: name,
          time: time,
          dose: dose,
          note: note,
          enabled: true
        });
        showToast('提醒添加成功');
      }

      saveReminders(list);
      closeModal('addModal');
      renderReminders();
    }

    // 删除提醒
    function deleteReminder(id) {
      var list = getReminders();
      var item = list.find(function(r) { return r.id === id; });
      if (!item) return;

      showModal('confirmDelete', '确认删除', '<p style="font-size:var(--fs-lg);text-align:center;margin-bottom:var(--space-4);">确定要删除<br><strong>' + escapeHtml(item.name) + '</strong><br>的服药提醒吗？</p><div class="modal-buttons"><button class="yt-btn yt-btn-outline" onclick="closeModal(\'confirmDelete\')">再想想</button><button class="yt-btn yt-btn-danger" onclick="confirmDelete(\'' + id + '\')">确认删除</button></div>');
    }

    // 确认删除
    function confirmDelete(id) {
      var list = getReminders().filter(function(r) { return r.id !== id; });
      saveReminders(list);
      closeModal('confirmDelete');
      renderReminders();
      showToast('提醒已删除');
    }

    // 关闭提醒弹窗
    function closeAlertModal() {
      closeModal('alertModal');
      stopSpeaking();
    }

    // 每秒检查提醒时间
    function checkReminders() {
      var list = getReminders();
      if (list.length === 0) return;

      var now = new Date();
      var currentTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
      var today = getTodayStr();

      list.forEach(function(item) {
        if (!item.enabled) return;
        if (item.time !== currentTime) return;

        var alertKey = item.id + '_' + today + '_' + currentTime;
        if (alertedTimes[alertKey]) return;

        // 标记已提醒
        alertedTimes[alertKey] = true;

        // 显示提醒弹窗
        document.getElementById('alertDrugName').textContent = item.name;
        document.getElementById('alertDrugInfo').textContent = '服药时间：' + item.time + '  剂量：' + item.dose;
        document.getElementById('alertDrugNote').textContent = item.note ? '温馨提示：' + item.note : '';
        showModal('alertModal');

        // 语音播报提醒
        var speakMsg = '该吃药啦！请服用' + item.name + '，剂量' + item.dose;
        if (item.note) {
          speakMsg += '。' + item.note;
        }
        speakText(speakMsg, { rate: 'slow' });
      });
    }

    // 页面初始化
    document.addEventListener('DOMContentLoaded', function() {
      renderReminders();

      // 每秒检查提醒
      setInterval(checkReminders, 1000);
    });
  </script>
</body>
</html>
