<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>药音通 - 拍照识药</title>
  <link rel="stylesheet" href="css/offline.css">
  <style>
    .page-title {
      font-size: var(--fs-2xl);
      font-weight: 700;
      text-align: center;
      margin-bottom: var(--space-5);
      color: var(--text-main);
    }
    .page-title svg {
      width: 40px;
      height: 40px;
      vertical-align: middle;
      margin-right: var(--space-2);
      color: var(--color-primary);
    }
    .action-btns {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      margin-bottom: var(--space-5);
    }
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      min-height: 88px;
      padding: var(--space-4) var(--space-5);
      border-radius: var(--radius-xl);
      font-size: var(--fs-xl);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }
    .action-btn:active {
      transform: scale(0.96);
    }
    .action-btn svg {
      width: 36px;
      height: 36px;
    }
    .action-btn.camera-btn {
      background: var(--color-primary);
      color: #FFFFFF;
      box-shadow: 0 4px 12px rgba(54, 107, 158, 0.3);
    }
    .action-btn.album-btn {
      background: var(--bg-card);
      color: var(--color-primary);
      border: 3px solid var(--color-primary);
    }
    .upload-area {
      margin-bottom: var(--space-5);
      position: relative;
    }
    .upload-area svg {
      width: 64px;
      height: 64px;
      color: var(--text-sub);
      margin-bottom: var(--space-2);
    }
    .upload-area .upload-hint {
      font-size: var(--fs-base);
      color: var(--text-sub);
    }
    .upload-area .upload-sub-hint {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      opacity: 0.7;
    }
    .upload-area img {
      max-width: 100%;
      max-height: 300px;
      border-radius: var(--radius-md);
      object-fit: contain;
    }
    .loading-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-6);
    }
    .loading-section .loading-text {
      font-size: var(--fs-lg);
      color: var(--text-sub);
    }
    .result-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      box-shadow: var(--shadow-soft);
      margin-bottom: var(--space-4);
    }
    .result-card .result-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .result-card .result-header svg {
      width: 36px;
      height: 36px;
      color: var(--color-secondary);
    }
    .result-card .result-header span {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--color-secondary);
    }
    .result-card .drug-name {
      font-size: var(--fs-xl);
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .result-card .drug-info {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      margin-bottom: var(--space-3);
      line-height: 1.8;
    }
    .result-card .drug-info p {
      margin-bottom: var(--space-1);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-container">

    <!-- 页面标题 -->
    <div class="page-title">
      <span id="pageTitleIcon"></span>
      拍照识药
    </div>

    <!-- 两个大按钮入口 -->
    <div class="action-btns">
      <button class="action-btn camera-btn" id="btnCamera">
        <span id="btnCameraIcon"></span>
        <span>相机拍摄</span>
      </button>
      <button class="action-btn album-btn" id="btnAlbum">
        <span id="btnAlbumIcon"></span>
        <span>从相册选择</span>
      </button>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="fileInput" accept="image/*" style="display:none;">

    <!-- 图片预览区域 -->
    <div class="upload-area" id="uploadArea">
      <div id="uploadPlaceholder">
        <span id="uploadIcon"></span>
        <div class="upload-hint">点击拍照或选择图片</div>
        <div class="upload-sub-hint">支持药盒、药瓶、说明书照片</div>
      </div>
      <div id="previewContainer" class="hidden">
        <img id="previewImage" src="" alt="药品图片预览">
      </div>
    </div>

    <!-- 加载动画 -->
    <div class="loading-section hidden" id="loadingSection">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在识别药品...</div>
    </div>

    <!-- 识别结果 -->
    <div class="result-card hidden" id="resultCard">
      <div class="result-header">
        <span id="resultCheckIcon"></span>
        <span>识别成功</span>
      </div>
      <div class="drug-name">阿司匹林肠溶片</div>
      <div class="drug-info">
        <p>规格：25mg x 30片/盒</p>
        <p>生产企业：拜耳医药保健有限公司</p>
        <p>类别：解热镇痛药 / 抗血小板药</p>
      </div>
      <a href="analysis.html" class="yt-btn yt-btn-primary yt-btn-block" style="text-decoration:none;">
        <span id="resultArrowIcon" style="width:28px;height:28px;"></span>
        查看详细解析
      </a>
    </div>

  </div>

  <script src="js/common.js"></script>
  <script>
    (function() {
      // 插入图标
      function setIcon(el, icon, size) {
        if (!el) return;
        el.innerHTML = YT_ICONS[icon];
        var svg = el.querySelector('svg');
        if (svg) svg.style.cssText = 'width:' + size + ';height:' + size + ';';
      }

      setIcon(document.getElementById('pageTitleIcon'), 'camera', '40px');
      setIcon(document.getElementById('btnCameraIcon'), 'camera', '36px');
      setIcon(document.getElementById('btnAlbumIcon'), 'image', '36px');
      setIcon(document.getElementById('uploadIcon'), 'camera', '64px');
      setIcon(document.getElementById('resultCheckIcon'), 'check', '36px');
      setIcon(document.getElementById('resultArrowIcon'), 'arrowRight', '28px');

      var fileInput = document.getElementById('fileInput');
      var uploadArea = document.getElementById('uploadArea');
      var uploadPlaceholder = document.getElementById('uploadPlaceholder');
      var previewContainer = document.getElementById('previewContainer');
      var previewImage = document.getElementById('previewImage');
      var loadingSection = document.getElementById('loadingSection');
      var resultCard = document.getElementById('resultCard');
      var btnCamera = document.getElementById('btnCamera');
      var btnAlbum = document.getElementById('btnAlbum');

      // 点击上传区域也触发选择
      uploadArea.addEventListener('click', function() {
        fileInput.removeAttribute('capture');
        fileInput.click();
      });

      // 相机拍摄
      btnCamera.addEventListener('click', function() {
        fileInput.setAttribute('capture', 'environment');
        fileInput.click();
      });

      // 从相册选择
      btnAlbum.addEventListener('click', function() {
        fileInput.removeAttribute('capture');
        fileInput.click();
      });

      // 文件选择后处理
      fileInput.addEventListener('change', function(e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;

        // 显示预览
        var reader = new FileReader();
        reader.onload = function(ev) {
          previewImage.src = ev.target.result;
          uploadPlaceholder.classList.add('hidden');
          previewContainer.classList.remove('hidden');
          resultCard.classList.add('hidden');

          // 2秒后显示加载动画
          setTimeout(function() {
            loadingSection.classList.remove('hidden');

            // 再2秒后显示结果
            setTimeout(function() {
              loadingSection.classList.add('hidden');
              resultCard.classList.remove('hidden');
            }, 2000);
          }, 2000);
        };
        reader.readAsDataURL(file);

        // 重置input以便再次选择同一文件
        fileInput.value = '';
      });
    })();
  </script>
</body>
</html>
