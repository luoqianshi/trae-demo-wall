<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>药音通 - 用药台账</title>
  <link rel="stylesheet" href="css/offline.css">
  <style>
    .page-title {
      font-size: var(--fs-2xl);
      font-weight: 700;
      text-align: center;
      margin-bottom: var(--space-4);
      color: var(--text-main);
    }
    .page-title svg {
      width: 40px;
      height: 40px;
      vertical-align: middle;
      margin-right: var(--space-2);
      color: var(--color-primary);
    }
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .stat-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-3);
      text-align: center;
      box-shadow: var(--shadow-soft);
    }
    .stat-card .stat-num {
      font-size: var(--fs-2xl);
      font-weight: 700;
      line-height: 1.2;
    }
    .stat-card .stat-label {
      font-size: var(--fs-xs);
      color: var(--text-sub);
      margin-top: var(--space-1);
    }
    .stat-card.stat-taken .stat-num { color: var(--color-secondary); }
    .stat-card.stat-missed .stat-num { color: var(--color-danger); }
    .stat-card.stat-total .stat-num { color: var(--color-primary); }
    /* 记录列表 */
    .record-item {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-5);
      margin-bottom: var(--space-3);
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s ease;
    }
    .record-item:active {
      transform: scale(0.98);
    }
    .record-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    .record-drug-name {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .record-drug-name svg {
      width: 26px;
      height: 26px;
      color: var(--color-primary);
      flex-shrink: 0;
    }
    .record-time {
      font-size: var(--fs-sm);
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
    .record-time svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .record-details {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2) var(--space-4);
      font-size: var(--fs-sm);
      color: var(--text-sub);
    }
    .record-details span {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
    .record-details svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .record-note {
      margin-top: var(--space-2);
      font-size: var(--fs-xs);
      color: var(--text-sub);
      padding-top: var(--space-2);
      border-top: 1px dashed var(--border-card);
    }
    .record-delete-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(194, 48, 48, 0.1);
      color: var(--color-danger);
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    .record-delete-btn svg {
      width: 22px;
      height: 22px;
    }
    .record-delete-btn:active {
      background: rgba(194, 48, 48, 0.2);
    }
    /* 表单 */
    .form-group {
      margin-bottom: var(--space-4);
    }
    .form-group label {
      display: block;
      font-size: var(--fs-base);
      font-weight: 500;
      margin-bottom: var(--space-2);
      color: var(--text-main);
    }
    .form-group input,
    .form-group textarea {
      font-size: var(--fs-base);
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .form-group .optional-tag {
      font-size: var(--fs-xs);
      color: var(--text-sub);
      font-weight: 400;
      margin-left: var(--space-2);
    }
    .modal-buttons {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-5);
    }
    .modal-buttons .yt-btn {
      flex: 1;
    }
    /* 语音按钮 */
    .voice-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: rgba(90, 158, 123, 0.1);
      color: var(--color-secondary);
      border: 2px solid var(--color-secondary);
      border-radius: var(--radius-full);
      font-size: var(--fs-sm);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: var(--space-3);
    }
    .voice-btn svg {
      width: 24px;
      height: 24px;
    }
    .voice-btn:active {
      background: rgba(90, 158, 123, 0.2);
      transform: scale(0.96);
    }
    .voice-btn.recording {
      background: rgba(194, 48, 48, 0.1);
      border-color: var(--color-danger);
      color: var(--color-danger);
      animation: voicePulse 1s ease-in-out infinite;
    }
    @keyframes voicePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    /* 漏服统计 */
    .missed-summary {
      background: rgba(194, 48, 48, 0.06);
      border: 2px solid rgba(194, 48, 48, 0.15);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-4);
      font-size: var(--fs-sm);
      color: var(--color-danger);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .missed-summary svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-sub);
    }
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: var(--space-4);
      opacity: 0.4;
    }
    .empty-state p {
      font-size: var(--fs-lg);
      margin-bottom: var(--space-3);
    }
    .date-section {
      font-size: var(--fs-sm);
      font-weight: 500;
      color: var(--text-sub);
      padding: var(--space-2) 0;
      margin-bottom: var(--space-2);
    }
  </style>
</head>
<body>
  <div class="page-container">
    <!-- 页面标题 -->
    <div class="page-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      用药台账
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card stat-taken">
        <div class="stat-num" id="statTaken">0</div>
        <div class="stat-label">今日已服</div>
      </div>
      <div class="stat-card stat-missed">
        <div class="stat-num" id="statMissed">0</div>
        <div class="stat-label">本周漏服</div>
      </div>
      <div class="stat-card stat-total">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">今日总数</div>
      </div>
    </div>

    <!-- 语音录入按钮 -->
    <button class="voice-btn" id="voiceBtn" onclick="startVoiceInput()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      <span id="voiceBtnText">语音录入药品名称</span>
    </button>

    <!-- 添加记录按钮 -->
    <button class="yt-btn yt-btn-primary yt-btn-block mb-4" onclick="openAddModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:32px;height:32px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      添加用药记录
    </button>

    <!-- 漏服提示 -->
    <div class="missed-summary hidden" id="missedSummary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="missedText"></span>
    </div>

    <!-- 记录列表 -->
    <div id="recordList"></div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      <p>还没有用药记录</p>
      <p>点击上方按钮，记录您的用药情况</p>
    </div>
  </div>

  <!-- 添加记录弹窗 -->
  <div class="modal-overlay" id="addModal">
    <div class="modal-content">
      <div class="modal-title">添加用药记录</div>
      <div class="form-group">
        <label>药品名称</label>
        <input type="text" id="recDrugName" placeholder="例如：降压药" maxlength="50">
      </div>
      <div class="form-group">
        <label>服药剂量</label>
        <input type="text" id="recDrugDose" placeholder="例如：1片、10毫升" maxlength="30">
      </div>
      <div class="form-group">
        <label>服药时间</label>
        <input type="time" id="recDrugTime">
      </div>
      <div class="form-group">
        <label>血压（选填）<span class="optional-tag">如：120/80</span></label>
        <input type="text" id="recBloodPressure" placeholder="例如：120/80" maxlength="20">
      </div>
      <div class="form-group">
        <label>血糖（选填）<span class="optional-tag">如：5.6</span></label>
        <input type="text" id="recBloodSugar" placeholder="例如：5.6" maxlength="10">
      </div>
      <div class="form-group">
        <label>备注（选填）</label>
        <textarea id="recNote" placeholder="例如：今天感觉头晕"></textarea>
      </div>
      <div class="modal-buttons">
        <button class="yt-btn yt-btn-outline" onclick="closeModal('addModal')">取消</button>
        <button class="yt-btn yt-btn-primary" onclick="saveRecord()">确认记录</button>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    // HTML转义
    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // 获取记录列表
    function getRecords() {
      return Storage.get('records', []);
    }

    // 保存记录列表
    function saveRecords(list) {
      Storage.set('records', list);
    }

    // 获取提醒列表（用于计算漏服）
    function getReminders() {
      return Storage.get('reminders', []);
    }

    // 计算今日统计
    function calcTodayStats() {
      var records = getRecords();
      var today = getTodayStr();
      var todayRecords = records.filter(function(r) {
        return r.date === today;
      });
      return {
        taken: todayRecords.length,
        total: getReminders().length
      };
    }

    // 计算本周漏服次数
    function calcWeekMissed() {
      var reminders = getReminders();
      var records = getRecords();
      if (reminders.length === 0) return 0;

      var now = new Date();
      var weekStart = new Date(now);
      weekStart.setDate(now.getDate() - now.getDay());
      weekStart.setHours(0, 0, 0, 0);

      var missed = 0;
      // 遍历过去7天
      for (var d = 0; d < 7; d++) {
        var checkDate = new Date(weekStart);
        checkDate.setDate(weekStart.getDate() + d);
        if (checkDate > now) break;

        var dateStr = checkDate.getFullYear() + '-' + String(checkDate.getMonth() + 1).padStart(2, '0') + '-' + String(checkDate.getDate()).padStart(2, '0');

        reminders.forEach(function(rem) {
          if (!rem.enabled) return;
          var hasRecord = records.some(function(rec) {
            return rec.date === dateStr && rec.drugName === rem.name && rec.time === rem.time;
          });
          if (!hasRecord) {
            missed++;
          }
        });
      }
      return missed;
    }

    // 更新统计显示
    function updateStats() {
      var stats = calcTodayStats();
      document.getElementById('statTaken').textContent = stats.taken;
      document.getElementById('statTotal').textContent = stats.total;

      var missed = calcWeekMissed();
      document.getElementById('statMissed').textContent = missed;

      var missedSummary = document.getElementById('missedSummary');
      var missedText = document.getElementById('missedText');
      if (missed > 0) {
        missedSummary.classList.remove('hidden');
        missedText.textContent = '本周共有 ' + missed + ' 次漏服，请注意按时服药';
      } else {
        missedSummary.classList.add('hidden');
      }
    }

    // 渲染记录列表
    function renderRecords() {
      var records = getRecords();
      var container = document.getElementById('recordList');
      var emptyState = document.getElementById('emptyState');

      if (records.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      // 按时间倒序
      records.sort(function(a, b) {
        var ta = a.date + ' ' + (a.time || '00:00');
        var tb = b.date + ' ' + (b.time || '00:00');
        return tb > ta ? 1 : -1;
      });

      var html = '';
      var lastDate = '';
      records.forEach(function(item) {
        if (item.date !== lastDate) {
          lastDate = item.date;
          var dateLabel = item.date === getTodayStr() ? '今天' : formatDate(item.date);
          html += '<div class="date-section">' + dateLabel + '（' + item.date + '）</div>';
        }

        html += '<div class="record-item">';
        html += '  <div class="record-header">';
        html += '    <span class="record-drug-name">';
        html += '      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.5 20.5l10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>';
        html += '      ' + escapeHtml(item.drugName);
        html += '    </span>';
        html += '    <div style="display:flex;align-items:center;gap:var(--space-2);">';
        html += '      <span class="record-time">';
        html += '        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
        html += '        ' + escapeHtml(item.time);
        html += '      </span>';
        html += '      <button class="record-delete-btn" onclick="deleteRecord(\'' + item.id + '\')" title="删除">';
        html += '        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
        html += '      </button>';
        html += '    </div>';
        html += '  </div>';
        html += '  <div class="record-details">';
        html += '    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.5 20.5l10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>' + escapeHtml(item.dose) + '</span>';
        if (item.bp) {
          html += '    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>血压：' + escapeHtml(item.bp) + '</span>';
        }
        if (item.bs) {
          html += '    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>血糖：' + escapeHtml(item.bs) + '</span>';
        }
        html += '  </div>';
        if (item.note) {
          html += '  <div class="record-note">' + escapeHtml(item.note) + '</div>';
        }
        html += '</div>';
      });

      container.innerHTML = html;
    }

    // 打开添加弹窗
    function openAddModal() {
      document.getElementById('recDrugName').value = '';
      document.getElementById('recDrugDose').value = '';
      document.getElementById('recDrugTime').value = '';
      document.getElementById('recBloodPressure').value = '';
      document.getElementById('recBloodSugar').value = '';
      document.getElementById('recNote').value = '';
      showModal('addModal');
    }

    // 保存记录
    function saveRecord() {
      var drugName = document.getElementById('recDrugName').value.trim();
      var dose = document.getElementById('recDrugDose').value.trim();
      var time = document.getElementById('recDrugTime').value;
      var bp = document.getElementById('recBloodPressure').value.trim();
      var bs = document.getElementById('recBloodSugar').value.trim();
      var note = document.getElementById('recNote').value.trim();

      if (!drugName) {
        showToast('请输入药品名称');
        return;
      }
      if (!dose) {
        showToast('请输入服药剂量');
        return;
      }
      if (!time) {
        showToast('请选择服药时间');
        return;
      }

      var records = getRecords();
      records.push({
        id: 'rec_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
        drugName: drugName,
        dose: dose,
        time: time,
        bp: bp,
        bs: bs,
        note: note,
        date: getTodayStr(),
        createdAt: Date.now()
      });

      saveRecords(records);
      closeModal('addModal');
      renderRecords();
      updateStats();
      showToast('用药记录已保存');

      // 语音播报确认
      speakText('已记录，' + drugName + '，' + dose, { speed: 'slow' });
    }

    // 删除记录
    function deleteRecord(id) {
      var records = getRecords().filter(function(r) { return r.id !== id; });
      saveRecords(records);
      renderRecords();
      updateStats();
      showToast('记录已删除');
    }

    // 语音录入
    function startVoiceInput() {
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        showToast('您的浏览器不支持语音录入功能');
        return;
      }

      var voiceBtn = document.getElementById('voiceBtn');
      var voiceBtnText = document.getElementById('voiceBtnText');

      // 先朗读提示
      speakText('请说出药品名称', { speed: 'slow', onEnd: function() {
        startListening();
      }});

      function startListening() {
        var recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = false;
        recognition.interimResults = false;

        voiceBtn.classList.add('recording');
        voiceBtnText.textContent = '正在听您说...';

        recognition.onresult = function(event) {
          var text = event.results[0][0].transcript;
          voiceBtn.classList.remove('recording');
          voiceBtnText.textContent = '语音录入药品名称';
          document.getElementById('recDrugName').value = text;
          showToast('已识别：' + text);
          // 打开添加弹窗
          openAddModal();
        };

        recognition.onerror = function(event) {
          voiceBtn.classList.remove('recording');
          voiceBtnText.textContent = '语音录入药品名称';
          if (event.error === 'no-speech') {
            showToast('没有听到声音，请再试一次');
          } else {
            showToast('语音识别出错，请手动输入');
          }
        };

        recognition.onend = function() {
          voiceBtn.classList.remove('recording');
          voiceBtnText.textContent = '语音录入药品名称';
        };

        recognition.start();
      }
    }

    // 页面初始化
    document.addEventListener('DOMContentLoaded', function() {
      renderRecords();
      updateStats();
    });
  </script>
</body>
</html>
