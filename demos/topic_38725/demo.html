<script>
// ============ STATE ============
let personName = '爷爷';
let userName = '你';
let currentStep = 1;
const totalSteps = 6;
let collectedMemories = [];
let isTyping = false;

// ============ SCREEN MANAGEMENT ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============ TAB NAVIGATION ============
function showTabNav() {
  document.getElementById('bottomNav').classList.add('show');
  // Show recording tab as active, hide other screens
  switchTab('recording');
}

function switchTab(screenId) {
  // Close completion overlay if open
  document.getElementById('completionOverlay').classList.remove('show');
  // Update which screen is active
  showScreen(screenId);
  // Update nav buttons
  document.querySelectorAll('#bottomNav button').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === screenId);
  });
}

function switchToTimeline() {
  document.getElementById('completionOverlay').classList.remove('show');
  showTabNav();
  // Render timeline and switch to it
  const tlScreen = document.getElementById('timeline');
  renderTimeline('all');
  showScreen('timeline');
  document.querySelectorAll('#bottomNav button').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === 'timeline');
  });
}

function switchToChat() {
  document.getElementById('completionOverlay').classList.remove('show');
  showTabNav();
  // Init chat and switch to it
  const chatArea = document.getElementById('memoryChatArea');
  chatArea.innerHTML = '';
  chatContext = [
    { role: 'ai', text: `你好呀，我是 ${personName} 的记忆分身。关于我的人生故事，你可以随便问。` }
  ];
  renderMemoryChat();
  showScreen('memory-chat');
  document.querySelectorAll('#bottomNav button').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === 'memory-chat');
  });
}

// ============ ONBOARDING ============
function showOnboarding() {
  document.getElementById('completionOverlay').classList.remove('show');
  document.getElementById('bottomNav').classList.remove('show');
  showScreen('onboarding');
}

const nameInput = document.getElementById('personName');
const userNameInput = document.getElementById('userName');
const startBtn = document.getElementById('startRecordBtn');

nameInput.addEventListener('input', () => {
  startBtn.disabled = !nameInput.value.trim();
});
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !startBtn.disabled) startRecording(); });
userNameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !startBtn.disabled) startRecording(); });

// ============ QUESTIONS ============

// ============ START RECORDING ============
function startRecording() {
  personName = nameInput.value.trim() || '爷爷';
  userName = userNameInput.value.trim() || '你';
  currentStep = 1;
  collectedMemories = [];

  // Update names in UI
  document.getElementById('recordPersonName').textContent = personName;
  document.getElementById('compPersonName').textContent = personName;
  document.getElementById('tlPersonName').textContent = personName;
  document.getElementById('chatPersonName').textContent = personName;

  showTabNav();
  document.getElementById('recordChat').innerHTML = '';
  document.getElementById('recordInput').value = '';
  document.getElementById('recordInput').disabled = false;
  document.getElementById('recordSendBtn').disabled = true;

  setTimeout(() => askQuestion(currentStep), 600);
}

// ============ ASK QUESTION ============
function askQuestion(step) {
  if (step > totalSteps) {
    completeRecording();
    return;
  }
  isTyping = true;
  document.getElementById('recordInput').disabled = true;
  document.getElementById('recordSendBtn').disabled = true;

  const q = questions[step - 1];
  const chat = document.getElementById('recordChat');

  // AI message with typing animation
  const aiDiv = document.createElement('div');
  aiDiv.className = 'message ai';
  aiDiv.innerHTML = `<div class="avatar">👤</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(aiDiv);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    aiDiv.querySelector('.bubble').innerHTML = q.ai;
    isTyping = false;
    document.getElementById('recordInput').disabled = false;
    document.getElementById('recordSendBtn').disabled = false;
    document.getElementById('recordInput').focus();
    chat.scrollTop = chat.scrollHeight;
  }, 1500 + Math.random() * 600);
}

// ============ SEND RECORD MESSAGE ============
function sendRecordMsg() {
  if (isTyping) return;
  const input = document.getElementById('recordInput');
  const text = input.value.trim();
  if (!text) return;

  // Store memory
  const q = questions[currentStep - 1];
  collectedMemories.push({
    era: q.era,
    eraLabel: q.eraLabel,
    question: q.ai,
    answer: text
  });

  // User message
  const chat = document.getElementById('recordChat');
  const userDiv = document.createElement('div');
  userDiv.className = 'message user';
  userDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(userDiv);
  chat.scrollTop = chat.scrollHeight;

  input.value = '';
  document.getElementById('recordInput').disabled = true;
  document.getElementById('recordSendBtn').disabled = true;

  // Update progress
  currentStep++;

  // Brief AI acknowledgment
  const acknowledgments = [
    '嗯，我在认真听……',
    '说得真好，还有呢？',
    '我知道了，这些都很珍贵。',
    '嗯嗯，继续说说……',
    '真好，我记下来了。',
    '谢谢你愿意分享这些。'
  ];

  const ackDiv = document.createElement('div');
  ackDiv.className = 'message ai';
  ackDiv.innerHTML = `<div class="avatar">👤</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(ackDiv);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    ackDiv.querySelector('.bubble').textContent = acknowledgments[(currentStep - 2) % acknowledgments.length];
    chat.scrollTop = chat.scrollHeight;

    const completion = Math.round(((currentStep - 1) / totalSteps) * 100);
    document.getElementById('progressFill').style.width = completion + '%';
    document.getElementById('progressLabel').textContent = `记忆完成度 ${completion}%`;
    document.getElementById('stepCount').textContent = currentStep;

    setTimeout(() => {
      askQuestion(currentStep);
    }, 800);
  }, 800);
}

// ============ COMPLETE ============
function completeRecording() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = '记忆完成度 100%';
  document.getElementById('stepCount').textContent = totalSteps;

  const demoData = [

  demoData.forEach(d => {
    if (!collectedMemories.some(m => m.era === d.era)) {
      collectedMemories.push(d);
    }
  });

  setTimeout(() => {
    document.getElementById('completionOverlay').classList.add('show');
  }, 1000);

function renderTimeline(filter) {
  const container = document.getElementById('tlContainer');
  container.innerHTML = '';
  const eras = filter === 'all' ? ['childhood','youth','middle','elder'] : [filter];

  eras.forEach(era => {
    const data = timelineStories[era];
    if (!data) return;
    data.stories.forEach((story, idx) => {
      const div = document.createElement('div');
      div.className = 'timeline-item';
      div.innerHTML = `
        <div class="timeline-dot"></div>
        <div class="timeline-content">
          <div class="era">${data.icon} ${data.title}</div>
          <div class="story">${escapeHtml(story)}</div>
          <span class="tag">${era === 'childhood' ? '童年' : era === 'youth' ? '青年' : era === 'middle' ? '中年' : '晚年'}</span>
        </div>
      `;
      container.appendChild(div);
    });
  });
}

function filterTimeline(era, btn) {
  document.querySelectorAll('#tlNav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTimeline(era);
}

// ============ MEMORY CHAT ============

let chatContext = [
  { role: 'ai', text: `你好呀，我是 ${personName} 的记忆分身。关于我的人生故事，你可以随便问。` }
];

function renderMemoryChat() {
  const area = document.getElementById('memoryChatArea');
  area.innerHTML = '';
  chatContext.forEach(msg => {
    const div = document.createElement('div');
    div.className = `message ${msg.role}`;
    if (msg.role === 'ai') {
      div.innerHTML = `<div class="avatar">👤</div><div class="bubble">${escapeHtml(msg.text)}</div>`;
    } else {
      div.innerHTML = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
    }
    area.appendChild(div);
  });
  area.scrollTop = area.scrollHeight;
}

function askMemory(text) {
  document.getElementById('memoryInput').value = text;
  sendMemoryMsg();
}

function sendMemoryMsg() {
  const input = document.getElementById('memoryInput');
  const text = input.value.trim();
  if (!text) return;

  chatContext.push({ role: 'user', text });
  renderMemoryChat();

  input.value = '';
  document.getElementById('memoryInput').disabled = true;
  document.getElementById('memorySendBtn').disabled = true;

  // Add typing indicator
  const area = document.getElementById('memoryChatArea');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message ai';
  typingDiv.innerHTML = `<div class="avatar">👤</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  typingDiv.id = 'typingInd';
  area.appendChild(typingDiv);
  area.scrollTop = area.scrollHeight;

  setTimeout(() => {
    const typing = document.getElementById('typingInd');
    if (typing) typing.remove();

    // Find response
    let response = null;
    for (const [keywords, reply] of Object.entries(memoryResponses)) {
      const patterns = keywords.split('|');
      if (patterns.some(p => text.includes(p))) {
        response = reply;
        break;
      }
    }

    if (!response) {
      response = `嗯……让我想想。我这一辈子平平淡淡的，说起${text}这件事啊(停顿)，其实也没什么特别的。不过我记得有一回……(笑)算了，年纪大了，有些事得慢慢想。你下次再来问我，说不定我就想起来了。`;
    }

    chatContext.push({ role: 'ai', text: response });
    renderMemoryChat();
    document.getElementById('memoryInput').disabled = false;
    document.getElementById('memorySendBtn').disabled = false;
    document.getElementById('memoryInput').focus();
  }, 1200 + Math.random() * 800);
}

// ============ UTILS ============
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Keyboard shortcut on splash
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const splash = document.getElementById('splash');
    if (splash.classList.contains('active')) {
      showOnboarding();
    }
  }
});
