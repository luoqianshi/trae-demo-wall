<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HatScope · 数学绘图</title>
    <link rel="icon" href="hatter.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --surface: #111120;
            --surface-hover: #181830;
            --surface-glass: rgba(17, 17, 32, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.10);
            --text: #e0e0f0;
            --text-secondary: #8888a0;
            --text-tertiary: #555570;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dim: rgba(99, 102, 241, 0.15);
            --accent: #8b5cf6;
            --danger: #ef4444;
            --danger-dim: rgba(239, 68, 68, 0.12);
            --success: #10b981;
            --canvas-bg: #0c0c18;
            --grid-line: rgba(255, 255, 255, 0.03);
            --axis-line: rgba(255, 255, 255, 0.10);
            --radius: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --sidebar-w: 340px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f0f0f5;
            --surface: #ffffff;
            --surface-hover: #f5f5fa;
            --surface-glass: rgba(255, 255, 255, 0.90);
            --border: rgba(0, 0, 0, 0.06);
            --border-strong: rgba(0, 0, 0, 0.10);
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --primary-dim: rgba(99, 102, 241, 0.08);
            --danger-dim: rgba(239, 68, 68, 0.08);
            --canvas-bg: #ffffff;
            --grid-line: #f0f0f5;
            --axis-line: #d1d1d6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: rgba(99, 102, 241, 0.25); color: var(--text); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 100px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
        [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ========= Layout ========= */
        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* ========= Canvas Area ========= */
        .canvas-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            overflow: hidden;
        }

        .canvas-area::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        #cartesianCanvas {
            display: block;
            background-color: var(--canvas-bg);
            border-radius: var(--radius-lg);
            cursor: crosshair;
            max-width: calc(100% - 32px);
            max-height: calc(100% - 32px);
            aspect-ratio: 1/1;
            box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,0.3);
            transition: box-shadow var(--transition);
        }

        [data-theme="light"] #cartesianCanvas {
            box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,0.08);
        }

        /* Canvas Floating Controls */
        .canvas-controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 6px;
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            z-index: 10;
        }

        .canvas-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: var(--radius);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            font-size: 0;
        }

        .canvas-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .canvas-btn:active { transform: scale(0.92); }

        .canvas-btn svg { width: 18px; height: 18px; }

        .canvas-btn.danger:hover {
            background: var(--danger-dim);
            color: var(--danger);
        }

        .canvas-btn.save-btn:hover {
            background: rgba(16, 185, 129, 0.12);
            color: var(--success);
        }

        .canvas-btn.active-toggle {
            background: var(--primary-dim);
            color: var(--primary-light);
        }

        .canvas-btn-divider {
            width: 24px;
            height: 1px;
            background: var(--border-strong);
            margin: 2px auto;
        }

        /* Canvas Coordinate Overlay */
        .canvas-coords {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 6px;
            z-index: 10;
            opacity: 0;
            transition: opacity var(--transition);
            pointer-events: none;
        }

        .canvas-area:hover .canvas-coords { opacity: 1; }

        .coord-chip {
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: 'Fira Code', monospace;
        }

        #toolIndicator {
            background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(139,92,246,0.25));
            border-color: rgba(99,102,241,0.3);
            color: #a5b4fc;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        /* Canvas Empty Hint */
        .canvas-empty-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.5s;
        }

        .canvas-empty-hint.hidden { opacity: 0; }

        .empty-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .empty-icon svg { width: 28px; height: 28px; color: white; }

        .empty-text {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .empty-sub {
            font-size: 0.72rem;
            color: var(--text-tertiary);
            opacity: 0.6;
        }

        /* ========= Sidebar ========= */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        .sidebar-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
        }

        .sidebar-logo svg { width: 18px; height: 18px; }

        .sidebar-title {
            font-weight: 700;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .sidebar-header-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            font-size: 0;
            text-decoration: none;
        }

        .icon-btn:hover { background: var(--surface-hover); color: var(--text); }
        .icon-btn:active { transform: scale(0.92); }
        .icon-btn svg { width: 16px; height: 16px; }

        /* Sidebar Body (scrollable) */
        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        /* Preset Gallery */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .preset-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 6px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            transition: all var(--transition);
        }

        .preset-card:hover {
            border-color: var(--border-strong);
            background: var(--surface-hover);
            transform: translateY(-1px);
        }

        .preset-card:active { transform: scale(0.96); }

        .preset-card canvas {
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 6px;
            pointer-events: none;
        }

        .preset-label {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: 'Fira Code', monospace;
        }

        /* Model Selector */
        .model-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .segmented {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 2px;
            gap: 2px;
            flex: 1;
        }

        [data-theme="light"] .segmented { background: rgba(0, 0, 0, 0.04); }

        .seg-btn {
            flex: 1;
            padding: 6px 0;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            color: var(--text-secondary);
            background: transparent;
        }

        .seg-btn:hover { color: var(--text); }

        .seg-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .think-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            color: var(--text-secondary);
            background: transparent;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .think-btn:hover { border-color: var(--border-strong); color: var(--text); }
        .think-btn:active { transform: scale(0.96); }
        .think-btn svg { width: 14px; height: 14px; }

        .think-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.3);
            animation: thinkPulse 2.5s ease-in-out infinite;
        }

        @keyframes thinkPulse {
            0%, 100% { box-shadow: 0 2px 10px rgba(139, 92, 246, 0.3); }
            50% { box-shadow: 0 2px 20px rgba(139, 92, 246, 0.5); }
        }

        /* Preset Editor */
        .preset-editor {
            background: rgba(99, 102, 241, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: editorIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 300px;
            overflow-y: auto;
        }

        .preset-editor.visible { display: flex; }

        @keyframes editorIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 1;
            padding-bottom: 6px;
        }

        .editor-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text);
        }

        .editor-close {
            width: 22px;
            height: 22px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all var(--transition);
        }

        .editor-close:hover { background: var(--surface-hover); color: var(--text); }

        .editor-fields {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .editor-row {
            display: flex;
            gap: 6px;
        }

        .editor-row > * { flex: 1; }

        .editor-field {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .editor-field.full { flex: 1; }

        .editor-hint {
            font-size: 0.62rem;
            color: var(--text-tertiary);
            line-height: 1.5;
            padding: 6px 8px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 6px;
            border-left: 2px solid var(--primary-dim);
        }

        .editor-field input {
            padding: 7px 10px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-size: 0.78rem;
            background: var(--bg);
            outline: none;
            transition: all var(--transition);
            font-family: 'Fira Code', monospace;
            color: var(--text);
            width: 100%;
            min-width: 0;
        }

        .editor-field input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
        }

        .editor-field input[type="color"] {
            height: 34px;
            padding: 4px 6px;
            cursor: pointer;
        }

        .editor-field select {
            padding: 7px 10px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-size: 0.78rem;
            background: var(--bg);
            outline: none;
            font-family: inherit;
            color: var(--text);
            cursor: pointer;
        }

        .editor-actions {
            display: flex;
            gap: 6px;
            position: sticky;
            bottom: 0;
            background: var(--surface);
            padding-top: 6px;
        }

        .editor-btn {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 0.76rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
        }

        .editor-btn.primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .editor-btn.primary:hover { box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4); transform: translateY(-1px); }
        .editor-btn.primary:active { transform: scale(0.97); }

        .editor-btn.cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .editor-btn.cancel:hover { border-color: var(--border-strong); color: var(--text); }

        /* Preset Card */
        .preset-card canvas { display: block; }
        .preset-label { display: block; }

        /* Function List */
        .func-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 28px;
        }

        .func-empty {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .func-badge {
            background: var(--primary-dim);
            border: 1px solid var(--border);
            padding: 4px 8px 4px 6px;
            border-radius: 8px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
            cursor: default;
            transition: all var(--transition);
        }

        .func-badge:hover {
            border-color: var(--border-strong);
        }

        .color-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .func-badge .del-btn {
            background: none;
            border: none;
            padding: 0 1px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-tertiary);
            line-height: 1;
            transition: all var(--transition);
            border-radius: 4px;
        }

        .func-badge .del-btn:hover {
            color: var(--danger);
            background: var(--danger-dim);
        }

        /* Thinking Box */
        .thinking-box {
            background: rgba(139, 92, 246, 0.06);
            border: 1px solid rgba(139, 92, 246, 0.12);
            border-radius: var(--radius);
            padding: 10px 12px;
            font-size: 0.72rem;
            color: var(--text-secondary);
            max-height: 0;
            overflow: hidden;
            white-space: pre-wrap;
            font-family: 'Fira Code', monospace;
            line-height: 1.6;
            transition: all 0.3s;
            opacity: 0;
        }

        .thinking-box.visible {
            max-height: 160px;
            overflow-y: auto;
            opacity: 1;
        }

        .thinking-box .reasoning-section {
            color: #8b5cf6;
            border-left: 2px solid #8b5cf6;
            padding-left: 10px;
            margin-bottom: 8px;
            font-style: italic;
        }

        .thinking-box .content-section { color: var(--text); }

        .thinking-box .section-label {
            font-weight: 600;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
            font-style: normal;
            color: var(--text-tertiary);
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.82rem;
            background: var(--bg);
            outline: none;
            transition: all var(--transition);
            font-family: inherit;
            color: var(--text);
        }

        .input-row input::placeholder { color: var(--text-tertiary); }

        .input-row input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        .send-btn {
            padding: 0 18px;
            border: none;
            border-radius: var(--radius);
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .send-btn:hover {
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        .send-btn:active { transform: scale(0.97); }
        .send-btn svg { width: 15px; height: 15px; }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        .status-dot.thinking {
            background: var(--primary);
            animation: statusPulse 1.2s ease-in-out infinite;
        }

        .status-dot.error { background: var(--danger); }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .status-text {
            font-size: 0.72rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* ========= Toast ========= */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 10px 18px;
            font-size: 0.8rem;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
            backdrop-filter: blur(20px);
            pointer-events: auto;
        }

        .toast.leaving { animation: toastOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) both; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-12px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-12px) scale(0.95); }
        }

        .toast-icon { width: 16px; height: 16px; flex-shrink: 0; }
        .toast-icon.success { color: var(--success); }
        .toast-icon.error { color: var(--danger); }
        .toast-icon.info { color: var(--primary); }

        /* ========= Save Flash ========= */
        .canvas-btn.save-flash {
            background: rgba(16, 185, 129, 0.2) !important;
            color: var(--success) !important;
        }

        /* ========= 小屏设备提示 ========= */
        .mobile-block-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--bg);
            justify-content: center;
            align-items: center;
        }
        .mobile-block-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 40px 32px;
            max-width: 320px;
            text-align: center;
        }
        .mobile-block-icon {
            color: var(--text-tertiary);
            opacity: 0.6;
        }
        .mobile-block-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text);
        }
        .mobile-block-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .mobile-block-btn {
            margin-top: 8px;
            padding: 10px 28px;
            border-radius: var(--radius);
            background: var(--primary);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: background var(--transition);
        }
        .mobile-block-btn:hover {
            background: var(--primary-light);
        }

        @media (max-width: 768px) {
            .mobile-block-overlay { display: flex; }
            .app { display: none !important; }
        }

        /* ========= Responsive ========= */
        @media (max-width: 900px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                min-width: 100%;
                height: auto;
                max-height: 45vh;
                border-left: none;
                border-top: 1px solid var(--border);
            }
            .canvas-area {
                height: 55vh;
                flex: none;
            }
            #cartesianCanvas {
                max-width: calc(100% - 16px);
                max-height: calc(100% - 16px);
            }
            .canvas-controls {
                right: 10px;
                padding: 4px;
            }
            .canvas-btn { width: 30px; height: 30px; }
            .canvas-btn svg { width: 14px; height: 14px; }
        }

        @media (max-width: 600px) {
            .preset-card canvas { display: none; }
            .preset-card { padding: 5px 8px; border-radius: 8px; }
            .preset-grid { grid-template-columns: repeat(3, 1fr); gap: 5px; }
        }

        @media (max-width: 480px) {
            .sidebar-body { padding: 10px 12px; gap: 12px; }
            .sidebar-footer { padding: 10px 12px; }
            .preset-card { padding: 6px 5px; }
            .preset-label { font-size: 0.68rem; }
            .canvas-controls {
                right: 6px;
                padding: 3px;
                gap: 2px;
            }
            .canvas-btn { width: 28px; height: 28px; }
            .canvas-btn svg { width: 13px; height: 13px; }
            .canvas-btn-divider { display: none; }
        }

        /* ========= Top Toolbar ========= */
        .top-toolbar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 5px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            overflow-x: auto;
            min-height: 40px;
        }

        .tt-group {
            display: flex;
            gap: 1px;
            padding: 0 3px;
            border-right: 1px solid var(--border);
            margin-right: 3px;
        }

        .tt-group:last-child { border-right: none; }

        .tt-btn {
            width: 32px;
            height: 30px;
            border: none;
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-family: inherit;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tt-btn:hover { background: var(--surface-hover); color: var(--text); }
        .tt-btn:active { transform: scale(0.93); }
        .tt-btn.danger:hover { background: var(--danger-dim); color: var(--danger); }
        .tt-btn.active-tool { background: var(--primary); color: white; }
        .tt-btn svg { width: 15px; height: 15px; }

        .tt-label {
            font-size: 0.58rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 2px;
            white-space: nowrap;
            font-weight: 600;
        }

        /* ========= Layout Rebuild ========= */
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .app { flex-direction: column; }

        /* ========= Expression Bar (bottom of canvas) ========= */
        .expr-bar {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 5px 8px;
            z-index: 15;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        [data-theme="light"] .expr-bar { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        .expr-bar input {
            width: 320px;
            padding: 8px 10px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 0.82rem;
            font-family: 'Fira Code', monospace;
            outline: none;
        }

        .expr-bar input::placeholder { color: var(--text-tertiary); font-size: 0.76rem; font-family: Outfit, sans-serif; }

        .expr-send-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 7px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }

        .expr-send-btn:hover { background: var(--primary-light); }
        .expr-send-btn:active { transform: scale(0.93); }

        .expr-bar .kb-toggle {
            width: 28px;
            height: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 0.65rem;
        }

        .math-keyboard {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            max-width: 420px;
        }

        /* ========= Clean Sidebar ========= */
        .sidebar { width: 240px; min-width: 240px; }
        :root { --sidebar-w: 240px; }

        .sidebar-header { padding: 10px 12px; }
        .sidebar-title { font-size: 0.95rem; }
        .sidebar-logo { width: 28px; height: 28px; border-radius: 8px; }
        .sidebar-logo svg { width: 15px; height: 15px; }
        .sidebar-body { padding: 10px 12px; gap: 12px; }

        .sidebar-footer {
            padding: 8px 12px;
        }

        .sidebar-footer .input-row input { padding: 8px 10px; font-size: 0.76rem; }
        .sidebar-footer .send-btn { padding: 0 12px; font-size: 0.74rem; }
        .sidebar-footer .send-btn svg { width: 13px; height: 13px; }

        .model-mini {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .model-mini .segmented { flex: 0 1 auto; }
        .model-mini .seg-btn { padding: 3px 8px; font-size: 0.62rem; }
        .model-mini .think-btn { padding: 3px 8px; font-size: 0.6rem; }
        .model-mini .think-btn svg { width: 11px; height: 11px; }

        @media (max-width: 900px) {
            .app { flex-direction: column; }
            .main-area { flex-direction: column; }
            .sidebar { width: 100%; min-width: 100%; height: auto; max-height: 40vh; border-left: none; border-top: 1px solid var(--border); }
            .canvas-area { height: 60vh; flex: none; }
            .expr-bar input { width: 200px; }
            .top-toolbar { overflow-x: auto; }
        }

        @media (max-width: 600px) {
            .expr-bar input { width: 150px; font-size: 0.74rem; }
            .tt-btn { width: 28px; height: 26px; font-size: 0.65rem; }
            .tt-btn svg { width: 12px; height: 12px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ========= Slider Panel ========= */
        .slider-card {
            background: rgba(99, 102, 241, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all var(--transition);
        }

        .slider-card:hover {
            border-color: var(--border-strong);
        }

        .slider-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider-name {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text);
            font-family: 'Fira Code', monospace;
            background: var(--primary-dim);
            padding: 2px 8px;
            border-radius: 5px;
            min-width: 28px;
            text-align: center;
        }

        .slider-value-display {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: 'Fira Code', monospace;
            flex: 1;
            text-align: right;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .slider-minmax {
            font-size: 0.6rem;
            color: var(--text-tertiary);
            font-family: 'Fira Code', monospace;
            min-width: 24px;
            text-align: center;
        }

        .slider-track {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            border-radius: 100px;
            background: var(--border);
            outline: none;
            cursor: pointer;
            transition: background var(--transition);
        }

        .slider-track::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: 2px solid rgba(255,255,255,0.2);
            cursor: grab;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
            transition: all var(--transition);
        }

        .slider-track::-webkit-slider-thumb:active {
            cursor: grabbing;
            transform: scale(1.1);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.5);
        }

        [data-theme="light"] .slider-track::-webkit-slider-thumb {
            border-color: rgba(0,0,0,0.1);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .slider-track::-moz-range-thumb {
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: 2px solid rgba(255,255,255,0.2);
            cursor: grab;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
        }

        .slider-card-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .slider-play-btn {
            width: 24px;
            height: 24px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            font-size: 0.6rem;
            flex-shrink: 0;
        }

        .slider-play-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary-light);
            background: var(--primary-dim);
        }

        .slider-play-btn.playing {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .slider-play-btn.playing:hover {
            background: var(--primary-light);
        }

        .slider-play-btn svg {
            width: 10px;
            height: 10px;
        }

        .slider-speed-btn {
            width: 24px;
            height: 24px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: 600;
            transition: all var(--transition);
            font-family: 'Fira Code', monospace;
            flex-shrink: 0;
        }

        .slider-speed-btn:hover {
            border-color: var(--border-strong);
            color: var(--text);
        }

        .slider-delete-btn {
            width: 24px;
            height: 24px;
            border: 1px solid transparent;
            border-radius: 6px;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .slider-delete-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-dim);
        }

        .slider-add-btn {
            width: 100%;
            padding: 6px 0;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            font-family: inherit;
            transition: all var(--transition);
        }

        .slider-add-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary-light);
            background: var(--primary-dim);
        }

        .slider-add-popup {
            display: none;
            flex-direction: column;
            gap: 6px;
            padding: 8px;
            background: rgba(99, 102, 241, 0.04);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .slider-add-popup.visible {
            display: flex;
            animation: editorIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slider-add-row {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .slider-add-row label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            min-width: 28px;
            font-weight: 500;
        }

        .slider-add-row input {
            flex: 1;
            padding: 5px 8px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.72rem;
            background: var(--bg);
            outline: none;
            font-family: 'Fira Code', monospace;
            color: var(--text);
            min-width: 0;
        }

        .slider-add-row input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.08);
        }

        .slider-confirm-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition);
        }

        .slider-confirm-btn:hover {
            background: var(--primary-light);
        }

        .slider-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ========= Compact Toolbar ========= */
        .toolbar-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
        }

        .tool-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px 2px;
            border: 1px solid var(--border);
            border-radius: 7px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.68rem;
            font-weight: 500;
            font-family: 'Fira Code', monospace;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .tool-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary-light);
            background: var(--primary-dim);
        }

        .tool-btn:active { transform: scale(0.95); }
        .tool-btn.dynamic { border-color: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .tool-btn.dynamic:hover { border-color: #ef4444; background: rgba(239, 68, 68, 0.08); }
        .tool-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* ========= Named Point Badges ========= */
        .point-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 22px;
        }

        .point-badge {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 3px 7px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
            color: var(--success);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .point-badge:hover {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--success);
        }

        .point-badge.dynamic {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .point-badge.highlighted {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-dim);
        }

        /* ========= Math Keyboard ========= */
        .math-keyboard {
            display: none;
            flex-direction: column;
            gap: 3px;
            padding: 6px;
            background: rgba(99, 102, 241, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            animation: editorIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .math-keyboard.visible { display: flex; }

        .mkb-row {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
        }

        .mkb-key {
            padding: 4px 7px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.68rem;
            font-weight: 500;
            font-family: 'Fira Code', monospace;
            transition: all var(--transition);
            min-width: 26px;
            text-align: center;
        }

        .mkb-key:hover {
            border-color: var(--primary-light);
            color: var(--primary-light);
            background: var(--primary-dim);
        }

        .mkb-key:active { transform: scale(0.93); }
        .mkb-key.fn { color: #10b981; border-color: rgba(16, 185, 129, 0.2); }
        .mkb-key.fn:hover { border-color: #10b981; background: rgba(16, 185, 129, 0.08); }
        .mkb-key.op { color: #f59e0b; border-color: rgba(245, 158, 11, 0.2); }
        .mkb-key.op:hover { border-color: #f59e0b; background: rgba(245, 158, 11, 0.08); }
        .mkb-key.greek { color: #ec4899; border-color: rgba(236, 72, 153, 0.2); }
        .mkb-key.greek:hover { border-color: #ec4899; background: rgba(236, 72, 153, 0.08); }

        .kb-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 8px;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 0.6rem;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
            transition: all var(--transition);
        }

        .kb-toggle:hover { border-color: var(--primary-light); color: var(--primary-light); }
        .kb-toggle.active { background: var(--primary-dim); color: var(--primary-light); border-color: var(--primary-dim); }
        .func-item { border: 1px solid transparent; }
        .func-item:hover { background: var(--surface-hover); border-color: var(--border); }
        .func-item.selected { background: var(--primary-dim); border-color: var(--primary); }

        /* ========= Graphic Editor Panel ========= */
        .graphic-editor {
            background: rgba(99, 102, 241, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 12px;
            margin-top: 6px;
            display: none;
            flex-direction: column;
            gap: 8px;
            animation: editorIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 280px;
            overflow-y: auto;
        }
        .graphic-editor.visible { display: flex; }
        .graphic-editor .ge-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .graphic-editor .ge-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text);
        }
        .graphic-editor .ge-close {
            width: 20px; height: 20px;
            border: none; border-radius: 5px;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            transition: all var(--transition);
        }
        .graphic-editor .ge-close:hover { background: var(--surface-hover); color: var(--text); }
        .graphic-editor .ge-binding {
            font-size: 0.65rem;
            color: var(--primary-light);
            background: var(--primary-dim);
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: 500;
        }
        .graphic-editor .ge-fields {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .graphic-editor .ge-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .graphic-editor .ge-field {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }
        .graphic-editor .ge-field label {
            font-size: 0.6rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }
        .graphic-editor .ge-field input,
        .graphic-editor .ge-field select {
            padding: 5px 8px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.72rem;
            background: var(--bg);
            outline: none;
            font-family: 'Fira Code', monospace;
            color: var(--text);
            width: 100%;
            min-width: 0;
            transition: all var(--transition);
        }
        .graphic-editor .ge-field input:focus,
        .graphic-editor .ge-field select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.08);
        }
        .graphic-editor .ge-field input[readonly] {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .graphic-editor .ge-field input[type="color"] {
            height: 28px;
            padding: 2px 4px;
            cursor: pointer;
        }

        /* ========= Integral Input Panel ========= */
        .integral-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            z-index: 25;
            display: none;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
            min-width: 220px;
        }
        .integral-panel.visible { display: flex; animation: editorIn 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .integral-panel-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            text-align: center;
        }
        .integral-panel-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .integral-panel-row label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 20px;
            font-family: 'Fira Code', monospace;
        }
        .integral-panel-row input {
            flex: 1;
            padding: 7px 10px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-size: 0.82rem;
            background: var(--bg);
            outline: none;
            font-family: 'Fira Code', monospace;
            color: var(--text);
        }
        .integral-panel-row input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
        }
        .integral-panel-actions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        .integral-panel-actions button {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
        }
        .integral-panel-actions .ip-confirm {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }
        .integral-panel-actions .ip-confirm:hover { box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4); }
        .integral-panel-actions .ip-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .integral-panel-actions .ip-cancel:hover { border-color: var(--border-strong); color: var(--text); }

        /* ========= Context Menu ========= */
        .context-menu {
            position: fixed;
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
            z-index: 1000;
            min-width: 140px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            animation: editorIn 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .context-item {
            padding: 8px 14px;
            font-size: 0.78rem;
            cursor: pointer;
            border-radius: 6px;
            color: var(--text-secondary);
            transition: all var(--transition);
        }
        .context-item:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .context-item.danger:hover {
            background: var(--danger-dim);
            color: var(--danger);
        }
    </style>
</head>

            const LOGICAL_W = 800, LOGICAL_H = 800;
            // Pre-computed transform coefficients for worldToPixel/pixelToWorld
            let _sx = LOGICAL_W / 12, _sy = LOGICAL_H / 12, _ox = LOGICAL_W / 2, _oy = LOGICAL_H / 2;
            function updateTransformCoeffs() {
                _sx = LOGICAL_W / (xMax - xMin); _sy = LOGICAL_H / (yMax - yMin);
                _ox = -xMin * _sx; _oy = yMax * _sy;
            }
            let canvas, ctx;
            let canvasDpr = 1;

            function resizeCanvas() {
                if (!canvas || !ctx) return;
                canvasDpr = window.devicePixelRatio || 1;
                canvas.width = LOGICAL_W * canvasDpr;
                canvas.height = LOGICAL_H * canvasDpr;
                ctx.setTransform(canvasDpr, 0, 0, canvasDpr, 0, 0);

                    gridCanvas = document.createElement('canvas');
                    gridCtx = gridCanvas.getContext('2d');
                    gfxCanvas = document.createElement('canvas');
                    gfxCtx = gfxCanvas.getContext('2d');

                gridCanvas.width = LOGICAL_W * canvasDpr;
                gridCanvas.height = LOGICAL_H * canvasDpr;
                gridCtx.setTransform(canvasDpr, 0, 0, canvasDpr, 0, 0);
                gfxCanvas.width = LOGICAL_W * canvasDpr;
                gfxCanvas.height = LOGICAL_H * canvasDpr;
                gfxCtx.setTransform(canvasDpr, 0, 0, canvasDpr, 0, 0);
                gridDirty = true;
                gfxDirty = true;
                redraw();
            }
            let graphics = [];

            let currentHoverGraphic = null;
            let dragTarget = null; // { graphic, part, startX, startY, startParams }

            let gfxDirty = true;

            // ========= Tool Definitions =========

                { id: 'd_smart', label: '动点', type: 'smart_dynamic', row: 4, dynamic: true },
            ];

            // Dynamic preset definitions
            const DYNAMIC_DEFS = {
                pt_segment: {
                    label: '线段上动点', slider: { name: 't', min: 0, max: 1, step: 0.005, value: 0 },
                    graphics: [
                        { type: 'segment', points: [[-3, -1.5], [3, 2]], color: '#6366f1', lineWidth: 2.5 },
