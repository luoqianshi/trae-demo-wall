                        { type: 'paramPoint', xExpr: '-3 + 6*t', yExpr: '-1.5 + 3.5*t', color: '#ef4444', size: 10, label: 'P', trail: true },
                    ]
                },
                pt_parabola: {
                    label: '抛物线上动点', slider: { name: 't', min: -2, max: 2, step: 0.01, value: -2 },
                    graphics: [
                        { type: 'quadratic', params: { a: 1, b: 0, c: 0 }, color: '#6366f1', lineWidth: 2 },
                        { type: 'paramPoint', xExpr: 't', yExpr: 't*t', color: '#ef4444', size: 10, label: 'P', trail: true },
                    ]
                },
                pt_circle: {
                    label: '圆上动点', slider: { name: 't', min: 0, max: 6.2832, step: 0.01, value: 0 },
                    graphics: [
                        { type: 'circle', params: { cx: 0, cy: 0, r: 3 }, color: '#6366f1', lineWidth: 2 },
                        { type: 'paramPoint', xExpr: '3*cos(t)', yExpr: '3*sin(t)', color: '#ef4444', size: 10, label: 'P', trail: true },
                        { type: 'namedPoint', x: 0, y: 0, label: 'O', color: '#f59e0b' },
                    ]
                },
                pt_triangle_area: {
                    label: '三角形面积', slider: { name: 't', min: 0, max: 1, step: 0.005, value: 0.5 },
                    graphics: [
                        { type: 'polygon', points: [[-3, -1.5], [3, -1.5], [0, 3.5]], color: '#6366f1', lineWidth: 2, fill: false },
                        { type: 'namedPoint', x: 0, y: 3.5, label: 'A', color: '#6366f1' },
                        { type: 'namedPoint', x: -3, y: -1.5, label: 'B', color: '#6366f1' },
                        { type: 'namedPoint', x: 3, y: -1.5, label: 'C', color: '#6366f1' },
                        { type: 'paramPoint', xExpr: '0', yExpr: '-1.5 + 5*t', color: '#ef4444', size: 10, label: 'P', trail: true },
                        { type: 'segment', points: [[0, 3.5], [0, -1.5]], color: '#f59e0b', lineWidth: 1.5, strokeDash: [4, 4] },
                    ]
                },
                pt_slope: {
                    label: '一次函数动点', slider: { name: 't', min: -3, max: 3, step: 0.01, value: 1 },
                    graphics: [
                        { type: 'line', params: { k: 1, b: 0 }, color: '#8b5cf6', lineWidth: 1.5, strokeDash: [4, 4] },
                        { type: 'paramPoint', xExpr: 't', yExpr: 't', color: '#ef4444', size: 10, label: 'P', trail: true },
                        { type: 'namedPoint', x: 0, y: 0, label: 'O', color: '#f59e0b' },
                    ]
                },
                pt_ellipse: {
                    label: '椭圆上动点', slider: { name: 't', min: 0, max: 6.2832, step: 0.01, value: 0 },
                    graphics: [
                        { type: 'ellipse', cx: 0, cy: 0, rx: 3, ry: 2, color: '#6366f1', lineWidth: 2 },
                        { type: 'paramPoint', xExpr: '3*cos(t)', yExpr: '2*sin(t)', color: '#ef4444', size: 10, label: 'P', trail: true },
                    ]
                },
            };

            let namedPoints = [];
            let sliders = [];
            let focusedSliderIndex = -1;
            let animationRunning = false;
            let showIntersections = false;
            let integralTargetGraphic = null;

            // ========= Undo/Redo =========
            let undoStack = [];
            let redoStack = [];
            const MAX_UNDO = 50;

            function snapshotGraphics() {
                return graphics.map(g => {
                    const spec = {};
                    spec.type = g.type;
                    spec.color = g.color;
                    if (g.params) spec.params = JSON.parse(JSON.stringify(g.params));
                    if (g.expression) spec.expression = g.expression;
                    if (g.points) spec.points = JSON.parse(JSON.stringify(g.points));
                    if (g.x !== undefined) spec.x = g.x;
                    if (g.y !== undefined) spec.y = g.y;
                    if (g.w !== undefined) spec.w = g.w;
                    if (g.h !== undefined) spec.h = g.h;
                    if (g.cx !== undefined) spec.cx = g.cx;
                    if (g.cy !== undefined) spec.cy = g.cy;
                    if (g.rx !== undefined) spec.rx = g.rx;
                    if (g.ry !== undefined) spec.ry = g.ry;
                    if (g.lineWidth !== undefined) spec.lineWidth = g.lineWidth;
                    if (g.strokeDash) spec.strokeDash = g.strokeDash;
                    if (g.fill !== undefined) spec.fill = g.fill;
                    if (g.fillColor) spec.fillColor = g.fillColor;
                    if (g.size !== undefined) spec.size = g.size;
                    if (g.xExpr) spec.xExpr = g.xExpr;
                    if (g.yExpr) spec.yExpr = g.yExpr;
                    if (g.xExpr1) spec.xExpr1 = g.xExpr1;
                    if (g.yExpr1) spec.yExpr1 = g.yExpr1;
                    if (g.xExpr2) spec.xExpr2 = g.xExpr2;
                    if (g.yExpr2) spec.yExpr2 = g.yExpr2;
                    if (g.connType) spec.connType = g.connType;
                    if (g.label) spec.label = g.label;
                    if (g.trail !== undefined) spec.trail = g.trail;
                    if (g.text) spec.text = g.text;
                    if (g.fontSize) spec.fontSize = g.fontSize;
                    if (g.tMin !== undefined) spec.tMin = g.tMin;
                    if (g.tMax !== undefined) spec.tMax = g.tMax;
                    if (g.isVertical) spec.isVertical = true;
                    if (g.graphicId !== undefined) spec.graphicId = g.graphicId;
                    if (g.intA !== undefined) spec.intA = g.intA;
                    if (g.intB !== undefined) spec.intB = g.intB;
                    if (g.expr) spec.expr = g.expr;
                    if (g.operator) spec.operator = g.operator;
                    if (g.pieces) spec.pieces = g.pieces.map(p => ({ condition: p.condition, expr: p.expr }));
                    if (g.startAngle !== undefined) spec.startAngle = g.startAngle;
                    if (g.endAngle !== undefined) spec.endAngle = g.endAngle;
                    if (g.radius !== undefined) spec.radius = g.radius;
                    if (g.hidden) spec.hidden = true;
                    if (g.parentIds) spec.parentIds = g.parentIds.slice();
                    return spec;
                });
            }

            function snapshotFullState() {
                return {
                    graphics: snapshotGraphics(),
                    namedPoints: JSON.parse(JSON.stringify(namedPoints)),
                    sliders: JSON.parse(JSON.stringify(sliders)),
                    xMin, xMax, yMin, yMax
                };
            }

            function pushUndo() {
                undoStack.push(snapshotFullState());
                if (undoStack.length >= MAX_UNDO) undoStack = undoStack.slice(1);
                redoStack = [];
            }

            function undo() {
                if (undoStack.length === 0) return;
                redoStack.push(snapshotFullState());
                const state = undoStack.pop();
                restoreFromSnapshot(state);
                showToast('已撤销', 'info');
            }

            function redo() {
                if (redoStack.length === 0) return;
                undoStack.push(snapshotFullState());
                const state = redoStack.pop();
                restoreFromSnapshot(state);
                showToast('已重做', 'info');
            }

            function restoreFromSnapshot(snap) {
                stopAllAnimations();
                graphics = [];
                _cachedIntersections = null;
                for (let spec of snap.graphics) {
                    const g = createGraphicFromSpec(spec);
                    if (g) {
                        g.alpha = 1;
                        graphics.push(g);
                    }
                }
                namedPoints = snap.namedPoints || [];
                sliders = snap.sliders || [];
                xMin = snap.xMin; xMax = snap.xMax; yMin = snap.yMin; yMax = snap.yMax;
                renderPoints();
                renderSliders();
                gridDirty = true; gfxDirty = true;
                redraw();
                autoSave();
            }

            // ========= Save/Restore State =========
            const STATE_KEY = 'hatscope_state';
            let _autoSaveTimer = null;

            function serializeState() {
                return {
                    graphics: snapshotGraphics(),
                    namedPoints: namedPoints.map(p => ({
                        id: p.id, label: p.label, x: p.x, y: p.y,
                        isDynamic: p.isDynamic || false,
                        exprX: p.exprX, exprY: p.exprY,
                        color: p.color,
                        childIds: p.childIds || []
                    })),
                    sliders: sliders.map(s => ({
                        name: s.name, min: s.min, max: s.max,
                        step: s.step, value: s.value, speed: s.speed
                    })),
                    xMin, xMax, yMin, yMax
                };
            }

            function deserializeState(json) {
                stopAllAnimations();
                graphics = [];
                _cachedIntersections = null;
                namedPoints = [];
                sliders = [];
                if (json.graphics) {
                    for (let spec of json.graphics) {
                        const g = createGraphicFromSpec(spec);
                        if (g) {
                            g.alpha = 1;
                            graphics.push(g);
                        }
                    }
                }
                if (json.namedPoints) {
                    for (let p of json.namedPoints) {
                        namedPoints.push({
                            id: p.id || (Date.now() + Math.random()),
                            label: p.label, x: p.x || 0, y: p.y || 0,
                            isDynamic: p.isDynamic || false,
                            exprX: p.exprX, exprY: p.exprY,
                            color: p.color || '#10b981',
                            childIds: p.childIds || []
                        });
                    }
                }
                if (json.sliders) {
                    for (let s of json.sliders) {
                        sliders.push({
                            name: s.name, min: s.min, max: s.max,
                            step: s.step || 0.1, value: s.value !== undefined ? s.value : s.min,
                            playing: false, speed: s.speed || 1, direction: 1
                        });
                    }
                }
                if (json.xMin !== undefined) xMin = json.xMin;
                if (json.xMax !== undefined) xMax = json.xMax;
                if (json.yMin !== undefined) yMin = json.yMin;
                if (json.yMax !== undefined) yMax = json.yMax;
                renderPoints();
                renderSliders();
                redraw();
            }

            function autoSave() {
                if (_autoSaveTimer) clearTimeout(_autoSaveTimer);
                _autoSaveTimer = setTimeout(() => {
                    try {
                        const data = JSON.stringify(serializeState());
                        localStorage.setItem(STATE_KEY, data);
                    } catch (e) {}
                }, 500);
            }

            function restoreState() {
                try {
                    const data = localStorage.getItem(STATE_KEY);
                    if (data) {
                        const json = JSON.parse(data);
                        deserializeState(json);
                    }
                } catch (e) {}
            }

            function exportJSON() {
                const data = JSON.stringify(serializeState(), null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'hatscope_state.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('状态已导出', 'success');
            }

            function importJSON(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const json = JSON.parse(e.target.result);
                        pushUndo();
                        deserializeState(json);
                        autoSave();
                        showToast('状态已导入', 'success');
                    } catch (err) {
                        showToast('导入失败: JSON格式无效', 'error');
                    }
                };
                reader.readAsText(file);
            }

            // ========= Slider Core =========
            const MATH_CTX = {
                Math: Math,
                sin: Math.sin, cos: Math.cos, tan: Math.tan,
                sqrt: Math.sqrt, cbrt: Math.cbrt, abs: Math.abs,
                exp: Math.exp, ln: Math.log, log: Math.log, log2: Math.log2, log10: Math.log10,
                pow: Math.pow, floor: Math.floor, ceil: Math.ceil, round: Math.round,
                sign: Math.sign, min: Math.min, max: Math.max,
                PI: Math.PI, E: Math.E, hypot: Math.hypot,
                asin: Math.asin, acos: Math.acos, atan: Math.atan, atan2: Math.atan2
            };

            // ========= Input Normalization =========
            function normalizeExpression(expr) {
                let s = expr;
                // Full-width → half-width
                s = s.replace(/[\uff10-\uff19]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
                s = s.replace(/[\uff21-\uff3a]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
                s = s.replace(/[\uff41-\uff5a]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
                s = s.replace(/\uff08/g, '(');
                s = s.replace(/\uff09/g, ')');
                s = s.replace(/\uff0b/g, '+');
                s = s.replace(/\uff0d/g, '-');
                s = s.replace(/\uff0a/g, '*');
                s = s.replace(/\uff0f/g, '/');
                s = s.replace(/\uff0e/g, '.');
                s = s.replace(/\uff1d/g, '=');
                s = s.replace(/\uff0c/g, ',');
                s = s.replace(/\u3001/g, ',');
                // Special math symbols
                s = s.replace(/\u00b2/g, '^2');
                s = s.replace(/\u00b3/g, '^3');
                s = s.replace(/\u03b8/g, 'theta'); // θ → theta
                s = s.replace(/\u00d7/g, '*');
                s = s.replace(/\u00f7/g, '/');
                // ≥ ≤ → >= <=
                s = s.replace(/≥/g, '>=');
                s = s.replace(/≤/g, '<=');
                // ^ → ** for exponentiation (JavaScript uses ** not ^)
                s = s.replace(/\^/g, '**');
                // Remove spaces between numbers and variables
                s = s.replace(/(\d)\s+([a-zA-Z])/g, '$1$2');
                s = s.replace(/([a-zA-Z])\s+(\d)/g, '$1$2');
                // Protect known function names with placeholders before implicit multiplication
                // Order: longer names first to avoid partial matches (e.g. sinh before sin)
                const FUNCS = ['sinh','cosh','tanh','asin','acos','atan2','atan','sin','cos','tan','log10','log2','log','ln','exp','sqrt','cbrt','abs','floor','ceil','round','sign','min','max','pow','hypot'];
                const phMap = [];
                for (let i = 0; i < FUNCS.length; i++) {
                    // Use \uE000+i as placeholder (private use area, unlikely in user input)
                    const ph = '\uE000' + i;
                    s = s.replace(new RegExp(FUNCS[i], 'g'), ph);
                    phMap.push({ ph, name: FUNCS[i] });
                }
                // Implicit multiplication
                // number followed by letter: 2x → 2*x
                s = s.replace(/(\d)([a-zA-Z])/g, '$1*$2');
                // number followed by (: 2( → 2*(
                s = s.replace(/(\d)\(/g, '$1*(');
                // ) followed by (: )( → )*(
                s = s.replace(/\)\(/g, ')*(');
                // ) followed by letter: )x → )*x
                s = s.replace(/\)([a-zA-Z])/g, ')*$1');
                // ) followed by number: )2 → )*2
                s = s.replace(/\)(\d)/g, ')*$1');
                // letter followed by (: x( → x*(
                s = s.replace(/([a-zA-Z])\(/g, '$1*(');
                // Restore function names
                for (let { ph, name } of phMap) {
                    s = s.split(ph).join(name);
                }
                // Post-restore: add implicit * between digit and function name: 2sin( → 2*sin(
                for (let fn of FUNCS) {
                    s = s.replace(new RegExp('(\\d)(' + fn.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'g'), '$1*$2');
                }
                return s;
            }

            function evaluateExpr(expr, context) {
                try {
                    const fn = new Function('$', 'with($){return (' + expr + ');}');
                    const sandbox = Object.create(null);
                    for (let k in MATH_CTX) sandbox[k] = MATH_CTX[k];
                    if (context) for (let k in context) sandbox[k] = context[k];
                    return fn(sandbox);
                } catch (e) {
                    return NaN;
                }
            }

            function hexToRgba(hex, alpha) {
                const h = hex.replace('#', '');
                const r = parseInt(h.substring(0, 2), 16);
                const g = parseInt(h.substring(2, 4), 16);
                const b = parseInt(h.substring(4, 6), 16);
                return `rgba(${r},${g},${b},${alpha})`;
            }

            function ensureSliderVars(spec) {
                const exprs = [];
                if (spec.xExpr) exprs.push(spec.xExpr);
                if (spec.yExpr) exprs.push(spec.yExpr);
                if (spec.xExpr1) exprs.push(spec.xExpr1);
                if (spec.yExpr1) exprs.push(spec.yExpr1);
                if (spec.xExpr2) exprs.push(spec.xExpr2);
                if (spec.yExpr2) exprs.push(spec.yExpr2);
                const keywords = new Set(['sin','cos','tan','ln','log','exp','abs','sqrt','PI','E','Math',
                    'pow','floor','ceil','round','sign','min','max','hypot','asin','acos','atan','atan2','cbrt','log2','log10','x','y']);
                for (let expr of exprs) {
                    // 按运算符/括号/空格分割为独立token
                    const tokens = expr.split(/[+\-*/()^%,<>=!&|:;\s]+/).filter(t => t.length > 0 && !/^\d/.test(t));
                    for (let v of tokens) {
                        if (keywords.has(v)) continue;
                        // 只自动创建看起来像变量的滑块：单小写字母 或 小写字母+数字（如 t, t1, t2, a, b, k）
                        if (/^[a-z]\d*$/.test(v) && !sliders.find(s => s.name === v)) {
                            sliders.push({ name: v, min: 0, max: 10, step: 0.1, value: 0, playing: false, speed: 1, direction: 1 });
                        }
                    }
                }
                renderSliders();
            }

            function getSliderParams() {
                const ctx = {};
                for (let s of sliders) ctx[s.name] = s.value;
                return ctx;
            }

            function addSlider(name, min, max, step, value) {
                if (sliders.find(s => s.name === name)) {
                    showToast('滑动条 "' + name + '" 已存在', 'error');
                    return;
                }
                sliders.push({ name, min, max, step: step || 0.1, value: value !== undefined ? value : min, playing: false, speed: 1 });
                renderSliders();
                redraw();
            }

            function removeSlider(name) {
                const dependent = graphics.filter(g =>
                    (g.xExpr && g.xExpr.includes(name)) ||
                    (g.yExpr && g.yExpr.includes(name)) ||
                    (g.xExpr1 && g.xExpr1.includes(name)) ||
                    (g.yExpr1 && g.yExpr1.includes(name)) ||
                    (g.xExpr2 && g.xExpr2.includes(name)) ||
                    (g.yExpr2 && g.yExpr2.includes(name))
                );
                if (dependent.length > 0) {
                    if (!confirm(`${dependent.length}个图形依赖变量"${name}"，是否一并删除？`)) return;
                    pushUndo();
                    for (let g of dependent) {
                        let idx = graphics.indexOf(g);
                        if (idx !== -1) graphics.splice(idx, 1);
                    }
                }
                sliders = sliders.filter(s => s.name !== name);
                if (sliders.length === 0) stopAllAnimations();
                renderSliders();
                redraw();
            }

            function stopAllAnimations() {
                for (let s of sliders) s.playing = false;
                animationRunning = false;
                renderSliders();
            }

            function renderSliders() {
                const container = document.getElementById('sliderList');
                if (!container) return;
                if (sliders.length === 0) {
                    container.innerHTML = '<span class="func-empty">暂无滑动条，点击下方按钮添加</span>';
                    return;
                }
                let html = '';
                for (let s of sliders) {
                    const pct = ((s.value - s.min) / (s.max - s.min)) * 100;
                    html += `<div class="slider-card">
                        <div class="slider-card-header">
                            <span class="slider-name">${s.name}</span>
                            <span class="slider-value-display">${s.value.toFixed(3)}</span>
                        </div>
                        <div class="slider-row">
                            <span class="slider-minmax">${formatNum(s.min)}</span>
                            <input type="range" class="slider-track" data-slider="${s.name}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.value}">
                            <span class="slider-minmax">${formatNum(s.max)}</span>
                        </div>
                        <div class="slider-card-actions">
                            <button class="slider-play-btn${s.playing ? ' playing' : ''}" data-action="play" data-slider="${s.name}" title="${s.playing ? '暂停' : '播放'}">
                                ${s.playing
                                    ? '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
                                    : '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>'}
                            </button>
                            <button class="slider-speed-btn" data-action="speed" data-slider="${s.name}" title="速度: ${s.speed}x">×${s.speed}</button>
                            <button class="slider-delete-btn" data-action="delete" data-slider="${s.name}" title="删除滑动条">&times;</button>
                        </div>
                    </div>`;
                }
                container.innerHTML = html;

                for (let card of container.querySelectorAll('.slider-card')) {
                    const track = card.querySelector('.slider-track');
                    const cardIdx = Array.from(container.querySelectorAll('.slider-card')).indexOf(card);
                    if (track) {
                        track.addEventListener('input', function() {
                            const sName = this.getAttribute('data-slider');
                            const sObj = sliders.find(s => s.name === sName);
                            if (sObj) {
                                sObj.value = parseFloat(this.value);
                                card.querySelector('.slider-value-display').textContent = sObj.value.toFixed(3);
                            }
                            gfxDirty = true;
                            redraw();
                        });
                        track.addEventListener('focus', function() {
                            focusedSliderIndex = cardIdx;
                        });
                        track.addEventListener('blur', function() {
                            if (focusedSliderIndex === cardIdx) focusedSliderIndex = -1;
                        });
                        track.setAttribute('tabindex', '0');
                    }
                    const btns = card.querySelectorAll('button');
                    for (let btn of btns) {
                        btn.addEventListener('click', function() {
                            const sName = this.getAttribute('data-slider');
                            const action = this.getAttribute('data-action');
                            const sObj = sliders.find(s => s.name === sName);
                            if (!sObj) return;
                            if (action === 'play') {
                                sObj.playing = !sObj.playing;
                                if (!sObj.playing) sObj.direction = 1;
                                if (sliders.some(s => s.playing)) startAnimationLoop();
                                else animationRunning = false;
                            } else if (action === 'speed') {
                                const speeds = [0.5, 1, 2, 4];
                                const idx = speeds.indexOf(sObj.speed);
                                sObj.speed = speeds[(idx + 1) % speeds.length];
                                this.textContent = '×' + sObj.speed;
                            } else if (action === 'delete') {
                                removeSlider(sName);
                            }
                        });
                    }
                }
            }

            function updateSliderValues() {
                const container = document.getElementById('sliderList');
                if (!container) return;
                const cards = container.querySelectorAll('.slider-card');
                for (let i = 0; i < sliders.length && i < cards.length; i++) {
                    const s = sliders[i];
                    const card = cards[i];
                    const track = card.querySelector('.slider-track');
                    const display = card.querySelector('.slider-value-display');
                    if (track) track.value = s.value;
                    if (display) display.textContent = s.value.toFixed(3);
                }
            }

            let lastAnimTime = 0;
            function startAnimationLoop() {
                if (animationRunning) return;
                animationRunning = true;
                lastAnimTime = performance.now();
                function animate(time) {
                    if (!animationRunning) return;
                    const dt = Math.min((time - lastAnimTime) / 1000, 0.1);
                    lastAnimTime = time;
                    let anyPlaying = false;
                    for (let s of sliders) {
                        if (!s.playing) continue;
                        anyPlaying = true;
                        const range = s.max - s.min;
                        const delta = (range / 5) * dt * s.speed;
                        s.value += delta * s.direction;
                        if (s.value >= s.max) {
                            s.value = s.max;
                            s.direction = -1;
                        } else if (s.value <= s.min) {
                            s.value = s.min;
                            s.direction = 1;
                        }
                        s.value = Math.round(s.value / s.step) * s.step;
                        s.value = Math.min(Math.max(s.value, s.min), s.max);
                    }
                    if (anyPlaying) {
                        updateSliderValues();
                        gfxDirty = true;
                        redraw();
                        requestAnimationFrame(animate);
                    } else {
                        animationRunning = false;
                        renderSliders();
                        redraw();
                    }
                }
                requestAnimationFrame(animate);
            }

            function drawParamPoint(g, alpha) {
                const params = getSliderParams();
                let x = evaluateExpr(g.xExpr, params);
                let y = evaluateExpr(g.yExpr, params);
                if (!isFinite(x) || !isFinite(y) || isNaN(x) || isNaN(y)) return;
                const { px, py } = worldToPixel(x, y);
                if (px < -20 || px > LOGICAL_W + 20 || py < -20 || py > LOGICAL_H + 20) return;

                if (g.label) {
                    let np = namedPoints.find(p => p.label === g.label);
                    if (np) { np.x = x; np.y = y; }
                }

                // Trail
                if (g.trail) {
                    g._trail = g._trail || [];
                    const last = g._trail[g._trail.length - 1];
                    const dist = last ? Math.hypot(x - last.x, y - last.y) : Infinity;
                    // Detect wrap-around (slider loop): large jump means start a new segment
                    const wrapJump = dist > (xMax - xMin) * 0.8;
                    if (wrapJump) { g._trail = []; g._segments = null; }
                    if (g._trail.length === 0 || dist > 0.005) {
                        g._trail.push({ x, y });
                    }
                    const maxTrail = 2000;
                    if (g._trail.length > maxTrail) g._trail = g._trail.slice(-Math.round(maxTrail * 0.8));
                    if (g._trail.length > 1) {
                        // Fade: older points dimmer
                        const segLen = 80;
                        const total = g._trail.length;
                        for (let s = 0; s < total; s += segLen) {
                            const end = Math.min(s + segLen + 1, total);
                            const segAlpha = 0.35 + 0.55 * (s / total);
                            ctx.beginPath();
                            ctx.strokeStyle = g.color;
                            ctx.lineWidth = g.lineWidth ? g.lineWidth * 0.6 : 1.5;
                            ctx.globalAlpha = alpha * segAlpha;
                            ctx.lineCap = 'round';
                            ctx.lineJoin = 'round';
                            const first = worldToPixel(g._trail[s].x, g._trail[s].y);
                            ctx.moveTo(first.px, first.py);
                            for (let i = s + 1; i < end; i++) {
                                const a = worldToPixel(g._trail[i - 1].x, g._trail[i - 1].y);
                                const b = worldToPixel(g._trail[i].x, g._trail[i].y);
                                const mx = (a.px + b.px) / 2, my = (a.py + b.py) / 2;
                                if (i === s + 1) ctx.lineTo(mx, my);
                                else ctx.quadraticCurveTo(a.px, a.py, mx, my);
                            }
                            ctx.stroke();
                        }
                        ctx.globalAlpha = 1;
                    }
                }

                ctx.beginPath();
                ctx.globalAlpha = alpha;
                const glowRadius = g.size / 2 + 4;
                const glow = ctx.createRadialGradient(px, py, 0, px, py, glowRadius);
                glow.addColorStop(0, g.color);
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.arc(px, py, glowRadius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = g.color;
                ctx.beginPath();
                ctx.arc(px, py, g.size / 2, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.globalAlpha = 1;

                if (g.label) {
                    ctx.save();
                    const fontSize = 13;
                    ctx.font = `600 ${fontSize}px Outfit, -apple-system, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    const labelText = g.labelExpr ? g.label.replace(/\{val\}/g, params[Object.keys(params)[0]]?.toFixed(2) || '') : g.label;
                    const textWidth = ctx.measureText(labelText).width;
                    const dark = isDark();
                    ctx.fillStyle = dark ? 'rgba(12,12,24,0.85)' : 'rgba(255,255,255,0.85)';
                    const lx = px, ly = py - g.size / 2 - 6;
                    ctx.beginPath();
                    ctx.ellipse(lx, ly - 2, textWidth / 2 + 6, fontSize / 2 + 3, 0, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.fillStyle = g.color;
                    ctx.fillText(labelText, lx, ly);
                    ctx.restore();
                }
            }

            function drawParamCurve(g, alpha) {
                const params = getSliderParams();
                const tMin = g.tMin !== undefined ? g.tMin : 0;
                const tMax = g.tMax !== undefined ? g.tMax : 1;
                const steps = 500;
                ctx.beginPath();
                ctx.strokeStyle = g.color;
                ctx.lineWidth = g.lineWidth || 2;
                ctx.globalAlpha = alpha;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                const context = { ...params, t: undefined };
                let first = true;
                for (let i = 0; i <= steps; i++) {
                    context.t = tMin + (i / steps) * (tMax - tMin);
                    let x = evaluateExpr(g.xExpr, context);
                    let y = evaluateExpr(g.yExpr, context);
                    if (!isFinite(x) || !isFinite(y) || isNaN(x) || isNaN(y)) { first = true; continue; }
                    const { px, py } = worldToPixel(x, y);
                    if (px < -50 || px > LOGICAL_W + 50 || py < -50 || py > LOGICAL_H + 50) { first = true; continue; }
                    if (first) { ctx.moveTo(px, py); first = false; }
                    else ctx.lineTo(px, py);
                }
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            function findNearestFunctionGraphic(wx, wy, thresholdPx = 20) {
                const SUP = ['line', 'quadratic', 'circle', 'ellipse', 'sin', 'cos', 'inverse', 'exp', 'log', 'abs', 'segment', 'ray'];
                let best = null, bestDist = Infinity;
                const sup = [];
                for (let g of graphics) if (SUP.includes(g.type)) sup.push(g);
                for (let g of sup) {
                    if (g.type === 'segment' || g.type === 'ray') {
                        // Distance from point to segment/ray
                        let pts = g.points;
                        if (!pts || pts.length < 2) continue;
                        let [x1, y1] = pts[0], [x2, y2] = pts[1];
                        let dx = x2 - x1, dy = y2 - y1;
                        let lenSq = dx * dx + dy * dy;
                        let t = lenSq > 0 ? ((wx - x1) * dx + (wy - y1) * dy) / lenSq : 0;
                        if (g.type === 'segment') t = Math.max(0, Math.min(1, t));
                        else t = Math.max(0, t); // ray: only clamp start
                        let projX = x1 + t * dx, projY = y1 + t * dy;
                        let d = Math.hypot(wx - projX, wy - projY);
                        let { px, py } = worldToPixel(0, 0);
                        let { px: mx, py: my } = worldToPixel(1, 0);
                        d = d * Math.hypot(px - mx, py - my);
                        if (d < thresholdPx && d < bestDist) { best = g; bestDist = d; }
                    } else if (g.type === 'circle') {
                        let cx = g.params.cx, cy = g.params.cy, r = g.params.r;
                        let d = Math.abs(Math.hypot(wx - cx, wy - cy) - r);
                        let { px, py } = worldToPixel(cx + r, cy);
                        let { px: mx, py: my } = worldToPixel(cx + r + 1, cy);
                        let sx = Math.abs(px - mx);
                        d = d * sx;
                        if (d < thresholdPx && d < bestDist) { best = g; bestDist = d; }
                    } else if (g.type === 'ellipse') {
                        let ang = Math.atan2(wy - g.cy, wx - g.cx);
                        let ex = g.cx + g.rx * Math.cos(ang), ey = g.cy + g.ry * Math.sin(ang);
                        let d = Math.hypot(wx - ex, wy - ey);
                        let { px, py } = worldToPixel(ex, ey);
                        let { px: mx, py: my } = worldToPixel(ex + 1, ey);
                        d = d * Math.hypot(px - mx, py - my);
                        if (d < thresholdPx && d < bestDist) { best = g; bestDist = d; }
                    } else if (g.type === 'line' && !g.isVertical) {
                        let k = g.params.k, b = g.params.b;
                        let d = Math.abs(k * wx - wy + b) / Math.sqrt(k * k + 1);
                        let { px, py } = worldToPixel(0, 0);
                        let { px: mx, py: my } = worldToPixel(0, 1);
                        d = d * Math.hypot(px - mx, py - my);
                        if (d < thresholdPx && d < bestDist) { best = g; bestDist = d; }
                    } else if (g.type === 'line' && g.isVertical) {
                        let x0 = parseFloat(g.params.x);
                        let d = Math.abs(wx - x0);
                        let { px, py } = worldToPixel(0, 0);
                        let { px: mx, py: my } = worldToPixel(1, 0);
                        d = d * Math.hypot(px - mx, py - my);
                        if (d < thresholdPx && d < bestDist) { best = g; bestDist = d; }
                    } else if (g.type === 'quadratic') {
                        let a = g.params.a || 1, b = g.params.b || 0, c = g.params.c || 0;
                        let bestD = Infinity;
                        for (let t = xMin; t <= xMax; t += (xMax - xMin) / 200) {
                            let fy = a * t * t + b * t + c;
                            let d = Math.hypot(wx - t, wy - fy);
                            if (d < bestD) bestD = d;
                        }
                        let { px, py } = worldToPixel(0, 0);
                        let { px: mx, py: my } = worldToPixel(0, 1);
                        let d = bestD * Math.hypot(px - mx, py - my);
                        if (d < thresholdPx && d < bestDist) { best = g; bestDist = d; }
                    } else {
                        // sin, cos, exp, log, inverse, abs — scan function curve
                        const getY = g.getY || (g.type === 'inverse' ? ((x) => { let k = g.params.k || 1; return (x === 0 ? undefined : k / x); }) :
                            g.type === 'exp' ? ((x) => Math.exp(x)) :
                            g.type === 'log' ? ((x) => x > 0 ? Math.log(x) : undefined) :
                            g.type === 'abs' ? ((x) => Math.abs(x)) :
                            g.type === 'sin' ? ((x) => { let p = g.params; return (p.A||1) * Math.sin((p.B||1)*x + (p.C||0)) + (p.D||0); }) :
                            g.type === 'cos' ? ((x) => { let p = g.params; return (p.A||1) * Math.cos((p.B||1)*x + (p.C||0)) + (p.D||0); }) :
                            null);
                        if (!getY) continue;
                        let bestD = Infinity;
                        for (let t = xMin; t <= xMax; t += (xMax - xMin) / 200) {
                            let fy = getY(t);
                            if (!isFinite(fy)) continue;
                            let d = Math.hypot(wx - t, wy - fy);
                            if (d < bestD) bestD = d;
                        }
                        let { px, py } = worldToPixel(0, 0);
                        let { px: mx, py: my } = worldToPixel(0, 1);
                        let d = bestD * Math.hypot(px - mx, py - my);
                        if (d < thresholdPx && d < bestDist) { best = g; bestDist = d; }
                    }
                }
                return best;
            }

            function createSmartDynamicPoint(target) {
                const label = getNextPointLabel();
                let xExpr = 't', yExpr = 't', color = '#ef4444', tMin = -5, tMax = 5, step = 0.01;
                let defLabel = '';

                if (target.type === 'segment' || target.type === 'ray') {
                    let pts = target.points;
                    let [x1, y1] = pts[0], [x2, y2] = pts[1];
                    // t ∈ [0,1] for segment, t ∈ [0,∞) for ray (capped at reasonable range)
                    xExpr = x1 + '+t*(' + (x2 - x1) + ')';
                    yExpr = y1 + '+t*(' + (y2 - y1) + ')';
                    if (target.type === 'segment') {
                        tMin = 0; tMax = 1; step = 0.005;
                    } else {
                        let range = Math.hypot(x2 - x1, y2 - y1);
                        tMin = 0; tMax = Math.max(10, range * 3); step = 0.02;
                    }
                    defLabel = target.type === 'segment' ? '线段' : '射线';
                    color = '#f59e0b';
                } else if (target.type === 'line' && !target.isVertical) {
                    const k = target.params.k, b = target.params.b;
                    xExpr = 't'; yExpr = k + '*t+' + b;
                    defLabel = '直线 y=' + fmtK(k) + 'x+' + fmtK(b);
                    color = '#6366f1';
                } else if (target.type === 'quadratic') {
                    const a = target.params.a || 1, b = target.params.b || 0, c = target.params.c || 0;
                    xExpr = 't'; yExpr = a + '*t*t+' + b + '*t+' + c;
                    defLabel = '抛物线';
                } else if (target.type === 'circle') {
                    const cx = target.params.cx, cy = target.params.cy, r = target.params.r;
                    xExpr = r + '*cos(t)+' + cx; yExpr = r + '*sin(t)+' + cy;
                    defLabel = '圆 r=' + r.toFixed(1);
                    tMin = 0; tMax = 6.2832; step = 0.02;
                } else if (target.type === 'ellipse') {
                    xExpr = target.rx + '*cos(t)+' + target.cx; yExpr = target.ry + '*sin(t)+' + target.cy;
                    defLabel = '椭圆 rx=' + target.rx.toFixed(1) + ' ry=' + target.ry.toFixed(1);
                    tMin = 0; tMax = 6.2832; step = 0.02;
                } else if (target.type === 'sin') {
                    const A = target.params.A || 1, B = target.params.B || 1, C = target.params.C || 0, D = target.params.D || 0;
                    xExpr = 't'; yExpr = A + '*Math.sin(' + B + '*t+' + C + ')+' + D;
                    defLabel = '正弦曲线';
                    color = '#6366f1';
                } else if (target.type === 'cos') {
                    const A = target.params.A || 1, B = target.params.B || 1, C = target.params.C || 0, D = target.params.D || 0;
                    xExpr = 't'; yExpr = A + '*Math.cos(' + B + '*t+' + C + ')+' + D;
                    defLabel = '余弦曲线';
                    color = '#10b981';
                } else if (target.type === 'inverse') {
                    const k = target.params.k || 1;
                    xExpr = 't'; yExpr = k + '/t';
                    defLabel = '反比例 y=' + k + '/x';
                } else if (target.type === 'exp') {
                    xExpr = 't'; yExpr = 'Math.exp(t)';
                    defLabel = '指数函数 eˣ';
                    tMin = -3; tMax = 3;
                } else if (target.type === 'log') {
                    xExpr = 't'; yExpr = 'Math.log(Math.abs(t))';
                    defLabel = '对数函数 ln|x|';
                    tMin = 0.1; tMax = 5;
                } else if (target.type === 'abs') {
                    xExpr = 't'; yExpr = 'Math.abs(t)';
                    defLabel = '绝对值';
                }

                // 每个动点使用独立滑动条，支持自定义速度
                const sName = getNextSliderName();
                sliders.push({ name: sName, min: tMin, max: tMax, step: step, value: tMin, playing: false, speed: 1, direction: 1 });

                // 替换表达式中的 't' 为实际滑动条名
                xExpr = xExpr.replace(/\bt\b/g, sName);
                yExpr = yExpr.replace(/\bt\b/g, sName);

                const ptG = createGraphicFromSpec({ type: 'paramPoint', xExpr, yExpr, color, size: 10, label, trail: true });
                if (ptG) { addGraphic(ptG, true, true); }
                renderSliders();
                redraw();
                showToast('动点 ' + label + ' 已创建于' + defLabel + '（滑动条: ' + sName + '）', 'success');
            }

            function getNextSliderName() {
                const used = new Set(sliders.map(s => s.name));
                if (!used.has('t')) return 't';
                let i = 1;
                while (used.has('t' + i)) i++;
                return 't' + i;
            }

            function fmtK(v) {
                if (v === 1) return '';
                if (v === -1) return '-';
                if (Number.isInteger(v)) return v;
                return v.toFixed(1);
            }

            function findNearbyPoint(wx, wy, thresholdPx = 10) {
                if (namedPoints.length === 0) return null;
                let best = null, bestDist = Infinity;
                for (let p of namedPoints) {
                    let { px, py } = worldToPixel(p.x, p.y);
                    let { px: mx, py: my } = worldToPixel(wx, wy);
                    let d = Math.hypot(px - mx, py - my);
                    if (d < thresholdPx && d < bestDist) { best = p; bestDist = d; }
                }
                return best;
            }

            // ========= Hit Test for Dragging =========
            function hitTestGraphic(wx, wy) {
                const threshold = 25;
                let { px: mpx, py: mpy } = worldToPixel(wx, wy);

                // Check paramPoints first (highest priority)
                for (let g of graphics) {
                    if (g.hidden) continue;
                    if (g.type === 'paramPoint') {
                        let x = evaluateExpr(g.xExpr, getSliderParams());
                        let y = evaluateExpr(g.yExpr, getSliderParams());
                        if (isFinite(x) && isFinite(y)) {
                            let { px, py } = worldToPixel(x, y);
                            if (Math.hypot(px - mpx, py - mpy) < threshold) {
                                return { graphic: g, part: 'paramPoint' };
                            }
                        }
                    }
                }

                // Check namedPoints
                for (let p of namedPoints) {
                    let { px, py } = worldToPixel(p.x, p.y);
                    if (Math.hypot(px - mpx, py - mpy) < threshold) {
                        return { graphic: p, part: 'namedPoint' };
                    }
                }

                // Check geometric shapes
                for (let g of graphics) {
                    if (g.hidden) continue;
                    if (g.type === 'circle') {
                        let { px: cpx, py: cpy } = worldToPixel(g.params.cx, g.params.cy);
                        let { px: epx } = worldToPixel(g.params.cx + g.params.r, g.params.cy);
                        let radiusPx = Math.abs(epx - cpx);
                        let centerDist = Math.hypot(cpx - mpx, cpy - mpy);
                        let edgeDist = Math.abs(centerDist - radiusPx);
                        if (centerDist < threshold) return { graphic: g, part: 'center' };
                        if (edgeDist < threshold) return { graphic: g, part: 'edge' };
                    } else if (g.type === 'ellipse') {
                        let { px: cpx, py: cpy } = worldToPixel(g.cx, g.cy);
                        let centerDist = Math.hypot(cpx - mpx, cpy - mpy);
                        if (centerDist < threshold) return { graphic: g, part: 'center' };
                        // Check near edge
                        let ang = Math.atan2(wy - g.cy, wx - g.cx);
                        let ex = g.cx + g.rx * Math.cos(ang), ey = g.cy + g.ry * Math.sin(ang);
                        let { px: epx, py: epy } = worldToPixel(ex, ey);
                        if (Math.hypot(epx - mpx, epy - mpy) < threshold) return { graphic: g, part: 'edge' };
                    } else if (g.type === 'rectangle') {
                        let cx = g.x + g.w / 2, cy = g.y + g.h / 2;
                        let { px: cpx, py: cpy } = worldToPixel(cx, cy);
                        if (Math.hypot(cpx - mpx, cpy - mpy) < threshold) return { graphic: g, part: 'center' };
                        // Check corners
                        let corners = [[g.x, g.y], [g.x + g.w, g.y], [g.x + g.w, g.y + g.h], [g.x, g.y + g.h]];
                        for (let ci = 0; ci < corners.length; ci++) {
                            let { px, py } = worldToPixel(corners[ci][0], corners[ci][1]);
                            if (Math.hypot(px - mpx, py - mpy) < threshold) return { graphic: g, part: 'corner', cornerIndex: ci };
                        }
                    } else if (g.type === 'polygon') {
                        for (let vi = 0; vi < g.points.length; vi++) {
                            let { px, py } = worldToPixel(g.points[vi][0], g.points[vi][1]);
                            if (Math.hypot(px - mpx, py - mpy) < threshold) return { graphic: g, part: 'vertex', vertexIndex: vi };
                        }
                    } else if (g.type === 'segment' || g.type === 'ray') {
                        for (let pi = 0; pi < g.points.length; pi++) {
                            let { px, py } = worldToPixel(g.points[pi][0], g.points[pi][1]);
                            if (Math.hypot(px - mpx, py - mpy) < threshold) return { graphic: g, part: 'endpoint', pointIndex: pi };
                        }
                    } else if (g.type === 'points') {
                        for (let pi = 0; pi < g.points.length; pi++) {
                            let { px, py } = worldToPixel(g.points[pi][0], g.points[pi][1]);
                            if (Math.hypot(px - mpx, py - mpy) < threshold) return { graphic: g, part: 'point', pointIndex: pi };
                        }
                    } else if (g.type === 'line' && !g.isVertical) {
                        let k = g.params.k, b = g.params.b;
                        let fy = k * wx + b;
                        let { px, py } = worldToPixel(wx, fy);
                        if (Math.hypot(px - mpx, py - mpy) < threshold) return { graphic: g, part: 'curve' };
                    } else if (g.type === 'line' && g.isVertical) {
                        let x0 = parseFloat(g.params.x);
                        let { px } = worldToPixel(x0, 0);
                        if (Math.abs(px - mpx) < threshold) return { graphic: g, part: 'curve' };
                    } else if (g.type === 'sin' || g.type === 'cos') {
                        if (g.getY) {
                            let fy = g.getY(wx);
                            if (isFinite(fy)) {
                                let { px, py } = worldToPixel(wx, fy);
                                if (Math.hypot(px - mpx, py - mpy) < threshold) return { graphic: g, part: 'curve' };
                            }
                        }
                    } else if (g.type === 'quadratic' || g.type === 'abs') {
                        if (g.getY) {
                            let fy = g.getY(wx);
                            if (isFinite(fy)) {
                                let { px, py } = worldToPixel(wx, fy);
                                if (Math.hypot(px - mpx, py - mpy) < threshold) return { graphic: g, part: 'curve' };
                            }
                        }
                    } else if (g.type === 'inverse' || g.type === 'exp' || g.type === 'log') {
                        if (g.getY) {
                            let fy = g.getY(wx);
                            if (isFinite(fy)) {
                                let { px, py } = worldToPixel(wx, fy);
                                if (Math.hypot(px - mpx, py - mpy) < threshold) return { graphic: g, part: 'curve' };
                            }
                        }
                    }
                }
                return null;
            }

            function updateDragTarget(wx, wy) {
                if (!dragTarget) return;
                let g = dragTarget.graphic;
                let part = dragTarget.part;

                if (part === 'namedPoint') {
                    let newX = snapToInteger(wx);
                    let newY = snapToInteger(wy);
                    g.x = newX;
                    g.y = newY;
                    updateDependentGraphics(g);
                } else if (part === 'paramPoint') {
                    // For paramPoint, we can't easily change the expression, so we skip
                    return;
                } else if (part === 'center' && g.type === 'circle') {
                    g.params.cx = snapToInteger(wx);
                    g.params.cy = snapToInteger(wy);
                } else if (part === 'edge' && g.type === 'circle') {
                    g.params.r = Math.max(0.1, Math.hypot(wx - g.params.cx, wy - g.params.cy));
                } else if (part === 'center' && g.type === 'ellipse') {
                    let dx = wx - dragTarget.startParams.cx;
                    let dy = wy - dragTarget.startParams.cy;
                    g.cx = dragTarget.startParams.cx + dx;
                    g.cy = dragTarget.startParams.cy + dy;
                } else if (part === 'edge' && g.type === 'ellipse') {
                    let dx = Math.abs(wx - g.cx);
                    let dy = Math.abs(wy - g.cy);
                    if (dx > 0.05) g.rx = Math.max(0.1, dx);
                    if (dy > 0.05) g.ry = Math.max(0.1, dy);
                } else if (part === 'center' && g.type === 'rectangle') {
                    let dx = wx - dragTarget.startParams.cx;
                    let dy = wy - dragTarget.startParams.cy;
                    g.x = dragTarget.startParams.x + dx;
                    g.y = dragTarget.startParams.y + dy;
                } else if (part === 'corner' && g.type === 'rectangle') {
                    let ci = dragTarget.cornerIndex;
                    let sp = dragTarget.startParams;
                    let ox = sp.x, oy = sp.y, ow = sp.w, oh = sp.h;
                    if (ci === 0) { g.x = Math.min(wx, ox + ow); g.y = Math.min(wy, oy + oh); g.w = ox + ow - g.x; g.h = oy + oh - g.y; }
                    else if (ci === 1) { g.y = Math.min(wy, oy + oh); g.w = wx - ox; g.h = oy + oh - g.y; g.x = ox; }
                    else if (ci === 2) { g.w = wx - ox; g.h = wy - oy; g.x = ox; g.y = oy; }
                    else if (ci === 3) { g.x = Math.min(wx, ox + ow); g.w = ox + ow - g.x; g.h = wy - oy; g.y = oy; }
                    g.w = Math.max(0.1, g.w); g.h = Math.max(0.1, g.h);
                } else if (part === 'vertex' && g.type === 'polygon') {
                    g.points[dragTarget.vertexIndex] = [snapToInteger(wx), snapToInteger(wy)];
                } else if (part === 'endpoint' && (g.type === 'segment' || g.type === 'ray')) {
                    g.points[dragTarget.pointIndex] = [snapToInteger(wx), snapToInteger(wy)];
                } else if (part === 'point' && g.type === 'points') {
                    g.points[dragTarget.pointIndex] = [snapToInteger(wx), snapToInteger(wy)];
                } else if (part === 'curve' && g.type === 'line' && !g.isVertical) {
                    // Drag line vertically: adjust b
                    let fy = g.params.k * wx + g.params.b;
                    let dy = wy - fy;
                    g.params.b = (dragTarget.startParams.b || 0) + dy;
                    g.getY = (x) => g.params.k * x + g.params.b;
                } else if (part === 'curve' && g.type === 'line' && g.isVertical) {
                    g.params.x = snapToInteger(wx);
                } else if (part === 'curve' && g.type === 'sin') {
                    let fy = (g.params.A || 1) * Math.sin((g.params.B || 1) * wx + (g.params.C || 0)) + (g.params.D || 0);
                    let dy = wy - fy;
                    g.params.D = (dragTarget.startParams.D || 0) + dy;
                    g.getY = (x) => (g.params.A || 1) * Math.sin((g.params.B || 1) * x + (g.params.C || 0)) + (g.params.D || 0);
                } else if (part === 'curve' && g.type === 'cos') {
                    let fy = (g.params.A || 1) * Math.cos((g.params.B || 1) * wx + (g.params.C || 0)) + (g.params.D || 0);
                    let dy = wy - fy;
                    g.params.D = (dragTarget.startParams.D || 0) + dy;
                    g.getY = (x) => (g.params.A || 1) * Math.cos((g.params.B || 1) * x + (g.params.C || 0)) + (g.params.D || 0);
                } else if (part === 'curve' && g.type === 'quadratic') {
                    let fy = (g.params.a || 1) * wx * wx + (g.params.b || 0) * wx + (g.params.c || 0);
                    let dy = wy - fy;
                    g.params.c = (dragTarget.startParams.c || 0) + dy;
                    g.getY = (x) => (g.params.a || 1) * x * x + (g.params.b || 0) * x + (g.params.c || 0);
                } else if (part === 'curve' && g.type === 'abs') {
                    let fy = (g.params.a || 1) * Math.abs(wx - (g.params.b || 0)) + (g.params.c || 0);
                    let dy = wy - fy;
                    g.params.c = (dragTarget.startParams.c || 0) + dy;
                    g.getY = (x) => (g.params.a || 1) * Math.abs(x - (g.params.b || 0)) + (g.params.c || 0);
                } else if (part === 'curve' && g.type === 'inverse') {
                    // For inverse, vertical shift doesn't make as much sense; skip
                } else if (part === 'curve' && g.type === 'exp') {
                    // Skip for exp
                } else if (part === 'curve' && g.type === 'log') {
                    // Skip for log
                }
                _cachedIntersections = null;
            }

            function snapToInteger(val, threshold = 0.15) {
                let r = Math.round(val);
                return Math.abs(val - r) <= threshold ? r : val;
            }

            let _cachedIntersections = null;
            let _cachedViewKey = '';

            function computeAllIntersections() {
                const vk = xMin.toFixed(1) + ',' + xMax.toFixed(1) + ',' + yMin.toFixed(1) + ',' + yMax.toFixed(1);
                if (_cachedIntersections && _cachedViewKey === vk) return _cachedIntersections;
                _cachedViewKey = vk;
                const list = [];
                for (let i = 0; i < graphics.length; i++) {
                    for (let j = i + 1; j < graphics.length; j++) {
                        const pts = getGraphicIntersections(graphics[i], graphics[j]);
                        for (let p of pts) list.push(p);
                    }
                }
                // 去除距离小于阈值的重复点
                const unique = [];
                for (let p of list) {
                    if (!unique.some(u => Math.hypot(u.x - p.x, u.y - p.y) < 0.01)) {
                        unique.push(p);
                    }
                }
                _cachedIntersections = unique;
                return unique;
            }

            function computeIntersections(wx, wy) {
                if (graphics.length < 2) return null;
                const list = computeAllIntersections();
                if (list.length === 0) return null;
                let best = null, bestDist = Infinity;
                let { px: mx, py: my } = worldToPixel(wx, wy);
                for (let p of list) {
                    let { px, py } = worldToPixel(p.x, p.y);
                    let d = Math.hypot(px - mx, py - my);
                    if (d < 25 && d < bestDist) { best = p; bestDist = d; }
                }
                return best;
            }

            function getGraphicIntersections(ga, gb) {
                const pts = [];
                const types = [ga.type, gb.type].sort().join('_');

                function _lineLinePts(a, b) {
                    const res = [];
                    if (a.isVertical && b.isVertical) return res;
                    if (a.isVertical) {
                        let x = parseFloat(a.params.x), y = b.params.k * x + b.params.b;
                        if (isFinite(y)) res.push({ x, y });
                    } else if (b.isVertical) {
                        let x = parseFloat(b.params.x), y = a.params.k * x + a.params.b;
                        if (isFinite(y)) res.push({ x, y });
                    } else {
                        let k1 = a.params.k, b1 = a.params.b, k2 = b.params.k, b2v = b.params.b;
                        if (Math.abs(k1 - k2) > 1e-9) {
                            let x = (b2v - b1) / (k1 - k2), y = k1 * x + b1;
                            if (isFinite(x) && isFinite(y)) res.push({ x, y });
                        }
                    }
                    return res;
                }

                if (types === 'line_line') {
                    for (let p of _lineLinePts(ga, gb)) pts.push(p);
                } else if (types === 'line_segment' || types === 'segment_line') {
                    const l = ga.type === 'line' ? ga : gb;
                    const s = ga.type === 'segment' ? ga : gb;
                    let sx1 = s.points[0][0], sy1 = s.points[0][1], sx2 = s.points[1][0], sy2 = s.points[1][1];
                    if (l.isVertical) {
                        let x = parseFloat(l.params.x);
                        if (sx1 === sx2) return pts;
                        let sk2 = (sy2 - sy1) / (sx2 - sx1), sb2 = sy1 - sk2 * sx1;
                        let y = sk2 * x + sb2;
                        if (isFinite(y) && y >= Math.min(sy1,sy2) - 0.01 && y <= Math.max(sy1,sy2) + 0.01) pts.push({x,y});
                    } else if (sx1 === sx2) {
                        let y = l.params.k * sx1 + l.params.b;
                        if (isFinite(y) && y >= Math.min(sy1,sy2) - 0.01 && y <= Math.max(sy1,sy2) + 0.01) pts.push({x:sx1,y});
                    } else {
                        let sk2 = (sy2 - sy1) / (sx2 - sx1), sb2 = sy1 - sk2 * sx1;
                        let k1 = l.params.k, b1 = l.params.b;
                        if (Math.abs(k1 - sk2) > 1e-9) {
                            let x = (sb2 - b1) / (k1 - sk2), y = k1 * x + b1;
                            if (isFinite(x) && isFinite(y)
                                && x >= Math.min(sx1,sx2) - 0.01 && x <= Math.max(sx1,sx2) + 0.01) {
                                pts.push({x, y});
                            }
                        }
                    }
                } else if (types === 'segment_segment') {
                    let a = ga, b = gb;
                    let x1=a.points[0][0], y1=a.points[0][1], x2=a.points[1][0], y2=a.points[1][1];
                    let x3=b.points[0][0], y3=b.points[0][1], x4=b.points[1][0], y4=b.points[1][1];
                    let d = (x1-x2)*(y3-y4) - (y1-y2)*(x3-x4);
                    if (Math.abs(d) > 1e-9) {
                        let t = ((x1-x3)*(y3-y4) - (y1-y3)*(x3-x4)) / d;
                        let u = -((x1-x2)*(y1-y3) - (y1-y2)*(x1-x3)) / d;
                        if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
                            pts.push({ x: x1 + t*(x2-x1), y: y1 + t*(y2-y1) });
                        }
                    }
                } else if (types === 'circle_line' || types === 'line_circle') {
                    const c = ga.type === 'circle' ? ga : gb;
                    const l = ga.type === 'line' ? ga : gb;
                    const cx = c.params.cx, cy = c.params.cy, r = c.params.r;
                    if (l.isVertical) {
                        let x = parseFloat(l.params.x);
                        let d2 = r * r - (x - cx) * (x - cx);
                        if (d2 >= 0) {
                            let dy = Math.sqrt(d2);
                            pts.push({ x, y: cy + dy });
                            if (d2 > 1e-9) pts.push({ x, y: cy - dy });
                        }
                    } else {
                        let k = l.params.k, b_val = l.params.b;
                        let A = 1 + k * k, B = 2 * (k * (b_val - cy) - cx), C = cx * cx + (b_val - cy) * (b_val - cy) - r * r;
                        let disc = B * B - 4 * A * C;
                        if (disc >= 0) {
                            let x1 = (-B + Math.sqrt(disc)) / (2 * A), y1 = k * x1 + b_val;
                            pts.push({ x: x1, y: y1 });
                            if (disc > 1e-9) {
                                let x2 = (-B - Math.sqrt(disc)) / (2 * A), y2 = k * x2 + b_val;
                                pts.push({ x: x2, y: y2 });
                            }
                        }
                    }
                } else if (types === 'circle_circle') {
                    const c1 = ga, c2 = gb;
                    let dx = c2.params.cx - c1.params.cx, dy = c2.params.cy - c1.params.cy;
                    let d = Math.hypot(dx, dy);
                    let r1 = c1.params.r, r2 = c2.params.r;
                    if (d > 1e-9 && d <= r1 + r2 && d >= Math.abs(r1 - r2)) {
                        let a = (r1 * r1 - r2 * r2 + d * d) / (2 * d);
                        let h2 = r1 * r1 - a * a;
                        if (h2 >= 0) {
                            let h = Math.sqrt(Math.max(0, h2));
                            let mx = c1.params.cx + a * dx / d, my = c1.params.cy + a * dy / d;
                            pts.push({ x: mx + h * dy / d, y: my - h * dx / d });
                            if (h2 > 1e-9) pts.push({ x: mx - h * dy / d, y: my + h * dx / d });
                        }
                    }
                } else if (types === 'line_quadratic' || types === 'quadratic_line') {
                    const l = ga.type === 'line' ? ga : gb;
                    const q = ga.type === 'quadratic' ? ga : gb;
                    const a = q.params.a || 1, b = q.params.b || 0, c = q.params.c || 0;
                    if (l.isVertical) {
                        let x = parseFloat(l.params.x), y = a * x * x + b * x + c;
                        if (isFinite(y)) pts.push({ x, y });
                    } else {
                        let k = l.params.k, b_val = l.params.b;
                        let A = a, B_val = b - k, C = c - b_val;
                        let disc = B_val * B_val - 4 * A * C;
                        if (disc >= 0) {
                            let x1 = (-B_val + Math.sqrt(disc)) / (2 * A), y1 = k * x1 + b_val;
                            pts.push({ x: x1, y: y1 });
                            if (disc > 1e-9) {
                                let x2 = (-B_val - Math.sqrt(disc)) / (2 * A), y2 = k * x2 + b_val;
                                pts.push({ x: x2, y: y2 });
                            }
                        }
                    }
                } else if (types === 'circle_quadratic' || types === 'quadratic_circle') {
                    const c = ga.type === 'circle' ? ga : gb;
                    const q = ga.type === 'quadratic' ? ga : gb;
                    const cx = c.params.cx, cy = c.params.cy, r = c.params.r;
                    const a = q.params.a || 1, b = q.params.b || 0, c_val = q.params.c || 0;
                    for (let t = -10; t <= 10; t += 0.2) {
                        let x = t, y = a * x * x + b * x + c_val;
                        let d = Math.hypot(x - cx, y - cy);
                        if (Math.abs(d - r) < 0.15) pts.push({ x, y });
                    }
                } else if (types === 'quadratic_quadratic') {
                    const q1 = ga, q2 = gb;
                    const a1 = q1.params.a || 1, b1 = q1.params.b || 0, c1 = q1.params.c || 0;
                    const a2 = q2.params.a || 1, b2 = q2.params.b || 0, c2 = q2.params.c || 0;
                    const A = a1 - a2, B_val = b1 - b2, C = c1 - c2;
                    let disc = B_val * B_val - 4 * A * C;
                    if (Math.abs(A) < 1e-9) {
                        if (Math.abs(B_val) > 1e-9) {
                            let x = -C / B_val, y = a1 * x * x + b1 * x + c1;
                            if (isFinite(x) && isFinite(y)) pts.push({ x, y });
                        }
                    } else if (disc >= 0) {
                        let x1 = (-B_val + Math.sqrt(disc)) / (2 * A), y1 = a1 * x1 * x1 + b1 * x1 + c1;
                        pts.push({ x: x1, y: y1 });
                        if (disc > 1e-9) {
                            let x2 = (-B_val - Math.sqrt(disc)) / (2 * A), y2 = a1 * x2 * x2 + b1 * x2 + c1;
                            pts.push({ x: x2, y: y2 });
                        }
                    }
                } else if (types === 'line_sin' || types === 'sin_line' || types === 'line_cos' || types === 'cos_line') {
                    const l = (ga.type === 'line') ? ga : gb;
                    const s = (ga.type === 'sin' || ga.type === 'cos') ? ga : gb;
                    const isCos = s.type === 'cos';
                    const A = s.params.A || 1, B = s.params.B || 1, C = s.params.C || 0, D = s.params.D || 0;
                    let k, b_val;
                    if (l.isVertical) {
                        let x = parseFloat(l.params.x);
                        let val = isCos ? A * Math.cos(B * x + C) + D : A * Math.sin(B * x + C) + D;
                        pts.push({ x, y: val });
                    } else {
                        k = l.params.k; b_val = l.params.b;
                        for (let t = -12; t <= 12; t += 0.15) {
                            let val = isCos ? A * Math.cos(B * t + C) + D : A * Math.sin(B * t + C) + D;
                            let lineY = k * t + b_val;
                            if (Math.abs(val - lineY) < 0.2) pts.push({ x: t, y: lineY });
                        }
                    }
                }
                // 牛顿法精化扫描得到的交点
                const refined = [];
                for (let p of pts) {
                    let rp = refineIntersection(p, ga, gb);
                    if (rp && isFinite(rp.x) && isFinite(rp.y)) refined.push(rp);
                    else refined.push(p); // 精化失败则保留原始点
                }
                return refined;
            }

            function refineIntersection(p, ga, gb) {
                // 对两个都有 getY 的图形，用牛顿法精化交点
                if (!ga.getY || !gb.getY) return null;
                let x = p.x;
                const h = 0.0001;
                for (let iter = 0; iter < 10; iter++) {
                    let f = ga.getY(x) - gb.getY(x);
                    if (!isFinite(f)) return null;
                    if (Math.abs(f) < 1e-10) break;
                    let fp = (ga.getY(x + h) - gb.getY(x + h) - ga.getY(x - h) + gb.getY(x - h)) / (2 * h);
                    if (Math.abs(fp) < 1e-12) return null;
                    let dx = f / fp;
                    x -= dx;
                    if (Math.abs(dx) < 1e-12) break;
                }
                let y = ga.getY(x);
                if (!isFinite(y)) return null;
                return { x, y };
            }

            function handleCanvasClick(wx, wy) {
                if (!activeTool) return false;

                if (activeTool === 'smartDyn') {
                    let target = findNearestFunctionGraphic(wx, wy);
                    if (!target) {
                        showToast('未检测到附近的图形，请靠近线段/曲线点击', 'info');
                        return true;
                    }
                    pushUndo();
                    createSmartDynamicPoint(target);
                    // 不退出工具模式，允许连续创建多个动点
                    if (toolStatusEl) { toolStatusEl.textContent = '🖱 继续点击创建动点，ESC退出'; toolStatusEl.style.color = '#10b981'; }
                    return true;
                }

                if (activeTool === 'tangent') {
                    let target = findNearestFunctionGraphic(wx, wy);
                    if (!target) {
                        showToast('未检测到附近的函数图形，请靠近曲线点击', 'info');
                        return true;
                    }
                    if (!target.getY) {
                        showToast('该图形不支持切线计算', 'info');
                        return true;
                    }
                    let y = target.getY(wx);
                    if (y === undefined || !isFinite(y)) {
                        showToast('该点不在函数定义域内', 'info');
                        return true;
                    }
                    let h = 0.0001;
                    let derivative = (target.getY(wx + h) - target.getY(wx - h)) / (2 * h);
                    if (!isFinite(derivative)) {
                        showToast('该点导数不存在', 'info');
                        return true;
                    }
                    let b = y - derivative * wx;
                    pushUndo();
                    // Tangent line (dashed)
                    const tangentG = createGraphicFromSpec({ type: 'line', params: { k: derivative, b }, color: target.color, lineWidth: 2, strokeDash: [6, 4] });
                    if (tangentG) { tangentG.alpha = 1; graphics.push(tangentG); _cachedIntersections = null; }
                    // Tangent point
                    const ptG = createGraphicFromSpec({ type: 'points', points: [[wx, y]], color: target.color, size: 8 });
                    if (ptG) { ptG.alpha = 1; graphics.push(ptG); _cachedIntersections = null; }
                    // Slope label
                    const slopeLabel = createGraphicFromSpec({ type: 'text', text: "k'=" + derivative.toFixed(4), x: wx + (xMax - xMin) * 0.05, y: y + (yMax - yMin) * 0.05, color: target.color, fontSize: 13 });
                    if (slopeLabel) { slopeLabel.alpha = 1; graphics.push(slopeLabel); _cachedIntersections = null; }
                    redraw();
                    autoSave();
                    showToast('切线斜率 k=' + derivative.toFixed(4), 'success');
                    exitToolMode();
                    return true;
                }

                if (activeTool === 'integral') {
                    let target = findNearestFunctionGraphic(wx, wy);
                    if (!target) {
                        showToast('未检测到附近的函数图形，请靠近曲线点击', 'info');
                        return true;
                    }
                    if (!target.getY) {
                        showToast('该图形不支持定积分计算', 'info');
                        return true;
                    }
                    integralTargetGraphic = target;
                    exitToolMode();
                    // Show integral input panel
                    const panel = document.getElementById('integralPanel');
                    document.getElementById('integralA').value = wx.toFixed(1);
                    document.getElementById('integralB').value = (wx + 2).toFixed(1);
                    panel.classList.add('visible');
                    document.getElementById('integralA').focus();
                    return true;
                }

                // === Distance Tool ===
                if (activeTool === 'distance') {
                    toolPoints.push({ x: wx, y: wy });
                    if (toolPoints.length === 1) {
                        if (toolStatusEl) { toolStatusEl.textContent = '🖱 点击第二个点 · ESC退出'; toolStatusEl.style.color = '#f59e0b'; }
                    } else if (toolPoints.length >= 2) {
                        const p1 = toolPoints[0], p2 = toolPoints[1];
                        const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                        pushUndo();
                        // Dashed segment
                        const segG = createGraphicFromSpec({ type: 'segment', points: [[p1.x, p1.y], [p2.x, p2.y]], color: '#f59e0b', lineWidth: 2, strokeDash: [4, 4] });
                        if (segG) { segG.alpha = 1; graphics.push(segG); _cachedIntersections = null; }
                        // Points at both ends
                        const ptG = createGraphicFromSpec({ type: 'points', points: [[p1.x, p1.y], [p2.x, p2.y]], color: '#f59e0b', size: 7 });
                        if (ptG) { ptG.alpha = 1; graphics.push(ptG); _cachedIntersections = null; }
                        // Distance text annotation
                        const midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
                        const txtG = createGraphicFromSpec({ type: 'text', text: 'd = ' + dist.toFixed(2), x: midX, y: midY, color: '#f59e0b', fontSize: 14 });
                        if (txtG) { txtG.alpha = 1; graphics.push(txtG); _cachedIntersections = null; }
                        gfxDirty = true;
                        redraw();
                        autoSave();
                        showToast('距离: d = ' + dist.toFixed(2), 'success');
                        exitToolMode();
                    }
                    return true;
                }

                // === Angle Tool ===
                if (activeTool === 'angle') {
                    toolPoints.push({ x: wx, y: wy });
                    if (toolPoints.length === 1) {
                        if (toolStatusEl) { toolStatusEl.textContent = '🖱 点击点B（顶点） · ESC退出'; toolStatusEl.style.color = '#f59e0b'; }
                    } else if (toolPoints.length === 2) {
                        if (toolStatusEl) { toolStatusEl.textContent = '🖱 点击点C · ESC退出'; toolStatusEl.style.color = '#f59e0b'; }
                    } else if (toolPoints.length >= 3) {
                        const A = toolPoints[0], B = toolPoints[1], C = toolPoints[2];
                        let angle = Math.atan2(C.y - B.y, C.x - B.x) - Math.atan2(A.y - B.y, A.x - B.x);
                        // Normalize to [0, 2π)
                        while (angle < 0) angle += 2 * Math.PI;
                        while (angle >= 2 * Math.PI) angle -= 2 * Math.PI;
                        // Use the smaller angle
                        if (angle > Math.PI) angle = 2 * Math.PI - angle;
                        const angleDeg = angle * 180 / Math.PI;
                        pushUndo();
                        // Lines BA and BC
                        const segAB = createGraphicFromSpec({ type: 'segment', points: [[A.x, A.y], [B.x, B.y]], color: '#8b5cf6', lineWidth: 2, strokeDash: [4, 4] });
                        if (segAB) { segAB.alpha = 1; graphics.push(segAB); _cachedIntersections = null; }
                        const segBC = createGraphicFromSpec({ type: 'segment', points: [[B.x, B.y], [C.x, C.y]], color: '#8b5cf6', lineWidth: 2, strokeDash: [4, 4] });
                        if (segBC) { segBC.alpha = 1; graphics.push(segBC); _cachedIntersections = null; }
                        // Points
                        const ptG = createGraphicFromSpec({ type: 'points', points: [[A.x, A.y], [B.x, B.y], [C.x, C.y]], color: '#8b5cf6', size: 7 });
                        if (ptG) { ptG.alpha = 1; graphics.push(ptG); _cachedIntersections = null; }
                        // Angle arc
                        const startAngle = Math.atan2(A.y - B.y, A.x - B.x);
                        const endAngle = Math.atan2(C.y - B.y, C.x - B.x);
